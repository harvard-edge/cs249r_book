schema_version: 1
id: mobile-gen-impl-0165
title: Implementing Shared mmap for Edge LLMs
topic: memory-mapped-inference
status: published
provenance: imported
scenario: You are deploying a 15 GB INT8 LLM on a Jetson Orin (32 GB LPDDR5, 275 TOPS) running two separate
  inference processes for different application endpoints. Both processes need read-only access to the
  exact same model weights. You must implement memory-mapping (mmap) to share the physical RAM. Calculate
  the exact amount of physical memory saved (in GB) by using mmap instead of each process loading the
  weights independently via standard File I/O, and specify the required POSIX mmap protection and visibility
  flags to achieve this shared read-only behavior.
details:
  realistic_solution: The implementation must use the PROT_READ and MAP_SHARED flags in the mmap call.
    PROT_READ enforces read-only access to prevent accidental weight corruption, while MAP_SHARED allows
    both processes to map their virtual memory addresses to the exact same underlying physical pages in
    the OS page cache.
  common_mistake: Candidates often specify MAP_PRIVATE instead of MAP_SHARED, or fail to calculate the
    exact duplication cost, which would consume 30 GB of the 32 GB available RAM and likely cause an out-of-memory
    crash when factoring in the OS and KV cache.
  napkin_math: 'Standard independent loading memory footprint: 15 GB * 2 processes = 30 GB. Shared memory-mapped
    footprint: 15 GB (first process loads into OS page cache) + 0 GB (second process reuses the same physical
    pages) = 15 GB. Total memory saved = 30 GB - 15 GB = 15 GB.'
