schema_version: 1
id: mobile-exp2-impl-0072
title: Calculating Fallback Model Budget on Exynos 2400
topic: graceful-degradation
status: published
provenance: imported
scenario: An augmented reality application runs real-time object tracking on a Samsung Exynos 2400 NPU.
  The device features a dual-core NPU with a peak throughput of 34.7 TOPS, sharing 12 GB of LPDDR5X memory
  with the CPU, GPU, and ISP. During heavy camera usage, the ISP and GPU saturate the shared memory bandwidth,
  forcing the system controller to throttle the NPU performance down by 40% to maintain thermal limits.
  If the application must maintain a strict 30 frames per second (FPS) to avoid motion sickness, calculate
  the maximum number of operations (in GOPS) a fallback model can require per frame to guarantee real-time
  performance under these degraded conditions.
details:
  realistic_solution: The correct approach is to first calculate the degraded compute capacity available
    to the NPU under throttling. Since the system is throttled down by 40%, the available compute is 60%
    of the peak 34.7 TOPS. To ensure the fallback model meets the 30 FPS requirement, you divide the throttled
    TOPS by 30 to find the maximum operations allowed per frame. This budget directly informs the architecture
    and quantization level of the fallback model deployed during graceful degradation.
  common_mistake: Candidates often forget to apply the 40% degradation factor to the peak TOPS before
    dividing by the frame rate, calculating the budget based on the theoretical maximum. They may also
    confuse Tera Operations (TOPS) with MACs, or fail to convert the final result into Giga Operations
    (GOPS) correctly.
  napkin_math: '1. Peak compute capacity: 34.7 TOPS.

    2. Throttled compute capacity (60% of peak): 34.7 TOPS * 0.60 = 20.82 TOPS.

    3. Target frame rate: 30 FPS.

    4. Maximum operations per frame: 20.82 TOPS / 30 FPS = 0.694 TOPS per frame.

    5. Convert TOPS to GOPS: 0.694 TOPS * 1000 = 694 GOPS.

    The fallback model must require no more than 694 GOPS per frame.'
