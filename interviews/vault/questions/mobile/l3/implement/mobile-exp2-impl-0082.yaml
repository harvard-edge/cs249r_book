schema_version: 1
id: mobile-exp2-impl-0082
title: Calculate Prefill Latency Bound on Tensor G3
topic: profiling-bottleneck-analysis
status: published
provenance: imported
scenario: You are profiling the prefill (prompt processing) latency of the Gemini Nano model running on
  a Google Tensor G3. The Tensor G3 features an on-device TPU delivering 7.5 TOPS and is equipped with
  12 GB LPDDR5X memory. Assuming Gemini Nano requires 6 billion operations per token during the prefill
  phase, calculate the theoretical minimum compute latency in milliseconds to process a 100-token prompt.
details:
  realistic_solution: The prefill phase is typically compute-bound because the model weights can be reused
    across all tokens in the prompt simultaneously. To calculate the bottleneck, compute the total required
    operations for the prompt and divide by the TPU's compute capacity (7.5 TOPS).
  common_mistake: Candidates often mistakenly apply memory bandwidth bottlenecks to the prefill phase
    instead of token generation, or they fail to properly convert Tera Operations (10^12) to Giga Operations
    (10^9) when calculating the final latency.
  napkin_math: Total operations = 100 tokens * 6 billion ops/token = 600 billion ops = 0.6 TeraOps. TPU
    compute capacity = 7.5 TOPS (TeraOps per second). Minimum compute latency = 0.6 TeraOps / 7.5 TOPS
    = 0.08 seconds = 80 milliseconds.
