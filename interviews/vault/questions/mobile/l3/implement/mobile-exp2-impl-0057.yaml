schema_version: 1
id: mobile-exp2-impl-0057
title: Shadow Deployment Compute Utilization on Hexagon NPU
topic: ab-rollout-strategies
status: published
provenance: imported
scenario: You are preparing a shadow deployment for a new INT8 object detection model (Model B) alongside
  the current production model (Model A) on a flagship device featuring a Qualcomm Hexagon NPU (Snapdragon
  8 Gen 3) with a shared 16 GB LPDDR5X memory pool. Both models must process the same 30 FPS live camera
  feed simultaneously to compare bounding box outputs without impacting the user experience. Model A requires
  0.6 Tera-Operations (TOPs) per frame, while the heavier Model B requires 0.7 TOPs per frame. Given the
  NPU's peak capability of 45 TOPS INT8, calculate the expected compute utilization percentage of the
  NPU during this shadow rollout.
details:
  realistic_solution: In a shadow deployment, both the control (Model A) and variant (Model B) models
    process the same input stream concurrently. The total compute requirement per frame is the sum of
    both models' operations. You must multiply this combined per-frame cost by the target frame rate to
    determine the total required TOPS, and then divide by the total available NPU TOPS to find the expected
    hardware utilization.
  common_mistake: Candidates often forget to multiply the per-frame compute by the frame rate (30 FPS)
    or calculate the utilization for only one model instead of summing the compute requirements for both
    models running simultaneously in shadow mode.
  napkin_math: Compute per frame for Model A = 0.6 TOPs. Compute per frame for Model B = 0.7 TOPs. Total
    compute per frame = 0.6 + 0.7 = 1.3 TOPs. Required compute per second at 30 FPS = 1.3 TOPs/frame *
    30 FPS = 39 TOPS. Available Hexagon NPU Capacity = 45 TOPS. Utilization percentage = (39 TOPS / 45
    TOPS) * 100 = 86.67%.
