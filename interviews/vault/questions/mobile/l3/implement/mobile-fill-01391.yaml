schema_version: 1
id: mobile-fill-01391
title: Quantifying Adversarial Attack Impact on Mobile NPU Inference Latency
topic: adversarial-robustness
status: published
provenance: imported
scenario: You are deploying a critical image classification model on a Samsung Exynos 2400 NPU (34.7 TOPS,
  12 GB LPDDR5X) for a real-time mobile application. A recent security audit has identified the model
  as vulnerable to Projected Gradient Descent (PGD) adversarial attacks. To mitigate this, you decide
  to implement adversarial training. Given a baseline inference latency of 5ms for benign inputs and a
  target adversarial perturbation budget (epsilon) that, after adversarial training, increases the model's
  computational graph complexity by 15%, how would you quantify the expected increase in inference latency
  specifically attributable to processing adversarially trained inputs on this NPU, considering its stated
  TOPS and memory bandwidth (implied by LPDDR5X) for a typical MobileNetV3-large architecture?
details:
  realistic_solution: 'A realistic approach involves a multi-faceted strategy: 1. **Quantify Operational
    Overheads:** Precisely measure or estimate the additional MAC operations and memory accesses introduced
    by the adversarial training modifications. 2. **NPU Profiling/Modeling:** Utilize NPU profiling tools
    (if available on the Samsung Exynos 2400) to understand the actual execution time components (compute
    vs. memory). If tools are limited, create a simplified performance model that accounts for the NPU''s
    effective throughput for the specific layer types in the model and the memory bandwidth of LPDDR5X.
    3. **Latency Calculation Formula:** Develop a formula incorporating the increased operational count,
    the NPU''s effective processing rate, and potential memory access stalls. For instance, `Latency_adv
    = Latency_base + (ΔOperations / NPU_Effective_OPS_per_ms) + ΔMemory_Access_Time`. This provides a
    more accurate quantitative prediction than a simple percentage increase.'
  common_mistake: Candidates often assume a linear relationship between FLOPS/MACs and latency without
    considering NPU-specific bottlenecks like memory bandwidth, quantization effects, or the overhead
    of specific defense mechanisms (e.g., additional pre-processing layers or activation functions). Another
    mistake is to neglect the practical effective TOPS for a given model architecture, which is often
    lower than peak theoretical TOPS, or to oversimplify the impact on power consumption alongside latency.
  napkin_math: 'Assuming, for a first-order approximation, that latency scales linearly with computational
    complexity when other factors remain constant:

    Let `L_base` be the baseline inference latency = 5ms.

    Let `%C_increase` be the percentage increase in computational graph complexity due to adversarial
    training = 0.15 (15%).


    Expected new latency `L_adversarial` can be estimated as:

    `L_adversarial = L_base * (1 + %C_increase)`

    `L_adversarial = 5ms * (1 + 0.15)`

    `L_adversarial = 5ms * 1.15`

    `L_adversarial = 5.75ms`


    The expected increase in inference latency is `ΔL = L_adversarial - L_base = 5.75ms - 5ms = 0.75ms`.'
