schema_version: 1
id: mobile-fill-01522
title: On-Device Active Learning for Image Classification on Tensor G3
topic: dataset-curation
status: published
provenance: imported
scenario: Your team is developing a mobile application that performs real-time image classification for
  rare object detection on the Google Tensor G3, leveraging its 7.5 TOPS on-device TPU and 12 GB LPDDR5X
  memory. The initial model performs reasonably well, but you frequently encounter new, unrepresented
  classes in the wild, leading to performance drops. To continuously improve the model without large,
  expensive re-annotations, you decide to implement an active learning pipeline. Describe an on-device
  data selection strategy, considering the Tensor G3's capabilities and memory constraints, that identifies
  the most informative samples for human annotation to minimize labeling effort and address dataset bias.
  How would you design the annotation workflow to ensure high inter-annotator agreement and rapidly integrate
  new labels into your training loop?
details:
  realistic_solution: Implement an uncertainty-based active learning strategy on-device. The model's prediction
    probabilities (e.g., entropy or margin sampling) are calculated on the Tensor G3's TPU. Samples with
    high uncertainty or low confidence for the predicted class, or samples close to the decision boundary,
    are flagged. To manage the 12 GB LPDDR5X memory, store only embeddings or compressed features of these
    uncertain samples, along with minimal metadata, for a defined period or until a certain batch size
    is reached. These selected samples are periodically offloaded to the cloud for human annotation. The
    annotation workflow would involve clear, version-controlled guidelines, a multi-stage review process
    (e.g., primary annotator, reviewer, arbiter), and automated inter-annotator agreement (IAA) metrics
    (like Cohen's Kappa) calculated continuously. A feedback loop from IAA analysis to guideline refinement
    is crucial. For addressing bias, also include a small component of diversity sampling alongside uncertainty
    sampling to ensure coverage of various data distributions.
  common_mistake: Collecting data passively from user interactions without intelligent selection, leading
    to a biased dataset reflecting common scenarios rather than edge cases, or overwhelming the annotation
    team with redundant or uninformative samples. Another mistake is not establishing clear annotation
    guidelines and quality checks, resulting in low inter-annotator agreement and noisy labels.
  napkin_math: "If the model processes 100 images/second on the Tensor G3 and flags 5% as uncertain, and\
    \ each uncertain image is represented by a 128-byte compressed embedding, how much memory is needed\
    \ to store 1 hour's worth of flagged data? \n\n100 images/s * 0.05 (uncertainty rate) = 5 uncertain\
    \ images/s\n5 images/s * 3600 s/hour = 18,000 uncertain images/hour\n18,000 images * 128 bytes/image\
    \ = 2,304,000 bytes = 2.3 MB. This is well within the 12GB LPDDR5X memory, suggesting that storing\
    \ embeddings for active learning is feasible on-device."
