id: mobile-exp2-impl-0064
title: Tensor G3 TPU Pipeline Throughput Calculation
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are building an on-device data ingestion pipeline for real-time sensor processing on a Google
  Tensor G3. The pipeline streams raw sensor data directly to the on-device TPU, which boasts a peak compute
  of 7.5 TOPS. The TPU inference requires exactly 50,000 operations per byte of input data. Assuming the
  pipeline operates at an effective 80% utilization of the TPU's peak compute capacity, calculate the
  maximum sustained data throughput (in MB/s) this pipeline can handle.
details:
  realistic_solution: The correct approach is to calculate the effective operations per second by applying
    the 80% utilization factor to the 7.5 TOPS peak. By dividing this effective compute capacity by the
    required operations per byte, you determine the maximum bytes processed per second, which is then
    converted to MB/s.
  common_mistake: Candidates often use the theoretical peak compute (100% utilization) instead of the
    effective utilization rate. They may also miscalculate the conversion from TOPS (trillions) to megabytes
    (millions), leading to off-by-magnitude errors.
  napkin_math: 1. Peak TPU Compute = 7.5 TOPS = 7.5 x 10^12 operations/sec. 2. Effective TPU Compute =
    7.5 x 10^12 * 0.80 = 6.0 x 10^12 operations/sec. 3. Throughput (bytes/sec) = (6.0 x 10^12 OPS) / (50,000
    OPS/byte) = 120,000,000 bytes/sec. 4. Throughput in MB/s = 120,000,000 / 1,000,000 = 120 MB/s.
