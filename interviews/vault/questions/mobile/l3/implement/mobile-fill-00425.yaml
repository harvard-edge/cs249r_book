schema_version: 1
id: mobile-fill-00425
title: Optimizing a Transformer Model on Snapdragon Hexagon NPU
topic: profiling-bottleneck-analysis
status: published
provenance: imported
scenario: A large language model (LLM) based on a transformer architecture is deployed on a mobile device
  equipped with a Snapdragon 8 Gen 3 Hexagon NPU (45 TOPS INT8, 12-16 GB LPDDR5X). Despite quantization
  to INT8, inference latency is consistently higher than the target 100ms per query. You suspect a bottleneck
  and need to pinpoint its origin within the NPU's compute, memory, or I/O subsystem using available profiling
  tools.
details:
  realistic_solution: Utilize Qualcomm's Hexagon SDK profiling tools (e.g., Hexagon NN Direct Profiler,
    System Trace, HVX profiler) to analyze execution times of individual layers, memory access patterns,
    and data transfers between host CPU and NPU. Prioritize identifying if the bottleneck is compute-bound
    (e.g., inefficient matrix multiplications, underutilization of vector extensions like HVX), memory-bound
    (e.g., excessive data transfers, poor cache utilization), or I/O-bound (e.g., slow data loading from
    main memory). Subsequently, explore kernel optimization (e.g., custom HVX kernels), data layout changes,
    or model architecture adjustments (e.g., pruning, distillation) based on the identified bottleneck.
    For memory, investigate if LPDDR5X bandwidth is saturated during peak data transfers and optimize
    data locality.
  common_mistake: Focusing solely on FLOPs/MACs and overlooking data movement costs (memory bandwidth)
    or NPU specific architectural quirks like data transfer overheads between CPU and NPU, or suboptimal
    kernel implementations for certain operations. Another common mistake is not considering the memory
    layout and cache efficiency, which heavily impacts LPDDR5X performance.
  napkin_math: Given the NPU’s 45 TOPS INT8, a 100ms target implies ~4.5 * 10^12 INT8 operations per query.
    If the model requires significantly more operations than this budget for its INT8 forward pass, it's
    compute-bound. Alternatively, for a model with 'X' MB of weights and activations, and assuming an
    LPDDR5X bandwidth of ~64 GB/s (typical for high-end mobile), a full model load or frequent intermediate
    data transfers could exceed the 100ms budget if total data movement exceeds 6.4 GB. For example, if
    the model has 10GB of intermediate activations and weights that need to be moved across the NPU-memory
    interface multiple times during inference, the total data movement could easily reach 20GB. At 64GB/s,
    this would take 20GB / 64GB/s = 0.3125s = 312.5ms, making it memory-bound and significantly exceeding
    the latency target.
