schema_version: 1
id: mobile-fill-02041
title: On-Device Federated Gradient Accumulation on A17 Pro
topic: gradient-synchronization
status: draft
provenance: imported
scenario: A mobile federated learning framework accumulates gradients on A17 Pro (35 TOPS, 8GB) for a
  personalization model (10M parameters). The training batch runs in 50 mini-batches before uploading.
  Calculate gradient accumulation memory overhead and whether it fits in 8GB alongside inference workload.
details:
  realistic_solution: 'Model parameters: 10M × 4B = 40MB. Gradients (FP32): 40MB. Optimizer states (Adam:
    m, v): 2×40MB=80MB. Activations per mini-batch (assume batch=1, 1MB): 1MB. Total training memory:
    40+40+80+1=161MB. Inference workload: assume 200MB for other apps + 100MB OS = 300MB. Total: 461MB
    out of 8GB. Fits easily. A17 Pro has DRAM bandwidth ~100GB/s for LPDDR5 — gradient accumulation at
    50 mini-batches adds 50×40MB=2GB writes but in background, acceptable.'
  common_mistake: Calculating only parameter memory without accounting for gradient and optimizer state
    memory during federated training.
  napkin_math: '10M params × 4B = 40MB params. +40MB gradients. +80MB Adam states. Total=160MB. 8GB DRAM:
    160/8192=2% memory usage. Bandwidth: 50 batches × 40MB gradient write = 2GB gradient traffic. At 100GB/s
    LPDDR5: 20ms to write all gradients. Background FL training is negligible on A17 Pro.'
