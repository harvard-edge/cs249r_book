schema_version: 1
id: mobile-exp2-impl-0065
title: Compute Budget for On-Device Frame Quality Gate
topic: data-quality-validation
status: published
provenance: imported
scenario: You are deploying a real-time computer vision feature on the Apple A17 Pro Neural Engine, processing
  a 60 FPS video stream. Before feeding frames into the main model, you must run a lightweight data quality
  gate to filter out corrupted frames. The A17 Pro's 16-core Neural Engine provides 35 TOPS, but your
  main model already consumes 30 TOPS. If you are restricted to using only 80% of the remaining compute
  for the quality gate to leave system headroom, calculate the maximum operations allowed per frame for
  the validation model.
details:
  realistic_solution: The candidate should calculate the remaining available compute capacity and then
    determine the per-frame budget based on the target framerate. By identifying the leftover TOPS, applying
    the safety margin, and dividing by the FPS, they arrive at a strict operations budget that the data
    validation model must adhere to.
  common_mistake: Candidates often forget to convert TOPS to operations per frame by dividing by the frame
    rate, or they ignore the 80% utilization constraint and assume the entire remaining 5 TOPS can be
    used. Some may also incorrectly focus on the unified 8 GB memory, which is irrelevant to this pure
    compute constraint.
  napkin_math: '1. Remaining compute = 35 TOPS (total) - 30 TOPS (main model) = 5 TOPS.

    2. Usable compute for quality gate = 5 TOPS * 0.8 = 4 TOPS.

    3. Convert TOPS to OPS: 4 TOPS = 4,000,000,000,000 operations per second.

    4. Budget per frame = 4,000,000,000,000 OPS / 60 FPS = 66,666,666,666 operations, or roughly 66.67
    GOPS per frame.'
