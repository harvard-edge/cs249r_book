schema_version: 1
id: mobile-fill-01322
title: 'Adaptive NLU on Tensor G3: Resource-Aware Graceful Degradation'
topic: graceful-degradation
status: published
provenance: imported
scenario: An on-device AI assistant on a Google Pixel phone, powered by the Google Tensor G3 (7.5 TOPS
  on-device TPU, 12 GB LPDDR5X), utilizes a complex Natural Language Understanding (NLU) model for real-time
  voice command processing. The primary NLU model requires 5 TOPS and 8 GB of RAM to deliver optimal accuracy
  and a 100ms inference latency. However, during extended use, intense gaming, or low battery, the system
  detects a persistent drop in available TPU performance to 3 TOPS and a memory ceiling of 6 GB for the
  NLU stack due to thermal throttling and OS resource management. Design a comprehensive graceful degradation
  strategy for the NLU system to maintain critical functionality and user experience under these dynamic
  resource constraints.
details:
  realistic_solution: 'Implement a multi-stage degradation ladder for the NLU module: 1. Optimal Mode:
    Primary NLU model (5 TOPS, 8 GB RAM) for peak performance. 2. Degraded Mode 1 (Partial Load): Switch
    to a pre-quantized (e.g., INT8) or distilled NLU model (e.g., requiring 3 TOPS, 4 GB RAM) that offers
    slightly reduced accuracy (e.g., 5% drop) but maintains acceptable latency (e.g., 150ms) and core
    functionality. 3. Degraded Mode 2 (Heavy Load/Low Power): Fallback to a much smaller, highly optimized
    NLU model or a rule-based/keyword spotting system (e.g., 1.5 TOPS, 2 GB RAM) for essential commands
    only, prioritizing responsiveness (e.g., 200ms latency) over comprehensive understanding. Additionally,
    implement Quality-of-Service shedding: Dynamically adjust the inference frequency of non-critical
    background NLU tasks. Prioritize latency for foreground user commands over continuous background processing.
    Utilize the Tensor G3''s hardware-level support for mixed-precision computation (e.g., INT8) to maximize
    effective TOPS under constrained conditions.'
  common_mistake: Only deploying a single, high-fidelity NLU model without alternatives. When resources
    become constrained, the system either crashes, freezes, or experiences unacceptable latency (e.g.,
    500ms+), leading to a frustrating user experience, rather than adapting to the available compute.
    There's no mechanism to swap models or shed less critical features.
  napkin_math: 'Consider the primary NLU model''s requirement of 5 TOPS. If the Tensor G3 is thermally
    throttled and only delivers an effective 3 TOPS for the NLU stack, the primary model''s inference
    time would theoretically increase by (5 TOPS / 3 TOPS) = 1.67x. If its optimal latency is 100ms, it
    would become ~167ms. While this might be acceptable, switching to Fallback Model 1 (designed for 3
    TOPS, with a native 120ms latency) maintains predictability. Memory Footprint: Primary model 8 GB.
    If a quantized fallback model reduces memory to 4 GB, this saves 4 GB of the 12 GB LPDDR5X, significantly
    easing pressure on the device''s overall memory, especially crucial when other apps are active or
    during OS-level memory management.'
