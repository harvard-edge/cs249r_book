schema_version: 1
id: mobile-new-50048
title: 'Portable Feature Extraction Pipeline: Camera Input to Model Input'
topic: software-portability
status: published
provenance: imported
scenario: 'Your cross-platform camera app preprocesses images before model inference: resize, normalize,
  and convert to RGB tensor. On iOS, the camera outputs CVPixelBuffer in BGRA format. On Android, CameraX
  outputs YUV_420_888. Both must produce a [1,3,224,224] float tensor. Design a portable preprocessing
  pipeline.'
details:
  realistic_solution: 'Use platform-specific GPU-accelerated preprocessing bridged by a common interface:
    (1) iOS: use vImage (Accelerate framework) for BGRA->RGB conversion and resize on CPU, or Metal compute
    shader for GPU-side conversion directly from CVPixelBuffer. Total preprocessing: ~0.3ms. (2) Android:
    use RenderScript or Vulkan compute for YUV->RGB + resize. Total: ~0.5ms. (3) Common interface: define
    a PreprocessResult struct {float* data, int width, int height, int channels}. Each platform implements
    the conversion to this common format. Key: do color space conversion on GPU to avoid a GPU->CPU->GPU
    round-trip that adds 1-3ms.'
  common_mistake: Writing preprocessing in the ML framework (PyTorch/TFLite) to be portable. This is slow
    because ML framework image ops are not optimized for camera buffer formats and require unnecessary
    copies.
  napkin_math: '224x224x3 float tensor: 602KB. Camera frame 1080p BGRA: 8.3MB. GPU-side resize+convert:
    ~0.3ms. CPU-side with memcpy: 8.3MB at 25 GB/s memory bandwidth = 0.3ms copy + 1-2ms conversion =
    1.5-2.3ms. GPU preprocessing is 5-7x faster.'
