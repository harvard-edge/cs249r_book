schema_version: 1
id: mobile-cell-12013
title: 'Latency Decomposition: Compare CoreML vs. TFLite Inference on Snapdragon 8 Gen 3'
topic: latency-decomposition
status: published
provenance: imported
scenario: A cross-platform mobile ML team is evaluating MobileNetV3-Large (219M MACs) on Android (Snapdragon
  8 Gen 3, 45 TOPS INT8, 16GB) using TFLite with NNAPI vs. CoreML on iPhone (A17 Pro, 35 TOPS). Compare
  inference latency including framework overhead and memory transfer.
details:
  realistic_solution: 'MobileNetV3-Large: 219M MACs = 0.44 GOPs. Snapdragon DSP via NNAPI: 0.44G/45T ≈
    0.01ms compute + 3ms NNAPI overhead = ~4ms total. CoreML on Neural Engine: 0.44G/35T + 1ms framework
    = ~1.01ms. CoreML ~4× faster due to lower framework overhead and better kernel fusion. But NNAPI can
    use GPU fallback for unsupported ops.'
  common_mistake: Ignoring that NNAPI adds 2-5ms dispatch overhead per inference call, and that CoreML
    has better kernel fusion for Apple Neural Engine ops.
  napkin_math: '0.44 GOPs / 45 TOPS = 0.0098ms compute on Snapdragon. NNAPI overhead: 2-5ms (measured).
    Total: ~4ms. CoreML: 0.44G/35T = 0.013ms + 0.5ms CoreML overhead = ~0.5ms. A17 Pro Neural Engine wins
    8× on latency for this model size.'
