title: 'The Live Filter Battery Drain: Roofline Analysis'
topic: roofline-analysis
status: draft
provenance: imported
scenario: 'You are an ML engineer at a social media company developing a new real-time video filter for
  the mobile app, running on an Apple A17 Pro chip. You have two candidate models:'
details:
  realistic_solution: The Stream-CNN is the more energy-efficient choice. A model's efficiency isn't just
    about raw operations, but about its Arithmetic Intensity (AI) relative to the hardware's capabilities.
    The A17 Pro's ANE is a powerful compute engine, but it's only efficient if fed data at a rate that
    keeps it busy. The UNet-Lite is memory-bound; its low AI means the ANE will constantly stall waiting
    for data, wasting power. The Stream-CNN is compute-bound; its high AI allows it to saturate the ANE's
    compute units, achieving higher sustained performance-per-watt (TOPS/W).
  common_mistake: Engineers often mistakenly assume that the model with the highest theoretical G-ops
    is always the fastest or most efficient. This ignores the reality of memory bottlenecks, where the
    compute units spend most of their time idle, waiting for data from DRAM. This idle time wastes significant
    power.
  napkin_math: 'Calculate Arithmetic Intensity (AI): Model A has 200 GFLOPs and 500 MB memory traffic.
    AI = 200 * 10^9 / (500 * 10^6) = 400 Ops/Byte. Model B has 100 GFLOPs but 1 GB memory traffic. AI
    = 100 * 10^9 / 10^9 = 100 Ops/Byte. If the A17-like SoC has 35 TOPS and 50 GB/s bandwidth, its ridge
    point is 35,000 / 50 = 700 Ops/Byte. Both models are memory-bound, so Model A is faster because it
    uses 50% less RAM.'
