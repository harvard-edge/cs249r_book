title: 'The Drowsy Driver Dilemma: Centralized vs. Federated TCO'
topic: federated-learning
status: published
provenance: imported
scenario: 'You are the lead ML Systems Engineer for a new ''Driver Drowsiness'' feature deploying to a
  fleet of 100,000 vehicles. To continuously improve the model, you must use your knowledge of system
  economics to choose between two strategies:'
details:
  realistic_solution: Federated Learning is overwhelmingly the more cost-effective solution, coming in
    at over $250,000 cheaper annually. The key insight is that while the per-unit data upload for FL is
    small, the sheer scale of the fleet and the frequency of updates make data transfer a first-class
    cost. The centralized approach, despite fewer updates, involves transferring massive volumes of raw
    data, making its egress costs prohibitively expensive. This analysis doesn't even include the significant
    (but hard to quantify) cost of a potential privacy breach from storing user videos, which FL is designed
    to prevent.
  common_mistake: Engineers often focus only on the most obvious cost (like cloud GPU hours) and ignore
    second-order costs like data transfer, which can dominate at scale. Another common error is to miscalculate
    the total data volume by confusing per-user numbers with fleet-wide numbers, or by mixing up daily
    and weekly timeframes.
  napkin_math: 'Centralized: 100K vehicles * 10MB raw data/day * $0.09/GB egress. Daily: 100K*10MB = 1TB/day.
    Egress = 1TB*$0.09 = $90/day = $32,850/yr. Plus cloud training GPU: ~$50K/yr. Total ~$83K/yr. FL:
    upload 100K * 50KB gradient/week = 5GB/wk. Egress = 5*52*$0.09 = $23.4/yr. On-device compute = free.
    Server aggregation: ~$5K/yr. FL total ~$5K vs centralized ~$83K. FL saves ~$78K/yr.'
