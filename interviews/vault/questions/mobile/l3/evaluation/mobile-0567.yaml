title: The 'Smart Reply' Battery Drain Dilemma
topic: federated-learning
status: published
provenance: imported
scenario: 'You are an ML Systems Engineer on the ''Auto Assistant'' team for a popular in-car infotainment
  system. Your team is tasked with launching a personalized ''Smart Reply'' feature to 1 million active
  users. After a design sprint, you have two proposals:'
details:
  realistic_solution: The correct approach is to calculate the 1-year TCO for both options AND calculate
    the battery impact of the Federated Learning option to see if it violates the user experience constraint.
  common_mistake: Focusing exclusively on server-side TCO and choosing the cheaper option, while completely
    ignoring the critical, user-facing constraint of battery drain on the mobile device. Another common
    mistake is choosing the FL option on principle for its privacy benefits without quantifying if the
    user experience cost (battery life) is acceptable.
  napkin_math: '### 1-Year Total Cost of Ownership (TCO)'
