id: mobile-cell-12105
title: 'Model Size Estimation: Compare 1B vs. 3B LLM Memory on A17 Pro'
topic: model-size-estimation
status: published
provenance: imported
scenario: 'Compare deploying a 1B vs. 3B parameter language model on A17 Pro (8GB, Neural Engine 35 TOPS).
  Use INT4 quantization for both. Evaluate: model size, KV-cache capacity at 4096 context, TPOT, and maximum
  number of conversation turns before context overflow.'
details:
  realistic_solution: '1B model (hidden=2048, 32 layers, 32 KV heads, 64 dim): INT4 = 500MB. KV/token:
    2×32×64×2B×32=262KB. App + OS: 3GB. KV budget: 8-3-0.5=4.5GB. Max tokens: 4.5GB/262KB=17,166. At 4096
    ctx: 17166/4096=4.19 → 4 users or 1 user × 17K tokens. 3B model (hidden=3072, 32 layers, 32 KV heads,
    128 dim): INT4=1.5GB. KV/token: 2×32×128×2B×32=524KB. KV budget: 8-3-1.5=3.5GB. Max: 3.5GB/524KB=6,679
    tokens = 1 user × 4096 with 2.5K spare. TPOT: 1B 500MB/68GB/s=7.4ms. 3B 1.5GB/68GB/s=22ms.'
  common_mistake: Using the same KV-cache size formula without adjusting for model dimensions; a 1B model
    has smaller hidden_dim than 3B, resulting in smaller KV-cache per token.
  napkin_math: '1B INT4: 500MB. KV/token: 262KB. Budget: 4.5GB. Tokens: 17,166. TPOT: 7.4ms. 3B INT4:
    1.5GB. KV/token: 524KB. Budget: 3.5GB. Tokens: 6,679. TPOT: 22ms. For single-user 4096-ctx conversation:
    both work. 1B: 3× faster TPOT, 2.5× more context. 3B: better quality (MMLU ~10% higher). Tradeoff:
    1B for real-time tasks, 3B for quality-sensitive.'
