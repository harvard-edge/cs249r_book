id: mobile-0560
title: The Mobile MoE Trade-off
topic: neural-architecture-search
status: published
provenance: imported
scenario: You are a mobile ML engineer for a smart camera app. Your current MobileNetV2 model (300 MFLOPS,
  15ms latency) is not powerful enough for a new, more complex 'scene description' feature. Your strict
  latency budget is 25ms to avoid UI jank. Your Neural Architecture Search (NAS) tool proposes three candidates
  to replace the core model. Which option demonstrates the most sophisticated understanding of on-device
  constraints and is the most promising to investigate further?
details:
  realistic_solution: 'The MoE Hybrid is the clear winner. It correctly identifies the core trade-off
    on mobile: you need high model *capacity* (parameters) to learn complex tasks, but low active *compute*
    (FLOPs) to meet latency budgets. The MoE architecture is designed for this, storing knowledge in many
    ''expert'' sub-networks but only executing a small subset during any single inference. The EfficientNet,
    while within budget, likely lacks the capacity for the new task. The ViT is far too slow due to the
    computational cost of its self-attention mechanism at this scale.'
  common_mistake: Engineers often conflate a model's total parameter count with its inference cost (FLOPs).
    They see a 12M parameter model and incorrectly assume it must be slower than a 5M parameter model.
    This misses the architectural trick of Mixture-of-Experts (MoE), which enables high model capacity
    with low active compute. Another common mistake is choosing any model that fits the latency budget
    without considering if it has enough capacity to actually learn the more complex task.
  napkin_math: The device's latency is proportional to the model's FLOPs. The baseline is 15ms for 300
    MFLOPS. The hard budget is 25ms.
