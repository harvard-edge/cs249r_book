id: mobile-0411
title: The Janky AR Filter
topic: real-time-deadlines
status: published
provenance: imported
scenario: You're trying to optimize an AR style transfer filter for a mobile app. The goal is a smooth
  30 FPS (a 33ms per-frame budget). Currently, the FP16 model runs on the mobile NPU, but inference takes
  ~40ms, causing noticeable 'jank'. A profiler analysis reveals that one specific layer—a large depth-wise
  separable convolution—has a very wide and unpredictable activation distribution, making it prone to
  visual artifacts if quantized. The other 49 layers are standard, well-behaved convolutions. Your task
  is to solve the performance problem. Which approach should you apply?
details:
  realistic_solution: The best solution is to use **mixed precision**. By quantizing the 49 well-behaved
    layers to INT8, you can capture most of the potential performance gain. You would then selectively
    keep the one problematic depth-wise convolution layer in its original FP16 precision. This hybrid
    approach balances the need for speed with the need to preserve visual quality by protecting the most
    sensitive part of the model from aggressive quantization. Modern mobile inference frameworks (like
    Core ML or TensorFlow Lite) explicitly support this by allowing you to specify the precision for individual
    layers.
  common_mistake: Engineers often take an all-or-nothing approach. They either try to quantize the entire
    model to INT8, ignoring the risk of quality degradation, or they give up on quantization entirely
    and start a complex, time-consuming model re-architecture or pruning project. The optimal solution
    is often a surgical, hybrid approach.
  napkin_math: 'A full INT8 quantization would roughly halve the latency: `40ms / 2 = 20ms`. This meets
    the 33ms budget but risks visual artifacts. Let''s analyze a mixed-precision approach. Assume latency
    is proportional to layer count (a simplification). The 49 INT8 layers contribute `(49/50) * 20ms =
    19.6ms`. The single FP16 layer contributes `(1/50) * 40ms = 0.8ms`. The total estimated latency is
    `19.6ms + 0.8ms = 20.4ms`. This still comfortably meets the 30 FPS target while safeguarding the quality
    of the most sensitive layer.'
