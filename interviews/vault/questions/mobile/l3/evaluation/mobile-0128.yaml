schema_version: 1
id: mobile-0128
title: The Cellular Model Download Failure
topic: pruning-sparsity
status: published
provenance: imported
scenario: Your AI writing assistant app downloads a 180 MB language model on first launch. Analytics show
  40% of users in India and Southeast Asia never complete the download — the app shows a perpetual 'Preparing
  AI...' spinner. These users are on 4G connections. Users in the US and Europe download fine. The model
  server is hosted in us-east-1. What's going wrong and how do you fix it?
details:
  realistic_solution: '180 MB at 5 Mbps on Indian 4G takes 288 sec. With 15% drop rate/min, survival probability:
    (0.85)^4.8 = 45%. Fix: (1) Chunk into 5 MB segments with resume (per-chunk drop: 2%, near-100% completion).
    (2) Quantize to INT4 (45 MB, 72 sec, ~82% success as monolithic). (3) Regional CDN in Mumbai/Singapore.
    (4) 5 MB lite model for immediate use while full model downloads. Never design >50 MB monolithic downloads
    for emerging markets.'
  common_mistake: '"Add a CDN edge node in Asia." A CDN helps latency but doesn''t solve the core problem
    — the download is too large for unreliable mobile connections in these regions.'
  napkin_math: '180 MB at 5 Mbps effective (0.625 MB/s): 288 sec (4.8 min). Connection drop probability
    per minute on Indian 4G: ~15%. Probability of surviving 4.8 minutes: (0.85)^4.8 ≈ 0.45 = 45% success.
    With 5 MB chunks: per-chunk time = 8 sec. Drop probability per chunk: ~2%. Total time: ~5 min with
    near-100% completion. With INT4 (45 MB): 72 sec monolithic (1.2 min), (0.85)^1.2 = ~82% success rate.
    With INT4 + chunking: 9 chunks, near 100% success.'
