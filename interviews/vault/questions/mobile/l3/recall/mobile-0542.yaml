id: mobile-0542
title: The Mobile App's Cloud Bottleneck
topic: latency-decomposition
status: published
provenance: imported
scenario: You are a Staff ML Engineer on a mobile team launching an 'AI Retouch' feature. The user's phone
  sends data to a cloud endpoint that runs a large model on a multi-GPU server, and the result is streamed
  back. The end-to-end P99 latency target is 500ms, but live measurements show it's closer to 850ms.
details:
  realistic_solution: The issue is a software implementation bug causing the data transfer to be latency-bound
    instead of bandwidth-bound. A single, efficient DMA transfer of 50MB over a PCIe Gen5 bus should be
    orders ofmagnitude faster. The observed 250ms delay can only be explained if the software is performing
    thousands of tiny, separate transfers, with each one incurring the full PCIe latency overhead.
  common_mistake: Engineers often misdiagnose the bottleneck by focusing on bandwidth saturation or blaming
    the wrong component. A common error is to assume the PCIe bus is the bottleneck and needs a hardware
    upgrade (e.g., to NVLink), without first calculating if the current hardware is being used efficiently.
    Another mistake is to be distracted by the largest number in a profile (the 400ms model execution)
    and ignore the specific problem asked about.
  napkin_math: 1. **Find the latency per transfer:** From the 'ML Latency Hierarchy' table, a single PCIe
    Gen5 transfer costs ~1,000 ns, which is 1 microsecond (1µs).
