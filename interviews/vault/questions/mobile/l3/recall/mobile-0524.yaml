id: mobile-0524
title: The Real-Time Filter Lag
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'You are a mobile ML engineer at a social media company, tasked with optimizing a new real-time
  video filter. The filter uses a custom neural network layer that is causing the app to drop frames,
  missing its 16ms per-frame budget. Your profiler isolates the problematic layer and provides the following
  data for a single inference pass on an Apple A17 Pro chip:'
details:
  realistic_solution: The layer is memory-bound. To determine the bottleneck, we must calculate the layer's
    Arithmetic Intensity (AI) and compare it to the hardware's ridge point. The AI is the ratio of compute
    operations to bytes moved. If the layer's AI is lower than the hardware's ridge point, it cannot supply
    data fast enough to keep the compute units busy, making it memory-bound.
  common_mistake: Engineers often focus only on the headline TOPS number of a mobile SoC (e.g., 35 TOPS
    for the A17 Pro) and assume any slowdown must be a compute problem. They forget that if a workload
    doesn't perform enough operations for every byte of data it fetches from memory, the powerful compute
    units will spend most of their time idle, waiting for data. This is the 'memory wall' in action.
  napkin_math: Calculate the layer's Arithmetic Intensity (AI). A custom spatial filter does 25 Ops per
    16-bit pixel (2 Bytes). AI = 25 Ops / 2 Bytes = 12.5 Ops/Byte. The mobile SoC has 35 TOPS and 50 GB/s
    bandwidth, meaning its ridge point is 35T / 50G = 700 Ops/Byte. Since 12.5 << 700, the custom layer
    is severely memory-bandwidth bound. To hit 16ms, we must fuse this layer with previous ones to keep
    data in SRAM.
