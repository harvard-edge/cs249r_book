schema_version: 1
id: mobile-fill-05088
title: Attention vs Convolution Roofline for Mobile Vision Transformer
topic: roofline-analysis
status: published
provenance: imported
scenario: EfficientViT-B1 runs on Snapdragon 8 Gen 3 (45 TOPS INT8). The model alternates between multi-scale
  attention (MSA, high compute) and lightweight FFN (memory-bound). Profiling shows MSA at 32 TOPS effective
  throughput and FFN at 8 TOPS. The device peaks at 45 TOPS. Identify why each is limited and propose
  optimizations.
details:
  realistic_solution: 'MSA at 32 TOPS (71% of 45 TOPS): MSA involves large QK^T matmuls across multiple
    scales. Q: Why not 45 TOPS? Likely causes: (1) INT8 Tensor Core tile misalignment if attention dimensions
    aren''t multiples of 8 or 16. (2) Softmax operation falls back to FP32, reducing effective INT8 throughput.
    (3) Multihead scheduling overhead. Fix: ensure head_dim is multiple of 8, use INT8 softmax approximation.
    FFN at 8 TOPS (18% of 45 TOPS): FFN is small GEMM [N_tokens × d_model × ffn_dim]. At mobile batch_size=1,
    GEMMs may be memory-bandwidth-limited. At 50 GB/s bandwidth: 8 TOPS means AI = 8T/50G = 160 FLOPs/byte.
    Snapdragon ridge: 45T/50G = 900 FLOPs/byte. FFN is deeply memory-bound. Fix: operator fusion, reduce
    FFN layer count, or use grouped convolutions.'
  common_mistake: Trying to optimize MSA and FFN with the same strategy; they have different bottlenecks
    (compute vs memory bandwidth) requiring different optimization techniques.
  napkin_math: 'Snapdragon ridge: 45 TOPS / 50 GB/s = 900 FLOPs/byte. MSA at 32 TOPS: 71% compute efficiency,
    mildly compute-bound. FFN at 8 TOPS: AI = 8/50 = 0.16 TFLOPS/TB/s = 160 FLOPs/byte << ridge → memory-bound.
    FFN needs larger batch or operator fusion to improve AI.'
