id: mobile-fill-05023
title: Batch Size 1 Optimization for Interactive LLM on Snapdragon 8 Gen 3
topic: batching-strategies
status: draft
provenance: imported
scenario: An on-device LLM assistant on Snapdragon 8 Gen 3 (45 TOPS INT8) always runs at batch_size=1
  for interactive use. The 3B INT4 model (1.5GB) decodes at 10 tok/s while the NPU is only 8% utilized.
  Explain the utilization gap and propose how to increase decode throughput.
details:
  realistic_solution: 'At batch=1 decode: each token requires loading all 1.5GB model weights once. Memory
    bandwidth becomes the bottleneck, not compute. Snapdragon 8 Gen 3 memory bandwidth: ~50 GB/s LPDDR5X.
    Token decode latency: 1.5GB / 50 GB/s = 30ms = 33 tok/s theoretical. Measured 10 tok/s suggests additional
    overhead (dequantization, scheduling). NPU at 8% utilization is expected — it''s starved waiting for
    weight loads. Solutions: (1) speculative decoding to generate multiple tokens per weight load cycle;
    (2) draft model approach to increase tokens per memory bandwidth unit; (3) reduce model size further
    to INT3 or INT2.'
  common_mistake: Increasing batch size to improve utilization; in interactive mode batch_size must remain
    1, so batch size is not the lever — memory bandwidth is the fundamental constraint.
  napkin_math: 'Model: 1.5GB INT4. Memory BW: 50 GB/s. Theoretical decode: 1.5GB/50GB/s = 30ms = 33 tok/s.
    Measured: 10 tok/s → 30% efficiency. NPU: 1.5GB × 2 FLOPs/byte / 45 TOPS = 66% utilization theoretical,
    but memory-starved → 8% actual. Memory is the bottleneck.'
