id: mobile-0432
title: The Mobile Video Filter Jank
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are a mobile ML engineer trying to optimize a new real-time video filter. The filter runs
  a novel segmentation model on the phone's camera stream. On an Apple A17 Pro, it's only achieving 20
  FPS, causing noticeable 'jank', well below the 60 FPS target. Profiling shows the model performs 800
  Giga-Ops (INT8) per frame and moves 80 MB of data per frame. The A17 Pro's ANE has 35 TOPS peak and
  51.2 GB/s memory bandwidth.
details:
  realistic_solution: The model is fundamentally **compute-bound**. The correct way to diagnose this is
    by calculating the Arithmetic Intensity (AI) and comparing it to the A17 Pro's hardware ridge point.
  common_mistake: Engineers often reflexively blame memory bandwidth on mobile, assuming it's always the
    bottleneck compared to datacenter hardware. They see 'slow performance' and think 'memory wall' without
    first calculating the workload's actual demands. They fail to check if the model can even saturate
    the memory bus before looking at compute limitations.
  napkin_math: '1. **Arithmetic Intensity:** AI = 800 × 10^9 / (80 × 10^6) = 10,000 Ops/Byte.

    2. **Ridge Point:** 35 × 10^12 / (51.2 × 10^9) ≈ 683 Ops/Byte.

    3. **Compare:** AI (10,000) >> Ridge Point (683) → model is **compute-bound**.

    4. **Compute time:** 800 GOps / 35 TOPS ≈ 22.9 ms → ~44 FPS max (explains 20 FPS with overhead).

    5. **Memory time:** 80 MB / 51.2 GB/s ≈ 1.56 ms (not the bottleneck).

    6. **Fix:** Reduce ops (prune channels, use depthwise convolutions) to get under 16.7ms/frame for
    60 FPS — need < 583 GOps.'
