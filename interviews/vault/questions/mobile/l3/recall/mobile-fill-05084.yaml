schema_version: 1
id: mobile-fill-05084
title: Mixed Precision Training Impact on Convergence for Mobile NLP Model
topic: quantization-fundamentals
status: published
provenance: imported
scenario: A mobile team trains a text classification model (BERT-base, 110M params) using mixed precision
  (FP16 forward, FP32 master weights) before quantizing for Tensor G3 deployment. During training, they
  observe NaN loss at step 1200 despite loss scaling. Diagnose the likely cause.
details:
  realistic_solution: 'FP16 max value: 65504. Gradient NaN at step 1200 suggests learning rate warmup
    phase ending or a batch with anomalous gradients. Diagnostic: (1) Check gradient norms before the
    NaN step — if norm suddenly spikes to >1000, it''s a gradient explosion. (2) Check loss scale history
    — if scale was recently increased, it may be causing overflow. Fix: (a) Reduce LR by 10×. (b) Add
    gradient clipping (max_norm=1.0) to prevent FP16 overflow. (c) Use dynamic loss scaling with ''decrease_on_overflow=True''
    with smaller initial scale (512 vs default 65536). (d) Check input data for corrupted batch (inf/nan
    in text tokenization). (e) If using gradient checkpointing, recomputed activations may accumulate
    FP16 errors. Root cause: most likely gradient explosion at LR scheduler transition — fix with gradient
    clipping.'
  common_mistake: Increasing the loss scale factor when NaNs appear; the NaN is likely from gradient overflow
    in FP16 range (max ±65504), and increasing loss scale makes it worse.
  napkin_math: 'FP16 range: ±65504. Gradient overflow: grad_norm > 65504/loss_scale. With loss_scale=512:
    grad overflows at >128 local gradient. Clipping: clip_norm=1.0 prevents any gradient from exceeding
    FP16 range when loss_scale≤65504. Fix: add torch.nn.utils.clip_grad_norm_(model.parameters(), 1.0)
    before optimizer.step().'
