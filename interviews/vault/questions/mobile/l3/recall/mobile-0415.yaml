id: mobile-0415
title: The Lagging AR Bounding Box
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are developing an object detection feature for AR glasses that overlays bounding boxes on
  objects. The camera streams at 60 FPS. To feel real-time and avoid a 'swimming' effect, the model must
  process a frame and return results before the next frame arrives. Your current model takes 22ms for
  inference on a single frame. A product manager, aiming to improve 'efficiency', suggests batching 4
  frames together to increase throughput. Using napkin math, demonstrate why this is a counter-productive
  strategy for this latency-critical application.
details:
  realistic_solution: This is a hard real-time system with a strict latency budget. The PM's suggestion
    is counter-productive because it dramatically increases the latency for each individual frame, violating
    the real-time constraint. The core problem is that single-frame inference (22ms) already misses the
    16.67ms deadline. Batching makes this worse. By waiting to assemble a batch of 4, you add a delay
    of 50ms (waiting for the next 3 frames) before inference even begins for the first frame in the batch.
    The total latency becomes heavily delayed, making the AR overlay feel extremely laggy and disconnected
    from reality. The correct engineering path is to reject batching and focus entirely on optimizing
    the single-frame inference time to get it under 16.67ms through methods like quantization, pruning,
    or architectural changes.
  common_mistake: Applying cloud-based intuition (where batching increases throughput and is almost always
    good) to a latency-critical edge application. Engineers might correctly calculate the improved TOPS
    of a batched request but fail to account for the added 'assembly' latency waiting for the batch to
    fill, which is fatal for a real-time system.
  napkin_math: 1. **Calculate the Deadline:** A 60 FPS camera provides a new frame every `1000ms / 60
    FPS = 16.67ms`. This is the hard real-time deadline.
