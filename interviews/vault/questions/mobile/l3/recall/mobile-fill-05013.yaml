id: mobile-fill-05013
title: Dynamic Quantization vs Static Quantization for Transformer on Tensor G3
topic: quantization-fundamentals
status: published
provenance: imported
scenario: A Google assistant model runs on Pixel 8 with Tensor G3 (7.5 TOPS INT8 NPU). The team must choose
  between dynamic quantization (weights INT8, activations computed at runtime) and static quantization
  (both INT8 with calibrated scales). The model has diverse activation distributions across different
  input types (short vs long queries).
details:
  realistic_solution: 'Dynamic quantization: compute activation scales per tensor at runtime — adds ~5-10%
    overhead vs pure INT8, but handles distribution shifts. Static quantization: fixed scales from calibration
    dataset — 0% overhead but may clip outliers for out-of-distribution inputs. For Tensor G3''s NPU,
    static INT8 is 3-4× faster than FP16. Recommendation: use static quantization for weights always;
    for activations use dynamic per-token scaling for LLM decode (minimal overhead, correct scales) and
    static for CNN/classification (stable distributions). Expected: static = 7.5 TOPS full utilization;
    dynamic = ~6.5 TOPS due to scale computation.'
  common_mistake: Choosing static quantization without considering that variable-length sequences cause
    different activation ranges, leading to significant accuracy degradation without adaptive scaling.
  napkin_math: 'Static INT8 throughput: 7.5 TOPS. Dynamic overhead: 5-10% for scale computation → 6.75-7.1
    TOPS effective. Accuracy: static may lose 1-3% on OOD inputs; dynamic preserves accuracy. Choose based
    on input distribution variability.'
