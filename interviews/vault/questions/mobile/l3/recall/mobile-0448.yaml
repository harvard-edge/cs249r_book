id: mobile-0448
title: The Quantization Cliff
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are an ML engineer at an automotive company, tasked with deploying a driver drowsiness detection
  model on a Snapdragon-powered dashboard. To meet the 16ms per-frame budget for UI rendering, you must
  optimize your model. You've converted it from FP32 to per-tensor symmetric INT8 quantization. You used
  a 1,000-image calibration set representing typical daytime driving.
details:
  realistic_solution: The root cause is a **calibration dataset mismatch**. The scaling factor for quantization
    was calculated using only daytime images, where the maximum activation value was ~50.0. This scaling
    factor is insufficient for night-time driving, where high-contrast scenes cause activation values
    to spike to ~300.0. These large values are 'clipped' or 'saturated' at the maximum INT8 value of 127,
    destroying all feature information in that layer and causing the model to fail. The correct action
    is to create a new, more representative calibration dataset that includes diverse lighting conditions
    (day, night, dusk, tunnels, headlight glare) and then re-run the quantization process.
  common_mistake: 'Engineers often blame the model architecture, suggesting it''s ''too sensitive'' for
    INT8, or assume a hardware bug in the NPU. This overlooks the most common and simple failure mode:
    the data used for calibration did not reflect the data seen in production. The quantization parameters
    are only as good as the calibration set.'
  napkin_math: 1. **Daytime Calibration:** The provided calibration set established that the maximum absolute
    activation value for the layer was `50.0`.
