schema_version: 1
id: mobile-0463
title: The Jank-Inducing Transformer
topic: neural-architecture-search
status: published
provenance: imported
scenario: You are a mobile ML engineer at a company building a new flagship smartphone. Your team is tasked
  with implementing real-time (30 FPS) background segmentation for video calls. The previous-generation
  phone used a highly optimized, NAS-discovered MobileNetV3-style CNN and met its 16ms per-frame latency
  budget. For the new phone, which features a powerful Apple A17 Pro-class SoC, your team swaps in a more
  accurate Vision Transformer (ViT) model.
details:
  realistic_solution: The correct diagnosis is that the Vision Transformer's self-attention mechanism
    has a computational and memory access complexity of O(N^2), where N is the number of image patches.
    For video frames, N can be large, leading to a massive intermediate attention matrix (N x N) for each
    head in each layer. Creating and accessing these matrices destroys cache locality and saturates the
    SoC's memory bandwidth. The MobileNetV3 architecture, built on depthwise separable convolutions, scales
    linearly (O(N)) and has a much higher degree of memory locality. Even though the A17 Pro's NPU has
    high peak TOPS, it's being starved waiting for data from the memory subsystem, which is overwhelmed
    by the ViT's quadratic access pattern. The high memory traffic is also a primary cause of the increased
    power draw and battery drain.
  common_mistake: Engineers often fixate on raw FLOPs or parameter count. They might incorrectly assume
    that if the NPU has enough TOPS, the model should be fast. This ignores the quadratic scaling of self-attention
    and, critically, how its memory access patterns can saturate the memory bus, which is often the real
    bottleneck on mobile SoCs. Another common mistake is to suggest simple quantization without addressing
    the fundamental architectural inefficiency.
  napkin_math: '1080p = 1920×1080. ViT 16×16 patches: 120×68 = 8,160 tokens. Attention: 8160² × 2B = 133MB
    per head per layer. With 12 heads × 12 layers: 133MB × 144 = 19GB memory traffic. At 51.2 GB/s LPDDR5:
    19GB/51.2 = 371ms per frame → 2.7 FPS. MobileNetV3 depthwise conv: O(N) memory, ~100MB total traffic
    → 100MB/51.2GB/s = 2ms. 185× less memory pressure.'
