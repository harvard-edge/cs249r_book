schema_version: 1
id: mobile-cell-12114
title: 'Model Size Estimation: Realize Memory Layout Comparison Across 3 Mobile Platforms'
topic: model-size-estimation
status: published
provenance: imported
scenario: 'Compare the memory layout and TPOT for deploying a 1B INT4 LLM on three platforms: (A) A17
  Pro (8GB, 68 GB/s NE bandwidth), (B) Snapdragon 8 Gen 3 (16GB, 77 GB/s), (C) Tensor G3 (12GB, ~50 GB/s
  estimated). For each, compute: available memory after OS, KV-cache capacity at 2048 context, TPOT, and
  max concurrent users.'
details:
  realistic_solution: 'A (A17 Pro): OS 2.5GB. Model 0.5GB. KV (2048 ctx, 262KB/token): 537MB. Budget:
    8-2.5-0.5-0.537=4.46GB residual. Max users: 4.46/0.537=8.3 → 8 concurrent users. TPOT: 0.5/68=7.4ms.
    B (Snapdragon): OS 3GB. KV: 537MB. Budget: 16-3-0.5-0.537=11.96GB. Users: 11.96/0.537=22. TPOT: 0.5/77=6.5ms.
    C (Tensor G3): OS 3.5GB. Budget: 12-3.5-0.5-0.537=7.46GB. Users: 13.9. TPOT: 0.5/50=10ms. Snapdragon
    wins on concurrency; A17 Pro wins on TPOT; Tensor G3 middle ground.'
  common_mistake: Using the same OS overhead for all three platforms; iOS (2.5GB practical reserve), Android
    Snapdragon (3GB), and Android Pixel (3.5GB including Tensor G3 firmware) have different system overheads.
  napkin_math: 'KV 2048 tokens: 2048×262KB=537MB. A: avail=4.46GB, users=8.3, TPOT=7.4ms. B: avail=11.96GB,
    users=22.3, TPOT=6.5ms. C: avail=7.46GB, users=13.9, TPOT=10ms. Snapdragon leads on concurrency (22
    vs 8 users) despite higher OS overhead — raw RAM wins.'
