title: 'The Mobile NAS Showdown: CNN vs. Sparse Transformer'
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'You are a mobile ML engineer at a top social media company, tasked with optimizing a real-time
  video filter on flagship phones using the Apple A17 Pro (35 TOPS). The current model, a standard 100
  GOps ViT, misses the 16ms ''UI jank'' budget. Your Neural Architecture Search (NAS) system has proposed
  two candidates with equivalent accuracy:'
details:
  realistic_solution: Candidate A is the superior choice. Mobile NPUs like the Apple A17's Neural Engine
    are highly specialized hardware accelerators. They achieve their peak performance and power efficiency
    on dense, regular tensor operations found in CNNs, especially hardware-aware patterns like depthwise
    separable convolutions. Candidate B's MoE architecture, while reducing theoretical operations, introduces
    data-dependent control flow (the router) and sparse memory access. This breaks the deep dataflow parallelism
    the NPU is designed for, leading to pipeline stalls, cache misses, and dramatically lower sustained
    TOPS. The predictable, hardware-friendly structure of the CNN will yield much better latency and power-per-watt.
  common_mistake: Engineers often just count theoretical FLOPs or active parameters, assuming lower is
    always better. They forget that on-device performance is dominated by architectural efficiency (η_arch)—how
    well the model's compute graph maps to the NPU's fixed hardware paths. An arithmetically 'more expensive'
    model with a regular, predictable memory access pattern can easily outperform a 'cheaper' sparse model
    that suffers from routing overhead and irregular memory access.
  napkin_math: The core of the problem is calculating the effective latency for each candidate using the
    provided efficiency numbers.
