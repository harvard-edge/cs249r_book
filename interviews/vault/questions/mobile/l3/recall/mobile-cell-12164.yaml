id: mobile-cell-12164
title: 'Model Format Conversion: Realize Multi-Format Model Storage for Cross-Platform iOS+Android'
topic: model-format-conversion
status: published
provenance: imported
scenario: 'Size the total model storage footprint for a cross-platform app supporting iOS (CoreML FP16)
  and Android (TFLite INT8) for 3 models: image classifier (10M params), object detector (25M params),
  text embedding (50M params). Compute: per-platform storage, server registry storage, and CDN delivery
  cost for 50M total installs (60% iOS, 40% Android).'
details:
  realistic_solution: 'iOS FP16: (10+25+50)M × 2B = 170MB CoreML bundle. Android INT8: 85M × 1B = 85MB
    TFLite. Server registry: 170+85+85MB(ONNX source) = 340MB. CDN: iOS 30M users × 170MB = 5.1PB. Android
    20M × 85MB = 1.7PB. Total: 6.8PB × $0.045/GB = $306,000 per full rollout. With delta updates (assume
    20MB avg change): iOS 30M × 20MB + Android 20M × 10MB = 0.8PB → $36,000. Delta saves $270K per update
    cycle.'
  common_mistake: Computing storage for 6 format variants (3 models × 2 platforms) without noting that
    iOS and Android can share the ONNX source and only the compiled outputs differ.
  napkin_math: 'iOS: 85M × 2B = 170MB. Android: 85M × 1B = 85MB. CDN full rollout: 30M×170MB + 20M×85MB
    = 5100+1700=6800TB = 6.8PB. At $0.045/GB: 6800×1000×$0.045=$306,000. Delta (20MB avg): 30M×20MB +
    20M×10MB = 800TB = $36,000. Delta saves $270K/release cycle.'
