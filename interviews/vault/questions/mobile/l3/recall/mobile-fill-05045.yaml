id: mobile-fill-05045
title: Thermal Aware Inference Scheduling on iPhone During Photo Processing
topic: thermal-management
status: published
provenance: imported
scenario: An iPhone 15 Pro (A17 Pro) runs Neural Engine at 35 TOPS during video capture (camera ISP +
  scene understanding). The device reaches thermal state 2 (1 of 4 Apple thermal states) after 15 minutes
  of 4K30 video + ML processing. The OS throttles Neural Engine to 60% throughput. A photo organization
  app launches and needs 5s of intensive ML inference. Analyze the scheduling strategy.
details:
  realistic_solution: 'Thermal state 2: NE at 60% = 21 TOPS effective. Camera+scene understanding: ~10
    TOPS. Available for photo app: 21-10 = 11 TOPS. Photo ML task: set QoS=.userInitiated for active processing.
    iOS will preempt background NE tasks. At 11 TOPS for 5 seconds: 11T × 5 = 55T operations = can process
    ~550,000 high-res photos at 100M FLOPs each. Strategy: (1) Mark inference task as .background during
    camera active → iOS defers. (2) Detect camera session end → promote to .userInitiated → full remaining
    NE budget. (3) Use Core ML task priority API to yield NE when thermal pressure increases. If user
    explicitly opens photo app, iOS elevates it — camera ISP gets hardware lane, NE available for app.'
  common_mistake: Assuming all ML workloads compete equally for Neural Engine resources; iOS uses QoS
    classes and thermal state awareness to prioritize user-interactive tasks over background processing.
  napkin_math: 'NE at thermal 2: 35×0.6 = 21 TOPS. Camera ML: ~10 TOPS. App budget: 11 TOPS. 5s × 11T
    = 55T ops. Photo at 100M FLOPs: 550,000 photos in 5 seconds (55 × 10¹² ops / 10¸ FLOPs/photo = 550,000).
    If full NE available (camera off): 35 TOPS × 5s = 175T ops = 1750 photos.'
