schema_version: 1
id: mobile-cell-13201
title: 'Mobile Transformer Cost Fluency: Quick LLM Sizing for Mobile'
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'From memory, estimate: (1) max LLM size at INT4 that fits in A17 Pro 8GB (2GB OS overhead),
  (2) decode tokens/second for a 3B INT4 model on A17 (100GB/s memory bandwidth), (3) total FLOPs for
  prefilling 1024 tokens for a 3B model. State whether each workload is compute or memory bound on A17
  Pro''s 35 TOPS Neural Engine.'
details:
  realistic_solution: '(1) Max INT4 model: (8GB-2GB)/0.5bytes/param = 6GB/0.5=12B params. Safely run 12B
    INT4 model (with minimal KV cache). (2) 3B INT4: 1.5GB. Decode: 1.5GB/100GB/s=15ms/token=67 tok/s.
    Latency: 15ms/tok. (3) Prefill 1024 tokens, 3B model: FLOPs = 2*3B*1024=6.14B FLOPs (2N*seq approximation).
    Time (compute): 6.14B/35T=0.176ms. Check bandwidth: weights=1.5GB, activations~1GB=2.5GB. Time (BW):
    2.5GB/100GB/s=25ms. BW-bound for prefill too (at batch=1). Actual prefill time ≈ 25ms. Compute would
    need: 6.14B/(25ms*35T)=0.007% utilization — massively underutilized in compute.'
  common_mistake: Not applying the rule that max model size (INT4) = available_RAM_bytes * 2 (since INT4
    = 0.5 bytes/param), giving 2x the params vs INT8.
  napkin_math: '(1) (8-2)GB / 0.5B/param = 12B params INT4. Or 6B params INT8. Or 3B params FP16. (2)
    1.5GB/100GB/s=0.015s=15ms/tok=66.7 tok/s. (3) Prefill: FLOPs=2*3B*1024=6.14B. Compute time: 6.14B/35T=0.176ms.
    BW time: weights(1.5GB)+activations(~1GB)=2.5GB/100GB/s=25ms. BW-bound. Prefill at 25ms. Rule of thumb:
    on mobile: prefill and decode are BOTH memory-bandwidth-bound for realistic model+sequence sizes.
    TOPS matters only when batch>>1 (never in practice for mobile). Key facts to memorize: A17 100GB/s,
    Snap 8G3 77GB/s, Tensor G3 ~68GB/s.'
