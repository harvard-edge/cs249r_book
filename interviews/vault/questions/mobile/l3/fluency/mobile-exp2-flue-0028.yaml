id: mobile-exp2-flue-0028
title: Tensor G3 Gemini Nano Prefill Latency
topic: compute-cost-estimation
status: published
provenance: imported
scenario: You are tasked with deploying a 1.5 billion parameter version of Gemini Nano on a Pixel device
  powered by the Google Tensor G3. The G3 features an on-device TPU rated at 7.5 TOPS and 12 GB of LPDDR5X
  memory. To assess the initial user experience, you need to estimate the theoretical minimum compute
  time required to process a user's 500-token input prompt (the prefill phase). Assuming INT8 operations
  and temporarily ignoring memory bandwidth constraints, calculate the pure compute latency.
details:
  realistic_solution: To find the compute-bound latency, calculate the total operations required for the
    prefill phase using the standard heuristic of 2 operations per parameter per token. Multiply this
    by the prompt length to get the total operations for the sequence. Finally, divide by the Tensor G3
    TPU's peak compute capacity (7.5 TOPS) to determine the theoretical minimum compute time.
  common_mistake: Candidates often forget the factor of 2 in the operations per token formula (1 multiply
    and 1 accumulate per weight). They may also incorrectly mix up GigaOPs and TeraOPs, or mistakenly
    try to apply memory bandwidth constraints to a question specifically asking for a compute-bound estimate.
  napkin_math: '1. Recall the operations formula: Total Ops = 2 * Parameters * Tokens.

    2. Calculate Ops for 1 token: 2 * 1.5 billion parameters = 3 GigaOPs.

    3. Calculate total Ops for 500 tokens: 3 GigaOPs * 500 = 1,500 GigaOPs = 1.5 TeraOPs (TOPs).

    4. Apply Tensor G3 TPU specs: Compute Capacity = 7.5 TOPS.

    5. Calculate compute latency: 1.5 TOPs / 7.5 TOPS/s = 0.2 seconds = 200 milliseconds.'
