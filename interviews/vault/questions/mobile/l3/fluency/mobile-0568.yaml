title: The Fleet-Wide TCO Dilemma
topic: federated-learning
status: published
provenance: imported
scenario: 'You are an ML engineer at a car-sharing company with 2 million users. Your team wants to ship
  a new personalization feature that pre-warms the car''s cabin. The feature can be trained in two ways:'
details:
  realistic_solution: The correct approach is to calculate the Total Cost of Ownership (TCO) for both
    options, including compute, data, and the crucial engineering operations cost.
  common_mistake: 'Engineers often focus only on the most visible costs: cloud compute and data transfer.
    They might incorrectly assume that since the federated model updates are larger than the daily logs
    (500KB vs 10KB), FL must be more expensive on data transfer. Most importantly, they completely ignore
    the dominant cost in any TCO calculation: engineering salaries and operational overhead required to
    maintain a complex, novel system like Federated Learning.'
  napkin_math: '### Centralized TCO | 1.  **Data Transfer:** | Daily: `2,000,000 users * 10 KB/user =
    20,000,000 KB = 20 GB` | Annually: `20 GB/day * 365 days = 7,300 GB` | Cost: `7,300 GB * $0.09/GB
    = $657` | 2.  **Compute:** ` $4/day * 365 days = $1,460` | 3.  **Ops:** `$20,000` | 4.  **Total:**
    `$657 + $1,460 + $20,000 = $22,117`'
