id: mobile-exp2-flue-0055
title: A17 Pro KV-Cache Memory Budgeting
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are deploying a 2 billion parameter transformer model for text summarization on the Apple
  A17 Pro Neural Engine. While the A17 Pro features 8 GB of shared unified memory, the OS restricts your
  app to a strict 3 GB memory budget. The model weights are quantized to 8-bit (1 byte per parameter),
  but the KV-cache remains in 16-bit precision (2 bytes). Assuming the model has 32 layers and a hidden
  dimension of 2048, calculate the total memory required for the weights and the KV-cache for a single
  sequence of 1000 tokens to determine if it fits within the budget.
details:
  realistic_solution: The candidate must recall the memory formulas for both model parameters and the
    KV-cache. They should establish the base weight memory first, then calculate the per-token KV-cache
    footprint (2 * layers * hidden_dim * bytes_per_element), and finally scale it by the sequence length
    to verify against the A17 Pro's memory constraint.
  common_mistake: Candidates often forget the factor of 2 for storing both Keys and Values in the cache,
    or they fail to account for the 2-byte precision of the KV-cache when the weights are 8-bit. Another
    common error is mixing up GB (10^9) and GiB (2^30) during quick mental math, though rough approximations
    are usually acceptable.
  napkin_math: '1. Weight Memory: 2 billion parameters * 1 byte (8-bit) = 2 GB. 2. KV-Cache per token:
    2 (K+V) * 32 layers * 2048 hidden dim * 2 bytes (16-bit) = 262,144 bytes (~262 KB). 3. Total KV-Cache
    (1000 tokens): 262,144 bytes * 1000 = ~262 MB. 4. Total Memory: 2 GB + 262 MB = 2.262 GB. This is
    well under the 3 GB budget, successfully operating within the A17 Pro''s 8 GB shared unified memory.'
