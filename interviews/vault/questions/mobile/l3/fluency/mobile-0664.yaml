schema_version: 1
id: mobile-0664
title: The Mobile LLM KV-Cache Squeeze
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You're running a 3B parameter LLM (Phi-3-mini, INT4) on an iPhone 15 Pro with 8 GB RAM. The
  model weights take 1.5 GB. Short conversations work fine, but after 10+ back-and-forth turns, the app
  gets killed by iOS. The model weights haven't changed. What's growing?
details:
  realistic_solution: 'The KV-cache. During autoregressive generation, the model stores key and value
    tensors for every token in the conversation history. For Phi-3-mini (32 layers, 32 heads, head_dim=96,
    FP16 KV): KV-cache per token = 2 × 32 × 32 × 96 × 2 bytes = 393 KB. After 10 turns (~2000 tokens):
    2000 × 393 KB = **786 MB**. Add model weights (1.5 GB), iOS overhead (~3 GB), and app runtime (~200
    MB): total = 5.5 GB. iOS jetsam threshold is ~6 GB for foreground apps. By turn 15 (~3000 tokens):
    KV-cache = 1.15 GB, total = 5.85 GB — jetsam kills the app.'
  common_mistake: '"There''s a memory leak in the inference engine." The memory growth is by design, not
    a bug.'
  napkin_math: 'Phi-3-mini KV cache: 32 layers, 32 heads, dim 96. Each token = 2 * 32 * 32 * 96 * 2B =
    393KB. At 3000 tokens, KV cache = 1.15GB! iPhone 15 Pro (8GB RAM): iOS takes 3GB, model weights 1.5GB,
    app 0.5GB. With 1.15GB KV cache, total is 6.15GB, crossing the ~6GB iOS Jetsam limit. It OOMs strictly
    from KV growth.'
