id: mobile-0526
title: The Keyboard Jank Crisis
topic: neural-architecture-search
status: published
provenance: imported
scenario: You are a Mobile ML Engineer building a real-time 'smart reply' feature for a keyboard app.
  Your prototype, a 50M parameter Transformer model, is accurate but misses performance targets on a flagship
  phone (Snapdragon 8 Gen 3). It takes 45ms per inference and uses 150MB of memory (100MB for FP16 weights,
  50MB for activations/KV cache), causing noticeable UI jank and violating the strict 100MB feature memory
  budget. Your task is to diagnose the bottleneck and solve the problem by selecting the most promising
  architectural path forward.
details:
  realistic_solution: The core problem is the Transformer's architectural unfriendliness to mobile NPUs
    at a batch size of 1. It is severely memory-bandwidth bound. To solve this, applying 4-bit quantization
    reduces the weight footprint from 100MB to 25MB, bringing the total memory to 75MB (within budget)
    and massively reducing the DRAM traffic per token, which drastically reduces latency.
  common_mistake: Engineers often fixate on a single metric like parameter count or total FLOPs, assuming
    that scaling a model down (e.g., halving the parameters) will proportionally reduce latency. On mobile
    hardware, real-world latency is often dominated by memory bandwidth bottlenecks and the fixed overhead
    of dispatching many small, sequential operations. A 50% smaller Transformer might still be 80% as
    slow because it has the same number of layers and activation functions, which are costly from a memory
    access and dispatch perspective.
  napkin_math: Let's diagnose the bottleneck. A Snapdragon 8 Gen 3 has ~45 TOPS (INT8) and ~77 GB/s memory
    bandwidth. 50M params * 2 bytes = 100MB. At 77 GB/s, reading weights takes 100MB / 77GB/s = 1.3ms.
    But Transformers are severely memory-bandwidth bound at batch=1. Applying 4-bit INT4 quantization
    reduces weight memory to 25MB and speeds up memory reading by 4x, solving both the strict memory budget
    and the bandwidth bottleneck.
