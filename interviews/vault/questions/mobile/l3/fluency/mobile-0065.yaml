schema_version: 1
id: mobile-0065
title: The Model Warm-up on Mobile
topic: latency-decomposition
status: published
provenance: imported
scenario: 'You benchmark your CoreML model on an iPhone 15 Pro and measure 8ms inference latency. But
  in production, users report the first photo takes 2 seconds to process after opening the app. Subsequent
  photos are fast. Your QA team confirms: first inference is consistently 100-250× slower than steady-state.
  What''s happening during that first inference, and how do you budget for it?'
details:
  realistic_solution: 'First inference triggers one-time costs: CoreML compilation to ANE microcode (~800ms),
    ANE wake (~200ms), memory allocation + page faults (~250ms), framework init (~150ms). Total: ~1,500ms
    vs 8ms steady-state (187x slower). Fix: trigger a dummy inference during splash screen. User-perceived
    first real inference: 8ms. Cache compiled .mlmodelc for subsequent launches. Cost: 1.5s added to launch,
    hidden behind splash animation.'
  common_mistake: '"The model file is loading from disk — use a smaller model." Disk I/O is only a fraction
    of the warm-up cost. The real overhead is compilation and hardware initialization.'
  napkin_math: 'Cold first inference: compilation (800ms) + ANE wake (200ms) + allocation (100ms) + page
    faults for 200 MB model (250ms) + framework init (150ms) = **~1500ms**. Warm steady-state: 8ms. Ratio:
    1500 / 8 = **187×** slower. Warm-up strategy: dummy inference during splash screen. User-perceived
    first inference: 8ms. Cost: 1.5s added to app launch (hidden behind splash).'
