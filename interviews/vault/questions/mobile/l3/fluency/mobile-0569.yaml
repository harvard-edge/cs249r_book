title: The Federated Fleet TCO Dilemma
topic: federated-learning
status: published
provenance: imported
scenario: 'You are an ML Systems Engineer at a major automotive company. Your team is launching a ''Driver
  Alertness'' feature in the companion mobile app for a fleet of 1 million users. The feature uses the
  phone''s camera to analyze driver fatigue. The team is debating two architectures:'
details:
  realistic_solution: The correct answer is that the Decentralized (Federated Learning) approach has a
    dramatically lower TCO in the first year. While the $1.25M upfront engineering cost seems high, it's
    dwarfed by the recurring operational expenses of the Centralized approach.
  common_mistake: Engineers often focus on a single cost driver, like the high initial engineering investment
    for FL or the per-hour cost of a GPU, while ignoring second-order effects like data transfer costs
    at scale. They might incorrectly conclude that FL is too expensive upfront or that centralized inference
    is cheap on a per-unit basis, failing to multiply by the massive user volume.
  napkin_math: '### 1. Centralized TCO Calculation:

    - **Cloud GPU**: 1M users × 1000 inferences/day × 5ms/inference = 5,000,000 GPU-seconds/day.

    - At A100 on-demand ($3.50/hr): 5,000,000s / 3600 = 1388 GPU-hours/day × $3.50 = **$4,858/day**.

    - **Data egress**: 1M users × 1 frame/inference × 1000 inferences × 100 KB = 100,000 GB/day.

    - At $0.09/GB: 100,000 GB × $0.09 = **$9,000/day**.

    - **Annual centralized cost**: ($4,858 + $9,000) × 365 = **~$5.06M/year**.


    ### 2. Decentralized (FL) TCO Calculation:

    - **Upfront engineering**: $1.25M (one-time).

    - **On-device compute**: Model runs on phone NPU. Battery cost is negligible.

    - **Aggregation server**: Gradient uploads of ~5 KB per user per round, weekly rounds. 1M × 5 KB =
    5 GB/round. Server cost: ~$200/month = **$2,400/year**.

    - **Annual FL cost (Year 1)**: $1.25M + $2,400 = **~$1,252,400**.


    ### 3. Break-even:

    - Year 1: Decentralized wins ($1.25M vs $5.06M).

    - At continuous monitoring scale, centralized data transfer scales linearly with usage, making FL
    drastically cheaper.'
