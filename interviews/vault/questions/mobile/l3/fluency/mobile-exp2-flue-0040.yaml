id: mobile-exp2-flue-0040
title: A17 Pro NPU Distillation Throughput
topic: knowledge-distillation
status: published
provenance: imported
scenario: You are deploying a distilled student model for real-time inference on the Apple A17 Pro Neural
  Engine. The 16-core NPU provides a theoretical peak of 35 TOPS at roughly 5W, drawing from a shared
  8 GB unified memory. If the distilled model requires 0.5 GOPS per inference and achieves a realistic
  60% compute utilization on this hardware, calculate the maximum achievable inferences per second (IPS)
  and the estimated energy cost per inference.
details:
  realistic_solution: The correct approach scales the theoretical peak TOPS by the expected hardware utilization
    to find the effective compute throughput. Dividing this effective throughput by the per-inference
    compute cost yields the realistic inferences per second. The energy per inference is the continuous
    power draw divided by this throughput.
  common_mistake: Candidates often assume 100% compute utilization of the 35 TOPS, failing to account
    for memory access overhead or sub-optimal scheduling on the 16 cores. They also frequently botch the
    unit conversions between TOPS and GOPS.
  napkin_math: '1. Peak Compute: 35 TOPS = 35,000 GOPS.

    2. Effective Compute (60% utilization): 35,000 * 0.6 = 21,000 GOPS.

    3. Throughput: 21,000 GOPS / 0.5 GOPS/inference = 42,000 inferences/second.

    4. Energy per inference: 5 Watts (Joules/sec) / 42,000 inferences/sec = 0.000119 Joules = 0.119 mJ.'
