schema_version: 1
id: mobile-0717
title: The Delegation Lottery
topic: accelerator-comparison
status: published
provenance: imported
scenario: Your team ships an image classification model on Android using TFLite. On a Snapdragon 8 Gen
  3 device, inference takes 4ms. A colleague adds a single custom post-processing op written as a TFLite
  Flex delegate. Inference jumps to 38ms. What happened?
details:
  realistic_solution: NPU delegation is all-or-nothing *per subgraph*. When TFLite encounters an op the
    NPU (Hexagon/QNN) delegate doesn't support, it partitions the graph. The supported prefix runs on
    the NPU, then the intermediate tensor is copied back to CPU RAM for the unsupported op, and any remaining
    ops may not return to the NPU. The cost isn't the op — it's the round-trip data transfer across the
    on-chip NoC and the loss of NPU graph fusion. One incompatible op can shatter an otherwise fully-accelerated
    graph into three segments with two expensive hand-offs.
  common_mistake: '"The custom op is computationally expensive." The op itself is trivial — a simple argmax
    over 1000 classes.'
  napkin_math: 'NPU inference for MobileNetV2: ~4ms. CPU fallback for the same model: ~35ms. The single
    Flex op takes <0.1ms, but it forces a NPU→CPU→(no return) partition. You pay nearly the full CPU cost
    for the tail of the graph plus ~3ms in tensor transfer overhead.'
