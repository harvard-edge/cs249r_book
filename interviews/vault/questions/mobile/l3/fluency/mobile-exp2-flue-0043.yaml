id: mobile-exp2-flue-0043
title: NPU Shared Memory Batching Limit
topic: memory-pressure-management
status: published
provenance: imported
scenario: You are optimizing a real-time video processing pipeline on the Qualcomm Hexagon NPU (Snapdragon
  8 Gen 3). The system utilizes the heterogeneous CPU+GPU+NPU architecture and has 16 GB of shared LPDDR5X
  memory. The OS and GPU buffers lock 10 GB of RAM. Your INT8 quantized model, which leverages the NPU's
  45 TOPS compute, is 3 GB in size. Each frame in the batch requires 250 MB for intermediate activations.
  Calculate the maximum batch size you can safely process in a single pass before triggering OS-level
  memory eviction.
details:
  realistic_solution: Calculate the strict memory ceiling by subtracting the OS/GPU locked memory and
    the model's static weight memory from the total shared LPDDR5X RAM. Divide the remaining memory by
    the per-frame activation footprint. To avoid OOM, cap the batch size at the resulting integer and
    process larger video chunks sequentially.
  common_mistake: Candidates often ignore the heterogeneous shared memory model, assuming the NPU has
    its own dedicated VRAM. They may also fail to subtract the static model weight size from the available
    system memory before calculating activation capacity.
  napkin_math: Total Shared Memory = 16 GB (16,384 MB). Locked Memory (OS + GPU) = 10 GB (10,240 MB).
    Model Weights = 3 GB (3,072 MB). Available Memory for Activations = 16 GB - 10 GB - 3 GB = 3 GB (3,072
    MB). Max Batch Size = 3,072 MB / 250 MB per frame = 12.288. Maximum safe batch size is 12 frames.
