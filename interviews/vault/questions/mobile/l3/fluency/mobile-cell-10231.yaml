id: mobile-cell-10231
title: Explaining Compound AI Pipeline Stages to a Mobile App Developer on A17 Pro
topic: compound-ai-systems
status: published
provenance: imported
scenario: 'An iOS developer building their first on-device AI feature on A17 Pro (8GB, 35 TOPS) asks:
  ''My app uses Core ML for image recognition and a language model for descriptions. Why do I need a retrieval
  step? Can''t I just give the image features directly to the LLM?'' Explain why the retrieval stage exists
  in compound AI pipelines and what problem it solves on memory-constrained mobile devices.'
details:
  realistic_solution: 'The retrieval step solves the knowledge-memory tradeoff: a 1B LLM on A17 Pro (500MB
    INT4) ''knows'' general facts from training but cannot store app-specific knowledge (product catalog,
    user history, local data) in its weights — that would require a much larger model. Retrieval gives
    the LLM access to a dynamic, updatable knowledge base (10K docs = 150MB as text) without re-training.
    Without retrieval: need a 7B+ model to have equivalent factual coverage, which at INT4 = 3.5GB — more
    than the whole app memory budget. With retrieval: 1B model + 150MB knowledge base = 650MB total, and
    the knowledge can be updated without model retraining.'
  common_mistake: Explaining RAG as just 'giving the LLM more information' without explaining the fundamental
    memory vs knowledge tradeoff. The developer needs to understand why on-device LLMs can't just have
    larger context windows, and why retrieval is a memory-efficient alternative to larger models.
  napkin_math: 'Without RAG: 7B model INT4 = 7B * 0.5 bytes = 3.5GB. With RAG: 1B INT4 (500MB) + 10K docs
    (150MB) + FAISS index (10MB) = 660MB. Memory savings: 3.5GB vs 0.66GB = 5.3x more memory efficient.
    Quality: 1B with RAG on domain-specific queries ≈ 7B without RAG (retrieval substitutes for parametric
    knowledge). A17 Pro can run 660MB system within app memory budget; 3.5GB model would consume 43% of
    total 8GB RAM, risking iOS memory pressure kills.'
