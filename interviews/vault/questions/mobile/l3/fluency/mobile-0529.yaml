schema_version: 1
id: mobile-0529
title: The Cross-Country Trip on a City Bus
topic: collective-communication
status: published
provenance: imported
scenario: You are the Staff ML Engineer on a mobile team building a real-time translation app. The app
  streams audio to a cloud-hosted ASR+LLM pipeline. Your mobile-side profiling shows that the network
  round-trip is fast (40ms), but the server-side P99 latency is a whopping 500ms.
details:
  realistic_solution: The correct diagnosis is a severe interconnect bottleneck on the PCIe bus. Tensor
    parallelism for large models requires frequent, high-bandwidth communication (e.g., all-reduce operations)
    between GPUs for every token generated. The server's NVLink fabric is purpose-built for this, offering
    900 GB/s bandwidth. By forcing this traffic over the much slower PCIe bus, which is designed for peripheral
    I/O, the communication steps become the dominant factor in latency. The high GPU utilization is misleading;
    the GPUs are 'busy' because they are stuck in a waiting state (stalled) for data from other GPUs across
    the slow bus. This is a classic 'communication-bound' scenario, not a 'compute-bound' one. A single
    transfer can be over 100ms, which, when repeated for every token in a sequence, easily accounts for
    the 500ms P99 latency.
  common_mistake: Engineers often see 'high GPU utilization' and assume the system is compute-bound, meaning
    the GPU's processors are the bottleneck. They might also blame a more distant system component, like
    the data center network, without first analyzing the communication patterns within the server itself.
  napkin_math: Network round-trip is 40ms. If total latency is 400ms, server takes 360ms. During LLM generation
    across 4 GPUs, tensor parallelism requires all-reduce syncs per layer. If they sync a 4GB activation
    block via PCIe Gen4 (32 GB/s) instead of NVLink, transfer takes 4GB / 32 GB/s = 125ms per step. For
    just 3 tokens, that's 375ms of pure data movement! They must use NVLink (900 GB/s) to cut this to
    4.4ms.
