schema_version: 1
id: mobile-exp2-flue-0032
title: On-Device Active Learning Compute for Curation
topic: dataset-curation
status: published
provenance: imported
scenario: You are designing an on-device active learning pipeline to curate training data on a smartphone
  powered by the Google Tensor G3. To preserve privacy, you use the device's 12 GB LPDDR5X RAM and 7.5
  TOPS TPU to run a 1.5-billion-parameter on-device LLM (Gemini Nano) that calculates uncertainty scores
  for user messages, selecting the top percentile to upload for server-side human annotation. If a user
  receives 50,000 messages per day, with an average length of 50 tokens each, calculate the total daily
  compute time in seconds required on the TPU to score and curate this dataset.
details:
  realistic_solution: The correct approach calculates the total computational operations for the dataset
    and divides it by the TPU's compute throughput. Given the task runs offline in the background, 1,000
    seconds (approx 16.6 minutes) of compute distributed over 24 hours is a highly practical workflow
    for on-device data selection without degrading user experience.
  common_mistake: Candidates often fail to recall the standard transformer forward pass arithmetic (2
    * parameters * tokens) or erroneously throttle their calculation based on the 12 GB LPDDR5X memory
    capacity rather than the 7.5 TOPS compute throughput limit for active learning batch processing.
  napkin_math: 1. Total tokens per day = 50,000 messages * 50 tokens/message = 2,500,000 tokens. 2. Compute
    per token for a forward pass = 2 * 1.5 billion parameters = 3 billion operations (3 GigaOPs). 3. Total
    daily compute = 2,500,000 tokens * 3 GigaOPs = 7.5 * 10^15 operations = 7,500 TeraOPs. 4. Compute
    time = 7,500 TeraOPs / 7.5 TOPS (from the Google Tensor G3 TPU) = 1,000 seconds.
