schema_version: 1
id: mobile-exp2-flue-0046
title: Hexagon NPU Delegation Fallback Latency
topic: model-format-conversion
status: published
provenance: imported
scenario: 'You are converting a vision model to TFLite for deployment on the Qualcomm Hexagon NPU (Snapdragon
  8 Gen 3). The model requires a total of 4.6 GOPS per inference. Due to an operator coverage gap in the
  Hexagon delegate, the model is partitioned: 4.5 GOPS are successfully delegated to the NPU, while 0.1
  GOPS fall back to the CPU. The NPU, rated at 45 TOPS INT8, achieves 10% utilization for this workload.
  The CPU processes its portion at an effective rate of 50 GOPS. If the execution graph requires transitioning
  from NPU to CPU and back (2 transitions), with each transition incurring a 1.0 ms data synchronization
  overhead in the shared 12-16 GB LPDDR5X memory system, calculate the total inference latency.'
details:
  realistic_solution: To accurately estimate latency, you must calculate the execution time for both the
    delegated NPU partition and the CPU fallback partition independently. Since the Snapdragon 8 Gen 3
    utilizes a heterogeneous architecture, moving tensors between the NPU and CPU incurs non-trivial context
    switching and synchronization overheads, even with shared memory. Summing the compute times and transition
    penalties reveals the true bottleneck caused by incomplete operator coverage.
  common_mistake: Candidates often focus only on the NPU's massive 45 TOPS peak and calculate a sub-millisecond
    latency, forgetting that operator fallbacks force execution onto the CPU. They frequently omit the
    synchronization penalties between heterogeneous cores, underestimating how a tiny 0.1 GOPS fallback
    can dominate the overall inference time.
  napkin_math: '1. NPU Peak Compute: 45 TOPS = 45,000 GOPS.

    2. NPU Effective Compute: 45,000 GOPS * 10% utilization = 4,500 GOPS.

    3. NPU Execution Time: 4.5 GOPS / 4,500 GOPS = 0.001 seconds = 1.0 ms.

    4. CPU Execution Time: 0.1 GOPS / 50 GOPS = 0.002 seconds = 2.0 ms.

    5. Synchronization Overhead: 2 transitions * 1.0 ms/transition = 2.0 ms.

    6. Total Inference Latency: 1.0 ms (NPU) + 2.0 ms (CPU) + 2.0 ms (Sync) = 5.0 ms.'
