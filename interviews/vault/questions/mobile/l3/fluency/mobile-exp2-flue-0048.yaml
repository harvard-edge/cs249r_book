schema_version: 1
id: mobile-exp2-flue-0048
title: Parallel Schedule Energy Latency
topic: operator-scheduling
status: published
provenance: imported
scenario: You are deploying a multi-branch computational photography model on the Apple A17 Pro. The 16-core
  Neural Engine provides 35 TOPS at a peak power budget of ~5W. Your initial operator schedule executes
  branches sequentially, underutilizing the NPU. You refactor the schedule to execute independent operators
  in parallel, fully saturating the 16 cores to reach the peak 35 TOPS. If the model requires 105 Giga-operations
  (GOPs) per inference, calculate the new inference latency in milliseconds and the total energy consumed
  per inference in millijoules (mJ) under this optimized schedule.
details:
  realistic_solution: The correct approach is to first align the operation units by converting TOPS to
    GOPs per millisecond to find the inference latency. Once the latency is known, use the relationship
    that 1 Watt equals 1 Joule per second (or 1 mJ per ms) to calculate the total energy consumed during
    that inference window.
  common_mistake: Candidates often correctly calculate the latency but fail to convert power (Watts) to
    energy (Joules) over the specific time interval. They frequently mix up the unit conversions between
    Tera/Giga and Joules/millijoules.
  napkin_math: '1. Convert NPU throughput: 35 TOPS = 35,000 GOPs/second = 35 GOPs/ms.

    2. Calculate inference latency: 105 GOPs / 35 GOPs/ms = 3 ms.

    3. Convert power to energy rate: 5W = 5 Joules/second = 5 mJ/ms.

    4. Calculate total energy per inference: 3 ms * 5 mJ/ms = 15 mJ.'
