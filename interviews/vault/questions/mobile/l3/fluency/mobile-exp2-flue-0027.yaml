schema_version: 1
id: mobile-exp2-flue-0027
title: Depthwise Separable Speedup on Exynos NPU
topic: cnn-efficient-design
status: published
provenance: imported
scenario: We are porting a legacy vision model to the Samsung Exynos 2400 NPU for a real-time video processing
  app. The model currently uses a standard 3x3 convolution layer with 100 input channels, 100 output channels,
  and a 100x100 spatial resolution. The device shares 12 GB LPDDR5X across the CPU/GPU/ISP and the dual-core
  NPU. To leverage the NPU's 34.7 TOPS effectively and reduce memory bandwidth usage, we propose replacing
  this layer with a depthwise separable convolution. Calculate the total MACs (Multiply-Accumulate operations)
  for both the standard and depthwise separable layers, and estimate the execution time of the standard
  layer assuming the NPU runs at 10% utilization of its 34.7 TOPS peak (assuming 1 MAC = 2 Operations).
details:
  realistic_solution: The correct approach is to compute the MACs for the standard convolution first,
    then calculate the depthwise and pointwise MACs separately. Finally, convert the NPU's 34.7 TOPS to
    effective MACs per second at the given utilization rate to find the theoretical latency.
  common_mistake: Candidates often forget to separate the MAC calculation into depthwise (spatial filtering)
    and pointwise (channel mixing) components, or they incorrectly calculate effective MAC throughput
    from the stated TOPS by forgetting that 1 MAC equals 2 operations.
  napkin_math: '1. Standard Conv MACs: 3x3 x 100 (Cin) x 100 (Cout) x 100x100 (spatial) = 9 x 10,000 x
    10,000 = 900 MMACs.

    2. Depthwise MACs: 3x3 x 100 (Cin) x 100x100 = 9 MMACs.

    3. Pointwise MACs: 1x1 x 100 (Cin) x 100 (Cout) x 100x100 = 100 MMACs.

    4. Total DS MACs = 109 MMACs. This 8.25x computational reduction also heavily eases pressure on the
    shared 12 GB LPDDR5X memory.

    5. Exynos 2400 peak throughput: 34.7 TOPS = 17.35 Tera-MACs/sec. At 10% utilization = 1.735 TMACs/sec
    (1,735,000 MMACs/sec).

    6. Standard Conv Latency: 900 MMACs / 1,735,000 MMACs/sec ≈ 0.000518 seconds (0.52 ms).'
