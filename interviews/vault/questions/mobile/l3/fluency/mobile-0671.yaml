schema_version: 1
id: mobile-0671
title: The OOM Crash on Older iPhones
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: Your photo editing app ships a Core ML style transfer model that works perfectly on iPhone 15
  (6 GB RAM). After launch, Crashlytics shows a 12% crash rate — almost entirely on iPhone 11 and SE 3rd
  gen (4 GB RAM). The crash log shows `EXC_RESOURCE` with `MEMORY` subtype. The model file is only 28
  MB. What's causing the crash and how do you fix it?
details:
  realistic_solution: 'Model file size (28 MB) is not runtime memory. At 1080p, the style transfer model
    allocates activation tensors that peak at ~288 MB during inference. iPhone 11 (4 GB RAM) gives apps
    ~1.1 GB, but the photo editor''s baseline (camera preview, gallery cache, undo stack) already consumes
    600-800 MB, leaving only 300-500 MB headroom. The 288 MB ML peak pushes total past the jetsam limit.
    Fix: detect available memory via os_proc_available_memory(), downscale input to 540p on older devices
    (peak drops to ~91 MB), and use Core ML''s MLPredictionOptions to limit intermediate buffer sizes.'
  common_mistake: '"The model is only 28 MB, so it should fit in 4 GB RAM." Model *file* size and model
    *runtime* memory are completely different. A 28 MB weight file can require 400+ MB of resident memory
    during inference.'
  napkin_math: 'Model file: 28 MB. Peak runtime memory at 1080p: ~288 MB. At 540p: ~91 MB. iPhone 11 memory
    budget: ~2 GB total, ~1.1 GB available after OS. App baseline: 400 MB. ML headroom: 700 MB (1080p
    fits). But camera preview + gallery cache spike to 600 MB baseline → only 500 MB headroom → 288 MB
    ML fits *barely*. Add a photo filter undo stack (200 MB) and you OOM. At 540p: 91 MB ML + 600 MB app
    = 691 MB. Safe with 400 MB headroom.'
