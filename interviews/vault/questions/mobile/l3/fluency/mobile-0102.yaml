schema_version: 1
id: mobile-0102
title: The Cellular Modem Power Surprise
topic: power-budgeting
status: published
provenance: imported
scenario: Your mobile health app runs an ECG classification model on-device (Apple Watch Ultra 2, S9 SiP).
  The model itself draws negligible power — 0.5 mW for a 2ms inference every second. But when you enable
  'cloud sync' to upload classification results (50 bytes per result, once per second), the Watch's battery
  life drops from 36 hours to 18 hours. You're uploading 50 bytes per second — how can that halve battery
  life?
details:
  realistic_solution: 'Cellular radios have discrete power states: Idle (0 mW), DRX (100 mW), Active TX
    (800 mW). Sending 50 bytes/sec keeps the radio in Active mode continuously (tail timer never expires
    between 1s transmissions). Radio draws 1,600x more power than inference. Fix: batch and transmit every
    5-15 min. At 5-min batching: 0.67% radio duty cycle = 7.4 mW avg. Battery impact: 50% -> 8%. Data
    volume is irrelevant — radio power state transitions are the problem.'
  common_mistake: '"50 bytes/second is negligible bandwidth — the cellular modem should barely notice."
    The data volume is irrelevant — the modem''s power state transitions are the problem.'
  napkin_math: 'Continuous sync: modem at 800 mW × 24h = 19.2 Wh/day. Battery: 2.17 Wh. Modem alone drains
    battery in 2.7 hours. Batched (5-min intervals): modem at 7.4 mW × 24h = 0.18 Wh/day. Battery life
    impact: 0.18 / 2.17 = 8% of battery — acceptable. Batched (15-min intervals): modem at 2.8 mW × 24h
    = 0.067 Wh/day = 3% of battery. **The ML model uses 0.5 mW. The naive sync strategy uses 800 mW. The
    radio draws 1,600× more power than the inference.**'
