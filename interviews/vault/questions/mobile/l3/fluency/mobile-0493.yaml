id: mobile-0493
title: The Mobile ViT Deadline Miss
topic: neural-architecture-search
status: published
provenance: imported
scenario: 'You are an ML systems engineer at a major smartphone company, tasked with optimizing a new
  real-time video bokeh effect. The feature must run at 30 FPS (a 33ms budget per frame) on an Apple A17
  Pro, which has a 35 TOPS neural engine and 51.2 GB/s of memory bandwidth. The research team provides
  two models with similar accuracy and total FLOPs (~10 G-FLOPs):'
details:
  realistic_solution: The problem is not the amount of computation, but the cost of data movement. The
    Micro-ViT's self-attention mechanism is memory-bandwidth bound. This is because self-attention has
    low data locality and a low Arithmetic Intensity (AI), meaning the ratio of compute to memory access
    is poor. On a mobile SoC like the A17 Pro, which has powerful compute but relatively constrained memory
    bandwidth, an operation with low AI will spend most of its time waiting for data to be fetched from
    main memory, causing the compute units to stall. The CNN's convolutional structure has much better
    data locality, leading to better cache utilization and less pressure on main memory bandwidth.
  common_mistake: Engineers often assume that if two models have the same FLOPs, they should have similar
    performance. They might incorrectly blame the FLOPs themselves being 'more complex' or guess there's
    a software issue like CPU fallback, without analyzing how the model architecture interacts with the
    hardware's memory system.
  napkin_math: 1.  **Define the Bottleneck:** The huge gap between theoretical compute time (~0.3ms) and
    real-world latency (55ms) proves this is not a compute-bound problem. The bottleneck is data movement
    (i.e., memory bandwidth).
