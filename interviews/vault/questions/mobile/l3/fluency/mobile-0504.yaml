id: mobile-0504
title: 'The Sluggish Smart Reply: Real-Time Deadlines'
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'You are a mobile ML engineer optimizing a new on-device ''smart reply'' feature powered by
  a 2B parameter LLM. The app feels sluggish. Profiling shows that once generation starts, each subsequent
  token takes ~80ms (Time Per Output Token), which meets the design spec. However, the time to the *first*
  token (TTFT) is frequently over 300ms, missing the critical 100ms UI ''jank'' budget. Your system currently
  uses a simple batching strategy: it collects up to 4 user requests (e.g., from new keystrokes) before
  sending them to the NPU for a single inference pass. A new request arrives from the user roughly every
  500ms. Given this data, what is the most likely cause of the high Time-To-First-Token?'
details:
  realistic_solution: The static batching policy is the bottleneck. Waiting to form a batch of 4 introduces
    a significant 'head-of-line blocking' delay for the first request in the batch. The system should
    be changed to prioritize TTFT. The best approach is to implement a dynamic or 'continuous' batching
    strategy. For example, the system could enforce a maximum wait time (e.g., 20ms). After 20ms, it dispatches
    whatever requests are in the queue, even if it's just a single request. This trades off theoretical
    throughput (larger batches are more efficient) for much lower user-perceived latency, which is critical
    for a real-time UI feature.
  common_mistake: Engineers often focus exclusively on the model's inference time (TPOT) and assume any
    latency problem must be due to the model being too slow or the hardware being underpowered. They forget
    that the scheduling and batching strategy can introduce queueing delays that are orders of magnitude
    larger than the inference time itself, dominating the user-perceived latency.
  napkin_math: The core issue is queuing delay, not inference time. The P99 deadline is 100ms.
