title: The Predictive Charging TCO Dilemma
topic: federated-learning
status: published
provenance: imported
scenario: You are the ML Systems Engineer for a new 'Predictive Charging' feature in your company's EV
  companion app, which has 1 million users. The feature learns driving habits from on-device sensors to
  recommend optimal charging times. The product team has major privacy concerns about uploading raw user
  data.
details:
  realistic_solution: The correct way to solve this is to calculate the total daily data transfer for
    each approach and multiply it over a year. The Federated Learning approach is significantly cheaper
    because even though each upload is larger, the total number of uploads is much smaller (10% of the
    user base vs. 100%). This demonstrates a scenario where a privacy-preserving technique also yields
    a significant cost saving, making it a clear win.
  common_mistake: Engineers often focus on the per-unit payload size and incorrectly conclude that the
    FL approach is 5x more expensive because the 5MB model is 5x larger than the 1MB raw data payload.
    This ignores the crucial 'participation rate' variable in the TCO calculation, a key factor in distributed
    systems economics.
  napkin_math: '### Centralized Approach Calculation:'
