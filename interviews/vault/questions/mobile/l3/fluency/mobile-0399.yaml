id: mobile-0399
title: The NCHW vs NHWC Memory Layout
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You train a PyTorch model on an NVIDIA GPU using the standard `NCHW` memory layout. You convert
  it to TFLite and deploy it on an Android phone's CPU. The model accuracy is fine, but it runs 3x slower
  than a comparable model trained natively in TensorFlow. What architectural difference between GPUs and
  mobile CPUs causes this?
details:
  realistic_solution: 'NCHW stores channels contiguously (all R, all G, all B); NHWC stores pixels contiguously
    (RGB per pixel). For 3x3 conv on CPU: NCHW requires 64 strided reads (~20 cycles each, cache misses);
    NHWC allows sequential reads (~2 cycles). 10x memory access cost makes identical arithmetic 3x slower.
    Fix: transpose to NHWC during conversion. GPU prefers NCHW; CPU/NPU prefer NHWC. Always match layout
    to target hardware.'
  common_mistake: '"TensorFlow is just better optimized for Android than PyTorch." While TFLite is native,
    the root cause is the physical layout of the bytes in memory.'
  napkin_math: A contiguous memory read on an ARM CPU might take 2 cycles. A strided memory read that
    misses the L1 cache takes ~20 cycles. For a 3x3 convolution with 64 channels, doing 64 strided reads
    instead of 1 block read makes the memory fetch 10x slower, dominating the compute time.
