id: mobile-0421
title: The Privacy Paradox TCO
topic: federated-learning
status: published
provenance: imported
scenario: 'You are a mobile ML engineer at a company building a smart keyboard. To improve suggestions,
  you''re A/B testing two approaches on a cohort of 10 million users:'
details:
  realistic_solution: The primary driver of user churn is the non-trivial battery consumption from the
    daily on-device training sessions. A 5-minute training run on a modern mobile SoC consumes a noticeable
    percentage of a phone's daily battery budget. While each individual event is small, the cumulative
    daily impact is perceptible to users, leading them to disable the feature or uninstall the app, thus
    causing churn. The cost of this churn ($250,000/month) is a direct component of the Federated Learning
    approach's Total Cost of Ownership (TCO), and in this case, it's the dominant one.
  common_mistake: Focusing only on the most obvious user-facing cost (cellular data usage) or server-side
    costs, while ignoring the second-order, but more impactful, cost of battery drain and its effect on
    user experience and behavior. Engineers often underestimate how sensitive users are to even minor,
    repeated hits to battery life from background processes.
  napkin_math: "1. **Calculate Energy per Training Run:** A mobile SoC under a heavy ML load consumes\
    \ about 4W (average of the 3W-5W range).\n   - Energy per run = 4W × 300s (5 min) = 1,200 J = 0.333\
    \ Wh\n2. **Battery impact per run:**\n   - Typical phone battery: ~15 Wh (4,000 mAh × 3.7V)\n   -\
    \ Battery percentage per training run: 0.333 Wh / 15 Wh = **2.2% per day**\n3. **User churn from battery\
    \ drain:**\n   - Assume 1% of users who notice >2% daily drain disable/uninstall the app.\n   - Affected\
    \ users: 10,000,000 × 1% = 100,000 users/month churned\n   - At an average lifetime value (LTV) of\
    \ $2.50/user: churn cost = 100,000 × $2.50 = **$250,000/month**\n4. **Network cost of FL (model updates):**\n\
    \   - Each user uploads a 5 MB gradient update daily.\n   - Total: 10M × 5 MB = 50 TB/day\n   - At\
    \ $0.01/GB: 50,000 GB × $0.01 = $500/day = **$15,000/month**\n5. **Total FL TCO:** $250,000 (churn)\
    \ + $15,000 (network) = **$265,000/month**\n\nThe churn cost from battery drain dominates the FL TCO\
    \ by ~17×, making it the primary cost driver that engineers typically overlook."
