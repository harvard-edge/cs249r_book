id: mobile-0741
title: The Launch Blocker
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: A user downloads your new LLM-powered translation app. Upon first launch, the app shows a spinner
  for 70 seconds while it prepares the model. Based on the launch timeline, why are you seeing a 95% abandonment
  rate?
details:
  realistic_solution: 'The architecture has a **Synchronous Dependency on the Critical Path**. The app
    forces users to wait for sequential download, validation, and compilation before any functionality
    is available. The fix is a **Progressive Launch Architecture**: ship a tiny fallback model (~3 MB)
    in the app bundle for instant value, while downloading and compiling the high-quality model in the
    background.'
  common_mistake: '"Show a progress bar instead of a spinner." A progress bar is better UX, but 70 seconds
    is too long regardless of visual feedback.'
  napkin_math: User attention span for a new app launch is ~2-5 seconds. A 70-second block is 14-35x longer
    than the tolerance threshold of a typical mobile user.
