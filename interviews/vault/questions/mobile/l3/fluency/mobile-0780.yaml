schema_version: 1
id: mobile-0780
title: TFLite Delegate Subgraph Partitioning Overhead
topic: latency-decomposition
status: published
provenance: imported
scenario: You are deploying a custom object detection model using TFLite on an Android phone. The model
  runs entirely on the Snapdragon CPU in 20ms. You enable the GPU delegate, which accelerates 90% of the
  model's operations (by original CPU time) by a factor of 6x. However, 4 interspersed custom operations
  are not supported by the GPU delegate, causing TFLite to partition the graph into 9 subgraphs (5 GPU,
  4 CPU). If each CPU-GPU context switch (tensor copy and synchronization) takes 2ms, what is the expected
  new end-to-end latency?
details:
  realistic_solution: The new end-to-end latency is 21ms, which is actually slower than the CPU-only baseline.
    To fix this, you must either replace the unsupported custom ops with standard GPU-supported ops, or
    move them to the very end of the model to reduce the number of subgraphs to exactly 2.
  common_mistake: Candidates correctly calculate the raw compute time reduction but forget to account
    for the memory synchronization and context switching overhead at each subgraph boundary.
  napkin_math: 'Original CPU compute = 20ms.

    GPU compute portion = 18ms / 6x speedup = 3ms.

    CPU fallback compute portion = 2ms.

    Transitions between 9 subgraphs = 8 context switches.

    Context switch overhead = 8 * 2ms = 16ms.

    Total Latency = 3ms (GPU) + 2ms (CPU) + 16ms (Overhead) = 21ms.'
