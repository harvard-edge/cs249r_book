id: mobile-0527
title: The On-Device Copilot's Janky Keyboard
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are the lead ML systems engineer for a new on-device AI assistant on a flagship smartphone
  (powered by an Apple A17 Pro). The assistant provides real-time text predictions in the keyboard. During
  testing, users complain the keyboard feels 'janky' and 'freezes,' especially when typing quickly. Your
  telemetry confirms the UI thread is frequently missing its 16ms frame deadline. The system currently
  uses a static batching strategy, collecting up to 4 requests before sending them to the NPU for processing.
  The on-device model takes, on average, 5ms to generate a single token. A typical prediction is 20 tokens
  long. The peak arrival rate of prediction requests is 10 per second. You suspect a queueing problem.
  What is the most likely cause of the UI jank?
details:
  realistic_solution: The core issue is **head-of-line blocking** caused by the static batching policy.
    When the system batches four 20-token requests, it creates a single, monolithic compute block on the
    NPU that takes 100ms to complete. If the UI thread is waiting for the first token (TTFT) from a new
    request that just missed the start of a batch, it will be blocked for the entire 100ms duration. This
    dramatically exceeds the 16ms UI frame deadline, causing the perceived 'jank' and 'freezes'. The system
    has sufficient capacity on average, but the scheduling strategy is wrong for a real-time, interactive
    workload. The correct solution is to implement continuous batching, where the system can immediately
    start processing new requests as they arrive and stream tokens back as they are generated, ensuring
    TTFT remains low and the NPU is never locked in a long, uninterruptible task.
  common_mistake: Engineers often blame the hardware's raw performance (TOPS) or focus only on the average
    latency, which can be misleading. A good average can hide a terrible tail latency (P99), and it's
    the P99 latency that kills user experience. Another common mistake is to solve the latency problem
    by sacrificing all throughput (e.g., setting batch size to 1), which makes the system inefficient.
  napkin_math: 1.  **Calculate Batch Processing Time:**
