id: mobile-cell-12107
title: 'Model Size Estimation: Fluency — Size Mobile LLM Memory in 60 Seconds'
topic: model-size-estimation
status: published
provenance: imported
scenario: 'Without reference material, in under 60 seconds: ''A 1B parameter INT4 model needs to run on
  Android (Snapdragon 8 Gen 3, 16GB). How much memory does it use and how much is left for the KV-cache?'''
details:
  realistic_solution: 'Model: 1B × 4bits/8 = 500MB. Android OS + app: ~4GB. Available: 16-4=12GB. Model:
    0.5GB. KV budget: 12-0.5=11.5GB. KV/token (1B, 32 layers, 32 KV heads, 64 dim at 1B scale): 2×32×64×2B×32=262KB.
    Pool tokens: 11.5GB/262KB=43,892 tokens. At 4096 context: 10 concurrent users! Very comfortable.'
  common_mistake: Giving only model weight size without subtracting OS overhead or adding KV-cache estimate.
  napkin_math: 'INT4 1B: 500MB. System 4GB. KV budget: 11.5GB. Per token: ~262KB (estimate for 1B scale).
    Tokens: 11.5GB/262KB=43,893. At 4096 ctx: 10.7 concurrent users ≈ 10 users. TPOT: 0.5GB/77GB/s = 6.5ms/token.
    Very fast for mobile.'
