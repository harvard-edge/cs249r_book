schema_version: 1
id: mobile-0430
title: The Cross-GPU Choke
topic: collective-communication
status: published
provenance: imported
scenario: You are a mobile ML engineer diagnosing a slow cloud-dependent 'AI Enhance' feature. End-to-end
  latency is 1.75 seconds, but on-device work and network RTT are only 150ms total. The backend service
  latency is therefore ~1.6 seconds. The backend runs on a dual H100 server, with a known total compute
  time of 1 second. The model is split across the GPUs, requiring a 32 GB activation tensor to be copied
  from GPU1 to GPU2 during execution. What is the most likely cause for the ~600ms of unaccounted-for
  latency on the server?
details:
  realistic_solution: The most likely cause is that the two GPUs are in a server that lacks an NVLink
    bridge, forcing them to communicate over the slower PCIe bus. While fast for peripherals, PCIe is
    much slower than a dedicated GPU interconnect for the massive transfers common in model parallelism.
    A 32 GB transfer that would be trivial on NVLink becomes a major bottleneck on PCIe, easily accounting
    for the observed extra latency. This is a common configuration error in budget cloud instances or
    improperly assembled servers.
  common_mistake: Engineers often underestimate the performance penalty of forcing peer-to-peer GPU communication
    over the motherboard's general-purpose PCIe bus instead of a direct, dedicated interconnect like NVLink.
    They might blame the network or memory, failing to realize the bus protocol itself is the bottleneck,
    especially for large transfers.
  napkin_math: '1. **Unaccounted latency:** 1.6s server − 1.0s compute = 0.6s for data transfer.

    2. **PCIe Gen5 x16 bandwidth:** ~64 GB/s per direction (theoretical). Effective ~50 GB/s.

    3. **Transfer time at PCIe speed:** 32 GB / 50 GB/s ≈ 0.64s ≈ 600ms. ✓ Matches observed gap.

    4. **NVLink comparison:** H100 NVLink = 900 GB/s. Transfer time: 32 GB / 900 GB/s ≈ 0.036s ≈ 36ms.

    5. **Diagnosis:** Without NVLink, the 32 GB transfer over PCIe accounts for the ~600ms gap. NVLink
    would reduce this to ~36ms (17× faster).'
