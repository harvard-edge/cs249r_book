id: mobile-exp2-flue-0050
title: Structured Pruning Latency on Hexagon NPU
topic: pruning-sparsity
status: published
provenance: imported
scenario: We are deploying a quantized INT8 vision transformer to the Qualcomm Hexagon NPU (Snapdragon
  8 Gen 3) for real-time video processing. The model requires 1.8 Tera-Operations per Second (TOPS) in
  its dense form to hit our target frame rate. To reduce power consumption and latency, we apply a 2:4
  structured sparsity pattern, which the Hexagon NPU natively accelerates. Calculate the exact NPU utilization
  percentage required for this model after pruning, given the Hexagon's peak INT8 compute capacity.
details:
  realistic_solution: The candidate should recall that 2:4 structured sparsity effectively halves the
    compute requirements for matrix multiplications on supported NPUs. By dividing the dense compute requirement
    by 2, they find the sparse compute requirement. Then, they divide this by the Hexagon NPU's peak 45
    TOPS INT8 capability to find the utilization percentage.
  common_mistake: Candidates often assume unstructured sparsity yields the same latency improvements as
    structured sparsity, ignoring hardware constraints. They also frequently forget to adjust the total
    operations based on the 2:4 sparsity ratio before dividing by the peak TOPS.
  napkin_math: '1. Dense compute requirement: 1.8 TOPS.

    2. Apply 2:4 structured sparsity reduction (50% operations removed): 1.8 TOPS / 2 = 0.9 TOPS required.

    3. Qualcomm Hexagon NPU (Snapdragon 8 Gen 3) peak INT8 performance: 45 TOPS.

    4. Calculate utilization: 0.9 TOPS / 45 TOPS = 0.02.

    5. Convert to percentage: 2% NPU utilization.'
