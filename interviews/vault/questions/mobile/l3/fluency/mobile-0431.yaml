id: mobile-0431
title: The Privacy-Aware TCO Dilemma
topic: federated-learning
status: published
provenance: imported
scenario: 'You are the ML lead for a mobile keyboard app with 10 million daily active users. The product
  team wants to improve prediction accuracy by training on user text data. They propose a standard A/B
  test: log raw keystrokes from a 1% cohort (100,000 users) to the cloud for 30 days. The privacy team
  has flagged this as a high-risk project. You need to make a quantitative argument for investing in a
  Federated Learning (FL) approach instead. Estimates: Cloud logging infrastructure costs $0.50/user/month.
  FL engineering buildout costs $250K one-time. Probability of a data breach during a 30-day centralized
  logging experiment is estimated at 0.1%. Expected cost of a breach (fines, brand damage, legal) is $50M.'
details:
  realistic_solution: 'Compare risk-adjusted TCO. For a single 30-day cloud A/B test: Infra = 100,000
    users × $0.50 = $50,000. Risk cost = 0.001 × $50M = $50,000. Total = $100,000 per experiment. The
    FL approach requires a one-time engineering investment of $250,000. By avoiding the central data collection,
    FL virtually eliminates the $50,000 risk cost per experiment. The investment breaks even after just
    a few experiments.'
  common_mistake: Engineers often focus narrowly on direct infrastructure costs (storage, compute), which
    are usually trivial for data logging at this scale. They ignore second-order economic factors like
    risk-adjusted cost, engineering time for privacy reviews, and the massive financial impact of losing
    user trust, which dominate the TCO calculation in any scenario involving sensitive user data.
  napkin_math: '1. **Cloud A/B infra cost (1 experiment):** 100K users × $0.50 = $50,000.

    2. **Cloud breach risk (1 experiment):** 0.1% × $50M = $50,000.

    3. **Cloud total TCO per experiment:** $50,000 + $50,000 = $100,000.

    4. **FL investment:** $250,000 one-time.

    5. **Breakeven:** The $250,000 FL investment pays for itself after just 2.5 experiments based on total
    TCO, or 5 experiments based on risk cost alone.'
