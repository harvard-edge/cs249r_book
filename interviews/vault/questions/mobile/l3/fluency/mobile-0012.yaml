schema_version: 1
id: mobile-0012
title: The App Size Limit
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Your model is 500 MB (FP32 weights). The App Store allows up to 200 MB for cellular downloads
  — anything larger requires WiFi. Your PM wants the app to work immediately after download, even on cellular.
  What are your options?
details:
  realistic_solution: 'Four strategies, from simplest to most complex: FP32 is 500 MB (over limit). INT8
    is 125 MB, which fits under the 200 MB cellular limit. INT4 is 62.5 MB, which also fits. A distilled
    student model could be ~50 MB. Another option is a tiny 8 MB bundled app that downloads the 500 MB
    model in the background, but this requires WiFi and breaks the immediate user experience. For a seamless
    user experience, quantizing the model to INT8 is the best trade-off — it makes the app usable immediately
    on cellular networks while maintaining near-original accuracy.'
  common_mistake: '"Compress the model file with zip." Model weights don''t compress well — they''re essentially
    random floating-point numbers. Zip might save 5-10%.'
  napkin_math: 'FP32: 500 MB (over limit). INT8: 125 MB ✓ (under 200 MB). INT4: 62.5 MB ✓. Distilled student:
    ~50 MB ✓. Bundle + background download: 8 MB initial + 500 MB on WiFi. Cellular download at 10 Mbps:
    200 MB = 160 seconds. 500 MB = 400 seconds (requires WiFi). User experience: INT8 is the best trade-off
    — immediate, no WiFi dependency, minimal accuracy loss.'
