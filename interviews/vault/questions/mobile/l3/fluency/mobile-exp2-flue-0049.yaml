id: mobile-exp2-flue-0049
title: Hexagon NPU Profiling Analysis
topic: profiling-bottleneck-analysis
status: published
provenance: imported
scenario: You are analyzing a trace of an INT8 quantized object detection model deployed on the Qualcomm
  Hexagon NPU (Snapdragon 8 Gen 3). The model architecture requires exactly 225 Giga-Operations (GOPS)
  per inference. The device features 45 TOPS of INT8 compute, a heterogeneous CPU+GPU+NPU architecture,
  and shared 12-16 GB LPDDR5X memory. Your profiler reports an actual average execution time of 15 milliseconds
  per frame. You must calculate the theoretical minimum compute latency to determine the NPU utilization
  and diagnose the primary system bottleneck.
details:
  realistic_solution: The engineer should first calculate the compute-bound theoretical minimum latency
    to establish a baseline. Upon discovering the theoretical latency is much lower than the profiled
    15ms, they should conclude the system is heavily underutilized. The next step is to use system trace
    tools to inspect the heterogeneous CPU+GPU+NPU bus traffic, specifically looking for LPDDR5X memory
    contention or CPU-to-NPU dispatch latency.
  common_mistake: Candidates often confuse MACs with Operations (1 MAC = 2 Operations), leading to a 2x
    calculation error in theoretical latency. Furthermore, they frequently assume the bottleneck is suboptimal
    NPU code rather than identifying the systemic memory bandwidth limitations inherent in shared LPDDR5X
    architectures.
  napkin_math: 'Formula: Minimum Latency = Total Operations / Peak Compute Throughput. Total Operations
    = 225 GOPS = 225 x 10^9 OPS. Peak Compute (Qualcomm Hexagon NPU) = 45 TOPS INT8 = 45 x 10^12 OPS/sec.
    Minimum Latency = (225 x 10^9) / (45 x 10^12) = 5 x 10^-3 seconds, or 5 milliseconds. Actual latency
    is 15 ms, meaning NPU utilization is only 33.3% (5ms / 15ms), indicating a severe bottleneck on the
    shared 12-16 GB LPDDR5X memory or I/O overhead.'
