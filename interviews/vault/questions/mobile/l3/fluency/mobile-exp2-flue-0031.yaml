id: mobile-exp2-flue-0031
title: On-Device Data Quality Gate Compute Budget
topic: data-quality-validation
status: published
provenance: imported
scenario: You are deploying an on-device data quality gate to filter corrupted frames before they reach
  the main vision model on a device with a Samsung Exynos 2400 NPU. The lightweight anomaly detection
  model requires 0.45 TOPS per video stream, and you must process 4 concurrent camera streams. Given the
  NPU's peak performance of 34.7 TOPS, calculate the total compute utilized by this data quality gate
  and the percentage of the NPU's total capacity consumed.
details:
  realistic_solution: The correct approach is to calculate the aggregate compute required for all concurrent
    data streams processed by the quality gate. Then, divide this aggregate compute by the total available
    NPU capacity of the Exynos 2400 to find the precise percentage of utilization, verifying that sufficient
    headroom remains for primary tasks.
  common_mistake: Candidates often forget to multiply the compute requirement by the number of concurrent
    streams, or they fail to calculate the percentage against the specific 34.7 TOPS capacity, misjudging
    the impact on the shared dual-core NPU resources.
  napkin_math: Total compute required = 0.45 TOPS/stream * 4 streams = 1.8 TOPS. Percentage of NPU capacity
    = (1.8 TOPS / 34.7 TOPS) * 100 = 5.18%. Remaining NPU capacity = 34.7 TOPS - 1.8 TOPS = 32.9 TOPS
    available for the main vision models.
