schema_version: 1
id: mobile-exp2-flue-0030
title: NPU Data Starvation and Pipelined Throughput
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are deploying a real-time computer vision pipeline on a Qualcomm Hexagon NPU (Snapdragon
  8 Gen 3). The NPU boasts 45 TOPS for INT8 operations and utilizes a unified memory architecture with
  a shared 16 GB of LPDDR5X RAM. Your quantized INT8 model requires 90 GOPS per frame. The CPU data pipeline
  (decoding, resizing, and quantizing) takes 8ms per frame to write the processed input tensor into the
  shared memory. Calculate the maximum theoretical frames per second (FPS) if the CPU and NPU operate
  sequentially, and then calculate the maximum FPS if you implement a double-buffered asynchronous data
  pipeline.
details:
  realistic_solution: The correct approach evaluates both the sequential and pipelined scenarios by comparing
    the data loading time against the compute time. By calculating the NPU compute time per frame and
    applying the pipeline throughput equation, engineers can identify that the CPU data preprocessing
    is starving the NPU. Implementing a double-buffered pipeline in the shared LPDDR5X memory hides the
    NPU execution latency behind the longer CPU data preparation time, maximizing the bottlenecked throughput.
  common_mistake: Candidates often calculate the NPU's theoretical maximum throughput based purely on
    TOPS and ignore the CPU data preprocessing bottleneck. Additionally, when calculating pipelined throughput,
    they may incorrectly sum the latencies instead of taking the maximum time of the pipeline stages.
  napkin_math: '1. Compute NPU execution time: 90 GOPS / 45 TOPS (45,000 GOPS) = 0.002 seconds = 2ms per
    frame.

    2. Sequential Pipeline: Total Time = T_data_prep + T_compute = 8ms + 2ms = 10ms. Max Throughput =
    1000ms / 10ms = 100 FPS.

    3. Pipelined Pipeline (Double-buffered): Total Time = max(T_data_prep, T_compute) = max(8ms, 2ms)
    = 8ms. Max Throughput = 1000ms / 8ms = 125 FPS.'
