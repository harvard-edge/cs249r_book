id: mobile-fill-00508
title: Optimizing LLM Inference on Apple A17 Pro with Mixed Precision
topic: mixed-precision-training
status: published
provenance: imported
scenario: Your team is deploying a 7 billion parameter large language model (LLM) for on-device inference
  on the Apple A17 Pro. This chip features a 35 TOPS (Tera-Operations Per Second) Neural Engine, operates
  around 5W, and has 8 GB of unified memory. The current FP32 model exceeds memory and power budgets,
  and you're tasked with optimizing for latency and energy while preserving acceptable accuracy using
  mixed-precision techniques.
details:
  realistic_solution: 'A realistic solution involves a methodical approach: 1. Profile the FP32 model
    to identify memory and computation bottlenecks. 2. Start with FP16 for activations and weights, then
    progressively quantize less sensitive layers (e.g., deeper transformer blocks) to FP8. 3. Employ techniques
    like Post-Training Quantization (PTQ) or Quantization-Aware Training (QAT) to recover accuracy. 4.
    Utilize specialized mixed-precision recipes (e.g., specific layers in FP8, others in FP16, some critical
    layers in FP32) tailored for the A17 Pro''s Neural Engine capabilities, which might have dedicated
    FP8/FP16 hardware accelerators. 5. Implement dynamic loss scaling for training to handle gradient
    underflow with lower precision.'
  common_mistake: A common mistake is aggressively quantizing all layers or parameters to the lowest precision
    (e.g., FP8) without careful analysis, leading to significant and often unrecoverable accuracy degradation,
    especially in sensitive layers like normalization or final classification heads. Another mistake is
    ignoring the activation quantization strategy, as activations can also contribute significantly to
    memory and computation.
  napkin_math: 'A 7 billion parameter LLM is deployed on the Apple A17 Pro (8 GB unified memory, 35 TOPS
    Neural Engine).

    1. How much memory (in GB) is required for FP32 weights (4 bytes/parameter)?

    2. How much memory (in GB) is required for FP8 weights (1 byte/parameter)?

    3. What is the *percentage* reduction in memory footprint for weights when moving from FP32 to FP8?

    4. Given the A17 Pro''s 35 TOPS Neural Engine, if FP8 operations offer 4x the throughput of FP32 operations
    for matrix multiplications, how many *effective* TOPS could you theoretically achieve for a model
    that''s fully optimized to use FP8 where possible?'
