schema_version: 1
id: mobile-0433
title: The Night Vision Quantization Failure
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You're a Mobile ML Engineer optimizing a sign detection model for a new driver-assist app on
  a Snapdragon 8 Gen 3-powered phone. To meet the 5W power budget, you've quantized the entire FP32 model
  to INT8 using post-training static quantization (PTQ). Your calibration dataset consists of 10,000 images
  from daytime driving. The quantized model passes daytime tests, but during a field test, it consistently
  fails to detect red stop signs at night, classifying them as 'unknown'. You suspect a quantization issue.
  What is the most likely cause of this critical failure?
details:
  realistic_solution: The root cause is a calibration-inference data mismatch. The dynamic range of activations
    from nighttime images is much smaller than for daytime images. The INT8 scale factor, calculated from
    the wide-range daytime data, is too coarse to represent the fine-grained details in the low-light
    activations. This effectively 'crushes' the signal into just a few integer values, destroying the
    features needed to distinguish a stop sign at night. The solution is to re-calibrate using a dataset
    that includes nighttime images or to use mixed precision, keeping the early, feature-extracting layers
    in FP16 to preserve their dynamic range.
  common_mistake: Engineers often blame the hardware (e.g., 'a bug in the NPU') or the model architecture
    itself. The most common error, however, is failing to ensure the calibration dataset is truly representative
    of all expected inference conditions, especially edge cases like low light, which can have drastically
    different activation statistics.
  napkin_math: Let's assume the daytime calibration data produces activations in a key layer from -8.0
    to +8.0. The INT8 scale is `(8.0 - (-8.0)) / 255 = 16.0 / 255 ≈ 0.0627`. Now, a nighttime image produces
    activations in the same layer from -0.5 to +0.5. When quantized with the daytime scale, this entire
    signal range is mapped to `(0.5 - (-0.5)) / 0.0627 ≈ 15.9` integer levels. Out of 256 possible INT8
    values, you're only using ~16. This massive loss of precision (quantization noise) is why the model
    fails.
