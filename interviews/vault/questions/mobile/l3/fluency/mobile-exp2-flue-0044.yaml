id: mobile-exp2-flue-0044
title: FP16 Memory and Compute on A17 Pro
topic: mixed-precision-training
status: published
provenance: imported
scenario: You are deploying a 1.5 billion parameter generative model for on-device inference using the
  Apple A17 Pro Neural Engine. The A17 Pro features a 16-core Neural Engine capable of 35 TOPS, operating
  under a ~5W power constraint, and utilizes an 8 GB shared unified memory with the CPU/GPU. With the
  OS and background processes consuming 4.5 GB of memory, evaluate whether the model weights can fit in
  memory using FP16 precision. Additionally, assuming a single inference step requires 140 billion operations
  (140 GOPs), determine the theoretical maximum inference steps per second.
details:
  realistic_solution: First, determine the remaining available memory from the 8 GB shared pool. Calculate
    the footprint of the FP16 weights to confirm it fits within the available space. Then, divide the
    peak compute capacity (35 TOPS) by the operations required per step to find the theoretical compute-bound
    throughput.
  common_mistake: Candidates often forget that FP16 requires exactly 2 bytes per parameter, or they fail
    to account for the shared nature of the 8 GB unified memory by neglecting OS overhead. Additionally,
    candidates frequently miscalculate the conversion between TOPS (10^12) and GOPs (10^9).
  napkin_math: '1) Available Memory = 8 GB (total) - 4.5 GB (OS/System) = 3.5 GB. 2) FP16 Model Footprint
    = 1.5 billion parameters * 2 bytes/parameter = 3.0 GB. 3) Memory Check: 3.0 GB < 3.5 GB, so the FP16
    weights fit. 4) Theoretical Throughput = 35 TOPS / 140 GOPs = (35 * 10^12) / (140 * 10^9) = 35,000
    / 140 = 250 steps per second.'
