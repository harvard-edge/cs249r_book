id: mobile-0064
title: The Battery Blame Game
topic: power-budgeting
status: published
provenance: imported
scenario: Your ML-powered fitness app drains 1% battery per minute during a workout. The PM says 'the
  model is too expensive — optimize it.' You profile the power breakdown and find the model is not the
  main culprit. What is?
details:
  realistic_solution: 'Profile the full system power breakdown during a workout session: (1) **GPS radio:**
    continuously active for route tracking — ~200 mW. (2) **Screen:** always on showing the workout dashboard
    at high brightness (outdoor use) — ~800 mW. (3) **Heart rate sensor:** continuous optical sensing
    — ~100 mW. (4) **Cellular/WiFi radio:** uploading telemetry every 5 seconds — ~500 mW average. (5)
    **ML inference:** pose estimation model running every 500ms at 5ms per inference — duty cycle of 1%.
    NPU power during inference: ~2W. Average: 2W × 0.01 = **20 mW**.'
  common_mistake: '"The ML model must be the power hog — it''s the most computationally intensive component."
    This assumes compute = power, ignoring the rest of the system.'
  napkin_math: 'iPhone 15 battery: 12.8 Wh. Drain: 1% per min = 60% per hour. Total power draw = 12.8
    Wh * 0.60 = 7.68W. NPU inference draws ~1W. The camera sensor draws ~1.5W. The screen at max brightness
    draws ~3-4W. The model is only ~13% of the power budget. Dimming the screen saves significantly more
    power than optimizing the NPU.'
