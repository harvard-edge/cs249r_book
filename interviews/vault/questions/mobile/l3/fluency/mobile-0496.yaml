id: mobile-0496
title: The Federated Photobomber Fallacy
topic: federated-learning
status: published
provenance: imported
scenario: You are an ML Systems Engineer on a popular photo-sharing app with 10 million active users.
  Your team wants to A/B test a new 'Magic Eraser' feature trained to remove photobombers. Due to privacy
  concerns, management strongly prefers using Federated Learning (FL) over uploading user photos to the
  cloud.
details:
  realistic_solution: The primary bottleneck is the unacceptable cumulative battery drain on each user's
    device. While a single 5-second training round is trivial, repeating it a thousand times imposes a
    massive energy cost that users will notice and complain about. This 'death by a thousand cuts' makes
    the proposed FL strategy economically and practically infeasible, as it would severely degrade the
    app experience and lead to uninstalls. The cost is not just electricity, but user trust and engagement.
  common_mistake: Engineers often focus exclusively on the network costs of FL (uploading model gradients)
    or the cloud coordinator costs. While significant, they often underestimate the *aggregate user-side
    cost* of on-device computation, particularly the impact on battery life, which directly harms user
    experience and retention.
  napkin_math: Training a 50M parameter CNN (0.1GB weights) requires ~0.3 TFLOPS per image. For a local
    batch of 32 images, that's ~10 TFLOPS. A mobile SoC (e.g., 35 TOPS) takes ~0.3s. At 4W training power,
    100 batches use 120 Joules. Transmitting 0.1GB weights over Wi-Fi (approx 100MB/s at 1W) takes 1 second,
    using 1 Joule. Total energy per user is dominated by compute (120J) over networking (1J) in this setup.
