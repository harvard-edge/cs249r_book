id: mobile-0665
title: The Unified Memory Architecture Advantage
topic: real-time-deadlines
status: published
provenance: imported
scenario: Apple's M4 and A-series chips use a unified memory architecture where CPU, GPU, and Neural Engine
  share the same physical LPDDR5X. Qualcomm's Snapdragon 8 Gen 3 also has shared LPDDR5X. Your colleague
  says 'they're the same thing — both share memory.' Explain the critical architectural difference and
  why Apple's approach eliminates a copy overhead that Qualcomm's doesn't.
details:
  realistic_solution: 'Apple''s unified memory architecture shares a single physical address space across
    CPU, GPU, and ANE — a tensor computed by the ANE can be read by the GPU with zero copies, just a pointer
    handoff. Qualcomm''s shared DRAM requires each accelerator to maintain its own virtual address space
    with separate page tables, requiring explicit DMA copies between compute units. For a 5-stage pipeline
    with 50 MB intermediates: Apple completes in 10ms (5x2ms compute, 0ms transfers), Qualcomm takes 16ms
    (5x2ms compute + 4x1.5ms DMA copies). At 60 FPS (16.7ms budget), only Apple''s architecture can run
    this pipeline.'
  common_mistake: '"Both chips share the same DRAM, so there''s no difference — data is accessible to
    all compute units on both." This confuses shared physical memory with a unified memory *architecture*.
    Sharing DRAM doesn''t mean sharing address spaces.'
  napkin_math: '5-stage pipeline, 50 MB intermediate tensors. Apple: 5 × 2ms compute + 0ms transfers =
    **10ms**. Qualcomm: 5 × 2ms compute + 4 × 1.5ms transfers = **16ms** (60% slower). For a camera pipeline
    running at 30 FPS (33ms budget), Apple has 23ms headroom, Qualcomm has 17ms. At 60 FPS (16.7ms budget),
    Qualcomm cannot run this pipeline; Apple can.'
