id: mobile-fill-00012
title: 'Roofline Analysis on Apple A17 Pro: Identifying Bottlenecks for Mobile ML Workloads'
topic: roofline-analysis
status: published
provenance: imported
scenario: You are tasked with optimizing a new on-device ML model for deployment on the Apple A17 Pro,
  which features a 35 TOPS Neural Engine and 8 GB of unified memory, operating within a ~5W power budget.
  Your initial profiling shows that the model achieves only 10% of the A17 Pro Neural Engine's theoretical
  peak performance. Using the Roofline Model, how would you approach diagnosing whether this poor utilization
  is due to compute-bound or memory-bound limitations for a typical mobile inference workload? Explain
  how you'd use the model to guide your optimization strategy and predict potential gains.
details:
  realistic_solution: 'The realistic solution involves collecting key operational intensity (OI) and peak
    performance metrics. First, determine the peak compute (35 TOPS for FP16/INT8) and peak memory bandwidth
    (e.g., LPDDR5X for A17 Pro, typically 50-70 GB/s for unified memory) for the A17 Pro. Then, for the
    specific ML model, calculate its operational intensity (FLOPs/Byte or OPs/Byte) by dividing the total
    operations by the total memory access. Plot the model''s OI on the Roofline chart. If the model''s
    OI falls below the intersection point of the compute ceiling and memory bandwidth ceiling, it is memory-bound;
    if it falls above, it''s compute-bound. This immediately directs optimization efforts: for memory-bound
    workloads, focus on reducing memory transfers (e.g., quantization, sparse models, data reuse, fusion);
    for compute-bound, focus on parallelism, efficiency, and core utilization.'
  common_mistake: A common mistake is to assume high TOPS always translates to high real-world performance,
    overlooking memory bandwidth constraints or inefficient data access patterns. Developers might focus
    solely on optimizing arithmetic operations without considering how data moves to and from the Neural
    Engine, or they might misinterpret performance bottlenecks, leading to compute-bound optimizations
    for a memory-bound problem.
  napkin_math: "To determine if the workload is compute or memory bound on the A17 Pro: \n\n1.  **Peak\
    \ Compute Performance (P_compute)**: ~35 TOPS (assuming INT8/FP16 operations). Let's use 35 TeraOps/sec.\n\
    2.  **Peak Memory Bandwidth (B_mem)**: For LPDDR5X, a reasonable estimate for A17 Pro unified memory\
    \ might be 60 GB/s (60 * 10^9 Bytes/sec). \n3.  **Ridge Point (I_ridge)**: P_compute / B_mem = (35\
    \ * 10^12 OPs/sec) / (60 * 10^9 Bytes/sec) = ~583 OPs/Byte. This is the operational intensity at which\
    \ the system transitions from memory-bound to compute-bound.\n4.  **Model Operational Intensity (I_model)**:\
    \ Calculate for your specific model (Total OPs / Total Bytes transferred to/from memory). \n\n   \
    \ *   If I_model < I_ridge: The model is memory-bound. Effective performance will be roughly I_model\
    \ * B_mem.\n    *   If I_model > I_ridge: The model is compute-bound. Effective performance will be\
    \ roughly P_compute.\n\nExample: If a model has I_model = 100 OPs/Byte, it's memory-bound, and its\
    \ theoretical peak performance on A17 Pro would be ~100 * 60 * 10^9 = 6 TOPS, even though the NE can\
    \ do 35 TOPS. This highlights the bottleneck."
