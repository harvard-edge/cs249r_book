id: mobile-0482
title: The On-Device Assistant Stutter
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are the lead ML engineer for a new AI assistant feature on a flagship smartphone (using
  an Apple A17 Pro). The feature transcribes a user's voice and generates a response in real-time. Users
  complain that the assistant feels slow to start talking (high TTFT) and the app's animations stutter
  during generation (violating the 16ms frame budget). Your profiler shows that to generate one output
  token, the 1B parameter INT8 model must read ~1GB of weights from main memory. The current implementation
  waits for the entire user utterance to be transcribed before starting the generation (a monolithic 'pre-fill'
  step). How do you solve both the high TTFT and the UI jank?
details:
  realistic_solution: 'The correct approach is to re-architect the inference pipeline to be incremental
    and priority-aware.

    1. **Solve TTFT:** Implement ''chunked pre-fill''. Instead of waiting for the full transcription,
    begin the pre-fill phase on the first few transcribed words. This overlaps prompt ingestion with generation,
    drastically cutting down the perceived time-to-first-token.

    2. **Solve Jank/TPOT:** Use a priority queue for NPU tasks. The short, latency-critical ''decode''
    steps (generating one output token) must be given higher priority than the longer, less critical ''pre-fill''
    steps (ingesting the next chunk of the user''s prompt). This ensures that once the assistant starts
    talking, its output stream is smooth and isn''t interrupted by a heavy background task, thus preventing
    contention for the memory bus that starves the UI rendering thread.'
  common_mistake: 'Engineers often focus on only one part of the problem. They might suggest simply running
    inference on a background thread, but this doesn''t fix the high TTFT caused by the long initial pre-fill.
    Others might suggest aggressive model compression (e.g., INT4), which hurts model quality and is a
    brute-force solution that doesn''t fix the underlying scheduling problem: contention between ingesting
    the prompt and generating the response.'
  napkin_math: The SoC shares 50 GB/s memory bandwidth between CPU, GPU, and NPU. The ASR (transcription)
    model processes audio chunks, streaming activations to DRAM. Simultaneously, the LLM starts its prefill
    phase, aggressively loading its 3GB of weights. 3GB / 50GB/s = 60ms minimum just for weights. The
    ASR and LLM are contending for the exact same 50 GB/s memory bus, causing huge queueing delays and
    latency.
