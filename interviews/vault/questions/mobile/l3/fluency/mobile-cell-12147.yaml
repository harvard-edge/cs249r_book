title: 'Network Bandwidth Bottlenecks: Fluency — Mobile Bandwidth Math in 60 Seconds'
topic: network-bandwidth-bottlenecks
status: published
provenance: imported
scenario: 'Without reference: ''A 3B INT4 LLM (1.5GB) runs on Snapdragon 8 Gen 3 (77 GB/s LPDDR5X). What
  is the decode-bound TPOT and what''s the memory bandwidth utilization during a single-user chat session?'''
details:
  realistic_solution: 'TPOT: read all 1.5GB weights once per decode step. Time: 1.5GB / 77GB/s = 19.5ms/token.
    Memory BW utilization during decode: 1.5GB/0.0195s = 76.9GB/s out of 77GB/s = 99.9% utilization during
    active decode. Between tokens: 0% utilization. Average utilization: depends on query rate. At 1 query
    per minute with 50 tokens: 50×19.5ms/60s = 1.6% average BW utilization.'
  common_mistake: Saying '77 GB/s' as the utilization without computing the actual TPOT first, or confusing
    GB/s with GB.
  napkin_math: 'TPOT: 1.5GB/77=19.5ms. During decode: 77GB/s peak utilization (99.9%). 50-token response:
    975ms active / 60s = 1.625% duty cycle. Average BW: 77GB/s × 1.625% = 1.25GB/s average. System has
    75.75GB/s available for other tasks between queries.'
