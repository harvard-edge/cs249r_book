id: mobile-0537
title: The Mobile Video Battery Drain
topic: roofline-analysis
status: published
provenance: imported
scenario: You are a mobile ML engineer diagnosing severe battery drain in a real-time video filter app
  running on an Apple A17 Pro. The profiler points to a single depthwise convolution layer using `3x3`
  kernels on a `112x112x256` feature map (processed in INT8). Given the A17 Pro's specs (35 TOPS peak
  compute, 51.2 GB/s memory bandwidth), use the roofline model to diagnose the performance bottleneck.
  What is the primary cause of the inefficiency?
details:
  realistic_solution: The workload is severely memory-bound. By calculating the arithmetic intensity (Ops/Byte),
    we can see it falls far below the hardware's ridge point. This means the Apple Neural Engine (ANE)
    is constantly waiting for data to arrive from the much slower LPDDR5 memory, wasting energy and time.
    The high battery drain comes from inefficient data movement, not the computation itself.
  common_mistake: Engineers often see high peak TOPS on a spec sheet and assume any slowdown must be due
    to hitting that compute limit. They fail to calculate the arithmetic intensity of their specific workload.
    For many mobile vision layers, especially depthwise convolutions, the model spends most of its time
    and energy moving data, not doing math. The compute units are starved.
  napkin_math: 1. **Calculate Operations (Compute):** A `3x3` depthwise convolution on a `112x112x256`
    tensor performs `2 * 112 * 112 * 256 * 3 * 3` ≈ **57.8 Million Ops**.
