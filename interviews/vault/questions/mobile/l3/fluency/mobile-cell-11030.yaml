id: mobile-cell-11030
title: 'Dataset Curation: Fluency — Token Budget for On-Device Fine-Tuning on A17 Pro'
topic: dataset-curation
status: published
provenance: imported
scenario: On an A17 Pro (35 TOPS Neural Engine, 8GB RAM), you want to fine-tune a 1B parameter language
  model for personalization using 500 user-generated examples of average 128 tokens each. Estimate the
  total fine-tuning compute, memory required, and time to complete.
details:
  realistic_solution: A17 Pro Neural Engine is inference-only. Fine-tuning must use CPU or GPU cores.
    Use LoRA to reduce trainable parameters. 1B model in fp16 = 2GB weights. LoRA rank-8 adds ~0.1% params
    = 1M trainable params.
  common_mistake: Not accounting for activation memory during backprop, or assuming Neural Engine supports
    training (it's inference-only — training runs on CPU/GPU cores).
  napkin_math: '500 examples × 128 tokens = 64K tokens total. LoRA fine-tuning: 1M trainable params. A17
    Pro CPU: ~100 GFLOPS for training. 6 FLOPs/token × 64K tokens × 3 epochs = 1.15M FLOPs. Time: 1.15M
    / 100G = trivial. Memory: 1B × 2B (fp16 weights) = 2GB + LoRA = 2.01GB + optimizer (AdamW): 2 × 1M
    × 4B = 8MB + activations (batch=1): 128 × 2048 × 4B = 1MB. Total: ~2.02GB, fits in 8GB. Fine-tuning
    on device: < 1 second. Practical bottleneck: data loading from encrypted storage.'
