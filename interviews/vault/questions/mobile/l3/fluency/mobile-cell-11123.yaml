id: mobile-cell-11123
title: 'Kernel Fusion: Fluency — Estimate Neural Engine Throughput for Fused MLP'
topic: kernel-fusion
status: published
provenance: imported
scenario: 'Estimate the Neural Engine throughput on A17 Pro (35 TOPS INT8, 8GB) for a fused MLP block:
  Linear(2048→8192) + SiLU + Linear(8192→2048), processing batch=1 single-token decode. Include weight
  loading time and compute time, and determine which is the bottleneck.'
details:
  realistic_solution: At batch=1 decode, MLP is dominated by weight loading, not compute. This is the
    memory-bandwidth-bound regime where arithmetic intensity is very low.
  common_mistake: Ignoring weight loading time for decode mode; assuming TOPS rating equals actual throughput
    for small batch operations.
  napkin_math: 'Linear 1 weights: 2048×8192 × 2B = 33.6MB. Linear 2 weights: 8192×2048 × 2B = 33.6MB.
    Total weight: 67.2MB. Weight load time: 67.2MB / 68 GB/s = 0.99ms. Compute: batch=1, token=1. Linear
    1: 2 × 1 × 2048 × 8192 = 33.6M FLOPs. Linear 2: same. Total: 67.2M FLOPs. NE at 35 TOPS: 67.2M / 35T
    = 0.0019ms. Compute time: 0.002ms. Memory bandwidth time: 0.99ms. Memory-bound: 0.99ms / 0.002ms =
    495× memory-bound. Fusion benefit for SiLU: SiLU acts on 8192-element vector = 8192 × 2B = 16KB. Unfused:
    write 16KB + read 16KB = 32KB. Fused: stays in NE registers. Savings: 32KB / 68 GB/s = 0.47µs. Negligible
    vs 0.99ms weight load. Conclusion: at batch=1, fusion saves 0.05% — weight loading dominates completely.
    To improve: weight caching, INT4 quantization (reduces weights to 33.6MB/2 = 16.8MB → 0.49ms load).'
