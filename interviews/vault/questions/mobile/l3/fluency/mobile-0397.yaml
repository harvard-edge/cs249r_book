schema_version: 1
id: mobile-0397
title: The Trivial Model Paradox
topic: roofline-analysis
status: published
provenance: imported
scenario: You have a very small, simple ML model – say, a single 100-neuron dense layer. When you deploy
  it on a modern mobile SoC, you observe that running it on the CPU often yields *lower* latency than
  trying to offload it to the dedicated NPU. Why would this be the case?
details:
  realistic_solution: "Dedicated NPUs often have significant **startup and data transfer overheads** that\
    \ overshadow the benefits of their higher theoretical throughput for very small workloads.\n  1. \
    \ **Driver Initialization:** The NPU driver needs to be initialized, and the NPU itself might need\
    \ to be powered up or woken from a low-power state.\n  2.  **Context Switching:** Switching execution\
    \ context from the CPU to the NPU incurs latency.\n  3.  **Data Transfer:** Input tensors must be\
    \ transferred from main memory (accessible by CPU) to the NPU's dedicated memory or shared memory\
    \ regions. For a tiny model, this transfer time can be longer than the actual computation time on\
    \ the NPU.\n  4.  **Batching Limitations:** NPUs achieve peak performance through parallelism and\
    \ batching. A single small inference provides minimal opportunities for this.\n  5.  **Fixed Overhead:**\
    \ There's a fixed overhead associated with queuing a task on the NPU, regardless of its size. For\
    \ very small tasks, this fixed overhead dominates.\n  The CPU, on the other hand, can execute such\
    \ a small layer very quickly within its existing execution context, leveraging its large L1/L2 caches\
    \ and optimized ARM Neon instructions, without the inter-processor communication overhead."
  common_mistake: '"The NPU isn''t optimized for small models." While partially true, it doesn''t explain
    *why* it''s slower. The core issue is the overhead.'
  napkin_math: 'CPU execution time: $T_{CPU\_compute} \approx 50 \mu s$ (for a small dense layer). | NPU
    execution time: $T_{NPU\_startup} + T_{data\_transfer} + T_{NPU\_compute}$. | $T_{NPU\_startup} \approx
    100 \mu s$ (driver, power-up). | $T_{data\_transfer} \approx 20 \mu s$ (e.g., 1MB data @ 50 GB/s effective
    transfer rate). | $T_{NPU\_compute} \approx 10 \mu s$ (if NPU is truly faster). | Total NPU: $100
    + 20 + 10 = 130 \mu s$, which is much higher than $50 \mu s$ on CPU.'
