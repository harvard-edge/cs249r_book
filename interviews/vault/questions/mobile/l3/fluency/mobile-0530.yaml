title: 'The Style Transfer Battery Drain: Real-Time Deadlines'
topic: real-time-deadlines
status: draft
provenance: imported
scenario: 'You''re an ML engineer at a startup building a new social media app. Your key feature is a
  real-time generative style transfer filter. On the new Apple A17 Pro, you find the filter runs, but
  it''s causing UI jank and the phone gets noticeably hot. You have two candidate model architectures:'
details:
  realistic_solution: The correct approach is to analyze the Arithmetic Intensity (AI) of each model.
    Model B, despite having more FLOPs, is vastly more efficient and will perform better. It shifts the
    bottleneck from slow, power-hungry memory access to the highly optimized on-chip Neural Engine. The
    phone's UI will be smoother and the battery will last longer because the GPU spends less time stalled
    waiting for data, finishing its work and returning to a low-power state more quickly.
  common_mistake: Engineers often assume that fewer floating-point operations (FLOPs) always equates to
    a faster, more efficient model. This 'compute-centric' view ignores the immense power and latency
    cost of moving data from DRAM to the compute units. On mobile, where memory bandwidth is limited and
    power is paramount, being memory-bound is often a worse performance state than being compute-bound.
  napkin_math: Arithmetic Intensity (AI) = Ops / Bytes. A high-res style transfer model might do 100 GFLOPs
    while reading 1GB of intermediate feature maps from DRAM (AI = 100 Ops/Byte). The A17 Pro's ridge
    point is ~700 Ops/Byte. The model is severely memory-bound. DRAM accesses cost ~580x more energy than
    an FP16 compute operation. Pounding the 50GB/s memory bus constantly causes massive power draw and
    thermal jank.
