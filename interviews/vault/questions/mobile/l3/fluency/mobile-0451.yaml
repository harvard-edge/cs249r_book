schema_version: 1
id: mobile-0451
title: The Driver Monitoring Deadline Miss
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'You''re a mobile ML engineer diagnosing a performance issue in a Driver Monitoring System (DMS)
  running on an Apple A17 Pro. The system uses the front camera (30 FPS) to detect drowsiness and must
  issue an alert within a hard deadline of **50ms** from frame capture. The pipeline has three sequential
  models on the ANE: Face Detection (10ms), Landmark Prediction (15ms), and Drowsiness Classification
  (5ms). Profiling shows that while the *average* latency is ~32ms, about 1% of frames miss the 50ms deadline,
  sometimes taking up to 80ms. You also know a secondary, low-priority gesture control model runs for
  50ms once every second on the same ANE. Given this, what is the most likely cause for the deadline misses?'
details:
  realistic_solution: The problem is not the speed of the DMS pipeline itself, but resource contention
    on the ANE. The DMS pipeline takes 30ms, which is well within the 33ms window between frames at 30
    FPS. However, when the low-priority gesture model runs, it occupies the ANE for 50ms. If a DMS frame
    arrives during this time, it must wait in a queue for 50ms before its own 30ms processing can begin.
    This results in a total latency of 80ms, which violates the 50ms hard deadline. This is a classic
    queuing problem where a non-preemptive, lower-priority task blocks a high-priority, real-time task.
  common_mistake: Engineers often focus on optimizing the longest single component in the pipeline (the
    15ms landmark model) rather than diagnosing system-level interactions. They might also incorrectly
    blame the hardware's peak performance, ignoring the fact that the average performance is fine and
    the issue is related to worst-case latency caused by resource contention.
  napkin_math: At 30 FPS, a new frame arrives every 33.3ms. The hard deadline is 50ms from photon to alert.
    If camera ISP and OS overhead take 15ms, we have 35ms left. An inference taking 20ms meets the budget
    (15 + 20 = 35ms < 50ms). But if the system buffers 2 frames (2 * 33.3ms = 66.6ms), we already miss
    the 50ms deadline before inference even starts! We must process unbuffered zero-copy camera streams.
