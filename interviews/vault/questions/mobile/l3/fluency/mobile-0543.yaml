schema_version: 1
id: mobile-0543
title: The Real-Time Filter Jank
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are a mobile ML engineer diagnosing UI 'jank' (stuttering) in a new real-time video filter
  on an iPhone-class device (like one with an Apple A17 Pro). The app must render each frame within 16ms
  to feel smooth. Your profiling of the INT8-quantized style transfer CNN shows that processing a single
  frame requires **70 Giga-Ops** and involves moving **1.2 GB** of data (weights, activations, framebuffer
  I/O). Using the hardware constants, apply roofline model principles to diagnose the primary bottleneck.
details:
  realistic_solution: The primary bottleneck is memory bandwidth. To diagnose this, we calculate the model's
    Arithmetic Intensity (AI) and compare it to the hardware's 'ridge point'. The ridge point represents
    the minimum AI a workload must have to be compute-bound. For the A17 Pro, this is ~700 Ops/Byte (35
    TOPS / 50 GB/s). This model's AI is only 58.3 Ops/Byte (70 GOps / 1.2 GB). Since the model's AI is
    far below the ridge point, it is memory-bound. The memory-bound latency is 1.2 GB / 50 GB/s = 24ms,
    which exceeds the 16ms budget and explains the jank. The compute units are spending most of their
    time idle, waiting for data to arrive from memory.
  common_mistake: Engineers often reflexively blame compute limitations when a model is slow, especially
    with large Op counts. They fail to calculate the arithmetic intensity to see if the memory system
    can even feed the compute units fast enough. Another common mistake is assuming the device is thermal
    throttling without first checking for more fundamental architectural bottlenecks.
  napkin_math: '1. **Define Key Metric**: Arithmetic Intensity (AI) = Ops / Bytes.

    2. **Model AI**: 70 GOps / 1.2 GB = 70e9 / 1.2e9 = 58.3 Ops/Byte.

    3. **Hardware Ridge Point**: A17 Pro NPU: ~35 TOPS INT8, ~50 GB/s memory BW. Ridge point = 35e12 /
    50e9 = 700 Ops/Byte.

    4. **Diagnosis**: Model AI (58.3) << Ridge Point (700) → the model is deeply **memory-bound**.

    5. **Latency check**: Memory-bound latency = Data / BW = 1.2 GB / 50 GB/s = **24 ms** → exceeds the
    16ms frame budget.

    6. **Conclusion**: The compute units are idle most of the time, starved for data. The fix is to reduce
    data movement (operator fusion, tiling into SRAM), not to reduce compute.'
