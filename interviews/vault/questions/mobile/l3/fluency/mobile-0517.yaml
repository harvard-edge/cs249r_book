id: mobile-0517
title: The Federated Economics Dilemma
topic: federated-learning
status: published
provenance: imported
scenario: 'You are an ML Systems Engineer on the ''Smart Reply'' team for a messaging app with 10 million
  daily active users (DAU). To improve the model with user data, your team is debating two strategies:
  Option A (Centralized): Log 1 KB of anonymized interaction data per user per day to the cloud. Store
  for 90 days. Train on 8×A100 GPU cluster at $25/hr. Training runs 3 hours/week. Data transfer at $0.01/GB.
  Option B (Federated Learning): $800K one-time engineering cost. On-device training uses 0.5 Wh per round
  (2 rounds/week per device). Aggregation server costs $5K/month. Compare the annual TCO of each approach.'
details:
  realistic_solution: The correct approach is to calculate the total annual cost for both strategies.
    Because the per-user data volume is so small (1 KB/day), the centralized approach is orders of magnitude
    cheaper in pure infrastructure costs (~$4.2k vs ~$327k). However, a comprehensive TCO analysis must
    also include the Expected Value of regulatory and breach risks, which can quickly make FL the safer
    and ultimately cheaper investment.
  common_mistake: Engineers often focus only on the most obvious cost (like cloud training GPUs or upfront
    engineering effort) while ignoring 'hidden' or distributed costs that dominate at scale. In this case,
    neglecting the massive recurring daily data transfer and compute costs for the centralized option,
    or dismissing the user-borne energy cost for the federated option as 'not our problem', leads to the
    wrong conclusion. A proper TCO analysis must account for all costs, including indirect ones like user
    battery drain which translates to brand risk.
  napkin_math: "**Option A: Centralized Annual TCO**\n1. Daily data: 10M users × 1 KB = 10 GB/day. Annual:\
    \ 10 GB × 365 = 3.65 TB.\n2. Transfer cost: 3,650 GB × $0.01/GB = **$36.50/year** (negligible).\n\
    3. Storage (90-day window): peak ~900 GB × $0.023/GB/month × 12 = **~$248/year**.\n4. Training: $25/hr\
    \ × 3 hr/week × 52 weeks = **$3,900/year**.\n5. **Total A: ~$4,185/year** ongoing.\n\n**Option B:\
    \ Federated Annual TCO**\n1. Engineering (amortized over 3 years): $800K / 3 = **~$267K/year**.\n\
    2. Aggregation server: $5K/month × 12 = **$60K/year**.\n3. User energy cost (externality, not billed\
    \ but relevant for brand risk):\n   10M users × 0.5 Wh/round × 2 rounds/week × 52 weeks = 520 MWh/year.\n\
    \   At $0.15/kWh residential rate: 520,000 kWh × $0.15 = **$78,000/year** borne by users collectively.\n\
    \   Per user: $0.0078/year — negligible individually, but aggregate brand risk exists.\n4. **Total\
    \ B Year 1: $80K + $60K = $140K** (excl. amortization).\n   With amortized engineering: **$327K/year.**\n\
    \n**Verdict:** Centralized is ~80× cheaper in pure infrastructure ($4.2K vs $327K/year). However,\
    \ this ignores regulatory and breach risk. With even a 0.1% annual breach probability at $50M expected\
    \ cost → +$50K/year ALE for Option A. At 1% probability → +$500K/year, making FL the safer investment.\n\
    \nThe scenario's small data volume (1 KB/user/day = 10 GB/day fleet-wide) makes centralized remarkably\
    \ cheap. FL only wins when privacy liability or regulatory costs dominate."
