id: mobile-0443
title: The Unstable Gallery Indexer
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are building a 'smart gallery' feature for a mobile app that automatically indexes videos.
  The task runs in the background on a high-end smartphone NPU. When a user starts indexing a 30 FPS video,
  the progress bar is steady initially, but then the 'time remaining' estimate starts growing continuously.
  Your profiler shows the core analysis model takes exactly **30ms** per frame. You also discover a low-priority
  background task for creating thumbnails occasionally uses the NPU for **100ms** every second. Apply
  queueing theory to diagnose the stability of the video indexing system. Why does the queue of unprocessed
  frames grow over time?
details:
  realistic_solution: 'The system is unstable because the system''s utilization ($

    ho$) is 1.0. While the ideal service rate is faster than the arrival rate, the interference from the
    thumbnailing task makes the *effective* service rate equal to the arrival rate. This creates a critically
    stable M/D/1 queue where any small amount of system jitter or additional load will cause the input
    queue of frames to grow without bound, leading to the ever-increasing ''time remaining'' estimate.'
  common_mistake: A common mistake is to only compare the service time (30ms) to the frame arrival interval
    (33.3ms) and conclude the system is stable. This ignores the impact of other processes sharing the
    same hardware resource, which reduces the *effective* service rate over a longer time window.
  napkin_math: 1. **Arrival Rate (λ):** A 30 FPS video generates frames at a rate of 30 frames/second.
