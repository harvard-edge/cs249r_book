title: The Smart Keyboard TCO Dilemma
topic: federated-learning
status: published
provenance: imported
scenario: 'You are the ML Systems Engineer for a new smart keyboard app with 10 million daily active users.
  To improve next-word prediction, you must diagnose the most cost-effective training strategy between
  two options:'
details:
  realistic_solution: The correct approach is to calculate the Total Cost of Ownership (TCO) for each
    strategy. The centralized cost is a fixed $300/day. The federated cost is the sum of its network and
    battery costs.
  common_mistake: 'Engineers often assume Federated Learning is inherently ''cheaper'' because it offloads
    the training compute to the users'' ''free'' hardware. This thinking completely ignores two massive,
    real-world costs: the network cost of aggregating millions of model updates, and the cumulative (and
    real) cost of draining the battery of millions of users.'
  napkin_math: "### Centralized | Daily Cost = **$300** (given)\n\n### Federated Learning | Daily Cost\
    \ Calculation:\n1. **Network cost (model update aggregation):**\n   - Each of 10M users uploads a\
    \ model update of ~5 MB/day\n   - Total upload: 10M × 5 MB = 50,000 GB/day = 50 TB/day\n   - At $0.01/GB\
    \ ingress: 50,000 × $0.01 = **$500/day**\n2. **Battery cost (user-side energy):**\n   - On-device\
    \ training: ~4W for 2 minutes = 4W × 120s = 480 J = 0.133 Wh\n   - Per user battery drain: 0.133 Wh\
    \ / 15 Wh ≈ 0.9% of battery/day\n   - Assume 0.5% of users churn monthly due to perceived battery\
    \ drain\n   - Churned users: 10M × 0.5% = 50,000 users/month\n   - At $3 LTV/user: $150,000/month\
    \ = **$5,000/day**\n3. **FL Total Daily Cost:** $500 (network) + $5,000 (churn) = **$5,500/day**\n\
    \n### Comparison:\n| Strategy | Daily Cost | Monthly Cost |\n|----------|-----------|-------------|\n\
    | Centralized | $300 | $9,000 |\n| Federated | $5,500 | $165,000 |\n\nFL is **~18× more expensive**\
    \ when accounting for the full TCO including user churn from battery drain. The privacy benefit is\
    \ real, but the economic case requires careful justification."
