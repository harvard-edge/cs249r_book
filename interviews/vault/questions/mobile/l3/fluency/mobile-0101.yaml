schema_version: 1
id: mobile-0101
title: The Sustained vs Burst Reality
topic: real-time-deadlines
status: published
provenance: imported
scenario: You benchmark a new MobileNetV3 variant on an Android phone, and the first 10 inferences take
  12ms each. You report to your manager that the model can comfortably run at 60 FPS (16.6ms deadline).
  However, when the AR filter is used by customers for more than 2 minutes, the UI becomes extremely choppy.
  Why was your benchmark misleading?
details:
  realistic_solution: Mobile SoCs are designed to 'sprint and sleep.' They can achieve massive peak performance
    (burst) for a few seconds to load an app or render a webpage. However, smartphones have no cooling
    fans. If you run a continuous workload like a 60 FPS AR filter, the SoC quickly saturates its thermal
    envelope. The OS will aggressively throttle the CPU/GPU/NPU frequencies to prevent the phone from
    burning the user's hand, drastically increasing inference time.
  common_mistake: '"Using a short-burst benchmark to extrapolate sustained performance on a mobile device
    without active cooling."'
  napkin_math: A flagship mobile SoC might draw 5-8 Watts during peak burst, but the physical chassis
    of a smartphone can only passively dissipate about 2-3 Watts of heat continuously. Once the thermal
    soak is reached (usually within 1-2 minutes), the system MUST throttle performance by roughly 50-60%
    to reach thermal equilibrium at 2.5 Watts, meaning your 12ms inference immediately becomes ~25-30ms.
