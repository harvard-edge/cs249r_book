id: mobile-0013
title: The App Store Model Size Rejection
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Your image generation app bundles a 350 MB diffusion model. Apple approves the app, but analytics
  show 60% of users never complete the download — they abandon when iOS shows 'This app is over 200 MB
  and requires WiFi.' Your PM says 'just make the model smaller.' What's the real solution?
details:
  realistic_solution: 'Separate model from app binary using staged delivery. Ship a 40 MB app (under 200
    MB cellular limit), download the 350 MB model in the background after install. Compressed to ~180
    MB: 29 sec on WiFi, 72 sec on LTE. User abandonment drops from 60% to ~15%. Use Apple''s On-Demand
    Resources or Android''s Play Asset Delivery. Show useful onboarding during download. Never aggressively
    quantize a diffusion model to fit size limits — INT2/INT4 destroys generation quality.'
  common_mistake: '"Quantize the model to fit under 200 MB." Aggressive quantization of a diffusion model
    destroys output quality — users will see blocky, artifacted images and uninstall.'
  napkin_math: 'App Store cellular limit: 200 MB. Thin bundle: 40 MB ✓ (cellular OK). Model download:
    350 MB raw, 180 MB compressed. On WiFi (50 Mbps): 180 MB / 6.25 MB/s = 29 seconds. On LTE (20 Mbps):
    180 MB / 2.5 MB/s = 72 seconds. User abandonment: 60% at 350 MB forced-WiFi → estimated 15% at 40
    MB cellular + background download. Retention improvement: 4× more users complete setup.'
