schema_version: 1
id: mobile-0700
title: The Quantization Quirk
topic: quantization-fundamentals
status: published
provenance: imported
scenario: Your team successfully quantizes a large image segmentation model from FP32 to INT8 for deployment
  on a mobile NPU, expecting significant speedup. However, after deployment, you notice that some operations,
  particularly custom layers or obscure activations, are still running in FP32 on the CPU. Why would this
  happen, despite the model being 'quantized'?
details:
  realistic_solution: This occurs because not all operations (operators) in a neural network graph are
    supported by the NPU's INT8 instruction set or its dedicated hardware IP. Even if a model is "quantized,"
    if an operator within the graph (especially custom ops, less common activation functions like Swish,
    or complex control flow ops) is not recognized or supported by the NPU delegate's INT8 implementation,
    the framework (e.g., TFLite) will typically fall back to executing that specific unsupported operator
    on the CPU, often in FP32. This creates a "CPU-NPU dance" where data is copied back and forth between
    CPU RAM and NPU memory for each unsupported op, incurring significant overhead (memory copies, context
    switching) and negating many of the benefits of NPU acceleration. The model isn't fully INT8 *on the
    NPU* if it contains unsupported ops.
  common_mistake: '"The quantization process failed, or the model wasn''t fully converted." While possible,
    the NPU is still running *some* INT8 ops.'
  napkin_math: A typical NPU-CPU data transfer might cost 0.5ms per transfer. If a model has 5 unsupported
    ops, that's 5 transfers (NPU->CPU, CPU->NPU) = 10 transfers, costing 5ms. This can easily double or
    triple the inference time of a 4ms NPU-optimized model.
