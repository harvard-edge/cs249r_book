schema_version: 1
id: mobile-0544
title: The Night-Vision Blind Spot
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are a mobile ML engineer deploying a pedestrian detection model for a new driver-assistance
  app. To meet the phone's 16ms real-time rendering budget, you must convert the FP32 model to INT8 for
  the device's NPU. You use a post-training quantization (PTQ) toolkit with a calibration set of 100 daytime
  images scraped from the web. The INT8 model is fast, but during field testing, its accuracy collapses
  at night—it completely misses pedestrians illuminated by bright headlights or lurking in deep shadows.
  Daytime accuracy remains high. Probing the model, you find that activations in the first few convolutional
  layers frequently saturate at the maximum INT8 value of 127 during night-time inference. What is the
  most likely cause of this failure?
details:
  realistic_solution: The root cause is a **calibration data mismatch**. The 100 daytime images used for
    post-training quantization (PTQ) were not representative of the inference conditions, specifically
    high-contrast night scenes. The activation ranges (min/max values) calculated from this limited dataset
    were too narrow. When the model processes a night image with bright headlights, the FP32 activation
    values exceed the calibrated maximum, causing them to be 'clipped' or 'saturated' at the highest INT8
    value (127). This loss of dynamic range information destroys the feature representation in the early
    layers, leading to the accuracy collapse. The solution is to use a larger and more representative
    calibration set that includes challenging night-time data, or to switch to Quantization-Aware Training
    (QAT) which learns the ranges during training.
  common_mistake: Engineers often assume that if a model works in FP32, it will 'just work' when quantized.
    They underestimate how critical the calibration dataset is. A small or unrepresentative calibration
    set, especially one that doesn't cover the full dynamic range of real-world inputs (like night vs.
    day), will lead to catastrophic clipping and accuracy loss.
  napkin_math: Assume an early convolution's FP32 activation for a daytime image has a maximum value of
    `15.0`. The PTQ tool calibrates the quantization scale `S` based on this range, mapping `[0, 15.0]`
    to the INT8 range `[0, 127]`. The scale factor `S` would be roughly `15.0 / 127 ≈ 0.118`. Now, a night-time
    image with a headlight causes the same activation to be `40.0`. When quantized, this becomes `q_val
    = round(40.0 / 0.118) = 339`. Since `339` is far beyond the INT8 limit, it's clipped to `127`. The
    model now sees no difference between a `15.0` signal and a `40.0` signal, completely losing the high-intensity
    information and failing the detection.
