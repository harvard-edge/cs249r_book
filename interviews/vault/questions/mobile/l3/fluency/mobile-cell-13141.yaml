schema_version: 1
id: mobile-cell-13141
title: 'Mobile TCO Fluency: Quick Battery Cost Estimation for Mobile ML'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Estimate from memory the annual energy cost for these mobile ML workloads on Snapdragon 8 Gen
  3 (45 TOPS, 16GB, 4W for LLM inference): (1) 50 queries/day at 100 tokens/query, 20 tok/s, (2) 100 real-time
  speech recognition at 1W for 30sec each, (3) 10 SD image generations at 8W for 30sec each. State the
  dominant cost and annual battery wear as % of battery cycles.'
details:
  realistic_solution: '(1) LLM: 100 tokens at 20 tok/s = 5s/query. Energy: 4W*5s=20J=0.00556Wh/query.
    Annual: 50*365*0.00556=101.4Wh=$0.0101/yr. (2) ASR: 1W*30s=30J=0.00833Wh/session. Annual: 100*365*0.00833=304Wh=$0.0304/yr.
    (3) SD: 8W*30s=240J=0.0667Wh/image. Annual: 10*365*0.0667=243.4Wh=$0.0243/yr. Total energy cost: $0.065/yr
    — negligible. Battery: phone has 5000mAh*3.7V=18.5Wh. Annual total: 648.8Wh. Battery cycles: 648.8/18.5=35
    extra full cycles. Battery life drops 20% after 500 cycles → 35/500=7% of battery life used by ML.'
  common_mistake: Forgetting to convert from Wh to kWh (factor of 1000) before multiplying by electricity
    rate, and not calculating whether battery wear (not energy cost) is the real constraint for mobile
    ML.
  napkin_math: '(1) LLM: $0.0101/yr. (2) ASR: $0.0304/yr. (3) SD: $0.0243/yr. Total: $0.065/yr. Energy
    cost negligible. Battery cycles: LLM=101.4Wh/yr, ASR=304Wh/yr, SD=243.4Wh/yr. Total=648.8Wh. Snapdragon
    device: 5000mAh @ 3.7V=18.5Wh. ML adds 648.8/18.5=35 extra cycles/yr. Without ML: ~365 cycles/yr (1
    full charge/day). With ML: 400 cycles/yr = 9.6% increase. Battery degradation: 0.04%/cycle → 35 extra
    * 0.04% = 1.4% extra degradation/yr. After 3yr: extra 4.2% degradation. Negligible impact. Conclusion:
    energy cost from mobile ML is negligible; model quality and compute capability are the real constraints.'
