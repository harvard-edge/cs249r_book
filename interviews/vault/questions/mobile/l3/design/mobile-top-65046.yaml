schema_version: 1
id: mobile-top-65046
title: Adapter Selection Latency in Multi-Persona Mobile Assistant
topic: model-adaptation-systems
status: published
provenance: imported
scenario: A mobile AI assistant has 5 LoRA adapters (professional, casual, technical, creative, child-safe)
  and selects the adapter based on conversational context. Adapter selection and load adds 200ms before
  first token. Reduce this to under 50ms.
details:
  realistic_solution: 'End-to-end latency breakdown: context classification: 50ms if running 100M classifier
    on CPU, 5ms on NPU; adapter file load from storage: 15MB at 3 GB/s UFS 3.1 = 5ms; CPU-to-GPU transfer:
    15MB at 34 GB/s = 0.4ms. Current 200ms breakdown likely: classifier on CPU (150ms) + storage read
    (50ms). Fix: (1) Pre-load all 5 adapters into GPU memory at app launch: 5 * 15MB = 75MB total, uses
    1.25% of 6GB GPU-accessible unified memory, negligible; (2) Replace classifier with a lightweight
    embedding similarity (DistilBERT 66M, NPU: 5ms); (3) With all adapters pre-loaded, adapter switch
    = pointer swap = <1ms. Total: 5ms classification + 1ms switch = 6ms, well under 50ms.'
  common_mistake: Pre-loading all 5 adapters into memory and relying on fast switching, while the actual
    bottleneck is the context classification model running on CPU (not NPU) and cold disk reads for adapters
    not yet loaded.
  napkin_math: '5 adapters * 15MB = 75MB pre-loaded. GPU memory on flagship mobile: 6GB addressable. 75MB
    / 6000MB = 1.25% of GPU memory. Classification with 66M model on NPU at 10 TOPS: 66M * 6 FLOP = 396M
    FLOP / 10T = 39us = 0.04ms. Adapter switch with pre-loaded: pointer assignment in compute graph =
    <1ms including scheduler notification. Total: 0.04ms + 1ms = 1.04ms. Well under 50ms target with 50x
    margin.'
