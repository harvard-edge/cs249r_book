id: mobile-0516
title: The Laggy AI Assistant
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You are a Mobile ML Systems Engineer debugging a new "AI Suggestion" feature on a flagship smartphone
  (like one with an Apple A17 Pro). The feature uses a 1B parameter on-device LLM. Users report that suggestions
  feel "laggy" and are often skipped during fast typing (around 100 WPM).
details:
  realistic_solution: The primary bottleneck is the static batching strategy, which is ill-suited for
    this real-time, high-arrival-rate workload. With requests arriving every 100ms, the 100ms batching
    timeout triggers a new batch for each keystroke. This means every request incurs a 100ms waiting penalty
    *before* inference even starts. The total latency for the user becomes `Batch_Wait_Time + TTFT = 100ms
    + 150ms = 250ms`. Since the arrival interval (100ms) is less than the service time (250ms), the request
    queue will grow indefinitely under load, leading to high latency and dropped requests. The correct
    solution is to switch to a continuous batching or a dynamic batching strategy that can immediately
    begin processing a new request without a fixed waiting timeout, dramatically reducing the queueing
    delay.
  common_mistake: Engineers often focus purely on the model's inference speed (TTFT) and assume it's the
    sole bottleneck. They might propose aggressive quantization or pruning, without realizing that the
    serving strategy and queueing dynamics around the model are the true source of latency.
  napkin_math: 1. **Request Arrival Rate (λ):** 100 WPM is ~500 characters/minute, or ~8.3 characters/second.
    Let's round to 10 req/sec for simplicity, meaning a request arrives every 100 ms.
