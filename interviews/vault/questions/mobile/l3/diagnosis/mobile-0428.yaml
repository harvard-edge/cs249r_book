id: mobile-0428
title: The Jank-Inducing Mobile Generative Model
topic: kernel-fusion
status: published
provenance: imported
scenario: You are a mobile ML engineer deploying a new generative language model for an in-app sticker
  feature on a flagship phone with a Snapdragon 8 Gen 3 SoC. The model is INT8 quantized, but you observe
  significant UI 'jank' (stuttering) during inference, which needs to run in under the 16ms frame budget
  to feel smooth. The on-device profiler shows that the current 25ms inference time is dominated by ~1,000
  sequential kernel calls. Each kernel takes ~15µs to execute, but there's a consistent ~10µs gap between
  each call where the accelerator appears idle. Apply your systems knowledge to diagnose the primary bottleneck
  and select the most effective solution.
details:
  realistic_solution: The correct diagnosis is that the model is **dispatch-bound** due to excessive kernel
    launch overhead. The most effective solution is to **apply operator fusion**. By using a compiler
    or framework feature to fuse sequential operations (e.g., a `Conv` followed by `BatchNorm` and `ReLU`)
    into a single, larger kernel, you drastically reduce the number of CPU-to-accelerator dispatches.
    This eliminates the overhead associated with each call, allowing the accelerator to spend more time
    on useful computation instead of waiting for its next instruction.
  common_mistake: 'Engineers often misdiagnose this as a raw compute or memory bandwidth problem, suggesting
    architectural changes like distillation or pruning. While these can reduce latency, they don''t address
    the root cause: the fixed, per-operation overhead of dispatching work to the accelerator (the ''death
    by a thousand cuts'' problem). The profiler''s pattern of ''work-gap-work-gap'' is the classic signature
    of kernel launch overhead dominating the tiny compute time of each individual operation.'
  napkin_math: We can model the total latency to prove the bottleneck. Total Time = Num_Kernels × (Kernel_Execution_Time
    + Dispatch_Overhead). Here, Total Time = 1,000 × (15µs + 10µs) = 1,000 × 25µs = 25ms. The dispatch
    overhead alone accounts for 10ms (40% of the total inference time). By fusing kernels, we dramatically
    reduce the multiplier (Num_Kernels), eliminating the 10µs gaps and bringing the latency closer to
    15ms (under the 16ms budget).
