schema_version: 1
id: mobile-0503
title: The Transformer's Mobile Traffic Jam
topic: neural-architecture-search
status: published
provenance: imported
scenario: You are the tech lead for a mobile AI team. Your team has a MobileNetV2-based object detector
  that meets your real-time performance budget, running in 15ms on an Apple A17 Pro's Neural Engine. A
  junior engineer proposes replacing the CNN backbone with a Vision Transformer (ViT) of a similar parameter
  count, hoping to improve accuracy. After implementation, profiling shows the new ViT-based model takes
  50ms to run a single frame, completely missing your 16ms 'jank' budget. Using your knowledge of mobile
  hardware and model architecture, diagnose the most likely root cause for the ViT's poor performance,
  despite its comparable parameter count.
details:
  realistic_solution: The most likely cause is that the Vision Transformer's self-attention mechanism
    is memory-bandwidth bound, while the MobileNetV2's depthwise separable convolutions are compute-bound
    (or at least, far more compute-intensive). Mobile NPUs like the A17's have extremely high peak compute
    (35 TOPS) but relatively limited memory bandwidth (~51.2 GB/s). The efficiency of the hardware is
    dictated by Arithmetic Intensity (AI) — the ratio of operations performed to data moved. The ViT's
    self-attention performs an all-to-all comparison between image patches, resulting in a low AI that
    constantly fetches data from the slow device DRAM. Conversely, CNNs (especially depthwise separable
    ones) exhibit high data reuse, performing many computations on the same small patch of data held in
    fast on-chip SRAM. The NPU is essentially stalling, waiting for data, which causes the massive increase
    in latency.
  common_mistake: Engineers often assume that parameter count or total FLOPs are the primary drivers of
    latency. On mobile, the memory access pattern is frequently the true bottleneck. They might incorrectly
    blame the NPU's operator support or the model's size in MB, without analyzing the *character* of the
    computation itself.
  napkin_math: We can use a Roofline Model to diagnose this. The A17 Pro's ridge point is ~683 Ops/Byte
    (35 TOPS / 51.2 GB/s). This is the minimum Arithmetic Intensity (AI) a model needs to be compute-bound.
