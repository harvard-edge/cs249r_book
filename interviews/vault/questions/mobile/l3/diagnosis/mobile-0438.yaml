id: mobile-0438
title: The On-Device Generative AI OOM
topic: data-parallelism
status: draft
provenance: imported
scenario: You are the ML Systems Engineer for a new generative AI feature on a mobile app. Your team is
  fine-tuning a 7-billion parameter language model on a single H100 (80GB HBM) to power the feature. During
  training with the Adam optimizer, you immediately get a CUDA Out-Of-Memory (OOM) error. Your goal is
  to get the training job to run. You diagnose the memory requirements and propose a solution. Which of
  the following is the most effective and direct strategy to solve this specific OOM problem?
details:
  realistic_solution: The correct solution is to apply a parameter-sharding strategy like Fully Sharded
    Data Parallelism (FSDP), also known as ZeRO. Unlike standard data parallelism, FSDP shards the model's
    parameters, gradients, and optimizer states across all the GPUs in the data-parallel group. This dramatically
    reduces the memory burden on each individual GPU, allowing much larger models to be trained than would
    fit on a single device. It directly addresses the root cause of the OOM by making the per-GPU memory
    footprint proportional to `1/N` where N is the number of GPUs, rather than being constant.
  common_mistake: The most common mistake is to suggest Data Parallelism (like PyTorch's DDP). While it's
    a form of distributed training, DDP replicates the full model, gradients, and optimizer states on
    every GPU. It helps scale batch size but does *not* reduce the single-GPU memory footprint, so it
    wouldn't solve the OOM error in this case.
  napkin_math: First, let's diagnose why it's OOMing. We use the standard rule of thumb for training memory
    with the Adam optimizer.
