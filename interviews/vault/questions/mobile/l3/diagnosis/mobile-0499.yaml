id: mobile-0499
title: The Mobile Transformer Jank Puzzle
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are a mobile ML engineer at a top social media company, responsible for a new real-time
  video filter. The filter uses a small Vision Transformer (ViT) model to apply a 'comic book' effect.
  During testing on a flagship phone (Apple A17 Pro), you observe severe UI jank; the filter is only running
  at 15 FPS instead of the required 30 FPS. Using the phone's profiler, you see that the Apple Neural
  Engine (ANE) utilization is surprisingly low, around 30%, but the system's memory bandwidth is completely
  saturated. Given these symptoms, how would you diagnose the primary performance bottleneck?
details:
  realistic_solution: The bottleneck is that the Vision Transformer's self-attention mechanism is memory-bound,
    not compute-bound. The quadratic complexity of the attention calculation (`O(N^2*d)` where N is the
    number of patches) requires large intermediate matrices (`Q @ K.T`) to be read from and written to
    memory. This floods the memory bus, preventing the NPU from being fed data fast enough, hence the
    low utilization despite the high memory traffic. The A17 Pro's NPU is 'starving' for data. The correct
    architectural solution is to replace the ViT with a model designed for high arithmetic intensity on
    mobile, such as a modern CNN using depthwise separable convolutions (e.g., MobileNetV4), which has
    better data locality and a higher ratio of computations to memory accesses.
  common_mistake: Engineers often assume low NPU/GPU utilization means the model is 'too small' and the
    fix is to increase batch size to 'fill' the processor. In this case, that would make the problem worse
    by further increasing memory pressure. Another common mistake is to blame the NPU driver or quantization,
    when the issue is the fundamental arithmetic intensity of the model architecture itself.
  napkin_math: We can diagnose this with a Roofline model analysis. The A17 Pro's ridge point is the ratio
    of its peak compute to its memory bandwidth.
