schema_version: 1
id: mobile-0668
title: The Budget Phone Crash
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: Your ML-powered camera app works perfectly on the Samsung Galaxy S24 (Snapdragon 8 Gen 3, 8
  GB RAM) but crashes on the Samsung Galaxy A15 (MediaTek Helio G99, 4 GB RAM) within 30 seconds of opening
  the camera. The model is a 15 MB INT8 segmentation model. Logcat shows `java.lang.OutOfMemoryError`
  followed by a native crash in the TFLite runtime. The model alone is only 15 MB. Why does a 15 MB model
  crash a 4 GB phone?
details:
  realistic_solution: 'The 15 MB model file expands dramatically at runtime, and the Galaxy A15''s memory
    budget is far smaller than you think:


    1. **Model weights in memory:** 15 MB (INT8, loaded into SRAM for inference)

    2. **Input tensor:** Camera feed at 1080p = 1920×1080×3 bytes ≈ 6 MB (FP32: 24 MB)

    3. **Intermediate activations:** The segmentation model''s peak activation tensor (the largest feature
    map kept in memory between layers) can be 100-200 MB for a 1080p input.

    4. **Output mask:** 1920×1080×1 = 2 MB

    5. **Runtime overhead:** TFLite runtime, delegates, memory allocator ≈ 10-20 MB

    6. **Total runtime footprint:** ~247 MB


    On the Galaxy S24 (8 GB), the per-app memory budget is ~1.5 GB, leaving plenty of headroom. On the
    Galaxy A15 (4 GB), the per-app budget is ~768 MB, but this is shared with WebViews, ad SDKs, and analytics.
    A single camera autofocus event can allocate ~200 MB in temporary buffers, pushing total usage past
    the native heap limit and triggering the OOM crash.


    **The fix:** Reduce the model''s input resolution from 1080p to 256×256. This shrinks activation memory
    by ~18×, dropping the runtime footprint from 247 MB to ~169 MB and providing enough headroom to survive
    memory spikes.'
  common_mistake: '"The model is too big for the phone — use a smaller model." 15 MB is tiny. The crash
    has nothing to do with the model''s file size.'
  napkin_math: 'Galaxy S24 (8 GB): per-app budget ~1.5 GB. Runtime footprint: 247 MB. Headroom: **1.25
    GB** ✓. Galaxy A15 (4 GB): per-app budget ~768 MB. Runtime footprint: 247 MB. Headroom: **521 MB**.
    But add a few WebViews (50 MB each), ad SDK (30 MB), analytics (20 MB): 247 + 100 + 30 + 20 = **397
    MB**. Headroom: 371 MB. One memory spike from camera auto-focus (allocates temporary buffers): +200
    MB → **597 MB** > 512 MB native limit → crash. The fix (256×256 input): activations drop 60 MB, bitmaps
    drop 18 MB. New total: 169 MB. Headroom: **599 MB**. Survives the spike.'
