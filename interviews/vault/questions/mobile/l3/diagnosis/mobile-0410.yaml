schema_version: 1
id: mobile-0410
title: The Catastrophic Accuracy Drop
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You are an ML engineer on a mobile AI team. You've successfully trained a computer vision model
  in FP32 to recognize retail products with 95% accuracy. To deploy it on an iPhone with an A17 Pro chip,
  you use post-training static quantization to convert the model to INT8. The model now runs extremely
  fast on the Neural Engine, but its accuracy has plummeted to 20%. Your profiling shows all ops are running
  on the NPU as expected. The calibration dataset was a small set of 100 images taken in your well-lit
  office. Diagnose the most likely cause of this catastrophic accuracy failure.
details:
  realistic_solution: The most likely cause is a **calibration data mismatch**. The quantization scale
    (S) and zero-point (Z) are calculated based on the dynamic range (min/max activation values) observed
    in the calibration dataset. Your office dataset was not representative of the varied lighting and
    product arrangements in a real store. When the model encounters real-world images, activations spike
    beyond the range observed during calibration, leading to massive clipping (overflow). This clipping
    discards critical information, destroying the model's accuracy.
  common_mistake: Engineers often blame the hardware or the quantization format itself, saying 'INT8 isn't
    precise enough.' They fail to realize that the quality of the quantization output is critically dependent
    on the input data used during the calibration step. A small or unrepresentative calibration set is
    a common cause of failure.
  napkin_math: Let's say a key ReLU activation in your office images has a maximum value of 6.0. The static
    quantizer sets the scale to map `[-6.0, 6.0]` to the INT8 range `[-128, 127]`. Now, in a real store
    with bright spotlights, the same activation spikes to 20.0. When quantized, this value is clipped
    to 127. Any value from 6.0 to 20.0 (and beyond) gets mapped to the same maximum integer value. This
    loss of dynamic range for important features is catastrophic. The model can no longer distinguish
    between a 'bright' feature and a 'very bright' one.
