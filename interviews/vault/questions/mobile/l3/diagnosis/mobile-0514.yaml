schema_version: 1
id: mobile-0514
title: The Saturated AR Filter
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are a Mobile ML Engineer at a social media company. You've been tasked with optimizing a
  new AR filter that uses a MobileNetV3 backbone for feature extraction. The original FP32 model works
  perfectly. To meet the 16ms per-frame budget on an Apple A17 Pro, you use post-training static quantization
  (PTQ) to convert the model to INT8. On your 10,000-image test set, the accuracy degradation is less
  than 0.5% and latency is excellent. However, after shipping the feature, you get bug reports that the
  filter's output is 'a garbled, glitchy mess' but only for users in bright, outdoor environments. Indoor
  performance is fine. What is the most likely cause of this failure?
details:
  realistic_solution: The root cause is a dynamic range mismatch. The dataset used for post-training static
    quantization calibration did not contain images with the same brightness and contrast as the real-world
    outdoor scenes. The activation values in some intermediate layers of the network are exceeding the
    [min, max] range captured during calibration. When these floating-point values are converted to INT8,
    they are 'clipped' to the min/max of the INT8 range (e.g., 127), causing a massive loss of information
    (overflow). This error then propagates and amplifies through the rest of the network, resulting in
    a nonsensical final output. The correct first step is to collect a more representative calibration
    dataset that includes these bright outdoor images and re-run the PTQ process.
  common_mistake: Engineers often immediately blame the hardware (e.g., 'the NPU has a bug') or the model
    architecture ('MobileNet is unstable'). Another common mistake is jumping to the most complex solution,
    like retraining with Quantization-Aware Training (QAT), without first diagnosing the data issue. The
    core problem is almost always a mismatch between the data used for calibration and the data seen in
    production.
  napkin_math: '1. **Calibration range example:** Calibration dataset yields activation range [−2.0, +2.0].
    Scale = (2.0 − (−2.0)) / 255 ≈ 0.0157. Zero point = 128.

    2. **Outdoor scene activation:** Bright sunlight produces activation value = +5.0.

    3. **Quantize:** q = round(5.0 / 0.0157) + 128 = round(318.5) + 128 = 447 → clipped to 255 (INT8 max).

    4. **Dequantize:** (255 − 128) × 0.0157 = 1.99 ≈ 2.0. True value was 5.0 → **60% of the signal is
    lost**.

    5. **Impact:** This clipping happens across many channels simultaneously, destroying feature information
    and producing garbled output.'
