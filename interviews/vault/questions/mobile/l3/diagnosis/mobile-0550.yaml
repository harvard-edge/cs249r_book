id: mobile-0550
title: The Sluggish Voice Assistant
topic: latency-decomposition
status: published
provenance: imported
scenario: You are an ML systems engineer on a team building an in-car voice assistant powered by an on-device
  LLM. The system runs on a modern automotive SoC with a 45 TOPS NPU. Users report the assistant feels
  'sluggish'—there is a long, noticeable pause before the first word of its response appears (Time to
  First Token, or TTFT), but subsequent words generate quickly (fast Time Per Output Token, or TPOT).
details:
  realistic_solution: The root cause is head-of-line blocking in the simple FIFO queue. A low-priority,
    long-running task (the 150ms music ID) blocks the high-priority, latency-sensitive task (the 80ms
    voice prefill). The user's request is forced to wait for the entire background task to finish before
    it can even begin.
  common_mistake: Engineers often focus only on the compute cost of the task itself (the prefill), assuming
    it's the bottleneck because it's computationally heavy. They forget that in a real system with multiple
    concurrent requests, the scheduling and queueing discipline (how tasks wait for the shared processor)
    often dominates the end-user-perceived latency. They misattribute the symptom (latency) to the task
    instead of the system's management of tasks.
  napkin_math: A 1B param model in INT8 requires ~1GB memory. At 45 TOPS, compute takes 2 GFLOPs / 45
    TOPS = 0.04ms/token. But memory bandwidth is the bottleneck! Reading 1GB at 50GB/s SoC bandwidth =
    20ms/token (50 tok/s). A sluggish 1-second pause means it's queuing ~50 tokens for prefill before
    output.
