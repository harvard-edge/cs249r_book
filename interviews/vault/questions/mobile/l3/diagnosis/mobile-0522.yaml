schema_version: 1
id: mobile-0522
title: The Sluggish Co-Pilot
topic: latency-decomposition
status: published
provenance: imported
scenario: 'You are a mobile ML engineer optimizing an on-device LLM assistant for a new ''hands-free driving''
  feature. The UI must feel instantly responsive. Users complain that the assistant takes too long to
  start talking. Your metrics confirm this: Time-To-First-Token (TTFT) is ~800ms, but the Time-Per-Output-Token
  (TPOT) is a speedy ~50ms. The model is a 3B parameter transformer quantized to INT4, running on an Apple
  A17 Pro. The hard deadline for the UI to receive the first token is 500ms. Given these symptoms, diagnose
  the most likely performance bottleneck.'
details:
  realistic_solution: The bottleneck for the 800ms TTFT is the prompt processing (pre-fill) phase, which
    is heavily compute-bound. To generate the first token, the model must perform a massive, parallel
    matrix-matrix multiplication (GEMM) across the entire input prompt. This operation has high arithmetic
    intensity, meaning it is limited by the NPU's peak compute capacity (35 TOPS on the A17 Pro), taking
    significant time to crunch the math. Conversely, the 50ms TPOT during the decode phase is memory-bandwidth
    bound. Generating subsequent tokens relies on matrix-vector multiplications (GEMV), which have very
    low arithmetic intensity. The NPU is starved waiting to load the 1.5 GB model weights from DRAM for
    every token, constrained by the phone's ~51.2 GB/s memory bandwidth.
  common_mistake: Engineers often confuse the bottlenecks of the two LLM inference phases. They incorrectly
    assume pre-fill is memory-bound and decode is compute-bound. In reality, pre-fill is a massive GEMM
    operation (compute-bound), while decode generates tokens one-by-one via GEMV, heavily bottlenecking
    on main memory bandwidth.
  napkin_math: '1. **Phases:** TTFT (800ms) = Pre-fill. TPOT (50ms) = Decode.

    2. **Pre-fill:** Computes all prompt tokens in parallel (GEMM). High arithmetic intensity, making
    it compute-bound. The A17 Pro''s 35 TOPS take significant time to crunch a long prompt matrix.

    3. **Decode:** Generates one token at a time (GEMV). Low arithmetic intensity, memory-bandwidth bound.
    Since the 1.5GB weights must be streamed through the NPU for each token, the 51.2 GB/s memory bandwidth
    dictates the 50ms TPOT.'
