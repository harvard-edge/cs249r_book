schema_version: 1
id: mobile-0420
title: The Case of the Disappearing Pixels
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are a mobile ML engineer debugging a real-time object detection model on a new smartphone.
  The model runs at the target 30 FPS on the NPU, but you observe a 50% accuracy drop for small objects
  compared to your validation results. The training pipeline used high-quality bicubic resizing to downscale
  images to the model's 640x480 input. On the device, the camera sensor captures at 12MP (4000x3000) and
  uses the hardware Image Signal Processor (ISP) for a 'zero-cost' resize before sending the frame to
  the NPU. Your lead suspects this ISP resize is the culprit. Apply your systems knowledge to diagnose
  the most likely cause of the accuracy degradation.
details:
  realistic_solution: The root cause is training-serving skew introduced by the ISP's low-quality resizing
    algorithm. Hardware resizers on mobile ISPs often use simple, power-efficient algorithms like nearest-neighbor
    or bilinear filtering to meet extreme power and latency budgets. This is fundamentally different from
    the high-fidelity bicubic resizing used during training. This discrepancy causes significant information
    loss for high-frequency details, which is exactly what defines small objects, leading to the severe
    accuracy drop.
  common_mistake: Engineers often focus only on compute latency (FPS) and memory, assuming that if the
    model runs fast, the hardware is working correctly. They forget that on mobile, the data pipeline
    from the sensor through the ISP is a critical, and often lossy, part of the system that can introduce
    subtle training-serving skew. A 'free' hardware block often comes with hidden quality tradeoffs.
  napkin_math: ISP downscales 12MP (4000x3000) to 0.3MP (640x480). A small object occupying 30x30 pixels
    in the 12MP image becomes (30 * 640/4000) x (30 * 480/3000) = 4.8 x 4.8 pixels in the 0.3MP frame.
    This is below the minimum receptive field (typically 8x8 or 16x16 pixels) for standard object detection
    anchors. The 50% accuracy drop is due to destroying spatial information before the NPU even sees it.
