schema_version: 1
id: mobile-0067
title: The Accessibility Breakage
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Your messaging app uses an on-device ML model to generate smart reply suggestions. After your
  latest update, blind users using VoiceOver (iOS) and TalkBack (Android) report that the app is 'unusable'
  — the smart reply buttons appear but VoiceOver reads them as 'button, button, button' instead of reading
  the suggested text. Sighted users see the suggestions fine. What went wrong?
details:
  realistic_solution: 'Race condition between ML inference and accessibility tree. UI creates empty buttons,
    triggers async inference (50ms), updates labels on completion. VoiceOver builds its tree within 5ms
    — before labels arrive. Fix: don''t show buttons until inference completes (50ms < 100ms perceptual
    threshold). Post UIAccessibility.post(.layoutChanged) after setting labels. Add CI tests with 0ms
    inference mock to verify labels exist before visibility. ~5% of iOS users use accessibility — this
    affects millions.'
  common_mistake: '"This is a UI bug, not an ML bug." It''s both. The ML pipeline''s output format directly
    affects accessibility, and the fix requires understanding the inference timing.'
  napkin_math: 'Inference time: 50 ms. VoiceOver tree build: <5 ms after button creation. Race window:
    50 ms (inference) - 5 ms (tree build) = 45 ms where tree has stale labels. VoiceOver users: ~5% of
    iOS users use accessibility features. Affected users: 5% × DAU. Fix latency: 50 ms delay for button
    appearance (below 100 ms perceptual threshold). Accessibility notification overhead: <1 ms. Testing:
    add a CI check that runs Accessibility Inspector on all ML-powered UI elements with a 0 ms inference
    mock to catch race conditions.'
