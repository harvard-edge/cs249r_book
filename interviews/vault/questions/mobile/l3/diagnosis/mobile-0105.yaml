id: mobile-0105
title: The Battery Drain Dilemma
topic: power-budgeting
status: published
provenance: imported
scenario: Your team is profiling an on-device ML model for a new camera feature. You observe that running
  the model on the CPU uses less peak power than on the GPU, but the GPU still completes inference faster.
  Why might this be the case, and which would you prefer for a battery-sensitive application?
details:
  realistic_solution: 'GPUs, especially on mobile SoCs, are designed for high parallelism and throughput.
    While they can achieve lower *latency* for complex ML tasks by processing more data in parallel, they
    often do so at a higher *peak power draw* when active. CPUs, particularly the smaller "little" cores
    in a big.LITTLE configuration, might have lower peak power but take longer to complete the task. The
    key metric for battery life is *energy consumption* (Power × Time). If the GPU completes the task
    significantly faster, its total energy consumption might be lower, even with higher peak power, because
    it spends less time in the high-power state. For a battery-sensitive application, you''d prefer the
    accelerator that minimizes total energy (Joules), not just peak power (Watts). This often involves
    trade-offs: a quick burst on the GPU might be better than a longer, lower-power CPU run if the GPU''s
    power-time product is lower.'
  common_mistake: '"The CPU is more efficient, so it uses less power." While true for some tasks, peak
    power isn''t the only factor.'
  napkin_math: A CPU running at 1.5W for 50ms consumes 75mJ. A GPU running at 3.0W for 20ms consumes 60mJ.
    In this scenario, the GPU is more energy efficient despite higher peak power.
