schema_version: 1
id: mobile-0413
title: The Transformer Tax on Mobile
topic: attention-scaling
status: published
provenance: imported
scenario: Your team is building a 'visual search from camera' feature on an iPhone with an A17 Pro SoC.
  The latency budget is 100ms. The V1 model, a MobileNetV3 CNN, runs in 80ms. A new hire proposes switching
  to a small Vision Transformer (ViT) of similar parameter count, citing its superior accuracy. You benchmark
  the ViT and find it's 5x slower (~400ms), completely missing the budget. Diagnose the architectural
  reason for the ViT's poor latency on mobile hardware, despite its comparable size.
details:
  realistic_solution: The ViT is dramatically slower due to the memory access patterns of its core self-attention
    mechanism. Self-attention calculates a score between every single pair of input patches (tokens).
    This results in non-local, effectively random memory accesses as it reads from the large Q, K, and
    V matrices stored in DRAM. CNNs, by contrast, exhibit strong locality—a convolution only looks at
    a small, nearby window of pixels. Mobile memory subsystems (caches, prefetchers, NoC) are highly optimized
    for this kind of local, contiguous access. The ViT's access pattern thrashes the cache and is perpetually
    bottlenecked by the SoC's DRAM bandwidth (~51.2 GB/s on the A17 Pro), leaving the powerful 35 TOPS
    Apple Neural Engine starved for data. It's a classic case of being memory-bandwidth bound.
  common_mistake: Assuming that because ViTs are state-of-the-art for large models, they must also be
    superior when scaled down. Engineers might incorrectly blame the parameter count, activation size,
    or specific unsupported ops, without identifying the fundamental mismatch between the self-attention
    mechanism and mobile memory systems.
  napkin_math: Let's apply the Roofline model. The A17 Pro's ridge point is ~683 Ops/Byte. The self-attention
    operation (`Q * K^T`) has a very low Arithmetic Intensity. For 196 tokens (14x14 patches) of dimension
    768, the FLOPs are `2 * 196 * 768 * 196 ≈ 59 MFLOPs`. The memory accessed is `(2 * 196 * 768) + (196
    * 196) ≈ 340 K-elements`, or `~680 KB` in FP16. This gives an AI of `59e6 / 680e3 ≈ 87 Ops/Byte`.
    Since 87 is far less than the 683 ridge point, the operation is severely memory-bound. The latency
    is determined by how fast the 51.2 GB/s memory can deliver the data, not by the 35 TOPS of compute.
