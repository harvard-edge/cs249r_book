id: mobile-0426
title: The Jank Frame Catastrophe
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are the ML systems engineer for a live video filter app on a new Snapdragon 8 Gen 3 phone.
  The app must render at a smooth 30 FPS (33ms per frame). Your core ML model takes 20ms for inference.
  During testing, you notice that whenever a system notification appears, the app stutters and drops frames.
  A profiler trace shows that during the notification animation, your model's inference latency spikes
  to 55ms. Diagnose the most likely cause of this behavior.
details:
  realistic_solution: The root cause is resource contention on the System-on-a-Chip (SoC). The mobile
    OS is scheduling another task—rendering the notification animation—which competes for the same GPU
    execution units and memory bandwidth that your inference task requires. This contention forces your
    model to wait, causing its latency to spike from 20ms to 55ms, thus missing the 33ms real-time deadline
    and causing a visible stutter ('jank'). The correct solution involves using OS-level Quality of Service
    (QoS) APIs to request a higher, real-time priority for your inference thread, signaling to the scheduler
    that it should preempt other, less critical work.
  common_mistake: Engineers often blame the model or the hardware in isolation ('The model is too big,'
    or 'The phone is too slow'). They forget that a mobile SoC is a shared resource ecosystem. A sudden
    performance drop correlated with an external event is almost always a resource contention issue, not
    a flaw in the model itself.
  napkin_math: Target budget is 33.3ms for 30 FPS. ML model uses 20ms. Camera capture + ISP takes ~5ms,
    display rendering takes ~5ms. Remaining budget = 33.3 - 20 - 5 - 5 = 3.3ms. A system notification
    UI render or context switch easily consumes 5-10ms on the CPU/GPU, pushing the total frame time to
    35-40ms. This exceeds the 33.3ms deadline, causing the pipeline to drop the frame and produce visible
    jank.
