id: mobile-0559
title: The Saturated Stop Sign
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You are a mobile ML engineer deploying a new sign detection model to an automotive system running
  on a Snapdragon 8 Gen 3 SoC. To meet the latency budget, you convert the model from FP32 to per-tensor
  INT8 quantization using a representative calibration dataset. During testing, you discover that while
  overall accuracy is acceptable, the model's recall for 'Stop Sign' has dropped to almost zero, a critical
  safety failure. You profile the activations of the final convolutional layer and find that for most
  signs (like 'Speed Limit'), the maximum activation value is around `45.0`. However, for stop signs,
  especially at night with headlight glare, the maximum activation value spikes to `550.0`. What is the
  most likely cause of this catastrophic accuracy drop for a single class, and how would you solve it?
details:
  realistic_solution: The root cause is activation overflow poisoning the quantization parameters. With
    per-tensor quantization, the scaling factor is determined by the absolute maximum value observed across
    the entire calibration dataset. The `550.0` outlier from the stop sign forces the quantization range
    to be very large. This results in a small scaling factor that maps the vast majority of useful activations
    (in the `~45.0` range) to a tiny, non-descriptive range of integers, effectively destroying their
    information content.
  common_mistake: Engineers often blame the model architecture or assume INT8 is simply not precise enough.
    They switch to a higher-precision format like FP16, sacrificing performance gains, when the actual
    problem is a fixable data distribution issue. The key is that quantization is not just about type
    conversion; it's about mapping one distribution of values onto another, and outliers can poison that
    mapping.
  napkin_math: Let's analyze the quantization resolution.
