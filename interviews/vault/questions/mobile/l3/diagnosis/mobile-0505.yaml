id: mobile-0505
title: The Mobile App's Cloud Latency Mystery
topic: collective-communication
status: published
provenance: imported
scenario: You are a mobile ML engineer on the AI Assistant team. Your new cloud-backed feature is suffering
  from high P99 latency. On-device processing is fast (<10ms), but the end-to-end time is averaging ~180ms.
  The backend team, which runs a 2-GPU tensor-parallel inference service for your feature on H100s, provides
  you with the following average timing breakdown from their traces. Your task is to apply your systems
  knowledge to diagnose the most likely hardware bottleneck.
details:
  realistic_solution: The bottleneck is the interconnect *between the two GPUs on the same server*. The
    85ms sync time is far too high for the expected NVLink bridge that directly connects H100s. This latency
    profile strongly indicates the GPUs are not on the same NVLink fabric and are instead being forced
    to communicate over the much slower PCIe bus. A properly configured H100 server with NVLink should
    see this sync time be an order of magnitude lower. This is a classic symptom of a server misconfiguration
    or a bad host allocation in the cluster, where a 2-GPU job was accidentally scheduled on two cards
    that don't have a direct, high-speed NVLink path.
  common_mistake: Engineers often blame the wrong communication layer. They might see 'interconnect' and
    immediately think of the rack-level network (InfiniBand), without considering that the bottleneck
    is often *inside* a single server. Another common mistake is to ignore the trace data and assume the
    model is simply 'too big' or 'compute-bound', when the data clearly shows synchronization overhead
    is double the compute time.
  napkin_math: End-to-end is 180ms. Mobile inference is 10ms. Network round-trip ~50ms. Remaining backend
    latency = 120ms. A 2-GPU tensor-parallel setup requires an All-Reduce sync between every layer. If
    there are 32 layers exchanging 20MB each, total data = 640MB per token generation. Over PCIe Gen4
    (32GB/s), 640MB takes 20ms. If generating 10 tokens, sync takes 200ms. Missing NVLink bridges causes
    the latency!
