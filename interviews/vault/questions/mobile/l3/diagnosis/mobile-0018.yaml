schema_version: 1
id: mobile-0018
title: The ML Notification Backlash
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Your news app uses an on-device ML model to predict which articles a user will click, and sends
  push notifications for high-confidence predictions. After launching the feature on the Google Pixel
  8 (Tensor G3), your app's rating drops from 4.5 to 3.2 stars in two weeks. Reviews say 'too many notifications'
  and 'the app thinks it knows what I want but it's wrong.' The model has 78% precision on your test set.
  What went wrong?
details:
  realistic_solution: '78% precision at high volume is a UX disaster: 22% irrelevant x 40 notifications/day
    = 8.8 bad notifications, far exceeding user tolerance of 3-5 total. Fix: cap at 3 notifications/day,
    selecting highest-confidence predictions. Top-3 from 40 candidates achieves ~95% precision. Bad notifications
    drop from 8.8 to 0.15/day. Open rate improves from 12% (fatigue) to 38% (curated). The error: optimizing
    ML precision without accounting for asymmetric false-positive cost in notifications.'
  common_mistake: '"78% precision means 78% of notifications are relevant — that''s pretty good." 78%
    precision means 22% of notifications are *irrelevant*. At high notification volume, that''s a disaster.'
  napkin_math: 'Before fix: 40 notifications/day, 22% irrelevant = 8.8 bad notifications/day. User tolerance:
    3-5/day total. Annoyance factor: 40/5 = 8× over tolerance. After budget cap (3/day): top-3 from 40
    candidates. Precision of top-3: ~95% (high-confidence items are more accurate). Bad notifications:
    0.15/day. User satisfaction: dramatically improved. Rating recovery timeline: 4-6 weeks (users slowly
    update reviews). Notification open rate: before (12% — notification fatigue), after (38% — fewer,
    better notifications). Revenue impact: 38% × 3 = 1.14 opened/day vs 12% × 40 = 4.8 opened/day. Fewer
    opens but higher quality engagement and retention.'
