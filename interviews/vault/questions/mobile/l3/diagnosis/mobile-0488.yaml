id: mobile-0488
title: The On-Device AI Stutter
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'You are a mobile ML engineer optimizing a new on-device ''AI Reply'' feature that streams generated
  text into a chat app. The goal is a smooth, real-time experience, but users report a ''stutter'': the
  first word appears instantly, but the rest of the sentence emerges in slow, uneven chunks, making the
  UI feel janky. You are using a 1B parameter model on a phone with an Apple A17 Pro (35 TOPS NPU). You
  diagnose the system with a profiler and get the following data:'
details:
  realistic_solution: The root cause is a stateless generation loop that recomputes the attention keys
    and values for the entire token sequence for every new token. This is a classic implementation bug
    when deploying generative models without an efficient KV cache. With a KV cache, the computation for
    each new token is constant time because the state of past tokens is preserved and reused. Without
    it, the computation grows linearly with the sequence length, causing the per-token latency to increase
    until it violates the UI's 16ms frame budget, resulting in stutter. The data clearly shows latency
    growing with sequence length.
  common_mistake: Engineers often blame the hardware's raw TOPs or memory bandwidth, assuming a faster
    NPU or memory bus is the only fix. This overlooks algorithmic complexity. They fail to recognize the
    linear or quadratic computational cost of naive text generation, where the problem isn't the speed
    of one operation, but the rapidly growing number of operations.
  napkin_math: The KV cache stores Key/Value tensors for past tokens. At sequence length L, attention
    must read L tokens from memory for every new token. For a 3B model (d_model=3072, 32 heads), one token's
    KV cache is 2 * 3072 * 2 bytes = 12KB. At L=1000, that's 12MB. Reading 12MB per generated token at
    50 GB/s mobile bandwidth takes 0.24ms. As L grows, memory transfer dominates, causing the noticeable
    stutter.
