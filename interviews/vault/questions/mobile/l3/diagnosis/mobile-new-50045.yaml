schema_version: 1
id: mobile-new-50045
title: Android NNAPI Delegation Failures and Fallback Performance
topic: software-portability
status: published
provenance: imported
scenario: Your INT8 image classification model runs at 5ms on Snapdragon 8 Gen 3 via NNAPI delegate targeting
  the Hexagon NPU. On a Samsung Exynos 2400 device (also with NNAPI), the same model runs at 45ms — 9x
  slower. Both devices claim 'NNAPI delegate active'. What went wrong?
details:
  realistic_solution: 'Samsung''s Exynos NNAPI driver has incomplete NPU op coverage. When an op is not
    supported by the NPU, the entire sub-graph falls back to CPU execution via NNAPI''s CPU reference
    implementation. Check with NNAPI''s getDevices() API to enumerate available accelerators, then use
    setPreference(PREFER_SUSTAINED_SPEED) and allowDevice() to force NPU execution and identify which
    ops cause fallback. Common culprits: custom activations, grouped convolutions, or non-standard tensor
    types. Fix: partition the model so NPU-unsupported ops run via TFLite''s CPU kernel (faster than NNAPI
    CPU fallback) while NPU-supported ops use NNAPI.'
  common_mistake: Trusting that 'NNAPI delegate active' means the NPU is being used. NNAPI is an abstraction
    layer — the actual backend (NPU, GPU, or CPU) is selected by each vendor's NNAPI driver. An active
    delegate does not guarantee NPU execution.
  napkin_math: 'Snapdragon NPU at 45 TOPS: 5ms inference. CPU fallback at ~4 TOPS effective: 5ms x (45/4)
    = ~56ms expected. Actual 45ms suggests partial NPU execution (~60% on NPU, 40% on CPU).'
