id: mobile-0523
title: The Multi-Node Scaling Cliff
topic: collective-communication
status: published
provenance: imported
scenario: You're a mobile ML engineer responsible for an object detection model in a flagship smartphone
  app. To iterate faster, your team is using a cloud cluster of H100 servers. You observe that training
  scales almost perfectly on a single server up to 8 GPUs. However, when you scale the job to 32 GPUs
  across 4 servers, your throughput only improves by 20%, not the expected 4x. Profiling data reveals
  that the `AllReduce` collective communication step is now taking up 70% of each training step's wall
  time. What is the most likely cause of this scaling problem?
details:
  realistic_solution: The bottleneck is the interconnect between the server nodes. Inside a single H100
    server, the 8 GPUs communicate over NVLink 4.0, which has a massive 900 GB/s of bandwidth. When the
    `AllReduce` operation has to cross the server boundary to the other 24 GPUs, it must traverse the
    much slower inter-node network fabric, likely InfiniBand NDR at 400 Gbps (50 GB/s). This ~18x drop
    in bandwidth means the GPUs spend most of their time waiting for gradients to be exchanged between
    nodes, leading to poor scaling efficiency.
  common_mistake: Engineers often misdiagnose scaling bottlenecks. They might blame the model size, the
    optimizer, or the CPU, without appreciating the massive performance hierarchy of data center interconnects.
    The jump from intra-node (NVLink) to inter-node (InfiniBand/Ethernet) is often the single biggest
    performance cliff in distributed training.
  napkin_math: Let's quantify the bandwidth drop.
