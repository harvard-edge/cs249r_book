title: The Smart Reply Battery Drain (mobile-0295)
scenario: "Your team is shipping a new 'smart reply' feature on a smartphone. When a notification arrives, an on-device model runs for 2 seconds to generate suggestions. During this time, the model's inference task adds exactly 2 Watts to the phone's total power draw. Assume the user receives 180 notifications evenly throughout a day."
question: "How do you calculate the total energy the 'smart reply' feature consumes from the battery in one day in Watt-hours (Wh)?"
details:
  realistic_solution: |
    Accurately calculate battery impact by first determining the total daily duty cycle active time in hours, then multiply by the active power draw. Confusing Watts (instantaneous power) with Watt-hours (energy capacity) leads to grossly inaccurate battery modeling.
  common_mistake: |
    **The Pitfall:** Confusing power (Watts) with energy (Watt-hours).
    **The Rationale:** Candidates fail to convert the total active time from seconds to hours before multiplying by power.
    **The Consequence:** An answer that is wildly incorrect, completely misrepresenting actual battery drain to product managers.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Events per day: 180 notifications.
       - Active duration: 2 seconds per event.
       - Active power: 2 Watts.
    2. **Calculations:**
       - Total daily run time: 180 * 2s = 360 seconds.
       - Convert to hours: 360s / 3600s/hr = 0.1 hours.
       - Total energy: 2W * 0.1h = 0.2 Wh.
    3. **Conclusion & Interpretation:**
       - **Result: 0.2 Wh.** The total battery drain is negligible, demonstrating a successful **duty-cycling optimization**.
  options:
  - 720 Wh
  - 12 Wh
  - 0.2 Wh
  - 360 Wh
  correct_index: 2
