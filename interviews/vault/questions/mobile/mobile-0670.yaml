title: The Quantization Bandwidth Boon
scenario: You've successfully quantized a large image segmentation model from FP32 to INT8, reducing its size from 200MB to 50MB. While the model load time improved, the inference latency only decreased by 15%, not the 4x you expected from the size reduction.
question: What's a primary reason for this limited latency improvement, especially on a memory-bound mobile NPU?
details:
  realistic_solution: The primary reason is that **memory bandwidth often becomes the bottleneck before computation throughput is fully utilized**, especially for models with many layers or large intermediate tensors. While the *model weights* are smaller, the *activations* (intermediate tensors) still need to be moved between on-chip caches, main memory (DRAM), and the NPU's processing units. If the model is already memory-bound in FP32, reducing weight size alone won't significantly improve performance if the activation data movement remains the dominant factor. Furthermore, the NPU might have internal data paths that are still 32-bit wide for intermediate results, or data transfer overheads might dominate.
  common_mistake: |
    **The Pitfall:** Assuming that reducing weight size by 4x automatically reduces inference latency by 4x.
    **The Rationale:** While INT8 ops might not be 4x faster, in a memory-bound scenario, computation speed isn't the bottleneck—it's the data movement of *both* weights and activations.
    **The Consequence:** Engineers are surprised when quantization yields diminishing returns because activation memory footprint remains unchanged.
  napkin_math: |
    - Weights (W): 200 MB FP32 → 50 MB INT8.
    - Activations (A): 100 MB per layer (unchanged by weight quantization).
    - Memory BW: 50 GB/s.
    - FP32 Baseline (memory-bound): Data read = W + A = 200 + 100 = 300 MB. Latency = 300 MB / 50 GB/s = 6.0 ms.
    - INT8 Quantized: Data read = W_q + A = 50 + 100 = 150 MB. Latency = 150 MB / 50 GB/s = 3.0 ms.
    - Speedup: 6.0 / 3.0 = 2.0×, not 4×.
    - If activations heavily dominate (e.g. W=200 MB, A=800 MB): FP32 total = 1000 MB, INT8 total = 850 MB.
    - **Observed 15% improvement (1000/850 = 1.18× ≈ 15%) implies activations dominate the memory traffic.**
