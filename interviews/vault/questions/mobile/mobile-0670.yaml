title: The Quantization Bandwidth Boon
scenario: You've successfully quantized a large image segmentation model from FP32 to INT8, reducing its
  size from 200MB to 50MB. While the model load time improved, the inference latency only decreased by
  15%, not the 4x you expected from the size reduction. What's a primary reason for this limited latency
  improvement, especially on a memory-bound mobile NPU?
details:
  realistic_solution: The primary reason is that **memory bandwidth often becomes the bottleneck before
    computation throughput is fully utilized**, especially for models with many layers or large intermediate
    tensors. While the *model weights* are smaller, the *activations* (intermediate tensors) still need
    to be moved between on-chip caches, main memory (DRAM), and the NPU's processing units. If the model
    is already memory-bound in FP32, reducing weight size alone won't significantly improve performance
    if the activation data movement remains the dominant factor. Furthermore, the NPU might have internal
    data paths that are still 32-bit wide for intermediate results, or data transfer overheads might dominate.
  common_mistake: '"The NPU isn''t truly 4x faster for INT8." While true that INT8 ops might not be 4x
    faster than FP32 ops on all NPUs, the question hints at a memory-bound scenario, where computation
    speed isn''t the primary bottleneck.'
  napkin_math: 'Assume a memory-bound model with:

    - Weights (W): 200 MB FP32 → 50 MB INT8.

    - Activations (A): 100 MB per layer (unchanged by weight quantization).

    - Memory BW: 50 GB/s (mobile LPDDR5).


    **FP32 Baseline (memory-bound):**

    - Data read per inference: W + A = 200 + 100 = 300 MB.

    - Memory-bound latency: 300 MB / 50 GB/s = **6.0 ms**.


    **INT8 Quantized:**

    - Data read per inference: W_q + A = 50 + 100 = 150 MB.

    - Memory-bound latency: 150 MB / 50 GB/s = **3.0 ms**.

    - Speedup: 6.0 / 3.0 = **2.0×**, not 4×.


    **Why only 2× not 4×:**

    - Weight quantization reduced W by 4×, but activations (A) are unchanged.

    - The ratio depends on W:A. Here W:A = 2:1, so total data shrinks by only 2×.

    - If activations dominate (W:A = 1:3, i.e., W=100, A=300): INT8 W_q=25 MB, total goes from 400 MB
    to 325 MB → speedup = 400/325 = **1.23×**.

    - Additionally, dequantization overhead (INT8→FP32 for accumulation) adds ~5% compute.


    **Observed 15% improvement** implies activations heavily dominate:

    - If A = 800 MB: FP32 total = 1000 MB, INT8 total = 850 MB → 1000/850 = 1.18× ≈ 15% improvement.'
