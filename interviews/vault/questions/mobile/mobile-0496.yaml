title: The Federated Photobomber Fallacy
scenario: You are an ML Systems Engineer on a popular photo-sharing app with 10 million active users. Your team wants to A/B test a new 'Magic Eraser' feature trained to remove photobombers.
question: "What cost makes the proposed Federated Learning Magic Eraser training plan impractical despite privacy benefits?"
details:
  realistic_solution: The primary bottleneck is the unacceptable cumulative battery
    drain on each user's device. While a single 5-second training round is trivial,
    repeating it a thousand times imposes a massive energy cost that users will notice
    and complain about. This 'death by a thousand cuts' makes the proposed FL strategy
    economically and practically infeasible, as it would severely degrade the app
    experience and lead to uninstalls. The cost is not just electricity, but user
    trust and engagement.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the network costs of FL.
    **The Rationale:** Engineers correctly identify that uploading gradients is expensive, but significantly underestimate the aggregate user-side cost of on-device computation.
    **The Consequence:** Deploying an FL system that causes unacceptable battery drain, harming user experience and leading to app uninstalls.
  napkin_math: |
    - Model: 50M parameters (0.1 GB weights).
    - Compute per image: ~0.3 TFLOPS.
    - Batch of 32 images: ~10 TFLOPS.
    - NPU Compute Time (35 TOPS): ~0.3 seconds.
    - Energy for 100 batches at 4W: 4W × 30s = 120 Joules.
    - Network Energy: Transmitting 0.1 GB over Wi-Fi (100 MB/s at 1W) takes 1 second = 1 Joule.
    - **Conclusion:** Compute energy (120J) massively dominates network energy (1J), destroying battery life over thousands of rounds.
  options:
  - The network bandwidth required to upload model updates from 10 million clients
    across 1,000 rounds is the primary cost bottleneck.
  - The cumulative on-device energy consumption will lead to unacceptable battery
    drain for users.
  - The cloud compute cost for the central server to aggregate gradients from millions
    of clients will be the most expensive part of the system.
  - The model will likely have poor final accuracy due to non-IID data from users,
    making the effort technically infeasible regardless of cost.
