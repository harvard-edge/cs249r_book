title: On-Device LLM Budgeting for Snapdragon 8 Gen 3
scenario: 'You are designing an on-device conversational agent using a 7B parameter LLM. The device has 12 GB of shared memory, but the OS permanently reserves 6 GB. You must adhere to a strict 6 GB unified memory budget for weights, activations, and a 4096-token KV-cache.'
question: 'How should a 7B on-device LLM be budgeted under a 6 GB memory cap while supporting a 4096-token context window?'
details:
  realistic_solution: 'A robust L6+ solution involves aggressively quantizing the 7B model weights to 4-bit (e.g., AWQ or GPTQ) to reduce the parameter footprint to ~3.5 GB, as INT8 weights alone would exceed the 6 GB budget. The remaining 2.5 GB must accommodate the KV-cache and activations. The candidate should propose INT8 quantization for the KV-cache to halve its size and design a heterogeneous pipeline where the NPU handles the compute-heavy self-attention in INT8, leveraging the unified LPDDR5X architecture to avoid expensive memory copies between the CPU and NPU.'
  common_mistake: |
    **The Pitfall:** Forgetting that mobile memory is unified and overlooking KV-cache scaling.
    **The Rationale:** Candidates treat the 6 GB as dedicated VRAM exclusively for weights.
    **The Consequence:** Proposing INT8 weights (7 GB) or unquantized KV-caches, which exhaust the budget and crash the app.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Available Memory Budget: 6 GB.
       - 7B Model at 4-bit weights: 3.5 GB.
       - 4096-token FP16 KV-cache: ~2.0 GB.
    2. **Calculations:**
       - Total Memory: 3.5 GB (weights) + 2.0 GB (KV) = 5.5 GB.
       - Remaining for activations: 6.0 GB - 5.5 GB = 0.5 GB.
       - Quantizing KV to INT8: 1.0 GB.
    3. **Conclusion & Interpretation:**
       - **Result: 5.5 GB footprint (Fits 6 GB Budget via 4-bit Quantization).**
