title: On-Device LLM Budgeting for Snapdragon 8 Gen 3
scenario: You are designing an on-device conversational agent using a 7B parameter LLM deployed on a smartphone. The device has 12 GB of shared memory, but the OS and background apps permanently reserve 6 GB. You must design an inference architecture that maximizes NPU throughput while strictly adhering to the remaining 6 GB unified memory budget for weights, activations, and KV-cache, ensuring support for a 4096-token context window.
question: How should a 7B on-device LLM be budgeted under a 6 GB memory cap while supporting a 4096-token context window?
details:
  realistic_solution: A robust L6+ solution involves aggressively quantizing the 7B model weights to 4-bit (e.g., AWQ or GPTQ) to reduce the parameter footprint to ~3.5 GB, as INT8 weights alone would exceed the 6 GB budget. The remaining 2.5 GB must accommodate the KV-cache and activations. The candidate should propose INT8 quantization for the KV-cache to halve its size and design a heterogeneous pipeline where the NPU handles the compute-heavy self-attention in INT8, leveraging the unified LPDDR5X architecture to avoid expensive memory copies between the CPU and NPU.
  common_mistake: |
    **The Pitfall:** Forgetting that mobile memory is unified and overlooking KV-cache scaling.
    **The Rationale:** Candidates incorrectly treat the 6 GB as dedicated VRAM specifically for weights.
    **The Consequence:** They propose INT8 weights (which take 7GB and immediately OOM) or leave the KV-cache unquantized, which exhausts the remaining bounds entirely.
  napkin_math: |
    1. Total Memory Budget: 12 GB - 6 GB (OS) = 6 GB.
    2. 7B Model Weights at 4-bit: 7 billion * 0.5 bytes = 3.5 GB.
    3. Standard FP16 KV-cache per token: 2 (K,V) * 32 layers * 32 heads * 128 (head dim) * 2 bytes = 512 KB.
    4. For 4096 tokens in FP16: 4096 * 512 KB = 2.0 GB.
    5. Total required in FP16: 3.5 GB (weights) + 2.0 GB (KV-cache) = 5.5 GB (fits within 6 GB budget, leaving 500 MB for activations).
    6. **Result: Quantizing the KV-cache to INT8 would further reduce it to 1.0 GB, massively increasing the safety margin.**
