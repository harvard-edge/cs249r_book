title: The Secure Enclave Boundary
scenario: Your banking app uses on-device face verification. The ML model runs on the main NPU and returns a 128-dim embedding. The embedding is compared against the enrolled template stored in the Secure Enclave. A security researcher points out that the embedding travels from the NPU through main memory to the Secure Enclave and can be intercepted.
question: How do you protect the embedding in transit, and why can't you just run the ML model inside the Secure Enclave?
details:
  realistic_solution: The Secure Enclave (Apple) / StrongBox (Android) is a dedicated security processor with ~256 KB of memory and a simple RISC core. It handles cryptographic operations (AES, RSA, ECC) and key storage. It cannot run a face verification model that requires ~50 MB of working memory and millions of MAC operations.
  common_mistake: |
    **The Pitfall:** Assuming the Secure Enclave can run arbitrary neural networks.
    **The Rationale:** Candidates think "end-to-end security" means pushing the entire ML execution into the secure hardware.
    **The Consequence:** They propose technically impossible architectures, as the Enclave lacks the memory and compute capability for ML.
  napkin_math: |
    - **Enclave Limits:** Secure Enclave has ~256 KB of memory.
    - **Model Size:** MobileFaceNet requires ~5 MB weights + ~20 MB activations = 25 MB.
    - **Size Ratio:** 25 MB / 256 KB = 100x too large.
    - **Transit Attack Window:** 512 bytes moving through DRAM takes ~0.1µs.
    - **Final Result:** **The model physically cannot fit in the Enclave; security relies on hardware isolation of the memory bus (Apple) or software encryption (Android).**
  options:
  - Edge-side health checks should focus on hardware metrics (CPU, memory); model-level metrics like confidence scores are too noisy to be useful.
  - The Secure Enclave (Apple) / StrongBox (Android) is a dedicated security processor with ~256 KB of memory and a simple RISC core. It handles cryptographic operations (AES, RSA, ECC) and key storage. It cannot run a face verification model that requires ~50 MB of working memory and millions of MAC operations.
  - Run the face verification model inside the Secure Enclave for end-to-end security.. The Secure Enclave is a tiny, fixed-function processor — it can't run neural networks.
  - Model obfuscation through weight scrambling provides equivalent security to hardware-backed encryption for protecting intellectual property.
  correct_index: 1
