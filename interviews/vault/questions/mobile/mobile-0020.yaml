title: The Secure Enclave Boundary
scenario: Your banking app uses on-device face verification (FaceID/BiometricPrompt). The ML model runs
  on the main NPU and returns a 128-dim embedding. The embedding is compared against the enrolled template
  stored in the Secure Enclave (Apple) or StrongBox (Android). A security researcher points out that the
  embedding travels from the NPU through main memory to the Secure Enclave — and can be intercepted. How
  do you protect the embedding in transit, and why can't you just run the ML model inside the Secure Enclave?
details:
  realistic_solution: The Secure Enclave (Apple) / StrongBox (Android) is a dedicated security processor
    with ~256 KB of memory and a simple RISC core. It handles cryptographic operations (AES, RSA, ECC)
    and key storage. It cannot run a face verification model that requires ~50 MB of working memory and
    millions of MAC operations.
  common_mistake: '"Run the face verification model inside the Secure Enclave for end-to-end security."
    The Secure Enclave is a tiny, fixed-function processor — it can''t run neural networks.'
  napkin_math: 'Secure Enclave memory: ~256 KB. Face verification model (MobileFaceNet): ~5 MB weights
    + ~20 MB activations = 25 MB. Ratio: 25 MB / 256 KB = **100× too large** for the Secure Enclave. Embedding
    size: 128 × 4 bytes = 512 bytes. Transit time through DRAM: ~0.1µs. Attack window: 0.1µs — extremely
    narrow, but a kernel-level attacker with DMA access could capture it. Apple''s hardware isolation:
    0µs in DRAM — the embedding never leaves the secure data path. Cost of Apple''s approach: custom silicon
    design ($100M+ NRE). Cost of Android''s approach: software encryption ($0, but weaker guarantee).'
  options:
  - Edge-side health checks should focus on hardware metrics (CPU, memory); model-level metrics like confidence
    scores are too noisy to be useful.
  - The Secure Enclave (Apple) / StrongBox (Android) is a dedicated security processor with ~256 KB of
    memory and a simple RISC core. It handles cryptographic operations (AES, RSA, ECC) and key storage.
    It cannot run a face verification model that requires ~50 MB of working memory and millions of MAC
    operations.
  - Run the face verification model inside the Secure Enclave for end-to-end security.. The Secure Enclave
    is a tiny, fixed-function processor — it can't run neural networks.
  - Model obfuscation through weight scrambling provides equivalent security to hardware-backed encryption
    for protecting intellectual property.
  correct_index: 1
