title: The App Memory Diet
scenario: You're adding an on-device ML feature to an app. The target device is a typical modern smartphone with 8 GB of RAM.
question: What is a reasonable rule-of-thumb memory budget for your entire feature, including the model and runtime activations, to avoid being terminated by the OS?
details:
  realistic_solution: A reasonable budget is approximately 25% of the total device RAM. On an 8 GB device, this gives you a 2 GB budget. This rule of thumb accounts for the significant memory footprint of the OS, other apps running in the background, and provides a buffer to prevent your app from being flagged as a memory hog and terminated.
  common_mistake: |
    **The Pitfall:** Assuming the app can use a large fraction of the device's total RAM (e.g., 6-7 GB).
    **The Rationale:** Engineers accustomed to cloud or desktop development forget that mobile OSes and background services consume a significant, protected portion of memory.
    **The Consequence:** The app exceeds the implicit memory budget and gets aggressively terminated by the OS, leading to a poor user experience.
  napkin_math: |
    - Device RAM: 8GB. OS + system services: ~3GB. Background apps: ~1-2GB.
    - Available for foreground app: ~3-4GB.
    - Safe rule: 25% of total = 8GB * 0.25 = 2GB budget.
    - **A 500M param INT8 model (800MB total footprint) fits comfortably within this 2GB budget.**
  options:
  - 6 GB
  - 8 GB
  - 256 MB
  - 2 GB
  correct_index: 3
