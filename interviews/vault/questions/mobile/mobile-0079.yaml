title: The Camera Preview Stutter
scenario: 'Your photo app runs a real-time beauty filter (face landmark detection + skin smoothing) on a Snapdragon 8 Elite. The camera preview runs at 30 FPS (33ms budget). The ML model takes 8ms on the Hexagon NPU. The skin smoothing shader takes 5ms on the Adreno GPU. Total: 13ms — well within budget. But users report visible stutter every 2-3 seconds. Instruments shows the frame time spiking to 80ms periodically.'
question: Why do Snapdragon 8 Elite beauty-filter frames spike to 80ms every few seconds despite 13ms of ML and GPU work?
details:
  realistic_solution: 'The periodic spikes are caused by **garbage collection and memory compaction** colliding with the real-time pipeline. Normal frame: 8ms NPU + 5ms GPU + 3ms overhead = 16ms, well within the 33ms budget. But every 5-10 seconds, the Java/Kotlin GC triggers a 10-15ms stop-the-world pause. If this coincides with frame processing, the total jumps to 59-80ms, dropping 1-2 frames and causing visible stutter. Auto-exposure adjustments from the ISP add another 33ms stall when lighting changes. Fix: (1) Eliminate allocations in the hot path — use pre-allocated ring buffers for camera frames, model I/O tensors, and GPU textures. Zero-alloc callbacks avoid triggering GC. (2) Use a quad-buffer pipeline: while frame N displays, frame N+1 does GPU post-processing, frame N+2 runs NPU inference, and frame N+3 captures from camera. This absorbs single-frame GC pauses without visible drops. (3) Pin ML buffers outside the managed heap using native memory (NDK) so they''re invisible to GC. Result: P99 latency drops from 80ms to 28ms, eliminating user-visible stutter.'
  common_mistake: |
    **The Pitfall:** Blaming intermittent thermal throttling for the periodic spikes.
    **The Rationale:** Candidates default to thermal throttling as a catch-all for mobile performance degradation.
    **The Consequence:** Missing the highly regular pattern of the spikes, which points to a software/memory management issue (Garbage Collection).
  napkin_math: |
    *   **Normal Frame Time:** 8 ms (NPU) + 5 ms (GPU) + 3 ms (overhead) = 16 ms (< 33 ms budget).
    *   **GC Spike:** 10 ms GC pause + 33 ms missed frame + 16 ms processing = **59 ms** (drops 1 frame).
    *   **AE Stall + GC:** 33 ms ISP stall + 10 ms GC + 16 ms = **59-80 ms** (drops 2 frames).
    *   **Fixed Pipeline:** Zero-alloc quad-buffer absorbs the stall. Worst case latency: 16 ms + 5 ms (buffer swap) = **21 ms** (< 33 ms budget).
