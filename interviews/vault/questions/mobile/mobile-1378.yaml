title: On-Device ISP Concept Drift Detection
scenario: You are leading the ML reliability team for a flagship smartphone's computational
  photography pipeline running on the Samsung Exynos 2400 NPU. The camera ISP continuously
  feeds 4K frames at 60 FPS into a scene-understanding model, but users are reporting
  degraded image enhancement in novel lighting conditions (concept drift). Design
  a continuous on-device drift detection architecture that calculates statistical
  drift (e.g., KL Divergence) on intermediate feature embeddings without dropping
  frames, accounting for the dual-core NPU's 34.7 TOPS limit and the shared 12 GB
  LPDDR5X memory.
question: How would you detect ISP concept drift on Exynos 2400 without dropping 4K
  60 FPS camera frames?
details:
  realistic_solution: A robust L6+ architecture uses a lightweight projection head
    to compress high-dimensional NPU feature maps into low-dimensional signatures
    (e.g., running histograms) asynchronously using the secondary NPU core. These
    signatures are updated in the shared LPDDR5X memory and periodically aggregated
    to compute Population Stability Index (PSI) or KL Divergence against a reference
    baseline on the CPU, triggering a telemetry alert only when a drift threshold
    is breached.
  common_mistake: Candidates often suggest logging raw frames or full-precision dense
    feature vectors to the cloud, violating privacy constraints and bandwidth limits.
    Another common mistake is attempting to compute complex statistical divergences
    synchronously on the NPU's primary core per-frame, causing latency spikes that
    drop frames in the strict 16.6ms budget.
  napkin_math: For a 60 FPS camera pipeline, the per-frame latency budget is 16.6ms.
    If the main model requires 25 TOPS, the Exynos 2400 NPU (34.7 TOPS) has 9.7 TOPS
    remaining, easily handling a lightweight projection head. Storing raw 1024-dim
    float32 embeddings for a 10-minute video session requires 1024 * 4 bytes * 60
    FPS * 600s = ~147 MB, which creates unnecessary read/write pressure on the shared
    12 GB LPDDR5X. By updating a running 64-bin 32-bit integer histogram per frame
    on the NPU, memory footprint drops to just 256 bytes total, and memory bandwidth
    drops from ~240 KB/s to near zero, preserving ISP and GPU memory bandwidth.
