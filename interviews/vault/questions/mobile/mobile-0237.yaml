title: The Fleet-Level Cost of an 'Always-On' Mobile Feature
scenario: A driver drowsiness detection feature running on a vehicle's mobile-grade SoC increases power draw by a constant 2W.
question: What is the annual energy cost across a fleet of 1 million cars if the feature is used 1.5 hours per day?
details:
  realistic_solution: 'The correct way to solve this is to first calculate the total energy consumed per year for the entire fleet, and then multiply by the cost per unit of energy.'
  common_mistake: |
    **The Pitfall:** Confusing Watts with Watt-hours or failing unit conversions.
    **The Rationale:** Focusing purely on R&D CapEx and neglecting fleet-wide operational OpEx calculations.
    **The Consequence:** Severely underestimating the long-term financial cost of deploying an always-on feature.
  napkin_math: |
    **Assumptions & Constraints:**
    - Power draw: 2W.
    - Usage: 1.5 hours/day.
    - Fleet size: 1,000,000 cars.
    - Energy cost: $0.17 / kWh.

    **Calculations:**
    - Daily energy per car = 2W * 1.5 h/day = 3 Wh/day.
    - Annual energy per car = 3 Wh/day * 365 days = 1,095 Wh = 1.095 kWh.
    - Fleet annual energy = 1.095 kWh * 1,000,000 cars = 1,095,000 kWh.
    - Total cost = 1,095,000 kWh * $0.17/kWh = $186,150.

    **Conclusion & Interpretation:**
    - **Result: $186,150 annual fleet energy cost (Operational OpEx).**
  options:
  - '$186.15'
  - '$186,150,000'
  - '$186,150'
  - '$2,978,400'
