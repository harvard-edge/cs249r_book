title: The Fleet-Level Cost of an 'Always-On' Mobile Feature
scenario: You're an ML systems engineer at an automotive company considering a new driver drowsiness detection
  feature that runs on the car's built-in mobile-grade SoC. The feature, when active, increases the SoC's
  power draw by a constant 2W.
details:
  realistic_solution: The correct way to solve this is to first calculate the total energy consumed per
    year for the entire fleet, and then multiply by the cost per unit of energy.
  common_mistake: Engineers often focus on the one-time R&D cost (CapEx) for a feature, but forget the
    recurring operational cost (OpEx), especially when that cost is passed on to the customer through
    something like battery drain. A common calculation error is to confuse power (a rate, in Watts) with
    energy (an amount, in Watt-hours) or to make a unit conversion error when calculating the final cost
    (e.g., forgetting to convert Watt-hours to kiloWatt-hours).
  napkin_math: 2 W × 1.5 h/day × 365 days × 1,000,000 cars × ($0.17 / 1000 Wh) = $186,150
  options:
  - $186.15
  - $186,150,000
  - $186,150
  - $2,978,400
  correct_index: 2
