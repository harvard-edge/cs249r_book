title: On-Device Inference Cost on Snapdragon 8 Gen 3
scenario: You are tasked with deploying a 1 billion parameter generative model on a premium smartphone
  powered by a Qualcomm Snapdragon 8 Gen 3. The device features a heterogeneous CPU+GPU+NPU architecture,
  with the Hexagon NPU capable of 45 TOPS in INT8, and utilizes a shared 16 GB LPDDR5X memory pool. Given
  a real-time requirement of generating 20 tokens per second, analyze the compute and memory requirements
  to determine if this specification can be met, identifying the primary system bottleneck.
question: "How would you estimate on-device inference cost on Snapdragon 8 Gen 3 from compute and memory limits?"
details:
  realistic_solution: A strong solution analyzes the problem by distinguishing between compute limits
    and memory bandwidth limits. The candidate should recognize that for a 1B parameter model quantized
    to INT8, loading the weights for each token generation step over the shared LPDDR5X bus is the true
    bottleneck, far exceeding the compute time on the 45 TOPS NPU.
  common_mistake: Candidates often calculate execution time simply by dividing the total operations by
    the peak 45 TOPS of the Hexagon NPU, failing to realize that autoregressive generation is entirely
    memory-bandwidth bound due to the shared LPDDR5X architecture.
  napkin_math: 'Model size in INT8: 1B params * 1 byte/param = 1 GB. LPDDR5X bandwidth (approximate):
    ~64 GB/s. Time to read weights from shared memory per token: 1 GB / 64 GB/s = 15.6 ms. Compute operations
    per token: ~2 GOPs (2 * 1B). Compute time on 45 TOPS NPU: 2 GOPs / 45,000 GOPs = 0.044 ms. Since 15.6
    ms (memory) >> 0.044 ms (compute), the system is memory bound. Time per token = ~15.6 ms. Tokens per
    second = 1000 ms / 15.6 ms = 64 tokens/sec, which safely meets the 20 tokens/sec requirement.'
