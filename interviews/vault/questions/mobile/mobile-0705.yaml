title: The Adaptive Precision Challenge
scenario: You're deploying a real-time audio processing model on a mobile device. The input audio amplitude
  can vary wildly depending on the environment (quiet room vs. loud concert). Static INT8 post-training
  quantization (PTQ) leads to significant accuracy degradation during high-amplitude spikes or very low-amplitude
  signals. How would you adapt your quantization strategy to maintain accuracy while still leveraging
  INT8 performance on mobile hardware?
question: "How would you adapt your quantization strategy to maintain accuracy while still leveraging INT8 performance on mobile hardware?"
details:
  realistic_solution: "The most effective approach for varying input distributions while maintaining INT8\
    \ performance is dynamic range quantization for activations, combined with static quantization for\
    \ weights.\n  1.  Dynamic Activations: For input tensors and activations, calculate the min/max range\
    \ *at runtime* for each batch or inference step. This allows the quantization scale and zero-point\
    \ to adapt to the actual data distribution. This is often implemented as quantize_and_dequantize operations\
    \ inserted into the graph, where the quantization parameters are determined per-tensor.\n  2.  Static\
    \ Weights: Model weights are typically quantized statically (e.g., during PTQ or QAT) as their distribution\
    \ is fixed.\n  3.  Hybrid Approach: Modern frameworks (like TFLite) support a \"hybrid\" quantization\
    \ where weights are INT8, but activations are dynamically quantized to INT8 on the fly. This avoids\
    \ the need for a calibration dataset to cover all possible input ranges and adapts to unseen distributions.\
    \ The core computation (e.g., matrix multiplication) still benefits from INT8 acceleration.\n  4.\
    \  Layer-Specific Precision: For highly sensitive layers, consider keeping them in FP16 or even FP32,\
    \ accepting a slight performance trade-off for critical accuracy. This is a form of mixed-precision."
  common_mistake: '"Re-quantize the model on the fly." While conceptually related, re-quantizing the *entire
    model''s weights* dynamically is too slow and memory-intensive for real-time mobile inference.'
  napkin_math: 'Dynamic Quantization: For each activation tensor of size N elements, calculating min/max
    takes O(N) operations. This overhead is typically much smaller than the actual matrix multiplication/convolution
    operations, especially for larger tensors. | E.g., for a 1MB activation tensor (250k FP32 elements),
    finding min/max takes ~0.25 MFLOPS. A typical NPU can do GigaFLOPS, so this overhead is negligible.
    | If a model has 100 layers, and each activation requires dynamic quantization, total overhead for
    min/max calculation is $100 \times O(N_{avg})$.'
