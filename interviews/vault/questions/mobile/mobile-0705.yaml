title: The Adaptive Precision Challenge
scenario: 'You''re deploying a real-time audio processing model on a mobile device. Static INT8 post-training quantization (PTQ) leads to significant accuracy degradation during varying input audio amplitudes.'
question: 'How would you adapt your quantization strategy to maintain accuracy while still leveraging INT8 performance on mobile hardware?'
details:
  realistic_solution: "The most effective approach for varying input distributions while maintaining INT8 performance is dynamic range quantization for activations, combined with static quantization for weights.\n  1.  Dynamic Activations: For input tensors and activations, calculate the min/max range *at runtime* for each batch or inference step. This allows the quantization scale and zero-point to adapt to the actual data distribution. This is often implemented as quantize_and_dequantize operations inserted into the graph, where the quantization parameters are determined per-tensor.\n  2.  Static Weights: Model weights are typically quantized statically (e.g., during PTQ or QAT) as their distribution is fixed.\n  3.  Hybrid Approach: Modern frameworks (like TFLite) support a \"hybrid\" quantization where weights are INT8, but activations are dynamically quantized to INT8 on the fly. This avoids the need for a calibration dataset to cover all possible input ranges and adapts to unseen distributions. The core computation (e.g., matrix multiplication) still benefits from INT8 acceleration.\n  4.  Layer-Specific Precision: For highly sensitive layers, consider keeping them in FP16 or even FP32, accepting a slight performance trade-off for critical accuracy. This is a form of mixed-precision."
  common_mistake: |
    **The Pitfall:** Attempting to dynamically re-quantize the entire model (including weights) on the fly.
    **The Rationale:** Candidates know dynamic distributions break static PTQ models, so they suggest a complete runtime requantization.
    **The Consequence:** Catastrophically slow and memory-intensive overheads that break real-time mobile inference.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Min/Max calculations required on activations of size N.
       - 1 MB tensor: ~250k FP32 elements.
    2. **Calculations:**
       - O(N) operations to find min/max.
       - Computation overhead: ~0.25 MFLOPS per layer.
       - Mobile NPU capability: GigaFLOPS range.
    3. **Conclusion & Interpretation:**
       - **Result: ~0.25 MFLOPS Overhead (Negligible Compute Cost for Dynamic Activations).**
