title: 'Latency Decomposition: Compute TTFT and TPOT for On-Device LLM on Snapdragon 8 Gen 3'
scenario: A 2B-parameter LLM (INT4 quantized) runs on Snapdragon 8 Gen 3 (45 TOPS INT8, 16GB LPDDR5X at
  ~77 GB/s effective). Compute TTFT for a 256-token prompt and TPOT for decode. Assume 32 layers, hidden
  dim 2560.
question: "How would you compute TTFT for a 256-token prompt and TPOT for decode?"
details:
  realistic_solution: 'INT4 model size: 2B × 0.5 bytes = 1GB. Decode BW-bound: 1GB / 77GB/s ≈ 13ms/token.
    TTFT: 2×256×2B×2 FLOPs = 2.05T FLOPs. At 45 TOPS INT8 → INT4 effective ~90 TOPS. 2.05T/90T ≈ 22ms.
    Realistic with memory overhead: ~40ms TTFT, 13ms/token decode.'
  common_mistake: Using INT8 TOPS spec for INT4 model without noting that INT4 throughput is typically
    2× INT8 on Snapdragon (Hexagon DSP supports INT4 natively in Gen 3).
  napkin_math: 'INT4 weights: 2B × 4 bits / 8 = 1GB. LPDDR5X BW: 77 GB/s. Decode: 1/77 = 13ms/token. Prefill
    FLOPs: 2×256×2B×2=2.048T. INT4 TOPS ≈ 90T (2× INT8): 2.048/90 = 22.8ms. Realistic utilization 60%:
    22.8/0.6 = 38ms TTFT.'
