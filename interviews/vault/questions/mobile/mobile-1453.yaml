title: On-Device Telemetry Budgeting for A17 Pro Neural Engine
scenario: You are deploying a continuous on-device face analysis pipeline for a photography app running on the Apple A17 Pro. The pipeline runs at 30 FPS, utilizing the 16-core Neural Engine (35 TOPS) to keep power draw under the ~5W budget while sharing the 8 GB unified memory with the ISP and GPU. To ensure reliability across the fleet, you need to implement observability to detect model drift, performance stragglers, and out-of-memory errors without impacting the user experience or draining the battery.
question: How would you budget on-device telemetry for A17 Pro without sending raw logs or exceeding battery limits?
details:
  realistic_solution: The correct approach is to implement local aggregation and thresholding. Instead of sending raw data, the device should compute rolling statistics (e.g., P99 latency, average memory usage, drift scores via lightweight local clustering) over a session and only upload anomalies or compact summaries when the device is plugged in and on Wi-Fi. Critical errors (like OOMs) can trigger immediate, small payload alerts.
  common_mistake: |
    **The Pitfall:** Sending raw inference latencies or activation samples per frame.
    **The Rationale:** Candidates treat mobile devices like cloud servers, ignoring the massive energy cost of cellular radios.
    **The Consequence:** Telemetry transmission consumes ~2W, pushing the system over thermal limits, throttling inference, and draining the battery.
  napkin_math: |
    - **Raw Telemetry Cost:** 1 KB/frame × 30 FPS = **30 KB/sec** (~1.8 MB/min).
    - **Raw Power Penalty:** Continuous 5G radio transmission burns **~1-2W** (Exceeds budget).
    - **Aggregated Telemetry Cost:** 20 bytes/frame (5 float stats).
    - **Session Storage:** 20 bytes × 30 FPS × 300s (5 mins) = **180 KB total**.
    - **Conclusion:** Sending a 180 KB compressed payload once per session drops radio wake time to milliseconds, completely mitigating battery drain.
