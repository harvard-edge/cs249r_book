title: 'On-Device Telemetry Budgeting for A17 Pro Neural Engine'
scenario: 'You are deploying a continuous on-device face analysis pipeline for a photography app running at 30 FPS. To ensure reliability across the fleet, you need to implement observability to detect model drift, performance stragglers, and out-of-memory errors without impacting the user experience or draining the battery.'
question: 'How would you budget on-device telemetry for A17 Pro without sending raw logs or exceeding battery limits?'
details:
  realistic_solution: 'Implement local aggregation and thresholding. Instead of sending raw data, the device computes rolling statistics (e.g., P99 latency, average memory usage, drift scores via lightweight local clustering) over a session and only uploads anomalies or compact summaries when the device is plugged in and on Wi-Fi. Critical errors (like OOMs) trigger immediate, small payload alerts.'
  common_mistake: |
    **The Pitfall:** Sending raw inference latencies or activation samples per frame.
    **The Rationale:** Candidates treat mobile devices like cloud servers, ignoring the massive energy cost of cellular radios.
    **The Consequence:** Telemetry transmission consumes ~2W, pushing the system over thermal limits, throttling inference, and draining the battery.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame Rate: 30 FPS.
    - Raw Telemetry Size: 1 KB/frame.
    - Aggregated Telemetry Size: 20 bytes/frame (5 float stats).
    - Session Duration: 300s (5 mins).

    **Calculations:**
    - Raw Telemetry Cost: 1 KB/frame * 30 FPS = 30 KB/sec (~1.8 MB/min).
    - Session Storage (Aggregated): 20 bytes * 30 FPS * 300s = 180 KB total.

    **Conclusion & Interpretation:**
    - **Result: 180 KB (Power-Bound)**. Continuous 5G radio transmission burns ~1-2W. Sending a 180 KB compressed payload once per session drops radio wake time to milliseconds, mitigating battery drain.
