title: Memory-Mapped On-Device LLM Initialization
scenario: You are deploying a 3.2 GB on-device LLM (similar to Gemini Nano) to a device
  running the Google Tensor G3. The device has 12 GB of LPDDR5X memory, but the OS
  and background services consume 7.5 GB, leaving only 4.5 GB of free RAM. To avoid
  cold start latency and OOM errors, you decide to use memory mapping (mmap) for the
  weights. Calculate the required memory bandwidth to achieve 15 tokens per second
  and determine if the physical RAM is sufficient to hold the model alongside runtime
  activations.
question: How would you calculate the required memory bandwidth to achieve 15 tokens
  per second and determine if the physical RAM is sufficient to hold the model alongside
  runtime activations?
details:
  realistic_solution: By using `mmap`, the 3.2 GB file is mapped directly into the
    virtual address space without allocating application heap memory, relying entirely
    on the OS page cache. Since 4.5 GB of RAM is free, the entire 3.2 GB model can
    comfortably become resident in the page cache. To sustain 15 tokens/sec, the system
    must stream these weights from the LPDDR5X RAM to the on-device TPU continuously.
  common_mistake: Candidates often assume that loading a 3.2 GB file requires a 3.2
    GB heap allocation, which risks OOM crashes when combined with context and KV
    cache overhead. They also frequently forget that autoregressive decoding is memory-bandwidth
    bound, requiring a full read of the weight matrix for every single generated token.
  napkin_math: '1. Free RAM = 12.0 GB (LPDDR5X) - 7.5 GB (System) = 4.5 GB.

    2. Model Page Cache Footprint = 3.2 GB. Remaining RAM for KV cache and activations
    = 4.5 GB - 3.2 GB = 1.3 GB (Safe margin).

    3. Autoregressive Decoding Read = 3.2 GB weights read per token.

    4. Required Memory Bandwidth = 3.2 GB/token * 15 tokens/sec = 48.0 GB/sec. This
    48 GB/s requirement is easily serviced by the Tensor G3''s LPDDR5X memory subsystem.'
