title: Memory-Mapped On-Device LLM Initialization
scenario: You are deploying a 3.2 GB on-device LLM to a device running the Google Tensor G3. The device has 12 GB of LPDDR5X memory, but the OS and background services consume 7.5 GB, leaving only 4.5 GB of free RAM. To avoid cold start latency and OOM errors, you use memory mapping (mmap) for the weights.
question: How would you calculate the required memory bandwidth to achieve 15 tokens per second and determine if the physical RAM is sufficient to hold the model alongside runtime activations?
details:
  realistic_solution: By using `mmap`, the 3.2 GB file is mapped directly into the virtual address space without allocating application heap memory, relying entirely on the OS page cache. Since 4.5 GB of RAM is free, the entire 3.2 GB model can comfortably become resident in the page cache. To sustain 15 tokens/sec, the system must stream these weights from the LPDDR5X RAM to the on-device TPU continuously.
  common_mistake: |
    **The Pitfall:** Assuming loading a 3.2 GB file requires a 3.2 GB application heap allocation.
    **The Rationale:** Candidates forget that memory mapping maps the file directly into virtual address space, relying entirely on the OS page cache rather than application RAM.
    **The Consequence:** They unnecessarily abort deployment fearing an Out-Of-Memory (OOM) crash, missing a perfectly viable memory architecture.
  napkin_math: |
    1. **RAM Budget:** Free RAM = 12.0 GB - 7.5 GB = 4.5 GB.
    2. **Page Cache Footprint:** Model size is 3.2 GB. Remaining RAM for KV cache and activations = 4.5 GB - 3.2 GB = 1.3 GB (Safe margin).
    3. **Decoding Requirement:** Autoregressive decoding reads the full 3.2 GB weight matrix per token.
    4. **Bandwidth Needed:** 3.2 GB/token × 15 tokens/sec = 48.0 GB/sec.
    **Result:** The entire model fits cleanly in the **OS page cache**, and the **48.0 GB/s** streaming requirement is fully supported by the Tensor G3's memory subsystem.
