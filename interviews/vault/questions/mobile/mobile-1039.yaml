title: 'Mobile TCO Design: On-Device vs Hybrid Inference Cost for Consumer App'
scenario: Design the inference cost model for a consumer LLM app with 1 million monthly active users. Each user makes 20 queries/day, with 100 output tokens/query. The mobile NPU handles queries on-device for 70% of users. The remaining 30% use older devices that offload to cloud H100 at $0.001/1K tokens.
question: Calculate the monthly cloud cost, optimize the cutoff, and estimate annual savings from increasing the on-device fraction to 85%.
details:
  realistic_solution: |
    Compute the baseline cloud cost for the 30% segment. Increasing the on-device fraction to 85% requires engineering optimization (e.g., INT4 Post-Training Quantization) for older SoCs. The savings are substantial ($108K/year), but you must factor in potential quality degradation on 15 TOPS devices. A robust design proposes deploying a smaller 3B student model to older devices and A/B testing a 5% cohort before full rollout to prevent churn.
  common_mistake: |
    **The Pitfall:** Ignoring the quality-churn trade-off when expanding on-device support.
    **The Rationale:** Candidates fixate purely on the cloud compute savings and forget that aggressively quantizing models for older hardware degrades UX, potentially increasing churn.
    **The Consequence:** The project saves $100K in cloud compute but loses millions in revenue due to increased user attrition.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Users: 1M MAU. Queries: 20/day/user. Tokens: 100/query.
       - Cloud cost: $0.001 per 1,000 tokens.
    2. **Calculations:**
       - 30% Cloud Base: 1M * 0.3 = 300K users.
       - Monthly tokens: 300K * 20 * 30 days * 100 = 18 Billion tokens.
       - 30% Cost: 18B * ($0.001 / 1000) = $18,000/month.
       - 85% On-Device (15% Cloud): 1M * 0.15 = 150K users.
       - 15% Cost: 9 Billion tokens * ($0.001 / 1000) = $9,000/month.
       - Monthly Savings: $9,000. Annual Savings: $108,000.
    3. **Conclusion & Interpretation:**
       - **Annual savings reach $108,000. Bottleneck: Inference OpEx.**
