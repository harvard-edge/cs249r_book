title: Calculating Fallback Model Budget on Exynos 2400
scenario: An AR app runs real-time object tracking on an Exynos 2400 NPU (34.7 TOPS peak). Under heavy camera load, the system throttles NPU performance down by 40% to maintain thermal limits.
question: What is the maximum GOPS per frame a fallback model can require to sustain a strict 30 FPS under 40% throttling?
details:
  realistic_solution: The correct approach is to first calculate the degraded compute capacity available to the NPU under throttling. Since the system is throttled down by 40%, the available compute is 60% of the peak 34.7 TOPS. To ensure the fallback model meets the 30 FPS requirement, you divide the throttled TOPS by 30 to find the maximum operations allowed per frame. This budget directly informs the architecture and quantization level of the fallback model deployed during graceful degradation.
  common_mistake: |
    **The Pitfall:** Calculating the fallback budget based on the theoretical maximum TOPS.

    **The Rationale:** Forgetting to apply the 40% degradation factor or failing to properly convert TOPS to GOPS.

    **The Consequence:** Deploying a fallback model that still drops frames and causes motion sickness when the system is throttled.
  napkin_math: |
    *   Peak compute capacity: 34.7 TOPS.
    *   Throttled compute (60% of peak): 34.7 TOPS * 0.60 = 20.82 TOPS.
    *   Target frame rate: 30 FPS.
    *   Maximum operations per frame: 20.82 TOPS / 30 FPS = 0.694 TOPS.
    *   **Result:** 694 GOPS per frame maximum for the fallback model.
