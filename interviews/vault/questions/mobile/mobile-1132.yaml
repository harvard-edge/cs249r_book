title: On-Device LLM Degradation Ladder for Tensor G3
scenario: You are designing an on-device live translation feature using Gemini Nano for a flagship phone powered by the Google Tensor G3. The device has 12 GB of LPDDR5X memory and an on-device TPU capable of 7.5 TOPS.
question: How do you ensure the translation service remains fail-operational without degrading the overall OS experience under severe memory or thermal pressure?
details:
  realistic_solution: 'A robust architecture uses a multi-tiered degradation ladder. Tier 1 (Ideal): Gemini Nano on TPU for maximum quality. Tier 2 (Thermal throttle): Reduce context window or generation length to lower TPU utilization and heat. Tier 3 (Memory pressure): Proactively unload the large LLM and fallback to a lightweight, dedicated INT8 translation model (e.g., ~150MB) running on the CPU. Tier 4 (Extreme constraint): Fallback to a cloud API if network is available, or degrade to an asynchronous translation queue.'
  common_mistake: |
    **The Pitfall:** Proposing a simple binary fallback (either full TPU LLM or cloud API) without intermediate on-device states.
    **The Rationale:** Candidates ignore the latency and power cost of moving a multi-gigabyte model in and out of memory during sudden memory pressure events.
    **The Consequence:** The system either crashes (OOM) or suffers severe latency spikes, ruining the user experience.
  napkin_math: |
    - Gemini Nano RAM footprint: ~2.5 GB. Total RAM: 12 GB.
    - Heavy foreground usage: 9 GB. Free RAM: 12 - 9 = 3 GB. (Leaving only 0.5 GB free after Nano, risking OOM).
    - Swapping to a 150 MB fallback model frees 2.35 GB.
    - Normal TPU compute: 7.5 TOPS (~20 tokens/sec).
    - Throttled TPU compute: 2.5 TOPS (~6 tokens/sec).
    - **At 6 tokens/sec, user-perceived latency exceeds the 200ms real-time threshold, triggering the fallback condition.**
