title: 'On-Device LLM Degradation Ladder for Tensor G3'
scenario: You are designing an on-device live translation feature using a 3B parameter LLM for a flagship phone with 12 GB of RAM and an on-device TPU.
question: How do you ensure the translation service remains fail-operational without degrading the overall OS experience under severe memory or thermal pressure?
details:
  realistic_solution: 'A robust architecture uses a multi-tiered degradation ladder. Tier 1 (Ideal): Base LLM on NPU for maximum quality. Tier 2 (Thermal throttle): Reduce context window or generation length to lower NPU utilization. Tier 3 (Memory pressure): Proactively unload the multi-gigabyte LLM and fallback to a lightweight, dedicated INT8 translation model (e.g., ~150MB) running on the CPU. Tier 4 (Extreme constraint): Fallback to a cloud API if network is available, or degrade to an asynchronous queue.'
  common_mistake: |
    **The Pitfall:** Proposing a simple binary fallback (either full NPU LLM or cloud API) without intermediate on-device states.
    **The Rationale:** Candidates ignore the severe latency and power cost of thrashing a multi-gigabyte model in and out of memory during sudden OS memory pressure events.
    **The Consequence:** The system either crashes via Out-Of-Memory (OOM) or suffers extreme latency spikes, ruining the core user experience.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total RAM: 12.0 GB.
    - Heavy foreground usage: 9.0 GB.
    - LLM RAM footprint: ~2.5 GB.
    - Fallback model footprint: 150 MB.

    **Calculations:**
    - Free RAM during heavy usage = 12.0 - 9.0 = 3.0 GB.
    - Headroom with LLM = 3.0 - 2.5 = 0.5 GB (high risk of OOM).
    - Headroom with fallback = 3.0 - 0.15 = 2.85 GB.

    **Conclusion & Interpretation:**
    - **Result: 2.85 GB headroom (Memory-Bound)**. Swapping to the lightweight model reclaims 2.35 GB of RAM, preventing an OS-level Jetsam kill event.
