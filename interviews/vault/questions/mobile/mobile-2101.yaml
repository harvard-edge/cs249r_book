title: Keyboard Autocomplete Batching
scenario: An iOS keyboard app uses the Apple A17 Pro Neural Engine for on-device autocomplete. Keystrokes generate inference requests at roughly 5 Hz. To save battery, requests are batched.
question: Evaluate the trade-off between battery life and user experience when increasing the batch queue timeout from 50ms to 200ms.
details:
  realistic_solution: At a 200ms timeout, the system achieves higher hardware utilization by processing multiple keystrokes in one NPU wake cycle, saving battery. However, human perception of typing lag begins around 100ms. The 200ms timeout degrades the UX unacceptably.
  common_mistake: |
    **The Pitfall:** Only optimizing for maximum hardware throughput and minimum power.
    **The Rationale:** Candidates focus entirely on systems efficiency metrics (batching efficiency) while ignoring the user-facing product requirements.
    **The Consequence:** Degrading the user experience by introducing unacceptable typing lag (>100ms).
  napkin_math: |
    *   **Typing Rate:** 5 Hz = 200 ms between keystrokes.
    *   **Batch Window:** 200 ms.
    *   **Conclusion:** A 200 ms window perfectly aligns with the typing rate, effectively guaranteeing a **200 ms latency** per keystroke, exceeding the human perception threshold of 100 ms.
