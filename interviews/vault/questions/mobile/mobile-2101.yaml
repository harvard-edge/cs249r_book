title: Keyboard Autocomplete Batching
scenario: An iOS keyboard app uses the Apple A17 Pro Neural Engine for on-device autocomplete.
  Keystrokes generate inference requests at roughly 5 Hz. To save battery, requests
  are batched.
question: Evaluate the trade-off between battery life and user experience when increasing
  the batch queue timeout from 50ms to 200ms.
details:
  realistic_solution: At a 200ms timeout, the system achieves higher hardware utilization
    by processing multiple keystrokes in one NPU wake cycle, saving battery. However,
    human perception of typing lag begins around 100ms. The 200ms timeout degrades
    the UX unacceptably.
  common_mistake: Only optimizing for maximum NPU throughput and minimum power, ignoring
    the strict <100ms human-in-the-loop latency requirement.
  napkin_math: 5 Hz = 200ms between keystrokes. A 200ms batch window effectively guarantees
    maximum perceived latency per stroke.
