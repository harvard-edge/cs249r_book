title: Real-Time Sensor Data Ingestion and Anomaly Detection on Edge NPU
scenario: You are tasked with designing a low-latency system for real-time processing of high-frequency
  sensor data (e.g., accelerometers, gyroscopes) on a mobile device equipped with a Samsung Exynos 2400
  NPU (34.7 TOPS, 12 GB LPDDR5X). The sensor generates data at 1 kHz, with each sample being 16 bytes.
  The goal is to perform a simple anomaly detection model inference on a 1-second rolling window of data,
  with results needing to be available within 50ms of the window ending. Describe how you would set up
  the data ingestion and processing pipeline, ensuring minimal latency, efficient NPU utilization, and
  robust data handling.
question: "How would you ingest 1 kHz sensor data and run 1-second-window anomaly inference on Exynos 2400 within 50ms?"
details:
  realistic_solution: Implement a double-buffering or ring-buffer strategy within a memory region accessible
    by both the CPU and NPU (e.g., shared memory or NPU's dedicated high-bandwidth memory). Utilize Direct
    Memory Access (DMA), if available, for efficient, low-overhead data transfer from the sensor interface
    to these buffers. The CPU's role would primarily be to manage the buffers and trigger NPU inference.
    The NPU would process 1-second (1000 samples) batches of data from one buffer while the other buffer
    is being filled. Optimize the anomaly detection model for the Exynos 2400 NPU's architecture, potentially
    using INT8 quantization and NPU-specific kernels provided by the Samsung SDK to maximize its 34.7
    TOPS. A real-time operating system (RTOS) component or carefully managed threads could handle the
    strict 50ms deadline, ensuring NPU inference is initiated immediately upon a full window.
  common_mistake: A common mistake is to under-optimize data movement and buffering. Naive approaches
    often involve frequent small data transfers between CPU and NPU memory, leading to memory bandwidth
    saturation, increased latency due to synchronization overhead, and inefficient NPU utilization (context
    switching overhead) when processing small, unbatched inferences. Additionally, overlooking potential
    data loss due to buffer overflows or inadequate sensor-to-memory data transfer mechanisms (e.g., not
    leveraging DMA) can cripple the system.
  napkin_math: "1. **Data Rate:** 1 kHz * 16 bytes/sample = 16 KB/s. \n2. **Window Size:** 1 second *\
    \ 16 KB/s = 16 KB. \n3. **Inference Time Budget:** 50 ms.\n4. **Memory Bandwidth Required (minimum):**\
    \ To move 16 KB of data to the NPU's accessible memory within the 50 ms inference budget (assuming\
    \ transfer happens just before or during inference), you need 16 KB / 0.05 s = 320 KB/s. The 12 GB\
    \ LPDDR5X typically offers hundreds of GB/s bandwidth, so raw bandwidth is not the bottleneck; efficient\
    \ access patterns are key. \n5. **NPU Compute Check:** If the anomaly detection model requires, for\
    \ example, 10 Million MAC operations per inference on the 16KB data window, and the NPU has 34.7 TOPS\
    \ (roughly 17.35 Trillion MACs/s if 1 MAC = 2 ops), then 10^7 MACs / (17.35 * 10^12 MACs/s) = ~0.57\
    \ microseconds. This shows the NPU has ample raw compute power, making memory access, data staging,\
    \ and scheduling the primary challenges."
