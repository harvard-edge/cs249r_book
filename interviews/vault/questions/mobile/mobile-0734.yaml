title: The On-Device Training Graph Explosion
scenario: Your app has a 30 MB vision model that runs inference flawlessly on older
  iPhones with 2 GB of RAM. You decide to add on-device personalization—allowing the
  model to fine-tune its weights using the user's photos. As soon as you trigger `model.fit()`
  with a batch size of 8, the app crashes with an Out-of-Memory (OOM) error from iOS.
  Why did a 30 MB model suddenly exceed the ~1 GB per-app memory limit?
question: Why did a 30 MB model suddenly exceed the ~1 GB per-app memory limit?
details:
  realistic_solution: Inference only requires storing the weights and the *current*
    layer's activations. Training requires backpropagation, which means you must store
    the **Forward Activations for every single layer** in the network to compute the
    chain rule gradients later.
  common_mistake: '"The batch size of 8 images took up all the RAM." 8 images only
    take a few megabytes. The hidden cost is the autograd graph.'
  napkin_math: 'Inference: 30MB + 15MB buffer = 45MB. Older iPhone (2GB) has strict
    Jetsam limits. Fine-tuning needs gradients and optimizer states. For Adam, that''s
    2x weights (60MB). Plus batch activations for backprop (e.g., 200MB). Total jumps
    to 300MB+. To fit, must use SGD (no state) and gradient accumulation (batch=1).'
