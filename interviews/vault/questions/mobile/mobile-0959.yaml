title: 'KV-Cache: Recall — What is a KV Cache and Why Does It Matter for Mobile LLM?'
scenario: In the context of a 1B LLM on A17 Pro (35 TOPS, 8GB), define the KV cache, explain why it exists, and state what happens to token generation speed as context length grows without KV caching.
question: What is a KV cache, why does mobile LLM decoding need it, and how does generation scale without it?
details:
  realistic_solution: 'KV cache: stores the Key and Value tensors for all previously generated tokens. Avoids recomputing K,V for old tokens at each new generation step. Without KV cache: generating the nth token requires O(n) computation (re-computing all prior K,V). Total generation of N tokens: O(N²). With KV cache: each step O(1) new K,V computation → total O(N).'
  common_mistake: |
    **The Pitfall:** Confusing KV cache with model weights cache.
    **The Rationale:** Candidates don't understand that without a KV cache, attention must be recomputed over the full sequence for every single new token.
    **The Consequence:** They fail to recognize that without a KV cache, computation scales quadratically O(N²), making long-context generation impossible on mobile.
  napkin_math: |
    - Without KV cache (512 tokens): 1+2+...+512 = 131,328 token-equivalent computations.
    - Compute (no cache): 131,328 × 1B × 6 FLOPs = 787.97T FLOPs.
    - Time at 35 TOPS: 22.5 seconds (22.7 tokens/sec).
    - With KV cache: each step = 1 token computation = 1B × 6 FLOPs = 6B FLOPs.
    - Time per token (compute only): 0.17ms = 5,862 tokens/sec.
    - Weight loading latency dominates: 7.35ms per step → 136 tokens/sec.
    - **KV cache speedup: 22.7 → 136 tok/sec = 5.99× at 512 tokens, scaling to O(n) at longer contexts.**
