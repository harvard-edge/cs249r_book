title: Mobile New 0017
scenario: "You deploy a tiny 2MB keyword spotting model to an IoT device. However, the final compiled binary executable is 115MB, completely blowing past the device's 32MB storage limit."
question: "Why can a 2MB keyword spotting model produce a 115MB IoT binary, and how should the runtime be built instead?"
details:
  realistic_solution: "The 115MB bloat is caused by statically linking the entire ML framework (e.g., PyTorch Mobile or TensorFlow Lite) into the final executable. The compiler blindly packages hundreds of unused mathematical and image processing operators. To fix this, compile a 'selective build' that statically links only the specific operator kernels present in the 2MB model graph."
  common_mistake: |
    **The Pitfall:** Using default, pre-compiled framework binaries for edge deployment.
    **The Rationale:** Candidates assume ML frameworks are monolithic requirements and fail to realize that standard libraries contain hundreds of unused operator kernels.
    **The Consequence:** The compiled binary massively exceeds the physical storage limits of the IoT flash memory, rendering deployment impossible.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Device Storage Limit: 32 MB. Model Size: 2 MB.
       - Standard PyTorch static lib: ~110 MB.
       - Selective build runtime lib: ~800 KB.
    2. **Calculations:**
       - Default build size = 110 MB (lib) + 2 MB (model) = 112 MB.
       - Optimized build size = 0.8 MB (lib) + 2 MB (model) = 2.8 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Storage-Bound.** By explicitly using a selective build to drop unused ops, the total footprint drops from 112 MB to **2.8 MB**, safely fitting within the physical 32 MB limit.
