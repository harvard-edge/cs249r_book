title: Diagnosing Low NPU Utilization
scenario: An image segmentation model runs on a mobile Neural Engine, but the profiler shows it only sustains 2 TOPS.
question: Identify the primary architectural reason why the model might achieve less than 10% of theoretical peak performance.
details:
  realistic_solution: The model is likely memory-bandwidth bound due to a low arithmetic intensity. The NPU multiply-accumulate units are starving while waiting for weights or activations to load from unified LPDDR5 memory.
  common_mistake: |
    **The Pitfall:** Automatically blaming thermal throttling for poor performance.
    **The Rationale:** Candidates often assume poor sustained TOPS is a thermal issue, without first evaluating the model's arithmetic intensity or memory access patterns.
    **The Consequence:** They pursue complex cooling or system-level fixes instead of optimizing the model's actual bottleneck: memory bandwidth.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Mobile Neural Engine.
       - Theoretical Peak Compute: 35 TOPS.
       - Observed Sustained Compute: 2 TOPS.
    2. **Calculations:**
       - Utilization = 2 TOPS / 35 TOPS = ~5.7%.
    3. **Conclusion & Interpretation:**
       **Result: Memory-Bandwidth Bound. Because the model achieves less than 10% of peak performance, the MAC units are starving for data due to low arithmetic intensity.**
