title: Diagnosing Low NPU Utilization
scenario: An image segmentation model runs on an Apple A17 Pro Neural Engine capable
  of roughly 35 TOPS, but the profiler shows it only sustains 2 TOPS.
question: Identify the primary architectural reason why the model might achieve less
  than 10% of theoretical peak performance.
details:
  realistic_solution: The model is likely memory-bandwidth bound due to a low arithmetic
    intensity. The NPU multiply-accumulate units are starving while waiting for weights
    or activations to load from unified LPDDR5 memory.
  common_mistake: Assuming thermal throttling without first evaluating the arithmetic
    intensity or memory wall.
  napkin_math: 35 TOPS * 0.10 = 3.5 TOPS threshold
