title: IMU Duty Cycling Power Analysis
scenario: A smartphone pedometer samples a 6-axis IMU continuously. The inference
  model takes 5ms to process a 1-second window on the mobile CPU, which draws 800mW
  when active and 10mW when asleep.
question: Formulate a duty-cycling schedule that batches IMU data to evaluate inference
  every 4 seconds, and calculate the average power consumption of the CPU.
details:
  realistic_solution: By batching 4 seconds of data, the CPU wakes up once every 4000ms.
    Processing 4 windows sequentially takes 4 * 5ms = 20ms. The CPU is active for
    20ms and asleep for 3980ms out of the 4000ms cycle. The average power is (20/4000)
    * 800mW + (3980/4000) * 10mW = 4mW + 9.95mW = 13.95mW.
  common_mistake: Forgetting to account for the baseline sleep power (10mW) when calculating
    the total average power, leading to a large underestimation.
  napkin_math: (20*800 + 3980*10) / 4000 = 13.95mW
