title: IMU Duty Cycling Power Analysis
scenario: A smartphone pedometer samples a 6-axis IMU continuously. The inference model takes 5ms to process a 1-second window on the mobile CPU, which draws 800mW when active and 10mW when asleep.
question: Formulate a duty-cycling schedule that batches IMU data to evaluate inference every 4 seconds, and calculate the average power consumption of the CPU.
details:
  realistic_solution: By batching 4 seconds of data, the CPU wakes up once every 4000ms. Processing 4 windows sequentially takes 4 * 5ms = 20ms. The CPU is active for 20ms and asleep for 3980ms out of the 4000ms cycle. The average power is (20/4000) * 800mW + (3980/4000) * 10mW = 4mW + 9.95mW = 13.95mW.
  common_mistake: |
    **The Pitfall:** Forgetting to account for the baseline sleep power when calculating total average power.
    **The Rationale:** Engineers focus only on the active power spikes during inference.
    **The Consequence:** The resulting power estimation is significantly lower than reality, leading to overly optimistic battery life claims.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cycle Duration: 4 seconds = 4000 ms.
    - Active Time: Processing 4 windows sequentially takes 4 x 5 ms = 20 ms.
    - Asleep Time: 4000 ms - 20 ms = 3980 ms.

    **Calculations:**
    - Active Energy Cost: 20 ms x 800 mW = 16,000 mJ.
    - Asleep Energy Cost: 3980 ms x 10 mW = 39,800 mJ.
    - Average Power: (16,000 + 39,800) / 4000 = 13.95 mW.

    **Conclusion & Interpretation:**
    - **Result: 13.95 mW (Power-Bound)**. Accurately modeling power requires accounting for the continuous sleep baseline.
