title: On-Device Fine-Tuning Battery Drain and Model Collapse
scenario: You are debugging a nightly on-device fine-tuning pipeline for the Gemini Nano LLM (2B parameters) on the Google Tensor G3. The pipeline collects 10,000 daily user interactions and attempts to fine-tune the model overnight using the on-device TPU. However, telemetry shows users are waking up to drained batteries, the fine-tuning process runs for over 4 hours, and the resulting model exhibits severe performance degradation on general tasks.
question: How would you diagnose the root cause of this system failure and propose a data-centric solution?
details:
  realistic_solution: The root cause is the naive use of all collected daily data, which yields a terrible Information-Compute Ratio (ICR). Training on redundant daily noise causes model collapse (catastrophic forgetting) and exhausts the mobile thermal/battery budget. The solution is to implement on-device data pruning (coreset selection) to filter the 10,000 samples down to the most informative subset (e.g., top 5% highest loss interactions) prior to fine-tuning.
  common_mistake: |
    **The Pitfall:** Naively training on all collected daily user data without filtering.
    **The Rationale:** Assuming more data always yields a better model, ignoring the terrible Information-Compute Ratio (ICR).
    **The Consequence:** Hardware exhaustion (battery drain) and severe model collapse due to redundant noise.
  napkin_math: |
    1. Naive Compute: 10k samples * 500 tokens * 2B params * 6 ops = 60,000 TFLOPs.
    2. Time at 3.75 TOPS: 60,000 / 3.75 = ~4.4 hours (Drains battery).
    3. Pruned to 5% Coreset: 250k tokens = 3,000 TFLOPs.
    4. **New Time:** 3,000 / 3.75 = **~13.3 minutes (Safe and effective).**
