title: The SoC Power Draw
scenario: Your team is developing a 'hands-free' feature that continuously runs a keyword-spotting model
  on a flagship smartphone. When the model is actively processing audio, what is a realistic power consumption
  value for the phone's System-on-a-Chip (SoC)?
details:
  realistic_solution: A flagship mobile SoC under a sustained, active ML load will typically consume between
    3 to 5 Watts. This is a significant power draw that can drain a battery quickly, which is why such
    'always-on' features rely heavily on duty cycling, hardware offload to low-power DSPs, and efficient
    models to manage battery life.
  common_mistake: A common error is to confuse the power domain of a mobile SoC with other platforms.
    An engineer might recall the ~30W budget of an edge device like a Jetson AGX Orin, which would be
    unsustainable in a passively cooled phone. Conversely, they might recall the milliwatt-scale consumption
    of a TinyML microcontroller, which is far too low for a powerful mobile application processor.
  napkin_math: A typical smartphone battery has a capacity of around 15-20 Wh. At a 4W continuous draw,
    the battery would be completely drained in just (15 Wh / 4 W) = 3.75 hours. This calculation underscores
    why continuous full-power processing is not feasible on mobile.
  options:
  - ~30 W
  - ~5 W
  - ~500 mW
  - ~50 mW
  correct_index: 1
