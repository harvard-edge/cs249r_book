title: The SoC Power Draw
scenario: Your team is developing a 'hands-free' feature that continuously runs a keyword-spotting model on a flagship smartphone.
question: "When the model is actively processing audio, what is a realistic power consumption value for the phone's System-on-a-Chip (SoC)?"
details:
  realistic_solution: A flagship mobile SoC under a sustained, active ML load will typically consume between
    3 to 5 Watts. This is a significant power draw that can drain a battery quickly, which is why such
    'always-on' features rely heavily on duty cycling, hardware offload to low-power DSPs, and efficient
    models to manage battery life.
  common_mistake: |
    **The Pitfall:** Confusing the power domain of a mobile SoC with edge devices or microcontrollers.
    **The Rationale:** Engineers might recall the ~30W budget of a Jetson AGX Orin (which would melt a phone) or the milliwatt-scale of TinyML (which is too weak for flagship features).
    **The Consequence:** Designing power management systems that either aggressively throttle the device or fail to run the required models.
  napkin_math: |
    - Typical battery capacity: ~15-20 Wh.
    - Active continuous SoC draw: 4 W.
    - Time to empty: 15 Wh / 4 W = **3.75 hours**.
    - **Conclusion:** Continuous full-power processing is physically unsustainable on a mobile device without aggressive duty cycling.
  options:
  - ~30 W
  - ~5 W
  - ~500 mW
  - ~50 mW
  correct_index: 1
