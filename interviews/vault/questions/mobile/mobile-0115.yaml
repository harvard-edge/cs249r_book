title: The Background ML Battery Vampire
scenario: Your health app runs an on-device activity recognition model in the background to count steps and detect falls. Users complain of 15% daily battery drain from your app alone — Android's battery settings page shows your app as the #1 consumer. The model itself is tiny (2 MB, 0.3 ms inference).
question: "How can a 0.3 ms model drain 15% of a 4355 mAh battery?"
details:
  realistic_solution: 'The drain comes from the wake transition penalty. Each SoC wake costs energy. Fix: batch inputs with a hardware FIFO buffer and infer periodically, or offload to the always-on DSP.'
  common_mistake: |
    **The Pitfall:** Assuming the model architecture itself is too large and needs further compression.
    **The Rationale:** Candidates see "battery drain" and instinctively apply model compression techniques (pruning, quantization), ignoring the 0.3ms baseline.
    **The Consequence:** Time is wasted hyper-optimizing an already tiny model while the true culprit—system wake scheduling—continues destroying battery life.
  napkin_math: |
    1. **Assumptions & Constraints:** Wake cost ~5.25 mJ, Unbatched at 50 Hz, Batched at 0.2 Hz (250 samples).
    2. **Calculations:** 50 Hz * 5.25 mJ = 262.5 mW. 0.2 Hz * 5.25 mJ = 1.05 mW.
    3. **Conclusion & Interpretation:** **250x energy reduction**. **Result: Wake-Bound**.
