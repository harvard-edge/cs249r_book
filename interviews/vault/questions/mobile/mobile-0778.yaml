title: TFLite Delegate Graph Partitioning Trade-offs
scenario: You are deploying a 12MB computer vision model for real-time video processing (30 FPS) on Android
  devices via TensorFlow Lite. CPU execution yields 50ms/frame. You enable the NNAPI delegate to leverage
  the NPU, but latency surprisingly increases to 54ms/frame. Profiling reveals the model is partitioned
  into 5 subgraphs because of an unsupported custom Swish activation and a GatherNd op, causing constant
  CPU-NPU synchronization. The GPU delegate achieves 28ms/frame but draws 2.2W, exceeding your 1.5W thermal
  budget. Evaluate the trade-offs and justify a design decision to meet both the 33ms latency and 1.5W
  power constraints.
details:
  realistic_solution: Replace the unsupported Swish and GatherNd ops with standard TFLite built-ins (e.g.,
    HardSwish and basic Gather) supported by NNAPI. Retrain the model to map the entire graph to a single
    NPU subgraph, eliminating synchronization overhead and meeting both latency (~15ms) and power (<1.0W)
    budgets.
  common_mistake: Assuming that simply enabling a hardware delegate like NNAPI will universally improve
    performance, ignoring the severe latency and power penalties of graph partitioning and CPU fallback.
  napkin_math: 'Partial NPU delegation fragments the model into subgraphs. NPU compute = 15ms, CPU fallback
    = 25ms. Switching subgraphs incurs driver overhead (2ms) and RAM copy (12MB / 10GB/s = 1.2ms) ~ 3.2ms
    per switch. With 4 context switches, overhead = 12.8ms. Total latency = 15 + 25 + 12.8 = 52.8ms. Fix:
    Use supported ops.'
