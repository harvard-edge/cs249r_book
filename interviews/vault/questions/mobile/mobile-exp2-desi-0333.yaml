title: On-Device Guardrails for GenAI on Exynos 2400
scenario: You are designing the safety architecture for an on-device text generation feature running on
  the Samsung Exynos 2400 NPU. The system uses a 4B parameter LLM for content creation and requires strict
  on-device PII redaction and toxicity filtering guardrails. The Exynos 2400 features a dual-core NPU
  capable of 34.7 TOPS and shares 12 GB of LPDDR5X memory with the CPU, GPU, and ISP. Architect a continuous
  monitoring system that evaluates the tradeoffs between sequential and concurrent guardrail execution
  to guarantee safety without degrading the user experience.
question: "How would you architect a continuous monitoring system that evaluates the tradeoffs between sequential and concurrent guardrail execution to guarantee safety without degrading the user experience?"
details:
  realistic_solution: A robust L5 design utilizes the dual-core NPU by scheduling the main LLM on one
    core and a continuous, chunk-based safety classifier on the second core. Tokens are streamed to the
    guardrail model in small windows. This parallel execution hides the guardrail latency. The system
    should dynamically scale down the generation batch size if the shared LPDDR5X memory controller reports
    high contention from the ISP or GPU.
  common_mistake: Candidates often design sequential architectures where the entire text is generated
    before safety evaluation, resulting in unacceptable user-perceived latency. They also frequently ignore
    the shared nature of the 12 GB memory pool, proposing static memory allocations that starve the camera
    (ISP) or display (GPU) processes.
  napkin_math: With a 4B parameter LLM at INT4 (2 GB footprint) and a 150M parameter safety classifier
    at INT8 (150 MB footprint), the total NPU memory footprint is 2.15 GB out of the 12 GB shared LPDDR5X
    pool. If the LLM generates at 20 tokens/sec using 15 TOPS, and the classifier processes 5-token sliding
    windows using 5 TOPS, the total compute is 20 TOPS, operating comfortably within the Exynos 2400 NPU's
    34.7 TOPS limit.
