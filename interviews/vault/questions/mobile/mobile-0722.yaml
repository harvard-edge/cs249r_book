title: The ANE Delegation Disaster
scenario: You convert a PyTorch segmentation model to Core ML for an AR app. On a test iPhone 15 Pro, inference takes 6 ms on the Neural Engine. After deploying to production, telemetry shows 69 ms inference on iPhone 14 devices — an 11.5x regression. The model is identical.
question: Why does the same Core ML segmentation model run in 6 ms on the A17 Pro but 69 ms on the older A15 Bionic?
details:
  realistic_solution: 'The A15 Bionic ANE lacks support for certain ops that the A17 Pro ANE handles (e.g., conv_transpose2d or specific attention patterns). CoreML silently splits the graph into 4 segments, inserting DMA transfers at each boundary: 4 splits x (3ms DMA out + 8ms CPU fallback + 3ms DMA back) = 56ms overhead on top of 13ms pure compute. The A15 ANE itself takes ~13ms with full delegation (2.2x slower than A17, matching the TOPS ratio). Fix: profile on the oldest supported device, replace unsupported ops with ANE-compatible alternatives, and verify single-segment delegation using Xcode Instruments CoreML trace.'
  common_mistake: |
    **The Pitfall:** Assuming linear TOPS scaling explains the entire latency regression.
    **The Rationale:** Candidates blame the slower A15 TOPS rating (15.8 vs 35) without calculating that the TOPS gap only explains a 2.2x regression, not 11.5x.
    **The Consequence:** Missing the massive DMA and CPU fallback overheads caused by unsupported operators.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - A17 Pro ANE: 35 TOPS, 6 ms latency.
       - A15 Bionic ANE: 15.8 TOPS.
       - Measured A15 latency: 69 ms.
       - Overhead per split: DMA out (3 ms) + CPU op (8 ms) + DMA back (3 ms) = 14 ms.
    2. **Calculations:**
       - Expected A15 full delegation latency = 6 ms * (35 / 15.8) ≈ 13 ms.
       - Total Overhead = 69 ms - 13 ms = 56 ms.
       - Number of graph splits = 56 ms / 14 ms = 4 splits.
    3. **Conclusion & Interpretation:**
       **Result: 56 ms overhead due to graph splitting and CPU fallbacks (Memory/DMA-Bound).**
