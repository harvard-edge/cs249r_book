title: The ANE Delegation Disaster
scenario: You convert a PyTorch segmentation model to Core ML for your AR app. On your test iPhone 15
  Pro (A17 Pro), inference takes 6 ms on the Neural Engine. After deploying to production, users on iPhone
  14 (A15 Bionic) report the AR overlay is laggy. Your telemetry shows 69 ms inference on A15 devices
  — an 11.5× regression. The model is identical. What happened?
question: "Why does the same Core ML segmentation model run in 6 ms on A17 Pro but 69 ms on A15 Bionic?"
details:
  realistic_solution: 'The A15 Bionic ANE lacks support for certain ops that the A17 Pro ANE handles (e.g.,
    conv_transpose2d or specific attention patterns). CoreML silently splits the graph into 4 segments,
    inserting DMA transfers at each boundary: 4 splits x (3ms DMA out + 8ms CPU fallback + 3ms DMA back)
    = 56ms overhead on top of 13ms pure compute. The A15 ANE itself takes ~13ms with full delegation (2.2x
    slower than A17, matching the TOPS ratio). Fix: profile on the oldest supported device, replace unsupported
    ops with ANE-compatible alternatives, and verify single-segment delegation using Xcode Instruments''
    CoreML trace.'
  common_mistake: '"The A15 is just slower than the A17 Pro." The A15''s ANE is rated at 15.8 TOPS vs
    the A17 Pro''s 35 TOPS — that''s a 2.2× difference, not 10×. Something else is going on.'
  napkin_math: 'A17 Pro ANE: 35 TOPS, full delegation → 6 ms. A15 ANE: 15.8 TOPS, expected with full delegation
    → 6 × (35/15.8) ≈ 13 ms. Actual A15: 69 ms. Overhead: 69 - 13 = 56 ms from 4 graph splits. Per split:
    DMA out (3 ms) + CPU op (8 ms) + DMA back (3 ms) = 14 ms. 4 splits × 14 ms = 56 ms overhead. After
    fix (conv_transpose2d): 13 ms on A15. AR frame budget at 30 FPS: 33 ms. Before fix: 69 ms = dropped
    frames. After fix: 13 ms = 20 ms headroom.'
