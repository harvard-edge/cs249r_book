title: Mobile INT8 Accuracy Cliff
scenario: A mobile vision model loses 12% accuracy after INT8 conversion, but only
  on low-light images. Daylight validation is unchanged. Analyze the quantization
  failure mode.
question: Why would INT8 conversion preserve daylight accuracy but lose 12% on low-light
  mobile images?
details:
  realistic_solution: The calibration set likely underrepresents low-light activation
    distributions. Low-light images can shift contrast and noise, causing activation
    ranges that clip or quantize poorly. The issue is calibration coverage and possibly
    per-channel scale choice, not just the INT8 format itself.
  common_mistake: Using aggregate daylight-heavy validation to approve quantization
    and missing condition-specific failures.
  napkin_math: If low-light is only 5% of calibration but 30% of real usage, the deployed
    scale statistics are biased toward daylight.
