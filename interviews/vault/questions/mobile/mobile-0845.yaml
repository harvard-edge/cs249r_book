title: Mobile INT8 Accuracy Cliff
scenario: A mobile vision model loses 12% accuracy after INT8 conversion, but only on low-light images. Daylight validation is unchanged.
question: "Why would INT8 conversion preserve daylight accuracy but lose 12% on low-light mobile images?"
details:
  realistic_solution: The calibration set likely underrepresents low-light activation distributions. Low-light images can shift contrast and noise, causing activation ranges that clip or quantize poorly. The issue is calibration coverage and possibly per-channel scale choice, not just the INT8 format itself.
  common_mistake: |
    **The Pitfall:** Using aggregate daylight-heavy validation sets to approve quantization.
    **The Rationale:** Engineers assume that if overall accuracy remains high, the quantization was successful, ignoring condition-specific data distributions.
    **The Consequence:** The model is deployed with skewed activation scales, resulting in severe degradation and clipping for minority data segments (like low-light).
  napkin_math: |
    * Calibration set: 95% daylight, 5% low-light.
    * Real-world usage: 70% daylight, 30% low-light.
    * **The min/max statistics used to compute the INT8 scale factors are heavily biased toward the daylight activation ranges.**
    * Low-light activations (which may have shifted contrast/noise profiles) fall outside these bounds and are severely clipped during inference.
