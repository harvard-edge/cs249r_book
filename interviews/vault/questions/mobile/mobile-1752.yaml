title: Diagnosing Bias in NPU-Accelerated Facial Verification for Mobile
scenario: A new facial recognition model, intended for on-device identity verification, has been deployed to a fleet of Android smartphones powered by the Snapdragon 8 Gen 3 Hexagon NPU. The NPU boasts 45 TOPS INT8 performance with 12-16 GB LPDDR5X, enabling sub-20ms inference latency for the model. However, initial user feedback and internal monitoring indicate significant performance disparities. Specifically, the model exhibits a higher false rejection rate (FRR) for certain demographic subgroups, particularly those with darker skin tones, even though overall accuracy metrics appear acceptable. You suspect a bias issue that wasn't caught during initial validation.
question: What metrics would you collect, and what steps would you take to systematically pinpoint the root cause of this observed unfairness?
details:
  realistic_solution: 'Implement a comprehensive fairness evaluation pipeline that includes data collection with diverse, ethically sourced demographic labels, and rigorous analysis using equalized odds (to check for equal true positive and false positive rates across groups), demographic parity (to ensure similar selection rates), and intersectional fairness (to analyze performance across combinations of attributes like skin tone AND gender). This would involve: 1. Data Collection: Expand test datasets to include more diverse representations and annotations for sensitive attributes. 2. Metric Calculation: Calculate FRR, FPR, and FNR for each defined subgroup (e.g., different skin tones, genders, age groups, and their intersections). 3. Root Cause Analysis: If equalized odds are violated, investigate if the model''s decision boundary or feature representations are disproportionately impacting specific groups. This might involve examining feature embeddings for separation, or analyzing activation maps. 4. Mitigation Strategy: Depending on the diagnosis, mitigation could involve re-balancing training data, applying fairness-aware regularization during retraining, post-processing calibration, or using adversarial debiasing techniques, while ensuring the solution maintains the necessary NPU performance profile.'
  common_mistake: |
    **The Pitfall:** Over-reliance on aggregate metrics like overall accuracy.
    **The Rationale:** Candidates neglect disaggregated analysis across sensitive attributes and assume pre-trained models are inherently fair or that NPU optimization doesn't introduce bias.
    **The Consequence:** Deploying a model that severely underperforms for specific demographic subgroups, leading to discriminatory product experiences despite high overall accuracy.
  napkin_math: |
    - Consider a scenario where the model achieves 99% overall accuracy.
    - If the FRR for the majority group is 0.5% but for a specific subgroup (e.g., darker skin tones) it's 5%, this 10x disparity indicates a significant fairness issue.
    - **Result: For a model running at 20ms inference on the NPU, a fair mitigation strategy must maintain this latency, implying that complex post-processing or re-inference might consume too much of the remaining 80ms budget if not carefully optimized for on-device execution.**
