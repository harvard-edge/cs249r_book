title: Diagnosing Bias in NPU-Accelerated Facial Verification for Mobile
scenario: "A new facial recognition model, intended for on-device identity verification, has been deployed to a fleet of Android smartphones. The model exhibits a higher false rejection rate (FRR) for certain demographic subgroups, particularly those with darker skin tones, even though overall accuracy metrics appear acceptable."
question: "What metrics would you collect, and what steps would you take to systematically pinpoint the root cause of this observed unfairness?"
details:
  realistic_solution: "Calculate granular metrics like False Rejection Rate (FRR) and False Acceptance Rate (FAR) intersected against sensitive demographic tags (e.g., skin tone, gender) to measure violations of demographic parity. If disparity vectors are validated, analyze feature embeddings to ensure separation boundaries do not implicitly segregate demographic clusters. Any post-processing fairness mitigations (e.g., Platt scaling or Platt calibration thresholds) must be highly optimized to fit inside the remaining millisecond-scale latency budgets characteristic of edge execution."
  common_mistake: |
    **The Pitfall:** Over-reliance on aggregate metrics like overall accuracy without segmenting.
    **The Rationale:** Candidates neglect disaggregated analysis across sensitive attributes and assume pre-trained models are inherently fair or that NPU optimization doesn't introduce bias.
    **The Consequence:** Deploying a model that severely underperforms for specific demographic subgroups, leading to discriminatory product experiences despite high "overall" accuracy.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Overall accuracy: 99%. Baseline NPU Inference: 20 ms.
       - Majority FRR: 0.5%. Minority Subgroup FRR: 5%.
    2. **Calculations:**
       - Disparity factor = 5% / 0.5% = 10x error rate.
    3. **Conclusion & Interpretation:**
       - **Result: Bias-Bound.** The 10x disparity completely invalidates the 99% overall accuracy metric. Any mitigation strategy must execute within the **remaining 80 ms** of the latency budget without bogging down the NPU.
