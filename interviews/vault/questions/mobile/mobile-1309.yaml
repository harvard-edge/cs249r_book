title: On-Device Data Quality Gate Compute Budget
scenario: You are deploying an on-device data quality gate to filter corrupted frames before they reach the main vision model on a device with a Samsung Exynos 2400 NPU. The lightweight anomaly detection model requires 0.45 TOPS per video stream, and you must process 4 concurrent camera streams.
question: How much Exynos 2400 NPU capacity is consumed by four concurrent anomaly-detection quality-gate streams?
details:
  realistic_solution: The correct approach is to calculate the aggregate compute required for all concurrent data streams processed by the quality gate. Then, divide this aggregate compute by the total available NPU capacity of the Exynos 2400 to find the precise percentage of utilization, verifying that sufficient headroom remains for primary tasks.
  common_mistake: |
    **The Pitfall:** Forgetting to multiply by the number of concurrent streams.
    **The Rationale:** Candidates calculate the percentage based on a single stream and grossly misjudge the impact on shared dual-core NPU resources.
    **The Consequence:** The primary vision tasks are starved of compute because the quality gate takes 4x more capacity than budgeted.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Streams: 4 concurrent.
       - Compute Per Stream: 0.45 TOPS.
       - NPU Peak Capacity: 34.7 TOPS.
    2. **Calculations:**
       - Total Compute: 0.45 TOPS/stream * 4 streams = 1.8 TOPS.
       - Percentage Capacity: (1.8 TOPS / 34.7 TOPS) * 100 = 5.18%.
       - Remaining Capacity: 34.7 - 1.8 = 32.9 TOPS.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** 5.18% of the NPU is consumed, leaving 32.9 TOPS for main vision tasks.
