title: Edge Guardrail NPU Performance Recall
scenario: You are filling out a Model Card for an on-device toxicity classifier deployed as a safety guardrail. The target deployment platform features an NPU utilizing shared LPDDR5X memory.
question: To properly document the hardware assumptions and latency constraints for the edge deployment, what is the advertised peak INT8 performance of this specific NPU class?
details:
  realistic_solution: "The correct answer is 45 TOPS (Tera Operations Per Second). Accurately establishing and documenting peak hardware constraints within the Model Card is a fundamental prerequisite for edge AI governance, ensuring that the guardrail's maximum query-per-second (QPS) limits and worst-case latency boundaries are mathematically grounded."
  common_mistake: |
    **The Pitfall:** Confusing mobile NPU metrics with desktop GPUs or guessing generic numbers.
    **The Rationale:** Candidates often lack specific hardware knowledge of current-generation mobile platforms.
    **The Consequence:** Incorrect hardware assumptions in the Model Card, leading to flawed deployment limits and latency expectations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak NPU throughput: 45 TOPS (INT8).
       - Guardrail model requirement: 0.5 GOPS per inference.
    2. **Calculations:**
       - 45 TOPS = 45,000 GOPS.
       - Theoretical peak throughput: 45,000 GOPS / 0.5 GOPS/query = 90,000 queries/second.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Theoretical Limit.** Assuming the system is purely compute-bound, the NPU hardware is capable of evaluating 90,000 queries per second.
