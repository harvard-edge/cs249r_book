title: Edge Guardrail NPU Performance Recall
scenario: You are filling out a Model Card for an on-device toxicity classifier deployed as a safety guardrail. The target deployment platform features a Qualcomm Hexagon NPU (Snapdragon 8 Gen 3) utilizing shared LPDDR5X memory.
question: To properly document the hardware assumptions and latency constraints for the edge deployment, what is the advertised peak INT8 performance of this specific NPU?
details:
  realistic_solution: The correct answer is 45 TOPS. Accurately documenting the hardware specifications in the Model Card is essential for edge AI governance, ensuring that performance limits and potential latency bottlenecks in safety guardrails are well understood.
  common_mistake: |
    **The Pitfall:** Confusing mobile NPU metrics with desktop GPUs or guessing generic numbers.
    **The Rationale:** Candidates often lack specific hardware knowledge of current-generation mobile platforms.
    **The Consequence:** Incorrect hardware assumptions in the Model Card, leading to flawed deployment limits and latency expectations.
  napkin_math: |
    * The Qualcomm Hexagon NPU's peak INT8 performance is 45 TOPS (45 × 10^12 ops/sec).
    * If a model requires 0.5 GOPS (0.5 × 10^9 ops) per inference.
    * Theoretical peak throughput = (45 × 10^12) / (0.5 × 10^9) = 90,000 requests per second.
    * **Assuming it is completely compute-bound, it can evaluate 90,000 queries per second.**
