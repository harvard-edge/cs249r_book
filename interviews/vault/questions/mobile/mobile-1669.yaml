title: Diagnosing & Quantifying Performance Bottlenecks in Canary Rollouts on Exynos 2400 NPU
scenario: Your team has developed an updated on-device ML model for a popular mobile application deployed across Android devices. You initiated a canary deployment to 5% of users. Post-canary launch, aggregated telemetry shows a concerning ~15% increase in average inference latency, despite rigorous offline benchmarks indicating a 10% decrease in model execution time.
question: How would you diagnose the 15% latency regression and quantify the impact of a potential fix?
details:
  realistic_solution: Use nsys profiling on a subset of canary devices to capture fine-grained NPU utilization, memory access patterns, and bus contention. Analyze execution traces to pinpoint if the bottleneck is computational, memory-bound (e.g., L2 cache misses or DMA contention), or thermal. Apply PTQ or structured sparsity, and optimize the memory hierarchy via operator fusion before A/B testing a fix.
  common_mistake: |
    **The Pitfall:** Relying solely on synthetic offline benchmarks or aggregate metrics.
    **The Rationale:** Candidates apply cloud intuition to edge deployment, assuming offline execution speed accurately reflects complex, multi-tenant system environments.
    **The Consequence:** Misattributing latency regression to the model architecture itself, rather than system-level bus contention or OS scheduling limits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline total latency: 100 ms.
       - Canary total latency: 115 ms (+15%).
       - Offline Compute Time: Decreased by 10 ms (e.g., 90 ms from 100 ms).
    2. **Calculations:**
       - Total Latency = Compute Time + Memory I/O + OS Overhead.
       - Regression Delta: Canary Total (115 ms) - New Compute (90 ms) = 25 ms allocated to Memory I/O and Overhead.
       - Potential Fix: Optimizing the data pipeline to save 20 ms in memory I/O yields 95 ms.
    3. **Conclusion & Interpretation:**
       - **Result:** Memory I/O and Overhead increased by **25 ms**.
       - **Memory-Bound Bottleneck:** Profiling isolates the regression to contention, meaning memory pipeline fixes can resolve the regression.
