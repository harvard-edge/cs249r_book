title: Diagnosing & Quantifying Performance Bottlenecks in Canary Rollouts on Exynos 2400 NPU
scenario: Your team has developed an updated on-device ML model for a popular mobile application. This model is deployed across various Android devices, critically impacting those powered by the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). You initiated a canary deployment to 5% of users. Post-canary launch, aggregated telemetry shows a concerning ~15% increase in average inference latency on Exynos 2400 devices, despite rigorous offline benchmarks indicating a 10% decrease in model execution time.
question: How would you diagnose the 15% latency regression and quantify the impact of a potential fix?
details:
  realistic_solution: 'The first step is to activate advanced, fine-grained profiling on a subset of the canary group using Exynos 2400 devices. This involves capturing NPU utilization, memory access patterns and bandwidth usage (especially between the 12 GB LPDDR5X and NPU), thermal profiles, and individual inference trace logs. Analyze these profiles to pinpoint if the bottleneck is computational (e.g., new ops not optimized for Exynos NPU, leading to CPU fallback), memory-bound (e.g., excessive data movement or cache misses), or thermal. Based on the diagnosis, a solution might involve: 1) Re-quantizing the model for NPU-specific efficiency, 2) Optimizing data pipelines to minimize memory transfers, or 3) Adjusting NPU core allocation/scheduling if multiple ML tasks contend for resources. The proposed fix would then be A/B tested on a smaller, controlled segment of the canary population before wider deployment or a full rollback to the previous model.'
  common_mistake: |
    **The Pitfall:** Relying solely on synthetic offline benchmarks or aggregate metrics.
    **The Rationale:** Candidates assume offline execution speed accurately reflects complex, multi-tenant system environments.
    **The Consequence:** Misattributing latency regression to the model architecture itself, rather than system-level LPDDR5X bus contention or OS scheduling limits.
  napkin_math: |
    *   **Total Latency:** Compute Time + Memory I/O + OS Overhead.
    *   **Baseline:** Total = 100 ms.
    *   **Canary State:** Total = 115 ms (+15%). Compute Time decreased by 10 ms (from offline benchmark).
    *   **Regression Delta:** To jump from 90 ms (Compute) to 115 ms, Memory I/O and Overhead must have increased by **25 ms**.
    *   **Quantifying the Fix:** If profiling isolates the 25 ms specifically to Memory I/O contention, optimizing the data pipeline to save 20 ms yields a new total of **95 ms** (surpassing the old model's 100 ms).
