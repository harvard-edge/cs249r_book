title: Energy Cost of Memory vs Compute on Tensor G3
scenario: Your team deployed two versions of an on-device LLM (Gemini Nano) on a Google Tensor G3. Version
  A has fewer parameters but uses FP16 precision, requiring frequent fetches from the 12 GB LPDDR5X memory.
  Version B is an INT8 quantized model with more parameters but fits entirely within the TPU's SRAM. Despite
  Version B requiring 50% more operations (operating well within the TPU's 7.5 TOPS limit), telemetry
  shows Version A drains the battery significantly faster per inference. Given that an off-chip DRAM access
  costs roughly 100pJ compared to 0.2pJ for an INT8 MAC and 5pJ for an SRAM access, explain why the computationally
  heavier model is more energy-efficient.
details:
  realistic_solution: The power draw is dominated by memory movement, not compute. According to Horowitz
    energy principles, accessing off-chip memory is orders of magnitude more expensive than performing
    ALU operations. Version B's quantization allows its weights to reside in SRAM, trading cheap compute
    (more MACs) to avoid expensive DRAM fetches, resulting in vastly lower total energy per inference.
  common_mistake: Candidates often assume that fewer operations automatically translate to lower power
    consumption. They fail to account for the massive energy discrepancy between data movement and compute,
    particularly the cost of off-chip LPDDR5X accesses compared to on-chip TPU arithmetic.
  napkin_math: Assume Version A requires 1B MACs (FP16 at ~0.9pJ) and 100M DRAM reads (100pJ). Total Energy
    = (10^9 * 0.9pJ) + (10^8 * 100pJ) = 0.9mJ + 10mJ = 10.9mJ. Assume Version B requires 1.5B MACs (INT8
    at 0.2pJ), 10M DRAM reads, and 140M SRAM reads (5pJ). Total Energy = (1.5 * 10^9 * 0.2pJ) + (10^7
    * 100pJ) + (1.4 * 10^8 * 5pJ) = 0.3mJ + 1.0mJ + 0.7mJ = 2.0mJ. Version B consumes ~5x less energy
    despite doing 50% more compute.
