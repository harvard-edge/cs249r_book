title: AR Glasses Thermal Budgeting
scenario: Your team is designing ML pipelines for AR glasses. To prevent skin burns, the device has a
  strict continuous thermal dissipation limit (TDP) of 1.5W. The baseline OS and display draw a constant
  0.8W. You need to run an eye-tracking CNN (5ms execution time at 800mW active power) and a hand-tracking
  transformer (15ms execution time at 1.2W active power). Both models must run at 30Hz. The ML accelerator
  draws 100mW when idle.
details:
  realistic_solution: To determine if the thermal envelope is violated, we must calculate the time-averaged
    power consumption over a 1-second window, as thermal limits (TDP) on mobile devices are bound by sustained
    heat dissipation rather than instantaneous spikes. First, calculate the duty cycle (active time per
    second) for each model at 30Hz. The eye tracker runs for 150ms/sec, and the hand tracker runs for
    450ms/sec. The NPU is active for 600ms total and idle for 400ms. We sum the energy consumed during
    these states and add the continuous baseline system power. The total average power comes out to 1.5W
    exactly, meaning it perfectly hits the thermal limit without exceeding it, assuming perfect scheduling
    without overlap.
  common_mistake: Adding the peak power of both models (0.8W + 1.2W + 0.8W system = 2.8W) and concluding
    it instantly violates the TDP.
  napkin_math: 'Eye-tracking: 5ms * 30 frames = 150ms active/sec. Energy = 0.8W * 0.15s = 0.12 Joules.

    Hand-tracking: 15ms * 30 frames = 450ms active/sec. Energy = 1.2W * 0.45s = 0.54 Joules.

    Idle time: 1000ms - 150ms - 450ms = 400ms. Idle energy = 0.1W * 0.40s = 0.04 Joules.

    Total ML Energy/sec = 0.12 + 0.54 + 0.04 = 0.70 Joules (0.7W average).

    Baseline system power = 0.8W.

    Total average power = 0.8W + 0.7W = 1.50W. This exactly meets the 1.5W TDP limit.'
