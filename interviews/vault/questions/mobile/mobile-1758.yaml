title: Tensor G3 On-Device Model Card Requirements for Responsible AI
scenario: A machine learning team is developing an on-device AI model for a new mobile
  application that will run on a Google Pixel device equipped with the Tensor G3 processor
  (7.5 TOPS on-device TPU, 12 GB LPDDR5X). This model performs real-time content moderation
  for user-generated videos. Before deployment, the team needs to demonstrate adherence
  to responsible AI principles. What is a 'model card' in this context, and what specific
  information, particularly relevant for an on-device content moderation model running
  on the Google Tensor G3, would you expect to find documented within it?
question: What should a model card document for a Tensor G3 on-device video content
  moderation model?
details:
  realistic_solution: 'A model card is a short document accompanying a trained ML
    model that provides a high-level overview of its characteristics and behavior.
    For this scenario, it should include: model details (version, owner), intended
    use cases (on-device content moderation), out-of-scope uses, performance metrics
    (e.g., latency, throughput, accuracy, F1-score) specifically evaluated on the
    Tensor G3''s TPU/CPU across various power profiles and real-world conditions,
    fairness metrics (e.g., disparate impact across demographic groups, content categories),
    training data provenance and characteristics, known limitations, ethical considerations,
    and details on any guardrails or post-processing applied on-device to uphold responsible
    AI principles.'
  common_mistake: Confusing a model card with traditional software documentation,
    omitting crucial details about fairness, performance under device constraints,
    or data provenance relevant to responsible AI. Another common mistake is not specifying
    performance metrics tailored to the unique capabilities and limitations of the
    Tensor G3's on-device TPU.
  napkin_math: Documenting expected inference times for typical input sizes on the
    Tensor G3's 7.5 TOPS TPU, considering the 12 GB LPDDR5X memory bandwidth. For
    instance, 'A 50MB quantized model processes a 10-second video segment (e.g., 300
    frames) within X milliseconds on the Tensor G3 TPU, consuming Y joules, maintaining
    an average F1-score of Z% across predefined fairness metrics, within the 12 GB
    RAM budget. This compares to A milliseconds and B joules on CPU, highlighting
    the TPU optimization.'
