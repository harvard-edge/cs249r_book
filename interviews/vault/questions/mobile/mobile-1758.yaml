title: Tensor G3 On-Device Model Card Requirements for Responsible AI
scenario: A machine learning team is developing an on-device AI model for a new mobile application that will run on a Google Pixel device equipped with the Tensor G3 processor (7.5 TOPS on-device TPU, 12 GB LPDDR5X). This model performs real-time content moderation for user-generated videos. Before deployment, the team needs to demonstrate adherence to responsible AI principles.
question: What should a model card document for a Tensor G3 on-device video content moderation model?
details:
  realistic_solution: 'A model card is a short document accompanying a trained ML model that provides a high-level overview of its characteristics and behavior. For this scenario, it should include: model details (version, owner), intended use cases (on-device content moderation), out-of-scope uses, performance metrics (e.g., latency, throughput, accuracy, F1-score) specifically evaluated on the Tensor G3''s TPU/CPU across various power profiles and real-world conditions, fairness metrics (e.g., disparate impact across demographic groups, content categories), training data provenance and characteristics, known limitations, ethical considerations, and details on any guardrails or post-processing applied on-device to uphold responsible AI principles.'
  common_mistake: |
    **The Pitfall:** Confusing a model card with traditional software documentation.
    **The Rationale:** Candidates omit crucial details about fairness, hardware performance under constraints, or data provenance relevant to responsible AI.
    **The Consequence:** Fails responsible AI review and fails to establish trust or set realistic expectations for the Tensor G3 execution.
  napkin_math: |
    - 50MB quantized model processes a 30-second, 300-frame video segment.
    - TPU compute = 7.5 TOPS, Memory BW = 12 GB LPDDR5X.
    - **Inference time:** ~200ms on Tensor G3 TPU.
    - **Power consumption:** ~1.5 joules.
    - **F1-score:** **92%** across predefined fairness metrics within the 12 GB RAM budget.
