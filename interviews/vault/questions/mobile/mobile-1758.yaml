title: Tensor G3 On-Device Model Card Requirements for Responsible AI
scenario: A machine learning team is developing an on-device AI model for a new mobile application that will run on a Google Pixel device. This model performs real-time content moderation for user-generated videos. Before deployment, the team needs to demonstrate adherence to responsible AI principles.
question: What should a model card document for a mobile on-device video content moderation model?
details:
  realistic_solution: 'A model card is a short document accompanying a trained ML model that provides a high-level overview of its characteristics and behavior. For this scenario, it should include: model details (version, owner), intended use cases (on-device content moderation), out-of-scope uses, performance metrics (e.g., latency, throughput, accuracy, F1-score) specifically evaluated on the NPU/CPU across various power profiles and real-world conditions, fairness metrics (e.g., disparate impact across demographic groups, content categories), training data provenance and characteristics, known limitations, ethical considerations, and details on any guardrails or post-processing applied on-device to uphold responsible AI principles.'
  common_mistake: |
    **The Pitfall:** Confusing a model card with traditional software documentation.
    **The Rationale:** Candidates omit crucial details about fairness, hardware performance under constraints, or data provenance relevant to responsible AI.
    **The Consequence:** Fails responsible AI review and fails to establish trust or set realistic expectations for device-constrained execution.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 50MB quantized model.
       - 30-second, 300-frame video segment.
       - LPDDR5X bandwidth limits.
    2. **Calculations:**
       - Target inference time = ~200ms on TPU.
       - Power consumption budget = ~1.5 joules.
       - Evaluated F1-score across demographic slices.
    3. **Conclusion & Interpretation:**
       **Result: 92% F1-score within latency constraints across fairness categories (Compliance/Policy-Bound).**
