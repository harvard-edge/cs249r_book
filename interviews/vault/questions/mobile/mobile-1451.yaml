title: Exynos 2400 NPU Delegation and Operator Fallback
scenario: You are deploying a 2B parameter autoregressive model on the Samsung Exynos
  2400. After converting the model to TFLite, you discover that a custom fused attention
  operator is unsupported by the NPU delegate and falls back to the CPU. Given the
  Exynos 2400 features a dual-core NPU capable of 34.7 TOPS and shares 12 GB of LPDDR5X
  memory with the CPU, GPU, and ISP, evaluate the performance impact of this fallback
  and design a graph modification strategy to prevent it.
question: How would you rewrite an Exynos 2400 model graph to avoid NPU delegation
  fallback?
details:
  realistic_solution: The optimal strategy is to unfuse the attention block and rewrite
    it using primitive operators (e.g., standard MatMul, Softmax) that are natively
    supported by the Samsung NPU delegate. Keeping the entire subgraph on the NPU
    avoids the high context-switching and memory-syncing overhead of CPU fallbacks,
    maximizing the utilization of the 34.7 TOPS NPU.
  common_mistake: Candidates frequently suggest writing a custom NPU operator without
    understanding vendor SDK limitations, or they ignore the severe latency penalty
    of crossing the CPU-NPU boundary multiple times. They also often forget that the
    12 GB LPDDR5X is shared, meaning CPU-NPU memory transfers compete with the ISP
    or GPU for bandwidth.
  napkin_math: An INT8 quantized 2B model takes 2 GB of RAM. The LPDDR5X offers roughly
    60 GB/s of shared bandwidth. If fully NPU-bound, memory-bound decoding yields
    up to 30 tokens/s (60 GB/s / 2 GB). If a fallback occurs in a 32-layer model,
    the NPU and CPU must sync memory 64 times per token. Even if the data transferred
    is small (e.g., a 2048-dim vector taking 2 KB), the kernel launch and synchronization
    overhead of ~0.5ms per transfer means 64 * 0.5ms = 32ms of pure overhead per token,
    capping performance at ~31 tokens/s max before even computing, but effectively
    destroying the 30 tokens/s baseline down to under 15 tokens/s.
