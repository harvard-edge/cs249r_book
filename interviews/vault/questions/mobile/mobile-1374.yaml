title: A17 Pro Unified Memory Pipeline Optimization
scenario: You are designing the real-time video processing pipeline for an augmented reality application capturing 4K video at 60 FPS. The application applies a complex segmentation model and renders overlays. The device uses a unified memory architecture shared across CPU, GPU, and NPU.
question: "How would you design a zero-copy data pipeline that maximizes throughput and minimizes power consumption while ensuring the NPU is never starved for data?"
details:
  realistic_solution: Architect a zero-copy pipeline leveraging hardware-backed shared memory buffers (e.g., IOSurface, CVPixelBuffer, or DMA-BUF). Capture frames directly into shared memory, execute Metal/Vulkan preprocessing in-place, and pass the buffer pointer to the NPU to eliminate DRAM round-trips.
  common_mistake: |
    **The Pitfall:** Designing traditional pipelines that copy frame buffers between CPU, GPU, and NPU.
    **The Rationale:** Engineers default to standard discrete memory passing patterns, forgetting the power of unified memory.
    **The Consequence:** The shared memory bus is completely saturated, leading to severe thermal throttling and battery drain within minutes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Video: 4K (3840x2160), 4 bytes (RGBA), 60 FPS.
       - Compute requirement: 0.5 TOPS/frame.
       - NPU capacity: 35 TOPS.
    2. **Calculations:**
       - Raw Bandwidth: 3840 * 2160 * 4 * 60 = 1.99 GB/s.
       - Copy Pipeline (3 copies): 1.99 GB/s * 3 = ~6.0 GB/s.
       - Compute: 0.5 TOPS/frame * 60 FPS = 30 TOPS.
       - Headroom: 35 TOPS - 30 TOPS = 5 TOPS.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound**. Zero-copy keeps bandwidth at 1.99 GB/s, preventing thermal throttling from saturating the shared memory bus.
