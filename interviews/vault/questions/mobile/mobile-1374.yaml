title: A17 Pro Unified Memory Pipeline Optimization
scenario: You are designing the real-time video processing pipeline for a new augmented reality application running on the Apple A17 Pro Neural Engine. The application captures 4K video at 60 FPS, applies a complex segmentation model, and renders overlays. The A17 Pro features a 16-core Neural Engine capable of 35 TOPS operating within a ~5W power envelope, utilizing an 8 GB unified memory architecture shared with the CPU and GPU.
question: "How would you design a zero-copy data pipeline that maximizes throughput and minimizes power consumption while ensuring the Neural Engine is never starved for data?"
details:
  realistic_solution: The optimal solution leverages the A17 Pro's unified memory by utilizing IOSurface or CVPixelBuffer to allocate memory that is directly accessible by the ISP, GPU, and Neural Engine without copying. The pipeline should use Core Video to capture frames directly into this shared memory, use Metal for preprocessing in-place, and feed the same buffer to the 16-core Neural Engine for inference. Synchronization must be handled via Metal events to prevent tearing while maintaining a steady 60 FPS pipeline.
  common_mistake: |
    **The Pitfall:** Designing traditional pipelines that copy frame buffers between CPU, GPU, and Neural Engine.
    **The Rationale:** Engineers default to standard discrete memory passing patterns, forgetting the power of unified memory.
    **The Consequence:** The shared memory bus is completely saturated, leading to severe thermal throttling and battery drain within minutes.
  napkin_math: |
    - **Raw Bandwidth:** 4K (3840x2160) * 4 bytes (RGBA) * 60 FPS = **1.99 GB/s**.
    - **Copy Pipeline:** CPU -> GPU -> ANE copies the buffer 3 times, consuming **~6 GB/s** of bandwidth.
    - **Zero-Copy:** Keeps bandwidth at the baseline **1.99 GB/s**.
    - **Compute:** 0.5 TOPS/frame * 60 FPS = **30 TOPS**.
    - **Headroom:** 35 TOPS NPU - 30 TOPS = **5 TOPS headroom**, strictly ensuring no data starvation.
