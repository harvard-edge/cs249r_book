title: The Big.LITTLE Task Migration
scenario: Your AR app runs a hand-tracking model continuously on the CPU. When the app launches, inference takes 8ms per frame. After exactly 2 minutes of continuous usage, the inference time suddenly drops to 30ms per frame. The device is NOT hot, so thermal throttling is not active.
question: Why does a CPU hand-tracking model jump from 8 ms to 30 ms after 2 minutes without thermal throttling?
details:
  realistic_solution: 'After 2 min sustained CPU use, the OS migrates your thread from performance cores (3.0 GHz, 8ms) to efficiency cores (1.5 GHz, 30ms). Not thermal — it''s a power-saving heuristic. Fix: (1) PerformanceHintManager to signal latency-sensitive thread (stays on big cores). (2) iOS: QoS .userInteractive. (3) Run inference on NPU (own scheduling domain) instead of CPU. The OS saved 2W but broke your AR app. The fix is a single API call.'
  common_mistake: |
    **The Pitfall:** Assuming garbage collection or memory leaks are causing the slowdown.
    **The Rationale:** Developers often associate sudden performance drops with memory issues, forgetting about OS-level power management heuristics.
    **The Consequence:** Wasting time profiling memory instead of making a single API call to adjust QoS and signal latency sensitivity.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Performance Core: 3.0 GHz, wide superscalar.
       - Efficiency Core: 1.5 GHz, narrow issue width.
       - Observed Latencies: 8ms vs 30ms.
    2. **Calculations:**
       - Clock Speed Reduction: 3.0 GHz / 1.5 GHz = 2x slowdown.
       - Issue Width Reduction: Adds further pipeline stalls, pushing the 16ms theoretical minimum to 30ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** The OS power heuristic migrated the thread, causing a stable but unacceptable **30ms** inference time to save ~2W of power.
