title: The Big.LITTLE Task Migration
scenario: Your AR app runs a hand-tracking model continuously on the CPU. When the app launches, inference
  takes 8ms per frame. After exactly 2 minutes of continuous usage, the inference time suddenly drops
  to 30ms per frame. The device is NOT hot, so thermal throttling is not active. What OS-level power management
  feature ruined your latency?
details:
  realistic_solution: 'After 2 min sustained CPU use, the OS migrates your thread from performance cores
    (3.0 GHz, 8ms) to efficiency cores (1.5 GHz, 30ms). Not thermal — it''s a power-saving heuristic.
    Fix: (1) PerformanceHintManager to signal latency-sensitive thread (stays on big cores). (2) iOS:
    QoS .userInteractive. (3) Run inference on NPU (own scheduling domain) instead of CPU. The OS saved
    2W but broke your AR app. The fix is a single API call.'
  common_mistake: '"Garbage collection is pausing the thread." GC causes stutters, not a permanent, stable
    degradation in baseline performance.'
  napkin_math: 'Performance Core: 3.0 GHz, wide superscalar = 8ms. Efficiency Core: 1.5 GHz, narrow issue
    width = ~25-30ms. The OS saved 2 Watts of power but made your app unusable.'
