title: The Cost of a Glance
scenario: You are designing a 'glanceable AI' feature for a smartphone that wakes up, runs a small model for 1 second, and then sleeps for 9 seconds. The SoC consumes 5W when active and a negligible 10µW when in deep sleep.
question: What is the approximate average power consumption of this feature over its 10-second cycle?
details:
  realistic_solution: 'The average power is the time-weighted average of the power consumed in each state. Since the device is active for 1 out of 10 seconds, the average power is dominated by the active state, but scaled down by the duty cycle. The sleep power is several orders of magnitude smaller and is effectively negligible in this calculation.'
  common_mistake: |
    **The Pitfall:** Stating the peak power (5W) instead of the time-weighted average.
    **The Rationale:** Forgetting that the device spends most of its time in a low-power state, or incorrectly averaging 5W and 10µW without accounting for time.
    **The Consequence:** Overestimating battery impact and incorrectly rejecting a viable 'glanceable AI' feature.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Duty cycle: 1s active, 9s sleep (10s total period).
       - Active power: 5 W.
       - Sleep power: 10 µW (0.00001 W).
    2. **Calculations:**
       - Average Power = (1s * 5W + 9s * 0.00001W) / 10s.
       - Average Power = (5 + 0.00009) / 10 = 0.500009 W.
    3. **Conclusion & Interpretation:**
       - **Result: Energy-Bound. ~500 mW average power consumption.**
  options:
  - 5 W
  - 2.5 W
  - 500 mW
  - 50 mW
  correct_index: 2
