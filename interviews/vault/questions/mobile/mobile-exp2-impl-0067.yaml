title: On-Device MMD Drift Window Sizing
scenario: You are designing an on-device statistical drift detection system for a vision model deployed
  on the Apple A17 Pro. To detect data drift without violating user privacy, you compute the Maximum Mean
  Discrepancy (MMD) between a reference set and a sliding window of actual serving embeddings. The 16-core
  Neural Engine extracts these 512-dimensional float16 embeddings using a tiny fraction of its 35 TOPS
  compute budget and ~5W power envelope. However, because the A17 Pro uses a shared 8 GB unified memory,
  the OS restricts your background drift process to a strict 50 MB memory limit. Calculate the maximum
  number of historical embeddings you can store in this sliding window, and determine exactly how many
  minutes of history this represents at a processing rate of 30 frames per second.
details:
  realistic_solution: The correct approach is to calculate the precise byte size of a single embedding
    and divide the strict 50 MB memory budget by this size. MMD is an effective statistical detection
    method for high-dimensional data, but on mobile platforms like the A17 Pro, shared unified memory
    constraints dictate the sample size. A 50 MB budget is realistic to avoid OS kills while maintaining
    a sufficiently large sample size for reliable MMD calculation over a roughly 28-minute sliding window.
  common_mistake: Candidates often forget to account for the data type size (e.g., assuming 4 bytes for
    float32 instead of 2 bytes for float16) or miscalculate the conversion between MB and bytes. Some
    may also fail to link the memory constraints of a shared unified memory architecture back to the practical
    time window it provides for detecting training-serving skew.
  napkin_math: '1. Compute the size of a single float16 embedding: 512 dimensions * 2 bytes/dimension
    = 1,024 bytes.

    2. Convert the memory limit to bytes: 50 MB = 50 * 1,024 * 1,024 = 52,428,800 bytes.

    3. Calculate the maximum number of embeddings: 52,428,800 bytes / 1,024 bytes/embedding = 51,200 embeddings.

    4. Calculate the total history in seconds: 51,200 embeddings / 30 FPS = 1,706.67 seconds.

    5. Convert to minutes: 1,706.67 / 60 = 28.44 minutes of history.'
