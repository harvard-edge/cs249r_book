title: MHA vs GQA Decoding Bottlenecks
scenario: You are deploying a 7B parameter LLM on the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3) targeting
  an interactive chat application. The system has 45 TOPS INT8 compute and a shared 12-16 GB LPDDR5X memory
  pool between the CPU, GPU, and NPU. During auto-regressive decoding with a 2048-token context, you observe
  that the NPU compute utilization drops to under 5% when using standard Multi-Head Attention (MHA), resulting
  in slow token generation. Explain why the NPU sits idle despite having 45 TOPS available, and why switching
  the model to use Grouped-Query Attention (GQA) with 8 groups significantly increases the token generation
  rate.
details:
  realistic_solution: During decoding, every single generated token requires loading the entire KV cache
    and model weights from the shared LPDDR5X memory into the NPU's SRAM. Standard MHA stores separate
    Key and Value vectors for every single query head, creating a massive memory footprint per token that
    saturates the memory bus before the NPU can perform any meaningful work. GQA solves this by sharing
    a single KV head across multiple query heads (e.g., 4 queries per KV head), slashing the total KV
    cache size by 75% and directly alleviating the LPDDR5X memory bandwidth bottleneck, allowing the NPU
    to process generation steps much faster.
  common_mistake: Candidates typically incorrectly assume the NPU's 45 TOPS INT8 compute capacity is insufficient
    to calculate the attention scores for 2048 tokens in real-time. They fail to identify that auto-regressive
    decoding is strictly memory-bandwidth bound, not compute-bound, and that the sheer size of the MHA
    KV cache being loaded from the shared LPDDR5X memory starves the NPU.
  napkin_math: 'For a 7B model (hidden size 4096, 32 layers, 32 heads), MHA KV cache at 2048 context using
    FP16 (2 bytes): 2 (K+V) * 128 (head dim) * 32 (heads) * 32 (layers) * 2048 (tokens) * 2 bytes = ~1
    GB. In INT8, weights are ~7 GB. Total memory read per token = 8 GB. Attention compute per token: 2
    * 2048 (tokens) * 4096 (hidden size) * 2 = ~33.5 MegaOps. At 45 TOPS INT8 (45 trillion ops/sec), the
    compute time is ~0.0007 ms, while transferring 8 GB over LPDDR5X takes significantly longer. The system
    is completely starved by memory bandwidth. GQA with 8 groups reduces the 32 KV heads to 8 (a 4x reduction).
    The new KV cache size is 1 GB / 4 = 256 MB. The total memory read drops to 7.25 GB per token, reducing
    memory transfer time and directly improving generation speed while fitting comfortably within the
    12-16 GB shared memory limit.'
