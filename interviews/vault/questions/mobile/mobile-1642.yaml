title: 'Operator Scheduling: Layer Fusion on Samsung Exynos 2400 NPU'
scenario: 'You are tasked with deploying a convolutional neural network (CNN) model on a mobile device powered by the Samsung Exynos 2400 NPU, which features 34.7 TOPS of AI performance and 12 GB of LPDDR5X memory.'
question: 'What is layer fusion in operator scheduling, and how does it reduce latency for a CNN on the Exynos 2400 NPU?'
details:
  realistic_solution: 'Layer fusion intelligently combines consecutive operations (e.g., Conv2D -> ReLU) to eliminate intermediate tensor writes to the slower main LPDDR5X memory. By keeping data in the fast on-chip scratchpad or registers, it bypasses the memory bandwidth bottleneck entirely.'
  common_mistake: |
    **The Pitfall:** Fusing layers indiscriminately without checking register pressure or intermediate memory limits.
    **The Rationale:** Candidates assume larger fused blocks always perform better by minimizing kernel launch counts.
    **The Consequence:** NPU register spilling causes massive performance degradation that makes the fused block slower than the independent operations.
  napkin_math: |
    1. **Unfused Scenario:** A Conv2D outputs a 100MB tensor. It writes 100MB to LPDDR5X. The subsequent ReLU reads 100MB.
    2. **Bandwidth Cost:** Total access = 200MB. At 50 GB/s bandwidth, 200MB / 50 GB/s = 0.004 seconds = **4.0 milliseconds**.
    3. **Fusion Benefit:** Successful fusion eliminates this DRAM roundtrip, directly subtracting 4.0ms from the layer's latency by keeping intermediate data in local SRAM.
