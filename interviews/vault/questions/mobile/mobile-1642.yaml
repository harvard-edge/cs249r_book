title: 'Operator Scheduling: Layer Fusion on Samsung Exynos 2400 NPU'
scenario: You are tasked with deploying a convolutional neural network (CNN) on a mobile device powered by an NPU with 34.7 TOPS and 12 GB of LPDDR5X memory.
question: What is layer fusion in operator scheduling, and how does it reduce latency for a CNN on an NPU?
details:
  realistic_solution: |
    Layer fusion mathematically combines consecutive operations (e.g., Conv2D -> ReLU) into a single optimized kernel. This explicitly prevents writing massive intermediate activation tensors back to main LPDDR5X memory, keeping the data isolated within the ultra-fast on-chip SRAM.
  common_mistake: |
    **The Pitfall:** Fusing an infinite chain of layers without checking NPU register pressure or SRAM limits.
    **The Rationale:** Assuming monolithic kernel blocks always yield better performance by minimizing OS-level launch overheads.
    **The Consequence:** NPU register spilling causes catastrophic L1 cache misses, drastically regressing performance compared to independent execution.
  napkin_math: |
    1. **Assumptions & Constraints:** Unfused Conv2D outputs a 100MB tensor. ReLU reads the 100MB tensor. Memory bandwidth = 50 GB/s.
    2. **Calculations:** DRAM roundtrip = 100MB write + 100MB read = 200MB. Bandwidth delay = 200MB / 50 GB/s = 0.004 seconds (4.0 ms).
    3. **Conclusion & Interpretation:** **Result: Memory-Bound**. Layer fusion completely eliminates this 4.0ms DRAM roundtrip overhead.
