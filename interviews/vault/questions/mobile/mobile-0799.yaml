title: Thermal Throttling in Background Indexing
scenario: 'A smartphone indexes local photos using a Vision Transformer. The SoC has a 2.5W continuous TDP. The ViT runs at 30 FPS, consuming 4.0W (burst mode). To prevent overheating, the thermal governor enforces a rule: the 1-minute average power cannot exceed the 2.5W TDP. When not bursting, the SoC enters a cool-down state drawing 1.0W (processing 0 FPS).'
question: How would you calculate the maximum number of images the device can index per minute without violating the thermal limit?
details:
  realistic_solution: Mobile thermal management relies on managing energy over a sliding window. The device can burst above its TDP (4.0W > 2.5W) as long as it compensates with a low-power cool-down phase (1.0W) such that the integral of power over the window (energy) equals the TDP's maximum energy allowance. For a 60-second window, the maximum allowed energy is 150 Joules. We set up an equation where the time spent bursting plus the time spent cooling equals 60 seconds, and their combined energy equals 150 Joules. Solving this gives the maximum allowable burst time per minute. Multiplying this burst time by the model's FPS yields the maximum sustained throughput.
  common_mistake: |
    **The Pitfall:** Calculating throughput purely based on the 4.0W burst.
    **The Rationale:** Candidates fail to realize the duty cycle is constrained by the 1.0W cool-down floor that must balance the thermal equation.
    **The Consequence:** The theoretical throughput drastically overestimates real-world sustained performance before severe throttling.
  napkin_math: |
    *   **Max Energy per Minute:** `2.5W * 60s = 150 Joules`
    *   **Equation Setup:** `4.0W * T_burst + 1.0W * T_cool = 150 Joules`
    *   **Time Constraint:** `T_burst + T_cool = 60 seconds`
    *   **Substitution:** `4.0 * T_burst + 1.0 * (60 - T_burst) = 150`
    *   **Solve:** `3.0 * T_burst = 90  =>  T_burst = 30 seconds`
    *   **Result:** **30 seconds of active bursting at 30 FPS equals 900 images per minute.**
