title: The Multi-Model Orchestration Nightmare
scenario: 'Your team is building a sophisticated AR application that requires running three ML models
  concurrently: a body pose estimation (high-res video input, GPU/NPU), a small speech recognition (audio
  input, CPU), and a gesture classifier (low-res video region, NPU). All must run in real-time. Describe
  how you would design the inference pipeline to manage resource contention, prioritize tasks, and ensure
  real-time performance on a single mobile SoC.'
question: "How would you orchestrate pose, speech, and gesture models concurrently on one mobile SoC without missing real-time budgets?"
details:
  realistic_solution: "Designing such a pipeline requires sophisticated orchestration and resource management:\n\
    \  1.  **Task Prioritization & Scheduling:**\n    *   **Prioritize Critical Paths:** Identify the\
    \ most latency-sensitive model (e.g., pose estimation for visual feedback). Assign higher OS thread\
    \ priorities for its pre/post-processing and accelerator dispatch threads.\n    *   **Asynchronous\
    \ Execution:** All models should ideally run asynchronously. Use separate threads for each model's\
    \ pre-processing, inference submission, and post-processing.\n    *   **OS Scheduler Hints:** Utilize\
    \ Android's `setThreadPerfPolicy` or `setThreadScheduler` (if available/permitted) to give hints to\
    \ the OS scheduler for critical threads.\n  2.  **Accelerator Allocation & Contention Management:**\n\
    \    *   **Dedicated Accelerators (where possible):** Speech recognition is CPU-bound; it should run\
    \ on dedicated \"big\" CPU cores. Body pose (large CNN) and gesture (small CNN) should ideally target\
    \ the NPU.\n    *   **NPU Time Slicing:** If two NPU-bound models (pose and gesture) run concurrently,\
    \ the NPU driver will time-slice them. This introduces latency. Consider:\n        *   **Sequential\
    \ Execution:** If the gesture model is very small, run it sequentially *after* pose estimation if\
    \ its total latency fits the budget.\n        *   **Dynamic Prioritization:** If one model is more\
    \ critical at a given moment, dynamically adjust its priority with the NPU driver (if API supports\
    \ it) or suspend the less critical one.\n        *   **Batching (if applicable):** If gesture uses\
    \ a sub-region of the pose model's output, consider fusing them or batching if input frames align.\n\
    \    *   **GPU as Fallback/Alternative:** If NPU contention is too high, one model (e.g., gesture\
    \ classifier) could be delegated to the GPU, leveraging its independent execution units, but this\
    \ might increase power consumption.\n  3.  **Memory Bandwidth Management:**\n    *   **Minimize Data\
    \ Copies:** Reduce transfers between CPU, GPU, and NPU. Use shared memory buffers (e.g., `AHardwareBuffer`\
    \ on Android) when passing tensors between components.\n    *   **Data Locality:** Design models to\
    \ access data efficiently from caches.\n    *   **Pre-fetching:** Proactively load model weights or\
    \ upcoming input data into memory if possible.\n  4.  **Power & Thermal Management:**\n    *   **DVFS\
    \ Awareness:** Monitor SoC temperature and clock frequencies. If throttling occurs, dynamically reduce\
    \ model complexity (e.g., lower resolution, smaller model variant) or drop frames for less critical\
    \ models.\n    *   **Power Gating:** Ensure accelerators are power-gated when idle.\n  5.  **Synchronization\
    \ & Communication:** Use efficient inter-thread communication mechanisms (e.g., lock-free queues,\
    \ condition variables) to pass data between pipeline stages."
  common_mistake: '"Just run them all in parallel on different threads." This overlooks shared resources,
    scheduling, and power management.'
  napkin_math: 'Body pose (200ms latency budget): NPU inference 30ms, pre/post-processing 20ms. Speech
    recognition (100ms latency budget): CPU inference 40ms. Gesture (50ms latency budget): NPU inference
    10ms. If pose and gesture both hit the NPU, their combined NPU time might be 40ms, but context switching
    and driver overhead could push it to 60-80ms. If the speech model uses 2 "big" CPU cores, it leaves
    fewer for pre/post-processing of other models. The shared LPDDR5 memory (e.g., 60 GB/s) could be saturated
    if pose (e.g., 20 GB/s) and speech (e.g., 5 GB/s) and gesture (e.g., 5 GB/s) are all active, plus
    OS overhead.'
