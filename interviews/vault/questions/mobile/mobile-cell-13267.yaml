title: Design Prompt Caching Strategy for Mobile LLM on A17 Pro
scenario: 'An iOS app uses A17 Pro Neural Engine (35 TOPS) to run a 1B parameter assistant. 80% of requests
  share a common 512-token system prompt. Without caching: TTFT = 200ms (prefill 512 tokens) + 150ms (prefill
  user tokens avg 256) = 350ms. Design a prompt KV cache strategy that persists the system prompt KV across
  requests. Model: 16 layers, 8 KV heads, 64 head dimension, FP16. Quantify memory cost and TTFT improvement.'
question: "What memory cost and TTFT savings come from caching a 512-token system-prompt KV on A17 Pro?"
details:
  realistic_solution: 'System prompt KV size: 512 tokens × 2(KV) × 16L × 8H × 64D × 2B = 512 × 32,768B
    = 16.7MB. A17 Pro has 6GB RAM; persistent 16.7MB is negligible (0.28%). TTFT with caching: skip system
    prompt prefill (save 200ms). New TTFT: 150ms (user tokens only). Improvement: 200ms / 350ms = 57%
    reduction in TTFT. Cache invalidation: only when system prompt changes (rare in production). Multi-user
    scenario (shared device): cache is user-specific, requires per-user isolation. Memory: 16.7MB × max_concurrent_users_cached.
    For 5 users: 83.5MB — acceptable. Implementation: store KV in a fixed memory region, address passed
    as context to each inference call.'
  common_mistake: Caching the full system prompt KV without considering that it occupies persistent RAM
    and reduces available space for longer context user conversations.
  napkin_math: 'System prompt KV: 2×16×8×64×512×2B = 2×16×8×64×512×2 = 16,777,216B = 16MB. TTFT savings:
    200ms (eliminated prefill). New TTFT: 150ms vs 350ms = 57% faster. Memory overhead: 16MB ÷ 6GB = 0.27%
    — negligible. Cache hit rate: 80% × 57% improvement = 45.6% average TTFT reduction across all requests.'
