title: Edge Data Quality Gate Design for Exynos NPU
scenario: You are designing a real-time data quality gate for a continuous vision application running on an NPU. The system must validate incoming high-resolution frames before waking up a heavy authentication model.
question: "How should the system validate ISP frames for blur and lighting before waking a heavy authentication model?"
details:
  realistic_solution: |
    Leverage a zero-copy memory architecture where the ISP writes directly to shared memory. A lightweight quality-gate model is pinned to one NPU core to continuously validate frames before triggering the heavy model.
  common_mistake: |
    **The Pitfall:** Routing all ISP data through the CPU for validation.
    **The Rationale:** Candidates default to CPU-based heuristic checks before NPU inference, failing to realize this causes excessive memory copying in the shared RAM.
    **The Consequence:** This pipeline bottlenecks the shared memory bandwidth and increases power consumption, defeating the purpose of the low-power NPU.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Heavy model: 0.5 TOPS/frame.
       - Light model: 0.015 TOPS/frame.
       - Rejection rate: 90%.
       - Target framerate: 30 FPS.
    2. **Calculations:**
       - Heavy compute (unfiltered): 0.5 * 30 = 15 TOPS.
       - Light compute (100% of frames): 0.015 * 30 = 0.45 TOPS.
       - Heavy compute (filtered, 10% of frames): 0.5 * 3 = 1.5 TOPS.
    3. **Conclusion & Interpretation:**
       - **Result: Massive Compute Savings.** The quality gate reduces heavy model invocations, saving 13.05 TOPS (15 - 1.95) of active compute and vastly extending battery life.
