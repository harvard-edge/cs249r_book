title: Edge Data Quality Gate Design for Exynos NPU
scenario: You are designing a real-time data quality gate for a continuous vision application running on a dual-core NPU with 34.7 TOPS and shared memory. The system must validate incoming high-resolution frames for blur and lighting anomalies before waking up a heavy authentication model.
question: How should the system validate ISP frames for blur and lighting before waking a heavy authentication model?
details:
  realistic_solution: Leverage a zero-copy memory architecture where the ISP writes directly to shared memory. A lightweight quality-gate model is pinned to one NPU core to continuously validate frames before triggering the heavy model.
  common_mistake: |
    **The Pitfall:** Routing all ISP data through the CPU for validation.
    **The Rationale:** Candidates default to CPU-based heuristic checks before NPU inference, failing to realize this causes excessive memory copying in the shared RAM.
    **The Consequence:** This pipeline bottlenecks the shared memory bandwidth and increases power consumption, defeating the purpose of the low-power NPU.
  napkin_math: |
    1. Calculate heavy model compute: 0.5 TOPS/frame * 30 FPS = **15 TOPS**.
    2. Calculate light model compute: 0.015 TOPS/frame (0.5 GOPs * 30 FPS) = **0.015 TOPS**.
    3. Calculate filtered compute: If the gate rejects 90% of frames, the heavy model processes 3 FPS, requiring 1.5 TOPS.
    4. Calculate savings: 15 TOPS - 1.5 TOPS = **13.5 TOPS** of active compute saved.
