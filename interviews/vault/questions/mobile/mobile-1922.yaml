title: Android NLP Service Optimization
scenario: Optimizing a background NLP service on Android that currently spins up a
  full PyTorch runtime for every notification text on a Snapdragon 8 Gen 3.
question: Create an optimized serving architecture using TFLite Native C++ API and
  Android's bound services to keep the model weights in memory and reduce cold start
  latency.
details:
  realistic_solution: Design an Android Bound Service running in a separate process
    that initializes a TFLite C++ Interpreter natively at boot. Model weights are
    mapped into memory via mmap. When a notification arrives, an IPC call sends the
    text to the service. This avoids the 500ms Java runtime initialization and JNI
    overhead, dropping latency to ~15ms.
  common_mistake: Keeping the PyTorch runtime inside the BroadcastReceiver, which
    Android aggressively kills after execution, forcing continuous cold starts.
  napkin_math: 500ms cold -> 15ms warm = 97% reduction
