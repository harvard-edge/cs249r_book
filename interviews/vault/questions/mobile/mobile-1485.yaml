title: 'Exynos 2400 NPU Shared Memory Architecture'
scenario: 'You are profiling a real-time computer vision pipeline running on the Samsung Exynos 2400 NPU. The system experiences occasional frame drops despite the NPU''s theoretical peak performance. You need to identify the exact architectural components available for tracing performance bottlenecks on this specific SoC, which features a shared memory architecture.'
question: 'Which shared-memory metrics should be monitored to profile Exynos 2400 NPU bottlenecks?'
details:
  realistic_solution: 'To properly profile this bottleneck, you must monitor the shared memory bandwidth and capacity utilization. Since the LPDDR5X pool is shared, high memory traffic from the ISP or CPU during concurrent execution can starve the NPU of data, causing pipeline stalls.'
  common_mistake: |
    **The Pitfall:** Looking for isolated memory profiling metrics assuming dedicated VRAM.
    **The Rationale:** Candidates often forget that mobile SoCs like the Exynos 2400 use a shared memory architecture for the NPU, CPU, GPU, and ISP.
    **The Consequence:** Missing the primary source of latency, which is memory bandwidth contention with other subsystems.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 34.7 TOPS NPU, 12 GB shared LPDDR5X.
    - Workload: 100 GOPS operation.

    **Calculations:**
    - Pure Compute Latency: 100×10^9 / 34.7×10^12 ≈ 2.88 ms.
    - Shared Memory Contention: If CPU/GPU consume 10.5 GB, only 1.5 GB is left for the NPU.

    **Conclusion & Interpretation:**
    - **Result: <1.5 GB available (Memory-Bandwidth-Bound)**. Memory evictions and bandwidth contention will bottleneck the NPU, pushing actual latency far above the 2.88 ms theoretical floor.
