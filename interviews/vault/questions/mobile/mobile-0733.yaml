title: The On-Device Personalization OOM
scenario: Your app has a 50 MB vision model that runs inference flawlessly on devices with 3 GB of RAM.
  You decide to add on-device personalization—allowing the model to fine-tune its last layer using the
  user's photos. As soon as you trigger `model.fit()` with a batch size of 16, the app crashes with an
  Out-of-Memory (OOM) error. Why did a 50 MB model suddenly exceed the 1 GB app memory limit?
question: "Why did a 50 MB model suddenly exceed the 1 GB app memory limit?"
details:
  realistic_solution: Inference only requires storing the weights and the *current* layer's activations.
    Training requires backpropagation, which means you must store the **Forward Activations for every
    single layer** in the network to compute the chain rule gradients later.
  common_mistake: '"The batch size is too large, the images are taking up all the memory." 16 images only
    take a few megabytes. The hidden cost is the autograd graph.'
  napkin_math: 'Inference: 50MB weights + 10MB activations = 60MB. Fine-tuning (`model.fit`) requires
    backpropagation! We must store activations for ALL layers. If batch size=4, 50MB model easily requires
    4 * 100MB intermediate activations = 400MB + 50MB gradients + 100MB optimizer state (Adam) = 600MB
    peak memory. Crash!'
