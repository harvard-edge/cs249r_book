title: 'The On-Device Personalization OOM'
scenario: 'Your app has a 50 MB vision model that runs inference flawlessly on devices with 3 GB of RAM. You decide to add on-device personalization—allowing the model to fine-tune its last layer using the user''s photos. As soon as you trigger `model.fit()` with a batch size of 16, the app crashes with an Out-of-Memory (OOM) error.'
question: 'Why did a 50 MB model suddenly exceed the 1 GB app memory limit during fine-tuning?'
details:
  realistic_solution: 'Inference only requires storing the weights and the *current* layer''s activations. Training requires backpropagation, which means you must store the **Forward Activations for every single layer** in the network to compute the chain rule gradients later.'
  common_mistake: |
    **The Pitfall:** Blaming the batch size and the images taking up all the memory.
    **The Rationale:** Candidates intuitively know that increasing batch size increases memory, but fail to pinpoint the mechanical reason (the autograd graph).
    **The Consequence:** The developer shrinks the image batch size instead of applying gradient checkpointing or freezing layers, failing to fix the root cause.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inference weight size: 50MB. Max app memory: 1024MB (1GB).
    - Training batch size: 16. Forward activations caching required for backpropagation.

    **Calculations:**
    - Inference Memory: 50MB weights + ~10MB activations = ~60MB.
    - Training Memory (Batch=16): 16 images x 25MB activations per image = 400MB.
    - Total Training Peak: 400MB (activations) + 50MB (gradients) + 100MB (Adam state) + 50MB (weights) = 600MB.

    **Conclusion & Interpretation:**
    - **Result: 600MB Peak (Memory-Bound)**. Autograd graphs scale linearly with batch size and depth, quickly causing the memory footprint to balloon and trigger an OOM crash.
