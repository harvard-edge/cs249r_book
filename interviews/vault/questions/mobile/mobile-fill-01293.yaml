title: Drift Detection Strategies for Mobile NPU Deployments
scenario: 'Your team is developing a critical on-device machine learning application for real-time sensor
  data processing on a smartphone, utilizing the Snapdragon 8 Gen 3 Hexagon NPU (45 TOPS INT8, 12-16 GB
  LPDDR5X) for model inference. The model''s performance is highly sensitive to changes in input data
  distribution (data drift) and underlying relationships (concept drift). You need to implement a robust
  drift detection mechanism to maintain reliability. Your team proposes two architectural approaches:


  1.  **Architecture A (Server-Assisted)**: A lightweight agent on the device periodically samples a small
  batch of processed sensor features, compresses them, and securely transmits them to a cloud service.
  The cloud service then performs KL divergence analysis against the original training data distribution
  and alerts if drift is detected.

  2.  **Architecture B (On-Device)**: The device''s ML runtime implements a rolling window average of
  PSI (Population Stability Index) on key input features, continuously comparing the current feature distributions
  against a stored baseline. If the PSI for any monitored feature exceeds a predefined threshold, an on-device
  alert is triggered.


  Critically compare these two architectures, considering their trade-offs in terms of detection latency,
  power consumption, memory footprint (leveraging the LPDDR5X), computational load on the NPU (given its
  INT8 capabilities), data privacy, and overall impact on the application''s reliability and user experience.
  Which approach would you recommend for this specific mobile NPU platform and why?'
details:
  realistic_solution: 'For this scenario, a hybrid approach combining lean on-device monitoring with selective,
    server-assisted deep analysis offers the best balance. Architecture B, with on-device PSI, is a strong
    candidate for immediate, low-latency drift detection. PSI is computationally efficient and can leverage
    the NPU''s INT8 capabilities for binning and histogram calculations, minimizing power consumption.
    The 12-16 GB LPDDR5X provides ample memory for storing baselines and rolling window data without impacting
    main model inference. However, PSI might miss subtle concept drift. Thus, Architecture A could be
    employed as a secondary, less frequent check: small, anonymized feature summary statistics (not raw
    data) could be uploaded during device charging or Wi-Fi availability for a more thorough, server-side
    KL divergence analysis. This ensures comprehensive drift detection while respecting mobile constraints
    and user privacy.'
  common_mistake: A common mistake is to directly port server-side drift detection mechanisms (e.g., complex
    statistical tests requiring large data buffers) to mobile devices without accounting for severe resource
    constraints (battery, memory, compute cycles) and intermittent connectivity. This can lead to excessive
    power drain, degraded app responsiveness, and privacy concerns due to data offloading, ultimately
    hindering reliability.
  napkin_math: 'Consider the on-device computational cost for PSI. If we monitor 10 key features, each
    with 50 histogram bins, over a sliding window of 1000 inferences:


    *   **Binning (per inference):** 10 features * (1 comparison/lookup) = 10 operations.

    *   **Histogram update (per inference):** 10 features * (1 increment) = 10 operations.

    *   **PSI Calculation (per window refresh, e.g., every 100 inferences):** For 10 features, each with
    50 bins, approximately 10 * 50 * (4 arithmetic ops + 1 log op) = ~2500 operations.


    Total average ops per inference for drift detection: ~20 ops (continuous) + (2500 ops / 100 inferences)
    = ~45 operations. Given the Snapdragon 8 Gen 3 Hexagon NPU''s 45 TOPS (45 * 10^12 operations/sec),
    these ~45 operations are effectively instantaneous and negligible, consuming minimal NPU cycles and
    battery. The primary resource consideration would be the LPDDR5X memory for storing 10 feature histograms
    (10 * 50 bins * 4 bytes/bin for counts = 2KB), which is trivial.'
