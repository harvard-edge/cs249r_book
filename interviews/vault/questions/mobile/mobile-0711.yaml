title: The INT4 Weight-Only Quantization
scenario: You're deploying a 7B parameter LLM on a Samsung Galaxy S24 Ultra (Snapdragon
  8 Gen 3, 12 GB RAM, LPDDR5X at 51.2 GB/s). You choose W4A16 quantization — 4-bit
  weights with 16-bit activations. Walk through the memory savings, the dequantization
  cost per token, and explain why this asymmetric scheme works better than W4A4 on
  mobile.
question: Why is W4A16 a better mobile LLM quantization scheme than W4A4 despite keeping
  activations at 16-bit precision?
details:
  realistic_solution: W4A16 is the sweet spot for on-device LLMs because weights are
    static (quantized once, stored compressed) while activations are dynamic (computed
    fresh each token, need precision to preserve outliers).
  common_mistake: '"W4A4 would be even better — quantize everything to 4-bit for maximum
    compression and speed." W4A4 destroys accuracy on generative models because activations
    have outlier channels with 100× the magnitude of typical values. Clamping these
    to 4-bit loses critical information.'
  napkin_math: 'FP16: 14 GB (no fit). W4A16: 3.72 GB (fits). Compression: 3.76×. Bandwidth
    per token: 3.72 GB / 30 GB/s (sustained) = 124ms → 8 tok/s. With speculative decoding
    (3× acceptance): ~24 tok/s. Dequant overhead: 14 GFLOP / 4.6 TFLOP = 3ms (hidden
    behind memory latency). W4A4 accuracy: perplexity degrades 15-40% on LLaMA-7B
    benchmarks. W4A16: perplexity degrades <2%. The activation precision is non-negotiable.'
