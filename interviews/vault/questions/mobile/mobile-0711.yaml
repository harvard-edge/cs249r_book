title: The INT4 Weight-Only Quantization
scenario: You're deploying a 7B parameter LLM on a device with 12 GB RAM and LPDDR5X at 30 GB/s. You choose W4A16 quantization.
question: "Why is W4A16 a better quantization scheme than W4A4 despite keeping activations at 16-bit precision?"
details:
  realistic_solution: |
    W4A16 is the sweet spot for on-device LLMs because weights are static and memory-bound, while activations are dynamic and need precision to preserve outlier channels.
  common_mistake: |
    **The Pitfall:** Assuming W4A4 is strictly superior for maximum compression.
    **The Rationale:** Candidates overlook that generative model activations contain outlier channels with magnitudes 100x larger than typical values.
    **The Consequence:** Clamping these outlier activations to 4-bit destroys model accuracy and perplexity, rendering generative outputs unusable.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - FP16 weights: 14 GB.
       - Bandwidth: 30 GB/s.
    2. **Calculations:**
       - W4A16 Footprint: 7B * 0.5 bytes + 16-bit activations = ~3.7 GB.
       - Decode latency: 3.7 GB / 30 GB/s = ~123ms per token (8 tok/s).
    3. **Conclusion & Interpretation:**
       - **Result: Generative Quality Preservation.** W4A16 compresses the static memory-bound weights by 4x to fit RAM, while preserving dynamic activation precision to handle outlier channels critical for LLM accuracy.
