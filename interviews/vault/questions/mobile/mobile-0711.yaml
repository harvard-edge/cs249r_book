title: The INT4 Weight-Only Quantization
scenario: You're deploying a 7B parameter LLM on a device with 12 GB RAM and LPDDR5X at 30 GB/s sustained bandwidth. You choose W4A16 quantization — 4-bit weights with 16-bit activations.
question: Why is W4A16 a better mobile LLM quantization scheme than W4A4 despite keeping activations at 16-bit precision?
details:
  realistic_solution: W4A16 is the sweet spot for on-device LLMs because weights are static while activations are dynamic and need precision to preserve outliers.
  common_mistake: |
    **The Pitfall:** Assuming W4A4 is strictly superior for maximum compression.
    **The Rationale:** Candidates overlook that generative model activations contain outlier channels with magnitudes 100x larger than typical values.
    **The Consequence:** Clamping these outlier activations to 4-bit destroys model accuracy and perplexity, rendering generative outputs unusable.
  napkin_math: |
    1. Compare static size: FP16 takes 14 GB (OOM), W4A16 takes 3.72 GB (fits), achieving a 3.76x compression.
    2. Calculate bandwidth per token: 3.72 GB / 30 GB/s = 124ms per token (-> 8 tok/s).
    3. Estimate speculative decoding speed: 8 tok/s * 3x acceptance = **~24 tok/s**.
    4. Evaluate dequantization overhead: 14 GFLOP / 4.6 TFLOP = **3ms** (hidden behind memory latency).
