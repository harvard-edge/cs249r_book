title: The On-Device Vector Search Gone Wrong
scenario: Your note-taking app implements on-device semantic search using a 384-dim embedding model and
  a FAISS flat index stored locally. Users with <1000 notes get instant results. A power user with 50,000
  notes reports search takes 8 seconds on their iPhone 14 Pro (A16 Bionic, 6 GB RAM) and sometimes returns
  completely wrong results — searching for 'meeting notes' returns recipes. What's happening?
details:
  realistic_solution: 'Two bugs: performance and correctness. Performance: FAISS flat scan over 73.2 MB
    causes 4,688 page faults x 1.5ms = 7.0s cold. Fix: IVF index (2.2 MB scan, 15ms) or HNSW (<1ms). Correctness:
    stale embeddings from edited/deleted notes cause phantom matches. An edited recipe note retains its
    old embedding, matching ''meeting notes.'' Fix: version-track embeddings, reindex on edits. With PQ8:
    index = 400 KB, fits in memory. Two separate bugs need two separate fixes.'
  common_mistake: '"FAISS flat index is O(n) — just use an approximate index like HNSW." HNSW would be
    faster, but it doesn''t explain the *wrong results*. Speed and correctness are separate bugs.'
  napkin_math: 'Flat index scan: 73.2 MB. Page faults at cold start: 4,688 × 1.5 ms = 7.0 sec. IVF-3 scan:
    2.2 MB, ~0 page faults (fits in resident memory), 15 ms. HNSW search: ~50 KB read, <1 ms. Index with
    stale embeddings: 80,000 vectors × 384 × 4 = 117 MB (60% bloat). After compaction: 73.2 MB. Memory-resident
    IVF index: 73.2 MB + 100 centroids × 384 × 4 = 73.35 MB. With product quantization (PQ8): 50,000 ×
    8 bytes = 400 KB + codebook. Search: <1 ms.'
