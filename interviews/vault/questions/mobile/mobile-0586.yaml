title: The On-Device Vector Search Gone Wrong
scenario: Your note-taking app implements on-device semantic search using a 384-dim embedding model and a FAISS flat index stored locally. Users with <1000 notes get instant results. A power user with 50,000 notes reports search takes 8 seconds on their iPhone 14 Pro (A16 Bionic, 6 GB RAM) and sometimes returns completely wrong results.
question: Why does FAISS flat search over 50,000 notes take 8 seconds and return stale recipe matches on an iPhone 14 Pro?
details:
  realistic_solution: 'Two bugs: performance and correctness. Performance: FAISS flat scan over 73.2 MB causes 4,688 page faults x 1.5ms = 7.0s cold. Fix: IVF index (2.2 MB scan, 15ms) or HNSW (<1ms). Correctness: stale embeddings from edited/deleted notes cause phantom matches. An edited recipe note retains its old embedding, matching ''meeting notes.'' Fix: version-track embeddings, reindex on edits. With PQ8: index = 400 KB, fits in memory. Two separate bugs need two separate fixes.'
  common_mistake: |
    **The Pitfall:** Recommending an approximate index like HNSW to fix everything.
    **The Rationale:** Engineers correctly identify that O(n) flat scans are slow and suggest an O(log n) solution.
    **The Consequence:** HNSW makes the search faster, but entirely fails to address the correctness bug (stale embeddings), meaning fast searches still return the wrong notes.
  napkin_math: |
    1. Flat index scan footprint: 73.2 MB.
    2. Page faults at cold start: 4,688 faults × 1.5 ms = 7.0 seconds latency.
    3. Index bloat with stale embeddings (assuming 60% overwrite): 80,000 vectors × 384 dims × 4 bytes = 117 MB.
    4. Product Quantization (PQ8) memory footprint: 50,000 notes × 8 bytes = 400 KB + codebook.
    5. **Result: HNSW/PQ8 search takes < 1 ms and fits safely in mobile RAM.**
