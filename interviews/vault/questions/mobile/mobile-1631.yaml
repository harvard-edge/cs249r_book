title: Optimizing Large Language Model Inference with Structured Sparsity on Google Tensor G3
scenario: You are deploying an LLM for on-device inference on the Google Tensor G3 (7.5 TOPS, 12 GB LPDDR5X). The current model exceeds latency and power constraints. You must implement pruning and sparsity techniques to meet performance targets.
question: How would you design a pruning and sparsity strategy for a Tensor G3 LLM that balances accuracy, latency, and power?
details:
  realistic_solution: An L6+ engineer would propose a hybrid pruning strategy. They would start by analyzing the model's sensitivity to pruning at different layers and applying structured pruning techniques (e.g., block sparsity, filter pruning, or channel pruning) that generate patterns directly optimizable by the Tensor G3's TPU tensor cores. This approach minimizes memory fetches for sparse weights and allows for predictable performance gains. For layers less sensitive to structured pruning or where higher sparsity is needed, they might apply unstructured pruning followed by re-training with sparsity-aware optimization, potentially leveraging an INT8-aware retraining loop. The engineer would rigorously benchmark various structured sparsity patterns (e.g., 2:4 or 4:8 sparsity if supported by the hardware, or block sizes relevant to the TPU's compute units) to identify those that offer the best accelerator alignment. They would also develop a clear methodology for evaluating accuracy-speedup-power tradeoffs, using metrics beyond just FLOPs (e.g., actual latency, memory bandwidth utilization, energy per inference) to select the optimal pruned model configuration for the Tensor G3, ensuring memory access patterns are cache-friendly.
  common_mistake: |
    **The Pitfall:** Applying naive unstructured pruning and expecting proportional speedups.
    **The Rationale:** Candidates assume any reduction in FLOPs directly translates to lower latency.
    **The Consequence:** Irregular sparsity patterns fail to map to TPU matrix cores, resulting in poor memory access, indexing overhead, and zero practical speedup.
  napkin_math: |
    - **Dense Memory Access:** N parameters require 2N bytes (FP16).
    - **Unstructured Sparsity (50%):** Requires masking and dynamic indexing; memory access remains ~2N bytes.
    - **Structured Sparsity (50%):** Physical channel/block removal reduces memory access to exactly N bytes.
    - **Load Time Savings:** For a 2GB model, reducing to 1GB saves ~20ms in load time over a 50 GB/s bus.
    - **Final Result:** **Structured pruning cuts exact memory bandwidth requirements in half, directly accelerating memory-bound LLM generation.**
