title: Optimizing Large Language Model Inference with Structured Sparsity on Google Tensor G3
scenario: You are deploying an LLM for on-device inference on the Google Tensor G3 (7.5 TOPS, 12 GB LPDDR5X). The current model exceeds latency and power constraints. You must implement pruning and sparsity techniques to meet performance targets.
question: How would you design a pruning and sparsity strategy for a Tensor G3 LLM that balances accuracy, latency, and power?
details:
  realistic_solution: Design a structured sparsity regime (like 2:4 or 4:8 block sparsity) directly compatible with the TPU's matrix math units. Unstructured pruning yields zero practical speedup due to memory fragmentation and pointer indexing overhead. By enforcing structured patterns, you cut exact memory bandwidth requirements, minimizing physical fetches over the LPDDR5X bus and lowering the energy footprint per token.
  common_mistake: |
    **The Pitfall:** Applying naive unstructured pruning and expecting proportional end-to-end speedups.
    **The Rationale:** Candidates assume that purely reducing theoretical FLOPs directly translates to lower latency on physical hardware.
    **The Consequence:** Irregular sparse matrices cause cache thrashing and dynamic indexing overhead, nullifying matrix-multiply acceleration and resulting in worse latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Unpruned Model: 2GB (FP16).
       - Memory Bus: 50 GB/s.
       - Sparsity Level: 50%.
    2. **Calculations:**
       - Unstructured Loads: Still requires ~2GB scan (masking overhead cancels benefits).
       - Structured Loads: Exactly 1GB physical fetch.
       - Dense Load Time: 2GB / 50 GB/s = 40ms.
       - Structured Load Time: 1GB / 50 GB/s = 20ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth-Bound.** Structured sparsity linearly cuts memory fetches, saving 20ms per pass and avoiding hardware indexing penalties.
