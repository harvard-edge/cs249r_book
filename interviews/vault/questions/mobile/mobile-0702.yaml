title: The Zero-Point Drift
scenario: You deploy an INT8 quantized image classification model to a mobile phone. During local testing
  with PyTorch, the model has 95% accuracy. On the phone, using TFLite, it drops to 82%. You discover
  that a specific intermediate activation tensor is consistently hitting exactly `0` when it shouldn't.
  What quantization hardware mismatch occurred?
details:
  realistic_solution: You hit an asymmetric vs. symmetric quantization mismatch, specifically regarding
    the zero-point. In PyTorch, you likely simulated symmetric quantization, where 0 in floating-point
    maps exactly to 0 in INT8. However, TFLite on mobile often uses asymmetric quantization, where the
    minimum and maximum float values are mapped to -128 and 127, and the floating-point `0.0` might map
    to an integer like `14`. If the NPU hardware or driver assumes a symmetric format, it will not apply
    the zero-point offset during the matrix multiplication. All negative activations (like those before
    a ReLU) are incorrectly clipped, physically destroying the feature map.
  common_mistake: '"Assuming INT8 is a universal format and that ''quantized'' means the same thing across
    all frameworks and hardware."'
  napkin_math: 'Quantized = round(Float / Scale) + ZeroPoint. If Scale = 0.1, ZeroPoint = 50: float 0.0
    maps to INT8 value 50. If NPU ignores zero point (treats as symmetric, ZP=0), it computes Float =
    50 * 0.1 = 5.0 instead of 0.0. For a 224x224x3 input tensor: 150,528 activations shifted by +5.0.
    On Snapdragon Hexagon DSP: symmetric INT8 runs at full 26 TOPS. Asymmetric adds ZP correction per
    accumulation, ~15% throughput penalty. On Apple ANE: both modes run at full speed (hardware ZP support).
    Accuracy impact: 95% to 82% = 13% drop, concentrated in layers where ReLU clipping interacts with
    ZP offset.'
