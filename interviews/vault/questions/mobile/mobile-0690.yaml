title: The On-Device Image Generation Memory Wall
scenario: Your PM wants on-device image generation on a mobile device. The model consists of a 1B parameter U-Net (INT8 = 1 GB weights), CLIP text encoder (340M params, FP16 = 680 MB), and VAE decoder (80M params, FP16 = 160 MB). Total weights are 1.84 GB. It fits in the ~5 GB available memory. But during the 20-step denoising loop, the app gets jetsammed at step 12. The weights haven't changed.
question: Why does the app get jetsammed at denoising step 12 even though 1.84 GB of weights fit?
details:
  realistic_solution: |
    The U-Net's skip connections force large activation tensors to persist across the entire forward pass. At 512x512, peak activations reach ~800 MB during mid-level layers. Combined with weights and app overhead, memory grows per denoising step if intermediate buffers aren't freed. A 200 MB/step leak reaches 2.4 GB by step 12, pushing the total past the OS jetsam limit. Fix: implement attention slicing, reuse activation buffers between steps via pre-allocated pools, and run U-Net components sequentially.
  common_mistake: |
    **The Pitfall:** Assuming memory footprint is solely defined by model weights.
    **The Rationale:** Candidates focus entirely on weight quantization and ignore the massive activation memory generated during the U-Net's forward pass.
    **The Consequence:** The application predictably crashes via OS Jetsam intervention during the denoising loop due to unmanaged intermediate tensor allocations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Weights: 1.84 GB.
    - OS Jetsam Limit: 5.5 GB.
    - App overhead: 500 MB.
    - Buffer leak per step: 200 MB.

    **Calculations:**
    - Memory at step 12: 1.84 GB (weights) + 500 MB (app) + (12 * 200 MB) (leak) = 1.84 + 0.5 + 2.4 = 4.74 GB. Add peak activations (~800 MB) = 5.54 GB.
    - 5.54 GB > 5.5 GB jetsam limit.
    - With attention slicing and buffer reuse: 1.84 GB + 500 MB + 530 MB (optimized activations) = 2.87 GB.

    **Conclusion & Interpretation:**
    - **Result: 5.54 GB (Memory Capacity)**. Total memory reaches 5.54 GB at step 12, triggering Jetsam. Optimization reduces peak to 2.87 GB.
