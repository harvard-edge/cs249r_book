title: The On-Device Image Generation Memory Wall
scenario: 'Your PM wants on-device image generation (Stable Diffusion-style) on an iPhone 16 Pro (A18
  Pro, 8 GB RAM). The model: a 1B parameter U-Net (INT8 = 1 GB weights), CLIP text encoder (340M params,
  FP16 = 680 MB), and VAE decoder (80M params, FP16 = 160 MB). Total weights: 1.84 GB. It fits in the
  ~5 GB available memory. But during the 20-step denoising loop, the app gets jetsammed at step 12. The
  weights haven''t changed. What''s consuming memory during denoising?'
details:
  realistic_solution: 'The U-Net''s skip connections force large activation tensors to persist across
    the entire forward pass. At 512x512, peak activations reach ~800 MB during mid-level layers. Combined
    with 1.85.5 GB weights and 500 MB app overhead, memory grows per denoising step if intermediate buffers
    aren''t freed — a 50 MB/step leak reaches 600 MB by step 12, pushing total to 3.75.5 GB past the 5.5
    GB jetsam limit. Fix: implement attention slicing (process attention in chunks), reuse activation
    buffers between steps via pre-allocated pools, and run U-Net components sequentially. Optimized peak:
    2.87 GB with 1.13 GB headroom.'
  common_mistake: '"The model is too big — quantize more aggressively." The weights fit. The problem is
    the *activation memory* during the U-Net''s forward pass, which peaks during the denoising loop.'
  napkin_math: 'Weights: 1.85.5 GB. Peak activations (512×512): 800 MB. Buffer leak (12 steps × 50 MB):
    600 MB. App overhead: 500 MB. Total: 3.75.5 GB > 5.5 GB jetsam limit at step 12. With attention slicing
    + buffer reuse: 1.84 + 0.53 + 0 + 0.5 = 2.87 GB. Headroom: 1.13 GB. Completes all 20 steps. With 256×256:
    1.84 + 0.2 + 0 + 0.5 = 2.55.5 GB. Ample headroom. Generation time: 20 steps × 1.5s/step = 30 seconds
    at 512×512. Acceptable for a "generate" button UX.'
