title: Mobile Federated Update Upload Budget
scenario: A mobile federated learning round selects 100,000 devices. Each device uploads a compressed 2 MB adapter update over Wi-Fi.
question: Estimate aggregate uplink volume and explain why server aggregation bandwidth matters for a mobile FL round with 100,000 devices.
details:
  realistic_solution: The round collects 200,000 MB, or about 200 GB, of updates. Even though each device upload is small, the aggregation service must ingest and validate hundreds of GB per round, handle stragglers, and protect privacy.
  common_mistake: |
    **The Pitfall:** Thinking only about per-device bandwidth and ignoring aggregate server-side ingest.
    **The Rationale:** Engineers often evaluate mobile limits in isolation and assume the cloud backend has infinite bandwidth.
    **The Consequence:** The aggregation service is overwhelmed trying to ingest and validate hundreds of GB per round, causing timeouts and failed training rounds.
  napkin_math: |
    - Uploads per device: 2 MB.
    - Total devices: 100,000.
    - Aggregate data: 100,000 x 2 MB = 200,000 MB.
    - **200,000 MB ≈ 200 GB.**
