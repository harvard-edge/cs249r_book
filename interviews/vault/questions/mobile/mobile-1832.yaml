title: Mobile Federated Update Upload Budget
scenario: A mobile federated learning round selects 100,000 devices. Each device uploads a compressed 2 MB adapter update over Wi-Fi.
question: "Estimate aggregate uplink volume and explain why server aggregation bandwidth matters for a mobile FL round with 100,000 devices."
details:
  realistic_solution: The round collects 200,000 MB, or about 200 GB, of updates. Even though each device upload is small, the aggregation service must ingest and validate hundreds of GB per round, handle stragglers, and protect privacy.
  common_mistake: |
    **The Pitfall:** Evaluating mobile constraints in pure isolation while ignoring cloud backend ingest limits.
    **The Rationale:** Engineers assume the aggregation server has infinite bandwidth and memory to handle fleet-scale synchronization.
    **The Consequence:** The centralized aggregation service collapses under hundreds of gigabytes of burst traffic, causing massive timeout failures across the fleet.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet Size: 100,000 devices.
       - Payload Size: 2 MB per device.
       - Protocol: Simultaneous Wi-Fi upload.
    2. **Calculations:**
       - Total Upload Volume: 100,000 devices * 2 MB = 200,000 MB.
       - Gigabyte Conversion: 200,000 MB / 1,000 MB/GB = 200 GB.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound (Server Ingest)**
       - The mobile fleet will bombard the backend with a 200 GB traffic burst. The cloud system must be explicitly provisioned to handle this massive synchronous ingest.
