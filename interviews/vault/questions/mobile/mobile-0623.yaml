title: The Metal Shader Threadgroup Limit
scenario: You write a custom Metal Compute Shader configured with a threadgroup size of 1024 to process pixels simultaneously. The code executes perfectly on newer hardware but immediately crashes on older devices with a 'Threadgroup size exceeds limit' error.
question: Why does a Metal shader with 1024-thread groups run on newer hardware but crash on older devices?
details:
  realistic_solution: |
    Apple's GPU architecture physically restricts the maximum threadgroup size based on the generation's execution unit and register file capacity. Newer SoCs physically possess enough threadgroup memory and registers to hold state for 1024 concurrent threads, while older SoCs cap at 512. Metal evaluates this asynchronously at dispatch, not at compile time. The robust architectural solution relies on dynamic querying using `device.maxThreadsPerThreadgroup` and dynamically sizing execution parameters at runtime, combined with optimizing `threadExecutionWidth`.
  common_mistake: |
    **The Pitfall:** Assuming the older phone doesn't have enough GPU RAM.
    **The Rationale:** Candidates conflate threadgroup size with total VRAM allocation.
    **The Consequence:** They try to optimize the model's memory footprint instead of dynamically sizing the threadgroup width.
  napkin_math: |
    **Assumptions & Constraints:**
    - Shader threadgroup request: 1024 threads.
    - New SoC maximum capacity: >= 1024 threads.
    - Old SoC maximum capacity: 512 threads.

    **Calculations:**
    - Older architecture register allocation: 16 KB memory / 512 threads = 32 bytes/thread.
    - Requesting 1024 threads demands 32 KB memory, which physically does not exist on the older compute unit.

    **Conclusion & Interpretation:**
    - **Result: 32 KB memory (Hardware Constraint-Bound)**. The crash is a rigid physical limit, not a memory allocation bug. Shaders must dynamically adapt their layout to the underlying silicon geometry.
