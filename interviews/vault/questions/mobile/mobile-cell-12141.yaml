title: 'Network Bandwidth Bottlenecks: Design Bandwidth-Efficient On-Device LLM Pipeline'
scenario: Design a bandwidth-efficient decode pipeline for a 3B INT4 LLM on A17 Pro (8GB, 68 GB/s Neural
  Engine bandwidth) targeting TPOT < 30ms. The baseline INT4 model uses 1.5GB. Show how weight tiling,
  prefetching, and KV-cache memory layout can improve effective bandwidth utilization beyond the naive
  1.5GB/token approach.
details:
  realistic_solution: '604M MAC model at 35 TOPS: 1.208 GFLOPs / 35 TOPS = 0.034ms. 17.3ms would imply
    ~0.035 TOPS — 1000× slower than Snapdragon 8 Gen 3 NPU.'
  common_mistake: Treating TPOT as purely bandwidth-limited without considering that Neural Engine compute
    scheduling and weight prefetch pipelines can hide latency through overlapped fetch+compute.
  napkin_math: 'Model: 604M MACs, hardware: 35 TOPS INT8. Inference: 604M × 2 ops = 1.208 GFLOPs. Time
    = 1.208G / 35T = 1.208×10^9 / 35×10^12 = 0.0000345s = 0.0345ms. At 50% utilization: 0.069ms. More
    precisely for 604M MACs at 35 TOPS: 604M / (35T/2) = 604M / 17.5T = 0.0000345s = 0.034ms ≈ 0.017ms
    at ~50% NPU efficiency of TOPS rating → 0.017ms (not 17.3ms — that is 1000× too slow).'
