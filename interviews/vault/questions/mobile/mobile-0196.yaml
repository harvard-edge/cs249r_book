title: 'The Jank Budget: Real-Time Deadlines'
scenario: You are designing a real-time, on-device generative AI feature for a smartphone. Your model's Time Per Output Token (TPOT) is 20ms on the phone's NPU. The UI team insists that to avoid user-perceptible stutter, a new frame must be rendered every 16ms.
question: Does a 20ms TPOT meet a 16ms mobile UI frame deadline, and what user-visible effect results?
details:
  realistic_solution: The system will fail to meet its real-time requirement. The time to generate one token (20ms) is longer than the UI's frame rendering deadline (16ms). This means that for every token the model produces, the UI will miss at least one frame update. This causes the animation to appear stuttered and jerky, creating a poor user experience. The system has a latency deficit of 4ms per token.
  common_mistake: |
    **The Pitfall:** Focusing on overall throughput rather than per-event latency.
    **The Rationale:** Engineers often assume that high throughput (e.g., 50 tokens/sec) guarantees real-time performance, missing the strict per-frame latency budget.
    **The Consequence:** The model fails the real-time deadline, causing the UI to drop frames and produce a stuttering, "janky" user experience.
  napkin_math: |
    1. The UI rendering budget is 16ms per frame.
    2. The model TPOT is 20ms per token.
    3. 20ms > 16ms.
    4. Conclusion: **The system misses the deadline by 4ms per token, guaranteeing dropped frames and visible UI jank.**
  options:
  - The system is fine; it generates 50 tokens/sec, which is more than fast enough for a real-time experience.
  - The system will miss its 16ms deadline by 4ms on every token, causing significant UI jank.
  - The performance is acceptable; the 4ms overrun is too small for a user to notice.
  - The issue can be fixed by batching the token generation to increase NPU efficiency.
  correct_index: 1
