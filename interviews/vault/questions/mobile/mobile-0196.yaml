title: 'The Jank Budget: Real-Time Deadlines'
scenario: You are designing a real-time, on-device generative AI feature for a smartphone. The LLM needs
  to generate tokens that appear on screen as they are produced, creating a smooth, streaming effect.
  Your model's Time Per Output Token (TPOT) is 20ms on the phone's NPU. The UI team insists that to avoid
  user-perceptible stutter, or 'jank', a new frame must be rendered every 16ms.
details:
  realistic_solution: The system will fail to meet its real-time requirement. The time to generate one
    token (20ms) is longer than the UI's frame rendering deadline (16ms). This means that for every token
    the model produces, the UI will miss at least one frame update. This causes the animation to appear
    stuttered and jerky, creating a poor user experience. The system has a latency deficit of 4ms per
    token.
  common_mistake: Engineers often focus on the model's overall throughput (e.g., tokens per second) and
    miss the per-event latency constraint. A model can have high throughput (e.g., 1000ms / 20ms = 50
    tokens/sec) but still fail a real-time deadline if the time for a single event (one token) exceeds
    the budget (16ms). They might also incorrectly suggest batching, which increases latency and is unsuitable
    for single-stream generation.
  napkin_math: 1. **Identify the Deadline:** The UI rendering budget is 16ms per frame.
  options:
  - The system is fine; it generates 50 tokens/sec, which is more than fast enough for a real-time experience.
  - The system will miss its 16ms deadline by 4ms on every token, causing significant UI jank.
  - The performance is acceptable; the 4ms overrun is too small for a user to notice.
  - The issue can be fixed by batching the token generation to increase NPU efficiency.
  correct_index: 1
