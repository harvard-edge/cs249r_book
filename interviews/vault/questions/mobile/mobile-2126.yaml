title: Video SR Memory Barrier
scenario: A 1080p video super-resolution model is split between an Apple A17 Pro Neural
  Engine and GPU via shared memory, utilizing a 3-frame pipeline depth with 6MB activations.
question: Evaluate the first-frame latency penalty caused by a 5ms synchronization
  barrier, assuming 10ms compute per stage.
details:
  realistic_solution: In a pipeline of depth 3, the first frame must sequentially
    traverse all three stages before output. Each stage takes 10ms compute plus the
    5ms synchronization barrier. Thus, the first frame takes 3 * 15ms = 45ms, introducing
    a massive initial delay compared to steady-state throughput.
  common_mistake: Calculating the steady-state throughput (15ms/frame) and presenting
    it as the end-to-end latency, ignoring the pipeline depth multiplication effect.
  napkin_math: Stage = 10ms + 5ms sync = 15ms. Pipeline depth = 3. Initial latency
    = 3 * 15ms = 45ms.
