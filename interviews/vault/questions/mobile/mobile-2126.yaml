title: Video SR Memory Barrier
scenario: A 1080p video super-resolution model is split between an NPU and GPU via shared memory, utilizing a 3-frame pipeline depth. Each stage takes 10ms of compute.
question: What is the first-frame latency penalty caused by a 5ms synchronization barrier?
details:
  realistic_solution: 'In a pipeline of depth 3, the first frame must sequentially traverse all three stages before output. Each stage takes 10ms compute plus the 5ms synchronization barrier. Thus, the first frame takes 3 * 15ms = 45ms, introducing a massive initial delay compared to steady-state throughput.'
  common_mistake: |
    **The Pitfall:** Confusing steady-state throughput with initial latency.
    **The Rationale:** Candidates calculate the time between frames (15ms) but ignore the pipeline depth multiplication effect required to fill the pipeline for the first frame.
    **The Consequence:** Massively underestimating the 'time to first frame' (TTFF), which directly impacts the application's interactive responsiveness.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Pipeline Depth: 3 stages.
       - Stage Compute Latency: 10ms per stage.
       - Synchronization Barrier: 5ms per stage.
    2. **Calculations:**
       - Total latency per stage: 10ms + 5ms = 15ms.
       - First-frame latency: 3 stages * 15ms/stage = 45ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound overhead. Pipeline initialization overhead causes a 45ms first-frame latency, degrading user-perceived responsiveness.**
