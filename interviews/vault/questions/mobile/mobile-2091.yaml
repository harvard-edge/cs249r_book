title: Calculating LLM Token Rates by Memory Bandwidth
scenario: A 1.5B parameter INT4 LLM is deployed on a mobile SoC. The system also runs a 4K 60fps display pipeline.
question: What is the maximum theoretical token generation rate for batch size 1 under shared memory constraints, assuming 80 GB/s total bandwidth and 20 GB/s for display?
details:
  realistic_solution: |
    At INT4 precision, the model footprint is 0.75 GB. Autoregressive token generation at batch size 1 is strictly memory-bandwidth bound. The generation rate is bottlenecked by the time it takes to stream weights from shared DRAM to the NPU's SRAM, which must also serve the display pipeline's QoS DMA operations.
  common_mistake: |
    **The Pitfall:** Dividing by peak theoretical bandwidth without accounting for shared resources.
    **The Rationale:** Candidates forget that mobile SoC RAM is a shared unified memory pool and fail to subtract the display pipeline's bandwidth consumption.
    **The Consequence:** The calculated token rate is unrealistically high, leading to blown SLAs and user-facing latency in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 1.5B parameters at INT4 (0.5 bytes/param).
    - Total Bandwidth: 80 GB/s.
    - Display Pipeline Bandwidth: 20 GB/s.

    **Calculations:**
    - Model footprint (INT4): 1.5B params * 0.5 bytes/param = 0.75 GB.
    - Available bandwidth for ML: 80 GB/s (total) - 20 GB/s (display) = 60 GB/s.
    - Maximum generation rate: 60 GB/s / 0.75 GB/token = 80 tokens/sec.

    **Conclusion & Interpretation:**
    - **Result: 80 tokens/sec (Memory-Bound)**. The maximum generation rate is 80 tokens/sec due to shared memory constraints.
