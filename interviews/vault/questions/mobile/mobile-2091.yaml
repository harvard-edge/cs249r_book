title: Calculating LLM Token Rates by Memory Bandwidth
scenario: A 1.5B parameter INT4 LLM is deployed on a Snapdragon 8 Gen 3 with 80 GB/s memory bandwidth. The system also runs a 4K 60fps display pipeline consuming 20 GB/s.
question: What is the maximum theoretical token generation rate for batch size 1 under shared memory constraints?
details:
  realistic_solution: |
    At INT4, the model footprint is 0.75 GB. Total bandwidth is 80 GB/s, but 20 GB/s is reserved for the display, leaving 60 GB/s for the NPU. Autoregressive token generation at batch 1 is memory-bound, limiting the generation rate based on available bandwidth.
  common_mistake: |
    **The Pitfall:** Dividing by peak theoretical bandwidth without accounting for shared resources.
    **The Rationale:** Candidates forget that mobile RAM is shared and fail to subtract the display pipeline's bandwidth consumption.
    **The Consequence:** The calculated token rate is unrealistically high, leading to blown SLAs in production.
  napkin_math: |
    - Model footprint (INT4): 1.5B params * 0.5 bytes = 0.75 GB.
    - Available bandwidth: 80 GB/s (total) - 20 GB/s (display) = 60 GB/s.
    - **Maximum generation rate: 60 GB/s / 0.75 GB/token = 80 tokens/sec.**
