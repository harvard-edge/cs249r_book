title: Calculating LLM Token Rates by Memory Bandwidth
scenario: A 1.5B parameter INT4 LLM is deployed on a Snapdragon 8 Gen 3 (80 GB/s).
  The system also runs a 4K 60fps display pipeline consuming 20 GB/s.
question: Apply shared memory constraints to calculate the maximum theoretical token
  generation rate for batch size 1.
details:
  realistic_solution: At INT4, the model footprint is 0.75 GB. Total bandwidth is
    80 GB/s, minus 20 GB/s for display, leaving 60 GB/s for the NPU. Autoregressive
    token generation at batch 1 is memory-bound, so max generation is 60 GB/s / 0.75
    GB/token = 80 tokens/sec.
  common_mistake: Ignoring the shared nature of mobile RAM and dividing by peak theoretical
    bandwidth, failing to account for display reservations.
  napkin_math: (80 - 20) / 0.75 = 80 tok/s
