title: Federated LLM Personalization on Snapdragon 8 Gen 3 Hexagon NPU
scenario: Design a federated learning system for on-device personalization of a large language model (LLM) for predictive text and voice recognition on smartphones. Your solution must address the challenges of federated averaging with non-IID user data, minimize communication overhead, and ensure efficient on-device computation leveraging the NPU's capabilities.
question: Detail the system architecture, data flow, and key algorithms, including how you would handle model updates and aggregation, given the constrained mobile environment.
details:
  realistic_solution: |
    Implement FedProx or SCAFFOLD to mitigate non-IID data drift, paired with Secure Aggregation for privacy. To minimize communication, apply 8-bit quantization or sparse updates (e.g., LoRA) for gradients. On-device training leverages the NPU's INT8 compute via quantization-aware training APIs, ensuring the personalized LLM fits within the shared LPDDR5X memory budget. Cross-device federation uses robust client selection mechanisms based on device state (plugged in, on Wi-Fi).
  common_mistake: |
    **The Pitfall:** Proposing standard FedAvg with full-precision model updates.
    **The Rationale:** Candidates overlook mobile hardware constraints and assume homogeneous data distributions and unlimited network bandwidth.
    **The Consequence:** The system incurs massive cellular data costs, fails to converge due to non-IID client drift, and causes OOM crashes on older devices.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Base LLM: 7B parameters.
       - Precision: INT8 (1 byte/param).
       - User update size: 0.1% of parameters.
       - Mobile uplink: 50 Mbps (6.25 MB/s).
    2. **Calculations:**
       - Quantized model size: 7B * 1 byte = 7 GB.
       - Update payload size: 7B * 0.001 * 1 byte = 7 MB.
       - Upload time per client: 7 MB / 6.25 MB/s = 1.12 seconds.
       - Server aggregation load (100 clients): 100 * 7 MB = 700 MB.
    3. **Conclusion & Interpretation:**
       - **A 7 MB payload takes 1.12 seconds to upload, making the update highly feasible over cellular. Bottleneck: Network Bandwidth.**
