title: The MediaTek Dimensity APU Architecture
scenario: You've optimized a speech enhancement model for Qualcomm's Hexagon NPU using QNN. Now you need to ship the same model on MediaTek Dimensity 9300 phones. Your engineer switches the TFLite delegate from QNN to NeuroPilot. The model runs but is unexpectedly 13x slower than on Hexagon.
question: Why does a QNN-optimized speech model run 13x slower after switching from Hexagon to MediaTek NeuroPilot?
details:
  realistic_solution: 'Qualcomm''s Hexagon and MediaTek''s APU have different architectures. Hexagon processes mixed INT8/FP16 operations in a single dataflow. MediaTek splits into an Integer Processing Unit (IPU) and Float Processing Unit (FPU) with separate memory hierarchies. A mixed-precision model forces MediaTek''s APU to constantly shuttle data between IPU and FPU, incurring 0.3-0.5ms per transition. Additionally, unfused ops cause intermediate DRAM roundtrips. Fix by restructuring the model to batch all INT8 ops together, and use MediaTek''s quantization toolkit to produce a fully INT8 model.'
  common_mistake: |
    **The Pitfall:** Blaming the hardware and assuming the MediaTek chip is simply slower.
    **The Rationale:** Candidates look at the slow execution time and incorrectly assume the MediaTek APU lacks the raw TOPS required, rather than diagnosing a software delegation inefficiency.
    **The Consequence:** The team unnecessarily abandons highly capable hardware (45 TOPS) and fails to ship the feature to a massive segment of Android users.
  napkin_math: |
    - **Hexagon Compute:** 2.1 GMACs = 4.2 GigaOps. At 48 TOPS: 4.2e9 / 48e12 = 0.0875 ms.
    - **Hexagon Total:** 0.0875 + 0.5 ms scheduling overhead = 0.59 ms.
    - **MediaTek Compute:** 4.2 GigaOps / 45 TOPS = 0.093 ms.
    - **MediaTek Overhead:** Data shuttles between IPU and FPU. ~0.5 ms per transition × 15 transitions = 7.5 ms.
    - **MediaTek Unfused Ops:** ~0.1 ms launch overhead × 3 unfused kernels = 0.3 ms.
    - **MediaTek Total:** 0.093 + 7.5 + 0.3 = 7.893 ms.
    - **Result:** **7.89 ms is ~13.4× slower than Hexagon's 0.59 ms, perfectly explaining the 13x slowdown.**
