title: The Mobile Ridge Point (mobile-0358)
scenario: You're an ML systems engineer at a social media company, tasked with evaluating the new Apple A17 Pro SoC for a real-time, on-device video filter. Before you even profile the model, you want to understand the fundamental performance characteristics of the hardware itself.
question: What is the A17 Pro ridge point, and what does it say about when a workload becomes compute-bound?
details:
  realistic_solution: The Ridge Point represents the hardware's balance between compute and memory bandwidth. It's the minimum Arithmetic Intensity (AI) a workload must have to be compute-bound rather than memory-bound. To calculate it, you divide the peak compute rate by the peak memory bandwidth.
  common_mistake: |
    **The Pitfall:** Focusing solely on the peak TOPS number (35 TOPS).
    **The Rationale:** Assuming any model will achieve peak performance and ignoring the 'memory wall' created by memory bandwidth limits.
    **The Consequence:** Grossly overestimating real-world performance for models with low Arithmetic Intensity.
  napkin_math: |
    - Peak Compute: 35 TOPS (35e12 Ops/s)
    - Memory Bandwidth: 51.2 GB/s (51.2e9 Bytes/s)
    - Ridge Point = Peak Compute / Memory Bandwidth
    - Ridge Point = 35e12 / 51.2e9 = 683.59
    - **Result: ~684 Ops/Byte. Any workload with AI > 684 Ops/Byte is compute-bound; any workload with AI < 684 Ops/Byte is memory-bound.**
  options:
  - ~1.46 Bytes/Op; your model must use less than this per operation to be efficient.
  - ~7 TOPS/W; this is the power efficiency you can expect from the chip.
  - ~684 Ops/Byte; a model's Arithmetic Intensity must exceed this to be compute-bound.
  - ~0.68 Ops/Byte; you only need one operation per byte to be compute-bound.
  correct_index: 2
