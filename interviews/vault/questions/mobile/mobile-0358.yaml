validation_issues_pro:
- The hardware specifications used for the Apple A17 Pro are factually incorrect.
- The peak compute is stated as 45 TOPS, but the official spec is 35 TOPS.
- The memory bandwidth is stated as 77 GB/s, but realistic estimates are closer to 102.4 GB/s.
