title: Optimizing Object Detection Latency on Apple A17 Pro
scenario: A real-time object detection app runs on a 35 TOPS Neural Engine with an inference latency target of 33ms. Initial profiling shows the model consistently takes 60ms.
question: How would you use mobile profiling tools to find why an object detector takes 60ms instead of the 33ms target?
details:
  realistic_solution: 'A realistic solution involves a methodical profiling workflow using nsys profiling or Xcode Instruments (Time Profiler, System Trace, Core ML Instruments) to get an overview of CPU, GPU, Neural Engine, and memory usage during inference. Identify the hottest code paths. Analyze Neural Engine Utilization: Check if the NPU is fully saturated. Analyze memory access patterns for I/O bottlenecks. Based on results, apply optimizations like INT8 quantization, operator fusion, or reducing CPU-NPU memory transfers.'
  common_mistake: |
    **The Pitfall:** Immediately applying model pruning or quantization without profiling.
    **The Rationale:** Engineers assume the model architecture (MAC count) is the sole bottleneck, ignoring data pre/post-processing or memory transfer overheads.
    **The Consequence:** Wasting time on accuracy-degrading architectural changes when the actual bottleneck might be a slow CPU image resize operation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU Peak Compute: 35 TOPS.
       - Target Latency: 33 ms (0.033 s) for 30 FPS.
       - Current Latency: 60 ms.
    2. **Calculations:**
       - Theoretical Max Compute in 33ms: 35 TOPS * 0.033 s = 1.155 TeraOps.
       - Theoretical Max Compute in 60ms: 35 TOPS * 0.060 s = 2.1 TeraOps.
    3. **Conclusion & Interpretation:**
       - **Result: Hardware-Bound. The model either natively requires >1.155 TeraOps or suffers from severe memory/IO utilization bottlenecks preventing it from hitting 33ms.**
