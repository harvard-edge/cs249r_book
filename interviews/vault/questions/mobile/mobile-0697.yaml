title: The Custom Allocator Architect
scenario: You are developing a high-throughput ML inference engine. The standard system malloc/free calls cause performance variability, memory fragmentation, and non-deterministic latency due to OS-level overheads.
question: How would you design a custom memory allocator optimized for the deterministic nature of ML inference workloads on mobile?
details:
  realistic_solution: Leverage memory pooling or arena allocation tailored to predictable tensor allocations.
  common_mistake: |
    **The Pitfall:** Suggesting std::vector or smart pointers as the solution.
    **The Rationale:** Candidates believe wrapping heap allocations in C++ standard library structures solves performance issues, missing that they still trigger underlying OS system calls.
    **The Consequence:** The inference engine remains bottlenecked by unpredictable OS context switches and slow virtual memory fragmentation during extended sessions.
  napkin_math: |
    1. Calculate standard allocation overhead: 100 intermediate tensors * 200ns per `malloc`/`free` = **~20$\mu s$** per inference.
    2. Calculate custom arena overhead: 100 pointer increments * 10ns = 1$\mu s$, plus 0ns to reset the arena at the end.
    3. Calculate savings: Latency drops from 20$\mu s$ to **1$\mu s$**, completely eliminating OS fragmentation overhead.
