title: Mobile New 0005
scenario: A mobile NPU profiles a 3x3 Depthwise Convolution (10M MACs) taking 1.5ms, while a 1x1 Pointwise
  Convolution (100M MACs) takes 0.5ms. The Depthwise layer shows severe memory stalls despite doing 10x
  fewer ops.
details:
  realistic_solution: The symptom is higher latency for a layer with 10x less compute. The cause is the
    lack of data reuse in Depthwise convolutions. While a Pointwise conv reuses the same input activation
    across multiple output channels, a Depthwise conv reads an input patch, multiplies it by a filter,
    and never reuses it. This causes the NPU's MACs to starve while waiting for LPDDR memory fetches.
  common_mistake: Assuming Depthwise convolutions are always universally faster just because their total
    MAC count is lower.
  napkin_math: 'Pointwise reuse: 1 byte read feeds 64 MACs. Depthwise reuse: 1 byte read feeds 9 MACs.
    Depthwise memory traffic = 10M MACs / 9 OP/byte = 1.11MB. BW = 1GB/s. Time = 1.11MB/1GB/s = 1.11ms
    + overhead = 1.5ms.'
