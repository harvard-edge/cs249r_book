title: 'Mobile New 0005'
scenario: 'A mobile NPU profiles a 3x3 Depthwise Convolution (10M MACs) taking 1.5ms, while a 1x1 Pointwise Convolution (100M MACs) takes 0.5ms. The Depthwise layer shows severe memory stalls despite doing 10x fewer ops.'
question: 'Why can a depthwise convolution with 10x fewer MACs be slower than a pointwise convolution on a mobile NPU?'
details:
  realistic_solution: 'The symptom is higher latency for a layer with 10x less compute. The cause is the lack of data reuse in Depthwise convolutions. While a Pointwise conv reuses the same input activation across multiple output channels, a Depthwise conv reads an input patch, multiplies it by a filter, and never reuses it. This causes the NPU''s MACs to starve while waiting for LPDDR memory fetches.'
  common_mistake: |
    **The Pitfall:** Assuming Depthwise convolutions are always universally faster.
    **The Rationale:** Engineers focus only on the total MAC count reduction, ignoring how the operation maps to hardware data-reuse patterns.
    **The Consequence:** They over-index on depthwise layers and suffer massive latency drops because the NPU starves waiting for LPDDR fetches.
  napkin_math: |
    **Assumptions & Constraints:**
    - Depthwise convolution: 10M MACs, 9 Ops/byte reuse.
    - Pointwise convolution: 100M MACs, 64 Ops/byte reuse.
    - Bottleneck: LPDDR Bandwidth at 1 GB/s effective.

    **Calculations:**
    - Depthwise Memory Traffic: 10M MACs / 9 Ops/byte = 1.11 MB.
    - Depthwise Memory Latency: 1.11 MB / 1 GB/s = 1.11 ms.

    **Conclusion & Interpretation:**
    - **Result: 1.5 ms (Memory-Bound)**. The lack of data reuse makes depthwise heavily memory-bound, causing it to take 1.5 ms total (1.11 ms memory + overhead) despite having 10x fewer operations than pointwise.
