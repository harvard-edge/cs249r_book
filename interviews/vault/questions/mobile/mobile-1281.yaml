title: Evaluating Data Pruning for On-Device NPU Tuning
scenario: Your team needs to personalize a 1.5B parameter vision-language model via on-device fine-tuning on a Snapdragon 8 Gen 3 device. The user generates thousands of local images, but due to thermal and battery constraints, we must aggressively prune the training data.
question: 'Which data selection approach is better suited for the heterogeneous Snapdragon 8 Gen 3 environment: CPU-based coreset selection via embeddings or NPU-based gradient loss selection?'
details:
  realistic_solution: Option A is the correct architectural choice. By using a lightweight embedding model (which runs efficiently on the Hexagon NPU using INT8) and performing simple k-means clustering on the CPU, you leverage the heterogeneous CPU+NPU design. This isolates the expensive backward passes to only the selected coreset, keeping peak memory usage well below the 16 GB limit and preventing thermal throttling.
  common_mistake: |
    **The Pitfall:** Choosing gradient-based selection (Option B) for its theoretical optimality.
    **The Rationale:** Candidates prioritize mathematical guarantees of selecting high-signal examples, treating the mobile device like a cloud GPU without considering systemic thermal constraints.
    **The Consequence:** Thrashing the shared memory bandwidth and exhausting the thermal budget with full backward passes before training even begins.
  napkin_math: |
    - **Option B (Gradient-based):** A backward pass on a 1.5B model requires ~6-8 GB of RAM. Passing 10,000 images thrashes the 16 GB LPDDR5X (bandwidth ~68 GB/s), taking hours.
    - **Option A (Embeddings):** Extracting 512-dim INT8 embeddings takes <1 ms per image on the 45 TOPS NPU.
    - **Memory Footprint:** 10,000 embeddings * 512 bytes = ~5 MB.
    - **Clustering:** K-means on 5 MB on the CPU takes milliseconds.
    - **Conclusion:** Option A saves massive compute and memory bandwidth, operating completely within thermal limits.
