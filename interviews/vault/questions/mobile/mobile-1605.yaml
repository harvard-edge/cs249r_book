title: Optimizing Large Context Attention for Mobile NPU
scenario: Your team is deploying a large language model (LLM) with an extended context
  window (e.g., 8K tokens) on the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X).
  You need to decide between a standard Multi-Head Attention (MHA) architecture and
  a Grouped-Query Attention (GQA) variant to maximize inference throughput while staying
  within the NPU's constraints. Compare these two attention mechanisms focusing on
  their implications for memory bandwidth, computational efficiency, and latency on
  this specific hardware. What are the key trade-offs and how would you evaluate them?
question: How do MHA and GQA trade KV bandwidth, latency, and quality for an 8K-token
  LLM on Exynos 2400?
details:
  realistic_solution: The candidate should highlight that GQA significantly reduces
    the key/value cache size by sharing K/V projections across multiple query heads,
    directly improving memory bandwidth efficiency. They should discuss how this translates
    to higher effective throughput and lower power consumption on the Exynos 2400
    NPU, especially given its 12 GB LPDDR5X. The comparison should consider the balance
    between computational intensity (TOPS utilization for matrix multiplications)
    and memory access patterns (for QKV cache). A strong answer would also mention
    the slight quality degradation sometimes observed with GQA and potential mitigation
    strategies, or discuss the context window scaling benefits of GQA for mobile scenarios
    where memory and power are critical.
  common_mistake: Overlooking the significant memory bandwidth bottleneck of MHA for
    large context lengths, especially on mobile devices where memory access is often
    a primary constraint. Failing to quantify the QKV cache size difference and its
    impact on LPDDR5X bandwidth usage for the given context, or not considering the
    power implications of frequent memory access.
  napkin_math: 'For an 8K context length, a model with 32 heads, 128 embedding dimension
    per head (total 4096 hidden dim), and float16 precision:

    *   **MHA K/V Cache Size**: 2 * Heads * Context_Length * Head_Dim * Bytes_Per_Float
    = 2 * 32 * 8000 * 128 * 2 bytes = 131,072,000 bytes ≈ 125 MiB (~131 MB) per layer.
    For 30 layers, this is ~3.75 GB, consuming a significant portion of the 12 GB
    LPDDR5X.

    *   **GQA K/V Cache Size (e.g., 4 groups)**: 2 * Groups * Context_Length * Head_Dim
    * Bytes_Per_Float = 2 * 4 * 8000 * 128 * 2 bytes = 16,384,000 bytes ≈ 15.6 MiB
    (~16 MB) per layer. For 30 layers, this is ~469 MB, a drastic reduction in memory
    footprint and bandwidth requirements. This clearly demonstrates the memory efficiency
    gain of GQA, directly impacting the effective utilization of the Exynos 2400 NPU''s
    LPDDR5X.'
