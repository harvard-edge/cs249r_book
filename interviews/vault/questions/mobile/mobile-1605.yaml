title: Optimizing Large Context Attention for Mobile NPU
scenario: Your team is deploying a large language model (LLM) with an extended context window (e.g., 8K tokens) on a mobile NPU. You need to decide between a standard Multi-Head Attention (MHA) architecture and a Grouped-Query Attention (GQA) variant to maximize inference throughput while staying within the NPU's constraints.
question: Compare these two attention mechanisms focusing on their implications for memory bandwidth, computational efficiency, and latency on this specific hardware. What are the key trade-offs and how would you evaluate them?
details:
  realistic_solution: |
    GQA significantly reduces the Key/Value (KV) cache size by sharing K/V projections across multiple query heads, directly mitigating the memory bandwidth bottleneck. This translates to higher effective throughput and lower power consumption on mobile SoCs. The evaluation should contrast the reduction in LPDDR5X bandwidth usage against the slight potential quality degradation observed with GQA, concluding that GQA is strictly required for 8K context on edge devices.
  common_mistake: |
    **The Pitfall:** Ignoring the KV cache memory bandwidth bottleneck.
    **The Rationale:** Candidates evaluate attention solely on FLOPs, failing to realize that autoregressive decoding with long context is overwhelmingly memory-bound, not compute-bound.
    **The Consequence:** Selecting MHA causes the NPU to stall on memory fetches, resulting in unacceptably slow token generation and thermal throttling.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8K context length (8192 tokens).
    - 32 heads, 128 embedding dimension per head.
    - Precision: FP16 (2 bytes).
    - Layers: 30.
    - GQA Groups: 4.

    **Calculations:**
    - MHA KV Cache Size per layer: 2 * 32 * 8192 * 128 * 2 bytes = 134,217,728 bytes (128 MiB).
    - Total MHA KV Cache (30 layers): 128 MiB * 30 = ~3.84 GiB.
    - GQA KV Cache Size per layer: 2 * 4 * 8192 * 128 * 2 bytes = 16,777,216 bytes (16 MiB).
    - Total GQA KV Cache (30 layers): 16 MiB * 30 = 480 MiB.

    **Conclusion & Interpretation:**
    - **Result: 480 MiB (Memory Bandwidth)**. GQA reduces the KV cache footprint from ~3.84 GiB to 480 MiB, drastically reducing bandwidth requirements.
