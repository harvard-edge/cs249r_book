math_issues:
- The calculation 2 * 32 * 8000 * 128 * 2 bytes equals 131,072,000 bytes (~125 MiB),
  not 128 MB. If 128 MiB was intended, the context length should be 8192 (2 * 32 *
  8192 * 128 * 2 bytes = 134,217,728 bytes = 128 MiB).
