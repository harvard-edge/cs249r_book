title: 'Model Size Estimation: Diagnose Mobile OOM from KV-Cache Growth'
scenario: An iOS app (A17 Pro, 8GB) running a 1B INT4 LLM (500MB) receives OOM crashes after 15-20 conversation
  turns. The app worked fine for 10 turns. Diagnose the root cause and quantify a fix that maintains 20-turn
  conversations.
question: "How would you diagnose the root cause and quantify a fix that maintains 20-turn conversations?"
details:
  realistic_solution: 'KV grows every turn. Turn 1: 512 tokens × 262KB = 134MB. Turn 10: 5120 tokens →
    1.34GB. Turn 15: 7680 tokens → 2.01GB. Turn 20: 10240 tokens → 2.68GB. iOS memory at turn 20: 500MB
    model + 2.68GB KV + 3GB iOS/app = 6.18GB > 5GB iOS limit → crash at turn 18 (9216 tokens = 2.41GB
    KV → total 5.91GB). Fix: implement sliding window KV: keep only last 4096 tokens. KV caps at 1.07GB.
    Total: 500MB+1.07GB+3GB = 4.57GB ✓ for unlimited turns.'
  common_mistake: Blaming the model weights (constant at 500MB) when the bug is unbounded KV-cache growth
    per conversation turn.
  napkin_math: 'KV/token: 262KB. Turn N (N×512 tokens): N×512×262KB. Crash at 5GB iOS ceiling: (5GB -
    500MB model - 3GB app) = 1.5GB KV budget. 1.5GB/262KB=5,725 tokens = 11.2 turns. Consistent with crash
    at turn 12-15 (stochastic due to OS memory management). Fix: cap context at 4096 tokens (sliding window).
    KV=1.07GB. Safe for unlimited turns.'
