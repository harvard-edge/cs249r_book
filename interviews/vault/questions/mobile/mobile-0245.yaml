title: The OTA Storage Budget
scenario: You are an engineer on a team building an AI Co-Pilot for an automotive companion app. The product team has mandated a hard limit of 2 GB for the total installed size. The current app consists of a 1000 MB Base App and a 500 MB v1 Model. Your team needs to ship an improved driver-drowsiness model via an Over-the-Air update. The new v2 Model is 1.8x larger than the v1 model. For safety, the app must support instant rollbacks, which requires keeping both models on disk temporarily.
question: What peak storage is required during a rollback-safe OTA update from a 500 MB model to a 1.8x larger v2 model?
details:
  realistic_solution: 'The update will violate the 2 GB limit. The peak storage occurs during the OTA window when both models coexist: Base App (1000 MB) + v1 Model (500 MB) + v2 Model (900 MB) = 2400 MB. This exceeds the 2 GB cap by 352 MB. After the rollback window closes, storage drops to 1900 MB.'
  common_mistake: |
    **The Pitfall:** Calculating only the final storage footprint.
    **The Rationale:** Candidates forget that to support instant rollbacks, both the old and new models must coexist temporarily during the update.
    **The Consequence:** The update crashes mid-process due to an out-of-storage error, leaving users stranded.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Base App: 1000 MB.
       - v1 Model: 500 MB.
       - Storage Cap: 2 GB (2048 MB).
       - OTA requirement: Both v1 and v2 models coexist.
    2. **Calculations:**
       - v2 Model Size: 500 MB * 1.8 = 900 MB.
       - Peak storage: 1000 MB + 500 MB + 900 MB = 2400 MB.
       - Cap delta: 2400 MB - 2048 MB = +352 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Storage-Bound.** The update temporarily exceeds the budget by 352 MB and will fail mid-flight.
  options:
  - 1600 MB. The final size is well within the limit.
  - 1700 MB. The peak is the initial size plus the old model being duplicated.
  - 2400 MB. The update will temporarily violate the 2 GB storage limit.
  - 1950 MB. The update is large but stays just within the limit.
  correct_index: 2
