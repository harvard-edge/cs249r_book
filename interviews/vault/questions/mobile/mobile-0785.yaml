title: Battery-Aware Sensor Batching
scenario: A smartwatch continuously monitors accelerometer data at 50Hz (every 20ms) to detect falls. A 2MB MLP runs on the CPU. SLA requires detection within 1000ms. Waking the CPU takes 15ms, and unbatched inference takes 2ms. Running inference every 20ms drains the battery rapidly.
question: What sensor batching window minimizes smartwatch CPU duty cycle while preserving fall detection within 1000ms?
details:
  realistic_solution: Decompose the end-to-end latency and buffer the raw sensor data to minimize CPU active time while maximizing batch computation efficiency.
  common_mistake: |
    **The Pitfall:** Decreasing the sensor sampling frequency.
    **The Rationale:** Candidates assume that running the sensor slower (e.g., 10Hz) is the only way to save battery, missing the power of batching and vectorization.
    **The Consequence:** Lowering the frequency destroys the model's ability to capture the high-frequency accelerometer signatures required to detect a fall accurately.
  napkin_math: |
    1. Calculate unbatched duty cycle: 50 wakeups/sec * (15ms + 2ms) = 850ms active/sec (**85% duty cycle**).
    2. Maximize buffer window: Target an 800ms window (leaves 200ms for wake + compute).
    3. Calculate batch size: 800ms / 20ms = 40 samples per batch.
    4. Calculate batched compute time: Vectorized compute scales sub-linearly, taking ~8ms (vs 40*2=80ms).
    5. Check SLA: 800ms buffer + 15ms wake + 8ms compute = **823ms < 1000ms**.
    6. Calculate batched duty cycle: 1.25 wakeups/sec * 23ms = 28.75ms active/sec (**~2.8% duty cycle**).
