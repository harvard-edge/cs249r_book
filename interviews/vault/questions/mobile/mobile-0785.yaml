title: Battery-Aware Sensor Batching
scenario: A smartwatch continuously monitors accelerometer data at 50Hz (every 20ms) to detect falls.
  A 2MB MLP runs on the CPU for inference. SLA requires fall detection within 1000ms of the physical event.
  Waking the CPU from sleep takes 15ms, and unbatched inference takes 2ms. Running inference every 20ms
  keeps the CPU awake 85% of the time, draining the battery in hours.
details:
  realistic_solution: 'Decompose the end-to-end latency and power profile: $T_{e2e} = T_{buffer} + T_{wake}
    + T_{batch\_compute}$. To minimize CPU active time, we must maximize the buffering window (batch size)
    without violating the 1000ms SLA. Architecturally, buffer the raw sensor data in the ultra-low-power
    DSP/sensor hub for 800ms. This accumulates a batch of 40 samples (800ms / 20ms). The CPU wakes up
    ($T_{wake} = 15ms$) and processes the batch. Due to CPU SIMD vectorization and cache locality, batch
    compute scales sub-linearly: $T_{batch\_compute}$ for 40 samples takes 8ms (vs $40 \times 2ms = 80ms$).
    Total worst-case latency is $800ms + 15ms + 8ms = 823ms < 1000ms$. This dramatically reduces the CPU
    duty cycle while maintaining high-frequency data fidelity.'
  common_mistake: Increasing the sensor sampling interval to 10Hz to save battery, which destroys the
    model's ability to detect high-frequency fall signatures.
  napkin_math: 'Unbatched (per second): 50 CPU wakeups. CPU active time = $50 \times (15ms + 2ms) = 850ms$
    per second (85% duty cycle). Batched (800ms window): $1.25$ wakeups per second. CPU active time =
    $1.25 \times (15ms + 8ms) = 28.75ms$ per second (2.8% duty cycle). Battery drain from CPU compute
    is reduced by ~30x.'
