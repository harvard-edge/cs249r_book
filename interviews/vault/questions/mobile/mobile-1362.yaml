title: Calculate Gemini Nano Inference Bound on Tensor G3
scenario: You are deploying Gemini Nano, a 3.2 billion parameter model quantized to 8-bit integers, on the Google Tensor G3. The Tensor G3 features an on-device TPU with 7.5 TOPS of peak compute and 12 GB of LPDDR5X memory. Assume the effective memory bandwidth available to the TPU is 60 GB/s.
question: "What operational intensity and token generation rate bound apply to batch-1 Gemini Nano inference on Tensor G3?"
details:
  realistic_solution: The candidate should recognize that autoregressive LLM inference at batch size 1 is fundamentally memory-bound. They need to calculate the operational intensity by dividing the operations per token by the memory loaded per token. Then, they must use the memory bandwidth to calculate the maximum tokens per second, showing it falls far below the compute ceiling.
  common_mistake: |
    **The Pitfall:** Focusing solely on the 7.5 TOPS peak compute limit to calculate latency.
    **The Rationale:** Candidates often default to compute-bound assumptions for neural networks, forgetting the mechanics of autoregressive decoding at batch size 1.
    **The Consequence:** The resulting latency calculation is wildly optimistic, completely missing the memory bandwidth bottleneck.
  napkin_math: |
    - **Model Size:** 3.2B params * 1 byte (INT8) = 3.2 GB loaded per token.
    - **Operations per token:** ~6.4 Giga-Operations (2 ops per MAC).
    - **Operational Intensity (OI):** 6.4 GOPS / 3.2 GB = **2 OPs/byte**.
    - **Hardware Ridge Point:** 7.5 TOPS (7500 GOPS) / 60 GB/s = **125 OPs/byte**.
    - **Bottleneck:** Since OI (2) < Ridge Point (125), it is heavily memory-bound.
    - **Max Token Rate:** 60 GB/s / 3.2 GB/token = **18.75 tokens/second**.
