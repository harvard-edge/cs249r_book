title: The INT4 Quantization Payoff
scenario: Your team wants to deploy a 3B parameter language model on a phone with 8GB unified memory. The INT8 version is 3 GB. A colleague proposes INT4 quantization to free memory for the KV cache.
question: How much memory does the INT4 model save, and what is the primary risk?
details:
  realistic_solution: 'INT4 halves the weight memory: 3B x 0.5 bytes = 1.5 GB, saving 1.5 GB compared to INT8. This freed memory can hold a KV cache of ~1,500 tokens at FP16 for a 7B-class model. The risk is accuracy loss, especially in embedding and attention output layers.'
  common_mistake: |
    **The Pitfall:** Assuming INT4 quantization is always a free win without risks.
    **The Rationale:** Candidates recognize the halving of weight sizes but ignore the numerical precision requirements of specific model layers.
    **The Consequence:** Significant accuracy degradation on tasks requiring precise numerical reasoning.
  napkin_math: |
    1. INT8 Storage: 3B params * 1 byte/param = 3.0 GB.
    2. INT4 Storage: 3B params * 0.5 bytes/param = 1.5 GB.
    3. Calculate Savings: 3.0 GB - 1.5 GB = 1.5 GB.
    **Conclusion:** 1.5 GB is saved, leaving room for the KV cache and OS.
  options:
  - A) 0.75 GB savings. INT4 is only 25% smaller than INT8.
  - B) 1.5 GB savings. INT4 uses half the bytes of INT8, but risks accuracy loss in sensitive layers.
  - C) 3.0 GB savings. INT4 eliminates half the parameters entirely.
  - D) No savings. INT4 still requires INT8 storage with a lookup table.
  correct_index: 1
