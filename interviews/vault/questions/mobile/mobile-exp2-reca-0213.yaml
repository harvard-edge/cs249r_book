title: Apple A17 Pro Unified Memory Recall
scenario: You are deploying a quantized on-device LLM on an iPhone 15 Pro, targeting the Apple A17 Pro
  Neural Engine. To minimize cold start time and avoid OOM crashes, the team wants to use memory-mapped
  (mmap) weight loading. To justify this strategy, you must recall the specific memory architecture that
  allows the 16-core Neural Engine to access weights without explicit copying. What specific memory architecture
  does the A17 Pro use to share its 8 GB pool between the CPU, GPU, and Neural Engine?
details:
  realistic_solution: The candidate must recall that the Apple A17 Pro uses a 'Unified Memory Architecture'
    (UMA). Because the 8 GB unified memory is physically shared across the CPU, GPU, and the 16-core Neural
    Engine, using mmap allows all compute units to read the exact same physical memory pages directly.
    This enables true zero-copy memory-mapped inference.
  common_mistake: Candidates often assume the NPU has isolated, dedicated VRAM like a discrete desktop
    GPU. They mistakenly believe that even with mmap, weights must eventually be copied over a bus to
    the Neural Engine, defeating the purpose of zero-copy loading.
  napkin_math: If the system has 8 GB of unified memory and the OS/apps use 3.5 GB, only 4.5 GB remains.
    Loading a 4 GB model without unified memory would require 4 GB in host RAM + 4 GB in NPU RAM = 8 GB
    total, causing an immediate OOM (8 GB > 4.5 GB). With the A17 Pro's unified memory and mmap, the total
    footprint remains exactly 4 GB. This leaves 0.5 GB free (4.5 GB - 4 GB = 0.5 GB), keeping the ~5W
    SoC within safe operating limits without triggering memory jetsam.
