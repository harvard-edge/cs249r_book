title: The Canary Rollout Data Bill
scenario: "You're an engineer on a popular mobile photo app with 10 million active users. Your team has developed a new, improved version of the on-device magic touch-up model. The new quantized model file is 20 MB. To validate its real-world performance before a full release, you plan to perform a 1% canary rollout. Assume a conservative mobile data cost of $5.00 per GB for your users."
question: "What is the total data cost of a 1% canary rollout of a 20 MB model to 10M users at $5 per GB?"
details:
  realistic_solution: The correct approach is to first calculate the number of users in the canary group, then determine the total data volume downloaded in MB, convert that volume to GB, and finally calculate the total cost based on the price per GB. At scale, these costs are non-trivial and must be factored into any rollout plan.
  common_mistake: |
    **The Pitfall:** Forgetting unit conversions from MB to GB.
    **The Rationale:** Engineers under pressure often fail to convert Megabytes to Gigabytes before multiplying by the cost per GB.
    **The Consequence:** A wildly incorrect budget estimate that is 1000x too high.
  napkin_math: |
    - Calculate users in canary: `10,000,000 users * 1% = 100,000 users`.
    - Calculate data volume: `100,000 users * 20 MB/user = 2,000,000 MB`.
    - Convert to GB: `2,000,000 MB / 1000 = 2,000 GB`.
    - Calculate cost: `2,000 GB * $5.00/GB = $10,000`.
    - **Conclusion:** The total data cost is **$10,000**.
  options:
  - $1,000,000
  - $10,000,000
  - $10,000
  - $1,000
  correct_index: 2
