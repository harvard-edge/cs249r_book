title: The Canary Rollout Data Bill
scenario: You are engineering a popular mobile photo app with 10 million active users. To validate a 20 MB quantized model update, you plan a 1% canary rollout. Assume a conservative mobile data cost of $5.00 per GB for your users.
question: What is the total data cost of a 1% canary rollout of a 20 MB model to 10M users at $5 per GB?
details:
  realistic_solution: Calculate the number of users in the canary group, determine the total data volume downloaded in MB, convert that volume to GB, and calculate the total cost based on the price per GB. At scale, these costs are non-trivial.
  common_mistake: |
    **The Pitfall:** Forgetting unit conversions from MB to GB.
    **The Rationale:** Engineers under pressure fail to convert Megabytes to Gigabytes before multiplying by the cost per GB.
    **The Consequence:** A wildly incorrect budget estimate that is typically 1000x too high.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total Users: 10,000,000.
       - Canary Group: 1% of total.
       - Model Size: 20 MB.
       - Cost per GB: $5.00.
    2. **Calculations:**
       - Canary Users: 10,000,000 * 0.01 = 100,000 users.
       - Data Volume: 100,000 users * 20 MB/user = 2,000,000 MB.
       - Convert to GB: 2,000,000 MB / 1,000 = 2,000 GB.
       - Total Cost: 2,000 GB * $5.00/GB = $10,000.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Cost-Bound**. The small 1% canary rollout costs $10,000 in user data charges, highlighting the massive economic barrier of continuous OTA model updates.
  options:
  - '$10,000,000 (Trap: Didn''t convert MB to GB)'
  - '$1,000,000 (Trap: 100% rollout instead of 1% canary)'
  - $10,000
  - '$1,000 (Trap: Divided by 10,000 instead of 1,000)'
  correct_index: 2
