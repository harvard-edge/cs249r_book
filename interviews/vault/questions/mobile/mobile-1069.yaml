title: Mobile Training Chunk Size
scenario: A mobile personalization job needs 18 minutes total training time. The scheduler can run only 90-second background chunks before yielding to foreground use.
question: How many 90-second background chunks are needed to complete the 18-minute job?
details:
  realistic_solution: At 90 seconds per chunk, the job needs 12 chunks. The app should checkpoint between chunks.
  common_mistake: |
    **The Pitfall:** Launching one monolithic 18-minute training task.
    **The Rationale:** Candidates assume background tasks on mobile function like server cron jobs, ignoring strict OS foreground yielding rules.
    **The Consequence:** The OS forcefully kills the background process after 90 seconds, and because no intermediate chunks were saved, the training job never completes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total training time needed: 18 minutes.
       - Max background execution chunk size: 90 seconds.
    2. **Calculations:**
       - Total time in seconds: 18 minutes * 60 = 1080 seconds.
       - Number of chunks: 1080 seconds / 90 seconds/chunk = 12 chunks.
    3. **Conclusion & Interpretation:**
       - **Result: 12 Execution Chunks Required**. The job must be broken into 12 separate 90-second chunks with intermediate checkpointing to survive OS background limits.
