title: The Mobile TOPS Illusion
scenario: You're optimizing a new AR filter on an iPhone with an Apple A17 Pro chip. Your computer vision model requires 10 G-ops (INT8) to process a frame and reads a total of 200 MB of data (parameters and activations) from memory per inference. The UX team requires the model to run within a 16ms budget to prevent UI 'jank'.
question: Why does a 10 GOps AR filter reading 200 MB fail to achieve the A17 Pro's advertised peak TOPS?
details:
  realistic_solution: The key is to calculate the model's Arithmetic Intensity (AI) and compare it to the hardware's Ridge Point to determine if it's compute-bound or memory-bound. The A17 Pro's advertised 35 TOPS is a peak theoretical compute throughput. This model's low AI means it is memory-bound, and its actual performance will be dictated by the memory bandwidth, which is significantly lower than the peak compute.
  common_mistake: |
    **The Pitfall:** Assuming a chip's peak advertised TOPS equals realized performance for all models.
    **The Rationale:** Engineers ignore the Roofline model and fail to calculate the workload's Arithmetic Intensity (Ops/Byte).
    **The Consequence:** They expect 35 TOPS performance but hit the memory bandwidth wall immediately.
  napkin_math: |
    1. Arithmetic Intensity (AI): 10 G-ops / 200 MB = 50 Ops/Byte.
    2. Ridge Point: 35 TOPS / 51.2 GB/s = ~683 Ops/Byte.
    3. Comparison: AI (50) is far below the Ridge Point (683). The model is heavily memory-bound.
    4. Compute Time: 10 G-ops / 35 TOPS = 0.28 ms.
    5. Memory Bound Time: 200 MB / 51.2 GB/s = 3.9 ms.
    6. **Conclusion: The operation takes ~3.9 ms, comfortably fitting in the 16ms budget.**
  options:
  - The model is compute-bound, so its latency is `10 G-ops / 35 TOPS ≈ 0.28 ms` and it achieves 35 TOPS.
  - The model is memory-bound because its AI of 50 Ops/Byte is less than the hardware's Ridge Point of ~683 Ops/Byte. The achieved performance is ~2.56 TOPS.
  - The model is compute-bound because its AI of 50 Ops/Byte is high. The achieved performance is limited by the 16ms budget, resulting in `10 G-ops / 0.016s ≈ 0.625 TOPS`.
  - The model is memory-bound, so its latency is determined by compute: `10 G-ops / 35 TOPS ≈ 0.28 ms`. The achieved performance is `200 MB / 0.28ms ≈ 0.7 TOPS`.
  correct_index: 1
