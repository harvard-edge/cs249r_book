title: The Mobile TOPS Illusion
scenario: You're optimizing a new AR filter on an iPhone with an Apple A17 Pro chip. Your computer vision
  model requires 10 G-ops (INT8) to process a frame and reads a total of 200 MB of data (parameters and
  activations) from memory per inference. The UX team requires the model to run within a 16ms budget to
  prevent UI 'jank'.
question: "Why does a 10 GOps AR filter reading 200 MB fail to achieve the A17 Pro's advertised peak TOPS?"
details:
  realistic_solution: The key is to calculate the model's Arithmetic Intensity (AI) and compare it to
    the hardware's Ridge Point to determine if it's compute-bound or memory-bound. The A17 Pro's advertised
    35 TOPS is a peak theoretical compute throughput. This model's low AI means it is memory-bound, and
    its actual performance will be dictated by the memory bandwidth, which is significantly lower than
    the peak compute.
  common_mistake: Engineers often see a chip's peak advertised TOPS (Trillions of Operations Per Second)
    and assume their model will achieve that performance. They forget that performance is a function of
    both compute and memory bandwidth, as described by the Roofline model. If a model doesn't perform
    enough operations for every byte of data it fetches from memory (i.e., it has low 'arithmetic intensity'),
    it will be bottlenecked by the memory system long before it saturates the compute units.
  napkin_math: '1. Compute Time: 10 G-ops / 35 TOPS (35,000 G-ops/s) = 0.28 ms. 2. Memory Bound Time:
    Reading 200 MB at 51.2 GB/s = 200MB / 51,200 MB/s = 3.9 ms. 3. Total Time: Since memory transfer heavily
    dominates, the operation is memory-bound and takes ~3.9 ms minimum. 4. Conclusion: 3.9 ms is well
    within the 16ms latency budget for smooth 60 FPS rendering, ensuring the AR filter avoids UI jank.'
  options:
  - The model is compute-bound, so its latency is `10 G-ops / 35 TOPS ≈ 0.28 ms` and it achieves 35 TOPS.
  - The model is memory-bound because its AI of 50 Ops/Byte is less than the hardware's Ridge Point of
    ~683 Ops/Byte. The achieved performance is ~2.56 TOPS.
  - The model is compute-bound because its AI of 50 Ops/Byte is high. The achieved performance is limited
    by the 16ms budget, resulting in `10 G-ops / 0.016s ≈ 0.625 TOPS`.
  - 'The model is memory-bound, so its latency is determined by compute: `10 G-ops / 35 TOPS ≈ 0.28 ms`.
    The achieved performance is `200 MB / 0.28ms ≈ 0.7 TOPS`.'
  correct_index: 1
