title: The INT4 Accuracy Cliff
scenario: "Your team wants to push the envelope on model size and latency, aiming for INT4 quantization for a critical on-device generative AI model."
question: "What are the significant technical challenges you anticipate with INT4 quantization compared to INT8, and how would you mitigate them?"
details:
  realistic_solution: 'INT4 quantization introduces significantly more acute challenges than INT8, pushing the limits of current hardware and software techniques:'
  common_mistake: |
    **The Pitfall:** Treating INT4 as just a smaller INT8.
    **The Rationale:** Engineers oversimplify the severe challenges introduced by halving the bit-width, assuming calibration will easily fix accuracy drops.
    **The Consequence:** Unusable models with severe accuracy degradation.
  napkin_math: |
    - An INT8 tensor has a quantization step size of `(max - min) / 255`.
    - An INT4 tensor has a quantization step size of `(max - min) / 15`.
    - For the same dynamic range, the INT4 step size is `255 / 15 = 17x` larger.
    - Quantization noise is proportional to the square of the step size.
    - **Conclusion:** INT4 noise can be **~289x higher** than INT8 for the same range. Mitigation requires techniques like AWQ or GPTQ.
