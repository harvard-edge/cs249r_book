title: Zero-Copy Data Pipeline for Snapdragon NPU
scenario: You are designing a real-time computer vision data pipeline for a flagship smartphone utilizing
  the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The system must ingest 4K video at 60 FPS, preprocess
  it, and feed INT8 tensors to the NPU to utilize its 45 TOPS capacity. Since the CPU, GPU, and NPU all
  share 16 GB of LPDDR5X memory, you must architect an asynchronous pipeline that maximizes NPU utilization
  without exhausting thermal limits or shared memory bandwidth.
details:
  realistic_solution: The best approach leverages Android HardwareBuffers to allocate memory in the shared
    16 GB LPDDR5X pool, enabling zero-copy access across heterogeneous compute units. The image signal
    processor (ISP) or GPU handles resizing and quantization to INT8, writing directly to the shared buffer.
    The CPU merely orchestrates the pipeline, allowing the Hexagon NPU to read directly from memory and
    maintain maximum throughput for its 45 TOPS engine without bandwidth contention.
  common_mistake: Candidates often design synchronous pipelines where the CPU performs all preprocessing
    and explicitly copies memory between CPU and NPU domains. They frequently fail to account for the
    shared LPDDR5X memory architecture, leading to redundant memory copies, high CPU thermal throttling,
    and NPU starvation.
  napkin_math: Raw 4K video at 60 FPS generates 1.5 GB/s of data (3840x2160x3 bytes * 60). Downsampling
    to a 640x640 INT8 NPU input requires 1.2 MB per frame (72 MB/s at 60 FPS). Without zero-copy on the
    shared 16 GB LPDDR5X, a CPU-to-NPU pipeline requires writing 72 MB/s and reading it back, consuming
    144 MB/s of bandwidth and active CPU cycles. Using zero-copy reduces memory operations by 50% for
    the inference payload, saving battery and reserving bandwidth for the NPU to hit its 45 TOPS peak.
