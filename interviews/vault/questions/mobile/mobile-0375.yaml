title: The Mobile OTA Update Budget
scenario: 'Your team is updating a 100 MB on-device autocorrect model for a mobile keyboard app. You have the option to ship the update as a 10 MB binary patch instead of the full 100 MB model. For a robust, fail-safe update, the patching process must work as follows: the device downloads the patch, then reads the original v1 model and the patch to construct the full v2 model in a new file. Only after the v2 model is fully written and verified does the system delete the v1 model and the patch file.'
question: What peak storage is needed for a fail-safe 10 MB patch update of a 100 MB mobile model?
details:
  realistic_solution: 'To calculate the peak storage, you must sum the sizes of all three components that need to be on the device at the same time: the original v1 model, the downloaded patch file, and the new v2 model being constructed. The system cannot delete the original model until the new one is fully validated, to ensure it can roll back if the patch fails. Therefore, all three files coexist during the point of maximum storage usage.'
  common_mistake: |
    **The Pitfall:** Underestimating peak storage by assuming an "in-place" patch.
    **The Rationale:** Engineers focus only on the final size and forget that a fail-safe process requires old and new files to coexist.
    **The Consequence:** The update process fails due to Out-of-Storage errors on user devices, potentially leaving the app in a broken state.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Original model (v1) = 100 MB.
       - Downloaded binary patch = 10 MB.
       - Reconstructed model (v2) = 100 MB.
       - Fail-safe update requires all three files to exist simultaneously before deletion.
    2. **Calculations:**
       - Peak Storage = Original Model + Patch File + Reconstructed Model.
       - Peak Storage = 100 MB + 10 MB + 100 MB = 210 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Storage-Bound.** Peak storage required is 210 MB. An in-place patch estimation would erroneously predict 110 MB or less.
  options:
  - 100 MB (Assumes a risky in-place patch with no overhead)
  - 110 MB (Forgets a new file is created, just adds patch to original size)
  - 200 MB (Forgets to include the storage for the patch file itself)
  - 210 MB (Correctly accounts for original, patch, and new files)
  correct_index: 3
