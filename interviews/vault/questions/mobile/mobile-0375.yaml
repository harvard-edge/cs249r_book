title: The Mobile OTA Update Budget
scenario: 'Your team is updating a 100 MB on-device autocorrect model for a mobile keyboard app. You have
  the option to ship the update as a 10 MB binary patch instead of the full 100 MB model. For a robust,
  fail-safe update, the patching process must work as follows: the device downloads the patch, then reads
  the original v1 model and the patch to construct the full v2 model in a *new* file. Only after the v2
  model is fully written and verified does the system delete the v1 model and the patch file.'
details:
  realistic_solution: 'To calculate the peak storage, you must sum the sizes of all three components that
    need to be on the device at the same time: the original v1 model, the downloaded patch file, and the
    new v2 model being constructed. The system cannot delete the original model until the new one is fully
    validated, to ensure it can roll back if the patch fails. Therefore, all three files coexist during
    the point of maximum storage usage.'
  common_mistake: 'Engineers often underestimate the peak storage required for a robust patching process.
    A common mistake is to assume the patch happens ''in-place'' on the original file, which is risky
    because a failure during the patch would corrupt the only working model, leaving the user with a broken
    app. Others forget to account for all the components that must exist simultaneously: the original
    model (to read from), the patch file (the instructions), and the new model (the output destination).'
  napkin_math: '1. Base Storage: The original model requires 100 MB of storage. 2. Patch File: Downloading
    the binary patch takes an additional 10 MB. 3. Reconstruction: The new model (100 MB) must be built
    and verified before deleting the old one to ensure fail-safe execution. 4. Peak Storage Formula: Old
    Model (100MB) + Patch (10MB) + New Model (100MB) = 210 MB peak storage required during the OTA update.'
  options:
  - 100 MB (Assumes a risky in-place patch with no overhead)
  - 110 MB (Forgets a new file is created, just adds patch to original size)
  - 200 MB (Forgets to include the storage for the patch file itself)
  - 210 MB (Correctly accounts for original, patch, and new files)
  correct_index: 3
