title: The On-Device Training Storage Bloat
scenario: Your keyboard app does on-device personalization — it fine-tunes a next-word prediction model
  (50M params, FP16 = 100 MB) on the user's typing patterns using federated learning on a Pixel 8 (Tensor
  G3, 128 GB storage). After 3 months, users complain the app is using 4.2 GB of storage. The model is
  still 100 MB. Where did the other 4.1 GB come from?
details:
  realistic_solution: 'On-device training generates massive hidden storage: (1) Optimizer state (Adam
    momentum + variance): 2x model size = 200 MB. (2) Checkpoints saved every N steps: 15 checkpoints
    x 200 MB (model + optimizer) = 3 GB. (3) Gradient cache and training data buffer: ~900 MB. Total:
    4.2 GB, perfectly matching the observation. Fix: use SGD instead of Adam (no momentum state) or INT8
    states, keep only 2 rolling checkpoints with delta compression (40 MB), cap training data cache at
    100 MB, and store sparse gradients only. Optimized total: ~395 MB — a 90% reduction.'
  common_mistake: '"The training data (user''s typing history) is accumulating." Typing data is small
    — 10,000 words/day × 5 bytes/word × 90 days = 4.5 MB. That''s 0.1% of the bloat.'
  napkin_math: 'Unoptimized: 100 MB (model) + 200 MB (Adam state) + 3000 MB (15 checkpoints) + 900 MB
    (cache) = **4.2 GB**. Optimized: 100 MB (model) + 40 MB (2 delta checkpoints) + 150 MB (INT8 optimizer)
    + 100 MB (capped cache) + 5 MB (sparse gradients) = **395 MB**. Reduction: **90%**. The key insight:
    on-device training''s storage cost is dominated by checkpoints and optimizer state, not the model
    or training data.'
