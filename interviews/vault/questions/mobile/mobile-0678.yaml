title: The On-Device Training Storage Bloat
scenario: Your keyboard app fine-tunes a next-word prediction model (50M params, FP16 = 100 MB) on device. After 3 months, users complain the app is using 4.2 GB of storage, though the model is still 100 MB.
question: Where did the 4.1 GB of storage bloat come from during on-device fine-tuning?
details:
  realistic_solution: On-device training generates massive hidden storage via optimizer states and rolling checkpoints.
  common_mistake: |
    **The Pitfall:** Blaming user typing data accumulation.
    **The Rationale:** Candidates assume the raw data inputs are bloated, ignoring the massive size of intermediate training tensors.
    **The Consequence:** The team deletes valuable user data while the device remains choked by hidden Adam optimizer states and redundant checkpoints.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 100 MB (FP16).
       - Optimizer: Adam (Momentum + Variance require FP32).
       - Rolling checkpoints kept: 10.
    2. **Calculations:**
       - Optimizer state per checkpoint: 50M params * 4 bytes (momentum) + 50M params * 4 bytes (variance) = 400 MB.
       - Checkpoint bloat: 10 checkpoints * (100 MB model + ~200 MB compressed states) = 3000 MB (3 GB).
       - Buffers (Gradient cache & training data): ~900 MB.
       - Total bloat: 100 MB + 200 MB (active states) + 3000 MB + 900 MB = 4.2 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Optimizer State and Checkpoint Bloat**. The 4.1 GB bloat stems primarily from keeping 10 rolling checkpoints alongside large FP32 Adam optimizer states.
