title: Graceful Degradation for On-Device AR on Google Tensor G3
scenario: 'Your team is deploying a real-time object detection model for an on-device AR feature. You are considering two architectural approaches for implementing graceful degradation: Architecture A (Hierarchical Fallback) vs. Architecture B (Adaptive QoS Shedding).'
question: Which architecture would you recommend and why, specifically referencing the Tensor G3's capabilities, and what specific metrics would you monitor?
details:
  realistic_solution: Architecture B (Adaptive QoS Shedding) is technically superior. Implement a robust degradation service targeting comprehensive telemetry (thermal APIs, bus pressure, dropped frames). Crucially, by shedding framerate rather than swapping weights, Architecture B immediately relieves the compute payload without triggering catastrophic DRAM loads. Architecture A's reliance on loading fallback model weights during peak thermal throttling completely devastates shared memory bus availability, totally ruining real-time AR tracking.
  common_mistake: |
    **The Pitfall:** Vastly over-relying on a single metric (like thermal limits) and attempting to solve it purely by dynamically loading smaller fallback models.
    **The Rationale:** Teams naively believe that smaller parameter counts inherently solve all degradation problems, completely ignoring the massive I/O cost of the model swap itself.
    **The Consequence:** The system becomes permanently paralyzed as the massive DRAM reads required to swap the fallback model inject catastrophic latency spikes into the already distressed AR render loop.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - High-Accuracy Model: 166 GOPS per inference.
       - Target Framerate: 30 FPS (33ms latency deadline).
       - TPU Compute Limit: 7.5 TOPS.
    2. **Calculations:**
       - Required sustained throughput: 166 GOPS * 30 FPS = ~5.0 TOPS.
       - Compute Buffer: 7.5 TOPS - 5.0 TOPS = 2.5 TOPS remaining.
       - Throttled Latency Impact: If thermal throttling pushes inference to 100ms (10 FPS), effective throughput collapses to 1.66 TOPS.
    3. **Conclusion & Interpretation:**
       - **Result: Thermal and Compute-Bound.** Dropping framerate (Architecture B) is mathematically superior. It instantly sheds compute demand from 5.0 TOPS to 1.66 TOPS without incurring the lethal memory bandwidth penalty caused by swapping model weights.
