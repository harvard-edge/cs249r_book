title: Explaining Token Budget Constraints for Compound AI on Tensor G3
scenario: A junior developer building a Tensor G3 (7.5 TOPS, 12GB) chatbot app is confused about why the LLM API on the cloud has a 128K context window, but the on-device model only has 2048 tokens.
question: Why is the context window so much smaller on mobile, and why does it matter for compound AI?
details:
  realistic_solution: 'Context window constraint on Tensor G3 has two causes: (1) Memory capacity: KV cache for 128K context consumes ~700MB, consuming a large chunk of available RAM. (2) Bandwidth: decoding reads full KV cache each token step. At Tensor G3 memory bandwidth ~68GB/s, reading 700MB per step limits throughput to ~94 tok/s. The real constraint is prefill compute: 128K context * prefill compute = 114 seconds for prefill. On-device, 128K context = 2 minute wait before first token.'
  common_mistake: |
    **The Pitfall:** Explaining context window limits as a software choice or model architecture limitation.
    **The Rationale:** Many engineers apply cloud LLM mental models to mobile devices without understanding edge hardware physics.
    **The Consequence:** They miss that on mobile, the fundamental constraint is memory bandwidth for KV cache reads and prefill compute time.
  napkin_math: |
    - **Model KV Size:** 1B model KV per token (bf16) = 2 (K+V) × 22 (layers) × 64 (dim) × 2 bytes = **5.5 KB**.
    - **KV Size (2048 Context):** 5.5 KB × 2048 = **11.3 MB**.
    - **KV Size (128K Context):** 5.5 KB × 128,000 = **704 MB**.
    - **Prefill Compute:** Tensor G3 has 7.5 TOPS. At 30% utilization (2.25 TOPS):
        - Prefill 2048 tokens: 2048 × 2 × 1B / 2.25e12 = **1.82 s**.
        - Prefill 128K tokens: 128,000 × 2 × 1B / 2.25e12 = **113.8 s** (Impractical).
    - **Decode Bandwidth Limit:**
        - At 128K: Reading 704 MB per token at 68 GB/s = 10.3 ms → **97 tok/s max**.
        - At 2048: Reading 11.3 MB per token at 68 GB/s = 0.17 ms → **Nearly zero bandwidth overhead**.
