title: Hexagon NPU Profiling Analysis
scenario: You are analyzing a trace of an INT8 quantized object detection model deployed on the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The model architecture requires exactly 225 Giga-Operations (GOPS) per inference. The device features 45 TOPS of INT8 compute, a heterogeneous CPU+GPU+NPU architecture, and shared 12-16 GB LPDDR5X memory. Your profiler reports an actual average execution time of 15 milliseconds per frame.
question: What is the Hexagon NPU theoretical latency and utilization for a 225 GOPS model measured at 15ms?
details:
  realistic_solution: The engineer should first calculate the compute-bound theoretical minimum latency to establish a baseline. Upon discovering the theoretical latency is much lower than the profiled 15ms, they should conclude the system is heavily underutilized. The next step is to use system trace tools to inspect the heterogeneous CPU+GPU+NPU bus traffic, specifically looking for LPDDR5X memory contention or CPU-to-NPU dispatch latency.
  common_mistake: |
    **The Pitfall:** Confusing MACs with Operations and ignoring memory bottlenecks.
    **The Rationale:** Candidates often assume 1 MAC = 1 Operation (leading to 2x calculation error) or default to blaming suboptimal NPU code instead of systemic memory limitations.
    **The Consequence:** The theoretical latency calculation is wrong, leading to an incorrect diagnosis of the system bottleneck.
  napkin_math: |
    1. Total Operations: 225 GOPS = 225 x 10^9 OPS.
    2. Peak Compute (Hexagon NPU): 45 TOPS INT8 = 45 x 10^12 OPS/sec.
    3. Minimum Latency: (225 x 10^9) / (45 x 10^12) = 5 x 10^-3 seconds = 5 ms.
    4. Actual latency: 15 ms.
    5. **NPU utilization: 5ms / 15ms = 33.3%, indicating a severe LPDDR5X memory or I/O bottleneck.**
