title: The Janky AR Filter
scenario: You're optimizing an AR style transfer filter for a smooth 30 FPS (33ms per-frame budget). The FP16 model runs in ~40ms on the NPU. Profiling reveals one specific layer—a large depth-wise separable convolution—has a very wide and unpredictable activation distribution, making it prone to visual artifacts if quantized. The other 49 layers are standard, well-behaved convolutions.
question: Which mixed-precision plan gets an AR style transfer filter under 33 ms while protecting one unstable depthwise layer?
details:
  realistic_solution: |
    The best solution is to use **mixed precision**. By quantizing the 49 well-behaved layers to INT8, you can capture most of the potential performance gain. You would then selectively keep the one problematic depth-wise convolution layer in its original FP16 precision. This hybrid approach balances the need for speed with the need to preserve visual quality by protecting the most sensitive part of the model from aggressive quantization. Modern mobile inference frameworks (like Core ML or TensorFlow Lite) explicitly support this by allowing you to specify the precision for individual layers.
  common_mistake: |
    **The Pitfall:** Taking an all-or-nothing approach to quantization.
    **The Rationale:** Engineers assume mixed precision is unsupported or too complex, defaulting to either 100% FP16 or 100% INT8.
    **The Consequence:** Either a visually broken filter (full INT8) or a slow, janky frame rate (full FP16), ruining the AR experience.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target Budget: 33 ms (30 FPS).
       - Baseline Latency: 40 ms (FP16, 50 layers total).
       - Quantization Speedup: INT8 executes roughly 2x faster than FP16 on the NPU.
    2. **Calculations:**
       - FP16 latency per layer: 40 ms / 50 = 0.8 ms.
       - INT8 latency per layer: 0.8 ms / 2 = 0.4 ms.
       - Mixed-precision execution: (49 INT8 layers * 0.4 ms) + (1 FP16 layer * 0.8 ms).
       - Total time = 19.6 ms + 0.8 ms = 20.4 ms.
    3. **Conclusion & Interpretation:**
       **Result: 20.4 ms (Latency-Bound solved).** This comfortably meets the 30 FPS target while mathematically safeguarding quality.
  options:
  - Quantize the entire model to INT8 to achieve the maximum possible speedup.
  - Keep the sensitive layer in FP16 but quantize the other 49 layers to INT8.
  - The NPU is the bottleneck. Offload the model to run on the mobile GPU instead.
  - The model is too large. Prune 25% of the channels from all layers and retrain the model.
  correct_index: 1
