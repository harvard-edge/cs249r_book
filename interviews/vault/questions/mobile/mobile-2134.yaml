title: MoE AllToAll Imbalance
scenario: Distributed MoE inference on two Jetson AGX Orins connected by 10 GbE (1.25
  GB/s), performing AllToAll for expert routing.
question: Evaluate the AllToAll latency for a 5MB batch of tokens, given an uneven
  expert load (75% tokens to node A, 25% to node B) and a 0.5ms TCP setup barrier.
details:
  realistic_solution: The AllToAll latency is bounded by the heaviest asymmetric transfer.
    Node B sends 75% of the 5MB (3.75MB) to Node A. At 1.25 GB/s, this takes 3ms.
    Adding the 0.5ms TCP synchronization barrier sets the collective completion time
    to 3.5ms.
  common_mistake: Calculating AllToAll latency using perfectly balanced chunk sizes
    (2.5MB) rather than bottlenecking on the worst-case imbalanced routing path.
  napkin_math: Heaviest payload = 3.75MB. 3.75MB / 1.25GB/s = 3ms. Sync = 0.5ms. Total
    = 3.5ms.
