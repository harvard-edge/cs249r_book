title: 'MoE AllToAll Imbalance'
scenario: Distributed MoE inference on two Jetson AGX Orins connected by 10 GbE (1.25 GB/s), performing AllToAll for expert routing.
question: Evaluate the AllToAll latency for a 5MB batch of tokens, given an uneven expert load (75% tokens to node A, 25% to node B) and a 0.5ms TCP setup barrier.
details:
  realistic_solution: 'The AllToAll latency is bounded by the heaviest asymmetric transfer. Node B sends 75% of the 5MB (3.75MB) to Node A. At 1.25 GB/s, this takes 3ms. Adding the 0.5ms TCP synchronization barrier sets the collective completion time to 3.5ms.'
  common_mistake: |
    **The Pitfall:** Calculating AllToAll latency using perfectly balanced chunk sizes (2.5MB).
    **The Rationale:** Candidates fail to recognize that collective latency is bounded by the slowest/heaviest path.
    **The Consequence:** They underestimate inference latency under unbalanced expert load.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total batch size = 5 MB.
    - TCP setup barrier = 0.5 ms.
    - Network bandwidth = 1.25 GB/s.

    **Calculations:**
    - Heaviest payload (Node B to Node A) = 75% of 5 MB = 3.75 MB.
    - Transfer time = 3.75 MB / 1.25 GB/s = 3 ms.

    **Conclusion & Interpretation:**
    - **Result: 3.5 ms (Network-Bound)**. Total latency = 3 ms + 0.5 ms = 3.5 ms.
