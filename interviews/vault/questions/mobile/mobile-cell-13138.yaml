title: 'Mobile TCO Design: On-Device vs Hybrid Inference Cost for Consumer App'
scenario: 'Design the inference cost model for a consumer LLM app with 1 million monthly active users.
  Each user: 20 queries/day, 100 output tokens/query. A17 Pro (35 TOPS) handles queries on-device for
  70% of users. Remaining 30% use older devices that offload to cloud H100 at $0.001/1K tokens. Calculate
  monthly cloud cost, optimize the cutoff, and estimate annual savings from increasing on-device fraction
  to 85%.'
question: "How would you calculate monthly cloud cost, optimize the cutoff, and estimate annual savings from increasing on-device fraction to 85%?"
details:
  realistic_solution: 'Cloud users: 1M * 0.30 = 300K. Monthly cloud tokens: 300K * 20 * 30 * 100 = 18B
    tokens. Cost: 18B * $0.001/1000 = $18,000/month. At 85% on-device: cloud users = 150K. Cloud tokens:
    9B. Cost: $9,000/month. Monthly savings: $9,000. Annual savings: $108,000. Engineering to support
    85% on-device: optimize models for older devices (A15, Snapdragon 888). One-time cost: $50K. Payback:
    $50K/$108K = 5.6 months. But: quality on older devices (A15, 15 TOPS) may be worse. INT4 quantization
    adds 5% accuracy loss. User churn risk: 1% churn from quality * 1M * $5 ARPU = $50K/month lost. If
    quality drop causes churn: don''t optimize.'
  common_mistake: Calculating cloud cost based on total tokens without accounting for the 30% routing
    fraction, and not considering that increasing on-device fraction requires supporting older device
    models (lower quality inference) vs maintaining cloud fallback for quality assurance.
  napkin_math: 'Cloud cost at 30%: 1M*0.3*20queries*30days*100tokens*$0.001/1000=$18,000/month. At 85%:
    1M*0.15*20*30*100*$0.001/1000=$9,000/month. Monthly savings: $9K. Annual: $108K. Development cost:
    $50K. Payback: 5.6 months. Net 1st year: $108K-$50K=$58K profit. NPV 3yr at 5%: $108K*2.723=$294K-$50K=$244K.
    Strong ROI but quality risk must be assessed. Option: use small edge model (3B vs 7B) for older devices:
    60% quality preservation at 15 TOPS. Test with 5% user cohort before full rollout.'
