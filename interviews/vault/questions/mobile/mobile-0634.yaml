title: The Real-Time Batching Paradox
scenario: Your team develops a real-time translation feature for a flagship mobile messaging app. It runs
  an on-device model on the phone's NPU. The product requirement is a 'near-instant' user experience,
  which engineering defines as a P99 translation latency of under 250ms from the moment the user's audio
  input is captured.
question: "Why does a throughput-oriented batching window violate the real-time translation latency budget?"
details:
  realistic_solution: This is a classic case of violating a real-time system's latency budget by applying
    a throughput-oriented optimization. The core issue is **Head-of-Line Blocking** introduced by the
    batching queue. The first audio chunk that enters the queue for a new batch must wait for the entire
    batching window to fill before it can even begin processing. This waiting time is directly added to
    its end-to-end latency.
  common_mistake: 'Engineers often assume that any technique that increases hardware utilization (TOPS)
    is a universal good. They might blame the NPU driver for having high startup overhead or suggest the
    Python code for queueing is too slow. This misses the fundamental queuing theory trade-off: throughput
    is not the same as latency. In a real-time system, predictable latency (low variance) is often more
    important than high average throughput.'
  napkin_math: 'Without batching: inference ~80ms, well under 250ms. With batch window = 200ms to fill
    batch of 4: first request waits up to 200ms + 80ms inference = 280ms > 250ms P99 budget. Head-of-line
    blocking: worst case wait = batch_window. Fix: set batch_window < 250-80 = 170ms max. Or use batch_size=1
    for latency-critical path. Throughput gain (4x) not worth P99 violation.'
