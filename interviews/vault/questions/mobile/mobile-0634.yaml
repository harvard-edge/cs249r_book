title: The Real-Time Batching Paradox
scenario: Your team develops a real-time translation feature for a flagship mobile messaging app. It runs an on-device model on the phone's NPU. The product requirement is a 'near-instant' user experience, which engineering defines as a P99 translation latency of under 250ms from the moment the user's audio input is captured.
question: Why does a throughput-oriented batching window violate the real-time translation latency budget?
details:
  realistic_solution: This is a classic case of violating a real-time system's latency budget by applying a throughput-oriented optimization. The core issue is Head-of-Line Blocking introduced by the batching queue. The first audio chunk that enters the queue for a new batch must wait for the entire batching window to fill before it can begin processing. This waiting time is directly added to its end-to-end latency.
  common_mistake: |
    **The Pitfall:** Assuming that any technique that increases hardware utilization (TOPS) is a universal good.
    **The Rationale:** Engineers accustomed to high-throughput cloud batching apply the same logic to real-time streams.
    **The Consequence:** They miss the queuing theory trade-off. In a real-time system, predictable latency is more important than high average throughput, and batching causes fatal head-of-line blocking.
  napkin_math: |
    **Assumptions & Constraints:**
    - Latency Budget: 250 ms.
    - Baseline Inference Time (Batch 1): 80 ms.
    - Batch Window: 200 ms.

    **Calculations:**
    - Latency with Batching: First audio chunk waits 200 ms + 80 ms inference = 280 ms.
    - 280 ms > 250 ms (Budget violated).

    **Conclusion & Interpretation:**
    - **Result: 280 ms Latency (Latency-Bound)**. Head-of-line blocking prevents large batch windows from meeting strict real-time thresholds.
