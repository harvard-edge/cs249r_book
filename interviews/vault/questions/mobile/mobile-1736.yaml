title: Optimizing On-Device ML with Coreset Selection on Snapdragon 8 Gen 3
scenario: Your team is deploying a real-time object detection model (e.g., MobileNetV3
  large, 200M INT8 ops) on a device powered by the Snapdragon 8 Gen 3 Hexagon NPU,
  which boasts 45 TOPS (INT8) and 12-16 GB LPDDR5X. The model was initially trained
  on a massive cloud dataset. However, due to continuous learning requirements and
  privacy concerns, you need to retrain/fine-tune the model periodically on device
  using new user-generated data. The challenge is that collecting all user data for
  on-device retraining quickly hits the storage and compute limits, leading to the
  'data wall' problem. You've identified coreset selection as a potential technique
  to manage this. How would you determine the maximum feasible coreset size, given
  the NPU's specifications and a target retraining time (e.g., 1 hour)?
question: ', 1 hour)?'
details:
  realistic_solution: Implement a lightweight, NPU-optimized coreset selection algorithm
    (e.g., based on geometric sampling or gradient similarity approximation) that
    can efficiently run on the Hexagon NPU. The solution should consider the available
    LPDDR5X bandwidth (e.g., ~68 GB/s for LPDDR5X-8533) and the INT8 processing capabilities.
    The coreset size would be determined by balancing the retraining time budget,
    memory capacity, and the NPU's processing throughput for the selection algorithm
    and subsequent fine-tuning steps, leveraging the NPU's ability to handle INT8
    operations for both inference and data processing.
  common_mistake: Ignoring the IO bottlenecks and memory bandwidth limitations of
    LPDDR5X, assuming that raw TOPS directly translate to faster training without
    considering data movement costs. Another mistake is using generic coreset selection
    algorithms that are compute-intensive and not optimized for NPU execution.
  napkin_math: "The maximum coreset size will be constrained by both NPU compute capacity\
    \ and available LPDDR5X memory. \n\n1.  **Compute Constraint**: \n    *   NPU\
    \ Compute (INT8): `T_NPU` = 45 TOPS = 45 x 10^12 ops/sec. \n    *   Target retraining\
    \ time: `T_retrain` = 3600 seconds (1 hour). \n    *   Total available ops: `Ops_avail`\
    \ = `T_NPU * T_retrain` = 45 x 10^12 ops/sec * 3600 sec = 1.62 x 10^17 ops. \n\
    \    *   Estimated operations per sample per epoch (forward + backward pass for\
    \ a 200M ops model): `Ops_per_sample_epoch` = 400M INT8 ops = 400 x 10^6 ops.\
    \ \n    *   Number of epochs: `E` = 5. \n    *   Max coreset size based on compute:\
    \ `N_coreset_compute = Ops_avail / (Ops_per_sample_epoch * E)` \n        `N_coreset_compute\
    \ = (1.62 x 10^17) / (400 x 10^6 * 5) = 8.1 x 10^7` samples (81 million samples).\
    \ \n\n2.  **Memory Constraint**: \n    *   Available LPDDR5X memory: `Mem_avail`\
    \ = 12 GB = 12 x 10^9 bytes. \n    *   Estimated average size of a preprocessed\
    \ training sample (features + labels): `Size_per_sample` = 1 KB = 1024 bytes.\
    \ \n    *   Max coreset size based on memory: `N_coreset_memory = Mem_avail /\
    \ Size_per_sample` \n        `N_coreset_memory = (12 x 10^9) / 1024 ≈ 11.7 x 10^6`\
    \ samples (11.7 million samples). \n\nTherefore, the maximum feasible coreset\
    \ size will be the *minimum* of these two constraints: \n`N_coreset_max = min(N_coreset_compute,\
    \ N_coreset_memory) = min(81M, 11.7M) = 11.7 million samples.`"
