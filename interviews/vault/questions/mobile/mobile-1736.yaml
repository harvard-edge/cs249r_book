title: Optimizing On-Device ML with Coreset Selection on Snapdragon 8 Gen 3
scenario: Your team is deploying a real-time object detection model (e.g., MobileNetV3 large, 200M INT8 ops) on a device powered by the Snapdragon 8 Gen 3 Hexagon NPU, which boasts 45 TOPS (INT8) and 12-16 GB LPDDR5X. The model was initially trained on a massive cloud dataset. However, due to continuous learning requirements and privacy concerns, you need to retrain/fine-tune the model periodically on device using new user-generated data. The challenge is that collecting all user data for on-device retraining quickly hits the storage and compute limits, leading to the 'data wall' problem. You've identified coreset selection as a potential technique to manage this.
question: How would you determine the maximum feasible coreset size for on-device retraining given a 1 hour target time?
details:
  realistic_solution: Implement a lightweight, NPU-optimized coreset selection algorithm (e.g., based on geometric sampling or gradient similarity approximation) that can efficiently run on the Hexagon NPU. The solution should consider the available LPDDR5X bandwidth (e.g., ~68 GB/s for LPDDR5X-8533) and the INT8 processing capabilities. The coreset size would be determined by balancing the retraining time budget, memory capacity, and the NPU's processing throughput for the selection algorithm and subsequent fine-tuning steps, leveraging the NPU's ability to handle INT8 operations for both inference and data processing.
  common_mistake: |
    **The Pitfall:** Ignoring memory bandwidth limitations and assuming raw TOPS dictates training speed.
    **The Rationale:** Engineers focus purely on the 45 TOPS compute rating without factoring in the massive data movement costs of continuous learning on LPDDR5X.
    **The Consequence:** The proposed training plan stalls on I/O, drastically missing the 1-hour retraining deadline.
  napkin_math: |
    1. Compute Constraint: NPU = 45 TOPS. Target = 3600 seconds.
    2. Available Ops: 45e12 * 3600 = 1.62e17 ops.
    3. Ops per sample (5 epochs): 400M ops * 5 = 2e9 ops.
    4. Max samples (compute): 1.62e17 / 2e9 = 81 million samples.
    5. Memory Constraint: 12 GB available / 1 KB per sample = ~11.7 million samples.
    6. **Conclusion: Memory limits the maximum coreset size to 11.7 million samples.**
