title: The AR Navigation Preemption Crisis
scenario: An AR navigation feature renders guidance over a camera feed at 30 FPS. A 'Vision Query' feature triggers a 2B parameter VLM.
question: How do you schedule a 400ms VLM inference without starving a 30 FPS navigation task on a non-preemptible NPU?
details:
  realistic_solution: The core challenge is that a long-running, low-priority task
    (VLM) must not starve a short, high-priority, real-time task (Navigation) on shared,
    non-preemptible hardware like an NPU. The architecture must create the *illusion*
    of preemption.
  common_mistake: |
    **The Pitfall:** Using a simple FIFO queue for NPU scheduling.
    **The Rationale:** Assuming the OS or hardware will magically multiplex tasks, ignoring that NPUs generally run coarse-grained workloads to completion.
    **The Consequence:** The 400ms VLM prefill blocks the navigation task, causing a dangerous 12-frame visual stutter in a driving application.
  napkin_math: |
    - **Navigation Budget:** 33 ms/frame. Nav inference takes 8 ms.
    - **VLM Prefill:** 400 ms total.
    - **Chunking Strategy:** Split VLM into chunks of 23 ms. 
    - **Overhead:** ~2 ms for DRAM spill/restore per chunk.
    - **Total Frame Time:** 8 ms (Nav) + 23 ms (VLM) + 2 ms (Overhead) = 33 ms.
    - **Result:** Navigation stays at 30 FPS, while the VLM completes in **~594 ms** (18 chunks * 33 ms).
