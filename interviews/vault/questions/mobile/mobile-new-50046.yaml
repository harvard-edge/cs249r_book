title: WebAssembly SIMD as a Universal Mobile Inference Backend
scenario: Your team proposes using ONNX Runtime Web with WebAssembly SIMD as a truly portable inference
  backend that works on any mobile browser (Safari, Chrome) without platform-specific code. Evaluate whether
  WASM SIMD can replace native mobile inference for a MobileNetV2 model.
details:
  realistic_solution: 'WASM SIMD comparison for MobileNetV2: (1) Native TFLite with XNNPACK on ARM CPU:
    ~8ms on Snapdragon 8 Gen 3. (2) WASM SIMD in Chrome on same device: ~35-50ms (4-6x slower due to sandbox
    overhead, lack of cache control, and JavaScript interop costs). (3) Native with NPU delegate: ~2ms.
    WASM SIMD is 17-25x slower than NPU. Verdict: WASM SIMD is viable only for non-latency-critical workloads
    (batch processing, background analysis) or as a development/prototyping tool. For real-time inference
    (camera, AR), native runtimes with hardware acceleration are required.'
  common_mistake: Overestimating WASM SIMD's performance. While WASM SIMD provides 128-bit SIMD (like
    ARM NEON), it runs inside a browser sandbox that prevents direct hardware access, thread scheduling
    optimization, and NPU/GPU offloading.
  napkin_math: 'MobileNetV2: ~300M MACs. ARM NEON at ~25 GOPS effective: 12ms. WASM SIMD: same NEON instructions
    but ~4-6x overhead from sandbox = 48-72ms. NPU at 45 TOPS: 0.007ms (compute) + 1.5ms (overhead) =
    ~2ms.'
