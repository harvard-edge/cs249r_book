title: The Smart Keyboard Deadline
scenario: You are designing a 'next word prediction' feature for a mobile keyboard. The user experience team has a strict 100ms time-to-first-token (TTFT) budget to ensure the suggestion feels instantaneous.
question: Using the hardware constants for an Apple A17 Pro (35 TOPS), what is the maximum theoretical size (in parameters) of an INT8 model that can meet this budget for generating one token?
details:
  realistic_solution: The solution is a direct application of the inference compute formula. First, calculate the total operations possible within the 100ms time budget using the peak performance of the A17 Pro's Neural Engine. Then, use the rule of thumb for inference compute (2 Ops per parameter per token) to find the maximum model size.
  common_mistake: |
    **The Pitfall:** Getting an arithmetically correct but realistically absurd answer by mixing up Giga and Tera units.
    **The Rationale:** Candidates use peak marketing-spec TOPS without caveat, forgetting the sustained performance gap due to memory bandwidth limits.
    **The Consequence:** Proposing unrealistic model sizes that would immediately OOM or throttle in production.
  napkin_math: |
    1. Find total operations: 35 TOPS * 0.1s (100ms) = 3.5 Tera-Operations.
    2. Determine ops per token: ~2 Ops per parameter per token.
    3. Calculate max parameters: 3.5 Tera-Operations / 2 Ops = 1.75 Tera-parameters.
    **Final Result:** 1750 Billion parameters.
  options:
  - 1.75 Billion parameters
  - 3500 Billion parameters
  - 1750 Billion parameters
  - 17.5 Trillion parameters
  correct_index: 2
