validation_issues:
- The Napkin Math's conversion from TOPS to GOPS within the formula for total operations per budget is
  incorrect; 35 TOPS is 35 * 10^12 Ops/s, so 100ms should be 3.5 * 10^12 Ops, not 3.5 * 10^9 Ops (3.5
  GOPS). This makes the final parameter count off by 1000x.
- Reasoning Competency (RC) and Knowledge Area (KA) are listed as 'None' but the question clearly tests
  quantitative analysis, performance optimization, and hardware architecture for mobile ML, and the reasoning
  mode should be Quantitative.
