title: The Smart Keyboard Deadline
scenario: You are designing a 'next word prediction' feature for a mobile keyboard. The user experience
  team has a strict 100ms time-to-first-token (TTFT) budget to ensure the suggestion feels instantaneous.
  Using the hardware constants for an Apple A17 Pro (35 TOPS), what is the maximum theoretical size (in
  parameters) of an INT8 model that can meet this budget for generating one token?
question: "Using the hardware constants for an Apple A17 Pro (35 TOPS), what is the maximum theoretical size (in parameters) of an INT8 model that can meet this budget for generating one token?"
details:
  realistic_solution: The solution is a direct application of the inference compute formula. First, calculate
    the total operations possible within the 100ms time budget using the peak performance of the A17 Pro's
    Neural Engine. Then, use the rule of thumb for inference compute (2 Ops per parameter per token) to
    find the maximum model size.
  common_mistake: The most common mistake is to get a 'realistic' answer (like 1.75 Billion parameters)
    by incorrectly mixing up units (Giga instead of Tera). This happens because the arithmetically correct
    answer seems absurdly high. This absurdity stems from using the peak marketing-spec TOPS number, which
    is orders of magnitude higher than the sustained performance achievable in a real application due
    to memory bottlenecks. A good candidate calculates the theoretical number but should also add a caveat
    about this peak vs. sustained performance gap.
  napkin_math: 1. **Find total operations in budget:** The A17 Pro provides 35 Tera-Operations Per Second.
  options:
  - 1.75 Billion parameters
  - 3500 Billion parameters
  - 1750 Billion parameters
  - 17.5 Trillion parameters
  correct_index: 2
