title: The ANR Timeout
scenario: You are developing an on-device image filter. When the user applies the filter, a 7-second-long
  model inference runs directly on the UI thread. Beta testers report that the app frequently freezes
  and then shows a system dialog asking if they want to 'Close' or 'Wait'. What is the name of this event,
  and what is the standard time limit that is being exceeded?
question: "What is the name of this event, and what is the standard time limit that is being exceeded?"
details:
  realistic_solution: This is an 'Application Not Responding' (ANR) error. On Android, if the main UI
    thread is blocked for more than 5 seconds (e.g., by a long-running inference), the operating system
    will intervene and present the ANR dialog to the user. This is a critical error that must be fixed
    by moving the work to a background thread.
  common_mistake: A common mistake is to confuse the ANR timeout with the jank budget (16ms) or to assume
    the OS will wait indefinitely for a task to complete. Engineers without mobile experience often don't
    realize there is a hard, system-enforced limit for blocking the main thread.
  napkin_math: 'Android''s "Application Not Responding" (ANR) timeout for the main UI thread is 5 seconds.
    iOS watchdog is ~10 seconds. Since the inference takes 7 seconds on the main thread, 7s > 5s, triggering
    the OS ANR dialog on Android. The math is simply: 7,000ms > 5,000ms limit. The fix is offloading inference
    to an async thread.'
  options:
  - Jank Event, 16 ms
  - ANR Event, 5 seconds
  - System Crash, 1 second
  - ANR Event, 30 seconds
  correct_index: 1
