title: NPU Frame Drops During Real-Time Sensor Ingestion
scenario: Your team deployed a real-time object detection model on the Samsung Exynos 2400 NPU to process
  high-resolution video streams directly from the camera. During testing, the pipeline experiences severe
  stuttering and drops frames, failing to maintain 30 FPS. Profiling shows that the dual-core NPU is only
  operating at 30% of its maximum 34.7 TOPS capacity, but system memory access times have skyrocketed.
  What is the most likely root cause of this ingestion bottleneck?
details:
  realistic_solution: The root cause is memory bandwidth saturation and bus contention across the shared
    12 GB LPDDR5X memory, which serves the CPU, GPU, ISP, and NPU. Because the Image Signal Processor
    (ISP) and NPU share the same physical memory, inefficient ingestion—such as copying frames between
    CPU buffers and NPU buffers instead of using zero-copy hardware buffers—saturates the memory bus and
    starves the NPU.
  common_mistake: Candidates often incorrectly assume the NPU's compute capacity (34.7 TOPS) is the bottleneck
    or suggest quantizing the model further to reduce compute latency. They fail to recognize that streaming
    high-bandwidth sensor data creates severe memory contention on shared memory architectures.
  napkin_math: Ingesting a 4K 60 FPS stream requires 3840 x 2160 x 3 bytes x 60 = ~1.49 GB/s of bandwidth.
    If the pipeline performs unnecessary memory copies (ISP buffer -> CPU buffer -> NPU buffer), the bandwidth
    cost triples to ~4.5 GB/s just for moving data before any computation begins. On a shared LPDDR5X
    subsystem, this heavily competes with the OS, UI rendering (GPU), and background tasks, causing latency
    spikes despite the NPU needing only a fraction of its 34.7 TOPS for the actual inference.
