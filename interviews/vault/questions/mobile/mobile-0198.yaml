title: The AR Thermal Budget
scenario: You're designing an AR application that overlays a real-time particle effect on the user's face. When this feature is active, the mobile SoC consumes a total of 5 Watts. In an idle state (screen on, but no AR), the SoC consumes 1 Watt. The phone's passive cooling system can continuously dissipate 3 Watts of heat.
question: What duty cycle can a 5W AR feature sustain when idle power is 1W and passive cooling dissipates 3W?
details:
  realistic_solution: The core principle is that for the system to be thermally stable, the average power generated must not exceed the power dissipated. We must create an equation where the weighted average of the active and idle power states is equal to the dissipation rate, and then solve for the duty cycle (`d`). This correctly accounts for the power consumed even when the specific feature is idle.
  common_mistake: |
    **The Pitfall:** Assuming the sustainable load is a simple ratio of dissipation-to-active power (e.g., 3W / 5W = 60%).
    **The Rationale:** Candidates ignore the baseline power consumption (1W) when the feature is idle, which still consumes a portion of the thermal budget.
    **The Consequence:** They overestimate the available thermal headroom, leading to unexpected throttling and overheating in production.
  napkin_math: |
    1. **Assumptions & Constraints:** Active power = 5W. Idle power = 1W. Max dissipation rate = 3W. Let `d` be the duty cycle.
    2. **Calculations:** Average power P_avg <= 3W. `d * 5W + (1 - d) * 1W <= 3W`. `5d + 1 - d <= 3`. `4d <= 2`. `d <= 0.5`.
    3. **Conclusion & Interpretation:** **Result: Thermal-Bound.** The maximum sustainable duty cycle is 50%, meaning the AR feature can only be active half the time.
  options:
  - 60%. The phone can dissipate 3W of the 5W active power.
  - 100%. The SoC can handle 5W without issue.
  - 40%. The excess heat generated is 2W, which is 40% of the active power.
  - 50%. The weighted average of active and idle power must equal the 3W dissipation rate.
