title: The AR Thermal Budget
scenario: You're designing an AR application that overlays a real-time particle effect on the user's face.
  When this feature is active, the mobile SoC consumes a total of 5 Watts. In an idle state (screen on,
  but no AR), the SoC consumes 1 Watt. The phone's passive cooling system can continuously dissipate 3
  Watts of heat. To prevent the device from overheating, interpret these constraints and calculate the
  maximum sustainable duty cycle (the percentage of time the AR feature can be active).
details:
  realistic_solution: The core principle is that for the system to be thermally stable, the average power
    generated must not exceed the power dissipated. We must create an equation where the weighted average
    of the active and idle power states is equal to the dissipation rate, and then solve for the duty
    cycle (`d`). This correctly accounts for the power consumed even when the specific feature is idle.
  common_mistake: Assuming the sustainable load is a simple ratio of dissipation-to-active power (e.g.,
    3W / 5W = 60%). This ignores the baseline power consumption when the feature is *not* active, which
    consumes a portion of the thermal budget, thus leading to an overestimation of the available performance.
  napkin_math: '1. **Define Goal:** The average power consumption must be less than or equal to the dissipation
    rate: P_avg ≤ 3W.'
  options:
  - 60%. The phone can dissipate 3W of the 5W active power.
  - 100%. The SoC can handle 5W without issue.
  - 40%. The excess heat generated is 2W, which is 40% of the active power.
  - 50%. The weighted average of active and idle power must equal the 3W dissipation rate.
  correct_index: 3
