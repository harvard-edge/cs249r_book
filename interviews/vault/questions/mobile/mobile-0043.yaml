validation_issues_pro:
- The claimed training memory of 203 MB is highly unrealistic; the frozen 150M FP16 model weights alone
  consume 300 MB, and activations would add significantly more.
- The calculation for the annual training cost as a percentage of the phone's energy budget is arithmetically
  incorrect; 9.8 kJ is 0.074% of a 10 Wh/day budget, not 0.27%.
