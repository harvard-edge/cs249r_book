title: The On-Device Personalization Privacy
scenario: Your photo search app uses LoRA on-device to personalize a 150M parameter CLIP-like vision encoder (FP16, 300 MB). The adapted weights never leave the device.
question: How should you size and manage LoRA personalization for an on-device CLIP-like photo search model regarding memory, time, and migration?
details:
  realistic_solution: |
    LoRA adapters at rank 4 yield ~148K trainable params (296 KB), making them trivial to store and migrate. However, training memory is dominated by the frozen 300 MB model and activations (~43 MB), requiring ~344 MB total. Training 200 images takes ~30-60 seconds, costing negligible battery.
  common_mistake: |
    **The Pitfall:** Assuming "LoRA is tiny, so training memory is tiny."
    **The Rationale:** Candidates focus only on the LoRA weights and forget that backpropagation still requires a forward pass through the full frozen model and storing activations for all layers.
    **The Consequence:** The app triggers out-of-memory (OOM) kills during training because the total memory footprint exceeds expectations.
  napkin_math: |
    - LoRA params: Rank 4 on Q/V projections across 12 layers (768 dim) = ~148K params = 296 KB.
    - Training memory: 300 MB (frozen model) + 0.3 MB (LoRA) + 0.6 MB (Adam state) + 43 MB (Activations) = ~344 MB.
    - Compute: 1,000 passes * ~600 MFLOPs. On a 5 TOPS NPU: 0.12 ms/pass = ~30-60 seconds total.
    - Battery: ~2W * 60s = 120 Joules.
    - **Annual cost: 52 weeks * 120 J = 6.24 kJ. 6.24 kJ / 13.14 MJ (annual budget) = 0.047%.**
