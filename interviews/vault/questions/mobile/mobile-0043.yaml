title: The On-Device Personalization Privacy
scenario: Your photo search app needs to learn each user's personal categories — 'my dog,' 'my office,'
  'my kids' soccer games.' You'll fine-tune a CLIP-like vision encoder (150M params, FP16 = 300 MB) on-device
  using LoRA. The adapted weights never leave the device. Walk me through the LoRA adapter sizing, training
  memory, time to convergence, and what happens when the user gets a new phone.
details:
  realistic_solution: 'Design the full on-device training pipeline with realistic resource accounting:
    (1) LoRA adapters at rank 4 on Q/V projections yield ~148K trainable params (0.1% of 150M) in 296
    KB — trivially small to store and migrate. (2) Training memory is ~344 MB — the frozen 300 MB model
    dominates, with activations adding ~43 MB. This fits within a modern phone''s 6-8 GB RAM budget but
    requires careful memory management. (3) Training 200 images for 5 epochs takes ~30-60 seconds and
    costs ~0.22% of battery. (4) Phone migration is a 296 KB cloud backup — effectively instant. (5) Annual
    training energy is <0.05% of the phone''s total energy budget.'
  common_mistake: '"LoRA is tiny, so training is free." LoRA reduces trainable parameters dramatically,
    but training still requires: forward pass through the full frozen model (300 MB resident), backward
    pass through LoRA layers (storing activations for all layers), and an optimizer state (Adam stores
    2× the trainable parameters). The memory cost is dominated by the frozen model and activations, not
    the LoRA weights.'
  napkin_math: '**LoRA adapter sizing:** Rank r=4, applied to Q and V projections. CLIP vision encoder
    hidden dim = 768, 12 layers. Trainable params per layer: 2 x (768 x 4 + 4 x 768) = 2 x 6,144 = 12,288.
    Total: 12 x 12,288 = **147,456 params (~148K).** Adapter size: 148K x 2 bytes (FP16) = **296 KB.**
    | **Training memory:** Frozen model: 300 MB (resident). LoRA params: 0.3 MB. Optimizer state (Adam:
    2 momentum buffers): 2 x 0.3 = 0.6 MB. Activations (batch=1, 12 layers, ~768 x 197 patches x 2 bytes):
    ~3.6 MB/layer x 12 = 43 MB. **Total: ~344 MB.** | **Training time:** 200 images, 5 epochs, batch=1
    = 1,000 forward+backward passes. FLOPs per pass: ~600 MFLOPs (LoRA backward through frozen forward).
    On mobile NPU at ~5 TOPS: 600M / 5T = 0.12 ms/pass. 1,000 x 0.12 = 0.12s compute. With memory overhead:
    **~30-60 seconds total.** | **Battery:** ~2W x 60s = 120 J. Phone battery ~15 Wh = 54,000 J. **Training
    cost: 0.22% of full charge.** | **Migration:** Back up 296 KB adapter to cloud. Restore on new phone.
    | **Annual energy:** 52 weeks x 120 J = 6,240 J = 6.24 kJ. Annual budget: 10 Wh/day x 365 = 3,650
    Wh = 13.14 MJ. **Annual cost: 6.24 kJ / 13.14 MJ = 0.048%.**'
