title: Shadow Deployment Design for Exynos 2400
scenario: You are tasked with designing a shadow deployment strategy for a new image
  enhancement model targeting the Samsung Exynos 2400 NPU. The new model requires
  1.5 GB of RAM and executes in 15ms per frame, while the existing CPU/GPU pipeline
  is currently using 8 GB of the shared 12 GB LPDDR5X memory. Break down how you would
  specify the system constraints and resource allocation to safely run both the existing
  pipeline and the new NPU model in shadow mode without causing memory starvation
  or thermal throttling on the dual-core NPU.
question: How would you specify an Exynos 2400 shadow deployment that protects latency
  and memory headroom?
details:
  realistic_solution: Specify a telemetry-gated shadow rollout where the NPU model
    executes asynchronously on a sampled subset of frames rather than the full 30
    fps video stream. Set hard memory thresholds to abort the shadow inference if
    total system memory usage exceeds 10.5 GB to protect the primary pipeline. Utilize
    the dual-core nature of the Exynos 2400 NPU by pinning the shadow model to a single
    core, ensuring predictable thermal output while monitoring LPDDR5X bandwidth contention.
  common_mistake: Candidates often design the shadow deployment to run synchronously
    on every frame without accounting for the unified memory architecture. They assume
    the NPU has isolated memory and fail to realize that the 1.5 GB allocation for
    the shadow model might compete for LPDDR5X bandwidth with the primary CPU/GPU
    pipeline, leading to dropped frames in the user-facing application.
  napkin_math: 'Total shared memory: 12 GB. Current CPU/GPU pipeline usage: 8 GB.
    System overhead: ~1.5 GB. Remaining available memory: 12 GB - 8 GB - 1.5 GB =
    2.5 GB. The new model requires 1.5 GB, leaving a 1.0 GB buffer. At 15ms per frame
    for 30 fps, it requires 30 * 15ms = 450ms of NPU compute time per second per core
    (45% utilization). The dual-core NPU''s 34.7 TOPS provides ample compute, but
    the 1.5 GB active allocation must be monitored for shared LPDDR5X bandwidth limits.'
