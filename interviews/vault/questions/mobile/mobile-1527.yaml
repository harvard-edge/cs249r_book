title: Mobile AI Inference Sizing on Snapdragon NPU
scenario: A startup is developing an on-device AI application for real-time object detection, aiming for deployment on flagship Android devices. Your team has chosen the Snapdragon 8 Gen 3 Hexagon NPU, which offers 45 TOPS (INT8) peak performance and 12-16 GB LPDDR5X memory. The current object detection model requires approximately 150 GOPS (INT8) per inference and has a memory footprint of 500 MB for weights and activations. The application needs to process video streams at 30 FPS, running inference continuously.
question: How should mobile AI inference on Snapdragon NPU be sized using empirical profiling beyond peak TOPS?
details:
  realistic_solution: |
    Beyond theoretical TOPS, focus on empirical profiling on the target device. This includes:
    1. **Benchmarking:** Measure actual inference latency and throughput for the specific model on the Snapdragon 8 Gen 3 Hexagon NPU.
    2. **Quantization Awareness:** Ensure the model is properly quantized to INT8 and optimized for the NPU's architecture (e.g., using frameworks like TFLite or ONNX Runtime with Qualcomm SNPE backend).
    3. **Memory Management:** Account for the 12-16 GB LPDDR5X, considering not just model size but also intermediate activations and system memory usage. Evaluate if the 500 MB footprint is truly within operational limits, including potential memory copies.
    4. **Power/Thermal Throttling:** Understand that sustained 45 TOPS may not be achievable due to thermal constraints. Design for dynamic performance scaling or consider less frequent inferences/smaller models under sustained load.
    5. **Software Stack Optimization:** Leverage the vendor-provided SDKs (e.g., Qualcomm Neural Processing SDK) for optimal NPU utilization and low-level optimizations.
  common_mistake: |
    **The Pitfall:** Underestimating the impact of real-world efficiency compared to theoretical peak TOPS.
    **The Rationale:** Candidates assume 100% NPU utilization and ignore system-level overheads.
    **The Consequence:** They design pipelines that suffer from thermal throttling or memory starvation in production.
  napkin_math: |
    - Frame budget at 30 FPS: 1/30 = 33.3 ms.
    - NPU provides 45 TOPS (45,000 GOPS). Model requires 150 GOPS.
    - Ideal inferences/second = 45,000 / 150 = 300 FPS.
    - If effective utilization is 50% due to overheads: 0.5 * 45,000 = 22,500 GOPS.
    - Effective FPS = 22,500 / 150 = **150 FPS** (still comfortably exceeds the 30 FPS requirement).
