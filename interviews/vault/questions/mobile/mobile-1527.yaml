title: Mobile AI Inference Sizing on Snapdragon NPU
scenario: A startup is developing an on-device AI application for real-time object detection on flagship Android devices. The model requires 150 GOPS (INT8) per inference and a 500 MB memory footprint. The application processes video streams at 30 FPS continuously.
question: How should mobile AI inference on an NPU be sized using empirical profiling beyond peak TOPS?
details:
  realistic_solution: |
    Theoretical peak TOPS are an advertising metric, not an architectural guarantee. Sizing must be empirically validated using vendor tools (e.g., Qualcomm SNPE/QNN SDKs). 1. **Effective Utilization**: Hardware rarely sustains >50% utilization due to operator unsupported fallbacks, compiler inefficiencies, and non-optimal spatial tiling. 2. **Memory Contention**: A 500MB footprint reloaded continuously at 30 FPS demands 15 GB/s of memory bandwidth, severely congesting the LPDDR5X bus shared with the ISP. 3. **Thermal Throttling**: Sustaining maximum clock speeds generates lethal heat; the OS will aggressively throttle the NPU within minutes to maintain the ~3-5W thermal envelope, plummeting actual throughput.
  common_mistake: |
    **The Pitfall:** Underestimating the impact of real-world efficiency compared to theoretical peak TOPS.
    **The Rationale:** Candidates assume 100% NPU utilization and ignore system-level overheads.
    **The Consequence:** They design pipelines that suffer from thermal throttling or memory starvation in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target: 30 FPS continuous inference (33.3 ms frame budget).
       - NPU Peak: 45 TOPS (45,000 GOPS).
       - Model Requirement: 150 GOPS per frame.
    2. **Calculations:**
       - Ideal max FPS = 45,000 GOPS / 150 GOPS = 300 FPS.
       - Assuming pessimistic 50% utilization due to scheduling/memory stalls: Effective capacity = 22,500 GOPS.
       - Realistic max FPS = 22,500 / 150 = 150 FPS.
    3. **Conclusion & Interpretation:**
       - **Result: Thermal/Memory-Bound.** While compute calculation shows massive headroom (150 FPS capacity for a 30 FPS target), continuous 500MB memory reads and sustained thermal load will dominate system performance over time, proving raw TOPS are irrelevant.
