title: Energy Profiling for NPU Operator Selection
scenario: You are deploying a real-time speech enhancement model. The team is debating between a memory-heavy lookup table (LUT) streaming from shared memory and a compute-heavy polynomial approximation running directly on the NPU's INT8 tensor cores.
question: How would you choose between lookup tables and polynomial approximations using NPU energy consumption principles?
details:
  realistic_solution: Quantify the energy of both approaches, recognizing that trading compute for memory access is highly beneficial on modern mobile NPUs.
  common_mistake: |
    **The Pitfall:** Assuming fewer MAC operations automatically saves power.
    **The Rationale:** Candidates optimize strictly for FLOP count, forgetting the Horowitz energy table principle that DRAM reads cost orders of magnitude more energy than ALU operations.
    **The Consequence:** The team implements the LUT approach, accidentally increasing the module's power consumption by 24x and severely impacting battery life.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - LUT streaming size: 2MB per inference.
       - DRAM memory access energy: ~15 pJ/bit.
       - Polynomial compute: 50 million MACs.
       - ALU compute energy: ~0.2 pJ/MAC.
    2. **Calculations:**
       - LUT energy: 2MB * 8 bits/byte * 15 pJ/bit = 2.4e8 pJ = 240 $\mu$J per inference.
       - Compute energy: 50e6 MACs * 0.2 pJ/MAC = 1e7 pJ = 10 $\mu$J per inference.
    3. **Conclusion & Interpretation:**
       - **Result: Energy Savings via Compute**. The compute-heavy polynomial approach uses 24x less energy (10 $\mu$J vs 240 $\mu$J), proving that minimizing DRAM access is optimal for power efficiency.
