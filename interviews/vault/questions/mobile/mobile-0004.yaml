title: The OTA Data Budget
scenario: You're a Staff ML Engineer on the mobile team for a popular social media app. Your team is launching a new generative AI feature for creating image filters. The v1 model is 80 MB. After a month of user feedback and fine-tuning, the data science team has produced a v2 model that is 10% more accurate but now weighs 120 MB. Your product manager is concerned about the data cost for users when rolling out this over-the-air (OTA) update.
question: How would you explain the data consumption for a single user if you ship the full update?
details:
  realistic_solution: |
    The update will download the entire 120 MB model file to the user's device, consuming 120 MB of their cellular or Wi-Fi data plan. This is a significant data cost, especially for users on limited or prepaid mobile plans in emerging markets. It could lead to unexpected data charges or cause users to disable background updates, harming future feature adoption.
  common_mistake: |
    **The Pitfall:** Assuming a differential "diff" update (40 MB) is in place by default.
    **The Rationale:** Engineers abstract away the complexity of OTA binary diffing mechanisms.
    **The Consequence:** Shipping massive full-file updates that incur heavy cellular data costs, leading users to disable background updates entirely.
  napkin_math: |
    - **Update Size:** 120 MB.
    - **Data Consumed:** **120 MB** per user.
  options:
  - The update will only transfer the 40 MB difference, which is a manageable size.
  - The 10% accuracy gain is worth the user data cost; we should ship the 120 MB update immediately.
  - The update will consume 120 MB of the user's data plan, a significant cost we must address.
  - The update is about 960 Megabits (Mb), but this is standard and shouldn't be a concern.
  correct_index: 2
