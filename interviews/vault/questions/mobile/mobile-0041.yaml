title: 'The App Store Privacy Rejection: Differential Privacy'
scenario: Your camera app uses an on-device face detection model to apply AR filters. You don't send any images to a server — everything runs locally on the Apple A18 Pro. Apple rejects your app update, citing 'Insufficient purpose string for camera and face data usage.'
question: Why can an app that processes face data only on-device still be rejected for inadequate privacy disclosure?
details:
  realistic_solution: |
    On-device ML creates a fundamental tension: the app has direct access to raw biometric data (the camera feed and the resulting 3D face mesh), but the OS cannot mathematically prove that the app *deletes* that data after applying the AR filter. If you send data to a server, the network request is obvious. But on-device, the ML model generates a face mesh tensor in RAM. The OS doesn't know if that tensor is used solely for rendering the next frame, or if it's being serialized and written to a hidden file for later exfiltration.
  common_mistake: |
    **The Pitfall:** Assuming "on-device" exempts the app from privacy rules.
    **The Rationale:** Candidates assume the OS can perfectly audit what the model does with the data after inference.
    **The Consequence:** App Store rejections, delayed launch times, and lost revenue.
  napkin_math: |
    - **App Store review turnaround:** 24-48 hours.
    - **Fix cycle:** 2-3 resubmissions = 4-9 days delay.
    - **Revenue impact:** 50K DAU at $0.30 ARPDAU = $15K/day. 6 days lost = $90K.
    - **Result:** **Skipping a 2-hour privacy manifest update costs $90K in delayed revenue.**
  options:
  - The OOM is caused by memory fragmentation in the Python runtime; running garbage collection before inference will prevent it.
  - 'On-device ML creates a fundamental tension: the app has direct access to raw biometric data (the camera feed and the resulting 3D face mesh), but the OS cannot mathematically prove that the app *deletes* that data after applying the AR filter. If you send data to a server, the network request is obvious.'
  - Using a larger model with more parameters will improve both accuracy and latency, because larger models have better computational efficiency.
  - We process everything on-device, so privacy rules don't apply.. This assumes the OS can perfectly audit what your model does with the data after inference.
  correct_index: 1
