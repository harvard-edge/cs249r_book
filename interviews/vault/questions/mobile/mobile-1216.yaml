title: A17 Pro Neural Engine Roofline Bottleneck
scenario: You are profiling a real-time vision transformer on the Apple A17 Pro. The profiler shows the model is only achieving 7 TOPS of actual throughput despite having no other system contention. The model requires 35 GOPS of compute per inference and transfers 250 MB of data (weights and activations) per pass. The 16-core Neural Engine provides 35 TOPS of peak compute, sharing an 8 GB unified memory pool that delivers approximately 50 GB/s of bandwidth to the NPU.
question: Why does the A17 Pro vision transformer reach only 7 TOPS, or 20% of peak, under roofline analysis?
details:
  realistic_solution: The underlying cause is that the workload is severely memory-bound, not compute-bound or thermally throttled. By applying the roofline model, we can determine the hardware's ridge point and the model's arithmetic intensity. Because the model's arithmetic intensity is significantly lower than the hardware's ridge point, it hits the sloping memory bandwidth roof long before it can saturate the Neural Engine's flat compute capacity roof. The shared unified memory simply cannot feed the NPU fast enough for this specific operator mix.
  common_mistake: |
    **The Pitfall:** Jumping to conclusions about thermal throttling or poor parallelization.
    **The Rationale:** The chip operates under a strict ~5W power envelope, leading candidates to assume thermal limits rather than applying the roofline formula.
    **The Consequence:** Failing to diagnose the actual system constraint, which is memory bandwidth.
  napkin_math: |
    1. Hardware Ridge Point: 35 TOPS (35,000 GOPS) / 50 GB/s = 700 OPs/byte.
    2. Model Arithmetic Intensity: 35 GOPS / 250 MB (0.25 GB) = 140 OPs/byte.
    3. Roofline check: Since 140 < 700 OPs/byte, the workload is deeply memory-bound.
    4. Max Achievable Performance: 50 GB/s * 140 OPs/byte = **7,000 GOPS (7 TOPS)**.
