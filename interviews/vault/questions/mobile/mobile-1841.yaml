title: Managing the autograd tape for battery-constrained on-device learning on Snapdragon
scenario: You are building an on-device personalization system for a keyboard autocomplete model on Snapdragon 8 Gen 3. The system should learn from user typing patterns in the background without draining the battery. The current implementation runs continuous gradient updates, consuming 8% battery per hour on background learning alone.
question: How would you manage autograd and update scheduling so background personalization does not drain battery?
details:
  realistic_solution: 'Implement lazy learning: only build the computational graph (requires_grad=True) when explicitly scheduled for a learning step. Use torch.no_grad() for all inference. Batch user corrections: collect 32 correction events, then run one backward pass offline (screen off, charging). Use SGD instead of Adam (3× less optimizer state memory = 3× fewer writes to flash). Profile: targeted 0.5% battery per hour for background learning.'
  common_mistake: |
    **The Pitfall:** Running continuous online learning with full autograd tape construction for every sample.
    **The Rationale:** Applying server-side continuous learning patterns directly to mobile without adjusting for power constraints.
    **The Consequence:** Severe battery drain that leads to app uninstalls.
  napkin_math: |
    1. Continuous at 5W * 1 hour = 5Wh.
    2. Battery is 14.8Wh (53,280 Joules). Continuous uses 33.7% of battery per hour.
    3. Batched (32 samples): 1 backward pass * 50ms at 5W = 0.25 Joules/min = 15 Joules/hour.
    4. **Impact:** 15 J / 53,280 J = **0.028% battery per hour (negligible).**
