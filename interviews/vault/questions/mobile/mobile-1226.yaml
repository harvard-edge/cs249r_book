title: Architecting On-Device LLM Cost Strategy for Tensor G3
scenario: You are designing the deployment strategy for an on-device summarization feature using a 1.8B parameter LLM (Gemini Nano equivalent) targeted for devices equipped with the Google Tensor G3. The product requirements mandate keeping latency under 1 second per request without exceeding thermal thresholds or battery budget during sustained use.
question: How should Tensor G3 deploy a 1.8B summarization model with INT4/INT8 tradeoffs and thermal fallback?
details:
  realistic_solution: The correct design evaluates the system holistically, recognizing that memory bandwidth, not just the 7.5 TOPS compute, is the bottleneck for on-device LLMs. A robust architecture would dynamically profile the device state, utilizing INT4 quantization to halve the memory bandwidth requirements and footprint (from ~1.8GB to ~0.9GB for weights), while implementing a fallback mechanism to cloud inference if the device temperature exceeds safe limits, thus predictably managing power and compute costs.
  common_mistake: |
    **The Pitfall:** Designing purely for compute peak without thermal fallback.
    **The Rationale:** Candidates default to INT8 quantization and focus solely on the 7.5 TOPS compute limit, failing to evaluate memory bandwidth constraints and thermal realities.
    **The Consequence:** The continuous 18 GB/s memory transfer causes the SoC to overheat, triggering thermal throttling and failing the 1-second latency SLA.
  napkin_math: |
    - INT8 Footprint: 1.8 GB. Bandwidth at 10 tok/s: 1.8 GB * 10 = 18 GB/s.
    - INT4 Footprint: 0.9 GB. Bandwidth at 10 tok/s: 0.9 GB * 10 = 9 GB/s.
    - Compute per token: 2 * 1.8B = 3.6 GOPS.
    - Compute at 10 tok/s: 36 GOPS (0.036 TOPS).
    - **Conclusion:** 36 GOPS easily fits in the 7.5 TOPS budget. INT4 halves the memory bandwidth requirement (18 GB/s to 9 GB/s), significantly reducing power and thermal load.
