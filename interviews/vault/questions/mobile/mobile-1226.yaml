title: Architecting On-Device LLM Cost Strategy for Tensor G3
scenario: You are designing the deployment strategy for an on-device summarization feature using a 1.8B parameter LLM. The product requirements mandate keeping latency under 1 second per request without exceeding thermal thresholds or battery budget during sustained use.
question: How should a mobile deployment architect a 1.8B summarization model with INT4/INT8 tradeoffs and thermal fallback?
details:
  realistic_solution: The architecture must dynamically profile the device thermal state, utilizing INT4 weight-only quantization to halve the memory bandwidth bottleneck (from ~1.8GB to ~0.9GB) and footprint. A critical thermal fallback mechanism to cloud inference must be implemented if the SoC triggers thermal throttling, ensuring the 1-second latency SLA is predictably maintained.
  common_mistake: |
    **The Pitfall:** Designing purely for compute peak without thermal fallback.
    **The Rationale:** Candidates default to INT8 quantization and focus solely on TOPS limits, failing to evaluate memory bandwidth constraints and thermal realities.
    **The Consequence:** The continuous 18 GB/s memory transfer causes the SoC to overheat, triggering thermal throttling and failing the latency SLA.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute per token: 2 * 1.8B = 3.6 GOPS.
       - Target throughput: 10 tokens/sec.
    2. **Calculations:**
       - INT8 Bandwidth: 1.8 GB * 10 tok/s = 18 GB/s.
       - INT4 Bandwidth: 0.9 GB * 10 tok/s = 9 GB/s.
       - Compute at 10 tok/s: 36 GOPS (0.036 TOPS).
    3. **Conclusion & Interpretation:**
       - **Result: 9 GB/s vs 18 GB/s.** The workload is highly **Memory-Bound**. INT4 halves bandwidth, drastically reducing thermal load.
