title: The Hardware-Aware NAS for Mobile
scenario: You need a model that runs in <5ms on the Apple Neural Engine AND <8ms on the Qualcomm Hexagon NPU. Standard NAS finds architectures that minimize FLOPs, but a low-FLOP model isn't necessarily fast on either accelerator.
question: "How should NAS target both sub-5ms Apple Neural Engine latency and sub-8ms Qualcomm Hexagon latency?"
details:
  realistic_solution: 'FLOPs-optimized NAS fails because FLOPs do not equal latency on NPUs. A depthwise
    conv has fewer FLOPs but can be slower than a dense conv on NPUs optimized for matrix multiplication.
    Build latency lookup tables (LUTs) by profiling each candidate op on each target device: 480 entries
    per hardware, ~8 min to profile. During NAS search, predict latency by summing per-layer LUT entries.
    Use multi-objective optimization with latency constraints per platform. Result: architectures that
    meet both <5ms ANE and <8ms Hexagon targets, whereas FLOPs-only NAS missed the Hexagon target by 41%.'
  common_mistake: |
    **The Pitfall:** Assuming lower FLOPs always means lower latency.
    **The Rationale:** Candidates rely on FLOPs as a proxy for latency, forgetting that some operations (like depthwise separable convolutions) have fewer FLOPs but run slower on NPUs optimized for dense matrices.
    **The Consequence:** NAS produces models that fail to meet real-world latency targets on specific hardware architectures.
  napkin_math: |
    - Search Space: 10²⁰ possible architectures.
    - LUT Size: 6 ops × 10 channel configs × 8 resolutions = 480 entries per hardware.
    - Profiling Time: 480 × 100 runs × 10ms = 8 minutes per hardware.
    - NAS search architecture latency: 3.8ms on ANE and 7.2ms on Hexagon.
    - FLOPs-only NAS latency: 4.1ms on ANE and 11.3ms on Hexagon (Fails 8ms target).
    - **Conclusion:** Hardware-aware search found a **37% faster** Hexagon architecture at equal accuracy.
