title: The Hardware-Aware NAS for Mobile
scenario: You need a model that runs in <5ms on iOS AND <8ms on Android NPUs. Standard NAS finds architectures that minimize FLOPs, but a low-FLOP model isn't necessarily fast on either accelerator.
question: How should NAS target both sub-5ms Apple latency and sub-8ms Qualcomm latency?
details:
  realistic_solution: 'FLOPs-optimized NAS fails because FLOPs do not equal latency on NPUs. A depthwise conv has fewer FLOPs but can be slower than a dense conv on NPUs optimized for matrix multiplication. Build latency lookup tables (LUTs) by profiling each candidate op on each target device: 480 entries per hardware, ~8 min to profile. During NAS search, predict latency by summing per-layer LUT entries. Use multi-objective optimization with latency constraints per platform. Result: architectures that meet both constraints, whereas FLOPs-only NAS missed the target by 41%.'
  common_mistake: |
    **The Pitfall:** Assuming lower FLOPs always means lower latency.
    **The Rationale:** Candidates rely on FLOPs as a proxy for latency, forgetting that some operations (like depthwise separable convolutions) have fewer FLOPs but run slower on NPUs optimized for dense matrices.
    **The Consequence:** NAS produces models that fail to meet real-world latency targets on specific hardware architectures.
  napkin_math: |
    **Assumptions & Constraints:**
    - Targets: <5ms (Apple) and <8ms (Qualcomm).
    - LUT Dimensions: 6 ops \u00d7 10 channels \u00d7 8 resolutions = 480 entries.
    - Profiling overhead: 10ms per test, 100 runs.

    **Calculations:**
    - Profiling Time: 480 * 100 runs * 10ms = 480,000 ms = 8 minutes per platform.
    - FLOP-optimized Latency: ~4.1ms (Apple), ~11.3ms (Qualcomm - FAILS target).
    - Hardware-aware Latency: ~3.8ms (Apple), ~7.2ms (Qualcomm - PASSES target).

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound.** Multi-hardware LUT constraints yield a 37% faster Hexagon architecture than FLOP proxies alone.
