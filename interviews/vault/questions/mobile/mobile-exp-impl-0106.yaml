title: Calculate Energy Cost of Memory vs Compute on Hexagon NPU
scenario: You are deploying a quantized INT8 computer vision model to the Qualcomm Hexagon NPU on a Snapdragon
  8 Gen 3 SoC. The model has a specific layer that performs 10 million INT8 MAC operations and requires
  transferring 2 MB of weight and activation data from the shared 16 GB LPDDR5X memory. Given that an
  INT8 MAC operation on the NPU consumes roughly 0.1 pJ, while a 32-bit DRAM read from LPDDR5X costs approximately
  100 pJ, quantify the total energy consumed by compute versus memory access for this layer.
question: "How much energy does the Hexagon NPU layer spend on INT8 compute versus LPDDR5X memory access?"
details:
  realistic_solution: The candidate should apply the Horowitz energy table principles, recognizing that
    off-chip memory access is orders of magnitude more expensive than arithmetic operations. They should
    calculate the compute energy using the number of MACs and the memory energy using the data transfer
    size, demonstrating that memory access dominates the power budget.
  common_mistake: Candidates often focus solely on the compute energy (the 45 TOPS INT8 capability) and
    severely underestimate or completely ignore the energy cost of transferring data from the LPDDR5X
    memory to the NPU.
  napkin_math: 'Compute Energy: 10M MACs = 10^7 operations. 1 INT8 MAC = 0.1 pJ. Compute = 10^7 * 0.1
    pJ = 10^6 pJ = 1 microjoule (uJ). Memory Energy: 2 MB = 2 * 10^6 bytes = 5 * 10^5 32-bit words. 1
    DRAM access (32-bit) = 100 pJ. Memory = 5 * 10^5 * 100 pJ = 5 * 10^7 pJ = 50 microjoules (uJ). Total
    Energy = 51 uJ. Memory consumes 50x more energy than compute.'
