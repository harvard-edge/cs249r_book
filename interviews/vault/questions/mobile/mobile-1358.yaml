title: Operator Fusion Latency on Hexagon NPU
scenario: You are optimizing operator scheduling for a vision model on a mobile NPU which features 45 TOPS INT8 compute and shares 16 GB of LPDDR5X memory. The model has a sequence of three INT8 operators requiring 22.5 GOPs, 45 GOPs, and 22.5 GOPs of compute. In an unfused schedule, intermediate activations must be written to and read from the shared LPDDR5X memory between operators, totaling 45 MB of memory traffic at an effective bandwidth of 45 GB/s. Assume compute achieves 100% of peak TOPS and does not overlap with memory transfers.
question: What execution time do unfused and fully fused NPU schedules take for the three-operator sequence?
details:
  realistic_solution: The optimal solution requires calculating the theoretical minimum compute latency from the NPU's peak TOPS and adding the memory I/O latency for the unfused case. Fusing the operators completely eliminates the LPDDR5X trips, resulting in a schedule bounded entirely by the 45 TOPS INT8 compute limit.
  common_mistake: |
    **The Pitfall:** Failing to quantify the exact latency penalty of memory trips in the unfused schedule.
    **The Rationale:** Candidates assume NPU latency is exclusively a function of TOPS and incorrectly convert between Tera-operations and Giga-operations.
    **The Consequence:** Memory bandwidth bottlenecks are ignored, leading to highly inaccurate latency projections for mobile inference.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU: 45 TOPS INT8 compute. LPDDR5X memory: 45 GB/s effective bandwidth.
       - Total Compute: 22.5 + 45 + 22.5 = 90 GOPs.
       - Intermediate memory traffic (unfused): 45 MB.
    2. **Calculations:**
       - Compute Latency: 90 GOPs / 45 TOPS = 2.0 ms.
       - Unfused Memory Latency: 45 MB / 45 GB/s = 1.0 ms.
       - Unfused Total Time = 2.0 ms + 1.0 ms = 3.0 ms.
       - Fused Total Time = 2.0 ms (memory traffic eliminated).
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound -> Compute-Bound.** The unfused schedule takes 3.0 ms, while the fully fused schedule takes 2.0 ms, demonstrating a 33% latency reduction via operator fusion.
