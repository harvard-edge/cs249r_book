title: The Privacy vs. Profit A/B Test
scenario: You are an ML engineer at a social media company, A/B testing a new 'smart reply' feature for direct messages. You have 1 million users in each test group. Each user sees 10 suggestions per day. The business team has quantified the value of each prediction: a good suggestion (one the user accepts) is worth +$0.005 in engagement, while a bad suggestion (one the user ignores or deletes) costs -$0.001 in user trust. The centralized model has a 95% acceptance rate; the federated model has an 80% acceptance rate.
question: What net daily value do centralized 95% and federated 80% smart-reply models create for 1M users at 10 suggestions/day?
details:
  realistic_solution: The correct approach is to calculate the net economic value generated by each A/B test group per day. The centralized model, despite its privacy risks, generates significantly more immediate value ($47,000/day) than the federated model ($38,000/day). The business decision involves weighing this concrete, daily opportunity cost of $9,000 against the unquantified (but potentially catastrophic) risk of a data breach or user backlash over privacy.
  common_mistake: |
    **The Pitfall:** Focusing only on privacy benefits without quantifying business impact.
    **The Rationale:** Engineers often champion technically elegant solutions without calculating economic trade-offs, or they calculate upside value while ignoring the negative cost of bad predictions.
    **The Consequence:** They present incomplete business cases that fail to address management's revenue concerns.
  napkin_math: |
    * Daily suggestions per group: 1M × 10 = 10M suggestions/day.
    * Centralized model: Good = 10M × 0.95 = 9.5M × $0.005 = $47,500. Bad = 10M × 0.05 = 0.5M × $0.001 = $500.
    * Centralized Net: $47,500 − $500 = $47,000/day.
    * Federated model: Good = 10M × 0.80 = 8M × $0.005 = $40,000. Bad = 10M × 0.20 = 2M × $0.001 = $2,000.
    * Federated Net: $40,000 − $2,000 = $38,000/day.
    * Opportunity cost of FL: $47,000 − $38,000 = $9,000/day.
    * **The federated model incurs a $9,000 daily ($3.3M/year) opportunity cost.**
  options:
  - The Cloud model is superior by $17,500 per day, as it generates far more value from accepted suggestions.
  - The Federated Learning model is the only responsible choice, as the potential cost of a data breach outweighs any daily revenue metric.
  - The Cloud model is only marginally better, with a net value gain of $14,000 per day.
  - The Federated Learning approach has a daily opportunity cost of $9,000, forcing a decision between immediate user value and long-term privacy strategy.
