title: The Privacy vs. Profit A/B Test
scenario: 'You are an ML engineer at a social media company, A/B testing a new ''smart reply'' feature
  for direct messages. You have 1 million users in each test group. Each user sees 10 suggestions per
  day. The business team has quantified the value of each prediction: a good suggestion (one the user
  accepts) is worth +$0.005 in engagement, while a bad suggestion (one the user ignores or deletes) costs
  -$0.001 in user trust. The centralized model has a 95% acceptance rate; the federated model has an 80%
  acceptance rate. Calculate the net daily value of each approach.'
question: "What daily value do centralized 95% and federated 80% smart-reply models create for 1M users at 10 suggestions/day?"
details:
  realistic_solution: The correct approach is to calculate the net economic value generated by each A/B
    test group per day. The centralized model, despite its privacy risks, generates significantly more
    immediate value ($47,000/day) than the federated model ($38,000/day). The business decision involves
    weighing this concrete, daily opportunity cost of $9,000 against the unquantified (but potentially
    catastrophic) risk of a data breach or user backlash over privacy. The federated model might be a
    better long-term bet if it can learn quickly, but launching it today means accepting a significant,
    measurable reduction in value.
  common_mistake: Focusing only on the privacy benefits of Federated Learning without quantifying its
    business impact. Engineers often champion technically elegant or privacy-preserving solutions without
    doing the math on their economic trade-offs. Another common mistake is to only calculate the upside
    value from good predictions while ignoring the real, negative cost of bad predictions on user trust
    and engagement.
  napkin_math: '1. **Daily suggestions per group:** 1M × 10 = 10M suggestions/day.

    2. **Centralized model:** Good = 10M × 0.95 = 9.5M × $0.005 = $47,500. Bad = 10M × 0.05 = 0.5M × $0.001
    = $500. Net = $47,500 − $500 = **$47,000/day**.

    3. **Federated model:** Good = 10M × 0.80 = 8M × $0.005 = $40,000. Bad = 10M × 0.20 = 2M × $0.001
    = $2,000. Net = $40,000 − $2,000 = **$38,000/day**.

    4. **Daily opportunity cost of FL:** $47,000 − $38,000 = $9,000/day ($3.3M/year).

    5. **Break-even question:** Is the privacy risk reduction worth $3.3M/year in foregone engagement?'
  options:
  - The Cloud model is superior by $17,500 per day, as it generates far more value from accepted suggestions.
  - The Federated Learning model is the only responsible choice, as the potential cost of a data breach
    outweighs any daily revenue metric.
  - The Cloud model is only marginally better, with a net value gain of $14,000 per day.
  - The Federated Learning approach has a daily opportunity cost of $9,000, forcing a decision between
    immediate user value and long-term privacy strategy.
  correct_index: 3
