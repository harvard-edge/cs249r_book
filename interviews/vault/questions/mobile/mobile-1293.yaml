title: Heterogeneous Pipelining on Snapdragon 8 Gen 3
scenario: You are deploying a real-time 30 FPS video segmentation pipeline on a device powered by the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The graph consists of a heavy INT8 CNN backbone and a custom FP16 attention-based post-processing head. You are evaluating two operator scheduling alternatives: Strategy A schedules all operators sequentially, running the INT8 backbone on the NPU and falling back to the CPU for the FP16 head to avoid complex synchronization. Strategy B partitions the graph, aggressively fusing the INT8 backbone on the NPU and pipelining the FP16 head asynchronously on the GPU, utilizing the shared 12-16 GB LPDDR5X memory for data handoffs.
question: Should a Snapdragon 8 Gen 3 30 FPS segmentation graph run the FP16 head on CPU or pipeline it on GPU?
details:
  realistic_solution: Strategy B is the correct approach for an L5 engineer. The Snapdragon 8 Gen 3 architecture utilizes a shared 12-16 GB LPDDR5X memory pool, meaning the NPU and GPU can pass intermediate tensors via zero-copy pointers rather than expensive memory copies. By pipelining the execution, the NPU can process frame N+1 at its peak 45 TOPS INT8 while the GPU simultaneously processes the FP16 head for frame N. This hides the latency of the attention head and maximizes overall hardware utilization.
  common_mistake: |
    **The Pitfall:** Overestimating synchronization penalties between heterogeneous compute units.
    **The Rationale:** Candidates prefer sequential execution (Strategy A) to avoid complexity, failing to realize that dense FP16 operations on the CPU will severely bottleneck the pipeline.
    **The Consequence:** The system misses the real-time 30 FPS target due to CPU bottlenecking.
  napkin_math: |
    * Assume NPU INT8 latency = 30 ms. FP16 head = 25 ms on CPU, 15 ms on GPU.
    * Strategy A (Sequential NPU+CPU): 30 ms + 25 ms = 55 ms per frame.
    * Strategy A Throughput: 1000 ms / 55 ms = 18 FPS (misses 30 FPS target).
    * Strategy B (Pipelined NPU+GPU): Pipeline bottleneck is max(30 ms, 15 ms) = 30 ms per frame.
    * Strategy B Throughput: 1000 ms / 30 ms = 33.3 FPS.
    * **Strategy B successfully meets the 30 FPS requirement.**
