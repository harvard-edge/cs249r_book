title: 'Explain backpressure effects on queue arrival rates during mobile bursts'
scenario: A photo processing app on an Apple A17 Pro runs a stylization model. Photos arrive in bursts when a user syncs an album. The background processing queue has a strict limit of 10 images.
question: Explain what happens to the arrival rate of the queue when the buffer fills up completely during a sync burst.
details:
  realistic_solution: 'When the 10-image buffer fills, the queue must enforce backpressure to avoid OOM crashes. This typically blocks the arrival process (pausing the sync loop) or drops new images, effectively throttling the system arrival rate to perfectly match the NPU''s service rate until the burst clears.'
  common_mistake: |
    **The Pitfall:** Believing the queue magically speeds up the NPU or that infinite photos can be buffered.
    **The Rationale:** Candidates don't understand explicit backpressure mechanisms and assume RAM handles it invisibly.
    **The Consequence:** They build systems that inevitably crash with Out-Of-Memory (OOM) errors during burst workloads.
  napkin_math: |
    **Assumptions & Constraints:**
    - Buffer capacity = 10 images.
    - Current queue size = 10 images.

    **Calculations:**
    - Available space for new arrivals = 10 - 10 = 0.

    **Conclusion & Interpretation:**
    - **Result: 0 space (Queue-Bound)**. Backpressure blocks new arrivals, throttling the arrival rate to exactly match the NPU service rate.
