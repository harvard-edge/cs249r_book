title: The AR Jank Diagnosis
scenario: You are the lead ML engineer for a popular AR social media app. Users are complaining of 'jank'
  (stuttering video) and high battery drain when using a new AR filter that relies on a 5M parameter Vision
  Transformer (ViT) for real-time object segmentation. Your profiler confirms the ViT model takes **25ms**
  per frame on an Apple A17 Pro, completely missing the **16ms** render budget for a smooth 60 FPS experience.
  Given the options below, what is the most effective approach to solve this problem?
question: "Which model change gets a 5M-parameter ViT AR filter under a 16 ms A17 Pro frame budget?"
details:
  realistic_solution: The correct approach is to replace the architecturally-inefficient Vision Transformer
    with a CNN designed specifically for mobile constraints, like a MobileNet or EfficientNet derivative.
    ViT's self-attention mechanism is powerful but has a computational cost quadratic in the number of
    patches, and often poor memory access patterns that lead to latency bottlenecks on mobile NPUs, even
    if the peak TOPS of the NPU is high. A NAS-derived architecture built on depthwise separable convolutions
    provides a much better trade-off between accuracy and latency, as it was explicitly optimized for
    mobile FLOPs and memory budgets.
  common_mistake: Engineers often misdiagnose the root cause of mobile performance issues. They might
    blame the hardware's peak TOPS rating (a marketing number), or assume scaling laws that work for massive
    cloud models apply linearly to mobile architectures. They may also apply complex but inappropriate
    'optimizations' like MoE without considering the high overhead of control flow on mobile hardware,
    when a fundamental architectural change is what's needed.
  napkin_math: A 5M param ViT processes image patches globally. For a 256x256 image with 16x16 patches,
    there are 256 tokens. Self-attention requires N^2 memory accesses. Depthwise separable CNNs process
    locally, caching feature maps in SRAM. For 30 FPS, ViT forces 30 * 5M * 2B = 300MB/s of weights, plus
    heavy N^2 activation spills to DRAM. Mobile power is dominated by DRAM accesses (~580x more than compute).
  options:
  - Replace the ViT with a modern CNN architecture (e.g., MobileNetV3) that uses depthwise separable convolutions.
  - This is a hardware issue. Advise users to upgrade to a flagship phone with a more powerful NPU (e.g.,
    >45 TOPS).
  - Make the ViT sparser by converting its MLP layers into Mixture-of-Experts (MoE) layers to reduce the
    active parameter count.
  - Simply halve the ViT's embedding dimension and number of layers; latency scales linearly with parameter
    count.
