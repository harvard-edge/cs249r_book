title: The AR Jank Diagnosis
scenario: You are the lead ML engineer for a popular AR social media app. Users are complaining of 'jank' (stuttering video) and high battery drain when using a new AR filter that relies on a 5M parameter Vision Transformer (ViT) for real-time object segmentation. Your profiler confirms the ViT model takes 25ms per frame on an Apple A17 Pro, completely missing the 16ms render budget for a smooth 60 FPS experience.
question: "Which model change gets a 5M-parameter ViT AR filter under a 16 ms A17 Pro frame budget?"
details:
  realistic_solution: 'The correct approach is to replace the architecturally-inefficient Vision Transformer with a CNN designed specifically for mobile constraints, like a MobileNet or EfficientNet derivative. A NAS-derived architecture built on depthwise separable convolutions provides a much better trade-off between accuracy and latency.'
  common_mistake: |
    **The Pitfall:** Applying complex server-side optimizations (like MoE) or blindly trusting scaling laws.
    **The Rationale:** Engineers often assume that because ViTs work well in the cloud, they just need slightly fewer parameters to work on mobile, ignoring the high memory access costs of self-attention.
    **The Consequence:** They fail to solve the bottleneck because the fundamental memory access pattern of the architecture is still incompatible with mobile DRAM.
  napkin_math: |
    - **ViT Memory Pattern:** A 5M param ViT processing 256 tokens per frame requires N^2 memory accesses for self-attention.
    - **Bandwidth Cost:** At 30 FPS, ViT forces 30 * 5M * 2B = 300 MB/s of raw weight streaming, plus heavy N^2 activation spills to DRAM.
    - **Alternative:** Depthwise separable CNNs process locally, caching feature maps in SRAM.
    - **Final Result:** ViT is fundamentally bound by mobile DRAM power costs (~580x more expensive than compute), necessitating an architectural swap to a **mobile-first CNN**.
