title: The Mobile Memory Controller Puzzle
scenario: You're optimizing an on-device LLM on a MediaTek Dimensity 9300 (LPDDR5X, 4 × 16-bit channels,
  8533 MHz). The theoretical peak bandwidth is 68.3 GB/s. Your 4-bit quantized 7B model (3.5 GB) should
  generate tokens at 68.3 / 3.5 = 19.5 tokens/sec if fully memory-bandwidth-bound. You measure 11 tokens/sec.
  Where is the missing 44% of bandwidth?
details:
  realistic_solution: 'Four factors reduce effective LPDDR5X bandwidth below the 68.3 GB/s peak: (1) DRAM
    refresh cycles steal 7% (~4.8 GB/s). (2) Competing traffic from display controller, ISP, and CPU takes
    ~14% (~9 GB/s). (3) LLM weight access patterns cause row-buffer misses (random bank access across
    layers), losing ~30% to page opens/closes. (4) Memory controller arbitration overhead. Effective bandwidth:
    ~38 GB/s = 56% of peak. At 38 GB/s for a 3.5 GB model: 10.9 tok/s, close to the measured 11. Optimizations:
    reorder weight layout for sequential row access (+8%), pause camera during generation (+5 GB/s), use
    NPU SRAM double-buffering (+5%).'
  common_mistake: '"The memory controller can''t sustain peak bandwidth." It can — for sequential reads.
    The issue is how LLM inference accesses memory.'
  napkin_math: 'Peak bandwidth: 68.3 GB/s. After refresh: 63.5 GB/s (−7%). After competing traffic: 54.5
    GB/s (−14%). After access pattern inefficiency: 38.2 GB/s (−30%). Effective utilization: 38.2 / 68.3
    = **56%** of peak. This is typical for mobile LLM inference. Optimization levers: (a) reduce competing
    traffic by pausing camera/display updates during generation (+5 GB/s), (b) reorder weight layout to
    maximize row hits (+8% utilization), (c) use weight streaming with double-buffering in NPU SRAM (+5%
    utilization). Best case: ~48 GB/s → 13.7 tokens/sec.'
