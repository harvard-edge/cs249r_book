title: The Concurrency Collision
scenario: You are developing an app that needs to run two independent ML models simultaneously on a mobile device: a real-time face detection model and a background scene analysis model. When run individually, both models achieve their target FPS on the NPU.
question: "Why can two simultaneous NPU models each fall to 30% of solo FPS instead of sharing performance evenly (50%)?"
details:
  realistic_solution: "The \"more-than-halving\" performance drop points to contention for shared resources and system overheads beyond simple NPU compute division:\n  1.  **Shared NPU Compute Resources:** The NPU's MAC units, vector processing units, and internal memory bandwidth are finite. If both models try to utilize these simultaneously, they contend for access, leading to pipeline stalls and reduced throughput for each.\n  2.  **DRAM Bandwidth Contention:** Even if the NPU has some on-chip memory, models frequently access main system DRAM for weights and intermediate tensors. Two concurrent models significantly increase DRAM bandwidth demands, leading to more memory stalls for both. This can be exacerbated if other SoC components (GPU, display, modem) are also active.\n  3.  **NPU Driver/OS Scheduling Overhead:** The NPU driver and OS scheduler must manage context switching between the two models. This involves saving and restoring NPU state, flushing caches, and managing task queues, which introduces overhead for each switch.\n  4.  **Cache Contention:** If the NPU has a shared L1/L2 cache, the working sets of both models might evict each other's data, leading to more frequent and costly accesses to slower main memory.\n  5.  **Interconnect Contention:** Data transfers to/from the NPU via the SoC interconnect (e.g., AXI bus) become congested, slowing down data ingress/egress for both models."
  common_mistake: |
    **The Pitfall:** Assuming the NPU simply splits its resources 50/50 without overhead.
    **The Rationale:** Candidates treat concurrent execution linearly, ignoring the severe penalties of context switching, cache thrashing, and memory bandwidth contention.
    **The Consequence:** The system is poorly architected for concurrency, resulting in dropped frames and unpredictable latency for both models.
  napkin_math: |
    * Model A requires 600 OPS/ms. Model B requires 600 OPS/ms. Total = 1200 OPS/ms.
    * NPU capacity = 1000 OPS/ms. (The NPU is overloaded).
    * Context switch overhead = 1 ms per switch.
    * If OS switches 100 times/sec: 100 ms of pure overhead per second.
    * **Available compute drops to 900 ms/sec. Models must fight for reduced compute while thrashing the cache, driving performance below the expected 50% baseline.**
