title: The Concurrency Collision
scenario: 'You are developing an app that needs to run two independent ML models simultaneously on a mobile
  device: a real-time face detection model and a background scene analysis model. When run individually,
  both models achieve their target FPS on the NPU. However, when run concurrently, both models experience
  a greater-than-expected performance degradation (e.g., each drops to 30% of its individual FPS, not
  50%). What system-level factors contribute to this ''more-than-halving'' performance drop?'
question: "Why can two simultaneous NPU models each fall to 30% of solo FPS instead of sharing performance evenly?"
details:
  realistic_solution: "The \"more-than-halving\" performance drop points to contention for shared resources\
    \ and system overheads beyond simple NPU compute division:\n  1.  **Shared NPU Compute Resources:**\
    \ The NPU's MAC units, vector processing units, and internal memory bandwidth are finite. If both\
    \ models try to utilize these simultaneously, they contend for access, leading to pipeline stalls\
    \ and reduced throughput for each.\n  2.  **DRAM Bandwidth Contention:** Even if the NPU has some\
    \ on-chip memory, models frequently access main system DRAM for weights and intermediate tensors.\
    \ Two concurrent models significantly increase DRAM bandwidth demands, leading to more memory stalls\
    \ for both. This can be exacerbated if other SoC components (GPU, display, modem) are also active.\n\
    \  3.  **NPU Driver/OS Scheduling Overhead:** The NPU driver and OS scheduler must manage context\
    \ switching between the two models. This involves saving and restoring NPU state, flushing caches,\
    \ and managing task queues, which introduces overhead for each switch.\n  4.  **Cache Contention:**\
    \ If the NPU has a shared L1/L2 cache, the working sets of both models might evict each other's data,\
    \ leading to more frequent and costly accesses to slower main memory.\n  5.  **Interconnect Contention:**\
    \ Data transfers to/from the NPU via the SoC interconnect (e.g., AXI bus) become congested, slowing\
    \ down data ingress/egress for both models."
  common_mistake: '"The NPU simply splits its resources 50/50." While resource sharing is the core, the
    degradation is often non-linear due to contention and overheads.'
  napkin_math: If an NPU has an effective throughput of 1000 OPS/ms, and two models each require 600 OPS/ms,
    the NPU is overloaded. If context switching overhead adds 1ms per switch, and the OS switches 100
    times per second, that's 100ms of overhead per second, eating into total available compute time. If
    each model individually takes 20ms, running concurrently might result in each taking 60-70ms due to
    these combined factors.
