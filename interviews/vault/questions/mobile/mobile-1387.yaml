title: LLM Memory Co-Design on Exynos 2400 NPU
scenario: You are leading the deployment of a 4B parameter local LLM on the Samsung Exynos 2400 NPU for real-time live captioning. During concurrent 4K video recording, the ISP and GPU consume massive bandwidth, causing severe memory starvation and high latency during the LLM's autoregressive generation phase.
question: How do you design a memory hierarchy and execution architecture to guarantee 20 tokens/s generation without dropping camera frames?
details:
  realistic_solution: A robust L6+ solution synthesizes a memory-aware execution strategy. The architecture must compress the KV cache using Grouped-Query Attention (GQA) and pin the hot KV cache partitions in the NPU's local SRAM. To solve the DRAM bandwidth bottleneck, the candidate should propose speculative decoding with a lightweight draft model to batch weight loads, or a weight-stationary dataflow that pipelines weight fetching from the shared 12 GB LPDDR5X asynchronously, ensuring the NPU's memory accesses don't block the ISP's real-time deadlines.
  common_mistake: |
    **The Pitfall:** Treating the device's RAM as dedicated NPU memory and focusing solely on compute limits.
    **The Rationale:** Candidates forget that mobile architectures use shared memory pools, where the ISP and GPU compete fiercely for bandwidth during multitasking.
    **The Consequence:** Designing a quantization strategy that still starves the system of bandwidth, resulting in dropped camera frames and terrible UI stutter during generation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Main model: 4B parameters (INT4) = 2 GB.
       - Target rate: 20 tokens/sec.
       - LPDDR5X peak bandwidth: ~68 GB/s.
       - ISP/GPU concurrent bandwidth requirement: 35 GB/s.
    2. **Calculations:**
       - Naive Bandwidth: 2 GB * 20 tokens/sec = 40 GB/s.
       - Total system bandwidth: 40 + 35 = 75 GB/s (Exceeds 68 GB/s).
       - Speculative Decoding (with 50MB draft model): Main model read rate drops to 5 times/sec (2 GB * 5 = 10 GB/s).
    3. **Conclusion & Interpretation:** Total LLM memory bandwidth drops from 40 GB/s to **~11 GB/s**, safely allowing concurrent 4K video processing. The system avoids being **Memory-Bandwidth Bound**.
