title: LLM Memory Co-Design on Exynos 2400 NPU
scenario: You are leading the deployment of a 4B parameter local LLM on the Samsung
  Exynos 2400 NPU for real-time live captioning. The device features a dual-core NPU
  capable of 34.7 TOPS, but it shares 12 GB of LPDDR5X memory with the CPU, GPU, and
  ISP. During concurrent 4K video recording, the ISP and GPU consume massive bandwidth,
  causing severe memory starvation and high latency during the LLM's autoregressive
  generation phase. Design a novel memory hierarchy and execution architecture that
  minimizes DRAM trips and guarantees 20 tokens/second generation without dropping
  camera frames.
question: How would you design a novel memory hierarchy and execution architecture
  that minimizes DRAM trips and guarantees 20 tokens/second generation without dropping
  camera frames?
details:
  realistic_solution: A robust L6+ solution synthesizes a memory-aware execution strategy.
    The architecture must compress the KV cache using Grouped-Query Attention (GQA)
    and pin the hot KV cache partitions in the NPU's local SRAM. To solve the DRAM
    bandwidth bottleneck, the candidate should propose speculative decoding with a
    lightweight draft model to batch weight loads, or a weight-stationary dataflow
    that pipelines weight fetching from the shared 12 GB LPDDR5X asynchronously, ensuring
    the NPU's memory accesses don't block the ISP's real-time deadlines.
  common_mistake: Candidates often treat the 12 GB LPDDR5X as dedicated NPU memory
    and focus solely on the 34.7 TOPS compute limit, ignoring the fierce bandwidth
    contention from the ISP/GPU during multitasking. They typically propose standard
    quantization without designing a dynamic bandwidth allocation strategy or exploiting
    NPU local SRAM to bypass the shared DRAM bottleneck.
  napkin_math: A 4B parameter model in INT4 precision requires ~2 GB for weights.
    To achieve 20 tokens/sec in naive autoregressive decoding, the dual-core NPU must
    load all weights 20 times per second, demanding 2 GB * 20 = 40 GB/s of LPDDR5X
    bandwidth. LPDDR5X peak bandwidth is ~68 GB/s. If the ISP and GPU require 35 GB/s
    for 4K video processing and UI rendering, the total demand (75 GB/s) exceeds the
    shared memory capacity. By implementing speculative decoding with a tiny 100M
    parameter draft model (50 MB weights) that guesses 4 tokens per step, we reduce
    the main model's DRAM reads to 5 times per second (2 GB * 5 = 10 GB/s). Total
    LLM memory bandwidth drops from 40 GB/s to roughly 11 GB/s, safely allowing concurrent
    ISP/GPU operation within the Exynos 2400's shared memory limits.
