title: Continuous Vision Thermal Throttling Strategy
scenario: You are designing the thermal management strategy for a continuous background video segmentation model on a device featuring a high-end NPU. The model requires 1.5 TOPS to process 30 FPS.
question: 'Which thermal strategy better sustains continuous 30 FPS segmentation: burst-and-sleep or minimum-clock continuous execution?'
details:
  realistic_solution: "The 'burst-and-sleep' (race-to-sleep) strategy is vastly superior for this architecture. Running continuously at the lowest possible clock frequency incurs continuous static leakage power from keeping the NPU logic gates and the large LPDDR5X memory controllers active. By batching frames and executing them at peak clock, the workload finishes rapidly, allowing the NPU and memory subsystem to power collapse into deep sleep for the majority of the duty cycle. This drastically minimizes the average power draw, avoiding thermal saturation and preventing thermal throttling."
  common_mistake: |
    **The Pitfall:** Assuming that running continuously at the lowest possible clock frequency is the most thermally efficient design.
    **The Rationale:** Engineers ignore the static leakage power of keeping the NPU logic gates and the massive memory controller continuously active.
    **The Consequence:** The constant static power drain eventually saturates the passive cooling envelope, causing the entire heterogeneous complex to overheat and throttle.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU peak throughput: 45 TOPS INT8.
       - Model requirement: 1.5 TOPS for 30 FPS.
       - Continuous active power: ~1.5W (active + static leakage).
       - Deep sleep power: ~0.05W.
       - Burst batch size: 15 frames (500ms window).
    2. **Calculations:**
       - Time to process 15 frames at 45 TOPS: 16.6ms.
       - Sleep time in 500ms window: 500ms - 16.6ms = 483.4ms.
       - Energy in burst: 1.5W * 0.0166s = 0.0249 J (24.9 mJ).
       - Energy in sleep: 0.05W * 0.4834s = 0.02417 J (24.17 mJ).
       - Total energy per 500ms: 49.07 mJ.
       - Average power draw: 49.07 mJ / 0.5s = 98.14 mW.
    3. **Conclusion & Interpretation:**
       - **Result: Static Power-Bound.** The burst-and-sleep strategy achieves a >10x reduction in average power consumption (~98 mW vs 1.5W), successfully bypassing the thermal throttling limit.
