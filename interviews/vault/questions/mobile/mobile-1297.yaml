title: Continuous Vision Thermal Throttling Strategy
scenario: You are designing the thermal management strategy for a continuous background video segmentation model on a device featuring the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The NPU has a peak throughput of 45 TOPS INT8, and your model requires 1.5 TOPS to process 30 FPS.
question: Which Snapdragon thermal strategy better sustains continuous 30 FPS segmentation: burst-and-sleep or minimum-clock continuous execution?
details:
  realistic_solution: Strategy A (burst and sleep) is superior for this architecture. By utilizing a race-to-sleep approach, the system takes advantage of the massive 45 TOPS peak capability to finish the workload rapidly. Buffering frames allows the NPU and memory subsystem to power collapse into deep sleep for the vast majority of the duty cycle, drastically reducing average power and preventing thermal throttling.
  common_mistake: |
    **The Pitfall:** Assuming that running continuously at the lowest possible clock frequency is the most thermally efficient design.
    **The Rationale:** Engineers ignore the static leakage power of keeping the NPU logic gates and the massive LPDDR5X memory controller continuously active.
    **The Consequence:** The constant static power drain eventually saturates the passive cooling envelope, causing the entire heterogeneous complex to overheat and throttle.
  napkin_math: |
    - **Continuous Active Power:** 1.5 TOPS draws ~1.5W continuously (active + static leakage).
    - **Burst Execution:** Batching 15 frames (500ms).
    - **Burst Time:** 15 frames processed at full 45 TOPS takes ~16.6ms. Sleep time = 483.4ms.
    - **Burst Power Calculation:** `((1.5W * 16.6ms) + (0.05W sleep * 483.4ms)) / 500ms`.
    - **Average Power:** (24.9mJ + 24.17mJ) / 500ms = 49.07mJ / 0.5s = **~98 mW**.
    - **Conclusion:** The >10x reduction in average power consumption easily prevents thermal throttling.
