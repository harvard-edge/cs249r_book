title: Continuous Video Analytics Thermal Throttling Design
scenario: You are tasked with specifying the requirements for a continuous video analytics pipeline. The feature needs to process 30 frames per second in real-time. The device NPU shares its thermal envelope and memory pool with the CPU, GPU, and ISP. Given that the camera ISP and display will be active concurrently, design a system specification that ensures sustained performance without triggering thermal throttling over a 1-hour session.
question: How would you design continuous video analytics to maintain sustained performance under thermal throttling?
details:
  realistic_solution: 'The specification must define a sustained TOPS budget rather than relying on peak TOPS. It should require dynamic model scaling (e.g., falling back to a lower-resolution or higher-sparsity model) triggered by SoC temperature thresholds. Additionally, the design must cap the NPU''s memory bandwidth allocation to prevent heating up the shared LPDDR5X memory controller, utilizing on-chip SRAM for intermediate activations as much as possible.'
  common_mistake: |
    **The Pitfall:** Sizing models based on peak TOPS instead of sustained thermal limits.
    **The Rationale:** Candidates forget that mobile chassis cannot dissipate peak heat continuously, and high memory bandwidth utilization generates massive heat.
    **The Consequence:** Devices severely overheat and aggressively throttle, dropping frames and ruining the user experience.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target = 30 FPS sustained for 1 hour.
    - Peak NPU = 34.7 TOPS.
    - Active ISP/CPU limits NPU to a 35% sustained thermal envelope (12.1 TOPS).

    **Calculations:**
    - Per-Frame Sustained Budget = 12.1 TOPS / 30 FPS = 0.403 TOPS/frame.
    - Example: A 0.5 TOPS/frame model requires 15 TOPS, exceeding sustained budget by 2.9 TOPS/s.

    **Conclusion & Interpretation:**
    - **Result: <0.403 TOPS/frame cap (Thermally-bound sustained performance)**. The specification must strictly cap the model to avoid breaching the continuous thermal envelope.
