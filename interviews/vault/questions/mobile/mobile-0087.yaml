title: The Zero-Copy Imperative
scenario: You're building a real-time video effects application that applies an ML-based filter to the camera's live feed. Despite having a fast NPU (5ms inference time), you observe 100ms end-to-end latency.
question: How do memory copies affect a real-time mobile video pipeline, and what zero-copy design should replace them?
details:
  realistic_solution: Memory copies across the pipeline introduce latency and system overhead. A zero-copy architecture maps external buffers directly across the Camera, NPU, and Display.
  common_mistake: |
    **The Pitfall:** Suggesting faster memory or ignoring the OS overhead.
    **The Rationale:** Candidates underestimate the sheer CPU cost and framework queuing latency triggered by physically moving 8MB frames across memory boundaries.
    **The Consequence:** Developers will try to optimize the 5ms NPU model instead of fixing the pipeline architecture, completely failing to resolve the 100ms end-to-end latency.
  napkin_math: |
    1. Calculate frame size: 1080p RGBA frame = 1920 * 1080 * 4 bytes = 8.3MB.
    2. Calculate copy time: At 30 GB/s mobile RAM bandwidth, 8.3MB / 30 GB/s = 0.27ms per copy.
    3. Estimate copies: Pipeline involves Camera -> RAM -> NPU -> RAM -> GPU -> Display, equating to 4 memory copies.
    4. Calculate raw copy latency: 4 * 0.27ms = 1.08ms.
    5. Account for system overhead: OS framework overheads (vsync, queuing) compound these copies, adding 16-33ms and dominating the 5ms NPU time.
