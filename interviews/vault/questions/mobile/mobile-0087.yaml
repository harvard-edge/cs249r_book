title: The Zero-Copy Imperative
scenario: You're building a real-time video effects application that applies an ML-based filter to the
  camera's live feed. Despite having a very fast NPU (5ms inference time), you observe significant end-to-end
  latency from camera capture to screen display (e.g., 100ms). You suspect memory copies are a major bottleneck.
  Describe how memory copies introduce latency and power overhead in this pipeline, and propose a 'zero-copy'
  architecture for Android/iOS.
details:
  realistic_solution: "**How memory copies introduce overhead:**\n  A typical camera pipeline without\
    \ zero-copy involves multiple stages, each requiring a memory copy:\n  1.  **Camera to CPU:** The\
    \ camera hardware captures a frame into a buffer, which is then copied to CPU-visible RAM.\n  2. \
    \ **CPU Preprocessing:** If any CPU-based preprocessing is done, it might involve another copy or\
    \ operate on the CPU-owned buffer.\n  3.  **CPU to NPU/GPU:** The preprocessed frame must be copied\
    \ from CPU RAM to the NPU's or GPU's input buffer.\n  4.  **NPU/GPU to CPU:** After inference, the\
    \ output (e.g., segmentation mask) might be copied back to CPU RAM for post-processing.\n  5.  **CPU\
    \ to Display:** The final frame (original + effect) is copied to a display buffer for rendering.\n\
    \  Each copy operation consumes CPU cycles, memory bandwidth, and power. For a 1080p frame (approx\
    \ 33.2MB for 32-bit float RGBA), even a fast memory controller takes over 3 milliseconds per copy.\
    \ Multiple copies add up, consuming ~10 milliseconds and significant energy."
  common_mistake: '"Just use faster memory." While faster memory helps, the act of *copying* data itself
    is the primary issue, consuming CPU cycles and memory bandwidth.'
  napkin_math: '1080p RGBA frame = 1920 * 1080 * 4 bytes = 8.3MB. Mobile RAM bandwidth = 30 GB/s. Memory
    copy time = 8.3MB / 30 GB/s = 0.27ms. Pipeline: Camera -> RAM -> NPU -> RAM -> GPU -> Display. 4 memory
    copies = 4 * 0.27ms = 1.08ms. But OS framework overheads (vsync, queuing) add 16-33ms. Pipeline overhead
    dominates the 5ms NPU.'
