title: 'MLOps Lifecycle: Compare Federated Learning vs. Centralized Training for Mobile'
scenario: A keyboard prediction model (5M params, INT8, Snapdragon 8 Gen 3) is trained
  for personalization. Compare federated learning (train on 100M devices, send gradients)
  vs. centralized training (aggregate anonymized data centrally, train on cloud H100).
  Quantify gradient upload bandwidth, privacy implications, and model accuracy tradeoffs.
question: How would you quantify gradient upload bandwidth, privacy implications,
  and model accuracy tradeoffs?
details:
  realistic_solution: 'FL: gradient upload per round: 5M params × 4 bytes = 20MB per
    device per round. 100M devices × 20MB = 2PB per round. With compression (Top-K
    1%): 200KB per device. 100M × 200KB = 20TB per round. 10 rounds: 200TB. Centralized:
    1TB anonymized n-grams uploaded = $90 CDN. Accuracy: centralized often 3-8% better
    perplexity due to full data access. FL wins on privacy but loses on accuracy and
    has massive coordination overhead.'
  common_mistake: Assuming federated learning is always more private; in practice,
    gradient uploads can leak private information, and the accuracy gap vs. centralized
    training is often 5-15% for language tasks.
  napkin_math: 'FL gradient size: 5M × 4B = 20MB uncompressed. Compressed (1% Top-K):
    200KB. 100M devices: 100M × 200KB = 20TB per round. At $0.09/GB: $1,800/round.
    10 rounds: $18,000. Plus device battery cost: 20KB/s upload × 100M devices = 2TB/s
    total. Centralized: collect 1B text samples × 100 bytes avg = 100GB → train on
    H100 $1,000. Centralized: 18× cheaper, better accuracy.'
