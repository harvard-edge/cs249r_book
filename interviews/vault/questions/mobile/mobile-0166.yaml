title: The TinyML Tensor Arena Squeeze
scenario: 'You''re building a low-power keyword spotting feature for a smart wearable that connects to
  a mobile phone. The device uses an MCU with limited SRAM and TensorFlow Lite for Micro. Your INT8 model
  has a simplified structure:'
details:
  realistic_solution: The Tensor Arena's peak memory usage occurs during the execution of the operation
    that requires the largest combined size of input and output tensors. We must calculate this for each
    operation and find the maximum.
  common_mistake: The most common mistake is to sum the sizes of all activation tensors (e.g., Input +
    Output1 + Output2). This is incorrect because the tensor arena reuses memory; not all tensors need
    to be alive simultaneously. Another error is to only account for the largest single tensor, forgetting
    that during an operation, both its input and output tensors must coexist in memory.
  napkin_math: 'INT8 = 1 byte/element. For each op, sum input+output tensor sizes. Example: Op1 input
    1×32×32×3=3072B, output 1×16×16×8=2048B, total=5120B. Op2 input=2048B, output 1×8×8×16=1024B, total=3072B.
    Op3 input=1024B, output 1×64=64B, total=1088B. Arena = max(5120, 3072, 1088) = 5120B = 5KB. On wearable
    MCU w/ 64KB SRAM, this uses ~8%.'
  options:
  - 2 KB (Size of largest single tensor)
  - 3 KB (Peak input + output size)
  - 4 KB (Sum of all listed tensors)
  - 1 KB (Size of largest output tensor)
  correct_index: 1
