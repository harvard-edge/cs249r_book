title: The TinyML Tensor Arena Squeeze
scenario: |
  You're building a low-power keyword spotting feature for a smart wearable that connects to a mobile phone. The device uses an MCU with limited SRAM and TensorFlow Lite for Micro. Your INT8 model has a simplified structure:
  - Op1: input 1x32x32x3, output 1x16x16x8
  - Op2: input 1x16x16x8, output 1x8x8x16
  - Op3: input 1x8x8x16, output 1x64
question: What peak tensor arena size is required for the listed INT8 TinyML model when memory is reused across operations?
details:
  realistic_solution: The Tensor Arena's peak memory usage occurs during the execution of the operation that requires the largest combined size of input and output tensors. We must calculate this for each operation and find the maximum.
  common_mistake: |
    **The Pitfall:** Summing the sizes of all activation tensors instead of finding the maximum combined input/output size per operation.
    **The Rationale:** Candidates forget that the tensor arena reuses memory, meaning not all tensors need to be alive simultaneously.
    **The Consequence:** The required memory footprint is vastly overestimated, potentially leading to discarding a model that would actually fit on the MCU.
  napkin_math: |
    1. INT8 = 1 byte/element. For each op, sum input+output tensor sizes.
    2. Op1: input (1x32x32x3) = 3072B, output (1x16x16x8) = 2048B, total = 5120B.
    3. Op2: input = 2048B, output (1x8x8x16) = 1024B, total = 3072B.
    4. Op3: input = 1024B, output (1x64) = 64B, total = 1088B.
    5. Peak memory is the maximum of these totals.
    6. **Arena size: max(5120, 3072, 1088) = 5120B (5 KB).**
  options:
  - 3 KB (Size of largest single tensor)
  - 5 KB (Peak input + output size)
  - 6 KB (Sum of all listed tensors)
  - 2 KB (Size of largest output tensor)
  correct_index: 1
