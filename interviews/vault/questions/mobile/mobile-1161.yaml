title: Diagnosing High Latency in Feature-Distilled Models
scenario: You deployed a compact student model trained via feature distillation from a large LLM. Despite low total operations, inference latency is high and the memory bandwidth is saturated.
question: What architectural trait inherited from feature distillation causes memory bandwidth saturation on a mobile NPU?
details:
  realistic_solution: Feature distillation requires the student to map its intermediate
    activations to the teacher's wide channel dimensions or embedding sizes. This
    results in a student architecture with wide, memory-heavy layers, significantly
    lowering the arithmetic intensity. On the Tensor G3, repeatedly fetching these
    massive activation tensors from the LPDDR5X RAM starves the TPU of data, shifting
    the bottleneck from the 7.5 TOPS compute engine to memory bandwidth.
  common_mistake: |
    **The Pitfall:** Overlooking how feature distillation alters the student's tensor shapes.
    **The Rationale:** Candidates focus on reduced parameter count but ignore that matching teacher embeddings forces excessively wide hidden layers.
    **The Consequence:** Deploying a student model with abysmal arithmetic intensity that starves the NPU and throttles device memory bandwidth.
  napkin_math: |
    - **Wide Distilled Layer Traffic:** Fetch 4MB input + 1MB weights + write 4MB output = 9MB total memory traffic.
    - **Compute Performed:** Assume 9 MegaOps (MOPs).
    - **Arithmetic Intensity:** 9 MOPs / 9 MB = 1 OP/byte.
    - **Bandwidth Bound Throughput:** 50 GB/s * 1 OP/byte = 50 GOPS.
    - **Result:** The NPU achieves only **50 GOPS (0.66%)** of its 7.5 TOPS capacity.
