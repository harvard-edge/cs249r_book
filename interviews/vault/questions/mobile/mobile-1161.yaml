title: Diagnosing High Latency in Feature-Distilled Models
scenario: You deployed a compact student model trained via feature distillation from a large LLM. Despite low total operations, inference latency is high and the memory bandwidth is saturated.
question: What architectural trait inherited from feature distillation causes memory bandwidth saturation on a mobile NPU?
details:
  realistic_solution: 'Feature distillation requires the student to map its intermediate activations to the teacher''s wide channel dimensions or embedding sizes. This results in a student architecture with wide, memory-heavy layers, significantly lowering the arithmetic intensity. On the Tensor G3, repeatedly fetching these massive activation tensors from the LPDDR5X RAM starves the TPU of data, shifting the bottleneck from the 7.5 TOPS compute engine to memory bandwidth.'
  common_mistake: |
    **The Pitfall:** Overlooking how feature distillation alters the student's tensor shapes.
    **The Rationale:** Candidates focus on reduced parameter count but ignore that matching teacher embeddings forces excessively wide hidden layers with poor arithmetic intensity.
    **The Consequence:** Deploying a student model that starves the NPU and throttles device memory bandwidth, causing severe latency regressions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU Memory Bandwidth: 50 GB/s.
       - NPU Peak Compute: 7.5 TOPS.
       - Student layer dimensions: Matched to teacher's wide embeddings.
    2. **Calculations:**
       - Layer Traffic: 4MB input + 1MB weights + 4MB output = 9MB traffic.
       - Layer Compute: ~9 MegaOps (MOPs).
       - Arithmetic Intensity (AI): 9 MOPs / 9 MB = 1 OP/byte.
       - Max Bandwidth-Bound Throughput: 50 GB/s * 1 OP/byte = 50 GOPS.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound. Feature distillation forces wide layers with low AI (1 OP/byte), capping NPU utilization at 50 GOPS (0.66% of 7.5 TOPS).**
