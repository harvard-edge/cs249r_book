title: Diagnosing High Latency in Feature-Distilled Models
scenario: You deployed a compact student model, trained via feature distillation from
  an on-device LLM (Gemini Nano), onto the Google Tensor G3 to run on its TPU. Although
  the student model's total operations are low and should easily be handled by the
  TPU's 7.5 TOPS capacity, inference latency is unexpectedly high and the device rapidly
  overheats. Profiling reveals that the 12 GB LPDDR5X memory bandwidth is completely
  saturated. What architectural trait inherited from feature distillation caused this
  hardware bottleneck?
question: What architectural trait inherited from feature distillation caused this
  hardware bottleneck?
details:
  realistic_solution: Feature distillation requires the student to map its intermediate
    activations to the teacher's wide channel dimensions or embedding sizes. This
    results in a student architecture with wide, memory-heavy layers, significantly
    lowering the arithmetic intensity. On the Tensor G3, repeatedly fetching these
    massive activation tensors from the LPDDR5X RAM starves the TPU of data, shifting
    the bottleneck from the 7.5 TOPS compute engine to memory bandwidth.
  common_mistake: Candidates often assume the TPU itself is too slow, that quantization
    failed, or focus on logit matching temperatures. They frequently overlook how
    forcing a student to match a teacher's intermediate feature representations physically
    alters the student's tensor shapes.
  napkin_math: 'Consider a wide distilled layer: fetching a 4MB input activation and
    1MB of weights, then writing a 4MB output requires 9MB of memory traffic. If this
    layer only performs 9 MOPs, the arithmetic intensity is 1 OP/byte. Assuming the
    12 GB LPDDR5X provides roughly 50 GB/s of bandwidth, the maximum compute throughput
    achievable is 50 GB/s * 1 OP/byte = 50 GOPS. This is merely 0.66% of the Tensor
    G3 TPU''s theoretical 7.5 TOPS (7500 GOPS), demonstrating a severe memory-bound
    state.'
