title: Architecting On-Device CI/CD for Exynos 2400 NPU
scenario: Your team is building a real-time computational photography pipeline that runs continuously on a mobile NPU. Researchers are rapidly producing new model iterations, but frequent deployment regressions occur because offline validation in PyTorch does not match the quantized INT8 on-device performance.
question: "How should a CI/CD pipeline validate quantized on-device latency, accuracy, and shared-memory limits?"
details:
  realistic_solution: 'Introduce a Hardware-in-the-Loop (HITL) CI runner pool using physical devices. The MLOps pipeline automatically compiles the model, quantizes it, and deploys it to the device farm to validate exact memory and TOPS limits against active ISP streams.'
  common_mistake: |
    **The Pitfall:** Relying solely on software emulators or x86 ONNX runtime checks in CI.
    **The Rationale:** Cloud-native engineers assume standard ONNX behavior accurately reflects hardware, ignoring NPU compiler behavior, quantization drops, and system-wide memory contention.
    **The Consequence:** Models that pass CI perfectly will crash or stutter severely in production.
  napkin_math: |
    1. **Assumptions & Constraints:** NPU offers 34.7 TOPS. Targeting 30 FPS, limit is 34.7 / 30 = 1.15 Tera-Ops/frame. At 30% realistic utilization, reject models > 345 GOPS/frame.
    2. **Calculations:** Compute Gate: 34.7 / 30 * 0.3 = 345 GOPS/frame. Memory Gate: Enforce a <3 GB limit.
    3. **Conclusion & Interpretation:** The CI must firmly **gate on compute (345 GOPS) and memory (3 GB)** on physical hardware. **Result: Compute-Bound**.
