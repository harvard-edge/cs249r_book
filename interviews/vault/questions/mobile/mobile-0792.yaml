title: The INT8 KV Cache Penalty
scenario: 'To fit a 4B model in 4GB of mobile RAM, you quantize the KV cache from FP16 to INT8, successfully saving ~600MB. However, you observe that decode latency increases from 35ms per token to 55ms per token, and overall NPU utilization drops from 80% to 50%.'
question: 'Why does quantizing the KV cache to INT8 save memory but increase decode latency and lower NPU utilization?'
details:
  realistic_solution: 'The latency increase is caused by the lack of native INT8-to-FP16 mixed-precision attention support on the mobile NPU. To perform attention, the engine inserts an explicit dequantization kernel that reads INT8, casts to FP16, and writes to an intermediate SRAM/DRAM buffer before attention can run. This extra kernel launch and memory round-trip stalls the NPU.'
  common_mistake: |
    **The Pitfall:** Assuming INT8 memory fetches are inherently slower than FP16 fetches.
    **The Rationale:** Candidates notice the latency increase and falsely deduce it takes the hardware longer to process INT8 data paths.
    **The Consequence:** Misdiagnosing the root cause, leading to wasted time investigating hardware bus speeds rather than fixing the software kernel pipeline.
  napkin_math: |
    1. **INT8 Savings:** 4B model, 36 layers, 8 KV heads, dim 128, 8192 context. INT8 KV cache = 2 × 8 × 128 × 8192 × 36 × 1 byte ≈ 604 MB (saving ~600 MB vs FP16).
    2. **Dequant Overhead:** At 1000-token decode step, INT8 read = 2 MB per layer. Write back intermediate FP16 = 4 MB. Total 6 MB traffic per layer.
    3. **Bandwidth Time:** 6 MB / 30 GB/s = 0.2 ms per layer. Across 36 layers = 7.2 ms.
    4. **Kernel Launch:** Overhead ~0.2 ms per extra dequant kernel × 36 layers = 7.2 ms.
    5. **Total Penalty:** 7.2 ms + 7.2 ms = **14.4 ms penalty per token**, explaining the jump from 35ms to 55ms.
