title: The INT8 KV Cache Penalty
scenario: To fit a 4B parameter model in 4GB of mobile RAM, you quantize the KV cache from FP16 to INT8, saving ~600MB. However, you observe decode latency increases from 35ms to 55ms per token, and overall NPU utilization drops significantly.
question: Why does quantizing the KV cache to INT8 save memory but increase decode latency and lower hardware utilization?
details:
  realistic_solution: |
    The latency regression stems from missing native silicon support for INT8-to-FP16 mixed-precision attention. The NPU framework must inject an explicit dequantization kernel that reads INT8, casts to FP16, and writes to an intermediate SRAM/DRAM buffer before attention executes, massively stalling the pipeline.
  common_mistake: |
    **The Pitfall:** Assuming fetching 1 byte (INT8) is inherently faster than 2 bytes (FP16) without analyzing kernel execution graphs.
    **The Rationale:** Calculating theoretical memory bandwidth improvements while completely ignoring ALU casting overhead and intermediate buffer thrashing.
    **The Consequence:** Misdiagnosing the latency spike as a hardware bus issue instead of fixing the software kernel's dequantization pipeline.
  napkin_math: |
    1. **Assumptions & Constraints:** 36 layers. INT8 saves 600 MB. Bandwidth = 30 GB/s. Extra traffic per layer = 2 MB read + 4 MB write = 6 MB.
    2. **Calculations:** Bandwidth delay = 6 MB / 30 GB/s = 0.2 ms per layer. Kernel overhead = 0.2 ms per layer. Total penalty = (0.2 + 0.2) * 36 = 14.4 ms.
    3. **Conclusion & Interpretation:** **Result: Compute/I-O-Bound**. The dequantization kernel overhead completely eclipses the memory footprint savings, adding ~15ms to the TPOT.
