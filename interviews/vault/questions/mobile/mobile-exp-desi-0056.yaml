title: On-Device LLM Degradation Ladder for Tensor G3
scenario: You are designing an on-device live translation feature using Gemini Nano for a flagship phone
  powered by the Google Tensor G3. The device has 12 GB of LPDDR5X memory and an on-device TPU capable
  of 7.5 TOPS. Architect a graceful degradation ladder for when the system is under severe memory pressure
  from other heavy foreground applications or when the TPU is thermally throttled. How do you ensure the
  translation service remains fail-operational without degrading the overall OS experience?
details:
  realistic_solution: 'A robust architecture uses a multi-tiered degradation ladder. Tier 1 (Ideal): Gemini
    Nano on TPU for maximum quality. Tier 2 (Thermal throttle): Reduce context window or generation length
    to lower TPU utilization and heat. Tier 3 (Memory pressure): Proactively unload the large LLM and
    fallback to a lightweight, dedicated INT8 translation model (e.g., ~150MB) running on the CPU. Tier
    4 (Extreme constraint): Fallback to a cloud API if network is available, or degrade to an asynchronous
    translation queue.'
  common_mistake: Candidates often propose a simple binary fallback (either full TPU LLM or cloud API)
    without considering intermediate on-device states. They also frequently ignore the latency and power
    cost of moving a multi-gigabyte model in and out of memory during sudden memory pressure events.
  napkin_math: If Gemini Nano requires ~2.5 GB of the 12 GB LPDDR5X memory, heavy foreground usage (e.g.,
    9 GB) leaves only 0.5 GB free, risking OOM kills. The system must swap to the 150 MB fallback model.
    Performance-wise, if the TPU's 7.5 TOPS yields 20 tokens/sec normally, severe thermal throttling might
    drop capacity to 2.5 TOPS (~6 tokens/sec), pushing user-perceived latency well beyond the 200ms real-time
    threshold and triggering the fallback condition.
