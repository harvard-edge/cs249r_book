title: Optimizing Mixed-Precision Inference on Exynos 2400 NPU for Mobile CV
scenario: Your team is deploying a large-scale computer vision model (e.g., object detection or semantic
  segmentation) to a mobile application powered by the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X).
  Initial profiling shows that while the FP32 model achieves target accuracy, inference latency is too
  high, and memory footprint exceeds the practical limits for a smooth user experience. You've identified
  that the NPU's FP16/BF16 capabilities are underutilized, but simply converting the entire model to FP16
  causes a noticeable drop in accuracy, especially for sensitive layers. How would you diagnose the bottlenecks
  and quantify the potential gains from mixed-precision optimization, considering the NPU's specific architecture?
question: "How would you diagnose the bottlenecks and quantify the potential gains from mixed-precision optimization, considering the NPU's specific architecture?"
details:
  realistic_solution: 'The candidate should propose a systematic approach. First, analyze the model layer-by-layer
    for sensitivity to lower precision. Techniques include: 1) Quantization-Aware Training (QAT) or Post-Training
    Quantization (PTQ), specifically targeting FP16/BF16. 2) Employing mixed-precision recipes, where
    critical layers for accuracy are identified and kept in higher precision (e.g., FP32 or BF16), while
    less sensitive layers are converted to FP16. This requires iterative experimentation and profiling.
    3) Implementing dynamic or static loss scaling during fine-tuning to prevent underflow of gradients
    in FP16 layers. 4) Leveraging hardware-aware optimization by utilizing the Exynos 2400 NPU''s specific
    FP16/BF16 acceleration capabilities and profiling tools to identify actual throughput and latency
    gains per layer. 5) Rigorously benchmarking different mixed-precision configurations on the target
    hardware to find the optimal balance between accuracy, latency, and memory consumption.'
  common_mistake: A common mistake is a naive blanket conversion of the entire model to FP16 without understanding
    the impact on numerical stability or the NPU's specific capabilities. This often leads to immediate
    accuracy degradation without proper analysis of critical layers, the use of quantization-aware training
    (QAT), or appropriate loss scaling strategies during (re-)training/fine-tuning.
  napkin_math: If an FP32 model with 100M parameters uses 400MB (100M * 4 bytes/param) and takes 200ms
    for inference, converting 70% of its parameters to FP16 could reduce memory for those parameters by
    half. This would reduce the total model parameter memory to (0.3 * 400MB) + (0.7 * 200MB) = 120MB
    + 140MB = 260MB, a 35% reduction. Given the Exynos 2400 NPU's 34.7 TOPS (INT8), assume its FP16 peak
    is also significantly higher than FP32. If FP16 operations can achieve, say, 2x the effective throughput
    of FP32 for certain layers, and 60% of the compute is on these layers, then overall inference time
    could be reduced by ~30-40% (e.g., (0.4 * 200ms) + (0.6 * 200ms / 2) = 80ms + 60ms = 140ms). The candidate
    should be able to calculate memory savings and estimate FLOPs reduction or acceleration for specific
    layers when transitioning from FP32 to FP16/BF16, relating it to the NPU's theoretical TOPS.
