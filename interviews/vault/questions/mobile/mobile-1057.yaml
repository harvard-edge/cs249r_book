title: 'Mobile Transformer Cost Optimization: Quantization + Speculative for Mobile
  LLM'
scenario: 'A Snapdragon 8 Gen 3 (16GB, 77GB/s) mobile app runs Llama-3-7B INT4 (3.5GB,
  45.5ms/tok) for chat. P99 = 4.55s for 100 tokens — over 3s SLO. Evaluate two optimizations:
  (1) switch to INT2 quantization (1.75GB, estimated 2-4% quality loss), (2) apply
  speculative decoding with a 1B INT4 draft (0.5GB) accepting α=0.75 of 4 draft tokens.
  Which achieves P99 < 3s with minimum quality loss?'
question: Which achieves P99 < 3s with minimum quality loss?
details:
  realistic_solution: 'INT2: 1.75GB/77=22.75ms/tok. 100 toks: 2.275s < 3s ✓. Quality
    loss: 2-4% estimated. Speculative: draft 4 tokens: 4*(0.5GB/77)=26ms. Verify 7B
    INT4: 1*(3.5GB/77)=45.5ms. Total per round: 71.5ms. Expected tokens accepted per
    round: k*α=4*0.75=3. Plus 1 token (always accept first failed verification or
    final accepted): ~3.2 tokens per round. Effective ms/token: 71.5/3.2=22.3ms. 100
    toks: 2.23s < 3s ✓. Quality: no loss (same 7B model for verification). Recommendation:
    speculative decoding (22.3ms/tok, 0% quality loss) beats INT2 (22.75ms/tok, 2-4%
    loss). Spec decoding needs 0.5GB more RAM (1B draft): 3.5+0.5=4.0GB total. Fits
    in 12GB available.'
  common_mistake: Not checking that INT2 requires specialized kernels (not universally
    available on mobile) and that speculative decoding with α=0.75 may not achieve
    the expected speedup if the draft model has low acceptance rate on conversational
    data.
  napkin_math: 'INT2: 3.5*0.5=1.75GB. 1.75/77=22.75ms/tok. 100 tok: 2.275s ✓. Quality:
    -2-4%. Spec decoding: draft 1B INT4 per step: 4*(0.5/77)=26ms. Verify 7B: 3.5/77=45.5ms.
    Total: 71.5ms per round. Avg accepted: 3.2 toks. Effective: 71.5/3.2=22.3ms/tok.
    100 toks: 2.23s ✓. Quality: identical (7B verifies). Memory: 3.5+0.5+KV=4.2GB.
    Fits. Winner: speculative decoding (2.23s < 2.275s AND 0% quality loss vs 2-4%
    INT2). Plus: spec decoding has no accuracy tradeoff. Downside: more complex implementation,
    requires 1B draft model tuned to match 7B outputs (otherwise α<0.75 kills speedup).'
