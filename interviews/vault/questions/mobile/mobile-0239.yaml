title: The INT8 Memory Diet
scenario: You're optimizing a visual search model for a mobile e-commerce app. The model has 150 million
  parameters and currently uses FP16 precision for its weights. To reduce the app's memory footprint,
  you plan to quantize the weights to INT8. Calculate the memory savings in megabytes (MB) for the model's
  weights.
details:
  realistic_solution: The calculation is a direct comparison of the memory required for each data type.
    FP16 (half-precision float) uses 2 bytes per parameter, while INT8 (8-bit integer) uses 1 byte per
    parameter. The saving is the difference between the two.
  common_mistake: The most common mistake is to confuse FP16 with FP32. Engineers accustomed to server-side
    training often default to thinking in 4-byte floats, which would lead to an incorrect initial memory
    calculation and an inflated savings estimate.
  napkin_math: 1. **FP16 (2 bytes):** 150M params * 2 bytes = 300 MB
  options:
  - 450 MB
  - 300 MB
  - 150 MB
  - 75 MB
  correct_index: 2
