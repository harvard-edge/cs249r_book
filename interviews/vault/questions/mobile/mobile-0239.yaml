title: The INT8 Memory Diet
scenario: You are optimizing a visual search model for a mobile app. The model has 150 million parameters and uses FP16 precision. You plan to quantize the weights to INT8.
question: What is the memory savings in megabytes (MB) for the model's weights?
details:
  realistic_solution: |
    FP16 utilizes 2 bytes per parameter, while INT8 uses 1 byte per parameter. Applying Post-Training Quantization (PTQ) to INT8 reduces the model footprint by half, yielding a savings equal to the difference in size.
  common_mistake: |
    **The Pitfall:** Confusing FP16 with FP32 and miscalculating the original size.
    **The Rationale:** Engineers accustomed to server-side training default to 4-byte floats, leading to an inflated savings estimate.
    **The Consequence:** Memory budgeting for the app will be incorrect, potentially leading to OOM errors or wasted optimization effort.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 150M parameters.
    - Original precision: FP16 (2 bytes/parameter).
    - Target precision: INT8 (1 byte/parameter).

    **Calculations:**
    - Original FP16 memory: 150M params * 2 bytes/param = 300 MB.
    - Quantized INT8 memory: 150M params * 1 byte/param = 150 MB.
    - Savings: 300 MB - 150 MB = 150 MB.

    **Conclusion & Interpretation:**
    - **Result: 150 MB (Memory Capacity)**. Quantizing to INT8 reduces the memory footprint by 150 MB.
  options:
  - 450 MB
  - 300 MB
  - 150 MB
  - 75 MB
