title: Encoder-Decoder Memory Bandwidth Advantage
scenario: You are evaluating two 2B-parameter models for an on-device translation feature targeting the
  Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The options are a 2B-parameter decoder-only model and an
  encoder-decoder model (1B encoder, 1B decoder). Profiling reveals that the encoder-decoder model generates
  tokens significantly faster during the decoding phase. Given the NPU's 45 TOPS INT8 compute capacity
  and the shared 12-16 GB LPDDR5X memory architecture, explain why this performance discrepancy occurs.
question: "Why does a 1B/1B encoder-decoder translation model decode faster than a 2B decoder-only model on Hexagon NPU?"
details:
  realistic_solution: Autoregressive generation at batch size 1 is heavily memory-bandwidth bound, meaning
    the NPU's compute units spend most of their time waiting for weights from memory. The decoding speed
    is gated by how fast weights can be read from the shared LPDDR5X RAM. Since the encoder-decoder model
    only evaluates its 1B decoder parameters during generation, it transfers half the data per token compared
    to loading the full 2B weights of the decoder-only model, resulting in much faster token generation.
  common_mistake: Candidates often assume that total parameter count dictates decoding latency, expecting
    both 2B models to perform equally. They fail to recognize that during the autoregressive phase, an
    encoder-decoder model only loads the decoder's weights, drastically reducing memory bandwidth requirements
    compared to a decoder-only model of the same total size.
  napkin_math: 'Assume the shared LPDDR5X memory provides a realistic bandwidth of roughly 64 GB/s, and
    both models use INT8 quantization (1 byte/parameter). For the 2B decoder-only model, generating one
    token requires loading 2 GB of weights: 2 GB / 64 GB/s = 31.25 ms per token (max ~32 tokens/sec).
    For the 1B/1B encoder-decoder model, the decoding step only loads 1 GB of decoder weights: 1 GB /
    64 GB/s = 15.6 ms per token (max ~64 tokens/sec). With the NPU offering 45 TOPS (45,000 GOPs) and
    each token requiring only ~2-4 GOPs of compute, the math clearly shows the system is entirely bottlenecked
    by memory bandwidth, directly favoring the smaller active parameter count of the decoder.'
