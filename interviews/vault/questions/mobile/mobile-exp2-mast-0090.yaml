title: On-Device Shadow Rollout for A17 Pro Video Segmentation
scenario: You are rolling out a next-generation video background segmentation model to iOS users, replacing
  a legacy system. To validate quality without risking user experience, you must design an on-device shadow
  deployment architecture for the Apple A17 Pro Neural Engine. The A17 Pro features 35 TOPS, a ~5W power
  envelope, and 8 GB of shared unified memory. Synthesize a deployment strategy that executes both the
  live and shadow models concurrently on a subset of users, compares their outputs, and aggregates telemetry
  without causing frame drops or thermal throttling.
question: "How would you design an A17 Pro shadow rollout for video segmentation without frame drops or thermal throttling?"
details:
  realistic_solution: The optimal architecture decouples the shadow model into a background, lower-priority
    queue. The legacy model remains in the synchronous critical path to guarantee the 33ms frame budget
    at 30 FPS. The shadow model processes frames asynchronously only when thermal states are nominal and
    memory pressure is low. Instead of uploading raw tensors, the system computes a lightweight intersection-over-union
    (IoU) metric between the live and shadow masks on-device, uploading only the aggregated metrics and
    extreme edge-case frames during unmetered Wi-Fi connections.
  common_mistake: Candidates often suggest running the shadow model synchronously in the critical camera
    pipeline, which risks latency spikes and frame drops. They also frequently overlook the memory bandwidth
    impact of running two models on the unified 8 GB memory architecture, or propose uploading full uncompressed
    shadow outputs to the cloud, destroying the user's data cap and battery.
  napkin_math: The A17 Pro ANE yields 35 TOPS at ~5W, or ~7 TOPS/W. Assuming the legacy model requires
    0.8 TOPS and the new model 1.2 TOPS, running both requires 2.0 TOPS total. This utilizes ~5.7% of
    the 16-core ANE capacity. The estimated power draw is 2.0 TOPS / 7 TOPS/W = ~0.28W, which adds ~5.6%
    to the 5W thermal envelope. At 30 FPS, the compute budget is 33ms/frame; with 35 TOPS peak, the ANE
    can theoretically process ~1.16 INT8 Tera-Operations per 33ms window. Our 2.0 TOPS combined load requires
    ~0.066 Tera-Operations per frame, easily fitting within the 1.16 limit, provided we do not bottleneck
    the shared 8 GB unified memory with excessive intermediate tensor swapping.
