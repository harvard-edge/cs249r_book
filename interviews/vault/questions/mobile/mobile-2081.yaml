title: Pipelining Autoregressive Token Generation on Snapdragon NPU
scenario: An on-device LLM on a mobile NPU processes tokens autoregressively. Generating the next token requires reading 20MB of weights from RAM, taking 1.0ms, followed by 0.5ms of computation.
question: What is the maximum token generation rate if weight loading and compute are perfectly pipelined?
details:
  realistic_solution: |
    In a perfectly pipelined system, execution overlaps seamlessly. The steady-state throughput is constrained strictly by the longest individual pipeline stage, not the algebraic sum of all stages.
  common_mistake: |
    **The Pitfall:** Summing pipeline stage latencies (1.0ms + 0.5ms = 1.5ms) to determine throughput.
    **The Rationale:** Failing to understand that overlapped execution hides the latency of the shorter stage completely during steady-state operation.
    **The Consequence:** Falsely calculating 666 tokens/sec, leading to severe underutilization of the hardware architecture.
  napkin_math: |
    1. **Assumptions & Constraints:** Weight load stage = 1.0 ms. Compute stage = 0.5 ms. Perfect overlap via pipelining.
    2. **Calculations:** Max stage duration = max(1.0 ms, 0.5 ms) = 1.0 ms. Throughput = 1000 ms / 1.0 ms/token = 1000 tokens/sec.
    3. **Conclusion & Interpretation:** **Result: Memory-Bandwidth-Bound**. Pipelining masks the compute, yielding exactly 1000 tokens/sec.
