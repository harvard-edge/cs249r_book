title: Pipelining Autoregressive Token Generation on Snapdragon NPU
scenario: 'An on-device LLM on the Snapdragon 8 Gen 3 processes tokens autoregressively. Generating the next token requires reading 20MB of weights from RAM (taking 1.0ms) and 0.5ms of compute.'
question: 'Calculate the maximum token generation rate if weight loading and compute can be perfectly overlapped via pipelining.'
details:
  realistic_solution: 'In a perfectly pipelined system, the steady-state throughput is bounded strictly by the longest individual pipeline stage, not the sum of stages.'
  common_mistake: |
    **The Pitfall:** Summing the pipeline stage times instead of identifying the bottleneck stage.
    **The Rationale:** Candidates fail to understand that perfectly overlapped execution hides the latency of the shorter stage completely in steady-state operation.
    **The Consequence:** Calculating 666 tokens/sec instead of 1000 tokens/sec, leading to severe underutilization of hardware expectations.
  napkin_math: |
    1. **Identify Bottleneck:** Weight load = 1.0 ms. Compute = 0.5 ms. Max stage = 1.0 ms.
    2. **Calculate Throughput:** 1000 ms / 1.0 ms per token = **1000 tokens/sec**.
