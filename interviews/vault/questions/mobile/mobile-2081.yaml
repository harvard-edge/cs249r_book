title: Pipelining Autoregressive Token Generation on Snapdragon NPU
scenario: An on-device LLM on the Snapdragon 8 Gen 3 processes tokens autoregressively.
  Generating the next token requires reading 20MB of weights from RAM (taking 1ms)
  and 0.5ms of compute.
question: Calculate the maximum token generation rate if weight loading and compute
  can be perfectly overlapped via pipelining.
details:
  realistic_solution: In a perfectly pipelined system, the throughput is bounded by
    the longest individual stage. Here, weight loading takes 1.0 ms and compute takes
    0.5 ms. The bottleneck is the 1.0 ms memory read. Thus, the system can output
    1 token every 1.0 ms, yielding 1000 tokens per second.
  common_mistake: Summing the times to 1.5ms and calculating 666 tokens per second,
    misunderstanding steady-state pipelined throughput.
  napkin_math: 1000ms / max(1.0ms, 0.5ms) = 1000 tokens/sec.
