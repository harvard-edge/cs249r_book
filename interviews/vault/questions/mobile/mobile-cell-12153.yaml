title: 'Network Bandwidth Bottlenecks: Optimize Mobile Camera Pipeline Memory Bandwidth'
scenario: 'A mobile camera app on A17 Pro (68 GB/s) runs YOLOv8-n (3.2M INT8, 4.2 GOPs) + portrait segmentation
  (MobileNetV3-S, 2.5M INT8, 2.4 GOPs) in the live viewfinder at 30fps. Measured total memory bandwidth:
  15GB/s. Target: reduce to < 8GB/s while maintaining 30fps. Profile components and quantify optimizations.'
question: "What memory bandwidth components explain the 15GB/s camera pipeline load, and which optimizations reduce it below 8GB/s?"
details:
  realistic_solution: 'BW breakdown: Camera ISP (1080p 30fps YUV420): 1080×1920×1.5×30=93MB/s=0.09GB/s.
    YOLO-n inference (3.2MB INT8, 30fps): 3.2MB×30=96MB/s=0.096GB/s. Segmentation: 2.5MB×30=75MB/s=0.075GB/s.
    Total model BW: 0.27GB/s. Measured 15GB/s >> 0.27GB/s. Root cause: activation tensors. YOLO at 640×640×3:
    intermediate features at 640×640×64=25MB per layer. Reducing input resolution from 640→320: 1/4 activation
    memory. 4× reduction in activation BW: 15GB/s×0.75=11.25GB/s saving. New: 3.75GB/s + models: 4.02GB/s
    < 8GB/s ✓.'
  common_mistake: Trying to quantize further (already INT8) without first checking if camera buffer copies
    between memory regions are causing unnecessary bandwidth usage.
  napkin_math: 'Model weights: 0.27GB/s (trivial). Activations dominate. At 640×640 input: each conv layer
    feature map = 640×640×C bytes. Total activation writes per inference: YOLO-n at 640² input: ~100MB
    activations per forward. 30fps: 3GB/s activation BW. Segmentation similar: 2GB/s. Total: ~5.3GB/s
    activations. Remaining 9.7GB/s: duplicate copies, Metal buffer copies between layers, non-contiguous
    memory. Fix: in-place operations, unified memory (zero-copy between ISP and ML). Achievable: 4-6GB/s
    total.'
