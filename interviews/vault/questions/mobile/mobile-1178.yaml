title: Adversarial Randomized Smoothing Latency on A17 Pro
scenario: You are deploying a sensitive document detection model on an iPhone using the Apple A17 Pro Neural Engine (35 TOPS, ~5W). To defend against adversarial patch attacks, you implement a randomized smoothing technique that runs inference 10 times on randomly augmented variations of each input frame. The base model requires 700 GOPS per inference.
question: What robust FPS and energy per prediction result from 10-pass randomized smoothing on A17 Pro?
details:
  realistic_solution: The candidate should calculate the total operations for a single robust prediction by multiplying the base model operations by the number of smoothing iterations. They then use the peak throughput of the A17 Pro to determine the robust FPS. Finally, dividing the total power draw by the FPS yields the energy consumed per prediction.
  common_mistake: |
    **The Pitfall:** Forgetting the inference multiplier of ensemble techniques.
    **The Rationale:** Candidates calculate operations based on a single pass, or miscalculate GOPS to TOPS unit conversions.
    **The Consequence:** The system underperforms throughput expectations by a factor of 10x, and drains significantly more energy per robust prediction than estimated.
  napkin_math: |
    1. Base model operations: 700 GOPS = 0.7 TOPS.
    2. Operations per robust prediction: 10 passes * 0.7 TOPS = 7.0 TOPS.
    3. Theoretical Max Robust FPS: 35 TOPS / 7 TOPS = 5 FPS.
    4. Energy Calculation: 5W (Joules/sec) / 5 FPS = **1 Joule per robust prediction.**
