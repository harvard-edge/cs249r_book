title: The Topology-Oblivious Optimization
scenario: Your team is training a massive 500B parameter Mixture-of-Experts (MoE) foundation model that
  will eventually be distilled for a next-generation mobile assistant. The training cluster consists of
  multi-node servers, with 8 H100s per node connected by NVLink. Nodes are connected via an InfiniBand
  NDR fabric.
details:
  realistic_solution: The optimization was 'topology-oblivious' and fundamentally misunderstood the datacenter
    hardware hierarchy. It forced all intra-node communication, which should have been on the ultra-fast
    900 GB/s NVLink bus, to instead take a much slower path out through the PCIe bus to the 50 GB/s InfiniBand
    Host Channel Adapter (HCA) and back.
  common_mistake: The InfiniBand drivers must be misconfigured, or there's too much network congestion
    on the fabric. This blames the network hardware or configuration, failing to recognize that the critical
    error is in the communication *path selection* logic which is forcing traffic onto the wrong interconnect
    for the task.
  napkin_math: 'Intra-node transfer of 32GB on H100: H100s are connected via NVLink at 900 GB/s bidirectional
    bandwidth. Transferring 32GB between two GPUs takes 32GB / 900 GB/s = 35.5 milliseconds. If forced
    over PCIe Gen4 (32 GB/s), it would take 1.0 seconds! NVLink accelerates this All-to-All by 28x.'
