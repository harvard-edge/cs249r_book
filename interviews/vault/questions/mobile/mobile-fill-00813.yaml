title: 'Snapdragon 8 Gen 3: Encoder-Decoder Architecture Tradeoffs for On-Device AI'
scenario: 'A company is developing an on-device AI assistant for a smartphone powered by the Snapdragon
  8 Gen 3 Hexagon NPU (45 TOPS INT8, 12-16 GB LPDDR5X). They are evaluating three architectural approaches
  for a core natural language processing task: an encoder-only model for sentiment analysis, a decoder-only
  model for conversational response generation, and an encoder-decoder model for on-device translation.
  Given the NPU''s specific capabilities, discuss the tradeoffs of each architecture in terms of inference
  latency, memory footprint, and power consumption for a typical mobile use case.'
details:
  realistic_solution: A realistic solution involves careful model quantization (leveraging the 45 TOPS
    INT8 capability), pruning, and distillation to fit within the LPDDR5X memory budget. For decoder-only
    models, optimizing KV cache management and employing techniques like speculative decoding or custom
    NPU operators for attention can reduce latency. Encoder-decoder models might require more aggressive
    optimization or partitioning between NPU and CPU/DSP to manage computational load and memory, with
    a strong focus on minimizing data movement.
  common_mistake: A common mistake is underestimating the latency impact of sequential token generation
    in decoder-only models compared to the parallel processing of encoder-only models, especially on an
    NPU optimized for throughput. Another oversight is neglecting the dynamic memory requirements for
    decoder caches (KV cache) which can quickly consume the limited LPDDR5X, alongside activation memory
    for all architectures.
  napkin_math: Consider a 3B parameter model. In FP16, it requires ~6GB; quantized to INT8, ~3GB. Both
    fit within 12-16 GB LPDDR5X. For a decoder-only model with a context window of 2048 tokens and 32
    attention heads, the KV cache (FP16) can consume ~1GB across 32 layers for a single sequence, which
    is manageable. If a forward pass for a single token generation in an INT8 model requires roughly 25
    GOPs, the 45 TOPS (INT8) NPU could theoretically process 45,000 GOPs / 25 GOPs/token ≈ 1800 tokens/second.
    However, the sequential nature of decoding and memory access patterns will significantly reduce this
    practical throughput, leading to much lower actual tokens/second for complex models.
