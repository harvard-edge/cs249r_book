title: Transformer INT8 Outliers
scenario: Porting a transformer model to an Apple A17 Pro Neural Engine (~35 TOPS).
  You observe a severe BLEU score drop when transitioning from A16's FP16 execution
  to A17 using uniform INT8 weight-activation quantization.
question: Analyze the activation distributions to pinpoint the root cause of the accuracy
  degradation and propose a hardware-compatible mitigation.
details:
  realistic_solution: Transformer attention layers naturally produce extreme outliers
    in their activations. Uniform INT8 quantization clips these outliers or crushes
    small values, destroying crucial contextual embeddings. A mitigation is to use
    SmoothQuant, shifting the quantization difficulty from activations to the weights.
  common_mistake: Assuming the NPU hardware has a matrix multiplication bug or blindly
    applying per-tensor quantization without analyzing channel-wise variance.
  napkin_math: A 99.9th percentile outlier of 50 vs a mean of 0.1 causes a uniform
    step size of 50/127 = ~0.4, crushing all normal features to 0.
