title: Transformer INT8 Outliers
scenario: You are porting a transformer model to a mobile NPU. You observe a severe BLEU score drop when transitioning from FP16 execution to uniform INT8 weight-activation quantization.
question: Analyze the activation distributions to pinpoint the root cause of the accuracy degradation and propose a hardware-compatible mitigation.
details:
  realistic_solution: Transformer attention layers naturally produce extreme outliers in their activations. Uniform INT8 quantization clips these outliers or crushes small values, destroying crucial contextual embeddings. A mitigation is to use SmoothQuant, shifting the quantization difficulty from activations to the weights.
  common_mistake: |
    **The Pitfall:** Assuming the NPU hardware has a matrix multiplication bug or blindly applying per-tensor quantization.
    **The Rationale:** Candidates fail to realize that LLM attention mechanisms inherently produce massive activation outliers that don't map to INT8 distributions.
    **The Consequence:** Engineering time is wasted debugging the NPU compiler instead of addressing the precision loss mathematically.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Transformer FP16 to INT8 quantization. Normal activation features cluster around ~0.1.
       - Outlier max magnitude: ~50. Uniform 8-bit quantization range: 127.
    2. **Calculations:**
       - Step size calculation based on outlier max: 50 / 127 = ~0.393 per bit.
       - Resolving a normal feature: 0.1 / 0.393 = ~0.25 (rounds to 0).
    3. **Conclusion & Interpretation:**
       - **Result: Precision-Bound.** Uniform per-tensor quantization destroys crucial contextual embeddings by scaling them to 0, validating that smooth quantization mechanisms are required.
