title: The Sluggish Car AI
scenario: You are an ML Systems Engineer for an automotive company, working on a voice assistant in a
  car's infotainment system. The hardware is a Snapdragon 8 Gen 3-class SoC (45 TOPS INT8, 77 GB/s memory
  bandwidth). Users complain the assistant feels 'laggy' and the UI stutters when it's invoked. Your profiler
  shows the initial prompt processing (prefill) for your 3B parameter INT8 LLM takes a shocking **195ms**,
  blocking the UI thread which has a 16ms render budget. You calculate that with 45 TOPS of compute, the
  prefill for an average prompt should be trivial, under 10ms. What is the most likely cause for this
  massive discrepancy and the resulting UI jank?
details:
  realistic_solution: The correct diagnosis is that the prefill phase is **memory-bandwidth bound**. Prefill
    has low arithmetic intensity; it must read all 3 billion weights (3 GB) from DRAM to compute the prompt's
    initial key-value cache. The theoretical time to read 3GB over a 77 GB/s bus is `3 / 77 ≈ 39ms`. The
    observed 195ms indicates this memory access is the primary bottleneck, with additional overheads from
    the OS and data movement. This single, monolithic 195ms operation completely blocks the UI thread,
    causing it to miss its 16ms render deadline over 12 times, resulting in severe stutter (jank). The
    issue isn't the NPU's compute power, but its access to memory.
  common_mistake: Engineers often assume that if `TOPS` are high, the system should be fast. They fixate
    on compute and forget that large models still have a massive memory footprint. The initial prefill
    phase is often memory-bandwidth bound as the model weights are read from slow DRAM, not compute-bound.
  napkin_math: 1. **Model Size:** 3 Billion parameters at INT8 precision is 3 GB of weights.
  options:
  - The NPU's 45 TOPS of compute is insufficient for a 3B model, requiring a smaller model.
  - The KV-cache is too large; implementing Multi-Query Attention would solve the latency.
  - The prefill step is memory-bandwidth bound; the 195ms blocking call to read weights from DRAM stalls
    the UI thread.
  - The Android OS scheduler is de-prioritizing the inference thread, causing context-switching delays.
  correct_index: 2
