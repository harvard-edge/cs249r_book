title: Shadow Deployment LMK Evictions on Tensor G3
scenario: We initiated a shadow deployment for a new Gemini Nano-powered smart reply feature targeting Google Tensor G3 devices. The model runs silently in the background, computing responses using the on-device TPU to compare against the existing cloud API without showing results to the user. Shortly after the rollout began, telemetry showed a massive spike in the host app being forcefully closed by the Android Low Memory Killer (LMK).
question: Given the Tensor G3 features 12 GB of LPDDR5X RAM and a 7.5 TOPS TPU, what hardware-level interaction is causing this shadow deployment to fail?
details:
  realistic_solution: The candidate must recognize that shadow deployments require running both the existing cloud architecture and the new on-device model simultaneously, which severely impacts the memory budget. Although the Tensor G3 has 12 GB of LPDDR5X RAM, this is unified system memory heavily utilized by the OS and background services. Loading the Gemini Nano weights and its execution context into memory on top of the legacy app's footprint pushes the process over the Android per-app memory safety threshold. The correct action is to halt the shadow rollout and switch to a fractional A/B traffic split, ensuring only one system executes per device.
  common_mistake: |
    **The Pitfall:** Assuming high TPU compute capacity guarantees successful background execution.
    **The Rationale:** Candidates focus on the 7.5 TOPS rating and assume thermal throttling or CPU starvation, failing to calculate the cumulative memory footprint of running both legacy and new models concurrently.
    **The Consequence:** Deploying an architecture that instantly pushes the app over the Android per-app memory safety threshold, triggering catastrophic LMK evictions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total System RAM: 12.0 GB.
    - OS + Background Baseline: ~8.0 GB (leaves ~4.0 GB available).
    - Host App + Cloud API Buffers: 1.0 GB.

    **Calculations:**
    - Gemini Nano Footprint: 1.8 GB (INT4 weights) + 0.5 GB (KV cache/context) = 2.3 GB.
    - Total Concurrent Memory: 1.0 GB + 2.3 GB = 3.3 GB.

    **Conclusion & Interpretation:**
    - **Result: 3.3 GB footprint (Memory-Bound)**. The concurrent models consume over 80% of available RAM, triggering the Android Low Memory Killer (LMK).
