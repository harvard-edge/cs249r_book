title: Energy Modeling for On-Device INT8 Convolution on Snapdragon Hexagon NPU
scenario: You are optimizing a critical INT8 convolution layer for deployment on the Snapdragon 8 Gen 3 Hexagon NPU. The specific layer involves a 3x3 kernel applied to a 64x64x128 feature map to produce 256 output channels.
question: How would you model INT8 convolution energy on Snapdragon Hexagon NPU across compute and memory access?
details:
  realistic_solution: A realistic solution would involve creating an energy model that differentiates between on-chip compute energy and off-chip memory access energy. This requires analyzing the memory access patterns (e.g., number of bytes read/written to LPDDR5X for weights, activations, and intermediate results) and the number of INT8 MAC operations. Techniques like data reuse (e.g., tiling, loop unrolling), operator fusion, and efficient data quantization strategies are then applied to minimize energy-expensive memory transfers, ensuring the model is 'memory-bound' rather than 'compute-bound' or, ideally, balances both effectively to leverage the NPU's capabilities.
  common_mistake: |
    **The Pitfall:** Focusing purely on theoretical compute operations (TOPS) and ignoring memory access energy.
    **The Rationale:** Candidates treat compute as the primary energy sink, failing to apply Horowitz's principles regarding off-chip memory access.
    **The Consequence:** The resulting energy model drastically underestimates total power consumption.
  napkin_math: |
    * Compute Energy = N_MAC × E_MAC (e.g., 0.1 pJ/op).
    * Memory Energy = N_MemAccess × E_MemAccess (e.g., 100 pJ/byte).
    * Total Energy ≈ (N_MAC × E_MAC) + (N_MemAccess × E_MemAccess).
    * **Because off-chip DRAM access is ~1000x more expensive than an INT8 MAC, the memory term dominates the total energy consumption.**
