title: Federated Learning Disconnection Resilience
scenario: A mobile processor runs federated learning updates. The WiFi connection drops mid-epoch. The phone must gracefully pause without losing the computed gradient accumulations.
question: Explain the state preservation strategy required to resume training immediately when connectivity is restored.
details:
  realistic_solution: The application must catch the network exception and immediately serialize the locally accumulated gradients and the current batch index to local NVMe storage. When WiFi returns, the app deserializes these artifacts and resumes.
  common_mistake: |
    **The Pitfall:** Relying purely on RAM.
    **The Rationale:** Developers forget that background tasks holding large tensors in memory get aggressively killed by the OS.
    **The Consequence:** Complete loss of computed gradient accumulations due to an OS OOM kill.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Training interrupted mid-epoch due to network loss.
       - State must be saved locally.
    2. **Calculations:**
       - Resume index = Total batches - completed batches.
    3. **Conclusion & Interpretation:**
       - **Result: Resume index. Storage-Bound.** System gracefully resumes without recalculation.
