title: Federated Learning Disconnection Resilience
scenario: A Snapdragon 8 Gen 3 runs federated learning updates. The WiFi connection
  drops mid-epoch. The phone must gracefully pause without losing the computed gradient
  accumulations.
question: Explain the state preservation strategy required to resume training immediately
  when connectivity is restored.
visual:
  kind: svg
  path: mobile-1913.svg
  alt: Timeline showing training interrupted by network loss, state dumped to disk,
    and resumed later.
  caption: Disconnect and Resume Timeline
details:
  realistic_solution: The application must catch the network exception and immediately
    serialize the locally accumulated gradients and the current batch index to local
    NVMe storage. When WiFi returns, the app deserializes these artifacts, reloads
    the model weights into the NPU, and continues the backward pass loop from the
    exact saved batch index, rather than dropping the epoch.
  common_mistake: Relying purely on RAM and risking an OS OOM kill while waiting for
    the network, instead of flushing state to persistent local storage.
  napkin_math: Resume index = Total batches - completed batches
