title: Quantifying Adversarial Attack Impact on Mobile NPU Inference Latency
scenario: "You are deploying a critical image classification model on a Samsung Exynos 2400 NPU for a real-time mobile application. A security audit identified PGD adversarial vulnerabilities. You decide to implement adversarial training. Baseline latency is 5ms, and the new graph complexity increases by 15%."
question: "How would you estimate the latency increase from adversarial training on a Samsung Exynos 2400 MobileNetV3 model?"
details:
  realistic_solution: 'A realistic approach involves a multi-faceted strategy: 1. **Quantify Operational Overheads:** Precisely measure or estimate the additional MAC operations and memory accesses introduced by the adversarial training modifications. 2. **NPU Profiling/Modeling:** Utilize NPU profiling tools (if available on the Samsung Exynos 2400) to understand the actual execution time components (compute vs. memory). If tools are limited, create a simplified performance model that accounts for the NPU''s effective throughput for the specific layer types in the model and the memory bandwidth of LPDDR5X. 3. **Latency Calculation Formula:** Develop a formula incorporating the increased operational count, the NPU''s effective processing rate, and potential memory access stalls. For instance, `Latency_adv = Latency_base + (ΔOperations / NPU_Effective_OPS_per_ms) + ΔMemory_Access_Time`. This provides a more accurate quantitative prediction than a simple percentage increase.'
  common_mistake: |
    **The Pitfall:** Assuming a purely linear relationship between FLOPs and latency.
    **The Rationale:** Candidates fail to consider NPU-specific bottlenecks like memory bandwidth, quantization effects, or the overhead of specific defense mechanisms.
    **The Consequence:** Inaccurate latency predictions that cause missed real-time deadlines.
  napkin_math: |
    - Baseline inference latency `L_base` = `5ms`.
    - Complexity increase `%C_increase` = `15% = 0.15`.
    - Estimated new latency `L_adversarial = L_base * (1 + %C_increase)`.
    - `L_adversarial = 5ms * 1.15 = 5.75ms`.
    - **Conclusion:** The expected increase in inference latency is `5.75ms - 5ms =` **0.75ms**.
