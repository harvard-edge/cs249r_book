title: Architecting Latency Profiling on Snapdragon 8 Gen 3 NPU
scenario: You are designing an on-device inference profiling architecture for a real-time video processing model running on the Qualcomm Hexagon NPU. The pipeline must continuously monitor latency across the heterogeneous subsystems without introducing more than 2% overhead on the shared LPDDR5X memory bandwidth.
question: How should a Snapdragon 8 Gen 3 profiler identify compute versus memory bottlenecks with under 2% bandwidth overhead?
details:
  realistic_solution: A robust design leverages Qualcomm Hexagon SDK trace tools and hardware performance counters to capture cycle counts with minimal overhead. The architecture buffers telemetry in a pre-allocated lightweight ring buffer and asynchronously flushes it to disk during idle frames, ensuring profiling doesn't steal critical bandwidth from the NPU during active inference.
  common_mistake: |
    **The Pitfall:** Proposing standard OS-level profilers or high-frequency polling.
    **The Rationale:** These standard tools often fail to capture NPU-specific queues and can thrash the shared memory.
    **The Consequence:** This exacerbates the very memory bottlenecks they are attempting to measure, invalidating the profiling data.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Memory bandwidth budget: ~64 GB/s.
       - Overhead limit: 2%.
       - Trace data volume: 64 bytes per layer.
       - Model: 100 layers running at 60 FPS.
    2. **Calculations:**
       - 2% overhead limit: 64 GB/s x 0.02 = 1.28 GB/s.
       - Trace data rate: 64 bytes x 100 layers x 60 frames = 384,000 bytes/s = ~384 KB/s.
    3. **Conclusion & Interpretation:**
       - **Result: 384 KB/s < 1.28 GB/s** (Memory-Bandwidth-Bound).
