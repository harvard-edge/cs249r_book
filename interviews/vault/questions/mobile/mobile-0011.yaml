title: The App Store Privacy Rejection
scenario: 'You submit your iOS app to the App Store. It uses an on-device CoreML model for face-based
  age estimation to apply age-appropriate content filters. Apple rejects it with: ''Guideline 5.1.2 —
  Data Use and Sharing: Your app collects face data without adequate purpose string.'' The model runs
  entirely on-device and you never send face data to a server. Why was it rejected, and what do you need
  to change?'
details:
  realistic_solution: 'Apple treats face geometry as biometric data regardless of processing location.
    Fix: (1) add NSFaceIDUsageDescription with a clear purpose string, (2) update the Privacy Nutrition
    Label to declare biometric data, (3) add a runtime consent dialog before first camera access. Prevention:
    35 minutes. Cost of rejection: 3-5 days lost per review cycle. On-device processing does not exempt
    you from Apple''s privacy framework for sensitive categories including face, health, and biometric
    data.'
  common_mistake: '"We don''t collect face data — the model runs on-device, so there''s no privacy issue."
    Apple''s privacy framework doesn''t distinguish between on-device processing and server-side collection
    for certain sensitive data categories. Face geometry is treated as biometric data regardless of where
    it''s processed.'
  napkin_math: 'App Store review cycle: ~24-48 hours per submission. Rejection → fix → resubmit: 3-5 days
    lost. If you''re on a launch deadline, this is catastrophic. Prevention: Apple''s App Review team
    publishes a pre-submission checklist. The privacy nutrition label takes 30 minutes to fill out correctly.
    The `NSCameraUsageDescription` string takes 5 minutes. Total prevention cost: **35 minutes**. Cost
    of getting it wrong: **3-5 days** + potential PR damage if users see "rejected by Apple" in tech press.'
  options:
  - 'Apple treats face geometry as biometric data regardless of processing location. Fix: (1) add NSFaceIDUsageDescription
    with a clear purpose string, (2) update the Privacy Nutrition Label to declare biometric data, (3)
    add a runtime consent dialog before first camera access. Prevention: 35 minutes.'
  - We don't collect face data — the model runs on-device, so there's no privacy issue.. Apple's privacy
    framework doesn't distinguish between on-device processing and server-side collection for certain
    sensitive data categories.
  - The bottleneck is in the software framework, not the hardware; switching to a lower-level API will
    achieve near-theoretical-peak performance.
  - Deploy the update to all devices simultaneously to minimize the total rollout duration and reduce
    the window of version inconsistency.
