title: 'MLOps Lifecycle: Size Model Registry Storage for Mobile Segment Variants'
scenario: A mobile ML team maintains separate model variants for 4 device tiers (flagship A17 Pro, mid-range Snapdragon 765, budget Tensor G3, legacy iOS A12). Each tier has 3 active model versions retained. Models range from 10MB (budget) to 50MB (flagship).
question: How much registry storage and monthly S3 cost are needed for the four mobile model tiers and retained versions?
details:
  realistic_solution: 'Flagship (A17 Pro): 3 × 50MB = 150MB. Mid-range: 3 × 30MB = 90MB. Budget: 3 × 10MB = 30MB. Legacy: 3 × 8MB = 24MB. Total: 294MB. S3 cost: $0.023 × 0.294GB = $0.007/month. Evaluation artifacts (benchmark results, 1MB each): 4 × 3 × 1MB = 12MB. Metadata: negligible. Total registry: ~310MB. S3 monthly: < $0.01. CDN transfer at deploy (100M users): see bandwidth calculation.'
  common_mistake: |
    **The Pitfall:** Computing storage size based on generic maximums without actual per-tier sizes, and ignoring auxiliary files.
    **The Rationale:** Candidates often simplify the calculation by multiplying the largest model size across all tiers.
    **The Consequence:** Inaccurate storage and cost estimates that fail to account for evaluation artifacts and metadata.
  napkin_math: |
    1. Registry: 4 tiers * 3 versions = 12 artifacts.
    2. Sizes: (3 * 50) + (3 * 30) + (3 * 10) + (3 * 8) = 150 + 90 + 30 + 24 = 294MB.
    3. S3 Cost: 0.294GB * $0.023/GB = $0.007/month.
    4. **Conclusion:** Storage is trivially cheap (< $0.01/mo). **The real cost driver is CDN transfer at deployment.**
