title: 'MLOps Lifecycle: Size Model Registry Storage for Mobile Segment Variants'
scenario: A mobile ML team maintains separate model variants for 4 device tiers. Each tier has 3 active model versions retained. Models range from 10MB to 50MB.
question: How much registry storage and monthly S3 cost are needed for the four mobile model tiers and retained versions?
details:
  realistic_solution: |
    Calculate storage for all variants: Flagship (3x50MB=150MB), Mid (3x30MB=90MB), Budget (3x10MB=30MB), Legacy (3x8MB=24MB). Total registry storage is ~294MB. S3 cost at $0.023/GB is negligible (<$0.01/month). Include auxiliary artifacts (benchmark results, golden tests). The true TCO driver is the CDN egress cost for millions of users during deployment, not S3 registry storage.
  common_mistake: |
    **The Pitfall:** Computing storage size based on generic maximums without actual per-tier sizes, and ignoring auxiliary files.
    **The Rationale:** Candidates often simplify the calculation by multiplying the largest model size across all tiers, focusing on S3 storage instead of CDN egress.
    **The Consequence:** Inaccurate TCO estimates that fail to identify CDN bandwidth as the true cost driver.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4 tiers, 3 versions each = 12 artifacts
    - Sizes: 50MB, 30MB, 10MB, 8MB
    - S3 Cost: $0.023/GB

    **Calculations:**
    - Total Size: (3 * 50) + (3 * 30) + (3 * 10) + (3 * 8) = 150 + 90 + 30 + 24 = 294 MB
    - Monthly Cost: 0.294 GB * $0.023 = $0.0067

    **Conclusion & Interpretation:**
    - **Result: <$0.01/month (Network Egress-Bound)**. Registry storage costs <$0.01/month, CDN is the true cost driver.
