title: Diagnosing Large Language Model Deployment on Snapdragon 8 Gen 3 Hexagon NPU
scenario: A 7B parameter LLM designed for cloud deployment in FP16 is targeted for a mobile application on a flagship edge device. Initial loading attempts trigger out-of-memory (OOM) errors.
question: How would you diagnose the potential reasons for the memory errors and outline a plan to determine if this model, or a derivative, can be successfully deployed on the specified hardware?
details:
  realistic_solution: |
    Deployment demands ruthless quantitative hardware profiling to determine structural viability. 
    1. **Mathematical Isolation:** Calculate base FP16 weight density and dynamic inference activations (e.g. attention KV blocks). The core FP16 layout inherently exceeds common mobile RAM ceilings before generation logic begins.
    2. **Quantization Mapping:** Assess W8A16 or strictly W4A16 Post-Training Quantization (PTQ) passes required to shoehorn the model. INT8 drops static footprints by 2x, bringing parameters into realistic execution ranges.
    3. **Compiler Tracing:** Extract OS overhead maps explicitly confirming how many Gigabytes are reserved safely for pure generation.
  common_mistake: |
    **The Pitfall:** Architecting hardware limits based purely on parameter dimensions, wildly ignoring precision scaling and execution footprints.
    **The Rationale:** Cloud ML engineers calculate theoretical compute topology exclusively, fundamentally underestimating edge OS application limits and KV memory overheads.
    **The Consequence:** Pushing multi-gigabyte models down to clients only to trigger catastrophic runtime OOM exceptions the millisecond a token is generated.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware Limit: ~12 GB physical LPDDR5X (usable OS payload much smaller, ~9 GB).
       - Baseline Weights: 7 Billion parameters configured natively in FP16.
       - Generation footprint: Intermediate KV activations require ~1 GB margin.
    2. **Calculations:**
       - FP16 Baseline: 7,000,000,000 * 2 bytes/param = 14 GB base static weights.
       - Execution Envelope: 14 GB weights + 1 GB KV cache = 15 GB (Immediate Hard OOM).
       - Re-mapped Quantization (INT8): 7,000,000,000 * 1 byte/param = 7 GB base weights.
       - Reduced Envelope: 7 GB weights + 1 GB KV cache = 8 GB total execution footprint.
    3. **Conclusion & Interpretation:**
       **Result: 15 GB required vs 12 GB available (Memory-Capacity-Bound).** FP16 mathematically ruptures absolute OS capacity limits; structural downcasting to INT8 is physically required to boot.
