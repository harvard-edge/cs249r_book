title: Tensor G3 LLM Memory Budgeting
scenario: We are deploying a 4 billion parameter LLM to a device powered by the Google
  Tensor G3, which features an on-device TPU and 12 GB of LPDDR5X memory. The Android
  system and background apps permanently consume 6 GB of RAM, and we require exactly
  2 GB of memory for the KV cache and activation buffers during sequence generation.
  Calculate the maximum standard quantization precision (in bits) we can use for the
  model weights to guarantee the model fits entirely within the remaining available
  RAM.
question: How would you calculate the maximum standard quantization precision (in
  bits) we can use for the model weights to guarantee the model fits entirely within
  the remaining available RAM?
details:
  realistic_solution: To determine the maximum precision, we first calculate the memory
    strictly available for the model weights by subtracting the system overhead and
    the runtime memory (KV cache) from the total memory. Then, we divide the available
    memory by the number of parameters to find the maximum bytes per parameter, converting
    this to bits. Finally, we select the highest standard quantization format (like
    4-bit, 8-bit, or 16-bit) that fits this budget.
  common_mistake: Candidates often forget to account for the memory required by the
    KV cache and activation buffers, assuming all non-OS RAM can be allocated to weights.
    They might also incorrectly convert between bytes and bits, or fail to recognize
    that the 12 GB LPDDR5X memory is shared unified memory rather than dedicated TPU
    VRAM.
  napkin_math: Total Memory = 12 GB. Available memory for weights = 12 GB (Total)
    - 6 GB (OS) - 2 GB (KV Cache/Activations) = 4 GB. Model size = 4 billion parameters.
    Maximum bytes per parameter = 4 GB / 4,000,000,000 = 1 byte per parameter. 1 byte
    = 8 bits. Therefore, the maximum standard quantization precision we can use is
    8-bit (e.g., INT8).
