title: On-Device Guardrail Compute and Memory Sizing
scenario: You are deploying an on-device content safety guardrail on an iPhone 15
  Pro to prevent toxic outputs, utilizing the Apple A17 Pro Neural Engine. The A17
  Pro features a 16-core Neural Engine delivering 35 TOPS at roughly 5W, sharing 8
  GB of unified memory with the CPU/GPU. The guardrail is a 500M parameter model in
  INT8 quantization that evaluates 128-token chunks from a main generation model.
  Calculate the static memory footprint of the guardrail weights and the theoretical
  minimum compute latency for one 128-token chunk, assuming 100% Neural Engine utilization.
question: How would you calculate the static memory footprint of the guardrail weights
  and the theoretical minimum compute latency for one 128-token chunk, assuming 100%
  Neural Engine utilization?
details:
  realistic_solution: The correct approach requires applying the standard transformer
    inference formula (Ops ≈ 2 * Params * Tokens) and mapping it to the provided hardware
    constraints. INT8 quantization simplifies the static memory footprint to exactly
    1 byte per parameter. To find the minimum theoretical latency, we divide the total
    operations by the Neural Engine's maximum throughput (35 TOPS).
  common_mistake: Candidates often forget that 1 MAC = 2 operations when using the
    2*P*T heuristic, or they miscalculate TOPS (Tera = 10^12) vs GOPs (Giga = 10^9),
    leading to latency off by orders of magnitude. They may also neglect to translate
    INT8 parameter counts directly to bytes (1 byte per parameter) or forget that
    unified memory means the footprint cuts directly into the shared 8 GB pool.
  napkin_math: '1. Memory footprint: 500,000,000 parameters * 1 byte/param (INT8)
    = 500 MB.

    2. Compute Ops: 2 * 500M params * 128 tokens = 128 Billion Operations (128 GOPs).

    3. Latency: 128 GOPs / 35 TOPS = 128 * 10^9 / (35 * 10^12) = 0.00365 seconds =
    3.66 ms.'
