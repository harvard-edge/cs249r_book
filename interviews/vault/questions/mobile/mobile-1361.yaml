title: On-Device Guardrail Compute and Memory Sizing
scenario: You are deploying an on-device content safety guardrail on an iPhone 15 Pro to prevent toxic outputs, utilizing the Apple A17 Pro Neural Engine. The A17 Pro features a 16-core Neural Engine delivering 35 TOPS at roughly 5W, sharing 8 GB of unified memory with the CPU/GPU. The guardrail is a 500M parameter model in INT8 quantization that evaluates 128-token chunks from a main generation model.
question: How would you calculate the static memory footprint of the guardrail weights and the theoretical minimum compute latency for one 128-token chunk, assuming 100% Neural Engine utilization?
details:
  realistic_solution: The correct approach requires applying the standard transformer inference formula (Ops ≈ 2 * Params * Tokens) and mapping it to the provided hardware constraints. INT8 quantization simplifies the static memory footprint to exactly 1 byte per parameter. To find the minimum theoretical latency, we divide the total operations by the Neural Engine's maximum throughput (35 TOPS).
  common_mistake: |
    **The Pitfall:** Forgetting the multiplier when converting parameters to operations, or miscalculating TOPS vs GOPs.
    **The Rationale:** Candidates often use P * T instead of 2 * P * T for MACs, and confuse Tera (10¹²) with Giga (10⁹).
    **The Consequence:** The resulting latency calculation is off by orders of magnitude, completely invalidating the feasibility assessment of the guardrail.
  napkin_math: |
    1. **Memory Footprint:** 500,000,000 parameters × 1 byte/param (INT8) = 500 MB.
    2. **Compute Ops:** 1 multiply-accumulate (MAC) = 2 operations. Total Ops = 2 × 500M params × 128 tokens = 128 Billion Operations (128 GOPs).
    3. **Peak Compute:** 35 TOPS = 35,000 GOPs per second.
    4. **Latency:** 128 GOPs / 35,000 GOPs/sec = 0.00365 seconds = 3.66 ms.
    **Result:** The guardrail consumes **500 MB of unified memory** and completes evaluation in a theoretical minimum of **3.66 ms**.
