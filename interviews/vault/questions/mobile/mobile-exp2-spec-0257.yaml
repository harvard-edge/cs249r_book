title: Continuous Video Analytics Thermal Throttling Design
scenario: You are tasked with specifying the requirements for a continuous video analytics pipeline running
  on the Samsung Exynos 2400 NPU. The feature needs to process 30 frames per second in real-time. The
  Exynos 2400 features a dual-core NPU capable of 34.7 TOPS, but it shares its thermal envelope and 12
  GB LPDDR5X memory pool with the CPU, GPU, and ISP. Given that the camera ISP and display will be active
  concurrently, design a system specification that ensures sustained performance without triggering thermal
  throttling over a 1-hour session.
details:
  realistic_solution: The specification must define a sustained TOPS budget rather than relying on peak
    TOPS. It should require dynamic model scaling (e.g., falling back to a lower-resolution or higher-sparsity
    model) triggered by SoC temperature thresholds. Additionally, the design must cap the NPU's memory
    bandwidth allocation to prevent heating up the shared LPDDR5X memory controller, utilizing on-chip
    SRAM for intermediate activations as much as possible.
  common_mistake: Candidates often size their models based on the peak 34.7 TOPS without accounting for
    the fact that sustained performance in a thermally constrained mobile chassis is much lower. They
    also frequently ignore the thermal impact of high memory bandwidth utilization on the shared 12 GB
    LPDDR5X pool when the ISP and CPU are active.
  napkin_math: Peak compute is 34.7 TOPS. In a sustained thermal scenario with active ISP/CPU, the NPU
    might be capped at roughly 35% of its peak, providing ~12.1 TOPS. At 30fps, this leaves an absolute
    maximum of 0.403 TOPs per frame (12.1 / 30). If a baseline model requires 0.5 TOPs/frame (15 TOPS
    total), it exceeds the sustained limit by 2.9 TOPS and will cause thermal throttling. The specification
    must strictly limit the model to < 0.4 TOPs/frame to maintain continuous operation.
