title: Exynos 2400 Shared Memory Architecture Recall
scenario: You are deploying a quantized object detection model to a new device powered by the Samsung Exynos 2400 NPU. The team needs to estimate the maximum feasible model size that can be loaded into memory without causing out-of-memory errors.
question: What is the specific memory architecture of the Samsung Exynos 2400, and how does its capacity affect the maximum feasible model size?
details:
  realistic_solution: The candidate should recall that the Samsung Exynos 2400 NPU operates on a unified memory architecture. It utilizes a shared pool of 12 GB LPDDR5X RAM, which is shared actively between the dual-core NPU, CPU, GPU, and ISP.
  common_mistake: |
    **The Pitfall:** Assuming mobile NPUs have dedicated VRAM similar to discrete desktop GPUs.
    **The Rationale:** Candidates transfer knowledge from server/desktop environments, failing to account for mobile SoC unified memory constraints where RAM is shared.
    **The Consequence:** Deploying a model that technically fits the total RAM size but immediately crashes the device because it starves the OS, ISP, or GPU.
  napkin_math: |
    1. **Total Shared Memory:** 12 GB LPDDR5X.
    2. **OS & Background Services:** Consumes ~5.5 GB.
    3. **GPU/ISP Pipelines:** Require ~2.5 GB.
    4. **Available for NPU:** 12 GB - 5.5 GB - 2.5 GB = **4.0 GB**. The model footprint must stay under this limit.
