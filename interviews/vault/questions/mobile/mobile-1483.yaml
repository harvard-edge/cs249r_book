title: Exynos 2400 Shared Memory Architecture Recall
scenario: You are deploying a quantized object detection model to a new device powered
  by the Samsung Exynos 2400 NPU. The team needs to estimate the maximum feasible
  model size that can be loaded into memory without causing out-of-memory errors.
  What is the specific memory architecture and total capacity of the Samsung Exynos
  2400, and how does it share this memory with other system components?
question: What is the specific memory architecture and total capacity of the Samsung
  Exynos 2400, and how does it share this memory with other system components?
details:
  realistic_solution: The candidate should recall that the Samsung Exynos 2400 NPU
    operates on a unified memory architecture. It utilizes a shared pool of 12 GB
    LPDDR5X RAM, which is shared actively between the dual-core NPU, CPU, GPU, and
    ISP.
  common_mistake: Candidates often assume mobile NPUs have dedicated VRAM similar
    to discrete desktop GPUs. They may also fail to recall that the system RAM must
    be actively shared with multiple high-bandwidth components simultaneously.
  napkin_math: Total Shared Memory = 12 GB LPDDR5X. If the Android OS and background
    services consume 5.5 GB, and the GPU/ISP require 2.5 GB for display and camera
    processing pipelines, the maximum theoretical available memory for the NPU = 12
    GB - 5.5 GB - 2.5 GB = 4.0 GB. A model's total memory footprint (weights + activations)
    must remain under this 4.0 GB limit to be feasible.
