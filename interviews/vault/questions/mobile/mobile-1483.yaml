title: Exynos 2400 Shared Memory Architecture Recall
scenario: You are deploying a quantized object detection model to a new device. The team needs to estimate the maximum feasible model size that can be loaded into memory without causing out-of-memory errors.
question: What is the specific memory architecture of the Samsung Exynos 2400, and how does its capacity affect the maximum feasible model size?
details:
  realistic_solution: The Samsung Exynos 2400 NPU operates on a unified memory architecture. It utilizes a shared pool of 12 GB LPDDR5X RAM, which is shared actively between the dual-core NPU, CPU, GPU, and ISP.
  common_mistake: |
    **The Pitfall:** Assuming mobile NPUs have dedicated VRAM similar to discrete desktop GPUs.
    **The Rationale:** Candidates transfer knowledge from server environments, failing to account for mobile SoC unified memory constraints where RAM is shared.
    **The Consequence:** Deploying a model that technically fits the total RAM size but immediately crashes the device because it starves the OS, ISP, or GPU.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total Shared Memory: 12 GB LPDDR5X.
       - OS & Background Services: ~5.5 GB.
       - GPU/ISP Pipelines: ~2.5 GB.
    2. **Calculations:**
       - Available for NPU = 12 GB - 5.5 GB - 2.5 GB = 4.0 GB
    3. **Conclusion & Interpretation:**
       - **Result: 4.0 GB. Memory-Capacity-Bound.** The model footprint must stay under this limit.
