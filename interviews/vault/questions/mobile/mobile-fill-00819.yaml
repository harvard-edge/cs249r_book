title: Mobile LLM Architecture Tradeoffs on Exynos 2400
scenario: Your team is developing a new AI assistant feature for a high-end smartphone, which requires
  understanding complex user queries and generating concise, contextually relevant responses. The target
  hardware is the Samsung Exynos 2400 NPU, featuring 34.7 TOPS of AI performance and 12 GB of LPDDR5X
  memory. You must select the optimal LLM architecture (encoder-only, decoder-only, or full encoder-decoder)
  to deploy, strictly adhering to mobile-specific constraints like low latency, minimal power consumption,
  and tight memory budgets. How would you justify your architectural choice, and what back-of-the-envelope
  calculations would you perform to validate its feasibility on the Exynos 2400?
details:
  realistic_solution: "A realistic solution involves a staged evaluation: \n1.  **Define Hard Constraints:**\
    \ Establish strict latency (e.g., <100ms for query understanding, <500ms for response generation)\
    \ and memory budgets (e.g., model weights + activations < 8-10 GB, leaving room for OS and other apps).\n\
    2.  **Task Decomposition:** For query understanding and concise generation, consider if an encoder-only\
    \ model can handle the 'understanding' part efficiently, and if generation can be handled by a much\
    \ smaller, specialized decoder or even a rule-based system for very short responses. \n3.  **Architectural\
    \ Candidates:**\n    *   **Encoder-Only (e.g., MobileBERT, distilled BERT variant):** Excellent for\
    \ understanding, classification, and feature extraction. Small footprint, fast inference. \n    *\
    \   **Decoder-Only (e.g., tiny Llama/Gemma variant):** Good for generation, but generation is sequential,\
    \ making latency sensitive to output length. Can be memory-intensive due to KV cache.\n    *   **Encoder-Decoder\
    \ (e.g., distilled T5, Pegasus):** More flexible for sequence-to-sequence tasks, but typically larger\
    \ and more complex than encoder-only. \n4.  **Optimization:** Aggressively apply quantization (INT8,\
    \ INT4 if possible), pruning, and distillation to reduce model size and computational demands. Target\
    \ models with parameter counts in the range of hundreds of millions to a few billion at most. \n5.\
    \  **Benchmarking & Simulation:** Prioritize models that demonstrate good performance-to-parameter\
    \ ratios. Use profiling tools and NPU-specific SDKs to estimate actual latency and power."
  common_mistake: A common mistake is to overlook the fundamental differences in resource utilization
    between encoder-only, decoder-only, and full encoder-decoder architectures, especially regarding sequential
    generation costs and memory for activations. Developers might attempt to deploy an overly large, general-purpose
    model without aggressive quantization or pruning, leading to unacceptable latency, out-of-memory errors,
    or excessive battery drain on mobile hardware. Neglecting memory bandwidth limitations, which often
    become the bottleneck before raw TOPS, is also a frequent oversight.
  napkin_math: "Given the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X):\n\n1.  **Memory Capacity\
    \ Check (Weights):**\n    *   A 7 billion parameter (7B) model:\n        *   FP32 (4 bytes/param):\
    \ 7B * 4 = 28 GB (Too large for 12 GB RAM).\n        *   FP16 (2 bytes/param): 7B * 2 = 14 GB (Too\
    \ large).\n        *   INT8 (1 byte/param): 7B * 1 = 7 GB (Feasible for weights, leaves ~5 GB for\
    \ activations, OS, etc.).\n    *   Conclusion: A 7B model would require INT8 quantization to fit weights\
    \ into memory. Larger models are out of scope.\n\n2.  **Inference Throughput (Rough TOPS):**\n   \
    \ *   Assume an optimized model requires 0.2-0.5 TFLOPS per inference step (e.g., per token generation\
    \ or for an encoder pass).\n    *   With 34.7 TOPS NPU:\n        *   Inference time = 0.2 TFLOPS /\
    \ 34.7 TOPS ≈ 0.0057 seconds (5.7 ms)\n        *   Inference time = 0.5 TFLOPS / 34.7 TOPS ≈ 0.0144\
    \ seconds (14.4 ms)\n    *   This is a theoretical lower bound for a single step. For a decoder generating\
    \ 50 tokens, this could easily become 5.7ms * 50 = 285ms, or 14.4ms * 50 = 720ms, which might be acceptable\
    \ for some generative tasks, but highlights the latency challenge for longer generations.\n\n3.  **Memory\
    \ Bandwidth (LPDDR5X):**\n    *   LPDDR5X typically offers bandwidth in the range of 50-80 GB/s. \n\
    \    *   If a model with 7GB weights needs to be loaded/accessed frequently, the bandwidth can become\
    \ a bottleneck. For example, reading 7GB takes 7GB / 70GB/s ≈ 0.1 seconds (100ms), which is significant\
    \ if not cached efficiently.\n\n4.  **Activations Memory (Decoder-Only):**\n    *   For sequence generation,\
    \ decoder-only models build a Key-Value (KV) cache. This cache can grow significantly with sequence\
    \ length and batch size. For a 7B model, the KV cache for a moderate sequence length (e.g., 512 tokens)\
    \ and batch size 1 can consume several GBs of memory (e.g., 2-4GB for FP16). In INT8, it would be\
    \ less but still substantial. This directly impacts the remaining memory for weights and the OS."
