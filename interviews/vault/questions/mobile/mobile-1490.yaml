title: Google Tensor G3 TPU Peak Performance Recall
scenario: When evaluating the Google Tensor G3 for deploying Gemini Nano, understanding the hardware's capabilities and thermal constraints is crucial. The device features 12 GB LPDDR5X memory to support the model's footprint.
question: For burst compute tasks before thermal throttling engages, what is the specified peak performance in TOPS for the Google Tensor G3's on-device TPU?
details:
  realistic_solution: The correct fact to retrieve is that the Google Tensor G3's on-device TPU is rated at 7.5 TOPS. Recognizing this peak specification is the first step in designing thermal management strategies, as sustained workloads will require operating below this peak to avoid aggressive thermal throttling.
  common_mistake: |
    **The Pitfall:** Confusing peak performance with sustained performance or confusing the TPU's rating with the combined SoC TOPS.
    **The Rationale:** Candidates assume the peak TOPS can be maintained indefinitely.
    **The Consequence:** They build a thermal management strategy that fails, resulting in severe thermal throttling and missed latency SLAs.
  napkin_math: |
    - Google Tensor G3 TPU Peak = 7.5 TOPS.
    - If 1 token requires 0.25 Tera-Operations, peak generation is 7.5 / 0.25 = 30 tokens/second.
    - **If thermal throttling reduces sustained performance to 50%, effective throughput drops to 15 tokens/second.**
