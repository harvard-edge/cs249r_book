title: The Mobile Jank Budget (mobile-0318)
scenario: You're developing a new real-time feature for a flagship smartphone app, like live translation
  overlays on a camera feed. To ensure a smooth, 'buttery' user experience without perceptible lag or
  'jank', what is the maximum latency budget you have to process each frame?
question: "To ensure a smooth, 'buttery' user experience without perceptible lag or 'jank', what is the maximum latency budget you have to process each frame?"
details:
  realistic_solution: The standard for a smooth mobile UI is to complete all work for a frame within the
    screen's refresh interval. For most phones, this is 60Hz, which gives a budget of approximately 16
    milliseconds. Exceeding this budget means you 'miss a frame', causing a visible stutter or 'jank'
    in the animation or user feedback.
  common_mistake: Engineers accustomed to cloud or backend services often assume latency budgets are around
    100ms. On mobile, this would feel incredibly sluggish. Another common error is confusing the UI interactivity
    budget with a video playback budget (33ms for 30 FPS). A mobile UI must feel instantly responsive,
    which requires hitting every single screen refresh.
  napkin_math: 'Most mobile devices refresh their screens 60 times per second (60 Hz). The calculation
    for the per-frame budget is straightforward:'
  options:
  - 100ms
  - 33ms
  - 16ms
  - 1ms
  correct_index: 2
