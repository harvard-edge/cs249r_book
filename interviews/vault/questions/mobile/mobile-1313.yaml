title: Energy Cost of Memory vs Compute on Exynos 2400
scenario: You are optimizing a 50M parameter INT8 neural network for deployment on
  the Samsung Exynos 2400 NPU, which provides 34.7 TOPS. The dual-core NPU shares
  12 GB of LPDDR5X memory with the CPU/GPU. If every inference requires fetching all
  50MB of weights from main memory and performing exactly 10 GOPS, estimate the energy
  consumed per inference by compute versus memory access. Recall the typical energy
  cost of an INT8 MAC versus a DRAM access from the Horowitz table to calculate the
  total energy.
question: How much per-inference energy comes from compute versus LPDDR5X memory access
  for the Exynos INT8 model?
details:
  realistic_solution: The correct approach recognizes that fetching weights from the
    shared LPDDR5X DRAM is orders of magnitude more expensive than the INT8 math operations
    on the NPU. To optimize for mobile battery life, the engineer must prioritize
    reducing memory bandwidth over reducing MACs, utilizing techniques like aggressive
    weight quantization, operator fusion to keep intermediate activations in SRAM,
    or weight compression.
  common_mistake: Candidates often focus solely on the 34.7 TOPS compute capability
    of the NPU and optimize for reducing MACs, ignoring the massive energy disparity
    between compute and DRAM access. They may fail to recall the Horowitz energy table
    magnitudes, incorrectly assuming compute dominates the power budget.
  napkin_math: 'Recall Horowitz estimates: 1 INT8 MAC is roughly 0.1 pJ, and 1 DRAM
    access (32-bit/4 bytes) is roughly 640 pJ (or 160 pJ/byte). Compute energy: 10
    GOPS (10e9 operations) * 0.1 pJ/op = 1e9 pJ = 1 mJ. Memory energy: 50 MB (50e6
    bytes) fetched from LPDDR5X. 50e6 bytes * 160 pJ/byte = 8e9 pJ = 8 mJ. Total energy
    = 1 mJ (compute) + 8 mJ (memory) = 9 mJ per inference. Memory access consumes
    8x more energy than compute on this Exynos 2400 architecture.'
