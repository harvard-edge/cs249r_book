title: Energy Cost of Memory vs Compute on Exynos 2400
scenario: You are optimizing a 50M parameter INT8 neural network for deployment on the Samsung Exynos 2400 NPU (34.7 TOPS). The dual-core NPU shares 12 GB of LPDDR5X memory with the CPU/GPU. Every inference requires fetching all 50MB of weights from main memory and performing exactly 10 GOPS.
question: How much per-inference energy comes from compute versus LPDDR5X memory access for a 50M parameter INT8 model on Exynos 2400?
details:
  realistic_solution: The correct approach recognizes that fetching weights from the shared LPDDR5X DRAM is orders of magnitude more expensive than the INT8 math operations on the NPU. To optimize for mobile battery life, the engineer must prioritize reducing memory bandwidth over reducing MACs, utilizing techniques like aggressive weight quantization, operator fusion to keep intermediate activations in SRAM, or weight compression.
  common_mistake: |
    **The Pitfall:** Focusing optimization efforts solely on reducing MACs to save battery.
    **The Rationale:** Engineers heavily index on the compute capability and ignore the physical energy cost of DRAM access.
    **The Consequence:** They fail to apply operator fusion or heavy quantization, leaving memory bandwidth bottlenecks unresolved.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model Workload: 10 GOPS, 50 MB INT8 weights.
       - Energy Costs: 1 INT8 MAC ≈ 0.1 pJ. 1 DRAM access (32-bit/4 bytes) ≈ 640 pJ (160 pJ/byte).
    2. **Calculations:**
       - Compute Energy: 10×10^9 Ops × 0.1 pJ/Op = 1×10^9 pJ = 1 mJ.
       - Memory Energy: 50×10^6 bytes × 160 pJ/byte = 8×10^9 pJ = 8 mJ.
    3. **Conclusion & Interpretation:**
       - **Result: Energy-Bound.** Total energy is 9 mJ, where **memory access consumes 8x more energy (8 mJ)** than raw computation (1 mJ).
