title: On-Device Guardrail Pipeline for Hexagon NPU
scenario: You are tasked with designing an on-device safety guardrail system for a generative AI chat application running on a smartphone powered by the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The application needs to perform real-time toxic content filtering and PII redaction on user inputs before processing. The device features a heterogeneous CPU+GPU+NPU architecture, shared 12-16 GB LPDDR5X memory, and 45 TOPS INT8 capability on the NPU.
question: How should a Snapdragon 8 Gen 3 chat app perform low-latency on-device PII and toxicity guardrails?
details:
  realistic_solution: The system should use a cascaded architecture starting with fast, deterministic rules (regex, Bloom filters) on the CPU for obvious PII. For deeper semantic filtering, deploy a highly quantized INT8 small language model (e.g., 1B parameters) compiled specifically for the Hexagon NPU. This leverages the 45 TOPS compute for rigorous safety analysis while efficiently reserving the shared 12-16 GB LPDDR5X memory for the main application and OS.
  common_mistake: |
    **The Pitfall:** Running large, unquantized transformer models for content filtering on the CPU.
    **The Rationale:** Candidates ignore the power efficiency of the NPU and fail to design a cascaded approach, treating every interaction with heavy compute.
    **The Consequence:** Excessive battery drain, high latency, and memory bandwidth contention that degrades the main application experience.
  napkin_math: |
    1. Guardrail model size: 1B parameters quantized to INT8 occupies ~1 GB.
    2. Compute requirement: 128-token input * 256 MOps/token = ~32 GOps.
    3. Effective NPU throughput: 45 TOPS peak * 20% utilization = 9 TOPS (9,000 GOps/sec).
    4. Latency: 32 GOps / 9,000 GOps/sec = 0.0035 seconds = **3.5 milliseconds**.
