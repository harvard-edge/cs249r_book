title: Multi-Turn Chat Degradation
scenario: In a mobile voice assistant using a 3B LLM, the 1st turn (100 tokens) has a TTFT of 150ms. By
  the 10th turn (accumulated 2000 tokens), TTFT degrades to 4500ms. Decode speed remains perfectly constant
  at 18 tok/s throughout all turns. The profiler shows 0% thermal throttling.
question: "Why does multi-turn mobile chat TTFT degrade as history grows while decode speed stays constant?"
details:
  realistic_solution: 'The degradation is caused by KV-cache recomputation. Without a persistent, appendable
    KV-cache, each turn recomputes attention for all prior tokens. Turn 1: prefill 100 tokens, attention
    matrix = 100 * 100 = 10K elements. Turn 10: prefill 2,000 accumulated tokens, matrix = 2,000 * 2,000
    = 4M elements (400x more computation). For a 3B model (32 layers, 32 heads, d_head=128): KV-cache
    at 2K tokens = 32 * 32 * 2 * 2000 * 128 * 2 bytes (FP16) = 1.05 GB. On Pixel 8 Pro (LPDDR5, 51.2 GB/s):
    prefill 100 tokens = 12 ms. Prefill 2,000 tokens = 240 ms (20x slower, quadratic scaling). Fix: implement
    a ring-buffer KV-cache that persists across turns. Allocate 1 GB contiguous buffer at app start. Each
    new turn appends only new tokens KV pairs (~50 KB per turn). TTFT drops from 240 ms to 15 ms at turn
    10.'
  common_mistake: Assuming the decode phase is slowing down due to the larger KV cache, which contradicts
    the constant decode speed metric.
  napkin_math: 'Prefill compute roughly scales as O(N^2) for attention. Turn 1 (100 tokens): 100^2 = 10,000
    operations. Turn 10 (2000 tokens): 2000^2 = 4,000,000 operations. The attention compute workload increased
    by 400x. If the base prefill compute (linear layers + attention) took 150ms, the quadratic scaling
    of the attention component easily drives the latency to 4.5 seconds for 2000 tokens when recomputed
    entirely.'
