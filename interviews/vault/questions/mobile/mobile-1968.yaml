title: Adaptive 5G Video Bitrate
scenario: A mobile device streams 4K video over a fluctuating 5G connection with occasional
  bandwidth drops.
question: Describe how adaptive resolution downscaling mitigates network queue overflows
  and buffering.
visual:
  kind: svg
  path: mobile-1968.svg
  alt: Flowchart showing mobile device checking 5G bandwidth and feeding back to the
    encoder resolution.
  caption: Adaptive bitrate control loop.
details:
  realistic_solution: 4K streaming requires ~25 Mbps. If 5G bandwidth drops to 10
    Mbps, maintaining 4K causes packets to queue and drop at the network edge, leading
    to freezing. Dynamically downscaling the encoder to 1080p reduces the bitrate
    to ~8 Mbps, fitting within the new bottleneck and preventing queue overflow.
  common_mistake: Suggesting local device caching instead of transmitter-side bitrate
    control, which doesn't solve real-time streaming drops.
  napkin_math: 25 Mbps > 10 Mbps -> scale down to 8 Mbps
