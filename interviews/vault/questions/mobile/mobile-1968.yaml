title: Adaptive 5G Video Bitrate
scenario: A mobile device streams 4K video over a fluctuating 5G connection with occasional bandwidth drops.
question: How does adaptive resolution downscaling mitigate network queue overflows and buffering during bandwidth drops?
visual:
  kind: svg
  path: mobile-1968.svg
  alt: Flowchart showing mobile device checking 5G bandwidth and feeding back to the encoder resolution.
  caption: Adaptive bitrate control loop.
details:
  realistic_solution: 4K streaming requires ~25 Mbps. If 5G bandwidth drops to 10 Mbps, maintaining 4K causes packets to queue and drop at the network edge, leading to freezing. Dynamically downscaling the encoder to 1080p reduces the bitrate to ~8 Mbps, fitting within the new bottleneck and preventing queue overflow.
  common_mistake: |
    **The Pitfall:** Suggesting local device caching instead of transmitter-side bitrate control.
    **The Rationale:** Candidates confuse video-on-demand buffering strategies with real-time live streaming requirements where future frames cannot be pre-cached.
    **The Consequence:** The system still suffers from queue overflows and freezing because the network bottleneck itself is not addressed.
  napkin_math: |
    1. **Original Requirement:** 4K streaming requires ~25 Mbps.
    2. **Bandwidth Drop:** 5G connection drops to 10 Mbps.
    3. **Problem:** 25 Mbps > 10 Mbps, causing queue overflow.
    4. **Solution:** Downscaling to 1080p reduces bitrate to **~8 Mbps**, safely fitting within the new 10 Mbps bottleneck.
