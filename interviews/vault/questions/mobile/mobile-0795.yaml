title: Federated Learning Carbon Trade-offs
scenario: You are evaluating Federated Learning (FL) vs Centralized Cloud training. 1,000,000 mobile devices perform 1 FL epoch daily. Local compute takes 100 Joules/device. Each device uploads/downloads a 500MB payload over 5G (0.5 Joules/MB). Cloud aggregation uses 50 kWh total. The average device grid carbon intensity is 400 gCO2/kWh, while the cloud datacenter uses renewable energy at 50 gCO2/kWh.
question: "What is the daily carbon footprint of the mobile federated learning approach including compute, 5G transfer, and cloud aggregation?"
details:
  realistic_solution: In mobile Federated Learning, the energy bottleneck is rarely the local compute; it is almost always the radio transmission cost for large model weights. To find the total carbon footprint, we must quantify the energy used by the 1 million devices (compute + 5G communication) and the energy used by the cloud aggregator. We calculate the local energy in Joules, convert it to kWh (since 1 kWh = 3.6 million Joules), and multiply by the local grid's carbon intensity. Then we add the cloud's carbon footprint. The communication energy (250J) dwarfs the compute (100J). The total system footprint is 38.9 kg CO2 local + 2.5 kg CO2 cloud = 41.4 kg CO2 daily.
  common_mistake: |
    **The Pitfall:** Ignoring the 5G communication energy when calculating device power consumption.
    **The Rationale:** Engineers focus heavily on the FL compute workload (MACs/TOPS) and overlook the massive energy cost of radio transmission for large payloads.
    **The Consequence:** Drastically underestimating the carbon footprint of FL and making incorrect sustainability claims compared to centralized training.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet size: 1,000,000
       - Local Compute: 100 J/device
       - 5G Payload: 500 MB at 0.5 J/MB
       - Carbon intensities: Local = 400 gCO2/kWh, Cloud = 50 gCO2/kWh
       - Cloud power: 50 kWh
    2. **Calculations:**
       - 5G Energy per device = 500 * 0.5 = 250 J
       - Total Device Energy = 100 J (Compute) + 250 J (Comm) = 350 J
       - Total Fleet Energy = 350,000,000 J / 3,600,000 J/kWh = 97.22 kWh
       - Device Carbon = 97.22 kWh * 400 g/kWh = 38,888 g (38.89 kg)
       - Cloud Carbon = 50 kWh * 50 g/kWh = 2,500 g (2.50 kg)
    3. **Conclusion & Interpretation:**
       - **Result: Communication Carbon Dominance. The total carbon footprint is 41.39 kg CO2, driven massively by 5G communication rather than edge ML compute or cloud aggregation.**
