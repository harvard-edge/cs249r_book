title: On-Device Intersectional Fairness Telemetry Pipeline
scenario: You are designing an on-device fairness evaluation telemetry system for a visual avatar feature
  running on the Apple A17 Pro. The system must compute demographic parity and equalized odds across 5
  intersectional subgroups locally, without sending raw user images to the cloud. The A17 Pro features
  a 16-core Neural Engine (35 TOPS, ~5W) and shares 8 GB of unified memory with the CPU/GPU, which is
  heavily utilized by the main application. Architect the evaluation pipeline, detailing how you schedule
  the evaluation models, manage memory contention, and aggregate subgroup metrics securely.
question: "How would you architect the evaluation pipeline, detailing how you schedule the evaluation models, manage memory contention, and aggregate subgroup metrics securely?"
details:
  realistic_solution: The system should use asynchronous, opportunistic evaluation running during device
    idle times (e.g., plugged in). The evaluation models (e.g., lightweight INT8 classifiers for subgroup
    detection) should be scheduled explicitly on the 16-core A17 Pro Neural Engine. To protect privacy,
    local metrics should be aggregated using local differential privacy (LDP) before transmission, ensuring
    individual demographic performance data is mathematically protected.
  common_mistake: Candidates often design a synchronous pipeline that runs immediately after inference,
    causing severe UI stutter by competing for the shared 8 GB unified memory. They also frequently propose
    transmitting fine-grained subgroup performance logs that could be reverse-engineered to infer sensitive
    user demographic attributes.
  napkin_math: Assuming the OS and main app use 5 GB of the 8 GB unified memory, the evaluation footprint
    must be minimized. A quantized INT8 subgroup classifier might be 50 MB. Running a 2 GOPS evaluation
    pass per image on the A17 Pro Neural Engine (35 TOPS) takes theoretically ~0.057 ms (2 / 35,000).
    Evaluating a daily batch of 500 cached interactions requires 1 TOPS total (500 * 2 GOPS), taking ~0.028
    seconds of continuous execution. This easily fits within the 5W thermal budget during idle charging,
    showing the design constraint is memory isolation, not compute.
