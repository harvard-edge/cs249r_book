title: Compute Latency Under Thermal Burst Limits
scenario: A generative photo editor runs a diffusion model on an Apple A17 Pro (35 TOPS). The model requires 700 GOPS per step for 20 steps.
question: Evaluate the expected inference time and thermal implications if the NPU can sustain 70% utilization before throttling after 2 seconds.
details:
  realistic_solution: Total compute is 700 GOPS * 20 = 14 TOPS. At 35 TOPS theoretical peak and 70% utilization, effective compute is 24.5 TOPS. Inference takes 14 / 24.5 = 0.57 seconds. Since 0.57s is well under the 2-second throttling window, it executes purely within the burst profile.
  common_mistake: |
    **The Pitfall:** Using theoretical peak compute instead of achievable utilization.
    **The Rationale:** Candidates ignore that peak TOPS is rarely achieved due to memory bandwidth limits and software overhead, and fail to contextualize it within a transient burst window.
    **The Consequence:** They drastically underestimate inference time, assuming it will easily complete before thermal throttling kicks in.
  napkin_math: |
    - Total compute required = 700 GOPS * 20 steps = 14 TOPS.
    - Theoretical peak compute = 35 TOPS.
    - Effective compute (70% utilization) = 35 TOPS * 0.70 = 24.5 TOPS.
    - Inference time = 14 TOPS / 24.5 TOPS = 0.57 seconds.
    - **Since 0.57s is well under the 2-second throttling window, it executes purely within the burst profile.**
