title: Compute Latency Under Thermal Burst Limits
scenario: A generative photo editor runs a diffusion model on an Apple A17 Pro (35
  TOPS). The model requires 700 GOPS per step for 20 steps.
question: Evaluate the expected inference time and thermal implications if the NPU
  can sustain 70% utilization before throttling after 2 seconds.
details:
  realistic_solution: Total compute is 700 GOPS * 20 = 14 TOPS. At 35 TOPS theoretical
    peak and 70% utilization, effective compute is 24.5 TOPS. Inference takes 14 /
    24.5 = 0.57 seconds. Since 0.57s is well under the 2-second throttling window,
    it executes purely within the burst profile.
  common_mistake: Using theoretical peak compute instead of achievable utilization,
    or ignoring the context of the transient burst window.
  napkin_math: 14 / (35 * 0.7) = 0.57s
