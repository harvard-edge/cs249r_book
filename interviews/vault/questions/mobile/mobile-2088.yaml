title: Compute Latency Under Thermal Burst Limits
scenario: A generative photo editor runs a diffusion model on a 35 TOPS NPU. The model requires 700 GOPS per step for 20 steps.
question: Evaluate the expected inference time and thermal implications if the NPU can sustain 70% utilization before throttling after 2 seconds.
details:
  realistic_solution: The total computational load must be evaluated against the realistic sustained utilization, not theoretical peak TOPS. At a 35 TOPS peak and 70% utilization, effective compute is 24.5 TOPS. Inference takes 14 TOPS / 24.5 TOPS = 0.57 seconds. Since 0.57s is well under the 2-second throttling window, it executes entirely within the high-performance thermal burst profile.
  common_mistake: |
    **The Pitfall:** Using theoretical peak compute (100% utilization) instead of empirically achievable utilization.
    **The Rationale:** Candidates ignore that peak TOPS is rarely achieved due to memory bandwidth limits and software overhead, failing to contextualize it within a transient thermal window.
    **The Consequence:** They drastically underestimate inference time, assuming it will easily complete before thermal throttling kicks in.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Required compute: 700 GOPS * 20 steps = 14 TOPS.
       - Peak compute: 35 TOPS.
       - Sustained utilization: 70%.
       - Thermal throttle window: 2.0 seconds.
    2. **Calculations:**
       - Effective compute = 35 TOPS * 0.70 = 24.5 TOPS.
       - Inference time = 14 TOPS / 24.5 TOPS = 0.57 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound (Burst Profile).** 0.57 seconds is well under the 2.0-second limit, avoiding thermal throttling.
