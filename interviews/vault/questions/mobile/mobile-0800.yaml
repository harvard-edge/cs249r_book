title: On-Device vs Cloud LLM Energy Cost
scenario: Generating 50 tokens using an on-device 7B model takes 2.5 seconds at 5W (NPU + Memory). Alternatively, an API call to a cloud server takes 0.5s of 5G active radio time at 2.0W, followed by 1.0s of idle waiting for the response at 0.5W. The cloud server itself consumes 0.05 Joules per token.
question: "How much more total system energy (in Joules) does the on-device approach use compared to the cloud approach?"
details:
  realistic_solution: 'To determine the true energy efficiency of edge vs cloud LLM serving, we must calculate the end-to-end energy for both scenarios. For the on-device approach, all energy is consumed locally by the SoC (NPU and memory bandwidth). For the cloud approach, the energy is split: the mobile device spends energy transmitting the prompt and keeping the radio active waiting for the response, while the datacenter spends energy computing the tokens. The local generation uses 12.5 Joules. The cloud generation uses 1.5 Joules locally and 2.5 Joules in the datacenter, totaling 4.0 Joules. The on-device approach actually consumes 8.5 Joules more total system energy.'
  common_mistake: |
    **The Pitfall:** Only comparing the device processing energy to the cloud server energy.
    **The Rationale:** It is counter-intuitive that communicating with the cloud costs local battery power, so candidates often omit device radio and idle energy from the system total.
    **The Consequence:** Miscalculating the true energy efficiency of edge vs cloud serving, potentially deploying a solution that unexpectedly drains the user's battery.
  napkin_math: |
    1. **Assumptions & Constraints:** On-Device: 5W for 2.5s. Cloud: Radio 2.0W for 0.5s, Idle 0.5W for 1.0s, Server 0.05 J/token (50 tokens).
    2. **Calculations:** On-Device Energy: 5W * 2.5s = 12.5 J. Cloud Energy: (2.0W * 0.5s) + (0.5W * 1.0s) + (50 * 0.05 J) = 4.0 J. Difference: 12.5J - 4.0J = 8.5 J.
    3. **Conclusion & Interpretation:** The on-device approach uses **8.5 Joules more total energy**. **Result: Energy-Bound**.
