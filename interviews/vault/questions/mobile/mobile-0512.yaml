title: The Voice Assistant A/B Test Dilemma
scenario: You are asked to design a 30-day A/B test for 1 million vehicles to validate a new voice assistant model. Uploading all queries for central retraining incurs astronomical cellular data costs.
question: "What strategy avoids astronomical cellular upload costs while preserving privacy for a 1M-vehicle voice assistant A/B test?"
details:
  realistic_solution: Implement Federated Learning (FL) with differential privacy. Discard raw audio payload ingestion and perform decentralized backpropagation locally on the vehicle's edge compute. Transmit only the aggregated, quantized weight deltas back to the cloud over Wi-Fi.
  common_mistake: |
    **The Pitfall:** Ignoring the massive Total Cost of Ownership (TCO) of cellular data transmission at scale.
    **The Rationale:** Engineers often focus purely on cloud compute costs and model accuracy, underestimating that for a large mobile fleet, data ingress/egress is the dominant financial blocker.
    **The Consequence:** Proposing centralized architectures that are financially impossible to deploy in the real world.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet: 1M vehicles.
       - Audio data: 10 minutes/day (10 MB).
       - Cellular rate: $0.10/GB.
    2. **Calculations:**
       - Upload Data = 10 MB * 1M = 10 TB/day.
       - Cost = 10,000 GB * $0.10 = $1,000/day = $30,000/month.
    3. **Conclusion & Interpretation:**
       - **Result: Cost-Bound**. Federated Learning updates are ~1MB and deferrable to Wi-Fi, completely eliminating the $30,000/month cellular tax.
