title: The Voice Assistant A/B Test Dilemma
scenario: You are a Staff ML Engineer at a major automotive company. Your team has developed a next-generation voice assistant model that significantly improves accuracy. You've been asked to design a 30-day A/B test for 1 million vehicles to validate its performance. The finance department flags your initial proposal, which involves uploading all voice queries for central retraining, citing astronomical cellular data costs.
question: "What strategy avoids astronomical cellular upload costs while preserving privacy for a 1M-vehicle voice assistant A/B test?"
details:
  realistic_solution: 'The correct strategy is to use Federated Learning (FL). Uploading raw audio data would cost tens of millions of dollars per month in cellular fees alone. FL avoids this by training on the device and only sending small, privacy-preserving model updates (often deferred to Wi-Fi).'
  common_mistake: |
    **The Pitfall:** Ignoring the massive Total Cost of Ownership (TCO) of cellular data transmission at scale.
    **The Rationale:** Engineers often focus purely on cloud compute costs and model accuracy, underestimating that for a large mobile fleet, data ingress/egress is the dominant financial blocker.
    **The Consequence:** Proposing centralized architectures that are financially impossible to deploy in the real world.
  napkin_math: |
    - **Centralized Data Cost:** Uploading 10 minutes of audio per day (10 MB) from 1M vehicles = 10 TB/day.
    - **Financial Impact:** At a $0.10/GB cellular data rate, this is $1,000/day or $30,000/month just for data transfer.
    - **Final Result:** Federated Learning updates are **~1MB and can be deferred to Wi-Fi**, entirely eliminating this cellular cost.
