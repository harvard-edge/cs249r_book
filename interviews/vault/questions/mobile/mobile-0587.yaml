title: The 15 FPS Video ML Bottleneck
scenario: Your social media app applies real-time ML effects to video — background replacement, face mesh,
  and style transfer — all running simultaneously during recording on the Samsung Galaxy S24 (Snapdragon
  8 Gen 3). Each model individually hits 30 FPS. But when all three run together, the frame rate drops
  to 15 FPS. The Snapdragon 8 Gen 3 has a Hexagon NPU (45 TOPS), Adreno GPU (4.6 TFLOPS), and Kryo CPU.
  Why can't three 30 FPS models run at 30 FPS together?
details:
  realistic_solution: 'Three models at 30 FPS each don''t require 3× the compute — they require 3× the
    memory bandwidth and careful pipeline scheduling:'
  common_mistake: '"The NPU can handle 45 TOPS — three small models should be trivial." TOPS is a peak
    *compute* metric. The bottleneck isn''t compute — it''s memory bandwidth and pipeline serialization.'
  napkin_math: 'Sequential on NPU: 8 + 5 + 12 + 6 (context switches) = 31 ms → 32 FPS (barely). With overhead:
    36 ms → 27 FPS. With thermal throttle (0.7×): 36/0.7 = 51 ms → 19 FPS. Heterogeneous: max(8, 6, 10)
    + 1 = 11 ms → 90 FPS theoretical. Sustained at 30 FPS: 11 ms compute + 22 ms idle = 5W thermal budget
    (sustainable). Power: NPU 8 ms at 3W + GPU 10 ms at 4W + CPU 6 ms at 2W = 24 + 40 + 12 = 76 mJ per
    frame. At 30 FPS: 2.28W. Well under 5W sustained budget.'
