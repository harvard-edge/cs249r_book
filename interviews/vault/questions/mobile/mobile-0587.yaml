title: The 15 FPS Video ML Bottleneck
scenario: Your social media app applies real-time ML effects to video, running three models simultaneously. Each model individually hits 30 FPS, but when all three run together, the frame rate drops to 15 FPS.
question: Why can't three 30 FPS models run at 30 FPS together?
details:
  realistic_solution: |
    Three models at 30 FPS each don't require 3x the compute; they require 3x the memory bandwidth and careful pipeline scheduling. If mapped identically, they serialize and block each other on the NPU bus. Resolve by implementing heterogeneous mapping (running Model 1 on NPU, Model 2 on GPU, Model 3 on CPU) to parallelize memory access and compute pipelines.
  common_mistake: |
    **The Pitfall:** Treating TOPS as a guarantee of throughput, regardless of memory bandwidth and scheduling.
    **The Rationale:** Assuming the NPU can automatically multi-task models seamlessly.
    **The Consequence:** Building a pipeline that stutters heavily because models serialize and block each other on the NPU bus.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU Execution Times: 8ms, 5ms, 12ms
       - Context Switch: 2ms per swap (3 swaps = 6ms)
       - Budget: 33.3ms for 30 FPS
    2. **Calculations:**
       - Sequential NPU Time: 8 + 5 + 12 + 6 = 31ms ( barely hits 32 FPS )
       - Thermal throttling degrades this to 19 FPS.
       - Heterogeneous Mapping Time: max(8, 6, 10) + 1ms synchronization = 11ms.
    3. **Conclusion & Interpretation:** **Heterogeneous mapping reduces frame time to 11ms (90 FPS capability). Result: Memory Bandwidth and Scheduler-Bound.**
