title: The 15 FPS Video ML Bottleneck
scenario: Your social media app applies real-time ML effects to video — background replacement, face mesh, and style transfer — all running simultaneously during recording. Each model individually hits 30 FPS. But when all three run together, the frame rate drops to 15 FPS.
question: Why can't three 30 FPS models run at 30 FPS together?
details:
  realistic_solution: 'Three models at 30 FPS each don''t require 3× the compute — they require 3× the memory bandwidth and careful pipeline scheduling:'
  common_mistake: |
    **The Pitfall:** Treating TOPS as a guarantee of throughput, regardless of memory bandwidth and scheduling.
    **The Rationale:** Assuming the NPU can automatically multi-task models seamlessly.
    **The Consequence:** Building a pipeline that stutters heavily because models serialize and block each other on the NPU bus.
  napkin_math: |
    1. Sequential on NPU: 8ms + 5ms + 12ms + 6ms context switches = 31ms -> 32 FPS (barely).
    2. Thermal throttling degrades this to 19 FPS.
    3. Heterogeneous mapping (NPU + GPU + CPU in parallel): max(8, 6, 10) + 1ms = 11ms -> 90 FPS.
    4. **Power Check:** 24mJ (NPU) + 40mJ (GPU) + 12mJ (CPU) = 76mJ per frame. 76mJ * 30 FPS = **2.28W (Well under 5W budget).**
