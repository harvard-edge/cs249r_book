title: KV-Cache Optimization for Large Language Models on Edge NPUs
scenario: You are deploying an LLM with an 8192 token context on a 12 GB shared memory NPU. You are evaluating Paging-based vs Fixed-Size KV-cache management.
question: How would you design an edge NPU KV-cache strategy balancing paged allocation and pre-allocation under strict 12GB memory constraints?
details:
  realistic_solution: A hybrid approach, possibly starting with a paged KV-cache to
    leverage memory efficiency, but incorporating a predictive pre-allocation strategy
    for short, bursty requests, or an adaptive page size. Implementing a robust cache
    eviction policy (e.g., Least Recently Used (LRU) or Largest Removable Page First
    for Paged Attention) that considers both memory pressure and potential for future
    reuse, specifically tuned for the LPDDR5X characteristics.
  common_mistake: |
    **The Pitfall:** Underestimating the overhead of fixed pre-allocation on mobile devices.
    **The Rationale:** Treating mobile RAM like cloud VRAM, where pre-allocating max context lengths is standard practice to avoid allocation overhead.
    **The Consequence:** The OS terminates the application prematurely because the massive contiguous memory block starves other system processes.
  napkin_math: |
    - **KV Size per Token:** 32 layers * 2 (K,V) * 32 heads * 128 dim * 2 bytes = 0.5 MB/token.
    - **Max Context Size:** 8192 tokens * 0.5 MB/token = 4 GB.
    - **Fixed Allocation:** Permanently locks 4 GB per sequence, heavily fragmenting the 12 GB RAM.
    - **Result:** A single sequence takes **4 GB**; paged attention prevents OOM by allocating memory dynamically.
