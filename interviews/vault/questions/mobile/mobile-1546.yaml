title: KV-Cache Optimization for Large Language Models on Edge NPUs
scenario: You are deploying an LLM with an 8192 token context on a shared memory NPU. You are evaluating Paging-based vs Fixed-Size KV-cache management.
question: How would you design an edge NPU KV-cache strategy balancing paged allocation and pre-allocation under strict memory constraints?
details:
  realistic_solution: 'A hybrid approach, possibly starting with a paged KV-cache to leverage memory efficiency, but incorporating a predictive pre-allocation strategy for short, bursty requests, or an adaptive page size. Implementing a robust cache eviction policy (e.g., Least Recently Used or Largest Removable Page First for Paged Attention) that considers both memory pressure and potential for future reuse, specifically tuned for shared memory characteristics.'
  common_mistake: |
    **The Pitfall:** Underestimating the overhead of fixed pre-allocation on mobile devices.
    **The Rationale:** Treating mobile RAM like cloud VRAM, where pre-allocating max context lengths is standard practice to avoid allocation overhead.
    **The Consequence:** The OS terminates the application prematurely because the massive contiguous memory block starves other system processes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - KV Size per Token: 32 layers * 2 (K,V) * 32 heads * 128 dim * 2 bytes.
       - Max Context Size: 8192 tokens.
       - Available Shared RAM: 12 GB.
    2. **Calculations:**
       - Size per Token: 32 * 2 * 32 * 128 * 2 = 524,288 bytes (0.5 MB/token).
       - Max Context Footprint: 8192 tokens * 0.5 MB/token = 4,096 MB (4 GB).
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** A fixed allocation permanently locks 4 GB per sequence, heavily fragmenting RAM, whereas paged attention allocates dynamically.
