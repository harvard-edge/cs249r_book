title: Gemini Nano TTFT Decomposition on Tensor G3
scenario: You are deploying Gemini Nano (a 2-billion parameter INT8 model) for text summarization on the Tensor G3 (7.5 TOPS, 12 GB LPDDR5X). Telemetry reveals that when processing a 1000-token input prompt, the Time To First Token (TTFT) is exactly 600ms.
question: What components make up the 600ms Gemini Nano TTFT on Tensor G3, and which hardware limit dominates?
details:
  realistic_solution: |
    End-to-end TTFT decomposes into preprocessing (text normalization and tokenization), the prefill forward pass (loading weights and computing activations), and postprocessing (sampling the first token). During the prefill forward pass, the model processes all 1000 input tokens in parallel. Because it matrix-multiplies the entire weight matrix against a large activation matrix, the compute requirements scale linearly with the input sequence length. The Google Tensor G3's TPU ceiling of 7.5 TOPS strictly limits how fast these operations can execute, making raw compute the dominant bottleneck that accounts for the vast majority of the 600ms TTFT.
  common_mistake: |
    **The Pitfall:** Assuming TTFT is bottlenecked by LPDDR5X memory bandwidth.
    **The Rationale:** Candidates fail to apply the mathematical formula for prefill compute and miss that processing a large batch of tokens is heavily compute-bound on mobile TPUs.
    **The Consequence:** Misidentifying the bottleneck and applying memory optimizations instead of compute optimizations.
  napkin_math: |
    - **Total Compute Operations:** 2 * 2,000,000,000 params * 1000 tokens = 4,000,000,000,000 operations (4 TOPS).
    - **Compute Time:** 4 TOPS / 7.5 TOPS peak = 0.533 seconds (533 ms).
    - **Latency Decomposition:** TTFT (600 ms) = Preprocessing (~33 ms) + TPU Prefill Compute (533 ms) + LPDDR5X Memory I/O/Postprocessing (~34 ms).
    - **Result:** **TPU Compute directly accounts for ~89% of the TTFT latency.**
