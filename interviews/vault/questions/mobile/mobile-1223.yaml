title: Architecting On-Device LLM Defenses on Apple A17 Pro
scenario: You are designing an on-device email summarization system using a local 3B parameter LLM. Attackers are embedding adversarial prompt injections into emails to exfiltrate user data or manipulate summaries. You need to implement a guardrail within memory and power limits.
question: How should an on-device email summarizer defend against prompt injection using guardrails within memory and power limits?
details:
  realistic_solution: 'A robust architecture uses a cascaded approach: a lightweight, deterministic heuristic filter on the CPU, followed by a small 100M-parameter quantized guardrail model on the Neural Engine. This preserves the unified memory (leaving room for the 3B summarization model) and avoids waking up the main LLM for blatantly malicious inputs. The Neural Engine easily absorbs the guardrail''s compute with minimal impact on the power budget, cleanly isolating the security boundary from the complex generative task.'
  common_mistake: |
    **The Pitfall:** Proposing cloud-based verification or large ensemble defenses.
    **The Rationale:** Candidates rely on standard server-side ML safety architectures, forgetting shared memory constraints on mobile.
    **The Consequence:** Running two large models concurrently breaches the power budget and triggers thermal throttling.
  napkin_math: |
    1. Assumptions & Constraints:
       - Memory budget: 8 GB Total - 2.5 GB OS = 5.5 GB available.
       - 3B LLM (4-bit) = 1.5 GB.
       - Guardrail 100M (8-bit) = 100 MB.
       - NPU Compute: 35 TOPS.
    2. Calculations:
       - Guardrail Compute: 100M params * 2 ops/param * 512 tokens = 100 GigaOps.
       - Compute Time: 100 GigaOps / 35,000 GigaOps/sec = ~2.8 ms.
    3. Conclusion & Interpretation:
       - **Result: 100M guardrail runs in 2.8ms, preventing malicious prompts with negligible impact (Compute-Bound).**
