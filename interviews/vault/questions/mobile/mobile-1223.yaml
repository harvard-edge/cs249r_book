title: Architecting On-Device LLM Defenses on Apple A17 Pro
scenario: You are designing an on-device email summarization system using a local 3B parameter LLM on the Apple A17 Pro. Attackers are embedding adversarial prompt injections into emails to exfiltrate user data or manipulate summaries. The A17 Pro has a 16-core Neural Engine (35 TOPS), ~5W power envelope, and shared 8 GB unified memory (where the OS and background apps consume 2.5 GB).
question: How should an A17 Pro email summarizer defend against prompt injection using guardrails within memory and power limits?
details:
  realistic_solution: 'A robust architecture uses a cascaded approach: a lightweight, deterministic heuristic filter on the CPU, followed by a small 100M-parameter quantized guardrail model on the Neural Engine. This preserves the 8 GB unified memory (leaving room for the 3B summarization model) and avoids waking up the main LLM for blatantly malicious inputs. The 16-core Neural Engine easily absorbs the guardrail''s compute with minimal impact on the 5W power budget, cleanly isolating the security boundary from the complex generative task.'
  common_mistake: |
    **The Pitfall:** Proposing cloud-based verification or large ensemble defenses.
    **The Rationale:** Candidates rely on standard server-side ML safety architectures, forgetting the A17 Pro's shared memory constraints.
    **The Consequence:** Running two large models concurrently breaches the ~5W power budget and triggers thermal throttling.
  napkin_math: |
    1. Memory Budget: 8 GB Total - 2.5 GB OS = 5.5 GB available.
    2. Model Footprint: 3B LLM (4-bit) = 1.5 GB; Guardrail 100M (8-bit) = 100 MB. (Fits easily).
    3. Guardrail Compute: 100M params * 2 ops/param * 512 tokens = ~100 GigaOps.
    4. Compute Time: 100 GigaOps / 35,000 GigaOps/sec (35 TOPS) = ~2.8 ms.
    5. **Conclusion: The 100M guardrail runs in 2.8ms, preventing malicious prompts with negligible power impact.**
