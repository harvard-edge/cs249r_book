title: Wireless Pipeline Micro-Batch Scheduling
scenario: Two Snapdragon 8 Gen 3 devices collaborate via a constrained Bluetooth 5.0 link (2 Mbps effective) to run a 3B model (hidden dimension 3072) using pipeline parallelism. Compute time per token per device is 15ms.
question: Create a pipeline schedule for continuous generation, and calculate the exact activation quantization precision required to prevent network synchronization stalls from exceeding the compute time.
details:
  realistic_solution: At 2 Mbps (250 KB/s), transferring an FP16 hidden state (3072 * 2 bytes = 6144 bytes) takes 6144 / 250,000 = 24.5ms. Since this exceeds the 15ms compute time, the network creates a 9.5ms pipeline bubble per token. By scheduling interleaved micro-batches and compressing activations to INT4 (4x compression), the payload drops to 1536 bytes. The transfer time becomes 1536 / 250,000 = 6.1ms, completely hiding the network latency behind the 15ms compute block.
  common_mistake: |
    **The Pitfall:** Assuming pipeline parallelism is compute-bound over wireless links.
    **The Rationale:** Candidates focus entirely on weight partitioning and compute time without calculating wireless data transfer latency.
    **The Consequence:** The network I/O creates massive pipeline bubbles, completely stalling autoregressive decoding.
  napkin_math: |
    *   **BLE Link Bandwidth:** `2 Mbps = 250 KB/s`
    *   **FP16 Payload:** `3072 * 2 bytes = 6144 bytes`
    *   **FP16 Transfer Time:** `6144 bytes / 250,000 bytes/s = 24.5ms (>15ms limit)`
    *   **INT4 Payload:** `3072 * 0.5 bytes = 1536 bytes`
    *   **INT4 Transfer Time:** `1536 bytes / 250,000 bytes/s = 6.14ms (<15ms limit)`
    *   **Result:** **INT4 compression is required to completely hide the 6.14ms transfer latency behind the 15ms compute block.**
