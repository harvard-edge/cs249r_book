title: 'KV-Cache: Diagnose KV Cache Overflow Causing Mobile App Crashes'
scenario: Your 3B LLM app on Tensor G3 (7.5 TOPS, 12GB) crashes after ~30 minutes of conversation when context reaches ~3000 tokens. Users report SIGKILL from Android memory pressure (LMKD).
question: Why does a Tensor G3 3B LLM app crash near 3000 tokens, and how should the KV cache be fixed?
details:
  realistic_solution: KV cache grows O(n) with conversation length. At 3000 tokens, KV cache size exceeds available RAM threshold, triggering OS memory pressure and SIGKILL.
  common_mistake: |
    **The Pitfall:** Blaming the model size without tracking cumulative memory allocation per conversation turn.
    
    **The Rationale:** Engineers assume the 3B model easily fits into 12GB RAM, forgetting that the KV cache grows linearly O(n) as the conversation continues.
    
    **The Consequence:** The expanding cache slowly triggers OS memory pressure, resulting in an ungraceful SIGKILL during prolonged user sessions.
  napkin_math: |
    1. **Calculate Base Context Memory:** FP16 KV cache for 1 token: 32 layers × 2 (K,V) × 16 heads × 128 dim × 2 bytes = 262 KB.
    2. **Calculate 3000 Tokens:** 3000 tokens × 262 KB = 786 MB.
    3. **Calculate Total App Memory:** 1.5 GB (INT4 model) + 786 MB (KV) + 500 MB (activations/framework) = 2.78 GB. 
    4. **Assess Memory Pressure:** While 2.78 GB fits, OS memory + background apps can push the system past the 7-8 GB LMKD threshold on a shared 12 GB SoC.
    5. **Result:** Fix by quantizing KV to **INT8 (saving ~393 MB)**, limiting context to 2048, and aggressively clearing cache on new sessions.
