title: 'KV-Cache: Diagnose KV Cache Overflow Causing Mobile App Crashes'
scenario: Your 3B LLM app on Tensor G3 (7.5 TOPS, 12GB) crashes after ~30 minutes
  of conversation when context reaches ~3000 tokens. Users report SIGKILL from Android
  memory pressure (LMKD). Diagnose the KV cache memory leak and propose a fix.
question: Why does a Tensor G3 3B LLM app crash near 3000 tokens after 30 minutes,
  and how should the KV cache be fixed?
details:
  realistic_solution: KV cache grows O(n) with conversation length. At 3000 tokens,
    KV cache size exceeds available RAM threshold, triggering OS memory pressure and
    SIGKILL.
  common_mistake: Blaming the model size without computing the actual KV cache memory
    growth; not tracking cumulative memory allocation per conversation turn.
  napkin_math: '3B model (INT4 quantized): 1.5GB. KV per token: 32 layers × 2 × 16 × 128 × 2B = 262KB per token (fp16). At 3000 tokens: 3000 × 262KB = 786MB. OS: ~4GB. Model: 1.5GB. KV: 786MB. Activations + framework: 500MB. Total: 6.78GB. Available on 12GB device... but Tensor G3 shares memory with system. Android apps typically get 5-6GB before memory pressure warnings, 7-8GB for SIGKILL. App at 6.78GB: likely to crash. Fix: (1) Use INT8 KV: 393MB. (2) Limit context to 2048: 2048 × 131KB (INT8) = 268MB. (3) Clear completed conversation KV on new conversation start. Total memory at 2048 INT8: 1.5GB + 268MB + 500MB = 2.26GB — stable.'
