title: CI/CD Compute Gating for Exynos NPU
scenario: As part of our mobile CI/CD pipeline, new models must pass an automated
  resource validation check before promotion in the model registry. The deployment
  target is the Samsung Exynos 2400 NPU, which features a dual-core NPU with 34.7
  TOPS and shares 12 GB of LPDDR5X memory with the CPU/GPU/ISP. Your pipeline is evaluating
  an INT8 vision model requiring 0.5 Tera-Operations (TOPs) per inference. Calculate
  the maximum theoretical FPS this model can achieve if the CI/CD gate policy strictly
  requires leaving 60% of the NPU compute available for concurrent ISP workloads.
question: How would you calculate the maximum theoretical FPS this model can achieve
  if the CI/CD gate policy strictly requires leaving 60% of the NPU compute available
  for concurrent ISP workloads?
details:
  realistic_solution: The CI/CD pipeline must include a hardware-aware profiling step
    that applies strict resource budgets before model registry promotion. By reserving
    60% of the Exynos 2400's compute for the ISP and other tasks, we determine the
    available compute budget. We then divide this available throughput by the per-inference
    compute requirement to find the maximum theoretical framerate, allowing the CI/CD
    runner to automatically pass or fail the model candidate.
  common_mistake: Candidates often fail to account for the shared nature of mobile
    SoCs in deployment pipelines, assuming 100% of the 34.7 TOPS are available for
    a single model. They also frequently mix up TOPS (throughput) with TOPs (total
    operations per inference) when writing automated CI/CD validation scripts.
  napkin_math: '1. Total NPU capacity = 34.7 TOPS.

    2. Budgeted available compute = 34.7 TOPS * (1.0 - 0.60 headroom) = 34.7 * 0.40
    = 13.88 TOPS.

    3. Model compute cost = 0.5 TOPs per inference.

    4. Max FPS = Available throughput / Compute per inference = 13.88 TOPS / 0.5 TOPs
    = 27.76 FPS. The CI/CD pipeline uses this 27.76 FPS metric to gate deployment.'
