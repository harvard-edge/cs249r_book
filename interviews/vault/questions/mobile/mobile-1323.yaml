title: CI/CD Compute Gating for Exynos NPU
scenario: As part of our mobile CI/CD pipeline, new models must pass an automated resource validation check before promotion in the model registry. The deployment target is the Samsung Exynos 2400 NPU. Your pipeline is evaluating an INT8 vision model requiring 0.5 Tera-Operations (TOPs) per inference.
question: How would you calculate the maximum theoretical FPS this model can achieve if the CI/CD gate policy strictly requires leaving 60% of the NPU compute available for concurrent ISP workloads?
details:
  realistic_solution: The CI/CD pipeline must include a hardware-aware profiling step that applies strict resource budgets before model registry promotion. By reserving 60% of the Exynos 2400's compute for the ISP and other tasks, we determine the available compute budget. We then divide this available throughput by the per-inference compute requirement to find the maximum theoretical framerate, allowing the CI/CD runner to automatically pass or fail the model candidate.
  common_mistake: |
    **The Pitfall:** Failing to account for the shared nature of mobile SoCs in deployment pipelines.
    **The Rationale:** Candidates assume 100% of the advertised TOPS are dedicated to a single model.
    **The Consequence:** The CI/CD pipeline approves models that, in reality, cause heavy system contention and frame drops in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total NPU Capacity: 34.7 TOPS.
       - Reserved Budget: 60% for ISP (40% remaining for ML).
       - Model Requirement: 0.5 TOPS per inference.
    2. **Calculations:**
       - Available Compute: 34.7 TOPS * 0.40 = 13.88 TOPS.
       - Max Frame Rate: 13.88 TOPS / 0.5 TOPS/frame = 27.76 FPS.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound SLA. The CI/CD pipeline must fail any model configuration that dips below ~27 FPS to prevent shared resource starvation.**
