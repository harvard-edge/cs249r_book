title: The Performance Cliff
scenario: You are the tech lead for a real-time video effects app on iOS. The core feature, a segmentation
  model, runs at a stable 55 FPS (18ms latency) on an iPhone 16, with the entire model graph executing
  on the Apple Neural Engine (ANE). To improve segmentation quality, a data scientist proposes changing
  the model architecture slightly, which involves replacing a few dozen standard convolution blocks with
  a new, custom 'Dynamic Kernel' block. After recompiling the model with this change, the app's frame
  rate catastrophically collapses to 15 FPS. The model's total MACs only increased by 5%. Justify why
  a minor change in model arithmetic led to a 3.5x drop in system performance.
question: "Why can adding unsupported Dynamic Kernel blocks collapse ANE performance despite only a 5% MAC increase?"
details:
  realistic_solution: This is a classic 'Hardware Delegation Failure'. The ANE, like most NPUs, has a
    fixed, immutable list of supported layer types it can accelerate. The standard convolution blocks
    were fully supported and ran efficiently on the ANE. The new 'Dynamic Kernel' block, however, is not
    on this list. When CoreML encounters this unsupported op, it is forced to break the execution graph.
    It runs the initial portion of the model on the ANE, then transfers the large, intermediate feature
    map tensor to the CPU or GPU to execute the custom block. Critically, in many cases, once the execution
    falls back from the ANE, *the rest of the graph continues on the slower CPU/GPU*. The system doesn't
    pay the overhead to transfer it back to the ANE. Therefore, instead of just one slow op, a large portion
    of the model is now running on a less efficient processor, causing the performance to collapse.
  common_mistake: A common mistake is to assume performance scales linearly with MACs. An engineer might
    predict a slight slowdown from 55 FPS to ~52 FPS and be shocked by the collapse. They fail to consider
    that not all ops are equal from the hardware's perspective.
  napkin_math: Let's assume the new custom op appears 30% of the way through the model's layers. ANE inference
    = 18ms. When the unsupported op is hit, execution halts. The intermediate tensor (e.g., 256x256x64
    * 2 bytes = 8MB) must be copied from ANE memory space to CPU memory, costing ~5ms. CPU executes the
    rest of the model (70% of operations) taking ~40ms, as it is much less efficient at MACs than the
    ANE. Total latency = ~63ms. 1000ms / 63ms ≈ 15 FPS. A tiny MAC increase led to massive data-transfer
    and compute-efficiency penalties.
