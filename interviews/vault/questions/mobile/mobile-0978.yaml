title: 'Model Format Conversion: Compare INT8 vs. INT4 CoreML Quantization on A17
  Pro'
scenario: A 1B-parameter LLM is being prepared for on-device deployment on A17 Pro
  (35 TOPS Neural Engine, 8GB). CoreML supports both INT8 (8 bits per weight) and
  INT4 (4 bits per weight) weight compression. Compare model size, inference latency,
  and accuracy for a 50-token generation task.
question: How would you compare model size, inference latency, and accuracy for a
  50-token generation task?
details:
  realistic_solution: 'INT8: 1B × 1 byte = 1GB model. INT4: 1B × 0.5 bytes = 500MB
    model. Decode BW-limited: INT8 bandwidth = 1GB/token. INT4 = 500MB/token. Neural
    Engine eff BW ~68 GB/s. INT8: 1/68 = 14.7ms/token. INT4: 0.5/68 = 7.35ms/token.
    Accuracy: INT4 PTQ causes ~1-2% accuracy drop on benchmarks vs INT8. For 50 tokens:
    INT8 735ms, INT4 367ms. INT4 2× faster, fits 500MB in 8GB with more headroom for
    KV cache.'
  common_mistake: Assuming INT4 is always 2× faster than INT8 on Neural Engine; in
    practice, Neural Engine may dequantize INT4 to INT8 before compute, so memory
    savings are real but compute savings may be smaller.
  napkin_math: 'INT8: 1B × 1B = 1GB. INT4: 500MB. Neural Engine BW: 68 GB/s. Decode:
    INT8 1GB/68GB/s = 14.7ms/token × 50 = 735ms. INT4: 0.5GB/68 = 7.35ms/token × 50
    = 367ms. KV cache at 50 tokens: 32 layers × 2 × 2048 × 2B = 0.4MB/token × 50 =
    20MB. Trivial. INT4 wins: 2× faster, 2× smaller, fits 8GB with room for 4× longer
    context.'
