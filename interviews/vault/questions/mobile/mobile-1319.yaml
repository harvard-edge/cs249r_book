title: KV-Cache Sizing for A17 Pro
scenario: You are deploying a 7B parameter LLM quantized to 4-bit on an iPhone 15 Pro utilizing the Apple A17 Pro Neural Engine. The A17 Pro shares 8 GB of unified memory across the CPU, GPU, and 16-core NPU. Given that the OS reserves 2.5 GB and the model weights consume 3.5 GB, calculate the memory required for a 4096-token KV-cache (FP16, 32 layers, 32 heads, 128 head dimension).
question: How much FP16 KV-cache memory does a 4096-token 7B LLM need, and does it fit in the remaining RAM?
details:
  realistic_solution: The KV-cache calculation yields exactly 2 GB, which consumes all remaining unified memory and leaves zero room for intermediate activations or peak memory spikes. A realistic solution involves reducing the KV-cache footprint by implementing Grouped-Query Attention (GQA), applying 8-bit KV-cache quantization, or restricting the maximum context window.
  common_mistake: |
    **The Pitfall:** Forgetting the Key/Value multiplier or ignoring the OS baseline.
    **The Rationale:** Candidates often forget to multiply by 2 for both Key and Value tensors, or fail to subtract the OS footprint from the shared unified memory pool.
    **The Consequence:** The system immediately OOM crashes upon deployment because the cache exceeds the actual usable RAM limits.
  napkin_math: |
    - **Bytes Per Token:** 2 (Key + Value) * 32 (heads) * 128 (dim) * 2 bytes (FP16) = 16,384 bytes.
    - **Total Size:** 16,384 bytes * 32 (layers) * 4096 (tokens) = 2,147,483,648 bytes (2 GB).
    - **System Memory Constraint:** 8 GB (Total) - 2.5 GB (OS) - 3.5 GB (Weights) = 2.0 GB remaining.
    - **Result:** **The cache perfectly consumes the remaining 2.0 GB of RAM, leaving zero overhead for intermediate activations.**
