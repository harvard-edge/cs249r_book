title: Specifying Latency SLO Contracts for Each Stage of a Mobile Compound Pipeline on A17 Pro
scenario: You are writing the technical specification for a 5-stage compound AI pipeline on A17 Pro (8GB, 35 TOPS) targeting a 1.5-second time-to-first-token SLA. Stages are: query embedding, FAISS retrieval, reranking, context assembly, and LLM prefill.
question: What per-stage latency SLOs and error budgets should a five-stage A17 Pro compound AI pipeline use for a 1.5s TTFT SLA?
details:
  realistic_solution: Variance-aware budget allocation is required. Stages with deterministic runtime get tight P95/P99 envelopes; variable stages get wider. Sum P95: 25+5+50+5+400=485ms. Total TTFT P95 budget: 485ms + generation budget. Error budget per stage must target 99% compliance to ensure the compounded pipeline P95 meets the 95.1% system SLO.
  common_mistake: |
    **The Pitfall:** Allocating the 1.5s budget equally across all 5 stages (300ms each).
    **The Rationale:** Candidates fail to consider that stages have inherently different variances (e.g., deterministic FAISS vs. variable LLM prefill).
    **The Consequence:** Equal allocation wastes headroom in deterministic stages and under-allocates for variable stages, causing SLA violations.
  napkin_math: |
    * TTFT Target: 1500ms.
    * Allocation by stage P95: embedding(25ms) + FAISS(5ms) + reranker(50ms) + assembly(5ms) + prefill(400ms) = 485ms.
    * First token generation: 485ms + 50ms (1 decode step) = 535ms TTFT P95.
    * Remaining budget: 1500ms - 535ms = 965ms.
    * Additional tokens before 1.5s: 965ms / 50ms/token = 19 tokens.
    * **User sees first token at 535ms, followed by a 20 tok/s stream.**
