title: The Streaming ASR Trade-off
scenario: You are building live captions for a video calling app. Your team is debating between Whisper-small (244M params, non-streaming) and a custom RNN-T model (30M params, streaming). The PM demands 'the best accuracy' and points to Whisper's benchmark scores.
question: Why might the smaller RNN-T model be the right choice for live mobile captions despite lower benchmark accuracy?
details:
  realistic_solution: 'Whisper is a purely sequence-to-sequence transformer that mandates caching 30-second audio chunks. For real-time mobile captions, this inherently enforces a multi-second latency floor, traps 488 MB in RAM permanently, and induces extreme 5W compute spikes. RNN-T processes streaming frames continuously, eliminating the temporal buffer and stabilizing the thermal envelope.'
  common_mistake: |
    **The Pitfall:** Blindly selecting the model with the highest cloud benchmark accuracy without analyzing on-device mechanics.
    **The Rationale:** Ignoring strict mobile constraints regarding memory pinning, thermal spiking, and the definition of "real-time."
    **The Consequence:** Shipping an unworkable feature with massive latency delays, severe thermal throttling, and background app evictions due to memory bloat.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Whisper-small: 244M params (FP16), 30s chunk requirement, 5W peak burst.
       - RNN-T: 30M params (FP16), streaming (200ms latency), 0.5W continuous.
    2. **Calculations:**
       - Whisper RAM Footprint: 244M * 2 bytes = 488 MB.
       - RNN-T RAM Footprint: 30M * 2 bytes = 60 MB.
       - Whisper Average Power: 5W peak * 10% compute duty cycle = 0.5W avg.
       - RNN-T Average Power: 0.5W peak * 100% compute duty cycle = 0.5W avg.
    3. **Conclusion & Interpretation:**
       **Result: Latency/Memory-Bound. The RNN-T is strictly superior for mobile systems; it reduces latency by 150x and frees 428 MB of RAM while enforcing an identical thermal average.**
