title: The Streaming ASR Trade-off
scenario: You are building live captions for a video calling app. Your team is debating between Whisper-small (244M params, non-streaming) and a custom RNN-T model (30M params, streaming). The PM wants 'the best accuracy'.
question: Why might the smaller RNN-T model be the right choice for live mobile captions despite lower benchmark accuracy?
details:
  realistic_solution: 'Whisper is a sequence-to-sequence model that processes audio in 30-second chunks. For live captions, this means 30-second latency, 488 MB memory always resident, and massive compute bursts causing thermal spikes. RNN-T processes streaming audio with minimal latency and footprint.'
  common_mistake: |
    **The Pitfall:** Blindly choosing the model with the highest benchmark accuracy.
    **The Rationale:** Ignoring system-level constraints of real-time captioning on mobile devices.
    **The Consequence:** Delivering a feature with 30-second latency, massive memory bloat, and severe thermal spikes that make it unusable.
  napkin_math: |
    - Whisper Memory: 244M * 2 bytes = 488 MB. Latency: 30s. Power: 5W burst.
    - RNN-T Memory: 30M * 2 bytes = 60 MB. Latency: 200ms. Power: 0.5W continuous.
    - Average Power (1 hr): Whisper (5W * 0.1 duty) = 0.5W. RNN-T (0.5W * 1.0 duty) = 0.5W.
    - **RNN-T provides 150x lower latency and frees 428 MB of RAM with identical average power consumption.**
