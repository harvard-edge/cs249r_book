title: Hardware Image Scaling for Mobile NPU
scenario: A mobile AR app captures 4K video at 30 FPS. The Snapdragon 8 Gen 3 NPU
  processes downsampled 512x512 images for pose estimation.
question: Optimize the data pipeline to downsample the image without burdening the
  CPU.
details:
  realistic_solution: Utilize the camera's Image Signal Processor (ISP) or GPU hardware
    scaler to directly output a 512x512 stream alongside the 4K stream. Use zero-copy
    memory buffers (e.g., Android HardwareBuffer) to pass the downscaled stream directly
    to the NPU.
  common_mistake: Copying frames to the CPU memory to run a software resize before
    passing it to the NPU.
  napkin_math: 512 * 512 * 3 * 30 / 1e6 = 23.5 MB/s
