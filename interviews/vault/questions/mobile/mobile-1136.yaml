title: Architecting Memory Management for On-Device LLMs
scenario: You are designing an on-device GenAI feature targeting an NPU with 12 GB shared RAM. The OS actively manages memory pressure and will evict your application if it consumes too much shared RAM.
question: How would you architect a memory management strategy to handle the KV cache and weights without triggering OS-level OOM eviction?
details:
  realistic_solution: 'A robust design involves implementing a paged KV cache system to eliminate memory fragmentation and allow dynamic allocation. Model weights should be quantized and memory-mapped (mmap) to allow the OS to page them out under extreme pressure, while memory pressure listeners dynamically shrink the context window or halt generation before eviction occurs.'
  common_mistake: |
    **The Pitfall:** Allocating the KV cache as a single, massive, contiguous block of memory.
    **The Rationale:** Simplistic implementations assume exclusive device control and ignore OS memory fragmentation over time.
    **The Consequence:** The OS fails to find a single contiguous block during generation, instantly killing the app with an OOM error (jetsam event).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Shared RAM: 12 GB total, ~6 GB reserved by OS.
       - Model weights (INT4): 3.5 GB.
       - Activations buffer: 0.5 GB.
       - Token KV Cache: 128 KB per token.
    2. **Calculations:**
       - Usable Memory Budget: 12 GB - 6 GB = 6.0 GB.
       - Base Footprint: 3.5 GB + 0.5 GB = 4.0 GB.
       - Available for KV Cache: 6.0 GB - 4.0 GB = 2.0 GB.
       - Max Token Capacity: 2.0 GB / 128 KB = 16,384 tokens.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound. Paging the 2.0 GB cache into 1MB pages allows 16,384 tokens while preventing OS-level OOM eviction.**
