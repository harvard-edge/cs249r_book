title: The Unstable Gallery Indexer
scenario: You are building a background video indexing task. The core ML model takes exactly 30ms per frame (30 FPS arrival rate). You discover a separate, low-priority background task occasionally uses the NPU for 100ms every second. The 'time remaining' estimate grows continuously.
question: Why does a 30 FPS video indexing queue grow infinitely when a 30ms/frame model shares the NPU with a 100ms/sec background task?
details:
  realistic_solution: The system is unstable because the utilization is 1.0. Interference makes the effective service rate equal to the arrival rate.
  common_mistake: |
    **The Pitfall:** Comparing theoretical service time directly to arrival time.
    **The Rationale:** Candidates see 30ms < 33.3ms and instantly conclude the system is stable, ignoring the 100ms interference penalty.
    **The Consequence:** The engineering team ignores the mathematical instability, leading to runaway memory consumption and infinite progress bars in production.
  napkin_math: |
    1. Calculate Arrival Rate ($\lambda$): 30 frames/second.
    2. Calculate theoretical capacity: 1000ms / 30ms = 33.3 frames/sec.
    3. Calculate lost time: The background task consumes 100ms every second, leaving 900ms.
    4. Calculate Effective Service Rate ($\mu$): 900ms / 30ms = **30 frames/second**.
    5. Calculate Utilization ($\rho$): $\lambda / \mu$ = 30 / 30 = **1.0 (100%)**.
    6. Conclusion: With $\rho = 1.0$, the queue is critically unstable; any minor jitter will cause infinite growth.
  options:
  - The 30ms processing time is too slow; it needs to be under the 16.67ms UI budget to be stable.
  - According to Little's Law, the latency will be high, but the system should eventually complete the task.
  - The thumbnail task has a low priority, so it is always preempted and doesn't impact the queue stability.
  - System utilization is 1.0; the arrival rate matches the effective service rate, making the queue unstable with any jitter.
