title: Mastering On-Device Knowledge Base Update Strategy for Compound AI on Tensor
  G3
scenario: A Tensor G3 (7.5 TOPS, 12GB) enterprise mobile app serves 10,000 users with
  personalized on-device RAG. Each user has a local corpus of 2,000 documents. The
  enterprise syncs 50 new/updated documents per user per day via MDM push. The embedding
  model (256-dim, INT8, 22MB) runs at 150 vecs/s on Tensor G3 NPU. Design a knowledge
  base update strategy that maintains retrieval quality, minimizes battery impact,
  and handles the case where updates arrive while the user is actively using the app.
question: How would you design a knowledge base update strategy that maintains retrieval
  quality, minimizes battery impact, and handles the case where updates arrive while
  the user is actively using the app?
details:
  realistic_solution: 'Copy-on-write index with shadow update: (1) Maintain active
    index (read-only, served from mmap). (2) Background thread builds shadow index
    by cloning active index and adding new vectors. (3) When shadow is complete, atomic
    pointer swap (< 1ms). (4) During active use: queue incoming updates in a tiny
    flat index (max 50 entries = 50*256*4=51KB). Serve queries from: active_index
    + flat_pending_index, merge results. (5) Shadow build schedule: when screen-off
    for > 30s or charging, at 10% NPU duty cycle. 50 docs at 150 vecs/s full power:
    50/150=0.33s. At 10% duty: 3.3s background wall-clock. Battery: 10% * 5W NPU *
    3.3s = 1.65J = 0.00046Wh — negligible. Active-use overhead: flat index search
    on 50 docs = 0.5ms — imperceptible.'
  common_mistake: Updating the FAISS index atomically by taking a write lock while
    the user is querying, causing the retrieval stage to block for up to 50*(1/150)=333ms
    during an active session. Users experience random 333ms pauses mid-conversation.
  napkin_math: 'Daily update: 50 docs. Re-embed at 150 vecs/s: 50/150=0.33s at full
    NPU. FAISS HNSW add 50 vectors: ~5ms. Total update work: 335ms active NPU time.
    Battery: 5W (NPU INT8 at 7.5 TOPS) * 0.335s = 1.675J = 0.000465Wh per day. Negligible
    vs 12Wh battery. Flat index overhead per query: 50 vectors * 256 dims * 4 bytes
    = 51KB, search time 0.5ms. Combined HNSW(2000 docs) + flat(50): 5ms + 0.5ms =
    5.5ms (vs 5ms baseline — 10% overhead). Shadow build on background: 0.33s * 10
    = 3.3s wall-clock at 10% duty.'
