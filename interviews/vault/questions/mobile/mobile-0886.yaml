title: Mastering On-Device Knowledge Base Update Strategy for Compound AI on Tensor G3
scenario: A Tensor G3 (7.5 TOPS, 12GB) enterprise mobile app serves 10,000 users with personalized on-device RAG. Each user has a local corpus of 2,000 documents. The enterprise syncs 50 new/updated documents per user per day via MDM push. The embedding model (256-dim, INT8, 22MB) runs at 150 vecs/s on Tensor G3 NPU.
question: How would you design a knowledge base update strategy that maintains retrieval quality, minimizes battery impact, and handles the case where updates arrive while the user is actively using the app?
details:
  realistic_solution: 'Copy-on-write index with shadow update: (1) Maintain active index (read-only, served from mmap). (2) Background thread builds shadow index by cloning active index and adding new vectors. (3) When shadow is complete, atomic pointer swap (< 1ms). (4) During active use: queue incoming updates in a tiny flat index (max 50 entries = 50*256*4=51KB). Serve queries from: active_index + flat_pending_index, merge results. (5) Shadow build schedule: when screen-off for > 30s or charging, at 10% NPU duty cycle. 50 docs at 150 vecs/s full power: 50/150=0.33s. At 10% duty: 3.3s background wall-clock. Battery: 10% * 5W NPU * 3.3s = 1.65J = 0.00046Wh — negligible. Active-use overhead: flat index search on 50 docs = 0.5ms — imperceptible.'
  common_mistake: |
    **The Pitfall:** Updating the FAISS index atomically by taking a write lock during active user querying.
    **The Rationale:** Developers often use simple thread locks for data structure updates without calculating the blocking time caused by the underlying NPU embedding latency.
    **The Consequence:** The retrieval stage blocks for up to 333ms, causing users to experience random, noticeable pauses mid-conversation.
  napkin_math: |
    - **Update Workload:** 50 docs/day at 150 vecs/s = 0.33s of active NPU time.
    - **Index insertion:** FAISS HNSW adding 50 vectors takes ~5ms.
    - **Battery Impact:** 5W (NPU INT8 at 7.5 TOPS) * 0.335s = 1.675 J = **~0.00046 Wh per day** (negligible vs 12Wh battery).
    - **Active-use Overhead (Flat Index):** 50 vectors * 256 dims * 4 bytes = 51 KB. Search time is 0.5ms.
    - **Combined Query Latency:** HNSW(2000 docs) at 5ms + flat(50 docs) at 0.5ms = **5.5ms** (~10% overhead vs 5ms baseline).
    - **Background Shadow Build:** 0.33s * 10 (at 10% duty cycle) = **3.3s wall-clock time**.
