title: The Real-Time Keyboard Assistant
scenario: An on-device keyboard assistant suggests the next word using a generative model, subject to a strict 16ms UI frame budget. The team is deciding between static and continuous batching for inference.
question: What is the critical user experience advantage of using continuous batching in this scenario?
details:
  realistic_solution: The primary advantage is reducing Time To First Token (TTFT). With static batching, an incoming request might have to wait for a full batch to assemble, causing a noticeable delay that violates the 16ms UI frame budget. Continuous batching allows the NPU to start processing the new request almost immediately by adding it to the currently running batch, drastically cutting down the initial latency and ensuring the UI feels responsive.
  common_mistake: |
    **The Pitfall:** Conflating batching throughput (TPOT) with latency (TTFT).

    **The Rationale:** Assuming high hardware utilization always translates to a smoother user interface.

    **The Consequence:** Building a system that processes many tokens efficiently but feels sluggish to the user because the first token is constantly delayed.
  napkin_math: |
    *   Static batching latency: Waits for batch fill -> Time To First Token (TTFT) heavily exceeds 16ms.
    *   Continuous batching latency: Immediate scheduling -> TTFT remains ~8ms.
    *   **Result:** Continuous batching prevents UI frame drops by satisfying the 16ms TTFT constraint.
  options:
  - It maximizes overall tokens per second (TPOT) across all users.
  - It reduces the model's on-chip memory footprint.
  - It reduces the Time To First Token (TTFT) to avoid UI lag.
  - It lowers total power consumption by requiring fewer CPU cycles for scheduling.
  correct_index: 2
