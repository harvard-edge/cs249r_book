title: The Real-Time Keyboard Assistant
scenario: You're designing an on-device keyboard assistant for a new flagship smartphone. The feature
  suggests the next word using a small generative model. To avoid UI 'jank' (violating the 16ms frame
  budget), each suggestion must appear almost instantly. Your team is debating between static batching
  and continuous batching for inference. For the user experience in this specific scenario, what is the
  primary, most critical advantage of using continuous batching?
details:
  realistic_solution: The primary advantage is reducing Time To First Token (TTFT). With static batching,
    an incoming request might have to wait for a full batch to assemble, causing a noticeable delay that
    violates the 16ms UI frame budget. Continuous batching allows the NPU to start processing the new
    request almost immediately by adding it to the currently running batch, drastically cutting down the
    initial latency and ensuring the UI feels responsive.
  common_mistake: Engineers often conflate throughput with latency. They assume any technique that improves
    GPU/NPU utilization (like batching) is primarily for increasing overall tokens-per-second (throughput).
    On mobile, where user interaction is paramount, the time-to-first-token (TTFT) is often more critical
    than the subsequent token rate (TPOT) to avoid a laggy-feeling UI. Continuous batching's main UX win
    is minimizing the initial wait time for the first token.
  napkin_math: Assume the NPU takes 8ms to process a batch and the static batch size is 4. A new keypress
    request arrives just after a batch starts.
  options:
  - It maximizes overall tokens per second (TPOT) across all users.
  - It reduces the model's on-chip memory footprint.
  - It reduces the Time To First Token (TTFT) to avoid UI lag.
  - It lowers total power consumption by requiring fewer CPU cycles for scheduling.
