title: Implementing Shared mmap for Edge LLMs
scenario: "You are deploying a 15 GB INT8 LLM on a Jetson Orin (32 GB LPDDR5, 275 TOPS) running two separate inference processes for different application endpoints. Both processes need read-only access to the exact same model weights. You must implement memory-mapping (mmap) to share the physical RAM."
question: "How much RAM does shared read-only mmap save for two Jetson Orin processes loading the same 15 GB INT8 LLM, and which flags are required?"
details:
  realistic_solution: The implementation must use the PROT_READ and MAP_SHARED flags in the mmap call. PROT_READ enforces read-only access to prevent accidental weight corruption, while MAP_SHARED allows both processes to map their virtual memory addresses to the exact same underlying physical pages in the OS page cache.
  common_mistake: |
    **The Pitfall:** Using MAP_PRIVATE instead of MAP_SHARED.
    **The Rationale:** Candidates fail to understand POSIX mmap flags, copying the pages rather than sharing the physical memory.
    **The Consequence:** Unnecessary duplication of weights, causing an out-of-memory crash.
  napkin_math: |
    - Standard independent loading footprint: `15 GB * 2 processes = 30 GB`.
    - Shared memory-mapped footprint: `15 GB` (first process) + `0 GB` (second process reuses pages) = `15 GB`.
    - **Conclusion:** Shared mmap saves exactly **15 GB** of RAM.
