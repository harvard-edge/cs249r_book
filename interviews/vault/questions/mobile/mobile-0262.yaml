title: The OTA Update Budget (mobile-0262)
scenario: You are an ML systems engineer on a mobile team. You need to ship a new on-device model with 50 million parameters via an Over-the-Air (OTA) update. To manage user data consumption, your product manager has set a strict 100 MB budget for the model download size.
question: How much storage will the model require if deployed using FP16 precision, and does it meet the 100 MB budget?
details:
  realistic_solution: Using FP16 (half-precision floating-point) means each parameter requires 16 bits, or 2 bytes, of storage. With 50 million parameters, the total size is 100 million bytes. Since 1 megabyte (MB) is 1,000,000 bytes, the model size is exactly 100 MB. This meets the product manager's budget, but leaves no room for overhead like metadata or container formats.
  common_mistake: |
    **The Pitfall:** Confusing the byte requirements for different numerical precisions or confusing bits with bytes.
    **The Rationale:** Engineers often misremember if FP16 requires 1, 2, or 4 bytes per parameter, or forget to divide the bit-width (16) by 8.
    **The Consequence:** Calculating an off-by-2x or off-by-4x error, leading to incorrect budget estimations.
  napkin_math: |
    - Parameters: 50,000,000.
    - Precision: FP16.
    - Bytes per Parameter: 16 bits / 8 bits/byte = 2 bytes.
    - Total Size (Bytes): 50,000,000 params × 2 bytes/param = 100,000,000 bytes.
    - Total Size (MB): 100,000,000 bytes / 1,000,000 bytes/MB = 100 MB.
    - **100 MB exactly meets the budget.**
  options:
  - 50 MB. It's well under budget.
  - 200 MB. It's over budget.
  - 100 MB. It exactly meets the budget.
  - 800 MB. It is far too large.
  correct_index: 2
