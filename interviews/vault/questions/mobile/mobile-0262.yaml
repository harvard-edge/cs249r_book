title: The OTA Update Budget (mobile-0262)
scenario: You are an ML systems engineer on a mobile team. You need to ship a new on-device model with
  50 million parameters via an Over-the-Air (OTA) update. To manage user data consumption, your product
  manager has set a strict 100 MB budget for the model download size. Calculate how much storage the model
  will require if you deploy it using FP16 precision, and determine if it meets the budget.
question: "How would you calculate how much storage the model will require if you deploy it using FP16 precision, and determine if it meets the budget?"
details:
  realistic_solution: Using FP16 (half-precision floating-point) means each parameter requires 16 bits,
    or 2 bytes, of storage. With 50 million parameters, the total size is 100 million bytes. Since 1 megabyte
    (MB) is 1,000,000 bytes, the model size is exactly 100 MB. This meets the product manager's budget,
    but leaves no room for overhead like metadata or container formats.
  common_mistake: The most common mistake is confusing the byte requirements for different numerical precisions.
    Engineers often misremember if FP16 requires 1, 2, or 4 bytes per parameter, leading to an off-by-2x
    or off-by-4x error. Another mistake is confusing bits with bytes, forgetting to divide the bit-width
    (16) by 8.
  napkin_math: 1. **Parameters:** 50,000,000 | 2. **Precision:** FP16 | 3. **Bytes per Parameter:** 16
    bits / 8 bits/byte = 2 bytes | 4. **Total Size (Bytes):** 50,000,000 params × 2 bytes/param = 100,000,000
    bytes | 5. **Total Size (MB):** 100,000,000 bytes / 1,000,000 bytes/MB = **100 MB**
  options:
  - 50 MB. It's well under budget.
  - 200 MB. It's over budget.
  - 100 MB. It exactly meets the budget.
  - 800 MB. It is far too large.
  correct_index: 2
