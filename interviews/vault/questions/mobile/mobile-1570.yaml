title: Optimizing Real-time Object Detection Latency on Apple A17 Pro
scenario: You are optimizing a real-time object detection model deployed on a flagship mobile device. The model averages 80ms latency with peaks up to 200ms, missing the 30 FPS (<33ms) target. Users report frame drops and unresponsive UI during peak load.
question: Which system metrics and profiling tools matter most when 80ms average inference latency peaks catastrophically to 200ms?
details:
  realistic_solution: |
    A Staff-level architect will bypass standard algorithmic checks and deploy deep hardware instrumentation, utilizing tools like `nsys profiling` or Apple Instruments (System Trace, Metal System Trace). The core pathology is an I/O and OS scheduling blockade. The 200ms peaks indicate severe thread preemption, cache thrashing within the unified memory, or expensive CPU-bound pre-processing (e.g., un-vectorized bilinear interpolation). Optimization requires shifting data marshaling to zero-copy memory buffers, migrating pre-processing to the GPU via custom Metal Compute Shaders, and locking core thread affinities to bypass scheduler jitter.
  common_mistake: |
    **The Pitfall:** Immediately jumping to model architecture or quantization optimization.
    **The Rationale:** Candidates assume the neural network itself is strictly the bottleneck.
    **The Consequence:** They completely overlook data transfer overheads across the unified memory or CPU-bound pre/post-processing steps.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target SLA: 30 FPS (~33.3 ms/frame budget).
       - Current Latency: 80ms average, 200ms peaks.
       - Hardware Compute: NPU capable of ~35 TOPS.
    2. **Calculations:**
       - Estimated model complexity: ~10 Giga-Operations.
       - Theoretical pure compute bounds = 10 GOPs / 35,000 GOPs/sec = ~0.28 ms.
       - Overhead Delta = 80 ms - 0.28 ms = 79.72 ms of non-compute delay.
    3. **Conclusion & Interpretation:**
       - **Result: I/O & OS-Bound.** The actual mathematical compute takes less than a millisecond. The 80-200ms latency entirely originates from devastating memory copies, unoptimized CPU bottlenecks, and system-level thread preemption.
