title: The Battery-Draining Vision Transformer
scenario: You are leading development of an AR feature on an iPhone with an A17 Pro chip. The feature
  uses a MobileNetV3 CNN for object detection. A junior engineer, following trends, trains a Vision Transformer
  (ViT) of equivalent parameter count and accuracy. During evaluation, you solve the problem of higher
  latency and 3x faster battery drain with the ViT model. What is the fundamental architectural reason
  for this significant performance regression on a mobile device?
question: "What is the fundamental architectural reason for this significant performance regression on a mobile device?"
details:
  realistic_solution: The self-attention mechanism in the Vision Transformer is the culprit. Unlike the
    spatially local and cache-friendly sliding window of a CNN, self-attention has poor data locality.
    To compute the output for a single image patch, it must access the Key and Value vectors for all other
    patches in the sequence. This results in scattered, non-contiguous memory accesses across a large
    memory space. On mobile hardware, fetching data from DRAM is orders of magnitude more energy-intensive
    than computation. The A17 Pro's Neural Engine sits idle while waiting for data, and the constant DRAM
    traffic drains the battery. The CNN's predictable memory access pattern, by contrast, plays to the
    strengths of hardware prefetchers and caches, minimizing costly DRAM access.
  common_mistake: Engineers often equate parameter count with model complexity and performance, especially
    when migrating from CNNs to Transformers. They underestimate the profound impact of memory access
    patterns on mobile power consumption. A model's theoretical efficiency (FLOPs) is irrelevant if it
    requires energy-expensive random memory accesses.
  napkin_math: A DRAM access costs ~580x more energy than an FP16 compute operation. ViTs use global self-attention,
    meaning every token attends to every other, requiring constant memory loads of the entire sequence.
    For a 14x14 grid (196 tokens), attention needs 196x196 = 38k ops, but constantly loads/stores from
    DRAM. MobileNetV3's depthwise convolutions have high data reuse in SRAM, saving DRAM bandwidth.
  options:
  - The MLP blocks in the ViT are larger than the equivalent CNN layers, requiring more peak compute.
  - Self-attention has poor data locality, causing a massive increase in energy-expensive random DRAM
    accesses.
  - The Apple Neural Engine is not optimized for the LayerNorm and Softmax operations used in Transformers.
  - The ViT's activation memory exceeds the L2 cache size, forcing it to use the slower main memory.
  correct_index: 1
