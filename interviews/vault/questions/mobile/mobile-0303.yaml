title: The Live Caption Queueing Delay
scenario: You are designing a 'Live Caption' feature for a messaging app that runs on a high-end smartphone. The feature analyzes frames from the phone's video camera in real-time to detect objects and suggest captions.
question: What average queue length results when 30 FPS frames take 25ms each to process on a mobile NPU?
details:
  realistic_solution: The correct approach is to apply Little's Law and the standard M/M/1 queueing formulas. First, confirm the system is stable. Then, calculate the NPU utilization (ρ). Finally, use the formula for the average queue length (Lq).
  common_mistake: |
    **The Pitfall:** Checking only if service time is less than arrival time and assuming no latency issues exist.
    **The Rationale:** Ignoring the variance in real-world systems where high utilization leads to queuing delays.
    **The Consequence:** The feature experiences severe, unexplained jitter during spikes in user activity.
  napkin_math: |
    1. Arrival Rate (lambda): 1 frame / 33.3ms (30 FPS).
    2. Service Time (mu): 25ms.
    3. Utilization (rho): 25 / 33.3 = 0.75.
    4. **Average Queue Length (Lq): rho^2 / (1 - rho) = 0.5625 / 0.25 = 2.25 frames.**
  options:
  - 3.0 frames
  - 0.75 frames
  - 0 frames, because service time is less than the arrival interval
  - 2.25 frames
  correct_index: 3
