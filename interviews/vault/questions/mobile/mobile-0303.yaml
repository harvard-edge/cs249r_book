title: The Live Caption Queueing Delay
scenario: You are designing a 'Live Caption' feature for a messaging app that runs on a high-end smartphone.
  The feature analyzes frames from the phone's video camera in real-time to detect objects and suggest
  captions.
question: "What average queue length results when 30 FPS frames take 25ms each to process on a mobile NPU?"
details:
  realistic_solution: The correct approach is to apply Little's Law and the standard M/M/1 queueing formulas.
    First, confirm the system is stable. Then, calculate the NPU utilization (ρ). Finally, use the formula
    for the average queue length (Lq).
  common_mistake: Engineers often just check if the service time (25ms) is less than the arrival interval
    (1/30s ≈ 33.3ms) and assume the system has no latency issues. They forget that even in a stable system,
    if utilization is high, a queue will form, leading to significant latency. A second common mistake
    is to calculate the total number of items *in the system* (L) instead of just the number *in the queue*
    (Lq).
  napkin_math: '1. Arrival Rate (lambda): The camera outputs 30 frames/sec, so a frame arrives every 1/30
    = 33.3ms. 2. Service Time (mu): The ML model takes 25ms to process a frame. 3. Utilization (rho):
    25ms / 33.3ms = 0.75 or 75%. 4. Queueing: Since rho < 1, the pipeline is stable. If arrival was strictly
    deterministic, queue length is 0. With variance, average queue length = rho^2 / (1-rho) = 2.25 frames.'
  options:
  - 3.0 frames
  - 0.75 frames
  - 0 frames, because service time is less than the arrival interval
  - 2.25 frames
  correct_index: 3
