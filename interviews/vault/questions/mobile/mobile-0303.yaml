title: The Live Caption Queueing Delay
scenario: You are designing a 'Live Caption' feature for a messaging app. The feature analyzes frames from the video camera in real-time to detect objects and suggest captions.
question: What average queue length results when 30 FPS frames take 25ms each to process on a mobile NPU?
details:
  realistic_solution: |
    Apply Little's Law and standard M/M/1 queueing formulas. First, confirm the system is stable. Then, calculate the NPU utilization (rho). Finally, use the formula for the average queue length (Lq) to ensure buffer bounds are not exceeded.
  common_mistake: |
    **The Pitfall:** Checking only if service time is less than arrival time and assuming no latency issues exist.
    **The Rationale:** Ignoring the variance in real-world systems where high utilization leads to queuing delays.
    **The Consequence:** The feature experiences severe, unexplained jitter during spikes in user activity.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Arrival Rate (lambda): 1 frame / 33.3ms (30 FPS)
       - Service Time (mu): 25ms
    2. **Calculations:**
       - Utilization (rho): 25 / 33.3 = ~0.75
       - Average Queue Length (Lq): rho^2 / (1 - rho) = 0.5625 / 0.25 = 2.25 frames
    3. **Conclusion & Interpretation:** **Average queue length is 2.25 frames. Result: Queuing/Latency-Bound.**
  options:
  - 3.0 frames
  - 0.75 frames
  - 0 frames, because service time is less than the arrival interval
  - 2.25 frames
  correct_index: 3
