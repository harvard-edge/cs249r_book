title: 'Deploying Sub-4-bit LLMs on Exynos 2400 NPU: Precision, Performance, and Trade-offs'
scenario: Your team is tasked with deploying a 7B LLM on a mobile device powered by an NPU. The primary constraints are energy efficiency, low latency, and fitting the model within the device's 12 GB memory pool.
question: What are the key trade-offs you'd consider, and how would you evaluate the effectiveness of different extreme quantization techniques specific to this hardware?
details:
  realistic_solution: 'A realistic solution involves a multi-pronged approach: 1. Layer-wise Quantization Sensitivity Analysis. 2. Hardware-Aware Design. 3. QAT or PTQ with Fine-tuning.'
  common_mistake: |
    **The Pitfall:** Applying uniform sub-4-bit quantization across all layers.
    **The Rationale:** Candidates focus solely on compute TOPS without accounting for memory bandwidth limitations or layer-wise differential sensitivity to precision loss.
    **The Consequence:** The model suffers severe accuracy degradation and becomes memory-bound despite theoretically efficient bit operations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 7B parameters.
       - Memory budget: 12 GB.
       - 2-bit Quantization (W2A8 example).
    2. **Calculations:**
       - Baseline (FP16): 7B * 2 bytes = 14 GB (Exceeds budget).
       - 2-bit weight footprint: 7B * 0.25 bytes = 1.75 GB.
       - Activation/KV cache estimate: ~2 GB.
       - Total footprint: 1.75 GB + 2 GB = 3.75 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Fits within Memory Budget**. W2 quantization reduces footprint to 3.75 GB, easily fitting the 12 GB limit.
