title: 'Kernel Fusion: Specification — Define Fusion Requirements for Cross-Platform Mobile LLM SDK'
scenario: "You are writing the kernel fusion specification for a cross-platform mobile LLM SDK that targets A17 Pro (35 TOPS, 8GB), Snapdragon 8 Gen 3 (45 TOPS, 16GB), and Tensor G3 (7.5 TOPS, 12GB). The SDK must achieve >= 20 tokens/sec for a 1B INT4 model on all platforms."
question: "What fusion requirements and platform adaptation rules should a cross-platform mobile LLM SDK specify to reach 20 tokens per second?"
details:
  realistic_solution: 'Platform-specific fusion requirements with a minimum baseline. Required fusion groups: (1) Flash Attention (all platforms, tile size adaptive to SRAM). (2) BN fold (inference only). (3) Elementwise chain fusion (RMSNorm + bias). Platform-specific: Core ML for ANE, QNN for Hexagon, XNNPack for Tensor G3.'
  common_mistake: |
    **The Pitfall:** Writing platform-agnostic fusion requirements.
    **The Rationale:** Engineers assume fusion rules can be identical across hardware, requiring Flash Attention on Tensor G3 which has limited SRAM.
    **The Consequence:** Impossible or highly suboptimal kernel implementations on certain platforms.
  napkin_math: |
    - Throughput requirement: 20 tok/sec -> `50ms/token max`.
    - Memory floor: model `500MB / 68 GB/s = 7.35ms`.
    - Remaining budget: `50ms - 7.35ms = 42.65ms` for overhead.
    - Overhead sources: kernel launches, format conversions, CPU-GPU sync.
    - **Conclusion:** Fusion must reduce overhead by **>= 20ms** to meet the 50ms total budget on Tensor G3.
