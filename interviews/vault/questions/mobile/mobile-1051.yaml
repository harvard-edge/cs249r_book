title: 'Mobile Transformer Cost Evaluation: On-Device LLM Viability on A17 Pro'
scenario: 'Evaluate whether Llama-3-8B in INT4 (4GB model) can provide a good user
  experience on Apple A17 Pro (35 TOPS Neural Engine, 8GB RAM) with P99 < 3s for 100-token
  responses. Calculate: available RAM after OS, memory bandwidth (estimated 100GB/s
  on A17 Pro Neural Engine), decode throughput, and whether the Neural Engine architecture
  provides advantages over general compute.'
question: Can Llama-3-8B INT4 meet a P99 under 3 seconds for 100-token responses on
  A17 Pro, given RAM and bandwidth limits?
details:
  realistic_solution: 'A17 Pro memory: 8GB LPDDR5, ~100GB/s bandwidth. OS+apps: 2-3GB.
    Available: 5-6GB. INT4 8B model: 4GB. Fits! Available RAM after model: 1-2GB for
    KV cache. KV per token (8B model, 32 layers, 32 heads, 128 head_dim): 32*2*32*128*0.5=131,072
    bytes=128KB per token. At 1000 token context: 128MB KV. Fits. Decode throughput:
    weight loading = 4GB/100GB/s = 40ms per token. 100 tokens: 4s > 3s SLO. FAILS
    at 40ms/token. Need: either smaller model or faster memory. INT4 4B (e.g., Phi-3-Mini):
    2GB/100GB/s = 20ms/token. 100 tokens: 2s < 3s ✓. Apple''s implementation (llm.c/MLX):
    typically achieves 15-20 tok/s on Llama-3-8B INT4 on A17 Pro — empirically under
    3s for 100 tokens.'
  common_mistake: Assuming the Neural Engine TOPS rating directly translates to LLM
    decode throughput when the Neural Engine is optimized for fixed, compiled neural
    networks (like Core ML models) and may not efficiently handle autoregressive decode
    kernels.
  napkin_math: 'INT4 8B: 4GB. BW: 4GB/100GB/s=40ms/tok. 100 toks: 4s. Exceeds 3s SLO.
    INT4 4B: 2GB/100GB/s=20ms/tok. 100 toks: 2s < 3s ✓. Empirical: Apple M-series
    achieves ~15-20 tok/s on 8B INT4 via optimized Metal kernels and unified memory
    architecture. At 15 tok/s: 100 toks=6.7s. At 20 tok/s: 5s. Still over 3s SLO for
    100 tokens. Practical: Apple reports ~12 tok/s on iPhone 15 Pro for Llama-3-8B
    INT4. 100 tokens: 8.3s. P99 probably 12-15s including prefill. Reality: A17 Pro
    handles 1B-3B models at <3s SLO. 8B models are marginal. 3B model INT4 (1.5GB):
    1.5GB/100=15ms/tok. 100 toks: 1.5s ✓.'
