title: The Thermal Throttling Adaptation Loop
scenario: Your mobile AR app runs a real-time segmentation model on the A17 Pro ANE at 35 TOPS. After 10 minutes of sustained use, the thermal management system throttles power from 5W to 3W. The ANE throughput drops proportionally.
question: How would you design an adaptive inference strategy that maintains acceptable user experience under thermal constraints?
details:
  realistic_solution: 'Throttled throughput: 35 × (3/5) = 21 TOPS (60% of peak). Adaptive strategy: (1) Monitor thermal state via OS APIs, (2) maintain 3 model tiers: full (35 TOPS, 30fps), medium (21 TOPS, 20fps with smaller input resolution), lite (14 TOPS, 15fps with aggressive pruning), (3) smooth transitions over 2-3 seconds to avoid visual jarring, (4) predictive throttling: start reducing quality 30s before expected thermal limit based on temperature trajectory.'
  common_mistake: |
    **The Pitfall:** Ignoring thermal throttling entirely or statically reducing quality at launch.
    **The Rationale:** Candidates fail to realize sustained peak mobile performance is impossible, and static reductions waste initial thermal headroom.
    **The Consequence:** The app stutters or crashes when throughput drops organically, ruining the AR experience.
  napkin_math: |
    1. Peak Capacity: 35 TOPS at 5W.
    2. Throttled Capacity: 35 * (3/5) = 21 TOPS at 3W (60% throughput).
    3. Frame Budget: Full model needs 30 TOPS for 30 FPS.
    4. Switch Tier: Medium model (15 TOPS for 30 FPS) restores smooth frame rate under throttling.
    **Conclusion:** Adaptive switching keeps FPS steady despite a 40% compute loss.
