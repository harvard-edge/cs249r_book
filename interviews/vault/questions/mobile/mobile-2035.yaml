title: Understanding Zero-Copy Unified Memory on Apple Silicon
scenario: An iOS developer is feeding CoreVideo pixel buffers directly from the camera
  into a CoreML model on the A17 Pro Neural Engine. Profiling shows that for some
  buffers the runtime silently falls back to a CPU memcpy, costing ~3 ms per frame
  and breaking the zero-copy assumption. Empirically the fallback correlates with
  buffers whose pixel format includes a non-multiple-of-64 row stride or non-aligned
  base pointer.
question: Explain how zero-copy unified memory normally avoids a CPU<->ANE copy, AND
  identify the alignment/stride conditions that cause it to silently fall back to
  memcpy. Propose how the developer can guarantee zero-copy.
details:
  realistic_solution: Apple's Unified Memory Architecture allows the CPU, GPU, and
    Neural Engine to access the same physical memory space. By passing a properly
    aligned `CVPixelBuffer` reference, the system passes a pointer rather than duplicating
    the memory payload.
  common_mistake: Assuming a PCIe-like DMA transfer occurs between the CPU RAM and
    a separate NPU VRAM.
  napkin_math: 0 bytes copied vs 1920 * 1080 * 4 = 8.29 MB per frame
