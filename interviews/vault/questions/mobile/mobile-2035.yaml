title: Understanding Zero-Copy Unified Memory on Apple Silicon
scenario: An iOS developer is feeding CoreVideo pixel buffers directly from the camera into a CoreML model on the A17 Pro Neural Engine. Profiling shows that for some buffers the runtime silently falls back to a CPU memcpy, costing ~3 ms per frame and breaking the zero-copy assumption. Empirically the fallback correlates with buffers whose pixel format includes a non-multiple-of-64 row stride or non-aligned base pointer.
question: How does zero-copy unified memory avoid CPU<->ANE copies, and what alignment conditions cause silent fallbacks to memcpy?
details:
  realistic_solution: Apple's Unified Memory Architecture allows the CPU, GPU, and Neural Engine to access the same physical memory space. By passing a properly aligned `CVPixelBuffer` reference, the system passes a pointer rather than duplicating the memory payload.
  common_mistake: |
    **The Pitfall:** Assuming a PCIe-like DMA transfer occurs between the CPU RAM and a separate NPU VRAM.
    **The Rationale:** Developers accustomed to discrete GPUs may not realize that Unified Memory Architecture relies on pointer passing rather than physical data duplication.
    **The Consequence:** They misdiagnose latency spikes as simple transfer bottlenecks rather than alignment-induced memory copies.
  napkin_math: |
    - **Zero-copy cost:** 0 bytes copied.
    - **Memcpy cost per frame (1080p):** 1920 * 1080 * 4 bytes (RGBA) = 8,294,400 bytes.
    - **Result:** **~8.29 MB** copied per frame, costing ~3 ms.
