title: Understanding Zero-Copy Unified Memory on Apple Silicon
scenario: An iOS developer is feeding CoreVideo pixel buffers directly from the camera
  into a CoreML model running on the A17 Pro Neural Engine.
question: Explain the mechanism by which the pixel buffer avoids a full memory copy
  between the CPU and the Neural Engine.
details:
  realistic_solution: Apple's Unified Memory Architecture allows the CPU, GPU, and
    Neural Engine to access the same physical memory space. By passing a properly
    aligned `CVPixelBuffer` reference, the system passes a pointer rather than duplicating
    the memory payload.
  common_mistake: Assuming a PCIe-like DMA transfer occurs between the CPU RAM and
    a separate NPU VRAM.
  napkin_math: 0 bytes copied vs 1920 * 1080 * 4 = 8.29 MB per frame
