title: Analyzing On-Device LLM Latency on Google Tensor G3
scenario: You are tasked with optimizing an on-device 7B parameter quantized LLM on a Pixel device with a Tensor G3. Users report a 2.5 second end-to-end latency for a 50-word summary from a 500-word input, with a noticeable pause before the first word appears.
question: How would you decompose on-device LLM latency on Tensor G3 into TTFT, TPOT, and processing overheads?
details:
  realistic_solution: 'Implement granular latency profiling tools to measure each stage: input preprocessing (tokenization, batching), TTFT (initial forward pass, KV cache initialization), TPOT (subsequent forward passes, output token processing), and postprocessing (detokenization, formatting). Analyze the impact of model architecture, quantization scheme, and input/output sizes on each component. Optimize by: 1. **Preprocessing:** Using optimized tokenizers, parallelizing where possible. 2. **TTFT:** Optimizing initial prompt processing, e.g., by pre-filling KV cache for common prefixes or using smaller, faster models for initial responses. 3. **TPOT:** Employing speculative decoding, improving KV cache memory access patterns, or further quantizing less critical parts of the model if precision loss is acceptable. 4. **Hardware Utilization:** Ensure the 7.5 TOPS TPU is saturated during inference; if not, investigate data transfer bottlenecks with LPDDR5X memory or inefficient operator mappings.'
  common_mistake: |
    **The Pitfall:** Failing to differentiate between Time To First Token (TTFT) and Time Per Output Token (TPOT).
    **The Rationale:** Candidates treat LLM inference as a single monolithic block of latency instead of separating the compute-bound prefill phase from the memory-bound decoding phase.
    **The Consequence:** Applying the wrong optimizations (e.g., trying to quantize weights further to fix slow tokenization/TTFT).
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 7B INT8 (~7 GB weights).
    - TPU Peak Compute: 7.5 TOPS.
    - Operations per token: ~200 GOPS (100 GMACs).
    - Generation target: 50 words (~75 tokens) in 2.5s.

    **Calculations:**
    - Compute-Limited Max Rate: 7.5 TOPS / 200 GOPS/token = 37.5 tokens/sec.
    - Compute-Limited Generation Time: 75 tokens / 37.5 tokens/s = 2.0 seconds.
    - Overhead Isolation: Observed 2.5s - 2.0s generation = 0.5s Preprocessing + TTFT.
    - Actual TPOT: 2.0s / 75 tokens = ~26.7 ms/token.

    **Conclusion & Interpretation:**
    - **Result: 0.5s TTFT, 26.7 ms/token TPOT (Memory-Bound)**. Latency decomposes into TTFT and TPOT, indicating autoregressive decoding is memory-bound.
