title: 'Model Size Estimation: Diagnose Mobile Performance Degradation from Memory
  Pressure'
scenario: A Snapdragon 8 Gen 3 (16GB) Android app running a 7B INT4 LLM (3.5GB) shows
  TPOT increasing from 45ms to 180ms after 5 minutes of sustained use, without model
  changes. Memory monitor shows 14GB of 16GB in use. Diagnose and fix.
question: Why does a 7B INT4 LLM on Snapdragon 8 Gen 3 slow from 45ms to 180ms TPOT
  at 14GB of 16GB memory use?
details:
  realistic_solution: '14GB / 16GB = 87.5% memory utilization. Android starts active
    GC and background process management at >80%. Background GC adds latency spikes:
    50-200ms. Memory bandwidth contention: model decode reads 3.5GB/step at 77GB/s
    = 45ms baseline, but with contention from GC threads: effective bandwidth drops
    to 20 GB/s → 175ms. Fix: (1) Reduce KV cache cap from unlimited to 4096 tokens
    (freeing accumulated KV). (2) Use foreground service with memory lock. Expected
    fix: 14→10GB → bandwidth contention resolved → 45ms TPOT restored.'
  common_mistake: Assuming the TPOT increase is caused by thermal throttling (plausible
    but secondary) when the primary cause is memory pressure causing LPDDR5X bandwidth
    throttling as the memory controller manages competing access from OS and model.
  napkin_math: 'Model decode: 3.5GB/77GB/s=45ms. With 87% memory: BW sharing → effective
    20GB/s → 3.5/20=175ms. Matches observation. Fix: free KV cache. KV accumulated:
    5min × 2 turns/min × 512 tokens = 5120 tokens × 524KB/token = 2.68GB. (1B model
    would be smaller — 7B: 5120×524KB=2.68GB). Free: 14-2.68=11.3GB (71%). BW restored.
    TPOT: 45ms.'
