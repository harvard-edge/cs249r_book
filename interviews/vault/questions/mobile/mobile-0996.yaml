title: 'Model Size Estimation: Diagnose Mobile Performance Degradation from Memory Pressure'
scenario: A Snapdragon 8 Gen 3 Android app running a 7B INT4 LLM (3.5GB) shows TPOT increasing from 45ms to 180ms after 5 minutes of sustained use, without model changes. Memory monitor shows 14GB of 16GB in use.
question: Why does a 7B INT4 LLM on Snapdragon 8 Gen 3 slow from 45ms to 180ms TPOT after 5 minutes, and how do you fix it?
details:
  realistic_solution: '14GB / 16GB = 87.5% memory utilization. Android starts active GC and background process management at >80%. Background GC adds latency spikes: 50-200ms. Memory bandwidth contention: model decode reads 3.5GB/step at 77GB/s = 45ms baseline, but with contention from GC threads: effective bandwidth drops to 20 GB/s -> 175ms. Fix: (1) Reduce KV cache cap from unlimited to 4096 tokens (freeing accumulated KV). (2) Use foreground service with memory lock. Expected fix: 14->10GB -> bandwidth contention resolved -> 45ms TPOT restored.'
  common_mistake: |
    **The Pitfall:** Assuming TPOT increase is caused by thermal throttling.
    **The Rationale:** Candidates miss the OS-level memory management behaviors triggered when LPDDR5X utilization exceeds ~85%.
    **The Consequence:** Applying cooling optimizations instead of fixing the root cause: memory bandwidth contention from GC and swapping.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 7B INT4 (3.5 GB).
    - Optimal Bandwidth: 77 GB/s.
    - Sustained Use: 5 minutes (10 turns * 512 tokens = 5120 tokens).

    **Calculations:**
    - Baseline Decode: 3.5 GB / 77 GB/s = 45 ms.
    - KV Cache Size: 5120 tokens * 524 KB/token = 2.68 GB.
    - Total Memory Use: 3.5 GB (model) + 2.68 GB (KV) + System > 14 GB (87% util).
    - Contended Decode: Bandwidth drops to 20 GB/s -> 3.5 GB / 20 GB/s = 175 ms.
    - Fix Applied: Cap KV to 4096 tokens, freeing ~2 GB.

    **Conclusion & Interpretation:**
    - **Result: 45 ms (Memory-Bound)**. Freeing KV cache restores memory bandwidth and returns TPOT to 45 ms.
