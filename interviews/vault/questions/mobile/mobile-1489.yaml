title: Exynos 2400 Shared Memory Architecture
scenario: You are building a real-time sensor data ingestion pipeline for an augmented
  reality application running on a device powered by the Samsung Exynos 2400 NPU.
  The pipeline streams high-frequency camera and IMU data directly to the NPU for
  immediate processing. Based on the hardware specifications of the Exynos 2400, what
  type of memory architecture does the NPU use to access this streaming data alongside
  the CPU and GPU?
question: Based on the hardware specifications of the Exynos 2400, what type of memory
  architecture does the NPU use to access this streaming data alongside the CPU and
  GPU?
details:
  realistic_solution: The correct hardware specification to recall is that the Samsung
    Exynos 2400 NPU uses a unified, shared memory architecture, specifically sharing
    a 12 GB LPDDR5X memory pool with the CPU, GPU, and ISP. This allows for zero-copy
    data ingestion pipelines where the CPU writes the streaming sensor data to memory,
    and the dual-core NPU reads it directly from the same physical address space without
    costly memory transfer overhead.
  common_mistake: Candidates often incorrectly assume mobile NPUs have physically
    isolated VRAM, similar to discrete desktop GPUs. They may suggest allocating separate
    memory pools and implementing manual data transfers between the CPU and NPU over
    a dedicated bus.
  napkin_math: The device features a dual-core NPU with 34.7 TOPS and a shared 12
    GB LPDDR5X memory pool. For a real-time stream at 60 FPS where each frame is 6
    MB, the ingestion bandwidth is 360 MB/s. Because the 12 GB memory is shared across
    the SoC, the system avoids 360 MB/s of redundant memory copy operations, freeing
    up the memory bus to efficiently feed the 34.7 TOPS NPU without bandwidth stalling.
