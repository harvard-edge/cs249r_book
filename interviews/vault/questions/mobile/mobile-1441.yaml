title: On-Device LLM Intersectional Fairness Sizing
scenario: You are deploying an on-device LLM on the Google Tensor G3 for real-time text summarization. To preserve privacy, intersectional fairness evaluation must run entirely on-device overnight while the phone is charging. The Tensor G3 has a 7.5 TOPS TPU and 12 GB LPDDR5X memory.
question: How would you size an on-device LLM fairness evaluation so subgroup analysis does not exceed memory or latency budgets?
details:
  realistic_solution: The candidate should identify that LLM inference is memory-bandwidth bound, not compute bound, and calculate throughput based on the LPDDR5X specifications. They must propose quantizing the model to 4-bit (INT4) to ensure the model and context easily fit within a strict 1.5-2 GB budget allocated from the 12 GB RAM. The evaluation dataset must be sized so that the total generation time, including thermal throttling overhead, fits within the 8-hour overnight charging window.
  common_mistake: |
    **The Pitfall:** Neglecting memory bandwidth bottlenecks for autoregressive generation.
    **The Rationale:** Candidates often propose running exhaustive fairness benchmarks without calculating the memory bandwidth bottleneck, assuming the 7.5 TOPS TPU can instantly process the dataset.
    **The Consequence:** This leads to out-of-memory crashes by forgetting the OS memory footprint or exceeding the safe 8-hour overnight charging window due to slow generation.
  napkin_math: |
    1. Model sizing: A 2B parameter model quantized to 4-bit (INT4) occupies ~1 GB.
    2. Throughput: Assuming ~50 GB/s memory bandwidth, reading the 1 GB model yields a theoretical max of 50 tokens/sec.
    3. Dataset sizing: 5 dialects x 3 genders x 10 topics x 100 prompts = 15,000 prompts.
    4. Total output: 15,000 prompts * 100 tokens each = 1.5 million tokens.
    5. Time constraint: 1.5M tokens / 50 tokens/sec = 30,000 seconds = **8.3 hours, which exceeds a safe 6-hour thermal window.**
