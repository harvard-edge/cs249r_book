title: Always-On Gaze Detection
scenario: An always-on gaze detector on a Snapdragon 8 Gen 3 uses an INT8 micro-model.
  The NPU consumes 50mW active, 2mW idle, and processes a frame in 5ms.
question: Calculate the maximum supported frame rate to keep average NPU power strictly
  under 5mW.
details:
  realistic_solution: 'First, establish the required duty cycle (D) using the power
    budget: 50mW * D + 2mW * (1 - D) = 5mW. Solving this yields a 6.25% duty cycle.
    Because one frame takes exactly 5ms of active time, we can determine the total
    cycle period by dividing 5ms by the duty cycle. The inverse of this period gives
    the maximum frames per second.'
  common_mistake: Ignoring the 2mW idle power, which heavily skews the permissible
    active time in ultra-low power scenarios.
  napkin_math: 48 * D = 3 -> D = 0.0625. Period = 5ms / 0.0625 = 80ms. Max FPS = 1000ms
    / 80ms = 12.5 FPS.
