title: 'The Sentient Dashboard: Compressing a Foundation Model for Real-Time Driver Monitoring'
scenario: You are the lead ML Systems Engineer at a Tier-1 automotive supplier. The research division
  has developed a groundbreaking 10-billion parameter, transformer-based foundation model for driver monitoring.
  Trained on cloud GPUs, it fuses video, audio, and vehicle CAN bus data to achieve 99.9% accuracy in
  detecting driver state (drowsiness, distraction). Your task is to lead the productionization effort.
details:
  realistic_solution: A successful strategy requires a multi-stage funnel of aggressive, compounding optimizations.
    No single technique is sufficient.
  common_mistake: Proposing a single optimization technique. For instance, 'Let's just quantize the model
    to INT8' or 'We can prune 80% of the weights.' These approaches fail to grasp the multiple orders-of-magnitude
    gap between the cloud-scale model and the embedded target. A 1000x performance gap cannot be closed
    by a single technique that might only offer a 2-4x improvement. This problem requires a portfolio
    of compounding optimizations.
  napkin_math: '10B params in FP16 = 20GB weights. Orin SoC bandwidth is 204.8 GB/s. Reading weights takes
    20 / 204.8 = 97ms/token (10.2 tok/s), missing real-time safety deadlines! Solution: Quantize to INT4
    (5GB). Memory read drops to 5 / 204.8 = 24ms/token (40 tok/s), easily meeting the 30Hz camera frame
    rate.'
