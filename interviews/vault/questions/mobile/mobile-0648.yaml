title: 'The Sentient Dashboard: Compressing a Foundation Model for Real-Time Driver Monitoring'
scenario: You are the lead ML Systems Engineer at a Tier-1 automotive supplier. The research division has developed a groundbreaking 10-billion parameter, transformer-based foundation model for driver monitoring. Trained on cloud GPUs, it fuses video, audio, and vehicle CAN bus data to achieve 99.9% accuracy in detecting driver state (drowsiness, distraction). Your task is to lead the productionization effort for embedded real-time use.
question: "What multi-stage compression strategy can productionize a 10B foundation model to meet strict real-time safety deadlines?"
details:
  realistic_solution: A successful strategy requires a multi-stage funnel of aggressive, compounding optimizations. No single technique is sufficient.
  common_mistake: |
    **The Pitfall:** Proposing a single optimization technique (e.g., "just quantize to INT8").
    **The Rationale:** Candidates fail to grasp the multiple orders-of-magnitude gap between a cloud-scale 10B model and an embedded SoC target.
    **The Consequence:** The model remains far too large and slow, completely missing the real-time deadlines required for life-critical automotive systems.
  napkin_math: |
    * **Baseline (FP16):** 10B parameters * 2 bytes = 20 GB weights.
    * SoC Bandwidth (e.g., Orin) = 204.8 GB/s.
    * Read time = 20 GB / 204.8 GB/s = 97 ms per inference.
    * FPS limit = 1000 / 97 = 10.2 FPS. (Fails the 30 Hz camera requirement).
    * **Optimization (INT4):** 10B * 0.5 bytes = 5 GB weights.
    * Read time = 5 GB / 204.8 GB/s = 24 ms per inference.
    * FPS limit = 1000 / 24 = ~41 FPS.
    * **INT4 quantization alone closes the gap, allowing the system to easily exceed the 30 Hz safety requirement.**
