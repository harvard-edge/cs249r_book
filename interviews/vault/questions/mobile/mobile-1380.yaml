title: Energy-Aware Wake Vision Architecture on Exynos 2400
scenario: You are designing a continuous audio-visual wakeword system for a smartphone powered by the Samsung Exynos 2400 NPU. The system must process an always-on 10 fps video stream while strictly adhering to a 50 mW continuous power budget.
question: How would you design a 50 mW always-on wake vision cascade on Exynos 2400 while minimizing DRAM access?
details:
  realistic_solution: The architecture must aggressively prioritize data locality and minimize DRAM access over simply minimizing MACs. A cascading system should start with an ultra-low-power trigger model that fits entirely within the NPU's SRAM, executing depthwise separable convolutions to maximize the compute-to-memory ratio. Only upon a positive trigger should the system wake up a heavier validation model that accesses the shared LPDDR5X, heavily utilizing INT4 quantization to reduce the memory footprint and the energy cost per weight fetch.
  common_mistake: |
    **The Pitfall:** Focusing solely on reducing MAC operations.
    **The Rationale:** Candidates often minimize the theoretical compute operations to meet power budgets, ignoring the massive energy cost of accessing shared memory.
    **The Consequence:** Fetching weights from the shared 12 GB LPDDR5X consumes orders of magnitude more energy than compute, causing the system to blow past the 50 mW limit.
  napkin_math: |
    1. Energy costs: 1 pJ for an INT8 MAC, 100 pJ for a 32-bit DRAM access.
    2. Naive 10M parameter INT8 model (10 MB/inference, 10 fps): DRAM read energy = (100 MB/s / 4 bytes) * 100 pJ = 2.5 mW (plus compute and spillage, exceeding budget).
    3. Cascaded design: First stage is a 100 KB SRAM-resident network running at 1 GOPS.
    4. First stage energy: 0 mW DRAM access + (1 GOPS * 1 pJ) = 1 mW.
    5. Conclusion: **The SRAM-resident cascade drops continuous DRAM access to zero, keeping power draw securely at ~1 mW, well below the 50 mW limit.**
