title: Apple A17 IPC Skew
scenario: An Apple A17 Pro runs a split language model where the CPU updates the KV cache and the Neural Engine (35 TOPS) runs the linear layers, syncing via CoreMedia buffer queues.
question: Calculate the pipeline stall fraction per token given the NPU computes its chunk in 15ms, the CPU completes updates in 5ms, but IPC adds 3ms of skew per token.
details:
  realistic_solution: The effective bottleneck per token is the 15ms NPU time plus the 3ms IPC context switch penalty, resulting in an 18ms step time. The NPU stalls for the 3ms IPC overhead, while the CPU stalls for the 13ms difference.
  common_mistake: |
    **The Pitfall:** Assuming fully overlapped execution without accounting for IPC.
    **The Rationale:** Candidates assume the step time is simply the max(NPU, CPU) and forget the mandatory context switch overhead incurred per token generation.
    **The Consequence:** They underestimate per-token latency and overestimate overall throughput.
  napkin_math: |
    - NPU compute time = 15ms. CPU compute time = 5ms. IPC overhead = 3ms.
    - Step time = max(15ms, 5ms) + 3ms = 18ms.
    - NPU stall time = 3ms (waiting on IPC).
    - **Total stall fraction = 3ms / 18ms = 16.6%.**
