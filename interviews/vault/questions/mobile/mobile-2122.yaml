title: Apple A17 IPC Skew
scenario: An Apple A17 Pro runs a split language model where the CPU updates the KV
  cache and the Neural Engine (35 TOPS) runs the linear layers, syncing via CoreMedia
  buffer queues.
question: Calculate the pipeline stall fraction per token given the NPU computes its
  chunk in 15ms, the CPU completes updates in 5ms, but IPC adds 3ms of skew per token.
details:
  realistic_solution: The effective bottleneck per token is the 15ms NPU time plus
    the 3ms IPC context switch penalty, resulting in an 18ms step time. The NPU stalls
    for the 3ms IPC overhead, while the CPU stalls for the 13ms difference.
  common_mistake: Assuming fully overlapped execution without accounting for the mandatory
    IPC context switch overhead incurred per token generation.
  napkin_math: Step = 15ms + 3ms = 18ms. NPU stall = 3ms. Total stall fraction = 3
    / 18 = 16.6%.
