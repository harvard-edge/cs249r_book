title: Diagnose Attention Softmax Precision Loss on Mobile NPU
scenario: A mobile LLM deployment shows coherent output for short prompts but produces incoherent text for 512+ token contexts. The model uses INT8 activations throughout, including attention logits before softmax. The NPU performs softmax in INT8 with range [-128, 127].
question: Why do INT8 attention logits on a mobile NPU degrade the LLM from 89% at 128 tokens to 61% at 512 tokens?
details:
  realistic_solution: Attention logits before Softmax require high dynamic range. Quantizing the QK^T accumulators to INT8 prior to exponentiation applies a linear quantization error that the Softmax function subsequently magnifies exponentially. Over 512 tokens, this massive multiplicative noise accumulates in the denominator, destroying the attention probability distribution. The fix requires retaining logits in FP16/BF16, or utilizing online Softmax from INT32 accumulators.
  common_mistake: |
    **The Pitfall:** Quantizing attention logits before softmax.
    **The Rationale:** Candidates assume INT8 is safe everywhere since the model is small, including the accumulator prior to softmax exponentiation.
    **The Consequence:** The small quantization error is exponentially magnified by the softmax function, destroying the model's focus at longer context lengths.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Max attention logit at 512 tokens: ~4.5.
       - INT8 quantization scale: ~0.05.
    2. **Calculations:**
       - Max quantization error: ±0.025.
       - Error magnification in Softmax: exp(x + 0.025) ≈ exp(x) * 1.025 (2.5% error per logit).
    3. **Conclusion & Interpretation:**
       - **Result: 2.5% multiplicative noise.** The network is **Precision-Bound**; the INT8 accumulator destroys sequence coherence.
