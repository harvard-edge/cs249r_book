title: Mobile Federated Sync Overhead
scenario: A Snapdragon 8 Gen 3 phone finishes a federated learning round on a 20 MB
  INT8 model. The 5G uplink bandwidth is 40 Mbps.
question: Calculate the time required to sync the model update to the cloud.
visual:
  kind: svg
  path: mobile-1980.svg
  alt: Diagram showing mobile device transmitting data to cloud server.
  caption: Mobile to Cloud uplink bottleneck.
details:
  realistic_solution: Uplink is 40 Megabits per second = 5 Megabytes per second (MB/s).
    Payload is 20 MB. Sync time = 20 MB / 5 MB/s = 4.0 seconds.
  common_mistake: Confusing Megabits (Mbps) with Megabytes (MB/s) and calculating
    20 / 40 = 0.5 seconds.
  napkin_math: 20 / (40 / 8) = 4.0 s
