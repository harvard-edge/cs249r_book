title: LLM Context Thrashing
scenario: A 7B parameter LLM (4-bit quantized = 3.5GB) is running on a Snapdragon
  8 Gen 3 phone with 12GB RAM. With a 4096 token context window, users complain about
  severe system slow-downs when switching between the LLM and other apps.
question: Evaluate the OS-level memory hierarchy interactions causing this slowdown
  and propose a KV-cache management strategy to mitigate it.
details:
  realistic_solution: 'The 3.5GB model plus the dynamic KV cache consumes a massive
    portion of the phone''s resident memory. When backgrounded, the OS aggressively
    pages the LLM out to storage. Mitigation: implement a ring-buffer for the KV cache
    and proactively evict non-essential tokens (e.g., Heavy-Hitter oracle) to keep
    the footprint safely under the OS OOM threshold.'
  common_mistake: Blaming the NPU compute speed for the lag, when the actual issue
    is catastrophic OS-level page faults and storage thrashing.
  napkin_math: 7B params * 0.5 bytes = 3.5 GB weights. 4096 tokens * 4000 dim * 2
    (K,V) * 2 bytes * 32 layers = ~2.1 GB KV cache. Total > 5.5 GB.
