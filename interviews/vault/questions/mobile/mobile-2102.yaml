title: LLM Context Thrashing
scenario: A 7B parameter LLM (4-bit quantized = 3.5GB) is running on a Snapdragon 8 Gen 3 phone with 12GB RAM. With a 4096 token context window, users complain about severe system slow-downs when switching between the LLM and other apps.
question: Evaluate the OS-level memory hierarchy interactions causing this slowdown and propose a KV-cache management strategy to mitigate it.
details:
  realistic_solution: 'The 3.5GB model plus the dynamic KV cache consumes a massive portion of the phone''s resident memory. When backgrounded, the OS aggressively pages the LLM out to storage. Mitigation: implement a ring-buffer for the KV cache and proactively evict non-essential tokens (e.g., Heavy-Hitter oracle) to keep the footprint safely under the OS OOM threshold.'
  common_mistake: |
    **The Pitfall:** Blaming the NPU compute speed for the lag.
    **The Rationale:** Candidates misdiagnose OS-level page faults and storage thrashing as compute bottlenecks.
    **The Consequence:** Attempting to optimize model compute operations instead of managing the memory footprint.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model Parameters: 7B.
       - Precision: 4-bit (0.5 bytes).
       - KV Context: 4096 tokens.
    2. **Calculations:**
       - Weight Memory: 7B params * 0.5 bytes = 3.5 GB.
       - KV Cache Memory (4K Context): 4096 * 4000 dim * 2 (K,V) * 2 bytes * 32 layers = ~2.1 GB.
       - Total Memory Footprint: 3.5 GB + 2.1 GB = 5.6 GB.
       - OS Impact: 5.6 GB + standard Android overhead crosses the 12GB threshold, causing page faults.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** The massive 5.6 GB footprint forces aggressive OS paging.
