math_issues:
- 1.0 / (50/127) = 2.54. Rounding to the nearest integer yields bucket 3, not bucket 2. Bucket 3 corresponds
  to a recovered value of 1.18 and an error of 18%. Getting bucket 2 (0.786) and a 21% error implies integer
  truncation or flooring rather than standard rounding to nearest.
