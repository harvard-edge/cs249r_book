title: 'Kernel Fusion: Recall — Arithmetic Intensity and Mobile Fusion Impact'
scenario: For an elementwise ReLU operation on a 4096-element FP16 tensor on Snapdragon 8 Gen 3, compute the arithmetic intensity and determine whether fusing it with the preceding operation would reduce latency.
question: What is the arithmetic intensity of a ReLU on a 4096-element FP16 tensor, and how much latency does kernel fusion save?
details:
  realistic_solution: 'ReLU on 4096-element FP16: 1 FLOPs, 2 bytes read + 2 bytes write = 4 bytes per element. AI = 1/4 = 0.25 FLOPs/byte. Ridge point Snapdragon: 45,000 / 68 = 662 FLOPs/byte. Far below ridge → extremely memory-bound. But the tensor is only 4096 × 4B = 16KB. Time = 16KB / 68 GB/s = 0.235µs. Fusion saves 1 kernel launch (10µs) and 16KB intermediate write/read = 16KB / 68 GB/s = 0.235µs. Total save: 10.235µs.'
  common_mistake: |
    **The Pitfall:** Claiming large latency savings for fusing tiny elementwise ops in mobile decode workloads.
    **The Rationale:** Engineers blindly apply kernel fusion principles learned from massive cloud training jobs to tiny, batch-1 edge deployments.
    **The Consequence:** Wasting optimization effort on micro-benchmarks while ignoring the massive weight-loading bottlenecks of autoregressive decoding.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Layer: ReLU on 4096-element FP16 tensor.
       - Hardware: Snapdragon 8 Gen 3 (45 TOPS, 68 GB/s). Launch overhead: 10µs.
    2. **Calculations:**
       - Data Movement: 4096 * 2B (read) + 4096 * 2B (write) = 16KB.
       - Math: 4096 FLOPs.
       - AI: 4096 / 16384 = 0.25 FLOPs/byte. (Ridge point: 662 FLOPs/byte).
       - Kernel Time: 16KB / 68 GB/s = 0.235µs. Launch overhead = 10µs. Total = 10.235µs.
    3. **Conclusion & Interpretation:** Fusing saves exactly **10.235µs**. Over a 33ms budget, this is a negligible improvement for a **Memory-Bound** op.
