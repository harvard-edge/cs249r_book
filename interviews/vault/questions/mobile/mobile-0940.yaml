title: 'KV-Cache: Analyze KV Cache Memory Pressure on A17 Pro'
scenario: 'A 1B LLM on a mobile SoC (8GB unified memory) shows increasing latency as conversation grows longer. At 512 tokens context: 30 tok/sec. At 2048 tokens: 18 tok/sec. At 4096 tokens: 11 tok/sec.'
question: How would you analyze why KV cache growth causes this degradation and compute the expected latency scaling?
details:
  realistic_solution: |
    Each decoding step requires reading the full KV cache for all previously generated tokens from DRAM. As the context window grows, the time spent reading the KV cache increases linearly. The FLOPs per token remain constant, meaning the workload fundamentally shifts to being memory-bandwidth bound at long contexts.
  common_mistake: |
    **The Pitfall:** Blaming compute or framework overhead for the slowdown.
    **The Rationale:** Candidates assume the compute cost of attention scales quadratically and causes the bottleneck, forgetting that decoding is dominated by memory bandwidth, not compute.
    **The Consequence:** Attempting to optimize compute kernels instead of addressing memory access patterns or using techniques like Grouped-Query Attention (GQA).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1B model: 24 layers, 8 KV heads, head_dim 128.
       - Unified memory bandwidth: ~68 GB/s.
       - Model weights (4-bit): 500MB.
       - Framework efficiency: ~24%.
    2. **Calculations:**
       - KV per token: 24 * 2 * 8 * 128 * 2B = 98.3 KB.
       - At seq=512: KV read = 512 * 98.3 KB = 50.3 MB.
       - KV read time: 50.3 MB / 68 GB/s = 0.74 ms.
       - Weight load time: 500 MB / 68 GB/s = 7.35 ms.
       - Total time (seq=512) = 7.35 + 0.74 = 8.09 ms.
       - Theoretical rate: 1000 / 8.09 = 123.6 tok/sec. Observed: 30 tok/sec (24% efficiency).
       - At seq=2048: KV = 201 MB. KV read time = 2.96 ms. Total = 7.35 + 2.96 = 10.31 ms. Rate (24% eff) = 23.3 tok/sec.
       - At seq=4096: KV = 402 MB. KV read time = 5.91 ms. Total = 7.35 + 5.91 = 13.26 ms. Rate (24% eff) = 18.1 tok/sec.
    3. **Conclusion & Interpretation:**
       - **KV read time scales linearly, driving throughput down as sequence length increases. Bottleneck: Memory-Bound.**
