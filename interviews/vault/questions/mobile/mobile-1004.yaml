title: 'Network Bandwidth Bottlenecks: Diagnose LPDDR5X Bandwidth Saturation on Snapdragon'
scenario: 'A Snapdragon 8 Gen 3 device (16GB LPDDR5X, 77 GB/s) shows all ML tasks
  running at 60% of expected throughput simultaneously: LLM TPOT 32ms vs. 19.5ms expected,
  camera inference 16ms vs. 10ms expected. Memory profiler shows 73GB/s bus utilization.
  Diagnose the root cause and identify which task to prioritize.'
question: Why do LLM TPOT and camera inference both hit 60% throughput when Snapdragon
  LPDDR5X bus use reaches 73 GB/s?
details:
  realistic_solution: '73GB/s / 77GB/s = 94.8% LPDDR5X utilization. At >90% utilization,
    queuing delays cause non-linear latency increase (M/M/1 queue: latency = service_time
    / (1-\u03c1). At \u03c1=0.95: 20\u00d7 mean service time inflated). LLM: 1.5/77=19.5ms expected.
    Observed 32ms: \u03c1=19.5/32=0.61 effective. But with queuing: 19.5/(1-0.95)=390ms?
    Observed 32ms suggests moderate saturation. Fix: reduce camera inference from
    10ms (15GB/s) to every other frame (7.5GB/s avg). Bus: 73-7.5=65.5GB/s = 85% utilization
    \u2192 latency normalizes. LLM TPOT: ~22ms, camera: ~10ms on active frames.'
  common_mistake: Trying to optimize each model independently when the root cause
    is shared bandwidth saturation; you cannot speed up individual models without
    reducing another task's bandwidth.
  napkin_math: '73GB/s / 77GB/s = \u03c1=0.948. Queuing latency increases non-linearly at high utilization. LLM expected 19.5ms, actual 32ms = 1.64\u00d7 inflation at \u03c1=0.948. Fix: drop camera from 30fps to 15fps: 15GB/s / 2 = 7.5GB/s. New bus total = 73 - 7.5 = 65.5GB/s (\u03c1=0.85). At \u03c1=0.85, empirical bus contention is vastly reduced, bringing latency inflation down to ~1.13\u00d7 \u2192 LLM TPOT \u2248 19.5 \u00d7 1.13 \u2248 22ms. Camera model throughput is halved but system latency meets interactive deadlines.'
