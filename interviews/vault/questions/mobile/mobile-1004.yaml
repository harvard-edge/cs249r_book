title: 'Network Bandwidth Bottlenecks: Diagnose LPDDR5X Bandwidth Saturation on Snapdragon'
scenario: A mobile device shows all ML tasks running at 60% of expected throughput simultaneously. An LLM TPOT is 32ms vs. 19.5ms expected, and a camera inference model is 16ms vs. 10ms expected. The memory profiler shows high bus utilization (73 GB/s).
question: Why do LLM TPOT and camera inference both hit 60% throughput when memory bus use reaches saturation, and how do you fix it?
details:
  realistic_solution: '73GB/s / 77GB/s = 94.8% LPDDR5X utilization. At >90% utilization, queuing delays cause non-linear latency increase (M/M/1 queue: latency = service_time / (1-ρ). Observed 32ms suggests moderate saturation. Fix: reduce camera inference from 10ms (15GB/s) to every other frame (7.5GB/s avg). Bus: 73-7.5=65.5GB/s = 85% utilization → latency normalizes. LLM TPOT: ~22ms, camera: ~10ms on active frames.'
  common_mistake: |
    **The Pitfall:** Trying to optimize each model independently.
    **The Rationale:** Candidates fail to realize the root cause is shared memory bandwidth saturation and that you cannot speed up one task without reducing another's bandwidth usage.
    **The Consequence:** Wasted engineering effort on model-level optimizations that yield no system-level latency improvements.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - System bandwidth limit: ~77 GB/s.
       - Current Util: 73 GB/s (94.8% ρ).
       - LLM TPOT (expected vs actual): 19.5ms vs 32ms.
    2. **Calculations:**
       - Camera bandwidth reduction via 15fps: 15 GB/s / 2 = 7.5 GB/s saved.
       - New util: (73 - 7.5) / 77 = 85% (ρ = 0.85).
       - Queuing delays drop sub-linearly under 90% ρ.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** Shared bus contention inflates latency via queueing; dropping camera fps fixes system-wide TPOT.
