title: 'Network Bandwidth Bottlenecks: Diagnose LPDDR5X Bandwidth Saturation on Snapdragon'
scenario: A Snapdragon 8 Gen 3 device (16GB LPDDR5X, 77 GB/s) shows all ML tasks running at 60% of expected throughput simultaneously. An LLM TPOT is 32ms vs. 19.5ms expected, and a camera inference model is 16ms vs. 10ms expected. The memory profiler shows 73GB/s bus utilization.
question: "Why do LLM TPOT and camera inference both hit 60% throughput when Snapdragon LPDDR5X bus use reaches 73 GB/s, and how do you fix it?"
details:
  realistic_solution: '73GB/s / 77GB/s = 94.8% LPDDR5X utilization. At >90% utilization,
    queuing delays cause non-linear latency increase (M/M/1 queue: latency = service_time
    / (1-\u03c1). At \u03c1=0.95: 20\u00d7 mean service time inflated). LLM: 1.5/77=19.5ms expected.
    Observed 32ms: \u03c1=19.5/32=0.61 effective. But with queuing: 19.5/(1-0.95)=390ms?
    Observed 32ms suggests moderate saturation. Fix: reduce camera inference from
    10ms (15GB/s) to every other frame (7.5GB/s avg). Bus: 73-7.5=65.5GB/s = 85% utilization
    \u2192 latency normalizes. LLM TPOT: ~22ms, camera: ~10ms on active frames.'
  common_mistake: |
    **The Pitfall:** Trying to optimize each model independently.
    **The Rationale:** Candidates fail to realize the root cause is shared memory bandwidth saturation and that you cannot speed up one task without reducing another's bandwidth usage.
    **The Consequence:** Wasted engineering effort on model-level optimizations that yield no system-level latency improvements.
  napkin_math: |
    - Current Bandwidth Utilization: 73 GB/s / 77 GB/s = 94.8% (ρ = 0.948).
    - Expected LLM TPOT: 19.5ms. Actual: 32ms (1.64× inflation due to queuing).
    - Fix: Drop camera inference from 30fps to 15fps.
    - Camera bandwidth reduction: 15 GB/s / 2 = 7.5 GB/s.
    - New bus utilization: (73 - 7.5) / 77 = 85% (ρ = 0.85).
    - **Conclusion:** Reduced contention normalizes queuing, bringing LLM TPOT to **~22ms**.
