math_issues:
- The prompt states a 2.5x to 3x difference in IPC (Instructions Per Clock). Since the clock speed also
  differs by 1.66x (3.0 GHz vs 1.8 GHz), the total performance difference would be roughly 5x (3 * 1.66),
  making the LITTLE core execution time 250ms (50ms * 5). The calculation '50ms * 3 = 150ms' seemingly
  applies the IPC ratio as the total performance ratio, ignoring the clock speed differential.
