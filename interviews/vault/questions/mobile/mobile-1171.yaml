title: Guardrail CPU Fallback on Hexagon NPU
scenario: To comply with our organizational AI accountability framework, we deployed a local 3B-parameter LLM alongside a 100M-parameter RoBERTa-based toxicity guardrail on a flagship device featuring the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). Despite the platform's capable heterogeneous CPU+GPU+NPU architecture and ample shared 12-16 GB LPDDR5X memory, the system exhibits severe UI stuttering and battery drain precisely when the output guardrail is invoked. Profiling shows memory capacity isn't the bottleneck, but NPU utilization drops near zero while the CPU maxes out during the safety check.
question: Why does invoking a 100M FP32 toxicity guardrail max the CPU and stall a Snapdragon 8 Gen 3 LLM app?
details:
  realistic_solution: The root cause is an operator precision mismatch causing a CPU fallback. The Hexagon NPU excels at INT8 operations, but the FP32 guardrail model forces the heterogeneous scheduler to execute it on the CPU. This causes expensive context switching and memory bandwidth thrashing across the shared LPDDR5X bus. The fix is to quantize the guardrail model to INT8 and ensure all its operators are supported by the Hexagon NPU architecture, allowing both the LLM and the Responsible AI guardrails to run seamlessly on the neural processor.
  common_mistake: |
    **The Pitfall:** Assuming the shared LPDDR5X memory is exhausted or blaming the LLM sequence length.
    **The Rationale:** Candidates overlook hardware-software co-design, specifically that FP32 models cannot be accelerated efficiently by INT8-optimized NPUs.
    **The Consequence:** They fail to quantize the guardrail, leaving it stuck causing a CPU bottleneck.
  napkin_math: |
    1. CPU compute (FP32): ~50 GFLOPs takes ~200ms, causing severe UI stutter.
    2. NPU compute (INT8): 45 TOPS available.
    3. NPU time (assuming 10% utilization): 50 GOPs / 4.5 TOPS = ~11ms.
    4. **Conclusion: Quantizing the 100M model to INT8 moves it to the NPU, dropping latency from 200ms to 11ms.**
