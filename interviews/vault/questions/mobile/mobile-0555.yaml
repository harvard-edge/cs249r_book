title: The Stuttering Translator
scenario: You are the lead ML Systems Engineer on a new real-time translation feature for a flagship mobile
  app. The feature uses a 1B parameter on-device model. The user experience goal is for the translation
  to appear instantly as the user types. During testing on an Apple A17 Pro-based phone, you observe a
  frustrating ~500ms delay before the first translated word appears (Time To First Token), but subsequent
  words generate quickly at ~50ms per word (Time Per Output Token). Your profiler shows NPU utilization
  is spiky and often near 0%, even as the input text is arriving. Your current inference engine uses a
  static batch size of 4. How do you diagnose and solve this initial latency problem?
details:
  realistic_solution: The root cause is the use of static batching in a latency-critical, interactive
    application. The system is waiting to accumulate a batch of 4 tokens before sending them to the NPU.
    This is a throughput optimization that kills 'time-to-first-token' latency. When a user types the
    first word, the tokenized requests enter a queue and wait, either until 4 tokens have arrived or a
    timeout is hit. This queuing delay is the source of the initial lag.
  common_mistake: Engineers frequently misdiagnose this as a model performance problem (TPOT) rather than
    a scheduling problem (TTFT). They might assume the model is too slow or the hardware is too weak,
    when in reality the expensive NPU is sitting idle waiting for a batch that's slow to fill. They try
    to optimize the wrong thing—the inference pass—instead of the time the request spends waiting in a
    queue.
  napkin_math: '1B params INT8 = 1GB model. Static batch=4: system waits for 4 tokens. Typing speed: ~2
    words/s ≈ 4 tokens/s → 1 token every 250ms. Wait for batch of 4: 4×250ms = 1000ms worst case, ~500ms
    avg. Fix: continuous batching with batch=1. TTFT becomes: prefill 1 token through 1GB model. A17 Pro
    NPU at 35 TOPS, 51.2 GB/s BW: prefill is memory-bound, ~1GB/51.2GB/s ≈ 20ms TTFT. 25× improvement.'
  options:
  - The 1B parameter model is too large, causing high prefill latency. The model must be quantized or
    pruned further.
  - The Apple A17 Pro's NPU (35 TOPS) is not powerful enough for this task, leading to thermal throttling
    and latency spikes.
  - The static batch size of 4 forces a queuing delay for the first token. You should switch to a continuous
    batching strategy to process tokens immediately as they arrive.
  - The bottleneck is memory bandwidth between the SoC's LPDDR5 RAM and the NPU. You should optimize data
    types and memory access patterns.
  correct_index: 2
