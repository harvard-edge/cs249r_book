title: 'Kernel Fusion: Implement Fused Conv+BN+ReLU for Mobile CNN on Snapdragon'
scenario: 'Implement a fused Conv+BN+ReLU layer for MobileNetV3 inference on Snapdragon 8 Gen 3 Hexagon DSP (45 TOPS INT8). The layer processes 112x112x32 activations with 32->64 channel 3x3 conv.'
question: 'How would you specify the fusion implementation, verify correctness, and quantify memory bandwidth savings?'
details:
  realistic_solution: 'BN fold: pre-compute fused conv weight W'' = W × γ/σ and bias b'' = β - γμ/σ for each output channel. At inference: Conv(x) with W'',b'' and ReLU = Conv+BN+ReLU. This is a pre-processing step, not a runtime fusion.'
  common_mistake: 'Not folding BN into conv at inference (BN weights can be absorbed into conv weights and bias). This is the most common and impactful mobile fusion.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Input: 112x112x32 activations.
    - Conv 3x3x32->64: 18,432 INT8 params (18KB).
    - BN params: γ,β,μ,σ for 64 channels = 1KB.
    - Snapdragon LPDDR5 bandwidth: 68 GB/s.
    - Target: 33ms budget (30 fps).

    **Calculations:**
    - Folded weights pre-computation: 64 * 18,432 = 1.18M ops (one-time).
    - Unfused memory traffic: Conv output 112x112x64 * 1 byte = 802KB written + read for BN = ~1.6MB.
    - Fused memory savings per layer: 1.6MB.
    - Time saved per layer: 1.6MB / 68 GB/s = 0.024ms.
    - Total savings for ~20 layers: 20 * 0.024ms = 0.47ms.

    **Conclusion & Interpretation:**
    - **Result: 0.47ms (Memory-Bound).** Savings constitute 1.4% of the 33ms frame budget—modest but computationally free and crucial for aggregate efficiency.
