title: Hexagon NPU Transformer Scheduling for LLMs
scenario: You are tasked with optimizing the deployment of a large language model (LLM) inference pipeline
  on a device powered by the Snapdragon 8 Gen 3 Hexagon NPU, which provides 45 TOPS (INT8) and 12-16 GB
  LPDDR5X memory. The LLM consists of multiple transformer blocks, each with attention mechanisms and
  feed-forward networks, leading to a complex computation graph with numerous matrix multiplications,
  convolutions, and custom element-wise operations. Describe how you would design the operator scheduling
  strategy to minimize latency and maximize throughput. Focus specifically on techniques for efficient
  memory reuse across intermediate tensors, scheduling operators for maximum parallel execution on the
  NPU's available cores, and identifying opportunities for layer fusion (e.g., fusing element-wise operations
  with preceding matrix multiplications) to reduce memory bandwidth requirements and kernel launch overheads.
  Consider the impact of the 12-16 GB LPDDR5X memory on your scheduling decisions.
question: "How would you design transformer operator scheduling on Hexagon NPU to maximize throughput and minimize LPDDR5X traffic?"
details:
  realistic_solution: 'A realistic solution involves a multi-pronged approach: 1. Graph Analysis and Partitioning:
    Analyze the computation graph to identify data dependencies and potential parallel execution paths.
    Partition the graph into subgraphs that can run concurrently. 2. Memory Aware Scheduling: Implement
    a dynamic memory allocation and reuse strategy. Prioritize in-place operations where possible and
    schedule operators that consume common intermediate tensors close together in execution to maximize
    cache hits and minimize re-fetching from LPDDR5X. Use graph coloring algorithms or similar techniques
    for memory buffer management. 3. Parallelism Exploitation: Leverage the NPU''s multi-core architecture
    by scheduling independent operations on different cores. 4. Hardware-Aware Layer Fusion: Profile the
    model on the Hexagon NPU to identify bottlenecks. Apply compiler-driven or manual fusion for specific
    operations (e.g., MatMul-Add-ReLU, Conv-BN-ReLU) that are known to benefit from fusion on Hexagon
    architecture. 5. Double Buffering: For critical data transfers or computation stages, consider double
    buffering to overlap data movement with computation, hiding memory latency.'
  common_mistake: Overlooking memory locality and bandwidth limitations, leading to frequent data transfers
    between NPU and LPDDR5X, or failing to identify independent subgraphs for true parallel execution,
    resulting in underutilized NPU cores. Another common mistake is applying generic fusion strategies
    without considering the Hexagon NPU's specific instruction set and hardware capabilities, which might
    lead to performance degradation rather than improvement.
  napkin_math: 'For a model with an intermediate tensor of 1GB (INT8), moving it from LPDDR5X to NPU cache
    and back consumes 2GB of bandwidth. If the LPDDR5X has a bandwidth of 60 GB/s, this transfer alone
    takes ~33 ms. If this happens frequently without reuse, it can dominate latency. Consider an NPU with
    45 TOPS (INT8). If a layer requires 45 Giga-operations (GOPS), theoretically it could be computed
    in 45 * 10^9 / (45 * 10^12) = 0.001 seconds (1 ms). However, if memory access takes 80% of the time
    due to poor scheduling and memory reuse, the actual wall-clock time is dominated by the 33ms memory
    transfer, not the 1ms compute. Example: A transformer block with 20 GOPS would take 20e9 / 45e12 =
    0.44ms compute time if perfectly NPU-bound, but memory bottlenecks can inflate this to 10-50ms. For
    a 12-16GB LPDDR5X memory, if a model''s total intermediate tensors exceed available on-chip SRAM/cache,
    spills to main memory are inevitable, making efficient scheduling critical.'
