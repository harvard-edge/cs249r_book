title: Mobile FL Checkpoint Wear
scenario: An on-device federated learning task runs overnight on a Snapdragon 8 Gen 3, pausing whenever the user unplugs the phone.
question: Evaluate the trade-off between checkpointing frequency and flash storage wear-out for this interrupted mobile training job.
details:
  realistic_solution: Frequent checkpointing minimizes lost training progress during sudden unplug events but causes severe write-amplification and wear on the device's eMMC/UFS flash storage.
  common_mistake: |
    **The Pitfall:** Treating mobile flash storage identically to robust cloud NVMe.
    **The Rationale:** Engineers completely ignore the strict terabytes-written (TBW) endurance limits of mobile eMMC/UFS storage.
    **The Consequence:** Severe write-amplification causing permanent, physical hardware damage to the device's storage.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Checkpoint size: 100MB.
       - Frequency: Every mini-batch (approx 1,000 times a night).
       - Storage type: Mobile eMMC/UFS flash.
    2. **Calculations:**
       - Total Writes Per Night: 100MB * 1,000 = 100,000 MB = 100 GB.
       - Annual Write Load: 100 GB/day * 365 = 36.5 TB/year.
    3. **Conclusion & Interpretation:**
       - **Result: Storage-Endurance-Bound**. Writing 100 GB per night creates massive write-amplification that will rapidly exhaust the TBW (Terabytes Written) limit of mobile flash memory.
