title: Mobile FL Checkpoint Wear
scenario: An on-device federated learning task runs overnight on a Snapdragon 8 Gen
  3, pausing whenever the user unplugs the phone.
question: Evaluate the trade-off between checkpointing frequency and flash storage
  wear-out for this interrupted mobile training job.
details:
  realistic_solution: Frequent checkpointing minimizes lost training progress during
    sudden unplug events but causes severe write-amplification and wear on the device's
    eMMC/UFS flash storage. An optimal policy checkpoints only at coarse boundaries
    or when battery level drops to specific thresholds.
  common_mistake: Treating mobile flash storage like cloud NVMe and ignoring terabytes-written
    (TBW) device limits.
  napkin_math: Writing a 100MB model 1000 times a night is 100GB/day.
