title: 'Dataset Curation: Realize Training Data Requirements for On-Device LLM Fine-Tuning'
scenario: Realize the complete data requirements for fine-tuning a 1B LLM for email composition assistance. The model must fit in memory during inference (4-bit quantized) and fine-tuning must complete in < 5 minutes in the background.
question: "What data and LoRA fine-tuning plan lets a 1B email assistant fit and train on mobile constraints within five minutes?"
details:
  realistic_solution: '4-bit quantized 1B model = 500MB inference. Fine-tuning: LoRA rank-16 adds 2M trainable params. Training data: 1,000 user email examples × 512 tokens avg. Fine-tuning must use float16 LoRA weights while keeping quantized base frozen.'
  common_mistake: |
    **The Pitfall:** Trying to fine-tune the full model on-device instead of using parameter-efficient adapters like LoRA.
    **The Rationale:** Candidates fail to account for the massive memory requirements of optimizer states and activations for full-parameter updates.
    **The Consequence:** Immediate Out-Of-Memory (OOM) errors and failure to meet the 5-minute background training deadline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 1B parameters (4-bit quantized = 500MB).
       - LoRA: Rank-16, 2M parameters (FP16).
       - Data: 1,000 examples, 512 tokens each.
       - Compute: 2 TFLOPS (Mobile GPU).
    2. **Calculations:**
       - Memory: 500MB base + 4MB LoRA + 16MB Optimizer (AdamW) + 64MB Activations = 584MB.
       - Tokens: 1,000 * 512 * 3 epochs = 1.536M tokens.
       - Compute: 6 FLOPs/param * 2M params * 1.536M tokens = 18.4B FLOPs.
       - Time: 18.4 * 10^9 FLOPs / (2 * 10^12 FLOPS) = 9.2 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound (Feasible)**
       - The memory footprint is tiny (~584MB), and the training completes in ~10 seconds, well within the 5-minute budget.
