title: Multi-Adapter Session Management on Mobile
scenario: A mobile app supports 5 personalized LLM modes (professional, casual, technical, creative, concise)
  each backed by a separate rank-4 LoRA adapter. Design the session management system for A17 Pro with
  8 GB RAM.
question: "How would you design the session management system for A17 Pro with 8 GB RAM?"
details:
  realistic_solution: 'Pre-compile all 5 merged model variants at app install time (5 × 2 GB INT4 = 10
    GB on disk, 2 GB in RAM per active model). Only load the active variant into RAM. Mode switches require:
    unload current model (release ~2 GB) and load new model (~50ms from NVMe at 6 GB/s). For low-latency
    switching (<200ms), keep 2 most-recently-used models in RAM (2 × 2 GB = 4 GB, leaving 4 GB for OS
    and other apps). Use MLModelConfiguration.computeUnits = .cpuAndNeuralEngine for background loading
    while current model serves.'
  common_mistake: Loading all 5 adapters into RAM simultaneously and switching by swapping the active
    adapter pointer. While each adapter is small (1.6 MB), the overhead is in recompiling the Core ML
    graph for each switch, not adapter size.
  napkin_math: 'A17 Pro RAM: 8 GB. 1B INT4 model: 0.5 GB each. 5 pre-compiled models on disk: 5 × 0.5
    GB = 2.5 GB. Load from NVMe (A17 Pro supports ~3 GB/s storage): 0.5 GB / 3 GB/s = 167ms switch latency.
    Keep 2 models in RAM: 2 × 0.5 GB = 1 GB RAM, switch cost = 0 for cached models. LRU eviction: on 3rd
    unique mode switch, pay 167ms load cost.'
