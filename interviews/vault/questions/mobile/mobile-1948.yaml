title: KV Cache Placement Penalty
scenario: A mobile transformer implementation on the Snapdragon 8 Gen 3 stores its
  KV cache entirely in the main LPDDR5 RAM.
question: What is the primary architectural penalty of this memory placement compared
  to localized NPU SRAM?
details:
  realistic_solution: Accessing off-chip LPDDR5 RAM incurs a massive power and latency
    penalty compared to on-chip SRAM. The repeated reading of the KV cache for every
    token will rapidly drain the battery and introduce memory bandwidth bottlenecks.
  common_mistake: Focusing solely on capacity limits rather than the order-of-magnitude
    difference in energy-per-bit fetched.
  napkin_math: DRAM energy ~100x SRAM energy
