title: 'Fault Tolerance: Optimize Checkpoint Storage Budget for Low-Storage Mobile Devices'
scenario: Your personalization system on A17 Pro (35 TOPS, 8GB RAM) runs on devices with only 64GB storage.
  Users have on average 58GB used (6GB free). Your current checkpointing strategy keeps 30 checkpoints
  × 24MB = 720MB. Users complain about storage usage. Optimize to < 50MB total checkpoint storage while
  maintaining acceptable fault tolerance.
details:
  realistic_solution: NPU inference latency for standard CNN models is in the sub-10ms range on Snapdragon
    8 Gen 3's 45 TOPS NPU. The time unit should be milliseconds, not seconds.
  common_mistake: Eliminating checkpoints entirely to save space; not realizing that most of the checkpoint
    is optimizer state that can be discarded for crash recovery.
  napkin_math: 'Snapdragon 8 Gen 3: 45 TOPS INT8. ResNet-50 (4.1 GMACs, INT8): 4.1G × 2 / 45T = 0.182s...
    wait: 4.1 GMACs = 4.1G × 2 ops = 8.2 GOps. 8.2G / 45T = 0.00018s = 0.18ms? No: 45 TOPS = 45×10^12
    ops/s. 8.2×10^9 / 45×10^12 = 0.000182s ≈ 0.18ms. But with batching overhead and actual NPU utilization
    ~50%: 0.18ms / 0.5 ≈ 0.36ms. For larger model with ~100 GMACs: 200G / 45T = 4.4ms = 2.2ms at 50% util?
    More realistically for a model needing 2.2ms: ~50 GMACs at 45 TOPS with ~50% utilization. Key: 2.2ms
    (not 2.2 seconds).'
