title: 'A17 Pro NVMe Intermediate State Checkpoint'
scenario: 'A background video rendering pipeline on a mobile SoC processes complex frame effects but is suspended mid-frame by the OS. It must checkpoint a 4 MB intermediate FP16 feature map to NVMe flash (1 GB/s write speed).'
question: 'Analyze the storage latency to write the checkpoint and determine if it is faster to recompute the frame (recompute takes 15ms).'
visual:
  kind: svg
  path: mobile-1876.svg
  alt: 'A bar chart comparing the 15ms recompute time against the combined 8ms read/write checkpointing time.'
  caption: 'Recompute vs Checkpoint Latency'
details:
  realistic_solution: 'The size of the intermediate feature map is 4 MB. Writing to NVMe flash at 1 GB/s (1000 MB/s) takes 4 MB / 1000 MB/s = 4 milliseconds. Since 4ms to checkpoint and 4ms to restore (total 8ms overhead) is strictly less than the 15ms required to recompute the frame from scratch, checkpointing the intermediate state is highly advantageous.'
  common_mistake: |
    **The Pitfall:** Failing to account for the read-back time (restoration) when calculating total overhead.
    **The Rationale:** Candidates compare the write time (4ms) directly against the recompute time, forgetting that the data must be loaded back to be useful.
    **The Consequence:** The overhead estimate is off by 50%, potentially leading to poor architectural decisions if the margin was closer.
  napkin_math: |
    **Assumptions & Constraints:**
    - Checkpoint size: 4 MB FP16 feature map. Recompute time: 15ms.
    - Mobile NVMe Speed: 1000 MB/s (1 GB/s).

    **Calculations:**
    - Write Latency: 4 MB / 1000 MB/s = 4ms.
    - Read Latency: 4 MB / 1000 MB/s = 4ms.
    - Total Overhead: 4ms + 4ms = 8ms.

    **Conclusion & Interpretation:**
    - **Result: 8ms (Compute-Bound)**. The total checkpointing overhead of 8ms is strictly less than the 15ms required to recompute the frame, making state checkpointing optimal.
