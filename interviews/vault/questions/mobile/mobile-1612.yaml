title: LLM Deployment Feasibility on Samsung Exynos 2400 NPU
scenario: As a senior ML engineer at a mobile AI startup, you are tasked with deploying a new Large Language Model (LLM) onto a flagship smartphone powered by the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). Your initial rough estimate suggests the LLM has approximately 7 billion parameters.
question: "What are your immediate concerns, and how would you perform a quick 'napkin math' estimate to determine if deploying a 7B parameter LLM on this device is achievable?"
details:
  realistic_solution: "A realistic approach involves: \n1.  **Aggressive Quantization**: Assume and plan for 8-bit integer (INT8) quantization for weights and activations as a baseline, and consider mixed-precision or even 4-bit quantization (INT4) for weights if memory remains a bottleneck. \n2.  **Comprehensive Memory Estimation**: Calculate parameter memory based on chosen quantization. Crucially, estimate the KV cache memory, which can grow significantly for long sequence lengths, along with system overhead and intermediate activations. Sum these to get a total peak memory footprint and compare against the 12 GB LPDDR5X. \n3.  **TOPS-to-Latency Mapping**: Roughly estimate the number of operations (e.g., multiply-accumulates) per inference forward pass. Divide this by the NPU's 34.7 TOPS to get a theoretical minimum inference time. Adjust for an estimated NPU utilization factor (e.g., 50-70%) due to real-world inefficiencies and memory access patterns. \n4.  **Hardware-Aware Optimization**: Discuss techniques like knowledge distillation, pruning, and leveraging the specific software SDKs and operator libraries optimized for the Samsung Exynos NPU to maximize performance and minimize resource usage."
  common_mistake: |
    **The Pitfall:** Only considering parameter count in FP32 or ignoring the KV cache memory footprint.
    **The Rationale:** Candidates fail to account for mandatory INT8/INT4 quantization for edge, and forget that generating tokens autoregressively requires substantial memory for the KV cache and OS.
    **The Consequence:** Recommending a deployment that immediately OOMs the device because the OS and context window devour the remaining memory.
  napkin_math: |
    * **Memory Footprint:**
      * Parameters (INT8): 7 billion * 1 byte = 7 GB.
      * KV Cache & OS Overhead: ~1-2 GB (KV) + 3-4 GB (OS).
      * Total Estimated Memory: 7 + 1.5 + 3.5 = 12 GB.
      * **Result:** Fits perfectly or slightly exceeds the 12 GB LPDDR5X. INT4 quantization (3.5 GB) is likely mandatory.
    * **Computational Feasibility:**
      * OPs per token: 7 billion params * 2 = 14 GOPS.
      * NPU Capacity: 34.7 TOPS (34,700 GOPS).
      * Theoretical compute limit: 34,700 / 14 = ~2,400 tokens/sec.
      * **Result:** Compute is vast, but real-world speed is bottlenecked by memory bandwidth (e.g., reading 7 GB weights at 50 GB/s yields only ~7 tokens/sec).
