title: Diagnosing Drift Detection Latency Spikes on Hexagon NPU
scenario: Your team deployed an on-device classification model to the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). To monitor for data drift, a background job calculates the Population Stability Index (PSI) on user embeddings every hour. Users report severe UI stuttering exactly when this drift detection runs, even though the NPU's 45 TOPS INT8 capacity is barely utilized by the main model.
question: "How would you diagnose why the PSI calculation is causing system-wide jank on this heterogeneous architecture?"
details:
  realistic_solution: The root cause is memory bandwidth contention on the shared
    12-16 GB LPDDR5X memory. The PSI calculation, running in FP32 on the CPU, requires
    scanning large arrays of historical embeddings. This sudden, high-bandwidth CPU
    memory access starves the GPU of the memory bandwidth it needs for UI rendering.
    The fix involves throttling the CPU memory access, running the drift job on low-priority
    cores, or heavily downsampling the embeddings before calculation.
  common_mistake: |
    **The Pitfall:** Assuming the issue is NPU thermal throttling or compute saturation.
    **The Rationale:** Candidates see an ML task and assume the NPU is the bottleneck, failing to realize that metrics like PSI require FP32 math which falls back to the CPU.
    **The Consequence:** Wasting time optimizing the NPU or the model, while the actual issue is CPU memory bandwidth contention starving the GPU.
  napkin_math: |
    - Embeddings Size: 50,000 events × 512 dimensions × 4 bytes = 102.4 MB.
    - Total Read Volume: 102.4 MB (current) + 102.4 MB (baseline) = 204.8 MB.
    - UI Stutter Cause: A sudden >200 MB read burst on a high-priority CPU thread blocks the GPU from its 8 MB frame buffer for 10-15 ms.
    - Frame Deadline: 16.6 ms (at 60 FPS).
    - **Conclusion:** The sudden memory burst causes the GPU to miss its frame deadline, resulting in UI jank.
