title: Diagnosing Drift Detection Latency Spikes on Hexagon NPU
scenario: Your team deployed an on-device classification model to the Hexagon NPU. To monitor for data drift, a background job calculates the Population Stability Index (PSI) on user embeddings every hour. Users report severe UI stuttering exactly when this drift detection runs, even though the NPU is barely utilized.
question: "How would you diagnose why the PSI calculation is causing system-wide jank on this heterogeneous architecture?"
details:
  realistic_solution: |
    The root cause is memory bandwidth contention on the shared LPDDR5X memory. The PSI calculation, running in FP32 on the CPU, requires scanning large arrays of historical embeddings. This sudden, high-bandwidth CPU memory access starves the GPU. The fix involves throttling CPU memory access or downsampling embeddings.
  common_mistake: |
    **The Pitfall:** Assuming the issue is NPU thermal throttling or compute saturation.
    **The Rationale:** Candidates see an ML task and assume the NPU is the bottleneck, failing to realize PSI requires FP32 math executing on the CPU.
    **The Consequence:** Wasting time optimizing the NPU or model, while the actual issue is CPU memory bandwidth contention starving the GPU.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Embeddings Size: 50,000 events, 512 dimensions, FP32 (4 bytes).
       - Frame Deadline: 16.6 ms (60 FPS).
    2. **Calculations:**
       - Embeddings Read: 50,000 * 512 * 4 bytes = 102.4 MB.
       - Total Read Volume: 102.4 MB (current) + 102.4 MB (baseline) = 204.8 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth Contention.** A >200 MB burst read on a high-priority CPU thread blocks the GPU from its frame buffer, missing the 16.6 ms deadline and causing UI jank.
