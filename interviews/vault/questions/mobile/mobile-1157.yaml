title: Diagnosing Drift Detection Latency Spikes on Hexagon NPU
scenario: Your team deployed an on-device classification model to the Qualcomm Hexagon
  NPU (Snapdragon 8 Gen 3). To monitor for data drift, a background job calculates
  the Population Stability Index (PSI) on user embeddings every hour. Users report
  severe UI stuttering exactly when this drift detection runs, even though the NPU's
  45 TOPS INT8 capacity is barely utilized by the main model. Diagnose why the PSI
  calculation is causing system-wide jank on this heterogeneous architecture.
question: How would you diagnose why the PSI calculation is causing system-wide jank
  on this heterogeneous architecture?
details:
  realistic_solution: The root cause is memory bandwidth contention on the shared
    12-16 GB LPDDR5X memory. The PSI calculation, running in FP32 on the CPU, requires
    scanning large arrays of historical embeddings. This sudden, high-bandwidth CPU
    memory access starves the GPU of the memory bandwidth it needs for UI rendering.
    The fix involves throttling the CPU memory access, running the drift job on low-priority
    cores, or heavily downsampling the embeddings before calculation.
  common_mistake: Candidates often assume the issue is NPU thermal throttling or compute
    saturation. They might suggest optimizing the statistical calculation for the
    NPU, failing to realize that metrics like PSI require high-precision floating-point
    math (FP32) which typically falls back to the CPU, inadvertently competing for
    shared system resources.
  napkin_math: Calculating PSI for 50,000 recent events with 512-dimensional FP32
    embeddings requires reading 50,000 * 512 * 4 bytes = 102.4 MB of data. Comparing
    this against a baseline distribution requires another 102.4 MB. While LPDDR5X
    offers ~68 GB/s peak bandwidth, a sudden 200+ MB read burst on a high-priority
    CPU thread can block the GPU from accessing its 8 MB frame buffer for just 10-15
    milliseconds, causing it to miss the 16.6ms frame deadline (at 60fps) and resulting
    in noticeable UI stutter.
