title: Designing Reliable On-Device ML Monitoring for Apple A17 Pro
scenario: You are leading the ML Systems team responsible for a critical on-device AI feature deployed to millions of devices. This feature demands real-time inference.
question: "How would you architect low-power monitoring for an on-device AI feature to catch regressions, stragglers, drift, and failures?"
details:
  realistic_solution: Architect a low-power edge observability layer using `os_signpost` for zero-allocation tracing. Aggregate raw inferences into local sliding-window histograms. Employ stratified 1% sampling for detailed traces and defer uploads to Wi-Fi/Charging cycles.
  common_mistake: |
    **The Pitfall:** Porting heavy, server-side raw metric streaming directly to mobile.
    **The Rationale:** Candidates accustomed to cloud architectures assume continuous telemetry data streaming is standard and cheap.
    **The Consequence:** The monitoring system itself destroys the ~5W power budget, drains the battery rapidly, and hits users with massive cellular data bills.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10M devices.
       - 20 inferences/min.
       - 10 hrs/day.
    2. **Calculations:**
       - Naive Cost = 500 bytes * 20 * 60 * 10 = 6 MB/device/day = 60 TB/day globally.
       - Smart Edge = (500 bytes * 12 traces) + 100 bytes = ~6 KB/hr/device.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound**. Edge aggregation reduces daily fleet volume from 60 TB to ~600 GB/day, preserving cellular data and power.
