title: Designing Reliable On-Device ML Monitoring for Apple A17 Pro
scenario: You are leading the ML Systems team responsible for a critical on-device AI feature deployed to millions of iOS devices, leveraging the Apple A17 Pro. This feature demands real-time inference, heavily utilizing the A17 Pro's 35 TOPS Neural Engine and 8 GB unified memory.
question: "How would you architect low-power monitoring for an A17 Pro on-device AI feature to catch regressions, stragglers, drift, and failures?"
details:
  realistic_solution: 'Implement an edge-based processing layer to perform local aggregation, filtering, and initial anomaly detection. Dynamically adjust the frequency of metric collection based on device state. Leverage iOS system APIs (like os_signpost).'
  common_mistake: |
    **The Pitfall:** Porting heavy, server-side raw metric streaming directly to mobile.
    **The Rationale:** Candidates accustomed to cloud architectures assume continuous telemetry data streaming is standard and cheap.
    **The Consequence:** The monitoring system itself destroys the ~5W power budget, drains the battery rapidly, and hits users with massive cellular data bills.
  napkin_math: |
    - **Naive Telemetry Cost:** 500 bytes/inference * 20 inferences/min * 60 min * 10 hrs * 10,000,000 devices = 60 TB/day globally.
    - **Smart Edge Telemetry:** Flag 1% for detailed reports, aggregate the rest to 100 bytes/hr.
    - **New Device Load:** (500 bytes * 12 inferences) + 100 bytes = ~6 KB/hr per device.
    - **Final Result:** This reduces daily fleet volume from 60 TB to **~600 GB/day**, easily fitting within data and power constraints.
