title: 'Model Size Estimation: Specify Maximum On-Device LLM for Target Memory Constraint'
scenario: 'Specify the maximum LLM configuration for an Android app on Snapdragon 8 Gen 3 (16GB) that
  must: (1) coexist with Android system (3GB), (2) maintain 8192-token context window, (3) achieve TPOT
  < 50ms, (4) stay under 80% memory utilization for stability. Derive model family, precision, max parameter
  count, and expected accuracy.'
question: "How would you derive model family, precision, max parameter count, and expected accuracy?"
details:
  realistic_solution: 'Memory constraint (80% of 16GB = 12.8GB): 12.8 - 3 (OS) = 9.8GB for ML. KV (8192
    tokens, unknown model size): use 3B model estimates: 524KB/token × 8192 = 4.29GB. Model budget: 9.8-4.29=5.51GB.
    INT4: 5.51/0.5B per param = 11B params max. TPOT constraint: INT4 weight size = 11B × 0.5B = 5.5GB.
    5.5GB/77GB/s = 71.4ms > 50ms target. Reduce to 7B INT4: 3.5GB. TPOT: 3.5/77=45.5ms ✓. KV (7B model,
    32 layers, 32 KV heads, 128 dim): 524KB × 8192 = 4.29GB. Total: 3+3.5+4.29=10.79GB < 12.8GB ✓. Spec:
    7B INT4, MMLU ~66%.'
  common_mistake: Not solving the constraint system simultaneously; setting model size, then checking
    TPOT, then checking memory — missing that they're coupled through the choice of precision.
  napkin_math: '80% of 16GB = 12.8GB budget. OS: 3GB. Remaining: 9.8GB. TPOT < 50ms: model weight ≤ 50ms×77GB/s=3.85GB
    → model ≤ 7.7B INT4. Choose 7B INT4: 3.5GB. KV 8192: 4.29GB. App: 1GB. Total: 3+3.5+4.29+1=11.79GB.
    11.79/16=73.7% < 80% ✓. TPOT: 3.5/77=45.5ms ✓.'
