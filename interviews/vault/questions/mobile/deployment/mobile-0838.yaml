title: LLM Bandwidth Limits on Mobile NPU
scenario: An on-device assistant runs a 7B parameter LLM quantized to INT4 on a mobile NPU.
question: What is the minimum memory bandwidth required to generate text auto-regressively at 10 tokens per second?
details:
  realistic_solution: 'A 7B parameter model in INT4 format requires roughly 3.5 GB of memory to store the weights. For batch-size 1 auto-regressive generation, the entire 3.5 GB weight tensor must be loaded from memory to the NPU for every single generated token. Therefore, generating 10 tokens per second strictly requires 35 GB/s of memory bandwidth.'
  common_mistake: |
    **The Pitfall:** Calculating throughput based solely on the NPU's TOPS rating.
    **The Rationale:** Candidates incorrectly assume compute capability is the bottleneck, forgetting that batch-1 auto-regressive decoding is strictly memory-bandwidth bound.
    **The Consequence:** Proposing systems that fall severely short of target generation speeds because they ignore the true bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Size: 7 Billion parameters.
    - Precision: INT4 (0.5 bytes per parameter).
    - Required Latency: 10 tokens per second (Batch size 1 auto-regressive).

    **Calculations:**
    - Weight Footprint: 7e9 params * 0.5 bytes = 3.5 GB.
    - Data movement per token: 3.5 GB read.
    - Required Memory Bandwidth: 3.5 GB/token * 10 tokens/s = 35 GB/s.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound.** Auto-regressive decoding dictates that 35 GB/s is physically required just to stream weights for 10 tok/s.
