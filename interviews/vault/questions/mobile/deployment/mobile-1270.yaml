title: NPU Memory Bandwidth Contention
scenario: A vision model converted to TFLite is deployed on the Samsung Exynos 2400 NPU. During field testing, engineers observe that while median inference latency is excellent, 99th percentile latency spikes by 5x specifically when the camera ISP is simultaneously processing high-resolution video frames.
question: Why does Exynos 2400 NPU P99 latency spike 5x when the ISP processes high-resolution video?
details:
  realistic_solution: The root cause is memory bandwidth contention. Because the 12 GB LPDDR5X memory is shared, the ISP consuming massive bandwidth for high-resolution video starves the NPU of data. To resolve this, the deployment engineer must optimize the model's memory footprint (e.g., ensuring fully quantized INT8 operators to minimize weight fetching) or implement a scheduler that throttles NPU inferences during peak ISP buffer flushes.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the latency spikes as NPU thermal throttling or missing operator coverage forcing CPU fallbacks.
    **The Rationale:** Candidates fail to identify the architectural bottleneck of shared unified memory subsystems in mobile SoCs.
    **The Consequence:** Time is wasted on model-level optimizations (like removing specific layers) when the root cause is external resource contention.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Shared Memory: LPDDR5X (~68 GB/s peak bandwidth).
       - High-Res Video (ISP): Uses ~40 GB/s.
       - OS/CPU Overhead: Uses ~15 GB/s.
    2. **Calculations:**
       - Remaining Bandwidth: 68 - 40 - 15 = 13 GB/s.
       - Model Bandwidth Requirement: 300 MB traffic * 30 FPS = 9 GB/s.
       - Collision Buffer: During ISP burst flushes, available drops below 9 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth Contention. The 34.7 TOPS NPU starves for memory bandwidth during shared LPDDR5X bus saturation, causing a 5x latency tail.**
