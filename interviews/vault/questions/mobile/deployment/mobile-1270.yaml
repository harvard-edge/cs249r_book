title: NPU Memory Bandwidth Contention
scenario: A vision model converted to TFLite is deployed on the Samsung Exynos 2400 NPU. During field testing, engineers observe that while median inference latency is excellent, 99th percentile latency spikes by 5x specifically when the camera ISP is simultaneously processing high-resolution video frames.
question: Why does Exynos 2400 NPU P99 latency spike 5x when the ISP processes high-resolution video?
details:
  realistic_solution: The root cause is shared-memory bandwidth contention. The ISP and NPU both use the LPDDR5X memory subsystem, so high-resolution video bursts can delay NPU weight and activation reads even when NPU compute capacity is available. The direct mitigations are camera/NPU scheduling, QoS or bandwidth isolation where the platform exposes it, bounded inference queues, batching around ISP bursts, or reducing concurrent camera memory pressure. Quantization can help reduce traffic, but it is not the primary fix for external ISP contention.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the latency spikes as NPU thermal throttling or missing operator coverage forcing CPU fallbacks.
    **The Rationale:** Candidates fail to identify the architectural bottleneck of shared unified memory subsystems in mobile SoCs.
    **The Consequence:** Time is wasted on model-level optimizations (like removing specific layers) when the root cause is external resource contention.
  napkin_math: |
    **Assumptions & Constraints:**
    - The NPU, ISP, CPU, and GPU share the LPDDR5X memory subsystem.
    - High-resolution video processing creates bursty ISP reads/writes.
    - Median latency is good, so the model is not generally compute-bound.

    **Calculations:**
    - During quiet periods, the NPU receives enough memory service and hits its normal median latency.
    - During ISP bursts, the effective NPU memory service rate drops because camera buffers and image processing traffic take bus priority or queue ahead of NPU reads.
    - A memory-bound inference can show a large P99 spike when stalled memory reads serialize behind ISP traffic, even if average NPU utilization remains healthy.

    **Conclusion & Interpretation:**
    - **Result: Bandwidth Contention.** The 5x P99 tail is best explained by shared-memory contention with the ISP; scheduling and QoS are the release mitigations.
