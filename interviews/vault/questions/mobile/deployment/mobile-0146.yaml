title: The Cellular Download Budget
scenario: Your team is deploying a new on-device personalization model. To ensure it can be delivered to users who aren't on Wi-Fi, you need to respect the platform's 'download over cellular' size limit.
question: "What cellular download size limit should mobile ML model delivery usually be designed around?"
details:
  realistic_solution: Most major app stores, including Apple's, impose a cellular download limit of approximately 200 MB. Any on-demand resource, including an ML model, larger than this will fail to download unless the user is on Wi-Fi. This is a hard constraint that forces mobile ML teams to aggressively quantize models, design for delta updates, and carefully manage their delivery pipeline.
  common_mistake: |
    **The Pitfall:** Assuming download sizes are only limited by the user's data plan or device storage.
    **The Rationale:** Backend engineers lack experience with mobile app store policies that enforce hard limits to protect users from cellular data overages.
    **The Consequence:** Models are built too large, leading to failed over-the-air updates and plummeting adoption rates among users not on Wi-Fi.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7-billion parameter LLM in FP16 = 14 GB storage.
    - Cellular Download Limit = ~200 MB.

    **Calculations:**
    - Size Ratio = 14,000 MB / 200 MB = 70x over the limit.

    **Conclusion & Interpretation:**
    - **Result: 70x over the limit (Network-Bound)**. This hard constraint forces aggressive quantization or delta-update delivery systems.
  options:
  - ~50 MB
  - ~200 MB
  - 14 GB
  - No limit, it depends on the user's data plan
