title: Zero-Shot UI Action Grounding
scenario: We're implementing a Ferret-UI-inspired agentic system where Siri can perform actions based on what the user is currently looking at on their screen. The vision-language model needs to ground user commands (e.g., 'Click the second checkout button') to explicit x,y coordinates. The constraint is that this grounding model must reside entirely in-memory with a peak RAM footprint under 50MB, execute in <30ms on the Apple Neural Engine (ANE), and support seamless handoff to Private Cloud Compute for complex reasoning.
question: How do you design the on-device grounding architecture and the handoff protocol under these strict memory and latency constraints?
details:
  realistic_solution: |
    Use a cascaded on-device perception stack with a compact CoreML grounding model that stays resident under the 50MB peak budget. The on-device path should detect UI regions, classify common element roles, encode a small set of candidate boxes, and resolve simple commands to x,y coordinates locally. Do not rely on pixels alone when better signals are available: combine the screenshot features with safe UI metadata such as element bounds and labels when the OS can provide them. For handoff, send Private Cloud Compute a minimal task packet: user transcript, screen/app context policy metadata, candidate element boxes, role scores, and compact per-element embeddings. The cloud performs complex reasoning over that representation and returns an element id or coordinate target; raw screenshots are avoided unless explicitly required by policy, and the device verifies the returned target against the current screen before action.
  common_mistake: |
    **The Pitfall:** Suggesting running a multi-billion parameter Vision-Language Model (VLM) on-device or relying on accessibility trees.
    **The Rationale:** Candidates often underestimate the 50MB RAM constraint or overestimate the reliability of OS-level UI accessibility features.
    **The Consequence:** Violating memory constraints by orders of magnitude, or building a brittle system that breaks on apps lacking complete accessibility metadata.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 12M parameters quantized to INT4 = 6MB.
    - Activations: 512x512 input downsampled to 256x256x16 FP16 = 256 * 256 * 16 * 2 bytes = 2.0MB.
    - Candidate representation: 128 UI elements * 64-dim INT8 embedding plus boxes/scores is less than 0.1MB.
    - Runtime buffers, CoreML overhead, and safety margin: ~20MB.

    **Calculations:**
    - Total peak RAM footprint: 6MB weights + 2MB activations + 0.1MB candidates + 20MB runtime/safety margin = 28.1MB.
    - On-device latency: 12ms UI region encoder + 6ms role/box head + 4ms command matching + 2ms target verification = 24ms.
    - Handoff payload: 128 * 64 bytes for INT8 embeddings plus metadata is roughly 10-20KB, small enough for cloud reasoning without sending the full screenshot in the default path.

    **Conclusion & Interpretation:**
    - **Result: about 24ms and 28MB peak RAM on-device.** The design stays under the local constraints by sending only compact candidate state to Private Cloud Compute for hard reasoning cases and verifying the returned action locally.
