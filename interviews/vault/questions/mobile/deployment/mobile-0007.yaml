title: 'The OTA Data Budget: Model Serving Infrastructure'
scenario: Your team developed a new transformer-based suggestion model. The current production model has 10M parameters (FP16). The new model has 15M parameters (FP16).
question: "How would you calculate the additional download size for a user receiving this update?"
details:
  realistic_solution: Calculate the exact byte delta between the binary payloads. Since both utilize FP16 precision, multiply the parameter count variance by 2 bytes to determine the incremental cellular ingress overhead.
  common_mistake: |
    **The Pitfall:** Reporting the total new model size or using the wrong byte multiplier.
    **The Rationale:** Engineers either misread the prompt (providing total size instead of incremental size) or confuse FP16 with FP32 (4 bytes).
    **The Consequence:** Wildly inaccurate bandwidth estimates that can panic stakeholders or blow past cellular data budgets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Old model: 10M parameters, FP16.
    - New model: 15M parameters, FP16.
    - FP16 = 2 bytes/param.
    
    **Calculations:**
    - Old Size = 10M * 2 = 20 MB.
    - New Size = 15M * 2 = 30 MB.
    - Delta = 30 MB - 20 MB = 10 MB.
    
    **Conclusion & Interpretation:**
    - **Result: Network-Bound**. The additional payload is 10 MB.
  options:
  - '5 MB'
  - '10 MB'
  - '20 MB'
  - '30 MB'
  correct_index: 1
