title: Evaluating End-to-End Compound Pipeline Quality on Tensor G3 with a RAG Evals Suite
scenario: 'An on-device RAG system achieves individual stage metrics: retrieval recall@5=0.83, reranker NDCG@3=0.79, LLM groundedness=0.88 (fraction of claims traceable to retrieved docs). End-to-end user satisfaction (human eval on 100 queries) is only 0.61.'
question: How would you evaluate the gap between individual stage metrics and the 0.61 end-to-end satisfaction score?
details:
  realistic_solution: 'Execute a detailed failure mode decomposition. Errors in compound AI architectures are not independent; they cascade. A retrieval miss guarantees the LLM receives irrelevant context, strictly driving a hallucinated answer and dragging satisfaction to near-zero. Analyze the independent drag contribution: Retrieval drag (17% miss rate) heavily penalizes the system. Improving upstream recall yields the highest systemic ROI by preventing downstream models from confidently generating unsupported claims.'
  common_mistake: |
    **The Pitfall:** Multiplying independent metrics together (0.83 * 0.79 * 0.88 = 0.577) and assuming the 0.61 end-to-end score is acceptable or mathematically sound.
    **The Rationale:** Treating distinct RAG stages as statistically independent, identically distributed events.
    **The Consequence:** Ignoring correlated failure modes completely masks the outsized damage caused by the upstream retrieval stage, leading to misdirected optimization efforts on the LLM.
  napkin_math: |
    **Assumptions & Constraints:**
    - Retrieval recall: 0.83 (17% miss rate).
    - Reranker NDCG: 0.79 (21% miss rate).
    - LLM groundedness: 0.88 (12% miss rate).
    - User satisfaction score constraint: Perfect = 1.0, Hallucination/miss = 0.1.

    **Calculations:**
    - Independent metric product assumption: 0.83 * 0.79 * 0.88 = 0.577 (flawed).
    - Retrieval miss drag: 0.17 * (1.0 - 0.1) = 0.153 satisfaction drag.
    - Reranker miss drag (on successfully retrieved docs): 0.83 * 0.21 * 0.5 impact = 0.087 drag.
    - Grounding failure drag (on properly reranked docs): 0.83 * 0.79 * 0.12 = 0.079 drag.
    - Theoretical max satisfaction: 1.0 - (0.153 + 0.087 + 0.079) = 0.681.

    **Conclusion & Interpretation:**
    - **Result: Accuracy-Bound**. Retrieval misses introduce the most severe mathematical penalty (0.153 drag). Prioritizing recall over LLM improvements delivers the highest ROI for end-to-end user satisfaction.
