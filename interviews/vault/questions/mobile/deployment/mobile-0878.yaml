title: Evaluating End-to-End Compound Pipeline Quality on Tensor G3 with a RAG Evals Suite
scenario: 'An on-device RAG system achieves individual stage metrics: retrieval recall@5=0.83, reranker NDCG@3=0.79, LLM groundedness=0.88 (fraction of claims traceable to retrieved docs). End-to-end user satisfaction (human eval on 100 queries) is only 0.61.'
question: How would you evaluate the gap between individual stage metrics and the 0.61 end-to-end satisfaction score?
details:
  realistic_solution: 'Evaluate the gap with attribution experiments rather than converting heterogeneous metrics into one synthetic score. Start from the 100-query human eval set and label each failure by first failing stage: no relevant document in top-5, relevant document retrieved but not promoted by the reranker, grounded answer still unhelpful, or UI/latency/product issue. Then run ablations with oracle retrieval, oracle reranking, and retrieved-document masking to estimate the satisfaction lift each stage could provide. Retrieval misses are likely important because downstream stages cannot use evidence they never receive, but a miss does not strictly imply hallucination or zero satisfaction. The answer should identify the largest conditional lift and validate it with before/after human eval, not just optimize the lowest individual metric.'
  common_mistake: |
    **The Pitfall:** Multiplying independent metrics together (0.83 * 0.79 * 0.88 = 0.577) and assuming the 0.61 end-to-end score is acceptable or mathematically sound.
    **The Rationale:** Treating distinct RAG stages as statistically independent, identically distributed events.
    **The Consequence:** Ignoring correlated failure modes completely masks the outsized damage caused by the upstream retrieval stage, leading to misdirected optimization efforts on the LLM.
  napkin_math: |
    **Assumptions & Constraints:**
    - Retrieval recall@5 = 0.83, reranker NDCG@3 = 0.79, groundedness = 0.88.
    - End-to-end satisfaction = 0.61 on 100 human-rated queries.
    - These metrics are not directly comparable probabilities, so do not add or multiply them into a satisfaction model.

    **Calculations:**
    - Flawed independence check: 0.83 * 0.79 * 0.88 = 0.577. This being near 0.61 is not proof of correctness because recall, NDCG, groundedness, and satisfaction measure different events.
    - Attribution protocol: for each failed query, mark first failing stage and compute conditional satisfaction:
      S_base = 0.61.
      S_oracle_retrieval = satisfaction with known-relevant docs injected.
      S_oracle_reranker = satisfaction with relevant retrieved docs forced into top context.
      S_oracle_grounding = satisfaction after rejecting/regenerating unsupported claims.
    - Estimated lift by stage = S_oracle_stage - S_base, measured on the same query set.

    **Conclusion & Interpretation:**
    - **Result: Evaluation-bound attribution problem.** The 0.61 gap should be decomposed with oracle ablations and conditional error labels; prioritize the stage with the largest measured satisfaction lift, not the largest invented drag coefficient.
