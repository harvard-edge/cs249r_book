title: The 'Live Scribe' Concurrency Crisis
scenario: You are the Lead ML Systems Engineer at a major smartphone OS company. Your team is building 'Live Scribe', a new OS-level feature that provides system-wide, real-time transcription and generative text assistance. It's powered by a 1B parameter Mixture-of-Experts (MoE) model (quantized to INT4) that runs entirely on the device's NPU.
question: What scheduling architecture is needed for Live Scribe to manage NPU contention across streaming and interactive requests?
details:
  realistic_solution: |
    Use a priority-aware NPU serving scheduler with separate lanes for streaming transcription and interactive assistance. Streaming Live Scribe requests run as low-priority micro-batches with small decode quanta, checkpointed KV state, and a bounded token budget per turn. Interactive requests enter a high-priority lane with deadline-aware admission control; they can preempt streaming work at token or expert-boundary checkpoints, run immediately, and then return the streaming job to the queue. The scheduler should isolate per-request KV caches and expert residency so one long transcript cannot monopolize SRAM, reserve a small capacity slice for urgent UI actions, and reject or degrade background streams when the NPU is saturated. Batch only requests with compatible deadlines; never batch a 100ms interactive TTFT request behind a multi-second streaming decode.
  common_mistake: |
    **The Pitfall:** Proposing a simple FIFO queue with static batching.
    **The Rationale:** Candidates fail to recognize that a long-running, low-priority streaming request will block high-priority interactive requests.
    **The Consequence:** The TTFT of interactive requests soars to multiple seconds, completely failing the user experience requirement.
  napkin_math: |
    **Assumptions & Constraints:**
    - MoE Parameters: 1B total, 8 experts (125M per expert).
    - Active Parameters: 2 experts (250M active params).
    - Format: INT4 (0.5 bytes/param).
    - Target tokens: 20 tok/sec.
    - Bandwidth: 51.2 GB/s.

    **Calculations:**
    - Memory per Token: 250M params * 0.5 bytes = 125 MB.
    - Memory Bandwidth Check: 125 MB * 20 tok/sec = 2.5 GB/s (5% of 51.2 GB/s bandwidth).

    **Conclusion & Interpretation:**
    - **Result: 2.5 GB/s (Memory-Bound)**. Easily fits bandwidth, but dynamic loading of different 125MB expert chunks trashing the SRAM cache kills latency.
