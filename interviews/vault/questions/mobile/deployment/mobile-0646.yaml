math_issues:
  - Math states a 1B parameter MoE model with 8 experts and 2 active experts has 125M active parameters (62.5MB). If 1B total parameters are divided among 8 experts, each expert has 125M parameters. 2 active experts would therefore mean 250M active parameters (125MB) per token, not 125M.
