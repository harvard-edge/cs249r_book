title: The Cross-Platform ML Runtime Decision
scenario: Your team needs to deploy the same image classification model on iOS and Android. You are debating between native hardware frameworks, ONNX Runtime, and a custom solution.
question: How should you choose between native runtimes, ONNX Runtime, and a hybrid stack for cross-platform mobile inference?
details:
  realistic_solution: 'Three options with different cost-performance frontiers. Native (CoreML + TFLite): best latency (1.8ms iOS, 2.1ms Android), 3 engineer-months, two codebases. ONNX Runtime: single codebase (1 month), 60% slower (2.9ms, 3.4ms). Hybrid: 2 months, near-native for 80%. Decision: if latency-critical (real-time camera) and high DAU, go native. If infrequent inference, the 1-3ms gap is imperceptible \u2014 use ONNX.'
  common_mistake: |
    **The Pitfall:** Assuming "write once, run anywhere" frameworks always apply to mobile ML.
    **The Rationale:** Candidates suggest ONNX Runtime everywhere to simplify engineering, ignoring that cross-platform runtimes sacrifice heavy per-platform hardware optimization.
    **The Consequence:** The performance gap can be 2-5x slower, ruining user experience for latency-critical tasks like real-time camera inference.
  napkin_math: |
    **Assumptions & Constraints:**
    - Native Latency: ~1.8ms (iOS) / 2.1ms (Android).
    - ONNX Runtime Latency: ~2.9ms (iOS) / 3.4ms (Android).
    - Engineering Cost: Native = 3 dev-months, ONNX = 1 dev-month.

    **Calculations:**
    - Performance degradation: (2.9 - 1.8) / 1.8 = ~61% slower on iOS.

    **Conclusion & Interpretation:**
    - **Result: Quality-Bound.** The latency gap requires native execution for real-time video; for infrequent inference, ONNX's 60% slower speed is imperceptible.
