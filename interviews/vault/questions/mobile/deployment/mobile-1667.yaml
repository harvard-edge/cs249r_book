title: Evaluating Rollout Strategies for On-Device ML Model Architectures on Snapdragon Hexagon NPU
scenario: Your team is developing a new on-device machine learning feature. Model A is highly optimized for INT8 quantization achieving 10ms inference latency but requires complex update cycles. Model B achieves 15ms inference latency but is built with a standard MLIR-based intermediate representation.
question: How would you A/B test and progressively roll out two model architectures with different latency and operability to decide the final production model?
details:
  realistic_solution: |
    Implement a multi-stage phased rollout: 1. Shadow Deployment (1%): Run both models asynchronously to gather 'dark metrics' (NPU utilization, memory footprint) without affecting UX. 2. Canary A/B Test (5%): Split traffic to measure real-world UX metrics (battery drain, crash rates). 3. TCO Evaluation: Weigh Model B's operational velocity (MLIR ease of update) against Model A's 5ms latency advantage. Standardized IRs often win out for long-term maintainability unless the 5ms breaches a hard real-time SLA.
  common_mistake: |
    **The Pitfall:** Focusing only on isolated peak performance metrics (e.g., pure NPU TOPS or latency) without considering the holistic impact.
    **The Rationale:** Engineers prioritize raw speed while neglecting power consumption, app stability, and operational overhead.
    **The Consequence:** Deploying a model that drains the battery or introduces unacceptable operational costs, negatively impacting user experience.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model A: 10ms, 4mJ per inference
    - Model B: 15ms, 6.75mJ per inference
    - Usage: 50 inferences/day across 10M users

    **Calculations:**
    - Latency Delta: (15ms - 10ms) * 50 = 250ms per user/day. For 10M users = ~29 days of total compute time daily.
    - Power Delta: (6.75mJ - 4mJ) * 50 = 137.5mJ extra per user/day.

    **Conclusion & Interpretation:**
    - **Result: 68% more energy (Power and Latency-Bound)**. Model B consumes 68% more energy and adds 250ms daily latency, requiring strict A/B thermal evaluation.
