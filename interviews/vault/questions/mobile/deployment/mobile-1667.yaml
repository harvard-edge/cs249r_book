title: Evaluating Rollout Strategies for On-Device ML Model Architectures on Snapdragon Hexagon NPU
scenario: Your team is developing a new on-device machine learning feature. Model A is highly optimized for INT8 quantization achieving 10ms inference latency but requires complex update cycles. Model B achieves 15ms inference latency but is built with a standard MLIR-based intermediate representation.
question: How would you A/B test and progressively roll out two model architectures with different latency and operability to decide the final production model?
details:
  realistic_solution: |
    Run this as a controlled experiment, not just a rollout. First validate both assets offline on the same device matrix for accuracy, operator coverage, latency, memory, and battery. Then run a shadow phase where eligible users execute the non-serving model asynchronously to collect dark metrics without changing UX. In the live A/B phase, randomly assign comparable cohorts to Model A or Model B, pin each user to a model version, and monitor P50/P95 latency, battery drain, thermal throttling, crash/OOM rate, quality metrics, and engagement. Progress from 1% to 5% to larger cohorts only if guardrails hold, and roll back by disabling the losing asset through remote config while keeping a stable cached model. The final decision should compare Model A's 5 ms latency advantage against Model B's easier update path, accuracy, stability, and operating cost.
  common_mistake: |
    **The Pitfall:** Focusing only on isolated peak performance metrics (e.g., pure NPU TOPS or latency) without considering the holistic impact.
    **The Rationale:** Engineers prioritize raw speed while neglecting power consumption, app stability, and operational overhead.
    **The Consequence:** Deploying a model that drains the battery or introduces unacceptable operational costs, negatively impacting user experience.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model A: 10ms, 4mJ per inference
    - Model B: 15ms, 6.75mJ per inference
    - Usage: 50 inferences/user/day across 10M users

    **Calculations:**
    - Per-inference latency delta = 15 ms - 10 ms = 5 ms.
    - Per-user daily added active inference time for Model B = 5 ms * 50 = 250 ms.
    - Fleet daily inferences = 50 * 10M = 500M.
    - Per-user daily energy delta = (6.75 mJ - 4 mJ) * 50 = 137.5 mJ.
    - Relative energy increase = (6.75 - 4) / 4 = 68.75%.

    **Conclusion & Interpretation:**
    - **Result: Model B costs 5 ms and 2.75 mJ more per inference.** The added 250 ms per user per day may be acceptable if UX metrics hold, but the 68.75% per-inference energy increase requires battery and thermal guardrails during the A/B rollout.
