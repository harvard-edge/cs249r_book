title: LLM TPU Delegation vs CPU Fallback on Tensor G3
scenario: You are deploying a 2B parameter INT8 mobile LLM and need a first-pass, compute-only latency screen before profiling. You must choose between Option A mapping all operators to standard TFLite ops for full TPU delegation with a 2.2B-parameter graph, and Option B retaining a smaller 2.0B-parameter custom op graph that forces 30% of token compute onto the CPU.
question: 'Which TFLite strategy is faster: 100% TPU delegation with 2.2B params or 30% CPU fallback at 2.0B?'
details:
  realistic_solution: |
    Under the stated compute-only screening model, Option A is the better first choice. Avoiding CPU fallback matters more than the 10% parameter increase because the unsupported portion of Option B runs on a much slower CPU path and also introduces CPU/accelerator synchronization. In production this estimate still needs profiling for memory bandwidth, operator coverage, and runtime overhead, but it correctly flags CPU fallback as the riskier deployment shape.
  common_mistake: |
    **The Pitfall:** Choosing partial CPU fallback to save memory.
    **The Rationale:** Candidates assume that 70% TPU delegation is "good enough" or that memory savings justify the fallback, ignoring the massive latency penalty of alternating execution.
    **The Consequence:** Auto-regressive decoding speed is completely bottlenecked by synchronization overhead and CPU slowness.
  napkin_math: |
    **Assumptions & Constraints:**
    - Accelerator compute budget for the toy screen: 7.5 TOPS = 7500 GOPS.
    - CPU compute for unsupported ops in the toy screen: ~100 GOPS.
    - Decoder cost estimate: about 2 operations per parameter per generated token.
    - This ignores memory bandwidth, KV-cache traffic, scheduling, and non-matmul operator details.
    - CPU fallback also adds TPU/CPU synchronization overhead.

    **Calculations:**
    - Option A token work: 2.2B params * 2 ops/param = 4.4 GOP/token.
    - Option A ideal TPU time: 4.4 GOP / 7500 GOPS = 0.00059 s = 0.59 ms/token before memory and runtime overheads.
    - Option B token work: 2.0B params * 2 ops/param = 4.0 GOP/token.
    - Option B TPU portion: 70% * 4.0 GOP / 7500 GOPS = 0.37 ms/token.
    - Option B CPU portion: 30% * 4.0 GOP / 100 GOPS = 12 ms/token, plus synchronization at each boundary.

    **Conclusion & Interpretation:**
    - **Result: CPU fallback dominates the toy estimate.** Even with fewer parameters, Option B spends far more estimated time in CPU execution and synchronization than Option A spends on the slightly larger fully delegated graph, so Option A should be profiled first.
