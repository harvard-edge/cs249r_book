title: Diagnose Thermal Throttling Cost Impact on A17 Pro Inference
scenario: An iOS app uses A17 Pro Neural Engine (35 TOPS) for real-time video style transfer at 30 FPS. After 90 seconds of continuous inference, FPS drops to 18 FPS due to thermal throttling. The model requires 180 GOPS per frame. Profiling shows peak power consumption of 4.2W during sustained inference, exceeding the 3.5W thermal budget.
question: How would you diagnose the cost impact of throttling on user experience and propose thermal-aware scheduling?
details:
  realistic_solution: |
    Diagnose the measured behavior first: after 90 seconds, FPS falls from 30 to 18, so sustained user-visible throughput is 60% of target. The model requires 180 GOPS/frame, so 30 FPS needs 5.4 TOPS and 18 FPS needs 3.24 TOPS, both far below the 35 TOPS peak. The bottleneck is therefore thermal/power management, not raw TOPS. The 4.2W measured sustained draw exceeds the 3.5W thermal envelope by 0.7W, causing the device to lower clocks until it reaches a thermally stable 18 FPS. A thermal-aware scheduler should use temperature and power feedback: reduce resolution, skip/interpolate frames, or lower style quality before the thermal governor forces a large clock drop. Reducing 1080p to 810p lowers pixel work to 0.75^2 = 56.25%, but the resulting power and FPS must be verified on device; it is a candidate control action, not proof that 30 FPS is guaranteed.
  common_mistake: |
    **The Pitfall:** Treating thermal throttling as purely a performance issue without considering business impact.
    **The Rationale:** Engineers tend to focus on FLOPs and TOPS, ignoring how sustained power draw affects long-term app usability.
    **The Consequence:** For subscription-based apps, throttled inference reduces feature utility and directly increases customer churn—a quantifiable revenue cost.
  napkin_math: |
    **Assumptions & Constraints:**
    - Required compute: 180 GOPS * 30 FPS = 5.4 TOPS.
    - Capacity: 35 TOPS.
    - Thermal budget: 3.5W.
    - Peak power: 4.2W.

    **Calculations:**
    - Observed throughput ratio after throttle: 18 FPS / 30 FPS = 60%.
    - Required compute at target: 180 GOPS/frame * 30 FPS = 5.4 TOPS.
    - Required compute after throttle: 180 GOPS/frame * 18 FPS = 3.24 TOPS.
    - Peak TOPS headroom remains large, so the drop is caused by sustained thermal limits rather than nominal compute capacity.
    - Power over budget: 4.2W - 3.5W = 0.7W, or 20% above the thermal budget.
    - FLOPs reduction (810p): 0.75^2 = 0.5625x.
    - If power scaled perfectly with pixel work, dynamic resolution would estimate 4.2W * 0.5625 = 2.36W, but fixed overheads and DVFS make this only a starting estimate to validate.

    **Conclusion & Interpretation:**
    - **Result: thermal-bound, measured 60% sustained FPS.** The fix is a closed-loop scheduler that keeps measured package power/skin temperature under budget; dynamic resolution is a likely control knob, not a guaranteed 30 FPS proof until profiled.
