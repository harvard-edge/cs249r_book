title: Analyzing Compound AI Pipeline Thermal Throttling on Snapdragon 8 Gen 3
scenario: 'A Snapdragon 8 Gen 3 (45 TOPS, 16GB) device runs a compound AI pipeline: camera embedding (5ms, 2W), semantic search (8ms, 1W), and on-device LLM (300ms, 12W). After 90 seconds of continuous use, the device throttles: LLM inference slows from 300ms to 480ms, embedding slows from 5ms to 9ms.'
question: How would you analyze the thermal contribution of each pipeline stage and determine which stage to optimize first to recover performance?
details:
  realistic_solution: Analyze time-averaged thermal load over the same one-second window. At 2 LLM queries/s, the LLM is active for 0.6s/s, so its average contribution is 12W * 0.6 = 7.2W. The 30fps camera embedding stream is active for 30 * 0.005s = 0.15s/s, contributing 2W * 0.15 = 0.3W. Search at 2 queries/s is active for 0.016s/s, contributing 1W * 0.016 = 0.016W. The LLM dominates the sustained thermal budget, so optimize it first by reducing generated tokens, lowering query rate, improving caching, or selecting a lower-power LLM path. Quantization may help, but the scenario does not provide enough data to claim a specific power drop or throttle-time extension.
  common_mistake: |
    **The Pitfall:** Automatically optimizing the slowest stage (LLM) without calculating its time-averaged thermal contribution.
    **The Rationale:** Engineers assume the highest latency component must be the worst thermal offender, forgetting that a fast but highly frequent component (like a 30fps camera embedding) could dominate the power budget.
    **The Consequence:** Wasting engineering effort optimizing a low-impact stage while the system continues to violently thermal throttle.
  napkin_math: |
    **Assumptions & Constraints:**
    - LLM: 300ms/query, 2 queries/s, 12W power.
    - Embedding: 5ms/frame, 30 fps, 2W power.
    - Search: 8ms/query, 2 queries/s, 1W power.
    - SoC Thermal Budget: ~4W sustained.

    **Calculations:**
    - LLM Thermal Load: 12W * (300ms * 2) = 7.2W.
    - Embedding Thermal Load: 2W * (5ms * 30) = 0.3W.
    - Search Thermal Load: 1W * (8ms * 2) = 0.016W.
    - Total time-averaged pipeline load: 7.2W + 0.3W + 0.016W = ~7.52W.

    **Conclusion & Interpretation:**
    - **Result: ~7.5W average load (Thermal-Bound)**. The LLM alone exceeds the 4W sustained budget, so it is the first optimization target. Specific INT4 power or throttle-time gains require measured power data that is not provided.
