title: The Delta Update Dilemma
scenario: Your team trained a new 220 MB CV model, exceeding the App Store 200 MB limit. Analysis shows 45 MB of the v1 model in your app binary is byte-for-byte identical to the new model.
question: What is the approximate size of a delta patch to upgrade the model, and does it solve the OTA limit?
details:
  realistic_solution: |
    A delta patch ships the bytes needed to transform the installed v1 model into the new model, so shared byte-identical ranges are not transmitted. With only the given facts, a rough lower-bound estimate is the non-shared portion of the 220 MB target: 220 MB - 45 MB = about 175 MB before patch metadata and compression effects. That is under the 200 MB OTA limit, but the exact patch size depends on how large the actual binary diff is.
  common_mistake: |
    **The Pitfall:** Subtracting the total v1 file size instead of the shared byte size.
    **The Rationale:** Candidates confuse file size differences with the actual shared byte logic of a binary patch.
    **The Consequence:** The patch size will be incorrectly estimated, potentially leading to a rejected update if the true delta size exceeds the cellular threshold.
  napkin_math: |
    **Assumptions & Constraints:**
    - OTA Limit: 200 MB.
    - Target size: 220 MB.
    - Shared bytes: 45 MB.

    **Calculations:**
    - Non-shared portion of target: 220 MB - 45 MB = 175 MB.
    - Approximate delta size: about 175 MB plus patch metadata, assuming the remaining changed regions must be transmitted and do not compress further.

    **Conclusion & Interpretation:**
    - **Result: Likely OTA Success.** The approximate patch is ~175 MB, so it is below the 200 MB limit under this simplified estimate. The exact delta cannot be proven from shared-byte count alone.
  options:
    - ~170 MB
    - ~45 MB
    - ~175 MB
    - 220 MB
  correct_index: 2
