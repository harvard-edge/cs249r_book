title: Analyzing On-Device vs Cloud Offload Decision for Compound AI on Tensor G3
scenario: A Tensor G3 device runs a pipeline with local embedding (20ms), local retrieval (5ms), and LLM generation (300ms, 12W power). Cloud offload takes 140ms total but requires a network transmission.
question: How would you analyze under which conditions on-device vs cloud is preferred, considering battery, latency, and privacy?
details:
  realistic_solution: 'Decision matrix: (1) Privacy-sensitive queries (medical, financial): always on-device regardless of speed — no data leaves device. (2) Low battery (< 20%): prefer cloud offload — saves 12W * 300ms = 3.6J per query. At 50 queries in low-battery period: 50 * 3.6J = 180J = 0.05Wh saved — negligible. (3) No network (airplane mode/offline): forced on-device. (4) Time-sensitive query with network: cloud wins at 140ms vs 325ms on-device. Implement a hybrid router: classify query privacy level, check battery and network state, route accordingly.'
  common_mistake: |
    **The Pitfall:** Making a static "always-on-device" or "always-cloud" architectural decision.
    **The Rationale:** Candidates over-index on a single variable (e.g., cloud cost or local battery drain) without modeling standard daily usage rates.
    **The Consequence:** The system becomes inflexible, causing terrible latency on fast networks or massive battery drain on low-battery devices.
  napkin_math: |
    - **On-Device Power:** 12W * 300ms = 3.6 Joules per query.
    - **On-Device Latency:** 20 + 5 + 300 = 325ms.
    - **Cloud Latency:** 20 + 5 + 140 = 165ms.
    - **Daily Battery Impact:** 100 queries * 3.6J = 360 Joules = ~0.68% of a typical 14.8Wh battery.
    - **Final Result:** **Battery impact is negligible (~1%); the decision must be dynamically routed based on strict privacy needs and available network latency.**
