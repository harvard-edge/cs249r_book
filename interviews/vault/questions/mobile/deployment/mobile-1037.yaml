title: 'Mobile TCO Analyze: A17 Pro vs Cloud for On-Device Inference'
scenario: A user makes 50 LLM queries/day averaging 200 output tokens. Cloud API costs $0.001/1K tokens. On-device inference runs on an A17 Pro drawing ~3W. The device battery is 12.8Wh and costs $69 to replace after 500 equivalent full cycles.
question: What are the annual battery degradation cost, cloud cost, and economic break-even point for on-device inference?
details:
  realistic_solution: |
    The scenario gives 50 queries/day * 200 output tokens = 10,000 tokens/day. At $0.001 per 1K tokens, cloud cost is $0.01/day, or $3.65/year. Assuming local decode averages 30 tokens/s, on-device inference runs for 333s/day. At 3W, that consumes 0.277Wh/day. On a 12.8Wh battery, that is 0.0216 equivalent full cycles/day, or 7.88 cycles/year. With a $69 replacement after 500 cycles, battery wear is $0.138/cycle * 7.88 = $1.09/year.

    With hardware already owned, both cloud and battery wear scale linearly with token volume, so there is no positive query-count break-even: on-device is cheaper for any nonzero usage under these assumptions. The equivalent break-even cloud price is $1.09 / 3650 thousand-token units = $0.00030 per 1K tokens. At the stated $0.001 per 1K tokens, cloud costs about 3.3x more than battery wear.
  common_mistake: |
    **The Pitfall:** Failing to account for the energy/degradation cost of on-device inference.
    **The Rationale:** Assuming on-device compute is entirely "free" without calculating the battery replacement lifecycle.
    **The Consequence:** Incorrectly comparing cloud API costs to zero, rather than performing a true TCO analysis.
  napkin_math: |
    **Assumptions & Constraints:**
    - Daily tokens: 50 queries/day * 200 tokens/query = 10,000 tokens/day.
    - Cloud API: $0.001/1K tokens.
    - Device power: 3W, 12.8Wh capacity.
    - Battery replacement: $69 for 500 cycles.

    **Calculations:**
    - Cloud cost: 10,000 / 1000 * $0.001 = $0.01/day -> $3.65/year.
    - On-device time (@ 30 tok/s): 10,000 / 30 = 333 seconds = 0.0925 hours.
    - Daily power consumption: 3W * 0.0925h = 0.277 Wh.
    - Daily battery cycle fraction: 0.277 Wh / 12.8 Wh = 0.0216 cycles.
    - Annual cycles: 0.0216 * 365 = 7.88 cycles/year.
    - Cost per cycle: $69 / 500 = $0.138.
    - Annual battery cost: 7.88 * $0.138 = $1.09/year.
    - Break-even cloud price: $1.09 / (3,650 thousand-token units/year) = $0.00030 per 1K tokens.

    **Conclusion & Interpretation:**
    - **Result: $1.09/year battery wear vs $3.65/year cloud.** On-device is cheaper by $2.56/year. Because no fixed hardware cost is included, the usage break-even is zero nonzero queries; equivalently, cloud would need to fall below about $0.00030 per 1K tokens to match battery wear.
