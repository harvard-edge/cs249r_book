title: 'On-Device Multimodal Model Conversion for Hexagon NPU'
scenario: 'You are tasked with deploying a new 2-billion parameter vision-language model to flagship Android devices powered by a modern NPU. The model uses complex custom attention operators that are currently unsupported by the standard NPU delegates. You need to design a model conversion and runtime execution strategy that maximizes INT8 throughput while efficiently handling fallback execution for unsupported operators without creating bottlenecks across the shared 16 GB LPDDR5X memory.'
question: 'How should a deployment handle unsupported custom attention operators without CPU fallback bottlenecks?'
details:
  realistic_solution: |
    Implement a hybrid execution graph: supported subgraphs map to the NPU via the QNN delegate in INT8, while custom attention operators are explicitly delegated to the GPU. Because the GPU and NPU share the same LPDDR5X memory pool, this zero-copy execution completely bypasses the catastrophic serialization overhead of CPU fallback.
  common_mistake: |
    **The Pitfall:** Permitting unsupported NPU operators to automatically fall back to the CPU.
    **The Rationale:** Relying on default framework fallback behavior (e.g., TFLite/ONNX Runtime) without profiling cross-domain memory sync costs.
    **The Consequence:** Introducing massive NPU-to-CPU synchronization traffic that destroys power efficiency and severely bottlenecks inference.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1024 tokens, 2048 hidden dim, 2 bytes (FP16).
    - 10 layer boundaries, 30 FPS.

    **Calculations:**
    - Transfer size per boundary = 1024 * 2048 * 2 = 4.19 MB.
    - Total traffic = 4.19 MB * 10 * 30 = 1.26 GB/s.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound**. CPU fallback incurs a 1.26 GB/s continuous sync penalty; GPU delegation utilizes zero-copy shared memory.
