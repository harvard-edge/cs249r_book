title: 'The OTA Update Budget: Model Serving Infrastructure'
scenario: You're a mobile ML engineer. The current v1 model has 5 million parameters (FP16). The v2 model has 7 million parameters (FP16).
question: How large is the FP16 OTA delta when updating a mobile model from 5M to 7M parameters?
details:
  realistic_solution: 'The correct approach is to calculate the size of the *difference* in parameters between the two models, and then multiply that by the number of bytes required for FP16 precision.'
  common_mistake: |
    **The Pitfall:** Calculating the total size of the new model instead of the delta.
    **The Rationale:** Forgetting that efficient Over-The-Air (OTA) update systems only push the difference between versions.
    **The Consequence:** Massively overestimating the required network bandwidth and user data cost for a minor model update.
  napkin_math: |
    **Assumptions & Constraints:**
    - v1 Model: 5M parameters.
    - v2 Model: 7M parameters.
    - Data format: FP16 (2 bytes per parameter).
    - OTA Update Mechanism: Delta-based patching.

    **Calculations:**
    - Parameter Delta: 7M - 5M = 2M new parameters.
    - Update Size: 2M parameters * 2 bytes/param = 4 MB.

    **Conclusion & Interpretation:**
    - **Result: 4 MB (Network-Bound)**. The OTA payload size is 4 MB by sending only the delta.
  options:
  - '14 MB'
  - '8 MB'
  - '4 MB'
  - '2 MB'
  correct_index: 2
