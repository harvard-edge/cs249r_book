title: Progressive Rollout of Gemini Nano A/B Experiment
scenario: You are leading the progressive rollout of a new on-device summarization feature powered by Gemini Nano on the Google Tensor G3. The feature is being A/B tested against a legacy cloud-based baseline.
question: How would you evaluate the trade-offs between a strict 1% shadow deployment versus a phased geographic rollout, and quantify the resource thresholds that would trigger an automatic rollback?
details:
  realistic_solution: |
    A strict 1% shadow deployment is best for measuring device cost before user exposure: run the Gemini Nano path alongside the current path, discard the output, and compare latency, battery, thermal state, and app eviction rates against matched control devices. Its drawback is that it adds hidden work to real user devices, so the rollout must be small and have aggressive device-side circuit breakers. A phased geographic rollout is better after shadow metrics are clean because it exposes real UX, locale, network, and support issues, but rollback must be fast because users see failures. Use shadow first for resource safety, then geo phases for product correctness, with automatic rollback if mobile resource deltas exceed the precomputed thresholds.
  common_mistake: |
    **The Pitfall:** Focusing solely on cloud-side traffic splitting.
    **The Rationale:** Candidates fail to account for device-level constraints like memory eviction, battery drain, and thermal throttling in shadow deployments.
    **The Consequence:** Draining user batteries and crashing background apps by running redundant shadow inferences on mobile devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Eligible population: 1,000,000 devices/day; strict shadow slice: 1%.
    - Each shadowed device runs 20 summaries/day, so 10,000 devices produce 200,000 paired observations/day.
    - Baseline p95 generation latency: 1.20s; acceptable regression: 10%.
    - Baseline hourly thermal-throttle rate: 1.0%; acceptable regression: +0.3 percentage points.
    - Baseline background eviction rate during use: 0.4%; acceptable regression: +0.2 percentage points.
    - Acceptable extra battery drain during the feature session: 0.5 percentage points.

    **Calculations:**
    - Shadow sample size = 1,000,000 * 1% = 10,000 devices/day.
    - Daily paired inferences = 10,000 * 20 = 200,000, enough to detect small resource regressions before broad exposure.
    - Latency rollback threshold = 1.20s * 1.10 = 1.32s p95.
    - Thermal rollback threshold = 1.0% + 0.3% = 1.3% hourly throttle rate.
    - Eviction rollback threshold = 0.4% + 0.2% = 0.6% session eviction rate.
    - Battery rollback threshold = control session drain + 0.5 percentage points.

    **Conclusion & Interpretation:**
    - **Result: shadow before geo expansion**. Hold or roll back if p95 latency exceeds 1.32s, thermal throttling exceeds 1.3%/hour, evictions exceed 0.6%, or battery drain regresses by more than 0.5 percentage points. Geographic phases should use the same thresholds plus user-visible quality and support metrics.
