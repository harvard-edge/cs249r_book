title: Progressive Rollout of Gemini Nano A/B Experiment
scenario: You are leading the progressive rollout of a new on-device summarization feature powered by Gemini Nano on the Google Tensor G3. The feature is being A/B tested against a legacy cloud-based baseline.
question: How would you evaluate the trade-offs between a strict 1% shadow deployment versus a phased geographic rollout, and quantify the resource thresholds that would trigger an automatic rollback?
details:
  realistic_solution: 'Design an intelligent, client-driven rollout system where the Tensor G3 device queries a feature flag endpoint to determine its experiment arm. Implement a strict circuit breaker on the client: if the memory pressure causes OS background app evictions to spike, or if TPU usage causes sustained thermal throttling, the client gracefully degrades to the cloud baseline. Rollout should start at 0.1% of eligible Tensor G3 devices, monitoring p99 latency and battery drain regressions, before scaling to 1%, 10%, and 100%.'
  common_mistake: |
    **The Pitfall:** Focusing solely on cloud-side traffic splitting.
    **The Rationale:** Candidates fail to account for device-level constraints like memory eviction, battery drain, and thermal throttling in shadow deployments.
    **The Consequence:** Draining user batteries and crashing background apps by running redundant shadow inferences on mobile devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Context limit: 50 tokens.
    - Model params: 3.2B.
    - TPU Compute: 7.5 TOPS.
    - Bandwidth: 64 GB/s.

    **Calculations:**
    - Compute Requirement: 50 tokens * 2 * 3.2B = 320 Giga-Operations.
    - Compute Time: 320 GOPs / 7500 GOPs/s = ~43 ms.
    - Memory Bandwidth Time: 50 tokens * (1.8 GB / 64 GB/s) = 1.4 seconds.

    **Conclusion & Interpretation:**
    - **Result: 1.4 seconds (Memory-Bound)**. Rollback if 1.4s generation causes >2% frame drops or memory evictions spike.
