title: The App Store Diet
scenario: You are a Mobile ML Engineer building a new "Magic Stylus" feature that uses an on-device model with 70 million parameters. Your base app is already 150 MB. To avoid exceeding the app store's ~200 MB cellular download limit and forcing users onto Wi-Fi, you plan to use on-demand resource APIs to download the model after the initial install.
question: What FP16 model size does a 70M-parameter on-device feature add, and why does that require on-demand download?
details:
  realistic_solution: |
    Deploying the 70 million parameter model in an FP16 data type translates to precisely 140 MB of raw payload. Appending this asset directly into the 150 MB base iOS/Android shell establishes a 290 MB deployment artifact. Because this mathematically exceeds the hard-coded 200 MB cellular download allowance, it absolutely mandates dynamic background payload synchronization (On-Demand Resources / Play Feature Delivery) to prevent permanently blocking initial app installations for offline users.
  common_mistake: |
    **The Pitfall:** Drastically miscalculating byte capacity by confusing numerical network precision standards.
    **The Rationale:** Engineers blindly conflate parameter counts with memory sizing, operating under assumptions like "1 parameter = 1 byte" (ignoring INT8 bounds) or "1 parameter = 4 bytes" (FP32), completely skipping the 2-byte factor of FP16.
    **The Consequence:** Structurally breaking App Store cellular installation policies and causing chaotic, failed rollout telemetry across massive demographics.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target App Store OTA limit: 200 MB cellular cap.
       - Baseline application size: 150 MB.
       - Asset precision: 70 million parameters trained at FP16 (2 bytes per parameter).
    2. **Calculations:**
       - Weight footprint: 70,000,000 parameters * 2 bytes = 140,000,000 bytes (~140 MB).
       - Total App Bundle: 150 MB (Base) + 140 MB (Weights) = 290 MB.
       - Overage: 290 MB - 200 MB OTA limit = 90 MB excess.
    3. **Conclusion & Interpretation:**
       **Result: 90 MB cellular limit overage (Storage-Bound).** Incorporating the weights demands either immediate Wi-Fi network offloading or heavy aggressive INT8 quantization schedules.
  options:
  - 70 MB
  - 280 MB
  - 140 MB
  - 17.5 MB
  correct_index: 2
