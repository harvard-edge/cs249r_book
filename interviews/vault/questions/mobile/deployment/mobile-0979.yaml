title: 'Model Format Conversion: Implement ONNX→CoreML Conversion with Numerical Validation'
scenario: You need to convert a MobileNetV3-Small (2.5M params, 57M MACs) from ONNX to CoreML for Apple A17 Pro Neural Engine deployment.
question: What steps, validation metrics, expected size, and latency should be used when converting MobileNetV3-Small from ONNX to CoreML?
details:
  realistic_solution: 'Convert: `coremltools.convert(onnx_model, minimum_deployment_target=ct.target.iOS17, compute_precision=ct.precision.FLOAT16)`. Validate: run 1000 test images through both ONNX (onnxruntime) and CoreML (coremltools predict), compute top-1 accuracy delta < 0.1%. Check max absolute error per output < 0.01 (FP32 reference). Expected FP16 model size: 2.5M x 2B = 5MB. Performance on A17 Pro: 114M Ops / 35 TOPS = 3.3µs compute, realistic 1.5ms with framework overhead.'
  common_mistake: |
    **The Pitfall:** Skipping numerical validation after conversion.
    **The Rationale:** Candidates assume API format conversion (ONNX->CoreML) is mathematically lossless.
    **The Consequence:** Silent accuracy degradation in production due to incorrect BN-folding or activation function mappings.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Parameters: 2.5M.
    - Ops: 114M Ops (57M MACs).
    - A17 Pro NPU: 35 TOPS.
    - Format: FP16.

    **Calculations:**
    - Model Size: 2.5M params * 2 bytes (FP16) = 5 MB.
    - CPU Validation Time: 1000 inputs * 5.7ms = 5.7s.
    - CoreML Inference Compute: 114M Ops / 35 TOPS = 3.3 microseconds.
    - CoreML Total Latency: 3.3µs + 1ms (overhead) = ~1 ms.

    **Conclusion & Interpretation:**
    - **Result: ~1 ms (Compute-Bound)**. CoreML runs at ~1 ms, a 6x speedup over CPU.
