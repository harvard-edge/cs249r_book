title: The Hidden Broadcast Receiver Wake-Ups
scenario: You deploy a background service on Android to run inference on incoming
  SMS messages. The model takes 2ms on the CPU. A user receives 10 texts a day. Google
  Play Console shows your app is in the top 1% of battery drainers.
question: Why do 10 SMS inferences taking 2 ms each make an Android phishing detector
  a top 1% battery drainer?
details:
  realistic_solution: 'The drain is caused by OS cold app boots on every SMS broadcast.
    Sequence: SMS -> BroadcastReceiver -> Android cold-starts process (DEX allocation,
    runtime init, ML model memory mapping) = 2.5s at 3W = 7.5J. Inference: 2ms at
    1W = 0.002J. The OS startup tax is 3,750x more expensive. Fix: implement batching
    with WorkManager on a 15-min schedule or move the model to a resident ContentProvider.

    '
  common_mistake: '**The Pitfall:** Assuming ML compute is the root cause of the battery
    drain.

    **The Rationale:** Candidates often guess there''s a memory leak in the ML model,
    failing to recognize that OS-level cold starts require orders of magnitude more
    energy than simple inference.

    **The Consequence:** Refactoring efficient ML code while ignoring the disastrous
    system-level event sequence.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Inference Energy: 2 ms at 1W

    - Cold Start Duration: 2.5s at 3W

    - Frequency: 10 SMS messages per day


    **Calculations:**

    - Inference Energy = 0.002 s * 1W = 0.002 Joules

    - Cold Start Energy = 2.5 s * 3W = 7.5 Joules

    - Total Energy per day = 10 * (7.5 J + 0.002 J) = 75.02 Joules


    **Conclusion & Interpretation:**

    - **Result: 75 Joules (OS Overhead-Bound)**. 10 cold boots per day consumes 75
    Joules, making it 3750x more expensive than inference.

    '
