title: Optimizing Retrieval Chunk Size for On-Device RAG on A17 Pro
scenario: An A17 Pro (8GB, 35 TOPS) RAG app chunks documents into 256-token chunks for retrieval. The LLM context window is 2048 tokens. Retrieval returns top-5 chunks. Currently precision @5=0.74 and generation quality score=0.71. A team proposes increasing chunk size to 512 tokens to improve context coherence.
question: How would you calculate the memory and latency impact and determine whether the quality improvement justifies the cost?
details:
  realistic_solution: 'Estimate the tradeoff across three budgets: index memory, retrieval latency, and context tokens. If the corpus has 100K tokens, 256-token chunks create about 391 embeddings while 512-token chunks create about 196, so a 768-dim FP16 FAISS index drops from about 0.60MB to 0.30MB before metadata. Retrieval work also falls roughly in half for a flat scan, though end-to-end latency may improve only by a few milliseconds because embedding and LLM prefill dominate. Context is the binding constraint: top-5 at 512 tokens consumes 2560 tokens and cannot fit in a 2048-token window. Reducing to top-3 uses 1536 context tokens, leaving 412 tokens after a 100-token query, compared with 668 tokens for 5x256-token retrieval. Because larger chunks reduce retrieval breadth and often lower precision@5 when relevant text is diluted, approve 512-token chunks only if measured generation quality improves enough under top-3 retrieval to offset the smaller response budget. A safer design is
    256-token retrieval with neighbor expansion only for the top-1 or top-2 hits.'
  common_mistake: |
    **The Pitfall:** Assuming larger chunks are always better for quality.
    **The Rationale:** Candidates focus on context coherence but ignore precision drop and context window consumption.
    **The Consequence:** Reduced retrieval precision and an LLM that runs out of space to generate complete answers.
  napkin_math: |
    **Assumptions & Constraints:**
    - LLM Context Window: 2048 tokens.
    - Query Overhead: 100 tokens.
    - Example corpus: 100,000 tokens.
    - Embedding index: 768 dimensions stored as FP16 (2 bytes/value), excluding metadata.
    - Retrieval latency is roughly proportional to number of vectors for a flat/small local index.

    **Calculations:**
    - Baseline chunks: ceil(100,000 / 256) = 391 vectors.
    - Proposed chunks: ceil(100,000 / 512) = 196 vectors.
    - Baseline index memory: 391 * 768 * 2 bytes = 600,576 bytes ~= 0.57 MiB.
    - Proposed index memory: 196 * 768 * 2 bytes = 301,056 bytes ~= 0.29 MiB.
    - Retrieval vector work: 196 / 391 ~= 50% of baseline, before fixed query-embedding overhead.
    - Baseline context use: 5 chunks * 256 = 1280 tokens.
    - Baseline response budget: 2048 - 1280 - 100 = 668 tokens.
    - If serving packs all top-5 chunks, proposed context use: 5 chunks * 512 = 2560 tokens (> 2048 limit), so that policy is invalid.
    - Under a top-3 full-chunk fallback policy, context use: 3 chunks * 512 = 1536 tokens.
    - Under that same top-3 policy, response budget: 2048 - 1536 - 100 = 412 tokens.

    **Conclusion & Interpretation:**
    - **Result: Context-bound tradeoff.** The larger chunks reduce the example index to ~0.29 MiB and flat-scan vector work to about 50%, but only a top-3 full-chunk packing policy fits the context window, leaving 412 response tokens. If the serving policy truncates or expands neighbors differently, recompute the response budget before approving the quality tradeoff.
