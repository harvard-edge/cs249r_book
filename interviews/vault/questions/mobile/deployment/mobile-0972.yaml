title: Federated Mobile Health Personalization Lifecycle for 5M Devices
scenario: A mobile health app uses on-device ML on a Tensor G3 for personalized activity recognition. The system fine-tunes a base model (10M params INT8, 10MB) using 30 days of on-device sensor data, then uploads adapter weights for fleet aggregation.
question: How would you design the full lifecycle including on-device training, privacy-preserving aggregation, global model update, and OTA distribution to 5M devices?
details:
  realistic_solution: Use an adapter-based federated lifecycle. On device, freeze the 10M-param base model and fine-tune only a 200K-param adapter during charging, on Wi-Fi, and under thermal/battery gates. With 30K local steps and about 0.4M FLOPs/step for the adapter path, training is 12B FLOPs total over 30 days, or 400M FLOPs/day; the peak lower bound is tiny, but real scheduling and framework overhead mean this should be treated as a background job budgeted in seconds per day, not milliseconds. For privacy, clip updates, add DP noise as required, and upload encrypted adapter deltas through secure aggregation cohorts so the server only sees aggregate sums. Each FP32 adapter delta is 200K × 4 bytes = 0.8MB; if all 5M devices contribute to an aggregation cycle, communication volume is 4TB. The aggregation service streams updates into a 200K-element accumulator, so memory is MB-scale per cohort, not 4TB. After validation, version the global model and adapter separately, ship staged OTA
    updates through CDN with canary rollout, health checks, and rollback. A 10MB base-model OTA to 5M devices is 50TB before CDN caching and differential update savings.
  common_mistake: |
    **The Pitfall:** Attempting to fine-tune the full 10M parameter model on-device.
    **The Rationale:** Not realizing that full backprop is rarely supported natively on mobile TPUs and consumes excessive memory/compute.
    **The Consequence:** Fails on-device execution or drains battery, whereas fine-tuning just the last 2 layers (200K params) is trivial and effective.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Device count: 5M devices.
       - Adapter size: 200K params (FP32).
       - Global model OTA: 10MB per device.
       - Tensor G3 capacity: 7.5 TOPS.
       - Steps: 30K gradient steps.
    2. **Calculations:**
       - On-device training FLOPs: 0.4M FLOPs/step * 30K steps = 12B FLOPs = 12 GFLOPs over 30 days.
       - Peak lower-bound time on 7.5 TOPS TPU: 12B / 7.5T = 1.6ms total, which is not a realistic wall-clock estimate.
       - With 1% effective utilization after scheduling, data loading, and framework overhead: 1.6ms / 0.01 = 160ms total over 30 days, still negligible; budget seconds/day for thermal-safe background execution.
       - Adapter upload: 200K * 4 bytes = 0.8MB per device.
       - Total upload for 5M devices: 5M * 0.8MB = 4TB communication volume per full-fleet aggregation cycle.
       - Aggregation memory: one FP32 accumulator is 200K * 4 bytes = 0.8MB, plus cohort buffers; stream updates rather than storing all 4TB.
       - Global model OTA: 10MB * 5M = 50TB.
    3. **Conclusion & Interpretation:**
       - **Result: Lifecycle is bandwidth-, privacy-, and rollout-bound.** Device compute is small for adapter tuning; the design risk is secure aggregation, DP/privacy accounting, 4TB-scale update collection, staged OTA distribution, and rollback safety.
