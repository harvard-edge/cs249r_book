title: 'Tensor G3 Model Rollout: Choosing a Strategy'
scenario: 'Your team is deploying a significant update to an on-device ML model for real-time image recognition. You need a rollout strategy that minimizes user impact from potential performance regressions or increased battery drain, while quickly gathering metrics on efficacy and stability in production.'
question: 'Which rollout strategy would you use for a Tensor G3 on-device model update (7.5 TOPS TPU, 12 GB shared RAM) to safely collect metrics without degrading user battery life?'
details:
  realistic_solution: 'A combination of shadow deployments followed by canary deployments. Initially, a shadow deployment runs the new model in parallel (but not user-facing) on a small percentage of devices to collect vital telemetry on resource consumption (TPU utilization, LPDDR5X footprint, power draw). Once stability is confirmed, a canary deployment routes a small percentage (1-5%) of active users to the new model. Key KPIs like inference latency, battery drain, and UI jank are monitored before a full rollout.'
  common_mistake: |
    **The Pitfall:** Executing a 100% direct rollout without staged deployments.
    **The Rationale:** Engineers often trust local QA tests and underestimate the variability of real-world device states, background processes, and thermal conditions.
    **The Consequence:** Exposing millions of users simultaneously to a model that causes sudden battery drain or thermal throttling on their specific devices, leading to app uninstalls and emergency rollbacks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Average user: 200 inferences/hour.
    - Regression: New model causes a 5% increase in TPU utilization per inference.
    - Canary Group: 10,000 users.

    **Calculations:**
    - Per-User Impact: 200 inferences/hour * 0.05 = 10 additional TPU cycles per user per hour.
    - Canary Group Impact: 10,000 * 10 = 100,000 additional TPU cycles/hour across the cohort.

    **Conclusion & Interpretation:**
    - **Result: 100,000 cycles/hour (Power-Bound).** Monitoring this 100,000 cycle delta allows precise tracking of power consumption regressions before exposing the entire user base.
