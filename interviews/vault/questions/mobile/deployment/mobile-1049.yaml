title: Mobile SoC Limits for On-Device LLMs
scenario: Compare the TOPS ratings and RAM capacities for major mobile ML platforms, their power draw for LLM inference, and the maximum LLM parameter count each can support at INT4 and FP16 quantization.
question: What TOPS, RAM, power, and maximum INT4 and FP16 LLM sizes characterize modern mobile SoC platforms?
details:
  realistic_solution: |
    Characterize mobile LLM platforms by sustained compute, usable RAM, and power, not peak TOPS alone. Midrange phones are often in the 10-20 TOPS class with 6-8GB RAM and roughly 2-4W sustained ML power. Current flagship phones are commonly around 30-45+ TOPS with 8-16GB RAM and about 3-7W sustained LLM power before thermal throttling. The RAM tier usually sets the model-size ceiling.

    Weight-only capacity is simple: INT4 uses 0.5 bytes/parameter and FP16 uses 2 bytes/parameter. An 8GB device with about 5-6GB usable by the app has a theoretical weight-only limit of 10-12B INT4 or 2.5-3B FP16. A 12GB device with about 9-10GB usable reaches 18-20B INT4 or 4.5-5B FP16. A 16GB device with about 12-14GB usable reaches 24-28B INT4 or 6-7B FP16. Practical LLM limits are lower because the runtime also needs KV cache, activations, tokenizer/app memory, and thermal headroom. A 3-5B INT4 model is the safer universal target for 8GB devices; 7-8B INT4 is a high-end target; larger INT4 models are weight-fit only unless context length and concurrency are tightly constrained.
  common_mistake: |
    **The Pitfall:** Assuming all available RAM can be used purely for the model weights.
    **The Rationale:** Candidates forget to subtract OS, app overhead, and the required KV cache for LLMs.
    **The Consequence:** They overestimate the maximum runnable model size by several gigabytes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard INT4 precision: 0.5 bytes/parameter.
    - Standard FP16 precision: 2.0 bytes/parameter.
    - OS/app/runtime overhead: ~2-3 GB reserved out of total RAM before KV cache.

    **Calculations:**
    - 8GB device (5-6GB usable): INT4 weight-only limit = 10-12B params; FP16 weight-only limit = 2.5-3B params.
    - 12GB device (9-10GB usable): INT4 weight-only limit = 18-20B params; FP16 weight-only limit = 4.5-5B params.
    - 16GB device (12-14GB usable): INT4 weight-only limit = 24-28B params; FP16 weight-only limit = 6-7B params.
    - Practical 7B INT4 footprint: 7B * 0.5 bytes = 3.5GB weights, plus KV cache, activations, and runtime buffers, so it is plausible on high-end 8-16GB devices but not a safe universal target.

    **Conclusion & Interpretation:**
    - **Result: TOPS describes compute tier, but usable RAM and 3-7W sustained power set the practical LLM limit.** Weight-only math can make 10B+ INT4 look possible on 8GB devices, but KV cache and runtime overhead pull the reliable 8GB target down to about 3-5B INT4, with 7-8B INT4 reserved for high-end devices and constrained contexts.
