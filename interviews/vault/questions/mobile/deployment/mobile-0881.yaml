title: Explaining Token Budget Constraints for Compound AI on Tensor G3
scenario: A junior developer building a chatbot app is confused about why the LLM API on the cloud has a 128K context window, but the on-device model only has 2048 tokens.
question: Why is the context window so much smaller on mobile, and why does it matter for compound AI?
details:
  realistic_solution: 'On-device context limits are bound by memory capacity, memory bandwidth, and prefill time. For a rough 1B-class mobile transformer with about 24 layers and 2048 hidden width, assuming K and V each store the full hidden width in FP16, the KV cache is 2 * 24 * 2048 * 2 bytes = about 196KB per token. A 2048-token cache is already about 402MB, while a 128K-token cache would be about 25GB before app memory, model weights, and OS pressure. Prefill is also a coarse lower-bound compute problem: 128K tokens through a 1B model at about 2 ops per parameter per token is 2.56e14 dense ops, or roughly 114s at 2.25 effective TOPS before attention and runtime overhead. Even when raw memory fits, bandwidth and latency make huge windows unusable for mobile interaction. That is why mobile systems use small windows, retrieval, summarization, and sliding context.'
  common_mistake: |
    **The Pitfall:** Explaining the restriction as an arbitrary software limitation or a quirk of the model's training parameters.
    **The Rationale:** Engineers applying server-side mental models assume mobile NPUs are simply scaled-down GPUs with similar architectural scaling laws.
    **The Consequence:** Missing the fundamental physical constraints of the memory bus, leading to doomed architectural proposals that request massive contexts on hardware that physically cannot process it.
  napkin_math: |
    **Assumptions & Constraints:**
    - Example 1B-class mobile transformer: 24 layers, 2048 hidden width, FP16 KV cache.
    - KV per token approximation: 2 (K+V) * 24 layers * 2048 hidden values * 2 bytes = ~196 KB/token, assuming K/V storage maps to the full hidden width.
    - NPU compute: 7.5 TOPS peak, ~2.25 TOPS effective utilization.

    **Calculations:**
    - KV size (2048 tokens): 196 KB * 2048 = ~402 MB.
    - KV size (128K tokens): 196 KB * 128,000 = ~25 GB.
    - Coarse dense prefill lower bound for 128K tokens: 128,000 tokens * 2 ops/parameter/token * 1B parameters = 2.56e14 ops.
    - Prefill lower-bound time: 2.56e14 / 2.25e12 = ~114 seconds, before quadratic attention and framework overhead.
    - Decode with very long context also becomes bandwidth-heavy because each new token attends over the accumulated KV cache; exact tok/s depends on model layout and kernels, so it should not be reduced to a single unsupported throughput number.

    **Conclusion & Interpretation:**
    - **Result: Memory, bandwidth, and prefill-bound.** A 128K context is not a small software switch on mobile; KV cache growth, long-context memory bandwidth, and prefill latency push it far beyond interactive chatbot budgets.
