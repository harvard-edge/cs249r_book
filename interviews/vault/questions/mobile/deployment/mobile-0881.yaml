title: Explaining Token Budget Constraints for Compound AI on Tensor G3
scenario: A junior developer building a chatbot app is confused about why the LLM API on the cloud has a 128K context window, but the on-device model only has 2048 tokens.
question: Why is the context window so much smaller on mobile, and why does it matter for compound AI?
details:
  realistic_solution: 'On-device context limits are bound by brute-force hardware physics. First, memory capacity: a 128K KV cache requires ~700MB of RAM, which is completely unscalable. Second, decoding bandwidth: streaming that 700MB payload on every single token step annihilates LPDDR5X bandwidth. Third, prefill compute: processing 128K tokens simultaneously requires ~114 seconds of sustained math on the NPU. It simply takes too long and too much RAM.'
  common_mistake: |
    **The Pitfall:** Explaining the restriction as an arbitrary software limitation or a quirk of the model's training parameters.
    **The Rationale:** Engineers applying server-side mental models assume mobile NPUs are simply scaled-down GPUs with similar architectural scaling laws.
    **The Consequence:** Missing the fundamental physical constraints of the memory bus, leading to doomed architectural proposals that request massive contexts on hardware that physically cannot process it.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory bandwidth: 68 GB/s.
    - Model KV per token (bf16): 2 (K+V) * 22 layers * 64 dim * 2 bytes = 5.6 KB/token.
    - NPU Compute: 7.5 TOPS (2.25 TOPS effective utilization).

    **Calculations:**
    - KV Size (2048 tokens): 5.6 KB * 2048 = ~11.5 MB.
    - KV Size (128K tokens): 5.6 KB * 128,000 = ~716 MB.
    - Prefill Latency (128K): 128,000 * 2 * 1B params / 2.25e12 = ~113.8 seconds.
    - Decode bandwidth limit (128K): Reading 716 MB/step at 68 GB/s limits throughput to < 95 tok/sec regardless of compute.

    **Conclusion & Interpretation:**
    - **Result: Memory and Compute-Bound**. Edge architecture physically rejects a 128K context. The 716 MB/token memory bandwidth drag and the brutal 2-minute prefill delay make it computationally impossible.
