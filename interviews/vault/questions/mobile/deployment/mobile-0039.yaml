title: The Multi-Model Orchestration Nightmare
scenario: 'Your team is building a sophisticated AR application that requires running three ML models concurrently: a body pose estimation (high-res video input, GPU/NPU), a small speech recognition (audio input, CPU), and a gesture classifier (low-res video region, NPU). All must run in real-time.'
question: How would you orchestrate pose, speech, and gesture models concurrently on one mobile SoC without missing real-time budgets?
details:
  realistic_solution: 'A robust pipeline requires sophisticated hardware-aware scheduling: 1. **Task Prioritization & Scheduling:** Identify the latency-sensitive model. Assign higher OS thread priorities for its pre/post-processing and accelerator dispatch. Use asynchronous dispatch for all models. 2. **Accelerator Allocation & Contention Management:** Speech is CPU-bound and targets big cores. Pose and gesture target the NPU. Since NPU drivers time-slice concurrent graphs, sequence gesture after pose, or offload gesture to the GPU to prevent NPU pipeline thrashing. 3. **Memory Bandwidth Management:** Minimize copies via zero-copy shared memory buffers (`AHardwareBuffer`). 4. **Power & Thermal Management:** Implement DVFS awareness to monitor SoC temperature.'
  common_mistake: |
    **The Pitfall:** Simply dispatching all models in parallel on different threads and hoping the OS resolves the contention.
    **The Rationale:** Developers rely on default abstractions without manually configuring OS thread priorities, NPU time-slicing, and memory bus traffic control.
    **The Consequence:** Severe accelerator contention, context-switching overhead, and missed real-time latency deadlines (jank).
  napkin_math: |
    **Assumptions & Constraints:**
    - 3 models: Pose (NPU), Speech (CPU), Gesture (NPU).
    - Pose latency: 30ms inference + 20ms pre/post.
    - Gesture latency: 10ms inference.
    - Shared LPDDR5 bus bandwidth: 60 GB/s.

    **Calculations:**
    - NPU contention penalty: Context switching inflates total NPU execution from 40ms to 60-80ms.
    - Memory contention: Pose (20 GB/s) + Speech (5 GB/s) + Gesture (5 GB/s) = 30 GB/s (high jitter risk).

    **Conclusion & Interpretation:**
    - **Result: 30 GB/s (Accelerator Contention-Bound)**. Speech must map to CPU big cores, Pose to the NPU, and Gesture sequenced after Pose or offloaded to the GPU to avoid catastrophic NPU pipeline thrashing.
