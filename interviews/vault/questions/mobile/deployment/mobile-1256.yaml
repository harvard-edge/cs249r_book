title: Diagnosing OOM in On-Device LLM Shadow Rollout
scenario: You are running a shadow deployment of an upgraded on-device LLM on Google Tensor G3 devices. The new model silently processes user inputs in the background to log output differences against the active control model. However, telemetry from the shadow cohort reveals a massive spike in system-level OOM app terminations and severe UI stuttering.
question: Why does a Tensor G3 shadow rollout of an LLM cause OOM and UI stutter, and what rollout architecture avoids it?
details:
  realistic_solution: The root cause is RAM capacity pressure from holding both the control and shadow models resident at the same time. That concurrent footprint leaves little headroom for the OS, UI, camera, and other apps, so Android LMKD may kill processes and the UI can stutter under reclaim pressure. The practical rollout fix is a non-concurrent A/B canary where each device loads only one model, or server-side shadow evaluation using logged requests when both model outputs must be compared.
  common_mistake: |
    **The Pitfall:** Misdiagnosing OOM spikes as a compute bottleneck on the TPU.
    **The Rationale:** Candidates assume 7.5 TOPS isn't enough for concurrent inference, overlooking the static memory capacity footprint of hosting two large LLMs.
    **The Consequence:** They try to tweak CPU thread priorities or quantize models slightly, which fails to resolve the physical 12GB memory limit exhaustion.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Tensor G3-class devices may have a 12 GB shared memory configuration.
    - Model: INT8 quantized 3.2B parameter LLM (~3.2 GB).
    - Deployment: Concurrent control and shadow models.
    - OS/UI/background reservation: ~4 GB.

    **Calculations:**
    - Shadow Overhead: 3.2 GB × 2 models = 6.4 GB.
    - Total baseline memory used: 6.4 GB + 4 GB = 10.4 GB.
    - Remaining Headroom: 12 GB - 10.4 GB = 1.6 GB.

    **Conclusion & Interpretation:**
    - **Result: Memory-Capacity Pressure.** The concurrent rollout leaves only ~1.6 GB before other foreground apps or camera buffers arrive. A normal workload can push the process into reclaim/OOM territory, so only one large model should be loaded per device during canary rollout.
