title: Mastering End-to-End Optimization of a 4-Stage Compound Pipeline on Snapdragon 8 Gen 3
scenario: A Snapdragon 8 Gen 3 compound AI system currently processes queries in 3.8 seconds. The pipeline includes OCR (400ms), embedding+retrieval (250ms), cross-encoder reranking of 20 docs (600ms), and 3B LLM generation of 80 tokens (2550ms). The target is 1.5 seconds P95.
question: How would you design a comprehensive optimization strategy that achieves this target without changing models or hardware?
details:
  realistic_solution: 'Restructure the pipeline and verify each change with P95 traces: (1) parallelize OCR and query embedding where dependencies allow, (2) reduce reranker candidates with quality-gated top-K sparsification, (3) quantize or tune kernels only if accuracy and measured latency hold for the same 3B model, (4) cap generated tokens or stream partial answers when the product can tolerate shorter output, and (5) overlap prompt construction/prefill with the final reranker chunks if the runtime supports it. The 1.5s target is aggressive; it should be treated as a profiling target, not as proven by unsupported halving assumptions.'
  common_mistake: |
    **The Pitfall:** Applying standard latency optimizations independently without restructuring the pipeline dependencies.
    **The Rationale:** Candidates fail to realize that the 3B LLM generation is heavily memory-bandwidth-bound, so quantization alone will not bridge the gap to the 1.5s target.
    **The Consequence:** The final pipeline remains far from the 1.5s P95 latency target, rendering the feature unusable.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: < 1.5s P95 total latency.
    - Original serial total: 400ms + 250ms + 600ms + 2550ms = 3800ms.
    - The scenario does not provide measured speedups for quantization, shorter outputs, overlap, or reranker pruning.

    **Calculations:**
    - Non-LLM work is 400ms + 250ms + 600ms = 1250ms before overlap or candidate pruning.
    - LLM generation alone is 2550ms for 80 tokens, or about 31.9ms/token under the current stack.
    - To fit a 1500ms end-to-end budget without overlap, non-LLM work would leave only 250ms for generation, which is about 8 tokens at the current rate.
    - Therefore the strategy must both reduce/overlap non-LLM stages and reduce measured LLM decode latency; a made-up INT4 2x gain or 35-token cap is not sufficient proof.
    - A defensible release plan reports before/after P95 traces for each stage and counts only overlap that the dependency graph and runtime actually permit.

    **Conclusion & Interpretation:**
    - **Result: Pipeline-latency target, not arithmetic proof.** The target may be reachable only with measured gains from overlap, reranker pruning, shorter streamed outputs, and faster same-model kernels; exact P95 success cannot be claimed from the provided numbers alone.
