title: The 50-Feature Mobile ML Platform
scenario: 'You''re the ML platform architect for a super-app that has 50 different ML features. Each feature team wants to ship their own model. The app is already 300 MB. Users on budget phones with 3 GB RAM complain about performance.'
question: "How should a super-app with 50 ML features fit on 3 GB phones without shipping 50 separate full models?"
details:
  realistic_solution: 'Shared ML infrastructure: common backbone (20 MB) + 50 task heads (~1 MB each). Resident memory: ~40 MB vs 1.75 GB naive. Each feature team publishes a task head, not a full model.'
  common_mistake: |
    **The Pitfall:** Allowing uncoordinated model deployments.
    **The Rationale:** "Let each team bundle their own model and runtime." Candidates fail to recognize the multiplicative cost of monolithic deployments in a super-app context.
    **The Consequence:** The application balloon to over 1GB, and concurrent execution of independent runtimes guarantees out-of-memory (OOM) crashes on budget devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Number of ML features: 50.
    - Budget device available RAM: ~1.5 GB.
    - Naive average model: 20 MB + 15 MB runtime overhead.

    **Calculations:**
    - Naive approach size: 50 models * 20 MB = 1 GB.
    - Naive footprint: 1 GB + (50 * 15 MB runtimes) = 1.75 GB (OOMs device).
    - Shared platform backbone: 20 MB.
    - Shared platform task heads: 50 * 1 MB = 50 MB.
    - Shared platform resident footprint: 20 MB backbone + 1 MB active head + 15 MB runtime = ~36 MB.

    **Conclusion & Interpretation:**
    - **Result: Memory Efficiency Achieved**. A shared backbone architecture reduces peak resident memory footprint by over 40x, comfortably fitting within the budget device's limits.
