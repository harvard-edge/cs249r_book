title: Multi-Platform LLM Model Format Strategy for iOS and Android
scenario: You are the tech lead responsible for deploying a 3B-parameter LLM on iOS 18 and Android.
question: How would you design the full multi-platform model format strategy for size and latency?
details:
  realistic_solution: |
    Ship one validated model family with platform-specific artifacts, not one generic file. For iOS 18, export a CoreML stateful model with W4A16 weights, chunked prefill, ANE delegate coverage, and a CPU/GPU fallback only for unsupported operators. For Snapdragon Android, export a QNN/Hexagon artifact and use W8A16 on high-RAM devices when the INT8 kernels are faster and more accurate; keep a W4A16 Android tier for memory-constrained devices. Maintain parity with shared tokenizer files, shared prompt templates, golden-output regression tests, and per-platform latency/quality gates. Roll out by device class with fallback to a smaller local model or server path when delegate coverage, thermal state, or memory budget fails.
  common_mistake: |
    **The Pitfall:** Choosing the same quantization level for both platforms.
    **The Rationale:** Engineers assume a single exported format and precision will behave similarly across CoreML/ANE and Android NPU delegates, instead of measuring device-specific memory pressure, delegate coverage, and latency for each target class.
    **The Consequence:** One platform may hit avoidable OOM or fallback paths while the other ships with unnecessary accuracy loss or slower kernels.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 3B parameters.
    - iOS primary artifact: CoreML stateful W4A16.
    - Android high-memory artifact: QNN W8A16; Android fallback tier: QNN W4A16.
    - Decode latency is usually bounded by compressed weight traffic plus KV/scheduler overhead, while prefill is controlled with chunk size and delegate coverage.

    **Calculations:**
    - W4 weight size: 3B * 0.5 bytes = 1.5GB before packaging overhead.
    - W8 weight size: 3B * 1 byte = 3.0GB before packaging overhead.
    - Under a simple per-token weight-read lower-bound model, W4 needs about half the memory traffic of W8, but actual TPOT depends on whether CoreML/ANE or QNN/Hexagon has native kernels or dequantization overhead.
    - TTFT should be measured per delegate with fixed prompt lengths and chunk sizes; do not estimate it as 2 * tokens * parameter_count alone because attention, KV writes, graph launches, and memory movement matter.
    - Consistency checks: same tokenizer and prompts, golden logits/text samples, accuracy suite per quantization recipe, and rollback if platform quality or latency diverges.

    **Conclusion & Interpretation:**
    - **Result: Platform-specific artifacts with shared validation.** Use iOS W4A16 for memory headroom, Android W8A16 where INT8 delegate throughput and RAM allow it, Android W4A16 as a smaller tier, and enforce parity through common tokenizer assets, delegate checks, latency gates, and quality regression tests.
