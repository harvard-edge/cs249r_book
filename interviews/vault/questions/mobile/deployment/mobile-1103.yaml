title: CI/CD to On-Device Performance Gap
scenario: Your MLOps pipeline benchmarks a 3 Billion parameter model (INT8 quantized, 3 GB footprint) for the Google Tensor G3 (7.5 TOPS, 60 GB/s bandwidth). In the CI/CD cloud environment using batched requests, the model is compute-bound. On the Tensor G3 serving a single user (batch size 1), TPU compute utilization is only 1.6%, generating exactly 20 tokens per second.
question: Why is a 3B INT8 model compute-bound in batched CI but only 1.6% utilized at batch size 1 on Tensor G3?
details:
  realistic_solution: The discrepancy occurs because on-device LLM generation at batch size 1 is strictly memory-bandwidth bound. In the CI/CD pipeline, large batch sizes amortize the cost of loading the weights across multiple requests. On the Tensor G3, for every single token generated, the entire 3 GB model must be shuttled from the 12 GB LPDDR5X memory to the TPU, making the 7.5 TOPS compute capacity sit idle while waiting for memory transfers.
  common_mistake: |
    **The Pitfall:** Ignoring the shift from compute-bound to memory-bound execution at batch size 1.
    **The Rationale:** Candidates often assume the device is thermal throttling or lacks operator support, missing that batched requests in CI amortize weight loading costs.
    **The Consequence:** They fail to optimize the correct bottleneck, often trying to reduce model computations instead of memory footprint or bandwidth requirements.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3 Billion parameter INT8 model (3 GB).
    - Google Tensor G3: 7.5 TOPS (7500 GOps/s), 60 GB/s memory bandwidth.

    **Calculations:**
    - Max memory throughput: 60 GB/s / 3 GB per token = 20 tokens/sec.
    - Compute required: 3B params * 2 ops = 6 Giga-Ops per token.
    - Compute time per token: 6 GOps / 7500 GOps/s = 0.8 ms.
    - Actual time per token from memory bottleneck: 1 sec / 20 tokens = 50 ms.
    - Compute utilization: 0.8 ms / 50 ms = 1.6%.

    **Conclusion & Interpretation:**
    - **Result: 1.6% utilization (Memory-Bandwidth Bound)**. At batch size 1, loading weights dominates the latency.
