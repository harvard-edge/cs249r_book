title: The Model Update Delta Compression
scenario: Your app ships a 100 MB INT8 object detection model. You've retrained with 5% more data and fine-tuned the last 10 layers. Pushing a full 100 MB update over cellular wastes user bandwidth.
question: Design a delta update system, calculate the expected patch size, and explain the unique challenge for quantized models.
details:
  realistic_solution: Design a layer-aware delta update system that freezes global quantization parameters (scale and zero-point) for unmodified layers. Compress the sparse delta using entropy coding. This prevents minor activation shifts from causing a cascade of bit-level changes across the entire binary.
  common_mistake: |
    **The Pitfall:** Relying on standard binary diff tools (like bsdiff) for quantized model updates.
    **The Rationale:** Engineers assume standard file diffs will efficiently identify the 'unchanged' layers.
    **The Consequence:** Global quantization parameters shift slightly, causing the entire 100MB binary file to mutate and generating massive patch sizes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Full Update: 100 MB.
    - Changed layers: 10% (10 MB raw delta).
    - INT8 Entropy Compression: ~0.8 bits/value for sparse deltas.

    **Calculations:**
    - Compressed Patch Size: 10 MB * (0.8 bits / 8 bits) = 1 MB.
    - Bandwidth Savings: (100 MB - 1 MB) / 100 MB = 99% reduction.
    - Fleet Egress (10M users): 1 MB * 10M = 10 TB.

    **Conclusion & Interpretation:**
    - **Result: 1 MB patch size (Network-Bound)**. Freezing quantization parameters unlocks 99% egress savings, drastically lowering cellular bandwidth costs.
