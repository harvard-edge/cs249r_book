title: 'Model Format Conversion: Full Stack LLM Conversion for On-Device iOS Deployment'
scenario: You need to convert and deploy a 1B-parameter LLaMA-style model to iOS using CoreML on an A17 Pro. The full stack includes PyTorch to ONNX to a CoreML stateful model with KV-cache, INT4 weight compression, and chunked prefill.
question: How do you evaluate conversion time, model size, TTFT, TPOT, and maximum context length for a 1B model in 8GB RAM?
details:
  realistic_solution: 'Evaluate conversion separately from runtime. A PyTorch-to-ONNX-to-CoreML stateful conversion for a 1B model is a build-time task, typically tens of minutes to a few hours depending on graph cleanup, quantization calibration, CoreML compilation, and parity tests; it is not part of TTFT or TPOT. Runtime size: INT4 weights are 1B × 0.5 bytes = 500MB. KV state uses 32 layers × 2 (K,V) × seq × hidden_dim × 2 bytes. At seq=4096 and hidden=2048, KV is 1.07GB, so weights plus KV are about 1.57GB before runtime overhead. TTFT for a 512-token prompt with 128-token chunks is roughly 4 × 7.3ms = 29.2ms as a bandwidth/compile lower-bound estimate. TPOT lower bound is 500MB / 68GB/s = 7.35ms/token, but real TPOT should include KV reads, sampling, and scheduler overhead. KV per token is 32 × 2 × 2048 × 2 = 262KB, so after reserving 1.5GB for OS/runtime overhead and 0.5GB for weights, about 6GB remains for KV, giving a theoretical maximum near 24K tokens; a production cap of 16K leaves
    safer headroom.'
  common_mistake: |
    **The Pitfall:** Implementing KV-cache as standard model inputs instead of using CoreML stateful models.
    **The Rationale:** Developers often rely on older static graph conversion methods instead of leveraging iOS 18+ state variables for in-place updates.
    **The Consequence:** O(N^2) memory growth during generation, causing the app to crash with Out-Of-Memory (OOM) errors at context lengths > 512 tokens.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 1B parameters, INT4 (0.5 bytes/param).
    - Example configured context: max_seq = 4096, hidden_dim = 2048, 32 layers.
    - RAM: 8 GB. Apple A17 Pro (35 TOPS, 68 GB/s).
    - Runtime reserve for OS, CoreML arena, activations, and app memory: 1.5GB.

    **Calculations:**
    - Conversion time: one-time build cost, estimate 30-180 minutes for export, quantization, CoreML compilation, and parity validation.
    - Weights: 1B × 0.5 bytes = 500 MB.
    - KV State: 32 × 2 × 4096 × 2048 × 2 bytes = 1.07 GB.
    - TTFT (Chunked Prefill): 4 chunks × 7.3ms = 29.2ms.
    - TPOT lower bound: 500 MB / 68 GB/s = 7.35 ms/token, before KV/sampling/scheduling overhead.
    - KV per token: 32 × 2 × 2048 × 2 bytes = 262KB/token.
    - Memory available for KV after weights and reserve: 8GB - 1.5GB - 0.5GB = 6GB.
    - Max context length: 6GB / 262KB per token ≈ 24K tokens. A 16K production cap keeps about 2GB of additional headroom.

    **Conclusion & Interpretation:**
    - **Result: Conversion is a one-time 30-180 minute build/validation cost; runtime is memory-bandwidth-bound.** A 4096-token state fits easily at about 1.57GB including weights, TPOT has a 7.35ms/token lower bound, and the defensible production context cap is about 16K rather than the theoretical ~24K maximum.
