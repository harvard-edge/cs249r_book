title: 'MLOps Lifecycle: Optimize Mobile App CI/CD Pipeline for ML Model Updates'
scenario: 'A mobile ML team''s CI/CD pipeline for CoreML updates takes 4.3 hours: model training (2hr), ONNX export (5min), CoreML conversion (15min), automated testing on device farm (1.5hr), and App Store submission (30min). The target is < 2.5 hours total.'
question: What is the most effective way to optimize the non-training stages of the CI/CD pipeline to drastically reduce the total time?
details:
  realistic_solution: Optimize the non-training critical path with sharded tests, cached conversion, and automated submission packaging. The current pipeline is 120 + 5 + 15 + 90 + 30 = 260 minutes (4h20m, about 4.3 hours), with 140 minutes outside training. Keep training at 120 minutes, reduce CoreML conversion from 15 to 5 minutes with converter caching and stable graph inputs, shard the device farm from 90 to 5 minutes, and automate export/submission packaging to about 5 minutes each. OTA model-artifact delivery can help only when platform policy allows model updates without changing app behavior; it should not be described as bypassing App Store review.
  common_mistake: |
    **The Pitfall:** Focusing optimization efforts on the compute-bound model training phase.
    **The Rationale:** Engineers instinctively try to speed up the longest single step (training), ignoring that training has hard compute constraints and is less malleable than pipeline logistics.
    **The Consequence:** Marginal gains are achieved at high engineering cost, while massive, easy time-savings in testing and deployment are ignored.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current non-training time: 140m.
    - Target total: < 150m (2.5 hr).
    - Training time: 120m.

    **Calculations:**
    - Current total: 120m training + 5m export + 15m conversion + 90m tests + 30m submission = 260m.
    - Sharded tests: 90m -> 5m.
    - Cached CoreML conversion: 15m -> 5m.
    - Automated submission packaging: 30m -> 5m. This does not remove platform review requirements.
    - Optimized non-training = 5m export + 5m conversion + 5m tests + 5m submission = 20m.

    **Conclusion & Interpretation:**
    - **Result: Pipeline-Bound**. Total pipeline time is reduced to 120m + 20m = 140 minutes, meeting the <150 minute target without relying on an App Store policy bypass.
