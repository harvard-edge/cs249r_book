title: Mastering On-Device Knowledge Base Update Strategy for Compound AI on Tensor G3
scenario: A Tensor G3 (7.5 TOPS, 12GB) enterprise mobile app serves 10,000 users with personalized on-device RAG. Each user has a local corpus of 2,000 documents. The enterprise syncs 50 new/updated documents per user per day via MDM push. The embedding model (256-dim, INT8, 22MB) runs at 150 vecs/s on Tensor G3 NPU.
question: How would you design a knowledge base update strategy that maintains retrieval quality, minimizes battery impact, and handles the case where updates arrive while the user is actively using the app?
details:
  realistic_solution: 'Copy-on-write index with shadow update: (1) Maintain active index (read-only, served from mmap). (2) Background thread builds a shadow index by adding new vectors to a cloned or delta index. (3) When shadow is complete, perform an atomic pointer swap (< 1ms). (4) During active use, queue incoming updates in a tiny flat index (max 50 entries = 50 * 256 * 4 = 51KB) and query active_index + flat_pending_index, then merge results. (5) Schedule shadow builds when screen-off or charging, using a 10% NPU duty cycle. Embedding 50 docs takes 50/150 = 0.33s of active NPU compute; at 10% duty, that spans about 3.3s of wall-clock time. If active NPU power is 5W, energy is 5W * 0.33s = 1.65J; the equivalent 0.5W average is just the 10% duty-cycled view over the 3.3s window. During active use, query the active and pending indexes in parallel, so latency is dominated by the slower path plus a small merge cost.'
  common_mistake: |
    **The Pitfall:** Updating the FAISS index atomically by taking a write lock during active user querying.
    **The Rationale:** Developers often use simple thread locks for data structure updates without calculating the blocking time caused by the underlying NPU embedding latency.
    **The Consequence:** The retrieval stage blocks for up to 333ms, causing users to experience random, noticeable pauses mid-conversation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Update Workload: 50 docs/day at 150 vecs/s.
    - Index insertion: FAISS HNSW adding 50 vectors takes ~5ms.
    - Active-use Overhead (Flat Index): 50 vectors * 256 dims * 4 bytes = 51 KB. Search time = 0.5ms.

    **Calculations:**
    - Active NPU time: 50 / 150 = 0.33s.
    - Wall-clock time at 10% duty cycle: 0.33s / 0.10 = 3.3s elapsed.
    - Battery impact: 5W active * 0.33s active = 1.65 J = ~0.00046 Wh per day.
    - Equivalent duty-cycle view over the update window: (5W * 10%) * 3.3s elapsed = 0.5W average * 3.3s = 1.65 J.
    - Parallel query latency: max(HNSW active index at 5ms, flat pending index at 0.5ms) + merge overhead, so roughly 5ms plus a small merge cost rather than a simple 5.5ms serial sum.

    **Conclusion & Interpretation:**
    - **Result: 0.33s active compute, 3.3s elapsed background time, and query latency dominated by the active HNSW path.** The dual-index strategy keeps user-facing retrieval responsive while making the daily update energy small under the stated duty-cycle assumptions.
