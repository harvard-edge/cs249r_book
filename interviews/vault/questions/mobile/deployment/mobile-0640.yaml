title: Architecting a Multi-Model On-Device AI Assistant
scenario: You're designing an on-device AI assistant that must simultaneously support
  wake word, ASR, a 3B parameter LLM, TTS, and real-time vision. All five models cannot
  fit in device memory simultaneously.
question: How should the system orchestrate and schedule the wake word, ASR, 3B LLM,
  TTS, and vision models given the memory constraints?
details:
  realistic_solution: 'Design a **state-machine-driven model orchestrator** that loads
    models on-demand based on the conversation state:'
  common_mistake: '**The Pitfall:** Assuming all models can be kept permanently resident
    in RAM.

    **The Rationale:** Engineers sum up weights and mathematically fit them within
    the 8 GB total RAM spec.

    **The Consequence:** Ignoring OS overhead, activation buffers, and KV-caches,
    causing the OS to aggressively kill the app.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - Device total RAM: 8 GB (~4\
    \ GB app budget safely).\n   - Peak resident memory limit: 2.5 GB.\n   - I/O Bandwidth:\
    \ ~3 GB/s NVMe.\n2. **Calculations:**\n   - State transition loads: ASR (200 MB\
    \ / 3 GB/s = 67 ms), LLM (1.7 GB / 3 GB/s = 567 ms).\n   - Total Perceived Latency:\
    \ 50 ms (wake) + ~500 ms (streaming) + 200 ms (LLM pre-load) + 45 ms (first token)\
    \ = ~800 ms.\n3. **Conclusion & Interpretation:**\n   - **Result: ~800 ms Latency\
    \ (State-Machine Orchestration).**\n"
