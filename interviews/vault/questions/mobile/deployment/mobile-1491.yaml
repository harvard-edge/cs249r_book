title: Shadow Deployment Design for Exynos 2400
scenario: You are tasked with designing a shadow deployment strategy for a new image enhancement model targeting the Samsung Exynos 2400 NPU. The new model requires 1.5 GB of RAM and executes in 15ms per frame, while the existing CPU/GPU pipeline is currently using 8 GB of the shared 12 GB LPDDR5X memory.
question: How would you specify an Exynos 2400 shadow deployment that protects latency and memory headroom without causing memory starvation or thermal throttling?
details:
  realistic_solution: Specify a telemetry-gated shadow rollout where the NPU model executes asynchronously on a sampled subset of frames rather than the full 30 fps video stream. Before each shadow batch, project total shared-memory use and abort if adding the 1.5 GB model would leave less than about 1.5 GB of system headroom. Gate execution on frame latency, LPDDR5X bandwidth, skin temperature, and allocator failures, and drop shadow samples rather than delaying the primary CPU/GPU pipeline.
  common_mistake: |
    **The Pitfall:** Designing the shadow deployment to run synchronously on every frame and assuming the NPU has isolated memory.
    **The Rationale:** Candidates treat the NPU as a separate system and ignore the unified LPDDR5X architecture where NPU memory allocations compete with the primary CPU/GPU pipeline.
    **The Consequence:** The 1.5 GB shadow model allocation starves the primary pipeline of bandwidth, leading to dropped frames in the user-facing application.
  napkin_math: |
    **Assumptions & Constraints:**
    - Unified Memory: 12 GB
    - Baseline primary pipeline usage: 8 GB
    - Protected system headroom: 1.5 GB
    - Target Framerate: 30 FPS
    - Shadow model: 1.5 GB RAM, 15ms compute/frame

    **Calculations:**
    - Maximum allowed total usage = 12 GB - 1.5 GB protected headroom = 10.5 GB.
    - Projected total with shadow model = 8 GB + 1.5 GB = 9.5 GB, leaving 2.5 GB raw free and 1.0 GB above the protected headroom.
    - Compute utilization at 30 FPS = 30 * 15 ms = 450 ms of active NPU time per second (45%)
    - At 10 FPS sampling, active NPU time = 10 * 15 ms = 150 ms per second (15%).

    **Conclusion & Interpretation:**
    - **Result: 45% NPU Time at Full-Rate Shadowing.** The memory projection can fit with headroom, but full-rate shadowing consumes a large share of accelerator time; sampled async execution plus telemetry gates protects latency, bandwidth, and thermal margins.
