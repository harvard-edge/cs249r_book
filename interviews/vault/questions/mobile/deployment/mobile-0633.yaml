title: The Voice Assistant That Froze The Speedometer
scenario: Your team deploys a new voice assistant with an on-device LLM to your company's flagship electric vehicle. To maximize hardware utilization, you implement a continuous batching scheduler for the NPU. In single-query tests, the assistant is snappy. However, when QA tests it under realistic concurrent conditions, the digital speedometer and instrument cluster intermittently freeze.
question: 'Assess the situation: Why would an LLM scheduling optimization, designed to improve throughput, cause a catastrophic failure in the hard-real-time instrument cluster?'
details:
  realistic_solution: This is a classic resource contention problem on a mobile System-on-Chip (SoC), specifically memory bandwidth starvation, directly caused by the continuous batching strategy. Continuous batching's goal is to keep the NPU 100% utilized by creating a persistent queue of work. This turns the NPU into a relentless, greedy consumer of the shared memory bus, constantly loading model weights and KV caches for its concurrent requests. On an SoC, the NPU, GPU (for the instrument cluster), and CPUs all share the same DRAM controller and bandwidth. The instrument cluster's small, periodic, but hard-real-time request to read its framebuffer from DRAM to the display controller gets stuck in the memory queue behind the NPU's massive, multi-gigabyte transfers. Queueing theory shows that as resource utilization approaches 100%, wait times explode non-linearly. The continuous batcher saturated the memory bus, causing the GPU's wait time to exceed its 16ms deadline, resulting in dropped
    frames and a system freeze. The optimization for LLM throughput directly starved the critical real-time rendering pipeline.
  common_mistake: |
    **The Pitfall:** Dismissing the freeze as purely an OS scheduler priority bug.
    **The Rationale:** Candidates assume CPU threads are the only contention point, missing the shared hardware memory bus.
    **The Consequence:** They tweak OS priorities indefinitely without realizing the NPU is physically saturating the DRAM controller.
  napkin_math: |
    **Assumptions & Constraints:**
    - Shared SoC memory bandwidth: 77 GB/s.
    - Instrument cluster render deadline: 16ms per frame.
    - A continuous NPU batcher drives sustained memory utilization near 95%.
    - The cluster/GPU needs only a small slice of bandwidth, but it needs it predictably before the deadline.

    **Calculations:**
    - At 95% NPU memory utilization, remaining average bandwidth is 77 GB/s * 5% = 3.85 GB/s.
    - Queueing delay rises sharply as utilization approaches 100%; even small render reads can wait behind long NPU bursts.
    - If a render-critical memory request waits more than 16ms, the instrument cluster misses its frame deadline even though aggregate LLM throughput improves.

    **Conclusion & Interpretation:**
    - **Result: near-saturated shared memory bus (Real-Time Deadline-Bound)**. Continuous batching is unsafe here because hard-real-time rendering needs reserved bandwidth and bounded latency, not maximum average NPU throughput.
