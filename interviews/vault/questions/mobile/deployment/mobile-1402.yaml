title: A/B Rollout Memory Bottleneck on Exynos 2400
scenario: You are managing a canary rollout of a new on-device transcription model for users with the Samsung Exynos 2400. The control group uses a cloud API, while the treatment group runs locally. During the 5% canary phase, analytics show a spike in background app terminations and UI stuttering, despite the NPU executing the model well within latency budgets. You must diagnose the bottleneck and quantify the necessary optimization before expanding the rollout.
question: What causes the A/B rollout memory bottleneck on Exynos 2400 and how should it be fixed?
details:
  realistic_solution: The bottleneck is memory starvation. The local model is consuming too much of the shared RAM, causing the OS to kill background apps (OOM kills) and starving the CPU/GPU of memory bandwidth, leading to UI stutter. The solution is to pause the rollout, profile the model's peak memory footprint, apply quantization to reduce weight size, and verify the memory reduction before resuming the A/B test.
  common_mistake: |
    **The Pitfall:** Blaming NPU compute capacity or suggesting a simple rollback without diagnosing system-wide memory impact.
    **The Rationale:** Engineers isolate NPU metrics from the rest of the OS memory pressure.
    **The Consequence:** They fail to realize that the Exynos 2400's components share the same RAM pool, leaving the true memory bottleneck unoptimized.
  napkin_math: |
    **Assumptions & Constraints:**
    - Available Free RAM: 12 GB total - 4 GB (OS) - 3 GB (UI/GPU) - 2 GB (Background) = 3 GB.
    - FP16 Model Footprint: 3.8 GB weights + 0.5 GB context = 4.3 GB.
    - INT8 Optimized Footprint: 1.9 GB weights + 0.5 GB context = 2.4 GB.

    **Calculations:**
    - Deficit (A/B Control): 4.3 GB - 3 GB = 1.3 GB deficit, triggering OOM background kills.

    **Conclusion & Interpretation:**
    - **Result: 2.4 GB safely fits in 3 GB (Memory-Capacity-Bound)**. Proper capacity planning via quantization prevents massive OOM background kills.
