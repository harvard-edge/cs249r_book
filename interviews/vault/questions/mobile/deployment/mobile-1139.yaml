title: Designing Graph Delegation for Snapdragon 8 Gen 3
scenario: "You are deploying a custom real-time video segmentation pipeline using TFLite to an Android flagship device. The model contains several custom operators that the default Hexagon NPU delegate does not natively support."
question: "How would you design a conversion and delegation strategy that safely evaluates tradeoffs between INT8 quantization, operator fallback penalties, and heterogeneous compute allocation?"
details:
  realistic_solution: "Use a specialized compiler (e.g., Qualcomm QNN or TFLite Hexagon delegate) to explicitly partition the graph. Standard subgraphs must be pinned to the NPU in INT8. For unsupported operators, they must either be rewritten using mathematically equivalent supported ops, or the fallback subgraph must be explicitly targeted to the GPU (FP16) rather than the CPU to preserve vector parallelism and avoid shared memory thrashing."
  common_mistake: |
    **The Pitfall:** Blindly applying full INT8 quantization and relying on automatic CPU fallback for unsupported operators.
    **The Rationale:** Candidates trust the framework's default fallback mechanisms without evaluating the immense latency cost of ping-ponging tensors across shared memory.
    **The Consequence:** The pipeline suffers massive latency and power penalties due to continuous memory transfers, destroying real-time performance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hexagon NPU Compute: 45 TOPS (45,000 GOPs/sec).
       - Model workload: 15 GOPs per frame.
       - Memory bus: 60 GB/s. Activation tensor size: 4 MB.
    2. **Calculations:**
       - Ideal NPU Compute Time = 15 GOPs / 45,000 GOPs/sec = 0.33 ms.
       - Transfer time (NPU to CPU) = 4 MB / 60 GB/s ≈ 0.066 ms.
       - Total roundtrip penalty = 0.066 ms * 2 = 0.132 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** A single unsupported operator triggers a fallback that adds **~0.13 ms** of pure data movement overhead, instantly inflating latency by ~40% relative to the 0.33 ms compute baseline.
