title: 'The OTA Data Budget'
scenario: 'You are a Staff ML Engineer on the mobile team for a popular social media app launching a new generative AI feature for creating image filters. The v1 model is 80 MB. After user feedback, the team produces a v2 model that is 10% more accurate but now weighs 120 MB. Your product manager is concerned about the data cost for users when rolling out this over-the-air (OTA) update.'
question: 'How would you explain the data consumption for a single user if you ship the full update?'
details:
  realistic_solution: |
    The OTA update directly downloads the entire 120 MB monolithic model binary to the device, consuming 120 MB of the user's cellular data budget. In emerging markets with strict prepaid limits, this massive payload risks user churn or the global disabling of background updates.
  common_mistake: |
    **The Pitfall:** Assuming a differential binary "diff" update (40 MB) is transparently handled by the delivery framework.
    **The Rationale:** Engineers abstract away OTA delta compression, incorrectly assuming infrastructure automatically isolates ML weight deltas.
    **The Consequence:** Shipping massive monolithic payloads that trigger cellular data warnings, leading users to disable background app refresh.
  napkin_math: |
    **Assumptions & Constraints:**
    - v2 Model size is 120 MB.
    - No delta compression is explicitly configured.

    **Calculations:**
    - Full payload download = 120 MB.
    - Total data consumed per device = 120 MB.

    **Conclusion & Interpretation:**
    - **Result: Network I/O-Bound**. The system downloads the entire 120 MB file without delta compression.
  options:
  - 'The update will only transfer the 40 MB difference, which is a manageable size.'
  - 'The 10% accuracy gain is worth the user data cost; we should ship the 120 MB update immediately.'
  - 'The update will consume 120 MB of the user''s data plan, a significant cost we must address.'
  - 'The update is about 960 Megabits (Mb), which requires a Wi-Fi connection.'
