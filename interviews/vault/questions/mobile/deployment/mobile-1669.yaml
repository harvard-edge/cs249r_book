title: Diagnosing & Quantifying Performance Bottlenecks in Canary Rollouts on Exynos 2400 NPU
scenario: Your team has developed an updated on-device ML model for a popular mobile application deployed across Android devices. You initiated a canary deployment to 5% of users. Post-canary launch, aggregated telemetry shows a concerning ~15% increase in average inference latency, despite rigorous offline benchmarks indicating a 10% decrease in model execution time.
question: How would you diagnose the 15% latency regression and quantify the impact of a potential fix?
details:
  realistic_solution: |
    Start by decomposing canary latency into model execution, delegate placement, preprocessing, postprocessing, memory copies, queueing, and thermal state using Android Perfetto/System Trace, TFLite or NNAPI delegate logs, app telemetry spans, and device-class segmentation. Compare canary and control on the same device models, OS versions, battery states, and input sizes to separate a real model regression from rollout mix shift. If traces show CPU fallback, extra tensor copies, cache misses, or thermal throttling, ship one targeted fix behind a flag and run a second canary. Quantify impact as before/after p50, p95, crash/OOM, thermal, and battery deltas; for example, removing a measured 20 ms memory-copy overhead from a 115 ms canary path predicts 95 ms average latency.
  common_mistake: |
    **The Pitfall:** Relying solely on synthetic offline benchmarks or aggregate metrics.
    **The Rationale:** Candidates apply cloud intuition to edge deployment, assuming offline execution speed accurately reflects complex, multi-tenant system environments.
    **The Consequence:** Misattributing latency regression to the model architecture itself, rather than system-level bus contention or OS scheduling limits.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline total latency: 100 ms, composed of 100 ms model compute plus negligible measured pipeline overhead in the offline benchmark.
    - Canary total latency: 115 ms (+15%).
    - Offline model compute improved by 10 ms, so new compute time is 90 ms.

    **Calculations:**
    - Total Latency = Compute Time + Memory I/O + OS Overhead.
    - Expected canary latency if only compute changed = 90 ms.
    - Observed canary latency = 115 ms, so measured canary pipeline overhead = 115 ms - 90 ms = 25 ms.
    - Regression versus baseline = 115 ms - 100 ms = 15 ms.
    - The 25 ms overhead cannot be uniquely assigned to memory I/O, OS scheduling, thermal throttling, or delegate fallback without traces.
    - If profiling confirms 20 ms of avoidable memory overhead, fixed latency would be 115 ms - 20 ms = 95 ms.

    **Conclusion & Interpretation:**
    - **Result: 15 ms user-visible regression with 25 ms of canary pipeline overhead to explain.** Profiling is required before calling it memory-bound; a validated 20 ms memory fix would reduce total latency to 95 ms.
