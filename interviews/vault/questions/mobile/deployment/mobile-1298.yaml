title: Evaluating Shadow vs. Canary on Snapdragon 8 Gen 3
scenario: You are deploying a new video super-resolution model on a Snapdragon 8 Gen 3. The new model requires 15 TOPS INT8 and 2 GB memory; the old model uses 10 TOPS and 1.5 GB. The device has 45 TOPS peak capability and 16 GB shared memory.
question: Should a Snapdragon 8 Gen 3 video model rollout use shadow deployment or canary, and what are the trade-offs?
details:
  realistic_solution: A canary rollout is the superior choice for this mobile scenario. While the Hexagon NPU theoretically supports 45 TOPS INT8 (enough for 15 + 10 = 25 TOPS), running both models concurrently in a shadow deployment consumes 3.5 GB of the shared memory and over 50% of the NPU's sustained thermal envelope, leading to aggressive throttling and battery drain that degrades the user experience. A canary rollout with robust telemetry avoids these penalties while still gathering real-world performance data.
  common_mistake: |
    **The Pitfall:** Choosing shadow deployment solely for its "safe" lack of user impact.
    **The Rationale:** Candidates look only at the theoretical peak 45 TOPS and 16 GB RAM and assume running both models simultaneously is trivial.
    **The Consequence:** Shadow mode consumes excessive memory bandwidth and breaks the sustained thermal envelope, causing massive battery drain and OS throttling.
  napkin_math: |
    - **Shadow Deployment Compute:** 15 TOPS + 10 TOPS = 25 TOPS (Over 50% of sustained limit).
    - **Shadow Deployment Memory:** 2 GB + 1.5 GB = 3.5 GB (High risk of OS app eviction).
    - **Canary Deployment Compute:** 15 TOPS (Safe margin).
    - **Canary Deployment Memory:** 2 GB (Safe margin).
    - **Final Result:** **Canary rollout is physically required to prevent thermal throttling and memory starvation on mobile devices.**
