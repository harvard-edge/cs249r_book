title: 'MLOps Lifecycle: Specify A/B Test Framework for On-Device Model Comparison'
scenario: You are specifying an A/B testing framework for comparing two on-device speech recognition models in a voice assistant app with 10M DAU. The new model is 5MB larger but claims an 8% WER improvement.
question: How would you specify an A/B testing framework for comparing these models, defining sample size, assignment, metrics, and decision criteria?
details:
  realistic_solution: 'Define a controlled A/B rollout framework: 1. Assignment: Hash the device ID to assign users to control (old model) or treatment (new model) groups persistently. 2. Metrics: Primary is Word Error Rate (WER); secondary is user engagement. 3. Guardrails: Monitor NPU utilization with nsys profiling, memory OOMs, and battery drain. 4. Decision: Roll out if treatment achieves the 8% relative WER improvement with < 2% battery regression.'
  common_mistake: |
    **The Pitfall:** Failing to track on-device resource constraints like battery drain or memory usage.
    **The Rationale:** Candidates focus solely on model accuracy metrics (WER) and ignore the physical impact of a larger model on the device.
    **The Consequence:** The new model might improve accuracy but cause aggressive battery drain, leading to increased app uninstalls.
  napkin_math: |
    **Assumptions & Constraints:**
    - Detect 8% relative improvement on a baseline 10% WER, so treatment WER is 9.2%.
    - 80% power and 95% confidence.
    - 10M DAU averaging 2 queries/day = 20M queries/day.
    - Approximate each labeled utterance as a Bernoulli error outcome for sample-size planning.

    **Calculations:**
    - Control error rate p1 = 0.100. Treatment error rate p2 = 0.092. Difference = 0.008 absolute WER.
    - Two-proportion test approximation: n per arm ≈ ((1.96 * sqrt(2*pbar*(1-pbar)) + 0.84 * sqrt(p1*(1-p1)+p2*(1-p2))) / 0.008)^2, where pbar = 0.096.
    - n ≈ 21K labeled utterances per arm.
    - A 1% canary exposes 100K users. Split evenly, that is 50K control and 50K treatment users, producing about 100K queries/day per arm.
    - If every query has usable WER labels, the sample-size threshold is reached in about 21K / 100K day = 0.21 day, or about 5 hours. If only 10% of queries are labelable, it takes about 2 days.

    **Conclusion & Interpretation:**
    - **Result: Label-availability-bound.** The treatment target is 9.2% WER; a 1% canary can reach the needed sample size in hours only if labeled utterances are available for most traffic, otherwise the test duration scales with the labeling rate.
