title: The App Store Budget
scenario: Your app already consumes 400 MB of RAM. You want to A/B test a new 1.5 GB generative model on an 8 GB smartphone.
question: Can an 8 GB smartphone safely A/B test a 1.5 GB generative model when the app already uses 400 MB?
details:
  realistic_solution: No, you cannot safely load the 1.5 GB model. The primary constraint is the OS-enforced per-app memory budget. On a typical 8 GB device, an app is generally budgeted around 25% of the total RAM, which is 2 GB. After accounting for the app's 400 MB base memory usage, you only have about 1.6 GB remaining for the model. While the 1.5 GB model *might* just fit, it leaves almost no headroom, making the app highly susceptible to being terminated by the OS (OOM kill) during memory pressure spikes. The A/B test would be unreliable.
  common_mistake: |
    **The Pitfall:** Assuming the app has access to a large fraction of the total device RAM.
    **The Rationale:** Engineers forget that mobile operating systems impose strict per-app budgets to ensure system multitasking stability.
    **The Consequence:** The model is deployed, instantly violates the OS quota, and triggers an aggressive OOM crash for users.
  napkin_math: |
    - **Device RAM:** 8 GB.
    - **OS App Budget:** ~25% of total RAM = 2.0 GB maximum limit.
    - **Current Usage:** 400 MB base app.
    - **Remaining Headroom:** 2.0 GB - 0.4 GB = 1.6 GB.
    - **Final Result:** **A 1.5 GB model leaves only 100 MB of headroom, guaranteeing high OOM risk during memory spikes.**
  options:
  - Yes, it's fine. The 1.5 GB model is much smaller than the device's 8 GB of RAM.
  - Yes, it should be okay. The app's total memory budget is 2 GB, and the 1.5 GB model fits within that.
  - No, it's too risky. The total required memory of 1.9 GB (1.5 GB model + 0.4 GB app) leaves almost no headroom within the ~2 GB per-app budget.
  - No, it's impossible. The 1.5 GB model alone is larger than the app's base memory of 400 MB.
  correct_index: 2
