title: Designing a Phased Rollout for Edge ML on Samsung Exynos 2400 NPU
scenario: You are deploying a 5GB generative AI model on the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). You must minimize risk, allow for robust A/B testing of model versions, and provide immediate rollback capabilities.
question: How would you architect the deployment process from initial testing to full global rollout, ensuring minimal user impact and effective performance monitoring?
details:
  realistic_solution: Use separate controls for the client binary and the model asset. Ship a client that can load pinned model versions, verify device compatibility, keep the previous stable asset until the new one is proven, and fetch rollout decisions from remote config. Start with internal and shadow execution, then canary the model asset to small cohorts while collecting latency, memory, thermal, battery, crash, and quality telemetry. A/B tests should assign users to explicit model versions and record the asset hash, client version, and device class. Rollback should disable the new model version through remote config, route requests to the cached stable asset or a server fallback, and stop further downloads; it should not assume that a 5GB binary already installed on edge devices can instantly disappear everywhere.
  common_mistake: |
    **The Pitfall:** Treating edge device deployments exactly like server-side rollouts.
    **The Rationale:** Candidates underestimate device resource constraints (memory, thermal limits) and lack of immediate control over client binaries.
    **The Consequence:** Rollouts lack rapid rollback mechanisms, leading to widespread negative user experiences and OOM crashes before a new binary is approved.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model asset size: 5GB.
    - Runtime activations and cache: 1-2GB.
    - Exynos 2400 memory: 12 GB shared with OS, app, camera, and background services.
    - Rollout must support canarying, telemetry, remote kill switch, and fallback to a known-good model.

    **Calculations:**
    - Approximate peak model memory = 5GB weights + 2GB runtime state = 7GB before OS/app pressure.
    - On a 12GB device, that leaves about 5GB for OS, UI, other app state, allocator fragmentation, and background activity.
    - A 1% canary limits blast radius to 1 in 100 eligible users; stepping 1% -> 5% -> 25% -> 100% gives checkpoints to compare crash, OOM, latency, thermal, and quality telemetry before wider exposure.

    **Conclusion & Interpretation:**
    - **Result: The rollout architecture should be governed by memory and operational risk, not peak TOPS math.** Use staged cohorts, model-version pinning, telemetry gates, cached rollback assets, and a remote kill switch before expanding globally.
