title: Designing a Phased Rollout for Edge ML on Samsung Exynos 2400 NPU
scenario: You are deploying a 5GB generative AI model on the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). You must minimize risk, allow for robust A/B testing of model versions, and provide immediate rollback capabilities.
question: How would you architect the deployment process from initial testing to full global rollout, ensuring minimal user impact and effective performance monitoring?
details:
  realistic_solution: 'A realistic solution involves a multi-stage approach leveraging nsys profiling and feature flags:
    1. **Internal Testing & Shadow Deployment:** Initial versions run in shadow mode to gather telemetry on NPU utilization and memory footprint without affecting users.
    2. **Canary Release:** Deploy to a statistically significant 1-5% user group via server-side feature flags. Monitor key metrics (NPU load, battery drain, latency) continuously.
    3. **Progressive Rollout & Rollback:** Gradually increase the rollout percentage. If performance degrades, feature flags act as an immediate kill switch, instantly reverting users to the stable model version.'
  common_mistake: |
    **The Pitfall:** Treating edge device deployments exactly like server-side rollouts.
    **The Rationale:** Candidates underestimate device resource constraints (memory, thermal limits) and lack of immediate control over client binaries.
    **The Consequence:** Rollouts lack rapid rollback mechanisms, leading to widespread negative user experiences and OOM crashes before a new binary is approved.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model Size: 5GB; Activations: 1-2GB.
       - Exynos 2400 Memory: 12 GB LPDDR5X.
       - Exynos 2400 NPU: 34.7 TOPS (34,700 GOPS/s).
       - Inference Compute: 100 GMACs (200 GOPS) per inference.
    2. **Calculations:**
       - Total Memory Used: 5GB + 2GB = 7GB (leaves ~5GB for OS/Apps).
       - Inference Time: 200 GOPS / 34,700 GOPS/s = ~5.76ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** Compute easily fits latency budgets, but consuming 7GB of memory severely restricts background concurrency and dictates strict A/B test routing.
