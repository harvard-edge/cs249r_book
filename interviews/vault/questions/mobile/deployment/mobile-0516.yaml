title: The Laggy AI Assistant
scenario: You are a Mobile ML Systems Engineer debugging a new "AI Suggestion" feature on a flagship smartphone. The feature uses a 1B parameter on-device LLM. Users report that suggestions feel "laggy" and are often skipped during fast typing (around 100 WPM).
question: Why does a 100ms static batching timeout make mobile AI suggestions feel laggy during fast typing?
details:
  realistic_solution: The primary bottleneck is the static batching strategy, which is ill-suited for this real-time, high-arrival-rate workload. With requests arriving about every 100ms, the 100ms batching timeout can add a full extra wait before inference even starts. The visible latency becomes `Batch_Wait_Time + TTFT = 100ms + 150ms = 250ms` for a keystroke that just missed the prior batch. That delay is much longer than the typing interval, so suggestions arrive after the user has already moved on and backlog can build if the device cannot drain requests fast enough. The correct solution is to switch to continuous or dynamic batching so new requests can be admitted without a fixed waiting timeout, dramatically reducing avoidable queueing delay.
  common_mistake: |
    **The Pitfall:** Focusing purely on optimizing the model's Time-to-First-Token (TTFT).
    **The Rationale:** Engineers assume the model execution is the bottleneck and propose aggressive pruning/quantization, ignoring the queue dynamics of the serving system.
    **The Consequence:** Optimization efforts yield marginal improvements because the true latency source (rigid timeout rules causing queue blow-up) is left unaddressed.
  napkin_math: |
    **Assumptions & Constraints:**
    - Typing Speed: 100 WPM (~500 chars/min = ~8.3 chars/sec, round to 10 req/sec)
    - Arrival rate: about 10 requests/sec, or 1 request every 100 ms
    - Model TTFT: 150 ms
    - Batch timeout limit: 100 ms

    **Calculations:**
    - Worst-case visible latency for a request that just missed a batch = batch timeout (100 ms) + TTFT (150 ms) = 250 ms
    - Inference-only throughput is roughly 1 / 0.15 sec = 6.7 single-request inferences/sec if requests are processed one at a time.
    - A fixed 100 ms wait adds avoidable delay to each batch and makes the system more likely to fall behind a 10 req/sec burst.

    **Conclusion & Interpretation:**
    - **Result: 250 ms Worst-Case Visible Latency (Batching-Induced Lag)**. The static timeout does not by itself prove mathematical instability, but it adds enough avoidable delay that fast-typing suggestions arrive stale and can backlog under sustained bursts. Continuous or dynamic batching removes that artificial wait penalty.
  options:
    - The model's 150ms TTFT is too slow for a real-time mobile application and must be optimized to be less than the 100ms request arrival interval.
    - The max batch size of 4 is too large, causing high latency. Reducing it to 1 would solve the problem.
    - The 100ms static batching timeout can add avoidable wait before the 150ms TTFT, so suggestions can arrive around 250ms after a keystroke and become stale during fast typing.
    - The latency is caused by the 100ms batching interval compounding with 150ms TTFT, leading to exactly 1.5 seconds of queue wait time after 6 keystrokes.
  correct_index: 2
