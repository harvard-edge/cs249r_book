title: Diagnosing Context Overflow Failures in Multi-Turn Mobile Agents on A17 Pro
scenario: An A17 Pro (8GB, 35 TOPS) conversational agent app crashes or produces incoherent outputs after 8-12 conversation turns. The on-device 1B LLM has a 2048-token context window. Each user turn averages 50 tokens, and each assistant turn averages 150 tokens. The system prompt is 300 tokens. When retrieval fires, it adds 3 chunks of 200 tokens each.
question: How would you diagnose when context overflow occurs and design a prevention strategy?
details:
  realistic_solution: 'Calculate context growth: per turn, chat tokens added = 50(user) + 150(assistant) = 200 tokens, and a retrieval turn adds another 600 tokens from 3 chunks. System prompt: 300. If retrieval is included every turn, context is 300 + 800*N tokens and fills at N = (2048-300)/800 = 2.185 turns. The observed 8-12 turn failures likely mean retrieval is conditional or not always retained; without retrieval, (2048-300)/200 = 8.74 turns, which matches the crash pattern. Fix: (1) Sliding window keeping last 2 turns verbatim + rolling summary. (2) Separate retrieval context from conversation context. (3) Compress old turns: each old turn summarized to 30 tokens.'
  common_mistake: |
    **The Pitfall:** Assuming the app crashes due to a standard software bug rather than predictable context overflow.
    **The Rationale:** Developers add error handling without mathematically tracking when the context window fills up over multiple turns.
    **The Consequence:** They treat the symptom (the crash) by silently truncating context, leading to sudden incoherence instead of proactively managing the context budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Context Budget: 2048 tokens total. System prompt = 300 tokens. Remaining = 1748 tokens.
    **Calculations:**
    - Growth per Turn (No Retrieval): 50 (user) + 150 (assistant) = 200 tokens/turn. 1748 / 200 = 8.74 turns.
    - Growth per Turn (With Retrieval): 200 (chat) + 600 (retrieval) = 800 tokens/turn. 1748 / 800 = 2.18 turns.
    **Conclusion & Interpretation:**
    - With retrieval included every turn, overflow occurs just after 2 turns: 300 + 800N exceeds 2048 when N > 2.18.
    - Without retained retrieval, overflow occurs around 8-9 turns: 300 + 200N exceeds 2048 when N > 8.74, which is a likely explanation for the observed 8-12 turn failures.
    - A safe prevention strategy must budget retrieval separately, summarize or evict old turns, and reserve explicit space for the current retrieval snippets rather than assuming an indefinite buffer.
