title: Diagnosing Context Overflow Failures in Multi-Turn Mobile Agents on A17 Pro
scenario: An A17 Pro (8GB, 35 TOPS) conversational agent app crashes or produces incoherent outputs after 8-12 conversation turns. The on-device 1B LLM has a 2048-token context window. Each user turn averages 50 tokens, and each assistant turn averages 150 tokens. The system prompt is 300 tokens. The retrieved context per turn is 3 chunks of 200 tokens each.
question: How would you diagnose when context overflow occurs and design a prevention strategy?
details:
  realistic_solution: 'Calculate context growth: per turn, tokens added = 50(user) + 150(assistant) + 600(3 retrieved chunks) = 800 tokens. System prompt: 300. After N turns: 300 + 800*N tokens. Context fills at 2048: N = (2048-300)/800 = 2.185 turns — fills after just 2 turns if retrieved context is included every turn! The observed 8-12 turns suggests retrieval is not always triggered. Without retrieval: (2048-300)/200 = 8.74 turns — matches the crash pattern. Fix: (1) Sliding window keeping last 2 turns verbatim + rolling summary. (2) Separate retrieval context from conversation context. (3) Compress old turns: each old turn summarized to 30 tokens.'
  common_mistake: |
    **The Pitfall:** Assuming the app crashes due to a standard software bug rather than predictable context overflow.
    **The Rationale:** Developers add error handling without mathematically tracking when the context window fills up over multiple turns.
    **The Consequence:** They treat the symptom (the crash) by silently truncating context, leading to sudden incoherence instead of proactively managing the context budget.
  napkin_math: |
    1. **Context Budget:** 2048 tokens total. System prompt = 300 tokens. Remaining = 1748 tokens.
    2. **Growth per Turn (No Retrieval):** 50 (user) + 150 (assistant) = 200 tokens/turn. 1748 / 200 = 8.74 turns (matches the 8-12 turn crash pattern).
    3. **Growth per Turn (With Retrieval):** 200 (chat) + 600 (retrieval) = 800 tokens/turn. 1748 / 800 = 2.18 turns (fills almost instantly).
    4. **Fix Strategy:** Sliding window (last 2 turns = 400 tokens) + rolling summary (100 tokens) + system prompt (300) + retrieval slot (600) = 1400 tokens.
    **Result:** By compressing old turns, the context is capped at **1400 tokens**, leaving a safe **648-token buffer** indefinitely.
