title: The App Store Binary Size Limit
scenario: 'Apple''s App Store enforces a 200 MB limit for downloads over cellular. Your iOS app is 60 MB without the ML model. Your product requires an on-device image generation model (Stable Diffusion-like) with INT8 weights totaling 800 MB.'
question: 'How can a 60 MB iOS app deliver an 800 MB INT8 image-generation model without exceeding the 200 MB cellular limit?'
details:
  realistic_solution: 'Use Apple''s On-Demand Resources for staged delivery. Ship 60 MB binary (under 200 MB cellular). Download 800 MB model via ODR over WiFi (~2 min at 50 Mbps). Show onboarding tutorial during download. Compressing 800 MB to 140 MB isn''t viable: INT4 yields 400 MB with degraded quality for image generation. Alternative: split into 200 MB base (bundled) + 600 MB enhancement (ODR) for immediate low-quality generation while full model downloads.'
  common_mistake: |
    **The Pitfall:** Attempting to compress the model to fit in the remaining 140 MB space.
    **The Rationale:** Developers assume arbitrary compression is possible if they stack enough techniques (pruning, 4-bit quantization, gzip).
    **The Consequence:** They destroy the generative quality of the model, rendering it unusable for image generation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cellular Limit: 200 MB.
    - App Binary: 60 MB.
    - Generative Model: 800 MB (INT8).
    - WiFi Download Speed: 50 Mbps (6.25 MB/s).

    **Calculations:**
    - Available Cellular Budget: 200 MB - 60 MB = 140 MB.
    - Required Compression: 800 MB / 140 MB = 5.7x reduction required.
    - Minimum Viable Quantization (INT4): 800 MB / 2 = 400 MB (Still > 140 MB).
    - ODR WiFi Download Time: 800 MB / 6.25 MB/s = 128 seconds (~2 minutes).

    **Conclusion & Interpretation:**
    - **Result: Storage-Bound**. Compressing an 800 MB generative model to 140 MB is mathematically impossible without catastrophic quality loss. **On-Demand Resources (ODR)** via WiFi is strictly required.
