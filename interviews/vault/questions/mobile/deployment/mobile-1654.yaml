title: MLOps Pipeline for Edge ML on Samsung Exynos NPU
scenario: Your team is developing a critical mobile application that relies on a large language model (LLM) for real-time, on-device inference on a dedicated NPU. Due to the rapid evolution of LLMs and frequent updates to the application's features, the model undergoes weekly retraining and deployment cycles.
question: How would you design a comprehensive MLOps pipeline that ensures reliable and reproducible model delivery to the mobile devices?
details:
  realistic_solution: A robust solution covers the full mobile MLOps lifecycle. Use versioned data, training code, configs, and model artifacts so weekly retraining is reproducible, then register immutable model versions with metrics, lineage, and compatibility metadata. Run quantization-aware training and compile device-specific artifacts for the target Exynos NPU. CI/CD should include unit tests, accuracy regression tests, and Hardware-In-The-Loop validation across a device matrix covering OS versions, memory tiers, thermal states, and NPU driver/runtime versions. Package signed model artifacts with compatibility checks, deliver differential OTA updates, and use staged rollout or canary cohorts before broad release. Maintain rollback to the last known-good model, collect privacy-preserving on-device telemetry for latency, crashes, battery, memory, and quality drift, and gate promotion on those production signals.
  common_mistake: |
    **The Pitfall:** Porting cloud-native MLOps pipelines directly to mobile deployments.
    **The Rationale:** Candidates ignore edge-specific constraints such as device fragmentation, battery drain, intermittent networks, and the requirement for hardware-aware binary optimization.
    **The Consequence:** Massive app updates exhaust cellular data budgets, cause out-of-memory errors on varied devices, and trigger severe battery drain without any rollback mechanism.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute Ceiling: 34.7 TOPS.
    - Memory Constraints: 12GB total RAM limit.
    - FP32 7B LLM requires ~14GB. INT8 reduces this to ~7GB.
    - Activation Cache: 20 layers × 4096 dim × batch 1 in FP32 requires an additional ~1.3 GB.

    **Calculations:**
    - 100 GFLOP (0.1 TOPS) model can theoretically reach ~347 inferences/sec.
    - Total Memory (INT8 + Cache) = 7GB + 1.3GB = 8.3GB.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound**. Without aggressive INT8 quantization in the CI/CD pipeline, the model physically cannot load on the device within the 12GB limit.
