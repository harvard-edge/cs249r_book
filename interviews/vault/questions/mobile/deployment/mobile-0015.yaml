title: The App Store ML Review Trap
scenario: Your team ships an iOS app with a Core ML model that performs on-device face stylization. Apple rejects the app because it crashes immediately on an older iPhone 8. The app works perfectly on your iPhone 15 Pro test devices.
question: Why can a Core ML model that works on an iPhone 15 Pro crash on an older iPhone 8, and how must model delivery handle Apple's heterogeneous hardware matrix?
details:
  realistic_solution: Core ML packages are normally compiled to `.mlmodelc` at build time or when first loaded, then the runtime chooses an available execution path. A crash on iPhone 8 is more likely caused by a deployment-target/runtime mismatch, unsupported model operation for that OS/Core ML version, memory pressure, or an unhandled failure when CPU/GPU fallback is too slow or unavailable for the configured model. The fix is to ship a compatibility-gated model variant for older devices, set and test the minimum iOS/Core ML deployment target, allow CPU/GPU fallback where acceptable, and down-level or simplify operators for devices that cannot run the flagship model within memory and latency limits.
  common_mistake: |
    **The Pitfall:** Adding a simple try/catch block around the model load.
    **The Rationale:** Developers attempt to handle the framework exception to prevent the crash without addressing the underlying hardware incompatibility.
    **The Consequence:** The crash is prevented, but the feature is broken, guaranteeing an App Store rejection.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target latency for the feature: 33 ms.
    - Flagship-device measured latency: 33 ms.
    - Older-device CPU/GPU fallback measured latency during compatibility testing: 250-400 ms.
    - iPhone 8 memory is much smaller than current Pro devices, so peak activation memory must also be tested.

    **Calculations:**
    - Even the best fallback estimate is 250 ms / 33 ms = 7.6x over the interactive target.
    - The slow end is 400 ms / 33 ms = 12.1x over the target.
    - A model that is both over-latency and near the memory limit should not be served as the default model on that device class.

    **Conclusion & Interpretation:**
    - **Result: 7.6-12.1x over target (Compatibility-Bound)**. Fallback may execute, but it is not release-quality for the SLA; ship a smaller compatible variant or disable the feature on unsupported devices instead of assuming ANE compilation is the only failure mode.
