title: The Double FPU Context Save
scenario: Your mobile app does complex ML preprocessing in C++ (heavy floating-point math). It then passes the data to an ML model running on the same CPU core, handled by an RTOS-like microkernel on a dedicated wearable companion chip. You notice that every time the OS context-switches between your preprocessing thread and the ML inference thread, the context switch takes 3x longer than normal.
question: Why does floating-point C++ preprocessing make context switches 3x slower on a wearable companion chip?
details:
  realistic_solution: Both threads use FPU/NEON registers, forcing a full register bank save on every context switch. On a wearable chip with a narrow memory bus, this massive increase in memory traffic dominates the OS scheduler. Fixes include pinning preprocessing to the inference thread, using fixed-point math, or enabling lazy FPU switching.
  common_mistake: |
    **The Pitfall:** Assuming "floating point math is slow" applies strictly to the math operations themselves.
    **The Rationale:** Engineers overlook OS-level context management and how wide SIMD registers interact with scheduler swaps.
    **The Consequence:** Baffling latency spikes during inter-thread communication that cannot be caught by standard application profilers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard save side: integer context = 16 registers x 4 bytes = 64 bytes.
    - FPU/NEON save side: 32 SIMD registers x 16 bytes = 512 extra bytes.
    - A full context switch usually includes both save and restore traffic.

    **Calculations:**
    - Baseline save+restore traffic: 64 bytes * 2 = 128 bytes.
    - FPU-enabled save+restore traffic: (64 + 512) bytes * 2 = 1152 bytes.
    - Traffic ratio: 1152 / 128 = 9x total bytes moved, or an 800% increase over baseline.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth-Bound.** The register-byte calculation supports a large increase in context-switch memory traffic, not a precise latency multiplier by itself. On a narrow wearable memory bus, that extra traffic can plausibly dominate the switch path and produce the observed slowdown.
