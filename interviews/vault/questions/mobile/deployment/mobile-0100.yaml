title: The Double FPU Context Save
scenario: Your mobile app does complex ML preprocessing in C++ (heavy floating-point math). It then passes the data to an ML model time-sliced on the same CPU core by an RTOS-like microkernel on a dedicated wearable companion chip. You notice that every time the OS context-switches between your preprocessing thread and the ML inference thread, the context switch takes 3x longer than normal.
question: What mechanism makes these floating-point preprocessing and inference thread switches 3x slower?
details:
  realistic_solution: Both time-sliced threads touch FPU/NEON state, so the kernel must preserve the large SIMD register file when switching between them. If the RTOS eagerly saves and restores FPU/NEON registers, each switch moves far more state than an integer-only context switch, and that memory traffic can dominate on a wearable chip with a narrow memory bus. Fixes include fusing preprocessing and inference into one scheduled worker where possible, using fixed-point or scalar preprocessing for the hot path, or enabling lazy FPU switching when the kernel and safety model support it.
  common_mistake: |
    **The Pitfall:** Assuming "floating point math is slow" applies strictly to the math operations themselves.
    **The Rationale:** Engineers overlook OS-level context management and how wide SIMD registers interact with scheduler swaps.
    **The Consequence:** Baffling latency spikes during inter-thread communication that cannot be caught by standard application profilers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard save side: integer context = 16 registers x 4 bytes = 64 bytes.
    - FPU/NEON save side: 32 SIMD registers x 16 bytes = 512 extra bytes.
    - A full context switch usually includes both save and restore traffic.

    **Calculations:**
    - Baseline save+restore traffic: 64 bytes * 2 = 128 bytes.
    - FPU-enabled save+restore traffic: (64 + 512) bytes * 2 = 1152 bytes.
    - Traffic ratio: 1152 / 128 = 9x total bytes moved, or an 800% increase over baseline.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth-Bound.** The register-byte calculation supports a large increase in context-switch memory traffic, not a precise latency multiplier by itself. On a narrow wearable memory bus, that extra traffic can plausibly dominate the switch path and produce the observed slowdown.
