title: TFLite Mobile NPU CPU Fallback and Graph Fragmentation
scenario: A TFLite model (EfficientNet-Lite0, 4.7M params, 390M MACs) converts to a mobile NPU. Initial deployment shows 45ms latency vs. 8ms target. Profile shows 60% of ops run on the NPU and 40% on CPU due to unsupported ops.
question: Why does an EfficientNet-Lite0 TFLite model converted through the SDK show 45 ms latency instead of the 8 ms target?
details:
  realistic_solution: The latency gap is primarily caused by unsupported operators fragmenting the graph and forcing 40% of execution onto CPU kernels. The CPU work is slower than the NPU path, and each boundary between delegated and non-delegated subgraphs adds scheduling and activation-copy overhead. The fix is to inspect the delegate partitioning report, replace or fold unsupported ops, and use quantization/operator choices that let the NPU execute larger fused subgraphs. Full NPU coverage is not automatically required, but the current 40% fallback is large enough that the 8ms target is unlikely without reducing fallback and transfer overhead.
  common_mistake: |
    **The Pitfall:** Adding more DSP acceleration without identifying specific unsupported ops.
    **The Rationale:** Candidates assume performance can be fixed by throwing more hardware at it rather than looking at CPU fallback caused by operations like Swish.
    **The Consequence:** Time is wasted on DSP tuning when the bottleneck is structurally bound to CPU execution.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total model MACs: 390M.
    - CPU fallback: 40% of operations.
    - Effective mobile CPU throughput for these fallback kernels: ~10 GMAC/s.
    - Boundary copies and delegate scheduling add extra latency beyond raw compute.

    **Calculations:**
    - Fallback MACs: 390M * 0.40 = 156M MACs.
    - Approximate CPU fallback compute time: 156M MACs / 10 GMAC/s = 0.0156 seconds (15.6ms).
    - 15.6ms is already above the 8ms target before NPU subgraphs, activation transfers, and runtime scheduling are added.

    **Conclusion & Interpretation:**
    - **Result: CPU fallback alone can consume ~16ms under the stated throughput assumption.** The observed 45ms is therefore plausibly explained by a fragmented graph with slow fallback kernels and transfer overhead, so the practical fix is to remove unsupported ops, improve fusion, and verify delegate coverage.
