title: 'Mobile TCO Design: 8GB vs 16GB NPU Inference Economics'
scenario: Design a cost model for choosing between an 8GB NPU (35 TOPS, 3W) and a 16GB NPU (45 TOPS, 4W) for an enterprise mobile LLM app deployment of 10,000 devices. Battery cost at $0.10/kWh, 30 queries/day, 150 tokens/query.
question: Which mobile platform has the better two-year TCO and capability profile for a 10,000-device enterprise LLM deployment?
details:
  realistic_solution: 'From an energy TCO perspective, the operational cost is effectively zero for both devices (~$90/year fleetwide). The decisive architectural constraint is VRAM capacity. The 16GB platform can host a 7B parameter LLM at FP16 or BF16 precision (14GB). The 8GB platform fundamentally cannot; it mandates aggressive W4A16 (INT4) quantization to compress the model to 3.5GB, resulting in measurable perplexity degradation and a 3-5% drop in downstream task accuracy. For an enterprise deployment, this loss in model fidelity translates directly to higher cloud fallback API costs. The 16GB platform provides superior capability and completely isolates the enterprise from cloud inference costs.'
  common_mistake: |
    **The Pitfall:** Treating TOPS as the primary selection criterion without considering the memory capacity difference.
    **The Rationale:** Candidates fixate on compute throughput while ignoring that 8GB vs 16GB RAM dictates which models can run on-device.
    **The Consequence:** Recommending a platform that forces aggressive quantization (INT4 vs FP16), resulting in 3-5% accuracy loss.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8GB NPU: 3W, 15 tok/s.
    - 16GB NPU: 4W, 20 tok/s.
    - Usage: 30 queries/day, 150 tokens/query. Fleet: 10,000 devices. Rate: $0.10/kWh.

    **Calculations:**
    - Energy/query 8GB: 3W * (150/15)s = 30 J = 0.00833 Wh.
    - Energy/query 16GB: 4W * (150/20)s = 30 J = 0.00833 Wh.
    - Annual energy/device: 30 * 365 * 0.00833 Wh = 91.3 Wh ($0.009/yr).
    - Fleet energy cost: 10,000 * $0.009 = $90/yr.

    **Conclusion & Interpretation:**
    - **Result: 16GB (Memory Capacity-Bound)**. Hardware capital expenditure and RAM capacity dwarf the negligible energy costs. The 16GB device enables FP16 execution, making it the mathematically superior choice for enterprise accuracy.
