title: The Infotainment Traffic Jam
scenario: You successfully quantized the car's 7-billion parameter AI Co-Pilot to INT4, allowing it to
  fit within the 8 GB of shared RAM on the infotainment SoC. However, during road tests, the assistant
  fails its 10 tokens/sec generation SLA unpredictably—specifically, generation crawls to a halt whenever
  the driver aggressively pans the 3D navigation map.
question: What is the architectural root cause of these unpredictable latency spikes, and what system-level
  mitigations would you deploy to guarantee the SLA?
details:
  realistic_solution: The root cause is memory bandwidth contention on the Unified Memory Architecture
    (UMA) SoC. The GPU rendering the 3D map and the NPU generating tokens are fighting for the same limited
    memory bus. Mitigations include enforcing Quality of Service (QoS) priorities at the memory controller,
    dynamically reducing the map's framerate during voice interactions, or using speculative decoding
    to trade spare compute for reduced bandwidth.
  common_mistake: '**The Pitfall:** Assuming the latency is caused by thermal throttling of the NPU or
    compute-bound operator inefficiencies.

    **The Rationale:** Candidates often jump to compute optimizations or model architectural changes because
    they view the LLM in isolation from the rest of the OS.

    **The Consequence:** Time is wasted on compute-centric profiling while the real issue—starvation at
    the memory bus—persists whenever background graphic workloads spike.'
  napkin_math: '**Assumptions & Constraints:**

    - 7B model at INT4 requires ~3.5 GB for weights.

    - Target generation speed: 10 tokens/sec (batch size 1).

    - SoC unified memory bus bandwidth is 50 GB/s.

    - 3D Map rendering consumes up to 30 GB/s of bandwidth when panned.


    **Calculations:**

    - LLM bandwidth requirement: 3.5 GB/token * 10 tokens/sec = 35 GB/s (memory bound).

    - When the map is idle, the system has 50 GB/s, which safely covers the 35 GB/s requirement.

    - When the map pans (30 GB/s), total demand hits 65 GB/s, exceeding the 50 GB/s limit.

    - Remaining bandwidth for the LLM drops to 20 GB/s, capping generation at ~5.7 tokens/sec.


    **Conclusion:**

    The combined memory bandwidth demand of the LLM and the graphics rendering exceeds the SoC''s physical
    bus limits, leading to severe memory stalls.'
