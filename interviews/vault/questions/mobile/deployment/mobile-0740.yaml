title: Background Inference Limits
scenario: You are designing an iOS app that runs an LLM to summarize incoming audio while the app is in the background (user is looking at the home screen).
question: What is the primary risk of running heavy ML inference in the background on iOS?
details:
  realistic_solution: |
    The primary risk is that iOS will not allow arbitrary long-running ML inference after the app moves to the background. Unless the work fits an approved background execution mode, the app should expect to be suspended, and deferred work may be terminated if it exceeds the system's background execution contract. This is separate from memory-pressure jetsam: a large model can also be killed under memory pressure, but that is not a reliable way to reason about background inference limits. Practical designs pause inference when backgrounded, process only within legitimate background audio or background task windows, or move always-on capabilities to system-supported APIs and services that are designed for that execution model.
  common_mistake: |
    **The Pitfall:** Treating iOS background execution like a persistent server process.
    **The Rationale:** Engineers assume that if a device has the compute capability and RAM, the app can keep running heavy inference after the user leaves it.
    **The Consequence:** The system suspends or terminates the background work, breaking the feature unless the design uses an approved background mode or defers work until foreground execution.
  napkin_math: |
    **Assumptions & Constraints:**
    - iOS foreground execution can run normal app code while resources are available.
    - iOS background execution is limited to specific modes and system-managed background tasks.
    - Heavy LLM inference is CPU/GPU/ANE intensive and usually does not fit an arbitrary always-on background workload.

    **Calculations:**
    - Background eligibility check: incoming audio summarization requires an approved background audio use case or a short system-granted task window.
    - If the app is not eligible to continue running, the OS suspends it; if it overruns the background contract, the work can be terminated.
    - Memory pressure is a separate failure mode: large resident models increase jetsam risk, but they do not create permission for continuous background execution.

    **Conclusion & Interpretation:**
    - **Result: Background-execution-bound**. The correct risk is suspension or termination under iOS background execution policy, not a battery-derived watchdog time limit.
  options:
    - The model will automatically downgrade to 1-bit quantization.
    - iOS will suspend or terminate unsupported long-running background inference.
    - The user's screen will freeze until the background task completes.
    - The App Store will reject the app during the review process.
