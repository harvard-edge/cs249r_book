title: CI/CD Hardware Fallback on Tensor G3
scenario: Your automated ML CI/CD pipeline deploys nightly builds of an on-device LLM to Android devices. An architecture update passed all server-side accuracy metrics but caused a severe latency regression on the Google Tensor G3. Profiling reveals an unsupported activation function caused the on-device accelerator delegate to fall back to the CPU.
question: How should CI/CD catch Tensor G3 TPU fallbacks before release, and what is the latency cost of this failure?
details:
  realistic_solution: |
    Add hardware-in-the-loop deployment checks that compile and run the exact Android model artifact on representative Tensor G3 devices. CI should fail the build if delegate logs, profiling traces, or op-coverage reports show unsupported operations or CPU fallback on the latency-critical path. Replace the unsupported activation with a supported equivalent or add a fused custom kernel, then rerun the same on-device latency and fallback tests before release.
  common_mistake: |
    **The Pitfall:** Suggesting changing the activation function without fixing the MLOps pipeline to include hardware-in-the-loop (HITL) compilation checks.
    **The Rationale:** Engineers treat the symptom (the unsupported op) instead of the systemic failure (the pipeline pushing uncompiled hardware fallbacks).
    **The Consequence:** The exact same latency regression will happen again on the next architecture update.
  napkin_math: |
    **Assumptions & Constraints:**
    - Accelerator compute budget for estimate: 7.5 TOPS = 7,500 GOPS.
    - Token cost on the supported path: 4 GOPS.
    - Unsupported-op CPU fallback adds about 5ms per token for CPU execution plus delegate synchronization.

    **Calculations:**
    - Supported Accelerator Path: 4 GOPS / 7,500 GOPS/sec = 0.00053 seconds = 0.53ms per token.
    - Fallback Path: 0.53ms + 5ms = about 5.5ms per token.
    - Response Latency for 200 Tokens: supported path = 200 * 0.53ms = 106ms.
    - Response Latency with Fallback: 200 * 5.5ms = 1,100ms.

    **Conclusion & Interpretation:**
    - **Result: about 1,100ms vs 106ms (Fallback-Bound)**. A single unsupported op on the token path can create roughly a 10x latency regression, so CI must reject artifacts with CPU fallback before release.
