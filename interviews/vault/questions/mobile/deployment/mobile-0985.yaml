title: 'Model Format Conversion: Specify Multi-Platform Model Conversion CI/CD Requirements'
scenario: 'Specify a production CI/CD pipeline for converting and validating PyTorch models for simultaneous iOS and Android deployment. Requirements are to produce CoreML (iOS 16+) and TFLite INT8 (Android 10+) artifacts, validate numerical accuracy < 0.5% top-1 difference, complete in < 15 minutes, and publish artifacts to model registry.'
question: 'How would you specify a production CI/CD pipeline for converting and validating PyTorch models for simultaneous iOS and Android deployment?'
details:
  realistic_solution: 'Pipeline total latency = sum of stage latencies in consistent units (minutes). Throughput bounded by slowest sequential path. Executing platform-specific conversions in parallel reduces the critical path.'
  common_mistake: |
    **The Pitfall:** Running iOS and Android conversion sequentially.
    **The Rationale:** CI/CD pipelines are often built linearly step-by-step by default.
    **The Consequence:** A sequential pipeline violates the <15 min requirement, reducing developer velocity.
  napkin_math: |
    **Assumptions & Constraints:**
    - Time Budget: < 15 minutes total latency.
    - Stage 1 (PyTorch -> ONNX): 2 mins.
    - Stage 2 (ONNX -> CoreML): 5 mins.
    - Stage 2 (ONNX -> TFLite INT8): 8 mins.
    - Stage 3 (Validation): 3 mins.

    **Calculations:**
    - Sequential Time: 2 + 5 + 8 + 3 = 18 minutes (Fails SLA).
    - Parallel Conversion Time: 2 + max(5, 8) + 3 = 13 minutes.

    **Conclusion & Interpretation:**
    - **Result: Critical Path Bound**. Executing the platform-specific conversions concurrently reduces the pipeline's critical path to **13 minutes**, satisfying the 15-minute SLA.
