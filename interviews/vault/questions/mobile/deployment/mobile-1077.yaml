title: 'Shadow Deployment Frame Drops on Exynos NPU'
scenario: You are executing a shadow deployment for a new video segmentation model on a mobile device. The baseline model (Model A) consumes 2 TOPS and 1.5 GB of RAM, while the new candidate model (Model B) consumes 4 TOPS and 2.0 GB of RAM. When the shadow deployment is enabled, both models process the live camera feed simultaneously.
question: Why does shadow deployment on the device drop camera frame rate despite low TOPS utilization?
details:
  realistic_solution: 'The performance degradation is caused by an Out-Of-Memory (OOM) capacity bottleneck, not a compute limitation. Mobile SoCs use a Unified Memory Architecture (UMA) where RAM is shared across the CPU, GPU, ISP, and NPU. Because non-NPU components consume 9 GB during operation, only 3 GB is left for the NPU. Running both models simultaneously requires 3.5 GB of RAM, which exceeds the available physical memory. This deficit forces the OS to aggressively swap memory pages (Jetsam events), stalling the NPU and destroying real-time inference latency despite ample compute headroom.'
  common_mistake: |
    **The Pitfall:** Assuming NPU compute bottlenecks, thermal throttling, or context switching overhead between NPU cores.
    **The Rationale:** Candidates ignore the shared memory architecture of the mobile SoC and focus purely on theoretical peak TOPS.
    **The Consequence:** They focus optimization efforts on compute instead of addressing the fundamental memory capacity bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total shared memory: 12.0 GB.
    - Memory locked by OS/ISP/GPU: 9.0 GB.
    - Available memory for NPU: 3.0 GB.

    **Calculations:**
    - Memory required = Model A (1.5 GB) + Model B (2.0 GB) = 3.5 GB.
    - Memory deficit = 3.5 GB - 3.0 GB = 0.5 GB.
    - Compute utilization = (2 TOPS + 4 TOPS) / 34.7 TOPS = ~17.3%.

    **Conclusion & Interpretation:**
    - **Result: 0.5 GB (Memory-Bound)**. The system lacks 0.5 GB to run both models, causing OS page swapping and frame drops.
