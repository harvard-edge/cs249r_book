title: 'Model Format Conversion: Mobile Fluency — CoreML Model Conversion Pipeline in 60 Seconds'
scenario: 'Without reference, list the steps to convert a PyTorch MobileNet model to CoreML for iPhone deployment.'
question: 'What are the 4 steps to convert a PyTorch MobileNet model to CoreML, and what is the expected size of a 5M parameter model in FP16?'
details:
  realistic_solution: 'The 4 steps are: 1) Export the PyTorch model to ONNX format (or use PyTorch Export for newer versions); 2) Load the exported model using coremltools; 3) Convert the model using coremltools.convert specifying ct.target.iOS and compute_precision=ct.precision.FLOAT16; 4) Save the resulting CoreML model as an .mlpackage. Expected size of a 5M parameter model in FP16 (2 bytes per parameter) is 10 MB.'
  common_mistake: |
    **The Pitfall:** Listing conversion tools without noting the intermediate ONNX export step.
    **The Rationale:** Candidates assume direct support exists or incorrectly calculate FP16 size using 4 bytes.
    **The Consequence:** The conversion pipeline fails structurally, or deployment size estimates are off by 2x.
  napkin_math: |
    **Assumptions & Constraints:**
    - Parameters: 5,000,000.
    - FP16 Size: 2 bytes per parameter.

    **Calculations:**
    - Size: 5,000,000 * 2 = 10,000,000 bytes.

    **Conclusion & Interpretation:**
    - **Result: 10 MB (Memory-Bound)**. 10 MB expected size for the FP16 CoreML model.
