title: 'Model Format Conversion: Choose CoreML Path for TensorFlow MobileNetV3 on iOS'
scenario: A team trains MobileNetV3-Large (5.4M params, 219M MACs) in TensorFlow and needs an iOS deployment on A17 Pro. Android will keep a separate TFLite artifact, so this decision is only about the iOS CoreML path.
question: For the iOS artifact, should the team convert through TFLite-to-CoreML or export through ONNX-to-CoreML, and what are the performance and maintenance tradeoffs?
details:
  realistic_solution: 'Prefer a direct iOS CoreML artifact through TensorFlow SavedModel/ONNX export into coremltools, then validate numerical parity against the TensorFlow source model. A TFLite-to-CoreML route is useful only when the TFLite artifact is the source of truth; otherwise it adds an extra conversion boundary where quantization, resize, activation, and fused ops can diverge. The old libsvm converter path is not relevant. Performance should be estimated from measured end-to-end inference, not peak TOPS alone: 219M MACs is only a compute lower bound, while CoreML graph compile, memory layout, delegate fallback, and pre/post-processing dominate a small CNN. Expect native CoreML to be modestly faster and easier to profile on iOS; choose TFLite-to-CoreML only if single-artifact maintenance is more important than iOS-specific optimization.'
  common_mistake: |
    **The Pitfall:** Assuming TFLite runs natively on the iOS Neural Engine with zero overhead.
    **The Rationale:** Engineers rely on the TFLite CoreML delegate for convenience, not realizing it introduces conversion layer overhead and misses native op fusions.
    **The Consequence:** Sacrificing ~30% of potential performance on Apple hardware for the sake of maintaining a single TFLite model codebase.
  napkin_math: |
    **Assumptions & Constraints:**
    - MobileNetV3 MACs = 219M = 438M FLOPs.
    - Peak TOPS gives only a lower bound; measured mobile inference includes graph, memory, and delegate overhead.

    **Calculations:**
    - A17 Pro pure-compute lower bound: 438M / 35T = 0.013ms, which is not a realistic end-to-end latency.
    - Native CoreML estimate after graph overhead, memory traffic, and pre/post-processing: about 3-6ms for this class of CNN, to be verified on device.
    - TFLite-to-CoreML route: assume 10-30% overhead or fallback risk from extra conversion/delegate layers, so about 3.5-8ms if the native path is 3-6ms.
    - Maintenance: ONNX-to-CoreML creates an iOS-specific artifact and parity tests; TFLite-to-CoreML may reduce artifact count but increases conversion-debug risk.

    **Conclusion & Interpretation:**
    - **Result: Use ONNX-to-CoreML for the iOS artifact when iOS quality/performance matters.** TFLite-to-CoreML is acceptable for convenience only after parity and on-device latency measurements prove no problematic op fallback.
