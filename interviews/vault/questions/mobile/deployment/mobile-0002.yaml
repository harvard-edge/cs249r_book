title: 'The OTA Update Budget'
scenario: 'You are an ML systems engineer for an automotive company deploying a new driver-assistance feature. The model has 250 million parameters and is stored in FP16 precision. To update the fleet, the model must be sent over-the-air (OTA) via cellular networks.'
question: 'How would you calculate the size of the model update package that needs to be transmitted?'
details:
  realistic_solution: 'Each parameter in an FP16 (half-precision float) model requires 2 bytes of storage. To calculate the total size, you multiply the number of parameters by the size of each parameter.'
  common_mistake: |
    **The Pitfall:** Confusing the storage requirements for different numerical precisions.
    **The Rationale:** Engineers often default to INT8 (1 byte/param) or FP32 (4 bytes/param), or confuse bits and bytes by multiplying by 16.
    **The Consequence:** The calculated OTA update size is off by 2x to 8x, leading to massive bandwidth cost overruns or network timeouts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Number of Parameters = 250,000,000.
    - Bytes per Parameter for FP16 = 2 bytes.

    **Calculations:**
    - Model Size = 250,000,000 * 2 = 500,000,000 bytes = 500 MB.

    **Conclusion & Interpretation:**
    - **Result: 500 MB (Storage-Bound)**. The total OTA update package is 500 MB.
  options:
  - '250 MB'
  - '1 GB'
  - '500 MB'
  - '4 GB'
  correct_index: 2
