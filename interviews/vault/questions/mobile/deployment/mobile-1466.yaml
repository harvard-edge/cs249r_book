title: 'Canary Release Definition for Tensor G3'
scenario: You are preparing a technical document on rollout strategies for a new mobile ML feature targeting devices with the Google Tensor G3. The Tensor G3 includes an on-device TPU delivering 7.5 TOPS and has 12 GB LPDDR5X memory, optimized for models like Gemini Nano.
question: What is a canary release for Tensor G3 model deployment and why does it reduce rollout risk?
details:
  realistic_solution: 'A canary release is a deployment strategy where a new version of the model is gradually rolled out to a small subset of users (the canaries) before making it available to the entire user base. This minimizes the impact of potential bugs, crashes, or performance regressions on the Tensor G3 TPU.'
  common_mistake: |
    **The Pitfall:** Confusing canary releases with A/B testing.
    **The Rationale:** Candidates incorrectly state that canary releases are primarily for testing user engagement rather than safely finding bugs.
    **The Consequence:** They deploy without technical monitoring, leading to widespread crashes if the model is faulty.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Base: 1,000,000 Daily Active Users.
    - Canary group: 5%.

    **Calculations:**
    - Devices = 1,000,000 * 0.05 = 50,000 devices.

    **Conclusion & Interpretation:**
    - **Result: 50,000 devices (Deployment Risk)**. 50,000 devices execute the new model, safely isolating any bugs from the remaining 950,000 devices.
