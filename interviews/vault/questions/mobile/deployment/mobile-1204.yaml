title: CI/CD to Tensor G3 Deployment Discrepancy
scenario: A 3.2B parameter LLM, optimized for on-device LLM (Gemini Nano) use cases, passes all CI/CD latency and memory tests in a generic emulated environment and is promoted by the model registry. However, when serving in production on a Google Tensor G3 (equipped with an On-device TPU delivering 7.5 TOPS and 12 GB LPDDR5X memory), the application consistently crashes due to Out-Of-Memory (OOM) errors and severe latency spikes.
question: Why did a Tensor G3 deployment pass emulated CI/CD tests but crash with OOM and latency spikes in production?
details:
  realistic_solution: The CI/CD pipeline lacked Hardware-In-The-Loop (HITL) testing. The deployed INT8 model contained operators unsupported by the physical Tensor G3 TPU, so the runtime partitioned parts of the graph to CPU kernels. Those fallback partitions can require dequantized weights, larger activation buffers, and extra CPU/TPU boundary copies, greatly increasing resident memory and latency compared with the emulator's idealized TPU path.
  common_mistake: |
    **The Pitfall:** Trusting generic software emulators for hardware-bound model deployments.
    **The Rationale:** Candidates incorrectly blame device memory limits directly, ignoring that CI/CD emulation fundamentally hides hardware-specific fallback behaviors.
    **The Consequence:** The CI/CD system routinely greenlights broken artifacts, leading to catastrophic production crashes on physical devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - INT8 Baseline: 3.2B params x 1 byte = 3.2 GB.
    - Physical device memory is shared with the OS, app heap, runtime buffers, KV cache or activations, and camera/UI services.

    **Calculations:**
    - Worst-case full FP32 dequantized copy would be 3.2B params x 4 bytes = 12.8 GB, already larger than the physical 12 GB pool before OS and app overhead.
    - Even partial fallback is dangerous: keeping the 3.2 GB INT8 model plus a 25% FP32 fallback partition adds 0.25 * 12.8 GB = 3.2 GB, for ~6.4 GB of weights before activations and intermediate buffers.
    - With several GB reserved by the OS/app and additional activation/KV/runtime buffers, fallback can plausibly exceed the process memory budget and trigger OOM or memory-pressure termination.

    **Conclusion & Interpretation:**
    - **Result: Plausible Memory Blowup and Latency Spike**. The failure is not guaranteed by parameter storage alone; it comes from unsupported ops causing CPU fallback, dequantized resident partitions, larger intermediates, and extra copies that the emulator did not model.
