title: 'CI/CD to Tensor G3 Deployment Discrepancy'
scenario: 'A 3.2B parameter LLM, optimized for on-device LLM (Gemini Nano) use cases, passes all CI/CD latency and memory tests in a generic emulated environment and is promoted by the model registry. However, when serving in production on a Google Tensor G3 (equipped with an On-device TPU delivering 7.5 TOPS and 12 GB LPDDR5X memory), the application consistently crashes due to Out-Of-Memory (OOM) errors and severe latency spikes.'
question: 'Why did a Tensor G3 deployment pass emulated CI/CD tests but crash with OOM and latency spikes in production?'
details:
  realistic_solution: 'The CI/CD pipeline lacked Hardware-In-The-Loop (HITL) testing. The deployed INT8 model contained operators unsupported by the physical Tensor G3 TPU. The runtime forcibly partitioned the graph to the CPU, requiring weight dequantization to FP32. This drastically increased the memory footprint beyond the RAM limits and bypassed the TPU entirely.'
  common_mistake: |
    **The Pitfall:** Trusting generic software emulators for hardware-bound model deployments.
    **The Rationale:** Candidates incorrectly blame device memory limits directly, ignoring that CI/CD emulation fundamentally hides hardware-specific fallback behaviors.
    **The Consequence:** The CI/CD system routinely greenlights broken artifacts, leading to catastrophic production crashes on physical devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - INT8 Baseline: 3.2B params x 1 byte = 3.2 GB.

    **Calculations:**
    - CPU Fallback: FP32 dequantization causes footprint to swell to 3.2B params x 4 bytes = 12.8 GB.
    - Crash Validation: 12.8 GB > 12 GB total LPDDR5X memory, guaranteeing an immediate OOM exception.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound**. Ideal TPU compute is 0.85 ms per token. CPU fallback wholly negates this, explaining the massive latency spikes.
