title: Evaluating JIT Compilation Latency Spikes on Mobile NPU
scenario: A translation app loads a 1GB INT8 model. On the Snapdragon 8 Gen 3, the first inference takes 800ms, while subsequent inferences take 30ms.
question: Evaluate the primary cause of this first-run latency spike and propose an architectural solution.
details:
  realistic_solution: The 800ms delay is the 'warm-up' time, dominated by JIT compilation of the model graph to Hexagon-specific microcode and paging 1GB of weights into RAM. The solution is to serialize the compiled NPU binary during installation and asynchronously pre-warm the model upon app launch.
  common_mistake: |
    **The Pitfall:** Blaming the cold start purely on CPU execution overhead.
    **The Rationale:** Candidates overlook device-specific compilation requirements and flash storage read speeds.
    **The Consequence:** Attempting to optimize CPU threads fails to address the massive I/O and JIT compilation bottleneck.
  napkin_math: |
    1. **Weight Paging:** Reading a 1000 MB model from UFS flash storage (assuming 2000 MB/s read speed).
    2. **I/O Latency:** 1000 MB / 2000 MB/s = 500 ms just to read weights into RAM.
    3. **JIT Compilation:** The remaining 300ms is consumed compiling the graph to Hexagon microcode.
    4. **Solution:** Asynchronously pre-warm and serialize the compiled binary to eliminate this **800ms delay**.
