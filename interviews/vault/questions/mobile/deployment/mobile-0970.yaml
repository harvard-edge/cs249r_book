title: 'MLOps Lifecycle: Compare Federated Learning vs. Centralized Training for Mobile'
scenario: A keyboard prediction model (5M params, INT8, Snapdragon 8 Gen 3) is trained for personalization. The team is evaluating federated learning (train on 100M devices, send gradients) versus centralized training (aggregate anonymized data centrally, train on cloud H100).
question: How would you quantify the gradient upload bandwidth, privacy implications, and model accuracy tradeoffs between federated and centralized training?
details:
  realistic_solution: 'Separate the dense-gradient baseline from the compressed FL design. A dense FP32 gradient is 5M params × 4 bytes = 20MB per device, which would be 2PB if all 100M devices uploaded in one round. A practical FL design would sample clients and compress updates; with 1% Top-K plus index overhead, budget about 250KB per participating device. If all 100M devices participated across a round, that is 25TB/round and 250TB for 10 rounds; if only 1M devices are sampled per round, it is 250GB/round. Centralized training depends on raw-data volume; for a comparable 1TB anonymized n-gram upload, storage is tens of dollars per month and cloud training may dominate cost. Privacy: FL avoids central raw-text collection, but gradients still need secure aggregation, clipping, and differential privacy because they can leak examples. Accuracy: centralized may converge faster or slightly better because it sees full data, but the gap is workload-dependent, not a deterministic 3-8%.'
  common_mistake: |
    **The Pitfall:** Assuming federated learning is always superior simply because it is "more private."
    **The Rationale:** Candidates often fail to calculate the sheer scale of gradient uploads and ignore the reality that gradients can still leak private information if not properly secured.
    **The Consequence:** Proposing a system with crippling bandwidth costs ($18,000/round) and a 5-15% accuracy gap compared to a cheaper centralized approach.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dense FL gradient size: 5M × 4B = 20MB uncompressed.
    - Compressed FL update: 1% Top-K values plus sparse indices ≈ 250KB per participating device.
    - Centralized Storage: Collect 10B text samples × 100 bytes avg = 1TB.

    **Calculations:**
    - Dense all-device FL upload: 100M × 20MB = 2PB per round.
    - Compressed all-device FL upload: 100M × 250KB = 25TB per round.
    - Compressed 10-round FL upload: 25TB × 10 = 250TB.
    - Sampled FL round with 1M devices: 1M × 250KB = 250GB per round.
    - Centralized raw-data upload assumption: 10B × 100 bytes = 1TB once, plus storage and H100 training cost.
    - At $0.09/GB transfer pricing, 25TB of FL upload is about $2,250 per all-device round; 250GB sampled upload is about $22.50 per round. Actual carrier and ingress pricing may differ.

    **Conclusion & Interpretation:**
    - **Result:** **FL is bandwidth- and coordination-bound unless clients are sampled and updates are compressed.** Centralized is cheaper for the stated 1TB raw-data assumption, but has higher raw-data privacy risk; FL needs secure aggregation and DP to make the privacy claim meaningful, and the accuracy tradeoff should be measured rather than assumed.
