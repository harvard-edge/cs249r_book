title: Mobile Music Generation Two-Year TCO
scenario: Calculate the 2-year scoped TCO for a music generation AI app with 100K MAU using Snapdragon 8 Gen 3. Each user generates 3 songs/day (30 seconds each) using a distilled mobile music model (300M params, 2W inference, 5 seconds/song) plus a 0.5GB codec. Exclude device wear and battery replacement; include $200K amortized mobile development and user charging electricity.
question: How does the scoped 2-year TCO of on-device music generation compare to cloud generation at $0.05 per song?
details:
  realistic_solution: |
    The scenario uses a distilled mobile music model, not a claim that an off-the-shelf cloud MusicGen variant is consumer-ready on a phone. At FP16, 300M params * 2 bytes = 600MB of weights. Adding a 0.5GB audio codec gives roughly 1.1GB, which fits on a 16GB Snapdragon 8 Gen 3 device after normal OS/app reservations. The scenario states 5 seconds of inference to generate each 30-second song, so energy is 2W * 5s = 10J = 0.00278Wh/song.

    For 100K MAU at 3 songs/day, two-year volume is 100,000 * 3 * 365 * 2 = 219M songs. Cloud generation cost is 219M * $0.05 = $10.95M before any extra egress or product overhead. User-side charging energy is 219M * 0.00278Wh = 608kWh over two years; at an explicit $0.10/kWh assumption, that is about $61. Including the scoped $200K amortized development cost, on-device two-year TCO is about $200,061, so net savings versus the cloud generation line item are about $10.75M. This excludes device wear, battery replacement, QA/support, app distribution, and model refresh work, so edge compute is low marginal cost under the stated scope rather than free.
  common_mistake: |
    **The Pitfall:** Calculating cloud cost per generation without including serving overhead or verifying if the device can actually hold the model.
    **The Rationale:** Candidates treat cloud APIs as fixed costs while also treating edge compute as free, instead of stating which development, support, battery, and distribution costs are in scope.
    **The Consequence:** The company either overpays for cloud serving or underbudgets the real work needed to ship and maintain the on-device path.
  napkin_math: |
    **Assumptions & Constraints:**
    - Users: 100K MAU, 3 songs/day/user.
    - On-Device: distilled 300M-param mobile model, 2W for 5s/song. Amortized mobile development: $200K.
    - Cloud: $0.05/song generation cost, excluding extra egress/product overhead.
    - Electricity price assumption for user charging: $0.10/kWh.
    - Scope excludes device wear, battery replacement, app-store distribution, QA/support, and future model refreshes.

    **Calculations:**
    - Model memory: 300M params * 2 bytes FP16 = 600MB; plus 0.5GB codec = ~1.1GB.
    - On-Device Energy: 2W * 5s = 10 Joules = 0.00278 Wh/song.
    - Two-year generation volume: 100K * 3 * 365 * 2 = 219M songs.
    - Total user charging energy: 219M * 0.00278Wh = ~608 kWh.
    - Two-year energy cost: 608 kWh * $0.10/kWh = ~$61.
    - Scoped on-device two-year TCO including development: $200,000 + $61 = ~$200,061.
    - Cloud Cost (2 years): 100K * 3 * 365 * 2 * $0.05 = $10,950,000.
    - Net Savings: $10.95M - $200,061 = ~$10.75M.

    **Conclusion & Interpretation:**
    - **Result: ~$200K scoped on-device TCO vs $10.95M cloud generation cost over two years.** The $200K development cost dominates the scoped on-device estimate; edge compute has low marginal cost here, but omitted maintenance, QA, distribution, and device-wear costs must be budgeted separately.
