title: 'Mobile TCO Realization: Concrete Cost Model for Music AI App'
scenario: Calculate the 2-year infrastructure cost for a music generation AI app with 100K MAU using Snapdragon 8 Gen 3. Each user generates 3 songs/day (30 seconds each) using an on-device MusicGen-Small model (300M params, 2W inference, 5 seconds/song).
question: How does the 2-year TCO of an on-device MusicGen deployment compare to cloud generation at $0.05 per song?
details:
  realistic_solution: |
    MusicGen-Small at FP16 is 300M params * 2 bytes = 600MB of weights. Adding a 0.5GB audio codec gives roughly 1.1GB, which fits comfortably on a 16GB Snapdragon 8 Gen 3 device. The scenario states 5 seconds of inference to generate each 30-second song, so energy is 2W * 5s = 10J = 0.00278Wh/song.

    For 100K MAU at 3 songs/day, two-year volume is 100,000 * 3 * 365 * 2 = 219M songs. Cloud cost is 219M * $0.05 = $10.95M. User-side charging energy is 219M * 0.00278Wh = 608kWh over two years; at an explicit $0.10/kWh assumption, that is about $61. Including the $200K development cost, on-device two-year TCO is about $200,061, so net savings versus cloud are about $10.75M. Battery impact remains tiny: 3 songs/day * 0.00278Wh = 0.0083Wh/day, about 0.065% of a 12.8Wh phone battery.
  common_mistake: |
    **The Pitfall:** Calculating cloud cost per generation without including serving overhead or verifying if the device can actually hold the model.
    **The Rationale:** Candidates treat cloud APIs as fixed costs without realizing that scaling user volume linearly explodes OPEX, whereas edge compute is virtually free once developed.
    **The Consequence:** The company hemorrhages millions of dollars in cloud costs when the exact same capability could have been run locally.
  napkin_math: |
    **Assumptions & Constraints:**
    - Users: 100K MAU, 3 songs/day/user.
    - On-Device: 2W for 5s/song. Upfront dev: $200K.
    - Cloud: $0.05/song API cost.
    - Electricity price assumption for user charging: $0.10/kWh.

    **Calculations:**
    - Model memory: 300M params * 2 bytes FP16 = 600MB; plus 0.5GB codec = ~1.1GB.
    - On-Device Energy: 2W * 5s = 10 Joules = 0.00278 Wh/song.
    - Two-year generation volume: 100K * 3 * 365 * 2 = 219M songs.
    - Total user charging energy: 219M * 0.00278Wh = ~608 kWh.
    - Two-year energy cost: 608 kWh * $0.10/kWh = ~$61.
    - On-device two-year TCO including development: $200,000 + $61 = ~$200,061.
    - Cloud Cost (2 years): 100K * 3 * 365 * 2 * $0.05 = $10,950,000.
    - Net Savings: $10.95M - $200,061 = ~$10.75M.

    **Conclusion & Interpretation:**
    - **Result: ~$200K on-device TCO vs $10.95M cloud TCO over two years.** The $200K development cost dominates on-device cost, but cloud generation still costs about $10.75M more at the stated volume.
