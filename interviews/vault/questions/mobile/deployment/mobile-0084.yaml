title: The CoreML Model Compilation Jitter
scenario: You deploy a CoreML model in your iOS app, bundled as an uncompiled `.mlmodel` file. When the user taps 'Start Camera', you initialize the model. The very first time the user taps this button after downloading the app, the UI freezes for 3 seconds. Every subsequent tap is instant.
question: Why does the first Core ML initialization freeze the UI for 3 seconds when the bundled .mlmodel starts the camera?
details:
  realistic_solution: 'iOS compiles .mlmodel to ANE machine code on first init: operator fusion, memory planning, code generation = ~3 seconds for 50 layers. Fix: (1) Pre-compile with coremltools compile() to ship .mlmodelc directly. (2) Or compile on background thread at first launch and cache. (3) Never call MLModel init on main thread. The cache persists across launches. Weight loading is ~50ms; the 3s is almost entirely compilation. This is the most common CoreML UX trap.'
  common_mistake: |
    **The Pitfall:** Blaming the weight loading for massive initialization latency.
    **The Rationale:** Developers often assume the 3-second freeze is just the time required to read weights from disk into memory.
    **The Consequence:** They fail to pre-compile the model, leaving users with a terrible, janky first-launch experience.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model format: Uncompiled `.mlmodel`.
       - Weight size: ~50MB.
       - Storage: NVMe (~1 GB/s read speed).
    2. **Calculations:**
       - Weight loading time = 50MB / 1000MB/s = ~50ms.
       - Compilation time (operator fusion, IR gen) = ~2950ms.
       - Total initialization time = 50ms + 2950ms = 3000ms (3 seconds).
    3. **Conclusion & Interpretation:**
       **Result: JIT Compilation-Bound. The 3s delay is almost entirely JIT compilation; pre-compiling the model to `.mlmodelc` eliminates this UI blocking tax.**
