title: Mastering Compound AI System Reliability Engineering on A17 Pro
scenario: 'An A17 Pro (8GB, 35 TOPS) compound AI app runs a 5-stage pipeline: intent classifier → retrieval → reranker → LLM → output filter. Each stage has an independent failure mode. Field data shows: classifier crashes 0.1% of requests, retrieval returns empty 2.3% of the time, reranker times out 0.8% of requests, LLM produces policy-violating content 0.4% of the time, output filter false-positives 1.2% of safe responses.'
question: How would you design a reliability architecture that achieves a 99.5% successful response rate for this compound pipeline?
details:
  realistic_solution: 'Baseline success is the product of the independent stage reliabilities: 0.999 * 0.977 * 0.992 * 0.996 * 0.988 = 95.28%, so the system misses the 99.5% target. Add stage-specific fallbacks: default intent fallback for classifier crashes (0.1% -> 0.01% unhandled), BM25 fallback for empty vector retrieval (2.3% -> 0.3% still empty), use retrieval score order when reranking times out (0.8% -> 0.05% unresolved timeout), retry policy-violating LLM output with a safer prompt (0.4% -> 0.04%), and threshold/calibrate the output filter (1.2% -> 0.2% false-positive block). Those mitigations give 0.9999 * 0.997 * 0.9995 * 0.9996 * 0.998 = 99.40%, still below target. Add a bounded end-to-end retry/fallback for retryable failures that resolves at least 50% of the remaining 0.60% failures; final success is 1 - 0.0060 * 0.5 = 99.70%, above the 99.5% SLA.'
  common_mistake: |
    **The Pitfall:** Treating each failure mode independently and assuming low per-stage failure rates guarantee overall success.
    **The Rationale:** Candidates fail to account for the multiplicative reliability problem where the compound system fails at a rate roughly equal to the sum of all failure modes.
    **The Consequence:** The system drastically misses its reliability SLA because the compounded baseline failure rate is actually 4.7%.
  napkin_math: |
    **Assumptions & Constraints:**
    - System Reliability Target: 99.5%.
    - Original Reliabilities: 0.999, 0.977, 0.992, 0.996, 0.988.
    - Mitigated Reliabilities: 0.9999, 0.997, 0.9995, 0.9996, 0.998.
    - Bounded global retry/fallback resolves 50% of remaining retryable failures.

    **Calculations:**
    - Baseline Reliability: 0.999 * 0.977 * 0.992 * 0.996 * 0.988 = 95.28%.
    - Mitigated Reliability: 0.9999 * 0.997 * 0.9995 * 0.9996 * 0.998 = 99.40%.
    - Remaining mitigated failure rate: 1 - 0.9940 = 0.0060.
    - Global retry/fallback success: 1 - (0.0060 * 0.5) = 99.70%.

    **Conclusion & Interpretation:**
    - **Result: ~99.70% (Reliability-Bound)**. Stage fallbacks alone are close but insufficient; a bounded retry/fallback for retryable failures closes the gap above the 99.5% target.
