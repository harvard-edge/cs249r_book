title: The App Size Audit
scenario: Your app is 280 MB. Analytics show that for every 10 MB increase in app size, install conversion drops by 1.5%. Marketing wants to add a new 45 MB generative AI feature. Engineering says the app is already at the limit. The app has 4 models totaling 120 MB (two are FP16, two are already INT8).
question: How can you find at least 60 MB of app size savings while preserving all four mobile ML features?
details:
  realistic_solution: 'Systematic audit of all binary components. Savings: (1) Quantize the 2 FP16 models to INT8: -35 MB (other 2 already INT8). (2) Deduplicate ML framework (two TFLite versions linked): -5 MB. (3) Strip unused assets (@3x images, dead localizations): -12 MB. (4) Move rarely-used style transfer to on-demand download: -12.5 MB. Total: 64.5 MB saved. With 45 MB new feature: 260.5 MB (down from 280). Install conversion improves ~3%. Never re-quantize INT8 to INT4 for OCR/face detection.'
  common_mistake: |
    **The Pitfall:** Proposing to blindly quantize all models from FP16 to INT8 or INT4.
    **The Rationale:** Not realizing that half the models are already INT8 and re-quantizing them to INT4 destroys accuracy for sensitive tasks like OCR.
    **The Consequence:** Breaking core app functionality while chasing an arbitrary binary size reduction goal.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Starting app size: 280 MB.
       - Required savings: >= 60 MB.
       - New feature footprint: 45 MB.
    2. **Calculations:**
       - Quantize 2 FP16 models to INT8: -35 MB.
       - Deduplicate ML framework: -5 MB.
       - Strip unused assets: -12 MB.
       - On-demand style transfer: -12.5 MB.
       - Total savings: 64.5 MB.
       - New size with 45 MB AI feature: 280 - 64.5 + 45 = 260.5 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Storage-Bound. App size reduced by 19.5 MB net, increasing install conversion by ~3%.**
