title: Specifying Model Update and Rollback Contract for Compound AI on Snapdragon 8 Gen 3
scenario: 'A Snapdragon 8 Gen 3 compound AI app ships model updates over-the-air (OTA) for its 3-model pipeline: embedding model (33MB), reranker (22MB), and LLM (500MB INT4). A bad LLM update caused a 15% increase in user-reported incoherent responses on 500,000 devices before detection.'
question: What OTA model update and rollback protocol can detect a bad compound AI model and revert within one hour?
details:
  realistic_solution: 'Staged rollout specification: (1) Canary phase (0-1h): deploy to 0.1% of fleet (500 devices) with the full 555MB pipeline version pinned as a bundle. Collect automated quality signals that are cheap and already on-device: user thumbs-down rate, answer-length anomalies, refusal/error rate, latency P95, and sampled server-side judge scores on opt-in redacted traces. Alert threshold: if thumbs-down rate increases > 2% or judged coherence drops > 5% relative to baseline, halt rollout automatically. (2) Each device keeps the previous complete pipeline bundle until the new bundle passes the canary, requiring about 555MB of rollback storage during rollout. (3) Kill-switch: a server-side feature flag marks the new bundle disabled; clients check the flag at startup and at least every 5 minutes, then switch to the cached prior bundle without downloading a rollback OTA. (4) Rollback trigger: automated within 30 minutes of canary breach detection, with fleet rollback completed
    within one hour for online clients that receive the flag.'
  common_mistake: |
    **The Pitfall:** Relying on infrastructure-level rollbacks via massive OTA downloads.
    **The Rationale:** Engineers often implement rollback by pulling the OTA update, without considering that devices download updates asynchronously.
    **The Consequence:** By the time a regression is detected, a massive portion of the fleet has updated, requiring a costly, slow 500MB OTA rollback that leaves users broken for hours.
  napkin_math: |
    **Assumptions & Constraints:**
    - OTA Update Size: 33MB + 22MB + 500MB = 555MB per update.
    - Local Rollback Storage: Keep 1 prior complete pipeline bundle during rollout (+555MB per device).
    - 500,000 devices downloaded bad update before detection.
    - Clients poll or receive the kill-switch flag within 5 minutes while online.

    **Calculations:**
    - Traditional rollback download: 500,000 * 555MB = 277,500,000MB ~= 277.5TB.
    - CDN cost: 277,500GB * $0.09/GB = $24,975.
    - Cached rollback download: 0GB after flag flip because the prior bundle is already on device.
    - Rollback detection path: 0-60 minute canary window, breach detected at or before 30 minutes from bad metrics, flag propagation target <= 5 minutes for online clients.

    **Conclusion & Interpretation:**
    - **Result: $0 incremental rollback CDN cost and about 555MB temporary rollback storage per device (Network-Bandwidth Bound)**. Local cached rollback avoids roughly 277.5TB of emergency OTA traffic and about $24,975 in CDN cost for the affected 500,000-device cohort.
