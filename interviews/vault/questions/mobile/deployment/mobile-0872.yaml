title: Designing a Resilient Agent Fallback Architecture for Intermittent Connectivity on Snapdragon 8 Gen 3
scenario: A mobile app uses a cloud-first compound AI agent (200ms cloud latency) with an on-device fallback (1B LLM, 40 tok/s). Network connectivity drops for 15% of session time. A graceful degradation architecture is required with SLAs of <500ms cloud response and <2s on-device response.
question: How should a mobile compound AI agent switch gracefully between cloud and on-device modes during intermittent connectivity?
details:
  realistic_solution: Use a dual-path arbitration policy. On each request, send the cloud call and start local prefill immediately with the same compact prompt. If the cloud produces a valid response before the 500ms cloud SLA, return it and cancel the local decode. If connectivity is unhealthy or no valid cloud response arrives by the timeout, continue the already-running local path and stream the local answer. Cache recent conversation state when memory permits, but treat compressed KV or summarized history as an implementation option, not a correctness requirement. The important controls are health signals, an explicit winner-takes-response rule, cancellation of the losing path, and idempotent tool/action handling.
  common_mistake: |
    **The Pitfall:** Implementing a strict sequential try/catch that only spins up the local model after the cloud request explicitly times out.
    **The Rationale:** Attempting to save local battery life at the absolute expense of tail latency.
    **The Consequence:** The user experiences a multi-second delay during the transition (Cloud Timeout + Local Prefill + Local Generate), breaking the conversational SLA and ruining UX.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cloud expected path: 200ms TTFT + 100ms generation = 300ms total, with a 500ms maximum cloud wait.
    - Local Model SLA: 512 tokens prefill (57ms) + 50 tokens generation at 40 tok/s (1250ms) = 1307ms total.

    **Calculations:**
    - If cloud succeeds normally, response latency is ~300ms.
    - If cloud is declared failed at 300ms, local work has also run for 300ms: 57ms prefill + 243ms decode, or about 9 generated tokens.
    - Remaining local work after the 300ms decision: 1307ms - 300ms = 1007ms.
    - End-to-end fallback latency from request start remains ~1307ms because the cloud wait is overlapped with local execution.

    **Conclusion & Interpretation:**
    - **Result: ~1.3s fallback latency (Latency-Bound)**. Parallel local progress hides the cloud failure wait; a sequential cloud-then-local fallback would add the timeout to local latency and risk the 2.0s SLA.
