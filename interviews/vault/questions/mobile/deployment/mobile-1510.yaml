title: CI/CD Pipeline Design for On-Device LLM on Tensor G3
scenario: Your team needs to design an automated deployment pipeline for regular updates to an on-device LLM. The pipeline must guarantee that the quantized model maintains strict training-serving consistency.
question: What CI/CD checks catch LLM latency, memory, and consistency regressions before OTA release?
details:
  realistic_solution: Mobile MLOps needs device-in-the-loop validation on representative Tensor G3 hardware, not just x86 emulation. The CI/CD pipeline should gate OTA release on latency percentiles, peak RSS/KV-cache usage, thermal throttling behavior, startup time, and output parity against a frozen reference build. Run the quantized model on the target mobile stack, capture traces from physical devices, and fail the release if the model regresses on latency, memory headroom, or numerical consistency.
  common_mistake: |
    **The Pitfall:** Designing a purely generic CI/CD pipeline that validates only on cloud or x86 simulators.
    **The Rationale:** Software-only checks miss the device-specific latency, thermal, and memory behavior that determines whether the OTA build is actually safe to ship.
    **The Consequence:** The release can pass unit tests while still failing on-device with throttling, OOMs, or output drift.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total RAM: 12 GB.
    - OS Reservation: 6 GB (App ceiling 6 GB).
    - Model size: 3.2B parameters (INT4).
    - Target Generation SLA: 20 tokens/sec.

    **Calculations:**
    - Weight footprint: 3.2B * 0.5 bytes = 1.6 GB.
    - Headroom for KV/App: 6.0 GB - 1.6 GB = 4.4 GB.
    - Compute per token: 3.2B * 2 MACs = 6.4 GOPS.
    - Sustained compute: 6.4 GOPS * 20 tok/sec = 128 GOPS = 0.128 TOPS.

    **Conclusion & Interpretation:**
    - **Result: Release gating must be empirical, not just static.** The modeled 0.128 TOPS demand is well below peak hardware capability, so the meaningful CI/CD checks are on-device latency, memory, thermal behavior, and output drift rather than only size or theoretical TOPS.
