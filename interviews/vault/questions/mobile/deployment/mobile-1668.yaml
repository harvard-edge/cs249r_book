title: On-Device ML Model Canary Rollout on Google Tensor G3
scenario: Your team has developed a new on-device ML model for real-time image segmentation in a popular mobile application. This model is intended to run on Google Pixel devices equipped with the Google Tensor G3 chip. You need to perform a canary deployment to 5% of your L6+ mobile user base before a full rollout.
question: How would you monitor a mobile canary rollout's performance, ensure stability, and decide on a full rollout or rollback?
details:
  realistic_solution: Implement a phased rollout using server-side flags controlled by a feature management system. For the canary group, actively collect device-specific telemetry, including model inference latency on the Tensor G3's TPU, actual power draw during model execution, memory consumption (ensuring it stays within reasonable bounds of the 12 GB LPDDR5X RAM), and app crash rates. Establish clear success criteria and rollback triggers based on these metrics. For example, if the average latency increases by >10% or battery drain from the app increases by >5% for canary users, trigger an automatic rollback. Utilize A/B testing frameworks to compare the canary group against a control group to isolate the new model's impact. Prioritize backward compatibility and a fast, reliable rollback mechanism.
  common_mistake: |
    **The Pitfall:** Relying solely on server-side metrics during a mobile canary rollout.
    **The Rationale:** Candidates forget that on-device ML introduces unique constraints like battery drain, thermal throttling, and shared memory limits.
    **The Consequence:** The server shows a successful rollout while users experience severe app degradation, leading to uninstalls.
  napkin_math: |
    **Assumptions & Constraints:**
    - Time Budget per Frame: 30 FPS = ~33 ms/frame.
    - Memory Impact: A 100 MB model is ~0.8% of 12 GB RAM, transient activations (~500 MB) increase the peak footprint.
    - Example sustained accelerator throughput for this model path: 7.5 TOPS = 7,500 GOPS/sec.
    - Power should be measured as draw during inference, for example 1.5 W active ML power, not as mAh capacity.

    **Calculations:**
    - Operations available per frame at sustained throughput = 7,500 GOPS/sec * 0.033 sec = ~247.5 GOP/frame.
    - If the model requires 80 GOP/frame, ideal accelerator compute time = 80 / 7,500 sec = 10.7 ms.
    - Energy during accelerator execution at 1.5 W = 1.5 J/sec * 0.0107 sec = 0.016 J = 16 mJ per frame, before camera, memory, CPU post-processing, and display costs.

    **Conclusion & Interpretation:**
    - **Result: Plausible compute headroom, but not proof of rollout safety.** Telemetry must measure end-to-end latency against the 33 ms frame budget, peak memory, active power in watts, thermal throttling, and crash rates before expanding the canary.
