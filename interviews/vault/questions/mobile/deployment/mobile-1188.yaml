title: 'Analyzing Shadow Deployment OOM on Exynos 2400'
scenario: 'You are monitoring a shadow deployment of a new 4GB language model on devices with the Samsung Exynos 2400 NPU. The device has a shared 12 GB LPDDR5X memory pool. During the rollout, both the existing 2GB vision model and the new 4GB language model process the same camera stream simultaneously.'
question: 'Why does shadowing a 4GB language model beside a 2GB vision model OOM on Exynos 2400 during camera use?'
details:
  realistic_solution: 'The crash happens because the Exynos 2400 uses a unified memory architecture with 12 GB LPDDR5X shared across all subsystems. When the camera is active, the ISP and GPU consume significant memory for image processing and UI rendering. Running both models simultaneously during the shadow deployment exceeds the available free memory threshold, triggering the Android low memory killer (LMK). The solution is to switch from a concurrent shadow deployment to a fractional A/B rollout, routing distinct user sessions to either the new or old model.'
  common_mistake: |
    **The Pitfall:** Assuming `4GB + 2GB = 6GB` easily fits within the 12GB total RAM limit.
    **The Rationale:** Candidates fail to account for the shared memory architecture where the OS and camera ISP consume massive chunks of the RAM pool.
    **The Consequence:** The shadow deployment induces widespread catastrophic device crashes in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Device RAM: 12.0 GB.
    - OS + Camera ISP + GPU: ~4.5 GB + ~2.5 GB = 7.0 GB.
    - Models: 4.0 GB (LLM) + 2.0 GB (Vision).

    **Calculations:**
    - Remaining Free RAM: 12.0 - 7.0 = 5.0 GB.
    - Shadow Mode Cost: 4.0 GB (LLM) + 2.0 GB (Vision) = 6.0 GB.

    **Conclusion & Interpretation:**
    - **Result: -1.0 GB (Memory-Bound)**. The shadow deployment requires 1.0 GB more memory than the shared system can physically provide.
