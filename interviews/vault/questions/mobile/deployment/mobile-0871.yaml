title: Designing a 3.5GB On-Device RAG System for Personal Documents
scenario: Design an on-device RAG system that enables a personal knowledge assistant to search 10,000 personal documents and generate responses. Total memory budget is 3.5GB. The design must support documents up to 5000 tokens, 256-dim embeddings, and a sub-2-second end-to-end response time.
question: How should an on-device RAG system fit document search and LLM generation within memory and response-time constraints?
details:
  realistic_solution: 'Fit the system by budgeting memory and constraining answer length. Use a compact embedding model that outputs the required 256-dim vectors, a chunked on-device vector index, an INT4 1B LLM at roughly 500MB of weights, compressed document storage, and a KV cache sized for the actual prompt plus response window. If compressed document text averages about 3 bytes/token, 10,000 documents of 5,000 tokens each would be about 150MB, but chunk metadata, raw text retention, and HNSW or IVF/PQ graph overhead must be explicitly budgeted; the design still needs headroom inside 3.5GB. KV-cache memory is architecture-dependent, so reserve a few hundred MB for a short context instead of asserting an exact 1B-model shape from the prompt. The latency constraint is dominated by decode and prefill: at 20 tok/s, a 100-token answer takes 5s and cannot meet the SLA. The design must use small retrieved snippets, stream immediately after prefill, and enforce a response budget derived from
    measured retrieval, prefill, and decode latency.'
  common_mistake: |
    **The Pitfall:** Using cloud-scale models for mobile constraints.
    **The Rationale:** Candidates often propose massive 1536-dim embeddings or full FP16 models, consuming 10x the memory budget.
    **The Consequence:** Out-of-memory crashes or severe performance degradation on mobile devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1B LLM (INT4) = ~500 MB.
    - Compact embedding model + 256-dim vector index + compressed worst-case document text = tens of MB + index overhead + ~150 MB before chunk metadata and optional raw-text overhead.
    - KV cache: architecture-dependent for a 1B LLM; reserve a few hundred MB for a short prompt/response window and validate on the selected model.
    - Total Memory Budget = 3.5 GB.
    - SLA = 2.0 seconds end-to-end. NPU text generation = 20 tok/s.

    **Calculations:**
    - Base system memory is roughly 500 MB for weights + about 150 MB compressed text + tens to hundreds of MB for embedding/index structures + a few hundred MB for KV.
    - This can fit inside 3.5 GB only if documents are chunked, duplicate raw storage is controlled, and the selected model's measured KV/runtime footprint leaves allocator and app headroom.
    - Reserve ~100 ms for query embedding/search and ~150-200 ms for prefill of compact retrieved snippets.
    - Remaining decode budget ≈ 2.0s - 0.3s = 1.7s.
    - Max generated tokens under those illustrative timings ≈ 1.7s * 20 tok/s = ~34 tokens; a faster retrieval+prefill path raises the cap, while longer retrieved context lowers it.

    **Conclusion & Interpretation:**
    - **Result: Memory can fit with careful budgeting, but generation is SLA-bound.** A 100-token response cannot meet sub-2s at 20 tok/s; the architecture needs compact retrieval context, streaming, and a measured response cap rather than a fixed universal token count.
