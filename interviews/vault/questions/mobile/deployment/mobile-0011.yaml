title: The App Store Privacy Rejection
scenario: 'You submit your iOS app to the App Store. It uses an on-device CoreML model for face-based age estimation to apply age-appropriate content filters. Apple rejects it with "Guideline 5.1.2 — Data Use and Sharing: Your app collects face data without adequate purpose string." The model runs entirely on-device and you never send face data to a server.'
question: Why did Apple reject an on-device Core ML face-age filter for missing a face-data purpose string, and what must change?
details:
  realistic_solution: 'Apple treats face-derived age estimation as sensitive face/biometric data even when processing stays on-device. Fix: (1) add NSCameraUsageDescription with a clear purpose for camera capture, (2) update App Privacy details to disclose face/biometric data processing as applicable, and (3) present an accurate permission/consent flow before first camera use. NSFaceIDUsageDescription is only for Face ID authentication and is not the right purpose string for generic camera face analysis.'
  common_mistake: |
    **The Pitfall:** Assuming that because data never leaves the device, it is exempt from privacy declarations.
    **The Rationale:** Developers often equate "privacy-preserving on-device ML" with "no privacy policy needed," ignoring platform-specific regulations regarding biometric data.
    **The Consequence:** App Store rejection, causing a 3-5 day launch delay and potential PR damage.
  napkin_math: |
    **Assumptions & Constraints:**
    - Privacy Nutrition Label + NSCameraUsageDescription setup takes 35 mins.
    - Rejection penalty takes 3-5 days.

    **Calculations:**
    - 35 minutes vs 3-5 days of launch delay.

    **Conclusion & Interpretation:**
    - **Result: 35 minutes (Compliance-Bound)**. Prevents 3-5 days delay.
  options:
    - Apple treats face-derived age estimation as sensitive face/biometric data regardless of processing location. Fix camera capture with NSCameraUsageDescription, disclose face/biometric processing in App Privacy details as applicable, and use an accurate permission flow. NSFaceIDUsageDescription is only for Face ID authentication.
    - We don't collect face data — the model runs on-device, so there's no privacy issue. Apple's privacy framework doesn't distinguish between on-device processing and server-side collection for certain sensitive data categories.
    - The bottleneck is in the software framework, not the hardware; switching to a lower-level API will achieve near-theoretical-peak performance.
    - Deploy the update to all devices simultaneously to minimize the total rollout duration and reduce the window of version inconsistency.
