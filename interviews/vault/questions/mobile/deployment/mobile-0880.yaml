title: Explaining Model Routing Tradeoffs in Compound AI to a Product Manager
scenario: A product manager on an app powered by a mobile SoC asks why we cannot always use the best, most powerful model for every request.
question: Why can't we just always use the best, most powerful model for every request on a mobile device?
details:
  realistic_solution: 'Concrete tradeoffs: (1) Battery: 3B LLM at 12W for 200ms/query = 2.4J. At 100 queries/day: 240J = 0.067Wh. Heavy users do 500 queries/day: 1200J = 2.25% battery. Simple queries (spell check, autocomplete) via 125M model at 3W * 15ms = 0.045J \u2014 53x cheaper. (2) Latency: 3B model: 200ms. 125M model: 15ms. Users perceive < 100ms as instant. Routing 60% of queries to fast model: average latency = 0.6*15 + 0.4*200 = 89ms \u2014 under instant threshold. Always 3B: 200ms. (3) Thermal: sustained 3B usage triggers throttle in 90s.'
  common_mistake: |
    **The Pitfall:** Explaining routing purely in abstract quality terms.
    **The Rationale:** Candidates state "bigger models are slower" without providing concrete latency, battery, and thermal numbers.
    **The Consequence:** Failing to give product managers the tangible data they need to make informed UX and feature tradeoff decisions.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3B Model: 200ms/query, 12W active.
    - 125M Model: 15ms/query, 3W active.
    - Routing Split: 60% small, 40% large.

    **Calculations:**
    - Latency (Routed): 0.6 * 15ms + 0.4 * 200ms = 89ms (vs 200ms always).
    - Energy (3B): 12W * 0.2s = 2.4 Joules.
    - Energy (Routed): 0.6 * (3W * 0.015s) + 0.4 * 2.4J = 0.027J + 0.96J = 0.987 Joules.

    **Conclusion & Interpretation:**
    - **Result: Energy and Latency-Bound.** Routing yields a sub-100ms average perception and saves 59% battery energy.
