title: 'MLOps Lifecycle: End-to-End Mobile ML Platform Design for Consumer App'
scenario: 'Design the complete MLOps lifecycle for a consumer photo app with 50M users (70% iOS A-series, 30% Android Snapdragon). Requirements: A/B test new models on 1% of users, personalized models per user segment (5 segments), and < 1-week deployment cycle.'
question: What storage, bandwidth, and engineering overhead come from 10 variants of a 30 MB photo model for 50M users?
details:
  realistic_solution: 'The direct artifact overhead is 5 user segments × 2 platform targets = 10 variants, so the current model set is 10 × 30MB = 300MB. If the platform retains 5 production rollback versions, repository storage is 10 × 30MB × 5 = 1.5GB, still small. Bandwidth should be framed as notional transfer exposure, not expected simultaneous delivery: a worst-case full-fleet refresh of one 30MB artifact to 50M devices is 1.5PB before CDN caching and differential updates; an A/B test that exposes 1% of users to one extra variant is 500K × 30MB = 15TB. Engineering overhead comes from the derived 5-segment by 2-platform variant matrix: each variant needs conversion, validation, signing, staged rollout, metrics, rollback, and compatibility ownership. A parameterized pipeline keeps this manageable; a manual process scales linearly with variants.'
  common_mistake: |
    **The Pitfall:** Designing a single model deployment pipeline without accounting for platform and user segments.
    **The Rationale:** Candidates overlook the 5 user segments * 2 platform variants = 10 model variants constraint.
    **The Consequence:** Each variant requires separate tracking, evaluation, and deployment, leading to significantly underestimated engineering overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - Variant matrix: 5 user segments * 2 platform targets = 10 model artifacts (30MB each).
    - Optional retention: 5 rollback versions.
    - 50M users; 1% A/B test = 500K users.
    - CDN Cost: $0.045/GB.

    **Calculations:**
    - Current model storage: 10 variants * 30MB = 300MB.
    - Storage with 5 retained versions: 10 * 30MB * 5 = 1.5GB.
    - Notional worst-case full-fleet transfer for one refreshed artifact sent once to every device: 50M * 30MB = 1.5PB before CDN caching, delta updates, and rollout throttling.
    - 1% A/B test transfer for one extra variant: 500K * 30MB = 15TB.
    - Engineering overhead: the 5 * 2 variant matrix creates 10 artifact/build-validation combinations for conversion, QA, metrics, signing, staged rollout, and rollback; automation should parameterize the matrix instead of creating 10 manual processes.

    **Conclusion & Interpretation:**
    - **Result: Bandwidth- and operations-bound.** Storage is tiny (300MB current, 1.5GB with rollback retention); worst-case user transfer is large (1.5PB for a full-fleet artifact refresh); engineering cost comes from maintaining 10 reliable platform/segment release lanes, not from raw storage.
