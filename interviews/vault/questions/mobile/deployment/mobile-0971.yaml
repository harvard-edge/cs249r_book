title: 'MLOps Lifecycle: End-to-End Mobile ML Platform Design for Consumer App'
scenario: 'Design the complete MLOps lifecycle for a consumer photo app with 50M users (70% iOS A-series, 30% Android Snapdragon). Requirements: A/B test new models on 1% of users, personalized models per user segment (5 segments), and < 1-week deployment cycle.'
question: What storage, bandwidth, and engineering overhead come from 10 variants of a 30 MB photo model for 50M users?
details:
  realistic_solution: 'The direct overhead is 10 variants × 30MB = 300MB for the current model set. If the platform retains 5 production rollback versions, repository storage becomes 10 × 30MB × 5 = 1.5GB, still negligible. Bandwidth is the dominant infrastructure cost: a full fleet rollout of one 30MB artifact to 50M users is 1.5PB, or about $67,500 at $0.045/GB. The 1% A/B test exposes 500K users, so one test variant download is 500K × 30MB = 15TB, or about $675 at the same transfer price. Engineering overhead is operational: 10 variant pipelines need separate conversion, validation, signing, metrics, rollback, and support ownership. A reasonable staffing estimate is 2-3 FTE for platform maintenance, release automation, and incident response.'
  common_mistake: |
    **The Pitfall:** Designing a single model deployment pipeline without accounting for platform and user segments.
    **The Rationale:** Candidates overlook the 5 user segments * 2 platform variants = 10 model variants constraint.
    **The Consequence:** Each variant requires separate tracking, evaluation, and deployment, leading to significantly underestimated engineering overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10 model variants (30MB each).
    - Optional retention: 5 rollback versions.
    - 50M users; 1% A/B test = 500K users.
    - CDN Cost: $0.045/GB.

    **Calculations:**
    - Current model storage: 10 variants * 30MB = 300MB.
    - Storage with 5 retained versions: 10 * 30MB * 5 = 1.5GB.
    - Full rollout bandwidth for one model artifact: 50M * 30MB = 1.5PB. Cost = $67.5K.
    - 1% A/B test bandwidth for one variant: 500K * 30MB = 15TB. Cost = $675.
    - Engineering overhead: 10 pipelines for build, conversion, QA, metrics, signing, staged rollout, and rollback; estimate 2-3 FTE depending on automation maturity.

    **Conclusion & Interpretation:**
    - **Result: Bandwidth- and operations-bound.** Storage is tiny (300MB current, 1.5GB with rollback retention); rollout bandwidth is large (1.5PB for a full-fleet artifact rollout); engineering cost comes from maintaining 10 reliable release pipelines, not from raw storage.
