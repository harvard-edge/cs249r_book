title: The Conversion Cliff
scenario: You trained a PyTorch model with a custom GELU activation and grouped query
  attention. You convert it to CoreML for iPhone deployment. The conversion succeeds
  with no errors, but on-device accuracy is significantly worse than your PyTorch
  baseline.
question: What went wrong during the seemingly successful PyTorch to CoreML conversion?
details:
  realistic_solution: 'Silent operator approximation. CoreML (and TFLite) converters
    handle unsupported ops by substituting approximate implementations. GELU might
    be replaced with a sigmoid-based approximation (`x * sigmoid(1.702 * x)`) instead
    of the exact erf-based version your model was trained with. Grouped query attention
    may be decomposed into a sequence of reshapes and standard attention ops that
    introduces numerical drift. The conversion "succeeds" because the graph is structurally
    valid, but the mathematical behavior has shifted. The fix: always run a numerical
    comparison (max absolute error, cosine similarity) between the original and converted
    model on a reference dataset *before* deployment.'
  common_mistake: '**The Pitfall:** Blaming precision quantization for structural
    graph changes.

    **The Rationale:** Developers immediately assume that the conversion quantized
    the model to INT8, even if the model remained in FP16.

    **The Consequence:** They waste time auditing precision constraints instead of
    realizing that the converter silently swapped unsupported exact ops for approximate
    ones.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - Custom activation: Exact GELU.\n\
    \   - CoreML conversion: Silently falls back to approximate sigmoid implementations\
    \ for unsupported ops.\n2. **Calculations:**\n   - Approximation Error = Exact\
    \ GELU vs Approximate GELU yields ~0.004 max absolute error at x = -1.5.\n   -\
    \ Cumulative Error Factor = 0.004 compounded across millions of activations in\
    \ 24+ layers.\n3. **Conclusion & Interpretation:**\n   **Result: Precision-Bound\
    \ Drift. This tiny per-activation mathematical drift fundamentally shifts the\
    \ network output, resulting in a severe accuracy drop without runtime warnings.**\n"
