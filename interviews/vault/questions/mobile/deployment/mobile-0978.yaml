title: 'Model Format Conversion: Compare INT8 vs. INT4 CoreML Quantization on A17 Pro'
scenario: A 1B-parameter LLM is being prepared for on-device deployment on A17 Pro (35 TOPS Neural Engine, 8GB). CoreML supports both INT8 (8 bits per weight) and INT4 (4 bits per weight) weight compression.
question: How would you compare model size, inference latency, and accuracy for a 50-token generation task?
details:
  realistic_solution: 'INT8: 1B × 1 byte = 1GB model. INT4: 1B × 0.5 bytes = 500MB model. Decode BW-limited: INT8 bandwidth = 1GB/token. INT4 = 500MB/token. Neural Engine eff BW ~68 GB/s. INT8: 1/68 = 14.7ms/token. INT4: 0.5/68 = 7.35ms/token. Accuracy: INT4 PTQ causes ~1-2% accuracy drop on benchmarks vs INT8. For 50 tokens: INT8 735ms, INT4 367ms. INT4 2× faster, fits 500MB in 8GB with more headroom for KV cache.'
  common_mistake: |
    **The Pitfall:** Assuming INT4 is exactly 2× faster than INT8 overall.
    **The Rationale:** Candidates ignore the fact that the Neural Engine may dequantize INT4 to INT8 before compute.
    **The Consequence:** Memory savings are real, but compute latency savings may be slightly smaller than a pure 2x linear extrapolation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 1B parameters. Generation length: 50 tokens.
    - A17 Pro Neural Engine bandwidth: 68 GB/s.
    - INT8 size: 1GB; INT4 size: 500MB.

    **Calculations:**
    - Decode INT8: 1 GB / 68 GB/s = 14.7 ms/tok -> 735 ms for 50 tokens.
    - Decode INT4: 0.5 GB / 68 GB/s = 7.35 ms/tok -> 367 ms for 50 tokens.
    - KV cache at 50 tokens: ~20 MB.

    **Conclusion & Interpretation:**
    - **Result: 367 ms latency for INT4 (Memory Bandwidth-Bound).** INT4 halves generation time and memory footprint.
