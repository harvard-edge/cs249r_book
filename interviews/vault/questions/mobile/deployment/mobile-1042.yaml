title: 'Mobile TCO Fluency: Quick Battery Cost Estimation for Mobile ML'
scenario: A mobile SoC executes several ML workloads daily, including 50 LLM queries at 100 tokens/query running 20 tok/s at 4W, 100 real-time speech recognition sessions at 1W for 30sec each, and 10 image generations at 8W for 30sec each.
question: What annual energy cost and battery-cycle impact do the mobile ML workloads create?
details:
  realistic_solution: 'Calculate total daily energy consumption in Joules, convert to Wh, and extrapolate annually. Compare this to the battery capacity to find the extra charge cycles. The absolute electricity cost is negligible, but battery degradation cycles constitute the true system constraint.'
  common_mistake: |
    **The Pitfall:** Forgetting to convert from Wh to kWh before applying electricity rates.
    **The Rationale:** Candidates perform calculations in Wh and directly apply $/kWh rates, inflating costs astronomically.
    **The Consequence:** Overestimating electricity costs by a factor of 1000 and missing the true bottleneck (battery degradation cycles).
  napkin_math: |
    **Assumptions & Constraints:**
    - LLM: 50 queries * 100 tokens @ 20 tok/s = 5s/query at 4W.
    - ASR: 100 sessions * 30s/session at 1W.
    - GenAI: 10 images * 30s/image at 8W.
    - Battery Capacity: 5000 mAh @ 3.7V = 18.5 Wh.

    **Calculations:**
    - LLM Energy: 50 * 5s * 4W = 1000 J = 0.277 Wh.
    - ASR Energy: 100 * 30s * 1W = 3000 J = 0.833 Wh.
    - GenAI Energy: 10 * 30s * 8W = 2400 J = 0.667 Wh.
    - Total Annual Energy: (0.277 + 0.833 + 0.667) * 365 = 648.6 Wh/yr.
    - Battery Impact: 648.6 Wh / 18.5 Wh = 35.06 cycles/yr.

    **Conclusion & Interpretation:**
    - **Result: 35 extra battery cycles/year (Power-Bound)**. The absolute cost of electricity is negligible, but the thermal output and battery degradation cycles are the true system-level constraints.
