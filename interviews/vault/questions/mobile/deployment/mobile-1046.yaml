title: 'Mobile TCO Optimization: Reduce Battery Drain for Intensive Mobile ML'
scenario: A mobile navigation app runs a continuous pedestrian detection model on A17 Pro (3W for inference) at 10 FPS while driving for 8 hours. The battery provides 3349mAh at 3.8V (12.7Wh).
question: How would you quantify the TCO impact for 1M daily active users in electricity terms while reducing battery drain?
details:
  realistic_solution: |
    Continuous 10 FPS inference uses 3W * 8h = 24Wh per user, which exceeds the 12.7Wh battery and would consume 24,000kWh/day across 1M DAU. At $0.15/kWh, that fleet charging energy is about $3,600/day, or $1.31M/year.

    A coherent reduced-drain model is: keep an acoustic trigger at 0.1W and run vision at 1 FPS proportional to the 10 FPS power, so vision baseline is 0.3W. Baseline power is 0.4W for 8h = 3.2Wh. During 100 pedestrian events, spike from 1 FPS to 10 FPS for 10s each; the incremental spike power is 3.0W - 0.3W = 2.7W, so spike energy is 2.7W * 1000s = 2700J = 0.75Wh. Total optimized energy is 3.95Wh/user/day, or 3,950kWh/day for 1M DAU. At $0.15/kWh, that is about $593/day or $216K/year, saving roughly $1.10M/year in user charging electricity versus continuous 10 FPS.
  common_mistake: |
    **The Pitfall:** Overlooking the physical limits of device battery capacity.
    **The Rationale:** Engineers often calculate power efficiency without checking if the total energy consumed exceeds the total battery capacity.
    **The Consequence:** A design that mathematically drains the entire phone battery in a fraction of the required runtime, making the app unusable.
  napkin_math: |
    **Assumptions & Constraints:**
    - Mobile battery: 12.7Wh.
    - 8-hour drive.
    - 10 FPS continuous consumes 3W; 1 FPS vision consumes 0.3W by proportional scaling.
    - Acoustic trigger consumes 0.1W.
    - Spikes to 10 FPS for 10 seconds per pedestrian event (100 events).
    - Electricity price assumption: $0.15/kWh.

    **Calculations:**
    - Continuous 10 FPS energy: 3W * 8hr = 24Wh (exceeds 12.7Wh battery).
    - Proposed baseline energy: (0.3W vision + 0.1W acoustic) * 8hr = 3.2Wh (25.2% of battery).
    - Incremental spike energy: 100 * 10s * (3.0W - 0.3W) = 2700 Joules = 0.75Wh.
    - Total optimized energy: 3.2Wh + 0.75Wh = 3.95Wh (31.1% of battery).
    - Fleet daily optimized energy: 3.95Wh * 1,000,000 users = 3,950 kWh/day.
    - Fleet daily continuous energy: 24Wh * 1,000,000 users = 24,000 kWh/day.
    - Continuous electricity TCO: 24,000 kWh/day * $0.15 = $3,600/day = ~$1.31M/year.
    - Optimized electricity TCO: 3,950 kWh/day * $0.15 = $592.50/day = ~$216K/year.
    - Annual electricity savings: ~$1.31M - ~$216K = ~$1.10M/year.

    **Conclusion & Interpretation:**
    - **Result: 3.95Wh per user and 3,950kWh/day for 1M DAU.** The optimized design keeps battery use feasible and reduces fleet charging electricity from about $1.31M/year to about $216K/year at $0.15/kWh.
