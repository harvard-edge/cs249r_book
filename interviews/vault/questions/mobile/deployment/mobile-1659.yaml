title: Mobile NPU Deployment for a PyTorch Object Detector
scenario: Your team developed a large-scale object detection model trained in PyTorch. You are tasked with deploying this model on a flagship mobile device, leveraging its NPU. The strict performance target is 30 FPS inference with an average latency under 30ms for 1080p input frames.
question: How would you convert, optimize, and validate a PyTorch object detector for 30 FPS on a mobile NPU?
details:
  realistic_solution: |
    Use one target stack and validate it on the actual device. For Android, export the PyTorch model through ONNX only if it is the supported path for the chosen runtime, then convert to the runtime format such as TFLite with the NNAPI delegate or a vendor SDK package. Check operator coverage before conversion, especially resize, NMS, attention-like blocks, and custom post-processing, and rewrite unsupported ops so they do not fall back to CPU. Calibrate representative 1080p inputs for INT8 PTQ or use QAT if accuracy drops. Then benchmark end-to-end latency on device with runtime tooling such as TFLite Benchmark Tool, Android Perfetto, vendor SDK profilers, thermal logs, and battery telemetry. The release decision should be based on P50/P95 latency, delegate placement, memory movement, post-processing time, and sustained 30 FPS under thermal load, not on successful file conversion alone.
  common_mistake: |
    **The Pitfall:** Attempting a direct, 'one-shot' conversion of the PyTorch model to TFLite or ONNX.
    **The Rationale:** Candidates assume automatic converters will perfectly optimize for specific NPUs without prior profiling.
    **The Consequence:** This leads to critical operators falling back to the CPU, suboptimal quantization, and failure to meet latency requirements.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 30 FPS (33.3 ms/frame budget). SLA Target: < 30 ms.
    - Example model compute: 10 GOPs per 1080p frame.
    - Example sustained NPU throughput after delegation and quantization: 1 TOPS, not peak marketing TOPS.

    **Calculations:**
    - NPU compute time estimate = 10 GOPs / 1,000 GOPs/sec = 10 ms.
    - Remaining budget for camera/input resize, memory copies, CPU post-processing, scheduling, and output handling = 30 ms - 10 ms = 20 ms.
    - If one unsupported op adds a 12 ms CPU fallback and post-processing adds 7 ms, end-to-end latency becomes 10 + 12 + 7 = 29 ms before other app overhead.

    **Conclusion & Interpretation:**
    - **Result: End-to-end validation required.** The raw NPU compute may fit the 30 ms SLA, but operator fallback, memory copies, post-processing, and thermal throttling can consume the budget. Validation must measure the complete device pipeline and confirm all heavy ops stay on the intended accelerator.
