title: The Model Rollback Nightmare
scenario: You pushed a new on-device food recognition model to 100% of users. Within
  2 hours, your telemetry shows a 40% spike in 'no detection' events on Samsung Galaxy
  S21 devices running Android 13. Other devices are fine.
question: How do you roll back only Samsung Galaxy S21 Android 13 users after a 40%
  no-detection spike?
details:
  realistic_solution: Execute a highly targeted rollback using dynamic model manifest
    overrides. Update the routing rules engine to force Galaxy S21 Android 13 devices
    to fetch the previous manifest schema while maintaining the deployment for the
    remaining 97% of the fleet. This mitigates the immediate delegate bug (typically
    a hardware-specific NNAPI compiler failure) while securing the revenue/engagement
    lift on the healthy devices.
  common_mistake: '**The Pitfall:** Triggering a blunt, global rollback to the previous
    model version across the entire user base.

    **The Rationale:** Engineers panic upon seeing a spike in errors and pull the
    simplest emergency lever available.

    **The Consequence:** This severely punishes the 97% of users whose devices are
    executing flawlessly, immediately destroying the aggregate real-world engagement
    improvements generated by the new model.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Affected population: Galaxy S21 on Android 13 (~3% of users).

    - Model engagement lift: 8% overall.

    - Rollback mechanisms: Global vs. Targeted Manifest.


    **Calculations:**

    - Global rollback cost: 97% of users lose the 8% lift (0% net lift).

    - Targeted rollback cost: Only 3% of users revert.

    - Net retained engagement: 97% * 8% = 7.76% overall lift maintained.


    **Conclusion & Interpretation:**

    - **Result: System-Bound**. Applying targeted device-segment rollbacks fundamentally
    salvages the massive engagement gains for the healthy fleet while isolating the
    hardware-specific compiler bug.

    '
