title: 'Mobile TCO Evaluation: On-Device vs Cloud for Photo Enhancement App'
scenario: A photo enhancement app uses Stable Diffusion v1.5-class components in FP16, with about 1B parameters and roughly 2GB of weights before activations and runtime buffers. The user generates 5 images per day. You are comparing on-device generation (Snapdragon 8 Gen 3, 16GB, 8W) against a cloud image API ($0.01/image).
question: 'For SD v1.5 at 5 images/day, which is cheaper over two years: on-device or a $0.01 cloud API, and where is break-even?'
details:
  realistic_solution: |
    Excluding any phone purchase or model-porting cost, on-device is cheaper on marginal runtime cost. One image uses 8W * 30s = 240J = 0.0667Wh. At an explicit electricity assumption of $0.15/kWh, charging energy costs about $0.000010/image. Battery wear is larger: with an 18.5Wh battery and $69/500 cycles, wear costs $0.138 per full cycle, or $0.00746/Wh. That adds 0.0667Wh * $0.00746 = $0.00050/image. Total marginal on-device cost is about $0.00051/image versus $0.01/image for cloud.

    Over two years at 5 images/day, volume is 3650 images. Cloud costs $36.50. On-device marginal TCO is about 3650 * $0.00051 = $1.85, so on-device is cheaper by about $34.65 if hardware is already owned. If there is an added device or engineering amortization cost H, the break-even image count is H / ($0.01 - $0.00051). At this usage over two years, on-device remains cheaper only if H is below about $34.65 per user.
  common_mistake: |
    **The Pitfall:** Failing to verify if the model actually fits in device memory before doing cost analysis.
    **The Rationale:** SD v1.5-class FP16 weights are roughly 2GB before activations, VAE/CLIP/runtime buffers, and allocator overhead. Peak memory can still be several gigabytes, so fit must be checked before cost.
    **The Consequence:** Recommending a cheaper on-device deployment architecture that is technically impossible to run on standard hardware.
  napkin_math: |
    **Assumptions & Constraints:**
    - On-device energy: 8W for 30s per image. Volume: 5 images/day for 2 years.
    - Cloud Cost: $0.01 per image.
    - Battery Wear Cost: $69 replacement / 500 cycles = $0.138/cycle. Battery capacity: 18.5Wh.
    - Electricity price assumption: $0.15/kWh.

    **Calculations:**
    - On-device Energy per image: 8W * 30s = 240J = 0.067Wh.
    - Electricity cost per image: 0.067Wh * $0.15/kWh = ~$0.000010.
    - Battery wear per image: (0.067Wh / 18.5Wh) * $0.138 = ~$0.00050.
    - On-device marginal cost per image: ~$0.00051.
    - Two-year volume: 5 * 365 * 2 = 3650 images.
    - Two-year cloud cost: 3650 * $0.01 = $36.50.
    - Two-year on-device marginal TCO: 3650 * $0.00051 = ~$1.85.
    - Break-even fixed cost per user at this usage: $36.50 - $1.85 = ~$34.65.

    **Conclusion & Interpretation:**
    - **Result: ~$1.85 on-device vs $36.50 cloud over two years.** On-device wins on marginal TCO once hardware is owned. With added amortized hardware or porting cost, break-even is H / $0.00949 images, or about $34.65 of fixed cost per user at 5 images/day for two years.
