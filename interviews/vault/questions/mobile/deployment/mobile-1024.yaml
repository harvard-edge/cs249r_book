title: 'Model Format Conversion: Realize Multi-Format Model Storage for Cross-Platform iOS+Android'
scenario: 'A cross-platform app supports iOS (CoreML FP16) and Android (TFLite INT8) for 3 models: image classifier (10M), object detector (25M), text embedding (50M). There are 50M installs (60% iOS, 40% Android).'
question: What is the CDN delivery cost for 50M total installs of multi-format models, and how much does delta updating save?
details:
  realistic_solution: |
    iOS FP16: (10+25+50)M × 2B = 170MB CoreML bundle. Android INT8: 85M × 1B = 85MB TFLite. Server registry: 170+85+85MB(ONNX source) = 340MB. CDN: iOS 30M users × 170MB = 5.1PB. Android 20M × 85MB = 1.7PB. Total: 6.8PB × $0.045/GB = $306,000 per full rollout. With delta updates (assume 20MB avg change): iOS 30M × 20MB + Android 20M × 10MB = 0.8PB → $36,000. Delta saves $270K per update cycle.
  common_mistake: |
    **The Pitfall:** Computing storage for 6 distinct format variants on the server.
    **The Rationale:** Failing to note that iOS and Android can share the source ONNX registry, only differing in the final compiled outputs delivered via CDN.
    **The Consequence:** Massively overestimating server registry size or failing to optimize the multi-million dollar CDN delivery strategy.
  napkin_math: |
    **Assumptions & Constraints:**
    - Models: 10M + 25M + 50M = 85M total parameters.
    - iOS Formats (FP16): 2 bytes/param (170 MB). Users: 30M (60%).
    - Android Formats (INT8): 1 byte/param (85 MB). Users: 20M (40%).
    - CDN Cost: $0.045 / GB.

    **Calculations:**
    - Full iOS Rollout: 30M * 170 MB = 5.1 PB.
    - Full Android Rollout: 20M * 85 MB = 1.7 PB.
    - Total Full Rollout Cost: 6.8 PB * $0.045/GB = $306,000.
    - Delta Rollout Cost (20MB iOS, 10MB Android avg): (30M * 20MB + 20M * 10MB) = 800 TB * $0.045/GB = $36,000.

    **Conclusion & Interpretation:**
    - **Result: $36,000 (Network-Bound)**. Delta updates reduce the CDN bill from $306,000 to $36,000 per release cycle.
