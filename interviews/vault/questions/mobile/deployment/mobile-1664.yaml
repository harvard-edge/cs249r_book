title: 'Optimizing ML Model Rollouts on Mobile NPUs for a Mobile Application'
scenario: 'You are leading the ML engineering team for a popular mobile application running on iOS devices. A new, more complex ML model has been developed to improve a core user-facing feature. This model is computationally intensive and designed to leverage the mobile Neural Engine.'
question: 'How would you design a comprehensive A/B and rollout strategy for this new model, considering the unique constraints and opportunities presented by on-device inference?'
details:
  realistic_solution: 'A realistic solution involves a phased rollout utilizing canary deployments and progressive rollouts. Deploy initially to an internal testing group. Once stable, target a small percentage (1-5%) with a canary release, carefully monitoring inference latency, CPU/NPU utilization via nsys-equivalent iOS telemetry, battery consumption, and crash rates. Route a fraction of users to the new model, potentially allowing a shadow deployment. Gradually increase the rollout to larger cohorts, segmenting by device generation. A robust rollback mechanism allows immediate reversion if issues arise.'
  common_mistake: |
    **The Pitfall:** A 'big bang' rollout to all users simultaneously without a robust monitoring and rollback plan.
    **The Rationale:** Candidates overlook the risks of varying hardware capabilities and on-device resource constraints (battery, thermal).
    **The Consequence:** Critical performance degradation or crashes on specific device generations, leading to poor user experience.
  napkin_math: |
    **Assumptions & Constraints:**
    - New model consumes an additional 0.5W on the Neural Engine.
    - 30 minutes of daily interaction.
    - Standard battery is 15 Wh.

    **Calculations:**
    - 0.5W * 0.5h = 0.25 Wh additional battery consumption.
    - 0.25 Wh / 15 Wh = ~1.7% increase in daily battery drain.

    **Conclusion & Interpretation:**
    - **Result: 1.7% Increase (Power-Bound)**. If 1% of users receive the model and 0.1% experience severe issues, a rollback protects the remaining 99.999% of the user base.
