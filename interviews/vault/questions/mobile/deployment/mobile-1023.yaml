title: 'Model Format Conversion: Optimize INT8 to INT4 Conversion for Android LLM'
scenario: 'A 3B INT8 LLM (3GB) is being converted to INT4 (1.5GB) for mobile deployment. Post-conversion evaluation shows 3.2% MMLU degradation (target: <2%).'
question: 'How would you diagnose which quantization approach to use and quantify the accuracy-size tradeoff?'
details:
  realistic_solution: 'Uniform INT4: MMLU -3.2%. Fix: mixed precision — keep embedding + LM head in INT8 (preserves accuracy, adds little memory). Embedding: 32000x3072x1B=98.3MB INT8 vs 49.15MB INT4. LM head: same 98.3MB. Keeping both in INT8 adds ~98.3MB over uniform INT4. Model: 1.5GB (uniform INT4) + 0.0983GB (extra for INT8) ≈ 1.598GB. Use GPTQ with block quantization (group size=128): typically 0.5-1% better MMLU vs naive INT4. Expected: -1.8% MMLU (under 2% target). Final size: 1.6GB (vs 1.5GB naive). TPOT: 1.6/77=20.8ms vs 19.5ms naive.'
  common_mistake: |
    **The Pitfall:** Applying uniform INT4 quantization equally across all model layers.
    **The Rationale:** Engineers apply blanket quantization without analyzing layer-specific sensitivity to precision loss.
    **The Consequence:** The most sensitive layers (embeddings, LM head) lose critical precision, pushing the accuracy degradation past the acceptable 2% threshold.
  napkin_math: |
    **Assumptions & Constraints:**
    - Embedding Layer: 32000 x 3072.
    - Target Accuracy Degradation: < 2% MMLU.
    - Bandwidth: 77 GB/s.

    **Calculations:**
    - Embedding Size (INT8): 32000 * 3072 * 1 byte = 98.3 MB.
    - LM Head Size (INT8): 98.3 MB.
    - Mixed Precision Model Size: 1.4 GB (INT4 body) + 0.196 GB (INT8 heads) = 1.596 GB.
    - TPOT: 1.596 GB / 77 GB/s = 20.7 ms (vs 19.5 ms for naive INT4).

    **Conclusion & Interpretation:**
    - **Result: 1.596 GB (Memory-Bound)**. Mixed precision achieves memory reduction while recovering accuracy at the cost of only 1.2ms additional latency per token.
