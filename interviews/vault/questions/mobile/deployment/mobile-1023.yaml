title: 'Model Format Conversion: Optimize INT8 to INT4 Conversion for Android LLM'
scenario: 'A 3B INT8 LLM (3GB) is being converted to INT4 (1.5GB) for mobile deployment. Post-conversion evaluation shows 3.2% MMLU degradation (target: <2%).'
question: How would you diagnose which quantization approach to use and quantify the accuracy-size tradeoff?
details:
  realistic_solution: 'Diagnose by running layer-wise sensitivity tests, not by guessing one format. Start with uniform INT4 as the baseline: size 1.5GB, MMLU degradation 3.2%, which fails the <2% target. Then test candidates that restore precision only where sensitivity is high: embeddings in INT8, LM head in INT8, selected outlier MLP/attention blocks in INT8, and GPTQ/AWQ-style grouped INT4. For the embedding and LM head candidate, each matrix is 32000×3072 parameters: INT8 size is 98.3MB and INT4 size is 49.15MB, so keeping one matrix in INT8 adds 49.15MB over uniform INT4. Keeping both in INT8 adds 98.3MB total. Final size is 1.5GB + 0.098GB = 1.598GB. If validation shows grouped INT4 plus INT8 embedding/head reduces degradation to about 1.8%, it meets the accuracy target with a 6.6% size increase over uniform INT4. The simplified bandwidth-bound TPOT estimate is 1.598GB/77GB/s = 20.8ms versus 1.5GB/77GB/s = 19.5ms, an added 1.3ms/token.'
  common_mistake: |
    **The Pitfall:** Applying uniform INT4 quantization equally across all model layers.
    **The Rationale:** Engineers apply blanket quantization without analyzing layer-specific sensitivity to precision loss.
    **The Consequence:** The most sensitive layers (embeddings, LM head) lose critical precision, pushing the accuracy degradation past the acceptable 2% threshold.
  napkin_math: |
    **Assumptions & Constraints:**
    - Embedding Layer: 32000 x 3072.
    - Uniform INT4 baseline size: 1.5 GB with 3.2% MMLU degradation.
    - Target Accuracy Degradation: < 2% MMLU.
    - Bandwidth: 77 GB/s.

    **Calculations:**
    - Embedding Size (INT8): 32000 * 3072 * 1 byte = 98.3 MB.
    - Embedding Size (INT4): 32000 * 3072 * 0.5 byte = 49.15 MB.
    - LM Head Size (INT8): 98.3 MB.
    - LM Head Size (INT4): 49.15 MB.
    - Extra size for keeping both in INT8: (98.3 - 49.15) * 2 = 98.3 MB = 0.098 GB.
    - Mixed Precision Model Size: 1.5 GB + 0.098 GB = 1.598 GB.
    - Uniform INT4 TPOT estimate: 1.5 GB / 77 GB/s = 19.5 ms.
    - Mixed Precision TPOT estimate: 1.598 GB / 77 GB/s = 20.8 ms.
    - Latency delta: 20.8 - 19.5 = 1.3 ms.

    **Conclusion & Interpretation:**
    - **Result: 1.598 GB mixed precision candidate.** Use layer-wise sensitivity and validation to confirm it meets the <2% MMLU degradation target; the size cost is about 98MB and the simplified bandwidth-bound latency cost is about 1.3ms/token.
