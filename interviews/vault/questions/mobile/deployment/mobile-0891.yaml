title: Realizing On-Device Agent State Persistence Across App Backgrounding on Snapdragon 8 Gen 3
scenario: A mobile agentic app loses its multi-step task state when the user switches apps. The agent maintains conversational history, tool results, and FAISS queries.
question: How should an Android agent persist lightweight state so it can resume within 500ms after backgrounding without saving the entire KV cache?
details:
  realistic_solution: 'Serialize only the lightweight state: task plan, history, tool results, and queries to SharedPreferences or Room DB. Do not persist the full KV cache. On resume, read the lightweight state and rebuild the KV cache by running a fast prefill over a summarized conversational context.'
  common_mistake: |
    **The Pitfall:** Serializing the full agent state, including the massive KV cache, to disk on every background event.
    **The Rationale:** Teams try to save all state to avoid prompt re-evaluation, not realizing the I/O cost.
    **The Consequence:** Saving a 50MB+ KV cache causes massive write delays, lagging the background transition and risking data corruption if killed mid-write.
  napkin_math: |
    **Assumptions & Constraints:**
    - State Payload: Plan (2KB) + Chat (16KB) + Tools (50KB) + FAISS (15.4KB) = 83.4 KB.
    - NVMe Speed: 3 GB/s.
    - NPU Prefill Compute: 45 TOPS @ 30% utilization.
    - Rebuild Threshold: 500 ms SLA.

    **Calculations:**
    - Disk Read Latency: 83.4 KB / 3 GB/s = 0.028 ms.
    - Full KV Cache Rebuild (4000 tokens): 4000 * 2 * 1B params / (45e12 * 0.3) = ~592 ms.
    - Summarized KV Rebuild (712 tokens): 712 * 2 * 1B params / (45e12 * 0.3) = ~105 ms.
    - Total Resume Time: 0.028 ms + 105 ms + 50 ms (warm-up) = 155 ms.

    **Conclusion & Interpretation:**
    - **Result: 155 ms resumption time (I/O-Bound vs Compute-Bound)**. Writing the raw KV cache to disk causes I/O stalls, while recalculating the full context causes compute stalls; storing lightweight state and prefilling a summarized context bridges both constraints.
