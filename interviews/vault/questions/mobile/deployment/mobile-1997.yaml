title: Mobile NPU versus GPU Memory Bandwidth Tradeoffs
scenario: An on-device LLM on an iPhone 15 Pro uses the A17 Pro SoC to serve autocomplete requests, dynamically
  switching hardware blocks.
question: Should the A17 Pro Neural Engine or the GPU handle KV cache updates for a 1B parameter INT8
  model to maximize throughput?
details:
  realistic_solution: While the Neural Engine excels at dense INT8 matrix multiplications (offering massive
    compute capacity), token generation for a 1B parameter model is heavily memory-bandwidth bound. Every
    token requires fetching the entire 1 GB model. The GPU's architecture and wider shared memory bus
    provide higher memory bandwidth, making it better suited for the high memory bandwidth demands of
    token generation and shifting cache data.
  common_mistake: '**The Pitfall:** Blindly assigning all LLM tasks to the Neural Engine.


    **The Rationale:** Developers assume the AI accelerator is universally best for all layers of an AI
    workload.


    **The Consequence:** Autoregressive decoding performance tanks because the memory-bound KV cache operations
    stall on the NPU''s internal data paths.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Model size: 1B INT8 params = 1 GB per forward pass.

    - NPU Peak compute: 35 TOPS (35,000 GOPS).

    - Operations per token: ~2 GOPS.

    - System Memory Bandwidth: ~50 GB/s.


    **Calculations:**

    - Compute Limit: 35,000 GOPS / 2 GOPS/tok = 17,500 tok/s.

    - Memory Limit: 50 GB/s / 1 GB/tok = 50 tok/s.


    **Conclusion & Interpretation:**

    - **Result: Memory-Bound.** The system is severely memory-bandwidth bound (~50 tok/s) well before
    reaching the NPU''s compute limit, making the higher-bandwidth GPU preferable.'
