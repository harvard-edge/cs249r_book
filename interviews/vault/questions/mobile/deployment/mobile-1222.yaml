title: Progressive Rollout Design for A17 Pro Neural Engine
scenario: You are designing the rollout strategy for a new real-time video enhancement model targeting the Apple A17 Pro Neural Engine (35 TOPS, ~5W envelope, 8 GB shared memory). The model's behavior under prolonged thermal stress is unknown.
question: How should an A17 Pro progressive rollout test a thermal-heavy video model without exhausting unified memory?
details:
  realistic_solution: |
    Design a client-driven progressive rollout where the device is assigned exclusively to the new model (Variant B). The client application must include a local orchestrator that continuously monitors unified memory pressure, Neural Engine utilization, and thermal states. If the 5W thermal budget is exceeded or memory allocation nears the 8 GB limit, the orchestrator triggers a local fallback.
  common_mistake: |
    **The Pitfall:** Proposing a shadow mode that runs both models simultaneously or relying on server-side fallbacks.
    **The Rationale:** Ignoring the strict 8 GB memory limit and 5W thermal budget of mobile hardware.
    **The Consequence:** Guaranteeing Out-Of-Memory (OOM) crashes and thermal throttling during the A/B test.
  napkin_math: |
    **Assumptions & Constraints:**
    - OS + App memory: ~4.5 GB.
    - Remaining: 3.5 GB.

    **Calculations:**
    - Old model (0.8 GB) + New model (1.2 GB) + 4K buffers (1.5 GB) = 3.5 GB.
    - Margin = 0 GB (OOM risk).
    - Compute: 30 TOPS draws ~4W of the 5W SoC budget, starving the GPU/CPU.

    **Conclusion & Interpretation:**
    - **Result: Memory-Capacity-Bound**. Running concurrently exceeds memory and thermal limits; requires client-driven exclusive assignment with local fallback.
