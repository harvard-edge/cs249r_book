title: 'MLOps Lifecycle: Size OTA Update Bandwidth for 100M Mobile App Users'
scenario: A mobile app with 100M users (60M iOS, 40M Android) needs a monthly OTA model update. iOS models are 45MB; Android models are 38MB. Assume 60% of users update within 1 week of release.
question: What monthly OTA model update bandwidth and CDN cost result for 100M users, and how much can delta updates save?
details:
  realistic_solution: 'iOS: 60M × 45MB = 2.7PB. Android: 40M × 38MB = 1.52PB. Total monthly data: 4.22PB. At a negotiated CDN rate of $0.045/GB, the baseline cost is $189,900/month. Implementing delta compression (producing a ~5MB diff) reduces total data to 500TB, lowering the CDN cost to $22,500/month. This architectural optimization saves $167,400 monthly.'
  common_mistake: |
    **The Pitfall:** Calculating bandwidth by simply multiplying total users by maximum model size without delta compression.
    **The Rationale:** Candidates ignore MLOps payload reduction techniques common in mobile deployments.
    **The Consequence:** This leads to massively over-provisioned infrastructure budgets and missing out on $1.6M+ in annual savings.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - iOS Base: 60M users * 45MB.
       - Android Base: 40M users * 38MB.
       - CDN Cost: $0.045/GB.
       - Delta Diff: 5MB for all users.
    2. **Calculations:**
       - Total Base Data: (60M * 45MB) + (40M * 38MB) = 2,700TB + 1,520TB = 4,220TB (4.22PB).
       - Full Update Cost: 4,220,000 GB * $0.045/GB = $189,900/month.
       - Delta Compression Data: 100M users * 5MB = 500TB.
       - Delta Update Cost: 500,000 GB * $0.045/GB = $22,500/month.
       - Savings: $189,900 - $22,500 = $167,400/month.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound.** Delta compression yields a massive 88% cost reduction ($167,400/mo), proving essential for sustainable mobile MLOps.
