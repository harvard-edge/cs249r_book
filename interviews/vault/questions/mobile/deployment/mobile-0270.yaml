title: The OTA Update Budget (mobile-0270)
scenario: You are shipping updates to an on-device translation model. A new 70 million parameter FP16 model is ready. However, the over-the-air (OTA) update system has a strict payload limit of 100 MB to avoid excessive cellular data costs for users.
question: Can a 70M-parameter FP16 translation model fit a 100 MB OTA limit, and what quantized alternative should ship?
details:
  realistic_solution: The new 70M parameter FP16 model cannot be shipped as-is because its storage footprint exceeds the 100 MB limit. The architecturally sound approach is to perform Post-Training Quantization (PTQ) to INT8, effectively halving the payload size to comfortably fit the OTA budget.
  common_mistake: |
    **The Pitfall:** Confusing byte representations for different precisions.
    **The Rationale:** Candidates often forget that FP16 requires 2 bytes per parameter, incorrectly assuming 1 byte (like INT8).
    **The Consequence:** They miscalculate the model's storage footprint and wrongly conclude that the 140 MB FP16 model will fit within the 100 MB OTA budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Parameters: 70M.
    - OTA Limit: 100 MB.
    - Precisions: FP16 (2 bytes/param), INT8 (1 byte/param).

    **Calculations:**
    - Original FP16 Model Size: 70M * 2 bytes = 140 MB (Fails 100 MB limit).
    - Quantized INT8 Model Size: 70M * 1 byte = 70 MB.

    **Conclusion & Interpretation:**
    - **Result: 70 MB (Storage-Bound)**. The INT8 model is storage-bound safely under the 100 MB threshold.
  options:
  - The new FP16 model is 70 MB, so it fits within the 100 MB budget.
  - The new FP16 model is 280 MB, so it is far too large to ship.
  - The new FP16 model is 140 MB and won't fit, but an INT8 version would be 70 MB and does fit.
  - The new model adds 20M parameters, which is 40 MB, so it fits easily.
  correct_index: 2
