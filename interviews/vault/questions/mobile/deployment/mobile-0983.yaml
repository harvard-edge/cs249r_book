title: 'Model Format Conversion: Size ONNX vs. TFLite Model Storage for Mobile App'
scenario: A mobile app includes 3 ML models. (1) face detection (MobileNet-SSD, 6.8M params), (2) emotion recognition (SqueezeNet, 1.2M params), (3) background segmentation (DeepLab-MobileNet, 5.9M params).
question: How large are the bundled ONNX FP32 and TFLite INT8 model variants, and do they fit under the 200MB app limit?
details:
  realistic_solution: 'Converting to TFLite INT8 maximizes CDN savings. The base models total 13.9M parameters. While ONNX FP32 takes ~61MB and TFLite INT8 takes ~15MB (both easily fitting the 200MB limit), the INT8 payload delivers a 4x reduction in payload size, optimizing network delivery and lowering operational CDN costs at scale.'
  common_mistake: |
    **The Pitfall:** Computing model size as params × bytes without accounting for format overhead.
    **The Rationale:** Candidates forget that formats like ONNX include prototxt and metadata, which add ~10-15% to raw weight size.
    **The Consequence:** Underestimating final payload sizes and overall CDN ingress costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Parameters: 6.8M + 1.2M + 5.9M = 13.9M.
    - Format Overheads: ONNX (+10%), TFLite (+5%).
    - Data Types: FP32 (4 bytes), INT8 (1 byte).
    - App Store Limit: 200 MB.
    - Delivery Volume: 1M installs.

    **Calculations:**
    - ONNX FP32 Size: 13.9M * 4 bytes = 55.6 MB. With 10% overhead = 61.16 MB.
    - TFLite INT8 Size: 13.9M * 1 byte = 13.9 MB. With 5% overhead = 14.60 MB.
    - CDN Savings per Install: 61.16 MB - 14.60 MB = 46.56 MB.
    - Total CDN Savings: 1,000,000 * 46.56 MB = 46.56 TB.

    **Conclusion & Interpretation:**
    - **Result: 46.56 TB bandwidth saved (Network-Bandwidth Bound)**. While both formats fit the 200 MB disk limit, INT8 drastically reduces CDN ingress costs and download latency.
