title: LoRA Adapter Compatibility Across Model Version Updates
scenario: A mobile app ships with Phi-3 Mini 3.8B base model v1.0 and user-personalized LoRA adapters.
  The base model is updated to v1.1. 15% of users report the app performs worse after the update. Diagnose
  the adapter-model compatibility issue.
details:
  realistic_solution: 'LoRA adapter compatibility analysis: (1) Shape check: if v1.1 changed MLP hidden
    dimensions or added layers, old adapters will fail with shape mismatch, affecting 100% of users. Since
    only 15% are affected, shapes are compatible. (2) Weight space shift: if v1.1 used different post-training
    quantization or layer normalization changes, the weight distribution shifts. LoRA delta (B*A) is applied
    additively: W_new = W_v1.1 + B_v1.0 * A_v1.0. If B*A was trained to correct for v1.0-specific patterns
    that no longer exist in v1.1, it now applies incorrect corrections. (3) Diagnosis: 15% of users have
    highly personalized adapters (high rank, many training steps) with larger deltas, making them more
    sensitive. (4) Fix: trigger adapter re-validation on model update. Run 10 held-out prompts, compare
    to baseline. If score drops >5%, notify user and offer to reset or retrain from user history.'
  common_mistake: Assuming LoRA adapters trained on model v1.0 are compatible with v1.1 as long as the
    architecture shape is the same. Weight initialization changes, normalization changes, or different
    training data distributions in v1.1 can cause the v1.0 adapter to apply incorrect corrections.
  napkin_math: '15% of users affected = users with high-adaptation adapters. If rank distribution: 70%
    of users have r=2-4 (small delta), 30% have r=8-16 (larger delta). Users with large deltas: 30%, but
    only 50% experience noticeable degradation after v1.1. So 30% * 50% = 15%. LoRA delta magnitude: r=16
    adapter has |B*A|_Frobenius ~0.5 (empirical). After v1.1 weight shift of ~2% (typical minor update):
    effective misalignment = 2% of base vs 0.5 adapter delta. SNR = 25, borderline. For r=4: delta = 0.1,
    SNR = 50, barely noticeable.'
