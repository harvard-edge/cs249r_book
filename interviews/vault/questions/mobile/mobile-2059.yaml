title: Atomic Gradient Commits in Unstable App Environments
scenario: An iOS app performing on-device federated training gets repeatedly terminated
  by the OS when placed in the background. The current implementation loses the whole
  10-minute training epoch if killed.
question: Analyze a database-backed micro-batch checkpoint strategy to secure intermediate
  gradients without corrupting global model state during OS evictions.
details:
  realistic_solution: To prevent corruption, gradients must be committed incrementally
    using CoreData atomic transactions. The application saves accumulated gradients
    along with the current batch index inside a single transactional block after every
    N batches. If killed, the process restarts, queries the database for the last
    committed batch index, loads the partial gradients, and seamlessly resumes training
    without duplicating updates.
  common_mistake: Saving weights and batch indices in two separate unlinked filesystem
    writes, which introduces a race condition if killed between writes.
  napkin_math: N/A - Structural analysis of atomic transactions over I/O.
