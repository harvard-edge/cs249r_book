title: The On-Device Fine-Tuning Pipeline
scenario: Your photo app has a 'search by description' feature powered by a CLIP-like model. Users in Japan complain it doesn't understand Japanese food categories. Users in Brazil say it misclassifies local bird species. You can't collect user photos on your servers.
question: How would you design an on-device personalization system that adapts the model to each user's photo library?
details:
  realistic_solution: |
    LoRA on-device: freeze the 150M-param base (300 MB, mmap'd) and train 73K LoRA parameters (294 KB). Training: 200 image-text pairs x 50 steps in ~90s on NPU. Memory: 300 MB frozen + 294 KB trainable + 50 MB activations = ~350 MB (fits 4+ GB RAM). Personalization: +12% recall on user-specific categories. Train during overnight charging. Store per-user adapters; the shared base model is never modified. Never fine-tune the full 150M params on a phone.
  common_mistake: |
    **The Pitfall:** Proposing to fine-tune the entire 150M parameter model on-device.
    **The Rationale:** Candidates default to standard cloud-based full fine-tuning.
    **The Consequence:** Training all parameters on a phone would take hours, drain the battery, and easily OOM.
  napkin_math: |
    - Base model: 150M params, 300 MB (FP16).
    - LoRA adapters: 73K params, 294 KB.
    - Training: 200 pairs * 50 steps = 10,000 forward+backward passes (~90 seconds on NPU).
    - Memory during training: 300 MB (frozen) + 294 KB (trainable) + 50 MB (activations) = **~350 MB**.
    - Fits easily on any phone with 4+ GB RAM.
