title: Implement MobileNetV3 fine-tuning pipeline for Core ML deployment on A17 Pro
scenario: You need to fine-tune a pre-trained MobileNetV3-Large on a 5-class custom
  dataset (2,000 images per class) and deploy it to iPhone 15 Pro (A17 Pro) via Core
  ML. The deployment must use the Neural Engine for <3ms inference. Implement the
  full training and conversion pipeline with ANE-compatibility constraints.
question: How should you fine-tune and convert MobileNetV3-Large so it runs on the
  A17 Pro Neural Engine under 3ms?
details:
  realistic_solution: 'ANE compatibility: replace SiLU with nn.Hardswish() before
    or during fine-tuning (very close approximation, <0.5pp accuracy impact). Pipeline:
    (1) Load timm MobileNetV3-Large pretrained; (2) Replace SiLU → Hardswish; (3)
    Fine-tune 50 epochs with AdamW, LR=1e-4, cosine schedule; (4) Export: model.eval();
    traced = torch.jit.trace(model, example_input); (5) coremltools.convert(traced,
    compute_units=ct.ComputeUnit.ALL, minimum_deployment_target=ct.target.iOS17);
    (6) Verify with Xcode Instruments that model runs on ANE. Test: ct.models.MLModel.predict()
    and check compute_device in metadata.'
  common_mistake: 'Fine-tuning with PyTorch''s default Swish/SiLU activation and then
    trying to convert directly to Core ML ANE — the ANE does not support torch.nn.SiLU
    directly and coremltools may produce a ''compute units: CPU_AND_GPU'' fall-through
    instead of ANE execution.'
  napkin_math: 'Fine-tuning 10K images, 50 epochs, batch=32. Steps: 10K/32 × 50 =
    15,625 steps. MobileNetV3-Large backward: ~0.66 GFLOPs (3× forward FLOPs). Per
    step: 32 × 0.66G = 21G FLOPs. On M3 Mac (15 TFLOPS): 21G/15T = 1.4ms/step. Total:
    15,625 × 1.4ms = 21.9 sec fine-tuning. Core ML conversion: ~30 seconds. A17 Pro
    ANE inference with Hardswish: ~1.9ms (vs 2.1ms with H-swish approx). SiLU → Hardswish
    accuracy impact: <0.3pp on custom 5-class task (distribution shift dominates).
    Total pipeline: 5 minutes including validation.'
