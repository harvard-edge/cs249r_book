title: NPU Functional Safety for ISO 26262 ASIL B
scenario: A safety-critical automotive ML application performing real-time object detection needs to run on a Snapdragon 8 Gen 3 Hexagon NPU, leveraging its 45 TOPS INT8 performance and 12-16 GB LPDDR5X memory.
question: What hardware-software co-design elements are needed for ISO 26262 ASIL B compliance on Snapdragon Hexagon?
details:
  realistic_solution: 'For ISO 26262 ASIL B compliance on an NPU like the Snapdragon 8 Gen 3 Hexagon, key hardware-software co-design elements typically include:

    1.  **Self-Test Routines**: Implementation of Power-On Self-Test (POST) and Built-In Self-Test (BIST) for NPU cores, memory (e.g., LPDDR5X integrity checks), and interfaces. These are complemented by periodic online self-tests run during normal operation.

    2.  **Watchdog Timers**: Independent hardware watchdog timers (e.g., windowed watchdog) to monitor the NPU''s program execution flow, detecting software hangs or unexpected behavior.

    3.  **Error Detection and Correction**: Extensive use of Error-Correcting Codes (ECC) for the LPDDR5X memory and critical internal NPU registers, along with parity checks for data paths and state machines.

    4.  **Diagnostic Coverage**: Mechanisms are designed to achieve a specified diagnostic coverage rate, meaning a certain percentage of potential hardware faults are detectable and mitigated by these safety measures.'
  common_mistake: |
    **The Pitfall:** Assuming basic error checking or software-level fault tolerance is sufficient.
    **The Rationale:** Candidates neglect the necessity of hardware-specific diagnostic features like POST, BIST, and watchdog timers.
    **The Consequence:** The architecture fails ASIL B safety certification completely.
  napkin_math: |
    1. Self-Test Latency: 50 ms.
    2. Required Execution Interval: 500 ms.
    3. Calculate Overhead: 50 ms / 500 ms = 10%.
    4. Calculate Effective TOPS: 45 TOPS * 0.9 = 40.5 TOPS.
    **Conclusion:** Safety routines consume 10% of NPU capacity, reducing effective compute to 40.5 TOPS.
