title: CoreML vs ONNX Runtime on Apple A17 Pro Neural Engine
scenario: You deploy a text classification model (BERT-tiny, 4.4M params) on iPhone
  15 Pro (A17 Pro, 35 TOPS ANE). CoreML with Neural Engine achieves 1.2ms inference.
  ONNX Runtime with CoreML EP achieves 1.8ms. The 50% overhead concerns your team.
question: How would you explain and reduce the 50% latency overhead of ONNX Runtime
  versus direct CoreML on A17 Pro?
details:
  realistic_solution: 'The overhead breakdown: (1) ORT CoreML EP bridge overhead:
    ~0.1ms (data format conversion between ORT tensors and CoreML MLMultiArray). (2)
    Suboptimal graph conversion: ORT''s CoreML EP may not convert all ops to ANE-compatible
    CoreML ops, causing some to run on CPU/GPU instead of ANE. Check with Instruments
    (Core ML performance tab) to see which ops land on ANE vs CPU. (3) Fix: export
    directly to CoreML via coremltools from PyTorch for maximum ANE utilization. Use
    ONNX RT only when cross-platform portability (iOS + Android) is required.'
  common_mistake: Attributing the entire 50% overhead to ONNX Runtime's abstraction
    layer. Some overhead is from the ORT<->CoreML bridge, but a significant portion
    comes from suboptimal ONNX-to-CoreML graph conversion that prevents full ANE utilization.
  napkin_math: 'A17 Pro ANE: 35 TOPS INT8. BERT-tiny: ~8.8M INT8 OPs per inference.
    ANE compute floor: 8.8M / 35T = 0.00025ms. Actual 1.2ms means ANE is at 0.02%
    utilization — the model is too small to saturate ANE. The latency is dominated
    by dispatch overhead, not compute.'
