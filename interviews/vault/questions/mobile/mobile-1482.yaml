title: Google Tensor G3 TPU 16-bit Format Recall
scenario: You are optimizing the Gemini Nano LLM for on-device inference on the Google
  Tensor G3. The device features 12 GB of LPDDR5X memory and an on-device TPU delivering
  7.5 TOPS. To maximize throughput while maintaining dynamic range, you need to select
  the native 16-bit floating-point format designed by Google for TPUs. What is the
  name of this format, and how many bits does it allocate to the exponent versus the
  fraction?
question: What is the name of this format, and how many bits does it allocate to the
  exponent versus the fraction?
details:
  realistic_solution: The correct format is bfloat16 (Brain Floating Point). It allocates
    8 bits for the exponent and 7 bits for the fraction (plus 1 sign bit). This design
    matches the dynamic range of FP32, making it highly robust for TPU inference without
    the need for complex loss scaling.
  common_mistake: Candidates often incorrectly identify standard IEEE FP16 as the
    TPU's native format, assuming 5 bits for the exponent and 10 bits for the fraction.
    They fail to recall the specific format Google designed to avoid loss scaling.
  napkin_math: Storing a 3 billion parameter model in FP32 requires 3B * 4 bytes =
    12 GB, which consumes all the Google Tensor G3's 12 GB LPDDR5X memory. Using bfloat16
    requires 3B * 2 bytes = 6 GB, freeing up 50% of the RAM for OS operations and
    KV cache while maintaining FP32's dynamic range.
