title: The Real-Time Driver Alert Failure
scenario: 'You are a Senior ML Systems Engineer on a new flagship vehicle''s Driver Monitoring System.
  The system runs on a high-end automotive SoC similar to a Snapdragon 8 Gen 3. A camera feeds a stream
  of 30 FPS video to a computer vision model that detects driver distraction. A critical safety requirement
  is that an alert must be triggered within 100ms of the driver looking away (the ''photon-to-alert''
  deadline). Your pipeline consists of four stages: Frame Capture, Pre-processing, Model Inference, and
  Post-processing. Profiling reveals the following execution times (Average | Worst-Case): Frame Capture
  (10ms | 15ms), Pre-processing (15ms | 25ms), Model Inference (40ms | 50ms), and Post-processing (10ms
  | 20ms).'
question: "Why can a driver alert pipeline meet average latency but fail its 100ms safety deadline?"
details:
  realistic_solution: The root cause is the accumulation of worst-case scheduler jitter across the entire
    pipeline. While the average-case latency might be acceptable, a real-time system's reliability is
    determined by its worst-case execution time (WCET). When the maximum jitter hits every stage, the
    total latency exceeds the safety deadline.
  common_mistake: Engineers often focus exclusively on the single largest component of latency (here,
    the 40ms inference) and ignore smaller, cumulative effects. They may also misinterpret the 30 FPS
    (33.3ms) frame rate as the deadline itself, or fail to account for worst-case software behavior like
    scheduler jitter, which is critical in real-time systems.
  napkin_math: 'Let''s calculate the worst-case ''photon-to-alert'' latency:'
  options:
  - The 40ms model inference is too slow and must be optimized below 20ms to meet the deadline.
  - The camera's 30 FPS rate is the bottleneck, as it only provides a 33.3ms window for the entire process.
  - The cumulative effect of worst-case scheduler jitter across all pipeline stages pushes the total latency
    beyond the 100ms budget.
  - The CPU is overloaded. Pre-processing and post-processing should be moved to the NPU to free up CPU
    cycles.
  correct_index: 2
