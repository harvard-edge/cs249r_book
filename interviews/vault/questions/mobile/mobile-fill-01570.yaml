title: Real-time Gesture Recognition on Google Tensor G3
scenario: You are tasked with architecting a real-time, ultra-low-latency gesture recognition system for
  a next-generation mobile device powered by the Google Tensor G3. This device features a 7.5 TOPS on-device
  TPU and 12 GB LPDDR5X RAM. The system needs to continuously ingest high-frequency sensor data (accelerometer,
  gyroscope, and magnetometer) at 1 kHz from each sensor. This raw data must pass through an event-driven
  pipeline to perform real-time feature computation (e.g., windowing, statistical aggregations, Fourier
  transforms) and then feed a pre-trained TensorFlow Lite model for gesture classification. The entire
  pipeline, from sensor reading to gesture inference, must achieve an end-to-end latency of under 50 milliseconds.
  The ML model inference itself is optimized to take 10ms on the Tensor G3's TPU. Design the data ingestion
  and real-time feature computation pipeline, detailing how you would manage data flow, backpressure,
  resource utilization (especially memory and TPU), and ensure the strict latency requirements are met.
question: "How would you build a sub-50ms Tensor G3 gesture pipeline from 1 kHz sensors through feature extraction and TFLite inference?"
details:
  realistic_solution: Implement a multi-threaded, event-driven architecture utilizing highly optimized,
    lock-free ring buffers or message queues for inter-stage communication (sensor acquisition -> feature
    extraction -> inference). Dedicate high-priority threads for sensor data acquisition and a separate
    thread pool for feature computation. Leverage the Tensor G3's TPU specifically for model inference
    and, if computationally intensive and suitable for acceleration, certain feature extraction steps.
    Employ techniques like zero-copy data transfer between pipeline stages where possible. Implement a
    robust backpressure mechanism (e.g., explicit flow control, adaptive sampling, or dynamic buffer sizing)
    to prevent data loss. For memory efficiency, consider circular buffers or memory pooling for sensor
    data frames, ensuring minimal allocations and deallocations in the critical path.
  common_mistake: A common mistake is failing to account for backpressure and buffer overflows, particularly
    during burst events or temporary processing spikes. This can lead to dropped sensor data, increased
    latency, or system crashes due to inefficient memory management, despite ample RAM. Another pitfall
    is underutilizing the TPU by offloading too much feature computation to the CPU, or conversely, attempting
    to run CPU-bound operations on the TPU inefficiently.
  napkin_math: 'Raw data ingress: 3 sensors * 1000 samples/sec * (6 floats/sample for accel/gyro + 3 floats/sample
    for mag) * 4 bytes/float = ~108 KB/s. If we consider a 100ms processing window, each window contains
    ~100 samples per sensor, requiring ~10.8KB of raw data per window. For a 50ms end-to-end latency,
    with 10ms for model inference, only 40ms remains for sensor acquisition, feature extraction, and inter-process
    communication. This implies very lean, highly optimized code. Peak memory for active buffers (e.g.,
    500ms look-back window for features + multiple staging buffers) could be around 5 * 108KB = 540KB,
    which is negligible against 12GB LPDDR5X RAM, indicating that memory contention will primarily be
    about access patterns and cache efficiency rather than capacity.'
