title: The Near-Miss Privacy Paradox
scenario: "You are the Principal ML Architect for a luxury automaker. Your goal is to improve the ADAS by learning from 'near-miss' driving events across a fleet of 1 million vehicles."
question: "What hybrid near-miss learning system minimizes cellular transfer cost while preserving privacy and safety validation?"
details:
  realistic_solution: The correct approach is a hybrid system that aggressively minimizes data transfer while respecting privacy, and uses a multi-stage validation process.
  common_mistake: |
    **The Pitfall:** Focusing purely on the technical merits of centralized training without pricing out second-order effects.
    **The Rationale:** Engineers ignore the prohibitive cost of cellular data transfer at scale, which makes naive data upload strategies economically impossible.
    **The Consequence:** Operationally reckless deployments or financially unviable architectures.
  napkin_math: |
    - Assume 1 near-miss event per car per week, and cellular data costs $2/GB.
    - Streaming all data (e.g., 1GB/event) would cost: `1,000,000 * 1GB * $2/GB = $2,000,000/week`.
    - Transmitting only metadata (e.g., 1MB/event) costs: `1,000,000 * 0.001GB * $2/GB = $2,000/week`.
    - **Conclusion:** A hybrid approach using metadata slashes transmission costs by **1000x**.
  options:
  - Stream all sensor data to the cloud via cellular network 24/7 to guarantee the highest fidelity training dataset, accepting the multi-million dollar data bill as a cost of business.
  - 'Run a hybrid system: local models flag potential ''near-misses'' but only transmit anonymized, compressed metadata (e.g., speed, delta-v) and heavily pruned clip data for server-side verification and fine-tuning, dramatically reducing payload size.'
  - Deploy an untested, unvalidated federated learning model directly to the control systems of 1 million cars via an immediate OTA update, enabling instantaneous edge-learning.
  - Store all near-miss data locally until the user connects their car to an active Wi-Fi connection, ensuring zero cellular data costs while guaranteeing 100% data retrieval eventually.
  correct_index: 1
