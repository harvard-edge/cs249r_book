title: The Near-Miss Privacy Paradox
scenario: 'You are the Principal ML Architect for a luxury automaker. Your goal is to improve the ADAS
  by learning from ''near-miss'' driving events across a fleet of 1 million vehicles. Your constraints
  are:'
question: "What hybrid near-miss learning system minimizes cellular transfer cost while preserving privacy and safety validation?"
details:
  realistic_solution: The correct approach is a hybrid system that aggressively minimizes data transfer
    while respecting privacy, and uses a multi-stage validation process.
  common_mistake: Focusing purely on the technical merits of one training paradigm (e.g., 'centralized
    training gives the best accuracy') without pricing out the second-order effects. A common failure
    mode is to ignore the prohibitive cost of cellular data transfer at scale, which makes most naive
    data upload strategies economically impossible. Another mistake is proposing a direct, live A/B test
    of a safety-critical feature, which is operationally reckless.
  napkin_math: The TCO is dominated by cellular data transmission costs. Let's compare three strategies
    assuming 1 'near-miss' event/car/week, and a bulk cellular data cost of $2/GB.
  options:
  - Stream all sensor data to the cloud via cellular network 24/7 to guarantee the highest fidelity training
    dataset, accepting the multi-million dollar data bill as a cost of business.
  - 'Run a hybrid system: local models flag potential ''near-misses'' but only transmit anonymized, compressed
    metadata (e.g., speed, delta-v) and heavily pruned clip data for server-side verification and fine-tuning,
    dramatically reducing payload size.'
  - Deploy an untested, unvalidated federated learning model directly to the control systems of 1 million
    cars via an immediate OTA update, enabling instantaneous edge-learning.
  - Store all near-miss data locally until the user connects their car to an active Wi-Fi connection,
    ensuring zero cellular data costs while guaranteeing 100% data retrieval eventually.
  correct_index: 1
