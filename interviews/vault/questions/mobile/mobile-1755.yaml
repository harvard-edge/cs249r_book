title: On-Device Fairness Evaluation Architecture for Facial Recognition on Snapdragon Hexagon NPU
scenario: You are tasked with deploying a real-time on-device AI model for facial recognition on a flagship smartphone, powered by the Snapdragon 8 Gen 3 Hexagon NPU (45 TOPS INT8, 12-16 GB LPDDR5X). This model is critical for unlocking the device and authenticating payments. Given the sensitive nature of facial recognition, ensuring fairness and mitigating bias across diverse demographic groups (e.g., skin tone, age, gender) is paramount.
question: How would you design an architecture and methodology for continuously monitoring and reacting to potential demographic parity violations on-device within memory constraints?
details:
  realistic_solution: Implement a lightweight, asynchronous fairness evaluation module that periodically samples inference results and associated demographic labels (inferred or anonymized user-provided, respecting privacy). This module would run on the Hexagon NPU during idle cycles or lower priority tasks, utilizing its 45 TOPS INT8 precision for minimal overhead when computing metrics. Key metrics like demographic parity and equalized odds (for true/false positive rates) would be calculated on small, rotating batches of data. If pre-defined thresholds are exceeded, the system triggers an alert to a backend service for deeper analysis, and potentially initiates an on-device model rollback or an over-the-air update with a bias-mitigated model. Data collection for fairness evaluation would be carefully managed to stay within the 12-16 GB LPDDR5X limits, perhaps using a circular buffer and only uploading anonymized aggregate statistics or metadata.
  common_mistake: |
    **The Pitfall:** Over-engineering the fairness evaluation pipeline.
    **The Rationale:** Candidates ignore on-device resource constraints and propose massive data collection or complex on-device training loops.
    **The Consequence:** Exhausting NPU compute or LPDDR5X memory, causing the primary facial recognition task to fail or the device to drain battery rapidly.
  napkin_math: |
    1. Data size per inference: 1 KB.
    2. Sample rate: 0.1% of 10 inferences/second.
    3. Data collection rate: 0.001 * 10 inf/s * 3600 s/hr = 36 inferences/hr.
    4. Storage per hour: 36 * 1 KB = 36 KB/hr.
    5. Periodic robust check: 10,000 samples = **10 MB**, which easily buffers within the 12-16 GB LPDDR5X memory without impacting the main workload.
