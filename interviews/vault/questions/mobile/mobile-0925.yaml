title: 'Kernel Fusion: Recall — What is Operator Fusion on Neural Engines?'
scenario: On A17 Pro (35 TOPS Neural Engine, 8GB RAM), what is operator fusion, how
  does the Core ML compiler implement it, and what types of operations are most commonly
  fused together for mobile transformer inference?
question: What is operator fusion on the A17 Pro Neural Engine, and which mobile transformer
  operations are commonly fused?
details:
  realistic_solution: 'Core ML compiler automatically fuses compatible operations
    into single Neural Engine invocations. The Neural Engine is fixed-function; Core
    ML abstracts this via its IR. Common fusions: Conv+BN+ReLU, Linear+GELU, Softmax+Top-K.'
  common_mistake: Thinking the developer manually writes fused kernels for Neural
    Engine — Core ML and Metal do this automatically. Confusing Neural Engine (fixed
    function) with GPU (programmable).
  napkin_math: 'A17 Pro Neural Engine: 35 TOPS INT8, 8GB unified memory at 68 GB/s
    (estimated LPDDR5). Ridge point: 35,000 / 68 = 515 INT8 OPS/byte. Elementwise
    op (1 OP/byte): 515× below ridge → memory-bound. Fusing 5 elementwise ops: read
    once + write once vs 5× = 5× bandwidth reduction. For 1B LLM decode, token embedding
    4096 × 4B = 16KB: 5 unfused ops = 5 × 32KB = 160KB. Fused = 32KB. At 68 GB/s:
    0.0024ms vs 0.00047ms. Time savings per token: 0.0019ms. At 50ms/token total →
    fusion saves 0.004% per elementwise sequence. Kernel launch savings (iOS Metal):
    ~10µs per launch. 200 layers × 5 fused ops vs 20 → saves 180 × 10µs = 1.8ms per
    token. More significant.'
