title: 'Kernel Fusion: Recall — What is Operator Fusion on Neural Engines?'
scenario: On A17 Pro (35 TOPS Neural Engine, 8GB RAM), you are optimizing a mobile transformer model.
question: What is operator fusion on the A17 Pro Neural Engine, and which mobile transformer operations are commonly fused?
details:
  realistic_solution: 'Core ML compiler automatically fuses compatible operations into single Neural Engine invocations. The Neural Engine is fixed-function; Core ML abstracts this via its IR. Common fusions: Conv+BN+ReLU, Linear+GELU, Softmax+Top-K.'
  common_mistake: |
    **The Pitfall:** Thinking the developer must manually write fused kernels for the Neural Engine.
    **The Rationale:** Confusing the fixed-function Neural Engine compiler (Core ML) with programmable GPU kernels.
    **The Consequence:** Wasting engineering effort attempting to write manual Metal kernels when the Core ML compiler automatically fuses compatible operations.
  napkin_math: |
    - A17 Pro Ridge point: 35 TOPS / 68 GB/s = 515 OPS/byte.
    - Elementwise op: 1 OP/byte (memory-bound, 515x below ridge).
    - 1B LLM Token Embedding: 4096 * 4B = 16 KB.
    - Unfused (5 ops): 5 * 16 KB = 80 KB read/write. Fused: 16 KB read/write.
    - Metal kernel launch overhead: ~10µs per launch.
    - **Result: Fusing 5 ops over 200 layers saves 180 * 10µs = 1.8ms per token in launch overhead alone, dramatically improving decoding speed.**
