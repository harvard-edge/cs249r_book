title: On-Device Vision Model Data Optimization for Apple A17 Pro
scenario: You are fine-tuning a vision model directly on an Apple A17 Pro. Your 100 TB training dataset causes prohibitively slow streaming and suboptimal edge-case performance. You need to apply coreset selection and curriculum learning.
question: What measures would you implement to prevent model collapse risks during aggressive data optimization on the A17 Pro?
details:
  realistic_solution: 'Employ diversity-aware coreset selection (e.g., k-center greedy or submodular optimization) to aggressively compress the data stream while preserving topological coverage. Structure the training process using curriculum learning and utilize high-fidelity synthetics to bolster rare edge cases without overwhelming unified memory.'
  common_mistake: |
    **The Pitfall:** Indiscriminately pruning data based on simple loss metrics or random sampling.
    **The Rationale:** Focusing strictly on mathematical dataset reduction to fit into mobile memory without assuring feature diversity.
    **The Consequence:** Stripping critical rare classes from the training buffer, causing catastrophic model collapse on real-world edge scenarios.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original dataset: 100 TB. Coreset reduction: 80%.
    - Device unified memory limit: 8 GB. Model footprint: 4 GB.
    - Data streaming buffer: 10 seconds @ 30 FPS, 0.75 MB/frame.

    **Calculations:**
    - Reduced dataset size: 100 TB * 0.20 = 20 TB (streamed from flash).
    - Remaining unified RAM: 8 GB - 4 GB = 4 GB (4096 MB).
    - Required streaming buffer size: 10s * 30 frames/s * 0.75 MB/frame = 225 MB.

    **Conclusion & Interpretation:**
    - **Result: 225 MB (Memory-Bound)**. The 225 MB streaming buffer easily fits the remaining 4 GB of unified memory, permitting advanced coreset algorithms to maintain feature diversity without triggering OOM terminations.
