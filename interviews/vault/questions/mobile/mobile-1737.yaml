title: On-Device Vision Model Data Optimization for Apple A17 Pro
scenario: You are deploying a vision model to the Apple A17 Pro (35 TOPS NPU, 8 GB unified memory). Your 100 TB training dataset causes prohibitively slow training and suboptimal edge-case performance. You need to apply coreset selection, curriculum learning, and the Information-Compute Ratio (ICR) framework.
question: What measures would you implement to prevent model collapse risks during aggressive data optimization on the A17 Pro?
details:
  realistic_solution: 'A multi-stage approach combining intelligent data selection and augmentation: employ diversity-aware coreset selection algorithms, structure the training process using curriculum learning, generate high-fidelity synthetic data for rare edge cases, and analyze information density using the ICR framework.'
  common_mistake: |
    **The Pitfall:** Indiscriminately pruning data based on simple metrics or ignoring device memory.
    **The Rationale:** Focusing purely on dataset size reduction without ensuring edge-case diversity.
    **The Consequence:** Causing model collapse or severe performance degradation on rare but critical real-world scenarios.
  napkin_math: |
    - 80% reduction of 100 TB: 100 TB * 0.20 = 20 TB (20,000 GB).
    - 8 GB Unified Memory available. Model footprint: 4 GB.
    - Remaining memory: 8 GB - 4 GB = 4096 MB.
    - Buffer requirement: 10 sec * 30 FPS * 0.75 MB/frame = 225 MB.
    - **Remaining unified memory (4096 MB) easily accommodates the 225 MB buffer.**
