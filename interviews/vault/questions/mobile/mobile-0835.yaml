title: Adaptive AR Framerate Scaling
scenario: A mobile AR glasses application running continuous face-tracking at 30fps
  drains the battery in 30 minutes, but user studies require at least 2 hours of battery
  life per session.
question: Create an adaptive duty-cycling and dynamic framerate specification to extend
  battery life by 4x without significantly degrading perceived responsiveness.
details:
  realistic_solution: 'To extend battery life from 0.5 hours to 2 hours, average power
    consumption must drop by 75%. The candidate should specify an adaptive duty-cycling
    policy: when the IMU detects rapid head movement or the visual scene changes significantly,
    the system briefly boosts to 30fps. During static scenes (most of the time), the
    system aggressively down-clocks to 1-5 fps, interpolating results via cheap lightweight
    optical flow or IMU-based reprojection.'
  common_mistake: Blindly lowering the framerate to a static 7.5 fps, which achieves
    the power goal but fails the product requirement for smooth AR tracking.
  napkin_math: Target battery = 2h / 0.5h = 4x improvement -> Requires 75% reduction
    in average compute duty cycle.
