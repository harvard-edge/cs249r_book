title: The Transformer vs CNN on Mobile
scenario: ViT-Small (22M params, 4.6 GFLOPs) and MobileNetV3-Large (5.4M params, 0.22 GFLOPs) both achieve
  ~75% top-1 on ImageNet. On a Snapdragon 8 Gen 3, MobileNetV3 runs in 3ms while ViT-Small takes 35ms
  — despite ViT having only 21× more FLOPs, it's 12× slower. FLOPs don't predict latency. Explain the
  architectural reason for this disproportionate slowdown.
details:
  realistic_solution: Memory access patterns, not arithmetic. MobileNetV3's depthwise convolutions have
    ~50 FLOPs/byte arithmetic intensity — data stays in NPU SRAM. ViT's attention operators have extremely
    low arithmetic intensity and often require reshaping and transposes that map poorly to the NPU's fixed-function
    matrix units. While a single layer's attention matrix (~461 KB) fits in SRAM, the complete forward
    pass forces excessive DRAM traffic. Furthermore, unsupported ops force costly delegation to the GPU.
    MobileNetV3 is compute-bound (good for NPU); ViT is memory-bound (bad for mobile).
  common_mistake: '"ViT is slower because it has more parameters and FLOPs." The 21× FLOP difference doesn''t
    explain the 12× latency gap — if latency scaled linearly with FLOPs, ViT should take 63ms, not 35ms
    (it''s actually faster than FLOP-linear). The real question is why MobileNetV3 is disproportionately
    *fast*, not why ViT is slow.'
  napkin_math: 'MobileNetV3: 0.22 GFLOPs, compute-bound. NPU at 45 TOPS (INT8): 0.22G / 45T = 0.005ms
    (arithmetic time). Actual: 3ms (dominated by data movement, but highly optimized tiling). Arithmetic
    intensity: ~50 FLOPs/byte → compute-bound. ViT-Small: 4.6 GFLOPs. Attention memory per layer: 196
    × 196 × 6 heads × 2 bytes = 461 KB. While this fits in SRAM, the overall data movement for the network
    generates ~50 MB of DRAM reads per forward pass due to low arithmetic intensity in attention ops.
    At 51.2 GB/s: 50 MB / 51.2 GB/s = ~1ms just for best-case memory. But cache misses, irregular access
    patterns, and reshaping add 5-10×: ~10ms memory stall. Plus compute: 4.6G / 45T = ~0.1ms. Plus delegation
    overhead (attention ops unsupported on NPU fallback to GPU): ~20ms. Total: **~35ms**.'
