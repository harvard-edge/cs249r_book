title: NPU Frame Dropping Impact on Equalized Odds
scenario: An on-device facial expression recognition model runs on the Samsung Exynos 2400 NPU to trigger
  accessibility actions. The dual-core NPU supports 34.7 TOPS. During intensive gaming, the shared 12
  GB LPDDR5X memory experiences high bandwidth contention from the GPU, forcing the NPU to reduce the
  processing rate from 30 FPS to 10 FPS to avoid memory starvation. The system requires at least 2 consecutive
  frames of an expression to register a detection. Subgroup A typically exhibits micro-expressions lasting
  150ms, while Subgroup B exhibits expressions lasting 300ms. Explain why this hardware-driven throttling
  degrades the Equalized Odds fairness metric specifically for Subgroup A, and apply the True Positive
  Rate calculation.
details:
  realistic_solution: The candidate should recognize that shared memory bandwidth constraints force the
    system into a degraded operational state (10 FPS). They must apply the time-to-frame calculation to
    show that Subgroup A's expressions fall below the 2-frame threshold required for detection, leading
    to increased False Negatives and a lowered True Positive Rate, thereby violating Equalized Odds compared
    to Subgroup B.
  common_mistake: Candidates often focus solely on the theoretical TOPS (34.7) of the NPU, ignoring that
    the shared memory architecture (12 GB LPDDR5X) causes bandwidth contention bottlenecks. They also
    frequently fail to connect the hardware-induced frame drop directly to the mathematical degradation
    of True Positive Rates for specific demographic subgroups.
  napkin_math: '1. Normal NPU utilization: 30 FPS = 33.3ms per frame. Subgroup A (150ms) gets 150 / 33.3
    = 4.5 frames. Subgroup B (300ms) gets 300 / 33.3 = 9 frames. Both meet the 2-frame requirement.

    2. Throttled state due to 12 GB LPDDR5X memory contention: 10 FPS = 100ms per frame.

    3. Throttled frames: Subgroup A gets 150 / 100 = 1.5 frames (meaning 1 frame is captured 50% of the
    time). Subgroup B gets 300 / 100 = 3.0 frames.

    4. Impact on Equalized Odds: Since >= 2 frames are needed, Subgroup A''s True Positive Rate (TP /
    (TP + FN)) plummets as 50% of expressions result in False Negatives, while Subgroup B''s TPR remains
    at 100%, creating a significant bias disparity driven by hardware constraints.'
