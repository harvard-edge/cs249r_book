title: On-Device Streaming Drift Detection
scenario: You are deploying a real-time semantic segmentation model for an AR application running on a mobile NPU. To detect camera sensor degradation and environmental lighting shifts (data drift) without violating user privacy, you must implement an on-device drift detection system. You decide to monitor the distribution of the 512-dimensional INT8 bottleneck layer embeddings, ensuring it doesn't contend with the primary inference workload sharing the 12 GB LPDDR5X memory.
question: How would you perform streaming drift detection on-device using NPU embeddings and CPU histograms?
details:
  realistic_solution: The optimal approach leverages the heterogeneous architecture by extracting the INT8 embeddings from the NPU and maintaining fixed-width streaming histograms on the CPU. By using 32 bins per dimension, the CPU can update counters asynchronously without blocking the NPU's 30 FPS pipeline. Periodically, the CPU calculates the Population Stability Index (PSI) against a baked-in reference distribution and only transmits a lightweight telemetry flag to the server if drift exceeds a threshold.
  common_mistake: |
    **The Pitfall:** Proposing to store raw embeddings for batched offline processing or running exact KS-tests directly on the NPU.
    **The Rationale:** Candidates forget that mobile NPUs are heavily optimized for INT8 matrix multiplication, not dynamic branching or high-precision statistical tracking.
    **The Consequence:** The system wastes shared memory bandwidth tracking raw tensors and creates massive compute spikes when evaluating drift across thousands of vectors.
  napkin_math: |
    - **Histogram State Size:** 512 dimensions * 32 bins * 4 bytes = 65.5 KB, which easily fits in the CPU L1 cache.
    - **CPU Compute:** At 30 FPS, updating bins requires ~15,360 operations/second, taking fractions of a millisecond.
    - **Raw Storage Alternative:** Storing raw INT8 embeddings for 1 hour requires 512 bytes * 30 FPS * 3600 seconds = ~55.3 MB.
    - **Result:** **The streaming histogram approach takes 65.5 KB and zero memory bandwidth, whereas raw storage wastes 55 MB of RAM and triggers compute spikes.**
