title: On-Device Streaming Drift Detection
scenario: You are deploying a real-time semantic segmentation model for an AR application
  running on the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). To detect camera sensor
  degradation and environmental lighting shifts (data drift) without violating user
  privacy, you must implement an on-device drift detection system. You decide to monitor
  the distribution of the 512-dimensional INT8 bottleneck layer embeddings. Design
  the statistical tracking mechanism and calculate its memory and compute footprint,
  ensuring it doesn't contend with the primary inference workload sharing the 12-16
  GB LPDDR5X memory.
question: How would you perform streaming drift detection on-device using NPU embeddings
  and CPU histograms?
details:
  realistic_solution: The optimal approach leverages the heterogeneous architecture
    by extracting the INT8 embeddings from the NPU and maintaining fixed-width streaming
    histograms on the CPU. By using 32 bins per dimension, the CPU can update counters
    asynchronously without blocking the NPU's 30 FPS pipeline. Periodically, the CPU
    calculates the Population Stability Index (PSI) against a baked-in reference distribution
    and only transmits a lightweight telemetry flag to the server if drift exceeds
    a threshold.
  common_mistake: Candidates often propose storing raw embeddings for batched offline
    processing, which causes I/O spikes and battery drain. Alternatively, they suggest
    running complex statistical tests (like exact KS-tests or continuous KL divergence)
    directly on the NPU, failing to realize the 45 TOPS Hexagon NPU is optimized for
    INT8 matrix multiplication, not dynamic branching or high-precision statistical
    tracking.
  napkin_math: 'Histogram state size: 512 dimensions * 32 bins * 4 bytes (Int32 counter)
    = 65.5 KB. This easily fits in the CPU L1 cache, avoiding main LPDDR5X memory
    reads/writes. Compute per frame: 512 bin lookups and increments. At 30 FPS, this
    is ~15,360 operations per second on the CPU, taking fractions of a millisecond.
    Conversely, storing raw INT8 embeddings for a 1-hour session would cost: 512 bytes
    * 30 FPS * 3600 seconds = ~55.3 MB of RAM, which wastes shared memory bandwidth
    and creates an expensive compute spike when evaluating the PSI over 108,000 vectors.'
