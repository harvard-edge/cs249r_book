title: The On-Device Fine-Tuning Data Budget
scenario: You want to fine-tune a mobile vision model on-device using 1,000 user photos preprocessed to 224x224 RGB tensors in FP32.
question: How much memory does this training dataset occupy, and does it fit comfortably in the 8GB unified memory of an iPhone 15 Pro alongside the model?
details:
  realistic_solution: 1,000 images x 224 x 224 x 3 channels x 4 bytes (FP32) = 602 MB. This is significant but fits in 8GB alongside a quantized model. However, training also needs gradients and optimizer states, which can 2-3x the memory pressure.
  common_mistake: |
    **The Pitfall:** Estimating RAM based on compressed JPEG file sizes.
    **The Rationale:** Forgetting that the training loop requires uncompressed, full-precision tensor representations in memory.
    **The Consequence:** The training pipeline immediately OOMs and crashes the background process.
  napkin_math: |
    1. Images: 1000 * 224 * 224 * 3 * 4 bytes (FP32) = 602 MB.
    2. Model: 25M INT8 = 25 MB.
    3. Gradients + Optimizer: 25M * 8 bytes = 200 MB.
    4. Forward Activations: ~100 MB.
    5. **Total RAM:** 602 + 25 + 200 + 100 = **927 MB (Fits easily in 8GB).**
  options:
  - A) ~6 MB. JPEG images are small and efficient.
  - B) ~60 MB. Each tensor is about 60 KB.
  - C) ~600 MB. Each 224x224x3 FP32 tensor is ~600 KB, times 1,000 images.
  - D) ~6 GB. Deep learning datasets always require gigabytes.
  correct_index: 2
