title: 'KV-Cache: Fluency — GQA Memory Savings Calculation for Mobile LLM'
scenario: Compare MHA (32 KV heads) vs GQA (8 KV heads) vs MQA (1 KV head) KV cache
  memory for a 3B INT4 LLM (32 layers, head_dim=128, bf16 KV cache) on Tensor G3 (7.5 TOPS, 12GB)
  at 2048-token context. Which fits in 12GB? Which allows the longest context?
question: How do MHA, GQA, and MQA KV-cache sizes affect maximum context for a 3B
  INT4 LLM on Tensor G3?
details:
  realistic_solution: Available memory for KV = total RAM - OS - model weights - activations.
    Model weights don't change with KV head count (Q projection is same size; only
    K,V projections change).
  common_mistake: Not accounting for model weights when calculating available memory
    for KV cache; confusing the number of KV heads with number of attention groups.
  napkin_math: '3B model (INT4): 1.5GB. OS: 2GB. Activations: 200MB. Available KV:
    12 - 1.5 - 2 - 0.2 = 8.3GB. At 2048 tokens: MHA (32 KV heads): 2048 × 32 × 2
    × 32 × 128 × 2B = 2048 × 524KB = 1.07GB. GQA-8: 2048 × 32 × 2 × 8 × 128 × 2B =
    2048 × 131KB = 268MB. MQA (1 KV head): 2048 × 32 × 2 × 1 × 128 × 2B = 2048 × 16.4KB
    = 33.6MB. All fit in 8.3GB at 2048 tokens. Max context (within 8.3GB): MHA:
    8.3GB / 524KB = 15,839 tokens. GQA-8: 8.3GB / 131KB = 63,358 tokens. MQA: 8.3GB
    / 16.4KB = 506,097 tokens. All fit! At 12GB available, even MHA supports 15K-token
    context. Key constraint for Tensor G3: decode latency, not memory. At 2048 ctx
    decode: MHA KV BW = 1.07GB / 51 GB/s = 21ms. GQA-8 = 268MB / 51 GB/s = 5.3ms.
    MQA = 33.6MB / 51 GB/s = 0.66ms. Weight load: 1.5GB / 51 GB/s = 29.4ms. MHA total:
    50.4ms = 19.8 tok/sec. GQA: 34.7ms = 28.8 tok/sec. MQA: 30.1ms = 33.2 tok/sec. GQA-8 recommended:
    good quality + good throughput.'
