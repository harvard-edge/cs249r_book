title: On-Device Real-time Sensor Fusion Pipeline for Apple A17 Pro
scenario: You are tasked with designing a real-time data pipeline for an on-device ML application continuously collecting high-frequency sensor data and processing camera frames.
question: How would you design a power-efficient A17 Pro sensor and camera data pipeline for immediate on-device inference?
details:
  realistic_solution: Utilize low-overhead event-driven APIs, offload computationally intensive preprocessing to the Neural Engine/GPU, and employ memory-mapped files to avoid memory saturation.
  common_mistake: |
    **The Pitfall:** Treating mobile SoC like a server CPU.
    **The Rationale:** Candidates design unbounded data buffers and frequent CPU-based memory allocations without leveraging hardware accelerators.
    **The Consequence:** The pipeline causes excessive power drain, thermal throttling, and degraded user experience due to dropped frames.
  napkin_math: |
    **Assumptions & Constraints:**
    - Camera stream: 1080p (1920x1080 RGB) at 15 FPS.
    - Memory budget: Shared 8GB unified memory.

    **Calculations:**
    - Raw 1080p frame size: 1920 * 1080 * 3 bytes = ~6 MB.
    - Camera data rate: 6 MB * 15 FPS = 90 MB/s.
    - Sensor data rate (100 Hz): 6 * 4 bytes * 100 = 2.4 KB/s (negligible).

    **Conclusion & Interpretation:**
    - **Result: I/O and Memory Bound**. The 90 MB/s camera ingest will rapidly saturate the unified memory if buffered uncompressed; strict hardware-accelerated pipelining is required.
