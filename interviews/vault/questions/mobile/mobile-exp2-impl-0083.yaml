title: Calculate 2:4 Structured Sparsity Speedup on Tensor G3
scenario: You are deploying a quantized on-device LLM (similar to Gemini Nano) on the Google Tensor G3.
  The model currently requires 10 GB of the available 12 GB LPDDR5X memory and runs at 3.5 TOPS, underutilizing
  the TPU's peak 7.5 TOPS capability due to memory bandwidth bottlenecks. You decide to apply a 2:4 structured
  sparsity pattern to the linear layers, which the Tensor G3 TPU supports natively for accelerated execution.
  Assuming the linear layers account for 80% of the model's weights and compute, calculate the new memory
  footprint and the theoretical peak TOPS achievable, assuming memory bandwidth scales perfectly with
  the reduction in weight fetching.
details:
  realistic_solution: The candidate should identify that 2:4 structured sparsity halves the memory requirement
    for the targeted weights (by storing only 2 non-zero elements and a 2-bit index per 4 elements, though
    often hardware abstracts the index overhead or it's negligible compared to 8-bit/16-bit weights).
    They must apply the 50% reduction only to the 80% of the model representing the linear layers to find
    the new memory footprint. For compute, the TPU can effectively double its throughput on the sparse
    layers.
  common_mistake: Candidates often assume unstructured sparsity or uniform 50% sparsity across the entire
    model will yield a proportional 2x speedup and memory reduction, forgetting that 2:4 structured sparsity
    requires specific hardware support to skip computations and only applies to the targeted layers, not
    the embedding or normalization layers.
  napkin_math: 'Initial memory: 10 GB. Linear layers = 80% = 8 GB. Non-linear layers = 2 GB. 2:4 sparsity
    halves the linear layer weights: 8 GB / 2 = 4 GB. New memory footprint = 4 GB + 2 GB = 6 GB. Initial
    compute: 3.5 TOPS. Linear layers = 80% = 2.8 TOPS. Non-linear = 0.7 TOPS. With 2:4 sparsity support
    on the Tensor G3 TPU, the linear layer throughput doubles: 2.8 TOPS * 2 = 5.6 TOPS. Total theoretical
    compute = 5.6 TOPS + 0.7 TOPS = 6.3 TOPS (which is well within the 7.5 TOPS peak of the G3).'
