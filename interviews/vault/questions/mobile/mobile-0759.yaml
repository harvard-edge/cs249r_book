title: The Vocabulary Embedding Tax
scenario: A mobile LLM uses a 32K token vocabulary with a 4096-dimensional embedding layer stored in FP16.
  How large is the embedding table, and what fraction of a 3.5 GB INT4 model does it represent if the
  embeddings cannot be quantized below FP16 without severe quality loss?
details:
  realistic_solution: 32,000 x 4,096 x 2 bytes = 262 MB. This is 262/3500 = 7.5% of the INT4 model. If
    the embeddings must stay at FP16 while other layers go to INT4, the effective compression ratio of
    the full model is worse than advertised.
  common_mistake: Treating the embedding table as a trivially small lookup. For LLMs, the embedding and
    unembedding layers can be a significant fraction of total memory, and they are often the hardest to
    quantize aggressively.
  napkin_math: 'Embedding table: 32K x 4096 x 2B = 262 MB. Fraction of 3.5 GB model: 262/3500 = 7.5%.
    Un-quantizable overhead.'
  options:
  - A) ~26 MB. Embeddings are just a small lookup table.
  - B) ~262 MB. 32K vocab at 4096 dims in FP16 is a quarter-gigabyte, 7.5% of the model.
  - C) ~1 GB. Embeddings dominate the model footprint.
  - D) ~2.6 MB. Embeddings compress well to INT4 like other layers.
  correct_index: 1
