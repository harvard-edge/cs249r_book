title: Mobile NPU Adversarial Robustness Evaluation
scenario: 'You are tasked with evaluating the reliability of a critical image classification model deployed on a Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X) in a mobile device. The model is susceptible to adversarial evasion attacks. Your team has developed two defense strategies: Adversarial Training (AT) and certified robustness using randomized smoothing (RS).'
question: How would you evaluate adversarial training versus randomized smoothing on Exynos 2400 for robustness, latency, and memory?
details:
  realistic_solution: 'Implement both AT and RS on a representative dataset. Benchmark each defense strategy''s performance on the Samsung Exynos 2400 NPU using metrics such as: 1. Robust Accuracy: Under various attack strengths (e.g., different epsilon values for PGD/FGSM attacks). 2. Inference Latency: Average inference time per image on the NPU. 3. Memory Footprint: Peak memory usage during inference. 4. Energy Consumption: (if measurable) during inference. 5. Model Size: The final deployed model size. The evaluation should involve a series of adversarial attacks (e.g., PGD, FGSM) against both defenses. The chosen metric should be a weighted combination of robust accuracy, latency, and memory, tailored to the specific application''s requirements for the Samsung Exynos 2400 NPU.'
  common_mistake: |
    **The Pitfall:** Evaluating only adversarial robustness metrics without considering inference speed and memory.
    **The Rationale:** Security researchers focus purely on attack success rates (robust accuracy) and ignore deployment constraints.
    **The Consequence:** Recommending a defense like Randomized Smoothing, which mathematically guarantees robustness but destroys real-time latency due to multiple required inference passes.
  napkin_math: |
    1. **Memory Budget:** A 100M parameter model (FP32) is 400MB. The device has 12 GB LPDDR5X, so baseline fits.
    2. **Adversarial Training (AT) Impact:** AT might inflate model size by 20% or require larger intermediate activations, tightening the memory budget.
    3. **Randomized Smoothing (RS) Impact:** RS requires multiple forward passes (e.g., N=100) per image to compute the expected prediction under noise.
    4. **Latency Analysis:** If one inference takes 10ms (achievable with 34.7 TOPS), RS takes 100 * 10ms = 1000ms (1 second).
    **RS causes massive latency bloat (1000ms) making it unsuitable for real-time mobile apps, heavily favoring AT despite potential accuracy drops.**
