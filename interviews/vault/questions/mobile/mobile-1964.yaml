title: On-Device Checkpoint RPO/RTO
scenario: A mobile Neural Engine trains a 50MB LLM adapter. The background app is often killed by OS memory management.
question: Evaluate a checkpointing schedule to maintain a 5-minute RPO and a 10-second RTO.
visual:
  kind: svg
  path: mobile-1964.svg
  alt: Timeline displaying training intervals, a 5-minute RPO window, a failure event, and a 10-second RTO recovery.
  caption: RPO and RTO timeline for on-device training.
details:
  realistic_solution: To meet a 5-minute RPO (Recovery Point Objective), the model state must be serialized to NVMe storage at least every 5 minutes. To meet the 10-second RTO (Recovery Time Objective), reading the 50MB adapter back into memory upon app restart must take < 10s, which is trivial given mobile NVMe speeds (>1 GB/s).
  common_mistake: |
    **The Pitfall:** Confusing RPO (data loss window) with RTO (downtime/recovery speed).
    **The Rationale:** Candidates fail to realize that checkpoint intervals dictate RPO, while load-from-disk speed dictates RTO.
    **The Consequence:** The schedule might save too frequently (hurting battery) or fail to meet the recovery objective entirely.
  napkin_math: |
    - **Checkpoint Write/Read Time:** 50 MB model / 1000 MB/s (NVMe speed) = 0.05 seconds.
    - **RTO Requirement:** The read-back time (0.05s) is significantly less than the 10-second Recovery Time Objective.
    - **Result:** **The 50MB adapter can easily be loaded in < 0.1s, satisfying the 10s RTO.**
