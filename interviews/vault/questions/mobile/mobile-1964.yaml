title: On-Device Checkpoint RPO/RTO
scenario: An A17 Pro Neural Engine trains a 50MB LLM adapter. The background app is
  often killed by iOS memory management.
question: Evaluate a checkpointing schedule to maintain a 5-minute RPO and a 10-second
  RTO.
visual:
  kind: svg
  path: mobile-1964.svg
  alt: Timeline displaying training intervals, a 5-minute RPO window, a failure event,
    and a 10-second RTO recovery.
  caption: RPO and RTO timeline for on-device training.
details:
  realistic_solution: To meet a 5-minute RPO (Recovery Point Objective), the model
    state must be serialized to NVMe storage at least every 5 minutes. To meet the
    10-second RTO (Recovery Time Objective), reading the 50MB adapter back into memory
    upon app restart must take < 10s, which is trivial given mobile NVMe speeds (>1
    GB/s).
  common_mistake: Confusing RPO (data loss window) with RTO (downtime/recovery speed).
  napkin_math: 50 MB / 1000 MB/s = 0.05s << 10s RTO
