title: Mobile Sync Burst
scenario: A mobile app syncs 12 MB of model telemetry when the user returns to Wi-Fi. Effective upload throughput is 6 MB/s.
question: "Can a 12 MB mobile telemetry sync finish within a 3-second background budget at 6 MB/s?"
details:
  realistic_solution: The sync takes 12 / 6 = 2 seconds, so it fits the 3-second budget with 1 second headroom. Retries or OS background limits can still break the budget.
  common_mistake: |
    **The Pitfall:** Eyeballing payload size against throughput without performing the division to check against system time constraints.
    **The Rationale:** Candidates focus on bandwidth but overlook OS-level background execution time limits.
    **The Consequence:** Failing to verify if the task completes before the OS forcefully terminates the background process.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Payload Size: 12 MB.
       - Network Throughput: 6 MB/s.
       - Background OS Budget: 3 seconds.
    2. **Calculations:**
       - Transfer Time: 12 MB / 6 MB/s = 2 seconds.
       - Headroom: 3 seconds - 2 seconds = 1 second.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound (Feasible)**
       - The 2-second transfer completes within the 3-second budget, provided no retry loops exhaust the 1-second headroom.
