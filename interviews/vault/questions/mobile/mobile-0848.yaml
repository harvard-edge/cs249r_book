title: Mobile Sync Burst
scenario: A mobile app syncs 12 MB of model telemetry when the user returns to Wi-Fi.
  Effective upload throughput is 6 MB/s. Estimate sync time and whether it fits a
  3-second background budget.
question: Can a 12 MB mobile telemetry sync finish within 3 seconds at 6 MB/s?
details:
  realistic_solution: The sync takes 12 / 6 = 2 seconds, so it fits the 3-second budget
    with 1 second headroom. Retries or OS background limits can still break the budget.
  common_mistake: Comparing payload size to throughput without calculating elapsed
    time.
  napkin_math: 12 MB / 6 MB/s = 2 s.
