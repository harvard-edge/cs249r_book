title: Mobile Sync Burst
scenario: A mobile app syncs 12 MB of model telemetry when the user returns to Wi-Fi. Effective upload throughput is 6 MB/s.
question: Can a 12 MB mobile telemetry sync finish within a 3-second background budget at 6 MB/s?
details:
  realistic_solution: The sync takes 12 / 6 = 2 seconds, so it fits the 3-second budget with 1 second headroom. Retries or OS background limits can still break the budget.
  common_mistake: |
    **The Pitfall:** Comparing payload size directly to throughput without calculating elapsed time.
    **The Rationale:** Candidates might quickly eyeball the numbers and overlook the simple division required to find the latency.
    **The Consequence:** Failing to accurately verify if the sync fits within the OS background execution limits.
  napkin_math: |
    - Sync size: 12 MB.
    - Throughput: 6 MB/s.
    - Time = 12 MB / 6 MB/s = 2 s.
    - **2 seconds fits within the 3-second budget.**
