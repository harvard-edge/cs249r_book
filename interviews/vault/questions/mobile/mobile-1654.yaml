title: MLOps Pipeline for Edge ML on Samsung Exynos NPU
scenario: Your team is developing a critical mobile application that relies on a large
  language model (LLM) for real-time, on-device inference. This model is deployed
  on the Samsung Exynos 2400 NPU, which boasts 34.7 TOPS (Tera Operations Per Second)
  and 12 GB LPDDR5X memory. Due to the rapid evolution of LLMs and frequent updates
  to the application's features, the model undergoes weekly retraining and deployment
  cycles. Design a comprehensive MLOps pipeline that ensures reliable and reproducible
  model delivery to the mobile devices. Focus on specifying the components and processes
  for model registries, CI/CD for mobile ML, experiment tracking, guaranteeing reproducibility,
  and maintaining training-serving consistency, all while considering the specific
  constraints and capabilities of the Exynos NPU.
question: How would you design a comprehensive MLOps pipeline that ensures reliable
  and reproducible model delivery to the mobile devices?
details:
  realistic_solution: "A robust solution would involve:\n1.  **Model Registry**: A\
    \ centralized registry storing versioned, immutable model artifacts. Each entry\
    \ includes the model binary (optimized for Exynos NPU, e.g., TFLite, ONNX), quantization\
    \ schema, performance benchmarks on target hardware, training data lineage, and\
    \ associated metadata (e.g., average inference time on Exynos 2400). It must support\
    \ version rollback.\n2.  **CI/CD for ML**: \n    *   **CI**: Automated pipelines\
    \ triggered by model updates or code changes. Includes model validation (e.g.,\
    \ `mlc_llm` or custom benchmarks) on Exynos 2400 emulator/device farms, ensuring\
    \ inference latency, memory footprint, and NPU utilization are within acceptable\
    \ limits. Tests for backward compatibility and potential regressions.\n    * \
    \  **CD**: A multi-stage deployment process. Initial internal releases (alpha/beta)\
    \ use differential OTA updates (to minimize download size) to a small user group.\
    \ Progressive rollout (canary deployments) for production, monitoring real-world\
    \ device performance and user feedback. Robust rollback strategy for faulty models.\n\
    3.  **Experiment Tracking**: A platform (e.g., MLflow, ClearML) to log all experiment\
    \ runs, including hyperparameters, model architecture, training dataset versions,\
    \ and evaluation metrics. Link specific experiments to registered model versions.\n\
    4.  **Reproducibility**: Use version-controlled code, data versioning (e.g., DVC),\
    \ and containerized training environments (e.g., Docker) to ensure models can\
    \ be retrained with identical results. Store exact environment configurations\
    \ and dependencies with each model version.\n5.  **Training-Serving Consistency**:\
    \ Enforce identical pre-processing and post-processing logic in training and serving.\
    \ Implement quantization-aware training to mitigate performance degradation from\
    \ quantization. Automated data and model drift detection on production data streams,\
    \ triggering alerts or retraining.\n6.  **Exynos NPU Optimization**: Leverage\
    \ the NPU's specific SDKs and toolchains (e.g., TensorFlow Lite Micro, ONNX Runtime\
    \ Mobile) for model conversion, quantization, and deployment. Monitor NPU core\
    \ utilization and power consumption during inference."
  common_mistake: A common mistake is to treat mobile ML deployment pipelines identically
    to cloud-based ones, overlooking critical differences such as limited device resources
    (compute, memory, battery), intermittent network connectivity for updates, diverse
    device fragmentation, and the need for highly optimized, quantized models. This
    often leads to inefficient model updates, poor on-device performance, increased
    battery drain, and lack of robust rollback mechanisms for edge deployments.
  napkin_math: 'Given a 34.7 TOPS NPU and a model requiring 100 GFLOPs (0.1 TOPS)
    per inference:

    *   **Max theoretical inferences/sec**: (34.7 TOPS / 0.1 TOPS/inference) = 347
    inferences/sec. This provides a ceiling for real-time performance.

    *   **Memory for intermediate activations**: If an LLM layer has a 4096-dimension
    hidden state and a batch size of 1, storing intermediate activations for ~20 transformer
    blocks could consume approximately 20 * 4096 * 4096 * 4 bytes (FP32) ≈ 1.3 GB.
    Considering 12 GB LPDDR5X, this implies careful memory management and potentially
    lower precision (e.g., INT8) quantization to fit larger models or more concurrent
    operations. For a 7B parameter LLM (typical FP32 size ~14GB), quantization to
    INT8 (approx 7GB) would still exceed memory, necessitating smaller models, aggressive
    pruning/distillation, or sophisticated offloading strategies (e.g., to DRAM).'
