title: MLOps Pipeline for Edge ML on Samsung Exynos NPU
scenario: 'Your team is developing a critical mobile application that relies on a large language model (LLM) for real-time, on-device inference. This model is deployed on the Samsung Exynos 2400 NPU, which boasts 34.7 TOPS and 12 GB LPDDR5X memory. Due to the rapid evolution of LLMs and frequent updates to the application''s features, the model undergoes weekly retraining and deployment cycles.'
question: 'How would you design a comprehensive MLOps pipeline that ensures reliable and reproducible model delivery to the mobile devices?'
details:
  realistic_solution: 'A robust solution utilizes centralized immutable model registries, Hardware-In-The-Loop CI/CD validations on Exynos devices, differential OTA updates to reduce bandwidth, and stringent reproducibility constraints (DVC, Docker). It forces quantization-aware training to manage the 12GB memory limit.'
  common_mistake: |
    **The Pitfall:** Porting cloud-native MLOps pipelines directly to mobile deployments.
    **The Rationale:** Candidates ignore edge-specific constraints such as device fragmentation, battery drain, intermittent networks, and the requirement for hardware-aware binary optimization.
    **The Consequence:** Massive app updates exhaust cellular data budgets, cause out-of-memory errors on varied devices, and trigger severe battery drain without any rollback mechanism.
  napkin_math: |
    1. **Compute Ceiling:** At 34.7 TOPS, a 100 GFLOP (0.1 TOPS) model can theoretically reach ~347 inferences/sec.
    2. **Memory Constraints:** A 7B parameter FP32 LLM uses ~14GB (exceeding the 12GB total RAM). Quantization to INT8 drops this to ~7GB.
    3. **Activation Cache:** 20 layers × 4096 dim × batch 1 in FP32 requires an additional ~1.3 GB.
    4. **Conclusion:** Without aggressive INT8 compilation in the CI/CD pipeline, the model physically cannot load on the device.
