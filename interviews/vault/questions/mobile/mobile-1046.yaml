title: 'Mobile TCO Optimization: Reduce Battery Drain for Intensive Mobile ML'
scenario: A mobile navigation app runs a continuous pedestrian detection model on A17 Pro (3W for inference) at 10 FPS while driving for 8 hours. The battery provides 3349mAh at 3.8V (12.7Wh).
question: How would you quantify the TCO impact for 1M daily active users in electricity terms while reducing battery drain?
details:
  realistic_solution: 'Continuous at 10 FPS: 3W * 8hr = 24Wh > 12.7Wh battery. Phone dies in 12.7/3=4.23 hours. NOT feasible. Fix: acoustic trigger at 1 FPS baseline (road noise model at 0.1W), spike to 10 FPS only when pedestrians detected. Acoustic model: 0.1W. 1 FPS continuous: 0.3W (proportional). Total: 0.4W * 8hr = 3.2Wh = 25.2% of battery. Acceptable! FPS: spike to 10 FPS for 10 seconds per pedestrian event (avg 100 events/8hr = 1.39/hr). Spike energy: 100 * 10s * 3W = 3000J = 0.833Wh. Total: 3.2 + 0.833 = 4.03Wh = 31.7% battery for 8hr drive.'
  common_mistake: |
    **The Pitfall:** Overlooking the physical limits of device battery capacity.
    **The Rationale:** Engineers often calculate power efficiency without checking if the total energy consumed exceeds the total battery capacity.
    **The Consequence:** A design that mathematically drains the entire phone battery in a fraction of the required runtime, making the app unusable.
  napkin_math: |
    **Assumptions & Constraints:**
    - Mobile battery: 12.7Wh.
    - 8-hour drive.
    - 10 FPS continuous consumes 3W; 1 FPS baseline consumes 0.4W.
    - Spikes to 10 FPS for 10 seconds per pedestrian event (100 events).

    **Calculations:**
    - Continuous 10 FPS energy: 3W * 8hr = 24Wh (exceeds 12.7Wh battery).
    - Proposed 1 FPS baseline energy: 0.4W * 8hr = 3.2Wh (25.2% of battery).
    - Spikes to 10 FPS energy: 100 * 10s * 3W = 3000 Joules = 0.833Wh.
    - Total optimized energy: 3.2Wh + 0.833Wh = 4.033Wh (31.7% of battery).
    - Fleet daily energy: 4.033Wh * 1,000,000 users = 4,033 kWh/day.

    **Conclusion & Interpretation:**
    - **Result: 4.033Wh per user (Power-Bound)**. Acoustic triggering vastly reduces battery drain, keeping energy within safe limits.
