title: 'Mobile TCO Optimization: Reduce Battery Drain for Intensive Mobile ML'
scenario: 'A mobile navigation app runs a continuous pedestrian detection model on
  A17 Pro (35 TOPS, 3W for inference) at 10 FPS while driving (8 hours). Battery:
  3349mAh @ 3.8V = 12.7Wh. Calculate: (1) inference energy consumption, (2) % of battery
  used, (3) power savings from reducing to 2 FPS (only when needed via acoustic trigger).
  Quantify the TCO impact for 1M daily active users in electricity terms.'
question: How would you quantify the TCO impact for 1M daily active users in electricity
  terms?
details:
  realistic_solution: 'Continuous at 10 FPS: 3W * 8hr = 24Wh > 12.7Wh battery. Phone
    dies in 12.7/3=4.23 hours. NOT feasible. Fix: acoustic trigger at 2 FPS baseline
    (road noise model at 0.1W), spike to 10 FPS only when pedestrians detected. Acoustic
    model: 0.1W. 2 FPS continuous: 0.3W (proportional). Total: 0.4W * 8hr = 3.2Wh
    = 25.2% of battery. Acceptable! FPS: spike to 10 FPS for 10 seconds per pedestrian
    event (avg 100 events/8hr = 1.39/hr). Spike energy: 100 * 10s * 3W = 3000J = 0.833Wh.
    Total: 3.2 + 0.833 = 4.03Wh = 31.7% battery for 8hr drive.'
  common_mistake: Not recognizing that 3W continuous inference over 8 hours = 24Wh
    exceeds the phone's battery capacity of 12.7Wh, meaning the phone would die in
    ~4 hours — clearly not feasible, requiring optimization.
  napkin_math: 'Baseline 10 FPS: 3W*8hr=24Wh > 12.7Wh. INFEASIBLE. 2 FPS: 3W*2/10=0.6W
    for vision + 0.1W trigger model=0.7W. 8hr: 5.6Wh=44% battery. Still high. 1 FPS:
    0.3W+0.1W=0.4W. 8hr=3.2Wh=25.2%. Acceptable (leave 75% for phone calls). Plus
    spikes: 100 events*10s*3W=3000J=0.833Wh. Total=4.03Wh=31.7%. For 1M DAU: 4.03Wh*1M=4030
    MWh/day. At $0.10/kWh: $403K/day=$147M/year in user electricity costs. Cloud alternative:
    10FPS*8hr*3600s=288K inferences/user. 1M users: 288B inferences at $0.001/1K=$288K/day=$105M/year.
    Cloud cheaper in this high-volume continuous inference scenario!'
