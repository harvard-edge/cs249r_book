title: A17 Pro LLM Quantization Protocol
scenario: A team wants to deploy a 7B parameter LLM on an iPhone 15 Pro, balancing weight size and perplexity.
question: Design an evaluation protocol to determine if 4-bit block-wise quantization with FP16 activations provides a strictly better latency-accuracy tradeoff than pure INT8 quantization on the A17 Pro Neural Engine.
details:
  realistic_solution: Design a benchmark computing token-generation latency and WikiText perplexity. Pure INT8 requires a 7GB footprint; 4-bit weights with FP16 activations require 3.5GB. Since memory bandwidth dominates autoregressive decoding, the protocol must log A17 Pro memory bus utilization to prove that fetching 3.5GB in 4-bit format yields >1.5x speedup over INT8, offsetting the on-chip dequantization compute cost.
  common_mistake: |
    **The Pitfall:** Focusing solely on FLOPs instead of memory bandwidth.
    **The Rationale:** Candidates often measure compute operations, forgetting that autoregressive decoding is memory-bandwidth bound on mobile SoCs.
    **The Consequence:** Recommending a model based on theoretical compute efficiency rather than actual token generation latency.
  napkin_math: |
    1. **Pure INT8 Size:** 7B params * 1 byte = 7 GB.
    2. **4-bit Weights Size:** 7B params * 0.5 bytes = 3.5 GB.
    3. **Conclusion:** **The protocol must measure if fetching 3.5 GB of 4-bit weights yields a >1.5x speedup over INT8 to offset the on-chip FP16 dequantization cost.**
