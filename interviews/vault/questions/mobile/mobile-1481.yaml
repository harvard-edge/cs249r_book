title: Exynos 2400 Unified Memory Capacity Recall
scenario: You are preparing a deployment specification for a generative AI application targeting a mobile NPU. You need to document the hardware's baseline memory architecture.
question: What is the total shared LPDDR5X memory capacity on the Exynos 2400 that the NPU shares with the CPU and GPU?
details:
  realistic_solution: |
    The Exynos 2400 features 12 GB of LPDDR5X unified memory, heavily constrained by the active OS state.
  common_mistake: |
    **The Pitfall:** Assuming mobile NPUs have dedicated VRAM.
    **The Rationale:** Candidates often port desktop intuition to mobile, failing to recall that mobile SoCs use a unified memory architecture.
    **The Consequence:** Deployment specifications will incorrectly estimate the maximum model size, leading to inevitable OOM crashes in production when the NPU competes with the OS.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Capacity: 12 GB LPDDR5X.
    - Android OS & ISP reservation: ~6 GB.

    **Calculations:**
    - Remaining Pool: 12 GB - 6 GB = 6 GB usable.
    - Safe Model Threshold: 6 GB - 2 GB (CPU buffers) = 4 GB max model size.

    **Conclusion & Interpretation:**
    - **Result: Unified Memory OOM.** NPUs lack dedicated VRAM. Attempting to deploy a model based on raw SoC specs (12GB) guarantees an OOM crash.
