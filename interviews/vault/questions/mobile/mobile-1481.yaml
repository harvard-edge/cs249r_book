title: Exynos 2400 Unified Memory Capacity Recall
scenario: You are preparing a deployment specification for a generative AI application targeting a mobile NPU. You need to document the hardware's baseline memory architecture to estimate the out-of-memory threshold.
question: What is the total shared LPDDR5X memory capacity on the Samsung Exynos 2400 that the NPU shares with the CPU and GPU?
details:
  realistic_solution: The Exynos 2400 features 12 GB of LPDDR5X unified memory, heavily constrained by the active OS state.
  common_mistake: |
    **The Pitfall:** Assuming mobile NPUs have dedicated VRAM.
    **The Rationale:** Candidates often port desktop intuition to mobile, failing to recall that mobile SoCs use a unified memory architecture.
    **The Consequence:** Deployment specifications will incorrectly estimate the maximum model size, leading to inevitable OOM crashes in production when the NPU competes with the OS.
  napkin_math: |
    1. Identify total capacity: **12 GB LPDDR5X**.
    2. Estimate system reservations: Android OS reserves ~4.5 GB. Camera ISP requires ~1.5 GB.
    3. Calculate remaining pool: 12 GB - (4.5 GB + 1.5 GB) = **6.0 GB**.
    4. Evaluate model fit: Attempting to load a 4 GB model leaves only 2 GB for CPU processes and NPU activations before OOM eviction occurs.
