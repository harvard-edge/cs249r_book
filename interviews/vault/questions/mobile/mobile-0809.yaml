title: Mobile New 0009
scenario: A Cortex-M4 uses DMA to load memory tiles for a conv layer. Processing time per tile is double the theoretical minimum. The CPU sleep profile shows the core is entirely blocked waiting for the DMA transfer to complete before computing.
question: Why does DMA fail to hide memory latency when the Cortex-M4 waits for each tile before computing?
details:
  realistic_solution: 'The symptom is low throughput with the CPU idling during memory transfers. The root cause is the failure to implement double-buffering (ping-pong buffering). The software uses a single buffer: it asks DMA to fetch data, blocks the CPU until done, then computes. It should fetch buffer B while computing buffer A to overlap memory access with computation.'
  common_mistake: |
    **The Pitfall:** Assuming DMA automatically hides memory latency.
    **The Rationale:** Developers believe hardware features like DMA are "fire and forget" and don't require specific software architecture to yield benefits.
    **The Consequence:** Failing to structure the software pipeline (e.g., double-buffering) to overlap memory access with computation, wasting CPU cycles.
  napkin_math: |
    - Single buffer steady-state: T_per_tile = T_dma (10k cycles) + T_compute (10k cycles) = 20k cycles.
    - Ping-pong buffer steady-state: T_per_tile = max(T_dma, T_compute) = 10k cycles (plus small fill/drain overhead).
    - **Missing ping-pong buffering halves the throughput (20k vs 10k cycles per tile).**
