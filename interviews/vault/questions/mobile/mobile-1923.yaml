title: Android OOM Gradient Resumption
scenario: Implementing a federated learning client on Android that trains overnight but gets frequently killed by the Android Out-Of-Memory (OOM) killer.
question: Design a fine-grained gradient checkpointing mechanism to the local flash storage that minimizes write amplification while allowing resume from the exact mini-batch.
details:
  realistic_solution: Avoid writing full model weights (100s of MBs) per batch to preserve UFS flash longevity. Instead, write a tiny JSON state file with the current epoch and batch index. Only write the accumulated 32-bit gradient diffs to a persistent memory-mapped file every 10 batches. If killed, the app loads the base weights and applies the saved gradient diffs.
  common_mistake: |
    **The Pitfall:** Writing the entire 50MB model checkpoint to flash after every mini-batch.
    **The Rationale:** Candidates rely on standard server-side checkpointing patterns without accounting for limited mobile flash endurance.
    **The Consequence:** Quickly destroys the phone's storage hardware through extreme write amplification.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Diff Checkpoint Size: 10MB grads per save.
       - Save Frequency: 10 writes during the target window.
    2. **Calculations:**
       - Total Write Footprint: 10MB * 10 writes = 100MB flash usage.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound.** 100MB write usage preserves UFS flash compared to gigabytes from full checkpoints.
