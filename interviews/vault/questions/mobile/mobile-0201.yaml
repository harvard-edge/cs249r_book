title: 'The Watchdog''s Power Tax: Monitoring & Observability'
scenario: "You're designing an always-on fall detection feature for a health app. To ensure its reliability, you implement a software watchdog. Every second, the watchdog process wakes up for 10ms to check a 'heartbeat' flag from the inference service, consuming 0.5W during this brief check. For the remaining 990ms, the watchdog is asleep and consumes zero power."
question: "How would you calculate the total energy, in Watt-hours (Wh), consumed only by the watchdog process over a 24-hour period?"
details:
  realistic_solution: The solution requires calculating the average power consumption by applying the duty cycle, and then multiplying by the total time. The watchdog is active for 10ms every 1000ms, so its duty cycle is 1%. The average power is this fraction of the active power. This average power, multiplied by 24 hours, gives the total energy drain in Watt-hours.
  common_mistake: |
    **The Pitfall:** Forgetting to apply the duty cycle when calculating average power.
    **The Rationale:** Engineers calculate the cost as if the component is active 100% of the time, or they use peak SoC power instead of the specific component's power.
    **The Consequence:** A massive overestimation of battery drain.
  napkin_math: |
    - Duty Cycle: The process is active for 10ms out of 1000ms. Duty cycle = `10 / 1000 = 1%`.
    - Average Power: `0.5W * 0.01 = 0.005W`.
    - Total Energy (24 hours): `0.005W * 24h = 0.12 Wh`.
    - **Conclusion:** The watchdog consumes **0.12 Wh** over 24 hours.
  options:
  - 12 Wh
  - 0.72 Wh
  - 0.12 Wh
  - 432 Wh
  correct_index: 2
