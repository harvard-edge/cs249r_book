title: 'The Watchdog''s Power Tax: Monitoring & Observability'
scenario: You're designing an always-on fall detection feature for a health app. To ensure its reliability,
  you implement a software watchdog. Every second, the watchdog process wakes up for 10ms to check a 'heartbeat'
  flag from the inference service, consuming 0.5W during this brief check. For the remaining 990ms of
  the second, the watchdog process is asleep and its power consumption is negligible. Contrast this with
  the full SoC power of 3W when running a game. Calculate the total energy, in Watt-hours (Wh), consumed
  *only by the watchdog process* over a 24-hour period.
question: "How would you calculate the total energy, in Watt-hours (Wh), consumed *only by the watchdog process* over a 24-hour period?"
details:
  realistic_solution: The solution requires calculating the average power consumption by applying the
    duty cycle, and then multiplying by the total time. The watchdog is active for 10ms every 1000ms,
    so its duty cycle is 1%. The average power is this fraction of the active power. This average power,
    multiplied by 24 hours, gives the total energy drain in Watt-hours.
  common_mistake: Engineers often calculate power consumption for the 'active' state but forget to apply
    the duty cycle. They calculate the cost as if the component is active 100% of the time, leading to
    a massive overestimation of battery drain. Another common mistake is using the wrong power number
    (e.g., peak SoC power) instead of the specific component's power for its brief active period.
  napkin_math: 1. **Calculate Duty Cycle:** The process is active for 10ms out of every 1000ms.
  options:
  - 12 Wh
  - 0.72 Wh
  - 0.12 Wh
  - 432 Wh
  correct_index: 2
