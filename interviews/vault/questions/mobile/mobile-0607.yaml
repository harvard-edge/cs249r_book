title: The Budget Phone Mystery
scenario: Your image classification model runs in 4ms on a Pixel 8 Pro. On a budget phone with a MediaTek Dimensity 700—which claims 'AI accelerator support'—the same model takes 40ms. Both phones advertise NPU capability.
question: Why is there a 10x performance gap between a flagship and a budget phone when both advertise NPU acceleration?
details:
  realistic_solution: 'Five factors create the gap: Pixel 8 Pro: 95% NPU delegation, 51.2 GB/s bandwidth, no throttling → 4ms. Budget phone: 60% NPU delegation (40% CPU fallback adds ~15ms), 17 GB/s bandwidth (3× slower memory access adds ~8ms), bus contention adds latency, and thermal throttling further degrades sustained performance.'
  common_mistake: |
    **The Pitfall:** Concluding the budget phone's NPU simply has a lower raw TOPS count.
    **The Rationale:** Engineers assume a linear scaling of compute capability based on marketing specs, missing the holistic system integration factors.
    **The Consequence:** Attempting to prune the model's FLOPs instead of fixing operator support to prevent massive CPU fallback penalties.
  napkin_math: |
    **Assumptions & Constraints:**
    - Flagship: 95% NPU delegation, 51.2 GB/s bandwidth -> 4ms latency.
    - Budget CPU Fallback: 40% CPU fallback due to unsupported ops.
    - Budget Bandwidth: 17 GB/s.

    **Calculations:**
    - CPU Fallback Penalty: Adds ~15ms.
    - Bandwidth Penalty: 3x slower memory access adds ~8ms.
    - Thermal/Bus Contention: Adds ~12ms.

    **Conclusion & Interpretation:**
    - **Result: ~40ms (I/O and Compute-Bound)**. Architectural constraints compound (15 + 8 + 12 + 4), turning a 4ms inference into a ~40ms bottleneck.
