title: The Mobile Memory Diet
scenario: You're optimizing a new computer vision model for a mobile app. The model has 15 million parameters and is currently stored in FP16 format, occupying 30 MB of storage. To reduce the app's download size, your team decides to convert the entire model to INT8.
question: How would you compare the memory requirements and calculate the model's final storage size in megabytes after full INT8 quantization?
details:
  realistic_solution: The calculation is a direct comparison of data type sizes. FP16 (half-precision floating-point) uses 16 bits, or 2 bytes, per parameter. INT8 (8-bit integer) uses 8 bits, or 1 byte, per parameter. By converting from FP16 to INT8, you are halving the storage requirement for the model weights.
  common_mistake: |
    **The Pitfall:** Applying a 4x reduction factor out of habit.
    **The Rationale:** Engineers confuse FP32-to-INT8 savings with FP16-to-INT8, forgetting the starting size is already half.
    **The Consequence:** Incorrectly predicting a 7.5 MB final size.
  napkin_math: |
    1. Parameters: 15,000,000.
    2. Original FP16 Size: 15,000,000 params * 2 bytes/param = 30 MB.
    3. New INT8 Size: 15,000,000 params * 1 byte/param = 15 MB.
    4. Calculate Savings: 30 MB - 15 MB = 15 MB.
    **Final Result:** 15 MB.
  options:
  - 7.5 MB
  - 30 MB
  - 15 MB
  - 60 MB
  correct_index: 2
