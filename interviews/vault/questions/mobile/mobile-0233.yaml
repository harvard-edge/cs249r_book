title: The Drowsy Driver's Battery Drain
scenario: 'You''re building a ''driver safety'' feature for a mobile app that detects signs of drowsiness.
  The ML inference process consumes 2W of power from the SoC''s NPU when active. To conserve battery,
  you decide to implement a duty cycle: the model runs for 1 second and then the system sleeps for 9 seconds.
  Calculate the total energy in Watt-hours (Wh) this feature will consume from the phone''s battery over
  the course of an 8-hour road trip.'
question: "How would you calculate the total energy in Watt-hours (Wh) this feature will consume from the phone's battery over the course of an 8-hour road trip?"
details:
  realistic_solution: The correct approach is to first calculate the average power consumption by factoring
    in the duty cycle, and then multiply by the total time to find the energy consumed.
  common_mistake: The most common mistake is to calculate the energy consumption without applying the
    duty cycle, assuming the feature runs continuously. This leads to a 10x overestimation of the battery
    drain (2W * 8h = 16 Wh). Another frequent error is confusing power (a rate, in Watts) with energy
    (a quantity, in Watt-hours) and submitting the average power draw as the final answer.
  napkin_math: 1. **Duty Cycle:** 1s active / (1s active + 9s sleep) = 1s / 10s = 0.1
  options:
  - 16 Wh
  - 0.2 Wh
  - 1.6 Wh
  - 1.8 Wh
  correct_index: 2
