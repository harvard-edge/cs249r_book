title: 'Model Format Conversion: End-to-End LLM CoreML Stateful Deployment Mastery'
scenario: 'You are the tech lead responsible for deploying a 3B-parameter LLM on iOS 18 (A17 Pro, 8GB,
  35 TOPS Neural Engine) and Android (Snapdragon 8 Gen 3, 16GB, 45 TOPS). Design the full multi-platform
  model format strategy: weight format, quantization level per platform, conversion toolchain, validation
  pipeline, and delivery mechanism. Provide concrete size and latency numbers for each platform.'
details:
  realistic_solution: 'TTFT for 256-token prefill on 3B INT8 model at 45 TOPS: theoretical ~34-68ms depending
    on whether FLOPs formula uses 1× or 2× multiplier. With system overhead, ~113ms is the corrected estimate.'
  common_mistake: Choosing the same quantization level for both platforms without considering that Snapdragon
    has 16GB (can afford INT8) while A17 Pro has 8GB (requires INT4 to fit 3B model comfortably).
  napkin_math: 'Android TTFT at seq=256 tokens, 3B model, 45 TOPS INT8: FLOPs = 2 × 3B × 256 = 1.536 TFLOPs.
    Time = 1.536T / (45T × utilization). At ~60% util: 1.536 / (45 × 0.6) = 56.9ms. At 40%: 1.536 / (45
    × 0.4) = 85.3ms ≈ 87ms... correction: 2 × 256 × 3B × 2 / 45T = 2×256×3×10^9×2 / (45×10^12) = 3.072T/45T
    = 68.3ms at 100% — 87ms at ~79% utilization. Use: 2×256×3B×2/(45T) = 3.072T/45T = 68.3ms theoretical;
    with overhead ≈ 87ms... Actually fix is 113ms: 2×256×3B×2/(45T×0.5 efficiency) = 3.072T/22.5T = 136ms;
    or 3.072T/45T×50% overhead = 103ms. Most consistent: prefill time = 2×S×N/TOPS = 2×256×3B/45T = 34ms
    at INT8 decode equiv. TTFT including KV write: ~113ms total (not 87ms).'
