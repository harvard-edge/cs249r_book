title: Real-Time Translation Degradation on Snapdragon 8 Gen 3
scenario: You are designing a real-time live captioning system targeting the Qualcomm Hexagon NPU. The primary INT8 model requires 15 TOPS for optimal latency, but the NPU and the shared 12 GB LPDDR5X memory are frequently contested by camera processing and heavy gaming workloads. Design a specification for a graceful degradation system that guarantees continuous captioning availability when the system enters thermal throttling or when memory bandwidth is severely constrained.
question: How would you design a real-time translation degradation ladder on Snapdragon 8 Gen 3?
details:
  realistic_solution: 'Design a 3-tier degradation ladder. Tier 1: Primary 15 TOPS model on the Hexagon NPU. Tier 2: Fallback to a pre-loaded 3 TOPS distilled model running on the CPU. Tier 3: Fallback to a rudimentary regex-based keyword spotter or basic heuristic model requiring negligible RAM.'
  common_mistake: |
    **The Pitfall:** Proposing downloading a smaller model on the fly or immediately falling back to a cloud API.
    **The Rationale:** Candidates ignore offline requirements and the severe latency penalty of loading a new model into memory during an already constrained state.
    **The Consequence:** System crash or catastrophic latency spikes when the network is unavailable.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Primary Model: 15 TOPS, 800 MB.
       - CPU Model: 3 TOPS, 50 MB.
       - NPU: 45 TOPS INT8.
    2. **Calculations:**
       - Available under gaming load = 45 TOPS - 35 TOPS = 10 TOPS (Primary fails).
       - CPU model 3 TOPS < 10 TOPS (Passes).
       - Memory availability under load = 500 MB (Primary 800 MB fails, CPU 50 MB passes).
    3. **Conclusion & Interpretation:**
       - **Result: CPU Fallback. Compute-Bound/Memory-Bound.** The pre-loaded CPU model ensures continuous operation under constraints.
