title: Real-Time Translation Degradation on Snapdragon 8 Gen 3
scenario: You are designing a real-time live captioning system targeting the Qualcomm
  Hexagon NPU on the Snapdragon 8 Gen 3. The primary INT8 model requires 15 TOPS for
  optimal latency, but the NPU (capable of 45 TOPS INT8) and the shared 12 GB LPDDR5X
  memory are frequently contested by camera processing and heavy gaming workloads.
  Design a specification for a graceful degradation system that guarantees continuous
  captioning availability when the system enters thermal throttling or when memory
  bandwidth is severely constrained.
question: How would you design a real-time translation degradation ladder on Snapdragon
  8 Gen 3?
details:
  realistic_solution: 'Design a 3-tier degradation ladder. Tier 1: Primary 15 TOPS
    model on the Hexagon NPU. Tier 2 (NPU Contended/Thermal limits): Fallback to a
    pre-loaded 3 TOPS distilled model running on the CPU, shedding quality for guaranteed
    latency. Tier 3 (Severe Memory Pressure): Fallback to a rudimentary regex-based
    keyword spotter or basic heuristic model requiring negligible RAM, ensuring fail-operational
    status rather than system crash.'
  common_mistake: Candidates often propose downloading a smaller model on the fly
    or immediately falling back to a cloud API, ignoring offline requirements and
    the severe latency penalty of loading a new model into memory during an already
    constrained state.
  napkin_math: The NPU provides 45 TOPS INT8. If a background game consumes 35 TOPS,
    only 10 TOPS remain, which is insufficient for the primary 15 TOPS model, causing
    frame drops. By falling back to the CPU model requiring 3 TOPS, we avoid NPU contention.
    For memory, if the shared 12 GB LPDDR5X pool has only 500 MB free, the primary
    model (e.g., 800 MB) will trigger an OOM kill. The pre-loaded CPU model (e.g.,
    50 MB) easily fits within the remaining budget, ensuring continuous operation.
