title: 'MLOps Lifecycle: Optimize Mobile App CI/CD Pipeline for ML Model Updates'
scenario: 'A mobile ML team''s current CI/CD pipeline for CoreML model updates takes 4.5 hours: model
  training (2hr), ONNX export (5min), CoreML conversion (15min), automated testing on device farm (1.5hr),
  App Store submission (30min). The target is < 2 hours total. Profile and optimize each stage.'
details:
  realistic_solution: 3 epochs × 180s = 540s = 9 minutes total fine-tuning time on device.
  common_mistake: Trying to speed up model training (which requires GPUs and has hard compute constraints)
    when the device farm testing stage (1.5hr) is more easily optimized with parallelization.
  napkin_math: 'Fine-tuning schedule: 3 epochs × 180 seconds/epoch = 540 seconds = 9 minutes total (not
    90 minutes which would be 10× too long, implying 30 minutes per epoch).'
