title: 'Federated LLM Personalization on Google Tensor G3: Scaling and Non-IID Challenges'
scenario: You are designing a system to continuously fine-tune a 500M parameter LLM for personalized text suggestions on millions of mobile devices. The devices feature a Google Tensor G3 chip (7.5 TOPS, 12 GB LPDDR5X RAM). Due to strict privacy concerns and highly non-IID user data, federated learning using federated averaging is mandated.
question: How would you 'size' the overall system to handle the expected scale and data characteristics?
details:
  realistic_solution: 'Implement communication-efficient federated learning techniques such as sparse model updates (e.g., top-k gradient selection), quantization of gradients (e.g., 8-bit or 4-bit), and periodic averaging rather than per-round synchronization to reduce uplink traffic. To mitigate non-IID challenges, consider personalized federated learning strategies (e.g., FedProx, MOCHA) or a tiered approach where a global model is learned and then personalized on-device with a smaller, user-specific head. On the Google Tensor G3, leverage the on-device TPU for accelerated local training, ensuring model updates are computed efficiently. The 12GB LPDDR5X RAM can comfortably hold the 1GB FP16 model, allowing for in-memory processing of gradients. System sizing would involve estimating the average update size, aggregation frequency, and server-side processing power required to handle concurrent client connections and aggregations, potentially using hierarchical aggregation for massive scale.'
  common_mistake: |
    **The Pitfall:** Overlooking the cumulative communication bandwidth required for full model updates and non-IID divergence.
    **The Rationale:** Candidates treat FL as standard distributed training, ignoring the massive uplink costs and data heterogeneity of cross-device settings.
    **The Consequence:** The server is overwhelmed by network congestion, and the global model diverges due to non-IID data.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10M active clients, 100,000 clients per round.
    - 10MB update per client.
    - 500M param FP16 model requires ~50 GFLOPs per step.
    - Tensor G3 throughput: ~3.75 TFLOPs for FP16 (from 7.5 TOPS INT8).

    **Calculations:**
    - Server uplink: 10M active clients x 10MB update = 100 TB per day.
    - Round aggregation: 100,000 clients/round x 10MB = 1TB ingested per round.
    - Training step time: 50e9 / 3.75e12 = 13.3 milliseconds.

    **Conclusion & Interpretation:**
    - **Result: 100 TB/day (Network Bandwidth-Bound)**. Local computation is trivial (~13.3ms), making communication bandwidth the true system bottleneck.
