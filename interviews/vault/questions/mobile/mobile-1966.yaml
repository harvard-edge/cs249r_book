title: Mobile KV Cache Quantization
scenario: A 3B parameter chatbot runs on a Snapdragon 8 Gen 3 with a rigid 500MB Unified Memory limit for its KV cache.
question: Does INT8 KV cache quantization improve or regress net per-token decode latency on Hexagon given the dequantization compute overhead?
visual:
  kind: svg
  path: mobile-1966.svg
  alt: Bar chart showing INT8 accommodating double the context length of FP16 under
    a 500MB budget.
  caption: Context length capacity under a 500MB KV Cache budget.
details:
  realistic_solution: 'INT8 KV halves bandwidth (1 B/elt vs 2 B/elt), so KV reads take half the time. But each attention step now requires dequantizing INT8 back to FP16 before the GEMM, costing ~0.05 ms per layer per token on Hexagon. For a 3B model with 32 layers and ~30 GB/s LPDDR5: FP16 KV bandwidth time ~ 0.5 ms/token; INT8 = 0.25 ms saved + 32 * 0.05 = 1.6 ms dequantization overhead. Net: INT8 KV is 1.35 ms SLOWER per token despite halving bandwidth, because Hexagon dequantization is not free. INT8 KV wins for capacity/context but loses on per-token decode unless dequant fuses with the attention kernel.'
  common_mistake: |
    **The Pitfall:** Counting only the bandwidth reduction.
    **The Rationale:** Candidates forget that dequantizing INT8 back to FP16 for every attention step incurs a compute tax on the NPU.
    **The Consequence:** Concluding that INT8 KV cache strictly improves latency, when it actually regresses per-token decode time without kernel fusion.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 3B parameters, 32 layers.
       - Memory: 500MB KV Cache budget, 30 GB/s LPDDR5 bandwidth.
       - INT8 dequantization cost: ~0.05 ms per layer per token.
    2. **Calculations:**
       - Bandwidth saved: 0.25 ms/token.
       - Dequantization overhead: 32 layers * 0.05 ms = 1.6 ms.
       - Net latency change: 0.25 ms - 1.6 ms = -1.35 ms/token.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound. The dequantization overhead exceeds memory savings, degrading net latency by 1.35 ms/token without kernel fusion.**
