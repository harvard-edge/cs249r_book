title: Mobile KV Cache Quantization
scenario: A 3B parameter chatbot runs on a Snapdragon 8 Gen 3 with a rigid 500MB Unified
  Memory limit for its KV cache.
question: Analyze the bandwidth-vs-compute trade-off of INT8 KV cache quantization
  on Snapdragon's Hexagon NPU - specifically the dequantization compute overhead per
  attention step versus the bandwidth saved on KV reads. Determine whether the net
  per-token decode latency improves or regresses.
visual:
  kind: svg
  path: mobile-1966.svg
  alt: Bar chart showing INT8 accommodating double the context length of FP16 under
    a 500MB budget.
  caption: Context length capacity under a 500MB KV Cache budget.
details:
  realistic_solution: 'INT8 KV halves bandwidth (1 B/elt vs 2 B/elt), so KV reads
    take half the time. But each attention step now requires dequantizing INT8 back
    to FP16 before the GEMM, costing ~0.05 ms per layer per token on Hexagon. For
    a 3B model with 32 layers and ~30 GB/s LPDDR5: FP16 KV bandwidth time ~ 0.5 ms/token;
    INT8 = 0.25 ms saved + 32 * 0.05 = 1.6 ms dequantization overhead. Net: INT8 KV
    is 1.35 ms SLOWER per token despite halving bandwidth, because Hexagon dequantization
    is not free. INT8 KV wins for capacity/context but loses on per-token decode unless
    dequant fuses with the attention kernel.'
  common_mistake: Counting only the bandwidth reduction and missing the compute tax
    of dequantizing INT8 back to FP16 for every attention step.
  napkin_math: BW saved = 0.25 ms/token; dequant overhead = 32 * 0.05 = 1.6 ms. Net
    = -1.35 ms/token (slower) unless fused.
