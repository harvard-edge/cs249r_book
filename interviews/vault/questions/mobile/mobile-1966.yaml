title: Mobile KV Cache Quantization
scenario: A 3B parameter chatbot runs on a Snapdragon 8 Gen 3 with a rigid 500MB Unified
  Memory limit for its KV cache.
question: Analyze how switching KV cache precision from FP16 to INT8 impacts the application's
  maximum conversation length.
visual:
  kind: svg
  path: mobile-1966.svg
  alt: Bar chart showing INT8 accommodating double the context length of FP16 under
    a 500MB budget.
  caption: Context length capacity under a 500MB KV Cache budget.
details:
  realistic_solution: FP16 requires 2 bytes per parameter, whereas INT8 requires 1
    byte per parameter. By quantizing the KV cache to INT8, the memory footprint per
    token is halved. Under the strict 500MB budget, this effectively doubles the maximum
    number of tokens that can be stored, extending the conversation length.
  common_mistake: Believing INT8 only speeds up compute without realizing its massive
    impact on KV cache memory capacity.
  napkin_math: 500MB / 1 byte_per_param = 2 * (500MB / 2 bytes_per_param)
