title: Mobile New 0011
scenario: You quantize a MobileNet to INT8. The model size drops by 4x, but inference latency on the mobile CPU remains identical to the FP32 version. Profiling reveals the CPU's floating-point vector units are fully saturated.
question: Why did INT8 quantization reduce MobileNet size but not CPU inference latency?
details:
  realistic_solution: The symptom of unchanged latency with fully saturated FP32 ALUs indicates the occurrence of fake quantization or a lack of native INT8 operator support. The model weights are stored in INT8 (saving disk/RAM space) but are cast back to FP32 at runtime before the actual multiply-accumulate operations. The CPU executes FP32 math, thereby nullifying any expected compute speedup.
  common_mistake: |
    **The Pitfall:** Assuming that a smaller model file size automatically guarantees faster quantized integer execution.
    **The Rationale:** Engineers see the 4x storage reduction and assume the compute pipeline will naturally utilize INT8 ALUs without verifying native operator support.
    **The Consequence:** The system incurs hidden dequantization overhead at runtime, completely negating any expected compute speedups.
  napkin_math: |
    1. Storage reduction: 10MB FP32 -> 2.5MB INT8 (4x smaller).
    2. Baseline Compute: 100M FP32 MACs takes ~10ms.
    3. Fake Quantization overhead: The engine inserts dequantize nodes (INT8 -> FP32), costing ~1ms.
    4. Total execution: 100M FP32 MACs (10ms) + dequantize overhead (1ms) = **~11ms latency**.
