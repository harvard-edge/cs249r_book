title: Mobile New 0011
scenario: You quantize a MobileNet to INT8. The model size drops by 4x, but inference latency on the mobile
  CPU remains identical to the FP32 version. Profiling reveals the CPU's floating-point vector units are
  fully saturated.
question: "Why did INT8 quantization reduce MobileNet size but not CPU inference latency?"
details:
  realistic_solution: The symptom of unchanged latency with fully saturated FP32 ALUs indicates the occurrence
    of fake quantization or a lack of native INT8 operator support. The model weights are stored in INT8
    (saving disk/RAM space) but are cast back to FP32 at runtime before the actual multiply-accumulate
    operations. The CPU executes FP32 math, thereby nullifying any expected compute speedup.
  common_mistake: Assuming that shrinking the model file size automatically triggers quantized integer
    execution on the hardware.
  napkin_math: 'Storage: 10MB FP32 -> 2.5MB INT8. Compute: 100M FP32 MACs = 10ms. Since the engine inserts
    dequantize nodes (INT8 -> FP32), it executes 100M FP32 MACs + dequant overhead. 10ms + 1ms overhead
    = ~11ms latency.'
