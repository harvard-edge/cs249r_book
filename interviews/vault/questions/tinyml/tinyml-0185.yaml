title: The SRAM Tensor Arena Puzzle
scenario: You're deploying a keyword spotting model on a Cortex-M4 microcontroller. TensorFlow Lite for Microcontrollers requires a single contiguous block of memory called the Tensor Arena for all activations and I/O tensors. Your model has the following execution plan: 1) Input tensor (12 KB). 2) Conv1 reads input, outputs 30 KB tensor. 3) Conv2 reads Conv1 output, outputs 10 KB tensor. 4) Dense reads Conv2 output, outputs 2 KB tensor.
question: What minimum Tensor Arena size is needed for the keyword-spotting execution plan based on peak concurrent tensors?
details:
  realistic_solution: 'The Tensor Arena''s size is determined by the *peak concurrent memory usage* at any point during inference. We must analyze the memory footprint at each step: 1) Input to Conv1: 12 KB input + 30 KB output = 42 KB. 2) Conv1 to Conv2: 30 KB input + 10 KB output = 40 KB. 3) Conv2 to Dense: 10 KB input + 2 KB output = 12 KB. The peak is 42 KB.'
  common_mistake: |
    **The Pitfall:** Summing the sizes of all tensors linearly.
    **The Rationale:** Candidates fail to understand memory aliasing, assuming that once a layer executes, its input is still retained indefinitely alongside all future outputs.
    **The Consequence:** Memory is wildly over-allocated, causing the deployment to needlessly exceed strict MCU SRAM limits.
  napkin_math: |
    - Step 1: Conv1 reads 12KB input, writes 30KB output (live: 12 + 30 = 42KB).
    - Step 2: Conv2 reads 30KB, writes 10KB (live: 30 + 10 = 40KB).
    - Step 3: Dense reads 10KB, writes 2KB (live: 10 + 2 = 12KB).
    - Peak = max(42, 40, 12) = **42KB Arena required**.
  options:
  - 54 KB, the sum of all tensor sizes.
  - 30 KB, the size of the largest tensor.
  - 42 KB, the peak concurrent memory usage during the first layer's operation.
  - 40 KB, the peak concurrent memory usage during the second layer's operation.
  correct_index: 2
