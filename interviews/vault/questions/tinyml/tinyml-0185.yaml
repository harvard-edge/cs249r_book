title: The SRAM Tensor Arena Puzzle
scenario: 'You''re deploying a keyword spotting model on a Cortex-M4 microcontroller. TensorFlow Lite for Microcontrollers requires a single contiguous block of memory called the Tensor Arena for all activations and I/O tensors. Your model has the following execution plan: 1) Input tensor (12 KB). 2) Layer 1 reads input, outputs 30 KB tensor. 3) Layer 2 reads Layer 1 output, outputs 10 KB tensor. 4) Layer 3 reads Layer 2 output, outputs 2 KB tensor.'
question: What minimum Tensor Arena size is needed for the keyword-spotting execution plan based on peak concurrent tensors?
details:
  realistic_solution: 'The Tensor Arena''s size is determined by the *peak concurrent memory usage* at any point during inference. We must analyze the memory footprint at each step: 1) Input to Layer 1: 12 KB input + 30 KB output = 42 KB. 2) Layer 1 to Layer 2: 30 KB input + 10 KB output = 40 KB. 3) Layer 2 to Layer 3: 10 KB input + 2 KB output = 12 KB. The peak is 42 KB.'
  common_mistake: |
    **The Pitfall:** Summing the sizes of all tensors linearly.
    **The Rationale:** Candidates fail to understand memory aliasing, assuming that once a layer executes, its input is still retained indefinitely alongside all future outputs.
    **The Consequence:** Memory is wildly over-allocated, causing the deployment to needlessly exceed strict MCU SRAM limits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - In-place execution is not possible; a layer requires both input and output tensors concurrently.
       - Memory is aliased natively by TFLite Micro between distinct lifecycle stages.
    2. **Calculations:**
       - Step 1 (L1 active): 12 KB (in) + 30 KB (out) = 42 KB.
       - Step 2 (L2 active): 30 KB (in) + 10 KB (out) = 40 KB.
       - Step 3 (L3 active): 10 KB (in) + 2 KB (out) = 12 KB.
       - Peak = max(42, 40, 12) = 42 KB.
    3. **Conclusion & Interpretation:**
       - **Result: 42 KB.** The required arena size is dictated by the **Peak Memory-Bound** operation, not the aggregate sum.
  options:
  - 54 KB, the sum of all tensor sizes.
  - 30 KB, the size of the largest tensor.
  - 42 KB, the peak concurrent memory usage during the first layer's operation.
  - 40 KB, the peak concurrent memory usage during the second layer's operation.
  correct_index: 2
