title: CAN Bus AllGather Broadcast Arbitration
scenario: Two Cortex-M4 microcontrollers are connected via a CAN bus (1 Mbps) to synchronize
  local SVM support vectors. Each node has a 500-byte update. The CAN protocol enforces
  a 50% bit-stuffing and framing overhead.
question: Calculate the total time required for an AllGather operation between the
  two nodes, including the bus framing overhead.
details:
  realistic_solution: With N=2, an AllGather operation means each node must broadcast
    its 500-byte payload. The total payload on the bus is 1000 bytes. With a 50% framing
    overhead, the actual bits on the wire are 1000 bytes * 8 bits/byte * 1.5 = 12,000
    bits. Because CAN is a shared medium, transmissions are serialized rather than
    concurrent. At a 1 Mbps rate, the 12,000 bits take exactly 12 milliseconds to
    transmit.
  common_mistake: Assuming full-duplex simultaneous exchange (dividing by 2) like
    in PCIe or Ethernet, forgetting CAN is a shared broadcast bus that strictly serializes
    traffic.
  napkin_math: (500 + 500) bytes * 8 bits/byte * 1.5 framing_multiplier / 1,000,000
    bps = 12ms
