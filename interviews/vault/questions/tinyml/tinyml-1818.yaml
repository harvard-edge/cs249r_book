title: CAN Bus AllGather Broadcast Arbitration
scenario: Two Cortex-M4 microcontrollers are connected via a CAN bus (1 Mbps) to synchronize local SVM support vectors. Each node has a 500-byte update. The CAN protocol enforces a 50% bit-stuffing and framing overhead.
question: What is the total time required for an AllGather operation between the two nodes, including the bus framing overhead?
details:
  realistic_solution: With N=2, an AllGather operation means each node must broadcast its 500-byte payload. The total payload on the bus is 1000 bytes. With a 50% framing overhead, the actual bits on the wire are 1000 bytes * 8 bits/byte * 1.5 = 12,000 bits. Because CAN is a shared medium, transmissions are serialized rather than concurrent. At a 1 Mbps rate, the 12,000 bits take exactly 12 milliseconds to transmit.
  common_mistake: |
    **The Pitfall:** Assuming full-duplex simultaneous exchange.
    **The Rationale:** Candidates familiar with PCIe or Ethernet topologies assume nodes can transmit and receive concurrently.
    **The Consequence:** Underestimating the communication latency by 50% because CAN is a shared broadcast bus that strictly serializes traffic.
  napkin_math: |
    **Assumptions & Constraints:**
    - Protocol: CAN bus (1 Mbps).
    - Payload: 500 bytes per node (2 nodes).
    - Overhead: 50%.

    **Calculations:**
    - Total Payload: 500 + 500 = 1,000 bytes.
    - Bits before Overhead: 1,000 * 8 = 8,000 bits.
    - Bits with Framing Overhead: 8,000 * 1.5 = 12,000 bits.
    - Bus Speed: 1,000,000 bits/sec.
    - Transmission Time: 12,000 / 1,000,000 = 0.012 seconds.

    **Conclusion & Interpretation:**
    - **Result: Network-Bound**. Due to strict serialization, the operation requires a full 12 ms to complete on the bus.
