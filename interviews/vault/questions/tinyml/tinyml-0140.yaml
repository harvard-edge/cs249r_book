title: The Depthwise Separable Cost Advantage
scenario: You're designing a keyword-spotting model for a Cortex-M4 microcontroller. To fit the model
  into the limited Flash memory, you are considering architecture changes. For a typical layer, state
  the approximate reduction in parameter count you can expect by replacing a standard 3x3 convolution
  with a 3x3 depthwise separable convolution.
details:
  realistic_solution: 'The correct answer is an ~8-9× reduction in parameters. A standard convolution
    learns spatial and cross-channel patterns simultaneously, while a depthwise separable convolution
    splits this into two steps: a depthwise step that learns spatial patterns for each input channel independently,
    and a pointwise (1x1) step that combines the outputs to learn cross-channel patterns. This factorization
    is the source of the dramatic parameter efficiency.'
  common_mistake: Engineers often underestimate the parameter savings, thinking it's a minor optimization
    (e.g., 2×). They might also confuse the parameter count reduction with the computational (FLOPs) reduction,
    which is similar but not identical. The savings are substantial and come from decoupling the spatial
    and channel-wise correlations.
  napkin_math: 'Standard 3x3: 3 * 3 * 32_in * 64_out = 18,432 parameters. Depthwise Separable: (3 * 3
    * 32_in) for spatial + (1 * 1 * 32_in * 64_out) for channel mixing = 288 + 2048 = 2,336 parameters.
    Reduction: 18,432 / 2,336 = 7.9x fewer parameters, saving ~16 KB of Flash memory per layer (at INT8).'
  options:
  - Roughly 2-3× reduction
  - Roughly 8-9× reduction
  - Roughly 50-100× reduction
  - No reduction in parameters, only in FLOPs
  correct_index: 1
