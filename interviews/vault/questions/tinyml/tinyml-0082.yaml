title: The BLE Disconnect During OTA
scenario: You're pushing a 200 KB ML model update over BLE 5.0 to an nRF5340. The BLE connection uses a 7.5 ms connection interval.
question: "How does a 200 KB ML model size determine BLE OTA transfer time, and why is it riskier than firmware without incremental checksums?"
details:
  realistic_solution: A 200 KB ML model is massive for BLE. With a 251-byte MTU and a 7.5 ms connection interval (assuming 1 packet per interval for simplicity), the theoretical minimum transfer time is $200,000 / 251 \times 0.0075 \approx 6$ seconds. In reality, with protocol overhead and flash write stalls, it takes 10-15 seconds. This long window exposes the transfer to RF interference, causing dropped packets and supervision timeouts.
  common_mistake: |
    **The Pitfall:** Believing the BLE signal is too weak and moving the phone closer will fix the disconnect.
    **The Rationale:** Developers accustomed to pure software updates assume dropped connections are purely RF issues.
    **The Consequence:** The real timing and architecture issues driven by the massive ML payload are ignored, leading to persistent failures.
  napkin_math: |
    * BLE throughput: 251 bytes / 7.5 ms = 33.47 KB/s.
    * Transfer time for 200 KB: 200 / 33.47 = 5.97 seconds (ideal).
    * Flash pages to write: 200 KB / 4 KB = 50 pages.
    * Total erase time: 50 × 85 ms = 4,250 ms (4.25 seconds).
    * Total transfer time: 5.97 + 4.25 = 10.22 seconds.
    * During this 10-second window, the device is highly vulnerable to connection drops.
    * If quantized to INT8 (50 KB), the transfer time drops to **~2.6 seconds**, dramatically reducing failure probability.
