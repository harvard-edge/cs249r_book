title: The Non-Volatile MRAM Trap
scenario: Your ultra-low-power device uses an Ambiq Apollo4 MCU, which features MRAM (Magnetoresistive RAM) instead of standard Flash. MRAM is incredibly fast and allows byte-level writes without erasing pages. You decide to run your entire model inference directly from MRAM to save SRAM. Your battery dies in 2 days instead of the calculated 14 days.
question: Why does putting the tensor arena in Apollo4 MRAM drain the battery in 2 days instead of 14?
details:
  realistic_solution: 'MRAM read energy is ~3x higher than SRAM (15 pJ vs 5 pJ per word), and write energy is ~10x higher (50 pJ vs 5 pJ). ML inference generates millions of read-write operations on activation tensors. Placing the tensor arena in MRAM: 1M writes * 50pJ = 50uJ per inference just for memory writes, vs 5uJ in SRAM. Over 24 hours with 1 inference/s: MRAM costs 4.32J vs SRAM''s 0.432J — a 10x energy penalty that explains the 7x battery life reduction (2 days vs 14 days, accounting for other system power). Fix: keep the tensor arena in SRAM. Use MRAM only for model weights (read-only, infrequent) and non-volatile logging.'
  common_mistake: |
    **The Pitfall:** Assuming MRAM is slower than SRAM.
    **The Rationale:** Candidates often think the battery drain is due to longer execution time rather than the physical energy cost of writes.
    **The Consequence:** They fail to address the high energy per write of MRAM compared to SRAM.
  napkin_math: |
    * SRAM Read/Write Energy: ~5 pJ per word.
    * MRAM Read Energy: ~15 pJ per word. MRAM Write Energy: ~50 pJ per word.
    * Calculate energy for 1M writes in MRAM: 1,000,000 * 50 pJ = 50 uJ.
    * **Result: 50 uJ per inference on memory writes alone destroys the microwatt power budget.**
