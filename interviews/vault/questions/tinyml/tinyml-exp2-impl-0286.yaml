title: Calculate Vision Pipeline Slack Time
scenario: You are deploying a 30 FPS object detection pipeline on an ARM Cortex-M7 + Ethos-U55 (Corstone-300)
  system, requiring a strict 33.33ms frame deadline. The Cortex-M7 (running at 480 MHz) sequentially takes
  8ms to crop and normalize the camera image before handing it over to the NPU. The Ethos-U55 is configured
  for 256 MACs/cycle and shares the 512 KB SRAM with the M7. The model requires 400 million MAC operations.
  Assuming the NPU achieves exactly 50% of its peak MAC utilization due to SRAM memory contention, calculate
  the remaining slack time in the frame budget.
question: "How much frame slack remains for the 30 FPS Corstone-300 object detector after M7 preprocessing and NPU inference?"
details:
  realistic_solution: The correct approach calculates the NPU's effective MAC throughput by multiplying
    the clock speed, MACs/cycle, and the utilization factor. The model's total MACs are divided by this
    effective throughput to find the inference time. The total pipeline time is the sum of the M7 preprocessing
    time and NPU inference time, which is then subtracted from the 33.33ms deadline.
  common_mistake: Candidates often assume 100% peak theoretical MAC throughput, ignoring the 50% utilization
    factor caused by SRAM contention. They also frequently forget to include the Cortex-M7's sequential
    preprocessing time in the critical path before calculating the final slack.
  napkin_math: '1. Peak NPU throughput = 256 MACs/cycle * 480 MHz = 122.88 GMACs/sec.

    2. Effective NPU throughput = 122.88 GMACs/sec * 0.5 (utilization) = 61.44 GMACs/sec (or 61.44 million
    MACs/ms).

    3. NPU Inference Time = 400 million MACs / 61.44 million MACs/ms ≈ 6.51 ms.

    4. Total processing time = 8.00 ms (M7) + 6.51 ms (NPU) = 14.51 ms.

    5. Remaining slack = 33.33 ms (frame budget) - 14.51 ms = 18.82 ms.'
