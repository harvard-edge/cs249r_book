title: The Nanosecond Heist
scenario: >
  An attacker wants to steal a proprietary ML model from a sealed Cortex-M4 microcontroller by mounting a side-channel power analysis attack.
question: What operation timescale must a power-analysis attacker resolve to distinguish Cortex-M4 flash reads or individual instructions?
details:
  realistic_solution: |
    The correct answer is nanoseconds. The microcontroller's clock speed (e.g., 168 MHz for a Cortex-M4) dictates the speed of its fundamental operations. A 168 MHz clock has a period of approximately 6 nanoseconds. Operations like fetching an instruction from flash memory (~50 ns) or executing it occur on this timescale. Therefore, to distinguish the power signature of a multiply-accumulate operation from a memory read, the measurement equipment must have nanosecond-level resolution.
  common_mistake: |
    **The Pitfall:** Confusing the macro latency of a full model inference (milliseconds) with micro instruction latency.
    **The Rationale:** Candidates do not realize that side-channel attacks analyze fine-grained power fluctuations of single instructions.
    **The Consequence:** They overestimate the required timescale, guessing milliseconds instead of nanoseconds.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cortex-M4 clock: ~168 MHz.
       - Target: Distinguish single instructions or memory accesses.
    2. **Calculations:**
       - Clock period: 1 / 168,000,000 Hz ≈ 6 ns.
       - Flash read latency hardware constant: ~50 ns.
    3. **Conclusion & Interpretation:** The attacker needs resolution in the nanosecond range. **Result: Time-Bound (Nanoseconds)**.
  options:
  - Milliseconds (ms)
  - Microseconds (μs)
  - Nanoseconds (ns)
  - Picoseconds (ps)
  correct_index: 2
