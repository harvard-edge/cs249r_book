title: The Nanosecond Heist
scenario: You're designing a secure ML system on a Cortex-M4 microcontroller. The device is sealed, and
  all debug ports are fused off. An attacker wants to steal your proprietary model by mounting a side-channel
  power analysis attack. To succeed, they must be able to distinguish the power signatures of individual
  operations. **Recall** the approximate time scale of a fundamental operation, like a flash memory read,
  on this class of device.
details:
  realistic_solution: The correct answer is nanoseconds. The microcontroller's clock speed (e.g., 168
    MHz for a Cortex-M4) dictates the speed of its fundamental operations. A 168 MHz clock has a period
    of approximately 6 nanoseconds. Operations like fetching an instruction from flash memory (~50 ns)
    or executing it occur on this timescale. Therefore, to distinguish the power signature of a multiply-accumulate
    operation from a memory read, the measurement equipment must have nanosecond-level resolution.
  common_mistake: Confusing the latency of a full model inference (milliseconds) with the latency of the
    individual CPU/memory operations that an attacker must measure. Side-channel attacks work by analyzing
    the fine-grained power fluctuations of single instructions or memory accesses, not the coarse-grained
    power draw of the entire inference.
  napkin_math: 'A Cortex-M4 runs at ~168 MHz. The period of one clock cycle is therefore: `1 / (168,000,000
    cycles/sec) ≈ 6 ns`. From the hardware constants, we know a flash read on a TinyML device is ~50 ns.
    An attacker must resolve events happening on this timescale.'
  options:
  - Milliseconds (ms)
  - Microseconds (µs)
  - Nanoseconds (ns)
  - Picoseconds (ps)
