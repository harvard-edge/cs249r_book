title: SPI Double-Buffering Pipeline Barrier Computation
scenario: A battery-powered sensor node features a low-power DSP and a Cortex-M4 connected via 10 MHz SPI (1.25 MB/s). A 1D-CNN is split: the DSP runs convolutions (2ms), and the M4 runs dense layers (4ms). The pipeline uses double-buffering to overlap SPI DMA transfers with compute.
question: Analyze the maximum SPI payload size allowable to maintain the optimal 4ms pipeline throughput, assuming a 50us DMA setup barrier per transfer.
details:
  realistic_solution: The bottleneck is the M4 taking 4ms. To avoid stalling the pipeline beyond this 4ms interval, the complete SPI transfer (including the DMA setup barrier) must overlap entirely within the 4ms M4 compute window. Subtracting the 50us setup barrier leaves 3.95ms for raw bit transmission. At a 10 MHz SPI clock rate (1.25 MB/s), the maximum data that can be transferred in 3.95ms is 3.95ms * 1.25 MB/s = 4.9375 KB.
  common_mistake: |
    **The Pitfall:** Failing to subtract the sequential DMA setup barrier from the overlap window.
    **The Rationale:** Candidates assume the full 4ms compute window is available for raw bit transmission, ignoring the synchronous setup cost.
    **The Consequence:** The pipeline stalls slightly on every frame, missing the hard real-time latency target.
  napkin_math: |
    - **Step 1:** Calculate available overlap time: 4ms compute window - 0.05ms setup barrier = 3.95ms.
    - **Step 2:** Calculate SPI bandwidth: 10,000,000 bits/sec / 8 = 1.25 MB/s.
    - **Step 3:** Calculate max payload: 3.95ms * 1.25 MB/s = 4937.5 bytes.
    - **Result:** **The maximum allowable SPI payload size is 4937.5 bytes.**
