title: Tinyml New 0018
scenario: A Jetson Orin operates flawlessly at 275 TOPS for the first 5 minutes. Then, inference latency
  doubles and frame rates plummet. Re-running the system after an hour restores performance temporarily.
details:
  realistic_solution: The symptom is classic thermal throttling. The Orin module is generating more heat
    than the passive or active cooling system can dissipate. Once the die hits its maximum safe temperature
    (e.g., 90°C), the hardware automatically drops the GPU and CPU clock speeds drastically to prevent
    physical damage. Improve the thermal sink, add active cooling, or lower the TDP target in `nvpmodel`.
  common_mistake: Benchmarking ML models in short 10-second bursts and ignoring steady-state thermal equilibrium
    in edge environments.
  napkin_math: Orin TDP = 60W. Cooling only dissipates 40W. Heat buildup = 20W. T_rise = P * R_th. 20W
    * 2°C/W = 40°C rise over ambient. 25°C + 40°C = 65°C. If ambient hits 50°C, die hits 90°C and throttles.
