title: The Duty Cycle Constraint
scenario: You are designing a battery-powered keyword spotting device using a Cortex-M4 microcontroller.
  It must process a continuous stream of 1-second audio windows to detect a wake word. What is the correct
  term for the percentage of time the CPU is in an active state processing audio versus in a low-power
  sleep state?
details:
  realistic_solution: The correct term is **Duty Cycle**. It is the fraction of one period in which a
    system is active. For a real-time system that must process data arriving every `t_period` (e.g., 1
    second), the processing time (`t_active`) must be less than this period. The resulting duty cycle
    directly determines the average power consumption and thus the device's battery life.
  common_mistake: Engineers often confuse the duty cycle with related metrics like latency or throughput.
    Latency is the duration of the active period (`t_active`), and throughput is the rate of processing.
    Duty cycle, however, is the specific *ratio* of active time to the total time period, which is the
    critical factor for calculating energy consumption in battery-powered devices.
  napkin_math: 'The term is ''Duty Cycle''. Given a 1-second audio window and a typical Cortex-M4 running
    a KWS model taking 150ms per inference: Duty Cycle = (Active Time / Total Time) * 100 = (150ms / 1000ms)
    * 100 = 15%. Average power = (50 mW * 0.15) + (0.01 mW * 0.85) = 7.5085 mW. RAM fills via DMA with
    ~0% CPU load.'
  options:
  - Latency
  - Throughput
  - Duty Cycle
  - Power Draw
