title: 'Model Size Estimation: Design Minimum-Memory Architecture for MCU Keyword
  Spotter'
scenario: 'Design a keyword spotting model architecture for Cortex-M4 (168MHz, 256KB
  SRAM, 512KB Flash) that achieves >90% accuracy on Google Speech Commands with minimum
  SRAM footprint. Derive: layer types, filter counts, activation memory profile per
  layer, and verify SRAM constraint.'
question: 'How would you derive : layer types, filter counts, activation memory profile
  per layer, and verify SRAM constraint?'
details:
  realistic_solution: 'Use DS-CNN-S (Depthwise Separable CNN, small variant). Architecture:
    Input 49×10 (MFCC). Conv1 64-ch 10×4: activation 49×10×64=31,360B=30.6KB. DW-Conv2
    64-ch 3×3: 49×10×64=30.6KB. PW-Conv2 64-ch: same. Pool 1: 24×5×64=7.5KB. DW-Conv3
    64-ch: 7.5KB. PW-Conv3 64-ch: 7.5KB. Pool 2: 12×2×64=1.5KB. FC 128: 0.13KB. Softmax
    35: 0.14KB. Peak activation arena: 30.6KB + 30.6KB (double-buffer) = 61.2KB.
    TFLM SRAM: 61.2KB + 30KB runtime/stack = 91.2KB << 256KB. Flash: DS-CNN-S params
    ~100K INT8 = 100KB. Application: 64KB. Total Flash: 164KB + 20KB TFLM = 184KB < 512KB ✓. Accuracy:
    DS-CNN-S achieves ~94% on 35-class Google Speech Commands.'
  common_mistake: Designing a standard CNN with large intermediate activation tensors,
    then discovering post-hoc that activations don't fit in 256KB SRAM.
  napkin_math: 'DS-CNN-S: 100K params INT8. Flash: 100K+64KB app+20KB TFLM = 184KB
    < 512KB ✓. SRAM peak: first Conv output 49×10×64×1B=31KB. Double-buffer: 62KB.
    Runtime 30KB. Total: 92KB < 256KB ✓. Inference: 0.9M ops/168M=5.36ms. Power at
    5.36ms/100ms (10Hz detect): 5.36% duty × 10mA (M4 active) + 94.64% × 20μA sleep
    = 0.536mA + 0.019mA = 0.555mA. Add MEMS mic (0.6mA): 1.155mA. On 200mAh CR2032:
    200/1.155 = ~173h total system life.'
