title: 'Model Size Estimation: Design Minimum-Memory Architecture for MCU Keyword Spotter'
scenario: Design a keyword spotting model architecture for Cortex-M4 (168MHz, 256KB SRAM, 512KB Flash) that achieves >90% accuracy on Google Speech Commands with minimum SRAM footprint.
question: How would you derive layer types, filter counts, activation memory profile per layer, and verify the SRAM constraint?
details:
  realistic_solution: 'Use DS-CNN-S (Depthwise Separable CNN, small variant). Architecture: Input 49x10 (MFCC). Conv1 64-ch 10x4: activation 49x10x64=31,360B=30.6KB. DW-Conv2 64-ch 3x3: 49x10x64=30.6KB. PW-Conv2 64-ch: same. Pool 1: 24x5x64=7.5KB. DW-Conv3 64-ch: 7.5KB. PW-Conv3 64-ch: 7.5KB. Pool 2: 12x2x64=1.5KB. FC 128: 0.13KB. Softmax 35: 0.14KB. Peak activation arena: 30.6KB + 30.6KB (double-buffer) = 61.2KB. TFLM SRAM: 61.2KB + 30KB runtime/stack = 91.2KB << 256KB. Flash: DS-CNN-S params ~100K INT8 = 100KB. Application: 64KB. Total Flash: 164KB + 20KB TFLM = 184KB < 512KB. Accuracy: DS-CNN-S achieves ~94% on 35-class Google Speech Commands.'
  common_mistake: |
    **The Pitfall:** Designing a standard CNN without calculating intermediate activation sizes.
    **The Rationale:** Candidates focus solely on parameter count (Flash) and ignore the peak working memory required to hold intermediate tensors between layers.
    **The Consequence:** Discovering post-hoc that the activations don't fit in the 256KB SRAM, causing runtime crashes.
  napkin_math: |
    - DS-CNN-S params: ~100K INT8 = 100KB Flash.
    - Application + TFLM: 64KB + 20KB = 84KB Flash.
    - Total Flash: 184KB < 512KB (Fits).
    - Peak activation arena (Conv1 49x10x64): 31.36KB.
    - Double-buffered peak SRAM: 62.72KB.
    - Runtime/Stack: 30KB + 8KB = 38KB SRAM.
    - Total SRAM: 100.72KB < 256KB (Fits).
    - Power (10Hz): 5.36ms inference. Duty cycle: 5.36%.
    - Avg current: 0.536mA (active) + 0.019mA (sleep) + 0.6mA (mic) = **1.155mA**.
