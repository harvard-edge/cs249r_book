title: Optimizing Window Annotations for NPU SRAM
scenario: We are deploying a predictive maintenance vibration model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform. The original dataset was annotated with broad 2.0-second event windows, leading to an input size that consumes 450 KB of the shared 512 KB SRAM for Ethos-U55 intermediate activations, causing frequent out-of-memory errors for the 480 MHz M7 application code. A data audit reveals the actual mechanical fault transients last only 0.4 seconds.
question: How do you adjust the annotation workflow to resolve this hardware bottleneck, and what is the quantified impact?
details:
  realistic_solution: Implement a re-annotation workflow to label tight 0.4-second bounding boxes around the transient fault signatures, discarding the irrelevant padding. By retraining the model on this curated, tightly-cropped dataset, the temporal dimension of the input is reduced by a factor of 5x, which proportionally shrinks the intermediate activation buffers required by the NPU.
  common_mistake: |
    **The Pitfall:** Jumping immediately to model compression techniques.
    **The Rationale:** Candidates suggest aggressive quantization or depthwise-separable convolutions, missing that the root cause is a poorly scoped dataset annotation strategy.
    **The Consequence:** Deploying complex model architectures when simply tightening the annotation windows would solve the memory bottleneck far more effectively.
  napkin_math: |
    - **Original SRAM Footprint (2.0s)**: 450 KB.
    - **New Window (0.4s)**: 5x reduction.
    - **New SRAM Footprint**: 450 KB / 5 = **90 KB** (frees 360 KB).
    - **Compute Drop**: 10M MACs -> 2M MACs.
    - **Inference Time (NPU @ 480 MHz)**: 2M / 122.8 GMAC/s = **16.3 µs**.
