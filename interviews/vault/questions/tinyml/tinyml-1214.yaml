title: Optimizing Window Annotations for NPU SRAM
scenario: We are deploying a predictive maintenance vibration model on an ARM Cortex-M7
  + Ethos-U55 (Corstone-300) platform. The original dataset was annotated with broad
  2.0-second event windows, leading to an input size that consumes 450 KB of the shared
  512 KB SRAM for Ethos-U55 intermediate activations, causing frequent out-of-memory
  errors for the 480 MHz M7 application code. A data audit reveals the actual mechanical
  fault transients last only 0.4 seconds. How do you adjust the annotation workflow
  to resolve this hardware bottleneck, and what is the quantified impact?
question: How do you adjust the annotation workflow to resolve this hardware bottleneck,
  and what is the quantified impact?
details:
  realistic_solution: Implement a re-annotation workflow to label tight 0.4-second
    bounding boxes around the transient fault signatures, discarding the irrelevant
    padding. By retraining the model on this curated, tightly-cropped dataset, the
    temporal dimension of the input is reduced by a factor of 5x, which proportionally
    shrinks the intermediate activation buffers required by the NPU.
  common_mistake: Candidates often jump to model compression techniques like aggressive
    quantization or depthwise-separable convolutions, missing that the root cause
    is a poorly scoped dataset annotation strategy. They also frequently forget that
    the M7 and Ethos-U55 share the same strict 512 KB SRAM pool.
  napkin_math: 'Original 2.0s window: 450 KB SRAM for activations, 10M MACs. New 0.4s
    window (5x reduction): SRAM footprint shrinks to 450 / 5 = 90 KB, freeing 360
    KB of the 512 KB shared memory for the M7 RTOS and application. Compute drops
    from 10M to 2M MACs. Assuming the Ethos-U55 processes 256 MAC/cycle at 480 MHz
    (122.8 GMAC/s), NPU compute time drops from 81.4 μs to 16.3 μs per inference.'
