title: Evaluating Quantization Granularity on nRF5340
scenario: You are deploying a continuous wake-word detection model on the Nordic nRF5340. The application
  core runs at 128 MHz and must process audio frames within a strict 50ms latency budget to maintain the
  ~5mA active current draw target for battery life. You have a choice between per-tensor and per-channel
  symmetric INT8 post-training quantization for the model's depthwise separable convolutional layers.
  The device has 256 KB SRAM and 1 MB flash, which must also accommodate the BLE 5.3 networking stack.
question: "Should an nRF5340 wake-word model use per-tensor or per-channel INT8 quantization for depthwise layers under a 50 ms budget?"
details:
  realistic_solution: Recommend per-tensor quantization to meet the strict latency and power constraints,
    using QAT if accuracy is insufficient. For depthwise layers, per-channel quantization requires applying
    a different scale factor per output channel, which drastically increases the cycle count in the inner
    loop on a standard ARM Cortex-M33. Given the 50ms latency constraint, the extra cycles for channel-wise
    scaling and the memory overhead for storing scale factors make per-channel quantization prohibitive.
  common_mistake: Candidates often default to per-channel quantization for better accuracy without evaluating
    the compute and memory overhead. They overlook that storing per-channel scale factors consumes precious
    SRAM, and the lack of specialized vector instructions makes per-channel rescaling computationally
    expensive.
  napkin_math: 'Cycles available per inference: 128 MHz * 0.05s = 6.4 million cycles. Model memory budget:
    256 KB SRAM total - ~64 KB (BLE stack & OS) = ~192 KB for activations and workspace. For a layer with
    256 output channels, per-channel quantization adds 256 * 4 bytes = 1 KB for scale factors per layer;
    across 10 layers, this is 10 KB overhead. Furthermore, per-channel rescaling adds ~4 extra cycles
    per MAC. For a model with 1 million MACs, this adds 4 million cycles, consuming 62% of the 6.4M cycle
    budget just for rescaling and causing a latency miss.'
