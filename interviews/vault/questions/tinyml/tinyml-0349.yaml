title: The Flash Budget Squeeze
scenario: You are designing a battery-powered smart sensor with 1MB of flash memory. To enable safe Over-the-Air (OTA) firmware updates, your system needs to download the complete new image before swapping.
question: Based on typical resource allocation in TinyML systems, which component represents the largest "tax" on your flash budget, directly competing with the size of your ML model?
details:
  realistic_solution: The staging partition for safe OTA rollback requires 50% of the entire memory, halving the available Flash for all other application layers.
  common_mistake: |
    **The Pitfall:** Assuming the RTOS is the largest overhead.
    **The Rationale:** Engineers from cloud/mobile backgrounds treat an RTOS like a desktop OS, failing to account for the "double-booking" of space required for safe A/B OTA updates.
    **The Consequence:** Designing models that are physically impossible to deploy because the flash memory lacks the staging space for future updates.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total Flash: 1 MB.
       - A/B OTA requirement: New image must stage in a separate partition.
    2. **Calculations:**
       - Active Partition Size (App + RTOS + Model) = X.
       - Staging Partition Size = X.
       - 2X <= 1 MB. Therefore, Max active app size <= 500 KB.
    3. **Conclusion & Interpretation:**
       **Result: 50% Flash tax.** The system is **Deployment-Staging-Bound**, heavily restricting model size to accommodate the fail-safe OTA payload.
  options:
  - The Real-Time Operating System (RTOS)
  - The Bootloader
  - The Over-the-Air (OTA) download partition
  - The ML model's activation buffers stored in flash
  correct_index: 2
