title: The Flash Budget Squeeze
scenario: You are designing a battery-powered smart sensor with 1MB of flash memory. To enable safe Over-the-Air (OTA) firmware updates, your system needs to download the complete new image before swapping. You must budget space for your ML model, application code, a bootloader, a real-time operating system (RTOS), and this OTA download slot.
question: Based on the typical resource allocation in TinyML systems, which component represents the largest "tax" on your flash budget, directly competing with the size of your ML model?
details:
  realistic_solution: The Over-the-Air (OTA) download partition is typically the largest single consumer of flash memory besides the application itself. To ensure a fail-safe update, the device must store the entire new firmware image in a separate partition while the current application is running. This partition is often equal in size to the main application partition, effectively halving the total flash available for the model and business logic.
  common_mistake: |
    **The Pitfall:** Assuming the RTOS is the largest overhead.
    **The Rationale:** Engineers from cloud/mobile backgrounds treat an RTOS like a desktop OS, failing to account for the "double-booking" of space required for safe A/B OTA updates.
    **The Consequence:** Designing models that are physically impossible to deploy because the flash memory lacks the staging space for future updates.
  napkin_math: |
    1. **Total Flash:** 1 MB = 1024 KB.
    2. **System Baseline:** Bootloader (~32 KB) + RTOS (~64 KB) + App logic (~100 KB) = 196 KB.
    3. **Model Budget:** Assume ML model is 300 KB. Total active app = 196 + 300 = 496 KB.
    4. **OTA Slot:** The staging partition must equal the entire active partition = **496 KB**.
    5. **Total Flash Used:** 496 KB + 496 KB = 992 KB.
    6. **Conclusion:** The OTA partition is by far the largest single overhead, directly halving the maximum available space for the ML model.
  options:
  - The Real-Time Operating System (RTOS)
  - The Bootloader
  - The Over-the-Air (OTA) download partition
  - The ML model's activation buffers stored in flash
  correct_index: 2
