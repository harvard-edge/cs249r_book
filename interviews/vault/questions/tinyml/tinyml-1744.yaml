title: Analyze Execute-In-Place Model Switching Latency
scenario: A Cortex-M4 switches frequently between two 100KB INT8 models. Currently, copying weights from SPI Flash to SRAM takes 200ms per switch, missing latency deadlines.
question: How does configuring the memory protection unit to enable Execute-In-Place (XIP) memory-mapped architecture eliminate this bottleneck?
details:
  realistic_solution: Normally, the MCU reads Flash sector-by-sector into SRAM via DMA, taking 200ms. XIP maps the external SPI Flash directly into the CPU's memory address space. By modifying the linker script, the inference engine can fetch weights exactly when needed through the cache, dropping model switching latency effectively to zero, while paying a slightly higher cache-miss penalty during actual execution.
  common_mistake: |
    **The Pitfall:** Suggesting software caching algorithms.
    **The Rationale:** Candidates overlook that the 128KB total SRAM physically cannot hold both 100KB models simultaneously.
    **The Consequence:** Proposed solutions are physically impossible to implement on the constrained hardware.
  napkin_math: |
    - DMA copy from Flash to SRAM: 200ms.
    - XIP mapped memory: Direct pointer swap.
    - **Switching time drops:** from 200ms to **O(1)** latency.
