title: Analyze Execute-In-Place Model Switching Latency
scenario: A Cortex-M4 switches frequently between two 100KB INT8 models. Currently,
  copying weights from SPI Flash to SRAM takes 200ms per switch, missing latency deadlines.
question: Analyze how configuring the memory protection unit to enable Execute-In-Place
  (XIP) memory-mapped architecture eliminates this bottleneck.
details:
  realistic_solution: Normally, the MCU reads Flash sector-by-sector into SRAM via
    DMA, taking 200ms. XIP maps the external SPI Flash directly into the CPU's memory
    address space. By modifying the linker script, the inference engine can fetch
    weights exactly when needed through the cache, dropping model switching latency
    effectively to zero, while paying a slightly higher cache-miss penalty during
    actual execution.
  common_mistake: Suggesting software caching algorithms when the SRAM size (e.g.
    128KB total) physically cannot hold both models simultaneously.
  napkin_math: Switching time drops from 200ms (DMA) to O(1) pointer swap via XIP.
