title: Nordic nRF5340 Dual-Core Architecture for Operator Scheduling
scenario: When configuring operator scheduling for a neural network on the Nordic nRF5340, engineers often partition tasks between its two cores to optimize execution order and power consumption. The device features an asymmetric dual-core architecture.
question: What are the specific clock frequencies of the application core and the network core on the Nordic nRF5340?
details:
  realistic_solution: The correct specification is a 128 MHz application core and a 64 MHz network core. Operator scheduling should target the 128 MHz application core for heavy ML computations while leaving the 64 MHz network core to handle the BLE 5.3 stack.
  common_mistake: |
    **The Pitfall:** Assuming the nRF5340 has symmetric dual cores.
    **The Rationale:** Candidates assume both cores run at the same frequency (e.g., both at 64 MHz or 128 MHz), misallocating the ML workload.
    **The Consequence:** Scheduling heavy ML operators on the slower network core, missing latency targets and blocking the BLE stack.
  napkin_math: |
    **Assumptions & Constraints:**
    - Application Core: 128 MHz.
    - Network Core: 64 MHz.

    **Calculations:**
    - Compute Ratio: 128 MHz / 64 MHz = 2x throughput.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound**. Targeting the Application Core yields exactly 2x the clock cycles for ML operator scheduling.
