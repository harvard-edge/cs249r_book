title: Corstone-300 Memory Allocation for KWS
scenario: You are architecting an always-on keyword spotting pipeline for an ARM Cortex-M7 + Ethos-U55
  (Corstone-300) platform. The SoC operates at 480 MHz and features exactly 512 KB of shared SRAM between
  the M7 and the Ethos-U55. Your system must support an RTOS, an audio feature extraction pipeline on
  the M7, and neural network inference on the U55. Architect the memory allocation and execution strategy
  across internal SRAM and external Flash, evaluating the tradeoffs between keeping weights in Flash versus
  SRAM to maximize the U55's 128-512 MAC/cycle utilization while avoiding OOM errors.
question: "How should Corstone-300 allocate shared SRAM and stream weights for an Ethos-U55 keyword-spotting pipeline?"
details:
  realistic_solution: The best design leverages the Ethos-U55's weight streaming capability directly from
    external embedded Flash, while strictly reserving the 512 KB SRAM for intermediate activations, the
    M7's audio ring buffer, and RTOS state. The candidate should evaluate using offline weight compression
    (supported by the Ethos-U compiler) to reduce Flash bandwidth requirements, ensuring the U55 MACs
    are not memory-starved.
  common_mistake: Candidates often propose fetching all weights into SRAM before inference, failing to
    realize the 512 KB SRAM is insufficient for the model, RTOS, and audio buffers simultaneously. They
    also frequently overlook the latency and bandwidth penalty of fetching weights directly from slower
    external Flash during U55 execution.
  napkin_math: Total shared SRAM = 512 KB. Allocate 64 KB for RTOS/stack, 128 KB for M7 audio ring buffer
    and MFCC features, leaving 320 KB for U55 activations. At 480 MHz with 256 MAC/cycle, the U55 peak
    compute is ~122 GMAC/s. If a layer requires 500K MACs, compute takes ~4 microseconds. If weight streaming
    from Flash runs at 100 MB/s, loading 10 KB of compressed weights takes 100 microseconds, showing the
    design is bandwidth-bound and requires careful memory hierarchy orchestration.
