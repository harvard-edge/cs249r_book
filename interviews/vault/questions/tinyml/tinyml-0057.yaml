title: The A/B Test Brick-pocalypse
scenario: You are managing a fleet of 500,000 battery-powered smart doorbells, each with a 1MB Flash budget. You want to A/B test a new person detection model. The total firmware size is 450KB. The Over-the-Air (OTA) update mechanism is reliable, with only a 0.05% failure rate (e.g., due to power loss or connectivity issues during the write process), but a failure requires a full device replacement. You plan to roll out the new model to a 20% test group.
question: How would you apply your systems knowledge to diagnose the single greatest quantitative risk to the business from this "simple" A/B test?
details:
  realistic_solution: The greatest risk is the number of permanently bricked devices, leading to direct financial loss from hardware replacement and customer support. Unlike a server that can be easily reimaged, a failed OTA update on a consumer device is often unrecoverable. An A/B test isn't just a metadata flip; it's a high-risk firmware operation performed on a massive number of devices simultaneously. The key is to calculate the expected number of failures and translate that into a dollar amount, showing that the 'low probability' event is a near certainty at scale.
  common_mistake: |
    **The Pitfall:** Perceiving A/B testing on embedded devices as a cheap, reversible software flag change.
    **The Rationale:** Engineers from a cloud background fail to appreciate that an OTA update on edge devices is a fragile firmware write operation, not a simple database flip.
    **The Consequence:** A "low probability" update failure at scale results in a massive number of permanently bricked devices and disastrous financial losses.
  napkin_math: |
    1. Calculate test group size: 500,000 devices × 20% = 100,000 devices.
    2. Calculate expected bricked devices: 100,000 × 0.0005 (0.05%) = **50 permanently bricked devices**.
    3. Conclusion: The direct hardware replacement cost for these devices is the dominant financial risk.
  options:
  - The network cost of sending a 450KB update to 100,000 devices will be the dominant expense.
  - The increased power consumption of the new model will drain batteries faster, leading to customer complaints.
  - The new model might have higher latency, violating the real-time processing budget of the doorbell.
  - The expected number of permanently bricked devices due to OTA update failures represents the most significant, direct financial risk.
  correct_index: 3
