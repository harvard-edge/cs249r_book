title: Zero-Copy Audio DMA on nRF5340
scenario: You are deploying a keyword spotting model on the Nordic nRF5340. The I2S peripheral captures audio, and EasyDMA writes it to a 16KB circular buffer in the SRAM. Before each inference pass, the application core wakes up to copy this 16KB of audio into the ML model's input tensor.
question: How much does zero-copy EasyDMA save in terms of SRAM and CPU latency when the nRF5340 currently copies a 16 KB audio buffer before each inference?
details:
  realistic_solution: The optimal architecture implements a zero-copy pipeline by configuring the I2S EasyDMA peripheral to write directly into ping-pong buffers pre-allocated within the model's input tensor. This allows hardware to fill one buffer while the application core processes the other, completely eliminating the CPU intervention for memory movement.
  common_mistake: |
    **The Pitfall:** Optimizing the software memory copy routine.
    **The Rationale:** Candidates focus on software optimization (e.g., loop unrolling or SIMD instructions) rather than rethinking the underlying data movement architecture.
    **The Consequence:** They fail to leverage hardware DMA, wasting active CPU cycles and unnecessarily duplicating 16KB of SRAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - 16KB audio buffer (4,096 32-bit words).
    - nRF5340 app core running at 128 MHz.
    - CPU copy requires ~2 cycles per 32-bit word.

    **Calculations:**
    - SRAM Savings: Eliminating the redundant 16KB buffer saves 16 KB / 256 KB = 6.25% of total SRAM.
    - Cycle Cost: 4,096 words * 2 cycles/word = 8,192 CPU cycles.
    - Latency Savings: 8,192 cycles / 128,000,000 Hz = 64 µs.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound Optimization**. Zero-copy DMA reclaims 6.25% of system SRAM and eliminates 64 µs of active CPU time per inference, critically reducing the duty cycle.
