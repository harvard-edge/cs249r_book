title: Cortex-M4 Seismic Duty Cycle
scenario: A Cortex-M4 (80 MHz) monitors a seismic sensor. The active inference consumes
  15 mW and takes 20 ms. Deep sleep baseline is 0.05 mW.
question: Calculate the average power consumption if the MCU runs inference exactly
  once per second.
visual:
  kind: svg
  path: tinyml-1659.svg
  alt: A sleep/wake timeline showing 15mW spikes every 1 second over a near-zero baseline.
  caption: Duty cycle power spikes across a 3-second window.
details:
  realistic_solution: The active time is 20 ms per second (2% duty cycle), and sleep
    time is 980 ms (98%). Average power = (0.02 * 15 mW) + (0.98 * 0.05 mW) = 0.3
    mW + 0.049 mW = 0.349 mW.
  common_mistake: Neglecting the sleep state leakage, which contributes noticeably
    when the duty cycle is extremely low.
  napkin_math: 0.02*15 + 0.98*0.05 = 0.349 mW
