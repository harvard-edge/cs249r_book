title: Analyzing Queue Capacity During Traffic Bursts
scenario: A smart sensor cluster sends events to a Cortex-M4 at 5 events/sec. The MCU processes events in exactly 150ms.
question: "Analyze the utilization of the MCU and predict if the system can handle a temporary burst of 10 events/sec for 2 seconds."
details:
  realistic_solution: Normal utilization is 5 * 0.150 = 0.75. During the 2s burst, 20 events arrive. The MCU processes 2 / 0.15 = 13.3 events. The remaining 6.7 events queue up. Since normal utilization is < 1, the queue safely drains once the burst ends.
  common_mistake: |
    **The Pitfall:** Assuming a burst rate greater than the processing rate instantly drops events.
    **The Rationale:** Candidates ignore the transient absorption capacity of the queue.
    **The Consequence:** They over-provision hardware instead of relying on the queue to smooth out temporary bursts.
  napkin_math: |
    1. Calculate normal utilization: 5 events/sec * 0.150 sec/event = 0.75 (75%).
    2. Evaluate 2-second burst at 10 events/sec: 20 total events arrive.
    3. Calculate MCU processing capacity during burst: 2 seconds / 0.150 sec/event = 13.3 events processed.
    4. Calculate queued events: 20 arrived - 13.3 processed = 6.7 events queued.
    5. **Final Result: 6.7 events are queued, and will safely drain since normal utilization is < 1.**
