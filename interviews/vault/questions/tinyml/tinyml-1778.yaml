title: Analyzing Queue Capacity During Traffic Bursts
scenario: A smart sensor cluster sends events to a Cortex-M4 at 5 events/sec. The
  MCU processes events in exactly 150ms.
question: Analyze the utilization of the MCU and predict if the system can handle
  a temporary burst of 10 events/sec for 2 seconds.
details:
  realistic_solution: Normal utilization is 5 * 0.150 = 0.75. During the 2s burst,
    20 events arrive. The MCU processes 2 / 0.15 = 13.3 events. The remaining 6.7
    events queue up. Since normal utilization is < 1, the queue safely drains once
    the burst ends.
  common_mistake: Assuming a burst rate greater than the processing rate instantly
    drops events, ignoring the queue's transient absorption capacity.
  napkin_math: 20 - 13.3 = 6.7 queued
