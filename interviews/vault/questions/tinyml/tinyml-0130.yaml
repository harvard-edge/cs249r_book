title: The Energy Harvesting Wall
scenario: You're designing a structural health monitoring sensor powered by a small solar cell that provides
  an average of 0.5 mW indoors. The Cortex-M4 draws 50 mW active. Your model inference takes 30 ms. What
  is the maximum inference rate you can sustain indefinitely without a battery?
details:
  realistic_solution: 'The energy budget per inference = $P_{active} \times t_{inference} = 50\text{ mW}
    \times 30\text{ ms} = 1.5\text{ mJ}$. Add wake-up overhead of ~5 ms at 50 mW = 0.25 mJ. Total per
    inference ≈ 1.75 mJ. Maximum sustainable rate = $0.5\text{ mJ/s} / 1.75\text{ mJ} \approx 0.29$ inferences/sec
    (one every 3.5s). With realistic 60% DC-DC conversion efficiency and 10 µW sleep current: usable power
    ≈ 0.3 mW, sustainable rate drops to one inference every ~6 seconds. You also need a capacitor large
    enough to deliver the 1.75 mJ burst without the voltage dropping below the MCU''s brownout threshold
    (e.g., from 3.3V to 2.5V): $C = E / (0.5 \times (V_{max}^2 - V_{min}^2)) = 1.75\text{mJ} / (0.5 \times
    (3.3^2 - 2.5^2)) \approx 754\text{ µF}$ minimum.'
  common_mistake: '"0.5 mW / 50 mW = 1% duty cycle, so one inference every 100 seconds." This gets the
    duty cycle right but forgets that you need a storage capacitor to buffer the energy, and ignores the
    energy cost of waking up.'
  napkin_math: Harvested power = 0.5 mW (0.5 mJ/s). Deep sleep consumes 10 µW (0.01 mW), leaving 0.49
    mJ/s available. One inference on the Cortex-M4 takes 30ms at 50 mW -> Energy = 50 mW * 0.03s = 1.5
    mJ. Maximum sustainable inference rate = 0.49 mJ/s / 1.5 mJ/inference = 0.326 inferences/sec (1 inference
    every 3.1 seconds).
