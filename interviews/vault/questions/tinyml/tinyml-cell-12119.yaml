title: 'Model Size Estimation: Compare Quantized vs. Float Model on Cortex-M7+NPU'
scenario: A gesture recognition model (300K params) is deployed on Cortex-M7+Ethos-U55 in FP32 vs. INT8.
  Compare Flash usage, SRAM peak activation memory, inference latency, and power for a 10Hz detection
  rate. The Ethos-U55 only supports INT8.
details:
  realistic_solution: 'FP32: 300K × 4B = 1.2MB Flash (exceeds 512KB of typical MCU). If using M7 with
    1MB Flash: barely fits. CPU-only at 480MHz: 300K×4MACs/param (CNN) = 1.2M FLOPs / (480M × 4 FP ops/cycle)
    = 0.625ms per inference. Power: M7 at 480MHz ≈ 150mW active, 10Hz → 6.25ms active/100ms = 6.25% duty
    → avg 9.4mW. INT8: 300KB Flash. Ethos-U55: 1.2M INT8 ops / 500G = 2.4μs NPU + 0.5ms overhead = 0.5ms.
    Power: NPU at ~100mW, 0.5ms/100ms = 0.5% → avg 0.5mW. 19× power reduction.'
  common_mistake: Attempting to run FP32 model on Ethos-U55; the NPU supports only INT8, so FP32 must
    run entirely on Cortex-M7 CPU — a 4× size and performance disadvantage.
  napkin_math: 'FP32: 1.2MB Flash (may not fit). INT8: 300KB. SRAM activations: FP32 4× INT8: if INT8
    peak=50KB, FP32=200KB (may overflow 512KB SRAM when combined with runtime). Inference: FP32 CPU 0.625ms,
    INT8 NPU 0.5ms (similar but NPU frees CPU for other work). Power: FP32 at 10Hz: 0.625ms×150mW/100ms
    = 0.9375mW avg. INT8 NPU: 0.5ms×100mW/100ms = 0.5mW avg. INT8: 1.9× less power + fits in Flash.'
