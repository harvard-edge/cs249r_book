title: The Truck Roll Multiplier
scenario: You are the systems architect for a smart building product that deploys 100,000 battery-powered environmental sensors. Each device costs $10 and runs a TinyML model to detect anomalies.
question: Over the product's 5-year lifespan, what single factor is most likely to dominate the Total Cost of Ownership (TCO)?
details:
  realistic_solution: The dominant cost will be physical maintenance, specifically the operational expense (OpEx) of replacing batteries or entire units across 100,000 locations. Even with a multi-year battery life, the 'truck roll' cost to service a failed device far outweighs the initial hardware cost and the negligible cost of energy or backend cloud services.
  common_mistake: |
    **The Pitfall:** Focusing only on cloud computing costs.
    **The Rationale:** Engineers often forget the physical reality of deploying and maintaining hardware in the real world.
    **The Consequence:** The cost of sending a technician to replace a battery ('truck roll') is severely underestimated.
  napkin_math: |
    * Hardware CapEx: 100,000 devices * $10 = $1,000,000.
    * Truck Roll OpEx: Assume 20% fail/need battery replacement over 5 years = 20,000 truck rolls.
    * Cost per truck roll: Assume $150 minimum (labor + travel).
    * Total maintenance cost: 20,000 * $150 = $3,000,000.
    * **Result: Maintenance ($3M) far exceeds CapEx ($1M).**
  options:
  - Cloud computing costs for aggregating data and training model updates.
  - Initial hardware purchase (CapEx) of the 100,000 devices.
  - Physical maintenance and battery replacement ('truck rolls').
  - Energy consumption of the entire device fleet over 5 years.
  correct_index: 2
