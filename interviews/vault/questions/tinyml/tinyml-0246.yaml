title: The Depthwise Memory Footprint
scenario: You are optimizing a keyword spotting model for a Cortex-M4 microcontroller. Your baseline model
  uses a standard 2D convolutional layer with a 3x3 kernel, 16 input channels, and 32 output channels.
  To reduce the memory footprint, you propose replacing it with a depthwise separable convolution (a 3x3
  depthwise layer followed by a 1x1 pointwise layer). Compare the number of parameters for the standard
  convolution versus the depthwise separable convolution. What is the approximate reduction factor?
details:
  realistic_solution: 'The standard convolution''s parameters are calculated as `kernel_h × kernel_w ×
    C_in × C_out`. The depthwise separable convolution is a two-step process: a depthwise convolution
    (`kernel_h × kernel_w × C_in`) and a pointwise convolution (`1 × 1 × C_in × C_out`). The key is that
    the total parameters for the separable version is the *sum* of these two steps.'
  common_mistake: Engineers often calculate the parameters for the depthwise convolution but forget to
    include the parameters from the subsequent 1x1 pointwise convolution. This leads them to overestimate
    the memory savings by an order of magnitude, believing the technique is far more efficient than it
    actually is. They forget that the pointwise layer is essential for combining the channel-wise features
    and often contains the majority of the parameters in the separable block.
  napkin_math: 'Standard Conv: `9 × 16 × 32 ≈ 4.6k`.'
  options:
  - A ~32x reduction in parameters
  - A ~2x reduction in parameters
  - A ~7x reduction in parameters
  - No significant change in parameters
  correct_index: 2
