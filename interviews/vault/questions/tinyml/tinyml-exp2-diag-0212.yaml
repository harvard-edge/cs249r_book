title: ESP32-S3 Brownout During Concurrent Vision Inference and WiFi TX
scenario: You are deploying a wake-word and image classification pipeline on an ESP32-S3 (240 MHz dual-core
  Xtensa, 512 KB SRAM, 8 MB PSRAM, vector extensions for INT8). The system mostly sleeps, but upon acoustic
  wake-up, it captures an image, runs a quantized CNN, and transmits the result over WiFi. In field testing,
  the device frequently resets with a 'Brownout detector was triggered' error precisely when the vision
  model finishes and transmission begins, despite the LiPo battery being over 80% charged. How do you
  diagnose and resolve this?
question: "Why does ESP32-S3 vision inference plus WiFi TX trigger brownout on an 80% charged LiPo battery?"
details:
  realistic_solution: 'The root cause is a transient current spike exceeding the voltage regulator''s
    capacity or the battery''s instantaneous discharge capability. Running both Xtensa cores at 240 MHz
    with vector instructions active draws significant power. When the WiFi modem simultaneously fires
    a TX burst, the combined peak current causes a sudden voltage drop, triggering the hardware brownout
    reset. The solution is to implement power capping by temporally decoupling the peak loads: use DVFS
    to scale the CPU down to 80MHz or pause inference during WiFi TX bursts.'
  common_mistake: Candidates often assume the model is causing a memory leak, out-of-memory error, or
    an RTOS watchdog timeout. They might suggest optimizing the model size or moving activations to PSRAM,
    completely ignoring the instantaneous power domain interactions between the RF subsystem and the dual-core
    CPU running at maximum frequency.
  napkin_math: 'CPU @ 240MHz (both cores active + vector ALU): ~100mA. WiFi TX burst (802.11b, max power):
    ~340mA. PSRAM/Flash continuous access: ~40mA. Total instantaneous peak current: 100 + 340 + 40 = 480mA.
    If the battery has an internal resistance of 0.5 ohms, the V=IR drop is 0.48A * 0.5Ω = 0.24V drop
    on a nominal 3.3V rail. This pushes the supply voltage below the 3.1V ESP32-S3 hardware brownout threshold,
    causing the reset.'
