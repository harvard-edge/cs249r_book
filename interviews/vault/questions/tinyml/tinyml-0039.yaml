title: The Battery-Sipping Wearable
scenario: 'You''re designing a wearable activity tracker powered by a Cortex-M4. To maximize battery life, it operates on a duty cycle: it''s active for 2 seconds while processing sensor data (consuming 30 mW), then enters a deep sleep mode for 8 seconds (consuming 10 µW). This 10-second cycle repeats continuously.'
question: What average power does the wearable tracker draw with 2 s at 30 mW and 8 s at 10 uW each 10 s?
details:
  realistic_solution: The correct way to calculate the average power consumption is to find the time-weighted average over one full cycle. You calculate the total energy consumed during the cycle (active energy + sleep energy) and then divide by the total duration of the cycle.
  common_mistake: |
    **The Pitfall:** Ignoring the sleep state or using unweighted averages.
    **The Rationale:** Candidates assume sleep power is negligible or simply calculate an unweighted arithmetic mean (30 + 0.01)/2.
    **The Consequence:** Total energy drain is severely under- or over-estimated, invalidating BOM choices.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Active: 2s at 30 mW.
       - Sleep: 8s at 0.01 mW (10 µW).
       - Total period: 10s.
    2. **Calculations:**
       - Active Energy: 30 mW * 2 s = 60 mJ.
       - Sleep Energy: 0.01 mW * 8 s = 0.08 mJ.
       - Total Energy: 60.08 mJ per 10s cycle.
       - Average Power: 60.08 mJ / 10 s = 6.008 mW.
    3. **Conclusion & Interpretation:**
       - **Result: 6.008 mW.** The duty-cycled system is effectively **Power-Bound**, reducing average consumption by ~5x compared to always-on.
  options:
  - 10.0 mW
  - 25.05 mW
  - 6.008 mW
  - 50.0 mW
  correct_index: 2
