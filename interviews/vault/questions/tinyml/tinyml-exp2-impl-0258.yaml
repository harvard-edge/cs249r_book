title: Watchdog Timer Calculation for ML Inference
scenario: We are deploying an anomaly detection model on an ARM Cortex-M4 (STM32F4) for an ISO 26262 ASIL-B
  automotive application. The MCU runs at 168 MHz and relies on a hardware watchdog timer (WDT) to reset
  the system if the inference task hangs. The neural network requires 8.4 million INT8 MAC operations
  per inference. Using CMSIS-NN, the SIMD instructions achieve an average of 1.5 MACs per clock cycle
  due to memory overhead. Calculate the minimum WDT timeout interval (in milliseconds) required to ensure
  the WDT does not falsely trigger during a single inference pass, adding a 20% safety margin.
question: "How would you calculate the minimum WDT timeout interval (in milliseconds) required to ensure the WDT does not falsely trigger during a single inference pass, adding a 20% safety margin?"
details:
  realistic_solution: To find the minimum WDT timeout, calculate the total clock cycles required for the
    inference by dividing the total MACs by the effective MACs per cycle. Next, convert these clock cycles
    to execution time by dividing by the MCU's clock frequency (168 MHz). Finally, apply the required
    20% safety margin to ensure normal execution variations (like SRAM contention or interrupt jitter)
    do not trigger a spurious reset.
  common_mistake: Candidates often forget to account for the actual MACs per cycle efficiency, assuming
    the theoretical peak of 2x INT8 MACs/cycle is always hit. They also frequently fail to correctly convert
    clock cycles back to milliseconds at the 168 MHz clock speed or forget to apply the 20% safety margin.
  napkin_math: '1) Cycles required = 8,400,000 MACs / 1.5 MACs/cycle = 5,600,000 cycles.

    2) Base inference time = 5,600,000 cycles / 168,000,000 cycles/sec (168 MHz) = 0.0333 seconds (33.33
    ms).

    3) Minimum WDT timeout = 33.33 ms * 1.20 (20% safety margin) = 40.0 ms.'
