title: Diagnosing CNN Performance on ESP32-S3 with Roofline Analysis
scenario: A tinyML engineer is tasked with deploying a convolutional neural network
  (CNN) model for keyword spotting on an ESP32-S3 microcontroller. The model achieves
  90% accuracy offline but struggles to meet the real-time latency requirements (e.g.,
  100 ms inference time) when running on the device. The ESP32-S3 features a 240 MHz
  dual-core CPU, 512 KB of internal SRAM, and 8 MB of external PSRAM. The current
  implementation stores model weights in PSRAM and performs computations on the CPU.
  Using the Roofline Model, diagnose potential bottlenecks (compute-bound vs. memory-bound)
  and propose strategies to optimize the inference performance, considering the ESP32-S3's
  architectural constraints.
question: How should roofline analysis diagnose whether an ESP32-S3 keyword-spotting
  CNN with PSRAM-resident weights is memory-bound or compute-bound?
details:
  realistic_solution: '1. Characterize the Model: Determine the total FLOPs and memory
    access patterns (data movement) to calculate the operational intensity (FLOPs/byte)
    of the CNN model. 2. Obtain ESP32-S3 Roofline Parameters: Research or benchmark
    peak theoretical compute performance (e.g., for a 240 MHz dual-core, estimate
    ~960 MFLOPs/s for 32-bit float MACs) and peak effective memory bandwidths for
    both internal SRAM (very high, but limited capacity) and external PSRAM (e.g.,
    10-20 MB/s for typical access patterns). 3. Plot Roofline: Construct a Roofline
    plot showing the compute and memory ceilings for the ESP32-S3. 4. Locate Model
    on Roofline: Plot the CNN model''s operational intensity on the Roofline chart.
    This visualization will immediately indicate if the workload is compute-bound
    (hitting the compute ceiling) or memory-bound (hitting the memory wall). 5. Optimization
    Strategies: If memory-bound, consider aggressive quantization (e.g., 8-bit integer)
    to reduce model size and memory traffic, model compression techniques (pruning),
    and strategic placement of frequently accessed data or intermediate tensors into
    the faster internal SRAM. If compute-bound, explore model architecture redesign
    for fewer FLOPs (e.g., MobileNetV2 for tinyML), or highly optimized kernel implementations
    leveraging any available DSP instructions.'
  common_mistake: Assuming performance issues are solely compute-bound and immediately
    optimizing floating-point operations without first assessing memory bandwidth
    limitations or the impact of data movement between PSRAM and SRAM, or overlooking
    the implications of limited fast SRAM.
  napkin_math: "Assume a CNN model requires 50 MFLOPs for inference and has an average\
    \ operational intensity of 0.5 FLOPs/byte. \n- **Peak Compute (Rough Estimate):**\
    \ ESP32-S3 dual-core 240 MHz CPU, let's assume 2 FLOPs/cycle/core = 960 MFLOPs/s.\
    \ \n- **Peak PSRAM Bandwidth (Rough Estimate):** Assume 15 MB/s effective bandwidth.\
    \ \n- **Theoretical Compute Time:** 50 MFLOPs / 960 MFLOPs/s ≈ 52 ms. \n- **Data\
    \ Movement Requirement:** 50 MFLOPs / 0.5 FLOPs/byte = 100 MB of data to be moved.\
    \ \n- **Theoretical PSRAM Access Time:** 100 MB / 15 MB/s ≈ 6.67 seconds. \n\n\
    Comparing 52 ms (compute) to 6.67 seconds (memory access for full data movement),\
    \ the memory transfer from PSRAM to CPU cores is a *severe* bottleneck, orders\
    \ of magnitude slower than the target 100ms. This clearly indicates a memory-bound\
    \ workload, emphasizing the need to minimize data movement and maximize data reuse,\
    \ or keep critical data in SRAM."
