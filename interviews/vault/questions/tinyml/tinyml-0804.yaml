title: Tinyml New 0028
scenario: A deployed camera-based TinyML model drops from 95% accuracy to 60% after 6 months in an industrial
  environment. Re-running the identical model on the original test set still yields 95%.
details:
  realistic_solution: The symptom is out-of-distribution (OOD) data caused by physical sensor degradation,
    specifically dust or grease accumulating on the camera lens. The model relies on sharp edges and high
    contrast, which the physical occlusion softens. The solution is to implement continuous monitoring
    of image sharpness, trigger a maintenance alert to clean the lens, or use data augmentation with blur
    during training.
  common_mistake: Assuming software model drift while ignoring physical degradation of the edge sensors
    in harsh environments.
  napkin_math: Dust reduces lux by 50% and acts as a low-pass filter. High-frequency pixel deltas drop
    from 100 to 20. Softmax confidence drops from 0.95 to 0.45, falling below the 0.5 threshold.
