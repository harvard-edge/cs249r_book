title: 'TinyML Model Deployment: nRF5340 Memory Hierarchy Optimization'
scenario: You are tasked with deploying a machine learning model for a real-time anomaly detection application onto a Nordic nRF5340 microcontroller. The nRF5340 features a 128 MHz ARM Cortex-M33 application core, 256 KB of SRAM, and 1 MB of flash memory. The trained model (weights and biases) is 700 KB, and the input feature buffer requires an additional 50 KB. The application needs to perform inferences at a rate of 10 Hz.
question: How would you manage the model and data placement across the nRF5340's memory hierarchy to meet the real-time constraints, considering capacity, bandwidth, and latency tradeoffs?
details:
  realistic_solution: A realistic solution involves careful memory segmentation. The bulk of the 700 KB model (weights/biases) that exceeds SRAM capacity must reside in flash. Critical, frequently accessed layers or lookup tables might be explicitly loaded into SRAM at runtime, or directly executed from flash if the access pattern is sequential. Intermediate activation buffers and the 50 KB input feature buffer must fit within SRAM. For the 700 KB model, using a framework that supports in-place flash execution (e.g., TFLM with 'OpData' in flash) is crucial. The 10 Hz inference rate implies strict latency budgets, requiring minimal flash read overhead during the critical inference path.
  common_mistake: |
    **The Pitfall:** Ignoring flash access latency during inference.
    **The Rationale:** Candidates focus solely on fitting the 700 KB model into the 1 MB flash without considering the cycle penalties of reading weights directly from flash over the memory bus during a tight 100 ms inference budget.
    **The Consequence:** The model fits in memory but fails to meet the 10 Hz real-time constraint due to instruction and data fetch stalls.
  napkin_math: |
    1. Clock cycle time: 1 / 128 MHz ≈ 7.8 ns.
    2. SRAM Access: 1-2 cycles ≈ 7.8 - 15.6 ns per access.
    3. Flash Access: Assume 3 wait states (approx 24 ns per 32-bit word, or 6 ns/byte).
    4. Model transfer cost: Loading a 10 KB chunk from flash takes 10,240 bytes * 6 ns/byte ≈ 61.4 µs.
    5. Full model access: Reading 500 KB during inference takes 500,000 bytes * 6 ns/byte = **3.0 ms**.
    6. Conclusion: While 3.0 ms of memory transfer easily fits in the 100 ms (10 Hz) budget, instruction fetch latencies from flash could severely stall the pipeline, requiring critical compute layers to execute from SRAM.
