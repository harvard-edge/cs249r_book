title: Optimizing Latency on Cortex-M7 for TinyML Inference
scenario: A TinyML application running on a Cortex-M7 microcontroller (480 MHz, 512 KB SRAM) with an Ethos-U55 NPU (configured for 256 MAC/cycle) is experiencing unacceptably high inference latency for a real-time audio classification task. The model is a small CNN with 200k MACs per inference. The system needs to achieve an end-to-end inference latency under 5ms, but it currently exceeds this.
question: How should you find and quantify the bottleneck preventing the Ethos-U55 audio classifier from meeting its 5 ms latency target?
details:
  realistic_solution: '1. **Initial Profiling Setup**: Utilize a combination of software and hardware profiling. On the Cortex-M7, instrument the code with timing markers (`DWT_CYCCNT` or equivalent) around key operations (data acquisition, preprocessing, NPU inference call, post-processing). Use a J-Link debugger for hardware trace (SWO) to capture these timestamps.

    2. **NPU Utilization Analysis**: Leverage Ethos-U55 specific profiling tools (e.g., Arm''s Cycle Model or actual hardware trace if available) to determine the NPU''s actual MAC/cycle utilization and identify any stalls (e.g., data starvation from memory).

    3. **Memory Access Patterns**: Analyze memory access patterns and cache hit/miss rates. Identify if the 512 KB SRAM is sufficient or if external flash accesses are causing stalls. Tools like Arm Streamline or custom memory monitors can help.

    4. **I/O Bottleneck Identification**: If data acquisition (e.g., ADC readings) is part of the inference pipeline, profile its latency and throughput.

    5. **Data Analysis**: Collect and visualize profiling data (e.g., flame graphs, timeline views) to pinpoint the exact code sections or hardware interactions contributing most to latency.

    6. **Quantification**: Once a bottleneck is identified (e.g., NPU waiting for data due to slow memory access), quantify its contribution to the total latency. This allows for targeted optimization.'
  common_mistake: |
    **The Pitfall:** Jumping directly to model quantization or pruning without profiling.
    **The Rationale:** Candidates assume that high latency must be due to the model being too large or computationally heavy for the device.
    **The Consequence:** Optimizing a non-bottleneck component yields minimal real-world performance gains and can introduce accuracy degradation without solving the actual data starvation or I/O issues.
  napkin_math: |
    - **Peak NPU Throughput:** 256 MACs/cycle * 480 MHz = 122.88 GMACs/s.
    - **Theoretical NPU Compute Time:** 200,000 MACs / 122.88 GMACs/s ≈ 1.63 μs.
    - **Latency Discrepancy:** If the observed inference takes 5 ms (5000 μs), the NPU is operating at (1.63 / 5000) = 0.03% of its peak.
    - **Overhead Analysis:** The remaining ~4.998 ms must be attributed to data transfer (memory/SPI bottlenecks), control overhead, or data acquisition.
    - **Conclusion:** By isolating the 1.63 μs ideal compute from the 5 ms total, we **quantify the overhead** and definitively prove the bottleneck lies in I/O or memory bandwidth, not compute.
