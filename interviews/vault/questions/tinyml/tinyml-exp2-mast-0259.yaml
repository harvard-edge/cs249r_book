title: NPU-Aware CNN Design for Ethos-U55
scenario: You are designing a visual wake-word model for a battery-powered device built on the ARM Corstone-300
  subsystem (Cortex-M7 at 480 MHz + Ethos-U55 NPU). The system has a strict 512 KB SRAM limit shared between
  the MCU, NPU, and application data. You need to synthesize a novel CNN architecture that maximizes MAC
  utilization on the Ethos-U55 (configured for 256 MACs/cycle) while strictly avoiding SRAM spilling or
  MCU fallback for intermediate activations.
question: "How should an Ethos-U55 visual wake-word CNN be redesigned to maximize MAC utilization without SRAM spilling or MCU fallback?"
details:
  realistic_solution: A senior engineer will design a custom macro-architecture that aggressively downsamples
    spatially in the earliest layers before expanding channels, keeping the maximum instantaneous activation
    memory strictly under ~350 KB to leave room for RTOS overhead. They will also replace standard inverted
    residuals with fused MBConv blocks or grouped convolutions optimized for the U55's specific MAC array
    dimensions, ensuring >85% utilization and keeping all operators strictly mapped to the NPU.
  common_mistake: Candidates often blindly apply MobileNetV2/V3 inverted residuals, unaware that high-expansion-ratio
    blocks create massive intermediate activation tensors that exceed the shared SRAM. Furthermore, they
    may use activation functions like SiLU or specific depthwise kernel configurations that the Ethos-U55
    cannot fully accelerate, forcing a slow fallback to the Cortex-M7.
  napkin_math: For a 96x96x3 input, a standard MobileNetV2 block with an expansion ratio of 6 at 48 channels
    creates an intermediate int8 tensor of 96*96*288 = 2.65 MB, instantly overflowing the 512 KB SRAM.
    Redesigning with early 2x spatial downsampling (48x48) and reducing the expansion ratio to 3 yields
    an intermediate tensor of 48*48*144 = 331 KB, fitting safely in SRAM. The U55 at 480 MHz with 256
    MACs/cycle yields 122.88 GMACs/sec peak. To meet a strict 10ms inference budget at an assumed 80%
    utilization rate, the total model complexity must not exceed 0.98 GMACs (122.88 * 0.01 * 0.8).
