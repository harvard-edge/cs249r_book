title: The Smart Doorbell's Update Dilemma
scenario: 'You lead engineering for 1 million smart doorbells. You want to deploy a model update each month. Proposal A: Centralized OTA. Devices upload 1MB of raw audio weekly, and receive a 500KB updated model monthly. Proposal B: Federated Learning. Devices compute weight updates locally, upload 50KB of gradients weekly, and download a 50KB aggregated model monthly.'
question: 'Which monthly update plan has lower TCO for 1M doorbells: raw-audio OTA or federated gradients?'
details:
  realistic_solution: Federated Learning (Proposal B) achieves vastly lower Total Cost of Ownership (TCO). While it shifts compute overhead to the edge, the massive reduction in cellular/cloud data transfer payload dominates the economics at fleet scale. Furthermore, by retaining raw audio on-device and transmitting only anonymized gradients, federated learning structurally enforces data privacy, mitigating immense regulatory and reputational risk.
  common_mistake: |
    **The Pitfall:** Overestimating the cost of on-device compute while ignoring the massive cost of fleet-scale data transfer.
    **The Rationale:** Engineers assume constrained edge hardware cannot afford gradient calculations and default to cloud processing.
    **The Consequence:** The product incurs crippling operational bandwidth costs (TCO) and exposes users to massive privacy violations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet: 1M devices.
       - Cost: $0.09/GB for data transfer.
    2. **Calculations:**
       - Proposal A (OTA): 1MB/wk + 500KB/mo = ~58MB/device/yr. Fleet total: 58TB. Cost = $5,220/yr.
       - Proposal B (FL): 50KB/wk + 50KB/mo = ~3.2MB/device/yr. Fleet total: 3.2TB. Cost = $288/yr.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound Economics.** Federated Learning provides an 18x reduction in data transfer costs.
  options:
  - Centralized OTA, because the on-device compute cost of FL would be too high and drain the battery.
  - Centralized OTA, because it's more secure; a signed firmware image prevents tampering, unlike FL which is vulnerable to data poisoning.
  - Federated Learning, because it has a significantly lower data transfer TCO and preserves user privacy by not uploading raw audio.
  - The annual costs for both are under $500, so they are negligible. Choose Centralized OTA for its simpler implementation.
  correct_index: 2
