title: 'The Wildlife Camera''s Power Budget: Duty Cycling & Energy Harvesting'
scenario: You are designing a remote wildlife camera. The system stays in a deep sleep mode, wakes up once every minute to capture an image and run a 2-second inference workload, and then goes back to sleep. The microcontroller consumes 40 mW in active mode and 10 µW in deep sleep mode.
question: How do you compute average power for a wildlife camera from its active and deep-sleep states?
details:
  realistic_solution: 'Calculate average power as weighted average of active and sleep states. P_avg = (P_active * t_active + P_sleep * t_sleep) / t_period. Convert all units consistently: E_active = 40 mW * 2s = 80 mJ. E_sleep = 0.01 mW * 58s = 0.58 mJ. Total energy per period = 80.58 mJ. P_avg = 80.58 mJ / 60s = 1.343 mW. Key insight: sleep current contributes a noticeable portion of total energy despite being active ~96% of the time in sleep — both terms matter.'
  common_mistake: |
    **The Pitfall:** Ignoring the energy consumed during the sleep state or mismanaging units (mW vs µW).
    **The Rationale:** Engineers assume sleep current is strictly zero, failing to account for its cumulative effect over long periods.
    **The Consequence:** The battery sizing calculation is off, leading to a deployment lifetime shorter than specified.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active Power: 40 mW for 2s.
    - Sleep Power: 10 µW (0.01 mW) for 58s.
    - Period: 60s.

    **Calculations:**
    - E_active = 40 mW * 2s = 80 mJ.
    - E_sleep = 0.01 mW * 58s = 0.58 mJ.
    - Total Energy per minute = 80 mJ + 0.58 mJ = 80.58 mJ.
    - P_avg = 80.58 mJ / 60s = 1.343 mW.

    **Conclusion & Interpretation:**
    - **Result: 1.34 mW (Power-Bound)**. Average power is primarily influenced by the active inference state, but sleep state is non-negligible.
  options:
  - ~1.67 mW
  - ~9.7 mW
  - ~1.34 mW
  - ~25 mW
