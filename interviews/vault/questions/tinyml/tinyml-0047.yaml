title: 'The Wildlife Camera''s Power Budget: Duty Cycling & Energy Harvesting'
scenario: You're designing a remote wildlife camera using a Cortex-M4 based microcontroller. The system
  stays in a deep sleep mode, wakes up once every minute to capture an image and run a 2-second inference
  workload, and then goes back to sleep. The Cortex-M4 consumes 40 mW in active mode and 10 µW in deep
  sleep mode. Calculate the average power consumption of the device. This is the single most critical
  number for sizing the battery and determining deployment lifetime.
question: "How do you compute average power for a Cortex-M4 wildlife camera from active and deep-sleep states?"
details:
  realistic_solution: 'Calculate average power as weighted average of active and sleep states. P_avg =
    (P_active * t_active + P_sleep * t_sleep) / t_period. Convert all units consistently: if P_active
    = 36 mW, t_active = 50 ms, P_sleep = 3.6 uW (0.0036 mW), t_sleep = 59,950 ms (1-minute period): P_avg
    = (36 * 50 + 0.0036 * 59,950) / 60,000 = (1,800 + 215.8) / 60,000 = 0.0336 mW = 33.6 uW. Battery life:
    225 mAh * 3.0V = 675 mWh. Hours = 675 / 0.0336 = 20,089 hours = 2.29 years. Key insight: sleep current
    (3.6 uA) contributes 10.7% of total energy despite being active 99.9% of the time — both terms matter.'
  common_mistake: 'Engineers often make two mistakes here: 1) They completely ignore the energy consumed
    during the sleep state, assuming it''s zero. While small, it becomes significant over days or weeks.
    2) They mismanage units, mixing up milliwatts (mW) and microwatts (µW), leading to an answer that''s
    off by orders of magnitude.'
  napkin_math: 1. **Define States & Power:** Active power = 40 mW, Sleep power = 10 µW = 0.01 mW. Period
    = 60s. Active time = 2s. Sleep time = 58s. 2. **Calculate Active Energy:** E_active = 40 mW * 2s =
    80 mJ. 3. **Calculate Sleep Energy:** E_sleep = 0.01 mW * 58s = 0.58 mJ. 4. **Calculate Total Energy
    per Period:** E_total = 80 + 0.58 = 80.58 mJ. 5. **Calculate Average Power:** P_avg = E_total / Period
    = 80.58 mJ / 60s = 1.34 mW. The duty cycle is 2/60 = 3.3%, which reduces the effective average power
    from 40 mW to ~1.34 mW. The sleep energy contributes less than 1% of total energy but should not be
    ignored in ultra-long deployments.
  options:
  - ~1.67 mW
  - ~9.7 mW
  - ~1.34 mW
  - ~25 mW
  correct_index: 2
