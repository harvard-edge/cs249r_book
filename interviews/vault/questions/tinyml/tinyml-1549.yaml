title: Hailo-8 Flash Ring-Buffer RTO
scenario: A smart traffic camera running on a Hailo-8 experiences transient grid power
  spikes causing microsecond reboots. The 100 KB vehicle tracking state must be recovered
  within an absolute RTO of 15ms. The onboard flash memory writes at 10 MB/s and reads
  at 40 MB/s.
question: Apply a ring-buffer state logging strategy and calculate if the time to
  recover the state fits within the 15ms constraint.
visual:
  kind: svg
  path: tinyml-1549.svg
  alt: Timeline visualization of reboot, block scan, and state load fitting well under
    the 15ms limit.
  caption: Flash Ring-Buffer Recovery
details:
  realistic_solution: Using an append-only ring-buffer strategy, the state is written
    iteratively. In the event of a failure, the system must scan the flash block metadata
    to find the head, then read the 100 KB state. The read time is 100 KB / 40 MB/s
    = 2.5ms. Assuming a trivial metadata read time (e.g., <1ms), the recovery takes
    ~3.5ms, easily fitting within the strict 15ms RTO.
  common_mistake: Calculating the recovery time based on the flash write speed (10
    MB/s = 10ms) instead of the read speed, since RTO applies to the post-reboot read
    phase.
  napkin_math: 100 KB = 0.1 MB; Read time = 0.1 MB / 40 MB/s = 0.0025 s = 2.5 ms.
