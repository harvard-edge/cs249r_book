title: The Binary Neural Network on MCU
scenario: >
  Your research team proposes deploying a Binary Neural Network (1-bit weights, 1-bit activations) on a Cortex-M4 at 168 MHz for always-on gesture detection. They claim XNOR + popcount replaces multiply-accumulate, giving a massive 32x throughput over INT8.
question: >
  What actual speedup should a binary neural network achieve on Cortex-M4, and why is it not a full 32x?
details:
  realistic_solution: >
    Compare the inner loop for one output element of a Conv2D with 256 input channels and 3x3 kernel (2,304 MACs).
  common_mistake: |
    **The Pitfall:** Believing the 32x theoretical peak speedup is achievable in practice on any hardware.
    **The Rationale:** The 32x figure applies only to the XNOR operation alone, ignoring the popcount, memory packing/unpacking, and loop overhead.
    **The Consequence:** Teams overpromise on BNN performance and under-deliver when the model barely beats INT8 speeds while suffering massive accuracy drops.
  napkin_math: |
    - **INT8 baseline:** A Cortex-M4 using SIMD can do 2 MACs/cycle. Effective operations take ~0.5 cycles per MAC (plus memory overhead). Total = 1.49ms for 500K MACs.
    - **Binary ops:** XNOR processes 32 ops in 1 cycle. However, the M4 lacks a hardware popcount instruction.
    - **Popcount penalty:** Software popcount requires ~6 cycles, plus packing overhead, meaning 32 ops actually take ~10 cycles.
    - **Binary speedup:** 500K ops / 32 × 10 cycles = 156.25K cycles = 0.93ms.
    - **Conclusion:** The speedup is only **1.6×** (1.49ms vs 0.93ms), not 32×. This small gain comes with a severe accuracy penalty (e.g., 93% to 78%).
  options:
  - BNNs replace MAC with XNOR + popcount, processing 32 operations per 32-bit word — a true 32x speedup over INT8 on any hardware.
  - 'Actual speedup on M4: ~1.6x (not 32x). The XNOR is fast (1 cycle for 32 ops), but popcount requires ~6 cycles (no hardware popcount on M4), plus packing/unpacking overhead. Full model: INT8 = 1.49ms, binary = 0.93ms. And accuracy drops from 93% to 78%. On M55 with Helium: binary achieves 5.3x (hardware-assisted popcount). BNNs only become compelling on architectures with native popcount instructions.'
  - BNNs achieve 32x speedup on Cortex-M4 but have been abandoned because the 1-bit weight representation cannot converge during training for models larger than 100K parameters.
  - BNNs are 32x faster but require 32x more parameters to match INT8 accuracy, making the total model size identical and eliminating any memory savings.
  correct_index: 1
