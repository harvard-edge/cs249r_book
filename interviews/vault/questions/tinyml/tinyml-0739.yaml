title: The Binary Neural Network on MCU
scenario: Your research team proposes deploying a Binary Neural Network (1-bit weights, 1-bit activations)
  on a Cortex-M4 at 168 MHz for always-on gesture detection. They claim XNOR + popcount replaces multiply-accumulate,
  giving 32× throughput over INT8. Validate this claim with cycle counts, and explain why BNNs haven't
  replaced INT8 models on MCUs despite the theoretical speedup.
question: "What actual speedup should a binary neural network achieve on Cortex-M4, and why is it not a full 32x?"
details:
  realistic_solution: 'Compare the inner loop for one output element of a Conv2D with 256 input channels
    and 3×3 kernel (2,304 MACs):'
  common_mistake: '"32 binary operations per 32-bit word = 32× speedup over INT8. BNNs are strictly better."
    The 32× is the theoretical peak for the XNOR operation alone. The full pipeline tells a different
    story.'
  napkin_math: 'INT8 SIMD: 1,202 cycles/element. Binary: 740 cycles/element. Speedup: 1.62×. For a full
    model (500K MACs): INT8 = 500K/2 = 250K cycles = 1.49ms. Binary = 500K/32 × 10 = 156.25K cycles =
    0.93ms. Savings: 0.56ms. But accuracy: INT8 = 93%, Binary = 78%. Energy: INT8 = 50 mW × 1.49ms = 74.5
    µJ. Binary = 50 mW × 0.93ms = 46.5 µJ. Energy savings: 37%. On Cortex-M55 with Helium: Binary = 500K/32
    × 3 = 46.875K cycles = 0.28ms. Speedup: 5.3×. This is where BNNs become compelling — but M55 adoption
    is still early.'
  options:
  - BNNs replace MAC with XNOR + popcount, processing 32 operations per 32-bit word — a true 32x speedup
    over INT8 on any hardware.
  - 'Actual speedup on M4: ~1.6x (not 32x). The XNOR is fast (1 cycle for 32 ops), but popcount requires
    ~6 cycles (no hardware popcount on M4), plus packing/unpacking overhead. Full model: INT8 = 1.49ms,
    binary = 0.93ms. And accuracy drops from 93% to 78%. On M55 with Helium: binary achieves 5.3x (hardware-assisted
    popcount). BNNs only become compelling on architectures with native popcount instructions.'
  - BNNs achieve 32x speedup on Cortex-M4 but have been abandoned because the 1-bit weight representation
    cannot converge during training for models larger than 100K parameters.
  - BNNs are 32x faster but require 32x more parameters to match INT8 accuracy, making the total model
    size identical and eliminating any memory savings.
  correct_index: 1
