title: The Depthwise Separable Efficiency Gain
scenario: Your team is optimizing a CNN for a Cortex-M4 microcontroller and you're swapping standard 3x3
  convolutional layers for 3x3 depthwise separable convolutions to save computation. Roughly how much
  more computationally efficient is the depthwise separable layer compared to the standard one?
question: "Roughly how much more computationally efficient is the depthwise separable layer compared to the standard one?"
details:
  realistic_solution: A 3x3 depthwise separable convolution is approximately 8-9x more efficient than
    a standard 3x3 convolution. The computational cost of a standard convolution is proportional to `kernel_width
    * kernel_height * input_channels * output_channels`, while the depthwise separable version is proportional
    to `(kernel_width * kernel_height * input_channels) + (input_channels * output_channels)`. The ratio
    of these two costs approaches `kernel_width * kernel_height` as the number of channels increases.
  common_mistake: Engineers often underestimate the savings, thinking it's a small linear factor like
    2-3x. They forget that the savings scale quadratically with the kernel dimensions, as the expensive
    part of a standard convolution (mixing channels) is factored out into a cheap 1x1 operation.
  napkin_math: Let's compare the FLOPs (Multiply-Accumulates).
  options:
  - ~2x more efficient
  - ~4x more efficient
  - ~9x more efficient
  - The efficiency is the same, but memory is lower
  correct_index: 2
