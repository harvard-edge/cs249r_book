title: AOT Compiler Memory-Latency Tradeoff Analysis
scenario: You are deploying an anomaly detection model on a Nordic nRF5340 (128 MHz app core, 256 KB SRAM, 1 MB flash). After running your model through an ahead-of-time (AOT) graph compiler, the peak SRAM drops from 220 KB to 130 KB, but inference latency increases from 40ms to 50ms. The system operates at 3.0V with a ~5mA active current.
question: How would you explain the architectural tradeoffs the compiler made to achieve this memory reduction, and calculate the energy difference per inference?
details:
  realistic_solution: The AOT compiler heavily prioritized SRAM constraints by employing aggressive buffer sharing and operator fusion. Buffer sharing creates sequential scheduling bottlenecks, while fused operators often fall back to generalized implementations instead of utilizing the hand-tuned SIMD/DSP intrinsics available for standard layers. The memory footprint was drastically reduced, but the processor requires more clock cycles to compute the unoptimized fused operations.
  common_mistake: |
    **The Pitfall:** Assuming memory-optimized graphs always run faster.
    **The Rationale:** Candidates think less memory means less access overhead, ignoring the cost of generalized fused operators.
    **The Consequence:** They fail to realize buffer sharing introduces dependencies and bypasses hand-tuned DSP intrinsics.
  napkin_math: |
    * Active Power = 5 mA * 3.0 V = 15 mW.
    * Original Energy = 15 mW * 40 ms = 0.6 mJ.
    * New Energy = 15 mW * 50 ms = 0.75 mJ.
    * **Result: Saving 90 KB SRAM costs an additional 10 ms and 0.15 mJ per inference.**
