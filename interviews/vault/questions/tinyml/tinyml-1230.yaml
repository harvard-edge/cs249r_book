title: DMA Ping-Pong Buffering for Continuous Sensor Ingestion
scenario: An ESP32-S3 is ingesting 4 channels of 16-bit acoustic data at 16 kHz via SPI. Core 1 uses CPU polling to read samples into a PSRAM ring buffer. Core 1 also executes an INT8 neural network taking 100 ms per inference. During inference, SPI polling is blocked, resulting in dropped streaming data.
question: How would you diagnose the ingestion bottleneck, quantify the data loss, and determine the architectural fix required?
details:
  realistic_solution: The correct architectural approach is to offload streaming ingestion entirely from the CPU by configuring the SPI peripheral to use Direct Memory Access (DMA) with ping-pong buffers allocated in the fast 512 KB internal SRAM. The CPU only intervenes when a DMA block complete interrupt fires, swapping buffers seamlessly.
  common_mistake: |
    **The Pitfall:** Suggesting the use of FreeRTOS tasks or timer interrupts to interleave SPI reads with the neural network inference loop.
    **The Rationale:** Candidates try to solve a hardware I/O problem with software context-switching, failing to realize the CPU overhead of high-frequency interrupts.
    **The Consequence:** High-frequency context switching completely thrashes the CPU pipeline, degrading inference latency further while still missing strict real-time acoustic sampling deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:** 4 channels, 16 kHz, 16-bit (2 bytes) = 128 KB/s data rate (64,000 samples/s). Polling costs 40 cycles/sample. Inference blocks for 100 ms (0.1s).
    2. **Calculations:** Data generated during 100ms inference = 128 KB/s * 0.1s = 12.8 KB (6,400 samples). Wasted CPU bandwidth during polling = 64,000 samples/s * 40 cycles = 2.56 MHz (approx 1% of a 240 MHz core).
    3. **Conclusion & Interpretation:** **Result: DMA Ping-Pong Offload.** By allocating two 12.8 KB DMA ping-pong buffers in internal SRAM, we eliminate 100% of data loss during the 100ms inference and reclaim 2.56 million cycles/sec, completely decoupling I/O from compute.
