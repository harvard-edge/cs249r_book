title: DMA Ping-Pong Buffering for Continuous Sensor Ingestion
scenario: An ESP32-S3 (240 MHz dual-core, 512 KB SRAM, 8 MB PSRAM) edge device is
  ingesting 4 channels of 16-bit acoustic data at 16 kHz via SPI for predictive maintenance.
  The firmware uses CPU polling on Core 1 to read samples into a large PSRAM ring
  buffer, taking 40 CPU cycles per sample. Core 1 also executes the INT8 neural network,
  which takes 100 ms per inference. During this 100 ms inference window, SPI polling
  is blocked, resulting in dropped streaming data. Diagnose the ingestion bottleneck
  and quantify the data loss and the architectural fix required.
question: How would you diagnose the ingestion bottleneck and quantify the data loss
  and the architectural fix required?
details:
  realistic_solution: The correct architectural approach is to offload streaming ingestion
    entirely from the CPU by configuring the SPI peripheral to use Direct Memory Access
    (DMA) with ping-pong buffers allocated in the fast 512 KB internal SRAM. The CPU
    only intervenes when a DMA block complete interrupt fires, swapping buffers seamlessly.
  common_mistake: Candidates often suggest using FreeRTOS tasks or timer interrupts
    to interleave SPI reads with the inference execution, failing to realize that
    high-frequency context switching will thrash the CPU, degrade inference latency,
    and still miss strict real-time deadlines.
  napkin_math: System Data Rate = 4 channels * 16,000 Hz * 2 bytes = 128 KB/sec (64,000
    samples/sec). During the 100 ms inference block, the system generates 12.8 KB
    of data (6,400 samples). Currently, all 6,400 samples are dropped per inference,
    and CPU polling wastes 2.56 MHz of CPU bandwidth (64,000 * 40 cycles). By allocating
    two 12.8 KB DMA ping-pong buffers in the 512 KB SRAM (using only 5% of internal
    SRAM), we eliminate 100% of the data loss and reclaim 2.56 million cycles/sec
    for Core 1.
