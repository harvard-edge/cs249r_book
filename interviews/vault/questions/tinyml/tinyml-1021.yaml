title: Energy-Aware Model Selection on nRF5340
scenario: You are designing an always-on anomaly detection system for a wearable device using a Nordic nRF5340. The application core runs at 128 MHz and draws ~5mA active current at 3V, while you have 256 KB of SRAM and 1 MB of flash available. You have two model architectures that achieve identical accuracy: Model A requires 5M MACs but fits entirely in a 128 KB SRAM buffer, while Model B requires only 1M MACs but has 512 KB of weights, forcing you to stream weights directly from flash during inference.
question: "Which model (SRAM-bound Model A vs Flash-bound Model B) minimizes total energy per inference on the nRF5340, and why?"
details:
  realistic_solution: At L5, the candidate must evaluate the system-level energy cost, recognizing that fetching data from flash dominates the energy budget. Model A is the superior choice. Even though it has 5x more compute, all memory accesses are to the local, low-latency 256 KB SRAM. In Model B, streaming 512 KB of weights from the 1 MB flash incurs a massive energy penalty and introduces wait states that keep the power-hungry 128 MHz core active longer, outweighing the savings from fewer MACs.
  common_mistake: |
    **The Pitfall:** Choosing Model B solely because it has 5x fewer MACs.
    **The Rationale:** Candidates equate "fewer compute operations" directly with "lower energy", ignoring memory hierarchy costs.
    **The Consequence:** The flash memory access costs (Horowitz principles) and CPU wait-state stalls cause the "efficient" Model B to actually consume far more battery power.
  napkin_math: |
    * nRF5340 active power: ~15mW (5mA @ 3V).
    * **Model A:** 5M MACs @ 128 MHz = ~39ms. Compute energy = 15mW × 39ms = **585 µJ** (zero-wait SRAM).
    * **Model B:** 1M MACs = ~7.8ms = ~117 µJ compute. However, streaming 512 KB from flash stalls the CPU.
    * Wait states add ~25ms delay (15mW × 25ms = 375 µJ).
    * Flash peripheral read energy (~1-2 nJ/byte) adds ~500 µJ.
    * Model B total energy: 117 + 375 + 500 = **~992 µJ** (> 1 mJ).
    * Model A is significantly more efficient.
