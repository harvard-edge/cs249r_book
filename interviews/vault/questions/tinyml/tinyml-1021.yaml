title: Energy-Aware Model Selection on nRF5340
scenario: You are designing an always-on anomaly detection system for a wearable device using a Nordic nRF5340. The application core runs at 128 MHz and draws ~5mA active current at 3V. You have 256 KB of SRAM and 1 MB of flash available. Model A requires 5M MACs but fits entirely in a 128 KB SRAM buffer. Model B requires only 1M MACs but has 512 KB of weights, forcing you to stream weights directly from flash during inference.
question: "Which model (SRAM-bound Model A vs Flash-bound Model B) minimizes total energy per inference on the nRF5340, and why?"
details:
  realistic_solution: At L5, the candidate must evaluate the system-level energy cost, recognizing that fetching data from flash dominates the energy budget. Model A is the superior choice. Even though it has 5x more compute, all memory accesses are to the local, low-latency 256 KB SRAM. In Model B, streaming 512 KB of weights from the 1 MB flash incurs a massive energy penalty and introduces wait states that keep the power-hungry 128 MHz core active longer, outweighing the savings from fewer MACs.
  common_mistake: |
    **The Pitfall:** Choosing Model B solely because it has 5x fewer MACs.
    **The Rationale:** Candidates equate "fewer compute operations" directly with "lower energy", ignoring memory hierarchy costs.
    **The Consequence:** The flash memory access costs and CPU wait-state stalls cause the "efficient" Model B to actually consume far more battery power.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - nRF5340 active power: ~15mW (5mA @ 3V).
       - CPU: 128 MHz.
       - Model A: 5M MACs, SRAM-resident.
       - Model B: 1M MACs, Flash-resident (requires streaming).
    2. **Calculations:**
       - Model A: 5M MACs @ 128 MHz = ~39 ms. Energy = 15 mW * 39 ms = 585 \u00b5J.
       - Model B: 1M MACs @ 128 MHz = ~7.8 ms. Compute energy = 15 mW * 7.8 ms = ~117 \u00b5J.
       - Flash wait states add ~25 ms delay = 15 mW * 25 ms = 375 \u00b5J.
       - Flash peripheral read energy (~1 nJ/byte) for 512 KB = 512,000 * 1 nJ = 512 \u00b5J.
       - Model B Total = 117 + 375 + 512 = 1004 \u00b5J.
    3. **Conclusion & Interpretation:**
       - **Result: Model A uses 585 \u00b5J, while Model B uses 1004 \u00b5J.**
       - **Energy-Bound (Flash Access Costs)**
