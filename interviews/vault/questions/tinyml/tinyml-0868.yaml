title: 'Model Format Conversion: Recall TFLite Micro Supported Op List and Limitations'
scenario: A firmware engineer is porting a neural network to a Cortex-M4 using TensorFlow Lite for Microcontrollers (TFLM). The model currently relies on dynamic shapes, string tokens, and standalone batch normalization layers.
question: Which common neural network operations are NOT supported in TFLite Micro, and what are the workarounds?
details:
  realistic_solution: 'Unsupported in TFLM: (1) Dynamic shapes — workaround: pad inputs to fixed max size. (2) String tensors (text tokenization) — workaround: tokenize on host, send int tokens. (3) BatchNorm as separate op (must be folded into Conv) — workaround: ensure BN folding at export. (4) Large gather/scatter ops — workaround: precompute embeddings. (5) BiasAdd with int64 — workaround: use int32. TFLM op kernel list is ~50 ops vs TFLite''s 170+.'
  common_mistake: |
    **The Pitfall:** Attempting to deploy models with dynamic shapes, string tensors, or tf.function control flow.
    **The Rationale:** Candidates assume TFLM supports the same vast library of operators as standard desktop TFLite.
    **The Consequence:** The model fails to compile or crashes at runtime because the micro interpreter lacks dynamic allocation and advanced graph execution features.
  napkin_math: |
    * **TFLM Kernel Overhead:** Each included op kernel adds ~1-4 KB of Flash footprint.
    * **Minimal Build:** (Conv2D + DepthwiseConv + FC + Softmax) adds ~8 KB of Flash overhead.
    * **Full Build:** Linking all ~50 TFLM ops adds ~30 KB overhead.
    * **Flash Budget:** On a 256 KB Flash MCU, a 100 KB model leaves ample headroom (126 KB) for application code when only linking required ops.
