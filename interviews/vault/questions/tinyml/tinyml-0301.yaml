title: The Economics of Federated Learning
scenario: You are deploying a fleet of 100,000 smart sensors that use federated learning to improve a keyword-spotting model. The model is 500 KB in size. To manage network load, only 10% of the fleet (10,000 devices) uploads a full model update each day.
question: Calculate the total daily data upload volume for this federated system.
details:
  realistic_solution: The correct approach is to multiply the number of devices participating daily by the size of the data upload per device. This avoids the privacy and cost pitfalls of sending raw user data. In this case, 10,000 devices are uploading 500 KB each, giving a total daily data volume of ~5 GB.
  common_mistake: |
    **The Pitfall:** Miscalculating the total data volume by confusing units (KB, MB, GB) or ignoring the fleet subset size.
    **The Rationale:** Engineers often calculate the cost for a single device, or for the entire fleet, instead of the 10% daily active subset.
    **The Consequence:** Wildly inaccurate bandwidth budgeting and data cost projections.
  napkin_math: |
    *   **Daily active devices:** 100,000 * 10% = 10,000 devices.
    *   **Upload per device:** 500 KB.
    *   **Total upload volume:** 10,000 * 500 KB = 5,000,000 KB.
    *   **Conversion:** 5,000,000 KB / 1024 = 4,882 MB, which is roughly **4.77 GB per day**.
    *   **Cost check:** At $0.10/MB, this federated learning strategy costs $488/day in data fees.
  options:
  - 50 GB
  - 500 KB
  - 5 GB
  - 5 MB
  correct_index: 2
