title: ESP32-S3 Speech-to-Intent Latency Breakdown
scenario: You are architecting a local speech-to-intent engine on an ESP32-S3 microcontroller (240 MHz dual-core Xtensa, 512 KB SRAM, 8 MB PSRAM, INT8 vector extensions). The pipeline captures audio, extracts MFCC features, runs a 2.5M parameter INT8 autoregressive sequence model to generate a 5-token intent, and transmits via WiFi.
question: Evaluate the end-to-end latency by decomposing it into preprocessing, TTFT, TPOT, and network transmission.
details:
  realistic_solution: The correct approach recognizes that autoregressive generation (batch size of 1) is entirely memory-bandwidth bound. While compute is heavily accelerated by the INT8 vector extensions, fetching weights from PSRAM dominates the time per output token. A comprehensive L5 response decomposes latency into SRAM-based preprocessing, PSRAM-bound TPOT, and fixed WiFi overhead.
  common_mistake: |
    **The Pitfall:** Assuming latency is purely compute-bound by the 240 MHz CPU.
    **The Rationale:** Candidates overlook that a 2.5MB model exceeds the 512KB SRAM and must reside in PSRAM. They fail to account for the PSRAM bandwidth bottleneck (~80 MB/s).
    **The Consequence:** Drastically underestimating Time per Output Token (TPOT) for autoregressive generation.
  napkin_math: |
    *   **Preprocessing (SRAM):** ~20ms.
    *   **TPOT (PSRAM Bound):** Fetching 2.5MB INT8 weights from PSRAM (80 MB/s bandwidth) takes 2.5 MB / 80 MB/s = 31.25 ms. Compute (<5ms). Total TPOT ≈ 35ms.
    *   **TTFT:** Preprocessing (20ms) + First Token (35ms) = 55ms.
    *   **5-Token Generation:** TTFT (55ms) + 4 * TPOT (140ms) = 195ms.
    *   **Network:** WiFi wake and transmission = ~150ms.
    *   **Total End-to-End Latency:** 195ms + 150ms = **345ms**.
