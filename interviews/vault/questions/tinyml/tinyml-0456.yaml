title: The Neural Architecture Search Power Puzzle
scenario: "You are using a Neural Architecture Search (NAS) tool to design a keyword-spotting model for a battery-powered device. The hard constraint is an average power consumption below 2.5 mW. The model runs once every second to check for a keyword. The microcontroller's deep sleep power is negligible (~10 \u00b5W). The NAS has produced three candidate architectures: Model A (50mW, 40ms), Model B (20mW, 150ms), and Model C (10mW, 300ms)."
question: Which NAS candidate meets the 2.5 mW average power budget once duty cycle is considered?
details:
  realistic_solution: The correct way to solve this is to apply the duty cycle formula to calculate the average power for each candidate model over the 1-second period. The average power is the total energy consumed in the period, divided by the period duration. Only Model A, despite having the highest peak power, completes its task fast enough to keep the average power under the 2.5mW budget. Models B and C, while having lower peak power, run for too long and exceed the energy budget.
  common_mistake: |
    **The Pitfall:** Choosing the model with the lowest active peak power consumption (Model C).
    **The Rationale:** Candidates intuitively equate lower instantaneous power with greater energy efficiency, ignoring the time dimension and duty cycle mechanics.
    **The Consequence:** The chosen model drains the battery faster because it takes significantly longer to compute, failing the average power budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Average Power Budget: 2.5 mW.
       - Duty Cycle Period: 1000 ms.
       - Negligible sleep power.
    2. **Calculations:**
       - Model A P_avg = 50 mW * 40ms / 1000ms = 2.0 mW.
       - Model B P_avg = 20 mW * 150ms / 1000ms = 3.0 mW.
       - Model C P_avg = 10 mW * 300ms / 1000ms = 3.0 mW.
    3. **Conclusion & Interpretation:**
       - **Result: Only Model A meets the budget (2.0 mW < 2.5 mW).**
  options:
  - Model C, because it has the lowest active power consumption (20mW).
  - Model A, because its short inference time results in the lowest average power (2.0mW).
  - Model B, as it offers the best balance between active power and inference time.
  - None of the models meet the budget, as their active power all exceeds 2.5mW.
  correct_index: 1
