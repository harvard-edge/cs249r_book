title: The Neural Architecture Search Power Puzzle
scenario: 'You are using a Neural Architecture Search (NAS) tool to design a keyword-spotting model for
  a battery-powered device. The hard constraint is an average power consumption below 2.5 mW. The model
  runs once every second to check for a keyword. The microcontroller''s deep sleep power is negligible
  (~10 µW). The NAS has produced three candidate architectures:


  | Model | Active Power | Inference Time |

  |-------|-------------|----------------|

  | A     | 50 mW       | 40 ms          |

  | B     | 20 mW       | 150 ms         |

  | C     | 10 mW       | 300 ms         |


  Which model should you choose?'
details:
  realistic_solution: The correct way to solve this is to apply the duty cycle formula to calculate the
    average power for each candidate model over the 1-second period. The average power is the total energy
    consumed in the period, divided by the period duration. Only Model A, despite having the highest peak
    power, completes its task fast enough to keep the average power under the 2.5mW budget. Models B and
    C, while having lower peak power, run for too long and exceed the energy budget.
  common_mistake: A common mistake is to choose the model with the lowest active (peak) power consumption
    (Model C), intuitively thinking it's the most 'efficient'. This ignores the time dimension. A model
    that runs for a long time can consume more total energy (power × time) than a higher-power model that
    finishes quickly and allows the system to return to deep sleep. You must calculate the *average* power
    over the full period.
  napkin_math: 'We use the formula for average power in a duty-cycled system: P_avg = (P_active * t_active
    + P_sleep * t_sleep) / T_period. Since P_sleep ≈ 0.01 mW is negligible, P_avg ≈ P_active * t_active
    / T_period. **Model A:** P_avg = 50 mW * 40ms / 1000ms = 2.0 mW. Passes (< 2.5 mW). **Model B:** P_avg
    = 20 mW * 150ms / 1000ms = 3.0 mW. Fails (> 2.5 mW). **Model C:** P_avg = 10 mW * 300ms / 1000ms =
    3.0 mW. Fails (> 2.5 mW). Only Model A meets the power budget despite having the highest peak power.
    The key insight: total energy (power × time) matters more than peak power. Model A''s short inference
    time gives it a low duty cycle (4%), keeping average power well under budget.'
  options:
  - Model C, because it has the lowest active power consumption (20mW).
  - Model A, because its short inference time results in the lowest average power (1.8mW).
  - Model B, as it offers the best balance between active power and inference time.
  - None of the models meet the budget, as their active power all exceeds 2.5mW.
  correct_index: 1
