title: 'Model Size Estimation: Master Memory-Constrained Model Selection for Medical Wearable'
scenario: 'Select and justify the memory-optimal model architecture for a medical-grade arrhythmia detector
  on ESP32-S3 (240MHz, 512KB SRAM, 8MB PSRAM, 16MB Flash). Requirements: >95% sensitivity, <1% false positive
  rate on MIT-BIH, always-on at 360Hz ECG, 5-year battery life on AAA cell. Perform full memory and power
  budget.'
details:
  realistic_solution: 'AAA: 1200mAh × 1.5V = 1.8Wh. 5 years = 43,800h. Power budget: 1800mWh/43800h =
    0.041mW avg. ESP32-S3 deep sleep: 20μA × 3.3V = 66μW. That alone exceeds budget! Need ultra-low-power
    MCU. But if we must use ESP32-S3: duty cycle the processor. ECG at 360Hz: process 1-second window
    every 1s. Inference: DS-CNN (100K INT8, 0.9M ops): 0.9M/240M=3.75ms/window. Wake for 5ms/1000ms=0.5%
    duty. Power: 0.005×100mA×3.3V = 1.65mW + 0.995×0.066mW = 1.72mW. Battery: 1800mWh/1.72mW=1047h=43.6
    days. Not 5 years. MCU choice needs to change.'
  common_mistake: Choosing a model architecture that meets accuracy requirements without checking that
    always-on inference at 360Hz is power-feasible on a AAA cell (1200mAh, 1.5V).
  napkin_math: '5 years = 43,800h. 1200mAh / 43,800h = 0.027mA = 27μA budget. ESP32-S3 deep sleep: 20μA
    (just sleep!). With 0.5% active at 100mA: avg = 0.005×100,000 + 0.995×20 = 500+20=520μA. Way over
    budget. Need Cortex-M4 class MCU (sleep 2μA, active 10mA). 0.5% active: 0.005×10,000+0.995×2=52μA.
    Close to 27μA budget. M4+ultra-low-power analog AFE for ECG.'
