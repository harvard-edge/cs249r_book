title: 'Realization: adapt MobileNetV1-0.25x for ESP32-S3 with resolution scaling'
scenario: MobileNetV1-0.25x at 224x224 input (27M MACs, 225K params) is too slow at 450ms on ESP32-S3. You need <100ms per inference for a 5-class classifier using the camera module.
question: How should MobileNetV1-0.25x be adapted with input resolution and stride changes to meet ESP32-S3 latency and SRAM limits?
details:
  realistic_solution: 'Resolution 96x96: MobileNetV1 with 5x stride-2 layers would produce 96/32 = 3x3 final feature map — too small. Adjust: remove 2 of the stride-2 layers (use stride-1 for DW conv layers 8 and 10). Final feature map: 96/8 = 12x12 (still meaningful). MACs scale as (96/224)² × adjustment factor ≈ 0.18× original. 27M × 0.18 = 4.9M MACs. At 30M MACs/sec on ESP32-S3: 4.9M/30M = 163ms. Still over 100ms. Use MobileNetV1-0.25× + 64x64 input: 27M × (64/224)² = 2.2M MACs → 73ms. Fits SRAM: peak activation 64x64x8x1B = 32KB << 512KB.'
  common_mistake: |
    **The Pitfall:** Blindly reducing input resolution.
    **The Rationale:** Candidates drop the input resolution without adjusting the architecture's stride pattern.
    **The Consequence:** The deep stride-2 layers collapse the feature map to an unusable 3x3 or smaller grid before the final pooling, destroying spatial resolution and accuracy.
  napkin_math: |
    - MobileNetV1-0.25x at 64x64 MACs = 27M * (64/224)² = 2.2M MACs.
    - At ESP32-S3 throughput (~30M MACs/sec): 2.2M / 30M = **73ms (Fits <100ms)**.
    - SRAM peak activation (DW block 5): 64/4=16x16x32 = 8KB.
    - Full memory budget: ~50KB activations + 225KB weights = 275KB.
    - **275KB << 512KB SRAM.** Fits securely.
