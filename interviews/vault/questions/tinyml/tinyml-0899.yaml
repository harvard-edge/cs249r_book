title: 'TinyML TCO Diagnosis: Why TinyML Deployment Costs 10x Budget'
scenario: 'A startup budgeted $100K to deploy 1000 Cortex-M4 TinyML sensors for predictive maintenance ($50 hardware, $50 site visit per unit). They did not budget for replacements or OTA. At month 6, costs are at $197.5K with 600 devices deployed. Diagnose the cost overruns from these symptoms: (1) 15% device failure rate requiring replacement, (2) OTA update infrastructure cost $25K unbudgeted, (3) each site visit actually costs $200. Quantify the final projected total cost.'
question: Which cost overruns explain a $197.5K spend at 60% deployment for 1000 Cortex-M4 sensors, and what is the final projection?
details:
  realistic_solution: 'Budget: 1000 units * ($50 HW + $50 visit) = $100K. Actual at 60% deployed (600 units): $197.5K. Root cause breakdown for the 600 units: Base HW = 600*$50 = $30K. Base visits = 600*$200 = $120K. Failures = 15% of 600 = 90 units. Failure cost = 90*($50+$200) = $22.5K. OTA = $25K. Total = $30K+$120K+$22.5K+$25K = $197.5K. Projected final cost for 1000 units: Base HW = $50K. Base visits = 1000*$200 = $200K. Failures = 150*$250 = $37.5K. OTA = $25K. Final projected total: $312.5K. The primary driver is the 4x underestimation of site visit costs, heavily penalizing both initial deployment and failures.'
  common_mistake: Attributing all cost overrun to hardware failure without systematically quantifying each root cause, and not separating the one-time OTA cost from the per-unit run-rate.
  napkin_math: 'Month 6 actuals: (600 * $50) + (600 * $200) + (0.15 * 600 * $250) + $25,000 = $30K + $120K + $22.5K + $25K = $197.5K. Final projected: (1000 * $50) + (1000 * $200) + (150 * $250) + $25,000 = $50K + $200K + $37.5K + $25K = $312.5K. Over budget by $212.5K.'
