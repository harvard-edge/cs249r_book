title: 'TinyML TCO Diagnosis: Why TinyML Deployment Costs 10x Budget'
scenario: 'A startup budgeted $50K to deploy 1000 Cortex-M4 TinyML sensors for predictive
  maintenance. At month 6, costs are at $80K with 60% of devices deployed. Diagnose
  the cost overruns from these symptoms: (1) 15% device failure rate vs 3% expected,
  (2) OTA update infrastructure took 3 months to build ($25K unbudgeted), (3) each
  site visit costs $200 vs $50 expected. Quantify each overrun.'
question: Which cost overruns explain an $80K spend at 60% deployment for 1000 Cortex-M4
  sensors?
details:
  realistic_solution: 'Expected: $50K total (1000 units * $50/unit). Actual at 60%
    deployed (600 units): $80K. Target: 1000 units * ($50 budget). Actual burn: $80K
    / 0.6 = $133K projected for 1000 units. Overrun: $83K. Root cause breakdown: (1)
    15% failure vs 3%: extra replacements = 1000*(0.15-0.03)*$30/unit(M4+shipping)
    = 120*$30=$3,600 + site visits for replacement: 120*$200=$24K. (2) OTA infrastructure:
    $25K unbudgeted. (3) Site visits: 1000 planned at $50=$50K budget. Actual: 1000*$200=$200K.
    Overrun: $150K. Total overrun: $3.6K+$24K+$25K+$150K=$202.6K. Much larger than
    $83K observed so far — month 6 is only beginning of site visit costs.'
  common_mistake: Attributing all cost overrun to hardware failure without systematically
    quantifying each root cause, and not projecting final costs based on partial deployment
    trends.
  napkin_math: 'Observed: $80K at 60% deployment. Projected final: $80/0.6=$133K vs
    $50K budget. Root cause quantification: HW failures: 120 replacements * ($30 HW
    + $200 site visit) = $27.6K. OTA: $25K. Site visits (full): 1000 * $200 = $200K
    vs $50K budgeted = $150K overrun. Total projected: $50K hardware + $200K site
    visits + $25K OTA + $27.6K extra failures = $302.6K. Over budget by 505%. Fix:
    remote diagnostics to eliminate most site visits (reduce to $50 each for critical
    issues only): 1000*$50=$50K. New projection: $50K+$50K+$25K+$27.6K=$152.6K. Still
    3x over, but better. Root cause: under-estimated operational costs by 4x.'
