title: Cortex-M4 Sensor Swarm Link
scenario: Evaluating a wireless sensor network of 10 Cortex-M4 devices (at 80 MHz) sending acoustic anomaly embeddings over a BLE link (1 Mbps).
question: Evaluate the bandwidth bottleneck if each node sends a 256-byte embedding 10 times per second over the shared 1 Mbps link with 30% packet overhead.
visual:
  kind: svg
  path: tinyml-1576.svg
  alt: Fanout diagram showing multiple Cortex-M4 nodes transmitting to a single BLE receiver.
  caption: Sensor Swarm Star Topology
details:
  realistic_solution: 'The candidate calculates the total required throughput including overhead and compares it to the 1 Mbps limit. They should conclude the network easily supports this load.'
  common_mistake: |
    **The Pitfall:** Forgetting to convert bytes to bits or failing to account for overhead.
    **The Rationale:** Confusing bytes/sec with bits/sec, a standard network engineering oversight.
    **The Consequence:** Drastically miscalculating the network load, leading to either unneeded panic about bottlenecks or undetected network saturation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Payload per Node: 256 bytes * 8 bits/byte = 2,048 bits.
    - Transmissions per Second: 10 nodes * 10 times/sec = 100 transmissions/sec.

    **Calculations:**
    - Raw Data Rate: 2,048 bits * 100 = 204,800 bits/sec.
    - Packet Overhead: 204,800 * 1.3 (30% overhead) = 266,240 bps.

    **Conclusion & Interpretation:**
    - **Result: ~266 kbps (Bandwidth-Bound)**. Total bandwidth is ~266 kbps, well below the 1 Mbps limit.
