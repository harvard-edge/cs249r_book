title: TinyML Gateway Load Shedding Spec
scenario: A farm has 10 gateways collecting TinyML pest-detection events. During storms, one gateway can receive 5x normal reports.
question: What load-shedding and rerouting policy should protect TinyML gateways during event storms?
details:
  realistic_solution: The policy should define local buffering, priority classes, duplicate suppression, neighbor gateway handoff, backoff, and maximum event age. Safety-critical or rare pest detections should be preserved while low-value telemetry is delayed or dropped.
  common_mistake: |
    **The Pitfall:** Treating all sensor messages as equally urgent.
    **The Rationale:** Candidates apply simple FIFO logic, allowing high-volume low-value telemetry to overwhelm the queue.
    **The Consequence:** Gateway queues overflow and crash, causing critical safety or rare pest detections to be dropped during the storm.
  napkin_math: |
    **Assumptions & Constraints:**
    - Normal load: 100 reports/min.
    - Storm load: 500 reports/min.
    - Gateway capacity: 200 reports/min.

    **Calculations:**
    - Deficit = Storm load (500) - Gateway capacity (200) = 300 reports/min.

    **Conclusion & Interpretation:**
    - **Result: 300 reports/min (Network-Bound)**. Gateway must shed, buffer, or reroute 300 reports/min.
