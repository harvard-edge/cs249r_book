title: The TinyML Interconnect Bottleneck
scenario: You are diagnosing a smart camera prototype processing 320x320 8-bit grayscale video at 30 FPS. The device drops frames, yet profiling shows both the Cortex-M4 MCU and the ML accelerator are under-utilized. The camera sensor is connected via an SPI bus with a maximum rate of 10 Mbps.
question: Why is the SPI bus the likely cause of dropped 30 FPS camera frames despite idle compute resources?
details:
  realistic_solution: The hardware exhibits a hard bandwidth bottleneck. The camera generates raw pixel data at a rate that mathematically saturates the SPI bus, instigating backpressure and dropping frames before data even stages into SRAM. The fault lies entirely in the sensor-to-MCU I/O interface.
  common_mistake: |
    **The Pitfall:** Fixating on ML compute elements when the true constraint is the peripheral data interconnect.
    **The Rationale:** Engineers routinely miscalculate bandwidth requirements by conflating bits and bytes during interface sizing.
    **The Consequence:** Unnecessary engineering hours are wasted profiling the model or upgrading the MCU, but the dropped frames persist due to the saturated SPI link.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame: 320 x 320 pixels, 8-bit depth (1 byte/pixel).
    - Rate: 30 FPS.
    - SPI Bus max: 10 Mbps (Megabits per second).

    **Calculations:**
    - Bits per frame: 320 * 320 * 8 bits = 819,200 bits.
    - Required Bandwidth: 819,200 bits * 30 fps = 24.576 Mbps.

    **Conclusion & Interpretation:**
    - **Result: 24.6 Mbps (I/O Saturation)**. The 24.6 Mbps requirement crushes the 10 Mbps SPI limit, proving the bus is massively oversubscribed.
  options:
  - The SPI bus provides 10 Mbps, but the camera requires ~24.6 Mbps, meaning the data stream is fundamentally dropping at the sensor link.
  - The Cortex-M4 MCU lacks the processing frequency for 30 FPS and must be upgraded to a Cortex-M7.
  - The data stream is ~3 MB/s, well within the 10 Mbps SPI capacity, indicating the true issue is SRAM bandwidth contention.
  - The SPI protocol carries massive protocol overhead latency; upgrading to I2C will reduce packet overhead and resolve the drops.
