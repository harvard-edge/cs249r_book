title: Hailo-8 PCIe Switch Tree AllReduce
scenario: Four Hailo-8 edge AI chips (26 TOPS) are connected to a host via a shared
  PCIe Gen3 x4 switch (3.94 GB/s). They perform a 10 MB tensor AllReduce. The PCIe
  switch latency introduces a 10us synchronization barrier per collective step.
question: Create a tree-based AllReduce schedule that minimizes barrier overhead compared
  to a ring, and compute the total tree latency.
details:
  realistic_solution: A Ring AllReduce requires 2*(N-1) = 6 sequential steps for N=4,
    incurring 60us of barrier overhead. A balanced binary tree reduces the step count
    to 2*log2(N) = 4 steps (2 up to root, 2 down to leaves), reducing barrier overhead
    to 40us. Each of the 4 tree steps transmits the full 10 MB payload (unless pipelined).
    Latency is 4 steps * (10 MB / 3.94 GB/s) + 40us barrier time. 10 MB / 3.94 GB/s
    ≈ 2.538ms per step. Total latency is (4 * 2.538ms) + 0.04ms = 10.192ms.
  common_mistake: Ignoring the theoretical step count difference (log2(N) vs N-1)
    and computing the barrier cost as a single flat 10us constant for the entire collective
    operation.
  napkin_math: 4 steps * (10MB / 3940MB/s) + 4 * 10us = 10.152ms + 0.04ms = 10.192ms
