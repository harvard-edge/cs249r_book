title: Wi-Fi 6 CSMA Gossip Protocol Congestion
scenario: To optimize federated learning across 100 autonomous robots over congested Wi-Fi 6, you propose a Gossip-based asynchronous AllReduce. Each robot randomly pairs with 1 neighbor per 100ms tick to exchange weights. The network handles a maximum of 25 concurrent non-colliding pairs (50 active robots).
question: Evaluate the total expected time to reach 99% weight propagation across the network, accounting for the CSMA-enforced concurrency limit?
details:
  realistic_solution: For 100 robots, use about 11 full-participation gossip rounds as a defensible rule-of-thumb estimate to reach roughly 99% propagation. One full-participation round needs each robot to exchange once, which is 100 / 2 = 50 pair exchanges. The CSMA limit permits only 25 non-colliding pairs per 100 ms tick, so an even scheduler needs 2 ticks to provide the 50 pair exchanges for one full round. The estimate is therefore 11 * 2 = 22 ticks. At 100 ms per tick, the expected time is about 2200 ms; random contention can add variance around this optimistic scheduled estimate.
  common_mistake: |
    **The Pitfall:** Ignoring shared medium capacity limits in gossip protocols.
    **The Rationale:** Engineers apply standard epidemic gossip math (ln(N)) or Ring AllReduce math, failing to account for the physical CSMA collision limit of the Wi-Fi router.
    **The Consequence:** The networking pipeline stalls by 50%, completely skewing the expected convergence time.
  napkin_math: |
    **Assumptions & Constraints:**
    - Nodes (N): 100 robots.
    - Tick duration: 100ms.
    - Network capacity: 25 non-colliding pairs, or 50 active robots, per tick.
    - One full-participation gossip round means each robot participates once.

    **Calculations:**
    - Use a calibrated epidemic-gossip rule of thumb of about 11 full-participation rounds for 99% propagation across 100 nodes.
    - Pair exchanges needed per full round: 100 robots / 2 robots per pair = 50 pair exchanges.
    - CSMA-limited tick capacity: 25 pairs/tick = 50 active robots/tick.
    - Approximate ticks required per full round with even scheduling: 50 exchanges / 25 exchanges per tick = 2 ticks/round.
    - Total ticks required: 11 rounds * 2 ticks/round = 22 ticks.
    - Total time: 22 ticks * 100ms/tick = 2200ms (2.2 seconds).

    **Conclusion & Interpretation:**
    - **Result: ~2200ms (Network-Bound)**. The CSMA limit permits 25 pairs per tick, so each 50-exchange full-participation round takes about 2 ticks under an even scheduler.
