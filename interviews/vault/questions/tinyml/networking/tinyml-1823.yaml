title: Wi-Fi 6 CSMA Gossip Protocol Congestion
scenario: To optimize federated learning across 100 autonomous robots over congested Wi-Fi 6, you propose a Gossip-based asynchronous AllReduce. Each robot randomly pairs with 1 neighbor per 100ms tick to exchange weights. The network handles a maximum of 25 concurrent non-colliding pairs (50 active robots).
question: Evaluate the total expected time to reach 99% weight propagation across the network, accounting for the CSMA-enforced concurrency limit?
details:
  realistic_solution: For 100 robots, use about 11 full-participation gossip rounds as a defensible rule-of-thumb estimate to reach roughly 99% propagation. Without the CSMA cap, a tick could schedule up to 50 pairs if every robot contacted one neighbor. The network only allows 25 non-colliding pairs, so it provides about half of the needed pair opportunities per tick. Assuming the scheduler rotates active robots evenly, each effective gossip round takes about 2 ticks, giving 11 * 2 = 22 ticks. At 100 ms per tick, the expected time is about 2200 ms; random contention can only add variance around this optimistic estimate.
  common_mistake: |
    **The Pitfall:** Ignoring shared medium capacity limits in gossip protocols.
    **The Rationale:** Engineers apply standard epidemic gossip math (ln(N)) or Ring AllReduce math, failing to account for the physical CSMA collision limit of the Wi-Fi router.
    **The Consequence:** The networking pipeline stalls by 50%, completely skewing the expected convergence time.
  napkin_math: |
    **Assumptions & Constraints:**
    - Nodes (N): 100 robots.
    - Tick duration: 100ms.
    - Network capacity: 25 pairs (50 robots) per tick.

    **Calculations:**
    - Use a calibrated epidemic-gossip rule of thumb of about 11 full-participation rounds for 99% propagation across 100 nodes.
    - Unconstrained tick capacity for this protocol: 100 robots / 2 robots per pair = 50 pairs/tick.
    - CSMA-limited tick capacity: 25 pairs/tick = 50 active robots/tick.
    - Effective capacity ratio: 25 limited pairs / 50 unconstrained pairs = 50%.
    - Approximate ticks required per full gossip round with even scheduling: 1 / 0.5 = 2 ticks/round.
    - Total ticks required: 11 rounds * 2 ticks/round = 22 ticks.
    - Total time: 22 ticks * 100ms/tick = 2200ms (2.2 seconds).

    **Conclusion & Interpretation:**
    - **Result: ~2200ms (Network-Bound)**. The CSMA limit halves usable pair capacity, roughly doubling wall-clock convergence time from about 11 ticks to about 22 ticks under an even scheduler.
