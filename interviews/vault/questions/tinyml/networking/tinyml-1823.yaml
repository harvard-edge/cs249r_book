title: Wi-Fi 6 CSMA Gossip Protocol Congestion
scenario: To optimize federated learning across 100 autonomous robots over congested Wi-Fi 6, you propose
  a Gossip-based asynchronous AllReduce. Each robot randomly pairs with 1 neighbor per 100ms tick to exchange
  weights. The network handles a maximum of 25 concurrent non-colliding pairs (50 active robots).
question: Evaluate the total expected time to reach 99% weight propagation across the network, accounting
  for the CSMA-enforced concurrency limit.
details:
  realistic_solution: Standard epidemic gossip propagation takes approximately log2(N) + ln(N) rounds
    to infect most nodes; for N=100, this is ~11 rounds. However, because the network capacity limits
    active nodes to 50 out of 100 per tick, there is a mandatory 50% communication stall rate. An idealized
    round where every node updates once now spans exactly 2 ticks. Therefore, the 11 required rounds take
    22 ticks. Total expected time is 22 ticks * 100ms = 2200ms.
  common_mistake: '**The Pitfall:** Ignoring shared medium capacity limits in gossip protocols.

    **The Rationale:** Engineers apply standard epidemic gossip math (ln(N)) or Ring AllReduce math, failing
    to account for the physical CSMA collision limit of the Wi-Fi router.

    **The Consequence:** The networking pipeline stalls by 50%, completely skewing the expected convergence
    time.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Nodes (N): 100 robots.

    - Tick duration: 100ms.

    - Network capacity: 25 pairs (50 robots) per tick.


    **Calculations:**

    - Ideal gossip rounds to 99% infection: ~log2(100) + ln(100) ≈ 6.64 + 4.6 ≈ 11.2 (round to 11).

    - Active nodes per tick: 50 / 100 = 50% capacity limit.

    - Ticks required per full "round": 100 nodes / 50 active nodes = 2 ticks/round.

    - Total ticks required: 11 rounds * 2 ticks/round = 22 ticks.

    - Total time: 22 ticks * 100ms/tick = 2200ms (2.2 seconds).


    **Conclusion & Interpretation:**

    - **Result: 2200ms (Network-Bound)**. The physical concurrency limit forces a 50% communication stall,
    extending the expected gossip convergence time to 2200ms.

    '
