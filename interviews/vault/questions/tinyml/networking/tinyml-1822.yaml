title: LoRa Mesh Duty Cycle Pipeline Impact
scenario: 'Six industrial IoT nodes communicate over a 50 kbps LoRa mesh network to aggregate a 500-byte
  anomaly profile via a Halving/Doubling AllReduce algorithm. The LoRa MAC protocol imposes a 10% duty-cycle
  limit (node must sleep 9x the active transmit time) and a 20ms sync preamble per packet.

  '
question: What is the absolute minimum elapsed time for a single node to complete its AllReduce portion,
  factoring in the duty-cycle stall?
details:
  realistic_solution: Halving/Doubling for N=6 requires 3 steps for Reduce-Scatter and 3 steps for AllGather.
    With payload halving each step (250, 125, 62.5 bytes), the active transmission time is 0.260s total.
    The strict MAC-layer 10% duty-cycle enforces a 9x sleep time, adding 2.340s. The absolute minimum
    elapsed time is therefore 2.600 seconds.
  common_mistake: '**The Pitfall:** Calculating continuous transmission time without enforcing the mandatory
    MAC-layer duty-cycle sleep.

    **The Rationale:** Candidates often focus purely on bandwidth and packet size, ignoring regulatory
    or protocol-level duty cycles that dominate real-time performance.

    **The Consequence:** The pipeline latency is vastly underestimated, leading to missed real-time deadlines
    in the deployed network.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - Nodes: 6. Payload: 500 bytes. Baud: 50 kbps.\n\
    \   - MAC: 10% duty cycle (sleep = 9x active). Preamble: 20 ms.\n2. **Calculations:**\n   - Halving/Doubling\
    \ takes 3 steps for reduce-scatter, 3 for all-gather.\n   - Payloads per step: 250 bytes, 125 bytes,\
    \ 62.5 bytes.\n   - Active TX Step 1: (250 * 8 / 50,000) + 0.020 = 0.060 s.\n   - Active TX Step 2:\
    \ (125 * 8 / 50,000) + 0.020 = 0.040 s.\n   - Active TX Step 3: (62.5 * 8 / 50,000) + 0.020 = 0.030\
    \ s.\n   - Total Active TX per phase: 0.060 + 0.040 + 0.030 = 0.130 s.\n   - Total Active TX (both\
    \ phases): 0.130 * 2 = 0.260 s.\n   - Duty cycle sleep: 0.260 s * 9 = 2.340 s.\n   - Total time: 0.260\
    \ s + 2.340 s = 2.600 s.\n3. **Conclusion & Interpretation:**\n   - **Result: 2.600 seconds.** The\
    \ mandatory MAC sleep expands milliseconds of transmission into seconds of latency. **Bottleneck:\
    \ Protocol Duty-Cycle Limit.**\n"
