title: LoRa Mesh Duty Cycle Pipeline Impact
scenario: >
  Six industrial IoT nodes communicate over a 50 kbps LoRa mesh network to aggregate a 500-byte anomaly profile via a Halving/Doubling AllReduce algorithm. The LoRa MAC protocol imposes a 10% duty-cycle limit (node must sleep 9x the active transmit time) and a 20ms sync preamble per packet.
question: What is the absolute minimum elapsed time for a single node to complete its AllReduce portion, factoring in the duty-cycle stall?
details:
  realistic_solution: >
    Halving/Doubling for N=6 requires ceil(log2(6)) = 3 steps for Reduce-Scatter and 3 steps for AllGather, totaling 6 collective steps. The calculation must account for the active transmission time plus the strictly enforced MAC-layer duty-cycle sleep. Total elapsed time dictates real-time performance far more than raw baud rate.
  common_mistake: |
    **The Pitfall:** Calculating continuous transmission time without enforcing the mandatory MAC-layer duty-cycle sleep.
    **The Rationale:** Candidates often focus purely on bandwidth and packet size, ignoring regulatory or protocol-level duty cycles that dominate real-time performance.
    **The Consequence:** The pipeline latency is vastly underestimated, leading to missed real-time deadlines in the deployed network.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Nodes: 6. Payload: 500 bytes. Baud: 50 kbps.
       - MAC: 10% duty cycle (sleep = 9x active). Preamble: 20 ms.
    2. **Calculations:**
       - Collective steps: ceil(log2(6)) * 2 = 6 steps.
       - Payload per step: 500 bytes / 6 = 83.33 bytes.
       - Active TX per step: (83.33 * 8 / 50,000) + 0.020 = 0.0333 s (33.3 ms).
       - Duty cycle sleep: 0.0333 s * 9 = 0.2997 s.
       - Time per step: 0.0333 s + 0.2997 s = 0.333 s.
       - Total time: 6 steps * 0.333 s = 1.998 s.
    3. **Conclusion & Interpretation:**
       - **Result: 1.998 seconds.** The mandatory MAC sleep expands milliseconds of transmission into seconds of latency. **Bottleneck: Protocol Duty-Cycle Limit.**
