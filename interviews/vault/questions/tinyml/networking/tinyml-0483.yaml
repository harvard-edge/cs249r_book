title: The Interrupt Storm
scenario: You are building a low-power person-detection sensor using a Cortex-M7 and a grayscale camera connected via SPI. You must capture a 96x96 pixel image and run inference within a 100ms budget. During image capture, the MCU main loop becomes unresponsive and frequently misses the deadline. A profiler shows the CPU spending huge amounts of time in the SPI interrupt service routine (ISR).
question: Given an SPI clock of 24 MHz, how would you solve the interrupt storm causing these deadline misses?
details:
  realistic_solution: 'The system is experiencing an "interrupt storm." For every single byte received from the camera, the SPI peripheral triggers a CPU interrupt. The overhead of entering and exiting the ISR thousands of times per frame consumes all available CPU cycles. The solution is to use Direct Memory Access (DMA) for the SPI transfer, which handles the data movement without CPU intervention.'
  common_mistake: |
    **The Pitfall:** Blaming the raw hardware specs, such as bus bandwidth or MCU processing power.
    **The Rationale:** Engineers assume a slow bus or CPU causes the bottleneck, rather than identifying the inefficient, CPU-intensive method of data movement.
    **The Consequence:** Proposing unnecessary and costly hardware upgrades instead of fixing the underlying data transfer architecture.
  napkin_math: |
    **Assumptions & Constraints:**
    - Image size: 96x96 grayscale (1 byte/pixel).
    - SPI clock: 24 MHz (3 MB/s).
    - Cortex-M7: 480 MHz (~140 cycles/ISR).

    **Calculations:**
    - Data payload: 96 * 96 * 1 = 9,216 bytes.
    - Transfer time: 9,216 bytes / 3 MB/s = ~3.1 ms.
    - ISR count: 9,216 interrupts.
    - CPU stall time: 9,216 * 140 cycles = 1,290,240 cycles.
    - CPU stall duration: 1,290,240 / 480,000,000 Hz = 2.7 ms.

    **Conclusion & Interpretation:**
    - **Result: 2.7 ms (Compute-Bound)**. Using DMA eliminates 9,216 interrupts, freeing 2.7 ms of pure CPU stall time during the 3.1 ms transfer.
  options:
  - 'The 24 MHz SPI bus is too slow to transfer the image data. You must increase the bus clock speed.'
  - 'The Cortex-M7 at 480 MHz is not fast enough. You must upgrade to a more powerful application processor.'
  - 'The CPU is overwhelmed by 9,216 interrupts per frame. Reconfigure the system to use DMA for the SPI transfer.'
  - 'The ML model''s inference time is too long. You must quantize or prune the model more aggressively.'
  correct_index: 2
