title: 'The OTA Bandwidth Congestion'
scenario: 'You have a fleet of 5,000 smart factory sensors connected via a shared LoRaWAN gateway. You push a 100 KB model update to the fleet simultaneously.'
question: 'Why does pushing a 100 KB model to 5,000 LoRaWAN sensors stall telemetry for days?'
details:
  realistic_solution: 'LoRaWAN uses an ALOHA-based MAC with mandatory duty cycle limits (1% in EU868). A 51-byte payload at SF12 takes 2.5s airtime, requiring 247s of silence before the next transmission. Pushing 100 KB to 5,000 devices unicast requires 100,000/51 = ~2,000 packets per device x 250s spacing = 500,000s per device — 5.8 days, but all 5,000 devices share the same channel, causing massive collisions. Fix: use LoRaWAN Class C multicast (all devices listen simultaneously for a single broadcast stream), fragment the update into 51-byte chunks, and implement forward error correction to handle missed packets without individual retransmission.'
  common_mistake: '"100 KB is too large for the gateway." While true, it''s not just the size; it''s the collision domain and the protocol duty cycle.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 5,000 LoRaWAN sensors updating a 100 KB model.
    - EU868 Duty Cycle: 1% limit.
    - Payload: 51 bytes at SF12 takes ~2.5s airtime.

    **Calculations:**
    - Required Silence per TX: 2.5s * 99 = 247.5s.
    - Packets per Device: 100 KB / 51 bytes = ~2,000 packets.
    - Transmission Time per Device: 2,000 packets * 250s = 500,000s (~5.8 days).

    **Conclusion & Interpretation:**
    - **Result: 5.8 days (I/O-Bound)**. Unicast transmission over LoRaWAN is mathematically impossible under duty cycle physics, saturating the channel and blocking telemetry.
