title: 'The LoRa Telemetry Capacity'
scenario: 'You are designing a LoRaWAN monitoring network with 500 sensor nodes. Each node transmits a 20-byte inference result every 10 minutes. The gateway supports SF7 at 5 kbps effective. The regional regulatory duty cycle is 1% (transmit max 36 seconds per hour per channel).'
question: 'How would you calculate whether one gateway can handle the load, and design a time-slotted schedule?'
details:
  realistic_solution: 'Per-node uplink: 20 bytes = 160 bits. At SF7 (5 kbps effective), airtime ≈ 160 / 5,000 = 32ms plus protocol overhead (~20ms) ≈ 52ms per packet. 500 nodes × 6 packets/hour = 3,000 packets/hour. Total airtime: 3,000 × 52ms = 156 seconds/hour. Duty cycle: 156 / 3600 = 4.33% — exceeds the 1% per-channel limit. Solution: spread across 5 frequency channels (standard in EU868) → 4.33%/5 = 0.86% per channel. Alternatively, increase the reporting interval to 15 minutes.'
  common_mistake: |
    **The Pitfall:** Ignoring the regulatory duty cycle limits and calculating capacity purely on raw wireless bandwidth.
    **The Rationale:** Candidates treat LoRaWAN like Wi-Fi, assuming continuous transmission is legal and physically possible.
    **The Consequence:** The network will immediately violate FCC/ETSI regulations, packets will be dropped by the gateway, and the deployment will fail at scale.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500 nodes, 6 packets/hour/node (10 min interval).
    - Payload = 20 B = 160 bits.
    - SF7 effective rate = 5 kbps.
    - Regulatory duty cycle = 1% (36s/hour per channel).

    **Calculations:**
    - Airtime per packet = 160 bits / 5,000 bps = 0.032s (32ms).
    - Add protocol overhead (~20ms) = ~52ms per packet.
    - Total packets/hour = 500 * 6 = 3,000.
    - Total airtime/hour = 3,000 * 0.052s = 156 seconds.
    - Single channel duty utilization = 156s / 3600s = 4.33%.

    **Conclusion & Interpretation:**
    - **Result: 4.33% Duty Cycle (Bandwidth-Bound)**. 4.33% > 1% limit. One gateway on a single channel cannot handle the load. The system must spread transmissions across at least 5 frequency channels (4.33/5 = 0.86% per channel) or increase the reporting interval.
  options:
  - 'One gateway easily handles 500 nodes. At 5 kbps, 3,000 packets/hour of 20 bytes each consumes only 0.1% of the channel capacity.'
  - 'Per-packet airtime at SF7: ~52ms (including preamble/header overhead). 500 nodes x 6 packets/hr = 3,000 packets/hr. Total airtime: 156 seconds/hr. Single-channel duty cycle: 4.33% — exceeds the 1% regulatory limit. Fix: spread across 5 frequency channels (standard EU868) = 0.86%/channel. Or increase reporting interval to 15 min.'
  - 'The 1% duty cycle limit applies only to the end nodes, not the gateway. The gateway can receive continuously with no duty cycle restriction, so one gateway handles 500 nodes easily.'
  - 'LoRaWAN SF7 at 5 kbps can handle 500 nodes sending every 10 minutes because the packets are only 20 bytes and the collision probability is negligible with ALOHA-style random access.'
  correct_index: 1
