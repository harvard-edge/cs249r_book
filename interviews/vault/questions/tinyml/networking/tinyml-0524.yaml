title: 'The TinyML ''Micro-Cluster'' Fallacy'
scenario: 'You are a senior engineer reviewing a design for a new industrial vibration sensor. The device uses two co-located microcontrollers on the same PCB: MCU ''A'' performs an FFT on the raw sensor data, and MCU ''B'' runs a small anomaly detection model. A junior engineer on your team, inspired by datacenter technologies like InfiniBand, proposes connecting the two MCUs with a custom protocol that mimics RDMA (Remote Direct Memory Access) to ''eliminate OS overhead and achieve the lowest possible latency''.'
question: 'Why is an RDMA-like custom protocol over SPI the wrong solution for the two-MCU vibration sensor design?'
details:
  realistic_solution: 'The primary flaw is that the proposed ''RDMA'' solution is solving a non-existent problem at this scale, while ignoring the real bottleneck. On a bare-metal microcontroller, there is no ''OS overhead'' in the way a Linux server has. Communication is handled via memory-mapped peripherals and DMA controllers, which are already extremely fast and low-level. The latency of a standard on-board protocol like SPI (measured in microseconds for a typical data transfer) is completely dwarfed by the actual compute time of the ML model (measured in milliseconds). The engineering effort to create a custom RDMA-like protocol is enormous and yields zero practical benefit because the true bottleneck is compute, not the on-board interconnect.'
  common_mistake: 'Getting lost in the theoretical benefits of RDMA (kernel bypass, zero-copy) without considering the physical reality of the hardware. They might argue it''s a clever idea in principle, failing to see the overwhelming practical bottleneck and the microscopic scale of the problem.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 240MHz MCU, SPI at 10MHz.
    - Data transfer: 4KB FFT output.
    - ML inference on MCU B: 1M MACs.

    **Calculations:**
    - SPI Transfer Time: 4096 bytes * 8 bits / 10 MHz = 3.3 ms.
    - DMA Setup Time: ~10 cycles at 240 MHz = 42 ns.
    - ML Inference Time: 1M MACs at 240 MHz = ~4.2 ms.

    **Conclusion & Interpretation:**
    - **Result: 3.3 ms transfer (Compute-Bound)**. Transfer is 44% of the pipeline, but SPI+DMA is already near-optimal; custom RDMA saves ~0ns.
  options:
  - 'RDMA would be too power-hungry for a microcontroller because it requires constant polling of the memory bus.'
  - 'A custom protocol is impossible because microcontroller peripherals like SPI/I2C have fixed-function hardware that cannot be reprogrammed.'
  - 'The interconnect latency is negligible compared to the millisecond-scale compute time of the ML model, making the complex RDMA implementation pointless.'
  - 'The real bottleneck would be the clock speed difference between the two MCUs, causing synchronization issues that RDMA cannot solve.'
  correct_index: 2
