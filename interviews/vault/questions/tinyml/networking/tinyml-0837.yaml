title: 'TinyML BLE Upload Time'
scenario: 'A TinyML sensor stores a 24 KB anomaly snippet and uploads it over BLE at 120 kbps effective throughput.'
question: 'Can a 24 KB TinyML anomaly snippet upload over 120 kbps BLE within a 5-second target?'
details:
  realistic_solution: '24 KB is 192 kilobits. At 120 kbps, upload takes 1.6 seconds before protocol retries, so it fits the 5-second target with headroom.'
  common_mistake: |
    **The Pitfall:** Directly dividing file size in Kilobytes (KB) by network throughput in kilobits per second (kbps) without converting units.
    **The Rationale:** Candidates gloss over the capitalization of 'B' (Bytes) vs 'b' (bits) in networking specifications.
    **The Consequence:** The upload time is incorrectly calculated as 0.2 seconds instead of 1.6 seconds, severely masking a potential latency or protocol timeout failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - Payload size = 24 KB.
    - Effective throughput = 120 kbps.
    - Deadline = 5 seconds.

    **Calculations:**
    - Convert bytes to bits: 24 KB * 8 bits/Byte = 192 kilobits (kb).
    - Upload time = 192 kb / 120 kbps = 1.6 seconds.

    **Conclusion & Interpretation:**
    - **Result: 1.6 seconds (Network-Bound)**. 1.6s < 5s. The snippet fits comfortably within the 5-second reporting target with 3.4 seconds of headroom for protocol handshakes and BLE connection latency.
