title: 'TinyML Daisy-Chain Hop Count'
scenario: 'Three Cortex-M4 boards are wired in a linear daisy-chain topology (A <-> B <-> C) to exchange environmental sensor aggregates. Node B is the central root node.'
question: 'What is the maximum number of network hops required for a full broadcast radiating from the central root node (B) to all leaf nodes?'
visual:
  kind: svg
  path: tinyml-1572.svg
  alt: 'Three nodes labeled A, B, and C connected in a straight line with edges connecting A to B and B to C.'
  caption: 'Linear Daisy Chain Topology'
details:
  realistic_solution: 'In a linear daisy-chain (A <-> B <-> C), node B is physically adjacent to both A and C. A broadcast from B goes directly to A (1 hop) and directly to C (1 hop). The maximum topological depth from the root B is exactly 1 hop.'
  common_mistake: |
    **The Pitfall:** Adding the hops sequentially to declare 2 hops.
    **The Rationale:** Candidates sum the edges rather than calculating the maximum depth from the root.
    **The Consequence:** This misunderstands network topology, incorrectly predicting double the actual broadcast latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Topology: Linear daisy chain (A <-> B <-> C).
    - Node B is the central root node.

    **Calculations:**
    - Distance B to A: 1 hop.
    - Distance B to C: 1 hop.
    - Parallel Broadcasting: Broadcasts travel in parallel along independent topological branches.
    - Maximum Depth: max(dist(B,A), dist(B,C)) = max(1, 1) = 1 hop.

    **Conclusion & Interpretation:**
    - **Result: 1 hop (Network-Bound)**. Broadcasts propagate in parallel, making max depth only 1 hop.
