title: 'Hailo-8 PCIe Gen3 Saturated'
scenario: 'A Hailo-8 accelerator sits on a PCIe Gen3 x1 link. The host streams 1080p RGB video at 60 fps; the Hailo-8 returns a 4 MB segmentation mask per frame.'
question: 'What is the realistic per-direction bandwidth and ingress utilization of a PCIe Gen3 x1 link streaming 1080p 60fps video?'
details:
  realistic_solution: |
    Subtract the mandatory 128b/130b encoding (~1.5%) and TLP framing overheads (~10%) from the raw 1000 MB/s line rate to find the effective bandwidth, then calculate ingress payload utilization.
  common_mistake: |
    **The Pitfall:** Comparing raw payload directly to the theoretical 1000 MB/s PCIe line rate.
    **The Rationale:** Candidates forget to subtract hardware encoding and packet framing overheads.
    **The Consequence:** This 13-15% optimism hides marginal saturation cases, causing unpredictable tail latency spikes in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Video: 1920 * 1080 * 3 bytes = 6.22 MB/frame
    - Framerate: 60 fps
    - Line Rate: 1000 MB/s (Gen3 x1)

    **Calculations:**
    - Video Ingress = 6.22 MB * 60 = 373.2 MB/s
    - Egress Mask = 4 MB * 60 = 240 MB/s
    - Effective BW = 1000 * 0.985 * 0.90 = 886 MB/s
    - Ingress Utilization = 373.2 / 886 = 42.1%

    **Conclusion & Interpretation:**
    - **Result: 42% Ingress Utilization (Bandwidth-Bound)**. A second parallel 4 MB tensor would push ingress past 73%, risking saturation.
