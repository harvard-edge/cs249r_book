title: Hailo-8 PCIe Gen3 x1 Video Bandwidth
scenario: A Hailo-8 accelerator sits on a PCIe Gen3 x1 link. The host streams 1080p RGB video at 60 fps; the Hailo-8 returns a 4 MB segmentation mask per frame.
question: What is the realistic per-direction bandwidth and ingress utilization of a PCIe Gen3 x1 link streaming 1080p 60fps video?
details:
  realistic_solution: |
    Treat PCIe Gen3 x1 as a full-duplex link with about 984.6 MB/s per direction after 128b/130b encoding. After packet/header overhead, a realistic payload budget is roughly 885-900 MB/s per direction. The 1080p RGB ingress stream is 1920 * 1080 * 3 bytes * 60 fps = 373 MB/s, or about 42% of an 886 MB/s effective ingress budget. The 4 MB mask egress stream is 240 MB/s, or about 27% of the same effective budget in the opposite direction. The link is not saturated by this workload.
  common_mistake: |
    **The Pitfall:** Comparing raw payload directly to the theoretical 1000 MB/s PCIe line rate.
    **The Rationale:** Candidates forget to subtract hardware encoding and packet framing overheads.
    **The Consequence:** This 13-15% optimism hides marginal saturation cases, causing unpredictable tail latency spikes in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Use decimal bandwidth units: MB = 1,000,000 bytes.
    - Video: 1920 * 1080 * 3 bytes = 6,220,800 bytes = 6.22 MB/frame (5.93 MiB/frame).
    - Framerate: 60 fps
    - PCIe Gen3 x1 encoded payload after 128b/130b: 8 GT/s * 128/130 / 8 = 984.6 MB/s per direction.
    - Approximate TLP/protocol payload efficiency: 90%, giving 984.6 * 0.90 = 886 MB/s usable payload per direction.

    **Calculations:**
    - Video ingress = 6.22 MB/frame * 60 fps = 373.2 MB/s.
    - Egress mask = 4 MB/frame * 60 fps = 240 MB/s.
    - Ingress utilization = 373.2 / 886 = 42.1%.
    - Egress utilization = 240 / 886 = 27.1%.

    **Conclusion & Interpretation:**
    - **Result: 373 MB/s ingress and 240 MB/s egress (Not Saturated)**. The input stream uses about 42% of the realistic ingress payload bandwidth, while the mask stream uses about 27% of the independent egress direction.
