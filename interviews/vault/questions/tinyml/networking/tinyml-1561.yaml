title: Sensor Matrix Tree Sync
scenario: A multi-sensor board uses 8 Cortex-M4 processors to perform localized particle filter tracking. They need to sync a 16 KB state matrix using a binary tree broadcast.
question: Evaluate the number of communication steps and total sync latency if each point-to-point step takes 5 ms.
visual:
  kind: svg
  path: tinyml-1561.svg
  alt: A balanced binary tree with 8 leaf nodes.
  caption: Binary Tree Broadcast Topology.
details:
  realistic_solution: A binary tree broadcast to $N$ nodes takes $\lceil \log_2(N) \rceil$ steps. For $N=8$, this is $\log_2(8) = 3$ steps. Total sync latency is $3 \times 5 = 15$ ms. This scales exponentially better than a flat $N-1 = 7$ step serial broadcast.
  common_mistake: |
    **The Pitfall:** Assuming a tree broadcast takes $N$ steps or $\log_2(N-1)$ instead of $\lceil \log_2(N) \rceil$.
    **The Rationale:** This mistake focuses on the surface symptom instead of the governing ML-systems constraint.
    **The Consequence:** The resulting design, estimate, or diagnosis can miss the real bottleneck and lead to incorrect deployment decisions.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 leaf nodes in a balanced binary tree.
    - Each point-to-point step takes 5 ms.

    **Calculations:**
    - Steps required = log2(8) = 3 steps.
    - Total latency = 3 * 5 ms = 15 ms.

    **Conclusion & Interpretation:**
    - **Result: 15 ms (Latency-Bound)**. The total latency scales exponentially better than a flat serial broadcast.
