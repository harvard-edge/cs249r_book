title: The BLE Connection Interval Tradeoff
scenario: A BLE-connected TinyML wearable sends a 20-byte inference result to a phone. The default BLE connection interval is 30ms. Each event transfers one packet. The app needs inference updates at 10 Hz.
question: Can a 30 ms BLE interval deliver 10 Hz, 20-byte inference updates, and what changes to power and jitter if you decrease the interval to 7.5 ms?
details:
  realistic_solution: Maintain the 30ms interval to optimize power, as it provides 33.3 events/second, comfortably exceeding the 10 Hz requirement while keeping the radio off 95% of the time.
  common_mistake: |
    **The Pitfall:** Confusing connection interval with maximum throughput requirements.
    **The Rationale:** Assuming that a faster connection interval is always required for low-latency streaming, ignoring the fact that a 30ms interval easily accommodates a 10 Hz requirement.
    **The Consequence:** Unnecessarily lowering the interval to 7.5ms, which slashes battery life by quadrupling radio active time without a functional benefit.
  napkin_math: |
    **Assumptions & Constraints:**
    - Required rate: 10 Hz (10 packets/s). Packet size: 20 bytes.
    - Interval A: 30 ms (33.3 events/s). Radio active time: ~1.5 ms/event. Power: ~5 mW.
    - Interval B: 7.5 ms (133.3 events/s).

    **Calculations:**
    - 30ms capacity: 33.3 pkts/s > 10 pkts/s (30% utilization). Duty cycle: 1.5 / 30 = 5%.
    - 7.5ms capacity: 133.3 pkts/s. Duty cycle: 1.5 / 7.5 = 20%.
    - Power increase: 20% / 5% = 4x active radio time (~15 mW average).

    **Conclusion & Interpretation:**
    - **Result: 30ms supports 10 Hz; 7.5ms quadruples radio power (Energy-Bound)**. The system is energy-bound, not throughput-bound. The 30ms interval is optimal.
  options:
  - '30ms interval supports 10 Hz easily; 7.5ms cuts jitter but quadruples power'
  - '30ms interval is too slow for 10 Hz; must use 7.5ms'
  - 'Both intervals give the same throughput and power'
  - '7.5ms interval saves power by finishing transfers faster'
