title: TinyML Quantization Acceptance Spec
scenario: A medical TinyML classifier must move from FP32 to INT8 to fit on an MCU.
  Specify the acceptance criteria before the quantized model can replace the FP32
  model.
question: What acceptance criteria should gate replacing an FP32 medical TinyML classifier
  with an INT8 model?
details:
  realistic_solution: The spec should require task-level accuracy within tolerance,
    per-class sensitivity for safety-critical classes, calibration-set representativeness,
    latency, SRAM/flash footprint, numeric overflow checks, and hardware-in-the-loop
    validation. INT8 fit is not enough for a medical deployment.
  common_mistake: Approving quantization because the model fits memory while missing
    class-specific safety regressions.
  napkin_math: If overall accuracy drops 1% but rare-event sensitivity drops from
    95% to 80%, the quantized model fails despite looking acceptable in aggregate.
