title: nRF5340 End-to-End Wake Word Latency
scenario: You are deploying a keyword spotting system on a Nordic nRF5340, which features a 128 MHz application core and a separate 64 MHz network core for BLE 5.3. Once a complete audio frame is captured, DSP preprocessing requires 256,000 clock cycles on the application core, followed by neural network inference which requires 1,024,000 clock cycles. When a keyword is detected, the application core triggers the network core via IPC (incurring a 5 ms inter-core communication delay), and the network core subsequently transmits a BLE alert requiring 2 ms of over-the-air time.
question: How would you calculate the total end-to-end latency from the moment the audio frame is ready for processing to the completion of the BLE transmission?
details:
  realistic_solution: 'Decompose the end-to-end latency sequentially: preprocessing, inference, IPC delay, and network transmission. By taking the cycle counts for the DSP and ML workloads and dividing them by the 128 MHz clock frequency of the application core, you find the compute duration. Summing these values gives the system latency.'
  common_mistake: |
    **The Pitfall:** Misapplying clock frequencies across dual-core boundaries.
    **The Rationale:** Candidates apply the 64 MHz network core frequency to compute tasks or completely ignore the inter-core communication delay.
    **The Consequence:** Total latency calculations are highly inaccurate, leading to flawed real-time guarantees.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - App Core: 128 MHz (128,000 cycles/ms).
       - DSP: 256K cycles. Inference: 1,024K cycles.
       - IPC Delay: 5 ms. BLE Tx: 2 ms.
    2. **Calculations:**
       - DSP Latency: 256,000 / 128,000 = 2 ms.
       - Inference Latency: 1,024,000 / 128,000 = 8 ms.
       - Total = 2 ms + 8 ms + 5 ms + 2 ms = 17 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 17 ms Total Latency.** The system has a noticeable **Communication-Bound** tail penalty via IPC, but safely handles real-time ingestion.
