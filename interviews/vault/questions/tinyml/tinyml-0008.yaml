title: The Observation Gap
scenario: To save power, your forest-monitoring device wakes up for 5 seconds every minute to listen for bird calls. Your model has 99% accuracy in the lab, but in the field, it misses over 90% of the bird calls.
question: Why does a forest device listening 5 seconds per minute miss over 90% of random 1-second bird calls?
details:
  realistic_solution: 'You have a **Duty Cycle Coverage Gap**. Uniform duty cycling is fundamentally wrong for event-driven detection. If a bird calls during the 55-second sleep window, it is never recorded. The fix is a **Two-Tier Wake Architecture**: use a low-power analog comparator (~5 µW) to listen for *any* sound above a threshold. This comparator triggers an interrupt to wake the MCU only when an actual event is occurring.'
  common_mistake: |
    **The Pitfall:** Assuming the model needs retraining because it is "missing detections."
    **The Rationale:** Data scientists often immediately blame the model weights or the training data when field performance drops, ignoring the system-level architecture.
    **The Consequence:** Wasting weeks retraining a model that works perfectly, while the real issue is that the hardware microphone is physically turned off when the birds are calling.
  napkin_math: |
    - **Sleep Window:** 55 seconds out of 60 seconds.
    - **Active Window:** 5 seconds out of 60 seconds.
    - **Probability of Miss:** 55 / 60 ≈ 91.7%.
    - **Conclusion:** **With a 5s/60s cycle, the device is deaf 91.7% of the time. You must use a two-tier wake architecture (analog comparator) instead of uniform duty cycling.**
