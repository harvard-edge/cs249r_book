title: Secure TinyML Keyword Spotting Architecture
scenario: Architect an always-on keyword spotting system for a smart lock running on an ARM Cortex-M4 (STM32F4) that must be resilient against model extraction via timing and power side-channel attacks. You have a 168 MHz CPU, 256 KB SRAM, 1 MB flash, no FPU, and CMSIS-NN SIMD (2x INT8 MACs/cycle).
question: How would you design a defense strategy that masks execution patterns without violating a strict 50ms end-to-end inference latency budget?
details:
  realistic_solution: The optimal design relies on constant-time execution and lightweight execution randomization. By exclusively using deterministic CMSIS-NN INT8 operations, timing side-channels are inherently mitigated. To defend against power analysis, the architecture should implement random channel shuffling during grouped convolutions and inject deterministic dummy MAC operations, trading a small amount of latency and SRAM for security.
  common_mistake: |
    **The Pitfall:** Proposing heavyweight cryptographic masking or homomorphic encryption.
    **The Rationale:** Candidates often apply cloud-scale security solutions to edge devices without considering hardware limitations.
    **The Consequence:** These methods completely overwhelm the 168 MHz CPU (which lacks an FPU) and break real-time guarantees, resulting in missed 50ms latency budgets.
  napkin_math: |
    * **Base Inference Compute:** A standard KWS model requires 4 million MACs.
    * **Peak Throughput:** On STM32F4 using CMSIS-NN SIMD (2 MACs/cycle at 168 MHz) = 336M MACs/sec.
    * **Base Latency:** 4M / 336M = 11.9ms.
    * **Defense Overhead:** Adding a 30% compute overhead for channel shuffling and dummy MACs increases the workload to 5.2M MACs.
    * **Secured Latency:** 5.2M / 336M = 15.5ms.
    * **Total Latency:** 15.5ms + 10ms (audio feature extraction) = **25.5ms**.
    * **Conclusion:** 25.5ms is safely under the **50ms budget**.
