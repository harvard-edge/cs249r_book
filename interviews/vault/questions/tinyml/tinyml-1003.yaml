title: Diagnosing Domain Shift in ESP32-S3 Wake-Word Datasets
scenario: Your team deployed an INT8 quantized wake-word detection model on an ESP32-S3. While cloud evaluation showed 98% accuracy, the device exhibits a massive false acceptance rate in living rooms. The training dataset consisted of 10,000 clean audio samples recorded by employees using laptop microphones in quiet offices. The ESP32-S3 receives audio via I2S from a low-cost, noisy MEMS microphone.
question: How would you diagnose the root cause of the performance drop and explain how you would curate the dataset to resolve it?
details:
  realistic_solution: 'The root cause is a severe acoustic domain shift between the high-quality laptop microphones used for training and the cheap MEMS microphone used in deployment, compounded by the lack of background noise in the dataset. The solution is hardware-in-the-loop data collection: gather new samples directly using the ESP32-S3''s microphone in target environments (e.g., living rooms with TV noise). To leverage existing data, aggressive data augmentation should be applied, specifically injecting realistic background noise profiles and simulating the frequency response of the specific MEMS microphone.'
  common_mistake: |
    **The Pitfall:** Suggesting complex on-device noise reduction algorithms or larger neural network architectures.
    **The Rationale:** Candidates view accuracy drops strictly as a lack of model capacity or signal clarity.
    **The Consequence:** Attempting to run RNNoise or larger models blows past the 240 MHz compute and 512 KB SRAM budgets, when the fundamental issue is a data domain shift.
  napkin_math: |
    * **Audio Buffer Size:** 16 kHz, 16-bit audio = 32 KB per second.
    * **SRAM Impact:** 32 KB is 6.25% of the 512 KB SRAM.
    * **Cycle Budget:** At 240 MHz dual-core with inference every 500ms, the budget is ~120 million cycles/window.
    * **DSP Overhead:** Standard noise suppression (e.g., RNNoise) consumes >50 MIPS, cannibalizing nearly half the cycle budget needed for inference.
    * **Conclusion:** Hardware constraints dictate that noise robustness must be solved via dataset augmentation (baking noise into training), not runtime DSP.
