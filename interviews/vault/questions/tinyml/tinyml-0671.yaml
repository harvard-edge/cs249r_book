title: The Redundant Vision Failure
scenario: You are designing the safety-critical perception system for an autonomous
  vehicle. The system uses two redundant Cortex-M7 microcontrollers, each processing
  a video feed with a pedestrian detection model. A hard requirement is that if one
  model's weights are silently corrupted, the system must detect the garbage output,
  isolate the faulty MCU, and continue operating in a degraded single-camera state,
  all within a single 100ms frame budget. A full system reboot, which takes >500ms,
  is forbidden.
question: How can two Cortex-M7 vision MCUs detect silent weight corruption and hot-reload
  within a 100 ms frame budget using only on-chip resources?
details:
  realistic_solution: The architecture is a paired watchdog with hot reload. 1. **Cross-Coupled
    Watchdog & Sanity Check:** Each MCU runs a watchdog timer reset by the other MCU
    over SPI only after an MCU has successfully processed a frame AND its output is
    deemed sane. Sanity is checked via a background CRC-32 checksum of weights in
    SRAM against Flash, and by exchanging final output vectors. 2. **Immediate Isolation:**
    If either MCU's watchdog expires, it triggers an interrupt. The healthy MCU immediately
    stops fusing data and operates solo. 3. **Fast Checkpoint Reload:** The healthy
    MCU asserts a reset pin on the faulty MCU, triggering an NMI. The NMI handler
    initiates a DMA transfer, copying the golden model weights from Flash back into
    SRAM, readying it for the next frame.
  common_mistake: '**The Pitfall:** Proposing a simple watchdog that just detects
    a frozen MCU or suggesting a reboot on failure.

    **The Rationale:** Candidates lean on standard embedded practices without adapting
    to the ML context or strict latency budgets.

    **The Consequence:** The system fails to catch silent data corruption, or violates
    the 100ms latency budget by executing a full 500ms reboot.

    '
  napkin_math: '**Assumptions & Constraints:**

    - 100ms frame budget.

    - Inference: ~40ms.

    - DMA Flash to SRAM rate: ~1 GB/s (or ~4 bytes/cycle on AHB/AXI).


    **Calculations:**

    - CRC-32 of 256KB weights: ~0.5ms on M7@480MHz.

    - SPI output exchange (64B): 0.05ms.

    - Watchdog timeout triggers instantly on failure.

    - DMA reload 256KB from Flash: 256 KB / 1 GB/s = 0.25ms.


    **Conclusion & Interpretation:**

    - **Result: Total recovery < 1ms safely within one frame (Reliability-Bound)**.
    Direct DMA reload from Flash handles silent data corruption without a full reboot.

    '
