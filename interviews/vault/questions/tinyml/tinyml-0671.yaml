title: The Redundant Vision Failure
scenario: You are designing the safety-critical perception system for an autonomous vehicle. The system uses two redundant Cortex-M7 microcontrollers, each processing a video feed with a pedestrian detection model. A hard requirement is that if one model's weights are silently corrupted (e.g., by a single-event upset from a cosmic ray), the system must (1) detect the resulting garbage output, (2) isolate the faulty MCU, and (3) continue operating in a degraded (single-camera) state, all within a single 100ms frame budget. A full system reboot, which takes >500ms, is forbidden.
question: "How can two Cortex-M7 vision MCUs detect silent weight corruption and hot-reload within a 100 ms frame budget using only on-chip resources?"
details:
  realistic_solution: 'The architecture is a ''paired watchdog with hot reload''. 1. **Cross-Coupled Watchdog & Sanity Check:** Each MCU runs a watchdog timer reset by the other MCU over SPI only after an MCU has successfully processed a frame AND its output is deemed ''sane''. Sanity is checked via a background CRC-32 checksum of weights in SRAM against Flash, and by exchanging final output vectors. 2. **Immediate Isolation:** If either MCU''s watchdog expires, it triggers an interrupt. The healthy MCU immediately stops fusing data and operates solo. 3. **Fast Checkpoint Reload:** The healthy MCU asserts a reset pin on the faulty MCU, triggering a Non-Maskable Interrupt (NMI). The NMI handler initiates a DMA transfer, copying the ''golden'' model weights from Flash back into SRAM, readying it for the next frame.'
  common_mistake: |
    **The Pitfall:** Proposing a simple watchdog that just detects a frozen MCU or suggesting a reboot on failure.
    **The Rationale:** Candidates lean on standard embedded practices without adapting to the ML context or strict latency budgets.
    **The Consequence:** The system fails to catch silent data corruption, or violates the 100ms latency budget by executing a full 500ms reboot.
  napkin_math: |
    * 100ms frame budget.
    * Inference: ~40ms.
    * CRC-32 of 256KB weights: ~0.5ms on M7@480MHz.
    * SPI output exchange(64B): 0.05ms.
    * Compare: <0.01ms.
    * Overhead: ~0.6ms = 0.6% of budget.
    * Watchdog: 50ms.
    * DMA reload 256KB from Flash: 256KB / 1GB/s = 0.25ms.
    * **Total recovery < 1ms**, safely within one frame.
