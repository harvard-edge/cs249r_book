title: The Mixed-Precision Power Budget
scenario: You are designing a fall-detection wearable using a Cortex-M7. The model must meet its latency budget while not exceeding a strict average power consumption limit. Your FP32 model is accurate but consumes too much power. Your fully-quantized INT8 model is power-efficient but fails to capture subtle, high-dynamic-range accelerometer events, making it unreliably inaccurate. The model has 10M total MACs (Multiply-Accumulate operations) per inference. The first two layers, which directly process the accelerometer data, account for 1M MACs, while the remaining deeper layers account for 9M MACs.
question: How would you solve this trade-off using a mixed-precision approach given the constraints?
details:
  realistic_solution: Use mixed precision. The accuracy-critical layers that process the raw, high-dynamic-range accelerometer data should be kept in a higher precision format (e.g., FP16, if supported, or FP32), while the less sensitive, more computationally expensive deeper layers can be quantized to INT8. This provides the accuracy of floating-point where it's needed most, while still getting the majority of the power and performance benefits from integer quantization.
  common_mistake: |
    **The Pitfall:** Thinking in all-or-nothing terms (either full FP32 or full INT8).
    **The Rationale:** Engineers often fail to consider mixed-precision, incorrectly believing a model must be uniformly quantized.
    **The Consequence:** Choosing an all-INT8 model sacrifices critical accuracy, while an all-FP32 model blows the power budget.
  napkin_math: |
    - **Total Operations:** 10M MACs.
    - **Relative Cost:** FP32 costs roughly 18x more energy per MAC than INT8.
    - **Full FP32 Energy Cost:** 10M * 18 = 180M equivalent INT8 energy units.
    - **Full INT8 Energy Cost:** 10M equivalent INT8 energy units.
    - **Mixed Precision Cost:** 
      - First 2 layers (FP32): 1M * 18 = 18M units.
      - Remaining layers (INT8): 9M * 1 = 9M units.
      - Total: 18M + 9M = 27M equivalent INT8 energy units.
    - **Result:** Mixed precision uses **27M units**, reducing energy consumption by **85%** compared to full FP32 (180M units) while preserving high dynamic range in the critical early layers.
  options:
  - Use the fully INT8 model but perform data augmentation to make it more robust to high-g events.
  - Keep the first two layers in FP32 and quantize the remaining 90% of the model to INT8.
  - Underclock the Cortex-M7 when running the full FP32 model to fit the power budget.
  - Implement the full model in INT16 to get a balance of precision and performance.
  correct_index: 1
