title: The DMA Pipeline for Sensor Data
scenario: Your Cortex-M4 reads accelerometer data over SPI at 1.6 kHz (3 axes × 16-bit = 6 bytes per sample
  = 9.6 KB/s). Without DMA, your firmware polls the SPI bus in a tight loop, consuming 100% CPU. With
  DMA, the CPU is free to run inference. But your colleague's DMA setup drops 5% of samples. What went
  wrong, and how do you fix it with double-buffering?
question: "Why does single-buffer SPI DMA at 1.6 kHz drop samples during 30-50 ms Cortex-M4 inference?"
details:
  realistic_solution: The problem is a single-buffer race condition. The DMA writes sensor data into a
    buffer while the CPU reads from the same buffer for feature extraction. When the DMA write pointer
    overtakes the CPU read pointer, unprocessed samples are overwritten — hence the 5% drop rate (it happens
    during inference when the CPU is busy for 30-50ms).
  common_mistake: '"DMA handles everything automatically — just point it at a buffer and go." DMA requires
    careful buffer management to avoid overwriting data the CPU hasn''t processed yet.'
  napkin_math: 'Single buffer: 256 samples × 6 bytes = 1.5 KB. DMA fill time: 160ms. CPU inference: 50ms.
    Overlap window (race condition): 50ms / 160ms = 31.25% of the time the CPU and DMA compete for the
    same buffer. Actual drop rate depends on alignment — 5% is typical. Double buffer: 2 × 1.5 KB = 3
    KB SRAM. Drop rate: 0%. CPU utilization: 50ms / 160ms = 31.25%. Sleep time: 68.75% — available for
    BLE transmission or other tasks.'
