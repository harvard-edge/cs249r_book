title: Thermal Shutdown Prevention for High-Accuracy Inference on ESP32-S3
scenario: An ESP32-S3 (240MHz, 40mW max) runs continuous image classification at 10fps for a quality control
  camera in a 45°C factory environment. The module has θ_ja = 45°C/W (small SMD package, no heatsink).
  Determine if thermal throttling occurs and propose the thermal solution.
question: "How would you determine if thermal throttling occurs and propose the thermal solution?"
details:
  realistic_solution: 'θ_ja = 45°C/W. Power: 40mW = 0.04W. ΔT = 0.04W × 45°C/W = 1.8°C. T_junction = 45
    + 1.8 = 46.8°C. ESP32-S3 max junction: 105°C. Current: 46.8°C — 58°C below limit. No thermal throttling
    at 40mW. However: 10fps continuous on ESP32-S3 PSRAM + camera interface likely draws more than 40mW.
    Actual system power: ESP32-S3 (40mW) + camera module OV2640 (60mW) + PSRAM (20mW) = 120mW. ΔT = 0.12W
    × 45 = 5.4°C. Junction = 50.4°C — still safe. Worst case with WiFi active: +100mW = 220mW total. ΔT
    = 0.22×45 = 9.9°C. Junction = 54.9°C — safe. No thermal intervention needed for this scenario.'
  common_mistake: Ignoring that ESP32-S3 has an internal temperature sensor and automatic thermal protection;
    the chip may throttle before reaching the specified max junction temperature.
  napkin_math: 'System power (core+camera+PSRAM): 120mW. θ_ja = 45°C/W. ΔT = 0.12×45 = 5.4°C. T_junction
    = 45+5.4 = 50.4°C << 105°C. With WiFi: 220mW → ΔT = 9.9°C → 54.9°C. Safe with 50°C margin. No heatsink
    needed at 45°C ambient with this package.'
