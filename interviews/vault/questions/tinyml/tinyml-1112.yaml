title: Diagnosing SRAM Exhaustion on nRF5340 with BLE
scenario: >
  A keyword spotting model with a 180 KB peak activation arena is integrated onto a Nordic nRF5340 with 256 KB of application core SRAM.
  When the device attempts to transmit inference results via BLE 5.3, it consistently hard faults with an Out-Of-Memory (OOM) error during system initialization.
question: Which nRF5340 SRAM users were missing from the team's 180 KB tensor-arena estimate?
details:
  realistic_solution: |
    On the dual-core nRF5340, while the BLE controller runs on the 64 MHz network core, the 128 MHz application core still requires significant SRAM for the Zephyr RTOS, the BLE host stack, IPC buffers for cross-core communication, and the application heap/stack. The model's peak activation memory must be reduced.
  common_mistake: |
    **The Pitfall:** Treating the MCU's total SRAM as exclusively available for the ML model.
    **The Rationale:** Candidates fail to account for the memory footprint of the RTOS, communication stacks, and application-level buffers required for real-world deployment.
    **The Consequence:** The device runs completely out of memory and crashes upon initialization.
  napkin_math: |
    **Assumptions & Constraints:**
    - App Core SRAM: 256 KB.
    - Model Arena: 180 KB.
    - System Overhead (RTOS, BLE Host, IPC): ~90-110 KB.

    **Calculations:**
    - Remaining SRAM = 256 KB - 180 KB = 76 KB.
    - Minimum System Deficit = 90 KB (Required) - 76 KB (Available) = 14 KB deficit.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound (OOM Crash)**. The RTOS and stacks push memory usage over 256 KB.
