title: The Vision Transformer SRAM Overflow
scenario: A junior engineer proposes using a Vision Transformer (ViT) for a simple person-detection task
  on a Cortex-M7 MCU with 256KB of SRAM. The input images are 96x96 and the ViT uses 8x8 patches with
  an embedding dimension of 128. They argue that since the model weights can be compressed to fit into
  Flash, it should work. Use napkin math to diagnose the primary reason this architecture is unsuitable
  for this device during runtime.
question: "Why is the proposed ViT unsuitable for the 256 KB SRAM Cortex-M7 during runtime?"
details:
  realistic_solution: The primary issue is the SRAM consumption of the activations, specifically the intermediate
    Key, Query, Value (KQV) matrices and the attention map itself. The self-attention mechanism's memory
    footprint scales quadratically with the number of patches (the sequence length). For a 96x96 image
    with 8x8 patches, the sequence length is 144. The resulting `N x N` attention map and the `N x d`
    intermediate matrices will overflow the 256KB SRAM budget, causing the application to crash. A standard
    CNN would have a much smaller, more manageable memory footprint that scales linearly with input size,
    not quadratically.
  common_mistake: Focusing only on the model's storage size (weights on Flash) while ignoring its runtime
    memory requirements (activations in SRAM). The Tensor Arena, which holds all intermediate tensors
    needed for a single inference, can easily exceed the SRAM of a microcontroller, especially with architectures
    like Transformers that have large intermediate activation maps.
  napkin_math: Let's calculate the peak SRAM usage for the attention block's activations in FP16 (2 bytes).
  options:
  - The attention mechanism's FLOPs are too high, making it miss the latency deadline.
  - The model's weights are too large to fit in the 256KB of SRAM.
  - The quadratic scaling of attention (`N^2`) creates intermediate activation tensors that overflow the
    256KB of SRAM.
  - The patch embedding layer requires too many floating point operations for a Cortex-M7.
  correct_index: 2
