title: The Vision Transformer SRAM Overflow
scenario: A junior engineer proposes using a Vision Transformer (ViT) for a simple person-detection task on a Cortex-M7 MCU with 256KB of SRAM. The input images are 96x96 and the ViT uses 8x8 patches with an embedding dimension of 128. They argue that since the model weights can be compressed to fit into Flash, it should work.
question: "Why is the proposed Vision Transformer architecture unsuitable for the 256 KB SRAM Cortex-M7 during runtime?"
details:
  realistic_solution: The primary issue is the SRAM consumption of the activations, specifically the intermediate Key, Query, Value (KQV) matrices and the attention map itself. The self-attention mechanism's memory footprint scales quadratically with the sequence length. For a 96x96 image with 8x8 patches, the resulting N x N attention map and N x d intermediate matrices will overflow the 256KB SRAM budget, causing a hard crash. Use MobileNet or a lightweight CNN instead, or implement FlashAttention-style tiling if ViT is strictly required.
  common_mistake: |
    **The Pitfall:** Focusing only on the model's storage size on Flash while ignoring its runtime memory footprint.
    **The Rationale:** Engineers assume that if weights fit, execution is merely a matter of latency.
    **The Consequence:** The intermediate activation tensors in Transformers (which scale quadratically) brutally overflow the SRAM, causing an immediate crash.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Input: 96x96 image. Patches: 8x8.
       - Embedding dimension (d) = 128.
       - SRAM limit: 256 KB.
    2. **Calculations:**
       - Sequence length N = (96/8) * (96/8) = 12 * 12 = 144 patches.
       - Q, K, V memory = 3 tensors * (144 * 128 * 2 bytes/FP16) = 110,592 bytes (108 KB).
       - Attention map (N x N) for 4 heads = 4 * 144 * 144 * 2 bytes = 165,888 bytes (162 KB).
       - Peak memory = 108 KB + 162 KB = 270 KB.
    3. **Conclusion & Interpretation:**
       - **Result: 270 KB activation memory alone exceeds the 256 KB SRAM.**
       - **Memory-Bound (Quadratic Attention Overhead)**
  options:
  - The attention mechanism's FLOPs are too high, making it miss the latency deadline.
  - The model's weights are too large to fit in the 256KB of SRAM.
  - The quadratic scaling of attention creates intermediate activation tensors that overflow the 256KB of SRAM.
  - The patch embedding layer requires 270 KB for floating point operations, crashing the MCU.
  correct_index: 2
