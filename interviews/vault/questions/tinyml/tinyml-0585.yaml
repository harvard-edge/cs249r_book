title: Updating a 500 KB Model Over BLE 5.0
scenario: Your fleet of 200 wearable health sensors runs an arrhythmia detection model on an nRF5340.
  You need to push an update over BLE 5.0. How does the model's quantization format (e.g., FP32 vs INT8)
  affect the OTA size, and why does quantization become a deployment bandwidth trade-off rather than just
  an accuracy/performance trade-off?
question: ", FP32 vs INT8) affect the OTA size, and why does quantization become a deployment bandwidth trade-off rather than just an accuracy/performance trade-off?"
details:
  realistic_solution: A typical 100,000-parameter ML model takes 400 KB in FP32 format. Over BLE 5.0,
    real-world application throughput is often limited to ~50 KB/s due to connection intervals, MTU limits,
    and packet drops. Transferring a 400 KB FP32 model takes 8 seconds of active radio time. The BLE radio
    is the most power-hungry component on the MCU (drawing ~8 mA).
  common_mistake: '"Quantization is just for saving SRAM and making inference faster." On edge devices,
    quantization is equally about deployment feasibility and battery life during OTA updates.'
  napkin_math: 'FP32 model: 400 KB. BLE throughput: 50 KB/s. Transfer time: 8 seconds. Radio power: 8
    mA at 3.3V = 26.4 mW. Energy per update: 26.4 mW × 8s = 211 mJ. INT8 model: 100 KB. Transfer time:
    2 seconds. Energy per update: 52.8 mJ. Savings: 158 mJ per update. If you push weekly updates to a
    device with a 100 mAh coin cell (1,188 J), the FP32 updates consume ~1% of the battery over a year
    just in radio time. INT8 updates consume 0.25%. The 4× reduction in file size directly translates
    to longer battery life and fewer failed OTA attempts.'
  options:
  - Quantization format doesn't affect OTA size because the model is compressed during transmission regardless
    of the weight precision.
  - INT8 quantization reduces OTA model size by 4x (400 KB to 100 KB), cutting BLE transfer time from
    8s to 2s and energy per update from 211 mJ to 52.8 mJ. Over weekly updates on a 100 mAh coin cell,
    FP32 OTA consumes 1% of annual battery vs 0.25% for INT8. Quantization becomes a deployment bandwidth
    and battery life trade-off, not just accuracy/performance.
  - The OTA size reduction from quantization is irrelevant because BLE 5.0's built-in compression handles
    the FP32 model efficiently, achieving the same transfer time as INT8.
  - INT8 reduces OTA size by 2x (not 4x) because the TFLite flatbuffer format adds metadata overhead that
    scales with the number of parameters, partially negating the precision reduction.
  correct_index: 1
