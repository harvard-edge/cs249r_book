title: Real-Time TinyML Inference on Nordic nRF5340
scenario: You are tasked with designing a real-time anomaly detection system for an industrial sensor, running on a Nordic nRF5340 SoC (128 MHz CPU, 256 KB SRAM, 1 MB flash). The system needs to process a new sensor reading and output an inference result within a strict 33ms frame budget to prevent critical system jank and meet a hard real-time control loop deadline. The ML model is a pre-trained, quantized convolutional neural network that requires approximately 60 KB of memory for its weights and intermediate activations.
question: "How should the architectural design guarantee a 33 ms real-time frame budget and prevent ANR timeouts on the nRF5340?"
details:
  realistic_solution: 'A robust solution involves: 1. Performing WCET analysis for the ML inference kernel and critical I/O paths on the nRF5340 to ensure the 33ms budget is never exceeded. This might involve static timing analysis or extensive profiling under stress. 2. Implementing an interrupt-driven pipeline for sensor data acquisition (e.g., via SPI/I2C DMA to offload CPU) and scheduling the ML inference as a high-priority, non-preemptible task within a real-time operating system (RTOS) like Zephyr. 3. Aggressively optimizing the ML model (further quantization, pruning, hardware-aware optimizations) to minimize its footprint and execution time. 4. Carefully managing memory access patterns and avoiding cache misses where possible, leveraging nRF5340''s memory architecture. 5. Utilizing hardware timers and watchdogs to monitor and enforce task deadlines, triggering appropriate error handling if an ANR condition is imminent.'
  common_mistake: |
    **The Pitfall:** Assuming average-case execution time (ACET) for the ML inference and I/O operations is sufficient.
    **The Rationale:** Software engineers often benchmark nominal conditions without analyzing Worst-Case Execution Time (WCET) bounds.
    **The Consequence:** The system misses deadlines under peak load or unexpected contention, causing jank or ANR timeouts in production.
  napkin_math: |
    * Given a 128 MHz CPU and a 33ms frame budget:
    * Total available cycles per frame = 128,000,000 cycles/second × 0.033 seconds = 4,224,000 CPU cycles.
    * If the ML model's inference takes 1.5 million cycles (a hypothetical WCET), it leaves:
    * 4,224,000 - 1,500,000 = **2,724,000 cycles** remaining.
    * These remaining cycles must strictly cover all sensor acquisition, pre-processing, post-processing, and communication overhead to hit the real-time deadline.
