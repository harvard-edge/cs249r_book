title: 'Ethos-U55 Pruning Impact: Latency & Memory for Object Detection'
scenario: You are tasked with optimizing a quantized MobileNetV2-SSDLite object detection model for deployment on an Arm Cortex-M7 + Ethos-U55 platform. The Ethos-U55 NPU operates at 480 MHz, has 512 KB of SRAM, and achieves a peak throughput of 256 MAC/cycle. Your current unpruned model has 10 million parameters (all int8), and a single inference takes 150 ms. Convolutional layers account for 80% of total MACs and 90% of total parameters. To meet a latency budget, you apply 2:4 structured sparsity to all convolutional layers, resulting in a 50% reduction in their MACs and parameters.
question: How do you calculate the minimum achievable inference time, effective MACs per cycle, and freed SRAM?
details:
  realistic_solution: "1.  **Minimum Achievable Inference Time:**\n    *   Original convolutional layer inference time: `T_conv_orig = 0.8 * 150 ms = 120 ms`\n    *   Original non-convolutional layer inference time: `T_non_conv_orig = 0.2 * 150 ms = 30 ms`\n    *   New convolutional layer inference time (50% reduction): `T_conv_new = 0.5 * T_conv_orig = 0.5 * 120 ms = 60 ms`\n    *   Minimum achievable inference time: `T_total_new = T_conv_new + T_non_conv_orig = 60 ms + 30 ms = 90 ms`\n\n2.  **Effective MACs per Cycle (entire model):**\n    *   Total original cycles needed for inference: `C_orig = 150 ms * 480 MHz = 72,000,000 cycles`\n    *   Total original MACs (hypothetical, if NPU was saturated throughout): `MAC_orig_total = C_orig * 256 MAC/cycle = 18,432,000,000 MACs`\n    *   New total cycles needed for inference: `C_new = 90 ms * 480 MHz = 43,200,000 cycles`\n    *   Effective MACs per cycle (comparing original work equivalent to new time): `Effective_MACs_per_cycle = MAC_orig_total / C_new = 18,432,000,000 / 43,200,000 = 426.67 MAC/cycle`\n\n3.  **SRAM Freed Up:**\n    *   Total parameters in convolutional layers: `P_conv_total = 0.9 * 10,000,000 parameters = 9,000,000 parameters`\n    *   Parameters reduced: `P_reduced = 0.5 * P_conv_total = 0.5 * 9,000,000 = 4,500,000 parameters`\n    *   SRAM freed up: `SRAM_freed = P_reduced * 1 byte/parameter = 4,500,000 bytes = 4.5 MB`"
  common_mistake: |
    **The Pitfall:** Misapplying the 50% reduction to the entire model latency and parameter count.
    **The Rationale:** Candidates fail to isolate the impact of pruning exclusively on the convolutional layers, overlooking Amdahl's Law regarding the unpruned non-convolutional portion.
    **The Consequence:** Performance estimations are overly optimistic, leading to missed latency targets in production.
  napkin_math: |
    - **Inference Time**: 
      - Conv Latency (Original) = 0.8 × 150 ms = 120 ms.
      - Non-Conv Latency = 0.2 × 150 ms = 30 ms.
      - New Conv Latency = 0.5 × 120 ms = 60 ms.
      - Total New Latency = 60 ms + 30 ms = **90 ms**.
    - **Effective MACs/Cycle**:
      - Speedup = 150 ms / 90 ms = 1.66x.
      - Effective MACs/Cycle = 256 × 1.66 = **~426 MAC/cycle**.
    - **SRAM Freed**: 
      - Conv Params = 0.9 × 10M = 9M. 
      - Freed Params = 0.5 × 9M = 4.5M. 
      - Total SRAM Freed = **4.5 MB**.
