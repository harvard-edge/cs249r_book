title: 'Ethos-U55 Pruning Impact: Latency & Memory for Object Detection'
scenario: 'You are tasked with optimizing a quantized MobileNetV2-SSDLite object detection
  model for deployment on an Arm Cortex-M7 + Ethos-U55 platform. The Ethos-U55 NPU
  operates at 480 MHz, has 512 KB of SRAM, and achieves a peak throughput of 256 MAC/cycle
  for int8 operations. Your current unpruned model has 10 million parameters (all
  int8), and a single inference takes 150 ms. The model''s computational cost is dominated
  by convolutional layers (80% of total MACs), and its memory footprint is dominated
  by convolutional layer weights (90% of total parameters).


  To meet a stringent real-time latency budget, you apply 2:4 structured sparsity
  to all convolutional layers, resulting in a 50% reduction in their MAC operations
  and a corresponding 50% reduction in their parameter count. Assume the Ethos-U55
  NPU can perfectly exploit this 2:4 sparsity, meaning the time taken for convolutional
  operations scales linearly with the reduced MAC count, while non-convolutional operations
  remain unchanged.


  1.  Calculate the *minimum achievable inference time* per frame after applying this
  sparsity.

  2.  Determine the *effective MACs per cycle* observed for the *entire model* (when
  considering the original, unpruned total MAC count and the new inference time).

  3.  Calculate the *amount of SRAM freed up* by this parameter reduction, assuming
  each int8 parameter occupies 1 byte.'
question: How would you calculate the *amount of SRAM freed up* by this parameter
  reduction, assuming each int8 parameter occupies 1 byte?
details:
  realistic_solution: "1.  **Minimum Achievable Inference Time:**\n    *   Original\
    \ convolutional layer inference time: `T_conv_orig = 0.8 * 150 ms = 120 ms`\n\
    \    *   Original non-convolutional layer inference time: `T_non_conv_orig = 0.2\
    \ * 150 ms = 30 ms`\n    *   New convolutional layer inference time (50% reduction):\
    \ `T_conv_new = 0.5 * T_conv_orig = 0.5 * 120 ms = 60 ms`\n    *   Minimum achievable\
    \ inference time: `T_total_new = T_conv_new + T_non_conv_orig = 60 ms + 30 ms\
    \ = 90 ms`\n\n2.  **Effective MACs per Cycle (entire model):**\n    *   Total\
    \ original cycles needed for inference: `C_orig = 150 ms * 480 MHz = 72,000,000\
    \ cycles`\n    *   Total original MACs (hypothetical, if NPU was saturated throughout):\
    \ `MAC_orig_total = C_orig * 256 MAC/cycle = 18,432,000,000 MACs`\n    *   New\
    \ total cycles needed for inference: `C_new = 90 ms * 480 MHz = 43,200,000 cycles`\n\
    \    *   Effective MACs per cycle (comparing original work equivalent to new time):\
    \ `Effective_MACs_per_cycle = MAC_orig_total / C_new = 18,432,000,000 / 43,200,000\
    \ = 426.67 MAC/cycle`\n\n3.  **SRAM Freed Up:**\n    *   Total parameters in convolutional\
    \ layers: `P_conv_total = 0.9 * 10,000,000 parameters = 9,000,000 parameters`\n\
    \    *   Parameters reduced: `P_reduced = 0.5 * P_conv_total = 0.5 * 9,000,000\
    \ = 4,500,000 parameters`\n    *   SRAM freed up: `SRAM_freed = P_reduced * 1\
    \ byte/parameter = 4,500,000 bytes = 4.5 MB`"
  common_mistake: Candidates often assume the NPU's stated MAC/cycle rate (256) is
    an absolute upper bound without considering how sparsity can effectively 'speed
    up' the original workload. Other common pitfalls include incorrectly proportioning
    MACs/parameters across model layers, failing to isolate the impact of pruning
    only on convolutional layers, or overlooking the unpruned portion's contribution
    to total latency. Misunderstanding the definition of 'effective MACs per cycle'
    in a sparsity context (i.e., comparing original work vs. new time) is also common.
  napkin_math: '*   **Inference Time:** 50% MAC reduction in 80% of the model means
    ~40% overall MAC reduction. So, `150 ms * (1 - 0.4) = 90 ms`.

    *   **Effective MACs/Cycle:** A speedup from 150ms to 90ms is `150/90 = 1.66x`.
    Thus, the effective MAC/cycle is roughly `256 MAC/cycle * 1.66 = 426 MAC/cycle`.

    *   **SRAM Freed:** 90% of 10M parameters is 9M parameters. 50% reduction in these
    means `4.5M parameters` freed. At 1 byte/parameter, this is `4.5 MB`.'
