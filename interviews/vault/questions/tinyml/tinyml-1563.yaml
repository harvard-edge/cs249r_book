title: M4 Boot Energy Dominance
scenario: A structural health monitor using a Cortex-M4 takes an accelerometer reading every 10 minutes. The boot sequence takes 2 seconds (15 mA), inference takes 1 second (20 mA), and sleep current is 2 uA.
question: "What is the average power consumption over a 10-minute window when duty-cycling?"
visual:
  kind: svg
  path: tinyml-1563.svg
  alt: Timeline showing 2s at 15mA, 1s at 20mA, and 597s at 0mA.
  caption: Boot vs Inference Energy profile.
details:
  realistic_solution: 'A 10-minute window is 600 seconds. Active time is 3 seconds (2s boot + 1s infer), sleeping for 597 seconds. Energy in active phase: 2s * 15mA + 1s * 20mA = 50 mA-s. Energy in sleep: 597s * 0.002mA = 1.194 mA-s. Total energy = 51.194 mA-s. Average current = 51.194 / 600 = 0.085 mA or 85 uA.'
  common_mistake: |
    **The Pitfall:** Ignoring the boot overhead and only calculating the 1-second inference energy.
    **The Rationale:** Engineers often assume the MCU wakes up instantaneously with zero energy penalty.
    **The Consequence:** The average power is severely miscalculated, draining the battery much faster than anticipated.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Window: 10 minutes (600 seconds).
       - Boot: 2s at 15 mA.
       - Inference: 1s at 20 mA.
       - Sleep: 2 uA (0.002 mA).
    2. **Calculations:**
       - Boot energy = 2s * 15 mA = 30 mA-s.
       - Inference energy = 1s * 20 mA = 20 mA-s.
       - Sleep energy = 597s * 0.002 mA = 1.194 mA-s.
       - Total energy = 30 + 20 + 1.194 = 51.194 mA-s.
       - Average current = 51.194 / 600s = 0.08532 mA = 85.32 uA.
    3. **Conclusion & Interpretation:**
       - **Result: Average current is ~85 uA.**
       - **Energy-Bound (Boot Phase Dominates)**
