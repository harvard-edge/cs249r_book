title: M4 Boot Energy Dominance
scenario: A structural health monitor using a Cortex-M4 takes an accelerometer reading
  every 10 minutes. The boot sequence takes 2 seconds (15 mA), inference takes 1 second
  (20 mA), and sleep current is 2 uA.
question: Apply duty-cycling principles to calculate the average power consumption
  over a 10-minute window.
visual:
  kind: svg
  path: tinyml-1563.svg
  alt: Timeline showing 2s at 15mA, 1s at 20mA, and 597s at 0mA.
  caption: Boot vs Inference Energy profile.
details:
  realistic_solution: 'A 10-minute window is 600 seconds. Active time is 3 seconds
    (2s boot + 1s infer), sleeping for 597 seconds. Energy in active phase: $(2\text{s}
    \times 15\text{mA}) + (1\text{s} \times 20\text{mA}) = 50$ mA-s. Energy in sleep:
    $597\text{s} \times 0.002\text{mA} = 1.194$ mA-s. Total energy = $51.194$ mA-s.
    Average current = $51.194 / 600 = 0.085$ mA or $85$ uA.'
  common_mistake: Overlooking the expensive boot overhead which completely dominates
    the actual inference energy.
  napkin_math: (30 mA-s + 20 mA-s + 597s*0.002) / 600s = 51.2 / 600 = 0.085 mA = 85
    uA.
