title: Federated TinyML for Anomaly Detection on Cortex-M7/Ethos-U55
scenario: "You are tasked with designing a federated learning system for on-device\
  \ anomaly detection using highly sensitive sensor data. The target edge devices\
  \ are severely resource-constrained, featuring a Cortex-M7 processor (480 MHz) paired\
  \ with an Arm Ethos-U55 NPU (configurable from 128 to 512 MACs/cycle) and limited\
  \ to 512 KB of SRAM. The goal is to train a global model using federated averaging\
  \ across thousands of these devices. A key challenge is that the sensor data on\
  \ each device is inherently non-IID (Independent and Identically Distributed), and\
  \ communication bandwidth is intermittent and costly. \n\nDesign a comprehensive\
  \ system architecture and a detailed training strategy. Your solution must explicitly\
  \ address: \n1.  **Communication Efficiency:** How to minimize the data transmitted\
  \ between devices and the central server per round.\n2.  **Non-IID Data Challenges:**\
  \ Strategies to ensure model convergence and prevent performance degradation despite\
  \ disparate local datasets.\n3.  **Hardware Constraints:** How to ensure the federated\
  \ model's local training updates and inference can operate effectively within the\
  \ Cortex-M7's processing power and the 512 KB SRAM limit, specifically considering\
  \ model parameter storage and intermediate activation memory usage during local\
  \ training.\n\nQuantify the expected communication overhead (in KB/round/device)\
  \ for model updates and estimate the peak SRAM usage for model parameters and activations\
  \ during a local training step."
question: How would you quantify the expected communication overhead (in KB/round/device)
  for model updates and estimate the peak SRAM usage for model parameters and activations
  during a local training step?
details:
  realistic_solution: "A realistic solution would involve several techniques: \n1.\
    \  **Communication Efficiency:** Employ federated compression methods such as\
    \ sparsification (e.g., pruning updates, sending only top-K gradients), quantization\
    \ (e.g., 8-bit or 4-bit integer quantization for model weights and updates), and\
    \ delta encoding (sending differences from the global model). Client selection\
    \ based on data availability or network conditions can also reduce the total number\
    \ of devices communicating in a round.\n2.  **Non-IID Data:** Implement FedProx\
    \ or other personalized federated learning techniques that add a proximal term\
    \ to the local loss function, pulling local models closer to the global model\
    \ and mitigating divergence. Adaptive client sampling could prioritize devices\
    \ with diverse data or those that haven't contributed recently.\n3.  **Hardware\
    \ Constraints:** Design highly compact neural network architectures (e.g., MobileNetv2\
    \ variants, EfficientNet-Lite) specifically for TinyML. Aggressively quantize\
    \ models to 8-bit or even 4-bit fixed-point formats to minimize model size and\
    \ NPU operations. Optimize the local training loop to use minimal batch sizes\
    \ (e.g., batch size 1 or 2) to control peak activation memory. Leverage the Ethos-U55's\
    \ capabilities for efficient inference and, if possible, for accelerating quantized\
    \ local gradient computations (if the framework supports it). Ensure the model's\
    \ total parameters + intermediate activations fit comfortably within 512 KB SRAM,\
    \ accounting for OS and other application overhead."
  common_mistake: A common mistake is underestimating the communication costs in federated
    learning on edge devices, particularly the size of model updates (gradients or
    weights) which can quickly consume precious bandwidth and energy. Another frequent
    pitfall is to apply standard federated averaging directly to highly non-IID data
    without regularization (like FedProx) or client selection strategies, leading
    to model divergence or poor global model performance. Ignoring the tight SRAM
    constraints of tinyML devices for both model storage and intermediate activations
    during local forward/backward passes is also critical.
  napkin_math: "Let's assume a compact anomaly detection model with 150,000 parameters.\
    \ \n\n**Model Size & Communication:**\n- If weights are 32-bit floats: 150,000\
    \ params * 4 bytes/param = 600 KB. (Too large for 512 KB SRAM for just the model,\
    \ let alone activations)\n- If quantized to 8-bit integers: 150,000 params * 1\
    \ byte/param = 150 KB. This fits within 512 KB SRAM for the model. \n- **Communication\
    \ overhead (per device, per round for model updates):** Assuming 8-bit quantized\
    \ updates, a full model update would be ~150 KB. If we apply sparsification (e.g.,\
    \ send only 10% of updates) and further quantize to 4-bit for transmission, the\
    \ update size could be reduced to ~150 KB * 0.1 * 0.5 (for 4-bit) = 7.5 KB. This\
    \ is a significantly more manageable size for constrained communication channels.\n\
    \n**SRAM Usage (Local Training):**\n- Model Parameters (8-bit): ~150 KB\n- Intermediate\
    \ Activations (for a small CNN, during forward/backward pass, batch size 1): Can\
    \ range from 50 KB to 200 KB depending on layer depth and width.\n- Optimizer\
    \ State (e.g., for Adam, might be 2x model params if full precision): 150 KB (model)\
    \ + 2 * 150 KB (optimizer state if 8-bit) = 450 KB. This is very tight for 512\
    \ KB, highlighting the need for memory-efficient optimizers or only transmitting\
    \ gradients.\n- **Total Peak SRAM:** ~150 KB (model) + ~100 KB (activations) +\
    \ ~200 KB (partial optimizer/gradients) = ~450 KB. This is feasible but requires\
    \ careful memory management, potentially using a simple SGD optimizer or only\
    \ computing and transmitting gradients, not maintaining full optimizer state on\
    \ device."
