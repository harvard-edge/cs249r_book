title: The SRAM Budget Overflow
scenario: You are shrinking a CNN layer for a person-detection model on a Cortex-M7 with 2MB of SRAM. The layer takes a 48x48x64 feature map and uses a 3x3 kernel to produce a 48x48x128 output. A colleague suggests replacing it with a depthwise separable convolution to solve an SRAM overflow.
question: Does replacing the layer with a depthwise separable convolution solve peak activation SRAM usage?
details:
  realistic_solution: 'The described layer''s peak activation memory fits comfortably within the 2 MB SRAM. A depthwise separable convolution drastically reduces parameters and FLOPs, but does NOT reduce peak activation memory. The input and output tensor dimensions remain identical. Real SRAM reduction requires smaller spatial resolution, fewer channels, or in-place operation memory planning.'
  common_mistake: |
    **The Pitfall:** Assuming parameter reduction equals activation memory reduction.
    **The Rationale:** Engineers correctly calculate an 8.4x parameter reduction but wrongly assume it shrinks the input/output tensors.
    **The Consequence:** They perform complex NAS searches that reduce flash footprint but do absolutely nothing to reduce peak SRAM usage.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SRAM Limit: 2 MB.
       - Data format: INT8 (1 byte).
       - Dimensions: 48x48x64 in, 48x48x128 out.
    2. **Calculations:**
       - Input Tensor Size: 48 * 48 * 64 * 1 byte = 144 KB.
       - Output Tensor Size: 48 * 48 * 128 * 1 byte = 288 KB.
       - Peak Activation: 144 KB + 288 KB = 432 KB.
       - Depthwise Params: 8.4x smaller, but tensors are unchanged.
    3. **Conclusion & Interpretation:**
       - **Result: False Premise.** Peak memory remains 432 KB, which easily fits in 2 MB. Depthwise convolutions do not solve activation memory limits.
  options:
  - The parameter count is reduced by ~8.4x, so both memory and latency will decrease by ~8.4x, solving the problem.
  - The layer is memory-bound; since parameters are stored in Flash, not SRAM, the change has no effect on the memory issue.
  - The change reduces parameters and FLOPs by ~8.4x, but peak activation memory is unchanged at ~432 KiB; nevertheless, this already fits within the 2 MB SRAM.
  - The FLOPs are reduced from ~339 MFLOPS to ~40 MFLOPS, but this increases latency because more, smaller operations are less efficient.
  correct_index: 2
status: published
