title: Ethos-U55 Operator Scheduling for Memory and Performance
scenario: You are tasked with deploying a CNN for object detection on a system featuring a Cortex-M7 CPU and an Ethos-U55 NPU. Your goal is to optimize the execution order of the operators to minimize peak SRAM usage, maximize CPU/NPU parallel execution, and leverage layer fusion.
question: How should Cortex-M7 and Ethos-U55 operator scheduling minimize peak SRAM, maximize NPU utilization, and fuse CNN layers?
details:
  realistic_solution: 'A realistic solution involves a graph-based memory-aware scheduling approach: 1) Analyzing the computation graph for potential fusion candidates (e.g., Conv+ReLU, operator cascading). 2) Prioritizing in-place operations and memory reuse. 3) Utilizing double-buffering or tiling techniques for large tensors. 4) Partitioning the graph for efficient offloading to the Ethos-U55, ensuring the Cortex-M7 handles pre/post-processing or unsupported operations while the NPU is saturated. 5) Operator cascading to keep intermediate activations inside the NPU local buffers instead of spilling to SRAM.'
  common_mistake: |
    **The Pitfall:** Scheduling operations sequentially based solely on the graph topology without evaluating intermediate tensor lifetimes or CPU/NPU memory bus contention.
    **The Rationale:** Candidates treat the NPU as a black-box offload engine, ignoring the cost of transferring intermediate activations back and forth to shared SRAM.
    **The Consequence:** Excessive intermediate buffer allocations exceed the SRAM budget, and data movement latency completely negates the NPU's compute acceleration.
  napkin_math: |
    1. **Assumptions & Constraints:** FP16 Convolution outputting a 64x64x32 tensor. 512 KB total shared SRAM. Ethos-U55 at 480 MHz doing 512 MAC/cycle.
    2. **Calculations:** Tensor size = 64 * 64 * 32 * 2 bytes = 262 KB. If two tensors (input and output) are kept in memory simultaneously without in-place fusion, memory required = 524 KB (> 512 KB SRAM limit). Ethos peak compute = 480 MHz * 512 MAC/cycle ≈ 245.76 GMAC/s.
    3. **Conclusion & Interpretation:** **Result: Memory-Bound System Failure.** A naive sequential schedule instantly OOMs the device. Operator cascading and in-place fusion are mandatory structural requirements, not optional optimizations, to keep intermediate states inside the NPU's internal buffers and prevent SRAM overflow.
