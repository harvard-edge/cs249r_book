title: Ethos-U55 Operator Scheduling for Memory and Performance
scenario: You are tasked with deploying a convolutional neural network (CNN) model
  for object detection on an embedded system featuring a Cortex-M7 microcontroller
  and an Ethos-U55 NPU. The system has 512 KB of SRAM, and the Ethos-U55 can perform
  128-512 MAC/cycle at 480 MHz. The CNN model has several convolutional layers followed
  by activation functions and pooling layers. Your goal is to optimize the execution
  order of these operators to minimize peak memory usage, maximize parallel execution
  between the Cortex-M7 and Ethos-U55, and identify opportunities for layer fusion
  to improve overall inference latency and energy efficiency. Describe how you would
  approach scheduling the operators to meet these constraints, considering the memory
  hierarchy and the capabilities of both the CPU and NPU.
question: How should Cortex-M7 and Ethos-U55 operator scheduling minimize peak SRAM,
  maximize NPU utilization, and fuse CNN layers?
details:
  realistic_solution: 'A realistic solution would involve a graph-based scheduling
    approach. This includes: 1) Analyzing the computation graph for data dependencies
    and potential fusion candidates (e.g., Conv+ReLU). 2) Employing memory-aware scheduling
    algorithms (e.g., greedy scheduling, or critical path scheduling with memory constraints)
    to determine execution order, prioritizing in-place operations and memory reuse.
    3) Utilizing double-buffering or tiling techniques for large tensors to manage
    the limited SRAM. 4) Partitioning the graph for efficient offloading to the Ethos-U55,
    ensuring that the Cortex-M7 handles pre/post-processing or unsupported operations
    while the NPU is saturated with its specialized tasks. 5) Considering static vs.
    dynamic scheduling based on predictability of workloads.'
  common_mistake: A common mistake is to schedule operations without a holistic view
    of memory requirements and data dependencies, leading to excessive intermediate
    buffer allocations that exceed the 512 KB SRAM. Another mistake is to naively
    parallelize without considering the overhead of data transfers between the CPU
    and NPU, or missing opportunities for fusing operations that could reduce memory
    traffic and NPU stalls.
  napkin_math: Given a convolutional layer outputting a 64x64x32 tensor (FP16), this
    requires 64 * 64 * 32 * 2 bytes = 262 KB. If two such tensors are needed simultaneously
    (input and output of consecutive layers without in-place optimization), this alone
    exceeds half of the available 512 KB SRAM. For NPU utilization, if a layer requires
    1 GOPS (Giga Operations Per Second), the Ethos-U55 at 480 MHz and 512 MAC/cycle
    can perform 480 * 10^6 * 512 MAC/cycle = 245.76 GOPS. A mismatch between required
    GOPS and NPU capability, or inefficient scheduling, will lead to underutilization.
    Optimizing scheduling ensures intermediate tensors fit and the NPU is consistently
    fed.
