title: KWS Memory Architecture on Cortex-M4
scenario: You are designing an always-on keyword spotting system for a battery-powered sensor node using an ARM Cortex-M4 (STM32F4) microcontroller. The device has 256 KB of SRAM, 1 MB of flash, and no FPU, but supports CMSIS-NN SIMD instructions (2x INT8 MACs/cycle).
question: How should you partition Cortex-M4 SRAM and flash to determine the maximum feasible size of an INT8 depthwise-separable KWS model?
details:
  realistic_solution: A robust specification starts by partitioning the 256 KB SRAM. After reserving memory for the RTOS, audio buffering, and feature extraction, the remaining SRAM dictates the peak memory footprint (typically the largest two consecutive layers' activations in a framework like TFLite Micro). To utilize the CMSIS-NN SIMD capabilities (2x INT8 MACs/cycle) and compensate for the lack of an FPU, the model must be fully quantized to INT8. The model parameters will reside in the 1 MB flash, which is usually abundant compared to SRAM.
  common_mistake: |
    **The Pitfall:** Focusing solely on the model's parameter size fitting into the 1 MB flash.
    **The Rationale:** Candidates neglect the strict SRAM constraints for activations, the lack of an FPU, and the need to budget SRAM for the RTOS and audio buffers.
    **The Consequence:** Designing a model that compiles and flashes successfully but immediately crashes with an Out-of-Memory (OOM) error during runtime.
  napkin_math: |
    1. **Total SRAM:** 256 KB.
    2. **System Reservations:** 32 KB (RTOS/stack) + 32 KB (audio ring buffer) + 12 KB (MFCC scratchpad) = 76 KB.
    3. **Remaining SRAM:** 256 - 76 = **180 KB**.
    4. **TFLite Micro Overhead:** ~20 KB, leaving an activation arena of **160 KB**.
    5. **Layer Check:** Input 49x10x64 (31.3 KB) + Output 25x5x64 (8 KB) = ~40 KB (Fits in 160 KB).
    6. **Flash Budget:** 1 MB total. Firmware takes ~200 KB, leaving **~800 KB**.
    7. **Conclusion:** An INT8 model with 500,000 parameters takes 500 KB, easily fitting the 800 KB flash limit.
