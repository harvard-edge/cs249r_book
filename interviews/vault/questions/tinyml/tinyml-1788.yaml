title: SRAM vs Flash Layout
scenario: A Cortex-M4 has 256KB of SRAM and 1MB of Flash. An anomaly detection model requires 800KB of INT8 weights and 150KB of intermediate activation memory.
question: Analyze the memory layout and determine how to execute the model without exceeding the SRAM limits.
details:
  realistic_solution: The 800KB weights must be stored in Flash memory and executed in place (XIP), as they cannot fit in SRAM. Only the 150KB of intermediate activations should be mapped to the volatile SRAM. Flash read speeds will dictate the ultimate inference latency.
  common_mistake: |
    **The Pitfall:** Attempting to load all weights into SRAM at boot.
    **The Rationale:** Failing to understand the distinction between volatile (activations) and non-volatile (weights) storage requirements.
    **The Consequence:** Instantly causing a stack overflow or OOM exception.
  napkin_math: |
    * **Weights:** 800 KB fits easily within 1 MB Flash.
    * **Activations:** 150 KB fits easily within 256 KB SRAM.
    * **Result:** Total 950 KB footprint cleanly splits. Weights must use **eXecute In Place (XIP)** directly from Flash.
