title: SRAM vs Flash Layout
scenario: A Cortex-M4 has 256KB of SRAM and 1MB of Flash. An anomaly detection model
  requires 800KB of INT8 weights and 150KB of intermediate activation memory.
question: Analyze the memory layout and determine how to execute the model without
  exceeding the SRAM limits.
details:
  realistic_solution: The 800KB weights must be stored in Flash memory and executed
    in place (XIP), as they cannot fit in SRAM. Only the 150KB of intermediate activations
    should be mapped to the volatile SRAM. Flash read speeds will dictate the ultimate
    inference latency.
  common_mistake: Attempting to load all weights into SRAM at boot, or failing to
    account for the activation memory overhead causing a stack overflow.
  napkin_math: 1MB flash > 800KB weights. 256KB SRAM > 150KB activations. Total required
    950KB cleanly splits across mediums.
