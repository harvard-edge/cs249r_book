title: Active Learning Pipeline for nRF5340 Wearable
scenario: You are designing a data collection and active learning pipeline for a continuous anomaly detection
  wearable using the Nordic nRF5340. The device features a 128 MHz app core, 64 MHz net core, 256 KB SRAM,
  1 MB flash, and uses BLE 5.3 with a ~5mA active current. Continuous raw data streaming drains the battery
  too quickly, so you must architect a system to selectively curate, buffer, and transmit only the most
  informative edge-case samples for cloud-side human annotation and model retraining.
details:
  realistic_solution: A strong design implements a lightweight confidence-threshold filter (e.g., simple
    softmax entropy or reconstruction error) on the 128 MHz app core to identify out-of-distribution or
    uncertain samples. Only these high-value snippets are buffered in the limited SRAM and transmitted
    via BLE 5.3 during periodic connection intervals. The cloud pipeline then routes these specific hard
    examples to expert annotators, ensuring the curated dataset grows with maximal information density
    while preserving the wearable's strict energy and memory constraints.
  common_mistake: Candidates often propose running heavy uncertainty estimation algorithms (like deep
    ensembles) on-device, which exceeds the 256 KB SRAM and spikes power consumption. Another mistake
    is relying on continuous data streaming for labeling, failing to realize the constant BLE transmission
    will exhaust the limited battery budget.
  napkin_math: Continuous streaming of sensor data at 250 Hz (16-bit) requires transmitting roughly 1.8
    MB/hour, forcing the BLE radio to remain active and constantly draw near the ~5mA budget. By selectively
    sampling 10 uncertain 2-second events per hour, the data transmitted drops to just 10 KB/hour. Buffering
    a single 2-second event (1000 bytes) uses only ~0.39% of the 256 KB SRAM, leaving ample memory for
    the OS, BLE stack, and ML model.
