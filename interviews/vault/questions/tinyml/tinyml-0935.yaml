title: Recall Arithmetic Intensity Threshold for Attention on MCU
scenario: 'During an MCU transformer design review, you are asked: for a Cortex-M4
  with 2.1 GFLOP/s compute and 1.6 GB/s memory bandwidth (SRAM), what is the roofline
  arithmetic intensity threshold for attention operations? And is standard dot-product
  attention compute-bound or memory-bound at sequence length 64 with 64-dim heads?'
question: And is standard dot-product attention compute-bound or memory-bound at sequence
  length 64 with 64-dim heads?
details:
  realistic_solution: 'Arithmetic intensity threshold = compute / bandwidth = 2.1 GFLOP/s / 1.6 GB/s = 1.31 FLOP/byte. For full sequence attention (encoder) at seq=64, head_dim=64: QK^T takes 2×64²×64 = 524,288 FLOPs, and AV takes 524,288 FLOPs. Total = 1,048,576 FLOPs. Minimum memory access involves reading Q, K, V and writing the output: 4×64×64 = 16,384 elements, which at FP32 is 65,536 bytes. Arithmetic intensity = 1,048,576 / 65,536 = 16 FLOP/byte. Since 16 > 1.31, the layer is heavily compute-bound.'
  common_mistake: 'Confusing FLOP/s with MAC/s or assuming attention is always memory-bound without calculating the sequence-level intensity; Cortex-M4 often achieves only 60-80% of peak bandwidth.'
  napkin_math: 'Ridge point = 2.1G / 1.6G = 1.31 FLOP/byte. Total FLOPs for N=64 encoder attention = 4N²d. Total bytes (ideal caching for FP32) = 16Nd (read Q,K,V, write Out, 4 bytes/element). Intensity = 4N²d / 16Nd = N/4 FLOP/byte. For N=64, intensity = 16 FLOP/byte >> 1.31. Therefore, it is strongly compute-bound.'
