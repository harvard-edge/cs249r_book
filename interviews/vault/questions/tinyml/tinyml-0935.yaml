title: Recall Arithmetic Intensity Threshold for Attention on MCU
scenario: During an MCU transformer design review, you are asked about the roofline arithmetic intensity threshold for attention operations on a Cortex-M4 with 2.1 GFLOP/s compute and 1.6 GB/s memory bandwidth (SRAM).
question: What is the arithmetic intensity threshold, and is standard dot-product attention compute-bound or memory-bound at sequence length 64 with 64-dim heads?
details:
  realistic_solution: 'Arithmetic intensity threshold = compute / bandwidth = 2.1 GFLOP/s / 1.6 GB/s = 1.31 FLOP/byte. For full sequence attention (encoder) at seq=64, head_dim=64: QK^T takes 2×64²×64 = 524,288 FLOPs, and AV takes 524,288 FLOPs. Total = 1,048,576 FLOPs. Minimum memory access involves reading Q, K, V and writing the output: 4×64×64 = 16,384 elements, which at FP32 is 65,536 bytes. Arithmetic intensity = 1,048,576 / 65,536 = 16 FLOP/byte. Since 16 > 1.31, the layer is heavily compute-bound.'
  common_mistake: |
    **The Pitfall:** Assuming attention is always memory-bound.
    **The Rationale:** Cloud engineers know LLM attention is memory-bound due to massive sequence lengths and KV cache sizes, but on MCUs with small N (e.g., 64), the math changes entirely.
    **The Consequence:** Applying memory optimizations (like FlashAttention) when the layer is actually severely compute-starved.
  napkin_math: |
    1. **Ridge point:** 2.1 GFLOP/s / 1.6 GB/s = **1.31 FLOP/byte**.
    2. **Total FLOPs:** For N=64 encoder attention, 4N²d FLOPs = 4 * 64² * 64 = 1,048,576 FLOPs.
    3. **Total bytes:** Ideal caching for FP32 reads Q, K, V and writes Out (16Nd bytes) = 16 * 64 * 64 = 65,536 bytes.
    4. **Intensity:** 1,048,576 / 65,536 = **16 FLOP/byte** (or N/4).
    5. **Conclusion:** Since 16 FLOP/byte >> 1.31 FLOP/byte, it is strongly **compute-bound**.
