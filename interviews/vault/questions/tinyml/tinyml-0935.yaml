title: Recall Arithmetic Intensity Threshold for Attention on MCU
scenario: During an MCU transformer design review, you are asked about the roofline arithmetic intensity threshold for attention operations on a Cortex-M4 with 2.1 GFLOP/s compute and 1.6 GB/s memory bandwidth (SRAM).
question: What is the arithmetic intensity threshold, and is standard dot-product attention compute-bound or memory-bound at sequence length 64 with 64-dim heads?
details:
  realistic_solution: Evaluate the arithmetic intensity (FLOPs/byte). Unlike cloud environments, at very small sequence lengths on MCUs, dot-product attention calculations far exceed the memory fetch costs.
  common_mistake: |
    **The Pitfall:** Assuming attention is always memory-bound.
    **The Rationale:** Cloud engineers know LLM attention is memory-bound due to massive sequence lengths and KV cache sizes, but on MCUs with small N (e.g., 64), the math changes entirely.
    **The Consequence:** Applying memory optimizations (like FlashAttention) when the layer is actually severely compute-starved.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cortex-M4: 2.1 GFLOP/s compute, 1.6 GB/s bandwidth.
       - Sequence N=64, Head Dim d=64, FP32.
    2. **Calculations:**
       - Ridge point: 2.1 GFLOP/s / 1.6 GB/s = 1.31 FLOP/byte.
       - Total FLOPs (QK^T + AV): 4 * N^2 * d = 4 * 64^2 * 64 = 1,048,576 FLOPs.
       - Total bytes (Ideal caching Q, K, V read + Out write): 4 * N * d * 4 bytes = 16 * 64 * 64 = 65,536 bytes.
       - Arithmetic Intensity: 1,048,576 / 65,536 = 16 FLOP/byte.
    3. **Conclusion & Interpretation:**
       **Result: Intensity is 16 FLOP/byte (> 1.31).** Unlike cloud LLMs, MCU attention at N=64 is strongly **Compute-Bound**.
