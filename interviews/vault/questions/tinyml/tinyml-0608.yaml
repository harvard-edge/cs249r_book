title: The OTA Heap Fragmentation
scenario: Your device has 150 KB of free heap memory. You initiate an Over-The-Air (OTA) update that requires allocating a 64 KB download buffer. The `malloc(65536)` call fails with an Out-of-Memory error.
question: Why did a 64 KB allocation fail when the device reports 150 KB of free heap memory?
details:
  realistic_solution: The heap suffers from severe fragmentation. While the aggregate free heap is 150KB, it is scattered across hundreds of non-contiguous blocks fractured by asynchronous network stacks (Wi-Fi, BLE, TLS). `malloc()` demands a single, contiguous memory block. To resolve this, pre-allocate the 64KB OTA buffer statically at boot, or utilize a deterministic memory pool allocator to bypass dynamic fragmentation entirely. Utilize `esp_get_largest_free_block()` instead of relying on total free heap.
  common_mistake: |
    **The Pitfall:** Confusing total free memory with the maximum contiguous allocatable memory block.
    **The Rationale:** High-level language developers expect the OS to automatically defragment memory or leverage virtual memory addressing.
    **The Consequence:** OTA updates reliably crash in production as network stacks fragment the heap over time, stranding devices on obsolete firmware forever.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total Free Heap: 150 KB.
       - Required Allocation: 64 KB strictly contiguous.
    2. **Calculations:**
       - Largest fragmented contiguous free block: e.g., 12 KB.
       - 12 KB < 64 KB allocation request.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Fragmentation Bound.** The contiguous allocation fails instantly despite sufficient aggregate free space.
