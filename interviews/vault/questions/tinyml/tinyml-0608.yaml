title: The OTA Heap Fragmentation
scenario: Your ESP32 has 150 KB of free heap memory. You initiate an Over-The-Air (OTA) update that requires allocating a 64 KB download buffer. The `malloc(65536)` call fails with an Out-of-Memory error. You have 150 KB free.
question: Why did a 64 KB allocation fail when the ESP32 reports 150 KB of free heap memory?
details:
  realistic_solution: 'Heap fragmentation. The ESP32''s 150KB of free heap is split across hundreds of small, non-contiguous blocks after allocations and frees from WiFi, BLE, and TLS stacks. The largest contiguous free block may be only 12KB despite 150KB total free. malloc(64KB) requires a single contiguous 64KB region — which does not exist. Fix: (1) allocate the OTA buffer at boot before fragmentation occurs, (2) use a static buffer (uint8_t ota_buf[65536]), (3) use a memory pool allocator for dynamic allocations. Check heap health with esp_get_largest_free_block() before attempting large allocations.'
  common_mistake: |
    **The Pitfall:** Confusing total free memory with maximum contiguous allocatable memory.
    **The Rationale:** High-level language developers expect the OS to defragment memory or utilize virtual memory automatically.
    **The Consequence:** OTA updates fail in production because the heap is fragmented by tiny network stack allocations, stranding the device on old firmware forever.
  napkin_math: |
    *   **Total Free Heap:** 150 KB.
    *   **Required Allocation:** 64 KB contiguous block.
    *   **Largest Free Block:** e.g., 12 KB.
    *   **Conclusion:** Because no single block equals 64 KB, `malloc(64KB)` fails instantly, crashing the OTA process.
