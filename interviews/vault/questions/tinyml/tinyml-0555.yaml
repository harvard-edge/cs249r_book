title: The Clock Tree Surprise
scenario: >
  You're deploying a gesture recognition model on an STM32L4 (Cortex-M4, up to 80 MHz, 256 KB SRAM). To save power, your firmware engineer configures the MCU to run at 16 MHz from the MSI oscillator instead of 80 MHz from the PLL. Inference time scales from 20 ms to 100 ms — exactly 5×, as expected.
question: >
  How is running slower using *more* energy?
details:
  realistic_solution: >
    Running slower uses more total energy because of static power. At 80MHz/1.2V: 50mW * 20ms = 1.0mJ compute, then sleep at 10uW for 980ms = 0.0098mJ. Total: 1.01mJ. At 16MHz (same voltage): 15mW * 100ms = 1.5mJ compute, sleep 900ms = 0.009mJ. Total: 1.51mJ — 50% more energy. The key: static power (leakage current) is voltage-dependent, not frequency-dependent. At 16MHz the MCU draws ~6.25mW static for 5x longer. Race-to-sleep wins: run at max clock, finish fast, enter deep sleep where static power drops to microwatts.
  common_mistake: |
    **The Pitfall:** Assuming "lower clock = lower power = lower energy."
    **The Rationale:** Candidates confuse *power* (watts) with *energy* (joules). Power drops at lower clock speeds, but the MCU runs longer.
    **The Consequence:** They try to save battery life by slowing down the clock, but actually increase total energy consumption.
  napkin_math: |
    - **Race-to-sleep (80 MHz):** 50 mW × 20 ms compute = 1.0 mJ. Plus 10 μW × 980 ms sleep = 0.0098 mJ. Total = **1.01 mJ**.
    - **Slow (16 MHz):** 15 mW × 100 ms compute = 1.5 mJ. Plus 10 μW × 900 ms sleep = 0.009 mJ. Total = **1.51 mJ**.
    - **Conclusion:** The slow method uses **50% more energy**. Static leakage power dominates the longer active time, making "race-to-sleep" at 80 MHz vastly more efficient.
  options:
  - The 16 MHz clock reduces dynamic power proportionally, so total energy per inference drops by 5x, saving significant battery life.
  - Running at 16 MHz uses more energy because the lower frequency reduces cache hit rates, forcing more expensive main memory accesses.
  - Static (leakage) power is voltage-dependent, not frequency-dependent. At 16 MHz the MCU stays active 5x longer, accumulating leakage energy that exceeds the dynamic power savings. Race-to-sleep at 80 MHz finishes faster and enters deep sleep where leakage drops to microwatts.
  - The MSI oscillator at 16 MHz is inherently less power-efficient than the PLL at 80 MHz because it uses an RC-based clock source with higher jitter and higher current draw.
  correct_index: 2
