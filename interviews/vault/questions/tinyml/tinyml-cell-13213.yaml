title: Design Attention Approximation for 256KB SRAM Budget
scenario: A keyword-spotting transformer needs 128-token context but the ESP32-S3's 512KB SRAM can only
  hold 64KB for the KV cache after reserving memory for weights, activations, and OS overhead. The model
  has 4 layers, 4 heads, 32-dimensional heads, INT8 precision. Design an attention approximation scheme
  (sliding window, sink tokens, or linear attention) that fits the memory budget while preserving >95%
  of baseline accuracy on the LibriSpeech keyword task.
question: "What attention approximation fits a 128-token transformer context into the ESP32-S3 KV-cache budget while preserving accuracy?"
details:
  realistic_solution: 'Full KV cache: 4×4×32×128×1B = 65,536B ≈ 64KB — exactly at budget but zero margin.
    Sliding window with 32-token window + 4 sink tokens: 4×4×32×36×1B = 18,432B = 18KB. Saves 46KB. Sink
    tokens (BOS + 3 learned sinks) capture global context; window handles local phoneme patterns. Expected
    accuracy drop <2% for keyword spotting due to local acoustic structure.'
  common_mistake: Using full KV cache and swapping to flash; flash latency (100μs/read) dominates for
    128-token context with frequent cache misses.
  napkin_math: 'KV per layer = heads × head_dim × seq_len × precision = 4×32×128×1 = 16KB per layer ×
    4 layers = 64KB. Sliding 32+4=36 tokens: 4×32×36×1 = 4.6KB per layer × 4 = 18.4KB total.'
