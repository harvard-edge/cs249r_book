title: Design a Sub-1mW Cascaded Acoustic Wake-up
scenario: An acoustic monitor has a strict power budget of 1mW. The microphone draws 500uW. The MCU draws 10mW when active and 10uW in sleep.
question: How can you design a multi-stage pipeline that guarantees the total average power stays below 1mW while processing sporadic acoustic events?
details:
  realistic_solution: "A cascade is necessary: route the mic output to a low-power analog comparator (<10uW). The comparator wakes the MCU only on loud transients to run a 2ms energy calculation. If promising, run the full 20ms ML model. This sparse wake-up keeps the average well below 5%."
  common_mistake: |
    **The Pitfall:** Keeping the MCU awake continuously to run a lightweight model.
    **The Rationale:** Believing a "tiny" model saves enough power without realizing the MCU's baseline active current is the primary issue.
    **The Consequence:** The 10mW active draw instantly violates the strict 1mW total system power limit, draining the battery rapidly.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Budget: 1 mW total.
       - Mic: 500 µW.
       - MCU Active: 10 mW.
    2. **Calculations:**
       - Available MCU Budget: 1 mW - 0.5 mW = 0.5 mW.
       - Max Active Duty Cycle: 0.5 mW / 10 mW = 5%.
       - Cascade Strategy: Analog comparator wakes MCU for 2ms energy check -> 20ms full ML.
    3. **Conclusion & Interpretation:**
       - **Result: Energy-Bound (Sparse cascade maintains sub-5% duty cycle to meet 1mW budget).**
