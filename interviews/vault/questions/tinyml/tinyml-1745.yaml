title: Design a Sub-1mW Cascaded Acoustic Wake-up
scenario: An acoustic monitor on a Cortex-M4 has a strict power budget of 1mW. The
  microphone draws 500uW. The MCU draws 10mW when active and 10uW in sleep.
question: Create a multi-stage hardware/software pipeline that guarantees the total
  average power stays below 1mW while processing sporadic acoustic events.
details:
  realistic_solution: 'The microphone leaves 500uW for the MCU. The maximum permissible
    active MCU duty cycle is roughly 500uW / 10mW = 5%. A cascade is necessary: route
    the mic output to a low-power analog comparator (<10uW). The comparator wakes
    the MCU only on loud transients to run a 2ms energy calculation. If promising,
    run the full 20ms ML model. This sparse wake-up keeps the average well below 5%.'
  common_mistake: Keeping the MCU awake continuously to run a lightweight model, completely
    ignoring that 10mW baseline draw instantly violates the 1mW limit.
  napkin_math: Allowed duty = 0.5mW / 10mW = 5%. Cascading limits active time to <1%.
