title: Design a Sub-1mW Cascaded Acoustic Wake-up
scenario: An acoustic monitor on a Cortex-M4 has a strict power budget of 1mW. The microphone draws 500uW. The MCU draws 10mW when active and 10uW in sleep.
question: How can you design a multi-stage pipeline that guarantees the total average power stays below 1mW while processing sporadic acoustic events?
details:
  realistic_solution: 'The microphone leaves 500uW for the MCU. The maximum permissible active MCU duty cycle is roughly 500uW / 10mW = 5%. A cascade is necessary: route the mic output to a low-power analog comparator (<10uW). The comparator wakes the MCU only on loud transients to run a 2ms energy calculation. If promising, run the full 20ms ML model. This sparse wake-up keeps the average well below 5%.'
  common_mistake: |
    **The Pitfall:** Keeping the MCU awake continuously to run a lightweight model.
    **The Rationale:** Believing a "tiny" model saves enough power without realizing the MCU's baseline active current is the primary issue.
    **The Consequence:** The 10mW active draw instantly violates the strict 1mW total system power limit, draining the battery rapidly.
  napkin_math: |
    1. **Available MCU Power Budget:** 1 mW (Total) - 0.5 mW (Mic) = 0.5 mW.
    2. **Max Active Duty Cycle:** 0.5 mW / 10 mW = **5%**.
    3. **Cascade Strategy:** Use an analog comparator (<10uW) to wake the MCU.
    4. **Stage 1 (Energy Check):** 2ms active time.
    5. **Stage 2 (Full ML):** 20ms active time.
    6. **Conclusion:** Sparse wake-ups keep the average active time well below the 5% threshold required to maintain a sub-1mW budget.
