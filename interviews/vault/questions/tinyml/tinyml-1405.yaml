title: Diagnosing Knowledge Distillation Issues on ESP32-S3 for Anomaly Detection
scenario: Your team is deploying a lightweight anomaly detection model onto an ESP32-S3. To achieve latency and memory constraints, you used knowledge distillation to train a compact student model from a high-accuracy teacher. After flashing, on-device accuracy is 5-7% lower than expected, and you are occasionally hitting CPU bottlenecks during peak sensor input.
question: How would you diagnose the root cause of this accuracy drop and CPU bottleneck in the context of knowledge distillation on the ESP32-S3?
details:
  realistic_solution: '1. **Runtime Verification**: Compare student model''s internal activations and logit outputs on the ESP32-S3 against those from distillation training using identical inputs to identify precision/quantization issues or environmental discrepancies. 2. **Memory Profiling**: Analyze memory access patterns on ESP32-S3, especially between fast SRAM and slower PSRAM, to identify bottlenecks from model layers or intermediate activations spilling over. 3. **Floating-point Fidelity**: Investigate if the ESP32-S3''s FPU behavior or lack thereof (e.g., using fixed-point arithmetic if not properly configured) is distorting the distilled knowledge, particularly if ''soft targets'' from the teacher were float32. 4. **Toolchain/Compiler Check**: Verify if the chosen embedded toolchain''s optimizations or library versions for inference on ESP32-S3 introduce subtle computation errors not present in the training environment.'
  common_mistake: |
    **The Pitfall:** Immediately retraining the model.
    **The Rationale:** Candidates assume the student architecture is simply insufficient and immediately resort to retraining without diagnosing the hardware deployment pipeline.
    **The Consequence:** They miss physical hardware mismatches, such as inefficient PSRAM spilling or improper FPU configuration for soft targets, leading to endless retraining loops.
  napkin_math: |
    - Unoptimized floating-point emulation takes ~50 cycles/MAC.
    - 100,000 float MACs = 5,000,000 cycles.
    - At 240 MHz (4.16ns/cycle): 5M * 4.16ns = **20.8ms (exceeding typical 10ms deadlines)**.
    - Additionally, PSRAM spillover adds ~50-100ns latency per word accessed.
