title: Diagnosing Knowledge Distillation Issues on ESP32-S3 for Anomaly Detection
scenario: You deployed a lightweight student model via knowledge distillation onto an ESP32-S3. After flashing, the on-device accuracy is 5% lower than observed in PyTorch, and the system is hitting catastrophic CPU bottlenecks during peak sensor input.
question: How should the engineering team systematically diagnose the distillation accuracy drop and CPU bottleneck on the ESP32-S3 architecture?
details:
  realistic_solution: 'The diagnosis must trace the deployment pipeline to identify hardware execution mismatches. First, perform runtime verification by dumping intermediate activation tensors from the ESP32-S3 and comparing them against the PyTorch output to isolate exactly where precision diverges. Second, audit the floating-point logic: if the soft targets require FP32 precision, verify the ESP32-S3 FPU is explicitly enabled. If it drops to unoptimized software emulation, it fundamentally explains both the degraded precision and the CPU bottleneck.'
  common_mistake: |
    **The Pitfall:** Immediately initiating retraining loops to solve hardware execution errors.
    **The Rationale:** Candidates assume the student architecture lacks capacity and blindly initiate hyperparameter tuning without diagnosing the physical deployment substrate.
    **The Consequence:** They burn weeks of engineering time on model training, completely missing that the CPU bottleneck is caused by software-emulated FP32 operations misconfigured in the toolchain.
  napkin_math: |
    **Assumptions & Constraints:**
    - ESP32-S3 running at 240 MHz.
    - Model contains 100,000 float MACs.

    **Calculations:**
    - Unoptimized floating-point software emulation requires ~50 cycles/MAC.
    - Execution: 100,000 MACs * 50 cycles = 5,000,000 cycles.
    - Latency: 5,000,000 cycles / 240,000,000 Hz = 20.8 ms.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound Emulation**. Executing the model via software emulation destroys the real-time deadline (>20ms per pass), proving the hardware FPU must be properly engaged.
