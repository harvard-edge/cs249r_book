title: The Battery Life Equation
scenario: 'You''re deploying a gesture recognition system on a Cortex-M4 powered by a 300 mAh coin cell
  battery. The MCU draws 50 mW active and 10 µW in deep sleep. Inference takes 30 ms and runs once per
  second. Your product manager asks: how long will the battery last?'
question: "How long will a 300 mAh coin cell power a Cortex-M4 gesture model running 30 ms once per second?"
details:
  realistic_solution: Duty cycling is the key. The MCU is active for 30 ms out of every 1000 ms — a 3%
    duty cycle. Average power = $(0.03 \times 50\text{ mW}) + (0.97 \times 0.01\text{ mW}) = 1.5\text{
    mW} + 0.0097\text{ mW} \approx 1.51\text{ mW}$. A 300 mAh coin cell at 3V provides 900 mWh. Battery
    life = $900\text{ mWh} / 1.51\text{ mW} \approx 596\text{ hours} \approx 25\text{ days}$. The duty
    cycle extends battery life from less than a day to nearly a month.
  common_mistake: '"50 mW continuously from a 300 mAh battery — that''s about 20 hours." This treats the
    MCU as always-on, ignoring the duty cycle entirely.'
  napkin_math: 'Always-on: $900\text{ mWh} / 50\text{ mW} = 18\text{ hours}$. With 3% duty cycle: $900\text{
    mWh} / 1.51\text{ mW} = 596\text{ hours}$. That''s a 33× improvement — the difference between a disposable
    prototype and a shippable product.'
