title: The Battery Life Equation
scenario: You're deploying a gesture recognition system on a Cortex-M4 powered by a 300 mAh coin cell battery at 3V. The MCU draws 50 mW active and 10 µW in deep sleep. Inference takes 30 ms and runs once per second.
question: "How long will a 300 mAh 3V coin cell power a Cortex-M4 gesture model running 30 ms once per second?"
details:
  realistic_solution: Duty cycling is the key. The MCU is active for 30 ms out of every 1000 ms — a 3% duty cycle. Average power = $(0.03 \times 50\text{ mW}) + (0.97 \times 0.01\text{ mW}) = 1.5\text{ mW} + 0.0097\text{ mW} \approx 1.51\text{ mW}$. A 300 mAh coin cell at 3V provides 900 mWh. Battery life = $900\text{ mWh} / 1.51\text{ mW} \approx 596\text{ hours} \approx 25\text{ days}$. The duty cycle extends battery life from less than a day to nearly a month.
  common_mistake: |
    **The Pitfall:** Calculating battery life based solely on active power, resulting in ~18 hours.
    **The Rationale:** The concept of duty cycling is ignored, treating the MCU as an always-on system.
    **The Consequence:** The design is falsely deemed unfeasible for a battery-powered product.
  napkin_math: |
    * Always-on power: 900 mWh / 50 mW = 18 hours.
    * Duty cycle: 30 ms active per 1000 ms = 3%.
    * Average power: (0.03 × 50 mW) + (0.97 × 0.01 mW) = 1.5 mW + 0.0097 mW ≈ 1.51 mW.
    * Battery life with duty cycling: 900 mWh / 1.51 mW = 596 hours.
    * **596 hours ≈ 24.8 days**. That's a 33× improvement.
