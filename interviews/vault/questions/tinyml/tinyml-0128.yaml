title: The Battery Life Equation
scenario: A Cortex-M4 powered by a 300 mAh coin cell battery at 3.0V operates a gesture recognition system. The MCU draws 50 mW active and 10 µW deep sleep. Inference requires 30 ms and executes once per second.
question: "How long will a 300 mAh 3.0V coin cell power a Cortex-M4 gesture model running 30 ms once per second?"
details:
  realistic_solution: Aggregate the energy integral using strict temporal Duty Cycling percentages. By confining the 50mW active mode to a sparse 3% slice of the system timeline, the micro-power deep sleep mode heavily dilutes the net average power consumption.
  common_mistake: |
    **The Pitfall:** Calculating operational limits via baseline active power metrics alone.
    **The Rationale:** The fundamental concept of Duty Cycling is overlooked, mismodeling the MCU as a monolithic always-on block.
    **The Consequence:** The structural design is falsely mathematically proven impossible for a battery system, killing the project.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Power source: 300 mAh at 3.0V.
       - CPU cycle: 30 ms active (50 mW), 970 ms sleep (0.01 mW).
    2. **Calculations:**
       - Total battery capacity integral: 300 mAh * 3.0V = 900 mWh.
       - Duty cycle logic: 30 ms active per 1000 ms window = 3% active (0.03), 97% sleep (0.97).
       - Weighted average consumption: (0.03 * 50 mW) + (0.97 * 0.01 mW) = 1.5 mW + 0.0097 mW = 1.5097 mW.
       - System lifetime projection: 900 mWh / 1.5097 mW = 596.14 hours.
       - Days: 596.14 / 24 = ~24.8 days.
    3. **Conclusion & Interpretation:**
       - **Result: Duty cycling multiplies the always-on 18-hour baseline into a functional ~25-day lifespan (Power-Bound Optimization).**
