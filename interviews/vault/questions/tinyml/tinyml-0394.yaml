title: The Real-Time Audio Pipeline
scenario: You are building a keyword spotting system on a Cortex-M4 microcontroller. An audio pipeline
  delivers a new frame of data to your model every 10ms. Your model takes 45ms to process a single frame.
details:
  realistic_solution: No, the system is not stable and cannot run in real-time. The time to process one
    frame of data (the "service time") is 45ms, but a new frame arrives every 10ms (the "inter-arrival
    time"). Since the service time is greater than the inter-arrival time, the system accumulates a processing
    debt of 35ms for every frame. The input buffer (queue) will grow continuously until it runs out of
    SRAM, causing frames to be dropped.
  common_mistake: A common mistake is to only compare the inference time (45ms) to the overall application
    deadline (e.g., 500ms for a human to notice), assuming it's acceptable. This ignores the data arrival
    rate. In a streaming system, if you can't process data at least as fast as it arrives, the input queue
    will grow indefinitely, leading to memory exhaustion and missed deadlines.
  napkin_math: The core requirement for a stable real-time system is that the processing time for a single
    item must be less than the arrival time of the next item.
  options:
  - Yes, because the 45ms processing time is well under the typical 500ms application deadline for a keyword.
  - Yes, if you batch 4 frames together, you can process them all at once.
  - No, because the processing time (45ms) is greater than the data arrival interval (10ms).
  - No, because the total latency per frame would be 55ms (45ms + 10ms), which is too high.
  correct_index: 2
