title: The Real-Time Audio Pipeline
scenario: You are building a keyword spotting system on a Cortex-M4 microcontroller. An audio pipeline delivers a new frame of data to your model every 10ms. Your model takes 45ms to process a single frame.
question: Can the audio pipeline run stably in real time when frames arrive every 10 ms but inference takes 45 ms?
details:
  realistic_solution: No, the system is not stable and cannot run in real-time. The time to process one frame of data (the "service time") is 45ms, but a new frame arrives every 10ms (the "inter-arrival time"). Since the service time is greater than the inter-arrival time, the system accumulates a processing debt of 35ms for every frame. The input buffer (queue) will grow continuously until it runs out of SRAM, causing frames to be dropped.
  common_mistake: |
    **The Pitfall:** Only comparing inference time to the overall application deadline.
    **The Rationale:** Candidates assume that because 45ms is less than human perception time (~500ms), the system is fine, ignoring the steady data arrival rate.
    **The Consequence:** The input queue grows indefinitely, causing memory exhaustion and system crashes.
  napkin_math: |
    - **Service Time:** 45 ms.
    - **Inter-arrival Time:** 10 ms.
    - **Debt per Frame:** 45 ms - 10 ms = 35 ms.
    - **Result:** Service Time > Inter-arrival Time (45ms > 10ms), system is **unstable**.
  options:
  - Yes, because the 45ms processing time is well under the typical 500ms application deadline for a keyword.
  - Yes, if you batch 4 frames together, you can process them all at once.
  - No, because the processing time (45ms) is greater than the data arrival interval (10ms).
  - No, because the total latency per frame would be 55ms (45ms + 10ms), which is too high.
  correct_index: 2
