title: The Sensor ODR Aliasing
scenario: Your ML model detects motor bearing faults by looking for a high-frequency vibration spike at 400 Hz. You configure your IMU sensor's Output Data Rate (ODR) to 500 Hz to save power. You collect the data, run an FFT, and the ML model completely fails to see the 400 Hz spike, instead seeing a massive anomaly at 100 Hz.
question: Why did 400 Hz become 100 Hz?
details:
  realistic_solution: 'Nyquist-Shannon aliasing. The 500Hz ODR gives a Nyquist limit of 250Hz. The 400Hz signal aliases to |500 - 400| = 100Hz, creating a phantom peak. Fix: set ODR to at least 2x the highest frequency of interest (800Hz minimum) or configure an anti-aliasing filter cutoff below Nyquist.'
  common_mistake: |
    **The Pitfall:** Blaming the FFT math.
    **The Rationale:** Candidates often assume signal processing algorithms are at fault rather than understanding physical sampling limitations.
    **The Consequence:** Wasted engineering time debugging correct FFT code while the input data remains fundamentally compromised by aliasing.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Sensor ODR: 500 Hz.
       - Target Signal: 400 Hz.
    2. **Calculations:**
       - Nyquist Limit = 500 Hz / 2 = 250 Hz.
       - Aliased Frequency = |500 - 400| = 100 Hz.
    3. **Conclusion & Interpretation:**
       - **Result: Data-Bound.** The system is completely blind to any 400 Hz vibration, mapping it directly to 100 Hz.
