title: The Depthwise Separable Memory Diet (tinyml-0331)
scenario: You're building a keyword-spotting model for a Cortex-M4 microcontroller with 256KB of SRAM. A standard 2D convolutional layer in your model has an input feature map of 16x16 with 32 channels, and it produces an output of 64 channels using a 3x3 kernel. All parameters are stored in INT8 precision.
question: How much INT8 parameter memory does a 3x3, 32-input, 64-output standard convolution require?
details:
  realistic_solution: The standard convolutional layer performs a single operation that jointly processes spatial and cross-channel correlations. Its parameter cost is the product of the kernel dimensions, input channels, and output channels.
  common_mistake: |
    **The Pitfall:** Confusing parameter memory cost with activation memory cost, or calculating the depthwise separable replacement instead of the original layer.
    **The Rationale:** Candidates might jump ahead to the optimization step or confuse weights with the dynamic memory footprint of the tensor arena.
    **The Consequence:** Selecting the wrong memory footprint, which can skew subsequent arena planning and hardware selection.
  napkin_math: |
    1. **Parameter Formula:** Kernel Height * Kernel Width * Input Channels * Output Channels.
    2. **Standard Conv Params:** 3 * 3 * 32 * 64 = 18,432 parameters.
    3. **Memory Storage:** 18,432 parameters * 1 byte/param (INT8) = 18,432 bytes.
    4. **Result:** The parameter memory required is exactly 18,432 bytes, or **18.0 KB**.
  options:
  - ~2.3 KB
  - ~8.2 KB
  - ~18.0 KB
  - 288 Bytes
  correct_index: 2
