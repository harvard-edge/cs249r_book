title: 'TinyML Stream Processing on STM32F4: Anomaly Detection Bottlenecks'
scenario: A TinyML vibration monitoring system is deployed using an ARM Cortex-M4 STM32F4 microcontroller (168 MHz CPU, 256 KB SRAM, no FPU). It samples 3-axis, 16-bit accelerometer data at 1 kHz, requiring real-time processing for anomaly detection. Initially, a simple FFT-based algorithm runs effectively. However, when the team attempts to deploy a more sophisticated, lightweight neural network (e.g., a small CNN with ~50k parameters) for enhanced anomaly detection, they observe significant data processing delays, increased latency, and occasional dropped data packets. The system fails to maintain real-time ingestion requirements.
question: Why does moving from FFT to a small CNN break real-time STM32F4 vibration ingestion despite only 6 KB/s raw data?
details:
  realistic_solution: 1. **Aggressive Model Quantization & Pruning:** Convert the neural network to 8-bit or even 4-bit integer weights and activations. Apply pruning techniques to reduce model size and complexity, ensuring the model fits within the 256 KB SRAM and uses only integer operations. 2. **Optimized Inference Engine:** Utilize highly optimized TinyML inference frameworks like TensorFlow Lite for Microcontrollers (TFLu) with specific build flags to leverage CMSIS-NN libraries, which provide hand-optimized integer kernels for ARM Cortex-M processors. 3. **Efficient Data Buffering:** Implement circular buffers for sensor data to manage memory efficiently and ensure continuous data ingestion without drops. Process data in small, fixed-size windows that can be inferred within the sampling interval. 4. **Algorithm Simplification:** Re-evaluate the neural network architecture for further simplification, potentially exploring simpler machine learning models that are inherently less resource-intensive.
  common_mistake: |
    **The Pitfall:** Overlooking the penalty of software-emulated floating-point math on CPUs without an FPU.
    **The Rationale:** Engineers familiar with cloud or mobile environments assume floating-point math is "fast enough" and underestimate the memory footprint of lightweight networks.
    **The Consequence:** Deploying a model that runs orders of magnitude slower than expected, breaking real-time constraints and corrupting the continuous sensor stream.
  napkin_math: |
    1. **Raw Sensor Data Rate:** 3 axes * 2 bytes/sample * 1000 samples/sec = 6 KB/s.
    2. **Memory Constraint:** A lightweight CNN with 50k parameters in 32-bit floats takes 200 KB. Out of 256 KB total SRAM, this leaves only 56 KB for activations and system overhead (insufficient).
    3. **Compute Emulation Penalty:** The STM32F4 lacks an FPU. Software-emulated floating-point MACs take ~10-20 CPU cycles.
    4. **Latency Check:** For 10 million MACs at 10 cycles/MAC on a 168 MHz CPU: (10^7 * 10) / 168,000,000 = ~0.595 seconds.
    5. **Result:** The ~0.6s latency massively exceeds the 1 ms deadline for real-time 1 kHz ingestion, leading to **severe dropped data packets**.
