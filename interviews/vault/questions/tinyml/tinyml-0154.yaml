validation_issues:
- The 'Realistic Solution' states that CMSIS-NN uses two SMLAD instructions (2 cycles) to compute 4 MACs,
  yielding 2 MACs/cycle. However, the 'Napkin Math' calculates throughput as 168M * 2 = 336 MMAC/s, which
  implies 2 MACs/cycle, matching the 'Realistic Solution'. The speedup calculation of 10x in 'Napkin Math'
  over a naive C implementation is correct based on the stated throughputs, but the exact mechanism of
  'two SMLAD instructions (taking 2 cycles) to compute 4 MACs' needs to be more clearly explained to consistently
  arrive at 2 MACs/cycle. SMLAD performs 2x16-bit MACs per cycle. To get 4x8-bit MACs effectively, it's
  typically packing 4x8-bit into 2x16-bit, and doing two 16-bit MACs in one cycle (SMLAD instruction).
  If two SMLAD instructions are used, it would be 4 cycles for 4 MACs, which is 1 MAC/cycle. This contradicts
  the 2 MACs/cycle stated. It should be 4 MACs in 2 cycles (2 MACs/cycle).
