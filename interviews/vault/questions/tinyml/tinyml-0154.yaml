title: 'The CMSIS-NN SIMD Dividend: MCU Compute Constraints'
scenario: You're optimizing a 2D convolution for a keyword spotting model on a Cortex-M4 MCU. The core of the operation is a multiply-accumulate (MAC) loop over 8-bit quantized weights and activations. A naive C implementation performs one 8-bit MAC operation at a time.
question: How much theoretical performance improvement would you expect by replacing naive C with CMSIS-NN SIMD intrinsics?
details:
  realistic_solution: A Cortex-M4 CPU with its DSP extension features a 32-bit `SMLAD` (Signed Multiply Accumulate Dual) instruction, which performs two 16-bit MAC operations in a single cycle. CMSIS-NN expands 8-bit values into 16-bit, and uses `SMLAD` instructions (taking 1 cycle each) to compute 2 MACs per instruction, yielding 2 MACs/cycle. When combined with loop unrolling and optimized memory loads, this specialized intrinsic pipeline achieves a roughly 10x speedup over a naive C implementation which takes multiple cycles per MAC.
  common_mistake: |
    **The Pitfall:** Assuming a modern compiler's auto-vectorization is just as effective as hand-optimized intrinsics.
    **The Rationale:** Confusing desktop/server compiler capabilities with the reality of embedded compilers targeting specific MCU architectures like ARM DSP extensions.
    **The Consequence:** Leaving massive performance on the table (often ~10x) by relying on naive C loops instead of CMSIS-NN.
  napkin_math: |
    1. **Naive Baseline:** 1 MAC per ~5 cycles = 33.6 MMAC/s @ 168 MHz.
    2. **SIMD Intrinsics:** SMLAD does 2 INT16 MACs per cycle. CMSIS-NN uses this to achieve ~2 INT8 MACs/cycle.
    3. **Optimized Throughput:** 168 MHz * 2 = 336 MMAC/s.
    4. **Speedup:** 336 / 33.6 = **10x**.
    5. **Bandwidth Efficiency:** Naive utilizes ~20% of SRAM bandwidth. CMSIS-NN loads 32-bit words, utilizing ~60%, avoiding memory starvation.
  options:
  - Roughly 1x, a modern compiler's auto-vectorization is just as effective.
  - Roughly 2x speedup.
  - Roughly 4x speedup.
  - Roughly 10x speedup.
  correct_index: 3
