title: 'The CMSIS-NN SIMD Dividend: MCU Compute Constraints'
scenario: You're optimizing a 2D convolution for a keyword spotting model on a Cortex-M4 MCU. The core
  of the operation is a multiply-accumulate (MAC) loop over 8-bit quantized weights and activations. A
  naive C implementation performs one 8-bit MAC operation at a time. Explain the theoretical performance
  improvement you'd expect by replacing this with a hand-optimized version using CMSIS-NN SIMD intrinsics.
details:
  realistic_solution: A Cortex-M4 CPU with its DSP extension features a 32-bit `SMLAD` (Signed Multiply
    Accumulate Dual) instruction, which performs two 16-bit MAC operations in a single cycle. CMSIS-NN
    expands 8-bit values into 16-bit, and uses two `SMLAD` instructions (taking 2 cycles) to compute 4
    MACs, yielding 2 MACs/cycle. When combined with loop unrolling and optimized memory loads, this specialized
    intrinsic pipeline achieves a roughly 4x speedup over a naive C implementation.
  common_mistake: Engineers often confuse the SIMD capabilities for different bit widths (e.g., 16-bit
    vs. 8-bit) or underestimate the impact of specialized libraries like CMSIS-NN, assuming a modern compiler
    can achieve similar results with auto-vectorization (which is often not the case for these specific
    MCU architectures).
  napkin_math: 'Cortex-M4 at 168 MHz with DSP extension. Baseline (naive C): 1 MAC per 4-5 cycles (load,
    multiply, accumulate, store, loop). Throughput: 168M / 5 = 33.6 MMAC/s. CMSIS-NN with SMLAD: 2 INT16
    MACs per cycle. Pack two INT8 values into INT16 operands. Throughput: 168M * 2 = 336 MMAC/s (10x over
    naive). For 3x3 conv (64 in, 64 out, 32x32): MACs = 9 * 64 * 64 * 32 * 32 = 37.7M. Naive C: 37.7M
    / 33.6M = 1,123 ms. CMSIS-NN: 37.7M / 336M = 112 ms. Speedup: 10x. Memory: naive loads 1 byte at a
    time. CMSIS-NN loads 4 bytes (32-bit word), processes 2 MACs, halving memory transactions. SRAM bandwidth
    at 168 MHz * 32-bit = 672 MB/s. Naive utilizes ~20% (134 MB/s). CMSIS-NN utilizes ~60% (403 MB/s).'
  options:
  - Roughly 1x, a modern compiler's auto-vectorization is just as effective.
  - Roughly 2x speedup.
  - Roughly 4x speedup.
  - Roughly 8x speedup.
  correct_index: 2
