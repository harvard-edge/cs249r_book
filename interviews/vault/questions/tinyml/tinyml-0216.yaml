title: 'The TCO of TinyML: On-Device vs. Cloud Power'
scenario: >
  You are designing a battery-powered vibration sensor and must compare a TinyML approach against a Cloud approach over a 60-second cycle.
  TinyML uses 10 mW for 1s of active inference, sleeping at 10 μW for 59s.
  The Cloud approach transmits via radio at 200 mW for 5s, sleeping at 10 μW for 55s.
question: What are the average power draws of the TinyML and cloud approaches over the 60-second cycle?
details:
  realistic_solution: |
    Calculate the total energy used in one 60-second cycle and divide by the cycle time to find the average power. The cloud approach's high-power radio, even though active for only 5 seconds, heavily dominates the energy budget, resulting in a much higher average power draw compared to the ultra-low-power sleep state that characterizes the TinyML approach.
  common_mistake: |
    **The Pitfall:** Comparing only the peak active power draws (200 mW vs 10 mW) and concluding a 20x difference.
    **The Rationale:** Engineers often ignore the crucial impact of the duty cycle over time.
    **The Consequence:** Average power is miscalculated, leading to completely incorrect battery life and TCO projections.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 60-second cycle.
       - TinyML: 10 mW for 1s, 10 μW for 59s.
       - Cloud: 200 mW for 5s, 10 μW for 55s.
    2. **Calculations:**
       - TinyML Active Energy: 10 mW * 1s = 10,000 μJ.
       - TinyML Sleep Energy: 10 μW * 59s = 590 μJ.
       - TinyML Avg Power: (10,000 + 590) μJ / 60s = 176.5 μW (~0.18 mW).
       - Cloud Active Energy: 200 mW * 5s = 1,000,000 μJ.
       - Cloud Sleep Energy: 10 μW * 55s = 550 μJ.
       - Cloud Avg Power: (1,000,000 + 550) μJ / 60s = 16,675.8 μW (~16.7 mW).
    3. **Conclusion & Interpretation:** Cloud draws ~16.7 mW vs TinyML's ~0.18 mW. **Result: Radio Power-Bound (~94x higher avg power)**.
  options:
  - Cloud peak power is 200 mW and TinyML is 10 mW, so it uses 20x more power.
  - The TinyML device uses about 10 mW on average because the sleep power is negligible.
  - Cloud uses ~16.7 mW and TinyML uses ~0.18 mW, a difference of nearly 100x.
  - Both are in the low mW range; the power difference is not significant for TCO.
  correct_index: 2
