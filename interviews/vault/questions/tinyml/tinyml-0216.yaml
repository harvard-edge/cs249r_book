title: 'The TCO of TinyML: On-Device vs. Cloud Power'
scenario: You are designing a battery-powered vibration sensor for a factory floor. You need to compare the long-term TCO of two approaches. The TinyML approach uses an MCU drawing 10 mW for 1s of active inference, and 10 µW during its 59s sleep phase. The Cloud approach wakes up to sample and transmit data using a radio drawing 200 mW for 5 seconds, and sleeps at 10 µW for 55 seconds. Both run on a 60-second cycle.
question: What are the average power draws of the TinyML and cloud approaches over the 60-second cycle?
details:
  realistic_solution: The correct method is to calculate the total energy used in one 60-second cycle and then divide by the cycle time to find the average power. The cloud approach's high-power radio, even though active for only 5 seconds, dominates the energy budget, resulting in a much higher average power draw compared to the ultra-low-power sleep state that characterizes the TinyML approach.
  common_mistake: |
    **The Pitfall:** Comparing only the peak active power draws.
    **The Rationale:** Engineers often compare peak power draws (200 mW vs 10 mW) and conclude it's a 20x difference, ignoring the crucial impact of the duty cycle.
    **The Consequence:** Average power is miscalculated, leading to completely incorrect battery life and TCO projections.
  napkin_math: |
    1. TinyML active energy: 10 mW * 1s = 10,000 µJ.
    2. TinyML sleep energy: 10 µW * 59s = 590 µJ.
    3. TinyML average power: (10,000 + 590) µJ / 60s = 176.5 µW (**~0.18 mW**).
    4. Cloud active energy: 200 mW * 5s = 1,000,000 µJ.
    5. Cloud sleep energy: 10 µW * 55s = 550 µJ.
    6. Cloud average power: (1,000,000 + 550) µJ / 60s = 16,675.8 µW (**~16.7 mW**).
    7. Comparison: Cloud approach draws ~16.7 mW, while TinyML draws ~0.18 mW, a **~94x average power difference**.
  options:
  - Cloud peak power is 200 mW and TinyML is 10 mW, so it uses 20x more power.
  - The TinyML device uses about 10 mW on average because the sleep power is negligible.
  - Cloud uses ~16.7 mW and TinyML uses ~0.18 mW, a difference of nearly 100x.
  - Both are in the low mW range; the power difference is not significant for TCO.
  correct_index: 2
