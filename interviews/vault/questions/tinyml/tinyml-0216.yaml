title: 'The TCO of TinyML: On-Device vs. Cloud Power'
scenario: You are designing a battery-powered vibration sensor for a factory floor. You need to compare
  the long-term TCO of two approaches. Let's start with power consumption, which dictates battery life.
  The TinyML approach uses an MCU drawing 10 mW for 1s of active inference, and 10 µW during its 59s sleep
  phase. The Cloud approach wakes up to sample and transmit data using a radio drawing 200 mW for 5 seconds,
  and sleeps at 10 µW for 55 seconds. Both run on a 60-second cycle.
question: "What are the average power draws of the TinyML and cloud approaches over the 60-second cycle?"
details:
  realistic_solution: The correct method is to calculate the total energy used in one 60-second cycle
    and then divide by the cycle time to find the average power. The cloud approach's high-power radio,
    even though active for only 5 seconds, dominates the energy budget, resulting in a much higher average
    power draw compared to the ultra-low-power sleep state that characterizes the TinyML approach.
  common_mistake: Engineers often compare peak power draws (200 mW vs 10 mW) and conclude it's a 20x difference.
    This ignores the crucial impact of the duty cycle—how *long* each component is active. Average power,
    not peak power, determines battery life and therefore TCO.
  napkin_math: 'TinyML device cycle (60s total): Active energy = 10 mW * 1s = 10,000 µJ. Sleep energy
    = 10 µW * 59s = 590 µJ. Total energy per minute = 10,590 µJ. Average Power = 10,590 µJ / 60s = 176.5
    µW (0.176 mW). A standard 15,000 Joule D-cell battery will last: 15,000 J / 0.0001765 W = ~84.9 million
    seconds = ~2.7 years before needing replacement.'
  options:
  - Cloud peak power is 200 mW and TinyML is 10 mW, so it uses 20x more power.
  - The TinyML device uses about 10 mW on average because the sleep power is negligible.
  - Cloud uses ~16.7 mW and TinyML uses ~0.18 mW, a difference of nearly 100x.
  - Both are in the low mW range; the power difference is not significant for TCO.
  correct_index: 2
