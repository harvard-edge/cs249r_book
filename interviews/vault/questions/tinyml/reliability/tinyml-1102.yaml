title: Shared SRAM Contention Side-Channel
scenario: 'A secure biometric system runs on an ARM Cortex-M7 + Ethos-U55 (Corstone-300). Security researchers extracted the model structure without physical access. The M7 runs an unprivileged telemetry task, and the Ethos-U55 shares the 512 KB SRAM with the M7.'
question: 'How can an unprivileged M7 telemetry task extract model structure from Ethos-U55 SRAM contention?'
details:
  realistic_solution: 'The root cause is a bus-contention timing side-channel attack. The unprivileged M7 telemetry task continuously performs reads from the shared 512 KB SRAM and measures its own read latency. Because the Ethos-U55 NPU and M7 share the same memory interconnect, the U55 heavy burst accesses cause bus arbitration stalls for the M7. By profiling the M7 memory read latencies, the attacker creates a precise execution trace of the U55.'
  common_mistake: |
    **The Pitfall:** Assuming model extraction requires a software memory leak or physical DPA equipment.
    **The Rationale:** Candidates overlook microarchitectural timing side-channels caused by shared on-chip hardware resources.
    **The Consequence:** They implement software bounds-checking but leave the hardware timing vulnerability wide open.
  napkin_math: |
    **Assumptions & Constraints:**
    - M7 clock: 480 MHz (2.08 ns/cycle).
    - Idle M7 SRAM read: 1 cycle (2.08 ns).
    - Saturated bus (Ethos-U55 bursting): M7 read stalls up to 4 cycles (8.32 ns).

    **Calculations:**
    - Timing a loop of 10,000 reads: Idle takes ~20.8 µs; Saturated takes ~83.2 µs.
    - Delta = 83.2 µs - 20.8 µs = 62.4 µs.

    **Conclusion & Interpretation:**
    - **Result: 62.4 µs delta ([Memory-Bound])**. The easily measurable 62.4 µs delta provides a high-resolution trace of NPU layer execution.
