title: Watchdog Resets in Dual-Core Shared SRAM Inference
scenario: >
  A safety-critical anomaly detection model runs on the 128 MHz app core of a Nordic nRF5340, while the 64 MHz net core handles BLE 5.3.
  A hardware watchdog timer (WDT) requires petting every 50ms. Inference takes 38ms using the 256 KB shared SRAM.
  When the net core transmits a maximum-length BLE packet, it locks the shared SRAM bus for exactly 14ms.
question: How would you analyze why the device experiences intermittent watchdog resets during these network events?
details:
  realistic_solution: |
    The dual-core architecture relies on a shared SRAM matrix. When the net core locks the memory bus for a high-priority BLE transmission, the app core is forced to stall waiting for memory access. The total execution time for the inference loop becomes the sum of the compute time and the memory stall time. Because the combined time exceeds the strict watchdog limit, the WDT triggers a safety reset. The system must be re-architected to either pet the watchdog asynchronously or partition the SRAM to avoid bus contention.
  common_mistake: |
    **The Pitfall:** Assuming physically separate cores execute completely independently without resource contention.
    **The Rationale:** Candidates overlook shared bus arbitration and wrongly attribute resets to electrical issues like power droop.
    **The Consequence:** The timing delay from shared memory bus lock is ignored, leading to persistent WDT resets in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - WDT timeout: 50 ms.
    - Base inference time: 38 ms.
    - SRAM bus lock time: 14 ms.

    **Calculations:**
    - Worst-Case Execution Time (WCET) = Base compute + Stall time.
    - WCET = 38 ms + 14 ms = 52 ms.
    - Timing violation = 52 ms - 50 ms = +2 ms.

    **Conclusion & Interpretation:**
    - **Result: Memory Bus Contention (Hardware Reset)**. The inference loop misses the 50ms deadline.
