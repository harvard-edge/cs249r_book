title: Secure Wake-Word Pipeline Design for nRF5340
scenario: You are specifying a continuous wake-word detection pipeline for a security-critical smart badge using the Nordic nRF5340. The system must defend against adversarial audio replay attacks (spoofing) where unauthorized users play recorded commands. You must design an inference specification that provides robust spoofing defense while strictly adhering to the nRF5340 memory and power limits.
question: How should you specify a secure nRF5340 wake-word pipeline that defends against replay attacks within SRAM, flash, and power limits?
details:
  realistic_solution: 'The system should use a cascaded approach: an ultra-lightweight INT8 CNN for initial wake-word detection, followed by a secondary lightweight classifier (like an SVM or Decision Tree) analyzing acoustic artifacts (e.g., high-frequency roll-off from speaker playback). The audio buffer and both models must be carefully sized. The BLE 5.3 radio should only transmit authenticated command events, keeping the 64 MHz net core asleep most of the time.'
  common_mistake: |
    **The Pitfall:** Proposing complex, deep-learning-based anti-spoofing models or cloud streaming over BLE.
    **The Rationale:** Candidates default to resource-heavy cloud paradigms, ignoring the immediate SRAM overflow or the devastating impact of continuous radio transmission on battery life.
    **The Consequence:** A specification that either instantly crashes due to OOM or drains the wearable's battery in hours instead of days.
  napkin_math: |
    **Assumptions & Constraints:**
    - nRF5340: 128 MHz app core, 256 KB SRAM, ~5mA active limit. 1s 16kHz 16-bit audio buffer.

    **Calculations:**
    - Audio buffer = 16,000 * 2 bytes = 32 KB. Wake-word CNN = ~64 KB. SVM = ~10 KB. Scratchpad = ~20 KB. Total SRAM = 32 + 64 + 10 + 20 = 126 KB. 5M MACs at 128 MHz takes ~40 ms.

    **Conclusion & Interpretation:**
    - **Result: 126 KB SRAM usage fits within 256 KB limit while meeting 5mA peak (Capacity-Bound Safety Design)**.
