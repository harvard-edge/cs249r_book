title: The Watchdog Boot Loop Catastrophe
scenario: You manage a fleet of 1 million in-cabin automotive sensors that use a microcontroller to detect driver drowsiness. Each device has a 2-second hardware watchdog timer. After a successful OTA model update, 0.5% of devices drop offline and briefly reappear every ~2 seconds continuously. A junior engineer suggests pushing an OTA to increase the watchdog timeout to 3 seconds because the new model might be slightly slower.
question: Why is the proposal to lengthen the watchdog timeout likely wrong, what is the probable root cause of the failure, and what catastrophic, non-linear fleet behavior is this masking?
details:
  realistic_solution: 'Critique: The proposal to lengthen the timeout is a dangerous patch, not a fix. It increases the time-to-recovery for actual hangs and masks the real problem. The watchdog is not failing; it is doing its job after the OTA update introduced a boot-time crash or hang before the application can reliably pet the watchdog. The probable root cause is an update-specific startup or model initialization path that wedges the device, not a model that is merely 1 second slower. The catastrophic fleet behavior is a synchronized reboot loop: thousands of devices repeatedly reconnect, drop offline, and drain batteries while making the outage look intermittent instead of permanent. The fix is a boot counter in RTC RAM or retained state that detects rapid reboots, rolls back the OTA image, and enters a safe mode.'
  common_mistake: |
    **The Pitfall:** Focusing on the software execution time in isolation and assuming the model is simply "slow."
    **The Rationale:** Engineers without embedded experience view the watchdog as a simple timeout mechanism rather than a critical state-machine safeguard.
    **The Consequence:** Lengthening the timeout fails to fix the crashing devices and exacerbates battery drain.
  napkin_math: |
    **Assumptions & Constraints:**
    - Watchdog period: 2 seconds.
    - Normal battery life: ~281 days (675mWh / 0.1mW).
    - Failed cohort: 0.5% of 1,000,000 devices = 5,000 devices.
    - Reboot loop: one failed boot every 2 seconds.
    - Example active time during boot/reconnect: 700ms per 2s.
    - Active power: 100mW.

    **Calculations:**
    - Fleet reconnect storm: 5,000 devices / 2s = 2,500 reconnect attempts/second.
    - Duty cycle = 700ms / 2000ms = 35%.
    - Average power during loop = 35% * 100mW = 35mW.
    - Boot loop battery life = 675mWh / 35mW = 19.3 hours.

    **Conclusion & Interpretation:**
    - **Result: ~2,500 reconnects/second and <20 hours battery life for affected devices (Fleet-State Failure)**. Lengthening the watchdog masks a reboot-loop state machine failure and turns a small affected percentage into a synchronized service-load and battery-drain problem.
