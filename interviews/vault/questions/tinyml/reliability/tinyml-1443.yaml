title: 'Functional Safety on ESP32-S3: Watchdog & ML Model Integrity for ASIL B'
scenario: You are tasked with designing a safety-critical anomaly detection system for an automotive application, powered by an ESP32-S3 microcontroller (240 MHz dual-core, 512 KB SRAM, 8 MB PSRAM). This system classifies sensor data using a TinyML model. A missed detection or late response can lead to severe consequences, mandating compliance with ISO 26262 ASIL B. The ML inference model has an average execution time of 10ms and a Worst-Case Execution Time (WCET) of 30ms. The overall system reaction time, from sensor input to output decision, must not exceed 100ms.
question: How would you design an ISO 26262 ASIL B compliant functional safety mechanism on an ESP32-S3 for a TinyML model with a 30ms WCET and 100ms system deadline?
details:
  realistic_solution: The watchdog timer should be configured to a value slightly greater than the ML inference model's Worst-Case Execution Time (WCET) plus a safe margin for context switches, interrupts, and other OS overheads. For ASIL B, this margin needs careful justification. The watchdog should be refreshed only upon successful completion of the critical ML inference task. For self-tests, periodic execution of Built-In Self-Tests (BIST) for memory (e.g., CRC checks on model weights in PSRAM) and CPU registers should be employed. For the ML model itself, golden reference input sets with known outputs can be used to verify inference correctness. The dual-core ESP32-S3 can be leveraged by dedicating one core for the primary ML inference and critical safety tasks, while the second core handles less critical tasks and monitors the health/heartbeat of the first core or performs redundant safety checks. Deterministic execution requires isolating the critical ML task on a dedicated core, pinning it to that core, using fixed-priority preemptive scheduling, and minimizing non-deterministic operations (e.g., dynamic memory allocation, non-critical interrupts) during the critical path. Access to shared resources (like PSRAM) must be strictly controlled with high-priority mutexes, with careful analysis to prevent priority inversions.
  common_mistake: Failing to set the watchdog timeout appropriately, either too short (leading to spurious resets) or too long (failing to detect critical task overruns). Not considering the full WCET of the critical path including OS overheads. Implementing self-tests that are insufficient in coverage or execution frequency, or that negatively impact real-time performance. Ignoring potential non-determinism from multi-core interactions, such as cache coherence issues or non-deterministic OS scheduling without proper task pinning and priority management.
  napkin_math: |
    **Assumptions & Constraints:**
    - ML Model WCET: 30ms.
    - System Reaction Deadline: 100ms.
    - OS Overhead Margin: 5ms (derived from RTOS empirical data).

    **Calculations:**
    - Optimal Watchdog Timeout = ML Model WCET + OS Overhead Margin.
    - Timeout = 30ms + 5ms = 35ms.

    **Conclusion & Interpretation:**
    - **Result: 35ms Timeout (Safety-Bound)**. This ensures that any inference task exceeding its WCET+margin triggers a reset well before the 100ms system deadline is breached.
