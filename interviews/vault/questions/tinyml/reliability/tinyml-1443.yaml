title: ESP32-S3 Watchdog and ML Integrity Evidence for ASIL B
scenario: You are tasked with designing a safety-critical anomaly detection system for an automotive application, powered by an ESP32-S3 microcontroller (240 MHz dual-core, 512 KB SRAM, 8 MB PSRAM). This system classifies sensor data using a TinyML model. A missed detection or late response can lead to severe consequences, mandating compliance with ISO 26262 ASIL B. The ML inference model has an average execution time of 10ms and a Worst-Case Execution Time (WCET) of 30ms. The overall system reaction time, from sensor input to output decision, must not exceed 100ms.
question: How would you design ESP32-S3 watchdog and ML integrity checks to support an ISO 26262 ASIL B safety case?
details:
  realistic_solution: |
    The watchdog timer should be derived from the analyzed end-to-end critical path, not only the ML model WCET: sensor handling, preprocessing, inference, postprocessing, interrupt latency, task jitter, and fail-safe actuation must all be bounded against the 100ms deadline. A 45ms inference-task watchdog can be a defensible example only if measurements show the 30ms model WCET plus scheduler and interrupt margins normally completes below that threshold, and a separate system-level deadline monitor covers the full reaction path. The watchdog should be refreshed only upon successful completion of the critical ML inference task. For self-tests, periodic execution of Built-In Self-Tests (BIST) for memory (e.g., CRC checks on model weights in PSRAM) and CPU registers should be employed. For the ML model itself, golden reference input sets with known outputs can be used to verify inference correctness. The dual-core ESP32-S3 can be leveraged by dedicating one core for the primary ML inference and critical safety tasks, while the second core handles less critical tasks and monitors the health/heartbeat of the first core or performs redundant safety checks. These mechanisms support an ASIL B safety case, but do not by themselves establish ISO 26262 compliance. Deterministic execution requires isolating the critical ML task on a dedicated core, pinning it to that core, using fixed-priority preemptive scheduling, and minimizing non-deterministic operations (e.g., dynamic memory allocation, non-critical interrupts) during the critical path. Access to shared resources (like PSRAM) must be strictly controlled with high-priority mutexes, with careful analysis to prevent priority inversions.
  common_mistake: |
    **The Pitfall:** Failing to set the watchdog timeout appropriately, either too short or too long. Not considering the full WCET of the critical path including OS overheads.
    **The Rationale:** Implementing self-tests that are insufficient in coverage or execution frequency, or ignoring potential non-determinism from multi-core interactions, such as cache coherence issues or non-deterministic OS scheduling without proper task pinning and priority management.
    **The Consequence:** This leads to spurious resets, failing to detect critical task overruns, or negatively impacting real-time performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - ML Model WCET: 30ms.
    - System Reaction Deadline: 100ms.
    - Measured scheduler/interrupt/preprocessing margin for the inference task: 5ms.
    - Additional watchdog slack: 10ms to avoid resets from normal jitter while still detecting overruns.
    - A separate end-to-end monitor must cover the full sensor-to-actuator deadline.

    **Calculations:**
    - Minimum normal-completion bound for inference task = ML WCET + measured margin = 30ms + 5ms = 35ms.
    - Watchdog timeout = 35ms + 10ms slack = 45ms.
    - Remaining reaction-time budget after watchdog expiry: 100ms - 45ms = 55ms for reset handling, fail-safe output, or fault signaling.

    **Conclusion & Interpretation:**
    - **Result: 45ms is an example inference-task watchdog derived from a 35ms measured bound plus jitter slack.** It supports timely diagnostic response only when paired with full critical-path timing analysis and documented safety mechanisms for the ASIL B safety case.
