title: The Frozen Sensor Problem
scenario: You have deployed a remote environmental sensor. Its main loop wakes up, takes a sensor reading, and goes back to deep sleep. You are concerned that a rare software bug could cause the device to hang in its 'active' state, draining the battery.
question: What is the standard hardware feature used in microcontrollers to automatically recover from this kind of software freeze?
details:
  realistic_solution: The correct answer is a Watchdog Timer (WDT). A WDT is an independent hardware counter that expects the main application software to periodically 'pet' it. If the software freezes and fails to pet the watchdog within a pre-configured timeout period, the WDT hardware automatically triggers a full system reset, forcing the device to restart from a known-good state.
  common_mistake: |
    **The Pitfall:** Confusing the Watchdog Timer (WDT) with other peripherals like RTCs or regular timers.
    **The Rationale:** Candidates mistakenly believe a regular timer interrupt can save a frozen system, forgetting that if the main program hangs, the ISR itself might be blocked.
    **The Consequence:** The deployed device hangs indefinitely in the field, rapidly draining its battery and requiring a physical truck roll to fix.
  napkin_math: |
    **Assumptions & Constraints:**
    - Battery capacity: 1,000 mAh at 3.7V = 3,700 mWh.
    - Hang drain (no WDT): Active CPU draws 50 mW continuously.

    **Calculations:**
    - Time to drain = 3,700 mWh / 50 mW = 74 hours (3 days).
    - WDT protection: Resets MCU after 5 seconds, burning only 250 mJ before returning to 10 µW sleep.

    **Conclusion & Interpretation:**
    - **Result: 250 mJ (Hardware-Bound)**. Hardware WDT prevents catastrophic energy exhaustion.
  options:
  - A Real-Time Clock (RTC) for scheduling.
  - A Direct Memory Access (DMA) controller.
  - A Watchdog Timer (WDT).
  - A Power Management Unit (PMU).
  correct_index: 2
