title: ESP32-S3 Acoustic Degradation Ladder
scenario: You are designing an always-on acoustic anomaly detection system for industrial machinery running on an ESP32-S3. The primary INT8 CNN uses vector extensions for high-accuracy classification and relies on WiFi to report anomalies. If the WiFi connection drops or the device experiences severe battery drain, the system must continue to provide value.
question: How would you architect a graceful degradation strategy that maintains fail-operational safety monitoring while adapting to constrained resources?
details:
  realistic_solution: 'A robust design uses a degradation ladder. Tier 1 (Normal): Dual-core active, primary CNN utilizing INT8 vector extensions in PSRAM, WiFi reporting. Tier 2 (Network Loss): Cache events in PSRAM, switch to lower-power BLE for proximity alerts. Tier 3 (Critical Power): Shut down the 8 MB PSRAM, WiFi/BLE, and one core. Fallback to a tiny DSP energy-thresholding algorithm or a micro-CNN that fits entirely within the 512 KB SRAM, ensuring the system remains fail-operational for catastrophic anomalies.'
  common_mistake: |
    **The Pitfall:** Suggesting dropping the audio sampling rate or dynamically loading fallback models from flash.
    **The Rationale:** Dropping the sampling rate breaks the acoustic model's expected input shape without retraining, and loading from flash interrupts the real-time audio buffer.
    **The Consequence:** Causing the system to crash or completely miss critical audio events during low-power states.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - ESP32-S3 SRAM: 512 KB.
       - RTOS/DMA buffers: 128 KB.
    2. **Calculations:**
       - Remaining SRAM = 512 KB - 128 KB = 384 KB.
       - Micro-CNN requirement = 150 KB (weights) + 100 KB (activations) = 250 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Fallback**. 250 KB < 384 KB. Micro-CNN safely fits in SRAM to maintain fail-operational state.
