title: Safe Checkpointing for Intermittent Power
scenario: An energy-harvesting Cortex-M4 device experiences sudden power loss. It runs an inference pass taking 2.0s, but power usually lasts only 0.5s to 1.5s. Saving a checkpoint to NVM takes 0.1s.
question: What safe checkpoint interval leaves time for a 0.1s NVM save within the 0.5s worst-case power window?
details:
  realistic_solution: Checkpoints must be saved to non-volatile memory more frequently than the minimum power-on time minus the save overhead. With a 0.5s worst-case power window and 0.1s checkpoint save time, a 0.3s compute interval leaves 0.1s for saving plus 0.1s guard time. This is a safe interval for forward progress across cycles, not a mathematically unique optimum.
  common_mistake: |
    **The Pitfall:** Setting the checkpoint interval equal to the average power duration.
    **The Rationale:** Failing to account for the worst-case minimum bound.
    **The Consequence:** The system fails to guarantee forward progress.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inference total time: 2.0s.
    - Minimum power duration: 0.5s.
    - NVM checkpoint save time: 0.1s.

    **Calculations:**
    - Maximum safe compute interval before checkpointing: 0.5s - 0.1s = 0.4s.
    - Choose 0.3s compute intervals to leave 0.1s guard time: 0.3s + 0.1s save = 0.4s < 0.5s.
    - Number of segments for a 2.0s inference: ceil(2.0s / 0.3s) = 7 checkpoints/segments.

    **Conclusion & Interpretation:**
    - **Result: 0.3s safe interval (Power-Bound)**. The interval fits inside the worst-case power window after checkpoint overhead, enabling forward progress across intermittent power cycles.
