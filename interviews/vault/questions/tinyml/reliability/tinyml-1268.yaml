title: Defining Fail-Safe vs Fail-Operational on nRF5340
scenario: You are deploying a predictive maintenance model on a Nordic nRF5340 microcontroller. The device monitors an industrial motor and transmits alerts via BLE 5.3. When asked about system reliability during a critical sensor failure, you need to retrieve the definitions for fail-safe and fail-operational states in the context of graceful degradation.
question: What is the difference between fail-safe and fail-operational behavior for an nRF5340 predictive maintenance device?
details:
  realistic_solution: Fail-safe means the device detects the failure and transitions to a known safe state, such as suppressing unsafe motor-control outputs and sending a fault alert instead of trusting corrupted sensor data. Fail-operational means the device continues to provide its service after the failure, possibly in a degraded mode such as reduced monitoring coverage or lower-confidence alerts, while still meeting the safety requirements. The distinction is safety shutdown versus continued service; it is not defined by power savings or by a specific nRF5340 core split.
  common_mistake: |
    **The Pitfall:** Confusing fail-safe with fail-operational.
    **The Rationale:** Candidates often assume both terms mean the system continues to perform its primary, heavy ML inference function without interruption.
    **The Consequence:** Designing a system that dangerously attempts to run full inferences on corrupted sensor data instead of either entering a safe state or switching to a validated degraded service mode.
  napkin_math: |
    **Assumptions & Constraints:**
    - Critical sensor failure invalidates the primary predictive-maintenance input.
    - Requirement: avoid unsafe action and preserve a useful alert path if possible.

    **Calculations:**
    - Fail-safe response: mark predictions invalid, suppress unsafe control outputs, and report a fault.
    - Fail-operational response: continue a validated reduced service, such as alert-only monitoring from remaining trustworthy signals.

    **Conclusion & Interpretation:**
    - **Result: definition check (Reliability-Bound).** Fail-safe prioritizes reaching a safe state after failure; fail-operational prioritizes continuing service in a controlled degraded mode.
