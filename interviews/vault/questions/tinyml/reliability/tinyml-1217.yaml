title: Audio Model Degradation Ladder on Cortex-M4
scenario: >
  An always-on audio pipeline on an STM32F4 (168 MHz) has a strict 50ms inference deadline.
  During heavy RTOS network activity, the primary 10M INT8 MAC model is preempted and drops frames.
question: How should the Cortex-M4 audio pipeline shed work when RTOS network activity leaves too few cycles for the primary model?
details:
  realistic_solution: |
    Implement a quality-of-service shedding degradation ladder where a secondary, lightweight 2M MAC keyword-only model is kept resident in the 1 MB internal flash alongside the primary model. When the RTOS monitors high CPU utilization from the network stack, the ML pipeline skips the acoustic scene classification and routes data only to the lightweight model. This ensures the critical wake-word detection remains fail-operational while respecting the reduced compute slice.
  common_mistake: |
    **The Pitfall:** Suggesting dynamic frequency scaling (DVFS) or dynamically paging model weights from external flash to save SRAM.
    **The Rationale:** Candidates apply cloud or mobile concepts, failing to recognize MCU hardware limits on paging and DVFS cycle utility.
    **The Consequence:** Proposed solutions are unviable and fail to guarantee latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Deadline: 50 ms. Total cycles at 168 MHz: 8.4M cycles.
    - Primary Model: 10M MACs (takes ~5M cycles).

    **Calculations:**
    - Network Interrupts take 60% CPU = 5.04M cycles.
    - Remaining for ML: 8.4M - 5.04M = 3.36M cycles.
    - Primary model (5M cycles) > Available (3.36M) -> Misses deadline.
    - Fallback Model: 2M MACs = ~1M cycles.
    - Fallback margin: 3.36M - 1M = +2.36M cycles.

    **Conclusion & Interpretation:**
    - **Result: Compute-Cycle-Bound**. The fallback model safely executes within the remaining cycle budget.
