title: Adversarial Detection Latency on Cortex-M4
scenario: You implement a lightweight INT8 autoencoder anomaly detector requiring exactly 336,000 INT8 MAC operations per audio frame on a 168 MHz Cortex-M4.
question: "What theoretical latency does a 336k-MAC INT8 adversarial detector add on Cortex-M4 with CMSIS-NN SIMD?"
details:
  realistic_solution: Determine ideal physical execution time by dividing the total structural INT8 MAC operations by the processor's SIMD pipeline throughput (2 MACs/cycle), and then scaling by the clock frequency.
  common_mistake: |
    **The Pitfall:** Assuming 1 cycle per MAC for latency calculations.
    **The Rationale:** Candidates forget that Cortex-M4 supports DSP SIMD extensions that pack sub-word execution.
    **The Consequence:** Their latency calculation is precisely twice as long as the true theoretical minimum, skewing real-time system planning.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Operations: 336,000 INT8 MACs.
       - Clock speed: 168 MHz.
       - CMSIS-NN SIMD throughput: 2 INT8 MACs / cycle.
    2. **Calculations:**
       - Required clock cycles: 336,000 MACs / 2 MACs/cycle = 168,000 cycles.
       - Latency: 168,000 cycles / 168,000,000 Hz = 0.001 seconds (1.0 ms).
    3. **Conclusion & Interpretation:**
       - **Result: The defense adds a theoretical minimum latency of 1.0 ms (Compute-Bound).**
