title: The Debug Interface Profiling Trap
scenario: 'You''re profiling your ML inference on a Cortex-M4 using the SWD (Serial Wire Debug) interface and a Segger J-Link. Your profiler reports inference takes 42 ms. You disconnect the debugger, add GPIO toggle pins around the inference call, and measure with an oscilloscope: 28 ms.'
question: Why does the debugger add 14 ms to your inference?
details:
  realistic_solution: 'The profiler is adding 14 ms of observer overhead: 42 ms measured through the debugger minus 28 ms measured with GPIO timing. The SWD connection is not changing the CPU clock; intrusive trace, sampling, semihosting, or breakpoint/debug instrumentation can stall execution or consume bus cycles while profiling. Fix the measurement by timing with the DWT CYCCNT hardware cycle counter when available, or with a minimally intrusive GPIO toggle around the inference call.'
  common_mistake: |
    **The Pitfall:** Believing the SWD interface slows down the CPU clock.
    **The Rationale:** Developers observe code running slower with a debugger attached and incorrectly conclude the CPU clock frequency itself is altered.
    **The Consequence:** Engineers mistrust the hardware or attempt to compensate for non-existent clock issues instead of properly disabling intrusive trace macrocells.
  napkin_math: |
    **Assumptions & Constraints:**
    - Oscilloscope true inference: 28 ms.
    - Profiled inference: 42 ms.
    - Debugger overhead is the difference between profiled and external timing.

    **Calculations:**
    - Debugger overhead: 42 ms - 28 ms = 14 ms.
    - Relative overhead: 14 ms / 28 ms = 50% extra time versus the minimally instrumented measurement.

    **Conclusion & Interpretation:**
    - **Result: 14 ms observer overhead.** The debug/profiling instrumentation perturbs timing; it is not evidence that the CPU clock slowed down.
