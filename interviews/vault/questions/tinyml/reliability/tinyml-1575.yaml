title: TinyML Voltage Reset Uptime
scenario: 'A TinyML board resets periodically due to voltage drops. Following a reset, the Recovery Time Objective (RTO) dictates a 2-second boot sequence to load its 500KB model from flash into SRAM before it can operate.'
question: 'What is the system''s operational availability percentage over a 24-hour period if it experiences exactly 30 resets?'
visual:
  kind: svg
  path: tinyml-1575.svg
  alt: A timeline depicting continuous uptime interrupted by brief 2-second dropouts labeled as RTO.
  caption: Reset Downtime Model
details:
  realistic_solution: 'There are 30 resets, each incurring a 2-second RTO downtime. Total downtime is 30 * 2 = 60 seconds. A full 24-hour day contains 24 * 60 * 60 = 86,400 seconds. Total uptime is 86,400 - 60 = 86,340 seconds. Availability is 86,340 / 86,400 = 99.93%.'
  common_mistake: |
    **The Pitfall:** Calculating downtime as 30 / 86400 directly without multiplying by the 2-second RTO duration.
    **The Rationale:** Candidates confuse the frequency of events with the cumulative duration of those events.
    **The Consequence:** The actual system unavailability is drastically underestimated.
  napkin_math: |
    **Assumptions & Constraints:**
    - 30 reset events in 24 hours.
    - 2-second RTO (downtime per event).

    **Calculations:**
    - Total downtime = 30 resets * 2 seconds/reset = 60 seconds.
    - Total time in 24 hours = 24 * 60 * 60 = 86,400 seconds.
    - Uptime = 86,400 - 60 = 86,340 seconds.
    - Availability = 86,340 / 86,400 = 0.999305.

    **Conclusion & Interpretation:**
    - **Result: 99.93% Availability (Reliability-Bound)**. Frequent resets significantly impact system uptime due to slow SRAM loading from flash.
