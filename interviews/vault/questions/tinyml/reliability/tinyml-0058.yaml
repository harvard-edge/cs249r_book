title: The Offline Drift Detector
scenario: Your deployed anomaly detector starts producing false positives after 3 months. The device has no cloud connection — it operates fully offline.
question: How do you detect and handle model drift on a device with 256 KB SRAM and no internet?
details:
  realistic_solution: 'On-device drift detection with minimal resources: Running statistics: 64 bytes RAM. Golden references: 5 KB flash. Hourly self-test: 10 inferences x 50ms = 500ms per hour = 0.014% CPU overhead. Drift detection latency: 1 hour (self-test interval). Storage for drift log: 20 bytes per event x 100 events = 2 KB flash. Total resource cost: 64 bytes RAM + 7 KB flash — negligible on a 256 KB SRAM / 1 MB flash device.'
  common_mistake: |
    **The Pitfall:** Assuming data must be uploaded to the cloud for analysis.
    **The Rationale:** Cloud-native MLOps heavily relies on shipping logs to remote servers for data drift detection via heavy statistical metrics.
    **The Consequence:** Proposing an impossible architecture for an offline device, failing the deployment requirements.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory Overhead: Running stats = 64 bytes RAM. Golden references = 5 KB Flash. Drift log (20 bytes * 100 events) = 2 KB Flash.
    - Compute Overhead: 10 inferences per hour * 50 ms = 500 ms per hour.

    **Calculations:**
    - Total Storage Cost: 64 bytes SRAM + 7 KB Flash.
    - CPU Load: 500 ms / 3,600,000 ms = 0.000138 (0.014%).

    **Conclusion & Interpretation:**
    - **Result: < 0.1% CPU (Compute-Bound)**. The approach proves completely viable, requiring < 0.1% CPU and trivial memory footprint.
