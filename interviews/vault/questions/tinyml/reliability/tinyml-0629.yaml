title: The Fault-Tolerant Battery Killer
scenario: You're designing a remote agricultural sensor that adapts its calibration model on-device. To
  ensure fault tolerance, you checkpoint the 256KB model to the device's internal flash memory after every
  50 inferences. The device performs one inference per minute. Your power budget calculations projected
  a 14-day battery life, but deployed devices are dying in less than 3 days.
question: What flash-write energy miscalculation causes the checkpointing sensors to drain batteries in
  under 3 days?
details:
  realistic_solution: The design catastrophically underestimates the energy cost of flash memory writes.
    Erasing a sector and programming new bits draws significantly more power than the CPU core itself,
    and involves long blocking waits. When accounting for the extremely low baseline power of sleep and
    inference, the periodic high-power flash checkpointing consumes magnitudes more energy, becoming the
    dominant drain and killing the battery in days instead of weeks.
  common_mistake: '**The Pitfall:** Assuming flash writes are as cheap as SRAM writes.

    **The Rationale:** Engineers from a cloud background fail to quantify the immense energy cost of sector
    erase and flash write operations on microcontrollers.

    **The Consequence:** The fault-tolerance feature ironically becomes the system killer, rapidly depleting
    the battery and causing premature field death.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Battery capacity: ~60 J (yields 14 days at ~4.3 J/day base load).

    - Base load (sleep + inference): ~4.3 J/day.

    - Model size: 256 KB.

    - Flash write/erase cycle: 100 mW for 12.8 seconds per checkpoint.


    **Calculations:**

    - Energy per checkpoint = 100 mW * 12.8 s = 1.28 J.

    - Daily checkpoints (every 50 mins) = 28.8 checkpoints/day.

    - Daily checkpoint energy = 28.8 * 1.28 J = 36.8 J/day.

    - Total daily energy = 4.3 J (base) + 36.8 J (checkpoints) = 41.1 J/day.

    - Field battery life = 60 J / 41.1 J/day = 1.45 days.


    **Conclusion & Interpretation:**

    - **Result: 1.45 days battery life (Power-Bound)**. Flash writes consume ~90% of the total energy
    budget. Checkpointing the full model dominates the power profile, dropping battery life from the projected
    14 days to under 2 days.'
