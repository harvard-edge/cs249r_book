title: 'The Fault-Tolerant Battery Killer'
scenario: 'You''re designing a remote agricultural sensor that adapts its calibration model on-device. To ensure fault tolerance, you checkpoint the 256KB model to the device''s internal flash memory after every 50 inferences. The device performs one inference per minute. Your power budget calculations projected a 14-day battery life, but deployed devices are dying in less than 3 days.'
question: 'What flash-write energy miscalculation causes the checkpointing sensors to drain batteries in under 3 days?'
details:
  realistic_solution: 'The design catastrophically underestimates the energy cost of flash memory writes. Erasing a sector and programming new bits draws significantly more power than the CPU core itself. The system energy budget is dominated by the checkpointing process, not the ML inference.'
  common_mistake: |
    **The Pitfall:** Assuming flash writes are as cheap as SRAM writes.
    **The Rationale:** Engineers from a cloud background fail to quantify the immense energy cost of sector erase and flash write operations on microcontrollers.
    **The Consequence:** The fault-tolerance feature ironically becomes the system killer, rapidly depleting the battery and causing premature field death.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 256 KB.
    - Flash erase: 4 KB sectors (64 erases per checkpoint).
    - Erase/Write power: ~60 mW.

    **Calculations:**
    - Erase 30ms + write 15ms per sector = 45 ms.
    - Total checkpoint time = 64 * 45 ms = 2.88 s.
    - Energy per checkpoint = 60 mW * 2.88 s = 0.173 J.
    - Daily checkpoints (every 50 mins) = 28.8 checkpoints/day.
    - Daily checkpoint energy = 4.98 J.
    - Daily inference energy (200ms @ 50mW * 1440) = 14.4 J.

    **Conclusion & Interpretation:**
    - **Result: 4.98 J per day (Power-Bound)**. Flash writes consume >26% of the daily budget unbudgeted, and combined with flash wear retries, battery life drops by 4x.
