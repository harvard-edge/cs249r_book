title: Rolling Anomaly Checkpoint
scenario: >
  A Cortex-M4 vibration monitor occasionally resets due to power fluctuations, requiring it to track a rolling anomaly score over time.
question: How would you apply a lightweight checkpointing scheme to save the 4-byte anomaly score to non-volatile memory every 5 minutes?
visual:
  kind: svg
  path: tinyml-1581.svg
  alt: Timeline showing regular state saves every 5 minutes.
  caption: Periodic Checkpoint RPO
details:
  realistic_solution: |
    The candidate suggests periodically writing the 4-byte float/int to Flash memory or EEPROM every 5 minutes. They should mention wear-leveling if writing to Flash frequently.
  common_mistake: |
    **The Pitfall:** Overcomplicating the checkpointing by suggesting full RAM snapshots.
    **The Rationale:** Candidates apply heavyweight database or server checkpointing paradigms to embedded devices.
    **The Consequence:** A single scalar state triggers massive unnecessary flash writes, causing early sector wear-out.
  napkin_math: |
    **Assumptions & Constraints:**
    - Payload: 4-byte anomaly score.
    - Frequency: Every 5 minutes.

    **Calculations:**
    - Checkpoints per hour: 60 / 5 = 12.
    - Data rate: 12 checkpoints * 4 bytes = 48 bytes / hour.

    **Conclusion & Interpretation:**
    - **Result: Storage-Feasible (48 bytes/hr)**. The write payload is microscopic and easily wear-leveled.
