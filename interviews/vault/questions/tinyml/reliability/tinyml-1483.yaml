title: Burst Handling and Queue Overflow on ESP32-S3
scenario: An MCU processes audio keyword detection at 10 inferences/s normally, but bursty noise events arrive at 50/s for 200ms bursts. Each inference takes 80ms.
question: How would you design a queuing strategy to handle 50/s bursts without losing critical events?
details:
  realistic_solution: "During burst, queue grows at 37.5 items/s. Strategy: (1) cap queue at 8 items using PSRAM, (2) use priority queue to keep highest-confidence events, (3) implement token bucket."
  common_mistake: |
    **The Pitfall:** Using a simple FIFO queue and assuming the burst will just drain naturally.
    **The Rationale:** Ignoring that an arrival rate of 50/s while processing at 12.5/s creates a massive server-load overload (ρ=4).
    **The Consequence:** The queue rapidly overflows available SRAM, crashing the system, or low-priority noise events push out high-confidence critical events.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inference Latency: 80 ms (12.5 items/s).
    - Burst: 50/s for 200ms.

    **Calculations:**
    - Arrived in Burst: 50/s * 0.2s = 10 events.
    - Processed in Burst: 12.5/s * 0.2s = 2.5 events.
    - Peak Queue Depth: 10 - 2.5 = 7.5 events.
    - Memory: 8 events * ~2KB/event = 16KB.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound (Peak queue requires 16KB buffer).**
