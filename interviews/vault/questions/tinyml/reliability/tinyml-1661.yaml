title: 'Cortex-M4 Brownout Checkpointing'
scenario: 'A solar-powered Cortex-M4 has a 2 mF reservoir capacitor charged to 3.0 V. The MCU brownout-reset (BOR) threshold is 1.8 V. On a power-loss event the firmware must checkpoint 16 KB of SRAM to internal flash. Flash programming draws 20 mA and takes 10 ms per 1 KB page.'
question: 'Identify whether the 2 mF / 3.0 V capacitor holds enough usable energy to complete the 16 KB checkpoint before V drops below the 1.8 V brownout threshold. Compute (a) usable capacitor energy, (b) checkpoint energy required, and (c) the outcome. If it fails, identify the smallest brownout-aware capacitance that would succeed.'
visual:
  kind: svg
  path: tinyml-1661.svg
  alt: 'Line chart showing capacitor voltage dropping below the required threshold during a checkpoint.'
  caption: 'Capacitor drain during emergency flash write.'
details:
  realistic_solution: 'Implement a charge-budget analysis for continuous-current flash programming. Time to write 16 KB is 160 ms. Charge consumed is 3.2 mC. Usable charge between initial voltage and BOR is 2.4 mC. The capacitor cannot deliver the required charge before brownout. Usable energy is 5.76 mJ, while required energy at average rail voltage (2.4 V) is ~7.68 mJ. Minimum capacitance required is 2.67 mF; specify a 3.3 mF standard catalog value for safety margin.'
  common_mistake: |
    **The Pitfall:** Computing capacitor energy as 0.5 * C * V_init^2 and treating all of it as usable.
    **The Rationale:** Candidates often ignore the BOR cutoff voltage, falsely assuming the capacitor can drain to 0 V.
    **The Consequence:** Over-states usable energy by ~36%, leading to guaranteed field failures during power-loss events.
  napkin_math: |
    **Assumptions & Constraints:**
    - Capacitor: 2 mF, Initial V: 3.0 V, BOR V: 1.8 V.
    - Flash write: 16 KB total, 20 mA current, 10 ms per KB.

    **Calculations:**
    - Write time: 16 KB * 10 ms/KB = 160 ms.
    - Charge required: 20 mA * 160 ms = 3.2 mC.
    - Usable charge: 2 mF * (3.0 V - 1.8 V) = 2.4 mC.
    - Usable energy: 0.5 * 2 mF * (3.0^2 - 1.8^2) = 5.76 mJ.
    - Required energy: ~7.68 mJ.
    - Minimum capacitance: 3.2 mC / 1.2 V = 2.67 mF.

    **Conclusion & Interpretation:**
    - **Result: Fails (Power-Bound)**. Usable charge (2.4 mC) < Required (3.2 mC). Use 3.3 mF.
