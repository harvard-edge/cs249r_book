title: 'Adversarial Robustness Evaluation on Cortex-M7 + Ethos-U55 for TinyML'
scenario: 'You are evaluating the adversarial robustness of two TinyML models, Model A (standard CNN) and Model B (adversarial training defense), deployed on a Cortex-M7 paired with an NPU. Both models perform image classification on a constrained dataset.'
question: 'How would you design an evaluation framework to compare resilience against common adversarial attacks given platform constraints?'
details:
  realistic_solution: 'A realistic solution involves hardware-aware adversarial training, potentially incorporating techniques like quantization-aware training to maintain model size and speed. The evaluation framework should include on-device profiling of both attack generation (if feasible) and defense inference.'
  common_mistake: |
    **The Pitfall:** Directly applying adversarial defense strategies designed for cloud/edge GPUs.
    **The Rationale:** Candidates fail to account for the severe memory and computational constraints of TinyML platforms.
    **The Consequence:** They propose solutions that are either too slow or too large to fit, or defenses that introduce unacceptable latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Platform limits: 512 KB SRAM, 512 MACs/cycle throughput.
    - Attack method: Projected Gradient Descent (PGD).

    **Calculations:**
    - Required Attack Memory: Original input + adversarial perturbation + intermediate gradients.
    - Threat bounds: Execution must fit inside 512 KB.
    - Total Attack MACs: k iterations × (M gradient MACs + N inference MACs).

    **Conclusion & Interpretation:**
    - **Result: Exceeds SRAM (Computation-Bound)**. Typical cloud-centric adversarial evaluation fails on-device because storing iterative gradients wildly exceeds SRAM and processing times breach watchdogs.
