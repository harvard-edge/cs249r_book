title: Adversarial Robustness Evaluation on Cortex-M7 + Ethos-U55 for TinyML
scenario: You are evaluating the adversarial robustness of two TinyML models, Model A (standard CNN) and Model B (adversarial training defense), deployed on a Cortex-M7 paired with an NPU. Both models perform image classification on a constrained dataset.
question: How would you design an evaluation framework to compare resilience against common adversarial attacks given platform constraints?
details:
  realistic_solution: |
    Build the comparison as an evaluation protocol, not as a new defense recipe. Define the threat model and attack set first: clean accuracy, FGSM, small-step PGD, patch/noise attacks relevant to the image sensor, and any quantization-aware attacks that can exploit the deployed INT8 graph. Generate expensive attacks offline with the same epsilon bounds and dataset splits for Model A and Model B, then run the resulting clean and adversarial examples through the deployed binaries on the Cortex-M7 + NPU. If on-device attack generation is tested, report it separately because gradient storage and repeated inference can exceed SRAM and watchdog budgets. Compare both models with identical preprocessing, compiler settings, NPU placement, batch size, clock, and memory arena. Report robust accuracy, attack success rate, confidence calibration, latency/WCET, SRAM and flash usage, energy per inference, and any fallback or reject rate so the robustness gain can be weighed against platform cost.
  common_mistake: |
    **The Pitfall:** Directly applying adversarial defense strategies designed for cloud/edge GPUs.
    **The Rationale:** Candidates fail to account for the severe memory and computational constraints of TinyML platforms.
    **The Consequence:** They propose solutions that are either too slow or too large to fit, or defenses that introduce unacceptable latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Platform limits: 512 KB SRAM, 512 MACs/cycle throughput.
    - Attack method: Projected Gradient Descent (PGD).

    **Calculations:**
    - Required Attack Memory: Original input + adversarial perturbation + intermediate gradients.
    - Threat bounds: Execution must fit inside 512 KB.
    - Total Attack MACs: k iterations × (M gradient MACs + N inference MACs).

    **Conclusion & Interpretation:**
    - **Result: iterative attack generation usually exceeds on-device SRAM/time budgets**. Use offline attack generation for the main fair comparison, then measure deployed inference robustness, latency, SRAM, flash, and energy for both models on identical Cortex-M7 + NPU settings.
