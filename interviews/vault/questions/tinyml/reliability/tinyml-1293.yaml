title: Design Graceful Degradation for Cortex-M4 Keyword Spotter
scenario: An always-on smart home audio node runs on an STM32F4 (168 MHz, 256 KB SRAM). It runs a 12-command keyword spotter. Unpredictable BLE interrupts can suddenly reduce the CPU processing time from 80ms to 15ms.
question: How should a Cortex-M4 keyword spotter degrade gracefully when BLE interrupts reduce the available CPU window to 15 ms?
details:
  realistic_solution: Both a full model and a tiny wake-word only fallback model permanently reside in the 1 MB flash. Because they never execute simultaneously, they reuse the same SRAM tensor arena. An RTOS task monitor evaluates the remaining time budget; if under the full model threshold, it safely executes only the tiny fallback model to maintain fail-operational status.
  common_mistake: |
    **The Pitfall:** Attempting to dynamically load fallback weights from flash to SRAM during the interrupt.
    **The Rationale:** Candidates propose cloud-style dynamic loading without realizing the flash read latency will blow the tight 15ms deadline.
    **The Consequence:** The system still misses the real-time deadline during CPU starvation events.
  napkin_math: |
    **Assumptions & Constraints:**
    - MCU clock: 168 MHz.
    - Use the measured effective CMSIS-NN throughput for the deployed model; 1 MAC/cycle is a conservative planning point and 2 MACs/cycle is an optimistic SIMD ceiling for suitable INT8 kernels.
    - Latency budget: 15 ms.

    **Calculations:**
    - Conservative fallback budget: 0.015 sec * 168 MMAC/s = 2.52 MMACs.
    - Optimistic upper bound: 0.015 sec * 336 MMAC/s = 5.04 MMACs.
    - The full model is allowed only if profiling shows its worst-case execution time fits inside the reduced 15 ms window; otherwise the scheduler must select the profiled fallback model.

    **Conclusion & Interpretation:**
    - **Result: about 2.5-5.0 MMACs of fallback compute budget, depending on measured effective throughput ([Compute-Bound])**. Graceful degradation should use a profiled fallback whose worst-case time fits the 15 ms interrupt-constrained window.
