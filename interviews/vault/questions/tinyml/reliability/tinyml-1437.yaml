title: TinyML Graceful Degradation for Predictive Maintenance on Cortex-M7/Ethos-U55
scenario: A predictive maintenance system operates on a Cortex-M7 + Ethos-U55 microcontroller (480 MHz, 512 KB SRAM, 200 MAC/cycle NPU). The primary model's inference latency randomly exceeds a 50% increase over its nominal 10ms, and accuracy drops from 95% to below 80%.
question: How should you diagnose this performance degradation and design a graceful degradation ladder to maintain fail-operational status?
details:
  realistic_solution: 'Diagnose the regression by correlating the two symptoms separately: latency spikes above 15ms and accuracy below 80%. First log per-inference latency, NPU status, CPU interrupt load, SRAM arena high-water mark, temperature, and sensor quality/confidence. High latency with normal input quality points to thermal throttling, NPU/CPU contention, DMA stalls, or memory pressure. Accuracy collapse with normal latency points to sensor drift, calibration error, data corruption, or model-distribution shift. Both symptoms together suggest shared causes such as overheating, power instability, or corrupted input buffers. The degradation ladder should be deterministic: Level 1 logs and rate-limits diagnostics when latency first exceeds 15ms or confidence trends down; Level 2 switches to a preloaded fallback model if latency remains >15ms for a defined window or accuracy is confirmed below 80%; Level 3 reduces sampling rate and disables noncritical telemetry if fallback latency is
    threatened; Level 4 uses a simple rule-based detector or fail-safe status when NPU errors, SRAM corruption, or sensor faults make ML output untrustworthy.'
  common_mistake: |
    **The Pitfall:** Treating all degradation as a generic model failure and immediately switching models.
    **The Rationale:** Latency spikes, accuracy drops, thermal throttling, contention, sensor drift, and hardware faults leave different signatures and require different containment actions.
    **The Consequence:** The system may mask the root cause, miss real anomalies, or make the latency problem worse with diagnostics that are too heavy for the MCU.
  napkin_math: |
    **Assumptions & Constraints:**
    - Primary Model: 300 KB SRAM, 10 ms inference time.
    - Fallback Model: 100 KB SRAM, 4 ms inference time.
    - Trigger: latency > 15 ms or confirmed accuracy < 80%.
    - Diagnostic overhead target: <= 5% of the 100 ms control period.

    **Calculations:**
    - SRAM Freed on Degradation: 300 KB - 100 KB = 200 KB freed for diagnostics and logging.
    - Time budget for diagnostics per 100 ms period: 100 ms * 5% = 5 ms.
    - At 480 MHz, 5 ms is 2.4 million cycles, but diagnostics should run outside the latency-critical NPU window or be sampled sparsely.

    **Conclusion & Interpretation:**
    - **Result: Degradation should be triggered by the stated >15 ms latency or <80% accuracy conditions, with diagnostics capped to a small periodic budget and the fallback freeing about 200 KB of SRAM for logging and health checks.**
