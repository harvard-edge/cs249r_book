title: Architecting ML Safety on Dual-Core nRF5340
scenario: Your team is deploying an industrial anomaly detection model on a Nordic nRF5340. The system must meet stringent functional safety requirements, demanding deterministic execution and rapid failure detection. The ML model runs on the 128 MHz app core, while the 64 MHz net core handles BLE 5.3 telemetry. Given the strict constraints of 256 KB SRAM, 1 MB flash, and a ~5mA active power budget, you must design a system that guarantees safety despite ML non-determinism.
question: How should you architect watchdogs, MPU protection, and task scheduling so nRF5340 ML inference cannot compromise safety fault handling?
details:
  realistic_solution: 'The optimal approach uses a Memory Protection Unit (MPU) on the 128 MHz app core. A high-priority, deterministic safety task manages a windowed watchdog timer (WWDT) and orchestrates self-tests. The ML inference runs in a lower-priority task, sending ''alive'' signals to the safety task, which aggregates them before feeding the hardware WWDT. Critical safety state is locked in specific MPU-protected SRAM regions to prevent corruption.'
  common_mistake: |
    **The Pitfall:** Using a single monolithic RTOS task with a standard hardware watchdog.
    **The Rationale:** Engineers assume standard threading handles safety boundaries and fail to isolate the non-deterministic ML workload.
    **The Consequence:** The ML model can corrupt safety-critical memory, or long inference times can trigger unexpected watchdog resets, violating functional safety requirements.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory Partitioning: MPU allocates 192 KB for tensor arena, 32 KB for RTOS, and 32 KB isolated for safety state.
    - Inference Latency: 50 ms per inference on the 128 MHz app core.
    - Power Draw: 50 ms * 5 mA = 0.25 mAs per inference.

    **Calculations:**
    - Safety Slack: With a 100 ms Windowed Watchdog Timer (WWDT) deadline, 100 ms - 50 ms = 50 ms of slack remains.

    **Conclusion & Interpretation:**
    - **Result: 50 ms safety slack (Compute-Bound)**. This 50 ms slack allows incremental memory self-tests without triggering watchdog resets or blocking BLE telemetry.
