title: Architecting Graceful Degradation for ESP32-S3 Voice Commands
scenario: You are designing an always-on smart speaker on an MCU. The device normally streams audio to the cloud over WiFi, but it must degrade gracefully when connectivity drops or power is critically low.
question: How should a smart speaker stage SRAM and PSRAM models for WiFi loss and low-power fallback?
details:
  realistic_solution: The optimal design uses a multi-stage degradation ladder. Keep the tiny wake-word model and audio front-end buffers resident in SRAM for the always-on path. During normal operation, a wake word triggers WiFi streaming to the cloud. When WiFi drops, evict noncritical networking buffers and stage a local INT8 command model from PSRAM or flash into the SRAM arena, using tiling if the full model and scratch do not fit together. When power is critically low, switch to a smaller fallback model that can remain resident in SRAM or be paged in quickly, disable cloud streaming, and support only the lowest-power command set.
  common_mistake: |
    **The Pitfall:** Keeping multiple separate models in SRAM simultaneously, or relying on PSRAM for real-time inference.
    **The Rationale:** Failing to account for the strict 512 KB SRAM limit and the unacceptable latency/power draw of running active inferences from 8 MB external PSRAM.
    **The Consequence:** Out-of-memory crashes or sluggish, power-hungry performance during fallback modes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 512 KB SRAM total.
    - OS/WiFi overhead: ~150 KB.
    - Always-on wake-word model: 50 KB.
    - Runtime audio/MFCC buffers and tensor arena for the hot path: ~100 KB.
    - Local fallback command model: ~250 KB stored in PSRAM when not active.
    - Low-power fallback model: ~80 KB stored in PSRAM or flash.

    **Calculations:**
    - SRAM reserved for always-on mode: 150 + 50 + 100 = 300 KB.
    - Remaining SRAM for one staged fallback model and scratch: 512 - 300 = 212 KB.
    - A 250 KB offline command model cannot be resident beside the always-on path, so keep it in PSRAM and page only the needed weights/tiles or temporarily evict noncritical WiFi buffers after connectivity loss.
    - The 80 KB low-power model fits in the 212 KB staging window with about 132 KB left for its arena and audio features.

    **Conclusion & Interpretation:**
    - **Result: staged residency strategy (Memory-Bound).** SRAM should hold the wake-word path and current runtime buffers; PSRAM holds larger fallback models that are loaded, paged, or streamed only when the device changes mode. Graceful degradation comes from choosing which model is resident for each state, not from proving that one 250 KB DMA transfer is fast.
