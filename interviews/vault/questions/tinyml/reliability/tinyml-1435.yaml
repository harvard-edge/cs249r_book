title: Graceful Degradation for Real-time Anomaly Detection on Constrained TinyML Device
scenario: An IoT device utilizes an ARM Cortex-M4 (168 MHz CPU, 256 KB SRAM, no FPU) for real-time anomaly detection in an industrial setting. The core task is to identify critical machine faults using a small, quantized neural network inferencing on sensor data. The device is battery-powered and operates in an environment where sensor noise, network congestion, and battery degradation are common.
question: How should a Cortex-M4 anomaly detector degrade gracefully under noise, congestion, or battery stress while preserving utility?
details:
  realistic_solution: 'Implement a tiered degradation ladder with pre-quantized (fixed-point) models. Tier 1 (primary): A slightly more complex CNN for high-fidelity anomaly detection. Tier 2 (fallback): A simpler, shallower CNN or a statistical model (e.g., Z-score thresholding) that requires significantly less SRAM and compute. Tier 3 (fail-safe): A simple rule-based heuristic that only detects severe anomalies.'
  common_mistake: |
    **The Pitfall:** Complex switching logic or floating-point fallbacks.
    **The Rationale:** Candidates design an overly complex degradation strategy that consumes too much of the 256 KB SRAM, or they rely on floating-point arithmetic for the fallback model.
    **The Consequence:** Since the hardware lacks an FPU, floating-point math triggers slow software emulation, causing system stalls instead of graceful degradation.
  napkin_math: |
    **Assumptions & Constraints:**
    - CPU: Cortex-M4 at 168 MHz (No FPU).
    - SRAM: 256 KB. OS/Buffers: 100 KB.
    - Primary CNN: 100 KB. Latency target: 50 ms.

    **Calculations:**
    - SRAM Used (Primary): 100 KB (OS) + 100 KB (CNN) = 200 KB. Remaining: 56 KB.
    - Tier 2 Fallback (Statistical Fixed-Point): 10 KB SRAM.
    - SRAM Used (Fallback): 100 KB (OS) + 10 KB (Stats) = 110 KB. Remaining: 146 KB.
    - Primary CNN inference: ~40 ms.
    - Fallback inference: ~5 ms.

    **Conclusion & Interpretation:**
    - **Result: 146 KB remaining SRAM (Compute and Memory-Bound)**. Switching to a 10 KB fixed-point fallback model explicitly frees up 90 KB of SRAM and drops latency by 87%, safely extending operational life under severe battery or thermal stress.
