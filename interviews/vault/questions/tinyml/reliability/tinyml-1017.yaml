title: Evaluating Adversarial Defenses on ESP32-S3 Smart Locks
scenario: You are designing the voice authentication system for a smart door lock. You must defend against adversarial audio attacks. The three proposed alternatives are input transformations, adversarial training with PGD, or a secondary lightweight anomaly detection model.
question: "How would you evaluate these alternatives and determine the best approach given the hardware constraints?"
details:
  realistic_solution: Utilize lightweight deterministic input transformations, such as hardware-accelerated audio bandpass IIR filtering to natively block high-frequency ultrasonic attacks, combined with light adversarial training. Aggressively quantize to INT8 to lock the footprint inside fast SRAM, evading slow PSRAM fallback.
  common_mistake: |
    **The Pitfall:** Suggesting complex adversarial training like PGD or an ensemble of anomaly detectors.
    **The Rationale:** Candidates rely on standard over-parameterized software defenses, ignoring hardware memory limitations.
    **The Consequence:** The inflated model exceeds the 512 KB SRAM boundary, forcing slow PSRAM execution and violating critical real-time latency budgets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Memory: 512 KB fast SRAM.
       - Base model: 250 KB INT8.
       - PGD Training: 2x-4x capacity multiplier.
       - IIR Bandpass Filter: < 5 KB overhead.
    2. **Calculations:**
       - PGD Model Size: 250 KB * 3x = 750 KB (> 512 KB, fails).
       - Hybrid Defense: 350 KB (light training) + 50 KB (buffers) + 5 KB (IIR Filter) = 405 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Bandpass filter + light training uses 405 KB, safely fitting the 512 KB SRAM limit (Memory-Bound).**
