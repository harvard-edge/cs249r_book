title: The Watchdog's Leash
scenario: You're designing a fault-tolerant TinyML sensor that runs on a battery. To prevent software freezes, you've implemented a hardware watchdog timer with a 250ms timeout. Your application's main loop performs an inference and then enters a low-power sleep state for a fixed duration of 200ms. The device consumes 50mW during the active inference phase.
question: With a 250ms watchdog and 200ms sleep, what is the maximum inference time and active energy for each loop?
details:
  realistic_solution: The core constraint is that the sum of the active time and sleep time must be less than the watchdog timeout. This gives us the maximum permissible time for the active inference phase.
  common_mistake: |
    **The Pitfall:** Calculating energy consumption based on the full watchdog timeout.
    **The Rationale:** Candidates forget that the fixed sleep state consumes a significant portion of the time budget within the loop.
    **The Consequence:** Overestimating the available active inference time, leading to constant watchdog resets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Watchdog Timeout: 250ms.
    - Sleep Duration: 200ms.
    - Active Power: 50mW.

    **Calculations:**
    - Max Inference Time: 250ms - 200ms = 50ms.
    - Active Energy: 50ms * 50mW = 2.5 mJ.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound**. The inference must complete within the strict 50ms window to avoid a watchdog reset.
  options:
  - 12.5 mJ
  - 2500 mJ
  - 2.5 mJ
  - 10.0 mJ
  correct_index: 2
