title: Mitigating DPA Attacks on ESP32-S3 Wake-Word Models
scenario: 'You are deploying a proprietary INT8 wake-word model on an ESP32-S3 (240 MHz dual-core Xtensa, 512 KB SRAM, 8 MB PSRAM, vector extensions for INT8). To defend against model extraction via Differential Power Analysis (DPA), you must evaluate two defenses: Option A applies algorithmic Boolean masking to weights and activations during inference. Option B dedicates Core 0 to standard inference while Core 1 executes randomized memory accesses and dummy vector operations to obfuscate the power trace. Which approach is better for a real-time smart speaker constraint?'
question: Which ESP32-S3 DPA defense keeps a 15M-MAC wake-word model within real-time latency?
details:
  realistic_solution: Option B is the better latency-preserving defense for this real-time wake-word constraint because Core 0 can keep the standard INT8 vectorized inference path, while Option A's software Boolean masking would likely force scalar or poorly vectorized execution. The dummy MAC and memory-access workload on Core 1 must be bounded, randomized, and scheduled so it does not steal PSRAM bandwidth, SRAM bus time, or interrupt latency from the 20 ms audio-frame budget; it is lower-overhead obfuscation, not a free defense.
  common_mistake: |
    **The Pitfall:** Choosing Option A because Boolean masking is the textbook cryptographic defense.
    **The Rationale:** Candidates often choose Option A because masking is the textbook cryptographic defense against DPA. They fail to realize that implementing software-based Boolean masking breaks compatibility with the ESP32-S3's INT8 vector extensions, forcing scalar execution that violates real-time latency constraints.
    **The Consequence:** The execution latency wildly exceeds the audio frame deadlines, rendering the smart speaker completely non-functional for real-time inference.
  napkin_math: |
    **Assumptions & Constraints:**
    - 15M MAC INT8 model.
    - ESP32-S3 vector extensions: ~16 MACs/cycle at 240 MHz.
    - Masking overhead (scalar): ~4 cycles/MAC.
    - Target latency deadline: ~20 ms (audio frame).

    **Calculations:**
    - Option B (Vectorized): 15,000,000 / 16 = 937,500 cycles. Time = 937,500 / 240,000,000 = 3.9 ms.
    - Option A (Scalar + Masking): 15,000,000 * 4 = 60,000,000 cycles. Time = 60,000,000 / 240,000,000 = 250 ms.

    **Conclusion & Interpretation:**
    - **Result: Option B (Latency-Bound).** Option A takes 250 ms, completely missing typical 20ms audio frame deadlines. Option B keeps latency at 3.9 ms while effectively obfuscating power via dummy operations.
