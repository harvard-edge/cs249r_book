title: Power Loss Flash Write Margin Calculation
scenario: An IoT node detects a primary power loss, granting exactly 15ms of capacitor hold-up backup power. It must securely execute a 10ms continuous block write of 5KB checkpoint state to Flash memory.
question: "Determine the safety margin in milliseconds remaining after the state is successfully flushed."
details:
  realistic_solution: Hardware hold-up buffers provide strict temporal bounds. Deducting the maximum static hardware block-write latency from the capacitor's discharge window establishes the hard safety margin required to prevent partial-page state corruption.
  common_mistake: |
    **The Pitfall:** Adding phantom delays like network transfer times or sensor polling routines into the emergency execution path.
    **The Rationale:** Candidates overcomplicate physical-layer logic by appending background OS tasks completely irrelevant to the critical-path power-down sequence.
    **The Consequence:** They erroneously underestimate the safety margin, potentially canceling the flush or failing to correctly structure power-fail interrupts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Available capacitor hold-up power limit: 15 ms.
       - Static Flash block write execution duration: 10 ms.
    2. **Calculations:**
       - Temporal safety margin: 15 ms (buffer) - 10 ms (execution) = 5 ms.
    3. **Conclusion & Interpretation:**
       - **Result: A 5 ms strict hardware margin remains to guarantee atomic state preservation (Power-Bound).**
