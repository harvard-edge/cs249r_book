title: The Unbrickable Automotive OTA System
scenario: 'You are the architect for the firmware of a safety-critical in-cabin microcontroller
  (MCU) that uses a model to adjust vehicle settings. A botched Over-the-Air (OTA)
  update has bricked 0.1% of your 100,000-vehicle fleet, requiring an expensive physical
  recall. The failure mode is a boot loop: the new firmware crashes immediately, the
  watchdog timer reboots the device, and it crashes again. Your constraints are a
  Cortex-M4 MCU with 1MB of Flash and 256KB of SRAM.'
question: How can an immutable bootloader and A/B flash partitioning prevent OTA updates
  from bricking a Cortex-M4 device?
details:
  realistic_solution: The core principle is to never overwrite the code that is currently
    running and to always have a known-good, fallback state that is bootable. This
    is achieved with an immutable bootloader and A/B partitioning of the flash memory,
    orchestrated by a 'commit-confirm' handshake.
  common_mistake: '**The Pitfall:** Suggesting application-level try/catch blocks
    or more testing.

    **The Rationale:** Candidates lack bare-metal embedded experience and think in
    terms of high-level software exceptions.

    **The Consequence:** They fail to address hardware watchdog interactions, leaving
    the device vulnerable to boot loops before app code even runs.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Total Flash: 1 MB (1024 KB)

    - Bootloader: 32 KB

    - Flash Partitioning: Two identical A/B application slots


    **Calculations:**

    - A/B slot size = (1024 KB - 32 KB) / 2 = 496 KB


    **Conclusion & Interpretation:**

    - **Result: 496 KB (Memory-Bound)**. The bootloader falls back to the known-good
    partition, guaranteeing recovery from boot loops.

    '
