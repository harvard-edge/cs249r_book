title: Graceful Degradation for Real-time TinyML Anomaly Detection
scenario: A smart industrial sensor performs real-time vibration analysis on a Cortex-M7 (480 MHz, 512 KB SRAM) + Ethos-U55 (256 MAC/cycle). During peak hours, increased noise causes the primary high-fidelity model to miss its 10ms latency budget.
question: How should a Cortex-M7 plus Ethos-U55 anomaly detector use degradation ladders, fail-safe states, and QoS shedding under overload?
details:
  realistic_solution: Implement a multi-tier degradation ladder with pre-quantized and pruned fallback models that are compiled, arena-planned, and validated ahead of time. Store model images in internal flash for boot-time selection, but keep the active model's tensor arena and any latency-critical fallback state staged so an overload transition does not depend on dynamically loading a full model from slow external flash. Use a state machine to transition between tiers based on latency and queue depth. A truly fail-safe state abandons inference to collect raw data and signal a fault, while fail-operational models shed QoS layers but continue basic detection.
  common_mistake: |
    **The Pitfall:** Proposing solutions that dynamically load full models from external flash.
    **The Rationale:** Candidates assume abundant memory bandwidth and fail to account for the catastrophic latency overhead of flash reads during an overload.
    **The Consequence:** The system crashes during the transition phase, failing to meet the tight 10ms deadline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Available ML SRAM: 512 KB - 150 KB (OS) = 362 KB.
    - Ethos-U55 throughput: 256 MAC/cycle * 480 MHz = 122.88 GMAC/s.
    - Observed primary model: 100 MMAC misses the 10 ms budget under overload, so use measured effective throughput for fallback sizing.
    - Degraded target: 5 ms fallback inference.

    **Calculations:**
    - 100 MMAC primary model ideal compute: 100M / 122.88G ≈ 0.81 ms.
    - Observed effective throughput under overload: 100 MMAC / 10 ms = 10 GMAC/s.
    - 5 ms fallback budget at observed throughput: 10 GMAC/s * 0.005 s = 50 MMAC.
    - SRAM check: fallback arena and scratch must fit inside the 362 KB ML SRAM budget before enabling that tier.

    **Conclusion & Interpretation:**
    - **Result: Target about 50 MMAC or less for the fallback under measured overload conditions, and pre-stage the active arena so the transition avoids latency-critical external-flash reads.**
