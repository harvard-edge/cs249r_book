title: Adversarial Denial of Sleep Attack Analysis
scenario: A security researcher demonstrates a 'denial of sleep' attack on a wake-word model. The device normally wakes up once every 5 seconds to process a 50ms audio frame, drawing ~5mA active current. Under attack, a continuous sub-audible adversarial noise forces the app core to evaluate false positives, waking it up to process a 50ms frame 10 times per second over BLE.
question: How would you explain the systemic impact of this adversarial perturbation on the device's power budget and operational lifespan?
details:
  realistic_solution: The attack leverages adversarial examples to trigger the wake-up threshold of the early-stage cascade, keeping the high-power app core continuously active. A robust system must balance the tradeoff between early-rejection threshold sensitivity and power consumption, potentially deploying an ultra-low-power feature filter before waking the main application core.
  common_mistake: |
    **The Pitfall:** Focusing solely on the mathematical robustness of the model.
    **The Rationale:** Candidates analyze accuracy changes but miss the system-level hardware energy exploit.
    **The Consequence:** The model is secured against classification errors but remains vulnerable to forced battery exhaustion attacks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Normal duty cycle: 50ms active per 5000ms.
    - Attacked duty cycle: 10 wakeups/sec * 50ms.
    - Active current: 5mA.

    **Calculations:**
    - Normal duty cycle = 50 / 5000 = 1%.
    - Normal average current = 5mA * 0.01 = 0.05mA.
    - Attacked duty cycle = 10 * 50ms = 500ms active per 1000ms = 50%.
    - Attacked average current = 5mA * 0.5 = 2.5mA.
    - Increase = 2.5mA / 0.05mA = 50x.

    **Conclusion & Interpretation:**
    - **Result: 50x increase (Power-Bound)**. Average active power increases 50x, drastically reducing battery life.
