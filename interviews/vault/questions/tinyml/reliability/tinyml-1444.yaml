title: Functional Safety for TinyML on Resource-Constrained Automotive ECUs
scenario: You are tasked with deploying a safety-critical TinyML model for predictive maintenance in an automotive system, specifically monitoring brake pad wear. The target platform is an ARM Cortex-M4 STM32F4-class microcontroller (168 MHz clock speed, 256 KB SRAM). The system must adhere to ISO 26262 ASIL-B requirements.
question: How should you ensure ISO 26262 ASIL-B functional safety for a Cortex-M4 brake-wear TinyML model?
details:
  realistic_solution: |
    Treat ASIL-B as a system-level safety program, not a property of the model runtime alone. Define the brake-wear safety goals, hazardous events, ASIL allocation/decomposition, safe state, fallback behavior, diagnostic coverage targets, and diagnostic intervals before choosing model mitigations. Use deterministic INT8 inference and bounded scheduling as part of the implementation, but also add MPU isolation, static allocation, CRC/signature checks for model and calibration data, input-range checks, watchdog or heartbeat supervision with validated timeout budgets, and fault handling that moves the system to a defined safe state when inference or diagnostics fail. Build verification evidence with WCET measurements, fault-injection tests, traceability, regression tests, and V&V artifacts that support the ISO 26262 safety case.
  common_mistake: |
    **The Pitfall:** Treating a fast inference benchmark as evidence of ASIL-B compliance.
    **The Rationale:** Candidates assume standard software error handling and timing headroom are sufficient, while omitting hazard analysis, diagnostic coverage, safe-state behavior, and verification traceability.
    **The Consequence:** The implementation may run quickly but still lack the fault detection and safety evidence required for an automotive safety case.
  napkin_math: |
    **Assumptions & Constraints:**
    - ASIL-B compliance is established through a safety case, not by inference latency alone.
    - The model runs on a Cortex-M4-class ECU with static allocation and bounded scheduling.
    - Safety evidence must cover hazards, safety goals, diagnostics, timing, fault handling, and verification traceability.
    - Runtime measurements are supporting evidence for WCET and watchdog budgets, not a substitute for ISO 26262 work products.

    **Calculations:**
    - Required safety-analysis artifacts: item definition, HARA, ASIL allocation, safety goals, safe state, and technical safety requirements.
    - Required implementation controls: deterministic INT8 inference, fixed memory allocation, input-range checks, model/calibration CRCs, watchdog supervision, and defined fault responses.
    - Required verification evidence: WCET measurement, fault injection, diagnostic-coverage argument, regression tests, tool/process qualification as applicable, and traceability from safety requirements to tests.
    - Latency headroom can show the watchdog budget is plausible, but it does not prove ASIL-B compliance without the diagnostic and process evidence above.

    **Conclusion & Interpretation:**
    - **Result: Safety-case-bound, not latency-bound.** ISO 26262 ASIL-B readiness depends on hazard analysis, diagnostics, deterministic implementation, verification evidence, and a documented safe state; timing measurements are only one supporting input.
