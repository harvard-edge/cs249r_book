title: Secure TinyML Keyword Spotting Architecture
scenario: Architect an always-on keyword spotting system for a smart lock running on an ARM Cortex-M4 that must be resilient against model extraction via timing and power side-channel attacks. The audio feature extraction stage is fixed at 10 ms before neural inference begins.
question: How would you design a defense strategy that masks execution patterns without violating a strict 50ms end-to-end inference latency budget?
details:
  realistic_solution: The design should keep the neural path on deterministic CMSIS-NN INT8 kernels, pad variable branches so each inference follows the same operation schedule, and add lightweight masking such as randomized channel ordering or calibrated dummy MAC blocks. The defense budget is a controlled compute overhead on the Cortex-M4 rather than a separate floating-point or cryptographic path. With the stated 10 ms feature extraction stage, a roughly 30% MAC overhead on a 4M-MAC KWS model still leaves substantial margin under 50 ms.
  common_mistake: |
    **The Pitfall:** Proposing heavyweight cryptographic masking or homomorphic encryption.
    **The Rationale:** Candidates often apply cloud-scale security solutions to edge devices without considering hardware limitations.
    **The Consequence:** These methods overwhelm the 168 MHz Cortex-M4-class CPU budget and break real-time guarantees, resulting in missed 50ms latency budgets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base inference compute: A standard KWS model requires 4 million MACs.
    - Throughput model: Cortex-M4 CMSIS-NN INT8 SIMD at an optimistic 2 MACs/cycle on a 168 MHz core = 336M MACs/sec.
    - Defense overhead: channel shuffling plus dummy MAC padding adds 30% to the neural workload.
    - Feature extraction: fixed 10 ms from the scenario.

    **Calculations:**
    - Base latency: 4M / 336M = 11.9 ms.
    - Secured MACs: 4.0M * 1.30 = 5.2M MACs.
    - Secured latency: 5.2M / 336M = 15.5 ms.
    - Total latency: 15.5 ms + 10 ms (audio feature extraction) = 25.5 ms.

    **Conclusion & Interpretation:**
    - **Result: 25.5 ms under an optimistic INT8/CMSIS-NN model (Compute-Bound).** The defense fits the 50 ms deadline if profiling confirms the kernel throughput and the dummy-work schedule is fixed across inputs.
