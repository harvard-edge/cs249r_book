title: Analyzing Watchdog Timers for Simple Recovery
scenario: An agricultural sensor runs a soil model once a day on a Cortex-M4 powered by a tiny, inconsistent solar panel.
question: What is the simplest fault-tolerance mechanism to recover from a brownout during the middle of the daily inference?
details:
  realistic_solution: The simplest mechanism is a hardware watchdog timer (WDT). If power drops, the device resets. Since inference only runs once a day, the system can reboot, check the RTC, and restart the inference entirely without complex intermediate flash checkpoints.
  common_mistake: |
    **The Pitfall:** Overengineering a layer-by-layer flash checkpointing system.
    **The Rationale:** Candidates often apply cloud-centric fault tolerance (like deep learning checkpointing) to edge devices.
    **The Consequence:** The system incurs massive, unnecessary flash wear and code complexity for a task so infrequent that a simple restart is practically free.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inference Frequency: 1 inference per day (86,400 seconds).
    - Inference Duration: < 1 second.
    - Power source: Inconsistent solar (brownouts expected).

    **Calculations:**
    - Checkpoint overhead: Flash writes incur significant wear and time overhead per layer.
    - Restart overhead: Re-running a 1-second inference wastes at most 1 second of compute energy per day.
    - Ratio: 1 lost second / 86,400 seconds ≈ 0.001% energy waste on a brownout.

    **Conclusion & Interpretation:**
    - **Result: Negligible energy waste (Reliability-Bound)**. Restarting a <1s inference once a day consumes entirely negligible energy compared to flash checkpointing overhead.
