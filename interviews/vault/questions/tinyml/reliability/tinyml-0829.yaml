title: Watchdog Timeout Sizing
scenario: A TinyML controller must complete sensing, inference, and actuation every 100 ms. Normal loop time is 72 ms, but rare flash logging adds 18 ms.
question: What watchdog timeout should you choose to catch hangs without resetting healthy worst-case loops?
details:
  realistic_solution: The healthy worst case is 90 ms. A watchdog below 90 ms would reset valid loops. A timeout around 120 ms provides 30 ms margin while still catching hangs quickly; exact value depends on safety requirements.
  common_mistake: |
    **The Pitfall:** Setting the watchdog at the average loop time.
    **The Rationale:** Candidates may optimize for the common case (72 ms) without accounting for worst-case overhead.
    **The Consequence:** This causes false resets during valid worst-case work like rare flash logging.
  napkin_math: |
    **Assumptions & Constraints:**
    - Nominal control loop duration: 72 ms.
    - Rare flash logging overhead: 18 ms.
    - Required safety margin for watchdog: ~30 ms (typical for real-time jitter).

    **Calculations:**
    - Worst-case healthy loop: 72 ms + 18 ms = 90 ms.
    - Watchdog timeout threshold: 90 ms + 30 ms = 120 ms.

    **Conclusion & Interpretation:**
    - **Result: 120 ms (Timing-Bound)**. A 120 ms timeout provides sufficient margin without triggering false resets.
