title: Hardware Security for TinyML Model Integrity on Nordic nRF5340
scenario: A critical anomaly detection model is deployed on a microcontroller. Advanced software-based adversarial training or large memory-resident defense mechanisms are impractical due to footprint constraints.
question: "Which hardware security feature protects TinyML firmware and model integrity against tampering or extraction?"
details:
  realistic_solution: Employ Hardware Root of Trust and Secure Boot, utilizing cryptographic signature verification (ECDSA) to authenticate firmware chains before execution. Combine this with Memory Protection Units (MPU) for runtime memory isolation of the model tensors.
  common_mistake: |
    **The Pitfall:** Proposing overly complex software-defined defenses, encryption layers, or external hardware security modules (HSM).
    **The Rationale:** Candidates overlook native microcontroller hardware-level isolation layers.
    **The Consequence:** They inject bloatware that consumes excessive memory, CPU overhead, or BOM cost, destroying TinyML economic feasibility.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model/Firmware size: 500 KB flash.
       - Constraint: Minimal runtime RAM/CPU overhead.
    2. **Calculations:**
       - Software encryption overhead: High runtime SRAM buffer costs and CPU decryption latency.
       - Secure boot overhead: 256-bit ECDSA verification at boot time takes ~5-10 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Hardware secure boot imposes only ~5-10 ms boot latency with zero runtime CPU/RAM penalty (Architecture-Bound).**
