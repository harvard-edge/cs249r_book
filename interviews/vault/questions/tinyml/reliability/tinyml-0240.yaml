title: 'The Hung Sensor Problem'
scenario: 'You''ve deployed a remote wildlife audio sensor powered by a battery. The device normally wakes up, runs a 1-second inference task consuming 50 mW, and then returns to a 10 µW deep sleep state. The entire cycle repeats every 100 seconds. A software bug causes the device to occasionally get stuck in its ''active'' state instead of returning to sleep.'
question: 'What average power draw results if the wildlife sensor gets stuck in its active state?'
details:
  realistic_solution: 'A watchdog timer is a hardware peripheral that automatically resets the microcontroller if it doesn''t receive a signal from the software within a predefined period. To mitigate the hang, you set the watchdog''s timeout to be slightly longer than the normal 1-second active task.'
  common_mistake: |
    **The Pitfall:** Calculating the normal average power instead of the average power during the failure condition.
    **The Rationale:** Engineers new to embedded systems often focus on active power and forget the impact of time spent in sleep states.
    **The Consequence:** They incorrectly average the active and sleep power states without considering the device is stuck, vastly underestimating the drain.
  napkin_math: |
    **Assumptions & Constraints:**
    - Normal active phase: 50 mW for 1 s.
    - Normal sleep phase: 0.01 mW (10 µW) for 99 s.
    - Failure state: Stuck in active mode.

    **Calculations:**
    - Normal active energy: 50 mW × 1 s = 50 mJ.
    - Normal sleep energy: 0.01 mW × 99 s = 0.99 mJ.
    - Normal average power: (50 mJ + 0.99 mJ) / 100 s ≈ 0.51 mW.
    - Stuck state power: 50 mW constant.
    - Power draw increase: 50 mW / 0.51 mW ≈ 98×.

    **Conclusion & Interpretation:**
    - **Result: 50 mW Continuous (Power-Bound)**. A failure to enter deep sleep causes a nearly 100-fold increase in average power consumption, immediately killing the battery.
  options:
    - '0.51 mW'
    - '10 µW'
    - '50 mW'
    - '25.005 mW'
