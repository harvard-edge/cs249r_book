title: Optimizing Inference for Watchdog Deadlines
scenario: An anomaly detection model is deployed on an ARM Cortex-M4 running at 168 MHz with no FPU. To comply with functional safety standards, the system must complete both an inference pass and a memory self-test within a strict 10 ms watchdog timer window. Currently, the 2 million MAC INT8 model uses standard C loops, taking too long and triggering watchdog resets before the self-test can complete.
question: How can CMSIS-NN SIMD keep inference and memory self-test within the 10 ms watchdog window?
details:
  realistic_solution: 'The correct approach is to utilize the CMSIS-NN library to leverage the Cortex-M4''s DSP extensions, specifically the SIMD instructions that perform 2x INT8 MACs per cycle. This drastically reduces inference latency, ensuring deterministic execution that safely fits within the watchdog window alongside the self-test routines.'
  common_mistake: |
    **The Pitfall:** Increasing clock speed or watchdog window.
    **The Rationale:** Candidates fail to utilize CMSIS-NN SIMD capabilities and suggest hardware or constraint modifications that violate safety certifications.
    **The Consequence:** The system fails compliance checks or triggers thermal violations, missing the real hardware optimization path.
  napkin_math: |
    **Assumptions & Constraints:**
    - CPU: Cortex-M4 at 168 MHz (no FPU).
    - Deadline: 10 ms watchdog window.
    - Model size: 2M MACs INT8.
    - Standard C loop: ~4 cycles/MAC.
    - CMSIS-NN SIMD: 2x INT8 MACs/cycle (0.5 cycles/MAC effective + overhead).

    **Calculations:**
    - Standard C: 2M MACs * 4 cycles = 8M cycles.
    - Standard C Time: 8M / 168 MHz = 47.6 ms (Fails deadline).
    - CMSIS-NN SIMD: 2M MACs / 2 MACs/cycle = 1M cycles. Add 20% overhead = 1.2M cycles.
    - SIMD Time: 1.2M / 168 MHz = 7.14 ms.
    - Remaining time for self-test: 10 ms - 7.14 ms = 2.86 ms.

    **Conclusion & Interpretation:**
    - **Result: 7.14 ms (Compute-Bound)**. Using CMSIS-NN SIMD instructions fits the execution comfortably within the 10 ms window.
