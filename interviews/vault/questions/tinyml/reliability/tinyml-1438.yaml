title: Graceful Anomaly Detection on Constrained TinyML
scenario: You are deploying a TinyML model for real-time anomaly detection on an ARM Cortex-M4 STM32F4 microcontroller. This device operates at 168 MHz, has 256 KB of SRAM, and crucially, lacks a Floating Point Unit (FPU). The primary model, a compact CNN, requires 100 KB SRAM and averages 100k MACC operations per inference, taking 20ms to process a 100-sample sensor window. The system has a strict 30ms processing deadline for each window. Under transient thermal throttling or unexpected data spikes, available CPU cycles can reduce by 30% or SRAM can be restricted to 150 KB.
question: How would you design a graceful degradation strategy, considering degradation ladders, model fallbacks, fail-safe vs. fail-operational modes, and potential quality-of-service shedding?
details:
  realistic_solution: 'Implement a degradation ladder:

    1.  **Level 0 (Optimal):** Full CNN model. Achieves highest accuracy and specificity.

    2.  **Level 1 (Minor Degradation):** If CPU cycles are reduced or the processing deadline is threatened (e.g., if current load pushes inference time close to 30ms), switch to a smaller, quantized ML model (e.g., a shallow MLP or a decision tree). This model should be optimized for integer arithmetic, require significantly less SRAM (e.g., 50 KB) and fewer MACC operations (e.g., 20k), reducing inference time to ~5ms. This maintains high recall for critical anomalies with slightly lower precision.

    3.  **Level 2 (Significant Degradation):** If both ML models fail to meet the deadline or SRAM is critically low, fall back to a simple rule-based heuristic (e.g., thresholding, rate-of-change detection). This uses minimal SRAM (<10 KB) and CPU cycles (<1ms), ensuring fail-operational status by detecting obvious, large deviations.

    4.  **Quality-of-Service Shedding:** If data spikes cause input buffer overflows, implement adaptive sampling (e.g., process every other sample) or reduce the dimensionality of input features to lower the processing burden across all degradation levels.

    5.  **Fail-Safe:** In extreme, unrecoverable situations (e.g., continuous overload, sensor failure, memory corruption), the system enters a fail-safe state, logging the event, activating a pre-defined warning mechanism (e.g., watchdog timer reset, safety relay trip), and halting non-essential operations. All models and logic must be designed with fixed-point or integer arithmetic from the outset to fully leverage the M4''s capabilities without FPU emulation overhead.'
  common_mistake: |
    **The Pitfall:** Ignoring the lack of an FPU and designing models that heavily rely on floating-point arithmetic.
    **The Rationale:** Engineers assume modern microcontrollers all contain FPUs or that software emulation is "fast enough."
    **The Consequence:** The model suffers significant performance penalties when emulated in software, failing strict latency constraints or causing out-of-memory errors due to lack of fallback planning.
  napkin_math: |
    **Assumptions & Constraints:**
    - STM32F4 (168 MHz, no FPU). Target Latency: 30 ms.
    - Optimal CNN: 100k MACCs.
    - CPU Throttled: 117.6 MHz (30% reduction).
    - Fallback Model: 20k MACCs.

    **Calculations:**
    - Optimal CNN full speed: 20 ms / 100k MACCs = 200 ns/MACC (33.6 cycles/MACC).
    - Optimal CNN throttled: 3,360,000 cycles / 117.6 MHz = 28.57 ms.
    - Fallback full speed: 20,000 MACCs × 33.6 cycles/MACC = 672,000 cycles -> 4 ms.
    - Fallback throttled: 672,000 cycles / 117.6 MHz = 5.71 ms.

    **Conclusion & Interpretation:**
    - **Result: 5.71 ms (Compute-Bound)**. The optimal CNN skirts the 30ms edge when throttled, validating the need for a 5.71ms fallback model to guarantee latency SLAs.
