title: SRAM Budgeting for On-Device Adversarial Detection
scenario: You are deploying an image classification model on an MCU with 512 KB of SRAM. Your 8-bit quantized model requires 200 KB for weights and activations. You've implemented an on-device adversarial perturbation detection mechanism that stores multiple 8-bit quantized, 4096-element 'ideal' feature vectors for each of the 10 classes.
question: How many additional 4096-element INT8 feature vectors per class fit in remaining SRAM for an on-device adversarial detector?
details:
  realistic_solution: Calculate total available bytes, subtract the baseline model footprint, calculate the footprint of a single vector array spanning all classes, and divide the remaining SRAM by that per-class footprint. Ensure all calculations use exact byte boundaries (1024 bytes/KB) and truncate via floor() to guarantee a uniform vector distribution across all 10 classes, preventing systemic bias in the adversarial detector.
  common_mistake: |
    **The Pitfall:** Failing to uniformly distribute available memory across classes or making unit conversion errors.
    **The Rationale:** Engineers use rough base-10 estimates (1000 bytes = 1 KB) or fail to subtract the base model overhead.
    **The Consequence:** The system experiences OOM errors at runtime or heavily biases its adversarial detection if it cannot store a balanced number of reference vectors per class.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total SRAM: 512 KB = 524,288 Bytes.
    - Base Model Memory: 200 KB = 204,800 Bytes.
    - Feature Vector: 4096 INT8 elements = 4096 Bytes. Classes: 10.

    **Calculations:**
    - Remaining SRAM: 524,288 - 204,800 = 319,488 Bytes.
    - Total Vector Size across 10 classes: 10 * 4096 = 40,960 Bytes/set.
    - Max Vector Sets: floor(319,488 / 40,960) = floor(7.799) = 7.

    **Conclusion & Interpretation:**
    - **Result: 7 (Memory-Bound)**. Exactly 7 additional vectors per class fit uniformly in SRAM.
