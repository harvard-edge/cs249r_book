title: 'Tinyml New 0028'
scenario: 'A deployed camera-based TinyML model drops from 95% accuracy to 60% after 6 months in an industrial environment. Re-running the identical model on the original test set still yields 95%.'
question: 'What physical sensor degradation explains the camera TinyML model''s field accuracy drop while test-set accuracy remains 95%?'
details:
  realistic_solution: 'The symptom is out-of-distribution (OOD) data caused by physical sensor degradation, specifically dust or grease accumulating on the camera lens. The model relies on sharp edges and high contrast, which the physical occlusion softens. The solution is to implement continuous monitoring of image sharpness, trigger a maintenance alert to clean the lens, or use data augmentation with blur during training.'
  common_mistake: 'Assuming software model drift while ignoring physical degradation of the edge sensors in harsh environments.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Dust Accumulation: 50% lux reduction.
    - High-frequency delta original: 100.
    - Confidence threshold: 0.5.

    **Calculations:**
    - Attenuated delta (due to dust blur) = 20.
    - Softmax confidence scales with activation magnitude.
    - Confidence drop = 0.95 to 0.45.
    - 0.45 < 0.5 threshold = Classification Failure.

    **Conclusion & Interpretation:**
    - **Result: 0.45 Confidence (Data-Bound)**. Physical occlusion acts as an analog low-pass filter, erasing the high-frequency edges the model relies upon, leading to severe OOD confidence drops.
