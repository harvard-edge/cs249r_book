title: Understanding Flash Wear Out in High Frequency Checkpointing
scenario: A tinyML system running off harvested solar energy writes a backup of its inference state (1 KB) to internal Flash memory before brownouts.
question: Explain why standard internal Flash memory might be unsuitable for this high-frequency checkpointing, and what alternative on-chip component is preferred.
details:
  realistic_solution: 'Standard internal Flash memory has a limited endurance (often 10,000 to 100,000 erase/write cycles) and requires blocking page erases. A better alternative is to write to an external FRAM or use a battery-backed SRAM retention mode, supporting virtually unlimited writes.'
  common_mistake: |
    **The Pitfall:** Believing flash memory can be written to byte-by-byte indefinitely.
    **The Rationale:** Engineers used to SRAM or modern SSDs with wear leveling often forget that microcontroller internal flash requires blocking page erases and has limited endurance.
    **The Consequence:** The flash memory wears out prematurely, causing irreversible hardware failure and data corruption.
  napkin_math: |
    **Assumptions & Constraints:**
    - Internal Flash endurance: ~100,000 cycles.
    - Frequency: 10 brownout writes per day.

    **Calculations:**
    - Endurance Failure: 100,000 cycles / 10 writes/day = 10,000 days.

    **Conclusion & Interpretation:**
    - **Result: 10,000 days (Hardware-Bound).** While 10,000 days seems long, highly erratic solar systems might brown out 1000x a day, killing flash in under 100 days. Use FRAM or NVRAM instead.
