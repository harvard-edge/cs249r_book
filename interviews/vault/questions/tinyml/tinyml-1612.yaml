title: Explain SRAM weight copying to eliminate external SPI flash latency
scenario: An engineer ports a 100KB wake-word model to a Cortex-M4 with 256KB of SRAM,
  but notices it executes extremely slowly because weights are read directly from
  external SPI flash.
question: Explain how relocating the weights can improve inference speed given the
  microcontroller's memory layout.
details:
  realistic_solution: Reading from external SPI flash involves severe serialization
    bottlenecks. Because the 100KB weights easily fit within the 256KB SRAM, the firmware
    should copy the weights into internal SRAM at boot time. This changes memory accesses
    from slow serial bus cycles to single-cycle SRAM reads, massively accelerating
    matrix multiplications.
  common_mistake: Assuming microcontrollers automatically cache external Flash into
    SRAM, failing to realize bare-metal edge environments require explicit memory
    copying.
  napkin_math: 100KB weights + overhead < 256KB total internal SRAM
