title: The Hung Sensor Problem
scenario: You've deployed a remote wildlife audio sensor powered by a battery. The device normally wakes
  up, runs a 1-second inference task consuming 50 mW, and then returns to a 10 µW deep sleep state. The
  entire cycle repeats every 100 seconds. A software bug causes the device to occasionally get stuck in
  its 'active' state instead of returning to sleep.
question: "What average power draw results if the wildlife sensor gets stuck in its active state?"
details:
  realistic_solution: A watchdog timer is a hardware peripheral that automatically resets the microcontroller
    if it doesn't receive a signal (a 'kick' or 'pet') from the software within a predefined period. To
    mitigate the hang, you would set the watchdog's timeout to be slightly longer than the normal 1-second
    active task (e.g., 1.5 seconds). If the software hangs, it fails to kick the watchdog. The timer then
    expires and triggers a hardware reset, forcing the device out of the stuck state and back to a normal
    boot cycle.
  common_mistake: Engineers new to embedded systems often only focus on active power draw and forget that
    for low-duty-cycle applications, the *sleep current* and the time spent sleeping dominate the total
    energy budget. A common error is to calculate the normal average power instead of the average power
    during the failure condition, or to incorrectly average the active and sleep power states without
    considering the time spent in each.
  napkin_math: 'Normal 100s cycle: Active energy = 50 mW * 1s = 50 mJ. Sleep energy = 10 µW * 99s = 0.99
    mJ. Total = 50.99 mJ per 100s. Average Power = 50.99 mJ / 100s = 0.51 mW. If a software bug leaves
    it stuck active, average power jumps to a constant 50 mW. This 100x increase in power draw (50 / 0.51)
    will drain a year-long battery in just 3-4 days!'
  options:
  - 0.51 mW
  - 10 µW
  - 50 mW
  - 25.005 mW
  correct_index: 2
