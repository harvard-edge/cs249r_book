title: Tinyml New 0011
scenario: A 150KB compiled TinyML model causes a HardFault (OOM) on a Cortex-M4 with 256KB of SRAM during the first inference pass, despite the weights being permanently stored in Flash memory.
question: Why does a 150 KB Flash-resident TinyML model HardFault from OOM during first inference on a 256 KB SRAM Cortex-M4?
details:
  realistic_solution: 'The OOM is caused by the peak memory footprint of the activation buffers. While weights reside in Flash, intermediate activations must reside in SRAM. MobileNet architectures with inverted residuals expand the channel depth in the middle of the block, causing a massive but temporary spike in SRAM requirement. Optimize with in-place depthwise operations or patch-based inference.'
  common_mistake: |
    **The Pitfall:** Verifying static weight size while ignoring dynamic activation size.
    **The Rationale:** Engineers check that the 150KB weights fit in Flash, but forget that intermediate tensors (activations) must reside in SRAM during inference.
    **The Consequence:** The model expands channel depth dramatically during a residual block, instantly overflowing the SRAM and causing a HardFault.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SRAM: 256KB.
       - Input tensor: 128x128x3 INT8.
       - Residual block expansion factor: 6x.
    2. **Calculations:**
       - Input size: 128 * 128 * 3 * 1 byte = 49,152 bytes (~48 KB).
       - Expanded activation size: 128 * 128 * (3 * 6) = 128 * 128 * 18 = 294,912 bytes (~288 KB).
       - Memory required: 288 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Crash.** 288 KB strictly exceeds the 256 KB SRAM limit, triggering an immediate out-of-memory HardFault.
