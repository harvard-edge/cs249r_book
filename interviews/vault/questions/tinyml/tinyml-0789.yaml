title: Tinyml New 0011
scenario: A 150KB compiled TinyML model causes a HardFault (OOM) on a Cortex-M4 with 256KB of SRAM during
  the first inference pass, despite the weights being permanently stored in Flash memory.
question: "Why does a 150 KB Flash-resident TinyML model HardFault from OOM during first inference on a 256 KB SRAM Cortex-M4?"
details:
  realistic_solution: The OOM is caused by the peak memory footprint of the activation buffers. While
    weights reside in Flash, intermediate activations must reside in SRAM. MobileNet architectures with
    inverted residuals expand the channel depth in the middle of the block, causing a massive but temporary
    spike in SRAM requirement. Optimize with in-place depthwise operations or patch-based inference.
  common_mistake: Only verifying the model's static weight size against Flash memory while ignoring the
    dynamic peak activation size required in SRAM.
  napkin_math: 'A 128x128x3 INT8 input = 49KB. Expanding by 6x inside a residual block: 128x128x18 = 294KB,
    which instantly exceeds the 256KB SRAM limit, triggering a HardFault.'
