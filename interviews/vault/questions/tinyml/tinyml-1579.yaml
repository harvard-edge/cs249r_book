title: Audio Inference Queue
scenario: Audio frames arrive at a Cortex-M4 queue at 20 frames/sec. The model processes
  one frame in 40ms.
question: Summarize the relationship between arrival rate, service rate, and queue
  length using M/M/1 queueing principles to find the system utilization.
visual:
  kind: svg
  path: tinyml-1579.svg
  alt: Hockey stick curve showing queue length exploding as utilization approaches
    1.
  caption: M/M/1 Queue Length vs Utilization
details:
  realistic_solution: The candidate calculates the service rate (25 frames/sec) and
    utilization (arrival / service). Since utilization is 0.8, the queue is stable
    but will have a non-zero wait time.
  common_mistake: Calculating utilization incorrectly by multiplying frames/sec directly
    with ms without converting units.
  napkin_math: 20 * 0.04 = 0.8 utilization
