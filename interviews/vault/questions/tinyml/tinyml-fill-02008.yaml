title: Queue Stability on Cortex-M4 Sensor Fusion Pipeline
scenario: A Cortex-M4 (168MHz, 256KB SRAM) reads IMU samples at 200Hz and runs a gesture classifier. The
  classifier takes 3ms per inference. An engineer asks if the queue is stable. What is the stability condition
  for an M/M/1 queue and does this system satisfy it?
details:
  realistic_solution: M/M/1 stability requires ρ=λ/μ<1. λ=200 samples/s, μ=333 samples/s (1/3ms). ρ=200/333=0.6.
    Queue is stable. Mean items in system L=ρ/(1-ρ)=0.6/0.4=1.5. At 256KB SRAM, easily buffer 10-20 samples.
    System is comfortably stable with 40% headroom.
  common_mistake: Checking only average load; not verifying the strict inequality ρ<1 required for queue
    stability.
  napkin_math: λ=200/s, service=3ms → μ=333/s. ρ=0.6<1 → stable. Mean queue length=0.6/0.4=1.5 samples.
    Each IMU sample ≈ 12 bytes → buffer cost is negligible.
