title: The Model Checksum Paradox
scenario: You deploy a `.tflite` model to an MCU via an OTA update. To ensure the file isn't corrupted, you calculate a CRC32 checksum of the file on your server, send it to the device, and the device calculates the CRC32 of the downloaded file. They match. The device reboots. The model fails to load, crashing the device.
question: How can a file have a perfect checksum but still be completely invalid?
details:
  realistic_solution: 'CRC32 validated the downloaded bytes in RAM, but not what was written to flash. Flash memory requires sector erasure (all bits set to 0xFF) before writing. If the sector wasn''t erased first, writing 0xAA over existing 0x0F produces 0x0A (bitwise AND of old and new). The data in flash is silently corrupted. Fix: implement a three-step verification: (1) CRC the download in RAM, (2) erase the target sector, (3) write to flash, (4) read back from flash and CRC again. The second CRC catches flash write errors, stuck bits, and erase failures. Cost: one extra flash read (~10ms for 200 KB).'
  common_mistake: |
    **The Pitfall:** Assuming CRC32 collisions caused the corruption.
    **The Rationale:** Candidates blame the hashing algorithm, failing to understand that the CRC validated the RAM download, not what was subsequently written to Flash memory.
    **The Consequence:** Wasting time debugging OTA transfer protocols while ignoring the underlying Flash erase/write failure.
  napkin_math: |
    - **NOR Flash Properties**: Bits can only be written from 1 to 0. Erasing resets them to 1 (0xFF).
    - **Bitwise AND Issue**: Writing 0xAA (10101010) over unerased data like 0x0F (00001111) results in a hardware bitwise AND: 0x0A (00001010).
    - **Result**: The file on disk is silently corrupted.
