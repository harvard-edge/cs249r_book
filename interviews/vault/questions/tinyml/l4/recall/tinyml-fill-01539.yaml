id: tinyml-fill-01539
title: Optimizing TinyML Data Curation on nRF5340 for Active Learning
topic: dataset-curation
status: published
provenance: imported
scenario: Your team is developing a tinyML solution for predictive maintenance, deploying an anomaly detection
  model on a Nordic nRF5340. The device monitors industrial machinery, collecting high-frequency vibration
  data at 20KB/sec. Due to real-world variations not present in the initial training set, the model exhibits
  a high false positive rate. To continuously improve accuracy, you've decided to implement an active
  learning pipeline. Currently, the nRF5340 (128 MHz CPU, 256 KB SRAM, 1 MB flash) buffers raw sensor
  data in its 256KB SRAM before transmitting it via BLE to a backend for human annotation. However, the
  limited SRAM (256KB) fills up quickly, forcing frequent, small data offloads every ~12.8 seconds. This
  results in significant BLE protocol overhead and provides annotators with insufficient contextual data,
  severely bottlenecking the rate of effective data acquisition and labeling. How would you diagnose and
  optimize this on-device data curation and transmission bottleneck to accelerate model improvement, and
  how would you quantify the impact of your proposed solution?
details:
  realistic_solution: Implement an on-device, uncertainty-based active learning strategy. The model itself,
    or a lightweight companion module, would evaluate incoming data streams and flag only the most 'uncertain'
    or novel samples. Instead of sending raw vibration data, the device would extract and transmit highly
    compressed features or metadata related to these uncertain events, potentially along with a very short
    snippet of raw data (e.g., 1-2 seconds) around the flagged event for human context. This approach
    leverages the nRF5340's CPU for intelligent filtering, drastically reduces the data volume transmitted
    over BLE, and focuses annotator effort on the most impactful samples.
  common_mistake: A common mistake is to simply increase the sampling rate or the amount of raw data sent,
    assuming more data is always better, without considering the nRF5340's SRAM and BLE bandwidth limitations.
    Another pitfall is using a naive uncertainty sampling that still requires human review of large raw
    data segments, overwhelming the annotators and the communication channel.
  napkin_math: "Current: 20 KB/sec raw data; 256 KB SRAM buffer fills in 12.8 seconds. Each BLE transfer\
    \ has significant overhead (e.g., 5KB/transfer). Assuming a 5KB overhead per transfer, the effective\
    \ data rate is significantly lower. \nProposed: If on-device uncertainty sampling reduces the data\
    \ marked for review to 10% of the stream, and we transmit 2KB/sec of compressed features/metadata\
    \ plus 1KB/sec of raw snippets for context (total 3KB/sec), this represents a ~6.6x reduction in data\
    \ volume transmitted over BLE (20KB/sec vs 3KB/sec). This dramatically reduces the number of BLE transmissions\
    \ and associated overhead, enabling more efficient utilization of bandwidth and providing annotators\
    \ with more focused, relevant contexts per transmission, thereby accelerating data curation throughput\
    \ by a factor of 5-10x, depending on overhead specifics."
