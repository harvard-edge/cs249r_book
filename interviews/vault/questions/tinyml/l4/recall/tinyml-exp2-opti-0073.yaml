schema_version: 1
id: tinyml-exp2-opti-0073
title: ESP32-S3 Roofline Analysis for Wake-Word
topic: roofline-analysis
status: published
provenance: imported
scenario: You are deploying an INT8 wake-word detection model on an ESP32-S3 with a 240 MHz Xtensa core,
  512 KB of internal SRAM, and 8 MB of PSRAM. The final fully connected layer contains 256 KB of weights
  and processes a single audio frame at a time (batch size 1). Profiling shows this layer takes about
  1.6 ms to execute, achieving only a tiny fraction of the chip's vector extension peak performance. Using
  roofline analysis, diagnose the compute vs. memory bottleneck and quantify the exact speedup if you
  permanently pin these weights to the 512 KB internal SRAM instead of fetching them from PSRAM.
details:
  realistic_solution: The correct approach is to calculate the arithmetic intensity and compare it to
    the system's ridge point. Since a fully connected layer with batch size 1 performs just 1 MAC (2 operations)
    per weight byte, the intensity is 2 OPs/byte. Fetching from PSRAM limits throughput drastically. The
    solution is to recognize that the 256 KB weight tensor fits comfortably within the 512 KB internal
    SRAM, and moving it there unlocks much higher memory bandwidth, providing a massive speedup without
    algorithmic changes.
  common_mistake: Candidates often assume the ESP32-S3 lacks raw compute power and immediately propose
    model pruning or reducing the input resolution. They fail to calculate the arithmetic intensity of
    a batch=1 dense layer, missing that the workload is severely memory-bandwidth bound by the slow PSRAM
    interface rather than limited by the Xtensa core's MAC capability.
  napkin_math: '1. ESP32-S3 Compute Peak: 240 MHz * 16 MACs/cycle * 2 OPs = 7.68 GOPS (INT8 peak).

    2. PSRAM Bandwidth: Octal SPI at 80 MHz DDR = 160 MB/s.

    3. Layer Arithmetic Intensity: 1 MAC (2 OPs) per 1 byte of weight loaded = 2 OPs/byte.

    4. PSRAM Bottleneck: 160 MB/s * 2 OPs/byte = 320 MOPS. (320 MOPS << 7.68 GOPS). Execution time = ~512
    KOPs / 320 MOPS = 1.6 ms.

    5. SRAM Fix: Internal SRAM provides ~960 MB/s (32-bit word per 240MHz cycle). New throughput = 960
    MB/s * 2 OPs/byte = 1920 MOPS (1.92 GOPS).

    6. Speedup: 1.92 GOPS / 0.32 GOPS = 6x speedup (execution drops to ~0.26 ms).'
