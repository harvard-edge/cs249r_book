schema_version: 1
id: tinyml-0098
title: Power Profiling for MCU Inference
topic: duty-cycling
status: published
provenance: imported
scenario: Your product manager asks 'how long will the battery last?' You answer '6 months' based on the
  datasheet's active and sleep current specs. Three months later, devices start dying in the field. Your
  estimate was 2× too optimistic. What did you miss, and how do you build an accurate power profile?
details:
  realistic_solution: 'The datasheet gives a lower bound, not a prediction. Real power profiling requires
    measuring the actual device. Key factors omitted: (1) Peripheral leakage: sensors, voltage regulators,
    LEDs in standby draw 10-20 uA combined, often exceeding MCU sleep current (5 uA). (2) Wake-up transitions:
    MCU takes 2-5 ms to transition from deep sleep to active, drawing ~10 mA. At 1 wake/minute: adds 5
    uA average. (3) Temperature: battery capacity derate 20-30% below 0C. A 225 mAh CR2032 delivers only
    160 mAh at -10C. (4) Battery self-discharge: 1-2%/year. (5) Voltage regulator quiescent current: 2-10
    uA. Corrected estimate: active = 30 uA (1 inference/min), peripherals = 15 uA, transitions = 5 uA,
    regulator = 5 uA. Total = 55 uA. Battery derated to 180 mAh. Life = 180 mAh / 0.055 mA = 3,273 hours
    = 136 days. The 2x gap between estimate (10 months) and reality (4.5 months) is explained.'
  common_mistake: '"Use the datasheet''s typical current values." Datasheets report typical values at
    25°C with minimal peripherals active. Real-world power is always higher.'
  napkin_math: 'Datasheet estimate: 30 mA active × 50ms + 5 µA sleep × 950ms = 1.5 mA + 4.75 µA = 1.505
    mA average. Battery life: 225 mAh / 1.505 mA = 149 hours = 6.2 days... wait, that''s not 6 months.
    The engineer probably assumed 1 inference/minute, not 1/second. At 1/min: 30 mA × 50ms / 60s = 25
    µA average active + 5 µA sleep = 30 µA. Battery: 225/0.03 = 7,500 hours = 312 days ≈ 10 months. Real-world:
    add peripherals (+15 µA), transitions (+5 µA), temperature (+10 µA) = 60 µA. Battery (derated to 180
    mAh): 180/0.06 = 3,000 hours = 125 days ≈ 4 months. The 2× gap between estimate (10 months) and reality
    (4 months) is explained by peripherals, transitions, temperature, and battery derating.'
