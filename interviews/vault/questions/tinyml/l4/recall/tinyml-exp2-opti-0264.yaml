schema_version: 1
id: tinyml-exp2-opti-0264
title: Optimizing CNN Inference on ESP32-S3 via INT8 Lowering
topic: graph-compilation
status: published
provenance: imported
scenario: You are deploying a 1.2M MAC keyword spotting CNN to an ESP32-S3 (240 MHz dual-core Xtensa,
  512 KB SRAM, 8 MB PSRAM). The model currently uses FP32 weights totaling 1 MB, forcing the weights into
  the slower PSRAM, and inference takes around 15 ms, missing your 5 ms real-time deadline. The compiler
  has not applied quantization or operator lowering. You need to diagnose the bottleneck and quantify
  the performance gains from compiling the graph for INT8 vector extensions.
details:
  realistic_solution: 'The correct approach is to configure the compiler to lower the FP32 graph to an
    INT8 quantized graph. This achieves two things: it shrinks the model size by 4x, allowing it to fit
    entirely within the 512 KB SRAM (eliminating PSRAM access latency), and it enables the ESP32-S3''s
    vector extensions for INT8, which can compute multiple MACs per cycle natively.'
  common_mistake: Candidates often suggest pruning or architecture search without realizing that simply
    lowering operators to INT8 via the framework compiler leverages the hardware's vector instructions.
    They also frequently miss the memory hierarchy impact, failing to move the compressed model from PSRAM
    to SRAM.
  napkin_math: 'FP32 Model Size: 1 MB (PSRAM). FP32 Compute: 1.2M MACs * ~3 cycles/MAC (accounting for
    PSRAM stalls) = 3.6M cycles. Inference time @ 240 MHz = 3.6M / 240M = 15 ms. INT8 Model Size: 1 MB
    / 4 = 250 KB (Fits nicely in 512 KB SRAM). INT8 Compute: 1.2M MACs / 8 effective MACs/cycle (via INT8
    vector extensions) = 150,000 cycles. Inference time @ 240 MHz = 150,000 / 240M = 0.625 ms. Speedup
    is roughly 24x, easily meeting the 5 ms deadline.'
