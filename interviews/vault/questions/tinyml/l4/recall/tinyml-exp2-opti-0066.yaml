id: tinyml-exp2-opti-0066
title: Hardware-Aware NAS Constraints on Dual-Core MCU
topic: neural-architecture-search
status: published
provenance: imported
scenario: You are using a Hardware-Aware NAS to design a Keyword Spotting model for the Nordic nRF5340.
  Your search space initially constrained the model to 220 KB peak SRAM and 15 million MACs, which technically
  fits within the 256 KB SRAM and 128 MHz app core specifications. However, when deployed alongside the
  BLE 5.3 stack running on the 64 MHz network core, the device experiences frequent out-of-memory hard
  faults and dropped Bluetooth connections. Analyze the system-level interactions causing this bottleneck
  and quantify the new constraints for your NAS.
details:
  realistic_solution: 'The bottleneck is two-fold: memory contention and latency blocking. The BLE stack
    and network core require reserved shared SRAM, meaning the 220 KB model footprint overflows the actually
    available memory when BLE buffers are allocated. Furthermore, a 15M MAC inference takes too long to
    execute, violating the BLE connection interval timing. The fix requires updating the NAS multi-objective
    constraints to target a strictly partitioned SRAM budget and a maximum MAC count that guarantees inference
    completes well within the BLE connection interval.'
  common_mistake: Candidates often treat the stated hardware specifications (256 KB SRAM, 128 MHz) as
    completely available to the neural network. They fail to account for the shared resources in a dual-core
    architecture, specifically forgetting that the BLE stack, RTOS, and network core require dedicated
    SRAM and strict timing deadlines to maintain connection intervals.
  napkin_math: 'SRAM Constraint: Total 256 KB - BLE stack (~64 KB) - RTOS/App buffers (~32 KB) = 160 KB
    max peak memory for NAS. Latency/MAC Constraint: To avoid dropping a standard 50ms BLE connection
    interval, inference must complete in ~30ms. On the 128 MHz app core, assuming an optimistic 2 clock
    cycles per MAC (with DSP instructions): (30ms * 128,000,000 cycles/sec) / 2 cycles/MAC = 1.92 million
    MACs. The NAS constraints must be updated from 220 KB / 15M MACs down to < 160 KB and < 1.92M MACs.'
