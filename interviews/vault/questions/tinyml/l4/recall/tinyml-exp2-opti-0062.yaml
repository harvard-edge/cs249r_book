schema_version: 1
id: tinyml-exp2-opti-0062
title: Distillation vs Pruning for INT8 SIMD
topic: knowledge-distillation
status: published
provenance: imported
scenario: A keyword spotting model must run within 20ms on an ARM Cortex-M4 (STM32F4) operating at 168
  MHz with no FPU. The team initially pruned a baseline model to 80% sparsity (leaving 1 million active
  MACs), but the inference latency remains around 60ms. You are tasked with analyzing why the sparse model
  is bottlenecked and quantifying how replacing it with a dense, distilled student model will achieve
  the latency target.
details:
  realistic_solution: The correct approach is to abandon unstructured pruning and train a smaller, dense
    student model using knowledge distillation to recover the accuracy lost from reduced capacity. By
    quantizing this dense student to INT8, the network can fully utilize the STM32F4's CMSIS-NN SIMD instructions,
    which execute two 8-bit MACs per cycle, entirely avoiding the missing FPU and branching bottlenecks.
  common_mistake: Candidates often assume unstructured pruning linearly reduces latency on microcontrollers.
    They fail to realize that without hardware support for sparsity, the branching overhead of skipping
    zeros in software destroys throughput and prevents the use of optimized CMSIS-NN SIMD instructions.
  napkin_math: 'Latency budget: 20 ms at 168 MHz = 3.36 million cycles. The pruned model (1M active MACs)
    uses sparse software loops averaging ~10 cycles/MAC due to branch penalties and memory fragmentation,
    requiring ~10 million cycles (approx 60ms). A dense distilled student with 2M MACs utilizing CMSIS-NN
    INT8 SIMD (2x MACs/cycle) averages ~1.5 cycles/MAC including memory loads. 2M MACs * 1.5 cycles/MAC
    = 3.0 million cycles (17.8 ms), successfully meeting the 20ms deadline while easily fitting within
    the 256 KB SRAM and 1 MB flash.'
