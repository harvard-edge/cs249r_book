schema_version: 1
id: tinyml-0573
title: On-Device Data Collection for Retraining
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You've deployed 2,000 vibration sensors on industrial motors, each running anomaly detection
  on a Cortex-M4 (1 MB flash, 256 KB SRAM). After 6 months, accuracy has drifted. Your ML team wants raw
  sensor data to retrain the model, but the devices only have BLE connectivity to a gateway. Design an
  on-device data logging strategy. How much data can you store, and how long does it take to upload?
details:
  realistic_solution: 'You cannot log raw data — 6.4 KB/s fills 114 KB of available flash in 18 seconds.
    Instead, use triggered logging: record only anomaly events (800 bytes compressed per event, ~10/day
    = 8 KB/day). Flash holds 14 days of triggered data. Upload via BLE at 60 KB/s takes 1.9s per device.
    For 2,000 devices through 10 gateways: 6.3 minutes total. This yields 284,000 labeled edge cases (227
    MB) — a rich retraining dataset despite each device having only 114 KB logging space. The key insight:
    log anomalies, not normal operation.'
  common_mistake: '"Log all raw sensor data to flash." A vibration sensor sampling at 3.2 kHz with 16-bit
    resolution produces 6.4 KB/s. The available flash fills in seconds, not days.'
  napkin_math: 'Raw data rate: 6.4 KB/s. Flash budget: 114 KB. Raw logging time: 114 / 6.4 = 17.8 seconds
    — useless. Triggered + compressed: 800 bytes/event × 10 events/day = 8 KB/day. 114 KB / 8 KB = 14
    days. Upload: 114 KB / 60 KB/s = 1.9 s per device. Fleet (2,000 devices, 10 gateways): 6.3 min. Retraining
    dataset from fleet: 2,000 devices × 142 snapshots = 284,000 labeled edge cases. At 800 bytes each:
    227 MB — a rich retraining dataset from devices with only 114 KB of logging space each.'
