schema_version: 1
id: tinyml-0736
title: Quantization Error for INT4 on Cortex-M4
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: Your team wants to push a keyword spotting model from INT8 (150 KB, 92% accuracy) to INT4 (75
  KB, unknown accuracy) to free up flash for a second model. The Cortex-M4F has no native INT4 support
  — all arithmetic is 32-bit or 16-bit (via SMLAD). Estimate the accuracy impact of INT4 quantization
  and the actual inference speedup (or slowdown) on M4F hardware.
details:
  realistic_solution: 'INT4 on Cortex-M4F is a lose-lose: slower AND less accurate than alternatives.
    The M4F has no native INT4 instructions — unpacking INT4 to INT8/16 before arithmetic takes extra
    cycles, making INT4 ~2x slower than INT8 (35.8ms vs 17.9ms). Accuracy drops 3-8% with PTQ (84%) or
    3% with QAT (89%). Better alternative: prune the INT8 model to 50% sparsity, achieving 75KB (same
    size) at ~90% accuracy and 9ms inference (2x faster than dense INT8, 4x faster than INT4). INT4 only
    wins on hardware with native sub-byte SIMD like Cortex-M55 Helium or dedicated NPUs.'
  common_mistake: '"INT4 halves the model size and doubles the speed because you process twice as many
    values per register." On hardware with native INT4 support (NVIDIA GPUs, some NPUs), this is true.
    On a Cortex-M4F, there is no INT4 instruction — you must unpack INT4 values to INT8 or INT16 before
    arithmetic. The unpacking overhead can make INT4 *slower* than INT8.'
  napkin_math: 'INT8: 150 KB, 92% accuracy, 2 MACs/cycle → 17.9ms inference. INT4 (PTQ): 75 KB, ~84% accuracy,
    1 MAC/cycle → 35.8ms (2× slower). INT4 (QAT): 75 KB, ~89% accuracy, 1 MAC/cycle → 35.8ms. Pruned INT8
    (50%): 75 KB, ~90% accuracy, 2 MACs/cycle → 9.0ms (2× faster!). The pruned INT8 model is 4× faster
    than INT4 with better accuracy. INT4 on M4F is a lose-lose: slower AND less accurate than the pruned
    alternative. INT4 only makes sense on hardware with native sub-byte arithmetic (e.g., Cortex-M55 Helium
    with INT4 dot product, or dedicated NPUs).'
