id: tinyml-0712
title: The STM32H7 Dual-Bank Flash
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: Your STM32H743 has 2 MB flash organized as two 1 MB banks. Your ML model (350 KB) and firmware
  (200 KB) occupy Bank 1. You need to perform an OTA model update over BLE while the device continues
  running inference. Explain how dual-bank flash enables this, and calculate the update time and risk
  window.
details:
  realistic_solution: 'The STM32H743''s flash controller has two independent bank controllers. Bank 1
    and Bank 2 can perform simultaneous operations: one bank can be read (for code execution or weight
    access) while the other is being erased/programmed.'
  common_mistake: '"Flash can''t be read and written simultaneously — you must stop inference during the
    update." This is true for single-bank flash, but the STM32H7''s dual-bank architecture specifically
    enables read-while-write.'
  napkin_math: 'BLE transfer: 350 KB / 175 KB/s = 2.0s. Flash erase: 3 sectors × 2s = 6.0s. Flash program:
    0.175s. Verify: 0.001s. Swap: 0.01s. **Total update: 8.2 seconds.** Inference downtime: 0ms (read-while-write).
    Without dual-bank: must stop inference for erase+program = 6.2s downtime. For a safety-critical device
    (fall detector, gas sensor): 6.2s of blindness is unacceptable. Dual-bank eliminates this risk entirely.
    Flash wear: 10,000 erase cycles per sector. Daily OTA updates: 10,000 / 365 = **27.4 years** before
    wear-out.'
