schema_version: 1
id: tinyml-exp2-opti-0065
title: Optimizing Peak SRAM Footprint for CNN on STM32F4
topic: model-size-estimation
status: published
provenance: imported
scenario: You are deploying a depthwise separable CNN for keyword spotting onto an ARM Cortex-M4 (STM32F4)
  microcontroller. The model weights are quantized to INT8 and take up 400 KB, easily fitting within the
  1 MB flash. However, during execution, the system crashes due to out-of-memory errors, despite the total
  parameter size suggesting it should be fine. You need to analyze the runtime memory usage and propose
  an architectural optimization to make it fit within the strict 256 KB SRAM constraint.
details:
  realistic_solution: The solution requires analyzing the memory lifecycle to find the bottleneck layer
    with the highest peak SRAM usage. Since the STM32F4 has only 256 KB of SRAM, the system must hold
    the input tensor, output tensor, and any CMSIS-NN scratch buffers simultaneously for the widest layer.
    The optimization involves quantifying this peak and reducing the spatial dimensions or channel width
    of that specific bottleneck layer, or altering the topology to avoid wide intermediate representations.
  common_mistake: Candidates often only calculate the static memory footprint (weights in flash) and basic
    input/output sizes. They frequently overlook the peak activation memory (transient SRAM) required
    during intermediate layer execution, especially when memory managers cannot execute operations strictly
    in-place.
  napkin_math: Assume the widest layer has an input tensor of 64x64x32 INT8 (128 KB) and produces an output
    tensor of 64x64x32 INT8 (128 KB). A non-in-place operation requires both in SRAM, totaling 256 KB.
    Adding a conservative 10 KB scratchpad for CMSIS-NN im2col buffers and 4 KB for system stack yields
    270 KB, exceeding the 256 KB STM32F4 SRAM limit. By adjusting the architecture to reduce the channel
    width of this specific layer to 16 channels, the tensors become 64 KB each. The new peak requirement
    is 64 KB (input) + 64 KB (output) + 10 KB (scratch) + 4 KB (stack) = 142 KB, successfully fitting
    the hardware.
