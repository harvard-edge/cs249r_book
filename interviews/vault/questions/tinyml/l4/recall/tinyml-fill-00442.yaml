schema_version: 1
id: tinyml-fill-00442
title: Optimizing Latency on Cortex-M7 for TinyML Inference
topic: profiling-bottleneck-analysis
status: published
provenance: imported
scenario: A TinyML application running on a Cortex-M7 microcontroller (480 MHz, 512 KB SRAM) with an Ethos-U55
  NPU (configured for 256 MAC/cycle) is experiencing unacceptably high inference latency for a real-time
  audio classification task. The model is a small CNN (e.g., 200k MACs per inference). You suspect a bottleneck
  is preventing the NPU from being fully utilized. Describe your approach to systematically identify the
  bottleneck (compute, memory, or I/O) and quantify its impact, leading to a reduction in inference latency.
  The system needs to achieve an end-to-end inference latency under 5ms.
details:
  realistic_solution: '1. **Initial Profiling Setup**: Utilize a combination of software and hardware
    profiling. On the Cortex-M7, instrument the code with timing markers (`DWT_CYCCNT` or equivalent)
    around key operations (data acquisition, preprocessing, NPU inference call, post-processing). Use
    a J-Link debugger for hardware trace (SWO) to capture these timestamps.

    2. **NPU Utilization Analysis**: Leverage Ethos-U55 specific profiling tools (e.g., Arm''s Cycle Model
    or actual hardware trace if available) to determine the NPU''s actual MAC/cycle utilization and identify
    any stalls (e.g., data starvation from memory).

    3. **Memory Access Patterns**: Analyze memory access patterns and cache hit/miss rates. Identify if
    the 512 KB SRAM is sufficient or if external flash accesses are causing stalls. Tools like Arm Streamline
    or custom memory monitors can help.

    4. **I/O Bottleneck Identification**: If data acquisition (e.g., ADC readings) is part of the inference
    pipeline, profile its latency and throughput.

    5. **Data Analysis**: Collect and visualize profiling data (e.g., flame graphs, timeline views) to
    pinpoint the exact code sections or hardware interactions contributing most to latency.

    6. **Quantification**: Once a bottleneck is identified (e.g., NPU waiting for data due to slow memory
    access), quantify its contribution to the total latency. This allows for targeted optimization.'
  common_mistake: Jumping directly to model quantization or pruning without first profiling the entire
    system. This often leads to optimizing a non-bottleneck component, yielding minimal real-world performance
    gains, or even introducing new issues like accuracy degradation without significant latency improvement.
  napkin_math: 'Given an Ethos-U55 with 256 MAC/cycle and a 480 MHz clock, the theoretical peak MACs/second
    = 256 MACs/cycle * 480 * 10^6 cycles/second = 122.88 GigaMACs/second.

    If the model has 200,000 MACs, the theoretical minimum NPU computation time = 200,000 MACs / (256
    MACs/cycle * 480 * 10^6 cycles/second) = 200,000 / (122.88 * 10^9) seconds ≈ 1.63 microseconds.

    If the observed NPU inference time is, say, 2 ms (2000 microseconds), this indicates a massive underutilization
    or significant overhead. The NPU is only operating at roughly (1.63 / 2000) * 100% ≈ 0.08% of its
    theoretical peak for this specific operation, suggesting data transfer or control overhead is the
    dominant factor, not raw computation. We need to find the cause of the 1998.37 us overhead.'
