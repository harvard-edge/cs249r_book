id: tinyml-exp2-opti-0072
title: Optimizing OOD Safety Guardrails on ESP32-S3
topic: responsible-ai
status: published
provenance: imported
scenario: We are deploying an audio classifier on an ESP32-S3 (240 MHz dual-core, 512 KB SRAM, 8 MB PSRAM)
  for a smart home device. To comply with our Responsible AI framework, we implemented an Out-of-Distribution
  (OOD) detector as a guardrail to safely reject demographic outliers. The guardrail uses a 10-component
  Gaussian Mixture Model (GMM) on 128-dimensional FP32 embeddings. This safety check is currently causing
  memory thrashing and exceeding our strict 50ms latency budget. How do you diagnose the bottleneck and
  optimize the guardrail?
details:
  realistic_solution: The bottleneck is the memory footprint of the FP32 GMM covariance matrices exceeding
    the 512 KB SRAM, forcing slow PSRAM fetches. The optimal fix is to replace the GMM with an INT8 K-means
    centroid distance approach, keeping the guardrail localized entirely in SRAM and utilizing the ESP32-S3's
    vector extensions for rapid INT8 execution.
  common_mistake: Candidates often suggest pruning the main model, reducing the embedding size arbitrarily,
    or offloading the guardrail to the cloud (which violates privacy policies). They typically fail to
    identify that the FP32 covariance matrices exceed the fast SRAM and spill into the much slower PSRAM.
  napkin_math: 'Diagnosis: 10 GMM components * (128x128) covariance matrix * 4 bytes (FP32) = 655,360
    bytes (640 KB). This exceeds the 512 KB SRAM limit, forcing PSRAM usage. Fix: 10 K-means centroids
    * 128 dimensions * 1 byte (INT8) = 1,280 bytes, fitting effortlessly in SRAM. Computation: With the
    ESP32-S3''s 128-bit vector ALU (capable of 16 INT8 MACs per cycle), the distance to 10 centroids requires
    1280 MACs. 1280 MACs / 16 = 80 cycles, completely eliminating the latency bottleneck.'
