schema_version: 1
id: tinyml-0735
title: The Fixed-Point Accumulator Overflow
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: Your INT8 quantized Conv2D layer on a Cortex-M4 has a 3×3 kernel with 512 input channels. Each
  multiply produces an INT16 intermediate, and products are accumulated into an INT32 register. Your test
  engineer reports that one specific input image produces wildly wrong outputs for this layer. Diagnose
  the overflow condition and calculate the maximum safe number of accumulations.
details:
  realistic_solution: 'Trace the arithmetic precisely: INT8 × INT8 max product: 128 × 128 = 16,384. Conv2D
    3×3×512: 4,608 accumulations. Worst-case sum: 4,608 × 16,384 = 75.50M. INT32 max: 2.15B. Headroom:
    28.5×. Safe. For 3×3×2048 (large ResNet layer): 18'
  common_mistake: '"INT32 can hold ±2 billion — there''s no way 512 × 9 = 4,608 accumulations can overflow
    it." This is wrong because it assumes each product is small. The worst case is when all products are
    at the maximum magnitude.'
  napkin_math: 'INT8 × INT8 max product: 128 × 128 = 16,384. Conv2D 3×3×512: 4,608 accumulations. Worst-case
    sum: 4,608 × 16,384 = 75.50M. INT32 max: 2.15B. Headroom: 28.5×. Safe. For 3×3×2048 (large ResNet
    layer): 18,432 × 16,384 = 301.99M. Headroom: 7.1×. Still safe. For 3×3×8192 (unlikely on MCU): 73,728
    × 16,384 = 1.21B. Headroom: 1.78×. With zero-point correction: potential overflow. Threshold for guaranteed
    safety: $N < \frac{2^{31}}{2 \times 128^2} = 65,536$ accumulations.'
