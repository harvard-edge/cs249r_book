title: 'Dataset Curation: Optimize Dataset Size vs Model Accuracy on Cortex-M4'
topic: dataset-curation
status: published
provenance: imported
scenario: 'Your keyword spotting model for Cortex-M4 (168MHz, 256KB SRAM) achieves 89% accuracy with 10K
  training samples/class. You need 95% accuracy. Adding more data is expensive ($0.25/sample collected
  and labeled). Optimize the path to 95% accuracy: more data, augmentation, or model improvements.'
details:
  realistic_solution: 'Data-accuracy curve analysis: typical KWS models saturate around 15-20K samples/class.
    Augmentation (noise, speed) can match the effect of 2-3× more real data. Model improvements (adding
    depthwise conv layers) may gain 2-3% without any new data.'
  common_mistake: Throwing more labeled data at the problem without first saturating augmentation and
    architecture improvements — data has diminishing returns.
  napkin_math: 'Current: 89% at 10K/class. Options: (A) More data: doubling to 20K costs 10K × 12 classes
    × $0.25 = $30K. Expected gain based on power law: accuracy ∝ N^0.1 → 89% × (20K/10K)^0.1 = 89% × 1.072
    = 95.4%. (B) Augmentation: free, adds effective 5× data → equivalent to 50K samples → 89% × (50K/10K)^0.1
    = 89% × 1.17 = 104.5% — unrealistic, diminishing returns cap at ~96% for this model. (C) Architecture:
    add one depthwise-separable layer (params: +2KB within 256KB budget): +2-3% accuracy empirically.
    Best path: (B) + (C): augmentation + architecture = ~93-94% accuracy at zero marginal cost. Then (A):
    5K more real samples ($15K) to push to 95%.'
