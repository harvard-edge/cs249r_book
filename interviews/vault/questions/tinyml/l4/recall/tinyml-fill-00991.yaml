schema_version: 1
id: tinyml-fill-00991
title: 'TinyML Model Deployment on nRF5340: Optimizing Operator Schedule for Memory and Performance'
topic: operator-scheduling
status: published
provenance: imported
scenario: You are tasked with deploying a pre-trained convolutional neural network (CNN) model for keyword
  spotting onto a Nordic nRF5340 microcontroller, which features a 128 MHz ARM Cortex-M33, 256 KB SRAM,
  and 1 MB flash memory. The model, after quantization, requires a peak working memory of 300 KB if executed
  in a naive layer-by-layer fashion, and the current inference time of 150 ms is too slow for the real-time
  application's 100 ms latency budget. The initial deployment fails due to excessive SRAM usage. Design
  an operator scheduling strategy that allows the model to fit within the nRF5340's SRAM constraints and
  meet the latency target. Clearly articulate the scheduling techniques you would employ.
details:
  realistic_solution: 'Implement a memory-aware operator scheduling algorithm that prioritizes memory
    reuse and operator fusion. Specifically:

    1.  **Memory Reuse:** Analyze the data dependencies between operators to identify tensors that can
    be freed immediately after their last use and their memory regions reused by subsequent operators.
    This involves careful static memory planning or a ''scratchpad'' memory management approach.

    2.  **Operator Fusion:** Combine sequential, compatible operations (e.g., Conv2D -> ReLU -> BatchNorm)
    into a single fused kernel to reduce intermediate tensor storage and minimize memory accesses.

    3.  **Execution Order Optimization:** Reorder independent operations to improve data locality or enable
    more efficient memory reuse. For example, processing batches of smaller chunks if possible, or scheduling
    operations to ensure critical data remains in faster memory.

    4.  **Graph Partitioning:** If necessary, partition the graph to execute parts of the model sequentially,
    saving intermediate states to flash if SRAM is insufficient, though this impacts latency significantly.'
  common_mistake: A common mistake is to only focus on model quantization and pruning without deeply considering
    the dynamic memory allocation patterns and execution dependencies of operators. Developers often overlook
    opportunities for in-place operations, operator fusion, or strategically ordering operations to maximize
    memory reuse, leading to avoidable memory overflows or inefficient data movement on highly constrained
    devices like the nRF5340.
  napkin_math: Consider a scenario where an intermediate tensor `T1` (50 KB) is an output of `OpA` and
    input to `OpB`, and `T2` (70 KB) is an output of `OpC` and input to `OpD`. If `OpA` and `OpC` execute
    concurrently or sequentially without immediate reuse, peak memory might require 50KB + 70KB for `T1`
    and `T2`. By scheduling `OpB` immediately after `OpA`, `T1`'s memory can be deallocated/reused before
    `OpC` starts, potentially allowing `T2` to occupy `T1`'s memory space or another available block.
    With careful scheduling, an initial 300 KB peak usage might be reduced to, for example, 220 KB, fitting
    within the 256 KB SRAM constraint. Each fused operation also typically saves instruction cycles due
    to fewer memory accesses, contributing to meeting the 100 ms latency target.
