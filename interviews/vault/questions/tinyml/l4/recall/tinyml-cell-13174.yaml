id: tinyml-cell-13174
title: 'TinyML TCO Realization: Concrete Cost Breakdown for TinyML Widget'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Concretely calculate the unit economics for a commercial TinyML motion sensor (Cortex-M4, $2,
  + PIR sensor $1 + CR2032 $0.30 + PCB+enclosure $2 + assembly $1 = $6.30 BOM) retailing at $29.99. Include:
  distributor margin 30%, return rate 3%, warranty (2-year, 5% failure at $15 repair cost). Calculate
  gross margin and net margin per unit.'
details:
  realistic_solution: 'Retail: $29.99. Distributor 30%: $29.99*0.70=$20.99 to manufacturer. COGS: BOM=$6.30.
    Returns: 3% * BOM=$0.189. Warranty reserve: 5% failure * $15 repair = $0.75/unit expected. Total COGS:
    $6.30+$0.189+$0.75=$7.239. Gross profit: $20.99-$7.239=$13.751. Gross margin: $13.751/$20.99=65.5%.
    Operating expenses: 20% of revenue for sales/marketing/R&D = $4.20. Net margin: ($13.751-$4.20)/$20.99=45.5%.
    High margins — typical for IoT hardware with sticky recurring revenue (none here) or brand premium.
    For 100K units: net profit = 100K*$9.551=$955K.'
  common_mistake: Confusing distributor margin (on retail price) with manufacturer markup (on BOM), leading
    to incorrect margin calculations, and not accounting for warranty reserve as a cost of goods sold
    item.
  napkin_math: 'Manufacturer revenue: $29.99*0.70=$20.99. COGS: $6.30+$0.189(returns)+$0.75(warranty)=$7.239.
    Gross margin: ($20.99-$7.239)/$20.99=65.5%. OpEx (20%rev): $4.198. Net margin: ($13.751-$4.198)/$20.99=45.5%.
    100K units: revenue=$2.099M, COGS=$723.9K, gross=$1.375M, OpEx=$420K, net=$955K. Key cost: BOM=$6.30
    vs warranty=$0.75 (11.9% of COGS). At 10% failure: warranty=$1.50 → total COGS=$8.0. Gross margin
    drops to 61.9%. Warranty rate is critical for hardware margins — invest in quality to reduce from
    5% to 2%: saves $0.45/unit = $45K/yr on 100K units.'
