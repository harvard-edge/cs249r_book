id: tinyml-cell-13176
title: 'TinyML TCO Realization: Total Platform Cost for TinyML Development'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Concretely calculate the total platform development cost for a TinyML product using ESP32-S3
  (240MHz, 512KB SRAM, 8MB PSRAM, WiFi, $4). Include: dev board ($15 each, 5 boards), tools (edge impulse
  subscription $50/month), cloud backend (AWS IoT $1K/year), model training data labeling ($0.05/label,
  10K labels), and 3-month development (2 engineers at $100/hr, 40hr/week). Total first-year cost.'
details:
  realistic_solution: 'Dev boards: 5*$15=$75. Edge Impulse: $50*12=$600. Cloud backend (AWS IoT + Lambda
    + S3): $1K/yr. Data labeling: 10K*$0.05=$500. Engineering (2 engineers, 3mo, 40hr/wk): 2*$100*40*13=$104K.
    Test hardware (production samples, 50 units): 50*$4=$200. FCC/CE pre-cert testing: $5K. Prototype
    PCBs (3 revisions, 10 boards each): 30*$25=$750. Total first-year development: $75+$600+$1K+$500+$104K+$200+$5K+$750=$112,125.
    Annual recurring after launch: $50*12 (Edge Impulse)+$1K+$500(ongoing labeling)=$2,100. For 10K product
    units, NRE amortized: $112.1K/10K=$11.21/unit added to BOM cost.'
  common_mistake: Not including the ongoing cloud backend cost as part of the product's operational cost
    structure, treating it as a one-time development cost and surprising stakeholders with recurring charges.
  napkin_math: 'Development: 2eng*$100/hr*40hr/wk*13wk=$104K. Tools/infra: $75+$600+$1K+$500=$2,175. Certification:
    $5K+$750=$5,750. Total: $111,925≈$112K. Annual recurring: $2,100. NRE at 10K units: $11.21/unit. Typical
    IoT product: NRE=$50-500K depending on complexity. This $112K is on the low end (software-heavy, no
    custom silicon). Certification dominates (FCC full: $15-30K, not $5K pre-cert). Realistic budget:
    $150-200K total NRE. At $200K NRE, 10K units: $20 NRE/unit. Added to $4 BOM+$13 other=$37 COGS before
    distributor margin. At $99 retail, still 53% gross margin.'
