id: tinyml-exp2-opti-0068
title: Delta OTA Optimization for Ethos-U55 NPU Models
topic: ota-firmware-updates
status: published
provenance: imported
scenario: You are designing an OTA update mechanism for a smart sensor running on an ARM Cortex-M7 + Ethos-U55
  (Corstone-300) platform. The system has 512 KB of shared SRAM and 2 MB of internal Flash, with the current
  firmware consuming 1.7 MB. A recent model update for the Ethos-U55 requires replacing the 1.2 MB compiled
  Vela network, but a standard A/B partition scheme fails due to insufficient Flash. How do you analyze
  this storage bottleneck and quantify an optimization strategy to perform reliable, in-place OTA updates
  without external memory?
details:
  realistic_solution: Implement a differential (delta) OTA update strategy targeting only the changed
    weights and Vela command streams. By downloading only the delta payload, storing it in the small remaining
    Flash space, and streaming the patching process block-by-block using a minimal SRAM buffer, the update
    succeeds without violating memory constraints or requiring a full A/B dual-bank setup.
  common_mistake: Candidates often suggest relying solely on external SPI flash or compressing the entire
    image without considering the severe RAM constraints. They fail to recognize that the 512 KB SRAM
    is shared between the 480 MHz M7 and the NPU, meaning in-place decompression of a large model during
    the update can easily cause an SRAM overflow and crash the RTOS.
  napkin_math: 'Total Flash = 2 MB. Active firmware = 1.7 MB. Free Flash = 300 KB. Full model size = 1.2
    MB (bottleneck: 1.2 MB > 300 KB). Assuming a 15% change in network weights, the delta patch size =
    1.2 MB * 0.15 = 180 KB. The 180 KB patch fits in the 300 KB free Flash. During patching, a 16 KB read/write
    buffer is allocated from the 512 KB SRAM, leaving 496 KB for the M7 RTOS and Ethos-U55 shared memory
    during the update process.'
