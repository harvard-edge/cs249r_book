id: tinyml-fill-05014
title: Binary and Ternary Quantization Feasibility on Cortex-M4
topic: quantization-fundamentals
status: published
provenance: imported
scenario: A TinyML researcher proposes using binary neural networks (1-bit weights) for a 100K parameter
  keyword spotting model on Cortex-M4 (168MHz, 256KB SRAM, no FPU on some variants). The baseline INT8
  model achieves 92% accuracy. Analyze the compute benefits and accuracy risk of binarization.
details:
  realistic_solution: 'Binary weights: 100K bits = 12.5KB model (vs 100KB INT8). With ARM DSP SIMD, XNOR+popcount
    can process 32 bits per cycle → 32× theoretical speedup over INT8 scalar. With DSP extensions: ~16-20×
    practical speedup. Typical binarization accuracy loss: 5-15% on keyword spotting. Expected: 92% →
    77-87%. For keyword spotting, 85%+ is often acceptable. Ternary (-1, 0, +1) offers better accuracy
    (typically 2-5% loss) with ~16× speedup using packed representation. Recommend ternary: accuracy ~88-90%,
    12.5KB storage, ~16× faster.'
  common_mistake: Assuming binary networks achieve 32× speedup over INT8 on ARM Cortex-M4; actual speedup
    depends on XNOR/popcount implementation and whether the core has DSP extensions.
  napkin_math: 'Binary: 100K bits = 12.5KB. INT8: 100KB. Storage: 8× reduction. XNOR+popcount speedup:
    32× theoretical, 16-20× practical. Accuracy: binary loses 5-15%, ternary loses 2-5%. At 168MHz with
    DSP: INT8 = ~50ms, binary = ~3ms inference.'
