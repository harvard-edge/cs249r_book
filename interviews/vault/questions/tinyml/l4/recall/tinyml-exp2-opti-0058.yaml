id: tinyml-exp2-opti-0058
title: Zero-Copy Audio DMA on nRF5340
topic: dma-data-movement
status: published
provenance: imported
scenario: You are deploying a keyword spotting model on the Nordic nRF5340. The I2S peripheral captures
  audio, and EasyDMA writes it to a 16KB circular buffer in the 256KB SRAM. Before each inference pass,
  the 128 MHz app core wakes up to copy these 16KB of audio frames into the ML model's input tensor. This
  memory copy creates a bottleneck in both power and SRAM usage on the ~5mA active device. How do you
  analyze and quantify the fix for this data movement bottleneck?
details:
  realistic_solution: The optimal approach is to implement a zero-copy architecture by configuring the
    peripheral's EasyDMA to write directly into ping-pong buffers allocated within the model's input tensor.
    This allows the I2S hardware to fill one buffer while the 128 MHz app core processes the other, eliminating
    the CPU intervention for data movement.
  common_mistake: Candidates often suggest optimizing the CPU copy routine using loop unrolling or specialized
    instructions rather than eliminating the copy entirely. They fail to leverage the hardware's DMA capabilities
    to write directly to the final destination.
  napkin_math: Eliminating the redundant 16KB buffer immediately frees up 6.25% of the nRF5340's total
    256KB SRAM. Assuming a memory copy takes 2 CPU cycles per 32-bit word, copying 16KB (4,096 words)
    takes 8,192 cycles. On the 128 MHz app core, avoiding this copy saves 64 microseconds of active CPU
    time per inference, which directly reduces the time spent drawing the ~5mA active current.
