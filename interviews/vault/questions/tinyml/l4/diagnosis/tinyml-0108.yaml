schema_version: 1
id: tinyml-0108
title: The Hardware Crypto Engine Latency
topic: federated-learning
status: published
provenance: imported
scenario: Your ML device connects to AWS over Wi-Fi. Every hour, it performs a TLS handshake to securely
  upload a model update. The MCU has a hardware crypto accelerator (AES/RSA). You use an RTOS. When the
  hourly TLS handshake occurs, the ML audio inference task (which runs every 20ms) misses its deadline
  and drops audio frames. If the crypto is hardware-accelerated, why is it freezing the CPU?
details:
  realistic_solution: 'The TLS handshake requires RSA-2048 or ECDSA signature verification, which is CPU-bound
    even with a hardware AES accelerator (AES ≠ RSA). Software RSA-2048 verify on a Cortex-M4 takes 200-500ms
    of continuous CPU time in a blocking loop. During this time, the RTOS cannot schedule the ML audio
    thread, which misses its 20ms deadline 10-25 times. Fix: (1) Split the RSA computation across multiple
    RTOS ticks using a state-machine-based big-integer library. (2) Use ECDSA-P256 instead of RSA-2048
    (10x faster: ~20-50ms). (3) Perform TLS handshake in a low-priority thread and yield every 5ms to
    allow ML inference to run.'
  common_mistake: '"The crypto engine is slow." Hardware crypto is fast, but the protocol handshake requires
    intense software coordination.'
  napkin_math: Software RSA-2048 verification on a 168 MHz Cortex-M4 takes ~200ms to 500ms. If the networking
    task preempts the ML task, the CPU spends up to 500ms locked in cryptography. With a strict 20ms audio
    frame deadline, the MCU sequentially drops 10 to 25 audio frames, causing the KWS model to fail completely.
