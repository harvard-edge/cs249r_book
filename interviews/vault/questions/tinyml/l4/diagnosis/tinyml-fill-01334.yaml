id: tinyml-fill-01334
title: TinyML Graceful Degradation for Predictive Maintenance on Cortex-M7/Ethos-U55
topic: graceful-degradation
status: published
provenance: imported
scenario: A predictive maintenance system operates on a Cortex-M7 + Ethos-U55 microcontroller (480 MHz,
  512 KB SRAM, 200 MAC/cycle NPU) in a critical industrial application. The primary task is real-time
  anomaly detection using a deep learning model for vibration data. Unexpectedly, the model's inference
  latency begins to fluctuate significantly, occasionally exceeding a 50% increase over its nominal 10ms,
  and its classification accuracy drops from 95% to below 80%. This behavior is intermittent. As the lead
  ML engineer, you need to diagnose the root cause of this performance degradation and ensure the system
  maintains operational capability, even if degraded. Outline a strategy focusing on diagnosis and graceful
  degradation.
details:
  realistic_solution: "1.  **Real-time Health Monitoring:** Implement lightweight, continuous monitoring\
    \ of key metrics: inference latency, NPU utilization, CPU load, available SRAM, and model confidence\
    \ scores. Use hardware performance counters available on Cortex-M7/Ethos-U55. 2.  **Diagnostic Heuristics:**\
    \ Develop simple, deterministic rules to analyze monitoring data. For instance, high NPU utilization\
    \ with high latency might indicate thermal throttling or contention, while a sudden drop in confidence\
    \ score without increased latency could point to sensor drift or data corruption. 3.  **Degradation\
    \ Ladder:**\n    *   **Level 1 (Early Warning):** If latency exceeds 15ms or accuracy drops below\
    \ 90%, log a warning and initiate a deeper, but still lightweight, diagnostic sweep (e.g., check memory\
    \ integrity, NPU registers). Continue using the primary model.\n    *   **Level 2 (Fallback Model):**\
    \ If diagnostics indicate a persistent issue (e.g., NPU error code, sustained high temperature) or\
    \ if the primary model's accuracy falls below 85% for a defined period, switch to a pre-loaded, simpler\
    \ fallback model (e.g., an SVM) that uses less SRAM (e.g., 100KB) and has lower inference latency\
    \ (e.g., 4ms) but slightly reduced accuracy (e.g., 88%). This maintains fail-operational status with\
    \ reduced QoS.\n    *   **Level 3 (QoS Shedding):** If the fallback model also struggles, reduce the\
    \ data sampling rate (e.g., from 100 samples/sec to 20 samples/sec) to conserve resources, prioritizing\
    \ critical anomaly detection over continuous monitoring. Trigger an alert for manual intervention.\n\
    \    *   **Level 4 (Fail-Safe):** In the event of catastrophic NPU failure or critical SRAM corruption,\
    \ switch to a very basic rule-based anomaly detector or only report a 'system non-operational' status,\
    \ ensuring safety by avoiding erroneous ML predictions."
  common_mistake: A common mistake is to either let the system fail catastrophically when the primary
    model degrades, or to continue operating with silently degraded accuracy, leading to missed anomalies.
    Another error is implementing an overly complex diagnostic system that consumes too many resources
    (SRAM, CPU cycles) on the constrained Cortex-M7, exacerbating the problem or preventing timely recovery.
  napkin_math: 'Given the Cortex-M7 + Ethos-U55 (480 MHz, 512 KB SRAM). A primary model uses 300KB SRAM
    and infers in 10ms. If it degrades to a simpler model requiring 100KB SRAM and 4ms inference:

    1.  **SRAM Freed:** 300KB (primary) - 100KB (fallback) = 200KB additional SRAM freed for logging,
    diagnostic code, or other tasks.

    2.  **CPU Cycles for Diagnostics (primary mode):** During the 10ms primary model inference window,
    if the CPU dedicates 20% of its cycles to monitoring, then 480,000,000 cycles/sec * 0.010 sec * 0.20
    = 960,000 CPU cycles are available for diagnostic checks.'
