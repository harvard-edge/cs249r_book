schema_version: 1
id: tinyml-exp-diag-0056
title: Diagnosing Power Regressions in Sparse Networks
topic: energy-per-operation
status: published
provenance: imported
scenario: You deployed an audio classification model on an ARM Cortex-M4 (STM32F4) microcontroller featuring
  168 MHz clock speed, 256 KB SRAM, 1 MB flash, and no FPU. To optimize battery life, the team replaced
  a dense CNN with a highly sparse fully-connected network, successfully reducing the total compute by
  80%. The new model utilizes CMSIS-NN SIMD instructions (2x INT8 MACs/cycle) and fits comfortably within
  memory. However, hardware profiling reveals that the active energy consumption per inference has actually
  tripled instead of decreasing. What is the root cause of this power regression?
details:
  realistic_solution: The candidate should diagnose that the sparse fully-connected network has extremely
    low arithmetic intensity (data reuse) compared to the CNN. According to the Horowitz energy principles,
    fetching data from memory costs orders of magnitude more energy than performing an ALU operation.
    Even though the CMSIS-NN SIMD executes MACs highly efficiently, the sparse model requires constantly
    streaming non-contiguous weights and sparsity indices from the 1 MB flash memory. The massive increase
    in expensive flash reads completely overrides the energy saved by reducing the compute operations.
  common_mistake: Candidates often assume that compute (MAC operations) is a direct and linear proxy for
    energy consumption. They might incorrectly hypothesize that the CPU is running at a higher clock frequency,
    that the CMSIS-NN SIMD instructions are failing to vectorize, or that there is an RTOS scheduling
    bug, completely ignoring the energy cost of memory access.
  napkin_math: '1. Compute Energy: An INT8 MAC operation costs roughly 0.1 pJ. 2. Memory Energy: Reading
    32 bits from the 1 MB Flash costs approximately 1000 pJ (1 nJ), a 10,000x disparity vs compute. 3.
    Original CNN: 5M MACs (0.5 uJ compute) + high data reuse requiring only 100 KB of flash reads per
    inference (25,000 32-bit reads * 1 nJ = 25 uJ) = ~25.5 uJ total energy. 4. Sparse Network: 1M MACs
    (0.1 uJ compute) + low arithmetic intensity requiring 300 KB of flash reads for weights and indices
    (75,000 32-bit reads * 1 nJ = 75 uJ) = ~75.1 uJ total energy. 5. Conclusion: Despite an 80% reduction
    in MACs, the memory bandwidth bottleneck caused a 3x increase in total energy per inference (25.5
    uJ to 75.1 uJ).'
