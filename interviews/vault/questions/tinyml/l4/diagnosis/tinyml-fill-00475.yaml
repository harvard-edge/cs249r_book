schema_version: 1
id: tinyml-fill-00475
title: Quantization Drift on Nordic nRF5340 for Keyword Spotting
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You're deploying a keyword spotting model (originally FP32, then PTQ to INT8) onto a Nordic
  nRF5340 SoC (128 MHz CPU, 256 KB SRAM, 1 MB flash). During on-device testing, you observe that while
  inference latency meets targets, the model's accuracy has degraded significantly (e.g., 85% instead
  of 95% on a validation set). Specifically, there's a noticeable 'clumping' of output probabilities and
  a higher rate of false positives for certain keywords, even when the INT8 simulated accuracy offline
  was acceptable (93%). Power consumption is also slightly higher than expected for an INT8 model, though
  still better than FP32. You suspect quantization issues. How would you diagnose the root cause of this
  accuracy drop and propose a solution, considering the nRF5340's constraints?
details:
  realistic_solution: 1. **Analyze Activation Distributions:** Instrument the model to log activation
    distributions (FP32 vs. INT8) for critical layers on the nRF5340 using a diverse, on-device representative
    dataset. Look for significant clipping, zero-point shifts, or dynamic range mismatches. 2. **Refine
    Calibration:** If issues are found, try a more targeted calibration dataset that covers the specific
    edge cases causing misclassifications. Experiment with different calibration algorithms (e.g., MinMax,
    KLD, Percentile). 3. **Per-Channel Quantization:** For layers sensitive to per-tensor quantization
    limitations, switch to per-channel quantization if supported by the inference engine and hardware,
    as this often offers better precision with minimal overhead. 4. **Quantization-Aware Training (QAT):**
    If PTQ still yields unsatisfactory results, consider QAT. This involves fine-tuning the model with
    simulated quantization noise during training, allowing the model to adapt to the quantization effects
    and often yielding superior accuracy for tinyML deployments. 5. **Inspect Zero-Point Arithmetic:**
    Verify that the inference engine on the nRF5340 correctly handles zero-point arithmetic, especially
    for `uint8` vs `int8` representations and bias additions.
  common_mistake: A common mistake is assuming that a general-purpose, post-training static quantization
    (PTQ) calibration dataset will be universally representative. Often, the distribution of activations
    during on-device inference might deviate significantly from the calibration dataset, leading to poor
    scaling factors and zero-points for critical layers, especially for non-linear activations or layers
    with dynamic input ranges. Neglecting per-channel quantization for layers like convolutions, or an
    incorrect understanding of hardware-specific zero-point arithmetic, can also lead to issues.
  napkin_math: For a typical convolutional layer with 64 output channels, an FP32 weight tensor might
    consume `64 * 3 * 3 * 32 * 4 bytes/FP32 = ~72 KB`. Quantizing this to INT8 would reduce it to `64
    * 3 * 3 * 32 * 1 byte/INT8 = ~18 KB`. This 4x memory reduction is crucial for the nRF5340's 256 KB
    SRAM. However, if just one or two critical channels within this layer are poorly quantized (e.g.,
    their activation range is poorly captured by the common scale/zero-point), even with overall memory
    savings, the effective computational precision for those channels plummets, leading to accuracy drops
    despite the overall INT8 benefits.
