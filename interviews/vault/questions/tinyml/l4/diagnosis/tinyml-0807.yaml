id: tinyml-0807
title: Tinyml New 0031
topic: cnn-efficient-design
status: published
provenance: imported
scenario: A high-priority motor control task runs at 1kHz on a Cortex-M4. A low-priority TinyML model
  runs every second. Randomly, the motor control task misses its 1ms deadline, causing physical jitter.
details:
  realistic_solution: Priority inversion is occurring. The low-priority TinyML task locks a shared resource
    (e.g., an I2C bus mutex to read a sensor). The high-priority motor task attempts to lock it and blocks.
    A medium-priority task then preempts the TinyML task, effectively delaying the high-priority motor
    task indefinitely. Implement Priority Inheritance Protocols (PIP) on the mutex.
  common_mistake: Failing to account for shared resource locking between real-time critical tasks and
    long-running ML tasks.
  napkin_math: Motor needs 1000us window. ML task holds mutex for 500us. Medium task preempts ML for 800us.
    Motor waits 500+800 = 1300us > 1000us. Deadline is missed by 300us, causing physical jitter.
