id: tinyml-0086
title: The DMA Ping-Pong Desync
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are capturing audio using I2S and DMA on an STM32. You use a standard Ping-Pong (Double
  Buffering) scheme. DMA writes to Buffer A, fires a 'Half-Transfer' interrupt, then writes to Buffer
  B, firing a 'Full-Transfer' interrupt. You process the data in the main loop. After a few hours, the
  audio sounds garbled, like small chunks of time are missing. What timing failure broke the Ping-Pong
  buffer?
details:
  realistic_solution: You suffered a **Main Loop Processing Overrun**. 16 kHz audio, 16-bit. A 1024-sample
    half-buffer takes exactly 64ms to fill. If your inference takes 65ms, you will suffer silent data
    corruption on every single frame.
  common_mistake: '"The DMA is dropping bytes." DMA is driven by hardware clocks; it rarely drops bytes
    unless the bus is totally locked.'
  napkin_math: 'Audio format: 16 kHz, 16-bit. A 1,024-sample half-buffer represents exactly 1024 / 16000
    = 64 ms of audio. In Ping-Pong DMA, the CPU must process Buffer A before DMA finishes filling Buffer
    B. If inference takes 65 ms, the CPU misses the 64 ms deadline by 1 ms. DMA overwrites the buffer,
    causing audio tearing.'
