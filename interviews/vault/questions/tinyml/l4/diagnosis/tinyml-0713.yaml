schema_version: 1
id: tinyml-0713
title: The Flash Corruption After 10,000 OTA Updates
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: Your fleet of 50,000 smart agriculture sensors uses STM32H7 (Cortex-M7, 480 MHz, 1 MB SRAM,
  2 MB internal flash). You push OTA model updates weekly. After 3 years (~156 updates), field reports
  show 2% of devices producing garbage inference results. The model binary is verified correct via CRC
  after each update. What's failing?
details:
  realistic_solution: Internal NOR flash on STM32H7 is rated for **10,000 program/erase cycles** per sector.
    Each OTA update erases and reprograms the model storage sectors. After 156 weekly updates, you've
    used only 1.6% of the endurance budget — so raw endurance isn't the issue yet.
  common_mistake: '"If the CRC passes, the flash contents are correct — must be a firmware bug." CRC checks
    verify the data immediately after writing. It doesn''t catch degradation that occurs between writes.'
  napkin_math: 'Flash endurance: 10,000 cycles. Model sectors: 4 × 128 KB. Model writes: 156 updates ×
    1 write = 156 cycles (safe). Metadata sector: 156 updates × 20 writes = 3,120 cycles (31% of endurance).
    With retries on bad signal: 156 × 50 = 7,800 cycles (78% — danger). Fleet of 50,000: 2% failure =
    1,000 devices. Expected failures at 7,800 cycles (assuming normal distribution of endurance around
    10,000 with σ = 1,500): P(failure at 7,800) = P(endurance < 7,800) = Φ((7,800 - 10,000) / 1,500) =
    Φ(-1.47) = 7.1%. Actual 2% suggests only the worst-signal devices (top quartile of retry counts) are
    affected.'
