id: tinyml-0577
title: The Sensor Bus Pull-Up Resistor
topic: cnn-efficient-design
status: published
provenance: imported
scenario: 'You build a custom TinyML PCB. You attach an I2C environmental sensor to the MCU. The ML model
  expects temperature data. However, the `i2c_read()` function constantly timeouts, and the ML model runs
  on garbage `0xFF` data. You check the schematic: the SDA and SCL lines are wired directly from the sensor
  to the MCU pins. What crucial analog component is missing, causing the digital bus to fail?'
details:
  realistic_solution: 'You forgot the **I2C Pull-Up Resistors**. I2C relies on RC time constants. A 4.7k
    resistor pulling up a bus with 50pF of parasitic capacitance yields an RC time constant of 235ns,
    allowing the signal to cleanly rise to 3.3V fast enough for a '
  common_mistake: '"You need a level shifter." Not if both chips are 3.3V. The issue is fundamental to
    I2C.'
  napkin_math: I2C relies on RC time constants. A 4.7k resistor pulling up a bus with 50pF of parasitic
    capacitance yields an RC time constant of 235ns, allowing the signal to cleanly rise to 3.3V fast
    enough for a standard 400 kHz (2.5µs period) clock. Without it, the rise time is infinite.
