schema_version: 1
id: tinyml-0791
title: Tinyml New 0013
topic: latency-decomposition
status: published
provenance: imported
scenario: Two TinyML models (vision and audio) run concurrently on a Jetson Orin. Running either model
  alone hits 10ms latency. Running them together causes latency for both to spike to 45ms.
details:
  realistic_solution: The concurrent execution is causing catastrophic thrashing of the Orin's L2 cache.
    Model A loads its activations and weights, and immediately Model B overwrites those cache lines. This
    forces both models to fetch from the much slower main memory (HBM/LPDDR) continuously. The solution
    is to execute them sequentially, or use partitioning/MPS to pin cache resources.
  common_mistake: Assuming that edge GPUs can seamlessly multitask without understanding the critical
    capacity limits of shared L2 cache.
  napkin_math: Orin L2 cache = 2MB. Model A needs 1.5MB working set, Model B needs 1MB. Total = 2.5MB.
    Miss penalty = 100ns. 10M misses/sec = 1 second of latency added. Cache hit rate drops from 95% to
    20%.
