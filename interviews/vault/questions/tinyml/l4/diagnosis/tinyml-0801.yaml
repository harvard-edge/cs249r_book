schema_version: 1
id: tinyml-0801
title: Tinyml New 0025
topic: profiling-bottleneck-analysis
status: published
provenance: imported
scenario: A Jetson Orin handles a 60fps 1080p video stream. The NPU inference takes only 5ms, yet the
  overall pipeline struggles to hit 15fps. Profiling shows the CPU at 100% utilization.
details:
  realistic_solution: The bottleneck is the CPU doing heavy data format conversion, specifically RGB to
    Grayscale or resizing, before feeding the NPU. While the NPU finishes in 5ms, the CPU takes 60ms to
    transform the raw camera frames sequentially. The solution is to utilize the Orin's hardware VIC (Video
    Image Compositor) or ISP to perform zero-copy colorspace conversions and resizing.
  common_mistake: Assuming high NPU TOPS guarantee fast edge vision systems, completely neglecting CPU-bound
    pixel preprocessing.
  napkin_math: RGB to Gray = 3 ops per pixel (R+G+B / 3). 1080p = 2M pixels * 3 = 6M ops. At 2GHz, unoptimized
    CPU takes ~3-5ms. Multiplied by memory copying overheads, it easily exceeds the 16ms budget for 60fps.
