schema_version: 1
id: tinyml-0061
title: Inference Result Compression for Upload
topic: ota-firmware-updates
status: published
provenance: imported
scenario: Your fleet of 1,000 wildlife acoustic monitors runs a bird species classifier on an RP2040 (Cortex-M0+,
  133 MHz, 264 KB SRAM, 2 MB flash). Each device classifies 10-second audio clips and detects up to 50
  species. The devices upload results daily via cellular (LTE-M Cat-M1, billed at $0.50/MB). You're currently
  sending raw JSON results and the cellular bill is $13,000/month. Compress the upload payload.
details:
  realistic_solution: 'The problem is the data format, not the compression algorithm. Replace JSON with
    a compact binary protocol:'
  common_mistake: '"Use gzip on the JSON." Gzip on a Cortex-M0+ is expensive — the M0+ has no barrel shifter,
    making the bit manipulation in DEFLATE very slow. And JSON is the wrong format for constrained uploads
    in the first place.'
  napkin_math: 'Raw softmax JSON: ~200 B/clip × 4,320 clips/day (one per 20s, 24h) = 864 KB/day per device.

    Fleet daily: 864 KB × 1,000 = 864 MB/day.

    Monthly: 864 × 30 = 25,920 MB ≈ 25.9 GB.

    Cost: 25,920 × $0.50 = **$12,960/month** ≈ $13,000/month (matches scenario).


    Top-3 binary encoding: 6 B/clip × 4,320 = 25.9 KB/day per device.

    Fleet monthly: 25.9 KB × 1,000 × 30 = 777 MB. Cost: **$388/month** (33× reduction).


    Hourly aggregation (histogram of top species per hour): 24 hours × 7 bytes = 168 B/day per device.

    Fleet monthly: 168 × 1,000 × 30 = 5.04 MB. Cost: **$2.52/month** (5,143× reduction).


    Annual savings vs raw: $12,960 × 12 - $2.52 × 12 = **~$155,500/year**.


    SRAM cost of aggregation: ~100 bytes. CPU cost: 50 comparisons/clip × 4,320 clips = 216,000 ops/day
    at 133 MHz = 1.6 ms/day. Essentially free.'
