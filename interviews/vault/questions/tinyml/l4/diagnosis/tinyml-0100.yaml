schema_version: 1
id: tinyml-0100
title: Watchdog Timer Integration with Inference
topic: real-time-deadlines
status: published
provenance: imported
scenario: Your Cortex-M33 (nRF5340, 128 MHz) runs a 12-layer anomaly detection model. Inference takes
  85 ms. The system's Independent Watchdog Timer (IWDG) is set to 100 ms because the safety spec requires
  a response within 100 ms. Your test engineer reports that the watchdog fires randomly during normal
  inference — about 1 in 50 runs. The model isn't hanging. What's going on, and how do you fix it without
  relaxing the safety deadline?
details:
  realistic_solution: 'Average inference (85ms) leaves only 15ms margin to the 100ms watchdog. Worst-case
    adds: BLE interrupt servicing (+5ms), flash wait states on cache miss (+16ms), and I-cache cold-start
    after context switch (+0.78ms) = 107ms, exceeding the 100ms deadline 2% of the time (1 in 50). Fix:
    insert a watchdog kick at layer 6 (midpoint). Each half takes ~42.5ms average, 53.5ms worst case —
    well under 100ms. The single register write costs 23 nanoseconds. This preserves the safety deadline
    while eliminating false watchdog resets. Never increase the watchdog timeout to accommodate software
    — that violates the safety specification.'
  common_mistake: '"Increase the watchdog timeout to 200 ms." This violates the safety specification.
    The 100 ms deadline exists because the monitored system (e.g., a motor) can cause damage if an anomaly
    goes undetected for longer than 100 ms.'
  napkin_math: 'Average inference: 85 ms. Worst-case: 107 ms (85 + 5 BLE + 16 flash + 0.78 cache). Without
    mid-kick: P(WDT fire) = P(worst case > 100 ms) ≈ 2% = 1 in 50. With mid-kick at layer 6: each half
    = 42.5 ms avg, 53.5 ms worst case. Margin: 100 - 53.5 = 46.5 ms. P(WDT fire) ≈ 0% (would need a 46.5
    ms stall — only possible with a bug). Overhead of mid-kick: 1 watchdog register write = 3 cycles =
    23 ns. Negligible.'
