id: tinyml-0556
title: The Branch Prediction Penalty on MCU
topic: mcu-compute-constraints
status: draft
provenance: imported
scenario: Your colleague implements a ReLU activation function for an INT8 inference engine on a Cortex-M4
  (100 MHz, no branch predictor) using an `if (x < 0) x = 0;` pattern. Profiling shows ReLU takes 15%
  of total inference time — far more than expected for a simple clamp operation. The model has 500,000
  activations per inference. What's going on?
details:
  realistic_solution: 'The Cortex-M4 has no dynamic branch predictor — it uses a simple prefetch that
    always predicts ''not taken.'' With random activations (~50% negative), every taken branch flushes
    the 3-stage pipeline, costing 1-3 penalty cycles per element. For 500K activations: ~750K wasted cycles.
    Fix: replace the branch with a branchless conditional select (e.g., CMOV-style: y = x > 0 ? x : 0
    using a single USAT instruction) or use CMSIS-NN''s vectorized ReLU which processes 4 INT8 values
    per cycle via SIMD. Speedup: up to 10x from branching to SIMD ReLU.'
  common_mistake: '"The Cortex-M4 has branch prediction, so branches are cheap." The Cortex-M4 has *no*
    dynamic branch predictor. It has a simple 1-stage pipeline prefetch that always predicts "not taken."
    Every taken branch flushes the pipeline.'
  napkin_math: 'Branching ReLU: 500K × (2 cycles base + 1 cycle penalty × 50%) = 500K × 2.5 = 1.25M cycles
    = 12.5 ms. Branchless ReLU: 500K × 2 cycles = 1M cycles = 10 ms. SIMD ReLU (4 at a time): 125K × 1
    cycle = 125K cycles = 1.25 ms. Speedup from branching to SIMD: 10×. Inference time reduction: from
    33 ms to 21.5 ms (saving 11.5 ms). The "simple" activation function was the biggest optimization opportunity
    in the entire model.'
