schema_version: 1
id: tinyml-0750
title: The Float-to-Double Silent Promotion
topic: graph-compilation
status: published
provenance: imported
scenario: You are porting an audio feature extraction script from Python to C on a Cortex-M4F (which has
  a single-precision hardware FPU). You write `float result = sample * 3.14159;`. Your profiler shows
  this single line taking 60 CPU cycles instead of the expected 1 cycle. What C language default feature
  is bypassing your hardware FPU?
details:
  realistic_solution: 'In C, the literal 3.14159 is a double (64-bit) by default. The M4F''s FPU is single-precision
    only. The compiler promotes the float ''sample'' to double, performs a 64-bit software multiply (~60
    cycles using libgcc emulation), then truncates back to float. Fix: use 3.14159f (note the ''f'' suffix)
    to keep everything in 32-bit float — the hardware FPU executes the multiply in 1 cycle. Additionally,
    the soft-double library adds 5-10KB to flash. Enable -Wdouble-promotion to catch these silently. Every
    float literal without an ''f'' suffix is a potential 60x performance trap on single-precision FPU
    MCUs.'
  common_mistake: '"The FPU is turned off in the compiler." While possible, the more common issue is the
    data type of the constant.'
  napkin_math: 'Cortex-M4F: HW FPU does 32-bit float multiply in 1 cycle at 168 MHz = 5.95 ns. C literal
    3.14159 is double (64-bit). M4F has no double FPU → compiler emits libgcc soft-float: __aeabi_dmul
    takes ~60 cycles = 357 ns, a 60× slowdown. Also promotes sample float→double (20 cycles) + truncates
    double→float (20 cycles) = ~100 total cycles per operation. Flash cost: libgcc double emulation library
    adds 5–10KB to binary. Fix: use 3.14159f → 1 cycle VMUL.F32. At 16 kHz audio × 256-point FFT = 4,096
    multiplies/frame: 60× penalty = 245K wasted cycles/frame = 1.46 ms lost per frame.'
