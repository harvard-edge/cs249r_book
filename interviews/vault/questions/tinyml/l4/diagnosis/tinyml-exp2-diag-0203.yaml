schema_version: 1
id: tinyml-exp2-diag-0203
title: Diagnosing Power Drain from Memory Access
topic: energy-per-operation
status: published
provenance: imported
scenario: You deploy two different neural network architectures on an ARM Cortex-M4 (STM32F4) running
  at 168 MHz for a sensor monitoring task. Both models execute exactly 5 million INT8 MAC operations per
  inference and fit comfortably within the 1 MB flash and 256 KB SRAM. However, power profiling reveals
  that Model A (composed mostly of fully connected layers) consumes significantly more energy per inference
  than Model B (composed of standard convolutional layers). Identify the architectural root cause for
  this energy discrepancy.
details:
  realistic_solution: The discrepancy is caused by the vastly different memory access patterns between
    the two architectures, exploiting the principle that memory access costs significantly more energy
    than compute. In Model A (fully connected), each weight is loaded from memory and used exactly once
    per inference (for batch size 1), leading to a high memory-to-compute ratio. In Model B (convolutional),
    weights are loaded into registers and reused across the spatial dimensions of the input feature map.
    Because fetching data from the 256 KB SRAM or 1 MB Flash dominates the energy profile, Model A's lack
    of weight reuse drives up the total energy per operation.
  common_mistake: Candidates often assume that energy consumption is strictly proportional to the total
    number of MAC operations, ignoring the memory hierarchy. They might incorrectly guess that the CMSIS-NN
    SIMD instructions (2x INT8 MACs/cycle) are failing to engage for Model A, or that the clock speed
    is somehow fluctuating.
  napkin_math: 'Assume an INT8 MAC operation on the Cortex-M4 ALU costs ~0.1 pJ, while a 32-bit read from
    SRAM costs ~5 pJ. For Model A (FC), every 4 INT8 MACs require fetching a new 32-bit weight word from
    memory: (4 * 0.1 pJ) + 5 pJ = 5.4 pJ per 4 MACs, or 1.35 pJ/MAC. For Model B (Conv), if a weight word
    is reused 16 times spatially in registers, the memory cost is amortized: (4 * 16 * 0.1 pJ) + 5 pJ
    = 11.4 pJ per 64 MACs, or ~0.18 pJ/MAC. Model A consumes roughly 7.5x more energy per MAC due to memory
    bandwidth dominance.'
