schema_version: 1
id: tinyml-0059
title: FOTA Update Integrity Verification
topic: ota-firmware-updates
status: published
provenance: imported
scenario: Your predictive maintenance sensors receive firmware updates over-the-air (FOTA) containing
  a new TFLite Micro model. The bootloader verifies the binary hash (SHA-256) before swapping partitions.
  Why is verifying the binary hash insufficient for ML models, and how do you implement functional model
  attestation (inference on a golden test input) to prove the model's math is intact?
details:
  realistic_solution: A binary hash only proves the file arrived exactly as it was sent. It does *not*
    prove that the ML model will actually execute correctly on the device. The new model might use a TFLite
    operator (e.g., `RESIZE_NEAREST_NEIGHBOR`) that isn't compiled into the device's specific TFLite Micro
    runtime, causing a hard fault on the first real inference. Or, a quantization bug on the build server
    might have produced a model that hashes perfectly but outputs garbage predictions.
  common_mistake: '"If the SHA-256 hash matches, the file hasn''t been corrupted, so the model is safe
    to run." This assumes the model was compiled correctly and the runtime on the device is perfectly
    compatible with the new model''s operators.'
  napkin_math: SHA-256 on a 200 KB model takes ~15ms on a Cortex-M4. Functional attestation (running one
    inference) takes ~50ms. The golden input (e.g., 32×32 INT8 spectrogram) takes 1 KB of flash. The expected
    output (e.g., 4-class probabilities) takes 4 bytes. For a 65ms total boot-time penalty and 1 KB of
    flash overhead, you completely eliminate the risk of bricking a remote sensor with a mathematically
    broken model update.
