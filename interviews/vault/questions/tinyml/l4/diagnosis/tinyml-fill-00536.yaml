schema_version: 1
id: tinyml-fill-00536
title: Diagnosing Sub-4-bit Quantization Accuracy Degradation on STM32F4
topic: extreme-quantization
status: published
provenance: imported
scenario: You are porting a pre-trained sub-4-bit quantized image classification model, originally developed
  for a GPU, to an embedded system featuring an ARM Cortex-M4 STM32F4 microcontroller (168 MHz, 256 KB
  SRAM, no FPU). After deployment, you observe a significant drop in classification accuracy, from 90%
  on the GPU to barely 50% on the STM32F4, despite verifying the model's weights and architecture. The
  model is also occasionally triggering hard faults, which you suspect are memory-related. How would you
  diagnose the root cause of this accuracy degradation and stability issues on this specific platform?
details:
  realistic_solution: '1. **Memory Profiling:** Systematically profile memory usage for weights, activations,
    and intermediate buffers. On the STM32F4 with only 256 KB SRAM, even sub-4-bit models can exceed limits,
    especially if activations are larger than anticipated or if dynamic memory allocation is inefficient.

    2. **Fixed-Point Emulation Review:** Scrutinize the fixed-point arithmetic library or custom implementation
    being used. Ensure it correctly handles sub-4-bit operations, saturates results appropriately to prevent
    overflow/underflow, and that bit-shifts and multiplications are optimized for the Cortex-M4. Look
    for discrepancies in how rounding or truncation is handled compared to the GPU environment.

    3. **Intermediate Value Inspection:** Introduce debug points to inspect intermediate tensor values
    at various layers on both the GPU (reference) and STM32F4. Compare these values to identify where
    the numerical divergence begins. This helps pinpoint specific operations or layers causing the accuracy
    drop.

    4. **Hardware-Specific Quantization Library:** Leverage optimized libraries like CMSIS-NN, which provides
    highly optimized fixed-point kernels for ARM Cortex-M processors, ensuring proper handling of quantized
    data types and operations.

    5. **Re-evaluate Quantization Strategy:** If discrepancies are too large, consider fine-tuning the
    quantized model *specifically* for the fixed-point constraints of the STM32F4, perhaps using post-training
    quantization aware training (QAT) or exploring different mixed-precision schemes if sub-4-bit is proving
    too aggressive for the target''s numerical precision.'
  common_mistake: Assuming that sub-4-bit quantization (especially binary/ternary) provides sufficient
    memory savings or computational efficiency without considering the specific fixed-point arithmetic
    implementation, potential overflow/underflow issues during intermediate calculations, or the overhead
    of emulating floating-point operations (if any remain) on a non-FPU target. Overlooking that accuracy
    recovery techniques like GPTQ/AWQ might not perfectly transfer or may introduce subtle issues when
    run with different fixed-point data types or implementations on a constrained integer-only hardware.
  napkin_math: A typical 32-bit floating-point number consumes 4 bytes. If a model has 1 million parameters,
    it needs 4 MB. With sub-4-bit quantization, say 2-bit, each parameter takes 0.25 bytes. 1 million
    parameters * 0.25 bytes/parameter = 250 KB. This *just* fits the 256 KB SRAM for weights alone, not
    accounting for activations, intermediate buffers, code, or stack. This highlights the extreme memory
    pressure and why even sub-4-bit might be challenging.
