schema_version: 1
id: tinyml-0555
title: The Clock Tree Surprise
topic: accelerator-comparison
status: draft
provenance: imported
scenario: You're deploying a gesture recognition model on an STM32L4 (Cortex-M4, up to 80 MHz, 256 KB
  SRAM). To save power, your firmware engineer configures the MCU to run at 16 MHz from the MSI oscillator
  instead of 80 MHz from the PLL. Inference time scales from 20 ms to 100 ms — exactly 5×, as expected.
  But the total energy per inference *increases* by 40% at the lower clock. How is running slower using
  *more* energy?
details:
  realistic_solution: 'Running slower uses more total energy because of static power. At 80MHz/1.2V: 50mW
    * 20ms = 1.0mJ compute, then sleep at 10uW for 980ms = 0.0098mJ. Total: 1.01mJ. At 16MHz (same voltage):
    15mW * 100ms = 1.5mJ compute, sleep 900ms = 0.009mJ. Total: 1.51mJ — 50% more energy. The key: static
    power (leakage current) is voltage-dependent, not frequency-dependent. At 16MHz the MCU draws ~5mW
    static for 5x longer. Race-to-sleep wins: run at max clock, finish fast, enter deep sleep where static
    power drops to microwatts.'
  common_mistake: '"Lower clock = lower power = lower energy." This confuses *power* (watts) with *energy*
    (joules). Power drops at lower clock speeds, but the MCU runs longer, and the energy equation has
    a non-obvious crossover.'
  napkin_math: 'Race-to-sleep at 80 MHz (1-second period): 50 mW × 20 ms = 1.0 mJ compute, plus 10 µW
    × 980 ms = 0.0098 mJ sleep. Total = 1.01 mJ. Slow at 16 MHz (same voltage): 15 mW × 100 ms = 1.5 mJ
    compute, plus 10 µW × 900 ms = 0.009 mJ sleep. Total = 1.51 mJ. The slow method uses 50% more energy.
    Even with voltage scaling (e.g., dropping power by 30%), the longer active time dominated by static
    leakage makes it less efficient.'
