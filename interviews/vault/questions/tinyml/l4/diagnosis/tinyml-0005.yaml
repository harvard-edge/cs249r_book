id: tinyml-0005
title: The Arena Swiss Cheese
topic: transformer-systems-cost
status: published
provenance: imported
scenario: Your TFLite Micro model requires 85 KB of SRAM. Your device has 100 KB free. However, the allocator
  throws an 'Allocation Failed' error during initialization. Based on the arena map, why can't the system
  satisfy a 30 KB request?
details:
  realistic_solution: You have **Internal Memory Fragmentation**. Even though you have 30 KB of total
    free space, it is split into two non-contiguous 15 KB "holes." The allocator cannot satisfy a 30 KB
    request because tensors must be contiguous in memory. The fix is to use a **Linear Memory Planner**
    that sorts tensors by lifetime to minimize holes, or manually reorder operators in the graph to reduce
    the "peak" lifetime overlap.
  common_mistake: '"TFLite Micro has a memory leak." TFLite Micro uses a static allocator; it cannot leak
    at runtime.'
  napkin_math: Fragmentation efficiency = $\frac{\text{Max Contiguous}}{\text{Total Free}}$. In this diagram,
    efficiency is $15/30 = 50\%$. You need a contiguous block of 30 KB, but your largest "room" is only
    15 KB.
