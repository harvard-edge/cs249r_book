id: tinyml-0578
title: The I2C Clock Stretching Deadlock
topic: cnn-efficient-design
status: published
provenance: imported
scenario: Your MCU reads an ML sensor via I2C every 10ms. It runs flawlessly for weeks. Then, suddenly,
  the entire MCU freezes completely. The hardware watchdog timer is triggered, resetting the board. You
  trace the freeze to a `while()` loop inside the I2C driver waiting for the SCL (clock) line to go High.
  Why did the clock line stay Low forever?
details:
  realistic_solution: 'I2C clock stretching allows a slave device to hold the SCL line low when it needs
    processing time. If the sensor crashes or enters an unexpected state, it may hold SCL low indefinitely.
    The master''s naive driver has a while() loop waiting for SCL to rise — with no timeout, this becomes
    an infinite loop, freezing the entire MCU. Fix: (1) always add a timeout to I2C wait loops (e.g.,
    10ms), (2) implement SCL recovery by toggling the clock line 9 times to reset the bus, (3) add a hardware
    watchdog as a last resort. At 400kHz I2C, normal clock stretch is <10us; anything beyond 1ms indicates
    a fault.'
  common_mistake: '"The pull-up resistor broke." Resistors rarely fail completely. The issue is active
    protocol behavior.'
  napkin_math: A 400kHz I2C clock cycle takes 2.5µs. If the slave holds the line for 10,000µs (10ms),
    it's either doing a massive internal conversion, or it has crashed. A naive driver will wait infinity
    microseconds, crashing your multi-million dollar satellite.
