title: Tinyml New 0024
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: A TinyML model monitoring an industrial machine uses temperature data to predict failures. It
  works well initially, but after 3 months, it outputs continuous false positives.
details:
  realistic_solution: The root cause is sensor concept drift combined with seasonal ambient changes. The
    model was likely trained on data where 'normal' was around 20°C. As summer approaches, the ambient
    baseline rises to 30°C. The absolute temperature triggers the anomaly threshold. The solution is to
    preprocess the sensor data using a rolling average, feeding the model only the *delta* (rate of change).
  common_mistake: Feeding absolute environmental sensor values directly into a model without considering
    long-term ambient baselines.
  napkin_math: 'Baseline summer shift: +10°C. If the anomaly threshold was absolute T > 28°C, the model
    sees 30°C and predicts 100% failure rate. Delta T preprocess: (Current - 1hr_Avg) ignores the slow
    ambient shift.'
