id: tinyml-0793
title: Tinyml New 0015
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: A Cortex-M4 device dynamically allocates memory for variable-length audio ML inferences. It
  works perfectly for 12 hours, then predictably crashes with a HardFault due to memory allocation failure.
details:
  realistic_solution: The symptom is classic heap fragmentation. Dynamic allocation (`malloc`/`free`)
    of varying lengths of audio tensors leaves small, unusable gaps in the SRAM over time. Eventually,
    although the total free memory is sufficient, there is no contiguous block large enough for the next
    tensor, causing `malloc` to return NULL. The solution is to use static memory pools or a global tensor
    arena.
  common_mistake: Using dynamic memory allocation in embedded real-time machine learning, ignoring the
    inevitability of heap fragmentation.
  napkin_math: Heap = 100KB. Fragmentation over time leaves 5 gaps of 20KB. Max contiguous memory = 20KB.
    Requesting a 30KB tensor fails and crashes, despite having 100KB total free memory.
