schema_version: 1
id: tinyml-fill-00558
title: 'TinyML Device: Unexpected Idle Power Drain'
topic: power-budgeting
status: published
provenance: imported
scenario: A new tinyML device, powered by a Cortex-M7 (running at 480 MHz) paired with an Ethos-U55 NPU
  (configured for 256 MAC/cycle), is designed for continuous keyword spotting. The system has 512 KB SRAM.
  Initial benchmarks show that a single inference takes only 10ms and consumes an average of 50mW during
  that active period, which aligns with the week-long battery life target (200mWh battery). However, field
  tests reveal the battery drains in less than two days, significantly faster than expected. Developers
  have verified the inference algorithm's efficiency and confirmed it's not running continuously. The
  device experiences high power consumption even when no keywords are detected and the system is supposedly
  in an 'idle' state, suggesting a baseline power issue. What are the most likely root causes for this
  accelerated battery drain, and how would you systematically diagnose and rectify the problem, considering
  power budgeting principles?
details:
  realistic_solution: '1. **Comprehensive Power Profiling:** Utilize a high-resolution power analyzer
    to measure current draw across all operational states: active inference, various idle states (light
    sleep, deep sleep), and peripheral active states. This identifies where the baseline power consumption
    is occurring.

    2. **DVFS & P-state Verification:** Confirm that the Cortex-M7 and Ethos-U55 are correctly transitioning
    into lowest power P-states and leveraging Dynamic Voltage and Frequency Scaling (DVFS) when idle.
    Ensure that power caps are appropriately set and enforced.

    3. **CMOS Power Equation Analysis:** Re-evaluate the CMOS power equation (P_total = αCV²f + I_leakV)
    for all major components. High static leakage current (I_leakV) during ''idle'' periods is a strong
    indicator of a failure to power-gate or reach proper low-power states.

    4. **Peripheral Power Audit:** Investigate all integrated peripherals (sensors, communication modules,
    clocks) to ensure they are not drawing excessive power when the main processing units are idle. Verify
    their power-down sequences.

    5. **Software Power Management Review:** Examine the firmware''s power management routines. Are interrupts
    waking the system too frequently? Are there software bugs preventing transitions to deeper sleep states?
    Is the ''idle'' state truly idle, or is background processing occurring?'
  common_mistake: Candidates often focus exclusively on the dynamic power consumed during active inference,
    overlooking the cumulative impact of static power (leakage), inefficient power management states (e.g.,
    failure to enter deep sleep), or unnecessary activity from peripherals during 'idle' periods. They
    might also misinterpret the role of DVFS in energy versus power optimization.
  napkin_math: "Target Average Power (TAP) = 200 mWh / (7 days * 24 hours/day) = 200 mWh / 168 hours ≈\
    \ 1.19 mW.\nObserved Battery Life: 2 days = 48 hours.\nObserved Average Power (OAP) = 200 mWh / 48\
    \ hours ≈ 4.17 mW.\nThis indicates an extra ~3 mW of continuous power drain. \nIf active inference\
    \ (50mW for 10ms) occurs once per second, its average contribution is (50mW * 0.01s) / 1s = 0.5mW.\
    \ \nTherefore, the static/idle power is roughly 4.17 mW - 0.5 mW = 3.67 mW. If the expected idle power\
    \ was, for example, 0.5 mW, then the device is consuming ~3.17 mW more than anticipated during 'idle'\
    \ periods, which is the primary culprit for the reduced battery life."
