id: tinyml-0787
title: Tinyml New 0009
topic: pruning-sparsity
status: published
provenance: imported
scenario: You apply 50% unstructured pruning to a heavy CNN deployed on a Jetson Orin (275 TOPS). Training
  confirms 50% sparsity. Yet, the deployed model shows absolutely 0% speedup and uses more memory.
details:
  realistic_solution: Unstructured pruning removes weights randomly. To execute this, the hardware uses
    sparse matrix formats (like CSR) which require reading explicit index arrays. The low arithmetic intensity
    of random sparse reads heavily throttles memory bandwidth, and GPUs lack dedicated unstructured sparse
    hardware accelerators. Switch to structured pruning (e.g., removing entire channels) or 2:4 sparsity
    if supported.
  common_mistake: Deploying unstructured sparse models on SIMD/GPU hardware expecting speedups, ignoring
    index overhead and memory coalescing rules.
  napkin_math: 'Dense read: 1 byte per weight. Sparse CSR read: 1 byte weight + 2 bytes index = 3 bytes
    per active weight. At 50% sparsity, total bytes read is 50% * 3 = 1.5x the original dense memory traffic.'
