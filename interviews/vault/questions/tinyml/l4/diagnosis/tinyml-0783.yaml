id: tinyml-0783
title: Tinyml New 0005
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: An audio wake-word model uses INT16 activations and INT8 weights. On the Cortex-M4, it randomly
  produces silent misclassifications. Profiling shows intermediate buffers mysteriously overflowing their
  data types.
details:
  realistic_solution: The intermediate buffer overflow is caused by the accumulator exceeding 32 bits
    during the dot product of large filters. While INT8 x INT16 fits in 24 bits, accumulating thousands
    of these products in a 32-bit register (common in standard M4 kernels) causes integer overflow if
    activation and weight distributions are skewed. Use a 64-bit accumulator or constrain weight magnitudes.
  common_mistake: Focusing only on the bit-width of inputs and outputs, while ignoring the bit-width limits
    of the hardware accumulator for large layers.
  napkin_math: Max product = 127 * 32767 = 4,161,409. Accumulating into a 32-bit int (max 2,147,483,647).
    If N > 2,147,483,647 / 4,161,409 = 516, it overflows. Convolutions with >516 params will overflow.
