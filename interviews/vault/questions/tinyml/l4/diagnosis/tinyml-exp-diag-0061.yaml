schema_version: 1
id: tinyml-exp-diag-0061
title: NAS Latency Regression on Ethos-U55 NPU
topic: neural-architecture-search
status: published
provenance: imported
scenario: You are using a hardware-aware NAS framework to optimize a vision model for an ARM Cortex-M7
  + Ethos-U55 (Corstone-300) system. The NAS objective function includes a latency penalty. During search,
  the NAS identifies a candidate architecture with fewer FLOPs and smaller parameter size than your baseline,
  but when deployed to the actual hardware, the inference latency is 3x higher. The Ethos-U55 shares the
  512 KB SRAM with the M7. What is the root cause of this performance regression?
details:
  realistic_solution: The root cause is that the NAS selected operators or tensor shapes that are unsupported
    by the Ethos-U55 NPU, forcing a fallback to the slower Cortex-M7 CPU. Even though the Ethos-U55 can
    execute up to 512 MACs/cycle, unsupported operations (like certain non-standard activations or asymmetric
    paddings) cause the graph compiler (Vela) to partition the model. This results in costly context switching
    and data movement between the NPU and CPU within the shared 512 KB SRAM.
  common_mistake: Candidates often assume that fewer FLOPs or fewer parameters always correlate with lower
    latency. They might incorrectly guess that the M7 clock speed is throttling or that the weights are
    stored in slow flash without considering the specific NPU execution constraints and compiler behavior.
  napkin_math: Assuming an operation requires 1,000,000 MACs. On the Ethos-U55 (assuming an average configuration
    of 256 MACs/cycle at 480 MHz), the theoretical execution time is 1,000,000 / (256 * 480,000,000) =
    0.008 ms. If unsupported, the 480 MHz M7 CPU doing roughly 2 MACs/cycle (using DSP instructions) takes
    1,000,000 / (2 * 480,000,000) = 1.04 ms. The fallback layer alone takes ~130x longer to compute, which
    combined with the SRAM data movement overhead, easily explains the 3x end-to-end latency increase
    despite fewer overall FLOPs.
