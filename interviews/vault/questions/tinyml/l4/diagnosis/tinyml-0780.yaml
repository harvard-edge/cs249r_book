schema_version: 1
id: tinyml-0780
title: Tinyml New 0002
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: Deploying a quantized INT8 CNN on a Cortex-M4 using CMSIS-NN. Expected 4x speedup over FP32,
  but execution time actually increased by 20%. Profiling shows the CPU is fully utilized but taking significantly
  longer.
details:
  realistic_solution: The compiler failed to find an optimized INT8 kernel for a specific layer configuration
    (e.g., asymmetric padding or unsupported stride). It falls back to a slow reference implementation,
    or inserts dequantize and quantize nodes around an FP32 kernel. You must analyze the operator support
    matrix and adjust the padding or stride to match CMSIS-NN SIMD requirements.
  common_mistake: Assuming all INT8 operations automatically use hardware SIMD instructions without verifying
    the optimized runtime graph.
  napkin_math: 'M4 SIMD MAC takes 1 cycle. Reference INT8 MAC takes ~15 cycles. Dequant/Quant adds ~50
    cycles/element. For 10k MACs: SIMD=10k cycles. Ref+Dequant=650k cycles. At 168 MHz, 650k cycles is
    3.87ms vs 0.06ms for SIMD path.'
