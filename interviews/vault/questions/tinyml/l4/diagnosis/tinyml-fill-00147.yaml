id: tinyml-fill-00147
title: Diagnosing High Inference Cost on nRF5340 for Keyword Spotting
topic: compute-cost-estimation
status: published
provenance: imported
scenario: 'Your team has deployed a compact keyword spotting neural network on a Nordic nRF5340 (128 MHz
  ARM Cortex-M33, 256 KB SRAM, 1 MB flash, BLE connectivity). Initial field tests indicate two critical
  issues: battery life is only 30% of the projected target, and average inference latency consistently
  measures 250ms, significantly exceeding the 100ms requirement for real-time responsiveness. The ML inference
  process is suspected as the primary driver of this excessive ''compute cost''. Considering the nRF5340''s
  specific resource limitations, outline your diagnostic process to pinpoint the root causes of the high
  power consumption and latency.'
details:
  realistic_solution: 'A realistic diagnostic approach involves: 1. **On-device Profiling:** Utilize hardware
    debugging tools (e.g., SEGGER J-Link, ARM Keil MDK, or custom instrumentation) to profile CPU cycles
    per inference, identify hot-spots within the neural network layers, and measure energy consumption
    during active inference periods versus idle. 2. **Memory Analysis:** Monitor SRAM usage for activations,
    intermediate tensors, and stack. Analyze flash usage for model weights and code size. Identify potential
    memory overflows or frequent data transfers between slow flash and fast SRAM. 3. **FLOPs/MAC Estimation
    vs. Actual:** Calculate the theoretical FLOPs/MACs of the model and compare against the observed CPU
    cycle count to understand efficiency gaps. Investigate if any specific operations are unexpectedly
    expensive on the Cortex-M33. 4. **Software Stack Review:** Evaluate the ML inference engine''s configuration
    and optimization level for the target core. Check for any non-optimal compiler flags or library versions.
    5. **BLE Interaction:** Assess the frequency and duration of BLE transmissions, as radio activity
    is a major power consumer. Ensure inference isn''t blocking critical BLE operations or vice-versa,
    causing latency spikes.'
  common_mistake: A common pitfall would be to solely focus on theoretical FLOPs or MAC operations, neglecting
    the practical implications of memory access patterns, cache efficiency (or lack thereof on deeply
    embedded systems), and the energy cost of data movement between flash and SRAM. Another mistake is
    to ignore the overhead introduced by the chosen ML inference framework (e.g., TensorFlow Lite Micro)
    or underlying RTOS/BLE stack, which can consume significant CPU cycles and memory resources.
  napkin_math: 'The nRF5340 CPU at 128 MHz means 128 million cycles/second. If inference takes 250ms (0.25s),
    that''s ~32 million cycles per inference (128e6 * 0.25). The target of 100ms means ~12.8 million cycles.
    If a typical 8-bit quantized MAC operation on Cortex-M33 takes ~2 cycles, and your model has, say,
    5 million MACs, that''s a theoretical minimum of 10 million cycles (5e6 * 2). The observed 32 million
    cycles suggests significant overhead (e.g., 22 million cycles or 170% overhead). For memory: 256 KB
    SRAM. If intermediate activations for a layer require 50KB, and there are multiple such layers, or
    the model weights themselves (even quantized) exceed available SRAM, frequent cache misses or external
    memory accesses (if applicable, or simply data re-reads from flash) will drastically increase latency
    and energy cost. For power, if the CPU draws 10mA at 3V for 250ms, that''s 7.5 mJ per inference (0.01A
    * 3V * 0.25s). If the battery is 100 mAh (360 J), this quickly adds up.'
