schema_version: 1
id: tinyml-exp2-diag-0213
title: Diagnosing CMSIS-NN SIMD Underutilization
topic: profiling-bottleneck-analysis
status: published
provenance: imported
scenario: You are profiling an INT8 CNN deployed on an ARM Cortex-M4 (STM32F4) operating at 168 MHz with
  256 KB SRAM and 1 MB flash. The core has no FPU but supports CMSIS-NN SIMD instructions that can execute
  2x INT8 MACs per cycle. A pointwise 1x1 convolution layer requiring 500,000 MACs is taking 15 ms to
  execute, which is much slower than expected based on the core's capabilities. What is the most likely
  architectural bottleneck causing this latency?
details:
  realistic_solution: The bottleneck is almost certainly a suboptimal tensor memory layout, specifically
    using CHW instead of HWC. CMSIS-NN heavily relies on the HWC layout to load contiguous elements along
    the channel dimension into 32-bit registers to utilize the SIMD instructions. With a CHW layout, memory
    accesses are strided, which breaks SIMD vectorization and forces a fallback to a scalar loop dominated
    by memory fetch overhead.
  common_mistake: Candidates often blame flash memory read speeds or cache misses, forgetting that SRAM
    access on this MCU is largely deterministic. They may also incorrectly assume the lack of an FPU is
    the issue, even though the operations are explicitly stated to be INT8.
  napkin_math: 'Theoretical peak throughput: 168 MHz * 2 MACs/cycle = 336,000,000 MACs/sec. Minimum theoretical
    time for 500k MACs = 500,000 / 336,000,000 = 1.48 ms. The observed latency is 15 ms, roughly 10x slower.
    Even without SIMD (1 MAC/cycle), it would take ~3 ms. However, strided memory access in CHW layout
    typically adds 4-5 cycles of stall/fetch overhead per operation. 500,000 operations * 5 cycles / 168,000,000
    cycles/sec = 14.88 ms, which perfectly aligns with the 15 ms profiler measurement.'
