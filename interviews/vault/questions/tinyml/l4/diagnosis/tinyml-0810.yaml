id: tinyml-0810
title: Tinyml New 0035
topic: transformer-systems-cost
status: published
provenance: imported
scenario: An M4 processor uses a PID control loop running at 500Hz to balance a drone. A TinyML task runs
  asynchronously to detect hand gestures. When a gesture is detected, the drone physically jerks and loses
  balance.
details:
  realistic_solution: The ML task is either preempting the PID control loop, or holding a critical resource.
    PID loops require exact timing intervals to compute derivatives correctly. If the ML task delays the
    PID execution, the measured `dt` (delta time) is suddenly much larger, but the PID constants are tuned
    for the expected `dt`. This causes a massive erroneous control output. Adjust task priorities.
  common_mistake: Running ML tasks without strict RTOS isolation from safety-critical cyber-physical control
    loops.
  napkin_math: PID loop 500Hz = 2ms expected `dt`. If ML task delays it by 5ms, actual `dt` = 7ms. The
    derivative term (Error - LastError) / 2ms is computed instead of / 7ms, causing a 3.5x spike in the
    D-term output.
