schema_version: 1
id: tinyml-0094
title: The Power Supply ADC Jitter
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your vibration monitoring system on an ESP32-C6 (RISC-V, 160 MHz, 512 KB SRAM) uses the built-in
  12-bit SAR ADC to sample a piezoelectric vibration sensor at 10 kHz. The model was trained on data from
  a benchtop DAQ with 16-bit resolution. In the field, the model's anomaly detection F1-score drops from
  0.92 to 0.71. The vibration signal amplitude is correct, but the frequency spectrum shows unexpected
  broadband noise above 2 kHz. Diagnose the ADC issue.
details:
  realistic_solution: 'The ESP32-C6 SAR ADC shares silicon substrate and power supply with WiFi radio.
    When WiFi transmits, 300 mA current spikes create 30 mV supply noise coupling directly into ADC —
    37 LSBs of noise on a 12-bit converter, reducing ENOB from 12 to 6.8 bits. This broadband noise floor
    buries vibration fault harmonics above 2 kHz that the model was trained to detect on a clean 16-bit
    DAQ (ENOB 14.5). Fixes in order of effectiveness: (1) Disable WiFi during ADC sampling — schedule
    10 ms acquisition bursts between WiFi TX slots. ENOB recovers to ~11 bits, F1 improves to ~0.87. (2)
    16x oversampling + decimation: noise drops by 4x, ENOB = 8.8 bits even with WiFi active. Costs 160
    kHz sample rate. (3) External ADC (ADS1115, 16-bit, isolated power) ENOB ~14.5, F1 ~0.91. Cost: +$2
    BOM. (4) Retrain model on ESP32-collected data, partial fix to F1 ~0.82.'
  common_mistake: '"The ESP32''s ADC is just lower quality than the DAQ — accept the 12-bit vs 16-bit
    resolution loss." The resolution difference (12 vs 16 bits) accounts for ~1-2% accuracy loss, not
    21%.'
  napkin_math: 'ESP32-C6 SAR ADC: 12-bit, 3.3V range, LSB = 3.3V/4096 = 0.806 mV. WiFi TX: 300 mA current
    spikes at 2.4 GHz. Supply noise: 300 mA * 100 mOhm PCB trace = 30 mV ripple. Noise in LSBs: 30 mV
    / 0.806 mV = 37 LSBs. ENOB: 12 - log2(37) = 12 - 5.2 = 6.8 bits. Training DAQ at 16-bit: ENOB ~14.5
    bits. SNR gap: 46 dB vs 23 dB. With 16x oversampling: noise/4 = 9.3 LSBs, ENOB = 8.8 bits. With WiFi
    disabled during ADC: ENOB = 11 bits.'
