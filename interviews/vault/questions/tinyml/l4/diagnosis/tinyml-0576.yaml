schema_version: 1
id: tinyml-0576
title: The Battery Voltage Sag Reset
topic: cnn-efficient-design
status: published
provenance: imported
scenario: Your battery-powered TinyML device wakes from deep sleep, turns on its Wi-Fi modem, and runs
  a heavy CNN to classify an image. When the battery is full (4.2V), it works perfectly. When the battery
  drops to 3.6V (which is still 40% full), the device crashes and reboots the exact moment the neural
  network starts computing. Why does the device die when there is still 40% battery left?
details:
  realistic_solution: 'Voltage sag under load causes a brown-out reset. Battery at 3.6V with 2-ohm internal
    resistance. Peak current when WiFi + CNN run simultaneously: ~350mA. Voltage drop: I*R = 0.35A * 2ohm
    = 0.7V. Actual voltage at MCU: 3.6 - 0.7 = 2.9V, below the 3.3V brown-out threshold. Fix: (1) add
    a 100uF bulk capacitor near the MCU to supply transient current, (2) stagger WiFi and inference —
    never run both simultaneously, (3) use a buck-boost regulator that maintains output even with sagging
    input. The battery has plenty of energy; the delivery path cannot handle the peak current.'
  common_mistake: '"The battery voltage is too low for the MCU." Most MCUs operate down to 1.8V or 3.3V,
    so 3.6V is plenty. The problem is dynamic, not static.'
  napkin_math: Battery = 3.6V. Internal Resistance = 2 Ohms. Peak Current (Wi-Fi + ML) = 0.35A. Voltage
    Drop = 0.35A * 2 Ohm = 0.7V. Actual Voltage reaching MCU = 3.6 - 0.7 = 2.9V. If the MCU needs 3.3V,
    it instantly crashes.
