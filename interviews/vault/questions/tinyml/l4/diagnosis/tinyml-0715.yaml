schema_version: 1
id: tinyml-0715
title: Anomaly Detection on Streaming Sensor Data with Limited Memory
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: 'Your vibration sensor streams data at 3.2 kHz (3 axes × 16-bit = 19.2 KB/s). You need to detect
  anomalies in real-time on a Cortex-M4 with 256 KB SRAM. The challenge: your autoencoder model processes
  1-second windows (3200 samples × 3 axes × 2 bytes = 19.2 KB per window), but you also need to maintain
  a running baseline of ''normal'' vibration patterns for comparison. How do you fit the streaming pipeline,
  the model, and the baseline statistics in 256 KB?'
details:
  realistic_solution: 'Use exponential moving average (EMA) statistics instead of raw data for the baseline.
    Raw 60s baseline: 1.15MB — doesn''t fit. EMA baseline: 8KB (mean + variance per frequency bin per
    axis). Memory layout: double-buffer for streaming (2 * 19.2KB = 38.4KB), FFT scratch (4KB), feature
    vectors (8KB), EMA baseline (8KB), autoencoder model weights in flash (80KB), tensor arena (120KB),
    firmware (40KB). Total: 218KB / 256KB = 85%. Processing: FFT + features + baseline update + autoencoder
    = 13.2ms per 1s window = 1.3% CPU utilization. The autoencoder catches subtle temporal patterns; the
    EMA catches drift.'
  common_mistake: '"Store the last 60 seconds of raw data as the baseline." 60 seconds × 19.2 KB/s = 1.15
    MB. Doesn''t fit in 256 KB.'
  napkin_math: 'Raw baseline (60s): 1.15 MB — doesn''t fit. EMA baseline: 8 KB — fits with room to spare.
    Information loss: the EMA captures the mean and variance of each feature, which is sufficient for
    detecting gradual degradation (bearing wear) and sudden changes (impact events). It cannot detect
    subtle temporal patterns (e.g., a specific sequence of vibration events) — that''s what the autoencoder
    is for. Total SRAM: 218 KB used / 256 KB available = 85% utilization. Processing time per window:
    FFT (6ms) + features (2ms) + baseline update (<0.1ms) + statistical score (<0.1ms) + autoencoder (5ms)
    = **13.2ms** per 1-second window. CPU utilization: 1.3%.'
