schema_version: 1
id: tinyml-0004
title: The CPU Cycle Thief
topic: real-time-deadlines
status: published
provenance: imported
scenario: Your keyword spotting model needs 40ms to run, and your frame deadline is 50ms. On paper, this
  fits. But in practice, the system crashes every few seconds. Based on the timeline, what is 'stealing'
  your CPU cycles?
details:
  realistic_solution: You are suffering from **Blocking ISR Overruns**. The system executes slow, blocking
    I2C sensor reads inside an Interrupt Service Routine (ISR). While the ISR runs, the main ML loop is
    completely halted. If I2C takes 5ms and fires frequently, it consumes the 10ms of margin you thought
    you had. The fix is to use **DMA (Direct Memory Access)** for sensor reads so the CPU can keep doing
    ML math while the hardware handles the data transfer.
  common_mistake: '"The processor isn''t fast enough, increase the clock speed."'
  napkin_math: I2C reads without DMA steal CPU cycles. An I2C clock at 100 kHz = ~10 kB/s. Reading 64
    bytes takes (64 * 8) / 100,000 = 5.12 ms. If audio is fetched every 10ms, in a 50ms window there are
    5 reads = 25.6 ms blocked. Remaining CPU time = 50 - 25.6 = 24.4 ms. The 40ms model fails the 50ms
    deadline by 15.6ms. Use DMA!
