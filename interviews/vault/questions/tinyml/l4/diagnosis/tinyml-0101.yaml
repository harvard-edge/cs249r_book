id: tinyml-0101
title: The Model Calibration Drift
topic: mlops-lifecycle
status: draft
provenance: imported
scenario: You train an anomaly detection model for industrial motors using a high-end lab accelerometer.
  You achieve 99% accuracy. You deploy the model to the factory floor using a cheap $2 MEMS accelerometer.
  The model immediately fires a continuous stream of false positives. Both sensors are 16-bit. What critical
  MLOps step did you skip during deployment?
details:
  realistic_solution: 'You skipped sensor sensitivity calibration. Lab accelerometer (±2g range): 1 LSB
    = 0.061 mg. Factory MEMS (±8g range): 1 LSB = 0.244 mg — 4x coarser. Feeding raw integer ADC values
    means the model interprets every vibration as 4x more intense than reality, triggering continuous
    false positives. The model learned thresholds calibrated to the lab sensor''s scale. Fix: convert
    raw integers to physical units (g) before inference using the sensor''s documented sensitivity. Also:
    match noise characteristics — the cheap sensor has 3-5x higher noise floor, so apply a matched low-pass
    filter to approximate the lab sensor''s noise profile.'
  common_mistake: '"The cheap sensor is too noisy, we need a low-pass filter." Noise is a factor, but
    the immediate catastrophic failure is a scaling mismatch.'
  napkin_math: 'Lab Sensor (±2g): 1 LSB = 0.061 mg. Factory Sensor (±8g): 1 LSB = 0.244 mg. Feeding the
    raw integers without scaling means your model thinks every movement is exactly 4 times more violent
    than it actually is.'
