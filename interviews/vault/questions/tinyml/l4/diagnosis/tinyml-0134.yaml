schema_version: 1
id: tinyml-0134
title: The Flash Page Erase Block
topic: real-time-deadlines
status: published
provenance: imported
scenario: Your edge device runs a continuous audio inference loop (every 50ms). When an anomaly is detected,
  it logs a 20-byte string to internal SPI Flash using a standard filesystem (like LittleFS). The logging
  function usually takes 1ms. However, once a week, the logging function takes 500ms, causing the audio
  inference loop to miss its deadline entirely and drop 10 frames of audio. What physical process on the
  Flash chip causes this massive delay?
details:
  realistic_solution: You hit a **Flash Page Erase Cycle**. Writing 20 bytes = ~1ms. Erasing a 64 KB SPI
    Flash sector = ~500ms. If your real-time deadline is 50ms, a single hardware Erase command destroys
    your latency budget by 10x.
  common_mistake: '"The filesystem is fragmented." Fragmentation slows down reads, but a 500x slowdown
    on a 20-byte write points to flash physics.'
  napkin_math: Writing 20 bytes = ~1ms. Erasing a 64 KB SPI Flash sector = ~500ms. If your real-time deadline
    is 50ms, a single hardware Erase command destroys your latency budget by 10x.
