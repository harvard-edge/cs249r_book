id: tinyml-0001
title: The Memory Collision
topic: cnn-efficient-design
status: published
provenance: imported
scenario: Your model occasionally produces random garbage results, but only when the device is under heavy
  interrupt load (e.g., fast UART logging + high-speed sensor polling). Based on the SRAM layout, how
  is your 'stable' tensor arena being corrupted?
details:
  realistic_solution: You have a **Stack-Arena Collision**. On Cortex-M, the stack grows downward. Deep
    function calls or nested interrupts can push the stack into the memory space of the tensor arena,
    overwriting model activations. The fix is to place a **Stack Canary** at the boundary, use the **MPU
    (Memory Protection Unit)** to forbid stack access to the arena region, or move the stack to the very
    top of SRAM so it faults at the limit rather than corrupting data.
  common_mistake: '"The tensor arena is too small — increase it." The arena size is fine; the problem
    is its location relative to the stack.'
  napkin_math: If your stack is 8 KB and your arena starts at the 8 KB mark, a single nested interrupt
    that pushes an extra 256 bytes of context can overwrite the first several rows of your input tensor.
