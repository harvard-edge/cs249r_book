schema_version: 1
id: tinyml-0814
title: Tinyml New 0039
topic: pruning-sparsity
status: published
provenance: imported
scenario: Compiling a ResNet model with TVM for a microcontroller yields a binary that OOMs. The same
  model architecture, deployed via flat TFLite Micro, fits easily within the 256KB SRAM.
details:
  realistic_solution: The TVM memory planner failed to optimally overlap memory buffers for the residual
    branch. TFLite Micro's memory planner understands that once a branch is added back to the main trunk,
    its memory can be freed/reused. If TVM's static memory planner assigns strictly disjoint arenas for
    the parallel branches and the output, it vastly over-allocates peak memory. Adjust TVM workspace planning.
  common_mistake: Assuming all Ahead-of-Time compilers use identical and perfectly optimal static memory
    planning algorithms.
  napkin_math: ResNet branch A needs 50KB. Branch B needs 50KB. Output needs 50KB. Optimal planner reuses
    A+B space for Output (Peak = 100KB). Naive planner allocates A+B+Output statically (Peak = 150KB),
    causing OOM.
