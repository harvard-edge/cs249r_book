schema_version: 1
id: tinyml-0784
title: Tinyml New 0006
topic: latency-decomposition
status: published
provenance: imported
scenario: An object detection model benchmarked on Jetson Orin at Batch Size 32 utilizes 80% of the 275
  TOPS. In production at Batch Size 1, utilization drops to 5% and latency misses the 10ms real-time target.
details:
  realistic_solution: The model shifted from being compute-bound to memory-bandwidth-bound on the roofline.
    At BS=1, the arithmetic intensity (FLOPs per byte read) drops drastically because weights are loaded
    from memory for a single image. At BS=32, weights are reused across 32 images. To fix this, apply
    weight quantization, prune the model, or optimize L2 cache blocking to reduce memory traffic.
  common_mistake: Using server-style batch benchmarking to estimate real-time edge performance, ignoring
    the roofline arithmetic intensity shift at BS=1.
  napkin_math: Orin bandwidth is ~204GB/s. BS=1 reads 20MB of weights. If layer has 40M FLOPs, arithmetic
    intensity = 40M / 20MB = 2 FLOPs/byte. Max compute = 2 * 204 = 408 GFLOPS, far below 275 TOPS.
