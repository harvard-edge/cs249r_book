id: tinyml-0794
title: Tinyml New 0017
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: During the heaviest convolution layer of an anomaly detection model, the Cortex-M4 microcontroller
  randomly resets. The software logic has been heavily tested and proves flawless.
details:
  realistic_solution: The system is experiencing a brownout reset. The heaviest convolution layer causes
    maximum simultaneous switching of the ALU transistors. This draws an instantaneous spike in current
    that the power supply or decoupling capacitors cannot handle, causing the Vdd voltage to dip below
    the MCU's minimum operating threshold. Fix by adding larger decoupling capacitors or lowering the
    clock speed.
  common_mistake: Blaming memory leaks or software bugs for system resets without analyzing the power
    delivery network under peak ML load.
  napkin_math: Peak current I = C × V × f. C=10nF, V=3.3V, f=168 MHz. Instantaneous switching current
    = 10e-9 × 3.3 × 168e6 = 5.5mA per switching node. For a real brownout event, the effective capacitance
    during peak simultaneous switching of all ALU transistors is orders of magnitude higher than a single
    node (effectively the full on-chip decap), driving the actual transient current spike into the ampere
    range.
