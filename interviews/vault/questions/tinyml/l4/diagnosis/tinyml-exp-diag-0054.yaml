schema_version: 1
id: tinyml-exp-diag-0054
title: Diagnosing Domain Shift in ESP32-S3 Wake-Word Datasets
topic: dataset-curation
status: published
provenance: imported
scenario: Your team deployed an INT8 quantized wake-word detection model on an ESP32-S3 (240 MHz, 512
  KB SRAM) using its vector extensions. While cloud evaluation showed 98% accuracy, the device exhibits
  a massive false acceptance rate when placed in living rooms. The training dataset consisted of 10,000
  clean audio samples recorded by employees using laptop microphones in quiet offices. The ESP32-S3 receives
  audio via I2S from a low-cost, noisy MEMS microphone. Diagnose the root cause of the performance drop
  and explain how you would curate the dataset to resolve it.
details:
  realistic_solution: 'The root cause is a severe acoustic domain shift between the high-quality laptop
    microphones used for training and the cheap MEMS microphone used in deployment, compounded by the
    lack of background noise in the dataset. The solution is hardware-in-the-loop data collection: gather
    new samples directly using the ESP32-S3''s microphone in target environments (e.g., living rooms with
    TV noise). To leverage existing data, aggressive data augmentation should be applied, specifically
    injecting realistic background noise profiles and simulating the frequency response of the specific
    MEMS microphone.'
  common_mistake: Candidates often suggest increasing model complexity or using larger architectures,
    completely ignoring the ESP32-S3's 512 KB SRAM limit. They may also suggest applying generic noise
    reduction algorithms on the device without considering the 240 MHz compute budget or the fundamental
    domain shift in the data.
  napkin_math: Assuming a 16 kHz, 16-bit audio stream, 1 second of audio requires 32 KB of memory (16000
    * 2 bytes). This consumes about 6.25% of the ESP32-S3's 512 KB SRAM just for the input buffer. If
    inference runs every 500ms, the 240 MHz dual-core CPU has a budget of ~120 million cycles per window.
    Running complex on-device noise suppression (e.g., RNNoise) would consume >50 MIPS, severely cutting
    into the cycle budget needed for the neural network itself. Therefore, the noise robustness must be
    baked into the dataset curation and training phase rather than handled via on-device preprocessing.
