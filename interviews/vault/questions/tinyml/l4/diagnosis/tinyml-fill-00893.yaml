id: tinyml-fill-00893
title: Diagnosing Knowledge Distillation Issues on ESP32-S3 for Anomaly Detection
topic: knowledge-distillation
status: published
provenance: imported
scenario: Your team is deploying a lightweight anomaly detection model onto an ESP32-S3 (240 MHz dual-core,
  512 KB SRAM, 8 MB PSRAM). To achieve the strict latency and memory constraints, you've used knowledge
  distillation, specifically logit matching, to train a compact student model from a high-accuracy teacher.
  After flashing the firmware, you notice the on-device accuracy is consistently 5-7% lower than expected
  from your offline validation, and you're occasionally hitting CPU bottlenecks during peak sensor input,
  leading to dropped frames. You suspect the distillation process or its application on the target hardware
  might be at fault. How would you diagnose the root cause of this accuracy drop and CPU bottleneck in
  the context of knowledge distillation on the ESP32-S3?
details:
  realistic_solution: '1. **Runtime Verification**: Compare student model''s internal activations and
    logit outputs on the ESP32-S3 against those from distillation training using identical inputs to identify
    precision/quantization issues or environmental discrepancies. 2. **Memory Profiling**: Analyze memory
    access patterns on ESP32-S3, especially between fast SRAM and slower PSRAM, to identify bottlenecks
    from model layers or intermediate activations spilling over. 3. **Floating-point Fidelity**: Investigate
    if the ESP32-S3''s FPU behavior or lack thereof (e.g., using fixed-point arithmetic if not properly
    configured) is distorting the distilled knowledge, particularly if ''soft targets'' from the teacher
    were float32. 4. **Toolchain/Compiler Check**: Verify if the chosen embedded toolchain''s optimizations
    or library versions for inference on ESP32-S3 introduce subtle computation errors not present in the
    training environment.'
  common_mistake: Jumping directly to retraining with different student architectures or more aggressive
    pruning, without diagnosing if the existing distilled model's performance degradation is due to runtime
    environment discrepancies, inefficient memory access patterns on the ESP32-S3's PSRAM, or issues with
    how the 'soft targets' from the teacher are being handled at inference on the resource-constrained
    device.
  napkin_math: If the student model, despite its size, has a significant number of floating-point operations
    that are emulated or poorly optimized on the ESP32-S3's dual-core (240 MHz) without hardware FPU acceleration,
    each operation could consume 10s or 100s of cycles instead of 1-2 cycles. A layer performing `N` float
    MACs (multiply-accumulate) could take `N * C_float` cycles instead of `N * C_int`. For example, if
    `C_float` is 50 cycles and `N` is 100,000, that's 5 million cycles for one layer, which at 240 MHz
    (4.16ns/cycle) is `5 * 10^6 * 4.16 * 10^-9` = 20.8ms. If the real-time deadline is 10ms, this is a
    clear bottleneck. Additionally, if the model weights or activations frequently spill from the 512KB
    SRAM to the 8MB PSRAM, each PSRAM access introduces latency (e.g., 50-100ns per word), which adds
    up quickly for large intermediate tensors, impacting throughput.
