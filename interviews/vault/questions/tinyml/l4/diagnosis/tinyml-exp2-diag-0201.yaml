schema_version: 1
id: tinyml-exp2-diag-0201
title: ESP32-S3 Camera Sensor Domain Gap Diagnosis
topic: dataset-curation
status: published
provenance: imported
scenario: You deployed an INT8 visual wake-word model on an ESP32-S3 (240 MHz dual-core Xtensa, 512 KB
  SRAM, 8 MB PSRAM) connected to an inexpensive SPI camera. During dataset curation, annotators labeled
  a massive dataset of high-res web-scraped images downscaled to 96x96, and the quantized model achieved
  98% offline accuracy. However, in production under standard office lighting, the ESP32-S3 model continuously
  outputs false negatives and exhibits highly erratic predictions. What dataset curation failure occurred,
  and how does the hardware architecture explain this symptom?
details:
  realistic_solution: The root cause is a domain shift because the ESP32-S3 lacks a dedicated hardware
    Image Signal Processor (ISP) to perform white balance, demosaicing, and noise reduction. The curation
    pipeline annotated cleanly processed, ISP-corrected web images, but the edge model is ingesting raw,
    noisy sensor data. The solution is to restructure the annotation workflow to label data collected
    directly from the ESP32-S3's SPI camera in target environments, or to aggressively augment the web
    dataset with synthesized CMOS noise and low dynamic range artifacts.
  common_mistake: Candidates often jump to blaming the INT8 vector quantization process for dropping precision,
    or they suspect a memory leak in the 512 KB SRAM. They fail to connect the predictive symptom to a
    massive dataset bias caused by the lack of edge-native sensor data.
  napkin_math: A 96x96 RGB input tensor consumes 96 * 96 * 3 = 27.6 KB of the 512 KB SRAM. Writing a software-based
    ISP to clean the image before inference requires roughly 100 instructions per pixel, totaling 96 *
    96 * 100 = 921,600 cycles. On the 240 MHz Xtensa core, this adds ~3.84 ms of compute overhead per
    frame. Because the team skipped the software ISP to prioritize the INT8 vector extensions for the
    neural network, the model is fed the raw, noisy 27.6 KB buffers that entirely mismatch the curated
    training distribution.
