id: tinyml-0782
title: Tinyml New 0004
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: To save memory on a 256KB Cortex-M4, you quantize weights to INT4. However, the inference latency
  triples compared to INT8, and the power consumption spikes noticeably during model execution.
details:
  realistic_solution: The Cortex-M4 does not have native INT4 MAC instructions. The symptom (tripled latency)
    is caused by the runtime having to dynamically unpack the INT4 weights into INT8 or FP32 registers
    before computing the operations. This unpacking requires bitwise shifting and masking, which adds
    immense cycle overhead. Stick to INT8 or use hardware with native sub-byte quantization support.
  common_mistake: Assuming memory footprint reduction linearly correlates with performance improvements
    without checking the instruction set architecture (ISA).
  napkin_math: 'Native INT8 MAC: 1 cycle. INT4 MAC: Load byte (2 cycles), Shift/Mask for high/low nibble
    (4 cycles), MAC (1 cycle). Total ~7 cycles per 2 MACs = 3.5 cycles/MAC. This makes it 3.5x slower.'
