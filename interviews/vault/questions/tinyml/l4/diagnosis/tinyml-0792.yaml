id: tinyml-0792
title: Tinyml New 0014
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: A microcontroller executes a dense TFLite Micro model directly from Flash memory (XIP). The
  power consumption is significantly higher than calculated, and the physical chip is noticeably warm.
details:
  realistic_solution: Executing XIP (eXecute-In-Place) directly from Flash for a dense neural network
    forces the Flash controller to perform millions of reads. Flash memory draws significantly more current
    per read than SRAM. The continuous high-frequency read operations dissipate heat and drain power.
    To fix this, cache the most frequently accessed layers' weights into SRAM during execution.
  common_mistake: Assuming that because weights are immutable, leaving them in Flash memory is inherently
    power-efficient.
  napkin_math: 'SRAM read = 1 cycle (~1mA). Flash read = 4 cycles (~5mA). 10M weight reads: Flash draws
    5mA continuously over 40M cycles, plus wait-state CPU stalling which keeps the chip in active mode
    4x longer.'
