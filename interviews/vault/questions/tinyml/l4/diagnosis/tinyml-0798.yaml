id: tinyml-0798
title: Tinyml New 0022
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: An accelerometer-based anomaly detection model fails on a newly manufactured batch of devices.
  The hardware is theoretically identical, but the model thinks all normal movements are anomalies.
details:
  realistic_solution: The new batch of IMUs has a slightly different internal clock oscillator, causing
    sample rate drift. If trained on exactly 100Hz but the new device samples at 105Hz, the frequency-domain
    features (like FFT peaks) shift. A time-series CNN expects fixed temporal alignment. The solution
    is to use a hardware timer to trigger IMU sampling or resample the data in software to a strict 100Hz.
  common_mistake: Assuming low-cost sensor internal oscillators are highly accurate and deploying time-series
    models without strict sample rate enforcement.
  napkin_math: 100Hz = 10ms period. 105Hz = 9.5ms period. Over 1 second (100 samples), the time shift
    is 50ms, which is 5 full frames of difference. Frequency peaks shift by 5%, misaligning with the CNN
    filters.
