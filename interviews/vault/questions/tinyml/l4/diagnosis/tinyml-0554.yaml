id: tinyml-0554
title: The ISA Tax on Inference
topic: mcu-compute-constraints
status: draft
provenance: imported
scenario: 'You benchmark the same INT8 keyword spotting model on two MCUs at the same 80 MHz clock speed:
  a Cortex-M4 (ARMv7E-M, Thumb-2 ISA) and a RISC-V RV32IMC (ESP32-C3). The M4 completes inference in 18
  ms. The RISC-V takes 31 ms. Same clock, same model, same compiler optimization level. Where did the
  72% performance gap come from?'
details:
  realistic_solution: 'The 72% gap (18ms vs 31ms) comes from three ISA-level differences. First, the M4''s
    DSP extension provides SMLAD (dual 16-bit MAC in one cycle), giving 2 MACs/cycle vs the RISC-V''s
    1 MAC/cycle with standard MUL. Second, the M4''s Thumb-2 encoding is denser — fewer instruction cache
    misses in tight loops. Third, CMSIS-NN exploits M4-specific SIMD intrinsics that have no RISC-V equivalent
    without the ''P'' (packed SIMD) extension. The fix for RISC-V: add the RV32P extension for packed
    arithmetic, or use the RV32V vector extension which can match or exceed ARM''s throughput.'
  common_mistake: '"RISC-V is just slower because it''s a simpler architecture." RISC-V is not inherently
    slower — the issue is specific ISA extensions and their impact on ML workloads.'
  napkin_math: 'Keyword spotting model: ~1.5M MACs. Cortex-M4 with CMSIS-NN: 2 MACs/cycle effective →
    750K cycles → 750K / 80M Hz = 9.4 ms compute + ~8.6 ms memory overhead = 18 ms. RISC-V RV32IMC: ~0.33
    MACs/cycle → 4.5M cycles → 56 ms compute, but pipelining helps → ~25 ms compute + ~6 ms memory = 31
    ms. Ratio: 31/18 = 1.72×. The DSP extension alone accounts for ~6× difference in MAC throughput, partially
    offset by the RISC-V''s simpler pipeline.'
