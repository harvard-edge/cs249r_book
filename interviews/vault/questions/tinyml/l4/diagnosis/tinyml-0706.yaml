schema_version: 1
id: tinyml-0706
title: The DMA Channel Collision
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: Your predictive maintenance system on an STM32F4 uses DMA to stream accelerometer data via SPI.
  You recently added an ML model whose weights are too large for SRAM, so you store them in external SPI
  Flash and use a second DMA channel to stream weights into SRAM layer-by-layer during inference. When
  you run inference, the accelerometer data suddenly has gaps. How does the ML inference's DMA bandwidth
  requirement conflict with the sensor DMA, and how does the model's layer size determine whether double-buffering
  can resolve the contention?
details:
  realistic_solution: The corruption comes from **DMA stream priority and bus arbitration** driven by
    the massive asymmetry in payload sizes. The accelerometer DMA requests 2 bytes every 300 µs. The ML
    inference DMA requests a massive burst of 16 KB (an entire convolutional layer's weights) as fast
    as the SPI bus allows. If both streams are on the same DMA controller, the ML weight transfer monopolizes
    the AHB bus matrix. The accelerometer's DMA request is held pending. If the hold exceeds the SPI peripheral's
    tiny hardware FIFO depth (4 bytes on STM32F4), the FIFO overflows and the sensor sample is permanently
    lost.
  common_mistake: '"The DMA controller can''t handle two streams at once." The STM32F4 has two DMA controllers
    with 8 streams each — it absolutely can handle concurrent transfers.'
  napkin_math: 'SPI accelerometer: 3.2 kHz = 312.5 µs period. FIFO depth: 4 bytes = 2 samples. If DMA
    is delayed by >625 µs, FIFO overflows. ML weight transfer: 16 KB layer at 20 MHz SPI = 16,384 bytes
    × 8 bits / 20,000,000 = 6.5 ms. If ML DMA has equal or higher priority, it holds the bus for 6.5 ms.
    6.5 ms > 625 µs → guaranteed FIFO overflow and dropped sensor data. Priority inversion fixes this
    instantly.'
