id: tinyml-cell-13217
title: Diagnose Memory Fragmentation During Transformer Layer Execution
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'A 3-layer transformer on ESP32-S3 with 512KB SRAM crashes intermittently with out-of-memory
  errors during the second attention layer despite static analysis showing peak usage of 480KB. The model
  uses dynamic allocation for intermediate activations. Profiling reveals fragmentation: after layer 1,
  free memory is 180KB but largest contiguous block is only 62KB, while layer 2 attention needs a 96KB
  contiguous QK^T buffer. Diagnose and fix the memory management strategy.'
details:
  realistic_solution: 'Layer 1 allocates: Q(32KB)+K(32KB)+V(32KB)+QK^T(96KB)+output(32KB)=224KB peak.
    Frees Q,K,QK^T after attention but heap has 3 holes of 32KB+96KB+32KB=160KB non-contiguous. Layer
    2 requests 96KB contiguous → fails. Fix: (1) Use arena/pool allocator with single 224KB static buffer,
    reused each layer. (2) Process layers with explicit activation checkpointing to ensure clean buffer
    reuse. (3) Plan tensor lifetimes statically using TFLite Micro''s memory planner.'
  common_mistake: Increasing SRAM budget or reducing model size; the issue is allocator fragmentation,
    not total memory shortage.
  napkin_math: 'QK^T buffer = seq_len × seq_len × heads × 2B (INT16 intermediate) = 64×64×4×2 = 32,768B
    = 32KB per head tile; full multi-head = 4×32KB = 128KB. With 64-dim heads per head: 64×64×2B = 8KB
    per head × 4 heads = 32KB. Static allocation prevents fragmentation.'
