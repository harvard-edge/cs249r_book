id: tinyml-0790
title: Tinyml New 0012
topic: roofline-analysis
status: published
provenance: imported
scenario: An M4 device continuously runs audio inference. To avoid dropping frames, DMA writes audio to
  SRAM ping-pong buffers. However, when DMA is active, the CPU inference slows down unpredictably by 50%.
details:
  realistic_solution: The symptom is caused by AHB bus matrix conflicts (SRAM bank conflicts). Both the
    DMA controller and the CPU are trying to access the exact same physical SRAM bank simultaneously.
    The bus arbiter stalls the CPU to let the DMA write, halving performance. The solution is to explicitly
    place the DMA ping-pong buffers in a separate physical SRAM bank from the neural network activation
    buffers.
  common_mistake: Treating the MCU's SRAM as one monolithic block rather than mapping memory to distinct
    physical banks to avoid bus arbitration stalls.
  napkin_math: If CPU reads at 240MB/s and DMA writes at 100MB/s on the same bus, arbitration adds 1 stall
    per access. A 10M cycle inference will incur up to 5M stall cycles, causing a massive latency penalty.
