id: tinyml-0107
title: Sensor Aging Changes the Baseline — Detecting and Adapting On-Device
topic: ota-firmware-updates
status: published
provenance: imported
scenario: Your vibration sensor for predictive maintenance uses an ADXL345 accelerometer feeding a Cortex-M4
  running an autoencoder anomaly detector. After 18 months in the field, false alarm rates jump from 2%
  to 15%. The motors haven't changed — your maintenance team confirms they're healthy. The accelerometer's
  sensitivity has drifted by 8% due to aging and thermal cycling. How do you detect this is sensor drift
  (not real anomalies) and adapt on-device without retraining?
details:
  realistic_solution: Distinguish sensor drift from real anomalies using physics-based invariants, then
    compensate with a calibration layer — not retraining.
  common_mistake: '"Just retrain the model with the new sensor data." You can''t retrain on a Cortex-M4
    (no backpropagation memory), and even if you could, retraining on drifted sensor data would teach
    the model that the drift is "normal" — masking real anomalies that co-occur with the drift.'
  napkin_math: 'Sensor drift: 8% sensitivity loss over 18 months. Effect on model: input features are
    8% lower than training distribution. Autoencoder reconstruction error increases because the model
    expects higher amplitudes. Threshold crossings increase → false alarm rate jumps from 2% to 15%. After
    calibration gain (G = 1.087): inputs restored to original scale. Reconstruction error returns to baseline.
    False alarm rate: back to ~2%. Cost: 12 bytes SRAM + 3 multiplies/sample. Alternative (retraining
    in cloud + OTA update): 2 weeks of data collection + cloud compute + BLE update. Cost: $50 in engineering
    time per device × 200 devices = $10,000. On-device calibration: $0. The 12-byte gain factor saves
    $10,000 and 2 weeks.'
