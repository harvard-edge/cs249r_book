schema_version: 1
id: tinyml-fill-03023
title: Attention Alternatives to Flash Attention for Cortex-M7 + Ethos-U55
topic: flash-attention
status: draft
provenance: imported
scenario: You're deploying a small transformer (4 layers, 8 heads, d=256, seq_len=64) on Cortex-M7 + Ethos-U55
  for embedded NLP. The Ethos-U55 has 256KB SRAM for activations. Standard attention requires 64^2 * 4
  bytes * 8 heads = 131KB for attention maps alone. Flash Attention is not available for Ethos-U55.
details:
  realistic_solution: Use linear attention (e.g. Performer or cosine attention) which replaces the softmax(QK^T)V
    with φ(Q)(φ(K)^T V), reducing attention to O(n) per token instead of O(n^2). For seq_len=64, this
    is marginal (64^2=4096 ops), but memory usage drops from 131KB to 64*256*4 = 64KB for KV projections.
    Ethos-U55 can execute the linear attention operators natively via TensorFlow Lite for Microcontrollers.
  common_mistake: Porting the Flash Attention algorithm manually to Cortex-M7 assembly. The Ethos-U55
    is a fixed-function NPU that only executes pre-compiled Vela operator graphs; custom CUDA-style kernels
    cannot run on it. The M7 CPU would need to handle attention in software, defeating the purpose.
  napkin_math: 'Ethos-U55: 256KB SRAM activation budget. Standard 4-head attention: 64^2 * 4 bytes * 4
    heads (half heads) = 65KB. Linear attention: K^T V outer product = 256*256 * 4 = 256KB — worse for
    d=256! For d=64 (reduce head dim): 64*64*4 = 16KB. Recommendation: reduce d_head to 64 from 256, apply
    linear attention. Total model size: 4 layers * (Q+K+V+O projections) * 256*64 * 4 bytes = 2MB — needs
    external Flash, not SRAM.'
