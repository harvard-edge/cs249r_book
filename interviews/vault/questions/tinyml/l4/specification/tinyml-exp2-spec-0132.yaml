schema_version: 1
id: tinyml-exp2-spec-0132
title: KWS Memory Architecture on Cortex-M4
topic: model-size-estimation
status: published
provenance: imported
scenario: You are designing an always-on keyword spotting system for a battery-powered sensor node using
  an ARM Cortex-M4 (STM32F4) microcontroller. The device has 256 KB of SRAM, 1 MB of flash, and no FPU,
  but supports CMSIS-NN SIMD instructions (2x INT8 MACs/cycle). You need to specify the memory architecture
  and determine the maximum feasible model size for a depthwise separable CNN, accounting for the RTOS,
  audio buffers, and inference engine overhead.
details:
  realistic_solution: A robust specification starts by partitioning the 256 KB SRAM. After reserving memory
    for the RTOS, audio buffering, and feature extraction, the remaining SRAM dictates the peak memory
    footprint (typically the largest two consecutive layers' activations in a framework like TFLite Micro).
    To utilize the CMSIS-NN SIMD capabilities (2x INT8 MACs/cycle) and compensate for the lack of an FPU,
    the model must be fully quantized to INT8. The model parameters will reside in the 1 MB flash, which
    is usually abundant compared to SRAM.
  common_mistake: Candidates frequently focus solely on the model's parameter size fitting into the 1
    MB flash, neglecting the SRAM constraints for activations. They also often forget that without an
    FPU, floating-point models are unfeasible, and fail to budget SRAM for the RTOS, audio capture ring
    buffers, and feature extraction (like MFCC) scratchpads.
  napkin_math: 'Total SRAM = 256 KB. Reserve 32 KB for RTOS/stack, 32 KB for 1-second 16kHz INT16 audio
    ring buffer, and 12 KB for MFCC feature extraction. Remaining SRAM for inference = 256 - 76 = 180
    KB. TFLite Micro overhead is ~20 KB, leaving an activation arena of 160 KB. For a standard CNN layer
    in INT8, the max input tensor + output tensor must be <= 160 KB. E.g., an input of 49x10x64 (31.3
    KB) and output of 25x5x64 (8 KB) requires ~40 KB, which safely fits. Flash budget: Firmware takes
    ~200 KB, leaving ~800 KB. An INT8 model with 500,000 parameters takes 500 KB, easily fitting into
    the 1 MB flash limit.'
