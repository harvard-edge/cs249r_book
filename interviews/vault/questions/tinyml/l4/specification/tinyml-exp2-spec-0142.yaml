schema_version: 1
id: tinyml-exp2-spec-0142
title: ESP32-S3 Continuous Audio Ingestion and Feature Extraction Design
topic: streaming-ingestion
status: published
provenance: imported
scenario: You need to design an always-on acoustic anomaly detection pipeline on an ESP32-S3. The system
  continuously samples audio at 16 kHz (16-bit PCM) via I2S and must compute Mel-Frequency Cepstral Coefficients
  (MFCCs) every 20ms to feed a classifier. Given the ESP32-S3's 512 KB internal SRAM, 8 MB PSRAM, and
  dual-core 240 MHz Xtensa architecture, design the real-time data ingestion and buffering strategy. You
  must ensure zero data loss while leaving 300 KB of fast SRAM strictly for the inference engine and managing
  concurrent WiFi transmission overhead.
details:
  realistic_solution: Allocate a double (ping-pong) DMA buffer in the fast 512 KB internal SRAM for zero-latency
    I2S ingestion. Pin the DMA interrupts and WiFi/BLE stack to Core 0. Assign Core 1 to process the filled
    DMA buffers, utilizing the vector extensions to rapidly compute MFCCs. The resulting compact MFCC
    features can be safely accumulated into a rolling window stored in the 8 MB PSRAM, preserving the
    critical internal SRAM for the 300 KB inference engine and RTOS overhead.
  common_mistake: Candidates often propose placing all raw audio buffers directly in the 8 MB PSRAM to
    save space, ignoring the latency and SPI cache-miss overhead that disrupts real-time I2S DMA transfers.
    Another common error is failing to utilize the dual-core architecture, running both ingestion interrupts
    and heavy INT8/vector feature extraction on a single core, causing dropped frames during WiFi spikes.
  napkin_math: 'Raw audio data rate: 16,000 samples/sec * 2 bytes/sample = 32 KB/sec. A 20ms chunk equals
    0.02 sec * 32,000 bytes/sec = 640 bytes. A double DMA buffer requires only 2 * 640 bytes = 1.28 KB
    of internal SRAM. Inference takes 300 KB, leaving ~210 KB of the 512 KB SRAM for the RTOS and WiFi
    stack. At 240 MHz, Core 1 processes 4.8 million cycles per 20ms window; computing MFCCs with vector
    extensions takes < 150,000 cycles, easily leaving 95%+ of Core 1''s budget for INT8 inference.'
