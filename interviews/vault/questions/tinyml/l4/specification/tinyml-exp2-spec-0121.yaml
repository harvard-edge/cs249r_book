schema_version: 1
id: tinyml-exp2-spec-0121
title: Estimating Inference Latency on Corstone-300
topic: compute-cost-estimation
status: published
provenance: imported
scenario: You are designing an always-on keyword spotting system for a smart home device using an ARM
  Cortex-M7 + Ethos-U55 (Corstone-300) platform. The M7 core operates at 480 MHz, and the Ethos-U55 NPU
  is configured for 256 MACs/cycle, with both sharing a limited 512 KB SRAM. Given a specific convolutional
  neural network that requires 5 million MAC operations per inference, you need to specify the theoretical
  inference latency and identify potential memory bandwidth bottlenecks.
details:
  realistic_solution: The candidate should calculate the compute-bound latency first, but immediately
    recognize that TinyML workloads on shared-SRAM architectures are often memory-bound. They must specify
    a design that pins critical weights in SRAM and accounts for the bandwidth required to feed the NPU
    256 MACs per cycle. The solution should break down the latency into NPU compute time and SRAM fetch
    time, noting that actual performance depends heavily on the memory controller and the compiler's ability
    to overlap memory fetches with computation.
  common_mistake: Candidates often divide the total MAC operations by the peak throughput of the NPU (256
    MACs/cycle * 480 MHz), completely ignoring the overhead of loading weights and activations from the
    shared 512 KB SRAM. They also frequently fail to account for operators that might not be supported
    by the Ethos-U55 and must fall back to the Cortex-M7.
  napkin_math: 'Ethos-U55 Peak Throughput: 256 MACs/cycle * 480 MHz = 122.88 x 10^9 MACs/sec (122.88 GMAC/s).
    Ideal Compute Time: 5,000,000 MACs / 122.88 GMAC/s = 0.0407 ms (40.7 microseconds). However, doing
    256 MACs/cycle requires fetching 512 bytes of data (assuming 8-bit weights and activations) per cycle.
    If the SRAM can only provide 64 bits (8 bytes) per cycle to the NPU, the system is severely memory-bandwidth
    bound. The latency will be dictated by memory fetches rather than raw compute cycles, making the true
    latency significantly higher than 40.7 microseconds.'
