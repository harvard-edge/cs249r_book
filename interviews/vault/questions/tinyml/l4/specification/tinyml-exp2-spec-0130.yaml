schema_version: 1
id: tinyml-exp2-spec-0130
title: Optimizing Keyword Spotting Memory Allocation on ESP32-S3
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You are tasked with deploying a continuous Keyword Spotting (KWS) model and a secondary speaker
  verification model on an ESP32-S3 microcontroller. The KWS model requires 300 KB for its weights and
  150 KB for activations, while the speaker verification model requires 2 MB for weights and 500 KB for
  activations. Both models use INT8 quantization to leverage the vector extensions. Design a memory allocation
  specification detailing which components of the models (weights, activations, audio buffers) should
  reside in the 512 KB internal SRAM versus the 8 MB external PSRAM to meet real-time latency requirements
  while minimizing power consumption.
details:
  realistic_solution: The continuous KWS model is latency-critical and runs constantly. Its 300 KB weights
    and 150 KB activations (450 KB total) should be pinned to the internal 512 KB SRAM, leaving 62 KB
    for the RTOS and audio DMA buffers. The secondary speaker verification model only runs conditionally
    when a keyword is detected, so its 2 MB weights and 500 KB activations should be allocated to the
    8 MB PSRAM. When triggered, the dual-core Xtensa processor can execute from PSRAM, accepting the latency
    hit since it is an infrequent operation.
  common_mistake: Candidates often place all model weights in the 8 MB PSRAM because it has ample capacity,
    failing to recognize the severe latency and power penalty of fetching continuous KWS weights from
    external memory over the SPI bus during every always-on inference cycle.
  napkin_math: 'Internal SRAM capacity: 512 KB. KWS memory required: 300 KB (weights) + 150 KB (activations)
    = 450 KB. Remaining SRAM: 512 - 450 = 62 KB. Speaker Verification memory: 2048 KB (weights) + 512
    KB (activations) = 2560 KB. PSRAM capacity: 8192 KB. Remaining PSRAM: 8192 - 2560 = 5632 KB. If KWS
    weights were in PSRAM, a single inference requiring a 300 KB read over a typical 40 MHz Octal SPI
    bus (~40 MB/s effective bandwidth) would add roughly 7.5 ms of memory fetch latency per pass, significantly
    draining the power budget for an always-on 240 MHz system.'
