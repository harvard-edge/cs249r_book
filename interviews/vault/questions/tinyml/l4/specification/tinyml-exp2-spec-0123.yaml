schema_version: 1
id: tinyml-exp2-spec-0123
title: nRF5340 DMA Pipeline Design for Audio ML
topic: dma-data-movement
status: published
provenance: imported
scenario: We are designing an always-on keyword spotting system on the Nordic nRF5340. The system captures
  audio from an I2S microphone, processes it on the 128 MHz application core, and transmits triggers via
  the 64 MHz network core over BLE 5.3. Given the strict 256 KB SRAM constraint and a target of sub-5mA
  active current, specify the memory architecture and DMA configuration required to move 16 kHz 16-bit
  audio data seamlessly from the peripheral to the ML inference buffer without waking the CPU unnecessarily.
details:
  realistic_solution: Specify a double-buffered (ping-pong) EasyDMA setup. The I2S peripheral directly
    writes 20ms audio chunks into SRAM via EasyDMA without CPU intervention. The 128 MHz application core
    remains in a low-power state until a DMA completion event wakes it, then passes the memory pointer
    directly to the ML model (zero-copy) for inference, minimizing data movement overhead.
  common_mistake: Candidates often propose an interrupt-driven approach that wakes the CPU per sample
    or small block, draining the battery well beyond the ~5mA budget. Alternatively, they might suggest
    copying data multiple times between the I2S DMA buffer, DSP buffer, and the ML input tensor, wasting
    the limited 256 KB SRAM and CPU cycles.
  napkin_math: For 16 kHz, 16-bit audio, the rate is 32 KB/sec. Two 20ms ping-pong buffers take 32 KB/sec
    * 0.02s * 2 = 1.28 KB of the 256 KB SRAM. If the ML inference runs on the 128 MHz core and takes 10ms
    per 20ms window, the CPU duty cycle is 50%. This yields an average CPU active current of roughly 2.5mA
    (50% of the ~5mA peak), keeping the system well under the power budget.
