schema_version: 1
id: tinyml-exp2-spec-0136
title: ESP32-S3 Wake-Word Profiling Specification
topic: profiling-bottleneck-analysis
status: published
provenance: imported
scenario: You must design a profiling and bottleneck analysis specification for a new wake-word system
  deployed on the ESP32-S3. The system has a strict 150ms latency budget, but early prototypes occasionally
  spike to 400ms. The hardware uses the 240 MHz dual-core Xtensa processor, 512 KB of internal SRAM for
  critical data, 8 MB of external PSRAM for model weights, and concurrent WiFi/BLE. Design a profiling
  strategy to pinpoint the exact source of these latency spikes, determining whether they stem from inefficient
  INT8 vector extension usage, PSRAM cache thrashing, or I/O preemption.
details:
  realistic_solution: The specification should define a multi-layered hardware-aware profiling approach.
    First, utilize ESP-IDF's FreeRTOS SystemView or task trace facilities to monitor task preemption and
    identify if the WiFi/BLE stack on Core 0 is blocking the audio/inference task on Core 1. Second, configure
    the Xtensa internal performance counters to track instruction cache and data cache miss rates when
    accessing the 8 MB PSRAM. Finally, use instruction cycle counting around the specific MAC loops to
    verify that the compiler is successfully utilizing the INT8 vector extensions rather than falling
    back to scalar operations.
  common_mistake: Candidates often propose generic software profilers or simple timestamp logging without
    considering the ESP32-S3's specific hardware architecture. They frequently overlook the massive latency
    gap between internal SRAM and external PSRAM, or fail to account for how the closed-source WiFi/BLE
    stack might preempt the neural network task on the dual-core system.
  napkin_math: The ESP32-S3 operates at 240 MHz. With INT8 vector extensions processing 16 MACs per cycle,
    peak throughput is 3.84 GMACs/s. For a 15M MAC model, theoretical pure compute latency is 15M / 3.84G
    = 3.9ms. If unvectorized (1 MAC/cycle), it takes 15M / 240M = 62.5ms. The 8 MB PSRAM accessed via
    Octal SPI at 80MHz yields a peak bandwidth of ~80 MB/s. Loading 3MB of weights takes 3MB / 80MB/s
    = 37.5ms under ideal caching. If a BLE interrupt thrashes the cache, forcing an unvectorized fetch
    and compute, latency spikes from ~41ms (37.5 + 3.9) to over 300ms, easily explaining the 400ms spikes.
