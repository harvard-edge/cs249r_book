id: tinyml-cell-12166
title: 'Model Format Conversion: Specify TFLM Deployment Checklist for Safety-Critical MCU Application'
topic: model-format-conversion
status: published
provenance: imported
scenario: 'Specify a production deployment checklist for a TFLite Micro model on Cortex-M7+Ethos-U55 (480MHz,
  512KB SRAM) used in a safety-critical medical device (FDA Class II). The checklist must cover: model
  validation, numerical accuracy verification, memory bounds testing, inference determinism, and hardware-in-the-loop
  validation. Define concrete pass/fail criteria for each item.'
details:
  realistic_solution: 'Checklist: (1) Numerical accuracy: run 1000 test inputs, max absolute output error
    vs. FP32 reference < 0.5%, sensitivity ≥ 95%. (2) Arena bounds: use TFLM''s MicroInterpreter::GetTensorArena()
    post-inference, verify no overflow beyond allocated 200KB. Inject canary bytes at arena boundary,
    verify intact after 10,000 inferences. (3) Determinism: run same input 100 times on hardware, output
    must be bit-identical. (4) Latency: 10,000 inference cycles, P99 < 10ms, max < 15ms (no spikes). (5)
    HIL: connect actual sensor (ECG electrodes), run 24-hour soak test at 360Hz, verify 0 crashes and
    >95% sensitivity on 100 arrhythmia events. (6) Power: measure actual current draw, verify < 5mA avg.'
  common_mistake: Defining a software-only checklist without hardware-in-the-loop tests; MCU-specific
    issues like SRAM corruption from arena overflow, interrupt latency spikes, and DMA conflicts only
    appear on actual hardware.
  napkin_math: 'Test matrix: 1000 accuracy tests + 10K arena tests + 100 determinism + 10K latency + 24hr
    HIL = ~2 weeks of testing. Arena canary: 4 bytes at boundary. If overflow: 0xDEADBEEF corrupted →
    test fails. Latency: 10K × 10ms = 100s of inference testing. HIL soak: 24h × 3600s × 360Hz = 31.1M
    inferences. Zero failures required for FDA submission.'
