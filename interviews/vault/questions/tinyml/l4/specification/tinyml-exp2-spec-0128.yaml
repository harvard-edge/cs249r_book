schema_version: 1
id: tinyml-exp2-spec-0128
title: Designing a Distilled Keyword Spotter for Cortex-M4
topic: knowledge-distillation
status: published
provenance: imported
scenario: You are tasked with designing a keyword spotting system that must run on an ARM Cortex-M4 (STM32F4)
  microcontroller. The hardware provides 168 MHz compute, 256 KB SRAM, 1 MB flash, no FPU, and relies
  entirely on CMSIS-NN SIMD instructions (2x INT8 MACs/cycle). You have a highly accurate floating-point
  ResNet teacher model that exceeds the flash and SRAM limits by 10x. Design a specification for a student
  model architecture and a knowledge distillation pipeline that successfully fits within these strict
  memory and compute constraints while maximizing accuracy.
details:
  realistic_solution: The specification must define an INT8-quantized CNN student model optimized for
    CMSIS-NN, utilizing depthwise separable convolutions to minimize MACs and parameter footprint. The
    pipeline should use Quantization-Aware Training (QAT) combined with temperature-scaled logit distillation
    from the FP32 teacher, avoiding intermediate feature distillation due to student quantization noise.
    By matching the softened logits, the strictly INT8 student learns the inter-class relationships learned
    by the teacher while maintaining compatibility with the dual-MAC SIMD execution.
  common_mistake: Candidates often propose applying knowledge distillation directly to a smaller floating-point
    model without accounting for the lack of an FPU on the Cortex-M4. They also frequently suggest complex
    feature-based distillation (like matching intermediate feature maps) which becomes unstable when the
    student model must be heavily quantized to INT8 to meet latency and SRAM constraints.
  napkin_math: To meet a strict 50ms inference latency budget on the 168 MHz Cortex-M4, total available
    cycles are 168M * 0.05 = 8.4 million cycles. Assuming 80% MAC utilization with CMSIS-NN SIMD (2 INT8
    MACs/cycle), the student model is constrained to a maximum of 8.4M * 2 * 0.8 = 13.44 million MACs.
    Memory-wise, reserving 56 KB of the 256 KB SRAM for RTOS and audio buffers leaves 200 KB for peak
    activation memory, while the 1 MB flash easily accommodates the INT8 weights of a model constrained
    to 13.44M MACs (typically < 300 KB of parameters).
