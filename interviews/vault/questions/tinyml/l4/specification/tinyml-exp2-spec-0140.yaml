id: tinyml-exp2-spec-0140
title: On-Device Privacy Guardrails for ESP32-S3 Voice Assistant
topic: responsible-ai
status: published
provenance: imported
scenario: Your team is deploying a continuous-listening smart speaker on an ESP32-S3 (240 MHz dual-core
  Xtensa, 512 KB SRAM, 8 MB PSRAM). To comply with our Responsible AI privacy guardrails, the device must
  guarantee that false positive wake-word triggers do not result in unintended recording or streaming
  of private conversations over WiFi/BLE. You have 120 KB of SRAM remaining after the OS and primary wake-word
  model. Design a specification for an on-device, fail-safe guardrail system that prevents unauthorized
  audio transmission while maintaining acceptable latency.
details:
  realistic_solution: 'Design a cascading verification pipeline: the primary wake-word model triggers
    a secondary, lightweight Voice Activity Detector (VAD) or acoustic anomaly detector optimized for
    INT8. Specify a strict circular buffer overwrite policy ensuring audio is dropped immediately if validation
    fails. Finally, mandate a hardware-level privacy indicator (e.g., an LED) hardwired to the microphone''s
    active state, independent of the software stack, fulfilling the governance requirement for user transparency.'
  common_mistake: Candidates often propose relying on cloud-based verification to catch false positives,
    which violates the strict on-device privacy requirement. Alternatively, they might suggest overly
    complex secondary models that exceed the remaining SRAM or fail to utilize the ESP32-S3's INT8 vector
    extensions, resulting in unacceptable user latency.
  napkin_math: 'Remaining SRAM: 120 KB. A 1-second audio ring buffer at 16 kHz, 16-bit PCM requires 32
    KB, leaving 88 KB. A small INT8 VAD model (~50,000 parameters) takes 50 KB, leaving a 38 KB buffer
    for inference overhead. Utilizing the ESP32-S3''s 240 MHz dual-core and INT8 vector extensions, inference
    will comfortably execute in under 5 ms, well below the real-time threshold of a 1-second audio frame,
    ensuring minimal user latency while robustly meeting privacy guardrails.'
