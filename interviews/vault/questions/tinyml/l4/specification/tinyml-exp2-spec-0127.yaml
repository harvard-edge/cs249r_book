schema_version: 1
id: tinyml-exp2-spec-0127
title: Ethos-U55 Operator Offloading and Fallback Analysis
topic: graph-compilation
status: published
provenance: imported
scenario: You are deploying a custom CNN for keyword spotting on an ARM Corstone-300 subsystem, featuring
  a 480 MHz Cortex-M7 and an Ethos-U55 NPU (configured for 256 MACs/cycle), sharing 512 KB of SRAM. During
  ahead-of-time compilation, the framework maps most convolutions to the NPU but encounters an unsupported
  custom activation function in the middle of the graph, forcing a fallback to the Cortex-M7. Analyze
  the system-level implications of this compilation outcome and specify a graph optimization strategy
  to satisfy strict latency constraints.
details:
  realistic_solution: The optimal strategy is to use the compiler to perform operator substitution or
    constant folding prior to lowering. Specifically, the custom activation should be approximated with
    a framework-supported piecewise linear function (like HardSwish) that the Ethos-U55 compiler can map
    directly to its internal Look-Up Table (LUT) or native instructions, thus keeping the entire subgraph
    on the NPU and preserving SRAM.
  common_mistake: Candidates often assume the only penalty is the slower execution of the custom activation
    on the Cortex-M7. They frequently miss the severe memory bandwidth penalty and SRAM fragmentation
    caused by transitioning execution domains, which breaks operator fusion and forces intermediate tensors
    to be materialized in the shared 512 KB SRAM.
  napkin_math: 'Consider an intermediate tensor of 64 channels x 50 temporal features x 1 byte (int8)
    = 3,200 bytes. A context switch (NPU->M7->NPU) requires: NPU write (3.2 KB), M7 read (3.2 KB), M7
    write (3.2 KB), NPU read (3.2 KB) = 12.8 KB of total shared SRAM traffic. Assuming a conservative
    4 bytes/cycle SRAM access rate, memory transfers alone take 3,200 cycles. If kept on the NPU at 256
    MACs/cycle, computing a subsequent layer might only take tens of cycles. The fallback latency is entirely
    dominated by memory I/O rather than the M7''s 480 MHz compute.'
