schema_version: 1
id: tinyml-exp2-spec-0138
title: Designing Quantization for Keyword Spotting on Cortex-M4
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You are tasked with deploying a 500 KB (FP32) keyword spotting CNN onto an ARM Cortex-M4 (STM32F4)
  microcontroller. The target platform operates at 168 MHz, features 256 KB SRAM, 1 MB flash, and utilizes
  CMSIS-NN SIMD instructions (2x INT8 MACs/cycle) but lacks a hardware FPU. Detail a quantization specification
  that ensures the model fits within both flash and SRAM, while eliminating software floating-point emulation
  overhead during inference.
details:
  realistic_solution: The design must specify INT8 quantization for weights (symmetric) and activations
    (asymmetric) to leverage the 2x INT8 MACs/cycle CMSIS-NN SIMD instructions. To avoid the FPU-less
    bottleneck, the specification must require folding batch normalization and representing the FP32 scale
    factors as a combination of an INT32 multiplier and a bit shift (fixed-point arithmetic). Per-channel
    quantization should be specified for convolutional weights to maintain accuracy, fitting the quantized
    ~125 KB model comfortably within the 1 MB flash.
  common_mistake: Candidates often propose a generic INT8 quantization scheme without addressing how the
    floating-point scaling factors are handled on a device without an FPU. They also frequently suggest
    per-tensor quantization for depthwise layers, which leads to severe accuracy degradation in CNNs,
    or assume calibration data isn't needed for Post-Training Quantization.
  napkin_math: 'Original FP32 model size: 500 KB. INT8 quantized model size: 500 KB / 4 = 125 KB, which
    easily fits in the 1 MB flash limit. For inference speed: A layer with 1 million MACs executed via
    software FP32 on an FPU-less Cortex-M4 might take ~100 cycles/MAC, requiring ~100M cycles (595 ms
    at 168 MHz). Using CMSIS-NN SIMD (2x INT8 MACs/cycle), 1M MACs ideally take 500,000 cycles (~3 ms
    at 168 MHz), yielding an almost 200x speedup.'
