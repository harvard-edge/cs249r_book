schema_version: 1
id: tinyml-exp2-spec-0129
title: Keyword Spotting Latency Budget on Corstone-300
topic: latency-decomposition
status: published
provenance: imported
scenario: You are designing an always-on keyword spotting system on an ARM Cortex-M7 + Ethos-U55 (Corstone-300)
  platform. The system requirement dictates a maximum end-to-end latency of 50ms from audio capture to
  action trigger. The neural network requires 10 million MAC operations per inference. You need to decompose
  the latency budget and design the processing pipeline, accounting for the M7 running at 480 MHz, the
  Ethos-U55 NPU (assuming a configuration of 256 MAC/cycle), and the shared 512 KB SRAM, considering audio
  preprocessing on the M7 and model execution on the U55.
details:
  realistic_solution: A robust design decomposes the 50ms budget across capture, preprocessing (M7), inference
    (Ethos-U55), and post-processing (M7). The M7 should extract features using CMSIS-DSP while managing
    ping-pong buffers in the shared 512 KB SRAM to ensure the U55 is not starved of data. Because the
    U55 handles MACs so efficiently, the critical path usually shifts to the M7's feature extraction and
    memory bandwidth management.
  common_mistake: Candidates often assume the NPU executes the entire pipeline without accounting for
    M7 preprocessing time (like MFCC extraction) or the memory contention between the M7 and U55 sharing
    the 512 KB SRAM. They may also calculate theoretical NPU throughput without factoring in realistic
    utilization or DMA setup overheads.
  napkin_math: 'Ethos-U55 peak compute: 480 MHz * 256 MAC/cycle = 122.8 GMAC/s. Theoretical inference
    time for 10M MACs = 10e6 / 122.8e9 = 0.081 ms. Assuming a conservative 25% utilization due to memory
    access in the shared SRAM, effective inference is ~0.33 ms. This leaves over 49 ms of the 50 ms budget
    for the M7 to handle 20ms of audio capture framing, ~10-15 ms for MFCC compute at 480 MHz, and <1
    ms for decision logic, comfortably meeting the requirement.'
