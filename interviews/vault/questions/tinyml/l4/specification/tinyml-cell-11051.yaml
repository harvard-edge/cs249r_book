schema_version: 1
id: tinyml-cell-11051
title: 'Dataset Curation: Specification — TinyML Dataset Quality SLA for Medical Wearable'
topic: dataset-curation
status: published
provenance: imported
scenario: Write the data quality specification for a fall detection model on Cortex-M7+Ethos-U55 (480MHz,
  512KB SRAM) embedded in a medical alert device. The model must achieve < 1% false alarm rate and > 99%
  fall detection sensitivity. Define quantitative data quality SLAs for the training dataset.
details:
  realistic_solution: 'SLAs: (1) Volume: >= 500 fall events per fall type (forward, backward, sideways)
    = 1,500 total falls. (2) Demographics: 20-80 age range, both sexes, BMI 18-35, 50 subjects minimum.
    (3) Environment: kitchen, bathroom, bedroom, outdoors. (4) Label quality: sensor-confirmed (pressure
    mat or video review), not self-reported. (5) Near-falls: >= 200 stumble events labeled ''not fall''
    for hard negatives.'
  common_mistake: Not specifying SLAs for near-miss events (stumbles, near-falls) which are the hardest
    cases; not requiring diversity of fall types and subject demographics.
  napkin_math: '1,500 fall events + 200 stumbles + 10,000 ADL (activities of daily living) normal = 11,700
    total labeled events. IMU data: 3-axis acc + 3-axis gyro, 200Hz, 2-sec windows = 200 × 6 × 4B × 2
    = 9.6KB/event. Total dataset: 11,700 × 9.6KB = 112MB — stored as offline training set. Data collection:
    each fall = controlled experiment (lab or gymnasium with mats). 50 subjects × 30 falls each = 1,500
    falls. At $200/subject/session: $10K. Labeling: video review at $2/event × 11,700 = $23,400. Total
    data budget: ~$33,400. Minimum AUC on test set: 0.995. Sensitivity target: 99% at 1% FPR point.'
