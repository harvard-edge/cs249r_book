schema_version: 1
id: tinyml-cell-13167
title: 'TinyML TCO Implement: ESP32-S3 vs Cloud for TinyML Inference'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: Implement the break-even analysis for ESP32-S3 (240MHz, 512KB SRAM, $5) vs cloud inference at
  $0.0001/inference over 2 years. The sensor makes 50 inferences/day. Include ESP32-S3 power (100μA avg,
  3.3V, $0.10/kWh) and the BLE/WiFi transmission cost if cloud is used (1KB per inference via NB-IoT at
  $0.01/MB).
details:
  realistic_solution: 'ESP32-S3 power cost: 100μA × 3.3V × 17,520hr × $0.10/kWh / 1000 = $0.000578/2yr
    (not $0.578). At ~$5 hardware cost, the power cost is negligible. The cellular SIM cost ($48) dominates
    the cloud option.'
  common_mistake: Calculating only hardware and cloud inference costs without including the data transmission
    cost when sending data to the cloud, which often exceeds the inference cost itself.
  napkin_math: 'ESP32: $5 + power cost. Power: 100μA × 3.3V × 8760hr × 2yr × $0.10/kWh / 1000 = 0.0001A
    × 3.3V × 17520hr × 0.10 / 1000 = 0.00033W × 17520hr × 0.10 / 1000 = 5.78 Wh × 0.10/1000 = $0.000578/2yr.
    ESP32 total: $5 + $0.000578 ≈ $5.00/2yr. Cloud (NB-IoT): inference $3.65 + data $0.365 + SIM $48 =
    $52.02. ESP32 wins (9.3×). Cloud (WiFi, free internet): $3.65+$0.365=$4.02. Cloud cheaper than ESP32
    if WiFi available. Decision: if WiFi available → cloud inference may be cheaper. If cellular → ESP32
    always wins.'
