schema_version: 1
id: tinyml-0594
title: The Saturation Catastrophe
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You are optimizing a keyword-spotting model for a Cortex-M4 microcontroller with 256KB of Flash
  and 128KB of SRAM. You've successfully quantized the entire model from FP32 to INT8. On your original,
  clean-audio validation set, accuracy remains high. However, when deployed for testing in a noisy factory,
  the model's accuracy plummets to near-chance levels.
details:
  realistic_solution: The root cause is a **calibration dataset mismatch**. The quantization parameters
    (scale and zero-point) were determined using clean audio, whose activation values have a limited dynamic
    range. The noisy factory audio contains high-amplitude signals that exceed this calibrated range,
    causing massive clipping/saturation at the INT8 boundary and destroying the information flowing through
    the network.
  common_mistake: The most common mistake is to blame the quantization process itself and immediately
    suggest reverting the entire model to FP16. This is a brute-force solution that fails to analyze the
    root cause and ignores the tight constraints of TinyML systems. Another error is to assume the model
    architecture is simply not robust to noise, without first investigating the arithmetic failure. Finally,
    engineers might try retraining the model with noise, which is extremely expensive and doesn't address
    the underlying quantization parameter mismatch.
  napkin_math: 'INT8 has 256 levels. Clean calibration range [-1,1]: scale=2/256=0.0078/step. Noisy factory
    spikes to [-5,5]: values >1.0 clip to 127. 80% of dynamic range saturated. Fix: recalibrate with noisy
    data, range [-5,5], scale=10/256=0.039/step. Precision drops 5x but no clipping. Cortex-M4@168MHz
    re-quantization is offline, zero runtime cost.'
