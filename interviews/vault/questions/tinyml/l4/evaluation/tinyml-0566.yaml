id: tinyml-0566
title: The Mel Spectrogram Compute Budget
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: 'Your keyword spotting system on a Cortex-M4 at 168 MHz must compute a 40-bin Mel spectrogram
  from 16 kHz audio in real time. The pipeline: 25ms frames with 10ms hop, 512-point FFT, 40 Mel filter
  banks. You have a 100ms latency budget for the full pipeline (feature extraction + inference). The model
  takes 15ms. Does the feature extraction fit in the remaining 85ms? What''s the actual bottleneck?'
details:
  realistic_solution: 'Yes, feature extraction fits easily. For 1 second of 16kHz audio with 25ms frames
    and 10ms hop: 98 frames. Per frame: 512-point FFT (~50us with CMSIS-DSP) + 40 Mel filters (~67us)
    = ~117us/frame. Total: 98 * 117us = 11.5ms. Add model inference (15ms) = 26.5ms total, using only
    26.5% of the 100ms budget. The real bottleneck is not compute but memory: the full Mel spectrogram
    (98 frames * 40 bins * 1 byte INT8 = 3.9KB) plus FFT scratch (1KB) fits comfortably. The 73.5ms headroom
    allows streaming overlap or BLE transmission.'
  common_mistake: '"FFT is the bottleneck — a 512-point FFT is expensive." On a Cortex-M4 with CMSIS-DSP,
    a 512-point real FFT is surprisingly fast. The bottleneck is elsewhere.'
  napkin_math: '98 frames × 117 µs/frame = 11.5ms feature extraction. Model: 15ms. Total: 26.5ms / 100ms
    budget = 26.5% utilization. Headroom: 73.5ms for post-processing, BLE transmission, or sleep. Memory:
    FFT buffer = 512 × 2 bytes = 1 KB. Mel output = 98 × 40 × 1 byte (INT8) = 3.9 KB. Total feature memory:
    ~5 KB. The real constraint isn''t compute — it''s whether the model''s 15ms inference can be reduced
    to allow more inferences per second for streaming applications.'
