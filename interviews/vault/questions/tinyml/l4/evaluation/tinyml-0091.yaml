id: tinyml-0091
title: The Sensor Duty Cycle Optimization
topic: duty-cycling
status: published
provenance: imported
scenario: Your wearable fall detection system uses a Cortex-M33 (Apollo4 Blue Plus) with a 3-axis accelerometer.
  The current design samples at 100 Hz continuously. A colleague proposes reducing to 25 Hz to save power.
  The accelerometer draws 150 µA at 100 Hz and 40 µA at 25 Hz (at 1.8V supply). Analyze the power savings,
  the Nyquist implications for fall detection, and propose a smarter duty-cycling strategy.
details:
  realistic_solution: 'The smart duty cycle uses a two-tier sampling strategy: (1) Low-power comparator
    or hardware threshold detector monitors acceleration magnitude continuously at ~5 uW. (2) When vibration
    exceeds threshold (indicating potential impact), the MCU wakes and samples at 200 Hz for 500 ms to
    capture the event. Expected wake events: ~10/day at 100 ms each = 1 s/day of high-rate sampling. Power
    breakdown: Always-on comparator = 5 uW. MCU wake events = 10/day x 0.1s x 3 mW = 3 uJ/day = 0.035
    uW average. Background 25 Hz health monitoring 1 s every 60 s: duty cycle 1.67%, power = 0.0167 x
    3 mW + 0.0167 x 50 uW (accel) = 50.8 uW + 0.8 uW = 51.6 uW. Accelerometer at 25 Hz continuous = 50
    uW. Total: ~107 uW vs 329 uW always-on at 100 Hz. Battery life at 300 mAh, 3.3V (990 mWh): 990,000
    uWh / 107 uW = 9,252 hours = 385 days.'
  common_mistake: '"25 Hz is fine — falls are slow events, maybe 1-2 Hz. Nyquist says we only need 4 Hz."
    Falls are slow in terms of the overall event duration (~0.5-1s), but the impact signature contains
    high-frequency components (50-100 Hz) that distinguish a fall from sitting down quickly.'
  napkin_math: 'Always 100 Hz: 329 µW. Always 25 Hz: 131 µW (but misses impacts). Smart duty cycle: 131.1
    µW (captures impacts at 200 Hz). On 225 mAh CR2032 (600 mWh effective): Always 100 Hz: 600/0.329 =
    1,824 hours = 76 days. Always 25 Hz: 600/0.131 = 4,580 hours = 191 days. Smart: 600/0.131 = 4,577
    hours = 191 days with full accuracy. The smart approach gives 2.5× battery life with zero accuracy
    compromise.'
