schema_version: 1
id: tinyml-0092
title: The I2C Bus Lockup
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your predictive maintenance system on a Cortex-M4 reads a BME680 environmental sensor over I2C
  at 400 kHz while running a 35ms anomaly detection inference. Randomly, the I2C bus locks up — the SDA
  line is held low permanently by the sensor. How does a long ML inference blocking the I2C ISR cause
  the sensor to clock-stretch indefinitely, and how does the model's layer execution time determine the
  maximum safe I2C timeout?
details:
  realistic_solution: 'I2C is a clocked protocol where the master (MCU) drives SCL and the slave (sensor)
    drives SDA. During a read transaction, the slave pulls SDA low for ''0'' bits. If the master fails
    to clock SCL at the expected time (because the CPU is busy with inference and misses the I2C interrupt),
    the slave enters an undefined state: it''s partway through transmitting a byte, holding SDA low, waiting
    for the next clock edge that never comes.'
  common_mistake: '"The I2C peripheral is buggy — switch to SPI." The I2C peripheral is fine. The lockup
    is a protocol-level issue caused by interrupt latency during inference.'
  napkin_math: 'I2C byte time at 400 kHz: 9 bits / 400 kHz = 22.5 µs. CMSIS-NN Conv2D critical section:
    200-500 µs (measured). If the I2C timeout is set to the standard 100 µs, the HAL will abort the transaction
    mid-byte while the CPU is executing the Conv2D layer. The sensor, unaware of the timeout, waits forever
    for the next clock pulse. Setting the timeout to 1ms (2× the longest layer execution time) allows
    the layer to finish, the ISR to fire, and the transaction to complete safely.'
