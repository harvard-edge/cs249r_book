schema_version: 1
id: tinyml-0591
title: The Factory Floor Failure
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You've developed a keyword spotting (KWS) model for a 'stop' command on a factory assembly line.
  The model runs on a Cortex-M4 MCU with 256KB of SRAM. To meet the memory constraints, you've quantized
  the entire model to full INT8 using post-training static quantization. Your calibration dataset consists
  of 1,000 clean audio samples of the keyword. In the lab, the model achieves 99% accuracy.
details:
  realistic_solution: The root cause is a catastrophic mismatch between the calibration data's dynamic
    range and the factory's noisy environment. The static quantization process uses the clean calibration
    set to determine the scaling factor (S) and zero-point (Z) for mapping FP32 activations to the [-128,
    127] INT8 range. The loud, unpredictable background noise of the factory floor (e.g., motors, alarms)
    is causing the input audio signal's amplitude to far exceed the maximum values seen during calibration.
  common_mistake: 'Blaming the model architecture or the training data itself. A junior engineer might
    suggest retraining with more data, but that doesn''t address the core issue: the *distributional shift*
    between the calibration environment and the deployment environment broke the fundamental assumption
    of the quantization process. Another common mistake is to assume the model is just not ''robust''
    without pinpointing the specific mechanism of failure, which is activation overflow.'
  napkin_math: 'INT8 quantization: scale S = max_abs/127. Clean calibration max_abs = 5.0 → S = 5.0/127
    = 0.039. Factory noise pushes true activation to 15.0 → clipped to 127×0.039 = 4.96, losing signal
    above 5.0 (67% of range clipped). Fix: mixed precision. First layer in INT16: 6,400 elements × 2B
    = 12.8KB (vs 6.4KB INT8). Remaining layers stay INT8. Total SRAM overhead: +6.4KB on 256KB budget
    = 2.5% increase. INT16 range: ±32,767 → S = 15.0/32767 = 0.00046, capturing full factory dynamic range
    with no clipping.'
