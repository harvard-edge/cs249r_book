schema_version: 1
id: tinyml-0060
title: LoRaWAN Telemetry for ML Metrics
topic: ota-firmware-updates
status: draft
provenance: imported
scenario: You have 3,000 soil moisture sensors deployed across farmland, each running a crop stress prediction
  model on an STM32WL (Cortex-M4, 48 MHz, 256 KB flash, 64 KB SRAM) with built-in LoRa radio. You want
  to monitor model performance remotely — inference confidence, prediction distribution, drift indicators.
  But LoRaWAN has strict duty cycle limits. Design the telemetry payload and transmission strategy.
details:
  realistic_solution: 'LoRaWAN operates under regional duty cycle regulations (EU868: 1% duty cycle, US915:
    dwell time limits). You must minimize airtime:'
  common_mistake: '"Send all inference results over LoRa." At 24 inferences/day (one per hour) with even
    a minimal 20-byte result, that''s 480 bytes/day. LoRaWAN''s duty cycle limits make this surprisingly
    expensive in airtime.'
  napkin_math: 'Daily telemetry: 16 bytes × 1 uplink = 16 bytes/day.

    Airtime (SF7 BW125): ~41 ms per uplink.

    Duty cycle usage: 41 ms / 86,400,000 ms = 0.000047%. Well within 1% EU868 limit.


    Annual airtime: 41 ms × 365 = 15 seconds/year.

    Energy per uplink: 40 mA × 3.3V × 0.041 s = 5.4 mJ.

    Annual telemetry energy: 5.4 mJ × 365 = 1.97 J.


    Battery: 3.6V × 19 Ah = 68.4 Wh = 68.4 × 3600 = **246,240 J**.

    Telemetry as fraction of battery: 1.97 / 246,240 = 0.0008% — invisible.


    If sending raw results instead (480 bytes/day):

    - Airtime: ~600 ms/day (needs SF7; higher SF would exceed duty cycle).

    - Energy: 40 mA × 3.3V × 0.6 s = 79.2 mJ/day = 28.9 J/year.

    - Battery fraction: 28.9 / 246,240 = 0.012%. Still manageable, but 15× more expensive for minimal
    extra insight.'
