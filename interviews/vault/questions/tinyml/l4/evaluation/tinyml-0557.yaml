schema_version: 1
id: tinyml-0557
title: The Timer-Driven Inference Scheduler
topic: real-time-deadlines
status: published
provenance: imported
scenario: Your air quality monitoring system runs inference every 30 seconds on a Cortex-M0+ (48 MHz,
  32 KB SRAM). A junior engineer implements the schedule using `HAL_Delay(30000)` — a busy-wait delay.
  The system works but draws 12 mA continuously. Redesign the scheduling to draw under 50 µA average.
details:
  realistic_solution: 'Replace HAL_Delay (busy-wait at 12mA continuous) with LPTIM or RTC wake-from-STOP-mode.
    Configure LPTIM to fire every 30s, then enter STOP2 mode (draws ~2uA). On wake: run inference (~12ms
    at 12mA = 0.115mAh per day), then immediately re-sleep. Average current: (12mA * 12ms + 2uA * 29,988ms)
    / 30,000ms = 6.8uA. Battery life on CR2477 (1000mAh): 1000/0.163 = 6,134 days (16.8 years) vs 3.5
    days with busy-wait. That is a 1,750x improvement from one architectural change — the difference between
    a disposable prototype and a deployed sensor.'
  common_mistake: '"Use `sleep()` instead of `HAL_Delay()`." The standard `sleep()` on bare-metal MCUs
    is often just another busy-wait, or at best enters a light sleep that still draws milliamps.'
  napkin_math: '`HAL_Delay`: 12 mA × 24 hours = 288 mAh/day. CR2477 battery (1000 mAh): 3.5 days. LPTIM
    + STOP mode: 6.8 µA × 24 hours = 0.163 mAh/day. CR2477: 1000 / 0.163 = 6,134 days = **16.8 years**.
    Improvement: 1,750×. The difference between a disposable prototype and a deploy-and-forget sensor.'
