title: The Offline Drift Detector
topic: monitoring-observability
status: published
provenance: imported
scenario: Your deployed anomaly detector starts producing false positives after 3 months. The device has
  no cloud connection — it operates fully offline. How do you detect and handle model drift on a device
  with 256 KB SRAM and no internet?
details:
  realistic_solution: 'On-device drift detection with minimal resources: Running statistics: 64 bytes
    RAM. Golden references: 5 KB flash. Hourly self-test: 10 inferences × 50ms = 500ms per hour = 0.014%
    CPU overhead. Drift detection latency: 1 hour (self-test interval). St'
  common_mistake: '"Upload data to the cloud for analysis." There''s no cloud connection. You must handle
    this entirely on-device.'
  napkin_math: 'Running statistics: 64 bytes RAM. Golden references: 5 KB flash. Hourly self-test: 10
    inferences × 50ms = 500ms per hour = 0.014% CPU overhead. Drift detection latency: 1 hour (self-test
    interval). Storage for drift log: 20 bytes per event × 100 events = 2 KB flash. Total resource cost:
    64 bytes RAM + 7 KB flash — negligible on a 256 KB SRAM / 1 MB flash device.'
