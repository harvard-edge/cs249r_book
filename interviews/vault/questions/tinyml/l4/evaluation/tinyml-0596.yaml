id: tinyml-0596
title: The Silent Drift Catastrophe
topic: safety-certification
status: published
provenance: imported
scenario: You've deployed a fleet of 1,000 battery-powered audio sensors based on a Cortex-M4 MCU to detect
  'chainsaw' sounds in a remote rainforest. The model uses an input normalization layer that adapts its
  mean and standard deviation statistics over time. To ensure uptime, you've implemented a watchdog timer
  with a 5-second timeout. To persist the normalization stats across reboots, you checkpoint the mean/std
  dev vectors to Flash memory every 100 inferences.
details:
  realistic_solution: This is a classic cascading failure caused by Flash memory wear-out, which is accelerated
    by the adaptive model and then triggers two different fault states.
  common_mistake: Engineers often attribute these failures to a single component, like a 'software bug',
    'bad batteries', or simple 'model drift'. They fail to analyze the cascading systems interaction.
    A cloud-native engineer might suggest retraining, which is impossible here. They might also underestimate
    the physical limitations of Flash memory, assuming writes are fast, cheap, and infinite.
  napkin_math: 'Flash: 10K-100K cycles. Checkpoint every 100 inferences. At 1 inference/10s: 8,640/day→86
    writes/day→31K/year. At 10K endurance: fails in ~116 days. Corrupted normalization stats→model outputs
    garbage but code runs fine→watchdog not triggered. Silent accuracy degradation, then total failure.'
