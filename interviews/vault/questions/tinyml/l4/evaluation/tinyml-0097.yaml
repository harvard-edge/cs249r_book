title: Side-Channel Attacks on MCU Inference
topic: federated-learning
status: published
provenance: imported
scenario: Your competitor deploys a proprietary anomaly detection model on a Cortex-M4 with RDP Level
  2 enabled. An attacker buys one of their devices for $50. They can't read flash directly. But they connect
  a $200 current probe to the power rail and record the power trace during 10,000 inference cycles. Can
  they extract the model?
details:
  realistic_solution: 'Yes, they can extract significant model information through power side-channel
    analysis. Here''s how:'
  common_mistake: '"RDP Level 2 makes the device secure — power traces are just noise." Power analysis
    is a well-established cryptanalysis technique that applies equally to neural network inference.'
  napkin_math: 'Attack cost: $50 (device) + $200 (current probe) + $500 (oscilloscope) + 10,000 inferences
    × 50ms = 500 seconds of recording. Total: $750 + 8 minutes. With noise injection defense: need 100K
    traces = 83 minutes of recording + more sophisticated analysis. With random execution order + noise:
    need 1M+ traces = 14 hours + expert-level analysis. Defense cost: constant-time + shuffling = ~5%
    performance overhead = 2.5ms per inference on a 50ms model. Acceptable for most applications.'
