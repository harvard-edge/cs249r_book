id: tinyml-0588
title: The Floating Point Sensor Tax
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your MCU has a hardware FPU. You read a temperature sensor over I2C, which gives you a 16-bit
  integer. You convert it to a float, apply a scaling factor (`temp = raw * 0.01f`), and feed it to your
  TinyML model. The model is an INT8 quantized network. Your profiler shows that preprocessing the sensor
  data takes longer than the first 3 layers of your neural network combined. Why?
details:
  realistic_solution: 'The sensor outputs int16, which is converted to float, scaled, then re-quantized
    to int8 for the INT8 model. This float round-trip is unnecessary: the int-to-float conversion, float
    multiply, then dynamic re-quantization costs ~50-100 cycles per value. Instead, precompute the combined
    scaling as a fixed-point integer operation: multiply the raw int16 by a precomputed integer scale
    factor and right-shift. This takes 1-2 cycles per value — a 50x speedup. For 16,000 audio samples/second,
    eliminating the float detour saves 1.5M cycles/s, freeing CPU headroom for larger models.'
  common_mistake: '"I2C is slow." I2C is slow, but the prompt says the *preprocessing* (the math) is what''s
    taking the time.'
  napkin_math: 'Dynamic Float Quantization at runtime: ~50-100 cycles per value. Fixed-point bit-shift:
    1 cycle. For an audio waveform with 16,000 samples, avoiding the float conversion saves 1.5 million
    clock cycles per second.'
