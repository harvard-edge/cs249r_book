schema_version: 1
id: tinyml-fill-01531
title: Optimizing TinyML Data Labeling for nRF5340 Resource Constraints
topic: dataset-curation
status: published
provenance: imported
scenario: Your team is developing a real-time anomaly detection system for industrial sensors using a
  Nordic nRF5340 SoC. The model is intended to run on the nRF5340's 128 MHz Cortex-M33 application core
  with 256 KB SRAM and 1 MB flash memory. After initial deployment, you notice a high rate of false positives,
  particularly under new, unseen operating conditions. Investigation reveals that the original training
  dataset was collected under limited, controlled environments, and the active learning pipeline, designed
  to incorporate new data, is struggling to efficiently select diverse, informative samples for annotation
  without overwhelming the device's memory or communication bandwidth (BLE). The model's performance degrades
  rapidly as it encounters slight variations in sensor data. Analyze why the current dataset curation
  and active learning strategy leads to poor generalization and high false positives on the nRF5340, specifically
  considering its memory and processing limitations, and propose improvements.
details:
  realistic_solution: Implement a lightweight, on-device active learning sampling strategy focusing on
    highly informative, low-redundancy data points. This could involve using simple statistical measures
    (e.g., entropy-based uncertainty sampling on compressed features) directly on the nRF5340's application
    core to identify salient data. Instead of transmitting raw sensor data, send only compressed feature
    vectors or metadata (e.g., uncertainty scores, cluster centroids) to a central annotation server via
    BLE. Prioritize inter-annotator agreement on edge cases and rare events identified by the active learning
    loop, and use few-shot learning techniques to leverage small, high-quality labeled datasets efficiently.
  common_mistake: Assuming that a standard active learning approach, which might involve storing large
    pools of unlabeled data on the device or transmitting high volumes of raw sensor data for uncertainty
    sampling, is feasible on a resource-constrained device like the nRF5340. This leads to inefficient
    data selection, high power consumption for data transmission, or exceeding the limited SRAM/flash
    for buffer management.
  napkin_math: If raw sensor data points are 100 bytes each, and a naive active learning approach attempts
    to buffer 1000 uncertain samples before transmission for re-training, this would consume 100 KB of
    SRAM. Given the nRF5340 has only 256 KB SRAM, this leaves very little for the model, OS, and other
    application logic. A more efficient strategy, compressing each data point to 10 bytes and buffering
    only 100 samples, would reduce SRAM usage to 1 KB, making it far more feasible and reducing BLE transmission
    overhead.
