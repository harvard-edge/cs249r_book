schema_version: 1
id: tinyml-r2-43057
title: Tensor Arena Planning for Streaming Audio on MCU
topic: tensor-arena-planning
status: published
provenance: imported
scenario: 'Your keyword spotting model on ESP32-S3 (512 KB SRAM) processes 1-second audio windows at 16
  kHz. The MFCC feature extraction produces 40 coefficients × 49 frames = 1,960 values (7.84 KB at FP32).
  The model''s tensor arena is 85 KB. But you also need double-buffered audio capture (2 × 32 KB = 64
  KB) to avoid gaps between windows. Total SRAM: 85 + 7.84 + 64 = 156.84 KB. This leaves 355 KB for the
  application. A colleague says you can reduce audio buffer memory by 50% using ping-pong DMA with smaller
  buffers. Evaluate this claim.'
details:
  realistic_solution: 'Ping-pong DMA with smaller buffers: instead of buffering 1 full second per buffer
    (32 KB each), use smaller DMA transfer sizes and process audio incrementally. With 250ms chunks: each
    buffer = 16 kHz × 0.25s × 2 bytes = 8 KB. Double-buffered: 16 KB total (75% reduction from 64 KB).
    But this changes the processing model: you must maintain a sliding window of MFCC features. Instead
    of computing MFCC on a full 1-second window, you compute 12 MFCC frames per 250ms chunk and shift
    the feature buffer. Feature buffer: 40 × 49 frames = 7.84 KB (same). The model still needs the full
    49-frame context for inference. Savings: audio buffers 64 → 16 KB = 48 KB saved. Trade-off: more complex
    DMA interrupt handling, potential for audio glitches if processing takes >250ms. The colleague''s
    claim of 50% reduction is conservative — you can achieve 75% reduction with 250ms chunks.'
  common_mistake: Thinking you can reduce the audio buffer to a single 32 KB buffer and process it in-place.
    You need double buffering because while the CPU processes buffer A, the I2S/DMA must write incoming
    audio to buffer B. A single buffer causes data corruption when capture and processing overlap.
  napkin_math: 'Original: 2 × 32 KB = 64 KB audio buffers. 250ms ping-pong: 2 × 8 KB = 16 KB (75% savings).
    125ms ping-pong: 2 × 4 KB = 8 KB (87.5% savings). But: 125ms requires ISR processing every 125ms.
    MFCC for 125ms audio: ~2ms on ESP32-S3 at 240 MHz. Model inference: 85ms. Total per window: 85 + 2
    = 87ms. Time between interrupts: 250ms. Budget: 250 - 87 = 163ms slack. Safe. At 125ms: 125 - 87 =
    38ms slack. Tighter. Total SRAM: 16 + 7.84 + 85 = 108.84 KB (21% of SRAM). Application gets 403 KB.'
