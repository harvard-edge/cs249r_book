schema_version: 1
id: tinyml-fill-00264
title: Optimizing CNN Memory Footprint on ARM Cortex-M4 for TinyML
topic: tensor-arena-planning
status: published
provenance: imported
scenario: You are tasked with deploying a convolutional neural network (CNN) model for image classification
  onto an ARM Cortex-M4 STM32F4 microcontroller (168 MHz, 256 KB SRAM, no FPU). The model has a peak memory
  requirement of 200 KB for intermediate tensors during inference. Your team has decided to use a flat
  tensor arena for memory allocation to minimize dynamic memory overhead. Describe how you would analyze
  the memory layout and operator scheduling to ensure the model fits within the available 256 KB SRAM,
  considering the implications of placing certain data (e.g., model weights vs. activation tensors) in
  flash versus SRAM.
details:
  realistic_solution: 'A realistic solution involves several steps: 1. **Detailed Profiling:** Utilize
    tools like TensorFlow Lite Micro''s built-in memory profiler or custom instrumentation to accurately
    measure the peak SRAM usage by intermediate tensors for each operator. 2. **Operator Scheduling &
    Graph Optimization:** Analyze the computation graph and reorder operations where possible to minimize
    the number of concurrently live tensors, thereby reducing the peak memory footprint. This might involve
    fusing operations or strategically buffering data. 3. **Memory Segmentation:** Clearly delineate memory
    regions. Read-only data such as model weights and biases should be placed in flash memory (if memory-mapped
    for direct access), while mutable data like activation tensors and temporary buffers are allocated
    in SRAM. 4. **Flat Tensor Arena Sizing:** Based on the peak memory usage from profiling and graph
    optimization, statically allocate a single, contiguous memory region (the flat tensor arena) in SRAM.
    This avoids fragmentation and dynamic allocation overhead. 5. **Toolchain Integration:** Leverage
    the compiler and linker scripts to precisely control memory placement for different sections (e.g.,
    .text, .data, .bss) and ensure the tensor arena is correctly located and sized within the available
    SRAM.'
  common_mistake: A common mistake is to only consider the total model size (weights and biases) and not
    the peak intermediate tensor requirements during inference, leading to SRAM overflow during runtime.
    Another error is to haphazardly place data in flash/SRAM without considering access patterns and performance
    implications, such as repeatedly fetching large weights from slow flash memory when they could be
    buffered or cached more effectively.
  napkin_math: Given the STM32F4 has 256 KB SRAM. If the RTOS, stack, heap, and other static allocations
    consume approximately 30 KB, then the available SRAM for the tensor arena is 256 KB - 30 KB = 226
    KB. If the model's profiled peak intermediate tensor requirement is 200 KB, it would theoretically
    fit. However, if the peak was, say, 240 KB, it would exceed the 226 KB available, necessitating aggressive
    memory optimization techniques or a smaller model architecture. Furthermore, if the model weights
    are 100 KB and stored in flash, they do not contribute to SRAM peak usage, but their access speed
    from flash is critical.
