id: tinyml-fill-01653
title: 'Federated Learning on ESP32-S3: Convergence and Memory Challenges'
topic: federated-learning
status: published
provenance: imported
scenario: Imagine deploying a cross-device federated learning system for on-device activity recognition
  using accelerometers on thousands of ESP32-S3 microcontrollers. Each ESP32-S3 has a 240 MHz dual-core
  processor, 512 KB SRAM, and 8 MB PSRAM, and communicates over Wi-Fi. You observe that after only a few
  federated rounds, the model convergence becomes extremely slow, and devices frequently experience out-of-memory
  errors during local training, even though the global model size itself is only 2 MB. Analyze why these
  specific issues are occurring, detailing the underlying reasons related to the ESP32-S3's hardware constraints
  and the characteristics of federated learning.
details:
  realistic_solution: To mitigate memory issues, aggressive model quantization (e.g., 8-bit or 4-bit weights)
    and judicious model pruning are crucial to reduce the base model size and its training artifacts.
    Micro-batching (processing very small batch sizes) can significantly reduce intermediate activation
    memory. For communication efficiency, gradient compression techniques (e.g., sparsification, Top-K,
    differential privacy-preserving compression) can drastically reduce the size of updates sent. Implementing
    asynchronous federated averaging or using optimizers optimized for communication (e.g., client-side
    momentum like FedAvgM) can improve convergence speed with fewer rounds. Strategic and careful use
    of PSRAM for larger tensors or data buffers, while acknowledging its slower access compared to SRAM,
    is also vital.
  common_mistake: A common mistake is underestimating the true memory footprint required for local model
    training beyond just the raw model parameters, especially on severely resource-constrained devices
    like the ESP32-S3. Developers often overlook the additional memory needed for gradients, optimizer
    states (e.g., momentum, variance for Adam, which can be 2-3x the parameter count), input data batches,
    and intermediate activations, which can easily be several times the model size. Another mistake is
    neglecting the significant power consumption and latency impact of frequent, relatively large (e.g.,
    2MB) model updates over low-bandwidth wireless connections, which can drastically slow down convergence.
  napkin_math: For a 2 MB global model (assuming float32 parameters, i.e., 4 bytes/parameter), this translates
    to approximately 500,000 parameters. During local training with a sophisticated optimizer like Adam,
    each parameter typically requires storage for its value (4 bytes), its gradient (4 bytes), and two
    optimizer states (e.g., 'm' and 'v', each 4 bytes). This totals 16 bytes per parameter. Therefore,
    the minimum memory needed for just the model, gradients, and optimizer states would be 500,000 parameters
    * 16 bytes/parameter = 8,000,000 bytes = 8 MB. This critically matches the ESP32-S3's 8 MB PSRAM and
    far exceeds its 512 KB SRAM. If the training process heavily relies on SRAM for fast access, or if
    the batch data and intermediate activations push the total working set beyond 8 MB, out-of-memory
    errors in the PSRAM or severe performance degradation due to memory thrashing are inevitable. For
    communication, if each of 1,000 devices sends a 2 MB model update, the server must aggregate 2 GB
    of data per federated round, posing significant network bandwidth and server-side processing challenges,
    contributing to slow convergence.
