title: Dual-Core Anomaly Latency Decomposition
scenario: You are designing an industrial vibration anomaly detection system. The system continuously samples accelerometer data, and upon detecting a potential fault, must extract FFT features, run a CNN inference, and transmit an alert over BLE 5.3. The strict end-to-end latency budget from physical anomaly to BLE transmission is 40ms.
question: How should a dual-core MCU split sensing, FFT, CNN inference, IPC, and BLE transmission to meet a 40 ms anomaly alert budget?
details:
  realistic_solution: 'Pipeline the workload using shared memory for IPC rather than serializing data. The app core handles DMA-driven SPI ingestion, runs the FFT, and executes the quantized CNN. The net core handles the BLE stack independently. The latency decomposes into Sensing/DMA, Preprocessing, Inference, IPC, and Network Tx.'
  common_mistake: |
    **The Pitfall:** Treating the dual-core MCU as a single-core system.
    **The Rationale:** Candidates ignore inter-processor communication (IPC) latency and network stack overhead.
    **The Consequence:** Deployed devices consistently miss the 40ms deadline because network and IPC delays are not mathematically budgeted.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Budget: 40 ms.
       - MCU: 128 MHz App Core, 64 MHz Net Core.
    2. **Calculations:**
       - Sensing/DMA buffer fill: 5 ms.
       - Preprocessing (1024-pt FFT on 128 MHz): 2 ms.
       - Inference (3M MAC CNN on 128 MHz): 3M / 128M ≈ 23.4 ms.
       - IPC (Shared SRAM): 0.5 ms.
       - Network (BLE Tx on 64 MHz): 9 ms.
       - Total Latency = 5 + 2 + 23.4 + 0.5 + 9 = 39.9 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** The latency is extremely tight at 39.9 ms, requiring perfect IPC pipelining to hit the 40 ms deadline.
