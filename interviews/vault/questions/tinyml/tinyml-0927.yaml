title: Design Layer-Wise Quantization Schedule for Transformer on MCU
scenario: 'A 6-layer transformer with 512 hidden dimensions targets Cortex-M7+Ethos-U55. Full INT8 quantization reduces the 3M parameter model from 12MB to 3MB (fits 4MB flash) but drops accuracy by 8%. Sensitivity analysis shows: embedding layer and final classifier (approx 1M params) are high-sensitivity, all 6 transformer layers (approx 2M params) are low-sensitivity. SRAM budget is 256KB for activations. Design a mixed-precision quantization schedule that preserves accuracy while fitting memory constraints.'
question: How would you design a mixed-precision quantization schedule that preserves accuracy while fitting memory constraints?
details:
  realistic_solution: 'Quantize all 6 transformer layers to INT8 (2M params × 1B = 2MB) and keep the embedding and classifier in INT16 or FP16 (1M params × 2B = 2MB). Total weights equal 4MB, perfectly fitting the flash constraint. Activations for a small sequence (e.g., 32 tokens × 512 dim × 2B = 32KB) comfortably fit within the 256KB SRAM.'
  common_mistake: Applying uniform INT4 to all layers to save more memory; embedding quantization to INT4 causes vocabulary collapse for rare tokens.
  napkin_math: 'Model memory in mixed precision: 1M params × 2B = 2MB weights. 2M params × 1B = 2MB. Total weights = 4MB. Activations: 32 tokens × 512 dim × 2B = 32KB. Total fits within 4MB flash and 256KB SRAM.'
