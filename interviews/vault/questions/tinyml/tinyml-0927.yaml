title: Design Layer-Wise Quantization Schedule for Transformer on MCU
scenario: A 6-layer transformer with 512 hidden dimensions targets Cortex-M7+Ethos-U55. Full INT8 quantization reduces the 3M parameter model from 12MB to 3MB but drops accuracy by 8%. Sensitivity analysis shows the embedding layer and final classifier (approx 1M params) are high-sensitivity, while all 6 transformer layers (approx 2M params) are low-sensitivity. The SRAM budget is 256KB for activations.
question: How would you design a mixed-precision quantization schedule that preserves accuracy while fitting memory constraints?
details:
  realistic_solution: 'Quantize all 6 transformer layers to INT8 (2M params * 1B = 2MB) and keep the embedding and classifier in INT16 or FP16 (1M params * 2B = 2MB). Total weights equal 4MB, perfectly fitting the flash constraint. Activations for a small sequence (e.g., 32 tokens * 512 dim * 2B = 32KB) comfortably fit within the 256KB SRAM.'
  common_mistake: |
    **The Pitfall:** Applying uniform INT4 to all layers to save more memory.
    **The Rationale:** Candidates assume that if INT8 loses accuracy, a uniform step down in precision across the board is the only way to save space, ignoring layer-specific sensitivities.
    **The Consequence:** Quantizing the embedding layer to INT4 causes severe vocabulary collapse for rare tokens, destroying model accuracy completely.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Flash Limit: 4 MB.
       - SRAM Limit: 256 KB.
       - High-Sensitivity Weights: 1M params.
       - Low-Sensitivity Weights: 2M params.
    2. **Calculations:**
       - High-Sensitivity (INT16): 1M * 2 bytes = 2 MB.
       - Low-Sensitivity (INT8): 2M * 1 byte = 2 MB.
       - Total Flash Footprint: 2 MB + 2 MB = 4 MB.
       - Activations (INT16): 32 tokens * 512 dim * 2 bytes = 32 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Storage-Bound** (A mixed-precision strategy uses 4 MB Flash and 32 KB SRAM, perfectly fitting constraints while preserving accuracy).
