title: The Watchdog Interrupt Starvation
scenario: A Cortex-M4 runs an 800ms anomaly detection model inside a 1Hz timer interrupt (ISR). A hardware watchdog timer must be reset in the main loop every 500ms. The device constantly resets.
question: Why does moving an 800ms Cortex-M4 anomaly model into a timer ISR make a 500ms watchdog reset the device?
details:
  realistic_solution: Running 800ms of ML inference inside an ISR blocks all lower-priority interrupts and the main loop. Since the main loop is starved for 800ms, the watchdog times out at 500ms and resets the MCU. The fix is to never run heavy computation in an ISR; instead, set a flag in the ISR and run inference in the main loop.
  common_mistake: |
    **The Pitfall:** Blaming the watchdog timeout threshold as being too short.
    **The Rationale:** Candidates fail to understand the fundamental architectural error of running heavy, blocking computation inside an interrupt context.
    **The Consequence:** They increase the watchdog timer instead of fixing the broken ISR architecture, masking a severe real-time design flaw.
  napkin_math: |
    - ISR duration: 800 ms.
    - Watchdog deadline: 500 ms.
    - CPU trap time: 800 ms - 500 ms = 300 ms.
    - **The CPU is trapped in the ISR 300 ms past the hardware kill-switch deadline, starving the main loop.**
