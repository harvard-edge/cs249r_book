title: The CMSIS-NN Transpose Overhead
scenario: You are running a CNN on a Cortex-M4. The model was trained in PyTorch (which defaults to NCHW
  memory layout). You convert it to TFLite Micro and use the CMSIS-NN kernels. The model runs, but the
  profiler shows that between every single convolution layer, the CPU spends 30% of the total inference
  time executing a `Transpose` operation. Why is the framework transposing the data, and how do you eliminate
  it?
question: "Why does a PyTorch NCHW CNN spend 30% of Cortex-M4 inference time in TFLite Micro Transpose ops?"
details:
  realistic_solution: 'PyTorch uses NCHW (batch, channels, height, width) memory layout. TFLite Micro
    and CMSIS-NN require NHWC (batch, height, width, channels). When the converter detects the mismatch,
    it inserts Transpose ops between layers. Transposing a 32x32x64 INT8 tensor requires moving 65,536
    bytes via strided reads — ~500K cycles on M4 without data cache. With 10 transpose ops: 10M wasted
    cycles (60ms at 168MHz). Fix: export the PyTorch model in NHWC format from the start (use channels_last
    memory format), or use ONNX with explicit layout conversion before TFLite export. This eliminates
    all runtime transpose ops.'
  common_mistake: '"TFLite is unoptimized, you need to write custom C code." The framework is doing exactly
    what it has to do based on the input graph.'
  napkin_math: Transposing a 32x32x64 INT8 tensor requires moving 65,536 bytes via strided reads. On an
    M4 without a data cache, this can take ~500,000 cycles. Doing this before and after 10 layers wastes
    10 million CPU cycles (60ms at 168 MHz) purely on rearranging data.
  options:
  - TFLite Micro is inserting unnecessary Transpose ops due to a framework bug. Filing a bug report and
    rebuilding TFLite Micro from the latest source will eliminate the overhead.
  - 'PyTorch uses NCHW layout; TFLite Micro/CMSIS-NN requires NHWC. The converter inserts Transpose ops
    between every layer to convert. Transposing 32x32x64 INT8 via strided reads: ~500K cycles per op (no
    data cache on M4). With 10 layers: ~10M wasted cycles (60ms at 168 MHz). Fix: export from PyTorch
    in NHWC (channels_last memory format) or convert layouts in ONNX before TFLite export, eliminating
    all runtime transpose ops.'
  - The transpose operations are caused by the model having batch normalization layers that require NCHW
    format, even though the convolutions use NHWC.
  - The overhead is unavoidable because CMSIS-NN internally uses NCHW for all computations, requiring
    a layout conversion before and after every kernel call regardless of the input format.
  correct_index: 1
