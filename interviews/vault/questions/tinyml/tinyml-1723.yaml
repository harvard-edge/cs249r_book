title: Triple-Buffering Pipeline Throughput Constraint
scenario: A Cortex-M4 pipeline gathers data via SPI (5ms), computes an ML model (10ms),
  and transmits via BLE (5ms).
question: Apply a triple-buffering scheduling pipeline using DMA, and state the resulting
  maximum inference throughput limit.
details:
  realistic_solution: With triple buffering and DMA, the three stages operate concurrently.
    In a given time slot, Buffer 1 is read via SPI, Buffer 2 is computed, and Buffer
    3 is sent via BLE. The throughput of the pipeline is determined strictly by its
    slowest stage. The maximum latency bottleneck is the 10ms compute, resulting in
    a maximum throughput of 1 inference per 10ms (100 Hz).
  common_mistake: Summing the latencies (20ms) to calculate throughput, completely
    negating the benefit of the pipeline.
  napkin_math: max(5, 10, 5) = 10ms
