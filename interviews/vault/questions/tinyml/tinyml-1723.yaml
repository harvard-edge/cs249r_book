title: Triple-Buffering Pipeline Throughput Constraint
scenario: A Cortex-M4 pipeline gathers data via SPI (5ms), computes an ML model (10ms),
  and transmits via BLE (5ms).
question: Apply a triple-buffering scheme using DMA, AND compute the strict SRAM
  memory footprint required to maintain three independent stage buffers (input,
  intermediate, output). Identify the SRAM cost as a fraction of typical 256 KB
  Cortex-M4 SRAM.
details:
  realistic_solution: 'Three buffers needed: input (SPI sample frame, ~2 KB), intermediate
    (model activation tensor, ~12 KB), output (BLE payload, ~512 B). Total SRAM
    overhead = 14.5 KB minimum, plus alignment/padding ~ 16 KB. On a 256 KB Cortex-M4,
    this is 6.25% of total SRAM - acceptable. If activation tensor grows to 64 KB
    for a larger model, three buffers cost 196 KB (76%) and the M4 cannot fit weights
    + arena + buffers, forcing two-buffer ping-pong with reduced overlap.'
  common_mistake: Computing only the throughput improvement (10 ms bottleneck) and
    missing that triple-buffering triples the SRAM cost - the design constraint
    that often determines feasibility on tightly-budgeted MCUs.
  napkin_math: 'Throughput: 1000/max(5,10,5) = 100 Hz. SRAM cost: 2 + 12 + 0.5 KB
    + padding = 16 KB (6.25% of 256 KB).'
