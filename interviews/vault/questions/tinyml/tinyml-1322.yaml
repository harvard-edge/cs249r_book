title: TinyML Compute Estimation for Nordic nRF5340
scenario: A machine learning engineer is tasked with deploying a small convolutional
  neural network (CNN) for keyword spotting on a Nordic nRF5340 microcontroller. The
  nRF5340 features a 128 MHz ARM Cortex-M33 processor, 256 KB of SRAM, and 1 MB of
  flash memory. Before deployment, the engineer needs to estimate the computational
  requirements of the model. Describe the primary metrics used to estimate the computational
  cost (e.g., FLOPs or MACs) for inference on such a constrained embedded platform,
  and briefly explain why these metrics are crucial for hardware selection and model
  optimization in a tinyML context.
question: Which compute and memory metrics should be estimated before deploying a
  KWS CNN on the Nordic nRF5340?
details:
  realistic_solution: To realistically estimate compute cost for tinyML on the Nordic
    nRF5340, one must consider both the number of Multiply-Accumulate operations (MACs/FLOPs)
    for the model and its memory footprint (weights and activations). Utilize dedicated
    tools like TensorFlow Lite for Microcontrollers (TFLu) built-in model analyzer
    to get precise MACs and memory usage. Furthermore, actual profiling on the target
    hardware or a development board with representative workloads is essential to
    account for real-world factors like memory access patterns and peripheral interactions.
  common_mistake: Overlooking memory constraints (SRAM for activations and Flash for
    model weights) and assuming only FLOPs/MACs are sufficient for predicting performance,
    leading to models that might not fit or run efficiently due to data movement bottlenecks
    or instruction cache misses.
  napkin_math: For a rough estimate, consider that a typical 8-bit integer MAC operation
    on a Cortex-M33 might take 1-2 clock cycles. If a model requires 500,000 MACs,
    it would demand approximately 500,000 to 1,000,000 cycles. On a 128 MHz processor
    (128,000,000 cycles/second), this translates to an inference time of roughly 4-8
    milliseconds (500,000 cycles / 128 MHz to 1,000,000 cycles / 128 MHz), excluding
    OS overhead or I/O.
