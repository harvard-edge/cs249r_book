title: TinyML Compute Estimation for Nordic nRF5340
scenario: A machine learning engineer is tasked with deploying a small convolutional neural network (CNN) for keyword spotting on a Nordic nRF5340 microcontroller. The nRF5340 features a 128 MHz ARM Cortex-M33 processor, 512 KB of SRAM, and 1 MB of flash memory.
question: Which compute and memory metrics should be estimated before deploying a KWS CNN on the Nordic nRF5340?
details:
  realistic_solution: To realistically estimate compute cost for tinyML on the Nordic nRF5340, one must consider both the number of Multiply-Accumulate operations (MACs/FLOPs) for the model and its memory footprint (weights and activations). Utilize dedicated tools like TensorFlow Lite for Microcontrollers (TFLu) built-in model analyzer to get precise MACs and memory usage. Furthermore, actual profiling on the target hardware or a development board with representative workloads is essential to account for real-world factors like memory access patterns and peripheral interactions.
  common_mistake: |
    **The Pitfall:** Overlooking memory constraints and focusing purely on FLOPs/MACs.
    **The Rationale:** Candidates assume compute is the only limitation.
    **The Consequence:** Models are chosen that might not fit in SRAM or Flash, or run inefficiently due to data movement bottlenecks.
  napkin_math: |
    - Assume 8-bit integer MAC takes 1-2 clock cycles.
    - A model with 500,000 MACs demands 500,000 to 1,000,000 cycles.
    - Processor speed: 128,000,000 cycles/second.
    - **Inference time = 500,000 to 1,000,000 cycles / 128 MHz = 4 to 8 milliseconds, excluding I/O overhead.**
