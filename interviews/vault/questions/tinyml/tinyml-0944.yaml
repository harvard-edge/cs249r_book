title: Specify Transformer Architecture for Sub-1mW Inference on MCU
scenario: You must specify a transformer architecture for continuous gesture recognition on a Cortex-M4 at 48 MHz (low-power mode, 0.5mW active power budget, 10μA/MHz dynamic power). The task requires processing 16-token sequences of 16-channel IMU features at 10 Hz.
question: How would you specify the number of layers, heads, embedding dimension, FFN ratio, and quantization precision to fit the 0.5mW power budget with >90% accuracy?
details:
  realistic_solution: 'Power budget: 0.5mW. Active current at 48MHz: 10μA/MHz × 48MHz = 0.48mA × 3.3V = 1.58mW too high. Use 32 MHz: 10μA×32MHz=0.32mA×3.3V=1.06mW still too high. Use 16MHz: 0.16mA×3.3V=0.53mW ≈ 0.5mW. At 16MHz, Cortex-M4: ~32 MFLOP/s. Inference at 10Hz → 100ms budget. Max FLOPs: 32MFLOP/s × 0.1s = 3.2M FLOPs per inference. Architecture for 3.2M FLOPs: 1 layer, 2 heads, 32-dim, FFN ratio 2×, seq=16. FLOPs: 2×16×32×(128+64+16) ≈ 2×16×32×208 = 213K FLOPs per layer — well under budget. Final spec: 4 layers, 2 heads, 32-dim, FFN 2×, INT8. FLOPs: 4×213K = 852K << 3.2M FLOPs. Accuracy: 4-layer 32-dim achieves ~92% on HCI gesture.'
  common_mistake: |
    **The Pitfall:** Starting with a large architecture and attempting to prune down.
    **The Rationale:** Candidates approach the problem from an accuracy-first mindset rather than a power-budget-first derivation.
    **The Consequence:** The resulting model invariably exceeds the strict physical power constraints of the MCU.
  napkin_math: |
    - Power constraint: 0.5mW / 3.3V = 0.15mA. At 10µA/MHz, max frequency $\approx$ 16 MHz.
    - FLOPs budget: Cortex-M4 at 16MHz $\rightarrow$ $\sim$32 MFLOP/s. 10Hz inference $\rightarrow$ 0.1s budget. Max FLOPs = 3.2M.
    - Per-layer FLOPs (1 Layer, 2 Heads, 32 Dim, seq=16): Attention=16K; QKV=98K; FFN (2x)=131K $\rightarrow$ Total $\approx$ 246K.
    - **Final Spec:** 4 layers, INT8 quantization $\rightarrow$ 4 x 246K = **984K FLOPs** ($\ll$ 3.2M budget).
