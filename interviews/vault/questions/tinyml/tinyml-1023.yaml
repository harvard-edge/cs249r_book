title: Evaluating Distillation Strategies for Ethos-U55
scenario: We are deploying an audio keyword spotting model on an ARM Cortex-M7 + Ethos-U55 system with a strict 512 KB shared SRAM limit. Proposal A uses strict logit-matching distillation into a fully INT8 MobileNet-style architecture. Proposal B uses intermediate feature-matching distillation into a custom CNN with partial FP32 execution on the M7 for critical path accuracy, followed by INT8 on the U55.
question: Which distillation proposal best fits a 512 KB Cortex-M7+Ethos-U55 KWS deployment and why?
details:
  realistic_solution: Proposal A is superior. The Ethos-U55 NPU requires a fully INT8 graph to maximize throughput. Proposal B's FP32 layers fall back to the Cortex-M7 CPU, ballooning execution time, and FP32 feature maps consume 4x the memory of INT8, violating SRAM limits.
  common_mistake: |
    **The Pitfall:** Choosing partial FP32 execution to preserve intermediate feature representation accuracy.
    **The Rationale:** Candidates believe higher precision in critical layers outweighs quantization overhead, failing to realize the M7 and U55 share the same 512 KB SRAM pool.
    **The Consequence:** Severe memory thrashing, NPU pipeline stalls, and total memory overallocation, causing system crashes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Shared SRAM: 512 KB. Intermediate tensor: 64x64x16.
       - Proposal A: INT8 (1 byte). Proposal B: FP32 (4 bytes).
    2. **Calculations:**
       - Proposal B (FP32) size: 64 * 64 * 16 * 4 bytes = 262,144 bytes = 256 KiB.
       - Proposal A (INT8) size: 64 * 64 * 16 * 1 byte = 65,536 bytes = 64 KiB.
       - SRAM utilization for tensor alone: Proposal B uses 50% of total SRAM; Proposal A uses 12.5%.
    3. **Conclusion & Interpretation:**
       - **Result: 64 KiB vs 256 KiB.** The system is SRAM-bound. Proposal B consumes exactly half the shared RAM for a single tensor, leaving insufficient room for weights and RTOS, whereas Proposal A efficiently maps to the NPU.
