title: Latency Decomposition of SPI Camera Pipeline on Corstone-300
scenario: 'An anomaly detection vision model runs on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) system operating at 480 MHz with 512 KB shared SRAM. An external camera is connected via a standard 10 Mbps SPI bus. The pipeline works as follows: the M7 captures a 128x128 RGB image (8-bit per channel), converts it to grayscale, and passes it to the Ethos-U55 (configured for 256 MAC/cycle) to execute a 5-million MAC inference model. The total end-to-end latency from frame request to inference result is measured at roughly 40ms. The ML team is confused because the NPU is a dedicated accelerator and the system runs at 480 MHz.'
question: Why is Corstone-300 vision latency about 40 ms when Ethos-U55 inference is only 0.04 ms?
details:
  realistic_solution: The bottleneck is entirely in the data acquisition phase (network/IO). Even though the ARM Cortex-M7 and Ethos-U55 can preprocess the data and execute the 5M MAC model in less than a millisecond, the system is fundamentally blocked waiting for the SPI bus to physically clock in the image frame. In real-world TinyML deployments, peripheral I/O and sensor reading frequently dominate the overall latency budget, rendering accelerator speed practically irrelevant for single-shot end-to-end latency.
  common_mistake: |
    **The Pitfall:** Tunnel-visioning on the neural network compute.
    **The Rationale:** Candidates assume SRAM bandwidth contention or poor NPU utilization is the bottleneck.
    **The Consequence:** They miss that the physical data transfer rate of the peripheral completely overshadows processing time.
  napkin_math: |
    - I/O Latency: 128x128 RGB image = 49,152 bytes = 393,216 bits.
    - SPI Transfer: 393,216 bits / 10 Mbps = 39.32 ms.
    - Pre-processing (M7): 16,384 pixels * 15 cycles/pixel = 245,760 cycles.
    - Pre-processing time: 245,760 cycles / 480 MHz = 0.51 ms.
    - Inference (U55): 5,000,000 MACs / 256 MACs/cycle ≈ 19,531 cycles.
    - Inference time: 19,531 cycles / 480 MHz = 0.04 ms.
    - **Total Latency = 39.32 ms (I/O) + 0.51 ms (Prep) + 0.04 ms (NPU) ≈ 40 ms.**
