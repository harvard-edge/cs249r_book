title: The BLE Model Update Time
scenario: You need to push a 150 KB quantized model update to a BLE 5.0-connected
  wearable device. BLE 5.0 has a theoretical 2 Mbps PHY rate, but the effective application-layer
  throughput with connection intervals, MTU negotiation, and protocol overhead is
  typically 40 KB/s. The device must pause inference during the Flash write. Calculate
  the update transfer time and total inference downtime, including a 3-second Flash
  erase/write cycle.
question: How would you calculate the update transfer time and total inference downtime,
  including a 3-second Flash erase/write cycle?
details:
  realistic_solution: 'Transfer time: 150 KB / 40 KB/s = 3.75 seconds. Flash write:
    3 seconds. Total downtime: 3.75 + 3 = 6.75 seconds. If inference runs every 200ms,
    that''s ~34 missed inference cycles. Mitigation: use a dual-bank Flash scheme
    — write the new model to bank B while running from bank A, then swap. This eliminates
    the 3.75s transfer downtime, reducing inference pause to just the 3s Flash swap.'
  common_mistake: Using the 2 Mbps PHY rate (250 KB/s) instead of the real application-layer
    throughput. BLE has massive protocol overhead from connection intervals, acknowledgments,
    and small packet sizes. Real throughput is often 15-50 KB/s.
  napkin_math: 'BLE 5.0 PHY: 2 Mbps = 250 KB/s. Real throughput: ~40 KB/s (16% efficiency).
    Transfer: 150 KB / 40 KB/s = 3.75 s. Flash write: 3 s. Total: 6.75 s. Missed inferences
    at 5 Hz: 6.75 × 5 = 33.75 ≈ 34. PHY-rate fantasy: 150/250 = 0.6 s (off by 6.25×).'
