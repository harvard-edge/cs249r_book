title: The BLE Model Update Time
scenario: You need to push a 150 KB quantized model update to a BLE 5.0-connected wearable device. BLE 5.0 has a theoretical 2 Mbps PHY rate, but the effective application-layer throughput with connection intervals, MTU negotiation, and protocol overhead is typically 40 KB/s. The device must pause inference during the Flash write.
question: How would you calculate the update transfer time and total inference downtime, including a 3-second Flash erase/write cycle?
details:
  realistic_solution: 'Transfer time: 150 KB / 40 KB/s = 3.75 seconds. Flash write: 3 seconds. Total downtime: 3.75 + 3 = 6.75 seconds. If inference runs every 200ms, that''s ~34 missed inference cycles. Mitigation: use a dual-bank Flash scheme — write the new model to bank B while running from bank A, then swap. This eliminates the 3.75s transfer downtime, reducing inference pause to just the 3s Flash swap.'
  common_mistake: |
    **The Pitfall:** Using the theoretical 2 Mbps PHY rate for calculation.
    **The Rationale:** Candidates ignore massive BLE protocol overhead from connection intervals, acknowledgments, and small packet sizes.
    **The Consequence:** The transfer time is vastly underestimated (0.6s instead of 3.75s).
  napkin_math: |
    - Calculate transfer time at real throughput: 150 KB / 40 KB/s = 3.75 seconds.
    - Calculate total downtime: 3.75s (transfer) + 3.0s (Flash write) = 6.75 seconds.
    - **Using a dual-bank Flash scheme (write to B while running A) eliminates the 3.75s transfer downtime, reducing the pause to just the 3s swap.**
