title: Flash vs SRAM Weight Placement Strategy
scenario: Your Cortex-M7 (512 KB SRAM, 2 MB Flash) runs a model with 1.2 MB of INT8 weights and needs 380 KB of arena for activations. The weights don't fit in SRAM alongside the arena (1.2 MB + 380 KB > 512 KB). You must execute weights from flash.
question: What is the performance penalty, and which layers should you prioritize copying to SRAM?
details:
  realistic_solution: 'Flash read latency on Cortex-M7: 2-5 wait states at 480 MHz (4-10ns per access vs 0ns for SRAM). But the D-cache (32 KB typical) prefetches 32-byte cache lines, amortizing the latency for sequential access. Performance breakdown: (1) Large Conv layers with sequential weight access: flash is 1.5-2× slower (cache hit rate ~90%). (2) Depthwise conv layers with small kernels: weights fit in cache entirely — near zero penalty. (3) Fully connected layers with random-ish access patterns: flash is 3-5× slower (poor cache locality for matrix access). Prioritization: copy FC layer weights to SRAM (typically <100 KB for classification heads). Keep conv weights in flash (benefit from caching). Budget: 512 KB - 380 KB arena = 132 KB for SRAM weights. FC layer weights: 1000 × 128 × 1 byte = 128 KB. Fits! Copy FC weights to SRAM, execute conv weights from flash.'
  common_mistake: |
    **The Pitfall:** Assuming flash execution is always catastrophically slow for all layer types.
    **The Rationale:** Candidates forget that the Cortex-M7 has a D-Cache (typically 32 KB) that pre-fetches cache lines, heavily amortizing latency for sequential weight access in convolutions.
    **The Consequence:** Unnecessary panic over memory constraints or proposing overly complex paging mechanisms instead of simply prioritizing random-access FC weights for SRAM.
  napkin_math: |
    1. **Baseline All-in-Flash:** Conv layers are 2× slower (due to caching) + FC layers 4× slower (poor locality).
    2. **Workload Split:** Conv compute = 80% of cycles. FC = 20%.
    3. **Weighted Penalty (All Flash):** (0.8 × 2.0) + (0.2 × 4.0) = **2.4× slower** overall.
    4. **Optimized (FC in SRAM):** 1000 × 128 × 1 byte = 128 KB for FC weights. (0.8 × 2.0) + (0.2 × 1.0) = **1.8× slower**.
    5. **Improvement:** 2.4 / 1.8 = 33% faster.
    6. **SRAM Budget:** 380 KB (arena) + 128 KB (FC weights) = 508 KB. Remaining: 4 KB for stack. Fits perfectly.
