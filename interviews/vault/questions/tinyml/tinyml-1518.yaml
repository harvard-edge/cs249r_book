title: Flash vs SRAM Weight Placement Strategy
scenario: Your Cortex-M7 (512 KB SRAM, 2 MB Flash) runs a model with 1.2 MB of INT8
  weights and needs 380 KB of arena for activations. The weights don't fit in SRAM
  alongside the arena (1.2 MB + 380 KB > 512 KB). You must execute weights from flash.
  What is the performance penalty, and which layers should you prioritize copying
  to SRAM?
question: What is the performance penalty, and which layers should you prioritize
  copying to SRAM?
details:
  realistic_solution: 'Flash read latency on Cortex-M7: 2-5 wait states at 480 MHz
    (4-10ns per access vs 0ns for SRAM). But the D-cache (32 KB typical) prefetches
    32-byte cache lines, amortizing the latency for sequential access. Performance
    breakdown: (1) Large Conv layers with sequential weight access: flash is 1.5-2×
    slower (cache hit rate ~90%). (2) Depthwise conv layers with small kernels: weights
    fit in cache entirely — near zero penalty. (3) Fully connected layers with random-ish
    access patterns: flash is 3-5× slower (poor cache locality for matrix access).
    Prioritization: copy FC layer weights to SRAM (typically <100 KB for classification
    heads). Keep conv weights in flash (benefit from caching). Budget: 512 KB - 380
    KB arena = 132 KB for SRAM weights. FC layer weights: 1000 × 128 × 1 byte = 128
    KB. Fits! Copy FC weights to SRAM, execute conv weights from flash.'
  common_mistake: Assuming flash execution is always catastrophically slow. Cortex-M7
    has an instruction/data cache (I-Cache + D-Cache, typically 16-64 KB each). Sequential
    weight access patterns (as in convolutions) achieve high cache hit rates, making
    flash execution only 2-3× slower than SRAM for large layers.
  napkin_math: 'All in flash: conv layers 2× slower + FC layers 4× slower. Conv compute:
    80% of total cycles. FC: 20%. Weighted penalty: 0.8 × 2.0 + 0.2 × 4.0 = 2.4× slower
    overall. With FC in SRAM: 0.8 × 2.0 + 0.2 × 1.0 = 1.8× slower. Improvement: 2.4/1.8
    = 33% faster. SRAM used: 380 KB (arena) + 128 KB (FC weights) = 508 KB. Remaining:
    4 KB for stack. Tight but works.'
