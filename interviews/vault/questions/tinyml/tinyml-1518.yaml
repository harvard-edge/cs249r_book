title: Flash vs SRAM Weight Placement Strategy
scenario: Your Cortex-M7 (512 KB SRAM, 2 MB Flash) runs a model with 1.2 MB of INT8 weights and needs 380 KB of arena for activations. The weights do not fit in SRAM alongside the arena.
question: What is the performance penalty, and which layers should you prioritize copying to SRAM?
details:
  realistic_solution: Utilize the D-Cache (32 KB typical) which amortizes Flash read latency for sequential access. Fully connected (FC) layers require random-ish access patterns, missing cache and suffering huge latency penalties. Prioritize moving FC layer weights into the remaining SRAM.
  common_mistake: |
    **The Pitfall:** Assuming Flash execution is always catastrophically slow for all layer types.
    **The Rationale:** Candidates forget that the Cortex-M7 has a D-Cache (typically 32 KB) that pre-fetches cache lines, heavily amortizing latency for sequential weight access in convolutions.
    **The Consequence:** Unnecessary panic over memory constraints or proposing overly complex paging mechanisms instead of simply prioritizing random-access FC weights for SRAM.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cortex-M7: 512KB SRAM, 2MB Flash, 32KB D-Cache.
       - Activation arena: 380KB.
       - Weights: 1.2MB total. FC layer weights: 1000 * 128 = 128KB.
    2. **Calculations:**
       - SRAM remaining: 512 - 380 = 132KB.
       - Performance penalty from Flash: Conv layers 2x slower (sequential, cache hits), FC layers 4x slower (random access, cache misses).
       - Move 128KB FC weights to SRAM. SRAM used: 380 + 128 = 508KB (fits).
       - New penalty: Conv executes from Flash (2x), FC from SRAM (1x).
    3. **Conclusion & Interpretation:**
       **Result: 33% faster overall by placing FC weights in SRAM.** The system is **Flash-Latency-Bound** for random memory accesses.
