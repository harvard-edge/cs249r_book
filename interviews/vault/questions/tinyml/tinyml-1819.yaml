title: Shared Medium RF Parameter Server Topology
scenario: A swarm of 8 micro-drones uses ESP-NOW (1 Mbps effective, broadcast topology) to average localized map features (10 KB per drone). You must decide between a decentralized Ring AllReduce and a central Star Parameter Server topology.
question: Evaluate which topology minimizes total transmission time over the shared RF medium, calculating the minimum time for the optimal choice.
details:
  realistic_solution: Over a shared wireless medium, simultaneous transmissions collide, making the medium itself the bottleneck. A Ring AllReduce degrades to serializing 2*(N-1) = 14 steps of 10 KB, totaling 140 KB. A Star topology requires 8 serialized uploads of 10 KB (80 KB) and 1 single broadcast download of the 10 KB average, totaling 90 KB. At 1 Mbps (125 KB/s), the Star topology takes 90 KB / 125 KB/s = 0.72 seconds, strictly dominating the ring.
  common_mistake: |
    **The Pitfall:** Blindly applying the Ring AllReduce 2(N-1)/N optimality rule.
    **The Rationale:** This rule only holds for switched, full-duplex point-to-point networks, not shared RF domains where simultaneous transmissions collide.
    **The Consequence:** Selecting a sub-optimal topology that significantly increases transmission time.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Swarm size N = 8. Payload = 10 KB per drone.
       - Shared RF medium: 1 Mbps = 125 KB/s effective bandwidth. No full-duplex.
    2. **Calculations:**
       - Ring AllReduce serialization: 2*(8-1) = 14 sequential steps of 10 KB = 140 KB total.
       - Star Topology: 8 serialized uploads (80 KB) + 1 broadcast download (10 KB) = 90 KB total.
       - Star latency = 90 KB / 125 KB/s = 0.72 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound.** The Star topology takes 0.72 seconds, strictly dominating the ring because the shared RF medium turns AllReduce into pure serialization.
