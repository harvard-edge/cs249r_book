title: Shared Medium RF Parameter Server Topology
scenario: A swarm of 8 micro-drones uses ESP-NOW (1 Mbps effective, broadcast topology)
  to average localized map features (10 KB per drone). You must decide between a decentralized
  Ring AllReduce and a central Star Parameter Server topology.
question: Evaluate which topology minimizes total transmission time over the shared
  RF medium, calculating the minimum time for the optimal choice.
details:
  realistic_solution: Over a shared wireless medium, simultaneous transmissions collide,
    making the medium itself the bottleneck. A Ring AllReduce degrades to serializing
    2*(N-1) = 14 steps of 10 KB, totaling 140 KB. A Star topology requires 8 serialized
    uploads of 10 KB (80 KB) and 1 single broadcast download of the 10 KB average,
    totaling 90 KB. At 1 Mbps (125 KB/s), the Star topology takes 90 KB / 125 KB/s
    = 0.72 seconds, strictly dominating the ring.
  common_mistake: Blindly applying the Ring AllReduce 2(N-1)/N optimality rule, which
    only holds for switched, full-duplex point-to-point networks, not shared RF domains.
  napkin_math: Star Payload = (8 * 10KB) + 10KB_broadcast = 90KB; 90KB / 125KB/s =
    0.72s
