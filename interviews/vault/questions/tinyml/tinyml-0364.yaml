title: 'The Economics of Fleet Updates: Centralized vs. Federated'
scenario: You are the ML systems engineer for a fleet of 1 million TinyML-powered smart doorbells. To improve the person detection model, you must decide on an update strategy. Strategy A (Centralized) requires each device to upload 100 representative images (10 KB each) to the cloud for centralized retraining, pushing back a 500 KB model. Strategy B (Federated) requires each device to compute a local gradient update (100 KB) and upload it, pushing back the 500 KB model. Data transfer costs $0.09/GB.
question: "Which update strategy costs less in data transfer for 1M doorbells: centralized image uploads or federated gradients?"
details:
  realistic_solution: 'Federated is 2.5x cheaper. Centralized total transfer: 1M devices * 1MB upload + 1M * 500KB download = 1,500 GB at $0.09/GB = $135. Federated total: 1M * 100KB gradient upload + 1M * 500KB download = 600 GB = $54. Savings: $81 per round (60% reduction). The upload direction shows the biggest gap: 1,000 GB vs 100 GB (10x reduction) because gradients are 10x smaller than raw images. Download is identical (500 GB) since both push the same updated model. At scale with monthly retraining, federated saves ~$972/year.'
  common_mistake: |
    **The Pitfall:** Assuming Federated Learning is universally cheaper because raw data stays on-device.
    **The Rationale:** Candidates fail to realize that if a model has large gradient updates relative to the raw data size, FL can be MORE expensive.
    **The Consequence:** Blindly choosing FL could increase operational costs if the gradient-to-data ratio is unfavorable.
  napkin_math: |
    * **Centralized:**
      * Upload: 1,000,000 × (100 × 10 KB) = 1,000,000 MB = 1,000 GB.
      * Download: 1,000,000 × 500 KB = 500 GB.
      * Total: 1,500 GB.
      * Cost: 1,500 × $0.09 = **$135**.
    * **Federated:**
      * Upload: 1,000,000 × 100 KB = 100 GB.
      * Download: 1,000,000 × 500 KB = 500 GB.
      * Total: 600 GB.
      * Cost: 600 × $0.09 = **$54**.
    * **Savings:** $135 − $54 = $81 per round (Federated is 2.5× cheaper).
  options:
  - Centralized requires ~150 GB; Federated requires ~60 GB.
  - Centralized requires ~1,500 GB; Federated requires ~600 GB.
  - Centralized requires ~1,500 GB ($135); Federated requires ~600 GB ($54). Federated is 2.5× cheaper.
  - Federated requires ~1,500 GB; Centralized requires ~600 GB.
  correct_index: 2
