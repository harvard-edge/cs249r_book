title: 'The Economics of Fleet Updates: Centralized vs. Federated'
scenario: 'You are the ML systems engineer for a fleet of 1 million TinyML-powered smart doorbells. To
  improve the person detection model, you must decide on an update strategy.

  - **Strategy A (Centralized):** Each device uploads 100 representative images (10 KB each) to the cloud
  for centralized retraining. The updated model (500 KB) is pushed back to all devices.

  - **Strategy B (Federated):** Each device computes a local gradient update (100 KB) from its on-device
  data and uploads it. The server aggregates gradients and pushes the updated model (500 KB) back.

  Data transfer costs $0.09/GB. Which strategy is cheaper in terms of total data transfer cost?'
details:
  realistic_solution: 'Federated is 2.5x cheaper. Centralized total transfer: 1M devices * 1MB upload
    + 1M * 500KB download = 1,500 GB at $0.09/GB = $135. Federated total: 1M * 100KB gradient upload +
    1M * 500KB download = 600 GB = $54. Savings: $81 per round (60% reduction). The upload direction shows
    the biggest gap: 1,000 GB vs 100 GB (10x reduction) because gradients are 10x smaller than raw images.
    Download is identical (500 GB) since both push the same updated model. At scale with monthly retraining,
    federated saves ~$972/year.'
  common_mistake: 'Assuming Federated Learning is always cheaper because raw data stays on-device. It
    IS cheaper here (gradients = 100 KB < images = 1 MB per device), but the savings depend on the ratio
    of raw data size to gradient/update size. For models with large gradient updates relative to raw data,
    FL can be MORE expensive in data transfer. Also: unit confusion at fleet scale (MB vs GB) leads to
    orders-of-magnitude errors.'
  napkin_math: '**Centralized:**

    Upload: 1,000,000 × 1 MB = 1,000 GB. Download: 1,000,000 × 500 KB = 500 GB. Total: 1,500 GB.

    Cost: 1,500 × $0.09 = $135.


    **Federated:**

    Upload: 1,000,000 × 100 KB = 100 GB. Download: 1,000,000 × 500 KB = 500 GB. Total: 600 GB.

    Cost: 600 × $0.09 = $54.


    **Savings:** $135 − $54 = $81 per round (2.5× cheaper). Upload is the key difference: 1,000 GB vs
    100 GB (10× reduction). Download is identical (500 GB both). At monthly retraining: $972/year savings.'
  options:
  - Centralized requires ~150 GB; Federated requires ~60 GB.
  - Centralized requires ~1,500 GB; Federated requires ~600 GB.
  - Centralized requires ~1,500 GB ($135); Federated requires ~600 GB ($54). Federated is 2.5× cheaper.
  - Federated requires ~1,500 GB; Centralized requires ~600 GB.
  correct_index: 2
