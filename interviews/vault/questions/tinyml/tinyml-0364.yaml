title: 'The Economics of Fleet Updates: Centralized vs. Federated'
scenario: 'You are the ML systems engineer for a fleet of 1 million TinyML-powered smart doorbells. To improve the person detection model, you must decide on an update strategy. Strategy A (Centralized) requires each device to upload 100 representative images (10 KB each) to the cloud for centralized retraining, pushing back a 500 KB model. Strategy B (Federated) requires each device to compute a local gradient update (100 KB) and upload it, pushing back the 500 KB model. Data transfer costs $0.09/GB.'
question: 'Which update strategy costs less in data transfer for 1M doorbells: centralized image uploads or federated gradients?'
details:
  realistic_solution: 'Federated is 2.5x cheaper. Centralized total transfer: 1M devices * 1MB upload + 1M * 500KB download = 1,500 GB at $0.09/GB = $135. Federated total: 1M * 100KB gradient upload + 1M * 500KB download = 600 GB = $54. Savings: $81 per round (60% reduction). The upload direction shows the biggest gap: 1,000 GB vs 100 GB (10x reduction) because gradients are 10x smaller than raw images. Download is identical (500 GB) since both push the same updated model.'
  common_mistake: |
    **The Pitfall:** Assuming Federated Learning is universally cheaper because raw data stays on-device.
    **The Rationale:** Candidates fail to realize that if a model has large gradient updates relative to the raw data size, FL can be MORE expensive.
    **The Consequence:** Blindly choosing FL could increase operational costs if the gradient-to-data ratio is unfavorable.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1,000,000 devices. Data transfer cost: $0.09/GB.
    - Centralized: 100 images * 10 KB = 1 MB upload; 500 KB download.
    - Federated: 100 KB gradient upload; 500 KB download.

    **Calculations:**
    - Centralized upload: 1M * 1 MB = 1,000 GB.
    - Centralized download: 1M * 500 KB = 500 GB.
    - Centralized Total = 1,500 GB * $0.09/GB = $135.
    - Federated upload: 1M * 100 KB = 100 GB.
    - Federated download: 1M * 500 KB = 500 GB.
    - Federated Total = 600 GB * $0.09/GB = $54.

    **Conclusion & Interpretation:**
    - **Result: Federated is 2.5x cheaper at $54 vs $135 (Bandwidth-Bound)**. Because gradient updates are smaller than raw images, FL saves massive transfer costs.
  options:
  - 'Centralized requires ~10 GB ($0.90); Federated requires ~600 GB ($54).'
  - 'Centralized requires ~1,500 GB; Federated requires ~1,500 GB.'
  - 'Centralized requires ~1,500 GB ($135); Federated requires ~600 GB ($54). Federated is 2.5x cheaper.'
  - 'Federated requires ~1,500 GB; Centralized requires ~600 GB.'
