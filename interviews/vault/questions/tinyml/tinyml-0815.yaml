title: Tinyml New 0040
scenario: You add linker flags to strip dead code and reduce a TinyML binary size. The code shrinks beautifully, but the MCU immediately crashes upon the first sensor interrupt.
question: "Why does dead-code elimination make the Cortex-M4 crash on the first sensor interrupt, and how should ISRs be preserved?"
details:
  realistic_solution: The linker's dead code elimination stripped the hardware Interrupt Service Routines (ISRs). Because ISRs are called directly by the hardware interrupt controller (NVIC) and never explicitly called from `main()`, the linker assumes they are dead code and removes them. When the sensor fires, the NVIC jumps to a null or invalid vector. Fix by adding `__attribute__((used))` to ISR functions.
  common_mistake: |
    **The Pitfall:** Blindly applying dead code elimination in embedded systems without explicitly marking hardware-invoked callbacks as 'used'.
    **The Rationale:** Engineers accustomed to standard application development assume the compiler understands all execution paths, forgetting that hardware interrupts occur asynchronously outside the software call tree.
    **The Consequence:** The linker strips out the ISRs, causing an absolute system crash (HardFault) the moment an interrupt fires.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Vector Table / ISR Footprint: ~50 bytes.
       - Linker Flag: `--gc-sections` (dead code elimination).
       - Execution Flow: Hardware NVIC, not software call tree.
    2. **Calculations:**
       - ISR space removed: 50 bytes.
       - Hardware Interrupt fires -> Vector Table points to 0x00000000.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (Linker Error).** The linker aggressively optimized away 50 bytes of unreferenced ISR functions, leading to an immediate HardFault.
