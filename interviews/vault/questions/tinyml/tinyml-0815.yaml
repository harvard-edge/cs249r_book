title: Tinyml New 0040
scenario: You add `-Wl,--gc-sections` and `--ffunction-sections` to strip dead code and reduce a TinyML
  binary size. The code shrinks beautifully, but the M4 immediately crashes upon the first sensor interrupt.
details:
  realistic_solution: The linker's dead code elimination stripped the hardware Interrupt Service Routines
    (ISRs). Because ISRs are called directly by the hardware interrupt controller (NVIC) and never explicitly
    called from `main()`, the linker assumes they are dead code and removes them. When the sensor fires,
    the NVIC jumps to a null or invalid vector. Fix by adding `__attribute__((used))` to ISR functions.
  common_mistake: Blindly applying dead code elimination in embedded systems without explicitly marking
    hardware-invoked callbacks as 'used'.
  napkin_math: 'ISR takes 50 bytes. Dead code elimination strips it. Interrupt fires -> Vector table points
    to 0x00000000. CPU HardFaults. Space saved: 50B. Cost: absolute system crash.'
