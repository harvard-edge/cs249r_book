title: The Mixed-Precision Memory Spike
scenario: You are optimizing a keyword-spotting model for a Cortex-M4 with 256KB of SRAM. Your fully INT8-quantized model runs perfectly, with a peak Tensor Arena usage of 72KB. To improve accuracy, you change a single Conv2D layer to execute in FP32. The model now fails during initialization with a memory allocation error. The problematic FP32 layer receives a `[1, 25, 40, 16]` INT8 tensor from the previous layer.
question: What transient memory spike causes the mixed-precision TFLM model to fail during interpreter initialization?
details:
  realistic_solution: The root cause is the memory spike during the de-quantization of the input tensor for the FP32 `Conv2D` layer. The TensorFlow Lite for Microcontrollers interpreter must create a temporary FP32 copy of the INT8 input tensor *before* it can execute the operation. At that moment, both the original INT8 tensor and the new, 4x larger FP32 tensor are simultaneously live in the Tensor Arena. This transient spike, not the final output size, is what exhausts the SRAM.
  common_mistake: |
    **The Pitfall:** Focusing only on the final output size or the weights, ignoring the type conversion overhead.
    **The Rationale:** Engineers assume mixed-precision simply means the operation runs in FP32, forgetting that TFLite Micro must dynamically create a temporary float32 copy of the int8 input tensor in SRAM.
    **The Consequence:** The system crashes with an Out-Of-Memory (OOM) error because the transient allocation exceeds the remaining SRAM budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - INT8 Input Tensor: [1, 25, 40, 16].
       - Peak Arena Usage: 72 KB.
    2. **Calculations:**
       - INT8 Input Size: 1 * 25 * 40 * 16 = 16,000 bytes (~16 KB).
       - FP32 Temporary Tensor: 16,000 * 4 bytes = 64,000 bytes (~64 KB).
       - Simultaneous Memory Usage: 16 KB + 64 KB = 80 KB.
       - Peak Arena Usage Spike: 72 KB + 64 KB = 136 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound** (The 64KB transient de-quantization buffer pushes the peak memory to 136KB, exhausting the available Tensor Arena allocated for initialization).
  options:
  - The FP32 layer's weights are 4x larger, and the 256KB of SRAM is not enough to hold them during inference.
  - The model's total activation memory now exceeds 256KB because one layer uses FP32 precision.
  - The de-quantization step requires a temporary 64KB FP32 tensor to be created while the 16KB INT8 input tensor is still in memory, causing an 80KB transient spike.
  - The FP32 operation causes memory fragmentation in the Tensor Arena, preventing a large enough contiguous block from being allocated.
  correct_index: 2
