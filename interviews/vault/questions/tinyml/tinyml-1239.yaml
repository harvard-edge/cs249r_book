title: Zero-Copy DMA Pipeline for Ethos-U55
scenario: You are deploying a 60 FPS visual wake-word model on an ARM Cortex-M7 + Ethos-U55 platform. The camera sensor outputs 256x256 INT8 grayscale frames over a DCMI interface. The system has exactly 512 KB of shared SRAM, and the Ethos-U55 shares this SRAM with the 480 MHz M7 core.
question: How should Corstone-300 use zero-copy camera DMA buffers for 60 FPS visual wake-word inference without bus contention?
details:
  realistic_solution: The optimal approach utilizes a zero-copy ping-pong DMA configuration directly mapped to the NPU's input tensor addresses. The camera DMA writes sequentially into two pre-allocated SRAM buffers. On a DMA transfer complete interrupt, the M7 wakes up, updates the Ethos-U55 input pointer to the freshly filled buffer, triggers the inference, and immediately goes back to sleep. Weights remain in XIP Flash and are fetched dynamically via the Ethos-U55's dedicated AXI interface. This leaves the majority of the 512 KB SRAM available strictly for NPU activations and output buffers.
  common_mistake: |
    **The Pitfall:** Explicit CPU-driven memory copies.
    **The Rationale:** Candidates fall back to standard sequential programming practices, explicitly mapping an input buffer and an NPU buffer, then moving data via `memcpy`.
    **The Consequence:** This doubles the memory footprint, burns M7 cycles, and wastes power, while also frequently overlooking that weights must remain in external flash to preserve SRAM.
  napkin_math: |
    - Input frame: 256 x 256 INT8 = 64 KB.
    - Ping-pong buffers: 64 KB * 2 = 128 KB SRAM.
    - Remaining SRAM for activations: 512 - 128 = 384 KB.
    - 60 FPS frame time = 16.6 ms.
    - Required DMA bandwidth = 64 KB / 16.6 ms = 3.85 MB/s.
    - 64-bit SRAM bus at 480 MHz = 3.84 GB/s theoretical peak.
    - **DMA consumes 3.85 MB/s / 3840 MB/s = ~0.1% bus bandwidth (zero contention).**
