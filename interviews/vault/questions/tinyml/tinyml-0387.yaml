title: The Microcontroller Roofline Dilemma
scenario: You are profiling a keyword-spotting model on a Cortex-M4 microcontroller. The profiler shows the most critical layer performs **40,000 floating-point operations (FLOPs)** and reads/writes a total of **20 kilobytes (KB)** of data from SRAM per inference. The Cortex-M4 has a peak compute of **336 MFLOPS** and an SRAM bandwidth of **1.2 GB/s**.
question: What is the layer's arithmetic intensity, and does it make the Cortex-M4 execution compute-bound or memory-bound?
details:
  realistic_solution: |
    The layer is **compute-bound**.
    1. **Convert Data to Bytes:** 20 KB * 1024 bytes/KB = 20,480 bytes
    2. **Calculate Arithmetic Intensity (AI):** AI = FLOPs / Bytes = 40,000 / 20,480 ≈ **1.95 Ops/Byte**
    3. **Calculate Ridge Point:** Ridge Point = Peak Compute / Memory BW = 336 × 10^6 / 1.2 × 10^9 = **0.28 Ops/Byte**
    4. **Compare:** AI (1.95) > Ridge Point (0.28) → The layer is **compute-bound**.
    5. **Attainable Performance:** Since it is compute-bound, performance is capped at 336 MFLOPS regardless of how much data is accessed. Optimization should focus on reducing FLOPs (e.g., pruning, quantization, depthwise separable convolutions) rather than improving memory access patterns.
  common_mistake: |
    **The Pitfall:** Guessing the bottleneck without performing the roofline calculation.
    **The Rationale:** Engineers often rely on intuition (e.g., "microcontrollers are slow, so it must be compute-bound") or invert the Arithmetic Intensity formula (calculating Bytes/FLOP instead of FLOPs/Byte).
    **The Consequence:** Failing to compare the workload's AI to the hardware's ridge point leads to an incorrect conclusion and misdirected optimization efforts.
  napkin_math: |
    1. Convert Data to Bytes: 20 KB * 1024 bytes/KB = 20,480 bytes.
    2. Calculate Arithmetic Intensity: 40,000 FLOPs / 20,480 bytes ≈ 1.95 Ops/Byte.
    3. Calculate Ridge Point: 336 MFLOPS / 1.2 GB/s = 0.28 Ops/Byte.
    4. Verdict: 1.95 >> 0.28 → **compute-bound**.
    5. Inference time estimate: 40,000 / (336 × 10^6) ≈ **0.12 ms** (compute-limited, not memory-limited).
  options:
  - Memory-bound. The Bytes/FLOP ratio is ~0.51, indicating a memory bottleneck.
  - Memory-bound. An arithmetic intensity of ~1.95 is high, so it needs a lot of data, saturating the memory bus.
  - Compute-bound. The layer's arithmetic intensity (~1.95 FLOPs/Byte) is greater than the Cortex-M4's ridge point (~0.28 FLOPs/Byte).
  - Compute-bound. 336 MFLOPS is always the bottleneck on a microcontroller, regardless of data movement.
  correct_index: 2
