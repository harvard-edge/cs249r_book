title: MCU-Based Edge AI Gateway
scenario: You're designing an edge AI gateway for a smart building that aggregates data from 50 BLE sensors and runs local ML models. The gateway must be ultra-low-cost ($15 BOM) and run on an ESP32-S3 (dual-core Xtensa LX7 at 240 MHz, 512 KB SRAM, 8 MB PSRAM, WiFi + BLE). The gateway must maintain BLE connections to 50 sensors, run 3 ML models, and serve a local dashboard via HTTP.
question: Can the ESP32-S3 handle this workload, and what are the critical system bottlenecks?
details:
  realistic_solution: 'Yes, the ESP32-S3 handles this comfortably. Partition: Core 0 runs the BLE stack scanning 50 sensors at 1 adv/s (0.5% utilization). Core 1 runs ML models every 5 minutes (0.0002% utilization) and serves HTTP. Total system utilization is under 6%. The critical bottleneck is PSRAM latency: at ~10 MB/s effective (SPI bus), any data structure placed in PSRAM incurs 24x latency vs internal SRAM. Keep BLE connection tables and model weights in internal 512KB SRAM; use PSRAM only for HTTP buffers and logging. Power: ~0.7W average, costing $0.73/year.'
  common_mistake: |
    **The Pitfall:** Assuming the 8 MB PSRAM operates at full CPU speed.
    **The Rationale:** Developers see "8 MB RAM" and dual cores and assume the chip can handle arbitrary memory-heavy workloads.
    **The Consequence:** Placing critical data structures (like the BLE connection tables) in PSRAM, leading to massive latency penalties (24x slower via SPI) and system crashes.
  napkin_math: |
    - **BLE Overhead:** 50 sensors * 1 adv/s = 50 packets/s. At 0.1ms per packet = 5ms/s (0.5% Core 0 utilization).
    - **ML Overhead:** 0.6ms inference every 300s = 0.0002% Core 1 utilization.
    - **Average Current:** 0.1 (WiFi) * 240 mA + 0.9 (BLE) * 130 mA = 141 mA.
    - **Power:** 141 mA * 5V = ~0.7W.
    - **Annual Cost:** 0.7W * 8,760h = 6.13 kWh * $0.12/kWh = $0.74/year.
    - **Conclusion:** **The ESP32-S3 easily handles the compute load (<6% total utilization), but memory architecture (PSRAM latency) is the bottleneck.**
