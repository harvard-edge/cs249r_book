title: Tinyml New 0024
scenario: A TinyML model monitoring an industrial machine uses temperature data to predict failures. It works well initially, but after 3 months, it outputs continuous false positives.
question: What long-term sensor drift causes the industrial temperature model to output continuous false positives?
details:
  realistic_solution: The root cause is sensor concept drift combined with seasonal ambient changes. The model was likely trained on data where 'normal' was around 20°C. As summer approaches, the ambient baseline rises to 30°C. The absolute temperature triggers the anomaly threshold. The solution is to preprocess the sensor data using a rolling average, feeding the model only the *delta* (rate of change).
  common_mistake: |
    **The Pitfall:** Feeding absolute environmental sensor values directly into the model.
    **The Rationale:** Failing to account for long-term ambient baseline shifts, such as seasonal temperature changes.
    **The Consequence:** The model misinterprets normal seasonal changes as anomalous events, leading to a useless flood of false positives.
  napkin_math: |
    1. **Baseline shift:** Summer ambient temperature rises by +10°C.
    2. **Absolute Threshold:** If anomaly threshold is T > 28°C, a 30°C summer day yields a 100% failure rate prediction.
    3. **Solution:** Use a Delta T preprocess: (Current T - 1hr_Avg T). This ignores the slow ambient shift and focuses only on rapid machine heating.
