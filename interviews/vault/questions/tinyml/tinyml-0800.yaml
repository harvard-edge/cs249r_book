title: Tinyml New 0024
scenario: A TinyML model monitoring an industrial machine uses temperature data to predict failures. It works well initially, but after 3 months, it outputs continuous false positives.
question: What long-term sensor drift causes the industrial temperature model to output continuous false positives?
details:
  realistic_solution: "The root cause is sensor concept drift combined with seasonal ambient changes. The model was likely trained on data where 'normal' was around 20°C. As summer approaches, the ambient baseline rises to 30°C. The solution is to preprocess the sensor data using a rolling average, feeding the model only the rate of change."
  common_mistake: |
    **The Pitfall:** Feeding absolute environmental sensor values directly into the model.
    **The Rationale:** Failing to account for long-term ambient baseline shifts, such as seasonal temperature changes.
    **The Consequence:** The model misinterprets normal seasonal changes as anomalous events, leading to a useless flood of false positives.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline ambient shift: +10°C in summer.
    - Anomaly threshold: T > 28°C.

    **Calculations:**
    - Summer ambient (30°C) > Threshold (28°C) -> 100% false positive rate.

    **Conclusion & Interpretation:**
    - **Result: Data-Bound (Absolute threshold logic fails; delta preprocessing is required).**
