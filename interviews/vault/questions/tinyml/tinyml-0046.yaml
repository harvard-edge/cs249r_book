title: The Energy-Neutral Wildlife Camera
scenario: You're designing a remote wildlife camera using a Cortex-M4. It's powered by a small solar panel that provides an average of 1 mW of power. The device has two states: 'active' (running inference, consuming 50 mW) and 'deep sleep' (consuming 10 µW). To remain energy-neutral, the device's average power consumption over its duty cycle must not exceed the 1 mW provided by the panel.
question: What is the maximum active time per 60-second cycle for a 1 mW solar-powered Cortex-M4 camera to remain energy-neutral?
details:
  realistic_solution: 'Average power = weighted sum of active and sleep power over one duty cycle. P_avg = (P_active * t_active + P_sleep * t_sleep) / (t_active + t_sleep). For sustainability: P_avg must be <= P_solar. If P_active = 50 mW, P_sleep = 0.01 mW, and P_solar = 1 mW over a 60s period: 1 = (50 * t_active + 0.01 * (60 - t_active)) / 60. Solving for t_active yields 59.4 = 49.99 * t_active, so t_active = 1.188 seconds. The solar panel must supply at least 1 mW average.'
  common_mistake: |
    **The Pitfall:** Ignoring the power consumed during deep sleep.
    **The Rationale:** Treating sleep power as zero because it is so much smaller than active power (1/5000th).
    **The Consequence:** Overestimating the available active time, which slowly but inevitably drains the battery over millions of cycles.
  napkin_math: |
    1. **Define Average Power Equation:** P_avg = (P_active * t_active + P_sleep * t_sleep) / 60
    2. **Given:** P_avg = 1 mW, P_active = 50 mW, P_sleep = 0.01 mW, t_sleep = 60 - t_active.
    3. **Substitute:** 1 = (50 * t_active + 0.01 * (60 - t_active)) / 60
    4. **Solve:** 60 = 50 * t_active + 0.6 - 0.01 * t_active
    5. **Simplify:** 59.4 = 49.99 * t_active
    6. **Result:** t_active = 59.4 / 49.99 = **1.188 seconds**.
  options:
  - 1.20 seconds
  - ~58.81 seconds
  - ~1.19 seconds
  - 0.012 seconds
  correct_index: 2
