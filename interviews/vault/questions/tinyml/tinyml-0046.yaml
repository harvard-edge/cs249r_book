title: The Energy-Neutral Wildlife Camera
scenario: 'You''re designing a remote wildlife camera using a Cortex-M4. It''s powered by a small solar
  panel that provides an average of 1 mW of power. The device has two states: ''active'' (running inference,
  consuming 50 mW) and ''deep sleep'' (consuming 10 µW). To remain energy-neutral, the device''s average
  power consumption over its duty cycle must not exceed the 1 mW provided by the panel. For a 60-second
  cycle period, calculate the maximum time the camera can be in the ''active'' state.'
question: "What is the maximum active time per 60-second cycle for a 1 mW solar-powered Cortex-M4 camera to remain energy-neutral?"
details:
  realistic_solution: 'Average power = weighted sum of active and sleep power over one duty cycle. P_avg
    = (P_active * t_active + P_sleep * t_sleep) / (t_active + t_sleep). For sustainability: P_avg must
    be <= P_solar. If P_active = 50 mW, P_sleep = 0.01 mW, and P_solar = 1 mW over a 60s period: 1 = (50
    * t_active + 0.01 * (60 - t_active)) / 60. Solving for t_active yields 59.4 = 49.99 * t_active, so
    t_active = 1.188 seconds. The solar panel must supply at least 1 mW average.'
  common_mistake: A common mistake is to ignore the power consumed during deep sleep. While it's very
    small (10µW is 1/5000th of the active power), it is not zero. In a tight power budget over millions
    of cycles, this small, constant drain matters. Ignoring it leads to a slight overestimation of the
    available active time, which can cause battery drain over the long term.
  napkin_math: "1. **Define the average power equation:**\n   - P_avg = (P_active × t_active + P_sleep\
    \ × t_sleep) / T\n   - Where T = 60 s, t_sleep = T - t_active = 60 - t_active\n2. **Set P_avg = 1\
    \ mW (solar panel output) and solve:**\n   - 1 mW = (50 mW × t_active + 0.01 mW × (60 - t_active))\
    \ / 60\n   - 60 = 50 × t_active + 0.01 × (60 - t_active)\n   - 60 = 50 × t_active + 0.6 - 0.01 × t_active\n\
    \   - 59.4 = 49.99 × t_active\n   - t_active = 59.4 / 49.99 = **1.188 seconds**\n3. **Duty cycle:**\
    \ 1.188 / 60 = **1.98%**\n\nThe camera can be active for at most **~1.19 seconds** per 60-second cycle\
    \ to remain energy-neutral with the 1 mW solar panel. This gives a duty cycle of approximately 2%.\
    \ If we had ignored the sleep power (0.01 mW), we would get t_active = 60 / 50 = 1.2 s — only slightly\
    \ different here because P_sleep << P_active, but the rigorous approach matters when sleep power is\
    \ higher or budgets are tighter."
  options:
  - 1.20 seconds
  - ~58.81 seconds
  - ~1.19 seconds
  - 0.012 seconds
  correct_index: 2
