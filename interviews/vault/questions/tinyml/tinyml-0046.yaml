title: The Energy-Neutral Wildlife Camera
scenario: 'You''re designing a remote wildlife camera using a microcontroller. It''s powered by a small solar panel that provides an average of 1 mW of power. The device has two states: ''active'' (running inference, consuming 50 mW) and ''deep sleep'' (consuming 10 µW). To remain energy-neutral, the device''s average power consumption over its duty cycle must not exceed the 1 mW provided by the panel.'
question: What is the maximum active time per 60-second cycle for a 1 mW solar-powered camera to remain energy-neutral?
details:
  realistic_solution: "Average power is the weighted sum of active and sleep power. For sustainability, P_avg must be <= P_solar. Solving for t_active yields 1.188 seconds."
  common_mistake: |
    **The Pitfall:** Ignoring the power consumed during deep sleep.
    **The Rationale:** Treating sleep power as zero because it is so much smaller than active power (1/5000th).
    **The Consequence:** Overestimating the available active time, which slowly but inevitably drains the battery over millions of cycles.
  napkin_math: |
    **Assumptions & Constraints:**
    - P_avg constraint: 1 mW.
    - P_active: 50 mW.
    - P_sleep: 0.01 mW.
    - Total period: 60 s.

    **Calculations:**
    - 1 = (50 * t_active + 0.01 * (60 - t_active)) / 60
    - 60 = 50 * t_active + 0.6 - 0.01 * t_active
    - 59.4 = 49.99 * t_active
    - t_active = 59.4 / 49.99 = 1.188 seconds.

    **Conclusion & Interpretation:**
    - **Result: Energy-Bound (t_active must be < 1.188 seconds).**
  options:
  - 1.20 seconds
  - ~58.81 seconds
  - ~1.19 seconds
  - 0.012 seconds
  correct_index: 2
