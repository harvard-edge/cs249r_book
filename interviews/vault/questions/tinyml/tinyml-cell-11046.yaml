title: 'Dataset Curation: Mastery — Cross-Device Dataset Portability for TinyML Fleet'
scenario: 'You are deploying keyword spotting models across a heterogeneous fleet: 50% Cortex-M4 (168MHz,
  256KB SRAM), 30% ESP32-S3 (168MHz, 512KB SRAM), 20% Cortex-M7+Ethos-U55 (480MHz NPU). Each device class
  needs a different model size. Design a single data curation pipeline that produces training data suitable
  for all three model variants.'
details:
  realistic_solution: 'One canonical dataset in float32 MFCC. Train a ''teacher'' model (large, cloud-side).
    Distill to three student sizes: M4-tiny (5KB), ESP32-medium (15KB), M7-large (50KB). Same dataset,
    same labels, three student targets.'
  common_mistake: 'Training separate models from separate datasets for each device — inconsistent quality
    and labels across fleet. Better: one canonical dataset, three derived models via knowledge distillation.'
  napkin_math: 'Dataset: 120K samples × 40-dim × 99 frames × float32 = 1.9GB canonical. Teacher: ResNet-8
    (8K params), trained on cloud H100 in 5 minutes. Students via KD: M4-tiny: 5,000 params × 4 epochs
    = 480K forward passes × 39.6KB = 7.9GB compute → 0.8 seconds on H100. ESP32-medium: 15,000 params,
    same. M7-large: 50,000 params. Int8 quantize for M4/ESP32, int8 via Ethos-U55 NPU tools for M7. Accuracy:
    teacher 95%, M4-tiny 89%, ESP32-medium 92%, M7-large 94%. Accuracy gap vs separate training: < 0.5%
    (shared canonical data is sufficient). Data curation cost: one pipeline instead of three = 3× reduction
    in labeling and QA cost.'
