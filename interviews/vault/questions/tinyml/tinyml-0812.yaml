title: Tinyml New 0037
scenario: A custom C struct is used to pack INT8 model weights and metadata. When compiled and run on the Cortex-M4, reading the 32-bit metadata variable immediately triggers a UsageFault (HardFault).
question: Why does reading the 32-bit metadata field in the packed Cortex-M4 struct trigger a HardFault, and how should it be fixed?
details:
  realistic_solution: The HardFault is caused by unaligned memory access. The struct naturally packed a 1-byte char followed by a 4-byte int, placing the int on an address not divisible by 4. The ARM Cortex-M4 strict alignment checks (if enabled, e.g., UNALIGN_TRP) will trigger a UsageFault on an LDR instruction to an unaligned address. Fix by explicitly padding the struct or using `__attribute__((aligned(4)))`.
  common_mistake: |
    **The Pitfall:** Ignoring ARM's memory alignment requirements.
    **The Rationale:** Candidates pack structs to save SRAM bytes without understanding that Cortex-M hardware requires strict word-alignment for 32-bit loads.
    **The Consequence:** The hardware raises a fault exception, crashing the system immediately upon metadata access.
  napkin_math: |
    - Consider `Struct { char a; int32 b; }`.
    - `a` is placed at an address like `0x20000000`.
    - `b` is placed immediately after at `0x20000001`.
    - A 32-bit load (`LDR`) from `0x20000001` is unaligned (not a multiple of 4).
    - **Hardware throws a fault.**
