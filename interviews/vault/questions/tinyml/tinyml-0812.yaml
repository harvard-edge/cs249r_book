title: Tinyml New 0037
scenario: A custom C struct is used to pack INT8 model weights and metadata. When compiled and executed on the Cortex-M4, reading the 32-bit metadata variable immediately triggers a UsageFault (HardFault).
question: Why does reading the 32-bit metadata field in the packed C struct trigger a HardFault on the Cortex-M4, and how can it be resolved?
details:
  realistic_solution: The UsageFault is generated by unaligned memory access. The packed struct places a 1-byte char immediately before a 4-byte int, misaligning the int to an address not cleanly divisible by 4. The ARM Cortex-M4 enforces strict word-alignment for 32-bit memory loads (`LDR`). The issue is resolved by removing the packed attribute, manually padding the struct with dummy bytes, or utilizing `__attribute__((aligned(4)))`.
  common_mistake: |
    **The Pitfall:** Ignoring the ARM architecture's strict memory alignment constraints.
    **The Rationale:** Candidates blindly pack C structs to squeeze out a few extra bytes of SRAM, porting code from x86 where hardware silently handles unaligned accesses.
    **The Consequence:** The Cortex-M hardware throws a UsageFault exception upon executing an unaligned 32-bit `LDR` instruction, instantly crashing the firmware.
  napkin_math: |
    1. **Assumptions & Constraints**:
       - C struct: `{ char a; int32_t b; }` mapped into SRAM.
       - Cortex-M4 `LDR` instruction requires 4-byte alignment.
    2. **Calculations**:
       - Base address of struct = `0x20000000`.
       - Address of `char a` = `0x20000000` (1 byte).
       - Address of `int32_t b` = `0x20000001` (not a multiple of 4).
    3. **Conclusion & Interpretation**:
       - **Result: Memory-Bound Fault**. A 32-bit load from `0x20000001` violates hardware alignment rules, resulting in an immediate CPU exception.
