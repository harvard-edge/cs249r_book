title: ESP32-S3 PSRAM Bandwidth Compute Bottleneck
scenario: You deployed an INT8 quantized predictive maintenance model on an ESP32-S3 microcontroller.
  The model requires 12 million MAC operations per inference. Based on the 240 MHz dual-core Xtensa processor
  with INT8 vector extensions, you estimated an inference time of around 25ms. However, device profiling
  shows inference takes over 90ms. The compiled model footprint is 1.2 MB. Given the ESP32-S3 features
  512 KB internal SRAM and 8 MB external PSRAM, what hardware constraint is causing your compute estimation
  to be inaccurate, and how do you diagnose the root cause?
question: "Given the ESP32-S3 features 512 KB internal SRAM and 8 MB external PSRAM, what hardware constraint is causing your compute estimation to be inaccurate, and how do you diagnose the root cause?"
details:
  realistic_solution: The root cause is memory bandwidth starvation. Because the 1.2 MB model exceeds
    the 512 KB internal SRAM, the model weights and activations are allocated in the 8 MB external PSRAM.
    The fast 240 MHz Xtensa cores with INT8 vector extensions are spending the majority of their cycles
    stalled, waiting for data to be fetched from the slower PSRAM. The diagnostic fix is to profile CPU
    cache misses and refactor the system to pin critical hot-path weights into the internal SRAM, or compress
    the model to fit entirely under the 512 KB limit.
  common_mistake: Candidates often assume memory is uniform and base compute cost solely on CPU frequency
    (240 MHz) and MAC operations. They fail to account for the device's memory hierarchy and the severe
    latency penalty of fetching data from external PSRAM over a serial interface.
  napkin_math: 'Compute bound: 12M MACs / (240 MHz * 2 INT8 ops/cycle * 1 core utilized) = ~25ms theoretical
    compute time. Memory bound: Fetching 1.2 MB from 80 MHz octal-SPI PSRAM takes at least 1.2MB / (80M
    bytes/sec) = 15ms ideal continuous transfer. However, non-sequential memory accesses and cache thrashing
    during convolution degrade throughput to ~15 MB/s. 1.2 MB / 15 MB/s = 80ms memory latency. Total time
    ≈ 25ms compute + 80ms stalls (with partial overlap), resulting in the observed 90ms+ inference time.'
