title: 'TinyML Model Deployment on ARM Cortex-M4: Memory Constraints'
scenario: 'You are tasked with deploying a convolutional neural network (CNN) for keyword spotting on an ARM Cortex-M4 STM32F4 microcontroller. This device has a clock speed of 168 MHz, 256 KB of SRAM, and notably, no Floating-Point Unit (FPU). The proposed CNN architecture uses 8-bit integer quantization (INT8) for activations and weights.'
question: 'How should you estimate weights, activations, buffers, and bottlenecks for a 100K-parameter INT8 CNN on an STM32F4?'
details:
  realistic_solution: 'Utilize a memory budgeting approach, breaking down the total SRAM into sections for model weights, input/output buffers, and intermediate activation maps. Employ in-place operations or carefully design the network to reuse memory buffers between layers via TFLite Micro''s memory planner. Quantize the model (e.g., INT8) to minimize weight storage. For a device without an FPU, ensure that all operations are compatible with integer arithmetic, either by using integer-only quantized models or by implementing optimized fixed-point routines, which may add to code size but save significant runtime memory and avoid costly software floating-point emulation.'
  common_mistake: |
    **The Pitfall:** Overlooking the memory required for intermediate activation buffers or assuming floating-point arithmetic is freely available.
    **The Rationale:** Candidates focus solely on the static weight parameter count and ignore dynamic runtime memory overhead and architectural FPU constraints.
    **The Consequence:** The model suffers an out-of-memory (OOM) hard fault at runtime, or runs extremely slowly due to software floating-point emulation.
  napkin_math: |
    1. **Assumptions & Constraints:** 100,000 INT8 parameters. STM32F4 with 256 KB SRAM and no FPU. Largest intermediate activation map is 64x64x32 (INT8).
    2. **Calculations:**
       - Weights memory: 100,000 bytes = ~97.6 KB.
       - Activations (peak): 64 * 64 * 32 * 1 byte = 131,072 bytes = 128 KB.
       - System overhead (Code, stack, heap, RTOS): ~50 KB.
       - Total estimated memory: 97.6 KB + 128 KB + 50 KB = 275.6 KB.
    3. **Conclusion & Interpretation:** **Total memory needed is ~275.6 KB, which exceeds the 256 KB SRAM.** Result: Memory-Bound. Tiling or in-place operations are required.
