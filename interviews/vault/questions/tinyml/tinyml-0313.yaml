title: The Energy Cost of Precision (tinyml-0313)
scenario: You are profiling a keyword spotting model on a Cortex-M4 microcontroller. To maximize battery life, you must minimize the energy used per inference.
question: "What is the approximate energy ratio between a single FP16 operation and a single INT8 operation?"
details:
  realistic_solution: A single FP16 operation consumes roughly 5 times more energy than an INT8 operation. The hardware cost is non-linear. The source of truth constants show FP32 is ~18x the energy of INT8, and ~3.4x the energy of FP16.
  common_mistake: |
    **The Pitfall:** Assuming energy savings are linear with bit-width (i.e., 16-bit FP16 is 2x the energy of 8-bit INT8).
    **The Rationale:** Engineers ignore that multiplier energy cost scales non-linearly and that floating-point requires complex exponent logic.
    **The Consequence:** They miscalculate the power budget by underestimating the penalty of floating-point math.
  napkin_math: |
    1. Identify INT8 multiply energy: ~0.2 pJ.
    2. Identify FP16 multiply energy: ~1.1 pJ.
    3. Calculate FP16/INT8 ratio: 1.1 pJ / 0.2 pJ = 5.5x.
    4. **Final Result: FP16 uses ~5x more energy per operation than INT8.**
  options:
  - FP16 uses ~2x more energy
  - FP16 uses ~18x more energy
  - FP16 uses ~5x more energy
  - They use roughly the same amount of energy
