title: The Energy Cost of Precision (tinyml-0313)
scenario: You are profiling a keyword spotting model on a Cortex-M4 microcontroller. To maximize battery
  life, you must minimize the energy used per inference. From a pure compute standpoint, identify the
  approximate energy consumption ratio between a single FP16 operation and a single INT8 operation.
details:
  realistic_solution: A single FP16 operation consumes roughly 5 times more energy than an INT8 operation.
    The hardware cost is non-linear. The source of truth constants show FP32 is ~18x the energy of INT8,
    and ~3.4x the energy of FP16. The ratio between FP16 and INT8 can be derived from this fundamental
    relationship.
  common_mistake: 'Engineers often assume the energy savings are linear with bit-width (i.e., 16-bit FP16
    is 2x the energy of 8-bit INT8). This ignores the physics: the energy cost of a multiplier scales
    non-linearly with bit width, and floating-point requires additional complex circuits (exponent logic)
    that integers do not.'
  napkin_math: 'Energy per op (typical 45nm process): INT8 multiply = ~0.2pJ. FP16 multiply = ~1.1pJ.
    FP32 multiply = ~3.7pJ. Ratio FP16/INT8 = 1.1/0.2 = 5.5x. FP32/INT8 = 3.7/0.2 = 18.5x. FP32/FP16 =
    3.7/1.1 = 3.4x. So FP16 costs ~5x more energy per op than INT8. Switching to INT8 gives ~5x energy
    savings per inference.'
  options:
  - FP16 uses ~2x more energy
  - FP16 uses ~18x more energy
  - FP16 uses ~5x more energy
  - They use roughly the same amount of energy
  correct_index: 2
