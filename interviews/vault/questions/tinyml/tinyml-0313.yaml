title: The Energy Cost of Precision (tinyml-0313)
scenario: You are profiling a keyword spotting model on a microcontroller. To maximize battery life, you must minimize the energy used per inference.
question: "What is the approximate energy ratio between a single FP16 operation and a single INT8 operation?"
details:
  realistic_solution: Hardware multiplier energy logic scales non-linearly with bit-width. FP16 carries massive combinatorial overhead for exponent alignment, mantissa operations, and normalization, consuming ~5x more microjoules per MAC than integer math.
  common_mistake: |
    **The Pitfall:** Assuming energy savings are strictly linear with bit-width (i.e., 16-bit FP16 is exactly 2x the energy of 8-bit INT8).
    **The Rationale:** Engineers ignore physical transistor gate logic complexities required for floating-point exponent manipulation.
    **The Consequence:** They severely miscalculate the power budget, deploying floating-point topologies that kill battery life.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - INT8 multiply physical energy cost: ~0.2 pJ.
       - FP16 multiply physical energy cost: ~1.1 pJ.
    2. **Calculations:**
       - Ratio calculation: 1.1 pJ / 0.2 pJ = 5.5x.
    3. **Conclusion & Interpretation:**
       - **Result: FP16 utilizes ~5x more energy per structural operation than INT8 (Energy-Bound).**
  options:
  - FP16 uses ~2x more energy
  - FP16 uses ~18x more energy
  - FP16 uses ~5x more energy
  - They use roughly the same amount of energy
