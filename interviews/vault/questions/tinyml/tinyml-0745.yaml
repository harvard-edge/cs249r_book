title: The CMSIS-NN Speedup
scenario: Your colleague wrote a naive C implementation of an INT8 matrix multiply for a Cortex-M4. It
  runs in 45 ms. You replace it with the CMSIS-NN equivalent and it drops to 6 ms — a 7.5× speedup. The
  clock speed didn't change. Where did the speedup come from?
details:
  realistic_solution: CMSIS-NN exploits the Cortex-M4's DSP extension — specifically the SIMD (Single
    Instruction, Multiple Data) instructions like `SMLAD` (Signed Multiply Accumulate Dual). `SMLAD` performs
    two 16-bit multiplies and accumulates both results into a 32-bit accumulator in a single cycle. For
    INT8 data, CMSIS-NN packs two INT8 values into a single 16-bit half-word, then uses `SMLAD` to process
    two MACs per cycle instead of one. Combined with loop unrolling, data re-ordering for cache-friendly
    access, and elimination of branch overhead, this yields the 7–8× speedup over naive C. It's the microcontroller
    equivalent of using Tensor Cores on a GPU — you must use the specialized hardware paths or you leave
    most of the silicon idle.
  common_mistake: '"CMSIS-NN uses NEON SIMD instructions." Cortex-M4 does not have NEON — that''s Cortex-A
    series. People confuse the two ARM families.'
  napkin_math: 'Naive C: Load, multiply, accumulate requires multiple instructions, yielding ~4.5 cycles
    per MAC without aggressive optimization. CMSIS-NN with `SMLAD`: performs two 16-bit MACs per cycle.
    With loop unrolling and optimal pipelining, it achieves ~0.6 cycles per MAC. For a [128×64] by [64×128]
    matrix multiply: 128 × 128 × 64 = 1,048,576 MACs. Naive: ~4.5M cycles. CMSIS-NN: ~600K cycles. At
    100 MHz: 45 ms vs 6 ms per matmul.'
  options:
  - CMSIS-NN uses NEON SIMD instructions on the Cortex-M4, processing 4 INT8 values per cycle compared
    to the naive C code's scalar processing.
  - 'CMSIS-NN exploits the M4''s DSP extension — specifically SMLAD (dual 16-bit MAC in 1 cycle). It packs
    two INT8 values per 16-bit half-word, achieving 2 MACs/cycle. Combined with loop unrolling and cache-friendly
    data reordering, effective throughput: ~0.6 cycles/MAC vs naive C''s ~4.5 cycles/MAC. This is the
    MCU equivalent of using Tensor Cores on a GPU — specialized hardware paths that most C code never
    touches.'
  - The speedup comes entirely from compiler auto-vectorization that the CMSIS-NN headers enable via special
    pragma directives, not from any ISA-level instructions.
  - CMSIS-NN achieves 7.5x speedup by moving the matrix multiply computation to the DMA controller, which
    performs the arithmetic while the CPU handles other tasks.
