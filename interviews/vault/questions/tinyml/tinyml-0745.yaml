title: The CMSIS-NN Speedup
scenario: Your colleague wrote a naive C implementation of an INT8 matrix multiply for a Cortex-M4. It runs in 45 ms. You replace it with the CMSIS-NN equivalent and it drops to 6 ms — a 7.5× speedup. The clock speed didn't change.
question: Why does CMSIS-NN cut Cortex-M4 INT8 matrix multiply latency from 45 ms to 6 ms without changing the clock?
details:
  realistic_solution: 'CMSIS-NN exploits the Cortex-M4''s DSP extension — specifically the SIMD instructions like `SMLAD` (Signed Multiply Accumulate Dual). `SMLAD` performs two 16-bit multiplies and accumulates both results into a 32-bit accumulator in a single cycle. For INT8 data, CMSIS-NN packs two INT8 values into a single 16-bit half-word, then uses `SMLAD` to process two MACs per cycle instead of one. Combined with loop unrolling, data re-ordering for cache-friendly access, and elimination of branch overhead, this yields the 7.5× speedup over naive C. It''s the microcontroller equivalent of using Tensor Cores on a GPU.'
  common_mistake: |
    **The Pitfall:** Confusing the ARM Cortex-M4 DSP extensions with Cortex-A NEON SIMD.
    **The Rationale:** Developers assume all ARM speedups are due to NEON, misidentifying the underlying ISA capabilities of MCUs.
    **The Consequence:** They write code aiming for 128-bit vectorization that simply will not compile or run on the Cortex-M4.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - MCU: Cortex-M4 with DSP extensions.
       - Naive C performance: ~4.5 cycles/MAC.
       - CMSIS-NN performance: ~0.6 cycles/MAC (using SMLAD).
       - Workload: ~1,000,000 MACs.
    2. **Calculations:**
       - Naive C cycles: ~1M * 4.5 = 4.5M cycles.
       - CMSIS-NN cycles: ~1M * 0.6 = 600K cycles.
       - Speedup ratio: 4.5 / 0.6 = 7.5x.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** The combination of dual 16-bit MACs (SMLAD) and loop unrolling drops execution from 45 ms to exactly 6 ms.
  options:
  - CMSIS-NN uses NEON SIMD instructions on the Cortex-M4, processing 4 INT8 values per cycle compared to the naive C code's scalar processing.
  - 'CMSIS-NN exploits the M4''s DSP extension — specifically SMLAD (dual 16-bit MAC in 1 cycle). It packs two INT8 values per 16-bit half-word, achieving 2 MACs/cycle. Combined with loop unrolling and cache-friendly data reordering, effective throughput: ~0.6 cycles/MAC vs naive C''s ~4.5 cycles/MAC. This is the MCU equivalent of using Tensor Cores on a GPU — specialized hardware paths that most C code never touches.'
  - The speedup comes entirely from compiler auto-vectorization that the CMSIS-NN headers enable via special pragma directives, not from any ISA-level instructions.
  - CMSIS-NN achieves 7.5x speedup by moving the matrix multiply computation to the DMA controller, which performs the arithmetic while the CPU handles other tasks.
