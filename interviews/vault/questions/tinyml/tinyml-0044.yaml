title: The Battery-Powered Birdwatcher
scenario: You're designing a battery-powered wildlife camera using a Cortex-M4 microcontroller. In its active state (running a 1-second inference), it consumes 50 mW. In deep sleep, it consumes 10 µW. The device is expected to wake up on average 6 times per hour. Your power source is an 888 mWh battery.
question: How many days will an 888 mWh battery last when a Cortex-M4 wildlife camera wakes 6 times per hour for 1 s?
details:
  realistic_solution: The solution requires calculating the weighted average power consumption based on the duty cycle. The device is active for 6 seconds per hour and in sleep for the remaining 3594 seconds. This average power is then used to determine how long the 888 mWh battery will last.
  common_mistake: |
    **The Pitfall:** Ignoring sleep power or miscalculating units (mW vs µW).
    **The Rationale:** Candidates assume sleep power is negligible or mix up milli and micro prefixes during calculation.
    **The Consequence:** Overestimating battery life or drastically underestimating it by orders of magnitude.
  napkin_math: |
    - **Active Time:** 6 times/hour * 1 s = 6 s/hour.
    - **Sleep Time:** 3600 s - 6 s = 3594 s/hour.
    - **Active Energy/hour:** 50 mW * 6 s = 300 mJ = 0.0833 mWh.
    - **Sleep Energy/hour:** 0.01 mW * 3594 s = 35.94 mJ = 0.00998 mWh.
    - **Total Energy/hour:** 0.0833 + 0.00998 = 0.0933 mWh.
    - **Average Power:** 0.0933 mWh / 1 hr = 0.0933 mW (~93.3 µW).
    - **Battery Life:** 888 mWh / 0.0933 mW = 9,518 hours = **~397 days**.
  options:
  - ~18 hours
  - ~4 days
  - ~397 days
  - ~444 days
  correct_index: 2
