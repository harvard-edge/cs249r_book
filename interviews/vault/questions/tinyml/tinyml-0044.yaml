title: The Battery-Powered Birdwatcher
scenario: You're designing a battery-powered wildlife camera using a Cortex-M4 microcontroller. In its
  active state (running a 1-second inference), it consumes 50 mW. In deep sleep, it consumes 10 µW. The
  device is expected to wake up on average 6 times per hour. Your power source is an 888 mWh battery.
  Calculate the device's approximate battery life in days.
question: "How many days will an 888 mWh battery last when a Cortex-M4 wildlife camera wakes 6 times per hour for 1 s?"
details:
  realistic_solution: The solution requires calculating the weighted average power consumption based on
    the duty cycle. The device is active for 6 seconds per hour and in sleep for the remaining 3594 seconds.
    This average power is then used to determine how long the 888 mWh battery will last.
  common_mistake: The most common mistake is to either ignore the sleep power, assuming it's negligible,
    or to miscalculate the average power by mixing units (mW vs µW). Ignoring sleep power overestimates
    the battery life, while the unit error drastically underestimates it by orders of magnitude.
  napkin_math: '1. Calculate time in each state per hour (3600s)

    - Wakes 6 times/hour × 1 s active = 6 s active/hour.

    - Sleep time: 3600 - 6 = 3594 s/hour.


    2. Energy per hour

    - E_active = 50 mW × 6 s = 300 mJ = 0.0833 mWh.

    - E_sleep = 0.01 mW × 3594 s = 35.94 mJ = 0.00998 mWh.

    - E_total/hour = 0.0833 + 0.00998 = 0.0933 mWh.


    3. Average power

    - P_avg = 0.0933 mWh / 1 hr = 0.0933 mW ≈ 93.3 µW.


    4. Battery life

    - Battery: 888 mWh.

    - Life = 888 / 0.0933 = 9,518 hours = 397 days ≈ 13 months.'
  options:
  - ~18 hours
  - ~4 days
  - ~397 days
  - ~444 days
  correct_index: 2
