title: TinyML Guardrails for Safety-Critical Systems on nRF5340
scenario: You are tasked with deploying a critical tinyML anomaly detection model. Red-teaming highlighted potential false negatives.
question: What estimated resources would a heuristic guardrail consume, and what metrics must be added to the model card?
details:
  realistic_solution: A simple, heuristic-based guardrail could check for out-of-range sensor values, sudden deviations exceeding a configurable threshold, or prolonged periods of 'normal' behavior if anomalies are expected to be rare. This guardrail would be implemented with minimal code and data structures. The model card should explicitly detail the guardrail's logic, its resource footprint, activation frequency, false positive/negative rates of the guardrail itself, and any safety integrity levels (SIL) it contributes to.
  common_mistake: |
    **The Pitfall:** Proposing overly complex secondary neural networks as guardrails.
    **The Rationale:** Overlooking the severe resource constraints of the MCU and failing to utilize deterministic, low-cost heuristics for safety bounds.
    **The Consequence:** Running out of SRAM or missing inference deadlines, reducing the overall safety and stability of the system.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total SRAM: 256 KB.
    - Total Flash: 1024 KB.
    - CPU Limit: 128 MHz (50% used = 64 MHz available).
    - Primary Model Footprint: 150 KB SRAM, 500 KB Flash.

    **Calculations:**
    - Remaining SRAM: 256 KB - 150 KB = 106 KB.
    - Remaining Flash: 1024 KB - 500 KB = 524 KB.
    - Guardrail Footprint Estimate: ~5-10 KB SRAM, ~10-20 KB Flash, 3-6 MHz CPU.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound.** The device has ample remaining resources to host a robust deterministic safety layer using heuristics rather than a second neural network.
