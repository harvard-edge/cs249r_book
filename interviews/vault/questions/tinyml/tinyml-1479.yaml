title: TinyML Guardrails for Safety-Critical Systems on nRF5340
scenario: You are tasked with deploying a critical tinyML anomaly detection model
  on a Nordic nRF5340 microcontroller (128 MHz CPU, 256 KB SRAM, 1 MB flash). This
  model monitors sensitive industrial machinery. Due to safety concerns, your red-teaming
  exercise highlighted potential false negatives. You propose implementing an on-device
  'guardrail' system. Considering the nRF5340's resources, if your primary anomaly
  detection model already consumes 150KB of SRAM and 500KB of flash, and requires
  50% of the CPU cycles, what kind of guardrail could you implement, and what would
  be the estimated *additional* SRAM, flash, and CPU cycle consumption for a simple,
  heuristic-based guardrail? What essential metrics related to this guardrail would
  you mandate for inclusion in the model card to ensure organizational accountability
  and support impact assessments?
question: What essential metrics related to this guardrail would you mandate for inclusion
  in the model card to ensure organizational accountability and support impact assessments?
details:
  realistic_solution: A simple, heuristic-based guardrail could check for out-of-range
    sensor values, sudden deviations exceeding a configurable threshold, or prolonged
    periods of 'normal' behavior if anomalies are expected to be rare. This guardrail
    would be implemented with minimal code and data structures. The model card should
    explicitly detail the guardrail's logic, its resource footprint, activation frequency,
    false positive/negative rates of the guardrail itself, and any safety integrity
    levels (SIL) it contributes to.
  common_mistake: Overlooking the severe resource constraints of the nRF5340, proposing
    overly complex guardrails (e.g., a secondary neural network) that would exceed
    available SRAM/flash or CPU cycles. Another common mistake is failing to define
    specific, measurable guardrail performance metrics for the model card, thereby
    hindering accountability and impact assessments.
  napkin_math: 'Remaining resources before guardrail: SRAM (256KB - 150KB = 106KB),
    Flash (1MB - 500KB = 500KB), CPU (128 MHz * 50% = 64 MHz equivalent). A simple
    heuristic guardrail might consume an additional ~5-10KB SRAM (for thresholds,
    state variables, small buffers), ~10-20KB Flash (for its code), and ~5-10% of
    the remaining CPU cycles (e.g., 3-6 MHz equivalent), depending on the complexity
    and frequency of checks. This leaves sufficient room for other system tasks while
    providing a basic safety layer within the nRF5340''s capabilities.'
