title: 'Roofline Analysis for TinyML: Cortex-M7 + Ethos-U55 Performance Evaluation'
scenario: You are tasked with deploying a convolutional neural network (CNN) for keyword spotting on an
  embedded platform featuring a Cortex-M7 processor (480 MHz) and an Ethos-U55 NPU (configurable from
  128 to 512 MACs/cycle), with 512 KB of SRAM. The CNN involves a series of 3x3 convolutions followed
  by pooling layers. Describe how you would use the Roofline Model to analyze whether this workload is
  compute-bound or memory-bound on this specific hardware configuration. Furthermore, explain how you
  would predict the Ethos-U55 utilization and identify potential bottlenecks.
question: "How should roofline analysis predict whether a Cortex-M7 plus Ethos-U55 CNN workload is compute-bound or memory-bound?"
details:
  realistic_solution: 'A realistic solution involves: 1. Calculating the peak operational performance
    (TOPs/s) for the Ethos-U55 based on its configurable MAC/cycle (e.g., 512 MACs/cycle * 480 MHz). 2.
    Determining the effective memory bandwidth of the 512 KB SRAM. 3. Plotting these as horizontal (peak
    performance) and inclined (memory bandwidth) lines on a log-log graph. 4. For the CNN workload, calculate
    its operational intensity (MACs/byte) by analyzing the memory access patterns and compute requirements
    of each layer, considering data reuse within the 512 KB SRAM. 5. Plot the workload''s operational
    intensity on the roofline graph to determine if it falls under the compute-bound or memory-bound region,
    and estimate the expected performance. This analysis helps in predicting Ethos-U55 utilization by
    comparing achieved performance with its peak capacity and identifying if memory bandwidth or compute
    throughput is the bottleneck.'
  common_mistake: A common mistake is to assume a generic roofline model without properly incorporating
    the memory bandwidth limitations of the embedded system (e.g., SRAM vs. external flash) and the specific
    MAC/cycle capability of the NPU, leading to inaccurate performance predictions. Additionally, neglecting
    the actual data reuse patterns within the 512 KB SRAM can lead to overestimating operational intensity.
  napkin_math: 'Consider a 3x3 convolutional layer with 64 input channels, 64 output channels, and a 16x16
    input feature map, assuming 8-bit integer operations. Total MACs: 3x3x64x64x16x16 = 9,437,184 MACs.
    For memory access, assume input, output feature maps, and weights are read from SRAM. Input size:
    16x16x64 bytes. Weights size: 3x3x64x64 bytes. Output size: 16x16x64 bytes. Total unique memory access
    (simplified, without considering explicit reuse for calculation): (16x16x64) + (3x3x64x64) + (16x16x64)
    = 16384 + 36864 + 16384 = 69632 bytes. Operational Intensity = MACs / Bytes = 9,437,184 / 69,632 ≈
    135.5 MACs/byte. This high operational intensity suggests the workload tends towards compute-bound,
    but the limited 512 KB SRAM and its bandwidth would critically determine the actual achievable performance
    on the Ethos-U55.'
