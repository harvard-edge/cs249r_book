title: TinyML Federated Eligibility Spec
scenario: A TinyML fleet wants to participate in federated updates without draining batteries or blocking real-time sensing. Specify client eligibility rules for a training round.
question: What eligibility rules should decide whether a TinyML device joins a federated update round?
details:
  realistic_solution: 'The spec should require battery level, radio link budget, sensor idle window, flash write headroom, temperature, model version, update size, and safety-critical task status. TinyML parallelism is fleet parallelism: many devices participate only when local constraints allow it.'
  common_mistake: Selecting every online device and causing battery drain or missed real-time sensing deadlines.
  napkin_math: If a device has a 220 mAh coin cell and one update costs 1 mAh, joining daily would consume about 14% of battery per month just for training communication.
