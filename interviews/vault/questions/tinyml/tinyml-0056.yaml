title: BLE Throughput for Model Update
scenario: >
  Your TinyML wearable needs an over-the-air model update via BLE 5.0. The new model is 150 KB (INT8 quantized, stored in external flash). BLE 5.0 supports 2 Mbps PHY with a maximum data throughput of ~1.4 Mbps after protocol overhead. The device has a 100 mAh battery at 3.7V. The BLE radio draws 8 mA during active transmission/reception.
question: >
  How long and how much battery does a 150 KB BLE 5.0 model update cost on a 100 mAh wearable?
details:
  realistic_solution: >
    BLE data transfer is constrained by connection intervals, MTU size, and the number of packets per connection event, resulting in a real-world throughput much lower than the PHY rate. For a 150 KB model, the update combines BLE transfer time with flash erase/write time.
  common_mistake: |
    **The Pitfall:** Calculating "150 KB at 1.4 Mbps = 0.86 seconds. Trivial."
    **The Rationale:** This uses the raw PHY throughput and ignores BLE's connection-oriented protocol overhead, which dramatically reduces effective throughput to around ~65 KB/s.
    **The Consequence:** The team drastically underestimates update latency and the resulting battery drain.
  napkin_math: |
    - **BLE Transfer:** 150 KB at ~65 KB/s effective throughput = 2.3s.
    - **Flash Operations:** Flash erase = 1.9s (38 sectors × 50ms). Flash write = 0.15s. Verify = 0.2s.
    - **Total Time:** 2.3s + 1.9s + 0.15s + 0.2s = 4.55s.
    - **Battery Cost:** 8 mA × 4.55s = 36.4 mA·s = 0.01 mAh.
    - **Battery %:** 0.01 mAh is **0.01%** of the 100 mAh battery.
    - **Conclusion:** For larger models (>1 MB), flash erase dominates. Optimization: send only changed weights (delta update) to reduce transfer to 15-30 KB.
