title: 'TinyML TCO Realization: Manufacturing Cost Scaling for TinyML Product'
scenario: 'Realize the manufacturing cost scaling for a TinyML industrial sensor at volumes of 1K, 10K, and 100K units. BOM+Assembly at 1K: $8 MCU + $4 sensor + $3 PCB + $2 power management + $2 assembly = $19. Component volume discount (MCU, sensor, PM): 10K=10%, 100K=20%. PCB cost scales: 10K=$1.50, 100K=$0.75. Assembly scales: 10K=$1.00, 100K=$0.50. Calculate gross margin at each volume assuming $99 retail price (and 30% distributor margin).'
question: How would you calculate gross margin at each volume assuming $99 retail price?
details:
  realistic_solution: 'Retail: $99. Distributor 30%: manufacturer receives $69.30. 1K volume BOM+Assembly: $19. Gross margin: ($69.30-$19)/$69.30=72.6%. 10K: MCU $7.20 + sensor $3.60 + PCB $1.50 + PM $1.80 + assembly $1.00 = $15.10. Gross margin: ($69.30-$15.10)/$69.30=78.2%. 100K: MCU $6.40 + sensor $3.20 + PCB $0.75 + PM $1.60 + assembly $0.50 = $12.45. Gross margin: ($69.30-$12.45)/$69.30=82.0%. Margin improvement 1K->100K: 9.4pp.'
  common_mistake: 'Applying volume discounts only to the MCU without recognizing that sensors, power management, and assembly also have volume price breaks, understating the margin improvement at scale.'
  napkin_math: 'Retail $99, mfr revenue $69.30. 1K: BOM+Asm=$19. GM=($69.30-$19)/$69.30=72.6%. 10K: MCU$7.20 + sensor$3.60 + PCB$1.50 + PM$1.80 + asm$1.00 = $15.10. GM=($69.30-$15.10)/$69.30=78.2%. 100K: MCU$6.40 + sensor$3.20 + PCB$0.75 + PM$1.60 + asm$0.50 = $12.45. GM=($69.30-$12.45)/$69.30=82.0%. 1K->100K: +9.4pp margin. For 100K units: gross profit=100K*($69.30-$12.45)=$5.685M. Net profit after OpEx (20%rev=100K*$19.80=$1.98M): $5.685M-$1.98M=$3.705M.'
