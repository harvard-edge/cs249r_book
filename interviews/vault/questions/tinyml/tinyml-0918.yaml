title: 'TinyML TCO Realization: Manufacturing Cost Scaling for TinyML Product'
scenario: 'Realize the manufacturing cost scaling for a TinyML industrial sensor at volumes of 1K, 10K, and 100K units. BOM+Assembly at 1K: $8 MCU + $4 sensor + $3 PCB + $2 power management + $2 assembly = $19. Component volume discount (MCU, sensor, PM): 10K=10%, 100K=20%. PCB cost scales: 10K=$1.50, 100K=$0.75. Assembly scales: 10K=$1.00, 100K=$0.50.'
question: 'Calculate gross margin at each volume assuming $99 retail price and a 30% distributor margin.'
details:
  realistic_solution: 'Retail: $99. Distributor 30%: manufacturer receives $69.30. 1K volume BOM+Assembly: $19. Gross margin: ($69.30-$19)/$69.30=72.6%. 10K: MCU $7.20 + sensor $3.60 + PCB $1.50 + PM $1.80 + assembly $1.00 = $15.10. Gross margin: ($69.30-$15.10)/$69.30=78.2%. 100K: MCU $6.40 + sensor $3.20 + PCB $0.75 + PM $1.60 + assembly $0.50 = $12.45. Gross margin: ($69.30-$12.45)/$69.30=82.0%. Margin improvement 1K->100K: 9.4pp.'
  common_mistake: |
    **The Pitfall:** Applying volume discounts exclusively to the MCU without recognizing that sensors, power management, and assembly also have volume price breaks.
    **The Rationale:** Candidates often focus solely on the primary compute component, ignoring system-level BOM scaling factors at high volumes.
    **The Consequence:** Understating the margin improvement at scale, leading to flawed business cases for volume production.
  napkin_math: |
    1. **Assumptions & Constraints:** Retail price $99, distributor margin 30% (mfr revenue $69.30). 1K BOM+Asm: $19. 10K scaling: MCU/Sensor/PM -10%, PCB $1.50, Asm $1.00. 100K scaling: MCU/Sensor/PM -20%, PCB $0.75, Asm $0.50.
    2. **Calculations:**
       - 1K: GM = ($69.30 - $19) / $69.30 = 72.6%.
       - 10K: BOM = $7.20 + $3.60 + $1.50 + $1.80 + $1.00 = $15.10. GM = ($69.30 - $15.10) / $69.30 = 78.2%.
       - 100K: BOM = $6.40 + $3.20 + $0.75 + $1.60 + $0.50 = $12.45. GM = ($69.30 - $12.45) / $69.30 = 82.0%.
    3. **Conclusion & Interpretation:** **Margin improvement 1K->100K: +9.4pp.** Result: Cost-Bound.
