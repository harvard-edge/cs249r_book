title: Tinyml New 0014
scenario: A microcontroller executes a dense TFLite Micro model directly from Flash memory (XIP). The power consumption is significantly higher than calculated, and the physical chip is noticeably warm.
question: Why does executing dense model weights directly from Flash increase power and heat on the microcontroller?
details:
  realistic_solution: Executing XIP (eXecute-In-Place) directly from Flash for a dense neural network forces the Flash controller to perform millions of reads. Flash memory draws significantly more current per read than SRAM. The continuous high-frequency read operations dissipate heat and drain power. To fix this, cache the most frequently accessed layers' weights into SRAM during execution.
  common_mistake: |
    **The Pitfall:** Assuming that because weights are immutable, leaving them in Flash memory is inherently power-efficient.
    **The Rationale:** Candidates forget that Execute-In-Place (XIP) forces the Flash controller to perform millions of high-latency, high-power reads.
    **The Consequence:** Severe battery drain and thermal issues that degrade the lifetime of the hardware.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SRAM Read Power: 1 cycle (~1 mA).
       - Flash Read Power: 4 cycles (~5 mA) due to wait states.
       - Dense Model: ~10M weights.
    2. **Calculations:**
       - SRAM Energy Proxy: 10M reads = 10M cycles.
       - Flash Energy Proxy: 10M reads * 4 cycles/read = 40M cycles at 5x the active current.
    3. **Conclusion & Interpretation:**
       - **Result: Energy-Bound.** Execute-In-Place (XIP) forces the Flash controller to perform high-latency, high-power reads, stalling the CPU and skyrocketing thermal dissipation.
