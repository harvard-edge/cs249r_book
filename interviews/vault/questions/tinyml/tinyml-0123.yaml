title: The Sub-Millisecond Fault Detector
scenario: You're designing a vibration anomaly detector for a high-speed motor (10,000 RPM). A bearing
  fault must be detected within 1ms of onset to trigger an emergency shutdown before catastrophic failure.
  Your model takes 0.5ms to run. Design the interrupt-driven inference pipeline.
question: "How would you design a sub-1 ms Cortex-M4 vibration fault detector for a 10,000 RPM motor?"
details:
  realistic_solution: 'Design a two-path interrupt-driven pipeline: (1) Fast path — a 50-sample matched
    filter running in the ADC data-ready ISR at 50 kHz (every 20 µs). Correlation: 50 MACs at 168 MMAC/s (168 MHz
    with 1 MAC/cycle) = ~298 ns. Threshold check + GPIO trigger: 1 microsecond total. This path
    guarantees sub-1ms detection for known fault signatures. (2) Slow path — a full ML classifier runs
    every 1ms window (500 us inference) to identify fault type (inner race, outer race, ball, cage) for
    maintenance scheduling. The fast path triggers emergency shutdown; the slow path classifies for the
    maintenance log. Sample rate must be ≥40 kHz (Nyquist for 20 kHz bearing fault signatures).'
  common_mistake: '"Sample at 1 kHz and run inference every 1ms." At 10,000 RPM, the motor completes one
    revolution every 6ms. A 1 kHz sample rate gives only 6 samples per revolution — far too few to detect
    a bearing fault signature (typically 5-20 kHz vibration).'
  napkin_math: 'Fast path: 50-sample matched filter at 50 kHz. Correlation: 50 MACs / 168,000,000 MACs/sec
    = ~298 ns. Threshold + logic: 100 ns. GPIO: 1 µs. Total: ~1.4 µs (which is just 7% of the 20 µs
    interval) — well under the 1ms deadline. Slow path
    (ML model): 500 µs inference, runs in main thread every 1ms window (using 50% CPU). Provides fault type classification for maintenance
    scheduling. If the fast path triggers shutdown, the slow path result is logged but not used for the
    safety decision.'
