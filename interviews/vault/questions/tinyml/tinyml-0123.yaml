title: The Sub-Millisecond Fault Detector
scenario: You're designing a vibration anomaly detector for a high-speed motor (10,000 RPM). A bearing fault must be detected within 1ms of onset to trigger an emergency shutdown before catastrophic failure. Your model takes 0.5ms to run.
question: How would you design a sub-1 ms Cortex-M4 vibration fault detector for a 10,000 RPM motor?
details:
  realistic_solution: 'Design a two-path interrupt-driven pipeline: (1) Fast path — a 50-sample matched filter running in the ADC data-ready ISR at 50 kHz (every 20 µs). Correlation: 50 MACs at 168 MMAC/s (168 MHz with 1 MAC/cycle) = ~298 ns. Threshold check + GPIO trigger: 1 microsecond total. This path guarantees sub-1ms detection for known fault signatures. (2) Slow path — a full ML classifier runs every 1ms window (500 us inference) to identify fault type (inner race, outer race, ball, cage) for maintenance scheduling. The fast path triggers emergency shutdown; the slow path classifies for the maintenance log. Sample rate must be ≥40 kHz (Nyquist for 20 kHz bearing fault signatures).'
  common_mistake: |
    **The Pitfall:** Sampling at 1 kHz and running inference every 1ms.
    **The Rationale:** Assuming a 1ms inference window means the sample rate should be 1 kHz.
    **The Consequence:** At 10,000 RPM, the motor completes a revolution every 6ms. A 1 kHz rate gives 6 samples per revolution—far too few to detect 5-20 kHz bearing fault signatures.
  napkin_math: |
    1. **Fast Path:** 50-sample matched filter at 50 kHz.
    2. **Correlation Time:** 50 MACs / 168 MMAC/s = ~298 ns.
    3. **Logic Time:** Threshold + GPIO = 1 µs.
    4. **Total Fast Path Latency:** ~1.3 µs (Well under 1 ms).
    5. **Slow Path:** 500 µs ML inference runs in main thread every 1ms window for classification logging.
