title: The Flash Read Disturb
scenario: Your always-on vibration monitoring system runs inference 10 times per second, reading the 400 KB model weights from flash via XIP each time. After 6 months, the model's precision drops from 0.94 to 0.82. A firmware update (re-flashing the same model) restores performance.
question: Why does a vibration model reading 400 KB weights from flash lose precision after 6 months until re-flashed?
details:
  realistic_solution: The culprit is **NOR flash read disturb** — a well-documented but rarely encountered phenomenon in embedded systems where repeatedly reading the same memory cells without erasing them gradually injects stray charge into adjacent cells, eventually flipping their bits and corrupting the weights.
  common_mistake: |
    **The Pitfall:** Believing flash memory only wears out from write operations.
    **The Rationale:** Developers rarely encounter "read disturb" because traditional software doesn't read the exact same addresses billions of times in a tight loop.
    **The Consequence:** Misattributing hardware-level bit flips to software bugs, failing to implement necessary periodic model refreshes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Inference rate: 10 inf/s.
       - Duration: 6 months (180 days).
       - Read disturb threshold: ~500M reads for 90nm NOR flash.
    2. **Calculations:**
       - Reads per cell over 6 months: 10 inf/s * 8 accesses * 86,400 s/day * 180 days = 1.24 Billion reads.
       - Margin exceeded: 1.24B / 500M = 2.48x.
    3. **Conclusion & Interpretation:**
       - **Result: Exceeded read-disturb threshold causes ~15% bit flips (Hardware Failure).**
  options:
  - Flash doesn't wear out from reading — only writes cause wear. The accuracy drop must be from a firmware bug that accumulated sensor calibration drift over 6 months.
  - 'NOR flash read disturb: the 400 KB model is read via XIP at 10 inferences/second, accumulating ~1.24 billion reads per cell over 6 months. This exceeds the ~500M read-disturb threshold for 90nm NOR flash, causing ~15% of cells in hot pages to flip bits. The ~480K flipped bits create ~3 LSB average weight noise on INT8 values, matching the observed 12% accuracy drop. Fix: periodically refresh (re-write) the model sectors every ~72 days, or move the model to MRAM/FRAM.'
  - The flash memory cells are slowly losing charge at room temperature (data retention degradation), causing random bit flips that accumulate over 6 months.
  - The MCU's voltage regulator has drifted over 6 months, causing the flash read voltage to shift outside the optimal sensing window, producing intermittent read errors.
  correct_index: 1
