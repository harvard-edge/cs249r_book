title: ESP32-S3 Tensor Arena Sizing with WiFi
scenario: You are deploying an INT8 keyword spotting model onto an ESP32-S3. The system runs FreeRTOS with WiFi and BLE stacks active, consuming a fixed 280 KB of the internal SRAM. The model requires a peak intermediate activation buffer of 128 KB, 16 KB for I/O buffers, and 24 KB of scratchpad memory for the INT8 vector extension operators.
question: How would you calculate the required size of the flat tensor arena and determine if it can be allocated entirely in the internal SRAM?
details:
  realistic_solution: The correct approach is to calculate the available internal SRAM by subtracting the system overhead from the total capacity, and then sum the peak memory requirements to size the flat tensor arena. Because the required arena size fits within the remaining internal SRAM, it should be allocated entirely in internal memory (avoiding PSRAM) to ensure the Xtensa vector extensions run at peak performance without memory stalls.
  common_mistake: |
    **The Pitfall:** Ignoring the OS/Network stack overhead or placing the tensor arena in PSRAM.
    **The Rationale:** Candidates assume all 512 KB of SRAM is available to the model, or they default to using the 8 MB PSRAM for large buffers.
    **The Consequence:** The model either crashes due to OOM errors (if placed in SRAM without checking) or suffers severe latency degradation (if placed in slow PSRAM).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - ESP32-S3 Total Internal SRAM: 512 KB.
       - System Overhead (WiFi/BLE/RTOS): 280 KB.
       - Required Model Arena: Peak Activations (128 KB) + I/O (16 KB) + Scratchpad (24 KB).
    2. **Calculations:**
       - Available SRAM: 512 KB - 280 KB = 232 KB.
       - Total Tensor Arena: 128 KB + 16 KB + 24 KB = 168 KB.
       - SRAM Headroom: 232 KB - 168 KB = 64 KB.
    3. **Conclusion & Interpretation:**
       - **The 168 KB arena fits entirely within the remaining 232 KB of internal SRAM, avoiding slow PSRAM fetches.**
       - **Result: Memory-Capacity-Bound (Feasible).**
