title: Pruning Strategies for nRF5340 Model Deployment
scenario: You are tasked with deploying a compact convolutional neural network (CNN) for sensor data processing on a Nordic nRF5340 microcontroller, which features a 128 MHz Cortex-M33 CPU, 256 KB SRAM, and 1 MB flash memory. You are exploring model pruning techniques to meet memory and performance targets.
question: What is the difference between structured and unstructured pruning, and which is better for nRF5340 edge deployment?
details:
  realistic_solution: For devices like the nRF5340, structured pruning (e.g., channel, filter, or layer pruning) is generally preferred. It removes entire groups of weights, leading to smaller, denser models that maintain efficient memory access and computation on general-purpose CPUs. This results in direct reduction of model size and FLOPs, making the pruned model easier to fit into the limited 256 KB SRAM and 1 MB flash, and faster to execute given the 128 MHz clock speed.
  common_mistake: |
    **The Pitfall:** Applying unstructured pruning to edge models without checking for hardware sparsity support.
    **The Rationale:** Unstructured pruning often yields higher theoretical sparsity, but general-purpose CPUs lack the specialized sparse matrix accelerators needed to exploit it.
    **The Consequence:** The irregular memory access and index management overhead actually slow down inference and increase memory usage on the nRF5340.
  napkin_math: |
    - **Original Layer:** 32 (in) * 64 (out) * 3*3 kernels = 18,432 parameters.
    - **Structured Pruning (50% Output Channels):** Reduce output channels from 64 to 32.
    - **New Parameter Count:** 32 (in) * 32 (out) * 3*3 kernels = 9,216 parameters.
    - **Reduction:** (18,432 - 9,216) / 18,432 = 0.5 (50%).
    - **Conclusion:** **Structured pruning physically reduces the tensor dimensions by 50%, guaranteeing memory and compute savings on standard CPUs.**
