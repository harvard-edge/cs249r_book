title: Pruning Strategies for nRF5340 Model Deployment
scenario: You are tasked with deploying a compact convolutional neural network (CNN)
  for sensor data processing on a Nordic nRF5340 microcontroller, which features a
  128 MHz Cortex-M33 CPU, 256 KB SRAM, and 1 MB flash memory. To meet the stringent
  memory and performance targets, you are exploring model pruning techniques.  Describe
  the fundamental difference between 'structured pruning' and 'unstructured pruning'.
  Which of these approaches is generally more advantageous for optimizing models for
  highly resource-constrained edge devices like the nRF5340, and why, considering
  both memory footprint and execution efficiency on its general-purpose CPU architecture?
question: What is the difference between structured and unstructured pruning, and
  which is better for nRF5340 edge deployment?
details:
  realistic_solution: For devices like the nRF5340, structured pruning (e.g., channel,
    filter, or layer pruning) is generally preferred. It removes entire groups of
    weights, leading to smaller, denser models that maintain efficient memory access
    and computation on general-purpose CPUs. This results in direct reduction of model
    size and FLOPs, making the pruned model easier to fit into the limited 256 KB
    SRAM and 1 MB flash, and faster to execute given the 128 MHz clock speed.
  common_mistake: A common mistake is applying unstructured pruning without careful
    consideration of hardware support. While it offers higher sparsity potential,
    the irregular memory access patterns and the overhead of managing sparse data
    structures often negate performance gains on CPUs without specialized sparse matrix
    acceleration, potentially even slowing down inference or increasing memory usage
    due to index storage.
  napkin_math: 'Consider a convolutional layer with an input feature map of 32 channels
    and 64 output channels, using 3x3 kernels. The number of parameters is `32 * 64
    * 3 * 3 = 18432`. If you apply 50% structured channel pruning on the output channels,
    reducing them from 64 to 32, calculate the new number of parameters and the percentage
    reduction. (New parameters: `32 * 32 * 3 * 3 = 9216`. Reduction: `(18432 - 9216)
    / 18432 = 0.5`, or 50% reduction).'
