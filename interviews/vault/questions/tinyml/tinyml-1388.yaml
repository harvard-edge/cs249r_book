title: 'ESP32-S3 Model Deployment: Memory Footprint and Feasibility Analysis for a TinyML Vision Task'
scenario: You are tasked with deploying a tiny image classification model (classifying 64x64 grayscale images) onto a microcontroller with 512 KB of SRAM and 8 MB of PSRAM. The current model candidate is a small CNN with 500,000 FP32 parameters.
question: How would you assess the deployment feasibility of a 500K-parameter CNN and diagnose potential memory bottlenecks?
details:
  realistic_solution: A 500K FP32 parameter model demands 2MB, immediately exceeding the 512KB SRAM. Quantizing to INT8 reduces weights to 500KB, fitting nominally but leaving zero margin. A 64x64 input generates intermediate activation tensors that require ~65KB of SRAM, alongside RTOS and I/O buffers. Therefore, the quantized weights must be offloaded to the slower 8MB PSRAM via Execute-In-Place (XIP), reserving the fast 512KB SRAM strictly for the activation tensor arena and system stack. If PSRAM latency breaks the inference deadline, heavy pruning or architecture redesign is required.
  common_mistake: |
    **The Pitfall:** Neglecting activation memory, I/O buffers, and RTOS overhead during capacity planning.
    **The Rationale:** Engineers focus strictly on the static weights file size, ignoring the dynamic runtime footprint.
    **The Consequence:** The model crashes with OOM hard faults at runtime because intermediate activation tensors push the memory usage far beyond the physical SRAM limit.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SRAM: 512 KB. Model: 500,000 parameters. Input: 64x64 grayscale.
    2. **Calculations:**
       - FP32 Weights: 500,000 * 4 bytes = 2 MB (Exceeds SRAM).
       - INT8 Weights: 500,000 * 1 byte = 500 KB.
       - Activation Memory: e.g., 32x32x64 tensor = 65,536 elements = ~65 KB (INT8).
       - Total SRAM Need: 500 KB (weights) + 65 KB (activations) + ~100 KB (RTOS/buffers) = 665 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** The model natively exceeds SRAM and must be offloaded to PSRAM.
