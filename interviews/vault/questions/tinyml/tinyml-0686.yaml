title: The Sun-Blinded Driver Monitor
scenario: You are designing the perception module for a safety-critical automotive emergency braking system. The core model runs on a microcontroller with a hard real-time deadline of 1 ms per inference. A critical failure mode is 'sensor occlusion,' where mud covers the camera lens, inducing data drift. The system must never fail silently and must recover gracefully.
question: How do you propose to detect this occlusion on-device, and what is the recovery strategy without violating the 1ms budget?
details:
  realistic_solution: A robust L6+ architecture uses a multi-layered defense-in-depth approach, prioritizing speed and low-overhead. The key is to handle the fault in software gracefully before the system freezes and requires a hard reset from the watchdog.
  common_mistake: |
    **The Pitfall:** Running a second occlusion detection model or relying entirely on the hardware watchdog.
    **The Rationale:** Engineers either propose computationally infeasible complex models or treat the watchdog as an error-handler, causing dangerous system reboots during operation.
    **The Consequence:** Exceeding the strict 1ms budget or triggering a hard reset that completely disables the safety-critical system.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Deadline Budget: 1 ms (1000 Hz).
       - CNN Execution: ~0.7 ms on M7 @ 480 MHz.
       - Monitor Budget: 0.3 ms.
    2. **Calculations:**
       - Software Monitor (Summing pixels): 4096 values at 480 MHz ≈ 8.5 µs.
       - Threshold comparison: < 1 µs.
       - Total Overhead: ~10 µs.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Safety**. The software monitor consumes only ~1% of the 1ms budget, safely detecting occlusion without violating real-time constraints.
