title: The Mud-Splattered Lens
scenario: You are the principal engineer designing the perception module for a new, safety-critical (ASIL C) automotive emergency braking system. The core model—a small CNN for vehicle detection—runs on a Cortex-M7 microcontroller with 2 MB of Flash and 512 KB of SRAM. The system has a hard real-time deadline of 1 ms per inference to meet the 1000 Hz control loop frequency. A critical, real-world failure mode is 'sensor occlusion,' where a splash of mud instantly covers the camera lens, inducing severe, non-stationary data drift. The system must never fail silently and must recover gracefully. Your primary constraints are the hardware limits and the 1ms budget.
question: How do you propose to detect this occlusion on-device, and what is the recovery strategy without violating the 1ms budget?
details:
  realistic_solution: A robust L6+ architecture uses a multi-layered defense-in-depth approach, prioritizing speed and low-overhead. The key is to handle the fault in software gracefully before the system freezes and requires a hard reset from the watchdog.
  common_mistake: |
    **The Pitfall:** Running a second occlusion detection model or relying entirely on the hardware watchdog.
    **The Rationale:** Engineers either propose computationally infeasible complex models or treat the watchdog as an error-handler, causing dangerous system reboots during operation.
    **The Consequence:** Exceeding the strict 1ms budget or triggering a hard reset that completely disables the safety-critical system.
  napkin_math: |
    - **Budget**: 1 ms (1000 Hz).
    - **CNN Execution**: ~0.7 ms on M7 @ 480 MHz.
    - **Monitor Budget**: 0.3 ms.
    - **Software Monitor (Summing pixels)**: 4096 values at 480 MHz ≈ 8.5 µs. Threshold comparison < 1 µs.
    - **Total Overhead**: ~10 µs = **1% of budget**. Catches occlusion almost instantly.
