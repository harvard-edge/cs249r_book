title: Roofline Analysis for TinyML on ARM Cortex-M4 STM32F4
scenario: A TinyML engineer is deploying a 1D Convolutional Neural Network (CNN) for keyword spotting onto an ARM Cortex-M4 STM32F4 microcontroller. This device operates at 168 MHz, has 256 KB of SRAM, and crucially, lacks a hardware Floating Point Unit (FPU). Initial performance measurements show the model running significantly slower than anticipated.
question: How should a roofline model tailored to an FPU-less STM32F4 diagnose a slow 1D CNN and guide optimization?
details:
  realistic_solution: The engineer should first establish the Roofline model for the STM32F4. This involves characterizing the peak computational performance (e.g., 168 MMAC/s for integer operations, as the absence of an FPU means floating-point operations would be emulated in software and extremely slow) and the peak memory bandwidth (e.g., estimating ~150 MB/s for sustained SRAM access). Next, they would profile the CNN model to determine the operational intensity (MACs/byte) of its critical kernels. By plotting these kernels on the STM32F4's Roofline graph, they can visually identify if they fall into the compute-bound or memory-bound region. If memory-bound, optimization efforts should focus on data reuse, reducing data movement (e.g., aggressive quantization, loop tiling, optimizing data access patterns). If compute-bound, then techniques like loop unrolling, efficient use of CMSIS-DSP integer intrinsics, or model architecture simplification (reducing MACs) would be appropriate.
  common_mistake: |
    **The Pitfall:** Immediately jumping to optimize computationally intensive kernel functions (e.g., assembly rewrites).
    **The Rationale:** Guessing the bottleneck instead of formally profiling Operational Intensity against the hardware's Roofline Ridge Point.
    **The Consequence:** Misdirected optimization efforts resulting in minimal gains or performance regressions if the actual bottleneck was memory bandwidth.
  napkin_math: |
    1. **Peak Compute (P_C):** 1 integer MAC per cycle @ 168 MHz = 168 MMAC/s.
    2. **Peak Memory Bandwidth (P_B):** Sustained SRAM bandwidth ~150 MB/s.
    3. **Ridge Point (I_ridge):** P_C / P_B = 168 / 150 = **1.12 MACs/Byte**.
    4. **Memory-Bound Case:** If I_op = 0.8 MACs/Byte, performance is capped by memory: 0.8 * 150 = 120 MMAC/s.
    5. **Compute-Bound Case:** If I_op = 2.0 MACs/Byte, performance is capped by compute: **168 MMAC/s**.
