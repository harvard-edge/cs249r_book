title: Roofline Analysis for TinyML on ARM Cortex-M4 STM32F4
scenario: A TinyML engineer is deploying a 1D Convolutional Neural Network (CNN) for keyword spotting onto a microcontroller operating at 168 MHz with no hardware FPU. Initial performance measurements show the model running significantly slower than anticipated.
question: How should a roofline model tailored to an FPU-less STM32F4 diagnose a slow 1D CNN and guide optimization?
details:
  realistic_solution: "Establish the Roofline model by characterizing the peak computational performance (e.g., 168 MMAC/s for integer operations) and peak memory bandwidth. Next, profile the CNN model to determine the operational intensity of its kernels and visually identify if they are compute or memory bound."
  common_mistake: |
    **The Pitfall:** Immediately jumping to optimize computationally intensive kernel functions.
    **The Rationale:** Guessing the bottleneck instead of formally profiling Operational Intensity against the hardware's Roofline Ridge Point.
    **The Consequence:** Misdirected optimization efforts resulting in minimal gains or performance regressions if the actual bottleneck was memory bandwidth.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 168 MHz MCU, ~150 MB/s sustained SRAM bandwidth.
       - Compute: 1 integer MAC per cycle.
    2. **Calculations:**
       - Peak Compute (P_C): 168 MMAC/s.
       - Ridge Point: 168 MMAC/s / 150 MB/s = 1.12 MACs/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: Roofline Analysis isolates Compute-Bound vs Memory-Bound operations at 1.12 MACs/Byte.**
