title: The MCU Roofline
scenario: Construct a roofline model for a Cortex-M7 with 512 KB SRAM, a 64-bit AXI bus at 240 MHz, and
  SIMD capable of 4 INT8 MACs per cycle at 480 MHz. Where is the ridge point, and what does it tell you
  about which models are feasible?
details:
  realistic_solution: 'Build the roofline: Ridge point: 1.0-1.6 Ops/Byte. Conv2D 3×3 intensity: ~18 Ops/Byte
    → compute-bound ✓. Depthwise Conv2D 3×3 intensity: ~9 Ops/Byte → compute-bound ✓. Fully connected
    layer (1024→1024): 2 Ops/Byte → comp'
  common_mistake: '"The roofline is the same concept as for GPUs — just smaller numbers." The concept
    is the same, but the implications are radically different because the memory hierarchy is flat (no
    HBM, no L2 cache in most M7 variants).'
  napkin_math: 'Ridge point: 1.0-1.6 Ops/Byte. Conv2D 3×3 intensity: ~18 Ops/Byte → compute-bound ✓. Depthwise
    Conv2D 3×3 intensity: ~9 Ops/Byte → compute-bound ✓. Fully connected layer (1024→1024): 2 Ops/Byte
    → compute-bound ✓. Pointwise Conv2D (1×1): ~2 Ops/Byte → compute-bound ✓. On an MCU, everything is
    compute-bound. On a GPU (ridge ~300), everything except large MatMuls is memory-bound. This is why
    model optimization strategies differ radically between the two platforms.'
  options:
  - The ridge point is at ~100 Ops/Byte (similar to GPUs), meaning most TinyML models are memory-bound
    and need larger caches to achieve good performance.
  - 'Peak compute: 4 INT8 MACs/cycle x 480 MHz = 1,920 MMAC/s. Memory bandwidth: 64-bit AXI at 240 MHz
    = 1,920 MB/s. Ridge point: 1,920/1,920 = 1.0 Ops/Byte. Conv2D 3x3 (~18 Ops/Byte), depthwise (~9),
    FC (~2) — all above the ridge point, meaning everything is compute-bound on an MCU. This is the opposite
    of GPUs (ridge ~300) where most ops are memory-bound.'
  - The roofline model doesn't apply to MCUs because they lack the cache hierarchy that makes the roofline
    analysis meaningful on GPUs and CPUs.
  - The ridge point is at ~0.1 Ops/Byte because MCU memory bandwidth (1.9 GB/s) far exceeds compute throughput
    (1.9 GOPS), making all operations compute-bound regardless of arithmetic intensity.
  correct_index: 1
