title: NPU Delegation Coverage Determines Actual Speedup
scenario: You're deploying a MobileNetV2 (300K parameters, 22 layers) on a Corstone-300 platform. The Vela compiler reports that 18 of 22 layers are delegated to the Ethos-U55 NPU, and 4 layers fall back to the M55 CPU. Your PM sees '82% delegation' and expects 5× speedup over M55-only.
question: What speedup should MobileNetV2 expect when 18 of 22 layers, but 95% of compute, delegate to Ethos-U55?
details:
  realistic_solution: Apply Amdahl's Law correctly by measuring the compute fraction, not the layer fraction, and account for the NPU↔CPU data transfer tax.
  common_mistake: |
    **The Pitfall:** Applying Amdahl's Law to layer counts instead of compute time.
    **The Rationale:** Candidates assume "82% of layers on the NPU means 82% of compute is accelerated", failing to weigh the MAC density of specific layers.
    **The Consequence:** They vastly miscalculate expected speedup, ignoring that remaining fallback layers incur massive data transfer overhead that cripples performance.
  napkin_math: |
    - Layer delegation: 18/22 = 82%.
    - Compute delegation: 28.5M/30M = 95%.
    - Expected ideal speedup (Amdahl): 1 / 0.05 = 20x.
    - Real speedup (accounting for ~200 µs NPU-CPU sync penalty across 4 fallback ops): **~6.8x**.
  options:
  - Speedup is ~5x as expected. 82% of layers on the NPU means 82% of compute is accelerated, giving 1/(1-0.82) = 5.6x by Amdahl's Law.
  - 'Actual speedup is ~6.8x (not 5x or 20x). Layer count (82%) misleads — compute delegation is 95% (28.5M/30M MACs). Naive Amdahl''s predicts 1/0.05 = 20x, but each NPU-to-CPU fallback transition costs ~50 us of data transfer dead time. With 4 transitions: ~200 us overhead. After fixing the unsupported Mean op (reducing to 2 transitions): speedup improves to ~9.4x.'
  - Speedup is ~20x because 95% of compute MACs run on the NPU, which is 20x faster than the M55 CPU per MAC.
  - Speedup is only ~2x because the Ethos-U55's 128 MACs/cycle throughput is bottlenecked by the narrow data bus between the NPU and M55, limiting effective bandwidth to 10% of peak.
  correct_index: 1
