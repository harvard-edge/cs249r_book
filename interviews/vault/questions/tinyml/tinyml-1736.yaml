title: Design MAC Budget for Sub-50ms Wakeword Engine
scenario: You are building a custom wakeword engine on a Cortex-M4 clocked at 80 MHz.
  The system's DSP frontend consumes exactly 20% of the clock cycles per inference.
question: Create a theoretical compute budget in MACs for the neural network, assuming
  4 MACs per SIMD instruction and 25% true pipeline utilization, to guarantee a sub-50ms
  inference time.
details:
  realistic_solution: A 50ms window at 80 MHz provides 4 million total cycles. Deducting
    20% for DSP leaves 3.2 million cycles for the NN. Assuming INT8 SIMD yields 4
    MACs per cycle but runs at 25% utilization, the effective throughput is 1 MAC
    per cycle. The maximum budget for the architecture is therefore 3.2 million MACs.
  common_mistake: Calculating theoretical peak throughput (4 MACs/cycle) without applying
    the real-world utilization penalty, leading to models that miss deadlines by 4x.
  napkin_math: 4M cycles * 0.8 * 1 MAC/cycle = 3.2M MACs budget.
