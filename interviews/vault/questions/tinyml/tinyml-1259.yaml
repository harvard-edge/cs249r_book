title: Audio Streaming Ping-Pong Sizing on Cortex-M4
scenario: You are designing a continuous audio ingestion pipeline for an acoustic event detector on an ARM Cortex-M4 (STM32F4). The microphone streams 16 kHz, 16-bit audio via I2S, and the system must compute a 512-point Mel spectrogram every 16 ms stride. Given the microcontroller's 168 MHz clock, 256 KB SRAM, and lack of an FPU, you need to evaluate the pipeline resources.
question: How should you size the DMA ping-pong audio buffer and remaining compute budget for a Cortex-M4 Mel spectrogram pipeline?
details:
  realistic_solution: The optimal approach uses a hardware DMA ping-pong buffer sized precisely to the 16 ms stride, allowing the CPU to process the previous frame while the next is captured in the background. Because there is no FPU, feature extraction must use fixed-point math (e.g., CMSIS-DSP arm_rfft_q15). This ensures the FFT and Mel-filterbank compute stays within a small fraction of the available cycles, leaving the SIMD engine ample headroom for the model.
  common_mistake: |
    **The Pitfall:** Allocating monolithic buffers and relying on standard 32-bit floating-point libraries.
    **The Rationale:** Engineers forget the platform lacks an FPU and underestimate the software emulation cost of floating-point math.
    **The Consequence:** Exhausting the clock budget via software emulation or dropping frames due to inefficient buffer management.
  napkin_math: |
    1. **Stride Duration:** 16 ms = 256 samples at 16 kHz.
    2. **Ping-Pong Buffer Size:** 2 buffers * 256 samples * 2 bytes/sample (16-bit) = 1,024 bytes (1 KB).
    3. **Total Cycle Budget:** 16 ms frame * 168,000,000 cycles/sec = 2,688,000 cycles per frame.
    4. **DSP Overhead:** 512-point fixed-point FFT + Mel-scale takes ~150,000 cycles.
    5. **Remaining Budget:** 2,688,000 - 150,000 = 2,538,000 cycles.
    6. **Result:** A 1 KB buffer is needed, leaving **~2.54 million cycles** (headroom for ~5M INT8 MACs) for the NN.
