title: Tinyml New 0039
scenario: Compiling a ResNet model with TVM for a microcontroller yields a binary that OOMs. The same model architecture, deployed via flat TFLite Micro, fits easily within the 256KB SRAM.
question: Why does the TVM-compiled ResNet OOM while TFLite Micro fits, and what memory planning issue should be corrected?
details:
  realistic_solution: The TVM memory planner failed to optimally overlap memory buffers for the residual branch. TFLite Micro's memory planner understands that once a branch is added back to the main trunk, its memory can be freed/reused. If TVM's static memory planner assigns strictly disjoint arenas for the parallel branches and the output, it vastly over-allocates peak memory. Adjust TVM workspace planning.
  common_mistake: |
    **The Pitfall:** Assuming all Ahead-of-Time compilers optimally reuse memory buffers.
    **The Rationale:** Candidates assume TVM's static memory planner flawlessly overlaps peak memory for parallel branches like TFLite Micro does.
    **The Consequence:** The compiled binary vastly over-allocates memory and crashes with an Out-of-Memory (OOM) error on deployment.
  napkin_math: |
    - **Optimal Planner (TFLite Micro):** Reuses space for Branch A (50KB) and B (50KB) for the Output tensor (50KB). Peak = **100KB**.
    - **Naive Static Planner (TVM default):** Allocates A (50KB) + B (50KB) + Output (50KB) statically without overlap. Peak = **150KB**.
    - **Result:** 150KB allocation exceeds available contiguous SRAM, causing OOM.
