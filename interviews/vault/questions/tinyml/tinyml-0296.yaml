title: The TinyML SRAM Budget
scenario: You are deploying a keyword-spotting model to a microcontroller. The model's compiled weights and architecture are stored in 180 KB of Flash memory. The RTOS consumes 24 KB of SRAM, and the model's peak activation memory (Tensor Arena) is 68 KB.
question: What SRAM footprint should you count for the keyword-spotting deployment, and why is the Flash-stored model size irrelevant?
details:
  realistic_solution: 'The total SRAM footprint is the sum of the memory used by the RTOS and the memory required by the model Tensor Arena. The size of the model in Flash storage is strictly irrelevant to the SRAM calculation because weights are executed directly from Flash (XIP).'
  common_mistake: |
    **The Pitfall:** Adding the Flash memory size directly to the SRAM calculation.
    **The Rationale:** Engineers new to embedded systems confuse non-volatile storage (Flash) with working memory (SRAM), failing to realize weights are not loaded into RAM entirely.
    **The Consequence:** Viable hardware is rejected for having "insufficient RAM," increasing BOM costs unnecessarily.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - RTOS SRAM: 24 KB.
       - Tensor Arena SRAM: 68 KB.
       - Model Flash: 180 KB.
    2. **Calculations:**
       - Total SRAM footprint = 24 KB + 68 KB = 92 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** The deployment strictly requires 92 KB of SRAM; the 180 KB flash size has zero impact on this requirement.
  options:
  - "272 KB. It won't fit."
  - "68 KB. It will fit."
  - "92 KB. It will fit."
  - "164 KB. It will fit."
  correct_index: 2
