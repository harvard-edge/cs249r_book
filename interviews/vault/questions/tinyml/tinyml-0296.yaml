title: The TinyML SRAM Budget
scenario: You are deploying a keyword-spotting model to a microcontroller with 256 KB of SRAM. The model's
  compiled weights and architecture are stored in 180 KB of Flash memory. The RTOS consumes 24 KB of SRAM,
  and the model's peak activation memory (Tensor Arena) is 68 KB.
question: "What SRAM footprint should you count for the keyword-spotting deployment, and why is the Flash-stored model size irrelevant?"
details:
  realistic_solution: The total SRAM footprint is the sum of the memory used by the system and the memory
    required by the model's Tensor Arena. The size of the model in Flash storage is irrelevant to the
    SRAM calculation.
  common_mistake: The most common mistake is to incorrectly add the Flash memory size (180 KB) to the
    SRAM calculation. Engineers new to microcontrollers often confuse storage (Flash, like a hard drive)
    with working memory (SRAM, like RAM). On these devices, the model's weights are typically read directly
    from Flash into the CPU for execution and are not loaded into SRAM all at once.
  napkin_math: '1. Identify baseline SRAM usage: The RTOS consumes 24 KB. 2. Identify Tensor Arena size: Based on the model architecture, the peak activation memory (Tensor Arena) is 68 KB. 3. Total SRAM footprint = 24 KB + 68 KB = 92 KB.'
  options:
  - 272 KB. It won't fit.
  - 68 KB. It will fit.
  - 92 KB. It will fit.
  - 164 KB. It will fit.
  correct_index: 2
