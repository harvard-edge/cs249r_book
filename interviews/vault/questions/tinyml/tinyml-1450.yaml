title: Adversarial Attack on ESP32-S3 TinyML Classifier
scenario: 'You are leading the deployment of a TinyML model on an ESP32-S3 (240 MHz dual-core, 512 KB SRAM, 8 MB PSRAM) for real-time gesture recognition. The model, a quantized CNN, performs well in clean environments. However, recent testing reveals it''s highly vulnerable to adversarial examples—minor, imperceptible perturbations to sensor input lead to critical misclassifications.'
question: 'How should you analyze and defend an ESP32-S3 gesture classifier against adversarial sensor perturbations within resource limits?'
details:
  realistic_solution: 'A realistic solution would involve a multi-pronged approach: first, identify the most critical attack surfaces. Then, implement lightweight defensive pre-processing techniques directly on the ESP32-S3, such as input sanitization (e.g., low-pass filtering, quantization, clipping) or simple denoising. Concurrently, explore model hardening through quantization-aware adversarial training on a host. Finally, establish runtime monitoring to detect suspicious input patterns.'
  common_mistake: |
    **The Pitfall:** Applying computationally intensive adversarial training directly on the device.
    **The Rationale:** Candidates apply high-performance computing defenses to TinyML devices without adapting for severe cycle constraints.
    **The Consequence:** Defenses introduce unacceptable latency, completely breaking the real-time gesture tracking pipeline.
  napkin_math: |
    1. **Assumptions & Constraints:** 32x32 input array. ESP32-S3 at 240 MHz. Lightweight 3x3 median filter takes ~30 cycles/pixel.
    2. **Calculations:**
       - Filter cycles: 32 * 32 pixels * 30 cycles = 30,720 cycles.
       - Execution time: 30,720 / 240,000,000 Hz = 0.000128 seconds = 128 µs.
    3. **Conclusion & Interpretation:** **A simple sanitization step adds just 128 µs, easily fitting within real-time budgets.** Result: Compute-Bound Defense.
