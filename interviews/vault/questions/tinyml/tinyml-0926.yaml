title: Design Attention Approximation for 256KB SRAM Budget
scenario: A keyword-spotting transformer needs 128-token context but the ESP32-S3's SRAM can only hold 64KB for the KV cache after reserving memory for weights, activations, and OS overhead. The model has 4 layers, 4 heads, 32-dimensional heads, INT8 precision.
question: What attention approximation fits a 128-token transformer context into the ESP32-S3 KV-cache budget while preserving accuracy?
details:
  realistic_solution: 'Full KV cache: 4x4x32x128x1B = 65,536B ≈ 64KB — exactly at budget but zero margin. Sliding window with 32-token window + 4 sink tokens: 4x4x32x36x1B = 18,432B = 18KB. Saves 46KB. Sink tokens (BOS + 3 learned sinks) capture global context; window handles local phoneme patterns. Expected accuracy drop <2% for keyword spotting due to local acoustic structure.'
  common_mistake: |
    **The Pitfall:** Using full KV cache and swapping to flash.
    **The Rationale:** Flash latency (100 us/read) massively dominates for 128-token context with frequent cache misses, destroying real-time performance.
    **The Consequence:** The model fits in memory but critically misses real-time latency deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - KV Cache Budget: 64 KB.
       - Transformer Architecture: 4 layers, 4 heads, 32 dims, INT8 (1 byte).
       - Sliding Window: 32 tokens + 4 sink tokens = 36 tokens.
    2. **Calculations:**
       - Full KV Cache = 4 * 4 * 32 * 128 * 1 byte = 65,536 bytes (exactly 64 KiB, no margin).
       - Sliding Window KV Cache = 4 * 4 * 32 * 36 * 1 byte = 18,432 bytes (~18 KiB).
       - Memory Saved = 65,536 - 18,432 = 47,104 bytes (~46 KiB).
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Optimization.** A sliding window with sink tokens saves ~46 KiB, providing a safe SRAM margin while preserving accuracy.
