title: 'The Duty Cycle Power Tax: Duty Cycling & Energy Harvesting'
scenario: Your team is designing a battery-powered audio sensor that wakes up for one second to listen
  for a keyword, then sleeps for the next nine seconds. Using typical power numbers for a Cortex-M4 microcontroller,
  what is the *average* power draw of this device over one 10-second cycle?
question: "Using typical power numbers for a Cortex-M4 microcontroller, what is the *average* power draw of this device over one 10-second cycle?"
details:
  realistic_solution: The correct way to calculate the average power is to find the total energy consumed
    over the cycle and divide by the cycle's duration. The total energy is the sum of the energy used
    during the active phase and the energy used during the sleep phase.
  common_mistake: 'Engineers often miscalculate average power in duty-cycled systems. The most common
    errors are: 1) Using the peak (active) power as the average, ignoring the long sleep period. 2) Incorrectly
    averaging the active and sleep power values (e.g., (10mW + 10µW)/2) without weighting by time. 3)
    Ignoring the sleep power entirely, which is less of an error but still technically incomplete.'
  napkin_math: 'Cortex-M4 typical: active ~10mW, deep sleep ~10µW. Active energy: 10mW × 1s = 10mJ. Sleep
    energy: 0.01mW × 9s = 0.09mJ. Total: 10.09mJ over 10s. P_avg = 10.09mJ / 10s = 1.009mW ≈ 1mW. CR2032
    (225mAh, 3V) = 675mWh. Battery life: 675mWh / 1mW = 675,000ms... no: 675h = 28 days. Coin cell likely
    CR-AA: 2500mAh → 7500mWh / 1mW = 7500h ≈ 312 days.'
  options:
  - 10 mW
  - ~5 mW
  - ~1 mW
  - 100 µW
  correct_index: 2
