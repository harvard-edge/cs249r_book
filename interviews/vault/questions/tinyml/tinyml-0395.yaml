title: 'The Duty Cycle Power Tax: Duty Cycling & Energy Harvesting'
scenario: Your team is designing a battery-powered audio sensor that wakes up for one second to listen for a keyword, then sleeps for the next nine seconds.
question: "Using typical power numbers for a Cortex-M4 microcontroller, what is the *average* power draw of this device over one 10-second cycle?"
details:
  realistic_solution: The correct way to calculate the average power is to find the total energy consumed over the cycle and divide by the cycle's duration. The total energy is the sum of the energy used during the active phase and the energy used during the sleep phase.
  common_mistake: |
    **The Pitfall:** Incorrectly calculating average power in duty-cycled systems by ignoring the sleep period or improperly averaging the two states.
    **The Rationale:** Engineers might simply average the active and sleep power values (e.g., `(10mW + 10µW)/2`) without weighting them by the time spent in each state.
    **The Consequence:** Gross miscalculation of battery life, leading to products that die in the field months or years earlier than specified.
  napkin_math: |
    - Active power: ~10 mW. Sleep power: ~10 µW (0.01 mW).
    - Active energy: 10 mW × 1 s = 10 mJ.
    - Sleep energy: 0.01 mW × 9 s = 0.09 mJ.
    - Total energy over 10 s: 10.09 mJ.
    - Average power (P_avg): 10.09 mJ / 10 s = **1.009 mW** (~1 mW).
    - CR2032 Battery (225 mAh, 3V = 675 mWh): 675 mWh / 1 mW = 675 hours (~28 days).
    - CR-AA Battery (2500 mAh, 3V = 7500 mWh): 7500 mWh / 1 mW = 7500 hours (**~312 days**).
  options:
  - 10 mW
  - ~5 mW
  - ~1 mW
  - 100 µW
  correct_index: 2
