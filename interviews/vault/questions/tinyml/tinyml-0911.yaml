title: 'TinyML TCO Mastery: Full Lifecycle TinyML Product Cost Model'
scenario: 'Build a complete 5-year lifecycle cost model for a TinyML-based air quality monitor product. Sales: 30,000 units total (10K in Year 1, 5K/yr in Years 2-5) using ESP32-S3. BOM: $4 ESP32 + $5 sensors + $3 enclosure + $2 assembly = $14. Retail: $49. Include NRE ($130K), warranty (5% failure rate, $20 replacement cost), annual cloud backend costs ($6K/yr), and operational expenses ($75K/yr).'
question: What are the five-year lifecycle costs and margin for the ESP32-S3 air quality monitor product?
details:
  realistic_solution: 'Warranty: Year 1 = 5% × 10K units × $20 = $10K. Years 2-5 = 5% × 5K units/yr × $20 = $5K/yr × 4 = $20K. Total warranty 5yr = $30K. Total costs: $130K NRE + $420K COGS + $30K cloud + $30K warranty = $610K. Net 5yr: ~$485K after opex.'
  common_mistake: |
    **The Pitfall:** Building a pure hardware cost model without including massive NRE amortization or recurring cloud costs.
    **The Rationale:** Engineers naturally focus on the per-unit BOM cost and ignore ongoing software, operational, and warranty expenses.
    **The Consequence:** The business heavily overestimates its profit margin and risks catastrophic failure due to unforeseen post-deployment recurring costs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Sales: 30,000 units at $49 each.
       - BOM: $14/unit. NRE: $130,000.
       - Cloud: $6,000/yr. Opex: $75,000/yr.
       - Warranty: 5% failure at $20/unit.
    2. **Calculations:**
       - Revenue: 30,000 × $49 = $1,470,000.
       - COGS: 30,000 × $14 = $420,000.
       - Cloud 5-year: $6,000 × 5 = $30,000.
       - Warranty (5yrs): 5% × 30,000 = 1,500 units × $20 = $30,000.
       - Total Costs (excl Opex): $130k + $420k + $30k + $30k = $610,000.
       - Gross Profit: $1,470,000 - $610,000 = $860,000.
       - Opex 5-year: $75,000 × 5 = $375,000.
       - Net Profit: $860,000 - $375,000 = $485,000.
    3. **Conclusion & Interpretation:**
       - **Result: Positive ROI.** Net margin is $485k / $1.47M = 33.0%, proving the viability of the TinyML hardware business model when accounting for full lifecycle TCO.
