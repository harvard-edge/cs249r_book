title: 'TinyML TCO Mastery: Full Lifecycle TinyML Product Cost Model'
scenario: 'Build a complete 5-year lifecycle cost model for a TinyML-based air quality
  monitor product (Sales: 30,000 units total; 10K in Year 1, 5K/yr in Years 2-5) using
  ESP32-S3 (240MHz, 512KB SRAM, WiFi, $4). BOM: $4 ESP32 + $5 sensors + $3 enclosure
  + $2 assembly = $14. Retail: $49. Include NRE (non-recurring engineering) costs,
  manufacturing yield, warranty, and annual cloud backend costs.'
question: What are the five-year lifecycle costs and margin for the ESP32-S3 air quality
  monitor product?
details:
  realistic_solution: 'Warranty: Year 1 = 5% × 10K units × $20 = $10K. Years 2-5 =
    5% × 5K units/yr × $20 = $5K/yr × 4 = $20K. Total warranty 5yr = $30K. Total costs:
    $130K NRE + $420K COGS + $30K cloud + $30K warranty = $610K. Net 5yr: ~$485K
    after opex.'
  common_mistake: 'Building a pure hardware cost model without including the massive
    NRE amortization (firmware development, certification: FCC/CE) and recurring cloud
    backend costs that sustain the product''s functionality.'
  napkin_math: '5yr model: Revenue: 30K units * $49 = $1,470,000. Costs: NRE=$130K.
    COGS: 30K*$14=$420,000. Cloud 5yr: $6K*5=$30K. Warranty: year 1: 5%*10K*$20=$10K;
    yr2-5: 5%*5K*$20=$5K/yr; 5yr total=$10K+4*$5K=$30K. Total costs: $130K+$420K+$30K+$30K=$610K.
    Gross profit: $1470K-$610K=$860K. Operating expenses (0.5 FTE maintenance=$75K/yr*5=$375K).
    Net: $860K-$375K=$485K. Net margin: 33.0%.'
