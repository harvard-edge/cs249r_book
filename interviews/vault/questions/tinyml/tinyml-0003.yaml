title: The Quantization Blur
scenario: Your gesture-recognition model has 95% accuracy in Python (FP32), but drops to 50% (random chance)
  after you quantize it to INT8 for a microcontroller. Based on the binning diagram, why did the model
  'lose' the ability to tell Left from Right?
details:
  realistic_solution: 'You have **Quantization Range Collapse**. If you calibrate the model using a dataset
    with high-magnitude outliers (e.g. ±8g), the INT8 step size becomes too large (0.063). Subtle discriminative
    features (like ±0.1g) all get rounded to the same integer bin (128). The fix is **Per-Channel Quantization**
    or **Outlier Clipping**: cap the activation range at a lower value (e.g. ±1g) during calibration to
    regain resolution for the important small signals.'
  common_mistake: '"The model isn''t expressive enough." The FP32 model proves it *is* expressive enough.
    The problem is the calibration.'
  napkin_math: In INT8, you have 256 bins. If your range is ±8 (width 16), each bin is 0.0625 wide. If
    your signal is ±0.03, it rounds to zero. If you clip the range to ±0.5, each bin is 0.004 wide—regaining
    15x more resolution.
