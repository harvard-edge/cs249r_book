title: The Quantization Blur
scenario: Your gesture-recognition model achieves 95% accuracy in FP32 Python tests but catastrophically degrades to 50% random chance after INT8 post-training quantization for a microcontroller deployment.
question: Based on quantization mechanics, why does an INT8 conversion completely destroy the model's discriminative boundaries?
details:
  realistic_solution: This is a classic case of **Quantization Range Collapse**. If the calibration dataset contains high-magnitude outliers, the resulting INT8 scaling factor becomes exceedingly large. Consequently, the subtle, high-frequency discriminative features are entirely rounded off into identical integer bins. The architectural fix requires Per-Channel Quantization or aggressive Outlier Clipping during calibration to narrow the dynamic range and recover resolution for the critical weak signals.
  common_mistake: |
    **The Pitfall:** Blaming the underlying model capacity.
    **The Rationale:** Candidates incorrectly assume the INT8 network lacks the mathematical expressiveness to map the decision boundary.
    **The Consequence:** They waste engineering cycles pursuing larger, more complex architectures, completely missing that the FP32 results proved the capacity exists but the calibration destroyed the signal.
  napkin_math: |
    1. **Assumptions & Constraints**:
       - INT8 resolution provides exactly 256 quantization bins.
       - Wide range: ±8g (width 16).
       - Clipped range: ±0.5g (width 1).
    2. **Calculations**:
       - Outlier Scaling Step: 16 / 256 = 0.0625 width per bin.
       - Small signal (±0.03g): 0.03 < 0.0625, rounds to zero (lost).
       - Clipped Scaling Step: 1 / 256 = 0.0039 width per bin.
    3. **Conclusion & Interpretation**:
       - **Result: Precision-Bound Collapse**. Clipping the calibration range regains ~15x resolution (0.0039 vs 0.0625), successfully resolving the ±0.03g features into distinct integer bins.
