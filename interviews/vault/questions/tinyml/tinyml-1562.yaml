title: Hailo-8 PCIe Gen3 Saturated
scenario: A Hailo-8 accelerator sits on a PCIe Gen3 x1 link to a low-power host. The reference figure shows the link at its raw 1000 MB/s line rate with the host pushing 373 MB/s of ingress traffic - the optimistic view a spec sheet would suggest. The host streams 1080p RGB video at 60 fps for segmentation; the Hailo-8 returns a 4 MB segmentation mask per frame on the full-duplex return path. PCIe Gen3 uses 128b/130b line coding (~1.5% symbol overhead) and TLP framing adds a further ~10% per-packet overhead (24 B header on ~256 B payload).
question: What is the realistic per-direction bandwidth and ingress utilization of a PCIe Gen3 x1 link streaming 1080p 60fps video?
visual:
  kind: svg
  path: tinyml-1562.svg
  alt: Host node pushing 373 MB/s to Hailo-8 over a 1000 MB/s link.
  caption: PCIe Gen3 x1 Bandwidth Utilization.
details:
  realistic_solution: 1080p RGB = 1920*1080*3 = 6.22 MB/frame; at 60 fps = 373.2 MB/s ingress. Effective PCIe Gen3 x1 bandwidth after 128b/130b (~1.5%) and TLP framing (~10%) overhead = 1000 * 0.985 * 0.9 = 886 MB/s per direction. Ingress utilization = 373 / 886 = 42%. The 4 MB mask return at 60 fps = 240 MB/s on the return lane = 27% utilization. Both directions fit comfortably on a full-duplex Gen3 x1, but a second 4 MB tensor would push ingress past 73% and start contending for TLP credits, inflating tail latency.
  common_mistake: |
    **The Pitfall:** Comparing payload directly to the raw 1000 MB/s line rate.
    **The Rationale:** Candidates forget to subtract the 128b/130b encoding and TLP framing overheads.
    **The Consequence:** This 13-15% optimism error hides marginal saturation cases and potential tail latency spikes.
  napkin_math: |
    *   **Video Ingress**: 1920 * 1080 * 3 bytes = 6.22 MB/frame. At 60 fps = 373.2 MB/s.
    *   **Raw Link**: 1000 MB/s.
    *   **Effective BW**: Subtract 1.5% (128b/130b) and 10% (TLP). 1000 * 0.985 * 0.9 = 886 MB/s.
    *   **Utilization**: Ingress = 373.2 / 886 = ~42%. Egress = 240 / 886 = ~27%.
    *   **Conclusion**: **Both fit comfortably, but a second 4 MB tensor would push ingress past 73%, risking saturation.**
