title: Hailo-8 PCIe Gen3 Saturated
scenario: A Hailo-8 accelerator is connected to a low-power host via PCIe Gen3 x1,
  which provides ~1 GB/s. The host streams 1080p RGB video at 60 fps for real-time
  segmentation.
question: Evaluate the PCIe bandwidth utilization percentage for the input stream
  alone.
visual:
  kind: svg
  path: tinyml-1562.svg
  alt: Host node pushing 373 MB/s to Hailo-8 over a 1000 MB/s link.
  caption: PCIe Gen3 x1 Bandwidth Utilization.
details:
  realistic_solution: 1080p RGB is $1920 \times 1080 \times 3$ bytes = 6.22 MB per
    frame. At 60 fps, the data rate is $6.22 \times 60 = 373.2$ MB/s. The PCIe Gen3
    x1 provides 1000 MB/s, yielding a utilization of $373.2 / 1000 = 37.3\%$. The
    link is sufficient for input but leaves room for output tensors.
  common_mistake: Calculating bits instead of bytes for the PCIe transfer or forgetting
    the 3-channel RGB multiplier.
  napkin_math: 2M pixels * 3B * 60fps = 360 MB/s. 360 / 1000 = 36% utilization.
