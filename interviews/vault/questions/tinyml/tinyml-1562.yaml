title: Hailo-8 PCIe Gen3 Saturated
scenario: A Hailo-8 accelerator sits on a PCIe Gen3 x1 link to a low-power host. The
  reference figure shows the link at its raw 1000 MB/s line rate with the host pushing
  373 MB/s of ingress traffic - the optimistic view a spec sheet would suggest. The
  host streams 1080p RGB video at 60 fps for segmentation; the Hailo-8 returns a 4
  MB segmentation mask per frame on the full-duplex return path. PCIe Gen3 uses 128b/130b
  line coding (~1.5% symbol overhead) and TLP framing adds a further ~10% per-packet
  overhead (24 B header on ~256 B payload).
question: Starting from the figure's 1000 MB/s raw line-rate view, evaluate the realistic
  per-direction bandwidth after deducting 128b/130b encoding and TLP framing overhead.
  Then quantify ingress and return-path utilisation and explain whether the figure's
  optimistic 1000 MB/s reading hides any marginal saturation case (e.g., a second
  4 MB tensor on the return path).
visual:
  kind: svg
  path: tinyml-1562.svg
  alt: Host node pushing 373 MB/s to Hailo-8 over a 1000 MB/s link.
  caption: PCIe Gen3 x1 Bandwidth Utilization.
details:
  realistic_solution: 1080p RGB = 1920*1080*3 = 6.22 MB/frame; at 60 fps = 373.2 MB/s
    ingress. Effective PCIe Gen3 x1 bandwidth after 128b/130b (~1.5%) and TLP framing
    (~10%) overhead = 1000 * 0.985 * 0.9 = 886 MB/s per direction. Ingress utilization
    = 373 / 886 = 42%. The 4 MB mask return at 60 fps = 240 MB/s on the return lane
    = 27% utilization. Both directions fit comfortably on a full-duplex Gen3 x1, but
    a second 4 MB tensor would push ingress past 73% and start contending for TLP
    credits, inflating tail latency.
  common_mistake: Comparing payload to the raw 1 GB/s line rate without subtracting
    encoding (128b/130b) and TLP framing overhead - a common 13-15% optimism error
    that hides marginal saturation cases.
  napkin_math: Effective BW per direction = 1000 * 0.985 * 0.9 = 886 MB/s; ingress
    = 373/886 = 42%; egress = 240/886 = 27%.
