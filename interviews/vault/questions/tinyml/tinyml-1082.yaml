title: Energy-Efficient Audio Pipeline Design on Corstone-300
scenario: >
  You are architecting an always-on keyword spotting application for a battery-powered IoT device utilizing the ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform. The system operates with a 480 MHz M7 and an Ethos-U55 NPU that shares a strict 512 KB of SRAM. You must design the data flow and partition the workload between the CPU and NPU to minimize the total energy per operation, specifically addressing the energy cost of memory access versus compute.
question: >
  How should Corstone-300 partition CPU, NPU, and SRAM work to minimize energy for always-on keyword spotting?
details:
  realistic_solution: >
    The optimal architecture treats the 512 KB SRAM as a strict boundary for the active working set. The M7 should perform lightweight DSP feature extraction (e.g., MFCCs) and stream the features directly into SRAM. The neural network architecture must be aggressively quantized (INT8) and sized so that its weights, intermediate activations, and the CPU's stack comfortably fit within the 512 KB to ensure the Ethos-U55 accesses only local SRAM, relying on its 128-512 MAC/cycle throughput to finish inferences fast enough to return the system to a deep sleep state.
  common_mistake: |
    **The Pitfall:** Assuming that maximizing NPU utilization is always the most energy-efficient approach.
    **The Rationale:** Candidates ignore the extremely high energy cost of memory transfers compared to compute.
    **The Consequence:** Designing models that exceed the 512 KB shared SRAM causes continuous evictions to external flash or DRAM, completely negating the compute energy savings of the Ethos-U55.
  napkin_math: |
    - **Memory Energy Cost:** External DRAM/Flash read costs ~1000pJ per byte vs an SRAM read at ~10pJ.
    - **OOM Penalty:** If an 800 KB model spills 288 KB externally, fetching it costs ~288,000 bytes × 1000 pJ = 288 μJ.
    - **SRAM Fit:** A 300 KB model fitting entirely in SRAM costs 300,000 bytes × 10 pJ = 3 μJ to fetch.
    - **Compute Cost:** 10 million MACs at 0.1 pJ/MAC = 1 μJ compute energy.
    - **Conclusion:** Even with an efficient NPU, memory access dominates. Fitting within the 512 KB SRAM saves **>98% of the system energy**.
