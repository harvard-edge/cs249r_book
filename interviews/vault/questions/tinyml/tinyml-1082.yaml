title: Energy-Efficient Audio Pipeline Design on Corstone-300
scenario: You are architecting an always-on keyword spotting application for a battery-powered IoT device utilizing the ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform. The system operates with a 480 MHz M7 and an Ethos-U55 NPU that shares a strict 512 KB of SRAM. You must design the data flow and partition the workload between the CPU and NPU to minimize the total energy per operation, specifically addressing the energy cost of memory access versus compute.
question: How should Corstone-300 partition CPU, NPU, and SRAM work to minimize energy for always-on keyword spotting?
details:
  realistic_solution: The optimal architecture strictly boundaries the 512 KB SRAM as the active working set. The M7 performs lightweight DSP feature extraction (e.g., MFCCs) and streams features directly into SRAM. The model must be aggressively INT8 quantized and sized so weights, activations, and the OS stack comfortably fit within 512 KB. This ensures the Ethos-U55 avoids all costly external DRAM fetches, relying purely on its native MAC throughput to finish quickly and return the SoC to deep sleep.
  common_mistake: |
    **The Pitfall:** Assuming that maximizing NPU utilization via large models is always the most energy-efficient approach.
    **The Rationale:** Candidates optimize compute FLOPs but ignore the exponentially higher energy cost of off-chip memory IO.
    **The Consequence:** Designing models that spill beyond the 512 KB SRAM causes continuous evictions to external Flash/DRAM, completely negating the Ethos-U55's compute efficiency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Shared SRAM: 512 KB. Inference operations: 10M MACs.
       - SRAM Read Energy: ~10 pJ/byte.
       - External DRAM Read Energy: ~1000 pJ/byte.
       - Compute Energy: 0.1 pJ/MAC.
    2. **Calculations:**
       - Compute Cost: 10M MACs * 0.1 pJ = 1 µJ.
       - In-SRAM Model (300 KB): 300,000 * 10 pJ = 3 µJ IO cost.
       - Spilled Model (288 KB extra): 288,000 * 1000 pJ = 288 µJ IO cost.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Energy Dominance**. Even with NPU acceleration, memory IO governs total energy. Fitting within SRAM prevents a 288 µJ tax, saving >98% of system power.
