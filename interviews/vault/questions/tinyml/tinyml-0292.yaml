title: The Tyranny of Sleep Current
scenario: You are designing a battery-powered TinyML device for an agricultural sensor network. The device
  wakes up for 100 milliseconds to run an inference, and then goes into deep sleep for two minutes before
  repeating the cycle. To meet a 5-year battery life goal, which of the following metrics is the most
  critical to minimize?
question: "To meet a 5-year battery life goal, which of the following metrics is the most critical to minimize?"
details:
  realistic_solution: The deep sleep power consumption is the most critical metric. Because the device
    is asleep for over 99% of its life (`119.9s / 120s`), the low-but-constant energy drain during sleep
    dominates the total energy consumption. A few extra microamps of sleep current can reduce the battery
    life by months or years, whereas optimizing the already-brief active power has a much smaller relative
    impact.
  common_mistake: Engineers often focus on the active power consumption during inference because it's
    orders of magnitude higher than sleep power (milliwatts vs. microwatts). They fail to account for
    the time dimension. For low-duty-cycle devices, the vast majority of the lifetime is spent in sleep
    mode, so the continuously-drawn sleep current becomes the dominant contributor to the total energy
    budget.
  napkin_math: 1. **Define Duty Cycle:** The device is active for 0.1s and sleeps for 119.9s.
  options:
  - Active power during inference (mW)
  - Deep sleep power consumption (µW)
  - Model size on Flash (KB)
  - Peak compute performance (MFLOPS)
  correct_index: 1
