title: The Tyranny of Sleep Current
scenario: You are designing a battery-powered TinyML device for an agricultural sensor network. The device wakes up for 100 milliseconds to run an inference, and then goes into deep sleep for two minutes before repeating the cycle.
question: To meet a 5-year battery life goal, which power metric is the most critical to minimize?
details:
  realistic_solution: The deep sleep power consumption is the most critical metric. Because the device is asleep for over 99% of its life (`119.9s / 120s`), the low-but-constant energy drain during sleep dominates the total energy consumption. A few extra microamps of sleep current can reduce the battery life by months or years, whereas optimizing the already-brief active power has a much smaller relative impact.
  common_mistake: |
    **The Pitfall:** Focusing heavily on the active power consumption during inference.
    **The Rationale:** Active power is orders of magnitude higher than sleep power (milliwatts vs. microwatts), making it seem like the obvious target.
    **The Consequence:** Wasting effort optimizing inference code while neglecting the continuous baseline leakage that ultimately drains the battery.
  napkin_math: |
    1. **Duty Cycle:** Active for 0.1s, sleeps for 119.9s.
    2. **Power Assumption:** Active = 10 mA, Sleep = 10 µA (0.01 mA).
    3. **Average Current:** (10 * 0.1 + 0.01 * 119.9) / 120 = (1 + 1.199) / 120 = 0.0183 mA = **18.3 µA**.
    4. **Energy Breakdown:** The sleep portion (1.199 / 2.199) accounts for **~54%** of the total energy despite being 1000x lower power. Minimizing sleep current is critical.
  options:
  - Active power during inference (mW)
  - Deep sleep power consumption (µW)
  - Model size on Flash (KB)
  - Peak compute performance (MFLOPS)
  correct_index: 1
