title: The Tyranny of Sleep Current
scenario: You are designing a battery-powered TinyML device for an agricultural sensor network. The device wakes up for 100 milliseconds to run an inference, and then goes into deep sleep for two minutes before repeating the cycle.
question: To meet a 5-year battery life goal, which power metric is the most critical to minimize?
details:
  realistic_solution: "The deep sleep power consumption is the most critical metric. Because the device is asleep for over 99% of its life, the low-but-constant energy drain dominates."
  common_mistake: |
    **The Pitfall:** Focusing heavily on the active power consumption during inference.
    **The Rationale:** Active power is orders of magnitude higher than sleep power, making it seem like the obvious target.
    **The Consequence:** Wasting effort optimizing inference code while neglecting the continuous baseline leakage that ultimately drains the battery.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active: 0.1s at 10 mA.
    - Sleep: 119.9s at 10 µA (0.01 mA).

    **Calculations:**
    - Average Current = (10 * 0.1 + 0.01 * 119.9) / 120 = 0.0183 mA (18.3 µA).
    - Sleep portion: 1.199 / 2.199 = ~54% of total energy.

    **Conclusion & Interpretation:**
    - **Result: Energy-Bound (Sleep leakage dictates over 50% of the energy budget).**
  options:
  - Active power during inference (mW)
  - Deep sleep power consumption (µW)
  - Model size on Flash (KB)
  - Peak compute performance (MFLOPS)
