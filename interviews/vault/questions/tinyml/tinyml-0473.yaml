title: The Silent Factory Failure
scenario: You deploy an INT8 KWS model on a Cortex-M4 based device using post-training quantization (PTQ). It achieves 98% accuracy on clean validation data but almost never triggers on the factory floor. The factory audio includes a loud, metallic 'CLANG!' right before the keyword. Activation values in a key convolutional layer are clamped to 127.
question: Why does a Cortex-M4 INT8 KWS model clamp factory-floor activations to 127 after clean-speech PTQ calibration?
details:
  realistic_solution: 'Root cause: PTQ calibration mismatch. Model was quantized using clean speech (range [-6.0, 6.0]) that does not represent deployment environment ([-12.0, 12.0] with background noise). INT8 scale (127/6.0 = 21.17) causes 35% of noisy activations to clip at 127, destroying information where keyword-vs-noise discrimination happens. Fix: recalibrate with representative dataset including deployment noise (fans, HVAC, chatter). New scale = 127/12.0 = 10.58, wider range at cost of 2x coarser precision on quiet inputs. Accuracy recovers from 74% to 91% on noisy inputs, -3% on clean. For production: use QAT which learns optimal scale factors during training, achieving 95% clean and 93% noisy — nearly matching FP32 (96%) with 4x less memory and 5x less energy per inference on the Cortex-M4.'
  common_mistake: |
    **The Pitfall:** Blaming the hardware or model architecture for failure.
    **The Rationale:** Engineers assume the MCU is too slow or needs higher precision, ignoring data distribution shifts.
    **The Consequence:** They waste time on hardware upgrades instead of performing QAT or recalibrating PTQ.
  napkin_math: |
    * Clean speech range: [-6.0, 6.0]. Scale = 127 / 6.0 = 21.17.
    * Factory noise peak: 12.0. Quantized value: 12.0 * 21.17 = 254 (clips to 127).
    * Fixing with new range [-12.0, 12.0]: Scale = 127 / 12.0 = 10.58.
    * **Result: Recalibrating reduces precision slightly but perfectly prevents clamping.**
  options:
  - The model has a memory leak in the convolution operator, causing a buffer overflow.
  - The Cortex-M4 CPU does not have enough computing power (MFLOPS) to execute the model in real-time.
  - The calibration dataset used for PTQ did not represent the dynamic range of real-world audio inputs, causing activation overflow.
  - The model should have been quantized to FP16 instead of INT8, as FP16 has higher precision.
  correct_index: 2
