title: The Guardian-Node Dilemma: TCO vs. Security for an On-Device Learning System
scenario: You are the Lead ML Systems Engineer for an Industrial IoT company. Your flagship product is the 'Guardian-Node', a $50 acoustic sensor used for predictive maintenance in factories. There are 1 million of these devices deployed. They are based on a Cortex-M4 MCU (1MB Flash, 256KB SRAM) and are line-powered, but customers are still sensitive to energy consumption. The MCU has no dedicated secure element.
question: What hybrid update strategy balances TCO and security for Guardian-Node devices without a secure element?
details:
  realistic_solution: The optimal solution is a risk-mitigated hybrid architecture, acknowledging that wide-open FL with no hardware security root-of-trust is too dangerous for a high-value industrial application. The candidate should reject both pure options and propose a third.
  common_mistake: |
    **The Pitfall:** Recommending pure Federated Learning (FL) for its bandwidth and privacy benefits.
    **The Rationale:** Candidates focus on network savings without considering the lack of hardware security root-of-trust on the MCU.
    **The Consequence:** The system is left vulnerable to model poisoning and gradient leakage, which is unacceptable for industrial safety.
  napkin_math: |
    *   **Centralized Updates**: 256 KB * 12 updates/yr * 2 yr = 6.14 MB/device. At $2/MB, this is $12.28 per device. Fleet cost = ~$12.3M.
    *   **Federated Learning (FL)**: 30 KB * 52 wk * 2 yr = 3.12 MB. Cost = $6.24/device. Fleet cost = ~$6.2M.
    *   **Risk**: FL without a secure element risks adversarial gradients. 1% compromised = 10K poisoned updates.
    *   **Conclusion**: **A hybrid model (FL for non-critical, signed OTA for safety) costs ~$8M and mitigates security risks.**
