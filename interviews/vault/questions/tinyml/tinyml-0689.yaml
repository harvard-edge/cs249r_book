title: 'The Guardian-Node Dilemma: TCO vs. Security for an On-Device Learning System'
scenario: You are the Lead ML Systems Engineer for an Industrial IoT company. Your flagship product is
  the 'Guardian-Node', a $50 acoustic sensor used for predictive maintenance in factories. There are 1
  million of these devices deployed. They are based on a Cortex-M4 MCU (1MB Flash, 256KB SRAM) and are
  line-powered, but customers are still sensitive to energy consumption. The MCU has no dedicated secure
  element.
details:
  realistic_solution: The optimal solution is a risk-mitigated hybrid architecture, acknowledging that
    wide-open FL with no hardware security root-of-trust is too dangerous for a high-value industrial
    application. The candidate should reject both pure options and propose a third.
  common_mistake: Focusing only on the network bandwidth savings and privacy benefits of Federated Learning
    (FL) without considering the massive increase in MLOps complexity, on-device power/compute costs,
    and the expanded attack surface. A common mistake is to hand-wave security, assuming FL is inherently
    'secure' without designing explicit defenses against model poisoning, gradient leakage, or adversarial
    clients. Another error is underestimating the financial impact of a small percentage of devices failing
    (bricking) during a full firmware OTA update.
  napkin_math: '1M devices. Centralized: 256KB×12 updates/yr×2yr=6.1MB/device×$2/MB=$12.20. Fleet: $12.2M.
    FL: 30KB×52wk×2yr=3.1MB=$6.20/device. Fleet: $6.2M. But FL without secure element→adversarial gradient
    risk. 1% compromised=10K poisoned updates. Hybrid: FL for non-critical + signed OTA for safety layers≈$8M
    with security.'
