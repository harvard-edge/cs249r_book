title: 'The Guardian-Node Dilemma: TCO vs. Security for an On-Device Learning System'
scenario: 'Your company deployed 1 million Guardian-Node acoustic sensors for industrial predictive maintenance. They use a Cortex-M4 MCU with 1MB Flash and no dedicated secure element.'
question: 'What hybrid update strategy balances TCO and security for Guardian-Node devices without a secure element?'
details:
  realistic_solution: |
    Deploy a hybrid update architecture: use Federated Learning (FL) for non-critical tweaks to save bandwidth, but enforce signed centralized OTA updates for critical model paths to prevent adversarial poisoning.
  common_mistake: |
    **The Pitfall:** Recommending pure Federated Learning (FL).
    **The Rationale:** Candidates optimize purely for network bandwidth savings, ignoring the lack of hardware security root-of-trust on the MCU.
    **The Consequence:** The industrial system is exposed to model poisoning and gradient leakage, creating unacceptable safety risks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet: 1M devices; Update Cost: $2/MB
    - Centralized Updates: ~6 MB/yr
    - FL Updates: ~3 MB/yr

    **Calculations:**
    - Centralized Cost = 6 MB * $2 * 1M = $12M
    - FL Cost = 3 MB * $2 * 1M = $6M
    - Risk Factor = 1% compromised = 10,000 poisoned model updates

    **Conclusion & Interpretation:**
    - **Result: ~$8M (Hybrid) (Security-Bound)**. The hybrid model guarantees industrial safety while still halving network TCO.
