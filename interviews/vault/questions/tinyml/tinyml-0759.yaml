title: Integer-Only Inference
scenario: Why do frameworks like TensorFlow Lite for Microcontrollers (TFLM) heavily emphasize integer-only
  (INT8) operations instead of FP32?
question: "Why do frameworks like TensorFlow Lite for Microcontrollers (TFLM) heavily emphasize integer-only (INT8) operations instead of FP32?"
details:
  realistic_solution: Many ultra-low-power microcontrollers lack a Floating Point Unit (FPU) in hardware.
    If you run FP32 math on a chip without an FPU, the compiler has to emulate the float math in software,
    which is excruciatingly slow and burns massive amounts of battery.
  common_mistake: Thinking INT8 is required because the flash storage is too small to hold the dataset.
  napkin_math: '- Cortex-M0+ at 48 MHz: INT8 multiply = 1 cycle. Software FP32 multiply = ~30-50 cycles
    (emulated). | - 250K-param model, 1 inference: ~500K MACs. INT8: 500K/48M = 10.4ms. FP32 emulated:
    500K×40/48M = 417ms. | - => INT8 is 40× faster and uses proportionally less energy (10mW vs 400mW
    at same clock).'
  options:
  - Because microcontrollers cannot physically read 32-bit words from memory.
  - Integer math is mathematically proven to be more accurate for audio processing.
  - Many microcontrollers lack hardware Floating Point Units; emulating floats in software is too slow
    and power-hungry.
  - INT8 prevents the microcontroller from being hacked via buffer overflows.
  correct_index: 2
