title: Integer-Only Inference
scenario: You are evaluating deep learning frameworks like TensorFlow Lite for Microcontrollers (TFLM) for a deployment on ultra-low-power microcontrollers. You notice a heavy emphasis on integer-only (INT8) operations instead of FP32.
question: Why do frameworks like TFLM heavily emphasize integer-only (INT8) operations instead of FP32?
details:
  realistic_solution: Many ultra-low-power microcontrollers lack a Floating Point Unit (FPU) in hardware. If you run FP32 math on a chip without an FPU, the compiler has to emulate the float math in software, which is excruciatingly slow and burns massive amounts of battery.
  common_mistake: |
    **The Pitfall:** Thinking INT8 is primarily required because flash storage is too small for datasets.
    **The Rationale:** Candidates confuse training dataset storage constraints with inference compute constraints.
    **The Consequence:** Overlooking the devastating performance and power penalty of software-emulated floating-point math on MCUs without FPUs.
  napkin_math: |
    1. **Cortex-M0+ at 48 MHz:** INT8 multiply = 1 cycle. Software FP32 multiply = ~40 cycles (emulated).
    2. **Inference Cost:** 500K MACs.
    3. **INT8 Time:** 500K / 48M = **10.4 ms**.
    4. **FP32 Time (emulated):** (500K × 40) / 48M = **417 ms**.
    5. **Conclusion:** INT8 is 40× faster and uses proportionally less energy at the same clock speed.
  options:
  - Because microcontrollers cannot physically read 32-bit words from memory.
  - Integer math is mathematically proven to be more accurate for audio processing.
  - Many microcontrollers lack hardware Floating Point Units; emulating floats in software is too slow and power-hungry.
  - INT8 prevents the microcontroller from being hacked via buffer overflows.
  correct_index: 2
