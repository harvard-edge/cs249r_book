title: Integer-Only Inference
scenario: You are evaluating deep learning frameworks like TensorFlow Lite for Microcontrollers (TFLM) for a deployment on ultra-low-power microcontrollers.
question: Why do frameworks like TFLM heavily emphasize integer-only (INT8) operations instead of FP32?
details:
  realistic_solution: Many ultra-low-power microcontrollers lack a Floating Point Unit (FPU) in hardware. Without an FPU, the compiler is forced to emulate floating-point operations in software, which is excruciatingly slow and burns massive amounts of battery.
  common_mistake: |
    **The Pitfall:** Thinking INT8 is primarily required because flash storage is too small for datasets.
    **The Rationale:** Candidates confuse training dataset storage constraints with inference compute constraints.
    **The Consequence:** Overlooking the devastating performance and power penalty of software-emulated floating-point math on MCUs without FPUs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cortex-M0+: 48 MHz, no FPU.
       - INT8 multiply = 1 cycle.
       - Emulated FP32 multiply = ~40 cycles.
    2. **Calculations:**
       - Model cost: 500K MACs.
       - INT8 inference: 500K / 48M = 10.4 ms.
       - FP32 inference (emulated): (500K * 40) / 48M = 417 ms.
    3. **Conclusion & Interpretation:**
       **Result: INT8 is 40x faster than emulated FP32.** Without an FPU, MCUs are catastrophically **Compute-Bound** on floating-point operations.
  options:
  - Because microcontrollers cannot physically read 32-bit words from memory.
  - Integer math is mathematically proven to be more accurate for audio processing.
  - Many microcontrollers lack hardware Floating Point Units; emulating floats in software is too slow and power-hungry.
  - INT8 prevents the microcontroller from being hacked via buffer overflows.
  correct_index: 2
