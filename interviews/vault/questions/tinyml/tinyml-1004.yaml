title: NPU Inference Latency and CPU Bottleneck
scenario: You are deploying a vision model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300)
  system where the 480 MHz M7 and the NPU share 512 KB of SRAM. A camera streams 256x256
  8-bit grayscale frames via DMA to SRAM, after which the NPU runs inference. Profiling
  shows end-to-end latency is ~0.7ms higher than theoretical estimates, and the M7
  CPU spikes to near 100% utilization right before the NPU starts its computation.
  What is causing this CPU bottleneck and latency degradation?
question: Why does copying a 256x256 camera frame on the 480 MHz M7 add about 0.7
  ms before Ethos-U55 inference?
details:
  realistic_solution: 'The root cause is the M7 manually copying the camera frame
    from a DMA staging buffer into the memory address allocated for the NPU''s input
    tensor. Since the M7 and Ethos-U55 share the 512 KB SRAM, the fix is to implement
    a zero-copy architecture: configure the camera''s DMA controller to write directly
    to the NPU''s input tensor buffer address, followed by an M7 cache clean/invalidate
    before triggering the NPU.'
  common_mistake: Candidates often blame NPU memory bandwidth saturation or assume
    the Ethos-U55 requires a proprietary data format conversion. They frequently miss
    that the M7 and U55 share the same SRAM, overlooking software-induced memory copy
    overheads prior to inference.
  napkin_math: 'Image size: 256 x 256 x 1 byte = 64 KB (65,536 bytes). If the M7 manually
    copies this data from a staging buffer to the NPU input tensor, a naive copy takes
    roughly 5 cycles per byte (load, store, loop branch). Total cycles: 65,536 bytes
    * 5 = 327,680 cycles. At the M7''s clock speed of 480 MHz, this copy takes 327,680
    / 480,000,000 = 0.68 ms. Using zero-copy DMA eliminates this ~0.7 ms overhead
    entirely.'
