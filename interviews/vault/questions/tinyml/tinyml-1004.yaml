title: NPU Inference Latency and CPU Bottleneck
scenario: You are deploying a vision model on an ARM Cortex-M7 + Ethos-U55 subsystem where the M7 CPU and the NPU share 512 KB of SRAM. A camera streams 256x256 8-bit grayscale frames via DMA to SRAM, after which the NPU runs inference. Profiling shows end-to-end latency is ~0.7ms higher than theoretical estimates, and the M7 CPU spikes to near 100% utilization right before the NPU starts its computation.
question: Why does copying a 256x256 camera frame on the 480 MHz M7 add about 0.7 ms before Ethos-U55 inference?
details:
  realistic_solution: 'The root cause is the M7 manually copying the camera frame from a DMA staging buffer into the memory address allocated for the NPU''s input tensor. Since the M7 and Ethos-U55 share the 512 KB SRAM, the fix is to implement a zero-copy architecture: configure the camera''s DMA controller to write directly to the NPU''s input tensor buffer address, followed by an M7 cache clean/invalidate before triggering the NPU.'
  common_mistake: |
    **The Pitfall:** Blaming NPU memory bandwidth saturation or proprietary format conversions.
    **The Rationale:** Candidates overlook software-induced memory copy overheads, forgetting that the M7 and U55 share the exact same physical SRAM.
    **The Consequence:** Wasting time tuning NPU compiler flags instead of simply pointing the DMA controller to the correct input tensor address.
  napkin_math: |
    1. **Assumptions & Constraints:** 256x256 8-bit image = 64 KB. CPU copy takes ~5 cycles/byte. Cortex-M7 at 480 MHz.
    2. **Calculations:** Total cycles = 65,536 bytes * 5 cycles/byte = 327,680 cycles. Copy latency = 327,680 / 480,000,000 Hz = 0.68 ms.
    3. **Conclusion & Interpretation:** **~0.7 ms latency overhead from CPU memory copy** (Memory-Bandwidth-Bound).
