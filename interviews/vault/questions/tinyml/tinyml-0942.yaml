title: Optimize Weight Sharing Across Transformer Layers on Flash-Limited MCU
scenario: 'A 4-layer transformer for vibration analysis on Cortex-M4 occupies 4MB
  INT8 — just at the 4MB flash limit. A new sensor requires adding 2 more layers for
  better temporal modeling, but flash cannot be expanded. You propose cross-layer
  weight sharing: layers 1&3 share weights, layers 2&4 share weights, adding 2 virtual
  layers 5&6 that share with 1&2 respectively. Evaluate the computational cost increase,
  memory impact, and expected accuracy trade-off.'
question: How would you evaluate the computational cost increase, memory impact, and
  expected accuracy trade-off?
details:
  realistic_solution: 'Original: 4 layers × 1MB/layer = 4MB flash, 4 forward passes.
    Weight sharing 4 layers → 2 unique: 2MB flash (50% savings). 6 layers × 1MB shared
    = 6 forward passes but only 2MB unique weights loaded. Compute: 6/4 = 1.5× FLOPs.
    Latency: 6/4 × baseline = 1.5× (no extra loading since weights stay in SRAM after
    first load). Flash: 2MB (saved 2MB for new use). Accuracy: cross-layer weight
    tying typically loses 1-3% on complex tasks but vibration analysis is a structured
    domain → expect ~1% loss. Net: 50% flash reduction, 50% more compute, ~1% accuracy
    cost — favorable trade-off.'
  common_mistake: Assuming weight sharing is free computationally; shared weights
    are loaded once but executed multiple times, trading flash for compute time.
  napkin_math: '4 layers × 1MB = 4MB. With sharing (2 unique weights): 2MB. 6 virtual
    layers using 2 weights: 6 forward passes × 0.5MB active = 3MB compute cost equivalent.
    Latency: 6/4 × T_4layer = 1.5×. Flash freed: 2MB available for new use. Weight
    loading: shared weights hit SRAM cache after first load → no extra I/O.'
