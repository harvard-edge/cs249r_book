title: Quantization Strategy for Edge Deployment on Cortex-M7 + Ethos-U55
scenario: You are tasked with deploying a real-time image classification model on a power-constrained
  embedded system featuring a Cortex-M7 microcontroller (480 MHz) paired with an Ethos-U55 NPU (configurable
  from 128 to 512 MACs/cycle) and limited to 512 KB of SRAM. The FP32-trained model, when initially quantized
  to INT8 using a simple Post-Training Quantization (PTQ) scheme with per-tensor symmetric quantization,
  exhibits a 5% accuracy drop and fails to meet the target inference latency. Diagnose the potential bottlenecks
  and accuracy degradation causes. Propose a refined quantization strategy, including calibration and
  arithmetic considerations, to optimize both performance and precision given the hardware constraints.
  Quantify the expected improvements.
question: "How would you improve INT8 quantization for a Cortex-M7 plus Ethos-U55 model with a 5% PTQ accuracy drop?"
details:
  realistic_solution: Implement a more advanced calibration strategy like Quantization-Aware Training
    (QAT) if the accuracy drop is severe, or explore more sophisticated PTQ methods like Advanced Quantization
    with fine-tuned calibration data or MinMax/Entropy calibration. Consider per-channel quantization
    for weights to reduce quantization error for layers with widely varying weight ranges. Explicitly
    address zero-point arithmetic to handle asymmetric activation distributions, especially for activations.
    Utilize the Ethos-U55's specific capabilities by ensuring the chosen quantization scheme (e.g., INT8
    asymmetric with explicit zero points for activations and symmetric for weights) maps efficiently to
    its instruction set, minimizing host CPU overhead and maximizing NPU utilization. Integrate hardware-aware
    quantization tools provided by ARM. Quantify memory, latency, and energy benefits expected from these
    changes.
  common_mistake: Ignoring the impact of activation distributions on quantization error, assuming simple
    per-tensor PTQ is sufficient, or failing to consider zero-point arithmetic's role in accuracy for
    asymmetric distributions. Also, not fully leveraging the NPU's capabilities by using sub-optimal quantization
    schemes or improper calibration that doesn't represent the deployment data.
  napkin_math: For memory, an INT8 model consumes 1/4th the memory of an FP32 model. For example, a layer
    with 1M FP32 weights (4MB) becomes 1M INT8 weights (1MB), a critical 3MB saving towards fitting within
    512KB SRAM. On the performance side, if the Ethos-U55 provides 512 MACs/cycle at 480MHz, its peak
    INT8 operations are ~245 GOPS. Compared to a Cortex-M7's FP32 performance, an optimized INT8 model
    on the Ethos-U55 could achieve a 4x to 16x speedup. If the original FP32 model inference takes 100ms
    on the M7, the goal would be to achieve 10-20ms with INT8 on U55. A 5% accuracy drop in a classification
    task with 1000 test samples means 50 fewer correct predictions; QAT can often recover 3-4% of this,
    mitigating the quality loss while retaining most performance gains. Quantifying the fix means stating
    how many fewer bytes are needed for weights and how many more inferences per second are achieved after
    the proposed changes.
