title: Cortex-M4 TinyML Memory Partitioning
scenario: A TinyML model requires 300 KB of memory for weights and activations combined.
  A Cortex-M4 microcontroller has exactly 256 KB of fast SRAM and 1 MB of slower Flash
  memory. The model activations require 80 KB.
question: Explain how to partition the model between SRAM and Flash to ensure it runs,
  identifying the minimum required amount of weights stored in Flash.
visual:
  kind: svg
  path: tinyml-1570.svg
  alt: A stacked bar chart comparing the 256KB SRAM capacity with the distribution
    of the 300KB model footprint.
  caption: SRAM Allocation Strategy
details:
  realistic_solution: Activations are mutable and must reside in SRAM. The 80 KB of
    activations leaves 256 KB - 80 KB = 176 KB of SRAM available for weights. Since
    total weights are 300 KB - 80 KB = 220 KB, at least 220 KB - 176 KB = 44 KB of
    weights must reside permanently in the read-only Flash memory.
  common_mistake: Placing activations in Flash (which is physically impossible/impractical
    due to read-only constraints) or failing to separate mutable state from immutable
    weights.
  napkin_math: (300 - 80) - (256 - 80) = 44 KB in Flash
