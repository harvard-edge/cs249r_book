title: Tinyml New 0038
scenario: A vision model compiled with TensorRT for Jetson Orin runs 2x slower than expected. You notice
  the architecture uses a custom Swish activation function instead of ReLU.
details:
  realistic_solution: The custom Swish activation breaks operator fusion. The compiler knows how to fuse
    Conv2D + ReLU into a single kernel, reading and writing to main memory only once. Because Swish is
    unsupported or custom, the compiler executes Conv2D, writes the massive tensor to memory, then loads
    it back to execute Swish. Replace it with a supported activation or write a custom fused CUDA plugin.
  common_mistake: Using exotic activation functions in edge deployments without verifying compiler fusion
    support.
  napkin_math: Conv+ReLU = 1 kernel. Conv+Swish = 2 kernels. 2MB tensor. Write 2MB + Read 2MB = 4MB extra
    memory traffic. At 204GB/s = ~20us penalty per layer. Over 100 layers = 2ms completely wasted on I/O.
