title: TinyML Latency Bottleneck on Cortex-M7+Ethos-U55
scenario: You are tasked with deploying a real-time keyword spotting (KWS) model on a system featuring an Arm Cortex-M7 (480 MHz) and an Ethos-U55 NPU (with 128-512 MAC/cycle capability and 512 KB SRAM). The target latency for inference is 50ms. Initial deployment shows consistent inference times of 80ms.
question: How would you identify the specific latency bottlenecks (compute, memory, or I/O) and determine NPU utilization?
details:
  realistic_solution: The realistic solution involves a systematic profiling approach. First, leverage Arm Streamline or similar embedded profiling tools (if available) with a focus on CPU activity, NPU counters, and memory access patterns. Alternatively, implement custom instrumentation (e.g., GPIO toggling, cycle counters, DWT unit) at key stages (data acquisition, pre-processing, NPU inference, post-processing) to measure elapsed time. Analyze the resulting trace data to identify where the most time is spent. For NPU utilization, inspect Ethos-U55 specific performance monitors (if exposed via CMSIS-NN/Arm NN) to determine actual MACs/cycle and active cycles. Generate flame graphs from CPU call stack profiling to visualize function hot spots. If memory bound, analyze data transfer times between SRAM and NPU, considering memory layout optimizations, data packing, and double buffering techniques to overlap computation and data movement. If compute bound on the Cortex-M7, investigate compiler optimizations, hand-optimized DSP libraries (e.g., CMSIS-DSP), or offloading more tasks to the NPU where possible. Address I/O bottlenecks by optimizing sensor interfaces or communication protocols.
  common_mistake: |
    **The Pitfall:** Immediately jumping to optimize the neural network model (e.g., pruning or quantization).
    **The Rationale:** Candidates assume the AI model is always the bottleneck, without accurately profiling the system first.
    **The Consequence:** Wasting time heavily degrading model accuracy when the actual bottleneck is a poorly coded audio ingestion pipeline.
  napkin_math: |
    - Ethos-U55 Peak: 512 MACs/cycle * 480 MHz = 245.7 GMACs/sec.
    - 100 MMAC KWS model compute time: 100M / 245.7G ≈ 0.41 ms. (If measured at 20ms, it is severely starved).
    - SRAM Memory Transfer: Moving 256KB at 4 bytes/cycle at 480MHz takes ≈ 0.13 ms.
    - Cortex-M7 Compute: 30ms pre-processing = 14.4 million cycles.
    - **Conclusion:** The bottleneck is likely **CPU pre-processing or data starvation**, not the raw NPU compute.
