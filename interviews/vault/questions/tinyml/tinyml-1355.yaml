title: TinyML Latency Bottleneck on Cortex-M7+Ethos-U55
scenario: You are tasked with deploying a real-time keyword spotting (KWS) model on a system featuring an Arm Cortex-M7 and an Ethos-U55 NPU. The target latency for inference is 50ms. Initial deployment shows consistent inference times of 80ms.
question: How would you identify the specific latency bottlenecks (compute, memory, or I/O) and determine NPU utilization?
details:
  realistic_solution: Leverage Arm Streamline or similar embedded profiling tools with a focus on CPU activity, NPU counters, and memory access patterns. Alternatively, implement custom instrumentation at key stages (data acquisition, pre-processing, NPU inference, post-processing) to measure elapsed time. For NPU utilization, inspect Ethos-U55 specific performance monitors. Generate flame graphs from CPU call stack profiling to visualize function hot spots. If memory bound, analyze data transfer times between SRAM and NPU.
  common_mistake: |
    **The Pitfall:** Immediately jumping to optimize the neural network model (e.g., pruning or quantization).
    **The Rationale:** Candidates assume the AI model is always the bottleneck, without accurately profiling the system first.
    **The Consequence:** Wasting time heavily degrading model accuracy when the actual bottleneck is a poorly coded audio ingestion pipeline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Ethos-U55 Peak: 512 MACs/cycle * 480 MHz = 245.7 GMACs/sec.
    - Model: 100 MMAC KWS model.
    - Clock: 480 MHz.

    **Calculations:**
    - Compute time: 100M / 245.7G ~ 0.41 ms.
    - SRAM Transfer: 256KB at 4 bytes/cycle at 480MHz ~ 0.13 ms.
    - Cortex-M7 Compute: 30ms pre-processing = 14.4 million cycles.

    **Conclusion & Interpretation:**
    - **Result: 14.4 million cycles (Compute-Bound)**. CPU pre-processing or data starvation is the bottleneck, not NPU compute.
