title: Per-Channel Resolution for Extreme Neural Network Outliers
scenario: After INT8 quantization, a 1D-CNN on a Cortex-M4 suffers a severe accuracy
  drop. The weight distributions reveal extreme outliers in the first convolution
  layer.
question: Explain how per-channel quantization resolves the accuracy drop caused by
  extreme weight outliers compared to per-tensor quantization.
details:
  realistic_solution: Per-tensor quantization applies a single scale factor for the
    entire layer, causing a massive outlier to squash the effective resolution of
    all other weights to zero. Per-channel quantization assigns a separate scale to
    each filter, isolating the outlier's dynamic range penalty to just its own channel.
  common_mistake: Assuming the MCU hardware inherently cannot represent large numbers,
    rather than recognizing it is a mapping and bin resolution problem.
  napkin_math: If an outlier is 100 and others are 1, a per-tensor scale of 100/127
    maps the value 1 to an INT8 value of 1, causing massive quantization error.
