title: Per-Channel Resolution for Extreme Neural Network Outliers
scenario: After INT8 quantization, a 1D-CNN on a Cortex-M4 suffers a severe accuracy drop. The weight distributions reveal extreme outliers in the first convolution layer.
question: Explain how per-channel quantization resolves the accuracy drop caused by extreme weight outliers compared to per-tensor quantization.
details:
  realistic_solution: Per-tensor quantization applies a single scale factor for the entire layer, causing a massive outlier to squash the effective resolution of all other weights to zero. Per-channel quantization assigns a separate scale to each filter, isolating the outlier's dynamic range penalty to just its own channel.
  common_mistake: |
    **The Pitfall:** Assuming the MCU hardware fundamentally lacks the precision to represent large numbers.
    **The Rationale:** Candidates mistake a mapping and bin resolution problem (quantization scaling) for a physical hardware limitation.
    **The Consequence:** The optimization is abandoned or requires unnecessary architectural overhauls.
  napkin_math: |
    - **Step 1:** Assume an outlier value is 100, while most normal weights are 1.
    - **Step 2:** Calculate per-tensor scale: 100 / 127 = 0.787.
    - **Step 3:** Quantize a normal weight: round(1 / 0.787) = 1.
    - **Result:** **The massive scale factor squashes the normal weights into a tiny range (e.g., 0 or 1), causing massive quantization error.**
