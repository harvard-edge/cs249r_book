title: Flash-to-SRAM Paging Latency
scenario: An anomaly detection model on a Cortex-M4 pages weights from a 1 MB Flash (10 MB/s bandwidth) to a 256 KB SRAM (400 MB/s bandwidth) in 32 KB blocks.
question: Apply memory-hierarchy principles to calculate the total data transfer time for paging a 160 KB model layer-by-layer.
visual:
  kind: svg
  path: tinyml-1567.svg
  alt: Bar chart comparing Flash read bandwidth with SRAM write bandwidth.
  caption: Memory bus bottleneck.
details:
  realistic_solution: The model has 160 KB / 32 KB = 5 blocks. Transferring 160 KB from Flash at 10 MB/s takes 160KB / 10,000KB/s = 0.016 seconds (16 ms). The CPU must block or double-buffer during this time, creating a hard lower bound on inference latency.
  common_mistake: |
    **The Pitfall:** Calculating based on the SRAM write speed (400 MB/s) rather than the Flash read bottleneck.
    **The Rationale:** Candidates often use the fastest number available or average the two bandwidths, misunderstanding that the slowest link in a memory hierarchy dictates the throughput.
    **The Consequence:** Vastly underestimating the I/O latency, leading to missed real-time deadlines because the CPU blocks waiting for Flash.
  napkin_math: |
    - **Model Size:** 160 KB.
    - **Block Size:** 32 KB.
    - **Transfers Needed:** 160 KB / 32 KB = 5 blocks.
    - **Flash Read Bottleneck:** 10 MB/s = 10,000 KB/s.
    - **Transfer Time:** 160 KB / 10,000 KB/s = 0.016 seconds (16 ms).
    - **Conclusion:** **The Flash bottleneck enforces a hard 16 ms latency floor, regardless of how fast the SRAM can write the data.**
