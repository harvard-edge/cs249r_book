title: Ternary Unpacking Overhead on Cortex-M33
scenario: A 100-kilobyte keyword spotting model is running on the Nordic nRF5340 (128 MHz app core, 256
  KB SRAM, ~5mA active). To reduce memory footprint, the engineering team applies extreme ternary quantization
  (-1, 0, 1), packing 4 weights per byte and reducing the model size to 25 KB. However, they observe that
  inference latency increases by roughly 3.1ms and the total energy consumed per inference rises, despite
  the memory savings. Explain why the latency and power increased despite transferring less data from
  SRAM.
details:
  realistic_solution: The ARM Cortex-M33 inside the Nordic nRF5340 has DSP instructions for 8-bit and
    16-bit multiply-accumulate operations, but no native hardware support for 2-bit/ternary math. The
    CPU must fetch the packed byte, apply bitmasks and shifts to extract each individual ternary weight,
    and convert it back to an 8-bit integer before the MAC operation can occur. This software unpacking
    introduces significant cycle overhead, extending the time the 128 MHz core remains active at ~5mA,
    thereby increasing total energy consumption.
  common_mistake: Candidates often assume that smaller weights inherently lead to faster execution due
    to reduced memory bandwidth. They fail to account for the CPU cycle overhead required to unpack sub-byte
    weights on architectures without native support for ternary or 2-bit operations.
  napkin_math: The model has 100k weights. Packing 4 weights per byte requires unpacking them at runtime.
    Assume the unpacking routine (shift, mask, sign-extend) costs 4 CPU cycles per weight. Extra cycles
    = 100,000 weights * 4 cycles/weight = 400,000 cycles. Time overhead = 400,000 cycles / 128,000,000
    Hz (128 MHz app core) = 0.003125 seconds, or 3.125 ms. With the core drawing ~5mA active current,
    this adds roughly 15.6 uC of extra charge per inference (5mA * 3.125ms).
