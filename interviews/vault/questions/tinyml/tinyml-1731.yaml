title: ARM SIMD DSP Extensions
scenario: You need to accelerate an image patch classifier on a Cortex-M4 without altering the underlying quantized weights or architecture.
question: Recall the specific architectural instruction set feature used to execute multiple INT8 MACs per clock cycle.
details:
  realistic_solution: The Cortex-M4 utilizes DSP extensions and Single Instruction, Multiple Data (SIMD) instructions. Using specialized instructions (like SMLAD) via libraries such as CMSIS-NN allows the processor to pack and execute up to four 8-bit MAC operations within a single 32-bit register per clock cycle.
  common_mistake: |
    **The Pitfall:** Stating the presence of an NPU or TPU.
    **The Rationale:** Candidates unfamiliar with edge constraints apply cloud or mobile intuition, assuming dedicated matrix accelerators are always natively available.
    **The Consequence:** Proposing impossible hardware architectures for standard Cortex-M4 deployments.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Cortex-M4.
       - Precision: 8-bit (INT8).
       - Register size: 32-bit.
    2. **Calculations:**
       - 32 bits / 8 bits = 4 MACs per cycle.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound** (The CPU can natively execute 4 INT8 MACs per cycle using SIMD).
