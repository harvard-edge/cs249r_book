title: The FreeRTOS Heap Exhaustion
scenario: You are using FreeRTOS on an MCU. Every time a new image arrives, you dynamically spawn a new
  ML worker task using `xTaskCreate()` to run the inference, and then delete the task when it finishes.
  After a few hundred images, the system crashes because `xTaskCreate` returns NULL. You have plenty of
  SRAM. Why did it fail?
question: "Why did it fail?"
details:
  realistic_solution: 'FreeRTOS''s vTaskDelete() marks a task for deletion, but actual memory reclamation
    happens in the Idle Task. If you continuously spawn new ML tasks at 10 fps, each allocating a 4KB
    stack, and the Idle Task never gets CPU time (because a new ML task is always ready), memory accumulates
    at 40KB/s. A 256KB MCU exhausts heap in ~6.4 seconds. Fix: (1) use a persistent worker task with a queue
    instead of create/delete per frame, (2) ensure the Idle Task runs between inferences by adding a brief
    vTaskDelay(1), or (3) pre-allocate the task stack statically with xTaskCreateStatic(). The dynamic
    create/delete pattern is fundamentally wrong for MCUs.'
  common_mistake: '"You didn''t delete the task correctly." You called `vTaskDelete`, but that doesn''t
    mean the memory is instantly available.'
  napkin_math: A task stack might be 4 KB. If you process 10 frames a second, you "leak" 40 KB/s if the
    Idle Task is starved. A 256 KB MCU will hard crash in exactly 6.4 seconds of continuous operation.
