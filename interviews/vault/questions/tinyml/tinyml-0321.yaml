title: 'The Energy Cost of Precision: Quantization Fundamentals'
scenario: You are designing an energy-efficient TinyML system on a modern embedded processor and need to quantify the physical constraint of numerical precision on battery life.
question: Roughly how much more energy does a 16-bit floating-point (FP16) multiplication consume compared to an 8-bit integer (INT8) multiplication?
details:
  realistic_solution: An FP16 operation consumes approximately 5 times more energy than an INT8 operation. The established invariants show that an FP32 operation costs ~18x the energy of INT8, and ~3.4x the energy of FP16. The ratio between FP16 and INT8 is therefore ~18 / 3.4 ≈ 5.3x. This non-linear difference is a critical physical constraint when designing energy-efficient TinyML systems and is a primary motivator for quantization.
  common_mistake: |
    **The Pitfall:** Assuming energy cost scales linearly with bit-width (e.g., 16-bit is 2x the cost of 8-bit).
    **The Rationale:** Engineers often equate data size directly with arithmetic complexity, ignoring that floating-point units require complex, power-hungry logic for exponents and mantissas.
    **The Consequence:** Choosing FP16 for minor accuracy gains under the false assumption of a small 2x energy penalty, ultimately draining the battery ~5x faster.
  napkin_math: |
    - **FP32 vs INT8:** FP32 uses ~18x more energy than INT8.
    - **FP32 vs FP16:** FP32 uses ~3.4x more energy than FP16.
    - **Ratio:** (FP32 / INT8) / (FP32 / FP16) = 18 / 3.4 ≈ 5.3x.
    - **Conclusion:** **An FP16 operation consumes approximately 5x more energy than an INT8 operation.**
  options:
  - About 2x more energy
  - Roughly the same, as energy is dominated by memory access
  - About 5x more energy
  - About 20x more energy
  correct_index: 2
