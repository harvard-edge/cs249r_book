title: SRAM Tensor Fragmentation
scenario: A TinyML developer notices memory fragmentation in SRAM when dynamically allocating intermediate tensors for sequential neural network layers on a Cortex-M4.
question: Analyze the memory layout and compute the required contiguous SRAM size if the maximum in-place tensor reuse overlaps an 8KB activation buffer and a 4KB output buffer.
visual:
  kind: svg
  path: tinyml-1585.svg
  alt: Memory arena block showing 8KB and 4KB residing side-by-side during inference.
  caption: Contiguous SRAM Allocation
details:
  realistic_solution: The candidate realizes that for layer-to-layer transition without copying, the system must hold both the input (8KB) and output (4KB) simultaneously. Thus, a contiguous block of 12KB is strictly required. They should recommend static arena allocation to prevent fragmentation.
  common_mistake: |
    **The Pitfall:** Assuming maximum memory is just the size of the largest single buffer.
    **The Rationale:** Candidates think the 8KB buffer entirely overlaps the 4KB buffer, failing to account for the read-then-write dependency during processing.
    **The Consequence:** Under-allocating SRAM, causing out-of-memory errors during layer-to-layer transitions.
  napkin_math: |
    - **Input Buffer:** 8 KB.
    - **Output Buffer:** 4 KB.
    - **Simultaneous Requirement:** Both must be held in memory during the layer transition.
    - **Total Contiguous SRAM:** 8 KB + 4 KB = **12 KB**.
