title: Edge Impulse vs TFLite Micro Deployment
scenario: Your team is split: half wants to use Edge Impulse, half wants TFLite Micro directly. You're deploying a keyword spotting model on an nRF52840 (Cortex-M4F, 64 MHz, 1 MB flash, 256 KB SRAM). The model is a DS-CNN with 80 KB weights.
question: When should the team choose Edge Impulse versus direct TFLite Micro for the nRF52840 keyword spotting model?
details:
  realistic_solution: 'Use Edge Impulse for rapid prototyping and non-ML teams; use TFLite Micro for maximum control and minimal footprint. Edge Impulse: 2-day development cycle, EON compiler eliminates interpreter overhead (35ms vs 45ms inference), but SDK costs 100KB more flash (250KB vs 150KB) and you lose control over quantization and custom ops. TFLite Micro: 2-week integration, smaller footprint, full control over model optimization, but requires DSP expertise. On nRF52840 (824KB available flash): Edge Impulse leaves 574KB vs TFLite''s 674KB. Choose Edge Impulse for time-to-market; TFLite Micro when every KB matters or custom ops are needed.'
  common_mistake: |
    **The Pitfall:** Dismissing Edge Impulse as just a GUI wrapper around TFLite Micro.
    **The Rationale:** Engineers prioritize maximum code control and assume managed platforms don't offer underlying compiler optimizations.
    **The Consequence:** The team misses out on the latency improvements of the EON compiler (which eliminates interpreter dispatch) and drastically increases integration time.
  napkin_math: |
    - **Total Flash**: 1024 KB.
    - **OS/Bootloader Overhead**: 48 KB (Bootloader) + 152 KB (BLE soft device) = 200 KB.
    - **Available Flash**: 824 KB.
    - **Edge Impulse App**: 824 KB - 250 KB (SDK) = 574 KB remaining.
    - **TFLite Micro App**: 824 KB - 150 KB (SDK) = 674 KB remaining.
    - **Latency**: Edge Impulse EON (35 ms) is **~22% faster** than TFLite Micro interpreter (45 ms).
