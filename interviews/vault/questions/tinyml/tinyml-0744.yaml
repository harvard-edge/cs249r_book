title: Edge Impulse vs TFLite Micro Deployment
scenario: 'Your team is split: half wants to use Edge Impulse, half wants TFLite Micro directly. You''re
  deploying a keyword spotting model on an nRF52840 (Cortex-M4F, 64 MHz, 1 MB flash, 256 KB SRAM). The
  model is a DS-CNN with 80 KB weights. Give a concrete technical comparison — not marketing — and tell
  me when each tool wins.'
question: "When should the team choose Edge Impulse versus direct TFLite Micro for the nRF52840 keyword spotting model?"
details:
  realistic_solution: 'Use Edge Impulse for rapid prototyping and non-ML teams; use TFLite Micro for maximum
    control and minimal footprint. Edge Impulse: 2-day development cycle, EON compiler eliminates interpreter
    overhead (35ms vs 45ms inference), but SDK costs 100KB more flash (250KB vs 150KB) and you lose control
    over quantization and custom ops. TFLite Micro: 2-week integration, smaller footprint, full control
    over model optimization, but requires DSP expertise. On nRF52840 (800KB available flash): Edge Impulse
    leaves 550KB vs TFLite''s 650KB. Choose Edge Impulse for time-to-market; TFLite Micro when every KB
    matters or custom ops are needed.'
  common_mistake: '"Edge Impulse is just a GUI wrapper around TFLite Micro — use TFLite directly for more
    control." Edge Impulse does use TFLite Micro under the hood, but it adds significant value in the
    deployment pipeline that isn''t just cosmetic.'
  napkin_math: 'nRF52840 flash budget: 1 MB. Bootloader: 48 KB. BLE soft device: 152 KB. Available: 800
    KB. Edge Impulse SDK (250 KB): leaves 550 KB for app code and data. TFLite Micro (150 KB): leaves
    650 KB. Difference: 100 KB — enough for ~2 weeks of on-device data logging. Inference latency for
    80 KB DS-CNN at 64 MHz: TFLite Micro interpreter = ~45 ms. Edge Impulse EON = ~35 ms (22% faster due
    to eliminated dispatch overhead). Development time: Edge Impulse = 2 days (data → deployed model).
    TFLite Micro = 2 weeks (custom MFCC + integration + testing).'
  options:
  - Edge Impulse is just a GUI wrapper around TFLite Micro — always use TFLite Micro directly for more
    control and smaller footprint.
  - 'Edge Impulse: 2-day dev cycle, EON compiler gives 22% faster inference (35ms vs 45ms) by eliminating
    interpreter dispatch, but costs 100 KB more flash (250 KB vs 150 KB SDK). TFLite Micro: 2-week integration,
    smaller footprint, full control over quantization and custom ops, but needs DSP expertise. On nRF52840
    (800 KB available): choose Edge Impulse for rapid prototyping and non-ML teams; TFLite Micro when
    every KB matters or custom ops are required.'
  - TFLite Micro is always superior because it supports a wider range of operators and produces smaller
    binaries than Edge Impulse on every target platform.
  - Edge Impulse is always superior because its cloud-based AutoML pipeline finds better model architectures
    than manual TFLite Micro development.
  correct_index: 1
