title: Analyze Transformer FLOPs on Cortex-M7+Ethos-U55
scenario: A MobileViT-XXS model (1.3M parameters, 400M MACs per inference) runs on an Arm Cortex-M7 at
  480 MHz paired with Ethos-U55 at 128 MACs/cycle at 400 MHz. The attention layers account for 35% of
  total MACs. Analyze how FLOPs distribute between the NPU-offloaded attention and CPU-handled MLP layers,
  and whether this split minimizes total latency given 51.2 GMAC/s NPU throughput vs 0.96 GMAC/s CPU throughput.
question: "How much MobileViT computation falls back to the Cortex-M7 versus Ethos-U55, and how does that affect latency?"
details:
  realistic_solution: 'Attention MACs: 0.35×400M=140M on CPU if unsupported; MLP: 260M on Ethos-U55. CPU
    time: 140M/0.96G=146ms; NPU time: 260M/51.2G=5ms. Total ≈151ms. Moving attention to NPU via static
    shapes drops to ~8ms total.'
  common_mistake: Assuming all MACs run on the NPU; Ethos-U55 supports specific operators and attention
    with dynamic shapes often falls back to CPU.
  napkin_math: 'NPU: 128 MACs/cycle × 400MHz = 51.2 GMAC/s; CPU: 2 MAC/cycle × 480MHz = 0.96 GMAC/s; ratio
    = 53×. Latency dominated by CPU fallback.'
