title: Identifying Side-Channel Attacks on Edge NPUs
scenario: You are deploying a proprietary anomaly detection model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300)
  system in a physically accessible smart-city sensor. The secret model weights are loaded into the shared
  512 KB SRAM for fast access by both the 480 MHz M7 and the NPU. The security team asks you to identify
  the specific class of physical vulnerability where an attacker monitors the hardware's electromagnetic
  emissions or power consumption during inference to reverse-engineer those weights.
question: "What physical side-channel attack can reveal proprietary Ethos-U55 model weights through power or electromagnetic traces during inference?"
details:
  realistic_solution: The correct answer is Side-Channel Attacks (specifically Differential Power Analysis
    or SPA/DPA). Since the Ethos-U55 NPU and the Cortex-M7 share the same 512 KB SRAM, the dynamic power
    consumed during repeated memory fetches and intense MAC operations strongly correlates with the operands,
    allowing an attacker to deduce the proprietary weights being processed.
  common_mistake: Candidates frequently confuse physical hardware vulnerabilities with algorithmic adversarial
    attacks (like FGSM or input perturbations) or assume that standard software encryption at rest protects
    the model during active inference in SRAM.
  napkin_math: Assuming the Ethos-U55 is configured for 256 MAC/cycle at 480 MHz, peak compute is 122.8
    GMAC/s (256 * 480e6). For a typical TinyML convolution layer requiring 1.22 million MACs, execution
    takes roughly 10 microseconds (1.22e6 / 122.8e9). If an attacker monitors the power rail with a 1
    GS/s (Giga-Sample per second) oscilloscope, they capture exactly 10,000 power data points (10 us *
    1e9) during that single layer's execution, yielding highly granular traces that reveal SRAM access
    patterns.
