title: TinyML Flatbuffer Alignment Budget
scenario: A converted TFLite Micro flatbuffer is 180 KiB. The MCU flash page size
  is 4 KiB and OTA packages must align model blobs to full pages. Estimate the flash
  space consumed after page alignment and decide if it fits a 184 KiB model partition.
question: Does a 180 KiB TinyML flatbuffer fit a 184 KiB partition after 4 KiB flash-page
  alignment?
details:
  realistic_solution: A 180 KiB blob already aligns to 45 pages of 4 KiB, so it consumes
    180 KiB and fits. If the true size were 181 KiB, it would round to 184 KiB and
    still barely fit. Any metadata beyond the aligned blob would exceed the partition.
  common_mistake: Checking the raw flatbuffer size but forgetting flash page alignment
    and metadata.
  napkin_math: 180/4 = 45 pages exactly. 181 KiB rounds up to 46 pages = 184 KiB.
