title: TinyML Flatbuffer Alignment Budget
scenario: A converted TFLite Micro flatbuffer is 180 KiB. The MCU flash page size is 4 KiB and OTA packages must align model blobs to full pages.
question: Does a 180 KiB TinyML flatbuffer fit a 184 KiB partition after 4 KiB flash-page alignment?
details:
  realistic_solution: A 180 KiB blob already aligns to 45 pages of 4 KiB, so it consumes 180 KiB and fits. If the true size were 181 KiB, it would round to 184 KiB and still barely fit. Any metadata beyond the aligned blob would exceed the partition.
  common_mistake: |
    **The Pitfall:** Forgetting to account for metadata.
    **The Rationale:** Candidates check the raw flatbuffer size and alignment but ignore OTA metadata headers.
    **The Consequence:** The final package exceeds the partition size during deployment.
  napkin_math: |
    * Calculate pages for 180 KiB: 180 / 4 = 45 pages exactly.
    * Check fit: 180 KiB <= 184 KiB partition.
    * Consider unaligned size: 181 KiB would round to 46 pages (184 KiB).
    * **Result: It fits perfectly, provided metadata does not push it over 184 KiB.**
