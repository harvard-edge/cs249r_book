title: NAS Latency Regression on Ethos-U55 NPU
scenario: A hardware-aware NAS optimizes a vision model for an ARM Cortex-M7 + Ethos-U55 (512 KB shared SRAM). The NAS identifies an architecture with fewer FLOPs than the baseline, but the inference latency is 3x higher when deployed.
question: Why does an Ethos-U55 NAS candidate with fewer FLOPs run 3x slower on a 512 KB Corstone-300 system?
details:
  realistic_solution: The NAS selected operators or tensor shapes that are unsupported by the Ethos-U55 NPU, forcing a fallback to the slower Cortex-M7 CPU. Even though the overall FLOP count is lower, the unsupported operations partition the model, causing costly context switching and data movement between the NPU and CPU within the shared SRAM.
  common_mistake: |
    **The Pitfall:** Assuming fewer FLOPs always correlates with lower execution latency.
    **The Rationale:** Candidates incorrectly assume the NPU executes all operations uniformly, forgetting that unsupported operations fall back to the slow CPU.
    **The Consequence:** The NAS outputs mathematically smaller models that stall catastrophically in production due to context switching.
  napkin_math: |
    - 1,000,000 MACs on Ethos-U55 (256 MACs/cycle @ 480 MHz): 1M / (256 * 480M) = 0.008 ms.
    - Fallback to Cortex-M7 CPU (2 MACs/cycle @ 480 MHz): 1M / (2 * 480M) = 1.04 ms.
    - **The unsupported fallback layer takes ~130x longer to compute, easily explaining the 3x overall latency increase.**
