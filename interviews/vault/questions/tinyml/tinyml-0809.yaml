title: Tinyml New 0033
scenario: An audio ML model executes in 40ms. The microphone DMA buffer fills up with new audio every
  32ms. The predictions are terrible and constantly fluctuating in accuracy.
question: "Why are audio predictions fluctuating when inference takes 40 ms but DMA fills the buffer every 32 ms, and what should be changed?"
details:
  realistic_solution: The symptom is an audio buffer overrun. Because inference (40ms) takes longer than
    the buffer fill time (32ms), the DMA controller overwrites the tail end of the audio buffer while
    the CPU is still running the FFT or CNN on the front end. The model receives corrupted, spliced audio.
    To fix this, you must optimize the inference < 32ms or use double buffering (ping-pong) and skip frames.
  common_mistake: Ignoring the mathematical relationship between real-time data ingestion rates and raw
    inference latency.
  napkin_math: Buffer fills in 32ms. Inference takes 40ms. The DMA will overwrite the last 8ms of the
    data currently being analyzed. 8ms / 32ms = 25% of the frame is overwritten with the next time-step,
    corrupting features.
