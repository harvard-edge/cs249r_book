title: Tinyml New 0033
scenario: An audio ML model executes in 40ms. The microphone DMA buffer fills up with new audio every 32ms. The predictions are terrible and constantly fluctuating in accuracy.
question: Why are audio predictions fluctuating when inference takes 40 ms but DMA fills the buffer every 32 ms, and what should be changed?
details:
  realistic_solution: The symptom is an audio buffer overrun. Because inference (40ms) takes longer than the buffer fill time (32ms), the DMA controller overwrites the tail end of the audio buffer while the CPU is still running the FFT or CNN on the front end. The model receives corrupted, spliced audio. To fix this, you must optimize the inference < 32ms or use double buffering (ping-pong) and skip frames.
  common_mistake: |
    **The Pitfall:** Ignoring the timing relationship between ingestion and inference.
    **The Rationale:** Assuming that memory buffers are safely isolated during computation without explicitly implementing double buffering or checking deadlines.
    **The Consequence:** The model receives corrupted, spliced audio frames, leading to wildly fluctuating and terrible predictions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Buffer Fill Time: 32 ms.
    - Inference Time: 40 ms.

    **Calculations:**
    - Overwrite Duration: 40 ms - 32 ms = 8 ms.
    - Corruption Ratio: 8 ms / 32 ms = 0.25.

    **Conclusion & Interpretation:**
    - **Result: 25% of the frame is overwritten (Synchronization-Bound)**. The DMA controller overwrites the buffer while the CPU is still analyzing, corrupting the input features.
