title: Active Learning Data Pipeline for nRF5340 Anomaly Detection
scenario: Design an active learning and dataset curation pipeline for a fleet of industrial vibration
  sensors powered by the Nordic nRF5340. The devices monitor motor bearings and stream data via BLE 5.3.
  Given the nRF5340's ~5mA active current constraint, transmitting raw vibration data continuously is
  not viable. Architect a system that selects the most informative anomalous events on-device using the
  128 MHz app core to trigger selective data transmission for human annotation, ensuring the curated dataset
  captures diverse failure modes without extreme class imbalance.
question: "How should nRF5340 vibration sensors curate active-learning data without continuously streaming raw signals?"
details:
  realistic_solution: Implement a lightweight uncertainty sampling mechanism on the nRF5340's 128 MHz
    app core. An initial, small anomaly detection model evaluates live vibration windows. If the reconstruction
    error or confidence score falls within an uncertainty margin, the event is flagged. The system buffers
    these rare events in the 256 KB SRAM and transmits them via BLE 5.3 during scheduled intervals. In
    the cloud, the data is clustered to identify novel failure modes before sending to human annotators,
    prioritizing diversity in the curated dataset.
  common_mistake: Candidates often suggest transmitting all data to the cloud for filtering, which drains
    the battery and violates the ~5mA active power constraint by keeping the BLE radio constantly on.
    Alternatively, they might propose a basic thresholding technique on-device that leads to redundant
    annotations of the same common failure mode, failing to curate a diverse dataset.
  napkin_math: Continuous BLE 5.3 transmission might consume ~10mA, depleting a coin cell rapidly. By
    running inference on the 128 MHz app core (taking ~2ms per window, consuming ~5mA active), we only
    transmit uncertain events. A 1-second 3-axis accelerometer window at 200Hz (16-bit) is 1.2 KB. Storing
    100 uncertain events takes 120 KB, well within the 256 KB SRAM. If only 1% of events are flagged for
    transmission, BLE radio duty cycle drops drastically, allowing the curation pipeline to collect high-value
    anomalies while meeting power budgets.
