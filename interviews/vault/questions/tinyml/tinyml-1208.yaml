title: Ethos-U55 Compiler Tiling for Operator Fallback
scenario: You are designing an AOT compilation strategy for the ARM Cortex-M7 + Ethos-U55
  (Corstone-300) system. A model contains an unsupported custom activation function
  sandwiched between two U55-supported Conv2D layers. The intermediate activation
  is 300 KB, but the system only has 512 KB of shared SRAM, leaving insufficient room
  for ping-pong buffers. Design a compiler pass that synthesizes a novel tiling and
  pipelining architecture between the U55 and M7 to avoid spilling to slow external
  memory.
question: How would you design a compiler pass that synthesizes a novel tiling and
  pipelining architecture between the U55 and M7 to avoid spilling to slow external
  memory?
details:
  realistic_solution: The compiler must implement spatial tiling (strip-mining) and
    emit a software pipeline. By slicing the graph into smaller execution sub-graphs
    (e.g., 50 KB tiles), the U55 can compute tile N+1 while the 480 MHz M7 processes
    the custom activation for tile N. This easily fits within the 512 KB SRAM limit
    using circular buffers and partially hides the M7's execution latency behind the
    NPU's throughput.
  common_mistake: Candidates often suggest a naive operator fallback, where the compiler
    executes the first Conv2D on the U55, yields to the M7 for the custom activation,
    and then returns to the U55. This ignores the 512 KB SRAM limit, as holding both
    the 300 KB input and 300 KB output tensors for the activation function requires
    600 KB, resulting in an OOM error or a disastrous spill to slow external memory.
  napkin_math: Given 512 KB SRAM, a naive full-tensor fallback needs 300 KB (input)
    + 300 KB (output) = 600 KB (OOM). By strip-mining into 50 KB tiles, the compiler
    allocates 3 buffers (150 KB total) for a U55-M7-U55 pipeline. If a tile requires
    1M MACs, a 256 MAC/cycle U55 computes it in ~3,900 cycles (8.1 μs at 480 MHz).
    The M7 processing 50K elements at 10 cycles/element takes 500,000 cycles (1.04
    ms). The compiler's cost model reveals the M7 is the severe bottleneck, requiring
    the generation of vectorized DSP instructions or LUTs to balance the pipeline.
