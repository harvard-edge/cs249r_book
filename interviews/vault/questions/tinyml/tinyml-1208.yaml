title: Ethos-U55 Compiler Tiling for Operator Fallback
scenario: You are designing an AOT compilation strategy for the ARM Cortex-M7 + Ethos-U55 (Corstone-300) system. A model contains an unsupported custom activation function sandwiched between two U55-supported Conv2D layers. The intermediate activation is 300 KB, but the system only has 512 KB of shared SRAM, leaving insufficient room for ping-pong buffers.
question: How can a compiler synthesize tiling and pipelining between the U55 and M7 to avoid spilling a 300 KB activation to external memory?
details:
  realistic_solution: The compiler must implement spatial tiling (strip-mining) and emit a software pipeline. By slicing the graph into smaller execution sub-graphs (e.g., 50 KB tiles), the U55 can compute tile N+1 while the 480 MHz M7 processes the custom activation for tile N. This easily fits within the 512 KB SRAM limit using circular buffers and partially hides the M7's execution latency behind the NPU's throughput.
  common_mistake: |
    **The Pitfall:** Suggesting a naive operator fallback where the full tensor is passed between processors.
    **The Rationale:** Candidates ignore the 512 KB SRAM limit, failing to realize that holding both 300 KB input and 300 KB output tensors requires 600 KB.
    **The Consequence:** The system will suffer an out-of-memory error or disastrous performance from spilling to slow external memory.
  napkin_math: |
    - Naive fallback: 300 KB input + 300 KB output = 600 KB (OOM).
    - Strip-mining: Slice into 50 KB tiles. Allocate 3 buffers (150 KB total) for U55-M7-U55 pipeline.
    - U55 computes tile N+1: 1M MACs / 256 MACs/cycle = ~3,900 cycles (8.1 µs at 480 MHz).
    - M7 computes custom activation for tile N: 50K elements * 10 cycles = 500,000 cycles (1.04 ms).
    - **Final Result:** The pipeline fits in SRAM, but the **M7 becomes the severe bottleneck**, requiring vectorized DSP instructions or LUTs to balance.
