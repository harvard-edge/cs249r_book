title: Hardware-Aware NAS for TinyML on Cortex-M7 + Ethos-U55
scenario: >
  A TinyML anomaly detection project uses a Cortex-M7 (480 MHz) and Ethos-U55 NPU (256 MACs/cycle) with 512 KB of SRAM.
  Deployment requires inference latency under 80ms and a memory footprint under 350KB.
question: How should a hardware-aware NAS pipeline find an Ethos-U55 anomaly model under 80 ms latency and 350 KB memory?
details:
  realistic_solution: |
    A tightly coupled hardware-software co-design approach:
    1. **Search Space Definition**: Tailored to Ethos-U55 efficient ops (depthwise separable convolutions, INT8 quantization).
    2. **Hardware Constraint Integration**: Use a hardware-specific latency predictor (e.g., trained proxy model) instead of theoretical FLOPs. The 350KB limit is a strong penalty term in the reward function, inspired by MCUNet-style Macro/Micro-NAS.
    3. **Search Algorithm**: Reinforcement learning or evolutionary NAS pruning candidates violating hard memory/latency constraints early.
    4. **Evaluation**: Validate promising architectures on a hardware simulator before full training.
  common_mistake: |
    **The Pitfall:** Treating NAS as purely algorithmic optimization based on theoretical FLOPs and parameter counts.
    **The Rationale:** Candidates fail to integrate hardware specifics like Ethos-U55 supported ops, memory bandwidth, and CPU/NPU data movement costs.
    **The Consequence:** Discovered models fail to run on the NPU, falling back to slow CPU execution or exceeding SRAM limits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SRAM limit: 350 KB for weights + activations.
       - Latency limit: 80 ms.
       - NPU: 256 MACs/cycle at 480 MHz.
    2. **Calculations:**
       - Memory check (example 8-bit layer: 3x3 kernel, 32 in, 64 out):
         - Weights: 3*3*32*64 = 18.4 KB.
         - Activations (32x32x64): 65.5 KB. Total per layer: ~84 KB. Budget shrinks fast.
       - Latency check (theoretical max NPU MACs):
         - 256 MACs/cycle * 480e6 cycles/s * 0.080 s = 9.8 GMACs limit.
    3. **Conclusion & Interpretation:** Hardware constraints require extreme pruning. **Result: Memory & Latency Bound NAS constraint**.
