title: 'The Siren''s Screech: Designing a Robust Hearing Aid'
scenario: You are the Lead ML Systems Engineer at a next-gen hearing aid startup. Your team has developed
  a state-of-the-art noise cancellation model (a small U-Net) that runs perfectly in FP32. Now, you must
  deploy it to a Cortex-M7 based device with a hard constraint of 256 KB of SRAM for the model's tensor
  arena and a 10ms latency budget.
details:
  realistic_solution: The correct approach is to design a *mixed-precision* strategy based on an analysis
    of the model architecture and the physics of the hardware. The screeching is caused by activation
    value overflow in the initial layers of the network, which process the raw, high-dynamic-range audio
    waveform. Deeper layers work with more abstract, lower-dynamic-range features.
  common_mistake: 'The most common mistake is to blame the calibration dataset. An engineer might say,
    ''We just need to add more siren sounds to our calibration data.'' While a representative calibration
    set is crucial for setting the right scaling factors, it cannot solve the fundamental problem: the
    dynamic range of the input signal *at inference time* exceeds the representational capacity of an
    8-bit integer. A single loud event can cause activation values to overflow, and no amount of statistical
    calibration can prevent that clipping. Another common mistake is suggesting retraining (Quantization-Aware
    Training), which is a valid technique but doesn''t change the 8-bit container''s inherent limitations
    and adds significant development overhead.'
  napkin_math: '250K params. Full INT8=250KB. Mixed: first 2 layers (50K) FP16=100KB + rest INT8=200KB=300KB
    Flash. Arena: INT8 activations ~200KB + FP16 overhead ~8KB=208KB<256KB. Latency@M7@480MHz: 80% INT8
    (SIMD 4ops/cyc) + 20% FP16 (~2ops/cyc) = ~1.2x slower than full INT8. If INT8=8ms, mixed=9.6ms<10ms
    budget.'
