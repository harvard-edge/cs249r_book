title: ESP32-S3 Quantization Strategy Design
scenario: You are architecting the quantization pipeline for a predictive maintenance model deploying
  to an ESP32-S3 (240 MHz dual-core Xtensa). The raw FP32 model requires 1.8 MB for weights and 400 KB
  for activations. To meet real-time latency constraints, inference must run entirely from the 512 KB
  SRAM, avoiding the slower 8 MB PSRAM. Design a quantization strategy (PTQ vs QAT, per-channel vs per-tensor,
  INT8 vs INT4) that leverages the Xtensa vector extensions for INT8 to fit the model into SRAM while
  minimizing accuracy degradation.
question: "Which ESP32-S3 quantization strategy fits the predictive maintenance model in fast SRAM without sacrificing INT8 acceleration?"
details:
  realistic_solution: The candidate should evaluate that INT8 quantization reduces the 1.8 MB weights
    to 450 KB and 400 KB activations to 100 KB, totaling 550 KB, which still exceeds the 512 KB SRAM.
    Since the ESP32-S3 has INT8 vector extensions, INT8 is mandatory for speed. The design must therefore
    combine INT8 QAT (per-channel for weights, per-tensor for activations) with an additional technique
    like weight pruning or streaming weights from PSRAM in background DMA chunks to fit the tight SRAM
    constraints.
  common_mistake: Candidates often suggest mixed-precision or INT4 without realizing the ESP32-S3's vector
    extensions are optimized specifically for INT8 operations, leading to unoptimized software fallback.
    They also frequently fail to calculate that INT8 alone is insufficient to fit both weights and activations
    into the available SRAM without additional architectural changes.
  napkin_math: 'Original FP32: 1.8 MB (weights) + 400 KB (activations) = 2.2 MB. INT8 Quantization (4x
    reduction): 1.8 MB / 4 = 450 KB weights; 400 KB / 4 = 100 KB activations. Total INT8 size = 550 KB.
    550 KB > 512 KB ESP32-S3 SRAM. Deficit = 550 - 512 = 38 KB. Therefore, INT8 quantization alone is
    insufficient to keep all data in SRAM, requiring architectural mitigations like DMA from the 8 MB
    PSRAM.'
