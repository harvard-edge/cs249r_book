title: The CMSIS-NN SIMD Dividend
scenario: >
  To optimize the 5M MAC keyword spotting model, you integrate the ARM CMSIS-NN library. This allows the Cortex-M4 to leverage its 32-bit SIMD (Single Instruction, Multiple Data) capabilities for INT8 math, achieving the theoretical peak performance of 1 MAC per clock cycle.
question: >
  What is the new, optimized inference time on the same 168 MHz MCU?
details:
  realistic_solution: >
    With CMSIS-NN, the cycles per MAC is reduced to the chip's theoretical peak.
  common_mistake: |
    **The Pitfall:** Confusing the number of operations (FLOPs) in a MAC with the number of cycles it takes to execute.
    **The Rationale:** A MAC consists of 2 operations, so engineers might incorrectly divide performance by 2, failing to appreciate the efficiency of fused hardware instructions.
    **The Consequence:** They underestimate the performance capabilities of the MCU when properly utilizing SIMD libraries.
  napkin_math: |
    - **Total Cycles:** 5,000,000 MACs × 1 cycle/MAC = 5,000,000 cycles.
    - **Inference Time:** 5,000,000 cycles / 168,000,000 cycles/second = 0.02976 seconds.
    - **Conclusion:** This equates to approximately **29.8 ms**, a massive speedup over unoptimized code.
  options:
  - ~119 ms
  - ~59.5 ms
  - ~29.8 ms
  - ~7.4 ms
  correct_index: 2
