title: Calculate Energy Per Inference on Cortex-M4
scenario: You are deploying a wake-word detection model on an ARM Cortex-M4 (STM32F4) running at 168 MHz. The MCU consumes 40 mA at 3.3V when active, and your model requires 2.5 million INT8 MAC operations per inference.
question: How much energy does one STM32F4 wake-word inference consume at 1.5 INT8 MACs per cycle and 40 mA?
details:
  realistic_solution: To find the energy per inference, first calculate the total clock cycles required by dividing the total MACs by the MACs per cycle. Next, determine the execution time by dividing the total cycles by the 168 MHz clock frequency. Finally, calculate the active power (Current x Voltage) and multiply it by the execution time to get the total energy.
  common_mistake: |
    **The Pitfall:** Using the theoretical peak of 2x INT8 MACs/cycle instead of the real-world average.
    **The Rationale:** Relying on datasheet maximums and failing to account for SRAM access overhead and pipeline stalls.
    **The Consequence:** Underestimating the execution time and incorrectly calculating the total active energy required per inference in Joules.
  napkin_math: |
    1. **Total Cycles:** 2,500,000 MACs / 1.5 MACs/cycle = 1,666,666.67 cycles.
    2. **Execution Time:** 1,666,666.67 cycles / 168,000,000 Hz = 0.00992 seconds (**9.92 ms**).
    3. **Active Power:** 0.040 A * 3.3 V = **0.132 W**.
    4. **Energy per Inference:** 0.132 W * 0.00992 s = **0.00131 Joules** (1.31 mJ).
