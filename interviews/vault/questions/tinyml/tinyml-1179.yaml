title: Calculate Energy Per Inference on Cortex-M4
scenario: You are deploying a wake-word detection model on an MCU running at 168 MHz. The MCU consumes 40 mA at 3.3V when active, and your model requires 2.5 million INT8 MAC operations per inference.
question: How much energy does one wake-word inference consume at 1.5 INT8 MACs per cycle and 40 mA?
details:
  realistic_solution: "Calculate total clock cycles required by dividing total MACs by MACs per cycle. Determine execution time, calculate active power, and multiply to get total energy."
  common_mistake: |
    **The Pitfall:** Using the theoretical peak of 2x INT8 MACs/cycle instead of the real-world average.
    **The Rationale:** Relying on datasheet maximums and failing to account for SRAM access overhead and pipeline stalls.
    **The Consequence:** Underestimating the execution time and incorrectly calculating the total active energy required per inference in Joules.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Operations: 2.5M INT8 MACs.
       - Compute: 1.5 MACs/cycle average @ 168 MHz.
       - Active Power: 40 mA @ 3.3V.
    2. **Calculations:**
       - Total Cycles: 2.5M / 1.5 = 1,666,666.67 cycles.
       - Execution Time: 1,666,666.67 / 168,000,000 Hz = 9.92 ms.
       - Active Power: 0.040 A * 3.3 V = 0.132 W.
       - Energy per Inference: 0.132 W * 0.00992 s = 0.00131 J (1.31 mJ).
    3. **Conclusion & Interpretation:**
       - **Result: Energy-Bound (1.31 mJ per inference consumed).**
