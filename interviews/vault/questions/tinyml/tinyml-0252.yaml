title: The Microcontroller's Memory Wall
scenario: A key metric for understanding a processor's performance is its 'Ridge Point'
  in the Roofline model. What is the approximate Ridge Point for a typical Cortex-M4
  microcontroller? Express your answer in operations per byte.
question: What is the approximate Ridge Point for a typical Cortex-M4 microcontroller?
details:
  realistic_solution: The Ridge Point is approximately 0.5 Ops/Byte. This extremely
    low number signifies that the Cortex-M4 is computationally bottlenecked. To be
    memory-bound on this hardware, a kernel needs an arithmetic intensity below 0.5
    operations per byte. Most ML workloads (like convolutions or dense layers) have
    arithmetic intensities well above this (often 10+ Ops/Byte). Therefore, contrary
    to intuition from cloud GPUs, neural networks on microcontrollers are almost universally
    compute-bound, not memory-bound.
  common_mistake: Engineers accustomed to cloud GPUs (which have high Ridge Points
    like 100+ Ops/Byte and are heavily memory-bound for many workloads) often assume
    microcontrollers suffer the same memory wall. In reality, the MCU's memory bandwidth
    is plentiful relative to its very weak ALU, making the system firmly compute-bound.
  napkin_math: Peak compute (Cortex-M4 100 MHz, 2 Ops/cycle) = 200 MACC/s = 200 MOPS.
    Peak memory bandwidth (32-bit bus at 100 MHz) = 400 MB/s. Ridge Point = 200 /
    400 = 0.5 Ops/Byte.
  options:
  - ~200 Ops/Byte
  - ~20 Ops/Byte
  - ~0.5 Ops/Byte
  - ~5 Bytes/Op
  correct_index: 2
