title: 'Dataset Curation: Specification — TinyML Dataset Quality SLA for Medical Wearable'
scenario: Write the data quality specification for a fall detection model on Cortex-M7+Ethos-U55 (480MHz, 512KB SRAM) embedded in a medical alert device. The model must achieve < 1% false alarm rate and > 99% fall detection sensitivity.
question: What quantitative dataset quality SLAs are needed for a medical fall detector to meet sensitivity and false alarm targets?
details:
  realistic_solution: 'SLAs: (1) Volume: >= 500 fall events per fall type (forward, backward, sideways) = 1,500 total falls. (2) Demographics: 20-80 age range, both sexes, BMI 18-35, 50 subjects minimum. (3) Environment: kitchen, bathroom, bedroom, outdoors. (4) Label quality: sensor-confirmed (pressure mat or video review), not self-reported. (5) Near-falls: >= 200 stumble events labeled ''not fall'' for hard negatives.'
  common_mistake: |
    **The Pitfall:** Not specifying SLAs for near-miss events (stumbles).
    **The Rationale:** Focusing only on obvious falls and normal ADLs (Activities of Daily Living) without providing hard negative examples.
    **The Consequence:** The model triggers false alarms every time the user sits down heavily or stumbles, violating the < 1% false alarm rate.
  napkin_math: |
    1. **Data Volume:** 1,500 falls + 200 stumbles + 10,000 normal ADLs = 11,700 total events.
    2. **Data Size per Event:** 6-axis IMU (Acc+Gyro) @ 200Hz for 2 seconds = 200 * 6 * 4B * 2 = 9.6 KB/event.
    3. **Total Dataset Size:** 11,700 * 9.6 KB = **112 MB**.
    4. **Collection Cost:** 50 subjects * 30 falls = 1,500 falls. $200/session = $10,000.
    5. **Labeling Cost:** Video review @ $2/event * 11,700 = $23,400.
    6. **Total Budget:** **~$33,400**.
