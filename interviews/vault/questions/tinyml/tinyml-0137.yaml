title: The 4x Integer Speedup
scenario: You are tasked with optimizing a keyword-spotting model on a Cortex-M4 microcontroller which
  lacks a hardware FPU. To do this, you use 8-bit quantization for your model's weights and activations.
  When using the Arm CMSIS-NN library, what is the theoretical throughput gain for 8-bit integer operations
  that can be fully parallelized, compared to a naive C implementation?
details:
  realistic_solution: The correct answer is a **4x** speedup. A 32-bit register on a Cortex-M processor
    can pack four 8-bit integers. SIMD instructions, exposed via CMSIS-NN, can execute a single operation
    (like an addition or multiplication) on all four of these integers simultaneously in one clock cycle.
    A naive implementation would require a loop running four times to process each integer individually.
  common_mistake: A common mistake is to assume that without a hardware FPU, no significant acceleration
    is possible. Engineers often forget that the DSP extensions on many Cortex-M cores provide powerful
    SIMD (Single Instruction, Multiple Data) capabilities for integer arithmetic. This allows the processor
    to perform the same operation on multiple data points packed into a single 32-bit register, yielding
    a significant throughput increase.
  napkin_math: The Cortex-M4 supports DSP extensions (SIMD) with 32-bit registers. With 8-bit quantization,
    you can pack four 8-bit values into a single 32-bit register. Instructions like SMLAD allow performing
    operations on these packed bytes simultaneously. 32-bit register / 8-bit data = 4 operations per instruction
    (4x speedup).
  options:
  - 1x (no speedup without a hardware FPU)
  - 2x (assuming only dual-MAC instructions apply)
  - 4x (packing four 8-bit integers into a 32-bit register)
  - 32x (confusing register width with SIMD throughput)
  correct_index: 2
