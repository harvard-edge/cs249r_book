title: The 4x Integer Speedup
scenario: You are tasked with optimizing a keyword-spotting model on a Cortex-M4 microcontroller which lacks a hardware FPU. To do this, you use 8-bit quantization for your model's weights and activations.
question: When using the Arm CMSIS-NN library, what is the theoretical throughput gain for 8-bit integer operations that can be fully parallelized, compared to a naive C implementation?
details:
  realistic_solution: The correct answer is a 4x speedup. A 32-bit register on a Cortex-M processor can pack four 8-bit integers. SIMD instructions, exposed via CMSIS-NN, can execute a single operation (like an addition or multiplication) on all four of these integers simultaneously in one clock cycle. A naive implementation would require a loop running four times to process each integer individually.
  common_mistake: |
    **The Pitfall:** Assuming that without a hardware FPU, no significant acceleration is possible.
    **The Rationale:** Engineers often forget that the DSP extensions on many Cortex-M cores provide powerful SIMD capabilities for integer arithmetic.
    **The Consequence:** Missing out on a massive throughput increase by not utilizing CMSIS-NN and SIMD instructions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cortex-M4 has 32-bit registers.
       - Model uses 8-bit quantized values.
    2. **Calculations:**
       - Packing ratio = 32 bits / 8 bits = 4 operations per register.
       - Single SIMD instruction processes 4 operations concurrently.
    3. **Conclusion & Interpretation:**
       - **Result: 4x Speedup.** Packing four 8-bit integers into a 32-bit register yields a theoretical 4x throughput increase over naive C.
  options:
  - 1x (no speedup without a hardware FPU)
  - 2x (assuming only dual-MAC instructions apply)
  - 4x (packing four 8-bit integers into a 32-bit register)
  - 32x (confusing register width with SIMD throughput)
  correct_index: 2
