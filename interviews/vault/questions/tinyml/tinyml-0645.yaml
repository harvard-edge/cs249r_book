title: 'The Cache-Line False Sharing'
scenario: 'You are using a dual-core Cortex-M7 (e.g., STM32H7 dual-core). Core 0 runs an anomaly detection ML model. Core 1 runs a high-frequency sensor filtering loop. Both cores are reading and writing to separate, independent variables in SRAM. However, profiling shows that Core 0''s ML execution time degrades by 30% when Core 1 is active. There are no shared variables or mutexes.'
question: 'Why does Core 0''s Cortex-M7 ML inference slow by 30% when Core 1 writes independent SRAM variables?'
details:
  realistic_solution: 'False sharing in the L1 data cache. Both cores'' independent variables happen to reside on the same 32-byte cache line. When Core 1 writes its variable, the cache coherency protocol invalidates that entire cache line on Core 0, forcing a slow SRAM refetch. Fix: align each core''s frequently-written variables to separate cache line boundaries using __attribute__((aligned(32))).'
  common_mistake: |
    **The Pitfall:** Blaming SRAM bus contention.
    **The Rationale:** While bus contention exists, a 30% penalty for accessing separate variables points to hardware-level cache synchronization overhead.
    **The Consequence:** Failing to diagnose false sharing, leading to ineffective software workarounds instead of properly aligning memory structures.
  napkin_math: |
    **Assumptions & Constraints:**
    - L1 Cache Hit: 1 cycle.
    - SRAM Fetch: ~6 cycles.

    **Calculations:**
    - Invalidations: If False Sharing forces 100,000 cache misses per second.
    - Cycle Loss: 100,000 * 5 cycles (penalty) = 500,000 clock cycles lost.

    **Conclusion & Interpretation:**
    - **Result: 500,000 Cycles (Memory-Bound)**. False sharing incurs pure hardware synchronization overhead.
