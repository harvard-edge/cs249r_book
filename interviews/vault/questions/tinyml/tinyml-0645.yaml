title: The Cache-Line False Sharing
scenario: You are using a dual-core Cortex-M7 (e.g., STM32H7 dual-core). Core 0 runs an anomaly detection
  ML model. Core 1 runs a high-frequency sensor filtering loop. Both cores are reading and writing to
  separate, independent variables in SRAM. However, profiling shows that Core 0's ML execution time degrades
  by 30% when Core 1 is active. There are no shared variables or mutexes. What microarchitectural feature
  is causing the slowdown?
details:
  realistic_solution: 'False sharing in the L1 data cache. Both cores'' independent variables happen to
    reside on the same 32-byte cache line. When Core 1 writes its variable, the cache coherency protocol
    invalidates that entire cache line on Core 0, forcing a slow SRAM refetch (~6 cycles vs 1 cycle).
    With 100K invalidations/second, Core 0 loses 500K cycles to false sharing. Fix: align each core''s
    frequently-written variables to separate cache line boundaries using __attribute__((aligned(32))).
    This ensures that Core 1''s writes never invalidate Core 0''s cached data. The variables are logically
    independent but physically adjacent in memory.'
  common_mistake: '"SRAM bus contention." While bus contention exists, a 30% penalty for accessing separate
    variables points to the cache layer.'
  napkin_math: An L1 Cache hit takes 1 cycle. An SRAM fetch takes ~6 cycles. If False Sharing forces 100,000
    cache misses per second, you lose 500,000 clock cycles to pure hardware synchronization overhead.
