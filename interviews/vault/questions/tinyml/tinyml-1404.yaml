title: Optimizing TinyML Inference on ARM Cortex-M4 via Pruning and Sparsity
scenario: A company is developing a low-power, real-time keyword spotting application for an IoT device using an ARM Cortex-M4 microcontroller (STM32F4 series, 168 MHz, 256 KB SRAM, no FPU). Your existing convolutional neural network model, while accurate, consumes 400 KB of memory and inference takes 300 ms, failing to meet the device's 200 KB memory budget and 100 ms real-time latency requirement. You are tasked with optimizing this model using pruning and sparsity techniques.
question: How should pruning and sparsity optimize a Cortex-M4 KWS model from 400 KB and 300 ms to 200 KB and 100 ms?
details:
  realistic_solution: A realistic solution would prioritize structured pruning (e.g., channel pruning, filter pruning) first, as it intrinsically reduces the tensor dimensions, making memory access patterns more contiguous and easier to optimize for integer-only operations. This would be followed by aggressive 8-bit post-training quantization. The iterative process would involve pruning, fine-tuning, quantifying, and profiling on the actual hardware, carefully balancing accuracy with memory (weights + activations) and latency, ensuring all intermediate tensors fit within 256 KB SRAM.
  common_mistake: |
    **The Pitfall:** Exclusively applying unstructured pruning.
    **The Rationale:** Candidates assume general sparsity tools will translate efficiently to a resource-constrained, FPU-less embedded system, ignoring the overhead of complex index management.
    **The Consequence:** Fragmented memory access patterns and slower inference on a 168 MHz CPU, potentially increasing code size beyond limits due to custom sparse kernels.
  napkin_math: |
    - **Initial State**: 400KB FP32 weights, ~100,000 parameters.
    - **Memory Reduction**: Quantizing to 8-bit INT8 reduces weight memory by 4x to 100KB, meeting the 200KB budget.
    - **Initial Latency**: 1M FP32 MACs * 50 cycles (emulation) / 168MHz = ~300ms.
    - **Optimized Latency**: INT8 reduces MAC cost to ~2-4 cycles. Latency drops from 300ms to **<30ms**.
