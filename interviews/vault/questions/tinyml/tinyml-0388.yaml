title: The TinyML Tensor Arena Trap
scenario: You are deploying a simple audio keyword-spotting model to a Cortex-M4 microcontroller that
  has 256 KB of SRAM. The model's weights are stored in Flash. You need to calculate the minimum size
  for the SRAM 'tensor arena,' which holds the input, output, and all intermediate activation tensors.
question: "How should you calculate the minimum tensor arena size for the keyword-spotting model's activation tensors?"
details:
  realistic_solution: To find the peak memory usage, we must simulate the memory requirements at each
    step of the model's execution.
  common_mistake: The most common mistake is to sum the sizes of all tensors (12 + 28 + 16 + 2 = 58 KB).
    This overestimates the required memory because tensors are ephemeral; they are only live for a portion
    of the inference cycle. The tensor arena is sized for the *peak* concurrent usage, not the total sum.
  napkin_math: In TF Lite Micro, the 'tensor arena' reuses SRAM for intermediate activations. Peak memory
    isn't the sum of all tensors, but the maximum concurrently alive. If Layer 1 reads an 8KB input to
    write a 16KB output, it needs 24KB. If Layer 2 reads the 16KB output to write a 4KB output, it needs
    20KB. The arena size must be at least the max of these (24KB), safely fitting in 256KB SRAM.
  options:
  - 58 KB
  - 28 KB
  - 44 KB
  - 40 KB
  correct_index: 2
