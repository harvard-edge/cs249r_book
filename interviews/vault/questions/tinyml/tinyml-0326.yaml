title: Microcontroller's Memory Bottleneck
scenario: You're optimizing a keyword spotting model on a Cortex-M4 microcontroller. Based on the typical
  hardware specs for this class of device, what is its approximate 'ridge point' (Operations per Byte),
  and what does this imply about where the performance bottleneck usually lies?
question: "Based on the typical hardware specs for this class of device, what is its approximate 'ridge point' (Operations per Byte), and what does this imply about where the performance bottleneck usually lies?"
details:
  realistic_solution: A Cortex-M4's ridge point is approximately 0.28 Ops/Byte. This is very low and means
    the processor can only perform 0.28 operations for every byte it fetches from its local SRAM. Since
    even simple neural network layers have an arithmetic intensity higher than this, virtually all ML
    workloads on a microcontroller are heavily compute-bound. Performance is dictated by how fast you
    can compute, not how fast you can feed the CPU from SRAM.
  common_mistake: Engineers often incorrectly apply their intuition from cloud GPUs (like an H100 with
    a ridge point of ~295 Ops/Byte) to the TinyML domain. They assume that memory bandwidth is the scarce
    resource, when in reality, microcontrollers have abundant on-chip SRAM bandwidth relative to their
    weak ALUs, making them fundamentally compute-bound.
  napkin_math: A 168MHz Cortex-M4 processing MACs hits ~336 MFLOPS (168MHz × 2 ops/cycle). At ~1.2 GB/s
    memory bandwidth, its Ridge Point is 336 / 1200 = 0.28 Ops/Byte. A standard INT8 convolution requires
    loading 1 byte of weights and 1 byte of activation per MAC (2 Ops), but with caching, it approaches
    2 Ops/Byte. Since 2 Ops/Byte >> 0.28, performance is bottlenecked by the 168MHz CPU compute, not SRAM.
  options:
  - ~300 Ops/Byte, implying workloads are always compute-bound.
  - ~10 Ops/Byte, implying a balance between compute and memory.
  - ~0.2 Ops/Byte, implying workloads are almost always compute-bound.
  - The concept of a ridge point does not apply to microcontrollers, only GPUs.
  correct_index: 2
