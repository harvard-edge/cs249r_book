title: Microcontroller's Memory Bottleneck
scenario: You're optimizing a keyword spotting model on a Cortex-M4 microcontroller.
question: Based on typical hardware specs, what is its approximate ridge point (Ops/Byte), and what does this imply?
details:
  realistic_solution: A Cortex-M4's ridge point is approximately 0.28 Ops/Byte. This is very low and means the processor can only perform 0.28 operations for every byte it fetches from its local SRAM. Since even simple neural network layers have an arithmetic intensity higher than this, virtually all ML workloads on a microcontroller are heavily compute-bound. Performance is dictated by how fast you can compute, not how fast you can feed the CPU from SRAM.
  common_mistake: |
    **The Pitfall:** Applying cloud GPU intuition to TinyML.
    **The Rationale:** Engineers assume memory bandwidth is the scarce resource because that is true for large cloud GPUs like the H100.
    **The Consequence:** They misdiagnose the bottleneck, focusing on memory optimization instead of compute optimization.
  napkin_math: |
    * Compute: 168 MHz * 2 ops/cycle = 336 MFLOPS.
    * Bandwidth: ~1.2 GB/s.
    * Ridge Point: 336,000,000 / 1,200,000,000 = 0.28 Ops/Byte.
    * INT8 convolution: ~2 Ops/Byte (with caching).
    * **Result: Since 2 Ops/Byte >> 0.28 Ops/Byte, workloads are heavily compute-bound.**
  options:
  - ~300 Ops/Byte, implying workloads are always compute-bound.
  - ~10 Ops/Byte, implying a balance between compute and memory.
  - ~0.28 Ops/Byte, implying workloads are almost always compute-bound.
  - The concept of a ridge point does not apply to microcontrollers, only GPUs.
  correct_index: 2
