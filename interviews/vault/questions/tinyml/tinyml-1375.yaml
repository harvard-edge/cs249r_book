title: 'TinyML Device: Unexpected Idle Power Drain'
scenario: A device running continuous keyword spotting is designed for a week-long battery life (200mWh battery). A single inference takes 10ms at 50mW active power. Field tests reveal the battery drains in less than two days. The inference algorithm is highly efficient and not running continuously. The device experiences high baseline power consumption even during supposedly 'idle' periods.
question: What are the most likely root causes for this accelerated battery drain, and how would you systematically diagnose and rectify the problem?
details:
  realistic_solution: |
    1. **Comprehensive Power Profiling:** Utilize a high-resolution power analyzer to measure current draw across all operational states: active inference, various idle states (light sleep, deep sleep), and peripheral active states. This identifies where the baseline power consumption is occurring.
    2. **DVFS & P-state Verification:** Confirm that the Cortex-M7 and Ethos-U55 are correctly transitioning into lowest power P-states and leveraging Dynamic Voltage and Frequency Scaling (DVFS) when idle. Ensure that power caps are appropriately set and enforced.
    3. **CMOS Power Equation Analysis:** Re-evaluate the CMOS power equation (P_total = αCV²f + I_leakV) for all major components. High static leakage current (I_leakV) during 'idle' periods is a strong indicator of a failure to power-gate or reach proper low-power states.
    4. **Peripheral Power Audit:** Investigate all integrated peripherals (sensors, communication modules, clocks) to ensure they are not drawing excessive power when the main processing units are idle. Verify their power-down sequences.
    5. **Software Power Management Review:** Examine the firmware's power management routines. Are interrupts waking the system too frequently? Are there software bugs preventing transitions to deeper sleep states? Is the 'idle' state truly idle, or is background processing occurring?
  common_mistake: |
    **The Pitfall:** Focusing exclusively on optimizing the dynamic power consumed during the active neural network inference window.
    **The Rationale:** ML engineers tunnel-vision on model architecture and FLOPs, overlooking the cumulative macro-level impact of static leakage and improper MCU sleep states.
    **The Consequence:** The team spends months compressing a model to save microjoules, missing the root cause of the baseline power drain, leading to a failed product deployment.
  napkin_math: |
    1. **Assumptions & Constraints:** 200 mWh battery. Target life = 7 days (168 hours). Observed life = 48 hours. Inference active power = 50 mW for 10 ms (0.01s) per second.
    2. **Calculations:** Target Average Power (TAP) = 200 mWh / 168 h ≈ 1.19 mW. Observed Average Power (OAP) = 200 mWh / 48 h ≈ 4.17 mW. Active inference average contribution = (50 mW * 0.01 s) / 1 s = 0.5 mW. Static/idle baseline power = OAP (4.17 mW) - Active (0.5 mW) = 3.67 mW.
    3. **Conclusion & Interpretation:** **Result: Idle-State Leakage.** The system leaks 3.67 mW constantly during "idle", which is >3x the entire intended power budget. The fix requires diagnosing MCU P-states, disabling peripheral clocks, or fixing unhandled interrupts preventing deep sleep.
