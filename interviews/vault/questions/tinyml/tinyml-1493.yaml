title: Ring Buffer Batching Strategy on Cortex-M7+Ethos-U55 for Audio
scenario: >
  An Arm Cortex-M7 with Ethos-U55 microNPU processes audio for keyword detection.
  The microphone produces 16kHz audio in 10ms chunks (160 samples), and the model processes 40ms windows (640 samples) with 50% overlap.
question: How would you design a ring buffer batching strategy and calculate buffer memory requirements?
details:
  realistic_solution: |
    Window: 640 samples * 2 bytes (INT16) = 1.28KB. 50% overlap means every new 320-sample chunk (20ms) triggers inference. Ring buffer: store 640 samples in circular buffer. New chunk: 160 samples (10ms) arrives, shifts buffer. Run inference when buffer has new 320 unique samples (every 20ms). Buffer memory: 640*2B = 1.28KB. Feature extraction (MFCC): additional 40*13*2B = 1.04KB. Inference input total: 2.32KB. Ethos-U55 DMA handles transfer. Schedule: interrupt every 10ms, batch 2 interrupts, run inference every 20ms. At Ethos-U55 2 TOPS: keyword model (1M FLOPs) = 0.5μs — inference is not the bottleneck; audio capture is.
  common_mistake: |
    **The Pitfall:** Allocating a new 640-sample buffer for every 10ms chunk.
    **The Rationale:** Candidates forget that ring buffers allow reuse of the 50% overlap.
    **The Consequence:** This doubles the effective data movement cost and wastes scarce SRAM.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Window: 640 samples, INT16 (2 bytes/sample).
       - MFCC Features: 40 frames x 13 coeffs x 2 bytes.
       - 50% overlap means inference runs every 20ms.
    2. **Calculations:**
       - Ring Buffer SRAM: 640 * 2 B = 1.28 KB.
       - MFCC SRAM: 40 * 13 * 2 B = 1.04 KB.
       - Total Buffers: 1.28 + 1.04 = 2.32 KB.
       - Ethos-U55 Duty Cycle: 0.5 μs inference / 20,000 μs interval = 0.0025%.
    3. **Conclusion & Interpretation:** Inference compute is negligible compared to data handling. **Result: Memory-Feasible (2.32 KB)**.
