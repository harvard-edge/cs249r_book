title: Inference Cycles on Cortex-M4
scenario: You're running a keyword spotting model (DS-CNN, 6M INT8 MACs) on a Cortex-M4 at 168 MHz. The
  M4 has no SIMD/DSP extensions (unlike M4F or M7). It executes one 8-bit multiply-accumulate per cycle
  using the standard MUL instruction. Estimate the inference latency. Then estimate it again assuming
  you upgrade to a Cortex-M4F with the CMSIS-NN library.
details:
  realistic_solution: 'Base M4 without SIMD: the compiler generates load-multiply-accumulate-store sequences
    with loop control, achieving roughly 1 useful MAC every 5 clock cycles. This is the baseline: 6M MACs
    / (168 MHz / 5) = 178 ms. CMSIS-NN on M4F exploits the SMLAD instruction (dual 16-bit signed MAC)
    and optimized memory access patterns with pointer arithmetic. Peak is 2 MACs/cycle but sustained throughput
    is ~1.2 MACs/cycle due to pipeline stalls when accessing non-sequential memory. Result: ~30 ms (6x
    speedup). Cortex-M7 at 480 MHz adds: dual-issue pipeline, branch prediction, and tightly-coupled memory
    (TCM) that eliminates flash wait states. With CMSIS-NN: ~1.5 MACs/cycle sustained, giving 8.3 ms (21x
    over base M4). Key insight: the SIMD instruction alone gives ~6x, the faster clock adds another ~3.5x.'
  common_mistake: 'Assuming 1 MAC per cycle on base M4 (6M/168M = 35.7 ms). This ignores that a scalar
    MAC requires multiple instructions: load operand A, load operand B, multiply, accumulate, increment
    pointers, check loop counter. Real throughput is ~5 cycles/MAC without SIMD optimization.'
  napkin_math: 'Base Cortex-M4 (scalar C, no SIMD): effective throughput ~5 cycles/MAC due to loop overhead,
    address computation, and memory stalls. 6M MACs at 168 MHz / (168M/5) = 178 ms. M4F with CMSIS-NN
    (SMLAD dual-MAC SIMD): ~2 MACs/cycle peak, ~1.2 MACs/cycle sustained after memory stalls = ~0.83 cycles/MAC
    effective. 6M MACs / (168M x 1.2) = 29.8 ms. Speedup: 178/29.8 = 6x. Cortex-M7 at 480 MHz with CMSIS-NN:
    dual-issue pipeline + SIMD gives ~1.5 MACs/cycle sustained. 6M / (480M x 1.5) = 8.3 ms. Speedup over
    base M4: 178/8.3 = 21x.'
