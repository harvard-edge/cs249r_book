title: Compute-Transmission Overlap via Double-Buffering
scenario: A Cortex-M4 is computing FFTs on streaming audio and sending the features
  to a central hub via a BLE peripheral.
question: Explain how double-buffering allows the Cortex-M4 to overlap computing the
  next audio FFT with the BLE transmission of the previous FFT.
details:
  realistic_solution: Double-buffering uses two SRAM regions. While the CPU writes
    the current FFT compute to Buffer A, the DMA controller independently reads from
    Buffer B to send the previous frame over BLE. Once both finish, the pointers swap,
    hiding the radio latency behind the compute time.
  common_mistake: Stating that the CPU executes both the compute and the radio transmission
    simultaneously, ignoring the role of the DMA.
  napkin_math: Max(T_compute, T_tx) instead of T_compute + T_tx.
