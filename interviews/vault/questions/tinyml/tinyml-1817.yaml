title: Half-Duplex UART Ring AllReduce Diagnosis
scenario: Four Raspberry Pi Picos (RP2040) are wired in a ring topology via UART (115200
  baud, 14.4 KB/s) for federated learning. They aggregate a 14.4 KB gradient payload.
  You observe the synchronization phase takes roughly 3 seconds.
question: Analyze the root cause of the degraded latency by computing the theoretical
  lower bound for the Ring AllReduce operation on this topology.
details:
  realistic_solution: For N=4 and payload P=14.4 KB, a standard Ring AllReduce transmits
    2*(N-1)/N * P data per node. This is 2*(3)/4 * 14.4 = 21.6 KB. At 14.4 KB/s, the
    theoretical minimum time is 21.6 / 14.4 = 1.5 seconds. Because UART limits the
    microcontrollers to half-duplex communication (they cannot transmit and receive
    simultaneously without blocking in this specific RTOS setup), the actual transmission
    time doubles to 3.0 seconds.
  common_mistake: Computing time as just Payload / Bandwidth (14.4 / 14.4 = 1s), missing
    both the Ring AllReduce 2(N-1)/N multiplier and the UART half-duplex hardware
    limitation.
  napkin_math: Theoretical = 2 * (3/4) * 14.4KB / 14.4KB/s = 1.5s. Observed 3s implies
    exactly a 2x half-duplex penalty.
