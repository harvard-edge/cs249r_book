title: Theoretical Latency Comparison of CPU vs NPU
scenario: You are deploying a depthwise-separable CNN for anomaly detection on an
  ARM Corstone-300 subsystem, featuring a 480 MHz Cortex-M7 and an Ethos-U55 NPU configured
  for 256 MACs/cycle sharing 512 KB of SRAM. The model requires 2.4 million MAC operations
  per inference. Assuming the M7 CPU can sustain 2 MACs per clock cycle using DSP
  instructions and both cores run at 480 MHz without memory bottlenecks, quantify
  the theoretical minimum execution time in milliseconds for a single inference when
  running purely on the CPU versus being fully offloaded to the NPU.
question: What are the theoretical CPU and Ethos-U55 execution times for a 2.4M-MAC
  Corstone-300 inference?
details:
  realistic_solution: To calculate the theoretical minimum inference time, determine
    the peak MAC throughput for both the Cortex-M7 and the Ethos-U55 by multiplying
    their MACs per cycle by the clock frequency (480 MHz). Then, divide the total
    MACs required by the model by each processor's peak throughput. The comparison
    demonstrates the critical efficiency and latency benefits of the NPU in an embedded
    environment, reducing inference time from milliseconds down to microseconds.
  common_mistake: Candidates often confuse MACs with FLOPs (1 MAC = 2 operations)
    or fail to correctly convert 480 MHz into cycles per second when calculating peak
    throughput. Another frequent error is setting up the division incorrectly, resulting
    in calculating cycles instead of actual milliseconds.
  napkin_math: 'CPU Peak Throughput: 480 MHz * 2 MACs/cycle = 960 * 10^6 MACs/sec.
    CPU Minimum Latency: 2.4 * 10^6 MACs / (960 * 10^6 MACs/sec) = 0.0025 seconds
    = 2.5 ms. NPU Peak Throughput: 480 MHz * 256 MACs/cycle = 122.88 * 10^9 MACs/sec.
    NPU Minimum Latency: 2.4 * 10^6 MACs / (122.88 * 10^9 MACs/sec) = 0.00001953 seconds
    = 0.0195 ms (19.5 µs).'
