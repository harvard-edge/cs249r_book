title: TinyML BLE Upload Time
scenario: A TinyML sensor stores a 24 KB anomaly snippet and uploads it over BLE at 120 kbps effective throughput. Estimate upload time and decide whether it fits a 5-second reporting target.
question: Can a 24 KB TinyML anomaly snippet upload over 120 kbps BLE within a 5-second target?
details:
  realistic_solution: 24 KB is 192 kilobits. At 120 kbps, upload takes 1.6 seconds before protocol retries, so it fits the 5-second target with headroom.
  common_mistake: Comparing KB directly to kbps without converting bytes to bits.
  napkin_math: 24 KB x 8 = 192 kb. Time = 192 / 120 = 1.6 s.
