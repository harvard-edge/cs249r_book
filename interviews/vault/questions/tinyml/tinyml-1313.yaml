title: Roofline Analysis for TinyML on ESP32-S3
scenario: You are deploying a tinyML model (e.g., keyword spotting or anomaly detection)
  to an ESP32-S3 microcontroller. The device features a 240 MHz dual-core processor,
  512 KB of fast SRAM, and 8 MB of slower PSRAM. You observe that your model's inference
  time is longer than expected. Using your knowledge of Roofline Analysis, describe
  how you would determine if the workload is compute-bound or memory-bound, and how
  you'd predict the utilization of a hypothetical on-chip accelerator, considering
  the given memory hierarchy and bandwidth limitations.
question: How should roofline analysis account for ESP32-S3 SRAM, PSRAM, and accelerator
  utilization when diagnosing slow TinyML inference?
details:
  realistic_solution: To diagnose the bottleneck, first profile the model to measure
    its total floating-point/integer operations (e.g., MACs) and the total data transferred
    between memory and compute units. Calculate the operational intensity (Ops/Byte).
    Construct a simplified Roofline plot for the ESP32-S3 by establishing the peak
    compute performance (based on the 240 MHz dual-core CPU and estimated IPC/MACs
    per cycle) and the peak memory bandwidths for both SRAM and PSRAM. Plot the model's
    operational intensity on this graph. If the model's point hits the compute ceiling,
    it's compute-bound; if it hits a memory bandwidth ceiling (either SRAM or PSRAM),
    it's memory-bound. For an on-chip accelerator, a similar approach is taken, but
    the Roofline would be adapted to its specific peak compute and dedicated memory
    interface bandwidth. Optimization would involve strategic data placement (e.g.,
    critical layers in SRAM, larger weights in PSRAM) and optimizing memory access
    patterns.
  common_mistake: Failing to account for the distinct performance characteristics
    and bandwidths of different memory tiers (SRAM vs. PSRAM) when constructing the
    Roofline model, or inaccurately estimating the operational intensity of the specific
    tinyML workload.
  napkin_math: 'Consider a TinyML model performing 50 MMACs (Mega Multiply-Accumulate
    operations) per inference. Assume the ESP32-S3 CPU can achieve 2 MACs/cycle/core,
    giving a peak compute of 2 cores * 240 MHz * 2 MACs/cycle = 960 MMACs/s. Assume
    effective SRAM bandwidth is 100 MB/s and PSRAM bandwidth is 10 MB/s.


    Case 1: Model completely fits and runs from SRAM, requiring 2 MB data transfer
    per inference.

    - Operational Intensity = 50 MMACs / 2 MB = 25 MACs/Byte.

    - Memory-bound performance (SRAM) = 25 MACs/Byte * 100 MB/s = 2500 MMACs/s.

    - Since 2500 MMACs/s (memory-bound) > 960 MMACs/s (compute-bound), the model is
    **compute-bound** by the CPU.


    Case 2: Model relies heavily on PSRAM for data, requiring 2 MB data transfer per
    inference.

    - Operational Intensity = 25 MACs/Byte.

    - Memory-bound performance (PSRAM) = 25 MACs/Byte * 10 MB/s = 250 MMACs/s.

    - Since 250 MMACs/s (memory-bound) < 960 MMACs/s (compute-bound), the model is
    now **memory-bound** by PSRAM.'
