title: SRAM Exhaustion in Multi-Branch CNN Inference
scenario: You are deploying a predictive maintenance CNN on a Nordic nRF5340 microcontroller
  for vibration analysis. The system has 256 KB of SRAM, of which 40 KB is reserved
  for the BLE 5.3 stack and RTOS overhead. The model has a branched architecture where
  an early activation tensor is kept alive for a later skip connection. Despite offline
  profilers showing that the largest individual layer only requires 140 KB of activation
  memory, the device encounters a HardFault due to out-of-memory errors during runtime.
question: Why does the branched nRF5340 CNN HardFault even though the largest individual
  activation is only 140 KB?
details:
  realistic_solution: The root cause is an unoptimized operator schedule that forces
    the large skip-connection tensor to remain in SRAM while the deep main branch
    allocates its own 140 KB intermediate tensors. The solution involves analyzing
    the tensor lifetime graph and applying memory planning techniques. We must reorder
    the operator execution schedule to minimize overlapping tensor lifespans, or employ
    memory-aware layer fusion to compute the branch without fully materializing the
    intermediate states in SRAM.
  common_mistake: Candidates often assume the out-of-memory error is due to memory
    leaks, dynamic allocation fragmentation, or flash memory limits. They frequently
    overlook how the topological sort order of the operator schedule dictates the
    overlapping lifespans of tensors, drastically affecting peak memory.
  napkin_math: 'Total SRAM: 256 KB. Available for inference: 256 KB - 40 KB (BLE 5.3/RTOS)
    = 216 KB. Skip connection tensor size: 64x64x20 bytes = 81,920 bytes = 80 KB. Main branch max
    intermediate tensor size: 140 KB. Peak memory during the branch execution: 80 KB (kept alive) + 140 KB (currently processing) = 220 KB. Since 220 KB > 216
    KB available SRAM, the device hard faults. The scheduler must be optimized to
    bring the peak below 216 KB.'
