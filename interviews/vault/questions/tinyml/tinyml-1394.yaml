title: 'Hardware-Aware NAS on Ethos-U55: Memory and Latency Constraints'
scenario: You are optimizing a model for a Cortex-M7 (480 MHz) paired with an Ethos-U55 NPU (peak 512 MACs/cycle). The system has 512 KB of SRAM. A hardware-aware NAS framework identified a candidate model with 250,000 8-bit integer parameters and 500 million MAC operations for a single inference.
question: What concerns remain for an Ethos-U55 NAS candidate with 250K INT8 parameters and 500M MACs despite fitting the parameter memory?
details:
  realistic_solution: 'A realistic solution involves a multi-pronged approach:

    1. **Detailed Memory Budgeting:** Perform a thorough analysis of peak activation memory usage for the proposed model, often requiring profiling or theoretical estimation based on layer shapes. Account for OS, stack, and heap. If total memory exceeds 512 KB, strategies like layer-by-layer inference (tiling), activation recomputation, or further model compression (quantization, pruning, distillation) must be employed, feeding back into the NAS search constraints.

    2. **Latency Analysis:** Beyond theoretical MAC/cycle calculation, consider actual NPU utilization, memory bandwidth limitations between SRAM and the Ethos-U55, and the overhead of data preparation/post-processing on the Cortex-M7. The NAS loop should ideally integrate a hardware simulator or a real device profiler to provide accurate latency feedback, not just theoretical MAC counts.

    3. **NAS Refinement:** If the current model fails to meet constraints, refine the NAS search space or objectives. This might involve prioritizing models with lower activation memory, stricter MAC budget, or even exploring more memory-efficient operators (e.g., depthwise separable convolutions). Techniques like MCUNet-style co-design of models and inference engines are highly relevant here.'
  common_mistake: |
    **The Pitfall:** Only considering the model's parameter size for the memory footprint.
    **The Rationale:** Candidates neglect the often significant and dynamic memory required for intermediate activations during inference, which can easily exceed available SRAM.
    **The Consequence:** The model is selected by NAS but throws Out-Of-Memory (OOM) errors during the first actual deployment on the device.
  napkin_math: |
    *   **Model Parameter Memory:** 250,000 * 1 byte = 250 KB.
    *   **Remaining SRAM:** 512 KB - 250 KB = 262 KB for activations, stack, heap, and OS.
    *   **Theoretical NPU Cycles:** 500,000,000 MACs / 512 MACs/cycle ≈ 976,563 cycles.
    *   **Theoretical NPU Time:** 976,563 cycles / 480 MHz ≈ 2.03 ms.
    *   **Reality Check:** Does the peak activation size fit in the remaining 262 KB? And what is the true utilization factor (rarely 100%) due to memory bandwidth bottlenecks?
