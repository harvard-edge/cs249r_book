title: Acoustic Wake-Up Duty Cycle
scenario: A battery-operated acoustic monitor using a Cortex-M4 wakes up upon detecting
  loud noises to classify whether they are glass breaks.
question: Analyze how adjusting the analog wake-up threshold impacts the overall power
  consumption versus the false-negative classification rate.
details:
  realistic_solution: A low analog threshold causes frequent wake-ups for the 80 MHz
    M4, draining the battery rapidly due to processing high false positives. Conversely,
    a high threshold conserves power by keeping the CPU asleep but significantly risks
    missing critical quiet events (false negatives).
  common_mistake: Ignoring the power draw of the continuous listening analog-to-digital
    converter (ADC) and only calculating CPU active power.
  napkin_math: Waking the 80 MHz CPU 100 times/hour vs 5 times/hour.
