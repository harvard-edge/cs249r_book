title: Acoustic Wake-Up Duty Cycle
scenario: A battery-operated acoustic monitor using a Cortex-M4 wakes up upon detecting loud noises to classify whether they are glass breaks.
question: Analyze how adjusting the analog wake-up threshold impacts the overall power consumption versus the false-negative classification rate.
details:
  realistic_solution: A low analog threshold causes frequent wake-ups for the 80 MHz M4, draining the battery rapidly due to processing high false positives. Conversely, a high threshold conserves power by keeping the CPU asleep but significantly risks missing critical quiet events (false negatives).
  common_mistake: |
    **The Pitfall:** Ignoring the continuous power draw of the analog-to-digital converter (ADC) and only calculating CPU active power.
    **The Rationale:** Candidates focus heavily on digital processing limits, overlooking the baseline power floor set by always-on analog sensors.
    **The Consequence:** The system is poorly optimized, leading to unexpected battery drain or missed safety-critical events due to overly aggressive thresholding.
  napkin_math: |
    * **Low Threshold:** CPU wakes 100 times/hour. Power is dominated by processing false positives.
    * **High Threshold:** CPU wakes 5 times/hour. Power is conserved, but true glass-break events may fail to breach the analog trigger (false negatives).
    * **Tradeoff:** The threshold mathematically shifts the power burden between the analog comparator and the active CPU cycles.
