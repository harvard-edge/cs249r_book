title: 'The Duty Cycle Power Drain: Duty Cycling & Energy Harvesting'
scenario: You are designing a battery-powered sensor with a Cortex-M4 microcontroller. To save energy, you use a duty cycle where the device is active for 1 second and then enters a deep sleep mode for 9 seconds.
question: If the active power is 10 mW and the deep sleep power is 10 µW, what is the approximate average power consumption over the full 10-second period?
details:
  realistic_solution: The average power is the time-weighted average of the active and sleep power consumption. The device is active 10% of the time (1s out of 10s) and in deep sleep 90% of the time (9s out of 10s). The active phase dominates the calculation, while the sleep phase's contribution is almost negligible.
  common_mistake: |
    **The Pitfall:** Simply averaging the power numbers without time-weighting them.
    **The Rationale:** Candidates often calculate (10 mW + 0.01 mW) / 2 = ~5 mW, ignoring the duty cycle proportions.
    **The Consequence:** Massively overestimating the power drain and incorrectly sizing the required battery or energy harvester.
  napkin_math: |
    1. **Active Energy:** 10 mW * 1 second = 10 mJ.
    2. **Sleep Energy:** 10 µW (0.01 mW) * 9 seconds = 0.09 mJ.
    3. **Total Energy per Cycle:** 10 mJ + 0.09 mJ = 10.09 mJ.
    4. **Cycle Duration:** 10 seconds.
    5. **Result:** Average power = 10.09 mJ / 10 s = 1.009 mW, or **~1 mW**.
  options:
  - ~5 mW
  - 10 mW
  - ~1 mW
  - ~100 µW
  correct_index: 2
