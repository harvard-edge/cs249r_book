title: Layer Fusion Latency Penalty on Cortex-M4
scenario: We deployed a CNN on an ARM Cortex-M4 (STM32F4) featuring 168 MHz, 256 KB SRAM, 1 MB flash, and CMSIS-NN SIMD. To fit the model into the 256 KB SRAM, the compiler's operator scheduler fused two consecutive INT8 convolutional layers, avoiding the materialization of a 150 KB intermediate activation tensor. However, after applying this memory-optimized scheduling, the total inference latency increased significantly despite the total logical MAC operations remaining identical.
question: Why does this layer fusion scheduling behavior degrade execution speed on this specific hardware architecture?
details:
  realistic_solution: The latency increase occurs because fusing convolutional operators without intermediate buffers requires computing the network in spatial tiles. Due to the sliding window nature of convolutions (e.g., a 3x3 kernel), adjacent output tiles share overlapping input regions. Without storing the full intermediate feature map in the 256 KB SRAM, the overlapping regions of the first convolutional layer must be redundantly recomputed for every tile of the second layer. While the STM32F4 has no FPU, its CMSIS-NN SIMD is highly efficient at INT8 MACs; however, the sheer volume of redundant recomputations dominates the execution time, nullifying any memory access savings.
  common_mistake: |
    **The Pitfall:** Assuming that layer fusion always improves latency by reducing memory bandwidth.
    **The Rationale:** Candidates extrapolate from GPU/TPU optimizations where memory bandwidth is the primary bottleneck, ignoring the redundant compute required by sliding windows.
    **The Consequence:** Trading a memory problem for a massive compute problem, unintentionally doubling inference latency and missing real-time deadlines.
  napkin_math: |
    - **Ideal Compute (Sequential):** 4M MACs / (2 MACs/cycle * 168 MHz) ≈ 11.9 ms.
    - **Fused Overhead:** A 3x3 kernel overlap forces Layer 1 to be recomputed ~3 times per output region.
    - **Fused Compute:** (2M * 3) + 2M = 8M MACs.
    - **Fused Latency:** 8M MACs / 336 MMACs/sec ≈ 23.8 ms.
    - **Conclusion:** **The scheduler trades a 100% latency increase (11.9 ms to 23.8 ms) to save 150 KB of SRAM.**
