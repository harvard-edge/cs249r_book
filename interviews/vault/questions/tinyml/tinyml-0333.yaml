title: The TCO of a Sleeping Army
scenario: You are the systems architect for a fleet of 100,000 smart warehouse sensors. Each device uses a microcontroller to perform audio-based anomaly detection (e.g., the sound of breaking glass). To conserve power, the device spends 99% of its time in a deep sleep mode consuming 10 µW and 1% of its time in an active listening mode consuming 10 mW.
question: "At $0.15 per kWh, what is the approximate total energy cost to operate this 100,000-sensor fleet for one year?"
details:
  realistic_solution: The correct approach is to calculate the weighted average power consumption for a single device first, then scale it up to the fleet and the time period.
  common_mistake: |
    **The Pitfall:** Ignoring the power consumption of the sleep state because it seems negligible.
    **The Rationale:** While 10 µW is tiny on its own, when multiplied by a large fleet size and long duration, it forms a non-trivial baseline.
    **The Consequence:** Another frequent error is to only calculate for the active state, overestimating the cost by nearly 100x and missing the entire economic benefit of duty-cycling.
  napkin_math: |
    * Average Power per device: (10 mW × 1%) + (10 µW × 99%) ≈ 0.1 mW + 0.0099 mW = 0.1099 mW.
    * Fleet Power: 0.1099 mW × 100,000 = 10.99 W.
    * Annual Energy: 10.99 W × 8760 hours/year = 96.27 kWh.
    * Cost: 96.27 kWh × $0.15/kWh = **$14.44**.
  options:
  - ~$1,314
  - ~$14,440
  - ~$14.44
  - < $0.01
  correct_index: 2
