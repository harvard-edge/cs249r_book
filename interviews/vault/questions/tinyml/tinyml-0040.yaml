title: The Birdwatcher's Power Budget
scenario: You're designing a remote acoustic sensor to detect an endangered bird species. It uses a Cortex-M4
  microcontroller that wakes up for 1 second to run an audio classification model, then sleeps for the
  remaining 59 seconds of a 1-minute cycle. The Cortex-M4 consumes 10 mW when active and 10 µW in deep
  sleep. What is the average power consumption of the device?
details:
  realistic_solution: To find the average power, you must calculate the total energy consumed during one
    full cycle (active + sleep) and then divide that by the total cycle time. This correctly weights the
    high-power active state and the low-power sleep state.
  common_mistake: The most common mistake is to confuse peak power with average power. Engineers often
    state the active power (10 mW) as the answer, forgetting that for battery life calculations, it's
    the average power consumption over a full cycle that matters. Another error is to ignore the sleep
    power contribution, which, while small, is necessary for a precise calculation.
  napkin_math: "1. **Parameters**: P_active = 10 mW, P_sleep = 0.01 mW, t_active = 1 s, t_sleep = 59 s,\
    \ t_period = 60 s.\n2. **Energy per cycle:**\n   - E_active = 10 mW × 1 s = 10 mJ.\n   - E_sleep =\
    \ 0.01 mW × 59 s = 0.59 mJ.\n   - E_total = 10.59 mJ.\n3. **Average power:**\n   - P_avg = 10.59 /\
    \ 60 = **0.177 mW ≈ 177 µW**.\n4. **Battery life estimate**: On a 300 mAh coin cell (3.0V = 900 mWh):\n\
    \   - 900 mWh / 0.177 mW = 5,085 hours ≈ **212 days** ≈ 7 months."
  options:
  - 10 mW
  - 5.0 mW
  - ~0.18 mW
  - ~0.17 mW
  correct_index: 2
