title: The Birdwatcher's Power Budget
scenario: >
  You're designing a remote acoustic sensor to detect an endangered bird species. It uses a Cortex-M4 microcontroller that wakes up for 1 second to run an audio classification model, then sleeps for the remaining 59 seconds of a 1-minute cycle.
question: >
  What average power comes from 1 s active at 10 mW and 59 s sleep at 10 uW on a Cortex-M4 bird sensor?
details:
  realistic_solution: >
    To find the average power, you must calculate the total energy consumed during one full cycle (active + sleep) and then divide that by the total cycle time. This correctly weights the high-power active state and the low-power sleep state.
  common_mistake: |
    **The Pitfall:** Confusing peak power with average power, or ignoring the sleep power contribution.
    **The Rationale:** Engineers often state the active power (10 mW) as the answer, forgetting that for battery life calculations, it's the average power consumption over a full cycle that matters.
    **The Consequence:** They incorrectly estimate battery life by orders of magnitude.
  napkin_math: |
    - **Energy per cycle:** Active energy = 10 mW × 1 s = 10 mJ. Sleep energy = 0.01 mW × 59 s = 0.59 mJ.
    - **Total Energy:** 10 mJ + 0.59 mJ = 10.59 mJ.
    - **Average Power:** P_avg = 10.59 mJ / 60 s = **0.1765 mW (~177 μW)**.
    - **Battery Life:** On a 300 mAh coin cell (3.0V = 900 mWh): 900 mWh / 0.1765 mW = 5,099 hours ≈ **212 days**.
  options:
  - 10 mW
  - 5.0 mW
  - ~0.18 mW
  - ~0.17 mW
  correct_index: 2
