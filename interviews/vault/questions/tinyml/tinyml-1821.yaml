title: BLE 5.0 Star Topology Collective Sync
scenario: Three smartwatches (BLE 5.0, 1.4 Mbps max payload throughput) synchronize
  a 350 KB personal health model using a central leader and two followers. The sync
  requires a mandatory 50ms BLE connection event barrier before any individual transmission
  leg.
question: Evaluate the total latency for an AllReduce equivalent operation where both
  followers send 350 KB to the leader, and the leader broadcasts the averaged 350
  KB model back.
details:
  realistic_solution: BLE enforces a star topology over a shared RF medium. The two
    followers must transmit serially to the leader (2 * 350 KB = 700 KB). The leader
    then broadcasts the result (350 KB). Total serialized data is 1050 KB. At 1.4
    Mbps (175 KB/s), pure data transfer takes 1050 / 175 = 6.0 seconds. The protocol
    requires 3 distinct transmission legs (Follower 1, Follower 2, Leader Broadcast),
    incurring 3 * 50ms = 150ms in connection barriers. Total latency is 6.15 seconds.
  common_mistake: Treating the 350KB sync as a standard single-step data division
    (350/175) without accounting for the multi-leg serialization required by the star
    topology and the sequential connection event barriers.
  napkin_math: ((2 * 350KB) + 350KB) / 175 KB/s + (3 * 0.05s) = 6.0s + 0.15s = 6.15s
