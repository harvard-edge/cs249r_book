title: 'BLE 5.0 Star Topology Collective Sync'
scenario: 'Three smartwatches (BLE 5.0, 1.4 Mbps max payload throughput) synchronize a 350 KB personal health model using a central leader and two followers. The sync requires a mandatory 50ms BLE connection event barrier before any individual transmission leg.'
question: 'What is the total latency for an AllReduce equivalent operation where both followers send 350 KB to the leader, and the leader broadcasts the averaged 350 KB model back?'
details:
  realistic_solution: 'BLE enforces a star topology over a shared RF medium. The two followers must transmit serially to the leader (2 * 350 KB = 700 KB). The leader then broadcasts the result (350 KB). Total serialized data is 1050 KB. At 1.4 Mbps (175 KB/s), pure data transfer takes 1050 / 175 = 6.0 seconds. The protocol requires 3 distinct transmission legs (Follower 1, Follower 2, Leader Broadcast), incurring 3 * 50ms = 150ms in connection barriers. Total latency is 6.15 seconds.'
  common_mistake: |
    **The Pitfall:** Treating the synchronization as a single-step data division.
    **The Rationale:** Candidates divide the total data by the bandwidth without accounting for the multi-leg serialization required by the star topology.
    **The Consequence:** They underestimate the latency by ignoring both the sequential nature of follower transmissions and the mandatory connection event barriers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Throughput: 1.4 Mbps = 1.4 * 10^6 bits/s = 175 KB/s.
    - Data Transfer: Two followers transmit 350 KB sequentially (700 KB). Leader broadcasts 350 KB.
    - Protocol barriers: 50 ms connection event.

    **Calculations:**
    - Total Data Time: 1050 KB / 175 KB/s = 6.0 seconds.
    - Connection Barriers: 3 transmission legs = 3 * 50 ms = 0.15 seconds.
    - Total Latency: 6.0 s + 0.15 s = 6.15 seconds.

    **Conclusion & Interpretation:**
    - **Result: 6.15 seconds (Network-Bound)**. Correctly accounts for star topology serialization and BLE connection barriers.
