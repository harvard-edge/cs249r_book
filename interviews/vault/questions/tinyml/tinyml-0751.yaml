title: The TFLite Micro Resolving Pointer
scenario: You profile a TFLite Micro inference loop on a Cortex-M4. You notice that the actual math kernel (`arm_convolve_s8`) takes 10ms, but the overall `invoke()` call takes 13ms. You trace the extra 3ms to the framework's internal `GetTensor()` function.
question: Why does looking up a tensor address via GetTensor() take 3ms on a Cortex-M4?
details:
  realistic_solution: 'TFLite Micro stores tensors in a FlatBuffer format. Each GetTensor() call parses offset tables, performs bounds checking, and resolves nested pointers. With poor cache locality on scattered vtable structures, each lookup incurs multiple cache misses. For 150 GetTensor calls per inference at ~1000 cycles each: 150K cycles = 1-3ms overhead. Fix: use TFLite Micro''s static memory planner (pre-resolves all pointers at init) or cache resolved pointers in a lookup table after first inference.'
  common_mistake: |
    **The Pitfall:** Assuming the tensor is stored in slow Flash and the time is spent reading the full tensor data.
    **The Rationale:** `GetTensor()` just returns a pointer; it does not read or copy the whole tensor data. The delay is entirely in resolving the pointer from the FlatBuffer schema.
    **The Consequence:** Developers might try to move weights to SRAM to speed up inference, unnecessarily wasting precious memory without solving the underlying framework overhead.
  napkin_math: |
    *   **Model complexity:** Assume a 50-layer model with 3 tensors per layer = 150 `GetTensor` calls per inference.
    *   **Lookup cost:** A dynamic lookup and bounds check takes ~1,000 cycles due to poor cache locality on the scattered FlatBuffer.
    *   **Total overhead:** 150 * 1,000 = 150,000 cycles.
    *   **Time equivalent:** At typical MCU clocks (e.g., ~50-100 MHz), 150,000 cycles equates to **1-3ms of pure framework overhead**.
  options:
  - GetTensor() is slow because it reads the full tensor data from flash memory into SRAM on each call, wasting time copying data that's already accessible via XIP.
  - 'TFLite Micro stores tensors in a FlatBuffer format. Each GetTensor() call parses offset tables, performs bounds checking, and resolves nested pointers. With poor cache locality on scattered vtable structures, each lookup incurs multiple cache misses. For 150 GetTensor calls per inference at ~1000 cycles each: 150K cycles = 1-3ms overhead. Fix: use TFLite Micro''s static memory planner (pre-resolves all pointers at init) or cache resolved pointers in a lookup table after first inference.'
  - The 3ms overhead is caused by TFLite Micro's garbage collector, which runs between every layer to reclaim temporary activation buffers.
  - GetTensor() acquires a mutex lock for thread safety on each call. The lock/unlock overhead of the RTOS accounts for the 3ms because the RTOS scheduler runs on every mutex release.
  correct_index: 1
