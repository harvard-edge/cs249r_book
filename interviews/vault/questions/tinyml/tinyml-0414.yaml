title: Bootloader A/B Partition Sizing
scenario: You're designing the flash layout for an nRF5340 that runs a keyword spotting model and receives OTA updates over BLE.
question: How should model size and runtime requirements shape the A/B OTA flash layout, and why do delta model updates help?
details:
  realistic_solution: In TinyML, the model weights (e.g., 180 KB) often dwarf the application code (90 KB) and the TFLite Micro runtime (25 KB). If you use a naive 50/50 A/B partition scheme, each slot must be at least 295 KB. You are copying the entire OS and runtime every time you just want to tweak a threshold in the model.
  common_mistake: |
    **The Pitfall:** Assuming a naive 50/50 flash split (512 KB per slot) is required.
    **The Rationale:** Candidates treat the ML model as an inseparable part of the OS, ignoring that models are often the largest firmware component.
    **The Consequence:** Wasting massive amounts of flash memory by copying the entire OS and runtime for every small model update.
  napkin_math: |
    - **Naive A/B:** (90 KB OS + 25 KB Runtime + 180 KB Model) * 2 = 590 KB flash used.
    - **Decoupled Delta Updates:** Firmware A (115 KB) + Firmware B (115 KB) + Model (180 KB) + Patch Scratch (32 KB) = 442 KB.
    - **Flash Saved:** 590 KB - 442 KB = **148 KB saved** (15% of a 1 MB chip).
