title: Optimizing ML Inference Latency on Cortex-M7/Ethos-U55 for Real-time Edge Applications
scenario: >
  You are deploying a small, quantized convolutional neural network (CNN) for keyword spotting on an edge device featuring a Cortex-M7 microcontroller (480 MHz) paired with an Ethos-U55 NPU (configured for 256 MAC/cycle, operating at 480 MHz). The application requires an end-to-end inference latency of under 10 ms. Initial measurements show an average latency of 30 ms, with significant variance. The model consists of several convolutional layers followed by fully connected layers.
question: >
  How would you systematically profile and identify the primary bottlenecks contributing to this 30 ms latency?
details:
  realistic_solution: >
    The realistic solution involves a systematic profiling approach. First, integrate lightweight profiling instrumentation into the application, measuring time spent in key phases: data acquisition, pre-processing (on Cortex-M7), NPU inference call, NPU execution, post-processing (on Cortex-M7), and data output. Use a cycle-accurate profiler or a tracing tool (e.g., Arm Streamline, if available, or custom timestamping via DWT cycle counter on Cortex-M7) to collect fine-grained data. Analyze the trace to identify where the 30 ms is spent. Given the platform, likely bottlenecks could be: 1. Data Transfer: Moving input/output tensors between Cortex-M7's SRAM (512 KB) and the Ethos-U55 NPU, especially if tensors exceed cache sizes or require multiple transfers. 2. CPU Pre/Post-processing: Complex operations on the Cortex-M7 before/after NPU execution, such as normalization, reshaping, or activation functions not offloaded to the NPU. 3. NPU Utilization: The Ethos-U55 (256 MAC/cycle) might not be fully saturated if the model's structure or quantization leads to inefficient scheduling or frequent stalls. 4. Memory Access Patterns: Inefficient memory access (e.g., unaligned, non-contiguous) on the Cortex-M7 or NPU can lead to cache misses or increased bus arbitration latency.
  common_mistake: |
    **The Pitfall:** Assuming the NPU is the sole bottleneck and immediately optimizing individual layers.
    **The Rationale:** Candidates jump to model architecture without understanding the overall system's resource utilization, data transfer costs, and CPU preprocessing overhead.
    **The Consequence:** They make micro-optimizations that yield negligible overall improvements, wasting valuable development time and obscuring the true root cause.
  napkin_math: |
    - **NPU Theoretical Time:** Ethos-U55 (256 MAC/cycle at 480 MHz) = 122.88 GMAC/s. A 100 MMAC model theoretically takes 100M / 122.88G = ~0.8 ms.
    - **CPU Preprocessing:** If CPU pre/post-processing takes 20 ms, that's 20ms × 480 MHz = 9.6 million CPU cycles, indicating substantial CPU work.
    - **Data Transfer:** Moving a 100 KB input tensor at a conservative 50 MB/s bus bandwidth takes 100 KB / 50 MB/s = 2 ms.
    - **Conclusion:** The 30 ms latency is likely dominated by **data transfer and CPU preprocessing** rather than the NPU execution itself.
