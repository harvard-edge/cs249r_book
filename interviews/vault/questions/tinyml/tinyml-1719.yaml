title: DMA Overlap to Meet Hard Real-Time Deadlines
scenario: A Cortex-M4 reads an I2C sensor at 100Hz (10ms deadline). Inference takes 8ms. The blocking I2C read takes 3ms.
question: "Can a single-threaded execution model sustain the 100Hz rate, and what is the CPU idle percentage if DMA is used?"
details:
  realistic_solution: A blocking single thread takes 8ms (compute) + 3ms (read) = 11ms. 11ms exceeds the 10ms deadline, so it drops frames. By using DMA, the 3ms I2C transfer for frame N+1 overlaps with the 8ms compute for frame N. The longest path is 8ms. CPU idle time is (10ms - 8ms) / 10ms = 20%.
  common_mistake: |
    **The Pitfall:** Subtracting 3ms from 8ms to find idle time.
    **The Rationale:** Candidates fail to visualize the parallel timeline and miss the overarching 10ms frame period constraint.
    **The Consequence:** The timing feasibility and idle state calculations are completely incorrect.
  napkin_math: |
    * Single thread: 8ms + 3ms = 11ms (Exceeds 10ms constraint).
    * DMA overlapped: Max(8ms compute, 3ms I/O) = 8ms.
    * Frame period = 10ms.
    * CPU idle time = 10ms - 8ms = 2ms.
    * CPU idle percentage = 2ms / 10ms = **20%**.
