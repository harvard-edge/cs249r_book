title: DMA Overlap to Meet Hard Real-Time Deadlines
scenario: A Cortex-M4 reads an I2C sensor at 100Hz (10ms deadline). Inference takes
  8ms. The blocking I2C read takes 3ms.
question: Analyze whether a single-threaded execution model can sustain the 100Hz
  rate, and calculate CPU idle percentage if DMA is used.
details:
  realistic_solution: A blocking single thread takes 8ms (compute) + 3ms (read) =
    11ms. 11ms exceeds the 10ms deadline, so it drops frames. By using DMA, the 3ms
    I2C transfer for frame N+1 overlaps with the 8ms compute for frame N. The longest
    path is 8ms. CPU idle time is (10ms - 8ms) / 10ms = 20%.
  common_mistake: Subtracting 3ms from 8ms to find idle time, missing the overarching
    10ms frame period constraint.
  napkin_math: 8 + 3 = 11 > 10
