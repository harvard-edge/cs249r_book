- The 'Napkin Math' references 'The Cortex-M4 ridge point is typically around 0.28 Ops/byte (using 336
  MFLOPS and 1.2GB/s SRAM)'. However, this 1.2GB/s SRAM figure might be for a higher clocked M4 or a specific
  configuration, while other questions refer to 168MHz M4s with lower theoretical bandwidth (e.g., 0.672
  GB/s). For consistency, it should explicitly state the assumed M4 configuration (clock speed and bus
  width) for which 1.2GB/s is applicable if it's not a generic invariant.
