title: 'TinyML TCO Specification: Specify Power Architecture for 5-Year Battery TinyML Sensor'
scenario: 'Specify the complete power architecture for a Cortex-M4+Ethos-U55 TinyML sensor targeting 5-year
  battery life from 2xAA (3Ah, 3V). The sensor must: run vibration anomaly detection every 30 seconds
  (estimated 50 MOPS, 10ms inference), sync data via BLE every 5 minutes (10mA for 50ms), and maintain
  RTC for timestamping (2μA). Calculate required average current budget and specify power management strategy.'
question: "How would you calculate required average current budget and specify power management strategy?"
details:
  realistic_solution: '5yr battery: 5*365*24=43,800hr. Required avg: 3000mAh/43800hr=68.5μA. Budget allocation:
    RTC: 2μA. MCU sleep: 3μA (target). NPU inference (50MOPS at Ethos, ~5mA for 10ms every 30s): 5mA*10ms/30000ms=1.67μA.
    BLE sync (10mA*50ms per 5min): 10mA*50ms/300000ms=1.67μA. Voltage regulator quiescent: 5μA. MCU wakeup
    overhead (every 30s, 1ms at 30mA): 30mA*1ms/30000ms=1μA. Total: 2+3+1.67+1.67+5+1=14.34μA << 68.5μA
    target. Enormous margin! Can add accelerometer always-on (10μA) for continuous vibration monitoring.
    New total: 24μA. Life: 3000/0.024=125,000hr=14.3 years. Spec: deep sleep optimization pays off.'
  common_mistake: Not budgeting for voltage regulator quiescent current (typically 5-50μA) and RTC crystal
    oscillator current, which can double the MCU sleep current for deeply battery-constrained systems.
  napkin_math: 'Required avg: 3000mAh/(5*8760hr)=68.5μA. Budget: RTC=2μA+MCU sleep=3μA+NPU=1.67μA+BLE=1.67μA+VREG=5μA+wakeup=1μA=14.3μA.
    Life with 14.3μA: 3000/0.0143=209,790hr=23.9yr! 5yr requirement met with 5x margin. Specify: power
    management IC (e.g., TPS62840, IQ=60nA): saves 4.94μA vs typical 5μA VREG. Total with ultra-LDO: 9.4μA.
    Life=31.9yr. Even with 3x design margin: replace every 10yr. Battery life limit: chemical shelf life
    of AA (10yr). Battery replacement triggered by chemistry, not discharge.'
