title: Corstone-300 Operator Cascading and CPU-NPU Pipelining
scenario: You are deploying a vision model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) subsystem. The
  system has a 480 MHz M7, 512 KB of shared SRAM, and an Ethos-U55 NPU configured for 256 MAC/cycle. You
  must evaluate two scheduling plans for a Conv2D -> DepthwiseConv2D -> Dense layer sequence. Plan A schedules
  all operators sequentially on the Ethos-U55, writing a 150 KB intermediate activation between convolutions
  to the shared SRAM. Plan B uses Ethos-U55 layer cascading for the convolutions to keep the 150 KB activation
  completely within the NPU's internal buffers, while scheduling the final Dense layer on the M7 CPU to
  execute concurrently with the next frame's convolutions. Which plan do you recommend and why?
details:
  realistic_solution: Plan B is the better system-level choice. By cascading the Conv2D and DepthwiseConv2D
    layers on the Ethos-U55, we avoid reading and writing the 150 KB intermediate tensor to the main 512
    KB SRAM, significantly reducing memory contention and saving power. Even though the M7 CPU is slower
    at computing the Dense layer, running it in parallel with the NPU's execution of the next frame's
    convolutions increases overall system throughput and hides the Dense layer latency. Care must be taken
    to ensure the 512 KB shared SRAM is partitioned properly so the M7 and U55 do not stall each other
    on bus accesses.
  common_mistake: Candidates often reflexively choose Plan A because the Ethos-U55 has significantly higher
    MAC throughput than the Cortex-M7. They fail to account for the shared SRAM memory bandwidth bottleneck
    and the severe latency penalty of spilling intermediate activations back to the main 512 KB SRAM instead
    of leveraging the NPU's internal local storage.
  napkin_math: 'For Plan A: Writing and reading the 150 KB intermediate activation to SRAM generates 300
    KB of memory traffic. Assuming a 32-bit bus at 480 MHz (4 bytes/cycle), this takes at least 75,000
    cycles (~156 µs) purely for memory transfer. For Plan B: This memory transfer is eliminated. If the
    Dense layer requires 200,000 MACs, the Cortex-M7 (using dual-MAC SIMD DSP instructions) takes about
    100,000 cycles (~208 µs) to compute it. Since the Ethos-U55 (256 MAC/cycle) will take significantly
    longer than 208 µs to compute the millions of MACs for the next frame''s convolutions, the Dense layer
    execution on the CPU is entirely hidden, resulting in zero effective latency for that layer while
    conserving precious shared SRAM bandwidth.'
