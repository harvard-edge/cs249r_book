title: Denial-of-Sleep via Early Exit Exploitation
scenario: An anomaly detection model uses early exit branches to save power; simple inputs exit early, drawing ~5mA active current for 10ms, while complex inputs traverse the full network, drawing ~5mA for 50ms. An attacker continuously sends crafted OOD inputs over BLE 5.3 that force the model to always evaluate the full network. The device runs on a 200mAh coin cell battery, processes 10 inferences per second, and normally receives 1 complex input for every 99 simple inputs.
question: How does a denial-of-sleep attack on early exits change average current and coin-cell battery life?
details:
  realistic_solution: 'The crafted inputs act as a Denial-of-Sleep attack by forcing the worst-case execution path, exploiting the data-dependent execution time of the early-exit architecture. Because the active current (~5mA) is sustained for 5x longer per inference, the overall energy consumption increases drastically.'
  common_mistake: |
    **The Pitfall:** Identifying the denial-of-sleep attack conceptually but failing to quantify its impact on system current.
    **The Rationale:** Candidates state the battery will drain faster without calculating the baseline versus attacked power consumption metrics.
    **The Consequence:** The severity of the vulnerability is not empirically demonstrated, making it harder to justify robust defensive mechanisms.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Battery: 200mAh.
       - Baseline inputs: 99% simple (10ms @ 5mA), 1% complex (50ms @ 5mA).
       - Attacked inputs: 100% complex.
       - Inference rate: 10 inf/sec.
    2. **Calculations:**
       - Baseline energy (100 infs) = 99*(5mA*10ms) + 1*(5mA*50ms) = 5200 mA-ms.
       - Baseline average per inf = 52 mA-ms.
       - Attacked energy (100 infs) = 100*(5mA*50ms) = 25000 mA-ms.
       - Attacked average per inf = 250 mA-ms.
       - Baseline avg current = 52 mA-ms * 10 / 1000 = 0.52 mA.
       - Attacked avg current = 250 mA-ms * 10 / 1000 = 2.5 mA.
       - Baseline life = 200mAh / 0.52mA = ~384 hours.
       - Attacked life = 200mAh / 2.5mA = 80 hours.
    3. **Conclusion & Interpretation:**
       - **Result: Battery life drops from 384 hours to 80 hours.**
