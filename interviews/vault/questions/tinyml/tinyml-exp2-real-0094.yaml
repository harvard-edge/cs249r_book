title: ESP32-S3 Flash Partitioning for Model OTA
scenario: You are deploying a voice assistant on an ESP32-S3 (240 MHz dual-core Xtensa, 512 KB SRAM, 8
  MB PSRAM, WiFi/BLE) equipped with an 8 MB SPI flash. The system requires a 1.8 MB application firmware
  and a 3.2 MB INT8 quantized audio model using the vector extensions. You must design an OTA update scheme
  over WiFi that allows independent updates of the firmware and model with rollback capabilities. Evaluate
  the partition layout constraints and propose a deployment strategy that ensures safe updates without
  exceeding the available flash capacity.
question: "How would you evaluate the partition layout constraints and propose a deployment strategy that ensures safe updates without exceeding the available flash capacity?"
details:
  realistic_solution: Decouple the firmware and model partitions. Use standard A/B slots for the 1.8 MB
    firmware to ensure safe rollbacks. For the model, use a single flash partition but stage the incoming
    3.2 MB model OTA payload in the 8 MB PSRAM. Verify the model's cryptographic signature in PSRAM before
    erasing and writing to the flash. If a power loss occurs during the model flash write, the intact
    firmware will boot into a recovery state and request a model re-download over WiFi.
  common_mistake: Candidates often default to a monolithic A/B partitioning scheme that combines both
    firmware and the model, which exceeds the physical flash size. They also frequently overlook using
    the ample 8 MB PSRAM to stage and verify the model download before committing to flash.
  napkin_math: 'Monolithic A/B capacity required: 2 * (1.8 MB + 3.2 MB) = 10.0 MB > 8.0 MB (Fails). Decoupled
    layout: Firmware A (1.8 MB) + Firmware B (1.8 MB) + Model (3.2 MB) = 6.8 MB. Flash remaining: 8.0
    MB - 6.8 MB = 1.2 MB (sufficient for Bootloader, NVS, and partition tables). PSRAM staging overhead:
    The 3.2 MB model fits comfortably within the 8.0 MB PSRAM, leaving 4.8 MB of PSRAM available for the
    application heap and TLS buffers during the OTA process.'
