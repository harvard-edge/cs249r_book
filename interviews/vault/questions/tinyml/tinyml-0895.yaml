title: 'TinyML TCO Analyze: Connectivity Cost for TinyML IoT Fleet'
scenario: 'Analyze the 3-year connectivity cost for 5000 Cortex-M4 sensors deployed in a smart grid with three connectivity options: (A) LoRaWAN ($0.10/device/month via network server), (B) NB-IoT cellular SIM ($2/device/month), (C) WiFi (free but needs router deployment at $200/router per 20 devices). Each sensor sends 24 messages/day of 100 bytes.'
question: What is the 3-year connectivity TCO for 5,000 Cortex-M4 smart-grid sensors on LoRaWAN, NB-IoT, and Wi-Fi?
details:
  realistic_solution: 'Hardware: 5000 * M4 system ($5) = $25K. Option A (LoRa): $0.10*5000*36=$18K connectivity. Router: 1 LoRa gateway per 1000 devices ($500 each) = $2.5K. Total A: $25+$18+$2.5=$45.5K. Option B (NB-IoT): $2*5000*36=$360K. Total B: $25+$360=$385K. Option C (WiFi): Routers: 5000/20*$200=$50K. No monthly fee. Total C: $25+$50=$75K. Ranking: A=$45.5K << C=$75K << B=$385K. LoRaWAN wins by 39% over WiFi and 88% over NB-IoT. Bandwidth check: 24*100 bytes/day = 2400 bytes/day = 0.278 bytes/s. LoRa max: 5 kbps. Fully adequate.'
  common_mistake: |
    **The Pitfall:** Assuming Wi-Fi is the cheapest because it lacks a monthly per-device fee.
    **The Rationale:** Candidates ignore the capital expense of deploying and maintaining dense Wi-Fi router coverage across a large grid.
    **The Consequence:** The cost analysis is skewed, leading to poor network topology decisions that ultimately cost 39% more than LoRaWAN.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware baseline: 5000 devices * $5 = $25K.
    - Duration: 36 months.
    - Payload: 24 msgs/day * 100 bytes = 2400 bytes/day.

    **Calculations:**
    - Option A (LoRaWAN): 36 * $0.10 * 5000 = $18K. Plus 5 Gateways ($500 ea) = $2.5K. Total = $45.5K.
    - Option B (NB-IoT): 36 * $2 * 5000 = $360K. Total = $385K.
    - Option C (Wi-Fi): 5000 / 20 = 250 routers. 250 * $200 = $50K. Total = $75K.

    **Conclusion & Interpretation:**
    - **Result: $45.5K (Cost-Bound)**. LoRaWAN is the most cost-effective solution at $45.5K, easily beating Wi-Fi ($75K) and NB-IoT ($385K).
