title: Asymmetric Quantization Equation for nRF5340
scenario: You are deploying a 200,000 parameter keyword spotting model to a Nordic nRF5340, which features
  a 128 MHz app core, 256 KB SRAM, and 1 MB flash. To ensure the model weights and BLE 5.3 networking
  stack both fit within the available memory, you must apply INT8 Post-Training Quantization (PTQ). When
  converting the weights from FP32 to INT8, what is the standard mathematical equation for asymmetric
  quantization that maps a real-world floating-point value to a quantized integer value?
details:
  realistic_solution: 'The candidate should immediately recall the standard affine quantization mapping:
    r = S * (q - Z) or its inverse q = round(r / S) + Z. They must correctly identify ''r'' as the real
    FP32 value, ''S'' as the FP32 scale factor, ''q'' as the quantized INT8 value, and ''Z'' as the integer
    zero-point. Recalling this exact relationship is fundamental, as the zero-point ensures the real value
    0.0 is exactly representable, which is crucial for efficient zero-padding in CNNs on resource-constrained
    MCUs.'
  common_mistake: Candidates frequently forget the zero-point term entirely, confusing asymmetric quantization
    with symmetric quantization. Alternatively, they may incorrectly state that the zero-point is a floating-point
    value rather than an integer of the exact same type as the quantized weights.
  napkin_math: 'FP32 Model Size: 200,000 parameters * 4 bytes/parameter = 800 KB. Total Flash Capacity:
    1 MB (1024 KB). 800 KB consumes ~78.1% of flash, leaving insufficient space for the BLE 5.3 stack
    and app core logic. INT8 Model Size: 200,000 parameters * 1 byte/parameter = 200 KB. The INT8 model
    consumes only ~19.5% of the 1 MB flash and can even be fully loaded into the 256 KB SRAM, leaving
    56 KB available for activation buffers and the RTOS.'
