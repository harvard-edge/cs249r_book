title: The Battery Voltage Sag Reset
scenario: Your battery-powered TinyML device wakes from deep sleep, turns on its Wi-Fi modem, and runs a heavy CNN to classify an image. When the battery is full (4.2V), it works perfectly. When the battery drops to 3.6V (which is still 40% full), the device crashes and reboots the exact moment the neural network starts computing.
question: Why does the device die when there is still 40% battery left at 3.6V?
details:
  realistic_solution: Voltage sag under load causes a brown-out reset (BOR). The simultaneous operation of the Wi-Fi TX and the CNN inference draws a massive peak current. The battery's internal equivalent series resistance causes the voltage to drop under this load. Solutions include adding a bulk decoupling capacitor, staggering the Wi-Fi and inference workloads to prevent concurrent peaks, or utilizing a buck-boost regulator.
  common_mistake: |
    **The Pitfall:** Assuming battery state-of-charge equals guaranteed voltage delivery under load.
    **The Rationale:** Engineers read the static 3.6V state and ignore dynamic Ohm's Law calculations for peak currents.
    **The Consequence:** The device suffers mystifying brown-out resets in the field as the battery ages and its internal resistance naturally increases.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Battery Voltage: 3.6V. Internal Resistance: ~2 Ohms.
       - Peak Current (Wi-Fi + CNN): ~0.35A.
       - Brown-out threshold: 3.3V.
    2. **Calculations:**
       - Voltage Drop (V = I * R): 0.35A * 2 Ohms = 0.7V.
       - Actual Voltage at MCU: 3.6V - 0.7V = 2.9V.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound.** The 2.9V delivery is strictly below the 3.3V brown-out threshold, causing an immediate hardware crash.
  options:
  - The MCU's brown-out detector is misconfigured and triggers at 3.6V instead of the correct 2.8V threshold.
  - The system suffers a brown-out reset due to a 0.7V voltage sag (0.35A peak current * 2 Ohm internal resistance), dropping the 3.6V battery below the 3.3V threshold.
  - The LiPo battery's internal protection circuit cuts off current when the load exceeds 300 mA, shutting down the device at exactly the moment both subsystems activate.
  - The WiFi modem and CNN both access the same SRAM bank simultaneously, causing a bus contention fault that triggers the watchdog timer and reboots the device.
  correct_index: 1
