title: The Battery Voltage Sag Reset
scenario: Your battery-powered TinyML device wakes from deep sleep, turns on its Wi-Fi modem, and runs a heavy CNN to classify an image. When the battery is full (4.2V), it works perfectly. When the battery drops to 3.6V (which is still 40% full), the device crashes and reboots the exact moment the neural network starts computing.
question: Why does the device die when there is still 40% battery left at 3.6V?
details:
  realistic_solution: 'Voltage sag under load causes a brown-out reset. Battery at 3.6V with 2-ohm internal resistance. Peak current when WiFi + CNN run simultaneously: ~350mA. Voltage drop: I*R = 0.35A * 2ohm = 0.7V. Actual voltage at MCU: 3.6 - 0.7 = 2.9V, below the 3.3V brown-out threshold. Fix: (1) add a 100uF bulk capacitor near the MCU to supply transient current, (2) stagger WiFi and inference — never run both simultaneously, (3) use a buck-boost regulator that maintains output even with sagging input. The battery has plenty of energy; the delivery path cannot handle the peak current.'
  common_mistake: |
    **The Pitfall:** Assuming battery state-of-charge equals guaranteed voltage delivery.
    **The Rationale:** Engineers look at the static 3.6V reading and assume it is well above the 3.3V requirement.
    **The Consequence:** They ignore dynamic voltage sag under heavy concurrent loads (like ML + Radio), leading to mystifying brown-out resets in the field.
  napkin_math: |
    *   **Battery Voltage:** 3.6V.
    *   **Internal Resistance:** ~2 Ohms.
    *   **Peak Current:** Wi-Fi TX + CNN inference simultaneously draw ~0.35A.
    *   **Voltage Drop (V = I * R):** 0.35A × 2 Ohms = 0.7V.
    *   **Actual Voltage at MCU:** 3.6V - 0.7V = **2.9V**.
    *   **Conclusion:** The 2.9V delivery is below the 3.3V brown-out threshold, causing an immediate crash.
  options:
  - The MCU's brown-out detector is misconfigured and triggers at 3.6V instead of the correct 2.8V threshold.
  - 'Voltage sag under load causes a brown-out reset. Battery at 3.6V with ~2 ohm internal resistance; peak current (WiFi TX + CNN inference) ~350 mA creates a 0.7V drop, delivering only 2.9V to the MCU — below the 3.3V brown-out threshold. Fix: add a 100 uF bulk capacitor, stagger WiFi and inference (never simultaneous), or use a buck-boost regulator.'
  - The LiPo battery's internal protection circuit cuts off current when the load exceeds 300 mA, shutting down the device at exactly the moment both subsystems activate.
  - The WiFi modem and CNN both access the same SRAM bank simultaneously, causing a bus contention fault that triggers the watchdog timer and reboots the device.
  correct_index: 1
