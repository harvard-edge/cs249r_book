title: Nordic nRF5340 Power Mode Analysis
scenario: A tinyML application running on a Nordic nRF5340, which features a 128 MHz Arm Cortex-M33, 256
  KB SRAM, and 1 MB flash, frequently switches between active computation and a low-power BLE advertising
  state. Explain how DVFS P-states and power caps would be managed on such a device to optimize energy
  efficiency, considering its constrained resources and variable workload.
question: "How DVFS P-states and power caps would be managed on such a device to optimize energy efficiency, considering its constrained resources and variable workload?"
details:
  realistic_solution: A realistic solution involves dynamically adjusting DVFS P-states based on immediate
    computational load, utilizing the nRF5340's power management unit (PMU) for fine-grained control.
    Implementing a power cap would further constrain peak power, ensuring battery longevity. Crucially,
    the BLE radio should be managed independently, minimizing active transmission time and leveraging
    low-power advertising modes, as its power consumption often dominates the total budget in idle periods.
    Monitoring actual energy-per-inference would guide optimal P-state and BLE duty cycle settings.
  common_mistake: Overlooking the impact of frequent state transitions on average power, or misapplying
    DVFS P-states without accounting for peripheral power consumption (like BLE radio) which might not
    scale linearly with core frequency.
  napkin_math: If the nRF5340 consumes 5 mA at 128 MHz for computation for 100 ms, and 2 µA in sleep mode
    with BLE advertising for 900 ms per cycle, what is the average current draw over a 1-second cycle?
    Average Current = (5 mA * 0.1 s + 0.002 mA * 0.9 s) / 1 s = (0.5 + 0.0018) mA = 0.5018 mA.
