title: nRF5340 Always-On Wake Word Energy Budgeting
scenario: You are designing a battery-operated smart home sensor using the Nordic nRF5340. The system needs to run an always-on wake word detection model on the 128 MHz app core, which draws ~5mA active current. You are constrained to a 220mAh CR2032 coin cell and must achieve a 1-year battery life while periodically transmitting over BLE 5.3 using the 64 MHz net core.
question: How would you evaluate the required duty cycle and sleep state power constraints to make this system feasible?
details:
  realistic_solution: A 220mAh battery drained by 5mA lasts ~44 hours. The system must duty cycle the 128 MHz core using a cascaded, ultra-low-power hardware VAD.
  common_mistake: |
    **The Pitfall:** Assuming the app core can run continuously or failing to account for sleep current.
    **The Rationale:** Candidates simply divide battery capacity by active current without designing a cascaded wake-up or aggressive duty cycling strategy.
    **The Consequence:** The device will drain its 220mAh battery in roughly 44 hours instead of the required 1 year.
  napkin_math: |
    **Assumptions & Constraints:**
    - Battery: CR2032 (220 mAh).
    - Target lifespan: 1 year (8760 hours).
    - App core active draw: 5 mA (5000 µA).
    - Sleep draw: 5 µA.

    **Calculations:**
    - Max allowed continuous average current: 220 mAh / 8760 h = 25 µA.
    - Active budget available: 25 µA - 5 µA (sleep) = 20 µA.
    - Allowed duty cycle: 20 µA / 5000 µA = 0.4%.

    **Conclusion & Interpretation:**
    - **Result: 0.4% duty cycle (4 ms per second) (Energy-Bound)**. The system requires hardware VAD cascading to meet the lifespan.
