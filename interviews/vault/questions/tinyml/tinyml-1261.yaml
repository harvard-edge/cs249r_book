title: nRF5340 Always-On Wake Word Energy Budgeting
scenario: You are designing a battery-operated smart home sensor using the Nordic nRF5340. The system needs to run an always-on wake word detection model on the 128 MHz app core, which draws ~5mA active current. You are constrained to a 220mAh CR2032 coin cell and must achieve a 1-year battery life while periodically transmitting over BLE 5.3 using the 64 MHz net core.
question: How would you evaluate the required duty cycle and sleep state power constraints to make this system feasible?
details:
  realistic_solution: At L5, a candidate should recognize that running a ~5mA core continuously will drain a 220mAh battery in roughly 44 hours. The solution requires duty cycling the wake word model (e.g., using a lower-power hardware VAD to wake the 128 MHz core only when voice activity is detected), optimizing inference time to stay active for less than 1% of the time, and ensuring deep sleep currents remain in the microamp range.
  common_mistake: |
    **The Pitfall:** Assuming the app core can run continuously or failing to account for sleep current.
    **The Rationale:** Candidates often simply divide battery capacity by active current without designing a cascaded wake-up or aggressive duty cycling strategy.
    **The Consequence:** The device will drain its 220mAh battery in roughly 44 hours instead of the required 1 year.
  napkin_math: |
    1. **Total battery capacity:** 220 mAh.
    2. **Target life:** 1 year (8760 hours).
    3. **Max average continuous draw:** 220 mAh / 8760 h ≈ 25 µA.
    4. **Active inference draw:** ~5 mA (5000 µA).
    5. **Available budget for active time:** Assuming 5 µA sleep current, budget is 25 µA - 5 µA = 20 µA.
    6. **Duty cycle:** 20 µA / 5000 µA = 0.4%.
    7. **Conclusion:** The 128 MHz app core can only be active for **4 ms per second** to meet the 1-year requirement.
