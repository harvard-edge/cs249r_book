title: TinyML Training Buffer Overrun
scenario: A TinyML device collects vibration windows for periodic local calibration. The sensor produces 12 KB/s, calibration writes flash at 4 KB/s, and the RAM buffer is 96 KB. After several minutes, data is dropped. Diagnose the bottleneck.
question: Why does a TinyML calibration buffer overflow when sensor input is 12 KB/s and flash writes sustain 4 KB/s?
details:
  realistic_solution: The ingestion rate exceeds the drain rate by 8 KB/s. A 96 KB buffer fills in about 12 seconds once calibration starts, so minutes of operation guarantee drops unless sampling, compression, or offload changes. The bottleneck is write bandwidth, not model compute.
  common_mistake: Increasing model speed while ignoring that data enters faster than flash can drain it.
  napkin_math: Net fill rate = 12 - 4 = 8 KB/s. Fill time = 96 / 8 = 12 seconds.
