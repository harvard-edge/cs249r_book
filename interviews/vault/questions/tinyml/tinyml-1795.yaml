title: SRAM Queue Drop Rate
scenario: A Cortex-M4 at 120 MHz processes vibration anomalies. Interrupts arrive stochastically at 150 req/s, but the service rate is 100 req/s. The 8KB SRAM can only hold 4 requests at a time.
question: Analyze the probability of dropping an inference request during this burst state, given an M/M/1/K queue approximation where capacity K=4.
details:
  realistic_solution: During the burst, the arrival rate (λ=150) exceeds the service rate (μ=100), giving a utilization factor ρ = 1.5. Because the SRAM capacity limits the queue to K=4 items, requests arriving when the queue is full are dropped. Using the finite capacity M/M/1/K blocking formula, the probability of a drop is the probability that there are exactly 4 items in the system.
  common_mistake: |
    **The Pitfall:** Assuming a flat 100% drop rate for the excess 50 req/s.
    **The Rationale:** Candidates subtract service rate from arrival rate linearly (150 - 100 = 50 dropped) without understanding stochastic queuing.
    **The Consequence:** The system's buffer capacity is sized incorrectly because the probabilistic clearing of the finite queue is ignored.
  napkin_math: |
    * **Arrival Rate (λ):** 150 req/s
    * **Service Rate (μ):** 100 req/s
    * **Utilization (ρ):** λ / μ = 1.5
    * **Queue Capacity (K):** 4 items
    * **M/M/1/K Blocking Formula:** P_drop = (ρ^K * (1 - ρ)) / (1 - ρ^(K+1))
    * **Calculation:**
      * P_drop = (1.5^4 * (1 - 1.5)) / (1 - 1.5^5)
      * P_drop = (5.0625 * -0.5) / (1 - 7.59375)
      * P_drop = -2.53125 / -6.59375 ≈ **0.3838**
    * **Conclusion:** There is a **38.4% probability** of dropping a request during the burst.
