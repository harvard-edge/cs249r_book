title: SRAM Queue Drop Rate
scenario: A Cortex-M4 at 120 MHz processes vibration anomalies. Interrupts arrive
  stochastically at 150 req/s, but service rate is 100 req/s. The 8KB SRAM can only
  hold 4 requests at a time.
question: Analyze the probability of dropping an inference request during this burst
  state, given an M/M/1/K queue approximation where capacity K=4.
details:
  realistic_solution: During the burst, the arrival rate (λ=150) exceeds the service
    rate (μ=100), giving a utilization factor ρ = 1.5. Because the SRAM capacity limits
    the queue to K=4 items, requests arriving when the queue is full are dropped.
    Using the finite capacity M/M/1/K blocking formula, the probability of a drop
    is the probability that there are exactly 4 items in the system.
  common_mistake: Assuming 100% drop rate of the excess 50 req/s, failing to account
    for the stochastic clearing and finite buffer probabilities of the M/M/1/K model.
  napkin_math: P_4 = (1.5^4 * (1 - 1.5)) / (1 - 1.5^5) = (5.0625 * -0.5) / (1 - 7.59375)
    = -2.53125 / -6.59375 ≈ 0.3838.
