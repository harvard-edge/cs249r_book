title: 'Model Format Conversion: Compare TFLite Micro vs. TensorFlow Lite for MCU Deployment'
scenario: A keyword spotting model (DS-CNN-S, 100K params, INT8, 0.09 MOPs) needs to run on both Cortex-M4
  (168MHz, 256KB SRAM) and Jetson Orin. Compare TFLite Micro (MCU runtime, <20KB RAM overhead) vs. standard
  TFLite (GPU delegate) for each platform.
question: "How would you compare TFLite Micro (MCU runtime, <20KB RAM overhead) vs. standard TFLite (GPU delegate) for each platform?"
details:
  realistic_solution: 'Cortex-M4: must use TFLite Micro. Dynamic allocation in standard TFLite requires
    heap ~1MB minimum — impossible on 256KB SRAM. TFLite Micro: static arena, model in Flash, inference
    arena ~50KB. DS-CNN-S inference: 0.09M/168M = 0.54ms. Jetson Orin: use TFLite standard with GPU delegate:
    0.09M/275T = 0.33μs, realistic ~2ms with overhead. Or TensorRT: ~1ms. For Jetson, TensorRT always
    preferred.'
  common_mistake: Using standard TFLite on Cortex-M4; it requires dynamic memory allocation and a file
    system, unavailable on bare-metal MCUs. TFLite Micro uses static allocation.
  napkin_math: 'DS-CNN-S: 100K params × 1B = 100KB. Flash: fits in 256KB M4 Flash. SRAM: model weights
    (100KB) + arena (50KB) = 150KB of 256KB = 58.6%. Tight but feasible. Inference: 0.09M/168M = 0.536ms.
    Jetson TFLite GPU: overhead dominates (2ms). TensorRT: ~1ms with INT8.'
