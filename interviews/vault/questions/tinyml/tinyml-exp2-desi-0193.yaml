title: Sparse Wake-Word Design for Nordic nRF5340
scenario: You are tasked with deploying an always-on wake-word detection model on a Nordic nRF5340 microcontroller.
  The application must run on the 128 MHz app core, but the system is strictly constrained by 256 KB SRAM,
  1 MB flash, and a tight power budget of ~5mA active. The current dense CNN model exceeds the SRAM limit
  when combined with the BLE 5.3 stack. Design a pruning and sparsity strategy that leverages the nRF5340's
  architecture to meet memory and power constraints without degrading accuracy.
question: "How would you design a pruning and sparsity strategy that leverages the nRF5340's architecture to meet memory and power constraints without degrading accuracy?"
details:
  realistic_solution: The optimal design uses structured pruning (like channel or filter pruning) to reduce
    the model footprint while maintaining dense memory access patterns suitable for the Cortex-M33. The
    candidate should evaluate combining structured pruning with quantization to comfortably fit activations
    alongside the RTOS and BLE stack within the 256 KB SRAM.
  common_mistake: Candidates often propose unstructured pruning to achieve maximum theoretical sparsity,
    ignoring that the nRF5340 lacks dedicated sparse matrix hardware. This results in control-flow overhead
    and cache misses that actually increase inference latency and active power consumption.
  napkin_math: 'Baseline model: 180 KB peak activations and 600 KB weights. The 600 KB fits in 1 MB flash,
    but 180 KB activations take 70% of 256 KB SRAM, starving the BLE stack. Applying 50% structured channel
    pruning reduces peak activations by roughly half to 90 KB. This frees up 90 KB of SRAM, safely accommodating
    the network stack while reducing MAC operations to minimize time spent at the ~5mA active current
    draw.'
