title: The Race-to-Sleep Dilemma
scenario: 'You are designing a wearable audio sensor that runs a keyword-spotting model. The model requires
  exactly 100 Million FLOPs per inference. You can choose between two microcontrollers:'
details:
  realistic_solution: The Cortex-M7 is more energy-efficient, even though its power rating is higher.
    This is a classic example of the 'race-to-sleep' principle. The M7 completes the fixed workload of
    100M FLOPs much faster than the M4. Because it spends less time in its high-power active state, the
    total energy consumed (Power × Time) is lower.
  common_mistake: The most common mistake is to confuse lower power (Watts) with lower energy consumption
    (Joules). Engineers often pick the chip with the lower mW rating, assuming it's always more efficient.
    They fail to account for the *time* spent in the active state. A more powerful chip that finishes
    the task quickly and returns to a low-power sleep state can consume less total energy.
  napkin_math: Cortex-M4 runs at 168MHz. Assuming 1 instruction per cycle and no hardware FPU parallelization,
    executing 100 MFLOPs takes roughly 100,000,000 / 168,000,000 = 0.595 seconds of active compute. At
    an active power of 50mW, each inference consumes 0.595s * 50mW = ~29.8 mJ. A dedicated NPU might do
    this in 5ms, saving massive amounts of energy.
  options:
  - The Cortex-M4, because its active power rating (30mW) is lower.
  - The Cortex-M7, because it finishes the computation faster, spending less time in an active state.
  - They are equally energy-efficient because the total number of FLOPs is the same for both.
  - It's impossible to know without the sleep power consumption for each MCU.
  correct_index: 1
