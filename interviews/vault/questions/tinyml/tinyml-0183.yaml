title: The Race-to-Sleep Dilemma
scenario: You are designing a wearable audio sensor that runs a keyword-spotting model. The model requires exactly 100 Million FLOPs per inference. You can choose between two microcontrollers.
question: Why can a higher-power Cortex-M7 consume less energy than a Cortex-M4 for a fixed 100 MFLOP keyword-spotting inference?
details:
  realistic_solution: The Cortex-M7 is more energy-efficient, even though its power rating is higher. This is a classic example of the 'race-to-sleep' principle. The M7 completes the fixed workload of 100M FLOPs much faster than the M4. Because it spends less time in its high-power active state, the total energy consumed (Power × Time) is lower.
  common_mistake: |
    **The Pitfall:** Confusing lower peak power (Watts) with lower total energy consumption (Joules).
    **The Rationale:** Engineers often pick the chip with the lowest mW rating, failing to account for the time spent in the active state to complete a fixed workload.
    **The Consequence:** Choosing an underpowered chip that stays active too long, ultimately draining the battery faster (failing the 'race-to-sleep' principle).
  napkin_math: |
    - Cortex-M4 runs at 168MHz. Assuming 1 inst/cycle, executing 100 MFLOPs takes 100,000,000 / 168,000,000 = 0.595 seconds.
    - At active power of 50mW, energy = 0.595s * 50mW = **29.75 mJ**.
    - A faster M7 running at 480MHz with a better FPU takes ~0.1s.
    - Even if the M7 draws 100mW (double the power), energy = 0.1s * 100mW = **10.0 mJ**.
    - The higher-power chip saves ~66% of the energy.
  options:
  - The Cortex-M4, because its active power rating (30mW) is lower.
  - The Cortex-M7, because it finishes the computation faster, spending less time in an active state.
  - They are equally energy-efficient because the total number of FLOPs is the same for both.
  - It's impossible to know without the sleep power consumption for each MCU.
  correct_index: 1
