title: Optimizing Data Movement for Real-time TinyML on Cortex-M7 + Ethos-U55
scenario: You are tasked with designing an embedded ML system for real-time image classification processing a continuous stream of 224x224x3 (UINT8) images at 30 frames per second. The Ethos-U55 requires input data to be in a specific, cache-coherent memory region for optimal DMA transfers.
question: How would you leverage DMA, zero-copy techniques, and memory pinning to avoid CPU-bound data movement overheads?
details:
  realistic_solution: Implement a double-buffering scheme for the input and output tensors. Allocate two 224x224x3 byte buffers in a memory region that is shared and cache-coherent between the Cortex-M7 and Ethos-U55, specifically for DMA. Configure the Cortex-M7's DMA controller to transfer incoming image data directly into one buffer while the Ethos-U55 processes the other. Once the NPU completes inference, its output is DMA'd out, and the buffers are swapped. For intermediate feature maps (up to 256 KB), carefully allocate non-overlapping regions within the remaining SRAM, potentially reusing memory between stages or partitioning larger tensors if needed. Employ zero-copy by ensuring the Ethos-U55 can directly access the DMA'd input buffer and write its outputs to a designated buffer without CPU intervention, thus minimizing CPU load and maximizing throughput.
  common_mistake: |
    **The Pitfall:** Relying on CPU-initiated data copies for every video frame.
    **The Rationale:** Candidates fail to utilize DMA double-buffering, resulting in frequent CPU stalls and cache invalidation issues.
    **The Consequence:** The system misses real-time 30 FPS deadlines due to massive CPU copying overhead.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Input Image: 224 * 224 * 3 bytes (UINT8).
       - Frame Rate: 30 FPS.
       - Available SRAM: 512 KB.
    2. **Calculations:**
       - Single Buffer Size: 150,528 bytes (~147 KB).
       - Double Buffer Total: 147 KB * 2 = 294 KB.
       - Data Rate: 147 KB * 30 FPS = 4.41 MB/s.
       - Remaining SRAM for Intermediate Features: 512 KB - 294 KB = 218 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound** (Double buffering requires 294 KB, leaving a strict 218 KB budget for intermediate NPU feature maps).
