title: The Tensor Arena Hard Fault
scenario: 'You are optimizing an anomaly detection model. To maintain accuracy on a critical layer, your team decided to use mixed precision: the bulk of the model is INT8, but the final layer is kept as FP32. The model fits in Flash, but during inference, the device hard-faults. Your memory profiler reports a peak Tensor Arena usage of 1.1MB, far exceeding the 512KB SRAM. You diagnose that the peak occurs when the 280KB INT8 output tensor of the penultimate layer is de-quantized to be used as input for the final FP32 layer.'
question: How do you avoid the 1.12 MB FP32 temporary from a 280 KB INT8 tensor on a limited SRAM budget?
details:
  realistic_solution: 'Eliminate the de-quantization step by using Quantization-Aware Training (QAT) to convert the final sensitive layer to INT8 while recovering lost accuracy. This avoids the 4x memory explosion of the temporary FP32 buffer and allows the model to fit strictly within SRAM.'
  common_mistake: |
    **The Pitfall:** Applying aggressive weight pruning to shrink the model size.
    **The Rationale:** Candidates confuse non-volatile Flash storage constraints (model size) with volatile SRAM constraints (activation buffers).
    **The Consequence:** Extensive pruning hurts accuracy but does nothing to solve the runtime SRAM hard-fault caused by the de-quantization buffer.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Available SRAM: 512 KB.
       - INT8 Tensor: 280 KB.
       - Target conversion: FP32.
    2. **Calculations:**
       - FP32 buffer = 280 KB * (4 bytes / 1 byte) = 1,120 KB.
       - OOM Gap = 1,120 KB - 512 KB = 608 KB deficit.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** The de-quantization strictly requires a 1.12 MB contiguous block, making QAT to INT8 the only viable architectural fix.
  options:
  - "Apply aggressive weight pruning to the largest layers to reduce the overall model size."
  - "Quantize the final layer to INT8, likely using QAT to preserve its accuracy."
  - "Re-architect the model to use smaller layers at the end of the network."
  - "Request a hardware change to a microcontroller with at least 1.5MB of SRAM."
  correct_index: 1
