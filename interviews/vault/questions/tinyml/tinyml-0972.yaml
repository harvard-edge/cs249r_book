title: 'NPU Offloading Energy Overhead Paradox'
scenario: 'You are profiling power on a Corstone-300 system (Cortex-M7 CPU + Ethos-U55 NPU). The CPU achieves 1 MAC/cycle at 100 mW. The NPU achieves 256 MACs/cycle at 150 mW. Waking the NPU requires a fixed 0.5 ms of CPU active time. For a tiny 100,000 MAC keyword spotting model, running purely on the CPU uses less energy than offloading to the NPU.'
question: 'Why does this system behavior occur, and what is the total energy-per-inference for both CPU-only and NPU-offloaded execution?'
details:
  realistic_solution: 'The correct approach requires applying the energy equation (Energy = Power × Time) to both execution scenarios. By calculating the execution time on the M7 CPU versus the NPU, and incorporating the fixed 0.5 ms wakeup overhead, the candidate demonstrates that the fixed wakeup energy significantly outweighs the execution energy for very small models. The NPU only becomes energy-efficient when the dynamic compute savings offset this fixed activation penalty.'
  common_mistake: |
    **The Pitfall:** Assuming hardware NPU accelerators are universally more energy-efficient for all workloads regardless of size.
    **The Rationale:** Candidates calculate dynamic energy (milliwatts per MAC) but overlook the fixed static energy overheads required to power-gate and initialize the accelerator IP.
    **The Consequence:** Deploying ultra-small models onto accelerators wastes battery life, as the fixed activation penalty dwarfs the dynamic compute savings.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100,000 MACs.
    - CPU: 480 MHz, 1 MAC/cycle, 100 mW.
    - NPU: 480 MHz, 256 MAC/cycle, 150 mW.
    - Wakeup penalty: 0.5 ms at 100 mW.

    **Calculations:**
    - CPU execution time = 100,000 / 480,000,000 = 0.208 ms.
    - CPU energy = 0.208 ms * 100 mW = 20.8 µJ.
    - NPU execution time = 100,000 / (480M * 256) ≈ 0.0008 ms.
    - NPU compute energy = 0.0008 ms * 150 mW = 0.12 µJ.
    - NPU wakeup energy = 0.5 ms * 100 mW = 50 µJ.
    - Total NPU energy = 50.12 µJ.

    **Conclusion & Interpretation:**
    - **Result: 50.12 µJ vs 20.8 µJ (Energy-Bound)**. The NPU consumes 50.12 µJ compared to the CPU's 20.8 µJ. The accelerator only becomes energy-efficient when the workload is large enough that the dynamic compute savings offset the massive 50 µJ fixed activation penalty.
