title: NPU Offloading Energy Overhead Paradox
scenario: You are profiling power consumption on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) system where both components share 512 KB of SRAM. The Cortex-M7 runs at 480 MHz (achieving 1 MAC/cycle) and consumes 100 mW of active power. The Ethos-U55 NPU consumes 150 mW when active (total system power) and is configured for 256 MACs/cycle. Waking the NPU and transferring control requires a fixed 0.5 ms of M7 active time. A junior engineer notices that for a keyword spotting model with 100,000 MACs, running the model entirely on the M7 CPU consumes less energy than offloading it to the Ethos-U55.
question: Why does this system behavior occur, and what is the total energy-per-inference for both CPU-only and NPU-offloaded execution?
details:
  realistic_solution: The correct approach requires applying the energy equation (Energy = Power × Time) to both execution scenarios. By calculating the execution time on the M7 CPU versus the NPU, and incorporating the fixed 0.5 ms wakeup overhead, the candidate demonstrates that the fixed wakeup energy significantly outweighs the execution energy for very small models. The NPU only becomes energy-efficient when the dynamic compute savings offset this fixed activation penalty.
  common_mistake: |
    **The Pitfall:** Assuming hardware accelerators like the Ethos-U55 always save energy.
    **The Rationale:** Candidates overlook the fixed energy overheads associated with waking the NPU power domain and the control transfer time.
    **The Consequence:** The fixed wakeup energy outweighs the dynamic compute savings for very small models.
  napkin_math: |
    - Calculate M7 CPU-only time: 100,000 MACs / 480,000,000 MACs/sec = ~0.208 ms.
    - Calculate M7 CPU-only energy: 0.208 ms * 100 mW = 20.8 μJ.
    - Calculate NPU compute time: 100,000 MACs / (480,000,000 Hz * 256 MACs/cycle) = ~0.0008 ms.
    - Calculate NPU wakeup energy: 0.5 ms * 100 mW = 50 μJ.
    - Calculate NPU compute energy: 0.0008 ms * 150 mW = 0.12 μJ.
    - **Total NPU Energy: 50 μJ + 0.12 μJ = 50.12 μJ. 50.12 μJ (NPU) > 20.8 μJ (CPU), making the NPU less efficient for this workload.**
