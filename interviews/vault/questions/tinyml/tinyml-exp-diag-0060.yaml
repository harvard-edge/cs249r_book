title: Diagnosing Latency Spikes from Unoptimized Fallbacks
scenario: You are deploying an INT8 keyword spotting model via TFLite Micro to an ARM Cortex-M4 (STM32F4).
  The model requires 300 KB of flash and 120 KB of SRAM, fitting comfortably within the 1 MB flash and
  256 KB SRAM constraints. However, profiling reveals the inference latency is 890ms instead of the expected
  30ms, and the system is missing its real-time deadlines. You notice that the vast majority of execution
  time is spent in a single depthwise convolution layer that was successfully quantized to INT8.
details:
  realistic_solution: The root cause is an operator coverage gap causing a fallback to the unoptimized
    C reference implementation. The specific tensor shapes, strides, or padding used in that depthwise
    convolution are not supported by the CMSIS-NN optimized kernels. Because the STM32F4 has no FPU, if
    the reference implementation also triggers software floating-point emulation for scale factor requantization,
    the performance penalty is catastrophic. The fix is to adjust the model's architectural parameters
    to match supported CMSIS-NN kernel constraints.
  common_mistake: Candidates often assume that if a model successfully converts to TFLite INT8 and loads
    onto the device, all operations will automatically leverage hardware acceleration. They may incorrectly
    suggest overclocking the MCU, shrinking the model, or blaming memory bandwidth, missing the software-to-hardware
    operator mapping failure.
  napkin_math: 'The STM32F4 runs at 168 MHz and uses CMSIS-NN SIMD to perform 2 INT8 MACs per cycle. For
    a layer requiring 10 million MACs, optimized execution takes theoretically (10M / 2 MACs) / 168 MHz
    = ~29.7ms. If it falls back to a non-SIMD C reference kernel, it might take 15 cycles per MAC due
    to loop overhead and memory access: (10M * 15 cycles) / 168 MHz = ~892ms, explaining the massive latency
    spike.'
