title: 'Roofline Analysis on Nordic nRF5340: Optimizing TinyML Inference'
scenario: You are tasked with optimizing a TinyML model for audio keyword spotting on an nRF5340 microcontroller (128 MHz ARM Cortex-M33, 256 KB SRAM, 1 MB flash). Your current model requires 100,000 MAC operations and 60 KB of memory accesses per inference.
question: How should you use roofline analysis on an nRF5340 to classify a 100K-MAC, 60 KB-access KWS model as compute-bound or memory-bound?
details:
  realistic_solution: A realistic solution involves refining the Roofline model parameters with actual measured values where possible, especially for `P_peak` (by running compute-bound kernels) and `B_peak` (by running memory-bound kernels) on the nRF5340. For the model itself, optimization techniques like 8-bit post-training quantization, network pruning, and efficient memory management (e.g., using all available SRAM effectively for buffering activations, ensuring weights are loaded optimally) can significantly alter the operational intensity. If the model is memory-bound, reducing the model size (weights) and intermediate activation sizes is key. If compute-bound, exploring operator fusion, using optimized ARM CMSIS-NN libraries, or leveraging any available DSP/SIMD instructions on the Cortex-M33 can improve throughput.
  common_mistake: |
    **The Pitfall:** Oversimplifying peak memory bandwidth or neglecting DSP extensions.
    **The Rationale:** Candidates assume memory bandwidth is dictated by clock speed alone, ignoring bus width, or they forget that CMSIS-NN can utilize DSP extensions for faster integer MACs.
    **The Consequence:** They improperly calculate the roofline's ridge point, leading to misclassification of the bottleneck and wasted optimization efforts.
  napkin_math: |
    - **Peak Compute (P_peak):** Cortex-M33 executes 1 MAC/cycle. P_peak = 128 MHz * 1 = 128 MMAC/s.
    - **Peak Memory Bandwidth (B_peak):** 32-bit bus (4 bytes/cycle). B_peak = 128 MHz * 4 = 512 MB/s.
    - **Operational Intensity (I):** 100,000 MACs / 61,440 bytes ≈ 1.63 MACs/byte.
    - **Roofline Corner Point (I_corner):** P_peak / B_peak = 128 MMAC/s / 512 MB/s = 0.25 MACs/byte.
    - **Conclusion:** Since I (1.63) > I_corner (0.25), the workload is fundamentally **compute-bound**.
