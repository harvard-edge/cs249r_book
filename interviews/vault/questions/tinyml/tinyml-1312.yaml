title: 'Roofline Analysis on Nordic nRF5340: Optimizing TinyML Inference'
scenario: You are tasked with optimizing a TinyML model for audio keyword spotting on an nRF5340 microcontroller. Your current model requires 100,000 MAC operations and 60 KB of memory accesses per inference.
question: How should you use roofline analysis on an nRF5340 to classify a 100K-MAC, 60 KB-access KWS model as compute-bound or memory-bound?
details:
  realistic_solution: 'A realistic solution involves refining the Roofline model parameters with actual measured values. By comparing the operational intensity of the model against the hardware''s ridge point, one can determine the bottleneck. If compute-bound, exploring operator fusion or leveraging Cortex-M33 DSP/SIMD instructions can improve throughput. If memory-bound, reducing model size and intermediate activation sizes is key.'
  common_mistake: |
    **The Pitfall:** Oversimplifying peak memory bandwidth or neglecting DSP extensions.
    **The Rationale:** Candidates assume memory bandwidth is dictated by clock speed alone, ignoring bus width, or they forget that CMSIS-NN can utilize DSP extensions for faster integer MACs.
    **The Consequence:** They improperly calculate the roofline's ridge point, leading to misclassification of the bottleneck and wasted optimization efforts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute: 128 MHz, 1 MAC/cycle.
    - Memory Bus: 32-bit (4 bytes/cycle).
    - Workload: 100,000 MACs, 61,440 bytes.

    **Calculations:**
    - Peak Compute (P_peak): 128 MHz * 1 = 128 MMAC/s.
    - Peak Memory Bandwidth (B_peak): 128 MHz * 4 bytes = 512 MB/s.
    - Roofline Ridge Point: 128 MMAC/s / 512 MB/s = 0.25 MACs/byte.
    - Operational Intensity (I): 100,000 / 61,440 ≈ 1.63 MACs/byte.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound (Compute-Bound).** Since I (1.63) > Ridge Point (0.25), the workload is limited by peak compute capacity.
