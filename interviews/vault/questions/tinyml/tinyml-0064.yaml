title: Hardware-in-the-Loop Testing
scenario: Your CI pipeline tests ML models in simulation (x86 QEMU), but you've been burned twice by models that pass simulation and fail on real hardware — once due to CMSIS-NN kernel differences, once due to flash timing. You have 5 hardware variants (Cortex-M0+, M4, M4F, M7, M33). Design a hardware-in-the-loop (HIL) CI system.
question: "How many HIL boards test 5 Cortex-M variants in CI, and what wall time does each commit need?"
details:
  realistic_solution: 'Build a parallel HIL farm: 2 boards per variant (10 boards total, ~$940). Per-commit pipeline: flash firmware (60s), run smoke test (5s), execute model inference + validate output (2s per board). All 5 variants test in parallel: 67s wall time. At 20 commits/day: 22 minutes total HIL time, boards idle >95% of the day. Add nightly extended tests: power measurement via INA219 current sensor (4.2 min per variant), accuracy regression on reference dataset. Cost of one prevented field failure: $500K (10,000 devices x $50 per visit). HIL farm ROI: 531x return on a single prevented bug.'
  common_mistake: |
    **The Pitfall:** Buying one of each board and running tests sequentially.
    **The Rationale:** Sequential execution makes the CI feedback loop 10-15 minutes per commit.
    **The Consequence:** Developers will skip HIL tests or ignore failures because the feedback loop is too slow.
  napkin_math: |
    * **Per-commit HIL:** 67 seconds parallel wall time.
    * **Farm Cost vs Failure Cost:** HIL farm cost = $940. Cost of one missed bug in the field (10k devices @ $50/visit) = $500,000.
    * **Result:** The HIL farm achieves a **531x return on investment** by preventing a single field failure.
