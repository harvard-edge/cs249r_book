title: The ISA Tax on Inference
scenario: You benchmark the same INT8 keyword spotting model on two MCUs at the same 80 MHz clock speed: a Cortex-M4 (ARMv7E-M, Thumb-2 ISA) and a RISC-V RV32IMC (ESP32-C3). The M4 completes inference in 18 ms. The RISC-V takes 31 ms. Same clock, same model, same compiler optimization level.
question: Where did the 72% performance gap come from?
details:
  realistic_solution: 'The 72% gap (18ms vs 31ms) comes from three ISA-level differences. First, the M4''s DSP extension provides SMLAD (dual 16-bit MAC in one cycle), giving 2 MACs/cycle vs the RISC-V''s 1 MAC/cycle with standard MUL. Second, the M4''s Thumb-2 encoding is denser — fewer instruction cache misses in tight loops. Third, CMSIS-NN exploits M4-specific SIMD intrinsics that have no RISC-V equivalent without the ''P'' (packed SIMD) extension. The fix for RISC-V: add the RV32P extension for packed arithmetic, or use the RV32V vector extension which can match or exceed ARM''s throughput.'
  common_mistake: |
    **The Pitfall:** Assuming RISC-V is inherently slower because it is a simpler architecture.
    **The Rationale:** Engineers often attribute performance gaps to general architecture complexity without looking at specific Instruction Set Architecture (ISA) extensions like DSP instructions.
    **The Consequence:** Developers miss opportunities to optimize by adding appropriate ISA extensions (like RV32P) or using optimized libraries.
  napkin_math: |
    1. Identify workload: Keyword spotting model requires ~1.5M MACs.
    2. Cortex-M4 (with CMSIS-NN and DSP extension): Effective 2 MACs/cycle throughput.
       - Cycles: 1.5M MACs / 2 MACs/cycle = 750,000 cycles.
       - Compute time: 750,000 cycles / 80 MHz = 9.375 ms.
       - Total time: 9.375 ms compute + ~8.625 ms memory overhead = **18 ms**.
    3. RISC-V RV32IMC: Standard multiply gives ~0.33 MACs/cycle throughput.
       - Cycles: 1.5M MACs / 0.33 MACs/cycle ≈ 4.5M cycles.
       - Compute time: 4.5M cycles / 80 MHz = 56.25 ms (pipelining improves this to ~25 ms compute).
       - Total time: ~25 ms compute + ~6 ms memory overhead = **31 ms**.
    4. Calculate gap: 31 ms / 18 ms ≈ **1.72× (72%)**.
