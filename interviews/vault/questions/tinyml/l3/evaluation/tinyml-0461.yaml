id: tinyml-0461
title: The Mixed-Precision Power Budget
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You are designing a fall-detection wearable using a Cortex-M7. The model must meet its latency
  budget while not exceeding a strict average power consumption limit. Your FP32 model is accurate but
  consumes too much power. Your fully-quantized INT8 model is power-efficient but fails to capture subtle,
  high-dynamic-range accelerometer events, making it unreliably inaccurate. The model has 10M total MACs
  (Multiply-Accumulate operations) per inference. The first two layers, which directly process the accelerometer
  data, account for 1M MACs, while the remaining deeper layers account for 9M MACs. Given the hardware
  invariants, how would you solve this trade-off?
details:
  realistic_solution: Use mixed precision. The accuracy-critical layers that process the raw, high-dynamic-range
    accelerometer data should be kept in a higher precision format (e.g., FP16, if supported, or FP32),
    while the less sensitive, more computationally expensive deeper layers can be quantized to INT8. This
    provides the accuracy of floating-point where it's needed most, while still getting the majority of
    the power and performance benefits from integer quantization.
  common_mistake: Thinking in all-or-nothing terms (either full FP32 or full INT8). Engineers often fail
    to consider mixed-precision, which is a standard and necessary technique for balancing performance
    and accuracy on-device. Another mistake is optimizing for the wrong target, like latency, when the
    hard constraint is power.
  napkin_math: '10M MACs total. Full FP32: 10M*18=180M E_int8 units. Full INT8: 10M. Mixed (2 layers FP32,
    rest INT8): 1M*18+9M=27M E_int8. Mixed is 2.7x INT8 but 6.7x less than FP32 — 85% FP32 energy eliminated.
    First 2 layers keep FP32 for high-dynamic-range accel data. SRAM: 4x activation for 10% of model —
    manageable.'
