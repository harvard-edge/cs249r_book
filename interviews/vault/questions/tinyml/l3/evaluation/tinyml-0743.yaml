id: tinyml-0743
title: The CMSIS-NN vs Manual Implementation
topic: graph-compilation
status: published
provenance: imported
scenario: A colleague hand-wrote a Conv2D kernel in plain C for a Cortex-M4 at 168 MHz — nested loops
  over height, width, channels, and kernel dimensions. The layer has 32 input channels, 64 output channels,
  3×3 kernel, and 16×16 input feature map. CMSIS-NN's optimized `arm_convolve_s8` runs the same layer.
  Compare the cycle counts and explain why the gap exists.
details:
  realistic_solution: 'CMSIS-NN achieves ~8x speedup over naive C through three techniques: (1) SMLAD
    instruction packs two 16-bit MACs into one cycle (2x throughput), (2) im2col buffer layout enables
    sequential memory access instead of strided reads (eliminates cache misses), (3) loop unrolling and
    software pipelining hide memory latency. For 4.72M MACs: naive C at 5.5 cycles/MAC = 155ms, CMSIS-NN
    at 0.7 cycles/MAC = 19.7ms. The gap is not just assembly vs C — it is exploiting the M4''s SIMD datapath
    that the compiler cannot auto-vectorize. For a 20-layer model: naive = 3.1s (unusable), CMSIS-NN =
    394ms (viable).'
  common_mistake: '"CMSIS-NN is maybe 2× faster because it''s written in assembly." The gap is far larger
    — 8-16× — because the naive C code cannot exploit the M4''s DSP SIMD instructions, and the compiler
    rarely auto-vectorizes for Cortex-M.'
  napkin_math: 'Layer MACs: 16×16×64×32×9 = 4.72M. Naive C: 5.5 cycles/MAC → 26M cycles → 155ms. CMSIS-NN:
    0.7 cycles/MAC → 3.3M cycles → 19.7ms. Speedup: **7.9×**. For a full model with 20 such layers: naive
    = 3.1s (unusable), CMSIS-NN = 394ms (feasible for 2-3 Hz inference). The lesson: on Cortex-M4, CMSIS-NN
    is not an optimization — it''s a prerequisite.'
