id: tinyml-0430
title: The Keyword Spotting Deadline Miss
topic: kernel-fusion
status: draft
provenance: imported
scenario: 'You are a TinyML engineer optimizing a keyword spotting model running on a Cortex-M4 based
  microcontroller (168 MHz). Your model consists of a sequence of layers: `Conv2D` -> `ReLU` -> `DepthwiseConv2D`.
  The end-to-end latency budget is a strict 100ms to ensure a responsive user experience. Your profiler
  reports the following:'
details:
  realistic_solution: The correct solution is to apply operator fusion. The 15ms gap between the `Conv2D`
    and `ReLU` operations is a classic symptom of memory access overhead. The microcontroller is executing
    the `Conv2D` kernel, writing the entire output tensor back to SRAM, and then the TFLite Micro interpreter
    invokes the `ReLU` kernel, which reads that same tensor back from SRAM into registers.
  common_mistake: Engineers often misdiagnose the bottleneck on microcontrollers. They assume the problem
    is always compute (FLOPs) or model size (parameters), as it often is in the cloud. They fail to recognize
    that on low-power devices with low Arithmetic Intensity (Ops/Byte), the overhead of moving data between
    SRAM and registers for each separate operation can dominate the actual computation time.
  napkin_math: 'Without fusion: Conv2D writes output to SRAM, ReLU reads it back. Activation tensor 10x10x16
    = 1600B. Each R/W ~2 cycles/byte = 3200 extra cycles. At 168MHz: 19us overhead per pair. With fusion:
    ReLU in-register after each Conv2D output — zero extra memory traffic. Across all fused pairs, saves
    ~15ms. Budget 100ms, fused fits.'
