id: tinyml-cell-12064
title: 'Model Format Conversion: Compare TFLM vs. CMSIS-NN for Cortex-M7 Inference'
topic: model-format-conversion
status: published
provenance: imported
scenario: 'A 500K parameter INT8 CNN (2.5 MOPs) runs on Cortex-M7+Ethos-U55. Compare two deployment approaches:
  (A) TFLite Micro with Ethos-U55 delegate vs. (B) CMSIS-NN kernels with manual Ethos offload using the
  Ethos-U55 driver. Evaluate latency, development effort, and maintainability.'
details:
  realistic_solution: 'Approach A (TFLM + Ethos delegate): 2.5M INT8 ops / 0.5 TOPS NPU = 5μs compute
    + 2ms TFLM dispatch overhead per supported op. TFLM dispatches Ethos-U55 per fused op (grouped by
    Vela compiler): ~5 dispatches × 0.2ms = 1ms overhead. Total: ~1.005ms. Approach B (manual): same Ethos
    compute (5μs) + 0.1ms driver overhead = ~0.1ms. But development: approach A = 2 weeks, approach B
    = 8 weeks. Tradeoff: 10× dev time for 10% latency improvement.'
  common_mistake: Assuming TFLM Ethos delegate achieves the same performance as manual CMSIS-NN + Ethos
    offload; the delegate adds op-by-op dispatch overhead that manual pipelines avoid.
  napkin_math: 'NPU compute: 2.5M INT8 / 500G INT8 ops/s = 5μs. TFLM dispatch: 5 fused ops × 0.2ms = 1ms.
    Total TFLM: 1.005ms. Manual driver: 0.1ms overhead. Total manual: 0.105ms. Speedup: 9.6×. Dev time
    ratio: 8/2 = 4×. If latency requirement is <10ms: both satisfy it. Choose TFLM for maintainability.'
