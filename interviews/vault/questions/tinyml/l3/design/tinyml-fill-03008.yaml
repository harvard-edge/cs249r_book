id: tinyml-fill-03008
title: Deterministic Latency on Cortex-M4 for Safety-Critical Inference
topic: tail-latency
status: draft
provenance: imported
scenario: A Cortex-M4 (168MHz, 256KB SRAM) runs a 4-class gesture classifier for a medical device. Worst-case
  latency must be bounded at 50ms for safety certification (IEC 62304). Current P99 is 38ms but P999 is
  120ms due to cache miss patterns on a 12KB model.
details:
  realistic_solution: Perform static WCET analysis using tools like AbsInt aiT. Lock the model weights
    into TCM (Tightly Coupled Memory) if available, or restructure inference to prefetch weights into
    SRAM in deterministic order. Disable interrupts during inference or use interrupt latency budgeting.
    Verify with hardware cycle counters.
  common_mistake: Using standard benchmarking (average latency) to claim safety compliance. Safety-critical
    systems require WCET (Worst-Case Execution Time) analysis, not statistical percentiles. P999 is insufficient
    — you need a deterministic upper bound.
  napkin_math: 'Cortex-M4 at 168MHz: 168M cycles/sec. 50ms budget = 8.4M cycles. A MobileNet-style 4-class
    model (500 KMACs): at 1 MAC/cycle (no SIMD) = 500K cycles = 3ms. Budget is not tight for compute,
    but cache misses add 10-50 cycles each. 12KB model in 256KB SRAM: model fits, but stack + activations
    must also fit. Total SRAM budget: 12KB weights + 4KB activations + 4KB stack = 20KB — fits with headroom.'
