id: tinyml-cell-11041
title: 'Dataset Curation: Design Training Data Pipeline for MCU Keyword Spotting'
topic: dataset-curation
status: published
provenance: imported
scenario: You are training a keyword spotting model (10 keywords + silence + unknown) to deploy on Cortex-M4
  (168MHz, 256KB SRAM). Design the training data collection and curation pipeline that produces 12-class
  balanced training data suitable for this ultra-constrained deployment context.
details:
  realistic_solution: 'Collect: 1,000+ samples/keyword in diverse environments. Augment: background noise
    (SNR 0-20dB), speed perturbation (±10%), room impulse response convolution. Feature: 40-dim MFCC,
    25ms window, 10ms hop, 1-second clip = 99 frames × 40 = 3,960 floats. Balance: 10K samples/class.'
  common_mistake: Collecting data in clean studio conditions only — model fails in noisy real environments.
    Not accounting for the input feature format (MFCC) used during inference on MCU.
  napkin_math: '12 classes × 10K samples = 120K training examples. Each: 1-second audio at 16kHz = 16K
    samples × 2B = 32KB raw. MFCC features: 99 × 40 × 4B = 15.8KB per sample. Storage: raw audio 120K
    × 32KB = 3.84GB. MFCC features: 120K × 15.8KB = 1.9GB. MCU inference input: 99 × 40 int8 = 3,960 bytes
    = 3.87KB per inference. MFCC computation on M4: 99 frames × FFT(512) at 168MHz ≈ 30ms. Real-time:
    1-sec audio streaming, 10ms hop → compute budget 10ms per frame. At 168MHz × 1 FLOP/cycle: 1.68M FLOPs/10ms.
    FFT-512 = 9 × 512 = 4,608 FLOPs — achievable.'
