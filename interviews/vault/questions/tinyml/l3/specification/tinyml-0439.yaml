id: tinyml-0439
title: The Power-Aware Architect
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You are using Neural Architecture Search (NAS) to design a person-detection model for a battery-powered
  device with a small microcontroller (like a Cortex-M4) and an even smaller energy budget. The goal is
  to maximize battery life, which means minimizing average power consumption. A junior engineer suggests
  setting the NAS reward function to `Accuracy / FLOPs`. Diagnose the flaw in this approach and propose
  a more physically accurate reward function.
details:
  realistic_solution: The proposed reward `Accuracy / FLOPs` is flawed because it ignores the energy cost
    of data movement. According to the 'Numbers Every ML Engineer Should Know', memory access is energetically
    expensive. A better, more physically-grounded reward function for a NAS controller would be a multi-objective
    one that models both compute and memory access costs. The reward should be `Accuracy / (α * MACs +
    β * Memory_Accesses)`, where α and β are weighting coefficients derived from the target MCU's datasheet
    for the energy cost of a compute operation versus a memory read/write. This forces the NAS to find
    architectures that are not just computationally cheap, but also have small memory footprints and favor
    data locality (i.e., data stays in registers).
  common_mistake: The most common mistake is assuming that compute (FLOPs) is the only significant driver
    of power consumption. On resource-constrained hardware, and especially on microcontrollers, data movement
    (reading/writing to SRAM) can consume as much or even more energy than the computation itself. A model
    with fewer FLOPs but a large memory footprint or inefficient access patterns could easily use more
    power.
  napkin_math: 'Cortex-M4: compute ~12 pJ/MAC, SRAM read ~5 pJ/byte, Flash read ~50 pJ/byte. Model A:
    1M MACs + 500KB reads = 12µJ + 2.5µJ = 14.5µJ. Model B: 2M MACs + 100KB reads = 24µJ + 0.5µJ = 24.5µJ.
    FLOPs-only metric picks A (fewer MACs), but the energy difference is modest at this scale — the real
    insight is that for models with large memory accesses (e.g., Flash reads at 50 pJ/byte), memory access
    can dominate. Correct reward: α=12pJ/MAC, β=5pJ/byte → Accuracy / (α×MACs + β×Mem). At Flash rates
    (50 pJ/byte), 500KB Flash reads = 25µJ vs 24µJ compute: memory and compute are comparable.'
