schema_version: 1
id: tinyml-exp2-anal-0159
title: ESP32-S3 Inference Latency Anomaly Analysis
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You are deploying an INT8 keyword spotting model on an ESP32-S3 microcontroller (240 MHz dual-core
  Xtensa). The model's total memory footprint for weights and peak activations is 450 KB. When executing
  entirely within the 512 KB internal SRAM, inference takes 15ms. To accommodate a new WiFi/BLE stack,
  you move 350 KB of read-only model weights to the external 8 MB PSRAM. You observe that inference latency
  immediately spikes to 75ms, despite utilizing the same INT8 vector extensions and core frequency. Explain
  why this degradation occurs.
details:
  realistic_solution: The degradation is a classic memory wall problem caused by moving data from on-chip
    SRAM to off-chip PSRAM. The ESP32-S3 internal SRAM is accessed at the core clock speed (240 MHz) with
    parallel buses, providing massive bandwidth. The 8 MB PSRAM, however, is connected via an external
    interface (typically Octal SPI at 80 MHz or 120 MHz). When weights are in PSRAM, the processor experiences
    severe cache miss penalties and stalls waiting for data over the serial interface, making the inference
    completely memory-bound rather than compute-bound.
  common_mistake: Candidates often assume the compute instructions (vector extensions) execute slower
    when weights are in PSRAM, or they vaguely mention 'PSRAM is slower' without identifying the bandwidth
    bottleneck of the external SPI bus compared to the internal data bus.
  napkin_math: 'Internal SRAM bandwidth at 240 MHz (32-bit bus): 240M * 4 bytes = ~960 MB/s. External
    PSRAM bandwidth via Octal SPI at 80 MHz: 80M * 1 byte (octal DDR gives ~1 byte/cycle effective) =
    ~80 MB/s max throughput. Reading 350 KB of weights from SRAM takes ideally 350KB / 960MB/s = 0.36ms
    of memory transfer time. Reading 350 KB from PSRAM takes ideally 350KB / 80MB/s = 4.37ms. However,
    because inference requires repeated access and causes cache thrashing over the SPI bus, the actual
    latency penalty scales non-linearly. The CPU spends the majority of the 60ms delta (75ms - 15ms) stalled
    on external memory fetches rather than executing INT8 vector instructions.'
