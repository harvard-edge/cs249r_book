schema_version: 1
id: tinyml-exp-anal-0006
title: Battery Drain Anomaly in Dual-Core Always-On Audio
topic: duty-cycling
status: published
provenance: imported
scenario: A smart wearable uses the Nordic nRF5340 (1MB flash, 256KB SRAM) for an always-on acoustic event
  detection model. The model runs on the 128 MHz app core, taking 10ms to execute per inference, while
  the 64 MHz net core handles a BLE 5.3 connection. The system wakes up 10 times a second (every 100ms).
  The active current is ~5mA and the sleep current is strictly 2uA. During field testing on a 200mAh coin
  cell, the battery dies in just 4 days instead of the expected 16 days. Based on these platform characteristics,
  why is the battery draining so much faster than expected?
details:
  realistic_solution: The discrepancy comes from ignoring the BLE connection interval overhead and the
    wake-up/sleep transition states. Even though the 128 MHz app core only runs inference for 10ms per
    100ms window (10% duty cycle), waking up the system and maintaining the BLE 5.3 connection on the
    64 MHz net core adds significant hidden active time. The ~5mA active current applies not just to the
    10ms inference, but also to these transition periods and periodic BLE radio events.
  common_mistake: Candidates often only calculate the active inference time and sleep time for the app
    core, ignoring the dual-core architecture's transition costs (wake-up overhead) and the baseline power
    consumption of keeping the BLE 5.3 connection active on the network core.
  napkin_math: 'Expected theoretical calculation: (10ms * 5mA + 90ms * 0.002mA) / 100ms = 0.5018mA average
    current. Expected life: 200mAh / 0.5018mA = ~398 hours (~16.6 days). Actual field calculation implies
    ~2.08mA average current (200mAh / (4 days * 24h) = ~2.08mA). The extra ~1.58mA is consumed by the
    wake-up overhead (~2ms per cycle at 5mA) and BLE connection events running concurrently on the 64
    MHz net core (~30ms active time per cycle at 5mA).'
