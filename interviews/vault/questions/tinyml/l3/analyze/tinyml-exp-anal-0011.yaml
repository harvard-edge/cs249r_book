schema_version: 1
id: tinyml-exp-anal-0011
title: Operator Fusion Memory Tradeoff on nRF5340
topic: graph-compilation
status: published
provenance: imported
scenario: You are deploying an audio classification model on a Nordic nRF5340 MCU (128 MHz app core, 256
  KB SRAM, 1 MB flash). The BLE 5.3 stack reserves 80 KB of SRAM, leaving 176 KB for the application and
  ML model. An ahead-of-time (AOT) compiler applies aggressive operator fusion to a sequence of convolutions,
  reducing inference latency by 12%. However, the system now crashes with an out-of-memory (OOM) error
  during inference, as peak SRAM usage increased by 45 KB. Explain why fusing these operators to reduce
  latency caused a significant increase in peak SRAM usage.
details:
  realistic_solution: While AOT operator fusion eliminates the need to write and read intermediate tensors
    to main SRAM—saving memory bandwidth and reducing latency—it forces the compiler to allocate a larger
    contiguous scratchpad buffer to handle the combined execution block. In an unfused graph, the memory
    planner can sequentially reuse buffers. When fused, the intermediate state and combined kernel requirements
    demand the memory to be held concurrently, increasing the peak SRAM watermark.
  common_mistake: Candidates often assume that operator fusion strictly reduces memory requirements by
    eliminating intermediate tensor materialization. They fail to analyze that fusing certain layers requires
    holding a larger combined working context (scratchpad memory) alive simultaneously, preventing the
    sequential reuse of smaller memory buffers.
  napkin_math: Total SRAM = 256 KB. BLE 5.3 stack = 80 KB. Available SRAM = 256 - 80 = 176 KB. Unfused
    model peak memory = 140 KB (leaves 36 KB for app/OS). Fused model peak memory = 140 KB + 45 KB = 185
    KB. 185 KB > 176 KB available SRAM, leading to an OOM crash. The ~5mA active current benefits from
    the latency reduction, but the graph compiler's strategy violates the hard memory constraint.
