schema_version: 1
id: tinyml-exp2-anal-0174
title: Tensor Arena Peak Overlap Analysis
topic: tensor-arena-planning
status: published
provenance: imported
scenario: You are deploying a quantized vision model on an ARM Cortex-M4 (STM32F4) with 256 KB SRAM, 1
  MB flash, and CMSIS-NN. The runtime uses a flat tensor arena for static memory allocation. During a
  specific Conv2D layer execution, the planner must hold the input activation tensor (120 KB), allocate
  a scratch buffer for the CMSIS-NN im2col operation (60 KB), and reserve space for the output activation
  tensor (90 KB). Explain why the static memory planner fails with an out-of-memory error at this layer,
  even though the largest individual tensor easily fits within the available SRAM.
details:
  realistic_solution: In a flat tensor arena, memory is statically planned based on tensor lifespans.
    During the execution of a layer, the memory must simultaneously hold the input tensor (which is still
    being read), the output tensor (which is being written to), and any temporary scratch buffers required
    by the compute kernel. Since CMSIS-NN requires an im2col buffer to utilize the 2x INT8 MACs/cycle
    efficiently, this scratch space overlaps with the I/O tensors, pushing the peak SRAM usage beyond
    the physical limit.
  common_mistake: Candidates often assume that the peak memory is simply the size of the largest single
    tensor or forget that input and output tensors must coexist in memory during the layer's execution.
    They may also neglect the additional scratch pad memory required by SIMD-optimized libraries like
    CMSIS-NN.
  napkin_math: Peak SRAM Required = Input Tensor (120 KB) + Output Tensor (90 KB) + CMSIS-NN Scratch Buffer
    (60 KB) = 270 KB. Since 270 KB strictly exceeds the 256 KB physical SRAM available on the STM32F4,
    the tensor arena planning fails.
