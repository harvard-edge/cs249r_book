schema_version: 1
id: tinyml-exp-anal-0019
title: Layer Fusion Latency Penalty on Cortex-M4
topic: operator-scheduling
status: published
provenance: imported
scenario: We deployed a CNN on an ARM Cortex-M4 (STM32F4) featuring 168 MHz, 256 KB SRAM, 1 MB flash,
  and CMSIS-NN SIMD (2x INT8 MACs/cycle). To fit the model into the 256 KB SRAM, the compiler's operator
  scheduler fused two consecutive INT8 convolutional layers, avoiding the materialization of a 150 KB
  intermediate activation tensor. However, after applying this memory-optimized scheduling, the total
  inference latency increased significantly despite the total logical MAC operations remaining identical.
  Explain why this layer fusion scheduling behavior degrades execution speed on this specific hardware
  architecture.
details:
  realistic_solution: The latency increase occurs because fusing convolutional operators without intermediate
    buffers requires computing the network in spatial tiles. Due to the sliding window nature of convolutions
    (e.g., a 3x3 kernel), adjacent output tiles share overlapping input regions. Without storing the full
    intermediate feature map in the 256 KB SRAM, the overlapping regions of the first convolutional layer
    must be redundantly recomputed for every tile of the second layer. While the STM32F4 has no FPU, its
    CMSIS-NN SIMD is highly efficient at INT8 MACs; however, the sheer volume of redundant recomputations
    dominates the execution time, nullifying any memory access savings.
  common_mistake: Candidates often assume that layer fusion always improves latency by reducing memory
    bandwidth and SRAM reads/writes. They fail to account for the overlapping receptive fields in convolutions
    and how computing deep tiles forces redundant recomputation when intermediate buffers aren't fully
    materialized in SRAM.
  napkin_math: Assume the sequential layers require 4 million MACs (2M each). Peak throughput on the STM32F4
    is 168 MHz * 2 MACs/cycle = 336 MMACs/sec. Ideal sequential compute latency = 4,000,000 / 336,000,000
    = ~11.9 ms. With layer fusion, a 3x3 kernel overlap across tiles might force Layer 1 to be recomputed
    3 times on average per output region. New MAC count = (2M * 3) + 2M = 8 million MACs. Fused compute
    latency = 8,000,000 / 336,000,000 = ~23.8 ms. The scheduler trades a 100% increase in latency (11.9
    ms to 23.8 ms) to save 150 KB of SRAM, avoiding an out-of-memory error but degrading performance.
