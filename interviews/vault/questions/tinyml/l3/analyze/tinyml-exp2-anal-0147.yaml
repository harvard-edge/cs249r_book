schema_version: 1
id: tinyml-exp2-anal-0147
title: Non-linear Latency Scaling on Corstone-300
topic: compute-cost-estimation
status: published
provenance: imported
scenario: We are deploying a CNN-based anomaly detection model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300)
  platform. The M7 operates at 480 MHz, and the Ethos-U55 NPU is configured for 256 MAC/cycle, sharing
  a single 512 KB SRAM constraint. Profiling shows that Model A (10 million MACs) executes in 2 milliseconds.
  However, Model B, which has a nearly identical architecture but slightly wider layers totaling 12 million
  MACs, executes in 15 milliseconds. Explain why a mere 20% increase in compute requirements results in
  a 7.5x increase in total inference latency on this specific hardware.
details:
  realistic_solution: The disproportionate latency increase is caused by exceeding the 512 KB SRAM capacity,
    triggering an SRAM spill. Model A's weights and activations fit entirely within the fast on-chip SRAM,
    allowing the Ethos-U55 to operate continuously with high MAC utilization. Model B's wider layers increase
    the peak memory footprint beyond 512 KB, forcing the system to store intermediate activations in slower
    off-chip memory (such as QSPI flash or external DRAM). The severe bandwidth limitation of off-chip
    memory access starves the NPU of data, shifting the workload from compute-bound to heavily memory-bound.
  common_mistake: Candidates often assume that execution time scales linearly with the number of MAC operations,
    focusing solely on the NPU's peak compute capacity. They fail to analyze the system-level memory hierarchy
    and the rigid constraints of the shared 512 KB SRAM.
  napkin_math: 'Ethos-U55 Peak Compute: 256 MAC/cycle * 480 MHz = 122.88 GMAC/s (245.76 GOPS). Ideal compute
    time for Model A: 10M MACs / 122.88 GMAC/s = 0.08 ms (plus OS/SRAM access overhead, yielding ~2ms).
    Model B memory footprint exceeds the 512 KB SRAM by 100 KB. If these intermediate activations must
    be paged to an external QSPI flash (assuming a typical 40 MB/s bandwidth) across 5 deep layers during
    inference, the data transfer is 500 KB. The memory stall penalty is: 500 KB / 40 MB/s = 12.5 ms. Adding
    this 12.5 ms memory transfer time to the base compute time explains the massive latency jump to ~15
    ms.'
