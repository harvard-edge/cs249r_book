schema_version: 1
id: tinyml-exp2-anal-0170
title: Fairness Guardrail PSRAM Latency Bottleneck on ESP32
topic: responsible-ai
status: published
provenance: imported
scenario: To satisfy a Responsible AI impact assessment, your team adds a demographic fairness guardrail
  model alongside an existing INT8 keyword spotter on an ESP32-S3 (240 MHz dual-core Xtensa, 512 KB SRAM,
  8 MB PSRAM). The base keyword model fits entirely in SRAM and runs in 15 ms. The new guardrail model
  requires 1.5 MB of weights, forcing it into the 8 MB PSRAM connected via Octal SPI. After deployment,
  total inference time jumps to 140 ms, violating the 50 ms real-time SLA. Given that PSRAM accesses take
  roughly 10 CPU cycles per byte due to cache misses while SRAM takes 1 cycle, and the guardrail model
  performs 3 million INT8 MAC operations (fetching 1 byte of weight per MAC), analyze why the system fails
  the SLA.
details:
  realistic_solution: The behavior occurs because placing the model in PSRAM creates a severe memory bandwidth
    bottleneck. The CPU is stalled waiting for weight fetches over the SPI interface, rendering the Xtensa
    vector extensions for INT8 severely underutilized. The latency is dominated by data movement rather
    than arithmetic operations.
  common_mistake: Candidates often attribute the latency spike purely to the added compute load of the
    second model, failing to recognize that the memory bottleneck and PSRAM access latency are the primary
    culprits.
  napkin_math: Total guardrail weight fetches = 3,000,000 bytes. PSRAM fetch latency = 3,000,000 bytes
    * 10 cycles/byte = 30,000,000 cycles. Memory stall time = 30,000,000 cycles / 240,000,000 cycles/second
    (240 MHz) = 0.125 seconds or 125 ms. Total latency = 15 ms (base) + 125 ms (guardrail memory stall)
    = 140 ms, completely explaining the SLA violation.
