schema_version: 1
id: tinyml-exp-anal-0002
title: Depthwise Convolution Latency Discrepancy
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You deployed a vision model on an ESP32-S3 (240 MHz dual-core Xtensa, 512 KB SRAM) utilizing
  its INT8 vector extensions. After converting a standard 3x3 convolution layer (32 input channels, 64
  output channels, 16x16 feature map) to a depthwise separable convolution, the theoretical MAC operations
  dropped by nearly 8x. However, the measured execution latency only improved by 2x, and peak SRAM usage
  during the layer's execution actually increased. Explain why the latency improvement does not match
  the MAC reduction, and why the SRAM footprint grew on this architecture.
details:
  realistic_solution: The discrepancy occurs because depthwise convolutions are severely memory-bandwidth
    bound. While the ESP32-S3's INT8 vector extensions process MACs rapidly, depthwise layers have very
    low arithmetic intensity per input activation (9 MACs vs 576 for standard conv), causing the 240 MHz
    Xtensa cores to stall waiting for SRAM reads. Furthermore, splitting the standard convolution into
    depthwise and pointwise operations forces the system to allocate and write an intermediate activation
    tensor to the 512 KB SRAM, causing the observed increase in peak memory footprint and adding costly
    memory roundtrip latency.
  common_mistake: Candidates often assume that execution latency scales perfectly with MAC count. They
    frequently miss the impact of memory bandwidth bottlenecks on microcontrollers, the concept of arithmetic
    intensity, and the memory overhead of materializing intermediate tensors between split layers.
  napkin_math: 'Standard 3x3 MACs: 3×3×32×64×16×16 = 4,718,592 MACs. Depthwise MACs: 3×3×32×1×16×16 =
    73,728. Pointwise MACs: 1×1×32×64×16×16 = 524,288. Total DSConv MACs: 73,728 + 524,288 = 598,016 MACs.
    MAC Reduction Factor: 4,718,592 / 598,016 = 7.89x. Arithmetic intensity (MACs per input activation
    loaded): standard = 9×64 = 576; depthwise = 9×1 = 9. Note: MACs per weight loaded is 256 (16×16 spatial
    reuse) for both, so the bottleneck shift is due to reduced output-channel reuse, not weight reuse.'
