schema_version: 1
id: tinyml-exp2-anal-0168
title: Per-Channel Requantization Overhead Analysis
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You are profiling a keyword spotting model on an ARM Cortex-M4 (STM32F4) microcontroller (168
  MHz, 256 KB SRAM, 1 MB flash, no FPU). You notice that switching a convolutional layer with 128 output
  channels from per-tensor to per-channel INT8 quantization increases the execution time by exactly 4.57
  microseconds. The CMSIS-NN SIMD core (2x INT8 MACs/cycle) executes the exact same number of core operations
  in both cases. Explain why this system behavior occurs. Given that the latency overhead scales linearly
  with the number of output channels, calculate the number of additional clock cycles required per output
  channel.
details:
  realistic_solution: The core matrix multiplication uses the same 2x INT8 MACs/cycle SIMD instructions
    regardless of the quantization scheme. The latency increase occurs during the requantization step
    in the outer loop. Per-channel quantization requires fetching a unique scale multiplier and shift
    value from memory for each output channel to downscale the 32-bit accumulator back to INT8, whereas
    per-tensor uses a single global scale that can be kept in registers.
  common_mistake: Candidates often mistakenly believe the latency difference comes from the inner loop
    MAC operations, assuming that per-channel scales break the SIMD execution pipeline. They fail to recognize
    that the core dot product remains identical and the overhead is strictly isolated to the outer loop.
  napkin_math: Total time overhead = 4.57 microseconds (0.00000457 seconds). CPU frequency = 168 MHz (168,000,000
    cycles/sec). Total overhead cycles = 0.00000457 * 168,000,000 = 767.76 cycles (round to 768). Overhead
    per output channel = 768 cycles / 128 channels = 6 extra clock cycles per output channel.
