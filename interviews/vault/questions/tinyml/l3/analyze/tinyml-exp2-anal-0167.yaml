schema_version: 1
id: tinyml-exp2-anal-0167
title: Unstructured Pruning Latency Regression
topic: pruning-sparsity
status: published
provenance: imported
scenario: You are deploying an audio classification model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300)
  subsystem, featuring a 480 MHz M7, 512 KB shared SRAM, and a 256 MAC/cycle U55 NPU. To fit the 600 KB
  dense model into the 512 KB SRAM, your team applied 50% unstructured pruning, reducing the stored weights
  to 300 KB. During profiling, you notice that while the model now fits in SRAM, the inference latency
  jumped from an estimated 5 ms to over 15 ms, and NPU utilization dropped significantly. Explain why
  unstructured pruning caused this latency regression on this specific hardware architecture.
details:
  realistic_solution: The Ethos-U55 is optimized for dense, block-based tensor operations using its 256
    MAC/cycle engine and DMA engine. Unstructured sparsity breaks the contiguous data access patterns
    required by the NPU. Since the U55 lacks hardware support for unstructured sparse matrix multiplication,
    the Vela compiler must either insert zero-padding to run it densely or fall back to executing the
    operations on the Cortex-M7, which processes far fewer MACs per cycle, drastically increasing overall
    latency.
  common_mistake: Candidates often assume that any reduction in parameters leads to proportional speedups
    because there are fewer multiply-accumulate operations to perform. They might incorrectly guess that
    the latency increase is due to decompression overhead on the M7, failing to realize how the Ethos-U55
    NPU handles sparse execution.
  napkin_math: A dense layer requiring 10,000,000 MACs takes roughly 39,062 cycles on the U55 (10,000,000
    / 256 MAC/cycle), or ~0.08 ms at 480 MHz. With 50% unstructured pruning, if the compiler falls back
    to the Cortex-M7 (processing ~2 MACs/cycle using DSP instructions), the remaining 5,000,000 MACs require
    2,500,000 cycles. At 480 MHz, this takes 2,500,000 / 480,000,000 = ~5.2 ms, demonstrating that fallback
    execution is over 60x slower than the dense NPU execution.
