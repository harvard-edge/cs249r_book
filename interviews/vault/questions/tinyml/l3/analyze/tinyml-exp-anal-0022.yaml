schema_version: 1
id: tinyml-exp-anal-0022
title: ESP32-S3 PSRAM Bottleneck Analysis
topic: profiling-bottleneck-analysis
status: published
provenance: imported
scenario: You are profiling an INT8 keyword spotting model on an ESP32-S3 edge device (240 MHz dual-core
  Xtensa, 512 KB SRAM, 8 MB PSRAM, WiFi/BLE, vector extensions for INT8). The model's weights exceed the
  512 KB SRAM and are stored in the 8 MB PSRAM, accessed via an 80 MHz Octal SPI bus. A specific fully
  connected layer requires 800,000 INT8 multiply-accumulate (MAC) operations and loads 800 KB of weight
  data. Your profiler trace shows this layer takes exactly 10 ms to execute. Analyze why the execution
  takes 10 ms despite the high-speed CPU.
details:
  realistic_solution: The candidate should recognize that latency can be bounded by either compute or
    memory bandwidth. By calculating both limits, they will prove that the layer is strictly memory-bound.
    Even if the dual-core 240 MHz CPU and vector extensions could perform the MAC operations instantly,
    the processor must stall while waiting for weights to stream from the PSRAM.
  common_mistake: Candidates often assume the 10 ms latency is due to poorly optimized compute code or
    failure to utilize the INT8 vector extensions. They focus exclusively on the 240 MHz CPU clock and
    miss the I/O bottleneck caused by external memory fetches.
  napkin_math: '1. PSRAM Bandwidth: 80 MHz * 8 bits/clock (Octal SPI) = 80 MB/sec. 2. Memory Fetch Time:
    800 KB / 80,000 KB/sec = 10 ms. 3. Theoretical Compute Time: 800,000 MACs / 240,000,000 cycles/sec
    = ~3.33 ms (assuming no vector extensions; with INT8 vector extensions, this drops to < 1 ms). 4.
    Conclusion: Memory time (10 ms) > Compute time (<3.3 ms), making the layer completely bound by the
    PSRAM bus.'
