schema_version: 1
id: tinyml-exp-anal-0028
title: Watchdog Resets in Dual-Core Shared SRAM Inference
topic: safety-certification
status: published
provenance: imported
scenario: You are deploying a safety-critical anomaly detection model on a Nordic nRF5340. The 128 MHz
  app core runs the ML inference, while the 64 MHz net core handles BLE 5.3 communications at ~5mA active
  current. To meet functional safety requirements, a hardware watchdog timer (WDT) is configured with
  a strict 50ms timeout, and is petted at the end of each inference loop. Normal inference takes exactly
  38ms using the 256 KB shared SRAM. However, when the net core transmits a maximum-length BLE packet,
  it locks the shared SRAM bus for exactly 14ms. Analyze why the device experiences intermittent watchdog
  resets during these network events.
details:
  realistic_solution: The dual-core architecture of the nRF5340 relies on a shared SRAM matrix. When the
    net core locks the memory bus for a high-priority BLE transmission, the app core is forced to stall
    waiting for memory access. The total execution time for the inference loop becomes the sum of the
    compute time and the memory stall time. Because the combined time exceeds the strict watchdog limit,
    the WDT triggers a safety reset. The system must be re-architected to either pet the watchdog asynchronously
    or partition the SRAM to avoid bus contention.
  common_mistake: Candidates often assume that because the 128 MHz app core and 64 MHz net core are physically
    separate, they execute completely independently without resource contention. They might wrongly attribute
    the reset to an electrical issue like a power droop from the 5mA active current, rather than analyzing
    the deterministic timing delay caused by shared memory bus arbitration.
  napkin_math: Normal inference execution time = 38 ms. Memory bus lock time during BLE TX = 14 ms. Worst-case
    execution time (WCET) = 38 ms + 14 ms = 52 ms. Watchdog timeout threshold = 50 ms. Timing violation
    = 52 ms - 50 ms = +2 ms, resulting in a guaranteed hardware reset.
