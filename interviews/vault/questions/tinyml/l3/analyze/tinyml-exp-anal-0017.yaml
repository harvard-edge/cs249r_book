schema_version: 1
id: tinyml-exp-anal-0017
title: Analyzing SRAM Overflow in Cortex-M4 Residual Block
topic: model-size-estimation
status: published
provenance: imported
scenario: We are deploying an INT8 quantized CNN for wake-word detection on an ARM Cortex-M4 (STM32F4).
  The platform features a 168 MHz clock, 1 MB of flash, 256 KB of SRAM, no FPU, and uses CMSIS-NN for
  2x INT8 MACs/cycle. The model weights are 120 KB, which fits comfortably in flash, and the maximum activation
  buffer for any single layer is 90 KB. However, the system consistently throws an Out-Of-Memory (OOM)
  error during inference exactly at a residual add operation. Explain why this memory failure occurs despite
  the largest individual activation size being well under the 256 KB SRAM limit.
details:
  realistic_solution: To execute a residual connection, the inference engine must keep the original branch
    tensor in SRAM while sequentially allocating memory for all intermediate operations within that residual
    block. During the final addition, the system needs memory for the residual tensor, the intermediate
    block's output tensor, and the destination tensor simultaneously. Coupled with the SRAM reserved for
    the microcontroller's RTOS and peripheral buffers, the peak concurrent memory demand exceeds the physical
    SRAM limit, causing the OOM.
  common_mistake: Candidates often assume that peak memory footprint is simply the size of the largest
    single layer's input and output tensors combined. They fail to account for the tensor lifespan overlaps
    required during skip connections, as well as the baseline SRAM consumed by the RTOS, stack, and heap.
  napkin_math: 'Total SRAM = 256 KB. Assume RTOS/Stack/Heap overhead = 40 KB, leaving an ML Arena of 216
    KB. At the residual addition step, the system holds three tensors simultaneously: Skip Connection
    Tensor (80 KB) + Preceding Layer Output (90 KB) + Destination Tensor (80 KB). Peak ML SRAM requirement
    = 80 + 90 + 80 = 250 KB. 250 KB > 216 KB available ML Arena, resulting in the OOM error.'
