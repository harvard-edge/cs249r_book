schema_version: 1
id: tinyml-exp2-anal-0162
title: Hardware-Aware NAS SRAM Bottleneck on nRF5340
topic: neural-architecture-search
status: published
provenance: imported
scenario: You are deploying a keyword spotting model on a Nordic nRF5340 using a hardware-aware Neural
  Architecture Search (NAS). The nRF5340 features a 128 MHz app core, 64 MHz net core, 256 KB SRAM, 1
  MB flash, and BLE 5.3. Your NAS framework consistently rejects high-accuracy candidate architectures
  during the search phase, citing memory violations, even though the models' total parameter sizes are
  only around 150 KB. Explain why the NAS rejects these models and analyze the specific bottleneck preventing
  their deployment on this platform.
details:
  realistic_solution: The NAS framework rejects these architectures because their peak memory footprint
    during inference exceeds the available SRAM. While the weights are stored in the 1 MB flash, the 256
    KB SRAM must accommodate the RTOS, the BLE 5.3 network stack, input tensors, and the largest intermediate
    activation tensors. If a candidate architecture includes a layer with a massive expansion factor or
    large spatial dimensions, the resulting activation tensor will exceed the remaining SRAM, causing
    an out-of-memory error.
  common_mistake: Candidates often assume that if the model weights (150 KB) fit within the 1 MB flash,
    the model is easily deployable. They fail to account for the transient memory required by activation
    buffers (working memory) during the layer-by-layer execution of the network.
  napkin_math: Total SRAM = 256 KB. Assume the RTOS and BLE 5.3 stack consume ~64 KB, leaving ~192 KB
    for the ML workload. If a NAS candidate proposes an inverted residual block with an input of 49x20x32
    (31,360 bytes, ~31 KB) and an expansion factor of 6, the intermediate activation requires 49x20x192
    = 188,160 bytes (~188 KB) using int8 precision. The sum of the input and intermediate activation (31
    KB + 188 KB = 219 KB) exceeds the 192 KB available SRAM, correctly triggering the hardware constraint
    rejection.
