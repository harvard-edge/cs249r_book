schema_version: 1
id: tinyml-exp-anal-0004
title: Active Learning SRAM Overflow
topic: dataset-curation
status: published
provenance: imported
scenario: You are deploying an industrial defect detection system on an ARM Cortex-M7 + Ethos-U55 (Corstone-300)
  platform. The system has 512 KB of shared SRAM. The 480 MHz M7 runs an edge-detection algorithm to extract
  64x64 grayscale Regions of Interest (ROIs), which are batched and classified by a CNN on the Ethos-U55
  (configured for 256 MAC/cycle). To improve recall, the data curation team uses active learning to aggressively
  mine and label very faint, low-contrast anomalies. To ensure the pipeline captures these subtle anomalies
  in production, the M7's upstream edge-detection threshold is drastically lowered. In testing, the CNN's
  recall improves, but the system now frequently crashes with an Out-of-Memory (OOM) error, and when it
  doesn't crash, it misses its 20ms real-time latency budget. The CNN's architecture and per-ROI execution
  time remain perfectly static. Explain why curating a dataset of low-contrast anomalies causes these
  specific hardware failures.
details:
  realistic_solution: By actively curating low-contrast anomalies to train the CNN, the team forced a
    system-level relaxation of the M7's ROI extraction threshold so those faint defects could actually
    reach the NPU. This lowered threshold generates an exponential increase in false-positive ROIs per
    frame. Because the system batches these ROIs to maximize Ethos-U55 utilization, the memory footprint
    of the batched 64x64 crops quickly exceeds the Corstone-300's tight 512 KB shared SRAM limit, causing
    OOM crashes. When memory doesn't fault, the sheer M7 CPU time spent cropping and moving hundreds of
    ROIs starves the latency budget.
  common_mistake: Candidates often mistakenly argue that the Ethos-U55 dynamically takes longer to compute
    or allocates more memory for 'harder' or 'noisier' low-contrast images. They fail to realize that
    NPU execution on static CNN graphs is input-independent and deterministic, and that dataset curation
    biases often shift the bottleneck to upstream classical preprocessing on the M7.
  napkin_math: 'Ethos-U55 peak throughput: 480 MHz * 256 MAC/cycle = ~122.8 GMAC/s. For a CNN requiring
    2.5M MACs, NPU time is ~20 microseconds per ROI. One 64x64 8-bit grayscale ROI takes 4 KB of SRAM.
    If the dataset curation forces the threshold down, spiking the ROI count from 10 to 150 per frame:
    Batched memory required is 150 * 4 KB = 600 KB. This strictly exceeds the 512 KB shared SRAM, triggering
    an OOM fault. If forced to process sequentially to avoid OOM, the M7 overhead of cropping/moving 150
    ROIs (e.g., ~0.1ms per crop) consumes 15ms, leaving only 5ms for edge detection and NPU scheduling,
    breaking the 20ms budget.'
