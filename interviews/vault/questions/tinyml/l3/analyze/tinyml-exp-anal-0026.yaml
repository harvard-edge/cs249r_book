schema_version: 1
id: tinyml-exp-anal-0026
title: Latency Analysis of On-Device Privacy Guardrails
topic: responsible-ai
status: published
provenance: imported
scenario: To meet organizational accountability frameworks, a 3 MB FP32 privacy guardrail model is deployed
  to an ESP32-S3 smart microphone alongside a 250 KB INT8 wake-word model. The wake-word model runs in
  the 512 KB SRAM utilizing the CPU's INT8 vector extensions, completing in 15ms. Because of SRAM limits,
  the 3 MB guardrail model is placed in the 8 MB PSRAM, which operates over an SPI bus with a practical
  read bandwidth of 40 MB/s. When the guardrail is triggered, system latency jumps by 90ms, causing the
  audio buffer to overflow. Explain why the guardrail causes this specific latency bottleneck and calculate
  its minimum execution time floor due to memory fetches.
details:
  realistic_solution: The behavior occurs because fetching model weights from external PSRAM over SPI
    is drastically slower than internal SRAM access. Even with a fast 240 MHz CPU, the processor stalls
    waiting for data. The guardrail must be quantized to INT8 to fit within the 512 KB SRAM, which would
    eliminate the memory bottleneck and allow it to leverage the INT8 vector extensions.
  common_mistake: Candidates often solely blame the 240 MHz dual-core Xtensa processor's FP32 compute
    time or the lack of vector extensions, failing to identify that the system has become severely memory-bound
    by the PSRAM SPI interface.
  napkin_math: Guardrail model size = 3 MB. PSRAM read bandwidth = 40 MB/s. Minimum time to fetch weights
    for one inference = 3 MB / (40 MB/s) = 0.075 seconds = 75 ms. This 75 ms absolute memory-fetch floor,
    combined with ~15 ms of FP32 compute overhead, perfectly explains the observed 90 ms latency spike.
