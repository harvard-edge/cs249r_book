schema_version: 1
id: tinyml-exp-anal-0001
title: Adversarial Denial of Sleep Attack Analysis
topic: adversarial-robustness
status: published
provenance: imported
scenario: A security researcher demonstrates a 'denial of sleep' attack on a wake-word model running on
  a Nordic nRF5340 (128 MHz app core, 64 MHz net core, 256 KB SRAM, 1 MB flash, BLE 5.3). The device normally
  wakes up once every 5 seconds to process a 50ms audio frame, drawing ~5mA active current. Under attack,
  a continuous sub-audible adversarial noise forces the 128 MHz app core to evaluate false positives,
  waking it up to process a 50ms frame 10 times per second over BLE. Explain the systemic impact of this
  adversarial perturbation on the device's power budget and operational lifespan.
details:
  realistic_solution: The attack leverages adversarial examples to trigger the wake-up threshold of the
    early-stage cascade, keeping the high-power 128 MHz app core continuously active. A robust system
    must balance the tradeoff between early-rejection threshold sensitivity and power consumption, potentially
    deploying an ultra-low-power feature filter before waking the main application core.
  common_mistake: Candidates often focus solely on the mathematical robustness of the model to the adversarial
    noise or changes in model accuracy. They fail to analyze the system-level tradeoff where an adversary
    intentionally exploits the hardware's energy profile to exhaust the battery.
  napkin_math: 'Normal operation duty cycle: 50ms active per 5000ms = 1%. Normal average active current:
    5mA * 0.01 = 0.05mA (50uA). Under attack duty cycle: 10 wakeups/sec * 50ms = 500ms active per 1000ms
    = 50%. Attacked average active current: 5mA * 0.5 = 2.5mA. The attack increases the average active
    power consumption by 50x (2.5mA / 0.05mA), drastically reducing battery life.'
