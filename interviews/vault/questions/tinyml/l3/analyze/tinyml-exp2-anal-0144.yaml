schema_version: 1
id: tinyml-exp2-anal-0144
title: CPU vs External NPU Bottlenecks
topic: accelerator-comparison
status: published
provenance: imported
scenario: A team attempts to offload a convolutional layer requiring 500,000 MACs from an ARM Cortex-M4
  (STM32F4, 168 MHz, 256 KB SRAM, 1 MB flash, no FPU, CMSIS-NN SIMD 2x INT8 MACs/cycle) to a new external
  I2C-attached NPU that can perform 100 INT8 MACs/cycle. Surprisingly, the total layer execution time
  is significantly slower using the NPU than running it locally on the Cortex-M4 using CMSIS-NN. Explain
  why this behavior occurs based on the system architecture and compute-to-I/O tradeoffs.
details:
  realistic_solution: The bottleneck shifts from compute to communication. The Cortex-M4 has direct access
    to its 256 KB SRAM, allowing it to feed the CMSIS-NN SIMD instructions efficiently without external
    communication overhead. Conversely, the external NPU must wait for data to be transferred over I2C
    before computing. Because the arithmetic intensity of a single layer is typically low, the communication
    time over I2C drastically exceeds the compute time saved by the NPU, making the tightly coupled CPU
    faster.
  common_mistake: Candidates often focus purely on the compute advantage of the NPU (100 MACs/cycle vs
    2 MACs/cycle) and fail to calculate the I/O bottleneck. They overlook that an external accelerator
    requires transferring input activations and weights over a slow serial bus, negating the compute speedup.
  napkin_math: 'STM32F4 compute: 500,000 MACs / 2 MACs/cycle = 250,000 cycles. At 168 MHz, latency is
    250,000 / 168,000,000 = ~1.49 ms. NPU compute: 500,000 MACs / 100 MACs/cycle = 5,000 cycles = ~0.03
    ms (assuming 168 MHz). Assume a 20 KB data transfer to the NPU over a 1 Mbps I2C bus. 20,000 bytes
    * 8 bits/byte = 160,000 bits. Transfer time = 160,000 bits / 1,000,000 bits/sec = 160 ms. Total NPU
    latency (160.03 ms) is over 100x slower than local M4 execution (1.49 ms).'
