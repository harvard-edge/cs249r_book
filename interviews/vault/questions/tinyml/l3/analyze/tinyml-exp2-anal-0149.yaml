schema_version: 1
id: tinyml-exp2-anal-0149
title: DMA Buffering vs CPU Interrupts on nRF5340
topic: dma-data-movement
status: published
provenance: imported
scenario: You are deploying a continuous keyword spotting model on a Nordic nRF5340. The system features
  a 128 MHz app core, a 64 MHz net core for BLE 5.3, 256 KB SRAM, 1 MB flash, and operates at ~5mA active
  current. Audio is sampled at 16 kHz (16-bit). When the system uses CPU-driven interrupts to read each
  sample from the peripheral into SRAM, you observe periodic buffer overruns and dropped data when the
  app core runs the inference model. After switching to a DMA controller writing into a 4 KB ping-pong
  buffer, the overruns completely disappear. Explain why the CPU-driven approach causes overruns, and
  calculate the CPU context-switch time saved per second by switching to DMA.
details:
  realistic_solution: The CPU-driven approach fails because constant interrupt preemptions fragment the
    CPU execution time, preventing the ML inference task from completing before new data arrives. By offloading
    data movement to the DMA controller using a zero-copy ping-pong buffer, the CPU only services a handful
    of interrupts per second. This allows the 128 MHz app core to process the ML model in large, uninterrupted
    blocks, completely eliminating the data loss.
  common_mistake: Candidates often calculate the raw time spent in interrupts and assume it is negligible,
    failing to recognize that the extreme frequency of preemptions (16,000 per second) destroys pipeline
    efficiency. They might incorrectly guess that the 128 MHz app core is just computationally too slow
    for the ML math.
  napkin_math: '1. CPU Interrupts: 16,000 samples/sec = 16,000 interrupts/sec. Assuming ~50 cycles per
    context switch, overhead is 16,000 * 50 = 800,000 cycles/sec. At 128 MHz, this takes 800,000 / 128,000,000
    = 6.25 ms/sec. 2. DMA Approach: A 4 KB buffer holds 2,048 samples (at 2 bytes/sample). 3. DMA interrupts:
    16,000 / 2,048 = ~7.8 interrupts/sec. 4. DMA overhead: 7.8 * 50 = 390 cycles/sec (~0.003 ms/sec).
    5. Savings: The DMA saves ~6.25 ms/sec of pure context switch time, but more importantly, it prevents
    15,992 preemptions per second, allowing contiguous ML execution.'
