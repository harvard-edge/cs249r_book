schema_version: 1
id: tinyml-exp-anal-0015
title: ESP32-S3 PSRAM Bandwidth Bottleneck Analysis
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: An engineering team deployed an INT8 keyword spotting model on an ESP32-S3 microcontroller (240
  MHz dual-core Xtensa, 512 KB SRAM, 8 MB PSRAM, vector extensions for INT8). The model requires 800 KB
  for weights and 150 KB for activations. To fit the memory, weights are placed in the 8 MB external PSRAM
  and activations in the 512 KB internal SRAM. During profiling, the inference latency is observed to
  be significantly slower than the theoretical compute time calculated using the 240 MHz clock and INT8
  vector throughput. Explain why this specific memory placement causes the observed performance degradation.
details:
  realistic_solution: The degradation happens because the system shifts from being compute-bound to completely
    memory-bound. The external PSRAM communicates with the ESP32-S3 over an SPI/Octal-SPI bus, which has
    significantly lower bandwidth than the internal SRAM matrix. Even though the Xtensa core can crunch
    INT8 vectors at 240 MHz, it stalls constantly waiting for the 800 KB of weights to stream over the
    PSRAM bus for each inference pass.
  common_mistake: Candidates typically assume that because PSRAM is memory-mapped and functionally behaves
    like standard RAM, it has latency and bandwidth comparable to internal SRAM. They often overlook the
    external serial bus bottleneck that starves the fast vector compute units.
  napkin_math: Assuming the PSRAM operates over an Octal SPI bus at 80 MHz, the peak theoretical bandwidth
    is 80 MHz * 8 data lines (1 byte per clock cycle) = 80 MB/s. Loading 800 KB of weights per inference
    takes at minimum 800 KB / 80 MB/s = 10 ms. If the model requires 2 million MACs, a 240 MHz core doing
    8 INT8 MACs per cycle has a theoretical compute time of 2,000,000 / (240,000,000 * 8) = 1.04 ms. The
    10 ms memory transfer time strictly dominates the ~1 ms pure compute time, forcing the CPU to idle
    and causing the massive latency increase.
