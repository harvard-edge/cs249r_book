schema_version: 1
id: tinyml-exp-anal-0021
title: NPU Offloading Energy Overhead Paradox
topic: power-budgeting
status: published
provenance: imported
scenario: You are profiling power consumption on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) system where
  both components share 512 KB of SRAM. The Cortex-M7 runs at 480 MHz (achieving 1 MAC/cycle) and consumes
  100 mW of active power. The Ethos-U55 NPU consumes 150 mW when active (total system power) and is configured
  for 256 MACs/cycle. Waking the NPU and transferring control requires a fixed 0.5 ms of M7 active time.
  A junior engineer notices that for a keyword spotting model with 100,000 MACs, running the model entirely
  on the M7 CPU consumes less energy than offloading it to the Ethos-U55. Explain why this system behavior
  occurs by calculating the total energy-per-inference for both the CPU-only and NPU-offloaded execution.
details:
  realistic_solution: The correct approach requires applying the energy equation (Energy = Power × Time)
    to both execution scenarios. By calculating the execution time on the M7 CPU versus the NPU, and incorporating
    the fixed 0.5 ms wakeup overhead, the candidate demonstrates that the fixed wakeup energy significantly
    outweighs the execution energy for very small models. The NPU only becomes energy-efficient when the
    dynamic compute savings offset this fixed activation penalty.
  common_mistake: Candidates often assume that hardware accelerators like the Ethos-U55 always save energy
    due to their massively higher compute density and efficiency. They frequently overlook the fixed energy
    overheads associated with waking the NPU power domain and the control transfer time running on the
    host CPU.
  napkin_math: '1. M7 CPU-only Time: 100,000 MACs / 480,000,000 MACs/sec = ~0.208 ms.

    2. M7 CPU-only Energy: 0.208 ms × 100 mW = 20.8 μJ.

    3. NPU Offloaded Compute Time: 100,000 MACs / (480,000,000 Hz × 256 MACs/cycle) = ~0.0008 ms.

    4. NPU Wakeup Energy: 0.5 ms × 100 mW = 50 μJ.

    5. NPU Compute Energy: 0.0008 ms × 150 mW = 0.12 μJ.

    6. Total NPU Energy: 50 μJ + 0.12 μJ = 50.12 μJ.

    Conclusion: 50.12 μJ (NPU) > 20.8 μJ (CPU). The fixed 50 μJ wakeup cost makes the NPU more than 2x
    less efficient for this small 100k MAC workload.'
