id: tinyml-0385
title: The Milliwatt-Microwatt Gulf
topic: duty-cycling
status: published
provenance: imported
scenario: You're designing a battery-powered audio sensor for a massive deployment. To make the project
  economically viable, the device must have a multi-year battery life, which means it will be idle over
  99% of the time. To correctly model the battery life and thus the Total Cost of Ownership (TCO), you
  must know the power ratio between the device's two main states. What is the approximate power consumption
  ratio between the 'active' state (running inference) and the 'deep sleep' state for a typical TinyML
  microcontroller?
details:
  realistic_solution: The ratio is approximately 1,000 to 1. A typical microcontroller consumes milliwatts
    (mW) when active but only microwatts (µW) in deep sleep. This vast difference is the fundamental principle
    that enables multi-year battery life in duty-cycled applications and makes them economically feasible.
  common_mistake: Assuming the ratio is modest (e.g., 10x-100x), which leads to drastically overestimating
    average power consumption and underestimating potential battery life. Engineers new to the domain
    often don't appreciate the orders-of-magnitude difference achieved by modern deep sleep modes, which
    is the key enabler for the entire TinyML business model.
  napkin_math: 'Using the provided constants: | Active Power: ~10 mW | Sleep Power: ~10 µW'
