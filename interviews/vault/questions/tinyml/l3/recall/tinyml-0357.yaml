id: tinyml-0357
title: The TCO of Transmission
topic: tco-cost-modeling
status: published
provenance: imported
scenario: You're designing a battery-powered sensor that analyzes a 1-second audio clip once every 10
  seconds. From a Total Cost of Ownership (TCO) perspective for a large fleet, what is the single most
  significant recurring cost you aim to reduce by running a TinyML model on-device versus streaming the
  raw audio to the cloud?
details:
  realistic_solution: The correct answer is the energy cost of wireless data transmission. For a battery-powered
    device, the power budget dictates its operational lifetime. A wireless radio (like Cellular or even
    Wi-Fi) consumes orders of magnitude more power than a microcontroller in its active state. By processing
    data on-device, you avoid activating the radio, drastically extending battery life. This reduces the
    TCO by minimizing the frequency of battery replacements (a huge operational expense for a large fleet)
    or by allowing for a smaller, cheaper initial battery.
  common_mistake: Engineers often focus on tangible upfront costs like the price of the microcontroller
    (BOM cost) or recurring but small per-unit costs like cloud compute. They underestimate that for a
    battery-powered device, battery life IS the dominant TCO factor, and wireless transmission is the
    biggest consumer of power.
  napkin_math: 'Continuous audio streaming over Wi-Fi/Cellular to the cloud consumes ~150mW. Local TinyML
    inference on a Cortex-M4 consumes ~20mW for 1s, then sleeps at 0.01mW for 9s. Avg power: (20*1 + 0.01*9)/10
    = 2 mW. A 10Wh battery lasts 2.7 days in the cloud scenario vs 208 days with TinyML. The biggest TCO
    driver is the $50-$150 manual ''truck roll'' to replace dead batteries.'
