schema_version: 1
id: tinyml-0142
title: The Tensor Arena Peak
topic: pruning-sparsity
status: draft
provenance: imported
scenario: You are optimizing a keyword spotting model for a Cortex-M4 microcontroller with 256KB of SRAM.
  During inference, the device crashes with an out-of-memory error. To debug this, you need to analyze
  the model's runtime memory usage. What is the specific metric that defines the peak RAM requirement
  for a TensorFlow Lite for Microcontrollers model?
details:
  realistic_solution: The correct metric is the 'Tensor Arena Peak'. This is the maximum amount of RAM
    needed at any single point during inference. It's determined by finding the operator that requires
    the largest amount of memory to hold its input and output tensors concurrently. The TensorFlow Lite
    for Microcontrollers interpreter calculates this peak and allocates a contiguous block of SRAM (the
    'tensor arena') of that size. The crash occurs because this peak size exceeds the available 256KB
    of SRAM.
  common_mistake: Engineers often mistakenly believe the peak RAM required is the total size of the model's
    weights (which live in Flash) or the sum of all activation tensors. They forget that SRAM is used
    dynamically and memory for tensors is reused after an operator finishes. The true peak is determined
    by the single operator that has the largest combined size of input and output tensors that must exist
    in memory at the same time.
  napkin_math: '3-layer model example: Layer1 input 1KB output 4KB (peak=5KB). Layer2 input 4KB output
    8KB (peak=12KB). Layer3 input 8KB output 2KB (peak=10KB). Tensor arena peak = max(5,12,10) = 12KB.
    Must fit in 256KB SRAM along with model weights + stack. If peak arena = 200KB + 80KB weights = 280KB
    > 256KB => OOM crash.'
