id: tinyml-0190
title: The Millisecond Machine Stop
topic: latency-decomposition
status: published
provenance: imported
scenario: You're designing a TinyML system to monitor vibrations on a high-speed bottling line. If an
  anomalous vibration is detected, the device must trigger an emergency stop to prevent a pile-up. What
  is the typical, non-negotiable latency budget for such a hard real-time interrupt?
details:
  realistic_solution: The typical latency budget for a hard real-time interrupt in a TinyML context is
    around 1 millisecond. This isn't a performance target; it's a physical requirement of the system being
    controlled. The action is often handled in a dedicated Interrupt Service Routine (ISR) that preempts
    all other processing to guarantee the deadline is met.
  common_mistake: Engineers accustomed to cloud or mobile development often misjudge real-time constraints,
    thinking that 30-100ms is 'fast.' They fail to distinguish between soft deadlines (e.g., UI lag) and
    hard, physical deadlines where missing the budget by even a few milliseconds can cause catastrophic
    equipment failure. The system isn't just slow; it has failed.
  napkin_math: A typical cloud service has a P99 latency budget of 100ms. A mobile app trying to avoid
    UI 'jank' has a 16ms budget. The TinyML emergency stop has a 1ms budget. This means the cloud response
    budget is 100 times larger than the required reaction time for the physical machine.
