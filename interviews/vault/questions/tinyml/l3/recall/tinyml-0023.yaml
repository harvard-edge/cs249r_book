id: tinyml-0023
title: The Duty Cycle Power Drain (tinyml-0023)
topic: duty-cycling
status: published
provenance: imported
scenario: You are designing a battery-powered audio sensor that uses a Cortex-M4 microcontroller to detect
  a wake-word. It wakes up for 1 second to listen and run an inference, then goes into deep sleep for
  9 seconds to conserve energy. What is the approximate *average* power consumption of this device?
details:
  realistic_solution: The average power is the time-weighted average of the active and sleep power states.
    The device is active 10% of the time (1s / 10s) and asleep 90% of the time (9s / 10s).
  common_mistake: Engineers often forget the massive, orders-of-magnitude difference between active and
    sleep power. A common error is to only consider the active power (~10 mW), ignoring the fact that
    the device spends 90% of its time in a low-power state. Another is to incorrectly average the power
    states without weighting by time.
  napkin_math: The device is active 10% of the time (1s out of 10s). The average power will be roughly
    10% of its active power. Active power is ~10 mW, so the average is ~1 mW. The sleep power is 1000x
    smaller, so it's basically a rounding error.
