id: tinyml-0321
title: 'The Energy Cost of Precision: Quantization Fundamentals'
topic: quantization-fundamentals
status: published
provenance: imported
scenario: On a modern embedded processor, roughly how much more energy does a 16-bit floating-point (FP16)
  multiplication consume compared to an 8-bit integer (INT8) multiplication?
details:
  realistic_solution: An FP16 operation consumes approximately 5 times more energy than an INT8 operation.
    The established invariants show that an FP32 operation costs ~18x the energy of INT8, and ~3.4x the
    energy of FP16. The ratio between FP16 and INT8 is therefore ~18 / 3.4 ≈ 5.3x. This non-linear difference
    is a critical physical constraint when designing energy-efficient TinyML systems and is a primary
    motivator for quantization.
  common_mistake: 'Engineers often incorrectly assume that energy cost scales linearly with bit-width,
    leading them to a 2x estimate (16 bits / 8 bits). This ignores the fundamental architectural difference:
    floating-point units are far more complex and power-hungry than simple integer ALUs due to the need
    to handle exponents and mantissas.'
  napkin_math: 1. **Recall FP32 vs. INT8 invariant:** FP32 uses ~18× more energy than INT8. | 2. **Recall
    FP32 vs. FP16 invariant:** FP32 uses ~3.4× more energy than FP16. | 3. **Calculate FP16 vs. INT8 ratio:**
    Energy(FP16) / Energy(INT8) = (Energy(FP32) / 3.4) / (Energy(FP32) / 18) = 18 / 3.4 ≈ 5.3×. | 4. **Conclusion:**
    Switching from FP16 to INT8 reduces arithmetic energy consumption by a factor of ~5×.
