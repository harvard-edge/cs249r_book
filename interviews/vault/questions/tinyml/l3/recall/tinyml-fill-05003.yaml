schema_version: 1
id: tinyml-fill-05003
title: Roofline Feasibility Check for MobileNetV2 on Cortex-M4
topic: roofline-analysis
status: published
provenance: imported
scenario: A firmware team wants to run MobileNetV2 (300M FLOPs, 3.4M params) on STM32F4 with Cortex-M4
  at 168MHz and 256KB SRAM. Flash is 1MB. The processor achieves ~100 MFLOPS in optimized SIMD. Determine
  if the model fits and estimate latency.
details:
  realistic_solution: Model weights INT8 = 3.4M bytes = 3.4MB — exceeds 1MB flash. Even at INT4, 1.7MB
    still exceeds flash. Must use a 0.35× width multiplier variant (~400KB weights, 75M FLOPs). Peak activations
    for 0.35× at 224×224 input exceed 256KB SRAM — must reduce input to 96×96 (~14M FLOPs). Latency =
    14M / 100M FPS = 140ms. Feasible for <10fps applications only.
  common_mistake: Confusing total parameter count with activation memory; MobileNetV2 peak activation
    memory exceeds the available SRAM even with quantization.
  napkin_math: 'Full MobileNetV2: 3.4MB weights > 1MB flash. 0.35× variant: ~400KB weights, fits flash.
    Activations at 96×96: ~180KB peak, fits SRAM. Latency: 14M FLOPs / 100 MFLOPS = 140ms ≈ 7 FPS.'
