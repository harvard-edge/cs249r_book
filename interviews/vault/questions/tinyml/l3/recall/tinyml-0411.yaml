id: tinyml-0411
title: The HVAC False Positive
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your keyword spotting model on an nRF5340 (Cortex-M33, 128 MHz, 256 KB SRAM) achieves 96% accuracy
  in the lab. Deployed in an office building, the false positive rate jumps from 1% to 12%. The building's
  HVAC system cycles on/off every 15 minutes. The audio pipeline uses a PDM microphone at 16 kHz, 256-point
  FFT with 128-sample hop, feeding 40 MFCC features to the model. What's causing the false triggers?
details:
  realistic_solution: 'HVAC systems produce broadband noise with strong energy in the 100-500 Hz range,
    plus tonal components from fan motors (typically 120 Hz and harmonics at 240, 360, 480 Hz for a 60
    Hz AC motor). The MFCC pipeline''s behavior under this noise:'
  common_mistake: '"The model needs more training data — just add HVAC noise samples." More data helps,
    but the root cause is a signal processing failure, not a model capacity problem.'
  napkin_math: 'MFCC computation: 256-pt FFT = 256 × log₂(256) / 2 = 1,024 butterfly ops × 4 cycles =
    4,096 cycles. 40 mel filters: 40 × 128 multiply-accumulates = 5,120 cycles. Log + DCT: ~2,000 cycles.
    Total: ~11,216 cycles per frame. At 128 MHz: 87.6 µs per frame. Frame rate: 16,000 / 128 = 125 frames/sec.
    MFCC overhead: 125 × 87.6 µs = 10.95 ms/sec = 1.1% CPU. Adding 300 Hz HPF: 256 × 2 cycles = 512 cycles
    = 4 µs per frame. Noise estimation (min statistics): 128 bins × 3 ops = 384 cycles per frame. Spectral
    subtraction: 128 bins × 2 ops = 256 cycles. Total added: 1,152 cycles = 9 µs per frame. New total
    per frame: 12,368 cycles. Combined overhead: 12,368 × 125 / 128,000,000 = 1.21% CPU — room to spare.'
