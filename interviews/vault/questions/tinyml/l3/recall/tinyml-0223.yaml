id: tinyml-0223
title: The Interrupt Latency Budget
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are designing a keyword-spotting model for a smart microphone running on a Cortex-M4 microcontroller.
  The system is interrupt-driven, meaning it wakes up to process a small buffer of audio data. To ensure
  the Real-Time Operating System (RTOS) can schedule other critical tasks and the response feels instantaneous,
  what is the typical hard real-time latency budget for the model inference triggered by a single interrupt?
details:
  realistic_solution: The typical latency budget for an interrupt service routine (ISR) in a TinyML context
    is around 1 millisecond (ms). The hardware constants table explicitly lists '1ms (interrupt)' as the
    standard budget for this domain. This extremely tight constraint ensures that the processor is freed
    up quickly to handle other potential high-priority interrupts and maintain overall system stability.
  common_mistake: Engineers from cloud or mobile backgrounds often anchor on much larger latency budgets.
    They might think 100ms (a web server P99) or 16ms (a mobile UI frame) is 'fast.' They fail to account
    for the physics of an RTOS, where blocking the CPU for even a few milliseconds can cause a cascade
    of missed deadlines for other peripherals, leading to system instability.
  napkin_math: If the sensor samples at 1kHz, a new sample arrives every 1ms. The RTOS latency budget
    for processing is strictly 1ms. On a Cortex-M4 running at 168MHz, 1ms provides exactly 168,000 CPU
    cycles. If context switching and RTOS overhead take 40,000 cycles, the KWS model has only 128,000
    cycles per frame to extract features and update the RNN state.
