schema_version: 1
id: tinyml-0545
title: The Dual-Keyword Memory Overflow
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You are a TinyML engineer developing a keyword-spotting feature for a smart device running on
  a Cortex-M4 with 256KB of SRAM. Your initial model, `kws_v1`, uses a standard 3x3 2D convolution with
  16 input channels and 32 output channels, and it fits within the SRAM budget.
details:
  realistic_solution: The root cause is the quadratic scaling of parameters in a standard convolution
    with respect to its channel counts (`C_in * C_out`). Doubling the output channels doubled the parameter
    count of that layer, exceeding the SRAM budget for the tensor arena.
  common_mistake: Engineers often misdiagnose the bottleneck, blaming activation memory (which scales
    with feature map size) or simply assuming more capacity requires more hardware. They may also reach
    for complex post-training optimizations like pruning when a fundamental architectural choice is the
    root cause and offers a much larger and more direct saving.
  napkin_math: '3x3 Conv, 16→32: params=3*3*16*32=4,608 INT8=4.5KB. Double to 64 out: 3*3*16*64=9,216=9KB.
    Activation doubles too: spatial 25x40, old=25*40*32=32KB, new=64KB. Total arena: 64+9≈73KB. With other
    layers, exceeds 256KB SRAM. Params scale as C_in*C_out — doubling C_out doubles both weights and activations.'
