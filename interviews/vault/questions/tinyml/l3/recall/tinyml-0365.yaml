schema_version: 1
id: tinyml-0365
title: The Real-Time Frame Budget
topic: real-time-deadlines
status: published
provenance: imported
scenario: You're designing a low-power person detection sensor for a smart doorbell. The camera provides
  a steady stream of 10 frames per second (FPS) to your microcontroller. To guarantee that you can process
  every single frame without dropping any, what is the maximum time your entire processing pipeline (image
  capture, inference, post-processing) can take for each frame?
details:
  realistic_solution: The system must be able to fully process one frame before the next one arrives.
    With a rate of 10 frames per second, the time budget for each frame is 1 second divided by 10, which
    is 0.1 seconds or 100 milliseconds. Exceeding this budget means the system will start dropping frames,
    failing its real-time constraint.
  common_mistake: A common mistake is to confuse the rate (10 frames per second) with the time budget,
    leading to an answer of 10 milliseconds. This comes from incorrectly calculating 1/100s instead of
    1/10s. Another error is to recall a generic latency number from a table (like the 1ms interrupt budget
    for TinyML) without deriving it from the problem's specific requirements.
  napkin_math: Time Budget per Frame = Total Time / Number of Frames
