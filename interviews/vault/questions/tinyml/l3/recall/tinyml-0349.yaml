id: tinyml-0349
title: The Flash Budget Squeeze
topic: ota-firmware-updates
status: published
provenance: imported
scenario: You are designing a battery-powered smart sensor with 1MB of flash memory. To enable safe Over-the-Air
  (OTA) firmware updates, your system needs to download the complete new image before swapping. You must
  budget space for your ML model, application code, a bootloader, a real-time operating system (RTOS),
  and this OTA download slot. Based on the typical resource allocation in TinyML systems, which of these
  components represents the largest 'tax' on your flash budget, directly competing with the size of your
  ML model?
details:
  realistic_solution: The Over-the-Air (OTA) download partition is typically the largest single consumer
    of flash memory besides the application itself. To ensure a fail-safe update, the device must store
    the entire new firmware image in a separate partition while the current application is running. This
    partition is often equal in size to the main application partition, effectively halving the total
    flash available for the model and business logic.
  common_mistake: Engineers from cloud or mobile backgrounds often underestimate the size of system-level
    components relative to the total available memory on a microcontroller. They might assume the RTOS
    is the largest overhead (like a desktop OS) or not account for the 'double-booking' of space required
    for a safe OTA update, thus miscalculating the space actually available for the ML model.
