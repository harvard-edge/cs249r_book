id: tinyml-0234
title: The Real-Time Radar Deadline
topic: real-time-deadlines
status: published
provenance: imported
scenario: You're designing the ML pipeline for a smart radar gesture sensor running on a Cortex-M4 MCU.
  The product requirement is that a gesture must be classified within 100ms of the physical hand motion
  to feel 'instant'. The radar hardware itself takes 20ms to capture the required data. Which performance
  metric is the most critical to optimize to meet this product requirement?
details:
  realistic_solution: The most critical metric is **End-to-End Latency**. This represents the total time
    from the physical event (hand motion) to the final output (classification result). To meet the 100ms
    hard deadline, every component in the pipeline—sensing, data transfer, preprocessing, and inference—must
    have its latency strictly budgeted to ensure the total sum is less than 100ms.
  common_mistake: Engineers often mistakenly focus on throughput (inferences per second) or misapply metrics
    from other domains, like Time To First Token (TTFT) from LLMs. Throughput is a measure of capacity,
    not responsiveness. A high-throughput system can still have high latency for individual events if
    it relies on batching, which is unacceptable for a hard real-time deadline. The goal isn't processing
    many gestures per second, but processing one gesture, on time, every time.
  napkin_math: Let's budget the pipeline. The system has a 100ms total budget.
