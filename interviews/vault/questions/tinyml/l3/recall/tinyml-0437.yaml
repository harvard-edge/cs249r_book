id: tinyml-0437
title: The Micro-Convolution Budget
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You are tasked with optimizing a keyword-spotting model for a Cortex-M4 MCU with only 256KB
  of SRAM. A profiler shows one specific layer, a standard 3x3 convolution with 64 input channels and
  128 output channels operating on a 16x16 feature map, is consuming the majority of your compute budget.
  A colleague suggests you apply a depthwise separable convolution instead. Demonstrate the computational
  savings by calculating the approximate reduction factor in Multiply-Accumulate (MAC) operations.
details:
  realistic_solution: The correct approach is to calculate the MACs for both the standard convolution
    and the two parts of the depthwise separable convolution (depthwise and pointwise) and then find the
    ratio. The reduction is typically dramatic, on the order of 8-9x for common kernel sizes, making it
    a foundational optimization for mobile and edge devices.
  common_mistake: Engineers often confuse parameter reduction with computational reduction. While related,
    they are not the same. Others incorrectly calculate the cost of either the standard or the two-part
    separable convolution, underestimating the massive efficiency gain of the separable approach.
  napkin_math: 'Standard conv: K^2 * Cin * Cout * H * W = 9*64*128*16*16 = 18,874,368 MACs. Depthwise:
    K^2 * Cin * H * W = 9*64*16*16 = 147,456 MACs. Pointwise: Cin * Cout * H * W = 64*128*16*16 = 2,097,152
    MACs. Separable total = 147456+2097152 = 2,244,608 MACs. Ratio = 18874368/2244608 = 8.4x reduction.'
