schema_version: 1
id: tinyml-0332
title: The Privacy Power Tax
topic: federated-learning
status: published
provenance: imported
scenario: You are designing a battery-powered keyword spotting device using a Cortex-M4 microcontroller.
  To enhance user privacy, instead of sending raw 1-second audio clips to the cloud, the team proposes
  to compute audio features (MFCCs) locally and only transmit the much smaller feature vector. From a
  hardware physics perspective, what is the primary cost associated with this privacy-enhancing computation?
details:
  realistic_solution: The primary cost is significantly increased energy consumption, which shortens battery
    life. The device must stay in a high-power active state for longer to perform the computation. Because
    active power (~10-50 mW) is thousands of times higher than deep sleep power (~1-10 µW), any increase
    in the duration of the active state drastically impacts the total energy budget and is the dominant
    operational cost.
  common_mistake: Engineers often focus on secondary constraints like the additional Flash memory to store
    the feature extraction model or the raw compute latency in milliseconds. While these are factors,
    they are not the *primary* physical cost for a battery-powered device, which is governed by the total
    energy budget over its lifetime. They mistake a one-time BOM cost (memory) or a performance metric
    (latency) for the dominant operational cost (energy).
  napkin_math: The defining constraint of a battery-powered device is its energy budget. From our constants,
    active power on a Cortex-M4 is ~50 mW, while deep sleep is ~10 µW—a 5,000× difference. If the privacy
    computation increases the 'active time' from 100ms (sampling) to 500ms (sampling + computing) for
    each event, the device burns 5,000x more power for an additional 400ms. This extra active time dominates
    the total energy budget and is the principal cost of the feature.
