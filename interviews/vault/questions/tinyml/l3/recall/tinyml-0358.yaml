id: tinyml-0358
title: The Microcontroller Memory Wall
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You are optimizing a keyword spotting model on a Cortex-M4 microcontroller. You notice that
  even with heavily optimized math kernels, you're not seeing the expected performance gains. Based on
  the typical hardware characteristics of such a device, what is the primary performance bottleneck you
  are likely facing?
details:
  realistic_solution: The system is almost certainly **compute-bound**. Microcontrollers like the Cortex-M4
    have a very low arithmetic intensity ceiling, known as the 'ridge point' (~0.5 Ops/Byte). Because
    neural network layers like convolutions reuse data heavily (arithmetic intensity > 1.0), they easily
    exceed this ridge point. This means performance is limited purely by the CPU's maximum calculation
    speed (MAC instructions per cycle), not by the speed of data movement from SRAM. No matter how much
    you optimize the memory access pattern, you cannot exceed the hard ceiling of ~336 MOps/s.
  common_mistake: Engineers often assume that on embedded systems, memory is always the bottleneck due
    to a lack of cache. However, on-chip SRAM actually provides massive bandwidth relative to the very
    slow CPU compute speed, giving microcontrollers a low ridge point. Highly optimized NN kernels are
    almost always compute-bound on these architectures.
  napkin_math: A Cortex-M4 at 168 MHz does ~336 MOps/s. SRAM bandwidth is ~672 MB/s (4 bytes/cycle). The
    Ridge Point is 336/672 = 0.5 Ops/Byte. Optimized neural network convolutions have an arithmetic intensity
    of >1.0 Ops/Byte due to register tiling. Because 1.0 > 0.5, the workload operates on the flat compute-bound
    part of the Roofline model. The bottleneck is the low ~336 MOps/s compute ceiling, not SRAM.
