schema_version: 1
id: tinyml-0184
title: 'The TinyML Memory Wall: SRAM vs. Flash'
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: On a typical microcontroller used for a TinyML application, roughly how much slower is reading
  the model's weights from Flash memory compared to accessing the tensor arena in on-chip SRAM?
details:
  realistic_solution: On-chip SRAM access is extremely fast, on the order of an L2 cache read at about
    4 nanoseconds. Flash memory, while often on the same chip, is designed for non-volatile storage and
    has a significantly higher read latency of about 50 nanoseconds. Therefore, reading from Flash is
    approximately 12.5 times slower than reading from SRAM.
  common_mistake: 'Engineers without specific TinyML experience often get this wrong in two ways: 1) They
    assume both are ''fast'' on-chip memories with negligible difference (e.g., 2-3x), or 2) They apply
    analogies from larger systems (like DRAM vs. SSD) and guess a massive 1,000x+ difference. The reality
    is a distinct, measurable gap that''s crucial for performance but not as extreme as in desktops or
    servers.'
  napkin_math: SRAM Access Time ≈ 4 ns (similar to L2 Cache)
