schema_version: 1
id: tinyml-0512
title: The On-Chip Traffic Jam
topic: collective-communication
status: draft
provenance: imported
scenario: You are the senior engineer on a TinyML team. A junior engineer is debugging a keyword spotting
  model on a new microcontroller (MCU) prototype. The MCU features a Cortex-M7 core and a small, custom
  NPU connected by a 32-bit wide AHB bus running at 100MHz. The engineer observes that transferring a
  32KB audio sample from the main SRAM to the NPU's local memory is creating a significant pipeline bubble,
  stalling the NPU. They tell you, 'This is just like a PCIe data starvation issue in the cloud! The bus
  is the bottleneck. We should have used a higher-bandwidth interconnect like NVLink.'
details:
  realistic_solution: The colleague's analogy is flawed because the physics of on-chip communication are
    vastly different from chip-to-chip or server-to-server interconnects. The on-chip AHB bus has ample
    bandwidth for this workload. The true bottleneck is almost certainly in software or protocol overhead,
    not the physical bus speed.
  common_mistake: Engineers often pattern-match problems from different domains without checking if the
    underlying physics apply. It's easy to hear 'data transfer bottleneck' and immediately think of the
    high-bandwidth interconnects used in datacenters (PCIe, NVLink). However, the orders-of-magnitude
    difference in scale between cloud and TinyML systems means the root causes are completely different.
    Blaming the bus hardware is a common misdiagnosis when the real culprit is almost always software
    overhead or inefficient data movement patterns (e.g., CPU-bound `memcpy`).
  napkin_math: 'AHB: 32-bit@100MHz=400MB/s. 32KB transfer: 32768/400M=82us. NPU inference (500K MACs@100MHz)=5ms.
    Transfer is 82us/5ms=1.6% of pipeline — negligible. NVLink=900GB/s, 2250x faster, but irrelevant for
    82us transfer. Real bottleneck: likely polling not DMA. With DMA: 82us. Without: per-byte ISR inflates
    to ~1ms.'
