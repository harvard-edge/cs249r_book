id: tinyml-0268
title: The Active vs. Sleep Power Chasm
topic: duty-cycling
status: published
provenance: imported
scenario: You're designing a battery-powered audio sensor that wakes on a keyword. To maximize its field
  life and minimize total cost of ownership (TCO), you must understand the power budget. What is the approximate
  ratio of power consumption for a typical TinyML microcontroller when it is in an active processing state
  versus a deep sleep state?
details:
  realistic_solution: The ratio is approximately 10,000 to 1. An active Cortex-M4 microcontroller might
    consume ~10-50 mW, while its deep sleep state can be as low as ~1-10 µW. This massive difference is
    the core engineering principle that enables multi-year battery life in TinyML devices, dominating
    their operational cost.
  common_mistake: Engineers coming from mobile or edge often underestimate this ratio. They might think
    the difference is like a phone's idle vs. active state (perhaps 10-100×). For microcontrollers, 'deep
    sleep' is a fundamentally different physical state where almost all clocks and peripherals are off,
    leading to a much larger, orders-of-magnitude power gap.
  napkin_math: 'Active Power: ~10 mW = 10,000 µW'
