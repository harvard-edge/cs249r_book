id: tinyml-0261
title: 'The Interrupt Deadline: Real-Time Deadlines'
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are designing a keyword spotting model for a low-power microcontroller that triggers on
  a hardware interrupt. To ensure the system feels instantaneous and can process the next audio chunk
  without dropping data, the entire inference must complete before the next interrupt arrives. State the
  typical hard real-time latency budget for such an interrupt-driven TinyML application.
details:
  realistic_solution: The correct answer is approximately 1 millisecond. Interrupt-driven TinyML systems
    have extremely tight latency budgets. The inference task is often triggered by a sensor's data-ready
    interrupt (e.g., a microphone buffer being full) and must complete before the next buffer fills up
    to avoid losing data. This puts the deadline in the single-millisecond range, which is fundamentally
    different from the tens of milliseconds tolerated in mobile or edge systems.
  common_mistake: Engineers often confuse the latency budgets across different scales. A common error
    is to apply the budget for mobile UI 'jank' (~16ms) or edge video frame processing (~33ms) to a microcontroller.
    They fail to appreciate that interrupt-driven systems operate on a much faster timescale, often needing
    to complete a task before the very next sensor reading is ready.
  napkin_math: This is a direct recall from the ML Systems Scale Ladder. A mobile app's 'jank' budget
    is ~16ms. An industrial edge camera's frame budget is ~33ms. A TinyML interrupt budget is ~1ms. This
    means a TinyML system has a deadline that is roughly 16x stricter than a mobile app and 33x stricter
    than a typical edge device.
