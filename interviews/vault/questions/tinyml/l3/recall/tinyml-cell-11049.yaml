id: tinyml-cell-11049
title: 'Dataset Curation: Realize PSRAM-Constrained Training Dataset for ESP32-S3'
topic: dataset-curation
status: published
provenance: imported
scenario: Realize the constraints for an on-device training dataset on ESP32-S3 (240MHz, 512KB SRAM, 8MB
  PSRAM). You want to train a gesture recognition model with 5 gestures using 200 samples per class collected
  from the integrated IMU. Specify what fits in PSRAM, the training batch strategy, and training loop
  design.
details:
  realistic_solution: Store dataset in PSRAM, load mini-batches into SRAM for computation. Use streaming
    training to avoid holding full dataset in fast memory.
  common_mistake: Trying to load all training data into SRAM — impossible. Not understanding that PSRAM
    is accessible but slower than SRAM, and DMA is needed for efficient access.
  napkin_math: 'Dataset: 5 classes × 200 samples × (100Hz × 1-sec × 6 axes × 1B int8) = 1,000 × 600B =
    600KB. Fits in PSRAM (8MB) with room to spare. SRAM during training (512KB): model (1K params × 4B
    = 4KB) + batch (16 samples × 600B = 9.6KB) + activations (16 × 128 hidden × 4B = 8KB) + gradients
    (4KB) + optimizer state (8KB) = 33.6KB << 512KB. PSRAM access latency: ~100 cycles vs SRAM ~1 cycle
    at 240MHz. Loading 600B batch from PSRAM: 600 / (240MHz/100) = 250 microseconds. Forward pass time:
    16 × 600 × 128 × 2 FLOPs = 2.46M FLOPs. At 240MHz scalar: 10.25ms. PSRAM load overhead: 250us/10.25ms
    = 2.4% — negligible. Training: 200 epochs × 1,000 samples / 16 = 12,500 steps × 10.25ms = 128 seconds
    ≈ 2 minutes on-device.'
