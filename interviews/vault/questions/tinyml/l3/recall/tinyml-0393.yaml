id: tinyml-0393
title: The Wake-Word Deadline
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are designing a 'Hey, Sparky!' wake-word detection system on a Cortex-M4 microcontroller.
  The system has a hard real-time deadline of 500ms from the end of the user's utterance to trigger a
  downstream action. The model takes 150ms to run one inference. In this context, identify the single
  most critical metric you must optimize for to guarantee the system is responsive.
details:
  realistic_solution: The most critical metric is the end-to-end, single-inference latency. This is the
    total time from when the audio frame is ready to when the model produces a decision. To meet a hard
    real-time deadline, every component in this chain (data preprocessing, inference, post-processing)
    must be minimized. Unlike batch systems, we don't care about the average performance over time, only
    the worst-case latency for a single event.
  common_mistake: Engineers from cloud or batch-processing backgrounds often instinctively focus on maximizing
    throughput (inferences per second) or experimenting with batching. On a single-stream, real-time device,
    these approaches are incorrect as they introduce latency, directly conflicting with the primary goal
    of immediate response.
  napkin_math: The system has a latency budget of 500ms. The model itself consumes 150ms. This leaves
    350ms for all other overhead (audio buffer handling, system interrupts, etc.).
