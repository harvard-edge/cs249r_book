id: tinyml-0392
title: The INT8 Energy Dividend (tinyml-0392)
topic: quantization-fundamentals
status: draft
provenance: imported
scenario: You're designing a keyword spotting model for a battery-powered device. To maximize battery
  life, you're considering quantizing the model from FP16 to INT8. From an energy consumption perspective,
  about how much less energy does a single INT8 multiplication consume compared to a single FP16 multiplication?
details:
  realistic_solution: 'An INT8 MAC (multiply-accumulate) operation consumes roughly 5x less energy than
    an FP16 MAC. This is a crucial invariant for power-constrained devices. The physics of the silicon
    dictate this relationship: FP32 ops use ~18× the energy of INT8, while FP16 ops use ~3.4× less than
    FP32. The ratio is therefore approximately 18 / 3.4 ≈ 5.3×.'
  common_mistake: Engineers often conflate memory savings with energy savings. While using INT8 instead
    of FP16 halves the memory footprint (8 bits vs 16 bits), the energy saving for the computation itself
    is not 2x. The physical gate operations for integer arithmetic are fundamentally simpler and require
    less power than floating-point operations, which involve handling exponents and mantissas.
  napkin_math: 'Energy per MAC (45nm process): FP32 MAC = 3.7 pJ (4.6 pJ with register). INT8 MAC = 0.2
    pJ (0.9 pJ with register). Ratio: FP32/INT8 = 18.5x compute-only, 5.1x with memory. For 1M-MAC model
    on Cortex-M4 at 168 MHz: FP32 energy = 1M * 4.6 pJ = 4.6 uJ/inference. INT8 = 1M * 0.9 pJ = 0.9 uJ/inference.
    Savings: 3.7 uJ per inference. At 1/s: FP32 = 4.6 uW, INT8 = 0.9 uW. CR2032 (675 mWh): FP32 inference-only
    = 146,739 hours = 16.7 years. INT8 = 83.3 years. But MCU active power (30 mW) dwarfs MAC energy —
    savings matter most for large models where MAC energy approaches system power.'
