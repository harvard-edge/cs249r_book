title: The Federated Payback Period
topic: mlops-lifecycle
status: draft
provenance: imported
scenario: 'You are the Staff ML Systems Engineer for a company with 1 million deployed smart speakers.
  The keyword-spotting model suffers from a high false-activation rate, causing privacy concerns. Your
  team is evaluating two strategies for the next improvement cycle: (A) Centralized Update: Collect triggered
  audio, label it manually ($55,000 OpEx per cycle), and push a new model. (B) Federated Learning (FL):
  Invest $125,000 CapEx upfront in engineering to build an on-device training pipeline, eliminating future
  labeling costs. Which approach is economically superior over a multi-cycle horizon?'
details:
  realistic_solution: The correct analysis requires calculating the TCO for both options over a multi-cycle
    horizon. The key insight is that the centralized approach has a high, recurring operational expense
    (OpEx) in the form of data labeling, while the federated approach has a high, one-time capital expense
    (CapEx) in engineering effort. The on-device energy cost and OTA bandwidth costs are negligible in
    comparison.
  common_mistake: Engineers often mis-estimate costs at scale. A common mistake is to assume that a small
    per-device cost (like energy for on-device training) will become enormous when multiplied by a million
    devices, while underestimating recurring operational costs like data labeling. Another mistake is
    making a decision based on a single year's TCO without considering the payback period of a strategic
    investment.
  napkin_math: '**1. Centralized TCO (3 cycles):** $55,000 × 3 = $165,000. **2. Federated TCO (3 cycles):**
    $125,000 initial build + $0 labeling + negligible energy cost = $125,000. **Payback:** By the third
    cycle, FL saves $40,000 and provides strict privacy guarantees.'
