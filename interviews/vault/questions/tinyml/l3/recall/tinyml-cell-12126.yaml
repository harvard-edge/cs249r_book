title: 'Model Size Estimation: Realize Full System Memory for ESP32-S3 Voice Assistant'
topic: model-size-estimation
status: published
provenance: imported
scenario: 'Size the complete memory layout for an ESP32-S3 (240MHz, 512KB SRAM, 8MB PSRAM, 16MB Flash)
  voice assistant with: FreeRTOS (32KB SRAM), wake-word detection model (100K INT8), command recognition
  model (500K INT8), audio ring buffer (160KB for 5 seconds at 16kHz INT16), I2S audio driver (4KB), WiFi
  stack, and MQTT client.'
details:
  realistic_solution: 'SRAM (512KB): FreeRTOS 32KB + I2S driver 4KB + WiFi stack (IRAM-mapped critical):
    64KB + TFLM runtime 30KB + activation arena (500K model, 2× ratio): 200KB → 330KB total. Audio ring
    buffer: 160KB — put in PSRAM. SRAM total: 330KB < 512KB ✓ (182KB free). PSRAM (8MB): audio ring buffer
    160KB. Model 2 weights (500KB). Display buffer if any. Flash (16MB): FW+RTOS+WiFi: 3MB + Model 1 (100KB)
    + Model 2 (500KB) = 3.6MB. All fit easily.'
  common_mistake: Placing the 160KB audio ring buffer in SRAM when it far exceeds typical SRAM budget;
    must use PSRAM for audio buffering.
  napkin_math: 'SRAM: 32+4+64+30+200=330KB of 512KB. PSRAM: 160KB(audio)+500KB(model2)=660KB of 8MB. Flash:
    3MB+0.1MB+0.5MB=3.6MB of 16MB. WW model activation: 100K×2=200KB (in SRAM during WW detection, then
    swap to command model). Command model activation: 500K×2=1MB → too large for SRAM! Put model 2 activation
    in PSRAM: 1MB. SRAM: 32+4+64+30+200(WW arena)=330KB ✓.'
