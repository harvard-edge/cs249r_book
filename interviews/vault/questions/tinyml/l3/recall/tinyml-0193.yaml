id: tinyml-0193
title: The Energy Cost of Privacy
topic: tco-cost-modeling
status: published
provenance: imported
scenario: You are designing a battery-powered smart doorbell. When motion is detected, it can either (A)
  run a local person-detection model on its Cortex-M4 MCU for 1 second, or (B) wake its WiFi radio and
  transmit a 100KB image to the cloud, which takes 1 second. For the purpose of total device energy consumption,
  which of these two operations is more expensive? State the approximate ratio.
details:
  realistic_solution: Transmitting the image over WiFi is far more expensive. A typical MCU's active power
    is orders of magnitude lower than a WiFi radio's transmission power. The radio's energy consumption
    dominates the on-device compute energy by about 20x.
  common_mistake: Engineers new to embedded systems often focus exclusively on the computational cost
    (FLOPs) of the ML model, assuming it's the most energy-intensive part of the system. They forget that
    waking up and using a peripheral like a WiFi radio is an extremely power-hungry event, often dominating
    the total energy budget.
  napkin_math: 'Energy = Power * time. Local inference on Cortex-M4 (168MHz): 50 mW * 1 sec = 50 mJ. Cloud
    offload: waking WiFi radio and transmitting 100KB takes 1 sec at ~300 mW = 300 mJ. Local TinyML inference
    uses 6x less energy (50 mJ vs 300 mJ) per event, massively extending the doorbell''s battery life
    while completely bypassing network latency.'
