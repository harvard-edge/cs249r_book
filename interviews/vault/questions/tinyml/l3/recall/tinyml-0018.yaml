id: tinyml-0018
title: 'The Duty Cycle Power Drain: Duty Cycling & Energy Harvesting'
topic: duty-cycling
status: draft
provenance: imported
scenario: You are designing a battery-powered sensor with a Cortex-M4 microcontroller. To save energy,
  you use a duty cycle where the device is active for 1 second and then enters a deep sleep mode for 9
  seconds. If the active power is 10 mW and the deep sleep power is 10 µW, what is the approximate average
  power consumption over the full 10-second period?
details:
  realistic_solution: The average power is the time-weighted average of the active and sleep power consumption.
    The device is active 10% of the time (1s out of 10s) and in deep sleep 90% of the time (9s out of
    10s). The active phase dominates the calculation, while the sleep phase's contribution is almost negligible.
  common_mistake: Engineers often forget how dominant the active power is, even for a short duration,
    and incorrectly average the two power numbers (e.g., (10mW + 10µW)/2) without considering the time
    spent in each state. This ignores the core principle of a duty cycle and leads to a massive overestimation
    of power drain and underestimation of battery life.
  napkin_math: 'Active: 10mW × 1s = 10mJ. Sleep: 10µW × 9s = 0.09mJ. Total energy per cycle: 10.09mJ.
    Avg power: 10.09mJ / 10s = 1.009mW ≈ 1mW. CR2032 battery: 225mAh × 3V = 675mWh = 2,430J. Battery life:
    2,430J / 0.001W = 2,430,000s = 28,125 hours ≈ 3.2 years. Sleep power is negligible (<1% of total).'
