id: tinyml-0522
title: 'The Keyword Spotting Overflow: MCU Compute Constraints'
topic: mcu-compute-constraints
status: draft
provenance: imported
scenario: You are a TinyML engineer deploying a keyword-spotting model on a smart doorbell with a Cortex-M4
  MCU. The model was trained in FP32 and quantized to INT8 using post-training static quantization. In
  the lab, the model works perfectly. Deployed in the field, however, it suffers from a high false-positive
  rate, frequently triggering on loud, sharp noises like a dog barking.
details:
  realistic_solution: The root cause is integer overflow. The INT8 data type can only represent values
    from -128 to +127. The calibration dataset used to determine the FP32-to-INT8 scaling factor was not
    representative of the real world; it lacked loud, spiky sounds. When the dog bark caused an activation
    that should have been +140, it exceeded the maximum of +127. In 8-bit two's complement arithmetic,
    this value overflows and wraps around to the negative side, resulting in -116. This catastrophic error
    in the feature map corrupts the layer's output and leads to a misclassification. The solution is to
    re-run the quantization calibration step with a more diverse dataset that includes these loud environmental
    noises.
  common_mistake: Engineers often confuse precision with dynamic range. They might assume the issue is
    a loss of 'detail' (precision) rather than the activation value completely exceeding the representable
    range of the data type. Another common mistake is to blame the hardware or input data clipping, without
    understanding how integer overflow specifically manifests as a 'wrap-around' from large positive to
    large negative numbers.
  napkin_math: 1. **Identify the Range:** The target data type is INT8, which has a signed range of [-128,
    127].
