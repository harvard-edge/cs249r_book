id: tinyml-0408
title: The Hardware Divider Stall
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: 'You are porting an anomaly detection algorithm to a Cortex-M0+. The code has a normalization
  step inside the tightest inner loop: `float norm = val / max_val;`. Your profiling shows this single
  division operation takes an astonishing 40 clock cycles. Why is division so slow on this specific chip?'
details:
  realistic_solution: 'The Cortex-M0+ lacks hardware divide instructions (SDIV/UDIV). Division is emulated
    in software via iterative bit-shifting, taking ~40 cycles vs 1-2 cycles for hardware MUL. Fix: precompute
    the reciprocal once (float inv = 1.0f / max_val) outside the loop, then multiply inside (norm = val
    * inv). This converts a 40-cycle division to a 1-2 cycle multiplication — a 20x speedup on the inner
    loop. For INT8 inference, use fixed-point arithmetic: multiply by a scaled integer reciprocal and
    right-shift, avoiding floating-point entirely.'
  common_mistake: '"Floating point math is slow." While true on chips without an FPU, division is uniquely
    terrible on the M0+.'
  napkin_math: 'Software division: ~40 cycles. Hardware multiplication: 1-2 cycles. Changing a `/` to
    a `*` makes the normalization step 20x faster.'
