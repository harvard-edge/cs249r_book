schema_version: 1
id: tinyml-0460
title: The Silent Saturation
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You're a TinyML engineer deploying a keyword-spotting model on a Cortex-M4 microcontroller.
  The FP32 model achieves 95% accuracy. After applying post-training INT8 quantization using a standard
  calibration dataset, the model's accuracy plummets to 60%. You diagnose the issue and find that the
  failures only happen with 'loud' audio samples where users speak close to the microphone. The quantized
  model fits comfortably in Flash and the tensor arena is well within the 256KB SRAM limit. What is the
  most likely cause of this input-dependent accuracy drop?
details:
  realistic_solution: The calibration dataset was not representative of the full dynamic range of real-world
    audio. 'Loud' samples are causing the intermediate activation values within the neural network to
    exceed the [-128, 127] range of the INT8 data type. This 'saturation' or 'overflow' clips the values,
    introducing large errors that propagate through the model and lead to incorrect predictions. The solution
    is to re-calibrate with a more diverse dataset that includes these high-amplitude samples.
  common_mistake: Blaming the weight quantization process itself or assuming a memory issue like stack/arena
    overflow. Engineers often forget that activations, not just weights, have a dynamic range that can
    be exceeded if the calibration data isn't representative of real-world inputs.
  napkin_math: Assume a key convolutional layer's activation has a range of [-3.5, 3.5] in FP32 during
    calibration. The quantization scale would be `scale = (range_max - range_min) / 255 = (3.5 - (-3.5))
    / 255 ≈ 0.027`. A 'loud' input pushes this activation to a real value of 5.0. The quantized value
    becomes `round(real_value / scale)`. For a symmetric quantization scheme, this is `round(5.0 / 0.027)
    = 185`. Since INT8 is capped at 127, the hardware stores 127. The information about the signal's true
    strength above this level is lost (clipped). In some wrap-around implementations, the value could
    become `185 - 256 = -71`, which is even more catastrophic.
