schema_version: 1
id: tinyml-0440
title: The Overheating Desert Sensor
topic: duty-cycling
status: published
provenance: imported
scenario: You are a TinyML engineer diagnosing a fleet of solar-powered wildlife sensors deployed in the
  Sahara. The device uses a Cortex-M4, is designed for a 3-year battery life, and is powered by a solar
  panel that provides 1.5mW on average. Its operational cycle is to wake every 10 minutes, take 1 second
  to capture an image, run a 2-second inference, and then sleep. However, devices are failing in weeks.
  Telemetry shows internal temperatures reaching 70°C on sunny days, causing the battery to drain rapidly.
  Based on the `NUMBERS.md` constants, diagnose the primary reason for this power crisis.
details:
  realistic_solution: The core issue is a thermal death spiral. High ambient temperatures cause the MCU
    to overheat. To protect itself, it thermally throttles, drastically slowing its clock speed. This
    extends the `t_active` period required to complete the inference, possibly to 8-10 seconds. Concurrently,
    high temperatures exponentially increase leakage current, raising both `P_active` and `P_sleep`. Finally,
    the solar panel's efficiency also decreases in extreme heat. The combination of spending longer in
    a higher-power active state while the energy being harvested is lower creates a severe energy deficit,
    rapidly draining the battery.
  common_mistake: 'Engineers often focus on only one part of the problem, like blaming the solar panel''s
    output or the battery''s health, without considering how temperature affects the MCU''s behavior.
    They might propose changing the duty cycle without diagnosing *why* the power budget is being violated
    in the first place. The key is to see the coupled effect: heat simultaneously degrades supply (solar
    panel) and inflates demand (throttling + leakage).'
  napkin_math: 1. **Baseline Power Budget:** In normal conditions (25°C), `P_active` ≈ 40mW and `P_sleep`
    ≈ 5µW. The average power is `(P_active * t_active + P_sleep * t_sleep) / t_period` = `(40mW * (1s+2s)
    + 5µW * 597s) / 600s` ≈ 0.2mW. This is well below the harvested 1.5mW.
