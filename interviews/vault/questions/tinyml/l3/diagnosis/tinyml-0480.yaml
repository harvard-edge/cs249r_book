schema_version: 1
id: tinyml-0480
title: The Real-Time Queueing Cascade
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'You are designing a predictive maintenance sensor for a factory assembly line using a Cortex-M7
  microcontroller. The sensor must analyze high-frequency vibration patterns to detect imminent machine
  failures. Your ML model inference and signal processing takes exactly 20ms to complete for one event.
  The system has a hard real-time deadline: a classification *must* be completed within 40ms of the vibration
  event occurring, otherwise the machine risks damage.'
details:
  realistic_solution: The third event will miss its deadline. While a single event can be processed well
    within the 40ms budget, the sequential, single-threaded nature of processing on the MCU creates a
    queue. The delay incurred waiting for prior events to finish causes the total time-in-system for the
    third event to exceed its individual deadline. This is a classic queueing failure mode. The only solutions
    are to get a faster processor (reduce service time), add more processors (parallel queues), or implement
    admission control to drop events when the queue is too long.
  common_mistake: Engineers often focus only on the average-case service time (μ) versus the average arrival
    rate (λ). They might see that the 20ms processing time (a 50 Hz service rate) is fast enough for an
    average event rate of, say, 10 Hz. This overlooks the impact of bursty arrivals, which cause queueing
    delays that are the primary cause of failure in hard real-time systems.
  napkin_math: 'Processing time: 20ms/event. Deadline: 40ms from event arrival. Events arrive at t=0,
    t=10, t=20ms. Event1: starts t=0, done t=20. Time-in-system: 20ms < 40ms ✓. Event2: arrives t=10,
    starts t=20, done t=40. Time-in-system: 40-10=30ms < 40ms ✓. Event3: arrives t=20, starts t=40, done
    t=60. Time-in-system: 60-20=40ms = 40ms. If deadline is strict <40ms → MISS. Queue depth=3 causes
    failure.'
