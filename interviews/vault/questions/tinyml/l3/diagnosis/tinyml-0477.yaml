schema_version: 1
id: tinyml-0477
title: The Silent Saturator
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You are a TinyML engineer deploying a keyword-spotting model on a Cortex-M4 microcontroller.
  The model works perfectly in FP32 simulation. To meet the 256KB SRAM budget, you use post-training static
  quantization to convert the model to INT8. The calibration dataset consists of clean audio from a quiet
  office environment.
details:
  realistic_solution: The root cause is activation overflow due to an unrepresentative calibration dataset.
    The static quantization process uses the calibration data to determine the scaling factor from FP32
    to INT8. Since the calibration data only contained quiet audio, it established a narrow dynamic range
    for the activations. When the model encounters loud audio in the field, the true FP32 activation values
    exceed this calibrated range. When converted to INT8, these large values are 'clipped' or 'saturated'
    at the maximum INT8 value of 127, erasing critical information and causing the network to fail. The
    solution is to re-run the quantization process with a more robust calibration dataset that includes
    a wide variety of audio, including loud speech and background noise.
  common_mistake: Engineers often blame generic 'precision loss' from quantization. While INT8 does lose
    precision, it typically causes a graceful, uniform degradation in accuracy, not a catastrophic, input-dependent
    failure. Another common mistake is to blame a hardware or compiler bug, which is far less probable
    than a data distribution issue.
  napkin_math: 'Symmetric INT8: S = max_abs/127. Calibrated on quiet office: max_abs = 5.0 → S = 0.039.
    Field loud audio: true activation = 12.0 → INT8 value = 12.0/0.039 = 307, clipped to 127. Everything
    above 5.0 maps to 127 → 58% of dynamic range lost. Fix: recalibrate with noisy data. New max_abs =
    15.0 → S = 15.0/127 = 0.118. Now 12.0 → 12.0/0.118 = 102, fits in [-128,127]. Accuracy cost: resolution
    drops from 0.039 to 0.118 per step, but no catastrophic clipping. Model size unchanged: same 256KB
    INT8, zero SRAM overhead.'
