schema_version: 1
id: tinyml-0053
title: The FOTA Update Risk
topic: ota-firmware-updates
status: published
provenance: imported
scenario: You have 10,000 sensor nodes deployed in a warehouse, each running a vibration anomaly detection
  model on a Cortex-M4. You need to update the model. The nodes communicate via LoRaWAN (250 bytes/second
  effective throughput). How do you update them, and what happens if the update fails?
details:
  realistic_solution: 'Use delta updates over LoRaWAN multicast. Full 200 KB model at 250 B/s per device
    would take 92.6 days for 10,000 devices. Instead: compute a binary diff (bsdiff) against the current
    model — typical delta is ~20 KB (10% of full). Broadcast via LoRaWAN Class C multicast so all devices
    receive simultaneously: 20 KB / 250 B/s = 80 seconds. Each device: verify CRC (1ms), run test inference
    on known input (50ms), compare output to expected result. If pass: atomic pointer swap to new model.
    If fail: keep old model, report failure. A/B partition in flash ensures rollback if the new model
    crashes post-swap.'
  common_mistake: '"Send the new firmware over LoRaWAN and flash it." At 250 bytes/second, a 200 KB model
    takes 200,000/250 = 800 seconds = 13 minutes per device. With 10,000 devices sharing the LoRa channel:
    years.'
  napkin_math: 'Full model: 200 KB. Delta: 20 KB. LoRaWAN multicast: 20 KB / 250 B/s = 80 seconds. Verification:
    CRC (1ms) + test inference (50ms) = 51ms. Swap: atomic pointer write (1ms). Total per device: 80s
    transfer + 0.05s verify + 0.001s swap. Fleet of 10,000 via multicast: **80 seconds** + staged validation
    (24 hours for safety). Without delta/multicast: 200 KB × 10,000 / 250 B/s = 8,000,000 seconds = **92.6
    days**.'
