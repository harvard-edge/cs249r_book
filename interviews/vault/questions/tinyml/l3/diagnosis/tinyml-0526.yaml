schema_version: 1
id: tinyml-0526
title: The Silent Wake-Word Failure
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You are a TinyML engineer deploying a keyword spotting (KWS) model on a Cortex-M4 microcontroller
  for a new car's hands-free system. The model, which detects the wake-word 'Hey Lumi', performed at 98%
  accuracy in its FP32 version. To meet the 10mW power budget, you quantize it to full INT8 using post-training
  static quantization. On the bench, it works perfectly. But during in-car testing, the wake-word detection
  rate plummets to near 0%, especially when the AC is on high or a window is down. You notice the model
  fails silently; it doesn't crash, it just stops recognizing the keyword. How would you diagnose this
  catastrophic accuracy drop?
details:
  realistic_solution: This is a classic case of quantization overflow due to a non-representative calibration
    dataset. The initial calibration was likely done with clean audio recorded in a quiet room. The in-car
    environment introduces high-amplitude noise (AC, road noise) that pushes the audio feature values
    (e.g., from an MFCC frontend) far outside the dynamic range observed during calibration. When these
    out-of-range values are quantized, they are 'clipped' or 'clamped' to the max/min integer values (e.g.,
    127 or -128), destroying the feature's information and making the input pattern unrecognizable to
    the model. The correct first step is to collect a new, representative calibration dataset that includes
    these noisy, real-world conditions. Then, re-run the quantization process to capture the true dynamic
    range of the inputs.
  common_mistake: Engineers often blame the model architecture or specific operator support on the MCU
    (e.g., 'the convolution implementation must be buggy'). While hardware-specific issues exist, the
    most common and catastrophic failures in post-training quantization come from a mismatch between the
    data used for calibration and the data seen in the real world. Another common mistake is to immediately
    jump to 'retrain with Quantization-Aware Training (QAT),' which is expensive and may not fix the root
    data problem.
  napkin_math: Let's assume your calibration data showed that the activation inputs to the first layer
    ranged from [-6.0, 6.0]. For symmetric INT8 quantization, your scale is `range / num_levels = 6.0
    / 127 ≈ 0.047`. An input value of `4.0` is quantized to `round(4.0 / 0.047) = 85`. When the car's
    AC is on, a background noise feature spikes an activation to `9.0`. This value is outside the calibration
    range, so it is first clamped to the max value of `6.0`. It is then quantized to `round(6.0 / 0.047)
    = 127`. A different noise event at `12.0` is also clamped to `6.0` and also quantizes to `127`. All
    information about the magnitude and variation of noise is lost, leading to incorrect predictions.
