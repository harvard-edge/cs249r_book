schema_version: 1
id: tinyml-0741
title: The Volatile Variable Wipe
topic: graph-compilation
status: published
provenance: imported
scenario: You deploy a TFLite Micro model on an STM32. To save memory, you allocate a large `static uint8_t
  arena[10240]` and point both the ML inference engine and a secondary USB data-transfer task to use it.
  The ML model runs perfectly. When you plug in the USB cable to download logs, the device hard-faults.
  Why can't two tasks share a static array?
details:
  realistic_solution: You broke the **TFLite Micro Memory Lifecycles**. TFLite metadata takes ~2 KB. If
    your USB task writes a 512-byte payload to `arena[0]`, you just destroyed the pointers for the first
    10 layers of your neural network.
  common_mistake: '"You need a mutex to lock the array." While a mutex is needed for thread safety, the
    hard fault happens even if the tasks run sequentially.'
  napkin_math: 'Arena = 10,240 bytes static. TFLite Micro allocates tensors linearly: metadata/pointers
    ~2KB at arena[0..2047], activation buffers fill the rest. USB task writes 512-byte packet starting
    at arena[0] → overwrites bytes 0–511, destroying tensor descriptor structs (pointers, shapes, scales).
    Next inference dereferences corrupted pointer → HardFault at 0xDEAD_BEEF. Fix: separate allocations.
    ML arena = 8KB, USB buffer = 2KB. Total = 10KB same SRAM, but isolated. Cost = zero extra RAM, just
    two static arrays instead of one.'
