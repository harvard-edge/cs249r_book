schema_version: 1
id: tinyml-0455
title: The Vision Transformer Memory Trap
topic: attention-scaling
status: published
provenance: imported
scenario: 'You''re deploying a person-detection model on a smart doorbell camera equipped with a Cortex-M7
  microcontroller (MCU) that has 512KB of SRAM. You have two models with identical accuracy: a MobileNetV2-style
  CNN and a small Vision Transformer (ViT). The ViT has fewer parameters. During inference, the CNN''s
  largest activation map is 14x14x160 (FP32). The ViT operates on 196 patches (14x14 sequence) with an
  embedding dimension of 256. Its largest memory consumer is the N-by-N attention score matrix inside
  the transformer block. Diagnose which model will successfully run on the MCU.'
details:
  realistic_solution: The key is to calculate the peak SRAM usage for each model. The CNN's peak activation
    size fits comfortably within the MCU's SRAM. However, the ViT's self-attention mechanism requires
    instantiating an attention matrix of size N x N, where N is the sequence length (number of patches).
    This quadratic memory scaling makes it infeasible for the limited SRAM of the microcontroller, even
    if its parameter count is smaller. The CNN is the only deployable option.
  common_mistake: Engineers coming from a cloud background often assume a model with fewer parameters
    is 'smaller' and therefore better for edge deployment. They forget that for TinyML, peak SRAM usage
    (the 'Tensor Arena' size), dominated by activations, is the primary constraint, not the total parameter
    count stored in Flash.
  napkin_math: 'CNN peak activation: 14*14*160*4B(FP32) = 125,440B = 122.5KB. Fits in 512KB. ViT attention
    matrix: 196 patches => 196*196 = 38,416 entries * 4B = 153,664B = 150KB per head. With 4 heads: 4*150KB
    = 600KB > 512KB SRAM. Even 1 head (150KB) + embeddings (196*256*4 = 200KB) = 350KB. Multi-head attention
    blows SRAM. CNN wins.'
