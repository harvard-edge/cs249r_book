id: tinyml-0057
title: The A/B Test Brick-pocalypse
topic: ota-firmware-updates
status: draft
provenance: imported
scenario: You are managing a fleet of 500,000 battery-powered smart doorbells, each with a 1MB Flash budget.
  You want to A/B test a new person detection model. The total firmware size is 450KB. The Over-the-Air
  (OTA) update mechanism is reliable, with only a 0.05% failure rate (e.g., due to power loss or connectivity
  issues during the write process), but a failure requires a full device replacement. You plan to roll
  out the new model to a 20% test group. Your manager, accustomed to web-based A/B tests, sees this as
  a low-risk operation. How would you apply your systems knowledge to diagnose the single greatest quantitative
  risk to the business from this 'simple' A/B test?
details:
  realistic_solution: The greatest risk is the number of permanently bricked devices, leading to direct
    financial loss from hardware replacement and customer support. Unlike a server that can be easily
    reimaged, a failed OTA update on a consumer device is often unrecoverable. An A/B test isn't just
    a metadata flip; it's a high-risk firmware operation performed on a massive number of devices simultaneously.
    The key is to calculate the expected number of failures and translate that into a dollar amount, showing
    that the 'low probability' event is a near certainty at scale.
  common_mistake: Engineers from a cloud background often perceive A/B testing as a cheap, reversible
    software flag change. They might focus on secondary metrics like the new model's latency, power draw,
    or the network cost of the deployment. They fail to appreciate that on embedded devices, a 'deployment'
    is a fragile firmware write operation, and a failure at scale, even with a low probability, can lead
    to catastrophic and irreversible hardware losses.
  napkin_math: 1. **Calculate the size of the test group:**
