id: tinyml-0421
title: The Inverted Residual Bottleneck
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You're optimizing a person-detection model on a device with a Cortex-M7 MCU. The profiler shows
  that a specific convolutional block is consuming 70% of the latency. This block uses a classic residual
  connection (wide -> narrow -> wide). A teammate suggests implementing an 'inverted residual' block (narrow
  -> wide -> narrow) as used in MobileNetV2. Using your knowledge of MCU memory systems, diagnose why
  the inverted residual is likely to be faster.
details:
  realistic_solution: The key is memory bandwidth, not just FLOPs. On an MCU, moving data from SRAM to
    the CPU registers is far more expensive than the computation itself.
  common_mistake: The most common mistake is to only consider FLOPs. Engineers might see the 'expansion'
    layer in an inverted residual and assume it creates more work. They fail to realize that the most
    expensive operation (the depthwise convolution) runs on the wide tensor, but this tensor is *intermediate*
    and doesn't have to be read from or written to slow main memory (SRAM), saving critical memory bandwidth.
  napkin_math: 'Classic residual: wide(16KB)→narrow→wide. Skip stores 16KB. Inverted: narrow(4KB)→wide→narrow.
    Skip stores 4KB. Savings: 12KB/block. 4 blocks: classic=64KB skips, inverted=16KB. Saves 48KB=9.4%
    of 512KB SRAM. On M7, memory-bound ops dominate — fewer bytes through bus = fewer stall cycles = faster
    inference.'
