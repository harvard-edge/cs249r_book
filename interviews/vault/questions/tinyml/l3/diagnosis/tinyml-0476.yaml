id: tinyml-0476
title: The Desert Drone Reboot
topic: safety-certification
status: published
provenance: imported
scenario: 'You are the ML systems engineer for a fleet of autonomous delivery drones. Each drone uses
  a Cortex-M7 MCU to run a vision model that identifies safe landing zones. In a new desert deployment,
  drones are frequently rebooting mid-flight during their final landing sequence, forcing a "return to
  home" and failing the delivery. System logs show these reboots are triggered by the hardware watchdog
  timer. You are given the following data: the watchdog is set to fire after 200ms of system unresponsiveness,
  and the vision pipeline (capture, preprocess, inference, postprocess) has a baseline execution time
  of 150ms in the original urban test environment. Based on this, what is the most likely cause of the
  field failures?'
details:
  realistic_solution: The most probable cause is **input-dependent latency**, a form of data drift. The
    high-frequency visual textures of the desert environment (e.g., sand ripples, heat shimmer) are making
    a part of the vision pipeline, likely a preprocessing step like feature extraction or filtering, work
    much harder than it did with the simpler urban images. This increased computational load pushes the
    total pipeline latency beyond the 200ms watchdog limit, causing a timeout and a system reboot.
  common_mistake: 'Engineers often jump to blaming hardware (thermal throttling) or low-level software
    bugs (memory leaks) without first considering the most likely variable in an ML system: the input
    data. A new operational domain (desert vs. urban) is a massive red flag for data drift, which can
    have significant performance side effects beyond just model accuracy.'
  napkin_math: 'Baseline: 150ms pipeline, 200ms watchdog, 50ms margin(25%). Desert: high-frequency sand
    textures→5× more edges. Preprocessing: urban 30ms→desert 80ms. Total: 150-30+80=200ms=at watchdog
    limit. Any thermal throttle or vibration→210ms+→reboot. 50ms margin insufficient for data-dependent
    latency variation in new environment.'
