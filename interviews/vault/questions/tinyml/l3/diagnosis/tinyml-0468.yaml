id: tinyml-0468
title: The Noisy Kitchen Problem
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: 'You are a TinyML engineer deploying a keyword spotting model onto a smart speaker powered by
  a Cortex-M4 MCU with 256KB of SRAM. Your model uses a 100KB INT8 quantized CNN. In the lab, using a
  pre-recorded test set, the model achieves 98% accuracy. When deployed to a user''s kitchen, the accuracy
  plummets to 30%. You run diagnostics and find the following:'
details:
  realistic_solution: The most likely cause is a quantization range mismatch. The model was likely calibrated
    using a dataset of clean speech recorded in a quiet environment. The real-world kitchen environment
    has a much wider dynamic range (e.g., clattering dishes, running blenders). This pushes the microphone's
    input values far outside the min/max range captured during calibration. As a result, the input data
    is 'clipped' or 'saturated' to the INT8 boundaries (-128 or 127), destroying the features the model
    relies on and leading to incorrect predictions. The solution is to re-calibrate the model using a
    representative dataset that includes these noisy backgrounds.
  common_mistake: Engineers often jump to blaming the model architecture or overfitting, assuming it's
    a generalization problem. However, the fact that the FP32 version works well on the same noisy data
    stream points towards a numerical problem introduced during the conversion to INT8, not a fundamental
    model inadequacy.
  napkin_math: Let's assume your calibration data had a signal range of [-1.0, 1.0]. The quantization
    scale `S` would be `(1.0 - (-1.0)) / 255 ≈ 0.0078`. A loud blender sound in the kitchen produces a
    signal value of 3.5. When quantized, this becomes `round(3.5 / 0.0078) = 449`. Since an INT8 value
    cannot exceed 127, this input is clipped to 127. A slightly less loud sound of 2.5 would be quantized
    to `round(2.5 / 0.0078) = 321`, which also clips to 127. The model can no longer distinguish between
    these two different loud sounds; the information is lost.
