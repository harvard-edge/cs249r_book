id: tinyml-0466
title: The Privacy-Power Trade-off
topic: federated-learning
status: published
provenance: imported
scenario: 'You are a TinyML engineer designing a battery-powered medical diagnostic device. To improve
  the voice command model, you need to analyze recognition failures. You must choose between two approaches.
  Option 1 (Cloud Upload): Transmit the 64KB raw audio directly to the cloud. Option 2 (On-Device): Run
  a pre-processing step that consumes 25mJ but reduces the payload to 2KB. The transmission energy is
  directly proportional to the payload size. Which approach is more energy-efficient and why?'
details:
  realistic_solution: The on-device pre-processing option is vastly more energy-efficient. The dominant
    energy cost in IoT systems is almost always network transmission, not computation. By spending a small
    amount of energy on-device to reduce the data payload, you save a massive amount of energy by keeping
    the power-hungry radio off.
  common_mistake: Engineers often misjudge the dominant energy cost. They either focus only on the added
    on-device compute cost, ignoring the massive energy drain of the radio, or they only look at the ratio
    of data sizes, ignoring the physics of compute and transmission time.
  napkin_math: 'Radio TX energy: ~5µJ/byte (typical BLE/cellular). Option 1 (cloud): 64KB × 5µJ/B = 64,000
    × 5 = 320mJ. Option 2 (on-device): preprocessing = 25mJ + upload 2KB × 5µJ/B = 10mJ = 35mJ total.
    Ratio: 320/35 = 9.1× more efficient on-device. Energy saved per event: 285mJ. Over 100 events/day:
    28.5J/day saved. Battery: 675mWh = 2,430J. Extra battery life: 28.5J/day × 365 = 10.4kJ/year saved.'
