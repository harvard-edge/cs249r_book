schema_version: 1
id: tinyml-0449
title: The TinyML Accelerator Starvation
topic: network-bandwidth-bottlenecks
status: draft
provenance: imported
scenario: You are designing a smart camera system on a microcontroller (MCU). It uses a small, external
  AI accelerator chip to run a real-time object detection model. The camera sensor produces 320x240 8-bit
  grayscale images, and the product requires a frame rate of 20 FPS. Your MCU must read the image from
  the sensor and send it to the accelerator for processing. You are considering connecting the MCU and
  the accelerator using the SPI bus. Using the provided hardware constants, apply them to diagnose the
  primary performance bottleneck in this design.
details:
  realistic_solution: The primary bottleneck is the SPI bus interconnect. Its maximum bandwidth is insufficient
    to transfer the image data from the MCU to the accelerator at the required rate of 20 frames per second.
    The accelerator will be starved for data, making it impossible to meet the performance target. The
    design requires a faster interconnect, such as a parallel bus, to supply the necessary data bandwidth.
  common_mistake: Engineers accustomed to cloud or mobile development often underestimate how slow TinyML
    peripheral buses are. They might assume SPI is 'fast enough' without doing the math, or focus only
    on the MFLOPS of the accelerator while ignoring the I/O bandwidth required to keep it fed with data.
  napkin_math: 'Image: 320*240*1B=75KB. At 20 FPS: 1.5MB/s=12Mbps. SPI max ~10Mbps: 12>10 — bus saturated.
    Max FPS: 10M/(75K*8)=16.3 FPS, misses 20 by 18%. Fix: QSPI 4-lane@40Mbps → 65 FPS (plenty). Or reduce
    to 240x180=43KB → 6.9Mbps@20FPS (fits SPI). Or parallel 8-bit DCMI bus.'
