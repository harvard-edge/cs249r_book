schema_version: 1
id: tinyml-0742
title: The CMSIS-NN Dimension Limit
topic: graph-compilation
status: published
provenance: imported
scenario: You are porting an anomaly detection Autoencoder to an STM32. The input is a very long 1D time-series
  signal of shape `(1, 1, 100000, 1)`. When you run this through TFLite Micro using CMSIS-NN kernels,
  the convolution layer produces completely random garbage outputs, but it doesn't crash. What mathematical
  assumption of the DSP library did you violate?
details:
  realistic_solution: 'CMSIS-NN uses int16_t for dimension variables internally. Your input dimension
    of 100,000 exceeds INT16_MAX (32,767). The dimension wraps: 100,000 % 65,536 = 34,464, interpreted
    as signed = -31,072. The convolution loop iterates ''for(i=0; i < -31072; i++)'' which immediately
    exits, leaving the output buffer uninitialized with garbage. No crash because the loop simply doesn''t
    execute — silent data corruption. Fix: split the 100K time series into chunks of 30,000 or fewer,
    process sequentially, and concatenate results. Or use a version of TFLite Micro with int32 dimension
    support.'
  common_mistake: '"The MCU doesn''t have enough RAM for 100,000 floats." If it OOM''d, it would crash.
    It didn''t crash; the math is just wrong.'
  napkin_math: '`int16_t max = 32,767`. `100,000 % 65,536 = 34,464`. Since it''s signed, it wraps to `-31,072`.
    The loop says `for(int i=0; i < -31072; i++)`, immediately fails, and leaves the uninitialized scratch
    buffer as the "output".'
