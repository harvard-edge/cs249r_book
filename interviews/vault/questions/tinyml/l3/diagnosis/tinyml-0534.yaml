id: tinyml-0534
title: The Silent Doorbell Failure
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You are deploying a 'Hello' keyword-spotting model on a smart doorbell's Cortex-M4 MCU. To meet
  the strict 256KB Flash budget, you've quantized the entire model to INT8. The model performs flawlessly
  in the lab. However, field reports show it frequently fails to activate when users speak loudly or are
  very close to the device. Analyzing a failed inference run, you discover that the activation outputs
  of the first convolutional layer are heavily clustered at the minimum INT8 value, -128. What is the
  most likely diagnosis for this specific failure mode?
details:
  realistic_solution: The root cause is a quantization calibration mismatch. The dataset used to calibrate
    the FP32-to-INT8 conversion had a narrower dynamic range than the audio captured in the field. Loud
    sounds produce floating-point activation values that exceed the range observed during calibration.
    When these values are quantized, they 'saturate' or 'overflow,' getting clamped to the min/max of
    the INT8 range ([-128, 127]). This corruption in the first layer's feature map cascades through the
    network, leading to an incorrect prediction (a false negative). The solution is to re-calibrate the
    model with a more representative dataset that includes loud and close-proximity audio samples.
  common_mistake: 'Engineers often misdiagnose this as a classic ML generalization problem (overfitting)
    or a hardware issue (mic clipping). While related, the specific evidence—activations clamped at the
    integer boundary—points to a more precise systems-level failure: the quantization parameters are wrong
    for the real-world signal''s dynamic range.'
  napkin_math: 'A 500KB FP32 model would not fit on the MCU. On a 1MB chip, the available space is often
    limited: 1024KB (Total) - 64KB (RTOS) - 32KB (Bootloader) - 450KB (Firmware-Over-the-Air buffer) =
    ~478KB available for the model. The FP32 model (500KB) is too large. Quantizing to INT8 reduces the
    size by 4x: 500KB / 4 = 125KB. This fits comfortably, but introduces the risk of overflow if calibration
    is not robust.'
