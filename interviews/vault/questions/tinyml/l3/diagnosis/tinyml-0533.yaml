schema_version: 1
id: tinyml-0533
title: The Factory Floor Cascade Failure
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are a TinyML engineer working on a predictive maintenance sensor for a factory assembly
  line. The device uses a Cortex-M7 MCU, which delivers approximately 960 MFLOPS. It runs a vibration
  analysis model that requires 80 MFLOPs to execute. The system has a hard real-time deadline of 50ms
  per event. The average arrival rate is 1 Hz, but events frequently arrive in bursts.
details:
  realistic_solution: 'The diagnosis depends on the real-time deadline, which must be specified. The service
    time is Ts = 80 MFLOPs / 960 MFLOPS = 83.3 ms. If events arrive faster than every 83.3 ms, the system
    is fundamentally non-viable — the queue grows without bound and every event misses its deadline. Increasing
    queue size only delays the crash. The only valid solutions are: (a) reduce model FLOPs via quantization/pruning
    to bring Ts below the inter-arrival time, (b) use a faster MCU, or (c) reduce the sampling rate if
    the application permits.'
  common_mistake: Engineers often focus on the symptom (queue overflow) instead of the root cause. They
    might suggest increasing the queue size, which only allows the system to hold more 'stale' events
    that have already missed their deadline. The fundamental problem isn't the queue capacity, but that
    the service time for a single event is longer than the hard real-time deadline, violating the basic
    condition for system stability.
  napkin_math: '**Service time (Ts):** Model = 80 MFLOPs. MCU = 960 MFLOPS. Ts = 80 / 960 = **0.0833 seconds
    (83.3 ms) per inference**. **Viability check:** With a deadline of 50ms: Ts = 83.3 ms > 50 ms → **system
    is non-viable**. Events arrive faster in bursts than they can be processed within the deadline. The
    queue grows during bursts, and events miss their deadline. **Fixes:** (1) INT8 quantization with SIMD:
    ~2-4× speedup → Ts = 21-42 ms (fits). (2) Prune model to 40 MFLOPs → Ts = 41.7 ms (fits).'
