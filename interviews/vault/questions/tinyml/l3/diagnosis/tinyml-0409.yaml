schema_version: 1
id: tinyml-0409
title: The 16-bit MAC Overflow
topic: roofline-analysis
status: published
provenance: imported
scenario: You are writing a custom dot-product loop in C for an older 16-bit MCU. You declare your accumulator
  as `int16_t sum = 0;`. Your input features and weights are all `int8_t`. The loop multiplies them and
  adds to the sum. The code compiles and runs instantly, but the ML output predictions are completely
  random. Why is the math catastrophically wrong?
details:
  realistic_solution: 'The int16_t accumulator overflows after just 2 maximum products. INT8 max product:
    127 * 127 = 16,129. INT16 max: 32,767. You can only accumulate 32,767 / 16,129 ~ 2 products before
    wrapping to negative values, corrupting all subsequent math. For a dot product of length 128+, the
    accumulator wraps dozens of times, producing effectively random bits. Fix: use int32_t for the accumulator
    (holds up to ~131,000 max products). The multiplication of two int8 values fits in int16, but the
    running sum does not — this is the classic accumulator width trap in fixed-point ML.'
  common_mistake: '"An 8-bit times an 8-bit fits in a 16-bit, so the math is fine." The multiplication
    fits, but the accumulation does not.'
  napkin_math: 127 * 127 = 16,129. 32,767 / 16,129 = ~2. You physically cannot sum more than 2 maximum
    activations together before a 16-bit accumulator catastrophically overflows.
