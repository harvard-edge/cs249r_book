schema_version: 1
id: tinyml-0699
title: The Stack vs Heap on MCU
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: 'A junior engineer porting a model to a Cortex-M0+ with 32 KB SRAM asks: ''Why does TFLite Micro
  make me declare a static `uint8_t tensor_arena[20480]` instead of just calling `malloc(20480)`?'' Why
  is TFLite Micro''s static tensor arena design not just an embedded best practice, but an ML-specific
  requirement driven by the model''s peak activation memory, and how does dynamic allocation make WCET
  analysis of inference impossible?'
details:
  realistic_solution: "TFLite Micro's static arena solves two ML-specific problems:\n  (1) **Peak Activation\
    \ Memory Planning:** An ML model's memory footprint isn't uniform; it peaks at specific layers (e.g.,\
    \ a large convolution early in the network) and shrinks at others. The tensor arena size must be exactly\
    \ tailored to the model's *peak* activation memory plus weight overhead. If you use `malloc` for individual\
    \ tensors dynamically during inference, the heap will fragment. A 20 KB heap might have 6 KB \"free\"\
    , but if the next layer requires a contiguous 4 KB activation tensor and the heap is fragmented into\
    \ 50-byte holes, the inference crashes mid-execution. A static arena uses a simple bump allocator\
    \ that reuses memory deterministically, guaranteeing that if the peak layer fits once, it fits forever.\n\
    \  (2) **WCET (Worst-Case Execution Time) Analysis:** In safety-critical ML (e.g., a vibration anomaly\
    \ detector that must trigger a shutdown in 10ms), you must prove the inference latency. `malloc` is\
    \ non-deterministic; its execution time depends on the current state of the heap's free list. Searching\
    \ a fragmented free list for a 4 KB block might take 10 cycles or 10,000 cycles. The static arena's\
    \ bump allocator takes $O(1)$ time (literally just adding an offset to a pointer), making the memory\
    \ allocation phase of inference perfectly deterministic and allowing rigorous WCET analysis of the\
    \ ML pipeline."
  common_mistake: '"malloc is fine — it''s just allocating memory. The static array is a style choice."
    On a desktop, yes. On a 32 KB MCU running ML, malloc destroys both reliability and real-time guarantees.'
  napkin_math: '32 KB SRAM layout: firmware .bss/.data = 4 KB, stack = 2 KB, tensor arena = 20 KB, free
    = 6 KB. With malloc: 50 tensor allocations per inference. After 10 inference cycles, ~15% external
    fragmentation = 3 KB in unusable holes. Largest contiguous free block: 3 KB. If the next layer needs
    a 3.5 KB activation tensor: hard fault. With static arena: bump allocator resets to offset 0 each
    inference. Zero fragmentation. Peak usage: deterministic 18.5 KB. Headroom: 1.5 KB — verified at compile
    time.'
