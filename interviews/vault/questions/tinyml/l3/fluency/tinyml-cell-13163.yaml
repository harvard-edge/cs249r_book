id: tinyml-cell-13163
title: 'TinyML TCO Fluency: Rapid BOM and Power Budget for TinyML Product'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Quickly estimate BOM cost and annual power cost for a TinyML smoke detector using Cortex-M7+Ethos-U55
  ($8 MCU), photoelectric sensor ($2), LoRa module ($3), CR123A battery (1500mAh, $2), and enclosure ($5)
  = $20 BOM. Avg current: 50μA continuous + 200mA for 100ms alarm every 10 years. Battery life at 3V?'
details:
  realistic_solution: 'Alarm duty cycle: 100ms / (10yr * 365.25 * 24 * 3600 * 1000ms) = 100ms / 315,576,000,000ms
    = 3.17e-10. Alarm current contribution: 200mA * 3.17e-10 = 63.5 nA — negligible. Average current =
    50μA. Battery life: 1500mAh / 0.050mA = 30,000 hours = 3.42 years. Well below 10-year target! Fix:
    reduce standby to 10μA using proper MCU sleep mode. Life: 1500/0.010=150,000hr=17.1yr. Problem solved.
    Annual power cost (if grid-powered): 50μA*3V*8760/1000=$0.00131/yr. For 1M deployed units: $1,315/yr
    total electricity — trivially cheap. BOM cost dominates all other costs.'
  common_mistake: Including the alarm current in the average without proper duty-cycle weighting (alarm
    occurs once every 10 years = 0.000000317 duty cycle, making it completely negligible).
  napkin_math: 'At 50μA avg: life=1500mAh/0.05mA=30,000hr=3.42yr. Fails 10yr requirement. At 10μA: 150,000hr=17.1yr.
    Success. BOM: $20. CR123A: 2yr cost=2*$2=$4. At 10μA: battery lasts 17yr, replace every 10yr (safety
    regulation): 10yr cost=$4/battery + $10 labor=$14. Annualized: $1.40/yr vs $0.131 power if grid. For
    1M units 10yr: batteries=$14M, BOM=$20M, power negligible. Manufacturing at scale: BOM $20 → $10 at
    10M units (volume discount). Labor: $5/unit. Total 1M units 10yr TCO: $20M BOM + $5M assembly + $14M
    batteries = $39M.'
