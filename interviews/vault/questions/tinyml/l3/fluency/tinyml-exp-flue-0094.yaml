schema_version: 1
id: tinyml-exp-flue-0094
title: nRF5340 End-to-End Wake Word Latency
topic: latency-decomposition
status: published
provenance: imported
scenario: You are deploying a keyword spotting system on a Nordic nRF5340, which features a 128 MHz application
  core and a separate 64 MHz network core for BLE 5.3. Once a complete audio frame is captured, DSP preprocessing
  requires 256,000 clock cycles on the application core, followed by neural network inference which requires
  1,024,000 clock cycles. When a keyword is detected, the application core triggers the network core via
  IPC (incurring a 5 ms inter-core communication delay), and the network core subsequently transmits a
  BLE alert requiring 2 ms of over-the-air time. Calculate the total end-to-end latency from the moment
  the audio frame is ready for processing to the completion of the BLE transmission.
details:
  realistic_solution: 'The correct approach decomposes the end-to-end latency into four sequential components:
    preprocessing, inference, IPC delay, and network transmission. By taking the cycle counts for the
    DSP and ML workloads and dividing them by the 128 MHz clock frequency of the application core, you
    find the compute duration. Summing these values with the constant IPC and BLE delays gives the complete
    system latency.'
  common_mistake: Candidates often forget to convert clock cycles to time correctly, or they mistakenly
    apply the 64 MHz network core frequency to the compute tasks instead of the 128 MHz application core
    frequency. Another frequent omission is ignoring the inter-core communication latency inherent in
    dual-core MCU architectures.
  napkin_math: '1. App Core Frequency: 128 MHz = 128,000,000 cycles/sec = 128,000 cycles/ms.

    2. Preprocessing latency: 256,000 cycles / 128,000 cycles/ms = 2 ms.

    3. Inference latency: 1,024,000 cycles / 128,000 cycles/ms = 8 ms.

    4. IPC delay (App to Net core): 5 ms.

    5. BLE 5.3 Tx latency: 2 ms.

    6. Total Latency = 2 ms (pre) + 8 ms (inf) + 5 ms (IPC) + 2 ms (BLE) = 17 ms.'
