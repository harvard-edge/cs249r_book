schema_version: 1
id: tinyml-exp-flue-0086
title: Randomized Smoothing Latency on Cortex-M4
topic: adversarial-robustness
status: published
provenance: imported
scenario: You are deploying a vibration-based anomaly detection model on an ARM Cortex-M4 (STM32F4) running
  at 168 MHz. To defend against physical adversarial perturbations on the sensor, you implement a randomized
  smoothing defense that requires running inference 20 times with injected input noise to vote on the
  final prediction. The base model requires 2.1 million INT8 MAC operations per inference. Using CMSIS-NN
  SIMD instructions, calculate the total processing latency for one smoothed prediction, assuming a 25%
  overhead for memory loads and noise generation, and determine if it meets a 500 ms real-time deadline.
details:
  realistic_solution: The correct approach calculates the CPU cycles needed for a single inference by
    dividing the total MACs by the SIMD throughput. This is multiplied by the number of smoothing iterations
    and the overhead factor. Finally, dividing the total cycles by the CPU clock frequency (168 MHz) yields
    the latency, which easily clears the deadline.
  common_mistake: Candidates often forget to account for the CMSIS-NN SIMD capability (2 MACs/cycle) or
    fail to factor in the clock speed correctly. They might also forget to apply the 25% overhead to the
    total cycles before comparing against the deadline.
  napkin_math: '1. Single inference cycles = 2,100,000 MACs / 2 MACs/cycle = 1,050,000 cycles.

    2. Total base cycles (20 runs) = 1,050,000 * 20 = 21,000,000 cycles.

    3. Add 25% overhead: 21,000,000 * 1.25 = 26,250,000 cycles.

    4. Total Latency = 26,250,000 cycles / 168,000,000 cycles/sec = 0.15625 seconds = 156.25 ms.

    5. Conclusion: 156.25 ms is well within the 500 ms real-time deadline.'
