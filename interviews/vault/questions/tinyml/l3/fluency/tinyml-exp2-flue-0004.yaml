schema_version: 1
id: tinyml-exp2-flue-0004
title: Audio Ingestion Memory and Cycle Budgeting
topic: streaming-ingestion
status: published
provenance: imported
scenario: You are designing a real-time ingestion pipeline for a keyword spotting system on an ARM Cortex-M7
  + Ethos-U55 (Corstone-300) platform. A microphone streams 16 kHz, 16-bit audio via DMA into a circular
  buffer in the shared 512 KB SRAM. The Ethos-U55 runs inference on a 1-second audio context every 250
  ms. Calculate the minimum SRAM required for a zero-copy circular buffer (to hold the context plus one
  stride to prevent DMA overwrite) and the M7 cycle budget for MFCC feature extraction if it must complete
  within 5% of the 250 ms stride time (the M7 operates at 480 MHz).
details:
  realistic_solution: The optimal approach uses a zero-copy circular buffer driven by DMA interrupts.
    By sizing the buffer to hold exactly the 1-second context plus the 250ms stride, we prevent memory
    corruption without copying data. Feature extraction is executed on the Cortex-M7 over the newly ingested
    250ms chunk within the tight cycle budget before handing the computed features to the Ethos-U55.
  common_mistake: Candidates often forget to account for the extra stride buffer required to prevent DMA
    from overwriting the oldest data while the system processes the current 1-second frame. They also
    frequently miscalculate the millisecond-to-clock-cycle conversions, failing to accurately determine
    the available cycles on the 480 MHz MCU.
  napkin_math: '1. Data Rate: 16,000 samples/sec * 2 bytes/sample = 32 KB/sec. 2. Buffer Duration: 1.0
    second (context) + 0.25 seconds (stride) = 1.25 seconds. 3. Minimum SRAM Buffer: 1.25 sec * 32 KB/sec
    = 40 KB (leaving 472 KB of the shared 512 KB SRAM for Ethos-U55 weights and activations). 4. Time
    Budget for M7: 5% of 250 ms stride = 12.5 ms. 5. M7 Cycle Budget: 12.5 ms * 480,000 cycles/ms (from
    480 MHz clock) = 6,000,000 CPU cycles available for feature computation.'
