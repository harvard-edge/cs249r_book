id: tinyml-0698
title: The Flash-SRAM Boundary
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: 'A junior engineer asks: ''Why can''t we just run the model entirely from flash? It''s 1 MB
  — way bigger than SRAM.'' Explain why model weights live in flash but activations must live in SRAM
  on a Cortex-M4.'
details:
  realistic_solution: 'Weights are read-only during inference — they never change, so they map naturally
    to flash (non-volatile, read-only, large). Activations are the intermediate tensors computed at each
    layer — they are written, overwritten, and discarded every inference, requiring read-write SRAM. On
    an STM32F4: 1MB flash holds weights (200KB model uses 20% of flash), while 256KB SRAM holds activations
    (~150KB peak), firmware (40KB), and stack (8KB). If you tried to copy weights into SRAM, you would
    need 200+150+48 = 398KB, exceeding the 256KB limit. Flash-resident weights are a requirement, not
    an optimization.'
  common_mistake: '"Flash is too slow for inference." Flash read speed on STM32F4 is actually quite fast
    — up to 168 MHz with the ART accelerator (Adaptive Real-Time memory accelerator). The issue is not
    read speed.'
  napkin_math: 'STM32F4: 1 MB flash (weights, read-only, fast), 256 KB SRAM (activations, read-write,
    fast). A 200 KB INT8 model: weights in flash (0 SRAM cost), activations in SRAM (~150 KB peak). Total
    SRAM needed: 150 KB + 40 KB firmware + 8 KB stack = 198 KB. Fits in 256 KB. If weights were copied
    to SRAM: 200 + 150 + 48 = 398 KB — doesn''t fit. Flash-resident weights are not an optimization; they''re
    a requirement.'
