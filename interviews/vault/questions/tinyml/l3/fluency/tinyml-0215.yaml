schema_version: 1
id: tinyml-0215
title: The Sleep-Wake Power Chasm
topic: duty-cycling
status: published
provenance: imported
scenario: You're designing a battery-powered sensor that wakes up, runs a tiny keyword-spotting model
  for one second, and then goes back to sleep for nine seconds. To estimate the device's battery life,
  you must understand the power draw in both states. What is the approximate ratio of active power consumption
  to deep sleep power consumption for a typical Cortex-M4 class microcontroller?
details:
  realistic_solution: The ratio is typically in the range of 1,000x to 10,000x. Active power consumption
    for a microcontroller is measured in milliwatts (mW), while its deep sleep power is measured in microwatts
    (µW), a thousand-fold difference in units alone.
  common_mistake: Engineers without low-level embedded experience often underestimate this ratio, thinking
    it's similar to a mobile phone's sleep mode (e.g., 10-100x). This leads to catastrophic miscalculations
    in battery life, as they fail to appreciate that the entire TCO and feasibility of a TinyML product
    hinges on spending over 99% of its life in an ultra-low power state.
  napkin_math: 'Active: Cortex-M4 ~50mW (running inference at 168MHz). Deep sleep: ~5uW (RTC + minimal
    leakage). Ratio = 50mW/5uW = 10,000x. Duty cycle impact: 1s active + 9s sleep. Avg = (50mW*1 + 0.005mW*9)/10
    = 5.0045mW. Nearly 10x reduction from 50mW continuous. The 10,000x ratio is why duty cycling is so
    effective.'
