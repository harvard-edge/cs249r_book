schema_version: 1
id: tinyml-0129
title: The Sleep Mode Wake-Up Cost
topic: duty-cycling
status: published
provenance: imported
scenario: Your always-on environmental sound classifier runs on an nRF52840 (Cortex-M4F, 64 MHz, 256 KB
  SRAM). Between inferences (every 2 seconds), you put the MCU in System OFF mode (0.3 µA). But your measured
  average current is ~300 µA — 1000× higher than your System OFF prediction. The inference itself only
  takes 25 ms at 3 mA. What's eating the power budget?
details:
  realistic_solution: 'The hidden power drain is the wake-up sequence, not sleep or inference. System
    OFF draws 0.3 uA, but waking requires: (1) oscillator startup (HFXO): 1.5ms at 5 mA = 22.5 uJ. (2)
    RAM restoration and register re-init: 0.5ms at 3 mA = 4.5 uJ. (3) PDM microphone startup and stabilization:
    50ms at 10 mA = 1,500 uJ — this dominates. (4) Inference: 25ms at 3 mA = 225 uJ. Total per cycle:
    1,752 uJ, but the microphone startup is 86% of it. Fix: use a hardware voice activity detector (always-on
    comparator at 2 uA) that triggers wake only on detected audio. Or keep the microphone in low-power
    standby (150 uA) with a shorter 5ms startup, trading sleep current for faster wake.'
  common_mistake: '"The MCU isn''t actually entering deep sleep." It is — you''ve verified with an oscilloscope
    that current drops to 0.3 µA between inferences.'
  napkin_math: 'Battery: 230 mAh CR2032 at 3V. At 292 µA: 230 mAh / 0.292 mA = 787 hours = 32 days. At
    205 µA (with hardware wake detector): 230 / 0.205 = 1,122 hours = 47 days. At 45 µA (theoretical MCU-only):
    230 / 0.045 = 5,111 hours = 213 days. The microphone is ~86% of the total cycle energy. The MCU''s
    deep sleep is irrelevant if the sensor stays on.'
