schema_version: 1
id: tinyml-0697
title: The Memory-Mapped Sensor Bottleneck
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: Your TinyML vibration monitoring system uses a Cortex-M0+ (48 MHz, 32 KB SRAM) with an external
  accelerometer connected via SPI. The accelerometer produces 3-axis INT16 samples at 3.2 kHz. Your colleague
  reads each sample by polling the SPI data register in a busy-wait loop inside the main inference function.
  The system works, but inference latency is 3× worse than expected. Why?
details:
  realistic_solution: 'Polling SPI stalls the CPU pipeline for every byte transfer. At 3.2kHz * 3 axes
    * 2 bytes = 19.2KB/s, reading 512 samples (one inference window) requires the CPU to execute a busy-wait
    loop for each of the 3,072 bytes. Each poll cycle: check SPI status register (~4 cycles) + read data
    (~2 cycles) + store + loop = ~156 cycles/sample. Total I/O overhead: 79,872 cycles = 1.66ms, doubling
    the 0.83ms inference time to 2.49ms (3x expected). Fix: configure SPI DMA to fill the buffer autonomously
    in background. DMA setup: 20 cycles. Result: CPU is 100% free during I/O, inference runs at the expected
    0.83ms.'
  common_mistake: '"The SPI bus is too slow." SPI at 8 MHz can transfer 6 bytes (3 axes × 2 bytes) in
    6 µs — the bus bandwidth is not the bottleneck.'
  napkin_math: 'Without DMA: 512 samples × 156 cycles/sample = 79,872 cycles = 1.66 ms at 48 MHz. Inference
    compute: 0.83 ms. Total: 2.49 ms. Expected inference-only: 0.83 ms. Ratio: 3×. With DMA: DMA setup
    = 20 cycles. Interrupt handler = 30 cycles. Total I/O overhead: 50 cycles = 1 µs. New total: 0.83
    ms + 0.001 ms = 0.831 ms. Speedup: 3×.'
