schema_version: 1
id: tinyml-0703
title: Flash Wear from Logging Frequency
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: 'Your TinyML sensor node runs on an STM32L4 with 1 MB internal flash and a 2 MB external NOR
  flash (SPI, rated for 100,000 P/E cycles). The firmware logs inference results (32 bytes per result:
  timestamp, class, confidence, sensor readings) to a circular buffer in external flash. The device runs
  10 inferences per second, 24/7. How long until the flash wears out?'
details:
  realistic_solution: 'NOR flash has a critical constraint: writes can only flip bits from 1→0. To write
    new data, you must first erase the sector (flip all bits to 1), then write. Erase granularity for
    typical NOR flash: 4 KB sectors.'
  common_mistake: '"2 MB × 100,000 cycles = 200 GB total writes. At 32 bytes × 10/s = 320 bytes/s = 27.6
    MB/day. 200 GB / 27.6 MB = 7,246 days = 19.8 years. No problem." This ignores the NOR flash erase
    granularity — you can''t erase individual bytes; you must erase entire sectors.'
  napkin_math: 'Data writes only: 13.2 cycles/day → 20.8 years. With write-ahead log: 26.4 cycles/day
    → 10.4 years. With naive metadata pointer: 864,000 cycles/day → 2.8 hours (!). The metadata sector
    wears out 65,000× faster than the data sectors. Lesson: on flash-based systems, the hottest byte determines
    the system lifetime, not the average. Alternative: use FRAM (ferroelectric RAM, 10¹⁰ cycles) for the
    write pointer — adds $0.50 to BOM but eliminates the wear-out entirely.'
