id: tinyml-0450
title: The Predictive Maintenance TCO Dilemma
topic: federated-learning
status: draft
provenance: imported
scenario: 'You''re an Staff ML Engineer at a company deploying 10,000 smart vibration sensors for industrial
  machinery. Each sensor runs on a Cortex-M4 and needs its 256KB model updated. You must choose the most
  cost-effective data strategy over a 3-year lifetime, with a cellular data cost of $2.00/MB. Strategy
  A (Centralized): Devices upload 15KB of telemetry weekly, and download a new 256KB model monthly. Strategy
  B (Federated): Devices upload 30KB of model updates weekly, but never need to download the full 256KB
  model.'
details:
  realistic_solution: The federated approach is significantly more cost-effective. While its weekly uploads
    are larger (30KB vs 15KB), it completely avoids the monthly 256KB full model download to 10,000 devices.
    The napkin math shows this download cost is the dominant factor in the TCO calculation, making the
    federated approach the clear winner on cost.
  common_mistake: Focusing only on the data upload size per device (15KB vs 30KB) and concluding the centralized
    approach is cheaper per-week. This ignores the massive, infrequent OTA download costs of the centralized
    approach, which dominate the total cost over the product's lifetime. Engineers often forget that Total
    Cost = (Upload Cost × Frequency) + (Download Cost × Frequency).
  napkin_math: 'Strategy A per device/3yr: Upload 15KB×156wk=2,340KB + Download 256KB×36mo=9,216KB = 11,556KB=11.3MB.
    Cost: 11.3MB×$2/MB=$22.60. Fleet: 10K×$22.60=$226,000. Strategy B per device/3yr: Upload 30KB×156wk=4,680KB=4.6MB,
    no downloads. Cost: 4.6MB×$2/MB=$9.20. Fleet: 10K×$9.20=$92,000. Savings: $134K (59%). Download cost
    dominates Strategy A.'
