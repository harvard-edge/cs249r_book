title: 'The Predictive Maintenance TCO Dilemma: Federated Learning'
topic: federated-learning
status: published
provenance: imported
scenario: You are the Staff ML Systems Engineer for a manufacturing firm that has deployed 100,000 tinyML
  vibration sensors for predictive maintenance. Your team is A/B testing a new, more accurate model (Model
  B) that uses federated learning for updates. Model A currently results in $10 million annually in unpredicted
  failure costs. Model B reduces these failures by 45% (saving $4.5 million). However, Model B's updates
  increase each sensor's average continuous power draw by 15 mW. The sensors run 24/7 (8,760 hours/year)
  on industrial batteries where energy effectively costs $0.025 per Wh.
details:
  realistic_solution: The correct approach is to calculate the total annual financial impact, which is
    the sum of the savings from improved accuracy and the cost of increased power consumption.
  common_mistake: Engineers often fixate on a single metric, like the increased power draw of the new
    model, without weighing it against the economic value it generates. Another common error is miscalculating
    power costs by orders of magnitude due to unit conversion mistakes (e.g., confusing mW with W or kW)
    or failing to correctly apply the duty cycle.
  napkin_math: '## 1. Calculate Annual Energy Cost of Model B

    - Extra power per sensor: 15 mW = 0.015 W

    - Annual energy per sensor: 0.015 W × 8,760 hours = 131.4 Wh

    - Total annual energy for 100k sensors: 131.4 Wh × 100,000 = 13.14 MWh

    - Total annual energy cost: 13,140,000 Wh × $0.025/Wh = **$328,500**


    ## 2. Calculate Annual Savings

    - Gross savings from reduced failures: **$4,500,000**

    - Net TCO impact: $4,500,000 - $328,500 = **$4,171,500** net decrease in TCO.'
