schema_version: 1
id: tinyml-0446
title: The SRAM Budget Overflow
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You are a TinyML engineer tasked with shrinking a standard CNN layer for a person-detection
  model to run on a Cortex-M7 based MCU with 2MB of SRAM. The layer in question takes a 48x48x64 feature
  map as input and uses a 3x3 kernel to produce a 48x48x128 output. Your colleague suggests replacing
  it with a depthwise separable convolution. Apply this change and diagnose if it will solve the memory
  problem, assuming this layer's activations are the primary memory consumer.
details:
  realistic_solution: 'The described layer''s peak activation memory is ~432 KiB (input 144 KiB + output
    288 KiB for INT8), which fits comfortably within the 2 MB SRAM of the Cortex-M7. There is no SRAM
    overflow to solve for this specific layer. A depthwise separable convolution reduces parameters by
    8.4× (73,728 → 8,768) and FLOPs by ~8×, but does NOT reduce peak activation memory — the input and
    output tensor sizes remain identical. To actually reduce peak SRAM usage, you would need to: (1) reduce
    spatial resolution (add stride-2 or pooling before this layer), (2) reduce channel count, or (3) use
    in-place operations or operator fusion (e.g., TFLite Micro''s memory planner can reuse buffers across
    non-overlapping lifetimes).'
  common_mistake: Engineers often assume that the reduction in parameters translates directly to an identical
    reduction in peak memory usage. They forget that the total memory footprint includes not just weights,
    but also the input and output activation tensors, which can dominate SRAM on these devices. Another
    common mistake is to only calculate the parameter reduction and not the FLOPs, which impacts latency.
  napkin_math: 'Activation memory (the real constraint): Input: 48×48×64 × 1 byte (INT8) = 147,456 B =
    144 KiB. Output: 48×48×128 × 1 = 294,912 B = 288 KiB. Peak SRAM for this layer (input + output live
    simultaneously): 144 + 288 = 432 KiB. With depthwise separable: Step 1 (depthwise 3×3): input 48×48×64
    = 147,456 KiB, output 48×48×64 = 147,456 KiB. Peak = 288 KiB. Step 2 (pointwise 1×1): input 48×48×64
    = 147,456 KiB, output 48×48×128 = 294,912 KiB. Peak = 432 KiB. Peak activation memory is identical
    at 432 KiB — both exceed the 2 MB budget? No, 432 KiB fits in 2 MB. The scenario''s premise is flawed:
    this layer''s activations (432 KiB) fit easily in 2 MB SRAM. The real SRAM overflow would require
    a much larger layer or a much smaller MCU. Parameter savings (affects Flash, not SRAM): Standard:
    3×3×64×128 = 73,728. Depthwise separable: (3×3×64) + (1×1×64×128) = 576 + 8,192 = 8,768. Reduction:
    8.4×.'
