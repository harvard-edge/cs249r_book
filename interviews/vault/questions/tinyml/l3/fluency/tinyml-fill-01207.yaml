title: Optimizing ML Model Deployment on Nordic nRF5340 for Edge Inference
topic: model-format-conversion
status: published
provenance: imported
scenario: You are tasked with deploying a small convolutional neural network (CNN) for real-time anomaly
  detection on sensor data using a Nordic nRF5340 microcontroller. The model was developed in TensorFlow
  and has approximately 100,000 parameters. You've converted it to TensorFlow Lite, but during conversion
  to TFLite Micro C array, you encounter unsupported operations and a model binary size of 700 KB, with
  peak activation memory estimated at 150 KB. The nRF5340 has 256 KB SRAM and 1 MB flash memory, running
  at 128 MHz. How do you approach the conversion, operator handling, and memory optimization to successfully
  deploy this model within the nRF5340's constraints?
details:
  realistic_solution: First, identify the unsupported operations and explore quantization strategies (e.g.,
    post-training integer quantization to int8) to reduce model size and potentially enable support for
    more operations via TFLite Micro's optimized kernels. For truly unsupported operators, investigate
    custom operator implementation or architectural modifications (e.g., replacing complex ops with simpler,
    compatible ones). Utilize memory profiling tools to understand activation memory usage and optimize
    model topology or input batching. Evaluate the trade-off between model accuracy and memory/latency.
    Consider memory mapping models from flash if parts of the model can be read on demand, but prioritize
    fitting critical path elements into SRAM.
  common_mistake: Attempting direct conversion without pre-analyzing operator compatibility and memory
    footprint. Assuming floating-point precision is feasible for inference, or neglecting the impact of
    intermediate activations and buffer requirements on SRAM usage.
  napkin_math: Calculate the total memory footprint for an int8 quantized model (1 byte per parameter)
    with 100,000 parameters. Given 256 KB SRAM, how much space is left for system and stack if activations
    consume 150 KB and the int8 model parameters are loaded into SRAM? (100,000 parameters * 1 byte/param
    = 100 KB. Total SRAM needed = 100 KB (model) + 150 KB (activations) = 250 KB. Remaining SRAM = 256
    KB - 250 KB = 6 KB). This demonstrates the tight constraints and highlights the need for meticulous
    memory management.
