id: tinyml-cell-13164
title: 'TinyML TCO Fluency: Energy Harvesting vs Battery Cost Analysis'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Compare 3-year TCO for ESP32-S3 (240MHz, 512KB SRAM, 20μA deep sleep, $4) powered by: (A) solar
  harvesting (5cm² panel, 50mW peak, $3 panel + $2 PMU), (B) LiPo 2000mAh ($6 battery, needs annual replacement
  at 100μA avg). The device runs TinyML inference at 100μA avg. Quantify when energy harvesting breaks
  even.'
details:
  realistic_solution: 'Power requirement: 100μA * 3.3V = 330μW = 0.33mW. Solar panel: 50mW peak. Assuming
    indoor deployment, 200 lux: efficiency drops to 2-5% of outdoor: 50mW * 0.03 = 1.5mW. 1.5mW >> 0.33mW.
    Solar works! Option A: $4 ESP32 + $3 panel + $2 PMU + $2 supercap = $11. No battery replacement. Annual:
    $0 replacements. 3yr: $11. Option B: $4 + $6 LiPo = $10 + $6*2 replacements = $22. 3yr: $22. Solar
    saves $11 over 3yr. Break-even: immediately (solar cheaper from year 1 if outdoor deployment). Indoor
    caveat: if dark location (<50 lux): solar fails → need battery. Design rule: use solar for outdoor/window,
    battery for indoor/dark.'
  common_mistake: Assuming solar harvesting always produces enough energy without calculating whether
    the 5cm² panel at the deployed location generates sufficient power for 100μA * 3V = 300μW average
    consumption.
  napkin_math: 'Energy need: 0.33mW avg. 5cm² solar @ 100 lux: ~0.003W/cm² * 5cm² * 5% efficiency = 0.75mW.
    Enough! 3yr TCO: Solar ($11, no replacement) vs LiPo ($10+$12 replacements=$22). Solar saves $11 =
    50% cheaper. At 1000-unit deployment: savings=$11K. Development cost for solar integration (PMU design):
    $10K one-time. Net 3yr: $11K-$10K=$1K. Marginal benefit at 1K scale. At 100K units: $1.1M savings
    - $10K dev = $1.09M. Solar always wins at scale for outdoor/bright-indoor deployments. Critical: solar
    unreliable for intermittent-light scenarios (tunnels, warehouses).'
