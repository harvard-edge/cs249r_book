schema_version: 1
id: tinyml-exp2-flue-0000
title: Estimating Energy Per Inference on Nordic nRF5340
topic: power-budgeting
status: published
provenance: imported
scenario: You are deploying a predictive maintenance model on a Nordic nRF5340. The application core runs
  at 128 MHz and draws approximately 5 mA in active mode. Assuming a supply voltage of 3.0V and that the
  neural network requires 12.8 million CPU cycles to complete one inference pass, calculate the total
  energy consumed per inference. Assume the network core and BLE 5.3 radio are in a deep sleep state for
  the duration of the execution.
details:
  realistic_solution: To find the energy per inference, first determine the execution time by dividing
    the total CPU cycles by the clock frequency. Next, calculate the active power consumption using the
    standard P = I * V formula. Finally, multiply the active power by the execution time to yield the
    energy in Joules. This foundational calculation is critical for sizing coin-cell batteries in TinyML
    deployments.
  common_mistake: Candidates often confuse power and energy, calculating only the active power draw (15
    mW) but failing to multiply it by the execution time. They might also incorrectly calculate the execution
    time by misaligning the clock speed units (MHz) with the cycle count.
  napkin_math: Time = Cycles / Frequency = 12.8 * 10^6 cycles / (128 * 10^6 Hz) = 0.1 seconds. Power =
    Current * Voltage = 5 mA * 3.0 V = 15 mW. Energy = Power * Time = 15 mW * 0.1 s = 1.5 mJ per inference.
