id: tinyml-fill-01336
title: Graceful Anomaly Detection on Constrained TinyML
topic: graceful-degradation
status: published
provenance: imported
scenario: You are deploying a TinyML model for real-time anomaly detection on an ARM Cortex-M4 STM32F4
  microcontroller. This device operates at 168 MHz, has 256 KB of SRAM, and crucially, lacks a Floating
  Point Unit (FPU). The primary model, a compact CNN, requires 100 KB SRAM and averages 100k MACC operations
  per inference, taking 20ms to process a 100-sample sensor window. The system has a strict 30ms processing
  deadline for each window. Under transient thermal throttling or unexpected data spikes, available CPU
  cycles can reduce by 30% or SRAM can be restricted to 150 KB. Design a graceful degradation strategy,
  considering degradation ladders, model fallbacks, fail-safe vs. fail-operational modes, and potential
  quality-of-service shedding.
details:
  realistic_solution: 'Implement a degradation ladder:

    1.  **Level 0 (Optimal):** Full CNN model. Achieves highest accuracy and specificity.

    2.  **Level 1 (Minor Degradation):** If CPU cycles are reduced or the processing deadline is threatened
    (e.g., if current load pushes inference time close to 30ms), switch to a simpler, quantized ML model
    (e.g., a shallow MLP or a decision tree). This model should be optimized for integer arithmetic, require
    significantly less SRAM (e.g., 50 KB) and fewer MACC operations (e.g., 20k), reducing inference time
    to ~5ms. This maintains high recall for critical anomalies with slightly lower precision.

    3.  **Level 2 (Significant Degradation):** If both ML models fail to meet the deadline or SRAM is
    critically low, fall back to a simple rule-based heuristic (e.g., thresholding, rate-of-change detection).
    This uses minimal SRAM (<10 KB) and CPU cycles (<1ms), ensuring fail-operational status by detecting
    obvious, large deviations.

    4.  **Quality-of-Service Shedding:** If data spikes cause input buffer overflows, implement adaptive
    sampling (e.g., process every other sample) or reduce the dimensionality of input features to lower
    the processing burden across all degradation levels.

    5.  **Fail-Safe:** In extreme, unrecoverable situations (e.g., continuous overload, sensor failure,
    memory corruption), the system enters a fail-safe state, logging the event, activating a pre-defined
    warning mechanism (e.g., watchdog timer reset, safety relay trip), and halting non-essential operations.
    All models and logic must be designed with fixed-point or integer arithmetic from the outset to fully
    leverage the M4''s capabilities without FPU emulation overhead.'
  common_mistake: Ignoring the lack of an FPU and designing models that heavily rely on floating-point
    arithmetic, leading to significant performance penalties or incorrect calculations when emulated in
    software. Another common mistake is not accounting for the overhead of switching models or managing
    multiple states, consuming critical SRAM that might be needed for buffers or other system tasks, especially
    under memory constraints.
  napkin_math: "*   **Optimal CNN Performance:** 100k MACC operations. Given 20ms inference time on 168\
    \ MHz CPU, implies 168,000,000 cycles/s * 0.02s = 3,360,000 cycles for 100k MACC, or 33.6 cycles/MACC.\
    \ This is plausible for optimized integer arithmetic.\n*   **Deadline Check (Optimal):** 20ms inference\
    \ time < 30ms deadline. Ample buffer.\n*   **CPU Throttling Impact (30% reduction):** Effective CPU\
    \ speed = 168 MHz * 0.7 = 117.6 MHz.\n    New CNN inference time = 3,360,000 cycles / 117.6 MHz =\
    \ 28.57 ms. This is still within the 30ms deadline, but with very little buffer.\n*   **Simpler Model\
    \ (MLP/DT) Performance (Level 1):** Assume 20k MACC. Using 33.6 cycles/MACC, total cycles = 20,000\
    \ * 33.6 = 672,000 cycles.\n    Inference time (full speed): 672,000 cycles / 168 MHz = 4 ms.\n  \
    \  Inference time (throttled): 672,000 cycles / 117.6 MHz = 5.71 ms. This provides a significant buffer\
    \ for the 30ms deadline even under throttling.\n*   **SRAM Constraint (150 KB):** The CNN (100 KB)\
    \ fits. The simpler model (50 KB) also fits. The remaining SRAM (150 KB - 100 KB = 50 KB or 150 KB\
    \ - 50 KB = 100 KB) must be sufficient for OS, buffers, and other application logic. Careful memory\
    \ profiling is crucial."
