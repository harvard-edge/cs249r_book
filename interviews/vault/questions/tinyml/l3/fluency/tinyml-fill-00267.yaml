id: tinyml-fill-00267
title: Tensor Arena Planning for TinyML on Nordic nRF5340
topic: tensor-arena-planning
status: published
provenance: imported
scenario: You are developing a TinyML application for a Nordic nRF5340 microcontroller (128 MHz, 256 KB
  SRAM, 1 MB flash, BLE). Your task is to deploy a small convolutional neural network (CNN) model that
  processes sensor data. The model has several intermediate tensors and requires careful memory management.
  Describe your strategy for static memory planning, focusing on the use of flat tensor arenas, operator
  scheduling to manage peak SRAM usage, and how you would decide on flash versus SRAM placement for model
  parameters and intermediate data. Consider the nRF5340's specific memory constraints.
details:
  realistic_solution: A realistic approach involves creating a memory plan by analyzing the model's computational
    graph to identify tensor lifetimes. Implement a flat tensor arena where memory is allocated statically
    and reused across non-overlapping tensors. Optimize operator scheduling to minimize the number of
    live tensors concurrently, thereby reducing peak SRAM demand. Store read-only model weights and constant
    parameters in the 1 MB flash memory, loading them into SRAM only when actively needed or streaming
    them if the model is too large for SRAM. Intermediate mutable tensors should primarily reside in SRAM.
  common_mistake: A common mistake is to allocate memory for all tensors upfront or without considering
    their overlapping lifetimes, leading to peak SRAM requirements that exceed the device's 256 KB capacity.
    Another error is storing all model weights in SRAM, which can quickly exhaust available memory, especially
    if the model is large.
  napkin_math: If an input image tensor is 64x64x1 (uint8) and requires 4 KB, and an intermediate activation
    tensor is 32x32x16 (float32) and requires 64 KB, what is the minimum peak SRAM required for these
    two tensors if they can reuse the same memory region? Assuming an additional 10 KB for other model
    overhead, what's the remaining SRAM budget on the nRF5340?
