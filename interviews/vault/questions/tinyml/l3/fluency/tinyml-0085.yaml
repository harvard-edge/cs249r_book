schema_version: 1
id: tinyml-0085
title: Energy per Inference from Power Profile
topic: duty-cycling
status: published
provenance: imported
scenario: You're profiling a keyword spotting model on a Cortex-M4F running at 168 MHz, powered by a CR2032
  coin cell (225 mAh, 3.0V nominal). The MCU draws 0.5 µA in deep sleep, 30 mA during active inference,
  and 15 mA during MFCC feature extraction. Feature extraction takes 5ms and inference takes 18ms. The
  system wakes every 1 second to check for a keyword. Calculate the energy per wake cycle and estimate
  the battery life.
details:
  realistic_solution: 'Energy per wake cycle: MFCC extraction (15 mA x 5ms x 3.0V = 225 uJ) + inference
    (30 mA x 18ms x 3.0V = 1,620 uJ) + sleep (0.5 uA x 977ms x 3.0V = 1.5 uJ) = 1,846.5 uJ total. At 1
    cycle/sec: average power = 1,846.5 uW. Average current = 1,846.5 uW / 3.0V = 615.5 uA. Battery life:
    225 mAh / 0.6155 mA = 365.5 hours = 15.2 days. Inference dominates at ~88% of energy. To extend battery
    to 6+ months: add a hardware energy detector (comparator on microphone) that gates wake-ups to only
    when audio exceeds a threshold, reducing duty cycle to ~10%. Expected life: 152 days. Further: shrink
    model or reduce inference time.'
  common_mistake: '"30 mA × 23ms = 0.69 mA·ms per cycle. Battery: 225 mAh / 30 mA = 7.5 hours." This uses
    the peak current instead of the time-weighted average, and ignores that the MCU spends 97.7% of its
    time in deep sleep.'
  napkin_math: 'Cortex-M4F at 168 MHz, CR2032 (225 mAh, 3.0V). Energy per inference cycle: MFCC = 15 mA
    * 5 ms * 3.0V = 225 uJ (12%). Inference = 30 mA * 18 ms * 3.0V = 1,620 uJ (88%). Sleep = 0.5 uA *
    977 ms * 3.0V = 1.5 uJ (<0.1%). Total = 1,846.5 uJ/cycle. Battery energy: 225 mAh * 3.0V = 675 mWh
    = 2,430 J. At 1 cycle/s: 2,430 / 0.001846 = 1.32M cycles = 15.2 days. With energy detector gating
    (10% duty cycle): 152 days. With smaller model (8 ms inference) + gating: 225 + 720 + 1.5 = 946.5
    uJ * 10% = 94.6 uJ/s avg. Battery life: 2,430 / 0.0000946 = 25.7M s = 297 days.'
