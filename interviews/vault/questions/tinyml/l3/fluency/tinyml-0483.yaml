schema_version: 1
id: tinyml-0483
title: The Interrupt Storm
topic: collective-communication
status: draft
provenance: imported
scenario: You are a TinyML engineer building a low-power person-detection sensor using a Cortex-M7 MCU
  (480 MHz) and a grayscale camera connected via SPI. You must capture a 96x96 pixel image and run inference,
  all within a 100ms budget. You observe that during the image capture phase, the MCU's main processing
  loop becomes unresponsive and you frequently miss your 100ms deadline. A profiler shows the CPU is spending
  a huge amount of time in the SPI interrupt service routine (ISR). Given an SPI clock of 24 MHz, how
  would you solve this?
details:
  realistic_solution: The system is experiencing an "interrupt storm." For every single byte received
    from the camera, the SPI peripheral triggers a CPU interrupt. The overhead of entering and exiting
    the ISR thousands of times per frame consumes all the available CPU cycles, preventing any useful
    work from being done in parallel and causing the deadline miss.
  common_mistake: Blaming the raw hardware specs. Engineers often assume the bottleneck is the bus bandwidth
    (SPI clock speed) or the MCU's processing power (MHz) rather than the data transfer architecture.
    They might suggest a faster MCU or faster bus, when the real problem is the inefficient, CPU-intensive
    method of data movement.
  napkin_math: 'Image: 96x96x1 = 9216B. SPI@24MHz = 3MB/s. Transfer: 9216/3M = 3.1ms. Byte-by-byte ISR:
    9216 interrupts. ISR overhead ~140 cycles each on M7@480MHz: 9216*140/480M = 2.7ms CPU stalled. Fix:
    use DMA — single setup, zero ISR during transfer. CPU free for 3ms to run other tasks.'
