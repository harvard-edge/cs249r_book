id: tinyml-exp-flue-0087
title: Inference Latency and Energy on Nordic nRF5340
topic: compute-cost-estimation
status: published
provenance: imported
scenario: You are deploying a continuous keyword spotting model on a Nordic nRF5340 microcontroller. The
  model requires 2.5 million operations (MOPs) per inference. The nRF5340 application core runs at 128
  MHz and draws ~5mA active current at 3.0V. Assuming an average CPI (Cycles Per Instruction) of 1.5 for
  the model's workload, estimate the inference latency in milliseconds and the energy consumed per inference
  in millijoules.
details:
  realistic_solution: First, calculate the total clock cycles required by multiplying the total operations
    by the CPI. Next, calculate the inference latency by dividing the total cycles by the application
    core's clock frequency (128 MHz). Finally, calculate the power consumption (Voltage × Current) and
    multiply it by the latency to determine the energy per inference.
  common_mistake: Candidates often assume an ideal CPI of 1.0 instead of factoring in memory access and
    pipeline stalls, or they divide the clock speed by the MOPs incorrectly. They also frequently forget
    to convert current and voltage into power before multiplying by latency to get energy.
  napkin_math: Total cycles = 2.5 MOPs * 1.5 CPI = 3.75 million cycles. Latency = 3.75M cycles / 128 MHz
    = 0.0293 seconds (~29.3 ms). Power = 3.0V * 5mA = 15 mW. Energy per inference = 15 mW * 0.0293 s =
    0.4395 mJ.
