id: tinyml-0161
title: The Unviable Harvester
topic: duty-cycling
status: published
provenance: imported
scenario: You are designing an always-on sensor for a smart home. Your system's average power consumption
  is calculated to be 1.5 mW. To power it, you've selected a small indoor solar cell that can generate
  150 µW under typical room lighting. Identify the fundamental viability of this design.
details:
  realistic_solution: The design is not viable. The solar cell generates only 150 µW (or 0.15 mW), which
    is an order of magnitude less than the 1.5 mW required by the system. The battery will inevitably
    drain, and the device will shut down.
  common_mistake: A common mistake is to believe a battery can solve a fundamental power deficit. A rechargeable
    battery can only smooth out peaks and troughs in demand; it cannot create energy. If the average power
    generated is less than the average power consumed, the system is not sustainable and will eventually
    fail.
  napkin_math: Power Required = 1.5 mW | Power Supplied = 150 µW = 0.15 mW | Ratio = Power Required /
    Power Supplied = 1.5 / 0.15 = 10 | The system requires 10x more power than the harvester can provide.
