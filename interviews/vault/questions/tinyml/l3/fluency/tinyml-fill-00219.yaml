id: tinyml-fill-00219
title: 'TinyML Model Deployment: nRF5340 Memory Hierarchy Optimization'
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You are tasked with deploying a machine learning model for a real-time anomaly detection application
  onto a Nordic nRF5340 microcontroller. The nRF5340 features a 128 MHz ARM Cortex-M33 application core,
  256 KB of SRAM, and 1 MB of flash memory. The trained model (weights and biases) is 700 KB, and the
  input feature buffer requires an additional 50 KB. The application needs to perform inferences at a
  rate of 10 Hz. Explain how you would manage the model and data placement across the nRF5340's memory
  hierarchy to meet the real-time constraints, considering capacity, bandwidth, and latency tradeoffs.
  Provide napkin math to justify your decisions regarding memory access times and processing capacity.
details:
  realistic_solution: A realistic solution would involve careful memory segmentation. The bulk of the
    model (weights/biases) that exceeds SRAM capacity would reside in flash. Critical, frequently accessed
    layers or lookup tables might be explicitly loaded or copied into SRAM at runtime, or directly executed
    from flash if the access pattern is sequential and predictable. Intermediate activation buffers and
    the input feature buffer (50 KB) must fit within SRAM. For the 700 KB model, dynamic loading of layers
    or using a framework that supports in-place flash execution (e.g., TensorFlow Lite Micro with 'OpData'
    in flash) would be crucial. Techniques like quantization (e.g., 8-bit integers) should be explored
    to reduce the model size further, potentially allowing more of it to reside in SRAM. The 10 Hz inference
    rate implies strict latency budgets, requiring minimal flash read overhead during the critical inference
    path.
  common_mistake: A common mistake is to solely focus on fitting the model into flash without considering
    the implications of frequent flash accesses on latency and power consumption for inference. Overlooking
    the limited SRAM for runtime data and stack, or not explicitly mapping parts of the model to SRAM/flash
    based on access patterns, are also frequent pitfalls. Another mistake is to neglect the instruction
    fetch impact from flash if the model's core inference loop resides there.
  napkin_math: "Given a 128 MHz core, a single clock cycle is roughly 1/128,000,000 ≈ 7.8 ns. \n\n**SRAM\
    \ Access:** Assuming 1-2 cycles for SRAM access, this is effectively instantaneous for most operations\
    \ (approx. 7.8 - 15.6 ns per access). \n\n**Flash Access:** Flash memory typically has much higher\
    \ read latencies, often in the order of tens or hundreds of nanoseconds per word/byte access, depending\
    \ on the flash controller and caching. Let's assume a conservative average of 50 ns per word (4 bytes)\
    \ access for reading data from flash, or 12.5 ns/byte. To load a 10 KB chunk of model data from flash\
    \ into SRAM (if not executing in place) would take (10,240 bytes / 4 bytes/word) * 50 ns/word = 2,560\
    \ * 50 ns = 128,000 ns = 0.128 ms. \n\n**Inference Budget:** For a 10 Hz inference rate, each inference\
    \ must complete within 100 ms. If a substantial part of the model (say, 500 KB) needs to be read from\
    \ flash during inference, and assuming an average read speed of 12.5 ns/byte, this would take 500,000\
    \ bytes * 12.5 ns/byte = 6,250,000 ns = 6.25 ms. This 6.25 ms is for data transfer alone, not computation.\
    \ While this might seem acceptable within a 100 ms budget, it's a significant overhead that needs\
    \ to be minimized. If the model is executed directly from flash, instruction fetch latency becomes\
    \ a concern, which could add stalls. Therefore, carefully mapping hot code paths and data to SRAM\
    \ is paramount."
