schema_version: 1
id: tinyml-0000
title: The Firmware Brick
topic: ota-firmware-updates
status: published
provenance: imported
scenario: Your TinyML device is performing a field update. The power is accidentally disconnected halfway
  through the write. Upon reboot, the device is completely 'bricked' and won't даже start the bootloader.
  Based on the memory map, why did your update process fail so catastrophically?
details:
  realistic_solution: 'The flaw is **writing directly to the active application region**. By erasing the
    old firmware to make room for the new one, you leave the device with no valid executable if interrupted.
    The fix is **A/B Partitioning (Dual-Bank)**: use the 508 KB of free space as a staging area. Download
    the update there, validate the checksum, and only then tell the bootloader to swap the active partition.'
  common_mistake: '"The CRC check catches corruption." The CRC check runs *after* the write completes.
    If power is lost during the write, the check never runs.'
  napkin_math: In-place updates have a 0% recovery rate from mid-write power loss. A/B partitioning has
    a 100% recovery rate, as the 'old' valid firmware is never touched until the 'new' one is proven safe.
