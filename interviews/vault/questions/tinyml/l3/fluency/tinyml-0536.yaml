schema_version: 1
id: tinyml-0536
title: The 'RDMA over SPI' Fallacy
topic: collective-communication
status: draft
provenance: imported
scenario: You are the senior engineer on a TinyML project building a real-time vibration monitoring system.
  The system uses a network of Cortex-M4 microcontrollers that share 1KB feature vectors with an aggregator
  node over a 10 Mbps SPI bus. A junior engineer, fresh from a cloud computing team, is concerned about
  communication latency. They propose implementing a 'zero-copy RDMA-like mechanism over SPI' to speed
  up transfers, drawing an analogy to InfiniBand in HPC clusters. You suspect their reasoning is flawed.
details:
  realistic_solution: The proposed solution is misguided because the bottleneck is not the SPI bus transfer;
    it's the microcontroller's own processing time. The 'RDMA over SPI' analogy is flawed because SPI
    is a simple master-slave serial protocol, and microcontrollers lack the sophisticated network interface
    card (NIC) hardware required for true remote direct memory access (RDMA) offload. The CPU is heavily
    involved in every byte transfer.
  common_mistake: Engineers often misapply patterns from one domain (cloud) to another (embedded) without
    respecting the orders-of-magnitude shift in hardware capabilities. The junior engineer correctly identifies
    that data transfer can be a bottleneck in large-scale systems but fails to calculate whether it's
    the actual bottleneck in this constrained environment. They focus on optimizing the wrong part of
    the system.
  napkin_math: 'SPI transfer 1KB: 1024×8/10Mbps=0.82ms. M4 inference: ~50ms. Comm is 1.6% of total time.
    Even 10× faster SPI saves 0.74ms=1.5% improvement. RDMA needs NIC+DMA engine+memory mapping—none on
    MCU. SPI is simple serial peripheral. CPU processes each byte. Wrong bottleneck; compute dominates
    61:1.'
