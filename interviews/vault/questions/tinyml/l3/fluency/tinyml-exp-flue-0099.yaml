schema_version: 1
id: tinyml-exp-flue-0099
title: Layer Fusion for SRAM Peak Memory Reduction
topic: operator-scheduling
status: published
provenance: imported
scenario: You are deploying a keyword spotting CNN on an ESP32-S3 (240 MHz dual-core Xtensa, 512 KB SRAM,
  8 MB PSRAM, vector extensions for INT8). A critical model block consists of a Conv1D layer followed
  directly by a MaxPool1D layer. The input tensor is 100 KB and the INT8 Conv1D weights take up 150 KB.
  The Conv1D produces a 300 KB intermediate tensor, which the MaxPool1D downsamples to a 100 KB final
  output tensor. Calculate the peak memory footprint for standard sequential scheduling versus fused operator
  scheduling, and determine whether they fit entirely within the fast SRAM.
details:
  realistic_solution: By applying layer fusion (depth-first tile scheduling), we compute the Conv1D and
    MaxPool1D simultaneously in chunks. This completely avoids materializing the massive intermediate
    tensor. Instead, we allocate a small intermediate tile buffer, keeping the total memory footprint
    securely within the 512 KB SRAM limit and ensuring maximum throughput on the Xtensa cores.
  common_mistake: Candidates often assume the 8 MB PSRAM operates at the same speed as SRAM and fail to
    realize that spilling over the 512 KB SRAM limit will bottleneck the INT8 vector extensions. They
    also frequently forget to include the static weight memory in the peak working memory calculation.
  napkin_math: 'Formula: Peak Memory = Input Size + Weight Size + Active Output Size (+ Tile Buffer if
    fused)


    Unfused Peak Memory (during Conv1D):

    = 100 KB (Input) + 150 KB (Weights) + 300 KB (Conv1D Output)

    = 550 KB

    Result: 550 KB > 512 KB (Spills to slower PSRAM)


    Fused Peak Memory:

    = 100 KB (Input) + 150 KB (Weights) + 100 KB (Final MaxPool Output) + ~10 KB (SRAM Tile Buffer)

    = 360 KB

    Result: 360 KB < 512 KB (Fits entirely in fast SRAM, saving 190 KB of peak memory)'
