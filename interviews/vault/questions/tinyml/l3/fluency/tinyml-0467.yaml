title: The Federated Thermostat A/B Test
topic: federated-learning
status: published
provenance: imported
scenario: You are the Staff Engineer for a fleet of 1 million smart thermostats. You are A/B testing a
  new Federated Learning (FL) feature to reduce false 'heating required' events. The test shows the FL
  model saves users $200,000/month in energy costs and saves the company $50,000/month in reduced support
  tickets. However, running the FL aggregation server infrastructure costs $20,000/month. What is the
  economic impact of this feature?
details:
  realistic_solution: 'The FL feature provides a significant positive economic impact. The solution requires
    aggregating benefits from two different domains: direct user cost savings (less wasted electricity)
    and company cost savings (fewer support tickets). These benefits far outweigh the direct cost of the
    FL server infrastructure.'
  common_mistake: Focusing only on the most obvious first-order costs (like cloud server bills) while
    ignoring the much larger second-order economic impacts (like customer energy savings and reduced support
    load). Another mistake is getting lost in negligible costs like the per-device energy use for FL training,
    which is trivial compared to the benefits.
  napkin_math: 1. **Calculate User Savings:** $200,000/month. 2. **Calculate Company Savings:** $50,000/month
    support ticket reduction. 3. **Calculate Costs:** $20,000/month server costs. 4. **Net Impact:** ($200,000
    + $50,000) - $20,000 = $230,000/month net benefit.
