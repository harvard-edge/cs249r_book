schema_version: 1
id: tinyml-0414
title: Bootloader A/B Partition Sizing
topic: ota-firmware-updates
status: published
provenance: imported
scenario: You're designing the flash layout for an nRF5340 that runs a keyword spotting model and receives
  OTA updates over BLE. How does the model's size and the runtime's memory requirements together determine
  the A/B partition layout, and why do delta updates that only patch the model weights fundamentally change
  your flash geometry?
details:
  realistic_solution: In TinyML, the model weights (e.g., 180 KB) often dwarf the application code (90
    KB) and the TFLite Micro runtime (25 KB). If you use a naive 50/50 A/B partition scheme, each slot
    must be at least 295 KB. You are copying the entire OS and runtime every time you just want to tweak
    a threshold in the model.
  common_mistake: '"Just split flash 50/50 — 512 KB per slot." This ignores that the model is often the
    largest component of the firmware, and treating it as an inseparable part of the OS wastes massive
    amounts of flash.'
  napkin_math: 'Naive A/B: (90 + 25 + 180) = 295 KB per slot. Total flash used for OTA: 590 KB. Decoupled
    with delta updates: Firmware A (115 KB) + Firmware B (115 KB) + Model (180 KB) + Patch Scratch (32
    KB) = 442 KB. You just saved 148 KB of flash (15% of the entire 1 MB chip) simply by recognizing that
    ML models update independently of the OS and can be patched differentially.'
