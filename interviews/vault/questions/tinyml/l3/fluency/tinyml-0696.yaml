id: tinyml-0696
title: The Flat Memory Reality
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: A junior engineer on your team says they'll use `malloc` to dynamically allocate activation
  buffers during inference on a Cortex-M4. Why do you stop them?
details:
  realistic_solution: On a bare-metal MCU with 256 KB of SRAM, there is no virtual memory and no MMU.
    Dynamic allocation causes heap fragmentation in a fixed-size memory pool. After a few hundred inference
    cycles, `malloc` returns NULL — not because you're out of total memory, but because the free space
    is scattered into unusable fragments. TFLite Micro solves this by requiring a single, pre-allocated
    flat tensor arena. All activations, scratch buffers, and intermediate tensors are placed at compile-time
    offsets within this arena. Zero fragmentation, deterministic memory usage, and you know at build time
    whether the model fits.
  common_mistake: '"Malloc is just slow on microcontrollers." Speed isn''t the primary concern — the failure
    mode is far worse.'
  napkin_math: 'A Cortex-M4 with 256 KB SRAM must hold: firmware (~40 KB), stack (~8 KB), tensor arena
    (~200 KB). This leaves only 8 KB of unallocated free space. If `malloc` fragments even 10% of the
    arena into gaps smaller than the largest activation buffer, inference fails—even if mathematically
    there might be enough fragmented bytes available.'
