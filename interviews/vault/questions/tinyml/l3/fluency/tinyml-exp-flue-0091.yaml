schema_version: 1
id: tinyml-exp-flue-0091
title: ESP32-S3 Low-Battery Model Fallback
topic: graceful-degradation
status: published
provenance: imported
scenario: Your smart doorbell on an ESP32-S3 (240 MHz dual-core, 512 KB SRAM, 8 MB PSRAM) runs a primary
  INT8 face detection model that requires 12 million MAC operations per frame. During a low-battery event,
  the system must gracefully degrade to a lightweight presence detection model requiring only 1.2 million
  MACs to shed power load. Assuming the ESP32-S3's vector extensions execute 2 INT8 MACs per clock cycle,
  calculate the exact inference latency in milliseconds for both models and the time saved per frame.
details:
  realistic_solution: 'The correct approach applies the standard latency formula: Latency = Total MACs
    / (MACs per cycle * Clock Frequency). By dividing the MACs by the hardware throughput and the 240
    MHz clock speed, we find the baseline and degraded latencies. This quality-of-service shedding ensures
    the device continues to provide core value (presence detection) while extending battery life.'
  common_mistake: Candidates often forget to account for the vector extensions' throughput (2 MACs per
    cycle) or mix up the clock speed conversion from MHz to Hz, leading to latency estimates that are
    off by a factor of 2 or 1000.
  napkin_math: 'Primary Model: 12,000,000 MACs / 2 MACs/cycle = 6,000,000 cycles. Latency = 6,000,000
    cycles / 240,000,000 Hz = 0.025 seconds (25 ms).

    Fallback Model: 1,200,000 MACs / 2 MACs/cycle = 600,000 cycles. Latency = 600,000 cycles / 240,000,000
    Hz = 0.0025 seconds (2.5 ms).

    Time saved per frame = 25 ms - 2.5 ms = 22.5 ms.'
