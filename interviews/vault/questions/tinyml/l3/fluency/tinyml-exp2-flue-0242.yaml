id: tinyml-exp2-flue-0242
title: Estimating Inference Latency and Energy on nRF5340
topic: compute-cost-estimation
status: published
provenance: imported
scenario: We are deploying a keyword spotting model on a Nordic nRF5340 microcontroller for a battery-powered
  wearable. The model requires 2.5 million multiply-accumulate (MAC) operations per inference. The nRF5340's
  application core runs at 128 MHz and can execute one MAC per clock cycle, with an estimated 20% overhead
  for memory access. Calculate the expected latency for a single inference and the active energy consumed
  if the system draws ~5mA at 3.0V.
details:
  realistic_solution: The correct approach calculates the total clock cycles required for the MAC operations
    plus the memory overhead. Then, using the 128 MHz clock speed of the nRF5340 application core, the
    candidate finds the inference latency. Finally, the energy per inference is derived by multiplying
    the power consumption (voltage times current) by the inference latency.
  common_mistake: Candidates often forget to account for the clock speed of the specific core (128 MHz
    for the app core, not the 64 MHz net core) or neglect the 20% memory access overhead. They also frequently
    fail to calculate the actual energy in Joules, stopping only at the active current.
  napkin_math: 1. Total cycles = 2.5M MACs * 1 cycle/MAC * 1.2 (overhead) = 3,000,000 cycles. 2. Latency
    = 3,000,000 cycles / 128,000,000 cycles/sec = 0.0234375 seconds (~23.4 ms). 3. Power = 5mA * 3.0V
    = 15mW = 0.015 W. 4. Energy = Power * Latency = 0.015 W * 0.0234375 s = 0.0003515 Joules (~351.6 uJ).
