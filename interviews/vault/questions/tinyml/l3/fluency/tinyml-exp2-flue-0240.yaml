id: tinyml-exp2-flue-0240
title: ESP32-S3 Vector Extension Speedup
topic: accelerator-comparison
status: published
provenance: imported
scenario: You are deploying an audio keyword spotting model on an ESP32-S3, which features a 240 MHz dual-core
  Xtensa processor and 512 KB SRAM. To leave one core free for WiFi/BLE communication, inference is pinned
  to a single core. The model requires 4.8 million INT8 MAC operations per inference. Calculate the theoretical
  minimum inference latency using standard scalar instructions (1 MAC per cycle) versus the specialized
  INT8 vector extensions (16 MACs per cycle).
details:
  realistic_solution: The candidate should calculate the total cycles required for both scalar and vector
    execution, then divide by the 240 MHz clock frequency to find the time in seconds. Using the INT8
    vector extensions provides a 16x theoretical speedup over scalar execution. While real-world latency
    will be bottlenecked by memory access to the 512 KB SRAM or 8 MB PSRAM, calculating this theoretical
    minimum is essential for determining if the ESP32-S3's hardware acceleration can meet a strict latency
    budget.
  common_mistake: Candidates often forget to account for the 240 MHz clock speed when converting cycles
    to milliseconds, or they mistakenly divide the workload across both cores despite the problem specifying
    single-core execution. Another common error is ignoring the INT8 specification and assuming floating-point
    math.
  napkin_math: 'Standard Execution: 4,800,000 MACs / 1 MAC per cycle = 4,800,000 cycles. Latency = 4,800,000
    cycles / 240,000,000 cycles/sec = 0.02 seconds (20 ms). Vector Execution: 4,800,000 MACs / 16 MACs
    per cycle = 300,000 cycles. Latency = 300,000 cycles / 240,000,000 cycles/sec = 0.00125 seconds (1.25
    ms).'
