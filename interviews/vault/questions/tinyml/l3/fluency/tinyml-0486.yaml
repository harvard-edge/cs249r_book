schema_version: 1
id: tinyml-0486
title: The TinyML Latency Crisis
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You are a TinyML engineer optimizing a keyword-spotting model for a Cortex-M4 based device.
  The model misses its hard 100ms inference deadline, currently taking 120ms. A profiler shows that a
  single standard 3x3 convolution layer is the bottleneck, consuming 90ms of the total time. The layer's
  input feature map is 14x14 with 64 channels, and it produces an output with 128 channels. You propose
  replacing this layer with a 3x3 depthwise separable convolution. Demonstrate, by applying the appropriate
  scaling rule for computation, whether this change is sufficient to meet the deadline.
details:
  realistic_solution: 'The solution is to calculate the computational reduction factor and apply it to
    the bottleneck latency. A standard convolution''s FLOPs are proportional to `Cin * Cout`, while a
    depthwise separable convolution''s are proportional to `Cin + Cout`, creating a massive reduction.

    1. **Calculate Reduction:** The computational savings are approximately `(K^2 * Cout) / (K^2 + Cout)`.
    For a 3x3 kernel (K=3) and 128 output channels, this is `(9 * 128) / (9 + 128)` = `1152 / 137` ≈ 8.4x.

    2. **Calculate New Latency:** The bottleneck latency of 90ms is reduced by this factor: `90ms / 8.4`
    ≈ 10.7ms.

    3. **Calculate New Total Time:** The rest of the network took `120ms - 90ms = 30ms`. The new total
    inference time is `30ms + 10.7ms` = `40.7ms`.

    4. **Conclusion:** At ~41ms, the new latency is well within the 100ms budget. The change is sufficient.'
  common_mistake: Engineers often remember that depthwise separable convolutions are 'more efficient'
    but fail to quantify *how much* more efficient. They either miscalculate the FLOPs reduction (e.g.,
    forgetting the pointwise part) or incorrectly assume the bottleneck is memory bandwidth when the profiler
    clearly indicates a compute-bound layer. On a device as constrained as a Cortex-M4, a single expensive
    layer can easily dominate the entire latency budget.
  napkin_math: Standard conv MACs = K^2*Cin*Cout*H*W = 9*64*128*14*14 = 14,450,688. DW+PW = (9*64*196)
    + (64*128*196) = 112,896 + 1,605,632 = 1,718,528. Reduction = 14.45M/1.72M = 8.4x. New bottleneck
    = 90/8.4 = 10.7ms. Total = 30+10.7 = 40.7ms << 100ms deadline. Yes, sufficient.
