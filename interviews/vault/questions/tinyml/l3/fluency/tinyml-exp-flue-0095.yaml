schema_version: 1
id: tinyml-exp-flue-0095
title: SRAM Capacity Limits on Corstone-300
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You are deploying a vision model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform, which
  features a shared 512 KB SRAM running at 480 MHz. A critical convolutional layer requires processing
  an int8 input feature map of 128x128x16 into an int8 output feature map of 128x128x16, using 32 KB of
  weights. Assuming the U55 NPU requires both full activation buffers and the weights to be resident in
  SRAM simultaneously without tiling, calculate the remaining SRAM available for the Cortex-M7's RTOS.
details:
  realistic_solution: The correct approach is to calculate the sum of input, output, and weight memory
    footprints, realizing it totals 544 KB and thus exceeds the 512 KB limit. The candidate should then
    identify that standard execution is impossible and propose leveraging the Ethos-U55's native support
    for hardware feature map tiling (block-based processing) to reduce the peak SRAM working memory requirement.
  common_mistake: Candidates often miscalculate the buffer sizes by forgetting the channel depth or data
    type size (int8 = 1 byte). They also frequently fail to recognize that the total memory requirement
    strictly exceeds the 512 KB physical limit of the hardware, missing the trick of the question.
  napkin_math: 'Input Activations: 128 * 128 * 16 channels * 1 byte = 262,144 bytes (256 KB).

    Output Activations: 128 * 128 * 16 channels * 1 byte = 262,144 bytes (256 KB).

    Weights: 32 KB.

    Total Memory Required: 256 KB + 256 KB + 32 KB = 544 KB.

    Remaining SRAM: 512 KB (Platform Spec) - 544 KB = -32 KB (Exceeds capacity by 32 KB).'
