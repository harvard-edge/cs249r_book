schema_version: 1
id: tinyml-0054
title: Model Versioning on MCU
topic: ota-firmware-updates
status: published
provenance: imported
scenario: You manage a fleet of 500 RP2040-based (Cortex-M0+, 264 KB SRAM, 2 MB flash) environmental sensors.
  After three OTA updates, your support team can't tell which model version a device is running. A customer
  reports false alarms, and you need to know if they're on model v1.2 or v1.4. How do you track model
  versions on a device with no OS and no filesystem?
details:
  realistic_solution: 'Prepend a 64-byte structured header to the model binary in flash: magic bytes (4B),
    model version (semver, 12B), SHA-256 hash of weights (32B), input/output tensor specs (8B), training
    timestamp (8B). At boot, the bootloader reads and validates this header in <3ms. For remote queries:
    expose version via a BLE GATT characteristic (20-byte response, single packet, <10ms). Fleet management:
    the gateway aggregates version reports and flags mismatches. Header overhead: 64 / 2,097,152 bytes
    of flash = 0.003%. This decouples model versioning from firmware versioning — you can update models
    independently.'
  common_mistake: '"Store the version in a global variable in firmware." This ties the model version to
    the firmware version — if you update only the model (not the firmware), the version string is stale.
    Worse, a global variable lives in SRAM and is lost on reset.'
  napkin_math: 'Header overhead: 64 bytes per model. On 2 MB flash: 64 / 2,097,152 = 0.003% — negligible.
    Boot-time header validation: read 64 bytes from flash (64 / 4 bytes per read × 2 cycles = 32 cycles)
    + CRC check of 114 KB model (114,000 × 3 cycles = 342,000 cycles at 133 MHz = 2.6 ms). Total boot
    overhead: **< 3 ms**. BLE version query: 20 bytes response, single BLE packet, < 10 ms round-trip.'
