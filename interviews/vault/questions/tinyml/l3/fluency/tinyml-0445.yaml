schema_version: 1
id: tinyml-0445
title: The Tensor Arena Hard Fault
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: 'You are optimizing an anomaly detection model for a Cortex-M7 with 512KB of SRAM. To maintain
  accuracy on a critical classification layer, your team decided to use mixed precision: the bulk of the
  model is INT8, but the final layer is kept as FP32. The model fits in Flash, but during inference, the
  device hard-faults. Your memory profiler reports a peak Tensor Arena usage of 1.1MB, far exceeding the
  512KB SRAM. You diagnose that the peak occurs when the 280KB INT8 output tensor of the penultimate layer
  is de-quantized to be used as input for the final FP32 layer. How do you solve this SRAM overflow?'
details:
  realistic_solution: The problem is the massive temporary tensor created during the de-quantization step.
    The 280KB INT8 tensor becomes 4x larger when converted to FP32, resulting in a temporary allocation
    of 1.12MB which overflows the SRAM. The most direct solution is to eliminate this de-quantization
    step. This means the final layer must also be quantized to INT8. Since this layer is sensitive, a
    simple post-training quantization may hurt accuracy too much. The correct approach is to use a more
    advanced quantization technique for this specific layer, such as Quantization-Aware Training (QAT)
    or per-channel quantization, to convert it to INT8 while recovering the lost accuracy. This avoids
    the memory explosion and allows the model to run within the SRAM budget.
  common_mistake: A common reaction is to try to shrink the model weights further using pruning or other
    compression techniques. This is incorrect because the problem isn't the model's storage size (Flash),
    but its runtime activation memory (SRAM). Another mistake is to blame the hardware and request a chip
    with more SRAM, which is often not an option.
  napkin_math: 'The penultimate layer''s output is an INT8 tensor of size 280 KB. The final layer requires
    an FP32 input. The runtime must de-quantize the tensor. The size of the temporary FP32 tensor is calculated
    by the change in data type precision: `280 KB * (sizeof(FP32) / sizeof(INT8)) = 280 KB * (4 bytes
    / 1 byte) = 1,120 KB`. This 1.12MB tensor must be allocated in the Tensor Arena. Since `1,120 KB >
    512 KB`, an out-of-memory hard fault occurs. By quantizing the final layer to INT8, the input tensor
    remains 280 KB, and the peak memory usage is drastically reduced, fitting within the 512 KB limit.'
