id: tinyml-0525
title: The Federated Wake-Word TCO
topic: federated-learning
status: published
provenance: imported
scenario: 'You''re the ML Systems Engineer for a company that has deployed 1 million smart speakers using
  a Cortex-M4 MCU. The wake-word model incorrectly activates 5 times per day on each device. To improve
  the model, you are evaluating the energy TCO of two data collection strategies over one year: 1) Centralized:
  upload 1 second of audio per event over Wi-Fi (1W power draw). 2) Federated: train on-device using the
  MCU (50mW power draw) for 10 seconds per event.'
details:
  realistic_solution: The primary driver is the large power difference between the Wi-Fi radio and the
    MCU. The Wi-Fi module's power consumption (1W = 1000mW) is 20 times higher than the MCU's (50mW).
    Even though the on-device training takes 10 times longer, its total energy consumption per event is
    actually half that of the upload. This difference, when scaled to a million devices over a year, becomes
    the dominant factor in the energy TCO, demonstrating that networking is often far more expensive than
    compute in energy-constrained systems.
  common_mistake: Engineers often focus only on the *duration* of an operation (10s vs 1s) and ignore
    the orders-of-magnitude difference in *power draw* between components like the MCU and the radio.
    They might also underestimate how small, per-device costs aggregate into significant costs at fleet
    scale, or fixate on cloud data costs instead of the device-side energy physics.
  napkin_math: '5 events/day*365*1M=1.825B events/yr. Centralized: 1W WiFi*1s=1J/event. Total=1.825GJ=507
    kWh@$0.12=$60.84. Federated: 50mW*10s=0.5J/event. Total=912MJ=253 kWh=$30.36. FL 2x cheaper despite
    10x longer compute. WiFi (1W) is 20x more power-hungry than MCU (50mW). Data: 1MB vs 50KB=20x less
    BW too.'
