id: tinyml-0417
title: Interrupt Overhead Impact on Inference
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'Your TinyML device on a Cortex-M4F (168 MHz) runs a keyword spotting model (18ms inference)
  while simultaneously handling: a UART interrupt for debug logging (115200 baud, fires every 87 µs per
  byte, 50 bytes/s average), a SysTick interrupt for the RTOS scheduler (1 kHz = every 1ms), and a DMA-complete
  interrupt for audio capture (every 64ms). Each interrupt has overhead: UART ISR = 2 µs, SysTick = 5
  µs, DMA = 10 µs. Calculate the total interrupt overhead during one inference and determine if it affects
  the 33ms deadline.'
details:
  realistic_solution: 'Total interrupt overhead during 18ms inference: SysTick = 18 fires * 5us = 90us,
    UART = ~1 byte * 2us = 2us, DMA = 0-1 fires * 10us ~ 6us average. Total: ~98us = 0.54% of inference
    time. The 33ms deadline is safe with 15ms of headroom. SysTick dominates at 92% of interrupt overhead.
    However, the real danger is not the ISR execution time but the pipeline flush and register save/restore
    on each interrupt entry (12 cycles each way on M4F). At 1,050 interrupts/s * ~5us average, the system
    stays safely under the 1% CPU rule of thumb.'
  common_mistake: '"Interrupts are fast (microseconds) so they don''t matter." Each interrupt not only
    takes time to execute but also causes pipeline flushes, cache pollution (on M7), and context save/restore
    overhead. On a Cortex-M4F, the hardware saves 8 registers (32 bytes) on interrupt entry and restores
    them on exit — this takes 12 cycles each way.'
  napkin_math: 'Total interrupt overhead during 18ms inference: 98 µs (0.54%). SysTick dominates: 90 µs
    / 98 µs = 92% of interrupt overhead. If SysTick is unnecessary during inference (no RTOS scheduling
    needed): disable it, saving 90 µs. Remaining overhead: 8 µs (0.04%). Rule of thumb for Cortex-M: interrupt
    overhead is negligible (<1%) if total ISR frequency × average ISR duration < 10,000 µs/s (1% CPU).
    Your system: 1,050 interrupts/s × ~5 µs avg = 5,250 µs/s = 0.53%. Safe. Danger threshold: >50,000
    µs/s (5% CPU) — this happens with poorly written ISRs or very high-frequency sensors without DMA.'
