id: tinyml-0470
title: The Battery-Powered A/B Test
topic: ota-firmware-updates
status: published
provenance: imported
scenario: 'You are a TinyML engineer for a company building a battery-powered smart doorbell that uses
  a small keyword-spotting model. The marketing team wants to A/B test a new wake-word, requiring monthly
  model updates to a fleet of 1 million devices. You must choose the update strategy with the lowest Total
  Cost of Ownership (TCO), where TCO is dominated by user-visible battery life. Option A (OTA Update):
  Download a 500KB new model over WiFi. Option B (Federated Fine-Tuning): Download a 20KB gradient update
  over WiFi, then run 15 seconds of on-device training at 100% CPU. Which option maximizes battery life?'
details:
  realistic_solution: The correct approach is to calculate the total energy (in Joules) for each option
    by multiplying the power of each component by the time it is active.
  common_mistake: Engineers accustomed to cloud or edge systems often focus on the volume of data transferred
    (500KB vs 20KB) or the raw duration of the compute task. They underestimate the massive power cost
    of radio transmission in a battery-powered device. They might incorrectly assume that 15 seconds of
    100% CPU is more 'expensive' than a 'quick' download, failing to multiply time by the correct power
    draw for each component.
  napkin_math: 'OTA: WiFi at ~1Mbps, 500KB = 4Mb. Download = 4s. WiFi power ~250mW. Energy = 250mW*4s
    = 1.0J. FL: 20KB download = 0.16Mb/1Mbps = 0.16s. WiFi energy = 250mW*0.16s = 0.04J. Training: MCU
    at 50mW for 15s = 0.75J. FL total = 0.04+0.75 = 0.79J. OTA = 1.0J. FL saves 21% energy per update.
    OTA is simpler but FL is slightly more efficient.'
