schema_version: 1
id: tinyml-exp-flue-0089
title: DMA Cycle Stealing Overhead on STM32F4
topic: dma-data-movement
status: published
provenance: imported
scenario: You are deploying an INT8 vision model on an ARM Cortex-M4 (STM32F4) running at 168 MHz with
  256 KB SRAM. A camera sensor feeds 96x96 grayscale images (1 byte per pixel) into the SRAM via DMA at
  10 frames per second. The CPU processes these images using CMSIS-NN SIMD instructions, which can execute
  2x INT8 MACs/cycle. Calculate the DMA bandwidth required and quantify the CPU cycle stealing overhead
  per frame, assuming each DMA byte transfer stalls the CPU for one clock cycle due to SRAM bus contention.
details:
  realistic_solution: While DMA offloads the instruction execution required to move data, it still consumes
    memory bus bandwidth. The correct approach is to quantify the exact number of cycles stolen by the
    DMA. To mitigate this in practice on the STM32F4, you would place the DMA ping-pong buffers in a separate
    SRAM bank from where the CPU is actively reading and writing model activations, allowing true parallel
    operation.
  common_mistake: Candidates often assume that because DMA is a hardware controller, data transfers consume
    strictly zero CPU resources. They frequently forget to account for SRAM bus contention (cycle stealing)
    which stalls the CPU when both attempt to access the same memory bank.
  napkin_math: '1. Image size: 96 x 96 = 9,216 bytes per frame. 2. DMA bandwidth: 9,216 bytes * 10 fps
    = 92,160 bytes/sec. 3. Total CPU cycles per frame: 168,000,000 cycles/sec / 10 fps = 16,800,000 cycles.
    4. Cycles stolen by DMA per frame: 9,216 cycles (assuming 1 cycle per byte transfer). 5. Available
    cycles for inference: 16,800,000 - 9,216 = 16,790,784 cycles. 6. Maximum MACs per frame: 16,790,784
    cycles * 2 MACs/cycle (via CMSIS-NN SIMD) = 33,581,568 MACs.'
