schema_version: 1
id: tinyml-0084
title: Watchdog Timers and Hard Real-Time Guarantees
topic: safety-certification
status: published
provenance: imported
scenario: Your Cortex-M4 runs inference for a safety-critical vibration monitor. The system must produce
  a result every 100ms — no exceptions. Your colleague says 'the model runs in 50ms on average, so we
  have 50ms of margin.' How does the ML model's worst-case execution time (which varies with input complexity
  for some architectures like decision trees or early-exit networks) make WCET analysis harder than for
  fixed-time tasks, and how must the watchdog timeout be set relative to the model's WCET?
details:
  realistic_solution: The 50ms average-case margin hides the data-dependent execution time of the ML model.
    If the model uses an early-exit architecture (where "easy" samples exit after 3 layers but "hard"
    samples pass through all 12 layers), the inference time is highly variable. Even for fixed-graph CNNs,
    ReLU sparsity can cause data-dependent timing variations if the hardware accelerator skips zero-multiplies.
  common_mistake: '"50ms margin is plenty — what could go wrong?" On bare-metal MCUs running ML, average-case
    timing is irrelevant for safety.'
  napkin_math: 'IWDG timeout: 100ms. Average inference: 50ms. Worst-case inference (all layers execute):
    85ms. Worst-case with interrupt storm (10ms): 95ms. If a cosmic ray flips a bit in the program counter
    and the CPU hangs, the watchdog fires at 100ms. Recovery: reboot (20ms) + model load from flash (5ms)
    + first inference (50ms) = 75ms. Total outage: 175ms. Without IWDG: CPU hangs indefinitely — the monitor
    is dead until someone physically resets it.'
