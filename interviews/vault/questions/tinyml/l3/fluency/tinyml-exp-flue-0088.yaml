schema_version: 1
id: tinyml-exp-flue-0088
title: Active Learning Storage Constraints
topic: dataset-curation
status: published
provenance: imported
scenario: We are employing an active learning strategy to curate a dataset for a keyword spotting model
  on a Nordic nRF5340. The 128 MHz app core runs a baseline model, and when its confidence is low, it
  saves the 1-second, 16 kHz, 16-bit audio clip to flash for later offloading via BLE 5.3 and human annotation.
  The device has 1 MB of flash, but the application firmware, BLE stack, and baseline model consume 640
  KB. Calculate the maximum number of uncertain audio clips we can store on-device before we must connect
  and offload the data to avoid losing samples.
details:
  realistic_solution: To curate a high-value dataset without overwhelming the limited on-device storage,
    the system should only capture complete audio windows where the model exhibits uncertainty. By buffering
    these clips in the remaining flash memory, the device can periodically wake the BLE radio to transmit
    the batch to a gateway for human annotation, effectively targeting the dataset bias without requiring
    a continuous high-bandwidth connection.
  common_mistake: Candidates often forget to subtract the firmware footprint from the total flash capacity,
    assuming the full 1 MB is available for data logging. They also frequently miscalculate the sample
    size by confusing bits and bytes, or fail to round down the final result, assuming partial samples
    are useful for the annotation workflow.
  napkin_math: '1. Calculate available flash storage: 1 MB (1024 KB) total - 640 KB firmware = 384 KB
    available.

    2. Calculate size of a 1-second audio sample: 16,000 samples/sec * 2 bytes/sample (16-bit) = 32,000
    bytes.

    3. Convert sample size to KB: 32,000 bytes / 1024 = 31.25 KB per clip.

    4. Calculate total samples: 384 KB / 31.25 KB/clip = 12.28 clips.

    5. Round down to whole samples: We can store exactly 12 full audio clips for annotation.'
