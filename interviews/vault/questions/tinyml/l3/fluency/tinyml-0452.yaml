schema_version: 1
id: tinyml-0452
title: The ADC Overflow Anomaly
topic: extreme-quantization
status: published
provenance: imported
scenario: You are developing a TinyML-based vibration sensor for predictive maintenance on a factory floor.
  Your model, an audio classifier, performs perfectly in the lab with pre-recorded, normalized `.wav`
  files. When you deploy it to a device using a 12-bit I2S microphone (ADC), the model's accuracy plummets,
  predicting garbage for all inputs. The FP32 version of the model works fine on-device (but is too slow).
  You suspect a quantization issue. Your INT8 model was quantized using a scale and zero-point derived
  from your normalized training data, which spans `[-1.0, 1.0]`. What is the most likely cause of this
  catastrophic failure?
details:
  realistic_solution: The root cause is a quantization overflow due to a data range mismatch. A 12-bit
    ADC produces integer values from `[0, 4095]` (or `[-2048, 2047]` if signed). The quantization scale,
    calculated from data in the `[-1.0, 1.0]` range, is completely wrong for this wide integer range.
    When a raw ADC value like `3000` is fed into the quantization formula, it is treated as `3000.0`,
    which is far outside the `[-1.0, 1.0]` calibration range. This results in the quantized value being
    clipped to the INT8 max of `127`, effectively destroying the input signal's information and leading
    to garbage predictions. The correct solution is to re-quantize the model using a representative calibration
    set of raw ADC values from the actual sensor.
  common_mistake: Engineers often assume that training data statistics perfectly represent real-world
    sensor data. They forget that raw ADC values are integers in a specific hardware-defined range, not
    normalized floats. This mismatch between calibration data range and inference data range leads to
    massive clipping (overflow/underflow) when the real data is quantized.
  napkin_math: '12-bit ADC: range [0,4095]. Training normalized [-1,1]: scale=2/256=0.0078. Raw ADC value
    3000: q=3000/0.0078=384,615 → clipped to INT8 max 127. Dequant=127*0.0078=0.99. All ADC values >1.0
    collapse to 127 — input destroyed. Fix: recalibrate with raw ADC range [0,4095], scale=4096/256=16.'
