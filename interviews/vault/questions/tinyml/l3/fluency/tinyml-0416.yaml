id: tinyml-0416
title: Cortex-M55 Helium Speedup for Depthwise Conv
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: 'You''re upgrading from a Cortex-M4F (168 MHz, SMLAD: 2 INT8 MACs/cycle) to a Cortex-M55 (160
  MHz, Helium MVE: 8 INT8 MACs/cycle) for a keyword spotting model. The model''s hottest layer is a 3×3
  depthwise convolution with 64 channels on a 24×24 feature map. Calculate the speedup for this specific
  layer, accounting for the fact that depthwise convolution has lower arithmetic intensity than standard
  convolution.'
details:
  realistic_solution: 'Depthwise conv processes each channel independently, changing vectorization efficiency
    per architecture. M4F (SMLAD, 2 INT8 MACs/cycle): 3x3 kernel = 9 MACs per output per channel. SMLAD
    does 2 MACs/cycle, so 9 MACs = 5 cycles (wastes 1 slot on odd count). Per channel: 24*24 outputs *
    5 cycles = 2,880 cycles. 64 channels: 184,320 cycles. With 20% loop overhead: 221,184 cycles / 168
    MHz = 1.32 ms. M55 (Helium MVE, 8 INT8 MACs/cycle): 16-wide vector processes spatial dimension in
    parallel. 9 MACs * 576 outputs / 8 = 648 iterations per channel. 64 channels: 41,472 cycles / 160
    MHz = 0.259 ms. Speedup: 1.32/0.259 = 5.1x. Exceeds naive 4x prediction (8/2 * 160/168 = 3.81x) because
    M4F wastes cycles on odd kernel size while Helium handles spatial parallelism efficiently.'
  common_mistake: '"M55 does 8 MACs/cycle vs M4F''s 2 MACs/cycle, so it''s 4× faster. Adjust for clock:
    (8/2) × (160/168) = 3.8× speedup." This assumes both cores achieve peak throughput on depthwise conv.
    They don''t — depthwise conv has unique challenges that affect each core differently.'
  napkin_math: 'M4F: 294,912 cycles / 168 MHz = 1.76ms. M55: 41,472 cycles / 160 MHz = 0.259ms. Speedup:
    6.8×. Theoretical peak speedup (MACs/cycle × clock): (8/2) × (160/168) = 3.81×. Achieved: 6.8× — exceeds
    theoretical! Why? Because the M4F''s SMLAD can only do 2 MACs/cycle but depthwise conv''s 9-MAC kernel
    wastes 1 MAC slot (odd number). The M55''s 16-wide vector has no such waste for spatial parallelism.
    Effective MACs/cycle: M4F = 1.8 (9/5), M55 = 8.0 (144/18). Ratio: 4.44× × clock ratio 0.95× = 4.2×...
    the remaining 1.6× comes from reduced loop overhead (36 iterations vs 576 per channel). Helium eliminates
    94% of loop iterations.'
