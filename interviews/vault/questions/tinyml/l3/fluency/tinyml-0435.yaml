schema_version: 1
id: tinyml-0435
title: The Silent Misfire
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You are debugging a keyword spotting model on a Cortex-M4 based device. The model was trained
  in FP32 and works perfectly. To save Flash space, you use post-training quantization to convert the
  entire model to INT8, using a calibration dataset of speech recorded in a quiet office. Now, when testing
  in a real-world environment with background noise (e.g., near a busy street), the device frequently
  misfires, activating on words that sound nothing like the keyword. `dmesg` shows no hardware errors.
  What is the most likely cause of this sudden accuracy collapse?
details:
  realistic_solution: The most likely cause is activation overflow. The INT8 data type has a fixed range
    of [-128, 127]. The quantization scale factor was calculated using the quiet audio from the calibration
    set. Loud background noise in the real world pushes the values of the input features (e.g., MFCCs)
    and intermediate activations beyond the maximum value captured during calibration. These values are
    then 'clipped' to 127, distorting the feature maps passed to subsequent layers and leading to incorrect
    classifications. The solution is to use a more representative calibration dataset that includes noisy
    environments.
  common_mistake: Engineers often blame the weights or the model architecture itself, assuming 'INT8 just
    isn't accurate enough'. They fail to consider that the calibration data's dynamic range might not
    represent the real world's, leading to a data-dependent, not model-dependent, failure.
  napkin_math: 'Cortex-M4, INT8 quantization. Calibration: FP32 max activation = 6.0. Scale = 127 / 6.0
    = 21.17. Quiet input 5.5 -> round(5.5 * 21.17) = 116 (fits [-128, 127]). Loud noise pushes to 9.0
    -> round(9.0 * 21.17) = 190 > 127, clipped to 127. Information lost: (190-127)/190 = 33%. At 168 MHz
    with CMSIS-NN: inference = 18 ms. Clipping happens in ~0.1 us per activation, no latency impact, but
    accuracy drops 95% to 72% on noisy inputs. Fix 1: recalibrate with noisy data, max = 12.0, new scale
    = 127/12 = 10.58. Quiet 5.5 -> 58 (46% of range, less precision). Fix 2: per-channel quantization,
    noise-sensitive channels get scale=10, quiet channels keep scale=21. SRAM: 64 channels * 4 bytes =
    256 bytes overhead.'
