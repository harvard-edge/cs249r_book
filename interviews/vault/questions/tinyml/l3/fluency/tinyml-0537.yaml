id: tinyml-0537
title: The Smart Doorbell's Update Dilemma
topic: federated-learning
status: published
provenance: imported
scenario: 'You are the lead engineer for a fleet of 1 million smart doorbells, each running a keyword-spotting
  model on a Cortex-M4. Your team wants to deploy a model update each month to detect a new sound. They
  have two proposals. Proposal A: Centralized OTA. Devices capture raw audio of false negatives, upload
  1MB of audio weekly, and receive a 500KB updated model monthly. Proposal B: Federated Learning. Devices
  compute weight updates locally, upload 50KB of gradients weekly, and download a 50KB aggregated model
  monthly. Which proposal has the lower Total Cost of Ownership (TCO) and why?'
details:
  realistic_solution: Federated Learning is the correct choice. The napkin math shows its data transfer
    TCO is over 40 times lower than the centralized OTA approach. The primary non-cost benefit is privacy
    preservation. By training on-device and only sharing anonymized, aggregated model updates (gradients),
    no sensitive raw audio ever leaves the user's device. This is a massive advantage for products deployed
    in private spaces like homes.
  common_mistake: Engineers often focus on the on-device compute cost of federated learning or the implementation
    complexity, assuming data transfer costs are negligible. At a scale of millions of devices, these
    operational costs dominate the TCO. Another common mistake is to conflate firmware security (signing)
    with data privacy (raw data collection).
  napkin_math: '1M devices. A: upload 1MB/wk + 500KB/mo = 58MB/device/yr. Fleet: 58TB. At $0.09/GB: $5,220/yr.
    B: upload 50KB/wk + 50KB/mo = 3.2MB/device/yr. Fleet: 3.2TB. Cost: $288/yr. B is 18x cheaper. Privacy
    bonus: no raw audio leaves device. On-device gradient compute on Cortex-M4 costs <1mJ — negligible
    vs radio energy.'
