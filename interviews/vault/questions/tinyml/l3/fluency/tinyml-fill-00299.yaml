schema_version: 1
id: tinyml-fill-00299
title: Optimizing Sensor Data Ingress on nRF5340 for TinyML Inference
topic: dma-data-movement
status: published
provenance: imported
scenario: You're deploying a tinyML model for anomaly detection on a Nordic nRF5340 (128 MHz, 256 KB SRAM,
  1 MB flash) to analyze incoming sensor data streams. The model requires 16KB of input data per inference,
  arriving via a high-speed peripheral interface that generates interrupts upon data availability. Describe
  the data movement strategy you would employ to minimize CPU overhead and ensure real-time processing,
  considering the nRF5340's constrained resources.
details:
  realistic_solution: The optimal approach involves utilizing DMA (Direct Memory Access) transfers. Configure
    the peripheral to directly write its received data into a pre-allocated, 'pinned' memory region in
    SRAM that serves as the model's input buffer. This 'zero-copy' technique avoids CPU involvement for
    data movement, freeing up the 128 MHz core to focus on model inference and other application logic.
    Interrupts would only signal DMA completion, triggering the ML inference directly.
  common_mistake: A common mistake is to perform CPU-intensive byte-by-byte copies from peripheral buffers
    to model input buffers using general-purpose CPU instructions. This introduces significant CPU cycles
    for data movement, increasing latency and power consumption, potentially starving the inference engine
    or other critical tasks.
  napkin_math: "Assume an ADC samples at 100 kHz, producing 2-byte (16-bit) samples. An inference requires\
    \ 16 KB (16,384 bytes) of data. \n\n1.  **CPU-based Copy (Worst Case):** If the CPU copies 2 bytes\
    \ per instruction at 128 MHz (1 instruction/cycle), it would take approximately 16,384 bytes / 2 bytes/instruction\
    \ = 8,192 instructions for copying. This is a very rough estimate, but illustrates significant CPU\
    \ cycles spent on data movement, not processing. \n\n2.  **DMA Transfer:** DMA engine operates independently.\
    \ If the DMA controller can transfer at 10 MB/s (a conservative estimate for a microcontroller), moving\
    \ 16 KB would take 16 KB / 10 MB/s = 0.0016 seconds or 1.6 milliseconds. During this time, the CPU\
    \ is free. \n\nThis simple math highlights the advantage of offloading data movement to DMA, especially\
    \ for continuous high-rate data streams, minimizing host-device (peripheral to SRAM) data movement\
    \ overhead on the CPU."
