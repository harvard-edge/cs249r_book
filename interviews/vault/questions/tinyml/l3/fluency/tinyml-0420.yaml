title: The Keyword Spotting Memory Overflow
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You are a TinyML engineer tasked with deploying a keyword spotting model on a Cortex-M4 microcontroller
  with 256KB of SRAM and 1MB of Flash. The initial model uses a standard 2D convolutional layer with a
  3x3 kernel, 128 input channels, and 128 output channels. During compilation, the linker fails with an
  'out of memory' error, indicating the model's weights are too large for the Flash budget. Your colleague
  suggests replacing the standard convolution with a depthwise separable convolution. Demonstrate the
  Flash memory savings for this single layer.
details:
  realistic_solution: The correct approach is to calculate the parameter count for both types of layers
    and compare them. A standard convolution's parameters scale multiplicatively with input and output
    channels, whereas a depthwise separable convolution splits this into two steps, resulting in an additive
    relationship that dramatically reduces parameters. This directly translates to a smaller Flash footprint.
  common_mistake: Engineers often underestimate the quadratic impact of channels on standard convolution
    parameter counts. They might correctly identify that depthwise separable is better but fail to quantify
    *how much* better, or they might confuse parameter reduction with activation reduction.
