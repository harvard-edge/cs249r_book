schema_version: 1
id: tinyml-exp2-flue-0253
title: ESP32-S3 Peak Memory Footprint Estimation
topic: model-size-estimation
status: published
provenance: imported
scenario: We are deploying an INT8 quantized CNN for anomaly detection on an ESP32-S3 (512 KB SRAM, 8
  MB PSRAM). The model has 150,000 parameters. During inference, its bottleneck layer requires storing
  an input feature map of 64x64x32 and an output feature map of 32x32x64 simultaneously. Calculate the
  peak SRAM footprint required for this model's weights and the bottleneck layer's activations, and determine
  if it fits in internal SRAM alongside 120 KB of RTOS overhead.
details:
  realistic_solution: A complete memory footprint estimation must include weights, peak intermediate activations,
    and system overhead. Given the ESP32-S3's INT8 vector extensions, weights and activations use 1 byte
    per value. The candidate should sum the parameters, the memory for the bottleneck layer's inputs and
    outputs, and the RTOS size, then compare this peak usage against the 512 KB internal SRAM limit.
  common_mistake: Candidates frequently calculate only the weight memory and forget that intermediate
    activations (feature maps) often consume significant RAM during inference. They might also fail to
    account for the RTOS overhead when checking hardware constraints.
  napkin_math: 'Weights: 150,000 parameters * 1 byte (INT8) = 150 KB. Bottleneck Activations: Input =
    64 * 64 * 32 * 1 byte = 131,072 bytes (128 KB); Output = 32 * 32 * 64 * 1 byte = 65,536 bytes (64
    KB). Peak activation memory = 128 KB + 64 KB = 192 KB. Total peak footprint = 150 KB (weights) + 192
    KB (activations) + 120 KB (RTOS) = 462 KB. Since 462 KB < 512 KB SRAM capacity, it fits entirely in
    fast internal memory without using the 8 MB PSRAM.'
