schema_version: 1
id: tinyml-0056
title: BLE Throughput for Model Update
topic: ota-firmware-updates
status: published
provenance: imported
scenario: Your TinyML wearable needs an over-the-air model update via BLE 5.0. The new model is 150 KB
  (INT8 quantized, stored in external flash). BLE 5.0 supports 2 Mbps PHY with a maximum data throughput
  of ~1.4 Mbps after protocol overhead. The device has a 100 mAh battery at 3.7V. The BLE radio draws
  8 mA during active transmission/reception. Estimate the update time and the battery cost of the update.
details:
  realistic_solution: BLE data transfer is constrained by connection intervals, MTU size, and the number
    of packets per connection event.
  common_mistake: '"150 KB at 1.4 Mbps = 0.86 seconds. Trivial." This uses the raw PHY throughput and
    ignores BLE''s connection-oriented protocol overhead, which dramatically reduces effective throughput.'
  napkin_math: 'BLE transfer: 2.3s at 65 KB/s. Flash erase: 1.9s (38 sectors × 50ms). Flash write: 0.15s.
    Verify: 0.2s. Total: 4.55s. Battery cost: 8 mA × 4.55s = 36.4 mA·ms = 0.01 mAh (0.01% of battery).
    For a 500 KB model: BLE = 7.7s, flash erase = 6.25s (125 sectors), total = 14.2s. At this size, BLE
    and flash erase are roughly equal bottlenecks. For models >1 MB: flash erase dominates. Optimization:
    use a delta update (send only changed weights) — typical delta for a fine-tuned model: 10–20% of weights
    change → 15–30 KB transfer instead of 150 KB.'
