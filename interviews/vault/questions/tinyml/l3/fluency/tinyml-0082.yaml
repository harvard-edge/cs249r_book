schema_version: 1
id: tinyml-0082
title: The BLE Disconnect During OTA
topic: ota-firmware-updates
status: published
provenance: imported
scenario: You're pushing a 200 KB ML model update over BLE 5.0 to an nRF5340. The BLE connection uses
  a 7.5 ms connection interval. How does the ML model's massive size (relative to BLE MTU and connection
  interval) determine the minimum OTA transfer time, and why is a model update riskier than a firmware
  update because the model file lacks internal checksums that the runtime can verify incrementally?
details:
  realistic_solution: A 200 KB ML model is massive for BLE. With a 251-byte MTU and a 7.5 ms connection
    interval (assuming 1 packet per interval for simplicity), the theoretical minimum transfer time is
    $200,000 / 251 \times 0.0075 \approx 6$ seconds. In reality, with protocol overhead and flash write
    stalls, it takes 10-15 seconds. This long window exposes the transfer to RF interference, causing
    dropped packets and supervision timeouts.
  common_mistake: '"The BLE signal is too weak — move the phone closer." Signal strength is fine. The
    disconnect is a timing and architecture issue driven by the ML payload.'
  napkin_math: 'BLE throughput: 251 bytes / 7.5 ms = 33.5 KB/s. Transfer time for 200 KB: 200 / 33.5 =
    5.97 seconds (ideal). Flash pages to write: 200 KB / 4 KB = 50 pages. Erase time per page: 85 ms.
    Total erase time: 50 × 85 = 4,250 ms. Total transfer time = 5.97 + 4.25 = 10.22 seconds. During this
    10-second window, the device is highly vulnerable to connection drops. If you quantize the model to
    INT8 (50 KB), the transfer time drops to 2.5 seconds, dramatically reducing the failure probability.'
