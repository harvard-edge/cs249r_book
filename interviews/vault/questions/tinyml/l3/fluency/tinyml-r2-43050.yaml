schema_version: 1
id: tinyml-r2-43050
title: Scratch Buffer Allocation for Convolution
topic: tensor-arena-planning
status: published
provenance: imported
scenario: A Conv2D operator on Cortex-M7 uses im2col to convert the convolution into a matrix multiplication.
  For a 3×3 conv with 32 input channels processing a 24×24 feature map, how large is the im2col scratch
  buffer, and how does this affect your tensor arena budget?
details:
  realistic_solution: 'The full im2col matrix is (H_out × W_out) × (k × k × C_in) = 576 × 288 = 165,888
    elements. At INT8: 162 KB. This is enormous for a 512 KB arena. CMSIS-NN (ARM''s optimized library)
    doesn''t materialize the full im2col. Instead, it processes one output row at a time: scratch buffer
    = W_out × k × k × C_in = 24 × 288 = 6,912 bytes (~6.75 KB). Even more optimized: process a few output
    pixels at a time using SIMD (4-wide on Cortex-M7), needing only 4 × 288 = 1,152 bytes (~1.1 KB). TFLite
    Micro''s default: allocates a scratch buffer per operator at arena planning time. The planner must
    account for this scratch buffer as part of the operator''s temporary memory. If multiple operators
    share the same scratch buffer (non-overlapping lifetimes), the arena only needs max(scratch_i), not
    sum(scratch_i).'
  common_mistake: 'Computing the full im2col buffer: 24×24 (output positions) × 3×3×32 (kernel volume)
    × 1 byte = 24×24×288 = 165,888 bytes (162 KB). This assumes materializing the entire im2col matrix
    at once, which is impractical on MCUs.'
  napkin_math: 'Full im2col: 24 × 24 × 3 × 3 × 32 = 162 KB. Per-row im2col: 24 × 288 = 6.75 KB. Per-pixel
    SIMD: 4 × 288 = 1.1 KB. SRAM savings: 162 KB → 1.1 KB = 147× reduction. Trade-off: per-pixel processing
    means more loop iterations and worse data reuse for matrix multiply. CMSIS-NN compromise: processes
    2-4 rows at a time = 13.5-27 KB scratch. Good balance between memory and compute efficiency. Arena
    impact: scratch buffer is temporary (alive only during one operator), so it overlaps with other operators''
    scratch buffers, not activation tensors.'
