schema_version: 1
id: tinyml-exp2-impl-0015
title: Distillation vs Pruning Latency on Ethos-U55
topic: knowledge-distillation
status: published
provenance: imported
scenario: You are optimizing a vision model for an ARM Cortex-M7 + Ethos-U55 (Corstone-300) with 512 KB
  shared SRAM, running at 480 MHz. The system uses the 256 MAC/cycle Ethos-U55 configuration. You have
  two INT8 candidate models. Model A uses 50% unstructured pruning, yielding 10 million non-zero MACs.
  Since the Ethos-U55 lacks unstructured sparsity support, Model A executes entirely on the M7 CPU, taking
  2 cycles per MAC. Model B is a dense CNN generated via knowledge distillation, also requiring exactly
  10 million MACs, but executing 100% on the Ethos-U55 at 80% utilization. Calculate the inference latency
  in milliseconds for both models to mathematically demonstrate why distillation beats unstructured pruning
  on this specific hardware.
details:
  realistic_solution: Knowledge distillation into a smaller dense architecture is vastly superior to unstructured
    pruning for NPU targets. The Ethos-U55 is an ASIC optimized for dense block processing; unstructured
    sparsity forces a fallback to the M7 CPU, resulting in a massive latency penalty despite having the
    exact same computational MAC volume as the distilled model.
  common_mistake: Candidates often assume that equal MAC counts mean equal latency, failing to recognize
    that NPUs like the Ethos-U55 require dense tensors. They may incorrectly attempt to calculate Model
    A's latency using the NPU's throughput, or mess up the MHz to seconds unit conversions during the
    calculation.
  napkin_math: 'Model A (Pruned, M7): 10M MACs * 2 cycles/MAC = 20M cycles. Latency = 20M cycles / 480
    MHz = 0.04167 seconds = 41.67 ms. Model B (Distilled, Ethos-U55): Peak MACs/sec = 480 MHz * 256 MACs/cycle
    = 122.88 GMAC/s. Effective MACs/sec (80% util) = 122.88 * 0.8 = 98.304 GMAC/s. Latency = 10M MACs
    / 98.304 GMAC/s = 0.0001017 seconds = 0.102 ms.'
