id: tinyml-exp2-impl-0009
title: Estimating Inference Latency for INT8 Convolution on Cortex-M4
topic: compute-cost-estimation
status: published
provenance: imported
scenario: You are deploying an audio keyword spotting model onto an ARM Cortex-M4 (STM32F4) microcontroller.
  The core runs at 168 MHz, has 256 KB of SRAM, 1 MB flash, no FPU, and supports CMSIS-NN SIMD instructions
  that allow 2x INT8 MACs per cycle. The largest bottleneck in your model is a 2D convolution with 32
  input channels, 64 output channels, a 3x3 kernel, and a 16x16 output feature map. Assuming 100% compute
  utilization and that the weights and activations are fully quantized to INT8 and fit entirely within
  SRAM, calculate the theoretical minimum inference latency for this single layer in milliseconds.
details:
  realistic_solution: First, calculate the total number of Multiply-Accumulate (MAC) operations required
    for the convolution layer based on the output feature map and filter dimensions. Then, determine the
    theoretical peak MACs per second by multiplying the clock speed (168 MHz) by the SIMD throughput (2
    MACs/cycle). Finally, divide the total MACs by the peak MACs per second to find the minimum theoretical
    latency in seconds, converting the final result to milliseconds.
  common_mistake: Candidates often calculate MACs but forget that the Cortex-M4 can perform 2 INT8 MACs
    per cycle using the dual-MAC SIMD instructions. Another common error is assuming floating-point arithmetic
    is viable here despite the explicit lack of an FPU, or incorrectly converting clock frequency (168
    MHz) to execution time.
  napkin_math: '1. Total MACs = Output_Height * Output_Width * Kernel_Height * Kernel_Width * In_Channels
    * Out_Channels = 16 * 16 * 3 * 3 * 32 * 64 = 4,718,592 MACs.

    2. Peak Throughput = 168,000,000 cycles/sec * 2 MACs/cycle = 336,000,000 MACs/sec.

    3. Minimum Latency (seconds) = Total MACs / Peak Throughput = 4,718,592 / 336,000,000 = 0.014043 seconds.

    4. Minimum Latency (ms) = 0.014043 * 1000 = 14.04 ms.'
