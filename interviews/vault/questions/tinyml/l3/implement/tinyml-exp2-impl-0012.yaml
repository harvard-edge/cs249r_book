schema_version: 1
id: tinyml-exp2-impl-0012
title: Calculating Footprint for 3-bit Quantized Weights
topic: extreme-quantization
status: published
provenance: imported
scenario: You are deploying an audio keyword spotting model to an ESP32-S3 microcontroller, leveraging
  its 240 MHz dual-core Xtensa processor. To achieve the lowest latency, the model's 1,048,576 parameters
  must reside entirely within the 512 KB internal SRAM instead of the slower 8 MB PSRAM. You plan to apply
  3-bit quantization to the weights to fit the model in memory. Calculate the exact memory required in
  kilobytes (1 KB = 1024 bytes) to store these 3-bit quantized weights, assuming they are tightly packed
  without any padding.
details:
  realistic_solution: The correct approach calculates the raw bit count of the model parameters and converts
    directly to bytes. While tightly packing 3-bit values ensures the weights fit into the 512 KB SRAM
    without padding waste, the ESP32-S3's Xtensa architecture (with INT8 vector extensions) will require
    on-the-fly unpacking into 8-bit registers during inference, trading some compute for memory efficiency.
  common_mistake: Candidates often incorrectly assume that sub-4-bit quantization must be padded to the
    nearest power of 2 (like 4 bits) for byte alignment, which artificially inflates the memory calculation.
    They may also forget to divide by 8 to convert from bits to bytes before calculating kilobytes.
  napkin_math: Total bits = 1,048,576 parameters * 3 bits/parameter = 3,145,728 bits. Total bytes = 3,145,728
    bits / 8 bits/byte = 393,216 bytes. Total kilobytes = 393,216 bytes / 1024 bytes/KB = 384 KB. (This
    comfortably fits within the 512 KB SRAM).
