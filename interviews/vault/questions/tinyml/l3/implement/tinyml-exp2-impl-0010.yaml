schema_version: 1
id: tinyml-exp2-impl-0010
title: Active Learning Buffer Capacity on STM32F4
topic: dataset-curation
status: published
provenance: imported
scenario: You are implementing an active learning data collection pipeline on an ARM Cortex-M4 (STM32F4)
  edge device. The system identifies out-of-distribution audio samples using an uncertainty threshold
  and buffers them to flash memory for later transmission to human annotators. The device features 1 MB
  of flash and 256 KB SRAM, but 650 KB of the flash is permanently occupied by the firmware, bootloader,
  and the CMSIS-NN optimized INT8 model. If each buffered sample is a 1.5-second audio clip recorded at
  16 kHz (8-bit mono), calculate the exact maximum number of complete audio samples you can curate and
  buffer on the device before the memory is full.
details:
  realistic_solution: First, determine the available flash memory by subtracting the occupied space from
    the total capacity of the device. Next, calculate the size of a single 1.5-second audio clip in bytes
    based on the sample rate and bit depth. Finally, divide the available memory by the size of one clip
    and take the floor to get the maximum number of complete samples. This ensures the system does not
    attempt to write a partial sample that would corrupt the dataset during curation.
  common_mistake: Candidates often forget to account for the exact binary conversion (using 1000 instead
    of 1024 for KB) when calculating embedded memory limits. They may also fail to correctly calculate
    the byte footprint of a 1.5-second audio clip at the given sample rate and bit depth.
  napkin_math: 'Total Flash = 1 MB = 1024 KB. Available Flash = 1024 KB - 650 KB = 374 KB. In bytes: 374
    * 1024 = 382,976 bytes. Audio clip size = 1.5 seconds * 16,000 samples/second * 1 byte/sample (8-bit)
    = 24,000 bytes. Maximum complete samples = floor(382,976 / 24,000) = 15 samples.'
