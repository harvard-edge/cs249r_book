id: tinyml-cell-13166
title: 'TinyML TCO Implement: Annual Battery Budget for 10K TinyML Fleet'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Implement the complete battery cost calculation for 10,000 Cortex-M4 TinyML sensors (168MHz,
  256KB SRAM) with 150mAh coin cell batteries ($0.50 each). Sensors run at 75μA average. Calculate: battery
  life in days, annual replacement rate and cost, and 5-year TCO for battery replacement including $15
  labor per replacement.'
details:
  realistic_solution: 'Battery life: 150mAh / 0.075mA = 2000 hours / 24 = 83.3 days. Annual replacements
    per unit: 365/83.3 = 4.38 per year. Annual battery cost: 4.38 * $0.50 = $2.19/unit/yr. Annual labor:
    4.38 * $15 = $65.70/unit/yr. Annual total per unit: $67.89/unit/yr. 10K units annual: $678,900. 5yr:
    $3,394,500. Hardware: 10K * $3 = $30K. Grand total 5yr: $3,424,500. Battery replacement dominates
    at 99.1% of total! Fix: reduce current to 15μA. Life: 150/0.015=10,000hr=416 days. Replacements: 365/416=0.877/yr.
    Annual: 0.877*$15.50=$13.59. Savings: $54.30/unit/yr. 10K*5yr=$2,715,000 saved. Engineering to reduce
    current: $50K one-time. ROI: 5430%.'
  common_mistake: Calculating battery life in hours and forgetting to divide by 24 to get days, leading
    to 24x overestimate, and not including labor cost which typically exceeds battery material cost.
  napkin_math: 'Battery life: 150mAh/75μA=2000hr/24=83.3 days. Annual: 365/83.3=4.38 repl/unit. Cost:
    4.38*($0.50+$15)=$68/unit/yr. 10K*5yr=$3.4M. Hardware: $30K. Total: $3.43M. Fix (15μA): life=10,000hr=416
    days. Annual: 0.877 repl/unit. Cost: 0.877*$15.50=$13.59/yr. Total 10K 5yr: $0.68M batteries/labor.
    Savings: $3.43M-$0.68M=$2.75M-$50K dev=$2.7M net savings. Battery cost fraction: currently 98%. After
    fix: still dominant but 80% lower. Moral: for battery-powered TinyML, always architect for <15μA avg
    current — not for performance.'
