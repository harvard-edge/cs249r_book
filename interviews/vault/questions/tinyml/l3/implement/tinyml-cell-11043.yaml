id: tinyml-cell-11043
title: 'Dataset Curation: Implement Feature Extraction Pipeline for Cortex-M4 Deployment'
topic: dataset-curation
status: published
provenance: imported
scenario: You need to implement an MFCC feature extraction pipeline that produces training data compatible
  with your Cortex-M4 (168MHz, 256KB SRAM) inference runtime. The MCU will use fixed-point arithmetic.
  Implement the quantization-aware feature extraction that ensures training/inference feature parity.
details:
  realistic_solution: 'Simulate MCU fixed-point: extract MFCC with float64 precision, then quantize to
    Q15 fixed-point (int16, 1 sign + 15 fractional bits). Train on Q15-simulated features. Use the same
    quantization parameters during MCU inference.'
  common_mistake: Extracting float32 MFCC features during training but using int8 MFCC on MCU — the mismatch
    causes 5-10% accuracy degradation. Not simulating MCU fixed-point behavior during training.
  napkin_math: 'Q15 range: -1.0 to +0.9999695. MFCC range: typically -50 to +50 dB. Scale: 1/50 fits in
    Q15. Quantization step: 1/32768 = 0.0000305. Scaled step: 50 × (1/32768) = 0.001525. Max quantization
    error: ~0.00076 (half of step). For 40-dim MFCC: quantization error per coefficient ≈ 0.00076. SNR
    of quantization: 20×log10(50/0.0005) = 100dB — excellent. Training/inference mismatch with proper
    Q15 simulation: < 0.5% accuracy gap. Without simulation: 5-8% gap. Feature size: 99 frames × 40 ×
    2B (int16) = 7.92KB per sample. 10K training samples = 79.2MB — needs external flash or cloud training.'
