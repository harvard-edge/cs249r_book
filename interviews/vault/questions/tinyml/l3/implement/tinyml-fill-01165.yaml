id: tinyml-fill-01165
title: ESP32-S3 A/B OTA Flash Partition Sizing for ML Inference
topic: ota-firmware-updates
status: published
provenance: imported
scenario: You are designing the firmware update mechanism for an ML inference application running on an
  ESP32-S3 microcontroller, specifically utilizing its 240 MHz dual-core processor, 512 KB SRAM, and 8
  MB PSRAM. The device needs to support robust over-the-air (OTA) updates with a full A/B partition scheme,
  allowing for seamless rollbacks in case of update failure. The current ML model and application firmware
  together occupy 3 MB of flash storage. The update process must ensure minimal downtime and handle potential
  power loss during the update. Given typical flash programming constraints and the requirement for an
  A/B scheme, how would you size your flash partitions to accommodate the current firmware, a new firmware
  image, and necessary system partitions? Calculate the minimum total flash memory (in MB) required to
  support this robust A/B OTA update mechanism.
details:
  realistic_solution: A realistic solution involves meticulously planning the flash partition table. For
    a robust A/B OTA update on ESP32-S3, you need at least two primary application partitions (e.g., 'ota_0'
    and 'ota_1'), each large enough to hold the complete firmware image. Additionally, an 'ota_data' partition
    is crucial to store the active boot partition index. Small partitions for NVS (Non-Volatile Storage)
    and potentially a factory partition are also standard. The 8 MB PSRAM can be leveraged for temporary
    download buffering, but the final application images must reside in flash. A practical approach reserves
    `2 * Firmware_Size` for the application images plus space for system partitions.
  common_mistake: Underestimating the total flash memory required for a true A/B scheme, often neglecting
    dedicated space for the inactive partition, the OTA data partition, and other essential system partitions
    like NVS (Non-Volatile Storage). Another mistake is not considering the full image size for both A
    and B partitions, or overlooking the implications of flash wear and write speeds during update.
  napkin_math: 'Given: Firmware Image Size = 3 MB.

    Minimum required application flash for A/B = 2 * Firmware Image Size = 2 * 3 MB = 6 MB.

    Typical OTA Data Partition Size ≈ 8 KB = 0.0078125 MB.

    Typical NVS Partition Size ≈ 20 KB = 0.01953125 MB.

    Minimum Total Flash Needed (MB) = (2 * Firmware Image Size) + OTA Data Partition Size + NVS Partition
    Size

    Minimum Total Flash Needed = 6 MB + 0.0078125 MB + 0.01953125 MB ≈ 6.027 MB.

    Therefore, a standard 8 MB external flash is likely the minimum practical choice, accounting for any
    bootloader or other partitions not explicitly calculated here.'
