schema_version: 1
id: tinyml-exp2-impl-0026
title: Calculate Roofline Throughput on nRF5340
topic: roofline-analysis
status: published
provenance: imported
scenario: You are deploying an audio processing model on the Nordic nRF5340. The 128 MHz app core can
  execute 1 MAC instruction per cycle. The 256 KB SRAM provides a 32-bit (4 byte) wide bus, allowing 1
  word read per clock cycle. A specific 1D convolutional layer in your model has an operational intensity
  of 0.125 MACs/byte. Using the roofline model, calculate the maximum achievable throughput in MMACs/s
  for this layer.
details:
  realistic_solution: The candidate must calculate the peak compute and memory bandwidth, derive the ridge
    point, and compare it to the given operational intensity. Recognizing that 0.125 MACs/byte is below
    the ridge point confirms the layer is memory-bound, requiring them to calculate the ceiling based
    on memory bandwidth.
  common_mistake: Candidates often assume the layer will naturally achieve the peak compute rate of 128
    MMACs/s without calculating the ridge point. They may also incorrectly multiply the operational intensity
    by the peak compute instead of the memory bandwidth.
  napkin_math: Peak Compute = 128 MHz app core * 1 MAC/cycle = 128 MMACs/s. Peak Memory Bandwidth from
    256 KB SRAM = 128 MHz * 4 bytes/cycle = 512 MB/s. Ridge Point = 128 MMACs/s / 512 MB/s = 0.25 MACs/byte.
    Since Operational Intensity (0.125 MACs/byte) < Ridge Point (0.25 MACs/byte), the workload is memory-bound.
    Max Throughput = 0.125 MACs/byte * 512 MB/s = 64 MMACs/s.
