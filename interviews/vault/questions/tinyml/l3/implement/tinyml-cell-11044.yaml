schema_version: 1
id: tinyml-cell-11044
title: 'Dataset Curation: Implement Data Augmentation for TinyML Acoustic Models'
topic: dataset-curation
status: published
provenance: imported
scenario: You are training a keyword spotting model for Cortex-M7+Ethos-U55 (480MHz, 512KB SRAM, NPU).
  Your base dataset has 5,000 samples/keyword (10 keywords). Implement an offline augmentation pipeline
  to expand to 50,000 samples/keyword using noise injection, speed perturbation, and SpecAugment. Quantify
  augmented dataset size.
details:
  realistic_solution: 'Offline augmentation: generate augmented samples once, store to disk. Speed perturbation:
    0.9×, 1.0×, 1.1× speed = 3× multiplier. Noise injection: 5 SNR levels (0, 5, 10, 15, 20 dB) = 5× multiplier.
    SpecAugment: time mask + freq mask = 2 variants. Total: 3 × 5 × 2 = 30× augmentation. 5,000 × 30 =
    150,000 per class.'
  common_mistake: Applying augmentation online during training without verifying the CPU can keep up;
    or generating augmented data that falls outside the expected SNR range for the deployment environment.
  napkin_math: '10 keywords × 5,000 base = 50,000 original samples. Target: 500,000 augmented (50K/keyword).
    Augmentation factor needed: 10×. Apply: speed (3×) × noise (4 SNR levels: 5,10,15,20 dB) = 12×. Select
    10× subset. Storage: 500K samples × 1-sec × 16kHz × 2B = 16GB raw audio. MFCC: 500K × 3.87KB = 1.94GB
    — manageable. Training: 500K × 3 epochs / batch 512 = 2,930 steps on H100 (cloud training for tinyml
    models). At 50ms/step: 146 seconds = 2.4 minutes. Ethos-U55 inference: 99 × 40 int8 MFCC → 1ms per
    keyword check. Real-time feasible.'
