schema_version: 1
id: tinyml-exp2-impl-0018
title: TFLite Micro Memory Allocation on nRF5340
topic: model-format-conversion
status: published
provenance: imported
scenario: You are converting an ONNX anomaly detection model to an INT8 TensorFlow Lite for Microcontrollers
  flatbuffer to run on the Nordic nRF5340's 128 MHz app core. The nRF5340 has 1 MB of flash and 256 KB
  of SRAM, but the BLE 5.3 network stack and RTOS reserve 400 KB of flash and 140 KB of SRAM. The converted
  INT8 model has exactly 250,000 parameters, and the maximum memory required for the largest layer's input
  and output activation tensors is 50,000 elements. Calculate the remaining available Flash and SRAM on
  the device after deploying and running the converted model.
details:
  realistic_solution: In TFLite Micro, the flatbuffer model is designed to be mapped and evaluated directly
    from read-only memory (Flash), so weights do not consume SRAM. The SRAM is only allocated for the
    'tensor_arena' to hold intermediate activations. The INT8 parameters will consume 250 KB of Flash,
    and the activation tensors will consume 50 KB of SRAM.
  common_mistake: Candidates often misunderstand how TFLite Micro evaluates flatbuffers, mistakenly assuming
    model weights must be copied into SRAM during runtime initialization. This leads them to add the 250
    KB parameter size to the SRAM calculation, falsely concluding the model will cause an Out-Of-Memory
    (OOM) error.
  napkin_math: 'Total Flash: 1,024 KB. Available Flash for ML: 1,024 KB - 400 KB (BLE/RTOS) = 624 KB.
    Model Flash usage (INT8 weights): 250,000 bytes = 250 KB. Remaining Flash: 624 KB - 250 KB = 374 KB.
    Total SRAM: 256 KB. Available SRAM for ML: 256 KB - 140 KB (BLE/RTOS) = 116 KB. Model SRAM usage (INT8
    activations in tensor arena): 50,000 bytes = 50 KB. Remaining SRAM: 116 KB - 50 KB = 66 KB.'
