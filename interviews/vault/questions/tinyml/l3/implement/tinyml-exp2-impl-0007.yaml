schema_version: 1
id: tinyml-exp2-impl-0007
title: Randomized Smoothing Latency on ESP32-S3
topic: adversarial-robustness
status: published
provenance: imported
scenario: You are deploying a keyword spotting model on an ESP32-S3 (240 MHz dual-core Xtensa, 512 KB
  SRAM, 8 MB PSRAM, WiFi/BLE, vector extensions for INT8) for a secure smart lock. To defend against over-the-air
  adversarial audio perturbations, you implement an input randomized smoothing defense. For every 1-second
  audio clip (16,000 INT16 samples), the system must sequentially generate 5 different noisy versions
  by adding pseudo-random noise, and run the model on each. The ESP32-S3 vector extensions allow a single
  INT8 inference to run in 18 ms. If generating and adding noise takes 15 CPU cycles per sample, calculate
  the total latency to process one audio clip and determine if it meets a strict 150 ms real-time deadline.
details:
  realistic_solution: To quantify the latency impact of the randomized smoothing defense, calculate the
    time overhead of the noise injection step per pass using the MCU's clock frequency, add it to the
    base inference latency, and multiply by the total number of sequential passes.
  common_mistake: Candidates often forget to convert CPU cycles to milliseconds using the 240 MHz clock
    speed, or they calculate the inference time correctly but forget to multiply the noise generation
    overhead by the number of smoothing passes. Some may also incorrectly assume the dual-core architecture
    automatically parallelizes the sequential pipeline without explicit threading.
  napkin_math: '1. Noise cycles per pass = 16,000 samples * 15 cycles/sample = 240,000 cycles. 2. Noise
    time per pass = 240,000 cycles / 240,000,000 cycles/sec = 0.001 seconds (1 ms). 3. Total time per
    pass = 1 ms (noise) + 18 ms (INT8 inference) = 19 ms. 4. Total latency for 5 passes = 5 * 19 ms =
    95 ms. 5. Conclusion: 95 ms is well within the 150 ms deadline.'
