id: tinyml-fill-01333
title: ESP32-S3 Anomaly Detection with Graceful Degradation
topic: graceful-degradation
status: published
provenance: imported
scenario: You are deploying a real-time anomaly detection model on an ESP32-S3 microcontroller (240 MHz
  dual-core, 512 KB SRAM, 8 MB PSRAM) for critical infrastructure monitoring. The device operates on battery
  power, which can fluctuate, leading to reduced computational resources. Design a system that employs
  graceful degradation to maintain operational status even under severe resource constraints. Specifically,
  how would you implement a degradation ladder, including model fallbacks and quality-of-service shedding,
  to ensure the system remains fail-operational rather than fail-safe when the battery is low, given the
  memory constraints for storing multiple models?
details:
  realistic_solution: 'Implement a hierarchical degradation ladder triggered by continuous monitoring
    of battery voltage and system load on the ESP32-S3.

    1.  **Level 1 (Full Performance):** The primary anomaly detection model (e.g., a small CNN) runs from
    the 8MB PSRAM, utilizing both 240 MHz cores for inference, with full data sampling. All telemetry
    is sent.

    2.  **Level 2 (Reduced Performance):** If battery voltage drops below a pre-defined threshold, the
    system gracefully transitions to a simpler, pre-trained statistical fallback model (e.g., Exponentially
    Weighted Moving Average or a tiny SVM) stored in the 512KB SRAM. The sensor sampling rate is reduced
    by 50%, and non-critical background tasks are offloaded to a single core.

    3.  **Level 3 (Minimal/Fail-Operational):** If battery voltage drops further to a critical level,
    the system resorts to a simple threshold-based detection directly on raw sensor data. This ensures
    basic functionality. Prioritize sending only critical anomaly alerts, shedding all non-essential telemetry
    (Quality-of-Service shedding), and disabling non-critical peripherals to conserve power. A robust
    state machine manages these degradation levels, and memory for all fallback models is pre-allocated
    to avoid dynamic allocations during critical transitions, ensuring predictable behavior on the constrained
    ESP32-S3.'
  common_mistake: Ignoring the memory footprint of multiple fallback models or failing to pre-compute
    activation thresholds for degradation, leading to latency spikes or system crashes during transition.
    Another common mistake is not considering the power consumption implications of each degradation level,
    potentially leading to faster battery depletion rather than extending operational time.
  napkin_math: 'Calculate the maximum combined memory footprint for the primary model, fallback models,
    and necessary buffers to ensure they fit within the ESP32-S3''s 8MB PSRAM and 512KB SRAM.

    *   Primary CNN model (active in Level 1): ~3MB (PSRAM)

    *   Statistical fallback model (loaded into SRAM for Level 2): ~50KB (SRAM)

    *   Sensor data buffer for high-rate sampling: ~100KB (SRAM)

    *   Operating System/Firmware: ~200KB (SRAM)

    Total SRAM used in Level 2: 50KB (fallback model) + 100KB (buffer) + 200KB (OS) = 350KB. (Fits within
    512KB SRAM).

    Total PSRAM used in Level 1: ~3MB (primary model). (Fits within 8MB PSRAM).


    Approximate power budget (`P`) for different operational modes on ESP32-S3 (simplified for concept):

    `P_total = (P_CPU_active_core * N_cores_active) + P_PSRAM + P_SRAM + P_peripherals + P_wireless`

    Each degradation level is designed to have a `P_total` that corresponds to a sustainable operating
    voltage/current for the given battery state, thus extending the device''s operational lifespan. For
    instance, reducing `N_cores_active` from 2 to 1 and disabling wireless communication significantly
    lowers `P_total`.'
