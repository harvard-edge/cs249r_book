title: CNN Operator Scheduling on ARM Cortex-M4 with Limited SRAM
scenario: You are tasked with deploying a pre-trained convolutional neural network (CNN) model (e.g.,
  a small image classifier) onto an ARM Cortex-M4 STM32F4 microcontroller. This specific chip runs at
  168 MHz, has only 256 KB of SRAM, and crucially, lacks a Floating-Point Unit (FPU), meaning all computations
  must be performed using fixed-point arithmetic. The model consists of several convolutional layers,
  ReLU activations, and pooling layers. Your primary goal is to optimize the execution order of these
  operators to minimize peak memory consumption (fitting within the 256 KB SRAM) while maximizing inference
  speed. Describe your approach to scheduling the operators, considering memory reuse, potential for parallel
  execution (e.g., data parallelism if possible on a single core, or task parallelism if pipelineable),
  and layer fusion techniques specific to this constrained environment.
details:
  realistic_solution: 'A realistic solution would involve:

    1.  **Memory-Aware Scheduling**: Employ a topological sort of the computation graph, but prioritize
    scheduling operations that allow for immediate memory reuse of their inputs/outputs. Techniques like
    in-place operations (e.g., ReLU on activation maps) and tiling/strip-mining for larger layers can
    help manage intermediate buffer sizes.

    2.  **Layer Fusion**: Fuse eligible operations like Convolution and ReLU into a single kernel to reduce
    memory transfers and kernel launch overhead. Depending on the framework/toolchain, other fusions (e.g.,
    Conv+BiasAdd+ReLU) might be possible.

    3.  **Fixed-Point Optimization**: Ensure all operations are implemented efficiently using fixed-point
    arithmetic, leveraging any available DSP instructions (e.g., SIMD for `__SSAT` or `__SMLAD` if applicable)
    that the Cortex-M4 might offer, even without a full FPU.

    4.  **Buffer Management**: Implement a sophisticated static memory allocator or a simple bump allocator
    to manage intermediate buffers, actively reusing memory regions as soon as data is no longer needed.

    5.  **Data Parallelism (Micro-Level)**: While the Cortex-M4 is a single core, techniques like loop
    unrolling or explicit SIMD intrinsics (if the compiler supports them for fixed-point operations) can
    provide a form of data parallelism within a single kernel.'
  common_mistake: A common mistake is to schedule operations purely sequentially without considering their
    intermediate activation memory footprint, leading to excessive peak memory usage that exceeds the
    available 256 KB SRAM. Another mistake is to neglect the overhead of fixed-point conversions and arithmetic,
    assuming a direct translation from floating-point models, which can significantly impact performance
    and numerical stability on an FPU-less target.
  napkin_math: '1.  **Memory Footprint**: Estimate the size of input, output, and intermediate activation
    tensors (e.g., `(Channels * Height * Width * BytesPerElement)`). Calculate the peak memory required
    for a naive sequential schedule vs. a memory-optimized schedule. For example, a `64x64x32` fixed-point
    activation map might require `64*64*32*1 = 131072 bytes` (128KB) if 8-bit, or `64*64*32*2 = 262144
    bytes` (256KB) if 16-bit, highlighting immediate memory constraints.

    2.  **Operations Count (MACs/Cycles)**: Count Multiply-Accumulate (MAC) operations for convolutional
    layers. For a `3x3` conv with `Cin` input channels and `Cout` output channels on an `HxW` activation
    map, MACs are `H * W * Cin * Cout * 3 * 3`. Estimate cycles per MAC for fixed-point operations (e.g.,
    2-4 cycles per 16x16-bit MAC on ARM Cortex-M4 without FPU vs. 1 cycle with DSP extension).

    3.  **Throughput Estimation**: Based on total cycles and clock speed (168 MHz), estimate inference
    time in milliseconds. Compare theoretical max throughput with memory-constrained throughput.'
