title: ECG Peak Queue Build-up
scenario: A heart rate monitor processes ECG data packets. Under exercise conditions,
  packets arrive temporarily faster than the Cortex-M4's 50Hz processing rate.
question: Describe what happens to the on-device memory queue if the arrival rate
  temporarily exceeds 50Hz for 10 seconds.
visual:
  kind: svg
  path: tinyml-1583.svg
  alt: Graph showing queue size linearly increasing over a 10-second window.
  caption: Transient Queue Growth
details:
  realistic_solution: Since lambda > mu, utilization rho > 1. The queue enters an
    unstable state and grows linearly. The candidate calculates the backlog size based
    on the difference between arrival and service rates multiplied by time.
  common_mistake: Using M/M/1 steady-state formulas (which require rho < 1) instead
    of recognizing the queue is in a transient unstable phase.
  napkin_math: (60 - 50) * 10 = 100 backlogged packets
