title: ECG Peak Queue Build-up
scenario: A heart rate monitor processes ECG data packets. Under exercise conditions, packets arrive temporarily faster than the Cortex-M4's 50Hz processing rate.
question: Describe what happens to the on-device memory queue if the arrival rate temporarily exceeds 50Hz for 10 seconds.
visual:
  kind: svg
  path: tinyml-1583.svg
  alt: Graph showing queue size linearly increasing over a 10-second window.
  caption: Transient Queue Growth
details:
  realistic_solution: Since arrival rate (λ) > service rate (μ), utilization ρ > 1. The queue enters an unstable transient state and grows linearly. The buffer backlog size is computed as the difference between arrival and service rates multiplied by the duration of the transient window.
  common_mistake: |
    **The Pitfall:** Applying steady-state queueing formulas to transient unstable phases.
    **The Rationale:** Candidates use M/M/1 steady-state formulas (which strictly require ρ < 1) instead of recognizing the queue is in a transient overload state.
    **The Consequence:** They miscalculate required buffer sizes, inevitably leading to buffer overflows and dropped critical ECG telemetry during exercise spikes.
  napkin_math: |
    1. **Assumptions & Constraints**:
       - Cortex-M4 service rate (μ) = 50 Hz.
       - Assumed peak arrival rate (λ) = 60 Hz.
       - Transient duration = 10 seconds.
    2. **Calculations**:
       - Rate differential = 60 Hz - 50 Hz = +10 packets/second.
       - Total backlog = 10 packets/second * 10 seconds = 100 backlogged packets.
    3. **Conclusion & Interpretation**:
       - **Result: Memory-Bound Transient**. The queue rapidly builds a 100-packet backlog, requiring dynamic SRAM buffer allocation to prevent data loss.
