title: Ternary Unpacking Overhead on Cortex-M33
scenario: >
  A keyword spotting model on the Nordic nRF5340 applies extreme ternary quantization (-1, 0, 1), packing 4 weights per byte to reduce model size from 100 KB to 25 KB.
  However, inference latency increases by 3.1ms and total energy consumed per inference rises.
question: Why does ternary packing shrink an nRF5340 KWS model from 100 KB to 25 KB but add 3.1 ms latency?
details:
  realistic_solution: |
    The ARM Cortex-M33 lacks native hardware support for 2-bit/ternary math. The CPU must fetch the packed byte, apply bitmasks and shifts to extract each individual ternary weight, and convert it back to an 8-bit integer before the MAC operation can occur. This software unpacking introduces significant cycle overhead, extending the active time of the 128 MHz core, thereby increasing total energy consumption.
  common_mistake: |
    **The Pitfall:** Assuming smaller weights inherently guarantee faster execution due to reduced memory bandwidth.
    **The Rationale:** Candidates fail to account for the CPU cycle overhead required to unpack sub-byte weights on standard microcontrollers.
    **The Consequence:** Memory is saved, but the device misses real-time deadlines and drains the battery faster due to extended CPU active time.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100k weights, packed 4 per byte.
    - App core: 128 MHz, drawing ~5mA active.
    - Unpack overhead: 4 CPU cycles per weight.

    **Calculations:**
    - Extra CPU cycles: 100,000 weights * 4 cycles/weight = 400,000 cycles.
    - Time overhead: 400,000 cycles / 128,000,000 Hz = 3.125 ms.
    - Energy overhead: 5 mA * 3.125 ms = 15.625 μC extra charge per inference.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound (Unpacking Overhead)**. Software unpacking dominates execution time.
