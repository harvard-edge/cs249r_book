title: Realize Streaming Transformer Inference with Circular KV Buffer
scenario: You are implementing a streaming speech recognition transformer on ESP32-S3 that processes audio in 20ms chunks (16 tokens per chunk) continuously. The model has 2 layers, 4 heads, 32-dim heads with a 128-token sliding window context.
question: How should a circular KV buffer update 20 ms speech chunks on ESP32-S3 while maintaining a 128-token sliding window?
details:
  realistic_solution: 'Circular buffer: allocate 128-token slots per head per layer per K/V. Maintain write_head pointer. On each 16-token chunk: write new K/V at positions [write_head, write_head+16) mod 128. Update write_head = (write_head + 16) mod 128. For attention: generate position indices as circular offsets from write_head. Causal mask: tokens at positions (write_head+1) to (write_head+128) in circular order. Memory: 2x2x4x32x128x1B = 65,536B = 64KB. No extra copy buffer needed. Metadata: 1 int (write_head) per layer = 8 bytes total. Throughput: 16 tokens updated in O(1) pointer arithmetic + 16 sequential writes.'
  common_mistake: |
    **The Pitfall:** Implementing the KV cache as a FIFO queue that shifts all entries.
    **The Rationale:** Candidates default to standard array shifting (O(n) copy) instead of circular buffer arithmetic.
    **The Consequence:** Severe CPU overhead from continuous memory copying, missing the strict real-time deadlines.
  napkin_math: |
    - **KV Buffer Size:** 2 (K,V) * 2 (layers) * 4 (heads) * 32 (dim) * 128 (tokens) * 1 Byte = 65,536 Bytes = 64 KB.
    - **Write Bandwidth:** 16 tokens * 2 (K,V) * 4 (heads) * 32 (dim) * 1 Byte = 4,096 Bytes = 4 KB per chunk.
    - **Data Rate:** 4 KB / 20 ms = **200 KB/s** (easily within the 25.6 GB/s SRAM bandwidth).
