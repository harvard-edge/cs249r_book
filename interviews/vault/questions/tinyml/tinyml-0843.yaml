title: 'Mastery: depthwise separable conv SRAM layout optimization for Cortex-M4'
scenario: You are optimizing a depthwise separable convolution for Cortex-M4 (168MHz, 256KB SRAM, no cache, Harvard architecture). The layer processes 16x16x64 input with 3x3 depthwise + 64->64 pointwise.
question: How should the Cortex-M4 depthwise separable layer be tiled and costed to achieve correct SIMD latency and SRAM use?
details:
  realistic_solution: 1.05M MACs at 4 MACs/2 cycles SIMD = 1.05M * 0.5 cycles/MAC = 525K cycles (not 262K which assumes 4 MACs/1 cycle).
  common_mistake: |
    **The Pitfall:** Loading the full input tensor into SRAM before computing outputs.
    **The Rationale:** Candidates fail to use row-by-row halo tiling for the 3x3 depthwise kernel.
    **The Consequence:** Unnecessary peak SRAM spikes (e.g., 16KB just for input) leading to Out-of-Memory crashes.
  napkin_math: |
    - **Total MACs:** 1.05M.
    - **SIMD Throughput:** Cortex-M4 DSP processes 4 MACs per 2 cycles (using SMLAD/SMLALD instructions).
    - **Cycle Calculation:** 1.05M MACs / (4 MACs / 2 cycles) = 1.05M * 0.5 = **525K cycles**.
