title: The Unforgiving Audio Buffer
scenario: You're designing a keyword spotting system on a Cortex-M4 microcontroller. The audio driver
  is configured to deliver a fresh 100ms-long buffer of audio data to your application for processing.
  To guarantee you never lose any incoming audio, what is the absolute, hard real-time deadline by which
  your inference pipeline must complete its processing of a single buffer?
details:
  realistic_solution: The hard real-time deadline is exactly 100ms. Your processing for buffer N must
    finish before buffer N+1 arrives from the audio hardware. If your inference takes 101ms, you have
    irrevocably lost the first 1ms of the next audio segment. This corrupts the audio stream and will
    cause downstream failures in the keyword spotting model.
  common_mistake: Engineers new to embedded systems sometimes think in terms of average throughput or
    confuse deadlines from other domains (like mobile UI jank at 16ms or edge video at 33ms). They forget
    that in a hard real-time system, missing a single deadline means permanent data loss. There is no
    'catching up' or buffering a queue; the physical world's data is gone forever.
  napkin_math: 'This is a direct application of queueing theory''s simplest case: a single-server queue
    (the MCU) with a deterministic arrival rate (the audio buffer).'
  options:
  - 1ms
  - 33ms
  - 100ms
  - 16ms
  correct_index: 2
