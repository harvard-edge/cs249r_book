title: The Unforgiving Audio Buffer
scenario: You're designing a keyword spotting system on a Cortex-M4 microcontroller. The audio driver is configured to deliver a fresh 100ms-long buffer of audio data to your application for processing.
question: To guarantee you never lose any incoming audio, what is the absolute hard real-time deadline by which inference must complete?
details:
  realistic_solution: The hard real-time deadline is exactly 100ms. Your processing for buffer N must finish before buffer N+1 arrives from the audio hardware. If your inference takes 101ms, you have irrevocably lost the first 1ms of the next audio segment. This corrupts the audio stream and will cause downstream failures in the keyword spotting model.
  common_mistake: |
    **The Pitfall:** Thinking in terms of average throughput rather than hard deterministic deadlines.
    **The Rationale:** Engineers confuse deadlines from other domains (like mobile UI jank at 16ms) and forget that embedded systems lack large dynamic queues to absorb jitter.
    **The Consequence:** Missing a deadline by 1ms results in the permanent loss of the next 1ms of physical audio data, irreparably corrupting the stream.
  napkin_math: |
    *   **Buffer length:** 100 ms.
    *   **Arrival rate:** 1 buffer every 100 ms.
    *   **Service time limit:** To avoid queue backup and data dropping in a single-server system, service time must be strictly **< 100 ms**.
  options:
  - 1ms
  - 33ms
  - 100ms
  - 16ms
