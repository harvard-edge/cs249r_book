title: Randomized Smoothing Latency on Cortex-M4
scenario: You are deploying a vibration-based anomaly detection model on an ARM Cortex-M4 (STM32F4) running at 168 MHz. To defend against physical adversarial perturbations on the sensor, you implement a randomized smoothing defense that requires running inference 20 times with injected input noise to vote on the final prediction. The base model requires 2.1 million INT8 MAC operations per inference.
question: How long does 20-pass randomized smoothing take on Cortex-M4, including overhead, and does it meet the 500 ms deadline?
details:
  realistic_solution: The correct approach calculates the CPU cycles needed for a single inference by dividing the total MACs by the SIMD throughput. This is multiplied by the number of smoothing iterations and the overhead factor. Finally, dividing the total cycles by the CPU clock frequency (168 MHz) yields the latency, which easily clears the deadline.
  common_mistake: |
    **The Pitfall:** Forgetting the CMSIS-NN SIMD capability or mishandling the overhead calculation.
    **The Rationale:** Candidates might treat the M4 as a strictly 1 MAC/cycle processor or apply the 25% overhead incorrectly.
    **The Consequence:** Incorrectly calculating latency and wrongly concluding the system will miss the real-time deadline.
  napkin_math: |
    1. **Single Inference Cycles:** 2,100,000 MACs / 2 MACs/cycle (CMSIS-NN SIMD) = 1,050,000 cycles.
    2. **Total Base Cycles:** 1,050,000 cycles/run * 20 runs = 21,000,000 cycles.
    3. **Adding Overhead:** 21,000,000 * 1.25 (25% memory/noise overhead) = 26,250,000 cycles.
    4. **Total Latency:** 26,250,000 cycles / 168,000,000 cycles/sec = 0.15625 seconds.
    5. **Result:** At **156.25 ms**, it comfortably meets the 500 ms real-time deadline.
