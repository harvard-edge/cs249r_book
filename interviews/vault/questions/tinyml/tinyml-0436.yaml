title: The Mixed-Precision Memory Budget
scenario: You need to deploy a small Convolutional-RNN model for audio analysis onto a microcontroller
  with 454KB of available Flash for the model weights. The full FP32 model has 250KB of weights for its
  CNN layers and 750KB of weights for its RNN layers, totaling 1000KB. A fully INT8-quantized model fits
  in Flash but suffers unacceptable accuracy loss in the RNN layers. You must use mixed precision. To
  meet the 454KB Flash budget while maximizing accuracy, which quantization strategy should you apply?
question: "To meet the 454KB Flash budget while maximizing accuracy, which quantization strategy should you apply?"
details:
  realistic_solution: The optimal strategy is to apply the most aggressive quantization to the most robust
    layers. CNN layers are highly parallel and feed-forward, making them very robust to INT8 quantization.
    RNN layers, however, accumulate errors over time and are sensitive to precision. The best choice is
    to quantize the CNN layers to INT8 and convert the sensitive RNN layers to FP16. This provides a 2x
    memory saving on the most sensitive part of the model and a 4x saving on the most robust part, striking
    the right balance.
  common_mistake: A common mistake is to quantize layers based only on their size, for instance, aggressively
    quantizing the largest (RNN) layers. This ignores the fact that recurrent layers are notoriously sensitive
    to precision loss due to their sequential nature and feedback loops. The correct approach prioritizes
    quantizing layers that are most robust to it, like CNNs.
  napkin_math: 1. **Baseline (FP32):** 250KB (CNN) + 750KB (RNN) = 1000KB. Too large.
  options:
  - Keep the CNN layers as FP32 and quantize the RNN layers to INT8.
  - The model is too large and must be pruned or redesigned.
  - Quantize the CNN layers to INT8 and convert the RNN layers to FP16.
  - Quantize all layers to FP16.
  correct_index: 2
