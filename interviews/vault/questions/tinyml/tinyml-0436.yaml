title: The Mixed-Precision Memory Budget
scenario: You need to deploy a small Convolutional-RNN model for audio analysis onto a microcontroller with 454KB of available Flash for the model weights. The full FP32 model has 250KB of weights for its CNN layers and 750KB of weights for its RNN layers, totaling 1000KB. A fully INT8-quantized model fits in Flash but suffers unacceptable accuracy loss in the RNN layers.
question: To meet the 454KB Flash budget while maximizing accuracy, which mixed-precision quantization strategy should you apply?
details:
  realistic_solution: The optimal strategy is to apply the most aggressive quantization to the most robust layers. CNN layers are highly parallel and feed-forward, making them very robust to INT8 quantization. RNN layers, however, accumulate errors over time and are sensitive to precision. The best choice is to quantize the CNN layers to INT8 and convert the sensitive RNN layers to FP16. This provides a 4x memory saving on the most robust part of the model and a 2x saving on the most sensitive part, striking the right balance.
  common_mistake: |
    **The Pitfall:** Aggressively quantizing the largest layers (RNN) simply because they take up the most space.
    **The Rationale:** Ignoring that recurrent layers accumulate errors over time and are notoriously sensitive to precision loss.
    **The Consequence:** Destroying the model's accuracy to save space, rendering the application useless.
  napkin_math: |
    1. **Baseline (FP32):** 250 KB (CNN) + 750 KB (RNN) = 1000 KB.
    2. **INT8 CNN + FP16 RNN:** (250 / 4) + (750 / 2) = 62.5 + 375 = **437.5 KB**.
    3. **Budget Check:** 437.5 KB < 454 KB budget.
    4. **Conclusion:** This option fits the memory constraints while keeping the sensitive RNN layers at a safer FP16 precision.
  options:
  - Keep the CNN layers as FP32 and quantize the RNN layers to INT8.
  - The model is too large and must be pruned or redesigned.
  - Quantize the CNN layers to INT8 and convert the RNN layers to FP16.
  - Quantize all layers to FP16.
  correct_index: 2
