title: 'TinyML TCO Optimization: Quantization Savings for TinyML Fleet'
scenario: A fleet of 5000 ESP32-S3 (240MHz, 512KB SRAM, 8MB PSRAM, 2mA inference, 20μA sleep) sensors runs a FP32 model (40ms inference, 100KB SRAM, uses external PSRAM drawing 500μA). You are proposing INT8 quantization (5ms inference, 25KB SRAM, no PSRAM needed). The fleet does 1 inference/30s, using 3V 2000mAh batteries, and power costs $0.10/kWh.
question: What is the battery life improvement, fleet-wide annual power savings, and is the $20K quantization engineering cost justified over 3 years?
details:
  realistic_solution: 'FP32: inference=40ms. PSRAM active during inference: 500μA. At 1 inference/30s: inference duty=40ms/30000ms=0.133%. PSRAM duty=same. Avg inference power: (2mA+0.5mA)*0.001333=3.33μA. INT8: inference=5ms. No PSRAM. At 1 inf/30s: duty=5/30000=0.0167%. Avg inference power: 2mA*0.000167=0.33μA. Plus MCU sleep current unchanged: 20μA. FP32 total avg: 20μA+3.33μA=23.33μA. INT8 total: 20μA+0.33μA=20.33μA. Savings: 3.0μA per device. Battery (2000mAh): FP32 life=2000/0.02333=85,726hr=9.79yr. INT8=2000/0.02033=98,376hr=11.23yr. Improvement: 14.8% longer battery. Annual power savings per device: 3.0μA*3V*8760hr=78.8mWh. 5000 units: 0.394 kWh/yr = $0.039/yr (at $0.10/kWh). Engineering $20K not justified by power savings alone! Justified if flash savings reduce BOM (no PSRAM: save $0.50/unit: 5000*$0.50=$2500). Still not $20K.'
  common_mistake: |
    **The Pitfall:** Calculating power savings only from the inference time reduction.
    **The Rationale:** Candidates focus on compute reduction but overlook the elimination of external memory access (PSRAM).
    **The Consequence:** They vastly underestimate the total energy savings and completely miss the BOM cost reduction of removing the PSRAM chip.
  napkin_math: |
    - **FP32 Power:** 40ms @ (2mA + 0.5mA) + sleep. Duty cycle = 40ms / 30000ms = 0.133%. Average from inference: 3.33μA. Plus sleep 20μA. Total: 23.33μA.
    - **INT8 Power:** 5ms @ 2mA, no PSRAM. Duty cycle = 5ms / 30000ms = 0.0167%. Average: 0.33μA. Plus 20μA. Total: 20.33μA.
    - **Battery Life:** FP32 = 2000mAh / 0.02333mA = 9.79yr. INT8 = 2000mAh / 0.02033mA = 11.23yr. Improvement: **14.8% longer battery**.
    - **Annual Power Savings:** 5000 * 3.0μA * 3V * 8760hr = 0.394 kWh/yr = **$0.039/yr** (at $0.10/kWh).
    - **BOM Savings:** No PSRAM saves ~$0.50/unit: 5000 * $0.50 = **$2500**.
    - **Conclusion:** Total benefits ($2500 BOM + $0.12 power over 3 years) is **not justified** against the $20K engineering cost.
