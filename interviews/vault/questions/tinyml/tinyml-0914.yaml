title: 'TinyML TCO Optimization: Quantization Savings for TinyML Fleet'
scenario: A fleet of 5000 ESP32-S3 sensors runs a FP32 model (40ms inference, 100KB SRAM, uses external PSRAM drawing 500μA). You are proposing INT8 quantization (5ms inference, 25KB SRAM, no PSRAM needed). The fleet does 1 inference/30s, using 3V 2000mAh batteries, and power costs $0.10/kWh.
question: What is the battery life improvement, fleet-wide annual power savings, and is the $20K quantization engineering cost justified over 3 years?
details:
  realistic_solution: Evaluate the total cost of ownership (TCO) spanning both utility power savings and hardware BOM reductions. The INT8 quantization completely eliminates the 500μA external PSRAM penalty and radically drops the active duty cycle. While utility cost savings are trivial ($0.04/yr), eliminating PSRAM chips on 5000 units provides an immediate CAPEX recoup.
  common_mistake: |
    **The Pitfall:** Calculating power savings purely from the computational inference time reduction.
    **The Rationale:** Candidates laser-focus on CPU FLOP reduction while fundamentally ignoring the power consumption of external memory IO.
    **The Consequence:** They vastly underestimate energy savings and entirely miss the BOM cost drop from physically removing the PSRAM chip.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sleep current: 20 μA. Inference period: 30s (30,000ms).
    - FP32: 40ms @ 2.5mA (2mA CPU + 0.5mA PSRAM).
    - INT8: 5ms @ 2mA (No PSRAM).
    - Batteries: 3V 2000mAh. Power: $0.10/kWh. Fleet: 5000 units.

    **Calculations:**
    - FP32 Duty Cycle: 40/30000 = 0.133%. Average Inference: 2500μA * 0.00133 = 3.33 μA. Total: 23.33 μA.
    - INT8 Duty Cycle: 5/30000 = 0.0167%. Average Inference: 2000μA * 0.000167 = 0.33 μA. Total: 20.33 μA.
    - Battery delta: FP32 = 9.79 years; INT8 = 11.23 years (14.8% increase).
    - Power Savings (5000 units): 3.0 μA * 3V = 9 μW * 5000 = 45 mW = 0.394 kWh/yr = ~$0.04/yr.
    - BOM Savings: PSRAM elimination (~$0.50/unit * 5000) = $2,500.

    **Conclusion & Interpretation:**
    - **Result: $2,500 BOM, $0.04/yr (Unjustified Expense)**. The total 3-year return is ~$2,500 in BOM and negligible utility savings, drastically failing to justify the $20K engineering overhead.
