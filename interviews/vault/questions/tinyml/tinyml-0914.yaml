title: 'TinyML TCO Optimization: Quantization Savings for TinyML Fleet'
scenario: 'A fleet of 5000 ESP32-S3 (240MHz, 512KB SRAM, 8MB PSRAM, 2mA inference) sensors runs a FP32 model (40ms inference, 100KB SRAM, uses external PSRAM). Propose INT8 quantization (5ms inference, 25KB SRAM, no PSRAM needed). Calculate: battery life improvement, fleet-wide annual power savings, and whether the $20K quantization engineering cost is justified over 3 years.'
question: 'How would you calculate : battery life improvement, fleet-wide annual power savings, and whether the $20K quantization engineering cost is justified over 3 years?'
details:
  realistic_solution: 'FP32: inference=40ms. PSRAM active during inference: 500\u03bcA. At 1 inference/30s: inference duty=40ms/30000ms=0.133%. PSRAM duty=same. Avg inference power: (2mA+0.5mA)*0.001333=3.33\u03bcA. INT8: inference=5ms. No PSRAM. At 1 inf/30s: duty=5/30000=0.0167%. Avg inference power: 2mA*0.000167=0.33\u03bcA. Plus MCU sleep current unchanged: 20\u03bcA. FP32 total avg: 20\u03bcA+3.33\u03bcA=23.33\u03bcA. INT8 total: 20\u03bcA+0.33\u03bcA=20.33\u03bcA. Savings: 3.0\u03bcA per device. Battery (2000mAh): FP32 life=2000/0.02333=85,726hr=9.79yr. INT8=2000/0.02033=98,376hr=11.23yr. Improvement: 14.8% longer battery. Annual power savings per device: 3.0\u03bcA*3V*8760hr=78.8mWh. 5000 units: 0.394 kWh/yr = $0.039/yr (at $0.10/kWh). Engineering $20K not justified by power savings alone! Justified if flash savings reduce BOM (no PSRAM: save $0.50/unit: 5000*$0.50=$2500). Still not $20K.'
  common_mistake: Calculating power savings only from inference time reduction without accounting for the elimination of PSRAM (which draws ~500\u03bcA when active), which may provide equal or greater savings.
  napkin_math: 'FP32: 40ms@(2+0.5)mA + sleep. Duty=0.133%. Avg from inference: 3.33\u03bcA. Plus sleep 20\u03bcA. Total: 23.33\u03bcA. INT8: 5ms@2mA, no PSRAM. Duty=0.0167%. Avg: 0.33\u03bcA. Plus 20\u03bcA. Total: 20.33\u03bcA. BOM savings (no PSRAM): 5000*$0.50=$2500. Power savings 3yr: 5000*3.0\u03bcA*3V*26280hr = 1.18 kWh = $0.12 (at $0.10/kWh). Total benefits: $2500 BOM + $0.12 power = $2500.12 vs $20K engineering. NOT justified on cost alone. Justified if: (1) PSRAM failure risk eliminated (reliability improves), (2) smaller firmware enables OTA over BLE instead of WiFi (saves cellular cost). If OTA cost $0.10/device/update *4/yr*5000*3yr=$6K saved: total $8.5K vs $20K. Still not justified.'
