title: Realize Streaming Transformer Inference with Circular KV Buffer
scenario: You are implementing a streaming speech recognition transformer on ESP32-S3 that processes audio
  in 20ms chunks (16 tokens per chunk) continuously. The model has 2 layers, 4 heads, 32-dim heads with
  a 128-token sliding window context. You must implement a circular KV buffer that efficiently updates
  on each chunk arrival without copying, maintaining correct attention over the last 128 tokens. Realize
  the buffer management logic and compute the memory overhead.
question: "How should a circular KV buffer update 20 ms speech chunks on ESP32-S3 while maintaining a 128-token sliding window?"
details:
  realistic_solution: 'Circular buffer: allocate 128-token slots per head per layer per K/V. Maintain
    write_head pointer. On each 16-token chunk: write new K/V at positions [write_head, write_head+16)
    mod 128. Update write_head = (write_head + 16) mod 128. For attention: generate position indices as
    circular offsets from write_head. Causal mask: tokens at positions (write_head+1) to (write_head+128)
    in circular order. Memory: 2×2×4×32×128×1B = 65,536B = 64KB. No extra copy buffer needed. Metadata:
    1 int (write_head) per layer = 8 bytes total. Throughput: 16 tokens updated in O(1) pointer arithmetic
    + 16 sequential writes.'
  common_mistake: Implementing KV cache as a FIFO queue that shifts all 128 entries on each 16-token update
    (O(n) copy); circular buffer makes this O(1) with a head pointer.
  napkin_math: 'KV buffer: 2(KV)×2(layers)×4(heads)×32(dim)×128(tokens)×1B = 65,536B = 64KB. Write bandwidth:
    16 tokens × 2(KV) × 4(heads) × 32(dim) × 1B = 4,096B = 4KB per chunk. At 20ms chunks: 4KB/20ms = 200KB/s
    write rate << 25.6 GB/s SRAM bandwidth.'
