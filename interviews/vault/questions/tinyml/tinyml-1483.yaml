title: Burst Handling and Queue Overflow on ESP32-S3
scenario: An ESP32-S3 (240MHz, 512KB SRAM, 8MB PSRAM) processes audio keyword detection at 10 inferences/s normally, but bursty noise events arrive at 50/s for 200ms bursts. Each inference takes 80ms.
question: How would you design a queuing strategy to handle 50/s bursts without losing critical events on an ESP32-S3?
details:
  realistic_solution: 'During burst: λ=50/s, μ=12.5/s → ρ=4, unstable. Queue grows at 37.5 items/s during 200ms burst → accumulates 7-8 events. After burst (λ=10/s, μ=12.5/s, ρ=0.8), drain time ≈ 8 events / (2.5 items/s drain rate) ≈ 3.2s. Strategy: (1) cap queue at 8 items using PSRAM (8MB easily holds 1000 items), (2) use priority queue — keep only highest-confidence partial events during overload, (3) implement token bucket to limit effective λ to 15/s.'
  common_mistake: |
    **The Pitfall:** Using a simple FIFO queue and assuming the burst will just drain naturally.
    **The Rationale:** Ignoring that an arrival rate of 50/s while processing at 12.5/s creates a massive server-load overload (ρ=4).
    **The Consequence:** The queue rapidly overflows available SRAM, crashing the system, or low-priority noise events push out high-confidence critical events.
  napkin_math: |
    1. **Processing Rate (μ):** 1000 ms / 80 ms = 12.5 items/s.
    2. **Burst Arrival (λ):** 50/s for 200ms = 10 events arrive.
    3. **Processed during Burst:** 12.5 * 0.2s = 2.5 events.
    4. **Peak Queue Depth:** 10 arrived - 2.5 processed = **7.5 events queued**.
    5. **Memory Sizing:** 8 events * ~2KB/event = 16KB. Easily fits in PSRAM or SRAM.
