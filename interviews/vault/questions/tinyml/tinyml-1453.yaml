title: Adversarial Robustness in ESP32-S3 Anomaly Detection
scenario: You are deploying a critical anomaly detection model on an ESP32-S3 device (240 MHz dual-core, 512 KB SRAM, 8 MB PSRAM). The model is a quantized TFLM network requiring 300KB of RAM for weights and activations. Recent intelligence suggests an adversary is attempting to bypass detection by injecting subtly perturbed sensor readings (adversarial examples).
question: How should an ESP32-S3 anomaly detector mitigate adversarial sensor readings while balancing SRAM, PSRAM, and CPU overhead?
details:
  realistic_solution: A realistic solution would involve a multi-layered approach tailored for tinyML constraints. First, implement lightweight pre-processing defenses such as randomized quantization, input denoising (e.g., simple moving average or median filters applied cautiously to avoid altering legitimate features), or input squeezing (reducing bit depth or spatial resolution) on the sensor data stream. Second, consider a very simple, model-agnostic anomaly score thresholding on the model's confidence output or intermediate layers. For critical applications, a secondary, extremely lightweight statistical model (e.g., an Isolation Forest with very few trees) running on a less frequently sampled data window could act as a 'watchdog' for unusual input patterns that bypass the primary model. Leverage the PSRAM (8MB) for storing larger, pre-computed defense parameters or for buffering input sequences, but keep active processing within the faster SRAM (512KB). Quantization-aware training with robust datasets is essential during model development to inherently improve resilience, rather than relying solely on post-deployment defenses.
  common_mistake: |
    **The Pitfall:** Proposing computationally expensive adversarial training or complex runtime input transformations (like gradient masking).
    **The Rationale:** Candidates pull standard defenses from cloud CV/NLP literature without considering the hardware.
    **The Consequence:** Applying heavyweight defenses on a 240 MHz microcontroller leads to severe real-time performance degradation or outright deployment failure.
  napkin_math: |
    * **Baseline Compute:** Inference takes 50ms.
    * **Defense Overhead:** A denoising filter takes 10ms (2.4 million cycles at 240 MHz).
    * **Defense Memory:** Filter buffer requires 100 KB (20% of 512 KB SRAM).
    * **Watchdog Model:** An Isolation Forest (50 trees, 1KB each) adds 50 KB to memory footprint.
    * **Conclusion:** Any defense strategy must map overhead explicitly against the remaining 212 KB of SRAM (512 - 300) and the real-time latency budget.
