title: Graceful Degradation for Real-time TinyML Anomaly Detection
scenario: A smart industrial sensor performs real-time vibration analysis on a Cortex-M7 (480 MHz, 512 KB SRAM) + Ethos-U55 (256 MAC/cycle). During peak hours, increased noise causes the primary high-fidelity model to miss its 10ms latency budget.
question: How should a Cortex-M7 plus Ethos-U55 anomaly detector use degradation ladders, fail-safe states, and QoS shedding under overload?
details:
  realistic_solution: Implement a multi-tier degradation ladder with pre-quantized and pruned models permanently stored in flash. Use a state machine to transition between model tiers based on latency and queue depth. A truly fail-safe state abandons inference to simply collect raw data and signal a fault, while fail-operational models shed QoS layers but continue basic detection.
  common_mistake: |
    **The Pitfall:** Proposing solutions that dynamically load full models from external flash.
    **The Rationale:** Candidates assume abundant memory bandwidth and fail to account for the catastrophic latency overhead of flash reads during an overload.
    **The Consequence:** The system crashes during the transition phase, failing to meet the tight 10ms deadline.
  napkin_math: |
    - Available ML SRAM: 512 KB - 150 KB (OS) = 362 KB.
    - Ethos-U55 throughput: 256 MAC/cycle * 480 MHz = 122.88 GMAC/s.
    - 100 MMAC primary model: 100M / 122.88G ≈ 0.81 ms ideal compute (real-world overhead pushes this closer to 10ms).
    - **To meet a degraded 5ms deadline under load, the fallback model must target significantly fewer MACs (<60 MMACs).**
