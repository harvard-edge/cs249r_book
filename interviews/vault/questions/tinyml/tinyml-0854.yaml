title: 'Dataset Curation: Realize Dataset Storage Architecture for TinyML Training Pipeline'
scenario: Realize the complete storage and format architecture for a TinyML training dataset targeting Cortex-M7+Ethos-U55 (480MHz, 512KB SRAM, NPU) deployment. The dataset contains 100K audio samples.
question: How would you specify file formats, feature pre-computation, quantization pipeline, and validation set splits?
details:
  realistic_solution: 'Pre-compute: raw WAV → float32 MFCC → int8 quantized MFCC (matching MCU inference). Store as HDF5 or TFRecord. Pre-split: 70/15/15 train/val/test stratified by class and collection environment.'
  common_mistake: |
    **The Pitfall:** Storing raw WAV files and computing features on-the-fly during training, while failing to use quantized representations.
    **The Rationale:** In standard deep learning, dynamically building features is common to leverage data augmentation easily without storage bloat.
    **The Consequence:** The training pipeline is severely bottle-necked by repetitive and costly CPU feature computation. More critically, the deployed model will exhibit massive accuracy degradation on the MCU because the training pipeline didn't perfectly match the fixed-point operations of the target hardware.
  napkin_math: |
    - Raw WAV size: 100K samples × 1-sec × 16kHz = 100K × 32 KB = **3.2 GB**.
    - Pre-computed float32 MFCC (99x40): 100K × 15.8 KB = **1.58 GB**.
    - INT8 MFCC: 100K × 3.95 KB = **395 MB**.
    - Splitting Strategy: 70K train, 15K val, 15K test.
    - Stratification: 12 classes × 3 environments (clean/noisy/far-field) = 36 strata.
    - HDF5 Chunking: 1,000 samples/chunk = 3.95 MB/chunk (enables efficient random access loading).
    - Validation: 15K samples validated via MCU simulator must show < 1% accuracy drop compared to the TFLite evaluation.
