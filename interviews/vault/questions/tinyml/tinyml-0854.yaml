title: 'Dataset Curation: Realize Dataset Storage Architecture for TinyML Training
  Pipeline'
scenario: Realize the complete storage and format architecture for a TinyML training
  dataset targeting Cortex-M7+Ethos-U55 (480MHz, 512KB SRAM, NPU) deployment. The
  dataset contains 100K audio samples. Specify file formats, feature pre-computation,
  quantization pipeline, and validation set splits.
question: How would you specify file formats, feature pre-computation, quantization
  pipeline, and validation set splits?
details:
  realistic_solution: 'Pre-compute: raw WAV → float32 MFCC → int8 quantized MFCC (matching
    MCU inference). Store as HDF5 or TFRecord. Pre-split: 70/15/15 train/val/test
    stratified by class and collection environment.'
  common_mistake: Storing raw WAV files and computing features on-the-fly during training
    — inefficient. Not pre-computing the quantized features that match the MCU's inference
    format.
  napkin_math: '100K samples × 1-sec × 16kHz WAV = 100K × 32KB = 3.2GB raw. Pre-computed
    float32 MFCC (99×40): 100K × 15.8KB = 1.58GB. Int8 MFCC: 100K × 3.95KB = 395MB.
    Store both: float32 for ablation, int8 for final training (matches MCU). HDF5
    chunking: 1,000 samples/chunk = 3.95MB/chunk → random access in 1 chunk load.
    Splits: 70K train, 15K val, 15K test. Stratification: 12 classes × environment
    (clean/noisy/far-field) = 36 strata. Validation set must include all environments.
    TFRecord for TF Lite training: 100K × 4KB = 400MB. Ethos-U55 model validation:
    test set 15K samples run through MCU simulator to verify TFLite → Ethos-U55 accuracy
    drop < 1%.'
