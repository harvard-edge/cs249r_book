title: Analyzing SRAM OOM in Early Convolution Layers
scenario: We are deploying an INT8 quantized CNN for audio classification on an ARM Cortex-M4 (STM32F4)
  microcontroller featuring 256 KB of SRAM and 1 MB of Flash. The compiled model weights and code take
  150 KB and are stored in Flash. The first convolutional layer takes a 1x64x64 INT8 spectrogram input,
  applies 32 filters of 3x3 with stride 1 and SAME padding. When running this layer using CMSIS-NN, the
  system crashes with an SRAM out-of-memory (OOM) error. Explain why this happens given the hardware specifications.
details:
  realistic_solution: To determine if the layer can execute, we must calculate the peak dynamic memory
    footprint in SRAM. While the weights reside in Flash, SRAM must hold the input tensor, the output
    tensor, and the CMSIS-NN im2col scratch buffer simultaneously during the layer's execution. When these
    are combined with the baseline SRAM usage of the RTOS and system stack, it exceeds the 256 KB limit.
  common_mistake: Candidates often only compare the static model size (150 KB) against the Flash (1 MB)
    or SRAM (256 KB) and conclude there is plenty of room. They fail to account for the dynamic memory
    allocations required during inference, specifically the input tensor, output activations, and intermediate
    working buffers needed for the convolution operation.
  napkin_math: 'SRAM Capacity: 256 KB. Input tensor: 64 x 64 x 1 byte = 4 KB. Output tensor: 64 x 64 x
    32 bytes = 128 KB. CMSIS-NN im2col buffer (worst-case full expansion): 3 x 3 x 1 (filter size) x 64
    x 64 (output spatial dims) = 36,864 bytes (~36 KB). Total SRAM required just for this layer''s execution
    = 4 KB + 128 KB + 36 KB = 168 KB. If the system (RTOS, stack, other tasks) uses more than 88 KB of
    SRAM, the 256 KB limit is exceeded, causing the OOM crash.'
