title: TinyML Federated Round Airtime
scenario: A fleet of 5,000 TinyML sensors sends compressed model deltas over LoRaWAN.
  Each update is 8 KB and the gateway can receive an effective 40 KB/s aggregate during
  the nightly window. Estimate the minimum receive time for one round.
question: How long does a gateway need to receive 5,000 TinyML updates of 8 KB each
  at 40 KB/s aggregate throughput?
details:
  realistic_solution: Total payload is 5,000 x 8 KB = 40,000 KB. At 40 KB/s, the lower-bound
    receive time is 1,000 seconds, or about 16.7 minutes. Real LoRaWAN scheduling,
    collisions, and duty-cycle limits can make it longer.
  common_mistake: Multiplying per-device payload by one device and ignoring fleet
    fan-in at the gateway.
  napkin_math: Total = 5,000 x 8 KB = 40,000 KB. Time = 40,000 / 40 = 1,000 s = 16.7
    min.
