title: 'Model Size Estimation: Realize Full System Memory for ESP32-S3 Voice Assistant'
scenario: Size the memory layout for an ESP32-S3 voice assistant featuring FreeRTOS (32KB SRAM), wake-word detection (100K INT8), command recognition (500K INT8), audio ring buffer (160KB for 5s at 16kHz INT16), I2S audio driver (4KB), WiFi stack, and MQTT client.
question: How should SRAM, PSRAM, and Flash be allocated for the ESP32-S3 voice assistant with two models and audio buffering?
details:
  realistic_solution: TFLM requires statically allocated activation arenas (~2x params). The large command model arena (1MB) exceeds the 512KB SRAM, forcing its placement in PSRAM.
  common_mistake: |
    **The Pitfall:** Placing the 160KB audio ring buffer or the 1MB command activation arena in SRAM.
    **The Rationale:** Forgetting to calculate activation arena size (often 2x parameter count) and blindly assigning buffers to the fastest memory.
    **The Consequence:** The system will immediately crash with an out-of-memory (OOM) error on the 512KB SRAM.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - ESP32-S3: 512KB SRAM, 8MB PSRAM, 16MB Flash.
       - Models: WW (100K params), Command (500K params).
       - Activation arena rule-of-thumb: ~2x params.
    2. **Calculations:**
       - SRAM usage: 32KB (FreeRTOS) + 4KB (I2S) + 64KB (WiFi) + 30KB (TFLM) + 200KB (WW arena) = 330KB. Fits in 512KB.
       - PSRAM usage: 160KB (Audio buffer) + 1MB (Command arena) = 1.16MB. Fits in 8MB.
       - Flash usage: 3MB (FW) + 100KB + 500KB (Weights) = 3.6MB. Fits in 16MB.
    3. **Conclusion & Interpretation:**
       **Result: WW in SRAM, Command in PSRAM.** The system is **SRAM-Bound** for the large command model, necessitating off-chip PSRAM for its activations.
