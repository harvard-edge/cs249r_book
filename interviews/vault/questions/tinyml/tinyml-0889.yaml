title: 'Model Size Estimation: Realize Full System Memory for ESP32-S3 Voice Assistant'
scenario: Size the complete memory layout for an ESP32-S3 (240MHz, 512KB SRAM, 8MB PSRAM, 16MB Flash) voice assistant with: FreeRTOS (32KB SRAM), wake-word detection model (100K INT8), command recognition model (500K INT8), audio ring buffer (160KB for 5 seconds at 16kHz INT16), I2S audio driver (4KB), WiFi stack, and MQTT client.
question: How should SRAM, PSRAM, and Flash be allocated for the ESP32-S3 voice assistant with two models and audio buffering?
details:
  realistic_solution: 'SRAM (512KB): FreeRTOS 32KB + I2S driver 4KB + WiFi stack (IRAM-mapped critical): 64KB + TFLM runtime 30KB + WW activation arena (100K model, 2x ratio): 200KB → 330KB total. Audio ring buffer: 160KB — put in PSRAM. SRAM total: 330KB < 512KB ✓ (182KB free). PSRAM (8MB): audio ring buffer 160KB + Command model activation arena (1MB). Model 2 weights (500KB) can also be copied here. Flash (16MB): FW+RTOS+WiFi: 3MB + Model 1 (100KB) + Model 2 (500KB) = 3.6MB. All fit easily.'
  common_mistake: |
    **The Pitfall:** Placing the 160KB audio ring buffer or the 1MB command activation arena in SRAM.
    **The Rationale:** Forgetting to calculate activation arena size (often 2x parameter count) and blindly assigning buffers to the fastest memory.
    **The Consequence:** The system will immediately crash with an out-of-memory (OOM) error on the 512KB SRAM.
  napkin_math: |
    1. **SRAM (512KB):** FreeRTOS (32KB) + I2S (4KB) + WiFi stack (64KB) + TFLM runtime (30KB) + WW arena (100K×2 = 200KB) = **330KB**. Fits in 512KB.
    2. **PSRAM (8MB):** Audio ring buffer (160KB) + Command arena (500K×2 = 1MB) + Command weights (500KB) = **1.66MB**. Fits in 8MB.
    3. **Flash (16MB):** FW/RTOS/WiFi (3MB) + WW Model (100KB) + Command Model (500KB) = **3.6MB**. Fits in 16MB.
    4. **Conclusion:** Command model activation is too large for SRAM and must be placed in PSRAM.
