title: Designing Quantization for Keyword Spotting on Cortex-M4
scenario: You are tasked with deploying a 500 KB (FP32) keyword spotting CNN onto a microcontroller. The target platform operates at 168 MHz, features CMSIS-NN SIMD instructions (2x INT8 MACs/cycle) but lacks a hardware FPU.
question: What INT8 quantization specification lets a 500 KB FP32 keyword spotter avoid FPU emulation and fit memory limits?
details:
  realistic_solution: The design must specify INT8 quantization for weights (symmetric) and activations (asymmetric) to leverage the 2x INT8 MACs/cycle CMSIS-NN SIMD instructions. To avoid the FPU-less bottleneck, the specification must require folding batch normalization and representing the FP32 scale factors as a combination of an INT32 multiplier and a bit shift (fixed-point arithmetic). Per-channel quantization should be specified for convolutional weights to maintain accuracy, fitting the quantized ~125 KB model comfortably within the 1 MB flash.
  common_mistake: |
    **The Pitfall:** Proposing generic INT8 quantization without addressing floating-point scaling factors.
    **The Rationale:** Candidates overlook that even if weights and activations are INT8, standard de-quantization steps require floating-point operations. On an FPU-less MCU, these will trigger slow software emulation.
    **The Consequence:** The memory footprint is successfully reduced, but the model latency is drastically worse than expected due to software FP32 emulation bottlenecks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Original model: 500 KB FP32.
       - Hardware: 168 MHz, no FPU.
       - MAC count: 1,000,000 MACs.
       - Emulated FP32 cost: ~100 cycles/MAC.
       - SIMD INT8 throughput: 2 MACs/cycle (0.5 cycles/MAC).
    2. **Calculations:**
       - Quantized size: 500 KB / 4 = 125 KB INT8.
       - FP32 Emulation Time: 1,000,000 MACs × 100 cycles/MAC = 100,000,000 cycles.
       - FP32 Latency: 100,000,000 / 168,000,000 = 0.595 s (595 ms).
       - INT8 SIMD Time: 1,000,000 MACs × 0.5 cycles/MAC = 500,000 cycles.
       - INT8 Latency: 500,000 / 168,000,000 = 0.00297 s (~3 ms).
       - Speedup: 595 ms / 3 ms ≈ 198×.
    3. **Conclusion & Interpretation:**
       - **Result: ~200× Speedup. Compute-Bound.** Proper fixed-point quantization avoids software FPU emulation bottlenecks, enabling real-time execution.
