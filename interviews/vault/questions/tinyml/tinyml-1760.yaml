title: Per-Channel INT8 Quantization for Depthwise Convolutions
scenario: You deploy an INT8 quantized depthwise-separable convolution on an MCU. You observe that the depthwise layer loses significant accuracy compared to standard convolutions under post-training quantization.
question: Evaluate why depthwise convolutions are particularly sensitive to per-tensor INT8 quantization and suggest a remedy.
details:
  realistic_solution: Depthwise convolutions apply an independent filter to each input channel, leading to highly variable, multi-modal weight distributions across channels. Per-tensor quantization enforces a single global scale factor and zero-point across the entire tensor, catastrophically destroying the precision of channels with narrow dynamic ranges. To recover accuracy, engineers must implement per-channel quantization, computing and applying an independent scale factor (`S_c`) and zero-point for each specific filter channel.
  common_mistake: |
    **The Pitfall:** Blaming activation quantization exclusively for accuracy drops in depthwise layers.
    **The Rationale:** Engineers assume standard spatial convolutions and depthwise convolutions exhibit identical mathematical stability under per-tensor quantization.
    **The Consequence:** The distinct weight distributions inherent to depthwise operations are clipped and crushed, ruining model accuracy.
  napkin_math: |
    **Assumptions & Constraints:**
    - Per-tensor quantization uses 1 global scale factor.
    - Depthwise convolutions have highly varying ranges per channel.

    **Calculations:**
    - A channel with range [-0.1, 0.1] forced to use a global scale factor derived from a [-5.0, 5.0] channel loses nearly all of its 8-bit resolution (effectively 1- or 2-bit).

    **Conclusion & Interpretation:**
    - **Result: 1- or 2-bit effective resolution (Precision-Bound)**. Per-channel quantization with independent scale factors is mandatory to preserve dynamic range.
