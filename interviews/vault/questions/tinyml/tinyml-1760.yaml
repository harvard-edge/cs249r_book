title: Per-Channel INT8 Quantization for Depthwise Convolutions
scenario: You deploy an INT8 quantized depthwise-separable convolution on a Cortex-M4.
  You observe that the depthwise layer loses significant accuracy compared to standard
  convolutions under post-training quantization.
question: Evaluate why depthwise convolutions are particularly sensitive to per-tensor
  INT8 quantization and suggest a remedy.
details:
  realistic_solution: Depthwise convolutions apply a single filter per input channel,
    making the weight distributions highly variable across individual channels. Per-tensor
    quantization forces a single scale factor across all weights, destroying the precision
    of channels with smaller dynamic ranges. Using per-channel quantization provides
    an independent scale per filter, resolving the degradation.
  common_mistake: Blaming the activation quantization exclusively without realizing
    depthwise weights have inherently problematic multi-modal distributions in per-tensor
    schemes.
  napkin_math: 1 scale for C channels vs C independent scales.
