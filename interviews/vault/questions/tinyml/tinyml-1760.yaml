title: Per-Channel INT8 Quantization for Depthwise Convolutions
scenario: You deploy an INT8 quantized depthwise-separable convolution on a Cortex-M4. You observe that the depthwise layer loses significant accuracy compared to standard convolutions under post-training quantization.
question: Evaluate why depthwise convolutions are particularly sensitive to per-tensor INT8 quantization and suggest a remedy.
details:
  realistic_solution: Depthwise convolutions apply a single filter per input channel, making the weight distributions highly variable across individual channels. Per-tensor quantization forces a single scale factor across all weights, destroying the precision of channels with smaller dynamic ranges. Using per-channel quantization provides an independent scale per filter, resolving the degradation.
  common_mistake: |
    **The Pitfall:** Blaming activation quantization exclusively for accuracy loss in depthwise convolutions.
    **The Rationale:** Engineers assume standard layers and depthwise layers behave identically under per-tensor quantization.
    **The Consequence:** The specific, multi-modal weight distributions inherent to depthwise convolutions are destroyed, crushing the model's accuracy.
  napkin_math: |
    *   **Standard Conv:** 1 scale factor for all channels combined.
    *   **Depthwise (Per-Tensor):** 1 scale factor applied rigidly to highly variable, distinct distributions across channels.
    *   **Remedy:** Per-channel quantization provides `C` independent scales for `C` channels, protecting precision.
