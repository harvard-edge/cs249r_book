title: SRAM vs Execute-in-Place Latency
scenario: An anomaly detection CNN (400KB INT8) runs on a Cortex-M4 with only 256KB of SRAM and 1MB of Flash memory.
question: Evaluate the execution time tradeoff between running layers directly via Execute-In-Place (XIP) from Flash versus dynamically paging weights into a 64KB SRAM scratchpad.
details:
  realistic_solution: The model cannot fit entirely in SRAM. XIP from Flash has high read latency (e.g., 20-30ns per byte, plus cache miss penalties), directly slowing down the MAC instruction pipeline. Paging weights via DMA into a dedicated 64KB SRAM buffer allows overlapping computation with memory fetching. The candidate must evaluate the DMA burst bandwidth against the inference consumption rate, demonstrating that double-buffered SRAM paging masks the Flash latency bottleneck.
  common_mistake: |
    **The Pitfall:** Assuming Execute-In-Place operates at full CPU speed.
    **The Rationale:** Candidates fail to calculate the mandatory wait-states of embedded Flash memory.
    **The Consequence:** XIP latency heavily bottlenecks the MAC pipeline, leading to unexpectedly slow inference.
  napkin_math: |
    - Identify overflow: 400KB (model) - 256KB (SRAM) = 144KB overflow.
    - Calculate paging overhead: 144KB at 10 MB/s DMA = ~14.4 ms paging overhead.
    - **By using a double-buffered 64KB SRAM scratchpad with DMA, this 14.4 ms overhead can be completely hidden behind concurrent computation, unlike XIP stall cycles.**
