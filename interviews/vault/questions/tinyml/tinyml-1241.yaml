title: Sub-4-bit Quantization Tradeoffs for Keyword Spotting on Corstone-300
scenario: You are deploying a 1.2 million parameter CNN for continuous keyword spotting on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) system. The system features 512 KB of shared SRAM, and the Ethos-U55 NPU processes 256 MACs/cycle. At standard INT8 quantization, the model's weights require 1.2 MB, vastly exceeding the available SRAM and forcing power-hungry fetches from external Flash memory.
question: How should you evaluate 2-bit weight quantization for a Corstone-300 keyword spotter that must fit a 1.2M-parameter CNN into 512 KB SRAM?
details:
  realistic_solution: A senior engineer recognizes that since the Ethos-U55 does not natively support 2-bit MAC operations, weights must be stored in 2-bit format but unpacked to INT8 in SRAM before execution. The architecture decision involves partitioning the 512 KB SRAM to hold the 300 KB compressed weights, a double-buffer for unpacked INT8 weights, and the activation maps. The Cortex-M7 will unpack chunks of weights just-in-time for the Ethos-U55 to process, trading M7 compute cycles for a massive reduction in external Flash memory bandwidth.
  common_mistake: |
    **The Pitfall:** Assuming 2-bit weights natively accelerate latency on the Ethos-U55.
    **The Rationale:** Candidates assume lower bit-width automatically translates to faster NPU execution, ignoring that the U55 only natively accelerates INT8 and INT16.
    **The Consequence:** The execution graph stalls completely or falls back to software because the NPU cannot natively execute 2-bit operations, requiring M7 intervention.
  napkin_math: |
    1. SRAM Footprint: 1.2M params × 2 bits = 2.4M bits = 300 KB (Fits in 512 KB SRAM).
    2. CPU Overhead: Ethos-U55 requires INT8, so Cortex-M7 must unpack weights just-in-time.
    3. Unpack time: M7 SIMD unpacks 4 weights in 4 cycles. 1.2M params takes 1.2M cycles.
    4. Unpack latency: 1.2M cycles / 480 MHz = 2.5 ms.
    5. Baseline Flash latency: Fetching 1.2 MB from SPI Flash at 40 MB/s takes 30 ms.
    6. System Tradeoff: Trading 2.5 ms of M7 compute to save 30 ms of Flash I/O is a **highly favorable architectural win**.
