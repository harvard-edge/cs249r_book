title: Sub-4-bit Quantization Tradeoffs for Keyword Spotting on Corstone-300
scenario: You are deploying a 1.2 million parameter CNN for continuous keyword spotting. At standard INT8 quantization, the model's weights require 1.2 MB, vastly exceeding the available 512 KB SRAM and forcing power-hungry fetches from external Flash memory.
question: How should you evaluate 2-bit weight quantization for a keyword spotter that must fit a 1.2M-parameter CNN into 512 KB SRAM?
details:
  realistic_solution: A senior engineer recognizes that since the Ethos-U55 does not natively support 2-bit MAC operations, weights must be stored in 2-bit format but unpacked to INT8 in SRAM before execution. The architecture decision involves partitioning the 512 KB SRAM to hold the 300 KB compressed weights, a double-buffer for unpacked INT8 weights, and the activation maps. The Cortex-M7 will unpack chunks of weights just-in-time for the Ethos-U55 to process, trading M7 compute cycles for a massive reduction in external Flash memory bandwidth.
  common_mistake: |
    **The Pitfall:** Assuming 2-bit weights natively accelerate latency on the Ethos-U55.
    **The Rationale:** Candidates assume lower bit-width automatically translates to faster NPU execution, ignoring that the U55 only natively accelerates INT8 and INT16.
    **The Consequence:** The execution graph stalls completely or falls back to software because the NPU cannot natively execute 2-bit operations, requiring M7 intervention.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model parameters: 1.2M.
       - SRAM available: 512 KB.
       - CPU unpacking: 4 weights per 4 cycles at 480 MHz.
       - SPI Flash I/O throughput: 40 MB/s.
    2. **Calculations:**
       - 2-bit SRAM footprint: 1.2M × 2 bits = 2.4M bits = 300 KB.
       - Unpack time: 1,200,000 cycles / 480,000,000 Hz = 0.0025 s (2.5 ms).
       - Baseline Flash latency: 1.2 MB / 40 MB/s = 0.030 s (30 ms).
       - Time saved: 30 ms - 2.5 ms = 27.5 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 300 KB SRAM Footprint. I/O-Bound.** Trading 2.5 ms of CPU compute to unpack weights just-in-time saves 30 ms of expensive Flash I/O, representing a massive architectural win.
