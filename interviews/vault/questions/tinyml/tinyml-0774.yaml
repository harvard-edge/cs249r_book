title: The Mesh Network Hop Latency
scenario: A BLE mesh network of 50 TinyML nodes monitors a 100m x 50m warehouse. Each node relays messages to neighbors within 10m. A critical anomaly detection alert must reach the gateway at one corner within 500ms. BLE mesh forwarding adds 15ms per hop base, plus contention.
question: How would you calculate the maximum number of hops, determine if the latency budget is feasible, and design the mesh topology?
details:
  realistic_solution: |
    Compute the diagonal distance, divide by hop range, and account for BLE managed flooding collisions. Deploy nodes in a grid to ensure redundant paths, using 'friend' nodes near the gateway to mitigate funneling congestion.
  common_mistake: |
    **The Pitfall:** Assuming BLE mesh delivers messages in one hop or without contention.
    **The Rationale:** Candidates fail to account for managed flooding, collision backoffs, and multi-hop relay latency.
    **The Consequence:** The network is designed with insufficient latency margin, causing critical alerts to miss the 500ms deadline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Warehouse diagonal: √(100² + 50²) ≈ 112m
       - Hop range: 10m
       - Hop latency: 15ms base + 10ms contention = 25ms/hop worst-case
    2. **Calculations:**
       - Max hops = ceil(112m / 10m) = 12 hops
       - Transit latency = 12 hops * 25ms = 300ms
       - Total latency = 300ms + 50ms (inference) = 350ms
    3. **Conclusion & Interpretation:**
       - **Result: 350ms. Latency-Bound.** The topology is feasible with 150ms of margin.
  options:
  - BLE mesh delivers in one hop; latency is 65ms.
  - 12 hops x 25ms = 300ms + 50ms inference = 350ms. Feasible.
  - 12 hops at 15ms, but flooding storm makes latency unbounded.
  - Hop count limited to 4 by TTL; requires WiFi.
  correct_index: 1
