title: BLE Bandwidth Embedding Constraint
scenario: A constellation of Cortex-M4 sensors runs an audio feature extractor, transmitting
  INT8 embeddings to a central hub over a 250 kbps BLE link.
question: Design the required embedding compression ratio to ensure a maximum 10ms
  transmission latency per embedding.
visual:
  kind: svg
  path: tinyml-1541.svg
  alt: Fanout diagram showing multiple Cortex-M4 sensor nodes transmitting data to
    a single central hub via BLE.
  caption: Sensor Constellation Topology
details:
  realistic_solution: A 250 kbps BLE link offers roughly 31.25 KB/s of bandwidth.
    To keep transmission under 10ms, the maximum payload size is 312.5 bytes. If the
    raw INT8 embedding is 1024 bytes, the required compression ratio is 1024 / 312.5
    = ~3.27x.
  common_mistake: Failing to convert kbps (kilobits) to KB/s (kilobytes), leading
    to an overestimation of available bandwidth by a factor of 8.
  napkin_math: 250 kbps = 31.25 KB/s; 31.25 KB/s * 0.010 s = 312.5 bytes max.
