title: 'TinyML TCO Optimization: Reduce TinyML Fleet Management Costs'
scenario: A 2000-unit Cortex-M4 TinyML fleet has annual management costs consisting of OTA updates=$20K, device monitoring=$15K, manual calibration visits (20% of fleet/yr)=$80K, and model retraining=$25K, totaling $140K/yr. The target is a 50% cost reduction. A proposed automation setup costs $22K upfront.
question: What automation opportunities exist for each category, and what are the quantified savings and 3-year NPV at a 5% discount rate?
details:
  realistic_solution: 'NPV calculation: $109K × 2.723 = $296.8K. $296.8K - $22K = $274.8K (not $272.8K — the multiplication gives 296.8K not 294.8K).'
  common_mistake: |
    **The Pitfall:** Proposing to eliminate manual calibration entirely through software.
    **The Rationale:** Software engineers assume that algorithmic drift compensation can perfectly replace physical recalibration.
    **The Consequence:** Physical sensor degradation cannot be fully compensated in software; removing manual checks entirely leads to silent, catastrophic failures across the fleet.
  napkin_math: |
    - **Current Annual Cost:** 20K + 15K + 80K + 25K = $140K/yr.
    - **Proposed Future Cost:** 5K (OTA) + 1K (monitoring) + 20K (calibration) + 5K (retraining) = $31K/yr.
    - **Annual Savings:** 140K - 31K = $109K/yr (77.9% reduction, exceeding 50% target).
    - **NPV Multiplier (3-yr at 5%):** 2.723.
    - **Gross NPV Savings:** $109K * 2.723 = $296.8K.
    - **Net Present Value (NPV):** $296.8K - $22K (upfront) = **$274.8K**.
    - **Payback Period:** $22K / ($109K / 12 months) = **2.4 months**.
