title: 'TinyML TCO Optimization: Reduce TinyML Fleet Management Costs'
scenario: 'A 2000-unit Cortex-M4 TinyML fleet has annual management costs: OTA updates=$20K,
  device monitoring=$15K, manual calibration visits (20% of fleet/yr)=$80K, model
  retraining=$25K. Total=$140K/yr. Target: 50% reduction. Identify automation opportunities
  for each cost category and quantify savings.'
question: What would you identify as automation opportunities for each cost category
  and quantify savings?
details:
  realistic_solution: 'NPV calculation: $109K × 2.723 = $296.8K. $296.8K - $22K =
    $274.8K (not $272.8K — the multiplication gives 296.8K not 294.8K).'
  common_mistake: Proposing to eliminate manual calibration entirely without recognizing
    that sensor drift in real-world deployments is a physical reality that cannot
    be solved by software alone, only reduced through automated self-calibration algorithms.
  napkin_math: 'Current: OTA=$20K+monitoring=$15K+calibration=$80K+retraining=$25K=$140K.
    After: OTA=$5K+monitoring=$1K+calibration=$20K+retraining=$5K=$31K. Savings: $109K/yr=77.9%>50%
    target. Setup: $22K. Annual savings: $109K. NPV 3yr at 5%: $109K×2.723-$22K=$296.8K-$22K=$274.8K.
    Payback: 2.4 months. ROI: 1149% over 3yr.'
