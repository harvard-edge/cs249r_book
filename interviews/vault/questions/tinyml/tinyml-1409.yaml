title: Optimizing TinyML Image Classification with Knowledge Distillation on Cortex-M7 + Ethos-U55
scenario: Your team is deploying a critical image classification model for industrial anomaly detection on an edge device. The target hardware features a Cortex-M7 paired with an Ethos-U55 NPU and a strict 512 KB of SRAM. A heavily pruned version of ResNet-18 fits within the SRAM and meets latency targets (40ms) but suffers a significant accuracy drop to 92%.
question: How would you diagnose bottlenecks in the pruned model and propose a knowledge distillation strategy to recover accuracy on the Ethos-U55?
details:
  realistic_solution: The core issue is the accuracy drop after aggressive pruning to fit the 512 KB SRAM and 50ms latency. Knowledge distillation is ideal here. The solution should involve training a compact student model using the ResNet-18 teacher. Logit matching should be the first approach due to its simplicity and low overhead, fitting well within the SRAM. The Ethos-U55 excels at MAC operations, so the student model should be designed with depthwise separable convolutions or similar NPU-friendly operations. Distillation is superior to mere pruning here because it transfers the 'dark knowledge' from the high-capacity teacher, enabling the student to learn a more robust decision boundary.
  common_mistake: |
    **The Pitfall:** Proposing general distillation without tailoring it to the hardware.
    **The Rationale:** Candidates fail to quantify the Ethos-U55 operations per cycle or the strict SRAM limits for intermediate features.
    **The Consequence:** They propose memory-heavy feature distillation that exceeds the 512 KB SRAM, crashing the device.
  napkin_math: |
    1. **Assumptions & Constraints:** Memory budget: < 512 KB. Latency budget: 50 ms. U55 at 480 MHz (512 MAC/cycle).
    2. **Calculations:** 200K parameter INT16 student uses ~400 KB. 200M MACs compute = 200M / (480M * 512) ≈ 0.8 ms compute time. Total with overhead ≈ 40 ms.
    3. **Conclusion & Interpretation:** **Distillation fits within 400 KB and achieves 50 ms latency while recovering ~3-4% accuracy. Result: Compute-Bound.**
