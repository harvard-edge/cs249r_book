title: Cascaded Wake-Up Duty Cycle
scenario: An acoustic glass-break sensor runs on a coin cell. An analog comparator
  draws 5uW continuously and wakes the Cortex-M4 (drawing 10mW) for 10ms upon noise,
  averaging 100 events per day.
question: Apply a cascaded wake-up calculation to find the total average power consumption
  of the system.
details:
  realistic_solution: The Cortex-M4 is active for 10ms * 100 times = 1 second per
    day. The average power of the MCU is (1s / 86400s) * 10,000uW = 0.11uW. Added
    to the always-on analog comparator's 5uW, the total average power is 5.11uW. The
    analog front-end dominates the battery life.
  common_mistake: Over-optimizing the NN inference time on the MCU when the always-on
    analog component is the actual bottleneck for battery longevity.
  napkin_math: 1s active / 86400s total = 0.0000115. MCU avg power = 10mW * 0.0000115
    = 0.115 uW.
