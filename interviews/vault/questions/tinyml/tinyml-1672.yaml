title: Cascaded Wake-Up Duty Cycle
scenario: An acoustic glass-break sensor runs on a coin cell. An analog comparator draws 5uW continuously and wakes the Cortex-M4 (drawing 10mW) for 10ms upon noise, averaging 100 events per day.
question: Apply a cascaded wake-up calculation to find the total average power consumption of the system.
details:
  realistic_solution: The Cortex-M4 is active for 10ms * 100 times = 1 second per day. The average power of the MCU is (1s / 86400s) * 10,000uW = 0.11uW. Added to the always-on analog comparator's 5uW, the total average power is 5.11uW. The analog front-end dominates the battery life.
  common_mistake: |
    **The Pitfall:** Over-optimizing MCU inference time while ignoring always-on peripheral draw.
    **The Rationale:** ML engineers focus entirely on the neural network's MACs and cycle count.
    **The Consequence:** They spend weeks shaving microseconds off inference, missing the fact that the continuous 5µW analog comparator completely dominates the battery life budget.
  napkin_math: |
    *   **Daily Active Time:** 10 ms × 100 events = 1,000 ms (1 second) per day.
    *   **Duty Cycle:** 1 s active / 86,400 s total = 0.00001157.
    *   **MCU Average Power:** 10 mW (10,000 µW) × 0.00001157 = 0.115 µW.
    *   **Always-On Power:** Analog comparator = 5 µW.
    *   **Total Average Power:** 5 µW + 0.115 µW = **5.115 µW**.
