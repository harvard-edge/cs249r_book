title: Cascaded Wake-Up Duty Cycle
scenario: An acoustic glass-break sensor runs on a coin cell. An analog comparator draws 5uW continuously and wakes the MCU (drawing 10mW) for 10ms upon noise, averaging 100 events per day.
question: Apply a cascaded wake-up calculation to find the total average power consumption of the system.
details:
  realistic_solution: The total average power is heavily dominated by the continuous analog front-end (AFE). The MCU is active for exactly 1 second per day, resulting in an extreme duty cycle. The average power of the MCU is (1s / 86400s) * 10,000uW = 0.115uW. Adding the 5uW from the always-on comparator yields a total average power of ~5.12uW.
  common_mistake: |
    **The Pitfall:** Over-optimizing MCU inference time while ignoring always-on peripheral quiescent draw.
    **The Rationale:** ML engineers focus purely on the neural network's cycle count and MACs.
    **The Consequence:** Engineers spend weeks shaving microseconds off inference, missing the fact that the continuous 5uW analog comparator dictates the entire battery budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Events: 100/day. Active time: 10 ms/event.
    - MCU Active Power: 10 mW (10,000 uW). Comparator: 5 uW.

    **Calculations:**
    - Daily Active Time: 10 ms * 100 = 1,000 ms (1 second).
    - Duty Cycle: 1 s / 86,400 s = 0.00001157.
    - MCU Average Power: 10,000 uW * 0.00001157 = 0.115 uW.
    - Total Average Power: 5 uW + 0.115 uW = 5.115 uW.

    **Conclusion & Interpretation:**
    - **Result: 5.12 uW (Always-On Dominates)**. Total average power is ~5.12 uW, bottlenecked by the analog front-end.
