title: Solar + Supercapacitor + MCU System Design
scenario: Design a battery-free structural health monitoring system powered by a small indoor solar cell (2 cm², ~100 µW average indoors). The system must run vibration anomaly detection on a Cortex-M4 that draws 30 mW active.
question: How do you bridge the 300x gap between harvest rate and compute demand to run inferences using a supercapacitor?
details:
  realistic_solution: |
    Implement a store-and-burst architecture. Harvest energy continuously into a supercapacitor (e.g., 0.1F). The MCU sleeps at negligible power until the supercapacitor reaches a specific voltage threshold (e.g., 3.3V). Once charged, the MCU wakes up, executes a rapid burst of inferences using its 30 mW active power, and goes back to sleep before the voltage drops below its minimum operating threshold (e.g., 2.5V).
  common_mistake: |
    **The Pitfall:** Trying to directly match the 30 mW active compute draw with the 100 µW continuous harvest rate, or suggesting a physically impossible larger solar panel.
    **The Rationale:** Candidates fail to utilize duty cycling and energy buffering, ignoring the physical constraints of the sensor deployment.
    **The Consequence:** The proposed design is either physically impossible or fails to ever boot because the continuous current draw collapses the power rail.
  napkin_math: |
    1. **Assumptions & Constraints:** 0.1F supercapacitor charging from 2.5V (min) to 3.3V (max). Harvest rate = 100 µW (0.1 mJ/s). MCU inference cost = 30 mW active for 20 ms.
    2. **Calculations:** Usable Energy = 0.5 * C * (V_max^2 - V_min^2) = 0.5 * 0.1F * (10.89 - 6.25) = 0.232 Joules = 232 mJ. Recharge time = 232 mJ / 0.1 mJ/s = 2320 s ≈ 38.67 minutes. Inference cost = 30 mW * 0.02 s = 0.6 mJ. Inferences per burst = 232 mJ / 0.6 mJ = 386 inferences. Effective rate = 386 inferences / 38.67 min ≈ 10 inferences/minute.
    3. **Conclusion & Interpretation:** **Result: Duty-Cycled Energy Buffering.** The system successfully bridges the 300x gap, safely executing ~10 inferences per minute using a store-and-burst architecture over a 38.6-minute charge cycle.
