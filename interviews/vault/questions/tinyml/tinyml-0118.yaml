title: Solar + Supercapacitor + MCU System Design
scenario: Design a battery-free structural health monitoring system powered by a small indoor solar cell
  (2 cm², ~100 µW average indoors). The system must run vibration anomaly detection on a Cortex-M4 that
  draws 30 mW active. How do you bridge the 300× gap between harvest rate and compute demand?
details:
  realistic_solution: 'Store-and-burst architecture: harvest 100 uW continuously into a 0.1F supercap
    (stores 0.545J at 3.3V, 0.232J usable above 2.5V cutoff). MCU sleeps at 5 uW. On wake: 30 mW active
    for 20ms inference burst = 0.6 mJ per inference. Bursts per charge: 232 mJ / 0.6 mJ = 386 inferences.
    Recharge from 2.5V to 3.3V: 0.232J / 100 uW = 38.7 minutes. Effective rate: 386 inferences / 38.7
    min = 10 inferences/minute — sufficient for structural health monitoring (bearing degradation evolves
    over weeks). Key design: use a voltage comparator to gate MCU wake-up only when supercap reaches 3.0V,
    ensuring enough energy for a complete inference cycle.'
  common_mistake: '"Use a bigger solar panel." The constraint is physical — the sensor must fit on a machine
    bearing with limited surface area. You can''t make the panel bigger.'
  napkin_math: 'Harvest: 100 µW continuous. Supercap: assume 0.1F charged to 3.3V. Stored energy = 0.5
    × 0.1 × 3.3² = 0.545 J. Usable energy (discharge to 2.5V): 0.5 × 0.1 × (3.3² − 2.5²) = 0.232 J. MCU
    active draw: 30 mW. Energy per inference burst (20ms active): 30 mW × 20 ms = 0.6 mJ. Bursts per supercap
    discharge: 232 mJ / 0.6 mJ ≈ 386 bursts. Recharge time from 2.5V to 3.3V: E/P = 0.232 J / 100 µW =
    2,320 s ≈ 38.7 min. Practical duty cycle: charge for 38.7 min, then run ~386 inferences in rapid succession
    (386 × 20 ms = 7.7 s burst window), then recharge. Effective rate: 386 inferences / 38.7 min ≈ **10
    inferences per minute**. For structural health monitoring (detecting bearing degradation over weeks),
    this is more than sufficient.'
