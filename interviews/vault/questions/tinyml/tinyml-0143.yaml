title: The Frozen Sensor Problem
scenario: You have deployed a remote environmental sensor on a Cortex-M4 microcontroller. Its main loop
  wakes up, takes a sensor reading, and goes back to deep sleep. You are concerned that a rare software
  bug could cause the device to hang in its 'active' state, draining the battery. What is the standard
  hardware feature used in microcontrollers to automatically recover from this kind of software freeze?
details:
  realistic_solution: The correct answer is a Watchdog Timer (WDT). A WDT is an independent hardware counter
    that expects the main application software to periodically 'pet' it (i.e., reset its count). If the
    software freezes and fails to pet the watchdog within a pre-configured timeout period (e.g., 1-2 seconds),
    the WDT hardware automatically triggers a full system reset, forcing the device to restart from a
    known-good state. This is a fundamental mechanism for building reliable, unattended embedded systems.
  common_mistake: Confusing the watchdog timer's specific role with other microcontroller peripherals.
    For example, believing that a regular timer interrupt can save the system (it can't, because if the
    main program hangs, the interrupt handler itself might not be serviced), or that the power management
    unit is responsible for resets (it only controls power states like sleep/active).
  napkin_math: A 1,000 mAh battery at 3.7V holds 3,700 mWh. If the M4 hangs active without a Watchdog
    Timer (WDT), it draws 50 mW continuously. The battery drains in 3,700 mWh / 50 mW = 74 hours (~3 days).
    If a WDT resets the MCU after 5 seconds, it burns only 250 mJ before returning to 10 µW sleep, saving
    the mission.
  options:
  - A Real-Time Clock (RTC) for scheduling.
  - A Direct Memory Access (DMA) controller.
  - A Watchdog Timer (WDT).
  - A Power Management Unit (PMU).
