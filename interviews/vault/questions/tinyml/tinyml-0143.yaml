title: The Frozen Sensor Problem
scenario: You have deployed a remote environmental sensor on a Cortex-M4 microcontroller. Its main loop wakes up, takes a sensor reading, and goes back to deep sleep. You are concerned that a rare software bug could cause the device to hang in its 'active' state, draining the battery.
question: What is the standard hardware feature used in microcontrollers to automatically recover from this kind of software freeze?
details:
  realistic_solution: The correct answer is a Watchdog Timer (WDT). A WDT is an independent hardware counter that expects the main application software to periodically 'pet' it (i.e., reset its count). If the software freezes and fails to pet the watchdog within a pre-configured timeout period (e.g., 1-2 seconds), the WDT hardware automatically triggers a full system reset, forcing the device to restart from a known-good state. This is a fundamental mechanism for building reliable, unattended embedded systems.
  common_mistake: |
    **The Pitfall:** Confusing the Watchdog Timer (WDT) with other peripherals like RTCs or regular timers.
    **The Rationale:** Candidates mistakenly believe a regular timer interrupt can save a frozen system, forgetting that if the main program hangs, the ISR itself might be blocked.
    **The Consequence:** The deployed device hangs indefinitely in the field, rapidly draining its battery and requiring a physical truck roll to fix.
  napkin_math: |
    - Battery capacity: 1,000 mAh at 3.7V = 3,700 mWh.
    - Hang drain (no WDT): Active CPU draws 50 mW continuously. Battery drains in 74 hours (3 days).
    - WDT protection: Resets MCU after 5 seconds, burning only 250 mJ before returning to 10 µW sleep.
    - **Result:** The system is saved from catastrophic energy exhaustion.
  options:
  - A Real-Time Clock (RTC) for scheduling.
  - A Direct Memory Access (DMA) controller.
  - A Watchdog Timer (WDT).
  - A Power Management Unit (PMU).
