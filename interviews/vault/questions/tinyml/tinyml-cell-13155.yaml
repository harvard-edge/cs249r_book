title: 'TinyML TCO Design: Fleet TCO for Agricultural Sensor Network'
scenario: 'Design the 5-year TCO for 10,000 ESP32-S3 (240MHz, 512KB SRAM, WiFi) crop monitoring sensors.
  Each runs a soil health TinyML model (inference every 30 minutes, 10ms at 5mA, idle at 20μA). LoRa connectivity:
  $5 gateway per 100 devices, $0.05/device/month network fee. Sensor: $4 per ESP32-S3 + $3 soil probe.
  Model updates: 4/year, 500KB each via OTA.'
details:
  realistic_solution: 'Hardware: 10K*(4+3)=$70K. LoRa gateways: 10K/100*$5=$500. Network fee: $0.05*10K*60mo=$30K.
    OTA: 4*500KB*10K=20GB/yr via LoRa. LoRa max 50 kbps: 20GB/50kbps = 3.2M seconds = 37 days — too slow!
    Use WiFi for OTA (ESP32-S3 has WiFi): download 500KB at 1 Mbps = 4 seconds per device. 10K devices
    staggered: 4 hours/update cycle. WiFi OTA: cheap (use existing farm WiFi or cellular). Cellular OTA:
    20GB/yr * $0.01/MB = $200K/yr — too expensive! Use farm WiFi. OTA cost: $0. Power: 10ms@5mA + 29.99min@20μA
    per 30min cycle. Avg: 5mA*10ms/(30*60*1000ms)+0.020mA=0.0000278+0.020=0.02003mA. Annual: 0.02003mA*8760hr*3.7V/1000=0.649Wh=$0.0000649/yr.
    Total 5yr TCO: $70K+$500+$30K=$100.5K.'
  common_mistake: Not separating LoRa gateway capital cost from network service fee, and forgetting OTA
    update data cost which at 4 updates/year across 10K devices can be substantial.
  napkin_math: 'HW: $70K. Gateways: $500. Network 5yr: $30K. Power: 0.02mA avg * 3.7V * 8760hr/1000 =
    0.649Wh/yr = $0.0000649/yr. 10K units 5yr: $3.25 (negligible). Total: $100,503. Per unit 5yr: $10.05.
    Per year per unit: $2.01. Comparison: 10K traditional soil testers ($50 each, no AI, 4 tests/year
    by human): $500K + 4 tests/yr * $20 labor * 10K = $800K/yr labor. 5yr: $500K + $4M = $4.5M. TinyML
    sensors: $100K. Savings: $4.4M over 5yr. ROI: 4300%. Plus: continuous vs 4x/year monitoring = 52x
    more data points.'
