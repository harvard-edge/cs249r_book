title: ESP32-S3 SRAM vs PSRAM Roofline Shift
scenario: You are deploying an INT8 CNN on an ESP32-S3 (240 MHz dual-core Xtensa, 512 KB SRAM, 8 MB PSRAM,
  vector extensions for INT8). The theoretical peak compute using the vector extensions is 3.84 GOPS.
  When the model runs entirely from the 512 KB SRAM (approx. 1.9 GB/s bandwidth), profiling shows high
  compute utilization. However, to support more features, you increase the model size and store the weights
  in the 8 MB PSRAM (approx. 40 MB/s bandwidth via SPI). You observe that the utilization plummets to
  under 10%. Using the roofline model, explain why this performance collapse occurs.
details:
  realistic_solution: Calculate the machine balance point (Peak Compute / Peak Bandwidth) for both memory
    tiers. By applying the roofline model, you can demonstrate that the operational intensity of the CNN
    layers exceeds the SRAM balance point (making it compute-bound), but falls far short of the PSRAM
    balance point (making it severely memory-bound). The utilization drop is a direct mathematical consequence
    of hitting the PSRAM memory bandwidth roofline.
  common_mistake: Candidates intuitively state that PSRAM is slower, but fail to formally apply the roofline
    model to quantify the shift. They often neglect to calculate the machine balance point or fail to
    explain the mathematical transition from a compute-bound to a memory-bound regime.
  napkin_math: 'SRAM Machine Balance: 3.84 GOPS / 1.9 GB/s = 2.02 OPS/byte. PSRAM Machine Balance: 3.84
    GOPS / 0.04 GB/s = 96 OPS/byte. Assuming a typical CNN layer has an operational intensity of 10 OPS/byte:
    In SRAM (10 > 2.02), performance is capped by compute at 3.84 GOPS. In PSRAM (10 < 96), performance
    is capped by memory bandwidth: 10 OPS/byte * 0.04 GB/s = 0.4 GOPS. The maximum theoretical utilization
    drops to (0.4 / 3.84) = 10.4%.'
