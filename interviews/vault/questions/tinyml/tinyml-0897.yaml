title: 'TinyML TCO Design: Cortex-M7+Ethos-U55 for Industrial TinyML'
scenario: You are designing a cost model for deploying Cortex-M7+Ethos-U55 (480MHz, 512KB SRAM, NPU) vs bare Cortex-M4 (168MHz, 256KB SRAM) for vibration-based anomaly detection in 500 industrial pumps. The model is MobileNetV2-adapted (600K ops INT8) and runs inference every 1 second. The NPU enables INT8 inference natively, while the M4 must use INT16 or software INT8.
question: How would you calculate the 5-year Total Cost of Ownership (TCO) combining hardware and power costs to determine the most cost-effective architecture?
details:
  realistic_solution: 'M4 (600K ops at 168MHz, 5 CPI avg): cycles = 600K*5=3M cycles. Time = 3M/168M=17.9ms. At 30mA (active): duty=1.79%. Avg from active: 30mA*0.0179=0.537mA. Plus 50\u03bcA idle between: 0.982s*0.05mA=0.049mA. Total: 0.537mA + 0.049mA = 0.586mA avg. M7+Ethos: NPU runs at ~50MHz, 5mA for NPU. Time: 600K ops at 50MHz (NPU efficient): 600K/50M=12ms. Plus M7 at 1mA idle. Avg: 5mA*0.012 + 1mA*0.988 = 0.06 + 0.988 = 1.048mA. M4 is more efficient here! M7 has higher idle current. M7+Ethos wins if inference time is long enough to justify the base idle current, but for 12ms it doesn''t.'
  common_mistake: Assuming the NPU doesn't change inference power vs CPU, when in fact the Ethos-U55 NPU runs at a lower power state than the full Cortex-M7 CPU, reducing average power during inference significantly.
  napkin_math: |
    **Assumptions & Constraints:**
    - M4: 168MHz, Active 30mA, Deep sleep 0.05mA. Inference: 17.9ms/sec (Duty: 1.79%).
    - M7+Ethos: NPU 50MHz at 5mA, M7 idle 1mA. Inference: 12ms/sec (Duty: 1.2%).
    - Hardware Cost: M4 = $5, M7+Ethos = $15. Deployment = 500 pumps.

    **Calculations:**
    - M4 Avg Power: (0.0179 * 30mA) + (0.9821 * 0.05mA) = 0.537 + 0.049 = 0.586mA.
    - M7+Ethos Avg Power: (0.012 * 5mA) + (0.988 * 1mA) = 0.06 + 0.988 = 1.048mA.
    - 5yr Energy TCO per node: M4 ≈ $0.01, M7 ≈ $0.02.
    - Total TCO M4: 500 * ($5 + $0.01) = $2,505.
    - Total TCO M7: 500 * ($15 + $0.02) = $7,510.

    **Conclusion & Interpretation:**
    - **Result: M4 wins by $5,005 (Compute/Cost-Bound)**. The M4 is cheaper and more power-efficient because the M7's high base idle current overrides the NPU's efficiency on short inference tasks.
