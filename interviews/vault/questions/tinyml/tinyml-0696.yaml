title: The Flat Memory Reality
scenario: A junior engineer on your team says they'll use `malloc` to dynamically allocate activation buffers during inference on a Cortex-M4.
question: Why should a Cortex-M4 not `malloc` activation buffers from a 256 KB bare-metal SRAM heap during inference?
details:
  realistic_solution: On a bare-metal MCU with 256 KB of SRAM, there is no virtual memory and no MMU. Dynamic allocation causes heap fragmentation in a fixed-size memory pool. After a few hundred inference cycles, `malloc` returns NULL — not because you're out of total memory, but because the free space is scattered into unusable fragments. TFLite Micro solves this by requiring a single, pre-allocated flat tensor arena. All activations, scratch buffers, and intermediate tensors are placed at compile-time offsets within this arena. Zero fragmentation, deterministic memory usage, and you know at build time whether the model fits.
  common_mistake: |
    **The Pitfall:** Assuming `malloc` is just too slow for microcontrollers.
    **The Rationale:** Engineers accustomed to high-level system optimization believe the primary argument against `malloc` is execution speed.
    **The Consequence:** They miss the true catastrophic failure mode: rapid heap fragmentation leading to inevitable out-of-memory crashes on bare-metal architectures.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cortex-M4 SRAM: 256 KB.
       - Firmware + Stack: ~48 KB.
       - Tensor arena (activations): ~200 KB.
    2. **Calculations:**
       - Remaining free space: 256 - 48 - 200 = 8 KB.
       - A 10% fragmentation of the 200 KB space scatters 20 KB of holes.
    3. **Conclusion & Interpretation:**
       - **Result: Fragmentation-Bound Failure.** If `malloc` leaves fragments smaller than the largest activation buffer, inference outright fails despite adequate total free bytes, mandating a flat pre-allocated arena.
