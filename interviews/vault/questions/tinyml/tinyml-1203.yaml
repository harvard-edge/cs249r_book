title: 'On-Device PII Redaction Guardrail'
scenario: 'You are designing an acoustic monitoring wearable for hospital staff using an ARM Cortex-M7 + Ethos-U55 (Corstone-300) with 512 KB shared SRAM. Strict privacy governance requires an on-device guardrail that detects and irreversibly scrambles spoken patient names (PII) before logging the audio to prevent data leaks.'
question: 'How should Corstone-300 detect and redact spoken PII on-device while fitting DSP, CNN, and buffers in 512 KB SRAM?'
details:
  realistic_solution: 'Implement a zero-copy pipelined architecture where the M7 writes DMA audio directly into a ring buffer in shared SRAM. The M7 extracts acoustic features and triggers the Ethos-U55 to execute a quantized INT8 depthwise-separable CNN for PII spotting. If a sensitive entity is flagged via NPU interrupt, the M7 immediately applies a cryptographic hash or noise overlay to the original audio buffer in-place prior to non-volatile storage, guaranteeing governance compliance.'
  common_mistake: 'Candidates often propose complex transformer-based redaction models that vastly exceed the 512 KB SRAM, ignoring the lack of external memory on typical microcontroller profiles. Furthermore, they frequently forget that the Cortex-M7 and Ethos-U55 share the same SRAM, failing to account for memory bandwidth contention during simultaneous DSP scrambling and NPU activation fetches.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Audio: 16 kHz, 16-bit (32 KB/sec).
    - Window: 500 ms double-buffered.
    - MCU SRAM: 512 KB (128 KB for RTOS).
    - Ethos-U55: 256 MAC/cycle at 480 MHz.
    - CNN: 20 million MACs, 250 KB weights, 50 KB activations.

    **Calculations:**
    - Audio Buffer = 32 KB/sec * 0.5s * 2 = 32 KB.
    - Available SRAM = 512 KB - 128 KB (RTOS) - 32 KB (Audio) = 352 KB.
    - CNN Footprint = 250 KB + 50 KB = 300 KB.
    - SRAM Headroom = 352 KB - 300 KB = 52 KB.
    - Peak Compute = 480 MHz * 256 MAC/cycle = 122 GMAC/s.
    - Inference Latency = 20M MACs / 122 GMAC/s ≈ 0.16 ms.

    **Conclusion & Interpretation:**
    - **Result: 52 KB headroom, <1 ms inference (Memory-Bound)**. The highly optimized CNN easily meets latency goals, leaving ample time and memory for the M7 to cryptographically redact the buffer.
