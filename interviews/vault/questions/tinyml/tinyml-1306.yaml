title: On-Device Privacy Guardrails for ESP32-S3 Voice Assistant
scenario: Your team is deploying a continuous-listening smart speaker on an ESP32-S3 (240 MHz dual-core Xtensa, 512 KB SRAM, 8 MB PSRAM). To comply with our Responsible AI privacy guardrails, the device must guarantee that false positive wake-word triggers do not result in unintended recording or streaming of private conversations over WiFi/BLE. You have 120 KB of SRAM remaining after the OS and primary wake-word model.
question: How would you design a specification for an on-device, fail-safe guardrail system that prevents unauthorized audio transmission while maintaining acceptable latency?
details:
  realistic_solution: 'Design a cascading verification pipeline: the primary wake-word model triggers a secondary, lightweight Voice Activity Detector (VAD) or acoustic anomaly detector optimized for INT8. Specify a strict circular buffer overwrite policy ensuring audio is dropped immediately if validation fails. Finally, mandate a hardware-level privacy indicator (e.g., an LED) hardwired to the microphone''s active state, independent of the software stack, fulfilling the governance requirement for user transparency.'
  common_mistake: |
    **The Pitfall:** Relying on cloud verification for false positives.
    **The Rationale:** Candidates lean on cloud compute for complex filtering, violating strict on-device privacy requirements and exceeding acceptable latency.
    **The Consequence:** Potential unauthorized streaming of private conversations and non-compliance with Responsible AI guardrails.
  napkin_math: |
    - **Remaining SRAM**: 120 KB.
    - **Audio Buffer (1-sec)**: 16 kHz * 2 bytes = 32 KB.
    - **Remaining for VAD**: 120 KB - 32 KB = 88 KB.
    - **VAD Model (INT8)**: ~50,000 parameters = 50 KB.
    - **Buffer for Overhead**: 88 KB - 50 KB = **38 KB**. Inference executes in **<5 ms**.
