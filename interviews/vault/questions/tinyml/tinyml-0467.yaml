title: The Federated Thermostat A/B Test
scenario: 'You are the Staff Engineer for a fleet of 1 million smart thermostats. You are A/B testing a new Federated Learning (FL) feature to reduce false ''heating required'' events. The test shows the FL model saves users $200,000/month in energy costs and saves the company $50,000/month in reduced support tickets. However, running the FL aggregation server infrastructure costs $20,000/month.'
question: What is the monthly net economic impact of federated learning for 1M thermostats after user savings, support savings, and server cost?
details:
  realistic_solution: 'The FL feature provides a significant positive economic impact. The solution requires aggregating benefits from two different domains: direct user cost savings (less wasted electricity) and company cost savings (fewer support tickets). These benefits far outweigh the direct cost of the FL server infrastructure.'
  common_mistake: |
    **The Pitfall:** Focusing only on the direct server costs while ignoring second-order economic impacts.
    **The Rationale:** Engineers often evaluate infrastructure costs in isolation rather than as part of a holistic business case.
    **The Consequence:** Highly profitable ML features are rejected because their direct operational costs appear too high.
  napkin_math: |
    1. Calculate User Savings: $200,000/month.
    2. Calculate Company Savings: $50,000/month support ticket reduction.
    3. Total Gross Benefit: $250,000/month.
    4. Calculate Costs: $20,000/month server costs.
    **Result:** Net Impact: ($200,000 + $50,000) - $20,000 = $230,000/month net benefit.
  options:
  - A net benefit of ~$180,000/month, reflecting user savings minus server costs.
  - A net loss, because the $20,000/month server cost is a significant new expense.
  - A net benefit of ~$230,000/month, from both user savings and reduced support tickets.
  - A net benefit of ~$30,000/month, reflecting only the support ticket savings minus server costs.
  correct_index: 2
