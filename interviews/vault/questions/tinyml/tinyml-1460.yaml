title: 'TinyML Dataset Curation: Annotation Budget & SRAM Constraints'
scenario: You are deploying an audio event detection model on an STM32F4 (256 KB SRAM, 168 MHz, no FPU). Your raw audio consists of 1-second snippets at 16 kHz. Each snippet preprocessed into MFCCs occupies 2 KB. You have a budget for 100 hours of manual labeling, and an annotator labels one snippet every 5 seconds.
question: How many 1-second audio snippets fit a 100-hour labeling budget, and how many 2 KB feature vectors could theoretically fit in the STM32F4's 256 KB SRAM?
details:
  realistic_solution: Employ active learning strategies to prioritize the most informative samples for annotation, maximizing the value of the limited budget. For data management, consider reducing feature dimensionality (e.g., fewer MFCC coefficients) or quantizing feature values to decrease memory footprint. On-device, stream features directly to the model, processing chunks rather than buffering large amounts of preprocessed data to stay within SRAM limits.
  common_mistake: |
    **The Pitfall:** Neglecting the memory footprint of feature vectors on constrained devices.
    **The Rationale:** Candidates often assume that preprocessed features are negligibly small and can be fully buffered in RAM.
    **The Consequence:** They propose buffering too many frames simultaneously, leading to immediate out-of-memory errors on the 256 KB SRAM device.
  napkin_math: |
    - **Annotation Time:** 100 hours * 3600 seconds/hour = 360,000 seconds.
    - **Total Snippets Labeled:** 360,000 seconds / 5 seconds/snippet = 72,000 snippets.
    - **Feature Vector Size:** 2 KB per 1-second snippet.
    - **SRAM Capacity for Features:** 256 KB SRAM / 2 KB = 128 feature vectors.
    - **Conclusion:** You can label **72,000 snippets**, but only **128 features** can fit in SRAM simultaneously (ignoring OS/model memory).
