title: 'TinyML Dataset Curation: Annotation Budget & SRAM Constraints'
scenario: You are tasked with deploying a real-time audio event detection model (e.g.,
  barking dog) on an ARM Cortex-M4 STM32F4 microcontroller. This device has 256 KB
  of SRAM and operates at 168 MHz, crucially lacking a Floating Point Unit (FPU).
  Your initial raw audio data consists of 1-second snippets, sampled at 16 kHz, 16-bit
  mono. Each snippet, when preprocessed into a suitable feature vector (e.g., Mel-frequency
  cepstral coefficients - MFCCs), occupies approximately 2 KB. You have an annotation
  budget that allows for 100 hours of manual labeling, and a trained annotator can
  label one audio snippet every 5 seconds. To achieve sufficient accuracy, you estimate
  needing a dataset where 20% of the samples contain the positive event. How many
  unique 1-second audio snippets can you annotate within your budget, and considering
  the feature vector size, approximately how many such feature vectors could hypothetically
  fit in the STM32F4's SRAM for on-device inference data buffering or model parameter
  storage if no external flash is used for feature buffering?
question: How many audio snippets fit a 100-hour labeling budget, and how many 2 KB
  feature vectors could fit in STM32F4 SRAM?
details:
  realistic_solution: Employ active learning strategies to prioritize the most informative
    samples for annotation, maximizing the value of the limited budget. For data management,
    consider reducing feature dimensionality (e.g., fewer MFCC coefficients) or quantizing
    feature values to decrease memory footprint. On-device, stream features directly
    to the model, processing chunks rather than buffering large amounts of preprocessed
    data to stay within SRAM limits.
  common_mistake: Neglecting the significant memory footprint of feature vectors or
    raw data on such constrained devices, or miscalculating annotation throughput
    and total annotated samples, leading to either insufficient data or deployment
    failures.
  napkin_math: '1. Total annotated snippets: (100 hours * 3600 seconds/hour) / 5 seconds/snippet
    = 72,000 snippets. 2. Maximum feature vectors fitting in SRAM: 256 KB SRAM / 2
    KB/feature vector = 128 feature vectors (this is a theoretical max for data buffering,
    not considering OS/model memory).'
