title: Analyze Fallback Latency
scenario: 'An audio classification system processes 50ms audio frames. It implements a fail-operational degradation ladder: a fast INT8 CNN runs first. If confidence < 0.8, it triggers a fallback INT8 CNN. During field tests in noisy environments, the system drops audio frames because processing time exceeds the 50ms deadline, despite theoretical peak throughput suggesting it should take less than 15ms.'
question: Explain why this latency overrun happens on the MCU when falling back from a 1M-MAC to a 4M-MAC CNN.
details:
  realistic_solution: 'Theoretical peak performance assumes perfect data availability in registers, which is unrealistic. The fallback scenario requires executing both models sequentially (5M total MACs). Memory bandwidth bottlenecks from fetching weights from flash and activations from SRAM reduce effective MAC utilization. Combined with sequential execution overhead, the realistic latency exceeds the 50ms frame budget.'
  common_mistake: |
    **The Pitfall:** Relying purely on theoretical peak throughput.
    **The Rationale:** Candidates calculate raw FLOPs but ignore SRAM/Flash memory bandwidth bottlenecks and pipeline stalls.
    **The Consequence:** The system consistently misses the 50ms real-time deadline in noisy environments, dropping critical audio frames.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fallback MACs: 1M + 4M = 5M total MACs.
       - CPU Peak: 168 MHz * 2 MACs/cycle = 336 MMACs/sec.
       - Realistic CMSIS-NN SIMD utilization: ~30-40%.
    2. **Calculations:**
       - Theoretical latency = 5M / 336 MMACs/sec = 14.88 ms.
       - Effective throughput ≈ 100 MMACs/sec.
       - Realistic compute latency = 5M / 100 MMACs/sec = 50 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth Bound.** The 50 ms compute alone consumes the entire frame budget, leading to dropped frames when feature extraction overhead is added.
