title: Layer Fusion SRAM Calculation
scenario: You are optimizing operator scheduling for an ARM Cortex-M7 + Ethos-U55 (Corstone-300) system
  with 512 KB of shared SRAM. A sub-graph has two sequential Conv2D layers running on the Ethos-U55. Layer
  1 takes a 120 KB input and produces a 320 KB intermediate tensor. Layer 2 consumes this intermediate
  tensor to produce a 160 KB output. Assuming standard sequential scheduling allocates output memory before
  execution and frees input memory after, calculate the peak SRAM usage. Then, quantify the peak SRAM
  if the scheduler applies cascaded layer fusion, dividing the intermediate tensor into 4 spatial tiles
  (requiring only one tile in memory plus a 10 KB halo overhead), assuming full input and output tensors
  must remain allocated.
details:
  realistic_solution: Analyze the memory lifecycle of the tensors. In sequential execution, the peak occurs
    when the largest producer-consumer pair is in memory. With cascaded layer fusion on the Ethos-U55,
    the intermediate tensor is never fully materialized. Instead, the scheduler only allocates a single
    tile buffer with its halo margin, keeping the full input and output tensors in the shared SRAM.
  common_mistake: Candidates often incorrectly sum all tensor sizes for the sequential peak (120+320+160=600
    KB) instead of tracking memory lifecycles. For fusion, they may forget to add the 10 KB halo overhead
    or mistakenly divide the input and output sizes by 4 as well.
  napkin_math: '1. Sequential Peak: During Layer 1 = 120 KB + 320 KB = 440 KB. During Layer 2 = 320 KB
    + 160 KB = 480 KB. Peak = 480 KB (fits in 512 KB SRAM). 2. Fusion Intermediate Buffer: (320 KB / 4
    tiles) + 10 KB halo = 90 KB. 3. Fused Peak: 120 KB (input) + 90 KB (intermediate) + 160 KB (output)
    = 370 KB.'
