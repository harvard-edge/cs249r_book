title: The Energy Cost of Precision
scenario: You're optimizing a keyword-spotting model on a Cortex-M4 microcontroller. To save power, you're considering quantizing a key convolutional layer from 16-bit floating-point (FP16) to 8-bit integer (INT8).
question: What energy reduction per operation should you expect when quantizing FP16 arithmetic to INT8?
details:
  realistic_solution: The energy saving is approximately 5x. Floating-point arithmetic, with its separate exponent and mantissa logic, is inherently more complex and energy-intensive than simpler integer operations. Based on established hardware physics, FP32 compute costs ~18x the energy of INT8, and ~3.4x the energy of FP16.
  common_mistake: |
    **The Pitfall:** Conflating memory savings with energy savings.
    **The Rationale:** Engineers correctly state that INT8 uses half the memory of FP16 (a 2x reduction) and incorrectly assume the energy savings are precisely 2x.
    **The Consequence:** They drastically underestimate the power benefits of quantization, leading to sub-optimal architectural trade-offs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Standard hardware energy ratios.
       - FP32 to INT8 ratio: ~18x.
       - FP32 to FP16 ratio: ~3.4x.
    2. **Calculations:**
       - FP16 to INT8 ratio = 18 / 3.4 = 5.29x.
    3. **Conclusion & Interpretation:**
       - **Result: ~5x Energy Reduction.** Eliminating complex mantissa/exponent logic removes severe **Power-Bound** penalties in ALU operations.
  options:
  - ~2x, because you are halving the bit width from 16 to 8.
  - ~18x, the standard energy ratio for integer vs. float.
  - ~5x, because float operations are intrinsically more complex than integer operations.
  - ~3.4x, the standard energy ratio between 32-bit and 16-bit floats.
  correct_index: 2
