title: 'TinyML TCO Realization: Total Platform Cost for TinyML Development'
scenario: Concretely calculate the total platform development cost for a TinyML product using ESP32-S3 (240MHz, 512KB SRAM, 8MB PSRAM, WiFi, $4). Include: dev board ($15 each, 5 boards), tools (edge impulse subscription $50/month), cloud backend (AWS IoT $1K/year), model training data labeling ($0.05/label, 10K labels), and 3-month development (2 engineers at $100/hr, 40hr/week).
question: "What is the total first-year platform development cost for the ESP32-S3 TinyML product, including tools, cloud, labels, and engineering?"
details:
  realistic_solution: Dev boards: 5*$15=$75. Edge Impulse: $50*12=$600. Cloud backend (AWS IoT + Lambda + S3): $1K/yr. Data labeling: 10K*$0.05=$500. Engineering (2 engineers, 3mo, 40hr/wk): 2*$100*40*13=$104K. Test hardware (production samples, 50 units): 50*$4=$200. FCC/CE pre-cert testing: $5K. Prototype PCBs (3 revisions, 10 boards each): 30*$25=$750. Total first-year development: $75+$600+$1K+$500+$104K+$200+$5K+$750=$112,125. Annual recurring after launch: $50*12 (Edge Impulse)+$1K+$500(ongoing labeling)=$2,100. For 10K product units, NRE amortized: $112.1K/10K=$11.21/unit added to BOM cost.
  common_mistake: |
    **The Pitfall:** Treating the cloud backend cost solely as a one-time development cost.
    **The Rationale:** Engineers often focus on the upfront CAPEX of building the system and overlook recurring operational expenses.
    **The Consequence:** Stakeholders are surprised by ongoing recurring charges, damaging the product's long-term financial viability.
  napkin_math: |
    * Development: 2 engineers × $100/hr × 40 hr/wk × 13 weeks = $104,000.
    * Tools/infrastructure: $75 (boards) + $600 (Edge Impulse) + $1,000 (cloud) + $500 (labels) = $2,175.
    * Certification & Test HW: $200 (test units) + $5,000 (pre-cert) + $750 (prototypes) = $5,950.
    * Total first-year cost: $104,000 + $2,175 + $5,950 = **$112,125**.
    * Annual recurring after launch: $600 (Edge Impulse) + $1,000 (cloud) + $500 (labels) = $2,100.
    * NRE at 10K units: $112,125 / 10,000 = **$11.21 per unit** added to BOM.
