title: NPU Garbage Predictions After CPU Preprocessing
scenario: You are deploying an audio classification model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300)
  platform. A microphone stream is continuously written via DMA to a 16KB buffer in the 512 KB shared
  SRAM. When the buffer fills, the 480 MHz Cortex-M7 performs in-place feature extraction (e.g., MFCCs)
  and immediately triggers the Ethos-U55 for inference. You observe that while the CPU's calculated features
  are perfectly correct when logged over UART, the Ethos-U55 outputs completely random predictions. The
  NPU works flawlessly when using static, pre-compiled test data. What hardware-level interaction is causing
  this failure?
question: "Why does Ethos-U55 read random features after the M7 computes MFCCs in a 16 KB DMA buffer?"
details:
  realistic_solution: The root cause is a lack of cache coherency. The Cortex-M7 employs a write-back
    L1 data cache. When it computes the features, the results reside in the L1 D-cache and are not immediately
    written back to the main 512 KB SRAM. Since the Ethos-U55 acts as a separate bus master and reads
    directly from SRAM, it fetches stale, uninitialized data. The fix is to use the CMSIS API to explicitly
    clean (flush) the D-cache for the specific 16KB memory range before triggering the NPU.
  common_mistake: Candidates often misdiagnose this as a DMA race condition, an interrupt priority inversion,
    or an Ethos-U55 weight alignment issue. They frequently suggest adding arbitrary OS delays, mutexes,
    or double-buffering schemes without addressing the underlying memory system behavior.
  napkin_math: Let's quantify the cache maintenance overhead. A 16KB feature buffer consists of 512 cache
    lines (assuming standard 32-byte lines on the M7). Cleaning the D-cache takes roughly 1-2 cycles per
    line, requiring ~512-1024 CPU cycles. At a 480 MHz clock speed, this flush takes about 1-2 microseconds.
    If the Ethos-U55 is configured for 256 MACs/cycle, it executes 512 OPs/cycle. A small 5 million OP
    model takes ~9,765 cycles (~20 microseconds). The cache flush overhead is roughly 5-10% of the inference
    time, which is highly efficient and strictly necessary for correctness.
