title: FOTA for Battery-Powered Sensor Fleets
scenario: You're rolling out a FOTA update to 10,000 battery-powered vibration sensors. Each sensor has
  a CR2032 coin cell (225 mAh, 3V) and communicates via BLE 5.3 (nRF5340, 128 MHz). The new model binary
  is 80 KB. Your field engineer says 'just push the update to all devices tonight.' What could go wrong?
question: "What can go wrong when pushing an 80 KB BLE FOTA model to 10,000 CR2032-powered nRF5340 sensors?"
details:
  realistic_solution: 'The radio is the most power-hungry peripheral on a coin-cell device. BLE 5.3 on nRF5340: TX power ~15 mW, RX power ~12 mW. At BLE''s practical throughput of ~60 KB/s (with connection overhead): transfer time = 80 KB / 60 KB/s = 1.33 seconds. Energy for transfer: ~15 mW * 1.33s = 20 mJ. But that''s just the data transfer. The full FOTA process includes Flash erases and writes. Erasing and writing 80 KB of Flash memory takes significant time and draws high peak currents. Combined with the radio, a single FOTA attempt costs ~47 mJ. If the deployment doesn''t strictly limit retries, network congestion from 10,000 devices updating simultaneously will cause continuous radio listening and failed transfers, quickly draining the CR2032 battery. A staggered, retry-limited rollout is mandatory.'
  common_mistake: '"BLE is fast enough — 80 KB takes a few seconds." This ignores the energy cost of the radio and Flash writes, which are the dominant power consumers on battery-powered MCUs, as well as the cascading retry failures caused by network congestion.'
  napkin_math: 'FOTA energy: 47 mJ per attempt. Battery: 2,430 J. Max safe retries before 1% battery impact: 2430 * 0.01 / 0.047 = 517 retries. With 3-retry limit: 141 mJ worst case = 0.006% of battery. Fleet update: 10,000 devices * 80 KB multicast over BLE mesh = ~2 minutes for data distribution + 10 minutes for staggered flash writes. Total fleet update: ~15 minutes with <0.01% battery impact per device if properly managed.'
