title: The Flash Budget Diet
scenario: You are optimizing a keyword spotting model for a Cortex-M4 based microcontroller with a tight
  memory budget. A key layer in your network is a standard 2D convolution with a 3x3 kernel that takes
  a 16-channel input feature map and produces a 32-channel output map. To save space, you want to replace
  it with a depthwise separable convolution. Explain the parameter savings by comparing the two implementations.
details:
  realistic_solution: A depthwise separable convolution replaces a single, expensive operation with two
    cheaper ones. First, a 3x3 depthwise convolution runs across each of the 16 input channels independently.
    Then, a 1x1 pointwise convolution projects the resulting 16 channels into the desired 32-channel output
    space. This factorization dramatically reduces the parameter count.
  common_mistake: Engineers often forget that a depthwise separable convolution is two steps (depthwise
    and pointwise) and only calculate the parameter count for the depthwise step. This leads to a massive
    overestimation of the memory savings.
  napkin_math: "1.  **Standard Convolution Parameters:**\n    - Params = K × K × C_in × C_out = 3 × 3\
    \ × 16 × 32 = **4,608****\n2.  **Depthwise Convolution Parameters:**\n    - One 3×3 filter per input\
    \ channel: 3 × 3 × 16 = **144****\n3.  **Pointwise (1×1) Convolution Parameters:**\n    - Maps 16\
    \ channels to 32 outputs: 1 × 1 × 16 × 32 = **512**\n4.  **Total Depthwise Separable:** 144 + 512\
    \ = **656 parameters**\n5.  **Reduction Factor:** 4,608 / 656 ≈ **7.0×**\n6.  **Memory Savings (INT8):**\
    \ Standard = 4,608 bytes ≈ 4.5 KB → DS = 656 bytes ≈ 0.64 KB. Saves ~3.9 KB per layer.\n\nThe theoretical\
    \ reduction factor for depthwise separable convolutions is approximately 1/C_out + 1/K² ≈ 1/32 + 1/9\
    \ ≈ 0.14, giving a ~7× reduction — matching our calculation."
  options:
  - The parameters are reduced by ~32x
  - The parameters are reduced by ~9x
  - The parameters are reduced by ~7x
  - The parameters are reduced by ~2x
  correct_index: 2
