title: The Flash Budget Diet
scenario: You are optimizing a keyword spotting model for a microcontroller with a tight memory budget. A key layer is a standard 2D convolution with a 3x3 kernel that takes a 16-channel input and produces a 32-channel output. You are replacing it with a depthwise separable convolution.
question: How many INT8 parameters are saved by replacing a 3x3 16-to-32 convolution with a depthwise separable layer?
details:
  realistic_solution: A depthwise separable convolution replaces a single, expensive operation with two cheaper ones. First, a 3x3 depthwise convolution runs across each of the 16 input channels independently. Then, a 1x1 pointwise convolution projects the resulting 16 channels into the desired 32-channel output space. This factorization dramatically reduces the parameter count.
  common_mistake: |
    **The Pitfall:** Only calculating the parameter count for the depthwise step and ignoring the 1x1 pointwise projection.
    **The Rationale:** Candidates forget that a depthwise separable convolution is a two-stage factorization and erroneously assume the channels combine automatically.
    **The Consequence:** The memory savings are massively overestimated, leading to models that will OOM when compiled for the target hardware.
  napkin_math: |
    1. **Assumptions & Constraints:** INT8 quantization (1 byte per parameter). Standard Conv: 3x3, 16 in, 32 out. Depthwise Separable Conv: 3x3 depthwise (per-channel) + 1x1 pointwise. Biases omitted for simplicity.
    2. **Calculations:** Standard Conv Params: 3 * 3 * 16 * 32 = 4,608. Depthwise Params: 3 * 3 * 16 = 144. Pointwise Params: 1 * 1 * 16 * 32 = 512. Total Separable Params: 144 + 512 = 656. Reduction Ratio: 4608 / 656 ≈ 7.02x.
    3. **Conclusion & Interpretation:** **Result: ~7x Parameter Reduction.** The INT8 memory footprint drops from ~4.5 KB to ~0.64 KB, perfectly matching the theoretical reduction factor of (1/C_out + 1/K^2) = (1/32 + 1/9) ≈ 0.142.
  options:
  - The parameters are reduced by ~32x
  - The parameters are reduced by ~9x
  - The parameters are reduced by ~7x
  - The parameters are reduced by ~2x
  correct_index: 2
