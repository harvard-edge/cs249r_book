title: Implement Tiled Matrix Multiply for Attention on Cortex-M7
scenario: You are implementing the QK^T attention matrix multiply for a 4-head transformer
  on Cortex-M7 with 32KB L1 data cache. Each head has 64-dim keys, sequence length
  128. The full QK^T matrix per head is 128×128×2B = 32KB — exactly fitting L1. You
  must implement tiled matrix multiply ensuring tiles fit in cache with Q, K, and
  output simultaneously. Determine optimal tile size and compute expected speedup
  over naive implementation.
question: How would you determine optimal tile size and compute expected speedup over
  naive implementation?
details:
  realistic_solution: 'Need Q_tile + K_tile + out_tile in L1 simultaneously. Each
    tile is T×64×2B. For 3 tiles: 3×T×64×2 = 384T bytes. Budget: 32KB = 32,768 bytes.
    T = 32,768/384 = 85 → round to T=64. Tile: 64×64 rows of Q and K. Q_tile: 64×64×2B=8KB;
    K^T tile: 64×64×2B=8KB; out_tile: 64×64×2B=8KB. Total=24KB < 32KB. With 8KB slack
    for registers and stack. Speedup: L1 access vs SRAM: 4 cycles vs 12 cycles → 3×
    speedup on memory-bound matmul.'
  common_mistake: Setting tile size so Q + K + output all fit in L1 but forgetting
    output accumulation requires additional buffer; 3×tile_bytes must fit in 32KB.
  napkin_math: 'Tile bytes: 3 × T × 64 × 2 = 384T. Budget 32768: T = 85 → use T=64
    for alignment. Cache utilization: 3 × 64 × 64 × 2 = 24,576B = 75% of L1. Remaining
    8KB: software prefetch buffer. FLOP/s at T=64: 64×64×64×2 = 524,288 FLOPs per
    tile, ~2.1 GFLOP/s possible.'
