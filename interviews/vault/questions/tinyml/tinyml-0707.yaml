title: The TFLite Micro Heap Overhead
scenario: You compile a 15 KB model. Your MCU has 32 KB of SRAM. You allocate exactly 15 KB for the `tensor_arena`
  array for TFLite Micro. When you call `interpreter.AllocateTensors()`, it fails with an OOM error. The
  model only needs 15 KB. Why did it fail?
details:
  realistic_solution: 'TFLite Micro''s tensor_arena must hold more than just activation tensors. It also
    stores: per-tensor metadata (TfLiteTensor structs, ~40 bytes each), per-node metadata (TfLiteNode
    structs, ~24 bytes each), scratch buffers for CMSIS-NN kernels (up to 4KB for im2col), and quantization
    parameters. For a 50-layer model: ~3KB metadata + up to 4KB scratch + alignment padding. You need
    ~15KB activations + 7KB overhead = 22KB minimum arena. Fix: always allocate 1.4-1.5x the estimated
    peak activation size, or use TFLite Micro''s RecordingMemoryAllocator to measure exact requirements.'
  common_mistake: '"The model weights take up space in the arena." Weights usually live in Flash and aren''t
    copied to the arena.'
  napkin_math: A model with 50 layers requires 50 `TfLiteTensor` structs and 50 `TfLiteNode` structs.
    At ~64 bytes per layer of metadata, that is over 3 KB of overhead. If your arena was sized exactly
    to the 15 KB peak activation limit, it will crash immediately during the initialization phase.
