title: The TFLite Micro Heap Overhead
scenario: You compile a 15 KB model. Your MCU has 32 KB of SRAM. You allocate exactly 15 KB for the `tensor_arena` array for TFLite Micro.
question: Why does `AllocateTensors()` fail when a 32 KB MCU gives TFLite Micro exactly a 15 KB tensor arena?
details:
  realistic_solution: 'TFLite Micro''s tensor_arena must hold more than just activation tensors. It also stores: per-tensor metadata (TfLiteTensor structs, ~40 bytes each), per-node metadata (TfLiteNode structs, ~24 bytes each), scratch buffers for CMSIS-NN kernels (up to 4KB for im2col), and quantization parameters. For a 50-layer model: ~3KB metadata + up to 4KB scratch + alignment padding. You need ~15KB activations + 7KB overhead = 22KB minimum arena. Fix: always allocate 1.4-1.5x the estimated peak activation size, or use TFLite Micro''s RecordingMemoryAllocator to measure exact requirements.'
  common_mistake: |
    **The Pitfall:** Sizing the tensor arena exactly to the peak activation map.
    **The Rationale:** Candidates assume the arena only stores neural network layers, ignoring TFLite Micro's structural metadata overheads.
    **The Consequence:** Immediate OOM crash during the `AllocateTensors()` initialization phase.
  napkin_math: |
    **Assumptions & Constraints:**
    - Activation Limit: 15 KB peak.
    - 50-layer model requires per-tensor (`TfLiteTensor`) and per-node (`TfLiteNode`) metadata.

    **Calculations:**
    - Metadata Overhead: 50 layers * ~64 bytes = ~3 KB.
    - Minimum required arena = 15 KB + 3 KB (plus CMSIS-NN scratch) > 18 KB.

    **Conclusion & Interpretation:**
    - **Result: >18 KB needed (Memory-Bound).** The tensor arena size must explicitly account for framework metadata overhead, not just raw activation maps.
