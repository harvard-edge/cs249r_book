title: Calculate Max MACs for NAS Search Space Constraints
scenario: You are configuring a hardware-aware Neural Architecture Search (NAS) pipeline
  targeting an ARM Cortex-M4 (STM32F4) microcontroller. The device operates at 168
  MHz, features 256 KB of SRAM, 1 MB of flash, and utilizes CMSIS-NN SIMD instructions
  capable of executing 2x INT8 MACs per clock cycle. Your NAS engine must constrain
  the search space to candidate architectures that reliably execute within a strict
  15-millisecond latency budget. Assuming an average MAC utilization efficiency of
  60% due to memory movement overheads, calculate the absolute maximum number of INT8
  MAC operations a model can have to be considered valid by the NAS.
question: What MAC limit should a Cortex-M4 NAS enforce for a 15 ms budget at 60%
  utilization?
details:
  realistic_solution: The correct approach involves deriving the total available CPU
    cycles within the latency budget, determining the theoretical peak MAC throughput
    using the SIMD capabilities, and then applying the expected utilization efficiency.
    This yields a realistic MAC upper bound, which serves as a crucial constraint
    metric for the hardware-aware NAS to filter out overly large architectures early
    in the search process.
  common_mistake: Candidates often forget to account for the processor's clock frequency
    or the SIMD capability (2 MACs/cycle). They also frequently calculate theoretical
    peak performance without multiplying by the utilization efficiency, resulting
    in an overly permissive NAS search space that yields models violating the real-world
    latency constraint.
  napkin_math: '1. Calculate cycles per inference: 168,000,000 cycles/sec * 0.015
    sec (15 ms) = 2,520,000 cycles available.

    2. Calculate theoretical peak MACs: 2,520,000 cycles * 2 MACs/cycle = 5,040,000
    peak MACs.

    3. Apply utilization efficiency: 5,040,000 MACs * 0.60 = 3,024,000 MACs. The NAS
    should constrain the search space to models with <= 3.024 MMACs.'
