title: Calculate Max MACs for NAS Search Space Constraints
scenario: You are configuring a hardware-aware Neural Architecture Search (NAS) for an STM32F4 (168 MHz, 2x INT8 MACs/cycle). Candidate architectures must execute within a 15ms latency budget. Assume average MAC utilization efficiency is 60% due to memory movement overheads.
question: What absolute maximum number of INT8 MACs should a Cortex-M4 NAS enforce for a 15 ms budget at 60% utilization?
details:
  realistic_solution: Derive the total available CPU cycles within the latency budget, determine the theoretical peak MAC throughput using the SIMD capabilities, and apply the expected utilization efficiency. This yields a realistic MAC upper bound for the NAS to constrain its search space.
  common_mistake: |
    **The Pitfall:** Forgetting the SIMD capability or failing to apply the utilization efficiency multiplier.
    **The Rationale:** Candidates calculate theoretical peak performance in a vacuum.
    **The Consequence:** The NAS proposes overly large models that mathematically violate the real-world 15ms latency constraint.
  napkin_math: |
    - Cycles available: 168,000,000 cycles/sec * 0.015 sec = 2,520,000 cycles.
    - Theoretical peak MACs: 2,520,000 cycles * 2 MACs/cycle = 5,040,000 MACs.
    - Realistic MACs: 5,040,000 MACs * 0.60 utilization = 3,024,000 MACs.
    - **The NAS must constrain the search space to <= 3.024 MMACs.**
