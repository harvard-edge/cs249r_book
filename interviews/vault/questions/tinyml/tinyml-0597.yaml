title: The Instruction Cache Thrashing Loop
scenario: Your anomaly detection model runs on a Cortex-M7 (216 MHz, 16 KB I-cache, 16 KB D-cache, 512 KB SRAM). Profiling shows a depthwise convolution layer takes 4.2 ms, but your MAC-based estimate predicts 1.1 ms. The data cache hit rate is 98%.
question: "Where do the missing 3.1 ms go when a Cortex-M7 depthwise convolution takes 4.2 ms instead of 1.1 ms?"
details:
  realistic_solution: 'The bottleneck is instruction cache thrashing, not data access. The D-cache hit rate is 98% (fine), but the depthwise conv kernel code is ~20KB — exceeding the 16KB I-cache. Fix: place the hot kernel code in ITCM (Instruction Tightly Coupled Memory).'
  common_mistake: |
    **The Pitfall:** Assuming the memory system is fine simply because the D-cache hit rate is 98%.
    **The Rationale:** Candidates check the data cache and forget the instruction cache entirely on Harvard architecture chips.
    **The Consequence:** They fail to diagnose instruction cache thrashing caused by the kernel code exceeding the I-cache size.
  napkin_math: |
    1. Identify execution gap: 4.2 ms (observed) - 1.1 ms (predicted) = 3.1 ms latency penalty.
    2. Identify cache sizes: I-cache is 16 KB, Kernel code is 20 KB. (4 KB overflow).
    3. Calculate conflict misses: ~2 lines per loop * 2000 iterations * 7 wait states (flash latency) = 28,000 cycles (~0.13 ms).
    4. Apply set-associativity amplification: 4-way conflicts scale effective misses 10x = 1.3 ms.
    5. Add branch prefetch misses: ~1.8 ms.
    6. **Final Result: Placing the kernel in zero-wait-state ITCM eliminates the 3.1 ms I-cache thrashing penalty.**
