title: The Instruction Cache Thrashing Loop
scenario: Your anomaly detection model runs on a Cortex-M7 (216 MHz, 16 KB I-cache, 16 KB D-cache, 512
  KB SRAM). Profiling shows that a specific depthwise convolution layer takes 4.2 ms — but your cycle-count
  estimate based on MAC operations predicts 1.1 ms. The data cache hit rate is 98%. Where are the missing
  3.1 ms?
question: "Where do the missing 3.1 ms go when a Cortex-M7 depthwise convolution takes 4.2 ms instead of 1.1 ms?"
details:
  realistic_solution: 'The bottleneck is instruction cache thrashing, not data access. The D-cache hit
    rate is 98% (fine), but the depthwise conv kernel code is ~20KB — exceeding the 16KB I-cache. On every
    pass through the inner loop, instruction fetches miss the I-cache and stall for 7 wait states (flash
    latency at 216MHz). With 2000 iterations and ~2 conflict misses per iteration plus set-associativity
    evictions, the total penalty is ~3.1ms. Fix: place the hot kernel code in ITCM (Instruction Tightly
    Coupled Memory) — zero wait states, deterministic timing. After ITCM placement: inference drops from
    4.2ms to the predicted 1.1ms.'
  common_mistake: '"The data cache hit rate is 98%, so the memory system is fine." People check the D-cache
    and forget the I-cache entirely. On Cortex-M7, the I-cache and D-cache are separate (Harvard architecture).'
  napkin_math: 'MAC-only estimate: 1.1 ms (pure compute at 216 MHz). Observed: 4.2 ms. Gap: 3.1 ms. I-cache
    size: 16 KB. Kernel code size: 20 KB. Overflow: 4 KB. Flash latency: 7 wait states. Inner loop iterations:
    ~2000. Conflict misses per iteration: ~2 lines. Total miss penalty: 2000 × 2 × 7 = 28,000 cycles =
    0.13 ms. But with set-associativity conflicts (4-way): effective misses 10×→ 1.3 ms. Plus prefetch
    misses on branches: ~1.8 ms. Total: ~3.1 ms. After ITCM placement: 0 wait states → gap eliminated
    → 1.1 ms.'
