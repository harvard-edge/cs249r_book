title: TinyML BLE Upload Time
scenario: A TinyML sensor stores a 24 KB anomaly snippet and uploads it over BLE at 120 kbps effective throughput.
question: Can a 24 KB TinyML anomaly snippet upload over 120 kbps BLE within a 5-second target?
details:
  realistic_solution: 24 KB is 192 kilobits. At 120 kbps, upload takes 1.6 seconds before protocol retries, so it fits the 5-second target with headroom.
  common_mistake: |
    **The Pitfall:** Comparing KB directly to kbps without converting.
    **The Rationale:** Candidates fail to multiply bytes by 8 to get bits.
    **The Consequence:** The upload time is incorrectly calculated as 0.2 seconds instead of 1.6 seconds.
  napkin_math: |
    - Convert bytes to bits: 24 KB * 8 = 192 kilobits (kb).
    - Calculate upload time: 192 kb / 120 kbps = 1.6 seconds.
    - **1.6 seconds easily fits within the 5-second reporting target.**
