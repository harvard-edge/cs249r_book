title: Mitigating High Activation Memory in Deep Layers
scenario: A 2MB visual wake-word model needs to run on a Cortex-M4 featuring only
  256KB of SRAM and 2MB of Flash. The INT8 quantized model requires 300KB for intermediate
  activations at its bottleneck layer.
question: Evaluate memory management strategies to execute this specific bottleneck
  layer without exceeding the 256KB hardware SRAM limit.
details:
  realistic_solution: The weights can execute-in-place (XIP) directly from the 2MB
    Flash, but the 300KB activation bottleneck fundamentally breaks the 256KB SRAM
    bound. To evaluate a fix, one must implement patch-based inference (spatial tiling)
    to split the input receptive field, or depth-first layer fusion to consume partial
    activations immediately. This restricts peak memory to under 200KB at the cost
    of redundant boundary computations.
  common_mistake: Assuming Flash memory can directly hold mutable activations, or
    proposing paging to Flash which degrades performance unacceptably due to write
    latency.
  napkin_math: 300KB activations > 256KB SRAM; tile into 2 passes to reduce peak to
    ~150KB.
