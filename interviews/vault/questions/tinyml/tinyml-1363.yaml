title: Quantization Strategy for Edge Deployment on Cortex-M7 + Ethos-U55
scenario: You are tasked with deploying a real-time image classification model on a power-constrained embedded system featuring a Cortex-M7 microcontroller (480 MHz) paired with an Ethos-U55 NPU (configurable from 128 to 512 MACs/cycle) and limited to 512 KB of SRAM. The FP32-trained model, when initially quantized to INT8 using a simple Post-Training Quantization (PTQ) scheme with per-tensor symmetric quantization, exhibits a 5% accuracy drop and fails to meet the target inference latency.
question: How would you improve INT8 quantization for a Cortex-M7 plus Ethos-U55 model with a 5% PTQ accuracy drop?
details:
  realistic_solution: Implement a more advanced calibration strategy like Quantization-Aware Training (QAT) if the accuracy drop is severe, or explore more sophisticated PTQ methods like Advanced Quantization with fine-tuned calibration data or MinMax/Entropy calibration. Consider per-channel quantization for weights to reduce quantization error for layers with widely varying weight ranges. Explicitly address zero-point arithmetic to handle asymmetric activation distributions, especially for activations. Utilize the Ethos-U55's specific capabilities by ensuring the chosen quantization scheme (e.g., INT8 asymmetric with explicit zero points for activations and symmetric for weights) maps efficiently to its instruction set, minimizing host CPU overhead and maximizing NPU utilization. Integrate hardware-aware quantization tools provided by ARM. Quantify memory, latency, and energy benefits expected from these changes.
  common_mistake: |
    **The Pitfall:** Using sub-optimal quantization schemes or ignoring activation distributions.
    **The Rationale:** Candidates assume simple per-tensor PTQ is sufficient and fail to leverage the NPU's specific zero-point arithmetic capabilities.
    **The Consequence:** The model suffers severe accuracy drops and misses latency targets due to CPU fallback for unsupported operations.
  napkin_math: |
    - Memory savings: 400K FP32 weights (1.6 MB) reduce to 400K INT8 weights (400 KB), fitting easily into 512 KB SRAM.
    - Performance target: 512 MACs/cycle at 480 MHz = ~245 GMAC/s.
    - Speedup potential: An optimized INT8 model can achieve 4x to 16x speedup over the M7's FP32 baseline (e.g., 100ms down to 10-20ms).
    - **Applying Quantization-Aware Training (QAT) with per-channel symmetric weights and asymmetric activations leverages NPU speed while recovering 3-4% of the accuracy loss.**
