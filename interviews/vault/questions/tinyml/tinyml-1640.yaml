title: Anomaly Buffer Sizing
scenario: An anomaly detector experiences noise spikes causing arrival rates to jump from 10Hz to 50Hz for 5 seconds. Service rate is 30Hz.
question: Implement a bounded queue sizing strategy to ensure no frames are dropped during the 5-second noise spike.
visual:
  kind: svg
  path: tinyml-1640.svg
  alt: Line chart showing buffer occupancy growing to 100 then falling
  caption: Buffer Occupancy During 5s Spike
details:
  realistic_solution: During spike, deficit = Arrival - Service = 50 - 30 = +20 frames/sec. Over 5 seconds, queue grows by 20 * 5 = 100 frames. The queue capacity must be strictly >= 100 frames.
  common_mistake: |
    **The Pitfall:** Sizing the queue for the average arrival rate (10Hz).
    **The Rationale:** Candidates fail to calculate the integral of the burst deficit during extreme noise spikes.
    **The Consequence:** The queue overflows during the 5-second spike, dropping critical anomaly detection frames.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Spike arrival rate: 50Hz.
       - Service rate: 30Hz.
       - Spike duration: 5 seconds.
    2. **Calculations:**
       - Spike deficit = Arrival (50Hz) - Service (30Hz) = +20 frames/sec.
       - Queue growth = 20 frames/sec * 5 seconds = 100 frames.
    3. **Conclusion & Interpretation:**
       - **Result: Minimum Required Queue Capacity is 100 frames.**
