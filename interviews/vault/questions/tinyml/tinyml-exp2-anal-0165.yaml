title: Energy Analysis of DVFS on Ethos-U55
scenario: You are optimizing a keyword spotting model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform
  with 512 KB shared SRAM. The model requires 5 million MACs per inference. The system currently runs
  the M7 at 480 MHz at 1.2V, and the Ethos-U55 processes 256 MACs/cycle. You observe that when you drop
  the clock frequency to 240 MHz and scale the voltage to 0.9V, the inference time doubles, but the overall
  battery life extends significantly more than expected. Explain why this non-linear energy savings occurs
  and calculate the dynamic energy per inference for both P-states.
details:
  realistic_solution: The dynamic power equation is P = C * V^2 * f, and total energy is E = P * t. Since
    the total clock cycles (f * t) required to compute the 5 million MACs remains constant, the energy
    per inference is proportional only to C * V^2. Reducing the voltage from 1.2V to 0.9V yields a quadratic
    reduction in energy consumption per inference, which explains why the battery life improves so drastically
    even though the chip takes twice as long to finish the computation.
  common_mistake: Candidates often confuse power with energy per inference. They correctly note that dynamic
    power scales with V^2 * f, but forget that a halved frequency doubles the execution time, meaning
    the total energy per inference only scales with V^2.
  napkin_math: 'The Ethos-U55 processes 256 MACs/cycle, so 5,000,000 MACs require 19,531 cycles. At 480
    MHz, t1 = 19,531 / 480e6 = 40.7 µs. At 240 MHz, t2 = 19,531 / 240e6 = 81.4 µs. Assuming a lumped switching
    capacitance C of 1 nF: E_480 = C * V^2 * f * t1 = 1e-9 * (1.2)^2 * 480e6 * 40.7e-6 = 28.1 µJ. E_240
    = 1e-9 * (0.9)^2 * 240e6 * 81.4e-6 = 15.8 µJ. The energy ratio is E_240 / E_480 = (0.9/1.2)^2 = 0.5625,
    saving 43.7% dynamic energy per inference despite the doubled latency.'
