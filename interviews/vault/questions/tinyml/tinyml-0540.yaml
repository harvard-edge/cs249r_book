title: The Transformer's Memory Trap
scenario: You are a TinyML engineer optimizing a keyword spotting model for a Cortex-M4 microcontroller with a strict 256KB SRAM budget. A Neural Architecture Search (NAS) tool has proposed two architectures that meet your accuracy target.
question: Why is the Transformer architecture riskier than the CNN under the Cortex-M4's 256 KB SRAM budget?
details:
  realistic_solution: The core issue is the architectural scaling properties. The CNN's activation memory scales linearly with input size and channel count. In contrast, the Transformer's activation memory scales quadratically with sequence length (`L`) because it must create an `(L, L)` attention score matrix to compare every token to every other token. This single tensor creates a massive peak memory requirement that is far larger than any single tensor in the CNN. Even if it barely fits now, there is no headroom; a small increase in audio clip length would cause an out-of-memory failure. The CNN, with its linear scaling, is the more robust and predictable choice for a resource-constrained product.
  common_mistake: |
    **The Pitfall:** Focusing solely on parameter count and MACs.
    **The Rationale:** Engineers assume parameter count is the only memory constraint, ignoring the quadratic scaling of peak activation memory required by the Transformer's self-attention matrix.
    **The Consequence:** Selecting an architecture that causes a fatal out-of-memory failure on device when sequence lengths increase slightly.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SRAM Budget: 256 KB.
       - Sequence Lengths (L): 100 vs 200.
    2. **Calculations:**
       - CNN Peak Activation: 16x16x32 INT8 = ~16 KB.
       - Transformer Attention (L=100): 100 * 100 = 10 KB/head * 4 heads = 40 KB (+ 19 KB Q,K,V) = ~60 KB.
       - Transformer Attention (L=200): 200 * 200 = 40 KB/head * 4 heads = 160 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Scaling**. Transformer's quadratic scaling quickly exhausts the 256 KB SRAM limit, whereas CNN scales linearly and remains within budget.
  options:
  - The Transformer's MAC count is too high for the Cortex-M4's clock speed, causing a latency violation.
  - Transformer runtimes have a large fixed memory overhead, which when added to the 150KB of parameters, exceeds the 256KB budget.
  - The activation memory scales quadratically with sequence length due to the self-attention matrix, creating a single large tensor that consumes the SRAM budget.
  - The attention mechanism requires FP32 weights to function correctly, making the true parameter size 600KB (150K * 4).
  correct_index: 2
