title: The Transformer's Memory Trap
scenario: 'You are a TinyML engineer optimizing a keyword spotting model for a Cortex-M4 microcontroller
  with a strict 256KB SRAM budget. A Neural Architecture Search (NAS) tool has proposed two architectures
  that meet your accuracy target:'
question: "Why is the Transformer architecture riskier than the CNN under the Cortex-M4's 256 KB SRAM budget?"
details:
  realistic_solution: The core issue is the architectural scaling properties. The CNN's activation memory
    scales linearly with input size and channel count. In contrast, the Transformer's activation memory
    scales quadratically with sequence length (`L`) because it must create an `(L, L)` attention score
    matrix to compare every token to every other token. This single tensor creates a massive peak memory
    requirement that is far larger than any single tensor in the CNN. Even if it barely fits now, there
    is no headroom; a small increase in audio clip length would cause an out-of-memory failure. The CNN,
    with its linear scaling, is the more robust and predictable choice for a resource-constrained product.
  common_mistake: Engineers focus solely on parameter count and MACs, which look better for the Transformer
    on paper. They forget that on memory-constrained devices, peak activation memory (the 'Tensor Arena'
    size) is the real killer. The Transformer's O(L^2) self-attention matrix is a ticking time bomb that
    doesn't show up in a simple parameter count.
  napkin_math: 'CNN activation: 16x16x32 INT8=8KB/layer, peak~16KB. Transformer L=100: attention=100*100=10KB/head,
    4 heads=40KB + Q,K,V=19KB. ~60KB/block. Double to L=200: attention=4*200*200=160KB alone. CNN:16KB
    vs Transformer:60-160KB. On 256KB SRAM, Transformer quadratic scaling is fatal.'
  options:
  - The Transformer's MAC count is too high for the Cortex-M4's clock speed, causing a latency violation.
  - Transformer runtimes have a large fixed memory overhead, which when added to the 150KB of parameters,
    exceeds the 256KB budget.
  - The activation memory scales quadratically with sequence length due to the self-attention matrix,
    creating a single large tensor that consumes the SRAM budget.
  - The attention mechanism requires FP32 weights to function correctly, making the true parameter size
    600KB (150K * 4).
  correct_index: 2
