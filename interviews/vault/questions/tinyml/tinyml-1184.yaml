title: On-Device Active Learning for Audio
scenario: You are designing an on-device active learning data curation system for an acoustic event detection model running on a Nordic nRF5340. To fix dataset biases, the system must identify uncertain audio samples and transmit them via BLE 5.3 to the cloud for human annotation. 
question: How should the nRF5340 buffer data, compute uncertainty, and schedule transmissions while strictly managing the 256 KB SRAM, 1 MB flash, and ~5mA active power constraints?
details:
  realistic_solution: The optimal architecture computes a lightweight uncertainty metric (e.g., margin sampling) on the 128 MHz app core. Instead of raw PCM, compressed features (like MFCCs) of highly uncertain events are buffered into the 1 MB flash. The 64 MHz net core then batches these transmissions during infrequent, scheduled BLE 5.3 connection intervals to amortize radio wake-up costs.
  common_mistake: |
    **The Pitfall:** Streaming raw audio immediately.
    **The Rationale:** Candidates propose sending uncompressed data immediately upon detecting uncertainty to simplify the architecture.
    **The Consequence:** This causes frequent BLE wake-ups that destroy the energy budget, and overestimates available memory, ignoring RTOS and model footprint already occupying SRAM.
  napkin_math: |
    - 1 second of raw 16kHz 16-bit audio = 32 KB. Extracting MFCCs compresses this to ~2 KB/sec.
    - Buffering 50 uncertain events/day requires 100 KB (fits safely in 1 MB flash).
    - Transmitting 100 KB over BLE 5.3 (~100 KB/s) requires ~1 second of active radio time.
    - At ~5mA and 3V (15 mW), batch transmission costs **~15 mJ/day**.
    - (Compared to ~240 mJ for uncompressed raw audio).
