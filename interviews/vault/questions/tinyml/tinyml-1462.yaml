title: Optimizing TinyML Data Curation on nRF5340 for Active Learning
scenario: Your team is developing a tinyML solution for predictive maintenance, deploying an anomaly detection model. The device monitors industrial machinery, collecting high-frequency vibration data at 20KB/sec. Due to real-world variations not present in the initial training set, the model exhibits a high false positive rate. To continuously improve accuracy, you've decided to implement an active learning pipeline. Currently, the device buffers raw sensor data in its SRAM before transmitting it via BLE to a backend for human annotation. However, the limited SRAM fills up quickly, forcing frequent, small data offloads every ~12.8 seconds. This results in significant BLE protocol overhead and provides annotators with insufficient contextual data, severely bottlenecking the rate of effective data acquisition and labeling.
question: How would you diagnose and optimize this on-device data curation and transmission bottleneck to accelerate model improvement, and how would you quantify the impact of your proposed solution?
details:
  realistic_solution: 'Implement an on-device, uncertainty-based active learning strategy. The model itself, or a lightweight companion module, would evaluate incoming data streams and flag only the most uncertain or novel samples. Instead of sending raw vibration data, the device would extract and transmit highly compressed features or metadata related to these uncertain events, potentially along with a very short snippet of raw data for human context. This approach leverages the CPU for intelligent filtering, drastically reduces the data volume transmitted over BLE, and focuses annotator effort on the most impactful samples.'
  common_mistake: |
    **The Pitfall:** Increasing sampling rate or raw data transmission.
    **The Rationale:** Candidates assume more data is always better without considering the SRAM limits and BLE bandwidth overhead of the MCU.
    **The Consequence:** Attempting to stream all raw data overwhelms the communication channel, drains the battery rapidly, and provides annotators with too much noise instead of actionable high-uncertainty events.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Raw data rate: 20 KB/sec.
       - Buffer fills: 256 KB / 20 KB/sec = 12.8 seconds.
       - Effective BLE throughput severely degraded by high transfer frequency.
    2. **Calculations:**
       - Target an on-device uncertainty model to filter stream to 10% relevance.
       - Transmit compressed metadata (2 KB/sec) + raw snippet (1 KB/sec) = 3 KB/sec total.
       - Data reduction ratio: 20 KB/sec / 3 KB/sec = 6.6x reduction.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound System.** Implementing on-device intelligent filtering reduces data volume by 6.6x, eliminating the BLE transmission bottleneck and vastly accelerating the active learning curation throughput.
