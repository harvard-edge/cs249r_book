title: 'Model Format Conversion: Size Multi-Model TFLM Deployment on Cortex-M7+NPU'
scenario: 'Size the Flash and SRAM layout for deploying two TFLM models on Cortex-M7+Ethos-U55
  (480MHz, 512KB SRAM): (1) keyword spotting (100K INT8 params, 0.09 MOPs) always-on,
  and (2) speaker verification (500K INT8 params, 5 MOPs) triggered by keyword. Both
  models use the NPU.'
question: How should Flash, SRAM, and activation arenas be sized for two triggered
  TFLM models on Cortex-M7 plus Ethos-U55?
details:
  realistic_solution: 'Flash: KWS model 100KB + SV model 500KB + TFLM runtime 30KB
    + app 64KB = 694KB. Need 1MB Flash MCU. SRAM: KWS activation arena (peak: 0.09M
    ops → ~10KB). SV activation arena (5M ops, larger layers → ~80KB). Shared arena
    (use max): 80KB. TFLM runtime: 30KB. Model weight buffers: KWS 100KB + SV 500KB
    — but only KWS active at idle. Load SV to SRAM on trigger from external Flash.
    Active memory: KWS 100+10+30=140KB. On trigger: +500KB SV weights? Exceeds 512KB
    SRAM. Fix: SV weights in external Flash, load layer-by-layer.'
  common_mistake: Allocating separate activation arenas for both models simultaneously;
    since speaker verification is triggered (not concurrent), the activation arena
    can be shared/reused.
  napkin_math: 'KWS: 100KB Flash, 10KB activations. SV: 500KB Flash, 80KB activations.
    Shared arena: 80KB. SRAM at idle: 100KB KWS weights + 80KB arena + 30KB TFLM =
    210KB of 512KB ✓. On trigger: load SV to SRAM: 210+500=710KB > 512KB. Must use
    layer-by-layer from Flash. SV inference time: 5M/480M/2MACs = 5.2ms. Layer loads:
    say 10 layers × 50KB avg → 10 × (50KB from Flash at 100MB/s XIP = 0.5ms) = 5ms
    overhead. Total SV: 10.2ms.'
