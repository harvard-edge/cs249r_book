title: 'Model Format Conversion: Size Multi-Model TFLM Deployment on Cortex-M7+NPU'
scenario: 'You must size the Flash and SRAM layout for deploying two TFLM models on a Cortex-M7+Ethos-U55 (480MHz, 512KB SRAM). Model 1 is an always-on keyword spotting model (100K INT8 params, 0.09 MOPs). Model 2 is a speaker verification model (500K INT8 params, 5 MOPs) triggered by the keyword. Both models use the NPU.'
question: 'How should Flash, SRAM, and activation arenas be sized for two triggered TFLM models on Cortex-M7 plus Ethos-U55?'
details:
  realistic_solution: 'Flash: KWS model 100KB + SV model 500KB + TFLM runtime 30KB + app 64KB = 694KB. Need 1MB Flash MCU. SRAM: KWS activation arena (peak: 0.09M ops → ~10KB). SV activation arena (5M ops, larger layers → ~80KB). Shared arena (use max): 80KB. TFLM runtime: 30KB. Model weight buffers: KWS 100KB + SV 500KB — but only KWS active at idle. Load SV to SRAM on trigger from external Flash. Active memory: KWS 100+10+30=140KB. On trigger: +500KB SV weights? Exceeds 512KB SRAM. Fix: SV weights in external Flash, load layer-by-layer.'
  common_mistake: 'Allocating separate activation arenas for both models simultaneously; since speaker verification is triggered (not concurrent), the activation arena can be shared/reused.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Models: KWS (100KB Flash, 10KB activations), SV (500KB Flash, 80KB activations).
    - Target: Cortex-M7+Ethos-U55 (512KB SRAM, 480MHz).
    - TFLM Runtime: 30KB.

    **Calculations:**
    - Shared SRAM arena: 80KB (max of 10KB and 80KB).
    - SRAM at idle: 100KB KWS weights + 80KB arena + 30KB TFLM = 210KB.
    - SRAM on trigger: 210KB + 500KB SV weights = 710KB (> 512KB SRAM limit).
    - Flash load overhead: 10 layers * 50KB avg at 100MB/s XIP = 5ms overhead.

    **Conclusion & Interpretation:**
    - **Result: 710KB SRAM usage (Memory-Capacity-Bound)**. SV weights must be loaded layer-by-layer from Flash to fit within the 512KB SRAM constraint.
