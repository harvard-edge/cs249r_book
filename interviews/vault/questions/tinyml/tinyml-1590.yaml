title: Deep Sleep Wake Triggers on Cortex-M4
scenario: A battery-powered microcontroller sleeps in a sub-microamp state. It must wake up precisely every 5 minutes to run a tiny keyword spotter on a buffered microphone signal.
question: Identify the low-power hardware component that remains active during deep sleep to trigger the system wake-up.
visual:
  kind: svg
  path: tinyml-1590.svg
  alt: Chart showing continuous low power RTC draw and periodic CPU wake spikes.
  caption: RTC Wake Trigger Timeline
details:
  realistic_solution: The Real-Time Clock (RTC) or a Low-Power Timer (LPTIM) driven by a dedicated 32.768 kHz low-speed oscillator remains active. When the timer counter reaches the target threshold, it issues an external interrupt (EXTI) that triggers the power management unit to wake the main CPU core.
  common_mistake: |
    **The Pitfall:** Suggesting the main CPU core or high-speed system clock stays active to count cycles.
    **The Rationale:** Candidates unfamiliar with deep sleep modes assume the CPU must poll for time.
    **The Consequence:** The device drains its battery exponentially faster than required, destroying its intended multi-year lifespan.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Wake interval: 5 minutes = 300 seconds.
       - RTC oscillator frequency: 32,768 Hz.
    2. **Calculations:**
       - Total ticks = 300 s * 32,768 Hz = 9,830,400 ticks.
    3. **Conclusion & Interpretation:**
       - **Result: 9.83 million ticks.**
