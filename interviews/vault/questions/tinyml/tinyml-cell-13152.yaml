title: 'TinyML TCO Analyze: Connectivity Cost for TinyML IoT Fleet'
scenario: 'Analyze the 3-year connectivity cost for 5000 Cortex-M4 sensors (168MHz, 256KB SRAM) deployed
  in a smart grid with three connectivity options: (A) LoRaWAN ($0.10/device/month via network server),
  (B) NB-IoT cellular SIM ($2/device/month), (C) WiFi (free but needs router deployment at $200/router
  per 20 devices). Each sensor sends 24 messages/day of 100 bytes. Calculate total TCO for each.'
details:
  realistic_solution: 'Hardware: 5000 * M4 system ($5) = $25K. Option A (LoRa): $0.10*5000*36=$18K connectivity.
    Router: 1 LoRa gateway per 1000 devices ($500 each) = $2.5K. Total A: $25+$18+$2.5=$45.5K. Option
    B (NB-IoT): $2*5000*36=$360K. Total B: $25+$360=$385K. Option C (WiFi): Routers: 5000/20*$200=$50K.
    No monthly fee. Total C: $25+$50=$75K. Ranking: A=$45.5K << C=$75K << B=$385K. LoRaWAN wins by 39%
    over WiFi and 88% over NB-IoT. Bandwidth check: 24*100 bytes/day = 2400 bytes/day = 0.278 bytes/s.
    LoRa max: 5 kbps. Fully adequate.'
  common_mistake: Assuming WiFi is free because it has no SIM cost, without accounting for the capital
    expense of deploying and maintaining WiFi routers across 5000 devices (250 routers at $200 each =
    $50K).
  napkin_math: 'A (LoRa): HW=$25K + monthly=$18K + gateways=$2.5K = $45.5K. B (NB-IoT): $25K+$360K=$385K.
    C (WiFi): $25K+$50K gateways=$75K. LoRa wins. Data volume: 5000 sensors * 24*100 bytes = 12MB/day.
    LoRa gateway handles 1000 nodes: 5 gateways handle 5000 nodes. LoRaWAN monthly server: $0.10*5000*36=$18K.
    For 3yr, LoRa connectivity cost = $18K+$2.5K=$20.5K = 45% of total TCO. NB-IoT: $360K/$385K=93.5%
    connectivity. Key: for smart grid IoT, LoRaWAN is the only viable option — NB-IoT is 8x more expensive.'
