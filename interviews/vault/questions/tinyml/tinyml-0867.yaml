title: 'Model Format Conversion: Compare TFLM vs. CMSIS-NN for Cortex-M7 Inference'
scenario: 'A 500K parameter INT8 CNN (2.5 MOPs) runs on Cortex-M7+Ethos-U55. You must compare two deployment approaches: (A) TFLite Micro with Ethos-U55 delegate vs. (B) CMSIS-NN kernels with manual Ethos offload using the Ethos-U55 driver.'
question: 'Should a 500K-parameter INT8 CNN use TFLM with Ethos-U55 delegate or manual CMSIS-NN and Ethos offload?'
details:
  realistic_solution: 'Approach A (TFLM + Ethos delegate): 2.5M INT8 ops / 0.5 TOPS NPU = 5μs compute + 2ms TFLM dispatch overhead per supported op. TFLM dispatches Ethos-U55 per fused op (grouped by Vela compiler): ~5 dispatches × 0.2ms = 1ms overhead. Total: ~1.005ms. Approach B (manual): same Ethos compute (5μs) + 0.1ms driver overhead = ~0.1ms. But development: approach A = 2 weeks, approach B = 8 weeks. Tradeoff: 10× dev time for 10% latency improvement.'
  common_mistake: 'Assuming TFLM Ethos delegate achieves the same performance as manual CMSIS-NN + Ethos offload; the delegate adds op-by-op dispatch overhead that manual pipelines avoid.'
  napkin_math: |
    **Assumptions & Constraints:**
    - CNN: 500K INT8 params, 2.5 MOPs. NPU: 0.5 TOPS.
    - TFLM dispatch overhead: 0.2ms per op (5 ops).

    **Calculations:**
    - NPU compute: 2.5M / 500G = 5 us (0.005 ms).
    - TFLM overhead: 5 * 0.2 ms = 1.0 ms. Total TFLM: 1.005 ms.
    - Manual driver overhead: 0.1 ms. Total manual: 0.105 ms.
    - Speedup: ~9.6x.

    **Conclusion & Interpretation:**
    - **Result: 1.005 ms vs 0.105 ms (Compute Bound)**. While manual offload is ~10x faster, TFLM comfortably meets typical <10ms deadlines and is preferred for its significantly lower development effort.
