title: Microcontroller Performance Reality
scenario: You are profiling a simple keyword-spotting model on a Cortex-M4 microcontroller.
  Based on its fundamental hardware architecture, would you expect the model's performance
  to be limited by its compute capability (compute-bound) or by its memory bandwidth
  (memory-bound)?
question: Based on its fundamental hardware architecture, would you expect the model's
  performance to be limited by its compute capability (compute-bound) or by its memory
  bandwidth (memory-bound)?
details:
  realistic_solution: Performance on a general-purpose microcontroller like a Cortex-M4
    is typically **compute-bound**. The core's floating-point unit (FPU) is not highly
    specialized for ML workloads and is relatively weak compared to its fast on-chip
    SRAM bandwidth. This results in a very low 'ridge point' on the roofline model,
    meaning even moderately complex operations can saturate the processor.
  common_mistake: Engineers often conflate 'small device' with 'memory-bound'. While
    total memory is scarce, the *bandwidth* from fast on-chip SRAM is relatively high
    compared to the MCU's weak general-purpose compute capabilities. They mistakenly
    apply intuitions from GPUs—which have massive compute power making them often
    memory-bound—to MCUs, which have the opposite architectural balance.
  napkin_math: |
    A typical Cortex-M4 has peak compute of ~336 MFLOPS and its on-chip SRAM bandwidth is ~1.2 GB/s.
    The roofline ridge point is the ratio of these two values: 336 MFLOPS / 1.2 GB/s = 0.28 FLOPs/Byte.
    Since even simple standard convolutions have an arithmetic intensity greater than 1 FLOP/Byte, the workload sits far to the right of the ridge point, making it firmly compute-bound.
  options:
  - Memory-bound, because all neural networks are memory-bound.
  - Memory-bound, because microcontrollers have very little SRAM.
  - Compute-bound, because the FPU is weak relative to the fast SRAM bandwidth.
  - I/O bound, because reading from the microphone sensor is the slowest part.
  correct_index: 2
