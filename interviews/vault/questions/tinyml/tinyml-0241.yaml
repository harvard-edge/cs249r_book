title: Microcontroller Performance Reality
scenario: You are profiling a simple keyword-spotting model on a Cortex-M4 microcontroller.
question: Based on its fundamental hardware architecture, would you expect the model's performance to be limited by its compute capability (compute-bound) or by its memory bandwidth (memory-bound)?
details:
  realistic_solution: Performance on a general-purpose microcontroller like a Cortex-M4 is typically **compute-bound**. The core's floating-point unit (FPU) is not highly specialized for ML workloads and is relatively weak compared to its fast on-chip SRAM bandwidth. This results in a very low 'ridge point' on the roofline model, meaning even moderately complex operations can saturate the processor.
  common_mistake: |
    **The Pitfall:** Assuming MCUs are memory-bound just because they have small memory capacities.
    **The Rationale:** Engineers mistakenly apply intuitions from GPUs—which have massive compute power making them often memory-bound—to MCUs, conflating 'total memory capacity' with 'memory bandwidth'.
    **The Consequence:** They misdirect optimization efforts toward memory bandwidth instead of optimizing the arithmetic operations.
  napkin_math: |
    1. Peak Compute: A typical Cortex-M4 has peak compute of ~336 MFLOPS.
    2. Memory Bandwidth: On-chip SRAM bandwidth is ~1.2 GB/s.
    3. Roofline Ridge Point: 336 MFLOPS / 1.2 GB/s = **0.28 FLOPs/Byte**.
    4. Workload Intensity: Standard convolutions have an arithmetic intensity > 1 FLOP/Byte.
    5. Result: The workload sits far to the right of the ridge point, making it firmly **compute-bound**.
  options:
  - Memory-bound, because all neural networks are memory-bound.
  - Memory-bound, because microcontrollers have very little SRAM.
  - Compute-bound, because the FPU is weak relative to the fast SRAM bandwidth.
  - I/O bound, because reading from the microphone sensor is the slowest part.
  correct_index: 2
