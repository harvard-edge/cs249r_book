title: TinyML Producer Consumer Spec
scenario: A TinyML device must sample, preprocess, infer, and transmit without missing sensor deadlines. Specify the concurrency contract between DMA, CPU preprocessing, NPU inference, and radio transmission.
question: What concurrency contract prevents DMA, CPU preprocessing, NPU inference, and radio transmission from blocking each other on TinyML?
details:
  realistic_solution: The contract should specify buffer ownership, interrupt priorities, DMA completion signals, NPU job queue, CPU preprocessing windows, radio transmit windows, and overflow policy. Each stage needs bounded time and a buffer handoff protocol so a slow radio or inference job does not block sampling.
  common_mistake: Treating TinyML as a single loop and ignoring that peripherals continue producing data while inference runs.
  napkin_math: If sampling produces 4 KB every 100 ms and radio can block for 300 ms, at least 12 KB of buffering is needed before safety margin.
