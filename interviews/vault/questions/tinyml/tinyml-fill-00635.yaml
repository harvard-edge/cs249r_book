title: Nordic nRF5340 Duty Cycling for Solar-Powered Edge ML
scenario: You are designing a solar-powered environmental sensor node using the Nordic nRF5340 (128 MHz
  ARM Cortex-M33, 256 KB SRAM, 1 MB flash, BLE) that performs infrequent ML inference on-device (e.g.,
  classifying ambient sounds). The system operates outdoors, relying solely on a small solar panel and
  a coin cell battery for power. The ML model requires approximately 50ms of active processing time on
  the nRF5340's 128 MHz core, consuming 15mA during inference. During deep sleep, the nRF5340 draws 1.5uA.
  BLE advertisement for data offload occurs every 5 minutes and takes 100ms, drawing 5mA. Explain WHY
  a simple periodic wake-up schedule, independent of ambient light conditions, is insufficient and potentially
  catastrophic for long-term operation, considering the nRF5340's limited resources and the dynamic energy
  harvesting environment.
details:
  realistic_solution: A realistic solution involves an adaptive duty cycling strategy. The nRF5340 should
    monitor the coin cell voltage and, if possible, the solar panel's output or ambient light. The wake-up
    frequency for ML inference and BLE transmission should dynamically adjust. For example, during low
    light or low battery, the device extends its sleep cycles (e.g., wake every hour instead of every
    5 minutes for inference). When sufficient energy is harvested and battery levels are healthy, it can
    increase the frequency of ML tasks or data offloads. Implementing a state machine that transitions
    between aggressive data collection (high energy budget) and minimal maintenance (low energy budget)
    based on real-time energy availability ensures long-term survivability. Utilizing the nRF5340's built-in
    low-power peripherals and interrupt-driven events can minimize CPU wake-ups.
  common_mistake: A common mistake is to implement a fixed duty cycle (e.g., wake every X minutes, perform
    task, sleep) without adapting to available energy. This leads to battery depletion during prolonged
    low-light conditions or overcharging/inefficiency during high-light conditions, failing to balance
    energy consumption with energy harvesting rates. Ignoring the power profile of different nRF5340 operational
    modes (active vs. deep sleep vs. BLE transmit) and the relative energy cost of each also leads to
    poor scheduling decisions.
  napkin_math: "Let's assume a 200mAh coin cell. \n\n**Fixed schedule (Worst Case):**\n- ML inference:\
    \ 15mA * 50ms = 0.75 mAs (0.208 uAh)\n- BLE advertisement: 5mA * 100ms = 0.5 mAs (0.139 uAh)\n- Total\
    \ active per cycle (e.g., 5 min): 0.208 + 0.139 = 0.347 uAh\n- Sleep for 5 min: 1.5uA * (5 * 60)s\
    \ = 450 uAs (0.125 uAh)\n- Total per 5 min cycle: 0.347 + 0.125 = 0.472 uAh\n- Daily consumption (288\
    \ cycles): 0.472 uAh * 288 = 136 uAh = 0.136 mAh.\n- Battery life (fixed schedule, no recharge): 200mAh\
    \ / 0.136mAh/day ≈ 1470 days (over 4 years). This looks good on paper, but crucially assumes *no*\
    \ recharge variability and *only* these tasks. If the solar panel provides, say, 10uA average recharge,\
    \ it can only sustain 10uA consumption. The 136 uAh/day average consumption is about 5.6uA (136/24),\
    \ which is sustainable. However, peak power for inference (15mA) or BLE (5mA) might exceed the solar\
    \ panel's instantaneous output, draining the battery rapidly if not managed, especially during periods\
    \ of low light when the average recharge drops significantly below 5.6uA for extended periods. This\
    \ highlights the need for adaptive scheduling based on *current* energy income vs. expenditure and\
    \ battery state, not just average consumption."
