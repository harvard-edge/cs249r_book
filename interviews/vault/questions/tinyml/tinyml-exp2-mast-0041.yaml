title: Ethos-U55 Delegation and Shared SRAM Optimization
scenario: You are deploying a custom hybrid CNN-Transformer keyword spotting model to an ARM Cortex-M7
  + Ethos-U55 (Corstone-300) system. The system runs at 480 MHz with only 512 KB of shared SRAM for both
  the CPU and NPU. During TFLite Micro conversion, the Vela compiler successfully maps all Conv2D ops
  to the Ethos-U55, but the custom attention mechanism operators fall back to the Cortex-M7. Design a
  model conversion and runtime delegation strategy to maximize inference throughput while preventing SRAM
  exhaustion during CPU-NPU context switches.
details:
  realistic_solution: The optimal solution is to refactor the custom attention mechanism at the graph
    level into standard operations (e.g., standard FullyConnected and Softmax) that the Vela compiler
    can natively map to the Ethos-U55, avoiding fallback completely. If fallback is mathematically unavoidable,
    the deployment strategy must involve custom memory planning to pin fallback input/output tensors in
    the M7's Tightly Coupled Memory (TCM) to prevent NPU DMA stalls and bus contention.
  common_mistake: Candidates often suggest writing custom NPU microcode, which is unsupported by the closed-source
    Vela compiler, or they ignore the memory ping-pong overhead entirely. They frequently assume the 512
    KB SRAM is fully available to each core independently rather than treating it as a shared resource
    that bottlenecks the AHB bus during NPU-to-CPU fallback transitions.
  napkin_math: Assuming the Ethos-U55 is configured for 256 MACs/cycle, it achieves ~122.8 GMAC/s at 480
    MHz. Falling back to the M7 (which performs 2 MACs/cycle via DSP instructions) plummets compute to
    ~0.96 GMAC/s. If a 128 KB intermediate tensor must be passed between the NPU and CPU, moving it across
    a 32-bit AHB bus takes (131,072 bytes / 4 bytes) = 32,768 cycles. At 480 MHz, this transfer alone
    consumes ~68.2 microseconds per context switch, rapidly draining a strict 1-2 ms real-time inference
    budget if the graph bounces between cores multiple times.
