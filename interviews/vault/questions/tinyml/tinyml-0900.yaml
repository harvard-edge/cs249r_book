title: 'TinyML TCO Diagnosis: Identify Dominant Cost Driver in TinyML Fleet'
scenario: A TinyML fleet of 2000 ESP32-S3 units ($5 each) deployed for air quality monitoring shows annual costs of: hardware replacement 3%=$300/yr, power=$350/yr, connectivity (4G SIM)=$48,000/yr, maintenance=$5,000/yr, data storage (AWS S3 for sensor readings)=$2,400/yr. The team wants to reduce TCO by 50%.
question: Which annual cost dominates the 2000-unit ESP32-S3 air-quality fleet, and what replacement cuts TCO by 50%?
details:
  realistic_solution: 'Total annual: $300+$350+$48,000+$5,000+$2,400=$56,050. Connectivity: $48,000/56,050=85.6% of total. Fix: replace 4G ($2/device/month) with LoRaWAN ($0.05/device/month). Savings: $1.95*2000*12=$46,800/yr. New annual: $56,050-$46,800=$9,250. That''s 83.5% reduction > 50% target. LoRa gateway cost: 2000/100 = 20 gateways * $500 = $10K one-time. Payback: $10K/$46,800/yr = 0.21 years = 2.6 months. Verify: air quality sensor sends 288 readings/day * 20 bytes = 5.76KB/day per device. LoRa max throughput for 2000 devices: 2000*5.76KB/(24*3600s)=133 bytes/s total. LoRa 50kbps >> 133 bytes/s. Technically feasible.'
  common_mistake: |
    **The Pitfall:** Over-optimizing hardware unit costs.
    **The Rationale:** Candidates obsess over shaving cents off the microcontroller bill of materials, ignoring operating expenditures.
    **The Consequence:** They propose cheaper hardware, yielding negligible savings while the massive 4G connectivity bill continuously drains the budget.
  napkin_math: |
    - Annual costs: HW=$300, Power=$350, Connectivity=$48K, Maint=$5K, Storage=$2.4K. Total = $56.05K.
    - Connectivity is 85.6% of the budget.
    - Fix: LoRaWAN at $0.05 * 2000 * 12 = $1,200/yr vs $48K.
    - Add gateway infrastructure: 20 * $500 = $10K one-time.
    - New annual TCO: $9,250.
    - Savings: **$46,800/yr (83.5% reduction)**.
