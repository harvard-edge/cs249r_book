title: 'TinyML TCO Diagnosis: Identify Dominant Cost Driver in TinyML Fleet'
scenario: 'A TinyML fleet of 2000 ESP32-S3 units ($5 each) deployed for air quality
  monitoring shows annual costs of: hardware replacement 3%=$300/yr, power=$350/yr,
  connectivity (4G SIM)=$48,000/yr, maintenance=$5,000/yr, data storage (AWS S3 for
  sensor readings)=$2,400/yr. The team wants to reduce TCO by 50%. Diagnose the dominant
  cost and specify the fix.'
question: Which annual cost dominates the 2000-unit ESP32-S3 air-quality fleet, and
  what replacement cuts TCO by 50%?
details:
  realistic_solution: 'Total annual: $300+$350+$48,000+$5,000+$2,400=$56,050. Connectivity:
    $48,000/56,050=85.6% of total. Fix: replace 4G ($2/device/month) with LoRaWAN
    ($0.05/device/month). Savings: $1.95*2000*12=$46,800/yr. New annual: $56,050-$46,800=$9,250.
    That''s 83.5% reduction > 50% target. LoRa gateway cost: 2000/100 = 20 gateways
    * $500 = $10K one-time. Payback: $10K/$46,800/yr = 0.21 years = 2.6 months. Verify:
    air quality sensor sends 288 readings/day * 20 bytes = 5.76KB/day per device.
    LoRa max throughput for 2000 devices: 2000*5.76KB/(24*3600s)=133 bytes/s total.
    LoRa 50kbps >> 133 bytes/s. Technically feasible.'
  common_mistake: Proposing to optimize hardware cost (only $300/yr) when connectivity
    (4G) is the dominant cost at 84% of total annual spend, and not recognizing that
    the fix is changing connectivity technology.
  napkin_math: 'Annual costs: HW=$300, Power=$350, Connectivity=$48K, Maint=$5K, Storage=$2.4K.
    Total=$56.05K. Connectivity=85.6%. Fix: LoRa at $0.05*2000*12=$1,200/yr vs $48K.
    Add gateway: 20*$500=$10K one-time. New annual: $300+$350+$1,200+$5,000+$2,400=$9,250.
    Savings: $46,800/yr=83.5% reduction. 3yr NPV: $46,800*2.723=$127,437-$10,000=$117,437.
    Implementation: 4 weeks for LoRa antenna integration + firmware update = $20K
    engineering. Net 3yr: $117,437-$20K=$97,437. 85.6% cost concentration in connectivity
    is the smoking gun.'
