title: MCUNet Search Space Design
scenario: You're building a NAS pipeline to find the best image classification model for a Cortex-M4 (256
  KB SRAM, 1 MB flash, 168 MHz). MCUNet showed this is possible, but their search took 24 GPU-hours. Your
  team has a budget of 4 GPU-hours. How do you design the search space to find a competitive model in
  6× less time?
question: "How do you design the search space to find a competitive model in 6× less time?"
details:
  realistic_solution: 'The key insight from MCUNet is that the search space itself must be constrained
    by the hardware. A standard NAS search space (like those used for ImageNet on GPUs) contains architectures
    that are infeasible on MCUs — they waste search time evaluating models that will never fit. Shrink
    the search space to only contain feasible architectures:'
  common_mistake: '"Just run MCUNet''s search for fewer iterations." Reducing iterations without adapting
    the search space gives you a random model from a huge space — not a good model from a focused space.'
  napkin_math: 'Unconstrained search space: ~10¹² architectures. SRAM-filtered: ~10⁴. SIMD-aligned channels:
    ~10³. Two-stage search: evaluate ~360 candidates. Supernet training: 2 GPU-hours. Sub-network evaluation:
    360 × 20 seconds = 2 GPU-hours. Total: 4 GPU-hours. Expected accuracy: within 1-2% of the full MCUNet
    search (which found 70.7% ImageNet top-1 on Cortex-M4 with 256 KB SRAM).'
