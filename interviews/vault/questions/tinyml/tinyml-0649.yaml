title: MCUNet Search Space Design
scenario: You're building a NAS pipeline to find the best image classification model for an MCU (256 KB SRAM, 1 MB flash). MCUNet showed this is possible, but their search took 24 GPU-hours. Your team has a budget of 4 GPU-hours.
question: How do you design the search space to find a competitive model in 6x less time?
details:
  realistic_solution: To drastically accelerate NAS, explicitly construct a strictly bounded, hardware-aware search space. Typical cloud NAS spaces contain magnitudes of models completely infeasible for microcontrollers, squandering search budgets. By pruning the search space to only evaluate architectures statically conforming to the 256KB SRAM and 1MB flash boundaries, search cycles are spent exclusively on structurally viable candidates, radically accelerating convergence.
  common_mistake: |
    **The Pitfall:** Prematurely reducing NAS iterations without constraining the architectural bounds.
    **The Rationale:** Teams naively throttle the search epochs to meet compute budgets rather than engineering the mathematical search boundaries.
    **The Consequence:** The shortened search blindly outputs a random, sub-optimal model from an overly broad space, crippling deployment performance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - MCU Limits: 256 KB SRAM, 1 MB Flash.
       - Budget: 4 GPU-hours vs MCUNet's 24 GPU-hours.
    2. **Calculations:**
       - Unconstrained space: ~10^12 architectures.
       - Hardware-filtered space: ~10^4 architectures.
       - Supernet training: 2 GPU-hours. Evaluation (360 candidates x 20s): 2 GPU-hours.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Search.** Hard boundary pruning reduces search space by orders of magnitude, meeting the 4-hour budget.
