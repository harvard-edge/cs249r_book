title: 'Model Size Estimation: Analyze Why MCU Cannot Run INT8 Models Larger Than 200KB'
scenario: 'A firmware engineer says: "The Cortex-M4 has 256KB SRAM and 512KB Flash, so we can run INT8 models up to 512KB."'
question: Why is 512 KB Flash not the real limit for INT8 model size on Cortex-M4, and what SRAM-based limit applies?
details:
  realistic_solution: 'Flash: model weights (read-only). Max model in Flash: 512KB - 64KB (application code) - 20KB (TFLM kernels) = 428KB → 428K parameters INT8. SRAM consumers during inference: (1) TFLM runtime: 30KB. (2) Stack: 8KB. (3) Input buffer (audio/sensor): 4KB. (4) Activation tensor arena (peak): depends on model, but typically 30-50% of model weight size for MLPs, 100-300% for CNNs. For 428K model with CNN activations (200% ratio): 428K × 2 = 856KB >> 256KB SRAM. Actual max: activation arena < 256-30-8-4=214KB. If CNN activations = 200% of model: max model = 107K params INT8 = 107KB Flash. MLP activations (20% ratio): max model = 214/0.2 = 1.07MB Flash — limited by Flash (428KB).'
  common_mistake: |
    **The Pitfall:** Equating Flash size with maximum model size.
    **The Rationale:** Engineers assume that if the weights fit on disk (Flash), the model will run, forgetting that inference requires substantial working memory for dynamic activation tensors.
    **The Consequence:** Designing huge CNNs that compile fine but crash instantly during initialization due to insufficient SRAM for the tensor arena.
  napkin_math: |
    1. **Assumptions & Constraints:** 256KB SRAM, 512KB Flash. TFLM runtime (30KB), Stack (8KB), Input buffer (4KB). CNN acts/weights ratio ~2x. MLP acts/weights ratio ~0.2x.
    2. **Calculations:** Available SRAM for activations = 256 - 30 - 8 - 4 = 214KB. Max CNN model weights = 214KB / 2 = 107KB. Max MLP model weights = 214KB / 0.2 = 1.07MB (but limited by 512KB Flash limit).
    3. **Conclusion & Interpretation:** **CNNs are limited to ~107K parameters due to the 214KB SRAM activation arena constraint** (SRAM-Capacity-Bound).
