title: The Federated Wake-Word TCO
scenario: 'You''re the ML Systems Engineer for a company that has deployed 1 million smart speakers using a Cortex-M4 MCU. The wake-word model incorrectly activates 5 times per day on each device. To improve the model, you are evaluating the energy TCO of two data collection strategies over one year: 1) Centralized (upload 1 second of audio per event over Wi-Fi, 1W power draw). 2) Federated (train on-device using the MCU, 50mW power draw for 10 seconds per event).'
question: 'Which yearly energy TCO is lower for improving the wake-word model, centralized audio upload or federated on-device training?'
details:
  realistic_solution: 'The primary driver is the large power difference between the Wi-Fi radio and the MCU. The Wi-Fi module''s power consumption (1W = 1000mW) is 20 times higher than the MCU''s (50mW). Even though the on-device training takes 10 times longer, its total energy consumption per event is actually half that of the upload. This difference, when scaled to a million devices over a year, becomes the dominant factor in the energy TCO, demonstrating that networking is often far more expensive than compute in energy-constrained systems.'
  common_mistake: |
    **The Pitfall:** Focusing only on the duration of the operation and ignoring the power draw differences.
    **The Rationale:** Engineers underestimate how Wi-Fi power draw drastically outweighs MCU compute power.
    **The Consequence:** The centralized upload strategy is incorrectly favored, leading to much higher energy costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1 million devices, each triggering 5 events/day for 365 days (1.825 billion events/yr).
    - Centralized Wi-Fi upload consumes 1W for 1s per event.
    - Federated MCU training consumes 50mW for 10s per event.

    **Calculations:**
    - Centralized energy per event: 1W * 1s = 1 Joule.
    - Centralized total yearly energy: 1.825 billion Joules = ~507 kWh.
    - Federated energy per event: 0.05W * 10s = 0.5 Joules.
    - Federated total yearly energy: 912 million Joules = ~253 kWh.

    **Conclusion & Interpretation:**
    - **Result: 253 kWh (Power-Bound)**. Federated learning is 2x more energy-efficient than centralized uploads because networking power draw overshadows the longer compute time.
  options:
  - 'The federated approach has a higher TCO because the 10-second training time is 10x longer than the 1-second upload time, leading to higher energy consumption.'
  - 'The centralized approach is overwhelmingly more expensive due to the massive cloud ingress and storage costs from 1 million devices, making the on-device energy cost irrelevant.'
  - 'The centralized approach has a higher energy TCO because the Wi-Fi radio''s power draw (1W) is 20x higher than the MCU''s (50mW), making its total energy per event 2x greater despite the shorter duration.'
  - 'The energy TCO difference is negligible as it amounts to fractions of a cent per device, so the decision should be based purely on privacy and implementation complexity, not economics.'
