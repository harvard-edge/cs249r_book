title: Parallel DMA and Compute Bottleneck Analysis
scenario: A smart microphone offloads a 1ms audio buffer transfer to a DMA controller.
  Simultaneously, the CPU processes the previous buffer, taking 3ms.
question: Identify the limiting steady-state time per buffer under this parallel double-buffering
  scheme.
details:
  realistic_solution: With double buffering, the DMA transfer and CPU compute occur
    in parallel. The limiting factor is the slower of the two stages, which is max(1ms,
    3ms) = 3ms.
  common_mistake: Adding the times together (1 + 3 = 4ms) due to a failure to understand
    that DMA offloads transfer from the CPU execution thread.
  napkin_math: max(1, 3) = 3ms
