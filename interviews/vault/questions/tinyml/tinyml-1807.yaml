title: Parallel DMA and Compute Bottleneck Analysis
scenario: A smart microphone offloads a 1ms audio buffer transfer to a DMA controller. Simultaneously, the CPU processes the previous buffer, taking 3ms.
question: What is the limiting steady-state time per buffer under this parallel double-buffering scheme?
details:
  realistic_solution: With double buffering, the DMA transfer and CPU compute occur in parallel. The limiting factor is the slower of the two stages, which is max(1ms, 3ms) = 3ms.
  common_mistake: |
    **The Pitfall:** Adding the transfer and compute times together.
    **The Rationale:** Candidates fail to understand that DMA offloads memory transfer from the CPU execution thread, allowing both to occur concurrently.
    **The Consequence:** The total steady-state time per buffer is incorrectly calculated as 4ms instead of 3ms.
  napkin_math: |
    1. Identify DMA transfer time: 1 ms.
    2. Identify CPU compute time: 3 ms.
    3. Calculate limiting steady-state time: Parallel execution means taking the maximum of the two stages.
    4. Result: max(1 ms, 3 ms) = **3 ms**.
