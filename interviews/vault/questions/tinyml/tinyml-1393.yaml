title: Hardware-Aware NAS on ESP32-S3 for TinyML Vision
scenario: You need to develop an efficient image classification model for a low-power, edge device using an ESP32-S3 microcontroller. The device has a 240 MHz dual-core processor, 512 KB of on-chip SRAM, and 8 MB of external PSRAM. The model must classify 32x32 grayscale images into 10 categories with an inference latency under 200ms and a peak SRAM usage below 400KB.
question: How should ESP32-S3 hardware-aware NAS define search space and rewards for 32x32 image classification under SRAM and latency limits?
details:
  realistic_solution: A realistic solution would involve defining a NAS search space heavily biased towards compact, mobile/tiny architectures (e.g., MobileNetV2, GhostNet variants, ShuffleNet) with a strong emphasis on extremely low-bit quantization (e.g., 8-bit or 4-bit integer quantization) and aggressive pruning. The NAS reward function would be multi-objective, explicitly balancing accuracy, on-device measured or accurately estimated latency, and SRAM footprint. Pre-calculating SRAM usage for candidate layers and using a memory-aware predictor during search to prune infeasible architectures early would be implemented. PSRAM would primarily be considered for storing the full model weights at boot-up.
  common_mistake: |
    **The Pitfall:** Confusing total memory with operational SRAM.
    **The Rationale:** Candidates rely on the 8MB PSRAM for intermediate activations, misjudging the catastrophic latency hit of fetching data off-chip.
    **The Consequence:** The NAS proposes structurally large models that mathematically fit in the 8MB pool but completely fail the 200ms latency requirement due to bus contention.
  napkin_math: |
    - SRAM Constraint: With 400KB limit, an FP32 model holds max 102,400 parameters.
    - An INT8 quantized model holds 409,600 parameters, mandating aggressive quantization.
    - Latency Constraint: 200ms at 240 MHz = 48 million cycles available.
    - Assuming 1-2 cycles per MAC, absolute limit is **24-48 million MAC operations**, heavily restricting the search space to shallow, depthwise-separable networks.
