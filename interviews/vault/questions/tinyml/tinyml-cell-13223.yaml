title: Recall Memory-Bandwidth-Bound Decode on Embedded Hardware
scenario: 'An interviewer asks: why is autoregressive token generation (decode) memory-bandwidth-bound
  even on tiny MCUs with small models? Explain using the specific case of a 500K-parameter transformer
  on ESP32-S3 with 6.4 GB/s PSRAM bandwidth and 2.0 GFLOP/s compute. What is the minimum arithmetic intensity
  for compute-bound decode?'
question: "What arithmetic-intensity threshold makes 500K-parameter ESP32-S3 transformer decode compute-bound with PSRAM latency?"
details:
  realistic_solution: 'Decode processes 1 token at a time. For each token: FLOPs = 2×N_params×1 = 2×500K
    = 1M FLOPs. Bytes loaded = all weights = 500K×1B (INT8) = 500KB. Arithmetic intensity = 1M/500K =
    2 FLOP/byte. Ridge point = 2.0G/6.4G = 0.31 FLOP/byte. Since 2 > 0.31, decode is compute-bound? Actually:
    PSRAM latency is 10× higher than SRAM; effective bandwidth = 6.4/10 ≈ 0.64 GB/s. New ridge: 2.0/0.64
    = 3.1 FLOP/byte > 2 → memory-bandwidth-bound due to PSRAM latency.'
  common_mistake: Claiming decode is compute-bound on MCUs because they're 'slow'; the compute/bandwidth
    ratio still determines the roofline crossover independent of absolute performance.
  napkin_math: 'Ridge point with PSRAM latency: 2.0 GFLOP/s / 0.64 GB/s effective = 3.1 FLOP/byte. Model
    intensity at decode: 2 FLOP/byte < 3.1 → memory bound. SRAM only (512KB): must tile; effective BW
    = 25.6 GB/s → ridge = 2.0/25.6 = 0.078 → compute-bound in SRAM tiled execution.'
