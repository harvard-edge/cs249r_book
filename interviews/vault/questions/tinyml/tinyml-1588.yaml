title: SPI Bus Topology for Sensor Swarm
scenario: Four Cortex-M4 microcontrollers share a 10 Mbps SPI bus to compute a global
  average of 1KB activation vectors via AllReduce.
question: Explain why a binary tree reduction takes fewer logical steps than a logical
  ring topology over this shared single-collision-domain SPI bus.
visual:
  kind: svg
  path: tinyml-1588.svg
  alt: Diagram comparing a 4-node ring topology with a 4-node tree topology.
  caption: Ring vs Tree Topology
details:
  realistic_solution: 'On a single shared bus, parallel transmissions collide, so
    all transfers are strictly serialized. A logical ring of 4 nodes requires 2*(4-1)
    = 6 sequential transfers. A binary tree aggregates 2 leaves to a root, then broadcasts
    back, requiring fewer total serialized message slots (4 transfers: 2 up, 2 down)
    because the bus inherently prevents concurrent ring steps.'
  common_mistake: Applying data center Ring AllReduce formulas without realizing a
    shared SPI bus cannot support concurrent point-to-point links.
  napkin_math: 'Ring: 6 steps vs Tree: 4 steps'
