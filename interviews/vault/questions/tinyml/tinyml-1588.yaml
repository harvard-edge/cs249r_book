title: SPI Bus Topology for Sensor Swarm
scenario: Four Cortex-M4 microcontrollers share a 10 Mbps SPI bus to compute a global average of 1KB activation vectors via AllReduce.
question: Explain why a binary tree reduction takes fewer logical steps than a logical ring topology over this shared single-collision-domain SPI bus.
visual:
  kind: svg
  path: tinyml-1588.svg
  alt: Diagram comparing a 4-node ring topology with a 4-node tree topology.
  caption: Ring vs Tree Topology
details:
  realistic_solution: 'On a single shared bus, parallel transmissions collide, so all transfers are strictly serialized. A logical ring of 4 nodes requires 2*(4-1) = 6 sequential transfers. A binary tree aggregates 2 leaves to a root, then broadcasts back, requiring fewer total serialized message slots (4 transfers: 2 up, 2 down) because the bus inherently prevents concurrent ring steps.'
  common_mistake: |
    **The Pitfall:** Applying data center Ring AllReduce formulas.
    **The Rationale:** Candidates often assume concurrent point-to-point links exist between nodes, carrying over knowledge from distributed GPU clusters via PCIe or Ethernet.
    **The Consequence:** Underestimating communication time by proposing an algorithm (Ring) that forces collisions on a single shared SPI bus.
  napkin_math: |
    - **Shared Bus Constraint:** Parallel transmissions collide; all transfers are strictly serialized.
    - **Ring Topology:** 2 * (4 nodes - 1) = 6 sequential transfers.
    - **Tree Topology:** 2 leaves up to root, then broadcast back down.
    - **Tree Transfers:** 2 up + 2 down = 4 sequential transfers.
    - **Conclusion:** **The binary tree requires only 4 transfers compared to the ring's 6, because the shared bus inherently prevents concurrent ring steps.**
