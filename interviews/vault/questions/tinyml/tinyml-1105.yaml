title: NPU Garbage Predictions After CPU Preprocessing
scenario: You are deploying an audio classification model on an ARM Cortex-M7 + Ethos-U55 platform. A microphone stream is continuously written via DMA to a 16KB buffer in the 512 KB shared SRAM. The 480 MHz M7 performs in-place feature extraction and triggers the Ethos-U55. The CPU features log correctly over UART, but the Ethos-U55 outputs completely random predictions.
question: "Why does Ethos-U55 read random features after the M7 computes MFCCs in a 16 KB DMA buffer?"
details:
  realistic_solution: The root cause is a lack of cache coherency. The Cortex-M7 employs a write-back L1 data cache. When it computes the features, the results reside in the L1 D-cache and are not immediately written back to the main 512 KB SRAM. Since the Ethos-U55 acts as a separate bus master and reads directly from SRAM, it fetches stale, uninitialized data.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the issue as a DMA race condition or NPU weight alignment issue.
    **The Rationale:** Candidates forget that the Cortex-M7 uses a write-back L1 data cache, while the NPU reads directly from SRAM.
    **The Consequence:** They propose adding arbitrary OS delays or double-buffering without addressing the cache coherency failure.
  napkin_math: |
    1. Calculate cache lines for 16KB buffer: 16,384 bytes / 32 bytes/line = 512 cache lines.
    2. Estimate D-cache flush cost: 512 lines * ~2 cycles/line = 1,024 cycles.
    3. Calculate flush time: 1,024 cycles / 480 MHz = ~2.1 microseconds.
    4. Estimate NPU model execution: 5M OPs / 512 OPs/cycle = ~9,765 cycles (~20 microseconds).
    5. **Final Result: The required cache flush adds ~2.1 µs overhead (only ~10% of execution time) and is strictly necessary.**
