title: MCU Minimum Theoretical Inference Latency
scenario: A Cortex-M4 runs a 10M MACs (Multiply-Accumulates) vision model. The core
  runs at 120 MHz and completes 1 MAC per 2 clock cycles.
question: Apply these hardware constraints to calculate the absolute minimum latency
  for a single inference, ignoring memory limits.
details:
  realistic_solution: 10M MACs requiring 2 cycles each equals 20 million clock cycles.
    At a clock frequency of 120 MHz (120 million cycles per second), the time required
    is 20M / 120M = 0.166 seconds, or 166.6ms.
  common_mistake: Treating MACs natively as single cycles without applying the 2-cycle
    architectural penalty constraint.
  napkin_math: 10M * 2 / 120M = 0.166s = 167ms
