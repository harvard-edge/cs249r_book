title: Tensor Arena Optimization for BLE-Enabled nRF5340 Edge Devices
scenario: You are finalizing the memory architecture for a predictive maintenance wearable running on
  a Nordic nRF5340. The system must continuously infer using a 1D CNN while maintaining an active BLE
  5.3 connection. The application core has 256 KB of SRAM and 1 MB of flash. Your team proposes an operator
  schedule that requires a 180 KB flat tensor arena, but the BLE stack and Zephyr RTOS already consume
  a combined 96 KB of SRAM. Evaluate the tradeoffs of different memory planning strategies to resolve
  this constraint without degrading the ~5mA active power budget.
question: "How would you evaluate the tradeoffs of different memory planning strategies to resolve this constraint without degrading the ~5mA active power budget?"
details:
  realistic_solution: A strong candidate will evaluate restructuring the operator schedule to reduce peak
    intermediate tensor lifespans, effectively lowering the required arena size. They will propose memory-mapped
    execution for weights directly from the 1 MB flash and apply operator fusion (e.g., fusing Conv1D
    with MaxPool) to ensure peak activations fit comfortably within the remaining SRAM without requiring
    external memory that violates the 5mA budget.
  common_mistake: Candidates often assume they can just compress the model weights, forgetting that the
    tensor arena size is dictated by the peak activation bottleneck, not the weights. They might also
    incorrectly suggest swapping activations to flash, ignoring that internal flash is primarily read-only
    and dynamic writing would destroy both latency and the active power budget.
  napkin_math: Total SRAM = 256 KB. RTOS/BLE overhead = 96 KB. Available SRAM for inference = 256 - 96
    = 160 KB. Proposed Arena = 180 KB (20 KB deficit). By fusing the bottleneck Conv1D and MaxPool layers,
    we avoid storing the intermediate 120 KB activation map. If the fused layer processes a 64 KB input
    to a 16 KB output directly, the new peak arena drops to 80 KB (input + output), fitting within the
    160 KB limit and leaving an 80 KB safety margin.
