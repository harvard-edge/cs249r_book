title: 'Model Size Estimation: Realize Parameter Count and Memory for MCU Anomaly Detector'
scenario: 'Size the complete memory layout for a vibration anomaly detector on Cortex-M4 (168MHz, 256KB SRAM, 512KB Flash). Model: 3 Conv1D layers (filters: 16, 32, 64; kernel: 8, 4, 2; input: 256 samples INT16) + Global Average Pooling + FC-2.'
question: How many bias bytes are required for the Conv1D anomaly detector, and why is that count different from the incorrect estimate?
details:
  realistic_solution: 'Bias count = sum of neurons per layer: 16+32+64+2 = 114 biases × 4B = 456 bytes.'
  common_mistake: |
    **The Pitfall:** Forgetting that Conv1D parameters depend on (filters × previous_filters × kernel_size) + biases.
    **The Rationale:** Candidates often use standard dense layer parameter formulas or miscalculate the number of bias terms.
    **The Consequence:** The model size estimate is inaccurate, leading to poor memory allocation on the MCU.
  napkin_math: |
    1. Neural net biases: layer1=16 neurons, layer2=32, layer3=64, output=2.
    2. Total bias params: 16 + 32 + 64 + 2 = 114 biases.
    **Result:** 114 biases × 4B (float32) = 456 bytes (not 584 bytes which would require 146 bias terms).
