title: Audio Pipeline DMA Tradeoffs on ESP32-S3
scenario: You are designing the data pipeline for a continuous audio keyword spotting model on the ESP32-S3 (240 MHz dual-core Xtensa, 512 KB SRAM, 8 MB PSRAM). The microphone captures 16-bit audio at 16 kHz, and the model requires a 1-second window to run inference using INT8 vector extensions.
question: Which design approach is better for the continuous audio keyword spotting model on the ESP32-S3?
details:
  realistic_solution: Design B is vastly superior. A 1-second audio buffer at 16 kHz/16-bit is only 32 KB, which easily fits within the 512 KB SRAM alongside a typical INT8 TinyML model. By using DMA with a ping-pong buffer in internal SRAM, the CPU can sleep or handle WiFi/BLE tasks completely undisturbed while the buffer fills. The zero-copy internal SRAM approach also ensures that the INT8 vector extensions are fed data at maximum bandwidth without external SPI bottlenecks.
  common_mistake: |
    **The Pitfall:** Choosing Design A to save internal SRAM for the model.
    **The Rationale:** Candidates assume "large" audio buffers should go to the 8 MB PSRAM, failing to calculate the actual 32 KB footprint of the audio.
    **The Consequence:** They severely underestimate the power consumption of high-frequency CPU interrupts and the latency penalty of fetching data from external PSRAM during inference.
  napkin_math: |
    *   **Audio Data Size**: 1 second = 16,000 samples/sec * 2 bytes/sample = 32,000 bytes (~32 KB).
    *   **Design A (Interrupt-driven)**: Reading 32-byte chunks requires 1,000 interrupts/sec. At ~100 CPU cycles per context switch, this wastes 100,000 cycles/sec, preventing deep sleep.
    *   **Design A (Latency)**: External PSRAM access latency over Octal SPI takes ~30-50 CPU cycles, bottlenecking vector MAC operations.
    *   **Design B (DMA)**: DMA costs 0 CPU cycles to move the 32 KB.
    *   **Design B (Interrupts)**: A 32 KB ping-pong buffer triggers only 2 interrupts per second (every 16 KB).
    *   **Conclusion**: **Design B keeps the 240 MHz CPU asleep 99.8% of the time during data collection.**
