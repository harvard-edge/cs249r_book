title: Audio Pipeline DMA Tradeoffs on ESP32-S3
scenario: You are designing the data pipeline for a continuous audio keyword spotting
  model on the ESP32-S3 (240 MHz dual-core Xtensa, 512 KB SRAM, 8 MB PSRAM). The microphone
  captures 16-bit audio at 16 kHz, and the model requires a 1-second window to run
  inference using INT8 vector extensions. You must evaluate two proposed designs.
  Design A uses an interrupt-driven approach where the CPU wakes up to read small
  chunks of I2S data, buffers it into the 8 MB PSRAM, and then copies it to SRAM for
  inference. Design B uses DMA to continuously write I2S data into a circular ping-pong
  buffer directly in the 512 KB internal SRAM. Evaluate these two alternatives and
  determine the better approach for a battery-powered edge device.
question: How would you evaluate these two alternatives and determine the better approach
  for a battery-powered edge device?
details:
  realistic_solution: Design B is vastly superior. A 1-second audio buffer at 16 kHz/16-bit
    is only 32 KB, which easily fits within the 512 KB SRAM alongside a typical INT8
    TinyML model. By using DMA with a ping-pong buffer in internal SRAM, the CPU can
    sleep or handle WiFi/BLE tasks completely undisturbed while the buffer fills.
    The zero-copy internal SRAM approach also ensures that the INT8 vector extensions
    are fed data at maximum bandwidth without external SPI bottlenecks.
  common_mistake: Candidates often choose Design A, assuming that 'large' audio buffers
    should be placed in the 8 MB PSRAM to save internal SRAM for the model. They fail
    to calculate the actual memory footprint of the audio and severely underestimate
    the power consumption of high-frequency CPU interrupts and the latency penalty
    of fetching data from external PSRAM during inference.
  napkin_math: 1 second of audio = 16,000 samples/sec * 2 bytes/sample = 32,000 bytes
    (~32 KB). In Design A, reading chunks of 32 bytes would require 1,000 interrupts/sec;
    at ~100 CPU cycles per context switch, this wastes 100,000 cycles/sec just on
    overhead, preventing deep sleep. External PSRAM access latency over Octal SPI
    takes ~30-50 CPU cycles, bottlenecking the vector MAC operations. In Design B,
    DMA costs 0 CPU cycles to move the 32 KB. Using a 32 KB ping-pong buffer triggers
    only 2 interrupts per second (every 16 KB), keeping the 240 MHz CPU asleep 99.8%
    of the time during data collection.
