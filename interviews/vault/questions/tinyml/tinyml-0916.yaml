title: 'TinyML TCO Optimization: Power Throttling for Extended Battery Life'
scenario: 'A 3000-unit ESP32-S3 (240MHz, WiFi, 100μA avg) IoT fleet has 1-year battery life (AAA, 1200mAh) requiring $15 replacement (battery+labor). Annual battery cost: 3000*$15=$45K.'
question: 'How would you calculate engineering investment vs 5-year savings for three hardware/software optimizations to extend battery life to 3 years?'
details:
  realistic_solution: 'Current: 100μA avg on 1200mAh = 1200/0.1=12,000hr=1.37yr ≈ 1yr with temperature effects. Target: 3yr = 26,280hr → need 1200/26280=0.0457mA=45.7μA. Reduce from 100μA to 46μA = 54% reduction needed. Opt 1: Deep sleep (1.5μA) when WiFi not in use. If WiFi used 1min/hr at 40mA avg, rest at 5μA idle: (1/60*40+59/60*0.005)=0.667+0.00492=0.672mA. Too high! WiFi is the problem. Opt 2: Replace WiFi sync with LoRa (18mA for 100ms every 10min): 18mA*100ms/(10*60*1000ms)=3μA. Plus sleep 1.5μA. Total: 4.5μA. Life: 1200/0.0045=266,667hr=30yr. Way over target! Opt 3: Simply disable WiFi, use LoRa. No WiFi kills connectivity. Trade: add LoRa module ($3/unit): 3000*$3=$9K. Saves: 2 battery cycles/unit/5yr: 3000*2*$15=$90K. Net: $81K savings.'
  common_mistake: 'Proposing optimizations without verifying the math shows 3x battery life improvement, and not accounting for the fact that WiFi transmission current (240mA peak) dominates if any WiFi activity occurs.'
  napkin_math: |
    **Assumptions & Constraints:**
    - WiFi-based: 100µA avg, 1200mAh battery.
    - LoRa-based: 18mA@100ms per 10min (3µA) + 1.5µA sleep = 4.5µA.
    - Cost: $15 replacement, $3 LoRa module.

    **Calculations:**
    - WiFi Life = 1200mAh / 0.1mA = 12,000hr ≈ 1.37yr.
    - LoRa Life = 1200mAh / 0.0045mA = 266,667hr = 30yr.
    - WiFi 5yr cost (3000 units) = 3000 * 2 replacements * $15 = $90K.
    - LoRa upgrade cost = 3000 * $3 = $9K (+ firmware $5K) = $14K.
    - Net Savings = $90K - $14K = $76K.

    **Conclusion & Interpretation:**
    - **Result: $76K Savings (Power-Bound)**. Swapping the communication module completely eliminates battery replacements, yielding massive savings over 5 years.
