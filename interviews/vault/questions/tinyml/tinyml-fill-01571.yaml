title: Analyzing Event-Driven Stream Architectures for nRF5340
scenario: A TinyML project aims to ingest high-frequency sensor data (e.g., 200 Hz from multiple sources)
  on a Nordic nRF5340 (128 MHz ARM Cortex-M33, 256 KB SRAM, 1 MB flash) for real-time processing and feature
  extraction. The data needs to be pre-processed and then streamed via BLE with minimal latency. Analyze
  the most suitable event-driven architectural patterns and data management strategies you would recall
  as applicable to these constraints, evaluating their trade-offs concerning power efficiency, memory
  footprint, and processing overhead.
details:
  realistic_solution: Utilize a lightweight RTOS (e.g., Zephyr, FreeRTOS) to manage tasks asynchronously,
    employing event queues for inter-task communication. Implement circular buffers with high and low
    watermarks for each sensor stream to manage memory efficiently and trigger processing. Perform feature
    computation in dedicated, optimized tasks, potentially using fixed-point arithmetic or CMSIS-DSP library
    functions. Optimize BLE connection parameters (intervals, slave latency) to balance throughput and
    power, and consider power management techniques like deep sleep modes and duty cycling.
  common_mistake: Overlooking the interplay between power consumption, high sampling rates, and BLE transmission
    frequency, leading to rapid battery drain. Another common mistake is implementing synchronous, blocking
    data processing loops that introduce unacceptable latency and risk data loss, or neglecting the impact
    of RTOS context switching overhead at very high event rates.
  napkin_math: 'Raw data rate: 200 Hz * 3 sensors * 2 bytes/sample/sensor (16-bit) = 1200 bytes/sec. A
    2-second buffer for resilience would require 2.4 KB of SRAM, well within the 256 KB. A 128 MHz Cortex-M33
    can execute millions of instructions per second; basic feature extraction for 1200 bytes/sec is manageable,
    but complex algorithms require profiling. BLE''s practical throughput (~10 KB/s) can handle even raw
    data, but optimized connection parameters are crucial for power.'
