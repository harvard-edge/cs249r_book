title: The Tensor Arena Budget
scenario: >
  You are deploying a sensor fusion model to a microcontroller that has 256 KB of SRAM. Your real-time operating system (RTOS) and Bluetooth stack reserve 150 KB of that SRAM for their own use. The model's most memory-intensive operation requires three tensors to be live in memory at the same time: a 40 KB accelerometer input tensor, a 50 KB gyroscope feature plane, and a 20 KB fusion scratch buffer.
question: What is the peak required tensor arena size, and will it fit within the available SRAM?
details:
  realistic_solution: >
    Calculate the available SRAM by subtracting system overhead, then compute the peak memory required by summing all concurrently live tensors. Available SRAM is 106 KB. The peak tensor arena is 110 KB. Since 110 KB > 106 KB, the model will Out-Of-Memory (OOM) crash without further operator fusion or intermediate buffer tiling.
  common_mistake: |
    **The Pitfall:** Comparing required memory against total chip SRAM or only looking at the largest single tensor.
    **The Rationale:** Candidates forget to account for RTOS overhead or misunderstand that peak memory is the sum of all concurrently live tensors.
    **The Consequence:** The model is deployed but crashes immediately due to an out-of-memory error.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total SRAM: 256 KB. System Usage: 150 KB.
       - Live Tensors: 40 KB, 50 KB, 20 KB.
    2. **Calculations:**
       - Available SRAM: 256 KB - 150 KB = 106 KB.
       - Peak Arena Size: 40 KB + 50 KB + 20 KB = 110 KB.
    3. **Conclusion & Interpretation:**
       - **Result: 110 KB peak > 106 KB available.** The model will not fit. **Bottleneck: Peak Memory Allocation.**
  options:
  - 110 KB; No, it exceeds the 106 KB of available SRAM.
  - 110 KB; Yes, it fits easily within the total 256 KB of SRAM.
  - 50 KB; Yes, the peak is determined by the largest tensor, which fits.
  - 90 KB; Yes, it fits with room to spare.
