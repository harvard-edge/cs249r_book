title: The Tensor Arena Budget
scenario: You are deploying a sensor fusion model to a microcontroller that has 256 KB of SRAM. Your real-time operating system (RTOS) and Bluetooth stack reserve 150 KB of that SRAM for their own use. The model's most memory-intensive operation requires three tensors to be live in memory at the same time: a 40 KB accelerometer input tensor, a 50 KB gyroscope feature plane, and a 20 KB fusion scratch buffer.
question: What is the peak required tensor arena size, and will it fit within the available SRAM?
details:
  realistic_solution: The correct approach is to first calculate the available SRAM, then calculate the peak required memory for the tensor arena, and finally compare the two. The available SRAM is 256 KB - 150 KB = 106 KB. The peak required memory is the sum of the three concurrent tensors: 40 KB + 50 KB + 20 KB = 110 KB. Since the required 110 KB is greater than the available 106 KB, the model will not fit without further optimization.
  common_mistake: |
    **The Pitfall:** Comparing required memory against total chip SRAM or only looking at the largest single tensor.
    **The Rationale:** Candidates forget to account for RTOS and system software overhead, or they misunderstand that peak memory is the sum of all concurrently live tensors.
    **The Consequence:** The model is deployed but crashes immediately due to an out-of-memory error.
  napkin_math: |
    - Total SRAM = 256 KB.
    - System Usage = 150 KB.
    - Available SRAM = 256 KB - 150 KB = 106 KB.
    - Peak Required Memory = 40 KB + 50 KB + 20 KB = 110 KB.
    - **Final Result:** 110 KB > 106 KB, so it **will not fit**.
  options:
  - 110 KB; No, it exceeds the 106 KB of available SRAM.
  - 110 KB; Yes, it fits easily within the total 256 KB of SRAM.
  - 50 KB; Yes, the peak is determined by the largest tensor, which fits.
  - 90 KB; Yes, it fits with room to spare.
