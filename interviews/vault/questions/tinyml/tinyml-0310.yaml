title: The Microcontroller's Bottleneck
scenario: You're optimizing a keyword-spotting model on a Cortex-M4 microcontroller.
question: According to the Roofline model, are the core convolution and matrix multiplication operations on this device typically compute-bound or memory-bound?
details:
  realistic_solution: They are typically **compute-bound**. A Cortex-M4's CPU is extremely slow (~336 MFLOPS) compared to its fast on-chip SRAM bandwidth (~1.2 GB/s). This results in a very low 'ridge point' of around 0.2 Ops/Byte. Most neural network layers have an arithmetic intensity far greater than this, meaning the processor cannot perform calculations fast enough to saturate the memory bus.
  common_mistake: |
    **The Pitfall:** Confusing total memory capacity with memory bandwidth.
    **The Rationale:** Engineers assume that because TinyML devices are memory-constrained (capacity), their operations must inherently be memory-bound (bandwidth).
    **The Consequence:** They optimize for memory bandwidth rather than computational efficiency, yielding poor latency improvements.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cortex-M4 CPU Peak Compute: ~336 MFLOPS.
       - On-chip SRAM Peak Bandwidth: ~1.2 GB/s.
    2. **Calculations:**
       - Ridge Point = Compute / Bandwidth = 336M / 1.2G = 0.28 Ops/Byte.
       - Typical Conv2D arithmetic intensity is > 10 Ops/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: 0.28 Ops/Byte Ridge Point.** Because intensity (10) >> ridge point (0.28), operations are deeply **Compute-Bound**.
  options:
  - Memory-bound, because TinyML devices have very little SRAM.
  - Compute-bound, because the CPU is too slow to saturate the SRAM memory bus.
  - Neither, the operations are perfectly balanced by design.
  - It depends entirely on the compiler, not the hardware specs.
  correct_index: 1
