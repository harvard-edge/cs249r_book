title: The Microcontroller's Bottleneck
scenario: You're optimizing a keyword-spotting model on a Cortex-M4 microcontroller. According to the
  Roofline model, are the core convolution and matrix multiplication operations on this device typically
  compute-bound or memory-bound?
details:
  realistic_solution: They are typically **compute-bound**. A Cortex-M4's CPU is extremely slow (~336
    MFLOPS) compared to its fast on-chip SRAM bandwidth (~1.2 GB/s). This results in a very low 'ridge
    point' of around 0.2 Ops/Byte. Most neural network layers have an arithmetic intensity far greater
    than this, meaning the processor cannot perform calculations fast enough to saturate the memory bus.
    The bottleneck is the CPU, not the memory speed.
  common_mistake: Engineers often assume that because TinyML devices are memory-constrained (e.g., only
    256KB of SRAM), their operations must be memory-bound. This confuses total memory *capacity* with
    memory *bandwidth*. While capacity is the biggest challenge for fitting the model, the actual operations
    are often bottlenecked by the extremely slow CPU, not the speed of on-chip SRAM access.
  napkin_math: The roofline's ridge point is where compute and memory limits meet.
  options:
  - Memory-bound, because TinyML devices have very little SRAM.
  - Compute-bound, because the CPU is too slow to saturate the SRAM memory bus.
  - Neither, the operations are perfectly balanced by design.
  - It depends entirely on the compiler, not the hardware specs.
  correct_index: 1
