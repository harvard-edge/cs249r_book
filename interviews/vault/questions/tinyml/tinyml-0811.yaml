title: Tinyml New 0036
scenario: A developer switches the compiler optimization flag from `-Os` (size) to `-O3` (speed) to reduce
  latency on a Cortex-M4. The resulting binary now exceeds Flash capacity and fails to flash.
question: "Why does switching from -Os to -O3 make the Cortex-M4 binary fail to flash, and what optimization strategy should be used?"
details:
  realistic_solution: The `-O3` flag enables aggressive loop unrolling and function inlining, which massively
    bloats the code size (text segment). On resource-constrained microcontrollers, this quickly exceeds
    the physical Flash memory limits. The solution is to revert to `-Os`, or selectively apply `-O3` only
    to the critical MAC loops using `#pragma` directives.
  common_mistake: Blindly applying server-class compiler optimization flags to microcontroller environments
    without checking memory maps.
  napkin_math: A convolution loop with 100 iterations taking 10 bytes per instruction turns into 1000
    bytes when unrolled. For 250 layers, binary inflates by ~250KB. Original 50KB + 250KB = 300KB > 256KB
    flash limit.
