title: The SRAM Bank Conflict Slowdown
scenario: >
  Your audio classification model on a Cortex-M7 runs a depthwise separable Conv2D layer. When the input channels are 64, inference takes 2.1 ms. When you increase to 128 channels (2x compute), inference takes 5.8 ms — a 2.76x slowdown instead of the expected 2x. Profiling shows the MAC throughput drops from 1.8 GMAC/s to 1.3 GMAC/s.
question: Why does doubling STM32H7 depthwise channels from 64 to 128 cause a 2.76x slowdown instead of 2x?
details:
  realistic_solution: >
    The STM32H7's DTCM SRAM uses two interleaved 64 KB banks on 32-bit boundaries to support single-cycle dual-issue reads. At 64 channels, the tensors are offset by an odd number of words, hitting alternating banks with 0% conflict. At 128 channels, the sizes are exact multiples of 32 words, perfectly aligning the tensors to the same bank. Both read pointers simultaneously hit Bank 0, causing a 50% conflict rate. Padding the allocations by 4 bytes purposefully misaligns the pointers, resolving the bank conflict and restoring the M7 dual-issue throughput.
  common_mistake: |
    **The Pitfall:** Blaming the slowdown on a "cache miss" or capacity limit.
    **The Rationale:** Developers accustomed to application processors assume any non-linear scaling is a cache effect.
    **The Consequence:** Wasting time trying to optimize loops for cache locality when the DTCM has no cache; it is single-cycle SRAM that suffers from architectural bank conflicts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - M7 DTCM: 2 banks, 32-bit interleaved. Dual-issue capable.
       - Expected scaling: 2.0x (4.2 ms).
    2. **Calculations:**
       - 128 channels aligns tensors to identical banks (~50% conflict rate).
       - Stall Overhead: 50% conflict * 40% memory-bound fraction = 20% raw overhead.
       - Dual-Issue Penalty: 20% * 1.9 = 38% effective overhead.
       - Calculated Scaling: 2.0 (compute) * 1.38 = 2.76x slowdown.
       - Expected Execution: 2.1 ms * 2.76 = 5.8 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 2.76x slowdown due to SRAM bank conflict.** Padding allocations by 4 bytes misaligns the pointers, restoring the expected 4.2 ms time. **Bottleneck: Memory Bank Contention.**
