title: Cortex-M4 Duty Cycle Budget
scenario: A Cortex-M4 acoustic keyword spotter runs at 80 MHz, consuming 15mW active
  and 10uW asleep. You want an overall power budget of 100uW.
question: Design a duty-cycling specification that achieves the 100uW target, calculating
  the maximum active duty cycle percentage.
visual:
  kind: svg
  path: tinyml-1629.svg
  alt: Pie chart showing 99.4% sleep time and 0.6% active time
  caption: Duty cycle breakdown for 100uW budget
details:
  realistic_solution: Total Power = P_active * D + P_sleep * (1 - D). 100uW = 15000uW
    * D + 10uW * (1 - D). 90 = 14990 * D. D = 90 / 14990 = 0.006.
  common_mistake: Ignoring the sleep power contribution when the target power is very
    low.
  napkin_math: D = 0.6% active time.
