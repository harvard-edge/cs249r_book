title: Cortex-M4 Duty Cycle Budget
scenario: A Cortex-M4 acoustic keyword spotter consumes 15 mW active and 10 µW in deep sleep. You want an overall power budget of 100 µW.
question: What is the maximum active duty cycle percentage required to achieve a 100uW average power budget?
visual:
  kind: svg
  path: tinyml-1629.svg
  alt: Pie chart showing 99.4% sleep time and 0.6% active time
  caption: Duty cycle breakdown for 100uW budget
details:
  realistic_solution: Total Power = P_active * D + P_sleep * (1 - D). 100uW = 15000uW * D + 10uW * (1 - D). 90 = 14990 * D. D = 90 / 14990 = 0.006.
  common_mistake: |
    **The Pitfall:** Ignoring the sleep power contribution when the target power is very low.
    **The Rationale:** Because sleep power (10uW) seems negligible compared to active power (15,000uW), candidates drop it from the equation.
    **The Consequence:** The calculation overestimates the allowed active duty cycle, causing the device to exceed its power budget and drain the battery prematurely.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target average power (P_avg): 100 µW.
    - Active power (P_active): 15,000 µW (15 mW).
    - Sleep power (P_sleep): 10 µW.
    - Duty cycle (D): Proportion of time spent in active mode.

    **Calculations:**
    - P_avg = (P_active * D) + (P_sleep * (1 - D))
    - 100 µW = (15,000 * D) + (10 * (1 - D))
    - 100 = 15000D + 10 - 10D
    - 90 = 14990D
    - D = 90 / 14990 ≈ 0.006

    **Conclusion & Interpretation:**
    - **Result: 0.6% active duty cycle (Power-Bound)**. The maximum active duty cycle is 0.6% to meet the 100 µW budget.
