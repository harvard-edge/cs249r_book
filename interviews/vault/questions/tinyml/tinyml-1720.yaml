title: Diagnosing Heap Exhaustion in TF Lite Micro
scenario: A microcontroller running a TF Lite Micro application operates perfectly
  for 3 hours, then hard-faults. Logs show the system heap is completely exhausted.
question: Diagnose the likely cause of this memory exhaustion, given that TFLM utilizes
  a static memory arena for model execution.
details:
  realistic_solution: Because TFLM statically pre-allocates tensor memory in the arena
    once during initialization, the leak is extremely unlikely to be within the inference
    engine. The root cause is almost certainly a memory leak in the application-level
    C/C++ control loop (e.g., dynamically allocating strings, sensor buffers, or network
    payloads via malloc/new without freeing them) that gradually exhausts the heap
    over hours.
  common_mistake: Blaming dynamic tensor shape resizing inside the model, which is
    typically disabled or handled statically in TFLM.
  napkin_math: 3 * 3600 = 10800s
