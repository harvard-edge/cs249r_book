title: Diagnosing Heap Exhaustion in TF Lite Micro
scenario: A microcontroller running a TF Lite Micro application operates perfectly for 3 hours, then hard-faults. Logs show the system heap is completely exhausted.
question: Diagnose the likely cause of this memory exhaustion, given that TFLM utilizes a static memory arena for model execution.
details:
  realistic_solution: Because TFLM statically pre-allocates tensor memory in the arena once during initialization, the leak is extremely unlikely to be within the inference engine. The root cause is almost certainly a memory leak in the application-level C/C++ control loop (e.g., dynamically allocating strings, sensor buffers, or network payloads via malloc/new without freeing them) that gradually exhausts the heap over hours.
  common_mistake: |
    **The Pitfall:** Blaming dynamic tensor shape resizing inside the ML model.
    **The Rationale:** Developers accustomed to cloud ML frameworks assume tensors are dynamically allocated at runtime.
    **The Consequence:** They spend hours debugging TFLM internals instead of the application-level C/C++ control loop.
  napkin_math: |
    * Uptime before failure: 3 hours = 10,800 seconds.
    * Assuming 1 inference/sec, a leak of just 10 bytes per inference exhausts 108 KB in 3 hours.
    * **Result: A tiny application-level leak over 10,800 seconds drains the heap.**
