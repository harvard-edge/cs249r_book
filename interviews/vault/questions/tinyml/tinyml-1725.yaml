title: Cortex-M4 Inference Throughput
scenario: A Cortex-M4 running at 80 MHz executes a simple keyword spotting CNN requiring 10 MFLOPs per inference.
question: Calculate the sustained inferences per second assuming 50% MAC hardware utilization.
details:
  realistic_solution: A MAC operation requires 2 FLOPs, so 10 MFLOPs is 5 MMACs per inference. At 80 MHz, peak theoretical performance is 80 MMACs/sec. With 50% utilization, the system achieves 40 MMACs/sec. Dividing by 5 MMACs per inference yields 8 inferences per second.
  common_mistake: |
    **The Pitfall:** Failing to convert between FLOPs and MACs.
    **The Rationale:** Candidates forget that 1 MAC operation equals 2 FLOPs.
    **The Consequence:** The final calculation is off by a factor of 2.
  napkin_math: |
    - Convert operations: 1 MAC = 2 FLOPs, so 10 MFLOPs = 5 MMACs per inference.
    - Calculate peak performance: 80 MHz = 80 MMACs/sec.
    - Apply utilization: 80 MMACs/sec * 50% = 40 MMACs/sec.
    - **Sustained inferences: 40 MMACs/sec / 5 MMACs/inference = 8 inferences per second.**
