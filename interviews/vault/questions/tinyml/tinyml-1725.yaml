title: Cortex-M4 Inference Throughput
scenario: A Cortex-M4 running at 80 MHz executes a simple keyword spotting CNN requiring 10 MFLOPs per inference.
question: Calculate the sustained inferences per second assuming 50% MAC hardware utilization.
details:
  realistic_solution: A MAC operation requires 2 FLOPs, so 10 MFLOPs is 5 MMACs per inference. At 80 MHz, peak theoretical performance is 80 MMACs/sec. With 50% utilization, the system achieves 40 MMACs/sec. Dividing by 5 MMACs per inference yields 8 inferences per second.
  common_mistake: |
    **The Pitfall:** Failing to convert between Floating Point Operations (FLOPs) and Multiply-Accumulate (MAC) operations.
    **The Rationale:** Candidates treat FLOPs and MACs as a 1:1 metric.
    **The Consequence:** The final calculation for inference latency or throughput is off by exactly a factor of 2, leading to incorrect real-time deadline budgeting.
  napkin_math: |
    1. **Assumptions & Constraints:** 80 MHz CPU clock. Model requires 10 MFLOPs. Utilization is 50%.
    2. **Calculations:** 1 MAC = 2 FLOPs (one multiply, one add). 10 MFLOPs / 2 = 5 MMACs per inference. Peak CPU performance at 80 MHz = 80 MMACs/sec. Sustained performance at 50% utilization = 80 * 0.5 = 40 MMACs/sec. Sustained inferences = 40 MMACs/sec / 5 MMACs/inference = 8 inferences/sec.
    3. **Conclusion & Interpretation:** **Result: 8 inferences per second.** Understanding the 2:1 ratio of FLOPs to MACs is critical for translating theoretical model complexity into physical hardware throughput.
