title: Cortex-M4 Inference Throughput
scenario: A Cortex-M4 running at 80 MHz executes a simple keyword spotting CNN requiring
  10 MFLOPs per inference.
question: Calculate the sustained inferences per second assuming 50% MAC hardware
  utilization.
details:
  realistic_solution: A MAC operation requires 2 FLOPs, so 10 MFLOPs is 5 MMACs per
    inference. At 80 MHz, peak theoretical performance is 80 MMACs/sec. With 50% utilization,
    the system achieves 40 MMACs/sec. Dividing by 5 MMACs per inference yields 8 inferences
    per second.
  common_mistake: Failing to account for the 1 MAC = 2 FLOPs conversion, leading to
    an answer off by a factor of 2.
  napkin_math: (80 / 2) * 0.5 / (10 / 2) = 8
