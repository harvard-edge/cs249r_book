title: Evaluating Hardware-Aware NAS for ESP32-S3
scenario: We are deploying an always-on wake-word detection model on an ESP32-S3 (240 MHz dual-core Xtensa, 512 KB SRAM, 8 MB PSRAM, INT8 vector extensions). We used a hardware-aware NAS to generate two candidate models. Model A is tightly constrained to 300 KB peak SRAM usage to fit entirely within internal memory alongside the OS, achieving 91% accuracy. Model B uses a relaxed search space allowing up to 2 MB peak memory, utilizing the external 8 MB PSRAM for intermediate activations, and achieves 95% accuracy.
question: Which model is the better architectural choice for a battery-powered device and what are the system-level tradeoffs?
details:
  realistic_solution: Model A is the superior choice. For always-on TinyML applications, minimizing active power and latency is paramount. The ESP32-S3's internal 512 KB SRAM offers very low latency access, whereas accessing the external PSRAM introduces significant delays due to the SPI interface and cache misses, while also keeping the external memory circuitry powered up. The NAS constraint for Model A correctly forces the search space to find a topology that avoids the PSRAM bottleneck entirely.
  common_mistake: |
    **The Pitfall:** Choosing Model B solely for its higher accuracy.
    **The Rationale:** Candidates assume the 8 MB PSRAM is transparently usable like a larger cache, ignoring the physical hardware interface.
    **The Consequence:** They fail to account for the massive latency and power consumption penalties of routing heavy activation traffic over the SPI bus, draining the battery and missing real-time deadlines.
  napkin_math: |
    - **SRAM Bandwidth:** Multi-GB/s at 240 MHz.
    - **PSRAM Bandwidth:** ~40 MB/s over Octal SPI.
    - **PSRAM Latency Penalty:** A 250 KB activation map read/write takes (0.25 MB / 40 MB/s) * 2 = 12.5 ms per layer.
    - **Total Latency Overhead:** For an 8-layer network, this adds 100 ms of pure memory transfer latency per inference.
    - **System Impact:** At 10 Hz, the device spends 1000 ms (1 full second) out of every second just on memory IO, making real-time execution impossible.
    - **Conclusion:** **Model A** is the superior choice to minimize active power and latency.
