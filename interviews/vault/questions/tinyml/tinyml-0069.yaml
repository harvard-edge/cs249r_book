title: The Cellular NAT Timeout
scenario: Your IoT device connects to AWS IoT Core via MQTT over an LTE-M cellular connection. It sends
  an ML telemetry payload perfectly upon booting. It then sits idle for 30 minutes. When the next anomaly
  occurs, the `mqtt_publish()` function claims success, but the message never arrives at AWS. The device
  didn't sleep and the cellular signal is perfect. Why did the network silently swallow the message?
question: "Why does LTE-M NAT drop the MQTT anomaly message after 30 minutes of idle time despite `mqtt_publish()` success?"
details:
  realistic_solution: 'The LTE-M carrier''s NAT gateway has a ~300-second TCP session timeout. Your device
    sits idle for 1,800 seconds between publishes — 6x longer than the NAT timeout. The NAT silently drops
    the session mapping, so the device''s TCP socket appears valid locally but packets are blackholed
    at the carrier. MQTT''s QoS 1 publish returns success because it wrote to the local TCP buffer, not
    because AWS received it. Fix: send MQTT PINGREQ every 240 seconds (under the 300s NAT timeout) to
    keep the session alive. Cost: ~100 bytes/ping x 6 pings/hour = negligible bandwidth, but keeps the
    NAT mapping permanently active.'
  common_mistake: '"The MQTT broker crashed." AWS IoT Core doesn''t crash; the path to it was severed.'
  napkin_math: LTE-M NAT Timeout = ~300 seconds. ML Anomaly Interval = 1800 seconds. 1800 > 300. The TCP
    connection is guaranteed to be dead every single time the device tries to use it.
