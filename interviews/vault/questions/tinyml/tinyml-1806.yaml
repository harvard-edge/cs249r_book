title: Power Loss Flash Write Margin Calculation
scenario: An IoT node detects a power loss, granting exactly 15ms of backup capacitor
  power. It must write 5KB of state to Flash, which requires 10ms of continuous write
  time.
question: Determine the safety margin in milliseconds remaining after the state is
  successfully flushed.
details:
  realistic_solution: The total time available is 15ms. The write operation statically
    requires 10ms. The safety margin is 15ms - 10ms = 5ms.
  common_mistake: Factoring in network transfer times or sensor polling when only
    the hardware power-down interrupt and flash write timings matter.
  napkin_math: 15 - 10 = 5ms
