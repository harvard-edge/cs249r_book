title: Power Loss Flash Write Margin Calculation
scenario: An IoT node detects a power loss, granting exactly 15ms of backup capacitor power. It must write 5KB of state to Flash, which requires 10ms of continuous write time.
question: "Determine the safety margin in milliseconds remaining after the state is successfully flushed."
details:
  realistic_solution: The total time available is 15ms. The write operation statically requires 10ms. The safety margin is 15ms - 10ms = 5ms.
  common_mistake: |
    **The Pitfall:** Factoring in network transfer times or sensor polling.
    **The Rationale:** Candidates overcomplicate the calculation by including tasks irrelevant to the critical power-down sequence.
    **The Consequence:** They incorrectly estimate the safety margin, potentially causing a state corruption on power loss.
  napkin_math: |
    1. Identify available backup power time: 15 ms.
    2. Identify Flash write operation time: 10 ms.
    3. Calculate safety margin: 15 ms - 10 ms = 5 ms.
    4. **Final Result: 5 ms safety margin remaining.**
