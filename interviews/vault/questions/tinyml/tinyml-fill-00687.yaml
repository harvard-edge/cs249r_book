title: Optimizing CNN for Real-time Anomaly Detection on Nordic nRF5340
scenario: You are tasked with deploying a real-time anomaly detection system for industrial equipment
  using a tiny CNN model on a Nordic nRF5340 microcontroller. The nRF5340 operates at 128 MHz, has 256
  KB of SRAM, and 1 MB of flash memory. The sensor data consists of 1D time series signals, which are
  preprocessed into 32x32 grayscale images (e.g., spectrograms or flattened raw data windows) before being
  fed to the CNN. The system needs to classify anomalies with a latency under 100ms and operate continuously
  on battery power for several months, implying extreme power efficiency. You have explored a standard
  CNN architecture, but it exceeds the memory and computational budget. Explain how you would redesign
  the CNN architecture to fit within these constraints, specifically leveraging principles like depthwise
  separable convolutions and inverted residuals, while maintaining acceptable accuracy.
details:
  realistic_solution: The most realistic solution involves adopting highly efficient architectures designed
    for resource-constrained environments. Specifically, one would heavily utilize depthwise separable
    convolutions, which drastically reduce FLOPs and parameter count compared to standard convolutions.
    Incorporating inverted residuals, as seen in MobileNetV2/V3 and EfficientNet, allows for higher channel
    expansion in lower-dimensional latent spaces, improving representational power while keeping the overall
    footprint small. Quantization (e.g., 8-bit integer quantization using TensorFlow Lite for Microcontrollers)
    and pruning techniques would be critical for further reducing model size and accelerating inference.
    The architecture would be carefully designed layer-by-layer to ensure activation maps and weights
    fit within the 256 KB SRAM and 1 MB flash, respectively, while minimizing FLOPs for the 128 MHz CPU.
  common_mistake: A common mistake is to directly attempt to port a conventional CNN (e.g., a slimmed-down
    VGG or ResNet block) without understanding the severe memory and computational limitations of the
    nRF5340. This often leads to models that exceed SRAM for activations, flash for weights, or require
    prohibitively long inference times (multiple seconds), making real-time processing impossible. Neglecting
    the trade-offs between FLOPs, memory access patterns, and accuracy is also a key pitfall.
  napkin_math: "For a 32x32 input and a 3x3 depthwise separable convolution with 32 input channels and\
    \ 64 output channels (expansion factor of 6 for inverted residual bottleneck), the FLOPs are significantly\
    \ reduced:\n\n1.  **Standard Convolution (32 in, 64 out):** (3x3x32) x 64 x (32x32) = 9 * 32 * 64\
    \ * 1024 = ~18.87M FLOPs\n2.  **Depthwise Separable (32 in, 64 out):**\n    *   Depthwise: (3x3x1)\
    \ x 32 x (32x32) = ~94K FLOPs\n    *   Pointwise (1x1): (1x1x32) x 64 x (32x32) = ~2.1M FLOPs (Note:\
    \ this is often the bottleneck, but depthwise separable is still far more efficient than a single,\
    \ wide conv layer with many input/output channels)\n\nFocusing on memory: a typical 3x3 convolution\
    \ layer with 32 input and 64 output channels (weights only) would be 3x3x32x64 = 18,432 parameters.\
    \ At INT8 (1 byte each) that's 18 KB. A 1MB flash limit implies a maximum of ~1M 8-bit integer parameters.\
    \ A 256KB SRAM budget means intermediate activations must also fit. A 32x32x64 activation map (INT8)\
    \ alone would be 32x32x64 = 65,536 bytes = 64 KB, and two such maps (input + output) require 128 KB\
    \ of the 256 KB SRAM, leaving only 128 KB for weights and stack. Thus, aggressive quantization and\
    \ careful layer design are critical."
