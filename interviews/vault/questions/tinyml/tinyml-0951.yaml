title: Cortex-M4 vs NPU Latency Analysis
scenario: We are evaluating hardware for an anomaly detection model requiring 8.4 million INT8 MAC operations per inference. We observe that a dedicated edge NPU clocked at just 10 MHz (capable of 64 MACs/cycle) processes inferences faster than our baseline ARM Cortex-M4 (STM32F4) running at 168 MHz (with 256 KB SRAM, 1 MB flash, no FPU) using CMSIS-NN SIMD instructions (2x INT8 MACs/cycle).
question: What is the theoretical compute-bound latency for both architectures that explains why the slower-clocked NPU outperforms the CPU?
details:
  realistic_solution: The performance difference is explained by the programmability-efficiency spectrum tradeoff. The Cortex-M4 is a general-purpose processor that uses temporal execution (high clock speed) with limited SIMD parallelism, while the NPU uses spatial execution (massive parallel arrays) tailored specifically for matrix math. Calculating the total cycles and dividing by clock frequency proves that the NPU's massive cycle-level parallelism easily overcomes its 16.8x slower clock speed.
  common_mistake: |
    **The Pitfall:** Assuming higher clock speed strictly dictates lower inference latency.
    **The Rationale:** Candidates overlook architectural parallelism and the 2x MACs/cycle enabled by CMSIS-NN SIMD on the Cortex-M4.
    **The Consequence:** Incorrect baseline latency calculations and a misunderstanding of the NPU's spatial execution efficiency.
  napkin_math: |
    - **ARM Cortex-M4 (168 MHz):** 8.4M MACs / 2 MACs/cycle = 4.2M cycles.
    - **Cortex-M4 Latency:** 4.2M cycles / 168 MHz = **25 ms**.
    - **Edge NPU (10 MHz):** 8.4M MACs / 64 MACs/cycle = 131,250 cycles.
    - **NPU Latency:** 131,250 cycles / 10 MHz = **13.125 ms**.
    - **Result:** The NPU is nearly twice as fast despite running at ~6% of the MCU's clock frequency.
