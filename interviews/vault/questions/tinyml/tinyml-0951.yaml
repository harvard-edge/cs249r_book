title: Cortex-M4 vs NPU Latency Analysis
scenario: We are evaluating hardware for an anomaly detection model requiring 8.4
  million INT8 MAC operations per inference. We observe that a dedicated edge NPU
  clocked at just 10 MHz (capable of 64 MACs/cycle) processes inferences faster than
  our baseline ARM Cortex-M4 (STM32F4) running at 168 MHz (with 256 KB SRAM, 1 MB
  flash, no FPU) using CMSIS-NN SIMD instructions (2x INT8 MACs/cycle). Calculate
  the theoretical compute-bound latency for both architectures to explain why the
  much slower-clocked NPU outperforms the CPU.
question: How would you calculate the theoretical compute-bound latency for both architectures
  to explain why the much slower-clocked NPU outperforms the CPU?
details:
  realistic_solution: The performance difference is explained by the programmability-efficiency
    spectrum tradeoff. The Cortex-M4 is a general-purpose processor that uses temporal
    execution (high clock speed) with limited SIMD parallelism, while the NPU uses
    spatial execution (massive parallel arrays) tailored specifically for matrix math.
    Calculating the total cycles and dividing by clock frequency proves that the NPU's
    massive cycle-level parallelism easily overcomes its 16.8x slower clock speed.
  common_mistake: Candidates often assume higher clock speed dictates lower latency,
    overlooking the architectural parallelism. They may also forget to factor in the
    2x MACs/cycle enabled by CMSIS-NN on the Cortex-M4, leading to an incorrect baseline
    calculation.
  napkin_math: 'ARM Cortex-M4: 8,400,000 MACs / 2 MACs/cycle = 4,200,000 cycles. Latency
    = 4,200,000 cycles / 168,000,000 Hz = 0.025 seconds (25 ms). Edge NPU: 8,400,000
    MACs / 64 MACs/cycle = 131,250 cycles. Latency = 131,250 cycles / 10,000,000 Hz
    = 0.013125 seconds (13.125 ms). The NPU is nearly twice as fast despite running
    at ~6% of the MCU''s clock frequency.'
