title: The TFLite Micro Arena Sizing
scenario: You're porting a gesture recognition model to TFLite Micro on a Cortex-M4 with 256 KB SRAM.
  The model has 5 layers. You set `tensor_arena_size = 100 KB` and it crashes with an allocation error.
  You try 200 KB and it works. How do you determine the minimum arena size without trial and error, and
  why is it not simply the sum of all tensor sizes?
details:
  realistic_solution: The tensor arena must hold the **peak simultaneous live tensors**, not the total.
    TFLite Micro uses a greedy memory planner that allocates all tensors at initialization and assigns
    them offsets within the arena based on their lifetimes.
  common_mistake: '"Add up all the tensor sizes: input (4 KB) + 4 intermediate tensors (8 KB each) + output
    (1 KB) = 37 KB. Set arena to 40 KB." This assumes tensors are allocated sequentially and freed after
    use. TFLite Micro''s memory planner doesn''t work that way.'
  napkin_math: 'For a typical MobileNet-like model on 96×96 input: Layer 1 output = 48×48×16 = 36,864
    bytes = 36 KB. Layer 2 output = 24×24×32 = 18,432 bytes = 18 KB. Peak (Layer 1→2): 36 + 18 = 54 KB.
    Scratch: 3×3×16 = 144 bytes. Accumulator: 32×4 = 128 bytes. Total: ~55 KB. With depthwise conv im2col:
    48×48×3×3 = 20,736 bytes = 20.25 KB scratch. New peak: 36 + 18 + 20.25 = **74.25 KB**. The scratch
    buffer is the hidden cost that makes the arena much larger than the naive tensor sum.'
