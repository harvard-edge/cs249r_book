title: The TFLite Micro Arena Sizing
scenario: You're porting a gesture recognition model to TFLite Micro on a Cortex-M4 with 256 KB SRAM. The model has 5 layers. You set `tensor_arena_size = 100 KB` and it crashes with an allocation error. You try 200 KB and it works.
question: How do you determine the minimum arena size without trial and error, and why is it not simply the sum of all tensor sizes?
details:
  realistic_solution: The tensor arena must hold the **peak simultaneous live tensors**, not the total. TFLite Micro uses a greedy memory planner that allocates all tensors at initialization and assigns them offsets within the arena based on their lifetimes.
  common_mistake: |
    **The Pitfall:** Assuming arena size is the simple sum of all tensor sizes.
    **The Rationale:** Candidates assume tensors are allocated sequentially and freed after use, not realizing TFLite Micro's memory planner requires holding peak simultaneous live tensors, including hidden scratch buffers.
    **The Consequence:** Underestimating the required SRAM and experiencing runtime allocation crashes.
  napkin_math: |
    - **Layer 1 Output**: 48x48x16 = 36.86 KB.
    - **Layer 2 Output**: 24x24x32 = 18.43 KB.
    - **Scratch/Im2Col**: 48x48x3x3 = 20.73 KB.
    - **Peak Live Tensors (Layer 1 -> 2)**: 36.86 + 18.43 + 20.73 = **76.02 KB** (plus small accumulators).
