title: TinyML Safety Case Spec
scenario: A TinyML controller monitors an industrial motor and can trigger a shutdown.
  Specify the evidence required before the model can be included in a safety case.
question: What evidence is required before a TinyML shutdown classifier can be included
  in an industrial safety case?
details:
  realistic_solution: The safety case should include hazard analysis, operating envelope,
    validation data coverage, false-negative limits, watchdog/fallback behavior, versioned
    model card, test traces, and resource usage under worst-case timing. The model
    must be part of a controlled safety mechanism, not an unbounded black box.
  common_mistake: Providing only test accuracy and ignoring operational envelope,
    fallback, and timing evidence.
  napkin_math: If shutdown must occur within 50 ms and inference worst case is 35
    ms, the safety case has only 15 ms for sensing, decision logic, and actuator command.
