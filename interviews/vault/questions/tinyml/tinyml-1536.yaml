title: TinyML Safety Case Spec
scenario: A TinyML controller monitors an industrial motor and can trigger a shutdown.
question: What evidence is required before a TinyML shutdown classifier can be included in an industrial safety case?
details:
  realistic_solution: Ensure the safety case specifies an operating envelope, false-negative bounds, fallback dog/hardware watchdogs, and guarantees worst-case execution time (WCET) bounds.
  common_mistake: |
    **The Pitfall:** Providing only offline test accuracy metrics as proof of system safety.
    **The Rationale:** Data scientists equate high F1-scores with safety, ignoring operational envelopes, real-time deadlines, and failsafe fallback logic.
    **The Consequence:** The system is rejected by safety certifiers because it operates as an unbounded black box without deterministic timing guarantees.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total safety response deadline: 50 ms.
       - Worst-Case Execution Time (WCET) for ML inference: 35 ms.
    2. **Calculations:**
       - Remaining budget for non-ML tasks: 50 ms - 35 ms = 15 ms.
       - Necessary tasks: Sensor DMA (e.g., 5 ms), safety logic (e.g., 5 ms), actuator command (e.g., 5 ms).
    3. **Conclusion & Interpretation:**
       - **Result: 15 ms slack.** The system is strict-deadline-bound. The safety case must mathematically prove the entire pipeline executes within 50 ms deterministically.
