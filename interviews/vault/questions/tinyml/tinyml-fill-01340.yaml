title: TinyML Graceful Degradation on STM32F4 for Real-time Anomaly Detection
scenario: You are tasked with deploying a safety-critical anomaly detection system on an ARM Cortex-M4
  STM32F4 microcontroller (168 MHz, 256 KB SRAM, no FPU). The primary ML model, a highly optimized 8-bit
  quantized convolutional neural network (CNN) for sensor data classification, consumes approximately
  120 KB of SRAM for its weights and intermediate activations. Due to varying sensor noise levels and
  unexpected spikes in data acquisition rates, the system occasionally experiences transient overloads,
  causing inference latency to exceed critical thresholds and leading to missed anomaly detections. Describe
  a robust graceful degradation strategy for this system, considering the severe resource constraints.
details:
  realistic_solution: "Implement a multi-stage degradation ladder: \n1.  **Quality-of-Service (QoS) Shedding:**\
    \ When inference latency consistently exceeds a soft threshold, dynamically reduce sensor data sampling\
    \ rate or input feature resolution to decrease the computational load on the primary model. \n2. \
    \ **Model Fallback:** If QoS shedding is insufficient or the primary model's inference confidence\
    \ drops significantly/resource exhaustion is imminent, switch to a pre-loaded, simpler, and even more\
    \ aggressively quantized model (e.g., a small decision tree or a custom linear classifier) that offers\
    \ lower accuracy but guarantees faster, more stable inference times and a smaller memory footprint\
    \ (e.g., 40KB SRAM for weights and activations). \n3.  **Fail-Safe Operational Mode:** In extreme\
    \ cases of resource exhaustion or unrecoverable model failure, transition to a deterministic, pre-programmed,\
    \ and inherently safe operating mode. This might involve ignoring non-critical inputs, signaling a\
    \ system warning/error, or defaulting to a conservative, rule-based anomaly detection heuristic to\
    \ prevent catastrophic failure (fail-safe rather than fail-operational for ML inference)."
  common_mistake: Neglecting to pre-design a clear multi-stage degradation strategy, relying solely on
    the primary model, or implementing a naive fallback that consumes too many resources (exceeding 256KB
    SRAM) or introduces unacceptable latency due to lack of FPU-optimized operations.
  napkin_math: If the primary model requires 40ms for inference and the system needs to process data at
    20Hz (i.e., a new data point every 50ms), the primary model alone (`40ms * 20Hz = 800ms` processing
    per second) cannot sustain the load. This necessitates a degradation strategy. With 256KB total SRAM
    and 120KB used by the primary model, approximately 136KB remains for the operating system, buffers,
    and any fallback models. A fallback model requiring, for instance, 40KB would leave 96KB for other
    processes, illustrating the tight memory budget and the need for highly optimized, compact models.
