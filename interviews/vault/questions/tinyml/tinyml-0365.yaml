title: The Real-Time Frame Budget
scenario: You're designing a low-power person detection sensor for a smart doorbell. The camera provides a steady stream of 10 frames per second (FPS) to your microcontroller.
question: What is the maximum processing time per frame to guarantee zero dropped frames on a 10 FPS camera stream?
details:
  realistic_solution: The system must be able to fully process one frame before the next one arrives. With a rate of 10 frames per second, the time budget for each frame is 1 second divided by 10, which is 0.1 seconds or 100 milliseconds. Exceeding this budget means the system will start dropping frames, failing its real-time constraint.
  common_mistake: |
    **The Pitfall:** Confusing the frame rate with the time budget.
    **The Rationale:** Candidates hastily calculate 1/100 instead of 1/10, or rely on generic latency numbers (e.g., 1ms interrupts).
    **The Consequence:** The system is designed with incorrectly tight or loose latency targets, failing its real-time constraints.
  napkin_math: |
    *   **Frame Rate**: 10 frames per second.
    *   **Time Budget**: 1 second / 10 frames = 0.1 seconds.
    *   **Conversion**: 0.1 seconds = 100 milliseconds.
    *   **Conclusion**: **The maximum pipeline latency must be strictly less than 100 ms.**
  options:
  - 10 ms
  - 33 ms
  - 100 ms
  - 1 ms
  correct_index: 2
