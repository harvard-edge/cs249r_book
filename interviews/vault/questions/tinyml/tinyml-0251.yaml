title: The Interrupt Deadline
scenario: You're designing a keyword spotting model for a smart microphone. The microcontroller needs
  to process an audio buffer and trigger a 'wake word' signal before the next audio buffer overwrites
  the current one. What is the typical latency budget for this kind of interrupt-driven task in a TinyML
  system?
details:
  realistic_solution: The typical latency budget is around 1ms. This is because TinyML systems often act
    as interrupt service routines (ISRs). The device must complete its inference within the time it takes
    for the next chunk of sensor data to arrive, which for high-frequency audio or industrial sensors
    is on the order of a single millisecond.
  common_mistake: Engineers accustomed to cloud or mobile development often assume latency budgets are
    in the tens or hundreds of milliseconds (e.g., 33ms for video, 100ms for web). They forget that TinyML
    operates at the level of hardware interrupts, where deadlines are dictated by sensor physics and buffer
    sizes, demanding much faster responses.
  napkin_math: This is a direct recall question based on the ML Systems scale ladder. A TinyML interrupt
    budget is ~1ms. This is 16x stricter than a mobile app's 'anti-jank' budget (~16ms) and 100x stricter
    than a typical cloud service's P99 latency target (~100ms). The entire inference must fit inside this
    tiny window.
  options:
