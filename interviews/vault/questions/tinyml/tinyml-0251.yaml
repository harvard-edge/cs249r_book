title: The Interrupt Deadline
scenario: You are designing a keyword spotting model for a smart microphone. The microcontroller needs to process an audio buffer before the next one overwrites it.
question: What is the typical latency budget for an interrupt-driven task processing streaming sensor buffers in a TinyML system?
details:
  realistic_solution: The typical latency budget is around 1ms. TinyML systems often act as interrupt service routines (ISRs). The device must complete its inference within the time it takes for the next chunk of sensor data to arrive.
  common_mistake: |
    **The Pitfall:** Assuming latency budgets are in the tens or hundreds of milliseconds.
    **The Rationale:** Engineers accustomed to cloud/mobile assume human-perception deadlines (33ms for video, 100ms for web) rather than hardware buffer physics.
    **The Consequence:** They build a pipeline that is far too slow, causing catastrophic buffer overruns and data loss.
  napkin_math: |
    - Cloud target: ~100 ms.
    - Mobile UI target: ~16 ms.
    - TinyML Interrupt target: ~1 ms.
    - **The entire inference must fit inside a ~1 ms hardware interrupt window.**
  options:
  - 100ms
  - 33ms
  - 16ms
  - 1ms
