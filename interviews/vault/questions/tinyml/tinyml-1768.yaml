title: Preemptive Priority Queuing for TinyML Sensors
scenario: A Cortex-M4 microcontroller handles interrupt-driven inference for 3 different acoustic sensors. Max inference time is 150ms.
question: Design an interrupt priority and queuing system to handle two sensors triggering simultaneously.
details:
  realistic_solution: 'Implement a preemptive priority queue where high-urgency tasks (e.g., glass break detection) interrupt low-urgency ones (e.g., footstep counting). Low-priority data is temporarily buffered in a circular SRAM queue while the high-priority inference executes and completes.'
  common_mistake: |
    **The Pitfall:** Using a strict FIFO queue.
    **The Rationale:** Candidates default to standard queuing models without considering real-time sensor criticality.
    **The Consequence:** High-urgency, critical sensors may miss latency deadlines waiting for low-urgency tasks to complete.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 3 concurrent acoustic sensors.
       - Max inference execution time (T_infer): 150ms.
    2. **Calculations:**
       - Total Response time (T_response) = T_infer + T_preempt.
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound.** T_response must be <= 150ms for the highest priority task, requiring preemptive scheduling rather than a strict FIFO queue.
