title: Preemptive Priority Queuing for TinyML Sensors
scenario: A Cortex-M4 microcontroller handles interrupt-driven inference for 3 different
  acoustic sensors. Max inference time is 150ms.
question: Design an interrupt priority and queuing system if two sensors trigger simultaneously.
details:
  realistic_solution: Implement a preemptive priority queue where high-urgency tasks
    (e.g., glass break detection) interrupt low-urgency ones (e.g., footstep counting).
    Low-priority data is temporarily buffered in a circular SRAM queue while the high-priority
    inference executes and completes.
  common_mistake: Using a strict FIFO queue which leads to critical sensors missing
    latency deadlines.
  napkin_math: T_response = T_infer + T_preempt = 150ms
