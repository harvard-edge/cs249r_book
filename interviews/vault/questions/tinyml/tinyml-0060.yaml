title: LoRaWAN Telemetry for ML Metrics
scenario: You have 3,000 soil moisture sensors deployed across farmland, each running a crop stress prediction model on an STM32WL (Cortex-M4, 48 MHz, 256 KB flash, 64 KB SRAM) with built-in LoRa radio. You want to monitor model performance remotely — inference confidence, prediction distribution, drift indicators. But LoRaWAN has strict duty cycle limits.
question: How would 3,000 STM32WL soil sensors report model confidence and drift within LoRaWAN duty-cycle limits?
details:
  realistic_solution: 'LoRaWAN operates under regional duty cycle regulations (EU868: 1% duty cycle, US915: dwell time limits). You must minimize airtime:'
  common_mistake: |
    **The Pitfall:** Proposing sending all raw inference results over LoRa.
    **The Rationale:** Assuming 480 bytes/day is "tiny", failing to realize that LoRaWAN's massive time-on-air makes even small payloads expensive under strict regional duty cycle regulations.
    **The Consequence:** The devices will exceed legal RF transmission limits, fail to transmit critical alerts, and drain their batteries faster.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3,000 STM32WL soil sensors, telemetry.
    - Battery Capacity: 3.6V * 19 Ah = 68.4 Wh. 68.4 Wh * 3600 s/h = 246,240 J.
    - Airtime (SF7 BW125): ~41 ms per uplink.

    **Calculations:**
    - Daily telemetry (Optimized): 16 bytes * 1 uplink = 16 bytes/day.
    - Duty cycle usage: 41 ms / 86,400,000 ms = 0.000047%. Well within 1% EU868 limit.
    - Annual telemetry energy: 40 mA * 3.3V * 0.041 s = 5.4 mJ * 365 = 1.97 J.
    - Telemetry fraction: 1.97 / 246,240 = 0.0008% (invisible).
    - Raw results comparison: If sending 480 bytes/day, airtime is ~600 ms/day, using 28.9 J/year (15x more expensive).

    **Conclusion & Interpretation:**
    - **Result: Telemetry fraction is 0.0008% (Airtime-Bound)**. Minimized airtime makes LoRaWAN feasible within duty limits.
