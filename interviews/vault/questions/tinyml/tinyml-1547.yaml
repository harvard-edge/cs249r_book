title: Decentralized Federate Tree Aggregation
scenario: A mesh of 16 Cortex-M4 devices performs decentralized federated averaging
  over a binary spanning tree topology. Each node transmits a 500-byte partial sum
  update over a 100 kbps link to its parent.
question: Evaluate the theoretical lower-bound latency for a single bottom-up aggregation
  phase from leaf to root.
visual:
  kind: svg
  path: tinyml-1547.svg
  alt: A binary tree diagram showing 16 nodes with data flowing upwards from the leaves
    to a single root node.
  caption: Binary Spanning Tree (Depth 4)
details:
  realistic_solution: A perfectly balanced binary tree of 16 nodes has a depth of
    4 (log2 of 16). The bottom-up phase requires data to traverse from the leaves
    up to the root, taking 4 sequential communication hops. Each hop transmits 500
    bytes (4000 bits) over a 100 kbps link, taking 4000 / 100,000 = 40 milliseconds.
    Total latency is 4 hops * 40ms = 160ms.
  common_mistake: Calculating a ring topology instead of a tree, or failing to realize
    that independent branches of the tree aggregate in parallel, summing all 15 edges
    instead of just the depth.
  napkin_math: Depth = log2(16) = 4 hops. Hop time = 4000 bits / 100,000 bps = 0.04s.
    4 * 0.04s = 160 ms.
