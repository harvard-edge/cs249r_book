title: The MCU NAS Search Space
scenario: You're designing a Neural Architecture Search (NAS) pipeline to find the optimal model for a microcontroller with 256 KB SRAM and 1 MB flash.
question: What constraints must your search space encode that a standard NAS for desktop/cloud would ignore?
details:
  realistic_solution: 'MCU-aware NAS must encode five constraints standard NAS ignores: (1) peak SRAM for activations — not just total parameters, but the maximum tensor pair alive simultaneously, (2) flash budget for weights + firmware, (3) per-layer latency using hardware-specific lookup tables (not FLOPs, since CMSIS-NN speedup varies by op), (4) operator support — only search over TFLite Micro + CMSIS-NN supported ops, (5) working set size vs cache/TCM capacity. The search space: ~72 candidate ops per block across 5 blocks, requiring one-shot NAS (~24 GPU-hours) with constraint evaluation per candidate taking ~1ms.'
  common_mistake: |
    **The Pitfall:** Adding only a total parameter or FLOP constraint to the search.
    **The Rationale:** Engineers assume compute and overall size dictate performance, ignoring that peak activation SRAM is the binding memory constraint on microcontrollers.
    **The Consequence:** The NAS outputs models that theoretically fit the flash and compute budgets but immediately throw Out of Memory errors because their intermediate tensors exceed the SRAM.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Candidates per block: 4 kernel sizes × 6 widths × 3 expansion ratios = 72 candidates.
       - Network depth: 5 blocks.
       - Constraint evaluation time: 1.1 ms (1 ms SRAM simulation + 0.1 ms latency lookup).
    2. **Calculations:**
       - Search space scale: 72^5 ≈ 1.93 × 10^9 architectures.
       - One-shot NAS sample evaluation: 10,000 subnets × 1.1 ms = 11 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: 1.93B Architectures. Memory-Bound.** Evaluating MCU-specific SRAM and latency constraints for a massive search space requires one-shot NAS, as peak activation SRAM bounds the deployment.
