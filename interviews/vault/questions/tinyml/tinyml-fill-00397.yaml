title: 'Real-Time TinyML Inference on ESP32-S3: Diagnosing Latency and Jank'
scenario: You are tasked with deploying a gesture recognition model on an ESP32-S3, a device featuring
  a 240 MHz dual-core processor, 512 KB SRAM, and 8 MB PSRAM. The system requires real-time inference,
  with a strict 33ms frame budget for processing sensor data (e.g., accelerometer) and generating a classification.
  However, during initial testing, you observe occasional jank in the downstream actuation and even Application
  Not Responding (ANR) timeouts. The current implementation uses a polling loop for sensor data and directly
  runs inference within the main task. How would you systematically diagnose and mitigate these real-time
  performance issues, ensuring the 33ms deadline is consistently met?
details:
  realistic_solution: '1. **WCET Analysis**: Profile the model inference and sensor reading routines on
    the ESP32-S3 using ESP-IDF''s built-in tracing and performance monitors to establish the true WCET
    for the entire pipeline. Identify bottlenecks.

    2. **FreeRTOS Task Prioritization**: Restructure the application using FreeRTOS. Create a high-priority
    task for sensor data acquisition and model inference, ensuring it preempts lower-priority tasks (e.g.,
    Wi-Fi communication, logging).

    3. **Interrupt-Driven Pipeline**: Implement sensor data acquisition using hardware interrupts (e.g.,
    timer or GPIO interrupt) to trigger data collection and subsequently signal the inference task. This
    avoids polling and reduces latency jitter.

    4. **Memory Optimization**: Ensure the critical model graph and intermediate buffers fit within the
    512 KB SRAM. If model weights must reside in 8 MB PSRAM, optimize access patterns (e.g., tiling, pre-fetching)
    to minimize the impact of PSRAM''s higher latency on WCET.

    5. **Jank/ANR Prevention**: Break down large computational blocks into smaller, cooperative chunks
    if possible, or offload non-critical processing to the second core. Implement watchdog timers to catch
    and report ANR events for further debugging.'
  common_mistake: Relying solely on average-case performance metrics, failing to perform Worst-Case Execution
    Time (WCET) analysis. Neglecting to separate real-time critical tasks from non-critical ones, leading
    to priority inversion or blocking operations. Inefficient memory access patterns, especially for PSRAM,
    without considering its higher latency.
  napkin_math: Given a 33ms frame budget and a 240 MHz core, available cycles per frame is ~7.92 million.
    If model inference (forward pass) on average takes 10ms, but its WCET is 25ms due to cache misses,
    PSRAM access, or other contention, this leaves only 8ms for sensor I/O, pre-processing, post-processing,
    and OS overhead. This tight margin highlights the need for careful WCET analysis. For a typical TinyML
    model with ~1 Million MAC operations, and assuming 2-4 cycles per MAC on ESP32-S3's Xtensa architecture
    (without dedicated DSP/NN accelerators), a rough estimate of execution time would be (1M MACs * 3
    cycles/MAC) / 240MHz = 12.5ms. This shows it's feasible, but critically dependent on efficient instruction
    use, memory hierarchy, and minimizing non-inference overhead.
