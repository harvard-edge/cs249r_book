title: Diagnosing Inefficient Operator Scheduling on Cortex-M7/Ethos-U55 for TinyML
scenario: A TinyML computer vision model, comprising several convolutional layers,
  depthwise separable convolutions, and a final fully connected layer, is deployed
  on a Cortex-M7 (480 MHz) and Ethos-U55 (512 KB SRAM, 128-512 MAC/cycle NPU) platform.
  During initial testing, the model exhibits significantly slower inference times
  than expected. Profiling reveals low NPU utilization (averaging around 20%) and
  a high proportion of execution time (over 40%) spent on data transfers between the
  Cortex-M7's SRAM and the Ethos-U55 NPU. The model was compiled with default operator
  scheduling settings. You suspect the current execution order is not optimal. How
  would you diagnose the root cause of this inefficiency?
question: Why does default scheduling leave Ethos-U55 at 20% utilization with 40%
  of time spent on SRAM transfers?
details:
  realistic_solution: 1. **Analyze the Operator Graph & Execution Plan:** Use debugging
    tools provided by the ML framework (e.g., TensorFlow Lite Micro) to visualize
    the compiled model's operator graph and the actual instruction sequence sent to
    the Ethos-U55. Identify where intermediate tensors are stored and transferred.
    2. **Identify Data Locality Issues:** Look for patterns where tensors are written
    to SRAM, then read back by the NPU for a subsequent operation, especially if the
    tensor size exceeds the NPU's internal buffers. 3. **Evaluate Layer Fusion Opportunities:**
    Check if consecutive, compatible operations (e.g., Conv2D + ReLU, DepthwiseConv
    + PointwiseConv) are being fused into single NPU operations. If not, investigate
    why the compiler didn't fuse them. 4. **Examine Memory Reuse:** Determine if the
    scheduler is intelligently reusing SRAM regions for tensors whose lifetimes do
    not overlap. 5. **Consider Parallelism:** Verify if the scheduling allows for
    any concurrent execution between the Cortex-M7 (e.g., pre-processing) and the
    Ethos-U55 (inference). This detailed analysis would highlight specific operators
    or sequences that are causing excessive data movement or NPU stalls.
  common_mistake: Immediately focusing on model quantization or pruning without first
    analyzing the existing operator schedule. Many engineers might assume the NPU's
    theoretical peak performance should be easily achievable and overlook the practical
    implications of memory bandwidth, data movement, and the cost of intermediate
    buffer writes, especially with limited 512 KB SRAM.
  napkin_math: Given 512 KB SRAM, if a feature map from a convolutional layer is 256x256x16-bit
    (2 bytes) = 131 KB, and another intermediate tensor is similar, storing multiple
    such tensors concurrently can quickly exceed the Ethos-U55's fast internal memory
    or the Cortex-M7's limited SRAM. If 40% of the inference time (e.g., 100 ms total
    inference time = 40 ms) is spent on data transfers, and the Ethos-U55 peak MAC/cycle
    is 128, with a 480 MHz clock, this indicates that the memory bandwidth is a critical
    bottleneck, as the NPU is starved for data. A memory transfer rate calculation
    might reveal that moving data for N operations with intermediate results of size
    M takes significantly longer than the actual NPU compute time for those operations.
    For instance, moving 256KB of data at 10 MB/s takes ~25ms, which could easily
    dominate small, fast NPU computations.
