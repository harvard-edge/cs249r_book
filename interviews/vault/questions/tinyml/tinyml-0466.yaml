title: The Privacy-Power Trade-off
scenario: 'You are designing a battery-powered medical diagnostic device. You must choose between two approaches. Option 1 (Cloud Upload): Transmit 64KB raw audio. Option 2 (On-Device): Run a pre-processing step that consumes 25mJ but reduces the payload to 2KB. Transmission energy is directly proportional to the payload size.'
question: Is transmitting 64 KB raw audio or spending 25 mJ to send a 2 KB summary more energy-efficient?
details:
  realistic_solution: Calculate network transmission energy costs versus local compute. The dominant energy cost in IoT systems is almost always network transmission. By spending a small amount of energy on-device to reduce the data payload, you save a massive amount of energy keeping the radio off.
  common_mistake: |
    **The Pitfall:** Focusing only on the added on-device compute cost.
    **The Rationale:** Engineers often ignore the massive energy drain of the radio and fail to multiply the data sizes by the transmission energy constant.
    **The Consequence:** Choosing the cloud upload, which consumes 9.1x more energy and drastically reduces the medical device's battery life.
  napkin_math: |
    **Assumptions & Constraints:**
    - BLE/cellular TX energy: ~5 µJ/byte.
    - Raw audio payload: 64 KB.
    - On-device processing cost: 25 mJ. Reduced payload: 2 KB.

    **Calculations:**
    - Option 1 (Cloud): 64 KB * 1024 * 5 µJ/byte = ~327 mJ (Using 1000 for simplicity: 64,000 * 5 = 320 mJ).
    - Option 2 (On-device): 25 mJ + (2,000 * 5 µJ) = 25 mJ + 10 mJ = 35 mJ.
    - Efficiency Ratio: 320 / 35 = 9.1x.

    **Conclusion & Interpretation:**
    - **Result: On-Device is ~9.1x more efficient (35mJ vs 320mJ) (Radio-Energy-Bound)**. The system strongly favors local preprocessing to compress payloads.
  options:
  - Cloud Upload is more efficient; the on-device compute adds a 25mJ overhead that should be avoided.
  - On-Device is 32x more efficient, since the data payload is reduced from 64KB to 2KB.
  - On-Device is ~9.1x more efficient, since the total energy drops from 320mJ to 35mJ.
  - Both options are roughly equivalent in energy cost once you factor in both compute and networking.
  correct_index: 2
