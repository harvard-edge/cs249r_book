title: 'Evaluating CNN Data Layouts for Cortex-M4 Real-Time Deadlines'
scenario: 'You are deploying a predictive maintenance model on an MCU with a 168 MHz clock and no FPU. The system has a strict 5ms real-time deadline for inference. Model A requires 400,000 INT8 MAC operations using an unoptimized data layout. Model B requires 600,000 INT8 MAC operations using an HWC layout heavily optimized for SIMD. Both models fit within memory constraints.'
question: 'Which model do you choose to guarantee the 5ms real-time deadline, and how does the architectural tradeoff affect worst-case execution time (WCET)?'
details:
  realistic_solution: 'The correct choice is Model B. Although it requires 50% more MAC operations, its HWC data layout allows the CMSIS-NN library to utilize DSP extensions (like the SMLAD instruction) to perform 2 INT8 MACs per cycle. Model A''s unoptimized layout prevents SIMD vectorization.'
  common_mistake: |
    **The Pitfall:** Choosing the model with fewer theoretical MAC operations (Model A).
    **The Rationale:** Candidates assume lower MAC count automatically translates to faster execution, ignoring the lack of an FPU and CMSIS-NN SIMD capabilities.
    **The Consequence:** They select a model that misses the strict real-time deadline due to inefficient memory access and lack of vectorization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Deadline: 5 ms. Clock: 168 MHz.
    - Model A: 400,000 MACs (Unoptimized, ~3 cycles/MAC).
    - Model B: 600,000 MACs (HWC SIMD optimized, 1.5 MACs/cycle).

    **Calculations:**
    - Available cycle budget: 0.005 s × 168,000,000 Hz = 840,000 cycles.
    - Model A Execution: 400,000 × 3 = 1,200,000 cycles.
    - Model A Time: 1,200,000 / 168,000,000 ≈ 7.14 ms.
    - Model B Execution: 600,000 / 1.5 = 400,000 cycles.
    - Model B Time: 400,000 / 168,000,000 ≈ 2.38 ms.

    **Conclusion & Interpretation:**
    - **Result: 2.38 ms vs 7.14 ms (Compute-Bound)**. Despite requiring 50% more MAC operations, Model B meets the strict deadline because its HWC layout leverages hardware SIMD instructions.
