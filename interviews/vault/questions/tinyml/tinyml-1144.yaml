title: Evaluating CNN Data Layouts for Cortex-M4 Real-Time Deadlines
scenario: You are deploying a predictive maintenance model on an ARM Cortex-M4 (STM32F4) with a 168 MHz clock, 256 KB SRAM, 1 MB flash, and no FPU. The system receives high-frequency vibration data and has a strict 5ms real-time deadline for inference. Model A requires 400,000 INT8 MAC operations using an unoptimized data layout. Model B requires 600,000 INT8 MAC operations using an HWC layout heavily optimized for CMSIS-NN SIMD. Both models fit within memory constraints.
question: "Which model do you choose to guarantee the 5ms real-time deadline, and how does the architectural tradeoff affect worst-case execution time (WCET)?"
details:
  realistic_solution: The correct choice is Model B. Although it requires 50% more MAC operations, its HWC data layout allows the CMSIS-NN library to utilize DSP extensions (like the SMLAD instruction) to perform 2 INT8 MACs per cycle. Model A's unoptimized layout prevents SIMD vectorization.
  common_mistake: |
    **The Pitfall:** Choosing the model with fewer theoretical MAC operations (Model A).
    **The Rationale:** Candidates assume lower MAC count automatically translates to faster execution, ignoring the lack of an FPU and CMSIS-NN SIMD capabilities.
    **The Consequence:** They select a model that misses the strict real-time deadline due to inefficient memory access and lack of vectorization.
  napkin_math: |
    1. Calculate cycle budget: 5 ms deadline at 168 MHz = 0.005 s * 168,000,000 cycles/s = 840,000 available cycles.
    2. Estimate Model A WCET: 400,000 MACs without SIMD. Assuming ~3 cycles/MAC = 1,200,000 cycles (7.14 ms).
    3. Estimate Model B WCET: 600,000 MACs with CMSIS-NN SIMD (2x INT8 MACs/cycle). Assuming 1.5 MACs/cycle throughput = 400,000 cycles (2.38 ms).
    4. **Final Result: Model B takes 2.38 ms (meets deadline), while Model A takes 7.14 ms (misses deadline).**
