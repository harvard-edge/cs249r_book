title: The Federated Learning Battery Drain Catastrophe
scenario: A fleet of 1 million battery-powered smart doorbells uses federated learning (FL) to update a 250KB model, achieving a one-year battery life. A new 400KB model is deployed to a 10% cohort. Within days, the test cohort experiences catastrophic battery failure.
question: Why did a modest increase in model size and accuracy lead to a catastrophic, non-linear failure in battery life, and what critical TCO factor did the team's plan ignore?
details:
  realistic_solution: The plan failed because it completely ignored the **Total Energy Cost of Communication**, which is the dominant power draw in battery-powered federated systems. The catastrophic failure was not due to the increased *inference* cost, but the increased *communication* cost during the federated learning update cycle.
  common_mistake: |
    **The Pitfall:** Assuming the increased battery drain is caused by the extra MAC operations required to execute the larger 400KB model during inference.
    **The Rationale:** Engineers focus exclusively on computational FLOPs and ignore the dominant energy cost of wireless telemetry in edge systems.
    **The Consequence:** Teams mistakenly try to optimize model architecture instead of addressing the massive energy cost of uploading larger model weights over Wi-Fi/Cellular.
  napkin_math: |
    1. **Assumptions & Constraints:** Battery capacity ≈ 10,000 Joules. Old model = 250 KB. New model = 400 KB. Wi-Fi TX Energy ≈ 5 µJ/Byte. FL syncs 4 times per day.
    2. **Calculations:** Old TX energy per round = 250,000 * 5 µJ = 1.25 J. Daily old cost = 1.25 * 4 = 5.0 J. New TX energy per round = 400,000 * 5 µJ = 2.0 J. Daily new cost = 2.0 * 4 = 8.0 J. At 8.0 J/day, transmission alone drains the battery 60% faster. Furthermore, larger models take longer to converge, requiring more frequent FL rounds (e.g., 8/day = 16.0 J/day), compounding the energy drain.
    3. **Conclusion & Interpretation:** **Result: Communication-Bound Energy Failure.** The battery failure is driven entirely by the Total Energy Cost of Communication. A 60% increase in model weight size linearly scales the telemetry payload, catastrophically draining the battery through radio transmission, not inference compute.
