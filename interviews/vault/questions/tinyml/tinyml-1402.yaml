title: On-Device Model Pruning for STM32F4 with Sparsity and Performance Tradeoffs
scenario: You are deploying a convolutional neural network for keyword spotting on a microcontroller lacking an FPU. The original 1.2M parameter model requires 3MB of memory. You've decided to apply magnitude-based unstructured pruning to reduce the model size.
question: How should the sparsity pattern be approached to maximize inference speedup on a Cortex-M4 without an FPU, and what are the trade-offs?
details:
  realistic_solution: A realistic solution involves careful consideration of structured pruning or block-level sparsity over unstructured pruning for this specific hardware. Since the Cortex-M4 lacks an FPU and dedicated sparse arithmetic units, unstructured sparsity introduces significant overhead due to conditional operations and indirect memory accesses. If unstructured pruning is unavoidable, techniques like 'fine-grained to coarse-grained conversion' or 'group sparsity' could be explored to create patterns that are more cache-friendly and easier to accelerate using integer arithmetic. The solution should focus on optimizing the sparse matrix-vector multiplication (SpMV) kernels using CMSIS-DSP integer intrinsics.
  common_mistake: |
    **The Pitfall:** Assuming any form of sparsity automatically translates to performance gains.
    **The Rationale:** Candidates overlook the overhead of handling unstructured sparsity (storing indices, conditional operations) on a CPU with no dedicated sparse acceleration hardware.
    **The Consequence:** Implementing a highly sparse model that is slower in practice than a smaller dense model due to pipeline stalls and indirect memory accesses.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1.2M parameter model (3MB original size).
       - Target hardware: Integer-only CPU (no FPU, no sparse accelerators).
       - Dense MAC cycle cost: ~1 cycle/MAC.
    2. **Calculations:**
       - Unstructured SpMV Overhead: Assume 90% sparsity. True MACs = 0.1 * Dense MACs.
       - Integer CPU Sparse Penalty: Indirect memory access and branching add ~1.2x overhead cycles per sparse MAC.
       - Effective Compute: 0.1 * 1.2 = 0.12 * Dense MAC cycles.
       - Structured Pruning: 50% block sparsity = 0.5 * Dense MAC cycles at 1 cycle/MAC efficiency.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** Unstructured sparsity introduces severe SpMV index handling overheads on non-FPU CPUs, making structured pruning a more optimal performance-accuracy trade-off.
