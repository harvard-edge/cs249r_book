title: The ADC Multiplexer Race Condition
scenario: Your MCU has one physical ADC but reads from 4 analog sensors sequentially using an internal multiplexer (MUX). You switch the MUX to Channel 1, read, switch to Channel 2, read, etc. However, the data from Channel 1 seems to 'bleed' into Channel 2. If Sensor 1 is at 3.3V, Sensor 2 (which should be 0V) reads as 1.2V.
question: Why does a 3.3 V ADC MUX channel bleed into a 0 V channel when the MCU reads sensors back-to-back?
details:
  realistic_solution: The ADC's internal sample-and-hold (S&H) capacitor (~10 pF) retains charge from the previous channel. When switching from Channel 1 (3.3V) to Channel 2 (0V), the 10 pF cap must discharge through Channel 2's source impedance (100k ohms). RC time constant = 10 pF x 100k = 1 microsecond. Reaching 99% accuracy requires 5 time constants = 5 microseconds of settling time. If you read immediately after MUX switching, the residual charge from Channel 1 bleeds into Channel 2, reading 1.2V instead of 0V. Fix: insert a 5-10 microsecond delay after MUX switching, or take a dummy read and discard it.
  common_mistake: |
    **The Pitfall:** Believing the sensors are physically shorted or experiencing PCB cross-talk.
    **The Rationale:** Ignoring the internal electrical characteristics of the microcontroller's ADC and multiplexer.
    **The Consequence:** Redesigning the PCB or replacing sensors when a simple software delay is all that is needed.
  napkin_math: |
    1. **Identify Time Constant:** RC time constant τ = R * C = 100,000 Ω * 10 pF = 1 µs.
    2. **Required Settling Time:** To settle to 12-bit accuracy (99.9%), the MUX needs ~7 time constants.
    3. **Settle Duration:** 7 * 1 µs = **7 µs**.
    4. **Conclusion:** If sampled < 7 µs after switching, residual charge bleeds, causing cross-channel interference.
