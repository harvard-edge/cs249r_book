title: The ADC Multiplexer Race Condition
scenario: Your MCU has one physical ADC but reads from 4 analog sensors sequentially using an internal
  multiplexer (MUX). You switch the MUX to Channel 1, read, switch to Channel 2, read, etc. However, the
  data from Channel 1 seems to 'bleed' into Channel 2. If Sensor 1 is at 3.3V, Sensor 2 (which should
  be 0V) reads as 1.2V. What electrical property did you ignore?
details:
  realistic_solution: 'The ADC''s internal sample-and-hold (S&H) capacitor (~10 pF) retains charge from
    the previous channel. When switching from Channel 1 (3.3V) to Channel 2 (0V), the 10 pF cap must discharge
    through Channel 2''s source impedance (100k ohms). RC time constant = 10 pF x 100k = 1 microsecond.
    Reaching 99% accuracy requires 5 time constants = 5 microseconds of settling time. If you read immediately
    after MUX switching, the residual charge from Channel 1 bleeds into Channel 2, reading 1.2V instead
    of 0V. Fix: insert a 5-10 microsecond delay after MUX switching, or take a dummy read and discard
    it.'
  common_mistake: '"The sensors are physically shorted." Cross-talk on a PCB is rare at these low frequencies.
    The issue is inside the MCU.'
  napkin_math: The ADC Sample & Hold capacitor (~10pF) must charge through the sensor's output impedance
    (100 kΩ). The RC time constant is τ = R * C = 100,000 Ω * 10pF = 1 µs. To settle to 12-bit accuracy
    (99.9%), the MUX needs ~7 time constants. If sampled <7 µs after switching, residual voltage causes
    cross-channel bleed.
