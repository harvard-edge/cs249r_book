title: Logical Ring on Physical Daisy-Chain
scenario: An industrial pipe-monitoring sensor array uses 4 Cortex-M4 microcontrollers
  physically wired in a linear daisy-chain (Node 1-2-3-4) via SPI at 10 MHz. They
  must synchronize 1 KB of INT8 activations.
question: Evaluate the synchronization stall time of a logical Ring AllReduce versus
  a bidirectional line-accumulator (Tree), accounting for a 10 microsecond SPI interrupt
  latency per step.
details:
  realistic_solution: SPI at 10 MHz transfers at 1.25 MB/s (0.8us/byte). A line-accumulator
    requires 3 forward steps and 3 backward steps of 1 KB, taking 6 * (1024 * 0.8us
    + 10us) = 4.97ms. A logical Ring AllReduce theoretically takes 6 steps of 256
    bytes. However, it requires a wraparound link (Node 4 to 1). In a linear daisy-chain,
    Node 4's message to Node 1 must hop through Nodes 3 and 2, congesting the bus,
    serializing the transfers, and making the Ring slower than the simple line-accumulator.
  common_mistake: Applying the theoretical 2(N-1)/N Ring AllReduce formula without
    verifying if the underlying physical topology (linear daisy-chain) supports the
    required wraparound connection without severe routing congestion.
  napkin_math: 'Line Tree: 6 hops * (1024B * 0.8us + 10us) = 4.97ms. Ring wraparound
    hop 4->1 requires 3 serial SPI transactions, breaking the O(1) parallel step assumptions.'
