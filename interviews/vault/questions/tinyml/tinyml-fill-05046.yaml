title: Junction Temperature Estimation for Cortex-M4 Under ML Workload
scenario: An STM32F4 (Cortex-M4, 168MHz, 50mW at full load) in a plastic enclosure (θ_jc=1.5°C/W, θ_ca=50°C/W)
  runs continuous inference for a predictive maintenance system in a 50°C industrial environment. Calculate
  steady-state junction temperature and determine if de-rating is needed.
details:
  realistic_solution: 'Full thermal resistance: θ_ja = θ_jc + θ_ca = 1.5 + 50 = 51.5°C/W. Power: 50mW
    = 0.05W. ΔT = 0.05W × 51.5°C/W = 2.575°C. Junction temp: 50 + 2.575 = 52.6°C. STM32F4 max junction:
    105°C (industrial grade) or 85°C (standard). 52.6°C is well within limits for both grades. No de-rating
    needed. However, if we run at 168MHz with full DSP utilization (worst case 100mW): ΔT = 0.1 × 51.5
    = 5.15°C. Junction = 55.15°C — still safe. The 50°C/W case-to-ambient is high (poor PCB thermal design)
    but at MCU power levels, junction temperature is benign.'
  common_mistake: Using θ_jc alone without adding θ_ca for the full junction-to-ambient path; many datasheets
    provide θ_jc and θ_ja separately, and both must be considered.
  napkin_math: 'θ_ja = 51.5°C/W. P = 50mW. ΔT = 2.6°C. T_junction = 52.6°C. Max rated: 85-105°C. Safety
    margin: 85-52.6 = 32.4°C. At 100mW (max): 55.2°C junction. Safe. No thermal mitigation required for
    STM32F4 ML workloads.'
