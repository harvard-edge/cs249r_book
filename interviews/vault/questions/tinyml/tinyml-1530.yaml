title: TinyML Streaming Buffer Spec
scenario: A vibration sensor streams 3-axis 16-bit samples at 2 kHz into an MCU that runs inference every 250 ms.
question: What buffer and DMA requirements prevent a 2 kHz 3-axis vibration stream from dropping samples during 250 ms inference windows?
details:
  realistic_solution: The spec should require double buffering or a ring buffer, DMA from the sensor peripheral, overflow counters, timestamping, and a buffer sized for at least one inference window plus jitter. At 2 kHz, 3 axes, and 2 bytes per sample, the stream is 12 KB/s; a 250 ms window needs 3 KB before safety margin.
  common_mistake: |
    **The Pitfall:** Sizing only the model arena and forgetting that raw sensor data continues arriving during inference.
    **The Rationale:** Engineers focus on the memory required to execute the neural network, neglecting the continuous, asynchronous nature of the physical sensor stream.
    **The Consequence:** The CPU blocks data collection during the 250ms inference, dropping crucial vibration data and corrupting the next input frame.
  napkin_math: |
    - **Sample Size:** 3 axes * 2 bytes/axis = 6 bytes/sample.
    - **Data Rate:** 2,000 samples/s * 6 bytes/sample = 12,000 bytes/s (12 KB/s).
    - **Inference Window:** 250 ms (0.25 s).
    - **Data Received During Inference:** 12,000 bytes/s * 0.25 s = 3,000 bytes (~3 KB).
    - **Conclusion:** **A double buffer or ring buffer with a minimum size of 3 KB (plus safety margin) and DMA support is required to prevent sample drops.**
