title: TinyML Streaming Buffer Spec
scenario: A vibration sensor streams 3-axis 16-bit samples at 2 kHz into an MCU that
  runs inference every 250 ms. Specify the buffer and DMA requirements so sampling
  does not stop during inference.
question: What buffer and DMA requirements prevent a 2 kHz 3-axis vibration stream
  from dropping samples during 250 ms inference windows?
details:
  realistic_solution: The spec should require double buffering or a ring buffer, DMA
    from the sensor peripheral, overflow counters, timestamping, and a buffer sized
    for at least one inference window plus jitter. At 2 kHz, 3 axes, and 2 bytes per
    sample, the stream is 12 KB/s; a 250 ms window needs 3 KB before safety margin.
  common_mistake: Sizing only the model arena and forgetting that raw sensor data
    continues arriving during inference.
  napkin_math: Rate = 2,000 samples/s x 3 axes x 2 B = 12,000 B/s. In 0.25 s, data
    = 3,000 B ≈ 3 KB.
