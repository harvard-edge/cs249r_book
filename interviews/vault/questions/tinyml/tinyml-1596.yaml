title: Minimalist MCU Model Dispatch
scenario: Building a bare-metal micro-inference server for a fleet of smart industrial
  vibration sensors on Cortex-M4.
question: Design a minimalist RPC-like dispatch system over UART to trigger specific
  neural network sub-models based on basic threshold triggers, minimizing wake cycles.
details:
  realistic_solution: Implement a 1-byte protocol where the high nibble encodes the
    model ID (up to 16 models) and the low nibble encodes the power state. A UART
    RX interrupt wakes the MCU from deep sleep, decodes the byte, uses a lookup table
    of function pointers to immediately jump to the correct TFLite Micro invocation,
    and returns to sleep.
  common_mistake: Using JSON or a heavy text-based payload over UART, wasting thousands
    of MCU cycles parsing strings.
  napkin_math: 115200 baud / 10 bits = 11.52 KB/s max
