title: Minimalist MCU Model Dispatch
scenario: You are building a bare-metal micro-inference server for a fleet of smart industrial vibration sensors on Cortex-M4.
question: Design a minimalist RPC-like dispatch system over UART to trigger specific neural network sub-models based on thresholds, minimizing wake cycles.
details:
  realistic_solution: Implement a 1-byte protocol where the high nibble encodes the model ID (up to 16 models) and the low nibble encodes the power state. A UART RX interrupt wakes the MCU from deep sleep, decodes the byte, uses a lookup table of function pointers to immediately jump to the correct TFLite Micro invocation, and returns to sleep.
  common_mistake: |
    **The Pitfall:** Using JSON or heavy text-based payloads over UART.
    **The Rationale:** Developers default to standard web RPC formats (REST/JSON) without considering the bare-metal environment.
    **The Consequence:** The MCU wastes thousands of cycles parsing strings and heavily taxes the 11.52 KB/s UART bandwidth, completely defeating the deep sleep power budget.
  napkin_math: |
    - **Baud Rate Constraints:** 115200 baud / 10 bits = 11.52 KB/s max.
    - **JSON parsing cost:** ~5,000+ CPU cycles per payload.
    - **1-byte Protocol:** High nibble encodes Model ID (up to 16), low nibble encodes power state.
    - **Dispatch Cost:** Reading 1 byte + indexing a function pointer table = <50 cycles.
    - **Conclusion:** A **1-byte hex protocol** avoids string parsing and saves thousands of wake cycles.
