title: SRAM-Constrained Layer Fusion on Cortex-M4
scenario: We are deploying an INT8 CNN for acoustic event detection to an ARM Cortex-M4 (STM32F4) microcontroller. The sequence requires holding a 180 KB intermediate activation tensor while computing the next layer's 120 KB output tensor.
question: Specify a memory management architecture to ensure peak memory stays under 256 KB without modifying model weights.
details:
  realistic_solution: The correct specification involves designing a depth-first (or tiled) scheduling strategy to fuse the execution of the two layers. By calculating a spatial tile of the 180 KB tensor and immediately passing it to the second layer to compute the corresponding output tile, the system can reuse a much smaller circular buffer in SRAM. This avoids materializing the full 180 KB tensor at once, drastically reducing peak memory while maintaining CMSIS-NN utilization.
  common_mistake: |
    **The Pitfall:** Suggesting lowering precision to INT4 or streaming activations to Flash memory.
    **The Rationale:** Candidates ignore that INT4 breaks CMSIS-NN SIMD optimizations, and Flash cannot be written to at high speeds or byte-level granularity during standard execution.
    **The Consequence:** Unworkable solutions that either require retraining and lose hardware acceleration, or completely lock up the MCU's Flash controller.
  napkin_math: |
    *   **Standard Schedule Peak:** 180 KB (input) + 120 KB (output) = 300 KB (Triggers OOM against 256 KB limit).
    *   **Depth-First Schedule (4 tiles):** Live input tile ≈ (180 KB / 4) + receptive field overlap ≈ 55 KB. Live output tile = 120 KB / 4 = 30 KB.
    *   **New Peak Memory:** 55 KB + 30 KB = **85 KB**.
    *   **Remaining SRAM:** 256 KB - 85 KB = 171 KB (Plenty of room for RTOS and buffers).
