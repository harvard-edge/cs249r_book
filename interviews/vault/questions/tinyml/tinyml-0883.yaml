title: 'Model Size Estimation: Fluency — Size MCU Model Memory in Under 30 Seconds'
scenario: 'A 50K parameter INT8 model runs on a Cortex-M4 (256KB SRAM, 512KB Flash).'
question: Does a 50K-parameter INT8 model fit in 512 KB Flash and 256 KB SRAM on a Cortex-M4?
details:
  realistic_solution: 'Model: 50K × 1B = 50KB Flash. App code: ~64KB. TFLM runtime: 20KB. Total Flash: 134KB of 512KB = 26.2% ✓. SRAM: TFLM runtime 30KB + stack 8KB + activations (budget: 256-38=218KB available). For 50K param model with CNN activations (2× ratio): 100KB activation peak. Total SRAM: 30+8+100=138KB < 256KB ✓. Very comfortable.'
  common_mistake: |
    **The Pitfall:** Stating '50KB Flash' and ignoring the RTOS, TFLM runtime, and activations.
    **The Rationale:** Candidates fail to size the full software stack required to actually execute the model on bare metal.
    **The Consequence:** The model fits but the system OOMs at runtime because the OS and activations exceed available SRAM.
  napkin_math: |
    - **Step 1:** Flash Budget: 50KB model + 64KB app + 20KB TFLM = 134KB (fits in 512KB).
    - **Step 2:** SRAM Fixed Budget: 30KB TFLM + 8KB stack = 38KB used.
    - **Step 3:** SRAM Activations Budget: 256KB - 38KB = 218KB available.
    - **Step 4:** Estimate 50K CNN peak activations (rule of thumb: ~2x params) = ~100KB.
    - **Step 5:** Total SRAM: 138KB (fits in 256KB).
    - **Result:** **The model fits comfortably in both Flash and SRAM.**
