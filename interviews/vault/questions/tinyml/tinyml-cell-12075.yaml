title: 'Model Format Conversion: Recall TFLite INT8 Quantization Spec for MCU'
scenario: 'A firmware engineer asks: ''What are the quantization parameters stored per tensor in a TFLite
  INT8 model, and why does TFLite Micro require per-channel quantization for convolutional layers?'' Provide
  the exact answer with concrete numbers.'
details:
  realistic_solution: 'Per INT8 tensor, TFLite stores: (1) scale (float32, 4 bytes) and (2) zero_point
    (int32, 4 bytes). For per-channel quantization (required for Conv2D weights): N_channels × 8 bytes
    per conv weight tensor. Why required: in a depthwise conv, channel 0 weights might have range [-0.5,
    0.5] while channel 63 has [-5.0, 5.0]. Per-tensor scale = 0.039 (for ±5.0 range) → channel 0 quantized
    to ±13 levels instead of ±128 → 10× accuracy loss. Per-channel: each uses its own scale → full INT8
    range.'
  common_mistake: Confusing per-tensor and per-channel quantization; per-tensor quantization (one scale
    per weight tensor) causes significant accuracy loss for depthwise convolutions where channel value
    ranges vary widely.
  napkin_math: 'Per-tensor: 1 scale + 1 zero_point = 8 bytes per tensor. For Conv2D with 64 filters: per-channel
    = 64 × 8 = 512 bytes metadata overhead. Negligible vs. weight size: 64×3×3×32=18,432 bytes. Metadata
    is 2.8% overhead. Per-channel accuracy benefit: quantization error reduced from O(range/128) to O(per-channel-range/128)
    → typically 10-100× lower quantization noise.'
