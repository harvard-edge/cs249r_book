title: TinyML Graceful Degradation on STM32F4 for Real-time Anomaly Detection
scenario: You are tasked with deploying a safety-critical anomaly detection system on an ARM Cortex-M4 microcontroller. The primary ML model, a highly optimized 8-bit quantized convolutional neural network (CNN) for sensor data classification, consumes approximately 120 KB of SRAM for its weights and intermediate activations. Due to varying sensor noise levels and unexpected spikes in data acquisition rates, the system occasionally experiences transient overloads, causing inference latency to exceed critical thresholds and leading to missed anomaly detections.
question: How should an STM32F4 safety-critical anomaly detector degrade when sensor noise or data spikes break inference latency thresholds?
details:
  realistic_solution: "Implement a multi-stage degradation ladder: \n1. **Quality-of-Service (QoS) Shedding:** When inference latency consistently exceeds a soft threshold, dynamically reduce sensor data sampling rate or input feature resolution to decrease the computational load on the primary model. \n2. **Model Fallback:** If QoS shedding is insufficient or the primary model's inference confidence drops significantly/resource exhaustion is imminent, switch to a pre-loaded, simpler, and even more aggressively quantized model (e.g., a small decision tree or a custom linear classifier) that offers lower accuracy but guarantees faster, more stable inference times and a smaller memory footprint (e.g., 40KB SRAM for weights and activations). \n3. **Fail-Safe Operational Mode:** In extreme cases of resource exhaustion or unrecoverable model failure, transition to a deterministic, pre-programmed, and inherently safe operating mode. This might involve ignoring non-critical inputs, signaling a system warning/error, or defaulting to a conservative, rule-based anomaly detection heuristic to prevent catastrophic failure."
  common_mistake: |
    **The Pitfall:** Relying solely on the primary model or implementing naive fallbacks that still require complex operations.
    **The Rationale:** Candidates fail to pre-design a deterministic degradation ladder, assuming software retries or dropping frames is sufficient.
    **The Consequence:** The system hits a hard fault during an unexpected spike, failing catastrophically instead of safely.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total SRAM: 256 KB.
       - Primary model SRAM: 120 KB.
       - Fallback model SRAM: 40 KB.
       - Primary inference time: 40ms.
       - Normal data rate: 20Hz (50ms interval).
    2. **Calculations:**
       - Primary processing load: 40ms / 50ms = 80% duty cycle.
       - SRAM remaining with primary: 256 KB - 120 KB = 136 KB.
       - SRAM remaining with fallback: 256 KB - 40 KB = 216 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound.** The tight 136KB memory budget necessitates a highly compact fallback model to guarantee latency constraints under unexpected load spikes.
