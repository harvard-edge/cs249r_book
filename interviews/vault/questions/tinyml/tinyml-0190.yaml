title: The Millisecond Machine Stop
scenario: You're designing a TinyML system to monitor vibrations on a high-speed bottling line. If an anomalous vibration is detected, the device must trigger an emergency stop to prevent a pile-up.
question: "What is the typical, non-negotiable latency budget for such a hard real-time interrupt?"
details:
  realistic_solution: The typical latency budget for a hard real-time interrupt in a TinyML context is around 1 millisecond. This isn't a performance target; it's a physical requirement of the system being controlled. The action is often handled in a dedicated Interrupt Service Routine (ISR) that preempts all other processing to guarantee the deadline is met.
  common_mistake: |
    **The Pitfall:** Misjudging real-time constraints by thinking 30-100ms is "fast enough."
    **The Rationale:** Engineers accustomed to cloud or mobile development fail to distinguish between soft UI deadlines and hard physical deadlines.
    **The Consequence:** Missing the budget by even a few milliseconds causes catastrophic physical equipment failure.
  napkin_math: |
    1. Identify cloud P99 latency budget: 100 ms.
    2. Identify mobile UI 'jank' budget: 16 ms.
    3. Identify hard real-time interrupt budget: 1 ms.
    4. Calculate ratio: 100 ms / 1 ms = 100x.
    5. **Final Result: A cloud response budget is 100x larger than the 1 ms reaction time required for an emergency stop.**
  options:
  - 100 ms (Typical for a cloud service response)
  - 33 ms (Typical for a real-time video frame on an edge device)
  - 16 ms (The budget to avoid UI 'jank' on a mobile device)
  - 1 ms (The budget for a hardware interrupt)
