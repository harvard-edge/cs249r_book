title: Master Flash-Aware Transformer Scheduling on ESP32-S3
scenario: A production team deploys a 6-layer, 256-dim transformer (12MB INT8) on an ESP32-S3 with 8MB flash and 512KB SRAM. The model exceeds flash by 4MB. The team proposes layer-swapping: store layers in a second flash chip via SPI at 80MHz (10 MB/s), swapping each layer's weights before execution. Each layer is 2MB and takes 100ms to process.
question: "How feasible is SPI layer-swapping for a 12 MB transformer on ESP32-S3, and what prefetch and compression schedule can meet 1 s?"
details:
  realistic_solution: 'Swap time per layer: 2MB / 10 MB/s = 200ms. Processing time: 100ms. Sequential: (200+100)*6 = 1800ms >> 1s budget. With DMA prefetch: while layer N processes (100ms), DMA loads layer N+1 (200ms). But 200ms > 100ms, so DMA cannot keep up. Solution: Double-buffer with reduced model. Compress layers to 1MB via INT4: swap = 100ms = processing. Now overlap perfectly.'
  common_mistake: |
    **The Pitfall:** Assuming compute and SPI flash transfer can completely overlap without DMA.
    **The Rationale:** Candidates forget that blocking SPI reads stall the CPU entirely during the weight transfer.
    **The Consequence:** The transfer time is directly added to the compute time, heavily violating the 1-second latency budget.
  napkin_math: |
    1. Calculate SPI layer swap time: 2 MB / 10 MB/s = 200 ms/swap.
    2. Evaluate sequential baseline: 6 layers * (200 ms swap + 100 ms compute) = 1800 ms (fails 1s budget).
    3. Evaluate INT4 compression swap time: 1 MB / 10 MB/s = 100 ms/swap.
    4. Calculate overlapped INT4 schedule (Double-buffered): 100 ms (initial load) + 5 * 100 ms (compute overlapped with load) + 100 ms (final compute).
    5. Calculate total INT4 time: 100 + 500 + 100 = 700 ms.
    6. **Final Result: INT4 compression + DMA overlapping achieves 700 ms, beating the 1s budget.**
