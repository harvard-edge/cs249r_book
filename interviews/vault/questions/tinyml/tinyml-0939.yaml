title: Master Flash-Aware Transformer Scheduling on ESP32-S3
scenario: A 6-layer INT8 transformer (12MB) exceeds available flash by 4MB. The team proposes layer-swapping via SPI at 10 MB/s to a secondary flash chip, requiring 100ms processing per 2MB layer.
question: "How feasible is SPI layer-swapping for a 12 MB transformer on ESP32-S3, and what prefetch and compression schedule can meet 1 s latency?"
details:
  realistic_solution: Utilize aggressive INT4 Post-Training Quantization (PTQ) to halve layer footprint, enabling symmetric DMA double-buffering. This overlaps SPI async loads completely with active computation pipelines, neutralizing the I/O blocking penalty.
  common_mistake: |
    **The Pitfall:** Assuming active compute and SPI flash transfer can perfectly overlap without structural architectural changes.
    **The Rationale:** Candidates forget that unoptimized blocking SPI reads aggressively stall the CPU entirely during the weight transfer.
    **The Consequence:** The transfer time is additively appended to compute time, devastating the 1-second latency budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 6 layers, target < 1 sec total latency.
       - INT8 size: 2 MB/layer. INT4 size: 1 MB/layer.
       - Compute time: 100 ms/layer.
       - SPI Bandwidth: 10 MB/s.
    2. **Calculations:**
       - INT8 SPI swap time: 2 MB / 10 MB/s = 200 ms/swap.
       - Baseline sequential time: 6 * (200 ms swap + 100 ms compute) = 1800 ms (fails).
       - INT4 SPI swap time: 1 MB / 10 MB/s = 100 ms/swap.
       - Overlapped INT4 Double-buffer schedule: 100 ms (load L1) + 5 * 100 ms (compute L(n) while loading L(n+1)) + 100 ms (compute L6).
       - Total Overlapped Time: 100 + 500 + 100 = 700 ms.
    3. **Conclusion & Interpretation:**
       - **Result: INT4 compression + DMA overlapping achieves 700 ms, clearing the 1s budget (I/O-Bound Optimization).**
