title: Optimizing TinyML Latency on ESP32-S3
scenario: You are deploying a keyword spotting TinyML model (e.g., for 'wake word' detection) on an ESP32-S3 microcontroller. The model processes 16kHz mono audio and is designed for real-time inference with a target latency of under 100ms per audio frame. The ESP32-S3 features a 240 MHz dual-core processor, 512 KB on-chip SRAM, and 8 MB external PSRAM. Initial testing reveals that the end-to-end inference latency is consistently exceeding 150ms, leading to noticeable delays in response.
question: Which ESP-IDF profiling metrics and tools should identify why ESP32-S3 KWS latency exceeds 150 ms?
details:
  realistic_solution: A realistic solution involves using ESP-IDF's built-in tracing and profiling tools like `perfmon` (performance monitor) for cycle counting and event profiling, or more detailed trace capabilities (e.g., using ESP-PROG JTAG debugger with ESP-IDF's OpenOCD integration for real-time tracing of CPU activity, function calls, and memory access patterns). You would specifically look at CPU utilization across cores, instruction cache misses, data cache misses, PSRAM access times vs. SRAM access times, and the duration of key functions (e.g., audio capture, pre-processing, inference kernel execution). Flame graphs generated from trace data can visually pinpoint hot spots. If memory-bound, analyze data placement (e.g., moving critical tensors to SRAM). If compute-bound, look for opportunities in model optimization, kernel acceleration (e.g., ESP-DSP), or better utilization of dual cores. If I/O-bound, optimize ADC sampling or DMA transfers.
  common_mistake: |
    **The Pitfall:** Immediately jumping to optimize the model architecture or quantization without systematically identifying the actual bottleneck.
    **The Rationale:** Engineers often assume that high latency is purely a compute limitation of the model itself rather than a system-level constraint.
    **The Consequence:** Effort is wasted optimizing CPU-bound operations when the actual issue is memory access latency to PSRAM, or vice-versa, failing to hit the target latency.
  napkin_math: |
    - ESP32-S3 clock speed: 240 MHz.
    - Inference latency: 150 ms (0.150 s).
    - Total consumed cycles: 240,000,000 cycles/s * 0.150 s = **36,000,000 cycles**.
    - If 1 MB of data is accessed from PSRAM, and PSRAM cache line fetch takes 100 cycles vs SRAM's 10 cycles, the memory overhead compounds rapidly.
    - The cumulative impact of PSRAM accesses can easily lead to **tens of millions of extra cycles**, completely explaining the 150 ms latency.
