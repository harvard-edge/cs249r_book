title: 'Realization: deploy EfficientNet-inspired tiny CNN on Cortex-M4 within 256KB SRAM'
scenario: You need to deploy a 4-class gesture recognizer on a Cortex-M4 (168MHz, 256KB SRAM, 1MB Flash)
  using a custom EfficientNet-inspired tiny CNN with depthwise separable convolutions. Input is 48×48
  grayscale. Design the architecture to fit within 256KB SRAM and 256KB Flash for model weights, then
  realize the TFLite Micro deployment.
details:
  realistic_solution: 'Architecture: Conv 1×3×3 (1→8, stride 2, 24×24×8) → DW+PW block (8→16, 12×12×16)
    → DW+PW block (16→32, 6×6×32) → GlobalAvgPool (1×1×32) → FC 32→4. Weights: 3×3 + 8×9 + 8×16 + 16×9
    + 16×32 + 32×4 = 9+72+128+144+512+128 = 993 params × 1B INT8 = ~1KB. Flash: 1KB weights + ~20KB TFLite
    Micro runtime = 21KB << 1MB. Peak activation SRAM: 24×24×8=4.6KB after stem; 12×12×16=2.3KB; 6×6×32=1.2KB.
    Peak = 4.6KB inputs + 2.3KB output simultaneously = 6.9KB << 256KB. TFLite Micro arena: 50KB should
    suffice.'
  common_mistake: Designing with too many channels in early layers to compensate for grayscale input,
    inflating activation memory; for a 48×48 grayscale input with only 4 classes, 8–16 channels is sufficient
    in early stages.
  napkin_math: 'Total MACs: stem: 24²×1×8×9 = 41K. DW1: 12²×8×9 = 10.4K. PW1: 12²×8×16 = 18.4K. DW2: 6²×16×9
    = 5.2K. PW2: 6²×16×32 = 18.4K. GAP+FC: 32×4 = 128. Total: ~94K MACs. At Cortex-M4 SIMD: 4 MACs/2 cycles
    = 47K cycles. At 168MHz: 47K/168M = 0.28ms per inference. Excellent for real-time gesture at 30 FPS
    (33ms budget). Power: Cortex-M4 at 168MHz draws ~50mW active. 0.28ms active / 33ms frame = 0.85% duty
    cycle → average inference power: 0.05W × 0.0085 = 0.43mW. On 100mAh battery at 3.3V = 330mAh at 1.2V
    effective: 330/0.43mA = 767 hours battery life.'
