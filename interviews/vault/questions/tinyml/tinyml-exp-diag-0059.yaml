title: Diagnosing Flash Wait State Stalls in CMSIS-NN
scenario: A team deployed a wake-word detection model on an ARM Cortex-M4 (STM32F4) running at 168 MHz.
  The model requires 200 KB of the 256 KB SRAM for activations and 800 KB of the 1 MB Flash for INT8 weights
  and program code. The CMSIS-NN kernels utilize SIMD instructions (2x INT8 MACs/cycle), and theoretical
  peak compute suggests an inference time of 50 ms. However, actual on-device profiling shows an inference
  latency of 180 ms, with heavy MAC unit stalling. What is the root cause of this memory bottleneck?
details:
  realistic_solution: The root cause is Flash memory wait states and bus contention. At 168 MHz, the STM32F4
    Flash requires wait states (typically 5), meaning a Flash read takes 6 cycles. Simultaneously fetching
    instructions and reading INT8 weights from the same Flash interface causes thrashing in the ART accelerator.
    The CPU is starved of weights. The solution is to relocate inner-loop code or heavily used weights
    to the remaining 56 KB of zero-wait-state SRAM.
  common_mistake: Candidates often blame the CPU frequency or assume the model operations are naturally
    slow. They frequently treat Flash memory as zero-wait-state storage identical to SRAM, missing the
    critical latency difference between SRAM activation reads and Flash weight reads.
  napkin_math: At 168 MHz, Flash reads take 6 cycles (5 wait states). A 32-bit Flash read provides 4 INT8
    weights. The CMSIS-NN SIMD processes 2 INT8 MACs/cycle, consuming 4 weights in 2 cycles. Since the
    memory system takes 6 cycles to deliver 4 weights that the CPU consumes in 2 cycles, the compute units
    are stalled for 4 out of every 6 cycles. Effective throughput is capped at ~33% of theoretical peak
    (4 weights / 6 cycles vs 2 weights / 1 cycle). This 3x slowdown turns a theoretical 50 ms inference
    into at least 150 ms, exacerbated further by instruction fetch collisions.
