title: 'The Economics of Awakening: A TinyML Power Budget'
scenario: Your team is deploying 10,000 battery-powered sensors to listen for a specific keyword. The MCU consumes 10 mW active and 0.01 mW in sleep. The keyword spotting model runs for 100 ms every 10 seconds. When a keyword is detected (once per hour on average), network transmission consumes 150 mW for 4.5 seconds.
question: What average power does the 10,000-sensor TinyML design draw when KWS runs every 10 s and radio transmits hourly?
details:
  realistic_solution: The correct way to solve this is to calculate the total energy consumed by each component over the one-hour period and then divide by the total time (3600 seconds) to find the average power.
  common_mistake: |
    **The Pitfall:** Ignoring the duty cycle or the high power cost of network transmission.
    **The Rationale:** Candidates often sum the peak power consumptions of all components directly or forget the massive, short-lived power burst required for radio transmission.
    **The Consequence:** Wildly inaccurate estimates of battery life and total cost of ownership.
  napkin_math: |
    - **MCU Active Power:** 100ms every 10s = 1% duty cycle. (10 mW * 0.01) + (0.01 mW * 0.99) = 0.1099 mW.
    - **Network Power:** 150 mW for 4.5 seconds per hour (3600s). Average = 150 mW * (4.5 / 3600) = 0.1875 mW.
    - **Total Average Power:** 0.1099 mW + 0.1875 mW = **0.2974 mW**.
    - **Battery Life:** 1500mAh (4.5Wh) AA battery = 4.5Wh / (0.2974mW * 8760h/yr) = **~1.7 years**.
  options:
  - ~530 mW
  - ~0.02 mW
  - ~0.3 mW
  - 500 mW
  correct_index: 2
