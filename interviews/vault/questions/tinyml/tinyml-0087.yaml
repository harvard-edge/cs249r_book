title: The FPU Register Thrashing
scenario: Your Cortex-M4F (which has an FPU) runs an RTOS. The ML model runs in a low-priority thread
  using heavily optimized floating-point math. You have a high-priority timer interrupt (ISR) that fires
  every 1ms to read an analog sensor. To be 'accurate', you decide to convert the sensor's integer value
  to a float inside the ISR before saving it. Suddenly, your ML thread's overall latency spikes dramatically.
  What did you do to the RTOS scheduler?
question: "Why does converting ADC values to float inside a 1 kHz Cortex-M4F ISR spike RTOS latency?"
details:
  realistic_solution: 'Using float in the ISR triggers full FPU register stacking. ARM Cortex-M4F uses
    lazy FPU context saving — normally, the 32 FPU registers (128 bytes) are NOT saved on interrupt entry.
    But if the ISR touches any float, the hardware must save all 32 registers before the ISR runs and
    restore them after. This adds ~18 extra cycles per ISR entry/exit x 1,000 ISRs/second = 18,000 extra
    cycles/sec, plus the ML thread''s FPU state is repeatedly disrupted. Fix: keep the ISR integer-only
    — store the raw ADC integer and convert to float later in the ML thread. One line of float code in
    the ISR triples the interrupt overhead.'
  common_mistake: '"Floating point math is slow." Converting an int to a float takes 1 cycle on an FPU.
    That doesn''t explain a massive latency spike.'
  napkin_math: Standard ISR entry = ~12 cycles. FPU stacking ISR entry = ~30 cycles. Adding 1 line of
    float code tripled the hardware overhead of entering and exiting the interrupt 1,000 times a second.
