title: Tinyml New 0032
scenario: A heavy ML inference on an M4 takes 500ms to complete. During this single blocking `invoke()`
  call, the entire microcontroller randomly resets, halting operations completely.
details:
  realistic_solution: The blocking inference call is starving the Watchdog Timer (WDT). The WDT expects
    to be 'petted' (reset) at regular intervals to verify the system hasn't frozen. Because the inference
    runs uninterrupted for 500ms, the WDT times out and triggers a hard reset. The solution is to slice
    the inference execution so it yields occasionally, or use an RTOS thread to pet the WDT.
  common_mistake: Treating edge ML frameworks as monolithic black boxes that can block execution indefinitely
    without consequence.
  napkin_math: WDT timeout = 250ms. invoke() takes 500ms. WDT resets MCU at 250ms. You need to pet the
    WDT at least every 200ms, meaning the inference needs to be chunked into at least 3 blocks.
