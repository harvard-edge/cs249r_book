title: Optimizing Convolution Lowering for Cortex-M4 SIMD
scenario: You are deploying a keyword spotting CNN on an ARM Cortex-M4 (STM32F4) operating at 168 MHz with 256 KB SRAM and 1 MB flash. The model has been quantized to INT8, but your initial profiling shows the depthwise convolutions are severely underutilizing the CPU. You need to design a graph compilation pass that lowers these convolutions to fully leverage the CMSIS-NN SIMD instructions, which can perform 2x INT8 MACs per cycle.
question: How should a graph compiler lower depthwise convolutions to exploit Cortex-M4 CMSIS-NN SIMD without memory stalls?
details:
  realistic_solution: A senior engineer will realize that depthwise convolutions require specialized lowering passes, such as layout transformations to ensure data is contiguous for 16-bit wide SIMD loads. The compilation strategy must reorder loops and pack activations so the CMSIS-NN kernel can execute two 8-bit MACs simultaneously per cycle without stalling on unaligned memory access from the 256 KB SRAM.
  common_mistake: |
    **The Pitfall:** Assuming standard im2col lowering works for depthwise convolutions.
    **The Rationale:** Candidates ignore the low arithmetic intensity of depthwise convolutions.
    **The Consequence:** The execution becomes severely memory-bound instead of compute-bound.
  napkin_math: |
    * MACs required: 32 x 32 x 64 x 3 x 3 = 589,824 MACs.
    * CMSIS-NN SIMD throughput: 2x INT8 MACs/cycle.
    * Optimal cycles: 589,824 / 2 = 294,912 cycles.
    * Time at 168 MHz with 1.5x overhead: (294,912 * 1.5) / 168,000,000 = ~2.63 ms.
    * **Result: SIMD lowering reduces execution to ~2.63 ms.**
