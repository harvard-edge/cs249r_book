title: NAS Search Space Design for MCU-Deployable Model
scenario: You are configuring a Hardware-Aware Neural Architecture Search (NAS) to find an image classifier for an ESP32-S3. The deployment constraints are <100KB peak SRAM, <500KB flash, >80% CIFAR-10 accuracy, and <50ms latency.
question: How would you design an ESP32-S3 NAS search space under 100 KB SRAM, 500 KB flash, 80% accuracy, and 50 ms latency?
details:
  realistic_solution: 'Valid operators: depthwise separable conv (3×3, 5×5), pointwise conv (1×1), average pooling, skip connections. Forbidden: standard 3×3 conv with >16 channels at resolution >16×16 (activation too large). SRAM constraint: largest activation layer must fit in 100KB (effectively ~60KB after OS overhead). Resolution reduction: CIFAR-10 32×32 input; must reduce to 16×16 before >32 channels. Channel search: [8, 16, 32] for early layers, max 64 for later. Estimated architecture: 4 blocks, ~200K params → ~200KB INT8 (flash OK), peak activation ~60KB.'
  common_mistake: |
    **The Pitfall:** Including large standard convolution operators at high resolutions (e.g., 3x3 with 64 channels at 32x32) in the search space.
    **The Rationale:** Candidates fail to constrain the search space with hard SRAM limits for intermediate activation tensors.
    **The Consequence:** The NAS wastes massive GPU compute cycles evaluating infeasible architectures that will instantly OOM on the target hardware.
  napkin_math: |
    1. **Assumptions & Constraints:** 100KB SRAM budget includes OS/buffers, leaving ~60KB for peak activation. CIFAR-10 input is 32x32x3. Flash limit is 500KB (~500K INT8 params).
    2. **Calculations:** 32x32 resolution with 16 channels INT8 = 32 * 32 * 16 bytes = 16,384 bytes (16 KB). 16x16 resolution with 64 channels INT8 = 16 * 16 * 64 bytes = 16,384 bytes (16 KB). Standard 3x3 conv at 32x32x32 = 32 KB activation, pushing the 60 KB limit if double-buffered.
    3. **Conclusion & Interpretation:** **Result: Activation-Constrained Search Space.** The NAS must enforce aggressive spatial downsampling (32->16->8) early in the network before allowing channel expansion >32 to prevent peak activation from exceeding the 60 KB boundary.
