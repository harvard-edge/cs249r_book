title: Efficient Inference Loop Design for Production Cortex-M4 Firmware
scenario: 'A Cortex-M4 MCU firmware must run INT8 inference for a 50K MAC model every 100ms while maintaining
  a 5-task RTOS. The RTOS task priorities are: high (control loop, 1kHz), medium (sensor acquisition),
  normal (ML inference), low (BLE comms), idle. ML inference takes 8ms. Design the inference integration
  strategy.'
details:
  realistic_solution: 'ML inference at 8ms is 8% of the 100ms period. RTOS design: create inference task
    at normal priority, triggered by a 100ms software timer. The inference task runs to completion (8ms)
    and is preemptible by control loop and sensor acquisition. To avoid jitter: (1) Place model weights
    in flash (execute-in-place or copy to CCMRAM for faster access). (2) Allocate activation buffers in
    CCMRAM (Cortex-M4 Core-Coupled Memory, single-cycle 64KB). (3) Disable interrupts only for SIMD-critical
    inner loops (< 1ms sections). (4) Use DMA for sensor data acquisition to run concurrent with inference.
    Total inference budget: 8ms inference + 0.5ms pre/post = 8.5ms per 100ms = 8.5% CPU utilization —
    leaves 91.5% for other tasks. RTOS stack: 2KB for inference task.'
  common_mistake: Blocking the RTOS for 8ms on inference; blocking a normal-priority task for 8ms will
    allow higher-priority tasks to run but may miss ML inference deadlines if improperly scheduled.
  napkin_math: 'Inference: 8ms / 100ms = 8% CPU. Control loop: 1kHz × 0.5ms = 50% CPU. Sensor: ~10%. BLE:
    ~15%. Total: 83% CPU. Headroom: 17%. Inference task: normal priority, 100ms period, 8ms WCET. Critical
    section (SIMD loops): <1ms non-preemptible windows.'
