title: SRAM Tiling Strategy for Large Conv Layer on Cortex-M7+Ethos-U55
scenario: An Ethos-U55 has 512KB on-chip SRAM. A colleague claims that a standard convolutional layer processing a 28x28x96 activation map (INT8 = 75.3KB) with 96 filters of 3x3 (weights = 82.9KB) requires a tiling strategy because the combined memory exceeds 512KB.
question: "Is your colleague correct that the 28x28x96 Ethos-U55 CNN layer needs tiling within 512 KB SRAM, and how would you tile a larger 56x56x96 input?"
details:
  realistic_solution: 'Total memory need: input 75.3KB + weights 82.9KB + output 75.3KB = 233.5KB — fits in 512KB. Single-buffer is fine. More challenging scenario: 56x56x96 input = 301KB. Then 301+82.9+301 = 685KB > 512KB. Tiling strategy: keep weights (82.9KB) resident. Tile input/output spatially: split 56x56 into 4x28x28 tiles. Per tile: 28x28x96 = 75.3KB input + 82.9KB weights + 75.3KB output = 233.5KB < 512KB.'
  common_mistake: |
    **The Pitfall:** Tiling only the output without keeping weights resident in SRAM.
    **The Rationale:** Candidates fail to realize that re-loading weights for each tile from slower memory is excessively expensive.
    **The Consequence:** The resulting bandwidth bottleneck ruins inference latency.
  napkin_math: |
    1. Calculate 28x28x96 memory need: 75.3KB (input) + 82.9KB (weights) + 75.3KB (output) = 233.5KB.
    2. Verify fit: 233.5KB < 512KB. No tiling is required.
    3. Calculate larger 56x56x96 need: 301KB (input) + 82.9KB (weights) + 301KB (output) = 685KB. Exceeds 512KB.
    4. Calculate spatial 4-tile strategy (4x 28x28x96): 75.3KB (tile input) + 82.9KB (resident weights) + 75.3KB (tile output) = 233.5KB per pass.
    5. **Final Result: The 28x28x96 layer fits comfortably in 233.5KB; tiling is only needed for larger resolutions like 56x56.**
