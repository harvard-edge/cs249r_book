title: SRAM Tiling Strategy for Large Conv Layer on Cortex-M7+Ethos-U55
scenario: Ethos-U55 has 512KB on-chip SRAM. A colleague claims that a standard convolutional layer processing a 28x28x96 activation map (INT8 = 75.3KB) with 96 filters of 3x3 (weights = 82.9KB) requires a tiling strategy because the combined memory exceeds 512KB.
question: Is your colleague correct that the 28x28x96 Ethos-U55 CNN layer needs tiling within 512 KB SRAM, and how would you tile a larger 56x56x96 input?
details:
  realistic_solution: 'Total memory need: input 75.3KB + weights 82.9KB + output 75.3KB
    = 233.5KB — fits in 512KB. Wait: actually 233.5KB < 512KB so no tiling needed.
    But if we add BN folded parameters and double buffers: 233.5 × 2 (double buffering)
    = 467KB < 512KB. Single-buffer is fine. More challenging scenario: 56x56x96 input
    = 301KB. Then 301+82.9+301 = 685KB > 512KB. Tiling strategy: keep weights (82.9KB)
    resident. Tile input/output spatially: split 56x56 into 4x28x28 tiles. Per tile:
    28x28x96 = 75.3KB input + 82.9KB weights + 75.3KB output = 233.5KB < 512KB. 4
    tiles with weight reuse: weights loaded once, 4 tile passes. Bandwidth: 1× weights
    + 4× activations vs 4× weights + 4× activations if not tiled.'
  common_mistake: Tiling only the output without keeping weights resident; re-loading
    weights for each tile is expensive; the optimal strategy keeps weights in SRAM
    and tiles the spatial dimensions.
  napkin_math: 'The scenario specifies a 28x28x96 activation map = 75.3KB. With weights
    82.9KB and output 75.3KB: total = 233.5KB < 512KB SRAM. No tiling is required
    for this layer. The 56x56 calculation in the solution addresses a hypothetical
    larger case to illustrate the tiling concept.'
