title: Memory vs Compute Energy in ESP32-S3 Workloads
scenario: You are profiling an audio model on an MCU. Model weights are stored in external PSRAM, while activations fit in internal SRAM. You observe that a Fully Connected layer with 100,000 INT8 MACs consumes roughly twice the total energy of a Convolutional layer with 500,000 INT8 MACs. Assume an INT8 MAC costs 0.1 pJ, an internal SRAM fetch costs 5 pJ, and an external PSRAM fetch costs 100 pJ.
question: Why can a 100k-MAC fully connected layer in PSRAM use more energy than a 500k-MAC convolution?
details:
  realistic_solution: The behavior is caused by the difference in arithmetic intensity and weight reuse between the two layer types. In an FC layer with a batch size of 1, each weight is fetched from the expensive external PSRAM and used only once, making the layer entirely memory-bound. The Convolutional layer fetches weights from PSRAM and reuses them many times across spatial dimensions, shifting the bulk of memory accesses to the much cheaper internal SRAM.
  common_mistake: |
    **The Pitfall:** Estimating energy consumption purely based on MAC operations.
    **The Rationale:** Candidates equate fewer MACs with lower energy, failing to recognize that memory access—especially to external PSRAM—dominates the energy budget.
    **The Consequence:** Optimization efforts focus exclusively on reducing model parameter counts instead of improving arithmetic intensity and memory locality.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - FC Layer: 100k MACs, 100k weights (used once).
       - Conv Layer: 500k MACs, 1k weights (reused 500×).
       - Energy: MAC = 0.1 pJ, SRAM = 5 pJ, PSRAM = 100 pJ.
    2. **Calculations:**
       - FC MAC energy: 100,000 × 0.1 pJ = 0.01 µJ.
       - FC PSRAM fetch: 100,000 × 100 pJ = 10.0 µJ.
       - FC Total Energy: 10.01 µJ.
       - Conv MAC energy: 500,000 × 0.1 pJ = 0.05 µJ.
       - Conv PSRAM fetch: 1,000 × 100 pJ = 0.1 µJ.
       - Conv SRAM fetch (2 per MAC): 1,000,000 × 5 pJ = 5.0 µJ.
       - Conv Total Energy: 5.15 µJ.
    3. **Conclusion & Interpretation:**
       - **Result: 10.01 µJ vs 5.15 µJ. Memory-Bound.** The FC layer consumes roughly 2× more energy despite having 5× fewer operations due to a lack of weight reuse and complete reliance on expensive PSRAM fetches.
