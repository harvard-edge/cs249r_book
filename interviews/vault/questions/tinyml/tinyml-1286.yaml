title: Vibration Anomaly Detection Accelerator Selection
scenario: You are designing a smart sensor node for predictive maintenance that must
  perform anomaly detection on vibration data at 20 Hz. The proposed model is a CNN
  requiring 15 million INT8 MACs per inference. Your current bill of materials specifies
  an ARM Cortex-M4 (STM32F4) running at 168 MHz with 256 KB SRAM, 1 MB flash, no FPU,
  and CMSIS-NN SIMD. You need to analyze the compute requirements and determine if
  the Cortex-M4 alone is sufficient or if an external micro-NPU must be added to the
  design.
question: Can a 168 MHz Cortex-M4 meet a 20 Hz, 15M-MAC vibration anomaly workload,
  or does the design need an external NPU?
details:
  realistic_solution: The candidate should identify that the Cortex-M4 can perform
    2 INT8 MACs per cycle using CMSIS-NN SIMD instructions, yielding a theoretical
    maximum of 336 MMACs/s. They must calculate the application's requirement of 300
    MMACs/s. Recognizing that real-world CMSIS-NN efficiency typically peaks around
    70-75% due to memory bottlenecks, loop overhead, and pipeline stalls, they should
    conclude the Cortex-M4 is insufficient and specify an architecture that either
    includes an external NPU or requires severe model compression.
  common_mistake: Candidates often look only at the clock speed (168 MHz) and assume
    the system can only perform 168 million operations per second, missing the SIMD
    instructions. Conversely, they might correctly identify the SIMD capability but
    assume 100% utilization of the theoretical maximum throughput without accounting
    for memory access overhead.
  napkin_math: 'Theoretical maximum compute: 168 MHz * 2 INT8 MACs/cycle = 336 MMACs/s.
    Required compute: 15 M MACs/inference * 20 inferences/s = 300 MMACs/s. Required
    CPU utilization = 300 / 336 = 89.3%. Realistic effective compute at 70% utilization
    = 336 * 0.7 = 235.2 MMACs/s. Since 235.2 MMACs/s < 300 MMACs/s, the Cortex-M4
    cannot meet the real-time inference constraints.'
