title: Tensor Arena Sizing for MobileNetV2 on Cortex-M7
scenario: You're deploying a quantized INT8 MobileNetV2 (96x96 input) on a Cortex-M7. TFLite Micro requires a statically allocated tensor arena for all intermediate activations. The model has 52 operators. The largest single activation tensor is 96x96x32 = 294,912 bytes. A naive estimate says you need the sum of all activation tensors (~2.1 MB).
question: Why is summing 2.1 MB of MobileNetV2 activations wrong, and what arena fits a 96x96 INT8 model in 512 KB SRAM?
details:
  realistic_solution: 'TFLite Micro''s memory planner analyzes the tensor lifetime graph — each tensor is ''alive'' from its producing operator to its last consuming operator. The planner schedules tensors to reuse memory from dead tensors (memory aliasing). For MobileNetV2: depthwise separable convolutions have two stages. The peak memory occurs at the widest point of the network where feature maps are largest AND residual connections keep two tensors alive simultaneously. For 96x96 input: peak is at the first inverted residual block where input (96x96x32 = 288 KB) and output (96x96x16 = 144 KB) must coexist = 432 KB. Plus operator scratch buffers (~20 KB for im2col). Total arena: ~452 KB. This fits in 512 KB SRAM with 60 KB remaining for stack and globals. The memory planner typically achieves 3-5x reduction versus naive sum.'
  common_mistake: |
    **The Pitfall:** Overestimating memory by summing all tensors.
    **The Rationale:** Candidates fail to account for tensor lifetime analysis and memory aliasing (reuse) during sequential execution.
    **The Consequence:** They erroneously conclude the model cannot fit the hardware, incorrectly initiating a costly architecture redesign or hardware upgrade.
  napkin_math: |
    - Naive sum: 52 operator outputs ≈ 2.1 MB.
    - Peak concurrent: largest layer input (288 KB) + output (144 KB) + scratch (20 KB) = **452 KB**.
    - Remaining SRAM: 512 - 452 = 60 KB for stack and globals.
    - Reduction factor: 2150 KB / 452 KB = **4.7x reduction**.
