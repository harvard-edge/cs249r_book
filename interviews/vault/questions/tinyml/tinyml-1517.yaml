title: Tensor Arena Sizing for MobileNetV2 on Cortex-M7
scenario: You are deploying a quantized INT8 MobileNetV2 on a Cortex-M7. TFLite Micro requires a statically allocated tensor arena. The model possesses 52 operators, with the single largest tensor occupying 288 KB. The sum of all tensors is ~2.1 MB.
question: Why is estimating a 2.1 MB SRAM requirement mathematically flawed, and what is the true arena size to fit a 96x96 INT8 MobileNetV2 within 512 KB of SRAM?
details:
  realistic_solution: The TFLite Micro memory planner fundamentally relies on memory aliasing. Tensors only require allocation from their producing operator to their final consuming operator. The true arena size is governed strictly by the network's maximum concurrent memory peak. For a 96x96 MobileNetV2, this peak manifests at the first inverted residual block, requiring the input tensor (288 KB), the output tensor (144 KB), and operational scratch buffers (~20 KB) to exist simultaneously.
  common_mistake: |
    **The Pitfall:** Linearly summing all intermediate activation tensors.
    **The Rationale:** Candidates fail to execute a tensor lifetime analysis, assuming the neural network must hold every intermediate calculation in SRAM persistently.
    **The Consequence:** They estimate a catastrophic 2.1 MB memory requirement, abandoning the Cortex-M7 deployment path due to an illusionary SRAM deficiency.
  napkin_math: |
    1. **Assumptions & Constraints**:
       - 512 KB Cortex-M7 SRAM.
       - MobileNetV2 peak node (inverted residual block).
    2. **Calculations**:
       - Naive Summation: ~2.1 MB (Incorrect).
       - Peak Node Input Tensor: 96x96x32 = 288 KB.
       - Peak Node Output Tensor: 96x96x16 = 144 KB.
       - Arena Size = 288 KB + 144 KB + 20 KB (scratch) = 452 KB.
    3. **Conclusion & Interpretation**:
       - **Result: Memory-Bound Allocation**. By tracking tensor lifetimes, the required SRAM footprint compresses from an impossible 2.1 MB down to a practical 452 KB, safely validating the Cortex-M7 deployment.
