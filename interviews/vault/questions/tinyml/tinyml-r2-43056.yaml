title: Arena Fragmentation in Dynamic TinyML Workloads
scenario: 'Your MCU application on Cortex-M7 (512 KB SRAM) switches between 3 TFLite Micro models depending
  on sensor input: gesture recognition (180 KB arena), anomaly detection (250 KB arena), and voice command
  (300 KB arena). The application previously used a fixed 300 KB arena (max of all three). A new requirement
  adds a fourth model (350 KB arena), and now you can only dedicate 310 KB to the arena. Design an arena
  management strategy that supports all 4 models without exceeding 310 KB.'
question: "How would you design an arena management strategy that supports all 4 models without exceeding 310 KB?"
details:
  realistic_solution: 'The 350 KB model doesn''t fit in 310 KB — so you must reduce its arena size or
    restructure memory. Options: (1) Model-specific optimizations: analyze the 350 KB model''s memory
    plan. Often, 10-15% of arena is padding/alignment waste. Re-running the TFLite Micro memory planner
    with tighter alignment (4-byte vs 16-byte) might reduce to 310 KB. (2) Overlay strategy: partition
    the 310 KB arena into a fixed region (used by all models, ~180 KB) and a swappable region (130 KB).
    For the 350 KB model: use the fixed 180 KB + swappable 130 KB = 310 KB. Spill the remaining 40 KB
    of tensors to flash (sequential write/read for skip connections). (3) Model surgery: the 350 KB model
    likely has one bottleneck layer. Apply channel splitting (as in tensor-arena-planning) to reduce the
    peak layer''s activation size by splitting into 2 passes. Target: reduce peak from 350 to 310 KB.
    (4) Two-tier arena: 310 KB in SRAM + use the flash-backed memory for cold tensors. All approaches
    maintain static allocation — no malloc at runtime.'
  common_mistake: Implementing dynamic memory allocation (malloc/free) for each model's arena. Dynamic
    allocation on MCUs leads to fragmentation, non-deterministic allocation times, and eventual memory
    exhaustion in long-running embedded systems.
  napkin_math: 'Current max-arena approach: max(180, 250, 300) = 300 KB. With 4th model: max(180, 250,
    300, 350) = 350 KB (exceeds 310 KB by 40 KB). Channel splitting on bottleneck layer: if peak layer
    is 80 KB, splitting 2-way saves 40 KB → arena = 310 KB. Flash spill for 40 KB: write 40 KB at 1 MB/s
    = 40ms, read at 50 MB/s = 0.8ms. Total penalty: ~41ms per inference. If inference budget is 200ms,
    overhead = 20%. Alignment optimization: 350 KB with 16-byte alignment → 4-byte alignment saves ~3-5%
    = 332-339 KB. Not enough alone but combined with minor channel splitting: feasible.'
