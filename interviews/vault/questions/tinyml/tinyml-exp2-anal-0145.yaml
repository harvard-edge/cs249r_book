title: Denial-of-Sleep via Early Exit Exploitation
scenario: An anomaly detection model is deployed on a Nordic nRF5340 (128 MHz app core, 256 KB SRAM).
  The model uses early exit branches to save power; simple inputs exit early, drawing ~5mA active current
  for 10ms, while complex inputs traverse the full network, drawing ~5mA for 50ms. An attacker continuously
  sends crafted OOD inputs over BLE 5.3 that force the model to always evaluate the full network. If the
  device runs on a 200mAh coin cell battery, processes 10 inferences per second, and normally receives
  1 complex input for every 99 simple inputs, explain how the attacker's inputs impact the system's expected
  battery life.
question: "How does a denial-of-sleep attack on early exits change nRF5340 average current and coin-cell battery life?"
details:
  realistic_solution: 'The crafted inputs act as a Denial-of-Sleep attack by forcing the worst-case execution
    path, exploiting the data-dependent execution time of the early-exit architecture. Because the active
    current (~5mA) is sustained for 5x longer per inference, the overall energy consumption increases
    drastically. This demonstrates a critical tradeoff: while conditional compute saves power on average,
    it introduces a power side-channel vulnerability that attackers can exploit to rapidly deplete the
    battery of constrained edge devices.'
  common_mistake: Candidates often identify the denial-of-sleep attack but fail to quantify its impact
    on the system. They might state the battery will drain faster without calculating the baseline versus
    attacked power consumption to demonstrate the severity of the vulnerability.
  napkin_math: 'Baseline energy for 100 inferences: 99 * (5mA * 10ms) + 1 * (5mA * 50ms) = 4950 + 250
    = 5200 mA-ms. Average baseline per inference: 52 mA-ms. Under attack: 100 * (5mA * 50ms) = 25000 mA-ms.
    Average attacked per inference: 250 mA-ms. At 10 inferences/sec, baseline average current = 52 mA-ms
    * 10 / 1000 = 0.52 mA. Attacked average current = 250 mA-ms * 10 / 1000 = 2.5 mA. The 200mAh battery
    life drops from ~384 hours (200 / 0.52) to just 80 hours (200 / 2.5).'
