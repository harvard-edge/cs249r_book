title: The Flash Extraction Attack
scenario: An attacker has physical access to your deployed MCU. They want to extract your proprietary
  model weights from flash memory. How can power side-channel analysis extract model weights by correlating
  power traces with MAC operations, and why does the model's arithmetic structure make this ML-specific
  attack possible?
details:
  realistic_solution: The attacker doesn't need to read the flash directly. They connect a high-resolution
    current probe to the MCU's power rail and record the power consumption while feeding known inputs
    to the ML model.
  common_mistake: '"Flash memory is internal to the MCU — it can''t be read externally." Or "Just enable
    Read-Out Protection (RDP)." RDP blocks JTAG debuggers, but side-channel attacks bypass digital locks
    entirely.'
  napkin_math: A Cortex-M4 executing a `SMLAD` instruction draws ~20 mA. The difference in current between
    multiplying 0x0000 and 0xFFFF might be just 50 µA. A 1 GS/s oscilloscope can capture this micro-variation.
    With ~10,000 inference traces (which takes just a few minutes to collect at 10 Hz inference rate),
    the signal-to-noise ratio is high enough to extract an entire 8-bit weight matrix with >99% accuracy.
    Defenses like dummy operations add ~10-20% performance overhead but reduce the SNR so severely that
    the attacker would need millions of traces, making the attack economically unviable.
