title: Cortex-M4 Acoustic Event Queue
scenario: A TinyML Cortex-M4 microcontroller processes acoustic wake-word events.
  Events arrive at an average rate of 5 per second (Poisson), and the fixed-size model
  takes exactly 150ms per event to process.
question: Evaluate the expected wait time in the queue before processing begins, using
  an M/D/1 queueing model.
visual:
  kind: svg
  path: tinyml-1569.svg
  alt: A curve showing average wait time exploding as utilization approaches 100%
    in a deterministic service queue.
  caption: M/D/1 Expected Wait Time
details:
  realistic_solution: The arrival rate (lambda) is 5 events/s. The service time (D)
    is 0.15s, so utilization (rho) is 5 * 0.15 = 0.75. For an M/D/1 queue, the average
    wait time in the queue (Wq) is (rho * D) / (2 * (1 - rho)). Wq = (0.75 * 0.15)
    / (2 * 0.25) = 0.1125 / 0.5 = 0.225 seconds, or 225ms.
  common_mistake: Using the M/M/1 formula instead of M/D/1, which overestimates the
    wait time by a factor of 2 when service times are deterministic.
  napkin_math: (0.75 * 0.15) / (2 * 0.25) = 0.225s
