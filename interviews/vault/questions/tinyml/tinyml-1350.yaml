title: 'Real-Time TinyML Inference on ESP32-S3: Diagnosing Latency and Jank'
scenario: You are deploying a gesture recognition model on an ESP32-S3 with a strict 33ms frame budget. During initial testing, you observe occasional jank in downstream actuation and Application Not Responding (ANR) timeouts. The current implementation uses a polling loop for sensor data and runs inference directly within the main task.
question: How should the system architecture be restructured to systematically diagnose and mitigate latency jitter to guarantee the 33ms real-time deadline?
details:
  realistic_solution: The architecture must shift from polling to an interrupt-driven pipeline managed by an RTOS. First, establish the Worst-Case Execution Time (WCET) using ESP-IDF performance monitors. Second, leverage FreeRTOS to create a high-priority, preemptive task for inference, triggered by hardware sensor interrupts. Finally, ensure the critical model graph remains locked in the 512 KB internal SRAM, as arbitrary cache misses from the 8 MB PSRAM will catastrophically spike the WCET.
  common_mistake: |
    **The Pitfall:** Optimizing for average-case latency rather than WCET.
    **The Rationale:** Candidates optimize the model until the "average" inference time fits the 33ms budget, neglecting real-time task prioritization and PSRAM cache miss penalties.
    **The Consequence:** The system inevitably misses deadlines during worst-case edge scenarios (e.g., concurrent network interrupts), leading to dropped frames and severe actuation jank.
  napkin_math: |
    1. **Assumptions & Constraints**:
       - 33ms strict frame budget on 240 MHz ESP32-S3.
       - Model requires ~1M MAC operations at 3 cycles/MAC.
    2. **Calculations**:
       - Available Cycles per Frame: 0.033s * 240,000,000 Hz = 7.92M cycles.
       - Average Inference: (1M * 3) / 240,000,000 Hz = 12.5ms.
       - WCET Cache Miss Penalty: Fetching from PSRAM can spike inference to >25ms.
    3. **Conclusion & Interpretation**:
       - **Result: Latency-Bound Architecture**. While average inference (12.5ms) easily fits the 33ms budget, PSRAM cache misses and polling jitter push the WCET beyond acceptable limits, necessitating an interrupt-driven SRAM-locked pipeline.
