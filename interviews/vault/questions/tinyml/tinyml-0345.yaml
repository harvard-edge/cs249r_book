title: 'The TinyML Tensor Arena: Tensor Arena Planning'
scenario: 'You are deploying a keyword spotting model on a microcontroller with 256 KB of SRAM. The TensorFlow Lite for Microcontrollers memory planner tells you that to execute the model, the two largest tensors that need to be in memory *at the same time* are a 20 KB input feature map and a 30 KB intermediate activation map.'
question: 'To minimize RAM usage, what is the absolute minimum size required for the tensor arena?'
details:
  realistic_solution: 'The tensor arena is a pre-allocated block of memory in SRAM that TensorFlow Lite for Microcontrollers uses for all input, output, and intermediate tensors. Its size must be sufficient to hold all tensors that are simultaneously required during any step of the model''s execution. In this case, since the 20 KB and 30 KB tensors are concurrent, the minimum arena size is the sum of their sizes.'
  common_mistake: |
    **The Pitfall:** Assuming the peak memory is determined only by the single largest tensor in the graph.
    **The Rationale:** Engineers forget that the tensor arena must be large enough to hold all tensors that are 'live' *concurrently* at any point during inference.
    **The Consequence:** The allocated arena is too small, resulting in a runtime out-of-memory crash.
  napkin_math: |
    1. **Assumptions & Constraints:** Tensors of 20 KB and 30 KB exist concurrently in SRAM.
    2. **Calculations:**
       - Peak Memory = Size(Concurrent Tensor A) + Size(Concurrent Tensor B).
       - Peak Memory = 20 KB + 30 KB = 50 KB.
    3. **Conclusion & Interpretation:** **The absolute minimum tensor arena size is 50 KB.** Result: Memory-Bound.
  options:
  - 30 KB
  - 50 KB
  - 100 KB
  - 400 KB
  correct_index: 1
