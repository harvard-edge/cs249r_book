title: The Microcontroller Ridge Point
scenario: You're profiling a keyword-spotting model on a Cortex-M4 microcontroller. To understand its
  performance limits, you need to know the fundamental hardware characteristics. What is the approximate
  'ridge point' for a device like this, and what does its value imply about where performance bottlenecks
  are likely to occur?
question: "What is the approximate 'ridge point' for a device like this, and what does its value imply about where performance bottlenecks are likely to occur?"
details:
  realistic_solution: The ridge point of a Cortex-M4 is extremely low, approximately 0.2 Ops/Byte. This
    indicates that the device has relatively high memory bandwidth compared to its limited computational
    power. As a result, almost any neural network operation (even a simple convolution) will have an arithmetic
    intensity greater than 0.2. This makes the vast majority of TinyML models **compute-bound**, not memory-bound.
    The performance bottleneck is the CPU's ability to perform calculations, not its ability to fetch
    data from SRAM.
  common_mistake: Engineers accustomed to GPU development often assume all systems have high ridge points
    (like an H100's ~295 Ops/Byte) and are therefore frequently memory-bound. They fail to recognize that
    the balance of compute to memory bandwidth is completely different at the TinyML scale, leading them
    to misdiagnose performance bottlenecks.
  napkin_math: The ridge point is the ratio of the hardware's peak computational performance to its peak
    memory bandwidth.
  options:
  - ~300 Ops/Byte, meaning most models are memory-bound.
  - ~0.2 Ops/Byte, meaning most models are memory-bound.
  - ~0.2 Ops/Byte, meaning most models are compute-bound.
  - ~20 Ops/Byte, meaning models are well-balanced between compute and memory.
  correct_index: 2
