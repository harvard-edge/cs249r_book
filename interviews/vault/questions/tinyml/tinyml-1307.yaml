title: ESP32-S3 Roofline Memory Architecture Specification
scenario: You are tasked with deploying a visual wake word model on the ESP32-S3. The hardware features a 240 MHz dual-core Xtensa processor with INT8 vector extensions, 512 KB of SRAM, and 8 MB of PSRAM. The model requires 30 million MAC operations and has 800 KB of INT8 weights, needing to run in under 50ms.
question: How should an ESP32-S3 visual wake-word model stage 800 KB of weights so roofline analysis meets a 50 ms latency target?
details:
  realistic_solution: The candidate should specify an architecture where activations and the current layer's weights are strictly allocated in the 512 KB SRAM, using double-buffering via DMA to stream the 800 KB of weights from PSRAM. By plotting the roofline, they should demonstrate that reading weights directly from PSRAM drops the operational intensity into the memory-bound region, whereas pinning execution to SRAM keeps the workload compute-bound and satisfies the 50ms constraint.
  common_mistake: |
    **The Pitfall:** Relying implicitly on the PSRAM cache.
    **The Rationale:** Candidates calculate theoretical compute peak but fail to account for the massive bandwidth disparity between SRAM and PSRAM.
    **The Consequence:** They leave weights in PSRAM, dragging the roofline into a memory-bound state and severely missing the 50ms latency deadline.
  napkin_math: |
    - Target throughput: 30M MACs / 0.05s = 600 MMACs/s.
    - ESP32-S3 Peak Compute: 240 MHz * 2 cores * 16 MACs/cycle = 7.68 GMACs/s.
    - PSRAM Bandwidth: ~40 MB/s (1 byte/MAC = 40 MMACs/s). **Fails 600 MMACs/s.**
    - SRAM Bandwidth: 32-bit/cycle at 240 MHz = 960 MB/s.
    - **Staging weights into SRAM moves operation to 960 MMACs/s, easily hitting the 50ms deadline.**
