title: NPU to CPU Porting Power Diagnosis
scenario: >
  Your team ported a continuous vibration monitoring model from an NPU-accelerated SoC to a Nordic nRF5340 to leverage its BLE 5.3 capabilities and simplify the BOM. QA reports a massive power regression: the new nRF5340-based system drains the coin cell battery in under two weeks, whereas the previous NPU-based system lasted for months despite having a higher peak active current.
question: Why does the nRF5340 port drain a coin cell faster than the old NPU design despite lower peak current?
details:
  realistic_solution: >
    The root cause is a massive increase in active duty cycle due to the loss of dedicated hardware acceleration. While the general-purpose CPU has a lower peak current, it lacks parallel MAC arrays. It must stay awake for vastly more clock cycles to compute the same neural network, destroying the energy-per-inference metric. The programmability-efficiency tradeoff dictates that the prolonged active time entirely negates the benefit of lower peak power.
  common_mistake: |
    **The Pitfall:** Assuming the power drain comes from the BLE radio, a memory leak, or sleep state misconfiguration.
    **The Rationale:** Candidates look at the ~5mA active current and fail to analyze the massive difference in processing efficiency and duty cycle between an NPU and a general-purpose CPU.
    **The Consequence:** Time is wasted debugging non-existent software bugs instead of realizing the fundamental hardware mismatch for the workload.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Old NPU: 15mA peak, 1ms inference.
       - CPU (nRF5340): 5mA peak, 25ms inference.
       - Inference Rate: 10 Hz.
       - Battery: 220 mAh CR2032.
    2. **Calculations:**
       - NPU Charge/Inference: 15 mA * 1 ms = 15 µAs.
       - CPU Charge/Inference: 5 mA * 25 ms = 125 µAs.
       - CPU Average Current: 10 * 125 µAs = 1,250 µA (1.25 mA).
       - CPU Battery Life: 220 mAh / 1.25 mA = 176 hours (~7.3 days).
    3. **Conclusion & Interpretation:**
       - **Result: Battery dead in ~7.3 days.** The CPU draws lower peak current but requires 25x the time, resulting in vastly worse energy efficiency. **Bottleneck: Compute Duty Cycle.**
