title: 'Evaluate KV Cache Compression Techniques on Ethos-U55'
scenario: 'Three KV cache compression techniques are being considered for a 4-layer, 64-dim transformer on Cortex-M7+Ethos-U55: (A) sliding window 32 tokens (16KB cache), (B) grouped-query attention with 2 KV heads for 8 query heads (16KB cache), and (C) KV quantization to INT4 preserving full context (32KB cache for 128 tokens vs 64KB INT8). The context is a 128-token input, and the downstream task requires >93% accuracy on the MNLI-Small benchmark.'
question: 'Which KV-cache compression gives the best accuracy-memory Pareto point for the 4-layer transformer on Cortex-M7+Ethos-U55?'
details:
  realistic_solution: 'A) Sliding window: 16KB, accuracy drops to 89% (misses long-range dependencies). B) GQA 2 KV heads: 16KB, accuracy 94.1% (maintains most attention capacity with 4× KV reduction). C) KV INT4: 32KB for full 128-token context, accuracy 92.8% (quantization noise in keys and values hurts attention sharpness). Pareto winner: GQA at 16KB with 94.1% — achieves target >93% while saving 75% vs baseline 64KB. Recommendation: GQA with 2 KV heads.'
  common_mistake: 'Evaluating only memory savings without measuring accuracy per KB saved; GQA often provides better Pareto trade-off than window attention for tasks requiring global context.'
  napkin_math: |
    **Assumptions & Constraints:**
    - 4-layer, 64-dim transformer, 128-token input.
    - Target: Cortex-M7+Ethos-U55.
    - Baseline KV Cache footprint must fit within severe SRAM limits.

    **Calculations:**
    - Baseline KV (INT8): 2 (K,V) * 4L * 64D * 128T * 1B = 65,536 bytes (64KB).
    - GQA 2KV (from 8H): 64KB * (2/8) = 16KB.
    - Window 32T: 64KB * (32/128) = 16KB.
    - INT4 full: 64KB * 0.5 = 32KB.

    **Conclusion & Interpretation:**
    - **Result: 16KB GQA (Memory-Bound)**. GQA provides the best Pareto trade-off, safely reducing KV cache by 75% while maintaining global context.
