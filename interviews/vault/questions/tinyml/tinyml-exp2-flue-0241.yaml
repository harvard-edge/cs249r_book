title: Adversarial Detection Latency on Cortex-M4
scenario: You are deploying a keyword spotting system on an ARM Cortex-M4 (STM32F4) running at 168 MHz
  with 256 KB SRAM. To defend against adversarial audio perturbations, you implement a lightweight INT8
  autoencoder as an anomaly detector before the main model. This defense mechanism requires exactly 336,000
  INT8 MAC operations per audio frame. Assuming optimal memory access and full pipeline utilization with
  CMSIS-NN SIMD instructions, calculate the theoretical minimum latency this defense adds to your inference
  pipeline.
question: "What theoretical latency does a 336k-MAC INT8 adversarial detector add on Cortex-M4 with CMSIS-NN SIMD?"
details:
  realistic_solution: The candidate should apply the architectural throughput specifications of the Cortex-M4
    to determine the cycle count, then use the clock frequency to find the execution time. By dividing
    the total number of INT8 MAC operations by the SIMD throughput (2 MACs/cycle), they get the total
    clock cycles, which is then divided by the 168 MHz clock speed to yield the final latency.
  common_mistake: Candidates often forget that the ARM Cortex-M4 supports DSP extensions (SIMD) that perform
    2 INT8 MACs per clock cycle. Consequently, they incorrectly assume 1 cycle per MAC, resulting in a
    latency calculation that is exactly twice as long as the theoretical minimum.
  napkin_math: 'Total operations: 336,000 INT8 MACs.

    Throughput: 2 INT8 MACs / cycle (CMSIS-NN SIMD).

    Total cycles required = 336,000 / 2 = 168,000 cycles.

    Clock frequency: 168 MHz = 168,000,000 cycles / second.

    Added latency = 168,000 cycles / 168,000,000 cycles/sec = 0.001 seconds = 1.0 ms.'
