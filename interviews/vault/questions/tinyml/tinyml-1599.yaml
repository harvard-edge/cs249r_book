title: SPI vs DMA Latency Analysis
scenario: Implementing a predictive maintenance model where SPI sensor data arrives
  concurrently with Cortex-M4 model execution.
question: Analyze the latency impact of using a blocking SPI read versus a non-blocking
  DMA transfer that fills a ping-pong buffer while the M4 processes the previous window.
details:
  realistic_solution: A blocking SPI read forces the CPU to halt for 5ms while data
    clocks in, adding sequentially to the 15ms inference time for a 20ms total latency.
    With DMA, the 5ms transfer is completely hidden behind the 15ms compute of the
    previous frame. Total latency per window becomes max(5ms, 15ms) = 15ms, achieving
    a 25% throughput increase.
  common_mistake: Adding the DMA setup overhead to the total runtime without realizing
    the actual data transfer happens in parallel.
  napkin_math: max(5ms, 15ms) = 15ms total latency
