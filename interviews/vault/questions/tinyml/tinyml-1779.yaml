title: Applying Loop Tiling to SRAM Limits
scenario: A developer is porting a CNN to a Cortex-M4 with 64KB SRAM. The first Conv2D
  layer requires an 80KB activation buffer natively.
question: Apply a memory optimization technique to fit this layer's execution within
  the available 64KB limit.
details:
  realistic_solution: Apply loop tiling (patch-based inference). By computing the
    network in spatial chunks, the peak intermediate activation size is bounded to
    the tile size. This reduces the SRAM footprint well below the 64KB limit at the
    cost of slight recomputation overlaps.
  common_mistake: Quantizing weights further to save SRAM, failing to realize intermediate
    activations are the actual bottleneck needing layout optimization.
  napkin_math: 80KB > 64KB -> needs tiling
