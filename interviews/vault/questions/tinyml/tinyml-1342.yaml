title: ESP32-S3 Edge Latency Decomposition for Real-time Object Detection
scenario: You're deploying a small object detection model on an ESP32-S3 (240 MHz dual-core, 512 KB SRAM, 8 MB PSRAM) for a battery-powered security camera. The system captures a 240x240 RGB image, preprocesses it, runs inference, applies non-max suppression (NMS), and sends a JSON alert over Wi-Fi. The end-to-end latency is 700ms, but the requirement is under 300ms.
question: How should you decompose the 700 ms latency and identify the components blocking the 300 ms target?
details:
  realistic_solution: Optimize image preprocessing using techniques like downsampling at the camera sensor level if possible, or highly optimized C/assembly routines. Utilize one core for sensor interfacing and preprocessing while the other handles inference. Quantize the model aggressively (e.g., 8-bit integer) and ensure the inference engine (e.g., TFLite Micro) is highly optimized for the ESP32-S3's Xtensa LX7 cores. Streamline postprocessing (NMS) by using efficient algorithms or offloading parts to specialized hardware if available (unlikely on ESP32-S3 for NMS itself). Implement asynchronous Wi-Fi transmission to overlap with other tasks. Optimize Wi-Fi connection times by using fast-connect features. Strategically place critical data/model layers in internal SRAM if possible, leveraging PSRAM only when necessary.
  common_mistake: |
    **The Pitfall:** Overlooking the cost of image preprocessing and Wi-Fi overhead on a constrained MCU.
    **The Rationale:** Assuming the inference model is the sole bottleneck and neglecting the time required for resizing, color conversion, NMS on raw CPU, and PSRAM access delays.
    **The Consequence:** Focusing optimization purely on the model while ignoring massive delays in the surrounding data pipeline, failing to hit the real-time target.
  napkin_math: |
    1. **Wi-Fi Overhead:** Connection and transmission can take **100-300 ms**.
    2. **Preprocessing:** Unoptimized 240x240 RGB resize/conversion takes **100-200 ms**.
    3. **Inference (TTFT + TPOT):** MobileNetV2 variant takes **100-400 ms** (worsened by PSRAM access for weights/activations).
    4. **Postprocessing (NMS):** Unoptimized bounding box suppression adds **50-150 ms**.
    5. **Conclusion:** Preprocessing, Network, and PSRAM-bound TPOT are the primary bottlenecks contributing to the 700ms total.
