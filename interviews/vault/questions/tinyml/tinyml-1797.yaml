title: Cortex-M4 Flash vs SRAM execution
scenario: A Cortex-M4 has 256KB SRAM and 1MB Flash. A 100KB ECG model takes 2 cycles/word
  to load from Flash, but 1 cycle/word from SRAM. Computations require iterating over
  weights.
question: Analyze the execution cycle difference between streaming directly from Flash
  (reading weights 5 times) versus copying the 100KB model to SRAM once before execution.
details:
  realistic_solution: Direct execution from Flash requires reading the weights for
    every pass. At 2 cycles per word, reading 100KB (25,000 32-bit words) takes 50,000
    cycles per pass. Copying to SRAM takes 50,000 cycles upfront. Once in SRAM, reading
    takes 1 cycle per word (25,000 cycles). By the 5th pass, the upfront copy strategy
    massively outperforms direct execution because the slow Flash access penalty is
    avoided in the inner loops.
  common_mistake: Failing to account for the fact that a 100KB model is actually 25,000
    32-bit words, incorrectly treating bytes as the unit of memory cycles.
  napkin_math: 'Flash direct: 5 * 25K * 2 = 250,000 cycles. SRAM copy: (25K * 2) +
    5 * (25K * 1) = 50K + 125K = 175,000 cycles.'
