title: Cortex-M4 Flash vs SRAM execution
scenario: A Cortex-M4 has 256KB SRAM and 1MB Flash. A 100KB ECG model takes 2 cycles/word to load from Flash, but 1 cycle/word from SRAM. Computations require iterating over weights.
question: "What is the execution cycle difference between streaming directly from Flash for 5 passes versus copying the 100KB model to SRAM once?"
details:
  realistic_solution: Direct execution from Flash requires reading the weights for every pass. At 2 cycles per word, reading 100KB (25,000 32-bit words) takes 50,000 cycles per pass. Copying to SRAM takes 50,000 cycles upfront. Once in SRAM, reading takes 1 cycle per word (25,000 cycles). By the 5th pass, the upfront copy strategy massively outperforms direct execution because the slow Flash access penalty is avoided in the inner loops.
  common_mistake: |
    **The Pitfall:** Incorrectly treating bytes as the unit of memory cycles instead of 32-bit words.
    **The Rationale:** Candidates fail to account for the fact that a 100KB model is actually 25,000 32-bit words.
    **The Consequence:** They calculate cycle times that are 4x higher than reality, leading to incorrect performance estimations.
  napkin_math: |
    1. Convert 100KB to 32-bit words: 100,000 bytes / 4 bytes/word = 25,000 words.
    2. Calculate Flash direct execution (5 passes): 5 passes * 25,000 words * 2 cycles/word = 250,000 cycles.
    3. Calculate SRAM upfront copy: 25,000 words * 2 cycles/word = 50,000 cycles.
    4. Calculate SRAM execution (5 passes): 5 passes * 25,000 words * 1 cycle/word = 125,000 cycles.
    5. Calculate total SRAM strategy: 50,000 + 125,000 = 175,000 cycles.
    6. Calculate difference: 250,000 - 175,000 = 75,000 cycles.
    7. **Final Result: Copying to SRAM saves 75,000 cycles.**
