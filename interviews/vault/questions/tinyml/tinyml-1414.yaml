title: Ethos-U55 Scheduling for Memory and Parallelism
scenario: Given a neural network inference workload designed for an Arm Cortex-M7
  processor paired with an Arm Ethos-U55 NPU (Cortex-M7 at 480 MHz, 512 KB SRAM, Ethos-U55
  with 128-512 MAC/cycle), describe how execution order optimization techniques such
  as memory reuse, parallel operator execution, and layer fusion scheduling would
  be applied to minimize memory footprint and latency. Focus on the specific challenges
  and opportunities presented by the Ethos-U55's microarchitecture and its interaction
  with the Cortex-M7.
question: How should Ethos-U55 operator scheduling use memory reuse, parallelism,
  and layer fusion to reduce SRAM footprint and latency?
details:
  realistic_solution: Implement a graph-based scheduler that considers operator dependencies,
    memory access patterns, and the Ethos-U55's tensor capabilities. Prioritize memory-constrained
    layers for fusion to reduce peak memory usage, and use techniques like double-buffering
    or ping-pong buffering for parallel execution to maximize NPU utilization while
    minimizing SRAM transfers. Leverage Arm's CMSIS-NN and Ethos-U drivers for optimized
    primitives and scheduling hints.
  common_mistake: Ignoring data dependencies or memory alignment constraints when
    scheduling, leading to inefficient memory access patterns or stalls. Not fully
    exploiting the Ethos-U55's parallel MAC units by misaligning layer fusion or data
    partitioning, thereby failing to leverage the NPU's potential throughput.
  napkin_math: 'Calculate potential memory savings from layer fusion: (input_tensor_size
    + output_tensor_size) vs. (max(input_tensor_size, output_tensor_size)). Estimate
    NPU utilization increase by parallelizing operations and reducing CPU-NPU communication
    overhead. For example, if a model requires 300KB of intermediate activations and
    total SRAM is 512KB, memory reuse through operator scheduling is critical. If
    the Ethos-U55 provides 256 MACs/cycle, scheduling directly impacts whether this
    can be sustained across multiple operations to achieve the desired throughput.'
