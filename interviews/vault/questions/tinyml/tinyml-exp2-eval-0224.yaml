title: Evaluating 4-bit vs INT8 on ESP32-S3
scenario: You are deploying a 3 million parameter anomaly detection model on an ESP32-S3 for industrial
  vibration monitoring. The ESP32-S3 features a 240 MHz dual-core Xtensa processor, 512 KB of internal
  SRAM, 8 MB of PSRAM, and vector extensions specifically optimized for INT8 operations. You must choose
  between standard INT8 quantization or an extreme 4-bit weight-only quantization (like AWQ) to reduce
  the memory footprint in PSRAM. Evaluate these two alternatives for latency and power, and determine
  which approach is superior for this specific architecture.
question: "How would you evaluate these two alternatives for latency and power, and determine which approach is superior for this specific architecture?"
details:
  realistic_solution: The best approach is to evaluate if the workload is memory-bandwidth bound or compute
    bound. Because PSRAM access is slow, 4-bit weights drastically reduce fetch time. However, to utilize
    the ESP32-S3's INT8 vector extensions, the 4-bit weights must be unpacked on the fly. The optimal
    system design pipelines the DMA fetch from PSRAM with an optimized bit-shifting unpacking routine
    on one core, while the other core performs the INT8 MAC operations, yielding a net latency improvement
    over standard INT8.
  common_mistake: Candidates often blindly choose 4-bit quantization assuming smaller memory footprint
    automatically translates to lower latency in TinyML. They fail to account for the ESP32-S3 lacking
    native 4-bit MAC instructions, ignoring the severe CPU cycle overhead required to unpack 4-bit weights
    into 8-bit registers before execution.
  napkin_math: 'INT8 footprint = 3MB. 4-bit footprint = 1.5MB. Assuming PSRAM bandwidth of ~40 MB/s: INT8
    fetch takes 3MB / 40MB/s = 75ms. 4-bit fetch takes 1.5MB / 40MB/s = 37.5ms (saving 37.5ms). Unpacking
    1.5M bytes (3M 4-bit weights) takes roughly 2 operations (shift/mask) per weight. 3M weights * 2 cycles
    = 6M cycles. At 240 MHz, unpacking takes 6,000,000 / 240,000,000 = 25ms. Net latency delta: 37.5ms
    saved in IO - 25ms spent in compute = 12.5ms overall speedup using 4-bit, provided compute and memory
    fetch are not perfectly overlapped.'
