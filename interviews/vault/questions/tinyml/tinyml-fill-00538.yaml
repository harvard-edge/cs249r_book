title: Sub-4-bit Quantization on Cortex-M7 + Ethos-U55 for TinyML
scenario: You are tasked with deploying a convolutional neural network (CNN) for keyword spotting on a
  resource-constrained Cortex-M7 microcontroller (480 MHz, 512 KB SRAM) paired with an Ethos-U55 microNPU
  (up to 512 MAC/cycle). Your model, originally 8-bit quantized, exceeds the available SRAM by 2x and
  still exhibits latency issues due to memory bandwidth. To meet the tight memory and real-time inference
  constraints, you decide to explore sub-4-bit quantization (e.g., 2-bit or 3-bit). Describe the challenges
  and your approach to successfully deploy this aggressively quantized model.
question: "How should you deploy a sub-4-bit keyword-spotting CNN on Cortex-M7 plus Ethos-U55 when an INT8 model exceeds SRAM?"
details:
  realistic_solution: 'The solution involves a multi-pronged approach: first, carefully selecting a sub-4-bit
    quantization scheme (e.g., 2-bit weight-only, 3-bit mixed precision). Second, utilizing advanced quantization
    techniques like GPTQ or AWQ for post-training quantization, or implementing full quantization-aware
    training (QAT) if accuracy is still an issue. Evaluate the Ethos-U55''s specific support for these
    low-bit operations and ensure the inference engine (e.g., TFLite Micro) is optimized for the selected
    bit-width. Implement accuracy recovery techniques such as knowledge distillation or fine-tuning with
    a quantized student model. Crucially, profile memory usage and inference latency iteratively on the
    target hardware to identify bottlenecks.'
  common_mistake: A common mistake is aggressively quantizing to sub-4-bit without sufficient calibration
    data or proper quantization-aware training (QAT) techniques, leading to severe accuracy degradation.
    Another pitfall is neglecting the impact of data type support and efficient kernel implementations
    on the Ethos-U55, assuming general-purpose CPU advantages will translate directly.
  napkin_math: If an 8-bit model uses 1MB of weights, quantizing to 2-bit would theoretically reduce memory
    footprint by 4x. So, 1MB / 4 = 250KB. This would fit within the 512KB SRAM. However, this calculation
    ignores activation memory, intermediate buffers, and code size. Given the 480 MHz clock and 128-512
    MAC/cycle NPU, a model with 10M MACs would take 10M / 128 MAC/cycle / 480MHz = ~0.16ms to 10M / 512
    MAC/cycle / 480MHz = ~0.04ms for just the MAC operations, assuming ideal NPU utilization. Actual latency
    will be higher due to memory access, data movement, and non-NPU operations.
