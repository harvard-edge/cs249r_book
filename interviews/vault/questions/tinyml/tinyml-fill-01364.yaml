title: Functional Safety for TinyML on Resource-Constrained Automotive ECUs
scenario: You are tasked with deploying a safety-critical TinyML model for predictive maintenance in an
  automotive system, specifically monitoring brake pad wear. The target platform is an ARM Cortex-M4 STM32F4
  microcontroller (168 MHz clock speed, 256 KB SRAM, no FPU). The system must adhere to ISO 26262 ASIL-B
  requirements. The ML model, once trained, needs to be integrated and its inference results used to trigger
  safety warnings. Describe your approach to ensure functional safety, addressing deterministic execution,
  fault detection, and robustness within the hardware constraints.
question: "How should you ensure ISO 26262 ASIL-B functional safety for a Cortex-M4 brake-wear TinyML model?"
details:
  realistic_solution: 'The solution requires a multi-faceted approach: 1. **Model Optimization:** Quantize
    the ML model (e.g., 8-bit integer quantization) to fit within 256 KB SRAM and leverage integer arithmetic
    given the lack of FPU, ensuring deterministic inference. 2. **Deterministic Execution:** Implement
    fixed-point arithmetic for all ML operations. Disable interrupts during critical inference sections
    or utilize a real-time operating system (RTOS) with strict priority and timing guarantees. Use memory
    protection unit (MPU) to prevent unintended memory access. 3. **Fault Detection:** Implement a combination
    of software and hardware watchdogs (internal and external) with diverse timeout mechanisms. Incorporate
    software self-test routines for the ML model (e.g., periodic sanity checks on model weights, range/plausibility
    checks on inference outputs, input sensor validation). Implement cyclic redundancy checks (CRCs) for
    critical code sections and data. 4. **Redundancy/Diversity:** Consider redundant sensor inputs or
    a simpler ''shadow'' model for cross-checking in case of primary model failure. 5. **Traceability
    & Verification:** Maintain rigorous documentation throughout the development lifecycle to demonstrate
    compliance with ISO 26262 ASIL-B, including detailed verification and validation plans for the ML
    component''s safety aspects.'
  common_mistake: A common mistake is to directly port a floating-point trained model and assume standard
    software error handling is sufficient. This often leads to non-deterministic inference due to floating-point
    representation differences or compiler optimizations, memory overflows on the limited SRAM, or inadequate
    fault detection mechanisms that fail to meet ASIL-B requirements. Overlooking the need for dedicated
    hardware safety features (like external watchdogs or MPU configurations) or failing to implement comprehensive
    software self-test routines for both the ML model and the system state is also frequent.
  napkin_math: Given 256 KB SRAM on the STM32F4, a typical 8-bit quantized TinyML model might consume
    50-150 KB for weights and activations. This leaves ~100 KB for OS, stack, heap, and other application
    code. For deterministic execution at 168 MHz without FPU, an 8-bit integer MAC (Multiply-Accumulate)
    operation might take 2-4 cycles. A model with 100,000 MACs would therefore require 200,000-400,000
    cycles, or approximately 1.2-2.4 ms for a single inference, well within typical automotive cycle times.
    A watchdog timer, for ASIL-B, might need to be reset every 10-100 ms to detect malfunctions promptly.
