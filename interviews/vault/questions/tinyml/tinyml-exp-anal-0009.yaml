title: Battery Drain During Federated Averaging
scenario: You are deploying a federated learning workload to a fleet of Nordic nRF5340 wearables (128
  MHz app core, 64 MHz net core, 256 KB SRAM, 1 MB flash, BLE 5.3). During a federated averaging round,
  a device must download a 100 KB model, perform local training, and upload a 100 KB gradient payload.
  You observe that the devices are dropping out due to excessive battery drain. The system expects a 5-second
  active window per round at ~5mA, but monitoring shows the device remains in the active 5mA state for
  over 16 seconds. Apply your knowledge of communication efficiency to explain why this time extension
  and corresponding energy drain occurs.
details:
  realistic_solution: The extended active time is caused by the BLE 5.3 connection falling back to a lower
    data rate PHY (like Coded PHY for long-range) due to poor signal quality or non-IID device placement.
    While standard 2M PHY can transfer the payload quickly, the lower throughput of Coded PHY drastically
    increases the time the 64 MHz net core radio must remain active to transmit and receive the 200 KB
    total payload, multiplying the energy consumed at the ~5mA active rate.
  common_mistake: Candidates often assume the 128 MHz app core is too slow for the local training epochs
    or that the 256 KB SRAM is swapping to flash, causing processing delays, rather than analyzing the
    communication overhead.
  napkin_math: 'Total payload: 100 KB (down) + 100 KB (up) = 200 KB. On standard BLE 2M PHY (~1.4 Mbps
    realistic), transfer time is (200 × 1000 × 8) / 1,400,000 = ~1.14 seconds. Assuming 3 seconds for
    local training, total time is ~4.14 seconds. If the device falls back to BLE Coded PHY S=8 (~125 kbps
    realistic), the transfer time becomes (200 × 1000 × 8) / 125,000 = ~12.8 seconds. Total active time
    = 12.8s (comm) + 3s (compute) = 15.8 seconds. Energy consumed increases from ~20.7 mAs (4.14s × 5mA)
    to ~79 mAs (15.8s × 5mA).'
