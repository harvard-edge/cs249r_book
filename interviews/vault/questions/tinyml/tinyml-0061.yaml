title: Inference Result Compression for Upload
scenario: Your fleet of 1,000 wildlife acoustic monitors runs a bird species classifier on an RP2040 (Cortex-M0+, 133 MHz, 264 KB SRAM, 2 MB flash). Each device classifies 10-second audio clips and detects up to 50 species. The devices upload results daily via cellular (LTE-M Cat-M1, billed at $0.50/MB). You're currently sending raw JSON results and the cellular bill is $13,000/month.
question: How would you compress daily RP2040 bird-classifier uploads to cut a 1,000-device cellular bill from about $13,000/month?
details:
  realistic_solution: 'The problem is the data format, not the compression algorithm. Replace JSON with a compact binary protocol:'
  common_mistake: |
    **The Pitfall:** Suggesting standard compression like "Use gzip on the JSON."
    **The Rationale:** Candidates reach for standard IT solutions without considering the hardware context.
    **The Consequence:** Gzip on a Cortex-M0+ is extremely slow because it lacks a barrel shifter, draining battery, and JSON is fundamentally the wrong format for constrained uploads.
  napkin_math: |
    1. **Raw JSON Baseline:** ~200 B/clip × 4,320 clips/day (one per 20s) = 864 KB/day per device.
    2. **Fleet Monthly (Raw):** 864 KB × 1,000 devices × 30 days = 25.9 GB. Cost: 25,920 MB × $0.50 = **$12,960/month**.
    3. **Top-3 Binary Encoding:** 6 B/clip × 4,320 = 25.9 KB/day per device. Cost: **$388/month** (33× reduction).
    4. **Hourly Aggregation (Histogram):** 24 hours × 50 species bytes = ~1.2 KB/day per device.
    5. **Fleet Monthly (Hourly):** 1.2 KB × 1,000 × 30 = 36 MB. Cost: **$18/month** (720× reduction).
    6. **Conclusion:** Replacing JSON with hourly histogram aggregation slashes the bill to almost nothing, saving over $150k annually.
