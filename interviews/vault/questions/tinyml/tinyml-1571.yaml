title: Solar Cortex-M4 EEPROM Checkpoints
scenario: A solar-powered Cortex-M4 loses power randomly. To recover, it writes a 1KB state vector to local EEPROM (which takes 1ms to write) exactly once every minute. The EEPROM write draws 10mA at 3.3V.
question: What is the total energy cost in millijoules (mJ) dedicated strictly to checkpointing per hour?
visual:
  kind: svg
  path: tinyml-1571.svg
  alt: A power consumption timeline showing small 33mW energy spikes periodically spaced at 60-second intervals.
  caption: Checkpoint Energy Spikes
details:
  realistic_solution: Writing takes 1ms per minute, so there are 60 writes per hour, equating to 60ms (0.06 seconds) of write time per hour. Power during writing is P = V * I = 3.3V * 0.010A = 0.033 Watts (33 mW). Total energy E = P * t = 33 mW * 0.06 s = 1.98 mJ per hour.
  common_mistake: |
    **The Pitfall:** Calculating power as V+I or incorrectly estimating joules instead of millijoules.
    **The Rationale:** Candidates often misconvert milliamperes or misunderstand the basic power formula (P = V * I).
    **The Consequence:** The energy budget is severely miscalculated, leading to a flawed system design that may fail under constraint.
  napkin_math: |
    - Write time = 1ms per minute.
    - Writes per hour = 60.
    - Total write time per hour = 60 * 0.001s = 0.06s.
    - Power (P) = V * I = 3.3V * 0.010A = 0.033 Watts (33 mW).
    - **Final Result:** Total energy (E) = P * t = 33 mW * 0.06s = **1.98 mJ per hour**.
