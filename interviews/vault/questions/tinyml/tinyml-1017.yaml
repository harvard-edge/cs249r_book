title: Evaluating Adversarial Defenses on ESP32-S3 Smart Locks
scenario: 'You are designing the voice authentication system for a smart door lock
  running on an ESP32-S3 (240 MHz dual-core Xtensa, 512 KB SRAM, 8 MB PSRAM). The
  marketing team requires defense against adversarial audio attacks, such as ultrasonic
  playback or slight perturbations, over the air. You have three proposed defense
  alternatives: applying input transformations like random resizing to the spectrogram,
  utilizing adversarial training with projected gradient descent (PGD), or implementing
  a secondary lightweight anomaly detection model. Evaluate these alternatives and
  determine the best approach given the hardware constraints.'
question: How would you evaluate these alternatives and determine the best approach
  given the hardware constraints?
details:
  realistic_solution: The best approach is utilizing lightweight deterministic input
    transformations, such as hardware-accelerated audio bandpass filtering to block
    ultrasonic attacks, combined with a slightly larger adversarially trained model.
    Since the ESP32-S3 features vector extensions for INT8, we can aggressively quantize
    this model to keep it within the 512 KB SRAM, avoiding the significant latency
    and power draw penalties of using the 8 MB PSRAM for a secondary anomaly model.
  common_mistake: Candidates often immediately suggest an ensemble of anomaly detectors
    or heavy input transformations without considering the strict 512 KB SRAM and
    latency limitations. They may also suggest complex adversarial training like PGD
    without realizing that it drastically increases the required model capacity to
    maintain accuracy on clean data, which cannot easily fit in SRAM.
  napkin_math: Assume a base voice model requires 250 KB in INT8. Adversarial training
    (PGD) typically requires 2x-4x model capacity to maintain clean accuracy, needing
    ~750 KB, which exceeds the 512 KB SRAM and forces slow PSRAM execution (access
    is ~4x slower). Instead, a basic bandpass IIR filter takes negligible SRAM (<
    5 KB) and runs in ~1-2 ms on the 240 MHz core. A lightly adversarially trained
    model requires ~350 KB in INT8. Therefore, 350 KB (model) + 50 KB (buffers) +
    5 KB (filter) = 405 KB, fitting safely into the 512 KB SRAM.
