title: Evaluating Adversarial Defenses on ESP32-S3 Smart Locks
scenario: You are designing the voice authentication system for a smart door lock running on an ESP32-S3 (240 MHz dual-core Xtensa, 512 KB SRAM, 8 MB PSRAM). You must defend against adversarial audio attacks. The three proposed alternatives are input transformations, adversarial training with PGD, or a secondary lightweight anomaly detection model.
question: "How would you evaluate these alternatives and determine the best approach given the hardware constraints?"
details:
  realistic_solution: The best approach is utilizing lightweight deterministic input transformations, such as hardware-accelerated audio bandpass filtering to block ultrasonic attacks, combined with a slightly larger adversarially trained model. Since the ESP32-S3 features vector extensions for INT8, we can aggressively quantize this model to keep it within the 512 KB SRAM, avoiding the significant latency and power draw penalties of using the 8 MB PSRAM for a secondary anomaly model.
  common_mistake: |
    **The Pitfall:** Suggesting complex adversarial training like PGD or an ensemble of anomaly detectors.
    **The Rationale:** Candidates do not realize that these defenses drastically increase the required model capacity.
    **The Consequence:** The model exceeds the 512 KB SRAM, forcing slow PSRAM execution and violating latency constraints.
  napkin_math: |
    1. Assume base voice model requires 250 KB in INT8.
    2. Evaluate PGD Adversarial Training: Requires 2x-4x capacity (~750 KB), exceeding 512 KB SRAM.
    3. Evaluate hardware-accelerated bandpass IIR filter: Requires < 5 KB SRAM and 1-2 ms latency.
    4. Calculate total memory for lightweight defense: 350 KB (lightly trained model) + 50 KB (buffers) + 5 KB (filter) = 405 KB.
    5. **Final Result: Bandpass filter + light adversarial training uses 405 KB, safely fitting the 512 KB SRAM limit.**
