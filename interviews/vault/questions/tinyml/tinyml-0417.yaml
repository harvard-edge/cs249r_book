title: Interrupt Overhead Impact on Inference
scenario: 'Your TinyML device runs a keyword spotting model (18ms inference) while simultaneously handling: a UART interrupt (fires every 87 µs, 2 µs overhead), a SysTick interrupt (every 1ms, 5 µs overhead), and a DMA interrupt (every 64ms, 10 µs overhead).'
question: How would you calculate the total interrupt overhead during one 18ms inference and determine if it affects the 33ms deadline?
details:
  realistic_solution: 'Total interrupt overhead during 18ms inference: SysTick = 18 fires * 5us = 90us, UART = ~206 fires * 2us = 412us, DMA = 0-1 fires * 10us ~ 6us average. Total: ~508us = 2.8% of inference time. The 33ms deadline is safe with ~14ms of headroom. The real danger is not the ISR execution time but the pipeline flush and register save/restore on each interrupt entry.'
  common_mistake: |
    **The Pitfall:** Assuming interrupts are fast enough to ignore entirely.
    **The Rationale:** Candidates forget that interrupts cause pipeline flushes and context save/restore overhead.
    **The Consequence:** Underestimating worst-case execution time, leading to unpredictable missed real-time deadlines under high I/O load.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Inference Time: 18ms. Deadline: 33ms.
       - UART: fires every 87µs (2µs overhead).
       - SysTick: fires every 1ms (5µs overhead).
       - DMA: fires every 64ms (10µs overhead).
    2. **Calculations:**
       - UART fires in 18ms = 18ms / 0.087ms = 206 fires. Overhead = 206 * 2µs = 412 µs.
       - SysTick fires in 18ms = 18 fires. Overhead = 18 * 5µs = 90 µs.
       - DMA fires in 18ms = 18 / 64 = ~0.28 fires. Average overhead ~ 3 µs.
       - Total Overhead = 412 + 90 + 3 = 505 µs (~0.5ms).
    3. **Conclusion & Interpretation:**
       - **Result: 18.5ms total latency safely meets the 33ms deadline.**
