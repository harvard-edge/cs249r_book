title: Interrupt Overhead Impact on Inference
scenario: Your TinyML device on a Cortex-M4F (168 MHz) runs a keyword spotting model (18ms inference) while simultaneously handling: a UART interrupt (fires every 87 µs, 2 µs overhead), a SysTick interrupt (every 1ms, 5 µs overhead), and a DMA interrupt (every 64ms, 10 µs overhead).
question: How would you calculate the total interrupt overhead during one 18ms inference and determine if it affects the 33ms deadline?
details:
  realistic_solution: 'Total interrupt overhead during 18ms inference: SysTick = 18 fires * 5us = 90us, UART = ~1 byte * 2us = 2us, DMA = 0-1 fires * 10us ~ 6us average. Total: ~98us = 0.54% of inference time. The 33ms deadline is safe with 15ms of headroom. SysTick dominates at 92% of interrupt overhead. However, the real danger is not the ISR execution time but the pipeline flush and register save/restore on each interrupt entry (12 cycles each way on M4F). At 1,050 interrupts/s * ~5us average, the system stays safely under the 1% CPU rule of thumb.'
  common_mistake: |
    **The Pitfall:** Assuming interrupts are fast enough to ignore entirely.
    **The Rationale:** Candidates forget that interrupts cause pipeline flushes and context save/restore overhead (12 cycles each way on M4F).
    **The Consequence:** Underestimating worst-case execution time, leading to unpredictable missed real-time deadlines under high I/O load.
  napkin_math: |
    - SysTick overhead: 18 fires * 5 µs = 90 µs.
    - UART overhead: ~1 byte * 2 µs = 2 µs.
    - DMA overhead: 0-1 fires * 10 µs ≈ 6 µs average.
    - Total overhead: ~98 µs = 0.54% of 18ms inference time.
    - Context switch overhead: 1,050 interrupts/sec * 5µs = 5,250 µs/s (~0.53% CPU).
    - **Result:** The 33ms deadline is safely met with **~15ms headroom**.
