title: SRAM Constraint Calculation for Ethos-U55 CNN Deployment
scenario: You are deploying an INT8 quantized CNN on a Corstone-300 subsystem featuring an ARM Cortex-M7 running at 480 MHz and an Ethos-U55 NPU. The system has 512 KB of SRAM that is shared between the M7 and the NPU. The RTOS and application logic require a fixed 100 KB footprint, and the network's peak activation buffer during inference is 150 KB.
question: How would you calculate the maximum number of model parameters you can support if the entire model must reside in SRAM to meet latency targets?
details:
  realistic_solution: The correct approach involves a simple memory budget equation. You must subtract the RTOS/app overhead and the peak activation memory from the total available SRAM. The remaining memory represents the absolute maximum space for model weights, which directly translates to the parameter count since the model is quantized to INT8.
  common_mistake: |
    **The Pitfall:** Forgetting the shared nature of the SRAM and the footprint of dynamic activations.
    **The Rationale:** Candidates often assume all 512 KB can be allocated strictly to model weights.
    **The Consequence:** Designing a model that physically cannot execute because allocating the im2col buffers or the RTOS stack will instantly trigger an out-of-memory error.
  napkin_math: |
    1. **Total SRAM:** 512 KB.
    2. **Overhead & Activations:** 100 KB (RTOS/App) + 150 KB (Peak Activation) = 250 KB.
    3. **Remaining for Weights:** 512 KB - 250 KB = 262 KB.
    4. **Quantization Ratio:** INT8 quantization maps 1 parameter to 1 byte.
    5. **Max Parameters:** 262 KB * 1024 bytes/KB = 268,288 bytes.
    6. **Result:** The maximum model size is **268,288 parameters**.
