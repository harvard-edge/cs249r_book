title: Active Learning Data Buffer Sizing
scenario: You are designing an active learning data curation pipeline for a predictive maintenance sensor
  powered by a Nordic nRF5340. To gather a high-quality dataset of rare anomalies, the device saves high-uncertainty
  raw accelerometer windows to flash memory for later human annotation, transmitting them in batches over
  BLE 5.3. The accelerometer samples 3 axes at 100 Hz, 16-bit resolution, and each anomaly window is 4
  seconds long. The nRF5340 has 1 MB of flash, but the app core firmware, 64 MHz net core BLE stack, and
  ML model consume 700 KB. If you reserve 100 KB for wear-leveling and system data, how many anomaly windows
  can you buffer for the annotation dataset before a BLE sync is forced?
details:
  realistic_solution: The correct approach is to first determine the exact byte size of a single data
    window by multiplying the sampling rate, number of axes, bit depth in bytes, and duration. Then, calculate
    the available non-volatile flash memory by subtracting the firmware size and reserved space from the
    total flash capacity. Finally, divide the available memory by the window size to find the maximum
    number of bufferable samples for the annotation pipeline.
  common_mistake: Candidates often forget to account for all 3 axes of the accelerometer or the 2-byte
    size of 16-bit resolution. They might also mistakenly use the 256 KB SRAM spec instead of flash for
    long-term storage, or fail to accurately subtract the firmware and reserved space from the 1 MB total.
  napkin_math: '1 MB total flash = 1024 KB. Available flash = 1024 KB - 700 KB (firmware/model) - 100
    KB (reserved) = 224 KB. In bytes: 224 KB * 1024 = 229,376 bytes. Sensor data rate = 100 Hz * 3 axes
    * 2 bytes (16-bit) = 600 bytes/second. Window size = 600 bytes/second * 4 seconds = 2400 bytes. Buffer
    capacity = 229,376 bytes / 2400 bytes/window = 95.57. Therefore, you can buffer exactly 95 raw anomaly
    windows before syncing.'
