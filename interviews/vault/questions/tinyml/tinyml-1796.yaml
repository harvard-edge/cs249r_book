title: Cortex-M4 SPI-Compute Overlap
scenario: A Cortex-M4 (100 MHz) streaming anomaly results over BLE currently blocks
  CPU execution. The SPI transfer takes 5ms, and the subsequent inference takes 15ms
  sequentially.
question: Determine the percentage reduction in per-inference latency if DMA is configured
  to completely overlap the BLE transmission with the next inference computation.
details:
  realistic_solution: Without Direct Memory Access (DMA), the CPU waits 5ms for the
    SPI transfer to finish before beginning the 15ms inference, yielding a total pipeline
    latency of 20ms per frame. By offloading the SPI transfer to DMA, the CPU can
    immediately begin the 15ms inference for frame N+1 while frame N transmits. Since
    15ms > 5ms, the transmission is completely hidden, making the effective pipeline
    latency 15ms.
  common_mistake: Adding the overlapped times or assuming DMA eliminates the inference
    time, rather than correctly identifying the new bottleneck is simply max(compute,
    transmit).
  napkin_math: Old latency = 15ms + 5ms = 20ms. New latency = max(15ms, 5ms) = 15ms.
    Reduction = 5ms / 20ms = 25%.
