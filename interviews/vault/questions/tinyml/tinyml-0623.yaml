title: The OTA Wear-Out Catastrophe
scenario: You're leading the firmware update process for a fleet of 100,000 automotive MCUs. To save on costly cellular data, you deploy a binary patching system for Over-the-Air (OTA) updates. Instead of sending a full 450KB firmware image, you send a ~50KB patch. The device applies the patch to the old firmware in SRAM and writes the new image back. To guard against power loss during the write, the system checkpoints its progress by writing the index of the last successful 16KB block to a dedicated 'progress sector' in flash. A few years after deployment, a routine OTA update bricks several thousand devices, requiring physical replacement. A recovered device shows stable power during the update, but its firmware checksum is invalid post-reboot.
question: How would you assess this OTA design and predict the specific, time-delayed physical failure mode that caused this mass-bricking event?
details:
  realistic_solution: 'The root cause is flash memory wear-out on the ''progress sector''. Flash memory has a finite number of erase/write cycles, typically 10,000-100,000. The OTA design repeatedly erases and writes to the exact same physical memory sector to store the update progress. While any single update only writes to it a few dozen times, these cycles accumulate over every update the device has ever received. After several years, the progress sectors on the oldest devices in the fleet begin to fail. The catastrophic failure happens when the progress sector fails during a write. For instance, the system successfully writes 20 of 29 blocks, but when it tries to write ''20'' to the progress sector, the write fails due to wear-out. On the next reboot, the bootloader reads a stale value (e.g., ''19''), assumes the update was interrupted, and tries to apply the patch starting from block 20 onto a firmware image that is already partially patched. This corrupts the binary irrecoverably. The mechanism designed for robustness became a single point of failure and a ticking time bomb that guarantees eventual device failure.'
  common_mistake: |
    **The Pitfall:** Blaming the patch logic or transmission errors.
    **The Rationale:** Engineers might suspect the binary patch was created incorrectly or corrupted during download.
    **The Consequence:** This fails to explain why it affected thousands of older devices simultaneously and why it hadn't happened before, leading to a misdiagnosis of a physical hardware wear-out issue.
  napkin_math: |
    - Calculate the number of blocks: 450 KB / 16 KB = 28.125, which rounds up to 29 blocks.
    - Calculate progress writes per update: 29 writes.
    - Calculate accumulated writes over a 5-year lifetime (assuming ~4 updates/month): 240 updates × 29 writes/update = 6,960 cycles.
    - Calculate wear percentage at 10,000 cycle endurance: 6,960 / 10,000 = **~70% worn at 5 years.**
    - **Conclusion:** The progress sector experiences concentrated wear and will inevitably fail, causing a stale checkpoint, misapplied patches on reboot, and permanent corruption.
