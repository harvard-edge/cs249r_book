title: The Model Compression for Flash
scenario: Your trained person detection model is 1.2 MB (FP32 weights), but your target STM32L4 has only
  1 MB flash — and 200 KB is consumed by the firmware, bootloader, and TFLite Micro runtime. You have
  800 KB for the model. Walk me through your compression options with size estimates for each.
details:
  realistic_solution: 'Start from the 1.2 MB FP32 model. Decompose: ~1.15 MB weights (FP32, ~288K parameters
    × 4 bytes) + ~50 KB metadata/structure.'
  common_mistake: '"Just quantize to INT8 — that''s 4× smaller, so 1.2 MB becomes 300 KB." The 4× ratio
    is correct for weights, but this ignores the model file overhead (metadata, operator tables, tensor
    descriptors) which doesn''t shrink with quantization.'
  napkin_math: 'FP32: 1.2 MB → doesn''t fit (800 KB budget). INT8: 340 KB → fits, 1-3% accuracy loss.
    INT4: 194 KB → fits, 3-8% loss, no SIMD kernels. Pruned 50% + INT8: 194 KB → fits, 2-5% loss with
    fine-tuning, full SIMD support. Distilled + INT8: 112 KB → fits, 2-4% loss, requires retraining. Flash
    utilization: 340/800 = 42.5% (INT8) — leaves 460 KB for OTA update staging, data logging, or a second
    model.'
