title: The Model Compression for Flash
scenario: Your trained person detection model is 1.2 MB (FP32 weights), but your target MCU has only 1 MB flash, and 200 KB is consumed by firmware and runtime. You have an 800 KB budget for the model.
question: "Which compression options can reduce the 1.2 MB FP32 person detector to fit within the 800 KB Flash budget?"
details:
  realistic_solution: 'Start from the 1.2 MB FP32 model. Decompose: ~1.15 MB weights (FP32, ~288K parameters x 4 bytes) + ~50 KB metadata/structure.'
  common_mistake: |
    **The Pitfall:** Assuming quantizing to INT8 makes the entire 1.2 MB model exactly 4x smaller (300 KB).
    **The Rationale:** Candidates correctly apply the 4x ratio to weights but ignore the model file overhead (metadata, operator tables, tensor descriptors).
    **The Consequence:** They underestimate the final model size, which doesn't shrink proportionally with quantization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Flash model budget: 800 KB.
       - Original FP32 model: 1.2 MB (1.15 MB weights, 50 KB metadata).
    2. **Calculations:**
       - INT8 size: (1.15 MB / 4) + 50 KB = 287.5 KB + 50 KB ≈ 338 KB.
       - INT4 size: (1.15 MB / 8) + 50 KB = 143.75 KB + 50 KB ≈ 194 KB.
       - Pruned 50% INT8 size: ((1.15 MB * 0.5) / 4) + 50 KB = 143.75 KB + 50 KB ≈ 194 KB.
    3. **Conclusion & Interpretation:**
       - **Result: 338 KB (INT8). Memory-Bound.** INT8 quantization easily fits the model within the 800 KB budget, proving that model file overhead does not shrink proportionally with weight compression.
