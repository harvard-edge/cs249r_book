title: The Model Compression for Flash
scenario: Your trained person detection model is 1.2 MB (FP32 weights), but your target STM32L4 has only 1 MB flash, and 200 KB is consumed by firmware and runtime. You have an 800 KB budget for the model.
question: "Which compression options can reduce the 1.2 MB FP32 person detector to fit within the 800 KB Flash budget?"
details:
  realistic_solution: Start from the 1.2 MB FP32 model. Decompose: ~1.15 MB weights (FP32, ~288K parameters x 4 bytes) + ~50 KB metadata/structure.
  common_mistake: |
    **The Pitfall:** Assuming quantizing to INT8 makes the entire 1.2 MB model exactly 4x smaller (300 KB).
    **The Rationale:** Candidates correctly apply the 4x ratio to weights but ignore the model file overhead (metadata, operator tables, tensor descriptors).
    **The Consequence:** They underestimate the final model size, which doesn't shrink proportionally with quantization.
  napkin_math: |
    1. Identify budget: 800 KB Flash available.
    2. Evaluate FP32: 1.2 MB (Does not fit).
    3. Evaluate INT8: ~1.15 MB weights / 4 + 50 KB metadata = 288 KB + 50 KB = ~338 KB (Fits, 42.5% utilization).
    4. Evaluate INT4: ~1.15 MB weights / 8 + 50 KB metadata = 144 KB + 50 KB = ~194 KB (Fits, no SIMD support).
    5. Evaluate Pruned 50% + INT8: 288 KB * 0.5 + 50 KB = ~194 KB (Fits, full SIMD support).
    6. **Final Result: INT8 (338 KB), INT4 (194 KB), or Pruned+INT8 (194 KB) all successfully fit within the 800 KB budget.**
