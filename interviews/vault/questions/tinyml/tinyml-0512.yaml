title: The On-Chip Traffic Jam
scenario: You are the senior engineer on a TinyML team. A junior engineer is debugging a keyword spotting model on a new microcontroller (MCU) prototype. The MCU features a Cortex-M7 core and a small, custom NPU connected by a 32-bit wide AHB bus running at 100MHz. The engineer observes that transferring a 32KB audio sample from the main SRAM to the NPU's local memory is creating a significant pipeline bubble, stalling the NPU. They tell you, 'This is just like a PCIe data starvation issue in the cloud! The bus is the bottleneck. We should have used a higher-bandwidth interconnect like NVLink.'
question: Why is the AHB bus unlikely to be the true bottleneck for the 32 KB transfer to the NPU?
details:
  realistic_solution: The colleague's analogy is flawed because the physics of on-chip communication are vastly different from chip-to-chip or server-to-server interconnects. The on-chip AHB bus has ample bandwidth for this workload. The true bottleneck is almost certainly in software or protocol overhead, not the physical bus speed.
  common_mistake: |
    **The Pitfall:** Pattern-matching data starvation issues from cloud deployments (like PCIe bottlenecks) directly to microcontrollers.
    **The Rationale:** Engineers assume that a pipeline stall transferring data to an accelerator must be a hardware bandwidth limit, ignoring the scale differences.
    **The Consequence:** Hardware redesigns are proposed to widen the bus, wasting time and silicon area when the issue is just software polling overhead.
  napkin_math: |
    - **AHB Bandwidth**: 32 bits × 100 MHz = 400 MB/s.
    - **Transfer Time**: 32 KB / 400 MB/s = 82 µs.
    - **NPU Inference Time**: ~5 ms (500K MACs @ 100 MHz).
    - **Transfer Overhead**: 82 µs / 5 ms = **1.6% of pipeline**. The bus is NOT the bottleneck.
  options:
  - The analogy is correct and the bus is saturated. The chip should be redesigned with a wider 64-bit bus to double the bandwidth.
  - The analogy is flawed because NVLink is for GPUs. The real issue is the AHB protocol's high overhead, and switching to an AXI bus would solve the problem.
  - The bus has ample bandwidth (~400 MB/s for a 32 KB transfer). The bottleneck is almost certainly software overhead, likely a CPU-bound `memcpy` instead of a hardware DMA transfer.
  - The problem isn't bandwidth, it's latency. The physical distance on the silicon is creating a speed-of-light delay, like a cross-rack InfiniBand link.
  correct_index: 2
