title: The UART Buffer Overrun
scenario: Your MCU streams ML predictions (100 bytes of JSON) to an external cellular modem via UART at 115200 baud. It works perfectly in the lab. In the field, the cellular modem sometimes loses its network connection and takes a few seconds to reconnect. During this time, the MCU keeps sending data. When the modem reconnects, the first few JSON strings are completely mangled.
question: Why does a UART stream at 115200 baud corrupt JSON when a cellular modem stalls for a few seconds?
details:
  realistic_solution: 'You experienced a UART Hardware FIFO Overrun. 115200 baud = ~11.5 KB/s. A 128-byte buffer fills in 11 milliseconds. If the modem''s processor hangs for even 15ms, data is irreversibly lost.'
  common_mistake: |
    **The Pitfall:** Diagnosing the issue as a "baud rate mismatch".
    **The Rationale:** Developers often assume data corruption over UART is due to clock drift or mismatched speeds rather than a buffer management issue.
    **The Consequence:** Time is wasted tuning baud rates instead of implementing proper flow control or buffer handling, leaving the overrun bug unfixed.
  napkin_math: |
    **Assumptions & Constraints:**
    - UART config: 115200 baud, 10 bits/frame.
    - Buffer: 128-byte hardware FIFO.
    - Network Stall: > 15 ms.

    **Calculations:**
    - Bandwidth: 115200 bits/sec / 10 = 11,520 bytes/sec (11.52 KB/s).
    - Fill Time: 128 bytes / 11,520 B/s ≈ 11.1 ms.

    **Conclusion & Interpretation:**
    - **Result: 11.1 ms Fill Time (I/O-Bound).** The buffer fills completely in ~11 ms. Any processor hang over 15 ms guarantees irreversible byte loss.
