title: The UART Buffer Overrun
scenario: Your MCU streams ML predictions (100 bytes of JSON) to an external cellular modem via UART at
  115200 baud. It works perfectly in the lab. In the field, the cellular modem sometimes loses its network
  connection and takes a few seconds to reconnect. During this time, the MCU keeps sending data. When
  the modem reconnects, the first few JSON strings are completely mangled. Why did the UART connection
  corrupt the data?
question: "Why does a UART stream at 115200 baud corrupt JSON when a cellular modem stalls for a few seconds?"
details:
  realistic_solution: You experienced a **UART Hardware FIFO Overrun**. 115200 baud = ~11.5 KB/s. A 128-byte
    buffer fills in 11 milliseconds. If the modem's processor hangs for even 15ms, data is irreversibly
    lost.
  common_mistake: '"Baud rate mismatch." The baud rate didn''t change; the hardware state did.'
  napkin_math: 115200 baud = ~11.5 KB/s. A 128-byte buffer fills in 11 milliseconds. If the modem's processor
    hangs for even 15ms, data is irreversibly lost.
