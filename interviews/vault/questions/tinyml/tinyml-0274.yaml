title: The Depthwise Efficiency Dividend
scenario: You're optimizing a CNN for a Cortex-M4 microcontroller and need to reduce the computational load. You are considering replacing a standard 3x3 convolution layer with a 3x3 depthwise separable convolution.
question: What MAC reduction should a 3x3 depthwise separable convolution deliver relative to a standard 3x3 convolution?
details:
  realistic_solution: A 3x3 depthwise separable convolution is approximately 9 times cheaper than a standard 3x3 convolution. This is because it decouples the spatial filtering (depthwise step) from the channel-mixing (pointwise step), dramatically reducing the total number of parameters and MAC operations.
  common_mistake: |
    **The Pitfall:** Underestimating the massive efficiency gain of depthwise separable convolutions.
    **The Rationale:** Engineers assume it's a minor optimization (e.g., 2x) because they forget standard convolutions scale quadratically with channel count, while separable convolutions scale linearly.
    **The Consequence:** Discarding a crucial architectural optimization that could be the difference between fitting on a microcontroller or failing.
  napkin_math: |
    1. **Standard Conv MACs:** Proportional to K * K * C_in * C_out = 3 * 3 * 128 * 128 = 147,456.
    2. **Depthwise Separable (Depthwise step):** K * K * C_in = 3 * 3 * 128 = 1,152.
    3. **Depthwise Separable (Pointwise step):** C_in * C_out = 128 * 128 = 16,384.
    4. **Total Separable MACs:** 1,152 + 16,384 = 17,536.
    5. **Reduction Factor:** 147,456 / 17,536 = 8.41.
    6. **Result:** As channel counts grow, the savings asymptotically approaches K * K (9x). The reduction is **approximately 9x cheaper**.
  options:
  - It's about 2x cheaper.
  - They are computationally equivalent.
  - It's about 9x cheaper.
  - It's about 9x more expensive.
  correct_index: 2
