title: The Watchdog Boot Loop Catastrophe
scenario: You manage a fleet of 1 million in-cabin automotive sensors that use a microcontroller to detect driver drowsiness. Each device has a 2-second hardware watchdog timer. After a successful OTA model update, 0.5% of devices drop offline and briefly reappear every ~2 seconds continuously. A junior engineer suggests pushing an OTA to increase the watchdog timeout to 3 seconds because the new model might be slightly slower.
question: Why is the proposal to lengthen the watchdog timeout likely wrong, what is the probable root cause of the failure, and what catastrophic, non-linear fleet behavior is this masking?
details:
  realistic_solution: 'Critique: The proposal to lengthen the timeout is a dangerous patch, not a fix. It increases the time-to-recovery for actual hangs and masks the real problem. The watchdog isn''t failing; it''s doing its job based on a new, unexpected system state. The real issue is a data-dependent execution path causing an OOM crash. The solution requires implementing a boot counter in RTC RAM to catch rapid reboots and fall back to a safe mode.'
  common_mistake: |
    **The Pitfall:** Focusing on the software execution time in isolation and assuming the model is simply "slow."
    **The Rationale:** Engineers without embedded experience view the watchdog as a simple timeout mechanism rather than a critical state-machine safeguard.
    **The Consequence:** Lengthening the timeout fails to fix the crashing devices and exacerbates battery drain.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Watchdog period: 2 seconds.
       - Normal battery life: ~281 days (675mWh / 0.1mW).
       - Boot loop active time: 700ms per 2s.
       - Active power: 100mW.
    2. **Calculations:**
       - Duty cycle = 700ms / 2000ms = 35%.
       - Average power during loop = 35% * 100mW = 35mW.
       - Boot loop battery life = 675mWh / 35mW = 19.3 hours.
    3. **Conclusion & Interpretation:**
       - **Result: Boot loop drains battery in <20 hours, masking a data-dependent crash.**
