title: The Watchdog Boot Loop Catastrophe
scenario: You are in charge of a fleet of 1 million in-cabin automotive sensors that use a Cortex-M4 to detect driver drowsiness. To ensure reliability, each device has a 2-second hardware watchdog timer. After a successful OTA model update, your fleet monitoring system reports that 0.5% of devices (5,000 cars) are dropping offline and then briefly reappearing every ~2 seconds, continuously. A junior engineer suggests the fix is simple: 'The new model must be slightly slower. Let's just push an OTA to increase the watchdog timeout to 3 seconds.'
question: Why is the proposal to lengthen the watchdog timeout likely wrong, what is the probable root cause of the failure, and what catastrophic, non-linear fleet behavior is this masking?
details:
  realistic_solution: 'Critique: The proposal to lengthen the timeout is a dangerous patch, not a fix. It increases the time-to-recovery for *actual* hangs and masks the real problem. The watchdog isn''t failing; it''s doing its job based on a new, unexpected system state. The real issue is a data-dependent execution path causing an OOM crash. The solution requires implementing a boot counter in RTC RAM to catch rapid reboots and fall back to a safe mode.'
  common_mistake: |
    **The Pitfall:** Focusing on the software execution time in isolation and assuming the model is simply "slow."
    **The Rationale:** Engineers without embedded experience view the watchdog as a simple timeout mechanism rather than a critical state-machine safeguard, ignoring data-dependent execution paths.
    **The Consequence:** Lengthening the timeout fails to fix the crashing devices and exacerbates battery drain.
  napkin_math: |
    - **Step 1:** Calculate active duty cycle during boot loop: Boot (500ms) + inference (200ms) + crash = 700ms active per 2s watchdog period.
    - **Step 2:** Duty cycle is 700ms / 2000ms = 35%.
    - **Step 3:** Calculate average power during loop: 35% of 100mW (assuming 100mW active power, derived from normal 0.1mW normal sleep/active mix) = 35mW.
    - **Step 4:** Normal battery life: 675mWh / 0.1mW = 6750 hours = 281 days.
    - **Step 5:** Boot loop battery life: 675mWh / 35mW = 19.3 hours.
    - **Result:** **The boot loop drains the battery in under 20 hours, masking a data-dependent OOM crash that requires a boot counter fix.**
