title: Designing Robust OTA Updates for TinyML on Resource-Constrained STM32F4
scenario: You are tasked with designing a firmware over-the-air (OTA) update mechanism for a TinyML application deployed on an ARM Cortex-M4 STM32F4 microcontroller. The TinyML model consumes 80KB of flash and requires 40KB of SRAM for inference. Your solution must ensure system reliability, minimize downtime during updates, and provide a robust rollback mechanism in case of update failures.
question: How should an STM32F4 OTA design use A/B partitions and rollback for an 80 KB TinyML model?
details:
  realistic_solution: 'Implement an A/B partition scheme where two identical application partitions reside in flash memory. A small, secure bootloader is responsible for validating and booting from either partition. During an OTA update, the new firmware is downloaded to the inactive partition. If the new firmware fails to boot or a watchdog timer expires, the bootloader automatically reverts to the previously working partition. Flash programming constraints must be carefully managed.'
  common_mistake: |
    **The Pitfall:** Overlooking flash endurance and exact layout constraints.
    **The Rationale:** Candidates propose an A/B system without calculating if two 80KB applications plus the bootloader physically fit within the specific flash footprint.
    **The Consequence:** The design is impossible to flash onto the hardware, or it lacks staging space, preventing safe rollbacks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - MCU: STM32F4 (256 KB SRAM).
       - Model size: 80 KB Flash, 40 KB SRAM.
       - Strategy: Dual-bank A/B OTA.
    2. **Calculations:**
       - Active SRAM usage: 40 KB (model) + ~50 KB (OS/buffers) = ~90 KB.
       - Available SRAM for OTA buffering: 256 KB - 90 KB = 166 KB. (SRAM is not the bottleneck).
       - Flash Layout: Bootloader (~32 KB) + App Partition A (80 KB) + App Partition B (80 KB) = 192 KB minimum Flash.
    3. **Conclusion & Interpretation:**
       - **Result: Storage-Bound Architecture.** A reliable A/B OTA design with rollback requires a minimum of **192 KB of Flash**; the MCU must have a 256 KB or 512 KB Flash variant to support this safely.
