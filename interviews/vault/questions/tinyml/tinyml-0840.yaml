title: TinyML Gateway Load Shedding Spec
scenario: A farm has 10 gateways collecting TinyML pest-detection events. During storms,
  one gateway can receive 5x normal reports. Specify how events should be load-shed
  or rerouted.
question: What load-shedding and rerouting policy should protect TinyML gateways during
  event storms?
details:
  realistic_solution: The policy should define local buffering, priority classes,
    duplicate suppression, neighbor gateway handoff, backoff, and maximum event age.
    Safety-critical or rare pest detections should be preserved while low-value telemetry
    is delayed or dropped.
  common_mistake: Treating all sensor messages as equally urgent and letting gateway
    queues overflow.
  napkin_math: If normal load is 100 reports/min and storm load is 500 reports/min,
    a gateway with 200 reports/min capacity must shed, buffer, or reroute 300 reports/min.
