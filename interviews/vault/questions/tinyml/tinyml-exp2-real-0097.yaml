title: Structured vs Unstructured Pruning on Cortex-M4
scenario: We are deploying a keyword spotting CNN on an ARM Cortex-M4 (STM32F4) microcontroller. The baseline
  8-bit quantized model requires 320 KB of memory, which strictly exceeds the 256 KB SRAM limit of the
  device. A junior engineer proposes using 90% unstructured magnitude pruning to drastically reduce the
  model size and speed up inference. Evaluate this proposal against an alternative 50% structured channel
  pruning approach, considering the specific architectural constraints of the target hardware.
question: "How would you evaluate this proposal against an alternative 50% structured channel pruning approach, considering the specific architectural constraints of the target hardware?"
details:
  realistic_solution: Structured channel pruning is the correct architectural choice for the Cortex-M4.
    Structured pruning physically reduces the tensor dimensions, creating a smaller, dense model that
    perfectly aligns with CMSIS-NN optimizations and utilizes the 2x INT8 MACs/cycle SIMD instructions
    without branching overhead. Unstructured pruning introduces index tracking which bloats the tight
    256 KB SRAM and causes pipeline stalls on the 168 MHz CPU due to irregular memory accesses.
  common_mistake: Candidates often assume that 90% unstructured sparsity automatically translates to a
    10x reduction in memory and a 10x speedup. They fail to realize that the Cortex-M4 lacks sparse matrix
    acceleration, meaning unstructured sparsity requires metadata overhead (like CSR format) that consumes
    SRAM, and destroys the dense memory access patterns required for CMSIS-NN SIMD.
  napkin_math: Let us analyze a single convolutional layer with 64 input and 64 output channels, 3x3 kernel
    (64*64*3*3 = 36,864 INT8 weights = 36.8 KB). With 90% unstructured pruning, we have 3,686 weights
    (3.6 KB) but need at least 16-bit indices for each (+7.3 KB), totaling ~11 KB of SRAM. Execution takes
    ~4 CPU cycles per sparse MAC due to branching, taking ~14,744 cycles. With 50% structured pruning
    (32 in, 32 out), we have 32*32*3*3 = 9,216 INT8 weights (9.2 KB), requiring no index overhead. CMSIS-NN
    processes 2 MACs/cycle, taking 9,216 / 2 = 4,608 cycles. Structured pruning uses less SRAM (9.2 KB
    vs 11 KB) and runs over 3x faster on the 168 MHz M4.
