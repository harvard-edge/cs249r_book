title: Unstructured vs Structured Pruning on Ethos-U55
scenario: Your team is deploying a wake-word CNN on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) system.
  The system runs at 480 MHz with 512 KB of shared SRAM, and the Ethos-U55 is configured for 256 MACs/cycle.
  You applied 75% unstructured weight pruning, compressing the weights from 400 KB to 100 KB, which fits
  easily into SRAM. However, profiling shows the inference compute cycles are exactly the same as the
  unpruned dense model. Explain why the unstructured sparsity provides no speedup on the NPU, and calculate
  the expected compute cycle difference if you instead used 50% structured channel pruning.
question: "Why the unstructured sparsity provides no speedup on the NPU, and calculate the expected compute cycle difference if you instead used 50% structured channel pruning?"
details:
  realistic_solution: The Ethos-U55 processes data using a dense compute engine evaluating up to 256 MACs/cycle.
    Unstructured pruning scatters zeros randomly, so the NPU's rigid dataflow must still feed those zeros
    into the MAC array, meaning compute cycles remain unchanged. Structured pruning physically shrinks
    the tensor dimensions (e.g., fewer channels), directly reducing the total number of dense MAC operations
    the hardware must schedule and perform.
  common_mistake: Candidates often assume that zero-valued weights automatically skip compute cycles on
    edge NPUs. They mistakenly conflate offline memory compression (which the Ethos-U55 handles well to
    save SRAM) with hardware zero-skipping during active MAC execution.
  napkin_math: 'Dense layer: 1,024,000 MACs. Ethos-U55 compute latency = 1,024,000 MACs / 256 MACs/cycle
    = 4,000 cycles. 75% unstructured pruning: MAC array still processes 1,024,000 ops = 4,000 cycles.
    50% structured channel pruning (removing half the input channels): MACs reduce by half to 512,000.
    New compute latency = 512,000 / 256 = 2,000 cycles. At 480 MHz, this reduces active compute time for
    this layer from 8.33 µs to 4.16 µs.'
