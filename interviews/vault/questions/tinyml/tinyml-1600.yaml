title: RTOS Preemption for Inference
scenario: An existing bare-metal setup loops between polling a sensor and running inference, causing missing data during the inference window on a Cortex-M4.
question: How does replacing the polling loop with an RTOS task scheduler utilizing preemption fix the missing data issue?
details:
  realistic_solution: Create a high-priority hardware interrupt that places incoming sensor bytes into a FreeRTOS ring buffer. The inference runs in a low-priority thread. When data arrives, the MCU preempts the inference thread for ~10 cycles to enqueue the data, then resumes inference. This ensures zero data loss while utilizing 99% of CPU time for the model.
  common_mistake: |
    **The Pitfall:** Assigning the inference task a higher RTOS priority than the sensor data collection task.
    **The Rationale:** Thinking inference is the "most important" work and thus deserves the highest priority.
    **The Consequence:** The exact same problem reproduces because inference blocks the sensor reads.
  napkin_math: |
    1. **Context Switch Overhead:** Preempting the inference thread to handle an interrupt takes ~10 cycles.
    2. **Total Preemption Cost:** At a 1000 Hz sample rate, 10 cycles * 1000 = 10,000 cycles/sec.
    3. **Conclusion:** The MCU can handle sensor data via interrupts instantly while dedicating 99%+ of its cycles to the lower-priority inference thread.
