title: RTOS Preemption for Inference
scenario: An existing bare-metal setup loops between polling a sensor and running
  inference, causing missing data during the inference window on a Cortex-M4.
question: Diagram and explain how replacing the polling loop with an RTOS task scheduler
  utilizing preemption fixes the missing data issue.
details:
  realistic_solution: Create a high-priority hardware interrupt that places incoming
    sensor bytes into a FreeRTOS ring buffer. The inference runs in a low-priority
    thread. When data arrives, the MCU preempts the inference thread for ~10 cycles
    to enqueue the data, then resumes inference. This ensures zero data loss while
    utilizing 99% of CPU time for the model.
  common_mistake: Assigning the inference task a higher RTOS priority than the sensor
    data collection task, which immediately reproduces the exact same problem.
  napkin_math: 10 cycle preemption * 1000 Hz = 10K cycles overhead
