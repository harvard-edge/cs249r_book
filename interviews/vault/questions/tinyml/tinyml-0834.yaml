title: TinyML Fleet Update Participation
scenario: A TinyML fleet has 12,000 devices. Only 30% have enough battery and 60% of those have radio connectivity in the nightly window.
question: How many TinyML devices can participate if 30% have battery and 60% of those have connectivity?
details:
  realistic_solution: Participating devices are 12,000 x 0.30 x 0.60 = 2,160 under the simplified assumption that battery eligibility and connectivity are independent. The effective round size is much smaller than fleet size, which affects convergence and representativeness.
  common_mistake: |
    **The Pitfall:** Using total fleet size as the round size.
    **The Rationale:** Failing to account for device drop-offs due to real-world battery and connectivity constraints.
    **The Consequence:** Overestimating participating devices, which drastically affects convergence timelines and model representativeness.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total fleet: 12,000 devices.
       - Battery eligible: 30%.
       - Connectivity eligible (of battery eligible): 60%.
    2. **Calculations:**
       - Battery eligible count = 12,000 * 0.30 = 3,600.
       - Connectivity eligible count = 3,600 * 0.60 = 2,160.
    3. **Conclusion & Interpretation:**
       - **Result: 2,160 devices.** Only a fraction of the fleet can participate, shrinking the effective round size for federated learning.
