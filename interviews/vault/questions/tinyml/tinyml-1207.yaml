title: NPU-Aware CNN Design for Ethos-U55
scenario: You are designing a visual wake-word model for a battery-powered device built on an MCU + NPU subsystem. The system has a strict 512 KB SRAM limit shared between the MCU, NPU, and application data.
question: How should an NPU visual wake-word CNN be redesigned to maximize MAC utilization without SRAM spilling or MCU fallback?
details:
  realistic_solution: "A senior engineer will design a custom macro-architecture that aggressively downsamples spatially in the earliest layers before expanding channels, keeping the maximum instantaneous activation memory strictly under ~350 KB. Replace standard inverted residuals with fused MBConv blocks optimized for the NPU's MAC array dimensions."
  common_mistake: |
    **The Pitfall:** Blindly applying MobileNetV2/V3 inverted residuals.
    **The Rationale:** Unaware that high-expansion-ratio blocks create massive intermediate activation tensors that exceed the shared SRAM, and using unsupported activation functions forces slow CPU fallback.
    **The Consequence:** The model spills to slower memory or falls back to the Cortex-M7, missing latency targets and draining battery.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 512 KB SRAM limit.
    - Model: Visual wake-word, INT8.

    **Calculations:**
    - Naive MBConv: 96x96x3 input, exp ratio 6 at 48 channels -> 96 * 96 * 288 = 2,654,208 bytes (2.53 MiB).
    - Optimized Design: 2x downsampling (48x48), exp ratio 3 -> 48 * 48 * 144 = 331,776 bytes (~324 KiB).
    - Throughput Limit: 480 MHz * 256 MACs/cycle = 122.88 GMACs/sec.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound initially, resolved to Compute-Bound by spatial downsampling.**
