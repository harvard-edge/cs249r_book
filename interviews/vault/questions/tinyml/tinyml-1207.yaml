title: NPU-Aware CNN Design for Ethos-U55
scenario: You are designing a visual wake-word model for a battery-powered device built on the ARM Corstone-300 subsystem (Cortex-M7 at 480 MHz + Ethos-U55 NPU). The system has a strict 512 KB SRAM limit shared between the MCU, NPU, and application data.
question: How should an Ethos-U55 visual wake-word CNN be redesigned to maximize MAC utilization without SRAM spilling or MCU fallback?
details:
  realistic_solution: A senior engineer will design a custom macro-architecture that aggressively downsamples spatially in the earliest layers before expanding channels, keeping the maximum instantaneous activation memory strictly under ~350 KB to leave room for RTOS overhead. They will also replace standard inverted residuals with fused MBConv blocks or grouped convolutions optimized for the U55's specific MAC array dimensions, ensuring >85% utilization and keeping all operators strictly mapped to the NPU.
  common_mistake: |
    **The Pitfall:** Blindly applying MobileNetV2/V3 inverted residuals.
    **The Rationale:** Unaware that high-expansion-ratio blocks create massive intermediate activation tensors that exceed the shared SRAM, and using unsupported activation functions (like SiLU) forces slow CPU fallback.
    **The Consequence:** The model spills to slower memory or falls back to the Cortex-M7, missing latency targets and draining battery.
  napkin_math: |
    1. **Naive MBConv (96x96x3 input):** Expansion ratio 6 at 48 channels creates a 96 * 96 * 288 = 2,654,208 byte (**2.65 MB**) INT8 tensor. Instantly OOMs the 512 KB SRAM.
    2. **Optimized Design:** Early 2x spatial downsampling (48x48) + expansion ratio 3.
    3. **New Tensor Size:** 48 * 48 * 144 = 331,776 bytes (**~331 KB**). Safely fits in SRAM.
    4. **Throughput Limit:** Ethos-U55 @ 480 MHz * 256 MACs/cycle = 122.88 GMACs/sec.
    5. **Latency Budget:** For a 10ms budget at 80% utilization: 122.88 * 0.01s * 0.8 = **0.98 GMACs** max complexity.
