title: NPU Thermal Fallback Strategy
scenario: 'You are designing a fail-operational predictive maintenance system on an ARM Cortex-M7 + Ethos-U55 platform. Under normal operation, the NPU executes a 25M MAC primary CNN model. When a thermal limit is reached, it is power-gated, requiring a fallback model to run on the CPU. You must evaluate two fallback designs against a strict 5ms inference deadline: Design A is a distilled 5M MAC CNN, while Design B is a 200K operation Random Forest.'
question: Which fallback design should run when the Ethos-U55 is thermally power-gated, and does it meet the 5 ms deadline?
details:
  realistic_solution: Design B is the correct fail-operational choice. While the distilled CNN (Design A) provides a smoother accuracy degradation curve, it violates the 5ms latency constraint when executed on the CPU. The Random Forest meets the deadline, ensuring the system safely degrades its predictive quality without starving the real-time control loop.
  common_mistake: |
    **The Pitfall:** Choosing the CNN fallback without verifying CPU execution time.
    **The Rationale:** Candidates assume a 5x reduction in MACs is sufficient to meet deadlines.
    **The Consequence:** The CNN fallback execution on the CPU violates the strict 5 ms hard real-time deadline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Ethos-U55 at 256 MAC/cycle, Cortex-M7 at 480 MHz.
    - 5ms deadline. Design A: 5M MACs, Design B: 200K ops.

    **Calculations:**
    - Primary: 25M / (480M * 256) = 0.20 ms.
    - Design A (CPU): 5M / (480M * 2) = 5.2 ms.
    - Design B (CPU): 200K / 480M = 0.41 ms.

    **Conclusion & Interpretation:**
    - **Result: 0.41 ms (Compute-Bound)**. Design B safely meets the 5 ms deadline, while Design A fails (5.2 ms).
