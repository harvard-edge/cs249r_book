title: TinyML DMA Audio Overlap
scenario: An edge device continuously streams microphone data over SPI while running an anomaly detection model on a Cortex-M4.
question: How can Direct Memory Access (DMA) be applied to overlap continuous audio data acquisition with the CPU's neural network inference?
details:
  realistic_solution: Configure the DMA controller to write incoming SPI audio samples directly into a circular ping-pong buffer in SRAM without CPU intervention. This allows the Cortex-M4 CPU to spend 100% of its cycles running inference on the previous audio window.
  common_mistake: Using interrupt-driven SPI reads per byte, which constantly preempts the CPU and destroys inference throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Continuous SPI audio streaming.
    - Cortex-M4 running anomaly detection inference.
    - Without DMA, CPU handles SPI per byte.

    **Calculations:**
    - Polling/Interrupt CPU overhead for SPI: >10%.
    - DMA CPU overhead for SPI: 0%.

    **Conclusion & Interpretation:**
    - **Result: 0% CPU for I/O (Compute-Bound)**. DMA shifts the system from I/O-bound to compute-bound, freeing the CPU entirely for neural network inference.
