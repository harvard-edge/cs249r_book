title: 'TinyML TCO Implement: Annual Battery Budget for 10K TinyML Fleet'
scenario: Implement the battery cost calculation for 10,000 TinyML sensors powered by 150mAh coin cell batteries ($0.50 each). The sensors run at 75μA average continuous draw. Labor cost for a single battery replacement is $15.
question: Calculate the battery life in days, the annual replacement rate, and the 5-year Total Cost of Ownership (TCO) for battery replacements.
details:
  realistic_solution: Calculating TCO for TinyML involves realizing that labor dominates the BOM. Lowering the average continuous current draw through aggressive sleep profiling is the only way to make at-scale deployments financially viable.
  common_mistake: |
    **The Pitfall:** Calculating battery life strictly in hours without converting to days, or entirely omitting the manual labor cost of field replacements.
    **The Rationale:** Engineers focus purely on BOM (Bill of Materials) costs ($0.50 battery) and ignore the logistical OpEx of truck rolls and technician time.
    **The Consequence:** The projected TCO is underestimated by over 95%, leading to catastrophic budgetary failures for the deployment.
  napkin_math: |
    1. **Assumptions & Constraints:** 10,000 sensors. 150mAh battery. 75µA (0.075mA) average continuous draw. $0.50 battery + $15.00 labor = $15.50 per replacement. 5-year timeline.
    2. **Calculations:** Battery life = 150 mAh / 0.075 mA = 2,000 hours. 2,000 hours / 24 hours/day = 83.3 days. Replacements per year = 365 / 83.3 = 4.38 replacements/unit/year. Annual cost per unit = 4.38 * $15.50 = $67.89. 5-Year Fleet TCO = $67.89 * 10,000 units * 5 years = $3,394,500.
    3. **Conclusion & Interpretation:** **Result: $3.39M OpEx driven by labor.** Battery replacement labor constitutes 96.7% of the cost. If average current is reduced to 15µA, life extends to 416 days, reducing 5-year replacement TCO to ~$680K. System architecture must prioritize ultra-low average current above all else.
