title: Fairness Guardrail PSRAM Latency Bottleneck on ESP32
scenario: >
  To satisfy a fairness guardrail, your team adds a demographic model alongside an existing INT8 keyword spotter on an ESP32-S3. The base keyword model fits in SRAM and runs in 15 ms. The 1.5 MB guardrail model goes into the 8 MB PSRAM connected via Octal SPI. After deployment, total inference time jumps to 140 ms, violating the 50 ms real-time SLA. PSRAM accesses take roughly 10 CPU cycles per byte due to cache misses. The guardrail model performs 3 million INT8 MAC operations, fetching 1 byte of weight per MAC.
question: Why does the ESP32-S3 fairness guardrail violate the 50 ms SLA after moving weights to PSRAM?
details:
  realistic_solution: >
    Placing the model in PSRAM creates a severe memory bandwidth bottleneck. The CPU is stalled waiting for weight fetches over the SPI interface, rendering the Xtensa vector extensions for INT8 severely underutilized. The latency is dominated by data movement stalls rather than arithmetic operations.
  common_mistake: |
    **The Pitfall:** Attributing the latency spike purely to the arithmetic compute load of the second model.
    **The Rationale:** Developers often calculate latency based solely on FLOPs and CPU clock speed, oblivious to the immense bottleneck of memory access speeds over external SPI interfaces.
    **The Consequence:** Falsely assuming the processor is too slow, leading to unnecessary hardware upgrades or abandoning the fairness guardrail entirely.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Base Model: 15 ms.
       - Guardrail Model: 3M MACs, 1 byte fetched per MAC from PSRAM.
       - PSRAM Fetch Latency: 10 cycles/byte. ESP32-S3 Clock: 240 MHz.
    2. **Calculations:**
       - Guardrail Weight Fetches: 3,000,000 bytes.
       - PSRAM Stall Cycles: 3,000,000 bytes * 10 cycles/byte = 30,000,000 cycles.
       - Memory Stall Time: 30,000,000 cycles / 240,000,000 Hz = 0.125 seconds (125 ms).
       - Total Latency: 15 ms (base) + 125 ms (stall) = 140 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 140 ms latency.** The latency is entirely dominated by PSRAM data movement stalls over SPI. **Bottleneck: Memory Bandwidth.**
