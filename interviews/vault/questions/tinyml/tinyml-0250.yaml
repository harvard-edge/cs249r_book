title: 'The TinyML Memory Diet: MCU Compute Constraints'
scenario: You're deploying a 250,000-parameter keyword-spotting model to a microcontroller which has 256 KB of SRAM. The initial model is in FP16 format. To make it fit, your team suggests full INT8 quantization for the weights.
question: How would you calculate and explain the difference in the model's weight storage before and after INT8 quantization?
details:
  realistic_solution: 'The key is to correctly identify the bytes per parameter for each precision. FP16 uses 2 bytes per parameter, and INT8 uses 1 byte. By quantizing, you cut the memory requirement for weights in half. The original model is too large, but the quantized version''s weights will fit, demonstrating a critical and common optimization.'
  common_mistake: |
    **The Pitfall:** Assuming a 4x saving because of confusing FP32 baselines with FP16.
    **The Rationale:** Engineers auto-pilot to the 4x reduction standard (FP32 -> INT8), missing that the starting point here is already FP16.
    **The Consequence:** They incorrectly assert the model will only use 62.5 KB and fit with massive overhead, misallocating the remaining tight SRAM budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model parameters: 250,000.
       - FP16 precision: 2 bytes/parameter.
       - INT8 precision: 1 byte/parameter.
    2. **Calculations:**
       - FP16 Footprint: 250,000 * 2 bytes = 500,000 bytes (500 KB).
       - INT8 Footprint: 250,000 * 1 byte = 250,000 bytes (250 KB).
       - Savings: 500 KB - 250 KB = 250 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** The model shrinks from 500 KB to 250 KB, a 50% reduction.
  options:
  - The model size is reduced from 1000 KB to 250 KB, saving 750 KB.
  - The model size is reduced by a factor of 8x because you go from 16-bit floats to 8-bit integers.
  - The model size is reduced from 500 KB to 250 KB, saving 250 KB.
  - The model size is reduced from 500 KB to 125 KB, saving 375 KB.
