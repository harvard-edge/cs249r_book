title: Diagnosing Peak SRAM OOM on Nordic nRF5340
scenario: 'You are deploying an audio keyword spotting model to a Nordic nRF5340 microcontroller. The model weights take up 400 KB, which fits easily within the 1 MB flash. During initialization, the static memory planner allocates a flat tensor arena in the 256 KB SRAM. However, the system encounters a hard fault during the execution of a specific memory-intensive convolution layer despite the sum of all individual tensor sizes being much less than the total available SRAM.'
question: 'Why does a Nordic nRF5340 HardFault on one convolution despite 400 KB weights fitting in flash and tensors summing under 256 KB?'
details:
  realistic_solution: 'The root cause is a peak memory spike exceeding the tensor arena capacity due to overlapping tensor lifetimes. During the convolution, the input tensor, output tensor, and a temporary scratch buffer must be concurrently resident in SRAM. The static memory planner calculates this peak offline, which failed to fit. To fix it, you analyze the planner''s memory map to identify the bottleneck, then either reduce the layer''s dimensions or use an operator that supports in-place updates.'
  common_mistake: |
    **The Pitfall:** Failing to account for temporary scratch buffers required by specific CMSIS-NN operations.
    **The Rationale:** Candidates assume memory footprint is simply the sum of activations and forget that complex operators (like im2col) need significant temporary workspace.
    **The Consequence:** The model hard faults at runtime due to an OOM exception in the tensor arena.
  napkin_math: |
    1. **Assumptions & Constraints:** Total SRAM = 256 KB. RTOS/BLE/App uses ~106 KB. Available Arena = 150 KB. Conv Layer: Input = 40 KB, Output = 40 KB. CMSIS-NN im2col scratch = 80 KB.
    2. **Calculations:**
       - Peak memory = Input (40 KB) + Output (40 KB) + Scratch (80 KB) = 160 KB.
       - 160 KB > 150 KB available arena.
    3. **Conclusion & Interpretation:** **The peak memory required is 160 KB, exceeding the 150 KB arena and causing an OOM hard fault.** Result: Memory-Bound.
