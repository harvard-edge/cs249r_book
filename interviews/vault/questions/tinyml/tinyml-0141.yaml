title: The 1 Millisecond Deadline
scenario: You're building a keyword-spotting system on a Cortex-M4 microcontroller that wakes on an audio
  interrupt. To avoid missing the next audio sample, the entire inference pipeline—from the moment the
  audio buffer is full to the final classification—must complete before the next interrupt arrives. What
  is the typical total latency budget for such an interrupt-driven pipeline in a TinyML context?
question: "What is the typical total latency budget for such an interrupt-driven pipeline in a TinyML context?"
details:
  realistic_solution: The standard latency budget for a real-time interrupt pipeline in TinyML is around
    1 millisecond (1ms). This is a hard deadline set by the physics of the sensor. For example, if you
    are sampling audio at 16kHz, you get a new sample every 62.5 microseconds. If your inference window
    is 16 samples, you have 1ms to process the buffer before the next one is full and overwrites the old
    one. This ensures that all processing for the current time window finishes before the data for the
    next window arrives and needs to be processed, preventing data loss and maintaining system stability.
  common_mistake: Engineers from cloud or mobile backgrounds often mis-estimate this by orders of magnitude.
    They might think in terms of mobile 'jank' budgets (~16ms) or web service response times (~100ms),
    failing to grasp the hard real-time constraints of embedded systems where missing a deadline by even
    a few microseconds can mean permanent data loss (e.g., overwriting the next audio buffer).
  napkin_math: 'To put this in human terms: if the 1ms TinyML budget were 1 minute, the 33ms budget for
    an industrial edge device would be 33 minutes, and the 100ms budget for a cloud service would be 1
    hour and 40 minutes. The time scales are fundamentally different.'
  options:
  - 100 ms
  - 33 ms
  - 1 ms
  - 50 ns
  correct_index: 2
