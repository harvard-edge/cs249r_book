title: The 1 Millisecond Deadline
scenario: You're building a keyword-spotting system that wakes on an audio interrupt. The inference pipeline must complete before the next interrupt arrives.
question: What is the typical total latency budget for an interrupt-driven audio pipeline in a TinyML context?
details:
  realistic_solution: The standard latency budget for a real-time interrupt pipeline in TinyML is around 1 millisecond (1ms). This is a hard deadline set by the physics of the sensor. For example, if you are sampling audio at 16kHz, you get a new sample every 62.5 microseconds. If your inference window is 16 samples, you have 1ms to process the buffer before the next one is full and overwrites the old one. This ensures that all processing for the current time window finishes before the data for the next window arrives and needs to be processed, preventing data loss and maintaining system stability.
  common_mistake: |
    **The Pitfall:** Thinking in terms of web or mobile latency budgets (16ms to 100ms).
    **The Rationale:** Cloud/mobile engineers fail to grasp the hard real-time constraints of embedded systems connected directly to high-speed physical sensors.
    **The Consequence:** Designing models that are technically fast enough for UI responsiveness but fail completely in real-time embedded data acquisition.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Audio Sampling Rate: 16 kHz.
       - Sample Arrival Time: 1 / 16,000 = 62.5 µs.
       - Inference Window: 16 samples.
    2. **Calculations:**
       - Window Fill Time: 16 samples * 62.5 µs/sample = 1,000 µs (1 ms).
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound.** The hard real-time deadline is exactly 1 ms; inference must complete before the 16-sample buffer is overwritten.
  options:
  - 100 ms
  - 33 ms
  - 1 ms
  - 50 ns
