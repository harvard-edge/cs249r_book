title: TinyML Federated Learning System
scenario: You have a fleet of 10,000 smart electricity meters, each with a Cortex-M4F and a LoRaWAN radio (250 bps effective throughput). Each meter runs a load forecasting model (2-layer LSTM, 15 KB weights) that predicts next-hour consumption. After 1 year, the model has drifted because consumer behavior changed.
question: How would you design a federated learning system that retrains the model across the fleet using LoRaWAN's extreme bandwidth constraints?
details:
  realistic_solution: 'At 250 bps effective throughput, uploading 15 KB of full gradients takes 13.3 hours per device with LoRaWAN duty cycle limits. Design extreme compression: each device trains locally for 1 second on M4F, computes INT8 sparse gradient deltas, keeps only the top 0.3% (45 bytes — fits in a single LoRaWAN packet). Airtime: 1.44s at SF7. Duty cycle overhead: 144s between transmissions. 50 rounds to convergence: 174 mJ per device per round, 8.7J total = 0.024% of a 3000 mAh battery. The gateway aggregates sparse deltas from 10,000 devices per round and updates the global model. Convergence: ~50 rounds over 2 weeks.'
  common_mistake: |
    **The Pitfall:** Blindly applying standard FedAvg.
    **The Rationale:** Candidates propose uploading raw dense gradients without considering radio physics or regulatory limits.
    **The Consequence:** At 250 bps and strict 1% duty cycles, sending dense gradients takes over 13 hours per device per round, destroying the feasibility of the system.
  napkin_math: |
    - 15 KB gradient raw upload: 15,000 * 8 / 250 = 480 seconds.
    - LoRaWAN 1% duty cycle wait: 480 / 0.01 = **13.3 hours per device**.
    - 0.3% sparse delta = 45 bytes (fits one packet). Airtime: 1.44s.
    - Energy per round: 30 mJ (training) + 144 mJ (TX) = 174 mJ.
    - **50 rounds consumes ~8.7 J (0.024% of a 3000 mAh battery).**
