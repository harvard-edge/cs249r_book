title: TinyML Federated Learning System
scenario: You have a fleet of 10,000 smart electricity meters, each featuring a Cortex-M4F and a LoRaWAN radio operating at 250 bps. Each meter runs a load forecasting model with 15 KB of weights. You must architect a federated learning retraining pipeline.
question: How do you design a federated learning pipeline to retrain the 15 KB model across the fleet respecting LoRaWAN's extreme bandwidth constraints?
details:
  realistic_solution: To survive the 250 bps throughput limit, the architecture must execute extreme payload compression. Each device trains locally on the Cortex-M4F to compute INT8 gradients, subsequently applying Top-K Sparsification to isolate only the top 0.3% of critical deltas (a ~45 byte payload). This minuscule sparse update fits within a single LoRaWAN transmission packet, conforming to regulatory duty cycles while successfully propagating model convergence to the centralized gateway.
  common_mistake: |
    **The Pitfall:** Attempting to upload dense, uncompressed gradient vectors over low-power wide-area networks.
    **The Rationale:** Candidates blindly implement standard Federated Averaging (FedAvg), transmitting the entire 15 KB weight update array.
    **The Consequence:** Uploading 15 KB at 250 bps under strict 1% duty cycle regulations requires over 13 hours per device, entirely destroying the real-time feasibility of the system.
  napkin_math: |
    1. **Assumptions & Constraints**:
       - 15 KB model weights.
       - LoRaWAN at 250 bps, 1% regulatory duty cycle.
       - Top-0.3% Sparsification = 45 bytes.
    2. **Calculations**:
       - Dense Upload Time: 15,000 bytes * 8 bits / 250 bps = 480 seconds.
       - Dense Duty Cycle Wait: 480s / 0.01 = 48,000 seconds (13.3 hours).
       - Sparse Upload Time: 45 bytes * 8 bits / 250 bps = 1.44 seconds.
       - Sparse Duty Cycle Wait: 1.44s / 0.01 = 144 seconds.
    3. **Conclusion & Interpretation**:
       - **Result: Bandwidth-Bound Telemetry**. Applying aggressive Top-K Sparsification shrinks the transmission cycle from 13.3 hours to 144 seconds, successfully bringing the federated update within operational reality.
