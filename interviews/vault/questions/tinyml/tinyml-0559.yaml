title: The Context Switch Cost
scenario: You are running inference on a Cortex-M4 using an RTOS. Your model takes 20ms to run. To prevent
  starring other tasks, you split the inference into 20 chunks of 1ms, calling `taskYIELD()` between each
  chunk. Now, your inference takes 35ms total. What RTOS mechanism is costing you 15ms?
details:
  realistic_solution: 'The 15ms overhead comes from context switching. Each taskYIELD triggers: (1) register
    save (8 regs * 4 bytes, ~12 cycles), (2) scheduler decision (~50 cycles), (3) context restore (~12
    cycles), plus pipeline flush and potential cache pollution on M7. With 20 yields and multiple ready
    tasks, each switch touches ~5 other tasks'' state. Total: 20 yields * ~750us average (including other
    tasks running briefly) = 15ms. Fix: run inference as a single high-priority task without yielding,
    or split into only 2-3 large chunks instead of 20 tiny ones. The RTOS overhead scales linearly with
    yield frequency.'
  common_mistake: '"The OS is just slow at executing the yield function." It''s not the function call;
    it''s the physical movement of data required to change tasks.'
  napkin_math: If a context switch takes 10 microseconds, and you yield to 5 other tasks 20 times, you
    perform 100 context switches. That's 1ms of pure OS overhead. If those tasks also do work or trigger
    other interrupts, cache/pipeline disruption inflates this further, easily reaching the 15ms penalty
    observed.
