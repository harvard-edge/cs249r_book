title: The Privacy-Preserving Doorbell Dilemma
scenario: 'You are the lead ML systems engineer for a new smart doorbell. The product team wants to continuously
  improve the keyword-spotting model by learning from user accents. Your fleet has 1 million devices.
  You must choose a strategy: Centralized training (uploading raw audio) or Federated Learning (uploading
  model updates). Each device collects 640 KB of audio data per day. The model update size is 200 KB per
  day.'
details:
  realistic_solution: The correct approach is to calculate the total data transfer volume for the entire
    fleet and compare the associated costs. While on-device training adds some computational load, the
    energy and monetary cost of transmitting large amounts of raw data from millions of devices far outweighs
    it.
  common_mistake: Engineers often focus only on the on-device compute constraints, assuming that on-device
    training is too power-hungry to be feasible. They fail to calculate the cost of data transmission
    at scale, which is often the dominant factor in both cloud bills and battery life for large fleet
    deployments.
  napkin_math: '1M devices. Centralized: 640KB/day → 640GB/day → 233TB/yr. Egress@$0.09/GB: $21K/yr. S3
    storage: $23K/yr (233TB × $0.10/GB-mo × 12 mo, rough estimate). Federated: 200KB/day → 73TB/yr. Egress:
    $6.6K. No storage needed. Total: $6.6K. FL is ~4× cheaper on data transfer alone. Privacy: no raw
    audio leaves device. On-device compute cost: ~50mW*10ms=0.5mJ — negligible.'
  options:
  - On-device training for federated learning will drain the battery too quickly, making it infeasible
    compared to a simple upload.
  - The privacy benefits are minimal as model updates can be reverse-engineered, so the cheaper centralized
    option is better.
  - The cloud cost is the dominant factor; centralized training is ~3.2x more expensive due to transferring
    640 GB of raw data vs. 200 GB of model updates.
  - Centralized training is cheaper because cloud GPUs are more energy-efficient than on-device CPUs,
    leading to lower total energy consumption.
  correct_index: 2
