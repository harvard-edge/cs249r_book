title: The Privacy-Preserving Doorbell Dilemma
scenario: 'You are the lead ML systems engineer for a new smart doorbell. The product team wants to continuously improve the keyword-spotting model by learning from user accents. Your fleet has 1 million devices. You must choose a strategy: Centralized training (uploading raw audio) or Federated Learning (uploading model updates). Each device collects 640 KB of audio data per day. The model update size is 200 KB per day.'
question: Which training strategy has lower fleet data-transfer cost, centralized raw-audio upload or federated model updates?
details:
  realistic_solution: The correct approach is to calculate the total data transfer volume for the entire fleet and compare the associated costs. While on-device training adds some computational load, the energy and monetary cost of transmitting large amounts of raw data from millions of devices far outweighs it.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on on-device compute constraints and concluding federated learning is too power-hungry to be feasible.
    **The Rationale:** Engineers underestimate the scale of data egress costs and mistakenly assume sending "simple" data files is inherently cheaper than calculating updates.
    **The Consequence:** The team makes an architectural decision that results in exponentially larger monthly cloud bills and heavily degraded device battery life from constant radio transmissions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet size: 1M devices.
       - Centralized Data: 640 KB/day per device.
       - Federated Data: 200 KB/day per device.
       - Egress cost: $0.09/GB.
    2. **Calculations:**
       - Centralized: 640 KB/day × 1M = 640 GB/day = 233,600 GB/yr.
       - Centralized Egress: 233,600 GB × $0.09 = $21,024/yr.
       - Federated: 200 KB/day × 1M = 200 GB/day = 73,000 GB/yr.
       - Federated Egress: 73,000 GB × $0.09 = $6,570/yr.
       - Savings: 640 / 200 = 3.2x cheaper.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound Cost.** Total federated network cost is ~3.2x cheaper strictly on data transfer, dwarfing on-device compute costs.
  options:
  - On-device training for federated learning will drain the battery too quickly, making it infeasible compared to a simple upload.
  - Centralized training is cheaper because cloud GPUs are more energy-efficient than on-device CPUs, leading to lower total energy consumption.
  - The cloud cost is the dominant factor; centralized training is ~3.2x more expensive due to transferring 233 TB of raw data vs. 73 TB of model updates annually.
  - Centralized training is 3.2x cheaper because you only send 233 GB of data per year compared to 730 GB for federated updates.
  correct_index: 2
