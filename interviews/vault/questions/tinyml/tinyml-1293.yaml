title: Design Graceful Degradation for Cortex-M4 Keyword Spotter
scenario: An always-on smart home audio node runs on an STM32F4 (168 MHz, 256 KB SRAM). It runs a 12-command keyword spotter. Unpredictable BLE interrupts can suddenly reduce the CPU processing time from 80ms to 15ms.
question: How should a Cortex-M4 keyword spotter degrade gracefully when BLE interrupts reduce the available CPU window to 15 ms?
details:
  realistic_solution: Both a full model and a tiny 'wake-word only' fallback model permanently reside in the 1 MB flash. Because they never execute simultaneously, they reuse the same SRAM tensor arena. An RTOS task monitor evaluates the remaining time budget; if under the full model's threshold, it safely executes only the tiny fallback model to maintain fail-operational status.
  common_mistake: |
    **The Pitfall:** Attempting to dynamically load fallback weights from flash to SRAM during the interrupt.
    **The Rationale:** Candidates propose cloud-style dynamic loading without realizing the flash read latency will blow the tight 15ms deadline.
    **The Consequence:** The system still misses the real-time deadline during CPU starvation events.
  napkin_math: |
    - MCU throughput: 168 MHz * 2 MACs/cycle = 336 MMACs/sec.
    - 15 ms budget max compute: 0.015 sec * 336 MMACs/sec = 5.04 MMACs.
    - Full model: ~16.8 MMACs (fails the deadline).
    - **The fallback model must be strictly constrained to under 5 MMACs to ensure fail-operational execution within 15 ms.**
