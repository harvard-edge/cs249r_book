title: Architecting Graceful Degradation for ESP32-S3 Voice Commands
scenario: You are designing an always-on smart speaker on an ESP32-S3 microcontroller. The device normally streams audio to the cloud over WiFi, but it must degrade gracefully when connectivity drops or power is critically low.
question: How should an ESP32-S3 smart speaker stage SRAM and PSRAM models for WiFi loss and low-power fallback?
details:
  realistic_solution: 'The optimal design uses a multi-stage degradation ladder. State 1 (Normal): A tiny wake-word model in SRAM triggers cloud WiFi streaming. State 2 (Offline Fallback): When WiFi drops, a local INT8 command model is dynamically loaded from PSRAM into SRAM, shedding complex query capabilities but retaining basic controls. State 3 (Low Power): WiFi is disabled entirely to save power, and the system relies purely on the local INT8 model. The design leverages the ESP32-S3''s INT8 vector extensions to run the fallback model efficiently within the tight SRAM constraints.'
  common_mistake: |
    **The Pitfall:** Keeping multiple separate models in SRAM simultaneously, or relying on PSRAM for real-time inference.
    **The Rationale:** Failing to account for the strict 512 KB SRAM limit and the unacceptable latency/power draw of running active inferences from 8 MB external PSRAM.
    **The Consequence:** Out-of-memory crashes or sluggish, power-hungry performance during fallback modes.
  napkin_math: |
    1. **SRAM Budget:** 512 KB total. OS/WiFi overhead = ~150 KB. Always-on wake-word model = 50 KB.
    2. **Available for Fallback:** 512 - 150 - 50 = **312 KB**.
    3. **Model Sizing:** Local INT8 fallback command model must be sized to < 312 KB (e.g., 250 KB).
    4. **Loading Latency:** Loading 250 KB from 8 MB PSRAM via Octal SPI (~40 MB/s) takes 250 KB / 40,000 KB/s = **6.25 ms**. Negligible latency for dynamic fallback.
