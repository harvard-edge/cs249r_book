title: Architecting Graceful Degradation for ESP32-S3 Voice Commands
scenario: You are designing an always-on smart speaker on an MCU. The device normally streams audio to the cloud over WiFi, but it must degrade gracefully when connectivity drops or power is critically low.
question: How should a smart speaker stage SRAM and PSRAM models for WiFi loss and low-power fallback?
details:
  realistic_solution: "The optimal design uses a multi-stage degradation ladder. A tiny wake-word model in SRAM triggers cloud WiFi streaming. When WiFi drops, a local INT8 command model is dynamically loaded from PSRAM into SRAM."
  common_mistake: |
    **The Pitfall:** Keeping multiple separate models in SRAM simultaneously, or relying on PSRAM for real-time inference.
    **The Rationale:** Failing to account for the strict 512 KB SRAM limit and the unacceptable latency/power draw of running active inferences from 8 MB external PSRAM.
    **The Consequence:** Out-of-memory crashes or sluggish, power-hungry performance during fallback modes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 512 KB SRAM total.
       - OS/WiFi overhead: ~150 KB.
       - Wake-word model: 50 KB.
    2. **Calculations:**
       - Available for Fallback: 512 - 150 - 50 = 312 KB.
       - Local INT8 model size < 312 KB (e.g., 250 KB).
       - Loading Latency: 250 KB / 40,000 KB/s (Octal SPI) = 6.25 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (Dynamic loading via 6.25 ms DMA circumvents SRAM limits).**
