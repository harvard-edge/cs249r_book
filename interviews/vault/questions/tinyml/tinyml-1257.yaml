title: Roofline Analysis of Depthwise Convolutions
scenario: We are deploying a keyword spotting CNN on an ARM Cortex-M4 running at 168 MHz. The network's most time-consuming layer is a 3x3 depthwise convolution.
question: Is a 3x3 depthwise convolution on a Cortex-M4 compute-bound or memory-bound under a roofline analysis, and what is its maximum throughput?
details:
  realistic_solution: 'Unlike standard convolutions, depthwise convolutions lack weight reuse across input channels, drastically lowering their arithmetic intensity. On the STM32F4, the peak MAC throughput outpaces the SRAM memory bandwidth for low-intensity operations. The layer operates on the memory-bound slope of the roofline model, meaning performance is dictated by memory fetch speed rather than the SIMD MAC units.'
  common_mistake: |
    **The Pitfall:** Assuming all convolutions are heavily compute-bound.
    **The Rationale:** Candidates fail to realize that depthwise convolutions lack weight reuse across input channels, drastically lowering their arithmetic intensity.
    **The Consequence:** They spend time optimizing the SIMD assembly instructions when the bottleneck is actually SRAM fetch speed.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute: 168 MHz, 2 MACs/cycle (CMSIS-NN).
    - Memory Bandwidth: 32-bit word/cycle (4 bytes).
    - Operation: 3x3 depthwise convolution (9 MACs/channel).

    **Calculations:**
    - Peak Compute: 168 * 2 MACs * 2 OPs/MAC = 672 MOPs/sec.
    - Memory Bandwidth: 168 * 4 bytes = 672 MB/sec.
    - Ridge Point: 672 MOPs / 672 MB/s = 1.0 MOPs/byte.
    - Arithmetic Intensity: 9 MACs (18 OPs) require 9 bytes input, 9 bytes weight, 1 byte output = 19 bytes. 18 / 19 = 0.947 MOPs/byte.
    - Max Throughput: 0.947 MOPs/byte * 672 MB/sec = 636.4 MOPs/sec.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound (Memory-Bound).** Since AI (0.947) < Ridge Point (1.0), the operation is memory-bound, under-utilizing peak compute.
