title: 'Latency Decomposition: Compare ESP32-S3 vs. Cortex-M4 for Image Classification'
scenario: A tiny image classifier (MobileNetV1-0.25, 475K params, INT8, 14.9 MOPs) runs on an ESP32-S3 vs. a Cortex-M4. The model uses a 28x28 input.
question: How would you compare inference latency accounting for the PSRAM access penalty on the ESP32-S3?
details:
  realistic_solution: 'While the ESP32-S3 has vector instructions, weights (475KB INT8) don''t fit in the 512KB SRAM along with activations. The PSRAM penalty via SPI creates a massive bottleneck for weight reads, heavily degrading the effective throughput. Both platforms struggle, making MicroTVM layer-by-layer SRAM reuse strictly necessary.'
  common_mistake: |
    **The Pitfall:** Assuming PSRAM bandwidth matches SRAM bandwidth.
    **The Rationale:** Candidates treat the 8MB PSRAM as equivalent to the 512KB SRAM, ignoring the SPI interface bottlenecks.
    **The Consequence:** Grossly underestimating inference latency by failing to account for the 4-8 cycle penalty per word when fetching weights from PSRAM.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 475KB INT8 weights (14.9M MACs).
       - ESP32-S3 clock: 168MHz.
       - PSRAM: SPI at 80MHz (approx 40 MB/s).
       - Compute: ~1 MAC/cycle.
    2. **Calculations:**
       - ESP32 Compute Time at 168MHz: 14.9M MACs / 168M cycles/sec = ~88.7 ms.
       - PSRAM Weight Fetch: 475KB * (multiple accesses, say 2MB total) / 40 MB/s = ~50 ms.
       - ESP32-S3 Total Time: 88.7 ms + 50 ms = 138.7 ms.
       - M4 Compute Time at 168MHz: 14.9M / 168M = ~88.7 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth Bound.** PSRAM introduces massive latency overhead. Efficient execution requires explicit memory tiling (e.g., MicroTVM) to cache INT8 weights in SRAM.
