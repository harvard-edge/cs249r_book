title: HardFault During High-Frequency Sensor Ingestion
scenario: We are deploying a predictive maintenance model on an ARM Cortex-M4 (STM32F4) running at 168
  MHz with 256 KB SRAM. The system ingests 16-bit industrial vibration data at a 50 kHz sampling rate,
  using a 1-second rolling window to extract features before passing them to the model. To avoid dropping
  data during the feature extraction and inference phase, the engineer implemented a standard ping-pong
  (double) DMA buffer for the raw data. The model itself requires 80 KB of SRAM for its working arena.
  However, the device consistently hits a HardFault shortly after the first buffer fills and inference
  begins. What is causing this failure?
question: "Why does a Cortex-M4 with 256 KB SRAM HardFault after buffering 1 s of 50 kHz vibration data and an 80 KB model arena?"
details:
  realistic_solution: The system is experiencing SRAM exhaustion, causing the stack and heap to collide.
    Double buffering a 1-second window at this sample rate requires too much memory. The correct approach
    is to either reduce the time window, downsample the incoming data before it hits the main buffer,
    or compute features continuously on-the-fly (e.g., using a streaming FFT or cascaded biquad filters)
    rather than storing the entire 1-second raw waveform in SRAM.
  common_mistake: Candidates often assume the HardFault is caused by CPU starvation (assuming 168 MHz
    is not fast enough to handle the interrupt rate) or a misconfigured DMA priority. They might also
    incorrectly suspect that the SIMD operations are causing unaligned memory access errors, completely
    missing the memory footprint implications of the buffering strategy.
  napkin_math: 'Raw data rate: 50,000 samples/sec * 2 bytes/sample = 100 KB/sec. Ping-pong buffer requirement:
    2 buffers * 100 KB = 200 KB. Model arena requirement: 80 KB. Total baseline SRAM required: 200 KB
    + 80 KB = 280 KB. STM32F4 available SRAM: 256 KB. Deficit: 280 KB - 256 KB = 24 KB overflow, guaranteeing
    a memory crash.'
