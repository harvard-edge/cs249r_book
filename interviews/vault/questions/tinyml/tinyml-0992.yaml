title: Ethos-U55 Fallback Delegation and SRAM Strategy
scenario: You are deploying a quantized vision model to an ARM Cortex-M7 + Ethos-U55 (Corstone-300) subsystem. The platform features a 480 MHz Cortex-M7 and an Ethos-U55 NPU configured for 256 MACs/cycle, sharing a strict 512 KB of SRAM. During TFLite to Vela compiler conversion, you notice a custom activation block is unsupported by the NPU and must fall back to the Cortex-M7.
question: How would you design the model conversion and runtime delegation strategy to handle this fallback without exceeding the 512 KB SRAM limit or causing severe latency bottlenecks?
details:
  realistic_solution: The optimal design evaluates avoiding the fallback entirely by replacing the unsupported operators with NPU-native equivalents (e.g., standard ReLU) during model authoring. If the fallback is unavoidable, the candidate should architect a sub-graph splitting strategy where the Vela compiler statically schedules the NPU portions, and a custom memory planner overlaps the M7 tensor arena with the NPU's working memory, ensuring peak memory usage during the context switch remains under 512 KB.
  common_mistake: |
    **The Pitfall:** Assuming CPU fallback only affects latency while ignoring memory implications.
    **The Rationale:** Candidates fail to realize that crossing the NPU-CPU boundary forces intermediate tensors to be fully materialized in the shared 512 KB SRAM, bypassing the NPU's internal buffering.
    **The Consequence:** Unpredictable out-of-memory (OOM) errors during inference.
  napkin_math: |
    - Intermediate tensor at fallback: 112x112x32 (int8) = 401,408 bytes (~392 KB).
    - Remaining SRAM for RTOS, stack, NPU command stream: 512 KB - 392 KB = 120 KB.
    - Fallback to 480 MHz M7 (0.5 MAC/cycle) for 5M MAC layer: 5,000,000 / (480,000,000 * 0.5) = ~20.8ms.
    - Ethos-U55 (256 MACs/cycle) execution: 5,000,000 / (480,000,000 * 256) = **~0.04ms**.
    - CPU fallback causes a **520x latency penalty** and severe memory risk.
