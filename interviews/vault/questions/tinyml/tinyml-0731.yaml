title: Flash Endurance Under Continuous Inference Logging
scenario: Your vibration monitoring sensor logs inference results to on-chip flash. The sensor runs 1 inference per second, 24/7.
question: How does the ML model's output dimensionality dictate the flash write rate, and how does the flash endurance budget determine the maximum model output complexity you can log?
details:
  realistic_solution: 'Flash endurance is dictated by the number of page erases, which is driven by the volume of data written. The ML model''s output tensor size is the primary variable. If you deploy a simple 4-class anomaly detector, the output is just 4 bytes plus a timestamp. If you deploy a 1000-class fine-grained diagnostic model, the output tensor is 1000 bytes, which massively accelerates flash wear.'
  common_mistake: |
    **The Pitfall:** Assuming flash memory is an infinite sink for small logs.
    **The Rationale:** Engineers think "1 MB of flash is huge" because they only consider static capacity, completely neglecting the physical page erase limits (endurance).
    **The Consequence:** Unbounded continuous logging triggers rapid NOR flash write amplification, destroying the hardware within months in the field.
  napkin_math: |
    **Assumptions & Constraints:**
    - Logging rate: 1 Hz (24/7).
    - Flash specs: 2 KB pages, 10,000 cycle endurance.
    - Dedicated logging space: 256 KB (128 pages).
    - Target lifetime: 5 years (157 million seconds).

    **Calculations:**
    - Total lifetime page erases: 128 pages * 10,000 cycles = 1.28 million erases.
    - Max erase frequency for 5 years: 157,000,000 sec / 1,280,000 erases = 122 seconds per page erase.
    - Max write budget: 2048 bytes (1 page) / 122 seconds = ~16 bytes/second.
    - Model overhead: A 1000-class model requires a 1000-byte tensor.

    **Conclusion & Interpretation:**
    - **Result: <= 12 bytes per inference (I/O-Bound)**. A 1000-byte tensor at 1 Hz will destroy the flash in ~30 days. The model's complexity is physically capped at <= 12 bytes per inference to survive 5 years.
