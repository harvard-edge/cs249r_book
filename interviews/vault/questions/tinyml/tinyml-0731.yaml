title: Flash Endurance Under Continuous Inference Logging
scenario: Your vibration monitoring sensor logs inference results to on-chip flash. The sensor runs 1 inference per second, 24/7.
question: How does the ML model's output dimensionality dictate the flash write rate, and how does the flash endurance budget determine the maximum model output complexity you can log?
details:
  realistic_solution: Flash endurance is dictated by the number of page erases, which is driven by the volume of data written. The ML model's output tensor size is the primary variable. If you deploy a simple 4-class anomaly detector, the output is just 4 bytes (INT8 probabilities) plus a timestamp = 8 bytes per inference. If you deploy a 1000-class fine-grained diagnostic model, the output tensor is 1000 bytes, which massively accelerates flash wear.
  common_mistake: |
    **The Pitfall:** Assuming flash memory is infinite for small models.
    **The Rationale:** Engineers think "1 MB of flash is huge, we can log whatever the model outputs" because they only consider capacity, not endurance.
    **The Consequence:** This ignores the physics of NOR flash write amplification and leads to hardware failure in the field.
  napkin_math: |
    - STM32L4 flash: 2 KB pages, 10,000 cycle endurance. Reserve 256 KB (128 pages) for logging.
    - Total lifetime page erases = 128 × 10,000 = 1.28 million erases.
    - Target 5 years of life = 157 million seconds.
    - Maximum erase frequency to survive 5 years = 157M / 1.28M = 122 seconds per page erase.
    - A 2 KB page filling every 122 seconds yields a max write budget of: 2048 bytes / 122 seconds = ~16 bytes per second.
    - At 1 Hz inference, the ML output tensor + metadata cannot exceed 16 bytes.
    - **Conclusion:** A 1000-class model (1000 bytes) will destroy the flash in ~30 days. You are physically constrained to a model with <=12 classes (assuming 4 bytes for timestamp).
