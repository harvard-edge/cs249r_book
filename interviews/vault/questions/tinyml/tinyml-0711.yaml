title: The Cache Miss Penalty
scenario: You're running a 400 KB INT8 model on a Cortex-M7 at 480 MHz with 16 KB I-cache and 16 KB D-cache.
  The model's weights are in flash (with 6 wait states for a cache miss). During profiling, you see inference
  takes 8ms with a warm cache but 22ms on the first run. Explain the 2.75× slowdown and calculate the
  cache miss rate.
details:
  realistic_solution: 'Cold vs warm cache explains the 2.75x gap. The 400KB model far exceeds the 16KB
    D-cache. First run: every weight fetch misses the cache, stalling 6 cycles per miss. With 400KB /
    32-byte cache lines = 12,500 lines but only 512 cache lines available, the miss rate on cold start
    approaches 100%. Steady-state miss rate: ~20-25% as the working set per layer (~20KB) exceeds cache
    by 1.25x. Total stall: 14ms = ~6.7M penalty cycles. Fix: place the hottest layers'' weights in DTCM
    (zero wait states). Moving just the top 3 layers (60KB) to DTCM cuts miss rate to ~10%, reducing inference
    to ~12ms.'
  common_mistake: '"The first run is slow because of initialization overhead — just ignore it." The slowdown
    persists on every inference if the model exceeds the cache, because the cache is cold for weights
    that were evicted between inferences.'
  napkin_math: 'Warm: 8ms. Cold: 22ms. Delta: 14ms = 6.72M stall cycles. Miss penalty: 6 cycles. Misses:
    1.12M. D-cache: 16 KB / 32-byte lines = 512 lines. Model: 400 KB / 32 bytes = 12,500 lines. Cache
    can hold 512/12,500 = 4.10% of model. Working set per layer: ~20 KB weights → exceeds cache by 1.25×.
    Steady-state miss rate: ~20-25%. Fix: DTCM placement of hot layers. If top 3 layers (60 KB weights)
    placed in DTCM: miss rate drops to ~10%, inference ≈ 12ms.'
  options:
  - The first run is slow due to TFLite Micro interpreter initialization overhead. Subsequent runs reuse
    cached interpreter state and skip the setup, achieving the 8ms baseline.
  - 'The 400 KB model far exceeds the 16 KB D-cache. Cold start: every weight fetch misses cache (6 wait-state
    penalty per 32-byte line). 12,500 cache lines needed vs 512 available. Total stall: ~6.7M penalty
    cycles = 14ms. Steady-state miss rate: ~20-25% (working set per layer ~20 KB exceeds cache by 1.25x).
    Fix: place the hottest layers (top 3, 60 KB) in DTCM for zero-wait-state access, reducing inference
    to ~12ms.'
  - The slowdown is caused by flash memory write-back operations that occur on first access. The flash
    controller must initialize its page buffers, which takes exactly 14ms for a 400 KB binary.
  - The 2.75x slowdown is due to branch prediction cold-start. The Cortex-M7's branch predictor has no
    history on the first run, causing pipeline stalls on every conditional branch in the inference loop.
  correct_index: 1
