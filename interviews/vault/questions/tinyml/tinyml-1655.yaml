title: TinyML Checkpoint Frequency and RPO
scenario: A TinyML vibration sensor writes its cumulative anomaly state to EEPROM periodically to survive random power resets.
question: Explain the relationship between the Recovery Point Objective (RPO) and the EEPROM checkpoint frequency.
visual:
  kind: svg
  path: tinyml-1655.svg
  alt: Timeline showing checkpoints spaced out evenly, with a bracket defining the RPO gap.
  caption: Checkpoint Interval vs Recovery Point Objective (RPO).
details:
  realistic_solution: The Recovery Point Objective (RPO) defines the maximum acceptable amount of data loss measured in time. To satisfy a strict RPO, the interval between EEPROM checkpoints must be strictly less than or equal to the RPO. More frequent checkpoints tighten the RPO but consume EEPROM write endurance faster.
  common_mistake: |
    **The Pitfall:** Confusing RPO with RTO.
    **The Rationale:** Candidates mix up acceptable data loss (RPO) with how fast the node reboots (RTO).
    **The Consequence:** Implementing checkpoint frequencies that fail to meet data recovery guarantees or unnecessarily burn out EEPROM endurance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - RPO requires data loss to be bound by a maximum time (e.g., 5 minutes).
    2. **Calculations:**
       - Maximum interval between checkpoints <= RPO.
    3. **Conclusion & Interpretation:**
       - **Result: Checkpoint Interval <= RPO.** Frequent checkpoints tighten RPO but consume EEPROM write endurance faster.
