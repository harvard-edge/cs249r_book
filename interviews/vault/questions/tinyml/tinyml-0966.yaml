title: ESP32-S3 PSRAM Bandwidth Bottleneck Analysis
scenario: An engineering team deployed an INT8 keyword spotting model on an ESP32-S3 microcontroller. The model requires 800 KB for weights and 150 KB for activations. To fit the memory, weights are placed in the external PSRAM and activations in the internal SRAM. During profiling, the inference latency is observed to be significantly slower than the theoretical compute time.
question: Why do ESP32-S3 INT8 weights in external PSRAM dominate latency despite 240 MHz vector compute?
details:
  realistic_solution: The degradation happens because the system shifts from being compute-bound to completely memory-bound. The external PSRAM communicates with the ESP32-S3 over an SPI/Octal-SPI bus, which has significantly lower bandwidth than the internal SRAM matrix. Even though the Xtensa core can crunch INT8 vectors at 240 MHz, it stalls constantly waiting for the 800 KB of weights to stream over the PSRAM bus for each inference pass.
  common_mistake: |
    **The Pitfall:** Assuming external PSRAM operates with latency and bandwidth comparable to internal SRAM.
    **The Rationale:** Candidates see PSRAM as memory-mapped and ignore the external serial bus bottleneck connecting it to the CPU.
    **The Consequence:** The fast vector compute units starve while waiting for weights, completely bottlenecking inference latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Bus: Octal SPI at 80 MHz.
    - Workload: 2,000,000 MACs, 8 INT8 MACs/cycle at 240 MHz.
    - Weight Data: 800 KB.

    **Calculations:**
    - PSRAM Peak Bandwidth: 80 MHz * 1 Byte = 80 MB/s.
    - PSRAM Transfer Time: 800 KB / 80 MB/s = 10 ms.
    - Compute Time: 2,000,000 / (240,000,000 * 8) = ~1.04 ms.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound**. The 10 ms memory transfer strictly dominates the 1 ms compute, idling the CPU.
