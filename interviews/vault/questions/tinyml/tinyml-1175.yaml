title: Privacy Guardrail Energy Budget Calculation
scenario: An on-device privacy guardrail runs on a Nordic nRF5340 (128 MHz app core, 256 KB SRAM, 1 MB flash) to prevent sensitive background speech from being transmitted over BLE 5.3. The 128 MHz app core consumes ~5mA of active current at a 3.0V operating voltage. The privacy guardrail requires 40ms of compute time per trigger and runs 500 times a day.
question: Calculate the daily energy budget (in millijoules) explicitly spent on enforcing this responsible AI requirement.
details:
  realistic_solution: The candidate should first calculate the active power consumption using P = V * I. Next, they must determine the energy per inference by multiplying the power by the execution time. Finally, multiplying by the daily execution count yields the exact energy overhead of the privacy policy, providing concrete numbers for an impact assessment.
  common_mistake: |
    **The Pitfall:** Failing to convert power to energy or neglecting operating voltage.
    **The Rationale:** Candidates often calculate "5mA * 40ms = 200" without realizing they are computing charge (μAh), not energy.
    **The Consequence:** This produces meaningless units, preventing an accurate cost-benefit analysis of the privacy guardrail's battery impact.
  napkin_math: |
    - **Active Power:** 3.0V * 5mA = 15 mW.
    - **Energy per Inference:** 15 mW * 40 ms = 600 μJ = 0.6 mJ.
    - **Daily Inferences:** 500 triggers/day.
    - **Total Daily Energy:** 0.6 mJ/inference * 500 inferences/day = **300 mJ**.
