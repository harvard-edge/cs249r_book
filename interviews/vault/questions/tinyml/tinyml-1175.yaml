title: Privacy Guardrail Energy Budget Calculation
scenario: To comply with data minimization policies, your team is deploying an on-device
  privacy guardrail on a Nordic nRF5340 (128 MHz app core, 256 KB SRAM, 1 MB flash)
  to prevent sensitive background speech from being transmitted over BLE 5.3. The
  governance framework mandates this local filtering model must run before any network
  transmission. The 128 MHz app core consumes ~5mA of active current at a 3.0V operating
  voltage. If the privacy guardrail requires 40ms of compute time per trigger and
  runs 500 times a day, calculate the daily energy budget (in millijoules) explicitly
  spent on enforcing this responsible AI requirement.
question: How much daily energy does the nRF5340 privacy guardrail consume when it
  runs 500 times per day?
details:
  realistic_solution: The candidate should first calculate the active power consumption
    using P = V * I. Next, they must determine the energy per inference by multiplying
    the power by the execution time. Finally, multiplying by the daily execution count
    yields the exact energy overhead of the privacy policy, providing concrete numbers
    for an impact assessment.
  common_mistake: Candidates often struggle with unit conversions, mistakenly calculating
    power instead of energy, or failing to isolate the specific cost of the guardrail
    from the rest of the application. Another common error is forgetting to incorporate
    the operating voltage when converting active current to power.
  napkin_math: Power = 3.0V * 5mA = 15mW. Energy per inference = 15mW * 40ms = 600
    microjoules = 0.6mJ. Total daily energy for the guardrail = 0.6mJ/inference *
    500 inferences/day = 300mJ.
