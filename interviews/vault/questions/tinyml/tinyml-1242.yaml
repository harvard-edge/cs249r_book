title: Federated Averaging Memory and Communication Sizing on ESP32-S3
scenario: We are deploying a cross-device federated learning system on a fleet of
  ESP32-S3 microcontrollers for smart home anomaly detection. Each device trains a
  local CNN with 150,000 parameters and syncs updates over WiFi. You need to size
  the memory buffers and evaluate the communication overhead for a federated averaging
  round, ensuring the process fits within the 512 KB SRAM and 8 MB PSRAM without stalling
  the 240 MHz Xtensa cores or draining the energy budget via prolonged WiFi transmission.
question: How should an ESP32-S3 federated learning client size memory buffers and
  communication for a 150K-parameter local CNN update?
details:
  realistic_solution: The correct approach heavily utilizes the 8 MB PSRAM for staging
    while keeping active computations in SRAM. The device computes INT8 weight deltas
    using the vector extensions, applies compression (like sparsity or further quantization)
    to the deltas, and stores them in PSRAM. The WiFi radio is only awakened to transmit
    the compressed payload in one burst, minimizing active transmission time.
  common_mistake: Candidates often assume gradients can be transmitted as 32-bit floats
    without compression, ignoring the severe energy cost of keeping the ESP32-S3 WiFi
    radio active. They also frequently overlook the memory layout, assuming all model
    copies (base, local, delta) can fit in the fast 512 KB SRAM alongside the RTOS
    and network stack.
  napkin_math: For 150K parameters at INT8, one model copy is 150 KB. Computing deltas
    requires the base model (150 KB) and local model (150 KB) = 300 KB, leaving little
    of the 512 KB SRAM for the OS/network stack (~150 KB). Deltas (150 KB) must be
    staged in the 8 MB PSRAM. Transmitting 150 KB raw over a 1 Mbps WiFi uplink takes
    (150 * 8) / 1000 = 1.2 seconds. Applying a sparse update strategy (e.g., top 10%
    of deltas) reduces the payload to 15 KB + indices (15 KB) = 30 KB, dropping transmission
    time to 240 ms and saving substantial power.
