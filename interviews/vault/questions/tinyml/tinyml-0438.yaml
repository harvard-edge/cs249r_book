title: The Transformer's Memory Spike
scenario: 'You are designing a keyword-spotting model for a Cortex-M7. You have two prototypes with similar parameter counts: a small CNN and a tiny Transformer. The input is a 160x160 spectrogram, which the Transformer processes using 4x4 patches. During execution, you use a memory profiler and observe that the Transformer''s peak memory usage spikes dramatically, causing an out-of-memory error, while the CNN runs fine.'
question: What is the most likely cause of this memory spike in the Transformer architecture?
details:
  realistic_solution: 'The self-attention mechanism is the cause. It computes an attention matrix of size `(Sequence Length × Sequence Length)`. This intermediate tensor must be stored in SRAM, and at 4 bytes/float, it alone consumes multiple megabytes. This quadratic memory scaling with sequence length makes Transformers much less memory-efficient than CNNs, whose memory usage scales linearly with input size.'
  common_mistake: |
    **The Pitfall:** Assuming parameter count dictates memory usage.
    **The Rationale:** Many engineers blame the Feed-Forward Network (FFN) layers or the patch embedding step because they equate memory usage directly to the number of model weights.
    **The Consequence:** The true culprit—the quadratically scaling intermediate attention tensors—is ignored, leading to failed deployments on memory-constrained edge devices.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SRAM limit: 1 MB.
       - Input: 160x160 spectrogram.
       - Patch size: 4x4.
       - Datatype: float32 (4 bytes).
    2. **Calculations:**
       - Sequence Length (N): (160 * 160) / (4 * 4) = 1600.
       - Attention Matrix Size: N x N = 1600 * 1600 = 2,560,000 elements.
       - Memory required: 2,560,000 * 4 bytes = 10,240,000 bytes ≈ 10.24 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** The intermediate attention matrix requires ~10.24 MB, scaling quadratically and far exceeding the 1 MB SRAM, causing a catastrophic OOM error.
  options:
  - The sequence length N=1600 requires linear storage of ~6.4 KB, which fragments the heap.
  - The intermediate N×N attention matrix requires ~10.24 MB of memory, scaling quadratically with sequence length.
  - The 4x4 patch embedding creates a 160x160x16 tensor that consumes ~1.6 MB of SRAM.
  - The parameter count dictates a 1.02 MB footprint, causing an off-by-one out-of-memory error.
  correct_index: 1
