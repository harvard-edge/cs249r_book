title: The Transformer's Memory Spike
scenario: 'You are designing a keyword-spotting model for a Cortex-M7 with 1MB of SRAM. You have two prototypes
  with similar parameter counts: a small CNN and a tiny Transformer. The input is a 160x160 spectrogram,
  which the Transformer processes using 4x4 patches. During execution, you use a memory profiler and observe
  that the Transformer''s peak memory usage spikes dramatically, causing an out-of-memory error, while
  the CNN runs fine. What is the most likely cause of this memory spike in the Transformer architecture?'
question: "Why does a tiny Transformer on a 160x160 spectrogram overflow 1 MB SRAM while a small CNN runs?"
details:
  realistic_solution: The self-attention mechanism is the cause. It computes an attention matrix of size
    `(Sequence Length × Sequence Length)`. For a 160x160 input with 4x4 patches, the sequence length is
    `(160*160)/(4*4) = 1600`. The attention matrix is therefore `1600 × 1600`, which is 2,560,000 floating-point
    numbers. This intermediate tensor must be stored in SRAM, and at 4 bytes/float, it alone consumes
    `2,560,000 * 4 = 10.24 MB`, plus memory for the Q, K, and V matrices. This quadratic memory scaling
    with sequence length makes Transformers much less memory-efficient than CNNs, whose memory usage scales
    linearly with input size.
  common_mistake: Many engineers assume parameter count is the primary driver of memory usage. They might
    blame the Feed-Forward Network (FFN) layers or the patch embedding step. However, the true culprit
    in Transformers, especially on constrained devices, is the intermediate tensors, which don't appear
    in the parameter count.
  napkin_math: "1. **Calculate Sequence Length (N):** (160 * 160) / (4 * 4) = 1600. \n2. **Attention Matrix\
    \ Size:** 1600 × 1600 = 2,560,000 elements. \n3. **Memory:** 2,560,000 × 4 bytes = ~10.2 MB. This\
    \ far exceeds the 1MB SRAM, causing an OOM."
  options:
  - The Feed-Forward Network (FFN) layers have too many parameters.
  - The patch embedding convolution is inefficient and uses too much memory.
  - The intermediate N×N attention matrix requires memory that scales quadratically with sequence length.
  - The layer normalization operations require storing large running statistics.
  correct_index: 2
