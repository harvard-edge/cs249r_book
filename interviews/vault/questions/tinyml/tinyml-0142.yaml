title: The Tensor Arena Peak
scenario: You are optimizing a keyword spotting model for a Cortex-M4 microcontroller with 256KB of SRAM. During inference, the device crashes with an out-of-memory error. To debug this, you need to analyze the model's runtime memory usage.
question: What is the specific metric that defines the peak RAM requirement for a TensorFlow Lite for Microcontrollers model?
details:
  realistic_solution: The correct metric is the 'Tensor Arena Peak'. This is the maximum amount of RAM needed at any single point during inference. It's determined by finding the operator that requires the largest amount of memory to hold its input and output tensors concurrently. The TensorFlow Lite for Microcontrollers interpreter calculates this peak and allocates a contiguous block of SRAM (the 'tensor arena') of that size. The crash occurs because this peak size exceeds the available 256KB of SRAM.
  common_mistake: |
    **The Pitfall:** Believing the peak RAM required is the sum of all activation tensors.
    **The Rationale:** Engineers abstract away dynamic memory reuse, forgetting that memory buffers are overwritten after an operator finishes.
    **The Consequence:** Models are excessively pruned or rejected because their sum of activations exceeds SRAM, even though their peak concurrent memory easily fits.
  napkin_math: |
    - **Layer 1**: Input 1 KB, Output 4 KB. Peak = 5 KB.
    - **Layer 2**: Input 4 KB, Output 8 KB. Peak = 12 KB.
    - **Layer 3**: Input 8 KB, Output 2 KB. Peak = 10 KB.
    - **Tensor Arena Peak**: max(5, 12, 10) = **12 KB**.
  options:
  - The total size of the model's weights in flash memory.
  - The sum of the sizes of all activation tensors throughout the model.
  - The peak concurrent memory for a single operator's inputs and outputs (Tensor Arena Peak).
  - The size of the single largest activation tensor in the model.
  correct_index: 2
