title: Evaluating Pruning Strategies on nRF5340
scenario: 'You are deploying a predictive maintenance CNN on a Nordic nRF5340 (128 MHz app core, 256 KB
  SRAM, 1 MB flash). The BLE 5.3 stack and OS consume 100 KB SRAM and 400 KB flash, leaving 156 KB SRAM
  and 600 KB flash for ML. The baseline dense model has 500,000 INT8 parameters (500 KB flash) and requires
  300 KB peak SRAM for activations. You must choose between Option A: 80% unstructured pruning, or Option
  B: 50% structured filter pruning (halving the channels). Which option do you deploy to minimize active
  power draw (~5mA) and satisfy memory constraints?'
question: "Which option do you deploy to minimize active power draw (~5mA) and satisfy memory constraints?"
details:
  realistic_solution: Option B (50% structured pruning) is the correct choice. Structured filter pruning
    physically reduces the dimensions of the network, which proportionally reduces both the stored weights
    and the intermediate activation maps. Furthermore, the 128 MHz app core lacks specialized sparse acceleration
    hardware, meaning unstructured sparse operations would suffer from branching overhead and irregular
    memory accesses, increasing latency and keeping the radio in the ~5mA active state longer.
  common_mistake: Candidates often choose unstructured pruning (Option A) because 80% sounds like a more
    aggressive reduction. They fail to account for the metadata storage overhead required for sparse matrices
    (like CSR format) and overlook that unstructured pruning does not reduce the activation maps, meaning
    peak SRAM requirements remain largely unchanged and exceed the device limits.
  napkin_math: 'Available SRAM: 256 KB - 100 KB (BLE) = 156 KB. Option A (80% unstructured): 100,000 non-zero
    weights (100 KB) + 16-bit index per weight (200 KB) = 300 KB flash. Peak SRAM remains ~300 KB because
    layer dimensions are unchanged, failing the 156 KB constraint. Option B (50% structured): Halving
    channels reduces weights by roughly 50% (to 250 KB flash) and roughly halves activation memory (to
    ~150 KB peak SRAM). 150 KB SRAM < 156 KB available, successfully fitting the device constraints.'
