title: The MCU Ridge Point
scenario: You're evaluating a Cortex-M4 microcontroller for a real-time audio keyword-spotting task. The datasheet specifies a peak compute performance of 336 MFLOPS and a memory bandwidth to its on-chip SRAM of 1.2 GB/s.
question: What is the approximate ridge point for this MCU?
details:
  realistic_solution: The ridge point is 0.28 Ops/Byte. This is the minimum arithmetic intensity (Ops/Byte) a workload must have to be compute-bound rather than memory-bound. It's calculated by dividing peak performance by memory bandwidth, ensuring units are consistent. For the Cortex-M4, with its very fast on-chip SRAM relative to its modest compute, the ridge point is extremely low. This indicates that almost any non-trivial ML kernel will be limited by compute, not by the speed of its memory access.
  common_mistake: |
    **The Pitfall:** Unit mismatch between MFLOPS and GB/s.
    **The Rationale:** Candidates fail to reconcile Mega (10^6) with Giga (10^9) or invert the formula to Bytes/Op.
    **The Consequence:** This leads to an answer off by a factor of 1,000, fundamentally misunderstanding the system balance.
  napkin_math: |
    * Peak Performance = 336 MFLOPS = 336,000,000 Ops/sec.
    * Memory Bandwidth = 1.2 GB/s = 1,200,000,000 Bytes/sec.
    * Ridge Point = 336,000,000 / 1,200,000,000 = 0.28 Ops/Byte.
    * **Result: The ridge point is 0.28 Ops/Byte.**
  options:
  - ~280 Ops/Byte
  - ~3.57 Bytes/Op
  - ~0.28 Ops/Byte
  - ~1,342 Ops/Byte
