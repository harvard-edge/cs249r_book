title: ESP32-S3 Real-Time Audio Anomaly Detection Pipeline
scenario: Design a continuous audio anomaly detection system for industrial machinery using an ESP32-S3.
  The system must sample audio, run an INT8 ML model to detect anomalies within a strict 10ms real-time
  deadline per frame, and occasionally transmit alerts over WiFi. Evaluate the architectural tradeoffs
  and design a task and memory allocation strategy across the 240 MHz dual-core Xtensa processor, 512
  KB SRAM, and 8 MB PSRAM to guarantee the 10ms deadline is never violated by latency spikes.
details:
  realistic_solution: Architect a strictly partitioned system. Pin the audio I2S DMA interrupts and the
    ML inference task to Core 0, and allocate all audio buffers, INT8 model weights, and inference state
    strictly within the 512 KB internal SRAM for deterministic access. Pin the WiFi stack and network
    alerting tasks to Core 1, using a lock-free queue in SRAM to pass anomaly alerts from Core 0 to Core
    1, ensuring the real-time pipeline is fully isolated from network jitter.
  common_mistake: Candidates often fail to isolate real-time and non-real-time domains, placing model
    weights in the 8 MB PSRAM to save space. They do not account for the fact that PSRAM cache misses
    or WiFi stack preemptions will cause an unpredictable Worst-Case Execution Time (WCET), causing the
    inference task to violate the strict 10ms deadline.
  napkin_math: 'Budget: 10ms deadline = 2.4 million cycles at 240 MHz. A typical 1M MAC INT8 model using
    vector extensions takes ~0.5ms in SRAM. If the 100KB model is placed in PSRAM, a 10% cache miss rate
    (10,000 misses at ~40 cycles each) adds 400,000 cycles (1.6ms) of unpredictable stall time. A WiFi
    task preempting the same core could introduce OS scheduling latencies >5ms. Core isolation and SRAM
    allocation guarantees the inference easily fits within the 2.4M cycle budget.'
