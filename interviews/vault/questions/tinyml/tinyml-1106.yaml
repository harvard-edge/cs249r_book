title: Diagnosing Power Drain from Memory Access
scenario: You deploy two different neural network architectures on an ARM Cortex-M4 (STM32F4) running at 168 MHz for a sensor monitoring task. Both models execute exactly 5 million INT8 MAC operations per inference and fit comfortably within the 1 MB flash and 256 KB SRAM. However, power profiling reveals that Model A (composed mostly of fully connected layers) consumes significantly more energy per inference than Model B (composed of standard convolutional layers).
question: Why does a fully connected Cortex-M4 model use more energy than a convolutional model with the same 5M MACs?
details:
  realistic_solution: The discrepancy is caused by the vastly different memory access patterns between the two architectures, exploiting the principle that memory access costs significantly more energy than compute. In Model A, each weight is loaded from memory and used exactly once per inference. In Model B, weights are reused across the spatial dimensions of the input feature map, dramatically lowering SRAM fetches.
  common_mistake: |
    **The Pitfall:** Assuming energy scales purely with MAC count.
    **The Rationale:** Candidates ignore the memory hierarchy and assume all ALU instructions consume uniform power regardless of data movement.
    **The Consequence:** They deploy fully-connected layers that rapidly drain the battery due to excessive SRAM fetches.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Models: 5M MACs each.
       - INT8 MAC ≈ 0.1 pJ. 32-bit SRAM read ≈ 5 pJ.
       - Model A (FC): 1 fetch per 4 MACs.
       - Model B (Conv): 16x spatial weight reuse (1 fetch per 64 MACs).
    2. **Calculations:**
       - FC Energy: (4 * 0.1 pJ) + 5 pJ = 5.4 pJ per 4 MACs -> 1.35 pJ/MAC.
       - Conv Energy: (64 * 0.1 pJ) + 5 pJ = 11.4 pJ per 64 MACs -> 0.18 pJ/MAC.
       - Ratio: 1.35 / 0.18 = 7.5x.
    3. **Conclusion & Interpretation:**
       - **Result: 7.5x more energy.** Model A is fundamentally **Memory-Bound** for energy, as continuous memory fetches dominate the core logic cost.
