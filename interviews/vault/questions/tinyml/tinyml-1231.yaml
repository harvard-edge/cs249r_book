title: 'In-Place Tensor Arena Optimization for Residual Blocks'
scenario: 'You are deploying a predictive maintenance CNN on an ARM Cortex-M4 (STM32F4) microcontroller with 256 KB SRAM and 1 MB flash. During model compilation, the static tensor arena allocation fails at a residual connection. The graph requires holding the output of the main branch (100 KB) and the skip connection (100 KB) simultaneously to compute their sum into a new output tensor (100 KB). This pushes the peak memory footprint to 300 KB, exceeding the 256 KB SRAM limit.'
question: 'How do you analyze this bottleneck and quantify an optimization to the memory planner to resolve it?'
details:
  realistic_solution: 'The optimal approach is to implement in-place operations within the tensor arena planner. Since element-wise addition consumes its inputs element-by-element, the output tensor can directly overwrite one of the input tensors (e.g., the main branch output) as it is computed. This eliminates the need for a separate 100 KB output buffer, significantly reducing the peak memory requirement and allowing the model to fit comfortably in SRAM.'
  common_mistake: 'Candidates often suggest pruning or quantizing the model further, ignoring that the bottleneck is purely a memory scheduling artifact. They miss that static tensor arena planners can use memory overlay techniques or in-place operations to avoid allocating new buffers for element-wise operations.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: STM32F4 with 256 KB SRAM.
    - Residual block memory overhead: Branch A (100 KB) + Branch B (100 KB) + Output (100 KB) = 300 KB.

    **Calculations:**
    - Initial peak SRAM requirement: 300 KB (Allocation fails by 44 KB).
    - Optimized in-place addition: Branch A is overwritten.
    - New peak SRAM requirement: Branch A/Output (100 KB) + Branch B (100 KB) = 200 KB.

    **Conclusion & Interpretation:**
    - **Result: 200 KB (Memory-Capacity-Bound)**. In-place memory planning achieves a 33% footprint reduction, allowing the model to fit comfortably within the 256 KB SRAM limit.
