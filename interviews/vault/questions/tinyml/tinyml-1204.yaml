title: Corstone-300 Roofline Optimization for Micro-Transformers
scenario: You are architecting a micro-Vision Transformer (mViT) for a smart camera application on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform running at 480 MHz with 512 KB of shared SRAM. The Ethos-U55 is configured for 256 MACs/cycle. Profiling reveals that the self-attention mechanism is severely underutilizing the NPU.
question: How should Corstone-300 fuse micro-transformer attention to move from memory-bound to compute-bound execution within 512 KB?
details:
  realistic_solution: A strong candidate will calculate the ridge point of the Corstone-300's roofline and identify that standard QK^T attention falls into the memory-bound region. They will design a flash-attention-style fusion architecture specifically tailored for the U55's command stream, computing blocks of the attention matrix and multiplying by V immediately, keeping the NxN intermediate scores entirely within the U55's internal buffers and raising the arithmetic intensity above the ridge point.
  common_mistake: |
    **The Pitfall:** Proposing naive batching or larger tile sizes to improve utilization without verifying the SRAM budget.
    **The Rationale:** Standard GPU-centric optimizations rely on increasing batch sizes, assuming memory is plentiful.
    **The Consequence:** The larger tile immediately overflows the 512 KB shared SRAM, causing a catastrophic fallback to slower external flash memory, massively increasing latency rather than reducing it.
  napkin_math: |
    - Peak Compute: 480 MHz × 256 MACs/cycle × 2 OPs/MAC = **245.76 GOPS**.
    - 64-bit SRAM bandwidth at 480 MHz: **3.84 GB/s**.
    - Roofline ridge point: 245.76 GOPS / 3.84 GB/s = **64 OPs/byte**.
    - Standard attention with N=64, d=32 (int8): Q, K reads = 4 KB, Score write = 4 KB, Compute = 2 × 64 × 64 × 32 = 262,144 OPs.
    - Arithmetic Intensity: 262,144 OPs / 8,192 Bytes = **32 OPs/byte**.
    - Since 32 < 64, it is memory-bound at 122.9 GOPS (50% utilization).
    - Fusing softmax and V-multiplication eliminates the 4 KB score write/read, reducing memory traffic by 50%.
    - New Intensity: 262,144 OPs / 4,096 Bytes = **64 OPs/byte**, pushing the workload past the ridge point to become compute-bound.
