title: The Unviable Harvester
scenario: You are designing an always-on sensor for a smart home. Your system's average power consumption is calculated to be 1.5 mW. To power it, you've selected a small indoor solar cell that can generate 150 µW under typical room lighting.
question: Can a 150 uW indoor solar cell power a 1.5 mW always-on smart-home sensor?
details:
  realistic_solution: The design is not viable. The solar cell generates only 150 µW (or 0.15 mW), which is an order of magnitude less than the 1.5 mW required by the system. The battery will inevitably drain, and the device will shut down.
  common_mistake: |
    **The Pitfall:** Believing a battery can solve a fundamental power deficit.
    **The Rationale:** Engineers sometimes think a rechargeable battery can compensate for a weak energy harvester, forgetting that batteries store energy but do not generate it.
    **The Consequence:** The system will inevitably drain the battery and fail, as the average power generated is vastly insufficient to cover the average power consumed.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Power Required: 1.5 mW.
       - Power Supplied: 150 µW.
    2. **Calculations:**
       - 150 µW = 0.15 mW.
       - Ratio: 1.5 mW / 0.15 mW = 10x.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound** (The system requires 10x more power than the solar cell can provide, making the design fundamentally unviable).
  options:
  - It's viable; the battery will store excess power for when it's needed.
  - It's not viable; the power supply is 10x lower than the requirement.
  - It's viable if you use a much larger battery.
  - It's not viable; the power supply is 100x lower than the requirement.
  correct_index: 1
