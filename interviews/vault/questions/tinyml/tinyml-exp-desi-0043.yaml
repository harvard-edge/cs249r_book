title: Hardware-Aware NAS Design for ARM Cortex-M4
scenario: You are designing a hardware-aware Neural Architecture Search (NAS) pipeline for a visual wake
  word application targeting an ARM Cortex-M4 (STM32F4) microcontroller. The platform features a 168 MHz
  clock, 256 KB of SRAM, 1 MB of flash, no FPU, and CMSIS-NN SIMD support (2x INT8 MACs/cycle). You need
  to architect the search space, hardware constraint models, and the search strategy to discover models
  that maximize accuracy while strictly adhering to the device's memory and compute limits. How do you
  construct the constraint estimators to evaluate peak memory and latency without deploying every candidate
  to physical hardware?
details:
  realistic_solution: The architecture must incorporate an analytical peak memory estimator that calculates
    the maximum lifecycle of tensors (input, output, weights, and residual buffers) per layer to strictly
    enforce the 256 KB SRAM limit. For latency, the NAS should use a lookup-table (LUT) based predictor
    built by profiling atomic block variants (e.g., MobileNet blocks) directly on the ARM Cortex-M4, natively
    accounting for CMSIS-NN's 2x INT8 SIMD MAC utilization efficiency rather than relying on raw FLOPs.
  common_mistake: Candidates often constrain the search space by total parameter count (Flash) and total
    FLOPs, incorrectly assuming FLOPs correlate perfectly with latency. They frequently fail to account
    for peak intermediate activation memory, which is the true bottleneck for the 256 KB SRAM constraint.
  napkin_math: 'For a candidate layer with 2.5 million INT8 MACs: theoretical minimum latency is 2,500,000
    / (168,000,000 cycles/sec * 2 MACs/cycle) = 7.44 ms. If an inverted bottleneck layer takes a 64x64x16
    input (65.5 KB) and expands it by 4x, the intermediate activation is 64x64x64 (262 KB). The peak memory
    is 65.5 KB + 262 KB + weights, which immediately exceeds the total 256 KB SRAM of the STM32F4. The
    NAS memory estimator must instantly reject this architecture without even evaluating its latency or
    accuracy.'
