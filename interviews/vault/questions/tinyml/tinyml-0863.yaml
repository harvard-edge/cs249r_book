title: 'Latency Decomposition: Optimize MCU Inference Latency from 200ms to Under
  50ms'
scenario: 'A deployed Cortex-M4 system (168MHz, 256KB SRAM) runs a speech command
  model (500K params, INT8, 9 MOPs) in 200ms. The target is <50ms. Profiling shows:
  Conv layers 140ms (70%), memory copies between layers 45ms (22.5%), other 15ms.
  Diagnose and quantify concrete optimizations.'
question: Which optimizations can move the 168 MHz Cortex-M4 speech model from 200
  ms toward the 50 ms target?
details:
  realistic_solution: 'Memory copies (45ms, 22.5%): caused by non-in-place activation
    buffers. Fix with in-place activation reuse: eliminate most copies → -40ms. Conv
    (140ms): enable CMSIS-NN optimized kernels if not already (can give 2-4× speedup
    on M4 DSP). With CMSIS-NN: 140/3 ≈ 47ms. New total: 47+5+15 = 67ms. Still over
    50ms. Add: reduce input resolution or model width by 20% → Conv to 37ms. Total:
    57ms. Or overclock M4 to 216MHz (10% gain): 67×(168/216) = 52ms. Combination:
    47ms.'
  common_mistake: Trying to quantize further (already INT8) or prune aggressively
    without first addressing the memory copy overhead from SRAM ping-pong buffers.
  napkin_math: 'Original: 200ms. Memory copies → in-place: 200-40=160ms. CMSIS-NN
    kernels: Conv 140→47ms, total 160-93=67ms. Width reduction 20%: Conv ops scale
    quadratically with channels: 0.8²=0.64× → 47×0.64=30ms. Total: 30+5+15=50ms. Exactly
    at target — add 5% margin with minor architecture change.'
