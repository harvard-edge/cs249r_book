title: Sizing an Audio Wakeword Model for Nordic nRF5340
scenario: Your team is deploying an always-on audio wakeword detector on a Nordic nRF5340 with a target of ~5mA active current. The chosen architecture is a Depthwise Separable CNN, and the system must run inference on the app core while the net core handles BLE 5.3 connectivity.
question: How should you size SRAM and flash for an always-on nRF5340 wakeword detector while reserving resources for Zephyr, BLE, and audio buffers?
details:
  realistic_solution: A realistic approach reserves roughly 80 KB for the Zephyr RTOS, BLE IPC, and application state, plus 8 KB for a ping-pong audio DMA buffer. This leaves around 168 KB for the TFLite Micro tensor arena to hold peak activations. For flash, since OTA updates require dual-banking, the 1 MB flash is halved, leaving about 300 KB for the model weights after the bootloader and firmware are accounted for. The model should be INT8 quantized to maximize this remaining budget.
  common_mistake: |
    **The Pitfall:** Assuming the entire 256 KB SRAM is available for the ML model's tensor arena.
    **The Rationale:** Forgetting to account for the RTOS heap, network stack IPC overhead, audio DMA buffers, and flash partitioning required for over-the-air (OTA) updates.
    **The Consequence:** Deploying a model that throws Out-Of-Memory (OOM) errors during system initialization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total SRAM: 256 KB. Total Flash: 1 MB.
       - OS/App/BLE overhead: ~80 KB. Audio buffers: 8 KB.
       - Bootloader + App Firmware: ~200 KB.
    2. **Calculations:**
       - SRAM for Tensor Arena = 256 KB - 80 KB - 8 KB = 168 KB.
       - Flash partition for OTA (Dual-bank) = 1 MB / 2 = 512 KB per slot.
       - Flash for Weights = 512 KB - 200 KB = 312 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** A 250k parameter model in INT8 requires 250 KB of flash and <150 KB of peak activations, fitting safely within the hardware limits.
