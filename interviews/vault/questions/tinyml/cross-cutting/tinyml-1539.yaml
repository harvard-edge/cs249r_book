title: TinyML On-Device Review Spec
scenario: >
  A TinyML medical sensor adapts thresholds locally but cannot store raw patient data.
question: What review evidence is required before a TinyML medical sensor can adapt thresholds locally without storing raw data?
details:
  realistic_solution: |
    The spec should require bounded adaptation rules, audit counters, rollback thresholds, validation across patient subgroups, clinician override, firmware versioning, and proof that no raw data is persisted. Local adaptation must be constrained and observable despite privacy limits.
  common_mistake: |
    **The Pitfall:** Treating "no raw data stored" as sufficient safety evidence for local adaptation.
    **The Rationale:** Candidates assume privacy constraints are the only regulatory hurdle, ignoring model drift and safety boundary violations.
    **The Consequence:** The device may silently adapt to dangerous thresholds without any audit trail for clinicians.
  napkin_math: |
    **Assumptions & Constraints:**
    - No raw data storage allowed.
    - Audit counters needed for threshold shifts.

    **Calculations:**
    - 32 counters * 4 bytes/counter = 128 bytes.
    - 128 bytes easily fits in standard NVRAM.

    **Conclusion & Interpretation:**
    - **Result: Storage-Feasible (128 bytes)**. Lightweight counters provide auditability without violating privacy.
