title: On-Device Anti-Spoofing Guardrail Evaluation
scenario: Your team is deploying a voice-activated smart lock using the Nordic nRF5340. To comply with Responsible AI guardrails against adversarial attacks, you must evaluate two alternatives for an anti-spoofing filter. Strategy A deploys a 150 KB anti-spoofing model alongside the 700 KB primary acoustic model directly on the 128 MHz app core. Strategy B uses the BLE 5.3 radio to transmit a 16 KB audio snippet to a companion smartphone for cloud-based guardrail verification before unlocking. Which alternative is better and why?
question: Should an nRF5340 smart lock run a 150 KB anti-spoofing model locally or send 16 KB audio to a phone?
details:
  realistic_solution: Strategy B is preferable for the stated design because Strategy A is likely to exceed flash once the RTOS, BLE stack, application code, and model metadata are included. The two local models alone consume 850 KB of the 1 MB flash budget, leaving only about 174 KB before firmware overheads, so local anti-spoofing is a risky fit even though it would reduce dependency on the phone. Sending a 16 KB snippet over BLE adds latency and protocol overhead, but for an infrequent unlock event it is a reasonable constraint-driven tradeoff.
  common_mistake: |
    **The Pitfall:** Candidates often choose Strategy A to minimize latency and dependency on a phone.
    **The Rationale:** They fail to account for the total flash memory requirements of the RTOS and BLE stack.
    **The Consequence:** They may also overestimate the power penalty of BLE transmission for infrequent events like unlocking a door.
  napkin_math: |
    **Assumptions & Constraints:**
    Strategy A Flash: 700 KB (primary) + 150 KB (guardrail) = 850 KB. nRF5340 total flash = 1024 KB. Zephyr, BLE, application code, metadata, and update margin can easily require 200-250 KB or more.
    **Calculations:**
    Strategy A remaining flash = 1024 KB - 850 KB = 174 KB. If firmware overhead is 200-250 KB, the design is short by roughly 26-76 KB before adding alignment, model metadata, or update margin. Strategy B BLE payload: 16 KB = 128 kbits. With protocol overhead and connection behavior, effective throughput may be below the 1 Mbps PHY rate; at about 0.5-1.0 Mbps, airtime is roughly 128-256 ms. At 5 mA and 3 V, radio-active energy is approximately 15 mW * 0.128-0.256 s = 1.9-3.8 mJ, plus connection/setup overhead and phone/cloud latency.
    **Conclusion & Interpretation:**
    Strategy B is the better alternative under these constraints because Strategy A likely does not fit in flash. The BLE energy estimate is approximate, but the tradeoff is acceptable for low-frequency unlocking if the added end-to-end latency and phone/cloud dependency meet product requirements.
