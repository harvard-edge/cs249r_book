title: Floating-Point Emulation Overhead in Safety Guardrails
scenario: To comply with Responsible AI guidelines, your team added an out-of-distribution (OOD) detection guardrail to an anomaly detection system running on an ARM Cortex-M4 (STM32F4). The main INT8 neural network executes in 5ms. However, after adding the guardrail to compute Mahalanobis distances for three safety constraints on 128-dimensional embeddings, the execution time spiked to over 60ms.
question: Why does the Cortex-M4 OOD guardrail push latency past 60 ms, and how should the distance computation be changed?
details:
  realistic_solution: The root cause is that the OOD guardrail was implemented using FP32 math. Because this specific Cortex-M4 configuration lacks a hardware FPU, all floating-point operations must be emulated in software via a soft-float library, taking hundreds of cycles per instruction. The solution is to quantize the guardrail logic to integer arithmetic.
  common_mistake: |
    **The Pitfall:** Blaming memory bandwidth for compute overhead.
    **The Rationale:** Candidates assume the 256 KB SRAM is thrashing during the covariance matrix lookups, ignoring the lack of an FPU.
    **The Consequence:** They miss the massive cycle penalty of software floating-point emulation, failing to correctly solve the latency regression.
  napkin_math: |
    **Assumptions & Constraints:**
    - CPU Clock: 168 MHz (168,000 cycles/ms).
    - 3 covariance matrix mults (128x128) = 49,152 FP32 MACs.
    - Soft-float emulation: ~200 cycles per MAC.

    **Calculations:**
    - Emulation Compute Cycles: 49,152 * 200 = 9,830,400 cycles.
    - Guardrail Latency: 9,830,400 / 168,000 = 58.5 ms.
    - Total Latency: 5 ms (Main NN) + 58.5 ms = 63.5 ms.

    **Conclusion & Interpretation:**
    - **Result: 63.5 ms Total (Compute-Bound)**. Soft-float emulation makes the guardrail severely compute-bound, necessitating INT8 quantization.
