title: On-Device Bias Guardrails for Edge Audio
scenario: You are designing a health wearable using voice biomarkers to detect respiratory anomalies on an ARM Cortex-M7 + Ethos-U55. The primary model fails on specific demographic dialects. To satisfy accountability frameworks, you must architect an on-device guardrail to identify out-of-distribution (OOD) dialects and safely reject predictions.
question: How should an on-device OOD guardrail for respiratory audio be partitioned between Cortex-M7 and Ethos-U55 within 512 KB SRAM?
details:
  realistic_solution: Architect a cascaded pipeline where the Cortex-M7 runs a lightweight feature extractor and classical anomaly detector (e.g., Isolation Forest) as the guardrail. The NPU is only triggered if the audio is in-distribution, ensuring privacy, mitigating bias, and avoiding shared SRAM bottlenecks.
  common_mistake: |
    **The Pitfall:** Proposing cloud-based OOD detection or running a secondary deep neural network on the Ethos-U55.
    **The Rationale:** Candidates default to deep learning solutions for OOD detection, ignoring strict privacy constraints and edge SRAM limits.
    **The Consequence:** Causes severe memory thrashing, exceeds the 512 KB shared SRAM limit, and violates edge privacy requirements.
  napkin_math: |
    **Assumptions & Constraints:**
    - Shared SRAM: 512 KB. Audio/RTOS overhead: 150 KB. Primary NPU model: 250 KB.
    - Cortex-M7 clock: 480 MHz. Frame: 20 ms.

    **Calculations:**
    - SRAM for guardrail: 512 KB - 150 KB - 250 KB = 112 KB.
    - Isolation Forest (100 trees): ~50 KB footprint (fits in 112 KB).
    - CPU cycles per frame: 480 MHz * 0.020 s = 9.6 million cycles.
    - Guardrail execution: ~2.5 million cycles.

    **Conclusion & Interpretation:**
    - **Result: 62 KB SRAM remaining and 7.1M cycles idle (Memory-Capacity-Bound)**. The architecture efficiently partitions workloads, keeping the system memory-compliant and the NPU asleep for OOD data.
