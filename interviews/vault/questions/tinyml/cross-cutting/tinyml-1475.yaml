title: 'Federated Learning on ESP32-S3: Scaling a TinyML Model for Non-IID Data'
scenario: >
  Your team is developing a TinyML application for anomaly detection on a network of 10,000 smart sensors, each powered by an ESP32-S3. Communication bandwidth over LoRaWAN is severely limited. The data generated by each sensor is highly non-IID.
question: How should ESP32-S3 federated averaging handle non-IID data and LoRaWAN limits across 10,000 TinyML sensors?
details:
  realistic_solution: >
    Implement FedProx or Scaffold to mitigate client drift from non-IID data. To address LoRaWAN constraints, utilize Top-K Sparsification or differential compression of model updates. Quantize gradients to 8-bit integers to fit within ESP32-S3 memory. Aggregate updates infrequently or on a schedule that respects LoRaWAN duty cycles, sending only sparse gradient deltas instead of full weights.
  common_mistake: |
    **The Pitfall:** Proposing standard federated averaging without modifications for non-IID data and LoRaWAN limits.
    **The Rationale:** Data scientists often default to standard FedAvg used in data centers or mobile phones, ignoring the strict payload limits and duty cycles of IoT radio protocols.
    **The Consequence:** Sending a full 10KB model update requires 40 messages, taking hours per device and completely choking the LoRaWAN network.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model Update Size: 10 KB = 10,240 bytes.
       - LoRaWAN Constraints: 250 bytes/message, 10 messages/hour.
    2. **Calculations:**
       - Messages per Update: 10,240 bytes / 250 bytes/msg = 40.96 (41 messages).
       - Time per Device: 41 messages / 10 messages/hour = 4.1 hours.
    3. **Conclusion & Interpretation:**
       - **Result: 4.1 hours per update.** A full weight update takes 4.1 hours of wall-clock time; communicating only sparse gradient deltas (<250 bytes) is mandatory. **Bottleneck: LoRaWAN Bandwidth.**
