title: The Sentient Fleet's Dilemma
scenario: Your fleet of 1 million vehicles is equipped with a driver monitoring system.
  The current on-device model suffers from a high false-positive rate in certain lighting
  conditions.
question: What hybrid learning strategy balances centralized data cost, federated
  privacy, and on-device power for the 1 million vehicle fleet?
details:
  realistic_solution: A principal-level response would first quantify the TCO of both
    options to frame the decision, demonstrating that the centralized approach is
    likely economically infeasible due to data transmission costs alone. The core
    of the proposal would then be a hybrid architecture utilizing federated learning.
  common_mistake: '**The Pitfall:** Naively choosing Federated Learning because ''it''s
    better for privacy'' without quantifying the economic and security trade-offs.

    **The Rationale:** Engineers lean into buzzwords rather than conducting a rigorous
    cost-benefit analysis.

    **The Consequence:** The team ignores second-order costs, such as massive cloud
    storage bills for the centralized path or the increased engineering complexity
    and power drain for the federated path.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Fleet Size: 1,000,000 vehicles.

    - Centralized Model: 1 MB raw data/day per vehicle.

    - Federated Model: 10 KB update/day per vehicle.

    - Cloud Ingress Cost: $0.09/GB.


    **Calculations:**

    - Centralized Data Volume: 1 MB * 365 * 1,000,000 = 365,000,000 MB/yr = 365 TB/yr.

    - Centralized Transfer Cost: 365,000 GB * $0.09 = $32,850/yr.

    - Federated Data Volume: 10 KB * 365 * 1,000,000 = 3,650,000 MB/yr = 3.65 TB/yr.

    - Federated Transfer Cost: 3,650 GB * $0.09 = $328.50/yr.


    **Conclusion & Interpretation:**

    - **Result: Communication-Bound.** Federated Learning updates use 100x less bandwidth,
    making the centralized approach economically inferior by orders of magnitude.

    '
