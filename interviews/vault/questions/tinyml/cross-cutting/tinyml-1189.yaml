title: Decentralized Anomaly Detection via Federated Averaging on nRF5340
scenario: A predictive maintenance system uses nRF5340 sensors. Each device locally updates an anomaly detection model and participates in Federated Averaging over BLE 5.3 without exceeding the 256 KB SRAM limit or depleting the battery (~5mA active current). Data is highly non-IID, and bandwidth is severely constrained.
question: Architect a cross-device federated learning system that handles non-IID data while strictly adhering to nRF5340 memory and power budgets.
details:
  realistic_solution: Utilize FedProx to handle non-IID divergence by adding a proximal term. Use INT8 quantization and LoRA (Low-Rank Adaptation) to update only a fraction of parameters, keeping SRAM footprint small and minimizing energy-intensive BLE transmissions.
  common_mistake: |
    **The Pitfall:** Using standard FedAvg with full model gradient transmissions.
    **The Rationale:** Ignoring the steep energy cost of BLE transmissions and SRAM limits, assuming standard FL algorithms scale down perfectly to edge nodes.
    **The Consequence:** Full model updates blow past the 256 KB SRAM limit and the massive data transfers rapidly drain the sensor battery, rendering the system undeployable.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM: 256 KB. Model: 100K params (INT8). Active current: 5mA.
    - BLE 5.3 throughput: ~1 Mbps (125 KB/s).

    **Calculations:**
    - LoRA update (rank-4): ~2K parameters (2 KB).
    - BLE Tx time for 2 KB: 2 KB / 125 KB/s = 16 ms.
    - Energy per Tx: 5 mA * 16 ms = 0.08 mAs.
    - Energy per local epoch (500 ms): 5 mA * 500 ms = 2.5 mAs.

    **Conclusion & Interpretation:**
    - **Result: 0.08 mAs per sync using LoRA (Energy-Bound)**. The system is entirely energy-bound by communication. PEFT/LoRA is required to minimize transmission energy while FedProx mitigates non-IID drift.
