title: The Flash Extraction Attack
scenario: An attacker has physical access to your deployed MCU. They want to extract your proprietary model weights from flash memory.
question: How can power side-channel analysis extract model weights by correlating power traces with MAC operations, and why does the model's arithmetic structure make this ML-specific attack possible?
details:
  realistic_solution: The attacker doesn't need to read the flash directly. They connect a high-resolution current probe to the MCU's power rail and record the power consumption while feeding known inputs to the ML model.
  common_mistake: |
    **The Pitfall:** Believing that Read-Out Protection (RDP) secures the model.
    **The Rationale:** Assuming flash memory cannot be read externally, but RDP only blocks JTAG debuggers, while side-channel attacks bypass digital locks entirely.
    **The Consequence:** Deploying a system vulnerable to physical side-channel extraction.
  napkin_math: |
    **Assumptions & Constraints:**
    - Attacker performs Differential Power Analysis (DPA).
    - Cortex-M4 SMLAD execution draws ~20 mA.
    - High-resolution oscilloscope (1 GS/s) captures traces.

    **Calculations:**
    - Current difference between multiplying 0x0000 and 0xFFFF is ~50 µA.
    - SNR allows >99% accurate extraction of an 8-bit weight matrix with ~10,000 traces.
    - Adding defenses (e.g., dummy operations, random delays) drasticly reduces SNR, requiring millions of traces.

    **Conclusion & Interpretation:**
    - **Result: DPA Extraction (Security-Bound)**. The mathematical structure of MAC loops allows physical side-channel extraction of weights unless hardware/software countermeasures obscure the power profile.
