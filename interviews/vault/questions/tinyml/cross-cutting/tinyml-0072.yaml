title: The Flash Extraction Attack
scenario: An attacker has physical access to your deployed MCU. They want to extract your proprietary model weights from flash memory.
question: How can power side-channel analysis extract model weights by correlating power traces with MAC operations, and why does the model's arithmetic structure make this ML-specific attack possible?
details:
  realistic_solution: The attacker does not need to read flash directly. They connect a high-resolution current probe to the MCU power rail, feed chosen inputs to the model, and align the resulting traces to the repeated MAC windows. Because each multiply-accumulate changes current draw slightly depending on the operands, differential power analysis or template matching can correlate those fluctuations with candidate weights. The attack is ML-specific because inference executes the same arithmetic pattern thousands of times, so the attacker gets a large number of aligned leakage samples from a fixed graph of MACs.
  common_mistake: |
    **The Pitfall:** Believing that Read-Out Protection (RDP) secures the model.
    **The Rationale:** Assuming flash memory cannot be read externally, but RDP mainly blocks direct debug/readout paths while side-channel attacks observe analog leakage instead of reading memory bits.
    **The Consequence:** Deploying a system that is still vulnerable to physical side-channel extraction.
  napkin_math: |
    **Assumptions & Constraints:**
    - Attacker performs differential power analysis or template matching.
    - They can choose inputs and align traces to repeated MAC windows.
    - Leakage amplitude, noise, and trace count are device- and board-dependent.

    **Calculations:**
    - For one candidate weight, the attacker predicts switching activity for chosen inputs and compares it with the measured MAC-window trace.
    - Repeating the same MAC structure across many inputs gives many aligned samples; averaging improves distinguishability approximately with sqrt(N) when the leakage model is valid.
    - The exact number of traces cannot be claimed from the prompt alone; it depends on probe bandwidth, noise, implementation, masking/randomization, and how well MAC boundaries can be aligned.

    **Conclusion & Interpretation:**
    - **Result: Side-Channel Risk**. The repetitive MAC structure gives attackers a practical correlation target, but recovery confidence and trace count require empirical measurement on the actual board.
