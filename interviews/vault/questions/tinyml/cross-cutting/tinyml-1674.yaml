title: RTC State Machine Duty Cycle
scenario: A Cortex-M4 predictive maintenance monitor captures 1 second of 10kHz vibration data every hour, runs inference for 0.1s, transmits for 0.2s, and sleeps.
question: How do you implement the state machine timing to maximize battery life, calculating the exact active duty cycle percentage?
details:
  realistic_solution: 'The state machine uses an RTC (Real-Time Clock) alarm to wake from Deep Sleep. State 1: Sample via DMA for 1.0s. State 2: Compute NN for 0.1s. State 3: TX via radio for 0.2s. State 4: Set RTC alarm for 3598.7s and enter Deep Sleep. Total active time is 1.3 seconds per 3600 seconds. The active duty cycle is 0.036%.'
  common_mistake: |
    **The Pitfall:** Using a busy-wait loop (`delay()`) during the 1-hour idle period.
    **The Rationale:** Candidates fail to utilize the low-power RTC alarm and Deep Sleep modes available on modern microcontrollers.
    **The Consequence:** The main oscillator remains running, draining the battery in days instead of years.
  napkin_math: |
    **Assumptions & Constraints:**
    - State 1 (Sample): 1.0s.
    - State 2 (Inference): 0.1s.
    - State 3 (Transmit): 0.2s.
    - Cycle Period: 1 hour (3600s).

    **Calculations:**
    - Active Time: 1.0s + 0.1s + 0.2s = 1.3s.
    - Duty Cycle: 1.3s / 3600s = 0.0003611.

    **Conclusion & Interpretation:**
    - **Result: Power-Bound**. The system achieves an ultra-low 0.036% active duty cycle by leveraging RTC Deep Sleep.
