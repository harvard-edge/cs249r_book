title: Depthwise Convolutions on MCU
scenario: A Cortex-M4 runs a depthwise separable convolution layer with a 3x3 kernel, 32 input/output channels, and a 16x16 spatial resolution.
question: What is the total MAC count compared to a standard convolution, and what are the minimal clock cycles required assuming 1 MAC/cycle?
details:
  realistic_solution: The depthwise step costs 3 * 3 * 32 * 16 * 16 = 73,728 MACs, and the pointwise step costs 32 * 32 * 16 * 16 = 262,144 MACs, for 335,872 MACs total. At 1 MAC/cycle, the separable layer therefore needs at least 335,872 cycles. A standard 3x3 convolution with 32 input and 32 output channels costs 3 * 3 * 32 * 32 * 16 * 16 = 2,359,296 MACs, or 2,359,296 cycles. Depthwise separable convolution reduces compute by about 7.0x.
  common_mistake: |
    **The Pitfall:** Multiplying the input and output channels together during the depthwise calculation.
    **The Rationale:** Treating the depthwise step incorrectly like a standard 3D convolution kernel instead of a channel-wise 2D filter.
    **The Consequence:** Dramatically overestimating the required operations for the depthwise step, leading to incorrect performance analysis.
  napkin_math: |
    **Assumptions & Constraints:**
    - Spatial map: 16x16 (256 pixels).
    - 3x3 kernel, 32 input/output channels.
    - 1 MAC/cycle.

    **Calculations:**
    - Depthwise MACs: 3 * 3 * 32 * 256 = 73,728.
    - Pointwise MACs: 32 * 32 * 256 = 262,144.
    - Separable Total: 335,872 MACs -> 335,872 cycles.
    - Standard Conv MACs: 3 * 3 * 32 * 32 * 256 = 2,359,296 MACs -> 2,359,296 cycles.
    - Reduction ratio: 2,359,296 / 335,872 = 7.02x.

    **Conclusion & Interpretation:**
    - **Result: 335,872 cycles vs 2,359,296 cycles (Compute-Bound)**. The separable layer needs about 7.0x fewer MACs and cycles at 1 MAC/cycle.
