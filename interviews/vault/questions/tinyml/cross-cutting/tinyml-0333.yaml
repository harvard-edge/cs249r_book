title: The TCO of a Sleeping Army
scenario: A fleet of 100,000 smart warehouse sensors consumes 10 µW for 99% of its runtime (deep sleep) and 10 mW for 1% of its runtime (active listening).
question: At $0.15 per kWh, what is the approximate total energy cost to operate this 100,000-sensor fleet for one year?
details:
  realistic_solution: The fleet costs about $14.44 per year to power. Each node averages (10 mW * 1%) + (10 µW * 99%) = 0.1099 mW, so 100,000 nodes average 10.99 W; over 8760 hours at $0.15/kWh, that is about 96.27 kWh or $14.44.
  common_mistake: |
    **The Pitfall:** Treating each sensor as if it draws 10 mW continuously.
    **The Rationale:** Engineers forget to duty-cycle-average the active and sleep states before scaling to the fleet.
    **The Consequence:** The annual cost estimate becomes about 100x too high, making the deployment look much more expensive than it is.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Energy unit cost: $0.15/kWh.
       - Fleet volume: 100,000 units. Period: 8760 hours.
       - Node duty: 10 mW (1%), 10 µW (99%).
    2. **Calculations:**
       - Normalized node power integral: (10 mW * 0.01) + (0.01 mW * 0.99) = 0.1 mW + 0.0099 mW = 0.1099 mW.
       - Fleet combined total power: 0.1099 mW * 100,000 = 10.99 W.
       - Fleet annual energy trace: 10.99 W * 8760 h = 96.272 kWh.
       - Realized capital cost: 96.272 kWh * $0.15 = $14.44.
    3. **Conclusion & Interpretation:**
       - **Result: Fleet power equates to a trivial ~$14.44 per year strictly via massive duty-cycling logic (Power-Bound).**
  options:
    - ~$1,314
    - ~$14,440
    - ~$14.44
    - < $0.01
