title: I2C Sensor Bandwidth Limitations
scenario: A vibration sensor array uses an I2C bus to continuously stream high-frequency data to a Cortex-M4 microcontroller.
question: What is the maximum sample throughput of the sensor array considering the bandwidth limitations of Standard-mode and Fast-mode I2C?
visual:
  kind: svg
  path: tinyml-1645.svg
  alt: Three sensors mapped to an I2C bus pointing to a Cortex-M4.
  caption: I2C shared bus topology.
details:
  realistic_solution: Standard-mode I2C operates at 100 kbps, and Fast-mode at 400 kbps. Accounting for the 10-bit per byte protocol overhead (start, stop, ACK/NACK bits), Fast-mode yields a maximum theoretical payload throughput of ~40 KB/s. This heavily bottlenecks high-frequency streaming (e.g., 10 kHz multi-axis vibration), requiring a transition to SPI for sustained ingestion.
  common_mistake: |
    **The Pitfall:** Equating raw bit rate with payload bandwidth.
    **The Rationale:** Candidates casually assume I2C operates in the Megabyte-per-second range like SPI or fail to account for the mandatory protocol overhead bits.
    **The Consequence:** They architect a shared bus topology that severely bottlenecks sensor ingestion, causing packet drops and corrupted high-frequency ML features.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fast-mode I2C clock = 400 kbps.
    - Protocol overhead = 10 bits per transmitted byte.

    **Calculations:**
    - Max Payload Throughput = 400,000 bits/sec / 10 bits/byte = 40,000 bytes/sec.
    - Max Throughput in KB/s = 40 KB/s.

    **Conclusion & Interpretation:**
    - **Result: I/O-Bound Ingestion**. Fast-mode I2C provides exactly ~40 KB/s of usable payload bandwidth, which completely precludes high-frequency multi-sensor streaming.
