title: Guardrail Latency Budget on Ethos-U55
scenario: A local PII filtering guardrail model must execute before transmitting audio to the cloud. You are deploying this on an ARM Cortex-M7 with an Ethos-U55 NPU. The system latency budget is 2.5 ms, but the Cortex-M7 requires 0.5 ms to orchestrate memory transfers.
question: What is the maximum theoretical MAC complexity the guardrail model can support to mathematically guarantee it meets the latency deadline?
details:
  realistic_solution: The calculation must completely isolate the execution window dedicated exclusively to the Ethos-U55 NPU. Subtracting the Cortex-M7's memory orchestration latency (0.5 ms) from the total budget (2.5 ms) defines the true NPU operational window. Multiplying the remaining temporal budget by the physical MAC throughput of the NPU yields the maximum allowable model complexity.
  common_mistake: |
    **The Pitfall:** Neglecting CPU memory orchestration overhead in the temporal budget.
    **The Rationale:** Candidates calculate raw NPU throughput based on the full 2.5 ms latency budget, completely ignoring the mandatory data preparation phase.
    **The Consequence:** The specified model fails real-time evaluations because the Cortex-M7's memory movement latency aggressively cannibalizes the compute window, resulting in dropped packets.
  napkin_math: |
    **Assumptions & Constraints:**
    - 480 MHz NPU, executing 128 MACs/cycle.
    - Total budget: 2.5 ms. M7 overhead: 0.5 ms.

    **Calculations:**
    - Available NPU Compute Window: 2.5 ms - 0.5 ms = 2.0 ms.
    - Available Cycles: 480,000,000 Hz * 0.002 seconds = 960,000 cycles.
    - Maximum MACs: 960,000 cycles * 128 MACs/cycle = 122,880,000 MACs.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound Deadline**. Accounting for system overhead constrains the guardrail model to exactly 122.88 Million MACs, mathematically validating its execution limits.
