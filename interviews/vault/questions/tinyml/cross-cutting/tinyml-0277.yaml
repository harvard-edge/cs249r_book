title: 'The TCO of TinyML Optimization'
scenario: 'You''re leading the ML hardware selection for a new fleet of 100,000 smart thermostats. You need to decide between two options based on the total cost of ownership (TCO) over an 8-year lifetime. Option A uses an off-the-shelf Linux module costing $5.00 per unit, drawing 500 mW, with no upfront engineering cost. Option B uses a custom Cortex-M4 MCU costing $1.00 per unit, drawing 50 mW, but requires a $150,000 upfront engineering investment to optimize the model. Energy costs $0.10 per kWh.'
question: 'Which option has a lower 8-year TCO and by how much?'
details:
  realistic_solution: 'The correct approach is to calculate the Total Cost of Ownership (TCO) for both options, which includes all Capital Expenditures (upfront hardware and one-time engineering costs) and Operational Expenditures (energy costs over the entire lifetime of the fleet). Option B is significantly cheaper because the large reduction in both hardware and energy costs for the 100,000-unit fleet vastly outweighs the one-time engineering investment.'
  common_mistake: 'Engineers often focus on only one part of the cost equation. A common mistake is to look only at the upfront hardware cost (CapEx), see the $150,000 engineering investment for Option B, and wrongly conclude Option A is cheaper. Another error is to focus only on the energy savings (OpEx) without considering the massive difference in initial hardware outlay. Finally, simple arithmetic errors, like failing to correctly convert milliwatts to kilowatts for the energy calculation, can lead to answers that are off by orders of magnitude.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet: 100,000 units, 8-year life, Energy: $0.10/kWh
    - Option A: $5.00/unit, 0.5W (0.0005 kW), $0 upfront
    - Option B: $1.00/unit, 0.05W (0.00005 kW), $150,000 upfront

    **Calculations:**
    - Option A CapEx = $500,000; OpEx = 0.0005 * 8760 * 8 * 0.1 * 100,000 = $350,400
    - Option A Total = $850,400
    - Option B CapEx = $250,000; OpEx = 0.00005 * 8760 * 8 * 0.1 * 100,000 = $35,040
    - Option B Total = $285,040
    - Savings = $850,400 - $285,040 = $565,360

    **Conclusion & Interpretation:**
    - **Result: $565,360 (OpEx-Bound)**. Option B is significantly cheaper because the reduction in hardware and energy costs outweighs the engineering investment.
  options:
  - 'Option B is cheaper by ~$315,000'
  - 'Option B is cheaper by $150,000'
  - 'Option B is cheaper by ~$565,360'
  - 'Option B is cheaper by over $5 million'
