title: On-Device PII Redaction Guardrail
scenario: You are designing an acoustic monitoring wearable for hospital staff using an ARM Cortex-M7 + Ethos-U55 (Corstone-300) with 512 KB shared SRAM. Strict privacy governance requires an on-device guardrail that detects and irreversibly scrambles spoken patient names (PII) before logging the audio to prevent data leaks.
question: How should Corstone-300 detect and redact spoken PII on-device while fitting DSP, CNN, and buffers in 512 KB SRAM?
details:
  realistic_solution: |
    Implement an owned-buffer pipeline rather than logging directly from the live DMA ring. The M7 writes audio into a double buffer, extracts Mel features into a separate scratch region, and invokes the Ethos-U55 on an INT8 PII-spotting CNN. Audio windows remain in a pending queue and are not persisted until the classifier result is known. If PII is flagged, the M7 overwrites the pending raw samples with irreversible redacted content, such as silence, deterministic tone masking, or a stored feature-only summary, then flushes the cache before any logging task can read the buffer. Buffer ownership must be explicit: DMA owns the capture buffer, DSP/NPU owns the feature buffer, and the logger only receives already-approved or already-redacted windows.
  common_mistake: |
    **The Pitfall:** Proposing complex transformer-based redaction models and ignoring shared memory contention.
    **The Rationale:** Candidates ignore the lack of external memory on typical microcontroller profiles and forget that the Cortex-M7 and Ethos-U55 share the same SRAM.
    **The Consequence:** The proposed models vastly exceed the 512 KB SRAM limit, and simultaneous DSP scrambling and NPU activation fetches cause severe memory bandwidth contention.
  napkin_math: |
    **Assumptions & Constraints:**
    - Audio: 16 kHz, 16-bit (32 KB/sec).
    - Window: 500 ms double-buffered.
    - MCU SRAM: 512 KB (128 KB for RTOS).
    - Ethos-U55: use a conservative sustained deployment estimate of 20 GMAC/s after memory and operator overheads.
    - CNN: 20 million MACs, 250 KB weights, 50 KB activations.

    **Calculations:**
    - Audio Buffer = 32 KB/sec * 0.5s * 2 = 32 KB.
    - DSP feature/scratch buffers: 64 KB.
    - Redaction/logging staging buffer: 32 KB.
    - Available SRAM = 512 KB - 128 KB (RTOS) - 32 KB (Audio) - 64 KB (DSP) - 32 KB (staging) = 256 KB.
    - CNN Footprint = 250 KB + 50 KB = 300 KB.
    - Full CNN footprint does not fit alongside DSP and logging buffers: 256 KB - 300 KB = -44 KB.
    - Required fix: tile/stream weights or reduce the CNN weight arena by at least 44 KB plus guard space.
    - Inference Latency at 20 GMAC/s sustained: 20M MACs / 20,000M MAC/s = 1 ms before scheduling overhead.

    **Conclusion & Interpretation:**
    - **Result: memory plan is the binding constraint, not peak compute**. The PII guardrail is feasible only if raw audio is withheld from persistence until classification completes and the CNN is tiled or compressed to coexist with DSP and redaction buffers in 512 KB SRAM.
