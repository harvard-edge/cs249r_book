title: Optimizing OOD Safety Guardrails on ESP32-S3
scenario: We are deploying an audio classifier on an ESP32-S3 (240 MHz dual-core, 512 KB SRAM, 8 MB PSRAM) for a smart home device. To comply with our Responsible AI framework, we implemented an Out-of-Distribution (OOD) detector as a guardrail to safely reject demographic outliers. The guardrail uses a 10-component Gaussian Mixture Model (GMM) on 128-dimensional FP32 embeddings.
question: How should the ESP32-S3 replace a 10-component FP32 GMM OOD guardrail that exceeds the 50 ms budget?
details:
  realistic_solution: The bottleneck is the memory footprint of the FP32 GMM covariance matrices exceeding the 512 KB SRAM, forcing slow PSRAM fetches. The optimal fix is to replace the GMM with an INT8 K-means centroid distance approach, keeping the guardrail localized entirely in SRAM and utilizing the ESP32-S3's vector extensions for rapid INT8 execution.
  common_mistake: |
    **The Pitfall:** Pruning the main model or arbitrarily reducing embedding sizes.
    **The Rationale:** Failing to trace the latency bottleneck to the FP32 covariance matrices spilling into the slow 8 MB PSRAM.
    **The Consequence:** Wasting effort on the main model while the guardrail continues to thrash memory, causing persistent latency violations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Worst-case GMM implementation uses full FP32 covariance matrices.
    - A diagonal-covariance GMM would be much smaller, so the latency diagnosis depends on confirming full covariance storage in the deployed guardrail.
    - Hardware: ESP32-S3 with 512 KB SRAM and 8 MB PSRAM.
    - OOD guardrail vector dimensions: 128.

    **Calculations:**
    - Full-covariance GMM footprint: 10 components * 128 * 128 values * 4 bytes = 655,360 bytes = 640 KiB before means, weights, and workspace.
    - This exceeds 512 KB SRAM, so the covariance data spills to PSRAM.
    - K-Means Fix (INT8): 10 centroids * 128 dim * 1 byte = 1,280 bytes, which fits in SRAM.
    - Raw centroid distance lower bound: 10 * 128 INT8 multiply/accumulate-style terms = 1,280 terms; at 16 terms/cycle this is 80 cycles before loads, comparisons, loop overhead, and interrupt effects.

    **Conclusion & Interpretation:**
    - **Result: Memory footprint drops from at least 640 KiB to 1.25 KiB (Memory-Bound)**. INT8 K-means removes the PSRAM-spill driver and makes the guardrail small enough for SRAM; the 80-cycle figure is only the arithmetic lower bound, not the full end-to-end latency.
