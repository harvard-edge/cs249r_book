title: SPI/DMA Pipeline Overlap
scenario: 'A vibration sensor samples data via SPI at 1 Mbps while running predictive maintenance inference on a Cortex-M4.'
question: 'How can a dual-buffer DMA system overlap SPI sensor reads with DSP computations to ensure zero dropped samples?'
details:
  realistic_solution: 'Allocate two 1KB memory buffers. Configure the DMA controller to write SPI data to Buffer A while the CPU processes Buffer B. At 1 Mbps, a 1KB buffer fills in roughly 8ms. The CPU computation for Buffer B must complete strictly in under 8ms; an interrupt then toggles the buffer pointers for the next cycle.'
  common_mistake: |
    **The Pitfall:** Using blocking CPU polling to execute the SPI reads.
    **The Rationale:** Candidates default to simple sequential API calls (e.g., HAL_SPI_Receive).
    **The Consequence:** The Cortex-M4 pipeline stalls waiting for SPI I/O, breaking deterministic inference latency and causing dropped sensor samples.
  napkin_math: |
    **Assumptions & Constraints:**
    - SPI throughput: 1 Mbps.
    - Dual buffers: 1 KB each.

    **Calculations:**
    - 1 Mbps = 1,000,000 bits/s / 8 = 125,000 Bytes/s = 125 KB/s.
    - Buffer fill time = 1024 Bytes / 125,000 Bytes/s = 0.008192 seconds = 8.19 ms.

    **Conclusion & Interpretation:**
    - **Result: Compute deadline must be strictly < 8.19 ms (Compute-Bound Hard Real-Time Constraint)**. DMA ping-pong buffers successfully hide I/O latency behind DSP/ML computations.
