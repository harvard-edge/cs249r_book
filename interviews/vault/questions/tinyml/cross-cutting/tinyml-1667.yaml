title: RTOS Preemption Deadline Miss
scenario: A keyword spotting model on a Cortex-M4 randomly drops audio frames. Compute takes 12ms per 16ms window, but a BLE transmission task occasionally preempts it for up to 5ms.
question: What is the root cause of the dropped frames, and what RTOS scheduling change fixes it?
details:
  realistic_solution: 'The dropped frames are caused by ordinary preemption, not priority inversion: 12ms compute + 5ms BLE execution = 17ms, exceeding the 16ms audio window. The fix is to make the audio DSP task the higher-priority real-time task and defer BLE work so it cannot preempt inference. BLE handling must run only after the 12ms inference finishes and must be bounded to the remaining 4ms slack, or split across later windows.'
  common_mistake: |
    **The Pitfall:** Assuming the MCU clock speed is too low and attempting to optimize the ML model.
    **The Rationale:** Candidates immediately blame inference compute cycles rather than investigating standard RTOS task priorities and preemption.
    **The Consequence:** Engineering time is wasted on unneeded model compression while the actual RTOS preemption bug remains unfixed, leading to continued dropped frames.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inference compute: 12ms.
    - Deadline window: 16ms.
    - BLE Preemption: 5ms.

    **Calculations:**
    - Total execution time: 12ms (inference) + 5ms (BLE preemption) = 17ms.
    - Deadline check: 17ms > 16ms.

    **Conclusion & Interpretation:**
    - **Result: 17ms Execution (Compute Bound / Scheduling)**. The uncontrolled 5ms BLE preemption forces the DSP task to miss its strict 16ms real-time deadline.
