title: 'RTOS Priority Inversion Diagnosis'
scenario: 'A keyword spotting model on a Cortex-M4 randomly drops audio frames. Compute takes 12ms per 16ms window, but a BLE transmission task occasionally preempts it for up to 5ms.'
question: 'What is the root cause of the dropped frames, and how can priority-inversion or scheduling fix it?'
details:
  realistic_solution: 'The dropped frames are caused by a scheduling deadline miss: 12ms compute + 5ms BLE preemption = 17ms, exceeding the 16ms arrival window. The fix is to lower the BLE task priority below the audio DSP task, or use an RTOS deferred interrupt handler to queue BLE messages until the 4ms idle window after inference completes.'
  common_mistake: 'Assuming the MCU clock speed is too low and trying to optimize the ML model, rather than fixing the RTOS task priorities.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Inference compute: 12ms.
    - Deadline window: 16ms.
    - BLE Preemption: 5ms.

    **Calculations:**
    - Total execution time: 12ms (inference) + 5ms (BLE preemption) = 17ms.
    - Deadline check: 17ms > 16ms.

    **Conclusion & Interpretation:**
    - **Result: 17ms Execution (Compute Bound / Scheduling)**. The uncontrolled 5ms BLE preemption forces the DSP task to miss its strict 16ms real-time deadline.
