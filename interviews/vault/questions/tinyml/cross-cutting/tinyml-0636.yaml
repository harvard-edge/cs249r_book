title: The Federated Learning Battery Drain Catastrophe
scenario: A fleet of 1 million battery-powered smart doorbells uses federated learning (FL) to update a 250KB model, achieving a one-year battery life. A new 400KB model is deployed to a 10% cohort. Within days, telemetry from the test cohort shows a sharp increase in radio energy and a collapsing projected battery lifetime.
question: Why did a modest increase in model size and accuracy lead to a catastrophic, non-linear failure in battery life, and what critical TCO factor did the team's plan ignore?
details:
  realistic_solution: The plan failed because it ignored the **Total Energy Cost of Communication**, which is often the dominant incremental power draw in battery-powered federated systems. The failure was not due to the increased *inference* cost, but to the larger payload sent during each federated learning update cycle. A 400KB model increases the radio payload by 60%; if the larger model also requires more syncs, retries, or longer convergence, that control-loop behavior compounds the drain beyond the raw model-size delta.
  common_mistake: |
    **The Pitfall:** Assuming the increased battery drain is caused by the extra MAC operations required to execute the larger 400KB model during inference.
    **The Rationale:** Engineers focus exclusively on computational FLOPs and ignore the dominant energy cost of wireless telemetry in edge systems.
    **The Consequence:** Teams mistakenly try to optimize model architecture instead of addressing the massive energy cost of uploading larger model weights over Wi-Fi/Cellular.
  napkin_math: |
    **Assumptions & Constraints:**
    - Battery capacity ≈ 10,000 Joules.
    - Old model = 250 KB.
    - New model = 400 KB.
    - Wi-Fi TX Energy ≈ 5 µJ/Byte.
    - FL syncs 4 times per day.

    **Calculations:**
    - Old TX energy per round = 250,000 * 5 µJ = 1.25 J.
    - Daily old cost = 1.25 * 4 = 5.0 J.
    - New TX energy per round = 400,000 * 5 µJ = 2.0 J.
    - Daily new cost = 2.0 * 4 = 8.0 J.
    - Radio-only lifetime from communication: 10,000 J / 5.0 J/day = 2,000 days old; 10,000 J / 8.0 J/day = 1,250 days new.
    - If the larger model doubles sync frequency to 8/day, radio cost becomes 2.0 J * 8 = 16.0 J/day, or 10,000 J / 16.0 J/day = 625 days.

    **Conclusion & Interpretation:**
    - **Result: 8.0 J/day at the stated 4 syncs/day, or 16.0 J/day if syncs double (Energy-Bound)**. The base model-size change linearly increases communication energy by 60%; the catastrophic fleet effect comes from ignoring communication energy and any FL control-loop amplification, not from inference compute.
