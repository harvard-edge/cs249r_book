title: 'Responsible AI on Constrained Edge Devices: Model Card & Guardrail Implementation'
scenario: You are deploying an industrial predictive maintenance anomaly detection system on a system featuring a Cortex-M7 CPU and Ethos-U55 NPU. Due to strict safety regulations, misclassifications carry severe consequences. Your team must integrate on-device Responsible AI guardrails within the constrained edge environment.
question: How should responsible AI practices and on-device guardrails be implemented for an Ethos-U55 industrial anomaly detector?
details:
  realistic_solution: |
    Implement a compact model card that records the deployed model version, intended operating envelope, validation data coverage, known failure modes, latency/WCET, SRAM/flash use, energy, false-positive and false-negative rates, threshold policy, and fallback behavior. On device, prioritize guardrails that are deterministic and cheap: input range checks, sensor-stuck checks, rate-of-change bounds, anomaly-score thresholds, confidence/reject thresholds, and a tiny quantized classifier only if simple rules are insufficient. Keep guardrail state and buffers small enough to leave SRAM for the primary model and runtime arena; use the Ethos-U55 for the primary inference path, but do not justify a complex guardrail merely from peak MAC throughput.
  common_mistake: |
    **The Pitfall:** Designing complex cloud-style explainability models (like SHAP) or heavy outlier detection ensembles for the edge.
    **The Rationale:** Candidates try to port traditional MLOps Responsible AI frameworks directly to microcontrollers.
    **The Consequence:** The guardrail models consume the entirety of the 512 KB SRAM and compute budget, leaving no resources for the actual primary anomaly detection model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Guardrail inference occurs at 10 Hz (100 ms deadline).
    - Ethos-U55 operates at 480 MHz with 512 MAC/cycle.
    - 512 KB total SRAM shared.

    **Calculations:**
    - 100 ms window = 0.1 seconds.
    - Theoretical Ethos peak compute per window = 480,000,000 Hz * 512 MACs/cycle * 0.1s = 24.576 billion MACs if peak throughput is sustained.
    - If main model uses 200 KB SRAM and guardrail uses 100 KB, remaining SRAM = 212 KB.
    - A simpler threshold/rule guardrail using 10 KB SRAM would leave 512 KB - 200 KB - 10 KB = 302 KB.

    **Conclusion & Interpretation:**
    - **Result: SRAM budget drives guardrail design**. Peak compute is not the binding proof; the guardrail should usually be thresholds, rules, or a tiny quantized model that preserves SRAM for the primary anomaly detector and runtime buffers.
