title: The Private Factory Floor
scenario: You are the founding ML Systems Engineer for 'FactorySense', a startup building predictive maintenance sensors for industrial machinery. Your current V1 product uses a simple, hand-tuned FFT-based anomaly detector on a Cortex-M4 MCU. It has secured a pilot with 10,000 devices, but customers are complaining that the high false positive rate is leading to costly, unnecessary inspections.
question: How can federated learning reduce false positives for FactorySense while staying within Cortex-M4 battery and business constraints?
details:
  realistic_solution: 'Synthesize technical design with business economics. The V1 FFT detector''s high false positives cost ~$500/inspection * 10 false alarms/device/year * 10,000 devices = $50M/year in unnecessary maintenance. A federated learning approach reduces false positives by personalizing models to each motor''s vibration signature. On-device training (last-layer fine-tuning) costs ~0.298J per update on Cortex-M4 at 168MHz. A standard 225mAh 3V coin cell holds ~2430J. Thus, each FL round consumes ~0.012% of the total battery capacity. Size the FL update frequency to 1 round per week to keep annual battery drain well under 1% while cutting false positives by 60-80%.'
  common_mistake: |
    **The Pitfall:** Fixating on ML algorithmic novelty while ignoring system costs and business risks.
    **The Rationale:** Engineers often hand-wave away the operational expense of false positives or the crippling cost of a premature, fleet-wide battery replacement cycle.
    **The Consequence:** Failing to connect the technical choice (on-device training) directly to its business consequence (power drain and TCO).
  napkin_math: |
    **Assumptions & Constraints:**
    - False Positive Cost: $50M/year.
    - FL Compute: 1G MACs at 168 MHz. Active power: 0.05 W.
    - Battery: 225 mAh at 3V = 2430 Joules.

    **Calculations:**
    - FL Latency: 1G MACs / 168M MACs/sec = ~5.95 seconds.
    - FL Energy per Round: 0.05 W × 5.95 s = 0.298 J.
    - Annual Energy (Weekly FL): 0.298 J × 52 weeks = 15.5 J/year.
    - Total Battery Drain: 15.5 J / 2430 J = 0.64%.

    **Conclusion & Interpretation:**
    - **Result: 0.64% drain (Energy-Bound)**. Executing FL rounds weekly consumes less than 1% of the coin cell's capacity annually while saving millions in false positive inspections.
