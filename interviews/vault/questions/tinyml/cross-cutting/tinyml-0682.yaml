title: The Federated Wearable ROI Proposal
scenario: You are the Principal ML Systems Engineer at a med-tech startup. Your company's flagship product is a 'smart patch' that detects early-stage neurological tremors using a small, on-device model. The current V1 product works, but the model is static and never updated.
question: What ROI and power analysis justifies or limits federated learning for the smart tremor-detection patch?
details:
  realistic_solution: 'First prove physical viability: last-layer fine-tuning on a low-power MCU with a 1G-MAC 10-epoch round at 168M sustained MAC/s needs ~84KB SRAM, takes ~5.95s, and consumes ~0.298J at 50mW. On a coin cell (~2430J total), 2000 full local FL rounds consume 596J, or 596/2430 = ~24.5% of the battery, so continuous on-device backprop is not a viable product strategy. The feasible alternative is federated analytics, not full FL: devices compute small tremor summaries or error counters and upload about 100 bytes weekly; the server aggregates those statistics, trains centrally, and ships signed model updates by BLE OTA. The ROI case is therefore reduced clinical relabeling and fewer field recalls from data-driven updates, while the product-life energy budget rules out frequent local training.'
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the technical implementation of Federated Learning.
    **The Rationale:** Engineers ignore severe power and memory limitations, proposing full backpropagation that is impossible on a coin-cell device.
    **The Consequence:** Designing a mathematically sound FL system that instantly drains the device battery in the real world.
  napkin_math: |
    **Assumptions & Constraints:**
    - Full FL fine-tuning round: 1G MACs total for a 10-epoch local round.
    - Sustained training throughput assumption: ~168M MAC/s after MCU kernel efficiency and memory stalls, so runtime is ~5.95s.
    - SRAM for last-layer training: ~84 KB for weights, activations, gradients, and optimizer scratch.
    - Active Power: 50mW.
    - Coin cell total energy: ~2430J.
    - Proposed full-FL cadence: 2000 local training rounds over the product life.
    - Federated analytics cadence: one lightweight summary upload per week.
    - Federated analytics payload: 100 bytes/week. BLE radio energy for such a short payload is negligible compared with compute; even budgeting 1 mJ/week gives 0.052J/year.

    **Calculations:**
    - Full round time: 1,000,000,000 MACs / 168,000,000 MAC/s = 5.95s.
    - Energy per round: 50mW * 5.95s = 0.298J.
    - Full backprop cost over product life: 2000 rounds * 0.298J = 596J.
    - Battery fraction for full backprop: 596J / 2430J = 0.245 = ~24.5%.
    - Federated analytics radio budget: 52 weeks * 0.001J/week = 0.052J/year.
    - Five-year analytics energy at that budget: 5 * 0.052J = 0.26J, which is 0.26J / 2430J = ~0.011% of the coin-cell energy.

    **Conclusion & Interpretation:**
    - **Result: 596J (~24.5% of battery) for full local training versus ~0.26J over five years for weekly analytics (Power-Bound)**. Full FL is limited by product-life battery drain and schedule risk; lightweight federated analytics supports product learning without putting backpropagation on the patch.
