title: Smart Doorbell MCU Queue Overflow and Tail-Drop Shedding Policy
scenario: A smart doorbell uses a Cortex-M4 at 100 MHz for wake-word detection. Audio frames arrive every 16ms, and feature extraction plus NN inference takes 1.3M cycles combined.
question: What is the maximum tolerable arrival rate before the queue length goes to infinity, and how do you design a shedding policy if arrivals burst to 100 frames per second?
details:
  realistic_solution: The service time is 1.3M cycles / 100 MHz = 13 ms per frame, so the service rate is about 76.9 frames per second. A stable queue requires the accepted arrival rate to be less than the service rate, λ < μ; otherwise the expected queue length grows without bound. For a 100 fps burst, accept at most about 76 fps and shed the rest. That means dropping at least 100 - 76.9 = 23.1 fps, or 23.1% of arrivals; a practical tail-drop policy that drops roughly 1 in 4 frames keeps the accepted rate below capacity.
  common_mistake: |
    **The Pitfall:** Relying on memory queue expansion to solve over-capacity data streams.
    **The Rationale:** Coming from cloud environments, engineers assume buffering can smooth out all data bursts, ignoring the strict physical limit of the MCU clock frequency.
    **The Consequence:** The queue grows unboundedly, inevitably leading to an Out-Of-Memory (OOM) fault and catastrophic system crash.
  napkin_math: |
    **Assumptions & Constraints:**
    - CPU clock: 100 MHz. Compute cost: 1.3M cycles/frame.
    - Burst arrival rate: 100 fps (10 ms/frame).
    - Stability condition for a single-server queue: accepted arrival rate λ must be less than service rate μ.

    **Calculations:**
    - Compute time per frame: 1,300,000 cycles / 100,000,000 Hz = 13 ms.
    - Service rate: μ = 1000 ms/s / 13 ms/frame = 76.9 fps.
    - Maximum tolerable accepted arrival rate: λ < 76.9 fps.
    - Required shedding at 100 fps: 100 - 76.9 = 23.1 fps.
    - Drop fraction: 23.1 / 100 = 23.1%, so dropping roughly 1 in 4 frames is sufficient.

    **Conclusion & Interpretation:**
    - **Result: Max accepted rate is below 76.9 fps (Compute-Bound)**. The failure mode is queue instability when arrivals exceed service capacity; a bounded buffer may later overflow, but the root cause is λ >= μ.
