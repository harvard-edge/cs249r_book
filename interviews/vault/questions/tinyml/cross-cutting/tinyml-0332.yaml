title: 'The Privacy Power Tax'
scenario: 'You are designing a battery-powered keyword spotting device using a Cortex-M4 microcontroller. To enhance user privacy, instead of sending raw 1-second audio clips to the cloud, the team proposes to compute audio features (MFCCs) locally and only transmit the much smaller feature vector.'
question: 'From a hardware physics perspective, what is the primary cost associated with this privacy-enhancing computation?'
details:
  realistic_solution: 'The primary cost is significantly increased energy consumption, which shortens battery life. The device must stay in a high-power active state for longer to perform the computation. Because active power (~10-50 mW) is thousands of times higher than deep sleep power (~1-10 µW), any increase in the duration of the active state drastically impacts the total energy budget and is the dominant operational cost.'
  common_mistake: 'Engineers often focus on secondary constraints like the additional Flash memory to store the feature extraction model or the raw compute latency in milliseconds. While these are factors, they are not the *primary* physical cost for a battery-powered device, which is governed by the total energy budget over its lifetime. They mistake a one-time BOM cost (memory) or a performance metric (latency) for the dominant operational cost (energy).'
  napkin_math: |
    **Assumptions & Constraints:**
    - Active power (Cortex-M4): ~50 mW
    - Deep sleep power: ~10 µW
    - Feature extraction active time increase: 100 ms to 500 ms (additional 400 ms)

    **Calculations:**
    - Power ratio = 50 mW / 10 µW = 50,000 µW / 10 µW = 5,000x difference
    - Extra energy burned = 50 mW * 400 ms = 20 mJ per event

    **Conclusion & Interpretation:**
    - **Result: 5,000x power penalty (Power-Bound)**. Increasing active computation time burns 5,000x more power than sleeping, drastically dominating the energy budget.
  options:
  - 'Increased Flash memory required to store the computation model.'
  - 'Increased network latency to transmit the computed features.'
  - 'Increased total energy consumption due to longer active time.'
  - 'Increased peak MFLOPS demand on the microcontroller.'
