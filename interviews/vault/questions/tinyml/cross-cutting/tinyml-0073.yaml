title: Secure Boot Chain for ML Models
scenario: >
  Your company ships a medical wearable running a cardiac arrhythmia detection model on an STM32U5. Regulatory compliance (IEC 62443) requires that only authenticated firmware and models can execute on the device. An attacker who gains physical access must not be able to replace the model with a malicious one.
question: How should an STM32U5 TrustZone wearable authenticate both firmware and cardiac model weights at boot?
details:
  realistic_solution: >
    The secure boot chain must cover firmware and model weights as separate signed artifacts. Boot sequence: (1) ROM bootloader verifies Stage 1 bootloader signature using OTP-fused public key. (2) Stage 1 verifies application firmware signature (RSA-2048, hardware-accelerated). (3) Application verifies model hash (SHA-256 of weights in flash) against a signed manifest. This prevents model-only tampering. Runtime integrity: re-hash a random 4 KB page every inference to detect fault injection. Attack cost: requires the private signing key, never stored on-device.
  common_mistake: |
    **The Pitfall:** Enabling Secure Boot for the firmware but ignoring the model weights.
    **The Rationale:** Engineers often equate "firmware" with the entire system state, forgetting that ML models are often stored as separate binary blobs in flash.
    **The Consequence:** An attacker can flash a malicious model while leaving the signed firmware intact, completely bypassing the hardware root of trust.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Boot Time Budget: 82 ms.
       - Storage Overhead: 256 B (FW Sig) + 256 B (Model Sig) + 32 B (Hash) = 544 B.
       - Processor: 160 MHz. SHA-256 cost: 15 cycles/byte.
    2. **Calculations:**
       - Runtime Integrity (4KB page): 4,096 B * 15 cycles/B = 61,440 cycles.
       - Time: 61,440 cycles / 160,000,000 Hz = 0.000384 s (0.384 ms).
       - CPU Overhead at 1 Hz: 0.384 ms / 1000 ms = 0.038%.
    3. **Conclusion & Interpretation:**
       - **Result: 0.038% CPU overhead and 544 bytes storage.** A separate model manifest and a runtime hash check guarantees model integrity. **Bottleneck: Security/Boot Time.**
