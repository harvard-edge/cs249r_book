title: On-Device Guardrails for Predictive Maintenance
scenario: You are deploying an anomaly detection system for predictive maintenance on an ARM Corstone-300 platform. Safety standards dictate that the system cannot autonomously shut down machinery without an on-device guardrail verifying the decision, and operators need a basic explanation of the fault.
question: Should the Corstone-300 safety guardrail be implemented as a secondary model on the Ethos-U55 NPU or as deterministic physical-bounds checks on the Cortex-M7, and why?
details:
  realistic_solution: The most robust architecture implements the safety guardrail as a deterministic, physical-limits check running strictly on the Cortex-M7. This provides a distinct failure domain from the Ethos-U55 NPU running the primary model. Explainability is cleanly achieved by having the M7 log the top three anomalous sensor values that triggered the threshold, rather than computing expensive attribution maps.
  common_mistake: |
    **The Pitfall:** Deploying redundant neural networks for safety guardrails.
    **The Rationale:** Candidates propose running a secondary NN for the guardrail on the NPU and using SHAP for explainability, assuming deep learning solves all safety requirements.
    **The Consequence:** They introduce shared failure modes, exhaust the limited shared SRAM, and exceed compute latency budgets with heavy attribution methods.
  napkin_math: |
    **Assumptions & Constraints:**
    - 512 KB shared SRAM.
    - Main NPU model uses 400 KB.
    - Secondary NPU model would use ~80 KB.
    - M7 physical-bounds check takes ~15 KB SRAM and 10,000 CPU cycles at 480 MHz.

    **Calculations:**
    - SRAM balance with NPU guardrail: 512 - 400 - 80 = 32 KB remaining (risks RTOS/IO exhaustion).
    - SRAM balance with M7 check: 512 - 400 - 15 = 97 KB remaining.
    - M7 check latency: 10,000 cycles / 480,000,000 Hz = 20.8 µs.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound Reliability**. The deterministic M7 check securely isolates the failure domain, adds negligible latency (20.8 µs), and preserves 97 KB of critical SRAM.
