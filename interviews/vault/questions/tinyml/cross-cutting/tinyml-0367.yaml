title: The Energy Cost of Learning on the Edge
scenario: You're designing a battery-powered smart sensor that uses Federated Learning to improve its model over time.
question: For a typical TinyML device, which single operation is the most significant contributor to its energy consumption during one federated learning cycle?
details:
  realistic_solution: 'Transmitting the updated model weights to the central server is by far the most energy-intensive operation. The energy required to power up the radio and send even a few kilobytes of data over a wireless protocol like BLE or LoRaWAN is substantially higher than the energy consumed by the highly-optimized, on-device computation for a few training iterations.'
  common_mistake: |
    **The Pitfall:** Assuming the "learning" computation is the most expensive operation.
    **The Rationale:** Engineers accustomed to cloud development are conditioned to think in terms of FLOPs and compute bottlenecks for ML training.
    **The Consequence:** Focusing optimization efforts purely on efficient backpropagation while ignoring the fatal battery drain caused by unoptimized wireless transmission intervals.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute Energy: A Cortex-M4 consumes ~10-30 mW during active computation (e.g., training iterations).
    - Radio Energy: A BLE or LoRa transmission spike easily draws 50-100+ mW and requires keeping the radio on for connection windows.

    **Calculations:**
    - Energy per Bit: Transmitting 1 bit over wireless can cost 1000x to 10,000x more energy than executing a single 32-bit MAC operation.

    **Conclusion & Interpretation:**
    - **Result: Communication (Power-Bound)**. Transmitting the model update absolutely dominates the total energy budget per cycle.
  options:
  - 'Reading the training data from on-chip Flash memory.'
  - 'Performing the on-device model training (computation).'
  - 'Transmitting the model update to the server.'
  - 'Maintaining the device in its low-power sleep state between cycles.'
