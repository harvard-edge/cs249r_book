title: Sizing an On-Device Anti-Spoofing Guardrail
scenario: You are deploying a biometric voice authentication system on an ARM Cortex-M4. Following an internal red-team audit, the Responsible AI committee mandates adding an on-device anti-spoofing guardrail model to prevent replay attacks. The main model currently uses 150 KB SRAM, 400 KB flash, and 150ms of execution time per 1-second audio frame. The system has a strict total latency limit of 400ms per frame to maintain real-time responsiveness.
question: What is the maximum allowable capacity (in memory and MACs) for the new INT8 guardrail model?
details:
  realistic_solution: |
    A strong architect deducts the already committed resources before sizing the guardrail. With 256 KB SRAM, 1024 KB flash, and a 400 ms frame budget, the remaining capacity after the main model and system overhead is 56 KB SRAM, 474 KB flash, and 200 ms of latency. The MAC cap is a throughput estimate, not a guaranteed model size: if profiling supports about 168 MMAC/s effective CMSIS-NN throughput on the chosen Cortex-M4 kernels, the absolute arithmetic ceiling is 33.6 MMACs in 200 ms, and an engineering design should leave margin below that for memory stalls and scheduling jitter.
  common_mistake: |
    **The Pitfall:** Allocating all remaining theoretical SRAM and peak analytical MACs exclusively to the guardrail network.
    **The Rationale:** Candidates mechanically subtract model footprint from total RAM, entirely forgetting OS overhead, network stacks, and hardware DMA buffers.
    **The Consequence:** The guardrail induces catastrophic memory corruption, stack overflows, and breaks the 400ms real-time deadline during physical deployment.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Capacity: 256 KB SRAM, 1024 KB Flash, 400ms latency.
    - Main Model: 150 KB SRAM, 400 KB Flash, 150ms latency.
    - Compute estimate: 168 MHz * 2 MACs/cycle * 50% effective utilization = 168 MMACs/sec.
    - System Overhead: 50 KB SRAM, 150 KB Flash, 50ms (DSP extraction).

    **Calculations:**
    - Available SRAM: 256 - 150 - 50 = 56 KB.
    - Available Flash: 1024 - 400 - 150 = 474 KB.
    - Available Latency: 400ms - 150ms - 50ms = 200ms (0.2s).
    - Nominal guardrail compute ceiling: 168 MMACs/sec * 0.2s = 33.6 MMACs.

    **Conclusion & Interpretation:**
    - **Result: 56 KB SRAM, 474 KB flash, and at most 33.6 MMACs nominal.** In practice the guardrail should target less than the computed MAC ceiling because the throughput assumption is kernel- and memory-layout-dependent.
