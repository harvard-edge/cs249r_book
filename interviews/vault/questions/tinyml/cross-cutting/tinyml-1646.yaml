title: MCU Weight Storage Hierarchy
scenario: A Cortex-M4 features 256KB of SRAM and 1MB of Flash. An audio model requires 500KB for its weights.
question: Explain how this memory hierarchy strictly dictates the storage and execution strategy for the model's weights.
visual:
  kind: svg
  path: tinyml-1646.svg
  alt: Bar chart showing a 500KB model fitting in 1MB Flash but overflowing 256KB SRAM.
  caption: Memory capacity vs model footprint.
details:
  realistic_solution: 'Because the 500KB weights exceed the 256KB SRAM capacity, they cannot be loaded entirely into RAM. They must reside in the 1MB Flash memory. During inference, the weights must either be executed directly from Flash (Execute-in-Place) or paged into the SRAM in small chunks, limiting bandwidth.'
  common_mistake: |
    **The Pitfall:** Assuming all weights are loaded into SRAM at boot time.
    **The Rationale:** Engineers used to desktop development assume application assets must be loaded into RAM before execution.
    **The Consequence:** The device throws an Out of Memory error during boot and fails to initialize.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Weight Size: 500 KB.
    - Available SRAM: 256 KB.

    **Calculations:**
    - Strategy: 500 KB > 256 KB -> Weights must reside in Flash.

    **Conclusion & Interpretation:**
    - **Result: Execute-in-Place Required (Memory-Bound).** Weights must reside in Flash and execute from there to prevent boot-time out of memory errors.
status: published