title: MCU Weight Storage Hierarchy
scenario: A Cortex-M4 features 256KB of SRAM and 1MB of Flash. An audio model requires 500KB for its weights.
question: Explain how this memory hierarchy strictly dictates the storage and execution strategy for the model's weights?
visual:
  kind: svg
  path: tinyml-1646.svg
  alt: Bar chart showing a 500KB model fitting in 1MB Flash but overflowing 256KB SRAM.
  caption: Memory capacity vs model footprint.
details:
  realistic_solution: Because the 500KB weights exceed the 256KB SRAM capacity, they cannot be loaded entirely into RAM. The weights should reside in the 1MB Flash memory and be read from Flash or copied/streamed into small SRAM buffers as each layer executes. XIP is relevant to program code, not to model weights in the code-execution sense; the design issue is weight storage and access bandwidth.
  common_mistake: |
    **The Pitfall:** Assuming all weights are loaded into SRAM at boot time.
    **The Rationale:** Engineers used to desktop development assume application assets must be loaded into RAM before execution.
    **The Consequence:** The device throws an Out of Memory error during boot and fails to initialize.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Weight Size: 500 KB.
    - Available SRAM: 256 KB.

    **Calculations:**
    - Weight footprint exceeds SRAM by 500 KB - 256 KB = 244 KB.
    - Flash capacity is sufficient: 500 KB < 1 MB.
    - Strategy: store weights in Flash and stream or stage the needed layer chunks into SRAM during inference.

    **Conclusion & Interpretation:**
    - **Result: Flash-Resident Weights (Memory-Bound).** The model weights cannot fit wholly in SRAM, so they remain in Flash and are accessed in chunks or through SRAM staging buffers during inference.
