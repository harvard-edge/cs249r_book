title: INT8 Cortex-M4 Footprint
scenario: An engineering team evaluates shifting from FP32 to INT8 quantization for a 50K-parameter LSTM on a Cortex-M4 with DSP instructions.
question: What is the exact SRAM footprint reduction and qualitative execution impact of quantizing a 50K-parameter model to INT8 on a Cortex-M4?
details:
  realistic_solution: INT8 quantization compresses the weight payload from 200KB down to 50KB, physically freeing 150KB of SRAM or Flash. It can also improve latency and throughput on a Cortex-M4 when paired with optimized quantized kernels such as CMSIS-NN, because the M4 DSP extension supports packed SIMD-style arithmetic such as dual 16-bit MAC instructions. The exact speedup depends on kernel implementation, packing overhead, and memory bandwidth; INT8 does not guarantee a blanket quad-8-bit MAC per clock or exponential acceleration.
  common_mistake: |
    **The Pitfall:** Overlooking the hardware SIMD DSP acceleration multiplier.
    **The Rationale:** Candidates accurately identify the 4x memory footprint reduction but mistakenly model the transition as a simple 1-to-1 scalar instruction replacement.
    **The Consequence:** They massively miscalculate real-time latency budgets, failing to realize INT8 uniquely activates hardware-level parallel execution on the Cortex-M architecture.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Size = 50,000 parameters.
    - FP32 = 4 bytes per parameter. INT8 = 1 byte per parameter.

    **Calculations:**
    - FP32 Memory: 50,000 * 4 = 200 KB.
    - INT8 Memory: 50,000 * 1 = 50 KB.
    - Total Savings: 200 KB - 50 KB = 150 KB.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound Compression**. The exact footprint reduction is 150 KB. Execution may improve with optimized Cortex-M4 DSP kernels, but the speedup is implementation-dependent rather than a guaranteed four-way INT8 MAC rate.
