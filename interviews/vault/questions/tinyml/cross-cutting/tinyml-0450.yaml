title: 'The Predictive Maintenance TCO Dilemma'
scenario: 'You''re a Staff ML Engineer at a company deploying 10,000 smart vibration sensors for industrial machinery. Each sensor needs its 256KB model updated. You must choose the most cost-effective data strategy over a 3-year lifetime, with a cellular data cost of $2.00/MB. Strategy A (Centralized): Devices upload 15KB of telemetry weekly, and download a new 256KB model monthly. Strategy B (Federated): Devices upload 30KB of model updates weekly, but never need to download the full 256KB model.'
question: 'Which 3-year update strategy is more cost-effective for 10,000 vibration sensors, centralized or federated?'
details:
  realistic_solution: 'The federated approach is significantly more cost-effective. While its weekly uploads are larger (30KB vs 15KB), it completely avoids the monthly 256KB full model download to 10,000 devices. The napkin math shows this download cost is the dominant factor in the TCO calculation, making the federated approach the clear winner on cost.'
  common_mistake: |
    **The Pitfall:** Focusing only on the weekly data upload size per device (15KB vs 30KB).
    **The Rationale:** Engineers assume the strategy with the smaller frequent upload is cheaper, forgetting that Total Cost = (Upload Cost × Freq) + (Download Cost × Freq).
    **The Consequence:** The massive, infrequent OTA download costs dominate the product's lifetime budget, wasting over $100,000.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet: 10,000 sensors over 3 years (156 weeks, 36 months).
    - Data cost: $2.00/MB.
    - Centralized: 15 KB upload/week, 256 KB download/month.
    - Federated: 30 KB upload/week, 0 KB download.

    **Calculations:**
    - Centralized upload: 15 KB × 156 weeks = 2,340 KB.
    - Centralized download: 256 KB × 36 months = 9,216 KB.
    - Centralized total per device: 11,556 KB ≈ 11.28 MB.
    - Centralized fleet cost: 10,000 × 11.28 MB × $2/MB ≈ $225,600.
    - Federated upload per device: 30 KB × 156 weeks = 4,680 KB ≈ 4.57 MB.
    - Federated fleet cost: 10,000 × 4.57 MB × $2/MB ≈ $91,400.
    - Cost difference: $225,600 - $91,400 = $134,200.

    **Conclusion & Interpretation:**
    - **Result: $134,200 Savings (Network-Bound)**. The federated strategy is drastically cheaper because avoiding monthly 256 KB model downloads dominates the TCO calculation.
  options:
    - 'The Centralized strategy is cheaper because its 15KB weekly upload is half the size of the 30KB federated upload.'
    - 'Their costs are roughly equivalent, as the higher cost of the centralized download is offset by its lower frequency.'
    - 'The Federated strategy is over $130,000 cheaper because it avoids the massive data cost of downloading the full 256KB model to 10,000 devices every month.'
    - 'The Centralized strategy is better because on-device training in the federated approach would drain the battery, leading to higher maintenance costs.'
