title: Energy Harvesting Checkpoints
scenario: An energy-harvesting tracker uses an intermittent power supply. A Cortex-M4 requires 500ms for a full MLP inference, but power is completely lost every 200ms on average.
question: What is the optimal layer-wise activation checkpointing strategy to non-volatile memory that maximizes forward progress while minimizing write overhead?
details:
  realistic_solution: The inference must be divided into at least three execution blocks of ~160 ms to guarantee progress between power failures. With 3 blocks you need 2 INTERMEDIATE checkpoints (after block 1 and after block 2); the final output is the inference result, not a checkpoint. Total writes per inference = 2 intermediate (each 2 KB at 1 ms = 2 ms total checkpoint overhead per inference). Excessive checkpointing (e.g., every 50 ms) would write 9 checkpoints per inference, wasting power without making forward progress.
  common_mistake: |
    **The Pitfall:** Counting the final output as a checkpoint.
    **The Rationale:** Candidates mistakenly add an extra checkpoint for the end of the inference.
    **The Consequence:** They report needing 3 checkpoints instead of the correct 2 intermediate checkpoints, overestimating write overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inference time: 500 ms.
    - MTBF: 200 ms.
    - 160 ms execution blocks.

    **Calculations:**
    - Blocks needed: ceil(500 / 160) = 4 blocks.
    - Wait, 500ms into 3 blocks of 166ms. 166ms < 200ms. So 3 blocks. Checkpoints = 2.
    - 2 * 1 ms = 2 ms overhead.

    **Conclusion & Interpretation:**
    - **Result: 2 intermediate checkpoints (I/O-Bound)**. 2 intermediate checkpoints are required, adding ~0.4% overhead.
