title: Energy Harvesting Checkpoints
scenario: An energy-harvesting tracker uses an intermittent power supply. A Cortex-M4 requires 500ms for a full MLP inference, but power is completely lost every 200ms on average.
question: What time-block checkpointing strategy to non-volatile memory maximizes forward progress while minimizing write overhead?
details:
  realistic_solution: The inference should be divided into 4 execution blocks of at most 160 ms so each block is comfortably below the 200 ms average power-loss interval. That requires 3 intermediate checkpoints, after blocks 1, 2, and 3; the final output is the inference result, not a checkpoint. Total checkpoint overhead per full inference is 3 * 1 ms = 3 ms. Checkpointing much more frequently, such as every 50 ms, would add many extra FRAM writes without improving the ability to complete the next block before likely power loss.
  common_mistake: |
    **The Pitfall:** Counting the final output as a checkpoint.
    **The Rationale:** Candidates mistakenly add an extra checkpoint for the end of the inference.
    **The Consequence:** They report needing 4 checkpoints instead of the correct 3 intermediate checkpoints, overestimating write overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inference time: 500 ms.
    - Power is completely lost every 200 ms on average.
    - Choose restartable execution blocks below that average loss interval; 160 ms leaves about 40 ms of timing margin.
    - Checkpoint write cost: 1 ms per intermediate checkpoint.

    **Calculations:**
    - Blocks needed: ceil(500 / 160) = 4 blocks.
    - Intermediate checkpoints needed: 4 - 1 = 3 checkpoints.
    - Checkpoint overhead: 3 * 1 ms = 3 ms.
    - Overhead fraction: 3 ms / 500 ms = 0.006 = 0.6%.

    **Conclusion & Interpretation:**
    - **Result: 3 intermediate checkpoints (I/O-Bound)**. Four 160 ms-or-smaller time blocks keep each restartable segment below the 200 ms average power-loss interval, while adding only 3 ms of write overhead, or about 0.6% over the 500 ms inference.
