title: Federated TinyML for Anomaly Detection on Cortex-M7/Ethos-U55
scenario: You are tasked with designing a federated learning system for on-device anomaly detection using highly sensitive sensor data. The target edge devices are severely resource-constrained, featuring a Cortex-M7 processor (480 MHz) paired with an Arm Ethos-U55 NPU and limited to 512 KB of SRAM. The goal is to train a global model using federated averaging across thousands of these devices, dealing with non-IID data and costly communication.
question: How would you design a federated architecture that minimizes communication overhead, handles non-IID data, and fits within 512 KB SRAM?
details:
  realistic_solution: 'A realistic solution would involve several techniques: 1. **Communication Efficiency:** Employ federated compression methods such as sparsification (e.g., pruning updates, sending only top-K gradients), quantization (e.g., 8-bit or 4-bit integer quantization for model weights and updates), and delta encoding (sending differences from the global model). Client selection based on data availability or network conditions can also reduce the total number of devices communicating in a round. 2. **Non-IID Data:** Implement FedProx or other personalized federated learning techniques that add a proximal term to the local loss function, pulling local models closer to the global model and mitigating divergence. Adaptive client sampling could prioritize devices with diverse data or those that haven''t contributed recently. 3. **Hardware Constraints:** Design highly compact neural network architectures (e.g., MobileNetv2 variants, EfficientNet-Lite) specifically for TinyML. Aggressively quantize models to 8-bit or even 4-bit fixed-point formats to minimize model size and NPU operations. Optimize the local training loop to use minimal batch sizes (e.g., batch size 1 or 2) to control peak activation memory. Leverage the Ethos-U55''s capabilities for efficient inference and, if possible, for accelerating quantized local gradient computations (if the framework supports it). Ensure the model''s total parameters + intermediate activations fit comfortably within 512 KB SRAM, accounting for OS and other application overhead.'
  common_mistake: |
    **The Pitfall:** Underestimating communication costs and ignoring SRAM constraints.
    **The Rationale:** Candidates often apply standard cloud federated averaging without considering edge bandwidth limits or memory constraints for optimizer states.
    **The Consequence:** The system fails due to memory exhaustion or bandwidth saturation, and the global model diverges due to non-IID data.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size (8-bit): 150,000 params * 1 byte = 150 KB.
    - Activations (batch size 1): ~100 KB.
    - Optimizer state (partial): ~200 KB.

    **Calculations:**
    - Update size (sparsified 10%, 4-bit): 150 KB * 0.1 * 0.5 = 7.5 KB.
    - Total Peak SRAM: 150 KB + 100 KB + 200 KB = 450 KB.

    **Conclusion & Interpretation:**
    - **Result: ~450 KB Peak SRAM (Memory-Bound)**. Total peak SRAM is ~450 KB (fits in 512 KB), and communication overhead is ~7.5 KB/round/device.
