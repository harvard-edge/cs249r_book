title: 'Differential LoRaWAN Updates'
scenario: 'A 50KB ML model needs a weight update over a LoRaWAN link transmitting at 1 kilobit per second.'
question: 'Analyze the full payload transmission time and design a differential weight update protocol to minimize OTA time.'
details:
  realistic_solution: 'A differential protocol computes a sparse diff of only modified weights. The server transmits an array of (offset, new_value) tuples. If only 5% of weights changed, the payload drops to ~3KB, drastically reducing transmission time and preserving battery.'
  common_mistake: |
    **The Pitfall:** Transmitting the entire serialized flatbuffer over the air.
    **The Rationale:** Engineers apply Wi-Fi/LTE OTA update paradigms to ultra-low bandwidth, high-packet-loss LPWAN networks.
    **The Consequence:** Massive battery drain, high packet loss probability, and constant duty-cycle violations over LoRa.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 50 KB.
    - Transmission rate: 1 kbps (1,000 bps).
    - Differential update size: 5% of weights.

    **Calculations:**
    - 50 KB = 51,200 bytes = 409,600 bits.
    - Full transmission time = 409,600 bits / 1,000 bps = 409.6 seconds.
    - Sparse diff size ≈ 3 KB (accounting for offsets) = 24,576 bits.
    - Diff transmission time = 24,576 bits / 1,000 bps = 24.57 seconds.

    **Conclusion & Interpretation:**
    - **Result: 24.57s (Bandwidth-Bound)**. A sparse differential update reduces OTA transmission time from ~410s to ~25s.
