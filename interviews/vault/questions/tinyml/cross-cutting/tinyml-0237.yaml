title: The TCO of Active Power
scenario: 'You''re designing a battery-powered smart doorbell that uses a low-power wake-word model to continuously listen. You must choose between two MCUs. MCU A costs $5 upfront and consumes 1 mW on average. MCU B costs $3 upfront and consumes 5 mW on average. The device must last for 2 years (730 days) on a single battery pack. The battery cost is $0.50 per Watt-hour (Wh).'
question: 'Which smart-doorbell MCU has the lower 2-year TCO: $5 at 1 mW or $3 at 5 mW plus battery cost?'
details:
  realistic_solution: 'The correct approach is to calculate the total energy each MCU will consume over the 2-year lifetime, determine the required battery capacity in Watt-hours, calculate the cost of that battery, and finally, add the MCU''s unit cost to find the TCO.'
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the upfront hardware CapEx and ignoring the battery OPEX.
    **The Rationale:** Engineers from cloud backgrounds forget that in battery-powered devices, the cost of the required battery capacity is a critical part of the Bill of Materials (BOM).
    **The Consequence:** Choosing the "cheaper" $3 MCU results in a massively more expensive product overall due to the bloated battery requirements.
  napkin_math: |
    **Assumptions & Constraints:**
    - Lifespan: 2 years (730 days).
    - MCU A: $5, 1 mW.
    - MCU B: $3, 5 mW.
    - Battery Cost: $0.50/Wh.

    **Calculations:**
    - MCU A Energy = 1 mW * 24 h/day * 730 days = 17,520 mWh = 17.52 Wh.
    - MCU A TCO = $5 + (17.52 * $0.50) = $5 + $8.76 = $13.76.
    - MCU B Energy = 5 mW * 24 h/day * 730 days = 87,600 mWh = 87.6 Wh.
    - MCU B TCO = $3 + (87.6 * $0.50) = $3 + $43.80 = $46.80.

    **Conclusion & Interpretation:**
    - **Result: MCU A is much cheaper at $13.76 vs $46.80 (Energy-Bound CapEx vs OpEx)**. Hardware costs are often dwarfed by battery op-ex at the edge.
  options:
  - 'MCU B is cheaper, with a TCO of $3.00, because it has the lower hardware cost.'
  - 'MCU A is cheaper, with a 2-year TCO of $13.76 vs $46.80.'
  - 'They are exactly the same TCO.'
  - 'MCU B is cheaper, with a TCO of $13.76 vs $46.80.'
  correct_index: 1
