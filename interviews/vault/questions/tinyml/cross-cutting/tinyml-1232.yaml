title: Federated Learning Memory Bottleneck on Corstone-300
scenario: You are deploying a cross-device federated learning update for a keyword spotting model on an ARM Cortex-M7 + Ethos-U55 system. The CPU and NPU share exactly 512 KB of SRAM. The model requires 250 KB of weights and 150 KB of intermediate activations for a full backward pass. The federated averaging communication stack requires an additional 150 KB buffer to receive the global model update, causing an Out-Of-Memory (OOM) error before training begins.
question: How should federated learning on Corstone-300 avoid SRAM OOM during local updates and global model reception?
details:
  realistic_solution: The optimal strategy is to avoid full backpropagation on the shared SRAM budget and redesign local learning as a parameter-efficient update, such as freezing the feature extractor and fine-tuning only the final classifier layer on the Cortex-M7. This reduces activation, gradient, and optimizer state while avoiding the false assumption that the Ethos-U55 can execute training kernels. The global model update should be received through a small network chunk buffer, verified incrementally, and applied in-place or into flash-backed staging rather than allocating a monolithic 150 KB communication buffer.
  common_mistake: |
    **The Pitfall:** Assuming the Ethos-U55 NPU can accelerate the backward pass, or suggesting external DRAM.
    **The Rationale:** Candidates forget that edge NPUs are strictly designed for inference acceleration, and suggesting external DRAM ignores the physical constraints of the MCU.
    **The Consequence:** Designing a training loop that attempts to run unsupported operations on the NPU, causing runtime crashes or proposing impossible hardware modifications.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM: 512 KB.
    - Initial resident requirements before training: 250 KB weights + 150 KB backward activations/gradients + 150 KB receive buffer = 550 KB.
    - The 150 KB communication buffer is for receiving a global update, not for storing backward-pass state.

    **Calculations:**
    - Optimization 1, parameter-efficient local update: freeze the feature extractor and train only the head, reducing resident backward activation/gradient memory from 150 KB to about 10 KB.
    - Optimization 2, streamed reception: replace the 150 KB resident receive buffer with a 4 KB chunk buffer, while the full update is validated incrementally and committed to the target weights or flash staging.
    - Optimized resident footprint during receive/update: 250 KB weights + 10 KB local training state + 4 KB network chunk buffer = 264 KB.
    - SRAM headroom: 512 KB - 264 KB = 248 KB for stack, tensor arena, RTOS, and metadata.

    **Conclusion & Interpretation:**
    - **Result: memory-bound unless training is parameter-efficient and reception is streamed**. The 4 KB buffer is only the resident network chunk, not a replacement for the full update semantics; full on-device backprop remains too expensive for this SRAM budget.
