title: 'The Economics of On-Device Learning'
scenario: 'You are designing the update strategy for a fleet of 1 million smart thermostats. Each device collects 100 KB of sensor data daily. The on-device model is 250 KB, and the global model requires a weekly update. You are evaluating two strategies: 1) Centralized (upload all raw data daily) and 2) Federated Learning (upload model weight deltas weekly).'
question: 'Which weekly update strategy sends less data for 1M thermostats: 100 KB raw daily uploads or 250 KB federated weights?'
details:
  realistic_solution: 'The correct approach is to calculate the total data volume for the entire fleet over a common time period (e.g., one day or one week) to accurately compare the aggregate telemetry requirements.'
  common_mistake: |
    **The Pitfall:** Comparing per-device data payloads directly (100 KB data vs. 250 KB model) and concluding that federated learning is heavier.
    **The Rationale:** Engineers ignore the temporal frequency (daily vs. weekly) and the scale of the fleet when calculating aggregate bandwidth costs.
    **The Consequence:** Incorrectly optimizing for the single-device payload size, resulting in massive, unexpected fleet-wide cellular telemetry costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1,000,000 devices.
    - Centralized = 100 KB raw data / day.
    - Federated = 250 KB weights / week.

    **Calculations:**
    - Centralized Daily Volume: 1,000,000 * 100 KB = 100 GB/day.
    - Federated Weekly Volume: 1,000,000 * 250 KB = 250 GB/week.
    - Federated Daily Average: 250 GB / 7 days ≈ 35.7 GB/day.

    **Conclusion & Interpretation:**
    - **Result: Federated Learning (Bandwidth-Bound)**. Federated Learning is ~3x more bandwidth efficient. Furthermore, partial client participation (e.g., 10%) drops FL load to 3.5 GB/day, proving that aggregate temporal frequency dictates the network OpEx.
  options:
  - 'Centralized: 100 GB/day, Federated: 250 GB/day. Centralized is better.'
  - 'Centralized: 100 MB/day, Federated: ~36 MB/day. The difference is minor.'
  - 'Centralized: 100 GB/day, Federated: ~36 GB/day. Federated is ~3x more efficient.'
  - 'Centralized: 100 KB/day, Federated: 250 KB/day. Centralized is better.'
