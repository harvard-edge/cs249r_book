title: Evaluating On-Device Privacy Guardrails for Audio ML
scenario: You are deploying a continuous audio keyword spotting model on a microcontroller for a consumer wearable. The product team requires on-device privacy guardrails to ensure no non-keyword audio is transmitted or locally stored, while also demanding an evaluation framework to audit false positive rates across diverse demographics. The system has a strict 256 KB SRAM limit and ~5mA active power constraint.
question: Which privacy guardrail approach fits the SRAM and power limits while enabling demographic false-positive audits?
details:
  realistic_solution: The right guardrail keeps raw audio and frame-level audio features on the device. Use a circular audio buffer only for inference, overwrite it continuously, and export only small aggregate audit telemetry such as clipped false-positive counters, confidence histograms, and device-side cohort labels collected with explicit user consent or through federated analytics. Add differential-privacy noise or secure aggregation before upload so demographic false-positive rates can be stratified without transmitting reconstructable audio-derived features.
  common_mistake: |
    **The Pitfall:** Proposing a secondary ML-based guardrail model or transmitting raw audio samples.
    **The Rationale:** Candidates fail to calculate that a secondary model exceeds SRAM limits, or that transmitting raw audio violates both the privacy and power constraints.
    **The Consequence:** The system crashes from Out-Of-Memory errors or violates the fundamental privacy requirements of the product.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM limit: 256 KB.
    - Primary model: 150 KB.
    - 3-second audio buffer: 16kHz, 16-bit.
    - Audit record: clipped/noisy aggregate counters, about 64 bytes per sync window.

    **Calculations:**
    - Remaining SRAM = 256 KB - 150 KB = 106 KB.
    - Audio Buffer Size = 3s * 16,000 Hz * 2 bytes = 96 KB.
    - Remaining for OS/Guardrail = 106 KB - 96 KB = 10 KB, which is enough for counters and clipping/noise state but not for a secondary ML model.
    - Raw audio telemetry per trigger would be 96 KB and violates the privacy requirement.
    - Aggregate audit telemetry per sync window is about 64 bytes, more than 1,500x smaller than the raw buffer.

    **Conclusion & Interpretation:**
    - **Result: On-device aggregation fits the memory and privacy constraints.** The device can audit false positives with consented cohort counters or federated analytics while never exporting raw audio or reconstructable audio features.
