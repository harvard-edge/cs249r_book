title: Recall Transformer Token Budget on TinyML Hardware
scenario: >
  During a TinyML interview, you are asked: for a transformer running on Cortex-M4 with 256KB SRAM, 2 layers, 4 heads, 32-dim head dimension, INT8 precision.
question: >
  What maximum transformer sequence length fits in a 128 KB KV cache on Cortex-M4 with the given layers, heads, and head size?
details:
  realistic_solution: >
    KV cache per token = 2 (K and V) × num_layers × num_heads × head_dim × precision. = 2 × 2 × 4 × 32 × 1B = 512 bytes per token. Budget: 128KB = 131,072 bytes. Max tokens: 131,072 / 512 = 256 tokens. Answer: 256 tokens maximum sequence length.
  common_mistake: |
    **The Pitfall:** Forgetting to account for both K and V tensors (factor of 2), or forgetting all layers' KV must fit simultaneously.
    **The Rationale:** Candidates rush the calculation and drop critical multipliers in the KV cache formula.
    **The Consequence:** The model OOMs during long sequences because the cache footprint was underestimated by half.
  napkin_math: |
    - **KV bytes per token:** 2 (K and V) × Layers (2) × Heads (4) × Head_dim (32) × 1 byte (INT8) = 512 bytes/token.
    - **SRAM Budget:** 128 KB = 131,072 bytes.
    - **Max Tokens:** 131,072 bytes / 512 bytes/token = **256 tokens**.
