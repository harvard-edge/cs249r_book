title: 'Federated Learning on ESP32-S3: Scaling a TinyML Model for Non-IID Data'
scenario: Your team is developing a TinyML application for anomaly detection on a network of 10,000 smart
  sensors, each powered by an ESP32-S3 microcontroller (240 MHz dual-core, 512 KB SRAM, 8 MB PSRAM). These
  sensors collect sensitive environmental data, and due to privacy concerns and intermittent connectivity,
  a federated learning approach is preferred. The goal is to train a small neural network model (e.g.,
  a few hundred KB in size) for anomaly detection. The data generated by each sensor is highly non-IID,
  reflecting local environmental conditions, and communication bandwidth over LoRaWAN is severely limited
  (e.g., 250 bytes per message, max 10 messages per hour per device). Design a federated averaging strategy,
  considering the constraints of the ESP32-S3 and the non-IID nature of the data, to achieve both model
  convergence and communication efficiency in a cross-device setting.
details:
  realistic_solution: A realistic solution would involve careful model quantization (e.g., 8-bit integer
    quantization) to fit within ESP32-S3's 512 KB SRAM and 8 MB PSRAM. For communication efficiency, explore
    techniques like sparsification or differential compression of model updates. To address non-IID data,
    consider variations of federated averaging such as FedProx or Scaffold, which add regularization terms
    to local objectives or incorporate control variates to mitigate client drift. The system should incorporate
    a robust communication protocol that aggregates updates infrequently or on a schedule that respects
    LoRaWAN duty cycles and message size limits, potentially sending only delta updates or quantized gradients.
  common_mistake: Ignoring the severe memory and processing constraints of the ESP32-S3 when selecting
    model architecture or optimization techniques, leading to out-of-memory errors or excessively slow
    local training. Another common mistake is proposing a standard federated averaging without modifications
    for highly non-IID data, which can lead to model divergence or poor generalization.
  napkin_math: Given 10,000 devices and a limited communication budget, calculate the total data volume
    for model updates per round. If a compressed model update is 10 KB, and each device can send 10 messages/hour
    with 250 bytes/message, then a single update (10 KB = 10,240 bytes) would require 10,240 / 250 = ~41
    messages. This means a full model update takes ~4.1 hours per device. If a global model update requires
    updates from a subset (e.g., 100 devices), then 100 devices * 4.1 hours = 410 hours of cumulative
    device-online time per global update. This highlights the need for extreme communication efficiency,
    perhaps only sending gradient deltas (e.g., 200 bytes) rather than full model weights, drastically
    reducing message count per update to 1.
