title: 'Model Format Conversion: Specify TFLM Deployment Checklist for Safety-Critical MCU Application'
scenario: 'A TFLite Micro model is being deployed on a Cortex-M7+Ethos-U55 for use in a safety-critical medical device (FDA Class II).'
question: 'How would you specify a production deployment checklist for a TFLite Micro model on Cortex-M7+Ethos-U55 (480MHz, 512KB SRAM) used in a safety-critical medical device?'
details:
  realistic_solution: 'Checklist: (1) Numerical accuracy: run 1000 test inputs, max absolute error < 0.5%. (2) Arena bounds: use GetTensorArena() post-inference, verify no overflow. Inject canary bytes. (3) Determinism: bit-identical output. (4) Latency: 10,000 cycles, P99 < 10ms. (5) HIL: 24-hour soak test at 360Hz. (6) Power: < 5mA avg.'
  common_mistake: |
    **The Pitfall:** Defining a software-only checklist without hardware-in-the-loop (HIL) tests.
    **The Rationale:** Candidates rely on emulation, missing MCU-specific issues like SRAM corruption, interrupt latency spikes, and DMA conflicts.
    **The Consequence:** The device fails FDA certification or experiences catastrophic runtime failures in production due to silent arena bounds overflows.
  napkin_math: |
    **Assumptions & Constraints:**
    - 360 Hz HIL soak test for 24 hours.
    - Latency limit P99 < 10ms.

    **Calculations:**
    - HIL soak: 24 hours * 3600 s/hr * 360 inferences/s = 31,104,000 inferences.
    - Latency test: 10,000 inferences * 10 ms = 100 seconds.

    **Conclusion & Interpretation:**
    - **Result: 31.1M inferences (System Reliability-Bound)**. Zero failures across 31.1M inferences required for FDA submission.
