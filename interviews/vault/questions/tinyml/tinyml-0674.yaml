title: The Silent Failure of the In-Car AI
scenario: You are the Staff ML Systems Engineer for a major automaker. Your team has deployed a keyword-spotting (KWS) model on a Cortex-M4 MCU in millions of vehicles. Six months after launch, you receive reports from Australia that the feature 'just doesn't work.' The head-unit receives a full OTA software update only once a year. Your task is to design a fault tolerance and recovery architecture for the KWS MCU itself to detect this silent data drift on-device and initiate a self-healing process.
question: What are your first three architectural decisions, and how do you justify them with quantitative analysis?
details:
  realistic_solution: 'The correct approach is to design a self-contained, multi-layered defense on the MCU that treats silent data drift as a fault condition.'
  common_mistake: |
    **The Pitfall:** Relying on cloud-centric debugging loops.
    **The Rationale:** Engineers propose logging raw audio or feature vectors to the cloud for retraining, completely ignoring the extreme memory and networking constraints of the MCU and the once-a-year OTA cycle.
    **The Consequence:** The architecture is un-deployable on a Cortex-M4, leaving millions of cars with broken voice controls for months.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Cortex-M4, 1MB Flash, 256KB SRAM.
       - Current Flash: Boot 32KB + RTOS 64KB + KWS 200KB + OTA 200KB = 496KB used. Free: 528KB.
       - Real-time constraint: Self-contained recovery required.
    2. **Calculations:**
       - Drift detector logic: ~2KB Flash, 12B SRAM.
       - Circuit breaker flags: 32B Flash.
       - Fallback classical model (e.g., lightweight GMM or heuristics): ~50KB Flash.
       - Total Recovery Footprint: ~55KB Flash, <1KB SRAM.
       - Space check: 55KB < 528KB (Safely fits).
    3. **Conclusion & Interpretation:**
       - **Result: Storage-Bound Design.** The MCU has sufficient headroom to run a multi-layered defense (drift detector -> circuit breaker -> fallback model) entirely on-device, successfully bypassing the rigid OTA constraint.
