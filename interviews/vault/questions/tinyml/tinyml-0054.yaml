title: Model Versioning on MCU
scenario: You manage a fleet of 500 RP2040 environmental sensors. After three OTA updates, your support team can't tell which model version a device is running. A customer reports false alarms, and you need to know if they're on model v1.2 or v1.4.
question: How can 500 RP2040 sensors expose model v1.2 versus v1.4 without an OS or filesystem?
details:
  realistic_solution: 'Prepend a 64-byte structured header to the model binary in flash: magic bytes (4B), model version (semver, 12B), SHA-256 hash of weights (32B), input/output tensor specs (8B), training timestamp (8B). At boot, the bootloader reads and validates this header in <3ms. For remote queries: expose version via a BLE GATT characteristic (20-byte response, single packet, <10ms). Fleet management: the gateway aggregates version reports and flags mismatches. Header overhead: 64 / 2,097,152 bytes of flash = 0.003%. This decouples model versioning from firmware versioning — you can update models independently.'
  common_mistake: |
    **The Pitfall:** Storing the version in a global variable in firmware.
    **The Rationale:** Candidates assume that the model version can be tracked identically to firmware versioning via code constants.
    **The Consequence:** This ties the model version to the firmware version. If you update only the model, the version string is stale. Furthermore, global variables live in SRAM and are lost on reset.
  napkin_math: |
    - Header overhead: 64 bytes per model. On 2 MB flash: 64 / 2,097,152 = 0.003% — negligible.
    - Boot-time header validation: read 64 bytes from flash (64 / 4 bytes per read × 2 cycles = 32 cycles) + CRC check of 114 KB model (114,000 × 3 cycles = 342,000 cycles at 133 MHz = 2.6 ms).
    - Total boot overhead: **< 3 ms**.
    - BLE version query: 20 bytes response, single BLE packet, **< 10 ms round-trip**.
