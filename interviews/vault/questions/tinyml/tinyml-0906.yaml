title: 'TinyML TCO Fluency: Rapid BOM and Power Budget for TinyML Product'
scenario: Estimate BOM cost and annual power cost for a TinyML smoke detector using Cortex-M7+Ethos-U55 ($8 MCU), photoelectric sensor ($2), LoRa module ($3), CR123A battery (1500mAh, $2), and enclosure ($5) = $20 BOM. Avg continuous current is 50μA. Alarm current is 200mA for 100ms every 10 years.
question: What is the expected battery life of this system at 3V, and does it meet a 10-year requirement?
details:
  realistic_solution: 'Alarm duty cycle: 100ms / (10yr * 365.25 * 24 * 3600 * 1000ms) = 100ms / 315,576,000,000ms = 3.17e-10. Alarm current contribution: 200mA * 3.17e-10 = 63.5 nA — negligible. Average current = 50μA. Battery life: 1500mAh / 0.050mA = 30,000 hours = 3.42 years. Well below 10-year target! Fix: reduce standby to 10μA using proper MCU sleep mode. Life: 1500/0.010=150,000hr=17.1yr. Problem solved. Annual power cost (if grid-powered): 50μA*3V*8760/1000=$0.00131/yr. For 1M deployed units: $1,315/yr total electricity — trivially cheap. BOM cost dominates all other costs.'
  common_mistake: |
    **The Pitfall:** Treating ultra-rare events as significant drivers of average power.
    **The Rationale:** Candidates include the 200mA alarm current in the average calculation without proper duty-cycle weighting over a 10-year span.
    **The Consequence:** Wasting time optimizing the alarm state when the true bottleneck is the 50μA continuous standby current.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Alarm cycle: 100 ms every 10 years.
       - Alarm Current: 200 mA. Average Current: 50 µA.
       - Battery: 1500 mAh.
    2. **Calculations:**
       - Alarm Duty Cycle: 100 / 315,576,000,000 ms = 3.17e-10.
       - Alarm Contribution: 200 mA * 3.17e-10 = 63.5 nA.
       - Current Battery Life: 1500 mAh / 0.050 mA = 30,000 hours = ~3.42 years.
    3. **Conclusion & Interpretation:**
       - **Result: ~3.42 years.** Standby current dominates the energy profile; alarm power is statistically irrelevant.
