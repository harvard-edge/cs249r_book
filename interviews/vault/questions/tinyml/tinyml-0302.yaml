title: The TinyML Memory Bottleneck
scenario: When analyzing the performance of a model on a microcontroller like a Cortex-M4, it's critical
  to know whether you're limited by compute or memory bandwidth. What is the approximate 'Ridge Point'
  for a typical Cortex-M4, which tells us its operational intensity in Ops-per-Byte?
details:
  realistic_solution: The correct answer is approximately 0.28 Ops/Byte. This low arithmetic intensity
    ridge point means the system is compute-bound for almost all ML workloads. Once the arithmetic intensity
    of a model exceeds 0.28 Ops/Byte, the system hits the compute ceiling, meaning the slow CPU ALUs are
    the bottleneck, not the relatively fast on-chip SRAM.
  common_mistake: Engineers often mistakenly assume that TinyML devices are memory-bound like datacenter
    GPUs. They guess a high Ops-per-Byte ridge point, failing to recognize that TinyML devices have relatively
    fast on-chip SRAM but very weak compute ALUs, making them almost always compute-bound.
  napkin_math: A 168MHz Cortex-M4 achieves 336 MFLOPS (168MHz × 2 ops/cycle via fused MACs). Its SRAM
    bandwidth is typically ~1.2 GB/s. The Ridge Point is Peak Compute / Peak Bandwidth = (336 × 10^6 FLOPs/s)
    / (1.2 × 10^9 Bytes/s) = 0.28 FLOPs/Byte. Any operation with an arithmetic intensity > 0.28 FLOPs/Byte
    (like most INT8 Convs which are ~2.0) is compute-bound. Operations < 0.28 are memory-bound.
  options:
  - ~300 Ops/Byte
  - ~10 Ops/Byte
  - ~0.2 Ops/Byte
  - ~1300 Ops/Byte
  correct_index: 2
