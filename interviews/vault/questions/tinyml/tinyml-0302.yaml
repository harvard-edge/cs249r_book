title: The TinyML Memory Bottleneck
scenario: When analyzing the performance of a model on a microcontroller like a Cortex-M4, it's critical to know whether you're limited by compute or memory bandwidth.
question: What is the approximate 'Ridge Point' for a typical Cortex-M4, which tells us its operational intensity in Ops-per-Byte?
details:
  realistic_solution: The correct answer is approximately 0.28 Ops/Byte. This low arithmetic intensity ridge point means the system is compute-bound for almost all ML workloads. Once the arithmetic intensity of a model exceeds 0.28 Ops/Byte, the system hits the compute ceiling, meaning the slow CPU ALUs are the bottleneck, not the relatively fast on-chip SRAM.
  common_mistake: |
    **The Pitfall:** Mistakenly assuming TinyML devices are memory-bound like datacenter GPUs.
    **The Rationale:** Engineers guess a high Ops-per-Byte ridge point, failing to recognize that TinyML devices have relatively fast on-chip SRAM but very weak compute ALUs.
    **The Consequence:** Optimizations are misdirected towards memory bandwidth improvements rather than reducing FLOPs.
  napkin_math: |
    - **Peak Compute**: 168 MHz × 2 ops/cycle (fused MACs) = 336 MFLOPS.
    - **Peak SRAM Bandwidth**: ~1.2 GB/s.
    - **Ridge Point**: 336 MFLOPS / 1.2 GB/s = **0.28 Ops/Byte**.
    - **Conclusion**: Any operation with > 0.28 Ops/Byte (like most INT8 Convs at ~2.0) is strictly **compute-bound**.
  options:
  - ~300 Ops/Byte
  - ~10 Ops/Byte
  - ~0.28 Ops/Byte
  - ~1300 Ops/Byte
  correct_index: 2
