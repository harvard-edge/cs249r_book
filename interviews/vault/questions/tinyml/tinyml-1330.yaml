title: TinyML Memory Hierarchy Optimization on STM32F4
scenario: You are tasked with deploying a convolutional neural network (CNN) for image classification on an ARM Cortex-M4 STM32F4 microcontroller (168 MHz, 256 KB SRAM, no FPU). The original model requires 512 KB for its weights and activations. Since the STM32F4's internal SRAM is only 256 KB, you must optimize the memory usage. You are considering two primary architectural approaches: Approach A (Aggressive Quantization & Pruning to 192 KB) and Approach B (External QSPI Flash with Software Cache).
question: Which approach would you recommend for maximizing inference throughput while maintaining acceptable power consumption for a real-time application?
details:
  realistic_solution: 'A candidate should first assess the accuracy degradation of Approach A through profiling. If acceptable, this approach is generally superior due to lower latency, higher energy efficiency, and simpler implementation. If not, Approach B requires careful design: analyzing weight access patterns to optimize cache line size and replacement policies, prioritizing burst reads from QSPI to maximize bandwidth, and performing detailed power consumption estimates. The solution should emphasize the iterative process of profiling and optimization, and acknowledge that the optimal choice depends on the specific model, performance targets, and power budget.'
  common_mistake: |
    **The Pitfall:** Underestimating the latency cost and CPU overhead of software-managed caching for external memory.
    **The Rationale:** Software engineers assume caches magically hide latency without calculating the severe initial access penalties of QSPI Flash.
    **The Consequence:** The model fits in memory but runs so slowly and draws so much power that it entirely misses real-time throughput and battery constraints.
  napkin_math: |
    *   **SRAM Access:** ~1 CPU cycle (~6 ns at 168 MHz).
    *   **QSPI Initial Access Time:** 50 ns.
    *   **Burst Read Time (32 bytes):** 32 bytes / 80 MB/s = 400 ns.
    *   **Total QSPI Cache Line Read:** 50 ns + 400 ns = 450 ns.
    *   **Speed Gap:** QSPI fetch is roughly **75x slower** than SRAM (450 ns vs 6 ns).
    *   **Conclusion:** Approach B requires a near-perfect cache hit rate; otherwise, the CPU spends all its power and cycles waiting on slow external memory.
