title: The Depthwise Memory Diet
scenario: 'You''re optimizing a keyword spotting model for a Cortex-M4 microcontroller. Your profiler shows one layer is a memory bottleneck: a standard 2D convolution with a 3x3 kernel, 16 input channels, and 32 output channels. To fit the model into the device''s limited SRAM, you decide to replace this layer with a depthwise separable convolution.'
question: 'What is the total number of parameters for the new depthwise separable layer, including biases?'
details:
  realistic_solution: 'Depthwise separable conv splits into two steps. Depthwise: one 3x3 filter per input channel = 3*3*16 = 144 weights + 16 biases = 160 params. Pointwise: 1x1 conv mapping 16 to 32 channels = 1*1*16*32 = 512 weights + 32 biases = 544 params. Total: 160 + 544 = 704 parameters. Compare to standard conv: 3*3*16*32 = 4,608 weights + 32 biases = 4,640 params. Reduction: 704/4,640 = 15.2% of original.'
  common_mistake: |
    **The Pitfall:** Forgetting to include the pointwise convolution step in the calculation.
    **The Rationale:** Engineers often calculate only the ''depthwise'' part of the operation and completely forget the subsequent 1x1 convolution required to combine channels.
    **The Consequence:** They drastically underestimate the final parameter count (160 instead of 704) and overestimate the memory savings.
  napkin_math: |
    1. **Assumptions & Constraints:** 3x3 kernel, 16 input channels, 32 output channels. Bias included.
    2. **Calculations:**
       - Standard 3x3: (3 * 3 * 16 * 32) + 32 = 4,640 params.
       - Depthwise layer: (3 * 3 * 16) + 16 = 160 params.
       - Pointwise layer: (1 * 1 * 16 * 32) + 32 = 544 params.
       - Total: 160 + 544 = 704 params.
    3. **Conclusion & Interpretation:** **The depthwise separable layer has 704 parameters, saving ~85% memory.** Result: Memory-Bound Optimization.
  options:
  - 160 parameters
  - 544 parameters
  - 704 parameters
  - 4,640 parameters
  correct_index: 2
