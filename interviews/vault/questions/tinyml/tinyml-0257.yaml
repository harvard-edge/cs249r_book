title: The Depthwise Memory Diet
scenario: You're optimizing a keyword spotting model for a Cortex-M4 microcontroller. Your profiler shows one layer is a memory bottleneck: a standard 2D convolution with a 3x3 kernel, 16 input channels, and 32 output channels. To fit the model into the device's limited SRAM, you decide to replace this layer with a depthwise separable convolution.
question: What is the total number of parameters for the new depthwise separable layer, including biases?
details:
  realistic_solution: Depthwise separable conv splits into two steps. Depthwise: one 3x3 filter per input channel = 3*3*16 = 144 weights + 16 biases = 160 params. Pointwise: 1x1 conv mapping 16 to 32 channels = 1*1*16*32 = 512 weights + 32 biases = 544 params. Total: 160 + 544 = 704 parameters. Compare to standard conv: 3*3*16*32 = 4,608 weights + 32 biases = 4,640 params. Reduction: 704/4,640 = 15.2% of original — a 6.6x parameter savings. On a Cortex-M4 with limited SRAM, this difference determines whether the model fits on-device.
  common_mistake: |
    **The Pitfall:** Forgetting the pointwise convolution step.
    **The Rationale:** Engineers often calculate only the 'depthwise' part of the operation and completely forget the subsequent 'pointwise' (1x1 convolution) step required to combine channels.
    **The Consequence:** They drastically underestimate the final parameter count and overestimate the memory savings.
  napkin_math: |
    1. Standard 3x3 conv weights + biases: (3 * 3 * 16 * 32) + 32 = 4,640 parameters.
    2. Depthwise layer weights + biases: (3 * 3 * 16) + 16 = 160 parameters.
    3. Pointwise layer weights + biases: (1 * 1 * 16 * 32) + 32 = 544 parameters.
    4. Total Depthwise Separable parameters: 160 + 544 = **704 parameters**.
    5. Memory savings: 704 / 4,640 = **~15.2%** of original size, saving ~85% memory.
  options:
  - 160 parameters
  - 544 parameters
  - 704 parameters
  - 4,640 parameters
  correct_index: 2
