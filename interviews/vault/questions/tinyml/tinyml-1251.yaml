title: ESP32-S3 Flash Partitioning for Model OTA
scenario: 'You are deploying a voice assistant on an ESP32-S3 (240 MHz dual-core Xtensa, 512 KB SRAM, 8 MB PSRAM, WiFi/BLE) equipped with an 8 MB SPI flash. The system requires a 1.8 MB application firmware and a 3.2 MB INT8 quantized audio model using the vector extensions. You must design an OTA update scheme over WiFi that allows independent updates of the firmware and model with rollback capabilities.'
question: 'How would you evaluate the partition layout constraints and propose a deployment strategy that ensures safe OTA updates without exceeding the 8 MB flash?'
details:
  realistic_solution: 'Decouple the firmware and model partitions. Use standard A/B slots for the 1.8 MB firmware to ensure safe rollbacks. For the model, use a single flash partition but stage the incoming 3.2 MB model OTA payload in the 8 MB PSRAM. Verify the model''s cryptographic signature in PSRAM before erasing and writing to the flash. If a power loss occurs during the model flash write, the intact firmware will boot into a recovery state and request a model re-download over WiFi.'
  common_mistake: |
    **The Pitfall:** Defaulting to a monolithic A/B partitioning scheme.
    **The Rationale:** Candidates fail to decouple firmware from the ML model, resulting in flash requirements that physically exceed the 8 MB chip.
    **The Consequence:** The OTA update system cannot be deployed on the target hardware without upgrading to a larger, more expensive flash chip.
  napkin_math: |
    **Assumptions & Constraints:**
    - Firmware size is 1.8 MB, INT8 model is 3.2 MB.
    - Total Flash is 8.0 MB; Total PSRAM is 8.0 MB.

    **Calculations:**
    - Evaluate Monolithic A/B capacity: 2 * (1.8 MB + 3.2 MB) = 10.0 MB (fails 8.0 MB constraint).
    - Evaluate Decoupled layout: Firmware A (1.8 MB) + Firmware B (1.8 MB) + Model (3.2 MB) = 6.8 MB.
    - Remaining Flash: 8.0 MB - 6.8 MB = 1.2 MB.

    **Conclusion & Interpretation:**
    - **Result: 1.2 MB Headroom (Storage-Bound)**. Decoupling the OTA strategy and staging the model inside PSRAM safely fits within the 8.0 MB Flash boundary.
