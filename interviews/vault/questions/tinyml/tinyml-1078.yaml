title: Side-Channel Defense Architecture for STM32F4 Audio Authentication
scenario: You are deploying a proprietary speaker verification model to a smart access badge. Since the badge is physically accessible, attackers can use differential power analysis (DPA) and timing attacks during INT8 execution to extract your proprietary model weights.
question: How should the STM32F4 speaker verification model defend against timing and power side-channel extraction within memory limits?
details:
  realistic_solution: 'A robust L5 design relies on a layered, asymmetric defense rather than full software masking. The architecture should inject random execution jitter (randomized delays and timer interrupts) to misalign power traces, which costs nearly zero SRAM. For the IP protection, the system should partition the model: an initial feature extractor runs on the Cortex-M4 utilizing the SIMD instructions (2x INT8 MACs/cycle), while the highly sensitive projection weights are encrypted in the 1 MB flash and only decrypted layer-by-layer into a small, volatile 10 KB SRAM buffer just in time for inference, overwriting immediately after use.'
  common_mistake: |
    **The Pitfall:** Proposing full Boolean masking for all neural network operations.
    **The Rationale:** Candidates assume heavyweight cryptographic masking is feasible, ignoring the severe performance and memory penalties on resource-constrained MCUs.
    **The Consequence:** Inflating compute times by >15x and doubling the SRAM footprint, violating both the 168 MHz and 256 KB limits.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute: 2M MACs at 168 MHz. 2 MACs/cycle.
    - Base Latency: 1M cycles (~6ms).
    
    **Calculations:**
    - Full Masking Overhead: ~8 extra instructions per MAC = 16M cycles (~95ms).
    - Jitter Overhead: Random NOPs add 5-10% latency (~0.6ms) and 0 KB SRAM.
    
    **Conclusion & Interpretation:**
    - **Result: Compute-Bound Defense (Compute-Bound)**. Jitter successfully disrupts DPA alignment at a fraction of the full masking computational cost.
