title: The Dropped Audio Frame
scenario: You're designing a keyword spotting device using a Cortex-M4 microcontroller. Your ML model
  requires 400 Million FLOPs to analyze a 1-second audio clip. Audio arrives in a continuous stream. Can
  this system process the audio in real-time without falling behind? Explain your reasoning by calculating
  the time it takes to process one clip.
question: "Can a Cortex-M4 process a 400 MFLOP, 1-second audio clip in real time without falling behind?"
details:
  realistic_solution: No, the system cannot keep up in real-time. The Cortex-M4 provides approximately
    336 MFLOPS. To process a clip requiring 400 MFLOPs, the device will take longer than the 1-second
    duration of the clip itself. This means the buffer of incoming audio data will grow continuously,
    and the system will fall further and further behind, eventually dropping frames.
  common_mistake: The most common mistake is to assume the system is not compute-bound and can handle
    the stream without doing the math. Engineers often forget to perform a simple throughput calculation,
    comparing the device's processing rate (Ops/sec) to the data arrival rate (which dictates the required
    Ops/sec). Another frequent error is confusing the clock speed (MHz) with the actual floating-point
    operations per second (FLOPS), which are rarely equivalent.
  napkin_math: 'Cortex-M4 peak: ~336 MFLOPS. Time = 400M / 336M = 1.19 seconds > 1.0s clip duration. Falls
    behind by 0.19s per clip. After 5 clips: backlog = 5*0.19 = 0.95s. System cannot keep up in real-time.
    Need to reduce model to <336M FLOPs or optimize with CMSIS-NN.'
  options:
  - No, it takes ~1.19 seconds to process, which is longer than the 1-second audio clip duration.
  - Yes, it only uses 84% of the processor's capacity (336 MFLOPS / 400 MFLOPs).
  - No, it takes ~2.38 seconds because the 168 MHz clock speed only provides 168 MFLOPS.
  - Yes, it can process two clips per second, taking about 0.59 seconds per clip.
  correct_index: 0
