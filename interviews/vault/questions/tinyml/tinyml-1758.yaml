title: Evaluating INT16 Accumulation Trade-offs on Cortex-M4
scenario: An anomaly detection model on a Cortex-M4 uses INT8 weights but accumulates
  in INT32. The intermediate activations are consuming the limited 256KB SRAM.
question: Evaluate the trade-offs of switching from INT32 to INT16 accumulation for
  the intermediate dense layers to save memory.
details:
  realistic_solution: INT16 accumulation halves the SRAM required for intermediate
    buffers, saving memory footprint per layer. However, since dot products can easily
    exceed INT16 limits, this switch introduces a massive risk of integer overflow.
    Weights and activations must be aggressively scaled down, which severely degrades
    the model's expressivity and accuracy.
  common_mistake: Assuming INT16 accumulation only slightly reduces precision without
    recognizing the catastrophic overflow risk in MAC operations.
  napkin_math: Max INT16 is 32767; a 256-dim dot product of 127*127 equals 4,129,024,
    far exceeding the limit.
