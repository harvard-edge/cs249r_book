title: Evaluating INT16 Accumulation Trade-offs on Cortex-M4
scenario: An anomaly detection model on a Cortex-M4 uses INT8 weights but accumulates in INT32. The intermediate activations are consuming the limited 256KB SRAM.
question: "What are the trade-offs of switching from INT32 to INT16 accumulation for intermediate dense layers to save memory?"
details:
  realistic_solution: INT16 accumulation halves the SRAM required for intermediate buffers, saving memory footprint per layer. However, since dot products can easily exceed INT16 limits, this switch introduces a massive risk of integer overflow. Weights and activations must be aggressively scaled down, which severely degrades the model's expressivity and accuracy.
  common_mistake: |
    **The Pitfall:** Assuming INT16 accumulation only slightly reduces precision.
    **The Rationale:** Engineers think "16 bits is plenty for intermediate sums" without doing the dot product math.
    **The Consequence:** The model suffers catastrophic integer overflow during MAC operations, producing garbage outputs.
  napkin_math: |
    * Max INT16 limit is 32,767.
    * A 256-dim dot product of max INT8 values (127 × 127) equals 16,129 × 256 = **4,129,024**.
    * 4,129,024 far exceeds the 32,767 limit, guaranteeing overflow without aggressive pre-scaling.
