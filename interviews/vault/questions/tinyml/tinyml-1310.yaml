title: Acoustic Pest Detection Duty Cycling on Corstone-300
scenario: You are designing an acoustic pest detection system powered by a 220 mAh
  coin cell battery, required to run for 2 years. The hardware is an ARM Cortex-M7
  + Ethos-U55 (Corstone-300) platform, featuring a 480 MHz M7 and an Ethos-U55 NPU
  (capable of 128-512 MAC/cycle) that share 512 KB of SRAM. The model requires 1 second
  of audio sampled at 16 kHz and takes 10 million MACs to execute. Design a duty-cycling
  strategy that dictates how the M7, NPU, and shared SRAM interact to meet the 2-year
  battery life specification.
question: How would you design a duty-cycling strategy that dictates how the M7, NPU,
  and shared SRAM interact to meet the 2-year battery life specification?
details:
  realistic_solution: The optimal design keeps the M7 in deep sleep while a low-power
    peripheral streams audio via DMA into a dedicated ring buffer in the shared 512
    KB SRAM. Once the buffer is full (1 second of data), the M7 wakes up briefly to
    configure the Ethos-U55 NPU and then returns to a low-power state while the NPU
    processes the 10 million MACs directly from SRAM. Since the NPU can process hundreds
    of MACs per cycle, the high-power active time is severely minimized, leaving the
    majority of the power budget for system leakage and the microphone.
  common_mistake: Candidates often assume the M7 must stay awake during the entire
    inference process, missing the opportunity to leverage the Ethos-U55's autonomy.
    They also frequently overlook the energy cost of moving data continuously into
    the shared 512 KB SRAM or fail to account for the baseline sleep current.
  napkin_math: A 220 mAh battery over 2 years gives an average current budget of 220
    mAh / (2 * 365 * 24 h) = 12.56 uA. The inference requires 10M MACs. Using the
    Ethos-U55 at a conservative 128 MACs/cycle, inference takes 10,000,000 / 128 =
    78,125 cycles. At 480 MHz, execution time is 78,125 / 480,000,000 = 162.7 us.
    If the system draws 50 mA during this active state, the charge consumed per inference
    is 50 mA * 0.1627 ms = 8.135 uAs. Running one inference per minute results in
    an average active current draw of 8.135 uAs / 60 s = 0.135 uA, which easily fits
    within the 12.56 uA budget.
