title: Acoustic Pest Detection Duty Cycling on Corstone-300
scenario: You are designing an acoustic pest detection system powered by a 220 mAh coin cell battery, required to run for 2 years. The hardware is an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform, featuring a 480 MHz M7 and an Ethos-U55 NPU (capable of 128-512 MAC/cycle) that share 512 KB of SRAM. The model requires 1 second of audio sampled at 16 kHz and takes 10 million MACs to execute.
question: How would you design a duty-cycling strategy for the M7, Ethos-U55, and shared SRAM to achieve a 2-year battery life on a 220 mAh coin cell?
details:
  realistic_solution: The optimal design keeps the M7 in deep sleep while a low-power peripheral streams audio via DMA into a dedicated ring buffer in the shared 512 KB SRAM. Once the buffer is full (1 second of data), the M7 wakes up briefly to configure the Ethos-U55 NPU and then returns to a low-power state while the NPU processes the 10 million MACs directly from SRAM. Since the NPU can process hundreds of MACs per cycle, the high-power active time is severely minimized, leaving the majority of the power budget for system leakage and the microphone.
  common_mistake: |
    **The Pitfall:** Assuming the Cortex-M7 must stay awake to orchestrate the NPU or move data.
    **The Rationale:** Engineers treat the NPU as a passive accelerator rather than an autonomous compute block that can pull directly from SRAM.
    **The Consequence:** Keeping the 480 MHz M7 awake continuously drains power rapidly, completely missing the 2-year battery life target.
  napkin_math: |
    *   **Current Budget:** 220 mAh / (2 years × 365 days × 24 hours) = 12.56 µA average.
    *   **NPU Cycles:** 10,000,000 MACs / 128 MACs/cycle = 78,125 cycles.
    *   **Execution Time:** 78,125 cycles / 480,000,000 Hz = 162.76 µs.
    *   **Charge per Inference:** Assuming 50 mA active draw, 50 mA × 0.16276 ms = 8.138 µAs.
    *   **Average Active Current (1 inference/minute):** 8.138 µAs / 60 s = **0.136 µA**.
    *   **Conclusion:** The active compute consumes 0.136 µA, well under the 12.56 µA budget, leaving the rest for baseline sleep current and the analog microphone.
