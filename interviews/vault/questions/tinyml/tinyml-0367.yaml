title: The Energy Cost of Learning on the Edge
scenario: You're designing a battery-powered smart sensor that uses Federated Learning to improve its
  model over time. For a typical TinyML device, which single operation is the most significant contributor
  to its energy consumption during one federated learning cycle?
details:
  realistic_solution: Transmitting the updated model weights to the central server is by far the most
    energy-intensive operation. The energy required to power up the radio and send even a few kilobytes
    of data over a wireless protocol like BLE or LoRaWAN is substantially higher than the energy consumed
    by the highly-optimized, on-device computation for a few training iterations.
  common_mistake: Engineers often assume that the 'learning' part (computation) is the most expensive.
    Coming from cloud or even mobile development, they are conditioned to think in terms of FLOPs and
    compute bottlenecks. However, in the ultra-low-power world of TinyML, the physics of radio transmission
    completely change the economics and dominate the energy budget.
  napkin_math: Let's compare the energy for computation vs. transmission.
  options:
  - Reading the training data from on-chip Flash memory.
  - Performing the on-device model training (computation).
  - Transmitting the model update to the server.
  - Maintaining the device in its low-power sleep state between cycles.
  correct_index: 2
