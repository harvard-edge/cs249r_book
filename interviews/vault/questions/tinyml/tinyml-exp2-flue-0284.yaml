title: Watchdog Timeout Calculation for Corstone-300
scenario: You are deploying a vibration analysis model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300)
  platform for an ISO 26262 compliant automotive subsystem. To ensure deterministic execution for functional
  safety, you must configure a hardware watchdog timer. The 480 MHz M7 requires 36,000 cycles for data
  preprocessing, followed by a 12,288,000 MAC inference on the Ethos-U55 (configured for 256 MACs/cycle).
  Due to the M7 and U55 sharing the 512 KB SRAM, you must account for a 25% cycle penalty on the NPU inference
  time due to memory contention. Calculate the total execution time in milliseconds to establish the minimum
  safe watchdog timeout.
details:
  realistic_solution: To guarantee deterministic execution and meet safety certification requirements,
    the execution time must be strictly bounded under worst-case shared memory access patterns. The correct
    approach calculates the base NPU cycles, applies the contention penalty, adds the M7 preprocessing
    cycles (assuming sequential execution), and divides by the platform's clock frequency to find the
    exact time duration.
  common_mistake: Candidates often forget to account for the memory contention penalty when the M7 and
    Ethos-U55 share the same SRAM, or they incorrectly convert the 480 MHz clock speed to milliseconds,
    leading to premature watchdog resets during normal operation.
  napkin_math: '1. NPU Base Cycles = 12,288,000 MACs / 256 MACs/cycle = 48,000 cycles.

    2. NPU Actual Cycles (with contention) = 48,000 cycles * 1.25 = 60,000 cycles.

    3. Total Execution Cycles = 36,000 (M7) + 60,000 (U55) = 96,000 cycles.

    4. Clock frequency = 480 MHz = 480,000 cycles/ms.

    5. Total Time = 96,000 cycles / 480,000 cycles/ms = 0.2 ms.'
