title: 'The TinyML Tensor Arena Squeeze: Tensor Arena Planning'
scenario: 'You''re deploying a small keyword-spotting model on a Cortex-M4 microcontroller which has 256 KB of SRAM. The core of your model is a 3-layer MLP that processes a 128-element feature vector. The layers are: Layer 1 (128 -> 64 units), Layer 2 (64 -> 32 units), and Layer 3 (32 -> 4 units). The entire model runs using INT8 precision. The TensorFlow Lite for Microcontrollers interpreter uses a ''Tensor Arena'' for all activations.'
question: "To minimize the memory footprint, what is the *peak* size required for the Tensor Arena during a single inference pass?"
details:
  realistic_solution: The correct answer is 192 bytes. The peak memory usage in a simple sequential model occurs when the framework must hold the input tensor for an operation while also allocating space for its output tensor. The peak is found by finding the maximum of `size(input_N) + size(output_N)` for all layers N.
  common_mistake: |
    **The Pitfall:** Simply summing the sizes of all activation tensors (128 + 64 + 32 + 4 = 228 bytes).
    **The Rationale:** Assuming all intermediate results must be kept in memory simultaneously. However, the TFLM interpreter is designed to reuse memory aggressively, and only tensors that are actively needed for a current operation must coexist.
    **The Consequence:** Overestimating the memory footprint and potentially rejecting a model that perfectly fits.
  napkin_math: |
    * **INT8 sizes:** 1 byte per element.
    * **Layer 1 peak:** Input (128) + Output (64) = 192 bytes.
    * **Layer 2 peak:** Input (64) + Output (32) = 96 bytes.
    * **Layer 3 peak:** Input (32) + Output (4) = 36 bytes.
    * **Result:** The peak Tensor Arena size across all layers is **192 bytes**.
  options:
  - 228 bytes
  - 128 bytes
  - 192 bytes
  - 384 bytes
  correct_index: 2
