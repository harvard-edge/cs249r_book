title: The TinyML Interconnect Bottleneck
scenario: >
  You are a TinyML engineer diagnosing a smart camera prototype. The device must process 320x320 8-bit grayscale video at 30 FPS. The system is dropping frames, but profiling shows both the Cortex-M4 MCU and the small ML accelerator are under-utilized. The camera sensor is connected to the MCU via a standard SPI bus with a maximum data rate of 10 Mbps.
question: >
  Why is the SPI bus the likely cause of dropped 30 FPS camera frames despite idle compute resources?
details:
  realistic_solution: >
    This is a classic bandwidth bottleneck. The camera produces data at a rate that saturates the SPI bus, causing backpressure and dropped frames before the data even reaches the MCU. The problem isn't compute, it's I/O.
  common_mistake: |
    **The Pitfall:** Focusing on the compute components (MCU/accelerator) when the true bottleneck is the data interconnect.
    **The Rationale:** Engineers often miscalculate bandwidth requirements by confusing bits and bytes, or guess that latency is the issue.
    **The Consequence:** They might upgrade the MCU unnecessarily, but the dropped frames persist because the SPI bus is still saturated.
  napkin_math: |
    - **Frame Size:** 320 × 320 × 1 byte = 102,400 bytes = 819,200 bits.
    - **Required Bandwidth:** 819,200 bits × 30 fps = **24.576 Mbps**.
    - **SPI Capacity:** SPI max = 10 Mbps.
    - **Conclusion:** 24.576 Mbps is much greater than 10 Mbps. The bus is 2.5x oversubscribed. The true bottleneck is **SPI I/O bandwidth**, not compute.
  options:
  - The SPI bus bandwidth is insufficient. It provides 10 Mbps, but the camera requires ~24.6 Mbps.
  - The Cortex-M4 MCU lacks the processing power for 30 FPS and should be upgraded to a Cortex-M7.
  - The data stream is ~3 MB/s, which fits within the 10 Mbps SPI bus capacity. The problem must be MCU SRAM bandwidth.
  - The SPI protocol has high latency. Switching to the I2C protocol would reduce overhead and solve the frame drops.
