title: The TinyML Interconnect Bottleneck
scenario: You are a TinyML engineer diagnosing a smart camera prototype. The device must process 320x320
  8-bit grayscale video at 30 FPS. The system is dropping frames, but profiling shows both the Cortex-M4
  MCU and the small ML accelerator are under-utilized. The camera sensor is connected to the MCU via a
  standard SPI bus with a maximum data rate of 10 Mbps. Use napkin math to diagnose the most likely cause
  of the dropped frames.
details:
  realistic_solution: This is a classic bandwidth bottleneck. The camera produces data at a rate that
    saturates the SPI bus, causing backpressure and dropped frames before the data even reaches the MCU.
    The problem isn't compute, it's I/O.
  common_mistake: Engineers often miscalculate bandwidth requirements by confusing bits and bytes, or
    they focus on the compute components (MCU/accelerator) when the true bottleneck is the data interconnect.
    They might also incorrectly guess that latency, not bandwidth, is the issue, leading them to consider
    even slower protocols.
  napkin_math: 'Frame size = 320*320*1 = 102400 bytes = 100KB = 819200 bits. At 30fps: 819200*30 = 24.576
    Mbps required. SPI max = 10 Mbps. 24.576 >> 10 Mbps. Bus is 2.5x oversubscribed. Max framerate from
    SPI = 10e6/819200 = 12.2 fps. Bottleneck is SPI I/O bandwidth, not compute.'
  options:
  - The SPI bus bandwidth is insufficient. It provides 10 Mbps, but the camera requires ~24.6 Mbps.
  - The Cortex-M4 MCU lacks the processing power for 30 FPS and should be upgraded to a Cortex-M7.
  - The data stream is ~3 MB/s, which fits within the 10 Mbps SPI bus capacity. The problem must be MCU
    SRAM bandwidth.
  - The SPI protocol has high latency. Switching to the I2C protocol would reduce overhead and solve the
    frame drops.
  correct_index: 0
