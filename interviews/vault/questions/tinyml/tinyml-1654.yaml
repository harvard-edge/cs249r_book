title: BLE Protocol Overhead Bottleneck Analysis
scenario: A Cortex-M4 generates 1KB audio inference embeddings every second and transmits
  them over a Bluetooth Low Energy (BLE) link rated at 1 Mbps PHY rate.
question: Analyze why the effective application throughput bottlenecks at under 100
  kbps despite the 1 Mbps PHY rating.
visual:
  kind: svg
  path: tinyml-1654.svg
  alt: Graph showing Application layer bottlenecking before reaching the high-speed
    PHY layer.
  caption: BLE Throughput Bottleneck Layers.
details:
  realistic_solution: 'The 1 Mbps PHY rate is the raw bit rate. Application throughput
    is bottlenecked by massive protocol overhead: connection intervals, mandatory
    inter-frame spacing, small MTU sizes (often limiting payloads to 20-244 bytes),
    and L2CAP headers. These limit the actual time the radio spends transmitting valid
    payload data to a fraction of the theoretical max.'
  common_mistake: Equating the physical layer (PHY) bit rate with the TCP/L2CAP payload
    data throughput.
  napkin_math: 1 Mbps PHY * ~10% duty/protocol efficiency = ~100 kbps effective.
