title: BLE Protocol Overhead Bottleneck Analysis
scenario: A microcontroller generates 1KB audio inference embeddings every second and transmits them over a Bluetooth Low Energy (BLE) link rated at 1 Mbps PHY rate.
question: Analyze why the effective application throughput bottlenecks at under 100 kbps despite the 1 Mbps PHY rating.
visual:
  kind: svg
  path: tinyml-1654.svg
  alt: Graph showing Application layer bottlenecking before reaching the high-speed PHY layer.
  caption: BLE Throughput Bottleneck Layers.
details:
  realistic_solution: 'The 1 Mbps PHY rate is the raw bit rate. Application throughput is bottlenecked by massive protocol overhead: connection intervals, mandatory inter-frame spacing, small MTU sizes (often limiting payloads to 20-244 bytes), and L2CAP headers. These limit the actual time the radio spends transmitting valid payload data to a fraction of the theoretical max.'
  common_mistake: |
    **The Pitfall:** Equating the physical layer (PHY) bit rate with the TCP/L2CAP payload data throughput.
    **The Rationale:** Engineers look at hardware specifications for bit rate without accounting for network stack overhead.
    **The Consequence:** The link is severely over-provisioned in software planning, resulting in dropped packets and system bottlenecks when the application tries to stream at 1 Mbps.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Payload: 1 KB per second.
       - PHY Rating: 1 Mbps.
       - BLE Protocol Overhead: ~90% (Inter-frame spacing, L2CAP headers, MTU limits).
    2. **Calculations:**
       - Duty Cycle / Efficiency: ~10%.
       - Effective Application Throughput: 1 Mbps * 0.10 = 100 kbps.
    3. **Conclusion & Interpretation:**
       - **Result: Communication-Bound.** The 1 Mbps PHY layer rating drastically overstates true application throughput, which bottlenecks at ~100 kbps due to protocol overhead.
