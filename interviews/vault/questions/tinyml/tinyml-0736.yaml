title: Quantization Error for INT4 on Cortex-M4
scenario: Your team wants to push a keyword spotting model from INT8 (150 KB, 92% accuracy) to INT4 (75 KB, unknown accuracy) to free up flash for a second model. The Cortex-M4F has no native INT4 support — all arithmetic is 32-bit or 16-bit (via SMLAD).
question: How would you estimate the accuracy impact of INT4 quantization and the actual inference speedup (or slowdown) on M4F hardware?
details:
  realistic_solution: 'INT4 on Cortex-M4F is a lose-lose: slower AND less accurate than alternatives. The M4F has no native INT4 instructions — unpacking INT4 to INT8/16 before arithmetic takes extra cycles, making INT4 ~2x slower than INT8 (35.8ms vs 17.9ms). Accuracy drops 3-8% with PTQ (84%) or 3% with QAT (89%). Better alternative: prune the INT8 model to 50% sparsity, achieving 75KB (same size) at ~90% accuracy and 9ms inference (2x faster than dense INT8, 4x faster than INT4). INT4 only wins on hardware with native sub-byte SIMD like Cortex-M55 Helium or dedicated NPUs.'
  common_mistake: |
    **The Pitfall:** Assuming INT4 halves model size and doubles speed.
    **The Rationale:** On hardware with native INT4 support (NVIDIA GPUs, some NPUs), this is true, so engineers apply this heuristic universally.
    **The Consequence:** On a Cortex-M4F, which lacks INT4 instructions, the unpack overhead makes INT4 slower than INT8, leading to missed latency deadlines.
  napkin_math: |
    1. **INT8 Baseline:** 150 KB, 92% accuracy, 2 MACs/cycle -> 17.9 ms inference.
    2. **INT4 (PTQ):** 75 KB, ~84% accuracy, 1 MAC/cycle (unpack overhead) -> 35.8 ms (2x slower).
    3. **INT4 (QAT):** 75 KB, ~89% accuracy, 1 MAC/cycle -> 35.8 ms.
    4. **Pruned INT8 (50%):** 75 KB, ~90% accuracy, 2 MACs/cycle -> 9.0 ms.
    5. **Result:** The pruned INT8 model is **4x faster than INT4** with better accuracy, making INT4 a lose-lose on M4F hardware.
  options:
  - INT4 halves model size and doubles inference speed because you process twice as many values per 32-bit register, achieving 4 MACs/cycle on the M4F.
  - 'INT4 on M4F is a lose-lose: no native INT4 instructions means unpacking to INT8/16 before arithmetic, making it ~2x slower than INT8 (35.8ms vs 17.9ms). Accuracy drops 3-8% (PTQ) or 3% (QAT). Better alternative: prune INT8 to 50% sparsity — same 75 KB size, ~90% accuracy, 9ms inference (4x faster than INT4). INT4 only wins on hardware with native sub-byte SIMD (M55 Helium, NPUs).'
  - INT4 quantization is always beneficial because it reduces both model size and activation memory by 2x, enabling a second model to fit alongside the keyword spotter.
  - INT4 achieves the same accuracy as INT8 when using quantization-aware training, and the 2x size reduction is worth the marginal 10% inference slowdown from unpacking overhead.
