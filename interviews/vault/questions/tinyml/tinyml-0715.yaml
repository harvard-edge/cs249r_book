title: Anomaly Detection on Streaming Sensor Data with Limited Memory
scenario: Your vibration sensor streams data at 3.2 kHz (3 axes × 16-bit = 19.2 KB/s). You need to detect anomalies in real-time on a Cortex-M4 with 256 KB SRAM. The challenge: your autoencoder model processes 1-second windows (3200 samples × 3 axes × 2 bytes = 19.2 KB per window), but you also need to maintain a running baseline of 'normal' vibration patterns for comparison.
question: How do you fit the streaming pipeline, the model, and the baseline statistics in 256 KB SRAM?
details:
  realistic_solution: Use exponential moving average (EMA) statistics instead of raw data for the baseline. Raw 60s baseline: 1.15MB — doesn't fit. EMA baseline: 8KB (mean + variance per frequency bin per axis). Memory layout: double-buffer for streaming (2 * 19.2KB = 38.4KB), FFT scratch (4KB), feature vectors (8KB), EMA baseline (8KB), autoencoder model weights in flash (80KB), tensor arena (120KB), firmware (40KB). Total SRAM used: 218.4KB / 256KB = 85.3%. Processing: FFT + features + baseline update + autoencoder = 13.2ms per 1s window = 1.3% CPU utilization. The autoencoder catches subtle temporal patterns; the EMA catches drift.
  common_mistake: |
    **The Pitfall:** Storing the raw historical data as the baseline reference.
    **The Rationale:** Candidates naturally suggest storing the last 60 seconds of raw data for comparison.
    **The Consequence:** 60 seconds × 19.2 KB/s = 1.15 MB, which drastically exceeds the 256 KB SRAM budget.
  napkin_math: |
    1. Calculate window size: 3200 samples * 3 axes * 2 bytes = 19,200 bytes (19.2 KB).
    2. Raw baseline (60s): 60 * 19.2 KB = 1,152 KB (**~1.15 MB**), which doesn't fit in 256 KB SRAM.
    3. EMA baseline: Requires only **8 KB**, fitting with room to spare.
    4. SRAM Memory layout: double-buffer (38.4 KB) + FFT scratch (4 KB) + features (8 KB) + EMA baseline (8 KB) + tensor arena (120 KB) + firmware (40 KB).
    5. Total SRAM used: 38.4 + 4 + 8 + 8 + 120 + 40 = 218.4 KB.
    6. SRAM Utilization: 218.4 KB / 256 KB = **85.3%**.
    7. Processing time per window: FFT (6ms) + features (2ms) + baseline (<0.1ms) + stat score (<0.1ms) + autoencoder (5ms) = **13.2 ms**.
    8. CPU utilization: 13.2 ms / 1000 ms = **1.32%**.
  options:
  - Store the last 60 seconds of raw sensor data (1.15 MB) as the baseline reference for anomaly comparison, using external PSRAM to overcome the 256 KB SRAM limit.
  - Use exponential moving average (EMA) statistics instead of raw data for the baseline. EMA baseline: 8 KB (mean + variance per frequency bin per axis). Memory layout: double-buffer (38.4 KB) + FFT scratch (4 KB) + features (8 KB) + EMA baseline (8 KB) + tensor arena (120 KB) + firmware (40 KB) = 218.4 KB / 256 KB = 85.3% utilization. The autoencoder catches temporal patterns; the EMA catches drift.
  - Reduce the sensor sampling rate from 3.2 kHz to 800 Hz to fit 60 seconds of raw baseline data (288 KB at 800 Hz) within the 256 KB SRAM budget.
  - Run inference only on the most recent 1-second window with no baseline comparison. Use the autoencoder's reconstruction error alone as the anomaly score, eliminating the need for any baseline storage.
  correct_index: 1
