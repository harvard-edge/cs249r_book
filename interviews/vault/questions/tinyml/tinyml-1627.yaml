title: SRAM-Constrained Depthwise Execution
scenario: A Cortex-M4 has 64KB SRAM available. A depthwise separable convolution generates
  an intermediate activation tensor of 120KB.
question: Design a computational schedule to execute this layer entirely on-chip without
  requiring external DRAM.
details:
  realistic_solution: Implement depth-first execution (or loop tiling/fusion). Rather
    than computing the entire spatial map of the depthwise layer before the pointwise
    layer, compute a small spatial tile (e.g., 16x16) through both layers immediately,
    discarding the intermediate depthwise values to stay well under 64KB.
  common_mistake: Suggesting quantization when the question specifies scheduling,
    or trying to write to Flash memory.
  napkin_math: 16*16 tile << 120KB
