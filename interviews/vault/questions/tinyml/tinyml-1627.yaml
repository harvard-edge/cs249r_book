title: SRAM-Constrained Depthwise Execution
scenario: A Cortex-M4 has 64KB SRAM available. A depthwise separable convolution generates an intermediate activation tensor of 120KB.
question: Design a computational schedule to execute this layer entirely on-chip without requiring external DRAM.
details:
  realistic_solution: Implement depth-first execution (or loop tiling/fusion). Rather than computing the entire spatial map of the depthwise layer before the pointwise layer, compute a small spatial tile (e.g., 16x16) through both layers immediately, discarding the intermediate depthwise values to stay well under 64KB.
  common_mistake: |
    **The Pitfall:** Suggesting quantization or paging to Flash memory.
    **The Rationale:** Candidates ignore the prompt's constraint to design a "computational schedule" and instead propose format changes or hardware workarounds.
    **The Consequence:** Paging to Flash severely degrades performance due to write latency, and quantization may degrade accuracy unacceptably.
  napkin_math: |
    1. **Memory Requirement:** Intermediate tensor = 120 KB.
    2. **Available Memory:** 64 KB.
    3. **Tiling Strategy:** Compute a 16x16 spatial tile.
    4. **Tile Memory:** A 16x16 tile requires significantly less than 64 KB (e.g., a few KB depending on channels).
    5. **Conclusion:** 16x16 tile << 64 KB SRAM limit.
