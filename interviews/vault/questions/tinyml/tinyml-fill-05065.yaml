title: TinyML System Specification for Predictive Maintenance Sensor Node
scenario: 'Specify a predictive maintenance system for industrial motors using a sensor node with Cortex-M7+Ethos-U55.
  Requirements: detect bearing failures from 3-axis vibration at 25kHz, 99% recall for failure events,
  <1% false positive rate, operate on 4×AA batteries (10,000 mAh at 6V) for 2 years without replacement.'
question: "How would you specify a predictive maintenance system for industrial motors using a sensor node with Cortex-M7+Ethos-U55?"
details:
  realistic_solution: 'Battery budget: 10,000mAh × 6V = 60 Wh = 216,000 J. 2 years = 63.1M seconds. Max
    average power: 216,000/63,100,000 = 3.4mW. System architecture: accelerometer in low-power mode (FIFO
    buffer, 0.2mA at 6V = 1.2mW) doing 25kHz sampling always. Cortex-M7 in STOP mode (0.1mA = 0.6mW),
    wakes every 100ms to check FIFO. Ethos-U55 off (0.01mW). If FIFO shows anomaly threshold exceeded
    (simple threshold on RMS): wake full system. FFT + CNN inference: 50ms active at 50mW = 2.5mJ per
    event. If 1% of time has anomalies: avg inference power = 1.2+0.6+0.025 = 1.825mW + event bursts.
    Total average: ~2.5mW < 3.4mW budget. Sensor: STMicro ISM330 with embedded ML threshold detection
    handles pre-filter.'
  common_mistake: Running continuous inference at 25kHz without leveraging wake-on-anomaly strategies;
    always-on inference at high sampling rate is the main battery drain culprit.
  napkin_math: 'Battery: 60Wh / 2 years = 3.42mW avg budget. Sensor FIFO: 1.2mW. MCU sleep: 0.6mW. Events
    (1% duty): 50mW×50ms×0.01Hz_avg = 0.025mW. Total: 1.825mW << 3.42mW. Comfortable 2-year life with
    87% budget remaining for radio (BLE at 0.5mW average for reporting).'
