title: Identifying Latency Components on ESP32-S3
scenario: You are profiling the end-to-end latency of an anomaly detection model on an ESP32-S3. The system reads vibration data, processes it, runs INT8 inference using the vector extensions, and triggers an alert via BLE.
question: When breaking down the total latency, what term describes the time spent computationally converting raw sensor data into the required input tensor?
details:
  realistic_solution: The correct term is 'preprocessing latency' or 'feature extraction latency'. This is a distinct component of the latency decomposition that must occur before the 240 MHz Xtensa cores can begin executing the INT8 neural network layers.
  common_mistake: |
    **The Pitfall:** Conflating distinct latency stages.
    **The Rationale:** Candidates vaguely lump this step into 'inference time' or call it 'sensor read time'.
    **The Consequence:** They fail to distinguish between physical data acquisition and the computational overhead of data preparation, leading to poorly optimized system bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Latency Budget: 25 ms.
    - Knowns: t_acquire = 2 ms, t_inference = 12 ms, t_transmit = 5 ms.

    **Calculations:**
    - Total Latency = t_acquire + t_preprocess + t_inference + t_transmit.
    - 25 ms = 2 ms + t_preprocess + 12 ms + 5 ms.
    - t_preprocess = 25 ms - 19 ms = 6 ms.

    **Conclusion & Interpretation:**
    - **Result: 6 ms limit (Compute-Bound)**. The preprocessing stage must be strictly compute-bound to 6ms to preserve the end-to-end real-time deadline.
