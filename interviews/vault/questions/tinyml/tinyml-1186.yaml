title: Solar-Powered Audio on ARM Cortex-M4
scenario: >
  An acoustic anomaly detection system uses an STM32F4 powered by a solar panel providing 1 mW continuously.
  It samples audio at 16 kHz, extracts MFCCs, and runs a 500k MAC INT8 CNN.
question: How can a solar-powered Cortex-M4 audio detector stay under a continuous 1 mW budget?
details:
  realistic_solution: |
    The optimal architecture leverages a low-power analog hardware Voice Activity Detector (VAD) to keep the MCU in deep sleep. Once triggered, the MCU uses DMA to buffer audio into a ping-pong buffer in the 256 KB SRAM. The core wakes periodically to compute fixed-point MFCCs. During inference, leveraging CMSIS-NN SIMD, the 500k MAC CNN executes extremely quickly, minimizing active time before returning to deep sleep, ensuring average power remains under the 1 mW budget.
  common_mistake: |
    **The Pitfall:** Waking up the entire 168 MHz MCU for every audio frame without leveraging hardware peripherals.
    **The Rationale:** Candidates ignore the massive active power draw of the STM32F4 and attempt floating-point math without an FPU.
    **The Consequence:** Average power vastly exceeds the 1 mW solar budget, causing the device to die.
  napkin_math: |
    **Assumptions & Constraints:**
    - Power Budget: 1 mW. Sleep draw: 0.1 mW.
    - M4 Active Power: ~132 mW.
    - Inference: 500k MAC CNN.

    **Calculations:**
    - CNN Cycles (SIMD): ~1M cycles. Time = 1M / 168 MHz = ~6 ms.
    - Inference Energy: 132 mW * 6 ms = 0.79 mJ.
    - Fixed-point MFCC Energy: ~1 ms = 0.13 mJ.
    - Total Active Energy per event: ~0.92 mJ.
    - Budget buffer: 1.0 mW - 0.1 mW = 0.9 mJ/s available for active tasks.

    **Conclusion & Interpretation:**
    - **Result: Power-Bound (1 Hz Max Rate)**. The math supports ~1 inference per second.
