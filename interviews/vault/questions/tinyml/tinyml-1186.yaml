title: Solar-Powered Audio on ARM Cortex-M4
scenario: >
  You are designing an acoustic anomaly detection system for remote pipelines using an ARM Cortex-M4 (STM32F4) running at 168 MHz with 256 KB SRAM, 1 MB flash, and no FPU. The system is powered by a small solar panel that provides an average of 1 mW continuously. You must architect a duty-cycled system that samples audio at 16 kHz, extracts MFCCs, and runs a 500k MAC INT8 CNN for anomaly detection without exceeding the energy budget.
question: >
  How can a solar-powered Cortex-M4 audio detector stay under a continuous 1 mW budget?
details:
  realistic_solution: >
    The optimal architecture leverages a low-power analog hardware Voice Activity Detector (VAD) to keep the MCU in deep sleep. Once triggered, the MCU uses DMA to buffer audio into a ping-pong buffer in the 256 KB SRAM. The core wakes periodically to compute fixed-point MFCCs. During inference, leveraging CMSIS-NN SIMD, the 500k MAC CNN executes extremely quickly, minimizing active time before returning to deep sleep, ensuring average power remains under the 1 mW budget.
  common_mistake: |
    **The Pitfall:** Waking up the entire 168 MHz MCU for every audio frame without leveraging hardware peripherals.
    **The Rationale:** Candidates ignore the massive active power draw of the STM32F4 and try to perform floating-point MFCC extraction without accounting for the lack of an FPU.
    **The Consequence:** Average power vastly exceeds the 1 mW solar budget, causing the device to die.
  napkin_math: |
    - **Power Draw:** STM32F4 active power at 168 MHz is ~132 mW. Sleep power is ~0.1 mW.
    - **CNN Inference:** 500k MAC INT8 CNN requires ~1 million cycles (2 cycles/MAC with CMSIS-NN SIMD). Time = 1M / 168 MHz = ~6 ms.
    - **Inference Energy:** 132 mW × 6 ms = 0.79 mJ.
    - **MFCC Energy:** Fixed-point MFCCs take ~1 ms = 0.13 mJ.
    - **Total Active Energy:** ~0.92 mJ per event.
    - **Budget:** With a 1 mW budget and 0.1 mW sleep draw, 0.9 mW (0.9 mJ/s) is available for active tasks.
    - **Conclusion:** The system can support a maximum of **~1 wake-up event per second** to survive perpetually.
