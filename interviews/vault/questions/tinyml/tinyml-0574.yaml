title: The Bootloader Pin Trap
scenario: You deploy a TinyML model on an ESP32 for a smart door lock. To save space, you wire the battery monitor ADC to GPIO 0. When you flash the firmware, the ML model works. When you unplug it from the computer and run it on battery, the device refuses to boot entirely.
question: Why does wiring an ESP32 battery monitor to GPIO 0 make a smart lock boot on USB but brick on battery?
details:
  realistic_solution: GPIO 0 is a critical strapping pin on the ESP32. The battery monitor's voltage divider pulls it low, triggering download mode. The fix requires moving the ADC trace to a non-strapping pin.
  common_mistake: |
    **The Pitfall:** Diagnosing this as a power issue ("The battery monitor is drawing too much current").
    **The Rationale:** Candidates fail to understand hardware strapping pins and assume any failure on battery power must be current-related.
    **The Consequence:** Wasting weeks debugging power supplies when the actual fix is simply moving a single trace to a different GPIO pin.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - ESP32 bootloader checks strapping pins (GPIO 0) for ~1 ms.
       - Battery monitor ADC divider attached to GPIO 0.
    2. **Calculations:**
       - ADC circuit pulls GPIO 0 < 1.5V (Logic LOW).
       - USB serial adapter weakly pulls GPIO 0 > 2.5V (Logic HIGH).
    3. **Conclusion & Interpretation:**
       **Result: Device enters download mode instead of booting.** The failure is purely **Hardware-Boot-State-Bound**, completely unrelated to power draw or inference code.
