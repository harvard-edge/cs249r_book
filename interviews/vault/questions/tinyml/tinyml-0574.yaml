title: The Bootloader Pin Trap
scenario: You deploy a TinyML model on an ESP32 for a smart door lock. It runs perfectly. You design a
  custom PCB to shrink the device, and to save space, you wire the battery monitor ADC to GPIO 0. When
  you flash the firmware, the ML model works. When you unplug it from the computer and run it on battery,
  the device refuses to boot entirely. Why did moving a single sensor pin brick the deployment?
question: "Why does wiring an ESP32 battery monitor to GPIO 0 make a smart lock boot on USB but brick on battery?"
details:
  realistic_solution: 'GPIO 0 is a strapping pin on ESP32 — it determines boot mode during the first 1ms
    after power-on. The battery monitor''s ADC circuit pulls GPIO 0 low through its voltage divider, which
    the bootloader interprets as ''enter download mode'' instead of ''run application.'' When connected
    to USB, the serial adapter holds GPIO 0 high during boot, masking the problem. Fix: never connect
    external circuits to strapping pins (GPIO 0, 2, 5, 12, 15 on ESP32). Use a non-strapping GPIO for
    the ADC, or add a high-value pull-up resistor to override the divider during the boot sampling window.'
  common_mistake: '"The battery monitor is drawing too much current." ADC pins draw nanoamps; it''s not
    a power issue.'
  napkin_math: The bootloader samples the strapping pins for approximately 1 millisecond at boot. A single
    resistor pulling GPIO 0 below 1.5V during that 1ms window turns a $50 smart lock into a paperweight.
