title: The Power Supply ADC Jitter
scenario: Your vibration monitoring system on an ESP32-C6 uses the built-in 12-bit SAR ADC to sample a piezoelectric vibration sensor at 10 kHz. The model was trained on data from a benchtop DAQ with 16-bit resolution. In the field, the model's anomaly detection F1-score drops from 0.92 to 0.71. The vibration signal amplitude is correct, but the frequency spectrum shows unexpected broadband noise above 2 kHz.
question: "Why does the ESP32-C6 ADC introduce broadband noise above 2 kHz, and how does it drop the F1-score to 0.71?"
details:
  realistic_solution: The ESP32-C6 SAR ADC shares silicon substrate and power supply with the WiFi radio. When WiFi transmits, current spikes create supply noise coupling directly into the ADC, reducing ENOB. This broadband noise floor buries vibration fault harmonics above 2 kHz that the model was trained to detect. Fixes: Disable WiFi during ADC sampling or use 16x oversampling.
  common_mistake: |
    **The Pitfall:** Assuming the ESP32's ADC is just lower quality than the DAQ and accepting the 12-bit vs 16-bit resolution loss.
    **The Rationale:** Candidates fail to realize that the raw resolution difference only accounts for a ~1-2% accuracy loss, not a 21% drop.
    **The Consequence:** They miss the underlying hardware interference (Wi-Fi supply noise) causing the massive degradation.
  napkin_math: |
    1. Identify ADC stats: 12-bit, 3.3V range, LSB = 3.3V / 4096 = 0.806 mV.
    2. Calculate Wi-Fi TX supply noise: 300 mA current spike * 100 mOhm PCB trace = 30 mV ripple.
    3. Calculate noise in LSBs: 30 mV / 0.806 mV = 37 LSBs.
    4. Calculate Effective Number of Bits (ENOB): 12 - log2(37) = 12 - 5.2 = 6.8 bits.
    5. Compare to training DAQ: 16-bit DAQ has ENOB ~14.5 bits (SNR gap: 46 dB vs 23 dB).
    6. **Final Result: Wi-Fi activity reduces ENOB to 6.8 bits, causing the massive F1 drop.**
