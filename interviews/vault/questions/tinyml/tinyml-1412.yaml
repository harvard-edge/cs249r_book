title: 'nRF5340 KWS Inference Optimization: Graph Compilation Challenge'
scenario: A keyword spotting (KWS) deep learning model, composed of convolutional and fully connected layers, needs to be deployed on a Nordic nRF5340 microcontroller (128 MHz CPU, 256 KB SRAM, 1 MB flash, BLE). The current deployment, using a baseline interpreter, yields an inference time of 500 ms, which is unacceptable for a real-time voice interface. Your team's goal is to achieve an inference time under 50 ms.
question: How would you diagnose the 500 ms baseline inference bottleneck and propose an AOT graph compilation strategy to achieve a 50 ms target?
details:
  realistic_solution: "The realistic solution involves implementing an Ahead-of-Time (AOT) compilation pipeline: \n1.  **Operator Lowering:** Map high-level tensor operations to highly optimized, hardware-specific intrinsics or library calls (e.g., using CMSIS-NN for ARM Cortex-M33's DSP extensions). This significantly improves compute efficiency. \n2.  **Constant Folding:** Pre-compute and bake in static graph operations, such as folding batch normalization into convolutional layers' weights and biases, reducing runtime computation. \n3.  **Graph Fusion:** Combine sequences of operations (e.g., Conv2D + ReLU + Pool) into a single fused kernel to minimize memory accesses and kernel launch overhead, critical for SRAM-constrained devices. \n4.  **Memory Allocation & Reuse:** Implement a static memory planner that analyzes the graph's tensor lifetimes to maximize memory reuse within the 256 KB SRAM, preventing dynamic allocations or costly transfers. \n5.  **Framework Compilers:** Leverage specialized compilers like TensorFlow Lite for Microcontrollers' interpreter/compiler or Apache TVM for generating highly optimized C/C++ code tailored for the nRF5340 architecture."
  common_mistake: |
    **The Pitfall:** Focusing exclusively on model-level optimizations like quantization or pruning.
    **The Rationale:** Candidates often overlook the compiler's role and the overhead of interpreters or poor operator lowering.
    **The Consequence:** A heavily pruned model running on a slow interpreter will still miss the latency target while unnecessarily sacrificing accuracy.
  napkin_math: |
    * **Target Speedup:** 500 ms down to 50 ms requires a **10x speedup**.
    * **CPU Cycles:** At 128 MHz, 500 ms = ~64 million cycles. Target 50 ms = ~6.4 million cycles.
    * **Operator Lowering Impact:** A naive float MAC takes >10 cycles on Cortex-M33. CMSIS-NN intrinsics for INT8 MACs take 1-2 cycles (5-10x speedup).
    * **Memory Accesses:** Fusing operations saves intermediate loads/stores. E.g., saving a 32 KB intermediate tensor read/write saves ~640,000 cycles.
