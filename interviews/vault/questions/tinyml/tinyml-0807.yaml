title: Tinyml New 0031
scenario: A high-priority motor control task runs at 1kHz on a Cortex-M4. A low-priority TinyML model runs every second. Randomly, the motor control task misses its 1ms deadline, causing physical jitter.
question: What is causing the Cortex-M4 motor control deadline misses, and how should the shared resource be protected?
details:
  realistic_solution: Priority inversion is occurring. The low-priority TinyML task locks a shared resource (e.g., an I2C bus mutex to read a sensor). The high-priority motor task attempts to lock it and blocks. A medium-priority task then preempts the TinyML task, effectively delaying the high-priority motor task indefinitely. Implement Priority Inheritance Protocols (PIP) on the mutex.
  common_mistake: |
    **The Pitfall:** Failing to account for shared resource locking.
    **The Rationale:** Developers often focus purely on CPU priority and overlook how real-time critical tasks interact with long-running ML tasks over shared peripherals (like I2C buses).
    **The Consequence:** The system experiences priority inversion, leading to unpredictable latency spikes and missed hard real-time deadlines.
  napkin_math: |
    1. The motor task requires a 1000us window (1ms deadline).
    2. The ML task holds a shared mutex for 500us.
    3. A medium-priority task preempts the ML task for 800us while the mutex is held.
    4. The motor task must wait 500us + 800us = 1300us.
    5. 1300us > 1000us, so the deadline is missed by **300us**.
