title: The nRF5340 Network Core Split
scenario: 'You''re deploying a keyword spotting model on the Nordic nRF5340, which has two Cortex-M33
  cores: an application core (128 MHz, 512 KB flash, 256 KB SRAM) and a network core (64 MHz, 256 KB flash,
  64 KB SRAM) dedicated to BLE. Your model needs 180 KB SRAM for the tensor arena. The product must stream
  classification results over BLE. How do you partition memory and processing, and what happens if the
  BLE stack on the network core needs to interrupt the application core mid-inference?'
question: "How do you partition memory and processing, and what happens if the BLE stack on the network core needs to interrupt the application core mid-inference?"
details:
  realistic_solution: 'Run inference exclusively on the application core (128MHz, 256KB SRAM) — the 180KB
    tensor arena only fits there. BLE runs on the dedicated network core (64MHz, 64KB SRAM). Use IPC (shared
    RAM mailbox) to send the 1-byte classification result from app core to network core. This architecture
    eliminates BLE interrupt jitter during inference: app core sees 0 interrupts (vs ~4 per inference
    on single-core nRF52840). Inference: 30ms deterministic. IPC + BLE transmit: 2ms. Total pipeline:
    32ms end-to-end with <1us jitter — a major reliability improvement over single-core designs.'
  common_mistake: '"Run inference on the network core to keep the application core free for the app logic."
    The network core only has 64 KB SRAM — the 180 KB tensor arena doesn''t fit. Also, the network core''s
    256 KB flash is mostly consumed by the BLE softdevice (~150 KB).'
  napkin_math: 'Single-core (nRF52840): 30ms inference + 4 BLE interrupts × 3ms = 42ms effective latency.
    Jitter: ±12ms. Dual-core (nRF5340): 30ms inference + 0 interrupts = 30ms. Jitter: ±1 µs. IPC overhead:
    1 µs signal + 2ms BLE transmit = 2.001ms from classification to over-the-air. Total pipeline: 30ms
    inference + 2ms BLE = 32ms end-to-end. Power: app core active 30ms at 30 mW = 0.9 mJ. Network core:
    3 mW always-on for BLE = 3 mJ/s. At 1 inference/s: 0.9 + 3.0 = 3.9 mJ/cycle.'
