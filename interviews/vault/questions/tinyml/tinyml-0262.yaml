title: The TinyML Compute Threshold
scenario: When optimizing a model for a Cortex-M4 microcontroller, you need to know whether your workload is limited by memory bandwidth or by the CPU core.
question: What is the approximate 'ridge point'—the minimum arithmetic intensity (Ops/Byte) required for a workload to become compute-bound on this class of device?
details:
  realistic_solution: A typical Cortex-M4 has a ridge point of approximately 0.5 Ops/Byte, meaning it is massively compute-bound for neural networks due to high-bandwidth on-chip SRAM.
  common_mistake: |
    **The Pitfall:** Applying cloud GPU intuition (memory wall) to microcontrollers.
    **The Rationale:** Engineers assume the off-chip HBM/GDDR bandwidth bottleneck applies to MCUs, forgetting that MCUs fetch from cycle-accurate, zero-wait-state on-chip SRAM.
    **The Consequence:** Incorrectly prioritizing memory bandwidth optimization over pure arithmetic optimization (MAC throughput).
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4 CPU Clock: ~100 MHz. SRAM Bus: 32-bit (4 bytes) per cycle.
    - Compute: 1 to 2 MACs (2 to 4 Ops) per cycle.

    **Calculations:**
    - Peak Memory Bandwidth: 4 bytes / cycle.
    - Peak Compute: ~2 Ops / cycle (without SIMD).
    - Ridge Point: Peak Compute / Memory Bandwidth = 2 Ops / 4 bytes = 0.5 Ops/Byte.

    **Conclusion & Interpretation:**
    - **Result: ~0.5 Ops/Byte (Compute-Bound)**. The system is compute-bound for typical neural networks, as the arithmetic intensity of convolutions far exceeds 0.5 Ops/Byte.
  options:
  - '~300 Ops/Byte'
  - '~10 Ops/Byte'
  - '~0.5 Ops/Byte'
  - '~50 Ops/Byte'
