title: The TinyML Compute Threshold
scenario: When optimizing a model for a Cortex-M4 microcontroller, you need to know whether your workload
  is limited by memory bandwidth or by the CPU core. What is the approximate 'ridge point'—the minimum
  arithmetic intensity (Ops/Byte) required for a workload to become compute-bound on this class of device?
question: "What is the approximate 'ridge point'—the minimum arithmetic intensity (Ops/Byte) required for a workload to become compute-bound on this class of device?"
details:
  realistic_solution: A typical Cortex-M4 has a ridge point of approximately 0.5 Ops/Byte. This means
    a workload only needs to perform 0.5 operations for every byte of data moved to saturate the compute
    core. Since most neural network layers (like convolutions) have a much higher arithmetic intensity
    than this, they are heavily compute-bound. Performance on simple microcontrollers is fundamentally
    limited by the CPU's MAC throughput, not memory bandwidth.
  common_mistake: Engineers might assume that the memory wall seen in cloud GPUs applies directly to microcontrollers.
    However, because MCUs fetch from extremely fast, cycle-accurate on-chip SRAM rather than off-chip
    HBM or GDDR, their memory bandwidth is massive relative to their weak compute cores. This makes almost
    all TinyML workloads compute-bound, not memory-bound.
  napkin_math: The ridge point is the ratio of peak compute to peak memory bandwidth.
  options:
  - ~300 Ops/Byte
  - ~10 Ops/Byte
  - ~0.5 Ops/Byte
  - ~50 Ops/Byte
  correct_index: 2
