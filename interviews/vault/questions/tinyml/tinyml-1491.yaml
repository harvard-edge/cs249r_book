title: Binary and Ternary Quantization Feasibility on Cortex-M4
scenario: A TinyML researcher proposes using binary neural networks (1-bit weights) for a 100K parameter keyword spotting model on Cortex-M4. The baseline INT8 model achieves 92% accuracy.
question: Do binary or ternary weights make more sense for a 100K-parameter KWS model on a 168 MHz Cortex-M4 to balance compute benefits and accuracy risks?
details:
  realistic_solution: 'Binary weights: 100K bits = 12.5KB model (vs 100KB INT8). With ARM DSP SIMD, XNOR+popcount can process 32 bits per cycle → 32× theoretical speedup over INT8 scalar. With DSP extensions: ~16-20× practical speedup. Typical binarization accuracy loss: 5-15% on keyword spotting. Expected: 92% → 77-87%. For keyword spotting, 85%+ is often acceptable. Ternary (-1, 0, +1) offers better accuracy (typically 2-5% loss) with ~16× speedup using packed representation. Recommend ternary: accuracy ~88-90%, 12.5KB storage, ~16× faster.'
  common_mistake: |
    **The Pitfall:** Overestimating binary network speedup on ARM.
    **The Rationale:** Candidates assume binary networks natively achieve a 32x speedup over INT8 on Cortex-M4 without considering instruction set nuances.
    **The Consequence:** They fail to realize actual speedup depends on XNOR/popcount implementation overhead and whether the core actually utilizes DSP extensions efficiently, leading to miscalculated latency budgets.
  napkin_math: |
    - Storage: 100K bits = 12.5KB (Binary) vs 100KB (INT8). 8× reduction.
    - Speedup via XNOR+popcount: 32× theoretical, 16-20× practical.
    - Accuracy loss: binary loses 5-15%, ternary loses 2-5%.
    - At 168MHz with DSP: INT8 = ~50ms, binary = **~3ms inference**.
