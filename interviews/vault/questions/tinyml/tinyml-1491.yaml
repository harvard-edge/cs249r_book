title: Binary and Ternary Quantization Feasibility on Cortex-M4
scenario: A TinyML researcher proposes using binary neural networks (1-bit weights) for a 100K-parameter keyword spotting model on a 168 MHz Cortex-M4. The baseline INT8 model achieves 92% accuracy.
question: Do binary or ternary weights provide a better tradeoff for a 100K-parameter model on a Cortex-M4 considering compute latency and accuracy risks?
details:
  realistic_solution: Ternary quantization (-1, 0, +1) offers the superior tradeoff. While binary weights drastically reduce memory (12.5KB vs 100KB INT8), they often suffer severe accuracy degradation (5-15% drops). Furthermore, while binary XNOR+popcount theoretically processes 32 bits per cycle, instruction overhead limits practical speedups. Ternary weights provide a nearly identical ~16x hardware speedup via packed representations on the ARM DSP SIMD, but significantly preserve model capacity, typically limiting accuracy loss to a highly acceptable 2-5%.
  common_mistake: |
    **The Pitfall:** Assuming binary networks automatically achieve 32x theoretical speedups.
    **The Rationale:** Candidates map the 32-bit bus width directly to a 32x latency reduction over INT8 without analyzing instruction set architectures.
    **The Consequence:** They drastically miscalculate the latency budget, failing to realize that XNOR/popcount implementation overhead and DSP pipeline stalls halve the expected performance gains.
  napkin_math: |
    1. **Assumptions & Constraints**:
       - 100,000 parameters. INT8 model = 100 KB.
       - Cortex-M4 DSP instructions available.
       - Baseline accuracy = 92%.
    2. **Calculations**:
       - Binary footprint: 100,000 bits / 8 = 12.5 KB (8x reduction).
       - Binary speedup: 32x theoretical, but 16-20x practical overhead.
       - Ternary speedup: ~16x practical with packed representations.
       - Expected accuracy: Binary ≈ 77-87%; Ternary ≈ 88-90%.
    3. **Conclusion & Interpretation**:
       - **Result: Compute-Bound Accuracy**. Ternary quantization minimizes the accuracy penalty (retaining ~89%) while still delivering a 16x latency speedup and fitting the weights into <25 KB of SRAM.
