title: 'The Energy Harvesting Inference Budget'
scenario: 'Your structural health monitoring sensor is powered by a solar energy harvesting system: a 2 cm² indoor solar cell (generating ~10 µW under 500 lux office lighting) charging a 100 µF supercapacitor. The MCU is an Apollo4 Blue (Cortex-M4F, 192 MHz, 2 MB SRAM, 2 MB MRAM) running a vibration anomaly model. The model inference costs 1.2 mJ.'
question: 'How many inferences per hour can you sustain, and what happens during a cloudy day when light drops to 50 lux?'
details:
  realistic_solution: 'Build the complete energy budget: 500 lux: 10 µW net -> 36 mJ/hr. Sleep: 3.6 mJ/hr. Inference budget: 32.4 mJ/hr -> 27 inferences/hr. 200 lux: 4 µW net -> 14.4 mJ/hr. Sleep: 3.6 mJ/hr. Budget: 10.8 mJ/hr -> 9 inferences/hr. 50 lux: 1 µW net -> 3.6 mJ/hr. Sleep: 3.6 mJ/hr. Budget: 0 mJ/hr -> 0 inferences. The system cannot sustain any inferences at 50 lux without draining the capacitor.'
  common_mistake: |
    **The Pitfall:** Calculating inferences via simple division without accounting for static sleep power.
    **The Rationale:** Candidates do a naive `10 µW harvested / energy per inference` to get inferences per second.
    **The Consequence:** This completely ignores the energy storage dynamics and the MCU's continuous baseline sleep power, resulting in a wildly over-optimistic inference rate and a dead sensor.
  napkin_math: |
    **Assumptions & Constraints:**
    - Harvest at 500 lux: 10 µW.
    - Harvest at 50 lux: 1 µW.
    - Sleep power: 1 µW.
    - Inference cost: 1.2 mJ.

    **Calculations:**
    - Base harvest at 500 lux: 10 µW = 10 µJ/s = 36 mJ/hr.
    - Sleep power cost: 1 µW = 3.6 mJ/hr.
    - Usable budget at 500 lux: 36 mJ/hr - 3.6 mJ/hr = 32.4 mJ/hr. Inferences: 32.4 / 1.2 = 27/hr.
    - Base harvest at 50 lux: 1 µW = 3.6 mJ/hr. Usable budget: 3.6 - 3.6 = 0 mJ/hr.

    **Conclusion & Interpretation:**
    - **Result: 27 inferences/hr at 500 lux (Power-Bound)**. At 50 lux, 0 inferences/hr.
  options:
  - 'At 500 lux: 27 inferences/hour. At 50 lux: 0 inferences/hour — the 1 uW harvest exactly equals sleep power. Breakeven for 1 inference/hr: ~67 lux.'
  - 'The solar cell generates enough energy at 50 lux for 5 inferences/hour.'
  - 'At 500 lux: 30 inferences/hour (36 mJ / 1.2 mJ).'
  - 'The system can sustain 27 inferences/hour regardless of light level.'
