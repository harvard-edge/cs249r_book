title: The Energy Harvesting Inference Budget
scenario: Your structural health monitoring sensor is powered by a solar energy harvesting system: a 2 cm² indoor solar cell (generating ~10 µW under 500 lux office lighting) charging a 100 µF supercapacitor. The MCU is an Apollo4 Blue (Cortex-M4F, 192 MHz, 2 MB SRAM, 2 MB MRAM) running a vibration anomaly model. The model inference costs 1.2 mJ.
question: How many inferences per hour can you sustain, and what happens during a cloudy day when light drops to 50 lux?
details:
  realistic_solution: 'Build the complete energy budget: 500 lux: 10 µW net → 36 mJ/hr. Sleep: 3.6 mJ/hr. Inference budget: 32.4 mJ/hr → 27 inferences/hr. 200 lux: 4 µW net → 14.4 mJ/hr. Sleep: 3.6 mJ/hr. Budget: 10.8 mJ/hr → 9 inferences/hr. 50 lux: 1 µW net → 3.6 mJ/hr. Sleep: 3.6 mJ/hr. Budget: 0 mJ/hr → 0 inferences. The system cannot sustain any inferences at 50 lux without draining the capacitor.'
  common_mistake: |
    **The Pitfall:** Calculating inferences via simple division without accounting for sleep power.
    **The Rationale:** Candidates do a naive `10 µW harvested / energy per inference` to get inferences per second.
    **The Consequence:** This completely ignores the energy storage dynamics and the MCU's continuous baseline sleep power, resulting in a wildly over-optimistic inference rate.
  napkin_math: |
    1. Base harvest at 500 lux: 10 µW = 10 µJ/s = 36 mJ/hr.
    2. Sleep power cost: 1 µW sleep = 3.6 mJ/hr.
    3. Usable budget at 500 lux: 36 mJ/hr - 3.6 mJ/hr = 32.4 mJ/hr. **Inferences: 32.4 / 1.2 = 27/hr**.
    4. Base harvest at 50 lux: 1 µW = 3.6 mJ/hr.
    5. Usable budget at 50 lux: 3.6 mJ/hr - 3.6 mJ/hr = 0 mJ/hr. **Inferences: 0/hr**.
    6. Breakeven light level for 1 inference/hr: (3.6 mJ sleep + 1.2 mJ inference) = 4.8 mJ/hr (1.33 µW).
    7. Result: **~67 lux** is the absolute minimum to sustain operation.
  options:
  - 'At 500 lux: 27 inferences/hour (10 uW harvest = 36 mJ/hr, minus 3.6 mJ/hr sleep, leaves 32.4 mJ for inference). At 50 lux: 0 inferences/hour — the 1 uW harvest (3.6 mJ/hr) exactly equals sleep power, leaving zero energy for inference. Breakeven for 1 inference/hr: ~67 lux. The system must adaptively scale inference rate with ambient light.'
  - The solar cell generates enough energy at 50 lux for 5 inferences/hour because the supercapacitor stores enough energy during bright periods to sustain operation during dim periods.
  - 'At 500 lux: 300 inferences/hour. The 10 uW harvester easily powers the 1.2 mJ inference because the MCU sleeps between inferences and the supercapacitor provides burst power.'
  - The system can sustain 27 inferences/hour regardless of light level because the 100 uF supercapacitor provides sufficient energy storage to buffer through dim periods lasting several hours.
