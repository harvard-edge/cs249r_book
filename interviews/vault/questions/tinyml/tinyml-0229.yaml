title: The MCU Memory Wall
scenario: You're evaluating a Cortex-M4 microcontroller for a keyword spotting application. According to the datasheet and the 'Numbers Every ML Systems Engineer Should Know' guide, the chip has a peak compute performance of approximately 336 MFLOPS and its on-chip SRAM provides about 1.2 GB/s of memory bandwidth.
question: What is the Cortex-M4 ridge point, and what does it imply about whether typical ML layers are compute-bound?
details:
  realistic_solution: 'The ridge point defines the boundary between being memory-bound and compute-bound. It''s the minimum arithmetic intensity (AI) a model needs to have to saturate the compute units. With a ridge point of ~0.28 Ops/Byte, the Cortex-M4 has a very low threshold. Most neural network layers, even simple ones, have a higher AI than 0.28 Ops/Byte. Therefore, the processor will generally be compute-bound, meaning its theoretical peak MFLOPS is the primary bottleneck, and it will rarely be starved for data by the SRAM.'
  common_mistake: |
    **The Pitfall:** Concluding that the device is memory-bound because its ridge point is low.
    **The Rationale:** Engineers calculate the ridge point correctly but misinterpret what a "low threshold" means, erroneously believing it indicates a memory bottleneck.
    **The Consequence:** They waste time and resources optimizing SRAM memory access patterns when the system is actually compute-bound, missing the opportunity to reduce FLOPs via quantization or pruning.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak compute = 336 MFLOPS.
    - SRAM bandwidth = 1.2 GB/s.

    **Calculations:**
    - Ridge Point = Compute / Bandwidth = 336 MFLOPS / 1.2 GB/s = 0.28 Ops/Byte.

    **Conclusion & Interpretation:**
    - **Result: 0.28 Ops/Byte (Compute-Bound)**. Since most ML layers exceed 0.28 Ops/Byte, the processor easily saturates its MAC units before exhausting memory bandwidth.
  options:
  - '~280 Ops/Byte, making it profoundly memory-bound.'
  - '~3.57 Bytes/Op, meaning it''s inefficient.'
  - '~0.28 Ops/Byte, making it profoundly memory-bound.'
  - '~0.28 Ops/Byte, making it typically compute-bound.'
