title: LoRa Mesh Duty Cycle Pipeline Impact
scenario: Six industrial IoT nodes communicate over a 50 kbps LoRa mesh network to aggregate a 500-byte anomaly profile via a Halving/Doubling AllReduce algorithm. The LoRa MAC protocol imposes a 10% duty-cycle limit (node must sleep 9x the active transmit time) and a 20ms sync preamble per packet.
question: What is the absolute minimum elapsed time for a single node to complete its AllReduce portion, factoring in the duty-cycle stall?
details:
  realistic_solution: Halving/Doubling for N=6 requires ceil(log2(6)) = 3 steps for Reduce-Scatter and 3 steps for AllGather, totaling 6 collective steps. Each step transmits roughly 83.3 bytes (500/6). Transmission time per step is (83.3 * 8 bits / 50kbps) + 20ms preamble = 13.3ms + 20ms = 33.3ms. Because of the 10% duty cycle, the node must wait 9x the active time (299.7ms), making the total time block per step 333ms. Completing all 6 steps takes 6 * 333ms = 1.998 seconds.
  common_mistake: |
    **The Pitfall:** Calculating continuous transmission time without enforcing the mandatory MAC-layer duty-cycle sleep.
    **The Rationale:** Candidates often focus purely on bandwidth and packet size, ignoring regulatory or protocol-level duty cycles that dominate real-time performance.
    **The Consequence:** The pipeline latency is vastly underestimated, leading to missed real-time deadlines in the deployed network.
  napkin_math: |
    - Collective steps = ceil(log2(6)) Reduce-Scatter + ceil(log2(6)) AllGather = 6 steps.
    - Payload per step = 500 bytes / 6 = 83.3 bytes.
    - Active transmit time per step = (83.3 bytes * 8 bits / 50,000 bps) + 0.020s = 0.0133s + 0.020s = 0.0333s.
    - Duty cycle sleep (9x active time) = 0.0333s * 9 = 0.2997s.
    - Total time block per step = 0.0333s + 0.2997s = 0.333s.
    - **Final Result:** Total time for 6 steps = 6 * 0.333s = **1.998 seconds**.
