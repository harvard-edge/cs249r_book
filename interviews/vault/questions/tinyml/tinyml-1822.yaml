title: LoRa Mesh Duty Cycle Pipeline Impact
scenario: Six industrial IoT nodes communicate over a 50 kbps LoRa mesh network to
  aggregate a 500-byte anomaly profile via a Halving/Doubling AllReduce algorithm.
  The LoRa MAC protocol imposes a 10% duty-cycle limit (node must sleep 9x the active
  transmit time) and a 20ms sync preamble per packet.
question: Calculate the absolute minimum elapsed time for a single node to complete
  its portion of the AllReduce, factoring in the regulatory duty-cycle stall.
details:
  realistic_solution: Halving/Doubling for N=6 requires ceil(log2(6)) = 3 steps for
    Reduce-Scatter and 3 steps for AllGather, totaling 6 collective steps. Each step
    transmits roughly 83.3 bytes (500/6). Transmission time per step is (83.3 * 8
    bits / 50kbps) + 20ms preamble = 13.3ms + 20ms = 33.3ms. Because of the 10% duty
    cycle, the node must wait 9x the active time (299.7ms), making the total time
    block per step 333ms. Completing all 6 steps takes 6 * 333ms = 1.998 seconds.
  common_mistake: Calculating continuous transmission time without enforcing the mandatory
    MAC-layer duty-cycle sleep, which entirely dominates the actual real-time pipeline
    duration.
  napkin_math: 6 steps * ((83.3 * 8 / 50000 + 0.02) * 10) = 6 * (0.0333 * 10) = 1.998s
