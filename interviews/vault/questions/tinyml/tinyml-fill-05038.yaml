title: CMSIS-NN Kernel Selection for Optimal Inference on Cortex-M7+Ethos-U55
scenario: Deploying a 200KB INT8 CNN for gesture recognition on STM32H7 (Cortex-M7, 480MHz, 1MB SRAM)
  with Ethos-U55 NPU (256 MAC, 512KB SRAM). CMSIS-NN provides optimized kernels for M7. The model has
  depthwise separable convolutions. Decide which layers to route to M7 CMSIS-NN vs Ethos-U55 and why.
details:
  realistic_solution: 'Ethos-U55 supports: Conv2D, DepthwiseConv2D, FullyConnected, Pooling, ElementWise
    ops, Softmax. Ethos-U55 256 MACs at 500MHz = 256 GOPS INT8. Routes all supported depthwise conv and
    standard conv layers. Cortex-M7 with CMSIS-NN: handles custom layers, preprocessing, softmax if not
    on U55. Memory: Ethos-U55 has 512KB SRAM — must tile model through it. Transfer cost: activations
    between M7 and U55 via TCM/bus = ~100ns per 4KB. For 200KB model: U55 handles ~90% of FLOPs; M7 handles
    preprocessing and unsupported ops. Effective speedup vs M7-only: 480MHz M7 SIMD = ~100 MOPS; U55 =
    256 GOPS → 2560× raw advantage on supported ops.'
  common_mistake: Routing all layers to Ethos-U55 without checking if the layer type is supported; Ethos-U55
    supports a fixed set of operators and unsupported layers must fall back to CPU, incurring data transfer
    overhead.
  napkin_math: 'Ethos-U55: 256 MACs × 500MHz = 128 GOPS sustained. M7 CMSIS-NN DSP: ~200 MOPS on depthwise.
    U55 speedup on supported ops: 128G/0.2G = 640×. Route all conv/depthwise to U55. M7: preprocessing
    (normalization, feature extraction) and unsupported activations.'
