title: INT8 Per-Tensor Degradation in Depthwise Convolutions
scenario: You are deploying a continuous keyword spotting model. To fit within SRAM and minimize compute cycles, you apply INT8 Post-Training Quantization (PTQ) using a per-tensor scheme. During testing, specific depthwise convolution layers exhibit massive activation deviations, breaking the model's recall.
question: What quantization fundamental causes massive activation deviations in depthwise convolution layers under per-tensor INT8 PTQ?
details:
  realistic_solution: The root cause is applying a single global scale factor (per-tensor quantization) to channels with vastly different dynamic ranges. Channels with narrow weight distributions lose almost all precision when forced to use the large step size dictated by outlier channels. The correct solution is to switch to per-channel quantization for the weights, assigning a unique scale factor to each output channel to preserve its full INT8 precision without adding significant runtime overhead.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the issue as a calibration data mismatch and suggesting Quantization-Aware Training (QAT).
    **The Rationale:** Candidates fail to analyze the architectural property of depthwise convolutions, where weight distributions vary drastically across independent channels, making global scaling destructive.
    **The Consequence:** Wasting extensive engineering time on QAT when a simple switch to per-channel quantization would instantly solve the issue with minimal overhead.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 64-channel depthwise layer.
       - Channel A weights range: [-10.0, 10.0].
       - Channel B weights range: [-0.1, 0.1].
       - INT8 range: 255 steps.
    2. **Calculations:**
       - Per-Tensor Global Scale: 20.0 / 255 = 0.0784.
       - Channel B Quantized Values: (-0.1 to 0.1) / 0.0784 = only 3 distinct values (-1, 0, 1).
       - Per-Channel Scale for B: 0.2 / 255 = 0.00078 (retains full 8-bit precision).
       - Per-Channel Memory Overhead: 64 channels * 4 bytes (FP32 scale) = 256 bytes.
    3. **Conclusion & Interpretation:**
       - **Result: Precision-Bound.** Per-tensor quantization destroys features in narrow-distribution channels. Per-channel scaling consumes a negligible ~256 bytes while fully resolving the precision collapse.
