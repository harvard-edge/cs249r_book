title: Tinyml New 0035
scenario: >
  An M4 processor uses a PID control loop running at 500Hz to balance a drone. A TinyML task runs asynchronously to detect hand gestures. When a gesture is detected, the drone physically jerks and loses balance.
question: >
  Why does the drone jerk when the TinyML gesture task runs, and how should task priorities protect the PID loop?
details:
  realistic_solution: >
    The ML task is either preempting the PID control loop, or holding a critical resource. PID loops require exact timing intervals to compute derivatives correctly. If the ML task delays the PID execution, the measured `dt` (delta time) is suddenly much larger, but the PID constants are tuned for the expected `dt`. This causes a massive erroneous control output. Adjust task priorities.
  common_mistake: |
    **The Pitfall:** Running ML tasks without strict RTOS priority isolation from safety-critical cyber-physical control loops.
    **The Rationale:** Software engineers assume that long-running tasks just "take more time" without realizing that delaying a real-time control loop corrupts its mathematical integration/derivation.
    **The Consequence:** The PID loop calculates an incorrect derivative, causing a massive, destabilizing control output.
  napkin_math: |
    - **Expected dt:** PID loop at 500Hz = 2ms expected delta time (`dt`).
    - **Delayed dt:** If the ML task delays execution by 5ms, the actual `dt` = 7ms.
    - **Derivative Error:** The D-term is computed assuming a 2ms `dt`, but the physical change occurred over 7ms.
    - **Conclusion:** This causes a **3.5x spike** (7ms / 2ms) in the D-term output, explaining the physical jerk.
