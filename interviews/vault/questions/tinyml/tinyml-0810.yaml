title: Tinyml New 0035
scenario: >
  An M4 processor uses a PID control loop running at 500Hz to balance a drone, while an asynchronous TinyML task detects hand gestures.
question: Why does the drone jerk when the TinyML gesture task runs, and how should task priorities protect the PID loop?
details:
  realistic_solution: |
    The ML task is either preempting the PID control loop, or holding a critical resource. PID loops require exact timing intervals to compute derivatives correctly. If the ML task delays the PID execution, the measured `dt` (delta time) is suddenly much larger, but the PID constants are tuned for the expected `dt`. This causes a massive erroneous control output. Adjust task priorities.
  common_mistake: |
    **The Pitfall:** Running ML tasks without strict RTOS priority isolation from safety-critical cyber-physical control loops.
    **The Rationale:** Software engineers assume long-running tasks just "take more time" without realizing they corrupt mathematical integration/derivation.
    **The Consequence:** The PID loop calculates an incorrect derivative, causing a massive, destabilizing control output.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - PID loop frequency: 500Hz (2ms expected dt).
    2. **Calculations:**
       - Base dt = 2ms.
       - If ML task preempts/delays PID by 5ms, actual dt = 7ms.
       - The D-term assumes 2ms but the physical change occurred over 7ms.
       - Spike magnitude: 7ms / 2ms = 3.5x.
    3. **Conclusion & Interpretation:** Jitter corrupts the derivative term, destabilizing flight. **Result: Real-Time-Latency-Bound**.
