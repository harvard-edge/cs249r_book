title: Architecting ML Safety on Dual-Core nRF5340
scenario: Your team is deploying an industrial anomaly detection model on a Nordic
  nRF5340. The system must meet stringent functional safety requirements, demanding
  deterministic execution and rapid failure detection. The ML model runs on the 128
  MHz app core, while the 64 MHz net core handles BLE 5.3 telemetry. Given the strict
  constraints of 256 KB SRAM, 1 MB flash, and a ~5mA active power budget, how do you
  architect the watchdog timers, memory protection, and task scheduling to ensure
  the ML workload never compromises the safety-critical fault handling?
question: How should you architect watchdogs, MPU protection, and task scheduling
  so nRF5340 ML inference cannot compromise safety fault handling?
details:
  realistic_solution: The optimal approach uses a Memory Protection Unit (MPU) on
    the 128 MHz app core. A high-priority, deterministic safety task manages a windowed
    watchdog timer (WWDT) and orchestrates self-tests. The ML inference runs in a
    lower-priority task, sending 'alive' signals to the safety task, which aggregates
    them before feeding the hardware WWDT. Critical safety state is locked in specific
    MPU-protected SRAM regions to prevent corruption.
  common_mistake: Candidates often suggest using a single monolithic RTOS task with
    a standard hardware watchdog, failing to isolate the non-deterministic ML workload
    from safety logic. They also frequently neglect the time overhead of memory self-test
    routines, which can cause watchdog resets if not carefully scheduled.
  napkin_math: 'We partition the 256 KB SRAM using the MPU: 192 KB for the ML tensor
    arena, 32 KB for RTOS/network buffers, and 32 KB isolated for safety state. On
    the 128 MHz app core, a typical inference takes 50ms. At ~5mA active current,
    this consumes 0.25 mAs per inference. If the WWDT deadline is 100ms, the system
    has 50ms of slack. This slack is used to perform incremental self-tests (e.g.,
    verifying 64 KB chunks of the 1 MB flash per cycle), ensuring deterministic safety
    execution before the net core transmits the BLE 5.3 payload.'
