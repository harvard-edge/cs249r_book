title: Audio Streaming Ping-Pong Sizing on Cortex-M4
scenario: You are designing a continuous audio ingestion pipeline for an acoustic event detector on an
  ARM Cortex-M4 (STM32F4). The microphone streams 16 kHz, 16-bit audio via I2S, and the system must compute
  a 512-point Mel spectrogram every 16 ms stride. Given the microcontroller's 168 MHz clock, 256 KB SRAM,
  and lack of an FPU, evaluate the memory overhead of a DMA ping-pong buffer and quantify the compute
  budget remaining for the neural network inference per frame.
question: "How should you size the DMA ping-pong audio buffer and remaining compute budget for a Cortex-M4 Mel spectrogram pipeline?"
details:
  realistic_solution: The optimal approach uses a hardware DMA ping-pong buffer sized precisely to the
    16 ms stride, allowing the CPU to process the previous frame while the next is captured in the background.
    Because there is no FPU, feature extraction must use fixed-point math (e.g., CMSIS-DSP arm_rfft_q15).
    This ensures the FFT and Mel-filterbank compute stays within a small fraction of the available cycles,
    leaving the SIMD engine ample headroom for the model.
  common_mistake: Candidates often forget the platform lacks an FPU and assume standard 32-bit floating-point
    libraries can be used, which would decimate the clock budget via software emulation. Additionally,
    they frequently allocate massive monolithic buffers instead of a tight DMA ping-pong strategy, causing
    dropped frames or exhausting the SRAM.
  napkin_math: '1. Stride: 16 ms = 256 samples at 16 kHz.

    2. DMA Ping-Pong SRAM: 2 buffers * 256 samples * 2 bytes (16-bit) = 1,024 bytes (1 KB), taking <0.5%
    of the 256 KB SRAM.

    3. Cycle Budget: 16 ms frame window @ 168 MHz = 2,688,000 total cycles available per frame.

    4. DSP Compute: A 512-point fixed-point FFT + Mel-scale processing takes roughly 150,000 cycles, leaving
    ~2.53M cycles for the NN.

    5. NN Headroom: With CMSIS-NN SIMD (2x INT8 MACs/cycle), the model can perform ~5M INT8 MACs per 16
    ms frame.'
