title: Cortex-M4 Sensor Queue Sizing
scenario: Designing an anomaly detection pipeline on a Cortex-M4 where sensor readings
  arrive via interrupts.
question: Specify the optimal queue depth and drop policy to handle a Poisson arrival
  rate of 50 Hz given a model execution time of 15 ms, to maintain 99% availability
  without overflowing a 2 KB SRAM buffer.
details:
  realistic_solution: The arrival rate is 50 Hz and service rate is 1/0.015 = 66.6
    Hz, yielding a utilization ratio of 0.75. Using M/M/1 queueing bounds, maintaining
    99% availability requires a queue depth of approximately 17 items. With each data
    frame taking 32 bytes, a 544-byte ring buffer with a tail-drop policy is specified,
    easily fitting in the 2 KB SRAM.
  common_mistake: Assuming a deterministic arrival rate and specifying a queue depth
    of 1 or 2, leading to silently dropped interrupts during bursty sensor arrivals.
  napkin_math: 50 Hz / 66.6 Hz = 0.75 utilization
