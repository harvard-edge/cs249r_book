title: TinyML Memory Latency Analysis on STM32F4
scenario: You are deploying a tiny convolutional neural network (CNN) for keyword spotting on an ARM Cortex-M4 STM32F4 microcontroller. The CNN requires 100 KB for model weights and 50 KB for activations, both stored in SRAM. During a critical section of the CNN, there are 500 data accesses to SRAM, each taking 2 CPU cycles. This critical section executes 1000 times per inference. The total inference budget for this critical section across all 1000 executions is 10 ms.
question: How many CPU cycles remain for non-memory operations in the STM32F4 CNN critical section after SRAM access costs?
details:
  realistic_solution: Analyze the memory access patterns of critical code sections. Use profiling tools to measure actual memory access times. Employ techniques like data locality, efficient data structures, and strategic placement of frequently used data in the fastest available memory (e.g., registers, if applicable for small datasets) to reduce frequent, non-contiguous accesses.
  common_mistake: |
    **The Pitfall:** Overlooking memory access latency as a primary bottleneck.
    **The Rationale:** Candidates assume all operations are CPU-bound and ignore data movement costs.
    **The Consequence:** They overestimate the available CPU cycles for computation, missing real-time deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:** Total inference budget = 10 ms. M4 at 168 MHz. 500 accesses * 1000 executions, 2 cycles/access.
    2. **Calculations:** Available cycles = 0.010 s * 168,000,000 = 1,680,000 cycles. SRAM accesses = 500,000 accesses. Memory latency = 500,000 * 2 = 1,000,000 cycles. Remaining = 1,680,000 - 1,000,000 = 680,000 cycles.
    3. **Conclusion & Interpretation:** **680,000 cycles remain for non-memory operations. Result: Memory-Latency-Bound.**
