title: Dual-Core Operator Scheduling on Nordic nRF5340
scenario: You are deploying an anomaly detection model on a Nordic nRF5340 microcontroller (128 MHz app core, 64 MHz net core, 256 KB total SRAM). The system must maintain a continuous BLE 5.3 connection while running inferences within a ~5mA active power budget. The neural network contains two parallel convolutional branches that concatenate at the end.
question: How would you design the operator execution schedule to leverage the dual cores, apply layer fusion, and optimize memory reuse to fit within the strict SRAM limits?
details:
  realistic_solution: 'The correct system-level decision is to isolate the BLE 5.3 stack and sensor DMA on the 64 MHz net core, ensuring radio stability. The 128 MHz app core should handle all ML operations to minimize active compute time and stay within the ~5mA budget. To solve the memory bottleneck, apply a depth-first operator schedule: compute Branch A entirely, fuse its output layers to shrink the intermediate tensor size, and only then compute Branch B. An in-place memory arena can then reuse Branch A''s freed activation SRAM for Branch B''s computations.'
  common_mistake: |
    **The Pitfall:** Offloading one ML branch to the 64 MHz net core and using breadth-first scheduling.
    **The Rationale:** Assuming parallel cores should both run ML for speed, and defaulting to standard topological execution without considering memory limits.
    **The Consequence:** Destabilizing the timing-critical BLE stack by starving the net core, and crashing the device due to out-of-memory errors from simultaneous branch allocation.
  napkin_math: |
    1. **SRAM Budget:** 256 KB Total - 64 KB (BLE/Net Core) - 16 KB (DMA) = **176 KB** App Core SRAM.
    2. **Breadth-First Peak Memory:** 90 KB (Branch A) + 80 KB (Branch B) = 170 KB. (Leaves only 6 KB for RTOS—unsafe).
    3. **Depth-First Optimization:** Compute Branch A entirely and fuse outputs to a 10 KB tensor before starting Branch B.
    4. **New Peak Memory:** max(90, 10 + 80) = **90 KB**.
    5. **Conclusion:** 176 KB - 90 KB = 86 KB safely reserved for application state and heap.
