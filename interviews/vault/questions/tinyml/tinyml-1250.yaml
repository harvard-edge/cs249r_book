title: Dual-Core Operator Scheduling on Nordic nRF5340
scenario: You are deploying an anomaly detection model on a microcontroller with 256 KB total SRAM. The system must maintain a continuous BLE 5.3 connection while running inferences within a ~5mA active power budget. The neural network contains two parallel convolutional branches that concatenate at the end.
question: How would you design the operator execution schedule to leverage the dual cores, apply layer fusion, and optimize memory reuse to fit within the strict SRAM limits?
details:
  realistic_solution: "Isolate the BLE 5.3 stack and sensor DMA on the net core, ensuring radio stability. The app core handles ML operations. To solve the memory bottleneck, apply a depth-first operator schedule: compute Branch A entirely, fuse its output layers, and only then compute Branch B."
  common_mistake: |
    **The Pitfall:** Offloading one ML branch to the net core and using breadth-first scheduling.
    **The Rationale:** Assuming parallel cores should both run ML for speed, and defaulting to standard topological execution without considering memory limits.
    **The Consequence:** Destabilizing the timing-critical BLE stack by starving the net core, and crashing the device due to out-of-memory errors from simultaneous branch allocation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total SRAM: 256 KB.
       - Required: 64 KB (BLE), 16 KB (DMA).
       - Branches: A (90 KB peak), B (80 KB peak).
    2. **Calculations:**
       - App Core SRAM: 256 KB - 64 KB - 16 KB = 176 KB.
       - Breadth-First: 90 KB + 80 KB = 170 KB (Leaves only 6 KB for RTOS, unsafe).
       - Depth-First Optimization: Compute A, fuse to 10 KB, then start B.
       - New Peak Memory: max(90, 10 + 80) = 90 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (Depth-first scheduling safely bounds peak SRAM to 90 KB).**
