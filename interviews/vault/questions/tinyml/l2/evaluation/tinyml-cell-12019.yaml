id: tinyml-cell-12019
title: 'Latency Decomposition: Compare ESP32-S3 vs. Cortex-M4 for Image Classification'
topic: latency-decomposition
status: published
provenance: imported
scenario: A tiny image classifier (MobileNetV1-0.25, 475K params, INT8, 14.9 MOPs) runs on ESP32-S3 (168MHz
  dual-core Xtensa, 512KB SRAM, 8MB PSRAM) vs. Cortex-M4 (168MHz, 256KB SRAM). The model uses 28×28 input.
  Compare inference latency accounting for PSRAM access penalty on ESP32-S3.
details:
  realistic_solution: 'M4: 14.9M MACs / (168M × 1 MAC/cycle) = 88.7ms. ESP32-S3 Xtensa has vector instructions
    but no dedicated ML accelerator. At 168 MHz, ~1 MAC/cycle: 14.9M/240M = 62ms. But weights (475KB INT8)
    don''t fit in 512KB SRAM with activations. PSRAM penalty 5× on weight reads: effective throughput
    ~48M MACs/s → 14.9M/48M = 310ms. If INT8 weights cached in SRAM (only 256KB M4 — too small for 475KB).
    Both platforms struggle; MicroTVM layer-by-layer SRAM reuse needed.'
  common_mistake: Assuming PSRAM on ESP32-S3 is as fast as SRAM; PSRAM access via SPI at 80MHz adds significant
    latency (4-8 cycles per word) for weights stored there.
  napkin_math: 'Model: 475KB INT8 weights + activations. M4 SRAM 256KB: can''t hold full model. Need iterative
    loading — penalty. ESP32-S3: 512KB fits activations, weights in PSRAM (8MB). PSRAM at 80MHz SPI: ~40
    MB/s. Weight reads per inference: 475KB × multiple accesses ≈ 2MB total. 2MB/40MB/s = 50ms just for
    weight fetches. Plus compute: 14.9M ops / 240M = 62ms. Total: ~110ms. M4 with careful SRAM tiling:
    ~150ms. ESP32-S3 wins with PSRAM caching.'
