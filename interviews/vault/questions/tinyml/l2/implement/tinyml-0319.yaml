schema_version: 1
id: tinyml-0319
title: The Microcontroller Roofline
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You're optimizing a keyword spotting model for a Cortex-M4 microcontroller. A key layer is a
  3x3 depthwise convolution that operates on a `16x16x32` tensor using FP32 precision. Given the Cortex-M4's
  specs, calculate the Arithmetic Intensity of this single layer and explain whether its performance is
  limited by compute or memory bandwidth.
details:
  realistic_solution: The operation is compute-bound. The Cortex-M4's ridge point is very low (~0.28 Ops/Byte),
    meaning it has relatively little compute for its memory bandwidth. The convolution layer has an Arithmetic
    Intensity of ~2.2 Ops/Byte, which is significantly higher than the device's ridge point. Therefore,
    the CPU's ability to perform calculations is the bottleneck, not the memory system's ability to feed
    it data.
  common_mistake: Engineers often assume that all operations on a microcontroller are memory-bound due
    to the extremely limited SRAM. However, they fail to calculate the device's Ridge Point (the ratio
    of compute to bandwidth) and compare it to the workload's Arithmetic Intensity. The on-chip SRAM is
    actually quite fast relative to the slow CPU, meaning some workloads can surprisingly be compute-bound.
  napkin_math: 'DW conv on 16x16x32 FP32. Ops = 16*16*32*9*2 = 147,456 ops. Data: input = 16*16*32*4 =
    32,768B. Kernel = 3*3*32*4 = 1,152B. Output = 32,768B. Total = 66,688B. AI = 147456/66688 = 2.21 Ops/Byte.
    Ridge point = 336e6/1.2e9 = 0.28. Since 2.21 >> 0.28, compute-bound.'
