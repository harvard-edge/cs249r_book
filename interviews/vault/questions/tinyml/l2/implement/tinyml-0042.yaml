id: tinyml-0042
title: The Duty-Cycled Bird Watcher
topic: duty-cycling
status: published
provenance: imported
scenario: 'You''re designing a remote bird-song detector using a Cortex-M4 based microcontroller. It needs
  to operate for months on a small battery. To save energy, you use a duty cycle: the device listens for
  1 second (active) and then enters deep sleep for the next 9 seconds. Based on the *Numbers Every ML
  Systems Engineer Should Know*, a Cortex-M4 consumes about 10 mW when active and 10 µW in deep sleep.
  What is the average power consumption of the device?'
details:
  realistic_solution: The correct way to calculate average power for a duty-cycled system is to find the
    total energy consumed over one full cycle (active energy + sleep energy) and then divide by the total
    cycle duration. The active phase dominates the energy budget per second, but the long sleep phase
    dramatically reduces the *average* power consumption over time, which is the critical metric for battery
    life estimation.
  common_mistake: Engineers often calculate the average power by simply taking the arithmetic mean of
    the active and sleep power values, completely ignoring the *time* spent in each state. This leads
    to a massive overestimation of the power budget because the device spends the vast majority of its
    time (90% in this case) in the ultra-low-power sleep state.
  napkin_math: "1. **Identify parameters:** P_active = 10 mW, P_sleep = 10 µW = 0.01 mW, t_active = 1\
    \ s, t_sleep = 9 s, t_period = 10 s.\n2. **Energy per cycle:**\n   - E_active = 10 mW × 1 s = 10 mJ.\n\
    \   - E_sleep = 0.01 mW × 9 s = 0.09 mJ.\n   - E_total = 10.09 mJ.\n3. **Average power:**\n   - P_avg\
    \ = 10.09 mJ / 10 s = **1.009 mW ≈ 1.0 mW**.\n4. **Insight**: The 10% duty cycle reduces average power\
    \ by ~10× compared to always-on (10 mW). The sleep power contributes less than 1% of total energy."
