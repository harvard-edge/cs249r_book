id: tinyml-0382
title: 'The Economics of Awakening: A TinyML Power Budget'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: Your team is deploying 10,000 battery-powered sensors to listen for a specific keyword. The
  MCU consumes 10 mW active and 0.01 mW in sleep. The keyword spotting model runs for 100 ms every 10
  seconds. When a keyword is detected (once per hour on average), network transmission consumes 150 mW
  for 4.5 seconds. You must compare the power budget of a TinyML-based approach versus a cloud-streaming
  approach. Calculate the average power of this TinyML approach.
details:
  realistic_solution: The correct way to solve this is to calculate the total energy consumed by each
    component over the one-hour period and then divide by the total time (3600 seconds) to find the average
    power.
  common_mistake: The most common mistake is to ignore the duty cycle and either sum the peak power consumptions
    of all components, or to forget the massive, short-lived power cost of network transmission. Both
    lead to a wildly inaccurate estimate of battery life and total cost of ownership.
  napkin_math: 100ms active every 10s = 1% duty cycle. MCU avg power = (10 mW * 0.01) + (0.01 mW * 0.99)
    = 0.109 mW. Keyword detected once per hour (3600s). Networking consumes 150 mW for 4.5 seconds per
    alert. Network avg power = 150 mW * (4.5 / 3600) = 0.1875 mW. Total average power = 0.109 + 0.1875
    = 0.297 mW. A standard 1500mAh (4.5Wh) AA battery would last ~4.5Wh / (0.297mW × 8760h/yr) ≈ 1.7 years
    at this draw.
