id: tinyml-0191
title: The Real-Time Audio Deadline
topic: mcu-compute-constraints
status: draft
provenance: imported
scenario: You're designing a keyword spotting device using a Cortex-M4 microcontroller, which runs at
  168 MHz and has a peak performance of ~336 MFLOPS. The audio pre-processing pipeline delivers a new
  feature frame every 25ms, creating a hard real-time deadline. Your neural network model requires 10
  Million FLOPs to process one frame. Calculate the time needed for a single inference and explain if
  the Cortex-M4 can meet this real-time deadline.
details:
  realistic_solution: The Cortex-M4 cannot meet the deadline. To determine if the system is real-time
    capable, we must calculate the time required for one inference and compare it to the time budget.
  common_mistake: Engineers often assume the headline MFLOPS number is sufficient without performing the
    direct calculation against the real-time deadline. They might calculate the theoretical throughput
    (inferences/sec) but fail to convert that back to the per-inference latency, or they may confuse units
    (ms vs. s), leading to an incorrect conclusion about system viability.
  napkin_math: 'Time = 10M FLOPs / 336 MFLOPS = 29.8ms > 25ms deadline. Misses by 4.8ms (19% over budget).
    Options: reduce model to <8.4M FLOPs, or use INT8 with CMSIS-NN for ~2-4x speedup. With 2x speedup:
    29.8/2 = 14.9ms, comfortably within 25ms.'
