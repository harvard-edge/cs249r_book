schema_version: 1
id: tinyml-0301
title: The Economics of Federated Learning
topic: federated-learning
status: published
provenance: imported
scenario: You are deploying a fleet of 100,000 smart sensors that use federated learning to improve a
  keyword-spotting model. The model is 500 KB in size. To manage network load, only 10% of the fleet (10,000
  devices) uploads a full model update each day. Calculate the total daily data upload volume for this
  federated system.
details:
  realistic_solution: The correct approach is to multiply the number of devices participating daily by
    the size of the data upload per device. This avoids the privacy and cost pitfalls of sending raw user
    data. In this case, 10,000 devices are uploading 500 KB each, giving a total daily data volume of
    5 GB.
  common_mistake: Engineers often miscalculate the total data cost by either forgetting to account for
    the size of the *entire fleet subset* participating in the training round, or by confusing units (KB,
    MB, GB). They might calculate the cost for a single device, or for the entire fleet instead of the
    daily active subset.
  napkin_math: 'Devices participating daily: 100,000 * 10% = 10,000 devices. Each device uploads a 500
    KB model update. Total upload volume per day: 10,000 * 500 KB = 5,000,000 KB. Converting to MB/GB:
    5,000,000 / 1024 = 4,882 MB, which is roughly 4.77 GB per day. At an IoT cellular data cost of $0.10/MB,
    this federated learning strategy costs $488/day in data fees.'
