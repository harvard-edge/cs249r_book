schema_version: 1
id: tinyml-0016
title: The Wildlife Camera's Power Budget
topic: duty-cycling
status: draft
provenance: imported
scenario: You are designing a wildlife camera that uses a Cortex-M4 MCU for motion detection. The system
  consumes 50 mW when actively processing an image for 500ms. In deep sleep, it consumes 10 µW. If the
  camera is triggered on average once every 5 minutes, what is its average power consumption? This will
  determine the required battery size for a 1-year deployment.
details:
  realistic_solution: The average power is the total energy consumed during one cycle divided by the cycle's
    duration. Here, a cycle is 5 minutes (300 seconds). The device is active for 0.5s and sleeps for 299.5s.
    The average power is therefore heavily weighted towards the sleep consumption, as the brief, high-power
    active periods are amortized over long, low-power sleep periods.
  common_mistake: Engineers often calculate a simple arithmetic mean of the active and sleep power, completely
    ignoring the time spent in each state. The correct approach is a time-weighted average, where the
    minuscule sleep power consumption dominates the total energy budget because the device spends over
    99% of its time asleep.
  napkin_math: Period = 5 mins = 300s. Active time = 0.5s, Sleep time = 299.5s. Active power = 50mW, Sleep
    power = 10 uW = 0.01mW. Active energy per cycle = 50mW * 0.5s = 25 mJ. Sleep energy = 0.01mW * 299.5s
    = 2.995 mJ. Total energy per 300s = 27.995 mJ. Average power consumption = 27.995 mJ / 300s = 0.0933
    mW = 93.3 uW.
