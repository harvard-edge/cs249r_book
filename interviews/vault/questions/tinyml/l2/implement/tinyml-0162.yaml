id: tinyml-0162
title: The FOTA Time Budget
topic: ota-firmware-updates
status: published
provenance: imported
scenario: You need to perform a firmware-over-the-air (FOTA) update for a fleet of environmental sensors.
  The total update package, containing a new model and system firmware, is 450 KB. The devices will receive
  this update over a 10 Mbps SPI bus. Ignoring protocol overhead and any potential write-time to the flash
  memory, calculate the minimum theoretical time required to simply transmit this update to a single device.
details:
  realistic_solution: To solve this correctly, you must make the units consistent before dividing. The
    standard approach is to convert both the file size and the bus speed to bits.
  common_mistake: The most common mistake is confusing bits and bytes. Network and bus transfer speeds
    are marketed in bits per second (e.g., Mbps), while file and memory sizes are measured in bytes (e.g.,
    KB). Forgetting to multiply the file size by 8 to convert bytes to bits is a classic error that leads
    to an 8x underestimation of the required time.
  napkin_math: 'Firmware size is 450 KB. In bits: 450 KB * 1024 bytes/KB * 8 bits/byte = 3,686,400 bits.
    The SPI bus runs at 10 Mbps (10,000,000 bits/sec). Transfer time = 3,686,400 bits / 10,000,000 bits/sec
    = 0.368 seconds. Even writing this 450KB to flash will take additional time, but the raw SPI transfer
    easily completes in under half a second.'
