schema_version: 1
id: tinyml-0345
title: 'The TinyML Tensor Arena: Tensor Arena Planning'
topic: tensor-arena-planning
status: published
provenance: imported
scenario: You are deploying a keyword spotting model on a microcontroller with 256 KB of SRAM. The TensorFlow
  Lite for Microcontrollers memory planner tells you that to execute the model, the two largest tensors
  that need to be in memory *at the same time* are a 20 KB input feature map and a 30 KB intermediate
  activation map. To minimize RAM usage, what is the absolute minimum size required for the tensor arena?
details:
  realistic_solution: The tensor arena is a pre-allocated block of memory in SRAM that TensorFlow Lite
    for Microcontrollers uses for all input, output, and intermediate tensors. Its size must be sufficient
    to hold all tensors that are simultaneously required during any step of the model's execution. In
    this case, since the 20 KB and 30 KB tensors are concurrent, the minimum arena size is the sum of
    their sizes.
  common_mistake: Engineers often assume the peak memory is determined only by the single largest tensor
    in the graph. They forget that the tensor arena must be large enough to hold all tensors that are
    'live' *concurrently* at any point during inference. The peak is the sum of the sizes of all tensors
    that exist at the moment of maximum memory pressure.
  napkin_math: Peak Memory = Size(Concurrent Tensor A) + Size(Concurrent Tensor B)
