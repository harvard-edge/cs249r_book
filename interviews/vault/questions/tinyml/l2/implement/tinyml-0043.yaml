schema_version: 1
id: tinyml-0043
title: The Silent Power Drain
topic: duty-cycling
status: published
provenance: imported
scenario: You're designing a battery-powered acoustic sensor to detect anomalies in factory machinery.
  The device uses a Cortex-M4 microcontroller. It wakes up for 1 second every minute to run an inference,
  then goes into deep sleep. The MCU consumes 50 mW while active and 10 µW in deep sleep. Explain how
  you would calculate the average power consumption and what the final value is.
details:
  realistic_solution: The correct way to calculate average power is to determine the total energy consumed
    over a single cycle (active + sleep) and then divide by the total cycle duration. The energy is the
    sum of (power × time) for each state.
  common_mistake: A common mistake is to ignore the power consumed during deep sleep, assuming it's zero.
    While small, sleep current is a dominant factor in the energy budget for devices that sleep most of
    the time. Another error is to simply average the active and sleep power values, ignoring the time
    spent in each state.
  napkin_math: '1. **Active Energy:** 50 mW × 1 s = 50 mJ

    2. **Sleep Energy:** 0.01 mW × 59 s = 0.59 mJ

    3. **Total Energy per cycle:** 50 + 0.59 = 50.59 mJ

    4. **Cycle period:** 60 s

    5. **Average Power:** 50.59 mJ / 60 s = **0.843 mW**


    The average power consumption is approximately **0.84 mW**. Note that the sleep state contributes
    only 0.59 mJ out of 50.59 mJ (~1.2%) because the active power is 5,000× larger than the sleep power.
    However, for devices with shorter active periods or higher duty cycles, the sleep current becomes
    a more significant factor. The key insight is that the duty cycle reduces the effective power from
    50 mW to 0.84 mW — a 60× reduction — which is the fundamental reason duty cycling is essential for
    battery-powered TinyML devices.'
