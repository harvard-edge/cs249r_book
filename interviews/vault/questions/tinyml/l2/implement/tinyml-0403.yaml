id: tinyml-0403
title: 'The TCO of Privacy: Federated vs. Centralized Data Upload'
topic: federated-learning
status: published
provenance: imported
scenario: 'You are managing a fleet of 10,000 smart audio sensors deployed in homes. To improve your glass-break
  detection model, you are considering two data strategies. Each device is configured to capture and potentially
  upload 1 hour of raw audio (16-bit, 16kHz mono sampling rate) per day.


  Strategy 1: Centralized Upload. Upload all raw audio to the cloud for training at a data transfer cost
  of $0.05/GB.

  Strategy 2: Federated Learning. Train on-device and upload a 100 KB model weight update daily per device
  at the same $0.05/GB rate.


  Which strategy is more economical for data transfer over a year, and what are the approximate costs?'
details:
  realistic_solution: Federated Learning is overwhelmingly more economical. The centralized approach costs
    approximately $21,000 per year in data ingress fees alone, whereas the federated approach costs only
    about $18. The ~1,150x cost reduction makes a strong economic case for on-device learning, in addition
    to the privacy benefits of not uploading raw user audio.
  common_mistake: 'Engineers often miscalculate the total data volume by orders of magnitude. Common errors
    include: forgetting to convert bits to bytes, confusing KB with MB, or calculating the cost for a
    single device instead of the entire fleet over a year. This leads to a massive underestimation of
    the TCO of the centralized approach.'
  napkin_math: 'Strategy 1: Centralized Upload

    Raw audio: 16000 samples/sec * 2 bytes * 3600 sec = 115.2 MB/day/device.

    Fleet daily: 115.2 MB * 10,000 = 1,152,000 MB/day = 1.152 TB/day.

    Annual data: 1.152 TB/day * 365 = 420.48 TB/year = 420,480 GB/year.

    Cost: 420,480 * $0.05 = $21,024/year.


    Strategy 2: Federated Learning

    Model update: 100 KB/day/device.

    Fleet daily: 100 KB * 10,000 = 1,000,000 KB = 1 GB/day.

    Annual data: 1 GB * 365 = 365 GB/year.

    Cost: 365 * $0.05 = $18.25/year.'
