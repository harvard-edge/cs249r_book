schema_version: 1
id: tinyml-0014
title: The Coin Cell Battery Lifetime
topic: power-budgeting
status: published
provenance: imported
scenario: A remote bird-call detector has a duty cycle where it's active for 500ms (drawing 50mW) and
  then sleeps for 4.5s (drawing 10µW). It's powered by a standard 3V, 225 mAh coin cell battery. Can this
  device realistically run for a full week in the field? Calculate its expected lifetime in days.
details:
  realistic_solution: To find the lifetime, you must first calculate the true average power consumption
    based on the duty cycle. Then, calculate the total energy capacity of the battery in milliamp-hours
    (mWh). Finally, divide the total energy capacity by the average power consumption to get the total
    operational hours, which can then be converted to days.
  common_mistake: The most common mistake is to calculate the lifetime using only the active power consumption
    (50 mW), which leads to a massive underestimation of battery life. Another error is confusing power
    (mW) with energy (mWh) or failing to properly convert the battery's mAh capacity into mWh by multiplying
    by the voltage.
  napkin_math: 'Active energy = 50mW * 0.5s = 25mJ. Sleep energy = 10uW * 4.5s = 45uJ = 0.045mJ. Per cycle
    (5s): 25.045mJ. Avg power = 25.045/5 = 5.01mW. Battery: 225mAh * 3V = 675mWh. Life = 675mWh / 5.01mW
    = 134.7h = 5.6 days. No -- falls short of 7 days by ~1.4 days.'
