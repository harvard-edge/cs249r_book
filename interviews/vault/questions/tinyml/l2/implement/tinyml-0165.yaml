schema_version: 1
id: tinyml-0165
title: The 10mW Power Budget
topic: energy-per-operation
status: published
provenance: imported
scenario: Imagine you are designing a keyword-spotting device that runs on a tiny solar cell, providing
  a strict, continuous power budget of 10 milliwatts (mW). You are evaluating a new accelerator chip with
  a reported efficiency of 20 GOPS/W (Giga-Operations per second per Watt). What is the maximum *sustainable*
  compute rate you can expect from this chip?
details:
  realistic_solution: 'To solve this, you must first align the units. The power budget is in milliwatts,
    while the efficiency is in GOPS per Watt.

    1. Convert the power budget to Watts: 10 mW = 0.01 W.

    2. Multiply the efficiency by the available power: 20 GOPS/W * 0.01 W = 0.2 GOPS.

    This means the maximum sustainable compute rate is 0.2 GOPS, or 200 MOPS (Million Operations Per Second).
    Any workload demanding more than this will exceed the power provided by the solar cell.'
  common_mistake: The most frequent error is neglecting the unit conversion from milliwatts (mW) to Watts
    (W). Engineers multiply 20 GOPS/W by 10 directly, resulting in a performance estimate of 200 GOPS,
    which is 1000x greater than what is actually achievable. This would imply a power draw of 10W, not
    10mW, instantly exceeding the budget.
  napkin_math: 'Convert power budget to Watts: 10 mW = 0.01 W. Accelerator efficiency is 20 GOPS/W (20,000,000,000
    OPS/W). Max operations per second = 0.01 W * 20,000,000,000 OPS/W = 200,000,000 OPS (200 MOPS). If
    a keyword-spotting model needs 10 MOPS, it consumes 10 / 200 = 5% of the 10mW budget (0.5mW), leaving
    plenty of power for the microphone and MCU.'
