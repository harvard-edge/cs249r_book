schema_version: 1
id: tinyml-0039
title: The Battery-Sipping Wearable
topic: duty-cycling
status: published
provenance: imported
scenario: 'You''re designing a wearable activity tracker powered by a Cortex-M4. To maximize battery life,
  it operates on a duty cycle: it''s active for 2 seconds while processing sensor data (consuming 30 mW),
  then enters a deep sleep mode for 8 seconds (consuming 10 µW). This 10-second cycle repeats continuously.
  Calculate the average power consumption.'
details:
  realistic_solution: The correct way to calculate the average power consumption is to find the time-weighted
    average over one full cycle. You calculate the total energy consumed during the cycle (active energy
    + sleep energy) and then divide by the total duration of the cycle.
  common_mistake: A common mistake is to ignore the power consumed during the sleep state because it's
    so small compared to the active state. This leads to an underestimation of the total energy drain.
    Another error is to take a simple, unweighted average of the active and sleep power, which ignores
    that the device spends significantly more time sleeping than active.
  napkin_math: "P_avg = ( (P_active × t_active) + (P_sleep × t_sleep) ) / t_period\n\n1. **Parameters**:\
    \ P_active = 30 mW, P_sleep = 0.01 mW, t_active = 2 s, t_sleep = 8 s, t_period = 10 s.\n2. **Energy\
    \ per cycle:**\n   - E_active = 30 mW × 2 s = 60 mJ.\n   - E_sleep = 0.01 mW × 8 s = 0.08 mJ.\n  \
    \ - E_total = 60.08 mJ.\n3. **Average power:**\n   - P_avg = 60.08 / 10 = **6.008 mW ≈ 6.0 mW**.\n\
    4. **Context**: Duty cycling at 20% active reduces average power by ~5× vs always-on (30 mW)."
