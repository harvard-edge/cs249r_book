schema_version: 1
id: tinyml-0034
title: The Duty Cycle Power Drain
topic: duty-cycling
status: draft
provenance: imported
scenario: You're designing a wildlife camera powered by a small battery. It uses a Cortex-M4 microcontroller.
  The device stays in a deep sleep state, consuming 10 µW. A motion sensor wakes it up for 1 second to
  run an image classification inference, during which it consumes 50 mW. This cycle repeats every 10 seconds
  (1 second active, 9 seconds sleep). What is the average power consumption of the device? Explain the
  formula you used.
details:
  realistic_solution: The correct way to calculate the average power is to find the total energy consumed
    in one full cycle and then divide by the cycle's duration. The total energy is the sum of the energy
    used during the active phase and the energy used during the sleep phase.
  common_mistake: A frequent mistake is to incorrectly average the power values (e.g., (50mW + 10µW)/2),
    forgetting that they must be weighted by time. Another error is unit confusion, mixing up milliwatts
    (mW) and microwatts (µW), which differ by a factor of 1000. Finally, engineers sometimes calculate
    the active-phase energy but forget to average it over the entire period, giving an answer of 50mJ
    instead of an average power in mW.
  napkin_math: Assuming 100 triggers/day (100s active). Total time = 86,400s. Sleep time = 86,300s. Active
    energy = 50 mW * 100s = 5,000 mJ. Sleep energy = 10 µW (0.01 mW) * 86,300s = 863 mJ. Total daily energy
    = 5,863 mJ. Average power = 5,863 mJ / 86,400s = 0.067 mW (67 µW). Sleep dominates time, but active
    dominates power.
