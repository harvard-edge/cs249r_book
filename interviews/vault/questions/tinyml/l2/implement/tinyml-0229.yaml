id: tinyml-0229
title: The MCU Memory Wall
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You're evaluating a Cortex-M4 microcontroller for a keyword spotting application. According
  to the datasheet and the 'Numbers Every ML Systems Engineer Should Know' guide, the chip has a peak
  compute performance of approximately 336 MFLOPS and its on-chip SRAM provides about 1.2 GB/s of memory
  bandwidth.
details:
  realistic_solution: The ridge point defines the boundary between being memory-bound and compute-bound.
    It's the minimum arithmetic intensity (AI) a model needs to have to saturate the compute units. With
    a ridge point of ~0.28 Ops/Byte, the Cortex-M4 has a very low threshold. Most neural network layers,
    even simple ones, have a higher AI than 0.28 Ops/Byte. Therefore, the processor will generally be
    compute-bound, meaning its theoretical peak MFLOPS is the primary bottleneck, and it will rarely be
    starved for data by the SRAM.
  common_mistake: Engineers correctly calculate the ridge point but confuse the implications. A low ridge
    point means the memory is fast relative to the compute, making it *easier* to be compute-bound. If
    AI > Ridge Point, the system is compute-bound. Falsely concluding the device is memory-bound leads
    to wasted effort optimizing memory access patterns when the focus should be on reducing FLOPs (e.g.,
    via quantization or pruning).
  napkin_math: 1. **Recall the formula:** Ridge Point is the ratio of peak compute to peak memory bandwidth.
