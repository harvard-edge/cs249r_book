id: tinyml-0147
title: The SRAM Overflow Trap
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: A junior engineer is deploying a keyword spotting model on a microcontroller that has 512KB
  of Flash and 128KB of SRAM. They report an out-of-memory crash, and they're confused because the model
  file is only 250KB, which easily fits in the available Flash storage. Your investigation reveals the
  model requires a 90KB tensor arena for its activations and intermediate buffers. Separately, the RTOS
  and other system processes consume a constant 48KB of SRAM. Calculate the total SRAM requirement and
  explain why the crash is happening.
details:
  realistic_solution: The crash occurs because the device runs out of SRAM. The total runtime memory required
    is the sum of the model's tensor arena and the system's SRAM usage. The 250KB model size is stored
    in Flash and is irrelevant to the SRAM calculation for the tensor arena. The device only has 128KB
    of SRAM, but the demand is 138KB, causing an overflow.
  common_mistake: Engineers often confuse storage (Flash) with working memory (SRAM). They assume that
    if the model *file* fits in memory, it will run. They forget that runtime memory usage (the 'tensor
    arena' for holding inputs, outputs, and intermediate activations) is a separate, critical budget that
    must be met by the much smaller SRAM.
  napkin_math: 1. **Calculate Total SRAM Demand:**
