schema_version: 1
id: tinyml-0360
title: The Tensor Arena Budget
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: 'You are deploying a sensor fusion model to a microcontroller that has 256 KB of SRAM. Your
  real-time operating system (RTOS) and Bluetooth stack reserve 150 KB of that SRAM for their own use.
  The model''s most memory-intensive operation requires three tensors to be live in memory at the same
  time: a 40 KB accelerometer input tensor, a 50 KB gyroscope feature plane, and a 20 KB fusion scratch
  buffer. Calculate the peak required tensor arena size and determine if it will fit in the available
  SRAM.'
details:
  realistic_solution: 'The correct approach is to first calculate the available SRAM, then calculate the
    peak required memory for the tensor arena, and finally compare the two. The available SRAM is 256
    KB - 150 KB = 106 KB. The peak required memory is the sum of the three concurrent tensors: 40 KB +
    50 KB + 20 KB = 110 KB. Since the required 110 KB is greater than the available 106 KB, the model
    will not fit without further optimization.'
  common_mistake: The most common mistake is to compare the required memory against the total chip SRAM
    (256 KB) instead of the *available* SRAM after accounting for the RTOS and other system software.
    Another frequent error is to assume the peak memory is just the size of the largest single tensor,
    not the sum of all concurrently live tensors.
  napkin_math: Available SRAM = Total SRAM (256 KB) - System Usage (150 KB) = 106 KB.
