id: tinyml-0194
title: The Federated Learning Battery Dividend
topic: federated-learning
status: published
provenance: imported
scenario: You are an ML systems engineer comparing two update strategies for a battery-powered keyword-spotting
  device. For this device, the energy cost of radio transmission is the dominant factor in battery drain
  during updates. The device performs one update cycle per day. Strategy A (Centralized) transmits 600
  KB of raw audio per day. Strategy B (Federated) transmits a 60 KB model update per day. The radio consumes
  500 µJ per KB transmitted. Calculate the difference in annual energy consumption between the two strategies.
details:
  realistic_solution: The core of the problem is to calculate the annual energy for each strategy and
    then find the difference. The Federated Learning approach provides a significant energy dividend by
    transmitting 10x less data.
  common_mistake: Engineers often calculate the total energy for one of the options (e.g., the 109.5 J
    for the centralized approach) but fail to answer the specific question asked, which is about the *difference*
    between the two. Another common error is forgetting to scale the daily energy consumption to the annual
    total, calculating the daily difference (270 mJ) instead of the yearly one.
  napkin_math: 'Daily transmission energy for Strategy A (Full model): 600 KB * 500 µJ/KB = 300,000 µJ
    = 0.3 J. Strategy B (Diff update): 60 KB * 500 µJ/KB = 30,000 µJ = 0.03 J. Daily energy savings =
    0.27 J. Over a year (365 days): 0.27 J * 365 = 98.55 Joules saved. If a standard AA battery holds
    ~10,000 Joules, Strategy B saves ~1% of battery life annually.'
