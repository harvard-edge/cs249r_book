schema_version: 1
id: tinyml-0311
title: The MCU's Ridge Point
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You are optimizing a keyword spotting model on a Cortex-M4 microcontroller. One layer is a fully-connected
  (dense) layer that takes a 128-element input vector to produce a 64-element output vector, using INT8
  precision for all calculations and weights. Given that the Cortex-M4 has a peak performance of approximately
  336 MFLOPS and an on-chip SRAM bandwidth of 1.2 GB/s, calculate the Arithmetic Intensity of this layer
  and explain whether its performance is limited by compute or memory bandwidth.
details:
  realistic_solution: 'The layer is compute-bound. The hardware''s ability to supply data from SRAM is
    greater than its ability to process that data. We can prove this by comparing the layer''s Arithmetic
    Intensity to the hardware''s ridge point.

    1.  **Hardware Ridge Point:** This is the ratio of peak compute to peak memory bandwidth. `Ridge Point
    = 336 MFLOPS / 1.2 GB/s = 336e6 Ops/sec / 1.2e9 Bytes/sec ≈ 0.28 Ops/Byte`.

    2.  **Layer''s Operations:** A MAC is 2 Ops (1 multiply, 1 add). Total Ops = `128 * 64 * 2 = 16,384
    Ops`.

    3.  **Layer''s Memory Access:** We must read the weights and the input vector. Total Bytes = `(128
    * 64 bytes for weights) + (128 bytes for input) = 8192 + 128 = 8320 Bytes`.

    4.  **Layer''s Arithmetic Intensity (AI):** `AI = Total Ops / Total Bytes = 16,384 / 8320 ≈ 1.97 Ops/Byte`.

    5.  **Conclusion:** Since the layer''s AI (1.97) is significantly higher than the MCU''s ridge point
    (0.28), the system is compute-bound. The bottleneck is the ~16k operations, not the ~8kB of data transfer.'
  common_mistake: Engineers often assume that because microcontrollers have very little memory (SRAM),
    all operations must be memory-bound. They may also miscalculate the arithmetic intensity by forgetting
    to account for all data movement (both weights and input activations) or by incorrectly counting the
    number of operations in a multiply-accumulate (MAC) instruction (1 MAC = 2 Ops).
  napkin_math: 'Ridge point = 336 MFLOPS / 1.2 GB/s = 0.28 Ops/Byte. Layer: 128*64 dense INT8. Ops = 128*64*2
    = 16384. Memory = 128*64 (weights) + 128 (input) = 8320B. AI = 16384/8320 = 1.97 Ops/Byte. Since 1.97
    > 0.28 ridge point => compute-bound. Latency = 16384 / 336e6 = 0.049ms.'
