id: tinyml-0250
title: 'The TinyML Memory Diet: MCU Compute Constraints'
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You're deploying a 250,000-parameter keyword-spotting model to a microcontroller which has 256
  KB of SRAM. The initial model is in FP16 format. To make it fit, your team suggests full INT8 quantization
  for the weights. Calculate and explain the difference in the model's weight storage before and after
  this change.
details:
  realistic_solution: The key is to correctly identify the bytes per parameter for each precision. FP16
    uses 2 bytes per parameter, and INT8 uses 1 byte. By quantizing, you cut the memory requirement for
    weights in half. The original model is too large, but the quantized version's weights will fit, demonstrating
    a critical and common optimization.
  common_mistake: The most common mistake is to confuse the byte sizes for different precisions, especially
    assuming a 4x saving (common for FP32->INT8) when the starting point is FP16. This leads to an incorrect
    savings calculation. Another error is simply assuming the quantized model will fit without doing the
    simple multiplication.
  napkin_math: 'FP16 Footprint: 250,000 parameters * 2 bytes/parameter = 500,000 bytes = 500 KB | INT8
    Footprint: 250,000 parameters * 1 byte/parameter = 250,000 bytes = 250 KB | Memory Savings: 500 KB
    - 250 KB = 250 KB (a 50% reduction)'
