id: tinyml-0285
title: 'The Privacy Premium: On-Device vs. Cloud TCO'
topic: federated-learning
status: published
provenance: imported
scenario: 'You''re choosing between two architectures for a new keyword-spotting device with a planned
  fleet of 100,000 units and a 3-year service life. Option A (Cloud): Uses a $1 ''dumb'' MCU that streams
  audio to the cloud, incurring a $0.01/day per-device cloud computing fee. Option B (Edge): Uses a more
  powerful $3 MCU to run the ML model entirely on-device with zero recurring cloud costs. Assuming no
  other differing costs, what is the Total Cost of Ownership (TCO) difference between the two architectures?'
details:
  realistic_solution: The correct approach is to calculate the full TCO (CapEx + OpEx) for both options
    over the entire 3-year period and then find the difference.
  common_mistake: Engineers often fixate on the upfront Bill of Materials (BOM) or CapEx cost. They see
    the $3 MCU as simply 'more expensive' than the $1 MCU and fail to quantify the massive, ongoing operational
    costs (OpEx) of the cloud backend, which almost always dominate the TCO over a product's lifetime.
  napkin_math: 'Cloud Cost: | Hardware: 100k units * $1 = $100k | Cloud Fees: 100k units * $0.01/day *
    (3 * 365 days) = $1k/day * 1095 days = ~$1.1M | Cloud TCO ≈ $100k + $1.1M = $1.2M'
