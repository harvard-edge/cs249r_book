schema_version: 1
id: tinyml-0204
title: The Solar-Powered Sensor's Inference Budget
topic: energy-per-operation
status: published
provenance: imported
scenario: You're building a weather monitoring station using a TinyML device. It's powered by a solar
  panel that provides an average of 5mW of power over a 24-hour cycle. The device consumes 40mW when running
  a 250ms inference, and 10µW in sleep mode. To remain power-neutral, what is the maximum number of inferences
  the station can perform per hour?
details:
  realistic_solution: First, calculate the total energy harvested in one hour. Then, calculate the baseline
    energy consumed by sleeping for that entire hour. The difference is the energy budget available for
    running inferences. Finally, divide this budget by the energy cost of a single inference to find the
    total number of inferences possible.
  common_mistake: The most common mistake is to ignore the baseline energy cost of keeping the device
    in sleep mode. Engineers often divide the total harvested energy by the energy per inference, which
    overestimates the number of inferences possible because it fails to account for the constant, low-level
    power drain of the sleep state.
  napkin_math: 1. **Use Joules for cleaner math:** Power (W) is Joules/second (J/s).
