id: tinyml-0237
title: The TCO of Active Power
topic: federated-learning
status: published
provenance: imported
scenario: 'You''re designing a battery-powered smart doorbell that uses a low-power wake-word model to
  continuously listen for the ''doorbell'' keyword. You have to choose between two microcontrollers (MCUs)
  to run the model: MCU A costs $5 upfront and consumes 1 mW on average. MCU B costs $3 upfront and consumes
  5 mW on average. The device must last for 2 years (730 days) on a single battery pack. The battery cost
  is $0.50 per Watt-hour (Wh). Which MCU yields the lower Total Cost of Ownership (TCO)?'
details:
  realistic_solution: The correct approach is to calculate the total energy each MCU will consume over
    the 2-year lifetime, determine the required battery capacity in Watt-hours, calculate the cost of
    that battery, and finally, add the MCU's unit cost to find the TCO.
  common_mistake: Engineers, especially those from a cloud background, often focus exclusively on the
    upfront hardware cost (CapEx) and ignore the operational or lifetime costs (OpEx). In battery-powered
    devices, the cost of the required battery capacity to meet a lifetime target is a critical part of
    the Bill of Materials (BOM) and TCO. A cheaper component that consumes more power can lead to a much
    more expensive product overall.
  napkin_math: '## MCU A: | **Energy:** `1 mW * 24 h/day * 730 days = 17.52 Wh` | **Battery Cost:** `17.52
    Wh * $0.50/Wh = $8.76` | **TCO:** `$5 (MCU) + $8.76 (Batt) = $13.76`

    ## MCU B: | **Energy:** `5 mW * 24 h/day * 730 days = 87.6 Wh` | **Battery Cost:** `87.6 Wh * $0.50/Wh
    = $43.80` | **TCO:** `$3 (MCU) + $43.80 (Batt) = $46.80`'
