id: tinyml-0052
title: The Bird-Call Battery Drain
topic: duty-cycling
status: published
provenance: imported
scenario: You're designing a battery-powered acoustic sensor to detect a rare bird call in a remote forest.
  Your device uses a Cortex-M4 microcontroller. It wakes up for 2 seconds every minute (60 seconds) to
  listen and run an inference model. From the playbook, we know the Cortex-M4 consumes about 50 mW while
  active and 10 µW while in deep sleep. Calculate the average power consumption of the device.
details:
  realistic_solution: The correct way to calculate average power is to find the total energy consumed
    over one full cycle (active + sleep) and then divide by the cycle's time period.
  common_mistake: Engineers often calculate the duty-cycled active power but forget to include the power
    consumed during the much longer sleep period. While sleep power is tiny, it dominates the energy budget
    over long deployments and is a critical factor in battery life calculations.
  napkin_math: "P_avg = ((P_active × t_active) + (P_sleep × t_sleep)) / t_period\n\n1. **Parameters**:\
    \ P_active = 50 mW, P_sleep = 0.01 mW, t_active = 2 s, t_sleep = 58 s, t_period = 60 s.\n2. **Energy\
    \ per cycle:**\n   - E_active = 50 mW × 2 s = 100 mJ.\n   - E_sleep = 0.01 mW × 58 s = 0.58 mJ.\n\
    \   - E_total = 100.58 mJ.\n3. **Average power:**\n   - P_avg = 100.58 / 60 = **1.676 mW ≈ 1.68 mW**.\n\
    4. **Insight**: The 3.3% duty cycle (2/60) reduces average power by ~30× vs always-on (50 mW). Sleep\
    \ power contributes <0.6% of total energy."
