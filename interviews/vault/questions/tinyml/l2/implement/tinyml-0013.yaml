id: tinyml-0013
title: The Wildlife Sensor's Average Power
topic: duty-cycling
status: published
provenance: imported
scenario: A wildlife audio sensor uses a Cortex-M4 microcontroller to listen for a specific animal call.
  It runs a model for 1 second, consuming 10 mW (active power), and then enters a deep sleep state for
  9 seconds, consuming 10 µW (sleep power). Explain to your colleague how to calculate the average power
  consumption over this 10-second cycle.
details:
  realistic_solution: The correct way to calculate the average power is to compute a time-weighted average.
    You calculate the total energy consumed during one full cycle (active + sleep) and then divide by
    the total period of the cycle. This accounts for the significant energy savings from the long sleep
    interval.
  common_mistake: Engineers often calculate the average power by either completely ignoring the sleep
    power consumption or by incorrectly averaging the two power states without considering the time spent
    in each. The former leads to an underestimation, while the latter grossly overestimates the average
    power because it doesn't account for the fact that the device spends most of its time in the low-power
    state.
  napkin_math: Active energy = 10mW * 1s = 10mJ. Sleep energy = 10uW * 9s = 90uJ = 0.09mJ. Total per cycle
    = 10.09mJ in 10s. Avg power = 10.09mJ / 10s = 1.009mW ~1mW. Sleep contributes <1% of total energy.
    Duty cycle reduces avg power from 10mW to ~1mW, a 10x reduction.
