schema_version: 1
id: tinyml-0777
title: The BLE Connection Interval Tradeoff
topic: safety-certification
status: published
provenance: imported
scenario: A BLE-connected TinyML wearable sends a 20-byte inference result to a phone. BLE connection
  interval is set to 30ms (default). Each connection event transfers one packet. The phone app needs inference
  updates at 10 Hz (every 100ms). Calculate the effective data rate and determine if the connection interval
  supports the required update rate. What happens if you decrease the interval to 7.5ms for lower latency?
details:
  realistic_solution: 'At 30ms interval: 1 event/30ms = 33.3 events/s. One 20-byte packet per event =
    20 × 33.3 = 667 bytes/s = 5.3 kbps. For 10 Hz updates: need 10 packets/s. At 33.3 events/s, this is
    easily met (30% utilization). But each result has up to 30ms jitter (worst case: data ready just after
    a connection event). At 7.5ms interval: 133 events/s, jitter drops to 7.5ms. But radio-on time increases
    4×, and power rises from ~5 mW to ~15 mW average.'
  common_mistake: Confusing connection interval with throughput. A 30ms connection interval means the
    radio wakes up every 30ms for a connection event, regardless of whether data is ready. Each event
    can transfer 1-6 packets depending on PHY and MTU settings.
  napkin_math: '30ms interval: 33.3 events/s, 667 B/s. 10 Hz need: 200 B/s → 30% utilized. Latency jitter:
    0-30ms. Power: ~5 mW (radio active 1.5ms per event → 1.5 / 30 = 5% radio duty). 7.5ms interval: 133
    events/s. Jitter: 0-7.5ms. Power: 1.5 / 7.5 = 20% radio duty → ~15 mW (3× more power for 4× less jitter).'
