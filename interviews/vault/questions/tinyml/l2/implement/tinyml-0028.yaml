id: tinyml-0028
title: The Remote Wildlife Camera's Lifespan
topic: duty-cycling
status: published
provenance: imported
scenario: You are designing a remote wildlife camera that uses a Cortex-M4 microcontroller for bird detection.
  It runs inference for 200ms, 120 times per hour. For the rest of the time, it's in deep sleep. The device
  is powered by a 4,000 mAh, 3.7V battery. Given the Cortex-M4's active power consumption is 50mW and
  its deep sleep power is 10µW, approximately how long will the battery last?
details:
  realistic_solution: The correct way to solve this is to calculate the *average* power consumption by
    creating a weighted average of the active and sleep power based on the duty cycle. This average power
    is then used to determine the total lifetime based on the battery's energy capacity.
  common_mistake: Engineers often underestimate or completely ignore the power consumption during sleep
    mode. While small, over long periods (months or years), the cumulative energy drain from sleep is
    significant and can't be treated as zero. Another common error is to only consider the active power
    drain, leading to a wild underestimation of device lifetime.
  napkin_math: Active time = 120 * 0.2s = 24s/hr. Sleep time = 3600 - 24 = 3576s/hr. Cortex-M4 active
    = 50 mW; sleep = 10 µW (0.01 mW). Energy per hour = (50 * 24) + (0.01 * 3576) = 1,200 + 35.76 = 1,235.76
    mJ = 0.343 mWh. Battery capacity = 4,000 mAh * 3.7V = 14,800 mWh. Estimated battery life = 14,800
    / 0.343 = 43,148 hours (~4.9 years).
