schema_version: 1
id: tinyml-0196
title: The Microcontroller's Ridge Point
topic: mcu-compute-constraints
status: draft
provenance: imported
scenario: A Cortex-M4 microcontroller, a common choice for TinyML, has a peak compute performance of roughly
  336 MFLOPS and an on-chip SRAM bandwidth of 1.2 GB/s. Based on these specifications, calculate the processor's
  'ridge point' in Operations per Byte and explain what this value implies about where the performance
  bottleneck will be for a typical ML model.
details:
  realistic_solution: The ridge point of a processor is the ratio of its peak compute performance to its
    memory bandwidth. It represents the minimum Arithmetic Intensity (AI) a workload must have to be compute-bound.
    For the Cortex-M4, the ridge point is approximately 0.28 Ops/Byte. This is a very low ridge point,
    indicating the device has a high memory bandwidth relative to its compute capabilities. Therefore,
    most neural network layers, which typically have an AI much greater than 1.0, will be **compute-bound**.
    The bottleneck will be the CPU's clock speed, not the ability to fetch data from the fast on-chip
    SRAM.
  common_mistake: Engineers often misinterpret the meaning of the ridge point. A low ridge point (like
    on a microcontroller) is often mistaken to mean the device is inherently 'slow' or memory-bound. They
    fail to recognize that the on-chip SRAM is extremely fast relative to the simple CPU core, which actually
    makes most TinyML models compute-bound, not memory-bound.
  napkin_math: 'To find the ''ridge point'' in an algorithmic Roofline model: Ridge Point = Peak Compute
    / Memory Bandwidth. Using the prompt''s stats: 336,000,000 Ops/sec / 1,200,000,000 Bytes/sec = 0.28
    Ops/Byte. This means the Cortex-M4 needs at least 0.28 operations per byte fetched from SRAM to be
    compute-bound. Below this, models are memory-bandwidth bound.'
