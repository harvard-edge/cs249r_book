id: tinyml-0333
title: The TCO of a Sleeping Army
topic: federated-learning
status: published
provenance: imported
scenario: You are the systems architect for a fleet of 100,000 smart warehouse sensors. Each device uses
  a microcontroller to perform audio-based anomaly detection (e.g., the sound of breaking glass). To conserve
  power, the device spends 99% of its time in a deep sleep mode consuming 10 µW and 1% of its time in
  an active listening mode consuming 10 mW. Assuming electricity costs $0.15 per kWh, what is the approximate
  total energy cost to operate this entire fleet for one year?
details:
  realistic_solution: The correct approach is to calculate the weighted average power consumption for
    a single device first, then scale it up to the fleet and the time period.
  common_mistake: The most common mistake is to ignore the power consumption of the sleep state because
    it seems negligible. While tiny on its own, when multiplied by a large fleet size and long duration,
    it forms a non-trivial baseline. Another frequent error is to only calculate for the active state,
    overestimating the cost by nearly 100x and missing the entire economic benefit of duty-cycling.
  napkin_math: 1. **Average Power:** (10 mW * 1%) + (10 µW * 99%) ≈ (0.1 mW) + (0.01 mW) = 0.11 mW per
    device. 2. **Fleet Power:** 0.11 mW * 100,000 = 11 W. 3. **Annual Energy:** 11 W * 8760 hours/year
    = 96.36 kWh. 4. **Cost:** 96.36 kWh * $0.15/kWh = $14.45.
