schema_version: 1
id: tinyml-0254
title: The SRAM Tensor Arena Squeeze
topic: tensor-arena-planning
status: published
provenance: imported
scenario: You're deploying a simple keyword-spotting model to a Cortex-M4 microcontroller. The model has
  three main stages. First, an input tensor for the audio spectrogram is 40 KB. The second stage produces
  an intermediate feature tensor of 20 KB. The final stage produces a 10 KB output tensor with classification
  scores. TensorFlow Lite for Microcontrollers uses a single, contiguous block of SRAM called the 'tensor
  arena' for all activations. Assuming the memory planner requires both the input and output of a layer
  to be simultaneously present in memory during a calculation, but can reuse a tensor's memory as soon
  as it's no longer needed for future calculations, what is the minimum required size of the tensor arena?
details:
  realistic_solution: 'The tensor arena size is determined by the peak memory usage at any point during
    inference. The TensorFlow Lite for Micro memory planner calculates this high-water mark to allocate
    the smallest possible arena.

    1.  During the calculation of the intermediate tensor, both the 40 KB input and the 20 KB intermediate
    tensor must co-exist in memory. Peak usage: `40 KB + 20 KB = 60 KB`.

    2.  Once the intermediate tensor is calculated, the 40 KB input tensor is no longer needed for future
    steps.

    3.  During the calculation of the final output tensor, the 20 KB intermediate tensor and the 10 KB
    output tensor must co-exist. The memory from the original input tensor can be reused for the output
    tensor. Peak usage for this stage: `20 KB + 10 KB = 30 KB`.

    The overall minimum size for the arena is the maximum of these peaks, which is 60 KB.'
  common_mistake: Engineers often mistakenly sum the sizes of all tensors (`40 + 20 + 10 = 70 KB`), forgetting
    that the tensor arena's purpose is to reuse memory. Tensors are only live for a portion of the inference,
    and their memory can be reclaimed. Another common error is to only account for the largest tensor,
    which fails to consider that multiple tensors are live simultaneously.
  napkin_math: 'Peak memory is the high-water mark of simultaneously live tensors.

    1. **Stage 1 (Input -> Intermediate):** Input (40 KB) + Intermediate (20 KB) = **60 KB** peak.

    2. **Stage 2 (Intermediate -> Output):** Input freed. Intermediate (20 KB) + Output (10 KB) = **30
    KB** peak.

    3. **Minimum Arena Size** = max(60, 30) = **60 KB**.


    Note: Summing all tensors (40 + 20 + 10 = 70 KB) would overestimate by ~17%. The memory planner saves
    10 KB by reusing the freed input tensor''s space.'
