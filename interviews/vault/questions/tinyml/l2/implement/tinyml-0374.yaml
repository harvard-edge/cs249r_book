id: tinyml-0374
title: The Economics of On-Device Learning
topic: federated-learning
status: published
provenance: imported
scenario: 'You''re designing the update strategy for a fleet of 1 million smart thermostats. Each device
  can collect about 100 KB of sensor data daily for potential retraining. The on-device model is 250 KB.
  You need to update the global model weekly. Compare the total daily data upload volume for two strategies:
  1) Centralized: upload all raw data daily, and 2) Federated Learning: upload only the model weights
  once per week. Explain which is more efficient from a data transmission perspective.'
details:
  realistic_solution: The correct approach is to calculate the total data volume for the entire fleet
    over a common time period (e.g., one day).
  common_mistake: Engineers often compare the per-device data sizes (100KB of data vs. 250KB model) and
    incorrectly conclude that federated learning uses more data. They fail to account for the *frequency*
    of the updates (daily data collection vs. weekly model updates) and the *scale* of the fleet, which
    are the dominant factors in the total cost.
  napkin_math: 'Centralized: 1M devices stream 100 KB raw data daily = 100 GB/day network load. Federated
    Learning: Devices train locally and upload only the 250 KB weight updates weekly. 1M devices * 250
    KB = 250 GB/week = 35.7 GB/day. Furthermore, with partial participation (e.g., 10% of fleet updating
    daily), the load drops to 3.5 GB/day, saving >96% of bandwidth costs while ensuring privacy.'
