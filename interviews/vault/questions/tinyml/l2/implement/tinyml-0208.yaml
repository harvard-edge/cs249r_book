id: tinyml-0208
title: 'TinyML Roofline: Compute or Memory Bound?'
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You're optimizing a keyword spotting model on a Cortex-M4 microcontroller. You profile a single
  fully-connected layer and find it performs approximately 8,200 floating-point operations (FLOPs) and
  requires moving 17,000 bytes of data (weights, inputs, and outputs) from SRAM. Using the hardware constants
  provided, calculate the Arithmetic Intensity of this layer and determine if it is compute-bound or memory-bound
  on a Cortex-M4.
details:
  realistic_solution: First, calculate the layer's Arithmetic Intensity (AI). Then, compare that value
    to the Cortex-M4's ridge point from the provided table.
  common_mistake: The most common mistake is inverting the Arithmetic Intensity formula (calculating Bytes/Op
    instead of Ops/Byte), which leads to incorrectly concluding the layer is memory-bound. A second error
    is calculating the AI value correctly but then failing to compare it against the specific hardware's
    ridge point, making the number meaningless in isolation and leading to a guess.
  napkin_math: Arithmetic Intensity (AI) = Total Ops / Total Bytes. AI = 8,200 FLOPs / 17,000 bytes =
    ~0.48 FLOPs/byte. The Cortex-M4 ridge point is typically around 0.28 Ops/byte (using 336 MFLOPS and
    1.2GB/s SRAM). Since 0.48 > 0.28, this fully-connected layer sits on the compute-bound side of the
    Roofline model, meaning optimization should focus on loop unrolling.
