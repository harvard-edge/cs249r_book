schema_version: 1
id: tinyml-0198
title: The DMA Double-Buffer Lifeline
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You are building a device that continuously listens for a wake-word. The microcontroller uses
  DMA to capture 16-bit audio from a microphone sampling at 16 kHz, while the CPU runs a wake-word model
  that has an inference latency of 120 ms. To ensure no audio data is lost while the CPU is busy, you
  implement a double-buffering scheme.
details:
  realistic_solution: 'Use two buffers of equal size, each covering the inference latency. Data rate:
    16kHz * 2 bytes = 32 KB/s. Each buffer must hold 120ms of audio: 32,000 * 0.120 = 3,840 bytes. Total
    memory: 2 * 3,840 = 7,680 bytes. While DMA fills buffer A, the CPU runs inference on buffer B, then
    they swap. This guarantees zero sample loss because the DMA always has a free buffer to write into,
    regardless of CPU load. The key insight: buffer size is dictated by inference latency (120ms), not
    by any arbitrary frame duration.'
  common_mistake: Engineers often calculate the size for only a single buffer, forgetting that two are
    needed to operate the pipeline. Another common error is mixing up bits and bytes, leading to an 8x
    error in the final size calculation. Finally, some might ignore the inference latency and size the
    buffer based on an arbitrary duration.
  napkin_math: 'Data rate: 16kHz × 2 bytes = 32KB/s. Inference latency: 120ms. Audio per inference window:
    32,000 B/s × 0.120s = 3,840 bytes per buffer. Double buffer: 2 × 3,840 = 7,680 bytes total. On Cortex-M4
    with 256KB SRAM: 7.7KB = 3% of SRAM. DMA fills buffer A while CPU processes buffer B → zero sample
    loss guaranteed. Buffer swap every 120ms.'
