schema_version: 1
id: tinyml-0030
title: The Thermal Duty Cycle
topic: duty-cycling
status: published
provenance: imported
scenario: You're designing a wildlife camera that uses a Cortex-M4 based chip for animal detection. Your
  thermal tests show the enclosure can only dissipate 15 mW of average power before the chip overheats
  and throttles. The chip consumes 50 mW when running inference and a negligible amount in sleep mode.
  To prevent overheating, what is the maximum duty cycle (the percentage of time the chip can be active)
  you can sustain?
details:
  realistic_solution: The solution is to calculate the ratio of the power budget to the active power consumption.
    Since the sleep power is negligible, the average power is simply the active power multiplied by the
    duty cycle. To stay within the 15 mW budget, the duty cycle must be limited.
  common_mistake: Engineers often invert the ratio, calculating `50 / 15` and getting a nonsensical number,
    or they subtract the powers (`50 - 15 = 35%`) which has no physical meaning. Another common mistake
    is to fail to connect that 'average power' is directly controlled by the duty cycle.
  napkin_math: 'Duty cycle = P_budget / P_active = 15mW / 50mW = 0.30 = 30%. Max active time per second:
    0.30 × 1s = 300ms. Remaining 700ms must be sleep. Verify: 50mW × 0.3 + 0mW × 0.7 = 15mW ✓. If inference
    takes 100ms, can run 3 inferences/sec max before thermal throttle on Cortex-M4.'
