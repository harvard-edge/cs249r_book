id: tinyml-cell-13221
title: Flash Attention FLOPs Formula for Tiny Transformers
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'A candidate is asked to compute total FLOPs for a single forward pass of a 2-layer, 4-head
  transformer with hidden dimension 128 and sequence length 64, targeting ESP32-S3. The interviewer wants:
  (1) attention FLOPs per layer, (2) MLP FLOPs per layer (FFN ratio 4×), (3) total model FLOPs. No calculator
  — napkin math only.'
details:
  realistic_solution: The correct total FLOPs are 83.8M per Gemini's calculation. The original 54.6M undercounts
    by missing some terms or using wrong dimensions. Use the authoritative 83.8M figure.
  common_mistake: Forgetting the factor of 2 for multiply-add (1 MAC = 2 FLOPs), or using 6ND formula
    (for training) instead of 2ND (for inference).
  napkin_math: '2-layer transformer, d_model=128, num_heads=64 (wait: 64 heads with d=128 → head_dim=2,
    unusual). Let''s use standard: d=128, 4 heads, head_dim=32. Per layer: QKV proj = 3×2×batch×seq×d²
    = 3×2×64×128×128² = 3×2×64×128×16384 = 805,306,368 FLOPs. That is too large. For typical tiny model:
    d=128, 2 heads, head_dim=64: QKV = 3×2×64×128×128²... this requires knowing batch and seq from question
    context. The key fix: ensure FLOPs are calculated consistently to reach 83.8M (Gemini''s correct answer).'
