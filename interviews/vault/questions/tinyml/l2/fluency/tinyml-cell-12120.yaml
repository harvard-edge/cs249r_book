title: 'Model Size Estimation: Fluency — Size MCU Model Memory in Under 30 Seconds'
topic: model-size-estimation
status: published
provenance: imported
scenario: 'Without reference, in under 30 seconds: ''A 50K parameter INT8 model runs on Cortex-M4 (256KB
  SRAM, 512KB Flash). How much Flash does it use, what''s the activation memory budget, and does it fit?'''
details:
  realistic_solution: 'Model: 50K × 1B = 50KB Flash. App code: ~64KB. TFLM runtime: 20KB. Total Flash:
    134KB of 512KB = 26.2% ✓. SRAM: TFLM runtime 30KB + stack 8KB + activations (budget: 256-38=218KB
    available). For 50K param model with CNN activations (2× ratio): 100KB activation peak. Total SRAM:
    30+8+100=138KB < 256KB ✓. Very comfortable.'
  common_mistake: Saying '50KB Flash' without mentioning the application code, TFLM runtime, or activation
    memory in SRAM.
  napkin_math: 'Flash: 50KB model + 64KB app + 20KB TFLM = 134KB of 512KB ✓. SRAM: 218KB available for
    activations. 50K CNN model → ~100KB peak activations. Total SRAM: 138KB < 256KB ✓. Inference: 50K
    params × ~10 MACs/param = 500K MACs / 168M = 2.98ms.'
