id: tinyml-0151
title: The Cost of Unoptimized C Code
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You're prototyping a simple keyword spotting model that requires 5 Million MAC (Multiply-Accumulate)
  operations for a single inference. You've deployed it to a Cortex-M4 microcontroller running at 168
  MHz. Your initial, unoptimized C code is measured to take 4 clock cycles to execute a single INT8 MAC
  operation. Calculate the expected inference time.
details:
  realistic_solution: 'The correct approach is to calculate the total number of clock cycles required
    and divide by the processor''s clock speed.

    1.  **Total Cycles:** 5,000,000 MACs × 4 cycles/MAC = 20,000,000 cycles.

    2.  **Inference Time:** Divide the total cycles by the clock frequency: 20,000,000 cycles / 168,000,000
    cycles/second = 0.119 seconds, or approximately 119 ms.'
  common_mistake: Engineers often mistakenly assume the theoretical peak performance (e.g., 1 MAC/cycle)
    for initial prototypes, forgetting that standard, unoptimized C code without special compiler intrinsics
    or libraries like CMSIS-NN is much less efficient. The compiler may not be able to schedule instructions
    optimally, leading to a higher cycles-per-operation count.
  napkin_math: Total MACs = 5M | Cycles per MAC = 4 | Clock Speed = 168 MHz
