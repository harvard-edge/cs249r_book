title: The CMSIS-NN SIMD Dividend
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: To optimize the 5M MAC keyword spotting model from the previous question, you integrate the
  ARM CMSIS-NN library. This allows the Cortex-M4 to leverage its 32-bit SIMD (Single Instruction, Multiple
  Data) capabilities for INT8 math, achieving the theoretical peak performance of 1 MAC per clock cycle.
  What is the new, optimized inference time on the same 168 MHz MCU?
details:
  realistic_solution: 'With CMSIS-NN, the cycles per MAC is reduced to the chip''s theoretical peak.

    1.  **Total Cycles:** 5,000,000 MACs × 1 cycle/MAC = 5,000,000 cycles.

    2.  **Optimized Inference Time:** 5,000,000 cycles / 168,000,000 cycles/second = 0.02976 seconds,
    which is approximately 29.8 ms. This represents a 4x speedup over the unoptimized code.'
  common_mistake: A common error is to confuse the number of operations (FLOPs) in a MAC with the number
    of cycles it takes to execute. A MAC consists of 2 operations (a multiply and an add), but with SIMD,
    a processor can execute the entire MAC in a single cycle. Engineers might incorrectly divide the performance
    by 2, thinking 2 Ops must mean 2 cycles, failing to appreciate the efficiency of fused hardware instructions.
  napkin_math: Total MACs = 5M | Cycles per MAC = 1 (with CMSIS-NN) | Clock Speed = 168 MHz
