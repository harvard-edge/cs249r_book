title: 'The Depthwise Separable Memory Diet: CNN Efficient Design'
topic: cnn-efficient-design
status: draft
provenance: imported
scenario: You're optimizing a keyword-spotting model to fit into the Flash memory of a Cortex-M4 microcontroller.
  A key layer is a standard 2D convolution with a 3x3 kernel that takes a tensor with 32 input channels
  and produces a tensor with 64 output channels. To save space, you propose replacing it with a depthwise
  separable convolution. Explain the difference and calculate the approximate parameter reduction factor.
details:
  realistic_solution: 'A standard convolution learns spatial features (like edges) and cross-channel features
    (how channels combine) simultaneously in one expensive step. A depthwise separable convolution factorizes
    this into two, more efficient steps:

    1.  **Depthwise Convolution:** A single 3x3 kernel is applied to each of the 32 input channels independently.
    This learns only spatial features.

    2.  **Pointwise Convolution:** A 1x1 convolution is then used to combine the outputs of the depthwise
    step, learning the cross-channel features.

    This factorization dramatically reduces the number of parameters.'
  common_mistake: Engineers often forget the two-step nature of a depthwise separable convolution. They
    might only calculate the parameters for the first step (the depthwise spatial convolution) and forget
    to include the second, 1x1 pointwise convolution. This leads to a massive overestimation of the memory
    savings.
  napkin_math: 1. **Standard Conv Params:** `params = K_H × K_W × C_in × C_out = 3 × 3 × 32 × 64 = 18,432`
