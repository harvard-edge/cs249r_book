schema_version: 1
id: tinyml-0189
title: The TinyML Flash Budget
topic: mcu-compute-constraints
status: draft
provenance: imported
scenario: 'You''re a TinyML engineer building a visual wake word system on a device with a Cortex-M4 microcontroller.
  After accounting for the OS and application code, you have **454 KB of available Flash memory** for
  the model weights. You are comparing two architectures, both using FP32 precision:


  - **CNN**: 100,000 parameters

  - **ViT**: 125,000 parameters'
details:
  realistic_solution: The correct approach is to calculate the memory footprint for each model by multiplying
    its parameter count by the size of the data type (4 bytes for FP32). For example, the 100,000 parameter
    CNN requires 400 KB of Flash (which fits in the 454 KB budget), while the 125,000 parameter ViT requires
    500 KB (which exceeds it).
  common_mistake: The most common mistake is to forget the bytes-per-parameter conversion factor for a
    given precision. Engineers often misremember FP32 as being 2 bytes (like FP16) or simply forget to
    do the multiplication, comparing the raw parameter count directly to the memory budget in kilobytes,
    leading to an off-by-4x error.
  napkin_math: 'Device Flash Budget = 454 KB. If using FP32 (4 bytes/param): CNN (100k params) = 400 KB
    (Fits). ViT (125k params) = 500 KB (Exceeds 454 KB limit). If we quantize both to INT8 (1 byte/param):
    CNN = 100 KB, ViT = 125 KB. Both now easily fit in Flash, leaving >300 KB for additional features.
    Cortex-M4 INT8 SIMD instructions will also speed execution.'
