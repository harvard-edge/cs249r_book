id: tinyml-0153
title: The Real-Time MAC Budget
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You are designing a voice command system for an industrial application using a Cortex-M4 (168
  MHz). The system has a hard real-time requirement where inference must complete within a 33 ms window
  to process streaming audio without dropping any data. Assuming you are using an optimized CMSIS-NN implementation
  that achieves 1 MAC per cycle, what is the maximum number of MAC operations your neural network can
  have while guaranteeing you meet the deadline?
details:
  realistic_solution: 'This requires working backwards from the time budget to find the computational
    budget.

    1.  **Calculate Available Cycles:** Determine how many clock cycles are available within the 33ms
    window. 168,000,000 cycles/second × 0.033 seconds = 5,544,000 cycles.

    2.  **Calculate MAC Budget:** Since each MAC takes 1 cycle, the total number of available cycles is
    equal to the maximum number of MACs. The model''s complexity must be kept under ~5.5 Million MACs.'
  common_mistake: A frequent mistake is a units mismatch, particularly dividing by the time in milliseconds
    (33) instead of seconds (0.033). This leads to an answer that is off by a factor of 1000. Another
    error is to confuse the relationship and divide the clock speed by the cycles per MAC, instead of
    calculating the total available cycles in the time budget first.
  napkin_math: Clock Speed = 168 MHz | Time Budget = 33 ms = 0.033 s | Cycles per MAC = 1
