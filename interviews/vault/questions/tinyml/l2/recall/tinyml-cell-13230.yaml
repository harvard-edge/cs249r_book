id: tinyml-cell-13230
title: Recall Transformer Token Budget on TinyML Hardware
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'During a TinyML interview, you are asked: for a transformer running on Cortex-M4 with 256KB
  SRAM, 2 layers, 4 heads, 32-dim head dimension, INT8 precision, what is the maximum sequence length
  (number of tokens) that fits in SRAM if 128KB is reserved for weights and activations, leaving 128KB
  for the KV cache?'
details:
  realistic_solution: 'KV cache per token = 2 (K and V) × num_layers × num_heads × head_dim × precision.
    = 2 × 2 × 4 × 32 × 1B = 512 bytes per token. Budget: 128KB = 131,072 bytes. Max tokens: 131,072 /
    512 = 256 tokens. Answer: 256 tokens maximum sequence length.'
  common_mistake: Forgetting to account for both K and V tensors (factor of 2), or forgetting all layers'
    KV must fit simultaneously.
  napkin_math: 'KV bytes/token = 2 × L × H × d × 1B = 2×2×4×32 = 512 B/token. Budget: 128KB / 512B = 256
    tokens. Quick check: 256×512 = 131,072B = 128KB. ✓'
