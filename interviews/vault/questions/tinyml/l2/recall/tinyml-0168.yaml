id: tinyml-0168
title: The Tensor Arena Squeeze
topic: tensor-arena-planning
status: draft
provenance: imported
scenario: 'You''re deploying a keyword spotting model to a Cortex-M4 microcontroller with 256 KB of SRAM.
  Your model has three layers. TensorFlow Lite for Microcontrollers reports the following tensor memory
  requirements:'
details:
  realistic_solution: 'The tensor arena peak is determined by the largest sum of input and output tensors
    coexisting during any layer execution. Layer 1: input (12 KB) + output (28 KB) = 40 KB. Layer 2: input
    (28 KB) + output (8 KB) = 36 KB. Layer 3: input (8 KB) + output (1 KB) = 9 KB. Peak = max(40, 36,
    9) = 40 KB. Not 49 KB (12+28+8+1 = sum of all tensors). TFLM reuses memory: after Layer 1 completes,
    the 12 KB input is freed and available for Layer 2 output (8 KB fits in the 12 KB slot). Peak occurs
    at Layer 1 where both 12 KB input and 28 KB output coexist. On 256 KB SRAM: 40 KB arena + model weights
    in flash (0 KB SRAM) + 16 KB stack + 8 KB RTOS = 64 KB used, 192 KB free for application logic.'
  common_mistake: Summing the memory of all tensors (12+28+8+1 = 49 KB) or just the output tensors (28+8+1
    = 37 KB). This fails to account for the fact that TFLM reuses memory, and the peak is determined by
    the maximum memory needed *at one time* during any layer's execution.
  napkin_math: 'Peak Memory = max(L1_in + L1_out, L2_in + L2_out, L3_in + L3_out)


    Assuming the following tensor sizes from the scenario:

    - Layer 1: Input = 12 KB, Output = 28 KB → Simultaneous = 40 KB

    - Layer 2: Input = 28 KB, Output = 8 KB → Simultaneous = 36 KB

    - Layer 3: Input = 8 KB, Output = 1 KB → Simultaneous = 9 KB


    Peak = max(40, 36, 9) = **40 KB**


    The tensor arena must be at least **40 KB**, not 49 KB (sum of all tensors). TFLM reuses memory: after
    Layer 1 completes, the 12 KB input tensor is freed, and that space can be reused by Layer 2''s output.
    The peak occurs at Layer 1, where both the 12 KB input and 28 KB output must coexist in memory simultaneously.


    On a 256 KB SRAM device, 40 KB for the tensor arena leaves 216 KB for the RTOS, stack, and application
    logic — a comfortable margin.'
