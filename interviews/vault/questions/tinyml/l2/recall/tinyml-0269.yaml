id: tinyml-0269
title: 'The TinyML Economics of Inference: On-Device vs. Cloud'
topic: federated-learning
status: published
provenance: imported
scenario: You're designing a fleet of battery-powered audio sensors that use a keyword spotting model.
  The device wakes for 1 second when it detects a potential keyword, which happens about once per hour.
details:
  realistic_solution: On-device inference is dramatically more energy-efficient. The total energy is the
    sum of the active energy and the sleep energy. While the device is asleep most of the time, the extremely
    high power cost of the cellular radio for the cloud-assisted approach makes it consume over 10x more
    energy in total. The energy cost of transmission far outweighs the energy savings from offloading
    compute.
  common_mistake: Engineers often dramatically underestimate the power cost of wireless transmission.
    A cellular radio is frequently the most power-hungry component in an IoT system. They might incorrectly
    assume that a 'quick' data burst is cheaper than running a local CPU, forgetting that local compute
    happens on the order of milliwatts, while transmission can be 100x more consumptive.
  napkin_math: '1. **Define Constants:** | Total Time: 24 hours = 86,400 seconds | Triggers: 24 (1 per
    hour) | Total Active Time: 24 triggers × 1s = 24 seconds | Total Sleep Time: 86,400s - 24s = 86,376
    seconds | `P_active_local` = 10 mW | `P_active_cloud` = 500 mW | `P_sleep` = 10 µW = 0.01 mW'
