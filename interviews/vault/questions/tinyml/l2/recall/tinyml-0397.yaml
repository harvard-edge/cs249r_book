id: tinyml-0397
title: The Microcontroller's Ridge Point (tinyml-0397)
topic: mcu-compute-constraints
status: draft
provenance: imported
scenario: 'You''re designing a keyword spotting model for a Cortex-M4 microcontroller. The datasheet provides
  its peak performance: 336 MFLOPS and a memory bandwidth of 1.2 GB/s. To understand the physical limits
  of the chip, calculate its ''Ridge Point'' in FLOPs per Byte. What does this value tell you about the
  types of workloads that will run efficiently on this MCU?'
details:
  realistic_solution: The Ridge Point defines the minimum Arithmetic Intensity (AI) a workload must have
    to be compute-bound. On this device, it's approximately 0.28 FLOPs/Byte. Any operation with an AI
    lower than this will be limited by memory bandwidth (memory-bound). Any operation with an AI higher
    than this will be limited by the core's computational speed (compute-bound). The very low ridge point
    is characteristic of microcontrollers, where memory access is relatively fast compared to the low-power
    compute core.
  common_mistake: Engineers often miscalculate the ridge point by confusing the magnitude of the units
    (Giga vs. Mega) or by inverting the formula (Bandwidth / Compute). A conceptual error is to misinterpret
    the meaning, thinking a workload should always have low arithmetic intensity, when in fact a higher
    intensity is needed to overcome the memory bottleneck and fully utilize the processor's compute capability.
  napkin_math: 'Ridge = Peak Compute / Peak BW. 336 MFLOPS / 1.2 GB/s = 0.28 FLOPs/Byte. Compare A100:
    312 TFLOPS / 2.0 TB/s = 156 FLOPs/Byte (557x higher). MCU ridge is very low: even elementwise ops
    (AI~1) are compute-bound. Conv layers (AI~10-100) deeply compute-bound. Memory BW is rarely the bottleneck
    on MCUs.'
