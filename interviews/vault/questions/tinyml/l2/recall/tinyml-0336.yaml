id: tinyml-0336
title: The TinyML Tensor Arena Squeeze (tinyml-0336)
topic: tensor-arena-planning
status: published
provenance: imported
scenario: 'You are deploying a keyword spotting model on a Cortex-M4 microcontroller which has 256 KB
  of SRAM. After analyzing the model graph, you determine the point of peak memory usage occurs during
  the execution of Layer 5. At this moment, TensorFlow Lite needs to hold the input tensor for Layer 5
  (which is the output from Layer 4) and the output tensor for Layer 5 in memory concurrently.

  - Layer 4 output tensor dimensions: 8×8×16, INT8 precision

  - Layer 5 output tensor dimensions: 8×8×32, INT8 precision

  What is the peak memory usage at this point, and does it fit within the SRAM budget?'
details:
  realistic_solution: The Tensor Arena is a statically allocated block of memory in SRAM used for all
    input, output, and intermediate tensors. To find the peak usage, you must identify the point in the
    model's execution where the sum of all concurrently live tensors is at its maximum.
  common_mistake: A common mistake is to only account for the single largest tensor (the 2.0 KB output
    of Layer 5), forgetting that the inputs to a layer must coexist in memory with its outputs. This leads
    to underestimating the peak memory requirement.
  napkin_math: '1. **Calculate L4 Output Size:** 8 × 8 × 16 × 1 byte = **1,024 bytes (1.0 KB)**

    2. **Calculate L5 Output Size:** 8 × 8 × 32 × 1 byte = **2,048 bytes (2.0 KB)**

    3. **Peak Memory at Layer 5:** 1,024 + 2,048 = **3,072 bytes (3.0 KB)**

    4. **SRAM Budget Check:** 3.0 KB << 256 KB → **fits easily**

    5. **Note:** The full tensor arena must also account for the TFLM runtime overhead (~2-5 KB for the
    interpreter and scratch buffers), so the practical minimum arena size would be approximately 5-8 KB.'
