id: tinyml-cell-12070
title: 'Model Format Conversion: Size TFLM Model for Cortex-M4 Flash and SRAM'
topic: model-format-conversion
status: published
provenance: imported
scenario: 'Size the Flash and SRAM requirements for deploying a MobileNetV1-0.25 model (475K params, INT8)
  on Cortex-M4 (168MHz, 256KB SRAM, 512KB Flash). Include: model Flatbuffer in Flash, TFLM op kernels
  in Flash, activation tensor arena in SRAM, and TFLM runtime overhead in SRAM. Verify all constraints.'
details:
  realistic_solution: 'Flash: model Flatbuffer 475KB (EXCEEDS 512KB Flash if app code is included). Problem:
    475KB model alone uses 92.8% of Flash. Application code (bootloader + firmware): ~64KB. Total: 539KB
    > 512KB. Fix: use Flash with execute-in-place (XIP) + external QSPI Flash (4MB). Or reduce model:
    MobileNetV1-0.1 (47K params) = 47KB → 47+64=111KB Flash ✓. SRAM: Activation arena for MobileNetV1-0.25:
    peak ~100KB. TFLM runtime: 30KB. Total SRAM: 130KB < 256KB ✓.'
  common_mistake: Adding model weights to SRAM instead of Flash; on Cortex-M4, the model Flatbuffer is
    stored in Flash (read-only), only activations and runtime state go in SRAM.
  napkin_math: 'MobileNetV1-0.25 params: 475K × 1B = 475KB Flash. App: 64KB. Total: 539KB. 512KB Flash:
    overflows by 27KB. Options: (a) external Flash (cheap), (b) use -0.1 variant (47K params = 47KB).
    MobileNetV1-0.1 SRAM: peak activation 28×28×32=25KB (first large layer). TFLM: 30KB. Total SRAM: ~55KB
    of 256KB. ✓ Latency: 0.12M ops / 168M = 0.71ms (0.25 variant much slower).'
