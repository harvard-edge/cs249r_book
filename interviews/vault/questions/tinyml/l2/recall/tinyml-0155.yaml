id: tinyml-0155
title: The Cortex-M7 MAC Budget
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: Your team is deploying a voice activity detection (VAD) model on a device with a Cortex-M7 MCU
  running at 480 MHz. The model requires exactly 9 million MAC operations per inference. To meet the real-time
  requirement, inference must run every 20 milliseconds. Compare the model's computational needs to the
  MCU's capabilities and explain if the MCU can handle the load.
details:
  realistic_solution: The MCU's maximum theoretical throughput is 480 Million MACs per second (assuming
    1 MAC per cycle on the 480 MHz core). The model requires 9 million MACs every 20ms. This translates
    to a sustained load of 50 inferences per second (1000ms / 20ms). Therefore, the total required throughput
    is 9 MMACs/inference × 50 inferences/sec = 450 Million MACs per second. While 450M is less than 480M,
    it represents over 93% utilization of the core's absolute peak theoretical throughput. This leaves
    almost no headroom for the RTOS, other tasks, pipeline stalls, or cache misses. In a real system,
    this is far too risky and will likely fail to meet its deadline. The MCU cannot reliably handle this
    load.
  common_mistake: A frequent error is to only compare the raw ops per inference (9M) with the MCU's clock
    speed (480M) and conclude there's plenty of headroom. This ignores the *rate* at which inferences
    must be performed, which is the critical factor in calculating the sustained workload.
  napkin_math: 1. **MCU Capacity:** A 480 MHz clock speed gives a *peak theoretical* throughput of 480
    Million MACs/sec.
