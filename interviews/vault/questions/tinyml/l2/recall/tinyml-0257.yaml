schema_version: 1
id: tinyml-0257
title: The Depthwise Memory Diet
topic: cnn-efficient-design
status: draft
provenance: imported
scenario: 'You''re optimizing a keyword spotting model for a Cortex-M4 microcontroller. Your profiler
  shows one layer is a memory bottleneck: a standard 2D convolution with a 3x3 kernel, 16 input channels,
  and 32 output channels. To fit the model into the device''s limited SRAM, you decide to replace this
  layer with a depthwise separable convolution. Calculate the total number of parameters for the *new*
  layer, including biases.'
details:
  realistic_solution: 'Depthwise separable conv splits into two steps. Depthwise: one 3x3 filter per input
    channel = 3*3*16 = 144 weights + 16 biases = 160 params. Pointwise: 1x1 conv mapping 16 to 32 channels
    = 1*1*16*32 = 512 weights + 32 biases = 544 params. Total: 160 + 544 = 704 parameters. Compare to
    standard conv: 3*3*16*32 = 4,608 weights + 32 biases = 4,640 params. Reduction: 704/4,640 = 15.2%
    of original — a 6.6x parameter savings. On a Cortex-M4 with limited SRAM, this difference determines
    whether the model fits on-device.'
  common_mistake: Engineers often calculate only the 'depthwise' part of the operation and completely
    forget the subsequent 'pointwise' (1x1 convolution) step that is required to combine channel information
    and change the output depth. This leads them to drastically underestimate the final parameter count
    and overestimate the savings.
  napkin_math: 'Standard 3x3 conv weights: 3 * 3 * 16 (in) * 32 (out) = 4,608 parameters. On a Cortex-M4
    (INT8), this uses 4.6KB of Flash. Using a Depthwise Separable Conv reduces this drastically. Depthwise:
    3 * 3 * 16 = 144 params. Pointwise: 1 * 1 * 16 * 32 = 512 params. Total = 656 params (0.65KB). This
    saves ~85% memory, critical for the M4''s 256KB SRAM/Flash limits.'
