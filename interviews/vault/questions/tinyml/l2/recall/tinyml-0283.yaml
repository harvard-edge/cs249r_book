schema_version: 1
id: tinyml-0283
title: The Depthwise Separable Dividend (tinyml-0283)
topic: cnn-efficient-design
status: draft
provenance: imported
scenario: You're optimizing a real-time keyword spotting model for a Cortex-M4 microcontroller. A profiler
  shows that a standard 3x3 convolutional layer is the main bottleneck. This layer takes a `16x16x32`
  (HxWxC_in) feature map and produces a `16x16x64` (HxWxC_out) output.
details:
  realistic_solution: 'A depthwise separable convolution splits a standard convolution into two much cheaper
    layers:

    1. **Depthwise layer:** One 3×3 filter per input channel, applied spatially. This captures spatial
    features independently per channel.

    2. **Pointwise layer:** A 1×1 convolution that linearly combines the depthwise outputs to produce
    the desired number of output channels.


    The computational savings come from avoiding the full cross-channel multiply at every spatial position.'
  common_mistake: Engineers often calculate the cost of the depthwise part of the convolution but forget
    to include the significant cost of the subsequent 1x1 pointwise convolution. This leads them to overestimate
    the computational savings by an order of magnitude, believing the reduction is proportional to the
    number of output channels (~64x) when it's much smaller.
  napkin_math: "1. **Standard Convolution Cost:**\n   - MACs = K² × C_in × C_out × H_out × W_out = 3²\
    \ × 32 × 64 × 16 × 16 = **4,718,592** MACs**\n2. **Depthwise Convolution Cost:**\n   - MACs = K² ×\
    \ C_in × H_out × W_out = 3² × 32 × 16 × 16 = **73,728** MACs**\n3. **Pointwise Convolution Cost:**\n\
    \   - MACs = 1² × C_in × C_out × H_out × W_out = 1 × 32 × 64 × 16 × 16 = **524,288** MACs**\n4. **Total\
    \ Depthwise Separable Cost:** 73,728 + 524,288 = **598,016 MACs**\n5. **Speedup Factor:** 4,718,592\
    \ / 598,016 ≈ **7.9×** fewer operations\n\nThe savings come from factoring the expensive K² × C_out\
    \ term into two separate, cheaper terms."
