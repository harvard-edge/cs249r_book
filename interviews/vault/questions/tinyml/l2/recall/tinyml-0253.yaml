schema_version: 1
id: tinyml-0253
title: The Microcontroller Ridge Point (tinyml-0253)
topic: mcu-compute-constraints
status: draft
provenance: imported
scenario: You are evaluating a Cortex-M4 microcontroller for a real-time audio keyword-spotting task.
  According to its specs, it offers a peak performance of approximately 336 MFLOPS and has an on-chip
  SRAM bandwidth of 1.2 GB/s. To understand how to best utilize this chip, you need to determine its operational
  boundary between being memory-bound and compute-bound. Calculate the 'ridge point' of this microcontroller's
  roofline model, which represents the minimum arithmetic intensity required to be compute-bound.
details:
  realistic_solution: The ridge point is the ratio of peak compute to peak memory bandwidth. For the Cortex-M4,
    this is 336 MFLOPS (or 0.336 GFLOPS) divided by 1.2 GB/s. This yields an arithmetic intensity of approximately
    0.28 Ops/Byte. This extremely low ridge point means that an operation only needs to perform slightly
    more than one operation for every four bytes it reads to become limited by compute. Most neural network
    layers have an arithmetic intensity higher than this (e.g., standard dense layers are >1 Ops/Byte),
    meaning that TinyML models are usually compute-bound on this MCU.
  common_mistake: The most common mistake is a unit mismatch, typically by dividing the number for MFLOPS
    (336) directly by the number for GB/s (1.2) without converting the units to be consistent (e.g., FLOPS
    and Bytes/s, or GFLOPS and GB/s). Another error is inverting the formula to calculate Bytes/Op instead
    of Ops/Byte.
  napkin_math: 'Ridge point = peak compute / peak memory bandwidth. Cortex-M4: 336 MFLOPS (168 MHz * 2
    FLOPS/cycle with DSP). On-chip SRAM bandwidth: ~1.2 GB/s (168 MHz * 32-bit bus). Ridge point = 336
    MFLOPS / 1.2 GB/s = 0.28 FLOPS/byte. Standard 3x3 conv (INT8): 18 FLOPs / 18 bytes = 1.0 FLOPS/byte
    > 0.28 = compute-bound. Depthwise 3x3: 18 FLOPs / 10 bytes = 1.8 = compute-bound. FC layer (1024 to
    10): 2 FLOPs / 2 bytes = 1.0 = compute-bound. Element-wise add: 1 FLOP / 3 bytes = 0.33 = borderline.
    Nearly all DNN layers exceed 0.28, so MCU inference is almost always compute-bound, unlike GPU inference
    which is often memory-bound for small batches.'
