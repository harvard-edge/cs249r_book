schema_version: 1
id: tinyml-0387
title: The Microcontroller Roofline Dilemma
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You are profiling a keyword-spotting model on a Cortex-M4 microcontroller. The profiler shows
  the most critical layer performs **40,000 floating-point operations (FLOPs)** and reads/writes a total
  of **20 kilobytes (KB)** of data from SRAM per inference. The Cortex-M4 has a peak compute of **336
  MFLOPS** and an SRAM bandwidth of **1.2 GB/s**.
details:
  realistic_solution: 'The layer is **compute-bound**. 1. **Convert Data to Bytes:** 20 KB * 1024 bytes/KB
    = 20,480 bytes

    2. **Calculate Arithmetic Intensity (AI):** AI = FLOPs / Bytes = 40,000 / 20,480 ≈ **1.95 Ops/Byte**

    3. **Calculate Ridge Point:** Ridge Point = Peak Compute / Memory BW = 336 × 10^6 / 1.2 × 10^9 = **0.28
    Ops/Byte**

    4. **Compare:** AI (1.95) > Ridge Point (0.28) → The layer is **compute-bound**.

    5. **Attainable Performance:** Since it is compute-bound, performance is capped at 336 MFLOPS regardless
    of how much data is accessed. Optimization should focus on reducing FLOPs (e.g., pruning, quantization,
    depthwise separable convolutions) rather than improving memory access patterns.'
  common_mistake: Engineers often guess based on intuition ('microcontrollers are slow, so it must be
    compute-bound') without performing the calculation. Another common mistake is inverting the Arithmetic
    Intensity formula (calculating Bytes/FLOP instead of FLOPs/Byte), or failing to compare the workload's
    AI to the hardware's ridge point, leading to an incorrect conclusion.
  napkin_math: '1. **Convert Data to Bytes:** 20 KB * 1024 bytes/KB = 20,480 bytes

    2. **Arithmetic Intensity:** 40,000 FLOPs / 20,480 bytes ≈ **1.95 Ops/Byte**

    3. **Ridge Point:** 336 MFLOPS / 1.2 GB/s = **0.28 Ops/Byte**

    4. **Verdict:** 1.95 >> 0.28 → **compute-bound**

    5. **Inference time estimate:** 40,000 / 336 × 10^6 ≈ 0.12 ms (compute-limited, not memory-limited)'
