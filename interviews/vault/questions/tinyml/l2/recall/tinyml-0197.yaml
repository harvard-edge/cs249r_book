id: tinyml-0197
title: 'The Tensor Arena Squeeze: Tensor Arena Planning'
topic: tensor-arena-planning
status: draft
provenance: imported
scenario: 'You''re deploying a keyword spotting model to a Cortex-M4 microcontroller with 256KB of SRAM.
  The TensorFlow Lite for Microcontrollers interpreter needs a pre-allocated ''tensor arena'' for activations.
  Your model has the following structure and intermediate tensor sizes:'
details:
  realistic_solution: The tensor arena is a single, contiguous block of memory allocated upfront from
    which TensorFlow Lite for Microcontrollers carves out space for all input, output, and intermediate
    activation tensors. It uses a memory manager to reuse space from tensors that are no longer live in
    the computation graph.
  common_mistake: The most common mistake is to sum the sizes of *all* tensors. This ignores the fact
    that the memory interpreter reuses memory. Once a tensor is no longer needed for a subsequent calculation
    (e.g., the input tensor after the first convolution), its memory can be reclaimed for a future tensor.
    The peak usage is what matters, not the total.
  napkin_math: Tensor arena must hold all live tensors at each op. E.g., Conv1 in=2KB out=8KB (live=10KB).
    Conv2 in=8KB out=16KB (live=24KB). Conv3 in=16KB out=4KB (live=20KB). Peak = 24KB at Conv2. Arena
    size = 24KB. Must fit within 256KB along with model weights, stack, and firmware. If model weights
    = 200KB, only 56KB left for arena.
