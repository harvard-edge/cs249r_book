schema_version: 1
id: tinyml-0352
title: The Cortex-M4 Ridge Point
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: A common microcontroller used in TinyML applications, the Cortex-M4, has a peak theoretical
  compute performance of roughly 336 MFLOPS and its on-chip SRAM provides about 1.2 GB/s of memory bandwidth.
  In the context of the Roofline model, please interpret what a 'ridge point' signifies and calculate
  it for this device.
details:
  realistic_solution: The ridge point represents the minimum Arithmetic Intensity (the ratio of operations
    per byte of data moved) that an algorithm must have to be limited by the chip's compute capability
    rather than its memory bandwidth. It is the 'corner' of the Roofline plot.
  common_mistake: Engineers often misremember the Roofline formula, swapping the numerator and denominator
    (Bandwidth / Compute). A more subtle mistake is having an intuition calibrated for datacenter GPUs,
    where ridge points are 100-1000x higher. They fail to appreciate that microcontrollers are fundamentally
    memory-bandwidth-limited, and a low ridge point quantitatively proves this.
  napkin_math: 1. **Identify Peak Compute:** 336 MFLOPS = 336,000,000 FLOPS
