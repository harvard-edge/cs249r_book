id: tinyml-0379
title: The Microcontroller Ridge Point (tinyml-0379)
topic: mcu-compute-constraints
status: draft
provenance: imported
scenario: 'You''re profiling a keyword spotting model on a Cortex-M4 microcontroller. To understand its
  performance limits, you need to calculate the chip''s ''Ridge Point.'' This value represents the minimum
  Arithmetic Intensity (Ops/Byte) a model needs to have to be limited by the processor''s compute speed
  rather than its memory speed. Given the specs from the playbook (Cortex-M4: ~336 MFLOPS, ~1.2 GB/s SRAM
  bandwidth), what is the theoretical Ridge Point?'
details:
  realistic_solution: The Ridge Point is the critical value of Arithmetic Intensity where the performance
    ceiling transitions from being memory-bound to compute-bound. It is calculated by dividing the peak
    compute performance by the peak memory bandwidth. For the Cortex-M4, this means dividing its peak
    MFLOPS by its SRAM bandwidth, ensuring units are consistent.
  common_mistake: The most common mistakes are inverting the division (Bandwidth / Compute) or making
    unit conversion errors between MFLOPS (Mega-FLOPS) and raw FLOPS. This leads to an answer that is
    orders of magnitude incorrect, suggesting a misunderstanding of what Arithmetic Intensity represents—the
    ratio of computation to memory access.
  napkin_math: Peak Compute = 336 MFLOPS = 336,000,000 Ops/s
