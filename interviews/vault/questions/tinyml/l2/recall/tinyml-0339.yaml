title: 'The Depthwise Memory Dividend: Attention Scaling & Variants'
topic: attention-scaling
status: draft
provenance: imported
scenario: You are optimizing a keyword spotting model for a Cortex-M4 microcontroller, which has 256KB
  of SRAM. Your profiler shows a standard 3x3 convolutional layer is a memory hotspot. The layer takes
  64 input channels and produces 128 output channels. To save memory, you are considering replacing it
  with a 3x3 depthwise separable convolution. Assuming INT8 quantization, calculate and compare the parameter
  memory cost for just this single layer.
details:
  realistic_solution: 'A depthwise separable convolution splits a standard convolution into two much cheaper
    steps: a 3x3 depthwise convolution that processes each input channel independently, followed by a
    1x1 pointwise convolution that combines the outputs. For INT8 deployment (1 byte per parameter), the
    math is:'
  common_mistake: The most common mistake is to only calculate the parameters for the first (depthwise)
    step and forget to include the second (1x1 pointwise) step. This leads to a wild overestimation of
    the memory savings, suggesting a >100x reduction when the reality is closer to 8-9x. Another error
    is using the wrong data type; TinyML deployments are almost always INT8, so calculating with FP32
    (4 bytes) gives a 4x larger result and might lead to incorrect feasibility conclusions.
