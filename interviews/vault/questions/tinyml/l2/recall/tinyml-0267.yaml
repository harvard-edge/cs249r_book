id: tinyml-0267
title: The Depthwise Separable Memory Diet
topic: cnn-efficient-design
status: draft
provenance: imported
scenario: You are optimizing a keyword spotting model for a Cortex-M4 microcontroller, which has a very
  limited memory budget (e.g., 256KB of SRAM). A key layer in your network is a standard 2D convolution
  with 64 input channels, 128 output channels, and a 3x3 kernel. To reduce the model's memory footprint,
  you plan to replace it with a depthwise separable convolution. Calculate the total number of parameters
  for the new depthwise separable layer.
details:
  realistic_solution: 'A depthwise separable convolution splits a standard convolution into two much smaller
    operations:

    1.  **Depthwise Convolution:** Applies a single 3x3 filter to each of the 64 input channels independently.
    The number of parameters is `(3 * 3 * 64) = 576`.

    2.  **Pointwise Convolution:** A standard 1x1 convolution that projects the 64 channels from the depthwise
    step into the desired 128 output channels. The number of parameters is `(1 * 1 * 64 * 128) = 8,192`.'
  common_mistake: Engineers often forget that a depthwise separable convolution is a two-part operation.
    A common error is to only calculate the parameters for the initial 'depthwise' step and completely
    forget the subsequent 'pointwise' (1x1 convolution) step. This leads to a massive underestimation
    of the layer's actual size.
  napkin_math: Standard Conv Params = 3 * 3 * 64_in * 128_out = 73,728
