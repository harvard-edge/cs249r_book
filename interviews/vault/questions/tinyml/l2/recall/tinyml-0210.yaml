id: tinyml-0210
title: DMA vs. CPU for Sensor Data
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You're building a 'wake-word' device using a Cortex-M4 MCU running at 168 MHz. A microphone
  provides a continuous stream of audio data that needs to be moved into SRAM for processing. For a 1-second
  buffer of 16-bit audio sampled at 16kHz, compare the CPU cost of a direct `memcpy` versus a DMA transfer.
  Assume the `memcpy` takes roughly 4 clock cycles per byte transferred.
details:
  realistic_solution: A DMA (Direct Memory Access) controller is a dedicated piece of hardware that can
    move data between peripherals and memory without involving the CPU. Once configured, the transfer
    is 'free' from the CPU's perspective, allowing the CPU to perform other tasks (like inference) in
    parallel. A CPU-based `memcpy` blocks the processor for the entire duration of the copy, wasting valuable
    cycles.
  common_mistake: Underestimating the cost of the CPU copy. Engineers often think 'it's just a memcpy,
    it's fast'. They fail to translate that into clock cycles and realize how much of the CPU's budget
    is consumed, starving the ML inference task. Another mistake is assuming DMA is complex and not worth
    the effort for 'small' data transfers.
  napkin_math: '1. Calculate total data size: 16,000 samples/sec * 2 bytes/sample * 1 sec = 32,000 bytes
    (32 KB).'
