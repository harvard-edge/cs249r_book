title: The SRAM Tensor Arena Puzzle
topic: tensor-arena-planning
status: published
provenance: imported
scenario: 'You''re deploying a keyword spotting model on a Cortex-M4 microcontroller. TensorFlow Lite
  for Microcontrollers requires a single contiguous block of memory called the ''Tensor Arena'' for all
  activations and I/O tensors. Your model has the following execution plan:'
details:
  realistic_solution: 'The Tensor Arena''s size is determined by the *peak concurrent memory usage* at
    any point during inference. We must analyze the memory footprint at each step:'
  common_mistake: A common mistake is to simply sum the sizes of all tensors (12+30+10+2 = 54 KB), failing
    to account for the fact that not all tensors are live simultaneously. Another error is to only allocate
    for the largest single tensor (30 KB), which ignores the concurrent memory needs of inputs and outputs
    during an operation.
  napkin_math: 'Step1: input 12KB. Step2: Conv1 reads 12KB input, writes 20KB output (live: 12+20=32KB).
    Step3: Conv2 reads 20KB, writes 16KB (live: 20+16=36KB). Step4: Dense reads 16KB, writes 4KB (live:
    16+4=20KB). Peak = max(12, 32, 36, 20) = 36KB. Arena must be >= 36KB. If scenario layers differ, apply
    same max-concurrent-tensors logic.'
