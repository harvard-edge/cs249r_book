id: tinyml-0263
title: The MCU Ridge Point
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You're evaluating a Cortex-M4 microcontroller for a real-time audio keyword-spotting task. The
  datasheet specifies a peak compute performance of **336 MFLOPS** and a memory bandwidth to its on-chip
  SRAM of **1.2 GB/s**. To understand what kinds of workloads this chip is suited for, you need to calculate
  the 'ridge point' of its theoretical roofline model. What is the approximate ridge point for this MCU?
details:
  realistic_solution: The ridge point is the minimum arithmetic intensity (Ops/Byte) a workload must have
    to be compute-bound rather than memory-bound. It's calculated by dividing peak performance by memory
    bandwidth, ensuring units are consistent. For the Cortex-M4, with its very fast on-chip SRAM relative
    to its modest compute, the ridge point is extremely low. This indicates that almost any non-trivial
    ML kernel will be limited by compute, not by the speed of its memory access.
  common_mistake: The most common mistake is a unit mismatch, failing to reconcile that the compute is
    given in **Mega**-FLOPS (10^6) while the bandwidth is in **Giga**-Bytes/second (10^9). This leads
    to an answer that is off by a factor of 1,000. Another error is inverting the formula, calculating
    Bytes/Op instead of Ops/Byte, which fundamentally misunderstands what arithmetic intensity represents.
  napkin_math: Peak Performance = 336 MFLOPS = 336,000,000 Ops/sec
