schema_version: 1
id: tinyml-0169
title: The DMA Dividend
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: Your team is building a voice-activated device on a Cortex-M4 MCU (168 MHz). You need to capture
  1 second of audio data from a microphone into a 32 KB SRAM buffer. The audio is 16-bit at a 16 kHz sample
  rate. Assume a PIO transfer requires 10 CPU cycles per sample.
details:
  realistic_solution: The solution requires calculating the total number of samples and then multiplying
    by the per-sample CPU cost for PIO. The DMA cost is simply its fixed setup cost, as the CPU is free
    during the actual transfer.
  common_mistake: Confusing bandwidth with CPU overhead. Engineers might try to calculate a transfer time
    based on bus width and clock speed, ignoring that the CPU is the bottleneck in PIO. Another mistake
    is forgetting to calculate the total number of samples and just looking at the 32 KB buffer size.
  napkin_math: 'Buffer size: 16,000 samples/sec * 2 bytes/sample = 32KB, fitting inside the Cortex-M4''s
    256KB SRAM. PIO cost: 16,000 samples * 10 cycles/sample = 160,000 CPU cycles. On a 168MHz Cortex-M4,
    this takes 160,000 / 168,000,000 = 0.95 ms of active CPU time per second. Using DMA would drop this
    to ~200 setup cycles, saving ~159,800 cycles/sec.'
