id: tinyml-0220
title: The Hidden Cost of CPU `memcpy`
topic: dma-data-movement
status: published
provenance: imported
scenario: You are designing a real-time audio classification device on a Cortex-M4 running at 168 MHz.
  Every 20ms, a 4 KB frame of audio data arrives in a peripheral hardware buffer. To process it, this
  data must be copied into the model's input tensor located in SRAM. You can either use a CPU-driven `memcpy`
  or set up a DMA (Direct Memory Access) transfer.
details:
  realistic_solution: The correct answer involves calculating the CPU time for the copy and explaining
    the opportunity cost.
  common_mistake: 'Engineers often calculate the `memcpy` time, see that it''s very short (a few microseconds),
    and conclude it''s negligible. This misses the crucial point: while the CPU is executing `memcpy`,
    it is 100% occupied and cannot perform any other task, such as running the neural network inference.
    The true cost is the introduction of CPU stall into a tight latency budget.'
  napkin_math: '4KB = 4096 bytes. CPU memcpy at 168MHz, ~4 cycles/word (32-bit): 4096B / 4B * 4 cycles
    = 4096 cycles. Time = 4096/168e6 = 24.4us. DMA: setup ~2us, transfer runs in background. CPU freed
    for 24.4us of useful work. In 20ms budget, 24.4us = 0.12% -- small but DMA enables overlap with preprocessing.
    Critical for tight real-time loops.'
