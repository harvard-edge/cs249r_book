schema_version: 1
id: tinyml-0177
title: The Watchdog's Leash
topic: fault-tolerance-checkpointing
status: draft
provenance: imported
scenario: You're designing a fault-tolerant TinyML sensor that runs on a battery. To prevent software
  freezes, you've implemented a hardware watchdog timer with a 250ms timeout. Your application's main
  loop performs an inference (`t_active`) and then enters a low-power sleep state for a fixed duration
  (`t_sleep = 200ms`). The device consumes 50mW during the active inference phase. The watchdog timer
  is reset at the beginning of each loop. If the total loop time exceeds the timeout, the device resets.
details:
  realistic_solution: The core constraint is that the sum of the active time and sleep time must be less
    than the watchdog timeout. This gives us the maximum permissible time for the active inference phase.
  common_mistake: A common mistake is to calculate the energy consumption based on the full watchdog timeout
    period (250ms), forgetting that other parts of the application loop—like the fixed sleep state—consume
    a significant portion of the time budget. This overlooks the fundamental constraint that the *entire*
    loop must complete within the watchdog's window.
  napkin_math: 1. **Max Inference Time** = `Watchdog Timeout` - `Sleep Time` = 250ms - 200ms = 50ms. 2.
    **Energy Consumption** = 50ms * 50mW = 2.5 mJ.
