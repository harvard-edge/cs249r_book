id: tinyml-0767
title: The Pruning Sparsity Threshold
topic: graph-compilation
status: published
provenance: imported
scenario: A 200 KB dense model runs inference in 50ms on a Cortex-M4 at 100 MHz. After unstructured pruning
  at 80% sparsity, the model weights drop to 40 KB. However, the sparse inference still takes 48ms because
  the Cortex-M4 has no hardware sparse-matrix support. Why doesn't the 5× weight reduction translate to
  a 5× speedup, and what sparsity pattern would help?
details:
  realistic_solution: 'Unstructured pruning saves memory (Flash) but not compute on MCUs because: (1)
    the dense matrix multiply loop still iterates over all positions, (2) branch mispredictions from irregular
    zero patterns add overhead, (3) no hardware sparse tensor support. Structured pruning (e.g., removing
    entire filters or channels) reduces both memory AND compute proportionally because it eliminates entire
    rows/columns from the matrix multiply. At 80% structured sparsity (removing 80% of channels), the
    layer would run in ~10ms — a true 5× speedup.'
  common_mistake: Equating smaller model file with faster execution. Unstructured sparsity (random zeros)
    still requires the same number of loop iterations on CPUs without sparse hardware — each weight is
    checked and skipped, but the loop and index overhead remains.
  napkin_math: 'Dense: 200 KB, 50ms. Unstructured 80% sparse: 40 KB Flash, ~48ms runtime (only 4% speedup
    from fewer cache misses). Structured 80% sparse: 40 KB Flash, ~10ms runtime (5× speedup). Difference:
    structured eliminates entire GEMM dimensions. Dense MACs ∝ C_in × C_out. Remove 80% channels → 0.2
    × C_in × 0.2 × C_out = 0.04× original MACs.'
