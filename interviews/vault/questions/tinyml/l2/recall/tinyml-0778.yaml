schema_version: 1
id: tinyml-0778
title: The Flash Write Endurance Limit
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: A TinyML device logs 128-byte inference summaries to internal Flash every 10 seconds. The Flash
  sector (4 KB) supports 10,000 erase cycles. The device writes sequentially across the sector and erases
  when full. How many days until the sector wears out, and how would wear leveling across 8 sectors extend
  the lifetime?
details:
  realistic_solution: 'Writes per sector fill: 4,096 / 128 = 32 writes. Time per fill: 32 × 10s = 320s
    ≈ 5.33 min. Erases per day: 86,400 / 320 = 270 erases/day. Lifetime (1 sector): 10,000 / 270 = 37
    days. With wear leveling across 8 sectors: 37 × 8 = 296 days ≈ 9.9 months. To reach 3-year lifetime:
    need 10,000 / (270/N) ≥ 1,095 days → N ≥ 30 sectors = 120 KB of Flash dedicated to logging.'
  common_mistake: Counting write cycles instead of erase cycles. Flash endurance is limited by erase cycles,
    not writes. A sector must be erased before it can be rewritten, and each erase uses one endurance
    cycle.
  napkin_math: 'Sector capacity: 4096 / 128 = 32 records. Fill time: 32 × 10s = 320s. Erases/day: 86,400/320
    = 270. Single sector life: 10,000/270 = 37 days. 8-sector wear leveling: 37 × 8 = 296 days. 3-year
    target: need 1095/37 = 30 sectors (120 KB).'
