id: tinyml-0331
title: The Depthwise Separable Memory Diet (tinyml-0331)
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You're building a keyword-spotting model for a Cortex-M4 microcontroller with 256KB of SRAM.
  A standard 2D convolutional layer in your model has an input feature map of 16x16 with 32 channels,
  and it produces an output of 64 channels using a 3x3 kernel. All parameters are stored in INT8 precision.
details:
  realistic_solution: The standard convolutional layer performs a single operation that jointly processes
    spatial and cross-channel correlations. Its parameter cost is the product of the kernel dimensions,
    input channels, and output channels.
  common_mistake: The most common mistake is to confuse the parameter memory cost with the activation
    memory cost. Another error is to calculate the cost of the replacement depthwise separable layer instead
    of the original layer as requested. Finally, simple arithmetic errors or forgetting the bytes-per-parameter
    (1 for INT8) are also frequent.
  napkin_math: "The calculation for the parameter count of a standard convolutional layer is `kernel_height\
    \ × kernel_width × input_channels × output_channels`.\n1. **Standard Conv Params:** 3 × 3 × 32 × 64\
    \ = **18,432** parameters**\n2. **Memory (INT8):** 18,432 × 1 byte = **18 KB**\n3. **For comparison\
    \ — Depthwise Separable:**\n   - Depthwise: 3 × 3 × 32 = 288\n   - Pointwise: 1 × 1 × 32 × 64 = 2,048\n\
    \   - Total: 288 + 2,048 = **2,336 parameters** = **2.3 KB**\n4. **Reduction Factor:** 18,432 / 2,336\
    \ ≈ **7.9×** fewer parameters"
