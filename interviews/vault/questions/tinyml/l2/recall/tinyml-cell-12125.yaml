title: 'Model Size Estimation: Realize Parameter Count and Memory for MCU Anomaly Detector'
topic: model-size-estimation
status: published
provenance: imported
scenario: 'Size the complete memory layout for a vibration anomaly detector on Cortex-M4 (168MHz, 256KB
  SRAM, 512KB Flash). Model: 3 Conv1D layers (filters: 16, 32, 64; kernel: 8, 4, 2; input: 256 samples
  INT16) + Global Average Pooling + FC-2. Count parameters exactly and compute INT8 Flash and SRAM requirements.'
details:
  realistic_solution: 'Bias count = sum of neurons per layer: 16+32+64+2 = 114 biases × 4B = 456 bytes.'
  common_mistake: Forgetting that Conv1D parameters depend on (filters × previous_filters × kernel_size)
    + biases, and that INT16 input requires 512 bytes input buffer vs. 256 bytes for INT8.
  napkin_math: 'Neural net biases: layer1=16 neurons, layer2=32, layer3=64, output=2. Total bias params:
    16+32+64+2 = 114 biases × 4B (float32) = 456B (not 584B which would require 146 bias terms).'
