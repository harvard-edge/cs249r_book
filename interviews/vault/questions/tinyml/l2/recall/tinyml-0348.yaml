title: The Flash Memory Bottleneck
topic: cnn-efficient-design
status: published
provenance: imported
scenario: Your team is building a keyword spotting model for a Cortex-M4 microcontroller that has 1MB
  of Flash. A specific 2D convolutional layer in your network is taking up too much space. It takes an
  input tensor with 64 channels and produces an output with 128 channels, using a 3x3 kernel.
details:
  realistic_solution: 'A standard convolution performs spatial and cross-channel convolution in one step.
    A depthwise separable convolution splits this into two steps: a depthwise convolution that operates
    on each input channel independently, followed by a 1x1 pointwise convolution that combines the outputs.'
  common_mistake: Engineers often forget that a depthwise separable convolution is a two-step process
    (depthwise then pointwise) and either calculate only the depthwise portion or miscalculate the pointwise
    part. This leads to a massive overestimation of the savings.
  napkin_math: 1.  **Standard Convolution Parameters:**
