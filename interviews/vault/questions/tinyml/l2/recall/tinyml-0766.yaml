id: tinyml-0766
title: The Depthwise Separable Ops Savings
topic: graph-compilation
status: published
provenance: imported
scenario: A standard convolution layer processes a 32×32 input with 64 input channels, 128 output channels,
  and a 3×3 kernel. A MobileNet-style depthwise separable convolution achieves the same channel transformation.
  How many multiply-accumulate operations does each approach require, and what is the reduction factor?
details:
  realistic_solution: 'Standard conv: H × W × K² × C_in × C_out = 32 × 32 × 9 × 64 × 128 ≈ 75.5M MACs.
    Depthwise: H × W × K² × C_in = 32 × 32 × 9 × 64 = 576 ≈ 0.59M. Pointwise: H × W × C_in × C_out = 32
    × 32 × 64 × 128 = 8,192 ≈ 8.39M. Total separable: 0.59M + 8.39M = 8.98M. Reduction: 75.5M / 8.98M
    = 8.4×.'
  common_mistake: 'Forgetting that a depthwise separable conv is TWO operations: a depthwise conv (one
    filter per input channel) plus a 1×1 pointwise conv. Candidates who only compute the depthwise part
    underestimate the cost.'
  napkin_math: 'Standard: 32² × 9 × 64 × 128 ≈ 75.5M MACs. Depthwise: 32² × 9 × 64 ≈ 0.59M. Pointwise:
    32² × 64 × 128 ≈ 8.39M. Total DS: 8.98M. Reduction = 75.5/8.98 = 8.4×. Theoretical: 1/C_out + 1/K²
    = 1/128 + 1/9 ≈ 0.119 → 8.4× reduction.'
