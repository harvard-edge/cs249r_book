schema_version: 1
id: tinyml-0291
title: The Depthwise Memory Dividend
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You are designing a visual wake-word model for a Cortex-M4 microcontroller, which has a tight
  memory budget. The first layer of your CNN must process a `32x32x3` image patch using `3x3` kernels
  to produce `16` output channels. To save precious memory, you opt for a depthwise separable convolution
  instead of a standard 2D convolution. Calculate the total number of weight parameters required for this
  single depthwise separable layer, assuming INT8 precision.
details:
  realistic_solution: 'Depthwise: 3x3 kernel per input channel = 3*3*3 = 27 weight params. Pointwise:
    1x1 conv from 3 to 16 channels = 1*1*3*16 = 48 weight params. Total weights: 27 + 48 = 75 parameters
    = 75 bytes at INT8. Compare standard conv: 3*3*3*16 = 432 weight params = 432 bytes. Depthwise separable
    uses 75/432 = 17.4% of the parameters — saving 357 bytes. On a 32KB SRAM Cortex-M4, this 5.8x reduction
    compounds across layers, often making the difference between fitting in memory or not.'
  common_mistake: The most common mistake is to forget one of the two components of a depthwise separable
    convolution. Engineers often calculate the parameters for the initial depthwise pass but forget to
    include the subsequent 1x1 pointwise convolution that combines the channels. Another error is to calculate
    a standard convolution by mistake.
  napkin_math: 1.  **Depthwise Parameters:** (kernel_h × kernel_w × in_channels) = (3 × 3 × 3) = 27 parameters.
