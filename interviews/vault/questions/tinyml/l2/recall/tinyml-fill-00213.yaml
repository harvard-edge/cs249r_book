id: tinyml-fill-00213
title: 'ESP32-S3 Memory Hierarchy: Capacity, Bandwidth, Latency Tradeoffs'
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: Consider an ESP32-S3 microcontroller, equipped with a 240 MHz dual-core processor, 512 KB internal
  SRAM, and 8 MB external PSRAM. Enumerate the primary memory tiers available on or accessible by this
  device, and for each tier, state its typical capacity, bandwidth characteristics, and access latency
  relative to the CPU.
details:
  realistic_solution: On the ESP32-S3, the memory hierarchy consists of CPU registers (fastest, smallest),
    internal 512 KB SRAM (fast, critical for performance), external 8 MB PSRAM (slower than internal SRAM,
    larger capacity), and external flash memory (slowest, largest capacity, persistent). For optimal performance,
    frequently accessed data structures, critical code paths, and small ML model layers should reside
    in the internal SRAM. Larger model weights or less frequently used data can be placed in PSRAM, while
    the main model binary and application code are typically stored in flash. Utilizing DMA (Direct Memory
    Access) can help transfer data between PSRAM and internal SRAM efficiently, overlapping data movement
    with computation.
  common_mistake: A common mistake is to overlook the significant performance disparity between internal
    SRAM, external PSRAM, and flash memory. Developers often place frequently accessed data or critical
    code in external PSRAM or even flash, assuming uniform memory access times, leading to severe performance
    bottlenecks and missed real-time deadlines, especially for TinyML applications.
  napkin_math: CPU registers offer single-cycle access. Internal SRAM typically provides ~1-2 cycle access
    at 240 MHz CPU clock speed. External PSRAM, accessed via a dedicated bus, might incur latencies of
    10-30+ CPU cycles per word access, resulting in significantly lower effective bandwidth compared to
    internal SRAM. For example, if internal SRAM bandwidth is ~240 MHz * 32 bits/cycle = 7.68 Gbps (960
    MB/s), PSRAM might realistically deliver a fraction of this, perhaps 100-200 Mbps for random access,
    or higher for burst reads. Storing a 100 KB tensor in PSRAM instead of internal SRAM could increase
    its access time by 10-20x or more, severely impacting inference time for iterative operations.
