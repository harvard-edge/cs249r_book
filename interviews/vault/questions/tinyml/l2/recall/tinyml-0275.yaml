schema_version: 1
id: tinyml-0275
title: The Depthwise Separable Memory Dividend
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You are designing a visual wake-word model for a Cortex-M7 microcontroller, which has a very
  limited Flash memory budget for weights. A key layer in your CNN has an input with 16 channels and must
  produce an output with 32 channels using a 3x3 kernel.
details:
  realistic_solution: 'A depthwise separable convolution splits a standard convolution into two smaller
    operations: a depthwise convolution that processes each input channel independently, followed by a
    pointwise (1x1) convolution that combines the outputs.


    1. **Standard Convolution:** Applies 32 filters, each of size 3×3×16. Total parameters = 3 × 3 × 16
    × 32 = **4,608**.

    2. **Depthwise Convolution:** Applies one 3×3 filter per input channel. Parameters = 3 × 3 × 16 =
    **144**.

    3. **Pointwise Convolution:** A 1×1 convolution mapping 16 channels to 32 outputs. Parameters = 1
    × 1 × 16 × 32 = **512**.

    4. **Total Depthwise Separable:** 144 + 512 = **656** parameters.

    5. **Reduction Factor:** 4,608 / 656 ≈ **7.0×** fewer parameters.


    This ~7× reduction is critical for fitting models within the limited Flash memory of microcontrollers.'
  common_mistake: The most common mistake is to only calculate the parameters for the first part (the
    3x3 depthwise pass) and forget to include the second part (the 1x1 pointwise convolution). This leads
    to a wild overestimation of the memory savings. Another error is relying on a fixed 'rule of thumb'
    (e.g., 'it's always 9x') which isn't true, as the saving is dependent on the number of channels.
  napkin_math: 'Standard Conv Params = (3 * 3 * 16) * 32 = 4,608

    Depthwise Params = 3 * 3 * 16 = 144

    Pointwise Params = 1 * 1 * 16 * 32 = 512

    Depthwise Separable Total = 144 + 512 = **656**

    Reduction Factor = 4,608 / 656 ≈ **7.0×**'
