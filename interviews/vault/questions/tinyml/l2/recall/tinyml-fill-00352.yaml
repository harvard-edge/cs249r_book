schema_version: 1
id: tinyml-fill-00352
title: Latency Decomposition for Keyword Spotting on ARM Cortex-M4
topic: latency-decomposition
status: published
provenance: imported
scenario: You are tasked with deploying a real-time keyword spotting model on an ARM Cortex-M4 STM32F4
  microcontroller (168 MHz clock, 256 KB SRAM, no FPU). The strict end-to-end latency requirement from
  audio input to detected keyword output is 100ms. Describe the critical components of this end-to-end
  latency, including Time-To-First-Token (TTFT), Time-Per-Output-Token (TPOT), data acquisition/network
  transfer, preprocessing, and postprocessing. Explain how you would systematically decompose, measure,
  and analyze each component on this resource-constrained embedded platform to meet the latency target.
details:
  realistic_solution: "To accurately decompose and measure latency on the STM32F4, one would: \n1.  **Instrument\
    \ with Hardware Timers:** Utilize the microcontroller's internal timers (e.g., DWT_CYCCNT, TIMx peripherals)\
    \ to precisely timestamp the start and end of each processing stage. \n2.  **Model Inference (TTFT/TPOT):**\
    \ Profile the execution time of the quantized model's main loop and individual layers. Analyze memory\
    \ access patterns and data caching (or lack thereof) effects. \n3.  **Data Acquisition/Network:**\
    \ Measure the time taken for analog-to-digital conversion (ADC) or digital audio interface (I2S) transfers\
    \ and any subsequent memory buffering. If communicating with another chip, profile SPI/I2C/UART transfer\
    \ times. \n4.  **Preprocessing:** Profile audio feature extraction (e.g., MFCCs) implemented in fixed-point\
    \ arithmetic. Optimize buffer management to reduce memory copy overheads. \n5.  **Postprocessing:**\
    \ Measure the time for decision logic, filtering, and any output actions (e.g., LED toggling, sending\
    \ command over UART). \n6.  **Tooling:** Use a hardware debugger (e.g., J-Link, ST-Link with STM32CubeIDE\
    \ or Keil µVision) to set breakpoints and observe cycle counts, analyze execution trace, and monitor\
    \ stack/heap usage. For lack of FPU, ensure all math is explicitly fixed-point and avoid implicit\
    \ floating-point conversions."
  common_mistake: A common mistake is to only focus on the model inference time (TTFT/TPOT) and neglect
    other significant overheads like data acquisition from ADC/MEMS microphones, memory copy operations,
    OS/driver context switching, or the computational cost of custom fixed-point preprocessing/postprocessing
    routines due to the lack of an FPU. Developers might also assume high-level library functions are
    efficient without profiling their actual execution cycles on the target hardware.
  napkin_math: "Given a 168 MHz clock, each cycle takes approximately 5.95 ns. \n\n*   **Target Latency:**\
    \ 100ms (100,000,000 ns) \n*   **Total Cycles Budget:** 100ms / 5.95 ns/cycle ≈ 16.8 million cycles.\
    \ \n\nConsider a simple keyword spotting model that requires 5 million multiply-accumulate (MAC) operations.\
    \ If, due to the lack of FPU and fixed-point implementation, each MAC takes an average of 4-8 cycles\
    \ (including data fetch/store):\n*   **Model Inference Cycles:** 5M MACs * 6 cycles/MAC = 30 million\
    \ cycles. \n*   **Inference Time:** 30 million cycles * 5.95 ns/cycle ≈ 178.5 ms.\n\nThis immediate\
    \ calculation shows that even just the inference might exceed the 100ms budget, highlighting the extreme\
    \ need for aggressive quantization, model compression, and highly optimized fixed-point kernel implementations\
    \ for this specific hardware, or a simpler model architecture. This estimation doesn't even include\
    \ preprocessing, postprocessing, or data acquisition."
