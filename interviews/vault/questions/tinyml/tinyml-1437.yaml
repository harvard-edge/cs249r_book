title: 'TinyML Graceful Degradation for Predictive Maintenance on Cortex-M7/Ethos-U55'
scenario: 'A predictive maintenance system operates on a Cortex-M7 + Ethos-U55 microcontroller (480 MHz, 512 KB SRAM, 200 MAC/cycle NPU). The primary model''s inference latency randomly exceeds a 50% increase over its nominal 10ms, and accuracy drops from 95% to below 80%.'
question: 'How should you diagnose this performance degradation and design a graceful degradation ladder to maintain fail-operational status?'
details:
  realistic_solution: '1.  **Real-time Health Monitoring:** Implement lightweight, continuous monitoring of key metrics: inference latency, NPU utilization, CPU load, available SRAM, and model confidence scores. Use hardware performance counters available on Cortex-M7/Ethos-U55. 2.  **Diagnostic Heuristics:** Develop simple, deterministic rules to analyze monitoring data. For instance, high NPU utilization with high latency might indicate thermal throttling or contention, while a sudden drop in confidence score without increased latency could point to sensor drift or data corruption. 3.  **Degradation Ladder:**
    *   **Level 1 (Early Warning):** If latency exceeds 15ms or accuracy drops below 90%, log a warning and initiate a deeper, but still lightweight, diagnostic sweep (e.g., check memory integrity, NPU registers). Continue using the primary model.
    *   **Level 2 (Fallback Model):** If diagnostics indicate a persistent issue (e.g., NPU error code, sustained high temperature) or if the primary model''s accuracy falls below 85% for a defined period, switch to a pre-loaded, simpler fallback model (e.g., an SVM) that uses less SRAM (e.g., 100KB) and has lower inference latency (e.g., 4ms) but slightly reduced accuracy (e.g., 88%). This maintains fail-operational status with reduced QoS.
    *   **Level 3 (QoS Shedding):** If the fallback model also struggles, reduce the data sampling rate (e.g., from 100 samples/sec to 20 samples/sec) to conserve resources, prioritizing critical anomaly detection over continuous monitoring. Trigger an alert for manual intervention.
    *   **Level 4 (Fail-Safe):** In the event of catastrophic NPU failure or critical SRAM corruption, switch to a very basic rule-based anomaly detector or only report a ''system non-operational'' status, ensuring safety by avoiding erroneous ML predictions.'
  common_mistake: |
    **The Pitfall:** Allowing catastrophic failure or implementing an overly complex diagnostic system.
    **The Rationale:** Candidates either ignore degradation (assuming the primary model always works) or build heavy software monitors that steal too many cycles from the MCU.
    **The Consequence:** This leads to silent missed anomalies or exacerbates the problem by causing the diagnostic code itself to induce latency spikes on the constrained device.
  napkin_math: |
    **Assumptions & Constraints:**
    - Primary Model: 300 KB SRAM, 10 ms inference time.
    - Fallback Model: 100 KB SRAM, 4 ms inference time.
    - CPU: 480 MHz.

    **Calculations:**
    - SRAM Freed on Degradation: 300 KB - 100 KB = 200 KB freed for diagnostics and logging.
    - Diagnostic CPU Budget: 20% of the CPU dedicated to monitoring during the 10 ms primary inference window.
    - Total Cycles for Diagnostics: 480,000,000 cycles/sec * 0.010 sec * 0.20 = 960,000 CPU cycles.

    **Conclusion & Interpretation:**
    - **Result: 960,000 CPU cycles (Compute-Bound)**. Sufficient headroom for graceful degradation ladder without impacting real-time constraints.
