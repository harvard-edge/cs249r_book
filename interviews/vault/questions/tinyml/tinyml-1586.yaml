title: Battery Swap State Survival
scenario: An environmental logger needs to resume reading sensors exactly where it left off after a battery replacement.
question: Which memory type (SRAM or Flash) should be used to store the checkpointed state to survive the power loss?
visual:
  kind: svg
  path: tinyml-1586.svg
  alt: Comparison of SRAM losing data and Flash keeping data during a 0V event.
  caption: Data Retention at 0V
details:
  realistic_solution: The candidate correctly identifies that Flash memory (or EEPROM) is non-volatile and will survive the 0V state during battery swap, whereas SRAM is volatile and will wipe entirely.
  common_mistake: |
    **The Pitfall:** Stating SRAM can be used for the checkpoint.
    **The Rationale:** Candidates assume a low-power mode maintains SRAM state, ignoring that replacing a physical battery means a total 0V loss.
    **The Consequence:** All checkpointed state is wiped upon battery swap, causing the logger to lose critical mission data.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Battery replacement causes 0V power loss.
    2. **Calculations:**
       - SRAM data retention at 0V: 0 bytes retained.
    3. **Conclusion & Interpretation:**
       - **Result: Checkpoint must be stored in Non-Volatile Flash.**
