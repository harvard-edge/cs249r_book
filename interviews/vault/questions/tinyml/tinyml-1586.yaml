title: Battery Swap State Survival
scenario: A Cortex-M4 based environmental logger needs to resume reading sensors exactly
  where it left off after a battery replacement.
question: Identify which memory type (SRAM or Flash) should be used to store the checkpointed
  state to survive the power loss.
visual:
  kind: svg
  path: tinyml-1586.svg
  alt: Comparison of SRAM losing data and Flash keeping data during a 0V event.
  caption: Data Retention at 0V
details:
  realistic_solution: The candidate correctly identifies that Flash memory (or EEPROM)
    is non-volatile and will survive the 0V state during battery swap, whereas SRAM
    is volatile and will wipe entirely.
  common_mistake: Stating SRAM, assuming a low-power mode maintains it, ignoring that
    replacing a battery means total 0V power loss.
  napkin_math: SRAM at 0V = 0 bytes retained
