title: Energy-Optimal Architecture for Corstone-300
scenario: You are tasked with designing the neural network architecture for an always-on visual wake-word system running on an ARM Corstone-300 subsystem (480 MHz Cortex-M7, Ethos-U55 NPU configured for 256 MAC/cycle, 512 KB shared SRAM). The current baseline model achieves the required accuracy, but its 800 KB peak activation size forces spilling intermediate tensors to external SPI PSRAM, heavily draining the system battery.
question: How would you design a novel model architecture and execution schedule that trades off computational complexity for memory locality to minimize total energy per inference?
details:
  realistic_solution: The optimal design adopts an aggressive bottleneck architecture and operator fusion (depth-first execution) to keep all intermediate feature maps strictly within the 512 KB shared SRAM. Even if this requires recomputing some overlapping receptive fields or increasing the total MAC count, eliminating external memory bandwidth completely dominates the energy savings. The Cortex-M7 can remain in a low-power state while the Ethos-U55 orchestrates the SRAM-only execution.
  common_mistake: |
    **The Pitfall:** Focusing solely on reducing total MAC count to save power.
    **The Rationale:** Candidates often rely on standard complexity metrics (FLOPs) and ignore Horowitz energy principles, failing to realize an external PSRAM fetch costs two orders of magnitude more energy than an 8-bit MAC.
    **The Consequence:** They produce models with fewer operations that still spill to PSRAM, completely failing to fix the true energy bottleneck.
  napkin_math: |
    1. Energy constants: 8-bit MAC ~0.2 pJ, SRAM access ~5 pJ, PSRAM access ~100 pJ/byte.
    2. Baseline Energy: 10M MACs × 0.2 pJ = 2 µJ. 1 MB PSRAM spill = 100 µJ. Total = 102 µJ.
    3. Proposed SRAM-only model: Compute increases to 15M MACs to allow memory-efficient fused blocks (peak memory < 450 KB).
    4. Proposed Energy: 15M MACs × 0.2 pJ = 3 µJ. 2 MB SRAM access = 2.5 µJ. Total = 5.5 µJ.
    5. Result: Achieves an **~18× energy reduction** by trading cheap compute for expensive memory access.
