title: Pruning Strategies for Resource-Constrained Microcontrollers (ARM Cortex-M4)
scenario: You are tasked with deploying a pre-trained convolutional neural network (CNN) for image classification onto an ARM Cortex-M4 STM32F4 microcontroller. The original model has 1.5 million parameters, with each parameter stored as a float32, leading to a memory footprint of 6 MB – far exceeding the device's 256 KB SRAM. You decide to employ pruning techniques to fit the model within the constraints and achieve acceptable inference latency.
question: Why does structured pruning beat unstructured sparsity for a 1.5M-param CNN on a no-FPU STM32F4 with 256 KB SRAM?
details:
  realistic_solution: A realistic solution would heavily favor structured pruning techniques (e.g., channel pruning, filter pruning) combined with aggressive post-training quantization (e.g., to int8 or int16) to leverage the Cortex-M4's integer arithmetic capabilities. Structured pruning directly reduces the dimensions of tensor operations, leading to smaller, dense matrices that can be processed more efficiently by standard (e.g., CMSIS-NN) integer matrix multiplication routines. This approach simplifies memory access patterns and avoids the overheads of sparse data structures or conditional zero-skipping logic. Furthermore, fine-tuning the pruned and quantized model can help recover accuracy.
  common_mistake: |
    **The Pitfall:** Assuming unstructured pruning translates to proportional speedups on non-specialized hardware.
    **The Rationale:** Overlooking that without dedicated sparse-aware hardware, unstructured sparsity often just means more 'zero' multiplications that still consume cycles and memory bandwidth. They also forget the memory footprint of activations.
    **The Consequence:** Deploying a model that still exceeds memory and latency limits despite having a high sparsity ratio.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Original Model: 1.5M FP32 params (6 MB). 256 KB SRAM limit. No FPU.
       - Unstructured pruning (90% sparse, COO format) vs. Structured pruning (75% channel pruning + INT8).
    2. **Calculations:**
       - Unstructured footprint = 1.5M * 0.1 * 8 bytes (value + index) = 1.2 MB (exceeds SRAM).
       - Structured footprint = 1.5M * 0.25 = ~375k params. At INT8 = 375 KB.
       - Activations (64x64x32): FP32 = 524 KB, INT8 = 128 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory and Compute-Bound.** Structured pruning directly reduces matrix dimensions, shrinking dense operations so they align with general-purpose SIMD CPUs, whereas unstructured sparsity requires indexing overhead that still exceeds SRAM.
