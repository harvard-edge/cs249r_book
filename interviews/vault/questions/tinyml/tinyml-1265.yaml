title: ESP32-S3 Memory Hierarchy for Model Deployment
scenario: You are deploying a quantized keyword spotting model on an ESP32-S3 microcontroller. The model requires frequent memory access for intermediate activations during inference, and you need to estimate if it will fit in the fastest available memory.
question: What are the specific sizes of the internal SRAM and external PSRAM on the ESP32-S3, and why does this matter for compute performance?
details:
  realistic_solution: The correct answer is recalling that the ESP32-S3 has exactly 512 KB of internal SRAM and 8 MB of external PSRAM. The candidate should note that placing compute-heavy activations in the 512 KB SRAM is critical because accessing the 8 MB PSRAM incurs significantly higher latency and reduces the effective utilization of the INT8 vector extensions.
  common_mistake: |
    **The Pitfall:** Confusing the 512 KB of internal SRAM with the 8 MB of external PSRAM.
    **The Rationale:** Candidates often assume the entire 8.5 MB memory pool is accessible with the same low latency, overlooking the physical memory hierarchy.
    **The Consequence:** Placing compute-heavy activations in the much slower PSRAM, which stalls the 240 MHz processor and nullifies the benefits of the INT8 vector extensions.
  napkin_math: |
    - **Fast Memory:** 512 KB Internal SRAM.
    - **Slow Memory:** 8 MB External PSRAM.
    - **Model Footprint:** 200 KB weights + 150 KB activations = 350 KB total.
    - **Conclusion:** **Since 350 KB < 512 KB, the entire model can reside in fast internal SRAM, avoiding PSRAM latency bottlenecks.**
