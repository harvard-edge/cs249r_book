title: MCU Flash Wear Monitoring
scenario: Your fleet of 5,000 ESP32-based environmental monitors logs inference results to flash. The devices are designed for a 10-year deployment. The MCU has 64 KB reserved for logging. Flash is rated for 100,000 P/E cycles.
question: "How should the circular flash log be designed so the ML output cadence stays within the 10-year endurance budget?"
details:
  realistic_solution: 'The ML model''s output cadence dictates the flash wear. If the model runs at 1 Hz and you write its output (64 bytes) sequentially, you will fill and erase an entire flash sector 1,350 times a day. You must aggregate and compress to 1-minute summaries.'
  common_mistake: |
    **The Pitfall:** Assuming 100,000 write cycles is "plenty for 10 years."
    **The Rationale:** Candidates assume perfect wear leveling and ignore the rapid filling caused by high-frequency ML output.
    **The Consequence:** They write to flash too frequently, destroying it within ~3 years and failing the 10-year lifespan target.
  napkin_math: |
    1. Identify Naive Sequential Rate: 1 inference/sec * 64 bytes * 86,400 sec/day = 5.53 MB/day.
    2. Calculate Naive Sectors Written: 5.53 MB / 4 KB sector = ~1,350 sector writes/day.
    3. Calculate Naive Wear Leveling: 1,350 writes / 16 available sectors (64 KB) = 84.4 P/E cycles/day per sector.
    4. Evaluate Naive Lifetime: 100,000 / 84.4 = 1,184 days (~3.25 years).
    5. Calculate 1-Minute Aggregation: 1,440 writes/day * 32 bytes = 46 KB/day = 11.25 sector writes/day.
    6. Calculate Aggregated Wear Leveling: 11.25 / 16 = 0.7 P/E cycles/day.
    7. **Final Result: 1-minute aggregation consumes ~2,566 cycles over 10 years, easily meeting the 100K endurance limit.**
  options:
  - Flash has 100,000 write cycles — at 1 inference/second, that's enough for 100,000 seconds = 27.8 hours of operation before the flash wears out.
  - 'At 1 Hz with 64 bytes/inference: naive approach erases each 4 KB sector 84.4 times/day, exhausting 100K endurance in 3.25 years (fails 10-year target). Fix: aggregate into 1-minute summaries (32 bytes each), reducing to 0.7 P/E cycles/sector/day = 2,566 cycles over 10 years. Design rule: max output complexity = 16 bytes/inference to stay within the flash endurance budget for 5+ year deployments.'
  - The flash endurance is determined by the total bytes written, not the number of erase cycles. 64 bytes x 86,400 inferences/day x 3,650 days = 20.2 GB total writes, well within the 2 MB x 100,000 = 200 GB lifetime budget.
  - Use the ESP32's built-in wear leveling library, which automatically distributes writes across all flash sectors, ensuring uniform wear and guaranteeing the 10-year lifetime regardless of inference output size.
