title: MCU Flash Wear Monitoring
scenario: Your fleet of 5,000 ESP32-based environmental monitors logs inference results to flash. The
  devices are designed for a 10-year deployment. The MCU has 64 KB reserved for logging. Flash is rated
  for 100,000 P/E cycles. How does the ML inference output rate (classifications per second) drive the
  flash write rate, and how do you design a circular buffer sized to the model's output cadence to stay
  within the flash endurance budget?
question: "How should the circular flash log be designed so ML output cadence stays within the 10-year endurance budget?"
details:
  realistic_solution: 'The ML model''s output cadence dictates the flash wear. If the model runs at 1
    Hz and you write its output (64 bytes: timestamp, class, confidence vector) sequentially, you will fill
    and erase an entire flash sector (e.g., 4 KB) 1,350 times a day. This massive write rate
    will destroy the flash quickly.'
  common_mistake: '"Flash has 100,000 write cycles — that''s plenty for 10 years." This assumes perfect
    wear leveling and ignores the rapid filling caused by the ML model''s high-frequency output.'
  napkin_math: |-
    ML output: 64 bytes. Inference rate: 1 Hz. Daily data: 64 × 86,400 = 5,529,600 bytes (~5.53 MB/day).

    ### Naive Approach: Write Every Inference Sequentially
    - Flash sector size: 4 KB (typical for ESP32)
    - Writing to the same sector sequentially and erasing when full: 86,400 inferences × 64 bytes = 5,529,600 bytes/day
    - Sectors consumed per day: 5,529,600 / 4096 = 1,350 sector writes/day
    - Available flash: 64 KB = 16 sectors
    - Circular buffer wraps: 1,350 / 16 = 84.375 full rotations/day
    - P/E cycles per sector per day: **84.4 cycles/day**
    - P/E cycles over 10 years: 84.375 × 365 × 10 = **307,969 cycles**
    - Flash endurance: 100,000 cycles → **Flash dies in ~3.25 years** (100,000 / 84.375 / 365)

    ### Solution: RAM Buffer with Batched Writes
    - Buffer 64 entries in RAM before writing (64 × 64 bytes = 4 KB = 1 sector)
    - Write frequency: 1 sector write every 64 seconds
    - Sector erases per day: 86,400 / 64 = 1,350 sector writes/day
    - Circular buffer over 16 sectors: 1,350 / 16 = ~84.4 P/E cycles/day per sector
    - Still too fast. Need to reduce further.

    ### Solution: Aggregate + Compress
    - Instead of logging every inference, log 1-minute summaries: dominant class, confidence stats, anomaly count
    - Summary size: 32 bytes. Writes per day: 1,440
    - Sectors per day: (1,440 × 32) / 4096 = 11.25 sector writes/day
    - Over 16 sectors: 11.25 / 16 = ~0.7 P/E cycles/sector/day
    - Over 10 years: 0.703 × 3,650 = **2,566 cycles** — well within 100,000 limit ✓

    ### Design Rule
    Flash lifetime (years) = endurance / (daily_sector_writes × 365 / sectors).
    For 10-year life with 100K endurance and 16 sectors: max ~27.4 P/E cycles/day per sector → max 27.4 × 16 = 438 sector writes/day → buffer at least 197 inferences per write (86,400 / 438 ≈ 197). Summarization at 1-minute granularity achieves this comfortably.
  options:
  - Flash has 100,000 write cycles — at 1 inference/second, that's enough for 100,000 seconds = 27.8 hours
    of operation before the flash wears out.
  - 'At 1 Hz with 64 bytes/inference: naive approach erases each 4 KB sector 84.4 times/day, exhausting
    100K endurance in 3.25 years (fails 10-year target). Fix: aggregate into 1-minute summaries (32 bytes
    each), reducing to 0.7 P/E cycles/sector/day = 2,566 cycles over 10 years. Design rule: max output
    complexity = 16 bytes/inference to stay within the flash endurance budget for 5+ year deployments.'
  - The flash endurance is determined by the total bytes written, not the number of erase cycles. 64 bytes
    x 86,400 inferences/day x 3,650 days = 20.2 GB total writes, well within the 2 MB x 100,000 = 200
    GB lifetime budget.
  - Use the ESP32's built-in wear leveling library, which automatically distributes writes across all
    flash sectors, ensuring uniform wear and guaranteeing the 10-year lifetime regardless of inference
    output size.
  correct_index: 1
