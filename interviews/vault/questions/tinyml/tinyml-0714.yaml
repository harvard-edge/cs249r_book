title: MCU Flash Wear Monitoring
scenario: A fleet of environmental monitors logs 1 Hz inference outputs (64 bytes each) to a 64 KB reserved flash partition rated for 100,000 P/E cycles. The devices are targeted for a 10-year deployment.
question: "How should the circular flash log be designed so the ML output cadence stays within the 10-year endurance budget?"
details:
  realistic_solution: Implement algorithmic data aggregation and structural compression prior to physical logging. Aggregating continuous fast outputs into spaced micro-summaries directly suppresses excessive block erase cycles, circumventing rapid silicon destruction.
  common_mistake: |
    **The Pitfall:** Assuming 100,000 Program/Erase cycles is a practically infinite limit for embedded systems.
    **The Rationale:** Candidates assume theoretical perfect flash translation layer (FTL) wear leveling, utterly ignoring high-frequency block churn.
    **The Consequence:** Device silicon degrades structurally within ~3 years, precipitating catastrophic total fleet hardware failure long before the 10-year mark.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Flash partition: 64 KB (Sixteen 4 KB sectors). Endurance limit: 100,000 P/E cycles.
       - Default logging rate: 1 inference/sec, 64 bytes.
    2. **Calculations:**
       - Naive Sequential Output: 1 * 64 bytes * 86,400 sec = ~5.27 MiB/day.
       - Naive Wear Pattern: 5.27 MiB / 4 KB sector = 1350 writes/day.
       - Naive P/E Load: 1350 / 16 sectors = 84.4 P/E cycles/day per sector.
       - Naive Lifespan: 100,000 / 84.4 = ~1185 days (~3.25 years, Fails 10-yr target).
       - Minutely Aggregation Design (1 write/min): 1440 writes/day * 32 bytes = ~45 KiB/day (11.25 writes/day).
       - Aggregated P/E Load: 11.25 / 16 sectors = 0.703 P/E cycles/day.
       - Aggregated 10-yr load: 0.703 * 3650 days = 2566 cycles.
    3. **Conclusion & Interpretation:**
       - **Result: 1-minute aggregation consumes only 2566 cycles, securely bridging the 10-year deployment boundary (I/O-Bound).**
  options:
  - Flash has 100,000 write cycles — at 1 inference/second, that's enough for 100,000 seconds = 27.8 hours of operation before the flash wears out.
  - 'At 1 Hz with 64 bytes/inference: naive approach erases each 4 KB sector 84.4 times/day, exhausting 100K endurance in 3.25 years (fails 10-year target). Fix: aggregate into 1-minute summaries (32 bytes each), reducing to 0.7 P/E cycles/sector/day = 2,566 cycles over 10 years. Design rule: max output complexity = 16 bytes/inference to stay within the flash endurance budget for 5+ year deployments.'
  - The flash endurance is determined by the total bytes written, not the number of erase cycles. 64 bytes x 86,400 inferences/day x 3,650 days = 20.2 GB total writes, well within the 2 MB x 100,000 = 200 GB lifetime budget.
  - Use the ESP32's built-in wear leveling library, which automatically distributes writes across all flash sectors, ensuring uniform wear and guaranteeing the 10-year lifetime regardless of inference output size.
