title: Fallback Model Latency Scaling Analysis
scenario: You are analyzing a keyword spotting system deployed on an MCU running at 168 MHz with no FPU. The system implements graceful degradation by switching from a primary INT8 CNN (8 million MACs) to a fallback INT8 CNN (1 million MACs) when battery is low. Telemetry shows that switching to the 8x smaller fallback model only reduces the total inference cycle latency by about half.
question: Why does an 8x smaller fallback CNN reduce MCU inference latency by only about half?
details:
  realistic_solution: The non-linear scaling manifests because the total system latency comprises both the neural network execution and a fixed preprocessing overhead pipeline. While the MAC reduction slashes the neural network compute time, the fixed computational penalty of extracting audio features (like MFCCs) via software emulation on a processor lacking an FPU remains constant. Consequently, the fixed preprocessing cost governs Amdahl's Law, dominating the overall latency and limiting the speedup to roughly 2x rather than 8x.
  common_mistake: |
    **The Pitfall:** Assuming model MAC reduction yields linearly proportional system-level latency improvements.
    **The Rationale:** Candidates focus exclusively on the neural network computational graph and entirely ignore the rigid sensor preprocessing pipelines.
    **The Consequence:** Graceful degradation strategies fail to extend battery life as expected because fixed data processing costs overwhelm the power budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - MCU: 168 MHz (2 INT8 MACs/cycle).
       - Primary CNN: 8M MACs. Fallback CNN: 1M MACs.
       - Fixed MFCC extraction (no FPU): 15.0 ms.
    2. **Calculations:**
       - Primary compute: 8,000,000 / 2 = 4,000,000 cycles. Time = 4M / 168M Hz = 23.8 ms.
       - Fallback compute: 1,000,000 / 2 = 500,000 cycles. Time = 500k / 168M Hz = 2.98 ms.
       - Total Primary Latency: 23.8 ms + 15.0 ms = 38.8 ms.
       - Total Fallback Latency: 2.98 ms + 15.0 ms = 17.98 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Amdahl's Law Bottleneck.** The 8x MAC reduction only provides a ~2.15x system-level speedup due to fixed preprocessing.
