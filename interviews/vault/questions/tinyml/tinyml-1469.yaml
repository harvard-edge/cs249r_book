title: 'Real-Time Anomaly Detection on TinyML: Cortex-M7 + Ethos-U55 Architecture Evaluation'
scenario: 'A facility needs to implement real-time anomaly detection. The hardware is a Cortex-M7 processor paired with an Arm Ethos-U55 microNPU with 512 KB SRAM. Two architectural approaches are proposed: Architecture A (Edge-Centric Feature Extraction & NPU Inference) and Architecture B (Raw Data NPU Inference with Minimal CPU Pre-processing).'
question: How should Cortex-M7 plus Ethos-U55 streaming architectures compare feature extraction versus raw-data NPU inference?
details:
  realistic_solution: For Architecture A, carefully select very low-complexity feature extractors that fit within the Cortex-M7's processing budget and SRAM, coupled with highly quantized NPU models. For Architecture B, focus on designing NPU-friendly models (e.g., convolutional networks with efficient operations) that can process raw data directly and make optimal use of the Ethos-U55's MAC capabilities, using the Cortex-M7 mainly for data marshaling. Using DMA for sensor data transfer to minimize CPU overhead. Employing dynamic power management strategies, leveraging the NPU for bursts of activity and allowing the CPU to sleep.
  common_mistake: |
    **The Pitfall:** Overlooking SRAM limitations and underutilizing the NPU.
    **The Rationale:** System designers focus on the massive compute capability of the NPU but forget that raw data ingestion and intermediate activations require significant memory.
    **The Consequence:** Architecture A burns CPU cycles unnecessarily, while Architecture B runs out of SRAM, leading to system failure despite having plenty of compute headroom.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Accelerometer: 10 kHz, 3-axis float32.
       - Shared SRAM: 512 KB.
       - NPU Compute: 512 MACs/cycle at 480 MHz.
    2. **Calculations:**
       - Data Rate: 3 * 4 bytes * 10,000 = 120 KB/s.
       - Raw Window (Arch B): 128 samples (12.8 ms) = 128 * 3 * 4 = 1,536 bytes.
       - NPU Compute Time: 100,000 MACs / (512 * 480 MHz) = ~400 ns.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Execution**. NPU compute is near-instantaneous (~400 ns); thus SRAM capacity is the primary architectural bottleneck, demanding memory-efficient model designs.
