title: Dual-Core Power Partitioning on nRF5340
scenario: You are designing an always-on acoustic anomaly detector using the Nordic nRF5340, which features a 128 MHz application core, a 64 MHz network core, 256 KB SRAM, 1 MB flash, and BLE 5.3. The system must sample audio continuously, run inference, and transmit an alert via BLE upon detecting an anomaly, all while adhering to a 1 mW average power budget on a coin cell battery.
question: How should DSP, inference, and BLE work be partitioned across nRF5340 cores to meet a 1 mW audio anomaly budget?
details:
  realistic_solution: 'The optimal design involves a cascaded pipeline: the DMA and low-power peripherals handle continuous audio buffering into SRAM while both cores sleep. The lower-power 64 MHz network core wakes up periodically to perform basic DSP (e.g., MFCCs) and run a tiny first-stage cascade classifier. The power-hungry 128 MHz app core and BLE subsystem are only awakened when the network core detects a high-probability event, thereby minimizing the average active duty cycle.'
  common_mistake: |
    **The Pitfall:** Blindly applying a 'race-to-sleep' strategy by waking the power-hungry 128 MHz core for every audio frame.
    **The Rationale:** Candidates learn "race-to-sleep" as a golden rule, forgetting that frequent wake-ups of high-power cores dominate the energy profile.
    **The Consequence:** The device drains the coin cell battery in days instead of months because the 64 MHz network core is severely underutilized.
  napkin_math: |
    * **Power Budget:** 1 mW (1000 µW) average.
    * **Active Current (App Core):** ~5 mA at 3V = 15 mW active power.
    * **Max Duty Cycle:** 1 mW / 15 mW = ~6.6% active time (66 ms per second).
    * **Inference Cost:** 20 ms on App Core = 300 µJ. BLE transmission = 15 ms = 225 µJ.
    * **Conclusion:** Waking the App Core every second consumes over half the power budget instantly. A cascaded pipeline (64 MHz core for pre-filtering, 128 MHz for final inference) is mathematically required.
