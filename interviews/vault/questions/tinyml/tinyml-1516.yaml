title: Diagnose TinyML Double-Buffer Stall
scenario: A keyword-spotting board samples 20 ms audio windows using DMA while an
  NPU runs inference on the previous window. DMA fill takes 20 ms, preprocessing takes
  6 ms on the CPU, and NPU inference takes 18 ms. The team still sees dropped windows.
question: Which overlap assumption is likely wrong, and how would you diagnose the
  stall?
details:
  realistic_solution: The nominal overlapped path is limited by max(20 ms DMA, 6 ms
    preprocessing plus 18 ms inference) if preprocessing and NPU are serialized on
    the same buffer path. That is 24 ms, so a new 20 ms window arrives before the
    previous one is fully consumed. Diagnose buffer ownership, whether preprocessing
    blocks NPU launch, and whether two buffers are enough.
  common_mistake: Comparing DMA time only with NPU time and forgetting CPU preprocessing
    on the critical path.
  napkin_math: Preprocess plus inference is 6 ms + 18 ms = 24 ms, which exceeds the
    20 ms producer period by 4 ms per window.
