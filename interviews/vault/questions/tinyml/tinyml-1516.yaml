title: Diagnose TinyML Double-Buffer Stall
scenario: A keyword-spotting board samples 20 ms audio windows using DMA while an NPU runs inference on the previous window. DMA fill takes 20 ms, preprocessing takes 6 ms on the CPU, and NPU inference takes 18 ms. The team still sees dropped windows.
question: Which overlap assumption is likely wrong, and how would you diagnose the stall?
details:
  realistic_solution: The nominal overlapped path is limited by max(20 ms DMA, 6 ms preprocessing plus 18 ms inference) if preprocessing and NPU are serialized on the same buffer path. That is 24 ms, so a new 20 ms window arrives before the previous one is fully consumed. Diagnose buffer ownership, whether preprocessing blocks NPU launch, and whether two buffers are enough.
  common_mistake: |
    **The Pitfall:** Comparing DMA time only with NPU time.
    **The Rationale:** Engineers assume the NPU handles everything, forgetting that CPU feature extraction must happen before the NPU can start.
    **The Consequence:** The critical path is miscalculated, causing buffer overflows and dropped audio frames.
  napkin_math: |
    * **Producer (DMA):** 20 ms per window.
    * **Consumer (CPU + NPU):** 6 ms preprocessing + 18 ms inference = **24 ms**.
    * **Deficit:** 24 ms (consumption) > 20 ms (arrival) by **4 ms**.
    * **Conclusion:** The pipeline processes slower than data arrives. Dropped windows are mathematically guaranteed regardless of buffer depth.
