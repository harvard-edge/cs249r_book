title: The Voltage Scaling Tightrope
scenario: Your battery-powered wildlife monitoring sensor runs a bird call classifier on an STM32L5 (Cortex-M33,
  110 MHz max, 256 KB SRAM). To maximize battery life, you reduce the core voltage from 1.2V (Range 1,
  110 MHz max) to 0.9V (Range 2, 26 MHz max). Inference time increases from 15 ms to 63 ms — roughly 4.2×
  slower, matching the clock ratio. But after deploying 500 units in the field, 3% of devices produce
  incorrect classifications intermittently. The other 97% work perfectly. What's happening?
details:
  realistic_solution: 'The intermittent errors are caused by **voltage-frequency margin violations** due
    to process variation:'
  common_mistake: '"3% defect rate means a bad batch of MCUs — replace them." The MCUs are not defective.
    They''re operating at the *margin* of their voltage-frequency specification.'
  napkin_math: 'At 1.2V/110 MHz: P = C × 1.2² × 110M = 158.4C. Energy per inference: 158.4C × 15 ms. At
    0.9V/26 MHz: P = C × 0.9² × 26M = 21.06C. Energy: 21.06C × 63 ms = 1,326.8C. At 1.2V: 158.4C × 15
    ms = 2,376C. Ratio: 1,326.8 / 2,376 = 0.56×. Low-voltage operation saves 44% energy per inference.
    At 0.95V/26 MHz: P = C × 0.95² × 26M = 23.47C. Energy: 23.47C × 63 ms = 1,478.6C. Still 38% energy
    savings vs 1.2V, but now reliable. The 11% power increase over 0.9V eliminates the 3% field failure
    rate.'
