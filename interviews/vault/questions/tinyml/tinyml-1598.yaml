title: SRAM vs Flash MCU Energy
scenario: Reviewing two pull requests for a smart watch gesture model. PR A executes directly from Flash. PR B copies weights to SRAM but halves activation memory.
question: Evaluate PR A against PR B for power efficiency and latency on a Cortex-M4, considering Flash read energy is significantly higher than SRAM.
details:
  realistic_solution: Flash memory reads cost approximately 10x more energy per byte than SRAM reads and often incur wait states. PR A repeatedly fetches weights from Flash per inference, causing high power drain. PR B pays a one-time DMA copy cost to move weights into SRAM, running subsequent inferences purely from SRAM. PR B is superior for continuous gesture tracking.
  common_mistake: Judging the PRs strictly on binary size and ignoring the active power consumption of the Flash memory controller.
  napkin_math: |
    **Assumptions & Constraints:**
    - Flash memory read energy: ~10 nJ/byte.
    - SRAM read energy: ~1 nJ/byte.
    - Model weight size: 100 KB.

    **Calculations:**
    - Flash read energy per inference: 100 KB * 10 nJ = 1 mJ.
    - SRAM read energy per inference: 100 KB * 1 nJ = 0.1 mJ.

    **Conclusion & Interpretation:**
    - **Result: 10x less energy using SRAM (Energy-Bound)**. Copying weights to SRAM pays a one-time DMA cost but saves substantial power on continuous inferences.
