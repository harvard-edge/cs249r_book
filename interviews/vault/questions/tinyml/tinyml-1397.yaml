title: Hardware-aware NAS for Edge Deployment on Cortex-M7/Ethos-U55
scenario: You are tasked with deploying a real-time object detection model on an edge device featuring a Cortex-M7 microcontroller (480 MHz) and an Ethos-U55 NPU (128-512 MACs/cycle), sharing 512 KB of SRAM. Your goal is to design a Neural Architecture Search (NAS) strategy that explicitly incorporates hardware constraints (SRAM, FLOPs, latency) into its search objective.
question: How should Cortex-M7 and Ethos-U55 NAS incorporate SRAM, FLOPs, latency, and memory estimates before deployment?
details:
  realistic_solution: A strong solution would involve defining a search space tailored for efficient operations on a given NPU (e.g., Ethos-U55 specific ops, depthwise separable convolutions, inverted residuals) and for low SRAM footprint (e.g., micro-architectures found in MCUNet). Hardware feedback would be integrated through a differentiable NAS approach combined with a lightweight hardware simulator or performance predictor that can estimate latency and memory usage on the Cortex-M7/Ethos-U55. The objective function for NAS would explicitly balance accuracy with these predicted hardware metrics. Memory estimation would consider both weights and intermediate activations, and latency estimation would account for NPU utilization and data movement overheads.
  common_mistake: |
    **The Pitfall:** Relying solely on FLOPs or parameter count as proxies for latency and memory.
    **The Rationale:** Standard NAS approaches abstract away hardware specifics, assuming lower FLOPs always equals faster execution.
    **The Consequence:** The search yields models that have low FLOPs but poor NPU utilization, or models that fit in Flash but OOM in SRAM due to large activation peaks.
  napkin_math: |
    - **SRAM Constraint**: 512 KB SRAM limit ≈ max 512k INT8 parameters (assuming 0 bytes for activations, which is unrealistic).
    - **Ideal NPU Latency**: If a model requires X MACs, Latency = X / (512 MACs/cycle × 480 MHz).
    - **Realistic Evaluation**: A layer with high FLOPs but perfect NPU mapping (Conv2D) may execute faster than a layer with low FLOPs but poor mapping (e.g., custom ops falling back to M7).
