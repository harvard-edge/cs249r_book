title: Tinyml New 0029
scenario: Using TFLite Micro, the inference executes correctly, but profiling shows 30% of the total execution
  time is spent outside the actual math kernels, wasting battery.
question: "What interpreter overhead causes 30% of TFLite Micro inference time to occur outside math kernels?"
details:
  realistic_solution: The overhead comes from the TFLite Micro interpreter parsing the model graph, looking
    up operator implementations, and resolving tensor pointers dynamically during every single `invoke()`
    call. The solution is to switch to Ahead-of-Time (AOT) compilation (like microTVM or TensorFlow Lite
    Micro's compiler), which converts the graph into static C code, eliminating dynamic interpretation.
  common_mistake: Using dynamic interpreters in deeply embedded systems and accepting the overhead, rather
    than utilizing AOT compilers.
  napkin_math: Interpreter lookup = ~500 cycles/op. For 100 operations, that's 50k cycles. AOT compiled
    direct function calls take ~10 cycles. 50k / 168MHz = ~0.298ms overhead strictly on pointer chasing.
