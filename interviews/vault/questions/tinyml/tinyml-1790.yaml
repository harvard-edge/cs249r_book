title: MCU Convolution Latency
scenario: A Cortex-M4 running at 100 MHz needs to execute a depthwise convolution layer requiring exactly 100,000 MACs (Multiply-Accumulate operations).
question: Calculate the theoretical minimum time required to compute this layer, assuming 1 MAC takes 1 clock cycle.
details:
  realistic_solution: 'The clock speed of 100 MHz equates to 100,000,000 cycles per second. Since 100,000 MACs require 100,000 cycles, the execution time is the required cycles divided by the cycles per second.'
  common_mistake: |
    **The Pitfall:** Miscalculating the units when converting cycles to time.
    **The Rationale:** Candidates often divide incorrectly or confuse MHz (10^6) with GHz (10^9), leading to off-by-1000 errors.
    **The Consequence:** The latency estimation is off by orders of magnitude, rendering architectural decisions invalid.
  napkin_math: |
    - **Clock Speed**: 100 MHz = 100,000,000 cycles/sec.
    - **Required Cycles**: 100,000 cycles.
    - **Execution Time**: 100,000 / 100,000,000 = 0.001 seconds = **1 ms**.
