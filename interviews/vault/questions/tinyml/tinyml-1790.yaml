title: MCU Convolution Latency
scenario: A Cortex-M4 running at 100 MHz needs to execute a depthwise convolution
  layer requiring exactly 100,000 MACs (Multiply-Accumulate operations).
question: Calculate the theoretical minimum time required to compute this layer, assuming
  1 MAC takes 1 clock cycle.
details:
  realistic_solution: The clock speed of 100 MHz means 100,000,000 cycles per second.
    Since 100,000 MACs require 100,000 cycles, divide the cycles needed by the cycles
    per second to get the execution time.
  common_mistake: Confusing MHz with GHz or incorrectly converting the resulting decimal
    seconds into milliseconds.
  napkin_math: 100,000 / 100,000,000 = 0.001 seconds = 1ms.
