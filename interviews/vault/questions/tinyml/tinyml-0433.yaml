title: The Sensor Fusion Skew
scenario: You are a TinyML engineer developing a machine anomaly detector for a factory floor. The model fuses data from an accelerometer and a microphone, both sampling at 1kHz. The training dataset was captured with high-fidelity, perfectly synchronized lab sensors. To reduce cost, the production device uses a cheaper accelerometer that exhibits up to 2ms of timing jitter and a microphone with a different analog-to-digital converter (ADC) that adds a slight DC offset to the signal. After deploying the quantized TFLM model to a Cortex-M7 MCU, you observe a 30% drop in prediction accuracy compared to your validation set. The MCU is not reporting any hardware faults or computational errors.
question: What hardware-induced data issue most likely explains the 30% accuracy drop after deploying the quantized sensor fusion model?
details:
  realistic_solution: The most likely cause is training-serving skew originating from the hardware itself. The model was trained on a pristine data distribution from synchronized, high-quality sensors. The production data comes from a different, slightly corrupted distribution. The 2ms jitter means the accelerometer data can be shifted by up to two full timesteps relative to the microphone data (since 1kHz sampling = 1ms per sample). The DC offset from the new microphone ADC changes the baseline of the audio signal. The model learned a very specific temporal and feature relationship between the two sensors, and that relationship is now violated at inference time, leading to the accuracy drop.
  common_mistake: |
    **The Pitfall:** Blaming quantization or the compute system for accuracy drops.
    **The Rationale:** It is easier to suspect the black box of model optimization or constraints rather than auditing the physical hardware inputs.
    **The Consequence:** Engineers waste cycles debugging valid ML code when the root cause is training-serving skew caused by cheap hardware altering the input data distribution.
  napkin_math: |
    *   **Sampling Rate:** 1 kHz = 1 ms per sample.
    *   **Jitter Impact:** 2 ms jitter = ±2 samples misalignment between accelerometer and microphone.
    *   **Correlation Break:** The 2-sample shift instantly destroys the tight cross-correlation features the fusion model learned.
    *   **DC Offset Impact:** An INT8 model calibrated on zero-mean data will see the offset push its activations past the expected range.
    *   **Conclusion:** Activations clip and timing logic breaks, causing the ~30% accuracy drop typical of severe distribution shifts.
  options:
  - The INT8 quantization process has likely removed crucial features from the model weights, making it less robust.
  - The Cortex-M7's memory bandwidth is insufficient to load the sensor data quickly enough, causing input data corruption.
  - The production sensors have introduced a distribution shift (jitter and bias) not present in the training data, causing training-serving skew.
  - The device's power management unit is likely throttling the MCU clock speed to save energy, leading to incorrect calculations.
  correct_index: 2
