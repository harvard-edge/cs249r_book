title: The Sensor Fusion Skew
scenario: You are a TinyML engineer developing a machine anomaly detector for a factory floor. The model
  fuses data from an accelerometer and a microphone, both sampling at 1kHz. The training dataset was captured
  with high-fidelity, perfectly synchronized lab sensors. To reduce cost, the production device uses a
  cheaper accelerometer that exhibits up to 2ms of timing jitter and a microphone with a different analog-to-digital
  converter (ADC) that adds a slight DC offset to the signal. After deploying the quantized TFLM model
  to a Cortex-M7 MCU, you observe a 30% drop in prediction accuracy compared to your validation set. The
  MCU is not reporting any hardware faults or computational errors. Using this information, diagnose the
  most likely cause of the performance degradation.
question: "What hardware-induced data issue most likely explains the 30% accuracy drop after deploying the quantized sensor fusion model?"
details:
  realistic_solution: The most likely cause is training-serving skew originating from the hardware itself.
    The model was trained on a pristine data distribution from synchronized, high-quality sensors. The
    production data comes from a different, slightly corrupted distribution. The 2ms jitter means the
    accelerometer data can be shifted by up to two full timesteps relative to the microphone data (since
    1kHz sampling = 1ms per sample). The DC offset from the new microphone ADC changes the baseline of
    the audio signal. The model learned a very specific temporal and feature relationship between the
    two sensors, and that relationship is now violated at inference time, leading to the accuracy drop.
  common_mistake: Engineers often blame the model or the compute system first. They might suspect that
    model quantization destroyed important features, or that the MCU is too slow. While plausible issues
    in TinyML, these don't explain why a model fails only after the input hardware changes.
  napkin_math: '1kHz sampling=1ms/sample. 2ms jitter=±2 samples misalignment between accel and mic. Fusion
    model expects sync inputs; 2-sample shift corrupts cross-correlation features. DC offset shifts input
    mean. INT8 calibrated on zero-mean data→offset pushes activations beyond range→clipping. Combined:
    ~30% accuracy drop matches typical distribution shift.'
  options:
  - The INT8 quantization process has likely removed crucial features from the model weights, making it
    less robust.
  - The Cortex-M7's memory bandwidth is insufficient to load the sensor data quickly enough, causing input
    data corruption.
  - The production sensors have introduced a distribution shift (jitter and bias) not present in the training
    data, causing training-serving skew.
  - The device's power management unit is likely throttling the MCU clock speed to save energy, leading
    to incorrect calculations.
  correct_index: 2
