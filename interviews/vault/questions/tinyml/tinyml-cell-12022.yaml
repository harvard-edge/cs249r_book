title: 'Latency Decomposition: Full TinyML Gesture Recognition Pipeline with Power Budget'
scenario: 'A gesture recognition wristband uses ESP32-S3 (240MHz, 512KB SRAM, 8MB PSRAM) with a 6-axis
  IMU at 200Hz. Pipeline: IMU read (I2C, 1ms), windowing (50ms window, 10 samples), feature extraction
  (CPU), gesture CNN (800K ops INT8), softmax + decision, BLE notification. Battery life target: 1 week
  on 200mAh at 3.7V. Audit latency and power.'
details:
  realistic_solution: 'IMU read: 1ms every 5ms (200Hz). Feature extraction: 2ms. CNN: 800K/240M = 3.3ms.
    BLE notify: 10ms active (radio on). Per-gesture (every 500ms): total active = 1+2+3.3+10 = 16.3ms/500ms
    = 3.3% duty cycle. Power: ESP32-S3 active 240mA, sleep 20μA. Average: 0.033×240 + 0.967×0.02 = 8.0mA.
    Battery: 200mAh/8.0mA = 25 hours — far short of 1 week. Fix: reduce BLE to on-demand only → 0.1% radio
    duty → 0.24×0.001×100mA = 0.24mA radio. New: ~1.5mA → 133 hours > 1 week.'
  common_mistake: Optimizing inference latency aggressively when power consumption is dominated by BLE
    radio transmission and active CPU time, not the ML inference itself.
  napkin_math: 'Active power: 240mA. Sleep: 0.02mA. Duty cycle: 16.3ms/500ms = 3.26%. Avg: 0.0326×240
    + 0.9674×0.02 = 7.84 + 0.019 = 7.86mA. 200mAh/7.86mA = 25.4h. Target: 168h. Need avg < 1.19mA. Fix:
    duty cycle < 1.19/240 = 0.5%. Inference only (no BLE): 6.3ms/500ms = 1.26%. Still too high. Also use
    LP mode at 80MHz during inference: 80mA. 6.3ms×80mA/500ms = 1.0mA. BLE on-demand: adds 0.1mA. Total:
    ~1.1mA → 181h ✓.'
