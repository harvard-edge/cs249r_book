title: M4 Flash RPO Constraint
scenario: A solar-powered Cortex-M4 experiences brownouts. It runs a continuous learning
  algorithm, keeping a 10 KB weight delta in SRAM. Writing to Flash takes 2 ms per
  KB.
question: Evaluate the Recovery Point Objective (RPO) and implement a checkpointing
  rule that ensures a maximum of 5 seconds of learning is lost upon power failure.
visual:
  kind: svg
  path: tinyml-1568.svg
  alt: Timeline highlighting the 5-second RPO window before a failure.
  caption: RPO vs RTO Timeline.
details:
  realistic_solution: 'To meet an RPO of 5 seconds, the state must be committed to
    Flash every 5 seconds. The commit operation takes $10 \times 2 = 20$ ms. The application
    must pause learning for 20 ms every 5 seconds, incurring an overhead of $20 /
    5000 = 0.4\%$. The rule: Timer interrupt at 4.98 seconds triggers a blocking Flash
    write.'
  common_mistake: Confusing Recovery Time Objective (RTO) - the time to boot back
    up - with the RPO, which dictates the save frequency.
  napkin_math: 10 KB * 2 ms/KB = 20 ms write. RPO = 5000 ms. Overhead = 20 / 5000
    = 0.4%.
