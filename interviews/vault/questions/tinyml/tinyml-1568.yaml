title: M4 Flash RPO Constraint
scenario: A solar-powered MCU experiences brownouts. It runs a continuous learning algorithm, keeping a 10 KB weight delta in SRAM. Writing to Flash takes 2 ms per KB.
question: What checkpointing rule ensures a Recovery Point Objective (RPO) of 5 seconds without excessive overhead?
visual:
  kind: svg
  path: tinyml-1568.svg
  alt: Timeline highlighting the 5-second RPO window before a failure.
  caption: RPO vs RTO Timeline.
details:
  realistic_solution: "To meet an RPO of 5 seconds, the state must be committed to Flash every 5 seconds. The commit operation takes 10 * 2 = 20 ms. The application must pause learning for 20 ms every 5 seconds. The rule: Timer interrupt at 4.98 seconds triggers a blocking Flash write."
  common_mistake: |
    **The Pitfall:** Confusing Recovery Time Objective (RTO) with Recovery Point Objective (RPO).
    **The Rationale:** Candidates often design for the time it takes to boot back up (RTO) rather than the required save frequency dictated by RPO.
    **The Consequence:** Designing a system that either loses more than 5 seconds of learning or checkpoints too frequently, wasting power and flash cycles.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - State size: 10 KB.
       - Flash write speed: 2 ms/KB.
       - Constraint: 5 seconds RPO.
    2. **Calculations:**
       - Flash Write Time: 10 KB * 2 ms/KB = 20 ms.
       - Checkpoint Frequency: Every 5 seconds (5000 ms).
       - Overhead Calculation: 20 ms / 5000 ms = 0.4%.
    3. **Conclusion & Interpretation:**
       - **Result: Energy-Bound (0.4% overhead is acceptable to meet 5s RPO).**
