title: 'TinyML Anomaly Detection: Data Curation for Constrained Devices'
scenario: You're tasked with developing a vibration anomaly detection system for critical industrial equipment.
  The ML model must run entirely on an ARM Cortex-M4 STM32F4 microcontroller (specifically, an STM32F407VGT6)
  clocked at 168 MHz, with only 256 KB of SRAM available and no floating-point unit (FPU). The sensor
  data streams at 100 Hz, producing 3-axis accelerometer readings. Your challenge is to curate a high-quality
  dataset for training this anomaly detection model, considering the severe resource constraints for both
  model size and inference on the device. How do you ensure the dataset is representative, free from bias,
  and leads to a performant model without overfitting to noisy or irrelevant data, especially given the
  low-power, real-time operational requirements and the need for efficient labeling?
question: "How should you curate and label vibration data so a Cortex-M4 anomaly model is representative, unbiased, and deployable?"
details:
  realistic_solution: Implement an active learning strategy where the model (or a proxy) identifies uncertain
    samples on the STM32F4 for human annotation, minimizing labeling effort and focusing on informative
    data. Conduct targeted data collection directly from the target STM32F4-equipped machinery under various
    operational conditions. Establish rigorous, device-aware annotation guidelines, train annotators,
    and regularly measure inter-annotator agreement (IAA) to ensure consistent and high-quality labels
    for anomalies. Focus on feature engineering that is robust and computationally inexpensive in a fixed-point
    environment.
  common_mistake: Collecting a large, generic dataset without considering the unique operational conditions
    and failure modes specific to the target equipment, or the tinyML constraints (memory, no FPU). This
    often leads to models that are too large, inefficient, or perform poorly on the actual device due
    to domain shift or irrelevant features. Inconsistent or poorly defined annotation guidelines can also
    lead to low inter-annotator agreement and introduce significant bias, especially when labeling subtle
    anomalies.
  napkin_math: 'Given 256 KB SRAM: If a simple anomaly detection model requires 50 KB for weights/activations
    (e.g., 50,000 quantized 8-bit parameters), and the remaining SRAM is needed for code, OS, and data
    buffers. A 1-second window of 3-axis accelerometer data (100 samples, 3 axes, 2 bytes/sample for fixed-point)
    is 100 * 3 * 2 = 600 bytes. This means the model must be very small and efficient, directly impacting
    the complexity of features that can be extracted and thus the data requirements. If each annotation
    takes 1 minute, 10,000 anomaly samples would take ~167 hours; active learning could reduce this to
    ~50 hours.'
