title: Achieve Mastery in Transformer Inference Optimization on MCU
scenario: 'You own the end-to-end optimization of a real-time anomaly detection transformer on Cortex-M7+Ethos-U55
  for an industrial IoT sensor. Requirements: <50ms latency at 10 inferences/second, <5mW average power,
  512KB SRAM, 4MB flash, >95% F1-score. Current baseline: 2-layer, 128-dim, 4-head transformer achieving
  96% F1 at 280ms, 8.2mW. Propose a complete optimization roadmap with quantitative milestones at each
  stage.'
details:
  realistic_solution: 'Stage 1 — Architecture: reduce to 1 layer, 64-dim, 2 heads. F1 impact: ~94% (marginal).
    Latency: 280×0.5×0.5 = 70ms. Stage 2 — Quantization: INT8 weights+activations via QAT. F1: 95.2% (QAT
    recovers). Latency: 70×0.6=42ms (Ethos-U55 INT8 ops). Stage 3 — NPU offload: attention + matmuls to
    Ethos-U55. CPU handles only embedding lookup + final classifier. Latency: 42×0.7=29ms. Power: 8.2×0.35=2.9mW.
    Stage 4 — Operator fusion: fuse QKV projection + attention + layer norm into single NPU kernel. Latency:
    29×0.85=24ms < 50ms target. F1: 95.5%. All targets met.'
  common_mistake: Optimizing in isolation (only quantization, only pruning) without co-designing architecture,
    operator fusion, and NPU mapping; each optimization must preserve preceding gains.
  napkin_math: 'Baseline: 280ms, 8.2mW, 96% F1. After architecture: 70ms (-75% latency). After INT8: 42ms
    (-40%). After NPU: 29ms (-31%). After fusion: 24ms (-17%). Power: 2.9mW < 5mW. F1: 95.5% > 95%. All
    3 constraints satisfied.'
