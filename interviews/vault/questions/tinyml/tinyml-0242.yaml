title: 'The Microcontroller Ridge Point: MCU Compute Constraints'
scenario: You're evaluating a Cortex-M4 microcontroller for a real-time audio application. Its datasheet
  specifies a peak compute of 336 MFLOPS and an on-chip SRAM bandwidth of 1.2 GB/s. To understand its
  theoretical performance limits, you need to apply the Roofline model. What is the 'Ridge Point' of this
  microcontroller, which represents the minimum Arithmetic Intensity (AI) a model needs to be compute-bound?
details:
  realistic_solution: 'The Ridge Point = peak compute / peak memory bandwidth. For Cortex-M4: 336 MFLOPS
    / 1.2 GB/s = 0.28 FLOPs/byte. Operations below 0.28 FLOPs/byte are memory-bound; above are compute-bound.
    Standard 3x3 conv (INT8): 9 MACs * 2 = 18 FLOPs per 18 bytes loaded (9 weights + 9 input). Intensity
    = 1.0 FLOPs/byte > 0.28, compute-bound. 1x1 pointwise conv: 2 FLOPs per 2 bytes = 1.0, compute-bound.
    Depthwise 3x3: 18 FLOPs per 10 bytes = 1.8, compute-bound. Element-wise add: 1 FLOP / 3 bytes = 0.33,
    borderline. Nearly all CNN layers exceed 0.28 on MCUs, meaning inference is almost always compute-bound
    (unlike GPUs where small-batch inference is often memory-bound).'
  common_mistake: Engineers often invert the formula (calculating Bytes/Op instead of Ops/Byte) or make
    unit conversion errors, for example, failing to correctly scale MFLOPS (10^6) against GB/s (10^9).
    This leads to an answer that is orders of magnitude off and a fundamental misunderstanding of whether
    the device is typically memory-bound or compute-bound for common ML workloads.
  napkin_math: '1. **Peak Compute** = 336 MFLOPS = 336 × 10^6 Ops/sec

    2. **Memory Bandwidth** = 1.2 GB/s = 1.2 × 10^9 Bytes/sec

    3. **Ridge Point** = Peak Compute / Memory Bandwidth = (336 × 10^6) / (1.2 × 10^9) = **0.28 Ops/Byte**

    4. **Interpretation:** Any operation with an Arithmetic Intensity (AI) below 0.28 Ops/Byte is memory-bound;
    above 0.28 is compute-bound. Since most simple ML operations (e.g., element-wise activations at ~1
    Op/Byte) exceed this threshold, the Cortex-M4 is typically **compute-bound** for ML workloads — a
    stark contrast to GPU systems which are often memory-bound.'
  options:
  - 3.57 Ops/Byte
  - 280 Ops/Byte
  - 0.28 Ops/Byte
  - 2.8 Ops/Byte
  correct_index: 2
