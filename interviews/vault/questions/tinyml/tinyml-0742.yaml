title: The CMSIS-NN Dimension Limit
scenario: You are porting an anomaly detection Autoencoder to an STM32. The input is a very long 1D time-series signal of shape `(1, 1, 100000, 1)`. When you run this through TFLite Micro using CMSIS-NN kernels, the convolution layer produces completely random garbage outputs, but it doesn't crash.
question: Why does a 100,000-sample 1D input produce garbage outputs in CMSIS-NN on STM32 without crashing?
details:
  realistic_solution: 'CMSIS-NN uses int16_t for dimension variables internally. Your input dimension of 100,000 exceeds INT16_MAX (32,767). The dimension wraps: 100,000 % 65,536 = 34,464, interpreted as signed = -31,072. The convolution loop iterates `for(i=0; i < -31072; i++)` which immediately exits, leaving the output buffer uninitialized with garbage. No crash because the loop simply doesn''t execute — silent data corruption. Fix: split the 100K time series into chunks of 30,000 or fewer, process sequentially, and concatenate results. Or use a version of TFLite Micro with int32 dimension support.'
  common_mistake: |
    **The Pitfall:** Assuming the issue is an Out-Of-Memory (OOM) error.
    **The Rationale:** Candidates assume "The MCU doesn't have enough RAM for 100,000 floats."
    **The Consequence:** They miss the true root cause, because if it OOM'd, the framework would throw an explicit error or hard fault, not silently corrupt data.
  napkin_math: |
    1. Maximum value of signed 16-bit integer: `int16_t max = 32,767`.
    2. Input dimension: `100,000`.
    3. Integer overflow math: `100,000 % 65,536 = 34,464`.
    4. Two's complement signed interpretation of 34,464: **`-31,072`**.
    5. Result: The loop `for(int i=0; i < -31072; i++)` immediately terminates, leaving uninitialized memory.
  options:
  - The 100,000-sample input exceeds the Cortex-M's maximum DMA transfer size, causing the DMA controller to silently truncate the tensor and fill the remainder with zeros.
  - CMSIS-NN uses int16_t for internal dimension variables. Input dimension 100,000 exceeds INT16_MAX (32,767), wrapping to -31,072 (signed). The convolution loop `for(i=0; i < -31072; i++)` immediately exits, leaving the output buffer uninitialized — silent data corruption, no crash. Fix: split into chunks of <=30,000 samples, or use a TFLite Micro build with int32 dimension support.
  - The input tensor exceeds the MCU's maximum contiguous SRAM allocation, causing TFLite Micro to silently fall back to a zero-padded smaller buffer.
  - The STM32's memory protection unit (MPU) triggers a bus fault on the large allocation, which the TFLite Micro error handler silently catches and returns a zero-filled buffer.
  correct_index: 1
