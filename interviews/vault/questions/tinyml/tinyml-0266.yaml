title: The SRAM vs. Flash Fallacy
scenario: You're scoping a project to deploy a keyword spotting model on a Cortex-M7 based microcontroller.
  Your colleague, who primarily works on cloud systems, sees the device has '1MB of memory' and assumes
  that's the budget. What is the approximate *working memory* (SRAM) you would state is actually available
  for the model's runtime operations like activations?
question: "What is the approximate *working memory* (SRAM) you would state is actually available for the model's runtime operations like activations?"
details:
  realistic_solution: A typical high-end microcontroller like a Cortex-M7 might have 1MB or 2MB of Flash,
    but its corresponding SRAM is usually in the range of 256 KB to 512 KB. You must state that the *working
    memory* budget is the SRAM size, not the Flash size. For a standard MCU, ~256 KB is a very realistic
    figure to use for initial planning.
  common_mistake: The most common mistake is confusing total on-chip Flash storage with SRAM. Engineers
    accustomed to unified memory systems (cloud, mobile) often see '1MB Memory' on a spec sheet and assume
    it's all available for execution, like RAM. They forget that Flash holds the program code and weights
    (read-only), while the much smaller SRAM is the only read/write memory available for activations and
    intermediate calculations.
  napkin_math: From the 'Scale Ladder' table, a TinyML device has a memory capacity of around 256 KB–2
    MB SRAM. A 1MB Flash chip is common, but this is for storage. The peak memory usage during runtime,
    often called the 'Tensor Arena Peak', must fit into the SRAM. For a keyword spotter, this includes
    the input buffer, the output buffer, and the largest intermediate activation tensors. A 250KB model
    might seem to fit in 1MB of Flash, but if its activation buffers require 300KB of SRAM, it will fail
    to run.
  options:
  - ~8 MB. This is the memory of a low-end edge device, not a microcontroller.
  - ~1 MB. This confuses the available read-only Flash storage with the working read/write SRAM.
  - ~256 KB. This is a correct and typical SRAM size for a high-end microcontroller.
  - ~32 KB. This is the SRAM size for a much lower-end microcontroller, not a typical Cortex-M7.
  correct_index: 2
