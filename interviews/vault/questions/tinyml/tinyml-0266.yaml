title: The SRAM vs. Flash Fallacy
scenario: You are scoping a project to deploy a keyword spotting model on a microcontroller. A colleague from the cloud engineering team sees the device specs list "1MB Memory" and assumes that is the budget for model activations.
question: What is the approximate *working memory* (SRAM) you would state is actually available for the model's runtime operations like activations?
details:
  realistic_solution: A typical high-end microcontroller like a Cortex-M7 might have 1MB or 2MB of Flash, but its corresponding SRAM is usually in the range of 256 KB to 512 KB. You must state that the *working memory* budget is the SRAM size, not the Flash size. For a standard MCU, ~256 KB is a very realistic figure to use for initial planning.
  common_mistake: |
    **The Pitfall:** Confusing total on-chip Flash storage capacity with working SRAM.
    **The Rationale:** Engineers accustomed to unified memory architectures (cloud, mobile, PC) assume the "1MB Memory" spec implies executable read/write RAM.
    **The Consequence:** Models are designed with activation buffers that vastly exceed the hardware's physical SRAM, resulting in guaranteed Out-Of-Memory (OOM) crashes during deployment.
  napkin_math: |
    1. **Assumptions & Constraints:** High-end Cortex-M microcontrollers typically possess a non-unified memory architecture. The "1MB" refers to NOR Flash.
    2. **Calculations:** SRAM capacity is physically bounded by silicon area and is typically 1/4th to 1/8th the size of Flash on such devices. 1024 KB Flash / 4 ≈ 256 KB.
    3. **Conclusion & Interpretation:** **Result: ~256 KB SRAM.** The working memory budget (Tensor Arena) available for intermediate activations and heap operations is roughly 256 KB, completely distinct from the 1MB read-only Flash used for storing the model weights.
  options:
  - ~8 MB
  - ~1 MB
  - ~256 KB
  - ~32 KB
  correct_index: 2
