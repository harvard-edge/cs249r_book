title: Hardware-Aware NAS Tradeoffs on ESP32-S3
scenario: You are deploying a wake-word model on an ESP32-S3 (240 MHz Xtensa, 512 KB SRAM, 8 MB PSRAM).
  Your Hardware-Aware NAS outputs two candidate architectures. Model A has a peak memory of 450 KB, uses
  15 MFLOPs, but relies on operations that cannot use the INT8 vector extensions. Model B has a peak memory
  of 600 KB (forcing 88 KB to reside in PSRAM), uses 25 MFLOPs, but its operations perfectly utilize the
  INT8 vector instructions. Which architecture do you choose for deployment, and how do you justify the
  tradeoff between PSRAM latency and vectorization speedup?
question: "Which architecture do you choose for deployment, and how do you justify the tradeoff between PSRAM latency and vectorization speedup?"
details:
  realistic_solution: An L5 engineer will quantify the PSRAM access penalty against the vectorization
    speedup. Because the ESP32-S3 has a data cache for PSRAM, if the memory access pattern is predictable,
    the cache miss penalty is manageable. The engineer should calculate that the compute cycles saved
    by INT8 vector extensions massively outweigh the PSRAM fetch stalls for the extra 88 KB, making Model
    B the optimal choice.
  common_mistake: Candidates often immediately reject Model B because its peak memory exceeds the 512
    KB on-chip SRAM, assuming PSRAM access will ruin latency. Alternatively, they might choose Model B
    solely for vectorization without quantifying the PSRAM latency penalty.
  napkin_math: 'Model A (15 MFLOPs = 7.5 MMACs): using scalar INT8 (1 MAC/cycle) takes 7.5M cycles, which
    is 31.25 ms at 240 MHz. Model B (25 MFLOPs = 12.5 MMACs): using 4-way INT8 vector extensions (4 MACs/cycle)
    takes ~3.125M compute cycles. Model B exceeds 512 KB SRAM by 88 KB. Reading 88 KB from PSRAM via 32-byte
    cache lines incurs ~2,816 misses. At 40 cycles per miss, the PSRAM stall is ~112,640 cycles. Total
    cycles for Model B is ~3.24M cycles (13.5 ms). Model B is over 2x faster despite utilizing slower
    PSRAM.'
