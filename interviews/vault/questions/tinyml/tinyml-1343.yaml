title: Optimizing Real-time KWS Latency on Cortex-M7 + Ethos-U55
scenario: You are designing an always-on keyword spotting (KWS) system for a low-power edge device using an ARM Cortex-M7 (480 MHz, 512 KB SRAM) and an ARM Ethos-U55 microNPU (256 MAC/cycle). The end-to-end latency from audio capture to actionable output must not exceed 100 ms.
question: How should you decompose and optimize end-to-end KWS latency on a Cortex-M7 plus Ethos-U55 system under a 100 ms target?
details:
  realistic_solution: "1. **Audio Preprocessing (Cortex-M7 CPU):** Implement highly optimized audio feature extraction (e.g., MFCCs) using Arm's CMSIS-DSP libraries for efficient fixed-point arithmetic on the Cortex-M7. Consider windowing/overlapping strategies to minimize CPU busy time. Profiling will identify hotspots. \n2. **Data Transfer (M7 to Ethos-U55):** Leverage DMA controllers to transfer preprocessed audio features from the M7's SRAM to the Ethos-U55's internal scratchpad SRAM. Implement a double-buffering scheme to enable pipelining, where the CPU preprocesses the next frame while the NPU infers on the current frame, minimizing idle time. \n3. **NPU Inference (Ethos-U55):** Ensure the KWS model is quantized to INT8 (Ethos-U55's native format) and optimized using Arm's Vela compiler or equivalent tools to efficiently map it to the NPU's MAC units and memory architecture. Verify the model's intermediate tensors and weights fit within the NPU's scratchpad to avoid external memory accesses which significantly increase latency. \n4. **Post-processing (Cortex-M7 CPU):** Keep post-inference logic (e.g., confidence thresholding, state machine updates, wake-word confirmation) on the M7 CPU extremely lean and highly optimized. This should be minimal given the NPU's role.\n5. **System-level Optimization & Measurement:** Adopt an event-driven, pipelined architecture. Use hardware performance counters (PMU) on both the M7 and Ethos-U55 to accurately measure cycles spent in each stage (TTFT: Time To First Token/Feature, TPOT: Time Per Output Token/Inference, network/bus transfer, pre/post-processing) and identify true bottlenecks."
  common_mistake: |
    **The Pitfall:** Focusing almost exclusively on NPU inference time.
    **The Rationale:** Candidates underestimate latency from CPU-bound audio preprocessing, inefficient data transfers, and post-processing logic.
    **The Consequence:** The overall system fails latency constraints despite having a highly optimized NPU model.
  napkin_math: |
    - Audio input buffer: 16kHz sampling, 30ms window = 480 samples.
    - Hop time: New inference completes every 10ms.
    - Ethos-U55 Inference: 256 MAC/cycle -> ~0.1-0.5 ms for small KWS model.
    - DMA Transfer: 64-feature MFCC vector (256 bytes) -> negligible microseconds.
    - M7 Pre-processing (MFCCs): ~3-5 ms with CMSIS-DSP.
    - **Total Latency:** << 100 ms. The bulk of latency is CPU pre-processing, not NPU inference.
