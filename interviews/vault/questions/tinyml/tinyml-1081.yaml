title: Ping-Pong DMA Architecture for Continuous Audio Inference
scenario: You are designing a continuous wake-word detection system on an ARM Cortex-M4 (STM32F4) running at 168 MHz with 256 KB SRAM and no FPU. A digital microphone streams 16 kHz, 16-bit audio via I2S. The wake-word model requires 1 second of audio context per inference and takes roughly 40 ms to execute utilizing CMSIS-NN SIMD (2x INT8 MACs/cycle).
question: How would you architect the data movement strategy using DMA to ensure zero audio samples are dropped while the CPU computes the inference, and detail the buffer sizes and memory layout?
details:
  realistic_solution: The optimal design uses a ping-pong (double) buffering strategy with the I2S DMA peripheral configured in circular mode. Two separate buffers are allocated in SRAM. While the DMA hardware fills Buffer A in the background without CPU intervention, the CPU performs in-place (zero-copy) CMSIS-NN inference on Buffer B. Upon a DMA Transfer Complete (TC) interrupt, the buffer pointers swap. This fully decouples the high-speed CPU from the slow audio peripheral.
  common_mistake: |
    **The Pitfall:** Using a single buffer with frequent CPU interrupts or copying DMA data to a separate inference buffer.
    **The Rationale:** Developers default to simple sequential programming models or standard buffer copies without leveraging the DMA's circular mode and zero-copy capabilities.
    **The Consequence:** This wastes precious CPU cycles, doubles the SRAM requirement for the audio buffer, and increases power consumption by keeping the CPU awake longer.
  napkin_math: |
    *   **Audio Data Rate:** 16,000 samples/s × 2 bytes/sample = 32 KB/sec.
    *   **Ping-Pong Buffers:** 2 buffers × 32 KB = 64 KB total SRAM used.
    *   **Remaining Memory:** 256 KB SRAM - 64 KB = 192 KB available for NN arena and firmware.
    *   **Time Budget:** 1 second buffer fill time = 168,000,000 CPU cycles at 168 MHz.
    *   **Inference Time:** 40 ms = 6,720,000 cycles.
    *   **CPU Sleep Time:** The CPU is active for 40 ms out of 1000 ms, allowing it to sleep **96% of the time**.
