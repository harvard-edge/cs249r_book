title: The DMA Power-Saving Trade-Off
scenario: You are designing a TinyML device that wakes once per second to capture a 4 KB sensor sample into SRAM. You can either use the Cortex-M4 CPU to memcpy the data, which takes 30 microseconds of active CPU time, or use a DMA controller. The DMA setup requires 5 microseconds of CPU time, after which the hardware performs the 30 microsecond transfer independently while the CPU sleeps.
question: "Which transfer approach minimizes energy for the 4 KB sensor sample, CPU memcpy or DMA with CPU sleep?"
details:
  realistic_solution: The DMA approach is superior for minimizing energy consumption. The core principle of low-power design is to minimize the time the power-hungry CPU is active.
  common_mistake: |
    **The Pitfall:** Concluding that the CPU copy is superior because the total wall-clock time is faster (30 µs vs 35 µs).
    **The Rationale:** Engineers focus exclusively on latency rather than time spent in high-power states.
    **The Consequence:** They miss the crucial energy savings gained by allowing the power-hungry CPU to sleep during the transfer.
  napkin_math: |
    1. Calculate CPU memcpy energy: 50 mW * 30 µs = 1.5 µJ.
    2. Calculate DMA setup energy: 50 mW * 5 µs = 0.25 µJ.
    3. Calculate DMA transfer (CPU sleep) energy: 10 µW (0.01 mW) * 30 µs = 0.0003 µJ.
    4. Calculate total DMA energy: 0.25 µJ + 0.0003 µJ = 0.2503 µJ.
    5. **Final Result: DMA consumes 0.2503 µJ, saving >80% energy compared to 1.5 µJ for CPU copy.**
  options:
  - CPU copy, because its total latency is lower (30µs vs 35µs).
  - DMA, because it allows the power-hungry CPU to sleep during the transfer, saving significant energy.
  - CPU copy, because the DMA setup overhead makes it inefficient for small data transfers.
  - They are equivalent in power consumption because the transfer time is the same in both scenarios.
