title: The DMA Power-Saving Trade-Off
scenario: You are designing a TinyML device that wakes once per second to capture a 4 KB sensor sample
  into SRAM. You can either use the Cortex-M4 CPU to `memcpy` the data, which takes 30 microseconds of
  active CPU time. Alternatively, you can use a DMA (Direct Memory Access) controller. The DMA setup requires
  5 microseconds of CPU time, after which the DMA hardware performs the 30 microsecond transfer independently.
  During the DMA transfer, the CPU can be put into a low-power sleep state. Contrast these two approaches
  and explain which is superior for minimizing the device's overall energy consumption.
question: "Which transfer approach minimizes energy for the 4 KB sensor sample, CPU memcpy or DMA with CPU sleep?"
details:
  realistic_solution: The DMA approach is superior for minimizing energy consumption. The core principle
    of low-power design is to minimize the time the power-hungry CPU is active.
  common_mistake: Engineers often focus exclusively on latency, concluding that the CPU copy is 'faster'
    because the wall-clock time is 30µs vs the DMA's total of 35µs (5µs setup + 30µs transfer). This misses
    the crucial point that energy consumption is about *time spent in high-power states*, not just wall-clock
    time.
  napkin_math: 'Cortex-M4 (168MHz) CPU memcpy for 4KB takes 30µs. Energy = 50mW * 30µs = 1.5µJ. Alternatively, a DMA transfer allows the CPU to sleep (10µW) during the 30µs transfer. DMA sleep energy = 10µW * 30µs = 0.0003µJ. Plus DMA setup (5µs active = 50mW * 5µs = 0.25µJ). Total DMA energy = 0.2503µJ. Using DMA saves >80% of the data transfer energy.'
  options:
  - CPU copy, because its total latency is lower (30µs vs 35µs).
  - DMA, because it allows the power-hungry CPU to sleep during the transfer, saving significant energy.
  - CPU copy, because the DMA setup overhead makes it inefficient for small data transfers.
  - They are equivalent in power consumption because the transfer time is the same in both scenarios.
  correct_index: 1
