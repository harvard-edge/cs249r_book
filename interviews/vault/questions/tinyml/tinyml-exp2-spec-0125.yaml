title: Sub-4-bit Quantization Specification for nRF5340 Audio Model
scenario: You are tasked with deploying a continuous audio event classification model on a Nordic nRF5340,
  which features a 128 MHz app core, 256 KB SRAM, and 1 MB flash. The baseline float32 model has 1.2 million
  parameters and peak float32 activations of 600 KB. Design an extreme quantization specification that
  utilizes sub-4-bit weight compression and activation quantization to meet the device's strict memory
  constraints, ensuring the system can run concurrently with the BLE 5.3 stack operating at ~5mA active.
details:
  realistic_solution: The correct specification applies a mixed-precision or sub-4-bit extreme quantization
    technique like AWQ or GPTQ to the weights, reducing them to an average of 3 bits per parameter, and
    quantizes activations to INT8. The design must explicitly partition the 1 MB flash to leave room for
    the BLE stack and application code, and similarly partition the 256 KB SRAM to ensure the INT8 activations
    do not trigger out-of-memory errors during context switching.
  common_mistake: Candidates often suggest standard uniform 8-bit quantization, failing to realize that
    1.2M INT8 parameters require 1.2 MB, which exceeds the entire 1 MB flash capacity. They also frequently
    forget to reserve SRAM and flash for the BLE 5.3 stack and RTOS, treating the entire memory footprint
    as available for the model.
  napkin_math: 'Baseline weights: 1.2M params * 4 bytes = 4.8 MB (too large). Flash available: 1 MB total
    - 300 KB (RTOS + BLE 5.3) = 700 KB. To fit 1.2M params in 700 KB, max bit-width is (700 * 1024 * 8)
    / 1,200,000 = 4.77 bits/param. Specifying 3-bit average weight quantization yields 1.2M * 3 / 8 =
    450 KB, fitting well within flash. SRAM available: 256 KB total - 64 KB (OS/BLE) = 192 KB. Quantizing
    activations to INT8 reduces peak memory from 600 KB (float32) to 150 KB (INT8), comfortably satisfying
    the 192 KB limit.'
