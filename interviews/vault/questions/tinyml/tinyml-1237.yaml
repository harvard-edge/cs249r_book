title: 'MobileNet Partitioning for ESP32-S3 Memory Hierarchy'
scenario: 'We are deploying a visual wake word detection model using a MobileNetV2-like architecture on an ESP32-S3 microcontroller. The device features 512 KB of fast internal SRAM and 8 MB of external PSRAM connected via SPI. The model''s INT8 quantized parameters and maximum activation feature maps require about 1.5 MB total, forcing us to utilize the slower PSRAM.'
question: 'How should MobileNetV2 execution on ESP32-S3 partition weights and activations between PSRAM and SRAM to minimize latency?'
details:
  realistic_solution: 'The optimal approach is to use depth-first execution or patch-based inference to fuse the operations within the inverted residual blocks. This ensures the massive expanded intermediate activations (which occur between the 1x1 expansion and 3x3 depthwise convolutions) remain entirely within the 512 KB SRAM. Weights are stored in PSRAM and streamed into a small SRAM double-buffer using DMA, overlapping the slow PSRAM read latency with the INT8 vector computations performed by the dual cores on the SRAM-resident activations.'
  common_mistake: 'Candidates typically suggest a naive layer-by-layer execution where both weights and large intermediate activations are spilled to PSRAM. They fail to recognize that the SPI-connected PSRAM bandwidth is significantly slower than the dual-core Xtensa computation speed, turning a compute-bound convolution into a severe memory-bound bottleneck.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Expanded Activation: 32x32x96 (96 KB).
    - PSRAM Bandwidth: ~40 MB/s. Xtensa INT8 Compute: ~4 MACs/cycle at 240 MHz.

    **Calculations:**
    - PSRAM SPI Spill time: (96 KB / 40 MB/s) * 2 = 4.9 ms.
    - Depthwise Conv compute time: 884,000 MACs / (240M * 4) = ~0.9 ms.

    **Conclusion & Interpretation:**
    - **Result: Fused Execution Required (Memory Bandwidth Bound)**. Spilling intermediate activations to PSRAM imposes a 4.9ms latency penalty, entirely neutralizing the high-speed 0.9ms core compute.
