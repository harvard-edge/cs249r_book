title: 'TinyML TCO Specification: Design $100K Budget TinyML Infrastructure'
scenario: 'Specify a complete TinyML infrastructure deployment for a smart building
  company with a $100K 3-year budget. Requirements: 500 Cortex-M4 sensors for HVAC
  optimization, 100 ESP32-S3 sensors for occupancy (WiFi needed), 10 Cortex-M7+Ethos-U55
  edge gateways. Include: hardware, LoRaWAN connectivity, cloud backend, model development,
  and operations. Verify against $100K budget constraint.'
question: How would you verify against $100K budget constraint?
details:
  realistic_solution: 'Hardware: 500*$3(M4)+100*$5(ESP32)+10*$12(M7+Ethos)=$1500+$500+$120=$2,120.
    LoRa gateways: 600/100*$500=$3K. Connectivity: 600*$0.05*36mo=$1,080. Cloud (AWS
    IoT + dashboard): $2K/yr*3=$6K. Occupancy WiFi (ESP32): piggyback on building
    WiFi, $0. Model development: 3 models (HVAC, occupancy, anomaly) at $15K each=$45K.
    Model maintenance: $10K/yr*3=$30K. Operations/monitoring: $5K/yr*3=$15K. Deployment
    labor: 610 sensors * $20/install=$12,200. Training data: $2K. Total: $2,120+$3K+$1,080+$6K+$45K+$30K+$15K+$12,200+$2K=$116,400.
    Over $100K by $16.4K. Cut: reduce model development to 2 models ($30K): saves
    $15K. Reduce monitoring: $3K/yr: saves $6K. Total: $95.4K < $100K.'
  common_mistake: Specifying hardware first and running out of budget before accounting
    for model development, cloud backend, and operations — the non-hardware costs
    often exceed hardware cost for TinyML deployments.
  napkin_math: 'HW: $2,120. Gateways: $3K. Connectivity: $1,080. Cloud: $6K. Model
    dev: $45K. Maint: $30K. Ops: $15K. Install: $12.2K. Data: $2K. Total: $116.4K.
    Over budget $16.4K. Optimization: (1) Reduce to 2 models (merge HVAC+anomaly):
    -$15K. (2) Use Grafana open-source vs paid monitoring: -$3K/yr savings on ops
    = -$9K. (3) Self-install: reduce install labor to $5/sensor: -$8K. New: $116.4-$15-$9-$8=$84.4K.
    Under $100K by $15.6K. This is best practice: hardware is <3% of TinyML budget.
    Model development and operations dominate. Plan for 70-80% of budget on software/ops.'
