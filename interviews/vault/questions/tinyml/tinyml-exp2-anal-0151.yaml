title: Memory vs Compute Energy in ESP32-S3 Workloads
scenario: You are profiling an audio model on an ESP32-S3 (240 MHz dual-core Xtensa, 512 KB SRAM, 8 MB
  PSRAM). To save space, model weights are stored in the 8 MB external PSRAM, while activations fit in
  the 512 KB internal SRAM. You observe that a Fully Connected layer with 100,000 INT8 MACs consumes roughly
  twice the total energy of a Convolutional layer with 500,000 INT8 MACs. Assuming an INT8 MAC using vector
  extensions costs 0.1 pJ, an internal SRAM fetch costs 5 pJ, and an external PSRAM fetch costs 100 pJ,
  explain why the layer with fewer operations consumes more energy.
details:
  realistic_solution: The behavior is caused by the difference in arithmetic intensity and weight reuse
    between the two layer types. In an FC layer with a batch size of 1, each weight is fetched from the
    expensive external PSRAM and used only once, making the layer entirely memory-bound. The Convolutional
    layer fetches weights from PSRAM and reuses them many times across spatial dimensions, shifting the
    bulk of memory accesses to the much cheaper internal SRAM.
  common_mistake: Candidates often estimate energy consumption purely based on compute operations (MACs),
    failing to recognize that memory access dominates the energy budget. They might incorrectly assume
    the FC layer should consume 5x less energy because it has 5x fewer compute operations.
  napkin_math: 'FC Layer (100k MACs, 100k weights): MAC energy = 100,000 * 0.1 pJ = 0.01 uJ. PSRAM weight
    fetches = 100,000 * 100 pJ = 10.0 uJ. Total FC Energy = 10.01 uJ. Conv Layer (500k MACs, 1k weights,
    reused 500x): MAC energy = 500,000 * 0.1 pJ = 0.05 uJ. PSRAM weight fetches = 1,000 * 100 pJ = 0.1
    uJ. SRAM activation reads (2 per MAC) = 1,000,000 * 5 pJ = 5.0 uJ. Total Conv Energy = 5.15 uJ. The
    FC layer consumes nearly 2x more energy despite 5x fewer MACs because PSRAM fetches completely dominate
    the energy profile.'
