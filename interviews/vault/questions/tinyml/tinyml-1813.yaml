title: Dual-Core RP2040 Pipeline Bubble Fraction
scenario: A dual-core RP2040 executes a cascaded wake-up CNN. Core 0 performs feature extraction in 15ms, and Core 1 performs classification in 5ms. The hardware FIFO interconnect imposes a 1ms synchronization barrier per microbatch transfer.
question: What is the pipeline compute bubble fraction for Core 1 during steady-state processing?
details:
  realistic_solution: In an asymmetric pipeline, overall throughput is bottlenecked by the slowest stage. Core 0 dictates the steady-state pipeline interval (15ms execution + 1ms sync = 16ms). Because Core 1 only requires 5ms to execute its task within this 16ms window, it is starved for data and sits idle for the remaining 11ms, resulting in a massive compute bubble.
  common_mistake: |
    **The Pitfall:** Evaluating synchronization latency independently of workload balance.
    **The Rationale:** Candidates focus exclusively on the 1ms explicit FIFO sync barrier while ignoring the severe execution asymmetry between the two cores.
    **The Consequence:** They drastically underestimate pipeline inefficiency, missing that Core 1 operates at less than 35% utilization and is effectively starved.
  napkin_math: |
    1. **Assumptions & Constraints**:
       - Core 0 execution = 15ms. Core 1 execution = 5ms.
       - FIFO Synchronization = 1ms.
    2. **Calculations**:
       - Pipeline Interval: max(15ms, 5ms) + 1ms sync = 16ms.
       - Core 1 Idle Time: 16ms - 5ms = 11ms.
       - Core 1 Bubble Fraction: 11ms / 16ms = 0.6875 (68.75%).
    3. **Conclusion & Interpretation**:
       - **Result: Compute-Bound Imbalance**. Core 1 suffers a 68.75% bubble fraction, indicating extreme pipeline inefficiency and the need to rebalance layers across the cores.
