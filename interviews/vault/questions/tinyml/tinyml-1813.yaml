title: Dual-Core RP2040 Pipeline Bubble Fraction
scenario: A dual-core RP2040 (133 MHz) runs a 4-stage cascaded wake-up CNN. Core 0
  executes feature extraction (15ms), while Core 1 executes classification (5ms).
  The interconnect is a hardware FIFO that introduces a 1ms synchronization barrier
  per microbatch transfer.
question: Evaluate the pipeline compute bubble fraction for Core 1 during steady-state
  processing.
details:
  realistic_solution: In a pipeline, the throughput is dictated by the bottleneck
    stage. Core 0 takes 15ms plus a 1ms FIFO sync barrier, creating a steady-state
    pipeline interval of 16ms. Core 1 only computes for 5ms during this 16ms interval,
    leaving 11ms of idle time per cycle. The bubble fraction for Core 1 is therefore
    11ms / 16ms = 68.75%.
  common_mistake: Calculating the bubble purely based on the 1ms synchronization barrier
    while ignoring the massive workload imbalance that forces Core 1 to stall.
  napkin_math: Interval = max(15, 5) + 1 = 16ms; Core 1 Idle = 16 - 5 = 11ms; Bubble
    = 11 / 16 = 68.75%
