title: Dual-Core RP2040 Pipeline Bubble Fraction
scenario: A dual-core RP2040 runs a 4-stage cascaded wake-up CNN. Core 0 executes feature extraction (15ms), while Core 1 executes classification (5ms). The interconnect is a hardware FIFO that introduces a 1ms synchronization barrier per microbatch transfer.
question: Evaluate the pipeline compute bubble fraction for Core 1 during steady-state processing.
details:
  realistic_solution: In a pipeline, the throughput is dictated by the bottleneck stage. Core 0 takes 15ms plus a 1ms FIFO sync barrier, creating a steady-state pipeline interval of 16ms. Core 1 only computes for 5ms during this 16ms interval, leaving 11ms of idle time per cycle. The bubble fraction for Core 1 is therefore 11ms / 16ms = 68.75%.
  common_mistake: |
    **The Pitfall:** Only counting the explicit sync barrier.
    **The Rationale:** Candidates focus entirely on the 1ms FIFO delay while ignoring the severe workload imbalance between the cores.
    **The Consequence:** They dramatically underestimate pipeline inefficiency, missing that Core 1 is starved for work.
  napkin_math: |
    - Pipeline Interval = max(15ms, 5ms) + 1ms sync = 16ms.
    - Core 1 Idle Time = 16ms - 5ms = 11ms.
    - Core 1 Bubble Fraction = 11 / 16 = **68.75%**.
