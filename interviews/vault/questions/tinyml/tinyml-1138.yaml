title: Evaluating Pruning Strategies on nRF5340
scenario: 'You are deploying a predictive maintenance CNN on a microcontroller. The BLE stack and OS consume 100 KB SRAM and 400 KB flash, leaving 156 KB SRAM and 600 KB flash for ML. The baseline dense model has 500,000 INT8 parameters (500 KB flash) and requires 300 KB peak SRAM for activations. You must choose between Option A: 80% unstructured pruning, or Option B: 50% structured filter pruning.'
question: Which option do you deploy to minimize active power draw (~5mA) and satisfy memory constraints?
details:
  realistic_solution: 'Option B (50% structured pruning) is the correct choice. Structured filter pruning physically reduces the dimensions of the network, which proportionally reduces both the stored weights and the intermediate activation maps.'
  common_mistake: |
    **The Pitfall:** Choosing unstructured pruning simply because 80% is a larger reduction than 50%.
    **The Rationale:** Failing to account for the metadata storage overhead of sparse matrices and overlooking that unstructured pruning does not reduce activation maps.
    **The Consequence:** The model still exceeds the SRAM constraints, and the irregular memory access patterns increase execution latency and power draw.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 256 KB SRAM. Available for ML: 156 KB SRAM.
       - Baseline Model: 500 KB Flash, 300 KB SRAM.
    2. **Calculations:**
       - Option A (80% unstructured): 100K weights (100 KB) + 16-bit index per weight (200 KB) = 300 KB Flash. Peak SRAM remains ~300 KB (Fails 156 KB constraint).
       - Option B (50% structured): Halving channels reduces weights by ~50% (250 KB Flash) and roughly halves activation memory to ~150 KB peak SRAM.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (150 KB < 156 KB. Option B safely fits constraints).**
