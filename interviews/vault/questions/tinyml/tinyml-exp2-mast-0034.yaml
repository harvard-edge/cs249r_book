title: Energy-Optimal Architecture for Corstone-300
scenario: You are tasked with designing the neural network architecture for an always-on visual wake-word
  system running on an ARM Corstone-300 subsystem (480 MHz Cortex-M7, Ethos-U55 NPU configured for 256
  MAC/cycle, 512 KB shared SRAM). The current baseline model achieves the required accuracy, but its 800
  KB peak activation size forces spilling intermediate tensors to external SPI PSRAM, heavily draining
  the system battery. Design a novel model architecture and execution schedule that trades off computational
  complexity for memory locality to minimize total energy per inference.
question: "How would you design a novel model architecture and execution schedule that trades off computational complexity for memory locality to minimize total energy per inference?"
details:
  realistic_solution: The optimal design adopts an aggressive bottleneck architecture and operator fusion
    (depth-first execution) to keep all intermediate feature maps strictly within the 512 KB shared SRAM.
    Even if this requires recomputing some overlapping receptive fields or increasing the total MAC count,
    eliminating external memory bandwidth completely dominates the energy savings. The Cortex-M7 can remain
    in a low-power state while the Ethos-U55 orchestrates the SRAM-only execution.
  common_mistake: Candidates often focus solely on reducing the total MAC count to save power, ignoring
    Horowitz energy principles. They fail to realize that an external PSRAM fetch costs roughly two orders
    of magnitude more energy than an 8-bit MAC on the Ethos-U55, making memory spills the true energy
    bottleneck.
  napkin_math: 'Assume an 8-bit MAC on the Ethos-U55 costs ~0.2 pJ, a 32-bit internal SRAM access costs
    ~5 pJ, and external PSRAM access costs ~100 pJ/byte. Baseline model: 10M MACs, 1 MB external PSRAM
    traffic (spill read/write). Compute energy = 10M * 0.2 pJ = 2 uJ. External memory energy = 1 MB *
    100 pJ/byte = 100 uJ. Total = 102 uJ. Proposed SRAM-only model: Increases compute to 15M MACs to enable
    memory-efficient fused blocks (peak memory < 450 KB, fitting entirely in the 512 KB SRAM). New compute
    energy = 15M * 0.2 pJ = 3 uJ. Added SRAM access energy = ~2 MB * (5 pJ / 4 bytes) = 2.5 uJ. New Total
    = 5.5 uJ. This achieves an ~18x energy reduction by trading cheap compute for expensive external memory
    access.'
