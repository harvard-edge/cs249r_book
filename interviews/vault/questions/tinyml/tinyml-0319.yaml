title: The Microcontroller Roofline
scenario: 'You''re optimizing a keyword spotting model for a Cortex-M4 microcontroller. A key layer is a 3x3 depthwise convolution that operates on a 16x16x32 tensor using FP32 precision.'
question: 'What is the arithmetic intensity of the FP32 3x3 depthwise convolution, and is it compute-bound or memory-bound?'
details:
  realistic_solution: 'The operation is compute-bound. The Cortex-M4''s ridge point is very low (~0.28 Ops/Byte), meaning it has relatively little compute for its memory bandwidth. The convolution layer has an Arithmetic Intensity of ~2.2 Ops/Byte, which is significantly higher than the device''s ridge point. Therefore, the CPU''s ability to perform calculations is the bottleneck, not the memory system''s ability to feed it data.'
  common_mistake: |
    **The Pitfall:** Assuming all operations on a microcontroller are memory-bound.
    **The Rationale:** Engineers fail to calculate the device's Ridge Point and compare it to the workload's Arithmetic Intensity.
    **The Consequence:** Optimization efforts are wasted on memory bandwidth when compute is the actual bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3x3 depthwise convolution on a 16x16x32 FP32 tensor.
    - Cortex-M4 Ridge Point is ~0.28 Ops/Byte (e.g., 336 MOps/s / 1.2 GB/s).

    **Calculations:**
    - DW conv operations: 16 * 16 * 32 * 3 * 3 * 2 = 147,456 Ops.
    - Data moved: Input (32,768B) + Kernel (1,152B) + Output (32,768B) = 66,688 Bytes.
    - Arithmetic Intensity (AI): 147,456 Ops / 66,688 B = 2.21 Ops/Byte.

    **Conclusion & Interpretation:**
    - **Result: 2.21 Ops/Byte (Compute-Bound)**. Since 2.21 >> 0.28, the workload sits on the compute-bound plateau of the roofline model.
  options:
  - '~2.2 Ops/Byte; Memory-Bound'
  - '~1.1 Ops/Byte; Compute-Bound'
  - '~2.2 Ops/Byte; Compute-Bound'
  - '~0.28 Ops/Byte; Memory-Bound'
  correct_index: 2
