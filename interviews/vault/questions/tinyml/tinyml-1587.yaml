title: Microcontroller State Checkpointing Energy
scenario: A solar-powered MCU runs a continuous anomaly detection loop. Power drops happen randomly. Writing a 4KB state checkpoint to NVRAM takes 10ms and 20mW.
question: Calculate the daily energy overhead in Joules if the device checkpoints every 5 seconds.
visual:
  kind: svg
  path: tinyml-1587.svg
  alt: Timeline indicating periodic checkpoints and the recovery point after a power failure.
  caption: Periodic Checkpoint Recovery
details:
  realistic_solution: "There are 86400 seconds in a day. Checkpointing every 5 seconds yields 17280 checkpoints per day. Each checkpoint takes 10ms (0.01s) at 20mW (0.02W), consuming 0.0002 Joules. Total daily overhead is 17280 * 0.0002 = 3.456 Joules."
  common_mistake: |
    **The Pitfall:** Incorrectly converting units.
    **The Rationale:** Failing to convert milliwatts and milliseconds into Joules (Watt-seconds) correctly.
    **The Consequence:** Calculating a daily energy overhead that is off by factors of 1000, leading to incorrect battery sizing.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Checkpoint frequency: Every 5 seconds.
       - Time per checkpoint: 10 ms.
       - Power per checkpoint: 20 mW.
    2. **Calculations:**
       - Checkpoints per day: 86,400 seconds / 5 seconds = 17,280 checkpoints.
       - Energy per checkpoint: 0.01 s * 0.02 W = 0.0002 Joules.
       - Total daily overhead: 17,280 * 0.0002 = 3.456 Joules.
    3. **Conclusion & Interpretation:**
       - **Result: Energy-Bound (3.456 Joules overhead per day).**
