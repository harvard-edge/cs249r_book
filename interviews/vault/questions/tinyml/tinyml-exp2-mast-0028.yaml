title: Heterogeneous Vision Architecture on ESP32-S3
scenario: 'You are designing a battery-powered security camera running a 200M MAC, 4MB INT8 object detection
  model. The system uses an ESP32-S3 (240 MHz dual-core Xtensa, 512 KB SRAM, 8 MB PSRAM, WiFi/BLE, INT8
  vector extensions). You must architect the system by comparing two deployment paradigms: executing the
  model entirely on the ESP32-S3 cores versus pairing it with an external SPI-attached NPU ASIC. Synthesize
  a processing pipeline that minimizes latency and energy, explicitly evaluating the programmability-efficiency
  tradeoffs and memory bandwidth bottlenecks.'
details:
  realistic_solution: The correct architecture offloads the 200M MAC inference to a dedicated NPU ASIC
    due to the ESP32-S3's compute and cache bottlenecks, while retaining the ESP32 for WiFi/BLE and programmable
    preprocessing. Because the 4MB model exceeds the 512KB SRAM, running it on the CPU requires constant
    fetching from the 8MB PSRAM, causing severe cache thrashing. The design must utilize QSPI to stream
    the image to the NPU to ensure the communication overhead does not eclipse the accelerator's compute
    speedup.
  common_mistake: Candidates often overestimate the ESP32-S3's vector extensions without calculating the
    cycles required for 200M MACs, or they blindly propose an external NPU without calculating the massive
    latency and energy overhead of transferring image frames over the ESP32-S3's SPI bus.
  napkin_math: '1. ESP32-S3 Compute: Dual-core 240 MHz with INT8 vector extensions yields ~150 effective
    MMAC/s. A 200M MAC inference takes ~1.3 seconds of continuous compute at ~330mW (~430 mJ).

    2. CPU Memory Bottleneck: Fetching the 4MB model from Octal PSRAM (80 MHz DDR = 160 MB/s theoretical
    max) takes a minimum of 25ms, but cache misses will drastically increase the 1.3s compute time.

    3. NPU Communication: Sending a 320x240 INT8 grayscale image (76.8 KB) over ESP32-S3 QSPI at 40 MB/s
    takes ~1.9 ms.

    4. Conclusion: Even if the external NPU takes 5 ms for inference, the total latency (~7 ms) and energy
    (< 2 mJ) is orders of magnitude better than the ESP32-S3, fully justifying the ASIC despite the loss
    of programmability.'
