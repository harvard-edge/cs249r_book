title: Vibration Ingestion Buffer Sizing
scenario: We are streaming continuous high-frequency vibration data (10 kHz sampling rate, 16-bit resolution) into a Nordic nRF5340 for a predictive maintenance ML model. The device has 256 KB of SRAM, but the OS, networking stack, and ML model require 216 KB, leaving exactly 40 KB of SRAM available for data ingestion. To minimize power consumption and keep near the ~5mA active target, we use DMA with a double-buffer (ping-pong) strategy while the 128 MHz app core sleeps.
question: How would you calculate the maximum sleep duration in milliseconds for the app core before it must wake up to process a filled buffer?
details:
  realistic_solution: The correct approach uses a ping-pong buffer layout, dividing the 40 KB evenly so the DMA can fill one 20 KB buffer while the 128 MHz app core processes the other. We calculate the data rate in bytes per second, then divide the single buffer size by this rate to find the maximum time the processor can remain in sleep mode without dropping samples.
  common_mistake: |
    **The Pitfall:** Forgetting double-buffering requirements.
    **The Rationale:** Candidates often use the full 40 KB for a single sleep calculation instead of halving it for the ping-pong layout.
    **The Consequence:** They overestimate the maximum safe sleep duration by 2x, resulting in data loss when the buffer overwrites before processing.
  napkin_math: |
    - Calculate Data Rate: 10,000 samples/sec * 2 bytes/sample (16-bit) = 20,000 bytes/second.
    - Calculate Buffer Size: 40 KB total available SRAM = 40 * 1024 = 40,960 bytes.
    - Calculate Ping-Pong Split: 40,960 / 2 = 20,480 bytes per buffer.
    - Calculate Sleep Duration: 20,480 bytes / 20,000 bytes/second = 1.024 seconds.
    - **Conclusion: The maximum safe sleep duration is 1024 milliseconds.**
