title: Vibration Ingestion Buffer Sizing
scenario: We are streaming continuous high-frequency vibration data (10 kHz sampling rate, 16-bit resolution) into an MCU for a predictive maintenance ML model. The device has exactly 40 KB of SRAM available for data ingestion. To minimize power consumption and keep near the active target, we use DMA with a double-buffer (ping-pong) strategy while the high-speed app core sleeps.
question: How would you calculate the maximum sleep duration in milliseconds for the app core before it must wake up to process a filled buffer?
details:
  realistic_solution: 'The correct approach uses a ping-pong buffer layout, dividing the 40 KB evenly so the DMA can fill one 20 KB buffer while the 128 MHz app core processes the other. We calculate the data rate in bytes per second, then divide the single buffer size by this rate to find the maximum time the processor can remain in sleep mode without dropping samples.'
  common_mistake: |
    **The Pitfall:** Forgetting double-buffering requirements.
    **The Rationale:** Candidates use the full 40 KB for a single sleep calculation instead of halving it to account for the ping-pong buffer layout required by the DMA.
    **The Consequence:** They overestimate the maximum safe sleep duration by exactly 2x, resulting in data loss when the buffer silently overwrites itself before processing.
  napkin_math: |
    **Assumptions & Constraints:**
    - Data rate: 10 kHz, 16-bit (2 bytes/sample).
    - Available SRAM: 40 KB.
    - DMA architecture: Ping-pong (double buffer).

    **Calculations:**
    - Byte rate: 10,000 * 2 = 20,000 bytes/sec.
    - Total buffer size: 40 KB = 40 * 1024 = 40,960 bytes.
    - Single buffer size (Ping or Pong): 40,960 / 2 = 20,480 bytes.
    - Max sleep duration: 20,480 bytes / 20,000 bytes/sec = 1.024 seconds.

    **Conclusion & Interpretation:**
    - **Result: 1024 milliseconds (I/O-Bound)**. The maximum safe sleep duration for the app core is exactly 1024 milliseconds.
