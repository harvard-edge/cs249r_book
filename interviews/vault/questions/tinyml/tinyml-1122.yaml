title: 'Partitioning Workloads on Cortex-M7 and Ethos-U55'
scenario: 'You are deploying a predictive maintenance model on an ARM Corstone-300 subsystem (Cortex-M7 at 480 MHz, Ethos-U55 NPU) sharing a strict 512 KB SRAM budget. Architecture A is a pure CNN (100% NPU supported) requiring 420 KB of SRAM for weights and activations. Architecture B introduces custom recurrent layers requiring Cortex-M7 fallback, reducing total SRAM to 250 KB but splitting computation. The system also needs memory for RTOS, stack, and sensor DMA buffers.'
question: 'Which Corstone-300 architecture is optimal given the shared SRAM constraints, and what are the system-level latency tradeoffs?'
details:
  realistic_solution: 'Architecture B is the superior choice because it respects system-level constraints. While CPU fallback incurs a latency penalty and requires context switching between the M7 and U55, leaving 262 KB of shared SRAM ensures system stability. A strong engineer will propose using CMSIS-NN on the M7 to optimize the custom layers and leveraging double buffering so the CPU can prepare the next inference window''s data while the NPU computes.'
  common_mistake: |
    **The Pitfall:** Choosing Architecture A to maximize NPU utilization.
    **The Rationale:** Candidates assume keeping 100% of the workload on the accelerator is always optimal for latency and efficiency.
    **The Consequence:** They fail to account for system-level memory constraints, leaving insufficient SRAM for the RTOS and networking stack, causing memory exhaustion and system crashes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Architecture A: 420 KB SRAM.
    - Architecture B: 250 KB SRAM, M7 fallback.
    - Total SRAM: 512 KB.

    **Calculations:**
    - Arch A SRAM: 512 KB - 420 KB = 92 KB remaining (Too small for RTOS/DMA buffers).
    - Arch B SRAM: 512 KB - 250 KB = 262 KB remaining (Safe for system tasks).
    - Arch B Latency (NPU): 4M MACs / (256 MACs/cycle * 480 MHz) = ~0.03 ms.
    - Arch B Latency (M7 Fallback): 1M MACs / (2 MACs/cycle * 480 MHz) = ~1.04 ms.
    - Arch B Total Latency: 0.03 ms + 1.04 ms = ~1.07 ms.

    **Conclusion & Interpretation:**
    - **Result: Architecture B (Memory-Bound)**. The ~1 ms latency penalty is acceptable, whereas Architecture A will cause catastrophic OOM errors.
