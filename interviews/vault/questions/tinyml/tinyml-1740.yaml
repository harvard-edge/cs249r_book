title: Analyze Checkpoint Overhead in Energy-Harvesting MCUs
scenario: A Cortex-M4 relies on intermittent solar energy, causing frequent power
  losses. It saves neural network state to non-volatile FRAM (2ms overhead per save)
  to guarantee progress on a 50ms inference task.
question: Analyze how varying the checkpoint frequency impacts the total expected
  inference time under an unstable power environment.
details:
  realistic_solution: Checkpoints provide a floor to progress but cost 2ms each. If
    checkpoints are too frequent (e.g., every 5ms), the deterministic overhead dominates
    (10 saves = 20ms added). If too infrequent, a power loss near the 45ms mark forces
    discarding a massive amount of compute. The optimal checkpoint interval balances
    the expectation of lost work with the fixed 2ms I/O cost.
  common_mistake: Assuming that maximum checkpoint frequency is always safest, without
    recognizing that excessive I/O time increases the exposure window to power failures.
  napkin_math: 10 saves * 2ms = 20ms overhead. Total time = 50ms + 20ms = 70ms.
