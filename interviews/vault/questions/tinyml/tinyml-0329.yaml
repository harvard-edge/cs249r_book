title: The INT8 Energy Dividend (tinyml-0329)
scenario: You are tasked with deploying a voice activity detection (VAD) model on a Cortex-M4 microcontroller,
  which has a strict power budget of 50mW. Your initial FP32 model is over budget. To reduce power consumption,
  you consider quantizing the model to INT8. State the approximate energy reduction you can expect *per
  operation* by making this change.
question: "What per-operation energy reduction should INT8 quantization provide compared with FP32 on the Cortex-M4?"
details:
  realistic_solution: The correct answer is approximately 18×. The energy consumed by digital logic, particularly
    multipliers, scales more than linearly with bit width. An FP32 multiplier is significantly more complex
    than an INT8 one, involving separate exponent and mantissa logic, leading to a much larger energy
    saving than just the ratio of bit widths would suggest. This is a fundamental invariant based on the
    physics of CMOS switching energy.
  common_mistake: The most common mistake is assuming energy scales linearly with bit width, leading to
    an answer of 4× (32 bits / 8 bits). This ignores the physics of the underlying digital logic, where
    the energy cost of multiplication and addition does not scale linearly with the number of bits.
  napkin_math: 'From the ''Invariants'' table, we know the established energy ratio between FP32 and INT8
    operations is ~18×. If a single FP32 MAC (Multiply-Accumulate) operation costs 3.6 picojoules on a
    given process node, switching to INT8 would reduce the cost to approximately: 3.6 pJ / 18 = 0.2 pJ
    per operation.'
  options:
  - ~4×
  - ~3.4×
  - ~18×
  - ~580×
  correct_index: 2
