title: The ITCM Execution Bottleneck
scenario: You compile a highly optimized custom ML C++ kernel for an NXP i.MX RT crossover MCU (running at 600 MHz). The code is stored in the external QSPI Flash. When you run it, the performance is identical to an MCU running at 150 MHz. You check the cache, and it's enabled.
question: "Why does compiling a custom ML C++ kernel to QSPI Flash cause a 600 MHz Cortex-M7 CPU to effectively run at quarter speed?"
details:
  realistic_solution: 'The 600MHz MCU executes code from external QSPI flash via XIP (execute-in-place). QSPI flash latency is ~20 cycles per cache miss. The 16KB I-cache masks this for most code, but unrolled ML inner loops (often 20-40KB of instructions) thrash the cache. With even a 10% miss rate, effective CPI rises from 1.0 to 3.0, making the 600MHz core perform like 200MHz. Fix: copy the critical ML kernel to ITCM (Instruction Tightly Coupled Memory) for zero wait states and deterministic 1-cycle access. This restores full 600MHz throughput for the compute-intensive path.'
  common_mistake: |
    **The Pitfall:** Stating "The external flash is slow" without analyzing the caching mechanism.
    **The Rationale:** It is slow, but the cache should normally mask that latency for standard code.
    **The Consequence:** The engineer misses the fact that tightly unrolled mathematical loops thrash the I-cache, causing catastrophic CPI spikes that cripple performance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - CPU: 600 MHz Cortex-M7.
       - QSPI Flash access latency: ~20 cycles.
       - Ideal CPI: 1.0.
       - I-cache miss rate for unrolled loop: 10%.
    2. **Calculations:**
       - Effective CPI = (0.9 * 1) + (0.1 * 20) = 0.9 + 2.0 = 2.9 (roughly 3.0).
       - Effective frequency = 600 MHz / 2.9 = ~207 MHz.
    3. **Conclusion & Interpretation:**
       - **Result: Throughput drops by 66%, acting like a 200 MHz core.**
       - **Memory-Bound (Instruction Fetch Stalls)**
