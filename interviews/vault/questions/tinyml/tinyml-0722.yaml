title: The ITCM Execution Bottleneck
scenario: You compile a highly optimized custom ML C++ kernel for an NXP i.MX RT crossover MCU (running
  at 600 MHz). The code is stored in the external QSPI Flash. When you run it, the performance is identical
  to an MCU running at 150 MHz. You check the cache, and it's enabled. Why is the 600 MHz CPU effectively
  running at quarter speed?
details:
  realistic_solution: 'The 600MHz MCU executes code from external QSPI flash via XIP (execute-in-place).
    QSPI flash latency is ~20 cycles per cache miss. The 16KB I-cache masks this for most code, but unrolled
    ML inner loops (often 20-40KB of instructions) thrash the cache. With even 10% miss rate, effective
    CPI rises from 1.0 to 3.0, making the 600MHz core perform like 200MHz. Fix: copy the critical ML kernel
    (typically 8-16KB of the hot inner loop) to ITCM (Instruction Tightly Coupled Memory) — zero wait
    states, deterministic 1-cycle access. This restores full 600MHz throughput for the compute-intensive
    path.'
  common_mistake: '"The external flash is slow." It is slow, but the cache should mask that. The issue
    is what happens during a cache miss in a tight, unrolled mathematical loop.'
  napkin_math: QSPI Flash access = ~20 cycles. ITCM access = 1 cycle. If an unrolled loop misses the cache
    even 10% of the time, the effective CPI (Cycles Per Instruction) spikes from 1.0 to 3.0, slashing
    the 600 MHz core's throughput by 66%.
