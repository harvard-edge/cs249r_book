title: Average Power Calculation in Duty-Cycled Sensors
scenario: A Cortex-M4 sensor draws 20 mA when active and 10 uA in deep sleep, waking
  once per second for 50 ms inference. The 250 mAh CR2032 battery exhibits a non-linear
  discharge curve - capacity drops to ~150 mAh effective once the cell voltage falls
  below 2.7 V (occurs at ~70% utilization). Leakage current of the chip's analog
  front-end adds a constant 3 uA draw that does not scale with duty cycle.
question: Calculate average current including the analog leakage, then estimate
  the realistic battery lifetime accounting for the non-linear discharge curve (only
  ~150 mAh useful before brownout). Identify which loss term dominates.
details:
  realistic_solution: Active time is 50ms (0.05s) at 20mA. Sleep time is 950ms (0.95s)
    at 0.01mA. Average current = (0.05 * 20mA) + (0.95 * 0.01mA) = 1.0mA + 0.0095mA
    = ~1.01mA. Even though the device sleeps 95% of the time, the active compute phase
    is responsible for over 99% of the total energy drain.
  common_mistake: Failing to convert 10uA to 0.01mA, leading to orders-of-magnitude
    errors in the addition.
  napkin_math: 0.05 * 20 = 1.0mA
