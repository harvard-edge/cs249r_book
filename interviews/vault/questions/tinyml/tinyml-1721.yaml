title: Average Power Calculation in Duty-Cycled Sensors
scenario: A Cortex-M4 sensor draws 20mA when active and 10uA in deep sleep. It wakes
  exactly once per second, taking 50ms to run an inference.
question: Calculate the average current consumption, and identify the phase responsible
  for the vast majority of the battery drain.
details:
  realistic_solution: Active time is 50ms (0.05s) at 20mA. Sleep time is 950ms (0.95s)
    at 0.01mA. Average current = (0.05 * 20mA) + (0.95 * 0.01mA) = 1.0mA + 0.0095mA
    = ~1.01mA. Even though the device sleeps 95% of the time, the active compute phase
    is responsible for over 99% of the total energy drain.
  common_mistake: Failing to convert 10uA to 0.01mA, leading to orders-of-magnitude
    errors in the addition.
  napkin_math: 0.05 * 20 = 1.0mA
