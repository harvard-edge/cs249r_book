title: Average Power Calculation in Duty-Cycled Sensors
scenario: A Cortex-M4 sensor draws 20 mA when active and 10 uA in deep sleep, waking once per second for 50 ms inference. The 250 mAh CR2032 battery capacity drops to ~150 mAh effective once voltage falls below 2.7 V. Analog front-end leakage adds a constant 3 uA draw that does not scale with duty cycle.
question: Calculate average current including analog leakage, estimate the realistic battery lifetime accounting for the non-linear discharge curve, and identify the dominating loss term.
details:
  realistic_solution: Calculate average current by weighting active, sleep, and constant leakage states. Compute lifetime using the effective 150 mAh capacity rather than the nameplate capacity. Reducing the active compute phase directly scales battery life.
  common_mistake: |
    **The Pitfall:** Using the 250 mAh nameplate capacity and ignoring constant analog leakage.
    **The Rationale:** Candidates treat battery capacity as a linear bucket of charge and dismiss microamp leakage as negligible compared to milliamp active states.
    **The Consequence:** Overestimating battery life by ~65%, leading to premature device failure in the field before scheduled maintenance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active: 50 ms @ 20 mA. Sleep: 950 ms @ 10 uA. Leakage: 3 uA (constant).
    - Effective CR2032 capacity: 150 mAh. Wake period: 1000 ms.

    **Calculations:**
    - Active avg: 20 mA * (50/1000) = 1.000 mA.
    - Sleep avg: 0.010 mA * (950/1000) = 0.0095 mA.
    - Total avg current: 1.000 + 0.0095 + 0.003 (leakage) = 1.0125 mA.
    - Realistic Lifetime: 150 mAh / 1.0125 mA = 148.1 hours.

    **Conclusion & Interpretation:**
    - **Result: 148 hours (~6.2 days) lifetime (Compute-Bound)**. Active compute overwhelmingly dominates the power budget (98.8%), meaning the system is completely compute-bound for energy.
