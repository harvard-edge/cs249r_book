title: Average Power Calculation in Duty-Cycled Sensors
scenario: A Cortex-M4 sensor draws 20 mA when active and 10 uA in deep sleep, waking
  once per second for 50 ms inference. The 250 mAh CR2032 battery exhibits a non-linear
  discharge curve - capacity drops to ~150 mAh effective once the cell voltage falls
  below 2.7 V (occurs at ~70% utilization). Leakage current of the chip's analog front-end
  adds a constant 3 uA draw that does not scale with duty cycle.
question: Calculate average current including the analog leakage, then estimate the
  realistic battery lifetime accounting for the non-linear discharge curve (only ~150
  mAh useful before brownout). Identify which loss term dominates.
details:
  realistic_solution: Average current. Active 50 ms at 20 mA contributes 0.05 * 20
    = 1.000 mA. Sleep 950 ms at 10 uA = 0.010 mA contributes 0.95 * 0.010 = 0.0095
    mA. Constant analog-frontend leakage = 3 uA = 0.003 mA, present 100% of the time.
    Total I_avg = 1.000 + 0.0095 + 0.003 = 1.0125 mA. Loss-term ranking. Active compute
    = 1.000 mA (98.8% of total), sleep current = 0.0095 mA (0.94%), analog leakage
    = 0.003 mA (0.30%). Active compute dominates by two orders of magnitude. Battery
    lifetime. Naive estimate = 250 mAh / 1.0125 mA = 247 hours (10.3 days). Realistic
    estimate using the 150 mAh effective figure (CR2032 falls below 2.7 V brownout
    at ~70% utilisation) = 150 / 1.0125 = 148 hours (6.2 days). The non-linear cell
    discharge alone shortens deployment by 40%. Engineering implications. Reducing
    the active phase by 2x (e.g., faster inference or a smaller model) cuts I_avg
    almost in half and roughly doubles deployment life. Tightening the analog front-end
    (3 uA contributes only 0.3%) gives marginal benefit unless the device sleeps for
    hours between activations. Sleep current is already negligible.
  common_mistake: Forgetting the constant 3 uA analog-frontend leakage (it is small
    but a cleanly-overlooked term); or using the 250 mAh nameplate capacity without
    applying the 150 mAh CR2032 brownout- derated figure, which over-states battery
    life by 65%.
  napkin_math: I_avg = 1.0 + 0.0095 + 0.003 = 1.0125 mA. Lifetime nameplate = 250/1.0125
    = 247 h. Lifetime realistic (150 mAh effective) = 148 h ~ 6.2 days. Active compute
    dominates (98.8%).
