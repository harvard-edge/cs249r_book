title: TinyML Memory Latency Analysis on STM32F4
scenario: You are deploying a tiny convolutional neural network (CNN) for keyword spotting on an ARM Cortex-M4
  STM32F4 microcontroller (168 MHz, 256 KB SRAM, no FPU). The CNN requires 100 KB for model weights and
  50 KB for activations, both stored in SRAM. During a critical section of the CNN, there are 500 data
  accesses to SRAM, each taking 2 CPU cycles. This critical section executes 1000 times per inference.
  If the total inference budget for this critical section across all 1000 executions is 10 ms, calculate
  the maximum total CPU cycles available for *non-memory* operations within this critical section per
  inference.
details:
  realistic_solution: Analyze the memory access patterns of critical code sections. Use profiling tools
    to measure actual memory access times. Employ techniques like data locality, efficient data structures,
    and strategic placement of frequently used data in the fastest available memory (e.g., registers,
    if applicable for small datasets) to reduce frequent, non-contiguous accesses. For the given problem,
    the solution involves a straightforward calculation of cycles, but real-world solutions would focus
    on optimizing to meet the budget.
  common_mistake: Overlooking memory access latency as a primary bottleneck, especially in deeply embedded
    systems where CPU cycles are precious and external memory is slow or non-existent. A common mistake
    is to assume all operations are CPU-bound without accounting for the actual cost of data movement
    and access in the memory hierarchy.
  napkin_math: '1. Calculate total available cycles for the critical section: (10 ms * 168 MHz) = (0.010
    s * 168,000,000 cycles/s) = 1,680,000 cycles.

    2. Calculate memory access cycles per execution: 500 accesses * 2 cycles/access = 1,000 cycles.

    3. Calculate total memory access cycles for 1000 executions: 1,000 executions * 1,000 cycles/execution
    = 1,000,000 cycles.

    4. Calculate maximum total CPU cycles for non-memory operations: 1,680,000 total cycles - 1,000,000
    memory access cycles = 680,000 cycles.'
