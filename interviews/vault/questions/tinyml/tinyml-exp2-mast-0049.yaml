title: Dual-Core Real-Time Inference Architecture
scenario: You are designing a predictive maintenance sensor using the Nordic nRF5340. The system must
  process vibration data at 1 kHz, requiring a CNN-based anomaly detector to execute within a strict 1ms
  real-time deadline (WCET) while simultaneously streaming alerts over BLE 5.3. Given the nRF5340 features
  a 128 MHz app core, a 64 MHz net core, and 256 KB SRAM, synthesize an interrupt-driven pipeline that
  guarantees the ML deadline without causing BLE connection drops or radio timeouts.
details:
  realistic_solution: Architect a hard-partitioned system utilizing the nRF5340's asymmetric dual cores.
    Dedicate the 64 MHz network core entirely to the BLE 5.3 stack to guarantee rigid radio timing. Run
    the DSP and ML CNN on the 128 MHz application core, triggered via DMA interrupts. Use a lock-free
    ring buffer in the 256 KB shared SRAM for IPC to pass anomaly flags asynchronously, decoupling ML
    execution from radio preemptions.
  common_mistake: Candidates typically attempt to run both the ML inference and the BLE stack on the faster
    128 MHz application core. This causes the high-priority BLE radio interrupts to preempt the ML pipeline
    unpredictably, extending its WCET past the 1ms budget and causing dropped frames or system ANRs.
  napkin_math: At 128 MHz, the app core has a budget of 128,000 cycles per 1ms deadline. If the CNN requires
    40,000 MACs (averaging 1.5 cycles/MAC with ARM DSP instructions), inference consumes 60,000 cycles
    (0.47ms). Reserving 20,000 cycles (0.15ms) for DMA setup and DSP/FFT yields a total WCET of 80,000
    cycles (0.62ms). This leaves 0.38ms for the app core to enter a low-power sleep state, preserving
    the ~5mA active current budget.
