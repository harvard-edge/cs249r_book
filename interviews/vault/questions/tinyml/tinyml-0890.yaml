title: 'Model Size Estimation: Specify Memory-Optimal Architecture for Battery-Powered MCU'
scenario: 'Specify a model architecture for a battery-powered presence detection sensor on Cortex-M4 (168MHz, 256KB SRAM, 512KB Flash) running on a CR2032 coin cell (220mAh, 3V). Requirements: detect presence within 1 second, >95% accuracy, operate for 1 year.'
question: How would you derive maximum model parameters, inference latency, duty cycle, and average power budget?
details:
  realistic_solution: Calculate power envelope strictly. 1 year requires a 75.4 µW budget. Accounting for sleep power, the active budget mandates a 0.046% duty cycle, capping models at ~77K MACs per inference to avoid early battery death.
  common_mistake: |
    **The Pitfall:** Designing for maximum accuracy without power constraints.
    **The Rationale:** Candidates build a complex model to hit 95% accuracy without verifying if running it continuously fits the tiny energy envelope.
    **The Consequence:** The CR2032 battery drains in weeks rather than a year, resulting in total product failure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - CR2032: 220 mAh at 3V = 660 mWh. Target life: 8760 hours.
       - M4 active: 50 mA (150 mW). Sleep: 2 µA (6 µW).
    2. **Calculations:**
       - Total power budget: 660 mWh / 8760 h = 75.4 µW.
       - Active budget: 75.4 - 6 = 69.4 µW.
       - Max duty cycle: 69.4 µW / 150,000 µW = 0.046%.
       - At 1 Hz: 0.46 ms active. Cycles: 0.46 ms * 168M = 77K MACs.
       - Adjusting to 0.1 Hz (10s polling): duty=0.005%, power=13.5 µW. 77K MACs per inference.
    3. **Conclusion & Interpretation:**
       - **Result: 77K MACs at 0.1 Hz.** The system is extremely **Power-Bound**, requiring drastic duty-cycling to hit the 1-year battery constraint.
