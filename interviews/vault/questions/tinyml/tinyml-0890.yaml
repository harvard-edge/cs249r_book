title: 'Model Size Estimation: Specify Memory-Optimal Architecture for Battery-Powered
  MCU'
scenario: 'Specify a model architecture for a battery-powered presence detection sensor
  on Cortex-M4 (168MHz, 256KB SRAM, 512KB Flash) running on a CR2032 coin cell (220mAh,
  3V). Requirements: detect presence within 1 second, >95% accuracy, operate for 1
  year. Derive maximum model parameters, inference latency, duty cycle, and average
  power budget.'
question: How would you derive maximum model parameters, inference latency, duty cycle,
  and average power budget?
details:
  realistic_solution: '1 year = 8760h. CR2032: 220mAh × 3V = 660mWh. Power budget:
    660mWh/8760h = 0.0754mW = 75.4μW. M4 deep sleep: 2μA × 3V = 6μW (reasonable).
    Active at 168MHz: ~50mA × 3V = 150mW. Budget for active: 75.4-6=69.4μW from compute.
    Duty cycle: 69.4μW/150,000μW = 0.046% → 0.046% of time active = 0.046ms/100ms?
    Per second: 0.00046s = 0.46ms active per second. Model must complete in 0.46ms.
    0.46ms × 168M cycles = 77K cycles. At 1 MAC/cycle: 77K MACs max = 77K op model.
    INT8: 77KB model. SRAM: 256KB (38KB budget after runtime). Achieves 95%? DS-CNN-XS
    at 77K MACs achieves ~89%. Need faster M7 class for 95% with 77K MACs.'
  common_mistake: Designing for maximum accuracy without computing the power implications
    of inference frequency; running at 1Hz inference on M4 may drain CR2032 in weeks,
    not a year.
  napkin_math: 'Power budget: 75.4μW. Sleep: 6μW. Active budget: 69.4μW. Duty: 69.4/150,000=0.000463=0.046%.
    Per second: 0.046ms active. Cycles: 0.046ms×168M=7,728 cycles = 7.7K MACs. Too
    small for any useful model! Increase: use 1Hz polling with 5ms active window:
    duty=0.5%. Power: 0.005×150,000+0.995×6=756μW >> 75μW. Solution: 0.1Hz (every
    10s): 0.5ms/10s=0.005%. Power: 0.00005×150,000+6=13.5μW ✓. 77K MACs per inference.
    Trade accuracy for battery.'
