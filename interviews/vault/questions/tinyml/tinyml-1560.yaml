title: Raw ECG BLE Stream Viability
scenario: A wearable medical patch with a Cortex-M4 attempts to stream raw ECG data
  at 16 kHz (16-bit resolution) to a phone via BLE 4.2 (effective throughput 250 kbps).
question: Analyze the bandwidth requirements and determine if raw streaming is viable
  or if edge inference is strictly required.
visual:
  kind: svg
  path: tinyml-1560.svg
  alt: Data flow from patch to phone showing a bottleneck.
  caption: BLE Bandwidth Bottleneck.
details:
  realistic_solution: Raw streaming requires $16,000 \times 16 = 256,000$ bps or 256
    kbps. The effective BLE throughput is only 250 kbps, so raw data exceeds the link
    capacity by 6 kbps. Edge inference (e.g., sending only anomaly flags) is strictly
    required to prevent buffer overflow.
  common_mistake: Using the theoretical maximum BLE 4.2 speed (1 Mbps) instead of
    the effective application-layer throughput.
  napkin_math: 16,000 * 16 bits = 256 kbps. 256 kbps > 250 kbps BLE payload throughput.
