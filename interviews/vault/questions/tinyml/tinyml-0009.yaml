title: The Memory-Mapped Weight Corruption
scenario: You deploy a keyword spotting model where weights are stored in Flash. A bug in your audio code causes a buffer overflow. The device doesn't crash, but the neural network permanently 'forgets' the wake word until a reboot.
question: Based on the memory map, how did a data bug destroy your model?
details:
  realistic_solution: You have Memory-Mapped Corruption. Microcontrollers often use a unified address space. While Flash is 'read-only' for code, rogue pointer writes can trigger Flash erase/write cycles if they hit memory-mapped control registers or MMU regions. The overflow marched a pointer past the end of the audio buffer (beyond 64 KB) into the weight region, corrupting the NPU's 'brain.' The fix is to use the MPU (Memory Protection Unit) to set the weight region as strictly Read-Only at the hardware level.
  common_mistake: |
    **The Pitfall:** Assuming `const` variables in Flash are fundamentally un-writable by the CPU.
    **The Rationale:** Engineers from high-level OS backgrounds assume memory protection is active by default.
    **The Consequence:** They fail to consider that bare-metal hardware allows writes to flash memory addresses, resulting in silent model corruption rather than a hard crash.
  napkin_math: |
    **Assumptions & Constraints:**
    - Audio buffer starts at `0x20000000`.
    - Model weights start at `0x20010000`.

    **Calculations:**
    - Gap between buffer and weights = `0x20010000` - `0x20000000` = `0x10000` (65,536 bytes, or 64 KB).
    - Writing exactly 64 KB fills addresses `0x20000000` through `0x2000FFFF`.

    **Conclusion & Interpretation:**
    - **Result: 64 KB (Memory Corruption)**. An overflow writing more than 64 KB reaches `0x20010000` and silently overwrites the model weights in the unified address space.
