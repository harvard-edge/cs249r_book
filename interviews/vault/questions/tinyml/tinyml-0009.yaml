title: The Memory-Mapped Weight Corruption
scenario: You deploy a keyword spotting model where weights are stored in Flash. A bug in your audio code
  causes a buffer overflow. The device doesn't crash, but the neural network permanently 'forgets' the
  wake word until a reboot. Based on the memory map, how did a data bug destroy your model?
question: "Based on the memory map, how did a data bug destroy your model?"
details:
  realistic_solution: You have **Memory-Mapped Corruption**. Microcontrollers often use a unified address
    space. While Flash is 'read-only' for code, rogue pointer writes can trigger Flash erase/write cycles
    if they hit memory-mapped control registers or MMU regions. The overflow marched a pointer past the
    end of the audio buffer (beyond 64 KB) into the weight region, corrupting the NPU's 'brain.' The fix
    is to use the **MPU (Memory Protection Unit)** to set the weight region as strictly Read-Only at the
    hardware level.
  common_mistake: '"Assuming `const` variables in Flash are fundamentally un-writable by the CPU."'
  napkin_math: If your audio buffer starts at `0x20000000` and weights start at `0x20010000`, a rogue
    loop that writes more than 64 KB of data — say, 64 KB + 1 byte — will reach address `0x20010000` and
    begin overwriting the first bytes of your model weights. Writing exactly 64 KB (65,536 bytes) starting
    at `0x20000000` fills addresses `0x20000000` through `0x2000FFFF`, stopping just one byte short of
    the weight region. Any overflow beyond 64 KB silently corrupts the model.
