title: TinyML Gateway Burst Capacity
scenario: A gateway receives anomaly reports from 2,000 sensors after a power event. Each report is 2 KB and the gateway uplink to the cloud is 5 Mbps.
question: Estimate the minimum time required for the gateway to upload 2,000 TinyML reports of 2 KB each over a 5 Mbps uplink.
details:
  realistic_solution: Total data is 4,000 KB, or 32 megabits. At 5 Mbps, the lower-bound drain time is 6.4 seconds. Retries and protocol overhead increase this, so the gateway should buffer and rate-limit reports.
  common_mistake: |
    **The Pitfall:** Assuming TinyML payloads are negligible and won't saturate network links.
    **The Rationale:** Engineers focus on the tiny size of a single report (2 KB) and ignore the compounding effect of synchronized fleet bursts (the "thundering herd" problem) after an event.
    **The Consequence:** Gateway buffer overflows and widespread data loss during critical events.
  napkin_math: |
    *   **Total Data Volume:** 2,000 sensors * 2 KB = 4,000 KB.
    *   **Convert to Bits:** 4,000 KB * 8 bits/byte = 32,000 Kb = 32 Megabits (Mb).
    *   **Minimum Drain Time:** 32 Mb / 5 Mbps = **6.4 seconds**.
