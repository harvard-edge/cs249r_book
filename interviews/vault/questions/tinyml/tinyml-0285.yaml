title: 'The Privacy Premium: On-Device vs. Cloud TCO'
scenario: You're choosing between two architectures for a new keyword-spotting device with a planned fleet of 100,000 units and a 3-year service life. Option A (Cloud): Uses a $1 'dumb' MCU that streams audio to the cloud, incurring a $0.01/day per-device cloud computing fee. Option B (Edge): Uses a more powerful $3 MCU to run the ML model entirely on-device with zero recurring cloud costs.
question: Assuming no other differing costs, what is the Total Cost of Ownership (TCO) difference between the two architectures?
details:
  realistic_solution: The correct approach is to calculate the full TCO (CapEx + OpEx) for both options over the entire 3-year period and then find the difference.
  common_mistake: |
    **The Pitfall:** Fixating purely on the upfront Bill of Materials (BOM) cost.
    **The Rationale:** Engineers see the $3 MCU as strictly more expensive than the $1 MCU, failing to quantify the massive recurring cloud OpEx.
    **The Consequence:** Selecting a fundamentally flawed architecture that hemorrhages money over the product's operational lifetime.
  napkin_math: |
    - Edge TCO: 100,000 units * $3 = $300,000 CapEx + $0 OpEx = $300,000.
    - Cloud CapEx: 100,000 units * $1 = $100,000.
    - Cloud OpEx: 100,000 units * $0.01/day * (3 years * 365 days) = $1,095,000.
    - Cloud TCO: $100,000 + $1,095,000 = $1,195,000.
    - **TCO Difference:** $1,195,000 - $300,000 = **$895,000 cheaper on the edge**.
  options:
  - $165,000 cheaper
  - $795,000 cheaper
  - $895,000 cheaper
  - $1,095,000 cheaper
  correct_index: 2
