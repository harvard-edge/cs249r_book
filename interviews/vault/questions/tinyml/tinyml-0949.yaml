title: 'TinyML Cooperative Scheduling Spec'
scenario: 'A Cortex-M MCU must run sensor sampling, feature extraction, inference, and BLE transmission without an RTOS.'
question: 'What cooperative scheduling rules prevent TinyML inference from blocking sensor sampling and BLE transmission?'
details:
  realistic_solution: 'Use sensor sampling interrupts for the deadline path, double buffers for data handoff, and short run-to-yield inference chunks in the main loop. BLE transmission should run only when buffers have slack or when lower-priority telemetry can be delayed. Long inference work must yield before sensor deadlines are missed.'
  common_mistake: |
    **The Pitfall:** Writing a single blocking inference loop.
    **The Rationale:** Candidates used to desktop ML assume inference is just a function call that runs to completion.
    **The Consequence:** A 40 ms blocking inference call causes the MCU to miss multiple 10 ms sensor sampling deadlines, leading to dropped frames and corrupted data.
  napkin_math: |
    **Assumptions & Constraints:**
    - Deadline Constraint: Sensor sampling must run every 10 ms.
    - Inference total time: 40 ms.

    **Calculations:**
    - Buffer Hand-off: Double buffering allows sampling to write to Buffer A while inference reads from Buffer B.
    - Chunked Inference: A 40 ms total inference must yield to the main loop at least 4 times (e.g., every 8 ms).

    **Conclusion & Interpretation:**
    - **Result: Chunking < 10 ms (Compute-Bound)**. Run-to-yield guarantees sensor deadlines are met.
