title: Mitigating DPA Attacks on ESP32-S3 Wake-Word Models
scenario: 'You are deploying a proprietary INT8 wake-word model on an ESP32-S3 (240
  MHz dual-core Xtensa, 512 KB SRAM, 8 MB PSRAM, vector extensions for INT8). To defend
  against model extraction via Differential Power Analysis (DPA), you must evaluate
  two defenses: Option A applies algorithmic Boolean masking to weights and activations
  during inference. Option B dedicates Core 0 to standard inference while Core 1 executes
  randomized memory accesses and dummy vector operations to obfuscate the power trace.
  Which approach is better for a real-time smart speaker constraint?'
question: Which ESP32-S3 DPA defense keeps a 15M-MAC wake-word model within real-time
  latency?
details:
  realistic_solution: Option B is the superior system-level design. By leveraging
    the ESP32-S3's dual-core architecture, Core 0 can utilize the INT8 vector extensions
    to complete inference at maximum speed. Meanwhile, Core 1 acts as an active power
    obfuscator by flooding the power trace with dummy vector MACs and PSRAM accesses,
    effectively lowering the attacker's Signal-to-Noise Ratio (SNR) without increasing
    the critical path latency.
  common_mistake: Candidates often choose Option A because masking is the textbook
    cryptographic defense against DPA. They fail to realize that implementing software-based
    Boolean masking breaks compatibility with the ESP32-S3's INT8 vector extensions,
    forcing scalar execution that violates real-time latency constraints.
  napkin_math: Assume a 15M MAC INT8 model. With ESP32-S3 vector extensions (approx.
    16 MACs/cycle), inference takes ~937,500 cycles (3.9 ms at 240 MHz). Option A
    forces scalar execution with masking overhead (approx. 4 cycles/MAC), requiring
    60M cycles (250 ms at 240 MHz), completely missing typical 20ms audio frame deadlines.
    Option B keeps latency at 3.9 ms while sacrificing a marginal power bump on the
    second core.
