title: AOT Compiler Memory Architecture for STM32F4
scenario: You are tasked with designing an Ahead-Of-Time (AOT) compiler's memory management and optimization passes for deploying a keyword spotting CNN onto an ARM Cortex-M4 (STM32F4). The MCU is constrained to 256 KB SRAM and 1 MB flash, with no FPU, relying on CMSIS-NN SIMD instructions (2x INT8 MACs/cycle). A fully quantized INT8 model requires 300 KB of peak activation memory if compiled naively.
question: How should an AOT compiler fuse operators and plan memory so a 300 KB activation model fits in STM32F4 SRAM?
details:
  realistic_solution: The AOT compiler must implement a static memory arena planner that analyzes the liveness of all tensors offline to assign overlapping SRAM offsets, completely avoiding runtime allocation. The compiler must also apply graph-level lowering to fuse operators (e.g., Conv2D -> Add -> ReLU) into single CMSIS-NN library calls. This avoids materializing intermediate feature maps in SRAM. The 1 MB flash holds read-only weights, while the 256 KB SRAM is partitioned for the static activation arena, CMSIS-NN scratchpads, and the RTOS.
  common_mistake: |
    **The Pitfall:** Suggesting runtime garbage collection or basic memory pools without analyzing tensor lifetimes.
    **The Rationale:** Candidates overlook how operator fusion (like Conv+ReLU) directly eliminates intermediate SRAM buffers.
    **The Consequence:** The model fails to compile or deploy due to Out-Of-Memory (OOM) errors on the constrained hardware.
  napkin_math: |
    - Total SRAM: 256 KB. RTOS/stack: 32 KB. Available for ML: 224 KB.
    - Naive peak activations: 300 KB.
    - Operator Fusion: Fusing a 64 KB Convolution output with ReLU eliminates intermediate storage. New peak ≈ 236 KB.
    - Static Liveness Planner: Overlaps non-concurrent buffers by ~30%. Footprint reduces to ~165 KB.
    - **Result:** The 165 KB arena safely fits inside the **224 KB** budget.
