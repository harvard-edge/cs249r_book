title: TinyML MQTT Payload Rate
scenario: A TinyML node publishes a 256-byte MQTT message every 5 seconds.
question: What average payload rate comes from a 256-byte TinyML message every 5 seconds?
details:
  realistic_solution: Average payload rate is 256 / 5 = 51.2 bytes/s before MQTT, TCP, and radio overhead. The protocol overhead may dominate the payload for small messages.
  common_mistake: |
    **The Pitfall:** Optimizing model payload bytes while ignoring fixed protocol overhead for tiny messages.
    **The Rationale:** Developers focus on compressing the ML output but forget that TCP/IP and MQTT headers add significant, fixed bytes to every transmission.
    **The Consequence:** Drastically underestimating network bandwidth usage and radio wake time, leading to unexpected battery drain.
  napkin_math: |
    - **Payload Size:** 256 Bytes.
    - **Frequency:** 1 message every 5 seconds.
    - **Average Rate:** 256 B / 5 s = 51.2 B/s.
    - **Conclusion:** **The raw payload rate is 51.2 B/s, but protocol overhead will heavily dominate this.**
