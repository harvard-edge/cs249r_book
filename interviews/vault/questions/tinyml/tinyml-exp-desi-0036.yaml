title: Architecting Sub-8-bit Weight Quantization for Cortex-M4
scenario: You are designing an always-on predictive maintenance system for an ARM Cortex-M4 (STM32F4)
  microcontroller. The hardware provides 168 MHz compute, 256 KB SRAM, 1 MB flash, no FPU, and CMSIS-NN
  SIMD instructions that yield 2x INT8 MACs/cycle. Your team has a 1.6 million parameter convolutional
  model that requires deployment, but its standard INT8 representation exceeds the device's storage limits.
  Architect an inference system utilizing extreme weight quantization to fit the model on-device while
  maintaining real-time execution speeds.
question: "How would you architect an inference system utilizing extreme weight quantization to fit the model on-device while maintaining real-time execution speeds?"
details:
  realistic_solution: The correct architectural design employs asymmetric quantization where weights are
    compressed to 4-bit in the 1 MB flash, while activations are kept in INT8. At runtime, the system
    allocates a small ping-pong buffer in the 256 KB SRAM to stream and unpack 4-bit weights into INT8
    on the fly. Once unpacked, the system dispatches the compute to CMSIS-NN functions, perfectly exploiting
    the 2x INT8 MACs/cycle SIMD instructions to maximize throughput while satisfying the strict flash
    capacity limits.
  common_mistake: Candidates often propose full 4-bit or 2-bit quantization for both weights and activations
    to save memory. They incorrectly assume the Cortex-M4 can natively execute 4-bit math, failing to
    realize that bit-banging sub-8-bit MACs on this architecture will destroy throughput and ignore the
    available CMSIS-NN INT8 SIMD hardware acceleration.
  napkin_math: 1.6M parameters in INT8 takes 1.6 MB, exceeding the 1 MB flash. Packing weights to 4-bit
    reduces flash usage to 800 KB, leaving 200 KB for application logic. Allocating a 4 KB INT8 unpacking
    buffer easily fits within the 256 KB SRAM. Processing 100,000 MACs using CMSIS-NN SIMD (2 MACs/cycle)
    takes 50,000 cycles. At a 168 MHz clock speed, 50,000 cycles takes roughly 297 microseconds. The fast
    LDR instructions to unpack 4-bit to 8-bit take a fraction of the compute time saved by utilizing the
    native SIMD datapath.
