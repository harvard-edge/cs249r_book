title: Latency Decomposition of SPI Camera Pipeline on Corstone-300
scenario: 'An anomaly detection vision model runs on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) system
  operating at 480 MHz with 512 KB shared SRAM. An external camera is connected via a standard 10 Mbps
  SPI bus. The pipeline works as follows: the M7 captures a 128x128 RGB image (8-bit per channel), converts
  it to grayscale, and passes it to the Ethos-U55 (configured for 256 MAC/cycle) to execute a 5-million
  MAC inference model. The total end-to-end latency from frame request to inference result is measured
  at roughly 40ms. The ML team is confused because the NPU is a dedicated accelerator and the system runs
  at 480 MHz. Analyze this system behavior and explain why the latency is so high.'
details:
  realistic_solution: The bottleneck is entirely in the data acquisition phase (network/IO). Even though
    the ARM Cortex-M7 and Ethos-U55 can preprocess the data and execute the 5M MAC model in less than
    a millisecond, the system is fundamentally blocked waiting for the SPI bus to physically clock in
    the image frame. In real-world TinyML deployments, peripheral I/O and sensor reading frequently dominate
    the overall latency budget, rendering accelerator speed practically irrelevant for single-shot end-to-end
    latency.
  common_mistake: Candidates often tunnel-vision on the neural network compute, assuming SRAM bandwidth
    contention between the M7 and U55 or poor NPU utilization is the bottleneck. They fail to decompose
    the end-to-end pipeline down to the peripheral I/O level, missing that the physical data transfer
    rate of the sensor completely overshadows both CPU and NPU processing times.
  napkin_math: '1. I/O Latency: A 128x128 RGB image is 49,152 bytes, which equals 393,216 bits. Clocking
    this over a 10 Mbps SPI bus takes 393,216 / 10,000,000 = 39.32 ms.

    2. Pre-processing (Cortex-M7): Converting 16,384 pixels from RGB to grayscale takes roughly 15 cycles
    per pixel. 16,384 * 15 = 245,760 cycles. At 480 MHz, this takes 245,760 / 480,000,000 = 0.51 ms.

    3. Inference (Ethos-U55): 5,000,000 MACs running at 256 MACs/cycle requires ~19,531 cycles. At 480
    MHz, inference takes 19,531 / 480,000,000 = 0.04 ms.

    Total Latency = 39.32 ms (Sensor I/O) + 0.51 ms (Prep) + 0.04 ms (NPU compute) ≈ 40 ms.'
