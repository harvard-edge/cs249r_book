title: Energy Cost of Memory vs Compute on Ethos-U55
scenario: You are deploying a keyword spotting model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform running at 480 MHz with 512 KB of shared SRAM. The model contains a dense classification layer requiring 100 KB of 8-bit weights. The NPU must fetch all 100 KB from the shared SRAM to perform 100,000 MAC operations.
question: How much energy do Ethos-U55 dense-layer MACs and SRAM weight fetches consume, and which dominates?
details:
  realistic_solution: A proficient TinyML engineer knows that data movement dominates power consumption, as demonstrated by Horowitz's energy tables. By calculating the compute and memory fetch energies separately, the engineer proves that SRAM accesses cost significantly more than pure arithmetic. This insight drives design decisions like aggressive weight quantization, clustering, or maximizing register-file reuse.
  common_mistake: |
    **The Pitfall:** Focusing solely on arithmetic (MAC) operations for power calculation.
    **The Rationale:** Engineers often equate algorithmic complexity (FLOPs/MACs) directly with energy cost.
    **The Consequence:** The massive energy cost of data movement is ignored, leading to models that drain the battery far faster than anticipated despite low MAC counts.
  napkin_math: |
    *   **Compute Energy:** 100,000 MACs × 0.2 pJ/MAC = 20,000 pJ = 0.02 µJ.
    *   **Memory Accesses:** 100 KB weights (100,000 bytes) fetched via 32-bit (4-byte) reads = 25,000 SRAM accesses.
    *   **Memory Energy:** 25,000 accesses × 10 pJ/access = 250,000 pJ = 0.25 µJ.
    *   **Total Energy:** 0.02 µJ + 0.25 µJ = **0.27 µJ**.
    *   **Conclusion:** Memory fetching consumes **over 12x more energy** than the actual arithmetic computation.
