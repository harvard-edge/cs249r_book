title: The Distillation Temperature Bottleneck
scenario: A 1000-class classification student model was trained via Knowledge Distillation
  (using a Temperature T=5) to run on an ARM Cortex-M4 (STM32F4) clocked at 168 MHz
  with 256 KB SRAM, 1 MB flash, and no FPU. The model's convolutional layers are quantized
  to INT8 and leverage CMSIS-NN SIMD (2x INT8 MACs/cycle), successfully executing
  1.5 million MACs in about 9 ms. However, hardware profiling reveals that the final
  Temperature-scaled Softmax layer (q_i = exp(z_i/T) / sum(exp(z_j/T))) takes an additional
  6 ms, consuming a massive 40% of the total inference time. Explain why this specific
  layer causes such a severe performance degradation and explain the optimal deployment
  strategy.
question: Why this specific layer causes such a severe performance degradation and
  explain the optimal deployment strategy?
details:
  realistic_solution: The extreme bottleneck is caused by the lack of a hardware FPU
    on this Cortex-M4 variant, forcing the CPU to use slow software emulation for
    floating-point division (for T) and exponentiation. Because temperature scaling
    (division by a positive constant) and the exponential function are strictly monotonic,
    they do not alter the relative ordering of the logits. For edge deployment where
    only the predicted class (argmax) is needed, the entire Temperature-scaled Softmax
    layer should be deleted. The argmax should be computed directly on the raw INT8
    output logits.
  common_mistake: Candidates often suggest optimizing the Softmax implementation by
    using Taylor series, look-up tables (LUTs) for exp(), or attempting fixed-point
    quantization of the Softmax layer. They get distracted by mathematical approximation
    techniques and miss that the entire operation is logically redundant for pure
    classification.
  napkin_math: 'Bottleneck execution: 1000 classes * (~800 cycles for soft-FP exp()
    + ~200 cycles for soft-FP division) = 1,000,000 cycles. At 168 MHz, 1,000,000
    cycles / 168,000,000 cycles/sec = 5.95 ms (approx 6 ms overhead). Optimized execution:
    computing argmax directly on 1000 INT8 logits takes 1 cycle per comparison = 1000
    cycles. At 168 MHz, 1000 / 168,000,000 = 0.0059 ms (5.9 microseconds), effectively
    saving ~6 ms and eliminating all FPU emulation penalties.'
