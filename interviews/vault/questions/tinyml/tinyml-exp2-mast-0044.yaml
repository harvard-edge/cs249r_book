title: Dual-Core Operator Scheduling for Heterogeneous Memory
scenario: You are deploying a custom keyword spotting and speaker verification cascade on an ESP32-S3.
  The model consists of a depthwise separable CNN followed by an LSTM, and requires 800 KB of peak working
  memory if scheduled naively, which exceeds the 512 KB internal SRAM. The 8 MB PSRAM is available but
  has significantly higher access latency. Design an operator scheduling and memory allocation strategy
  that utilizes both 240 MHz Xtensa cores and INT8 vector extensions to meet a strict 50ms latency constraint
  while efficiently managing the memory hierarchy.
question: "How should ESP32-S3 schedule a CNN-LSTM cascade across cores and memory tiers to fit 512 KB SRAM and 50 ms?"
details:
  realistic_solution: The optimal strategy uses depth-first scheduling and layer fusion for the CNN to
    eliminate intermediate activation buffers, fitting the CNN working set entirely into SRAM. Core 0
    executes the INT8 CNN using the vector extensions. Concurrently, Core 1 is scheduled as a background
    orchestrator, double-buffering the LSTM weights from PSRAM into a dedicated SRAM ping-pong buffer
    just-in-time, effectively hiding the PSRAM latency behind Core 0's compute.
  common_mistake: Candidates often naively place all weights in the 8 MB PSRAM and activations in SRAM
    without considering the scheduling implications of PSRAM latency stalling the compute. They also frequently
    fail to utilize the dual-core nature of the ESP32-S3 for software pipelining, or overlook layer fusion
    techniques that could reduce the peak activation footprint.
  napkin_math: 'Naive peak memory: 400KB weights + 400KB activations = 800KB (> 512KB SRAM). Fusing the
    CNN layers drops peak activations to 100KB, meaning the 500KB CNN working set fits in SRAM. The 400KB
    LSTM weights reside in PSRAM. Assuming a conservative 40 MB/s PSRAM bandwidth, fetching 400KB takes
    10ms. Because the CNN takes 15ms on Core 0 (240 MHz with INT8 vectors), Core 1 can prefetch the LSTM
    weights during this time, entirely hiding the 10ms fetch latency. Total latency is 15ms (CNN) + 20ms
    (LSTM compute) = 35ms, safely under the 50ms constraint.'
