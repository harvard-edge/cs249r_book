title: Designing a Static Tensor Arena for Wake-Word CNN
scenario: You are tasked with deploying a quantized wake-word detection model onto an ARM Cortex-M4 (STM32F4)
  microcontroller operating at 168 MHz. The device has strict memory constraints with 256 KB of SRAM and
  1 MB of flash, and relies on CMSIS-NN SIMD (2x INT8 MACs/cycle) since there is no FPU. Design a static
  memory allocation strategy that plans the tensor arena to fit within the SRAM limits while accommodating
  the RTOS, and specify how model parameters will be handled.
details:
  realistic_solution: The correct approach involves static memory planning to create a single contiguous
    tensor arena in SRAM for all intermediate activations. Since memory is only needed for the inputs
    and outputs of the currently executing operator, the arena size is determined by the maximum sum of
    adjacent layer activation sizes across the network. Weights and biases must be compiled directly into
    the 1 MB flash memory as read-only data, preserving the limited SRAM.
  common_mistake: Candidates often assume dynamic memory allocation is viable, failing to realize the
    fragmentation risks and latency overhead on a bare-metal MCU. They also frequently forget that read-only
    weights and biases should remain in flash memory, mistakenly loading them into SRAM and falsely concluding
    the model will not fit.
  napkin_math: Consider two adjacent INT8 convolutional layers where Layer A produces a 100 KB activation
    tensor and Layer B produces a 120 KB activation tensor. To compute Layer B using CMSIS-NN, both tensors
    must coexist in the tensor arena, requiring a peak of 220 KB of SRAM. Out of the 256 KB total SRAM
    on the ARM Cortex-M4 (STM32F4), this leaves exactly 36 KB for the RTOS, stack, and application state.
    The model's 800 KB of INT8 weights are stored directly in the 1 MB flash memory, safely fitting the
    hardware constraints.
