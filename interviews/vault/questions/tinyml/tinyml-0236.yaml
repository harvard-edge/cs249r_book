title: The Truck Roll Tax
scenario: You are deploying a fleet of 100,000 battery-powered keyword-spotting sensors for a smart building
  application. Each device costs $10. Over the system's 5-year lifespan, what single factor is most likely
  to dominate the Total Cost of Ownership (TCO)?
question: "Over the system's 5-year lifespan, what single factor is most likely to dominate the Total Cost of Ownership (TCO)?"
details:
  realistic_solution: The dominant cost is overwhelmingly the labor associated with 'truck rolls'—physically
    sending a technician to replace batteries or failed units. While the per-unit hardware cost is low,
    the cost of skilled labor to service 100,000 distributed devices over 5 years becomes the largest
    line item.
  common_mistake: Engineers often focus on the upfront hardware cost (CapEx) or the R&D cost of model
    development. They forget that for large, physically distributed systems, the operational cost (OpEx)
    of maintenance—especially labor for physical interventions—often dwarfs the initial investment.
  napkin_math: 'Hardware (CapEx): 100,000 devices * $10 = $1,000,000. Battery replacement (CR2032, 225
    mAh, 3.0V): every 6 months. Technician: $50/hour, services 5 devices/hour = $10/device/visit. Annual
    battery OpEx: 2 visits/year * $10 * 100K = $2,000,000/year. Failed devices: 100K / 3-year MTTF = 33,333/year
    * ($10 device + $10 labor) = $666,666/year. Total annual OpEx: $2.67M. 5-year TCO: $1M + $2.67M *
    5 = $14.35M. Battery itself: 200K CR2032/year * $0.50 = $100K/year (trivial vs labor). Extending battery
    life from 6 months to 2 years via model optimization (30 mW to 8 mW active) cuts visits by 4x, saving
    $7.5M over 5 years.'
  options:
  - The one-time capital expenditure (CapEx) for the 100,000 devices.
  - The cumulative cost of electricity to power the devices over 5 years.
  - The labor cost for physical maintenance and battery replacement.
  - The R&D cost of developing and training the keyword-spotting model.
  correct_index: 2
