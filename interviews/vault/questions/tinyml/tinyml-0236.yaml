title: 'The Truck Roll Tax'
scenario: 'You are deploying a fleet of 100,000 battery-powered keyword-spotting sensors for a smart building application. Each device costs $10.'
question: 'What single factor is most likely to dominate the Total Cost of Ownership (TCO) for a 100,000-device sensor fleet over 5 years?'
details:
  realistic_solution: 'The dominant cost is overwhelmingly the labor associated with ''truck rolls''—physically sending a technician to replace batteries or failed units. While the per-unit hardware cost is low, the cost of skilled labor to service 100,000 distributed devices over 5 years becomes the largest line item.'
  common_mistake: |
    **The Pitfall:** Focusing entirely on upfront hardware costs (CapEx) or model R&D costs.
    **The Rationale:** Engineers are typically insulated from the logistical realities of maintaining distributed physical hardware.
    **The Consequence:** They optimize for cheaper hardware at the expense of battery life, inadvertently skyrocketing the "truck roll" labor costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 100,000 devices
    - Hardware cost: $10 per device
    - Battery replacement: Every 6 months (2 visits/year), $10 labor/visit
    - Failure rate: 33,333 failures/year, ($10 device + $10 labor)

    **Calculations:**
    - CapEx = 100,000 devices * $10 = $1,000,000
    - Battery OpEx = 2 visits/year * $10 * 100,000 = $2,000,000/year
    - Failed Device OpEx = 33,333 failures/year * $20 = $666,666/year
    - Total 5-year OpEx = ($2,000,000 + $666,666) * 5 = $13,333,330

    **Conclusion & Interpretation:**
    - **Result: $13.33M (OpEx-Bound)**. Labor for physical maintenance completely dwarfs the $1M hardware CapEx.
  options:
  - 'The one-time capital expenditure (CapEx) for the 100,000 devices.'
  - 'The cumulative cost of electricity to power the devices over 5 years.'
  - 'The labor cost for physical maintenance and battery replacement.'
  - 'The R&D cost of developing and training the keyword-spotting model.'
  correct_index: 2
