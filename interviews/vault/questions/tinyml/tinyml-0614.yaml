title: Sub-threshold Voltage Operation — Power vs Speed Trade-off
scenario: The Ambiq Apollo4 achieves 3 µW/MHz by operating its Cortex-M4F at sub-threshold voltages (~0.5V
  vs the typical 1.2V for Cortex-M4). Your team is evaluating it for a wearable ECG monitor that must
  run a 1M-MAC arrhythmia detection model within a 200ms deadline. The Apollo4 runs at 96 MHz at 0.5V.
  A standard Cortex-M4 runs at 168 MHz at 1.2V. Both use CMSIS-NN. Does the Apollo4 meet the deadline,
  and what's the power savings?
details:
  realistic_solution: 'The Apollo4 at sub-threshold (0.5V, 96MHz) meets the 200ms deadline: 1M MACs at
    2 MACs/cycle = 5.2ms inference, leaving 194.8ms headroom. Power: dynamic power scales as CV²f, so
    0.5V vs 1.2V gives (0.5/1.2)² = 0.174x dynamic power reduction. At 96MHz: 3uW/MHz * 96 = 288uW active
    power = 0.288mW total. Energy per inference: 0.288mW * 5.2ms = ~1.5uJ vs standard M4''s 150uJ = 100x
    more efficient. Battery life (225mAh coin cell): dramatically extended. Sub-threshold wins overwhelmingly
    when the workload fits within the reduced clock speed''s deadline.'
  common_mistake: '"Power scales as V², so going from 1.2V to 0.5V gives (1.2/0.5)² = 5.76× power reduction
    at the same performance." This confuses power reduction at the same frequency with power reduction
    at the achievable frequency. Sub-threshold operation dramatically reduces the maximum clock speed
    — you can''t run at 168 MHz on 0.5V.'
  napkin_math: 'Standard M4 (1.2V, 168 MHz): 50 mW active, 150 µJ/inference, 24-day battery life. Apollo4
    (0.5V, 96 MHz): 0.288 mW active, 1.5 µJ/inference, 4600-day theoretical battery life. Speedup: 1.75×
    slower. Power: 173× less. Energy/inference: 100× less. The trade-off is clear: if your inference fits
    within the deadline at the lower clock speed, sub-threshold operation is transformative for battery
    life. The Apollo4 meets a 200ms deadline with 194.8ms to spare — the extra speed of a standard M4
    is wasted energy.'
  options:
  - The Apollo4 cannot meet the 200ms deadline because sub-threshold operation at 0.5V reduces the maximum
    clock to ~10 MHz, making inference take over 1 second.
  - 'The Apollo4 at 0.5V/96 MHz meets the deadline easily: 1M MACs at 2 MACs/cycle = 5.2ms inference (194.8ms
    headroom). Power: 3 uW/MHz x 96 = 288 uW (vs standard M4 at 50 mW). Energy per inference: 1.5 uJ vs
    150 uJ — 100x more efficient. Sub-threshold operation is transformative when the workload fits within
    the reduced clock speed''s deadline.'
  - Power scales as V^2, so 1.2V to 0.5V gives (1.2/0.5)^2 = 5.76x power reduction at the same 168 MHz
    clock speed, and the Apollo4 meets the deadline with a 5.76x power savings.
  - The Apollo4 meets the deadline but the power savings is only 2x because sub-threshold operation increases
    leakage current, which offsets most of the dynamic power reduction.
  correct_index: 1
