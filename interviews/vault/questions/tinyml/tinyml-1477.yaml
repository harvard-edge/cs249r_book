title: 'Responsible AI on Constrained Edge Devices: Model Card & Guardrail Implementation'
scenario: 'You are deploying an industrial predictive maintenance anomaly detection system on a system featuring a Cortex-M7 CPU and Ethos-U55 NPU. Due to strict safety regulations, misclassifications carry severe consequences. Your team must integrate on-device Responsible AI guardrails within the constrained edge environment.'
question: 'How should responsible AI practices and on-device guardrails be implemented for an Ethos-U55 industrial anomaly detector?'
details:
  realistic_solution: 'Implement a minimal, yet effective, model card that focuses on critical operational characteristics (e.g., latency, energy consumption, specific failure modes). Develop on-device guardrails that leverage the Ethos-U55 for efficient anomaly score thresholds or basic input validation, specifically designed to fit within the 512 KB SRAM. This might involve highly compressed autoencoders or quantized guardrail models, operating within the massive 24.5 GMAC compute budget to avoid memory saturation.'
  common_mistake: |
    **The Pitfall:** Designing complex cloud-style explainability models (like SHAP) or heavy outlier detection ensembles for the edge.
    **The Rationale:** Candidates try to port traditional MLOps Responsible AI frameworks directly to microcontrollers.
    **The Consequence:** The guardrail models consume the entirety of the 512 KB SRAM and compute budget, leaving no resources for the actual primary anomaly detection model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Guardrail inference occurs at 10 Hz (100 ms deadline).
    - Ethos-U55 operates at 480 MHz with 512 MAC/cycle.
    - 512 KB total SRAM shared.

    **Calculations:**
    - 100 ms window = 0.1 seconds.
    - Ethos peak compute per window = 480,000,000 Hz * 512 MACs/cycle * 0.1s = 24.576 Billion MACs available.
    - If main model uses 200 KB SRAM and guardrail uses 100 KB, remaining SRAM = 212 KB.

    **Conclusion & Interpretation:**
    - **Result: 212 KB remaining (Memory-Bound)**. The system has massive compute availability (~24.5 GMACs per window) but extremely tight memory. Guardrails must be implemented as dense, compute-heavy/memory-light operations (e.g., highly compressed autoencoders) rather than memory-heavy statistical lookups.
