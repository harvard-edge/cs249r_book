title: Evaluating Race-to-Sleep vs DVFS on ESP32-S3
scenario: You are designing a battery-powered acoustic event detection system running at 10 inferences per second on an ESP32-S3. The system uses the 240 MHz dual-core Xtensa processor and vector extensions for INT8 acceleration, keeping the model entirely within the 512 KB internal SRAM to avoid the high latency and power cost of the 8 MB PSRAM. You must evaluate whether to use a race-to-sleep strategy at the full 240 MHz or underclock the MCU to 80 MHz to maximize battery life.
question: Should an ESP32-S3 acoustic detector use 240 MHz race-to-sleep or 80 MHz underclocking to minimize energy per inference?
details:
  realistic_solution: The candidate should calculate the total energy per inference rather than just comparing active peak power. Because the ESP32-S3 can leverage INT8 vector extensions and fast internal SRAM with zero wait states, race-to-sleep at 240 MHz minimizes the active execution window. This allows the chip to enter a low-power sleep mode for a much larger fraction of the duty cycle, offsetting the higher active current.
  common_mistake: |
    **The Pitfall:** Assuming underclocking (DVFS) universally saves power due to the CMOS dynamic power equation.
    **The Rationale:** Engineers rely on theoretical knowledge that slower clock speeds equate to less instantaneous current draw.
    **The Consequence:** They fail to account for static leakage power over a longer execution window, ironically increasing total energy consumed per inference.
  napkin_math: |
    - INT8 inference length: 6M cycles.
    - Duty cycle: 10 Hz (100 ms window).
    - **At 240 MHz:**
      - Active time: 6M / 240M = **25 ms**.
      - Energy (100mA active, 1mA sleep @ 3.3V): ((25 ms × 100 mA) + (75 ms × 1 mA)) × 3.3V = (2500 + 75) × 3.3V = **8.49 mJ**.
    - **At 80 MHz (underclocked):**
      - Active time: 6M / 80M = **75 ms**.
      - Energy (35mA active, 1mA sleep @ 3.3V): ((75 ms × 35 mA) + (25 ms × 1 mA)) × 3.3V = (2625 + 25) × 3.3V = **8.74 mJ**.
    - Conclusion: 240 MHz race-to-sleep strategy consumes **less** total energy per cycle (8.49 mJ vs 8.74 mJ).
