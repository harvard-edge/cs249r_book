title: Evaluating Race-to-Sleep vs DVFS on ESP32-S3
scenario: You are designing a battery-powered acoustic event detection system running
  at 10 inferences per second on an ESP32-S3. The system uses the 240 MHz dual-core
  Xtensa processor and vector extensions for INT8 acceleration, keeping the model
  entirely within the 512 KB internal SRAM to avoid the high latency and power cost
  of the 8 MB PSRAM. You must evaluate whether to use a race-to-sleep strategy at
  the full 240 MHz or underclock the MCU to 80 MHz to maximize battery life.
question: Should an ESP32-S3 acoustic detector use 240 MHz race-to-sleep or 80 MHz
  underclocking to minimize energy per inference?
details:
  realistic_solution: The candidate should calculate the total energy per inference
    rather than just comparing active peak power. Because the ESP32-S3 can leverage
    INT8 vector extensions and fast internal SRAM with zero wait states, race-to-sleep
    at 240 MHz minimizes the active execution window. This allows the chip to enter
    a low-power sleep mode for a much larger fraction of the duty cycle, offsetting
    the higher active current.
  common_mistake: Candidates often assume underclocking (DVFS) universally saves power
    due to the CMOS dynamic power equation. They fail to account for the static leakage
    power drawn over a longer active duration, or they ignore the fact that high-throughput
    INT8 vector extensions make race-to-sleep highly efficient.
  napkin_math: 'Given a 6M cycle INT8 inference at 10 Hz (100ms window): At 240 MHz,
    active time = 6M / 240M = 25ms. Assuming 100mA active and 1mA sleep at 3.3V: Energy
    = ((25ms * 100mA) + (75ms * 1mA)) * 3.3V = (2500 + 75) * 3.3V = 8.49 mJ. At 80
    MHz, active time = 6M / 80M = 75ms. Even if voltage scaling reduces active current
    to 35mA: Energy = ((75ms * 35mA) + (25ms * 1mA)) * 3.3V = (2625 + 25) * 3.3V =
    8.74 mJ. The 240 MHz race-to-sleep strategy consumes less total energy because
    the model fits in the 512 KB SRAM, avoiding PSRAM bottlenecks that would otherwise
    stall the higher clock speed.'
