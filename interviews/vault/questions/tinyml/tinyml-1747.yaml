title: INT8 Quantization Memory Reduction
scenario: A predictive maintenance model on a Cortex-M4 requires storing a 128x128x3
  activation map in SRAM. The original prototype uses FP32.
question: Calculate the exact SRAM memory savings in bytes when quantizing this activation
  map from FP32 to INT8.
details:
  realistic_solution: The original FP32 map requires 128 * 128 * 3 * 4 bytes = 196,608
    bytes (192 KB). Quantizing to INT8 reduces the precision from 4 bytes per value
    to 1 byte per value. The new size is 128 * 128 * 3 * 1 = 49,152 bytes (48 KB).
    The savings is 147,456 bytes.
  common_mistake: Failing to account for the channel dimension or incorrectly assuming
    FP32 uses 8 bytes (double precision) instead of 4.
  napkin_math: 128 * 128 * 3 * (4 - 1) = 147456 bytes.
