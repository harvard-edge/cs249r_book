title: INT8 Quantization Memory Reduction
scenario: A predictive maintenance model on a Cortex-M4 requires storing a 128x128x3 activation map in SRAM. The original prototype uses FP32.
question: Calculate the exact SRAM memory savings in bytes when quantizing this activation map from FP32 to INT8.
details:
  realistic_solution: The original FP32 map requires 128 * 128 * 3 * 4 bytes = 196,608 bytes (192 KB). Quantizing to INT8 reduces the precision from 4 bytes per value to 1 byte per value. The new size is 128 * 128 * 3 * 1 = 49,152 bytes (48 KB). The savings is 147,456 bytes.
  common_mistake: |
    **The Pitfall:** Forgetting the channel dimension or assuming incorrect byte-sizes for primitives.
    **The Rationale:** Engineers hastily multiply width by height without validating the channel depth, or falsely assume FP32 consumes 8 bytes (which is FP64).
    **The Consequence:** Wildly inaccurate SRAM sizing estimations, leading to hardware specs that are either catastrophically too small or needlessly expensive.
  napkin_math: |
    - Original FP32 elements: 128 × 128 × 3 = 49,152 elements.
    - FP32 Size: 49,152 × 4 bytes = **196,608 bytes**.
    - INT8 Size: 49,152 × 1 byte = **49,152 bytes**.
    - Exact Savings: 196,608 - 49,152 = **147,456 bytes**.
