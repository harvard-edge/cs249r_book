title: The Quantization Energy Tax
scenario: On a battery-powered TinyML device, you're deciding between using an FP16 model and a quantized INT8 model.
question: "From a compute energy perspective, which operation is more expensive (FP16 vs INT8), and by roughly what factor?"
details:
  realistic_solution: An FP16 multiply is significantly more energy-intensive. According to Horowitz energy principles, an FP32 multiply consumes ~18x the energy of an INT8 multiply and ~3.4x the energy of an FP16 multiply. Therefore, the relative cost of an FP16 op to an INT8 op is approximately 18 divided by 3.4, which is about 5.3x. On a device where every microjoule matters, a 5x energy reduction per operation is a massive win for battery life.
  common_mistake: |
    **The Pitfall:** Assuming energy savings are strictly linear with the reduction in bit-width (e.g., 16-bit to 8-bit saves 2x energy).
    **The Rationale:** Engineers confuse data movement energy/footprint reduction (which is 2x) with digital logic switching energy.
    **The Consequence:** The true battery life advantages of extreme quantization are undervalued during the design phase.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware invariants (Horowitz principles).
       - Energy(FP32) ≈ 18 × Energy(INT8).
       - Energy(FP32) ≈ 3.4 × Energy(FP16).
    2. **Calculations:**
       - Energy(FP16) = Energy(FP32) / 3.4 = (18 / 3.4) × Energy(INT8).
       - 18 / 3.4 = 5.294.
    3. **Conclusion & Interpretation:**
       - **Result: FP16 costs ~5.3x more energy than INT8 per operation.**
       - **Energy-Bound**
  options:
  - FP16 costs ~2x more energy than INT8.
  - They consume roughly the same amount of energy.
  - FP16 costs ~5x more energy than INT8.
  - INT8 costs ~5x more energy than FP16.
