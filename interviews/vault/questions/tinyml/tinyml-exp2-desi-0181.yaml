title: Architecting Sub-4-bit Keyword Spotting
scenario: You are leading the deployment of a continuous keyword spotting model on an ARM Cortex-M4 (STM32F4).
  The baseline INT8 model has 1.5 million parameters, requiring 1.5 MB of Flash, which exceeds the device's
  strict 1 MB Flash limit. It uses 200 KB of the available 256 KB SRAM. You have a hard 15 ms inference
  latency budget. Architect an extreme quantization strategy (such as 4-bit or ternary) to fit the model
  into Flash. Evaluate how you will execute this on a processor that only has CMSIS-NN SIMD (2x INT8 MACs/cycle)
  and lacks FPU or native sub-byte MAC instructions.
details:
  realistic_solution: The optimal design uses asymmetric mixed-precision weight-only quantization. We
    quantize the memory-intensive fully connected and 1x1 convolutional layers to 4-bit to meet the 1
    MB Flash limit, while keeping compute-intensive depthwise layers in INT8 to avoid unpacking overhead
    on the critical path. During inference, 4-bit weights are unpacked on-the-fly into the SRAM block-by-block
    using bitwise shift-and-mask operations, then fed into standard INT8 CMSIS-NN kernels. This successfully
    trades excess SRAM bandwidth for Flash reduction.
  common_mistake: Candidates often assume that sub-byte quantization (like 4-bit) automatically improves
    or maintains inference latency. They fail to realize that the Cortex-M4 lacks native 4-bit math instructions,
    meaning weights must be unpacked into INT8 registers in software before utilizing the CMSIS-NN SIMD
    instructions, which introduces significant CPU overhead.
  napkin_math: 'Original model: 1.5M params = 1.5 MB Flash. To fit < 1.0 MB, we quantize 1M parameters
    to 4-bit (500 KB) and keep 500K parameters in INT8 (500 KB), totaling 1.0 MB. Unpacking 500 KB of
    4-bit weights requires reading bytes and applying shift/mask operations. Assuming an optimized loop
    takes ~2 cycles per unpacked byte on the Cortex-M4: 500,000 bytes * 2 cycles = 1,000,000 cycles. At
    a clock speed of 168 MHz, unpacking takes 1,000,000 / 168,000,000 = ~5.95 ms. Out of the 15 ms latency
    budget, this leaves ~9.05 ms (or 1.52 million cycles) for the actual CMSIS-NN MAC operations, which
    easily covers the 1.5M MACs utilizing the SIMD 2x INT8 MACs/cycle capability.'
