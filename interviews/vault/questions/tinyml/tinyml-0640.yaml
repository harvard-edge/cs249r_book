title: The Hypersensitive Wake-Word
scenario: Your team has developed a keyword-spotting model for a smart home device. The FP32 model achieves
  99% accuracy in the lab. To deploy it on a Cortex-M4 microcontroller with only 256KB of SRAM, you use
  post-training quantization (PTQ) to convert the entire model to INT8. You use a clean, curated dataset
  of spoken keywords for calibration. The resulting INT8 model passes all lab tests, maintaining >98%
  accuracy, and successfully fits within the memory budget.
details:
  realistic_solution: The root cause is a **dynamic range mismatch** leading to **INT8 overflow**. The
    quantization calibration was performed on clean speech, which has a relatively low and predictable
    range of activation values. The tool calculated a scale factor optimized for this narrow range. However,
    loud, unpredictable background noise (like a TV explosion or loud music) generates feature values
    (e.g., in the initial MFCC or convolutional layers) with a much larger magnitude than ever seen during
    calibration.
  common_mistake: The most common and immediate reaction is to blame the training data. 'The model wasn't
    trained on enough noisy audio.' While adding noise to the training set is a good practice, it misses
    the core systems issue. Retraining the FP32 model won't fix a numerical representation failure in
    the INT8 model if the calibration process that defines the INT8 representation is itself flawed. The
    problem isn't the model's learned logic; it's that the logic is breaking due to arithmetic overflow.
  napkin_math: 'Clean calibration [-6,6]: scale=12/256=0.047. TV explosion spikes to ±30: q=30/0.047=638→clipped
    to 127. Dequant=5.97. Error: 80%. All values beyond ±6 collapse to ±127. 16 filters all saturated
    → bottleneck propagates. Fix: recalibrate to [-30,30] (scale=0.234), or mixed-precision FP16 for first
    2 layers.'
