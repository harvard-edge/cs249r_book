title: Energy-Efficient Audio Pipeline Design on Corstone-300
scenario: You are architecting an always-on keyword spotting application for a battery-powered IoT device
  utilizing the ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform. The system operates with a 480 MHz
  M7 and an Ethos-U55 NPU that shares a strict 512 KB of SRAM. You must design the data flow and partition
  the workload between the CPU and NPU to minimize the total energy per operation, specifically addressing
  the energy cost of memory access versus compute.
details:
  realistic_solution: The optimal architecture treats the 512 KB SRAM as a strict boundary for the active
    working set. The M7 should perform lightweight DSP feature extraction (e.g., MFCCs) and stream the
    features directly into SRAM. The neural network architecture must be aggressively quantized (INT8)
    and sized so that its weights, intermediate activations, and the CPU's stack comfortably fit within
    the 512 KB to ensure the Ethos-U55 accesses only local SRAM, relying on its 128-512 MAC/cycle throughput
    to finish inferences fast enough to return the system to a deep sleep state.
  common_mistake: Candidates often assume that maximizing NPU utilization is always the most energy-efficient
    approach, ignoring the high energy cost of memory transfers. They frequently design models that exceed
    the 512 KB shared SRAM, causing continuous evictions to external flash or DRAM, which completely negates
    the compute energy savings of the Ethos-U55.
  napkin_math: According to typical energy tables, an external DRAM/Flash read costs ~100x more energy
    per byte than an SRAM read (e.g., 1000pJ vs 10pJ). If a model requires 800 KB of memory, 288 KB must
    spill out of the 512 KB SRAM. Fetching 288 KB externally costs ~288,000 bytes * 1000 pJ = 288 uJ.
    If we instead design a 300 KB model that fits in SRAM, fetching those 300 KB costs 300,000 bytes *
    10 pJ = 3 uJ. Even if the Ethos-U55 performs 10 million MACs at 0.1 pJ/MAC (1 uJ total compute energy),
    the memory access dominates, proving that fitting within the 512 KB shared SRAM saves >98% of the
    system energy.
