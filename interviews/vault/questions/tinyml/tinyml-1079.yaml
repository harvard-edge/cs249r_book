title: nRF5340 Dual-Core Compute Partitioning
scenario: You are designing a continuous health monitoring wearable on the Nordic nRF5340 platform. The system extracts features from an IMU sensor and runs a neural network to detect anomalies, requiring a strict 100ms processing deadline per window.
question: How should the compute pipeline, DSP, model inference, and BLE tasks be partitioned across the dual cores to minimize energy consumption while respecting the hardware limits?
details:
  realistic_solution: The ideal architecture leverages the asymmetric cores by placing the IMU buffering, lightweight DSP feature extraction, and BLE 5.3 stack on the network core. The application core remains in deep sleep, waking only when pre-processed features are ready for the heavier anomaly detection inference. This minimizes the duty cycle of the active state and prevents Bluetooth timing interrupts from preempting critical ML math.
  common_mistake: |
    **The Pitfall:** Mapping the entire ML pipeline onto the application core.
    **The Rationale:** Candidates map both DSP and NN onto the faster application core for simplicity, treating the network core purely as a BLE black box.
    **The Consequence:** They fail to evaluate compute cost tradeoffs, needlessly waking the high-power core for trivial DSP tasks and violating energy constraints.
  napkin_math: |
    1. **Assumptions & Constraints**:
       - 100ms deadline per window.
       - App core (128 MHz) yields 12.8M cycles per 100ms.
       - Net core (64 MHz) yields 6.4M cycles per 100ms.
       - DSP = 3M cycles, NN = 8M cycles.
    2. **Calculations**:
       - Both on app core: 11M cycles = 85.9ms active at ~5mA.
       - DSP on net core: 3M cycles / 64 MHz = 46.8ms (concurrent with BLE).
       - NN on app core: 8M cycles / 128 MHz = 62.5ms active at ~5mA.
    3. **Conclusion & Interpretation**:
       - **Result: Energy-Bound Optimization**. Offloading DSP saves ~23.4ms of app core active time per window, significantly reducing average power while comfortably meeting the 100ms latency requirement.
