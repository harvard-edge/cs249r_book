title: The Deaf Automobile Watchdog
scenario: 'You are the tech lead for a keyword-spotting model that runs on a Cortex-M4 in a fleet of 10,000
  vehicles. The model (''Hey, Car!'') activates the infotainment system. After 6 months in the field,
  you get reports of the system ''going deaf'' — it stops responding until the car is fully power-cycled.
  An engineer on your team proposes a fix: ''This is a classic embedded systems problem. The main loop
  is probably hanging. Let''s just enable the hardware watchdog timer. If the MCU doesn''t pet the watchdog
  for 2 seconds, it will force a reboot. Problem solved.'''
question: "Why is simply enabling a watchdog timer an insufficient fix for the vehicle voice assistant going deaf?"
details:
  realistic_solution: 'The watchdog is a dangerous patch that masks a deeper issue: **unmonitored data
    drift**. The system isn''t hanging randomly; it''s almost certainly encountering input data that it
    cannot handle, a direct result of operating in the wild for months. The microphone''s characteristics
    can drift due to thermal cycles and aging, or the background noise profile can change with seasons
    (e.g., winter tire noise). This drift feeds pathological values into the feature extraction pipeline
    (e.g., MFCCs), which eventually generates NaNs or Infs. These values propagate through the model,
    corrupting its state until it hangs or crashes.'
  common_mistake: Accepting the watchdog as a sufficient fix. This treats the symptom (a device hang)
    rather than the disease (the underlying reason for the hang). A junior engineer might say, 'A watchdog
    is standard practice for reliability,' without considering *why* the system is failing. They mistake
    a general-purpose embedded systems patch for a solution to a specific, stateful ML system failure.
  napkin_math: 'With watchdog: MCU boots (500ms), reads microphone buffer containing the drifted/bad audio,
    feeds it to the model, and hits the NaN-induced HardFault (200ms). It spins for 1300ms until the 2s
    watchdog triggers. It reboots and repeats this cycle infinitely. The system remains deaf 100% of the
    time, and the constant rebooting could corrupt the filesystem or wear out the flash if crash logs are written.
    Fix: Track reboots in RTC RAM; after 3 fast reboots, enter a safe fallback mode that disables KWS to
    prevent continuous crashing.'
