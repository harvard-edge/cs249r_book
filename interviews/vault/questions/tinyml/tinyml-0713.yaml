title: The Flash Corruption After 10,000 OTA Updates
scenario: Your fleet of 50,000 smart agriculture sensors uses an STM32H7. You push OTA model updates weekly. After 3 years (~156 updates), 2% of devices produce garbage inference results. The model binary is verified correct via CRC after each update.
question: Why are 2% of STM32H7 agriculture sensors producing garbage results after 156 weekly OTA model updates?
details:
  realistic_solution: Internal NOR flash on STM32H7 is rated for 10,000 program/erase cycles per sector. While 156 model writes is safe, the OTA metadata sector experiences far more writes (retries on bad signal, version tracking). Devices with poor connectivity approach endurance limits.
  common_mistake: |
    **The Pitfall:** Believing the flash contents are pristine purely because the write-time CRC passed.
    **The Rationale:** Candidates forget that OTA systems often write to a metadata sector hundreds of times per update (tracking progress, retries).
    **The Consequence:** They misdiagnose a physical flash wear-out issue as a rare firmware bug.
  napkin_math: |
    - Flash endurance: 10,000 cycles.
    - Model writes: 156 updates * 1 write = 156 cycles (safe).
    - Metadata sector writes (with retries): 156 updates * 50 writes = 7,800 cycles.
    - Failure probability: Φ((7,800 - 10,000) / 1,500) = Φ(-1.47) ≈ 7.08%.
    - **Devices with bad signal degrade the metadata sector, pushing it into the failure distribution.**
  options:
  - The CRC passes, so flash contents are correct. The 2% failure rate is caused by a rare firmware bug triggered by specific sensor input combinations that only occur after prolonged deployment.
  - Internal NOR flash endurance is 10,000 P/E cycles. While 156 model writes (1.6%) is safe, the OTA metadata sector experiences far more writes (retries on bad signal, version tracking, rollback state). Devices with poor connectivity may hit 7,800+ cycles on the metadata sector, approaching endurance limits.
  - After 3 years, the external flash chip's solder joints have developed micro-cracks from thermal cycling, causing intermittent read errors that pass CRC but produce bit-flipped weights during inference.
  - The model binary CRC is valid, but cosmic ray-induced single-event upsets (SEUs) are flipping bits in the flash at a rate of ~2% per device per 3 years, matching the observed failure rate.
  correct_index: 1
