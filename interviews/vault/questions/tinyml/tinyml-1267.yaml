title: SRAM vs Compute Energy Cost
scenario: Your team is deploying a wake-word detection model to a Cortex-M4. During a code review to optimize battery life, an engineer suggests aggressively caching all intermediate layer outputs in SRAM to save ALU compute cycles.
question: What fundamental fact from the Horowitz energy table should you recall regarding the relative energy cost of SRAM access versus integer compute?
details:
  realistic_solution: The candidate must recall that a local SRAM memory access consumes roughly one to two orders of magnitude (10x to 100x) more energy than a simple arithmetic operation like an INT8 MAC. Therefore, on memory-constrained devices, it is often much more energy-efficient to recompute intermediate values using the processor's ALUs rather than paying the energy penalty of reading and writing to SRAM.
  common_mistake: |
    **The Pitfall:** Believing that computational ALU cycles are the primary driver of power consumption and should be avoided at all costs.
    **The Rationale:** Candidates incorrectly recall hardware energy physics, prioritizing the caching of tensors to minimize processor workload.
    **The Consequence:** The system consumes significantly more energy due to the massive, hidden power costs of transferring data across the memory bus.
  napkin_math: |
    1. **Assumptions & Constraints:** 32-bit architecture. Horowitz energy table physics: INT8 operation cost ≈ 0.1 pJ. 32-bit local SRAM access cost ≈ 5.0 pJ.
    2. **Calculations:** Dual INT8 MACs execute 2 operations: ~0.2 pJ energy cost. Fetching the equivalent 32-bit word (containing four INT8 values) from SRAM: ~5.0 pJ energy cost. Ratio = 5.0 pJ / 0.2 pJ = 25x.
    3. **Conclusion & Interpretation:** **Result: Memory-Bound Power Drain.** Accessing SRAM requires approximately 25x more energy than executing the actual mathematics. On constrained devices, it is highly energy-efficient to recompute intermediate values using the ALU rather than paying the massive penalty to write/read them from memory.
