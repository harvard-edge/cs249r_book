title: SRAM vs Compute Energy Cost
scenario: Your team is deploying a wake-word detection model to an ARM Cortex-M4 (STM32F4). The device runs at 168 MHz, features 256 KB SRAM, 1 MB flash, and uses CMSIS-NN SIMD (2x INT8 MACs/cycle) without an FPU. During a code review to optimize battery life, an engineer suggests caching all intermediate layer outputs in SRAM to save compute cycles.
question: What fundamental fact from the Horowitz energy table should you recall regarding the relative energy cost of SRAM access versus integer compute?
details:
  realistic_solution: The candidate must recall that a local SRAM memory access consumes roughly one to two orders of magnitude (10x to 100x) more energy than a simple arithmetic operation like an INT8 MAC. Therefore, on memory-constrained devices, it is often much more energy-efficient to recompute intermediate values using the processor's ALUs rather than paying the energy penalty of reading and writing to SRAM.
  common_mistake: |
    **The Pitfall:** Believing that compute operations are the primary driver of energy consumption.
    **The Rationale:** Candidates incorrectly recall energy tables and recommend aggressively caching tensors to minimize ALU cycles.
    **The Consequence:** The system consumes significantly more energy due to the high cost of memory transfers.
  napkin_math: |
    - Integer operation cost: ~0.1 pJ.
    - 32-bit SRAM access cost: ~5 pJ.
    - Dual INT8 MACs (STM32F4): 2 MACs take ~0.2 pJ.
    - Fetching a 32-bit word (four INT8 values): ~5.0 pJ.
    - **The SRAM access requires 25x more energy (5.0 / 0.2) than executing the dual MACs, making recomputation more efficient.**
