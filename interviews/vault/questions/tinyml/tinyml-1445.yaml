title: ESP32-S3 TinyML Functional Safety & Determinism Optimization for ISO 26262
scenario: A critical TinyML predictive maintenance application is deployed on an ESP32-S3 (240 MHz dual-core, 512 KB SRAM, 8 MB PSRAM). The system must comply with ISO 26262 ASIL-B for functional safety. Periodically, the ML inference pipeline exhibits unpredictable latency spikes, triggering watchdog timer resets and system restarts.
question: How should you diagnose and reduce ESP32-S3 TinyML latency spikes that jeopardize ASIL-B deterministic execution?
details:
  realistic_solution: "The solution involves a multi-pronged approach: \n\n1.  **Detailed Profiling & WCET Analysis:** Employ ESP-IDF's `esp_timer` and FreeRTOS trace facilities to precisely measure execution times of critical code sections, identify latency spikes, and determine WCET. This involves instrumenting memory access patterns, ISR latencies, and task context switches. \n2.  **Memory Optimization:** Statically allocate all memory for ML model weights and intermediate tensors, potentially placing frequently accessed data in internal SRAM (DRAM) and larger read-only model parts in PSRAM, while carefully managing cache policies to minimize cache misses. Avoid `malloc`/`free` in real-time paths. \n3.  **Deterministic Scheduling:** Assign safety-critical ML inference and monitoring tasks to a dedicated core (e.g., Core 0) with the highest priorities, using FreeRTOS `xTaskCreatePinnedToCore`. Ensure interrupt priorities are correctly configured to prevent preemption of critical tasks by non-safety-related events. \n4.  **Watchdog & Self-Test Implementation:** Configure the ESP32-S3's hardware watchdog timer with a tight but achievable timeout. Implement a periodic 'heartbeat' from the safety-critical task to feed the watchdog. Develop lightweight, non-invasive self-test routines (e.g., memory integrity checks, basic arithmetic tests) that run during idle periods or at well-defined, non-critical intervals, validating system health without impacting real-time performance."
  common_mistake: |
    **The Pitfall:** Focusing solely on average inference time while ignoring worst-case execution time (WCET) variability.
    **The Rationale:** Candidates treat safety-critical TinyML like consumer AI, where occasional slow frames are acceptable.
    **The Consequence:** Unmitigated cache thrashing, PSRAM contention, or RTOS context switches cause watchdog resets that violate strict ASIL-B availability requirements.
  napkin_math: |
    * **Safety Requirement:** 80 ms response time. Watchdog triggers at 100 ms.
    * **Baseline Performance:** Nominal inference = 40 ms. Periodic spikes add +60 ms = 100 ms (Watchdog triggers).
    * **Bottleneck Breakdown:** 
      * PSRAM contention/cache invalidation = 45 ms.
      * FreeRTOS scheduler preemption = 15 ms.
    * **Optimizations:** 
      * Move critical tensors to internal SRAM & align to cache lines: saves 35 ms.
      * Pin ML task to Core 0 with max priority: saves 10 ms.
    * **Final WCET:** 40 ms (nominal) + (60 - 45) ms spike = **55 ms**.
    * **Conclusion:** 55 ms is well under the 80 ms safety deadline.
