title: 4-bit Quantization Fallback Diagnosis on Ethos-U55
scenario: You are deploying a 4-bit quantized keyword spotting model on an ARM Cortex-M7
  + Ethos-U55 (Corstone-300) system. The model easily fits within the shared 512 KB
  SRAM. However, during profiling, inference latency is drastically higher than the
  8-bit baseline, and the 480 MHz M7 CPU is pegged at 100% utilization. Meanwhile,
  the Ethos-U55 NPU, which is capable of 256 MACs/cycle, shows near-zero utilization
  during core convolutional layers. What is the root cause of this degradation?
question: Why does a 4-bit Ethos-U55 keyword model peg the 480 MHz M7 CPU while the
  NPU sits idle?
details:
  realistic_solution: The root cause is an operator fallback from the NPU to the CPU.
    The Ethos-U55 natively accelerates 8-bit and 16-bit operations, but lacks native
    support for 4-bit activations across standard operations. The Vela compiler therefore
    maps these unsupported 4-bit convolutions to software kernels on the Cortex-M7.
    The M7 must sequentially unpack the 4-bit data into 8-bit or 16-bit registers
    before computing the MACs, completely bypassing the NPU and causing severe latency.
  common_mistake: Candidates often assume that 4-bit quantization universally accelerates
    execution by reducing memory bandwidth requirements. They might misdiagnose the
    issue as SRAM contention between the M7 and the NPU or an issue with weight alignment,
    failing to check operator support matrices.
  napkin_math: 'For a layer with 1,000,000 MACs: On the Ethos-U55 (256 MACs/cycle),
    ideal execution takes 1,000,000 / 256 = 3,906 cycles. At 480 MHz, this is 3,906
    / 480,000,000 = 8.1 microseconds. Falling back to the M7, assuming a conservative
    4 cycles per MAC for 4-bit unpacking and accumulation, it takes 4,000,000 cycles.
    At 480 MHz, this is 4,000,000 / 480,000,000 = 8.33 milliseconds. The software
    fallback is roughly 1000x slower, perfectly explaining the CPU bottleneck and
    high latency.'
