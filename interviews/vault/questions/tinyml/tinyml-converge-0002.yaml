title: TinyML Federated Update Design
scenario: A fleet of battery sensors cannot upload raw data but can occasionally exchange 4 KB summaries through a gateway. Design a federated or gateway-aggregated update path that respects the communication limit.
question: How would you design a TinyML swarm-learning update path when each sensor can exchange only 4 KB summaries?
details:
  realistic_solution: Use local training or calibration on device, compress updates into small sketches or adapter deltas, aggregate at the gateway, and broadcast only compact global updates. Keep raw data local and make participation conditional on battery and link quality.
  common_mistake: Trying to federate full model gradients from microcontrollers over a tiny radio budget.
  napkin_math: If a full update is 80 KB and the budget is 4 KB, updates need at least 20x compression or sparse/delta representation.
