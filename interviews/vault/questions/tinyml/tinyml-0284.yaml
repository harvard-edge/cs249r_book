title: The Energy Tax of the Cloud
scenario: For a battery-powered smart home sensor that continuously listens for a wake-word, you must analyze the total cost of ownership (TCO) from an energy perspective.
question: Which energy component dominates TCO for the always-listening smart home sensor, on-device compute or network streaming?
details:
  realistic_solution: The network energy is the dominant factor, by several orders of magnitude. A highly optimized, duty-cycled TinyML device for keyword spotting can have an average power consumption in the low single-digit milliwatts. In contrast, keeping a Wi-Fi or cellular radio active to stream audio consumes hundreds of milliwatts. This massive difference in the power budget is the fundamental reason why on-device AI (TinyML) is critical for battery-powered products, as it directly impacts battery life and therefore user experience and TCO.
  common_mistake: |
    **The Pitfall:** Assuming computational FLOPs consume the most energy in an ML system.
    **The Rationale:** Engineers who focus exclusively on model size and complexity underestimate the raw physics of wireless data transmission.
    **The Consequence:** Systems are designed that stream raw data to the cloud to save on compute, inadvertently destroying battery life and ruining the product's TCO.
  napkin_math: |
    - **TinyML Active Compute**: ~1 mW average power.
    - **Wi-Fi Streaming**: ~200 mW to 500 mW continuous power.
    - **Energy Ratio**: 200 mW / 1 mW = 200x. 500 mW / 1 mW = 500x.
    - **Conclusion**: Network streaming dominates TCO by **200x to 500x**.
  options:
  - The on-device compute energy, because neural network FLOPs are expensive.
  - The network streaming energy and on-device compute are roughly equal.
  - The network streaming energy, by several orders of magnitude.
  - The network streaming energy, but only by a small amount (less than 2x).
  correct_index: 2
