title: SPI Daisy Chain Pipeline
scenario: A 3-node daisy chain of Cortex-M4 sensors connected via SPI (10 MHz) pipelines
  a CNN. Each node computes for 5ms and transmits a 4KB activation.
question: Evaluate the end-to-end inference latency for a single sample, factoring
  in a 200us SPI DMA setup synchronization barrier at each hop.
details:
  realistic_solution: The 4KB (32Kb) payload takes 3.2ms at 10 MHz. The 200us DMA
    setup brings the transfer phase to 3.4ms. End-to-end latency requires accumulating
    the compute time across 3 nodes (15ms) and the 2 intermediate network hops (6.8ms),
    totaling 21.8ms.
  common_mistake: Ignoring the multi-hop accumulation of the 200us SPI DMA setup barrier,
    which adds substantial fixed latency to the critical path in a daisy chain.
  napkin_math: 32Kb / 10MHz = 3.2ms. Transfer = 3.4ms. Latency = (3 * 5ms) + (2 *
    3.4ms) = 21.8ms.
