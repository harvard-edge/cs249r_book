title: On-Device Hard Negative Mining for ESP32-S3
scenario: You are deploying an audio-based predictive maintenance model on an ESP32-S3 (240 MHz dual-core Xtensa, 512 KB SRAM, 8 MB PSRAM, WiFi/BLE). The current INT8 quantized model suffers from false positives in novel factory environments. You must design an automated on-device hard-negative mining strategy to curate a targeted dataset for retraining, balancing human annotation constraints with device limitations.
question: How should ESP32-S3 perform on-device hard-negative mining without exhausting SRAM or radio power?
details:
  realistic_solution: Establish a confidence margin threshold (e.g., 0.45 to 0.55) to flag hard negatives. Buffer the raw audio for these uncertain events exclusively in the 8 MB PSRAM. Batch upload the buffer via WiFi only when full to optimize radio active time and power budget, then send the batch to human annotators to prioritize their labeling efforts.
  common_mistake: |
    **The Pitfall:** Streaming all uncertain audio directly to the cloud over WiFi, or buffering in SRAM.
    **The Rationale:** Candidates ignore the massive power drain of continuous radio usage and fail to properly partition memory, trying to fit raw audio into the small, performance-critical 512 KB SRAM.
    **The Consequence:** Catastrophic power drain from the radio and out-of-memory errors during inference.
  napkin_math: |
    - **Audio Stream**: 16 kHz @ 16-bit = 32 KB/s.
    - **Context Window**: A 3-second context window = 96 KB per event.
    - **Buffer Capacity**: Allocating 4 MB of the 8 MB PSRAM for the logging buffer yields capacity for ~42 events (4096 KB / 96 KB).
    - **Transfer Time**: Batch uploading 4 MB via WiFi at 1 Mbps takes ~**32 seconds**.
