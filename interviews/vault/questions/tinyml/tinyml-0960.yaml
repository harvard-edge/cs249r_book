title: Battery Drain During Federated Averaging
scenario: You are deploying a federated learning workload to a fleet of Nordic nRF5340 wearables (128 MHz app core, 64 MHz net core, 256 KB SRAM, 1 MB flash, BLE 5.3). During a federated averaging round, a device must download a 100 KB model, perform local training, and upload a 100 KB gradient payload. You observe that the devices are dropping out due to excessive battery drain. The system expects a 5-second active window per round at ~5mA, but monitoring shows the device remains in the active 5mA state for over 16 seconds.
question: Why do federated averaging rounds keep nRF5340 wearables active far longer than expected during BLE transfer?
details:
  realistic_solution: The extended active time is caused by the BLE 5.3 connection falling back to a lower data rate PHY (like Coded PHY for long-range) due to poor signal quality or non-IID device placement. While standard 2M PHY can transfer the payload quickly, the lower throughput of Coded PHY drastically increases the time the 64 MHz net core radio must remain active to transmit and receive the 200 KB total payload, multiplying the energy consumed at the ~5mA active rate.
  common_mistake: |
    **The Pitfall:** Assuming the communication link operates at peak ideal throughput.
    **The Rationale:** Engineers assume the 2M PHY is always active and stable.
    **The Consequence:** When environmental factors force a PHY fallback, transfer times balloon, dramatically multiplying the time the radio stays in the high-power active state and killing the battery.
  napkin_math: |
    *   **Payload:** 100 KB down + 100 KB up = 200 KB = 204,800 bytes = 1,638,400 bits.
    *   **Standard BLE 2M PHY Transfer:** 1,638,400 bits / 1,400,000 bps (realistic) = ~1.17 seconds.
    *   **Expected Active Time:** 1.17s (comm) + 3s (compute) = 4.17 seconds (matches ~5s expectation).
    *   **Coded PHY Transfer (Fallback):** 1,638,400 bits / 125,000 bps (realistic) = ~13.1 seconds.
    *   **Actual Active Time:** 13.1s (comm) + 3s (compute) = 16.1 seconds.
    *   **Energy Drain:** Energy increases from ~20.8 mAs (4.17s × 5mA) to ~80.5 mAs (16.1s × 5mA), a 4x penalty causing dropouts.
