title: Battery Drain During Federated Averaging
scenario: You are deploying a federated learning workload to wearables. During a federated averaging round, a device must download a 100 KB model, perform local training, and upload a 100 KB gradient payload. The system expects a 5-second active window per round at ~5mA, but monitoring shows the device remains in the active 5mA state for over 16 seconds.
question: Why do federated averaging rounds keep wearables active far longer than expected during BLE transfer, causing excessive battery drain?
details:
  realistic_solution: The extended active time is caused by the BLE stack executing a PHY fallback. Due to poor signal quality, the radio drops from the high-throughput 2M PHY to a lower-rate Coded PHY. While standard 2M PHY transfers the payload rapidly, the restricted throughput of Coded PHY drastically balloons the transmission time, multiplying the duration the radio remains in the high-power ~5mA active state.
  common_mistake: |
    **The Pitfall:** Assuming the wireless communication link consistently operates at peak ideal throughput.
    **The Rationale:** Engineers design energy budgets using the nominal 2M PHY rate, ignoring real-world RF degradation and protocol fallback mechanisms.
    **The Consequence:** Environmental interference forces PHY fallback, communication times explode, and battery life is catastrophically drained.
  napkin_math: |
    **Assumptions & Constraints:**
    - Payload: 100 KB down + 100 KB up = 200 KB = 204,800 bytes = 1,638,400 bits.
    - Compute time: 3s. Active Current: ~5mA.

    **Calculations:**
    - Standard 2M PHY: 1,638,400 bits / 1,400,000 bps = ~1.17s. Total active: 1.17s + 3s = 4.17s.
    - Coded PHY Fallback: 1,638,400 bits / 125,000 bps = ~13.1s. Total active: 13.1s + 3s = 16.1s.
    - Energy Drain: Increases from 20.8 mAs (4.17s * 5mA) to 80.5 mAs (16.1s * 5mA).

    **Conclusion & Interpretation:**
    - **Result: 80.5 mAs (Communication-Bound)**. PHY fallback imposes a 4x energy penalty, depleting the battery.
