title: Creating Preemptive RTOS Queues for Deadlines
scenario: A wearable tracks heart rate via 10Hz (100ms) inferences but sporadically syncs via Bluetooth, running a 150ms routine.
question: "Create a preemptive queueing mechanism that guarantees the 100ms inference loop never misses a deadline during a Bluetooth sync."
details:
  realistic_solution: Implement a dual-priority RTOS setup where inference runs at a higher priority than the Bluetooth stack. The 100ms timer preempts the 150ms Bluetooth sync, executes the fast inference, pushes the result to a thread-safe queue, and allows the sync to resume.
  common_mistake: |
    **The Pitfall:** Using a simple FIFO queue for task scheduling.
    **The Rationale:** Candidates fail to realize that a long-running background task will block the queue.
    **The Consequence:** The 150ms Bluetooth blocking task delays the inference task beyond its strict 100ms deadline.
  napkin_math: |
    1. Identify deadline constraint: Inference must run every 100 ms.
    2. Identify blocking task: Bluetooth sync takes 150 ms.
    3. Evaluate FIFO overlap: 150 ms > 100 ms, causing a mandatory deadline miss.
    4. **Final Result: Preemption is strictly required because 150 ms > 100 ms.**
