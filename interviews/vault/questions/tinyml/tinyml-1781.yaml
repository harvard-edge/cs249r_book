title: Creating Preemptive RTOS Queues for Deadlines
scenario: A wearable tracks heart rate via 10Hz (100ms) inferences but sporadically
  syncs via Bluetooth, running a 150ms routine.
question: Create a preemptive queueing mechanism that guarantees the 100ms inference
  loop never misses a deadline during a Bluetooth sync.
details:
  realistic_solution: Implement a dual-priority RTOS setup where inference runs at
    a higher priority than the Bluetooth stack. The 100ms timer preempts the 150ms
    Bluetooth sync, executes the fast inference, pushes the result to a thread-safe
    queue, and allows the sync to resume.
  common_mistake: Using a simple FIFO queue where the 150ms Bluetooth blocking task
    delays the inference task beyond its strict 100ms deadline.
  napkin_math: 150ms task > 100ms deadline -> Preempt
