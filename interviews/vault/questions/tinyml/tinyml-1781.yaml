title: Creating Preemptive RTOS Queues for Deadlines
scenario: A wearable tracks heart rate via 10Hz (100ms) inferences but sporadically syncs via Bluetooth, running a 150ms routine.
question: "Create a preemptive queueing mechanism that guarantees the 100ms inference loop never misses a deadline during a Bluetooth sync."
details:
  realistic_solution: Architect a dual-priority RTOS semaphore structure. The high-priority 100ms timer ISR deterministically preempts the low-priority 150ms Bluetooth thread, executes inference, logs the vector to a thread-safe IPC queue, and relinquishes the core back to Bluetooth.
  common_mistake: |
    **The Pitfall:** Using a naive monolithic FIFO queue for task scheduling.
    **The Rationale:** Candidates fail to realize that temporal overlaps map sequentially in unprioritized architectures.
    **The Consequence:** The 150ms Bluetooth blocking task suffocates the inference task, definitively violating the 100ms Nyquist deadline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hard deadline constraint: Inference execution every 100 ms.
       - Blocking task footprint: Bluetooth sync requires 150 ms continuous execution.
    2. **Calculations:**
       - Evaluated FIFO delay: 150 ms > 100 ms.
       - Deficit: 150 ms - 100 ms = 50 ms overrun per overlap.
    3. **Conclusion & Interpretation:**
       - **Result: Preemption is strictly required to avert 50ms sequential deadline overrun (Scheduling-Bound).**
