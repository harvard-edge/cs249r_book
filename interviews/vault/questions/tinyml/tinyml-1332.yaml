title: TinyML Memory Hierarchy Optimization on Nordic nRF5340
scenario: You are developing a sophisticated keyword spotting application using a small Convolutional Neural Network (CNN) on the Nordic nRF5340, which features 256 KB SRAM and 1 MB flash memory.
question: How should an nRF5340 place 100 KB CNN weights, 50 KB activations, buffers, and code across flash, SRAM, and registers?
details:
  realistic_solution: Utilize nsys profiling or TFLM memory planners. Map program code to flash, heavily accessed model weights and activations to SRAM, and leverage CPU registers. Use 8-bit or 4-bit weight quantization.
  common_mistake: |
    **The Pitfall:** Proposing external memory solutions (like HBM/DRAM) for an MCU.
    **The Rationale:** Candidates accustomed to cloud ML hardware fail to understand the architectural impedance mismatch, cost, and power implications for a microcontroller.
    **The Consequence:** Proposing a hardware design that is impossible to build within the power and cost constraints of a TinyML device.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - nRF5340: 256 KB SRAM, 1 MB Flash.
       - CNN: 100 KB weights (FP32 originally, quantizable to INT8), 50 KB activations.
    2. **Calculations:**
       - INT8 Quantization: 100 KB weights -> 25 KB.
       - SRAM Budget used: 50 KB (activations) + 25 KB (weights if loaded) = 75 KB.
       - Flash Read Latency (DMA): 25 KB at ~5 MB/s = ~5 ms.
    3. **Conclusion & Interpretation:**
       **Result: 181 KB SRAM remains.** The system is **Memory-Footprint-Bound**, requiring INT8 quantization and Flash execution to fit within the MCU's internal hierarchy.
