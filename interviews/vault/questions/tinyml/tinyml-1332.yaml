title: TinyML Memory Hierarchy Optimization on Nordic nRF5340
scenario: You are developing a sophisticated keyword spotting application using a
  small Convolutional Neural Network (CNN) on the Nordic nRF5340, which features 256
  KB SRAM, 1 MB flash memory, and a 128 MHz ARM Cortex-M33 CPU. The CNN model's weights
  occupy 100 KB, and peak activations during inference require 50 KB. Analyze the
  memory hierarchy relevant to this microcontroller (CPU registers, SRAM, flash) and
  explain how you would strategically place the model's components (program code,
  weights, activations, intermediate buffers) across these tiers. Discuss the capacity,
  bandwidth, and latency tradeoffs inherent to each tier. Given the nRF5340's constraints,
  what specific techniques would you implement to manage memory (e.g., quantization,
  data movement, buffer reuse) to achieve real-time inference? Furthermore, explain
  why higher tiers of memory hierarchy like HBM or DRAM are not directly applicable
  here, but how understanding their characteristics and the broader system's memory
  architecture remains crucial even in TinyML design.
question: How should an nRF5340 place 100 KB CNN weights, 50 KB activations, buffers,
  and code across flash, SRAM, and registers?
details:
  realistic_solution: A strong solution would map program code to flash, frequently
    accessed model weights and activations to SRAM (optimizing for buffer reuse),
    and utilize CPU registers for critical, loop-intensive computations. Techniques
    like 8-bit or even 4-bit weight quantization, layer-by-layer inference, and efficient
    DMA usage for moving data between flash and SRAM would be detailed. The candidate
    should explicitly address why HBM/DRAM are unsuitable for an nRF5340 due to cost,
    power, and interface complexity, but acknowledge that an understanding of their
    role in a broader ML system is still valuable for context and potential system
    integration scenarios.
  common_mistake: Candidates often fail to differentiate the roles of CPU registers,
    SRAM, and flash beyond simple capacity, or propose external memory solutions (like
    HBM/DRAM) without explaining the architectural impedance mismatch and power implications
    for an MCU. Another common mistake is overlooking the need for program code and
    stack/heap memory, assuming all SRAM is available for model data.
  napkin_math: If 100KB weights (initially 32-bit floats) are quantized to 8-bit integers,
    they would require 25KB of flash/SRAM. With 256KB SRAM, if 50KB is for activations
    and 25KB for quantized weights, that leaves 181KB for stack, heap, and other variables.
    If reading 25KB of weights from flash to SRAM takes ~5ms (assuming a modest 5MB/s
    effective transfer rate, common for QSPI flash on MCUs), this latency must be
    accounted for in the overall inference budget, especially if weights are streamed.
