title: TinyML Memory Hierarchy Optimization on Nordic nRF5340
scenario: You are developing a sophisticated keyword spotting application using a small Convolutional Neural Network (CNN) on the Nordic nRF5340, which features 256 KB SRAM, 1 MB flash memory, and a 128 MHz ARM Cortex-M33 CPU. The CNN model's weights occupy 100 KB, and peak activations during inference require 50 KB.
question: How should an nRF5340 place 100 KB CNN weights, 50 KB activations, buffers, and code across flash, SRAM, and registers?
details:
  realistic_solution: A strong solution would map program code to flash, frequently accessed model weights and activations to SRAM (optimizing for buffer reuse), and utilize CPU registers for critical, loop-intensive computations. Techniques like 8-bit or even 4-bit weight quantization, layer-by-layer inference, and efficient DMA usage for moving data between flash and SRAM would be detailed. The candidate should explicitly address why HBM/DRAM are unsuitable for an nRF5340 due to cost, power, and interface complexity, but acknowledge that an understanding of their role in a broader ML system is still valuable for context and potential system integration scenarios.
  common_mistake: |
    **The Pitfall:** Proposing external memory solutions (like HBM/DRAM) for an MCU.
    **The Rationale:** Candidates accustomed to cloud ML hardware fail to understand the architectural impedance mismatch, cost, and power implications for a microcontroller.
    **The Consequence:** Proposing a hardware design that is impossible to build within the power and cost constraints of a TinyML device.
  napkin_math: |
    1. **Quantization:** 100KB weights (initially 32-bit floats) quantized to 8-bit integers require **25KB**.
    2. **SRAM Budget:** 256KB total. 50KB for activations + 25KB for quantized weights (if loaded) = 75KB.
    3. **Remaining SRAM:** 256KB - 75KB = 181KB available for stack, heap, and other variables.
    4. **Flash Read Latency:** Reading 25KB of weights from flash to SRAM at ~5MB/s takes **~5ms**.
