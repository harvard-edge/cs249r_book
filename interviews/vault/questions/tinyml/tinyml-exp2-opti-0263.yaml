title: Federated Learning Memory Bottleneck on Corstone-300
scenario: You are deploying a cross-device federated learning update for a keyword spotting model on an
  ARM Cortex-M7 (480 MHz) + Ethos-U55 (Corstone-300) system, where the CPU and NPU share exactly 512 KB
  of SRAM. The model utilizes the Ethos-U55 (configured for 256 MAC/cycle) for rapid inference, but requires
  250 KB of weights and 150 KB of intermediate activations for a full backward pass. The federated averaging
  communication stack requires an additional 150 KB buffer to receive the global model update, causing
  an Out-Of-Memory (OOM) error before training begins.
question: "How should federated learning on Corstone-300 avoid SRAM OOM during local updates and global model reception?"
details:
  realistic_solution: The optimal strategy is to implement partial fine-tuning (e.g., training only the
    final classifier layer) to reduce activation memory, executing the forward pass on the Ethos-U55 and
    the backward pass on the Cortex-M7. Additionally, the global model update should be streamed in small
    chunks and applied in-place rather than allocating a monolithic buffer for the entire update.
  common_mistake: Candidates often suggest paging memory to flash or using external DRAM, forgetting that
    this MCU typically lacks external DRAM and writing to flash is too slow and power-intensive for frequent
    FL updates. Another mistake is assuming the Ethos-U55 NPU can accelerate the backward pass, when it
    is strictly designed for inference acceleration.
  napkin_math: 'Initial footprint: 250 KB (weights) + 150 KB (activations) + 150 KB (BLE buffer) = 550
    KB, exceeding the 512 KB shared SRAM limit. Fix 1: Restrict the backward pass to the final layer on
    the 480 MHz Cortex-M7, reducing activation memory from 150 KB to 10 KB (the Ethos-U55''s 256 MAC/cycle
    is used only for the forward pass). Fix 2: Stream the global update in 4 KB chunks. Optimized footprint:
    250 KB (weights) + 10 KB (activations) + 4 KB (BLE buffer) = 264 KB. 264 KB < 512 KB SRAM, resolving
    the bottleneck and leaving 248 KB for the RTOS.'
