title: Diagnosing Sensor Buffer Overrun During Inference
scenario: Your team is deploying an anomaly detection model on an ARM Cortex-M4 (STM32F4) microcontroller
  (168 MHz, 256 KB SRAM, 1 MB flash, no FPU). The system samples a 3-axis accelerometer at 4 kHz (16-bit
  resolution) using DMA into a 1024-byte ping-pong buffer (512 bytes per half). The INT8 model inference
  takes 35 ms leveraging CMSIS-NN SIMD (2x INT8 MACs/cycle). During testing, the model intermittently
  outputs garbage predictions, and you notice discontinuous jumps in the input feature windows. What is
  the root cause of this data corruption?
details:
  realistic_solution: The root cause is a buffer overrun condition. The DMA half-transfer completes and
    begins overwriting the memory region before the blocking inference task finishes processing it. The
    solution is to increase the ping-pong buffer size to hold all samples accumulated during the worst-case
    35 ms inference time.
  common_mistake: Candidates often blame the model's training data or suggest increasing the MCU clock
    speed without calculating the exact hardware constraints. They fail to relate the parallel DMA data
    ingestion rate to the blocking inference execution time.
  napkin_math: The sensor generates 4,000 samples/sec * 3 axes * 2 bytes/sample = 24,000 bytes/sec. A
    512-byte buffer half fills in 512 / 24,000 = 21.33 ms. Because the CMSIS-NN inference takes 35 ms,
    the DMA will completely fill the 512-byte alternate half and start overwriting the active half being
    processed (35 ms > 21.33 ms), resulting in data loss.
