title: Extreme Quantization on Resource-Constrained ARM Cortex-M4
scenario: You are tasked with deploying a small convolutional neural network (CNN) for a gesture recognition task on an ARM Cortex-M4 STM32F4 microcontroller. Your initial 8-bit quantized model consumes 192 KB for weights and activations, and exhibits an inference latency of 30 ms (target < 10 ms).
question: How should you size and evaluate ternary or 2-bit quantization for a Cortex-M4 gesture CNN targeting sub-10 ms latency?
details:
  realistic_solution: Implement a custom fixed-point quantization scheme, potentially using bit-packing for weights and activations to maximize memory efficiency. Focus on post-training quantization-aware training (PTQ-A), using a highly representative dataset for calibration. Explore ternary or binary weight quantization combined with 8-bit activations for better accuracy, or even sub-4-bit activations if possible, ensuring all operations are implemented using highly optimized integer arithmetic. Utilize a hardware-aware quantization framework that can target the specific ARM Cortex-M4 instruction set and leverage its DSP extensions for efficient integer multiplications. Evaluate techniques like GPTQ or AWQ with very aggressive bit-widths and a small calibration set, paying close attention to the impact on the model's critical layers. Performance analysis must include detailed cycle counting for critical kernels and a meticulous memory footprint analysis.
  common_mistake: |
    **The Pitfall:** Ignoring the lack of an FPU and relying on standard tools.
    **The Rationale:** Developers assume standard 8-bit or sub-4-bit quantization tools will automatically work efficiently.
    **The Consequence:** This leads to significant accuracy drops or memory overhead from unoptimized lookup tables.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8-bit size: 192 KB.
    - 8-bit latency: 30 ms at 168 MHz.
    - Target latency: < 10 ms.

    **Calculations:**
    - 2-bit size: 192 / 4 = 48 KB.
    - 8-bit cycles: 30 ms * 168 MHz = 5,040,000 cycles.
    - 2-bit target cycles (assuming 4x reduction in data access): ~1.26M cycles.
    - 2-bit expected latency: 1,260,000 / 168M = 7.5 ms.

    **Conclusion & Interpretation:**
    - **Result: ~7.5 ms (Compute-Bound)**. A 2-bit model reduces size to 48 KB and meets the < 10 ms latency target.
