title: Diagnosing Quantization Collapse in Low-Amplitude Signals
scenario: A 1D-CNN anomaly detection model on a Cortex-M4 uses standard symmetric
  Post-Training Quantization (PTQ) to INT8. Deployment recall crashes because low-amplitude
  early warning vibrations are ignored.
question: Analyze how global symmetric quantization scales interact with high-variance
  input sensors, causing structural failure on subtle data patterns.
details:
  realistic_solution: Symmetric quantization uses the maximum absolute value in the
    calibration set to determine the scaling factor. If a sensor records occasional
    loud mechanical shocks (outliers), the global max becomes huge. Consequently,
    small, subtle low-amplitude vibrations map to zero in INT8 space, effectively
    blinding the first convolutional layer to early warning signs. Asymmetric or percentile-based
    scaling is required.
  common_mistake: Blaming INT8 capacity broadly rather than recognizing the specific
    algorithmic collapse caused by mapping small floats to zero due to outlier-driven
    scales.
  napkin_math: Max=100. Scale=100/127=0.78. Signal of 0.3 quantizes to 0.3/0.78 =
    0 (lost).
