title: 'Energy Analysis of DVFS on Ethos-U55'
scenario: 'You are optimizing a keyword spotting model (5 million MACs per inference) on an ARM Cortex-M7 + Ethos-U55 platform (512 KB shared SRAM). The system currently runs at 480 MHz and 1.2V, with the U55 processing 256 MACs/cycle. You observe that when you drop the clock frequency to 240 MHz and scale the voltage to 0.9V, the inference time doubles, but the overall battery life extends significantly more than expected.'
question: 'Why does this non-linear energy savings occur, and what is the dynamic energy per inference for both P-states?'
details:
  realistic_solution: 'The dynamic power equation is P = C * V^2 * f, and total energy is E = P * t. Since the total clock cycles (f * t) required to compute the 5 million MACs remains constant, the energy per inference is proportional only to C * V^2. Reducing the voltage from 1.2V to 0.9V yields a quadratic reduction in energy consumption per inference, which explains why the battery life improves so drastically even though the chip takes twice as long to finish the computation.'
  common_mistake: |
    **The Pitfall:** Confusing power (watts) with energy per inference (joules).
    **The Rationale:** Candidates correctly note that dynamic power scales with `V^2 * f`, but forget that halving frequency doubles the execution time `t`.
    **The Consequence:** They wrongly assume energy scales with `V^2 * f`, failing to realize that for a fixed task, total dynamic energy only scales with `V^2`.
  napkin_math: |
    **Assumptions & Constraints:**
    - Workload: 5,000,000 MACs.
    - U55: 256 MACs/cycle.
    - Frequencies: 480 MHz vs 240 MHz.
    - Voltages: 1.2V vs 0.9V.

    **Calculations:**
    - Cycles Required: 5,000,000 MACs / 256 MACs/cycle = 19,531 cycles.
    - Latency at 480 MHz: 19,531 / 480 MHz = 40.7 μs.
    - Latency at 240 MHz: 19,531 / 240 MHz = 81.4 μs.
    - Energy Equation: E = C * V^2 * f * t. Since f * t is constant, E ∝ C * V^2.
    - Energy Ratio: (0.9 / 1.2)^2 = 0.5625.

    **Conclusion & Interpretation:**
    - **Result: 43.7% dynamic energy saved (Energy-Bound)**. Halving frequency doubles latency, but scaling voltage yields quadratic energy reduction.
