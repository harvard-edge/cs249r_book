title: The Dropped Audio Packet
scenario: You're designing a 'Hey, Gemini' wakeword detector using a Cortex-M4 microcontroller. The audio
  system provides a new chunk of data every 1,000 milliseconds (1 second). Your ML model requires 200
  Million FLOPs to process one of these chunks.
question: "Can the Cortex-M4 process the 200 MFLOP audio chunk within the 1000 ms real-time deadline?"
details:
  realistic_solution: 'Yes, real-time is feasible. Cortex-M4 at 168 MHz = ~336 MFLOPS (2 FLOPS/cycle with
    DSP MAC). Processing time = 200,000,000 / 336,000,000 = 595 ms. Deadline: 1,000 ms. 595 ms < 1,000
    ms with 405 ms headroom (40.5%). Practical overhead (ISR, DMA, RTOS): add ~15%, realistic time = 684
    ms, still within deadline with 316 ms for MFCC extraction and sleep. However, 200 MFLOPs approaches
    the limit: at 250 MFLOPs processing = 744 ms (25.6% margin). Beyond 300 MFLOPs (893 ms), the system
    cannot meet the deadline with overhead. The 168 MHz Cortex-M4 practical ceiling for 1-second windows
    is approximately 270 MFLOPs.'
  common_mistake: A common mistake is to perform the division incorrectly (e.g., inverting the operands
    to get `336 / 200 = 1.68`) or to misinterpret the units. Another error is simply stating the processing
    time without comparing it to the hard deadline, thus failing to answer the actual question about real-time
    viability. Finally, engineers sometimes forget that the calculated time is a theoretical best-case
    and doesn't account for OS jitter, I/O, or other system overhead.
  napkin_math: "1. **Identify Deadline:** The system gets new data every 1,000ms. This is the hard deadline.\n\
    2. **Identify Compute Capability:** Cortex-M4 at 168 MHz ≈ 336 MFLOPS (with DSP single-cycle MAC)\n\
    3. **Calculate Processing Time:**\n   - Time = FLOPs / Throughput = 200,000,000 FLOPs / 336,000,000\
    \ FLOPs/s = **595 ms**\n4. **Compare to Deadline:**\n   - Processing time (595 ms) < Deadline (1,000\
    \ ms) → **Yes, real-time is feasible**\n   - Headroom: 1,000 - 595 = 405 ms (40.5% margin)\n5. **Practical\
    \ considerations:**\n   - The 595 ms is a theoretical best-case assuming 100% DSP utilization\n  \
    \ - Real-world overhead (ISR handling, audio DMA, RTOS scheduling): add ~10-20%\n   - Realistic time:\
    \ ~595 × 1.15 = ~684 ms → still within the 1,000 ms deadline\n   - Remaining 316 ms available for\
    \ audio buffering, feature extraction (MFCC), and sleep\n\nThe system can operate in real-time with\
    \ comfortable margin, but 200 MFLOPs is near the practical limit for a Cortex-M4 with a 1-second window."
  options:
  - No, it would take over 500 seconds to process one chunk.
  - No, it can only process about 1.68 chunks per second, which is too slow.
  - Yes, it takes about 595ms, which is less than the 1000ms deadline.
  - Yes, but the 95ms of slack time is too small for a production system.
  correct_index: 2
