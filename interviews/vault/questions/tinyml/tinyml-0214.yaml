title: The Dropped Audio Packet
scenario: You're designing a 'Hey, Gemini' wakeword detector using a Cortex-M4 microcontroller. The audio system provides a new chunk of data every 1,000 milliseconds. Your ML model requires 200 Million FLOPs to process one of these chunks.
question: Can the Cortex-M4 process the 200 MFLOP audio chunk within the 1000 ms real-time deadline?
details:
  realistic_solution: 'Yes, real-time is feasible. Cortex-M4 at 168 MHz = ~336 MFLOPS (2 FLOPS/cycle with DSP MAC). Processing time = 200,000,000 / 336,000,000 = 595 ms. Deadline: 1,000 ms. 595 ms < 1,000 ms with 405 ms headroom (40.5%). Practical overhead (ISR, DMA, RTOS): add ~15%, realistic time = 684 ms, still within deadline with 316 ms for MFCC extraction and sleep. However, 200 MFLOPs approaches the limit: at 250 MFLOPs processing = 744 ms (25.6% margin). Beyond 300 MFLOPs (893 ms), the system cannot meet the deadline with overhead. The 168 MHz Cortex-M4 practical ceiling for 1-second windows is approximately 270 MFLOPs.'
  common_mistake: |
    **The Pitfall:** Basic unit inversion or ignoring system overhead.
    **The Rationale:** Candidates often incorrectly divide throughput by FLOPs or fail to account for the real-world overhead of OS jitter, ISR, and I/O.
    **The Consequence:** They claim the device easily meets real-time criteria without verifying the physical margin left over for system stability.
  napkin_math: |
    - Compute Capability: Cortex-M4 at 168 MHz ≈ 336 MFLOPS.
    - Ideal Processing Time: 200M FLOPs / 336 MFLOPS = 595 ms.
    - Compare to Deadline: 595 ms < 1,000 ms (**Yes, feasible**).
    - Realistic Overhead: Add ~15% overhead for OS/ISR → ~684 ms.
    - Margin: 1,000 - 684 = 316 ms remaining.
  options:
  - No, it would take over 500 seconds to process one chunk.
  - No, it can only process about 1.68 chunks per second, which is too slow.
  - Yes, it takes about 595ms, which is less than the 1000ms deadline.
  - Yes, but the 95ms of slack time is too small for a production system.
  correct_index: 2
