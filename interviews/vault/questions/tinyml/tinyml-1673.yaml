title: Differential LoRaWAN Updates
scenario: A 50KB ML model on a Cortex-M4 needs a weight update over a LoRaWAN link
  transmitting at 1 kilobit per second.
question: Analyze the full payload transmission time and design a differential weight
  update protocol to minimize OTA time.
details:
  realistic_solution: Transmitting the full 50KB model at 1 kbps would take 400 seconds.
    A differential protocol computes a sparse diff of only the modified weights. The
    server transmits an array of (offset, new_value) tuples. If only 5% of weights
    changed, the payload drops to ~3KB (accounting for offset indices), reducing transmission
    time to 24 seconds.
  common_mistake: Sending the entire serialized flatbuffer over the air, leading to
    massive battery drain and high packet loss probability over LoRa.
  napkin_math: 50KB = 400,000 bits. At 1,000 bps, full transfer = 400 seconds.
