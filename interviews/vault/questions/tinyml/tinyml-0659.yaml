title: The Silent Sensor Stalemate
scenario: You are the Principal Engineer for a company that has deployed 100,000 smart air quality sensors.
  The devices are built with a cost-effective Cortex-M4 MCU and a basic MEMS sensor. After six months
  in the field, customer complaints are rising about 'stuck' readings. Analysis reveals that ~2% of the
  MEMS sensors have failed silently, continuously reporting their last valid reading before failure. The
  devices have no OTA capability; they only have a low-bandwidth LoRaWAN uplink to send a 51-byte data
  packet once per hour. A physical recall is not economically viable.
details:
  realistic_solution: 'Implement a three-layer on-device fault detection system within the Cortex-M4''s
    constraints: **Layer 1 — Staleness detector (trivial cost):** Compare each new reading to the previous
    one. If identical for N consecutive readings (e.g., N=10, representing 10 hours), set a fault flag.
    Cost: 4 bytes SRAM (previous reading), 1 comparison per hour. **Layer 2 — Variance monitor:** Maintain
    a running variance over the last 24 readings (24 hours). Healthy air quality sensors show diurnal
    variation. If variance drops below a threshold (e.g., <0.1% of expected range), flag suspected sensor
    failure. Cost: 24 × 4 = 96 bytes SRAM for circular buffer, ~50 cycles of computation per hour. **Layer
    3 — Telemetry encoding:** Encode a 1-byte health status in each 51-byte LoRaWAN packet (0=healthy,
    1=stale, 2=low-variance, 3=out-of-range). The backend aggregates health flags across the fleet to
    identify the ~2% of failed devices for targeted replacement.'
  common_mistake: Proposing a complex, ML-based anomaly detection model that cannot possibly fit within
    the 256KB SRAM budget. Another common mistake is suggesting backend-only analysis, which fails to
    solve the core problem of identifying *which* of the 100,000 devices is faulty. Finally, suggesting
    a high-level fix like 'add a watchdog timer' without specifying *what* the watchdog is monitoring.
  napkin_math: '**On-device resource cost:** SRAM: Previous reading (4 B) + variance buffer (24 × 4 =
    96 B) + health flag (1 B) = **101 bytes** — 0.04% of 256 KiB. Compute: 1 comparison + 1 running variance
    update per hour ≈ 100 cycles/hour. At 168 MHz, that is 100 / 168M = 0.0000006 s = **0.6 µs per hour**
    — negligible. **Telemetry cost:** 1 byte added to 51-byte packet → 50 bytes remaining for sensor data
    (98% preserved). **Fleet-level detection:** 100,000 devices × 1 health byte/hour × 24 hours = 2.4
    MB/day for the entire fleet. Backend scans for devices with consecutive stale/low-variance flags.
    At 2% failure rate: ~2,000 devices flagged. With N=10 consecutive stale readings as threshold: detection
    latency = **10 hours** after sensor failure. False positive rate: extremely low (healthy sensors show
    natural variance from HVAC, occupancy, weather). **Targeted replacement cost:** 2,000 devices × ~$20/replacement
    = $40,000 vs. full fleet recall of 100,000 × $20 = $2M. Savings: **$1.96M** (98% cost reduction).'
