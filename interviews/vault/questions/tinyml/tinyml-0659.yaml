title: The Silent Sensor Stalemate
scenario: You are the Principal Engineer for a company that has deployed 100,000 smart air quality sensors. The devices are built with a cost-effective Cortex-M4 MCU and a basic MEMS sensor. After six months in the field, customer complaints are rising about 'stuck' readings. Analysis reveals that ~2% of the MEMS sensors have failed silently, continuously reporting their last valid reading before failure. The devices have no OTA capability; they only have a low-bandwidth LoRaWAN uplink to send a 51-byte data packet once per hour. A physical recall is not economically viable.
question: What on-device fault detection and telemetry architecture can identify silent MEMS sensor failures within LoRaWAN limits?
details:
  realistic_solution: 'Implement a three-layer on-device fault detection system within the Cortex-M4''s constraints: **Layer 1 — Staleness detector (trivial cost):** Compare each new reading to the previous one. If identical for N consecutive readings (e.g., N=10, representing 10 hours), set a fault flag. Cost: 4 bytes SRAM (previous reading), 1 comparison per hour. **Layer 2 — Variance monitor:** Maintain a running variance over the last 24 readings (24 hours). Healthy air quality sensors show diurnal variation. If variance drops below a threshold (e.g., <0.1% of expected range), flag suspected sensor failure. Cost: 24 × 4 = 96 bytes SRAM for circular buffer, ~50 cycles of computation per hour. **Layer 3 — Telemetry encoding:** Encode a 1-byte health status in each 51-byte LoRaWAN packet (0=healthy, 1=stale, 2=low-variance, 3=out-of-range). The backend aggregates health flags across the fleet to identify the ~2% of failed devices for targeted replacement.'
  common_mistake: Proposing a complex, ML-based anomaly detection model that cannot possibly fit within the 256KB SRAM budget. Another common mistake is suggesting backend-only analysis, which fails to solve the core problem of identifying *which* of the 100,000 devices is faulty. Finally, suggesting a high-level fix like 'add a watchdog timer' without specifying *what* the watchdog is monitoring.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100,000 devices with Cortex-M4 (168 MHz) and 256 KB SRAM.
    - LoRaWAN uplink: 51 bytes/hour.

    **Calculations:**
    - On-device SRAM cost: 4 B (prev) + 96 B (variance) + 1 B (flag) = 101 bytes.
    - Compute cost: ~100 cycles/hour (0.6 µs).
    - Telemetry overhead: 1 byte per 51-byte packet.
    - Detection latency: 10 hours (at N=10 threshold).

    **Conclusion & Interpretation:**
    - **Result: $1.96M Savings (Compute-Bound)**. Trivial on-device heuristics cleanly solve the silent failure problem with negligible memory and compute overhead.
