title: CNN Backbone Architecture for Corstone-300
scenario: You are tasked with designing the CNN backbone for a real-time vision pipeline on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) system. The platform features a 480 MHz M7 and an Ethos-U55 NPU (configured for 256 MACs/cycle), both sharing a strict 512 KB SRAM budget for weights and activations.
question: "How should CNN convolution blocks be architected to maximize Ethos-U55 utilization without causing OOM errors in the 512 KB shared SRAM?"
details:
  realistic_solution: The optimal design modifies the standard inverted residual blocks specifically for the Ethos-U55 and tight SRAM constraints. The candidate should propose using smaller expansion ratios (e.g., 2x or 3x instead of 6x) to control the peak activation memory footprint. Additionally, they should evaluate using fused inverted residual blocks (replacing the 1x1 expansion and 3x3 depthwise convolutions with a single 3x3 standard convolution) in the early stages of the network, which significantly improves NPU MAC utilization and reduces memory bandwidth overhead.
  common_mistake: |
    **The Pitfall:** Blindly applying off-the-shelf MobileNet architectures with large 6x expansion ratios and heavy depthwise layers.
    **The Rationale:** Candidates assume architectures optimized for mobile phones scale down linearly to MCUs.
    **The Consequence:** The large expansion phase causes peak memory spikes that exceed the 512 KB SRAM limit, and depthwise layers yield poor MAC utilization on the rigid Ethos-U55 hardware.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Platform: 512 KB SRAM.
       - Intermediate feature map: 56x56x64 (INT8) = 200 KB.
    2. **Calculations:**
       - Standard 6x expansion peak: 56 * 56 * (64*6) = 1,204,224 bytes (~1.2 MB).
       - Reduced 2x expansion peak: 56 * 56 * (64*2) = 401,408 bytes (~401 KB).
    3. **Conclusion & Interpretation:**
       - **Result: 6x expansion OOMs; 2x expansion fits alongside M7 working memory.**
       - **Memory-Bound (Peak Activations)**
