title: The Conversational Doorbell's Memory Deficit
scenario: You are the Principal Engineer at a smart home startup, designing a 'context-aware'
  doorbell on a Cortex-M7 MCU. The MCU has 1MB of Flash and 512KB of SRAM. Your product's
  key feature is a tiny transformer model (500K parameters) that holds a short conversation,
  requiring it to maintain a KV-cache for conversational context. The product requirement
  is to support a context length of at least 256 tokens. Your analysis shows the model's
  tensor arena requires 200KB of SRAM for a single forward pass, and the FP16 KV-cache
  for 256 tokens requires another 256KB. Together with the RTOS and other system functions
  (~80KB), the total 536KB requirement exceeds the available 512KB of SRAM. Propose
  a novel system architecture that allows the device to function despite the KV-cache
  not fitting in SRAM. Your design must use the MCU's hardware capabilities, like
  the DMA controller and Flash memory, and you must justify its feasibility with a
  quantitative analysis of the latency impact.
question: How can a Cortex-M7 doorbell support a 256-token transformer KV cache when
  SRAM needs exceed 512 KB?
details:
  realistic_solution: 'The correct architectural approach is to treat the device''s
    Flash memory as a secondary storage tier for the KV-cache, analogous to how a
    PC uses an SSD for virtual memory. The design involves ''Flash Paging'':'
  common_mistake: The most common and incorrect answer is to declare the feature impossible
    on the given hardware, or to propose shrinking the model or context length, which
    fails to meet the product requirements. A slightly better but still incomplete
    answer is to suggest aggressive quantization of the KV-cache without analyzing
    the significant quality degradation or the implementation complexity on an MCU.
  napkin_math: The feasibility of Flash Paging depends on the latency tradeoff being
    acceptable.
