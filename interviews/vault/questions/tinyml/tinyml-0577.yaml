title: The Sensor Bus Pull-Up Resistor
scenario: You build a custom TinyML PCB and attach an I2C environmental sensor to the MCU. The ML model expects temperature data, but the i2c_read() function constantly timeouts, and the model runs on garbage 0xFF data. You check the schematic and see the SDA and SCL lines are wired directly from the sensor to the MCU pins.
question: What crucial analog component is missing, causing the digital bus to fail?
details:
  realistic_solution: 'Missing I2C pull-up resistors. I2C relies on RC time constants with open-drain architectures. Without them, the rise time is infinite, causing hardware-level bus timeouts and data corruption.'
  common_mistake: |
    **The Pitfall:** Recommending a logic level shifter.
    **The Rationale:** Engineers assume a voltage mismatch rather than recognizing the fundamental open-drain physics of the I2C bus.
    **The Consequence:** PCB respins are ordered unnecessarily, and the digital bus remains permanently unresponsive.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Bus type: I2C (Open-drain).
       - Pull-up resistor: 4.7 kΩ.
       - Parasitic capacitance: 50 pF.
    2. **Calculations:**
       - RC time constant = R * C = 4,700 Ω * 50e-12 F = 235 ns.
       - Fast mode I2C clock = 400 kHz (2.5 µs period).
    3. **Conclusion & Interpretation:**
       - **Result: Hardware-Bound.** Without pull-up resistors, the signal cannot cleanly rise to 3.3V, causing immediate protocol failure.
