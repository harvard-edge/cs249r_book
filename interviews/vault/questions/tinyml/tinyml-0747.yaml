title: The Int8 Asymmetric Zero-Point
scenario: You are inspecting a TFLite Micro fully connected layer. The input tensor is INT8, the weights
  are INT8, and the output is INT8. However, the inner loop of the C++ code performs `(input[i] - input_zero_point)
  * (weight[i] - weight_zero_point)`. Why is this math so much slower than a pure `input * weight` dot
  product?
details:
  realistic_solution: 'Asymmetric quantization requires subtracting zero-points before every multiply:
    (input - zp_in) * (weight - zp_wt). This adds extra integer subtractions per MAC vs symmetric quantization
    where zero_point = 0 and the math reduces to input * weight. For 1M MACs: asymmetric costs 3M instructions
    vs symmetric''s 2M — a 50% overhead. Fix: use symmetric quantization for weights (force zero_point
    = 0 during quantization-aware training). Input can remain asymmetric (one subtraction amortized per
    channel). CMSIS-NN optimizes symmetric weights specially, using SMLAD for 2 MACs/cycle. Asymmetric
    weights fall back to scalar code.'
  common_mistake: '"The zero-point is an optional calibration." It''s not optional; it''s the fundamental
    definition of asymmetric quantization.'
  napkin_math: Asymmetric MAC = 3 instructions. Symmetric Weight MAC = 2 instructions. For a million parameters,
    symmetric weights eliminate a million unnecessary integer subtractions per inference (3M instructions
    vs 2M instructions).
  options:
  - The zero-point subtraction is optional and can be disabled by setting the quantization mode to 'symmetric'
    in TFLite Micro's runtime configuration.
  - 'Asymmetric quantization requires subtracting zero-points before every MAC: (input - zp_in) * (weight
    - zp_wt) = 3 instructions/MAC vs symmetric''s 2 (input * weight when zp_wt = 0). For 1M MACs: 50%
    overhead (3M vs 2M instructions). Fix: use symmetric quantization for weights (force zp = 0 during
    QAT). CMSIS-NN optimizes symmetric weights via SMLAD (2 MACs/cycle); asymmetric falls back to scalar
    code.'
  - The extra subtraction instructions cause pipeline stalls on the Cortex-M4 because the SUB instruction
    has a 3-cycle latency that cannot be hidden by the in-order pipeline.
  - The zero-point subtraction doubles memory bandwidth because each weight must be loaded twice — once
    for the subtraction and once for the multiplication.
  correct_index: 1
