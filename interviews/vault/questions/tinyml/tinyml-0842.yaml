title: Implement MobileNet-style INT8 quantization for ESP32-S3 inference
scenario: You are deploying a 5-class image classifier based on MobileNetV1-0.25x (0.027 GFLOPs, 225K params) on an ESP32-S3 (240MHz, 512KB SRAM, 8MB PSRAM) using TensorFlow Lite Micro.
question: How should the MobileNetV1-0.25x model be quantized and deployed on ESP32-S3 for reliable INT8 inference?
details:
  realistic_solution: 'QAT pipeline: (1) Train FP32 to convergence; (2) Apply tf.quantization.experimental.quantize_model() or torch.quantization.prepare_qat(); (3) Fine-tune 20 epochs with fake quantize nodes; (4) Convert to TFLite INT8 with full-integer quantization; (5) Copy .tflite to ESP32-S3 flash; (6) TFLite Micro on ESP32-S3: use esp_tflite_micro library, allocate tensor arena in PSRAM (8MB available). Arena size calculation: largest activation 96×96×8×1B (if input resized) = 73KB; allocate 200KB arena. Verify with MicroInterpreter::AllocateTensors().'
  common_mistake: |
    **The Pitfall:** Relying strictly on Post-Training Quantization (PTQ) for small MobileNet architectures.
    **The Rationale:** Due to small channel counts (e.g., 8 channels in early layers), PTQ causes severe dynamic range collapse.
    **The Consequence:** The quantized model deploys successfully but exhibits catastrophic accuracy degradation, requiring full Quantization-Aware Training (QAT).
  napkin_math: |
    *   **Weights Size:** 225K params * 1B INT8 = 225 KB.
    *   **Arena Estimate:** Weights (225 KB) + Peak Activation (96x96x8 = 73 KB) + Scratch (50 KB) = 348 KB.
    *   **Memory Placement:** Can allocate the TFLite Micro tensor arena in PSRAM if needed, or tight fit into the 512KB SRAM.
    *   **Compute Latency:** 0.027 GFLOPs = 13.5M MACs. At ~30M MACs/sec effective CMSIS-NN throughput = ~450ms.
    *   **Optimization:** Reducing input to 64x64 drops MACs to ~6M, giving **~200ms latency** (acceptable for 5 FPS).
