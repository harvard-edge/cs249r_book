title: ARM Cortex-M4 SRAM and Flash Capacities
scenario: You are porting a pre-trained keyword spotting model to an ARM Cortex-M4 (STM32F4) microcontroller. To ensure the model can be successfully deployed without encountering Out-Of-Memory (OOM) errors, you must verify the hardware's storage limits.
question: What are the exact capacities of the on-chip SRAM and Flash memory for this specific platform?
details:
  realistic_solution: The STM32F4 features exactly 256 KB of SRAM and 1 MB of Flash memory. In a typical TinyML deployment, the read-only model weights are stored in the 1 MB Flash, while the 256 KB SRAM is strictly reserved for intermediate activations, the RTOS, and the application stack/heap.
  common_mistake: |
    **The Pitfall:** Mixing up the capacities of SRAM and Flash, or assuming the presence of external DRAM.
    **The Rationale:** Candidates used to mobile or cloud environments habitually think in terms of Megabytes or Gigabytes for working memory.
    **The Consequence:** Assuming megabytes of SRAM results in designing models that fundamentally cannot run on the target hardware.
  napkin_math: |
    - **Total Flash:** 1 MB = 1,048,576 bytes (maximum space for code and read-only INT8 weights).
    - **Total SRAM:** 256 KB = 262,144 bytes.
    - **Overhead:** If the application and RTOS consume 62 KB of SRAM.
    - **Result:** The maximum available memory for the model's tensor arena (activations) is 256 KB - 62 KB = **194 KB**.
