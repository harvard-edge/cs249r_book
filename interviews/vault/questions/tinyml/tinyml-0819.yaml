title: BLE Transmission Overlap Diagnosis
scenario: A wearable Cortex-M4 ECG device processes a 10KB feature vector array taking
  30ms, then transmits it over a 2 Mbps BLE link. The device is currently missing
  its 60ms hard real-time deadline.
question: Diagnose the latency failure in the current sequential pipeline and design
  a specification to overlap operations using hardware peripherals.
details:
  realistic_solution: The 10KB payload takes 40ms to transmit over a 2 Mbps link.
    Added to the 30ms compute, the total sequential time is 70ms, violating the 60ms
    deadline. The candidate should diagnose the lack of pipelining and specify a dual-buffer
    DMA (Direct Memory Access) architecture. While the CPU computes the features for
    frame N, the DMA controller autonomously transmits frame N-1 over the BLE peripheral,
    reducing the per-frame latency to max(30ms, 40ms) = 40ms.
  common_mistake: Suggesting data compression without accounting for the additional
    CPU latency it introduces, pushing the compute time beyond the 60ms deadline anyway.
  napkin_math: 10 KB * 8 bits/byte = 80 Kb; 80 Kb / 2 Mbps = 40 ms TX time.
