title: Defining Fail-Safe vs Fail-Operational on nRF5340
scenario: You are deploying a predictive maintenance model on a Nordic nRF5340 microcontroller
  (128 MHz app core, 256 KB SRAM, 1 MB flash). The device monitors an industrial motor
  and transmits alerts via BLE 5.3. When asked about system reliability during a critical
  sensor failure, you need to retrieve the definitions for fail-safe and fail-operational
  states in the context of graceful degradation.
question: What is the difference between fail-safe and fail-operational behavior for
  an nRF5340 predictive maintenance device?
details:
  realistic_solution: Fail-safe means the system enters a known safe state (e.g.,
    halting the motor and disabling the 128 MHz app core to save power) when a failure
    occurs, preventing harm. Fail-operational means the system continues to function
    and provide predictions, perhaps using a simpler fallback heuristic running on
    the 64 MHz net core, albeit at a degraded performance level.
  common_mistake: Candidates often confuse fail-safe with fail-operational, assuming
    both mean the system continues to perform its primary ML inference function. They
    might incorrectly state that a fail-safe nRF5340 system continues running the
    full neural network model.
  napkin_math: If a fail-safe mode shuts down the 128 MHz app core, degrading from
    the ~5mA active state to a 5uA sleep state while keeping the BLE 5.3 radio in
    a low-duty cycle advertising mode, it reduces power consumption by 5000uA / 5uA
    = 1000x.
