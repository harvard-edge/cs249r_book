title: Defining Fail-Safe vs Fail-Operational on nRF5340
scenario: You are deploying a predictive maintenance model on a Nordic nRF5340 microcontroller (128 MHz app core, 256 KB SRAM, 1 MB flash). The device monitors an industrial motor and transmits alerts via BLE 5.3. When asked about system reliability during a critical sensor failure, you need to retrieve the definitions for fail-safe and fail-operational states in the context of graceful degradation.
question: What is the difference between fail-safe and fail-operational behavior for an nRF5340 predictive maintenance device?
details:
  realistic_solution: Fail-safe means the system enters a known safe state (e.g., halting the motor and disabling the 128 MHz app core to save power) when a failure occurs, preventing harm. Fail-operational means the system continues to function and provide predictions, perhaps using a simpler fallback heuristic running on the 64 MHz net core, albeit at a degraded performance level.
  common_mistake: |
    **The Pitfall:** Confusing fail-safe with fail-operational.
    **The Rationale:** Candidates often assume both terms mean the system continues to perform its primary, heavy ML inference function without interruption.
    **The Consequence:** Designing a system that dangerously attempts to run full inferences on corrupted sensor data instead of transitioning to a safe, low-power halt state.
  napkin_math: |
    - Active state (128 MHz app core): ~5mA.
    - Fail-safe sleep state: ~5µA.
    - Power reduction during fail-safe mode = 5000µA / 5µA = **1000x power savings**.
