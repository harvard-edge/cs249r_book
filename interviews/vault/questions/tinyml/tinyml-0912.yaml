title: 'TinyML TCO Mastery: Make On-Device vs Cloud Decision for Industrial TinyML'
scenario: Make a comprehensive make-vs-buy-vs-cloud decision for 50,000 vibration sensors in a manufacturing facility. Options: (A) Cortex-M4+Ethos-U55 ($15/unit, 0.5mW avg, LoRa $0.05/mo, Model Dev $200K + $50K/yr), (B) ESP32-S3 with cloud (unit $5, cloud $0.001/inference at 144/day = $52.56/unit/yr), (C) off-the-shelf Siemens SIMATIC sensor ($200/unit, pre-trained model, SaaS $10/unit/month).
question: Which make, buy, or cloud option minimizes five-year TCO for 50,000 vibration sensors, and why?
details:
  realistic_solution: 'Option A: HW: 50K*$15=$750K. Power: 50K*0.5mW = 25W. 25W * 8760h * 5yr = 1095 kWh * $0.10 = $109.50 (negligible). Model dev: $200K one-time + $50K/yr maint = $450K. Connectivity (LoRa): $0.05*50K*60mo=$150K. Total 5yr: $750K+$450K+$150K=$1.35M. Option B: HW: 50K*$5=$250K. Cloud: 50K*$52.56*5=$13.14M. 5yr: $13.39M. Option C: HW: 50K*$200=$10M. SaaS: 50K*$10*60=$30M. 5yr: $40M. Ranking: A ($1.35M) << B ($13.4M) << C ($40M). Option A wins by 9.9x vs B and 29.6x vs C. Key: cloud inference at scale is prohibitively expensive. The $200K model development is a one-time cost amortized over 50K units.'
  common_mistake: |
    **The Pitfall:** Ignoring data science team costs or cloud scaling costs.
    **The Rationale:** Focusing solely on hardware per-unit costs while neglecting the massive recurring costs of cloud inference at high volumes or vendor SaaS subscriptions.
    **The Consequence:** Recommending a cloud-dependent system that looks cheap at prototype scale but costs millions in operating expenses over 5 years.
  napkin_math: |
    1. **Option A (Edge AI):** HW $750K + Connectivity $150K + Dev/Maint $450K = **$1.35M**.
    2. **Option B (Cloud):** HW $250K + Cloud Inference ($52.56/yr * 50K * 5yr = $13.14M) = **$13.39M**.
    3. **Option C (Vendor SaaS):** HW $10M + SaaS ($10/mo * 12 * 5 * 50K = $30M) = **$40M**.
    4. **Conclusion:** Option A wins decisively. Edge inference eliminates the prohibitively expensive recurring cloud costs at scale.
