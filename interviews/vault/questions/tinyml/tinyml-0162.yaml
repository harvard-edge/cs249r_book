title: 'The FOTA Time Budget'
scenario: 'You need to perform a firmware-over-the-air (FOTA) update for a fleet of environmental sensors. The total update package, containing a new model and system firmware, is 450 KB. The devices will receive this update over a 10 Mbps SPI bus. Ignore protocol overhead and any potential write-time to the flash memory.'
question: 'What is the minimum theoretical time to transmit a 450 KB FOTA package over a 10 Mbps SPI bus?'
details:
  realistic_solution: 'To solve this correctly, you must make the units consistent before dividing. The standard approach is to convert both the file size and the bus speed to bits.'
  common_mistake: 'The most common mistake is confusing bits and bytes. Network and bus transfer speeds are marketed in bits per second (e.g., Mbps), while file and memory sizes are measured in bytes (e.g., KB). Forgetting to multiply the file size by 8 to convert bytes to bits is a classic error that leads to an 8x underestimation of the required time.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Firmware size: 450 KB.
    - SPI bus speed: 10 Mbps.

    **Calculations:**
    - Size in bits: 450 KB * 1024 bytes/KB * 8 bits/byte = 3,686,400 bits.
    - Transfer Time: 3,686,400 bits / 10,000,000 bits/sec = 0.368 seconds.

    **Conclusion & Interpretation:**
    - **Result: 0.368 seconds (I/O-Bound)**. The raw SPI transfer completes in under half a second, minimizing device active time.
  options:
  - '~2.95 seconds'
  - '~0.05 seconds'
  - '~0.37 seconds'
  - '~37 seconds'
  correct_index: 2
