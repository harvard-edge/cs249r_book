title: 'Roofline Analysis on Nordic nRF5340: Optimizing TinyML Inference'
scenario: 'You are tasked with optimizing a TinyML model for audio keyword spotting on a Nordic nRF5340
  microcontroller, which features a 128 MHz ARM Cortex-M33 processor, 256 KB SRAM, and 1 MB flash. Your
  current model requires approximately 100,000 Multiply-Accumulate (MAC) operations and involves 60 KB
  of memory accesses (for weights, activations, and intermediate buffers) per inference. The observed
  inference latency is not meeting real-time requirements.


  Using the concept of Roofline Analysis, describe the steps you would take to diagnose whether this workload
  is compute-bound or memory-bound on the nRF5340. Include the calculations for:

  1. Peak compute performance (MMAC/s) for the nRF5340''s Cortex-M33.

  2. Peak memory bandwidth (MB/s) for the nRF5340''s SRAM.

  3. The operational intensity (MACs/byte) for your model.

  4. Based on these calculations, explain where your model''s workload would fall on a Roofline chart,
  identifying it as compute-bound or memory-bound.'
details:
  realistic_solution: A realistic solution involves refining the Roofline model parameters with actual
    measured values where possible, especially for `P_peak` (by running compute-bound kernels) and `B_peak`
    (by running memory-bound kernels) on the nRF5340. For the model itself, optimization techniques like
    8-bit post-training quantization, network pruning, and efficient memory management (e.g., using all
    available SRAM effectively for buffering activations, ensuring weights are loaded optimally) can significantly
    alter the operational intensity. If the model is memory-bound, reducing the model size (weights) and
    intermediate activation sizes is key. If compute-bound, exploring operator fusion, using optimized
    ARM CMSIS-NN libraries, or leveraging any available DSP/SIMD instructions on the Cortex-M33 can improve
    throughput.
  common_mistake: A common mistake is to oversimplify the peak memory bandwidth, assuming it's solely
    determined by the clock speed and bus width without accounting for memory contention, caching effects
    (or lack thereof in TinyML), or the actual memory access patterns of the model. Another mistake is
    to neglect the true MACs per cycle of the specific ARM Cortex-M33 core, especially whether it uses
    DSP extensions for accelerated integer MACs, which significantly impacts the `P_peak` calculation.
  napkin_math: '# Peak Compute Performance (P_peak)

    - Assuming a Cortex-M33 can execute 1 MAC operation per cycle for integer operations without DSP extensions.

    - P_peak = 128 MHz * 1 MAC/cycle = 128 MMAC/s.


    # Peak Memory Bandwidth (B_peak)

    - Assuming a 32-bit (4-byte) bus operating at the CPU frequency (128 MHz) for theoretical maximum
    SRAM bandwidth.

    - B_peak = 128 MHz * 4 bytes/cycle = 512 MB/s.


    # Operational Intensity (I)

    - Model requires 100,000 MAC operations.

    - Model requires 60 KB (61,440 bytes) of memory access.

    - I = 100,000 MACs / 61,440 bytes ≈ 1.63 MACs/byte.


    # Achievable Performance (P)

    - The Roofline model states: Performance P = min(P_peak, Operational_Intensity * B_peak)

    - P_compute_bound = P_peak = 128 MMAC/s

    - P_memory_bound = I * B_peak = 1.63 MACs/byte * 512 MB/s = 834.56 MMAC/s


    # Roofline Corner Point (I_corner)

    - I_corner = P_peak / B_peak = 128 MMAC/s / 512 MB/s = 0.25 MACs/byte.


    Since our model''s operational intensity (1.63 MACs/byte) is greater than the Roofline corner point
    (0.25 MACs/byte), the model''s performance on the nRF5340 is primarily **compute-bound** based on
    these theoretical peak values. This means its performance is limited by the processor''s MAC capability
    rather than the memory bandwidth.'
