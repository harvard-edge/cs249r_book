title: Diagnosing Fully Connected Layer Bottlenecks on STM32F4
scenario: You have deployed an INT8 neural network on an ARM Cortex-M4 (168 MHz, 256 KB SRAM, 1 MB flash, no FPU). Profiling reveals that while the convolutional layers match expected execution times, a specific fully connected layer takes 4x longer than expected based on its MAC count. The model uses optimized CMSIS-NN SIMD instructions.
question: Why does a CMSIS-NN fully connected layer on STM32F4 run 4x slower than its INT8 MAC count predicts?
details:
  realistic_solution: The diagnosis is a memory bandwidth bottleneck caused by fetching weights from flash memory. Convolutional layers reuse weights heavily, which hides memory latency. Fully connected layers have no weight reuse (batch size 1); every MAC requires fetching a new weight. At 168 MHz, the STM32F4 flash memory requires multiple wait states, whereas the 256 KB SRAM provides zero-wait-state access. The CPU is stalling while waiting for weights to arrive from flash.
  common_mistake: |
    **The Pitfall:** Blaming the CPU pipeline or lacking an FPU.
    **The Rationale:** Candidates focus solely on compute operations and CMSIS-NN library limits, ignoring the memory hierarchy entirely.
    **The Consequence:** They fail to realize fully connected layers are fundamentally memory-bound, spending time optimizing code when the issue is slow flash wait states.
  napkin_math: |
    - FC layer needs 1 weight byte per MAC.
    - CPU can process 4 MACs in 2 cycles via CMSIS-NN SIMD.
    - 32-bit SRAM fetch takes 1 cycle (feeding the pipeline easily).
    - STM32F4 Flash requires 5 wait states at 168 MHz, so a 32-bit read takes 6 cycles.
    - Fetching and computing from flash: 6 cycles fetch + 2 cycles compute ≈ 8 cycles.
    - **8 cycles vs 2 cycles perfectly explains the 4x slowdown.**
