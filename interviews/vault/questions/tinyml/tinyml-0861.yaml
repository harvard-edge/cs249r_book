title: 'Latency Decomposition: Full TinyML Pipeline Audit for Predictive Maintenance Sensor'
scenario: 'A predictive maintenance system on Cortex-M7+Ethos-U55 (480MHz, 512KB SRAM, 0.5 TOPS NPU) processes vibration sensor data. The pipeline includes ADC sampling (1ms, 1kHz, 1024 samples), FFT preprocessing (CPU), CNN anomaly classifier (1.5 MOPs INT8), decision thresholding, and a UART alert. The latency budget is 50ms total to process each 1-second window in real time.'
question: 'How should the predictive maintenance latency pipeline be audited, and which components leave room under the 50 ms budget?'
details:
  realistic_solution: 'ADC: 1ms (hardware DMA). FFT (1024-point, CMSIS-DSP on M7 at 480MHz): ~1.5ms. CNN on NPU: 1.5M/500000M = 3µs + 0.5ms overhead = 0.5ms. Decision: 0.1ms. UART (100 bytes at 115200 baud): 8.7ms. Total: 1+1.5+0.5+0.1+8.7 = 11.8ms. Well under 50ms. UART is the 2nd largest component — use faster baud (921600) → 1.1ms. Can increase FFT to 4096 samples for better frequency resolution.'
  common_mistake: 'Assuming FFT is free because it''s not ML; FFT of 1024 samples on Cortex-M7 takes 2-5ms with CMSIS-DSP library.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Cortex-M7+Ethos-U55 at 480MHz.
    - Latency budget: 50ms total.
    - CNN target: 1.5 MOPs INT8.

    **Calculations:**
    - ADC: 1ms (hardware DMA).
    - FFT 1024 on M7 CMSIS-DSP: ~1.5ms.
    - NPU CNN: 1.5M INT8 ops / 500 GOPS = 3µs (0.003ms).
    - Decision: 0.1ms.
    - UART (100B at 115200 baud): 100 * 10 bits / 115200 = 8.7ms.
    - Total Baseline Latency: 1.0ms + 1.5ms + 0.5ms (overhead) + 0.1ms + 8.7ms = 11.8ms.
    - Optimized UART (921600 baud): ~1.1ms.
    - Optimized Total: ~4.2ms.

    **Conclusion & Interpretation:**
    - **Result: 11.8ms (I/O-Bound)**. UART is a major bottleneck; upgrading to 921600 baud cuts it to 1.1ms, leaving ample slack for the 50ms budget.
