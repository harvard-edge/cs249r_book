title: 'Latency Decomposition: Full TinyML Pipeline Audit for Predictive Maintenance
  Sensor'
scenario: 'A predictive maintenance system on Cortex-M7+Ethos-U55 (480MHz, 512KB SRAM,
  0.5 TOPS NPU) processes vibration sensor data: ADC sampling (1ms, 1kHz, 1024 samples),
  FFT preprocessing (CPU), CNN anomaly classifier (1.5 MOPs INT8), decision thresholding,
  and UART alert. Budget is 50ms total to process each 1-second window in real time.
  Audit and optimize.'
question: How should the predictive maintenance latency pipeline be audited, and which
  components leave room under the 50 ms budget?
details:
  realistic_solution: 'ADC: 1ms (hardware DMA). FFT (1024-point, CMSIS-DSP on M7 at
    480MHz): ~1.5ms. CNN on NPU: 1.5M/500000M = 3μs + 0.5ms overhead = 0.5ms. Decision:
    0.1ms. UART (100 bytes at 115200 baud): 8.7ms. Total: 1+1.5+0.5+0.1+8.7 = 11.8ms.
    Well under 50ms. UART is the 2nd largest component — use faster baud (921600)
    → 1.1ms. Can increase FFT to 4096 samples for better frequency resolution.'
  common_mistake: Assuming FFT is free because it's not ML; FFT of 1024 samples on
    Cortex-M7 takes 2-5ms with CMSIS-DSP library.
  napkin_math: 'FFT 1024 on M7 CMSIS-DSP: measured ~1.5ms. NPU: 1.5M INT8 ops / 500B
    ops/s = 3μs. UART 100B at 115200: 100×10bits/115200 = 8.7ms. Total: 11.8ms. Optimization:
    921600 baud → 1.1ms UART. New total: 4.2ms. 45.8ms slack for 4096-sample FFT (6ms)
    and more features.'
