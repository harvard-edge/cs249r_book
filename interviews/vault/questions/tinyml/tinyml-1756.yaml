title: Flash Wear-Out Calculation
scenario: A Cortex-M4 based environmental sensor saves a 4KB internal state checkpoint
  to its internal Flash memory every 10 minutes to survive power failures. The specific
  Flash sector has a rated endurance of 10,000 erase/write cycles.
question: Calculate exactly how many continuous days the device can operate before
  this Flash sector statistically reaches its physical wear-out limit.
details:
  realistic_solution: The device performs 1 write every 10 minutes, which equals 6
    writes per hour, or 144 writes per day. The limit is 10,000 cycles. Dividing 10,000
    cycles by 144 writes per day gives 69.4 days. The device will experience flash
    failure in roughly 69 days.
  common_mistake: Factoring in the 4KB size as a multiplier to the wear limit, not
    realizing flash endurance limits are rated strictly in erase-cycle counts per
    block.
  napkin_math: 10000 / (6 * 24) = 69.4 days.
