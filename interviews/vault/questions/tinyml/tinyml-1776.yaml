title: Analyzing Memory Hierarchy Map for TinyML
scenario: A Cortex-M4 has 256KB Flash for read-only data and 64KB SRAM for read-write.
  A model has 200KB of weights and 50KB of activations.
question: Analyze where the weights and activations must be mapped in the memory hierarchy
  to make this model executable.
details:
  realistic_solution: The 200KB weights must be placed in the 256KB Flash memory as
    read-only constants for Execute-in-Place. The 50KB activations must go into the
    64KB SRAM since they are read-write, leaving 14KB SRAM for the system stack.
  common_mistake: Attempting to copy weights into SRAM at runtime, which would immediately
    OOM the device since 200KB > 64KB.
  napkin_math: 200 < 256 Flash, 50 < 64 SRAM
