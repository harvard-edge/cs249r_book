title: Analyzing Memory Hierarchy Map for TinyML
scenario: A microcontroller has 256KB Flash for read-only data and 64KB SRAM for read-write. A model has 200KB of weights and 50KB of activations.
question: Analyze where the weights and activations must be mapped in the memory hierarchy to make this model executable.
details:
  realistic_solution: To successfully deploy the model, engineers must leverage an Execute-In-Place (XIP) architecture. The 200KB of static model weights must be explicitly placed in the 256KB Flash memory as read-only constants (`.rodata`). The dynamic 50KB activations must be mapped strictly to the 64KB SRAM (`.bss` or `.data`), leaving exactly 14KB of SRAM headroom for the RTOS system stack and local buffers.
  common_mistake: |
    **The Pitfall:** Attempting to dynamically copy the model weights from Flash into SRAM at runtime.
    **The Rationale:** Developers accustomed to high-level PC architectures (where models are loaded entirely into RAM from disk) replicate that pattern on MCUs.
    **The Consequence:** Copying 200KB of weights into 64KB of SRAM immediately triggers a catastrophic Out-Of-Memory (OOM) hard fault.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Flash: 256 KB. SRAM: 64 KB.
       - Weights: 200 KB. Activations: 50 KB.
    2. **Calculations:**
       - Weights mapped to Flash: 200 KB < 256 KB.
       - Activations mapped to SRAM: 50 KB < 64 KB.
       - Remaining SRAM: 64 KB - 50 KB = 14 KB (stack headroom).
    3. **Conclusion & Interpretation:**
       - **Result: Execute-In-Place Required.** Weights must remain in Flash to prevent SRAM overflow.
