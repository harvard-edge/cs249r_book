title: The Flash Erase Suspend Lockout
scenario: You are writing ML telemetry to SPI Flash. A sector erase takes 300ms. Your MCU has a critical
  real-time motor control interrupt that must run every 5ms. While the SPI Flash is erasing, the MCU's
  instruction cache is disabled (since code runs from the same flash). The motor control interrupt misses
  its deadline and the motor crashes. Can you just pause the erase?
details:
  realistic_solution: 'Flash erase-suspend is supported but has hard limits: most flash chips allow only
    10-15 suspends per erase cycle before the erase permanently aborts, leaving the sector in an undefined
    state. With a 300ms erase and 5ms interrupt period, you''d need 60 suspends — 4x the typical limit.
    Additionally, during erase, the flash chip locks out all read access (including XIP code execution),
    freezing the CPU. Fix: copy the motor control ISR and its critical code to SRAM (execute-in-place
    from RAM), schedule erases during motor idle periods, or use external SPI flash for logging while
    keeping code on internal flash.'
  common_mistake: '"Yes, use a preemptive RTOS." An RTOS schedules threads, but it cannot schedule physical
    silicon physics.'
  napkin_math: Erase takes 300ms. If you suspend every 5ms, you interrupt the erase 60 times. Many flash
    chips have a hard limit (e.g., maximum 15 suspends per erase cycle) before the physical erase operation
    permanently aborts.
