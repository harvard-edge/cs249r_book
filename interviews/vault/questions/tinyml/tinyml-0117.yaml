title: The Flash Erase Suspend Lockout
scenario: You are writing ML telemetry to SPI Flash. A sector erase takes 300ms. Your MCU has a critical real-time motor control interrupt that must run every 5ms. While the SPI Flash is erasing, the MCU's instruction cache is disabled (since code runs from the same flash). The motor control interrupt misses its deadline and the motor crashes.
question: Can a 300 ms SPI flash erase be safely suspended every 5 ms for a motor-control interrupt?
details:
  realistic_solution: 'Flash erase-suspend is supported but has hard limits: most flash chips allow only 10-15 suspends per erase cycle before the erase permanently aborts, leaving the sector in an undefined state. With a 300ms erase and 5ms interrupt period, you''d need 60 suspends — 4x the typical limit. Additionally, during erase, the flash chip locks out all read access (including XIP code execution), freezing the CPU. Fix: copy the motor control ISR and its critical code to SRAM (execute-in-place from RAM), schedule erases during motor idle periods, or use external SPI flash for logging while keeping code on internal flash.'
  common_mistake: |
    **The Pitfall:** Assuming an RTOS can preempt physical hardware operations.
    **The Rationale:** Candidates state "just use a preemptive RTOS," failing to understand that an RTOS cannot schedule the physical silicon physics of a flash erase.
    **The Consequence:** The flash chip permanently aborts the erase or locks the CPU, causing a catastrophic motor crash.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Flash Erase Time: 300 ms.
       - Interrupt Period: 5 ms.
       - Hardware Limit: 10-15 suspends per erase cycle.
    2. **Calculations:**
       - Required Suspends: 300 ms / 5 ms = 60 suspends.
    3. **Conclusion & Interpretation:**
       - **Result: 60 suspends > 15 limit.** The flash chip will abort the erase or lock the CPU, destroying real-time constraints.
