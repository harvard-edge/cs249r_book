title: The SRAM Bank Collision
scenario: You have a Cortex-M7 running at 400 MHz. Core memory is split into SRAM1 and SRAM2. Your DMA
  controller streams 1080p camera data into a buffer in SRAM1. To maximize cache locality, you place your
  ML model's `tensor_arena` directly adjacent to the camera buffer, also in SRAM1. When the camera is
  active, your ML inference time slows down by 25%. The DMA uses zero CPU cycles. Why did the CPU slow
  down?
question: "Why does camera DMA into SRAM1 slow Cortex-M7 inference by 25% even though DMA uses zero CPU cycles?"
details:
  realistic_solution: 'Both the DMA and CPU access SRAM1 through the same AXI bus port. Even though DMA
    uses zero CPU cycles, it competes for bus bandwidth. Every time DMA writes a camera byte, the CPU''s
    pending SRAM read is stalled by the bus arbiter. With continuous DMA streaming, the CPU effectively
    loses 10-25% of its memory access cycles to arbitration delays. Fix: place tensor_arena in SRAM2 (or
    DTCM) and camera DMA buffer in SRAM1. The STM32H7 has separate bus ports for each SRAM bank — splitting
    masters across banks eliminates contention, restoring the CPU to full speed.'
  common_mistake: '"The CPU is processing the interrupts from the camera." Interrupts take microseconds,
    not 25% of the total runtime.'
  napkin_math: Camera DMA writes a byte every 10 cycles. The CPU tries to read a byte every 2 cycles.
    Every 10th cycle, the CPU gets blocked by the DMA, resulting in a minimum 10% structural stall across
    millions of operations.
