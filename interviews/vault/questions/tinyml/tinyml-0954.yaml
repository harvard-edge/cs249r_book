title: NPU Utilization and Cycle Cost Analysis
scenario: You are evaluating the inference compute cost of a vision model on a Corstone-300 subsystem sharing 512 KB of SRAM. The model requires 12 million MACs total. Profiling shows that a pointwise convolution layer (8 million MACs, 150 KB memory footprint) achieves 90% NPU compute utilization. However, a depthwise convolution layer (4 million MACs, 200 KB memory footprint) only achieves 15% NPU utilization.
question: How would you calculate the actual cycle cost for both layers and explain why the depthwise layer's compute efficiency drops so drastically on this shared-memory architecture?
details:
  realistic_solution: The candidate should calculate the theoretical and actual cycles for both layers, showing that the depthwise layer takes more cycles despite having half the MACs. They should explain that depthwise convolutions have low arithmetic intensity (few MACs per byte loaded). Because the Ethos-U55 and Cortex-M7 share the 512 KB SRAM, the high memory bandwidth requirement of the depthwise layer saturates the shared bus, causing the U55's 256 MAC/cycle pipeline to stall waiting for data.
  common_mistake: |
    **The Pitfall:** Assuming compute cost is simply total MACs divided by peak MACs/cycle.
    **The Rationale:** Candidates often calculate theoretical throughput without accounting for the arithmetic intensity of specific layers (like depthwise convolutions) on a shared memory bus.
    **The Consequence:** Hardware sizing is underestimated, and real-world latency vastly exceeds theoretical projections because the NPU spends most of its time stalled waiting for memory.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU throughput: 256 MACs/cycle. CPU clock: 480 MHz.
       - Pointwise layer: 8M MACs, 90% utilization.
       - Depthwise layer: 4M MACs, 15% utilization.
    2. **Calculations:**
       - Pointwise actual cycles: (8,000,000 / 256) / 0.90 ≈ 34,722 cycles.
       - Depthwise actual cycles: (4,000,000 / 256) / 0.15 ≈ 104,166 cycles.
       - Total inference time: (34,722 + 104,166) / 480,000,000 ≈ 0.29 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 0.29 ms. Memory-Bound.** The 4M MAC depthwise layer takes 3× longer than the 8M MAC pointwise layer due to memory bandwidth starvation.
