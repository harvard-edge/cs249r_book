title: NPU Utilization and Cycle Cost Analysis
scenario: You are evaluating the inference compute cost of a vision model on a Corstone-300
  subsystem featuring an ARM Cortex-M7 at 480 MHz and an Ethos-U55 NPU configured
  for 256 MACs/cycle, sharing 512 KB of SRAM. The model requires 12 million MACs total.
  Profiling shows that a pointwise convolution layer (8 million MACs, 150 KB memory
  footprint) achieves 90% NPU compute utilization. However, a depthwise convolution
  layer (4 million MACs, 200 KB memory footprint) only achieves 15% NPU utilization,
  significantly increasing the overall inference latency. Calculate the actual cycle
  cost for both layers and explain why the depthwise layer's compute efficiency drops
  so drastically on this shared-memory architecture.
question: How would you calculate the actual cycle cost for both layers and explain
  why the depthwise layer's compute efficiency drops so drastically on this shared-memory
  architecture?
details:
  realistic_solution: The candidate should calculate the theoretical and actual cycles
    for both layers, showing that the depthwise layer takes more cycles despite having
    half the MACs. They should explain that depthwise convolutions have low arithmetic
    intensity (few MACs per byte loaded). Because the Ethos-U55 and Cortex-M7 share
    the 512 KB SRAM, the high memory bandwidth requirement of the depthwise layer
    saturates the shared bus, causing the U55's 256 MAC/cycle pipeline to stall waiting
    for data.
  common_mistake: Candidates often assume compute cost is simply total MACs divided
    by peak MACs/cycle, failing to calculate the true cycle cost adjusted for utilization.
    They frequently overlook how arithmetic intensity dictates whether a workload
    is compute-bound or memory-bound on an NPU.
  napkin_math: 'Pointwise theoretical cycles: 8M MACs / 256 MACs/cycle = 31,250 cycles.
    Actual cycles at 90% utilization = 31,250 / 0.90 = ~34,722 cycles. Depthwise theoretical
    cycles: 4M MACs / 256 MACs/cycle = 15,625 cycles. Actual cycles at 15% utilization
    = 15,625 / 0.15 = ~104,166 cycles. Total actual cycles = 138,888 cycles. Total
    time at 480 MHz: 138,888 / 480,000,000 = ~0.29 ms. The 4M MAC layer takes 3x longer
    than the 8M MAC layer.'
