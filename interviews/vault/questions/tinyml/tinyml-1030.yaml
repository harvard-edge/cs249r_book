title: Structured vs Unstructured Pruning on nRF5340
scenario: You are deploying a wake-word model on a Nordic nRF5340 (128 MHz app core, 256 KB SRAM, 1 MB flash, ~5mA active). The baseline dense model requires 350 KB of SRAM, failing to fit, and takes 25ms per inference. Option A uses 80% unstructured pruning. Option B uses 50% structured (filter) pruning.
question: Which pruning strategy is better suited to fit the model onto the nRF5340 while minimizing execution time?
details:
  realistic_solution: Option B (50% structured pruning) is the superior choice. Structured pruning physically shrinks the tensor dimensions, allowing the model to remain dense and leverage highly optimized, vectorized CMSIS-NN kernels on the 128 MHz app core without any branching overhead. It guarantees a reduction in both the 1 MB flash footprint for weights and the 256 KB SRAM requirement for activations, ensuring deterministic execution time and lower energy consumption.
  common_mistake: |
    **The Pitfall:** Choosing Option A due to the higher theoretical sparsity rate (80%).
    **The Rationale:** Candidates assume 80% sparsity automatically translates to the smallest footprint and fastest execution.
    **The Consequence:** They fail to account for index storage overhead and the lack of hardware sparse-matrix acceleration on the Cortex-M33, resulting in massive branching penalties that ruin inference latency.
  napkin_math: |
    - **Baseline:** 350 KB SRAM, 25 ms latency.
    - **Option A (80% Unstructured):** 20% non-zero weights + 8-bit index deltas ≈ 40% of original weight size. Fits in SRAM. Zero-skipping branches keep latency near 25 ms. Energy: 25 ms * 5 mA = 125 μC.
    - **Option B (50% Structured):** Halving filters reduces weights quadratically by 75% (0.5 * 0.5) and activation buffers by 50%. Model drops to ~150 KB. MACs drop by 75%, cutting latency to 6.25 ms. Energy: 6.25 ms * 5 mA = 31.25 μC.
    - **Conclusion:** **Option B** securely fits the 256 KB SRAM limit and guarantees a 4x reduction in compute time.
