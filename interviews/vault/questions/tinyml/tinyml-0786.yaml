title: Tinyml New 0008
scenario: 'To meet a strict latency deadline, you overclock a Cortex-M4 microcontroller from 120MHz to 168MHz. Astonishingly, the TinyML inference latency remains exactly the same as it was at 120MHz.'
question: 'Why does overclocking the Cortex-M4 from 120 MHz to 168 MHz fail to reduce TinyML inference latency?'
details:
  realistic_solution: 'The system is bottlenecked by Flash memory wait states. As clock speed increases, Flash memory cannot keep up, so the MCU inserts wait states (stalls) during instruction/weight fetches. At 168 MHz (5.95 ns/cycle), the STM32F4 datasheet requires 4 wait states to safely read 25 ns Flash (5 total cycles = 29.8 ns). Compared to 3 wait states at 120 MHz (4 cycles = 33.3 ns), the effective instruction fetch rate barely improves despite the 40% clock increase. The solution is to copy the critical weights and kernels into zero-wait-state SRAM (TCM) during boot.'
  common_mistake: |
    **The Pitfall:** Assuming CPU clock speed solely dictates performance.
    **The Rationale:** Candidates ignore the memory hierarchy speed limits and the impact of Flash memory wait states.
    **The Consequence:** Ineffective optimization efforts that fail to improve actual inference latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Flash memory read time is 25 ns.
    - 120 MHz clock is 8.3 ns/cycle; 168 MHz clock is 5.95 ns/cycle.

    **Calculations:**
    - At 120 MHz: 3 wait states needed (4 cycles = 33.3 ns).
    - At 168 MHz: 4 wait states needed (5 cycles = 29.8 ns).

    **Conclusion & Interpretation:**
    - **Result: 29.8 ns per Read (Memory-Bound)**. Overclocking barely accelerates inference because the Flash bottleneck dominates the instruction and weight fetching pipeline.
