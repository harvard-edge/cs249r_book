title: Tinyml New 0008
scenario: To meet a strict latency deadline, you overclock a Cortex-M4 microcontroller from 120MHz to
  168MHz. Astonishingly, the TinyML inference latency remains exactly the same as it was at 120MHz.
question: "Why does overclocking the Cortex-M4 from 120 MHz to 168 MHz fail to reduce TinyML inference latency?"
details:
  realistic_solution: The system is bottlenecked by Flash memory wait states. As clock speed increases,
    Flash memory cannot keep up, so the MCU inserts wait states (stalls) during instruction/weight fetches.
    At 168 MHz (5.95 ns/cycle), the STM32F4 datasheet requires 4 wait states to safely read 25 ns Flash
    (5 total cycles = 29.8 ns). Compared to 3 wait states at 120 MHz (4 cycles = 33.3 ns), the effective
    instruction fetch rate barely improves despite the 40% clock increase. The solution is to copy the
    critical weights and kernels into zero-wait-state SRAM (TCM) during boot.
  common_mistake: Ignoring the memory hierarchy speed limits and assuming CPU clock speed solely dictates
    performance.
  napkin_math: Flash read = 25ns. At 120MHz (8.3ns/cycle), 3 wait states → access takes 4 cycles = 33.3ns
    ≥ 25ns. At 168 MHz (5.95ns/cycle), 4 wait states → access takes 5 cycles = 29.8ns ≥ 25ns. The CPU
    spends effectively the same total time waiting for memory, negating most of the overclock benefit.
