title: SRAM Needed for MobileNet Activations
scenario: You're deploying MobileNetV2 (image classification, 128x128 input, INT8) on a Cortex-M7 with 512
  KB SRAM. The model has 3.4M parameters (3.4 MB flash) and you're using TFLite Micro. Estimate the peak
  SRAM required for the activation tensors and determine if the model fits.
question: "How would you estimate the peak SRAM required for the activation tensors and determine if the model fits?"
details:
  realistic_solution: 'Peak SRAM = the largest input+output tensor pair alive simultaneously. For MobileNetV2
    at 128x128 INT8, the bottleneck is an expansion layer (16 to 96 channels): input is 64x64x16 (64KB)
    and output is 64x64x96 (384KB), totaling 448KB. With 512KB SRAM minus 80KB firmware overhead = 432KB available —
    it doesn''t fit (deficit: 16KB). Fix: use width multiplier 0.75x, reducing peak input+output to 64x64x12 (48KB)
    + 64x64x72 (288KB) = 336KB. This fits with 96KB headroom at only 2% accuracy loss (69.8% vs 71.8% top-1).
    Parameters (3.4MB) live in flash, not SRAM. The binding constraint is activation memory, not model size.'
  common_mistake: '"Parameters are 3.4 MB, SRAM is 512 KB, so it doesn''t fit." Parameters live in flash
    (read-only), not SRAM. SRAM holds activations (intermediate tensors), the tensor arena, and firmware
    state. The question is whether the *activations* fit, not the weights.'
  napkin_math: 'Peak activation (full MobileNetV2, 128x128): 64x64x16 + 64x64x96 = 64KB + 384KB = 448KB. Available SRAM: 432 KB. Deficit: 16 KB.
    Width multiplier 0.75: peak = 64x64x12 + 64x64x72 = 48KB + 288KB = 336KB. Fits with 96 KB
    margin. Width multiplier 0.5: peak = 64x64x8 + 64x64x48 = 32KB + 192KB = 224KB. Fits with 208 KB margin. Accuracy
    trade-off (ImageNet top-1): 1.0x = 71.8%, 0.75x = 69.8%, 0.5x = 65.4%. The 0.75x variant is the sweet
    spot: fits in SRAM with headroom and loses only 2% accuracy. Flash usage: 3.4 MB * 0.75² = 1.9 MB
    (parameters scale quadratically with width).'
  options:
  - The model's 3.4 MB of parameters don't fit in 512 KB SRAM, so the model cannot run on this hardware
    without significant compression.
  - 'Parameters (3.4 MB) live in flash, not SRAM. SRAM holds activations only. Peak activation at 128x128
    INT8 MobileNetV2 is 448 KB (expansion layer input 64 KB + output 384 KB). With 80 KB firmware overhead, available
    SRAM is 432 KB — deficit of 16 KB. Fix: use width multiplier 0.75x, reducing peak to 336 KB (fits
    with 96 KB headroom) at only 2% accuracy loss (69.8% vs 71.8%).'
  - MobileNetV2 fits easily because INT8 quantization reduces activation memory by 4x compared to FP32,
    bringing peak SRAM to ~108 KB.
  - The model fits if you use in-place operations for all depthwise convolution layers, which eliminates
    the need for separate input and output activation buffers.
  correct_index: 1
