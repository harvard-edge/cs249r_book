title: SRAM Needed for MobileNet Activations
scenario: You're deploying MobileNetV2 (image classification, 96×96 input, INT8) on a Cortex-M7 with 512
  KB SRAM. The model has 3.4M parameters (3.4 MB flash) and you're using TFLite Micro. Estimate the peak
  SRAM required for the activation tensors and determine if the model fits.
question: "How would you estimate the peak SRAM required for the activation tensors and determine if the model fits?"
details:
  realistic_solution: 'Peak SRAM = the largest input+output tensor pair alive simultaneously. For MobileNetV2
    at 96x96 INT8, the bottleneck is the expansion layer: 48x48 spatial * 192 expanded channels = 442,368
    bytes (~432KB) for input+output. With 512KB SRAM minus 80KB firmware overhead = 432KB available —
    it barely doesn''t fit (deficit: ~84KB). Fix: use width multiplier 0.75x, reducing peak to 48x48x144
    = 324KB (fits with 108KB headroom) at only 2% accuracy loss (69.8% vs 71.8% top-1). Parameters (3.4MB)
    live in flash, not SRAM. The binding constraint is activation memory, not model size.'
  common_mistake: '"Parameters are 3.4 MB, SRAM is 512 KB, so it doesn''t fit." Parameters live in flash
    (read-only), not SRAM. SRAM holds activations (intermediate tensors), the tensor arena, and firmware
    state. The question is whether the *activations* fit, not the weights.'
  napkin_math: 'Peak activation (full MobileNetV2, 96×96): 516 KB. Available SRAM: 432 KB. Deficit: 84
    KB (19% over). Width multiplier 0.75: peak = 48×48×144 = 331,776 bytes = 324 KB. Fits with 108 KB
    margin. Width multiplier 0.5: peak = 48×48×96 = 221,184 bytes = 216 KB. Fits with 216 KB margin. Accuracy
    trade-off (ImageNet top-1): 1.0× = 71.8%, 0.75× = 69.8%, 0.5× = 65.4%. The 0.75× variant is the sweet
    spot: fits in SRAM with headroom and loses only 2% accuracy. Flash usage: 3.4 MB × 0.75² = 1.9 MB
    (parameters scale quadratically with width).'
  options:
  - The model's 3.4 MB of parameters don't fit in 512 KB SRAM, so the model cannot run on this hardware
    without significant compression.
  - 'Parameters (3.4 MB) live in flash, not SRAM. SRAM holds activations only. Peak activation at 96x96
    INT8 MobileNetV2 is ~432 KB (expansion layer: 48x48x192). With 80 KB firmware overhead, available
    SRAM is 432 KB — deficit of ~84 KB. Fix: use width multiplier 0.75x, reducing peak to 324 KB (fits
    with 108 KB headroom) at only 2% accuracy loss (69.8% vs 71.8%).'
  - MobileNetV2 fits easily because INT8 quantization reduces activation memory by 4x compared to FP32,
    bringing peak SRAM to ~108 KB.
  - The model fits if you use in-place operations for all depthwise convolution layers, which eliminates
    the need for separate input and output activation buffers.
  correct_index: 1
