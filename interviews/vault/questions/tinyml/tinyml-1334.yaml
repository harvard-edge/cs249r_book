title: Tensor Arena Planning for TinyML on Nordic nRF5340
scenario: 'You are developing a TinyML application for a Nordic nRF5340 microcontroller (128 MHz, 512 KB SRAM, 1 MB flash, BLE). Your task is to deploy a small convolutional neural network (CNN) model that processes sensor data. The model has several intermediate tensors and requires careful memory management.'
question: 'How should you plan a flat tensor arena and flash versus SRAM placement for a CNN on the Nordic nRF5340?'
details:
  realistic_solution: 'A realistic approach involves creating a memory plan by analyzing the model''s computational graph to identify tensor lifetimes. Implement a flat tensor arena where memory is allocated statically and reused across non-overlapping tensors. Optimize operator scheduling to minimize the number of live tensors concurrently, thereby reducing peak SRAM demand. Store read-only model weights and constant parameters in the 1 MB flash memory, loading them into SRAM only when actively needed or streaming them if the model is too large for SRAM. Intermediate mutable tensors should primarily reside in SRAM.'
  common_mistake: |
    **The Pitfall:** Allocating memory for all tensors upfront without considering overlapping lifetimes.
    **The Rationale:** Candidates fail to utilize a flat tensor arena for dynamic memory reuse.
    **The Consequence:** Peak SRAM requirements easily exceed the 512 KB capacity.
  napkin_math: |
    **Assumptions & Constraints:**
    - Nordic nRF5340 has 512 KB SRAM and 1 MB flash.
    - Input tensor is 64x64x1 uint8 (4 KB).
    - Largest intermediate activation is 32x32x16 float32 (64 KB).
    - Arena overhead is 10 KB.

    **Calculations:**
    - Calculate peak concurrent memory: 4 KB (input) + 64 KB (activation) = 68 KB.
    - Add overhead: 68 KB + 10 KB = 78 KB peak SRAM.
    - Calculate remaining SRAM: 512 KB - 78 KB.

    **Conclusion & Interpretation:**
    - **Result: 434 KB Headroom (Memory-Bound)**. The flat tensor arena requires 78 KB, leaving ample SRAM for application logic while keeping weights in Flash.
