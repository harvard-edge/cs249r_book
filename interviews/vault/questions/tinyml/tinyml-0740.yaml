title: The Integer Arithmetic Engine
scenario: Walk me through exactly how a quantized Conv2D layer executes on a Cortex-M4 with no floating-point
  unit. I want to see the math — from quantized inputs to quantized outputs — with no floats anywhere
  in the pipeline.
details:
  realistic_solution: 'The full integer-only inference pipeline works as follows. Each tensor has a quantization
    scheme: $x_{real} = S_x (x_{int} - Z_x)$ where $S$ is a float scale and $Z$ is an integer zero-point.
    For convolution, the real-valued output is $Y = W \cdot X + b$. Substituting the quantization parameters
    and expanding:'
  common_mistake: '"You just multiply INT8 values and truncate." This ignores the accumulator width, the
    zero-point offsets, and the requantization step — all of which are essential for correctness.'
  napkin_math: 'A 3×3 depthwise conv on a 48×48×64 INT8 feature map: MACs = $3 \times 3 \times 48 \times
    48 \times 64 = 1,327,104$. Each MAC is an INT8×INT8→INT32 multiply-add — one cycle on Cortex-M4 with
    CMSIS-NN''s SMLAD instruction. At 100 MHz: $1.3M / 100M \approx 13$ ms per layer. The requantization
    adds ~1 shift + 1 add per output element ($48 \times 48 \times 64 = 147,456$ ops) — negligible overhead.'
  options:
  - Simply multiply INT8 inputs by INT8 weights, truncate to INT8, and output. The zero-points and scales
    are only needed during training, not inference.
  - 'Full integer pipeline: each tensor has scale S and zero-point Z where x_real = S(x_int - Z). Convolution
    expands to: accumulate INT8xINT8 products into INT32, subtract cross-terms involving zero-points (precomputed),
    add INT32 bias. Then requantize: multiply the INT32 accumulator by a fixed-point multiplier (M = S_w
    * S_x / S_y, represented as int32 x 2^-shift), apply the output zero-point, and clamp to [-128, 127].
    No floats anywhere — CMSIS-NN''s SMLAD does 2 MACs/cycle this way.'
  - The Cortex-M4 must use software floating-point emulation for the scale factors during requantization,
    adding ~10 cycles per output element.
  - 'The pipeline uses lookup tables (LUTs) for all multiplications: precompute all 256x256 possible INT8
    products in a 64 KB table and replace multiplication with table lookups.'
  correct_index: 1
