title: Cortex-M4 PIR Trigger Sparse Logic
scenario: A Cortex-M4 acoustic model uses 12 mW when active. A passive infrared (PIR)
  sensor triggers it only 5 times an hour. Each activation runs inference for 2 seconds.
  Sleep power is 0.1 mW.
question: Calculate the average hourly power consumption.
visual:
  kind: svg
  path: tinyml-1663.svg
  alt: Timeline showing ultra-sparse 12mW spikes among a flat 0.1mW sleep baseline.
  caption: Sparse PIR-triggered power profile.
details:
  realistic_solution: In one hour (3600s), the model is active for 5 * 2 = 10 seconds.
    It sleeps for 3590 seconds. Average power = ((10 * 12) + (3590 * 0.1)) / 3600
    = (120 + 359) / 3600 = 479 / 3600 = ~0.133 mW.
  common_mistake: Failing to normalize the total energy back into average power over
    the 3600-second window.
  napkin_math: (10*12 + 3590*0.1) / 3600 = 0.133 mW
