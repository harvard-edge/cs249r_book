title: Cortex-M4 PIR Trigger Sparse Logic
scenario: A Cortex-M4 acoustic model uses 12 mW when active. A passive infrared (PIR) sensor triggers it only 5 times an hour. Each activation runs inference for 2 seconds. Sleep power is 0.1 mW.
question: Design a power budget by computing the average hourly consumption, then determine whether the system meets a 1 mW design target without further duty-cycle optimization.
visual:
  kind: svg
  path: tinyml-1663.svg
  alt: Timeline showing ultra-sparse 12mW spikes among a flat 0.1mW sleep baseline.
  caption: Sparse PIR-triggered power profile.
details:
  realistic_solution: In one hour (3600s), the model is active for 5 * 2 = 10 seconds. It sleeps for 3590 seconds. Average power = ((10 * 12) + (3590 * 0.1)) / 3600 = (120 + 359) / 3600 = 479 / 3600 = ~0.133 mW.
  common_mistake: |
    **The Pitfall:** Failing to normalize the total energy back into average power.
    **The Rationale:** Candidates calculate the total energy used but forget to divide by the 3600-second window.
    **The Consequence:** Producing an incorrect average power figure and misjudging the power budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Time Window: 1 hour = 3600 seconds.
       - Triggers: 5 per hour, 2 seconds active per trigger.
       - Active Power: 12 mW. Sleep Power: 0.1 mW.
    2. **Calculations:**
       - Active time = 5 triggers * 2 seconds = 10 seconds.
       - Sleep time = 3600 seconds - 10 seconds = 3590 seconds.
       - Average Power = [(10 s * 12 mW) + (3590 s * 0.1 mW)] / 3600 s.
       - Average Power = (120 mJ + 359 mJ) / 3600 s = 479 / 3600 = ~0.133 mW.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound.** The average power is ~0.133 mW, easily meeting the 1 mW design target due to extreme sparsity.
