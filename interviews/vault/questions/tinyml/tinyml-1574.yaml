title: TinyML Smartwatch Battery Budget
scenario: A Cortex-M4 smartwatch wakes up for 2ms every 100ms interval to poll a low-power
  accelerometer. During the active 2ms, it draws 5mA. During the 98ms sleep, it draws
  10uA (0.01mA).
question: Design an energy budget calculation to determine the expected theoretical
  continuous battery life running on a 200mAh battery.
visual:
  kind: svg
  path: tinyml-1574.svg
  alt: A timeline highlighting very brief but large 5mA current spikes interspersed
    with long, near-zero sleep periods.
  caption: Current Draw Over Time
details:
  realistic_solution: 'First compute the average current draw over the 100ms cycle:
    ((2ms * 5mA) + (98ms * 0.01mA)) / 100ms = (10 + 0.98) / 100 = 0.1098 mA. Given
    a 200mAh capacity, the expected continuous battery life is 200mAh / 0.1098mA =
    1821 hours (roughly 75 days).'
  common_mistake: Forgetting to convert microamps (10uA) to milliamps (0.01mA), wildly
    skewing the average current draw.
  napkin_math: 200 / (((2*5) + (98*0.01)) / 100) = 1821 hours
