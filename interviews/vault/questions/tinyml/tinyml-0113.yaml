title: The Field Accuracy Degradation
scenario: Your predictive maintenance system on a Syntiant NDP120 (neural decision processor, 1 MHz inference
  clock, 256 KB SRAM) monitors a factory motor. At deployment, the model detects bearing faults with 96%
  recall. After 8 months, recall drops to 71%. The motor hasn't been serviced. The sensor (MEMS accelerometer,
  soldered to the motor housing) hasn't moved. The model weights haven't changed. What's degrading?
details:
  realistic_solution: 'This is concept drift caused by physical changes in the monitored system, compounded
    by sensor degradation. (1) Mechanical wear changes the motor vibration signature. After 5,760 hours
    and 622M vibration cycles, bearing surfaces develop micro-pitting that shifts fault harmonics by 2-5%.
    The model was trained on new-bearing fault signatures, not aged-bearing signatures. (2) MEMS accelerometer
    mounting degradation. Thermal cycling loosens the adhesive bond. Mounting resonance drops, attenuating
    high-frequency fault harmonics (>1 kHz) by up to 10 dB. Fault harmonic at 1.05 kHz drops from 5 mg
    to 1.58 mg amplitude, barely above the 1.2 mg noise floor (SNR from 12.4 dB to 2.4 dB). Fix: on-device
    incremental calibration using NDP120 256 KB SRAM. Store 30-day rolling baseline of healthy vibration
    spectra (2 KB compressed). Compare current spectra against evolving baseline instead of fixed training
    distribution. Add mounting quality check: if broadband attenuation >6 dB vs installation baseline,
    flag for inspection.'
  common_mistake: '"The model is overfitting to the training data — retrain with more recent data." Retraining
    helps, but doesn''t explain why the original model degraded. Understanding the root cause is essential
    to prevent recurrence.'
  napkin_math: 'Motor runtime: 8 months × 30 days × 24 hours = 5,760 hours. Vibration cycles: 30 Hz ×
    5,760 × 3,600 = 622 million cycles. MEMS offset drift: 3 mg over 8 months. Signal RMS: 50 mg. Drift
    as fraction of signal: 6%. Mounting attenuation at 1 kHz: 10 dB = 3.16× amplitude reduction. Fault
    harmonic at 1.05 kHz (10th harmonic of BPFO): original amplitude 5 mg, after mounting degradation:
    1.58 mg. Noise floor: 1.2 mg (MEMS noise density 120 µg/√Hz × √100 Hz bandwidth). SNR of fault harmonic:
    original 5/1.2 = 4.2 (12.4 dB), degraded 1.58/1.2 = 1.32 (2.4 dB). The fault harmonic drops below
    the model''s effective detection threshold (~6 dB SNR). This explains the 25% recall drop: faults
    that were detectable via high harmonics are now missed.'
