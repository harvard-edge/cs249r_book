title: The Field Accuracy Degradation
scenario: >
  Your predictive maintenance system on a Syntiant NDP120 (neural decision processor, 1 MHz inference clock, 256 KB SRAM) monitors a factory motor. At deployment, the model detects bearing faults with 96% recall. After 8 months, recall drops to 71%. The motor hasn't been serviced. The sensor (MEMS accelerometer, soldered to the motor housing) hasn't moved. The model weights haven't changed.
question: >
  Why does a Syntiant NDP120 motor monitor drop from 96% to 71% recall after 8 months with unchanged weights?
details:
  realistic_solution: >
    This is concept drift caused by physical changes in the monitored system, compounded by sensor degradation. (1) Mechanical wear changes the motor vibration signature. After 5,760 hours and 622M vibration cycles, bearing surfaces develop micro-pitting that shifts fault harmonics by 2-5%. The model was trained on new-bearing fault signatures, not aged-bearing signatures. (2) MEMS accelerometer mounting degradation. Thermal cycling loosens the adhesive bond. Mounting resonance drops, attenuating high-frequency fault harmonics (>1 kHz) by up to 10 dB. Fault harmonic at 1.05 kHz drops from 5 mg to 1.58 mg amplitude, barely above the 1.2 mg noise floor (SNR from 12.4 dB to 2.4 dB). Fix: on-device incremental calibration using NDP120 256 KB SRAM. Store 30-day rolling baseline of healthy vibration spectra (2 KB compressed). Compare current spectra against evolving baseline instead of fixed training distribution. Add mounting quality check: if broadband attenuation >6 dB vs installation baseline, flag for inspection.
  common_mistake: |
    **The Pitfall:** Blaming model overfitting and simply suggesting "retrain with more recent data."
    **The Rationale:** Candidates fail to recognize physical sensor and environmental degradation mechanisms that cause data drift over time.
    **The Consequence:** Retraining only treats the symptom temporarily without addressing the root cause (mechanical wear and sensor mounting degradation), leading to repeated failures.
  napkin_math: |
    - **Motor Runtime:** 8 months × 30 days × 24 hours = 5,760 hours.
    - **Vibration Cycles:** 30 Hz × 5,760 hours × 3,600 seconds = 622 million cycles.
    - **MEMS Drift:** Offset drift of 3 mg over 8 months against a 50 mg signal RMS = 6% drift.
    - **Mounting Attenuation:** 10 dB attenuation at 1 kHz equals a 3.16× amplitude reduction.
    - **Signal Drop:** Original 5 mg fault harmonic drops to 1.58 mg.
    - **SNR Calculation:** With a noise floor of 1.2 mg, SNR drops from 4.2 (12.4 dB) to 1.32 (2.4 dB).
    - **Conclusion:** The fault harmonic drops below the model's ~6 dB SNR detection threshold, explaining the **25% recall drop**.
