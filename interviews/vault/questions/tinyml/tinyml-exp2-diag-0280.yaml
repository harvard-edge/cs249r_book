title: NPU to CPU Porting Power Diagnosis
scenario: 'Your team ported a continuous vibration monitoring model from an NPU-accelerated SoC to a Nordic
  nRF5340 to leverage its BLE 5.3 capabilities and simplify the BOM. The nRF5340 features a 128 MHz app
  core, a 64 MHz net core, 256 KB SRAM, 1 MB flash, and a very low ~5mA active current. However, QA reports
  a massive power regression: the new nRF5340-based system drains the coin cell battery in under two weeks,
  whereas the previous NPU-based system lasted for months despite having a higher peak active current.
  Diagnose the root cause of this severe power drain.'
question: "Why does the nRF5340 port drain a coin cell faster than the old NPU design despite lower peak current?"
details:
  realistic_solution: The root cause is the massive increase in active duty cycle due to the loss of hardware
    acceleration. While the nRF5340's 128 MHz app core has a low peak current, it lacks the parallel MAC
    arrays of an NPU. It must stay awake for vastly more clock cycles to compute the same neural network,
    leading to a much higher total energy-per-inference. The programmability-efficiency tradeoff dictates
    that the CPU takes longer to execute the math, negating the benefits of its lower peak power.
  common_mistake: Candidates often look at the ~5mA active current and incorrectly assume the power drain
    must be coming from the BLE 5.3 radio staying awake, a memory leak, or a sleep state configuration
    error, failing to analyze the massive difference in processing efficiency and duty cycle between an
    NPU and a general-purpose CPU.
  napkin_math: 'Assume the old NPU drew 15mA but finished an inference in 1ms: 15mA * 1ms = 15 uAs per
    inference. On the Nordic nRF5340, the 128 MHz app core draws only ~5mA, but without an NPU, the inference
    takes 25ms. Energy per inference = 5mA * 25ms = 125 uAs. At 10 inferences per second, the compute
    alone draws 10 * 125 uAs = 1250 uA (1.25 mA) average current. A standard 220 mAh CR2032 battery would
    be depleted by compute alone in 220 mAh / 1.25 mA = 176 hours (~7.3 days), explaining the rapid battery
    death.'
