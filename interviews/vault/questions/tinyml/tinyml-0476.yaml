title: The Desert Drone Reboot
scenario: 'You are the ML systems engineer for a fleet of autonomous delivery drones. Each drone uses a Cortex-M7 MCU to run a vision model that identifies safe landing zones. In a new desert deployment, drones are frequently rebooting mid-flight during their final landing sequence, forcing a "return to home" and failing the delivery. System logs show these reboots are triggered by the hardware watchdog timer. You are given the following data: the watchdog is set to fire after 200ms of system unresponsiveness, and the vision pipeline (capture, preprocess, inference, postprocess) has a baseline execution time of 150ms in the original urban test environment.'
question: "Why do Cortex-M7 delivery drones reboot when desert landing vision pushes a 150 ms pipeline past a 200 ms watchdog?"
details:
  realistic_solution: The most probable cause is **input-dependent latency**, a form of data drift. The high-frequency visual textures of the desert environment (e.g., sand ripples, heat shimmer) are making a part of the vision pipeline, likely a preprocessing step like feature extraction or filtering, work much harder than it did with the simpler urban images. This increased computational load pushes the total pipeline latency beyond the 200ms watchdog limit, causing a timeout and a system reboot.
  common_mistake: |
    **The Pitfall:** Blaming hardware throttling or memory leaks immediately.
    **The Rationale:** Engineers overlook the impact of input data drift on variable-latency preprocessing steps.
    **The Consequence:** They miss the true cause—data-dependent latency—and fail to address the algorithmic bottleneck.
  napkin_math: |
    - Baseline latency: 150 ms pipeline, leaving a 50 ms margin before the 200 ms watchdog limit.
    - Desert drift: High-frequency sand textures create 5x more edges.
    - Preprocessing increase: Urban 30 ms -> Desert 80 ms.
    - **Total latency: 150 - 30 + 80 = 200 ms, triggering the watchdog reset.**
  options:
  - The desert heat is causing the MCU to thermally throttle, slowing down execution until it misses the watchdog deadline.
  - The vision pipeline's latency has increased due to data drift from the new desert environment, exceeding the 200ms watchdog budget.
  - A memory leak in the preprocessing code is causing `malloc` to occasionally take longer than 200ms, triggering the watchdog.
  - The drone's power management system is unstable during landing, causing a voltage drop that resets the MCU.
  correct_index: 1
