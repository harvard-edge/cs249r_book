title: The Desert Drone Reboot
scenario: A fleet of delivery drones uses a Cortex-M7 MCU to run a landing vision model. In a new desert deployment, drones reboot mid-flight due to the hardware watchdog timer. The watchdog fires after 200ms of unresponsiveness. The total vision pipeline has a baseline execution time of 150ms in urban environments.
question: Why do Cortex-M7 delivery drones reboot when desert landing vision pushes a 150 ms pipeline past a 200 ms watchdog?
details:
  realistic_solution: The most probable cause is **input-dependent latency**, a form of data drift. The high-frequency visual textures of the desert environment (e.g., sand ripples, heat shimmer) are making a part of the vision pipeline, likely a preprocessing step like feature extraction or filtering, work much harder than it did with the simpler urban images. This increased computational load pushes the total pipeline latency beyond the 200ms watchdog limit, causing a timeout and a system reboot.
  common_mistake: |
    **The Pitfall:** Immediately diagnosing hardware issues like thermal throttling or software bugs like memory leaks.
    **The Rationale:** Engineers overlook the computational impact of environmental data drift on variable-latency software preprocessing steps (e.g., edge detection).
    **The Consequence:** They fail to identify the deterministic algorithmic bottleneck, causing them to add heat sinks or rewrite memory allocators instead of capping the preprocessing execution time.
  napkin_math: |
    1. **Assumptions & Constraints:** Watchdog limit = 200 ms. Baseline pipeline = 150 ms (leaves 50 ms safety margin). Desert terrain introduces high-frequency visual textures (sand ripples).
    2. **Calculations:** High-frequency input data causes variable-latency preprocessing algorithms (like Canny edge detection or morphological filtering) to process 5x more features. If urban preprocessing took 30 ms, desert preprocessing scales to 80 ms. Total latency = 150 ms - 30 ms + 80 ms = 200 ms.
    3. **Conclusion & Interpretation:** **Result: Input-Dependent Latency Spike.** The high-frequency data drift strictly increased the compute load, pushing the pipeline latency exactly to the 200ms limit, triggering the deterministic watchdog reset.
  options:
  - The desert heat is causing the MCU to thermally throttle, slowing down execution until it misses the watchdog deadline.
  - The vision pipeline's latency has increased due to data drift from the new desert environment, exceeding the 200ms watchdog budget.
  - A memory leak in the preprocessing code is causing `malloc` to occasionally take longer than 200ms, triggering the watchdog.
  - The drone's power management system is unstable during landing, causing a voltage drop that resets the MCU.
  correct_index: 1
