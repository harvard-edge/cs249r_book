title: Optimizing Inference for Watchdog Deadlines
scenario: An anomaly detection model is deployed on an ARM Cortex-M4 (STM32F4) running at 168 MHz with
  no FPU. To comply with functional safety standards, the system must complete both an inference pass
  and a memory self-test within a strict 10 ms watchdog timer window. Currently, the 2 million MAC INT8
  model uses standard C loops, taking too long and triggering watchdog resets before the self-test can
  complete.
details:
  realistic_solution: The correct approach is to utilize the CMSIS-NN library to leverage the Cortex-M4's
    DSP extensions, specifically the SIMD instructions that perform 2x INT8 MACs per cycle. This drastically
    reduces inference latency, ensuring deterministic execution that safely fits within the watchdog window
    alongside the self-test routines.
  common_mistake: Candidates often suggest increasing the clock speed or expanding the watchdog timer
    window, which violates strict thermal constraints and safety certification requirements. They may
    also overlook the hardware constraints, such as the lack of an FPU.
  napkin_math: Without SIMD, a standard C loop takes ~4 cycles per MAC. 2M MACs * 4 = 8M cycles. At 168
    MHz, 8M / 168,000,000 = 47.6 ms (fails 10 ms deadline). With CMSIS-NN SIMD (2x INT8 MACs/cycle), 2M
    MACs take 1M cycles. Adding 20% memory/loop overhead, we get 1.2M cycles. 1.2M / 168,000,000 = 7.14
    ms. This leaves 2.86 ms for the self-test routine, comfortably avoiding a watchdog reset within the
    10 ms window.
