title: RTOS Task Priority and Inference Latency on ESP32-S3
scenario: An ESP32-S3 (240MHz, 512KB SRAM, 8MB PSRAM) runs TFLite Micro for a keyword spotting model.
  The FreeRTOS system also handles WiFi and MQTT logging. P50 inference is 15ms but P99 spikes to 300ms.
  Spikes correlate with WiFi TX events.
details:
  realistic_solution: Pin the inference task to Core 1 (APP_CPU) using xTaskCreatePinnedToCore, and pin
    WiFi/networking to Core 0 (PRO_CPU). Set inference task priority to configMAX_PRIORITIES-1 on Core
    1. Use PSRAM for model weights to keep SRAM free for ISR stacks. This gives inference dedicated CPU
    time without blocking networking.
  common_mistake: Disabling WiFi during inference. This breaks connectivity requirements. The root cause
    is that the WiFi driver uses the same CPU core and higher-priority interrupts preempt the inference
    task mid-execution.
  napkin_math: 'ESP32-S3 dual-core at 240MHz each. WiFi TX ISR runs at ~300μs with ~10ms retransmit windows.
    If inference (15ms) is preempted for 10ms WiFi retry: total = 25ms. At P99 = 300ms, there must be
    3-4 consecutive WiFi retries (each 80ms timeout). With core pinning: inference never preempted by
    WiFi ISR on Core 1. PSRAM at 80MHz PSRP: 80MB/s effective bandwidth for weight loads — adds ~1ms overhead
    vs SRAM.'
