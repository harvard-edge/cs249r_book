title: The I2C Sensor Bus Bottleneck
scenario: A multi-sensor TinyML node has 8 I2C sensors on a single bus at 400 kHz (Fast Mode). Each sensor read requires a 2-byte address + 6-byte data payload, plus start/stop/ACK overhead totaling ~100 bits per transaction. All 8 sensors must be polled within a 10ms window before inference begins.
question: "What is the total I2C bus time for polling 8 sensors, and under what conditions would SPI be a better choice?"
details:
  realistic_solution: 'Per sensor: ~100 bits at 400 kHz = 250 \u00b5s. But I2C has ~40% overhead from protocol framing -> effective ~170 \u00b5s per byte payload. More precisely: 100 bits / 400,000 Hz = 250 \u00b5s per sensor. 8 sensors sequential: 8 * 250 = 2,000 \u00b5s = 2.0ms. This fits in the 10ms window with 8ms headroom. However, if sensor count doubles to 16 or data payload grows (e.g., a 64-byte IMU FIFO burst): 8 * (2 + 64 bytes) = 8 * (~550 bits / 400 kHz) = 8 * 1.375ms = 11ms > 10ms budget. Solution: move high-bandwidth sensors (IMU, camera) to SPI (50 Mbps), keep low-rate sensors on I2C.'
  common_mistake: |
    **The Pitfall:** Using the raw 400 kHz clock rate as the pure data payload throughput.
    **The Rationale:** Candidates forget that I2C is a half-duplex protocol with massive overhead (start conditions, address bytes, ACK bits, clock stretching).
    **The Consequence:** The bus effectively operates at ~50-60% of the clock rate, causing large payloads to easily violate tight 10ms deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Protocol: I2C Fast Mode (400 kHz).
       - Polling budget: 10 ms.
       - Payload size: ~100 bits per sensor.
    2. **Calculations:**
       - I2C per sensor = 100 bits / 400,000 Hz = 250 \u00b5s.
       - 8 sensors total = 8 * 250 \u00b5s = 2,000 \u00b5s = 2.0 ms.
       - With 64-byte burst payload: ~550 bits -> 1.375 ms per sensor.
       - 8 sensors burst = 8 * 1.375 ms = 11 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 8 normal sensors take 2.0 ms (Fits); 64-byte burst takes 11 ms (Fails).**
       - **I/O-Bound**
