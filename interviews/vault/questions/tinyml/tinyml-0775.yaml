title: The I2C Sensor Bus Bottleneck
scenario: A multi-sensor TinyML node has 8 I2C sensors on a single bus at 400 kHz (Fast Mode). Each sensor read requires a 2-byte address + 6-byte data payload, plus start/stop/ACK overhead totaling ~100 bits per transaction. All 8 sensors must be polled within a 10ms window before inference begins.
question: "What is the total I2C bus time for polling 8 sensors, and under what conditions would SPI be a better choice?"
details:
  realistic_solution: 'Per sensor: ~100 bits at 400 kHz = 250 µs. But I2C has ~40% overhead from protocol framing → effective ~170 µs per byte payload (6 bytes at ~28 KB/s effective). More precisely: 100 bits / 400,000 Hz = 250 µs per sensor. 8 sensors sequential: 8 × 250 = 2,000 µs = 2.0ms. This fits in the 10ms window with 8ms headroom. However, if sensor count doubles to 16 or data payload grows (e.g., a 64-byte IMU FIFO burst): 16 × 250 = 4000ms still OK. But 8 × (2 + 64 bytes) = 8 × (~550 bits / 400 kHz) = 8 × 1.375ms = 11ms > 10ms budget. Solution: move high-bandwidth sensors (IMU, camera) to SPI (50 Mbps), keep low-rate sensors on I2C.'
  common_mistake: |
    **The Pitfall:** Using the raw 400 kHz clock rate as the pure data payload throughput.
    **The Rationale:** Candidates forget that I2C is a half-duplex protocol with massive overhead (start conditions, address bytes, ACK bits, clock stretching).
    **The Consequence:** The bus effectively operates at ~50-60% of the clock rate, causing large payloads to easily violate tight 10ms deadlines.
  napkin_math: |
    * I2C per sensor: 100 bits / 400 kHz = 250 µs.
    * 8 sensors = 8 × 250 µs = 2.0ms. Budget 10ms → **20% utilized (Safe)**.
    * SPI alternative: 100 bits / 50 MHz = 2 µs per sensor (16 µs for 8).
    * If payload grows to 64 bytes: 550 bits → 1.375ms per sensor.
    * 8 sensors × 1.375ms = 11ms (Fails 10ms budget, switch to SPI).
