title: Diagnosing Latency Spikes from Unoptimized Fallbacks
scenario: You are deploying an INT8 keyword spotting model via TFLite Micro to an ARM Cortex-M4 (STM32F4). The model requires 300 KB of flash and 120 KB of SRAM, fitting comfortably within the 1 MB flash and 256 KB SRAM constraints. However, profiling reveals the inference latency is 890ms instead of the expected 30ms, and the system is missing its real-time deadlines. You notice that the vast majority of execution time is spent in a single depthwise convolution layer that was successfully quantized to INT8.
question: Why does an INT8 depthwise convolution on STM32F4 take 890 ms instead of 30 ms, and how should it be fixed?
details:
  realistic_solution: The root cause is an operator coverage gap causing a fallback to the unoptimized C reference implementation. The specific tensor shapes, strides, or padding used in that depthwise convolution are not supported by the CMSIS-NN optimized kernels. Because the STM32F4 has no FPU, if the reference implementation also triggers software floating-point emulation for scale factor requantization, the performance penalty is catastrophic. The fix is to adjust the model's architectural parameters to match supported CMSIS-NN kernel constraints.
  common_mistake: |
    **The Pitfall:** Assuming successful TFLite INT8 conversion guarantees hardware acceleration.
    **The Rationale:** Candidates often believe quantization alone is sufficient for speedup, overlooking the fact that specific tensor shapes or parameters might lack optimized CMSIS-NN kernels.
    **The Consequence:** The model falls back to a slow, unoptimized C reference implementation, catastrophically missing real-time deadlines.
  napkin_math: |
    - **Optimized Execution (SIMD):** 10M MACs / (2 MACs/cycle) / 168 MHz ≈ 29.8 ms.
    - **Reference Execution (No SIMD):** 10M MACs * 15 cycles/MAC / 168 MHz ≈ 892.8 ms.
    - **Conclusion:** **The 890ms latency is perfectly explained by a fallback to an unoptimized C reference kernel (~15 cycles/MAC).**
