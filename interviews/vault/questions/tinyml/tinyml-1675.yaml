title: Asymmetric INT8 Calibration
scenario: Quantizing an audio model on a Cortex-M4 reveals an activation dynamic range
  heavily skewed with positive outliers, mostly bounds from ReLU operations.
question: Analyze the trade-off between using asymmetric Min-Max quantization versus
  symmetric calibration for preserving activation fidelity.
details:
  realistic_solution: Symmetric quantization maps the maximum absolute value to both
    ends (e.g., [-20, 20]), wasting half the 8-bit bins (128 values) if the data is
    strictly positive (ReLU). Asymmetric Min-Max quantization explicitly maps the
    real min (0) to -128 and the real max (20) to 127. This utilizes all 256 quantization
    bins, doubling the resolution and lowering quantization noise.
  common_mistake: Blindly applying symmetric KL-divergence, which squashes tightly
    clustered positive values into a few INT8 bins, destroying precision.
  napkin_math: Range 20 over 256 bins = 0.078 step size; over 128 bins = 0.156 step
    size.
