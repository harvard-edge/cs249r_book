title: SRAM Budgeting for On-Device Adversarial Detection
scenario: You are deploying a tinyML image classification model on an ARM Cortex-M7 microcontroller (480 MHz) with an integrated ARM Ethos-U55 NPU (configurable from 128 to 512 MAC/cycle) for a critical application. The total available SRAM is 512 KB. Your 8-bit quantized model requires 200 KB for its weights and activations. You've implemented an on-device adversarial perturbation detection mechanism that involves storing an 'ideal' feature vector (8-bit quantized, 4096 elements) for each class. To enhance robustness, you want to store *multiple* such feature vectors per class to capture variations. You need to support 10 classes.
question: How many additional 4096-element INT8 feature vectors per class fit in remaining SRAM for an on-device adversarial detector?
details:
  realistic_solution: 1. Convert total SRAM to bytes. 2. Subtract the model's memory footprint (in bytes). 3. Calculate the memory required for one 8-bit, 4096-element feature vector. 4. Divide the remaining SRAM by the total memory required per additional vector set for all classes (i.e., (number of classes * memory per feature vector)) and take the floor to find the maximum uniform number of additional vectors per class.
  common_mistake: |
    **The Pitfall:** Failing to uniformly distribute available memory across classes or making unit conversion errors.
    **The Rationale:** Simple arithmetic mistakes (using 1000 bytes for KB instead of 1024) or forgetting to subtract the base model footprint are common in quick capacity estimates.
    **The Consequence:** The system experiences out-of-memory errors at runtime or is heavily biased if it cannot store a uniform number of reference vectors across all classes.
  napkin_math: |
    *   **Total SRAM:** 512 KB = 524,288 Bytes.
    *   **Model Memory:** 200 KB = 204,800 Bytes.
    *   **Remaining SRAM:** 524,288 - 204,800 = 319,488 Bytes.
    *   **Feature Vector Size:** 4096 elements × 1 byte/element = 4,096 Bytes.
    *   **Vectors per Class limit:** `floor(Remaining SRAM / (Number of Classes × Vector Size))`
    *   **Calculation:** `floor(319,488 / (10 × 4096))` = `floor(319,488 / 40,960)` = `floor(7.799)`.
    *   **Result:** **7 additional vectors per class**.
