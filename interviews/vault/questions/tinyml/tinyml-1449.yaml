title: SRAM Budgeting for On-Device Adversarial Detection
scenario: You are deploying a tinyML image classification model on an ARM Cortex-M7
  microcontroller (480 MHz) with an integrated ARM Ethos-U55 NPU (configurable from
  128 to 512 MAC/cycle) for a critical application. The total available SRAM is 512
  KB. Your 8-bit quantized model requires 200 KB for its weights and activations.
  You've implemented an on-device adversarial perturbation detection mechanism that
  involves storing an 'ideal' feature vector (8-bit quantized, 4096 elements) for
  each class. To enhance robustness, you want to store *multiple* such feature vectors
  per class to capture variations. You need to support 10 classes. Calculate the maximum
  number of *additional* 8-bit quantized 4096-element feature vectors you can store
  *per class* in the remaining SRAM, given the existing model's storage, such that
  each of the 10 classes can store the *same uniform number* of these additional vectors.
  Provide the formula and the final number.
question: How many additional 4096-element INT8 feature vectors per class fit in remaining
  SRAM for an on-device adversarial detector?
details:
  realistic_solution: 1. Convert total SRAM to bytes. 2. Subtract the model's memory
    footprint (in bytes). 3. Calculate the memory required for one 8-bit, 4096-element
    feature vector. 4. Divide the remaining SRAM by the total memory required per
    additional vector set for all classes (i.e., (number of classes * memory per feature
    vector)) and take the floor to find the maximum uniform number of additional vectors
    per class.
  common_mistake: Candidates might forget to subtract the model's existing memory
    footprint from the total SRAM, incorrectly convert units (KB to bytes), or fail
    to ensure the additional vectors are uniformly distributed across all classes.
  napkin_math: Total SRAM = 512 KB = 524288 Bytes. Model Memory = 200 KB = 204800
    Bytes. Remaining SRAM = 524288 - 204800 = 319488 Bytes. Memory per feature vector
    (4096 elements * 1 byte/element) = 4096 Bytes. Max Additional Vectors per Class
    = floor(Remaining SRAM / (Number of Classes * Memory per Feature Vector)) = floor(319488
    / (10 * 4096)) = floor(319488 / 40960) = floor(7.799...) = 7.
