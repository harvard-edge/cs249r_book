title: Peripheral DMA Overlap
scenario: A Cortex-M4 reads sensor data over SPI. The CPU currently spins in a loop waiting for each byte to arrive.
question: Identify the standard hardware peripheral that lets the CPU compute neural network layers while sensor data transfers occur in the background.
details:
  realistic_solution: The Direct Memory Access (DMA) controller. It can be configured to read from the SPI peripheral and write directly to SRAM in the background, issuing an interrupt only when the full frame is ready.
  common_mistake: |
    **The Pitfall:** Suggesting RTOS multithreading for polling.
    **The Rationale:** Candidates assume threads eliminate blocking, without realizing that CPU polling loops still burn core cycles.
    **The Consequence:** The CPU remains saturated waiting for I/O, destroying neural network throughput entirely.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SPI Data transfer requires 100% CPU in naive polling.
       - DMA controller offloads I/O entirely to hardware.
    2. **Calculations:**
       - Polling cycles utilized per byte: >10 cycles.
       - DMA cycles utilized per byte: 0 cycles.
    3. **Conclusion & Interpretation:**
       - **Result: 0 CPU cycles for I/O.** Utilizing DMA shifts the workload from I/O-Bound to strictly **Compute-Bound**, maximizing inference throughput.
