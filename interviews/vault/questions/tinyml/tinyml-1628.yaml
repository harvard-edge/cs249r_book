title: Peripheral DMA Overlap
scenario: A Cortex-M4 reads sensor data over SPI. The CPU currently spins in a loop
  waiting for each byte to arrive.
question: What standard hardware peripheral must be utilized to let the CPU compute
  neural network layers while data transfers?
details:
  realistic_solution: The Direct Memory Access (DMA) controller. It can be configured
    to read from the SPI peripheral and write directly to SRAM in the background,
    issuing an interrupt only when the full frame is ready.
  common_mistake: Suggesting RTOS multithreading, which still consumes CPU cycles
    if polling is used.
  napkin_math: 0 CPU cycles utilized per SPI byte
