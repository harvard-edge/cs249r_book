title: Evaluate Sliding Window vs Quantized KV Cache
scenario: A time-series sequence model on a Cortex-M4 has 50KB of SRAM reserved for its KV Cache. Processing continuous sensory streams forces the cache to grow infinitely.
question: Evaluate the architectural trade-offs of using Sliding Window Attention versus INT8 KV Cache quantization to guarantee bounded SRAM usage without halting.
details:
  realistic_solution: INT8 quantization halves the memory footprint (from FP16), extending the sequence length before OOM but fundamentally failing to prevent infinite growth. Sliding Window Attention mathematically bounds the context window to a fixed length W, capping memory exactly at O(W). For continuous deployment, sliding window is strictly required to guarantee bounded SRAM, despite losing historical context.
  common_mistake: |
    **The Pitfall:** Recommending quantization as a complete solution for continuous streaming.
    **The Rationale:** Candidates see "reduce memory" and default to INT8, ignoring the infinite sequence length requirement.
    **The Consequence:** Any linear growth model `O(T)` will eventually exhaust a fixed 50KB SRAM buffer, guaranteeing a system crash during continuous operation.
  napkin_math: |
    - **Quantization Impact:** INT8 shrinks the KV cache by 2x compared to FP16, doubling the time until OOM.
    - **Memory Growth (Quantized):** `O(T)`, where T is sequence length.
    - **Memory Growth (Sliding Window):** `O(W)`, where W is the fixed window size.
    - **Conclusion:** Quantization only delays the inevitable OOM. Sliding Window Attention mathematically bounds memory to a **constant `O(W)` size**.
