title: Evaluate Sliding Window vs Quantized KV Cache
scenario: A time-series sequence model on a Cortex-M4 has 50KB of SRAM reserved for
  its KV Cache. Processing continuous sensory streams forces the cache to grow infinitely.
question: Evaluate the architectural trade-offs of using Sliding Window Attention
  versus INT8 KV Cache quantization to guarantee bounded SRAM usage without halting.
details:
  realistic_solution: INT8 quantization halves the memory footprint (from FP16), extending
    the sequence length before OOM but fundamentally failing to prevent infinite growth.
    Sliding Window Attention mathematically bounds the context window to a fixed length
    W, capping memory exactly at O(W). For continuous deployment, sliding window is
    strictly required to guarantee bounded SRAM, despite losing historical context.
  common_mistake: Recommending quantization as a complete solution, ignoring that
    any linear growth model will eventually OOM a fixed 50KB buffer.
  napkin_math: Quantization delays OOM by 2x; Sliding Window memory = constant.
