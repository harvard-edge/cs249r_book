title: Hailo-8 Video Inference Queue
scenario: A Hailo-8 accelerator processing traffic camera frames at 26 TOPS. The service
  time is deterministic (25 ms = 40 fps capacity, since INT8 inference on fixed-size
  frames is highly stable). Traffic frames arrive in Poisson bursts averaging 30 fps
  - traffic surges between green/red phases create non-uniform arrivals. Use M/D/1
  (Poisson arrivals, deterministic service) rather than M/M/1.
question: Evaluate the expected queueing delay for an incoming frame and propose a
  strategy to bound average latency under 50ms.
visual:
  kind: svg
  path: tinyml-1630.svg
  alt: Hockey-stick curve showing latency exponentially rising as utilization approaches
    1
  caption: Latency vs Utilization Curve
details:
  realistic_solution: 'rho = 30/40 = 0.75. M/D/1 mean wait Wq = rho / (2*mu*(1-rho))
    = 0.75 / (2*40*0.25) = 0.0375 s = 37.5 ms. Mean response = Wq + 1/mu = 37.5 +
    25 = 62.5 ms. M/M/1 would predict 100 ms - the deterministic service halves the
    queueing delay. To hit a 50 ms target: solve for rho where 1/(2*mu*(1-rho)) +
    1/mu <= 50 ms; need mu >= 50 fps (service time <= 20 ms). Achieve via INT4 weights
    or model pruning.'
  common_mistake: Defaulting to M/M/1 for GPU/NPU inference workloads, doubling the
    predicted wait time and over-provisioning compute.
  napkin_math: M/D/1 W = 0.75/(2*40*0.25) + 1/40 = 37.5 + 25 = 62.5 ms; M/M/1 would
    give 100 ms.
