title: Hailo-8 Video Inference Queue
scenario: A Hailo-8 accelerator processing traffic camera frames at 26 TOPS. It handles
  requests at an average arrival rate of 30 fps with a service rate of 40 fps.
question: Evaluate the expected queueing delay for an incoming frame and propose a
  strategy to bound average latency under 50ms.
visual:
  kind: svg
  path: tinyml-1630.svg
  alt: Hockey-stick curve showing latency exponentially rising as utilization approaches
    1
  caption: Latency vs Utilization Curve
details:
  realistic_solution: 'Utilization rho = 30/40 = 0.75. Mean response time T = 1/(40-30)
    = 100ms. To hit 50ms, the required service rate is mu = lambda + 1/T = 30 + 1/0.05
    = 50 fps. Strategy: quantize to INT4 or prune model.'
  common_mistake: Calculating service time (25ms) and ignoring queue wait time (75ms).
  napkin_math: Response time = 1/(40-30) = 100ms.
