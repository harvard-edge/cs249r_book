title: The Great Flash/SRAM Divide
scenario: You are porting a vision model to a microcontroller that has 1MB of Flash memory and 256KB of
  SRAM. State the correct location for storing the read-only quantized model weights versus allocating
  the read-write Tensor Arena for runtime activations.
details:
  realistic_solution: The model weights, being constant and read-only, are stored in the non-volatile
    **Flash** memory. The Tensor Arena, which requires fast, frequent read/write access for the temporary
    activation tensors created during inference, is allocated in the volatile **SRAM**.
  common_mistake: A common misconception, borrowed from larger systems, is that model weights are loaded
    from Flash into SRAM for execution. On memory-constrained MCUs, SRAM is a scarce resource reserved
    for fast read/write data (activations). The model weights, being read-only, are typically kept in
    Flash and accessed directly via Execute-In-Place (XIP) to conserve SRAM.
  napkin_math: Your device has a 1MB Flash budget and 256KB SRAM. A typical vision model might have 450KB
    of weights. Per the `Flash budget` formula, you have less than 1MB for the model itself after accounting
    for the bootloader and RTOS. The 450KB model cannot fit in the 256KB SRAM. It must reside in Flash.
    The model's peak activation memory (Tensor Arena size) might be ~60KB, which fits comfortably in the
    fast SRAM.
  options:
  - Weights are stored in SRAM for speed; the Tensor Arena is in Flash.
  - Both the weights and the Tensor Arena are placed in SRAM.
  - Weights are stored in Flash; the Tensor Arena is allocated in SRAM.
  - Both the weights and the Tensor Arena are placed in Flash to save SRAM.
  correct_index: 2
