title: The Great Flash/SRAM Divide
scenario: You are porting a vision model to a microcontroller that has 1MB of Flash memory and 256KB of SRAM.
question: Where should read-only quantized weights and the read-write Tensor Arena reside on a 1MB Flash, 256KB SRAM microcontroller?
details:
  realistic_solution: The model weights, being constant and read-only, are stored in the non-volatile **Flash** memory. The Tensor Arena, which requires fast, frequent read/write access for the temporary activation tensors created during inference, is allocated in the volatile **SRAM**.
  common_mistake: |
    **The Pitfall:** Attempting to load model weights into SRAM during execution to improve "speed."
    **The Rationale:** Engineers accustomed to GPUs and cloud hardware assume that model weights must be moved into fast volatile RAM alongside activations before inference can begin.
    **The Consequence:** The model immediately fails to deploy with an Out-of-Memory (OOM) error because typical edge models (e.g., 400KB) vastly exceed the available SRAM.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Flash budget: 1 MB.
       - SRAM budget: 256 KB.
       - Typical vision model weights: ~450 KB.
       - Peak activation memory (Tensor Arena): ~60 KB.
    2. **Calculations:**
       - Weights size (450 KB) > SRAM size (256 KB).
       - Activations (60 KB) < SRAM size (256 KB).
    3. **Conclusion & Interpretation:**
       - **Result: SRAM Constrained.** The model weights must reside in non-volatile Flash via Execute-In-Place (XIP), while the read-write Tensor Arena safely fits in SRAM.
  options:
  - Weights are stored in SRAM for speed; the Tensor Arena is in Flash.
  - Both the weights and the Tensor Arena are placed in SRAM.
  - Weights are stored in Flash; the Tensor Arena is allocated in SRAM.
  - Both the weights and the Tensor Arena are placed in Flash to save SRAM.
  correct_index: 2
