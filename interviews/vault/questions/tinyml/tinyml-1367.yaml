title: Diagnosing Sub-4-bit Quantization Accuracy Degradation on STM32F4
scenario: You are porting a pre-trained sub-4-bit quantized image classification model, originally developed for a GPU, to an embedded system featuring an ARM Cortex-M4 STM32F4 microcontroller (168 MHz, 256 KB SRAM, no FPU). After deployment, you observe a significant drop in classification accuracy, from 90% on the GPU to barely 50% on the STM32F4, despite verifying the model's weights and architecture. The model is also occasionally triggering hard faults, which you suspect are memory-related.
question: How would you diagnose the root cause of sub-4-bit quantization accuracy degradation and memory faults on an STM32F4?
details:
  realistic_solution: '1. **Memory Profiling:** Systematically profile memory usage for weights, activations, and intermediate buffers. On the STM32F4 with only 256 KB SRAM, even sub-4-bit models can exceed limits, especially if activations are larger than anticipated or if dynamic memory allocation is inefficient.

    2. **Fixed-Point Emulation Review:** Scrutinize the fixed-point arithmetic library or custom implementation being used. Ensure it correctly handles sub-4-bit operations, saturates results appropriately to prevent overflow/underflow, and that bit-shifts and multiplications are optimized for the Cortex-M4. Look for discrepancies in how rounding or truncation is handled compared to the GPU environment.

    3. **Intermediate Value Inspection:** Introduce debug points to inspect intermediate tensor values at various layers on both the GPU (reference) and STM32F4. Compare these values to identify where the numerical divergence begins. This helps pinpoint specific operations or layers causing the accuracy drop.

    4. **Hardware-Specific Quantization Library:** Leverage optimized libraries like CMSIS-NN, which provides highly optimized fixed-point kernels for ARM Cortex-M processors, ensuring proper handling of quantized data types and operations.

    5. **Re-evaluate Quantization Strategy:** If discrepancies are too large, consider fine-tuning the quantized model *specifically* for the fixed-point constraints of the STM32F4, perhaps using post-training quantization aware training (QAT) or exploring different mixed-precision schemes if sub-4-bit is proving too aggressive for the target''s numerical precision.'
  common_mistake: |
    **The Pitfall:** Assuming extreme sub-4-bit quantization inherently solves memory constraints without emulation penalties.
    **The Rationale:** Practitioners assume bit-width reduction scales perfectly to any hardware.
    **The Consequence:** Without native hardware support, unpacking logic causes extreme memory pressure and precision loss through overflow/underflow, ruining accuracy and stability.
  napkin_math: |
    *   **FP32 Model:** 1 million parameters × 4 bytes = 4 MB.
    *   **2-bit Quantized Model:** 1 million parameters × 0.25 bytes = 250 KB.
    *   **Constraint Check:** 250 KB perfectly fills the 256 KB SRAM, leaving 0 bytes for activations, I/O buffers, or the stack.
    *   **Conclusion:** This memory pressure causes the hard faults, while inadequate fixed-point emulation of the sub-4-bit operations destroys the accuracy.
