title: Diagnosing Sub-4-bit Quantization Accuracy Degradation on STM32F4
scenario: You are porting a pre-trained sub-4-bit quantized image classification model, originally developed for a GPU, to an embedded system lacking native FPU or sub-byte hardware support. After deployment, you observe a significant drop in classification accuracy, from 90% on the GPU to barely 50% on the target, and occasional memory-related hard faults.
question: How would you diagnose the root cause of sub-4-bit quantization accuracy degradation and memory faults on a standard microcontroller?
details:
  realistic_solution: The memory faults stem from the software emulation overhead of sub-byte unpacking. Weights must be dynamically unpacked into standard 8-bit or 32-bit registers before computation, skyrocketing the activation memory footprint. The accuracy degradation is caused by overflowing custom fixed-point routines or mismatched rounding semantics between the GPU's native operations and the MCU's software emulation. Engineers should utilize Quantization-Aware Training (QAT) explicitly targeting the MCU's CMSIS-NN kernels.
  common_mistake: |
    **The Pitfall:** Assuming extreme sub-byte quantization inherently scales perfectly to solve memory constraints without emulation penalties.
    **The Rationale:** Practitioners trust that reducing parameter bit-width identically reduces memory pressure across any hardware ISA.
    **The Consequence:** Software unpacking logic exhausts SRAM, causing hard faults, while poorly emulated fixed-point math destroys the model's accuracy.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - FP32 Model: 1 million parameters = 4 MB.
       - 2-bit Quantized Model: 1 million parameters = 250 KB.
       - Available SRAM: 256 KB.
    2. **Calculations:**
       - 250 KB weights leave exactly 6 KB for activations, I/O buffers, and stack.
       - Unpacking a dense 2-bit row into an execution register completely overflows the 6 KB remainder.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound & Emulation Penalty.** The sub-byte unpacking overhead causes immediate out-of-memory hard faults.
