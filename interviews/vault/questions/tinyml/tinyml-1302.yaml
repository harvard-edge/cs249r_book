title: ESP32-S3 Wake-Word Profiling Specification
scenario: A new wake-word system deployed on the ESP32-S3 has a strict 150ms latency budget, but early prototypes occasionally spike to 400ms. The hardware uses the 240 MHz dual-core Xtensa processor, 512 KB of internal SRAM for critical data, 8 MB of external PSRAM for model weights, and concurrent WiFi/BLE.
question: How should you profile ESP32-S3 wake-word latency spikes to distinguish vectorization failures, PSRAM cache thrashing, and I/O preemption?
details:
  realistic_solution: The specification should define a multi-layered hardware-aware profiling approach. First, utilize ESP-IDF's FreeRTOS SystemView or task trace facilities to monitor task preemption and identify if the WiFi/BLE stack on Core 0 is blocking the audio/inference task on Core 1. Second, configure the Xtensa internal performance counters to track instruction cache and data cache miss rates when accessing the 8 MB PSRAM. Finally, use instruction cycle counting around the specific MAC loops to verify that the compiler is successfully utilizing the INT8 vector extensions rather than falling back to scalar operations.
  common_mistake: |
    **The Pitfall:** Proposing generic software profilers or simple timestamp logging.
    **The Rationale:** Candidates overlook the specific hardware architecture of the ESP32-S3, such as the massive latency gap between SRAM and PSRAM, or how the closed-source WiFi/BLE stack might preempt the neural network task on the dual-core system.
    **The Consequence:** The profiling strategy fails to identify the true hardware-level bottlenecks, leading to ineffective optimizations.
  napkin_math: |
    - **Step 1:** Calculate peak throughput: INT8 vector extensions process 16 MACs/cycle at 240 MHz = 3.84 GMACs/s.
    - **Step 2:** Calculate theoretical pure compute latency: 15M MACs / 3.84 GMACs/s = 3.9ms.
    - **Step 3:** Calculate unvectorized compute latency: 15M MACs / 240 MHz = 62.5ms.
    - **Step 4:** Calculate ideal PSRAM fetch latency: 3MB weights / 80 MB/s (peak bandwidth) = 37.5ms.
    - **Result:** **A cache thrash from a BLE interrupt forces unvectorized fetches, spiking latency from ~41.4ms (37.5 + 3.9) to over 300ms, easily explaining the 400ms spikes.**
