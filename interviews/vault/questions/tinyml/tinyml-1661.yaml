title: Cortex-M4 Brownout Checkpointing
scenario: A solar-powered Cortex-M4 has a 2mF capacitor at 3V. Upon power loss, it
  must checkpoint 16 KB of SRAM to Flash. Flash writes consume 20 mA at 3V and take
  10 ms per KB.
question: Calculate the energy required to write the checkpoint and determine if the
  capacitor holds enough energy.
visual:
  kind: svg
  path: tinyml-1661.svg
  alt: Line chart showing capacitor voltage dropping below the required threshold
    during a checkpoint.
  caption: Capacitor drain during emergency flash write.
details:
  realistic_solution: Time to write 16 KB is 16 * 10 ms = 160 ms (0.16 s). Power =
    3V * 0.02A = 0.06 W. Energy required = 0.06 W * 0.16 s = 0.0096 Joules. Capacitor
    energy = 0.5 * C * V^2 = 0.5 * 0.002 * 9 = 0.009 Joules. 0.009 J < 0.0096 J, so
    it fails.
  common_mistake: Calculating capacitor energy as C*V instead of 0.5*C*V^2, resulting
    in an overestimation of available energy.
  napkin_math: 'Req: 3 * 0.02 * 0.16 = 0.0096J. Avail: 0.5 * 0.002 * 9 = 0.009J. Fails.'
