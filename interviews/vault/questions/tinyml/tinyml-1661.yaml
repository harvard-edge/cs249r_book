details:
  realistic_solution: 'Charge-budget approach (cleanest for constant-current flash
    programming). Time to write 16 KB = 16 * 10 ms = 160 ms. Charge consumed by the
    load = I * t = 0.020 A * 0.160 s = 3.2 mC. Charge available between V_init and
    V_BOR = C * (V_init - V_BOR) = 0.002 * 1.2 = 2.4 mC. Since 2.4 mC < 3.2 mC, the
    capacitor cannot deliver the required charge before brownout - the rail collapses
    past 1.8 V at approximately 0.160 s * (2.4/3.2) = 120 ms into the write, leaving
    ~12 KB unwritten and corrupting flash because the programming engine aborts mid-page.
    Energy view (consistency check). Usable energy E_usable = 0.5 * C * (V_init^2
    - V_BOR^2) = 0.5 * 0.002 * (9 - 3.24) = 5.76 mJ. Required energy at average rail
    voltage V_avg ~ (3 + 1.8) / 2 = 2.4 V is 0.020 A * 2.4 V * 0.160 s = 7.68 mJ.
    Both views give the same answer - the budget is short by ~25%. Smallest capacitor
    that succeeds (charge floor): C_min = (I * t) / (V_init - V_BOR) = 3.2 mC / 1.2
    V = 2.67 mF; choose 3.3 mF as the standard catalog value with margin.'
  common_mistake: Computing capacitor energy as 0.5 * C * V_init^2 = 9 mJ and treating
    all of it as usable, ignoring that the BOR cuts off operation at 1.8 V; this over-states
    usable energy by ~36% (9 mJ vs 5.76 mJ) and produces a false-pass verdict on this
    exact design.
  napkin_math: Charge required = 20 mA * 160 ms = 3.2 mC. Charge available = 2 mF
    * 1.2 V = 2.4 mC -> short by 33%. Energy usable = 0.5*C*(V^2 - V_BOR^2) = 5.76
    mJ vs required ~7.68 mJ. Need C >= 2.67 mF; pick 3.3 mF.
