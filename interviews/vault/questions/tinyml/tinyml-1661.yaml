title: Cortex-M4 Brownout Checkpointing
scenario: A solar-powered Cortex-M4 (STM32L4) has a 2 mF reservoir capacitor charged
  to 3.0 V. The MCU brownout-reset (BOR) threshold is set at 1.8 V; below this voltage
  the chip guarantees nothing and the flash programming engine will not complete a
  write. On a power-loss event the firmware must checkpoint 16 KB of SRAM to internal
  flash. Flash programming draws 20 mA at the rail voltage and takes 10 ms per 1 KB
  page. (Flash programming is voltage-tolerant down to BOR, so we can ignore the programming-window
  voltage drop below 1.8 V because the chip will reset before that.)
question: Identify whether the 2 mF / 3.0 V capacitor holds enough usable energy to
  complete the 16 KB checkpoint before V drops below the 1.8 V brownout threshold.
  Compute (a) usable capacitor energy E = 0.5 * C * (V_init^2 - V_BOR^2), (b) checkpoint
  energy required, and (c) the outcome. If it fails, identify the smallest brownout-aware
  capacitance that would succeed.
