title: SRAM Allocation and Peak Memory Calculation on nRF5340
scenario: We are deploying a continuous health monitoring ML model on a Nordic nRF5340, which features
  a 128 MHz app core, 1 MB flash, and 256 KB of SRAM. The device must maintain a BLE 5.3 connection, and
  the Bluetooth stack combined with the RTOS statically reserves 64 KB of SRAM. Furthermore, the main
  application state and sensor DMA buffers consume an additional 48 KB of SRAM. If the ML compiler reports
  that the model requires a peak activation memory (tensor arena) of 150 KB, quantify the available SRAM
  and determine if this deployment will succeed.
details:
  realistic_solution: The candidate should identify the total SRAM and subtract the memory reserved for
    the OS, BLE stack, and application buffers to find the true available memory for the ML arena. Since
    the available SRAM is less than the model's required peak memory, the deployment will fail with an
    out-of-memory error. The candidate should conclude that the model must be optimized further, such
    as by reducing the activation footprint via structural changes or memory arena reuse.
  common_mistake: Candidates often assume the entire 256 KB of SRAM is available exclusively for the ML
    model's activations, ignoring the memory footprint of the RTOS and the BLE stack. Another common error
    is confusing the 1 MB of flash memory, which stores weights, with the SRAM required for intermediate
    activations during inference.
  napkin_math: Total SRAM = 256 KB. Reserved SRAM for RTOS/BLE stack = 64 KB. Reserved SRAM for Application/DMA
    = 48 KB. Total unavailable SRAM = 64 KB + 48 KB = 112 KB. Available SRAM for the ML model = 256 KB
    - 112 KB = 144 KB. Given the model's peak activation memory is 150 KB, the deployment will fail because
    144 KB < 150 KB.
