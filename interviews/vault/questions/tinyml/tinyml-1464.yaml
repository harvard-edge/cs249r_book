title: Analyzing Event-Driven Stream Architectures for nRF5340
scenario: A TinyML project aims to ingest high-frequency sensor data (e.g., 200 Hz from multiple sources) on a Nordic nRF5340 (128 MHz ARM Cortex-M33, 256 KB SRAM, 1 MB flash) for real-time processing and feature extraction. The data needs to be pre-processed and then streamed via BLE with minimal latency.
question: Which event-driven buffering and RTOS patterns suit high-frequency nRF5340 sensor ingestion and BLE streaming?
details:
  realistic_solution: Utilize a lightweight RTOS (e.g., Zephyr, FreeRTOS) to manage tasks asynchronously, employing event queues for inter-task communication. Implement circular buffers with high and low watermarks for each sensor stream to manage memory efficiently and trigger processing. Perform feature computation in dedicated, optimized tasks, potentially using fixed-point arithmetic or CMSIS-DSP library functions. Optimize BLE connection parameters (intervals, slave latency) to balance throughput and power, and consider power management techniques like deep sleep modes and duty cycling.
  common_mistake: |
    **The Pitfall:** Implementing synchronous, blocking loops for data processing.
    **The Rationale:** Novice embedded engineers default to a simple `while(1)` polling loop instead of utilizing interrupts and RTOS queues.
    **The Consequence:** Introducing unacceptable latency, risking data loss at 200 Hz, and severely draining the battery by preventing deep sleep modes.
  napkin_math: |
    1. **Raw Data Rate:** 200 Hz * 3 sensors * 2 bytes/sample (16-bit) = 1,200 bytes/sec.
    2. **Buffer Memory:** A 2-second circular buffer requires 2,400 bytes (~2.4 KB), which easily fits in the 256 KB SRAM.
    3. **Compute Load:** 1,200 bytes/sec requires negligible CPU cycles compared to the 128 MHz Cortex-M33 bandwidth.
    4. **Network Load:** BLE supports ~10 KB/s throughput.
    5. **Result:** The system is **power-bound, not memory or compute-bound**, necessitating aggressive duty-cycling and optimized BLE intervals.
