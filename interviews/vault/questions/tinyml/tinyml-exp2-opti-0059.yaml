title: ESP32-S3 Keyword Spotting Energy Bottleneck Optimization
scenario: You are deploying an always-on keyword spotting (KWS) model on an ESP32-S3. The model processes
  1-second audio frames at 16kHz and runs inferences every 100ms. Currently, the system drains the battery
  in 12 hours, far short of the 7-day target. Profiling shows that while the Xtensa core's INT8 vector
  extensions perform the MAC operations efficiently, reading the 2MB model weights from the 8MB external
  PSRAM for every inference is dominating the energy consumption.
details:
  realistic_solution: The solution is to minimize external memory access by leveraging the 512 KB internal
    SRAM. The model should be compressed (via techniques like aggressive quantization, structured pruning,
    or knowledge distillation) to fit entirely within the internal SRAM. Alternatively, caching strategies
    or breaking the model into stages where only the initial, frequently run feature-extraction layers
    reside in SRAM can drastically reduce PSRAM accesses.
  common_mistake: Candidates often focus solely on reducing the number of MAC operations (e.g., pruning
    or switching to a smaller model architecture) without realizing that in many microcontrollers, memory
    access—especially to external memory like PSRAM—costs orders of magnitude more energy than the compute
    itself.
  napkin_math: Assume accessing 32 bits from PSRAM costs ~100pJ, while from SRAM it costs ~10pJ, and an
    INT8 MAC operation costs ~1pJ. For a 2MB model (500,000 32-bit words), reading from PSRAM costs 500,000
    * 100pJ = 50uJ per inference. At 10 inferences/sec, this is 500uJ/sec (500uW). If compressed to 500KB
    and placed in SRAM (125,000 words), the cost is 125,000 * 10pJ = 1.25uJ per inference. At 10 inferences/sec,
    this is 12.5uJ/sec (12.5uW), a 40x reduction in memory energy cost.
