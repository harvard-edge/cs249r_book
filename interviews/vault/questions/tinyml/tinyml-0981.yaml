title: Operator Scheduling for Peak SRAM Reduction
scenario: A flat tensor arena executes an INT8 model splitting into Branch A (outputs 60 KB, needs 30 KB scratch) and Branch B (outputs 80 KB, needs 50 KB scratch). Input is 40 KB. Scheduling A first requires 230 KB SRAM, while scheduling B first requires 210 KB.
question: "Why does changing the execution order of these parallel branches alter the peak static memory requirement in the flat tensor arena?"
details:
  realistic_solution: Flat arena allocators optimize lifecycle persistence mappings. Reversing sequential topological DAG ordering strictly modifies temporal tensor overlaps. Spawning the largest scratchpad requirements when minimal outputs are concurrently alive suppresses peak aggregate limits.
  common_mistake: |
    **The Pitfall:** Assuming static memory planning algorithmically sums all layer maximums blindly without temporal overlap awareness.
    **The Rationale:** Candidates fail to conceptualize the overlapping temporal DAG execution window of scratchpads and persisted matrices.
    **The Consequence:** Peak memory allocations are blindly overestimated or underestimated, resulting in random crash events during real-time deployment.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Common persisted memory: 40 KB Input.
       - Branch A: 60 KB out, 30 KB scratch.
       - Branch B: 80 KB out, 50 KB scratch.
    2. **Calculations:**
       - Order A then B Peak eval:
         - Exec A timeline: 40 KB + 60 KB + 30 KB = 130 KB.
         - Exec B timeline: 40 KB + 60 KB (A out kept alive) + 80 KB + 50 KB = 230 KB.
       - Order B then A Peak eval:
         - Exec B timeline: 40 KB + 80 KB + 50 KB = 170 KB.
         - Exec A timeline: 40 KB + 80 KB (B out kept alive) + 60 KB + 30 KB = 210 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Scheduling massive footprint Branch B first mitigates simultaneous lifetime overlap, saving 20 KB (Memory-Bound Scheduling).**
