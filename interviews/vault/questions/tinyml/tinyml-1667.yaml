title: RTOS Priority Inversion Diagnosis
scenario: A keyword spotting model on a Cortex-M4 randomly drops audio frames. Compute
  takes 12ms per 16ms window, but a BLE transmission task occasionally preempts it
  for up to 5ms.
question: Diagnose the root cause of the dropped frames and design a priority-inversion
  or scheduling fix.
details:
  realistic_solution: 'The dropped frames are caused by a scheduling deadline miss:
    12ms compute + 5ms BLE preemption = 17ms, exceeding the 16ms arrival window. The
    fix is to lower the BLE task priority below the audio DSP task, or use an RTOS
    deferred interrupt handler to queue BLE messages until the 4ms idle window after
    inference completes.'
  common_mistake: Assuming the MCU clock speed is too low and trying to optimize the
    ML model, rather than fixing the RTOS task priorities.
  napkin_math: 12ms inference + 5ms preemption = 17ms > 16ms deadline.
