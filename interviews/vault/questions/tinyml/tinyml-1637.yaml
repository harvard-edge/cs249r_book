title: Energy Harvesting State Loss
scenario: A remote pipeline sensor uses energy harvesting. Power drops out every 2 minutes. The ML task takes 3 minutes to execute fully.
question: Analyze why the system makes zero progress and propose a non-volatile memory layout to guarantee eventual completion.
visual:
  kind: svg
  path: tinyml-1637.svg
  alt: Sawtooth timeline of execution progress dropping to 0 repeatedly
  caption: Execution Progress without Checkpointing
details:
  realistic_solution: 'Task duration (3m) exceeds uptime (2m), causing restarts from 0. Fix: Partition the model into 1-minute subgraph chunks. Write intermediate activations to NVRAM (FRAM) after each chunk.'
  common_mistake: |
    **The Pitfall:** Attempting to aggressively prune or quantize the model to force the inference time under the 2-minute power window.
    **The Rationale:** Candidates fail to address the fundamental paradigm shift of Intermittent Computing, trying to treat it like a traditional continuous-power system.
    **The Consequence:** The system remains incredibly brittle; if power drops out even slightly earlier (e.g., 1m50s), the entire inference state is lost and progress reverts to zero.
  napkin_math: |
    1. **Assumptions & Constraints:** Total ML task duration = 3 minutes. Continuous power uptime window = 2 minutes. Total system reset occurs on power loss.
    2. **Calculations:** Progress = min(Uptime, Task Duration). Without checkpointing: 2m < 3m. System resets at 2m. Progress = 0%. By partitioning the model into three 1-minute subgraphs and writing intermediate activations to NVRAM (e.g., FRAM): 1m chunk < 2m window.
    3. **Conclusion & Interpretation:** **Result: Guaranteed Eventual Completion.** State checkpointing ensures that across three separate 2-minute power cycles, the 3-minute task will successfully finish, making the architecture robust against volatile energy harvesting.
