title: Graceful Degradation for Real-time Anomaly Detection on Constrained TinyML Device
scenario: An IoT device utilizes an ARM Cortex-M4 STM32F4 microcontroller (168 MHz CPU, 256 KB SRAM, no
  FPU) for real-time anomaly detection in an industrial setting. The core task is to identify critical
  machine faults using a small, quantized neural network (NN) inferencing on sensor data. The device is
  battery-powered and operates in an environment where sensor noise, network congestion, and battery degradation
  are common. Design a graceful degradation strategy that ensures the system remains operational and provides
  some level of utility, even under severe resource constraints or environmental challenges, considering
  degradation ladders, model fallbacks, fail-safe vs fail-operational modes, and quality-of-service shedding.
details:
  realistic_solution: 'Implement a tiered degradation ladder with pre-quantized (fixed-point) models.
    Tier 1 (primary): A slightly more complex convolutional neural network (CNN) for high-fidelity anomaly
    detection. Tier 2 (fallback): A simpler, shallower CNN or a statistical model (e.g., Z-score thresholding)
    that requires significantly less SRAM and compute. Tier 3 (fail-safe): A simple rule-based heuristic
    that only detects severe, unambiguous anomalies, or simply logs sensor data to non-volatile memory
    for later analysis while minimizing active processing. Triggers for degradation would include battery
    voltage dropping below a threshold, sustained inference latency exceeding a critical limit (e.g.,
    due to CPU load or sensor noise processing), or internal watchdog timer resets indicating instability.
    Quality-of-service shedding could involve reducing the inference frequency or downsampling sensor
    data to reduce input size, rather than completely stopping detection. Prioritize switching to a fail-safe
    mode (e.g., emergency alerts only) over trying to maintain full operationality with critically low
    resources.'
  common_mistake: A common mistake is designing a complex degradation strategy that itself consumes too
    much of the precious 256 KB SRAM or CPU cycles for switching logic and multiple model binaries. Another
    pitfall is relying on floating-point arithmetic for fallback models, which would severely degrade
    performance on an ARM Cortex-M4 without an FPU, leading to system stalls rather than graceful transitions.
  napkin_math: 'Given 256 KB SRAM:

    - Primary CNN model (weights + activations): 100 KB

    - Fallback statistical model (parameters): 10 KB

    - Operating system/firmware + other buffers: 100 KB

    Total needed: 210 KB (leaves 46 KB for stack, heap, data).

    Inference Latency Target: 50 ms.

    - Primary CNN inference: ~40 ms (on 168 MHz fixed-point ops).

    - Fallback statistical model inference: ~5 ms.

    If battery drops, reducing primary CNN inference frequency from 10 Hz to 2 Hz (QoS shedding) saves
    significant power, extending operational time by X%. Switching to the 10 KB fallback model frees up
    90 KB SRAM, which could be critical for system stability when other functions consume more memory
    (e.g., logging).'
