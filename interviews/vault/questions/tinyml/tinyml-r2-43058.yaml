title: Compile-Time Arena Verification
scenario: Your TinyML deployment pipeline builds models for 15 different Cortex-M7 boards with SRAM ranging
  from 256 KB to 1 MB. Each board has different SRAM availability after accounting for stack, heap, and
  peripheral buffers. A model that fits on one board may exceed SRAM on another. Engineers currently discover
  this at runtime when TFLite Micro's AllocateTensors() fails. Design a compile-time verification system
  that catches arena overflows before flashing firmware.
question: "How would you design a compile-time verification system that catches arena overflows before flashing firmware?"
details:
  realistic_solution: 'Build a CI/CD pipeline with three stages: (1) Static analysis: parse the TFLite
    FlatBuffer model offline (Python script) to extract tensor sizes and the operator execution plan.
    Run the same memory planning algorithm as TFLite Micro (greedy first-fit-decreasing) to compute the
    minimum arena size. This is deterministic and can run without the target hardware. (2) Board manifest:
    maintain a JSON config for each board specifying total SRAM, stack reservation, heap reservation,
    peripheral buffers, and available arena size. Example: {board: ''NUCLEO-H743ZI'', sram_total: 512KB,
    stack: 8KB, heap: 0KB, peripherals: 24KB, arena_available: 480KB}. (3) CI check: for each (model,
    board) pair, compare computed_arena_size against board.arena_available. Fail the build with a clear
    message: ''Model X requires 350 KB arena but board Y has only 310 KB available.'' (4) Generate a compatibility
    matrix showing which models fit on which boards, with headroom percentages. This catches the error
    at PR time, not at 2 AM on a factory floor.'
  common_mistake: 'Relying on sizeof(arena) compile-time checks. The arena size is a #define that only
    checks if the array fits in the linker''s memory map — it doesn''t verify that the arena is large
    enough for the model''s runtime needs.'
  napkin_math: '15 boards × N models = 15N compatibility checks per build. Python memory planner runtime:
    ~50ms per model. For 10 models: 150 checks × 50ms = 7.5 seconds in CI. Runtime failure cost: 30 min
    debugging + reflash + retest per incident. At 2 incidents/week: 52 hours/year saved. CI pipeline cost:
    ~10 lines of Python + 15 board configs. Memory planner accuracy vs runtime: exact match if using the
    same algorithm (TFLite Micro''s planner is deterministic). Edge cases: custom ops with variable scratch
    buffers need manual annotation.'
