title: Intermittent Power Checkpointing
scenario: An energy-harvesting TinyML sensor executes a 500ms inference that spans
  multiple charge/discharge cycles. The local capacitor only holds enough charge for
  100ms of active compute.
question: Specify a non-volatile memory checkpointing routine that guarantees forward
  progress across brownouts.
details:
  realistic_solution: Insert a checkpoint write to FRAM every 80ms of compute. FRAM
    is preferred over Flash because it has much lower write-energy and faster write-times,
    ensuring the intermediate activations are safely persisted before the voltage
    drops.
  common_mistake: Specifying traditional Flash memory for checkpoints, which requires
    high-voltage erase cycles and will likely corrupt data as power dies mid-write.
  napkin_math: 500ms total / 80ms bursts = ~7 boots required to finish one inference.
