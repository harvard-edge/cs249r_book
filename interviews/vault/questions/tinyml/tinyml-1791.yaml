title: Intermittent Power Checkpointing
scenario: An energy-harvesting TinyML sensor executes a 500ms inference that spans multiple charge/discharge cycles. The local capacitor only holds enough charge for 100ms of active compute.
question: Specify a non-volatile memory checkpointing routine that guarantees forward progress across brownouts.
details:
  realistic_solution: Insert a checkpoint write to FRAM every 80ms of compute. FRAM is preferred over Flash because it has much lower write-energy and faster write-times, ensuring the intermediate activations are safely persisted before the voltage drops.
  common_mistake: |
    **The Pitfall:** Specifying traditional Flash memory for checkpoints.
    **The Rationale:** Candidates overlook that Flash requires high-voltage erase cycles and is slow, likely corrupting data if power dies mid-write.
    **The Consequence:** The device falls into an infinite reboot loop, corrupting its state on every brownout.
  napkin_math: |
    - **Step 1:** Capacitor holds 100ms of charge.
    - **Step 2:** Checkpoint every 80ms to guarantee safety margin before brownout.
    - **Step 3:** Total inference is 500ms.
    - **Step 4:** 500ms / 80ms bursts = ~6.25.
    - **Result:** **It will take ~7 boots to finish one full inference.**
