title: TinyML Coin Cell Duty Cycle
scenario: A sensor node wakes every 10 seconds, runs a 25 ms inference at 12 mW, transmits for 5 ms at 30 mW, and otherwise sleeps at 20 µW. Estimate average power.
question: What average power does a TinyML node consume with 25 ms inference at 12 mW and 5 ms transmit at 30 mW every 10 seconds?
details:
  realistic_solution: Average power is active inference energy plus transmit energy plus sleep. Inference contributes 12 mW x 0.025/10 = 0.03 mW. Transmit contributes 30 mW x 0.005/10 = 0.015 mW. Sleep contributes about 0.020 mW. Total is about 0.065 mW.
  common_mistake: Ignoring sleep and leakage because each active burst is short, or ignoring transmit energy because inference looks like the main workload.
  napkin_math: Inference avg = 12 x 0.0025 = 0.03 mW. TX avg = 30 x 0.0005 = 0.015 mW. Sleep ≈ 20 µW = 0.020 mW. Total = 0.065 mW.
