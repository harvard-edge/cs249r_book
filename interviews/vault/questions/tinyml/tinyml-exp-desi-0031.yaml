title: ESP32-S3 vs External NPU for Edge AI
scenario: You are tasked with designing the compute architecture for a smart sensor node that performs
  continuous keyword spotting and periodic image-based anomaly detection. The baseline hardware is an
  ESP32-S3 with a 240 MHz dual-core Xtensa processor, 512 KB SRAM, 8 MB PSRAM, and vector extensions for
  INT8. You must evaluate whether to execute the entire ML pipeline natively using the ESP32-S3's vector
  extensions or to integrate a dedicated ultra-low-power custom ASIC/NPU. Design the system architecture,
  compare the compute tradeoffs, and justify your choice.
details:
  realistic_solution: A strong L5 candidate will evaluate the specific workload demands against the ESP32-S3
    capabilities. They should architect a solution that pins the latency-critical keyword spotting model
    entirely in the fast 512 KB SRAM. For the larger vision model, they would utilize the 8 MB PSRAM and
    the built-in INT8 vector extensions on the second core. By demonstrating that the native compute overhead
    and PSRAM bandwidth are adequate for low-framerate tasks, they can justify avoiding the increased
    BOM cost, SPI latency, and programmability challenges of adding a custom ASIC.
  common_mistake: Candidates often immediately recommend adding an external NPU/ASIC to offload ML tasks
    without evaluating if the ESP32-S3's native INT8 vector extensions are sufficient for the workload.
    Alternatively, they might run both models purely in the 8 MB PSRAM without realizing the severe bandwidth
    bottleneck compared to the 512 KB SRAM.
  napkin_math: Assuming the 240 MHz ESP32-S3 dual-core executes 2 INT8 MACs/cycle with vector extensions,
    peak compute is ~480 MMACs/sec. For a 25 MMAC anomaly detection model, pure compute time is 25M /
    480M = ~52 ms. Assuming the 8 MB PSRAM operates at 40 MB/s (Octal SPI at 80 MHz), fetching a 1.5 MB
    model takes 1.5MB / 40MB/s = 37.5 ms. Total latency per frame is roughly 90 ms (approx 11 fps max).
    This proves native execution is sufficient for periodic tasks, rendering an external ASIC unnecessary.
