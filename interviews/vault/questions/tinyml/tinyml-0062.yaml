title: Bootloader A/B Firmware Partitioning
scenario: Design the flash memory layout for a MCU that supports A/B firmware partitioning
  with rollback. The firmware includes a bootloader, application code, and a TFLite
  Micro model. The device is deployed in a location where physical access costs $500
  per visit.
question: How would you design the flash memory layout for a 1 MB flash footprint
  to support A/B firmware partitioning with rollback?
details:
  realistic_solution: Flash layout explicitly accounts for the Bootloader, boot config
    sector (wear-leveled), and persistent storage. The remaining space is split into
    two equal slots containing app code, TFLM runtime, and model weights. On OTA,
    write to the inactive slot and update the config pointer only after CRC validation.
  common_mistake: '**The Pitfall:** Splitting flash exactly 50/50 (512 KB each).

    **The Rationale:** Candidates ignore the necessary storage overhead for bootloaders,
    configuration, and wear-leveling sectors.

    **The Consequence:** Firmware updates overwrite critical bootloader sections,
    permanently bricking the remote device.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Total Flash: 1024 KB.

    - System overhead: 32 KB (boot) + 4 KB (config) + 28 KB (persist) = 64 KB.

    - Partitions: 2 (A/B).


    **Calculations:**

    - Space per partition = (1024 KB - 64 KB) / 2 = 480 KB.

    - Model Budget = 480 KB - 120 KB (App) - 10 KB (TFLM) = 350 KB.


    **Conclusion & Interpretation:**

    - **Result: 350 KB (Storage-Bound)**. The active partition allows a maximum INT8
    model size of 350 KB, safely enabling A/B OTA rollbacks.

    '
