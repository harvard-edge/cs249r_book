title: Bootloader A/B Firmware Partitioning
scenario: Design the flash memory layout for a Cortex-M4 with 1 MB flash that supports A/B firmware partitioning
  with rollback. The firmware includes a bootloader, application code, and a TFLite Micro model. The device
  is deployed in a location where physical access costs $500 per visit.
question: "How would you design the flash memory layout for a Cortex-M4 with 1 MB flash that supports A/B firmware partitioning with rollback?"
details:
  realistic_solution: 'Flash layout for 1 MB with A/B partitioning: Bootloader (32 KB, address 0x0), boot
    config sector (4 KB, wear-leveled), persistent storage (28 KB, device ID, calibration). Remaining
    960 KB split into two 480 KB slots. Each slot: app code (120 KB) + TFLite Micro runtime (10 KB) +
    model weights (350 KB). Boot flow: bootloader reads config, validates slot CRC, loads the active slot.
    On OTA: write to inactive slot, verify CRC, update config to point to new slot. If new slot fails
    3 consecutive boots: rollback to previous slot automatically. Model budget of 350 KB (INT8) fits keyword
    spotting (~80 KB) and person detection (~300 KB) comfortably.'
  common_mistake: '"Split flash 50/50: 512 KB for slot A, 512 KB for slot B." This wastes flash and doesn''t
    account for the bootloader, configuration, or wear leveling.'
  napkin_math: 'Flash overhead for A/B: 32 KB (bootloader) + 4 KB (config) + 28 KB (persistent) = 64 KB
    overhead. Available per slot: (1024 - 64) / 2 = 480 KB. Model budget per slot: 480 - 120 (app code)
    - 10 (TFLite Micro runtime) = 350 KB for model weights. At INT8: 350K parameters. Sufficient for most
    TinyML models (keyword spotting: ~80 KB, person detection: ~300 KB). Boot config wear: 4 KB sector,
    ~100K erase cycles. At 1 update/week: 100,000 / 52 = 1,923 years before wear-out.'
