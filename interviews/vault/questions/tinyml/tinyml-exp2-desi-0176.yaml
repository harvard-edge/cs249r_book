title: Side-Channel Defense Architecture for STM32F4 Audio Authentication
scenario: You are deploying a proprietary speaker verification model to a smart access badge powered by
  an ARM Cortex-M4 (STM32F4). The device has 256 KB SRAM, 1 MB flash, and runs at 168 MHz without an FPU.
  Since the badge is physically accessible, attackers can use differential power analysis (DPA) and timing
  attacks during CMSIS-NN INT8 execution to extract your proprietary model weights. Architect a system-level
  defense strategy to protect the model IP and prevent extraction, evaluating the tradeoffs between software-level
  masking, execution jitter, and model partitioning within these strict resource limits.
details:
  realistic_solution: 'A robust L5 design relies on a layered, asymmetric defense rather than full software
    masking. The architecture should inject random execution jitter (randomized delays and timer interrupts)
    to misalign power traces, which costs nearly zero SRAM. For the IP protection, the system should partition
    the model: an initial feature extractor runs on the Cortex-M4 utilizing the SIMD instructions (2x
    INT8 MACs/cycle), while the highly sensitive projection weights are encrypted in the 1 MB flash and
    only decrypted layer-by-layer into a small, volatile 10 KB SRAM buffer just in time for inference,
    overwriting immediately after use.'
  common_mistake: Candidates often propose heavyweight cryptographic techniques like Boolean or arithmetic
    masking for every neural network operation. They fail to realize that software masking scales poorly
    on microcontrollers, quickly exceeding both the 168 MHz compute budget and the 256 KB SRAM limit due
    to the need to store and compute multiple random shares for every intermediate activation.
  napkin_math: A typical INT8 wake-word model requires ~2 million MACs. Using STM32F4's CMSIS-NN SIMD
    (2 MACs/cycle), base inference takes ~1M cycles (roughly 6ms at 168 MHz). If full Boolean masking
    is applied, it requires ~8 extra instructions per MAC, inflating compute to ~16M cycles (95ms) and
    doubling the peak SRAM tensor arena (e.g., from 80 KB to 160 KB), leaving little room for the OS and
    audio buffers. Conversely, adding random NOP jitter introduces only a 5-10% latency overhead (~0.6ms)
    and 0 KB SRAM overhead, keeping the system well within the 256 KB SRAM constraint while successfully
    disrupting DPA alignment.
