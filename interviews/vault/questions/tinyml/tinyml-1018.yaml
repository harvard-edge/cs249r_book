title: Evaluating Model Architectures for Cortex-M4
scenario: You are deploying an audio event detection model on an ARM Cortex-M4 (STM32F4)
  microcontroller. The hardware runs at 168 MHz, features 256 KB SRAM, 1 MB flash,
  no FPU, and supports CMSIS-NN SIMD (2x INT8 MACs/cycle). You must choose between
  Model A (15 million FP32 MACs) and Model B (12 million INT8 MACs). The system must
  run at 10 Hz continuously while reserving 50% of CPU cycles for other RTOS tasks.
  Evaluate which model is viable.
question: 'Which STM32F4 model is viable at 10 Hz with 50% CPU reserved: 15M FP32
  MACs or 12M INT8 MACs?'
details:
  realistic_solution: Model B is the only viable choice. Since the Cortex-M4 lacks
    an FPU, FP32 operations are emulated in software, resulting in extreme cycle penalties
    that miss the latency target. Model B's INT8 operations take advantage of CMSIS-NN
    DSP instructions, processing 2 MACs per cycle, allowing it to easily meet the
    100ms latency requirement while maintaining the strict 50% CPU utilization limit.
  common_mistake: Candidates often compare the raw MAC counts without factoring in
    the hardware's data type capabilities. They may assume FP32 is executed in a single
    cycle or fail to realize that the lack of an FPU forces slow software emulation,
    while missing the 2x SIMD throughput advantage for INT8.
  napkin_math: Cycle budget per inference at 10 Hz = 168 MHz / 10 = 16.8M cycles.
    With a 50% CPU limit, the usable budget is 8.4M cycles. Model A requires 15M FP32
    MACs; without an FPU (assuming ~50 cycles/MAC for software emulation), it needs
    ~750M cycles (fails). Model B requires 12M INT8 MACs; utilizing CMSIS-NN SIMD
    (2 MACs/cycle), it requires 12M / 2 = 6M compute cycles. Since 6M < 8.4M allowed
    cycles, Model B succeeds.
