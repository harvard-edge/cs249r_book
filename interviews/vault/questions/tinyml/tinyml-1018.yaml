title: Evaluating Model Architectures for Cortex-M4
scenario: You are deploying an audio event detection model on an ARM Cortex-M4 (STM32F4) microcontroller. The hardware runs at 168 MHz, features 256 KB SRAM, 1 MB flash, no FPU, and supports CMSIS-NN SIMD (2x INT8 MACs/cycle). You must choose between Model A (15 million FP32 MACs) and Model B (12 million INT8 MACs). The system must run at 10 Hz continuously while reserving 50% of CPU cycles for other RTOS tasks.
question: Which STM32F4 model is viable at 10 Hz with 50% CPU reserved: 15M FP32 MACs or 12M INT8 MACs?
details:
  realistic_solution: Model B is the only viable choice. Since the Cortex-M4 lacks an FPU, FP32 operations are emulated in software, resulting in extreme cycle penalties that miss the latency target. Model B's INT8 operations take advantage of CMSIS-NN DSP instructions, processing 2 MACs per cycle, allowing it to easily meet the 100ms latency requirement while maintaining the strict 50% CPU utilization limit.
  common_mistake: |
    **The Pitfall:** Comparing raw MAC counts without considering hardware execution capabilities.
    **The Rationale:** Candidates ignore the absence of an FPU and the presence of SIMD on the Cortex-M4.
    **The Consequence:** They mistakenly assume the FP32 model will perform comparably to the INT8 model.
  napkin_math: |
    * Cycle budget at 10 Hz: 168 MHz / 10 = 16.8M cycles.
    * 50% CPU reserve leaves: 8.4M cycles for inference.
    * Model A (FP32 w/o FPU): 15M MACs * ~50 cycles = ~750M cycles (Fails).
    * Model B (INT8 SIMD): 12M MACs / 2 MACs/cycle = 6M cycles (Passes).
    * **Result: Model B (INT8) safely completes within the 8.4M cycle budget.**
