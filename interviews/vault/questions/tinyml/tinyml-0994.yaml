title: Hardware-Aware NAS Design for ARM Cortex-M4
scenario: You are designing a hardware-aware Neural Architecture Search (NAS) pipeline for a visual wake word application targeting an ARM Cortex-M4. The platform features a 168 MHz clock, 256 KB of SRAM, 1 MB of flash, no FPU, and CMSIS-NN SIMD support (2x INT8 MACs/cycle). You need to architect the search space to maximize accuracy while strictly adhering to memory and compute limits.
question: How do you construct the constraint estimators to evaluate peak memory and latency without deploying every candidate to physical hardware?
details:
  realistic_solution: The architecture must incorporate an analytical peak memory estimator that calculates the maximum lifecycle of tensors (input, output, weights, and residual buffers) per layer to strictly enforce the 256 KB SRAM limit. For latency, the NAS should use a lookup-table (LUT) based predictor built by profiling atomic block variants (e.g., MobileNet blocks) directly on the ARM Cortex-M4, natively accounting for CMSIS-NN's 2x INT8 SIMD MAC utilization efficiency rather than relying on raw FLOPs.
  common_mistake: |
    **The Pitfall:** Using FLOPs as a direct proxy for latency.
    **The Rationale:** Candidates incorrectly assume FLOPs correlate perfectly with latency across all architectures and forget to account for intermediate activation peaks.
    **The Consequence:** The NAS proposes models that theoretically "fit" but immediately HardFault on the device because peak SRAM limits were ignored during execution.
  napkin_math: |
    - Candidate latency: 2,500,000 MACs / (168 MHz * 2 MACs/cycle) = 7.44 ms.
    - Inverted bottleneck layer takes a 64x64x16 input (65.5 KB) and expands by 4x to 64x64x64 (262 KB).
    - Peak memory = 65.5 KB + 262 KB + weights = **>327 KB**.
    - **SRAM overflow (>256 KB). The NAS must instantly reject this architecture.**
