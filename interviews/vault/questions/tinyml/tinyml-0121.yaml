title: Power-Aware Inference Scheduler
scenario: 'Your wearable health monitor on a Cortex-M33 (64 KB SRAM, 64 MHz, 3.3 µA deep sleep) runs three models: (1) heart rate estimation (PPG sensor, 25 Hz, 0.5ms inference, runs continuously), (2) arrhythmia detection (ECG, 250 Hz, 8ms inference, runs every 10 seconds), (3) fall detection (accelerometer, 50 Hz, 3ms inference, runs every 1 second). The device has an 80 mAh battery and must last 7 days. Design a power-aware scheduler that meets all real-time deadlines while maximizing battery life.'
question: "How would you design a power-aware scheduler that meets all real-time deadlines while maximizing battery life?"
details:
  realistic_solution: 'Design a time-slotted scheduler minimizing wake-ups and batching sensor reads with inference. Slot allocation per 1-second superframe: Slot 0 (0-1 ms): wake from deep sleep (3.3 uA to 8 mA, 0.5 ms transition). Slot 1 (1-14 ms): PPG read + heart rate (25 samples * 0.5 ms = 12.5 ms at 8 mA). Slot 2 (every 10th frame, 14-32 ms): ECG burst + arrhythmia detection (250 samples * 0.04 ms + 8 ms inference at 12 mA). Slot 3 (14-18 ms or 32-36 ms): accelerometer + fall detection (1 ms read + 3 ms inference at 8 mA). Sleep remainder: 964-982 ms at 3.3 uA. MCU Power: HR = 12.5 ms * 8 mA = 100 uA avg. Arrhythmia (10% duty) = 18 ms * 12 mA * 0.1 = 21.6 uA. Fall = 4 ms * 8 mA = 32 uA. Sleep = 3.3 uA. Wake = 2.0 uA. MCU Total = 158.9 uA. Adding 280 uA for continuous/duty-cycled sensor power (PPG+Accel~80 uA, ECG 10% duty~200 uA) yields a system total of ~439 uA. Battery: 80 mAh / 0.439 mA = 182 hours = 7.6 days. 7-day target met.'
  common_mistake: '"Run all three models at their required rates and calculate average power." This ignores that the models can be scheduled to avoid overlapping active periods, and that the MCU''s power consumption depends heavily on which peripherals are active (ADC, I2C, SPI).'
  napkin_math: 'Continuous ECG: 2 mA -> 40 hours (1.66 days). Duty-cycling ECG (10%): 200 µA. Total inference active time per second = (25 * 0.5 + 8/10 + 3) = 16.3 ms. Total MCU active power = ~0.16 mA. Sensor power = ~0.28 mA. Inference accounts for ~31% of system active power. Optimization priority: reduce continuous sensor draw (duty-cycling ECG saves 1.8 mA) and optimize Model 1, which dominates inference time (12.5 ms/s).'
