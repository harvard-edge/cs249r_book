title: Power-Aware Inference Scheduler
scenario: 'Your wearable health monitor on a Cortex-M33 (64 KB SRAM, 64 MHz, 3.3 µA deep sleep) runs three
  models: (1) heart rate estimation (PPG sensor, 25 Hz, 0.5ms inference, runs continuously), (2) arrhythmia
  detection (ECG, 250 Hz, 8ms inference, runs every 10 seconds), (3) fall detection (accelerometer, 50
  Hz, 3ms inference, runs every 1 second). The device has a 40 mAh battery and must last 7 days. Design
  a power-aware scheduler that meets all real-time deadlines while maximizing battery life.'
question: "How would you design a power-aware scheduler that meets all real-time deadlines while maximizing battery life?"
details:
  realistic_solution: 'Design a time-slotted scheduler minimizing wake-ups and batching sensor reads with
    inference. Slot allocation per 1-second superframe: Slot 0 (0-1 ms): wake from deep sleep (3.3 uA
    to 8 mA, 0.5 ms transition). Slot 1 (1-14 ms): PPG read + heart rate (25 samples * 0.5 ms = 12.5 ms
    at 8 mA). Slot 2 (every 10th frame, 14-22 ms): ECG burst + arrhythmia detection (250 samples * 0.04
    ms + 8 ms inference at 12 mA). Slot 3 (14-17 ms or 22-25 ms): accelerometer + fall detection (1 ms
    read + 3 ms inference at 8 mA). Sleep remainder: 975-986 ms at 3.3 uA. Power: HR = 12.5 ms * 8 mA
    = 100 uA avg. Arrhythmia (10% duty) = 18 ms * 10 mA * 0.1 = 18 uA. Fall = 4 ms * 8 mA = 32 uA. Sleep
    = 3.3 uA. Wake = 0.5 uA. Total = 153.8 uA. Battery: 40 mAh / 0.154 mA = 260 hours = 10.8 days. 7-day
    target met with 54% margin.'
  common_mistake: '"Run all three models at their required rates and calculate average power." This ignores
    that the models can be scheduled to avoid overlapping active periods, and that the MCU''s power consumption
    depends heavily on which peripherals are active (ADC, I2C, SPI).'
  napkin_math: 'Continuous ECG: 2 mA → 20 hours (0.83 days). Duty-cycled ECG (3.3%): 66 µA → 11.4 days.
    Total inference active time per second = (25 × 0.5 + 8/10 + 3) = 16.3 ms. Total inference power =
    16.3 ms / 1000 ms × 8 mA = 0.13 mA. Sensor power = ~0.146 mA. Inference accounts for ~47% of active
    power. Optimization priority: reduce continuous sensor draw (duty-cycling ECG saves ~1.9 mA) and optimize
    Model 1, which dominates inference time (12.5 ms/s).'
