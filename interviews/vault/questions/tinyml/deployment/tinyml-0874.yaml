title: 'Model Format Conversion: Size TFLM Deployment for ESP32-S3 with PSRAM'
scenario: You need to size the memory layout for deploying MobileNetV1-0.25 on ESP32-S3, allocating the model to PSRAM, activations to SRAM, and TFLM runtime to SRAM.
question: What latency penalty comes from placing 475 KB MobileNetV1 weights in ESP32-S3 PSRAM instead of SRAM?
details:
  realistic_solution: 'Layout: model Flatbuffer → PSRAM (475KB, accessed once per inference for weight loading). Activation arena → SRAM (100KB). TFLM runtime → SRAM (30KB). Total SRAM: 130KB of 512KB ✓. PSRAM access: weights read 14.9M × 1B = 14.9MB total weight reads per inference? No: 475KB per layer pass. Weight reads: 14.9M MACs × 1B weight per MAC = 14.9MB of weight data read. At PSRAM BW ~40MB/s (SPI): 14.9MB/40MB/s = 373ms! Catastrophic. Fix: copy model to SRAM at startup? 475KB > 512KB SRAM. Use ping-pong: copy 1 layer at a time to SRAM → layer-by-layer.'
  common_mistake: |
    **The Pitfall:** Storing all data in PSRAM for simplicity without considering access latency.
    **The Rationale:** Candidates ignore that PSRAM operates over an SPI bus with 5-10x higher latency than internal SRAM.
    **The Consequence:** Inference time is completely dominated by memory reads, causing massive latency spikes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Workload: MobileNetV1 (14.9 MOPs, 475 KB INT8 weights).
    - PSRAM Bandwidth: ~40 MB/s (SPI).

    **Calculations:**
    - Weight Data Read: 14.9M MACs * 1 Byte = 14.9 MB.
    - PSRAM Read Latency: 14.9 MB / 40 MB/s = ~373 ms.
    - Ping-Pong SRAM Copy (73.7 KB max layer): 73.7 KB / 40 MB/s = 1.84 ms per layer.
    - Total Layer Copies (13 layers): 13 * 1.84 ms = 23.9 ms.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound**. Direct PSRAM access causes a catastrophic 373 ms penalty; layer-by-layer SRAM ping-ponging reduces overhead to 23.9 ms.
