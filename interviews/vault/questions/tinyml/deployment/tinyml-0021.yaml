title: 'The OTA Flash Memory Tax'
scenario: 'You are scoping the flash memory requirements for a new microcontroller that will run a keyword spotting model. The device must support robust Over-the-Air (OTA) firmware updates using an A/B partitioning scheme to prevent bricking during an update. The total flash on the chip is 1MB.'
question: 'How much flash must be reserved specifically for the OTA update partition?'
details:
  realistic_solution: 'A robust A/B OTA update scheme requires two separate memory partitions of equal size: one for the currently running application (''A'') and one to receive the new application (''B''). After the new firmware is fully downloaded and verified in partition ''B'', the bootloader will swap to it on the next boot. This means approximately 50% of the total available flash must be reserved for the update partition. It''s a direct ''tax'' on memory in exchange for update reliability.'
  common_mistake: 'Engineers unfamiliar with embedded constraints often assume they can overwrite the application ''in-place'', forgetting that a power failure or failed write would permanently brick the device. Others assume only a small ''patch'' or ''diff'' is sent, underestimating the need to store a full, second application binary for a safe swap.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Flash: 1MB (1024KB).
    - OTA A/B partitioning scheme used.

    **Calculations:**
    - Partition A (active firmware): 512KB.
    - Partition B (OTA staging): 512KB.
    - Cost of OTA reliability: 50% of total flash.
    - Usable space per slot: 512KB - 16KB (bootloader) = ~496KB.

    **Conclusion & Interpretation:**
    - **Result: 512KB (Memory Bound)**. Exactly 50% of the flash must be reserved for the inactive partition to guarantee safe OTA updates.
  options:
  - '~50 KB, for storing a small patch file.'
  - 'Effectively 0 KB, as you can overwrite the existing application in-place.'
  - '~500 KB, to hold a complete second copy of the application binary.'
  - '~32 KB, the space taken by the bootloader itself.'
  correct_index: 2
