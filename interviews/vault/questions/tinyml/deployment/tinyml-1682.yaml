title: Flash Memory Weight Placement for Bare-Metal Microcontrollers
scenario: An engineer is compiling an anomaly detection model via Apache TVM for a Cortex-M4 without an operating system or file system.
question: Specify how the microTVM compiler handles the model's weight initialization and memory layout in a bare-metal environment.
details:
  realistic_solution: The compiler transpiles the model weights directly into a static C-array that is flashed into the MCU's Read-Only Memory (Flash). The generated C code uses pointers directly to these Flash addresses, bypassing any need for dynamic allocation or runtime file loading.
  common_mistake: |
    **The Pitfall:** Describing a process where the MCU reads a `.tflite` or `.onnx` file from an SD card at runtime.
    **The Rationale:** Engineers accustomed to Linux/Android environments assume models are always loaded dynamically from a filesystem.
    **The Consequence:** The system design attempts to include unnecessary OS overhead or impossible filesystem calls on a bare-metal chip.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Environment: Bare-metal Cortex-M4 (no OS, no filesystem).
       - Weights Size: 100 KB.
       - Compiler: Apache microTVM.
    2. **Calculations:**
       - C-Array Transpilation: Weights encoded as `static const unsigned char weights[102400];`.
       - Memory Footprint: Direct mapping into `.rodata` section (Flash).
       - RAM Overhead: 0 KB (Execute-in-Place).
    3. **Conclusion & Interpretation:**
       - **Result: Direct pointer access in Flash bypasses filesystem and SRAM loads.** **Result: Flash-Bound Execution.**
