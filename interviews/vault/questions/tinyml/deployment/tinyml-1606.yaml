title: A/B Bank Model OTA Updates
scenario: You are evaluating an OTA (Over-The-Air) update mechanism for model weights on a Cortex-M4 device with 1MB Flash.
question: How does an A/B bank flash layout impact available program space and wear-leveling?
details:
  realistic_solution: |
    An A/B layout divides the updateable flash region into two slots: one active image and one candidate image. With 1MB total flash and no other overhead specified, the structural upper bound is about 512KB per slot, and the deployable firmware/model payload is lower after reserving shared bootloader, metadata, rollback state, and alignment space. The main tradeoff is update safety versus available program space: the inactive bank can be erased and programmed before the bootloader switches banks. Wear is spread by alternating writes between the A and B update slots, but hot metadata sectors still need explicit wear-leveling or rotation.
  common_mistake: |
    **The Pitfall:** Allocating the full 1MB flash specification purely to the ML model footprint.
    **The Rationale:** Candidates focus mechanically on total available flash hardware without accounting for OTA duplication boundaries.
    **The Consequence:** They architect models that cannot physically be updated via standard A/B bank procedures without hard-bricking the edge device.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Flash Capacity: 1 MB (1024 KB).
    - Requirement: A/B dual banking for safe OTA.
    - Bootloader and metadata reservations are shared unless the platform explicitly duplicates them.

    **Calculations:**
    - Maximum update slot size before shared reservations: 1024 KB / 2 = 512 KB per bank.
    - Practical payload limit: less than 512 KB per bank after subtracting shared bootloader, metadata, rollback state, and alignment/sector padding.
    - Alternating OTA writes: update N erases/programs inactive slot B, update N+1 erases/programs inactive slot A.

    **Conclusion & Interpretation:**
    - **Result: roughly half of flash per update slot before reservations (Structural Capacity Limit)**. A/B banking reduces usable program space but improves rollback safety and can distribute erase wear across the two update banks.
