title: TinyML OTA Flash Slot Budget
scenario: A microcontroller has 1 MB flash. Current firmware is 360 KB, the model is 220 KB, and the bootloader plus metadata reserve 96 KB. The team wants A/B OTA slots so the old image remains until the new one boots.
question: Can a 1 MB TinyML device support A/B OTA slots for a 360 KB firmware plus 220 KB model with 96 KB reserved?
details:
  realistic_solution: One full image is 360 + 220 = 580 KB. Two slots require 1,160 KB, plus 96 KB reserve, totaling 1,256 KB. It does not fit in 1 MB. The design needs delta updates, external flash, a smaller model, or single-slot rollback tradeoffs.
  common_mistake: |
    **The Pitfall:** Checking only one firmware image size.
    **The Rationale:** Forgetting that A/B OTA needs two full slots plus bootloader metadata to allow safe rollback.
    **The Consequence:** Proposing an OTA layout that physically cannot fit in the available flash memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total flash: 1 MB (1024 KB).
    - Image size = Firmware (360 KB) + Model (220 KB).
    - Reserved overhead = Bootloader + metadata = 96 KB.
    - A/B OTA requires two full image slots.

    **Calculations:**
    - One full image = 360 KB + 220 KB = 580 KB.
    - Two slots = 580 KB x 2 = 1,160 KB.
    - Total flash required = 1,160 KB + 96 KB = 1,256 KB.

    **Conclusion & Interpretation:**
    - **Result: 1,256 KB required (Memory-Bound)**. 1,256 KB > 1,024 KB. The required A/B OTA architecture does not fit in the available flash memory.
