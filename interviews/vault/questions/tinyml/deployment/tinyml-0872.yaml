title: TFLite Micro Flash Footprint Optimization with Kernel Trimming and Pruning
scenario: A TFLite Micro model uses 380KB Flash for weights and 50KB for the TFLM runtime, leaving only 82KB for application code. You need to free 100KB of Flash.
question: How would you diagnose and quantify optimizations to free 100KB Flash?
details:
  realistic_solution: 'Execute a two-stage footprint reduction using one Flash accounting model. Current ML footprint is 380KB weights + 50KB TFLM runtime = 430KB, leaving 82KB application space in a 512KB Flash image. First, audit the TFLM op resolver: registering only the operations present in the model can reduce runtime Flash from 50KB to about 15KB, saving 35KB. Second, prune or otherwise compress the 380KB weight blob by 20%, saving 76KB and reducing weights to 304KB. Final ML footprint is 304KB + 15KB = 319KB, for 111KB total savings and 193KB available for application code.'
  common_mistake: |
    **The Pitfall:** Immediately forcing aggressive quantization (e.g., INT4) without pruning the runtime environment.
    **The Rationale:** Engineers hyper-focus on the neural network weights instead of analyzing the inference engine wrapping it.
    **The Consequence:** Teams sacrifice critical model accuracy by pushing extreme quantization when simply dropping unused TFLM C++ operation kernels would have freed massive amounts of Flash instantly.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current usage: 380 KB model + 50 KB TFLM = 430 KB.
    - Required application space: 82 KB + 100 KB = 182 KB.
    - Total available Flash: 512 KB. Limit: 330 KB for ML.

    **Calculations:**
    - Fix 1 (TFLM Ops): `MicroMutableOpResolver` drops 35 KB -> New runtime: 15 KB.
    - Fix 2 (Pruning/compression): 20% of the 380 KB weight blob saves 76 KB -> New model: 304 KB.
    - Final ML footprint: 304 KB model + 15 KB runtime = 319 KB.
    - Freed Flash: 430 KB - 319 KB = 111 KB.
    - Application space after fixes: 512 KB - 319 KB = 193 KB.

    **Conclusion & Interpretation:**
    - **Result: 319 KB ML footprint (Flash Storage Cleared)**. The combined 111 KB savings exceed the 100 KB target and leave at least 182 KB for application code.
