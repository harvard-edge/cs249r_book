title: Ethos-U55 Fallback Delegation and SRAM Strategy
scenario: You are deploying a quantized vision model to an ARM Cortex-M-class host CPU with an Ethos-U55 NPU subsystem. During TFLite to Vela compiler conversion, you notice a custom activation block is unsupported by the NPU and must fall back to the host CPU.
question: How would you design the model conversion and runtime delegation strategy to handle this fallback without exceeding the 512 KB SRAM limit or causing severe latency bottlenecks?
details:
  realistic_solution: The optimal design first tries to remove the fallback by rewriting the custom activation into Vela-supported TFLite operators or retraining with an NPU-native activation such as ReLU/ReLU6. If the fallback is unavoidable, compile the supported subgraphs with Vela and keep explicit CPU reference kernels only at well-defined graph boundaries. The memory plan must budget for fully materialized boundary tensors, CPU scratch buffers, and the TFLM arena rather than assuming the M7 arena can overlap arbitrary Ethos-U55 working memory. Validate the final arena and scratch allocation with the Vela and TFLM memory reports, then measure the CPU fallback section separately to decide whether the operator rewrite is mandatory.
  common_mistake: |
    **The Pitfall:** Assuming CPU fallback only affects latency while ignoring memory implications.
    **The Rationale:** Candidates fail to realize that crossing the NPU-CPU boundary forces intermediate tensors to be fully materialized in the shared 512 KB SRAM, bypassing the NPU's internal buffering.
    **The Consequence:** Unpredictable out-of-memory (OOM) errors during inference.
  napkin_math: |
    **Assumptions & Constraints:**
    - 512 KiB SRAM shared. Cortex-M CPU fallback at 480 MHz with an optimistic 1 MAC/cycle for a simple int8 kernel. Ethos-U55 peak throughput example: 256 MACs/cycle. Intermediate tensor: 112x112x32 int8. Unsupported section: 5M MACs.

    **Calculations:**
    - Boundary tensor size = 112 * 112 * 32 * 1 byte = 401,408 bytes = 392 KiB.
    - Remaining SRAM before other arenas/scratch = 512 KiB - 392 KiB = 120 KiB.
    - CPU fallback lower-bound time = 5,000,000 cycles / 480,000,000 cycles/s = 10.4 ms, before unpacking, cache misses, and TFLM overhead.
    - If the same MACs could stay on a 256 MAC/cycle NPU path, ideal compute time would be 5,000,000 / (256 * 480,000,000) = 0.041 ms, so the CPU section can dominate latency even though this peak number is only a rough upper-bound comparison.

    **Conclusion & Interpretation:**
    - **Result: 392 KiB boundary tensor leaves only 120 KiB for all other runtime memory, and the CPU fallback adds at least ~10 ms.** The realistic fix is operator rewriting or tightly controlled graph partitioning with measured arena allocation. **Bottleneck: CPU Fallback and SRAM Boundary Tensors.**
