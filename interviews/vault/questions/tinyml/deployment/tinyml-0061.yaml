title: Inference Result Compression for Upload
scenario: Your fleet of 1,000 wildlife acoustic monitors runs a bird species classifier on an RP2040. Each device classifies 10-second audio clips and detects up to 50 species. The devices upload results daily via cellular (LTE-M Cat-M1, billed at $0.50/MB). You're currently sending raw JSON results and the cellular bill is $13,000/month.
question: How would you compress daily RP2040 bird-classifier uploads to cut a 1,000-device cellular bill from about $13,000/month?
details:
  realistic_solution: Replace JSON with a highly compressed binary semantic payload, such as a daily histogram aggregation per species.
  common_mistake: |
    **The Pitfall:** Suggesting standard compression like "Use gzip on the JSON."
    **The Rationale:** Candidates reach for standard IT solutions without considering the hardware context.
    **The Consequence:** Gzip on a Cortex-M0+ is extremely slow because it lacks a barrel shifter, draining battery, and JSON is fundamentally the wrong format for constrained uploads.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1000 devices, 4320 clips/day.
    - LTE-M Cellular cost: $0.50/MB.

    **Calculations:**
    - Raw JSON: 200 B/clip * 4320 = 864 KB/day. Cost = 25.9 GB * $0.50 = ~$13,000/month.
    - Binary Encoding: 6 B/clip * 4320 = 25.9 KB/day. Cost = ~$388/month.
    - Histogram Aggregation: 24 hours * 50 species bytes = 1.2 KB/day. Total = 36 MB/month. Cost = $18/month.

    **Conclusion & Interpretation:**
    - **Result: Bill drops from $13k to $18/month (Network-Cost-Bound)**. Resolved via aggressive semantic compression (histograms).
