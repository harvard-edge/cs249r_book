title: Inference Result Compression for Upload
scenario: Your fleet of 1,000 wildlife acoustic monitors runs a bird species classifier on an RP2040. Each device uploads 4,320 clip results per day and detects up to 50 species. The devices upload results daily via cellular (LTE-M Cat-M1, billed at $0.50/MB). You're currently sending raw JSON results and the cellular bill is $13,000/month.
question: How would you compress daily RP2040 bird-classifier uploads to cut a 1,000-device cellular bill from about $13,000/month?
details:
  realistic_solution: Replace per-clip JSON with a highly compressed semantic payload sent once per day, such as 24 hourly histogram buckets for each species. The comparison is between uploading all 4,320 clip-level JSON records and uploading one daily summary that preserves the counts needed by the application.
  common_mistake: |
    **The Pitfall:** Suggesting standard compression like "Use gzip on the JSON."
    **The Rationale:** Candidates reach for standard IT solutions without considering the hardware context.
    **The Consequence:** Gzip on a Cortex-M0+ is extremely slow because it lacks a barrel shifter, draining battery, and JSON is fundamentally the wrong format for constrained uploads.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1000 devices, 4320 clips/day per device.
    - LTE-M Cellular cost: $0.50/MB.
    - Raw JSON result: 200 B/clip.
    - Binary clip-level result: 6 B/clip.
    - Daily histogram summary: 24 hourly buckets * 50 species * 1 byte, uploaded once per device per day.

    **Calculations:**
    - Raw JSON per device: 200 B/clip * 4320 = 864,000 B/day = 0.864 MB/day.
    - Raw JSON fleet: 0.864 MB/day * 1000 * 30 = 25,920 MB/month. Cost = 25,920 * $0.50 = $12,960/month.
    - Binary clip-level per device: 6 B/clip * 4320 = 25,920 B/day = 0.0259 MB/day.
    - Binary fleet: 0.0259 MB/day * 1000 * 30 = 777.6 MB/month. Cost = $388.80/month.
    - One daily histogram per device: 24 * 50 * 1 B = 1,200 B/day = 0.0012 MB/day.
    - Histogram fleet: 0.0012 MB/day * 1000 * 30 = 36 MB/month. Cost = $18/month.

    **Conclusion & Interpretation:**
    - **Result: Bill drops from $13k to $18/month (Network-Cost-Bound)**. Sending one daily semantic summary instead of 4,320 per-clip JSON records removes the network-cost driver.
