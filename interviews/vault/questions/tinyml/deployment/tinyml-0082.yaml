title: The BLE Disconnect During OTA
scenario: You're pushing a massive 200 KB ML model update over a BLE 5.0 connection to an nRF5340. The BLE protocol utilizes a 7.5 ms connection interval.
question: How does a 200 KB ML model size determine BLE OTA transfer time, and why is it riskier than firmware without incremental checksums?
details:
  realistic_solution: A 200 KB model makes OTA risk proportional to the transfer window and the error-detection granularity. With a practical BLE application payload near 180 bytes per connection event and one useful notification/write per 7.5 ms interval, usable throughput is about 24 KB/s before retries, so the radio transfer alone is roughly 8-9 seconds. Flash erase/write time is a separate local bottleneck that can add several seconds if done serially. The checksum risk is that without incremental per-chunk checksums, corruption may be detected only at the end of the 200 KB image, forcing a whole-image retry or leaving late failure recovery. Chunked OTA should verify each fragment or page, retry only the failed chunk, and commit the new model only after the final image hash passes.
  common_mistake: |
    **The Pitfall:** Verifying only one checksum after the entire 200 KB image has been transferred.
    **The Rationale:** A final hash detects corruption, but it detects it late and gives no way to retry only the damaged fragment.
    **The Consequence:** One bad BLE packet can waste the whole transfer window, increase timeout probability, or leave the device stuck in recovery until the full image is resent.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target payload: 200 KB model image.
       - BLE connection interval: 7.5 ms.
       - Practical OTA application payload after ATT/L2CAP/framing overhead: about 180 bytes per useful connection event.
       - Flash erase/write cost: ~85 ms per 4 KB page if not overlapped with transfer.
    2. **Calculations:**
       - Usable throughput estimate: 180 bytes / 7.5 ms = 24,000 bytes/s ≈ 23.4 KiB/s.
       - Radio transfer time: 200 KiB / 23.4 KiB/s ≈ 8.5 seconds before retries.
       - Flash work if serialized: 200 KiB / 4 KiB = 50 pages; 50 * 85 ms = 4.25 seconds.
       - Worst simple serial window: 8.5 + 4.25 ≈ 12.8 seconds, plus protocol acknowledgments and retries.
       - With 4 KiB chunk checksums, a corrupted chunk costs one 4 KiB retry, not a 200 KiB retry.
    3. **Conclusion & Interpretation:**
       - **Result: Chunked OTA Risk**. The model size sets a multi-second BLE exposure window; incremental checksums reduce late corruption detection and avoid whole-image retransmission.
