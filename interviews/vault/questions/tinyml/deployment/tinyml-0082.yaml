title: The BLE Disconnect During OTA
scenario: You're pushing a massive 200 KB ML model update over a BLE 5.0 connection to an nRF5340. The BLE protocol utilizes a 7.5 ms connection interval.
question: "How does a 200 KB ML model size determine BLE OTA transfer time, and why is it riskier than firmware without incremental checksums?"
details:
  realistic_solution: Over-The-Air (OTA) capability faces severe physics constraints. The gigantic 200 KB monolithic transfer mandates a huge temporal transmission window. This exposes the un-checksummed pipeline to extreme RF interference degradation, demanding aggressive model INT8 quantization prior to OTA broadcast to radically collapse the vulnerability window.
  common_mistake: |
    **The Pitfall:** Believing the BLE signal is purely too weak and simply moving the phone physically closer fixes packet loss.
    **The Rationale:** Developers accustomed to monolithic 5G software updates incorrectly assume dropped connections are purely proximity range issues.
    **The Consequence:** The structural protocol timings driven by massive machine learning payloads are neglected, yielding persistent update timeout failures.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target payload: 200 KB (Model) vs 50 KB (INT8 Quantized).
       - BLE Max Transfer Unit (MTU): 251 bytes per 7.5 ms interval.
       - Flash writing cost: ~85 ms per 4 KB page erase/write.
    2. **Calculations:**
       - Protocol peak throughput: 251 bytes / 7.5 ms = 33.47 KB/s.
       - Base 200 KB transfer latency: 200 / 33.47 = 5.97 seconds.
       - 200 KB Flash execution: (200 KB / 4 KB) = 50 pages. 50 * 85 ms = 4.25 seconds.
       - Total 200 KB window: 5.97 + 4.25 = 10.22 seconds.
       - INT8 50 KB transfer: 50 / 33.47 = 1.49 seconds.
       - INT8 50 KB Flash execution: (50 KB / 4 KB) * 85 ms = ~1.06 seconds.
       - Total INT8 window: 1.49 + 1.06 = 2.55 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: INT8 quantization drops the vulnerable transmission window from 10.22s to 2.55s, effectively preventing timeout drops (Network-Bound).**
