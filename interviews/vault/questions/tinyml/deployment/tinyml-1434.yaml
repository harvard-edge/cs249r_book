title: TinyML Model Conversion and Operator Gap Management for Nordic nRF5340 Deployment
scenario: >
  A machine learning team has developed a custom float32 ONNX anomaly detection model (2.5 MB) and needs to deploy it on a Nordic nRF5340 microcontroller.
question: Outline a strategy for converting this 2.5 MB ONNX model to fit the nRF5340, detailing format conversion, operator gaps, and memory sizing.
details:
  realistic_solution: >
    1. **Format & Quantization**: Convert the ONNX graph to TensorFlow Lite, applying full integer (INT8) post-training quantization. This shrinks the 2.5 MB float32 model to ~625 KB, fitting Flash.
    2. **Operator Support**: Identify unsupported ops early. Replace non-native layers with CMSIS-NN accelerated equivalents or implement bespoke optimized C++ kernels to avoid catastrophic software-fallback slowdowns.
    3. **Memory Sizing**: Employ static memory allocation via `SetBufferAllocator`. Fuse operators (Conv+ReLU) to minimize the transient activation buffer footprint within the 256 KB SRAM.
    4. **Profiling**: Leverage nRF Connect SDK tracing to ensure the INT8 MAC loops execute within the 50 ms deadline.
  common_mistake: |
    **The Pitfall:** Attempting a direct conversion from ONNX to TFLite Micro without aggressive quantization or checking operator support.
    **The Rationale:** ML engineers assume conversion tools handle optimization automatically, forgetting that 32-bit floats and complex operators crash immediately on memory-constrained MCUs.
    **The Consequence:** The model fails to compile, immediately triggers Out-Of-Memory errors, or executes too slowly because it relies on unoptimized software fallbacks instead of CMSIS-NN hardware intrinsics.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Flash: 1 MB. SRAM: 256 KB. Clock: 128 MHz. Deadline: 50 ms.
       - Original Model: 2.5 MB float32.
    2. **Calculations:**
       - Quantized Flash Footprint: 2.5 MB / 4 = ~625 KB (Fits 1 MB Flash).
       - SRAM Footprint: 64x64x3 INT8 input (12 KB) + 32x32x32 INT8 activation (32 KB) = 44 KB (Fits 256 KB SRAM).
       - Compute Budget: 50 ms at 128 MHz = 6.4 million cycles.
       - Optimized Throughput: 3 million CMSIS-NN INT8 MACs (1-2 cycles/MAC) = 3-6 million cycles.
    3. **Conclusion & Interpretation:**
       - **Result: 625 KB Flash, 3-6M cycles.** INT8 quantization perfectly solves both the memory and compute constraints. **Bottleneck: Hardware-Software Co-design.**
