title: TinyML Model Conversion and Operator Gap Management for Nordic nRF5340 Deployment
scenario: |
  A machine learning team has developed a custom float32 ONNX anomaly detection model (2.5 MB) and needs to deploy it on a Nordic nRF5340 microcontroller.
question: Outline a strategy for converting this 2.5 MB ONNX model to fit the nRF5340, detailing format conversion, operator gaps, and memory sizing?
details:
  realistic_solution: |
    1. **Format & Quantization**: Convert the ONNX graph to TensorFlow Lite, applying full integer (INT8) post-training quantization. If the 2.5 MB float32 size is mostly weights, the quantized weight payload is roughly one quarter of that before metadata and alignment overhead. 2. **Operator Support**: Identify unsupported ops early. Replace non-native layers with CMSIS-NN accelerated equivalents or implement bespoke optimized C++ kernels to avoid catastrophic software-fallback slowdowns. 3. **Memory Sizing**: Use a measured TFLite Micro tensor arena, including activations, persistent buffers, scratch, and stack margin. Fuse operators such as Conv+ReLU to minimize transient activation buffers within the 256 KB SRAM. 4. **Profiling**: Leverage nRF Connect SDK tracing to verify the INT8 MAC loops and non-MAC overhead against the 50 ms deadline.
  common_mistake: |
    **The Pitfall:** Attempting a direct conversion from ONNX to TFLite Micro without aggressive quantization or checking operator support.
    **The Rationale:** ML engineers assume conversion tools handle optimization automatically, forgetting that 32-bit floats and complex operators crash immediately on memory-constrained MCUs.
    **The Consequence:** The model fails to compile, immediately triggers Out-Of-Memory errors, or executes too slowly because it relies on unoptimized software fallbacks instead of CMSIS-NN hardware intrinsics.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Flash: 1 MB. SRAM: 256 KB. Clock: 128 MHz. Deadline: 50 ms.
       - Original Model: 2.5 MB float32, assumed mostly weight payload for this estimate.
    2. **Calculations:**
       - Quantized weight estimate: 2.5 MB / 4 = ~625 KB, plus TFLite metadata/alignment overhead; this is plausible for 1 MB flash only if firmware and assets fit in the remaining space.
       - Minimum tensor data example: 64x64x3 INT8 input (12 KB) + 32x32x32 INT8 activation (32 KB) = 44 KB.
       - More realistic SRAM arena estimate: 44 KB tensors + ~80 KB scratch/persistent/runtime reserve = ~124 KB, leaving ~132 KB margin in 256 KB SRAM.
       - Compute Budget: 50 ms at 128 MHz = 6.4 million cycles.
       - Optimized Throughput: 3 million CMSIS-NN INT8 MACs at 1-2 cycles/MAC = 3-6 million cycles before loop, memory, and operator overhead.
    3. **Conclusion & Interpretation:**
       - **Result: ~625 KB plus overhead in flash, ~124 KB estimated SRAM arena, and 3-6M ideal MAC cycles.** This is a feasibility check, not a guarantee; final acceptance depends on measured arena size, operator support, and profiling against the 50 ms deadline.
