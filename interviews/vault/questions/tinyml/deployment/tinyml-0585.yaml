title: Updating a 500 KB Model Over BLE 5.0
scenario: Your fleet of 200 wearable health sensors runs an arrhythmia detection model on an nRF5340. You need to push an update over BLE 5.0.
question: How does the model's quantization format (e.g., FP32 vs INT8) affect the OTA size, and why does this become a deployment bandwidth trade-off?
details:
  realistic_solution: A typical 100,000-parameter ML model takes 400 KB in FP32 format. Over BLE 5.0, real-world application throughput is often limited to ~50 KB/s due to connection intervals, MTU limits, and packet drops. Transferring a 400 KB FP32 model takes 8 seconds of active radio time. The BLE radio is the most power-hungry component on the MCU (drawing ~8 mA).
  common_mistake: |
    **The Pitfall:** Believing quantization is purely an inference optimization for SRAM and latency.
    **The Rationale:** Engineers from cloud environments forget the immense energy cost of wireless data transfer on battery-powered edge devices.
    **The Consequence:** Designing models that run fast but drain the battery purely through the process of receiving OTA updates.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP32 Model: 400 KB.
    - INT8 Model: 100 KB.
    - BLE 5.0 Throughput: 50 KB/s.
    - Radio Power: 8 mA at 3.3V = 26.4 mW.
    - Coin Cell Capacity: 100 mAh (1,188 J).

    **Calculations:**
    - FP32 Transfer: 400 KB / 50 KB/s = 8 seconds.
    - FP32 Energy: 26.4 mW * 8s = 211 mJ.
    - INT8 Transfer: 100 KB / 50 KB/s = 2 seconds.
    - INT8 Energy: 26.4 mW * 2s = 52.8 mJ.
    - Weekly FP32 Energy: 211 mJ * 52 weeks = ~11 J (~1% of 1188 J).
    - Weekly INT8 Energy: 52.8 mJ * 52 weeks = ~2.7 J (~0.25% of 1188 J).

    **Conclusion & Interpretation:**
    - **Result: Energy-Bound.** INT8 saves 158 mJ per update. Weekly FP32 updates consume ~1% of annual battery just in radio time, while INT8 consumes 0.25%.
  options:
  - Quantization format doesn't affect OTA size because the model is compressed during transmission regardless of the weight precision.
  - INT8 quantization reduces OTA model size by 4x (400 KB to 100 KB), cutting BLE transfer time from 8s to 2s and energy per update from 211 mJ to 52.8 mJ.
  - The OTA size reduction from quantization is irrelevant because BLE 5.0's built-in compression handles the FP32 model efficiently.
  - INT8 reduces OTA size by 2x (not 4x) because the TFLite flatbuffer format adds metadata overhead that scales with the number of parameters, partially negating the precision reduction.
  correct_index: 1
