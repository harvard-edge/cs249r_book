title: Corstone-300 NPU Delegation and Memory Architecture
scenario: You are deploying a 250 KB audio classification model onto an ARM Cortex-M7 + Ethos-U55 (Corstone-300)
  platform running at 480 MHz with 512 KB of shared SRAM. The model is exported to TFLite, but the Vela
  compiler indicates an unsupported custom activation in the middle of the network must fall back to the
  M7 CPU. Design the conversion and delegation strategy to handle this CPU-NPU context switch while ensuring
  the system operates within the strict 512 KB SRAM limit.
question: How would you design the conversion and delegation strategy to handle this CPU-NPU context switch
  while ensuring the system operates within the strict 512 KB SRAM limit?
details:
  realistic_solution: The optimal design modifies the model format conversion pipeline to replace the
    unsupported operator with an NPU-compatible alternative (like ReLU6) during the ONNX/TFLite export,
    ensuring single-pass execution. If fallback is unavoidable, the architecture must implement a custom
    memory planner in TFLite Micro to place the NPU-to-CPU intermediate tensors in overlapping memory
    arenas within the shared SRAM, preventing buffer duplication.
  common_mistake: '**The Pitfall:** Assuming automatic graph partitioning by the Vela compiler is sufficient.

    **The Rationale:** Candidates ignore the memory penalty of CPU-NPU fallback and fail to account for
    materializing large intermediate tensors during the context switch.

    **The Consequence:** The fallback intermediate tensors exceed the remaining available memory budget,
    leading to out-of-memory errors.'
  napkin_math: '**Assumptions & Constraints:**

    - Total SRAM is 512 KB.

    - Model weights are 250 KB.

    - Fallback tensor is 128x128x8 int8.


    **Calculations:**

    - Remaining SRAM: 512 KB - 250 KB = 262 KB (for RTOS and arena).

    - Boundary buffer size: 128 * 128 * 8 bytes = 131,072 bytes (128 KB).

    - Memory consumed: 128 KB / 262 KB = ~49% of remaining SRAM.


    **Conclusion & Interpretation:**

    - **Result: 128 KB boundary overhead (Memory-Bound).** Keeping execution entirely on the Ethos-U55
    eliminates this 128 KB boundary overhead and minimizes the M7 CPU cycle usage.'
