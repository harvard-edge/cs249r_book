title: Corstone-300 NPU Delegation and Memory Architecture
scenario: You are deploying a 250 KB audio classification model onto an ARM Cortex-M7
  + Ethos-U55 (Corstone-300) platform running at 480 MHz with 512 KB of shared SRAM.
  The model is exported to TFLite, but the Vela compiler indicates an unsupported
  custom activation in the middle of the network must fall back to the M7 CPU. Design
  the conversion and delegation strategy to handle this CPU-NPU context switch while
  ensuring the system operates within the strict 512 KB SRAM limit.
question: How would you design the conversion and delegation strategy to handle this
  CPU-NPU context switch while ensuring the system operates within the strict 512
  KB SRAM limit?
details:
  realistic_solution: The optimal design modifies the model format conversion pipeline
    to replace the unsupported operator with an NPU-compatible alternative (like ReLU6)
    during the ONNX/TFLite export, ensuring single-pass execution. If fallback is
    unavoidable, the architecture must implement a custom memory planner in TFLite
    Micro to place the NPU-to-CPU intermediate tensors in overlapping memory arenas
    within the shared SRAM, preventing buffer duplication.
  common_mistake: Candidates often assume automatic graph partitioning by the Vela
    compiler is sufficient, ignoring the memory penalty of CPU-NPU fallback. They
    fail to account for the fact that materializing large intermediate tensors in
    shared SRAM during the context switch will exceed the remaining available memory
    budget.
  napkin_math: Total SRAM is 512 KB. Subtracting the 250 KB model weights leaves 262
    KB for the RTOS and tensor arena. If the fallback occurs at a layer outputting
    a 128x128x8 int8 tensor, the boundary buffer requires 128 KB (128*128*8 bytes).
    This consumes ~49% of the remaining SRAM. Keeping execution entirely on the Ethos-U55
    (leveraging its 128-512 MAC/cycle) eliminates this 128 KB boundary overhead and
    minimizes the M7 CPU cycle usage.
