title: 'ESP32-S3 Deployment Tradeoff: TFLM LSTM vs 1D-CNN'
scenario: You need to convert and deploy a LSTM-based anomaly detection model (2 LSTM layers x 64 units, 1 FC layer, 50K params) to ESP32-S3 (240MHz, 512KB SRAM, 8MB PSRAM). TFLite Micro LSTM support depends on whether the model converts to supported fused sequence ops, requiring evaluation of all format options.
question: Should a 50K-parameter LSTM for ESP32-S3 stay in TFLM, use a custom engine, or be replaced by a 1D CNN?
details:
  realistic_solution: 'Options: (1) keep the LSTM in TFLM only if conversion produces a supported fused sequence op and measured arena use fits; (2) write a small custom kernel/runtime path only if the LSTM accuracy is essential; (3) replace it with a 1D-CNN when accuracy is comparable. Recommendation: prefer the 1D-CNN for ESP32-S3 deployment because convolution kernels are better supported and easier to optimize in TFLM/CMSIS-NN-style paths. A 50K-param INT8 LSTM has about 50-55KB of weights, not 200KB times gates again; the gates are already included in the parameter count. The LSTM risk is activation/state buffers, sequence-loop overhead, conversion support, and lower kernel efficiency. A 50K-param 1D-CNN at about 0.5 MOPs is likely a few ms on ESP32-S3 under optimized kernels and fits comfortably in SRAM.'
  common_mistake: |
    **The Pitfall:** Assuming TFLM supports all LSTM variants.
    **The Rationale:** TFLM supports UnidirectionalSequenceLSTM (the fully-fused op) but not all LSTM decompositions from some frameworks.
    **The Consequence:** The model fails to compile or run on the embedded target due to unsupported operations.
  napkin_math: |
    **Assumptions & Constraints:**
    - LSTM: 2 layers x 64 units, 1 FC layer. Input dim=20.
    - 1D-CNN equivalent: ~50K params, 0.5 MOPs.
    - ESP32-S3 clock: 240MHz.

    **Calculations:**
    - LSTM params Layer 1: (20+64)*64*4 = 21,504. Layer 2: (64+64)*64*4 = 32,768. FC: 64. Total = ~54K params (54KB INT8).
    - INT8 LSTM weights are about 54 KB; float32 weights would be about 216 KB, but not multiplied again by gates/layers because those are already in the parameter formula.
    - LSTM hidden/cell state for 2 layers: 2 layers * 2 states * 64 values * 4B float = 1 KB, or smaller if quantized; additional gate scratch and sequence buffers can dominate the arena.
    - 1D-CNN ideal compute lower bound: 0.5M ops / 240M ops/s = ~2.1 ms at 1 op/cycle; practical latency may be several ms after memory and kernel overhead.
    - LSTM sequence latency depends on timestep count and kernel support; if each timestep costs roughly 0.4 ms for the recurrent work, 50 timesteps is about 20 ms plus overhead.

    **Conclusion & Interpretation:**
    - **Result: 1D-CNN preferred for deployment simplicity and latency, while TFLM LSTM remains possible only for a supported fused op that fits the arena**. The memory issue is not double-counted weights; it is the combination of sequence buffers, state, scratch, conversion support, and recurrent execution overhead.
