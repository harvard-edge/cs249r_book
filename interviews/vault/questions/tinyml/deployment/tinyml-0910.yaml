title: 'TinyML TCO Implement: ESP32-S3 vs Cloud for TinyML Inference'
scenario: Implement the break-even analysis for ESP32-S3 (240MHz, 512KB SRAM, $5) vs cloud inference at $0.0001/inference over 2 years. The sensor makes 50 inferences/day. Include ESP32-S3 power (100μA avg, 3.3V, $0.10/kWh) and NB-IoT transmission cost if cloud is used (1KB per inference at $0.01/MB), plus a $48 two-year SIM/service cost for the cloud path.
question: How do hardware, power, cloud inference, data transmission, and SIM costs compare for ESP32-S3 versus cloud inference?
details:
  realistic_solution: 'Edge ESP32-S3 cost is hardware plus local power. Power is 100μA * 3.3V = 0.00033W; over 17,520 hours this is 5.78Wh = 0.00578kWh, costing $0.000578 at $0.10/kWh. Total edge cost is therefore about $5.0006. Cloud path cost uses one transport mode: NB-IoT. In 2 years the device makes 50*730=36,500 inferences. Cloud API cost is 36,500*$0.0001=$3.65. Data is 36,500KB=36.5MB, costing 36.5*$0.01=$0.365. Add the $48 two-year SIM/service cost, so cloud total is $52.02. Edge is about 10.4x cheaper on this model; the break-even would require either much lower cellular fixed cost or a much higher edge hardware cost.'
  common_mistake: |
    **The Pitfall:** Calculating only the direct hardware and API cloud inference costs while ignoring connectivity.
    **The Rationale:** Engineers treat the cloud as functionally "free" beside the API fee, failing to account for the fixed SIM/service charge and data tariff.
    **The Consequence:** The operational cost blows past budget boundaries because the network plan, not the API call, dominates the cloud path.
  napkin_math: |
    **Assumptions & Constraints:**
    - ESP32 Hardware: $5. Active Power: 100 µA at 3.3V. Energy: $0.10/kWh.
    - Cloud: 50 inferences/day. API: $0.0001/inf. Data: $0.01/MB. SIM: $48.

    **Calculations:**
    - Edge Energy (2yrs): 0.00033 W × 17,520 hrs = 0.00578 kWh. Cost = $0.000578.
    - Total Edge Cost: ~$5.00.
    - Cloud API (2yrs): 50 × 730 × $0.0001 = $3.65.
    - Cloud Data (2yrs): 50 KB × 730 = 36.5 MB × $0.01 = $0.365.
    - Total Cloud Cost (Cellular): $3.65 + $0.365 + $48 = $52.02.

    **Conclusion & Interpretation:**
    - **Result: >10x cheaper (Cost-Bound)**. ESP32 is >10x cheaper. The hardware and energy costs are dwarfed by the cellular data transmission and base SIM provisioning.
