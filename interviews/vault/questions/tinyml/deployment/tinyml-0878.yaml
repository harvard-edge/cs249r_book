title: TFLite Micro INT8 Quantization Parameters for Activations and Conv Weights
scenario: A firmware engineer asks about the quantization parameters stored in a TFLite INT8 model and why convolution weight tensors may use per-axis quantization while activations are usually per-tensor.
question: What scale and zero-point parameters are stored for INT8 tensors, and when are per-axis weight scales used?
details:
  realistic_solution: 'TFLite quantization metadata records a floating-point scale and an integer zero_point for quantized tensors. Activations are typically per-tensor: one scale and one zero_point for the whole activation tensor. Conv2D and depthwise-conv weights commonly use per-axis quantization along the output-channel axis, so a 64-output-channel Conv2D weight tensor has 64 scales and corresponding zero-points or implicit zero values, depending on the symmetric weight path. This is used because each output channel can have a different weight range; one tensor-wide scale would be set by the largest-range channel and would waste INT8 resolution on smaller-range channels. It is not universal for every tensor: it applies to supported weight tensors, while activations normally remain per-tensor in TFLite Micro.'
  common_mistake: |
    **The Pitfall:** Confusing per-tensor and per-channel quantization; per-tensor quantization (one scale per weight tensor) causes significant accuracy loss for depthwise convolutions where channel value ranges vary widely.
    **The Rationale:** The candidate misunderstands the architecture constraints.
    **The Consequence:** The model is deployed incorrectly or fails to meet system requirements.
  napkin_math: |
    **Assumptions & Constraints:**
    - Activation metadata: one scale plus one zero_point for the tensor.
    - Example Conv2D weight tensor: 64 output channels, 32 input channels, 3x3 kernel, INT8 weights.
    - Weight tensor size: 64 * 32 * 3 * 3 * 1 byte = 18,432 bytes.

    **Calculations:**
    - Per-axis scales: 64 * 4 bytes = 256 bytes.
    - If stored zero_points are counted at 4 bytes each, add 64 * 4 bytes = 256 bytes.
    - Conservative metadata overhead: (256 + 256) / 18,432 = 2.8%.

    **Conclusion & Interpretation:**
    - **Result: about 2.8% metadata overhead in this Conv2D example**. The small overhead buys better weight resolution per output channel, while activation tensors can still use one tensor-wide scale and zero_point.
