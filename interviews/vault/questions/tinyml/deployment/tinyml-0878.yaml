title: 'Model Format Conversion: Recall TFLite INT8 Quantization Spec for MCU'
scenario: A firmware engineer asks about the quantization parameters stored per tensor in a TFLite INT8 model and why TFLite Micro requires per-channel quantization for convolutional layers.
question: 'What are the quantization parameters stored per tensor, and why is per-channel required?'
details:
  realistic_solution: 'Per INT8 tensor, TFLite stores: (1) scale (float32, 4 bytes) and (2) zero_point (int32, 4 bytes). For per-channel quantization (required for Conv2D weights): N_channels \u00d7 8 bytes per conv weight tensor. Why required: in a depthwise conv, channel 0 weights might have range [-0.5, 0.5] while channel 63 has [-5.0, 5.0]. Per-tensor scale = 0.039 (for \u00b15.0 range) \u2192 channel 0 quantized to \u00b113 levels instead of \u00b1128 \u2192 10\u00d7 accuracy loss. Per-channel: each uses its own scale \u2192 full INT8 range.'
  common_mistake: Confusing per-tensor and per-channel quantization; per-tensor quantization (one scale per weight tensor) causes significant accuracy loss for depthwise convolutions where channel value ranges vary widely.
  napkin_math: |
    **Assumptions & Constraints:**
    - Per-tensor metadata: 1 scale (4 bytes) + 1 zero_point (4 bytes) = 8 bytes.
    - Conv2D filters: 64.
    - Weight tensor size: 64x3x3x32 = 18,432 bytes.

    **Calculations:**
    - Per-channel metadata: 64 channels * 8 bytes = 512 bytes.
    - Metadata overhead: 512 / 18,432 ≈ 2.8%.

    **Conclusion & Interpretation:**
    - **Result: 2.8% Overhead (Accuracy-Bound)**. The negligible memory overhead drastically reduces quantization error from O(range/128) to O(per-channel-range/128).
