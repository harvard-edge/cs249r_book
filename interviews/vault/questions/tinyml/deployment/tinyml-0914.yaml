title: 'TinyML TCO Optimization: Quantization Savings for TinyML Fleet'
scenario: A fleet of 5000 ESP32-S3 sensors runs a FP32 model (40ms inference, 100KB SRAM, uses external PSRAM drawing 500μA and costing $0.50/unit). You are proposing INT8 quantization (5ms inference, 25KB SRAM, no PSRAM needed). The fleet does 1 inference/30s, using 3V 2000mAh batteries, and power costs $0.10/kWh.
question: What is the battery life improvement, fleet-wide annual power savings, and is the $20K quantization engineering cost justified over 3 years?
details:
  realistic_solution: INT8 improves battery life but does not financially justify a $20K quantization project on utility and BOM savings alone. FP32 average current is 20 μA sleep plus (2.5 mA * 40 ms / 30 s) = 23.33 μA, so a 2000 mAh battery lasts about 9.8 years. INT8 average current is 20 μA plus (2.0 mA * 5 ms / 30 s) = 20.33 μA, so battery life is about 11.2 years, a 14.8% increase. Fleet energy savings are only 3 μA * 3 V * 5000 * 8760 h = 0.394 kWh/year, or about $0.04/year. Eliminating a $0.50 PSRAM chip saves $2,500 across 5000 units, so three-year quantified savings are about $2,500.12, far below the $20K engineering cost.
  common_mistake: |
    **The Pitfall:** Calculating power savings purely from the computational inference time reduction.
    **The Rationale:** Candidates laser-focus on CPU FLOP reduction while fundamentally ignoring the power consumption of external memory IO.
    **The Consequence:** They vastly underestimate energy savings and entirely miss the BOM cost drop from physically removing the PSRAM chip.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sleep current: 20 μA. Inference period: 30s (30,000ms).
    - FP32: 40ms @ 2.5mA (2mA CPU + 0.5mA PSRAM).
    - INT8: 5ms @ 2mA (No PSRAM).
    - Batteries: 3V 2000mAh. Power: $0.10/kWh. Fleet: 5000 units.
    - Removable PSRAM BOM cost: $0.50/unit.

    **Calculations:**
    - FP32 duty cycle: 40 ms / 30,000 ms = 0.001333. Average active current = 2500 μA * 0.001333 = 3.33 μA. Total average current = 20 + 3.33 = 23.33 μA.
    - INT8 duty cycle: 5 ms / 30,000 ms = 0.000167. Average active current = 2000 μA * 0.000167 = 0.33 μA. Total average current = 20 + 0.33 = 20.33 μA.
    - Battery life: FP32 = 2000 mAh / 0.02333 mA = 85,714 h = 9.79 years; INT8 = 2000 mAh / 0.02033 mA = 98,361 h = 11.23 years.
    - Battery improvement: (11.23 - 9.79) / 9.79 = 14.8%.
    - Fleet power savings: 3.0 μA * 3V = 9 μW/unit; 9 μW * 5000 = 45 mW fleet; 0.045 W * 8760 h = 394 Wh/year = 0.394 kWh/year = ~$0.04/year.
    - BOM Savings: PSRAM elimination (~$0.50/unit * 5000) = $2,500.
    - Three-year quantified savings: $2,500 + 3 * $0.04 = $2,500.12.

    **Conclusion & Interpretation:**
    - **Result: 14.8% longer battery life, $0.04/year fleet utility savings, and ~$2.5K BOM savings (Unjustified Expense).** The quantified three-year return does not justify the $20K engineering cost.
