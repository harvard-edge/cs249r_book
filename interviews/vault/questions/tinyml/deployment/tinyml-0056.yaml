title: BLE Throughput for Model Update
scenario: >
  Your TinyML wearable needs an OTA model update via BLE 5.0 for a 150 KB model.
  BLE 5.0 has a ~1.4 Mbps max throughput. The wearable has a 100 mAh battery, and the radio draws 8 mA.
question: How long and how much battery does a 150 KB BLE 5.0 model update cost on a 100 mAh wearable?
details:
  realistic_solution: |
    BLE data transfer is constrained by connection intervals, MTU size, and the number of packets per connection event, resulting in a real-world throughput much lower than the PHY rate. For a 150 KB model, the update combines BLE transfer time with flash erase/write time.
  common_mistake: |
    **The Pitfall:** Calculating "150 KB at 1.4 Mbps = 0.86 seconds. Trivial."
    **The Rationale:** This uses raw PHY throughput and ignores BLE's connection protocol overhead and flash write time.
    **The Consequence:** The team drastically underestimates update latency and resulting battery drain.
  napkin_math: |
    **Assumptions & Constraints:**
    - 150 KB model. 100 mAh battery. Radio: 8 mA active.
    - Effective BLE throughput: ~65 KB/s.

    **Calculations:**
    - BLE Transfer: 150 KB / 65 KB/s = 2.3s.
    - Flash Erase: 38 sectors * 50ms = 1.9s.
    - Write/Verify: 0.15s + 0.2s = 0.35s.
    - Total Time: 2.3s + 1.9s + 0.35s = 4.55s.
    - Battery Cost: 8 mA * (4.55s / 3600s/hr) = ~0.01 mAh (0.01%).

    **Conclusion & Interpretation:**
    - **Result: Flash-Erase-Bound**. Protocol overhead and flash erases dominate transfer time.
