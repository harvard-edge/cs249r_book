title: BLE Throughput for Model Update
scenario: |
  Your TinyML wearable needs an OTA model update via BLE 5.0 for a 150 KB model. BLE 5.0 has a ~1.4 Mbps PHY rate, but after connection interval, MTU, and packet overhead your measured application throughput is about 65 KB/s. The wearable has a 100 mAh battery, the radio draws 8 mA while connected, and flash erase uses 4 KB sectors at about 50 ms per sector.
question: How long and how much battery does a 150 KB BLE 5.0 model update cost on a 100 mAh wearable?
details:
  realistic_solution: |
    BLE update time should be estimated from delivered application throughput, not the raw PHY rate. At about 65 KB/s, the 150 KB transfer takes roughly 2.3 seconds, and flash erase/write/verify adds another couple of seconds. The battery cost is small but measurable: about 0.010 mAh, or about 0.010% of a 100 mAh battery.
  common_mistake: |
    **The Pitfall:** Calculating "150 KB at 1.4 Mbps = 0.86 seconds. Trivial."
    **The Rationale:** This uses raw PHY throughput and ignores BLE's connection protocol overhead and flash write time.
    **The Consequence:** The team drastically underestimates update latency and resulting battery drain.
  napkin_math: |
    **Assumptions & Constraints:**
    - 150 KB model. 100 mAh battery. Radio: 8 mA active.
    - Effective BLE throughput: ~65 KB/s.
    - Flash erase: 4 KB sectors, 50 ms per sector.

    **Calculations:**
    - BLE Transfer: 150 KB / 65 KB/s = 2.3s.
    - Flash Erase: ceil(150 KB / 4 KB) = 38 sectors; 38 * 50ms = 1.9s.
    - Write/Verify: 0.15s + 0.2s = 0.35s.
    - Total Time: 2.3s + 1.9s + 0.35s = 4.55s.
    - Battery Cost: 8 mA * (4.55s / 3600s/hr) = 0.0101 mAh.
    - Battery Percent: 0.0101 mAh / 100 mAh * 100 = 0.0101%.

    **Conclusion & Interpretation:**
    - **Result: ~4.6 seconds and ~0.010% battery**. Protocol overhead lowers BLE throughput far below the PHY rate, and flash erase time is a major part of the update latency.
