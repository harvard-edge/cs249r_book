title: TFLM Ethos-U55 Delegate vs Manual CMSIS-NN Offload
scenario: 'A 500K parameter INT8 CNN (2.5 MOPs) runs on Cortex-M7+Ethos-U55. You must compare two deployment approaches: (A) TFLite Micro with Ethos-U55 delegate vs. (B) CMSIS-NN kernels with manual Ethos offload using the Ethos-U55 driver.'
question: Should a 500K-parameter INT8 CNN use TFLM with Ethos-U55 delegate or manual CMSIS-NN and Ethos offload?
details:
  realistic_solution: Prefer TFLM with the Ethos-U55 delegate unless the product has a hard sub-millisecond latency requirement and enough engineering budget for a custom path. The raw NPU compute for 2.5 MOPs at 0.5 TOPS is only about 5 us, so latency will usually be dominated by delegate setup, graph partitioning, DMA, and memory movement rather than multiply throughput. If measured delegate overhead is around 1 ms and a hand-scheduled CMSIS-NN plus Ethos driver path can reduce that overhead to about 0.1 ms, manual offload may be much faster for this small graph. Those numbers are platform-dependent, so the release decision should be based on measured end-to-end latency and validation cost. Under typical <10 ms TinyML deadlines, the delegate is the better deployment choice; manual offload is justified only when the measured delegate overhead violates the requirement.
  common_mistake: |
    **The Pitfall:** Assuming TFLM Ethos delegate achieves the same performance as manual CMSIS-NN + Ethos offload.
    **The Rationale:** The delegate adds op-by-op dispatch overhead that manual pipelines avoid.
    **The Consequence:** Candidates miscalculate the expected inference latency by ignoring this dispatch overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - CNN: 500K INT8 params, 2.5 MOPs. NPU: 0.5 TOPS.
    - Overhead numbers are illustrative and must be measured on the target.

    **Calculations:**
    - NPU compute: 2.5M / 500G = 5 us (0.005 ms).
    - Example TFLM delegate path: 1.0 ms overhead + 0.005 ms compute = 1.005 ms, before any extra DMA stalls.
    - Example manual driver path: 0.1 ms overhead + 0.005 ms compute = 0.105 ms, before any extra DMA stalls.
    - The apparent 9.6x speedup is an overhead-model result, not a guaranteed hardware result.

    **Conclusion & Interpretation:**
    - **Result: delegate first, measure, then hand-offload only if overhead violates the latency target.** Manual offload can be much faster in a dispatch-dominated small model, but the 10x figure is only an illustrative upper estimate.
