title: TFLM Ethos-U55 Delegate vs Manual CMSIS-NN Offload
scenario: 'A 500K parameter INT8 CNN (2.5 MOPs) runs on Cortex-M7+Ethos-U55. You must compare two deployment approaches: (A) TFLite Micro with Ethos-U55 delegate vs. (B) CMSIS-NN kernels with manual Ethos offload using the Ethos-U55 driver.'
question: Should a 500K-parameter INT8 CNN use TFLM with Ethos-U55 delegate or manual CMSIS-NN and Ethos offload?
details:
  realistic_solution: Prefer TFLM with the Ethos-U55 delegate unless the product has a hard sub-millisecond latency requirement and enough engineering budget for a custom path. With Vela grouping the graph into about five supported delegate regions, NPU compute is about 5us and dispatch overhead is about 1.0ms total, for roughly 1.005ms. A manual CMSIS-NN plus Ethos driver path can reduce overhead to about 0.1ms, for roughly 0.105ms total, but costs substantially more development and validation time. Under typical <10ms TinyML deadlines, the delegate is the better deployment choice; manual offload is justified only when the measured delegate overhead violates the requirement.
  common_mistake: |
    **The Pitfall:** Assuming TFLM Ethos delegate achieves the same performance as manual CMSIS-NN + Ethos offload.
    **The Rationale:** The delegate adds op-by-op dispatch overhead that manual pipelines avoid.
    **The Consequence:** Candidates miscalculate the expected inference latency by ignoring this dispatch overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - CNN: 500K INT8 params, 2.5 MOPs. NPU: 0.5 TOPS.
    - TFLM dispatch overhead: 0.2ms per op (5 ops).

    **Calculations:**
    - NPU compute: 2.5M / 500G = 5 us (0.005 ms).
    - TFLM overhead: 5 * 0.2 ms = 1.0 ms. Total TFLM: 1.005 ms.
    - Manual driver overhead: 0.1 ms. Total manual: 0.105 ms.
    - Speedup: ~9.6x.

    **Conclusion & Interpretation:**
    - **Result: 1.005 ms vs 0.105 ms (dispatch-overhead bound)**. Manual offload is about 10x faster in this simplified estimate, but TFLM with the Ethos-U55 delegate is preferred unless the latency target is below what the delegate can meet.
