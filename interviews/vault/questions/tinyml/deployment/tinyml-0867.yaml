title: TFLM Ethos-U55 Delegate vs Manual CMSIS-NN Offload
scenario: 'A 500K parameter INT8 CNN (2.5 MOPs) runs on Cortex-M7+Ethos-U55. You must compare two deployment approaches: (A) TFLite Micro with Ethos-U55 delegate vs. (B) CMSIS-NN kernels with manual Ethos offload using the Ethos-U55 driver.'
question: Should a 500K-parameter INT8 CNN use TFLM with Ethos-U55 delegate or manual CMSIS-NN and Ethos offload?
details:
  realistic_solution: For this small CNN, choose the manual CMSIS-NN plus Ethos driver path if measurements match the stated overhead model. The raw NPU compute for 2.5 MOPs at 0.5 TOPS is only about 5 us, so latency is dominated by delegate setup, graph partitioning, DMA, and memory movement rather than multiply throughput. If measured delegate overhead is around 1 ms and a hand-scheduled path can reduce that overhead to about 0.1 ms, manual offload is roughly 10x faster for this graph. TFLM with the Ethos-U55 delegate remains the better default when engineering simplicity, portability, and validation cost matter more than sub-millisecond latency, or when measured end-to-end delegate latency already meets the product target.
  common_mistake: |
    **The Pitfall:** Assuming TFLM Ethos delegate achieves the same performance as manual CMSIS-NN + Ethos offload.
    **The Rationale:** The delegate adds op-by-op dispatch overhead that manual pipelines avoid.
    **The Consequence:** Candidates miscalculate the expected inference latency by ignoring this dispatch overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - CNN: 500K INT8 params, 2.5 MOPs. NPU: 0.5 TOPS.
    - Overhead numbers are illustrative and must be measured on the target.

    **Calculations:**
    - NPU compute: 2.5M / 500G = 5 us (0.005 ms).
    - Example TFLM delegate path: 1.0 ms overhead + 0.005 ms compute = 1.005 ms, before any extra DMA stalls.
    - Example manual driver path: 0.1 ms overhead + 0.005 ms compute = 0.105 ms, before any extra DMA stalls.
    - The apparent 9.6x speedup is an overhead-model result, not a guaranteed hardware result.

    **Conclusion & Interpretation:**
    - **Result: manual offload is likely faster for this dispatch-dominated small graph under the stated overheads.** Use the TFLM delegate only if measured end-to-end latency meets target and its simpler deployment path is worth the overhead.
