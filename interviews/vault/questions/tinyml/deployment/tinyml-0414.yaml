title: Bootloader A/B Partition Sizing
scenario: You're designing the flash layout for an nRF5340 that runs a keyword spotting model and receives OTA updates over BLE.
question: How should model size and runtime requirements shape the A/B OTA flash layout, and why do delta model updates help?
details:
  realistic_solution: In TinyML, the model weights (e.g., 180 KB) often dwarf the application code (90 KB) and the TFLite Micro runtime (25 KB), so the OTA layout should avoid treating the model as an inseparable part of the firmware image. A naive A/B layout needs two full 295 KB slots for firmware plus model. A better layout keeps the 115 KB OS/runtime firmware in A/B slots and stores the model in an independently updatable region with room for a small delta patch. Delta model updates help because changing model weights does not require downloading or staging a second full copy of the OS/runtime and model image.
  common_mistake: |
    **The Pitfall:** Assuming a naive 50/50 flash split (512 KB per slot) is required.
    **The Rationale:** Candidates treat the ML model as an inseparable part of the OS, ignoring that models are often the largest firmware component.
    **The Consequence:** Wasting massive amounts of flash memory by copying the entire OS and runtime for every small model update.
  napkin_math: |
    **Assumptions & Constraints:**
    - OS: 90 KB, Runtime: 25 KB, Model: 180 KB.
    - Decoupled delta updates keep the 115 KB firmware separate from the 180 KB model.

    **Calculations:**
    - Full image size: 90 + 25 + 180 = 295 KB.
    - Naive A/B layout: 295 KB active slot + 295 KB staging slot = 590 KB.
    - Decoupled layout: Firmware A (115 KB) + Firmware B (115 KB) + Model region (180 KB) + Model patch staging (32 KB) = 442 KB.
    - Flash Saved: 590 - 442 = 148 KB.

    **Conclusion & Interpretation:**
    - **Result: 148 KB saved.** Decoupling the model lets OTA updates stage only firmware or a compact model delta instead of duplicating the entire firmware-plus-model image.
