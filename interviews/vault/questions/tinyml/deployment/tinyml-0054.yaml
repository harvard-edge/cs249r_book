title: Model Versioning on MCU
scenario: You manage a fleet of 500 RP2040 environmental sensors. After three OTA updates, the support team cannot differentiate which model version a device is running. A customer reports false alarms, and you must verify if they are on model v1.2 or v1.4.
question: How can a fleet of RP2040 sensors expose ML model versions remotely without an underlying OS or filesystem?
details:
  realistic_solution: Prepend a 64-byte structured header to the model binary in flash containing magic bytes, semver string, SHA-256 weight hash, and tensor specs. At boot, the firmware reads and validates this header. For remote queries, the device exposes the version string via a BLE GATT characteristic, allowing the fleet management gateway to aggregate reports and flag mismatches without relying on a filesystem.
  common_mistake: |
    **The Pitfall:** Hardcoding model versions as global firmware variables.
    **The Rationale:** Candidates assume model versions can be tracked identically to firmware versions via C-code constants compiled into the binary.
    **The Consequence:** This tight-couples the ML model to the firmware lifecycle. Updating the model binary dynamically without a full firmware re-flash leaves the hardcoded version string stale, destroying observability.
  napkin_math: |
    **Assumptions & Constraints:**
    - 64-byte metadata header per model.
    - RP2040 (133 MHz) reading from 2 MB SPI flash.
    - BLE version query payload is 20 bytes.

    **Calculations:**
    - Flash Overhead: 64 bytes / 2,097,152 bytes = 0.003%.
    - Boot Validation: 64 bytes read (32 cycles) + CRC of 114 KB model (342,000 cycles) = 342,032 cycles.
    - Boot Time: 342,032 cycles / 133,000,000 Hz = ~2.6 ms.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound Initialization**. The 64-byte structural header securely decouples model versions from firmware updates while adding negligible flash overhead and <3 ms boot latency.
