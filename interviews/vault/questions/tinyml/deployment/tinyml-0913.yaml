title: 'TinyML TCO Mastery: 10-Year TinyML Infrastructure for Smart City'
scenario: 'Build a 10-year TCO model for a smart city deploying 100,000 TinyML sensors (mix: 60% Cortex-M4 for simple tasks, 30% ESP32-S3 for WiFi tasks, 10% Cortex-M7+Ethos-U55 for complex AI). Unit costs: M4=$3, ESP32=$5, M7+Ethos=$12. Average power: 50µA, 100µA, 200µA at 3V ($0.10/kWh). All use LoRaWAN ($0.05/device/month). Model maintenance is $100K/yr. Hardware refresh at year 5.'
question: 'How would you calculate the 10-year Net Present Value (NPV) at a 6% discount rate for this sensor fleet?'
details:
  realistic_solution: 'HW (year 0): 60K*$3+30K*$5+10K*$12=$180K+$150K+$120K=$450K. Annual LoRa: 100K*$0.05*12=$60K/yr. Annual power: 60K*50μA*3V*8760*$0.10/1000+30K*100μA*3V*8760*$0.10/1000+10K*200μA*3V*8760*$0.10/1000=60K*$0.0001314+30K*$0.0002628+10K*$0.0005256=$7.88+$7.88+$5.26=$21.02/yr. Model dev+maint: $100K/yr. HW refresh (year 5): $450K. Annual cost: $60K+$0.021K+$100K=$160K/yr. NPV: Y0=$450K. Y1-10 annual: $160K. NPV_ops=$160K*(1-(1.06)^-10)/0.06=$160K*7.36=$1,177.6K. Y5 refresh=$450K/1.06^5=$450K/1.338=$336.3K. Total NPV=$450K+$1,177.6K+$336.3K=$1,963.9K≈$1.96M.'
  common_mistake: |
    **The Pitfall:** Omitting the Year 5 hardware refresh or failing to discount its CapEx.
    **The Rationale:** Candidates often apply NPV only to recurring operational costs and forget that embedded hardware requires periodic replacement.
    **The Consequence:** The calculated TCO is severely underestimated, leading to budget shortfalls halfway through the project lifecycle.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware Year 0: $450K.
    - Annual Opex (LoRa + Maintenance): $160K/yr.
    - Year 5 Hardware Refresh: $450K.
    - Discount rate is 6% (10-yr factor ≈ 7.36).

    **Calculations:**
    - NPV Opex (10yr): $160K * 7.36 = $1,178K.
    - NPV Year 5 Refresh: $450K / (1.06^5) = $336K.
    - Total 10-year NPV: $450K + $1,178K + $336K.

    **Conclusion & Interpretation:**
    - **Result: $1.96M (Budget-Bound)**. Calculating NPV strictly exposes that a 10-year sensor fleet costs roughly $2M when accounting for hardware replacement and LoRa overhead.
