title: On-Device Vibration Anomaly Detection for Motor Bearings
scenario: You're deploying 500 vibration sensors on industrial motors for predictive maintenance. Each sensor has a Cortex-M4F with a 3-axis accelerometer sampling at 3.2 kHz. The system must detect bearing faults with <1% false positive rate and <5% false negative rate. The models must run entirely on-device without cloud dependency.
question: How would you design the anomaly detection pipeline, including feature extraction, model architecture, and the threshold calibration strategy?
details:
  realistic_solution: 'Hybrid anomaly-detection pipeline: (1) Feature extraction: for each 1-second window, process 3 axes * 3,200 samples with CMSIS-DSP FFTs and derive compact features such as band-energy ratios, spectral kurtosis, crest factor, and envelope-spectrum peaks. (2) Anomaly model: feed a small feature vector into a one-class model, isolation-style scorer, or tiny autoencoder that returns an anomaly score instead of named fault classes. (3) Threshold calibration: collect a healthy baseline per motor, set the threshold from validation score percentiles to keep false positives below 1%, then check labeled fault data to keep false negatives below 5%. Update baselines slowly with EWMA drift while excluding high-score windows so real degradation is not learned away.'
  common_mistake: |
    **The Pitfall:** Training a CNN directly on raw accelerometer data.
    **The Rationale:** Candidates rely on end-to-end deep learning instead of computationally cheaper DSP feature extraction, applying cloud paradigms to the edge.
    **The Consequence:** The CNN requires a massive input layer, wasting compute and memory, and draining the battery prematurely.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input: 3-axis accelerometer at 3.2 kHz (1 s window = 3,200 samples per axis).
    - Hardware: Cortex-M4F with CMSIS-DSP.
    - Battery: AA lithium (3,000 mAh, 1.5V).

    **Calculations:**
    - Active Pipeline: 3 axes * 3.2 ms = 9.6 ms (FFT) + 1.4 ms (features) + 1.0 ms (anomaly model) = 12.0 ms.
    - CPU Utilization: 12.0 ms per 1 s window = 1.2% active duty cycle.
    - Average Power: (0.012 * 30 mW) + (0.988 * 0.5 mW) = 0.854 mW.
    - Battery Energy: 3000 mAh * 1.5 V = 4.5 Wh = 4500 mWh.
    - Battery Life: 4500 mWh / 0.854 mW = 5,269 hours = 219 days.

    **Conclusion & Interpretation:**
    - **Result: Power-Bound**. Feature extraction dominates the compute budget, and the exact lifetime depends on the chosen duty cycle and battery assumptions; the calculation shows the design choices are tied to the 1-second, 3.2 kHz on-device pipeline.
