title: On-Device Anomaly Detection System
scenario: You're deploying 500 vibration sensors on industrial motors for predictive maintenance. Each sensor has a Cortex-M4F with a 3-axis accelerometer sampling at 3.2 kHz. The system must detect bearing faults with <1% false positive rate and <5% false negative rate. The models must run entirely on-device without cloud dependency.
question: How would you design the anomaly detection pipeline, including feature extraction, model architecture, and the threshold calibration strategy?
details:
  realistic_solution: 'Hybrid pipeline: (1) Feature extraction — 3x 1600-point FFT (CMSIS-DSP) per 1-second window extracts frequency-domain features in 6ms. Compute spectral kurtosis, envelope spectrum peaks, and band energy ratios in 1ms. (2) ML classifier — a 2-layer fully-connected network (512 input features, 64 hidden, 4 fault classes) at 2 KB weights, runs in 6 microseconds. Total: 7ms per window, 0.7% CPU utilization. (3) Threshold calibration — per-motor baseline during healthy operation, exponentially-weighted moving average for drift compensation. False positive rate <1% via per-motor thresholds rather than global thresholds.'
  common_mistake: |
    **The Pitfall:** Training a CNN directly on raw accelerometer data.
    **The Rationale:** Candidates rely on end-to-end deep learning instead of computationally cheaper DSP feature extraction, applying cloud paradigms to the edge.
    **The Consequence:** The CNN requires a massive input layer, wasting compute and memory, and draining the battery prematurely.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input: 3-axis accelerometer at 3.2 kHz (320ms window = 1,024 points).
    - Hardware: Cortex-M4F with CMSIS-DSP.
    - Battery: AA lithium (3,000 mAh, 1.5V).

    **Calculations:**
    - Active Pipeline: 3 axes * 2ms = 6ms (FFT) + 1ms (Features) + 0.006ms (ML) = ~7ms.
    - CPU Utilization: 7ms per 1s window = 0.7% active duty cycle.
    - Average Power: (0.007 * 30 mW) + (0.993 * 0.5 mW) = 0.706 mW.
    - Battery Life: (3000 mAh * 1.5V = 4.5 Wh) / 0.706 mW = 6,373 hours = 265 days.

    **Conclusion & Interpretation:**
    - **Result: Power-Bound**. Feature extraction dominates the compute budget, but aggressive duty cycling achieves a ~265-day battery life.
