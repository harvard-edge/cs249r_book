title: On-Device Vibration Anomaly Detection for Motor Bearings
scenario: You're deploying 500 vibration sensors on industrial motors for predictive maintenance. Each sensor has a Cortex-M4F with a 3-axis accelerometer sampling at 3.2 kHz. The system must detect bearing faults with <1% false positive rate and <5% false negative rate. The models must run entirely on-device without cloud dependency.
question: How would you design the anomaly detection pipeline, including feature extraction, model architecture, and the threshold calibration strategy?
details:
  realistic_solution: 'Hybrid anomaly-detection pipeline: (1) Feature extraction: 3x 1600-point FFT (CMSIS-DSP) per 1-second window extracts frequency-domain features in 6 ms. Compute spectral kurtosis, envelope-spectrum peaks, and band-energy ratios in 1 ms. (2) Anomaly model: a small one-class model or tiny autoencoder maps the 512 feature vector to an anomaly score rather than predicting named fault classes. The model is trained mostly on healthy motor data and runs in about 0.006 ms. (3) Threshold calibration: collect a healthy baseline per motor, set the anomaly threshold from the validation score distribution to keep false positives below 1%, and update the baseline slowly with an EWMA drift term while excluding high-score windows. The operating point is then tuned on labeled fault examples to keep false negatives below 5%.'
  common_mistake: |
    **The Pitfall:** Training a CNN directly on raw accelerometer data.
    **The Rationale:** Candidates rely on end-to-end deep learning instead of computationally cheaper DSP feature extraction, applying cloud paradigms to the edge.
    **The Consequence:** The CNN requires a massive input layer, wasting compute and memory, and draining the battery prematurely.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input: 3-axis accelerometer at 3.2 kHz (buffer to 1s window = 3,200 points).
    - Hardware: Cortex-M4F with CMSIS-DSP.
    - Battery: AA lithium (3,000 mAh, 1.5V).

    **Calculations:**
    - Active Pipeline: 3 axes * 2 ms = 6 ms (FFT) + 1 ms (features) + 0.006 ms (anomaly model) = 7.006 ms.
    - CPU Utilization: 7.006 ms per 1 s window = 0.7006% active duty cycle.
    - Average Power: (0.007006 * 30 mW) + (0.992994 * 0.5 mW) = 0.7067 mW.
    - Battery Energy: 3000 mAh * 1.5 V = 4.5 Wh = 4500 mWh.
    - Battery Life: 4500 mWh / 0.7067 mW = 6,367 hours = 265 days.

    **Conclusion & Interpretation:**
    - **Result: Power-Bound**. Feature extraction dominates the compute budget, but the anomaly-scoring pipeline still supports about 265 days of operation.
