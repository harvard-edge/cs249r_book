title: 'TFLM Memory Planning: Compute Activation Arena Size for a 3-Layer INT8 CNN'
scenario: A 3-layer CNN on a Cortex-M4 processes a 32x32x1 input. The intermediate layer outputs are 30x30x8, 28x28x16, and 26x26x32 (all INT8).
question: What minimum activation/scratch arena is needed, excluding model weights and persistent tensors?
details:
  realistic_solution: 'TFLM memory planning: model weights and persistent tensors are accounted separately; this answer sizes only the activation/scratch arena. Layer N can free layer N-1 output once layer N is computed, so peak activation memory is the maximum simultaneous pair of adjacent tensors. The L2-to-L3 transition needs L2 output (28x28x16 = 12,544 B) and L3 output (26x26x32 = 21,632 B) simultaneously, for 34,176 B, about 33.4 KiB. Add about 2 KiB for planner metadata and scratch alignment, so reserve roughly 36 KiB. The input tensor is not added to that peak if the planner can release or reuse it before the L2-to-L3 transition.'
  common_mistake: |
    **The Pitfall:** Summing all layer activations together (e.g., L1 + L2 + L3).
    **The Rationale:** Candidates forget that TFLite Micro reuses memory buffers for non-overlapping layers sequentially.
    **The Consequence:** The calculated arena is massively oversized, potentially causing the model to be falsely rejected for not fitting in SRAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - TFLite Micro memory planner reuses activation buffers sequentially.
    - Model weights and persistent tensors are excluded from this activation/scratch arena estimate.
    - Peak memory is determined by the maximum simultaneous requirement of `Layer(N-1)_Output + Layer(N)_Output`.
    - Data type: INT8 (1 byte per element).

    **Calculations:**
    - L1 Output: 30 * 30 * 8 = 7,200 B.
    - L2 Output: 28 * 28 * 16 = 12,544 B.
    - L3 Output: 26 * 26 * 32 = 21,632 B.
    - L1 to L2 transition peak: 7,200 B + 12,544 B = 19,744 B.
    - L2 to L3 transition peak: 12,544 B + 21,632 B = 34,176 B.
    - TFLM Overhead: ~2 KB for scratch alignment and planner metadata.
    - Total: 34,176 B + 2,048 B ≈ 36.2 KB.

    **Conclusion & Interpretation:**
    - **Result: reserve about 36 KB for the activation/scratch arena, excluding weights and persistent tensors.** The peak live activation pair is 34,176 B and is dominated by the L2-to-L3 transition.
