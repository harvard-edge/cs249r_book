title: 'TFLM Memory Planning: Compute Activation Arena Size for a 3-Layer INT8 CNN'
scenario: A 3-layer CNN on a Cortex-M4 processes a 32x32x1 input. The intermediate layer outputs are 30x30x8, 28x28x16, and 26x26x32 (all INT8).
question: What minimum activation/scratch arena is needed, excluding model weights and persistent tensors?
details:
  realistic_solution: 'TFLM memory planning: model weights and persistent tensors are accounted separately; this answer sizes only the activation/scratch arena. Include the resident input tensor when checking the first transition: input 32x32x1 = 1,024 B plus L1 output 7,200 B gives 8,224 B. Later layers can reuse buffers, so the peak live activation pair is L2 output (28x28x16 = 12,544 B) plus L3 output (26x26x32 = 21,632 B), for 34,176 B, about 33.4 KiB. Reserve at least that much for live activations, then add any implementation-specific scratch/alignment margin measured from the TFLM allocator.'
  common_mistake: |
    **The Pitfall:** Summing all layer activations together (e.g., L1 + L2 + L3).
    **The Rationale:** Candidates forget that TFLite Micro reuses memory buffers for non-overlapping layers sequentially.
    **The Consequence:** The calculated arena is massively oversized, potentially causing the model to be falsely rejected for not fitting in SRAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - TFLite Micro memory planner reuses activation buffers sequentially.
    - Model weights and persistent tensors are excluded from this activation/scratch arena estimate.
    - Peak memory is determined by the maximum simultaneous requirement of input/output or adjacent layer outputs.
    - Data type: INT8 (1 byte per element).

    **Calculations:**
    - Input Tensor: 32 * 32 * 1 = 1,024 B.
    - L1 Output: 30 * 30 * 8 = 7,200 B.
    - L2 Output: 28 * 28 * 16 = 12,544 B.
    - L3 Output: 26 * 26 * 32 = 21,632 B.
    - Input to L1 transition peak: 1,024 B + 7,200 B = 8,224 B.
    - L1 to L2 transition peak: 7,200 B + 12,544 B = 19,744 B.
    - L2 to L3 transition peak: 12,544 B + 21,632 B = 34,176 B.

    **Conclusion & Interpretation:**
    - **Result: reserve at least 34,176 B (~33.4 KiB) for live activations, excluding weights and persistent tensors.** Add measured TFLM scratch/alignment margin separately; the peak is dominated by the L2-to-L3 transition.
