title: Hardware-in-the-Loop Testing
scenario: Your CI pipeline tests ML models in simulation (x86 QEMU), but models fail on real hardware. You have 5 hardware variants. Design a hardware-in-the-loop (HIL) CI system.
question: How many HIL boards test 5 Cortex-M variants in CI, and what wall time does each commit need?
details:
  realistic_solution: 'Build a parallel HIL farm with 2 boards per hardware variant: 5 variants x 2 boards = 10 boards total. If each board station costs about $94 including the board, debugger, relay/power control, cabling, and fixture, the farm costs about $940. Per board, the commit pipeline is flash firmware (60s), run smoke test (5s), then execute inference and validate output (2s). Because all variants run in parallel, wall time is the longest per-board path: 60 + 5 + 2 = 67s per commit. At 20 commits/day, that is 20 x 67s = 1,340s, or about 22 minutes of occupied farm time per day, leaving enough idle time for retries and nightly extended tests.'
  common_mistake: |
    **The Pitfall:** Buying one of each board and running tests sequentially.
    **The Rationale:** Sequential execution makes the CI feedback loop 10-15 minutes per commit.
    **The Consequence:** Developers will skip HIL tests or ignore failures because the feedback loop is too slow.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 5 hardware variants.
       - 2 boards per variant for redundancy and parallel CI capacity.
       - Per station cost: about $94.
       - Per-board test path: 60s flash + 5s smoke test + 2s inference/output validation.
    2. **Calculations:**
       - Boards needed = 5 variants * 2 boards/variant = 10 boards.
       - Farm cost = 10 * $94 = $940.
       - Sequential per-board path = 60 + 5 + 2 = 67 seconds.
       - Parallel wall time across variants = max(67s per board path) = 67 seconds.
       - 20 commits/day = 20 * 67s = 1,340s = 22.3 minutes/day.
    3. **Conclusion & Interpretation:**
       - **Result: 10 boards, 67s per commit**. The farm is flash/fixture time bound, but parallel variant coverage keeps CI feedback near one minute.
