title: TFLite Micro vs AOT Compilation on nRF5340
scenario: >
  Your team is deploying an anomaly detection model on a Nordic nRF5340 with an active current budget of ~5mA. You must evaluate converting the ONNX model to TFLite and using the TFLite Micro (TFLM) interpreter versus using an Ahead-Of-Time (AOT) compiler to generate static C code directly from the ONNX graph.
question: How do TFLite Micro and AOT compilation compare regarding SRAM footprint, operator support, and runtime overhead on the nRF5340?
details:
  realistic_solution: >
    Advocate for AOT compilation (e.g., using TVM or microTVM). TFLM introduces fixed SRAM overhead for the micro-interpreter and dynamic tensor arena allocation. AOT compilation strips the interpreter, statically allocates memory, avoiding ONNX-to-TFLite conversion bugs, saving SRAM and CPU cycles, lowering active time, and preserving the 5mA budget.
  common_mistake: |
    **The Pitfall:** Blindly recommending TFLite Micro because it is the industry standard.
    **The Rationale:** Candidates often default to TFLM without realizing that its micro-interpreter and dynamic tensor arena introduce fixed SRAM overheads that are highly detrimental on a 256 KB device.
    **The Consequence:** The TFLM interpreter consumes ~30 KB of critical SRAM, leaving dangerously tight margins for the RTOS and potentially causing out-of-memory crashes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total SRAM: 256 KB. System Overhead (Zephyr RTOS + BLE 5.3): 64 KB.
       - Remaining App SRAM: 192 KB.
       - Model Activations: 140 KB. TFLM Overhead: 30 KB.
    2. **Calculations:**
       - TFLM Overhead (Alternative A): 140 KB + 30 KB = 170 KB. Remaining = 192 KB - 170 KB = 22 KB.
       - AOT Compilation (Alternative B): 140 KB + 0 KB = 140 KB. Remaining = 192 KB - 140 KB = 52 KB.
    3. **Conclusion & Interpretation:**
       - **Result: AOT compilation saves ~30 KB of SRAM.** Stripping out the dynamic interpreter provides a safer memory margin and lowers active time. **Bottleneck: SRAM Capacity.**
