title: Ethos-U55 TFLM and Vela Deployment for MobileNetV1 Person Detection
scenario: You are deploying a person detection model (MobileNetV1-0.25, 475K INT8 params, 14.9 MOPs, 28x28 input) on Cortex-M7+Ethos-U55 (480MHz, 512KB SRAM, NPU).
question: Does the full conversion pipeline's memory layout meet a 50ms latency budget on a battery-powered device?
details:
  realistic_solution: Compile using Vela targeting ethos-u55-256. Execute weights directly from Flash to prevent SRAM spilling, keeping only the 120KB activation arena in SRAM.
  common_mistake: |
    **The Pitfall:** Running the Vela compiler with default settings.
    **The Rationale:** Failing to specify the Ethos-U55 system configuration (memory bandwidth, SRAM size) for the specific target hardware.
    **The Consequence:** Producing a suboptimal NPU schedule that causes memory spilling and misses latency budgets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M7 + Ethos-U55 (500 GOPS).
    - SRAM: 512 KB, Flash: >540 KB.
    - MobileNetV1-0.25 INT8: 475K params, 14.9 MOPs.

    **Calculations:**
    - Weights memory: 475 KB (Keep in Flash).
    - Activation arena memory: ~120 KB + 30 KB TFLM runtime = 150 KB (SRAM).
    - Ideal NPU compute time: 14.9M ops / 500G ops/s = 0.0000298 s = 0.0298 ms = 29.8 µs.
    - If delegate/runtime overhead is assumed to be 1 ms, total time ≈ 1.0 ms + 0.0298 ms = 1.03 ms.

    **Conclusion & Interpretation:**
    - **Result: about 1.03 ms latency with the stated overhead, and the SRAM arena fits**. The system is viable for a 50 ms budget; keeping weights in Flash avoids unnecessary SRAM pressure but the final configuration is not OOM-bound.
