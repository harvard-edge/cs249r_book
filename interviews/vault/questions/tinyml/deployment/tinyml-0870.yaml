title: Ethos-U55 TFLM and Vela Deployment for MobileNetV1 Person Detection
scenario: You are deploying a person detection model (MobileNetV1-0.25, 475K INT8 params, 14.9 MOPs, 28x28 input) on Cortex-M7+Ethos-U55 (480MHz, 512KB SRAM, NPU).
question: Does the full conversion pipeline's memory layout meet a 50ms latency budget on a battery-powered device?
details:
  realistic_solution: Compile using Vela targeting ethos-u55-256 and inspect the generated memory plan. The layout fits if the 475KB INT8 weights remain in Flash and the SRAM-resident activation arena plus TFLM metadata stays near 150KB, well under 512KB. The 14.9M-op model has an ideal NPU compute floor of only about 0.03ms at 500 GOPS, leaving almost the entire 50ms budget for DMA, Flash reads, delegate setup, and scheduling. The provided numbers prove SRAM fit and show large compute headroom, but final 50ms compliance still requires the Vela report or board measurement to confirm there are no Flash-bandwidth stalls or CPU fallback kernels.
  common_mistake: |
    **The Pitfall:** Running the Vela compiler with default settings.
    **The Rationale:** Failing to specify the Ethos-U55 system configuration (memory bandwidth, SRAM size) for the specific target hardware.
    **The Consequence:** Producing a suboptimal NPU schedule that causes memory spilling and misses latency budgets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M7 + Ethos-U55 (500 GOPS).
    - SRAM: 512 KB, Flash: >540 KB.
    - MobileNetV1-0.25 INT8: 475K params, 14.9 MOPs.

    **Calculations:**
    - Weights memory: 475 KB (Keep in Flash).
    - Activation arena memory: ~120 KB + 30 KB TFLM runtime = 150 KB (SRAM).
    - Ideal NPU compute time: 14.9M ops / 500G ops/s = 0.0000298 s = 0.0298 ms = 29.8 µs.
    - Remaining latency budget for memory movement, delegate/runtime overhead, and scheduling: 50 ms - 0.0298 ms = 49.97 ms.
    - The prompt does not specify Flash bandwidth, Vela cycle counts, or CPU fallback kernels, so full end-to-end latency cannot be proven from compute throughput alone.

    **Conclusion & Interpretation:**
    - **Result: SRAM fits and ideal NPU compute is far below 50 ms, but full latency compliance must be confirmed with the Vela schedule or hardware timing.** Keeping weights in Flash avoids SRAM pressure; the release risk is memory-transfer or fallback overhead, not raw NPU compute.
