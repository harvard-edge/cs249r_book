title: 'TinyML TCO Analyze: Power Dominates Cost for Battery-Powered TinyML'
scenario: 'Analyze the TCO for 1000 battery-powered ESP32-S3 (168MHz, 512KB SRAM, 8MB PSRAM) soil moisture sensors running TinyML inference (keyword detection every 10 minutes). Battery: 2xAA = 3Wh at $0.50/pair. Hardware: $5/unit.'
question: 'How do you calculate battery replacement frequency, and does switching to a Cortex-M4+Ethos-U55 ($3/unit) reduce 5-year TCO?'
details:
  realistic_solution: 'Calculate ESP32-S3 battery life based on power consumption, then factor in the labor cost per replacement multiplied by the replacement frequency per year. Compare this to the Cortex-M4+Ethos-U55, which may never need a battery replacement over 5 years.'
  common_mistake: |
    **The Pitfall:** Ignoring the technician labor cost of battery replacement.
    **The Rationale:** Engineers calculate the raw battery hardware cost but forget that physically replacing batteries in the field requires expensive manual labor.
    **The Consequence:** The operational expenditure is massively underestimated, rendering the TCO model useless.
  napkin_math: |
    **Assumptions & Constraints:**
    - ESP32-S3 avg power: 5.1mW. Battery capacity: 3000mWh.
    - Labor cost: $400/day * 20 days/replacement.

    **Calculations:**
    - Battery life: 3000mWh / 5.1mW = 588 hours (24.5 days).
    - Replacements/year: 365 / 24.5 = 14.9.
    - Annual battery cost per unit: $0.50 * 14.9 = $7.45. Fleet = $7,450/yr.
    - Labor cost: $400/day * 20 days * 14.9 replacements/yr = $119,200/yr.
    - ESP32-S3 5-yr TCO: $5,000 (hw) + 5 * ($7,450 + $119,200) = $638,250.
    - M4+Ethos avg power: 0.0025mW -> 136 year battery life (0 replacements).
    - M4+Ethos 5-yr TCO: $3,000 (hw) + $0 = $3,000.

    **Conclusion & Interpretation:**
    - **Result: $635,250 savings ([Power-Bound])**. Switching architectures yields massive TCO savings over 5 years.
