title: TinyML TCO for Industrial Sensor Make Buy Cloud Decision
scenario: 'You are making a comprehensive make-vs-buy-vs-cloud decision for 50,000 vibration sensors in a manufacturing facility. Options: (A) Edge MCU ($15/unit, 0.5mW avg, LoRa $0.05/mo, Model Dev $200K + $50K/yr), (B) Cloud inference (unit $5, cloud $0.001/inference at 144/day = $52.56/unit/yr), (C) Off-the-shelf sensor ($200/unit, pre-trained model, SaaS $10/unit/month).'
question: Which make, buy, or cloud option minimizes five-year TCO for 50,000 vibration sensors, and why?
details:
  realistic_solution: Option A has the lowest five-year TCO. Edge MCU hardware costs 50,000 * $15 = $750K, LoRa costs 50,000 * $0.05 * 12 * 5 = $150K, and model work costs $200K + 5 * $50K = $450K, for $1.35M total. Option B has cheaper devices at $250K, but cloud inference costs $0.001 * 144 * 365 = $52.56 per unit-year, or $13.14M over five years for the fleet, so total TCO is $13.39M. Option C costs $10M in sensors plus $30M in SaaS fees, or $40M total. Option A wins because its recurring costs stay small at 50,000 units, while cloud inference and SaaS scale linearly with fleet size.
  common_mistake: |
    **The Pitfall:** Ignoring data science team costs or cloud scaling costs.
    **The Rationale:** Focusing solely on hardware per-unit costs while neglecting the massive recurring costs of cloud inference at high volumes or vendor SaaS subscriptions.
    **The Consequence:** Recommending a cloud-dependent system that looks cheap at prototype scale but costs millions in operating expenses over 5 years.
  napkin_math: |
    **Assumptions & Constraints:**
    - Volume: 50,000 units over 5 years.

    **Calculations:**
    - Option A (Edge MCU): hardware = 50,000 * $15 = $750,000; LoRa = 50,000 * $0.05/month * 12 * 5 = $150,000; model development and maintenance = $200,000 + 5 * $50,000 = $450,000. Five-year TCO = $1,350,000.
    - Option B (Cloud inference): hardware = 50,000 * $5 = $250,000; inference = $0.001 * 144/day * 365 days = $52.56/unit/year; fleet inference over five years = $52.56 * 50,000 * 5 = $13,140,000. Five-year TCO = $13,390,000.
    - Option C (Off-the-shelf SaaS): hardware = 50,000 * $200 = $10,000,000; SaaS = $10/month * 12 * 5 * 50,000 = $30,000,000. Five-year TCO = $40,000,000.

    **Conclusion & Interpretation:**
    - **Result: Option A at $1.35M TCO (Cost-Bound).** Option A is about 9.9x cheaper than Option B and about 29.6x cheaper than Option C over five years.
