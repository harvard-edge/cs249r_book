title: 'Sensor Aging Changes the Baseline — Detecting and Adapting On-Device'
scenario: 'Your vibration sensor for predictive maintenance uses an ADXL345 accelerometer feeding a Cortex-M4 running an autoencoder anomaly detector. After 18 months in the field, false alarm rates jump from 2% to 15%. The motors haven''t changed — your maintenance team confirms they''re healthy. The accelerometer''s sensitivity has drifted by 8% due to aging and thermal cycling.'
question: 'How do you detect this is sensor drift (not real anomalies) and adapt on-device without retraining?'
details:
  realistic_solution: 'Distinguish sensor drift from real anomalies using physics-based invariants, then compensate with a calibration layer — not retraining.'
  common_mistake: '"Just retrain the model with the new sensor data." You can''t retrain on a Cortex-M4 (no backpropagation memory), and even if you could, retraining on drifted sensor data would teach the model that the drift is "normal" — masking real anomalies that co-occur with the drift.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Sensor Drift: 8% sensitivity loss.
    - False Alarm Rate: 2% (baseline) to 15% (drifted).
    - Correction Cost: 12 bytes SRAM + 3 multiplies/sample.
    - Fleet Size: 200 devices, $50/device manual update cost.

    **Calculations:**
    - Manual Retraining Cost = $50 * 200 = $10,000.
    - Drift Compensation = Sensor Input * 1.087 (Gain).
    - SRAM overhead = 1 float32 scale factor + minimal logic ≈ 12 bytes.

    **Conclusion & Interpretation:**
    - **Result: $10,000 Saved (Compute-Bound)**. Applying a simple 1.087 gain factor before the model restores the original data distribution, saving $10,000 in cloud retraining and OTA costs.
