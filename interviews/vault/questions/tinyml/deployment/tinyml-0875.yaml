title: 'Model Format Conversion: Optimize INT4 Quantization for Cortex-M4 MCU Deployment'
scenario: A Cortex-M4 with 200KB total Flash is running an INT8 model that uses 120KB Flash, leaving 40KB free because the firmware image is already 80% full. The team wants to add a second model with 150K INT8 parameters, which would require about 150KB Flash.
question: How would you evaluate INT4 quantization for the first model and quantify Flash savings vs. accuracy risk?
details:
  realistic_solution: 'INT4 quantization of the first model cuts its weight storage in half: 120KB INT8 weights become about 60KB INT4 weights, saving 60KB. Available Flash would rise from 40KB to 100KB, but the second 150K-parameter INT8 model still needs about 150KB, so INT4 on the first model is helpful but not sufficient. To fit both models in 200KB total Flash, the team needs at least 50KB more savings: for example, also quantize or compress the second model to 100KB or less, remove other firmware footprint, or replace one model with a smaller architecture. Accuracy risk is the key tradeoff: INT4 PTQ may cost roughly 1-3 percentage points on small models, while W4A8 often preserves more accuracy but still may require kernel support and unpacking on Cortex-M4. Do not claim a compute speedup unless the target has native INT4 kernels.'
  common_mistake: |
    **The Pitfall:** Implementing INT4 quantization and expecting a compute speedup.
    **The Rationale:** Cortex-M4 doesn't have native INT4 SIMD support. INT4 must be unpacked to INT8 before computation.
    **The Consequence:** Misunderstanding that the latency improvement comes purely from reduced memory fetch time, not faster computation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total Flash = 200 KB because 40 KB free is 20% of Flash.
       - Current first model = 120 KB INT8 weights.
       - Second model = 150K INT8 params ~= 150 KB.
    2. **Calculations:**
       - First model after INT4 = 120 KB * 0.5 = 60 KB.
       - Flash saved = 120 KB - 60 KB = 60 KB.
       - New free Flash = 40 KB + 60 KB = 100 KB.
       - Shortfall for second INT8 model = 150 KB - 100 KB = 50 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Insufficient Flash Savings**. INT4 on the first model saves 60 KB but does not by itself make room for the 150 KB second model; another 50 KB of compression, pruning, or firmware reduction is required.
