title: RTOS Preemption for Inference
scenario: An existing bare-metal setup loops between polling a sensor and running inference, causing missing data during the inference window on an MCU.
question: How does replacing the polling loop with an RTOS task scheduler utilizing preemption fix the missing data issue?
details:
  realistic_solution: Create a high-priority hardware interrupt that places incoming sensor bytes into a FreeRTOS ring buffer. The inference runs in a low-priority thread. The MCU preempts the inference thread for ~10 cycles to enqueue the data, ensuring zero data loss.
  common_mistake: |
    **The Pitfall:** Assigning the inference task a higher RTOS priority than the sensor data collection task.
    **The Rationale:** Thinking inference is the most important work and thus deserves the highest priority.
    **The Consequence:** The exact same problem reproduces because inference blocks the sensor reads.
  napkin_math: |
    **Assumptions & Constraints:**
    - Preemption Overhead: ~10 cycles.
    - Sample Rate: 1000 Hz.

    **Calculations:**
    - Total Preemption Cost: 10 cycles * 1000 = 10,000 cycles/sec.
    - Even on a modest 10 MHz MCU, interrupt overhead fraction = 10,000 / 10,000,000 = 0.1% of CPU time.
    - The inference task can use the remaining CPU budget while sensor reads are still serviced on time.

    **Conclusion & Interpretation:**
    - **Result: Negligible Interrupt Overhead (Latency-Bound Fix).** Preemption prevents sensor data loss by servicing reads during inference; the quantitative cost is the interrupt service overhead, not a claim that the model uses 99%+ of the CPU.
