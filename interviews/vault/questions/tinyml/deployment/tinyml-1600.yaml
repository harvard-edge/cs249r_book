title: RTOS Preemption for Inference
scenario: An existing bare-metal setup loops between polling a sensor and running inference, causing missing data during the inference window on an MCU.
question: How does replacing the polling loop with an RTOS task scheduler utilizing preemption fix the missing data issue?
details:
  realistic_solution: Create a high-priority hardware interrupt that places each incoming sensor sample into a FreeRTOS ring buffer, and run inference in a lower-priority thread. At 1000 Hz, a new sample arrives every 1 ms, so the sensor service path must run within that deadline even while inference is executing. Preemption breaks the long inference window into interruptible slices because the ISR runs immediately, enqueues the sample in a few cycles, and returns control to inference without losing data.
  common_mistake: |
    **The Pitfall:** Assigning the inference task a higher RTOS priority than the sensor data collection task.
    **The Rationale:** Thinking inference is the most important work and thus deserves the highest priority.
    **The Consequence:** The exact same problem reproduces because inference blocks the sensor reads.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sample rate: 1000 Hz, so the sample period is 1 ms.
    - Bare-metal polling can block sensor service for the full inference window.
    - Interrupt service path: about 10 cycles to enqueue a sample.

    **Calculations:**
    - Deadline to avoid a missed sample: service each sample before the next 1 ms arrival.
    - With polling, any inference section longer than 1 ms can hide at least one sample period.
    - With preemption, service latency is approximately interrupt entry plus enqueue time, not the full inference time.
    - Example on a 10 MHz MCU: 10 cycles = 1 us, which is far below the 1 ms sample period.

    **Conclusion & Interpretation:**
    - **Result: Sub-1 ms Sensor Service (Latency-Bound Fix).** Preemption fixes the data loss because the high-priority sensor path meets the 1 ms deadline while inference continues as background work.
