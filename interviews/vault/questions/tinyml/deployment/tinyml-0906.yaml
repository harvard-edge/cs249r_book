title: Compute CR123A Battery Life for a TinyML Smoke Detector
scenario: Estimate BOM cost and annual power cost for a TinyML smoke detector using Cortex-M7+Ethos-U55 ($8 MCU), photoelectric sensor ($2), LoRa module ($3), CR123A battery (1500mAh, $2), and enclosure ($5) = $20 BOM. Avg continuous current is 50μA. Alarm current is 200mA for 100ms every 10 years.
question: What is the expected battery life of this system at 3V, and does it meet a 10-year requirement?
details:
  realistic_solution: 'Alarm duty cycle: 100ms / (10yr * 365.25 * 24 * 3600 * 1000ms) = 100ms / 315,576,000,000ms = 3.17e-10. Alarm current contribution: 200mA * 3.17e-10 = 0.063 nA, which is negligible. Average current is therefore effectively the 50μA standby current. Battery life: 1500mAh / 0.050mA = 30,000 hours = 3.42 years. It does not meet the 10-year requirement. To meet 10 years, average current must be at most 1500mAh / 87,660h = 0.017mA, or about 17μA; a 10μA standby redesign would provide about 17.1 years.'
  common_mistake: |
    **The Pitfall:** Treating ultra-rare events as significant drivers of average power.
    **The Rationale:** Candidates include the 200mA alarm current in the average calculation without proper duty-cycle weighting over a 10-year span.
    **The Consequence:** Wasting time optimizing the alarm state when the true bottleneck is the 50μA continuous standby current.
  napkin_math: |
    **Assumptions & Constraints:**
    - Alarm cycle: 100 ms every 10 years.
    - Alarm Current: 200 mA. Average Current: 50 μA.
    - Battery: 1500 mAh.

    **Calculations:**
    - Alarm Duty Cycle: 100 / 315,576,000,000 ms = 3.17e-10.
    - Alarm Contribution: 200 mA * 3.17e-10 = 0.063 nA.
    - Current Battery Life: 1500 mAh / 0.050 mA = 30,000 hours = ~3.42 years.

    **Conclusion & Interpretation:**
    - **Result: ~3.42 years, so the design fails the 10-year requirement (Power-Bound).** Standby current dominates the energy profile; alarm power is statistically irrelevant.
