title: Compute CR123A Battery Life for a TinyML Smoke Detector
scenario: A TinyML smoke detector uses a Cortex-M7+Ethos-U55, photoelectric sensor, LoRa module, and a CR123A battery rated at 1500mAh at 3V. Average continuous current is 50μA. Alarm current is 200mA for 100ms every 10 years.
question: What is the expected battery life of this system at 3V, and does it meet a 10-year requirement?
details:
  realistic_solution: 'Alarm duty cycle: 100ms / (10yr * 365.25 * 24 * 3600 * 1000ms) = 100ms / 315,576,000,000ms = 3.17e-10. Alarm current contribution: 200mA * 3.17e-10 = 0.063 nA, which is negligible. Average current is therefore effectively the 50μA standby current. At the same 3V battery voltage, capacity-based life is 1500mAh / 0.050mA = 30,000 hours = 3.42 years; equivalently, 1500mAh * 3V = 4.5Wh and 50μA * 3V = 150μW, giving the same result. It does not meet the 10-year requirement. To meet 10 years, average current must be at most 1500mAh / 87,660h = 0.017mA, or about 17μA.'
  common_mistake: |
    **The Pitfall:** Treating ultra-rare events as significant drivers of average power.
    **The Rationale:** Candidates include the 200mA alarm current in the average calculation without proper duty-cycle weighting over a 10-year span.
    **The Consequence:** Wasting time optimizing the alarm state when the true bottleneck is the 50μA continuous standby current.
  napkin_math: |
    **Assumptions & Constraints:**
    - Alarm cycle: 100 ms every 10 years.
    - Alarm Current: 200 mA. Average Current: 50 μA.
    - Battery: 1500 mAh at 3V = 4.5 Wh.

    **Calculations:**
    - Alarm Duty Cycle: 100 / 315,576,000,000 ms = 3.17e-10.
    - Alarm Contribution: 200 mA * 3.17e-10 = 0.063 nA.
    - Standby power check: 0.050 mA * 3V = 0.150 mW.
    - Current battery life by capacity: 1500 mAh / 0.050 mA = 30,000 hours = ~3.42 years.
    - Current battery life by energy: 4.5 Wh / 0.000150 W = 30,000 hours = ~3.42 years.

    **Conclusion & Interpretation:**
    - **Result: ~3.42 years, so the design fails the 10-year requirement (Power-Bound).** Standby current dominates the energy profile; alarm power is statistically irrelevant.
