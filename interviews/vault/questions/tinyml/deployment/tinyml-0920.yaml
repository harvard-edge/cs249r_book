title: 'TinyML TCO Specification: Design $100K Budget TinyML Infrastructure'
scenario: 'Specify a complete TinyML infrastructure deployment for a smart building company with a $100K 3-year budget. Requirements: 500 Cortex-M4 sensors for HVAC optimization, 100 ESP32-S3 sensors for occupancy (WiFi needed), 10 Cortex-M7+Ethos-U55 edge gateways. Include: hardware, LoRaWAN connectivity, cloud backend, model development, and operations.'
question: How would you verify against the $100K budget constraint?
details:
  realistic_solution: 'Hardware: 500*$3(M4)+100*$5(ESP32)+10*$12(M7+Ethos)=$1500+$500+$120=$2,120. LoRa gateways: 600/100*$500=$3K. Connectivity: 600*$0.05*36mo=$1,080. Cloud (AWS IoT + dashboard): $2K/yr*3=$6K. Occupancy WiFi (ESP32): piggyback on building WiFi, $0. Model development: 3 models (HVAC, occupancy, anomaly) at $15K each=$45K. Model maintenance: $10K/yr*3=$30K. Operations/monitoring: $5K/yr*3=$15K. Deployment labor: 610 sensors * $20/install=$12,200. Training data: $2K. Total: $116,400. Over $100K by $16.4K. Cut: reduce model development to 2 models ($30K): saves $15K. Reduce monitoring: $3K/yr: saves $6K. Total: $95.4K < $100K.'
  common_mistake: |
    **The Pitfall:** Specifying hardware first and ignoring operational costs.
    **The Rationale:** Candidates underestimate the massive cost of model development, maintenance, and cloud ops.
    **The Consequence:** They run completely out of budget, as hardware is usually <3% of total cost.
  napkin_math: |
    **Assumptions & Constraints:**
    - $100K 3-year budget.
    - Hardware: 500*(M4) + 100*(ESP32) + 10*(M7).
    - Model dev, operations.

    **Calculations:**
    - Hardware CapEx = $2,120 + $3,000 = $5,120.
    - Cloud/Ops OpEx = $6,000 + $15,000 + $1,080 = $22,080.
    - Dev & Labor = $45,000 + $30,000 + $12,200 + $2,000 = $89,200.
    - Total = $116,400. Optimization: -$32,000.

    **Conclusion & Interpretation:**
    - **Result: $84.4K optimized budget (Budget-Bound)**. Optimized budget is $84.4K, fitting safely under $100K.
