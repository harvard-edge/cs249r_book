title: TinyML Smart-Building Deployment Budget Under $100K
scenario: 'Specify a complete TinyML infrastructure deployment for a smart building company with a $100K 3-year budget. Requirements: 500 Cortex-M4 sensors for HVAC optimization, 100 ESP32-S3 sensors for occupancy (WiFi needed), 10 Cortex-M7+Ethos-U55 edge gateways. Include: hardware, LoRaWAN connectivity, cloud backend, model development, and operations.'
question: How would you verify against the $100K budget constraint?
details:
  realistic_solution: 'Hardware: 500*$3(M4)+100*$5(ESP32)+10*$12(M7+Ethos gateways)=$1500+$500+$120=$2,120. LoRaWAN service for the 500 M4 HVAC sensors is 500*$0.05*36mo=$900; the 100 ESP32-S3 occupancy sensors use existing building WiFi at $0 incremental connectivity. Cloud backend (AWS IoT + dashboard): $2K/yr*3=$6K. Model development: 3 models (HVAC, occupancy, gateway anomaly) at $15K each=$45K. Model maintenance: $10K/yr*3=$30K. Operations/monitoring: $5K/yr*3=$15K. Deployment labor: 610 devices * $20/install=$12,200. Training data: $2K. Total: $113,220. Over $100K by $13,220. Cut: reduce model development to 2 models ($30K): saves $15K. Optimized total: $98,220 < $100K, leaving $1,780 headroom.'
  common_mistake: |
    **The Pitfall:** Specifying hardware first and ignoring operational costs.
    **The Rationale:** Candidates underestimate the massive cost of model development, maintenance, and cloud ops.
    **The Consequence:** They run completely out of budget, as hardware is usually <3% of total cost.
  napkin_math: |
    **Assumptions & Constraints:**
    - $100K 3-year budget.
    - Hardware: 500 M4 HVAC sensors, 100 ESP32-S3 occupancy sensors, and 10 M7+Ethos edge gateways.
    - Connectivity: LoRaWAN for 500 M4 sensors; ESP32-S3 sensors use existing WiFi.
    - Cloud backend, model development, maintenance, operations, deployment labor, and training data.

    **Calculations:**
    - Hardware CapEx = 500*$3 + 100*$5 + 10*$12 = $2,120.
    - Connectivity = 500*$0.05*36 months = $900.
    - Cloud/Ops OpEx = $6,000 + $15,000 + $900 = $21,900.
    - Dev & Labor = $45,000 + $30,000 + $12,200 + $2,000 = $89,200.
    - Baseline total = $2,120 + $21,900 + $89,200 = $113,220.
    - Optimization: reduce model development from 3 models to 2 models, saving $15,000.
    - Optimized total = $113,220 - $15,000 = $98,220.

    **Conclusion & Interpretation:**
    - **Result: $98.22K optimized budget (Budget-Bound)**. The optimized deployment fits under the $100K budget with $1.78K of headroom using the exact device quantities in the scenario.
