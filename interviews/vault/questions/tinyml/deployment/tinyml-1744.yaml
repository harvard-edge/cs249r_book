title: Analyze Execute-In-Place Model Switching Latency
scenario: A Cortex-M4 switches frequently between two 100KB INT8 models. Currently, copying weights from SPI Flash to SRAM takes 200ms per switch, missing latency deadlines.
question: How does an Execute-In-Place (XIP) memory-mapped architecture reduce this model-switching bottleneck?
details:
  realistic_solution: 'Normally, the MCU reads Flash sector-by-sector into SRAM via DMA, taking 200ms per model switch. XIP maps the external SPI Flash into the CPU''s address space using the memory controller, boot configuration, and linker placement so the inference engine can reference weights in place instead of copying the whole model into SRAM. This removes the 200ms bulk-copy delay from switching, but it does not make access latency zero: inference still pays flash, bus, and cache-miss penalties when weights are fetched.'
  common_mistake: |
    **The Pitfall:** Suggesting software caching algorithms.
    **The Rationale:** Candidates overlook that the 128KB total SRAM physically cannot hold both 100KB models simultaneously.
    **The Consequence:** Proposed solutions are physically impossible to implement on the constrained hardware.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4 features 128KB SRAM total.
    - Two 100KB INT8 models physically cannot fit concurrently in SRAM.
    - DMA copy latency from SPI Flash is 200 ms.

    **Calculations:**
    - Evaluate DMA overhead: 200 ms per swap.
    - Evaluate XIP architecture: memory-mapped pointers replace the 200 ms bulk SRAM copy.
    - Remaining cost: flash/cache access latency during inference rather than zero-latency model access.

    **Conclusion & Interpretation:**
    - **Result: Bulk-copy latency removed (Storage-Bound)**. XIP avoids the 200 ms SRAM copy and solves the two-model SRAM capacity issue, but execution still depends on external-flash bandwidth and cache behavior.
