title: Analyze TCO of Custom ASIC vs MCU for TinyML at Scale
scenario: 'A smart meter manufacturer must choose between deploying anomaly detection on an existing Cortex-M4 MCU ($2.50 BOM cost, 128μA average current, 35% accuracy) vs a custom ML ASIC ($8.00 BOM, 25.6μA average current, 94% accuracy). Deployment volume: 5M units total. ASIC NRE: $2M. Battery life (2000mAh): MCU = 2000mAh / 0.128mA = 1.78 years; ASIC = 2000mAh / 0.0256mA = 8.9 years. Each unit has one warranty-relevant anomaly per year on average. Analyze 5-year TCO for both options including battery replacements ($3 each) and warranty costs ($50 per missed anomaly).'
question: How would you analyze 5-year TCO for both options including warranty costs from missed anomalies?
details:
  realistic_solution: 'With one warranty-relevant anomaly per unit-year, missed-anomaly cost is units * years * miss rate * $50. MCU 5-year TCO: BOM: 5M * $2.50 = $12.5M. Battery replacements: 5M * (5 / 1.78) * $3 = about $42.1M. Warranty: 5M * 5 * 65% * $50 = $812.5M. Total MCU: about $867.1M. ASIC 5-year TCO: NRE: $2M. BOM: 5M * $8 = $40M. Battery replacements: 5M * (5 / 8.9) * $3 = about $8.4M. Warranty: 5M * 5 * 6% * $50 = $75M. Total ASIC: about $125.4M. The ASIC has about $741.7M lower 5-year TCO, dominated by avoided warranty misses.'
  common_mistake: |
    **The Pitfall:** Ignoring warranty cost impact of lower accuracy.
    **The Rationale:** Failing to account for the impact of lower accuracy.
    **The Consequence:** At 5M units, 65% miss rate on MCU means 3.25M anomalies/year undetected, each causing a service call at $50 cost.
  napkin_math: |
    **Assumptions & Constraints:**
    - Deployment: 5M units over 5 years.
    - Warranty-relevant anomaly incidence: 1 anomaly/unit/year.
    - Miss rates: MCU = 65%, ASIC = 6%.

    **Calculations:**
    - MCU BOM = 5M * $2.50 = $12.5M.
    - MCU battery = 5M * (5 / 1.78) * $3 = $42.1M.
    - MCU warranty = 5M * 5 years * 1 anomaly/year * 65% * $50 = $812.5M.
    - MCU total = $12.5M + $42.1M + $812.5M = $867.1M.
    - ASIC BOM + NRE = 5M * $8 + $2M = $42.0M.
    - ASIC battery = 5M * (5 / 8.9) * $3 = $8.4M.
    - ASIC warranty = 5M * 5 * 1 * 6% * $50 = $75.0M.
    - ASIC total = $42.0M + $8.4M + $75.0M = $125.4M.

    **Conclusion & Interpretation:**
    - **Result: ASIC lower by about $741.7M over 5 years.** The comparison is valid only because the anomaly incidence rate is explicit.
