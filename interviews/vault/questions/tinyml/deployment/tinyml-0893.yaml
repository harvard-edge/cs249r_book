title: 'TinyML TCO Recall: Cortex-M4 vs ESP32-S3 Cost Profile'
scenario: Evaluate a 10,000-unit continuous deployment over 2 years at $0.10/kWh comparing a $2 Cortex-M4 (50mW) requiring a separate $2 LoRa module vs a $4 ESP32-S3 (11.5mW WiFi duty-cycled).
question: "For a 10,000-unit deployment, which platform has lower 2-year TCO?"
details:
  realistic_solution: Total Cost of Ownership dictates that BOM interconnectivity dominates operational power savings. The ESP32-S3 natively consolidates networking, yielding superior financial scalability despite identical up-front silicon pricing.
  common_mistake: |
    **The Pitfall:** Neglecting the system-level BOM cost of required physical wireless connectivity.
    **The Rationale:** Candidates tunnel-vision onto chip unit cost and isolated power draw figures.
    **The Consequence:** They falsely recommend the M4, ignoring that integrating external wireless transceivers collapses the margin.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Power cost: $0.10/kWh. Fleet: 10,000 units over 2 years (17,520 h).
       - Cortex-M4: 50 mW active, $2 chip + $2 LoRa module = $4.
       - ESP32-S3: 11.5 mW active, $4 chip (integrated WiFi) = $4.
    2. **Calculations:**
       - M4 annual energy: 0.050 W * 8760 h = 438 Wh = 0.438 kWh/yr.
       - ESP annual energy: 0.0115 W * 8760 h = 100.74 Wh = 0.1007 kWh/yr.
       - M4 2-yr fleet power cost: 10,000 * 2 * 0.438 * $0.10 = $876.
       - ESP 2-yr fleet power cost: 10,000 * 2 * 0.1007 * $0.10 = $201.40 (~$202).
       - Fleet hardware cost: 10,000 * $4 = $40,000 for both.
       - Total TCO M4: $40,000 + $876 = $40,876.
       - Total TCO ESP32: $40,000 + $202 = $40,202.
    3. **Conclusion & Interpretation:**
       - **Result: ESP32-S3 realizes a lower 2-year TCO ($40,202) via integrated connectivity (BOM-Bound).**
