title: 'TinyML TCO Evaluation: Cloud-in-the-Loop vs Fully On-Device TinyML'
scenario: 'Compare fully on-device TinyML (ESP32-S3, $5, 240MHz) vs cloud-in-the-loop architecture (ESP32-S3 with WiFi, sends data to cloud for inference) for a predictive maintenance model (5 GOPS). Inference: every 10 minutes, 5-second audio clip. Cloud at $0.01/inference. 1000-unit deployment over 3 years.'
question: When should the predictive maintenance fleet use on-device TinyML versus cloud inference, and what is the three-year TCO?
details:
  realistic_solution: 'ESP32-S3 compute: 240MHz with DSP extension ≈ 240 MOPS (million ops). 5 GOPS model: 5000/240=20.8 seconds per inference. Latency too high (10 min trigger → 20s inference → real-time analysis impossible). Cloud required. Cloud TCO: 1000 units * 6 inferences/hr * 24 * 365 * 3 * $0.01 = 1000 * 157,680 * $0.01 = $1,576,800. Hardware: 1000 * $5 = $5K. WiFi connectivity: 1000 * $1/month * 36 = $36K. Total: $1,576,800 + $5K + $36K = $1.617M. On-device alternative: use smaller 30 MOPS model (94% accuracy vs 98%): 30M/240M=0.125s inference. Cost: $1,617K - $1,576K cloud = $41K. Dramatic savings from model compression for TinyML.'
  common_mistake: |
    **The Pitfall:** Assuming the original 5 GOPS model can run on the ESP32-S3.
    **The Rationale:** Candidates fail to calculate the raw MOPS capability of the microcontroller and blindly assume "TinyML" means running any model on-device.
    **The Consequence:** The team attempts to deploy a model that takes 20 seconds per inference on a real-time system, causing complete functional failure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Deployment: 1000 units, 3 years, 6 inferences/hour (every 10 min).
       - Cloud Cost: $0.01 per inference.
       - On-Device Compute: ESP32-S3 at 240 MOPS. Baseline Model: 5 GOPS.
       - TinyML Compressed Model: 30 MOPS.
    2. **Calculations:**
       - Uncompressed Latency: 5,000 MOPS / 240 MOPS = 20.8 seconds (Exceeds real-time limits).
       - Cloud TCO: 1000 units × 6 inf/hr × 24 hr × 365 days × 3 yrs × $0.01 = $1,576,800.
       - TinyML Latency: 30 MOPS / 240 MOPS = 0.125 seconds.
       - TinyML TCO (HW+WiFi): 1000 × ($5 + $36) = $41,000.
       - Savings: $1,576,800 (Cloud) - $41,000 (Local) = $1,535,800.
    3. **Conclusion & Interpretation:**
       - **Result: TinyML saves >$1.5M over 3 years and restores real-time latency.** **Result: TCO-Bound Architecture.**
