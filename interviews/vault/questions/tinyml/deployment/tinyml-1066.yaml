title: SRAM Contention During A/B OTA Updates
scenario: You are deploying an edge vision system on the ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform,
  which features a 480 MHz M7 and an Ethos-U55 NPU (configured for 256 MAC/cycle) that share a unified
  512 KB SRAM. The system uses an A/B partition scheme in external flash for firmware-over-the-air (OTA)
  updates. Currently, the active NPU model requires 360 KB of SRAM for its activations and fast weights,
  while the M7 RTOS and networking stack consume 100 KB. During a background OTA update, the system receives
  the firmware in small packets and buffers them to write to the inactive flash partition. The system
  consistently throws an Out-Of-Memory (OOM) hard fault right before writing the first chunk to flash,
  despite the M7 having 80% idle CPU cycles. Explain why this failure occurs.
question: Why does a Corstone-300 OTA update OOM when a 360 KB NPU model, 100 KB RTOS stack, and flash
  buffer share 512 KB SRAM?
details:
  realistic_solution: The crash occurs because the system violates the strict 512 KB shared SRAM limit
    when buffering the OTA payload. External flash memory requires erasing and writing in fixed sector
    sizes, typically 64 KB. To perform the A/B update, the M7 must accumulate a full 64 KB sector of the
    OTA payload in SRAM before committing it to the inactive flash partition. This required buffer size
    pushes the total memory footprint above the hardware limits, causing the allocation to fail and the
    system to hard fault.
  common_mistake: '**The Pitfall:** Overlooking the physical SRAM capacity limits when components that
    usually operate independently run concurrently.

    **The Rationale:** Candidates often guess that the crash is due to CPU starvation during decryption,
    NPU interrupt conflicts, or flash write-cycle degradation. They fail to account for the fact that
    the Ethos-U55 and M7 share the same physical 512 KB SRAM pool, missing the basic memory capacity constraint
    introduced by flash programming mechanics.

    **The Consequence:** Engineers waste time debugging non-existent software logic bugs or CPU starvation
    issues instead of fixing the fundamental memory fragmentation and capacity constraint.'
  napkin_math: '**Assumptions & Constraints:**

    - Total shared SRAM available: 512 KB.

    - Ethos-U55 model requirement: 360 KB.

    - M7 RTOS/Network requirement: 100 KB.

    - Flash sector erase buffer requirement: 64 KB.


    **Calculations:**

    - Baseline memory usage: 360 KB + 100 KB = 460 KB.

    - Free SRAM before OTA buffering: 512 KB - 460 KB = 52 KB.

    - Total SRAM requested during OTA write phase: 460 KB + 64 KB = 524 KB.


    **Conclusion & Interpretation:**

    - **Result: 524 KB > 512 KB (Memory Capacity-Bound).** The required 64 KB flash buffer exceeds the
    52 KB of free SRAM, resulting in a deficit of 12 KB and a guaranteed OOM crash.'
