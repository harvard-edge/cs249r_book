title: 'FOTA for Battery-Powered Sensor Fleets'
scenario: 'You''re rolling out a FOTA update to 10,000 battery-powered vibration sensors. Each sensor has a CR2032 coin cell (225 mAh, 3V) and communicates via BLE 5.3 (nRF5340, 128 MHz). The new model binary is 80 KB. Your field engineer says to just push the update to all devices tonight.'
question: 'What can go wrong when pushing an 80 KB BLE FOTA model to 10,000 CR2032-powered nRF5340 sensors simultaneously?'
details:
  realistic_solution: 'The radio is the most power-hungry peripheral on a coin-cell device. BLE 5.3 on nRF5340: TX power ~15 mW, RX power ~12 mW. At BLE''s practical throughput of ~60 KB/s (with connection overhead): transfer time = 80 KB / 60 KB/s = 1.33 seconds. Energy for transfer: ~15 mW * 1.33s = 20 mJ. The full FOTA process includes Flash erases and writes, which draw high peak currents. Combined with the radio, a single FOTA attempt costs ~47 mJ. If the deployment doesn''t strictly limit retries, network congestion from 10,000 devices updating simultaneously will cause continuous radio listening and failed transfers. A staggered, retry-limited rollout is mandatory.'
  common_mistake: |
    **The Pitfall:** Dismissing BLE FOTA as ''fast enough'' without accounting for network congestion and flash write energy.
    **The Rationale:** Candidates look only at the theoretical data rate and ignore the energy cost of the radio and Flash writes, as well as fleet-level collision dynamics.
    **The Consequence:** Cascading retry failures cause devices to remain in high-power RX modes, completely draining the coin cell batteries of the entire fleet in one night.
  napkin_math: |
    **Assumptions & Constraints:**
    - 80 KB payload.
    - CR2032 battery (225 mAh, 3V = 2,430 J).
    - FOTA energy is 47 mJ per attempt.

    **Calculations:**
    - Max safe retries before 1% battery impact: (2430 J * 0.01) / 0.047 J = 517 retries.
    - With a 3-retry limit: 141 mJ worst case = 0.006% of battery.
    - Fleet update (10,000 devices): Requires staggered mesh distribution.

    **Conclusion & Interpretation:**
    - **Result: 517 retries (Energy-Bound Failure)**. Simultaneous updates will cause a broadcast storm and infinite retries.
