title: MCU-Based Edge AI Gateway
scenario: You're designing an edge AI gateway for a smart building that aggregates data from 50 BLE sensors and runs local ML models. The gateway must be ultra-low-cost ($15 BOM) and run on an ESP32-S3. The workload is 50 BLE sensors advertising once per second, three INT8 models of about 100 KB each that run once every 5 minutes, and a small local HTTP dashboard.
question: Can the ESP32-S3 handle this workload, and what are the critical system bottlenecks?
details:
  realistic_solution: 'Yes, under the stated workload, but the answer depends on memory placement and radio duty cycle rather than raw CPU. Partition Core 0 for BLE/Wi-Fi system tasks and Core 1 for ML plus HTTP request handling. BLE scanning at 50 advertisements/s is only about 10 ms/s of packet-handling work under the stated assumption, and three 20 ms INT8 inferences every 300 s are negligible CPU load. The bottlenecks are: BLE/Wi-Fi coexistence under dashboard traffic, internal SRAM pressure, and PSRAM latency. Keep BLE stack state, hot queues, and the currently executing model arena in internal SRAM; 3x100 KB weights can fit in flash and be mapped/loaded as needed, while PSRAM is appropriate for HTTP buffers, logs, and noncritical caches. At a 3.3 V rail, the rough average current below is about 141 mA, or 0.47 W, costing about $0.49/year at $0.12/kWh.'
  common_mistake: |
    **The Pitfall:** Assuming the external PSRAM operates at full CPU speed.
    **The Rationale:** Developers see gigabytes of RAM and dual cores and assume the chip can handle arbitrary memory-heavy workloads.
    **The Consequence:** Placing critical data structures (like the BLE connection tables) in PSRAM, leading to massive latency penalties (24x slower via SPI) and system crashes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Workload: 50 BLE sensors (1 adv/s), three 20 ms ML inferences every 300 s.
    - Radio current model: 240 mA during Wi-Fi dashboard activity, 130 mA during BLE-dominant idle.
    - Dashboard activity duty cycle: 10%.
    - Supply rail for power estimate: 3.3 V.

    **Calculations:**
    - BLE Overhead: 50 packets/s * 0.2 ms = 10 ms/s (1% Core 0 utilization).
    - ML Overhead: 3 * 20 ms every 300 s = 60 ms / 300 s = 0.02% Core 1 utilization.
    - Average Current: (0.1 * 240) + (0.9 * 130) = 141 mA.
    - Power: 141 mA * 3.3 V = 465 mW = 0.465 W.
    - Annual Cost: 0.465 W * 8,760 h = 4.07 kWh * $0.12/kWh = $0.49/year.

    **Conclusion & Interpretation:**
    - **Result: Memory/Radio-Bound**. The compute load is modest under the stated assumptions, but success depends on BLE/Wi-Fi coexistence, SRAM budgeting, and keeping hot data out of PSRAM.
