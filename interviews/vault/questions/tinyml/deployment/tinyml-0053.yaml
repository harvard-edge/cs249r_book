title: The FOTA Update Risk
scenario: You have 10,000 sensor nodes deployed in a warehouse, each running a vibration anomaly detection model. You need to update the model. The nodes communicate via LoRaWAN (250 bytes/second effective throughput).
question: How should 10,000 nodes receive a 200 KB model over 250 B/s LoRaWAN without bricking on failure?
details:
  realistic_solution: Use delta updates with LoRaWAN multicast groups and a safe A/B model slot. A full 200 KB model takes about 13 minutes of channel time per device at 250 B/s, so updating 10,000 devices sequentially would take about 93 days. Instead, compute a binary diff against the current model; a 20 KB delta has an ideal payload time of about 80 seconds per multicast pass, but the fleet rollout must budget repeated multicast windows, duty-cycle limits, receive scheduling, and recovery for missed fragments. Each device verifies the CRC, runs a test inference on a known input, and atomically swaps to the new model only if validation passes. If validation fails, it keeps the old model and reports failure.
  common_mistake: |
    **The Pitfall:** Sending the full new firmware sequentially over LoRaWAN and flashing it directly.
    **The Rationale:** Engineers accustomed to high-bandwidth networks assume point-to-point file transfers are viable and ignore the shared medium constraints.
    **The Consequence:** At 250 bytes/second, a 200 KB model takes about 13 minutes per device. With 10,000 devices sharing the channel, a sequential full update takes roughly three months and creates severe congestion and failure risk.
  napkin_math: |
    **Assumptions & Constraints:**
    - Full Model Size: 200 KB.
    - LoRaWAN Throughput: 250 B/s.
    - Fleet Size: 10,000 devices.
    - Binary Delta Update: ~20 KB.

    **Calculations:**
    - Per-device full transfer time: 200 KB / 250 B/s = 800 s = 13.3 minutes.
    - Sequential full fleet transfer: 800 s/device * 10,000 devices = 8,000,000 s = 92.6 days.
    - Ideal delta payload time per multicast pass: 20 KB / 250 B/s = 80 seconds.
    - Practical multicast rollout time: 80 seconds is only the payload floor; retries, duty-cycle limits, receive windows, and missed fragments determine the fleet completion time.
    - Verification Time: CRC (1 ms) + Inference (50 ms) = 51 ms.

    **Conclusion & Interpretation:**
    - **Result: Communication-Bound.** Transmitting full models sequentially takes about 3 months. Delta multicast is the right strategy, but 80 seconds is the theoretical payload time for one multicast pass, not a guaranteed whole-fleet completion time.
