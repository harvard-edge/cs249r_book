title: 'TinyML TCO Fluency: Quick Cost Estimation for TinyML Deployment'
scenario: A fleet of 10,000 sensors operates at 100μA average current from a 3V battery. Energy costs $0.10/kWh. An ESP32-S3 costs $5 and replaces cloud inference costing $0.001/inference over 3 years. A coin cell battery provides 50mAh capacity.
question: What are the quick estimates for sensor energy cost, ESP32-S3 cloud break-even volume, and coin-cell battery life?
details:
  realistic_solution: '(1) Power: 100μA = 0.1mA. Power = 0.1mA * 3V = 0.3mW. Annual per sensor: 0.3mW * 8760hr / 1000 = 2.628 Wh. Cost: 2.628 Wh * $0.10/kWh / 1000 = $0.000263/yr. 10K sensors: $2.63/yr — essentially free. (2) ESP32-S3 TCO 3yr: $5 HW + $0.000263*3yr=$5 (power negligible). Cloud: N*1095days*$0.001=$1.095N. Break-even: $5=$1.095N → N=4.57 inf/day ≈ 5 inf/day. Above 5/day: ESP32-S3 cheaper. (3) 50mAh / 100μA = 50,000μAh / 100μA = 500 hours = 20.8 days. Note: Candidate misread 100μA as 10μA in original prompt. Recalculated here.'
  common_mistake: |
    **The Pitfall:** Making order-of-magnitude errors when calculating power and converting units.
    **The Rationale:** Candidates forget that annual energy cost = current_mA * voltage * 8760hr * rate_per_kWh / 1000, or they confuse μA with mA.
    **The Consequence:** TCO and battery life estimations are completely inaccurate, leading to flawed deployment decisions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current: 100μA (0.1mA), Voltage: 3V.
    - Energy cost: $0.10/kWh.
    - Hardware cost: $5.
    - Cloud cost: $0.001/inference.
    - Battery capacity: 50mAh.

    **Calculations:**
    - Sensor power = 0.1mA * 3V = 0.3mW.
    - Annual cost = 0.3mW * 8760hr / 1000 = 2.628 Wh. 2.628 Wh * $0.10/kWh / 1000 = $0.000263/yr per sensor. For 10K sensors: $2.63/yr.
    - Break-even = $5 = N * 1095 days * $0.001 -> N = 4.57 inferences/day.
    - Battery life = 50mAh / 0.1mA = 500 hours. 500 / 24 = 20.8 days.

    **Conclusion & Interpretation:**
    - **Result: ~$2.63/yr (Cost-Bound)**. Fleet cost ~$2.63/yr, Break-even ~5 inferences/day, Battery life ~21 days.
