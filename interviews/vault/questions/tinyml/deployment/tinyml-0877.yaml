title: 'Model Format Conversion: Size Multi-Model TFLM Deployment on Cortex-M7+NPU'
scenario: You must size the Flash and SRAM layout for deploying two TFLM models on a Cortex-M7+Ethos-U55 (480MHz, 512KB SRAM). Model 1 is an always-on keyword spotting model (100K INT8 params, 0.09 MOPs). Model 2 is a speaker verification model (500K INT8 params, 5 MOPs) triggered by the keyword. Both models use the NPU.
question: How should Flash, SRAM, and activation arenas be sized for two triggered TFLM models on Cortex-M7 plus Ethos-U55?
details:
  realistic_solution: 'Keep weights Flash-resident and size SRAM for live tensors, not for the sum of both model files. From the stated inputs, Flash must hold KWS weights 100KB + SV weights 500KB + TFLM/runtime kernels 30KB = 630KB, so choose at least a 1MB Flash budget before adding any product-specific application code. SRAM uses a shared activation arena because the models are not concurrent: max(10KB KWS arena, 80KB SV arena) = 80KB, plus about 30KB TFLM runtime/scratch and ordinary stack/IO budget. That is roughly 110KB plus system buffers, well under 512KB. Do not copy the whole 500KB SV model into SRAM on trigger; 500KB weights + 80KB arena + runtime would exceed 512KB. If the NPU cannot read the SV weights directly from Flash, stage weights layer-by-layer through a small SRAM buffer rather than loading the full SV model.'
  common_mistake: |
    **The Pitfall:** Allocating separate activation arenas for both models simultaneously; since speaker verification is triggered (not concurrent), the activation arena can be shared/reused.
    **The Rationale:** The candidate misunderstands the architecture constraints.
    **The Consequence:** The model is deployed incorrectly or fails to meet system requirements.
  napkin_math: |
    **Assumptions & Constraints:**
    - Models: KWS (100KB Flash, 10KB activations), SV (500KB Flash, 80KB activations).
    - Target: Cortex-M7+Ethos-U55 (512KB SRAM, 480MHz).
    - TFLM Runtime: 30KB.

    **Calculations:**
    - Flash footprint from stated inputs: 100 KB + 500 KB + 30 KB = 630 KB.
    - Flash choice: use at least a 1 MB Flash budget before adding product-specific application code.
    - Shared SRAM arena: max(10 KB, 80 KB) = 80 KB.
    - SRAM runtime budget: 80 KB arena + 30 KB TFLM runtime/scratch = 110 KB, plus stack and IO buffers.
    - Invalid full-load trigger path: 500 KB SV weights + 80 KB arena + 30 KB runtime = 610 KB > 512 KB SRAM.

    **Conclusion & Interpretation:**
    - **Result: 630 KB Flash from the stated model/runtime inputs and about 110 KB core SRAM**. The design fits SRAM only if SV weights remain Flash-resident or are staged layer-by-layer; staging the whole SV model in SRAM is not feasible.
