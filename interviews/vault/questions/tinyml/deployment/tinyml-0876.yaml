title: 'Model Format Conversion: Optimize TFLM Model to Fit Within MCU Flash Constraint'
scenario: A TFLite Micro anomaly detection model (300K INT8 params, 3 MOPs) must fit in 256KB Flash on ESP32-S3 (stored in internal Flash for XIP). Current .tflite file is 310KB. The application binary uses 80KB. Total is 390KB, overflowing by 134KB.
question: What is the smallest set of Flash-saving optimizations that makes the image fit in 256KB while keeping expected accuracy loss under 2%?
details:
  realistic_solution: 'Treat the 310KB baseline as the full .tflite artifact that must be stored in Flash alongside the 80KB application binary. The model budget is 256KB - 80KB app = 176KB, so the current artifact is 134KB too large. Single changes are not enough: trimming 40KB from runtime/app code would still leave 350KB total, and compressing the 310KB INT8 file by 20% would still be 248KB model + 80KB app = 328KB. A 30% architecture reduction gives about 217KB before compression, still too large by itself. Combining that moderate reduction with 20% file compression yields 217KB * 0.8 = 174KB, and 174KB + 80KB = 254KB total. This is the smallest supported combination under the stated size assumptions; the <2% accuracy condition still has to be confirmed by retraining/validation, not inferred from file size alone.'
  common_mistake: |
    **The Pitfall:** Applying unstructured weight pruning and expecting the .tflite file size to reduce proportionally.
    **The Rationale:** Candidates forget that unstructured pruning does not natively compress the file format.
    **The Consequence:** The model still exceeds the Flash constraint without active compression.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline .tflite file is 310 KB, constraint is 256 KB total Flash.
    - Application binary uses 80KB.
    - INT8 quantized weights compress poorly (~20% reduction with Zlib).
    - Candidate moderate architecture reduction reduces the full .tflite artifact size by 30%; its <2% accuracy loss must be validated after retraining.

    **Calculations:**
    - Available model budget = 256 KB - 80 KB = 176 KB.
    - Current overflow = 310 KB + 80 KB - 256 KB = 134 KB.
    - Compression only: 310 KB * 0.8 = 248 KB model, still too large.
    - 30% model reduction only: 310 KB * 0.7 = 217 KB model, still too large.
    - Reduction plus compression: 217 KB * 0.8 = 173.6 KB model.
    - Total Flash usage: 173.6 KB + 80 KB = 253.6 KB.

    **Conclusion & Interpretation:**
    - **Result: 253.6 KB (Storage-Bound)**. Moderate structural reduction plus compression fits under 256 KB; it is the smallest supported size combination, with the 2% accuracy-loss claim requiring validation rather than arithmetic alone.
