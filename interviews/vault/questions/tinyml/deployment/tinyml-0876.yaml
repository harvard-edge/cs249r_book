title: 'Model Format Conversion: Optimize TFLM Model to Fit Within MCU Flash Constraint'
scenario: A TFLite Micro anomaly detection model (300K INT8 params, 3 MOPs) must fit in 256KB Flash on
  ESP32-S3 (stored in internal Flash for XIP). Current .tflite file is 310KB. The application binary uses
  80KB. Total is 390KB, overflowing by 134KB.
question: How would you quantify the minimum combination of optimizations needed without exceeding 2%
  accuracy degradation?
details:
  realistic_solution: 'Options: (1) Reduce TFLM op kernels: saves 40KB Flash. (2) Model architecture reduction:
    reduce filter counts 50% -> 75K params -> 75KB Flash. New model: 195KB but >2% accuracy drop. (3)
    Moderate reduction + Zlib compress: compress 210KB INT8 model by 20% to 168KB. Boot time: decompress
    ~10ms. Total Flash: 168+80 = 248KB. Best option.'
  common_mistake: '**The Pitfall:** Applying unstructured weight pruning and expecting the .tflite file
    size to reduce proportionally.

    **The Rationale:** Candidates forget that unstructured pruning does not natively compress the file
    format.

    **The Consequence:** The model still exceeds the Flash constraint without active compression.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Baseline model is 300KB INT8, constraint is 256KB total Flash.

    - Application binary uses 80KB.

    - INT8 quantized weights compress poorly (~20% reduction with Zlib).


    **Calculations:**

    - Add reduced model (30% param reduction = 210K INT8 = 210KB).

    - Compress reduced model: 210KB * 0.8 = 168KB.

    - Total Flash usage: 168KB (model) + 80KB (app) = 248KB.


    **Conclusion & Interpretation:**

    - **Result: 248 KB (Storage-Bound)**. Combining moderate structural reduction with Zlib decompression
    safely fits the model.'
