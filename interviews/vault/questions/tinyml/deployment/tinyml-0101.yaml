title: The Model Calibration Drift
scenario: You train an anomaly detection model for industrial motors using a high-end lab accelerometer. You achieve 99% accuracy. You deploy the model to the factory floor using a cheap $2 MEMS accelerometer. The model immediately fires a continuous stream of false positives. Both sensors are 16-bit.
question: Why does moving from a +/-2g lab accelerometer to a +/-8g MEMS sensor cause continuous false positives?
details:
  realistic_solution: 'You skipped sensor sensitivity calibration. Lab accelerometer (±2g range): 1 LSB = 0.061 mg. Factory MEMS (±8g range): 1 LSB = 0.244 mg — 4x coarser. Feeding raw integer ADC values means the model interprets every vibration as 4x more intense than reality, triggering continuous false positives. The model learned thresholds calibrated to the lab sensor''s scale. Fix: convert raw integers to physical units (g) before inference using the sensor''s documented sensitivity. Also: match noise characteristics — the cheap sensor has 3-5x higher noise floor, so apply a matched low-pass filter to approximate the lab sensor''s noise profile.'
  common_mistake: |
    **The Pitfall:** Blaming the noise floor of the cheap sensor.
    **The Rationale:** Candidates correctly identify the noise difference but completely miss the primary catastrophic scaling mismatch.
    **The Consequence:** Applying low-pass filters that fail to resolve the continuous false positives.
  napkin_math: |
    **Assumptions & Constraints:**
    - Lab Sensor: ±2g range, 16-bit (1 LSB = 0.061 mg).
    - Factory Sensor: ±8g range, 16-bit (1 LSB = 0.244 mg).

    **Calculations:**
    - Ratio: 0.244 / 0.061 = 4.

    **Conclusion & Interpretation:**
    - **Result: 4x Scaling Mismatch (Calibration-Bound).** The model interprets raw integers as 4 times more intense, triggering continuous false positives.
