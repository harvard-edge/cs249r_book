title: The Unsigned Integer Wrap
scenario: Your predictive maintenance system uses a Cortex-M0+ to monitor motor vibrations.
  It keeps a running tally of anomalies in a `uint16_t` counter and uploads the total
  to the cloud every week. After about 22 months, the cloud dashboard suddenly reports
  that the factory had exactly 65,500 fewer anomalies this week than last week. The
  factory hasn't changed.
question: Why does a `uint16_t` anomaly counter make the cloud report 65,500 fewer
  events after about 22 months?
details:
  realistic_solution: 'The uint16_t counter wraps at 65,535. At 100 anomalies/day,
    it reaches maximum in 655 days (~21.5 months), then wraps to 0. The cloud sees
    this week''s count (near 0) minus last week''s count (near 65,535) = a massive
    apparent drop. Fix: use uint32_t (wraps at 4.3 billion — 117,000 years at 100/day),
    or better, send per-interval delta counts instead of cumulative totals. Also implement
    server-side wrap detection: if count decreases by >50%, assume overflow and add
    65,536.'
  common_mistake: '**The Pitfall:** Blaming the ML model for a sudden, massive drop
    in anomalies.

    **The Rationale:** Engineers assume model drift or hardware degradation without
    considering basic integer overflow mechanics on long-running edge devices.

    **The Consequence:** Wasting time retraining the model while the root cause is
    a simple data type failure.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Data Type: `uint16_t`.

    - Anomaly Rate: ~100 anomalies/day.


    **Calculations:**

    - Maximum Value: 2^16 - 1 = 65,535.

    - Days to Overflow: 65,535 / 100 = 655.35 days.

    - Months to Overflow: 655.35 / 30.4 days/month = ~21.55 months.


    **Conclusion & Interpretation:**

    - **Result: Logic-Bound**. The 16-bit integer physically overflows back to zero
    after ~22 months, corrupting the cumulative dashboard.

    '
