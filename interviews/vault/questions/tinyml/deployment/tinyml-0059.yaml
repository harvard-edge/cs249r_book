title: FOTA Update Integrity Verification
scenario: Your predictive maintenance sensors receive firmware updates over-the-air (FOTA) containing a new TFLite Micro model. The bootloader verifies the binary hash (SHA-256) before swapping partitions.
question: Why is verifying the binary hash insufficient for ML models, and how do you implement functional model attestation (inference on a golden test input) to prove the model's math is intact?
details:
  realistic_solution: A binary hash only proves the file arrived exactly as it was sent. It does *not* prove that the ML model will actually execute correctly on the device. The new model might use a TFLite operator (e.g., `RESIZE_NEAREST_NEIGHBOR`) that isn't compiled into the device's specific TFLite Micro runtime, causing a hard fault on the first real inference. Or, a quantization bug on the build server might have produced a model that hashes perfectly but outputs garbage predictions.
  common_mistake: '"If the SHA-256 hash matches, the file hasn''t been corrupted, so the model is safe to run." This assumes the model was compiled correctly and the runtime on the device is perfectly compatible with the new model''s operators.'
  napkin_math: |
    **Assumptions & Constraints:**
    - SHA-256 on a 200 KB model takes ~15ms on a Cortex-M4.
    - Functional attestation (running one inference) takes ~50ms.
    - Golden input (32x32 INT8 spectrogram) takes 1 KB of flash.
    - Expected output takes 4 bytes.

    **Calculations:**
    - Total boot-time penalty = 15ms + 50ms = 65ms.
    - Flash overhead = 1 KB.

    **Conclusion & Interpretation:**
    - **Result: 65ms boot penalty, 1 KB flash (Integrity-Bound)**. For a minimal cost, you completely eliminate the risk of bricking a remote sensor with a mathematically broken model update.
