title: Hard-Real-Time STM32H7 Camera Inspection Schedule
scenario: 'You''re building a smart factory quality inspection system on an STM32H7 (Cortex-M7, 480 MHz, 1 MB SRAM, 2 MB flash). The system inspects products on a conveyor belt moving at 0.5 m/s. Each product is 10 cm long, giving a 200 ms window per product. The pipeline is: camera capture (DCMI + DMA) -> preprocessing -> inference -> actuator trigger.'
question: How would you schedule camera DMA, preprocessing, inference, and GPIO actuation within a 200 ms conveyor window to guarantee zero missed products?
details:
  realistic_solution: Use DCMI+DMA double buffering so image capture does not block CPU compute. For each product window, schedule capture from 0-3 ms into buffer A, preprocessing from 3-8 ms, INT8 CNN inference from 8-9.6 ms, and GPIO actuation by 10.1 ms. While the CPU processes buffer A, DMA can fill buffer B for the next product. The hard real-time guarantee comes from budgeting WCET plus ISR/DMA jitter against the 200 ms product window; with the stated stage times, the single-pass pipeline uses 10.1 ms and leaves 189.9 ms of slack for jitter, queue handoff, and actuator timing.
  common_mistake: |
    **The Pitfall:** Relying on average execution time instead of WCET analysis.
    **The Rationale:** Candidates assume that if inference takes less than 200 ms on average, the system is safe.
    **The Consequence:** Pipeline jitter or a single anomalous frame causes sequential blocking, missing the 200 ms hard deadline and letting defective products pass.
  napkin_math: |
    **Assumptions & Constraints:**
    - Conveyor window: 200 ms.
    - DCMI+DMA capture: 3 ms.
    - Preprocessing: 5 ms.
    - CNN Inference: 1.6 ms.
    - Actuation: 0.5 ms.

    **Calculations:**
    - Single Pass WCET: 3 + 5 + 1.6 + 0.5 = 10.1 ms.
    - Slack: 200 ms - 10.1 ms = 189.9 ms.
    - Utilization: 10.1 ms / 200 ms = 5.05%.

    **Conclusion & Interpretation:**
    - **Result: 10.1 ms WCET (Compute-Abundant)**. The double-buffered single-pass schedule fits easily inside the 200 ms window; correctness still depends on reserving slack for ISR jitter, DMA completion, and actuator latency.
