title: 'TinyML TCO Diagnosis: Battery Life Mismatch Root Cause'
scenario: '1000 deployed Cortex-M4 sensors (168MHz, 256KB SRAM, 4500mAh battery) were designed for 1-year battery life at ~500uA avg current budget. After deployment, batteries die in 6 weeks. The application log shows inference running at 10 FPS instead of 0.1 FPS (design spec).'
question: 'How would you diagnose the root cause and calculate the actual vs expected average current?'
details:
  realistic_solution: 'Design: 0.1 FPS (1 inference/10s). Expected: 30mA active for 10ms inference + 0.03mA sleep for 9990ms. Avg = 30mA*(10ms/10s) + 30uA*(9990ms/10s) = 30uA + 30uA = 60uA = 0.060mA for the ML subsystem. With a 4500mAh battery: life = 4500mAh / 0.060mA = 75,000 hours = 8.56 years (well within the 1-year 500uA budget). Actual 10 FPS: inference 10x/second. Avg I = 30mA*10% + 30uA*90% = 3.027mA. Life: 4500mAh / 3.027mA = 1486 hr = 61.9 days ~ 9 weeks. Observed: 6 weeks. Root cause: firmware timer bug (10 FPS instead of 0.1 FPS).'
  common_mistake: |
    **The Pitfall:** Blaming the hardware without checking firmware configuration.
    **The Rationale:** Candidates assume the hardware model is flawed when observing a 100x battery life discrepancy, rather than suspecting a firmware timer misconfiguration.
    **The Consequence:** Wasting time redesigning hardware or models instead of fixing a simple firmware bug.
  napkin_math: |
    **Assumptions & Constraints:**
    - Design (0.1 FPS): Avg I = (30mA * 0.001) + (0.03mA * 0.999) = 0.060mA.
    - Actual (10 FPS): Avg I = (30mA * 0.1) + (0.03mA * 0.9) = 3.027mA.

    **Calculations:**
    - Expected Life: 4500mAh / 0.060mA = 75,000 hours = 8.56 years.
    - Actual Life: 4500mAh / 3.027mA = 1486 hours = ~61.9 days (9 weeks).

    **Conclusion & Interpretation:**
    - **Result: 61.9 days (Power-Bound)**. The timer bug fundamentally alters the battery life.
