title: 'TinyML TCO Evaluation: Make vs Buy for TinyML Model Development'
scenario: 'A company needs a gesture recognition TinyML model. Option A: license a pre-trained model ($5K/year, 200KB SRAM, 95% accuracy). Option B: develop in-house (2 ML engineers at $150K/year each, 3 months development = $75K, 180KB SRAM, 92% accuracy, 0 royalties).'
question: 'How would you calculate 3-year TCO for each and identify when in-house becomes cheaper?'
details:
  realistic_solution: 'Option A: License: $5K*3=$15K. Engineering time to integrate: 0.25 engineer * $150K * 1/4yr = $9.375K. Total 3yr: $24.375K. Option B: Development: 2 engineers * $150K * 0.25yr = $75K. Maintenance (0.5 FTE/yr): $75K/yr * 3yr = $225K. Engineering integration (same): $9.375K. Total 3yr: $75K+$225K+$9.375K=$309.375K. Option A is 12.7x cheaper over 3yr! Break-even: License $5K/yr vs maintenance $75K/yr. License wins indefinitely ($5K << $75K). In-house only makes sense at very high scale (>100 products needing the model) where license fee stacks up vs fixed maintenance cost.'
  common_mistake: |
    **The Pitfall:** Ignoring the ongoing maintenance cost of the in-house model.
    **The Rationale:** Teams focus only on the upfront 3-month development cost ($75K) versus the recurring license fee ($5K/yr).
    **The Consequence:** The company builds a model that decays in accuracy over time, forcing unplanned engineering allocation to retrain it, ballooning the true TCO far past the license option.
  napkin_math: |
    **Assumptions & Constraints:**
    - Option A (License): $5K/year, 0.25 FTE for integration.
    - Option B (In-house): 2 FTEs for 3 months ($75K), 0.5 FTE/year maintenance, 0.25 FTE integration.
    - Engineer salary: $150K/year.
    - Time horizon: 3 years.

    **Calculations:**
    - Option A License Cost: $5,000 × 3 = $15,000.
    - Option A Integration: 0.25 × $150,000 × 0.25 yr = $9,375.
    - Option A Total: $15,000 + $9,375 = $24,375.
    - Option B Dev Cost: 2 × $150,000 × 0.25 yr = $75,000.
    - Option B Maintenance: 0.5 × $150,000 × 3 yr = $225,000.
    - Option B Total: $75,000 + $225,000 + $9,375 = $309,375.
    - TCO Ratio: $309,375 / $24,375 ≈ 12.7.

    **Conclusion & Interpretation:**
    - **Result: 12.7× Cheaper to License (Opex-Bound)**. Because the $75K annual maintenance of the in-house model vastly exceeds the $5K annual license, in-house is never cheaper at any time horizon.
