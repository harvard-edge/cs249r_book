title: OTA Memory Alignment Faults
scenario: 'A microcontroller downloads a flatbuffer model via an OTA update. Appending the blob dynamically to the heap causes a HardFault upon inference.'
question: 'Evaluate the memory layout and identify the low-level addressing error crashing the CPU.'
details:
  realistic_solution: 'Flatbuffers rely on direct memory mapping and pointer arithmetic. Microprocessors strictly require multi-byte variables (like floats or 32-bit integers) to be aligned to 4-byte or 8-byte memory boundaries. If the OTA blob is placed arbitrarily on the heap without ensuring correct word-alignment, the CPU throws an unaligned access hardware fault.'
  common_mistake: |
    **The Pitfall:** Suspecting network corruption of the weights.
    **The Rationale:** Candidates ignore the purely local memory-alignment requirements of the CPU architecture.
    **The Consequence:** Time is wasted verifying checksums instead of fixing pointer arithmetic.
  napkin_math: |
    **Assumptions & Constraints:**
    - Flatbuffers rely on direct memory pointers (no deserialization overhead).
    - 32-bit Cortex-M processors require multi-byte types to be 4-byte or 8-byte aligned.

    **Calculations:**
    - Evaluate model heap address `addr`.
    - Check alignment condition: `addr % 4`.

    **Conclusion & Interpretation:**
    - **Result: HardFault (Memory-Bound)**. If the dynamic heap placement leaves `addr % 4 != 0`, the hardware instantly throws an unaligned access fault during inference.
