title: 'TinyML TCO Design: Cortex-M7+Ethos-U55 for Industrial TinyML'
scenario: 'You are designing a cost model for deploying Cortex-M7+Ethos-U55 (480MHz, 512KB SRAM, NPU) vs bare Cortex-M4 (168MHz, 256KB SRAM) for vibration-based anomaly detection in 500 industrial pumps. The model is MobileNetV2-adapted (600K ops INT8) and runs inference every 1 second. The NPU enables INT8 inference natively, while the M4 must use INT16 or software INT8. Use these cost inputs: M4 hardware $5, M7+Ethos hardware $15, 3.3V supply, electricity at $0.10/kWh, M4 active 30mA and sleep 0.05mA, M7+Ethos NPU active 5mA and MCU idle 1mA.'
question: Using the stated hardware, current, voltage, and electricity-rate inputs, how would you calculate the 5-year Total Cost of Ownership (TCO) and determine the most cost-effective architecture?
details:
  realistic_solution: 'M4 (600K ops at 168MHz, 5 CPI avg): cycles = 600K*5=3M cycles. Time = 3M/168M=17.9ms. At 30mA active, duty=1.79%. Avg current = 30mA*0.0179 + 0.05mA*0.9821 = 0.586mA. M7+Ethos: NPU runs 600K ops at ~50MHz, so time = 600K/50M=12ms. Avg current = 5mA*0.012 + 1mA*0.988 = 1.048mA. At 3.3V for 43,800 hours over 5 years, energy cost is about $0.0085 per M4 node and $0.015 per M7+Ethos node, so hardware cost dominates. Fleet TCO: M4 = 500*($5+$0.0085) ≈ $2,504; M7+Ethos = 500*($15+$0.015) ≈ $7,508. The M4 is the lower-TCO choice if its 17.9ms latency and software INT8/INT16 accuracy are acceptable; choose M7+Ethos only if latency, model compatibility, or accuracy constraints require the NPU.'
  common_mistake: |
    **The Pitfall:** Assuming the NPU doesn't change inference power vs CPU, when in fact the Ethos-U55 NPU runs at a lower power state than the full Cortex-M7 CPU, reducing average power during inference significantly.
    **The Rationale:** The candidate misunderstands the architecture constraints.
    **The Consequence:** The model is deployed incorrectly or fails to meet system requirements.
  napkin_math: |
    **Assumptions & Constraints:**
    - M4: 168MHz, Active 30mA, Deep sleep 0.05mA. Inference: 17.9ms/sec (Duty: 1.79%).
    - M7+Ethos: NPU 50MHz at 5mA, M7 idle 1mA. Inference: 12ms/sec (Duty: 1.2%).
    - Hardware Cost: M4 = $5, M7+Ethos = $15. Deployment = 500 pumps. Supply = 3.3V. Electricity = $0.10/kWh. 5 years = 43,800 hours.

    **Calculations:**
    - M4 Avg Power: (0.0179 * 30mA) + (0.9821 * 0.05mA) = 0.537 + 0.049 = 0.586mA.
    - M7+Ethos Avg Power: (0.012 * 5mA) + (0.988 * 1mA) = 0.06 + 0.988 = 1.048mA.
    - M4 5yr energy: 0.586mA * 3.3V * 43,800h / 1000 = 84.7Wh = 0.0847kWh, costing $0.0085 per node.
    - M7+Ethos 5yr energy: 1.048mA * 3.3V * 43,800h / 1000 = 151.5Wh = 0.1515kWh, costing $0.015 per node.
    - Total TCO M4: 500 * ($5 + $0.0085) ≈ $2,504.
    - Total TCO M7: 500 * ($15 + $0.015) ≈ $7,508.

    **Conclusion & Interpretation:**
    - **Result: M4 wins by about $5,004 on TCO (Cost-Bound)**. Hardware dominates the 5-year cost; choose the NPU path only if the M4 cannot meet latency, accuracy, or INT8 deployment constraints.
