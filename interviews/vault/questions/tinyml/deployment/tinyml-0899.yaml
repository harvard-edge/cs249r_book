title: 'TinyML TCO Diagnosis: Why TinyML Deployment Costs 10x Budget'
scenario: 'A startup budgeted $100K to deploy 1000 Cortex-M4 TinyML sensors for predictive maintenance ($50 hardware, $50 site visit per unit). They did not budget for replacements or OTA. At month 6, costs are at $197.5K with 600 devices deployed.'
question: 'Which cost overruns explain a $197.5K spend at 60% deployment for 1000 Cortex-M4 sensors, and what is the final projection?'
details:
  realistic_solution: 'Budget: 1000 units * ($50 HW + $50 visit) = $100K. Actual at 60% deployed (600 units): $197.5K. Root cause breakdown for the 600 units: Base HW = 600*$50 = $30K. Base visits = 600*$200 = $120K. Failures = 15% of 600 = 90 units. Failure cost = 90*($50+$200) = $22.5K. OTA = $25K. Total = $30K+$120K+$22.5K+$25K = $197.5K. Projected final cost for 1000 units: Base HW = $50K. Base visits = 1000*$200 = $200K. Failures = 150*$250 = $37.5K. OTA = $25K. Final projected total: $312.5K. The primary driver is the 4x underestimation of site visit costs, heavily penalizing both initial deployment and failures.'
  common_mistake: |
    **The Pitfall:** Attributing all cost overruns to hardware failure.
    **The Rationale:** Candidates do not systematically quantify each root cause or separate one-time OTA costs from per-unit run-rates.
    **The Consequence:** The final projection is inaccurate and business strategy misaligned.
  napkin_math: |
    **Assumptions & Constraints:**
    - 600 units deployed at Month 6. Hardware cost is $50/unit, site visit is $200/unit.
    - Failure rate is 15%.
    - OTA infrastructure cost is fixed at $25K.

    **Calculations:**
    - Base HW & visits for 600 units: (600 * $50) + (600 * $200) = $30K + $120K = $150K.
    - Failure replacement cost (90 units): 90 * ($50 + $200) = $22.5K.
    - Month 6 total: $150K + $22.5K + $25K = $197.5K.
    - Projected 1000 units: (1000 * $50) + (1000 * $200) + (150 * $250) + $25K = $312.5K.

    **Conclusion & Interpretation:**
    - **Result: $312.5K (Budget-Bound)**. The final projection exceeds the $100K budget by $212.5K due to drastically underestimated site visit and failure costs.
