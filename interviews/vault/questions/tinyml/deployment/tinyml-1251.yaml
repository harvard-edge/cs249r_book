title: ESP32-S3 Flash Partitioning for Model OTA
scenario: You are deploying a voice assistant on an ESP32-S3 (240 MHz dual-core Xtensa, 512 KB SRAM, 8 MB PSRAM, WiFi/BLE) equipped with an 8 MB SPI flash. The system requires a 1.8 MB application firmware and a 3.2 MB INT8 quantized audio model using the vector extensions. You must design an OTA update scheme over WiFi that allows independent updates of the firmware and model with rollback capabilities.
question: Is independent firmware and model rollback possible within 8 MB flash, and what deployment tradeoff is required if it is not?
details:
  realistic_solution: |
    The stated requirement does not fit if both artifacts need independent A/B rollback in the 8 MB flash. Firmware A/B consumes 3.6 MB and model A/B consumes 6.4 MB before partition tables, NVS, certificates, OTA metadata, or crash logs, so the safe layout exceeds the chip. PSRAM can buffer and verify chunks during download, but it is volatile and cannot provide durable rollback storage. A feasible constrained deployment must relax one requirement: either use firmware A/B plus one active model partition with recovery re-download but no model rollback, reduce/compress the model enough to add a second model slot, or choose a larger flash part.
  common_mistake: |
    **The Pitfall:** Defaulting to a monolithic A/B partitioning scheme.
    **The Rationale:** Candidates fail to decouple firmware from the ML model, resulting in flash requirements that physically exceed the 8 MB chip.
    **The Consequence:** The OTA update system cannot be deployed on the target hardware without upgrading to a larger, more expensive flash chip.
  napkin_math: |
    **Assumptions & Constraints:**
    - Firmware size is 1.8 MB, INT8 model is 3.2 MB.
    - Total Flash is 8.0 MB.
    - PSRAM is volatile and cannot count as rollback storage.

    **Calculations:**
    - Evaluate Monolithic A/B capacity: 2 * (1.8 MB + 3.2 MB) = 10.0 MB (fails 8.0 MB constraint).
    - Independent decoupled rollback: 2 * 1.8 MB firmware + 2 * 3.2 MB model = 10.0 MB (also fails).
    - Firmware A/B plus one active model: 3.6 MB + 3.2 MB = 6.8 MB before metadata, but this does not provide model rollback.
    - Remaining raw flash in the compromised layout: 8.0 MB - 6.8 MB = 1.2 MB for partition table, NVS, certificates, OTA metadata, logs, and slack.

    **Conclusion & Interpretation:**
    - **Result: requirement does not fit with independent rollback for both firmware and model.** The 6.8 MB layout can support firmware rollback plus model recovery re-download, but it is not an atomic independent model rollback scheme.
