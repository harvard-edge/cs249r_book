title: 'TinyML TCO Specification: Specify Power Architecture for 5-Year Battery TinyML Sensor'
scenario: Specify the power architecture for a TinyML sensor targeting a 5-year battery life from a 3000mAh battery. The sensor runs vibration anomaly detection every 30 seconds (10ms inference at 5mA), syncs data via BLE every 5 minutes (50ms at 10mA), and maintains an RTC for timestamping (2uA).
question: How would you calculate required average current budget and specify power management strategy?
details:
  realistic_solution: To achieve a 5-year operational lifespan, the system's absolute maximum average current draw is 68.5uA. The dynamic ML inference and BLE payloads represent tiny duty cycles, contributing nominally to the average. The true bottlenecks are the static quiescent currents (Iq) of the voltage regulator and the MCU deep sleep state. Specifying an ultra-low quiescent current LDO (e.g., TPS62840, Iq=60nA) and aggressively optimizing the deep sleep floor enables a theoretical battery life exceeding 14 years, providing massive safety margins for temperature fluctuations and battery self-discharge.
  common_mistake: |
    **The Pitfall:** Ignoring the quiescent current of the power management ICs and relying purely on active compute metrics.
    **The Rationale:** Engineers heavily focus on minimizing neural network MACs and active time while ignoring the continuous "off-state" leakage.
    **The Consequence:** A standard voltage regulator (Iq = 50uA) consumes the entire 5-year battery budget purely in standby mode, silently halving the sensor's field life.
  napkin_math: |
    **Assumptions & Constraints:**
    - Battery: 3000 mAh. Target: 5 years (43,800 hr).
    - Duty Cycles: Inference 10ms/30s. BLE 50ms/300s.

    **Calculations:**
    - Required Average: 3000 mAh / 43,800 hr = 68.5 uA.
    - NPU Average: (5 mA * 10 ms) / 30,000 ms = 1.67 uA.
    - BLE Average: (10 mA * 50 ms) / 300,000 ms = 1.67 uA.
    - Total Static + Dynamic: RTC (2 uA) + MCU Sleep (3 uA) + NPU (1.67 uA) + BLE (1.67 uA) + VREG (5 uA) + Wakeup (1 uA) = ~14.3 uA.

    **Conclusion & Interpretation:**
    - **Result: 14.3 uA (Leakage-Dominated Budget)**. The 14.3 uA draw beats the 68.5 uA budget with a 4.7x margin.
