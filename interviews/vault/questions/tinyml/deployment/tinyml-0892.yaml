title: Specify a Safety-Critical TFLM Deployment Checklist for a Medical MCU
scenario: A TFLite Micro model is being deployed on a 480MHz Cortex-M7 MCU paired with an Ethos-U55-class microNPU and 512KB SRAM for use in a safety-critical medical device (FDA Class II).
question: How would you specify a production deployment checklist for a TFLite Micro model on this Cortex-M7 plus microNPU medical-device platform?
details:
  realistic_solution: 'Checklist: (1) Functional accuracy: run a representative golden set and document max error, confusion deltas, and accepted failure modes. (2) Arena bounds: verify tensor-arena high-water marks, inject canary bytes, and assert no overflow or use-after-free. (3) Determinism: bit-identical output for the same firmware/input pair across repeated runs. (4) Timing: measure per-inference latency and confirm P99 < 10ms on target silicon; do not convert that threshold into a cumulative runtime total. (5) Reliability: run a 24-hour HIL soak at 360 Hz, plus watchdog/reset and fault-injection tests. (6) Safety/release evidence: require rollback/upgrade validation, traceability to requirements, and environmental/EMC checks before sign-off. (7) Power/thermal: confirm average and peak current under representative workloads.'
  common_mistake: |
    **The Pitfall:** Defining a software-only checklist without hardware-in-the-loop (HIL) tests.
    **The Rationale:** Candidates rely on emulation, missing MCU-specific issues like SRAM corruption, interrupt latency spikes, and DMA conflicts.
    **The Consequence:** The device fails FDA certification or experiences catastrophic runtime failures in production due to silent arena bounds overflows.
  napkin_math: |
    **Assumptions & Constraints:**
    - 360 Hz HIL soak test for 24 hours.
    - Latency limit P99 < 10ms.

    **Calculations:**
    - HIL soak: 24 hours * 3600 s/hr * 360 inferences/s = 31,104,000 inference opportunities.
    - P99 latency is evaluated per inference against the 10 ms threshold; the threshold is not accumulated across the soak.

    **Conclusion & Interpretation:**
    - **Result: 31.1M inference opportunities (Reliability/Verification-Bound)**. Zero overflows, watchdog resets, or out-of-spec latency samples across the soak are required for release evidence.
