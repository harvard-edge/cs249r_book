title: Asymmetric OTA Architecture for Dual-Core ML
scenario: You are designing an OTA update architecture for a predictive maintenance sensor. Your base firmware requires 450 KB of flash, and the ML model weights require 300 KB. The device draws ~5mA active current during BLE RX.
question: How should an edge MCU structure a fail-safe OTA update for firmware and model payloads within exactly 1 MB Flash?
details:
  realistic_solution: |
    The optimal architecture decouples the ML model from the application firmware using an asymmetric single-staging-slot scheme: bootloader, primary firmware, primary model, and one shared 250 KB OTA slot. Every update artifact must be signed, versioned, and small enough to fit in the staging slot before it is accepted. A firmware update is delivered as a compressed/delta patch of at most 250 KB, verified in the slot, applied to the inactive pages of the primary firmware region with a resumable copy protocol, then boot-marked only after post-write hash validation. A model update follows the same rule for the model region. If power fails before validation and commit, the bootloader keeps the previous firmware/model pair; if validation fails after download, the slot is erased and the current image remains active.
  common_mistake: |
    **The Pitfall:** Symmetrically dividing Flash for A/B updates.
    **The Rationale:** Candidates instinctively suggest a classic A/B dual-bank scheme, halving the 1 MB flash into two 500 KB partitions.
    **The Consequence:** They fail to realize that 450 KB firmware + 300 KB model = 750 KB, which strictly prohibits an A/B scheme in a 1 MB limit, leading to an impossible architecture.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Flash: 1024 KB.
    - Primary Firmware: 450 KB. Primary Model: 300 KB. Bootloader: ~24 KB.
    - BLE throughput: ~50 KB/s. Active current: ~5mA.

    **Calculations:**
    - Flash Used: 24 + 450 + 300 = 774 KB.
    - Remaining OTA Slot: 1024 - 774 = 250 KB.
    - Maximum accepted staged artifact: <= 250 KB including patch metadata, signature, and manifest.
    - Full model image does not fit in the slot: 300 KB - 250 KB = 50 KB too large.
    - Minimum model artifact reduction before metadata: 50 KB / 300 KB = 16.7%, so real patches need more than 16.7% reduction after signature/manifest overhead.
    - Download time for a full slot: 250 KB / 50 KB/s = 5 seconds.
    - Energy cost: 5 mA * (5 s / 3600 s) = ~0.007 mAh.

    **Conclusion & Interpretation:**
    - **Result: 250 KB OTA slot (Storage-Bound)**. Fail-safe OTA is possible only for signed delta/compressed firmware or model artifacts that fit the shared slot; full 450 KB firmware or 300 KB model replacement images cannot be staged in this 1 MB layout.
