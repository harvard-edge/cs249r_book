title: Asymmetric OTA Architecture for Dual-Core ML
scenario: You are designing an OTA update architecture for a predictive maintenance sensor. Your base firmware requires 450 KB of flash, and the ML model weights require 300 KB. The device draws ~5mA active current during BLE RX.
question: How should an edge MCU structure a fail-safe OTA update for firmware and model payloads within exactly 1 MB Flash?
details:
  realistic_solution: 'The optimal architecture decouples the ML model from the application firmware using an asymmetric partitioning scheme. Allocate separate flash regions for the primary firmware and the primary model, leaving a smaller, shared OTA download slot. By compressing the ML model payload or using delta updates (bsdiff), the update fits into the smaller OTA slot. The net core receives the BLE stream and pushes it into a dedicated ring buffer in SRAM, allowing the app core to read from SRAM and write to the flash OTA slot without dropping connection events.'
  common_mistake: |
    **The Pitfall:** Symmetrically dividing Flash for A/B updates.
    **The Rationale:** Candidates instinctively suggest a classic A/B dual-bank scheme, halving the 1 MB flash into two 500 KB partitions.
    **The Consequence:** They fail to realize that 450 KB firmware + 300 KB model = 750 KB, which strictly prohibits an A/B scheme in a 1 MB limit, leading to an impossible architecture.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Flash: 1024 KB.
    - Primary Firmware: 450 KB. Primary Model: 300 KB. Bootloader: ~24 KB.
    - BLE throughput: ~50 KB/s. Active current: ~5mA.

    **Calculations:**
    - Flash Used: 24 + 450 + 300 = 774 KB.
    - Remaining OTA Slot: 1024 - 774 = 250 KB.
    - Model Compression requirement: 300 KB -> 250 KB (16.6% reduction).
    - Download time: 250 KB / 50 KB/s = 5 seconds.
    - Energy cost: 5mA * (5s / 3600s) = ~0.007 mAh.

    **Conclusion & Interpretation:**
    - **Result: 250 KB OTA slot (Storage-Bound)**. An asymmetric architecture with compressed delta-updates (bsdiff) pushed into a shared 250 KB OTA slot is physically required to fit within the 1 MB boundary.
