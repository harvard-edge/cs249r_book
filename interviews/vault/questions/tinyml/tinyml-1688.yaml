title: TinyML Memory Paging Analysis
scenario: A CNN for image patch classification requires 300KB of memory, but the Cortex-M4
  only has 256KB of SRAM. Flash memory is available but slow.
question: Analyze how to implement layer-wise memory overlay to execute this model
  within the SRAM limit.
details:
  realistic_solution: Divide the network execution into stages using a ping-pong buffer.
    Keep static weights in Flash and stream them into a small SRAM buffer during execution.
    Reuse the same SRAM activation buffers for consecutive layers (memory overlay)
    to ensure peak memory never exceeds the 256KB limit.
  common_mistake: Attempting to copy all model weights from Flash to SRAM at initialization,
    causing an immediate hard fault.
  napkin_math: Peak SRAM = Activation N + Activation N+1 < 256 KB.
