title: 'TinyML Memory Paging Analysis'
scenario: 'A CNN for image patch classification requires 300KB of memory, but the Cortex-M4 only has 256KB of SRAM. Flash memory is available but slow.'
question: 'How can layer-wise memory overlay be implemented to execute this model within the SRAM limit?'
details:
  realistic_solution: 'Divide the network execution into stages using a ping-pong buffer. Keep static weights in Flash and stream them into a small SRAM buffer during execution. Reuse the same SRAM activation buffers for consecutive layers (memory overlay) to ensure peak memory never exceeds the 256KB limit.'
  common_mistake: 'Attempting to copy all model weights from Flash to SRAM at initialization, causing an immediate hard fault.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Required memory: 300KB. SRAM: 256KB.

    **Calculations:**
    - Stream static weights from Flash.
    - Allocate Activation N + Activation N+1 in SRAM.
    - Peak SRAM utilization must be strictly < 256 KB.

    **Conclusion & Interpretation:**
    - **Result: Ping-Pong Buffer (Memory Bound)**. Layer-wise memory overlay reuses the same buffers sequentially, ensuring the total peak footprint never violates the strict 256KB SRAM ceiling.
