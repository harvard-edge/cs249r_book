title: 'TinyML TCO Recall: Cortex-M4 vs ESP32-S3 Cost Profile'
scenario: State the unit costs, power draw, and compute specs for Cortex-M4 (168MHz, 256KB SRAM) and ESP32-S3 (168MHz, 512KB SRAM, 8MB PSRAM, WiFi). Consider a 10,000-unit deployment running continuously at $0.10/kWh over 2 years.
question: "For a 10,000-unit deployment, which platform has lower 2-year TCO?"
details:
  realistic_solution: Cortex-M4 systems require a separate LoRa module ($2). ESP32-S3 has built-in WiFi. Power cost savings are negligible over 2 years, making the BOM connectivity integration the primary driver.
  common_mistake: |
    **The Pitfall:** Neglecting the system-level BOM cost of wireless connectivity.
    **The Rationale:** Candidates focus solely on chip cost and power draw.
    **The Consequence:** They fail to realize the ESP32-S3 includes built-in WiFi, whereas the Cortex-M4 requires a separate, expensive wireless module.
  napkin_math: |
    1. Calculate M4 Annual Power: 50 mW * 8760 hr * $0.10/kWh = $0.0438/yr.
    2. Calculate ESP32 Annual Power (1% WiFi duty): 11.5 mW * 8760 hr * $0.10/kWh = $0.0101/yr.
    3. Calculate M4 2-yr Fleet Power: 10,000 * 2 * $0.0438 = $876.
    4. Calculate ESP32 2-yr Fleet Power: 10,000 * 2 * $0.0101 = $202.
    5. Calculate M4 Hardware Cost (requires $2 LoRa module): 10,000 * ($2 M4 + $2 LoRa) = $40,000.
    6. Calculate ESP32 Hardware Cost (built-in WiFi): 10,000 * $4 = $40,000.
    7. Calculate Total TCO: M4 = $40,876. ESP32 = $40,202.
    8. **Final Result: ESP32-S3 has a lower 2-year TCO ($40,202) due to integrated connectivity.**
