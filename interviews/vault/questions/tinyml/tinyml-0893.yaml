title: 'TinyML TCO Recall: Cortex-M4 vs ESP32-S3 Cost Profile'
scenario: State the unit costs, power draw, and compute specs for Cortex-M4 (168MHz,
  256KB SRAM) and ESP32-S3 (168MHz, 512KB SRAM, 8MB PSRAM, WiFi), and calculate the
  annual power cost for each running continuously at $0.10/kWh. For a 10,000-unit
  deployment, which platform has lower 2-year TCO?
question: For a 10,000-unit deployment, which platform has lower 2-year TCO?
details:
  realistic_solution: 'Cortex-M4: ~$1-3 per chip. Power: typical system at 20mA/168MHz
    = ~30-60mW. Use 50mW. Annual: 50mW * 8760hr * $0.10/1000 = $0.0438/yr. ESP32-S3:
    ~$3-5 per chip. Power: WiFi sleep 800μA, active 270mA. Average with 1% WiFi duty
    cycle: 0.01*270mA + 0.99*0.8mA = 3.49mA at 3.3V = 11.5mW. Annual: 11.5mW * 8760
    * $0.10/1000 = $0.0101/yr. 10K units 2yr TCO: M4: 10K*($2HW+2*$0.044)=$20.88K.
    ESP32-S3: 10K*($4+2*$0.010+$0 WiFi vs $3 cellular) = wait: M4 needs LoRa module
    ($2): M4 total HW=$4. M4 2yr: 10K*($4+2*$0.044)=$40.88K. ESP32-S3 2yr: 10K*($4+2*$0.010)=$40.20K.
    Similar! ESP32-S3 slightly cheaper if WiFi saves cellular.'
  common_mistake: Forgetting that ESP32-S3 includes WiFi connectivity (additional
    $2-3/unit cloud SIM equivalent savings) while Cortex-M4 requires separate wireless
    module, changing the TCO comparison.
  napkin_math: 'M4 system: 50mW. Annual: 0.05W*8760hr*$0.10/kWh=$0.0438/yr. ESP32-S3:
    11.5mW. Annual: $0.0101/yr. 10K units 2yr: M4=$40.88K, ESP32=$40.20K. Power savings
    ESP32 vs M4: (0.0438-0.0101)*10K*2=$674 over 2yr. Negligible. Key differentiator:
    M4 needs separate wireless ($2/unit if using LoRa module): adds $20K to M4 fleet.
    ESP32-S3 has WiFi built-in. Real TCO: M4+LoRa = $60.88K, ESP32-S3 = $40.20K. ESP32
    wins by $20.68K (25% cheaper) due to integrated WiFi.'
