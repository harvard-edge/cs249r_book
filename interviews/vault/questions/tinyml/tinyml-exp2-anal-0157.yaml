title: Wake-Word Pipeline Latency Breakdown
scenario: You are profiling an audio wake-word pipeline on an ARM Cortex-M7 + Ethos-U55 (Corstone-300)
  subsystem. The 480 MHz M7 shares 512 KB SRAM with the Ethos-U55, which is configured for 256 MACs/cycle
  running at the same clock speed. The end-to-end pipeline consists of M7-based MFCC preprocessing (12
  million M7 cycles), a neural network requiring 12.2 million MACs, and M7-based post-processing (1.2
  million cycles). Despite the highly optimized NPU, the end-to-end latency is measured at nearly 28ms.
  Break down the latency components and explain why the pipeline's performance does not reflect the NPU's
  theoretical throughput.
details:
  realistic_solution: To analyze the system behavior, we must decompose the latency into preprocessing,
    inference, and postprocessing stages. Because the M7 and Ethos-U55 share SRAM and operate sequentially
    in this pipeline, their latencies are additive. The M7 is a scalar processor and takes significantly
    longer to compute the MFCC features than the highly parallel U55 takes to execute the entire neural
    network. Therefore, the CPU preprocessing completely dominates the end-to-end latency, making NPU
    optimizations relatively meaningless for overall speed.
  common_mistake: Candidates often focus purely on the neural network MAC count and NPU utilization, assuming
    the inference step dominates execution time. They frequently neglect to calculate the absolute time
    taken by the M7 for sequential pre/post-processing, missing the system-level bottleneck.
  napkin_math: '1. Preprocessing (M7): 12,000,000 cycles / 480,000,000 cycles/sec = 25.0 ms.

    2. NPU Inference (Ethos-U55): 12,200,000 MACs / (256 MACs/cycle * 480,000,000 cycles/sec) = ~0.1 ms
    (assuming ideal utilization).

    3. Post-processing (M7): 1,200,000 cycles / 480,000,000 cycles/sec = 2.5 ms.

    Total System Latency = 25.0 ms + 0.1 ms + 2.5 ms = 27.6 ms. The NPU computation represents less than
    1% of the total latency.'
