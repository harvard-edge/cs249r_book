title: Energy Impact of PSRAM Weight Offloading
scenario: You are deploying an INT8 keyword spotting model on an ESP32-S3 (240 MHz dual-core Xtensa, 512
  KB SRAM, 8 MB PSRAM, WiFi/BLE disabled to isolate power). To fit a larger audio ring buffer, you move
  400 KB of model weights from the internal 512 KB SRAM to the external 8 MB PSRAM. Despite utilizing
  the exact same INT8 vector extensions and computing the same number of operations per inference, your
  hardware profiler shows the energy consumed per inference has jumped drastically. Assuming an INT8 MAC
  costs ~0.2 pJ, a 32-bit SRAM read costs ~5 pJ, and a 32-bit PSRAM read costs ~100 pJ, analyze why this
  system behavior occurs based on hardware energy tradeoffs.
details:
  realistic_solution: According to the Horowitz energy principles, data movement across physical boundaries
    consumes orders of magnitude more energy than the actual arithmetic operations. Moving weights to
    external PSRAM forces the ESP32-S3 to drive signals over the external SPI/QSPI bus for memory fetches,
    replacing cheap on-chip SRAM reads with expensive off-chip accesses. The energy cost of memory access
    completely dominates the compute energy.
  common_mistake: Candidates often focus solely on the CPU clock (240 MHz) or compute efficiency, assuming
    that because the number of INT8 MAC operations remains constant, the energy per inference should remain
    roughly flat. They might attribute the power spike merely to the system staying awake longer due to
    latency, failing to identify the direct energy cost of off-chip data movement.
  napkin_math: 'Compute energy: 400,000 INT8 MACs * 0.2 pJ = 80 nJ. Original memory energy (SRAM): 400
    KB / 4 bytes per word = 100,000 words fetched. 100,000 * 5 pJ = 500 nJ. Original total energy = 580
    nJ. New memory energy (PSRAM): 100,000 words * 100 pJ = 10,000 nJ (10 uJ). New total energy = 10,080
    nJ. The energy per inference jumps by 10,080 / 580 = ~17.4x simply due to data movement, perfectly
    demonstrating why memory access bounds TinyML efficiency.'
