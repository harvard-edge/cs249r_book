title: 'The INT8 Energy Dividend: Quantization Fundamentals'
scenario: When optimizing a neural network for a power-constrained TinyML device, you are evaluating the
  impact of quantization. Approximately how much more energy-efficient is a single INT8 multiply-accumulate
  (MAC) operation compared to a single FP16 MAC operation, based on the fundamental physics of the circuits?
details:
  realistic_solution: An INT8 MAC operation is approximately 5x more energy-efficient than an FP16 MAC.
    Floating-point operations require significantly more complex and power-hungry circuitry to handle
    the exponent and mantissa compared to the straightforward logic for integer arithmetic. While FP16
    is more efficient than FP32, the leap to integer arithmetic provides a much larger, non-linear energy
    saving.
  common_mistake: Engineers often mistakenly assume that energy savings scale linearly with bit-width,
    thinking that moving from 16 bits to 8 bits will halve the energy consumption (a 2x saving). This
    ignores the significant overhead of floating-point hardware (exponent and mantissa processing) compared
    to simpler integer logic. Another common error is to misremember the ratio, confusing it with the
    FP32 vs. INT8 savings (~18x).
  napkin_math: Energy consumption in silicon scales heavily with precision. A typical INT8 multiply-accumulate
    (MAC) operation consumes ~0.2 pJ of energy. An FP16 MAC consumes ~1.5 pJ, and memory accesses for
    FP16 (16 bits) use 2x the energy of INT8 (8 bits). Overall, quantized INT8 models are roughly 5-10x
    more energy-efficient per operation than FP16, crucial for battery-powered TinyML.
  options:
  - ~2x more efficient
  - ~18x more efficient
  - ~5x more efficient
  - The energy is the same, only memory changes
  correct_index: 2
