title: The Audio Buffer Memory Footprint
scenario: You are designing a keyword spotting system on a microcontroller. The system needs to continuously analyze 1-second audio clips to detect a wake word.
question: If you're sampling at a standard 16 kHz with a 16-bit depth, what is the approximate size of the raw audio buffer you need to allocate in SRAM just to hold one clip for processing?
details:
  realistic_solution: The memory required is the product of the sampling rate, the duration, and the bytes per sample. For a standard 16-bit (2-byte) audio sample, a 1-second buffer at 16 kHz requires 32 KB of RAM.
  common_mistake: |
    **The Pitfall:** Miscalculating audio buffer size by confusing units or bit depths.
    **The Rationale:** Engineers often use the wrong units for the sampling rate (confusing Hz with kHz) or forget the sample bit depth (confusing 16-bit with 1-byte).
    **The Consequence:** Believing a pipeline is feasible on a chip where the raw audio won't even fit, or dramatically over-provisioning on a larger chip.
  napkin_math: |
    - **Sampling Rate**: 16,000 samples/second.
    - **Duration**: 1 second.
    - **Bit Depth**: 16-bit = 2 bytes/sample.
    - **Total Buffer Size**: 16,000 * 1 * 2 = 32,000 bytes = **32 KB**.
  options:
  - 3.2 KB
  - 320 bytes
  - 32 KB
  - 320 KB
  correct_index: 2
