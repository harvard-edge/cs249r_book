title: The 'RDMA over SPI' Fallacy
scenario: You are the senior engineer on a TinyML project building a real-time vibration monitoring system. The system uses a network of Cortex-M4 microcontrollers that share 1KB feature vectors with an aggregator node over a 10 Mbps SPI bus. A junior engineer proposes implementing a 'zero-copy RDMA-like mechanism over SPI' to speed up transfers.
question: Why is RDMA over SPI the wrong optimization for sharing 1 KB feature vectors between Cortex-M4 devices?
details:
  realistic_solution: The proposed solution is misguided because the bottleneck is not the SPI bus transfer; it's the microcontroller's own processing time. The 'RDMA over SPI' analogy is flawed because SPI is a simple master-slave serial protocol, and microcontrollers lack the sophisticated network interface card (NIC) hardware required for true remote direct memory access (RDMA) offload. The CPU is heavily involved in every byte transfer.
  common_mistake: |
    **The Pitfall:** Misapplying cloud HPC optimization patterns to embedded SPI.
    **The Rationale:** The junior engineer assumes data transfer is the bottleneck, ignoring the CPU processing overhead.
    **The Consequence:** They attempt to optimize a transfer that only takes 1.6% of the total time, yielding negligible gains.
  napkin_math: |
    * SPI transfer time for 1 KB at 10 Mbps: (1024 * 8 bits) / 10,000,000 bps = 0.82 ms.
    * Cortex-M4 inference time: ~50 ms.
    * Communication overhead: 0.82 ms / 50.82 ms = 1.6%.
    * **Result: The compute dominates 61:1; fixing SPI latency provides almost zero benefit.**
  options:
  - The SPI bus is the bottleneck. The team should switch to a faster parallel interface to increase bandwidth.
  - The protocol overhead is the bottleneck. A custom, more efficient bit-banged SPI implementation would reduce latency.
  - The CPU processing time is the bottleneck. The computation takes orders of magnitude longer than the data transfer over SPI.
  - The memory copy is the bottleneck. A DMA controller should be used to achieve a true zero-copy transfer to the SPI peripheral, freeing up the CPU.
  correct_index: 2
