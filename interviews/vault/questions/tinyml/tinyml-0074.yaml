title: The MRAM Wear Illusion
scenario: You switch from traditional SPI Flash to an external MRAM (Magnetoresistive RAM) chip to store
  telemetry. MRAM is famous for essentially infinite write endurance. You write your ML logs continuously
  in a tight loop. A year later, the MRAM chip starts returning corrupted bits. If MRAM doesn't wear out
  like Flash, why did it fail?
question: "If MRAM doesn't wear out like Flash, why did it fail?"
details:
  realistic_solution: 'MRAM''s 10^14 write endurance seems infinite, but a tight C loop writing at 1 MHz
    hits 10^14 in 3.1 years. The real failure mode is thermal: continuous rapid writes heat the magnetic
    tunnel junction, reducing data retention from 10 years to months. The bits don''t fail immediately
    — they gradually lose magnetic stability, causing intermittent read errors that look like corruption.
    Fix: implement write rate limiting (cap at ~1 write/second for logs), spread writes across addresses
    with wear-leveling, and use a RAM buffer that flushes periodically. At 1 write/second, MRAM lasts
    3.17 billion years.'
  common_mistake: '"MRAM has a limited cycle count just like Flash." MRAM cycle counts are practically
    infinite (10^14 cycles), it shouldn''t wear out in a year.'
  napkin_math: 10^14 writes is massive, but at 1 million writes per second (tight C loop), you hit 10^14
    in about 3.1 years. If you hammer one address, you can absolutely wear out MRAM.
