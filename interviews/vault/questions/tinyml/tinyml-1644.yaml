title: Audio Event Queue Overflow
scenario: A Cortex-M4 processes acoustic events that arrive via Poisson distribution.
  Processing an event takes exactly 10ms.
question: Explain using M/D/1 (deterministic-service) queueing theory why the MCU
  buffer rapidly overflows when arrival rates exceed 95 events per second, and contrast
  why M/D/1 is the correct model rather than M/M/1.
visual:
  kind: svg
  path: tinyml-1644.svg
  alt: Hockey-stick graph displaying expected buffer entries exploding as arrival
    rate approaches 100 events/sec.
  caption: M/M/1 Queue Length vs Arrival Rate.
details:
  realistic_solution: mu = 100 events/sec (10 ms deterministic). lambda = 95, rho
    = 0.95. M/D/1 average queue length Lq = rho^2 / (2*(1-rho)) = 0.9025/0.10 = 9.0
    events. M/M/1 would predict 18 events - 2x larger because exponential service
    variance amplifies queueing. M/D/1 is correct here because each event takes EXACTLY
    10 ms; service variance is zero. Even at 9-event average, MCU buffers typically
    hold only 4-8 events, so the queue overflows.
  common_mistake: Defaulting to M/M/1 for deterministic-service systems and overestimating
    queue length by 2x.
  napkin_math: 'M/D/1: 0.9025/(2*0.05) = 9.0 events. M/M/1: 18 events. MCU buffer
    typically <= 8 events.'
