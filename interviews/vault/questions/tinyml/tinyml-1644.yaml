title: Audio Event Queue Overflow
scenario: A Cortex-M4 processes acoustic events that arrive via Poisson distribution.
  Processing an event takes exactly 10ms.
question: Explain using M/M/1 queuing theory why the MCU buffer rapidly overflows
  when arrival rates exceed 95 events per second.
visual:
  kind: svg
  path: tinyml-1644.svg
  alt: Hockey-stick graph displaying expected buffer entries exploding as arrival
    rate approaches 100 events/sec.
  caption: M/M/1 Queue Length vs Arrival Rate.
details:
  realistic_solution: With processing at 10ms, the service rate mu is 100 events/sec.
    At an arrival rate lambda of 95 events/sec, utilization rho is 0.95. In an M/M/1
    queue, average queue length L = rho^2 / (1 - rho). L = 0.95^2 / 0.05 = 18.05.
    Small MCU SRAM buffers easily overflow when queue length spikes at high rho.
  common_mistake: Believing a 100 events/sec processor can perfectly handle 95 events/sec
    arrivals without queueing delays.
  napkin_math: 0.95**2 / 0.05 = 18.05 buffer entries
