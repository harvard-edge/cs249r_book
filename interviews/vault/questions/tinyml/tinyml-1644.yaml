title: Audio Event Queue Overflow
scenario: A Cortex-M4 processes acoustic events that arrive via Poisson distribution. Processing an event takes exactly 10ms.
question: Explain using M/D/1 (deterministic-service) queueing theory why the MCU buffer rapidly overflows when arrival rates exceed 95 events per second, and contrast why M/D/1 is the correct model rather than M/M/1.
visual:
  kind: svg
  path: tinyml-1644.svg
  alt: Hockey-stick graph displaying expected buffer entries exploding as arrival rate approaches 100 events/sec.
  caption: M/M/1 Queue Length vs Arrival Rate.
details:
  realistic_solution: mu = 100 events/sec (10 ms deterministic). lambda = 95, rho = 0.95. M/D/1 average queue length Lq = rho^2 / (2*(1-rho)) = 0.9025/0.10 = 9.0 events. M/M/1 would predict 18 events - 2x larger because exponential service variance amplifies queueing. M/D/1 is correct here because each event takes EXACTLY 10 ms; service variance is zero. Even at 9-event average, MCU buffers typically hold only 4-8 events, so the queue overflows.
  common_mistake: |
    **The Pitfall:** Defaulting to the M/M/1 queue model for deterministic-service systems.
    **The Rationale:** Candidates use standard M/M/1 formulas, which assume exponential service time variance, instead of recognizing the MCU processes events in exactly 10ms (zero variance).
    **The Consequence:** Overestimating the expected queue length by exactly 2x.
  napkin_math: |
    - **Parameters**: λ = 95 events/sec, μ = 100 events/sec, ρ = 0.95.
    - **M/D/1 Queue Length (Lq)**: ρ² / (2 * (1 - ρ)) = 0.9025 / 0.10 = **9.0 events**.
    - **M/M/1 Queue Length**: ρ² / (1 - ρ) = 0.9025 / 0.05 = 18.0 events.
    - **Result**: MCU buffers typically hold ≤ 8 events, so the queue overflows.
