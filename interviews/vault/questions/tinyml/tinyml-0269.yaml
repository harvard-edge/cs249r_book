title: 'The TinyML Economics of Inference: On-Device vs. Cloud'
scenario: You're designing a fleet of battery-powered audio sensors that use a keyword spotting model. The device wakes for 1 second when it detects a potential keyword, which happens about once per hour.
question: Which approach is more energy-efficient for hourly keyword checks, on-device inference or cloud-assisted transmission?
details:
  realistic_solution: On-device inference is dramatically more energy-efficient. The total energy is the sum of the active energy and the sleep energy. While the device is asleep most of the time, the extremely high power cost of the cellular radio for the cloud-assisted approach makes it consume over 10x more energy in total. The energy cost of transmission far outweighs the energy savings from offloading compute.
  common_mistake: |
    **The Pitfall:** Underestimating the power cost of wireless transmission compared to local compute.
    **The Rationale:** Engineers assume a "quick" data burst to the cloud is cheaper than running a local neural network, forgetting radio transmission consumes 100x more power.
    **The Consequence:** A cloud-dependent system that drains the battery orders of magnitude faster than an on-device TinyML solution.
  napkin_math: |
    - **Constants:** 1 trigger/hour = 24 triggers/day. P_sleep = 0.01 mW. Total sleep time = 86,376 s.
    - **On-Device (Local) Power:** P_active_local = 10 mW for 24s.
    - **On-Device Energy/Day:** (10 mW * 24 s) + (0.01 mW * 86,376 s) = 240 mJ + 863.76 mJ = **1.10 J/day**.
    - **Cloud-Assisted Power:** P_active_cloud = 500 mW (radio) for 24s.
    - **Cloud Energy/Day:** (500 mW * 24 s) + (0.01 mW * 86,376 s) = 12,000 mJ + 863.76 mJ = **12.86 J/day**.
    - **Result:** Cloud transmission consumes **>11x more energy** than local TinyML inference.
  options:
  - Cloud-assisted is more efficient because it avoids running complex computation on the low-power device.
  - The energy difference is negligible because sleep power dominates the total consumption over 24 hours.
  - On-device is >10x more energy-efficient because the radio transmission power is far greater than the local compute power.
  - They are roughly equal; the energy saved from not computing locally is offset by the energy spent on transmission.
  correct_index: 2
