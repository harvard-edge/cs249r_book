title: Interrupt-Driven Missed Audio Deadlines
scenario: You are deploying an audio event detector on an ARM Cortex-M4 (STM32F4) running at 168 MHz with 256 KB SRAM and 1 MB flash. The system must process an incoming audio frame every 16ms to avoid buffer overflows. The pipeline requires 1.2 million clock cycles for MFCC feature extraction, followed by a neural network that performs 2 million INT8 MAC operations utilizing CMSIS-NN SIMD instructions (2 MACs/cycle). The system occasionally drops frames when a high-priority Bluetooth interrupt fires, which consumes 600,000 cycles.
question: Why does a 600,000-cycle Bluetooth interrupt make a 168 MHz Cortex-M4 audio pipeline miss a 16 ms frame deadline?
details:
  realistic_solution: The candidate should systematically calculate the total cycle budget provided by the 168 MHz clock for the 16ms window. They must then apply the CMSIS-NN SIMD throughput to find the exact cycles needed for the neural network and sum this with the feature extraction time. By factoring in the preemptive interrupt overhead, the candidate will demonstrate that the worst-case execution time (WCET) exceeds the strict real-time budget. This proves that the deadline miss is a fundamental compute starvation issue rather than a software bug.
  common_mistake: |
    **The Pitfall:** Assuming MAC operations take exactly 1 cycle each or ignoring hardware interrupts.
    **The Rationale:** Candidates often fail to account for SIMD optimizations (which halve NN cycles) or fail to sum the worst-case interrupt overhead into the total cycle budget.
    **The Consequence:** This leads to incorrect baseline latency calculations, misdiagnosing the deadline miss as a software bug rather than fundamental compute starvation.
  napkin_math: |
    - **Cycle Budget:** 168 MHz * 16 ms = 2,688,000 cycles available per frame.
    - **NN Computation:** 2,000,000 MACs / 2 MACs per cycle (CMSIS-NN SIMD) = 1,000,000 cycles.
    - **Normal Pipeline:** 1,200,000 (MFCC) + 1,000,000 (NN) = 2,200,000 cycles.
    - **With Interrupt:** 2,200,000 + 600,000 = 2,800,000 cycles.
    - **Overhead:** 2,800,000 cycles > 2,688,000 cycles budget.
    - **Conclusion:** The worst-case execution time exceeds the deadline by **112,000 cycles (approx 0.67 ms)**.
