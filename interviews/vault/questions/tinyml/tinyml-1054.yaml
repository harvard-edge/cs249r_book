title: 'DMA Buffering vs CPU Interrupts on nRF5340'
scenario: 'You are deploying a continuous keyword spotting model on a Nordic nRF5340. The system features a 128 MHz app core, a 64 MHz net core for BLE 5.3, 256 KB SRAM, 1 MB flash, and operates at ~5mA active current. Audio is sampled at 16 kHz (16-bit). When the system uses CPU-driven interrupts to read each sample from the peripheral into SRAM, you observe periodic buffer overruns and dropped data when the app core runs the inference model. After switching to a DMA controller writing into a 4 KB ping-pong buffer, the overruns completely disappear.'
question: 'Why does the CPU-driven approach cause overruns, and what is the CPU context-switch time saved per second by switching to DMA?'
details:
  realistic_solution: 'The CPU-driven approach fails because constant interrupt preemptions fragment the CPU execution time, preventing the ML inference task from completing before new data arrives. By offloading data movement to the DMA controller using a zero-copy ping-pong buffer, the CPU only services a handful of interrupts per second. This allows the 128 MHz app core to process the ML model in large, uninterrupted blocks, completely eliminating the data loss.'
  common_mistake: |
    **The Pitfall:** Assuming raw interrupt execution time is negligible.
    **The Rationale:** Candidates calculate raw time spent in interrupts but fail to recognize that the extreme frequency of preemptions destroys pipeline efficiency and fragments CPU execution time.
    **The Consequence:** Designing a system that consistently drops data due to CPU starvation.
  napkin_math: |
    **Assumptions & Constraints:**
    - CPU Interrupt Overhead: 16,000 interrupts/sec * 50 cycles = 800,000 cycles/sec.
    - DMA Overhead: 7.8 interrupts/sec * 50 cycles = 390 cycles/sec (~0.003 ms/sec).

    **Calculations:**
    - CPU Interrupt Time: 800,000 / 128,000,000 = 6.25 ms/sec.

    **Conclusion & Interpretation:**
    - **Result: ~6.25 ms/sec (Compute-Bound)**. Switching to DMA saves 6.25 ms/sec of context switch time and prevents preemptions.
