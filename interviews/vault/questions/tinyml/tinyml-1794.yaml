title: Microcontroller Event Power
scenario: An acoustic event detector runs on a Cortex-M4 (80 MHz), waking up every
  2 seconds to classify a 50ms audio buffer. Active power is 10mW, and deep sleep
  power is 10uW.
question: Calculate the average power consumption of this duty-cycled system, assuming
  computation takes exactly 50ms per 2-second cycle.
details:
  realistic_solution: The system cycle time is 2000ms. It spends 50ms in the active
    state consuming 10mW, and the remaining 1950ms in deep sleep consuming 0.01mW.
    To find the average power, calculate the time-weighted average of both states.
    The active power dominates the budget despite the short duration.
  common_mistake: Forgetting to convert 10uW to 0.01mW, or dividing the active time
    by 1000ms instead of the total 2000ms cycle.
  napkin_math: P_avg = (50 * 10mW + 1950 * 0.01mW) / 2000 = (500 + 19.5) / 2000 =
    0.25975mW.
