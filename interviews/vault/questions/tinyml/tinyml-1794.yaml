title: Microcontroller Event Power
scenario: An acoustic event detector runs on a Cortex-M4, waking up every 2 seconds to classify a 50ms audio buffer. Active power is 10mW, and deep sleep power is 10uW.
question: Calculate the average power consumption of this duty-cycled system, assuming computation takes exactly 50ms per 2-second cycle.
details:
  realistic_solution: The system cycle time is 2000ms. It spends 50ms in the active state consuming 10mW, and the remaining 1950ms in deep sleep consuming 0.01mW. To find the average power, calculate the time-weighted average of both states. The active power dominates the budget despite the short duration.
  common_mistake: |
    **The Pitfall:** Unit conversion errors during calculation.
    **The Rationale:** Candidates fail to normalize micro-watts and milli-watts to the same scale, or forget to normalize the time duration against the full cycle period.
    **The Consequence:** The average power estimation is orders of magnitude off, leading to fundamentally wrong battery life projections.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cycle time: 2000 ms.
       - Active state: 50 ms at 10 mW.
       - Sleep state: 1950 ms at 0.01 mW (10 µW).
    2. **Calculations:**
       - Active Energy: 50 ms * 10 mW = 500 mJ.
       - Sleep Energy: 1950 ms * 0.01 mW = 19.5 mJ.
       - Total Energy: 500 + 19.5 = 519.5 mJ per cycle.
       - Average Power: 519.5 mJ / 2000 ms = 0.25975 mW.
    3. **Conclusion & Interpretation:**
       - **Result: ~0.26 mW.** The system is highly efficient, but still **Compute-Bound** in power terms since active compute dominates the energy budget.
