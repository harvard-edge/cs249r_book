title: The Look-aside Attention Cache
scenario: You are designing a driver drowsiness detection system for a new car model. The system uses
  a camera and a Cortex-M7 MCU (512KB SRAM, 2MB Flash) to analyze a driver's eye gaze. The goal is to
  use a small Vision Transformer (ViT) to detect temporal patterns over a 5-second window (50 frames at
  10 FPS). A naive implementation of a KV-cache for this sequence length would require megabytes of SRAM,
  which you don't have. Your constraints are a hard 100ms inference deadline and the 512KB SRAM budget.
  Propose a memory architecture and data flow that allows the model to access the 5-second history without
  storing the full KV-cache in SRAM. What are your first three design decisions, and how do you justify
  them with quantitative analysis?
question: "What are your first three design decisions, and how do you justify them with quantitative analysis?"
details:
  realistic_solution: The correct approach is to design a hierarchical cache that leverages the different
    memory types on the MCU. The key insight is that not all history is needed in fast SRAM simultaneously.
    I would propose a 'Look-aside Cache' architecture.
  common_mistake: The most common mistake is to either give up on the long sequence length or to grossly
    underestimate the KV-cache size. Another is to suggest a simpler model like a CNN, which dodges the
    core systems question. A junior engineer might suggest simply compressing the KV-cache, but without
    a strategy for managing what's in SRAM vs. what's elsewhere, this is insufficient.
  napkin_math: First, prove the naive approach is impossible. Let's assume a tiny ViT with 4 layers, 64
    patches per frame, and a hidden dimension of 128.
