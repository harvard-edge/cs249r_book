title: The Look-aside Attention Cache
scenario: You are designing a driver drowsiness detection system for a new car model. The system uses a camera and a Cortex-M7 MCU (512KB SRAM, 2MB Flash) to analyze a driver's eye gaze. The goal is to use a small Vision Transformer (ViT) to detect temporal patterns over a 5-second window (50 frames at 10 FPS). A naive implementation of a KV-cache for this sequence length would require megabytes of SRAM, which you don't have. Your constraints are a hard 100ms inference deadline and the 512KB SRAM budget.
question: "What are your first three design decisions for a look-aside KV-cache architecture on a 512KB SRAM MCU, and how do you justify them quantitatively?"
details:
  realistic_solution: The correct approach is to design a hierarchical cache that leverages the different memory types on the MCU. The key insight is that not all history is needed in fast SRAM simultaneously. I would propose a 'Look-aside Cache' architecture.
  common_mistake: |
    **The Pitfall:** Grossly underestimating the KV-cache size or giving up entirely and reverting to a CNN.
    **The Rationale:** Candidates fail to bridge the gap between Transformer requirements and MCU memory hierarchies.
    **The Consequence:** The system either OOMs instantly, or the candidate fails the systems architecture portion of the interview by evading the core prompt.
  napkin_math: |
    * 4 layers, 64 patches/frame, hidden dim 128.
    * Sequence length (N) = 50 frames × 64 patches = 3,200 patches.
    * Attention map size (N^2) = 3,200^2 = 10,240,000 elements.
    * In FP16 (2 bytes), one attention map = ~20 MB.
    * This completely overflows the 512KB SRAM budget by 40x, proving the naive approach is impossible.
