title: MCU Power State Machine for Multi-Model ML Pipeline
scenario: 'Design a power state machine for ESP32-S3 running a 3-stage ML pipeline: (1) audio preprocessing (always-on, 5mW), (2) keyword detection (triggered, 30mW, 20ms), (3) NLP response classification (triggered on keyword, 40mW, 100ms). Target: 1-year battery life on 2000mAh LiPo.'
question: 'Can an ESP32-S3 three-stage ML pipeline meet 1-year life on a 2000 mAh LiPo with a 5 mW always-on preprocessor?'
details:
  realistic_solution: 'States: S0=Deep Sleep (20µW), S1=Audio Monitoring (5mW), S2=Keyword (30mW), S3=NLP (40mW). Average power budget: 2000mAh × 3.7V / 1 year = 0.846mW. The 5mW always-on S1 exceeds the budget alone! Fix: duty-cycle S1 at 14.3% duty (wake 1s, sleep 6s) or use hardware VAD (0.3mW).'
  common_mistake: |
    **The Pitfall:** Running all stages simultaneously instead of using triggered activation, or ignoring the always-on base cost.
    **The Rationale:** Candidates focus on the peak power of the NLP model but miss that the continuous 5mW audio preprocessing dominates the total energy over a year.
    **The Consequence:** The device drains the 2000mAh battery in roughly 2 months instead of the targeted 1 year.
  napkin_math: |
    1. **Assumptions & Constraints:** 2000mAh LiPo at 3.7V. 1 year life. S1: 5mW, S2: 30mW (20ms), S3: 40mW (100ms). Deep sleep: 20µW.
    2. **Calculations:**
       - Total Energy = 2000 mAh * 3.7V = 7.4 Wh = 26,640 Joules.
       - 1 year = 31.536 million seconds.
       - Max average power = 26,640 J / 31,536,000 s = ~0.845 mW.
       - Since S1 (always-on) = 5 mW, 5 mW > 0.845 mW.
    3. **Conclusion & Interpretation:** **The 5mW always-on stage completely breaks the 0.845mW budget.** Result: Power-Bound. Hardware VAD or extreme duty-cycling is required.
