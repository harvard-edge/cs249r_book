title: MCU Power State Machine for Multi-Model ML Pipeline
scenario: 'Design a power state machine for ESP32-S3 running a 3-stage ML pipeline:
  (1) audio preprocessing (always-on, 5mW), (2) keyword detection (triggered, 30mW,
  20ms), (3) NLP response classification (triggered on keyword, 40mW, 100ms). Target:
  1-year battery life on 2000mAh LiPo. Specify states and transitions.'
question: Can an ESP32-S3 three-stage ML pipeline meet 1-year life on a 2000 mAh LiPo
  with a 5 mW always-on preprocessor?
details:
  realistic_solution: |
    Battery: 2000mAh × 3.7V = 7.4Wh = 26,640J. 1 year = 31.5M seconds.
    Max average power: 26640/31500000 = 0.846mW.
    States: S0=Deep Sleep (20µW, sensors off), S1=Audio Monitoring (5mW, microphone+preprocessing), S2=Keyword Detection (30mW, 20ms burst), S3=NLP Processing (40mW, 100ms burst).
    Keyword rate: 10×/day = 1/8640 Hz = 0.0001157 Hz. NLP rate: same as keyword (always follows).
    Average power: S1 always-on (5mW) + S2 bursts (10/day × 30mW × 0.02s / 86400s ≈ 0.00007mW) + S3 bursts (10/day × 40mW × 0.1s / 86400s ≈ 0.00046mW) = 5.0005mW.
    Required 0.846mW — S1 alone exceeds budget!
    Fix: duty-cycle S1 at 14.3% duty → 5mW×0.143 + 0.02mW×0.857 ≈ 0.73mW. Wake every 7s, listen 1s.
    Total: 0.73 + 0.0005 = 0.7305mW < budget. Or use hardware VAD at 0.3mW.
  common_mistake: Running all three stages simultaneously instead of using triggered
    activation; a cascade pipeline where later stages only activate when earlier stages
    trigger saves 80%+ power.
  napkin_math: |
    Battery avg power budget: 0.846mW. Always-on audio at 5mW exceeds budget.
    Max active duty cycle: (0.846 - 0.02) / (5 - 0.02) ≈ 16.5%. Solution: wake 1s every 7s (14.3% duty) for audio monitoring.
    S2 bursts: ~0.00007mW. S3 bursts: ~0.00046mW. Total: ~0.73 + 0.0005 = 0.7305mW < 1 year budget.
    Or HW VAD: 0.3mW always-on, trigger on voice activity.
