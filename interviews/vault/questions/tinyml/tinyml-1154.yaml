title: Active Learning Data Buffer Sizing
scenario: You are designing an active learning data curation pipeline for a predictive maintenance sensor powered by a Nordic nRF5340. To gather a high-quality dataset of rare anomalies, the device saves high-uncertainty raw accelerometer windows to flash memory for later human annotation, transmitting them in batches over BLE 5.3. The accelerometer samples 3 axes at 100 Hz, 16-bit resolution, and each anomaly window is 4 seconds long. The nRF5340 has 1 MB of flash, but the app core firmware, 64 MHz net core BLE stack, and ML model consume 700 KB.
question: If you reserve 100 KB for wear-leveling and system data, how many anomaly windows can you buffer for the annotation dataset before a BLE sync is forced?
details:
  realistic_solution: The correct approach is to first determine the exact byte size of a single data window by multiplying the sampling rate, number of axes, bit depth in bytes, and duration. Then, calculate the available non-volatile flash memory by subtracting the firmware size and reserved space from the total flash capacity. Finally, divide the available memory by the window size to find the maximum number of bufferable samples for the annotation pipeline.
  common_mistake: |
    **The Pitfall:** Forgetting to multiply by all 3 axes or the 2-byte size of 16-bit resolution.
    **The Rationale:** Candidates simplify the data dimension calculation, missing the fundamental multi-axis or bit-depth characteristics of embedded sensors.
    **The Consequence:** The buffer size is grossly overestimated, causing buffer overflows and lost anomaly data before the BLE sync triggers.
  napkin_math: |
    - **Step 1:** Calculate available flash: 1024 KB - 700 KB (firmware) - 100 KB (reserved) = 224 KB.
    - **Step 2:** Convert to bytes: 224 KB * 1024 = 229,376 bytes.
    - **Step 3:** Calculate data rate: 100 Hz * 3 axes * 2 bytes (16-bit) = 600 bytes/second.
    - **Step 4:** Calculate window size: 600 bytes/second * 4 seconds = 2400 bytes.
    - **Step 5:** Calculate buffer capacity: 229,376 bytes / 2400 bytes/window = 95.57.
    - **Result:** **You can buffer exactly 95 raw anomaly windows before forcing a sync.**
