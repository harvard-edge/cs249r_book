title: MCU Audio Compute Bounding
scenario: Evaluating a proposed keyword spotting CNN against an RNN for a hearing
  aid chip running a Cortex-M4 at 80 MHz.
question: Formulate a theoretical framework to estimate and compare the total MAC
  operations and cycle counts per 1-second audio window for both models.
details:
  realistic_solution: The framework must calculate total MACs by summing (filter_w
    * filter_h * in_channels * out_channels * out_w * out_h) for CNNs and (hidden_size
    * input_size + hidden_size^2) for RNNs per timestep. Given the 80 MHz clock, the
    theoretical maximum is 80 million MACs per second. The CNN taking 10M MACs will
    use at least 12.5% of the CPU, assuming perfect 1-cycle MAC instructions.
  common_mistake: Ignoring the SRAM memory access overhead, assuming 1 cycle per MAC
    without accounting for memory load/store latencies.
  napkin_math: 10M MACs / 80M cycles = 12.5% CPU util
