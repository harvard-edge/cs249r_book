title: The Flash Memory Bottleneck
scenario: Your team is building a keyword spotting model for a Cortex-M4 microcontroller that has 1MB of Flash. A specific 2D convolutional layer in your network is taking up too much space. It takes an input tensor with 64 channels and produces an output with 128 channels, using a 3x3 kernel.
question: What parameter reduction does a 3x3 depthwise separable convolution provide for the 64-to-128 channel layer?
details:
  realistic_solution: 'A standard convolution performs spatial and cross-channel convolution in one step. A depthwise separable convolution splits this into two steps: a depthwise convolution that operates on each input channel independently, followed by a 1x1 pointwise convolution that combines the outputs.'
  common_mistake: |
    **The Pitfall:** Calculating only the depthwise portion or miscalculating the pointwise part.
    **The Rationale:** Engineers forget that a depthwise separable convolution is a two-step process, completely ignoring the pointwise 1x1 convolution parameters.
    **The Consequence:** A massive overestimation of the memory savings, leading to memory budgets that will still fail in production.
  napkin_math: |
    1. **Standard Convolution Parameters:** 3 * 3 * 64 * 128 = **73,728 parameters**.
    2. **Depthwise Step:** 3 * 3 * 64 = 576 parameters.
    3. **Pointwise Step:** 1 * 1 * 64 * 128 = 8,192 parameters.
    4. **Separable Total:** 576 + 8,192 = **8,768 parameters**.
    5. **Reduction:** 73,728 / 8,768 = **~8.4x**.
  options:
  - Roughly 2×. The savings are minor.
  - Roughly 8.4×. It separates the spatial and cross-channel operations, drastically cutting parameters.
  - Roughly 128×. It only performs the depthwise step, which is highly efficient.
  - There is no reduction; it's a compute optimization, not a memory optimization.
  correct_index: 1
