title: Hardware-Aware NAS Tradeoffs on ESP32-S3
scenario: You are deploying a wake-word model on an ESP32-S3 (240 MHz Xtensa). Hardware-Aware NAS outputs two candidate architectures. Model A (450 KB peak memory, 15 MFLOPs) uses scalar operations. Model B (600 KB peak memory, 25 MFLOPs) perfectly utilizes 4-way INT8 vector instructions, but its size forces 88 KB of data into slower external PSRAM.
question: Which architecture do you choose for deployment, and how do you justify the tradeoff between PSRAM latency and vectorization speedup?
details:
  realistic_solution: An L5 engineer will quantify the PSRAM access penalty against the vectorization speedup. Because the ESP32-S3 has a data cache for PSRAM, if the memory access pattern is predictable, the cache miss penalty is manageable. The engineer should calculate that the compute cycles saved by INT8 vector extensions massively outweigh the PSRAM fetch stalls for the extra 88 KB, making Model B the optimal choice.
  common_mistake: |
    **The Pitfall:** Reflexively rejecting Model B because it spills into PSRAM, assuming external memory latency will completely destroy performance.
    **The Rationale:** Candidates treat SRAM limits as an absolute hardware cliff without quantifying the cache miss penalty against the vectorization speedup.
    **The Consequence:** The team deploys a significantly slower scalar model, wasting the specialized SIMD capabilities of the Xtensa core.
  napkin_math: |
    1. **Assumptions & Constraints:** CPU = 240 MHz. Model A = 7.5 MMACs scalar (1 MAC/cycle). Model B = 12.5 MMACs vectorized (4 MAC/cycle). PSRAM spill = 88 KB. Cache line = 32 bytes. Cache miss penalty ≈ 40 cycles.
    2. **Calculations:** Model A Compute: 7.5M cycles / 240 MHz = 31.25 ms. Model B Compute: (12.5M / 4) = 3.125M cycles. Model B PSRAM penalty: 88,000 bytes / 32 bytes/line = 2,750 misses. 2,750 misses * 40 cycles = 110,000 cycles stall. Model B Total Cycles: 3.125M + 0.11M = 3.235M cycles. Model B Time = 3.235M / 240 MHz = 13.48 ms.
    3. **Conclusion & Interpretation:** **Result: Model B is ~2.3x faster.** The computational savings from 4-way vectorization (saving ~4.3M cycles) vastly outpaces the PSRAM cache miss penalty (costing ~110k cycles).
