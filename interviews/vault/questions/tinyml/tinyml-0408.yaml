title: The Hardware Divider Stall
scenario: 'You are porting an anomaly detection algorithm to a Cortex-M0+. The code has a normalization step inside the tightest inner loop: `float norm = val / max_val;`. Your profiling shows this single division operation takes an astonishing 40 clock cycles.'
question: Why does `val / max_val` cost about 40 cycles inside a Cortex-M0+ normalization loop?
details:
  realistic_solution: 'The Cortex-M0+ lacks hardware divide instructions (SDIV/UDIV). Division is emulated in software via iterative bit-shifting, taking ~40 cycles vs 1-2 cycles for hardware MUL. Fix: precompute the reciprocal once (float inv = 1.0f / max_val) outside the loop, then multiply inside (norm = val * inv). This converts a 40-cycle division to a 1-2 cycle multiplication — a 20x speedup on the inner loop. For INT8 inference, use fixed-point arithmetic: multiply by a scaled integer reciprocal and right-shift, avoiding floating-point entirely.'
  common_mistake: |
    **The Pitfall:** Accepting that "floating point math is just slow" without deeper investigation.
    **The Rationale:** While floating point emulation is generally slow on M0+ without an FPU, division is uniquely terrible because it requires iterative bit-shifting in software.
    **The Consequence:** Leaving a massive 20x performance penalty in the tightest inner loop, severely degrading inference speed unnecessarily.
  napkin_math: |
    1. **Software Division Cost:** ~40 cycles per iteration.
    2. **Hardware Multiplication Cost:** 1-2 cycles per iteration.
    3. **Optimization:** Computing `inv = 1.0f / max_val` outside the loop, then replacing `/ max_val` with `* inv` inside the loop.
    4. **Result:** Changing the inner loop division to multiplication yields a **~20x speedup**.
