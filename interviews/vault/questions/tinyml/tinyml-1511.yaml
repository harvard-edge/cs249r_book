title: TinyML Layer Offload Split
scenario: A model has 10 layers. The MCU runs layers at 4 ms each. An external NPU runs supported layers at 1 ms each, but each offload boundary costs 2 ms for transfer/setup. Six consecutive layers are supported and offloaded as one block.
question: What latency results from offloading 6 consecutive layers to an external NPU when MCU layers cost 4 ms and each offload boundary costs 2 ms?
details:
  realistic_solution: Four MCU layers cost 16 ms. Six NPU layers cost 6 ms. Entering and leaving the NPU block costs 4 ms total. Total latency is 26 ms. Offloading is useful only because supported layers are consecutive; fragmented offloads would add more boundary costs.
  common_mistake: |
    **The Pitfall:** Counting NPU compute speedup but forgetting transfer/setup boundaries.
    **The Rationale:** Candidates focus solely on the MAC/cycle throughput advantage of the NPU without modeling the DMA or IPC data transfer overhead required to cross the hardware boundary.
    **The Consequence:** Overestimating the actual end-to-end system speedup, especially if layers are fragmented and incur multiple boundary costs.
  napkin_math: |
    - MCU execution (4 un-offloaded layers): 4 * 4 ms = 16 ms.
    - NPU execution (6 offloaded layers): 6 * 1 ms = 6 ms.
    - Boundaries (entering and leaving the block): 2 boundaries * 2 ms = 4 ms.
    - Total latency = 16 + 6 + 4 = **26 ms**.
