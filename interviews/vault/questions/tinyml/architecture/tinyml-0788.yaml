title: Tinyml New 0010
scenario: >
  A hybrid edge-cloud setup offloads heavy inference to a local A100 GPU. However, the end-to-end latency for the TinyML sensor data is severely bottlenecked, achieving only 1% GPU utilization.
question: Why is the local A100 underutilized when processing many tiny TinyML sensor payloads?
details:
  realistic_solution: >
    The symptom is a severe PCIe transactional overhead bottleneck. Processing high-frequency, small-payload requests across the PCIe Gen4 bus shifts the system completely to the left on the roofline model, starving the compute cores. The solution is CPU-side batching to aggregate sensor data into a single large continuous DMA transfer, saturating the PCIe bandwidth and driving GPU utilization.
  common_mistake: |
    **The Pitfall:** Focusing solely on GPU TOPS and network bandwidth while ignoring PCIe transaction overhead.
    **The Rationale:** Candidates assume bandwidth = throughput, ignoring the fixed microsecond latency penalty per discrete PCIe transfer.
    **The Consequence:** The system is starved for data despite massive theoretical compute and bandwidth, failing to meet throughput SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - PCIe Gen4 x16: ~32 GB/s, ~2 µs overhead per transaction.
       - Payload: 1 KB. Frequency: 10,000 requests/sec.
    2. **Calculations:**
       - Transfer Time (1 KB): 1 KB / 32 GB/s = ~30 ns.
       - Total Time per transaction: 2,000 ns (overhead) + 30 ns = 2,030 ns.
       - 10,000 requests = 20.3 ms of pure overhead per second.
    3. **Conclusion & Interpretation:**
       - **Result: Overhead dominates transfer by ~66x.** Transaction overhead starves the GPU. **Bottleneck: PCIe Transaction Latency.**
