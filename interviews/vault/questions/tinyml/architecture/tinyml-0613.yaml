title: NPU Delegation Coverage Determines Actual Speedup
scenario: You're deploying a MobileNetV2 (300K parameters, 22 layers) on a Corstone-300 platform. The Vela compiler reports that 18 of 22 layers are delegated to the Ethos-U55 NPU, and 4 layers fall back to the M55 CPU. Your PM sees '82% delegation' and expects 5x speedup over M55-only.
question: With 2.0 ms CPU-only time and four 50 us fallback transitions, what speedup follows from 95% compute delegation?
details:
  realistic_solution: |
    Apply Amdahl's Law to compute time, not layer count. The 18/22 delegated layers are misleading because they represent 95% of compute, leaving 5% on the M55. With a 2.0 ms M55-only baseline, the fallback compute takes 0.05 * 2.0 ms = 100 us. Four NPU-to-CPU transitions add 4 * 50 us = 200 us, so the expected runtime is about 300 us and the speedup is 2.0 ms / 0.3 ms = 6.7x. That is better than the PM's layer-count estimate but far below a naive 20x compute-only estimate because transfer overhead is significant.
  common_mistake: |
    **The Pitfall:** Applying Amdahl's Law to layer counts instead of compute time.
    **The Rationale:** Candidates assume "82% of layers on the NPU means 82% of compute is accelerated", failing to weigh the MAC density of specific layers.
    **The Consequence:** They vastly miscalculate expected speedup, ignoring that remaining fallback layers incur massive data transfer overhead that cripples performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Layer delegation: 18/22 = 82%.
    - Compute delegation: 28.5M/30M = 95%.
    - Baseline CPU inference time: 2.0 ms.
    - Sync penalty: 4 NPU-CPU transitions at 50 µs each = 200 µs.
    - NPU acceleration is assumed ideal for its portion.

    **Calculations:**
    - Baseline CPU time: 2.0 ms.
    - Remaining CPU compute time: 2.0 ms * 0.05 = 100 µs.
    - Sync overhead: 4 transitions * 50 µs = 200 µs.
    - Total effective time = 100 µs + 200 µs = 300 µs.
    - Effective speedup = 2.0 ms / 0.3 ms = ~6.7x.

    **Conclusion & Interpretation:**
    - **Result: ~6.7x speedup (Communication-Bound)**. The workload is heavily bottlenecked by NPU-CPU synchronization overhead, invalidating naive 20x theoretical limits.
  options:
    - Speedup is ~5x as expected. 82% of layers on the NPU means 82% of compute is accelerated, giving 1/(1-0.82) = 5.6x by Amdahl's Law.
    - 'Actual speedup is ~6.7x (not 5x or 20x). Layer count (82%) misleads because compute delegation is 95% (28.5M/30M MACs). Naive Amdahl''s predicts 1/0.05 = 20x, but each NPU-to-CPU fallback transition costs ~50 us of data transfer dead time. With 4 transitions: ~200 us overhead, plus 100 us of remaining CPU compute, so 2.0 ms / 0.3 ms ≈ 6.7x.'
    - Speedup is ~20x because 95% of compute MACs run on the NPU, which is 20x faster than the M55 CPU per MAC.
    - Speedup is only ~2x because the Ethos-U55's 128 MACs/cycle throughput is bottlenecked by the narrow data bus between the NPU and M55, limiting effective bandwidth to 10% of peak.
  correct_index: 1
