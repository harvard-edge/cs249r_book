title: 'The nRF5340 Network Core Split'
scenario: 'You''re deploying a keyword spotting model on the Nordic nRF5340, which has two Cortex-M33 cores: an application core (128 MHz, 512 KB flash, 256 KB SRAM) and a network core (64 MHz, 256 KB flash, 64 KB SRAM) dedicated to BLE. Your model needs 180 KB SRAM for the tensor arena. The product must stream classification results over BLE.'
question: 'How do you partition memory and processing, and what happens if the BLE stack on the network core needs to interrupt the application core mid-inference?'
details:
  realistic_solution: 'Run inference exclusively on the 128 MHz application core, as the 180 KB tensor arena physically cannot fit in the network core''s 64 KB SRAM. Run the BLE stack entirely on the network core. Use IPC (shared RAM mailbox) to dispatch the 1-byte classification result. This dual-core architecture eliminates BLE interrupt jitter on the application core, ensuring deterministic end-to-end latency.'
  common_mistake: |
    **The Pitfall:** Attempting to offload inference to the network core to keep the application core "free."
    **The Rationale:** Candidates assume lower-priority ML tasks should run on the slower core without validating memory constraints.
    **The Consequence:** The model fundamentally fails to compile or load due to OOM errors on the 64 KB SRAM network core.
  napkin_math: |
    **Assumptions & Constraints:**
    - App core: 256 KB SRAM. Net core: 64 KB SRAM.
    - Tensor Arena: 180 KB.
    - App core inference latency: 30 ms.

    **Calculations:**
    - SRAM check: 180 KB > 64 KB (Net core OOM). 180 KB < 256 KB (App core fits).
    - Dual-core Pipeline: 30 ms inference + 1 us IPC + 2 ms BLE transmit = 32 ms end-to-end.
    - Jitter: ±1 µs (Zero BLE interrupts on app core).

    **Conclusion & Interpretation:**
    - **Result: Application-Core Bound (Memory-Bound)**. The model must run on the App core. Dual-core isolation guarantees deterministic 32 ms latency.
