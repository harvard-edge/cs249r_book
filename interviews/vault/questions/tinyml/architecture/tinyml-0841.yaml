title: Implement depthwise separable conv for Cortex-M4 with CMSIS-NN
scenario: 'You are deploying a 3-layer depthwise separable CNN on an STM32F4 (Cortex-M4, 168MHz, 256KB
  SRAM) for keyword detection. The model has layers: depthwise 3x3 (16ch, 32x32 input), pointwise 1x1
  (16->32ch), depthwise 3x3 (32ch, 16x16).'
question: How should the three-layer depthwise separable CNN be implemented with CMSIS-NN and buffered
  to fit STM32F4 SRAM?
details:
  realistic_solution: 'CMSIS-NN functions: arm_depthwise_conv_s8() for depthwise, arm_convolve_1x1_s8_fast()
    for pointwise 1x1. Buffer strategy: ping-pong buffers A and B. Layer 1: input from A, output to B.
    Layer 2: input from B, output to A. Layer 3: input from A, output to B. Peak SRAM: max(|input| + |output|)
    + scratch buffer. |A_0| = 16KB. |B_0| = 16KB. After pointwise: |A| = 32KB. After layer 3 depthwise:
    |B| = 8KB. Peak is 48KB (B after layer 1 + A after layer 2) plus model weights.'
  common_mistake: '**The Pitfall:** Allocating separate input and output buffers globally for every layer
    simultaneously.

    **The Rationale:** Candidates used to high-level frameworks (like Python/PyTorch) assume dynamic allocation
    handles memory, rather than statically reusing memory buffers.

    **The Consequence:** The model immediately runs out of SRAM (OOM) because all intermediate activations
    are needlessly kept alive at once.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - Architecture: 3-layer depthwise separable CNN.\n\
    \   - Layer 1: Depthwise 3x3, 16ch, 32x32 input.\n   - Layer 2: Pointwise 1x1, 16->32ch.\n   - Layer\
    \ 3: Depthwise 3x3, 32ch, 16x16 input (assumed stride 2 from prev).\n   - Memory Strategy: Ping-pong\
    \ buffers A and B.\n2. **Calculations:**\n   - Buffer A (Layer 1 Input): 32 x 32 x 16 x 1B = 16 KB.\n\
    \   - Buffer B (Layer 1 Output / L2 Input): 32 x 32 x 16 x 1B = 16 KB.\n   - Buffer A (Layer 2 Output\
    \ / L3 Input): 32 x 32 x 32 x 1B = 32 KB.\n   - Buffer B (Layer 3 Output): 16 x 16 x 32 x 1B = 8 KB.\n\
    \   - Peak Buffer Memory: Max simultaneous allocation (Layer 2 uses B for input and A for output)\
    \ = 16 KB + 32 KB = 48 KB.\n   - Total Memory: 48 KB + Scratch/Weights (~5 KB) = 53 KB.\n3. **Conclusion\
    \ & Interpretation:**\n   - **Result: Ping-pong buffering yields a 53 KB peak, fitting easily in 256\
    \ KB.** **Result: Memory-Bound Optimization.**"
