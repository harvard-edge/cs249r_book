title: The Depthwise Separable Memory Saver
scenario: >
  You're optimizing a keyword spotting model for a Cortex-M4 microcontroller, and a standard 2D convolutional layer is a memory bottleneck.
  The layer takes a 32x32x16 input tensor and applies 32 filters using a 3x3 kernel.
question: How many parameters are in a standard 3x3 convolution with 16 input channels and 32 filters?
details:
  realistic_solution: |
    The number of parameters in a standard 2D convolutional layer is the product of its kernel dimensions, the number of input channels, and the number of output channels (filters). For this layer, the calculation is a straightforward multiplication of these four values. On a memory-constrained device like a microcontroller, every parameter counts, as they must be stored in Flash memory, which is typically limited to 1MB or less.
  common_mistake: |
    **The Pitfall:** Forgetting the input_channels dimension and calculating only kernel_width * kernel_height * output_channels.
    **The Rationale:** Engineers new to on-device optimization often miscalculate the parameters of a standard convolution.
    **The Consequence:** This vastly underestimates true memory cost and masks the savings possible from depthwise separable convolutions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Kernel: 3x3. Input channels: 16. Output filters: 32.
    - INT8 precision (1 byte per parameter).

    **Calculations:**
    - Weights: 3 * 3 * 16 * 32 = 4,608 bytes (~4.6 KB).
    - Input Activations: 32 * 32 * 16 = 16 KB.
    - Output Activations: 32 * 32 * 32 = 32 KB.
    - Total SRAM required for execution: 16 KB + 32 KB = 48 KB.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound (4,608 parameters)**. The standard convolution uses 4,608 parameters and massive SRAM.
  options:
  - '288 parameters'
  - '656 parameters'
  - '4,608 parameters'
  - '9,216 parameters'
  correct_index: 2
