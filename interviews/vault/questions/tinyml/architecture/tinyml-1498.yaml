title: ESP32-S3 NAS Search Space Under SRAM Flash and Latency Limits
scenario: You are configuring a Hardware-Aware Neural Architecture Search (NAS) to find an image classifier for an ESP32-S3. The deployment constraints are under 100KB peak SRAM, under 500KB flash, above 80% CIFAR-10 accuracy, and under 50ms latency.
question: How would you design an ESP32-S3 NAS search space under 100 KB SRAM, 500 KB flash, 80% accuracy, and 50 ms latency?
details:
  realistic_solution: 'Valid operators: depthwise separable conv (3×3, 5×5), pointwise conv (1×1), average pooling, and skip connections only when their tensor lifetimes do not create a second large live branch. Forbidden: standard 3×3 conv with high channel counts at 32×32 because it inflates both MACs and simultaneous input/output activation memory. SRAM constraint: with 100KB total SRAM and roughly 40KB reserved for runtime, stacks, and I/O, the TFLM arena should keep peak live tensors near 60KB, not just the single largest tensor. Resolution reduction: CIFAR-10 32×32 input should downsample to 16×16 before allowing >32 channels, and to 8×8 before 64 channels. Channel search: [8, 16, 24, 32] early, max 64 later. Use a constrained objective such as maximize validation accuracy subject to measured SRAM <=60KB, model blob <=250-300KB after quantization, and profiled ESP32-S3 latency <=50ms; prune any candidate as soon as an estimated layer sum exceeds 45ms before full training. Estimated
    architecture: 4-6 depthwise-separable blocks, ~200K params -> ~200KB INT8 plus metadata, leaving roughly 200KB+ of the 500KB flash budget for code/runtime, with peak live activations around 50-60KB.'
  common_mistake: |
    **The Pitfall:** Including large standard convolution operators at high resolutions (e.g., 3x3 with 64 channels at 32x32) in the search space.
    **The Rationale:** Candidates fail to constrain the search space with hard SRAM limits for intermediate activation tensors.
    **The Consequence:** The NAS wastes massive GPU compute cycles evaluating infeasible architectures that will instantly OOM on the target hardware.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100KB SRAM budget includes OS/buffers, leaving ~60KB for peak activation.
    - CIFAR-10 input is 32x32x3.
    - Flash limit is 500KB (~500K INT8 params).

    **Calculations:**
    - 32x32 resolution with 16 channels INT8 output = 32 * 32 * 16 bytes = 16,384 bytes (16 KB).
    - 32x32 resolution with 32 channels INT8 output = 32 * 32 * 32 bytes = 32,768 bytes (32 KB).
    - If a layer keeps both a 32x32x16 input and a 32x32x32 output live, peak live activation memory is about 16 KB + 32 KB = 48 KB before scratch.
    - A standard 3x3 32->32 conv at 32x32 also has 3 * 3 * 32 * 32 = 9,216 weights and much higher MAC cost than a depthwise-separable alternative, so it should be excluded early.
    - A 200K-parameter INT8 model is about 200KB before scales, metadata, and alignment, so a 250-300KB model-blob ceiling leaves roughly 200KB+ flash for code/runtime under the 500KB total.
    - 16x16 resolution with 64 channels INT8 output = 16 * 16 * 64 bytes = 16,384 bytes (16 KB), allowing later channel expansion without increasing activation footprint.

    **Conclusion & Interpretation:**
    - **Result: target ~50-60KB peak live tensor memory and <=50ms profiled latency (Memory/Latency-Bound)**. The NAS must constrain simultaneous input/output/scratch lifetimes, reserve flash for runtime code, and reject candidates whose profiled or estimated latency cannot meet 50ms.
