title: The TinyML Latency Crisis
scenario: You are a TinyML engineer optimizing a keyword-spotting model for a Cortex-M4 based device. The model misses its hard 100ms inference deadline, currently taking 120ms. A profiler shows that a single standard 3x3 convolution layer is the bottleneck, consuming 90ms of the total time. The layer's input feature map is 14x14 with 64 channels, and it produces an output with 128 channels.
question: Is replacing the bottleneck convolution with a depthwise separable convolution sufficient to meet the 100 ms deadline?
details:
  realistic_solution: 'Calculate the computational reduction factor. A standard convolution''s FLOPs are proportional to Cin * Cout, while depthwise separable is Cin + Cout. The reduction factor applied to the 90ms bottleneck brings total latency comfortably below 100ms.'
  common_mistake: |
    **The Pitfall:** Failing to quantify the exact FLOPs reduction.
    **The Rationale:** Engineers vaguely know depthwise convolutions are "better" but incorrectly calculate the pointwise overhead, assuming memory bandwidth limits gains.
    **The Consequence:** They misallocate optimization efforts and fail to mathematically guarantee real-time performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard Conv: K=3, Cin=64, Cout=128, 14x14 map.
    - Original Layer Time: 90 ms. Original Total: 120 ms.

    **Calculations:**
    - Standard MACs: 9 * 64 * 128 * 14 * 14 = 14,450,688.
    - Depthwise+Pointwise MACs: (9 * 64 * 196) + (64 * 128 * 196) = 1,718,528.
    - Reduction Factor: 14.45M / 1.72M = 8.4x.
    - New Layer Time: 90 ms / 8.4 = 10.7 ms.
    - New Total Time: (120 - 90) + 10.7 = 40.7 ms.

    **Conclusion & Interpretation:**
    - **Result: 40.7 ms (Compute-Bound)**. The transformation resolves the bottleneck, confirming the layer was massively compute-bound.
  options:
  - 'No, the bottleneck on a Cortex-M4 is always memory bandwidth (low Ops/Byte ratio), so reducing FLOPs will not significantly impact latency.'
  - 'No, the reduction is only about 2x, bringing latency down to ~75ms, but adding the pointwise layer overhead will push it back over 100ms.'
  - 'Yes, the change reduces computation by ~8.4x, bringing the new total latency to ~41ms, which is within the 100ms budget.'
  - 'Yes, it will meet the deadline because parameter count is reduced by ~8.4x, which translates directly to a latency reduction of the same factor.'
  correct_index: 2
