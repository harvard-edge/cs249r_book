title: Hardware-Aware NAS for Vision on ARM Cortex-M4
scenario: Your team is tasked with deploying a real-time object classification model on an extremely resource-constrained embedded system like an ARM Cortex-M4 microcontroller without an FPU. Traditional NAS techniques often yield models too large or computationally intensive for this platform.
question: How should hardware-aware NAS for an FPU-less Cortex-M4 constrain search space, strategy, and feedback for vision models?
details:
  realistic_solution: 'An L6+ candidate would propose a search space heavily biased towards integer-friendly operations (e.g., 8-bit integer convolutions, bit-shift operations, small kernel sizes), and memory-efficient blocks (e.g., inverted residuals with low expansion ratios and depthwise separable convolutions). The NAS reward function would incorporate a hardware cost model (e.g., measured inference latency on the STM32F4, estimated SRAM footprint) as a primary objective alongside accuracy. Techniques like MCUNet''s two-stage search (macro-micro decoupling) or evolutionary algorithms with hardware-specific mutations would be discussed. They would also detail strategies for efficient integer quantization-aware training within the NAS loop and potential custom integer-only kernel implementations for critical operations.'
  common_mistake: |
    **The Pitfall:** Defining a search space that includes floating-point operations.
    **The Rationale:** Candidates overlook the severe penalty of the 'no FPU' constraint, which forces slow software emulation for any floating-point operation.
    **The Consequence:** The NAS algorithm produces sub-optimal or infeasible architectures that drastically fail latency requirements.
  napkin_math: |
    **Assumptions & Constraints:**
    - MCU: STM32F4 (168 MHz CPU, 256 KB SRAM, no FPU).
    - Example layer: 3x3 conv, 32 in, 32 out.
    - Activation map: 64x64, 32 channels, 8-bit.

    **Calculations:**
    - Weights size: 3 * 3 * 32 * 32 = 9,216 bytes (~9 KB).
    - Activation map size: 64 * 64 * 32 = 131,072 bytes (~128 KB).

    **Conclusion & Interpretation:**
    - **Result: 128 KB (Memory-Bound)**. 128 KB consumes half of the 256 KB SRAM immediately, meaning hardware-aware NAS must explicitly model the 256 KB SRAM constraint.
