title: 'The Kilobyte Wall'
scenario: 'You are tasked with deploying a keyword-spotting model onto a Cortex-M4 microcontroller with 256 KB of SRAM.'
question: 'Based on the typical hardware specifications for TinyML devices, which resource constraint will you almost certainly hit first and is generally the hardest to overcome?'
details:
  realistic_solution: 'Memory (SRAM). A typical MCU might only have 256 KB of SRAM. A model''s weights, activations, and intermediate buffers must all fit within this tiny space. The Tensor Arena peak memory usage is a critical metric, representing a hard physical wall.'
  common_mistake: |
    **The Pitfall:** Assuming compute (FLOPS) is the primary bottleneck.
    **The Rationale:** Engineers from cloud or mobile backgrounds focus on algorithmic changes to reduce operations, ignoring the SRAM limits.
    **The Consequence:** The model is optimized for speed but fundamentally fails to fit in memory, causing OOM crashes before inference even begins.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM Limit: 256 KB.
    - Tensor Size: 32x32x8 FP32 feature map.

    **Calculations:**
    - Bytes per element: 4 bytes (FP32).
    - Tensor footprint: 32 * 32 * 8 * 4 = 32,768 bytes (32 KB).
    - Input + Output buffer: 32 KB * 2 = 64 KB.
    - Utilization: 64 KB / 256 KB = 25% just for two tensors.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound (SRAM Constraint)**. Activations alone consume massive portions of the SRAM budget, proving memory is the first constraint hit.
  options:
  - 'Compute (MFLOPS)'
  - 'Power Draw (mW)'
  - 'Memory (SRAM)'
  - 'Flash Storage Size'
  correct_index: 2
