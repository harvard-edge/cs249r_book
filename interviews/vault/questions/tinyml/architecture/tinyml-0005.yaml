title: The Arena Swiss Cheese
scenario: Your TFLite Micro arena has 30 KB of total free SRAM after earlier tensor placements. However, the free space is split into two 15 KB gaps, and the allocator throws an 'Allocation Failed' error during initialization.
question: Based on the arena map, why can't the system satisfy a 30 KB request?
details:
  realistic_solution: You have **Internal Memory Fragmentation**. Even though the arena has 30 KB of total free space, it is split into two non-contiguous 15 KB "holes." The allocator cannot satisfy a single 30 KB tensor request because that tensor needs one contiguous region. The fix is to re-plan or reorder tensor lifetimes so the arena has a contiguous 30 KB span at the allocation point.
  common_mistake: |
    **The Pitfall:** Blaming an "allocation failed" error on a runtime memory leak in TFLite Micro.
    **The Rationale:** Candidates fail to understand that TFLite Micro uses a static memory arena planned ahead-of-time.
    **The Consequence:** Searching for dynamic memory leaks instead of diagnosing internal memory fragmentation in the tensor arena.
  napkin_math: |
    **Assumptions & Constraints:**
    - Free Space: 30 KB.
    - Fragmentation: Two 15 KB gaps.

    **Calculations:**
    - Max Contiguous Block: 15 KB. Required Size: 30 KB.

    **Conclusion & Interpretation:**
    - **Result: Allocation Failed (Memory-Bound).** Tensors mandate contiguous memory allocation within the arena.
