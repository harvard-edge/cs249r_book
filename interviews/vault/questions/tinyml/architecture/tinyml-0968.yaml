title: Analyzing SRAM Overflow in Cortex-M4 Residual Block
scenario: 'An INT8 CNN runs on a Cortex-M4 (256 KB SRAM). Weights are 120 KB (in flash). The maximum activation buffer for any single layer is 90 KB. The system throws an Out-Of-Memory (OOM) error exactly at a residual add operation.'
question: 'Why does this memory failure occur despite the largest individual activation size being well under the 256 KB SRAM limit?'
details:
  realistic_solution: 'To execute a residual connection, the inference engine must keep the original branch tensor in SRAM while sequentially allocating memory for intermediate operations. During the final addition, the system holds the residual tensor, the intermediate block output tensor, and the destination tensor simultaneously. Coupled with RTOS overhead, this peak demand exceeds the SRAM limit.'
  common_mistake: |
    **The Pitfall:** Assuming peak memory is just the size of the largest single layer input and output tensors combined.
    **The Rationale:** Candidates fail to account for tensor lifespan overlaps during skip connections and OS baseline SRAM consumption.
    **The Consequence:** They undersize the tensor arena and encounter unexpected Out-Of-Memory crashes in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total SRAM: 256 KB.
    - OS/Stack overhead: ~40 KB.
    - Available ML Arena: ~216 KB.

    **Calculations:**
    - At residual addition, 3 tensors are live: Skip Connection (80 KB) + Layer Output (90 KB) + Destination Tensor (80 KB).
    - Peak ML SRAM requirement = 80 + 90 + 80 = 250 KB.

    **Conclusion & Interpretation:**
    - **Result: 250 KB required ([Memory-Bound])**. 250 KB > 216 KB available ML Arena, causing the OOM error.
