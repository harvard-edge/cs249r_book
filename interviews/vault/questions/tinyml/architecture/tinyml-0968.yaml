title: Analyzing SRAM Overflow in Cortex-M4 Residual Block
scenario: An INT8 CNN runs on a Cortex-M4 (256 KB SRAM). Weights are 120 KB (in flash). The maximum activation buffer for any single layer is 90 KB. At the residual add, the runtime must keep the skip tensor, the current block output, and the add destination buffer live at the same time. The system throws an Out-Of-Memory (OOM) error exactly at that residual add operation.
question: Why does this memory failure occur despite the largest individual activation size being well under the 256 KB SRAM limit?
details:
  realistic_solution: 'To execute a residual connection, the inference engine must keep the original branch tensor in SRAM while allocating the current block output and a destination buffer for the add. Since the scenario only guarantees that each individual activation is at most 90 KB, the relevant failure mode is lifetime overlap: three live activation buffers can require up to 270 KB before arena metadata, stack, or RTOS overhead. That exceeds 256 KB SRAM even though no single layer buffer exceeds the limit.'
  common_mistake: |
    **The Pitfall:** Assuming peak memory is just the size of the largest single layer input and output tensors combined.
    **The Rationale:** Candidates fail to account for tensor lifespan overlaps during skip connections and OS baseline SRAM consumption.
    **The Consequence:** They undersize the tensor arena and encounter unexpected Out-Of-Memory crashes in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total SRAM: 256 KB.
    - Maximum single activation buffer from the scenario: 90 KB.
    - Residual add live set: skip tensor, current block output, and add destination.

    **Calculations:**
    - Worst-case residual-add live activation demand = 3 * 90 KB = 270 KB.
    - 270 KB exceeds the full 256 KB SRAM before counting stack, allocator metadata, or RTOS overhead.

    **Conclusion & Interpretation:**
    - **Result: residual tensor overlap can exceed SRAM (Memory-Bound).** The OOM occurs because peak live memory at the add is larger than any individual activation buffer.
