title: 'The Inverted Residual Bottleneck'
scenario: 'You are optimizing a person-detection model on a Cortex-M7 MCU. Profiling reveals a bottleneck in a classic residual block (wide -> narrow -> wide). A teammate suggests replacing it with an inverted residual block (narrow -> wide -> narrow).'
question: 'Why is an inverted residual block likely faster than a classic residual block on the Cortex-M7 MCU?'
details:
  realistic_solution: 'The key is memory bandwidth, not just FLOPs. On an MCU, moving data from SRAM to the CPU registers is far more expensive than the computation itself. The inverted residual keeps the wide intermediate tensor entirely within CPU registers/L1 cache during depthwise operations, drastically reducing main SRAM traffic.'
  common_mistake: |
    **The Pitfall:** Looking purely at theoretical FLOPs and assuming the 'expansion' layer in an inverted residual creates more processing work that will slow down the MCU.
    **The Rationale:** Candidates evaluate models solely on MAC counts and fail to analyze intermediate tensor materialization inside the memory hierarchy.
    **The Consequence:** Teams reject highly efficient architectural patterns (like MobileNetV2 blocks) because they misunderstand memory bandwidth constraints on embedded devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - 512 KB SRAM limit.
    - Classic residual skip connection forces a wide tensor (e.g., 16 KB) to be stored in main SRAM.
    - Inverted residual skip connection stores a narrow tensor (e.g., 4 KB).

    **Calculations:**
    - Classic block SRAM traffic: Skip connection must write/read 16 KB to slow SRAM.
    - Inverted block SRAM traffic: Skip connection writes/reads only 4 KB.
    - The wide expansion layer (e.g., 16 KB) in the inverted block is intermediate and executed via depthwise convolutions, allowing it to remain entirely in CPU registers/L1 cache.

    **Conclusion & Interpretation:**
    - **Result: 4 KB vs 16 KB SRAM Traffic (Memory-Bandwidth Bound)**. The inverted residual is faster because it dramatically reduces slow SRAM data traffic. On an MCU, memory-bound operations dominate latency; pushing fewer bytes across the main memory bus directly reduces pipeline stall cycles.
  options:
  - 'It''s faster because the expansion layer allows for more parallelism on the CPU.'
  - 'It''s faster by reducing SRAM data traffic, as the large intermediate tensor from the expansion layer is kept in-register.'
  - 'It''s not faster; the expansion layer increases FLOPs and will make the model slower.'
  - 'It''s faster because it requires fewer multiply-accumulate operations overall.'
  correct_index: 1
