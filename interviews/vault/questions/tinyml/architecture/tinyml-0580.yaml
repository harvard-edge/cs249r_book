title: The High-Speed SPI Ringing
scenario: >
  To increase framerate from an external SPI camera, the SPI clock is bumped from 10 MHz to 40 MHz.
  The image data immediately looks like static noise, and an oscilloscope shows violent voltage spikes up to 5V on the 3.3V system.
question: What analog phenomenon ruined your digital signal?
details:
  realistic_solution: |
    Signal reflection (ringing) due to impedance mismatch. At 40MHz with 2ns rise times, PCB traces as short as 2-3 inches act as transmission lines. Without proper termination, the 3.3V signal reflects off the unterminated end, creating constructive interference up to 5V — violating absolute maximum ratings and causing double-clocking. Fix: (1) add a 33-ohm series termination resistor near the SPI MOSI/CLK outputs, (2) keep traces under 1 inch or use controlled-impedance routing, (3) add ground guard traces alongside the SPI bus. This is a PCB design problem, not a firmware or silicon problem.
  common_mistake: |
    **The Pitfall:** Blaming MCU power supply or software timing rather than signal integrity.
    **The Rationale:** Software engineers often treat digital signals as ideal square waves and ignore high-frequency transmission line effects.
    **The Consequence:** Endless software debugging while physical ringing causes double-clocking and data corruption.
  napkin_math: |
    **Assumptions & Constraints:**
    - Clock: 40 MHz, Rise time: 2ns.
    - Trace length: 2-3 inches.

    **Calculations:**
    - Rule of thumb: Traces longer than Rise_Time(ns) * 2 inches become transmission lines.
    - 2ns * 2 = 4 inches (critical length threshold approached/exceeded depending on dielectric).
    - Reflections superimpose, boosting 3.3V logic to 5V peaks.

    **Conclusion & Interpretation:**
    - **Result: Impedance Mismatch (Signal Integrity)**. The signal is reflecting due to lack of termination.
