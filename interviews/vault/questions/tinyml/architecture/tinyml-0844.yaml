title: 'Realization: deploy EfficientNet-inspired tiny CNN on Cortex-M4 within 256KB SRAM'
scenario: You need to deploy a 4-class gesture recognizer on a Cortex-M4 (168MHz, 256KB SRAM, 1MB Flash) using a custom EfficientNet-inspired tiny CNN with depthwise separable convolutions. Input is 48x48 grayscale.
question: How would you design the architecture to fit within 256KB SRAM and 256KB Flash for model weights, then realize the TFLite Micro deployment?
details:
  realistic_solution: 'Architecture: 48x48x1 input -> Conv 3x3 (1->8, stride 2, 24x24x8) -> DW 3x3 stride 2 + PW 1x1 (8->16, 12x12x16) -> DW 3x3 stride 2 + PW 1x1 (16->32, 6x6x32) -> GlobalAvgPool (1x1x32) -> FC 32->4. Weights: stem 1x8x9 = 72, block1 depthwise 8x9 = 72, block1 pointwise 8x16 = 128, block2 depthwise 16x9 = 144, block2 pointwise 16x32 = 512, FC 32x4 = 128, for 1056 INT8 weights plus small bias/scale metadata. The weights are about 1KB, far below the 256KB weight budget; the TFLite Micro runtime and kernels must fit within the separate 1MB Flash budget. Peak activation SRAM with ping-pong buffers is about 48x48x1 + 24x24x8 = 6.9KB during the stem, then smaller for later blocks, so a 50KB arena is a reasonable starting point after accounting for scratch and tensor metadata.'
  common_mistake: |
    **The Pitfall:** Designing with too many channels in early layers.
    **The Rationale:** Candidates compensate for grayscale input by inflating channel counts early in the network.
    **The Consequence:** Drastically inflating peak activation memory, violating the strict 256KB SRAM constraint.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input: 48x48 grayscale.
    - Architecture: stem stride 2, then two depthwise separable blocks that each downsample by 2.
    - SIMD estimate: 4 MACs per 2 cycles for optimized int8 kernels.

    **Calculations:**
    - Stem MACs: 24x24x8x3x3x1 = 41,472.
    - Block 1 MACs: depthwise 12x12x8x9 = 10,368; pointwise 12x12x8x16 = 18,432.
    - Block 2 MACs: depthwise 6x6x16x9 = 5,184; pointwise 6x6x16x32 = 18,432.
    - FC MACs: 32x4 = 128.
    - Total MACs: 41,472 + 10,368 + 18,432 + 5,184 + 18,432 + 128 = 94,016 MACs.
    - Compute cycles estimate: 94,016 * 0.5 = 47,008 cycles.
    - Latency estimate: 47,008 / 168,000,000 = 0.28 ms before memory, framework, and kernel overhead.
    - Weight storage: 1056 INT8 weights plus bias/scale metadata, well below the 256KB weight budget.

    **Conclusion & Interpretation:**
    - **Result: About 94K MACs, 0.28 ms ideal compute time, and about 1KB of INT8 weights.** The design fits the 256KB SRAM and 256KB weight budgets; power requires a measured or specified platform power model rather than a latency-only estimate.
