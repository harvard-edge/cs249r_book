title: Hardware-Aware NAS Design for Cortex-M4
scenario: Your team needs to automatically discover optimal keyword spotting models for a microcontroller. You must design the architecture of a hardware-aware Neural Architecture Search (NAS) pipeline that guarantees the discovered models will meet a strict 50ms latency budget and fit entirely in SRAM.
question: How should a Cortex-M4 NAS pipeline enforce a 50 ms latency budget and 200 KB activation limit?
details:
  realistic_solution: The optimal design builds an empirical latency and memory predictor trained by profiling a diverse set of sub-networks on the actual hardware. The search space should focus exclusively on operations optimized by CMSIS-NN (e.g., specific kernel sizes and channel multiples) and enforce a hard constraint mask during the evolutionary or gradient-based search to reject architectures that exceed available SRAM or the predicted 50ms latency.
  common_mistake: |
    **The Pitfall:** Running the search directly on the device or relying solely on theoretical FLOP counts for latency estimation.
    **The Rationale:** Engineers often assume theoretical FLOPs perfectly correlate with on-device latency, ignoring memory access patterns and hardware-specific kernel optimization.
    **The Consequence:** The NAS outputs models that theoretically meet the budget but fail in production due to memory overhead (RTOS, buffers) and unaccounted latency stalls.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target CPU: 168 MHz with 2x INT8 MACs/cycle SIMD.
    - Latency Budget: 50 ms.
    - Total SRAM: 256 KB.
    - RTOS/Buffer Overhead: ~56 KB.

    **Calculations:**
    - Peak Theoretical Throughput: 168 MHz * 2 = 336 MMACs/s.
    - 50ms MAC Limit: 336 MMACs/s * 0.050 s = 16.8M theoretical MACs.
    - Strict Activation Limit: 256 KB - 56 KB = 200 KB.

    **Conclusion & Interpretation:**
    - **Result: Latency-Bound.** The NAS must enforce a hard constraint of <16.8M MACs and <200KB peak activation to guarantee adherence to the hardware bounds.
