title: The Vision Transformer Memory Explosion
scenario: You are working on a visual wake-word system on a device with a Cortex-M7. You're comparing a CNN and a Vision Transformer (ViT). When deployed, the ViT model crashes with an out-of-memory error during the forward pass of its first attention block.
question: Why does a 96x96 ViT with 2x2 patches overflow 1 MB SRAM on the first attention block?
details:
  realistic_solution: The ViT's self-attention mechanism is the culprit. Its memory complexity is quadratic with respect to the sequence length (the number of patches). The model must instantiate an `N x N` attention matrix in memory. For a 96x96 image with 2x2 patches, N = (96/2) * (96/2) = 48 * 48 = 2304. The attention matrix is 2304x2304. Storing this requires 2304^2 * 4 bytes = ~21 MB of SRAM, which massively overflows the 1MB limit.
  common_mistake: |
    **The Pitfall:** Blaming the model's overall parameter count.
    **The Rationale:** Forgetting that on-chip SRAM is measured in kilobytes, and quadratic intermediate activation tensors easily overflow it, regardless of parameter size.
    **The Consequence:** Tuning weight quantization when the real issue is activation memory complexity.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Patches (N): (96 / 2) * (96 / 2) = 2,304 patches.
       - SRAM limit: 1 MB.
    2. **Calculations:**
       - Attention Matrix = N x N = 2,304 x 2,304 = 5,308,416 elements.
       - Memory Cost in FP32 (4 bytes) = 5.3M * 4 = 21.2 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (OOM)**. 21.2 MB >> 1 MB SRAM, causing an immediate OOM crash.
  options:
  - The ViT model has too many parameters to fit in 1MB of Flash.
  - The self-attention mechanism requires storing a quadratically-scaling attention matrix in SRAM, which overflows the memory.
  - The Cortex-M7 CPU does not have hardware acceleration for the softmax operation in the attention block.
  - The parameter count exceeds SRAM capacity (21.2MB).
  correct_index: 1
