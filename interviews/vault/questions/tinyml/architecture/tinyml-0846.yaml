title: 'Specification: define CNN architecture constraints for Cortex-M4 vision inference'
scenario: 'You are writing the architectural specification for a TinyML CNN that must run inference for a 3-class fault detection system using 64x64 grayscale images from a vibration sensor.'
question: 'What architecture, memory, latency, and accuracy constraints should specify a CNN for 64x64 fault detection?'
details:
  realistic_solution: 'Spec: (1) Architecture: depthwise separable CNN, max 6 layers; (2) Input: 64x64x1 INT8; (3) Max MACs: 5M (target <100ms at 168MHz, 50M MACs/sec via SIMD); (4) Flash budget: model weights <=128KB (leaving 384KB for firmware); (5) SRAM budget: TFLite Micro arena <=128KB (leaving 128KB for OS + stack); (6) Activation functions: ReLU6 only (CMSIS-NN optimized); (7) Channel counts: multiples of 8 for SIMD efficiency; (8) Performance: fault-class recall >=99%, false alarm rate <=5% on 500-sample test set; (9) Latency: <=150ms per inference (updated at 6.7 Hz); (10) Quantization: INT8 QAT, accuracy drop vs FP32 <=2%.'
  common_mistake: |
    **The Pitfall:** Specifying accuracy in terms of top-1 on a generic benchmark dataset.
    **The Rationale:** Candidates often port cloud ML habits to embedded systems, ignoring that fault detection requires precision/recall metrics tailored to safety-critical constraints rather than average accuracy.
    **The Consequence:** The model achieves 85% average accuracy but misses critical fault signals, rendering the safety system useless in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM Budget: 128 KB for arena.
    - Flash Budget: 128 KB for weights.
    - Compute limit: 5M MACs.
    - Peak activation: 64x64x8.

    **Calculations:**
    - Peak activation footprint: (64 × 64 × 8) = 32,768 bytes (32 KB).
    - Double-buffering overhead: 32 KB × 1.5 = 48 KB.
    - Weight parameter count limit: 128 KB / 1 byte/param = 128K params.
    - MAC count for 128K param DW-CNN: ~512K MACs.
    - Memory check: 48 KB SRAM < 128 KB limit; 512K MACs < 5M MACs limit.

    **Conclusion & Interpretation:**
    - **Result: Architecturally Feasible (Memory-Bound)**. The specified model fits comfortably within the tight 128 KB SRAM and Flash budgets while meeting inference latency targets.
