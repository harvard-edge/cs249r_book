title: Sizing an Audio Wakeword Model for Nordic nRF5340
scenario: Your team is deploying an always-on audio wakeword detector on a Nordic nRF5340 with a target of ~5mA active current. The chosen architecture is a Depthwise Separable CNN, and the system must run inference on the app core while the net core handles BLE 5.3 connectivity.
question: How should you size SRAM and flash for an always-on nRF5340 wakeword detector while reserving resources for Zephyr, BLE, and audio buffers?
details:
  realistic_solution: A realistic approach reserves roughly 80 KB for the Zephyr RTOS, BLE IPC, and application state, plus 8 KB for a ping-pong audio DMA buffer. This leaves around 168 KB for the TFLite Micro tensor arena to hold peak activations. For flash, treat the 1 MB app-core flash budget as two OTA slots plus metadata, then subtract the bootloader and application image from the active slot before assigning space to model weights. That leaves roughly 300 KB for an INT8 model after firmware and OTA reservations, so the wakeword architecture must be sized around both a sub-168 KB peak arena and a roughly 300 KB weight budget.
  common_mistake: |
    **The Pitfall:** Assuming the entire 256 KB SRAM is available for the ML model's tensor arena.
    **The Rationale:** Forgetting to account for the RTOS heap, network stack IPC overhead, audio DMA buffers, and flash partitioning required for over-the-air (OTA) updates.
    **The Consequence:** Deploying a model that throws Out-Of-Memory (OOM) errors during system initialization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total SRAM: 256 KB. Total Flash: 1 MB.
    - OS/App/BLE overhead: ~80 KB. Audio buffers: 8 KB.
    - OTA metadata/settings: ~16 KB.
    - Bootloader + App Firmware inside each OTA slot: ~200 KB.

    **Calculations:**
    - SRAM for Tensor Arena = 256 KB - 80 KB - 8 KB = 168 KB.
    - Flash after OTA metadata = 1024 KB - 16 KB = 1008 KB.
    - Flash partition for OTA (dual-bank) = 1008 KB / 2 = 504 KB per slot.
    - Flash for weights per slot = 504 KB - 200 KB = 304 KB.

    **Conclusion & Interpretation:**
    - **Result: about 300 KB Flash, 168 KB SRAM (Memory-Bound).** A 250k parameter INT8 model needs about 250 KB of flash and must keep peak activations below 168 KB, leaving only modest headroom for alignment and metadata.
