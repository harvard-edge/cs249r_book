title: The Depthwise Separable Memory Dividend
scenario: You are designing a visual wake-word model for a Cortex-M7 microcontroller, which has a very limited Flash memory budget for weights. A key layer in your CNN has an input with 16 channels and must produce an output with 32 channels using a 3x3 kernel.
question: What parameter reduction results from replacing the 3x3 16-to-32 channel convolution with a depthwise separable convolution?
details:
  realistic_solution: 'A depthwise separable convolution splits a standard convolution into two smaller operations: a depthwise convolution that processes each input channel independently, followed by a pointwise (1x1) convolution that combines the outputs. Standard Convolution applies 32 filters, each of size 3x3x16. Total parameters = 4,608. Depthwise Convolution applies one 3x3 filter per input channel. Parameters = 144. Pointwise Convolution maps 16 channels to 32 outputs. Parameters = 512. Total Depthwise Separable = 656 parameters. Reduction Factor: 4,608 / 656 ~ 7.0x fewer parameters. This ~7x reduction is critical for fitting models within the limited Flash memory of microcontrollers.'
  common_mistake: |
    **The Pitfall:** Only calculating the parameters for the depthwise step and ignoring the pointwise convolution.
    **The Rationale:** Candidates forget that a depthwise separable convolution requires a 1x1 pointwise pass to mix channels.
    **The Consequence:** Wildly overestimating the memory savings (e.g., claiming a 32x reduction), leading to memory overflow during deployment.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input: 16 channels, Output: 32 channels, Kernel: 3x3.

    **Calculations:**
    - Standard Conv Params: 3 * 3 (kernel) * 16 (in) * 32 (out) = 4,608 parameters.
    - Depthwise Params: 3 * 3 (kernel) * 16 (in) = 144 parameters.
    - Pointwise Params: 1 * 1 (kernel) * 16 (in) * 32 (out) = 512 parameters.
    - Total Separable Params: 144 + 512 = 656 parameters.
    - Reduction Factor: 4,608 / 656 = 7.02.

    **Conclusion & Interpretation:**
    - **Result: ~7.0x reduction (Memory-Bound)**. The parameter count is reduced by ~7.0x.
  options:
  - 'A ~32x reduction.'
  - 'A ~9x reduction.'
  - 'A ~7x reduction.'
  - 'A ~2x reduction.'
