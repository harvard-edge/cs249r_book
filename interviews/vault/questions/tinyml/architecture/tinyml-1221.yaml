title: Optimizing Peak SRAM Footprint for CNN on STM32F4
scenario: You are deploying a depthwise separable CNN onto a Cortex-M4 (STM32F4). The INT8 weights are 400 KB, easily fitting the 1 MB flash. However, the system crashes with out-of-memory errors during runtime.
question: Why does a 400 KB-weight STM32F4 CNN OOM at runtime, and how should the bottleneck activation layer be changed?
details:
  realistic_solution: Evaluate the peak transient activation arena. Even if weights fit in Flash, high-resolution intermediate tensors will overflow the MCU's SRAM. To fix, decrease the spatial resolution or channel width of the specifically failing layer.
  common_mistake: |
    **The Pitfall:** Only calculating the static memory footprint (weights in flash).
    **The Rationale:** Candidates overlook the peak activation memory (transient SRAM) required during intermediate layer execution, especially for non-in-place operations.
    **The Consequence:** The system will continually crash with OOM errors during the widest execution layer, rendering the deployment failed.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target class: STM32F4 Cortex-M4 with 256 KiB SRAM available to the application on this board.
    - TensorFlow Lite Micro keeps an activation arena in SRAM; the peak layer may require input, output, and scratch buffers to be resident at once.
    - Initial bottleneck tensor: 64x64x32 INT8 = 64 * 64 * 32 bytes = 131,072 bytes = 128 KiB.

    **Calculations:**
    - Initial Peak SRAM: Input (128 KiB) + Output (128 KiB) + Scratch (14 KiB) = 270 KiB (>256 KiB).
    - Optimized tensor: 64x64x16 INT8.
    - Optimized tensor size: 64 * 64 * 16 bytes = 65,536 bytes = 64 KiB.
    - New Peak SRAM: Input (64 KiB) + Output (64 KiB) + Scratch (14 KiB) = 142 KiB.

    **Conclusion & Interpretation:**
    - **Result: Peak drops from 270 KiB to 142 KiB (Activation-Arena-Bound)**. Reducing the failing layer from 32 to 16 channels makes the activation arena fit under the 256 KiB SRAM budget.
