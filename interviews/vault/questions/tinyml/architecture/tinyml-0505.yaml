title: The Smart Doorbell's Dilemma
scenario: 'You are a TinyML engineer on a smart doorbell team. The prototype uses a Cortex-M7 MCU with 512KB of SRAM. The person-detection model is too slow for real-time inference (>500ms) and often crashes with out-of-memory errors. Profiling traces the root cause to a single standard 3x3 convolutional layer taking a 14x14x64 feature map input and producing a 14x14x128 output map.'
question: 'What architectural replacement best addresses both latency and memory problems in the smart doorbell convolution layer?'
details:
  realistic_solution: 'The correct approach is to replace the standard convolution with a depthwise separable convolution. This architectural change tackles both problems at their root. It factors the single, dense operation into two smaller, more efficient ones: a 3x3 depthwise convolution that processes each input channel independently, followed by a 1x1 pointwise convolution that combines the outputs. This dramatically reduces both the number of parameters (model size) and the multiply-accumulate operations (FLOPs), leading to significant improvements in memory usage and latency.'
  common_mistake: |
    **The Pitfall:** Focusing solely on memory (e.g., INT8 quantization) while ignoring the computational cost (FLOPs).
    **The Rationale:** Candidates may not realize that reducing the memory footprint by 4x does not solve the enormous number of FLOPs causing the latency issue.
    **The Consequence:** The model fits in memory but still fails real-time latency deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard 3x3 Conv: 14x14 feature map, 64-to-128 channels.
    - MCU constraint: 512KB SRAM, <500ms latency deadline.

    **Calculations:**
    - Standard MACs: 3 * 3 * 64 * 128 * 14 * 14 = 14.45M.
    - Separable params: 576 (DW) + 8,192 (PW) = 8,768 (8.4x smaller).
    - Separable MACs: 14.45M / 8.4 = 1.72M.

    **Conclusion & Interpretation:**
    - **Result: 1.72M MACs (Compute-Bound)**. Substituting depthwise separable convolutions drops latency to roughly 3.6ms and fixes OOM limits completely.
  options:
  - 'Apply INT8 post-training quantization to the layer. It will cut the memory footprint by 4x and is simple to implement.'
  - 'Replace the layer with a small Vision Transformer block, as they are state-of-the-art for vision tasks.'
  - 'Replace the standard convolution with a 3x3 depthwise separable convolution to reduce computation by ~8.4x.'
  - 'Use unstructured weight pruning to remove 85% of the connections, as this will create a sparse and efficient layer.'
  correct_index: 2
