title: Tinyml New 0032
scenario: A heavy ML inference on an M4 takes 500ms to complete. During this single blocking `invoke()` call, the entire microcontroller randomly resets, halting operations completely.
question: Why does the M4 reset during a 500 ms blocking TinyML inference, and how should inference be scheduled to avoid it?
details:
  realistic_solution: 'The blocking inference call is starving the Watchdog Timer (WDT). The WDT expects to be ''petted'' (reset) at regular intervals to verify the system hasn''t frozen. Because the inference runs uninterrupted for 500ms, the WDT times out and triggers a hard reset. The solution is to slice the inference execution so it yields occasionally, or use an RTOS thread to pet the WDT.'
  common_mistake: |
    **The Pitfall:** Treating edge ML frameworks as monolithic black boxes.
    **The Rationale:** Developers accustomed to cloud runtimes assume an `invoke()` call can block execution indefinitely without consequence.
    **The Consequence:** The Watchdog Timer detects the frozen system thread and triggers a hard hardware reset, completely preventing the model from ever returning a prediction.
  napkin_math: |
    **Assumptions & Constraints:**
    - Watchdog Timeout: 250 ms.
    - Blocking Inference: 500 ms.

    **Calculations:**
    - Timeout Occurrence: The WDT resets the MCU at the 250 ms mark, precisely halfway through the inference.
    - Minimum Yields: To safely run 500 ms of compute, the WDT must be petted every 200 ms.

    **Conclusion & Interpretation:**
    - **Result: 3 non-blocking segments (Compute-Bound)**. The inference must be chunked into at least 3 non-blocking segments.
