title: Hardware-Aware NAS Tradeoffs on ESP32-S3
scenario: You are deploying a wake-word model on an ESP32-S3 (240 MHz Xtensa). Hardware-Aware NAS outputs two candidate architectures. Model A (450 KB peak memory, 15 MFLOPs) uses scalar operations. Model B (600 KB peak memory, 25 MFLOPs) perfectly utilizes 4-way INT8 vector instructions, but its size forces 88 KB of data into slower external PSRAM.
question: Which architecture do you choose for deployment, and how do you justify the tradeoff between PSRAM latency and vectorization speedup?
details:
  realistic_solution: |
    Choose Model B if profiling confirms the 88 KB PSRAM spill is mostly sequential or cache-friendly, because its 4-way INT8 vectorization more than offsets the added memory stalls under the stated assumptions. Model A stays entirely within internal memory but uses scalar operations, so its 15 MFLOPs translate to a much larger CPU cycle count. The justification must compare both models in the same units: convert MFLOPs to MAC-like work consistently, estimate scalar versus vector cycles, then add the PSRAM miss penalty for Model B. If the spill causes random cache misses or repeated rereads, Model A may win, but the provided numbers favor Model B.
  common_mistake: |
    **The Pitfall:** Reflexively rejecting Model B because it spills into PSRAM, assuming external memory latency will completely destroy performance.
    **The Rationale:** Candidates treat SRAM limits as an absolute hardware cliff without quantifying the cache miss penalty against the vectorization speedup.
    **The Consequence:** The team deploys a significantly slower scalar model, wasting the specialized SIMD capabilities of the Xtensa core.
  napkin_math: |
    **Assumptions & Constraints:**
    - CPU = 240 MHz.
    - Treat 2 FLOPs as roughly 1 MAC for this CNN comparison.
    - Model A = 15 MFLOPs ≈ 7.5 MMACs scalar (1 MAC/cycle).
    - Model B = 25 MFLOPs ≈ 12.5 MMACs vectorized (4 MAC/cycle).
    - PSRAM spill = 88 KB.
    - Cache line = 32 bytes.
    - Cache miss penalty ≈ 40 cycles.

    **Calculations:**
    - Model A Compute: 7.5M cycles / 240 MHz = 31.25 ms.
    - Model B Compute: (12.5M / 4) = 3.125M cycles.
    - Model B PSRAM penalty: 88,000 bytes / 32 bytes/line = 2,750 misses.
    - 2,750 misses * 40 cycles = 110,000 cycles stall.
    - Model B Total Cycles: 3.125M + 0.11M = 3.235M cycles.
    - Model B Time = 3.235M / 240 MHz = 13.48 ms.

    **Conclusion & Interpretation:**
    - **Result: choose Model B under the cache-friendly PSRAM assumption: ~13.5 ms versus Model A's ~31.3 ms.** The 4-way vector speedup saves about 4.375M compute cycles relative to Model A, while the estimated PSRAM spill adds only ~0.11M stall cycles. **Bottleneck: Compute with a Bounded PSRAM Penalty.**
