title: Cortex-M4 Depthwise Separable Convolution Tiling for SIMD Latency and SRAM
scenario: You are optimizing a depthwise separable convolution for Cortex-M4 (168MHz, 256KB SRAM, no cache, Harvard architecture). The layer processes 16x16x64 input with 3x3 depthwise + 64->64 pointwise.
question: How should the Cortex-M4 depthwise separable layer be tiled and costed to achieve correct SIMD latency and SRAM use?
details:
  realistic_solution: Use a streaming row tile, not a full-tensor staging plan. Keep a 3-row input halo for the depthwise 3x3 kernel (3x16x64 = 3072 B), compute one output row of depthwise results (16x64 = 1024 B), then immediately run the 1x1 pointwise convolution for that row into a 16x64 output row buffer (1024 B). Double-buffer one row if the DMA or next layer needs producer/consumer overlap; this still keeps the core working set under about 7 KB before stack, weights, and TFLM metadata. SIMD applies across channels for the pointwise 1x1 and across packed depthwise channel groups. MACs are 16x16x64x9 = 147,456 depthwise plus 16x16x64x64 = 1,048,576 pointwise, or 1,196,032 total. At 4 MACs per 2 cycles, the ideal compute cost is about 598K cycles, so pointwise compute dominates while halo tiling keeps SRAM use small.
  common_mistake: |
    **The Pitfall:** Loading the full input tensor into SRAM before computing outputs.
    **The Rationale:** Candidates fail to use row-by-row halo tiling for the 3x3 depthwise kernel.
    **The Consequence:** Unnecessary peak SRAM spikes (e.g., 16KB just for input) leading to Out-of-Memory crashes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4 DSP processes 4 MACs every 2 cycles.
    - Input/output tensors are 16x16x64 INT8.
    - Use valid halo rows for the 3x3 depthwise kernel and stream rows through the 1x1 pointwise kernel.

    **Calculations:**
    - Depthwise MACs: 16 * 16 * 64 * 3 * 3 = 147,456.
    - Pointwise MACs: 16 * 16 * 64 * 64 = 1,048,576.
    - Total MACs: 147,456 + 1,048,576 = 1,196,032.
    - SIMD cycle estimate: 1,196,032 / (4 MACs / 2 cycles) = 598,016 cycles.
    - Full input tensor would be 16 * 16 * 64 = 16,384 B, but the depthwise tile only needs a 3-row halo: 3 * 16 * 64 = 3,072 B.
    - Working buffers for a row pipeline: 3,072 B input halo + 1,024 B depthwise row + 1,024 B pointwise output row, or about 5 KB; double-buffering a row keeps this under about 7 KB.

    **Conclusion & Interpretation:**
    - **Result: about 598K cycles with a row-tiled SRAM footprint of roughly 5-7 KB.** The layer is dominated by pointwise compute, but the expected design answer is the row/halo tiling plan plus the corrected SIMD cost.
