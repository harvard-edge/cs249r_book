title: 'ESP32-S3 TinyML Deployment: Memory Feasibility Analysis for a Keyword Spotting CNN'
scenario: You are tasked with deploying a 300K-parameter INT8 convolutional neural network (CNN) for keyword spotting onto an ESP32-S3. During inference, the maximum activation memory required is estimated to be 200 KB.
question: How should you assess whether a 300K-parameter INT8 KWS CNN with 200 KB activations fits on ESP32-S3 memory?
details:
  realistic_solution: A realistic feasibility check first adds the INT8 weights and peak activation arena, then subtracts RTOS, stack, heap, and driver overhead from internal SRAM. Here, 300K INT8 weights are about 293 KB and peak activations are 200 KB, so the 493 KB model working set does not fit entirely in the ESP32-S3's internal 512 KB SRAM once system overhead is included. The deployable design therefore requires PSRAM for most weights or a smaller model, while latency-sensitive activations, tensor arenas, and frequently accessed kernels should remain in SRAM. If PSRAM latency or power is unacceptable, reduce the model with pruning, layer redesign, or more aggressive quantization rather than claiming an internal-SRAM-only fit.
  common_mistake: |
    **The Pitfall:** Accounting only for the static model weights and neglecting dynamic memory requirements or OS overhead.
    **The Rationale:** Candidates often just add weights and activations, assuming the entire SRAM is empty and available strictly for the model.
    **The Consequence:** This leads to Out-Of-Memory (OOM) errors at runtime because the RTOS and other application code require significant SRAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model weights: 300,000 parameters at INT8 (1 byte/param).
    - Peak activations: 200 KB.
    - ESP32-S3 internal SRAM: 512 KB (with ~100-200 KB OS/WiFi overhead).

    **Calculations:**
    - Weights memory: 300,000 bytes ≈ 293 KB.
    - Total base memory: 293 KB (weights) + 200 KB (activations) = 493 KB.
    - Available SRAM (approx): 512 KB - 150 KB (OS overhead) = 362 KB.
    - SRAM deficit: 493 KB - 362 KB = 131 KB deficit.

    **Conclusion & Interpretation:**
    - **Result: 131 KB deficit (Memory-Capacity-Bound)**. The model cannot fit entirely in internal SRAM; at least 131 KB (practically all 293 KB of weights) must be offloaded to PSRAM.
