title: Architecting a KWS Memory Pipeline for ESP32-S3
scenario: You are tasked with designing a continuous keyword spotting system for a smart home device using an ESP32-S3 microcontroller. The device must listen for a wake word while maintaining a WiFi connection. The ESP32-S3 has 512 KB of fast internal SRAM, 8 MB of slower external PSRAM, and vector extensions for INT8.
question: How should the ESP32-S3's internal SRAM and external PSRAM be partitioned to meet real-time latency constraints with WiFi enabled?
details:
  realistic_solution: A robust architecture pins the RTOS, WiFi stack, audio ring buffer, and the model's intermediate activations (working memory) to the 512 KB internal SRAM to ensure deterministic low-latency execution. The INT8 quantized model weights should reside in the 8 MB PSRAM, accessed via cache, to maximize the use of the fast SRAM for highly volatile data and vector math.
  common_mistake: |
    **The Pitfall:** Placing both model weights and activations in the 8 MB PSRAM.
    **The Rationale:** Because PSRAM is much larger, candidates lazily allocate all ML buffers there, ignoring the massive latency penalty and cache miss overhead compared to internal SRAM.
    **The Consequence:** High inference latency that causes the system to miss its real-time audio deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Internal SRAM: 512 KB.
    - WiFi/RTOS overhead: ~150 KB.
    - Audio ring buffer: ~32 KB.
    - INT8 CNN activations: ~100 KB.

    **Calculations:**
    - Remaining SRAM before ML: 512 KB - 150 KB - 32 KB = 330 KB.
    - Remaining SRAM after activations: 330 KB - 100 KB = 230 KB.
    - The ~2 MB model weights strictly exceed remaining SRAM and must go to PSRAM.

    **Conclusion & Interpretation:**
    - **Result: Activations in SRAM, Weights in PSRAM (Memory Capacity-Bound)**. Pinning volatile activations to internal SRAM preserves deterministic execution, while slower PSRAM is acceptable for cached weight reads.
