title: The Vision Transformer Memory Trap
scenario: 'You''re deploying a person-detection model on a smart doorbell camera equipped with a Cortex-M7 microcontroller (MCU) that has 512KB of SRAM. You have two models with identical accuracy: a MobileNetV2-style CNN and a small Vision Transformer (ViT). The ViT has fewer parameters. During inference, the CNN''s largest activation map is 14x14x160 (FP32). The ViT operates on 196 patches (14x14 sequence) with an embedding dimension of 256 and 4 attention heads. Its largest memory consumer is the N-by-N attention score matrix inside the transformer block.'
question: 'Which person-detection model fits a 512 KB Cortex-M7: MobileNetV2 activations or a ViT attention matrix?'
details:
  realistic_solution: The key is to calculate the peak SRAM usage for each model. The CNN's peak activation size is about 125,440 bytes, or 122.5 KiB, so it fits within the MCU's 512 KiB SRAM before other buffers are considered. The ViT's self-attention mechanism requires instantiating N x N attention score matrices for each head. With 196 tokens, FP32 scores, and 4 heads, those matrices alone require 614,656 bytes, or about 600 KiB, which exceeds the SRAM budget. Option 2, the CNN, is the deployable choice.
  common_mistake: |
    **The Pitfall:** Assuming fewer parameters always means a smaller peak memory footprint.
    **The Rationale:** Engineers with cloud backgrounds equate parameter count to model size, forgetting that for TinyML, peak SRAM usage (dominated by activations) is the primary constraint.
    **The Consequence:** Deploying a model that easily fits in Flash but instantly causes an Out-of-Memory (OOM) error in SRAM during inference.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM Limit: 512 KiB = 524,288 bytes.
    - CNN Peak: 14x14x160 FP32.
    - ViT Tokens: 196 with 4 attention heads.

    **Calculations:**
    - CNN Peak Activation: 14 * 14 * 160 * 4 = 125,440 bytes (~122.5 KiB).
    - ViT Attention Matrix (per head): 196 * 196 * 4 bytes = 153,664 bytes (~150 KiB).
    - ViT Total (4 heads): 4 * 153,664 bytes = 614,656 bytes (~600 KiB).

    **Conclusion & Interpretation:**
    - **Result: ViT attention scores exceed SRAM**. The ViT needs ~600 KiB for attention scores alone, while the CNN peak activation is ~122.5 KiB and fits the 512 KiB SRAM budget.
  options:
    - The ViT, because it has fewer parameters and is more modern.
    - The CNN, because the ViT's quadratic N-by-N attention score matrices exceed the MCU's SRAM.
    - Both will fit easily, as 512KB is plenty of memory for either model architecture.
    - Neither will fit; both CNNs and ViTs require multiple megabytes of SRAM for vision tasks.
  correct_index: 1
