title: Hardware-Aware NAS Design for ARM Cortex-M4
scenario: You are designing a hardware-aware Neural Architecture Search (NAS) pipeline targeting an ARM Cortex-M4. The search space must maximize accuracy while rigorously enforcing memory and compute limitations.
question: How must the NAS constraint estimators evaluate peak memory and latency without physically deploying every candidate architecture?
details:
  realistic_solution: The NAS architecture must implement an analytical memory estimator that calculates the peak concurrent tensor lifecycle (inputs, outputs, and intermediate scratch buffers) to mathematically guarantee it fits within the 256 KB SRAM constraint. For latency, substituting raw FLOP counts is fatal; the NAS must utilize a Lookup-Table (LUT) predictor built by profiling atomic blocks directly on the target hardware to natively account for CMSIS-NN's asymmetric 2x INT8 SIMD performance.
  common_mistake: |
    **The Pitfall:** Utilizing raw FLOPs as a proxy for hardware latency.
    **The Rationale:** Candidates incorrectly assume FLOPs correlate linearly with execution time and evaluate memory strictly by weight size, ignoring activation peaks.
    **The Consequence:** The NAS proposes architectures that technically clear the FLOP budget but immediately throw HardFault exceptions in production because intermediate tensors exceed SRAM bounds.
  napkin_math: |
    **Assumptions & Constraints:**
    - 256 KB SRAM limit.
    - Inverted bottleneck layer processes a 64x64x16 input.

    **Calculations:**
    - Input tensor size: 64 * 64 * 16 bytes = 65.5 KB.
    - Expansion (4x) output size: 64 * 64 * 64 bytes = 262.1 KB.
    - Peak Memory required: 65.5 KB + 262.1 KB = 327.6 KB.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound Overflow**. The activation tensors alone consume 327.6 KB, violently breaching the 256 KB SRAM limit and proving the architecture must be instantly rejected by the NAS.
