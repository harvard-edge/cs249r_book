title: 'The Depthwise Memory Dividend: Attention Scaling & Variants'
scenario: 'You are optimizing a keyword spotting model for a Cortex-M4 microcontroller, which has 256KB of SRAM. Your profiler shows a standard 3x3 convolutional layer is a memory hotspot. The layer takes 64 input channels and produces 128 output channels. To save memory, you are considering replacing it with a 3x3 depthwise separable convolution.'
question: 'What are the INT8 parameter memory costs for the standard and depthwise separable 64-to-128 channel convolutions?'
details:
  realistic_solution: 'A depthwise separable convolution splits a standard convolution into two much cheaper steps: a 3x3 depthwise convolution that processes each input channel independently, followed by a 1x1 pointwise convolution that combines the outputs. For INT8 deployment (1 byte per parameter), the math is:'
  common_mistake: |
    **The Pitfall:** Calculating only the depthwise step parameters.
    **The Rationale:** Candidates forget to include the subsequent 1x1 pointwise convolution in their memory calculation.
    **The Consequence:** Memory savings are wildly overestimated (>100x instead of ~8-9x), leading to incorrect architectural assumptions.
  napkin_math: |
    **Assumptions & Constraints:**
    - 64 input channels, 128 output channels, INT8 parameters (1 byte/param).
    - Standard vs Depthwise Separable convolution.

    **Calculations:**
    - Standard weights: 3 * 3 * 64 * 128 = 73,728 bytes (~72 KB).
    - Depthwise step: 3 * 3 * 64 * 1 = 576 bytes.
    - Pointwise step: 1 * 1 * 64 * 128 = 8,192 bytes.
    - Separable total: 576 + 8,192 = 8,768 bytes (~8.6 KB).

    **Conclusion & Interpretation:**
    - **Result: 8.4x Reduction (Memory-Bound)**. Parameter memory shrinks from ~72 KB down to ~8.6 KB by employing separable convolutions, freeing crucial SRAM.
  options:
  - 'Standard: ~72 KB, Depthwise: ~0.6 KB. The savings are over 100x.'
  - 'Standard: ~288 KB, Depthwise: ~34 KB. Both are too large for the SRAM.'
  - 'Standard: ~72 KB, Depthwise: ~8.6 KB. The savings are around 8.4x.'
  - 'Standard: ~72 KB, Depthwise: ~17 KB. The savings are around 4.2x.'
  correct_index: 2
