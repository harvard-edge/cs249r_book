title: Estimating INT8 CNN Size, SRAM Footprint, and Ethos-U55 Latency on Cortex-M7
scenario: You are tasked with deploying a CNN for keyword spotting onto an edge device. Before training begins, you need to perform a feasibility study to ensure the model, expected to have around 500,000 parameters, can fit within available memory and meet a strict inference latency budget of 50ms.
question: How would you estimate parameter count, INT8 memory footprint, and Cortex-M7 plus Ethos-U55 inference latency?
details:
  realistic_solution: Sum parameters per layer assuming 8-bit quantization (1 param = 1 byte). Identify the layer producing the largest intermediate tensor for peak activation memory. Approximate inference latency as Total MACs / (NPU_MACs_per_cycle * NPU_frequency), applying a realistic NPU utilization factor (e.g., 50-80%). Check bottlenecks in activation sizes for tight memory limits.
  common_mistake: |
    **The Pitfall:** Overlooking peak activation memory.
    **The Rationale:** Candidates focus only on weight parameter size and theoretical MACs, ignoring the SRAM footprint of intermediate tensors.
    **The Consequence:** The model fails to run on-device due to an out-of-memory (OOM) exception during the first convolutional layer.
  napkin_math: |
    **Assumptions & Constraints:**
    - Params: 500,000 (INT8).
    - NPU throughput: 128 MACs/cycle at 480 MHz.
    - Total MACs: ~50 million.
    - Peak activation tensor: 128 KB.
    - CPU/NPU handoff, DMA/cache maintenance, and unsupported operator overhead must be included in end-to-end latency.

    **Calculations:**
    - Weight memory = 500,000 * 1 byte = 500 KB decimal (~488 KiB).
    - Peak activation memory = 128 KB.
    - Minimum live memory if weights and peak activation must be SRAM-resident = 500 KB + 128 KB = 628 KB, before arena and runtime overhead.
    - NPU MAC time = 50e6 MACs / (128 MAC/cycle * 480e6 cycles/s) = 0.000814 s = 0.814 ms.
    - With 50% effective NPU utilization, compute time ≈ 1.6 ms.
    - Example end-to-end latency budget: 1.6 ms NPU compute + 3 ms CPU scheduling/operator setup + 2 ms DMA/cache/data movement + 4 ms unsupported or CPU-side ops ≈ 10.6 ms.

    **Conclusion & Interpretation:**
    - **Result: ~500 KB weights, 128 KB peak activation, and ~11 ms assumed end-to-end latency (Memory-Bound)**. Raw Ethos-U55 MAC time is below 1 ms, but the feasibility answer must include Cortex-M7 overhead and memory movement. The 50 ms SLA is plausible only if operators map cleanly to the NPU and the memory plan avoids SRAM overflow or slow repeated transfers.
