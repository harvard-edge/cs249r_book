title: KWS Memory Architecture on Cortex-M4
scenario: You are designing an always-on keyword spotting system for a battery-powered sensor node using an ARM Cortex-M4 (STM32F4) microcontroller. The device has 256 KB of SRAM, 1 MB of flash, and no FPU, but supports CMSIS-NN SIMD instructions.
question: How should you partition Cortex-M4 SRAM and flash to determine the maximum feasible size of an INT8 depthwise-separable KWS model?
details:
  realistic_solution: Partition the 256 KB SRAM strictly. Subtract RTOS and audio buffers to find the peak memory footprint (activation arena) allowed for TFLite Micro intermediate tensors.
  common_mistake: |
    **The Pitfall:** Focusing solely on the model's parameter size fitting into the 1 MB flash.
    **The Rationale:** Candidates neglect the strict SRAM constraints for activations, the lack of an FPU, and the need to budget SRAM for the RTOS and audio buffers.
    **The Consequence:** Designing a model that compiles and flashes successfully but immediately crashes with an Out-of-Memory (OOM) error during runtime.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4: 256 KB SRAM, 1 MB Flash, CMSIS-NN SIMD.
    - OS/Buffers: 76 KB SRAM. TFLM runtime: ~20 KB.

    **Calculations:**
    - Available Activation Arena: 256 - 76 - 20 = 160 KB.
    - Flash remaining for weights: 1 MB - 200 KB (Firmware) = 800 KB.
    - KWS Int8 Model: 500K params = 500 KB. (Fits in 800 KB Flash).

    **Conclusion & Interpretation:**
    - **Result: Max arena is 160 KB, Max weights ~800 KB (SRAM-Bound)**. The model topology is strictly SRAM-bound by the 160 KB peak intermediate tensor limit.
