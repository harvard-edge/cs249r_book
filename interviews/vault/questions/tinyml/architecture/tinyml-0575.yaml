title: 'The SPI Bus Capacitance Limit'
scenario: 'Your ML device needs to sample 4 high-speed IMUs simultaneously. You connect all 4 IMUs to the same SPI bus on the MCU. You configure the SPI clock to 20 MHz. The system works perfectly with 1 IMU. When you plug in all 4, the data read from all sensors becomes corrupted. The firmware is correct, the Chip Select pins are correct, and 20 MHz is well within the IMU specs.'
question: 'Why does adding four IMUs to a 20 MHz SPI bus corrupt data even when firmware and chip-selects are correct?'
details:
  realistic_solution: 'You hit the Parasitic Bus Capacitance Limit. 20 MHz clock = 50ns period. A bit must be read in 25ns. If bus capacitance (C) and trace resistance (R) create an RC time constant of 30ns, the signal mathematically cannot reach the 3.3V threshold in time to be registered as a logic ''1''.'
  common_mistake: |
    **The Pitfall:** Believing the MCU cannot read from 4 devices simultaneously due to digital limits.
    **The Rationale:** Candidates focus on software or protocol limits, ignoring the analog realities of high-frequency buses.
    **The Consequence:** They miss the parasitic bus capacitance limit, leading to incorrect architectural changes like unnecessary firmware rewrites.
  napkin_math: |
    **Assumptions & Constraints:**
    - SPI Clock: 20 MHz.
    - 4 IMUs on a shared bus.

    **Calculations:**
    - 20 MHz clock = 50ns period. Reading window = 25ns.
    - 1 IMU RC time constant = ~8ns.
    - 4 IMUs RC time constant = ~30ns.

    **Conclusion & Interpretation:**
    - **Result: 30ns (Analog Signal Integrity Bound)**. The RC time constant (30ns) exceeds the 25ns bit window, preventing logic threshold attainment.
  options:
  - 'The SPI clock of 20 MHz exceeds the maximum supported frequency when multiple slave devices are present on the same bus.'
  - 'Adding 4 IMUs increases parasitic bus capacitance ~4x. The RC time constant rises from ~8ns to ~30ns. At 20 MHz, the signal cannot reach the 3.3V logic threshold in time.'
  - 'The SPI chip select lines are experiencing cross-talk at 20 MHz.'
  - 'The MCU''s SPI peripheral has a hardware bug that corrupts data when more than 2 slave devices share the same bus.'
