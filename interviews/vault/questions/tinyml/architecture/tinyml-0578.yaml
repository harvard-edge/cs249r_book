title: The I2C Clock Stretching Deadlock
scenario: An MCU reading an ML sensor via I2C every 10ms runs flawlessly for weeks, then randomly freezes completely, triggering a hardware watchdog reset. The freeze traces back to an infinite while() loop inside the I2C driver awaiting SCL High.
question: "Why can a crashed I2C sensor hold SCL low forever and freeze an MCU in a wait loop?"
details:
  realistic_solution: Hardened physical drivers must explicitly mitigate I2C clock stretching protocol deadlocks. Implement an absolute millisecond timeout limit on blocking while loops, followed by a bit-banged 9-clock recovery sequence to manually free the jammed bus.
  common_mistake: |
    **The Pitfall:** Blaming the hardware layers by assuming physical pull-up resistors broke or wire degradation.
    **The Rationale:** Candidates completely overlook protocol-level state machine behaviors like active clock stretching.
    **The Consequence:** They omit software timeouts from bare-metal drivers, condemning remote deployments to irrecoverable hard lockups.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - I2C Clock frequency: 400 kHz.
       - Expected standard clock stretch limit: < 10 μs.
    2. **Calculations:**
       - Single clock period: 1 / 400,000 Hz = 2.5 μs.
       - Catastrophic fault duration metric: Stretching > 1000 μs (1 ms) indicates a fundamental slave unresponsiveness.
    3. **Conclusion & Interpretation:**
       - **Result: Waiting an infinite number of microseconds for a bounded 2.5 μs clock irreversibly deadlocks the core (Protocol-Bound).**
