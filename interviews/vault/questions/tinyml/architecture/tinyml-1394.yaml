title: 'Hardware-Aware NAS on Ethos-U55: Memory and Latency Constraints'
scenario: A hardware-aware NAS framework identified a candidate model with 250K INT8 parameters and 500M MACs for a single inference.
question: What concerns remain for an Ethos-U55 NAS candidate with 250K INT8 parameters and 500M MACs despite fitting the parameter memory?
details:
  realistic_solution: 'A realistic solution requires a detailed analysis of peak activation memory via memory profiling. If total memory exceeds 512 KB, strategies like layer-by-layer inference (tiling), activation recomputation, or further top-K sparsification must be employed. Beyond theoretical MAC counts, the NAS loop must integrate an empirical hardware simulator to provide accurate latency profiling of data preparation on the Cortex-M7.'
  common_mistake: |
    **The Pitfall:** Only considering the model's parameter size for the memory footprint.
    **The Rationale:** Candidates neglect the often significant and dynamic memory required for intermediate activations during inference, which can easily exceed available SRAM.
    **The Consequence:** The model is selected by NAS but throws Out-Of-Memory (OOM) errors during the first actual deployment on the device.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM available: 512 KB.
    - Model parameters: 250,000 (INT8) = 250 KB.
    - Target hardware: Ethos-U55 (peak 512 MACs/cycle) at 480 MHz.
    - Model complexity: 500M MACs.

    **Calculations:**
    - Remaining SRAM: 512 KB - 250 KB = 262 KB (must fit activations, OS, stack, heap).
    - Theoretical NPU Cycles: 500,000,000 MACs / 512 MACs/cycle = ~976,563 cycles.
    - Theoretical Latency: 976,563 cycles / 480 MHz = ~2.03 ms.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound.** Theoretical latency is 2.03ms, but the peak activation memory footprint could exceed the remaining 262 KB SRAM, leading to catastrophic Out-Of-Memory (OOM) errors.
