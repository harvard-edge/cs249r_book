title: MAC Reduction from Depthwise Separable Convolution
scenario: 'You are deploying an anomaly detection CNN on a Nordic nRF5340 microcontroller. To save power and reduce latency, you are replacing a standard 3x3 convolutional layer (input spatial resolution: 16x16, input channels: 32, output channels: 64) with a depthwise separable convolution.'
question: What is the relative MAC reduction from replacing this fixed 3x3 convolution with a depthwise separable convolution?
details:
  realistic_solution: For the same input channels, output channels, spatial size, and 3x3 kernel, compare the full MAC counts. Standard convolution costs 16x16x32x64x3x3 = 4,718,592 MACs. Depthwise separable convolution costs depthwise 16x16x32x3x3 = 73,728 MACs plus pointwise 16x16x32x64 = 524,288 MACs, or 598,016 MACs total. The separable-to-standard ratio is 598,016 / 4,718,592 = 0.126736, equivalent to 1/64 + 1/9, so the relative reduction is about 7.89x fewer MACs.
  common_mistake: |
    **The Pitfall:** Manually calculating the total MACs for both layers.
    **The Rationale:** Candidates do not use the generic reduction formula (1/N + 1/D_k^2) and sometimes confuse the number of output channels with the input channels when setting up the pointwise convolution parameters.
    **The Consequence:** Wasting time during the interview and often arriving at an incorrect reduction factor due to arithmetic errors.
  napkin_math: |
    **Assumptions & Constraints:**
    - Kernel size (D_k): 3x3.
    - Input channels (M): 32. Output channels (N): 64.
    - Spatial resolution: 16x16.

    **Calculations:**
    - For fixed input/output channels and spatial size, separable-to-standard ratio = (D_k^2*M + M*N) / (D_k^2*M*N) = 1/N + 1/D_k^2.
    - Ratio = 1/64 + 1/3^2 = 0.015625 + 0.111111 = 0.126736.
    - Speedup Factor = 1 / 0.126736 = 7.89x.
    - (Sanity Check: Standard MACs = 16x16x32x64x3x3 = 4,718,592. Separable MACs = 16x16x32x3x3 + 16x16x32x64 = 73,728 + 524,288 = 598,016. 4,718,592 / 598,016 = 7.89x).

    **Conclusion & Interpretation:**
    - **Result: 7.89x reduction (Compute-Bound)**. The depthwise separable convolution provides nearly an 8x reduction in required MAC operations.
