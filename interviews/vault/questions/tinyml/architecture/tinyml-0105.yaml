title: Vibration-Based Predictive Maintenance
scenario: Design a vibration-based predictive maintenance system for 500 industrial motors using Cortex-M4 sensors. The system must detect bearing degradation 2 weeks before failure, run for 2 years on a battery, and cost less than $30 per sensor in BOM.
question: How would you design a vibration-based predictive maintenance system for 500 industrial motors using Cortex-M4 sensors?
details:
  realistic_solution: Design from the constraints inward. Use a low-power 3-axis accelerometer on each of the 500 motors, sample short vibration windows at a fixed cadence, and keep only compact spectral features on-device. A Cortex-M4 pipeline can compute CMSIS-DSP FFT features, band-energy ratios, crest factor, and envelope peaks, then run a small INT8 one-class model or shallow CNN only every 60 seconds or when a low-cost feature threshold indicates drift. Transmit only health scores, trend deltas, and alarms by BLE advertisement or infrequent gateway packets instead of raw vibration data. Per-motor baselines let the fleet catch bearing degradation trends about 2 weeks before failure while keeping the model small enough for SRAM. The $30 BOM is met with an M4, MEMS accelerometer, coin cell, simple power regulation, and BLE radio; the 2-year battery target comes from duty-cycling sensing, inference, and communication against the roughly 171 µW average power budget.
  common_mistake: |
    **The Pitfall:** Proposing to sample at high frequency, run a large model, and transmit raw data to the cloud.
    **The Rationale:** Candidates apply cloud-first architectures without respecting edge constraints.
    **The Consequence:** The design simultaneously blows the power budget, the SRAM budget, and the $30 BOM target.
  napkin_math: |
    **Assumptions & Constraints:**
    - Battery: CR2477 approximated as 1000 mAh at 3 V ≈ 3 Wh usable energy under this load.
    - Two-year average power limit: 3 Wh / (2 * 365 * 24 h) ≈ 171 µW.
    - Sensor + Sleep + BLE Power: 20.4 µW.
    - Inference: 15 ms every 60 s at 3 mW.
    - Hardware limits: 256 KB SRAM, 1 MB Flash, $30 BOM.

    **Calculations:**
    - Inference Duty Cycle: 15 / 60000 = 0.025%.
    - Average Inference Power: 3 mW * 0.00025 = 0.00075 mW = 0.75 µW.
    - Estimated Total Average Power: 20.4 + 0.75 = 21.15 µW.
    - Memory: 36.2 KB SRAM (14%), 90 KB Flash (9%).

    **Conclusion & Interpretation:**
    - **Result: ~21.15 µW Average Against ~171 µW Budget**. Using the approximate CR2477 energy assumption, the duty-cycled design has substantial power margin; final lifetime still depends on usable cell capacity, pulse-current limits, temperature, and regulator efficiency.
