title: TinyML Model Feasibility on Nordic nRF5340 for Gesture Recognition
scenario: You must select between Model A (Float32 FCNN, 128-64-32, ~15k params) and Model B (INT8 Conv1D, ~50k params) for a real-time gesture system on an nRF5340 (128 MHz, 256 KB SRAM, 1 MB flash).
question: "Based on the nRF5340's specifications, which model is more feasible to deploy given real-time memory and compute constraints?"
details:
  realistic_solution: Construct a granular memory arena evaluation tracking static weight layout and dynamic activation footprint. Model B leverages INT8 quantizing to massively suppress SRAM activation demands while utilizing hardware SIMD pipelines, drastically outperforming the Float32 fallback penalties of Model A.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on naive absolute parameter counts to predict flash feasibility.
    **The Rationale:** Candidates completely neglect the dominant impact of peak intermediate activation memory in SRAM and the catastrophic emulation penalty of Float32 on an integer DSP fabric.
    **The Consequence:** They select the structurally inferior Model A, guaranteeing immediate real-time latency failures via soft-float emulation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Nordic nRF5340 (No FPU support for 32-bit ML tensors).
       - Model A: Float32 (4 bytes), ~15k params, 128 max neurons.
       - Model B: INT8 (1 byte), ~50k params, 128 max neurons.
    2. **Calculations:**
       - Model A Flash footprint: 15,000 * 4 = 60,000 bytes (~58.6 KiB).
       - Model A SRAM footprint: 128 * 4 = 512 bytes peak layer minimum.
       - Model B Flash footprint: 50,000 * 1 = 50,000 bytes (~48.8 KiB).
       - Model B SRAM footprint: 128 * 1 = 128 bytes peak layer minimum.
    3. **Conclusion & Interpretation:**
       - **Result: Model B natively uses less Flash (48.8 KiB), less SRAM, and fundamentally evades Float32 soft-emulation penalties (Architecture-Bound).**
