title: Identifying Peak NPU Throughput for Corstone-300 Architecture Search
scenario: We are configuring a hardware-aware Neural Architecture Search (NAS) pipeline targeting an ARM Cortex-M7 + Ethos-U55 (Corstone-300) subsystem. The search space must be constrained to avoid proposing architectures that exceed the peak compute capabilities of the NPU.
question: To correctly set the upper bound for the search space's latency estimator, what is the configurable range of MAC operations per cycle supported by the Ethos-U55 NPU?
details:
  realistic_solution: The correct fact to retrieve is that the Ethos-U55 supports 128 to 512 MACs per cycle depending on the specific configuration. Recalling this architectural parameter is critical for NAS, as it defines the compute roofline for convolution layers and directly informs the hardware-aware latency predictor during the search phase.
  common_mistake: |
    **The Pitfall:** Confusing microcontroller clock frequency or SRAM size with the NPU's parallel execution width.
    **The Rationale:** Guessing generic microcontroller MAC rates or confusing the M7's SIMD extensions with the dedicated NPU throughput.
    **The Consequence:** Setting an incorrect NAS compute ceiling, leading to un-deployable architectures.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - The question asks for the Ethos-U55 configuration range in MACs per cycle, not peak TOPS.
    2. **Calculations:**
       - Supported Ethos-U55 configurations span 128, 256, and 512 MACs/cycle.
       - The upper bound for a NAS latency estimator should therefore be selected from this 128-512 MACs/cycle range based on the target NPU instance.
    3. **Conclusion & Interpretation:**
       - **Result: 128 to 512 MACs/cycle (Architecture Recall)**. No clock-rate conversion is needed unless the question asks for MAC/s or TOPS.
