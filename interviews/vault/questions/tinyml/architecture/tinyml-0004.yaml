title: The CPU Cycle Thief
scenario: Your keyword spotting model needs 40ms to run, and your frame deadline is 50ms. In practice, the system crashes every few seconds. Based on the timeline, a 100 kHz I2C ISR performs five 64-byte sensor reads during each 50 ms frame.
question: Why do five blocking 64-byte reads on a 100 kHz I2C bus steal enough cycles to break a 40 ms KWS model with a 50 ms deadline?
details:
  realistic_solution: You are suffering from Blocking ISR Overruns. The system executes slow, blocking I2C sensor reads inside an Interrupt Service Routine (ISR). While the ISR runs, the main ML loop is completely halted. At 100 kHz, each 64-byte read takes about 5.12 ms before protocol overhead; five reads block about 25.6 ms of CPU time in a 50 ms frame, leaving only 24.4 ms for a 40 ms model. The fix is to use DMA (Direct Memory Access) for sensor reads so the CPU can keep doing ML math while the hardware handles the data transfer.
  common_mistake: |
    **The Pitfall:** Assuming the processor isn't fast enough and blindly increasing the clock speed.
    **The Rationale:** Candidates fail to recognize Blocking ISR Overruns, where slow hardware protocols (like I2C) executed inside an interrupt completely halt the main execution thread.
    **The Consequence:** The system continues to crash randomly due to jitter, even on faster microcontrollers, until DMA is implemented.
  napkin_math: |
    **Assumptions & Constraints:**
    - KWS Model Latency: 40 ms.
    - Frame Deadline: 50 ms.
    - I2C Bus Speed: 100 kHz.
    - I2C Read size: 64 bytes per read inside ISR.
    - ISR Frequency: 5 blocking reads per 50 ms frame.

    **Calculations:**
    - I2C Raw Bit Rate: 100 kHz = 100,000 bits/s.
    - Blocking Read Cost: (64 bytes * 8 bits/byte) / 100,000 bits/s = 5.12 ms before I2C protocol overhead.
    - Window Overhead: 5 sensor reads per 50 ms frame = 5 * 5.12 ms = 25.6 ms of blocked CPU time.
    - Available CPU Time: 50 ms - 25.6 ms = 24.4 ms.
    - Deadline Miss: 40 ms - 24.4 ms = 15.6 ms.

    **Conclusion & Interpretation:**
    - **Result: ISR-Bound Deadline Miss.** The 40 ms model misses the deadline by 15.6 ms because blocking I2C ISRs steal the CPU. The system requires DMA to offload the I2C transfers.
