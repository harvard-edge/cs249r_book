title: The RP2040 Dual-Core ML
scenario: The RP2040 features dual Cortex-M0+ cores sharing 264 KB SRAM. Your audio classification model takes 80ms on a single core. A colleague suggests splitting the model across both cores to perfectly halve the latency.
question: Can two 133 MHz RP2040 cores halve an 80 ms audio classifier, or does SRAM bus contention limit speedup?
details:
  realistic_solution: |
    Two RP2040 cores will not generally halve an 80 ms audio classifier. The best-case split is 40 ms, but the cores still share the memory system and must coordinate intermediate tensors, scheduling, and synchronization. In practice the speedup is sublinear and workload-dependent. A more robust partition is often to keep one core focused on audio I/O and preprocessing while the other runs inference, unless profiling shows a clean model split with little shared-memory traffic.
  common_mistake: |
    **The Pitfall:** Assuming a perfect 2x linear speedup by splitting a neural network workload across multiple cores on a microcontroller.
    **The Rationale:** Candidates apply distributed-computing intuition without understanding the severe bottlenecks of shared physical SRAM buses and cross-core synchronization.
    **The Consequence:** The expected latency gains are highly optimistic, and the engineering complexity introduced by multi-core synchronization yields diminishing returns.
  napkin_math: |
    **Assumptions & Constraints:**
    - Single core latency = 80 ms.
    - Ideal dual-core latency = 40 ms.
    - Both cores share the same SRAM resources and must synchronize at split points.

    **Calculations:**
    - Ideal split: 80 ms / 2 = 40 ms.
    - Real split adds shared-memory traffic for weights/activations plus cross-core handoff overhead.
    - Without measured contention and synchronization costs, a precise latency cannot be derived from the prompt.

    **Conclusion & Interpretation:**
    - **Result: Sublinear speedup, not guaranteed 2x (Memory/Synchronization-Bound)**. The correct expectation is "faster than one core only if profiled carefully," not a guaranteed 40 ms classifier.
