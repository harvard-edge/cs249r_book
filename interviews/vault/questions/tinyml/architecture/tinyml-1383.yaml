title: Optimizing CNN for Real-time Anomaly Detection on Nordic nRF5340
scenario: You are tasked with deploying a real-time anomaly detection system for industrial equipment using a tiny CNN model on an edge microcontroller. The sensor data consists of 1D time series signals, which are preprocessed into 32x32 grayscale images before being fed to the CNN. The system needs to classify anomalies with a latency under 100ms and operate continuously on battery power for several months, implying extreme power efficiency. You have explored a standard CNN architecture, but it exceeds the memory and computational budget.
question: How should you redesign a CNN with depthwise separable convolutions and inverted residuals to meet latency and power limits?
details:
  realistic_solution: 'The most realistic solution involves adopting highly efficient architectures designed for resource-constrained environments. Specifically, heavily utilizing depthwise separable convolutions, which drastically reduce FLOPs and parameter count compared to standard convolutions. Incorporating inverted residuals allows for higher channel expansion in lower-dimensional latent spaces. Quantization and pruning techniques would be critical for further reducing model size and accelerating inference.'
  common_mistake: |
    **The Pitfall:** Porting conventional CNNs without redesigning for extreme edge constraints.
    **The Rationale:** Candidates attempt to use slimmed-down VGG or ResNet blocks, neglecting the severe SRAM and FLOPs limitations of the hardware.
    **The Consequence:** The model exceeds SRAM for activations, flash for weights, or takes multiple seconds per inference, completely missing the real-time and power constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input: 32x32.
    - Convolution: 3x3, 32 input channels, 64 output channels.
    - Hardware limit: 256KB SRAM, 1MB Flash.

    **Calculations:**
    - Standard Conv FLOPs: (3x3x32) x 64 x (32x32) ≈ 18.87M FLOPs.
    - Depthwise Separable FLOPs: Depthwise (295K) + Pointwise (2.1M) ≈ 2.4M FLOPs.
    - Memory (Standard weights, INT8): 3x3x32x64 = 18,432 bytes (~18 KB).
    - Activations (INT8): 32x32x64 = 64 KB. Two maps (input+output) = 128 KB.

    **Conclusion & Interpretation:**
    - **Result: 2.4M FLOPs (Memory-Bound and Compute-Bound)**. Using depthwise separable convolutions reduces FLOPs by ~8x, but intermediate activations consume half of the total SRAM, making aggressive quantization and specific structural designs (inverted residuals) mandatory.
