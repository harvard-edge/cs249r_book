title: The MAX78000 CNN Accelerator
scenario: The Maxim MAX78000 has a dedicated CNN accelerator with 442 KB of weight SRAM and a 64-processor array that operates at 50 MHz. Analog Devices claims 1-3 µJ per inference for a keyword spotting model. A Cortex-M4 at 168 MHz with CMSIS-NN uses ~100 µJ for the same model.
question: How would you explain architecturally why the accelerator achieves 30-100x better energy efficiency, and identify what workloads it cannot accelerate?
details:
  realistic_solution: 'The MAX78000 achieves efficiency through: (1) weight-stationary dataflow eliminating external memory access, (2) massive parallelism (64 processors execute 64 MACs/cycle at only 50MHz), and (3) no instruction fetch overhead. Limitation: only supports standard CNN layers — no RNNs, attention, or custom ops.'
  common_mistake: |
    **The Pitfall:** Assuming higher clock speed equals better efficiency.
    **The Rationale:** Engineers think "more MHz means less energy" and ignore the architectural differences in instruction fetch and dataflow.
    **The Consequence:** They misjudge the power profile, failing to leverage the ultra-low 50 MHz accelerator and defaulting to general-purpose CPUs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Keyword spotting model: 500K MACs.
    - Cortex-M4: 168 MHz (336 MMAC/s), 50 mW active power.
    - MAX78000: 50 MHz (3.2 GMAC/s), 64 processors at 0.3 mW each.

    **Calculations:**
    - M4 Time: 500K / 336M = 1.49 ms. M4 Energy: 50 mW * 1.49 ms = 74.5 µJ + overhead ≈ 97 µJ.
    - MAX Time: 500K / 3.2G = 0.156 ms. MAX Energy: (64 * 0.3 mW) * 0.156 ms ≈ 3.0 µJ + overhead ≈ 3.5 µJ.
    - Efficiency Ratio: 97 / 3.5 = 27.7x.

    **Conclusion & Interpretation:**
    - **Result: ~28x more efficient (Compute-Bound)**. The fixed-function accelerator is phenomenally compute-bound in efficiency due to parallelization and removing instruction fetch logic.
