title: Hardware-Aware NAS Constraints on Dual-Core MCU
scenario: You are using Hardware-Aware NAS to design a Keyword Spotting model. Your search space initially constrained the model to 220 KB peak SRAM and 15 million MACs, which fits within the physical specs. However, when deployed alongside the BLE 5.3 stack running on the network core, the device experiences frequent out-of-memory hard faults and dropped Bluetooth connections.
question: How would you analyze the system-level interactions causing OOM faults and quantify the new constraints for your NAS?
details:
  realistic_solution: The failures stem from memory contention and latency blocking. The BLE stack requires a reserved shared SRAM allocation, meaning a 220KB ML model overflows the remaining available memory. Furthermore, executing 15M MACs takes too long, violating strict BLE connection interval timing and causing drops. The NAS multi-objective constraints must be severely recalibrated to target a strictly partitioned SRAM budget and a maximum MAC count guaranteeing inference completes within the BLE connection window.
  common_mistake: |
    **The Pitfall:** Treating peak datasheet hardware specifications as fully available for ML workloads.
    **The Rationale:** NAS tools are typically configured using absolute physical SRAM and peak clock speeds without accounting for OS/Network cohabitation.
    **The Consequence:** The resulting model competes with the network stack, triggering hard faults and breaking critical communication deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total SRAM: 256 KB. Clock: 128 MHz (2 cycles/MAC).
    - Existing NAS limit: 220 KB peak SRAM and 15M MACs.
    - Runtime reservations: 64 KB BLE stack + 32 KB RTOS buffers.
    - BLE connection interval: 50 ms (Inference must be < 30 ms).

    **Calculations:**
    - SRAM Constraint: 256 KB - 64 KB (BLE stack) - 32 KB (RTOS buffers) = 160 KB max peak memory.
    - Memory Overflow: 220 KB baseline - 160 KB available = 60 KB over budget.
    - Baseline Latency: 15M MACs * 2 cycles/MAC = 30M cycles; 30M / 128 MHz = 234 ms.
    - Latency Constraint: 30 ms * 128,000,000 cycles/s / 2 cycles/MAC = 1.92 million MACs.

    **Conclusion & Interpretation:**
    - **Result: <160 KB peak SRAM and <1.92M MACs (System-Level Contention)**. The original 220 KB / 15M MAC design exceeds both the reserved-memory budget and the BLE timing budget.
