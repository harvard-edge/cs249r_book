title: The Depthwise Memory Footprint
scenario: You are optimizing a keyword spotting model for a Cortex-M4 microcontroller. Your baseline model uses a standard 2D convolutional layer with a 3x3 kernel, 16 input channels, and 32 output channels. To reduce the memory footprint, you propose replacing it with a depthwise separable convolution (a 3x3 depthwise layer followed by a 1x1 pointwise layer).
question: What parameter reduction comes from replacing a 3x3 16-to-32 standard convolution with depthwise separable convolution?
details:
  realistic_solution: 'The standard convolution''s parameters are calculated as `kernel_h × kernel_w × C_in × C_out`. The depthwise separable convolution is a two-step process: a depthwise convolution (`kernel_h × kernel_w × C_in`) and a pointwise convolution (`1 × 1 × C_in × C_out`). The key is that the total parameters for the separable version is the *sum* of these two steps. For this 16-to-32 3x3 convolution, standard requires 4608 parameters, while separable requires only 144 + 512 = 656 parameters, yielding a ~7x reduction factor.'
  common_mistake: |
    **The Pitfall:** Forgetting to include the 1x1 pointwise convolution in the calculation.
    **The Rationale:** Engineers calculate the depthwise convolution and assume the job is done, missing the fact that the pointwise layer is essential for combining channel-wise features.
    **The Consequence:** The memory savings are overestimated by an order of magnitude.
  napkin_math: |
    **Assumptions & Constraints:**
    - Kernel size: 3x3.
    - Input channels: 16.
    - Output channels: 32.

    **Calculations:**
    - Standard conv parameters: 3 * 3 * 16 * 32 = 4,608.
    - Depthwise parameters: 3 * 3 * 16 = 144.
    - Pointwise parameters: 1 * 1 * 16 * 32 = 512.
    - Separable total: 144 + 512 = 656.
    - Reduction factor: 4,608 / 656 = ~7.02x.

    **Conclusion & Interpretation:**
    - **Result: ~7x (Memory-Bound)**. The depthwise separable convolution provides a ~7x reduction in parameters.
  options:
  - 'A ~32x reduction in parameters'
  - 'A ~2x reduction in parameters'
  - 'A ~7x reduction in parameters'
  - 'No significant change in parameters'
  correct_index: 2
