title: 'Realization: adapt MobileNetV1-0.25x for ESP32-S3 with resolution scaling'
scenario: A baseline MobileNetV1-0.25x at 224x224 input requires 450ms on an ESP32-S3. You must hit a strict <100ms inference latency for a 5-class visual classifier.
question: How must the MobileNetV1-0.25x input resolution and architectural stride pattern be adapted to satisfy the ESP32-S3 latency and SRAM constraints?
details:
  realistic_solution: To hit the <100ms target, the input resolution must be scaled down to 64x64. However, processing a 64x64 input through the default five stride-2 layers would collapse the spatial dimensions to an unusable 2x2 grid. The network must be architecturally modified by dropping the input resolution and converting two deep stride-2 layers into stride-1 layers (e.g., layers 8 and 10). This preserves an 8x8 final feature map, maintaining spatial information while quadratically dropping MAC operations.
  common_mistake: |
    **The Pitfall:** Blindly reducing input resolution without adjusting stride patterns.
    **The Rationale:** Candidates drop the input dimensions to lower the MAC count but fail to track the receptive field through the deep convolutional layers.
    **The Consequence:** The unaltered stride-2 layers compress the feature map to an unusable 2x2 grid, utterly destroying spatial resolution and classification accuracy.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline: 27M MACs at 224x224 -> 450ms.
    - Target: <100ms deadline on ESP32-S3 (throughput ≈ 30M MACs/sec).
    - Target resolution: 64x64.

    **Calculations:**
    - Resolution Scaling Factor: (64 / 224)^2 ≈ 0.0816.
    - Adjusted MACs: 27M * 0.0816 ≈ 2.2M MACs.
    - New Latency: 2.2M / 30,000,000 = ~73.3 ms.
    - Peak SRAM (DW block): 16x16x32 = 8 KB activations.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound Scaling**. Scaling to 64x64 reduces operations to 2.2M MACs, perfectly hitting the ~73ms execution time and consuming a negligible fraction of the 512KB SRAM.
