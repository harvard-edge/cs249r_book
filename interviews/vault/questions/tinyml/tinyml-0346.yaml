title: The INT8 Energy Payoff
scenario: You're optimizing a keyword spotting model for a Cortex-M4 microcontroller. To save energy and fit the model into a tiny power budget, you're considering quantizing the model's weights and activations from 32-bit floating point (FP32) to 8-bit integer (INT8).
question: From a pure computational energy perspective, what is the approximate energy saving for a single operation when you move from FP32 to INT8?
details:
  realistic_solution: An INT8 operation consumes approximately 18 times less energy than an FP32 operation. This is a foundational hardware invariant rooted in semiconductor physics. The dramatic reduction comes from the far simpler circuitry of an integer arithmetic logic unit (ALU) compared to a floating-point unit (FPU). This makes INT8 quantization a critical, non-negotiable optimization for power-sensitive TinyML devices.
  common_mistake: |
    **The Pitfall:** Assuming energy savings scale linearly with bit width reduction (e.g., 32 bits / 8 bits = 4x).
    **The Rationale:** It's intuitive to linearly correlate bit width with energy, ignoring the non-linear physical complexity of floating-point ALUs vs integer ALUs.
    **The Consequence:** The candidate drastically underestimates the power benefits of quantization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline operation: 32-bit floating-point MAC (requires complex FPU circuitry).
    - Quantized operation: 8-bit integer MAC (requires simple ALU circuitry).

    **Calculations:**
    - Standard 45nm/65nm semiconductor energy models (Horowitz):
    - 32-bit float MAC ≈ 3.7 pJ.
    - 8-bit int MAC ≈ 0.2 pJ.
    - Ratio: 3.7 / 0.2 = 18.5x.

    **Conclusion & Interpretation:**
    - **Result: ~18.5x reduction (Compute-Energy-Bound)**. Moving to INT8 yields an ~18x reduction in computational energy per operation.
  options:
  - It consumes ~4× less energy.
  - It consumes ~2× less energy.
  - It consumes ~18× less energy.
  - The energy consumption is roughly the same.
