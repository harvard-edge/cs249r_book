title: ESP32-S3 Vector Extension Efficiency
scenario: You are deploying an audio processing model on an ESP32-S3 (240 MHz dual-core Xtensa, 512 KB
  SRAM, 8 MB PSRAM, WiFi/BLE). Because the device must maintain active WiFi/BLE connections, compute efficiency
  is critical. The model requires 20 million INT8 MACs per inference at 10 FPS. To justify using the ESP32-S3's
  INT8 vector extensions over standard scalar processing, calculate the peak MAC throughput and the resulting
  theoretical CPU utilization for both vector (assume 16 MACs/cycle per core) and scalar (1 MAC/cycle
  per core) execution.
details:
  realistic_solution: The optimal approach leverages the ESP32-S3's INT8 vector extensions to drastically
    reduce inference time, acting as a lightweight accelerator. By quantifying the peak throughput, we
    demonstrate that the SIMD vector unit turns a heavy 40%+ compute load into a trivial <3% task, leaving
    ample CPU cycles and 512 KB SRAM bandwidth for the wireless communication stacks.
  common_mistake: Candidates often forget to multiply by the number of cores (dual-core) or confuse MACs
    (Multiply-Accumulates) with OPS (Operations). Another common error is failing to realize that high
    scalar utilization would starve the WiFi/BLE radio stacks, causing connection drops.
  napkin_math: '1. Target Workload: 20 MMACs/inference * 10 FPS = 200 MMACs/sec.

    2. ESP32-S3 Peak Vector Throughput: 240 MHz * 2 cores * 16 MACs/cycle = 7,680 MMACs/sec (7.68 GMACs/s).

    3. ESP32-S3 Peak Scalar Throughput: 240 MHz * 2 cores * 1 MAC/cycle = 480 MMACs/sec.

    4. Vector Utilization: 200 / 7,680 = 2.6% overall CPU load.

    5. Scalar Utilization: 200 / 480 = 41.6% overall CPU load.'
