title: The Quantization Energy Cliff
scenario: An engineer is optimizing a keyword-spotting model on a Cortex-M4 microcontroller and finds
  that compute operations are the primary source of battery drain. To reduce power consumption, they consider
  quantizing the model's weights and activations from 32-bit floating-point (FP32) to 8-bit integer (INT8).
  From a pure hardware physics perspective, approximately how much more energy does a single FP32 compute
  operation consume compared to a single INT8 operation?
details:
  realistic_solution: A single FP32 operation consumes approximately 18 times more energy than an INT8
    operation. This is a fundamental invariant based on the physics of digital logic. The energy cost
    of a multiplication operation scales non-linearly with the bit width, as a wider multiplier requires
    significantly more transistors, leading to higher switching capacitance and energy draw.
  common_mistake: Engineers often assume energy savings are linear with the reduction in bit width (e.g.,
    32-bit to 8-bit is a 4x saving). This ignores the quadratic nature of multiplier complexity and the
    fundamental physics of transistor switching energy, which makes the actual savings much more dramatic.
  napkin_math: 'Quantizing from FP32 to INT8 shrinks a 400KB model to 100KB, easily fitting the Cortex-M4''s
    256KB SRAM. Memory fetches consume significant energy: reading 4 bytes for FP32 vs 1 byte for INT8
    directly reduces memory energy by 75%. Additionally, INT8 MAC instructions on the Cortex-M4 execute
    much faster, shortening active time and slashing total power.'
  options:
  - ~4×
  - ~3.4×
  - ~18×
  - ~100×
  correct_index: 2
