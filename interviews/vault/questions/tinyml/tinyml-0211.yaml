title: The Quantization Energy Cliff
scenario: An engineer is optimizing a keyword-spotting model on a Cortex-M4 microcontroller and finds that compute operations are the primary source of battery drain. To reduce power consumption, they consider quantizing the model's weights and activations from 32-bit floating-point (FP32) to 8-bit integer (INT8).
question: From a pure hardware physics perspective, approximately how much more energy does a single FP32 compute operation consume compared to a single INT8 operation?
details:
  realistic_solution: A single FP32 operation consumes approximately 18 times more energy than an INT8 operation. This is a fundamental invariant based on the physics of digital logic. The energy cost of a multiplication operation scales non-linearly with the bit width, as a wider multiplier requires significantly more transistors, leading to higher switching capacitance and energy draw.
  common_mistake: |
    **The Pitfall:** Assuming energy savings scale linearly with the reduction in bit width (e.g., 32-bit to 8-bit equals a 4x saving).
    **The Rationale:** Engineers focus strictly on data size, ignoring the quadratic nature of multiplier complexity and transistor switching energy in the ALU.
    **The Consequence:** The energy impact of quantization is massively underestimated.
  napkin_math: |
    - **Step 1:** Quantizing from FP32 to INT8 shrinks a 400KB model to 100KB, fitting the Cortex-M4's 256KB SRAM.
    - **Step 2:** Reading 4 bytes for FP32 vs 1 byte for INT8 directly reduces memory energy by 75%.
    - **Step 3:** INT8 MAC instructions execute faster, shortening active compute time.
    - **Step 4:** Fundamental transistor switching energy for FP32 multiplication is non-linearly higher.
    - **Result:** **An FP32 compute operation inherently consumes ~18x more energy than an INT8 operation.**
  options:
  - ~4×
  - ~3.4×
  - ~18×
  - ~100×
  correct_index: 2
