title: 'Model Size Estimation: Diagnose and Fix MCU SRAM Overflow at Inference'
scenario: A TFLite Micro deployment on Cortex-M4 (256KB SRAM) crashes with a HardFault exception during the third convolutional layer of a 5-layer CNN (300K params INT8). The TFLM error log says it failed to allocate the tensor arena, which is currently set to 180KB.
question: How would you diagnose a Cortex-M4 TFLM HardFault when a 180 KB arena fails at the third convolution?
details:
  realistic_solution: 'HardFault at layer 3 means activation tensor for layer 3 exceeds remaining arena space. Diagnosis: check peak activation size. Layer 3 output (say 28x28x128): 100.4KB. Layer 2 needs to remain until layer 3 finishes: double buffering: 100.4x2=200.8KB > 180KB. Fix: (1) Increase arena to 210KB (210+30KB runtime+8KB stack+4KB input=252KB < 256KB). (2) Use TFLM memory planning to find non-overlapping tensors (via offline arena planning in TFLM toolchain): reduces peak to 130KB. (3) Restructure model.'
  common_mistake: |
    **The Pitfall:** Blindly increasing the arena size.
    **The Rationale:** Candidates assume the fix is simply allocating more memory without checking what SRAM structures the arena expands into.
    **The Consequence:** The arena overwrites the stack or heap, causing silent memory corruption and random system faults rather than addressing the actual peak memory issue.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM: 256 KB. Current Arena: 180 KB.
    - L3 output: 100.4 KB. L2 output: 100.4 KB.

    **Calculations:**
    - Peak overlap: 100.4 KB + 100.4 KB = 200.8 KB (> 180 KB).
    - Fix 1 (Resize Arena): 210 KB + 42 KB (Stack/OS) = 252 KB (Fits under 256 KB).
    - Fix 2 (Offline Planning): Yields ~35% overlap reduction.
    - Planned Peak: 200.8 KB * 0.65 = ~130 KB.

    **Conclusion & Interpretation:**
    - **Result: 130 KB Peak (Memory-Bound)**. Utilizing offline planning prevents the memory-bound crash without jeopardizing RTOS stack space.
