title: 'Model Size Estimation: Diagnose and Fix MCU SRAM Overflow at Inference'
scenario: A TFLite Micro deployment on Cortex-M4 (256KB SRAM) crashes with a HardFault exception during the third convolutional layer of a 5-layer CNN (300K params INT8). TFLM error log says: 'Failed to allocate tensor arena.' The arena is set to 180KB.
question: How would you diagnose a Cortex-M4 TFLM HardFault when a 180 KB arena fails at the third convolution?
details:
  realistic_solution: 'HardFault at layer 3 means activation tensor for layer 3 exceeds remaining arena space. Diagnosis: check peak activation size. Layer 3 output (say 28x28x128): 100.4KB. Layer 2 needs to remain until layer 3 finishes: double buffering: 100.4x2=200.8KB > 180KB. Fix: (1) Increase arena to 210KB (210+30KB runtime+8KB stack+4KB input=252KB < 256KB ✓, but tight). (2) Use TFLM memory planning to find non-overlapping tensors (via offline arena planning in TFLM toolchain): reduces peak to 130KB. (3) Restructure model: reduce layer 3 channels from 128 to 64 → 50.2KB activation. Arena 90KB. SRAM comfortable.'
  common_mistake: |
    **The Pitfall:** Blindly increasing the arena size.
    **The Rationale:** Candidates assume the fix is simply allocating more memory without checking what SRAM structures the arena expands into.
    **The Consequence:** The arena overwrites the stack or heap, causing silent memory corruption and random system faults rather than addressing the actual peak memory issue.
  napkin_math: |
    - Layer 3 Output: 28x28x128 = 100.4KB.
    - Layer 2 Output (needed simultaneously): 100.4KB.
    - Peak overlap: 100.4 + 100.4 = 200.8KB > 180KB arena.
    - Fix Option 1 (Increase Arena): 210KB + 42KB (OS/Stack) = 252KB. Fits under 256KB.
    - **Fix Option 2 (Offline Planning):** ~35% reduction limits peak to **130KB arena**, fitting safely.
