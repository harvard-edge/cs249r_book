title: TinyML Binary Weight Savings
scenario: A TinyML classifier has 160 KB of INT8 weights. A binary-weight variant stores 1 bit per weight and adds a 6 KB lookup table.
question: How much flash does a binary-weight TinyML model use compared with 160 KB INT8 weights if it adds a 6 KB lookup table?
details:
  realistic_solution: 'Binary weights reduce the weight storage by 8x: 160 KB / 8 = 20 KB. Adding a 6 KB lookup table gives 26 KB. Savings are 134 KB, but accuracy and kernel support must be reviewed.'
  common_mistake: |
    **The Pitfall:** Assuming extreme quantization scales linearly without auxiliary metadata overhead.
    **The Rationale:** Candidates divide 160 KB by 8 and assume a perfect 20 KB footprint, ignoring the memory cost of the required scaling factors or lookup tables.
    **The Consequence:** The deployed model exceeds the strictly allocated flash partitions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline: 160 KB INT8 weights.
       - Binary precision: 1 bit per weight.
       - Metadata: 6 KB lookup table overhead.
    2. **Calculations:**
       - Binary Weight Size: 160 KB / 8 bits/byte = 20 KB.
       - Total Binary Footprint: 20 KB (weights) + 6 KB (LUT) = 26 KB.
       - Total Flash Savings: 160 KB - 26 KB = 134 KB.
    3. **Conclusion & Interpretation:**
       - **Result: 134 KB saved.** **Result: Memory-Bound (Flash Optimization).**
