title: The INT8 Energy Dividend (tinyml-0273)
scenario: You're optimizing a keyword spotting model on a Cortex-M4 microcontroller to maximize battery life. To save power, you are considering quantizing a compute-heavy layer from 32-bit floating point (FP32) to 8-bit integer (INT8).
question: Roughly how much more energy-efficient is a single INT8 MAC operation compared to a single FP32 MAC operation?
details:
  realistic_solution: 'An INT8 operation consumes approximately 18 times less energy than an FP32 operation. The hardware required for 32-bit floating-point multiplication and addition is significantly more complex (requiring shifters, and separate exponent/mantissa logic) than a simple 8-bit integer multiplier. This complexity translates directly to higher switching energy for every calculation.'
  common_mistake: |
    **The Pitfall:** Assuming energy savings scale linearly with bit-width reduction.
    **The Rationale:** Engineers assume that reducing 32 bits to 8 bits (a 4x reduction) directly equates to a 4x energy saving, ignoring the complex exponent/mantissa logic in a Floating-Point Unit (FPU).
    **The Consequence:** Grossly underestimating the system-level battery life extension achieved through INT8 quantization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Silicon-level ALU vs FPU power consumption.
    - Operation: FP32 MAC vs INT8 MAC.

    **Calculations:**
    - FP32 MAC energy cost (typical): ~18 pJ.
    - INT8 MAC energy cost (typical): ~1 pJ.
    - Ratio: 18 / 1 = 18x efficiency gain.

    **Conclusion & Interpretation:**
    - **Result: 18x efficiency gain (Energy-Bound)**. An INT8 MAC is fundamentally ~18x more energy-efficient than an FP32 MAC, making it a critical "energy dividend" for edge devices.
  options:
  - '~3.4x more efficient'
  - '~4x more efficient'
  - '~18x more efficient'
  - '~580x more efficient'
