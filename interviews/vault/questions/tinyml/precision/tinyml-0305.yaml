title: 'The Quantization Energy Dividend: MCU Compute Constraints'
scenario: 'You are profiling a keyword spotting model on a microcontroller and notice high battery drain. To reduce power consumption, you consider quantizing the model''s operations from 32-bit floating-point (FP32) to 8-bit integer (INT8).'
question: 'From a hardware physics perspective, what is the approximate energy reduction per operation you should expect to gain?'
details:
  realistic_solution: 'The energy savings are approximately 18x. The energy consumed by digital logic like multipliers and adders scales with the number of bits being processed. Moving from 32 bits down to 8 bits drastically reduces the transistor switching activity for each operation.'
  common_mistake: |
    **The Pitfall:** Confusing the energy savings with the memory footprint reduction.
    **The Rationale:** A model quantized from FP32 to INT8 has a 4x smaller memory footprint, leading engineers to incorrectly assume energy savings are also 4x.
    **The Consequence:** They drastically underestimate the fundamental hardware efficiency gained from reducing ALU switching activity.
  napkin_math: |
    **Assumptions & Constraints:**
    - Energy consumed by digital logic scales with bit-width complexity.
    - FP32 MAC energy invariant: ~18 pJ.
    - INT8 MAC energy invariant: ~1 pJ.

    **Calculations:**
    - Energy Savings Ratio = FP32 Energy / INT8 Energy.
    - Ratio = 18 pJ / 1 pJ = 18.

    **Conclusion & Interpretation:**
    - **Result: ~18× Energy Reduction (Power-Bound)**. The fundamental hardware efficiency gained from reducing ALU switching activity drastically drops the per-operation energy cost.
  options:
    - '~4x'
    - '~2x'
    - '~18x'
    - 'Energy savings are negligible; it only affects memory size.'
