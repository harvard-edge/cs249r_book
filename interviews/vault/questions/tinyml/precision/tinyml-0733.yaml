title: 'The Zero-Point Question'
scenario: 'A junior engineer suggests that to quantize a model to INT8, one should just round each FP32 weight to the nearest integer.'
question: 'Why is naive rounding incorrect for INT8 quantization, and what is the role of a zero-point?'
details:
  realistic_solution: 'Quantization is an affine mapping from the float range to the integer range, not simple rounding. The formula is: $x_q = \text{round}(x_f / s) + z$, where $s$ is the scale (step size) and $z$ is the zero-point (the integer value that represents float 0.0).'
  common_mistake: |
    **The Pitfall:** Assuming quantization is just casting or rounding floats to integers.
    **The Rationale:** Beginners often confuse precision truncation with the affine mapping required for neural network quantization.
    **The Consequence:** Since FP32 weights typically have small magnitudes (e.g., [-0.1, 0.1]), rounding maps almost all weights to zero, completely destroying the model's functionality.
  napkin_math: |
    **Assumptions & Constraints:**
    - Quantization type: INT8.
    - Weight range: [-0.1, 0.1] (range of 0.2).

    **Calculations:**
    - Scale Calculation: 0.2 / 255 = 0.000784.
    - Zero-Point: 128 (representing 0.0).
    - Quantizing 0.05: round(0.05 / 0.000784) + 128 = 192.
    - Dequantizing 192: (192 - 128) * 0.000784 = 0.0502.

    **Conclusion & Interpretation:**
    - **Result: Error < 0.001 (Accuracy-Bound)**. The affine mapping accurately preserves model weights while mapping them to INT8.
