title: 'The INT8 Energy Dividend: Quantization Fundamentals'
scenario: You are optimizing a neural network for a power-constrained TinyML device and evaluating the impact of quantization.
question: Approximately how much more energy-efficient is a single INT8 multiply-accumulate (MAC) operation compared to a single FP16 MAC operation based on circuit physics?
details:
  realistic_solution: 'An INT8 MAC operation is approximately 5x more energy-efficient than an FP16 MAC. Floating-point operations require significantly more complex and power-hungry circuitry to handle the exponent and mantissa compared to the straightforward logic for integer arithmetic. While FP16 is more efficient than FP32, the leap to integer arithmetic provides a much larger, non-linear energy saving.'
  common_mistake: |
    **The Pitfall:** Assuming energy savings scale linearly with bit-width (e.g., 16 bits to 8 bits is a 2x saving).
    **The Rationale:** Engineers ignore the massive overhead of floating-point exponent/mantissa processing compared to simple integer logic.
    **The Consequence:** The energy impact of integer quantization is drastically underestimated.
  napkin_math: |
    **Assumptions & Constraints:**
    - Typical INT8 MAC energy: ~0.2 pJ.
    - Typical FP16 MAC energy: ~1.0 pJ.

    **Calculations:**
    - Efficiency ratio: 1.0 pJ / 0.2 pJ = 5x.

    **Conclusion & Interpretation:**
    - **Result: 5x (Energy-Bound)**. An INT8 MAC is roughly 5x more energy-efficient than an FP16 MAC due to complex floating-point logic.
  options:
  - '~2x more efficient'
  - '~18x more efficient'
  - '~5x more efficient'
  - 'The energy is the same, only memory changes'
