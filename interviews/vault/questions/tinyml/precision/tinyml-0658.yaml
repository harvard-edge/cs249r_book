title: 'The Siren''s Screech: Designing a Robust Hearing Aid'
scenario: You are the Lead ML Systems Engineer at a next-gen hearing aid startup. Your team has developed a state-of-the-art noise cancellation model that runs perfectly in FP32. Now, you must deploy it to a Cortex-M7 based device with a hard constraint of 256 KB of SRAM for the model's tensor arena and a 10ms latency budget.
question: What mixed-precision deployment strategy keeps the hearing-aid model within the SRAM and latency budgets while avoiding overflow?
details:
  realistic_solution: |
    The correct approach is to design a mixed-precision strategy based on an analysis of the model architecture and the physics of the hardware. The screeching is caused by activation value overflow in the initial layers of the network, which process the raw, high-dynamic-range audio waveform. Deeper layers work with more abstract, lower-dynamic-range features, allowing them to be fully quantized to INT8.
  common_mistake: |
    **The Pitfall:** Blaming the calibration dataset or suggesting Quantization-Aware Training (QAT) to fix clipping.
    **The Rationale:** While a representative calibration set is crucial, the dynamic range of the raw audio waveform at inference time inherently exceeds the representational capacity of an 8-bit integer.
    **The Consequence:** A single loud event will cause activation values to overflow, causing screeching, and the proposed solutions fail to address the root physical constraint.
  napkin_math: |
    1. Assume 250K total model parameters.
    2. Mixed strategy: first 2 layers (50K params) in FP16 = 100KB.
    3. Remaining layers (200K params) in INT8 = 200KB.
    4. Total Flash footprint = 300KB.
    5. Arena SRAM requirement: INT8 activations (~200KB) + FP16 overhead (~8KB) = 208KB.
    6. 208KB < 256KB SRAM budget (Fits comfortably).
    7. Latency on M7 at 480MHz: 80% INT8 (SIMD 4 ops/cyc) + 20% FP16 (~2 ops/cyc) = ~1.2x slower than full INT8.
    8. **If full INT8 takes 8ms, the mixed-precision model takes ~9.6ms, successfully meeting the 10ms budget and avoiding overflow.**
