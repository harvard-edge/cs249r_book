title: The Automotive Sensor Fusion Overflow
scenario: |
  You are the lead architect for a new Automotive Emergency Braking System (AEBS) running on a Cortex-M7 microcontroller. The system must fuse data from two sensors: a standard camera (8-bit pixel values, 0-255) and a new, low-cost LiDAR sensor whose output represents distance in millimeters (0-65535, i.e., 16-bit). The fusion model has two input branches that meet at a shared 'fusion layer'. Your hard real-time deadline from sensor read to brake signal is 1ms. The MCU's SRAM is 1MB.
question: 'Propose a quantization strategy for the two branches of the network, and determine what the dominant factor in your energy budget calculation is: compute or memory access?'
details:
  realistic_solution: 'The correct architectural decision is to use mixed precision. The camera branch, with its native 8-bit input, is a perfect candidate for full INT8 quantization. Its weights and activations will fit neatly within the 8-bit dynamic range. The LiDAR branch, however, requires its early layers to be kept in FP16 (or at least 16-bit integer) to preserve the high dynamic range of the distance measurements. After several layers of processing where the internal feature maps have been normalized or their range has been reduced (e.g., through activation functions like ReLU6), the LiDAR branch can then be quantized to INT8 before the fusion layer. This hybrid approach prevents overflow on the critical sensor while still reaping most of the benefits of INT8 quantization in the deeper parts of the model and the entire camera branch. You must use a representative calibration dataset that captures the full range of LiDAR values to determine the precise layer to transition from FP16 to INT8. The dominant energy cost will be memory access, not compute, as is typical for memory-bound TinyML systems.'
  common_mistake: |
    **The Pitfall:** Quantizing the entire model, including the LiDAR branch, directly to INT8.
    **The Rationale:** Engineers apply blanket INT8 quantization to maximize speed and minimize memory without profiling the native dynamic range of the sensors.
    **The Consequence:** The 16-bit LiDAR input (0-65535) suffers catastrophic overflow when linearly squeezed into INT8 (-128 to 127), causing the vehicle to misinterpret distant objects as imminent collision threats.
  napkin_math: |
    **Assumptions & Constraints:**
    - Latency Constraint Check: Cortex-M7 at 480 MHz provides ~960 MFLOPS.
    - Compute Need: A 250K-parameter fusion model takes ~500 M-ops.

    **Calculations:**
    - FP32 Runtime: 500 M-ops / 960 MFLOPS = 0.52 seconds (520 ms).

    **Conclusion & Interpretation:**
    - **Result: 520 ms (Compute-Bound)**. Missing the 1 ms deadline by a factor of 520x proves that aggressive hybrid quantization (INT8/FP16) is strictly mandatory.
