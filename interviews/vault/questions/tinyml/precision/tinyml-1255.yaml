title: Evaluating Quantization Granularity on nRF5340
scenario: You are deploying a continuous wake-word detection model. The core must process audio frames within a strict 50ms latency budget. You have a choice between per-tensor and per-channel symmetric INT8 post-training quantization for the model's depthwise separable convolutional layers.
question: Should an nRF5340 wake-word model use per-tensor or per-channel INT8 quantization for depthwise layers under a 50 ms budget?
details:
  realistic_solution: Recommend per-tensor quantization to meet the strict latency and power constraints, using QAT if accuracy is insufficient. For depthwise layers, per-channel quantization requires applying a different scale factor per output channel, which drastically increases the cycle count in the inner loop on a standard ARM Cortex-M33. Given the 50ms latency constraint, the extra cycles for channel-wise scaling and the memory overhead for storing scale factors make per-channel quantization prohibitive.
  common_mistake: |
    **The Pitfall:** Defaulting to per-channel quantization for better accuracy.
    **The Rationale:** ML practitioners prioritize model accuracy and assume per-channel quantization has negligible runtime cost.
    **The Consequence:** On an ARM Cortex-M33 lacking specialized vector instructions, per-channel rescaling adds severe computational and memory overhead, violating real-time latency and power budgets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cycle Budget: 128 MHz * 0.05 s = 6.4 million cycles.
    - MACs: 1 million. Output Channels: 256. Layers: 10.
    
    **Calculations:**
    - Memory Overhead (Per-Channel): 256 channels * 4 bytes * 10 layers = 10 KB.
    - Compute Overhead (Per-Channel): ~4 extra cycles per MAC. 1M MACs * 4 = 4 million cycles.
    - Latency Impact: 4 million / 6.4 million = 62% of budget.
    
    **Conclusion & Interpretation:**
    - **Result: Compute-Bound Overhead (Compute-Bound)**. Per-channel rescaling consumes 62% of the latency budget, risking real-time violation on standard Cortex-M cores lacking vector instructions.
