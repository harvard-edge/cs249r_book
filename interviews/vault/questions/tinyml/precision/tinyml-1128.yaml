title: Evaluating 4-bit vs INT8 on ESP32-S3
scenario: You are deploying a 3 million parameter anomaly detection model on an ESP32-S3 for industrial vibration monitoring. You must choose between standard INT8 quantization or an extreme 4-bit weight-only quantization to reduce the memory footprint in PSRAM.
question: How would you evaluate INT8 versus 4-bit weight-only quantization for latency and power, and which approach is superior for this specific architecture?
details:
  realistic_solution: |
    Evaluate INT8 and 4-bit weight-only as an end-to-end pipeline, not just by footprint. INT8 keeps the ESP32-S3 vector MAC path simple but fetches 3 MB from PSRAM. 4-bit halves PSRAM traffic and can reduce energy spent on external memory, but it needs unpacking to INT8 and may lose if that unpacking is serialized with MACs. The superior choice is conditional: 4-bit wins only when DMA fetch and unpacking are overlapped well enough that the reduced PSRAM traffic dominates the added compute and accuracy cost; otherwise INT8 is the safer latency path.
  common_mistake: |
    **The Pitfall:** Blindly choosing 4-bit quantization assuming a smaller memory footprint automatically equals lower latency.
    **The Rationale:** Candidates fail to realize the ESP32-S3 lacks native 4-bit MAC instructions, ignoring the severe CPU cycle overhead to unpack 4-bit values to 8-bit registers.
    **The Consequence:** The software unpacking overhead exceeds the memory fetch savings, resulting in slower inference unless explicitly pipelined.
  napkin_math: |
    **Assumptions & Constraints:**
    - Parameters: 3M. Target: ESP32-S3 @ 240 MHz. PSRAM Bandwidth: ~40 MB/s.
    - INT8 footprint = 3 MB. 4-bit footprint = 1.5 MB.
    - Unpacking cost: 2 cycles per weight.

    **Calculations:**
    - INT8 Fetch: 3 MB / 40 MB/s = 75 ms.
    - 4-bit Fetch: 1.5 MB / 40 MB/s = 37.5 ms (Saves 37.5 ms).
    - 4-bit Compute Penalty: 3M weights * 2 cycles = 6M cycles.
    - Unpack Latency: 6M / 240 MHz = 25 ms.
    - If unpacking is serialized: 4-bit fetch + unpack = 37.5 + 25 = 62.5 ms, about 12.5 ms faster than INT8 fetch before MAC time.
    - If unpacking is fully overlapped with DMA: 4-bit staging time is max(37.5, 25) = 37.5 ms, about 37.5 ms faster than INT8 fetch.
    - If unpacking stalls the MAC core or causes extra PSRAM passes, the 25 ms penalty can erase the latency win.

    **Conclusion & Interpretation:**
    - **Result: conditional 4-bit win.** 4-bit weight-only can reduce latency and PSRAM energy for this architecture when unpacking is pipelined or cheaply serialized, but the decision must be validated on the implementation; INT8 remains preferable if unpacking disrupts vector MAC throughput or accuracy.
