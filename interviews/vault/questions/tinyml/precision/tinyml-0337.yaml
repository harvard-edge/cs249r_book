title: The INT8 Energy Dividend (tinyml-0337)
scenario: >
  You're optimizing a keyword spotting model on a Cortex-M4 microcontroller and need to drastically reduce power consumption to meet a 1mW power budget.
question: From a pure compute standpoint, what is the approximate energy cost ratio between a single 32-bit floating-point (FP32) operation and an 8-bit integer (INT8) operation?
details:
  realistic_solution: >
    An FP32 operation consumes roughly 18 times more energy than an INT8 operation. This invariant stems from hardware complexity: the Floating-Point Unit (FPU) requires massive, power-hungry transistor arrays for mantissa and exponent logic compared to a simple INT8 ALU.
  common_mistake: |
    **The Pitfall:** Assuming energy scales linearly with bit-width (e.g., 32/8 = 4x).
    **The Rationale:** Engineers equate data size directly with arithmetic complexity, ignoring the non-linear architectural cost of floating-point exponents.
    **The Consequence:** Grossly miscalculating power budgets, leading to dead batteries in hours instead of days.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - INT8 Compute Battery Life: 18 hours.
    2. **Calculations:**
       - FP32 Cost: ~18x INT8.
       - FP32 Compute Battery Life: 18 hours / 18x = 1 hour.
    3. **Conclusion & Interpretation:**
       - **Result: ~18x energy ratio.** Moving to FP32 crushes battery life non-linearly. **Bottleneck: Power/Energy Constraint.**
  options:
  - ~4x. The energy scales linearly with the reduction in bit width (32/8).
  - ~2x. Floating point is a bit more expensive, but not significantly so.
  - ~18x. The complexity of the FP32 ALU is vastly higher than the INT8 ALU.
  - ~100x. Moving from integer to float is as expensive as an off-chip memory access.
  correct_index: 2
