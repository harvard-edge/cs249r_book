title: 2-Bit Weight Storage for Ethos-U55 Keyword Spotting
scenario: You are deploying a 1.2 million parameter CNN for continuous keyword spotting. At standard INT8 quantization, the model's weights require 1.2 MB, vastly exceeding the available 512 KB SRAM and forcing power-hungry fetches from external Flash memory.
question: How should you evaluate 2-bit weight quantization for a keyword spotter that must fit a 1.2M-parameter CNN into 512 KB SRAM?
details:
  realistic_solution: A senior engineer first sizes the complete memory budget instead of treating the 300 KB compressed weight blob as the whole problem. A 1.2M-parameter model at 2 bits needs 300 KB for weights, leaving 212 KB of the 512 KB SRAM for the tensor arena, stack, DMA buffers, and any temporary unpack buffers. If the measured peak activations plus workspace fit inside that remainder, 2-bit storage can be viable for reducing external Flash traffic. If the execution path requires INT8 kernels on Ethos-U55, the answer must qualify that 2-bit weights are a storage format and may need per-layer unpacking or dequantization into a small scratch buffer; it should not assume native 2-bit execution or a full-model INT8 expansion in SRAM.
  common_mistake: |
    **The Pitfall:** Assuming 2-bit weights natively accelerate latency on the Ethos-U55.
    **The Rationale:** Candidates assume lower bit-width automatically translates to faster NPU execution, ignoring that the U55 only natively accelerates INT8 and INT16.
    **The Consequence:** The execution graph stalls completely or falls back to software because the NPU cannot natively execute 2-bit operations, requiring M7 intervention.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model parameters: 1.2M.
    - SRAM available: 512 KB.
    - Example activation arena + stack/workspace budget: 160 KB.
    - Optional CPU unpacking path: 4 weights per 4 cycles at 480 MHz.
    - SPI Flash I/O throughput: 40 MB/s.

    **Calculations:**
    - 2-bit packed weight storage: 1.2M × 2 bits = 2.4M bits = 300 KB.
    - If this packed weight blob is kept in the tensor arena, remaining SRAM is 512 KB - 300 KB = 212 KB.
    - Feasibility margin after the example activations/workspace: 212 KB - 160 KB = 52 KB.
    - If weights are streamed from Flash instead, the SRAM requirement is the active packed tile plus unpack/dequant scratch, but Flash traffic and unpack scheduling become the main runtime risks.
    - If unpacking is required: 4 weights / 4 cycles = 1 weight/cycle, so 1.2M weights take 1.2M cycles.
    - Unpack-only time: 1,200,000 cycles / 480,000,000 Hz = 2.5 ms.
    - INT8 Flash read baseline for all weights: 1.2 MB / 40 MB/s = 30 ms.

    **Conclusion & Interpretation:**
    - **Result: feasible only after sizing the complete runtime path.** The 2-bit format reduces weight storage from 1.2 MB to 300 KB, but success depends on whether packed weights, activations, workspace, and unpack/dequant scratch fit together and whether the supported INT8 kernel path still reduces Flash traffic enough to offset unpack overhead.
