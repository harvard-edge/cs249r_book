title: 8-bit Unsigned Affine Quantization
scenario: A 32-bit floating point model is deployed to a microcontroller. Post-training integer quantization utilizes affine transformations with scale factors and zero points.
question: Describe the mathematical transformation used to map a floating-point activation range [min, max] into an 8-bit unsigned integer range [0, 255].
details:
  realistic_solution: The transformation fundamentally relies on deriving a precise scale factor (S) and zero point (Z). The scale factor establishes the numerical step size between integers via S = (max - min) / 255. The zero point maps the floating-point `0.0` exactly to an integer, formulated as Z = round(-min / S). The complete mapping algorithm converting a real floating-point value (r) to its quantized integer domain (q) executes as q = round(r / S) + Z.
  common_mistake: |
    **The Pitfall:** Forgetting the zero point and attempting symmetric linear scaling exclusively.
    **The Rationale:** Practitioners assume a simple ratio conversion works for all data distributions.
    **The Consequence:** Asymmetrical floating-point bounds map incorrectly, destroying the exact representation of zero and inducing systematic baseline errors in activation layers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Floating point bounds: min = -1.0, max = 1.0.
    - Target range: [0, 255].

    **Calculations:**
    - Scale (S): (1.0 - (-1.0)) / 255 = 2.0 / 255 = 0.00784.
    - Zero Point (Z): round(-(-1.0) / 0.00784) = 128.

    **Conclusion & Interpretation:**
    - **Result: 128 (Affine Mapping)**. The real value 0.0 correctly maps to the quantized integer 128.
