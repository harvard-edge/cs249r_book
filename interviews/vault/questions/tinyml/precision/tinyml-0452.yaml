title: 'The ADC Overflow Anomaly'
scenario: 'You are developing a TinyML-based vibration sensor for predictive maintenance on a factory floor. Your model, an audio classifier, performs perfectly in the lab with pre-recorded, normalized `.wav` files. When you deploy it to a device using a 12-bit I2S microphone (ADC), the model''s accuracy plummets, predicting garbage for all inputs. The FP32 version of the model works fine on-device (but is too slow). You suspect a quantization issue. Your INT8 model was quantized using a scale and zero-point derived from your normalized training data, which spans `[-1.0, 1.0]`.'
question: 'Why do raw 12-bit I2S microphone values collapse an INT8 model calibrated on normalized [-1, 1] audio?'
details:
  realistic_solution: 'The root cause is a quantization overflow due to a data range mismatch. A 12-bit ADC produces integer values from `[0, 4095]` (or `[-2048, 2047]` if signed). The quantization scale, calculated from data in the `[-1.0, 1.0]` range, is completely wrong for this wide integer range. When a raw ADC value like `3000` is fed into the quantization formula, it is treated as `3000.0`, which is far outside the `[-1.0, 1.0]` calibration range. This results in the quantized value being clipped to the INT8 max of `127`, effectively destroying the input signal''s information.'
  common_mistake: |
    **The Pitfall:** Assuming training data statistics perfectly represent real-world sensor data.
    **The Rationale:** Engineers forget that raw ADC values are integers in a specific hardware-defined range, not normalized floats.
    **The Consequence:** Massive clipping (overflow/underflow) when the real data is quantized, destroying the input signal.
  napkin_math: |
    **Assumptions & Constraints:**
    - 12-bit ADC Range: [0, 4095].
    - Training Scale (Normalized): 2 / 256 = 0.0078.

    **Calculations:**
    - Quantizing Raw Value: 3000 / 0.0078 = 384,615 (clips to INT8 max 127).
    - Dequantization: 127 * 0.0078 = 0.99. All inputs > 1.0 collapse to ~1.0.
    - Fix: Recalibrate with ADC range, new scale = 4096 / 256 = 16.

    **Conclusion & Interpretation:**
    - **Result: Scale = 16 (Precision-Bound)**. Properly setting the quantization scale fixes the anomaly.
  options:
    - 'The model is too complex and is running out of SRAM on the device, causing memory corruption.'
    - 'The Cortex-M4 CPU doesn''t have the necessary SIMD instructions to correctly handle INT8 math, leading to calculation errors.'
    - 'The quantization scale is mismatched with the raw ADC data range, causing all inputs to clip to the INT8 max value.'
    - 'The I2S microphone''s clock speed is out of sync with the MCU''s, causing dropped bits and corrupted input frames.'
  correct_index: 2
