title: 'Per-Channel Requantization Overhead Analysis'
scenario: 'You are profiling a keyword spotting model on an ARM Cortex-M4. Switching a convolutional layer with 128 output channels from per-tensor to per-channel INT8 quantization increases the execution time by exactly 4.57 microseconds. The CMSIS-NN SIMD core executes the exact same number of inner-loop MAC operations in both cases.'
question: 'How many extra cycles per channel explain the 4.57 us per-channel quantization overhead on STM32F4, given a 168 MHz clock?'
details:
  realistic_solution: 'The core matrix multiplication uses the same 2x INT8 MACs/cycle SIMD instructions regardless of the quantization scheme. The latency increase occurs strictly during the requantization step in the outer loop. Per-channel quantization requires fetching a unique scale multiplier and shift value from memory for each output channel to downscale the 32-bit accumulator back to INT8, whereas per-tensor uses a single global scale that can be kept in registers.'
  common_mistake: |
    **The Pitfall:** Assuming the per-channel scaling breaks the inner-loop SIMD execution pipeline.
    **The Rationale:** Candidates believe quantization overhead impacts the dense matrix multiplication logic.
    **The Consequence:** They avoid per-channel quantization entirely, sacrificing significant model accuracy to avoid a perceived inner-loop penalty that doesn't actually exist.
  napkin_math: |
    **Assumptions & Constraints:**
    - CPU frequency = 168 MHz (168,000,000 cycles/sec).
    - Total time overhead = 4.57 µs (0.00000457 s).
    - Output channels = 128.

    **Calculations:**
    - Total overhead cycles = 0.00000457 s * 168,000,000 cycles/s = 767.76 cycles (round to 768).
    - Overhead per output channel = 768 cycles / 128 channels = 6 cycles/channel.

    **Conclusion & Interpretation:**
    - **Result: 6 cycles/channel (Compute-Bound)**. The latency difference occurs strictly in the outer loop during requantization, where unique scale multipliers and shift values are fetched for each output channel to downscale the 32-bit accumulator back to INT8.
