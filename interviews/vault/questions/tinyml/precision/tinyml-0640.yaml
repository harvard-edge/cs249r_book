title: The Hypersensitive Wake-Word
scenario: Your team has developed a keyword-spotting model for a smart home device. The FP32 model achieves 99% accuracy in the lab. To deploy it on a Cortex-M4 microcontroller with only 256KB of SRAM, you use post-training quantization (PTQ) to convert the entire model to INT8. You use a clean, curated dataset of spoken keywords for calibration. The resulting INT8 model passes all lab tests, maintaining >98% accuracy, and successfully fits within the memory budget.
question: What dynamic range mismatch causes the INT8 wake-word model to become hypersensitive to loud background noise?
details:
  realistic_solution: The root cause is a **dynamic range mismatch** leading to **INT8 overflow**. The quantization calibration was performed on clean speech, which has a relatively low and predictable range of activation values. The tool calculated a scale factor optimized for this narrow range. However, loud, unpredictable background noise (like a TV explosion or loud music) generates feature values (e.g., in the initial MFCC or convolutional layers) with a much larger magnitude than ever seen during calibration.
  common_mistake: |
    **The Pitfall:** Blaming the training data and simply attempting to retrain the FP32 model with more noise.
    **The Rationale:** Engineers assume that if a model fails on noisy data, it just needs to "learn" the noise, ignoring the numerical realities of quantization.
    **The Consequence:** Time is wasted retraining the model without fixing the underlying arithmetic overflow, meaning the INT8 model will continue to clip and fail in the field.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Calibration Range (Clean): [-6, 6].
       - INT8 Quantization Scale: 12 / 256 = 0.047.
       - Noisy Input Spike Value: 30.
    2. **Calculations:**
       - Quantized Representation: 30 / 0.047 = 638.
       - INT8 Clipping: 638 is saturated to max INT8 value of 127.
       - Dequantized Value: 127 × 0.047 = 5.97.
       - Error Magnitude: |30 - 5.97| / 30 = 80% error.
    3. **Conclusion & Interpretation:**
       - **Result: Severe INT8 clipping (80% error) destroys the feature signal during loud noise.** **Result: Quantization Arithmetic Failure.**
