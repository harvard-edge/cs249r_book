title: Extreme Sub-4-bit Quantization for Keyword Spotting on ESP32-S3
scenario: You're developing a highly resource-constrained keyword spotting application for an ESP32-S3. The chosen model is a small CNN with 500,000 parameters. Initial deployment using 8-bit post-training quantization resulted in a model that, while performant, still struggled with memory limits, frequently spilling activations and some weights to the slower 8 MB PSRAM, impacting real-time performance. To address this, you decide to implement 2-bit weight-only quantization using a technique like AWQ. After applying 2-bit quantization, the model now fits entirely within the 512 KB SRAM, and inference speed is significantly improved. However, the model's accuracy plummets from an acceptable 92% (8-bit quantized) to an unusable 75%.
question: What strategies would you employ to recover the lost accuracy while maintaining the 2-bit memory footprint and respecting the ESP32-S3's hardware limitations?
details:
  realistic_solution: To recover accuracy while keeping a strict 2-bit weight footprint, first improve calibration with a representative keyword dataset and verify that the on-device quantization scales, packing, and rounding match training. Then use quantization-aware fine-tuning that simulates 2-bit weight-only quantization, preferably with per-channel or group-wise scales only after budgeting their metadata. Add knowledge distillation from the 8-bit or FP32 teacher so the small quantized model learns smoother class boundaries. If specific layers remain sensitive, retrain or slightly simplify the architecture to reduce quantization sensitivity while preserving the 2-bit on-device weight budget. Higher-precision layers should be considered only if a separate mixed-precision memory budget is explicitly allowed.
  common_mistake: |
    **The Pitfall:** Assuming that aggressive sub-4-bit quantization methods like AWQ or GPTQ will automatically retain high accuracy without further intervention.
    **The Rationale:** Candidates overlook the drastically reduced representational capacity at 2-bits and the accumulated quantization errors across many layers.
    **The Consequence:** This leads to catastrophic accuracy drops that simple post-training calibration cannot fully mitigate.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: ESP32-S3 (512 KB SRAM).
    - Parameters: 500,000.
    - Weight-only estimate; activations, tensor arena, stack, scratch buffers, and scale metadata must be budgeted separately.

    **Calculations:**
    - FP32 weights: 500,000 * 4 bytes = 2,000,000 bytes (~2 MB).
    - 8-bit weights: 500,000 * 1 byte = 500,000 bytes (~500 KB).
    - 2-bit weights: 500,000 * 0.25 bytes = 125,000 bytes (~125 KB).
    - Example full SRAM budget after 2-bit packing: 125 KB weights + 220 KB activations/arena/scratch + 20 KB scales/metadata/stack = 365 KB, leaving about 147 KB margin in 512 KB SRAM.

    **Conclusion & Interpretation:**
    - **Result: 125 KB for packed weights, with full fit depending on the measured working set.** The 8-bit weights alone nearly consume SRAM, while a budgeted 2-bit weight-only implementation can fit if activations and scale metadata stay within the remaining SRAM; QAT is needed to mitigate extreme precision loss.
