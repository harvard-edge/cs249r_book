title: The Silent Saturation
scenario: 'You''re a TinyML engineer deploying a keyword-spotting model on a Cortex-M4 microcontroller. The FP32 model achieves 95% accuracy. After applying post-training INT8 quantization using a standard calibration dataset, the model''s accuracy plummets to 60%. You diagnose the issue and find that the failures only happen with ''loud'' audio samples where users speak close to the microphone. The quantized model fits comfortably in Flash and the tensor arena is well within the SRAM limit.'
question: 'Why do loud keyword samples collapse an INT8 Cortex-M4 model from 95% to 60% accuracy after PTQ?'
details:
  realistic_solution: 'The calibration dataset was not representative of the full dynamic range of real-world audio. ''Loud'' samples are causing the intermediate activation values within the neural network to exceed the [-128, 127] range of the INT8 data type. This ''saturation'' or ''overflow'' clips the values, introducing large errors that propagate through the model and lead to incorrect predictions. The solution is to re-calibrate with a more diverse dataset that includes these high-amplitude samples.'
  common_mistake: |
    **The Pitfall:** Blaming weight quantization loss or assuming an SRAM overflow.
    **The Rationale:** Engineers forget that activations have a dynamic range that can be exceeded.
    **The Consequence:** They attempt to fix memory bugs rather than recalibrating with a more diverse dataset.
  napkin_math: |
    **Assumptions & Constraints:**
    - Assume an FP32 activation range of [-3.5, 3.5] during calibration.
    - INT8 maximum value is 127.

    **Calculations:**
    - Quantization scale: (3.5 - (-3.5)) / 255 ≈ 0.027.
    - A 'loud' input pushes the true activation to 5.0.
    - The quantized value becomes `round(5.0 / 0.027) = 185`.

    **Conclusion & Interpretation:**
    - **Result: 185 clipped to 127 (Representation-Bound)**. Because INT8 maxes out at 127, the value is clipped, and critical signal information is lost.
  options:
  - 'The model''s tensor arena is overflowing the SRAM due to larger intermediate buffers required for INT8.'
  - 'Critical weight precision was lost during quantization, corrupting the model''s core feature extractors.'
  - 'The calibration dataset lacks sufficient dynamic range, causing activation values to overflow the INT8 range on loud inputs.'
  - 'The Cortex-M4 lacks a floating-point unit, causing emulation errors when de-quantizing intermediate results.'
  correct_index: 2
