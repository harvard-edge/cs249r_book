title: Diagnosing Asymmetric Quantization Overhead
scenario: You deploy an INT8 audio wake-word model on a Nordic nRF5340. The model is quantized using asymmetric per-tensor quantization for both weights and activations. On a desktop emulator, it achieves 92% accuracy and runs smoothly. However, when flashed to the device's 1 MB flash and executed on the 128 MHz app core, accuracy plummets to 45% and inference takes ~600ms, keeping the chip in its ~5mA active state far longer than the expected 20ms.
question: Why do asymmetric INT8 weights make the nRF5340 wake-word model fall from 20 ms to about 600 ms?
details:
  realistic_solution: The root cause is the use of asymmetric quantization for model weights. Microcontroller optimized libraries such as CMSIS-NN on the nRF5340 app core commonly support asymmetric activations but require symmetric weights (zero-point = 0), often per-channel, for the fast convolution path. Asymmetric weights force the runtime onto a much slower reference kernel because every MAC must account for weight zero-point cross-terms. The latency spike comes from that fallback; the accuracy drop should be diagnosed as a quantization mismatch between the desktop-emulated path and the MCU deployment path, then fixed by recalibrating/exporting a symmetric-weight INT8 model rather than blaming fallback arithmetic overflow.
  common_mistake: |
    **The Pitfall:** Assuming the hardware itself is faulty or that the 256 KB SRAM is exhausted, causing memory thrashing.
    **The Rationale:** Candidates might incorrectly guess that BLE 5.3 interrupts on the 64 MHz net core are preempting the app core, without recognizing that the underlying quantization math is incompatible with hardware-accelerated kernels.
    **The Consequence:** The true cause of the latency spike is ignored, and the system remains unusable due to the fallback to the unoptimized kernel.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 5M MACs.
    - 128 MHz Core.
    - CMSIS-NN Symmetric Throughput: ~2 MACs/cycle.
    - Reference fallback cost for asymmetric weights: ~15 cycles/MAC after zero-point handling and less optimized memory access.
    - Active current: 5mA.

    **Calculations:**
    - Symmetric Latency: 5,000,000 / (128,000,000 * 2) = 19.5ms.
    - Asymmetric Latency: (5,000,000 * 15) / 128,000,000 = 585.9ms.
    - Slowdown: 585.9ms / 19.5ms ≈ 30x.
    - Symmetric Energy: 5mA * 19.5ms = 0.098 mAs.
    - Asymmetric Energy: 5mA * 586ms = 2.93 mAs.

    **Conclusion & Interpretation:**
    - **Result: 586ms Latency (Compute-Bound)**. Forcing asymmetric weights causes the runtime to fall back to an unoptimized kernel, resulting in a 30x latency and energy spike.
