title: INT8 Quantization Accuracy Drop on ARM Cortex-M4 STM32F4
scenario: You are tasked with deploying a pre-trained convolutional neural network (CNN) for image classification onto an ARM Cortex-M4. The original model was trained in FP32. To meet the strict memory budget, you quantize the model to INT8 using Post-Training Static Quantization (PTQ). Upon deployment, you observe an unacceptable drop in inference accuracy.
question: Why might INT8 post-training quantization cause an unacceptable accuracy drop for a Cortex-M4 image classifier?
details:
  realistic_solution: 'A realistic solution involves several steps: 1. **Analyze Activation/Weight Distributions:** Deep dive into the distribution of activations and weights across layers using a diverse calibration set to identify problematic layers. 2. **Per-Channel Quantization:** Employ per-channel quantization for weights, which offers finer granularity. 3. **Quantization-Aware Training (QAT):** If PTQ proves insufficient, migrate to QAT, allowing the model to adapt to quantization noise. 4. **Fixed-Point Implementation Audit:** Carefully examine the specific fixed-point arithmetic implementation on the Cortex-M4 to ensure proper handling of zero-point offsets. 5. **Mixed-Precision or Hybrid Strategies:** Explore using higher precision (e.g., INT16) localized to critical layers. 6. **Hardware-aware Benchmarking:** Iteratively profile directly on the STM32F4.'
  common_mistake: |
    **The Pitfall:** Assuming that simple per-tensor uniform PTQ always yields acceptable accuracy.
    **The Rationale:** Overlooking the impact of non-linear operations (e.g., ReLU bounds) or ignoring how wide activation distributions squash standard values into a few quantization bins.
    **The Consequence:** Suffering massive accuracy degradation because outliers consume the entire dynamic range.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Activations range: [-500, 500].
       - Effective values range: [-10, 10].
    2. **Calculations:**
       - INT8 scale factor = 1000 / 255 ≈ 3.9.
       - Effective values [-10, 10] get squashed into ~5 bins.
    3. **Conclusion & Interpretation:**
       - **Result: Precision-Bound Degradation**. Outliers disproportionately consume the dynamic range, leading to severe quantization noise.
