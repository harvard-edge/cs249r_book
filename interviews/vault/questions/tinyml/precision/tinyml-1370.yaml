title: Extreme Quantization on Resource-Constrained ARM Cortex-M4
scenario: You are tasked with deploying a small convolutional neural network (CNN) for a gesture recognition task on an ARM Cortex-M4 STM32F4 microcontroller. Your initial 8-bit quantized model consumes 192 KB for weights and activations, and exhibits an inference latency of 30 ms (target < 10 ms).
question: How should you size and evaluate ternary or 2-bit quantization for a Cortex-M4 gesture CNN targeting sub-10 ms latency?
details:
  realistic_solution: Size ternary or 2-bit quantization first as a memory experiment, then prove latency on the STM32F4 with kernel benchmarks. Estimate packed weight savings, but include activation buffers, alignment, scales, lookup tables, scratch memory, and stack. Prefer weight-only ternary or 2-bit schemes with 8-bit activations unless there are verified Cortex-M4 kernels for lower-bit activations. Check whether bit-packing requires unpacking into INT8 before MACs; if so, memory may improve while latency does not. Recover accuracy with representative calibration, quantization-aware training, pruning, or distillation, and benchmark end-to-end cycles on the MCU. The final decision should be based on measured cycles and accuracy because reducing bit-width alone does not guarantee a proportional speedup on Cortex-M4 DSP instructions.
  common_mistake: |
    **The Pitfall:** Ignoring the lack of an FPU and relying on standard tools.
    **The Rationale:** Developers assume standard 8-bit or sub-4-bit quantization tools will automatically work efficiently.
    **The Consequence:** This leads to significant accuracy drops or memory overhead from unoptimized lookup tables.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8-bit size: 192 KB.
    - 8-bit latency: 30 ms at 168 MHz.
    - Target latency: < 10 ms.

    **Calculations:**
    - Ideal 2-bit packed footprint for quantized weights: 192 KB / 4 = 48 KB if the whole 192 KB scaled with weight bit-width.
    - 8-bit cycles: 30 ms * 168 MHz = 5,040,000 cycles.
    - Sub-10 ms cycle budget: 10 ms * 168 MHz = 1,680,000 cycles.
    - Required speedup from the current implementation: 5,040,000 / 1,680,000 = 3x.
    - A 4x weight-footprint reduction does not imply a 4x cycle reduction; activations, unpacking, memory access, and kernel throughput must be measured.

    **Conclusion & Interpretation:**
    - **Result: 48 KB ideal packed footprint and 1.68M-cycle latency budget.** Ternary or 2-bit quantization may solve memory pressure, but it meets the latency target only if measured kernels deliver at least a 3x end-to-end speedup without excessive unpacking overhead.
