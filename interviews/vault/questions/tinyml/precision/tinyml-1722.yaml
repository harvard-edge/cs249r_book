title: 'Missing Calibration in Post-Training Quantization'
scenario: 'An image classifier is quantized to INT8 for a Cortex-M4 using PTQ. Upon deployment, the accuracy drops to random guessing levels.'
question: 'What critical quantization step was likely omitted or executed with unrepresentative data?'
details:
  realistic_solution: 'The activation calibration step was likely skipped. Without running a representative calibration dataset through the FP32 model to observe the dynamic min/max ranges of activations, the quantized model calculates incorrect scale and zero-point values. This aggressively clips internal signals, destroying the network''s predictive capabilities.'
  common_mistake: 'Blaming weight distribution rather than the dynamic ranges of intermediate activations.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Target datatype: INT8 (256 discrete values).
    - Post-Training Quantization (PTQ).

    **Calculations:**
    - 2^8 = 256.
    - Uncalibrated dynamic range defaults to invalid min/max.

    **Conclusion & Interpretation:**
    - **Result: Activation Clipping (Precision Bound)**. Failing to profile real-world activation distributions causes aggressive signal clipping and catastrophic accuracy collapse.
