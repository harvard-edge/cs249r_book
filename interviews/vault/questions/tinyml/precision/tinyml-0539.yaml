title: The Saturated Microphone
scenario: A keyword spotting model is deployed using INT8 quantization, calibrated on a dataset of quiet speech. In noisy environments, the first convolutional layer's activations, normally in the [-10, 10] range, spike to [-90, 90], dropping accuracy to near zero.
question: "How do you fix INT8 activation saturation when noisy audio drives first-layer values from [-10,10] to [-90,90]?"
details:
  realistic_solution: The root cause is distribution shift breaking Post-Training Quantization (PTQ) static scales. Recalibrate the model using a representative dataset containing high-noise environments to increase the quantization scale factor, preventing numeric saturation at the cost of slight precision granularity.
  common_mistake: |
    **The Pitfall:** Blaming the model architecture or jumping to higher-precision formats like FP16.
    **The Rationale:** Engineers treat quantization as a magic bullet and ignore the data dependency of the calibration dataset.
    **The Consequence:** They propose solutions that double the model size, exceeding the memory budget, instead of simply recalibrating scales.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - INT8 precision (256 steps, max 127).
       - Old calibration range: [-10, 10].
       - New activation range: [-90, 90].
    2. **Calculations:**
       - Old scale: 20 / 256 = 0.078.
       - Noise value 90 on old scale: 90 / 0.078 = 1154 (clips to 127). Dequantized: 127 * 0.078 = 9.9 (89% error).
       - New scale: 180 / 256 = 0.703.
       - Noise value 90 on new scale: 90 / 0.703 = 128 (fits INT8). Dequantized: 128 * 0.703 = 90 (<1% error).
    3. **Conclusion & Interpretation:**
       - **Result: Recalibrating scale to 0.703 prevents 89% clipping error (Dynamic Range Bound).**
  options:
  - Add a clipping function before the first layer to cap activations at 10.0.
  - Recompile the model using FP16 precision for the first layer (mixed precision).
  - Re-run the quantization calibration with a dataset that includes noisy audio samples.
  - Increase the number of channels in the first convolutional layer to better capture features.
  correct_index: 2
