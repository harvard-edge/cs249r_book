title: Quantization Drift on Nordic nRF5340 for Keyword Spotting
scenario: You're deploying a keyword spotting model (originally FP32, then PTQ to INT8) onto a Nordic nRF5340 SoC. During on-device testing, you observe that while inference latency meets targets, the model's accuracy has degraded significantly. Specifically, there's a noticeable 'clumping' of output probabilities and a higher rate of false positives for certain keywords, even when the INT8 simulated accuracy offline was acceptable. Power consumption is slightly higher than expected. You suspect quantization issues.
question: How would you diagnose the root cause of this accuracy drop and propose a solution, considering the nRF5340's constraints?
details:
  realistic_solution: 1. **Analyze Activation Distributions:** Instrument the model to log activation distributions (FP32 vs. INT8) for critical layers on the nRF5340 using a diverse, on-device representative dataset. Look for significant clipping, zero-point shifts, or dynamic range mismatches. 2. **Refine Calibration:** If issues are found, try a more targeted calibration dataset that covers the specific edge cases causing misclassifications. Experiment with different calibration algorithms (e.g., MinMax, KLD, Percentile). 3. **Per-Channel Quantization:** For layers sensitive to per-tensor quantization limitations, switch to per-channel quantization if supported by the inference engine and hardware, as this often offers better precision with minimal overhead. 4. **Quantization-Aware Training (QAT):** If PTQ still yields unsatisfactory results, consider QAT. This involves fine-tuning the model with simulated quantization noise during training, allowing the model to adapt to the quantization effects and often yielding superior accuracy for tinyML deployments. 5. **Inspect Zero-Point Arithmetic:** Verify that the inference engine on the nRF5340 correctly handles zero-point arithmetic, especially for `uint8` vs `int8` representations and bias additions.
  common_mistake: |
    **The Pitfall:** Assuming a general-purpose PTQ calibration dataset is universally representative.
    **The Rationale:** Candidates often rely on offline calibration sets that fail to capture on-device edge cases or dynamic ranges, especially for non-linear activations.
    **The Consequence:** Poor scaling factors and zero-points cause activation clipping and degraded inference accuracy on-device.
  napkin_math: |
    **Assumptions & Constraints:**
    - Layer: Convolutional layer with 64 output channels.
    - Dimensions: 64 channels x 3 x 3 x 32.

    **Calculations:**
    - FP32 Memory: 64 * 3 * 3 * 32 * 4 bytes = 73,728 bytes (~73.7 KB).
    - INT8 Memory: 64 * 3 * 3 * 32 * 1 byte = 18,432 bytes (~18.4 KB).
    - Memory Reduction: 4x.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound Accuracy**. While a 4x memory reduction is achieved, poorly calibrated channels suffer precision collapse, driving down accuracy despite the smaller footprint.
