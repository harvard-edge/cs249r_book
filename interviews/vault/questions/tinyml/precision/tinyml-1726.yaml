title: Static Quantization Parameters
scenario: A smart doorbell uses a 200K parameter CNN, migrating from FP32 to INT8 to execute within the SRAM limits of a Cortex-M4.
question: Explain how post-training static quantization computes the specific integer parameters required to convert FP32 activations into INT8?
details:
  realistic_solution: Static quantization passes a representative calibration dataset through the FP32 model to observe minimum and maximum activation values for each tensor. For affine asymmetric quantization, it computes scale = (max - min) / (qmax - qmin), then computes zero_point = round(qmin - min / scale) and clamps it to the integer range. The mapping is q = clamp(round(x / scale) + zero_point, qmin, qmax). For symmetric INT8 quantization, the zero-point is commonly fixed at 0 and the scale is chosen from the maximum absolute activation range.
  common_mistake: |
    **The Pitfall:** Confusing static quantization with dynamic quantization.
    **The Rationale:** Falsely stating that min/max are computed at runtime per inference instead of offline using a representative calibration dataset.
    **The Consequence:** Misunderstanding the performance benefits of static quantization, as dynamic quantization incurs heavy runtime overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8-bit affine quantization uses an integer range [qmin, qmax], such as [0, 255] for UINT8 or [-128, 127] for INT8.
    - Need to map an FP32 range [min, max] to this integer range.

    **Calculations:**
    - Scale = (max - min) / (qmax - qmin).
    - zero_point = round(qmin - min / scale), clamped into [qmin, qmax].
    - Quantize with q = clamp(round(x / scale) + zero_point, qmin, qmax).
    - Dequantize approximately with x ~= scale * (q - zero_point).
    - Symmetric INT8 quantization may instead fix zero_point = 0 and choose scale from max(abs(min), abs(max)).

    **Conclusion & Interpretation:**
    - **Result: Static affine parameters (Precision-Bound)**. Calibration determines per-tensor or per-channel ranges, from which scale and zero-point are derived; zero-point is rounded and clamped, not merely chosen by inspection.
