title: Architecting Sub-4-bit Keyword Spotting
scenario: You are deploying a continuous keyword spotting model on an ARM Cortex-M4. The baseline INT8 model has 1.5 million parameters (1.5 MB), exceeding the 1 MB Flash limit. It uses 200 KB of the 256 KB SRAM. The inference latency budget is 15 ms. The device lacks native sub-byte MAC instructions.
question: How would you evaluate and execute a sub-4-bit extreme quantization strategy on a processor that only supports INT8 SIMD instructions?
details:
  realistic_solution: Evaluate the strategy as mixed-precision weight-only quantization, not as a guaranteed speedup. First profile the model to identify parameter-heavy layers where 4-bit weights save flash with minimal accuracy loss, while keeping latency-sensitive layers INT8 if unpacking would dominate. During inference, packed 4-bit weights must be unpacked block-by-block into SRAM with shift-and-mask code and then consumed by standard INT8 CMSIS-NN kernels, because the Cortex-M4 lacks native sub-byte MACs. The decision is only acceptable if the final model fits under 1 MB flash and measured end-to-end accuracy plus unpacking and MAC latency still meet the 15 ms budget.
  common_mistake: |
    **The Pitfall:** Assuming sub-byte quantization automatically improves inference latency.
    **The Rationale:** Candidates equate smaller model size with faster execution time.
    **The Consequence:** They fail to account for the software unpacking overhead required on an MCU lacking native 4-bit math, missing the fact that 4-bit quantization actually increases latency on Cortex-M.
  napkin_math: |
    **Assumptions & Constraints:**
    - Flash Limit: 1.0 MB.
    - Clock: 168 MHz. Target latency: 15 ms.
    - Baseline: 1.5M INT8 parameters = 1.5 MB.
    - Candidate split must be justified by layer profiling. Example split: 1.0M parameters in parameter-heavy layers reduced to 4-bit; 0.5M latency-sensitive parameters stay INT8.

    **Calculations:**
    - Mixed-Precision Size: (1M * 0.5 B) + (0.5M * 1 B) = 1.0 MB (fits).
    - Packed 4-bit region size: 1M parameters * 0.5 B = 500 KB.
    - Unpacking Overhead: 500 KB of packed weights at ~2 cycles/byte = 1,000,000 cycles.
    - Unpacking Latency: 1,000,000 / 168 MHz = 5.95 ms.
    - Remaining latency budget for CMSIS-NN MACs, memory movement, and control overhead: 15 ms - 5.95 ms = 9.05 ms.

    **Conclusion & Interpretation:**
    - **Result: size can fit, latency is unproven until profiled.** The example mixed-precision split reaches the 1 MB flash limit, but unpacking alone consumes about 5.95 ms. The strategy is worthwhile only if measured INT8 kernel time plus unpacking stays under 15 ms and accuracy loss is acceptable; otherwise use a different split, compression, or smaller architecture.
