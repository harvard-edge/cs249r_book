title: Architecting Sub-4-bit Keyword Spotting
scenario: You are deploying a continuous keyword spotting model on an ARM Cortex-M4. The baseline INT8 model has 1.5 million parameters (1.5 MB), exceeding the 1 MB Flash limit. It uses 200 KB of the 256 KB SRAM. The inference latency budget is 15 ms. The device lacks native sub-byte MAC instructions.
question: How would you evaluate and execute a sub-4-bit extreme quantization strategy on a processor that only supports INT8 SIMD instructions?
details:
  realistic_solution: 'The optimal design uses asymmetric mixed-precision weight-only quantization. We quantize the memory-intensive fully connected and 1x1 convolutional layers to 4-bit to meet the 1 MB Flash limit, while keeping compute-intensive depthwise layers in INT8 to avoid unpacking overhead on the critical path. During inference, 4-bit weights are unpacked on-the-fly into the SRAM block-by-block using bitwise shift-and-mask operations, then fed into standard INT8 CMSIS-NN kernels.'
  common_mistake: |
    **The Pitfall:** Assuming sub-byte quantization automatically improves inference latency.
    **The Rationale:** Candidates equate smaller model size with faster execution time.
    **The Consequence:** They fail to account for the software unpacking overhead required on an MCU lacking native 4-bit math, missing the fact that 4-bit quantization actually increases latency on Cortex-M.
  napkin_math: |
    **Assumptions & Constraints:**
    - Flash Limit: 1.0 MB.
    - Clock: 168 MHz. Target latency: 15 ms.
    - 1.5M parameters (1M reduced to 4-bit, 0.5M stay INT8).

    **Calculations:**
    - Mixed-Precision Size: (1M * 0.5 B) + (0.5M * 1 B) = 1.0 MB (fits).
    - Unpacking Overhead: 500 KB of 4-bit at ~2 cycles/byte = 1,000,000 cycles.
    - Unpacking Latency: 1,000,000 / 168 MHz = 5.95 ms.
    - Remaining Compute Budget: 15 ms - 5.95 ms = 9.05 ms.

    **Conclusion & Interpretation:**
    - **Result: 9.05 ms remaining (Compute-Bound).** Unpacking takes 5.95 ms, leaving ample time (9.05 ms) to compute the MACs using standard INT8 CMSIS-NN.
