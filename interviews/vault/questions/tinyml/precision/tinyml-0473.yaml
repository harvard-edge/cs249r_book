title: The Silent Factory Failure
scenario: You deploy an INT8 KWS model on a Cortex-M4 based device using post-training quantization (PTQ). It achieves 98% accuracy on clean validation data but almost never triggers on the factory floor. The factory audio includes a loud, metallic 'CLANG!' right before the keyword. Activation values in a key convolutional layer are clamped to 127.
question: Why does a Cortex-M4 INT8 KWS model clamp factory-floor activations to 127 after clean-speech PTQ calibration?
details:
  realistic_solution: 'Root cause: PTQ calibration mismatch. The model was quantized using clean speech with an observed activation range around [-6.0, 6.0], but deployment audio with metallic factory noise reaches roughly [-12.0, 12.0]. The clean-data scale maps a +12.0 activation above the INT8 maximum, so it clips at 127 and destroys information where keyword-vs-noise discrimination happens. Recalibrating with representative deployment noise widens the representable range, for example from 127/6.0 = 21.17 quantized units per activation unit to 127/12.0 = 10.58. This reduces clipping for the expected noisy distribution at the cost of coarser precision on quieter inputs. For production, QAT can learn more robust scale factors during training.'
  common_mistake: |
    **The Pitfall:** Blaming the hardware or model architecture for failure.
    **The Rationale:** Engineers assume the MCU is too slow or needs higher precision, ignoring data distribution shifts.
    **The Consequence:** They waste time on hardware upgrades instead of performing QAT or recalibrating PTQ.
  napkin_math: |
    **Assumptions & Constraints:**
    - INT8 range [-128, 127].
    - Clean speech range: [-6.0, 6.0].
    - Factory noise peak: 12.0.

    **Calculations:**
    - Scale = 127 / 6.0 = 21.17.
    - Quantized value for noise = 12.0 * 21.17 = 254 (clips to 127).
    - Recalibrated Scale for Observed Range = 127 / 12.0 = 10.58.
    - Quantized value at observed peak = 12.0 * 10.58 = 127.

    **Conclusion & Interpretation:**
    - **Result: Saturation (Numerical Overflow)**. Recalibrating with representative factory audio reduces clipping across the observed deployment range, but values beyond that calibrated range can still clamp.
  options:
    - The model has a memory leak in the convolution operator, causing a buffer overflow.
    - The Cortex-M4 CPU does not have enough computing power (MFLOPS) to execute the model in real-time.
    - The calibration dataset used for PTQ did not represent the dynamic range of real-world audio inputs, causing activation overflow.
    - The model should have been quantized to FP16 instead of INT8, as FP16 has higher precision.
  correct_index: 2
