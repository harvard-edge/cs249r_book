title: Asymmetric Weight Quantization Penalty
scenario: We are deploying an anomaly detection model on an ARM Cortex-M4 (STM32F4) operating at 168 MHz with 256 KB SRAM, 1 MB flash, and no FPU. The system relies on CMSIS-NN to leverage SIMD instructions that perform 2x INT8 MACs per cycle. A junior engineer switches the quantization scheme from symmetric weights (with asymmetric activations) to fully asymmetric INT8 quantization for both weights and activations to try to squeeze out 1% more accuracy. The model still fits easily in the 1 MB flash, but the inference latency unexpectedly increases by nearly 50%.
question: How would you explain mathematically why changing the weights to asymmetric quantization causes such a drastic latency spike on this specific hardware?
details:
  realistic_solution: In quantization, the core dot product expands to `(A - Z_a) * (W - Z_w) = A*W - A*Z_w - W*Z_a + Z_a*Z_w`. Terms involving only weights and constants (`W*Z_a` and `Z_a*Z_w`) can be precomputed offline and folded into the bias, making asymmetric activations cheap for kernels designed around symmetric weights. If weights are asymmetric (`Z_w != 0`), the `A*Z_w` term depends on the runtime activation sum (`sum(A) * Z_w`). Some kernels can fold or amortize part of this correction, but optimized CMSIS-NN Cortex-M4 paths often assume symmetric weights so the extra input-dependent correction disrupts the tightly unrolled SIMD MAC loop and can plausibly produce a large, kernel-dependent latency spike.
  common_mistake: |
    **The Pitfall:** Assuming all INT8 quantization is computationally identical because zero-points are just integer constants.
    **The Rationale:** Candidates fail to decompose the mathematical cross-multiplication terms and don't realize that asymmetric weights require calculating the dynamic sum of input activations at runtime, which disrupts the hardware's SIMD MAC efficiency.
    **The Consequence:** The model latency can rise sharply, breaking real-time execution constraints even though the INT8 tensor sizes are unchanged.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inner dot product K=256.
    - CMSIS-NN SIMD executes 2x INT8 MACs/cycle.

    **Calculations:**
    - Symmetric weights: the runtime dot product is only `A*W`; 256 MACs / 2 = 128 cycles in the ideal inner loop.
    - With asymmetric weights, `A*Z_w` adds a runtime `sum(A)` correction because A changes every inference.
    - A naive separate activation-sum pass could cost up to another 256 / 2 = 128 cycles, but optimized kernels may fold or amortize some of that work.
    - The observed nearly 50% latency increase is consistent with an effective extra correction cost of about 0.5 * 128 = 64 cycles per comparable inner-loop unit.
    - Example effective path = 128 MAC cycles + ~64 correction cycles = ~192 cycles, a 50% increase. The exact number depends on the CMSIS-NN kernel, layer shape, and whether sums are reused across output channels.

    **Conclusion & Interpretation:**
    - **Result: large kernel-dependent cycle increase (Compute Bound)**. Asymmetric weights add an input-dependent zero-point correction that can break the optimized symmetric-weight CMSIS-NN path; the penalty is not universally 2x, but a measured ~50% slowdown is mathematically plausible.
