title: Asymmetric Weight Quantization Penalty
scenario: We are deploying an anomaly detection model on an ARM Cortex-M4 (STM32F4) operating at 168 MHz with 256 KB SRAM, 1 MB flash, and no FPU. The system relies on CMSIS-NN to leverage SIMD instructions that perform 2x INT8 MACs per cycle. A junior engineer switches the quantization scheme from symmetric weights (with asymmetric activations) to fully asymmetric INT8 quantization for both weights and activations to try to squeeze out 1% more accuracy. The model still fits easily in the 1 MB flash, but the inference latency unexpectedly increases by nearly 50%.
question: How would you explain mathematically why changing the weights to asymmetric quantization causes such a drastic latency spike on this specific hardware?
details:
  realistic_solution: In quantization, the core dot product expands to `(A - Z_a) * (W - Z_w) = A*W - A*Z_w - W*Z_a + Z_a*Z_w`. Terms involving only weights and constants (`W*Z_a` and `Z_a*Z_w`) can be precomputed offline and folded into the bias, making asymmetric activations 'free' at runtime. However, if weights are asymmetric (`Z_w != 0`), the `A*Z_w` term requires calculating the sum of the input activations (`sum(A) * Z_w`) at runtime because activations change every inference. On the Cortex-M4 without an FPU, this forces the integer ALU to execute an additional accumulation pass over the input vector before applying the standard CMSIS-NN SIMD MACs, fundamentally breaking the tightly unrolled convolution loops.
  common_mistake: |
    **The Pitfall:** Assuming all INT8 quantization is computationally identical because zero-points are just integer constants.
    **The Rationale:** Candidates fail to decompose the mathematical cross-multiplication terms and don't realize that asymmetric weights require calculating the dynamic sum of input activations at runtime, which disrupts the hardware's SIMD MAC efficiency.
    **The Consequence:** The model latency unexpectedly doubles, breaking real-time execution constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inner dot product K=256.
    - CMSIS-NN SIMD executes 2x INT8 MACs/cycle.

    **Calculations:**
    - Symmetric weights: the runtime dot product is only `A*W`; 256 MACs / 2 = 128 cycles.
    - With asymmetric weights, `A*Z_w` adds a runtime `sum(A)` term because A changes every inference.
    - If the same SIMD datapath can sum 2 activations/cycle, the extra accumulation pass costs 256 / 2 = 128 cycles.
    - Applying the zero-point correction adds about 1 scalar cycle.
    - Total asymmetric path = 128 MAC cycles + 128 activation-sum cycles + 1 correction cycle = 257 cycles.
    - Increase = (257 - 128) / 128 = 100.8%.

    **Conclusion & Interpretation:**
    - **Result: ~101% Cycle Increase (Compute Bound)**. Under this simplified dot-product model, asymmetric weights add a second input-dependent accumulation pass, roughly doubling the inner-loop cost and disrupting the optimized CMSIS-NN symmetric-weight path.
