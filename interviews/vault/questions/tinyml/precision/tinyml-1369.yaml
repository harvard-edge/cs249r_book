title: 'Extreme Quantization on nRF5340: Architecture Evaluation'
scenario: You must deploy image classification on a Nordic nRF5340 (128 MHz Cortex-M33, 256 KB SRAM) choosing between Model A (8-bit, 200KB peak SRAM) and Model B (2-bit, 70KB peak SRAM, but drops 5% absolute accuracy).
question: How would you systematically evaluate and recommend the best model for the nRF5340, considering performance, resource constraints, and accuracy recovery feasibility?
details:
  realistic_solution: Use an on-device evaluation workflow on the nRF5340 rather than relying only on nominal model size. Measure peak SRAM, flash, stack, heap, activation arena, latency, and energy with the RTOS/BLE workload enabled, using tools such as Nordic logging, GPIO timing, SEGGER SystemView, and cycle counters. Compare both models on representative images with the same preprocessing pipeline and record accuracy, latency distribution, and memory headroom. Model A should be preferred if its 200 KB peak SRAM leaves enough verified headroom for BLE, RTOS, buffers, and future updates while meeting latency and accuracy targets. Recommend Model B only if Model A fails memory or latency budgets, or if the 5% accuracy loss can be recovered with TinyML-appropriate calibration, quantization-aware training, pruning, or distillation.
  common_mistake: |
    **The Pitfall:** Choosing the smaller 2-bit model solely from its parameter footprint, or choosing the 8-bit model solely from its higher baseline accuracy.
    **The Rationale:** The real constraint is the measured combination of peak SRAM, latency, BLE/RTOS overhead, and recoverable accuracy on representative data.
    **The Consequence:** The selected model may either miss the product accuracy target or run out of memory once activation buffers, stacks, radio work, and firmware overhead are included.
  napkin_math: |
    **Assumptions & Constraints:**
    - Boundary: 256 KB Total SRAM, 128 MHz M33 DSP clock.
    - Model A: 8-bit, 200 KB footprint, ~50M MAC operations.
    - Model B: 2-bit, 70 KB footprint.

    **Calculations:**
    - Remaining footprint Model A: 256 KB - 200 KB = 56 KB (Dangerously tight for OS + BLE + heap).
    - Remaining footprint Model B: 256 KB - 70 KB = 186 KB (Structurally sound).
    - 8-bit execution latency (1 MAC/cycle): 50,000,000 cycles / 128 MHz = 0.39 seconds.
    - 2-bit sub-byte packed execution latency (assuming 2.5x packed SIMD acceleration): 0.39s / 2.5 = ~0.15 seconds.

    **Conclusion & Interpretation:**
    - **Result: Model B (2-bit) safeguards 186 KB SRAM overhead while yielding ~0.15s latencies, justifying the 5% accuracy delta (Memory-Bound).**
