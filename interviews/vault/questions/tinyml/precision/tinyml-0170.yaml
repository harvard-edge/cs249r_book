title: The INT8 Energy Dividend
scenario: You're optimizing a keyword spotting model for a Cortex-M4 microcontroller, where every microwatt counts. To reduce power consumption, you are deciding which data type to use for your primary convolution layers.
question: What approximate energy reduction does an INT8 MAC provide over an FP32 MAC on a Cortex-M4-class TinyML system?
details:
  realistic_solution: An INT8 MAC operation is approximately 18 times more energy-efficient than an FP32 MAC. This is a crucial hardware invariant rooted in silicon physics. The simpler logic gates in an integer unit result in less switching activity and lower power draw, making INT8 a cornerstone of power-efficient TinyML inference.
  common_mistake: |
    **The Pitfall:** Assuming energy cost scales linearly with bit-width.
    **The Rationale:** Engineers guess the savings are exactly 4x (32 bits / 8 bits).
    **The Consequence:** They severely underestimate the power efficiency gained from eliminating the complex FPU circuitry.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP32 MAC cost: ~18 pJ.
    - INT8 MAC cost: ~1 pJ.

    **Calculations:**
    - Energy Reduction = 18 pJ / 1 pJ = 18x.

    **Conclusion & Interpretation:**
    - **Result: 18x reduction (Compute-Bound)**. INT8 provides an 18x energy reduction over FP32.
  options:
  - Around 4x more efficient
  - Around 2x more efficient
  - Around 18x more efficient
  - Around 100x more efficient
  correct_index: 2
