title: The Quantization Energy Dividend (tinyml-0361)
scenario: You are optimizing a keyword spotting model for a battery-powered device using a Cortex-M4 microcontroller. To maximize battery life, you are considering quantizing the model from 32-bit floating-point (FP32) to 8-bit integer (INT8).
question: Based on the fundamental physics of computation, what is the approximate energy saving for a single arithmetic operation (like a multiply-accumulate) when switching from FP32 to INT8?
details:
  realistic_solution: 'An INT8 operation consumes approximately 18 times less energy than an FP32 operation. The hardware required for 32-bit floating-point multiplication and addition is significantly more complex (requiring shifters, and separate exponent/mantissa logic) than a simple 8-bit integer multiplier. This complexity translates directly to higher switching energy for every calculation.'
  common_mistake: |
    **The Pitfall:** Assuming energy savings scale linearly with bit-width.
    **The Rationale:** Candidates falsely assume that 32 bits to 8 bits yields a 4x power saving, ignoring the silicon-level complexity of floating-point arithmetic.
    **The Consequence:** They fundamentally misunderstand hardware power dynamics and underestimate the crucial impact of INT8 quantization on battery life.
  napkin_math: |
    **Assumptions & Constraints:**
    - Floating-Point vs. Integer ALU complexity.
    - FP32 MAC energy vs INT8 MAC energy.

    **Calculations:**
    - Typical 45nm FP32 MAC: ~18 pJ (picojoules).
    - Typical 45nm INT8 MAC: ~1 pJ.
    - Energy efficiency gain: 18 / 1 = 18x.

    **Conclusion & Interpretation:**
    - **Result: 18x efficiency gain (Energy-Bound)**. An INT8 MAC is roughly 18x more efficient than an FP32 MAC due to the elimination of exponent/mantissa logic.
  options:
  - '~4× less energy'
  - '~18× less energy'
  - '~2× less energy'
  - '~100x less energy'
  correct_index: 1
