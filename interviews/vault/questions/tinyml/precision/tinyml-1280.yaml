title: 'Ethos-U55 Supported Quantization Precisions'
scenario: 'You are deploying a highly compressed keyword spotting model to an ARM Cortex-M7 + Ethos-U55 (Corstone-300) system. To fit the model within the 512 KB shared SRAM, you are considering sub-4-bit and binary quantization techniques.'
question: 'Which quantization precisions are natively accelerated by the Ethos-U55, and what happens to unsupported sub-4-bit operations?'
details:
  realistic_solution: 'The candidate should recall that the Ethos-U55 natively supports INT8, UINT8, and INT16 data types. If a model uses sub-4-bit quantization, the Vela compiler will map these unsupported operations to the ARM Cortex-M7, completely bypassing the NPU and severely degrading performance.'
  common_mistake: |
    **The Pitfall:** Assuming edge AI accelerators universally support 1-bit or 2-bit quantization natively.
    **The Rationale:** Because research often highlights sub-4-bit networks for TinyML, candidates assume standard NPU hardware like the Ethos-U55 accelerates them.
    **The Consequence:** The compiler silently offloads unsupported ops to the CPU, destroying inference latency and power efficiency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Layer Size: 1,000,000 MACs.
    - Ethos-U55 Native (INT8): 256 MACs/cycle at 480 MHz.
    - Cortex-M7 Fallback (1-bit): Software emulation takes ~2 cycles/MAC.

    **Calculations:**
    - NPU Execution: 1,000,000 / 256 = 3,906 cycles (8.1 µs).
    - Cortex-M7 Fallback: 2,000,000 cycles (4.17 ms).

    **Conclusion & Interpretation:**
    - **Result: 500x Slower (Compute-Bound)**. The unsupported sub-4-bit operation is roughly 500x slower than standard INT8.
