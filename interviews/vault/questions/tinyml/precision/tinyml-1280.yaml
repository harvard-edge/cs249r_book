title: Ethos-U55 Supported Quantization Precisions
scenario: You are deploying a highly compressed keyword spotting model to an ARM Cortex-M7 + Ethos-U55 (Corstone-300) system. To fit the model within the 512 KB shared SRAM, you are considering sub-4-bit and binary quantization techniques.
question: Which quantization precisions are natively accelerated by the Ethos-U55, and what happens to unsupported sub-4-bit operations?
details:
  realistic_solution: The candidate should recall that the Ethos-U55 is built for quantized inference with 8-bit weights and 8-bit or 16-bit activation/operator paths, including signed and unsigned 8-bit tensor formats where supported by the operator. Sub-4-bit and binary operators are not native Ethos-U55 acceleration targets; depending on the graph and toolchain, unsupported operations may remain on the Cortex-M7/TFLM CPU path, fail to offload, or require rewriting to supported INT8/INT16 operators, all of which can hurt latency and power.
  common_mistake: |
    **The Pitfall:** Assuming edge AI accelerators universally support 1-bit or 2-bit quantization natively.
    **The Rationale:** Because research often highlights sub-4-bit networks for TinyML, candidates assume standard NPU hardware like the Ethos-U55 accelerates them.
    **The Consequence:** Unsupported ops may fail to offload to the NPU or run on the CPU path, destroying the expected latency and power efficiency.
  napkin_math: |
    **Assumptions & Constraints:**
    - The question is about native data-type support, not a specific layer size.
    - Ethos-U55 acceleration is intended for supported quantized operators, especially INT8 tensor paths.
    - INT16 support is operator- and toolchain-dependent; sub-4-bit and binary MACs are not safe native offload assumptions.

    **Calculations:**
    - Supported INT8 operators can be partitioned to the U55 by the compiler and runtime when the graph matches the supported operator set.
    - Supported INT16-related paths must be checked per operator rather than assumed uniformly across the graph.
    - Unsupported 1-bit, 2-bit, or 3-bit operators cannot be assigned the U55 INT8 MAC rate; they may fail to offload, be rewritten to supported INT8/INT16 forms, or run on the Cortex-M7/TFLM CPU fallback path.

    **Conclusion & Interpretation:**
    - **Result: native INT8 offload is the reliable baseline, with INT16 paths only where the operator/toolchain supports them.** Sub-4-bit execution should be treated as unsupported unless the exact toolchain and kernels prove otherwise.
