title: Architecting Sub-8-bit Weight Quantization for Cortex-M4
scenario: 'You are designing an always-on predictive maintenance system for an STM32F4 (168 MHz, 256 KB SRAM, 1 MB flash, 2x INT8 MACs/cycle). Your 1.6 million parameter convolutional model exceeds the storage limits in standard INT8 representation.'
question: 'How would you architect an inference system utilizing extreme weight quantization to fit the model on-device while maintaining real-time execution speeds?'
details:
  realistic_solution: 'Employ asymmetric quantization where weights are compressed to 4-bit in flash, while activations are kept in INT8. At runtime, allocate a ping-pong buffer in SRAM to unpack 4-bit weights into INT8 on the fly. Once unpacked, dispatch the compute to CMSIS-NN to exploit the 2x INT8 MACs/cycle SIMD instructions.'
  common_mistake: |
    **The Pitfall:** Proposing full 4-bit or 2-bit quantization for both weights and activations and executing natively.
    **The Rationale:** Candidates incorrectly assume the Cortex-M4 natively executes sub-byte math and ignore the available SIMD hardware acceleration.
    **The Consequence:** Bit-banging sub-8-bit MACs destroys throughput, resulting in unacceptable inference latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1.6M parameters in 4-bit = 800 KB (fits in 1 MB flash).
    - SRAM available for ping-pong buffer: 4 KB.

    **Calculations:**
    - Allocate a 4 KB ping-pong buffer in SRAM to unpack 4-bit weights to INT8 on the fly.
    - Process 100,000 MACs using CMSIS-NN SIMD (2 MACs/cycle) = 50,000 cycles.
    - Compute time: 50,000 / 168,000,000 = ~297 µs.

    **Conclusion & Interpretation:**
    - **Result: ~297 µs compute time ([Compute-Bound])**. Unpacking to INT8 allows utilizing the SIMD datapath, balancing storage constraints with compute speed.
