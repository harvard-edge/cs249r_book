title: 'TinyML Quantization Acceptance Spec'
scenario: 'A medical TinyML classifier must move from FP32 to INT8 to fit on an MCU.'
question: 'What acceptance criteria should gate replacing an FP32 medical TinyML classifier with an INT8 model?'
details:
  realistic_solution: 'The specification must extend beyond aggregate accuracy. It must require validation of per-class sensitivity (especially for safety-critical rare events), calibration-set representativeness, absolute latency bounds, strict SRAM/flash footprint limits, dynamic numeric overflow checks via hardware-in-the-loop, and a proven Mean Time Between Failures (MTBF) under deployed conditions.'
  common_mistake: |
    **The Pitfall:** Approving quantization solely because the model fits in memory and maintains aggregate accuracy.
    **The Rationale:** Candidates treat quantization purely as a compression problem and use standard top-1 accuracy metrics.
    **The Consequence:** Minor aggregate accuracy drops mask severe regressions in rare-event sensitivity, leading to critical false negatives in medical deployments.
  napkin_math: |
    **Assumptions & Constraints:**
    - Medical classifier: Baseline FP32 vs INT8.
    - Rare event prevalence: 1% of data.

    **Calculations:**
    - Aggregate accuracy drop: e.g., 99% to 98% (-1%).
    - Rare event sensitivity drop: True Positives fall from 95% to 80% due to reduced INT8 dynamic range.

    **Conclusion & Interpretation:**
    - **Result: Failed Acceptance (Accuracy-Bound)**. Even a 1% aggregate drop can hide a catastrophic 15% regression in critical event detection.
