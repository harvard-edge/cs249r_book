title: The Fixed-Point Accumulator Overflow
scenario: Your INT8 quantized Conv2D layer on a Cortex-M4 has a 3x3 kernel with 512 input channels. Each multiply produces an INT16 intermediate, and products are accumulated into an INT32 register. Your test engineer reports that one specific input image produces wildly wrong outputs for this layer.
question: How do you diagnose the overflow condition in an INT32 accumulator for an INT8 Conv2D layer, and what is the maximum safe number of accumulations?
details:
  realistic_solution: 'Trace the arithmetic under explicit assumptions: signed INT8 operands can produce a worst-case positive product of (-128) * (-128) = 16,384. A 3x3x512 Conv2D output accumulates 9 * 512 = 4,608 products, so the worst-case pure MAC sum is 4,608 * 16,384 = 75,497,472. INT32 max is 2,147,483,647, giving about 28.4x headroom for the MACs. The maximum safe count for same-sign worst-case products is floor((2^31 - 1) / 16,384) = 131,071 accumulations. If overflow appears in this layer, investigate bias addition, zero-point compensation terms, or requantization, not the pure 4,608-term MAC sum.'
  common_mistake: |
    **The Pitfall:** Dismissing accumulator overflow because INT32 "can hold 2 billion".
    **The Rationale:** Candidates assume typical intermediate values are small, failing to account for worst-case maximum-magnitude products across large channel depths.
    **The Consequence:** Models deployed in the field produce wildly incorrect outputs when specific inputs trigger worst-case accumulation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Max positive same-sign signed INT8 product: (-128) * (-128) = 16,384.
    - If the implementation bounds only positive representable endpoints, use 127 * 127 = 16,129; zero-point correction terms must be checked separately.
    - Conv2D Accumulations (3x3x512): 9 * 512 = 4,608 MACs
    - INT32 Capacity: (2^31 - 1) ≈ 2.14B

    **Calculations:**
    - Worst-case same-sign sum = 4,608 * 16,384 = 75,497,472.
    - Positive-endpoint-only sum = 4,608 * 16,129 = 74,327,232.
    - Headroom for the larger same-sign bound = 2.14B / 75.5M ≈ 28.4x.
    - Maximum safe same-sign accumulations = floor((2^31 - 1) / 16,384) = 131,071.
    - Maximum safe positive-endpoint accumulations = floor((2^31 - 1) / 16,129) = 133,148.

    **Conclusion & Interpretation:**
    - **Result: 131,071 same-sign worst-case accumulations (Precision-Bound)**. The 3x3x512 MAC sum is safe under either signed-INT8 bound; remaining overflow suspects are bias, zero-point correction, or later requantization terms.
  options:
    - INT32 can hold +/- 2 billion. With only 4,608 accumulations (3x3x512), overflow is impossible in every part of the quantized layer regardless of bias or zero-point terms.
    - Worst-case signed INT8 product is (-128) * (-128) = 16,384. Conv2D 3x3x512 has 4,608 accumulations, so the pure MAC sum is 75.5M versus INT32 max 2.15B. Maximum safe same-sign worst-case MAC count is floor((2^31 - 1) / 16,384) = 131,071. This layer's MACs are safe; check bias addition, zero-point compensation, or requantization if overflow is observed.
    - The INT16 intermediate product overflows before reaching the INT32 accumulator. INT8 x INT8 = max 16,384, which exceeds INT16 max (32,767 signed), so every multiply produces garbage.
    - The overflow is caused by the bias addition after accumulation, not the MAC operations themselves. The INT32 accumulator handles the MACs fine, but adding a large bias pushes the result past INT32 limits.
  correct_index: 1
