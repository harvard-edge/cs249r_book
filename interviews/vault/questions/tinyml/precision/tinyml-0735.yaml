title: The Fixed-Point Accumulator Overflow
scenario: Your INT8 quantized Conv2D layer on a Cortex-M4 has a 3x3 kernel with 512
  input channels. Each multiply produces an INT16 intermediate, and products are accumulated
  into an INT32 register. Your test engineer reports that one specific input image
  produces wildly wrong outputs for this layer.
question: How do you diagnose the overflow condition in an INT32 accumulator for an
  INT8 Conv2D layer, and what is the maximum safe number of accumulations?
details:
  realistic_solution: 'Trace the arithmetic precisely: INT8 x INT8 max product: 128
    x 128 = 16,384. Conv2D 3x3x512: 4,608 accumulations. Worst-case sum: 4,608 x 16,384
    = 75.50M. INT32 max: 2.15B. Headroom: 28.5x. Safe. For 3x3x2048 (large ResNet
    layer): 18'
  common_mistake: '**The Pitfall:** Dismissing accumulator overflow because INT32
    "can hold 2 billion".

    **The Rationale:** Candidates assume typical intermediate values are small, failing
    to account for worst-case maximum-magnitude products across large channel depths.

    **The Consequence:** Models deployed in the field produce wildly incorrect outputs
    when specific inputs trigger worst-case accumulation.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Max INT8 Product: 128 * 128 = 16,384

    - Conv2D Accumulations (3x3x512): 9 * 512 = 4,608 MACs

    - INT32 Capacity: (2^31 - 1) ≈ 2.14B


    **Calculations:**

    - Worst-Case Sum = 4,608 * 16,384 = 75,497,472

    - Headroom = 2.14B / 75.5M ≈ 28.4x

    - Maximum safe accumulations = 2^31 / 16,384 = 131,072


    **Conclusion & Interpretation:**

    - **Result: 131,072 accumulations (Precision-Bound)**. The issue is likely caused
    by massive bias additions, not MAC overflow.

    '
  options:
  - INT32 can hold +/- 2 billion. With only 4,608 accumulations (3x3x512), overflow
    is mathematically impossible regardless of input values.
  - 'INT8 x INT8 max product: 128 x 128 = 16,384. Conv2D 3x3x512: 4,608 accumulations.
    Worst-case sum: 4,608 x 16,384 = 75.5M. INT32 max: 2.15B. Headroom: 28.5x — safe
    for this layer. Maximum safe accumulations: 2^31 / (2 x 128^2) = 65,536. Layers
    exceeding this (e.g., 3x3x8192 at 73,728 accumulations) can overflow, especially
    with zero-point correction adding to the accumulated values.'
  - The INT16 intermediate product overflows before reaching the INT32 accumulator.
    INT8 x INT8 = max 16,384, which exceeds INT16 max (32,767 signed), so every multiply
    produces garbage.
  - The overflow is caused by the bias addition after accumulation, not the MAC operations
    themselves. The INT32 accumulator handles the MACs fine, but adding a large bias
    pushes the result past INT32 limits.
