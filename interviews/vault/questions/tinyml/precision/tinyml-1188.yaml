title: Ternary Weight Transformer on Cortex-M4
scenario: You are tasked with deploying a continuous Keyword Spotting (KWS) transformer model on an ARM Cortex-M4 (STM32F4). The baseline 8-bit quantized model requires 800 KB of Flash and 350 KB of SRAM, exceeding the MCU's memory limits once the RTOS and audio buffers are accounted for. You must design a novel mixed-precision architecture using 2-bit ternary weights (-1, 0, 1) and 8-bit activations, implementing a custom CMSIS-NN SIMD kernel to process a 64x64 KWS attention layer matrix multiplication.
question: How should a ternary-weight KWS transformer on Cortex-M4 store and compute 2-bit weights within Flash and SRAM limits?
details:
  realistic_solution: Store ternary weights packed as 2-bits in the 1 MB Flash. During inference, read weights into registers directly, applying a bitmask to unpack them on the fly. Since weights are only -1, 0, or 1, you can completely bypass the standard multiplier. Pack two 8-bit activations into a 32-bit register and use the Cortex-M4 SIMD add/sub instructions based on the ternary value, or use __SMLAD (2x 16-bit MACs/cycle) with padded activations. This achieves extreme compression while maintaining SIMD throughput.
  common_mistake: |
    **The Pitfall:** Unpacking ternary weights into 8-bit integers in SRAM before multiplication.
    **The Rationale:** Candidates assume standard 8-bit MAC operations require 8-bit unpacked operands in memory.
    **The Consequence:** This blows up the 256 KB SRAM budget, causing out-of-memory errors.
  napkin_math: |
    **Assumptions & Constraints:**
    - Layer weights: 64 x 64 = 4,096 weights.
    - Baseline INT8 storage: 1 byte/weight.
    - Ternary storage: 2 bits/weight packed in Flash.
    - Activations remain INT8 and should be streamed/tiled, not expanded with weights in SRAM.

    **Calculations:**
    - INT8 weight footprint = 4,096 weights * 1 byte = 4,096 bytes.
    - Packed ternary footprint = 4,096 weights * 2 bits = 8,192 bits = 1,024 bytes.
    - Compression for this layer = 4,096 / 1,024 = 4x versus INT8 weights.
    - A 64-element INT8 activation vector is 64 bytes; input and output vectors together are about 128 bytes before alignment and scratch buffers.
    - Keeping weights packed in Flash and unpacking into registers avoids a 4 KB SRAM expansion for this layer. The same 4x weight reduction must be applied across the full model to bring the 800 KB INT8 Flash footprint down near 200 KB, leaving room for code and metadata inside 1 MB Flash.

    **Conclusion & Interpretation:**
    - **Result: 1 KB packed weights for the 64x64 layer.** The design is memory-driven: store 2-bit weights packed in Flash, unpack only into registers, and keep INT8 activations tiled so SRAM is used for activations and scratch rather than expanded ternary weights.
