title: Ternary Weight Transformer on Cortex-M4
scenario: You are tasked with deploying a continuous Keyword Spotting (KWS) transformer model on an ARM Cortex-M4 (STM32F4). The baseline 8-bit quantized model requires 800 KB of Flash and 350 KB of SRAM, exceeding the MCU's memory limits once the RTOS and audio buffers are accounted for. You must design a novel mixed-precision architecture using 2-bit ternary weights (-1, 0, 1) and 8-bit activations, implementing a custom CMSIS-NN SIMD kernel to process a 64x64 KWS attention layer matrix multiplication.
question: How should a ternary-weight KWS transformer on Cortex-M4 store and compute 2-bit weights within Flash and SRAM limits?
details:
  realistic_solution: |
    Store ternary weights packed in Flash with a 2-bit code such as 00=0, 01=+1, 10=-1, and reserve 11 for padding. For the 64x64 matrix multiply, process output channels in small blocks: load one packed weight word, decode its ternary codes into register masks, stream the corresponding INT8 activation bytes, and update int32 accumulators by adding the activation for +1, subtracting it for -1, and skipping 0. This is a custom CMSIS-NN-style kernel, not a direct dense __SMLAD path, because ternary weights are not 8-bit operands. SRAM stays within budget because packed weights are never expanded into an 8-bit matrix; only activation tiles, accumulators, and small decode masks live in SRAM.
  common_mistake: |
    **The Pitfall:** Unpacking ternary weights into 8-bit integers in SRAM before multiplication.
    **The Rationale:** Candidates assume standard 8-bit MAC operations require 8-bit unpacked operands in memory.
    **The Consequence:** This recreates much of the baseline SRAM pressure from the 350 KB INT8 model and competes with RTOS and audio buffers, causing out-of-memory errors.
  napkin_math: |
    **Assumptions & Constraints:**
    - Layer weights: 64 x 64 = 4,096 weights.
    - Baseline INT8 storage: 1 byte/weight.
    - Ternary storage: 2 bits/weight packed in Flash.
    - Activations remain INT8 and should be streamed/tiled; packed weights are decoded only into registers or small masks.

    **Calculations:**
    - INT8 weight footprint = 4,096 weights * 1 byte = 4,096 bytes.
    - Packed ternary footprint = 4,096 weights * 2 bits = 8,192 bits = 1,024 bytes.
    - Compression for this layer = 4,096 / 1,024 = 4x versus INT8 weights.
    - A 64-element INT8 activation vector is 64 bytes; input and output vectors together are about 128 bytes before alignment and scratch buffers.
    - Kernel strategy for one dot product: decode packed ternary codes for the 64 weights, add activation[j] to the accumulator for +1, subtract activation[j] for -1, and skip activation[j] for 0.
    - Keeping weights packed in Flash and decoding only into registers or small masks avoids a 4 KB SRAM expansion for this layer. The same 4x weight reduction must be applied across the full model to bring the 800 KB INT8 Flash footprint down near 200 KB, leaving room for code and metadata inside 1 MB Flash.

    **Conclusion & Interpretation:**
    - **Result: 1 KB packed weights for the 64x64 layer.** The design is memory-driven: store 2-bit weights packed in Flash, decode ternary values only in the inner kernel, and keep INT8 activations tiled so SRAM is used for activations, accumulators, and scratch rather than expanded ternary weights.
