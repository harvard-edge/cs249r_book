title: Diagnosing Sub-4-bit Quantization Accuracy Degradation on STM32F4
scenario: You are porting a pre-trained sub-4-bit quantized image classification model, originally developed for a GPU, to an embedded system lacking native FPU or sub-byte hardware support. After deployment, you observe a significant drop in classification accuracy, from 90% on the GPU to barely 50% on the target, and occasional memory-related hard faults.
question: How would you diagnose the root cause of sub-4-bit quantization accuracy degradation and memory faults on a standard microcontroller?
details:
  realistic_solution: |
    Diagnose the accuracy drop by comparing the exact quantized graph on GPU, host reference code, and MCU output layer by layer. Check whether the MCU actually has supported sub-4-bit kernels or is unpacking weights into INT8 buffers, whether scales and zero-points are applied with the same rounding and saturation semantics, and whether calibration data matches the embedded input pipeline. The hard faults should be investigated with a real memory map: persistent packed weights in flash or SRAM, activation arenas, scratch buffers, unpack buffers, stack, and I/O buffers. Accuracy recovery should use representative calibration or QAT that matches the MCU kernels; if sub-4-bit kernels are unsupported or require large transient unpack buffers, fall back to INT8 for sensitive operations or redesign the model.
  common_mistake: |
    **The Pitfall:** Assuming extreme sub-byte quantization inherently scales perfectly to solve memory constraints without emulation penalties.
    **The Rationale:** Practitioners trust that reducing parameter bit-width identically reduces memory pressure across any hardware ISA.
    **The Consequence:** Software unpacking logic exhausts SRAM, causing hard faults, while poorly emulated fixed-point math destroys the model's accuracy.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP32 Model: 1 million parameters = 4 MB.
    - 2-bit Quantized Model: 1 million parameters = 250 KB.
    - Available SRAM: 256 KB.

    **Calculations:**
    - If all packed weights are kept in SRAM, 250 KB leaves only about 6 KB for activation arena, scratch buffers, stack, and I/O, which is not viable for most image classifiers.
    - If packed weights are stored in flash and streamed, SRAM pressure instead comes from activations, scratch buffers, and any temporary unpack buffers.
    - A full unpack of all weights to INT8 would require 1,000,000 bytes, so it cannot be resident in 256 KB SRAM; tiled unpacking may be possible but must be budgeted against activations and stack.

    **Conclusion & Interpretation:**
    - **Result: Memory risk depends on placement and transient buffers.** The packed model size alone does not prove an immediate hard fault, but storing all weights in SRAM or unpacking large tiles can easily exceed the available activation and scratch budget.
