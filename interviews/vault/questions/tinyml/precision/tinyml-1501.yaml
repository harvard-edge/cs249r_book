title: INT4 Weight Quantization Feasibility for Cortex-M4 Without DSP
scenario: A Cortex-M4 without DSP extension (base M4) needs to run a 200KB INT8 model in 64KB flash budget. INT4 compression would halve storage to 100KB. However, the M4 without DSP lacks SIMD for efficient INT4 unpacking.
question: Is INT4 worthwhile for a 200 KB INT8 model on a Cortex-M4 without DSP when the flash budget is 64 KB?
details:
  realistic_solution: 'Cortex-M4 (no DSP): no SIMD packed operations. INT4 unpacking requires load byte, mask nibble, shift -> 3-4 instructions per weight vs 1 for INT8. INT4 on base M4 adds complexity without throughput benefit and fails the flash constraint. Better approach: prune model to 64KB INT8.'
  common_mistake: |
    **The Pitfall:** Assuming INT4 automatically runs faster.
    **The Rationale:** Candidates assume lower precision natively correlates to faster execution times.
    **The Consequence:** Without hardware support for INT4 SIMD, manual bit-shifting cripples performance, making the system vastly slower than simple INT8 reads.
  napkin_math: |
    **Assumptions & Constraints:**
    - Flash Budget: 64 KB.
    - Base M4 INT4 bit-shifting overhead: 3.5x slower than INT8.

    **Calculations:**
    - INT8 size: 200 KB.
    - INT4 size: 200 KB / 2 = 100 KB.
    - INT4 throughput: ~64M ops / 3.5 = ~18M ops.
    - Size Check: 100 KB > 64 KB (Fails).

    **Conclusion & Interpretation:**
    - **Result: 3.5x slower & >64 KB footprint (Compute-Bound)**. INT4 is severely compute-bound due to bit-shift unpacking and still fails storage constraints; pruning INT8 is mandatory.
