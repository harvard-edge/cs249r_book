title: INT4 Weight Quantization Feasibility for Cortex-M4 Without DSP
scenario: A Cortex-M4 without DSP extension (base M4) needs to run a 200KB INT8 model in 64KB flash budget. INT4 compression would halve storage to 100KB. However, the M4 without DSP lacks SIMD for efficient INT4 unpacking.
question: Is INT4 worthwhile for a 200 KB INT8 model on a Cortex-M4 without DSP when the flash budget is 64 KB?
details:
  realistic_solution: INT4 halves the 200KB INT8 model to about 100KB, which still exceeds the 64KB flash budget, so INT4 alone is not a viable deployment solution. On a Cortex-M4 without DSP/SIMD support, INT4 also requires software unpacking (load byte, mask nibble, shift/sign-extend) before arithmetic, so it usually adds compute overhead rather than improving throughput. The better answer is to reduce the model itself through pruning, architecture changes, distillation, or other compression until the stored model is at or below 64KB; INT4 may be considered only after that if accuracy and unpacking cost are acceptable.
  common_mistake: |
    **The Pitfall:** Assuming INT4 automatically runs faster.
    **The Rationale:** Candidates assume lower precision natively correlates to faster execution times.
    **The Consequence:** Without hardware support for INT4 SIMD, manual bit-shifting cripples performance, making the system vastly slower than simple INT8 reads.
  napkin_math: |
    **Assumptions & Constraints:**
    - Flash Budget: 64 KB.
    - INT4 halves storage but has software unpacking overhead on a base M4.

    **Calculations:**
    - INT8 size: 200 KB.
    - INT4 size: 200 KB / 2 = 100 KB.
    - Size Check: 100 KB > 64 KB (Fails).
    - Additional reduction still needed after INT4: 100 KB - 64 KB = 36 KB, or 36% of the INT4 model.

    **Conclusion & Interpretation:**
    - **Result: INT4 alone is not worthwhile as the deployment answer (Storage-Bound)**. It reduces the model to ~100 KB but still misses the 64 KB flash budget, and base-M4 unpacking overhead further weakens the tradeoff.
