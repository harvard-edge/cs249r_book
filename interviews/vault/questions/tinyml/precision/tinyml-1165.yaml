title: 'Calculating Footprint for 3-bit Quantized Weights'
scenario: 'You are deploying an audio keyword spotting model to an ESP32-S3 microcontroller. To achieve the lowest latency, the model''s 1,048,576 parameters must reside entirely within the internal SRAM. You plan to apply 3-bit quantization to the weights to fit the model in memory.'
question: 'Calculate the exact memory required in kilobytes (1 KB = 1024 bytes) to store these 3-bit quantized weights, assuming they are tightly packed without any padding.'
details:
  realistic_solution: |
    Calculate the raw bit count of the parameters and convert directly to bytes. While tightly packing 3-bit values ensures weights fit into SRAM, the MCU's Xtensa architecture (with INT8 vector extensions) requires on-the-fly unpacking into 8-bit registers during inference, trading compute for memory efficiency.
  common_mistake: |
    **The Pitfall:** Assuming sub-byte quantization requires padding to the nearest power of 2.
    **The Rationale:** Candidates apply standard byte-alignment intuitions to custom tightly-packed integer formats.
    **The Consequence:** They artificially inflate the memory calculation, leading to unnecessary model pruning or hardware upgrades.
  napkin_math: |
    **Assumptions & Constraints:**
    - Parameters: 1,048,576
    - Quantization: 3 bits per parameter
    - Format: Tightly packed, 1 KB = 1024 bytes

    **Calculations:**
    - Total bits = 1,048,576 * 3 = 3,145,728 bits
    - Total bytes = 3,145,728 / 8 = 393,216 bytes
    - Total KB = 393,216 / 1024 = 384 KB

    **Conclusion & Interpretation:**
    - **Result: 384 KB (Memory-Bound)**. The model fits comfortably within standard SRAM limits.
