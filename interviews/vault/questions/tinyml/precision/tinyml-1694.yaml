title: Calibration Bias in PTQ
scenario: 'A Wake Word detection model runs on a Cortex-M4. The FP32 model works perfectly, but the INT8 Post-Training Quantization causes a massive accuracy drop for a specific user demographic.'
question: 'Evaluate the potential causes of this accuracy drop and identify which quantization step likely introduced the bias.'
details:
  realistic_solution: 'The calibration dataset used to determine the min/max activation ranges for PTQ likely lacked diverse voice samples. Consequently, the quantization scale factors clipped the outlier activations generated by the underrepresented demographic, destroying the signal.'
  common_mistake: |
    **The Pitfall:** Blaming the limited precision of the Cortex-M4 hardware.
    **The Rationale:** Candidates assume 8-bit precision is inherently insufficient for voice, ignoring the calibration process.
    **The Consequence:** They attempt to use INT16 or FP32, violating memory constraints, instead of fixing the dataset.
  napkin_math: |
    **Assumptions & Constraints:**
    - Quantization Scale = (Max_calib - Min_calib) / 255.

    **Calculations:**
    - Demographic outliers are excluded from (Max_calib - Min_calib) range.

    **Conclusion & Interpretation:**
    - **Result: Signal destruction ([Compute-Bound])**. If the calibration set lacks demographic diversity, its Min/Max range will clip valid demographic activations, destroying the signal.
