title: 'The INT8 Energy Dividend (tinyml-0329)'
scenario: 'You are tasked with deploying a voice activity detection (VAD) model on a microcontroller, which has a strict power budget of 50mW. Your initial FP32 model is over budget. To reduce power consumption, you consider quantizing the model to INT8.'
question: 'What per-operation energy reduction should INT8 quantization provide compared with FP32 on the Cortex-M4?'
details:
  realistic_solution: 'The correct answer is approximately 18x. The energy consumed by digital logic, particularly multipliers, scales more than linearly with bit width. An FP32 multiplier is significantly more complex than an INT8 one, involving separate exponent and mantissa logic, leading to a much larger energy saving than just the ratio of bit widths would suggest. This is a fundamental invariant based on the physics of CMOS switching energy.'
  common_mistake: |
    **The Pitfall:** Assuming energy scales linearly with bit width (e.g., 32 bits / 8 bits = 4x).
    **The Rationale:** Engineers ignore the physics of underlying CMOS digital logic, where complex FP32 multipliers involve separate exponent and mantissa circuits that grow super-linearly in energy cost.
    **The Consequence:** The energy savings from integer quantization are massively underestimated, potentially causing teams to reject INT8 optimization as "not worth the effort."
  napkin_math: |
    **Assumptions & Constraints:**
    - FP32 operation energy cost: ~3.6 pJ.
    - Established scaling ratio of FP32 vs INT8: ~18×.

    **Calculations:**
    - INT8 MAC energy: 3.6 pJ / 18 = 0.2 pJ.

    **Conclusion & Interpretation:**
    - **Result: ~18× Energy Reduction (Power-Bound)**. The energy consumed by digital logic scales super-linearly with bit width due to complex FP32 mantissa and exponent logic.
  options:
    - '~4×'
    - '~3.4×'
    - '~18×'
    - '~580×'
