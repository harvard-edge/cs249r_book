title: 'The INT8 Energy Dividend: MCU Compute Constraints'
scenario: 'You''re optimizing a keyword spotting model on a Cortex-M4 microcontroller. To reduce battery consumption, you''re considering converting the model''s layers from FP32 to INT8.'
question: 'For the arithmetic operations alone, what is the approximate reduction in energy consumption you can expect by using an INT8 multiply-accumulate (MAC) instead of an FP32 MAC?'
details:
  realistic_solution: 'The energy saving is approximately 18-fold. FP32 operations require complex circuitry for handling exponents and mantissas, leading to significantly higher switching energy per operation compared to a simple INT8 integer multiplier.'
  common_mistake: |
    **The Pitfall:** Conflating bit-width reduction with energy savings in a linear way.
    **The Rationale:** Candidates assume that reducing from 32 bits to 8 bits (a 4x reduction) results in a 4x energy saving, ignoring the non-linear complexity of FPUs versus simple ALUs.
    **The Consequence:** The true power-saving potential of quantization is heavily underestimated during architectural planning.
  napkin_math: |
    **Assumptions & Constraints:**
    - Comparing FP32 MAC vs INT8 MAC purely at the silicon switching level.

    **Calculations:**
    - FP32 circuitry involves exponent alignment, mantissa multiplication, normalization, and rounding.
    - INT8 is a simple combinatorial logic multiplier.
    - Silicon invariants dictate FP32 consumes ~18x more energy than INT8.

    **Conclusion & Interpretation:**
    - **Result: ~18x energy saving (Compute-Bound)**. Switching to INT8 provides massive efficiency for compute.
  options:
  - '~4×, because you are reducing the bit-width by a factor of four (32/8).'
  - 'No significant difference; energy is dominated by memory access.'
  - '~18×, because integer ALUs are far simpler than floating-point units.'
  - '~3.4×, which is the savings for FP16, and INT8 is similar.'
  correct_index: 2
