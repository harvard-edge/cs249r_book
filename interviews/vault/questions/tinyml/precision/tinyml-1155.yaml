title: 2-Bit Weight Unpacking and Execution on Cortex-M4
scenario: 'You are deploying a 2-bit weight / 8-bit activation (W2A8) model on a Cortex-M4 (STM32F4) with 168 MHz clock and CMSIS-NN SIMD. A dense layer has 1,048,576 parameters stored in Flash, which must be unpacked to INT8 at runtime.'
question: 'How would you calculate the total Flash footprint for these weights and the theoretical minimum compute cycles for the MAC operations?'
details:
  realistic_solution: 'Calculate the highly compressed Flash footprint by packing four 2-bit weights per byte. For compute, the weights must be dynamically unpacked into the 256 KB SRAM in tiles. The execution bottleneck is strictly defined by the CMSIS-NN SIMD instruction throughput (2 MACs/cycle).'
  common_mistake: |
    **The Pitfall:** Assuming extreme weight quantization accelerates compute by processing 4x or 8x operations per cycle.
    **The Rationale:** Candidates forget that Cortex-M4 DSP instructions max out at 2x INT8 MACs/cycle, regardless of weight storage precision.
    **The Consequence:** They grossly underestimate latency and fail real-time deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Parameters: 1,048,576 parameters.
    - Bit width: 2 bits per parameter.
    - CMSIS-NN throughput: 2 INT8 MACs/cycle.
    - Clock speed: 168 MHz.

    **Calculations:**
    - Flash storage: 1,048,576 params * 2 bits = 2,097,152 bits = 262,144 bytes (256 KB).
    - Compute cycles: 1,048,576 / 2 = 524,288 cycles.
    - Execution time: 524,288 / 168,000,000 = ~3.12 ms.

    **Conclusion & Interpretation:**
    - **Result: 524,288 compute cycles ([Compute-Bound])**. Sub-byte quantization saves 75% flash but does not decrease the compute cycles since the SIMD width remains fixed.
