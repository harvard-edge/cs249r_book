title: Sub-4-bit Quantization on Cortex-M7 + Ethos-U55 for TinyML
scenario: You are tasked with deploying a convolutional neural network (CNN) for keyword spotting on a resource-constrained Arm Cortex-M-class system with a 480 MHz Cortex-M7 host, 512 KB SRAM, and an Ethos-U55 microNPU. Your model, originally 8-bit quantized, exceeds the available SRAM by 2x and still exhibits latency issues due to memory bandwidth. To meet the tight memory and real-time inference constraints, you decide to explore sub-4-bit quantization (e.g., 2-bit or 3-bit).
question: How should you deploy a sub-4-bit keyword-spotting CNN on Cortex-M7 plus Ethos-U55 when an INT8 model exceeds SRAM?
details:
  realistic_solution: The deployment strategy should start from Ethos-U55 operator support, not from the lowest theoretical bit-width. Keep layers that map to supported INT8 Ethos-U55 kernels on the NPU, restructure the KWS CNN if needed to reduce activation and weight memory, and use CMSIS-NN on the Cortex-M7 only for unsupported fallback paths. Many Ethos-U55 toolchains do not provide native end-to-end 2-bit or 3-bit execution, so any sub-4-bit plan must prove that packed weights remain packed through supported kernels. Otherwise unpacking, custom kernels, or CPU fallback can erase both memory-bandwidth and latency gains. Prefer INT8-compatible restructuring with QAT, calibration, pruning, and distillation when that is the format the U55 runs efficiently.
  common_mistake: |
    **The Pitfall:** Aggressively quantizing to sub-4-bit without sufficient QAT or hardware-aware kernel mapping.
    **The Rationale:** Candidates assume lower bit-widths magically run faster, neglecting the impact of data type support and efficient kernel implementations on the Ethos-U55 (which may not natively support 2-bit MACs without unpacking overhead).
    **The Consequence:** Severe accuracy degradation and potentially worse latency if the NPU has to fallback to CPU for unsupported sub-byte unpacking.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M7 at 480 MHz.
    - 512 KB SRAM.
    - Ethos-U55 (128-512 MAC/cycle).
    - 8-bit model weights = 1 MB.
    - 10M MACs total.

    **Calculations:**
    - 2-bit packed weight footprint: 1 MB / 4 = 250 KB before scales, alignment, code, activations, and scratch.
    - Fast NPU ideal compute time: 10,000,000 MACs / (512 MAC/cycle * 480,000,000 cycles/s) = 0.0000407 s = 0.0407 ms.
    - Slow NPU ideal compute time: 10,000,000 MACs / (128 MAC/cycle * 480,000,000 cycles/s) = 0.0001628 s = 0.163 ms.
    - These are lower bounds for supported kernels at peak utilization; memory movement, command overhead, and unsupported sub-byte execution can dominate.

    **Conclusion & Interpretation:**
    - **Result: 250 KB packed weights and 0.041-0.163 ms ideal compute lower bound.** Total deployment viability still depends on activations, scratch memory, toolchain support, and whether unsupported sub-byte ops force CPU fallback.
