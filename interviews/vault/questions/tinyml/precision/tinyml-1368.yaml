title: 'Sub-4-bit Quantization on Cortex-M7 + Ethos-U55 for TinyML'
scenario: 'You are tasked with deploying a convolutional neural network (CNN) for keyword spotting on a resource-constrained Cortex-M7 microcontroller (480 MHz, 512 KB SRAM) paired with an Ethos-U55 microNPU (up to 512 MAC/cycle). Your model, originally 8-bit quantized, exceeds the available SRAM by 2x and still exhibits latency issues due to memory bandwidth. To meet the tight memory and real-time inference constraints, you decide to explore sub-4-bit quantization (e.g., 2-bit or 3-bit).'
question: 'How should you deploy a sub-4-bit keyword-spotting CNN on Cortex-M7 plus Ethos-U55 when an INT8 model exceeds SRAM?'
details:
  realistic_solution: 'The solution involves carefully selecting a sub-4-bit quantization scheme (e.g., 2-bit weight-only, 3-bit mixed precision) and utilizing advanced techniques like GPTQ or full quantization-aware training (QAT). Crucially, you must evaluate the Ethos-U55''s specific hardware support for these low-bit operations; without native support, unpacking overhead will destroy latency gains. Implement accuracy recovery techniques such as knowledge distillation.'
  common_mistake: |
    **The Pitfall:** Aggressively quantizing to sub-4-bit without sufficient QAT or hardware-aware kernel mapping.
    **The Rationale:** Candidates assume lower bit-widths magically run faster, neglecting the impact of data type support and efficient kernel implementations on the Ethos-U55 (which may not natively support 2-bit MACs without unpacking overhead).
    **The Consequence:** Severe accuracy degradation and potentially worse latency if the NPU has to fallback to CPU for unsupported sub-byte unpacking.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M7 at 480 MHz.
    - 512 KB SRAM.
    - Ethos-U55 (128-512 MAC/cycle).
    - 8-bit model weights = 1 MB.
    - 10M MACs total.

    **Calculations:**
    - 2-bit weights footprint: 1 MB / 4 = 250 KB (fits within 512 KB SRAM).
    - NPU theoretical compute time: 10,000,000 MACs / (512 MAC/cycle * 480,000,000 Hz) = 0.04 ms.
    - NPU slow config compute time: 10,000,000 MACs / (128 MAC/cycle * 480,000,000 Hz) = 0.16 ms.

    **Conclusion & Interpretation:**
    - **Result: 0.16 ms latency (Memory-Bandwidth-Bound)**. Weights fit at 250 KB, but latency depends heavily on NPU unpacking efficiency.
