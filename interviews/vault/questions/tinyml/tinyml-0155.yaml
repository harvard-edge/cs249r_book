title: The Cortex-M7 MAC Budget
scenario: Your team is deploying a voice activity detection (VAD) model on a device with a Cortex-M7 MCU running at 480 MHz. The model requires exactly 9 million MAC operations per inference. To meet the real-time requirement, inference must run every 20 milliseconds.
question: How would you compare the model's computational needs to the MCU's capabilities and explain if the MCU can handle the load?
details:
  realistic_solution: The MCU's maximum theoretical throughput is 480 Million MACs per second (assuming 1 MAC per cycle on the 480 MHz core). The model requires 9 million MACs every 20ms. This translates to a sustained load of 50 inferences per second (1000ms / 20ms). Therefore, the total required throughput is 9 MMACs/inference × 50 inferences/sec = 450 Million MACs per second. While 450M is less than 480M, it represents over 93% utilization of the core's absolute peak theoretical throughput. This leaves almost no headroom for the RTOS, other tasks, pipeline stalls, or cache misses. In a real system, this is far too risky and will likely fail to meet its deadline. The MCU cannot reliably handle this load.
  common_mistake: |
    **The Pitfall:** Only comparing raw ops per inference (9M) to the MCU's clock speed (480M).
    **The Rationale:** Candidates conclude there is plenty of headroom because they forget to account for the inference rate (50 inferences/sec).
    **The Consequence:** The deployed system will consistently miss real-time deadlines under sustained load.
  napkin_math: |
    - MCU Peak Capacity: 480 MHz clock -> peak theoretical throughput of 480 Million MACs/sec.
    - Inference Requirement: 9 million MACs / 20ms = 9 million * 50 inferences/sec = 450 Million MACs/sec.
    - Utilization: 450M / 480M = 93.75%.
    - **Conclusion:** 93.75% utilization leaves no headroom for RTOS, stalls, or cache misses. **The MCU cannot reliably handle this load.**
  options:
  - Yes, easily. The MCU has 480M cycles and the model only needs 9M.
  - Yes, with about 50% headroom.
  - No, the required 450 MMACs/sec is too close to the MCU's 480 MMACs/sec peak.
  - No, it requires 900 MMACs/sec, which is double the MCU's capability.
  correct_index: 2
