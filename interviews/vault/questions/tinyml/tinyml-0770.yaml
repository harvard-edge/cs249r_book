title: The CMSIS-NN SIMD Speedup
scenario: A Cortex-M4 has SIMD instructions (via DSP extension) that can perform 4 x INT8 multiply-accumulates in a single cycle using the __SMLAD intrinsic. A naive C implementation of a 1024-element dot product takes 1 MAC per cycle.
question: How would you calculate the theoretical speedup from SIMD, and explain why the real speedup is closer to 2.5x instead of 4x?
details:
  realistic_solution: 'Theoretical: naive = 1024 cycles. SIMD = 1024/4 = 256 cycles. Speedup = 4x. In practice, SIMD achieves ~2.5x because: (1) data must be loaded and packed into 32-bit registers — each load pair costs 1-2 cycles, (2) loop overhead (branch, counter) adds ~1 cycle per 4 MACs, (3) unaligned data requires extra shift instructions, (4) pipeline stalls from data dependencies between consecutive SMLADs. Measured: ~410 cycles for SIMD vs 1024 naive -> 2.5x real speedup.'
  common_mistake: |
    **The Pitfall:** Claiming a clean 4x speedup from 4-wide SIMD.
    **The Rationale:** Ignoring that real-world code incurs loop overhead, requires specific data alignment, and suffers pipeline stalls from memory accesses.
    **The Consequence:** Overestimating performance gains and setting unrealistic latency expectations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1024-element dot product.
       - Naive implementation: 1 cycle per MAC.
       - Ideal SIMD: 4 MACs per cycle.
    2. **Calculations:**
       - Naive cycles = 1024 MACs * 1 cycle/MAC = 1024 cycles.
       - Ideal SIMD cycles = 1024 / 4 = 256 cycles.
       - Real SIMD cycles = 256 SMLAD cycles + 64 load cycles (pipelined) + 64 loop overhead cycles + 26 alignment/stall cycles ≈ 410 cycles.
       - Real speedup = 1024 / 410 = 2.49x.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** Real speedup is roughly 2.5x due to loop overhead, memory alignment constraints, and pipeline stalls.
