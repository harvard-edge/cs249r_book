title: MCU Sleep Mode Strategy for Always-On Wake Word Detection
scenario: 'An always-on wake word detector runs on ESP32-S3 (240MHz, 40mW active, 20μW deep sleep). The
  system uses a 2-stage detection: low-power prefilter (3mW, 1ms inference, 10fps) followed by full model
  (40mW, 30ms, triggered only on prefilter positive). Positive trigger rate is 5% of time. Calculate average
  power.'
question: "What is the average power of an ESP32-S3 two-stage wake-word detector with 10 fps prefilter and 5% full-model triggers?"
details:
  realistic_solution: 'Prefilter: runs 10fps = every 100ms. Active during inference: 1ms at 3mW = 0.003mJ.
    Sleep: 99ms at 20μW = 0.00198mJ. Cycle energy: 0.003+0.00198 = 0.00498mJ per 100ms. Average prefilter
    power: 0.00498/0.1 = 0.0498mW ≈ 0.05mW. Full model (triggered at 5% rate): 5% of 10fps = 0.5 triggers/sec.
    Each trigger: 30ms at 40mW = 1.2mJ. Power from full model: 0.5 × 1.2mJ = 0.6mW. Total average: 0.05
    + 0.6 = 0.65mW. Battery (1000mAh at 3.7V = 3.7Wh): life = 3.7Wh/0.00065W = 5,692 hours = 237 days.
    Wake-up overhead: ESP32-S3 wake from deep sleep = 800μs at 5mA = 4μJ — negligible.'
  common_mistake: Calculating power as a simple duty-cycle weighted average without accounting for the
    transition overhead between sleep and active states, which can cost significant energy on wake-up.
  napkin_math: 'Prefilter avg: 0.003mJ/100ms = 0.03mW active + 0.00198mJ sleep = ~0.05mW. Full model:
    0.5/s × 40mW×0.03s = 0.6mW. Total: 0.65mW. 1000mAh×3.7V / 0.65mW = 5.69k hours = 237 days. Good battery
    life for always-on.'
