title: TinyML Gateway Hotspot
scenario: A farm has 100 sensors and 4 gateways. One gateway receives 70 sensors because of radio range, while the others receive 10 each. Each gateway can process 30 reports/minute. Analyze what happens during a 1 report/minute burst per sensor.
question: Why does one TinyML gateway overload when 100 sensors are spread 70/10/10/10 across four gateways?
details:
  realistic_solution: The hotspot gateway receives 70 reports/minute, above its 30 reports/minute capacity, while the others are underused. The bottleneck is radio placement/load balancing, not total gateway count. Reassign sensors, add a gateway, or buffer and shed lower-priority reports.
  common_mistake: Averaging 100 sensors over 4 gateways and assuming 25 sensors per gateway.
  napkin_math: Hot gateway demand = 70 reports/min. Capacity = 30 reports/min. Overload = 40 reports/min.
