title: Guardrail Latency Budget on Ethos-U55
scenario: As part of a Responsible AI assessment for a smart-home audio device, a local PII filtering guardrail model must run before cloud transmission. You are deploying this on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform at 480 MHz, where the Ethos-U55 achieves 128 MAC/cycle. The total system latency budget for the guardrail evaluation is 2.5 milliseconds, but the Cortex-M7 requires 0.5 ms for memory orchestration.
question: How would you calculate the maximum theoretical MAC complexity the guardrail model can have to meet this deadline, assuming 100% NPU utilization?
details:
  realistic_solution: The correct approach isolates the execution time available exclusively for the Ethos-U55 NPU. By subtracting the Cortex-M7's SRAM data movement overhead from the total budget, we establish the exact time window for the NPU. We then calculate the total clock cycles available in that specific window and multiply by the NPU's structural MAC throughput to find the maximum model complexity.
  common_mistake: |
    **The Pitfall:** Forgetting system orchestration overhead.
    **The Rationale:** Candidates calculate raw NPU throughput using the entire latency budget, ignoring CPU data preparation time.
    **The Consequence:** The specified model fails real-time deadlines because the M7's memory movement time aggressively eats into the available compute window.
  napkin_math: |
    - Available NPU Time = Total Budget (2.5 ms) - M7 Orchestration (0.5 ms) = 2.0 ms.
    - NPU Cycles = 480,000,000 cycles/sec * 0.002 sec = 960,000 cycles.
    - Max MACs = 960,000 cycles * 128 MACs/cycle.
    - **Guardrail model maximum complexity = 122.88 Million MACs.**
