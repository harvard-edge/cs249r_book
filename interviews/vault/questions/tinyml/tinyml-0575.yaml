title: The SPI Bus Capacitance Limit
scenario: Your ML device needs to sample 4 high-speed IMUs simultaneously. You connect all 4 IMUs to the
  same SPI bus on the MCU. You configure the SPI clock to 20 MHz. The system works perfectly with 1 IMU.
  When you plug in all 4, the data read from all sensors becomes corrupted. The firmware is correct, the
  Chip Select pins are correct, and 20 MHz is well within the IMU specs. What analog physics problem ruined
  the digital bus?
question: "Why does adding four IMUs to a 20 MHz SPI bus corrupt data even when firmware and chip-selects are correct?"
details:
  realistic_solution: You hit the **Parasitic Bus Capacitance Limit**. 20 MHz clock = 50ns period. A bit
    must be read in 25ns. If bus capacitance (C) and trace resistance (R) create an RC time constant of
    30ns, the signal mathematically cannot reach the 3.3V threshold in
  common_mistake: '"The MCU can''t read from 4 things at once." SPI is master/slave; it reads them one
    at a time using Chip Selects.'
  napkin_math: 20 MHz clock = 50ns period. A bit must be read in 25ns. If bus capacitance (C) and trace
    resistance (R) create an RC time constant of 30ns, the signal mathematically cannot reach the 3.3V
    threshold in time to be registered as a '1'.
  options:
  - The SPI clock of 20 MHz exceeds the maximum supported frequency when multiple slave devices are present
    on the same bus.
  - 'Adding 4 IMUs increases parasitic bus capacitance ~4x. The RC time constant (trace resistance x bus
    capacitance) rises from ~8ns to ~30ns. At 20 MHz (50ns period, 25ns bit window), the signal cannot
    reach the 3.3V logic threshold in time. Fix: reduce SPI clock to 5 MHz, use separate SPI buses, or
    add bus buffer ICs to isolate capacitive loads.'
  - The SPI chip select lines are experiencing cross-talk at 20 MHz, causing multiple IMUs to respond
    simultaneously and driving conflicting data onto the MISO line.
  - The MCU's SPI peripheral has a hardware bug that corrupts data when more than 2 slave devices share
    the same bus, regardless of clock speed.
  correct_index: 1
