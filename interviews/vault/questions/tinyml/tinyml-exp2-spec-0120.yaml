title: Secure Wake-Word Pipeline Design for nRF5340
scenario: 'You are specifying a continuous wake-word detection pipeline for a security-critical smart
  badge using the Nordic nRF5340. The system must defend against adversarial audio replay attacks (spoofing)
  where unauthorized users play recorded commands. You must design an inference specification that provides
  robust spoofing defense while strictly adhering to the nRF5340 limits: a 128 MHz app core, 256 KB SRAM,
  1 MB flash, and maintaining a low power profile near the ~5mA active limit.'
details:
  realistic_solution: 'The system should use a cascaded approach: an ultra-lightweight INT8 CNN for initial
    wake-word detection, followed by a secondary lightweight classifier (like an SVM or Decision Tree)
    analyzing acoustic artifacts (e.g., high-frequency roll-off from speaker playback). The audio buffer
    and both models must be carefully sized. The BLE 5.3 radio should only transmit authenticated command
    events, keeping the 64 MHz net core asleep most of the time.'
  common_mistake: Candidates often propose complex, deep-learning-based anti-spoofing models that immediately
    exceed the 256 KB SRAM limit. Alternatively, they might suggest streaming all audio over BLE 5.3 for
    cloud verification, which destroys the wearable's battery life by continuously keeping the radio active
    instead of respecting the ~5mA active target.
  napkin_math: '1 second of 16kHz, 16-bit audio requires a 32 KB ring buffer. A quantized INT8 wake-word
    CNN requires ~64 KB SRAM and ~100 KB Flash. The anti-spoofing SVM requires ~10 KB SRAM. Total inference
    memory: 32 KB + 64 KB + 10 KB + ~20 KB (scratchpad) = 126 KB SRAM. This fits easily within the 256
    KB SRAM limit, leaving 130 KB for the RTOS and BLE stack. Running a 5M MACs inference on the 128 MHz
    app core takes ~40ms, adding negligible impact to the ~5mA active power baseline.'
