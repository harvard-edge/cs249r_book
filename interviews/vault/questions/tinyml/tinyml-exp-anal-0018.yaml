title: NAS Memory Constraint Analysis on nRF5340
scenario: We are running a hardware-aware Neural Architecture Search (NAS) targeting the Nordic nRF5340
  (128 MHz app core, 256 KB SRAM, 1 MB flash, BLE 5.3). The application firmware and BLE stack statically
  allocate 192 KB of SRAM, leaving a strict 64 KB arena for ML inference. The NAS evaluates a network
  featuring an inverted bottleneck block with an int8 input tensor of 32x32x16, an expansion ratio of
  6, and a 32x32x16 output tensor. Despite the model's total weights being only 200 KB and easily fitting
  in flash, the NAS hardware cost model instantly rejects this specific block. Apply the memory footprint
  calculation to explain why this block is rejected.
question: "Why does the NAS reject the nRF5340 inverted bottleneck block despite its weights fitting in Flash?"
details:
  realistic_solution: The candidate should recognize that in memory-constrained hardware-aware NAS, peak
    activation SRAM is typically the strictest bottleneck. For an inverted bottleneck block, the intermediate
    expanded tensor must be fully materialized in SRAM. The inference engine must hold both the input
    tensor and the expanded intermediate tensor in memory simultaneously during the first pointwise convolution
    phase. This peak memory spike vastly exceeds the remaining SRAM available on the nRF5340, causing
    the NAS constraints to reject the architecture.
  common_mistake: Candidates often focus solely on the static weight size (which easily fits in the 1
    MB flash) or computational FLOPs for the 128 MHz core, forgetting to calculate the peak intermediate
    activation memory. They may also incorrectly assume the memory required is just the sum of the input
    and output tensors, neglecting the large intermediate tensor generated by the expansion ratio.
  napkin_math: 'Available ML SRAM: 256 KB total - 192 KB OS/BLE = 64 KB. Input tensor size: 32 * 32 *
    16 channels * 1 byte (int8) = 16,384 bytes (16 KB). Expanded intermediate tensor: 32 * 32 * (16 *
    6) channels * 1 byte = 98,304 bytes (96 KB). Peak activation memory required (Input + Intermediate):
    16 KB + 96 KB = 112 KB. Constraint check: 112 KB peak memory > 64 KB available SRAM, meaning the architecture
    is correctly rejected.'
