title: The Peak RAM Puzzle
scenario: Your 8-layer convolutional model needs 300 KB of peak activation RAM, but your Cortex-M7 only
  has 256 KB of SRAM available after firmware and stack. You cannot change the model architecture. How
  do you make it fit?
question: "How can an 8-layer CNN needing 300 KB peak activation RAM fit in 256 KB of Cortex-M7 SRAM?"
details:
  realistic_solution: 'Operator scheduling for peak RAM reduction. The key insight: not all layers'' activations
    are alive at the same time. By reordering operator execution (computing and immediately consuming
    activations before moving to the next layer), you can overwrite dead tensors. Tools like TFLite Micro''s
    memory planner and MCUNet''s patch-based inference take this further — instead of computing an entire
    feature map at once, you compute it in spatial patches, reducing peak RAM from the full feature map
    size to a single patch''s worth.'
  common_mistake: '"Quantize the model to use less memory." Quantizing weights from FP32 to INT8 shrinks
    the weight storage in Flash, but activations are already INT8 in a quantized pipeline — the peak activation
    footprint barely changes.'
  napkin_math: 'A standard 8-layer CNN with 64 channels at 48×48 spatial resolution: one full activation
    tensor = $64 \times 48 \times 48 \times 1$ byte (INT8) = 147 KB. Two such tensors alive simultaneously
    (input + output of a layer) = 294 KB — exceeds 256 KB. With patch-based inference (e.g., 12×48 patches),
    peak activation drops to $64 \times 12 \times 48 \times 1 = 36$ KB per tensor, and two alive = 72
    KB. The model now fits with room to spare.'
