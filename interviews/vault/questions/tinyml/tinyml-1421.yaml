title: 'TinyML Model Deployment on nRF5340: Optimizing Operator Schedule for Memory and Performance'
scenario: You are deploying a pre-trained CNN for keyword spotting onto a Nordic nRF5340 microcontroller (128 MHz ARM Cortex-M33, 256 KB SRAM, 1 MB flash). The quantized model requires a peak working memory of 300 KB if executed in a naive layer-by-layer fashion, failing to fit in SRAM. Its current inference time of 150 ms also misses the real-time 100 ms latency budget.
question: How would you design an operator scheduling strategy that allows the model to fit within the nRF5340's 256 KB SRAM constraints and meet the 100 ms latency target?
details:
  realistic_solution: 'Implement a memory-aware operator scheduling algorithm that prioritizes memory reuse and operator fusion. Specifically:

    1.  **Memory Reuse:** Analyze the data dependencies between operators to identify tensors that can be freed immediately after their last use and their memory regions reused by subsequent operators. This involves careful static memory planning or a ''scratchpad'' memory management approach.

    2.  **Operator Fusion:** Combine sequential, compatible operations (e.g., Conv2D -> ReLU -> BatchNorm) into a single fused kernel to reduce intermediate tensor storage and minimize memory accesses.

    3.  **Execution Order Optimization:** Reorder independent operations to improve data locality or enable more efficient memory reuse. For example, processing batches of smaller chunks if possible, or scheduling operations to ensure critical data remains in faster memory.

    4.  **Graph Partitioning:** If necessary, partition the graph to execute parts of the model sequentially, saving intermediate states to flash if SRAM is insufficient, though this impacts latency significantly.'
  common_mistake: |
    **The Pitfall:** Focusing only on model quantization and pruning.
    **The Rationale:** Developers often overlook opportunities for in-place operations, operator fusion, or reordering operations to maximize memory reuse.
    **The Consequence:** This leads to avoidable memory overflows and inefficient data movement, causing the model to fail deployment on highly constrained devices.
  napkin_math: |
    - **Initial Peak Memory:** 300 KB.
    - **SRAM Constraint:** 256 KB.
    - **Memory Reuse:** T1 (50 KB) and T2 (70 KB) can share space if OpB is scheduled immediately after OpA. T1 is deallocated before OpC starts.
    - **Operator Fusion:** Fusing Conv2D -> ReLU -> BatchNorm saves intermediate memory and instruction cycles.
    - **Peak Reduction:** Careful scheduling and in-place operations reduce the peak memory from 300 KB to **< 256 KB**.
    - **Latency Improvement:** Fewer memory accesses from fusion reduce the 150 ms latency to **< 100 ms**.
