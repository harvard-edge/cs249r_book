title: The Depthwise Separable Memory Saver
scenario: You're optimizing a keyword spotting model for a Cortex-M4 microcontroller, and a standard 2D
  convolutional layer is proving to be a memory bottleneck. The layer takes a `32x32x16` (Height x Width
  x Channels) input tensor and applies 32 filters using a `3x3` kernel. To reduce the memory footprint,
  you are considering replacing it with a depthwise separable convolution. First, explain how you would
  calculate the number of parameters for the *original* standard convolutional layer and what that number
  is.
details:
  realistic_solution: The number of parameters in a standard 2D convolutional layer is the product of
    its kernel dimensions, the number of input channels, and the number of output channels (filters).
    For this layer, the calculation is a straightforward multiplication of these four values. On a memory-constrained
    device like a microcontroller, every parameter counts, as they must be stored in Flash memory, which
    is typically limited to 1MB or less.
  common_mistake: Engineers new to on-device optimization often miscalculate the parameters of a standard
    convolution. A frequent error is to forget the `input_channels` dimension, calculating only `kernel_width
    * kernel_height * output_channels`. This vastly underestimates the true memory cost and masks the
    massive savings from techniques like depthwise separable convolutions.
  napkin_math: 'Standard 2D Conv input activation size (INT8): 32 * 32 * 16 = 16KB. Output size (stride
    1, same padding): 32 * 32 * 32 = 32KB. The weights require 3 * 3 * 16 * 32 = 4,608 bytes (~4.6KB).
    During execution, both input and output tensors must reside in SRAM, demanding 16KB + 32KB = 48KB.
    This consumes nearly 20% of a Cortex-M4''s 256KB SRAM, forcing tight memory management for other layers.'
  options:
  - 288 parameters
  - 656 parameters
  - 4,608 parameters
  - 9,216 parameters
  correct_index: 2
