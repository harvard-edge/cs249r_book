title: The TinyML Compute-Memory Tradeoff
scenario: 'You''re optimizing a keyword spotting model on a Cortex-M4 microcontroller. A key layer is
  a 2D convolution with the following properties:

  - Input feature map: 16×16×8 (H×W×C_in)

  - Output feature map: 16×16×16 (H×W×C_out)

  - Kernel size: 3×3

  - Precision: INT8 (1 byte per element)

  - Cortex-M4 specs: 336 MFLOPS peak compute, 1.2 GB/s SRAM bandwidth

  Is this convolutional layer compute-bound or memory-bound on the Cortex-M4?'
question: "Is this convolutional layer compute-bound or memory-bound on the Cortex-M4?"
details:
  realistic_solution: First, we calculate the Ridge Point of the hardware, which is the ratio of its peak
    compute to its memory bandwidth. This value tells us the minimum Arithmetic Intensity a workload needs
    to be compute-bound.
  common_mistake: A common mistake is to miscalculate the total operations or, more frequently, to only
    count the input tensor size for data movement, ignoring the weights and the output tensor. Another
    error is to incorrectly guess that all TinyML workloads are memory-bound due to the small memory sizes,
    failing to recognize that on-chip SRAM is actually very fast relative to the slow MCU core.
  napkin_math: '*   **Hardware Ridge Point:** (336 M-ops/s) / (1.2 G-bytes/s) ≈ 0.28 Ops/Byte

    *   **FLOPs for Conv2D:** 2 × K² × C_in × C_out × H_out × W_out = 2 × 9 × 8 × 16 × 16 × 16 = **589,824**
    FLOPs**

    *   **Data moved:** Input (16×16×8 = 2,048 B) + Weights (3×3×8×16 = 1,152 B) + Output (16×16×16 =
    4,096 B) = **7,296 bytes**

    *   **Arithmetic Intensity:** 589,824 / 7,296 ≈ **80.8 Ops/Byte**

    *   **Comparison:** 80.8 >> 0.28 → This layer is deeply **compute-bound**.

    *   **Implication:** Optimizations should target reducing FLOPs (e.g., depthwise separable convolution,
    pruning), not memory access patterns.'
  options:
  - Memory-bound, because TinyML devices have very little SRAM, so they are always waiting on memory.
  - Memory-bound, because the arithmetic intensity is ~0.1 Ops/Byte, which is lower than the ridge point.
  - Compute-bound, because the layer's arithmetic intensity (~81 Ops/Byte) is much higher than the MCU's
    ridge point (~0.28 Ops/Byte).
  - Compute-bound, because its power consumption is high, which means it is doing a lot of computation.
  correct_index: 2
