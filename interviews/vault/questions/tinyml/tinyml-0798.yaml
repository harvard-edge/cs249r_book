title: Tinyml New 0022
scenario: An accelerometer-based anomaly detection model fails on a newly manufactured batch of devices. The hardware is theoretically identical, but the model classifies normal movements as anomalies.
question: What sampling-rate drift in the new accelerometer batch makes normal movements look anomalous?
details:
  realistic_solution: Utilize a hardware timer to strictly trigger IMU sampling, or resample the data in software to enforce the 100Hz nominal rate to prevent feature-domain shifts.
  common_mistake: |
    **The Pitfall:** Deploying time-series models without strict hardware sample rate enforcement.
    **The Rationale:** Assuming low-cost sensor internal RC oscillators are perfectly accurate and consistent across manufacturing batches.
    **The Consequence:** Drift in the sampling frequency shifts temporal and frequency-domain features (FFT peaks), completely destroying the model's predictive accuracy.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original sample rate: 100Hz (10ms period).
    - New batch sample rate: 105Hz (9.5ms period).
    - Window size: 100 samples (1 second nominal).

    **Calculations:**
    - Expected duration: 100 samples * 10 ms = 1000 ms.
    - Actual duration: 100 samples * 9.5 ms = 950 ms.
    - Temporal shift over 1 window: 50 ms.
    - Frame misalignment: 50 ms / 10 ms = 5 full frames.

    **Conclusion & Interpretation:**
    - **Result: 5% frequency shift (5 frames) (Synchronization-Bound)**. The system is synchronization-bound. The CNN filters misalign with the expected features, triggering false anomalies.
