title: The Tensor Arena Sizing Puzzle
scenario: 'You are using TensorFlow Lite for Microcontrollers to deploy a keyword spotting model. The
  memory planner provides the following analysis of tensor sizes for three sequential operations in the
  execution graph:'
question: "What tensor arena size follows from the peak coexisting tensors rather than summing every tensor?"
details:
  realistic_solution: The Tensor Arena is a single contiguous block of memory allocated for all input,
    output, and intermediate tensors. Its size must be large enough to accommodate the peak memory usage
    at any single point in the execution graph. This peak occurs when the tensors for the single most
    memory-intensive operation must coexist in memory.
  common_mistake: The most common mistake is to sum the sizes of all tensors mentioned (10 + 40 + 20 +
    1 = 71 KB). This overestimates the required memory because it doesn't account for the lifecycle of
    tensors; the memory for intermediate tensors is reused once they are no longer needed by any future
    operations.
  napkin_math: 'Peak at each step: Step1 input=1×49×10=490B, output=1×25×16=400B, total=890B. Step2 input=400B,
    output=1×13×32=416B, total=816B. Step3 input=416B, output=1×64=64B, total=480B. Arena = max(890,816,480)
    = 890 bytes. On Cortex-M4 w/ 256KB SRAM, this is <0.4% of available memory — model fits easily.'
  options:
  - 71 KB
  - 40 KB
  - 60 KB
  - 50 KB
  correct_index: 2
