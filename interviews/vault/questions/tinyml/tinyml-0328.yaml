title: The Tensor Arena Sizing Puzzle
scenario: >
  You are using TensorFlow Lite for Microcontrollers to deploy a keyword spotting model. The memory planner provides the following analysis of tensor sizes for three sequential operations in the execution graph: Step 1 (Input: 10 KB, Output: 40 KB), Step 2 (Input: 40 KB, Output: 20 KB), and Step 3 (Input: 20 KB, Output: 1 KB).
question: >
  What tensor arena size follows from the peak coexisting tensors rather than summing every tensor?
details:
  realistic_solution: >
    The Tensor Arena is a single contiguous block of memory allocated for all input, output, and intermediate tensors. Its size must be large enough to accommodate the peak memory usage at any single point in the execution graph. This peak occurs when the tensors for the single most memory-intensive operation must coexist in memory.
  common_mistake: |
    **The Pitfall:** Summing the sizes of all tensors mentioned (10 + 40 + 20 + 1 = 71 KB).
    **The Rationale:** Candidates fail to account for the lifecycle of tensors; memory for intermediate tensors is reused once they are no longer needed by future operations.
    **The Consequence:** This overestimates the required memory and might lead to falsely concluding the model won't fit on the device.
  napkin_math: |
    - **Step 1:** Input = 10 KB, Output = 40 KB. Total = 50 KB.
    - **Step 2:** Input = 40 KB, Output = 20 KB. Total = 60 KB.
    - **Step 3:** Input = 20 KB, Output = 1 KB. Total = 21 KB.
    - **Peak memory:** max(50, 60, 21) = 60 KB.
    - **Conclusion:** The arena size required is **60 KB**. On a Cortex-M4 with 256KB SRAM, this fits easily.
  options:
  - 71 KB
  - 40 KB
  - 60 KB
  - 50 KB
  correct_index: 2
