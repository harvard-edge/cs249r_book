title: The Microcontroller's Low Bar
scenario: A Cortex-M4 microcontroller, a common choice for TinyML applications, has a peak compute performance
  of approximately 336 MFLOPS and an on-chip SRAM bandwidth of 1.2 GB/s. Calculate its 'ridge point' in
  Operations per Byte. What does this value signify for developers choosing a model architecture?
details:
  realistic_solution: The ridge point is the threshold where a workload transitions from being memory-bound
    to compute-bound. It is calculated by dividing peak compute by memory bandwidth. For the Cortex-M4,
    this is 336 MFLOPS / 1.2 GB/s, which equals 0.28 Ops/Byte. This extremely low value means that a model
    only needs to perform slightly more than one operation for every four bytes it reads to be limited
    by the CPU's speed, not by memory access. Most neural network layers easily exceed this low bar, making
    them compute-bound on this platform.
  common_mistake: Engineers accustomed to datacenter GPUs, which have ridge points in the hundreds, often
    miscalculate or distrust the low result. They might incorrectly invert the formula (Bandwidth/Compute)
    or make a unit error (confusing GB/s with MB/s). The key is to trust the first-principles formula
    and understand that the physics of on-chip systems are different; memory isn't the extreme bottleneck
    it is on larger systems with off-chip HBM or DRAM.
  napkin_math: 'Ridge = Peak Compute / BW = 336 MFLOPS / 1.2 GB/s = 0.28 Ops/Byte. Meaning: any layer
    reading 1 byte needs only 0.28 ops to saturate compute. Typical dense layer: AI = 2×N (for N×N matmul)
    → even 1×1 conv with N=1 has AI=2 >> 0.28. Nearly all NN layers are compute-bound on Cortex-M4. Memory-bound
    ops: batch norm, ReLU (AI≈1 op/4bytes=0.25, borderline).'
  options:
  - 3.57 Ops/Byte. Workloads must perform over 3 operations per byte to be compute-bound.
  - 280 Ops/Byte. Nearly all workloads will be severely memory-bound.
  - 0.28 Ops/Byte. Most workloads will be compute-bound as they easily exceed this low arithmetic intensity
    requirement.
  - 29.5 Ops/Byte. This is a typical ridge point, making the choice of compute- vs memory-intensive layers
    critical.
  correct_index: 2
