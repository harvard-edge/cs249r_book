title: Coin Cell Capacity Degradation Under Inference Load
scenario: A TinyML vibration monitor on a Nordic nRF5340 executes a 2-second inference at ~5mA every 10 seconds. Powered by a 200mAh CR2032 coin cell, the system mathematically averages 1mA, theoretically yielding 200 hours of life. In practice, the device browns out in under 100 hours.
question: Why does the 5mA pulse load cause the device to prematurely brownout and fail at less than 50% of the coin cell's rated capacity?
details:
  realistic_solution: Coin cell chemistry is physically optimized for continuous micro-amp loads, not multi-second milliamp pulses. The nRF5340 pulling ~5mA for 2 seconds induces a massive voltage drop across the battery's internal resistance. As the cell naturally depletes, this internal resistance spikes. The repeated heavy inference pulses violently depress the supply voltage under load, prematurely triggering the hardware's Brown-Out Reset (BOD) circuit long before the actual chemical capacity is exhausted.
  common_mistake: |
    **The Pitfall:** Modeling batteries as perfect mathematical capacitors.
    **The Rationale:** Candidates perform linear capacity division (mAh / mA) without evaluating battery chemistry, internal resistance, or load-induced voltage sag.
    **The Consequence:** They grossly overestimate functional battery life, resulting in fleet deployments that unexpectedly crash while the battery still holds 50% of its chemical energy.
  napkin_math: |
    1. **Assumptions & Constraints**:
       - CR2032 capacity = 200mAh. Nominal Voltage = 3.0V.
       - Pulse load = 5mA for 2 seconds.
       - BOD threshold ≈ 1.9V.
    2. **Calculations**:
       - Fresh cell internal resistance: ~20 Ω -> $V_{drop}$ = 0.005A * 20Ω = 0.1V.
       - Mid-life cell internal resistance: ~100 Ω -> $V_{drop}$ = 0.005A * 100Ω = 0.5V.
       - Loaded Voltage at mid-life: 2.4V (resting) - 0.5V (sag) = 1.9V.
    3. **Conclusion & Interpretation**:
       - **Result: Power-Bound Brownout**. The 5mA inference pulse creates a 0.5V sag on a partially depleted cell, instantaneously driving the supply voltage below the 1.9V hardware threshold and crashing the system.
