title: Coin Cell Capacity Degradation Under Inference Load
scenario: We deployed a TinyML vibration monitor on a Nordic nRF5340. To catch anomalies, it runs a 2-second inference on the app core at ~5mA (3.0V) every 10 seconds, returning to a negligible sleep state in between. The system is powered by a standard CR2032 coin cell with a nominal 200mAh capacity. We expected around 200 hours of battery life based on average current calculations, but the device consistently browns out in under 100 hours.
question: How would you analyze why this duty cycle behavior causes such a massive discrepancy from the theoretical battery life?
details:
  realistic_solution: Coin cell batteries are chemically optimized for continuous micro-amp loads (like RTCs), not heavy pulse loads. The nRF5340 drawing ~5mA for a relatively long 2-second duration causes a substantial voltage drop across the coin cell's internal resistance. As the battery depletes, this internal resistance rises. The repeated 5mA inference pulses depress the supply voltage under load, prematurely triggering the nRF5340's brownout reset (BOD) circuit long before the 200mAh chemical capacity is actually exhausted.
  common_mistake: |
    **The Pitfall:** Assuming linear battery capacity.
    **The Rationale:** Candidates perform a straightforward calculation (Capacity / Average Current) and assume the battery acts like a perfect mathematical capacitor.
    **The Consequence:** They ignore internal resistance and voltage sag under heavy pulse loads, resulting in field deployments that fail prematurely due to brownouts.
  napkin_math: |
    - Average Current = (2s * 5mA + 8s * 0mA) / 10s = 1mA.
    - Theoretical Life = 200mAh / 1mA = 200 hours.
    - Fresh CR2032 internal resistance ~20 ohms -> V_drop = 0.005A * 20 = 0.1V.
    - Mid-life CR2032 internal resistance ~100 ohms -> V_drop = 0.005A * 100 = 0.5V.
    - **2.4V resting cell drops to 1.9V under 5mA load, triggering brownout reset at ~50% capacity.**
