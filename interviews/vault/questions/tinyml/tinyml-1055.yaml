title: Coin Cell Capacity Degradation Under Inference Load
scenario: We deployed a TinyML vibration monitor on a Nordic nRF5340 (128 MHz app
  core, 64 MHz net core, 256 KB SRAM). To catch anomalies, it runs a 2-second inference
  on the app core at ~5mA (3.0V) every 10 seconds, returning to a negligible sleep
  state in between. The system is powered by a standard CR2032 coin cell with a nominal
  200mAh capacity. We expected around 200 hours of battery life based on average current
  calculations, but the device consistently browns out in under 100 hours. Analyze
  why this duty cycle behavior causes such a massive discrepancy from the theoretical
  battery life.
question: How would you analyze why this duty cycle behavior causes such a massive
  discrepancy from the theoretical battery life?
details:
  realistic_solution: Coin cell batteries are chemically optimized for continuous
    micro-amp loads (like RTCs), not heavy pulse loads. The nRF5340 drawing ~5mA for
    a relatively long 2-second duration causes a substantial voltage drop across the
    coin cell's internal resistance. As the battery depletes, this internal resistance
    rises. The repeated 5mA inference pulses depress the supply voltage under load,
    prematurely triggering the nRF5340's brownout reset (BOD) circuit long before
    the 200mAh chemical capacity is actually exhausted.
  common_mistake: Candidates typically perform a straightforward linear calculation
    (Nominal Capacity / Average Current) and assume the coin cell will deliver its
    full rated capacity. They fail to account for the physical limitations of the
    battery chemistry when subjected to prolonged multi-milliamp pulses.
  napkin_math: Average Current = (2s * 5mA + 8s * 0mA) / 10s = 1mA. Theoretical Life
    = 200mAh / 1mA = 200 hours. A fresh CR2032 has ~20 ohms internal resistance (IR),
    causing a V_drop = 0.005A * 20 ohms = 0.1V during the 5mA inference. Mid-life,
    IR can easily reach 100 ohms, causing a V_drop = 0.005A * 100 ohms = 0.5V. If
    the cell's resting voltage is 2.4V, the 5mA pulse pulls it down to 1.9V, hitting
    the nRF5340's minimum voltage threshold and killing the device at only ~50% capacity.
