title: Evaluating Profiling Strategies for BLE Audio on nRF5340
scenario: 'You are deploying a keyword spotting model on a Nordic nRF5340 to wake up a device and transmit
  audio over BLE 5.3. The system is missing its 10ms latency target for inference. You have two profiling
  options: Option A uses software instrumentation (toggling GPIOs) on the 128 MHz app core, while Option
  B uses the ARM CoreSight ETM for non-intrusive hardware tracing. Evaluate which method is better for
  diagnosing the bottleneck without disrupting the BLE timing on the 64 MHz network core.'
details:
  realistic_solution: Hardware tracing (Option B) is the correct choice. The nRF5340's dual-core architecture
    requires precise synchronization between the 128 MHz app core and the 64 MHz net core. ETM provides
    cycle-accurate, non-intrusive profiling, allowing you to pinpoint compute bottlenecks in the ML model
    without altering the temporal dynamics or causing BLE protocol timeouts.
  common_mistake: Candidates often choose software instrumentation because it is universally applicable
    and easy to set up. They fail to account for the probe effect, where the added execution time perturbs
    the strict real-time scheduling required by the BLE stack, leading to inaccurate latency measurements.
  napkin_math: At 128 MHz, the app core cycle time is 1 / 128M = ~7.8 ns. Toggling a GPIO for software
    profiling typically takes ~15 cycles, or ~117 ns per toggle. Profiling 500 layers/functions in a neural
    network adds 500 * 2 * 117 ns = ~117 μs of overhead. In a strict 10 ms latency budget, this 1.17%
    overhead seems small, but the introduced jitter can disrupt the microsecond-level timing windows required
    by the BLE 5.3 stack running on the 64 MHz net core.
