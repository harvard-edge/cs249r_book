title: TinyML Offload Partition Spec
scenario: A firmware team wants to partition a model between Cortex-M CPU kernels and an external NPU. Specify what must be known before choosing which layers to offload.
question: What information is needed to partition a TinyML model between Cortex-M kernels and an external NPU?
details:
  realistic_solution: You need operator support, per-layer latency on each engine, activation sizes crossing the boundary, setup overhead, SRAM buffers, quantization compatibility, and deadline headroom. The best partition is not simply all supported ops; it minimizes boundary cost and memory pressure.
  common_mistake: Offloading every supported operator and accidentally adding more transfer overhead than compute saved.
  napkin_math: A 1 ms NPU speedup is not helpful if the boundary adds 2 ms of setup and transfer.
