title: The Power Budget Chasm
scenario: You are creating the Total Cost of Ownership (TCO) model for a new battery-powered audio sensor. The device's viability depends on achieving a 3-year battery life. To do this, you must understand the fundamental power trade-off between its two primary states.
question: What is the approximate ratio of power consumed by a typical TinyML microcontroller when actively running inference versus when it is in deep sleep?
details:
  realistic_solution: A typical Cortex-M4 microcontroller consumes ~10-50 milliwatts (mW) while active but only ~1-10 microwatts (µW) in deep sleep. This results in a ratio of approximately 1,000x to 50,000x. A memorable and correct order-of-magnitude answer is ~10,000x. This high ratio is fundamental to designing energy-efficient duty cycles that make multi-year battery life possible.
  common_mistake: |
    **The Pitfall:** Guessing the ratio is low (e.g., 10-100x), typical of server CPU power states.
    **The Rationale:** Engineers new to the embedded world underestimate the extreme low-power capabilities of modern MCUs in deep sleep.
    **The Consequence:** Failing to design an aggressive duty cycle, resulting in a device that lasts weeks instead of years.
  napkin_math: |
    1. **Assumptions & Constraints:** Typical Cortex-M4 active power ~50mW. Deep sleep power ~5µW. Target battery life 3 years.
    2. **Calculations:** Ratio = 50 mW / 0.005 mW = 10,000x. Average power for 9Wh over 3 years (26280 hr) = 9000 mWh / 26280 hr = 0.34 mW. Duty cycle D: 50*D + 0.005*(1-D) = 0.34. D ≈ 0.67%.
    3. **Conclusion & Interpretation:** **~10,000x ratio** (Duty-Cycle-Bound Power Budget).
  options:
  - A. ~10x
  - B. ~100x
  - C. ~10,000x
  - D. ~1,000,000x
  correct_index: 2
