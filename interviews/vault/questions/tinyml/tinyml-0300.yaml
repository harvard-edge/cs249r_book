title: The Power Budget Chasm
scenario: 'You are creating the Total Cost of Ownership (TCO) model for a new battery-powered audio sensor.
  The device''s viability depends on achieving a 3-year battery life. To do this, you must understand
  the fundamental power trade-off between its two primary states. Recall the approximate ratio: how much
  more power does a typical TinyML microcontroller consume when actively running inference versus when
  it is in deep sleep?'
details:
  realistic_solution: A typical Cortex-M4 microcontroller consumes ~10-50 milliwatts (mW) while active
    but only ~1-10 microwatts (µW) in deep sleep. This results in a ratio of approximately 1,000× to 50,000×.
    A memorable and correct order-of-magnitude answer is ~10,000x. This high ratio is fundamental to designing
    energy-efficient duty cycles that make multi-year battery life possible.
  common_mistake: Engineers new to the embedded world often underestimate the importance and magnitude
    of deep sleep modes. They might guess the ratio is low (e.g., 10-100×), a range typical for server
    CPU power states, failing to realize that the massive active-to-sleep power ratio is the core enabler
    of multi-year battery life in TinyML and thus dominates the economic model.
  napkin_math: 'Active: ~50mW. Deep sleep: ~5uW. Ratio = 50mW/0.005mW = 10,000x. For 3-year life: budget
    = battery_Wh / (3*8760h). E.g., 2x AA = 2*1.5V*3Ah = 9Wh. Max avg power = 9Wh/26280h = 0.34mW. Required
    duty cycle: 0.34mW = 50mW*D + 0.005*(1-D). D = 0.335/49.995 = 0.67%. Active ~6s per 15-min cycle.'
  options:
  - A. ~10x
  - B. ~100x
  - C. ~10,000x
  - D. ~1,000,000x
  correct_index: 2
