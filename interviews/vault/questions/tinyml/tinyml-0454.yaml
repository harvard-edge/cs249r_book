title: The Depthwise Separable Switcheroo
scenario: You are optimizing a standard CNN for a keyword spotting feature on a microcontroller with 256KB of Flash. One 3x3 convolutional layer (16 input channels, 32 output channels) consumes too much Flash. You propose replacing it with a depthwise separable convolution.
question: Calculate the parameter reduction to determine if replacing the 3x3 convolution with a depthwise separable convolution is a valid optimization.
details:
  realistic_solution: 'The correct approach is to calculate the parameter count for both layer types. The depthwise separable version splits the single standard convolution into two smaller ones: a depthwise convolution (one filter per input channel) and a pointwise convolution (1x1 convolution). This factorization drastically reduces the number of parameters, and thus the Flash footprint.'
  common_mistake: |
    **The Pitfall:** Underestimating the parameter reduction of depthwise separable convolutions.
    **The Rationale:** Candidates mistakenly assume it only reduces FLOPs, or they think the memory savings are a negligible 10-20%.
    **The Consequence:** Rejecting a highly effective architectural optimization that could save crucial kilobytes of Flash memory.
  napkin_math: |
    *   **Standard 3x3 Conv:** 16 in * 32 out * 3 * 3 = 4,608 parameters (4,608 bytes at INT8).
    *   **Depthwise Separable:**
        *   Depthwise: 16 in * 1 out * 3 * 3 = 144 params.
        *   Pointwise: 16 in * 32 out * 1 * 1 = 512 params.
    *   **Total Separable Params:** 144 + 512 = 656 bytes.
    *   **Reduction:** 4,608 / 656 = **7.0x fewer parameters**.
    *   **Flash Savings:** 4,608 - 656 = 3,952 bytes.
  options:
  - It's a bad trade-off; the parameter savings are minimal (~10-20%).
  - It reduces parameters by about 50%, which is a good starting point.
  - It provides a massive parameter reduction of ~85%, making it an excellent optimization strategy.
  - It will not change the parameter count, it only reduces the required computation (FLOPs).
  correct_index: 2
