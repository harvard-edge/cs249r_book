title: The Microcontroller's Compute Ceiling
scenario: What does the 'Ridge Point' of a roofline model for a typical microcontroller, like a Cortex-M4,
  indicate about its performance, and what is its approximate value?
question: "What does the 'Ridge Point' of a roofline model for a typical microcontroller, like a Cortex-M4, indicate about its performance, and what is its approximate value?"
details:
  realistic_solution: 'The Ridge Point is the ratio of peak compute (FLOPS) to peak memory bandwidth (Bytes/s).
    For a Cortex-M4, this value is extremely low: approximately 0.2 Ops/Byte. This indicates that the
    on-chip SRAM is quite fast relative to the simple compute core. Consequently, most ML operations (like
    convolutions or dot products), which have an arithmetic intensity greater than 0.2, are **compute-bound**.
    The system''s performance is limited by the raw MFLOPS of the CPU, not by the speed of its memory.'
  common_mistake: Engineers from a GPU/cloud background often assume all ML systems are memory-bandwidth-bound
    and are starved for data. They see the low MFLOPS of an MCU and incorrectly conclude its memory system
    is an even bigger bottleneck, thus expecting a high ridge point (>10 Ops/Byte). This is the reverse
    of the truth for MCUs.
  napkin_math: 'Cortex-M4: ~336 MFLOPS peak, SRAM bandwidth ~1.68 GB/s (168MHz * 4B * 2.5 cycles). Ridge
    point = 336e6 / 1.68e9 = 0.2 Ops/Byte. This is very low -- most ML ops (convolution AI ~2-10 Ops/Byte)
    exceed it. So nearly all workloads are compute-bound on M4, not memory-bound.'
  options:
  - ~200 Ops/Byte, meaning most workloads are memory-bound.
  - ~20 Ops/Byte, meaning memory and compute are perfectly balanced.
  - ~0.2 Ops/Byte, meaning most workloads are compute-bound.
  - It's not measured in Ops/Byte, it's the raw ~336 MFLOPS.
  correct_index: 2
