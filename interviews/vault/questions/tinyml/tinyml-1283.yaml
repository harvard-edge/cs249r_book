title: ESP32-S3 Structured Pruning Impact
scenario: 'You are deploying an audio wake-word model to an ESP32-S3 microcontroller, utilizing its 240 MHz dual-core Xtensa processor and INT8 vector extensions. To fit within the 512 KB SRAM constraints and reduce inference latency, you consider applying pruning.'
question: 'Which specific type of pruning (structured or unstructured) must you use to ensure the INT8 vector instructions actually execute fewer cycles?'
details:
  realistic_solution: 'The candidate must recall that structured pruning (e.g., pruning entire filters or channels) is required to achieve latency reductions on the ESP32-S3. The Xtensa INT8 vector extensions rely on dense, contiguous memory accesses; structured pruning physically shrinks the tensor dimensions, allowing the vector units to compute fewer overall operations.'
  common_mistake: |
    **The Pitfall:** Applying unstructured pruning to speed up dense vector instructions.
    **The Rationale:** Candidates assume that setting individual weights to zero automatically speeds up inference, forgetting that standard vector instructions cannot efficiently skip random zeros in memory.
    **The Consequence:** The model size stays identical in SRAM, and execution latency remains completely unchanged, nullifying the optimization effort.
  napkin_math: |
    1. **Assumptions & Constraints:** ESP32-S3 at 240 MHz. 1M MACs layer. INT8 vector extensions require dense blocks.
    2. **Calculations:**
       - Unstructured 50% sparsity: Still executes 1,000,000 MACs = ~4.17 ms.
       - Structured 50% sparsity: Physically reduces to 500,000 MACs = ~2.08 ms.
    3. **Conclusion & Interpretation:** **Only structured pruning reduces the MAC count to 500,000, halving latency to 2.08 ms.** Result: Compute-Bound Optimization.
