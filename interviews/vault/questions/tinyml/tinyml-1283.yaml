title: ESP32-S3 Structured Pruning Impact
scenario: You are deploying an audio wake-word model to an ESP32-S3 microcontroller,
  utilizing its 240 MHz dual-core Xtensa processor and INT8 vector extensions. To
  fit within the 512 KB SRAM constraints and reduce inference latency, you consider
  applying pruning. Which specific type of pruning (structured or unstructured) must
  you use to ensure the INT8 vector instructions actually execute fewer cycles?
question: Which specific type of pruning (structured or unstructured) must you use
  to ensure the INT8 vector instructions actually execute fewer cycles?
details:
  realistic_solution: The candidate must recall that structured pruning (e.g., pruning
    entire filters or channels) is required to achieve latency reductions on the ESP32-S3.
    The Xtensa INT8 vector extensions rely on dense, contiguous memory accesses; structured
    pruning physically shrinks the tensor dimensions, allowing the vector units to
    compute fewer overall operations.
  common_mistake: Candidates often assume that unstructured pruning (setting individual
    random weights to zero) automatically speeds up inference. They forget that standard
    vector instructions cannot efficiently skip random zeros in memory without specialized
    sparse-matrix hardware.
  napkin_math: Consider a convolution layer requiring 1,000,000 MACs. Unstructured
    50% sparsity still requires executing all 1,000,000 MACs because the vector extensions
    cannot skip random zeros. Structured 50% sparsity reduces the actual workload
    to 500,000 MACs. At 240 MHz, assuming a baseline of 1 MAC per cycle, execution
    time drops from ~4.16 ms (1,000,000 / 240,000,000) to ~2.08 ms (500,000 / 240,000,000),
    while also freeing up contiguous blocks in the limited 512 KB SRAM.
