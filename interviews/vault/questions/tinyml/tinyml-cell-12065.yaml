title: 'Model Format Conversion: Recall TFLite Micro Supported Op List and Limitations'
scenario: 'A firmware engineer is porting a model to Cortex-M4 with TFLite Micro. They ask: ''Which common
  neural network operations are NOT supported in TFLite Micro, and what are the workarounds?'' Name at
  least 4 unsupported or partially supported ops with concrete workarounds.'
question: "They ask: 'Which common neural network operations are NOT supported in TFLite Micro, and what are the workarounds?"
details:
  realistic_solution: 'Unsupported in TFLM: (1) Dynamic shapes — workaround: pad inputs to fixed max size.
    (2) String tensors (text tokenization) — workaround: tokenize on host, send int tokens. (3) BatchNorm
    as separate op (must be folded into Conv) — workaround: ensure BN folding at export. (4) Large gather/scatter
    ops — workaround: precompute embeddings. (5) BiasAdd with int64 — workaround: use int32. TFLM op kernel
    list is ~50 ops vs TFLite''s 170+.'
  common_mistake: Attempting to deploy models with dynamic shapes, string tensors, or tf.function control
    flow on TFLM; these require interpreter features not available in the micro runtime.
  napkin_math: 'TFLM kernel size impact: each included op kernel adds ~1-4KB Flash. Minimal build (Conv2D
    + DepthwiseConv + FC + Softmax): ~8KB of Flash overhead. Full kitchen-sink TFLM: ~30KB. For 256KB
    Flash MCU: headroom for 226KB model weights + code. DS-CNN-S (100KB weights): fits with 126KB to spare.'
