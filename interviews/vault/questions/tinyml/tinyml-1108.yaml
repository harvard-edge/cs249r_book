title: Diagnosing WDT Resets During Peak BLE Transmissions
scenario: A dual-core nRF5340 vibration monitor experiences Watchdog Timer (WDT) resets specifically during periods of high wireless interference. The vibration model's input data rate and complexity remain constant, and there is no degradation ladder designed.
question: Why do nRF5340 WDT resets correlate with BLE retries, and what degradation ladder should prevent them?
details:
  realistic_solution: High BLE interference stalls the 64 MHz network core. The 128 MHz app core continues sending inferences until the IPC queue fills, blocking the execution thread completely. Implement QoS shedding to drop inferences based on queue depth.
  common_mistake: |
    **The Pitfall:** Misdiagnosing this as the BLE stack stealing CPU cycles from the inference task.
    **The Rationale:** Candidates forget that the Nordic nRF5340 utilizes physically separate cores, so CPU stealing isn't the issue.
    **The Consequence:** Proposing OS scheduling fixes rather than addressing the core issue: lack of backpressure handling and QoS shedding between the two cores.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - nRF5340: Dual-core. Inference runs at 10 Hz (250 bytes/cycle).
       - Shared IPC Queue: 2 KB SRAM limit.
    2. **Calculations:**
       - Queue capacity: 2000 bytes / 250 bytes = 8 inferences.
       - Starvation time: 8 inferences * 100 ms = 800 ms.
       - If BLE retries block the net core for >800 ms, the queue is full.
    3. **Conclusion & Interpretation:**
       **Result: Queue fills in 800 ms, blocking the app core.** The architecture lacks backpressure, leading to a **QoS-Bound** watchdog reset.
