title: DMA Overhead on Small Audio Chunks
scenario: You are optimizing a continuous keyword spotting pipeline. The audio sensor provides 16-bit PCM samples, and the system triggers a data transfer every 16 samples (32 bytes). A colleague enabled DMA to move these 32-byte chunks from the I2S peripheral to SRAM, expecting lower power consumption compared to an interrupt-driven CPU copy. Instead, the overall system power consumption increased.
question: Why does DMA raise power for 32-byte I2S transfers on a 128 MHz nRF5340 instead of saving it?
details:
  realistic_solution: For very small payloads, the fixed cycle cost of setting up the DMA peripheral exceeds the cost of a simple CPU memory copy. The CPU is awake longer to configure the DMA than it would be to just copy the data. The correct approach is to either increase the transfer chunk size to amortize the setup cost, or revert to a direct CPU copy for the 32-byte transfers.
  common_mistake: |
    **The Pitfall:** Assuming DMA is universally more efficient than CPU copying.
    **The Rationale:** Candidates forget that configuring DMA registers and handling completion interrupts has a fixed cycle cost.
    **The Consequence:** Wasting power by using DMA for tiny payloads where the setup overhead dwarfs the actual transfer time.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - CPU Clock: 128 MHz (7.8 ns/cycle).
       - Transfer Size: 32 bytes (16 samples).
    2. **Calculations:**
       - CPU Copy (32 bytes): 8 operations = 8 cycles = 62.5 ns.
       - DMA Setup Cost: ~50 cycles = 390 ns.
    3. **Conclusion & Interpretation:**
       - **Result: Setup-Bound DMA**. The DMA approach keeps the CPU active >6x longer per transfer for tiny payloads, increasing power consumption.
