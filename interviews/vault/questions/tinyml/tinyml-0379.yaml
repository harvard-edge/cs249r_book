title: The Microcontroller Ridge Point (tinyml-0379)
scenario: You're profiling a keyword spotting model on a microcontroller. To understand its performance limits, you need to calculate the chip's 'Ridge Point.' This value represents the minimum Arithmetic Intensity (Ops/Byte) a model needs to have to be limited by the processor's compute speed rather than its memory speed.
question: What is the ridge point from 336 MFLOPS compute and 1.2 GB/s SRAM bandwidth?
details:
  realistic_solution: "The Ridge Point is the critical value of Arithmetic Intensity where the performance ceiling transitions from being memory-bound to compute-bound. It is calculated by dividing the peak compute performance by the peak memory bandwidth."
  common_mistake: |
    **The Pitfall:** Inverting the division (Bandwidth / Compute) or making unit conversion errors.
    **The Rationale:** Misunderstanding Arithmetic Intensity as the ratio of memory access to computation, or failing to align MFLOPS and GB/s units.
    **The Consequence:** Yielding an answer orders of magnitude incorrect, leading to a fundamental misdiagnosis of the system's bottlenecks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak Compute: 336 MFLOPS.
       - Peak Memory Bandwidth: 1.2 GB/s.
    2. **Calculations:**
       - Peak Compute = 336 * 10^6 Ops/s.
       - Peak Memory Bandwidth = 1.2 * 10^9 Bytes/s.
       - Ridge Point = (336 * 10^6) / (1.2 * 10^9) = 0.28 Ops/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound (Any layer > 0.28 Ops/Byte is compute-bound).**
  options:
  - ~3.57 Ops/Byte
  - ~280 Ops/Byte
  - ~0.28 Ops/Byte
  - An MCU does not have a Ridge Point; that is a GPU-only concept.
  correct_index: 2
