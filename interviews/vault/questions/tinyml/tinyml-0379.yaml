title: The Microcontroller Ridge Point (tinyml-0379)
scenario: You're profiling a keyword spotting model on a Cortex-M4 microcontroller. To understand its performance limits, you need to calculate the chip's 'Ridge Point.' This value represents the minimum Arithmetic Intensity (Ops/Byte) a model needs to have to be limited by the processor's compute speed rather than its memory speed. Given the specs from the playbook (Cortex-M4: ~336 MFLOPS, ~1.2 GB/s SRAM bandwidth).
question: What is the Cortex-M4 ridge point from 336 MFLOPS compute and 1.2 GB/s SRAM bandwidth?
details:
  realistic_solution: The Ridge Point is the critical value of Arithmetic Intensity where the performance ceiling transitions from being memory-bound to compute-bound. It is calculated by dividing the peak compute performance by the peak memory bandwidth. For the Cortex-M4, this means dividing its peak MFLOPS by its SRAM bandwidth, ensuring units are consistent.
  common_mistake: |
    **The Pitfall:** Inverting the division (Bandwidth / Compute) or making unit conversion errors.
    **The Rationale:** Misunderstanding Arithmetic Intensity as the ratio of memory access to computation, or failing to align MFLOPS and GB/s units.
    **The Consequence:** Yielding an answer orders of magnitude incorrect, leading to a fundamental misdiagnosis of the system's bottlenecks.
  napkin_math: |
    1. **Identify Peak Compute:** 336 MFLOPS = 336 * 10^6 Ops/s.
    2. **Identify Peak Memory Bandwidth:** 1.2 GB/s = 1.2 * 10^9 Bytes/s.
    3. **Calculate Ridge Point:** Compute / Bandwidth = (336 * 10^6) / (1.2 * 10^9) = 336 / 1200 = **0.28 Ops/Byte**.
  options:
  - ~3.57 Ops/Byte
  - ~280 Ops/Byte
  - ~0.28 Ops/Byte
  - An MCU does not have a Ridge Point; that is a GPU-only concept.
  correct_index: 2
