title: 'TinyML TCO Fluency: Energy Harvesting vs Battery Cost Analysis'
scenario: Compare 3-year TCO for ESP32-S3 (240MHz, 512KB SRAM, 20µA deep sleep, $4) powered by: (A) solar harvesting (5cm² panel, 50mW peak, $3 panel + $2 PMU + $2 supercap), (B) LiPo 2000mAh ($6 battery, needs annual replacement at 100µA avg). The device runs TinyML inference at 100µA avg.
question: When does a $7 solar harvester beat annual LiPo replacements for an ESP32-S3 drawing 100µA average?
details:
  realistic_solution: 'Power requirement: 100µA * 3.3V = 330µW = 0.33mW. Solar panel: 50mW peak. Assuming indoor deployment, 200 lux: efficiency drops to 2-5% of outdoor: 50mW * 0.03 = 1.5mW. 1.5mW >> 0.33mW. Solar works! Option A: $4 ESP32 + $3 panel + $2 PMU + $2 supercap = $11. No battery replacement. Annual: $0 replacements. 3yr: $11. Option B: $4 + $6 LiPo = $10 + $6*2 replacements = $22. 3yr: $22. Solar saves $11 over 3yr. Break-even: immediately (solar cheaper from year 1 if outdoor deployment). Indoor caveat: if dark location (<50 lux): solar fails → need battery. Design rule: use solar for outdoor/window, battery for indoor/dark.'
  common_mistake: |
    **The Pitfall:** Assuming solar harvesting works universally or fails universally without doing the math.
    **The Rationale:** Candidates fail to calculate if a small indoor panel generates sufficient power (0.33 mW) or they ignore the massive recurring cost of manual battery replacement at scale.
    **The Consequence:** Deploying massive fleets of battery-powered sensors that incur devastating maintenance labor costs over their lifespan.
  napkin_math: |
    *   **Energy need:** 100 µA * 3.3V = 0.33 mW avg.
    *   **Solar harvesting:** 5cm² panel @ 100 lux (indoor): ~0.003 W/cm² * 5cm² * 5% efficiency = 0.75 mW. (0.75 mW > 0.33 mW. Enough power).
    *   **Solar TCO (3yr):** $4 (ESP32) + $3 (panel) + $2 (PMU) + $2 (supercap) = **$11** (No replacements).
    *   **LiPo TCO (3yr):** $4 (ESP32) + $6 (LiPo) + ($6 * 2 replacements) = **$22**.
    *   **Conclusion:** Solar is 50% cheaper ($11 vs $22) over 3 years, breaking even immediately after the first year.
