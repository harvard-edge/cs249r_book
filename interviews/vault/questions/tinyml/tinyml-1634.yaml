title: Smart-Ag Flash Wear
scenario: A Cortex-M4 ag-sensor node runs a 1-hour ML training job. The 8 KB working state checkpoints to internal flash via the on-chip flash controller; sector erase + program is ~80 ms total. The node draws 30 mW during compute and 50 mW during the flash erase+program window. Power-failure probability over the 1-hour job is 5% (uniformly distributed in time); on a power loss the node rolls back to its last checkpoint and re-runs the missing minutes of compute.
question: Evaluate whether a 5-minute or a 15-minute checkpoint interval minimises total expected energy across the 1-hour job, accounting for (a) the 80 ms flash erase+program at 50 mW per checkpoint and (b) the expected re-compute energy E[loss] = P_fail * mean_loss * compute_power. Identify by what factor the better interval wins and the regime in which the answer would flip.
visual:
  kind: svg
  path: tinyml-1634.svg
  alt: Line plot showing expected rollback penalty dropping as checkpoint frequency increases
  caption: Rollback Penalty vs Checkpoint Interval
details:
  realistic_solution: 'Per-checkpoint energy = 80 ms * 50 mW = 4.0 mJ. P(fail) per hour = 0.05; mean rollback when failure occurs = interval / 2 (uniform failure-time assumption). 5-min interval (12 checkpoints/hr): checkpoint overhead = 12 * 4 = 48 mJ; expected rollback time = 0.05 * 150 s = 7.5 s; rollback recompute energy = 7.5 s * 30 mW = 225 mJ; total expected energy = 48 + 225 = 273 mJ/hr. 15-min interval (4 checkpoints/hr): overhead = 4 * 4 = 16 mJ; expected rollback = 0.05 * 450 s = 22.5 s; recompute energy = 22.5 * 30 = 675 mJ; total = 16 + 675 = 691 mJ/hr. 5-min wins by 691 / 273 = 2.5x. The Young/Daly analytic optimum solves d/dt(E_total)=0 with E_total = (T_total/t)*E_ckpt + 0.5*lambda*T_total*t* P_compute, giving t_opt = sqrt(2*E_ckpt / (lambda*P_compute)). Failure rate lambda = 0.05/hr = 0.05 / 3600 s = 1.39e-5 /s. Plugging in: t_opt = sqrt(2 * 0.004 J / (1.39e-5 /s * 0.030 W)) = sqrt(0.008 / 4.17e-7) = sqrt(19200) ~= 139 s ~= 2.3 minutes between checkpoints. So the 5-min (300 s) cadence is ~2x coarser than the analytic optimum but still well within an order of magnitude; the 15-min cadence (~6.5x optimum) is far enough out that recompute energy dominates. The answer flips toward longer intervals if failure probability falls below ~0.5%/hr (analytic t_opt then exceeds 15 minutes) or if checkpoint energy rises above ~40 mJ (e.g., a fuller 80 KB state image).'
  common_mistake: |
    **The Pitfall:** Comparing rollback minutes directly and ignoring the probability of failure.
    **The Rationale:** Forgetting that the recompute cost must be multiplied by P_fail = 0.05, or ignoring the flash checkpoint energy entirely.
    **The Consequence:** Selecting a suboptimal checkpointing interval that wastes battery energy on too-frequent flash writes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Checkpoint overhead: 80 ms at 50 mW.
       - Compute power: 30 mW.
       - P(fail) per hour = 0.05.
    2. **Calculations:**
       - Checkpoint Energy = 80 ms * 50 mW = 4.0 mJ.
       - **5-min interval (12 ckpts/hr):**
         - Overhead = 12 * 4.0 mJ = 48 mJ.
         - Expected rollback time = 0.05 * (300 s / 2) = 7.5 s.
         - Recompute Energy = 7.5 s * 30 mW = 225 mJ.
         - Total Expected Energy = 48 mJ + 225 mJ = 273 mJ.
       - **15-min interval (4 ckpts/hr):**
         - Overhead = 4 * 4.0 mJ = 16 mJ.
         - Expected rollback time = 0.05 * (900 s / 2) = 22.5 s.
         - Recompute Energy = 22.5 s * 30 mW = 675 mJ.
         - Total Expected Energy = 16 mJ + 675 mJ = 691 mJ.
    3. **Conclusion & Interpretation:**
       - **Result: Energy-Bound Optimization.** The 5-min interval is ~2.5x more efficient (273 mJ vs 691 mJ) because the cost of recomputation heavily outweighs flash write energy.
