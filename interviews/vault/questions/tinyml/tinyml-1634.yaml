title: Smart-Ag Flash Wear
scenario: A Cortex-M4 node does a 1-hour ML task. It can checkpoint 100KB to Flash
  in 5ms. Power failure chance is 5% per hour.
question: Evaluate whether checkpointing every 5 minutes versus every 15 minutes minimizes
  total expected energy.
visual:
  kind: svg
  path: tinyml-1634.svg
  alt: Line plot showing expected rollback penalty dropping as checkpoint frequency
    increases
  caption: Rollback Penalty vs Checkpoint Interval
details:
  realistic_solution: 'Failure probability per hour = 5%. 5-min interval: 12 checkpoints/hr
    (60 ms write overhead, negligible) and expected rollback E[loss] = 0.05 * 2.5
    min = 7.5 s of recompute. 15-min: 4 checkpoints/hr (20 ms) and E[loss] = 0.05
    * 7.5 min = 22.5 s of recompute. Net 5-min savings: 22.5 - 7.5 = 15 s of compute
    energy avoided per hour for 40 ms extra checkpoint cost - 5-min wins by ~375x
    in energy. Without explicitly weighting by the 5% failure probability, both
    intervals look similar; weighted analysis shows 5-min saves 0.05*5min = 15s/hr.'
  common_mistake: Comparing rollback durations (2.5 vs 7.5 min) without multiplying
    by the 5% failure probability, which is the actual expected energy cost.
  napkin_math: '5-min: E[loss] = 0.05*2.5 = 7.5 s/hr; 15-min: E[loss] = 0.05*7.5
    = 22.5 s/hr; 5-min saves 15 s of compute per hour.'
