title: Smart-Ag Flash Wear
scenario: A Cortex-M4 node does a 1-hour ML task. It can checkpoint 100KB to Flash
  in 5ms. Power failure chance is 5% per hour.
question: Evaluate whether checkpointing every 5 minutes versus every 15 minutes minimizes
  total expected energy.
visual:
  kind: svg
  path: tinyml-1634.svg
  alt: Line plot showing expected rollback penalty dropping as checkpoint frequency
    increases
  caption: Rollback Penalty vs Checkpoint Interval
details:
  realistic_solution: Flash write cost is trivial (5ms). Failure recovery dominates.
    5-min intervals mean average rollback is 2.5 mins. 15-min means 7.5 mins. Since
    active compute is costly and failures happen, 5-min intervals are cheaper overall.
  common_mistake: Overestimating the energy cost of flash writes compared to active
    compute rollback time.
  napkin_math: 2.5m rollback < 7.5m rollback.
