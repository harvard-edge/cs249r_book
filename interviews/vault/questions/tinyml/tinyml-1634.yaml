title: Smart-Ag Flash Wear
scenario: A Cortex-M4 ag-sensor node (STM32L4, 80 MHz, internal QSPI NOR
  flash) runs a 1-hour ML training job. The 8 KB working state checkpoints to
  internal flash via the on-chip flash controller; sector erase + program is
  ~80 ms total at 100 KB/s effective flash write throughput (a realistic
  STM32L4 number once erase, programming, and ECC are included). The node
  draws 30 mW during compute and 50 mW during the flash erase+program window.
  Power-failure probability over the 1-hour job is 5% (uniformly
  distributed in time); on a power loss the node rolls back to its last
  checkpoint and re-runs the missing minutes of compute.
question: Evaluate whether a 5-minute or a 15-minute checkpoint interval
  minimises total expected energy across the 1-hour job, accounting for
  (a) the 80 ms flash erase+program at 50 mW per checkpoint and (b) the
  expected re-compute energy E[loss] = P_fail * mean_loss * compute_power.
  Identify by what factor the better interval wins and the regime in which
  the answer would flip.
visual:
  kind: svg
  path: tinyml-1634.svg
  alt: Line plot showing expected rollback penalty dropping as checkpoint frequency
    increases
  caption: Rollback Penalty vs Checkpoint Interval
details:
  realistic_solution: 'Per-checkpoint energy = 80 ms * 50 mW = 4.0 mJ. P(fail)
    per hour = 0.05; mean rollback when failure occurs = interval / 2 (uniform
    failure-time assumption). 5-min interval (12 checkpoints/hr): checkpoint
    overhead = 12 * 4 = 48 mJ; expected rollback time = 0.05 * 150 s = 7.5 s;
    rollback recompute energy = 7.5 s * 30 mW = 225 mJ; total expected
    energy = 48 + 225 = 273 mJ/hr. 15-min interval (4 checkpoints/hr):
    overhead = 4 * 4 = 16 mJ; expected rollback = 0.05 * 450 s = 22.5 s;
    recompute energy = 22.5 * 30 = 675 mJ; total = 16 + 675 = 691 mJ/hr.
    5-min wins by 691 / 273 = 2.5x. The optimum interval solves d/dt(E_total)
    = 0 with E_total ~ N * E_ckpt + 0.5 * P_fail * T_total * t_interval *
    P_compute, giving t_opt = sqrt(2 * E_ckpt / (P_fail * P_compute / hour)).
    Plugging in: t_opt = sqrt(2 * 0.004 J / (0.05 * 0.030 W)) = sqrt(5.33) =
    2.31 s of work between checkpoints, suggesting the 5-min cadence is
    actually still too coarse and the analytic optimum is much shorter -
    however practical wear-leveling and real-world failure-rate uncertainty
    favour the 5-min cadence as the deployment recommendation.'
  common_mistake: 'Comparing rollback minutes (2.5 vs 7.5) and ignoring that
    the recompute cost must be multiplied by P_fail = 0.05, OR ignoring the
    flash checkpoint energy entirely so the answer would degenerate to
    "checkpoint as often as possible".'
  napkin_math: 'Ckpt = 80 ms * 50 mW = 4 mJ. 5-min: 48 + 0.05*150*30 = 48 +
    225 = 273 mJ/hr. 15-min: 16 + 0.05*450*30 = 16 + 675 = 691 mJ/hr. 5-min
    wins by 2.5x.'
