title: Evaluating Flash vs SRAM Execution for Cortex-M4 Inference
scenario: You are deploying an acoustic anomaly detection model on an ARM Cortex-M4
  (STM32F4) equipped with 256 KB of SRAM and 1 MB of Flash, running at 168 MHz with
  no FPU. Your quantized INT8 model requires 180 KB of SRAM for peak activations and
  700 KB for weights. Since the weights and activations combined exceed the SRAM capacity,
  you must evaluate the memory hierarchy tradeoffs of reading weights directly from
  Flash via Execute-in-Place (XIP) versus implementing a DMA-based paging system to
  stream weights into SRAM.
question: Should a Cortex-M4 acoustic anomaly model read 700 KB of weights directly
  from Flash or page them into SRAM with DMA?
details:
  realistic_solution: The optimal approach is to store the 700 KB of weights in Flash
    and the 180 KB of activations in SRAM, relying on direct sequential Flash reads.
    Because neural network weight access is highly sequential, the microcontroller's
    128-bit wide Flash interface and prefetch buffer can effectively mask the wait
    states. This keeps the CMSIS-NN SIMD instructions fed without the power, complexity,
    and bus contention overhead of managing DMA paging into the scarce remaining 76
    KB of SRAM.
  common_mistake: Candidates often assume Flash memory is inherently too slow for
    real-time inference due to high wait-states at 168 MHz and immediately design
    complex, overhead-heavy software paging schemes to move weights into SRAM. They
    fail to account for wide Flash interfaces and the highly sequential access patterns
    of CMSIS-NN dense and convolutional layers.
  napkin_math: 'Compute peak: 168 MHz * 2 INT8 MACs/cycle (CMSIS-NN SIMD) = 336 MMACs/sec.
    To sustain this, bandwidth required per cycle: 2 bytes (weights) + 2 bytes (activations)
    = 4 bytes/cycle. Activations in SRAM easily provide 2 bytes/cycle. For Flash at
    168 MHz, a typical read has 5 wait states (6 CPU cycles). However, the STM32F4
    Flash interface is 128 bits (16 bytes) wide. Fetching 16 bytes over 6 cycles yields
    an average of 2.66 bytes/cycle. Since 2.66 bytes/cycle is greater than the 2 bytes/cycle
    required for weights, direct Flash execution provides sufficient bandwidth to
    sustain peak SIMD throughput.'
