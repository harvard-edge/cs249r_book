title: Evaluating Flash vs SRAM Execution for Cortex-M4 Inference
scenario: You are deploying an acoustic anomaly detection model on an ARM Cortex-M4 (STM32F4) equipped with 256 KB of SRAM and 1 MB of Flash, running at 168 MHz with no FPU. Your quantized INT8 model requires 180 KB of SRAM for peak activations and 700 KB for weights. Since the weights and activations combined exceed the SRAM capacity, you must evaluate memory hierarchy tradeoffs.
question: Should a Cortex-M4 acoustic anomaly model read 700 KB of weights directly from Flash or page them into SRAM with DMA?
details:
  realistic_solution: The optimal approach is to store the 700 KB of weights in Flash and the 180 KB of activations in SRAM, relying on direct sequential Flash reads. Because neural network weight access is highly sequential, the microcontroller's 128-bit wide Flash interface and prefetch buffer can effectively mask the wait states. This keeps the CMSIS-NN SIMD instructions fed without the power, complexity, and bus contention overhead of managing DMA paging into the scarce remaining 76 KB of SRAM.
  common_mistake: |
    **The Pitfall:** Assuming Flash memory is inherently too slow for real-time ML inference.
    **The Rationale:** Candidates look at the 6-cycle wait-state of Flash memory and incorrectly assume it will starve the 1-cycle MAC ALU.
    **The Consequence:** Engineers design complex, overhead-heavy software DMA paging schemes that consume scarce SRAM and cause bus contention, when native Execute-in-Place (XIP) was already sufficient.
  napkin_math: |
    - **Bandwidth Requirement**: 168 MHz × 2 INT8 MACs/cycle = 336 MMACs/sec. Requires 2 bytes/cycle (weight + activation).
    - **Flash Read Cost**: 128-bit (16 bytes) width fetched over 6 CPU cycles (5 wait states).
    - **Flash Bandwidth**: 16 bytes / 6 cycles = 2.66 bytes/cycle.
    - **Conclusion**: 2.66 bytes/cycle > 2.0 bytes/cycle. Direct sequential Flash execution provides **sufficient bandwidth** to sustain peak SIMD throughput.
