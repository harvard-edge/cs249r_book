title: Evaluating CNN Data Layouts for Cortex-M4 Real-Time Deadlines
scenario: 'You are deploying a predictive maintenance model on an ARM Cortex-M4 (STM32F4) with a 168 MHz
  clock, 256 KB SRAM, 1 MB flash, and no FPU. The system receives high-frequency vibration data and has
  a strict 5ms real-time deadline for inference to avoid dropping incoming sensor frames. You must evaluate
  two alternatives: Model A requires 400,000 INT8 MAC operations but uses an unoptimized data layout,
  while Model B requires 600,000 INT8 MAC operations but uses an HWC layout heavily optimized for CMSIS-NN
  SIMD. Both models fit comfortably within memory constraints. Which model do you choose to guarantee
  the real-time deadline, and how does the architectural tradeoff affect worst-case execution time (WCET)?'
question: "Which model do you choose to guarantee the real-time deadline, and how does the architectural tradeoff affect worst-case execution time (WCET)?"
details:
  realistic_solution: The correct choice is Model B. Although it requires 50% more MAC operations, its
    HWC data layout allows the CMSIS-NN library to utilize DSP extensions (like the SMLAD instruction)
    to perform 2 INT8 MACs per cycle. Model A's unoptimized layout prevents SIMD vectorization, resulting
    in multiple CPU cycles per MAC due to memory access and loop overhead. In TinyML, memory access patterns
    and hardware intrinsic utilization often dominate latency over raw MAC counts.
  common_mistake: Candidates often assume the model with fewer theoretical MAC operations (Model A) will
    automatically execute faster. They fail to account for the lack of an FPU and ignore how critical
    the CMSIS-NN SIMD instructions are for parallelizing INT8 math to hit strict real-time deadlines on
    Cortex-M4 architectures.
  napkin_math: '1. Cycle budget: 5ms deadline at 168 MHz = 0.005 s * 168,000,000 cycles/s = 840,000 available
    cycles. 2. Model A WCET: 400,000 MACs without SIMD. Assuming ~3 cycles/MAC for standard load/compute
    loops = 1,200,000 cycles (7.14ms), missing the deadline. 3. Model B WCET: 600,000 MACs with CMSIS-NN
    SIMD (2x INT8 MACs/cycle). Assuming an average of 1.5 MACs/cycle throughput including loop overhead
    = 400,000 cycles (2.38ms), comfortably meeting the 5ms deadline.'
