title: Diagnosing BLE Drops from Dense Distilled Models
scenario: You distilled a large audio classification model into a smaller student
  model to fit within the Nordic nRF5340's 1 MB flash and 256 KB SRAM. The student
  model achieves the target accuracy, but during field deployment, the device frequently
  drops its BLE 5.3 connection and triggers watchdog resets precisely during inference.
  The active current draw remains around the expected ~5mA. What is causing this instability?
question: Why does a dense distilled model on nRF5340 drop BLE 5.3 connections and
  trigger watchdog resets during inference?
details:
  realistic_solution: Knowledge distillation produces a smaller but entirely dense
    model, meaning every parameter requires computation. On the nRF5340, while the
    128 MHz app core executes this dense inference, it can monopolize the shared AHB
    matrix or lock interrupts for extended periods. This starves the 64 MHz network
    core, preventing it from servicing strict BLE 5.3 timing deadlines, resulting
    in a supervision timeout and connection drop.
  common_mistake: Candidates often assume the issue is a generic memory leak, an out-of-memory
    (OOM) error, or a power brownout. They fail to recognize the difference between
    how a dense distilled model and a sparse pruned model interact with the real-time
    constraints of a dual-core microcontroller.
  napkin_math: Assume the dense distilled model requires 10 million MACs per inference.
    At 128 MHz (~1 cycle/MAC idealized, but realistically ~2-3 cycles with overhead),
    this takes ~20 million cycles, or ~156 ms of continuous execution. If the BLE
    5.3 connection interval is set to 30 ms, a 156 ms blocking inference causes the
    network core to miss at least 5 consecutive connection events. If the supervision
    timeout is set to 100 ms, the connection will reliably drop before the inference
    completes.
