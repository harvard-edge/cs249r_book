title: Diagnosing BLE Drops from Dense Distilled Models
scenario: You distilled a large audio model into a smaller dense student model on the Nordic nRF5340. The student model meets accuracy targets, but during deployment, the device frequently drops its BLE 5.3 connection and triggers watchdog resets precisely during inference.
question: Why does a dense distilled model on nRF5340 drop BLE 5.3 connections and trigger watchdog resets during inference?
details:
  realistic_solution: The dense student model monopolizes the shared AHB matrix, blocking the network core from servicing strict BLE timing deadlines, resulting in supervision timeouts. The inference must be unblocked or sliced.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the issue as a generic memory leak, OOM error, or power brownout.
    **The Rationale:** Failing to recognize how a dense distilled model (where every parameter requires computation) locks up the shared AHB matrix on a dual-core MCU, starving the network core.
    **The Consequence:** Wasting time debugging memory allocators while the actual solution requires slicing the inference into non-blocking yields.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - nRF5340: 128 MHz app core, 64 MHz net core. BLE 5.3 connection.
       - Dense distilled model: Every parameter requires MAC.
    2. **Calculations:**
       - Inference Cost: ~10M MACs.
       - Compute time: 10M MACs * 2 cycles/MAC / 128 MHz = 156 ms.
       - BLE Timeout: e.g., 100 ms connection interval limit.
    3. **Conclusion & Interpretation:**
       **Result: 156 ms blocking inference starves the network core.** The system is **AHB-Matrix-Bound**, causing supervision timeouts due to continuous dense compute.
