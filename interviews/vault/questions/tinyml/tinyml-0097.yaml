title: Side-Channel Attacks on MCU Inference
scenario: Your competitor deploys a proprietary anomaly detection model on a Cortex-M4 with RDP Level 2 enabled. An attacker buys one of their devices for $50. They can't read flash directly, but they connect a $200 current probe to the power rail and record the power trace during 10,000 inference cycles.
question: Can a $750 power-trace setup extract a Cortex-M4 model protected by RDP Level 2?
details:
  realistic_solution: 'Yes, they can extract significant model information through power side-channel analysis. The Cortex-M4 leaks power proportional to the Hamming weight of the data being processed. By correlating the power trace of 10,000 known or guessed inputs against the model execution, an attacker can use Differential Power Analysis (DPA) to infer the weights layer by layer, bypassing RDP.'
  common_mistake: |
    **The Pitfall:** Over-relying on RDP protection.
    **The Rationale:** Engineers assume that because flash is mathematically locked via RDP Level 2, the physical execution of the software is equally hidden.
    **The Consequence:** They leave the device completely vulnerable to hardware side-channel attacks like DPA.
  napkin_math: |
    - Attack cost: $50 (device) + $200 (probe) + $500 (oscilloscope) = $750.
    - Recording time: 10,000 inferences * 50ms = **500 seconds (~8.3 minutes)**.
    - With standard defenses (shuffling/constant-time), attacker needs 1M+ traces (14+ hours), effectively mitigating casual extraction.
