title: Side-Channel Attacks on MCU Inference
scenario: A proprietary model is deployed on a Cortex-M4 with RDP Level 2 read protection enabled. An attacker connects a $200 current probe to the power rail and records the power trace during 10,000 inference cycles.
question: Can an attacker extract a Cortex-M4 model utilizing Differential Power Analysis (DPA) despite RDP Level 2 flash protection?
details:
  realistic_solution: Yes, the model can be compromised via power side-channel analysis. The Cortex-M4's power consumption dynamically fluctuates proportionally to the Hamming weight of the data processed within the ALU. By statistically correlating the power traces of known or guessed inputs across 10,000 inference runs, an attacker can utilize DPA to reconstruct the exact weight parameters layer by layer, entirely bypassing the RDP digital lock.
  common_mistake: |
    **The Pitfall:** Treating digital read protection as physical execution security.
    **The Rationale:** Engineers assume that because the firmware is mathematically locked in ROM via RDP Level 2, the physical execution of the algorithms is equally obfuscated.
    **The Consequence:** They deploy high-value intellectual property without constant-time execution or masking defenses, leaving the hardware entirely vulnerable to trivial physical side-channel extraction.
  napkin_math: |
    1. **Assumptions & Constraints**:
       - Attacker records 10,000 inference traces.
       - Cortex-M4 inference time = 50ms.
    2. **Calculations**:
       - Total Recording Time: 10,000 * 0.050 seconds = 500 seconds (8.3 minutes).
       - Hardware Setup Cost: $50 (Device) + $200 (Probe) + $500 (Oscilloscope) = $750.
    3. **Conclusion & Interpretation**:
       - **Result: Security-Bound Vulnerability**. For less than $1,000 and 10 minutes of recording, an attacker can completely extract an RDP-locked neural network via DPA side-channel correlation.
