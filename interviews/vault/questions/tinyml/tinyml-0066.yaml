title: Multi-MCU Distributed Inference System
scenario: You need to run a model that requires 80 KB of activation memory on a system with three Cortex-M0+
  MCUs, each with only 32 KB SRAM. No single MCU can hold the full activation tensor. Design a distributed
  inference system that splits the model across the three MCUs, connected via SPI at 8 MHz. Specify the
  partitioning strategy, communication protocol, and the latency overhead of distribution.
question: "How would you specify the partitioning strategy, communication protocol, and the latency overhead of distribution?"
details:
  realistic_solution: 'Use layer-wise profiling to find optimal split points minimizing per-MCU memory
    and inter-MCU communication. Partition the 12-layer model into 3 segments: layers 1-4 (MCU1, 28 KB
    peak activation), layers 5-8 (MCU2, 30 KB peak), layers 9-12 (MCU3, 22 KB peak) — all under the 32
    KB SRAM limit. Communication: after each segment completes, output activation transfers via SPI at
    8 MHz = 1 MB/s effective. Segment 1 to 2 transfer: 16 KB / 1 MB/s = 16 ms. Segment 2 to 3: 12 KB /
    1 MB/s = 12 ms. Compute per segment: ~8.3 ms. Total latency: 3 * 8.3 ms + 16 ms + 12 ms = 52.9 ms.
    Vs single-MCU (if it had 80 KB): 15 ms. Overhead: 3.5x. With SPI DMA overlap (compute segment N+1
    while transferring): pipelined total is ~40 ms (2.7x slower). Communication is 66% of total time.'
  common_mistake: '"Split the model into 3 equal parts and pipeline them." Equal splitting ignores that
    the activation memory peak varies by layer — the early layers (high resolution, few channels) have
    different memory profiles than late layers (low resolution, many channels). You need to split at points
    where the activation memory fits within 32 KB.'
  napkin_math: 'Single MCU (if it had 80 KB SRAM): ~15ms inference. Distributed (3 MCUs): 73ms. Overhead:
    4.9× (communication dominates). SPI transfer: 48ms / 73ms = 66% of total time spent on communication.
    Optimization: use SPI DMA to overlap transfer with computation on the next MCU. MCU 2 starts computing
    as soon as the first channel slice arrives (16 KB / 1 MB/s = 16ms). While MCU 2 computes slice 1 (5ms),
    MCU 1 sends slice 2 (16ms). Pipelined: total reduces to ~55ms. Still 3.7× slower than a single MCU,
    but enables models that physically cannot fit on one device. Alternative: use a single Cortex-M4 with
    128 KB SRAM ($2 more) and avoid the distributed complexity entirely. The engineering cost of distributed
    TinyML rarely justifies the BOM savings.'
