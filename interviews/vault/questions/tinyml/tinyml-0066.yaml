title: Multi-MCU Distributed Inference System
scenario: You need to run a model that requires 80 KB of activation memory on a system with three Cortex-M0+ MCUs, each with only 32 KB SRAM. No single MCU can hold the full activation tensor.
question: How would you specify the partitioning strategy, communication protocol, and the latency overhead of distribution across three 32 KB MCUs?
details:
  realistic_solution: 'Use layer-wise profiling to find optimal split points minimizing per-MCU memory and inter-MCU communication. Partition the 12-layer model into 3 segments: layers 1-4 (MCU1, 28 KB peak activation), layers 5-8 (MCU2, 30 KB peak), layers 9-12 (MCU3, 22 KB peak) — all under the 32 KB SRAM limit. Communication: after each segment completes, output activation transfers via SPI at 8 MHz = 1 MB/s effective. Segment 1 to 2 transfer: 16 KB / 1 MB/s = 16 ms. Segment 2 to 3: 12 KB / 1 MB/s = 12 ms. Compute per segment: ~8.3 ms. Total latency: 3 * 8.3 ms + 16 ms + 12 ms = 52.9 ms. Vs single-MCU (if it had 80 KB): 15 ms. Overhead: 3.5x. With SPI DMA overlap (compute segment N+1 while transferring): pipelined total is ~40 ms (2.7x slower). Communication is ~53% of total unpipelined time.'
  common_mistake: |
    **The Pitfall:** Splitting the model into 3 equal parts without regard for varying layer sizes.
    **The Rationale:** Equal splitting ignores that activation memory peaks vary drastically—early layers have high resolution, late layers have high channels.
    **The Consequence:** The partitioned model still causes out-of-memory errors on the MCU handling the largest activation bottleneck.
  napkin_math: |
    1. **Single MCU Ideal Time:** ~15 ms (if it had 80 KB SRAM).
    2. **Transfer Time (SPI @ 8 MHz = 1 MB/s):** Seg 1->2 (16 KB) = 16 ms. Seg 2->3 (12 KB) = 12 ms. Total Transfer = 28 ms.
    3. **Compute Time:** ~8.3 ms per segment * 3 = 24.9 ms.
    4. **Total Unpipelined Latency:** 24.9 ms + 28 ms = **52.9 ms**. (Overhead: 3.5x).
    5. **Pipelined Optimization:** Overlap transfer via DMA. Total reduces to **~40 ms** (2.7x slower). Communication is ~53% of total time.
