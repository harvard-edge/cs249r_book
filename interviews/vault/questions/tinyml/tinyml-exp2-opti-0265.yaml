title: ESP32-S3 SRAM vs PSRAM Activation Bottleneck
scenario: You are deploying an INT8 keyword spotting model on an ESP32-S3 microcontroller, which features
  a 240 MHz dual-core CPU, 512 KB internal SRAM, and 8 MB external PSRAM. The model weights are 1.5 MB
  and the peak activation buffer requires 350 KB. When you allocate both weights and activations in the
  8 MB PSRAM to save space, inference latency misses the 100ms real-time deadline, taking 450ms. Diagnose
  the bottleneck and quantify how reallocating memory resolves it.
details:
  realistic_solution: The bottleneck is cache thrashing and low bandwidth from placing the highly-mutated
    activation buffer in PSRAM. The solution is to pin the 350 KB activation buffer to the fast 512 KB
    internal SRAM (leaving 162 KB for system tasks/stack), while keeping the read-only 1.5 MB weights
    in PSRAM. By utilizing the vector extensions for INT8 with activations in zero-wait-state memory,
    the CPU can avoid stalls.
  common_mistake: Candidates often assume external PSRAM can be treated exactly like internal SRAM since
    it is memory-mapped. They fail to identify that the SPI bus connecting the PSRAM introduces significant
    latency and bandwidth constraints, leading to severe CPU stalls when frequently accessed activation
    buffers are placed there.
  napkin_math: 'PSRAM over SPI yields roughly 40 MB/s effective bandwidth, whereas the 240 MHz internal
    SRAM yields ~960 MB/s (240 MHz * 4 bytes). Processing 10 million INT8 MACs requires ~15 MB of memory
    traffic for activations (reads/writes). In PSRAM: 15 MB / 40 MB/s = 375 ms of memory time. In SRAM:
    15 MB / 960 MB/s = ~15 ms. Moving the 350 KB activations to SRAM saves ~360 ms, bringing total latency
    to ~90 ms and meeting the 100 ms deadline.'
