title: Roofline Analysis for TinyML on ARM Cortex-M4 STM32F4
scenario: A TinyML engineer is deploying a 1D Convolutional Neural Network (CNN) for keyword spotting
  onto an ARM Cortex-M4 STM32F4 microcontroller. This device operates at 168 MHz, has 256 KB of SRAM,
  and crucially, lacks a hardware Floating Point Unit (FPU). Initial performance measurements show the
  model running significantly slower than anticipated. The engineer suspects either a compute-bound or
  memory-bound bottleneck. Describe how they would leverage a Roofline model tailored for the STM32F4
  to diagnose the specific bottleneck and outline a high-level optimization strategy based on the identified
  limitation.
details:
  realistic_solution: The engineer should first establish the Roofline model for the STM32F4. This involves
    characterizing the peak computational performance (e.g., 168 MMAC/s for integer operations, as the
    absence of an FPU means floating-point operations would be emulated in software and extremely slow)
    and the peak memory bandwidth (e.g., estimating ~150 MB/s for sustained SRAM access). Next, they would
    profile the CNN model to determine the operational intensity (MACs/byte) of its critical kernels.
    By plotting these kernels on the STM32F4's Roofline graph, they can visually identify if they fall
    into the compute-bound or memory-bound region. If memory-bound, optimization efforts should focus
    on data reuse, reducing data movement (e.g., aggressive quantization, loop tiling, optimizing data
    access patterns). If compute-bound, then techniques like loop unrolling, efficient use of CMSIS-DSP
    integer intrinsics, or model architecture simplification (reducing MACs) would be appropriate.
  common_mistake: A common mistake is to immediately jump to optimizing computationally intensive kernel
    functions (e.g., rewriting convolution loops in assembly or using CMSIS-DSP intrinsics for integer
    operations) without first performing a Roofline analysis. This can lead to misdirected optimization
    efforts if the actual bottleneck is memory bandwidth rather than compute throughput, resulting in
    minimal performance gains or even performance regressions due to inefficient memory access patterns.
  napkin_math: "For the ARM Cortex-M4 STM32F4 (168 MHz, no FPU):\n1.  **Peak Compute (P_C):** Assuming\
    \ 1 integer MAC per cycle = 168 MMAC/s.\n2.  **Peak Memory Bandwidth (P_B):** Estimating sustained\
    \ SRAM bandwidth at ~150 MB/s.\n3.  **Ridge Point (I_ridge):** The operational intensity at which\
    \ the system transitions from memory-bound to compute-bound is calculated as P_C / P_B = 168 MMAC/s\
    \ / 150 MB/s ≈ 1.12 MACs/byte.\n    *   **Example Case A (Memory-Bound):** If a CNN layer has an operational\
    \ intensity (I_op) of 0.8 MACs/byte (e.g., a shallow layer with high data transfer relative to computation).\
    \ Its performance would be limited by memory: Perf = I_op * P_B = 0.8 MACs/byte * 150 MB/s = 120 MMAC/s.\n\
    \    *   **Example Case B (Compute-Bound):** If a CNN layer has an operational intensity (I_op) of\
    \ 2.0 MACs/byte (e.g., a deeper, more computationally intensive convolution or a fully connected layer).\
    \ Its performance would be limited by compute: Perf = P_C = 168 MMAC/s."
