title: Missing Calibration in Post-Training Quantization
scenario: An image classifier is quantized to INT8 for a Cortex-M4 using PTQ. Upon
  deployment, the accuracy drops to random guessing levels.
question: Identify the critical quantization step that was likely omitted or executed
  with unrepresentative data.
details:
  realistic_solution: The activation calibration step was likely skipped. Without
    running a representative calibration dataset through the FP32 model to observe
    the dynamic min/max ranges of activations, the quantized model calculates incorrect
    scale and zero-point values. This aggressively clips internal signals, destroying
    the network's predictive capabilities.
  common_mistake: Blaming weight distribution rather than the dynamic ranges of intermediate
    activations.
  napkin_math: 256 = 2^8
