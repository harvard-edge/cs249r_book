title: 'The Microcontroller''s Memory Bottleneck: MCU Compute Constraints'
scenario: You're optimizing a kernel on a Cortex-M4 microcontroller, which has a peak performance of 336
  MFLOPS and 1.2 GB/s of SRAM bandwidth. Your kernel performs a simple FP32 vector addition (`C[i] = A[i]
  + B[i]`). Explain whether this operation is compute-bound or memory-bound, and why.
details:
  realistic_solution: The operation is **memory-bound**. To determine this, we compare the kernel's Arithmetic
    Intensity (AI) to the MCU's Ridge Point.
  common_mistake: Engineers new to embedded systems often focus on the low MFLOPs count and incorrectly
    assume most operations will be compute-bound. They fail to calculate the device's Ridge Point and
    the kernel's Arithmetic Intensity, which shows that even on 'slow' processors, data movement from
    SRAM is frequently the true bottleneck for low-intensity operations.
  napkin_math: 'FP32 vector addition: `C[i] = A[i] + B[i]`. For each element, it reads 4 bytes of A, 4
    bytes of B, and writes 4 bytes of C. Total memory = 12 bytes. Compute = 1 FLOP (addition). Arithmetic
    Intensity = 1 FLOP / 12 Bytes = 0.083 FLOPs/Byte. The Cortex-M4''s Ridge Point is ~0.4 FLOPs/Byte
    (480 MFLOPS / 1.2 GB/s). Since 0.083 < 0.4, vector addition is heavily memory-bound.'
  options:
  - Compute-bound, because 336 MFLOPS is a low compute peak, making the additions the bottleneck.
  - Memory-bound, because its Arithmetic Intensity (~0.083 Ops/Byte) is lower than the MCU's Ridge Point
    (~0.28 Ops/Byte).
  - Compute-bound, because its Arithmetic Intensity is ~0.33 Ops/Byte, which is higher than the Ridge
    Point.
  - It's perfectly balanced, as the compute and memory requirements are both low.
  correct_index: 1
