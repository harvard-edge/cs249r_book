title: 'The Microcontroller''s Memory Bottleneck: MCU Compute Constraints'
scenario: You're optimizing a kernel on a Cortex-M4 microcontroller, which has a peak performance of 336 MFLOPS and 1.2 GB/s of SRAM bandwidth. Your kernel performs a simple FP32 vector addition (`C[i] = A[i] + B[i]`).
question: Is FP32 vector addition on a 336 MFLOPS Cortex-M4 with 1.2 GB/s SRAM bandwidth compute-bound or memory-bound?
details:
  realistic_solution: 'The operation is **memory-bound**. To determine this, we compare the kernel''s Arithmetic Intensity (AI) to the MCU''s Ridge Point.'
  common_mistake: |
    **The Pitfall:** Assuming operations are compute-bound due to the low 336 MFLOPS limit.
    **The Rationale:** Engineers new to embedded systems fixate on the low compute threshold and fail to calculate the Ridge Point.
    **The Consequence:** Optimization efforts focus on loop unrolling or instruction pipelining rather than data locality, yielding no improvements.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak Compute: 336 MFLOPS.
       - Memory Bandwidth: 1.2 GB/s.
       - Kernel: FP32 vector addition (C = A + B).
    2. **Calculations:**
       - Bytes accessed per operation: 4 bytes (A) + 4 bytes (B) + 4 bytes (C) = 12 bytes.
       - Compute performed: 1 FLOP (addition).
       - Arithmetic Intensity (AI): 1 FLOP / 12 Bytes = 0.083 FLOPs/Byte.
       - MCU Ridge Point: 336 MFLOPS / 1.2 GB/s = 0.28 FLOPs/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** Since the AI (0.083) is strictly less than the Ridge Point (0.28), the operation is heavily memory-bound.
  options:
  - Compute-bound, because 336 MFLOPS is a low compute peak, making the additions the bottleneck.
  - Memory-bound, because its Arithmetic Intensity (~0.083 Ops/Byte) is lower than the MCU's Ridge Point (~0.28 Ops/Byte).
  - Compute-bound, because its Arithmetic Intensity is ~0.33 Ops/Byte, which is higher than the Ridge Point.
  - It's perfectly balanced, as the compute and memory requirements are both low.
  correct_index: 1
