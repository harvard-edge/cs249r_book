title: 'The Depthwise Separable Dividend: CNN Efficient Design'
scenario: Imagine you're optimizing a small CNN for a Cortex-M4 microcontroller. You
  identify a standard 3x3 convolutional layer as a computational bottleneck. To improve
  performance, you decide to replace it with a 3x3 depthwise separable convolution.
  Approximately what is the computational cost reduction (in FLOPs) you should recall
  for this swap, assuming a typical number of channels?
question: Approximately what is the computational cost reduction (in FLOPs) you should
  recall for this swap, assuming a typical number of channels?
details:
  realistic_solution: The computational reduction is approximately a factor of `K*K`,
    where `K` is the kernel size. For a 3x3 kernel, the reduction is close to 9x.
    This is because a standard convolution's cost scales with `C_in * C_out * K *
    K`, while the separable version scales with `C_in * K * K` (depthwise) + `C_in
    * C_out` (pointwise). For any reasonable number of channels where `C_out > 1`,
    the standard convolution is dominated by its `K*K` factor compared to the pointwise
    convolution's `1x1` operation.
  common_mistake: A common mistake is to underestimate the savings, believing it's
    a minor optimization of only 2x-3x. Another is to confuse computational savings
    with parameter savings, which are related but not identical. The key is to remember
    that the saving is not a small constant; it's directly and multiplicatively tied
    to the kernel dimensions.
  napkin_math: 'Standard 3x3 Convolution MACs per pixel: 3 * 3 * 64 * 64 = 36,864
    MACs. Depthwise Separable requires Depthwise (3 * 3 * 64 = 576 MACs) + Pointwise
    (1 * 1 * 64 * 64 = 4,096 MACs). Total = 576 + 4,096 = 4,672 MACs. Computational
    savings factor = 36,864 / 4,672 = ~7.9x. This keeps the model well within the
    Cortex-M4''s 168MHz latency budget.'
  options:
  - ~2x reduction
  - ~9x reduction
  - ~64x reduction (confuses with channel count)
  - No change in computation, only in parameters
  correct_index: 1
