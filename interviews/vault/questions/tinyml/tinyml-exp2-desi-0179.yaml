title: Ping-Pong DMA Architecture for Continuous Audio Inference
scenario: You are designing a continuous wake-word detection system on an ARM Cortex-M4 (STM32F4) running
  at 168 MHz with 256 KB SRAM and no FPU. A digital microphone streams 16 kHz, 16-bit audio via I2S. The
  wake-word model requires 1 second of audio context per inference and takes roughly 40 ms to execute
  utilizing CMSIS-NN SIMD (2x INT8 MACs/cycle). Architect the data movement strategy using DMA to ensure
  zero audio samples are dropped while the CPU computes the inference, and detail the buffer sizes and
  memory layout.
details:
  realistic_solution: The optimal design uses a ping-pong (double) buffering strategy with the I2S DMA
    peripheral configured in circular mode. Two separate buffers are allocated in SRAM. While the DMA
    hardware fills Buffer A in the background without CPU intervention, the CPU performs in-place (zero-copy)
    CMSIS-NN inference on Buffer B. Upon a DMA Transfer Complete (TC) interrupt, the buffer pointers swap.
    This fully decouples the high-speed CPU from the slow audio peripheral.
  common_mistake: Candidates often propose a single buffer system triggering CPU interrupts for small
    blocks, causing constant context switching. Another frequent mistake is copying data from the DMA
    buffer to a separate inference buffer, wasting both CPU cycles and precious SRAM instead of performing
    zero-copy inference directly on the DMA buffer.
  napkin_math: 'Audio data rate: 16,000 samples/s * 2 bytes/sample = 32 KB/sec. Ping-pong buffers: 2 *
    32 KB = 64 KB total SRAM used, leaving 192 KB of the 256 KB SRAM for the NN arena and firmware. Time
    budget per buffer: 1 second = 168,000,000 CPU cycles at 168 MHz. Inference time: 40 ms = 6,720,000
    cycles. Since 40 ms is well under the 1000 ms accumulation time, the CPU can sleep 96% of the time,
    safely meeting real-time deadlines while avoiding data movement overhead.'
