title: 'Specification: define CNN architecture constraints for Cortex-M4 vision inference'
scenario: You are writing the architectural specification for a TinyML CNN that must run inference on a Cortex-M4 (168MHz, 256KB SRAM, 512KB Flash) for a 3-class fault detection system using 64x64 grayscale images from a vibration sensor.
question: What architecture, memory, latency, and accuracy constraints should specify a Cortex-M4 CNN for 64x64 fault detection?
details:
  realistic_solution: 'Spec: (1) Architecture: depthwise separable CNN, max 6 layers; (2) Input: 64×64×1 INT8; (3) Max MACs: 5M (target <100ms at 168MHz, 50M MACs/sec via SIMD); (4) Flash budget: model weights ≤128KB (leaving 384KB for firmware); (5) SRAM budget: TFLite Micro arena ≤128KB (leaving 128KB for OS + stack); (6) Activation functions: ReLU6 only (CMSIS-NN optimized); (7) Channel counts: multiples of 8 for SIMD efficiency; (8) Performance: fault-class recall ≥99%, false alarm rate ≤5% on 500-sample test set; (9) Latency: ≤150ms per inference (updated at 6.7 Hz); (10) Quantization: INT8 QAT, accuracy drop vs FP32 ≤2%.'
  common_mistake: |
    **The Pitfall:** Specifying accuracy in terms of top-1 on a generic benchmark dataset.
    **The Rationale:** Candidates often port cloud ML habits to embedded systems, ignoring that fault detection requires precision/recall metrics tailored to safety-critical constraints rather than average accuracy.
    **The Consequence:** The model achieves 85% average accuracy but misses critical fault signals, rendering the safety system useless in production.
  napkin_math: |
    1. SRAM Budget: Max 128 KB for arena. Peak activation (64×64×8) = 32 KB. With ping-pong buffer = 48 KB (Fits).
    2. Flash Budget: 128 KB for weights. At ~4 MACs/param (MobileNetV1 density) = 512K MACs.
    3. Compute Check: 512K MACs << 5M MACs target (Fits).
    4. Layer check: 128K params INT8 allows 8 Depthwise blocks (C=32). DW weights = ~2.3 KB, PW weights = ~8.2 KB.
    5. Total Layer: 10.5 KB < 128 KB limit. Targeting **>90% Flash utilization** for accuracy.
