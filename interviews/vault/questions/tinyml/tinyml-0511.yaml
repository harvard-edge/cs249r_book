title: The TinyML Keyword Spotting Dilemma
scenario: 'You are a Staff ML Systems Engineer at a smart-home device company. Your team needs to improve
  the accuracy of a keyword spotting model that runs on a Cortex-M4 microcontroller. The MCU has a hard
  constraint of 256 KB of SRAM available for the ML model''s tensor arena and a P99 latency budget of
  100ms. Your Neural Architecture Search (NAS) tool has proposed two candidate architectures:'
details:
  realistic_solution: The correct choice is the 'TinyMoE' architecture. The 'Efficient-CNN' is immediately
    disqualified because its memory requirement violates the primary system constraint.
  common_mistake: Engineers often focus on total parameters (which determines Flash storage size) or MACs
    alone, ignoring that peak activation memory (the 'Tensor Arena' size) is often the most critical SRAM
    constraint on microcontrollers. A common mistake with MoE models is to assume all experts must be
    loaded into SRAM simultaneously, which is not true for inference.
  napkin_math: 'Hard constraint: 256KB SRAM for tensor arena. If Efficient-CNN needs 300KB → violates
    256KB limit → immediately disqualified regardless of accuracy or latency. TinyMoE: say 180KB arena
    + expert routing overhead ~20KB = 200KB < 256KB ✓. Latency: TinyMoE at 80ms < 100ms budget ✓. Lesson:
    memory constraint is a hard gate; accuracy and speed are optimization targets only after the gate
    passes.'
  options:
  - The 'Efficient-CNN', because its architecture is simpler than MoE, leading to better hardware utilization.
  - The 'TinyMoE' model, as it is the only architecture that respects the 256 KB SRAM constraint for its
    tensor arena.
  - Neither model will work; the 'TinyMoE' is too slow and the 'Efficient-CNN' requires too much memory.
  - The 'Efficient-CNN', because depthwise separable convolutions are known to be the most memory-efficient
    option for mobile and edge devices.
  correct_index: 1
