title: The TinyML Keyword Spotting Dilemma
scenario: 'Your team needs to improve the accuracy of a keyword spotting model. Your NAS tool has proposed two candidate architectures: an Efficient-CNN and a TinyMoE.'
question: Which candidate architecture should you choose under the 256 KB tensor arena and 100 ms latency constraints?
details:
  realistic_solution: The correct choice is the 'TinyMoE' architecture. The 'Efficient-CNN' is immediately disqualified because its memory requirement violates the primary system constraint.
  common_mistake: |
    **The Pitfall:** Focusing on total parameters (Flash size) or FLOPs, while ignoring peak activation memory.
    **The Rationale:** Engineers wrongly assume that smaller model size in MB automatically means smaller SRAM footprint during execution.
    **The Consequence:** Selecting a model that mathematically fits on the device storage but instantly crashes with an Out-of-Memory (OOM) error during the first inference layer.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SRAM Constraint: 256 KB for tensor arena.
       - P99 Latency Budget: 100 ms.
       - Efficient-CNN Arena Requirement: ~300 KB.
       - TinyMoE Arena Requirement: ~180 KB + 20 KB routing overhead.
    2. **Calculations:**
       - Efficient-CNN Memory Check: 300 KB > 256 KB (Violates constraint).
       - TinyMoE Memory Check: 200 KB < 256 KB (Passes constraint).
       - TinyMoE Latency Check: 80 ms < 100 ms (Passes constraint).
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** Efficient-CNN is mathematically unviable due to an OOM condition, making TinyMoE the only valid candidate.
