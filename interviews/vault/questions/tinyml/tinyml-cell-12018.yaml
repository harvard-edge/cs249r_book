title: 'Latency Decomposition: Compare Cortex-M4 vs. Cortex-M7+Ethos-U55 for Keyword Spotting'
scenario: 'A keyword spotting model (DS-CNN, 80K params, INT8, 0.9 MOPs per inference) is deployed on
  two microcontrollers: Cortex-M4 (168MHz, 256KB SRAM) vs. Cortex-M7+Ethos-U55 (480MHz, 512KB SRAM, NPU
  with 0.5 TOPS INT8). Compare inference latency and explain which dominates the power budget for always-on
  detection.'
details:
  realistic_solution: 'M4 at 168MHz with DSP: 1 MAC/cycle. 0.9M MACs / 168M cycles = 5.4ms. M7+Ethos-U55:
    NPU handles 0.9M INT8 ops at 0.5 TOPS = 0.9M/0.5T = 1.8μs (NPU-bound), but startup overhead ~1ms.
    M7 inference: 0.9M/960M MACs/s = 0.94ms (M7 does ~2 MACs/cycle at 480MHz). NPU: 1ms total with overhead.
    NPU wins 5×.'
  common_mistake: Using raw clock speed to estimate Cortex-M4 latency without accounting for instruction
    throughput (M4 can do 1 MAC/cycle with DSP extensions, M7 2 MACs/cycle).
  napkin_math: 'M4: 0.9M MACs / (168MHz × 1 MAC/cycle) = 0.9M/168M = 5.36ms. M7: 0.9M / (480MHz × 2) =
    0.9M/960M = 0.94ms. Ethos-U55 NPU: 0.9M/500000M = 1.8μs compute + 1ms overhead = ~1ms. NPU 5× faster
    than M4. Always-on: M4 duty-cycles at 5.4ms every 100ms = 5.4% active → power ∝ 5.4%. NPU at 1ms =
    1% active → better for always-on.'
