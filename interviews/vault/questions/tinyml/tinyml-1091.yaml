title: Hardware-Aware NAS Design for Cortex-M4
scenario: Your team needs to automatically discover optimal keyword spotting models for an ARM Cortex-M4 (STM32F4) microcontroller. The device has 256 KB of SRAM, 1 MB of flash, and runs at 168 MHz using CMSIS-NN SIMD instructions (2x INT8 MACs/cycle). You must design the architecture of a hardware-aware Neural Architecture Search (NAS) pipeline that guarantees the discovered models will meet a strict 50ms latency budget and fit entirely in SRAM without spilling, while maximizing accuracy.
question: How should a Cortex-M4 NAS pipeline enforce a 50 ms latency budget and 200 KB activation limit?
details:
  realistic_solution: The optimal design builds an empirical latency and memory predictor trained by profiling a diverse set of sub-networks on the actual STM32F4. The search space should focus exclusively on operations optimized by CMSIS-NN (e.g., specific kernel sizes and channel multiples) and enforce a hard constraint mask during the evolutionary or gradient-based search to reject architectures that exceed available SRAM or the predicted 50ms latency.
  common_mistake: |
    **The Pitfall:** Running the search directly on the device or relying solely on theoretical FLOP counts for latency estimation.
    **The Rationale:** Engineers often assume theoretical FLOPs perfectly correlate with on-device latency, ignoring memory access patterns and hardware-specific kernel optimization.
    **The Consequence:** The NAS outputs models that theoretically meet the budget but fail in production due to memory overhead (RTOS, buffers) and unaccounted latency stalls.
  napkin_math: |
    - Cortex-M4 clock: 168 MHz.
    - SIMD throughput: 2x INT8 MACs/cycle.
    - Peak theoretical throughput: 168 MHz × 2 = 336 MMACs/s.
    - Budget for 50 ms latency: 336 MMACs/s × 0.050 s = **16.8 million theoretical MACs** (practically ~8-10 million accounting for memory bounds).
    - Total SRAM: 256 KB.
    - Reserved system overhead (RTOS, buffers): ~56 KB.
    - **Strict activation limit: 200 KB** (sum of input and output tensors for any single layer cannot exceed this).
