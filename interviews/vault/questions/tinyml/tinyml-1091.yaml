title: Hardware-Aware NAS Design for Cortex-M4
scenario: Your team needs to automatically discover optimal keyword spotting models
  for an ARM Cortex-M4 (STM32F4) microcontroller. The device has 256 KB of SRAM, 1
  MB of flash, and runs at 168 MHz using CMSIS-NN SIMD instructions (2x INT8 MACs/cycle).
  You must design the architecture of a hardware-aware Neural Architecture Search
  (NAS) pipeline that guarantees the discovered models will meet a strict 50ms latency
  budget and fit entirely in SRAM without spilling, while maximizing accuracy. How
  do you design the search space, cost model, and search strategy?
question: How should a Cortex-M4 NAS pipeline enforce a 50 ms latency budget and 200
  KB activation limit?
details:
  realistic_solution: The optimal design builds an empirical latency and memory predictor
    trained by profiling a diverse set of sub-networks on the actual STM32F4. The
    search space should focus exclusively on operations optimized by CMSIS-NN (e.g.,
    specific kernel sizes and channel multiples) and enforce a hard constraint mask
    during the evolutionary or gradient-based search to reject architectures that
    exceed available SRAM or the predicted 50ms latency.
  common_mistake: Candidates often propose running the search directly on the device
    or relying solely on theoretical FLOP counts for latency estimation. They may
    also forget to account for the memory overhead of the inference engine, RTOS,
    and intermediate activation buffers when defining the SRAM constraints.
  napkin_math: With a 168 MHz clock and 2x INT8 MACs/cycle, peak theoretical throughput
    is 336 MMACs/s. A 50ms latency budget allows for a maximum of 16.8 million theoretical
    MACs (practically ~8-10 million accounting for memory bounds). Out of 256 KB total
    SRAM, reserving roughly 56 KB for the RTOS and system leaves a strict 200 KB limit
    for peak activation memory, meaning the sum of input and output tensors for any
    single layer cannot exceed this boundary.
