title: The FOTA Flash Tax
scenario: You're deploying a keyword-spotting model to a fleet of microcontrollers, each with 1MB of flash memory. To enable remote updates, you must implement a Firmware-Over-The-Air (FOTA) update strategy.
question: When partitioning the flash, which of these components typically consumes the largest portion of the memory?
details:
  realistic_solution: The OTA (or 'inactive') partition for the next firmware image. To perform a safe, atomic update, you can't overwrite the currently running code. Instead, you download the new firmware to a separate partition. Once the download is complete and verified, the bootloader is instructed to boot from the new partition on the next reset. This A/B partitioning scheme implies that you must set aside roughly 40-50% of your total flash just to hold the next update.
  common_mistake: |
    **The Pitfall:** Underestimating the FOTA memory requirement by focusing solely on the model footprint and application logic.
    **The Rationale:** Engineers new to embedded development view memory strictly as "current working space" and forget the necessity of A/B banking for reliable remote updates.
    **The Consequence:** The team runs out of flash storage mid-development, forcing emergency optimizations or requiring a complete hardware redesign to accommodate the secondary OTA partition.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Flash budget: 1 MB (1024 KB).
       - Minimal bootloader: ~32 KB.
       - Compact RTOS: ~64 KB.
    2. **Calculations:**
       - Total system software: 32 + 64 = 96 KB.
       - Remaining space for application/OTA: 1024 KB - 96 KB = 928 KB.
       - A/B schema split: 928 KB / 2 = 464 KB per partition.
    3. **Conclusion & Interpretation:**
       - **Result: Storage-Bound.** The OTA partition alone is ~464 KB, making it the single largest isolated consumer of flash memory.
  options:
  - The Bootloader
  - The Real-Time Operating System (RTOS)
  - The OTA Update Partition
  - The model's activation tensors (Tensor Arena)
  correct_index: 2
