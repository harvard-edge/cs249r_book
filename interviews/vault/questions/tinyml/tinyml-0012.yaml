title: The FOTA Flash Tax
scenario: You're deploying a keyword-spotting model to a fleet of microcontrollers, each with 1MB of flash
  memory. To enable remote updates, you must implement a Firmware-Over-The-Air (FOTA) update strategy.
  When partitioning the flash, which of these components typically consumes the largest portion of the
  memory?
details:
  realistic_solution: The OTA (or 'inactive') partition for the next firmware image. To perform a safe,
    atomic update, you can't overwrite the currently running code. Instead, you download the new firmware
    to a separate partition. Once the download is complete and verified, the bootloader is instructed
    to boot from the new partition on the next reset. This A/B partitioning scheme implies that you must
    set aside roughly 40-50% of your total flash just to hold the next update.
  common_mistake: Engineers new to the embedded world often misjudge the memory budget. They focus on
    the size of their ML model and application code, underestimating the significant 'tax' imposed by
    a robust FOTA mechanism. In a common A/B scheme, you must reserve space for an entire second copy
    of the firmware, which dwarfs the memory footprint of the bootloader or the RTOS.
  napkin_math: 'With 1MB (~1024 KB) of flash: | A minimal bootloader: ~32 KB. | A compact RTOS: ~64 KB.
    | Total for system software: `32 + 64 = 96 KB`. | Remaining space for the application and OTA: `1024
    KB - 96 KB = 928 KB`. | For an A/B scheme, this is split in two: `928 KB / 2 = 464 KB`. | Thus, the
    OTA partition alone is ~464 KB, far larger than the bootloader or RTOS.'
  options:
  - The Bootloader
  - The Real-Time Operating System (RTOS)
  - The OTA Update Partition
  - The model's activation tensors (Tensor Arena)
  correct_index: 2
