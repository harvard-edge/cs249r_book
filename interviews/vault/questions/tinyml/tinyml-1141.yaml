title: Dual-Core BLE Streaming Architecture Evaluation
scenario: 'You are deploying a continuous gesture recognition model on a Nordic nRF5340.
  The sensor samples 6-axis IMU data at 200 Hz. You have two proposed architectures
  for ingestion and streaming. Option A: The 128 MHz application core reads the I2C
  sensor, buffers raw data in the 256 KB SRAM, runs the TinyML model, and streams
  both raw data and predictions via IPC to the 64 MHz network core for BLE transmission.
  Option B: The network core handles I2C ingestion directly, pushing raw data over
  BLE immediately, while selectively sending batches via IPC to the application core
  for inference only when motion is detected. Evaluate which architecture is better
  for maximizing battery life (~5mA active current constraint) while ensuring no dropped
  packets during high-throughput BLE streaming.'
question: How would you evaluate which architecture is better for maximizing battery
  life (~5mA active current constraint) while ensuring no dropped packets during high-throughput
  BLE streaming?
details:
  realistic_solution: Option A is superior. The 128 MHz app core should handle I2C
    ingestion using EasyDMA directly into its 256 KB SRAM, allowing the CPU to sleep
    during transfers. The app core can run inference quickly and then batch both predictions
    and compressed raw data over IPC to the 64 MHz network core only when a BLE connection
    event approaches. This keeps the network core's BLE stack unblocked and allows
    both cores to maximize their sleep states.
  common_mistake: Candidates often choose Option B to 'offload' I2C to the network
    core, failing to realize the network core should remain asleep as much as possible
    to save power and that BLE stack timing constraints are strict. They also over-estimate
    IPC overhead between the nRF5340's cores.
  napkin_math: IMU at 200 Hz * 6 axes * 16 bits = 2400 bytes/sec. At 2.4 KB/s, filling
    a 4 KB buffer takes ~1.6 seconds. The 128 MHz app core running inference takes
    ~10ms. If the 64 MHz net core is kept active continuously (Option B), it draws
    ~5mA. If batched (Option A), the net core wakes up once every ~1.6s for a BLE
    connection event taking ~5ms at 5mA, dropping average consumption to microamps.
