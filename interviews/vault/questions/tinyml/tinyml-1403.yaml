title: Optimizing a CNN for Edge Deployment via Structured Pruning on Ethos-U55
scenario: You are tasked with deploying a convolutional neural network (CNN) for image classification on a constrained edge device featuring an Arm Cortex-M7 microcontroller (480 MHz) coupled with an Arm Ethos-U55 microNPU (up to 512 MAC/cycle, 512 KB SRAM shared with Cortex-M7). The baseline CNN model, after int8 quantization, still requires 700 KB of SRAM for its weights and activations, exceeding the available memory. You decide to employ pruning to fit the model.
question: How should you prune an INT8 CNN for Ethos-U55 so it fits 512 KB SRAM while preserving dense NPU acceleration?
details:
  realistic_solution: 'The most realistic solution would heavily lean towards structured pruning (e.g., channel pruning, filter pruning) for the Ethos-U55.

    1.  **Structured Pruning Preference**: Structured pruning directly reduces the computational graph''s size, leading to fewer MAC operations and smaller intermediate activations/weights, which are highly amenable to the Ethos-U55''s dense processing capabilities.

    2.  **Ethos-U55 Alignment**: The Ethos-U55 performs fixed-size vector/matrix multiplications. Channel or filter pruning reduces the dimensions of these operations, making them smaller but still dense, allowing the NPU to maintain high utilization.

    3.  **Iterative Pruning & Fine-tuning**: Apply pruning iteratively, followed by fine-tuning to recover accuracy.

    4.  **Accuracy-Speedup Trade-offs**: Acknowledge that structured pruning might require a higher pruning ratio to achieve the same sparsity as unstructured pruning, potentially leading to a larger accuracy drop. However, the guaranteed speedup and memory savings on the Ethos-U55 often justify this trade-off.'
  common_mistake: |
    **The Pitfall:** Solely focusing on achieving the highest sparsity with unstructured pruning.
    **The Rationale:** Unstructured pruning yields smaller models but NPUs excel at dense operations. Irregular sparsity requires complex indexing or fallback to the CPU.
    **The Consequence:** Negating potential speedups due to NPU underutilization or CPU fallback, and ignoring the impact of pruning on activation memory.
  napkin_math: |
    - For a layer with 256 input channels, 256 output channels, 3x3 kernel (589,824 params), pruning 25% channels saves ~147,456 params (~144 KB).
    - MAC operations also reduce by 25%.
    - Model is 700 KB, SRAM is 512 KB.
    - Minimum reduction required: (700 - 512) / 700 * 100% = **26.8% reduction**.
