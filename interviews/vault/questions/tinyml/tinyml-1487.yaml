title: 'RTOS Task Priority and Inference Latency'
scenario: 'An MCU runs TFLite Micro for a keyword spotting model. The FreeRTOS system also handles WiFi and MQTT logging. P50 inference is 15ms but P99 spikes to 300ms. Spikes correlate with WiFi TX events.'
question: 'How should task priorities and core pinning eliminate WiFi-correlated P99 inference latency spikes?'
details:
  realistic_solution: 'Pin the inference task to a dedicated core (APP_CPU) using xTaskCreatePinnedToCore, and pin WiFi/networking to the PRO_CPU. Use PSRAM for model weights to keep SRAM free for ISR stacks. This gives inference dedicated CPU time without blocking networking.'
  common_mistake: |
    **The Pitfall:** Disabling WiFi during inference.
    **The Rationale:** Candidates use blunt force to solve preemption rather than utilizing dual-core RTOS task pinning.
    **The Consequence:** The device loses network connectivity arbitrarily, causing dropped MQTT messages and failing connectivity SLAs.
  napkin_math: |
    **Assumptions & Constraints:**
    - WiFi TX ISR: ~300µs with ~10ms retransmit windows.
    - P50 Inference: 15 ms.
    - P99 Spike: 300 ms.

    **Calculations:**
    - Preempted inference = 15 ms + 10 ms (retry) = 25 ms.
    - 300 ms P99 = 3-4 consecutive WiFi retries (80 ms timeout each) preempting the core.

    **Conclusion & Interpretation:**
    - **Result: 300 ms P99 (Compute-Bound)**. Core pinning eliminates the WiFi ISR preemption completely, stabilizing P99 latency back to ~15ms.
