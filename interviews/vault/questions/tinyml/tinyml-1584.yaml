title: Zigbee Sensor Limit
scenario: Three Cortex-M4 sensors transmit compressed thermal images (2KB each) via
  a shared 250 kbps Zigbee network every second.
question: Determine if the 250 kbps link can support a fourth sensor without exceeding
  50% channel utilization.
visual:
  kind: svg
  path: tinyml-1584.svg
  alt: Diagram showing 4 nodes feeding into a 250 kbps link, using only a fraction
    of its capacity.
  caption: 4-Node Network Load
details:
  realistic_solution: 'Calculate total bit rate for 4 sensors: 4 * 2KB * 8 bits =
    64 kbps. Link capacity is 250 kbps. 50% of 250 is 125 kbps. Since 64 < 125, the
    fourth sensor can be easily supported.'
  common_mistake: Calculating bytes instead of bits for the network bandwidth.
  napkin_math: 4 * 2 * 8 = 64 kbps <= 125 kbps (50%)
