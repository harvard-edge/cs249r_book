title: Zigbee Sensor Limit
scenario: Three sensors transmit compressed thermal images (2KB each) via a shared 250 kbps Zigbee network every second.
question: Determine if the 250 kbps link can support a fourth sensor without exceeding 50% channel utilization.
visual:
  kind: svg
  path: tinyml-1584.svg
  alt: Diagram showing 4 nodes feeding into a 250 kbps link, using only a fraction of its capacity.
  caption: 4-Node Network Load
details:
  realistic_solution: 'Calculate total bit rate for 4 sensors: 4 * 2KB * 8 bits = 64 kbps. Link capacity is 250 kbps. 50% of 250 is 125 kbps. Since 64 < 125, the fourth sensor can be easily supported.'
  common_mistake: |
    **The Pitfall:** Calculating bytes instead of bits for the network bandwidth.
    **The Rationale:** Developers often conflate storage size (Bytes) with network transmission speeds (bits per second).
    **The Consequence:** An incorrect bandwidth utilization calculation, leading to under-utilizing the network or prematurely upgrading network hardware.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Payload: 2 KB per sensor per second.
       - Zigbee Network Capacity: 250 kbps.
       - Channel Utilization Target: < 50%.
    2. **Calculations:**
       - Bandwidth per sensor: 2 KB/s * 8 bits/Byte = 16 kbps.
       - 4 Sensor Bandwidth: 4 * 16 kbps = 64 kbps.
       - 50% Capacity Limit: 250 kbps * 0.50 = 125 kbps.
    3. **Conclusion & Interpretation:**
       - **Result: Communication-Bound.** 64 kbps is well below the 125 kbps target, easily supporting a fourth sensor.
