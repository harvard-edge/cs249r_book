title: Active Learning Curation for INT8 Constrained Edge Devices
scenario: 'You are deploying an acoustic anomaly detection model on an ARM Cortex-M4
  (STM32F4) featuring 256 KB SRAM, 1 MB flash, and no FPU. You have 10,000 hours of
  unlabeled factory audio but budget to label only 100 hours. You must evaluate two
  active learning dataset curation pipelines: Pipeline A uses a large cloud-based
  FP32 teacher model to select the most uncertain samples for labeling. Pipeline B
  uses a bit-exact simulation of your target INT8 quantized model, mimicking the CMSIS-NN
  SIMD pipeline, to select samples where the quantized edge model specifically shows
  low confidence. Which curation pipeline do you choose and how do you implement the
  selection efficiently?'
question: Which curation pipeline do you choose and how do you implement the selection
  efficiently?
details:
  realistic_solution: Pipeline B is vastly superior. By evaluating uncertainty using
    the exact INT8 target architecture and simulated CMSIS-NN behavior, the labeling
    budget is optimally spent on data that the actual Cortex-M4 struggles with. However,
    because hardware-in-the-loop active learning over 10,000 hours is too slow, you
    must run a bit-accurate INT8 emulator on parallel cloud compute to score the unlabelled
    pool, selecting the top 100 hours where the quantized model's margin is lowest.
  common_mistake: Candidates often choose Pipeline A, assuming a powerful FP32 model
    provides a superior ground-truth assessment of 'hard' examples. They fail to recognize
    that for heavily constrained TinyML devices without FPUs, the most critical errors
    stem from quantization artifacts, limited representational capacity, and INT8
    overflow/underflow, which the FP32 model completely misses.
  napkin_math: The ARM Cortex-M4 runs at 168 MHz with CMSIS-NN SIMD executing 2x INT8
    MACs/cycle, yielding a theoretical peak of 336 MMACs/sec. If our anomaly model
    takes 10 MMACs per 1-second audio frame, inference takes 10M / 336M = ~29.7 ms
    per frame. Running the 10,000 hours (36 million frames) of unlabeled data on a
    single Cortex-M4 for active learning selection would take 36M * 0.0297s = 1,069,200
    seconds (over 12 days). Thus, parallelized cloud emulation of the INT8 model is
    mandatory for iterative dataset curation.
