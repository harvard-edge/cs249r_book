title: The Doorbell Latency Crisis
scenario: You're a TinyML engineer optimizing a smart doorbell's person detection model running on a Cortex-M7
  (960 MFLOPS peak). The current model takes 250ms per inference, far exceeding the 100ms real-time budget.
  Profiling reveals a single 3x3 standard convolution is the primary bottleneck, consuming ~30ms of the
  total latency. This layer processes a `28x28x32` input feature map to produce a `28x28x64` output. Your
  task is to apply an architectural change to solve this compute bottleneck. Based on quantitative analysis,
  which of the following is the most effective solution?
details:
  realistic_solution: The correct approach is to replace the standard convolution with a depthwise separable
    convolution. This architectural change is a cornerstone of efficient CNN design, specifically created
    to reduce computational cost (FLOPs) for a typically small trade-off in accuracy. By factorizing the
    single, dense convolution into two smaller ones (a depthwise spatial filter and a pointwise channel
    projection), we drastically cut the number of required multiplications. The calculation shows an ~8x
    reduction in FLOPs for this specific layer, bringing its latency down from a crippling 30ms to a manageable
    ~4ms. This is the most impactful, single change to get the model back on the path to meeting its latency
    budget.
  common_mistake: Engineers unfamiliar with hardware constraints often misapply solutions from other domains.
    A common error is to suggest quantization, assuming it provides massive speedups on all hardware (it
    doesn't on most MCUs, which lack SIMD units). Another is to suggest pruning, which offers linear improvement
    but is less effective than architectural changes. A final mistake is suggesting trendy but computationally
    heavy architectures like Transformers, which are completely infeasible at this scale.
  napkin_math: 'Standard 3x3 conv: C_in=32, C_out=64, output 28x28. MACs = 32 * 64 * 3 * 3 * 28 * 28 =
    14.45M MACs = 28.9 MFLOPs. Depthwise separable: DW MACs = 32 * 3 * 3 * 28 * 28 = 225.8K. PW MACs =
    32 * 64 * 28 * 28 = 1.61M. Total: 1.83M MACs = 3.67 MFLOPs. Reduction: 28.9/3.67 = 7.9x. On Cortex-M7
    at 960 MFLOPS: standard = 28.9M / 960M = 30.1 ms/layer. DS = 3.67M / 960M = 3.8 ms/layer. Full model
    (10 layers): standard = 250 ms, DS = 32 ms (7.8x speedup). Weights: standard = 32*64*9 = 18,432 bytes
    = 18 KB/layer. DS = 32*9 + 32*64 = 2,336 bytes = 2.3 KB (7.9x smaller). Total model: 180 KB to 23
    KB.'
  options:
  - Prune 50% of the filters in the standard convolution. This will halve the FLOPs to ~14.5M and reduce
    latency to 15ms.
  - Apply INT8 post-training quantization. This will reduce memory and provide a ~4x speedup, bringing
    latency to ~7.5ms.
  - Replace the standard convolution with a depthwise separable convolution. It reduces FLOPs by ~8x from
    28.9M to 3.66M, cutting layer latency to under 4ms.
  - Replace the CNN layer with a small MobileViT-style attention block to improve accuracy while managing
    compute.
  correct_index: 2
