title: The Doorbell Latency Crisis
scenario: You're a TinyML engineer optimizing a smart doorbell's person detection model running on a Cortex-M7. The current model takes 250ms per inference, far exceeding the 100ms real-time budget. Profiling reveals a single 3x3 standard convolution is the primary bottleneck, consuming ~30ms of the total latency. This layer processes a 28x28x32 input feature map to produce a 28x28x64 output.
question: Which architectural change most effectively solves this compute bottleneck based on quantitative analysis?
details:
  realistic_solution: The correct approach is to replace the standard convolution with a depthwise separable convolution. This architectural change is a cornerstone of efficient CNN design, specifically created to reduce computational cost (FLOPs) for a typically small trade-off in accuracy. By factorizing the single, dense convolution into two smaller ones (a depthwise spatial filter and a pointwise channel projection), we drastically cut the number of required multiplications. The calculation shows an ~8x reduction in FLOPs for this specific layer, bringing its latency down from a crippling 30ms to a manageable ~4ms. This is the most impactful, single change to get the model back on the path to meeting its latency budget.
  common_mistake: |
    **The Pitfall:** Suggesting post-training quantization to INT8 to solve a FLOP bottleneck on an MCU.
    **The Rationale:** Engineers used to TPUs or advanced DSPs assume INT8 quantization always provides massive speedups, not realizing many basic MCUs lack the SIMD instructions to fully accelerate it.
    **The Consequence:** The team spends weeks implementing quantization only to find the latency improvement is marginal and still misses the 100ms budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Cortex-M7 (960 MFLOPS peak).
       - Layer Input: 28x28x32.
       - Layer Output: 28x28x64.
    2. **Calculations:**
       - Standard Conv MACs: 32 * 64 * 3*3 * 28*28 = 14,450,688 MACs (~28.9 MFLOPs).
       - Standard Latency: 28.9 MFLOPs / 960 MFLOPS = ~30.1 ms.
       - Depthwise MACs: 32 * 3*3 * 28*28 = 225,792 MACs.
       - Pointwise MACs: 32 * 64 * 28*28 = 1,605,632 MACs.
       - Separable Total MACs: 225,792 + 1,605,632 = 1,831,424 MACs (~3.66 MFLOPs).
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound** (Switching to a depthwise separable convolution reduces FLOPs by 7.9x, dropping layer latency from ~30 ms to ~3.8 ms).
  options:
  - Prune 50% of the filters in the standard convolution.
  - Apply INT8 post-training quantization.
  - Replace the standard convolution with a depthwise separable convolution.
  - Replace the CNN layer with a small MobileViT-style attention block.
  correct_index: 2
