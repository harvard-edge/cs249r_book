title: Evaluate Latency Bounds in Event-Driven Processing
scenario: A Cortex-M4 running at 120 MHz takes 10ms to process a localized acoustic event. Events arrive according to a Poisson process at an average rate of 80 events per second.
question: Can the MCU sustain this arrival rate without unbounded queue growth if a 2ms sleep-to-wake overhead is aggressively applied per event?
details:
  realistic_solution: Utilize queueing theory constraints. Add the context-switch and wake times to the effective service time calculation. If the utilization approaches 1.0, the queue length becomes computationally unstable.
  common_mistake: |
    **The Pitfall:** Ignoring the context-switching and wake overhead in the service time equation.
    **The Rationale:** Candidates calculate 80 events/s against a 10ms processing time and assume a comfortable 80% utilization.
    **The Consequence:** False confidence in system stability, resulting in an eventual unbounded queue growth and system crash during peak event bursts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute: 10 ms/event. Wake overhead: 2 ms/event.
    - Arrival rate: 80 events/s (Poisson).

    **Calculations:**
    - Baseline effective service time: 10 ms. Utilization = 80 * 0.010 = 0.8 (Stable).
    - With overhead: 12 ms. Utilization = 80 * 0.012 = 0.96.

    **Conclusion & Interpretation:**
    - **Result: Utilization = 0.96 (Queue-Bound)**. The 96% utilization will cause unbounded queue growth and memory exhaustion.
