title: Evaluate Latency Bounds in Event-Driven Processing
scenario: A Cortex-M4 running at 120 MHz takes 10ms to process a localized acoustic event. Events arrive according to a Poisson process at an average rate of 80 events per second.
question: Evaluate whether the MCU can sustain this arrival rate without unbounded queue growth if a 2ms sleep-to-wake overhead is aggressively applied per event.
details:
  realistic_solution: Without sleep overhead, the service rate is 100 events/s, yielding a stable utilization of 80/100 = 0.8. If the system sleeps and pays a 2ms wake overhead per event, the effective service time becomes 12ms, reducing the service rate to 83.3 events/s. The new utilization is 80/83.3 = 0.96, meaning the queue will grow drastically and likely cause OOM on a memory-constrained MCU.
  common_mistake: |
    **The Pitfall:** Ignoring the context-switching and wake overhead in the service time equation.
    **The Rationale:** Candidates calculate 80 events/s against a 10ms processing time and assume a comfortable 80% utilization.
    **The Consequence:** False confidence in system stability, resulting in an eventual unbounded queue growth and system crash during peak event bursts.
  napkin_math: |
    1. **Baseline Service Rate:** 10 ms / event = 100 events/s.
    2. **Baseline Utilization:** 80 / 100 = 0.8 (Stable).
    3. **Overhead Applied:** 10 ms compute + 2 ms wake overhead = 12 ms effective service time.
    4. **New Service Rate:** 1000 ms / 12 ms = 83.3 events/s.
    5. **New Utilization:** U = 80 / 83.3 = **0.96**.
    6. **Conclusion:** At 0.96 utilization, the queue will grow drastically, dangerously close to 1.0, likely causing an OOM.
