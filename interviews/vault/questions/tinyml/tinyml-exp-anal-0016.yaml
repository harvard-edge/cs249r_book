title: ESP32-S3 Quantized Model Fallback Latency
scenario: You are deploying a keyword spotting model to an ESP32-S3 microcontroller operating at 240 MHz
  with 512 KB of internal SRAM. The original FP32 ONNX model requires 800 KB of memory and crashes on
  initialization. After applying full INT8 post-training quantization and converting it to TFLite Micro,
  the model successfully loads into SRAM. However, profiling reveals that the inference latency is unexpectedly
  high, and the ESP32-S3's specialized vector extensions for INT8 are not being engaged during execution.
  Explain why this runtime behavior is occurring.
details:
  realistic_solution: The TFLite Micro runtime uses unoptimized reference C++ kernels by default, which
    execute INT8 operations sequentially. To leverage the ESP32-S3's hardware capabilities, the build
    system must be explicitly configured to link an architecture-specific optimized library (like Espressif's
    ESP-NN). Without linking these optimized operator implementations, the runtime safely falls back to
    the slow reference kernels, explaining the high latency despite the correct INT8 model format.
  common_mistake: Candidates often assume that exporting a model to an INT8 TFLite format automatically
    guarantees hardware acceleration on the target microcontroller. They frequently overlook the distinction
    between the model format itself and the runtime operator implementations (kernels) linked during firmware
    compilation.
  napkin_math: 'The FP32 model footprint of 800 KB exceeds the 512 KB SRAM. INT8 quantization reduces
    memory by 4x to ~200 KB, fitting easily. For latency: assume the model requires 5 million MACs. Using
    unoptimized reference kernels, an INT8 MAC takes ~4 clock cycles, totaling 20 million cycles. At 240
    MHz, execution takes 20M / 240M = 83.3 ms. When correctly linked with optimized kernels utilizing
    the Xtensa vector extensions, the core might process 2 INT8 MACs per cycle, requiring only 2.5 million
    cycles. At 240 MHz, this takes 2.5M / 240M = 10.4 ms, representing an 8x performance degradation when
    fallback occurs.'
