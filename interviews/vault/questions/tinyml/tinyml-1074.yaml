title: Shared SRAM Contention WDT Resets
scenario: A safety-critical vibration monitor uses a Nordic nRF5340. The app core executes an anomaly detection ML model and must service a hardware WDT with a 500ms timeout. In isolation, inference executes in 45 million CPU cycles (1 SRAM access every 3 cycles). When the 64 MHz net core handles heavy BLE traffic, bus contention causes 50% of the app core's memory accesses to incur a 3-cycle wait state penalty.
question: Why does the system pass lab tests but experience WDT resets in the field during heavy BLE activity?
details:
  realistic_solution: Acknowledge the shared AHB interconnect architecture. Heavy DMA transfers from the net core saturate the bus, injecting deterministic wait states into the app core's ML execution and extending the time beyond the WDT limit.
  common_mistake: |
    **The Pitfall:** Assuming dual cores operate with complete hardware isolation.
    **The Rationale:** Engineers overlook the shared AHB interconnect and SRAM, treating the application core's execution time as perfectly deterministic regardless of peripheral states.
    **The Consequence:** Unpredictable bus contention injects wait states, breaking hard real-time deadlines and triggering watchdog resets in the field.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - App core: 128 MHz. WDT deadline: 500 ms.
       - Base cycles: 45M. SRAM access: 1 per 3 cycles.
       - Contention penalty: 3 cycles on 50% of accesses.
    2. **Calculations:**
       - Base time: 45,000,000 / 128,000,000 = 351.5 ms (passes lab test).
       - Total SRAM accesses: 45,000,000 / 3 = 15,000,000 accesses.
       - Penalty cycles: 15,000,000 * 0.50 * 3 = 22,500,000 cycles.
       - Total cycles during BLE: 45,000,000 + 22,500,000 = 67,500,000 cycles.
       - Degraded time: 67,500,000 / 128,000,000 = 527.3 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 527.3 ms > 500 ms WDT.** The system is bus-contention-bound. The shared memory architecture deterministically violates the safety envelope during bursts.
