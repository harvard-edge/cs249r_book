title: Shared SRAM Contention WDT Resets
scenario: A safety-critical vibration monitor uses a Nordic nRF5340 (128 MHz app core,
  64 MHz net core, 256 KB shared SRAM, 1 MB flash, ~5mA active). The app core executes
  an anomaly detection ML model and must service a hardware watchdog timer (WDT) with
  a strictly enforced 500ms timeout. In isolation, the ML inference executes in 45
  million CPU cycles, averaging one shared SRAM memory access every 3 cycles. However,
  when the 64 MHz net core handles heavy BLE 5.3 traffic, bus contention causes 50%
  of the app core's memory accesses to incur a 3-cycle wait state penalty. Explain
  why the system passes lab tests but experiences WDT resets in the field during heavy
  BLE activity.
question: Why the system passes lab tests but experiences WDT resets in the field
  during heavy BLE activity?
details:
  realistic_solution: The candidate should identify that while the nRF5340 has dedicated
    app and net cores, they share the AHB interconnect and 256 KB SRAM. High BLE 5.3
    traffic from the net core generates DMA transfers that saturate the bus, injecting
    wait states into the app core's instruction and data fetches. This hardware contention
    deterministically extends the ML execution time beyond the 500ms safety deadline,
    triggering the watchdog reset.
  common_mistake: Candidates often assume the dual cores operate completely independently
    and fail to account for shared bus architecture. They may overlook how deterministic
    execution is compromised by SRAM contention, or miscalculate the wait state impact
    on the overall execution time.
  napkin_math: '1. Base execution: 45,000,000 cycles / 128,000,000 Hz = 351.5ms (safe).
    2. Total SRAM accesses: 45,000,000 cycles / 3 cycles/access = 15,000,000 accesses.
    3. Contention penalty: 15,000,000 accesses * 0.50 contention * 3 cycles = 22,500,000
    additional cycles. 4. Total cycles during BLE bursts: 45,000,000 + 22,500,000
    = 67,500,000 cycles. 5. Degraded execution time: 67,500,000 cycles / 128,000,000
    Hz = 527.3ms. 6. 527.3ms > 500ms WDT timeout, resulting in a safety system reset.'
