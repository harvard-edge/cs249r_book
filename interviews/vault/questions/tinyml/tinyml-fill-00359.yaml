title: Real-time Anomaly Detection Latency on Nordic nRF5340
scenario: A health monitoring wearable device utilizes a Nordic nRF5340 System-on-Chip (SoC) (128 MHz
  Arm Cortex-M33, 256 KB SRAM, 1 MB flash, integrated BLE 5.2) to perform real-time anomaly detection
  on streaming accelerometer data. The device samples data at 100 Hz. A pre-trained TinyML model (TensorFlow
  Lite for Microcontrollers) is deployed to detect unusual activity patterns. Upon detecting an anomaly,
  the device must immediately transmit an alert via Bluetooth Low Energy (BLE) to a connected smartphone.
  The overall end-to-end latency, from sensor data acquisition to the BLE alert being sent, is critical
  and must not exceed 250 ms to ensure timely intervention. You are observing that the system is occasionally
  exceeding this latency budget.
details:
  realistic_solution: 'To address the latency budget breach, one would perform a systematic latency decomposition.
    This involves profiling each stage: 1) Sensor acquisition and data windowing/preprocessing (e.g.,
    FFT or scaling), 2) ML model inference (MAC operations, memory access patterns), 3) Postprocessing
    (thresholding, alert formatting), and 4) BLE transmission (packetization, stack overhead, connection
    interval optimization). Using hardware debuggers, logic analyzers, and internal timers on the nRF5340,
    precise measurements can be taken for each component. Optimizations might include reducing model complexity,
    optimizing data transfer between peripherals and CPU, streamlining BLE advertising/connection parameters
    (e.g., shorter connection intervals if power budget allows), or offloading some pre/post-processing
    to a more powerful edge device if the nRF5340 cannot meet the required performance.'
  common_mistake: Candidates often focus solely on the ML inference time, overlooking significant latency
    contributions from sensor data acquisition, preprocessing, postprocessing logic, and especially the
    nuances of BLE communication stack overheads and connection intervals on a resource-constrained embedded
    system.
  napkin_math: 'Let''s consider typical timings:

    - **Sensor Data Acquisition & Preprocessing (100 Hz sensor, 1-sec window):** 100 samples at 100 Hz
    take 1000ms (1 second) for acquisition. Preprocessing (e.g., windowing, basic scaling) could add 5-15
    ms on a 128 MHz M33. Let''s estimate ~1015 ms total for acquisition + preprocessing.

    - **ML Model Inference (TinyML model):** A lightweight CNN/MLP might require ~200,000 MAC operations.
    On an M33 at 128 MHz (assuming ~5 cycles/MAC due to memory accesses/instruction pipeline), this is
    1,000,000 cycles. Time = 1,000,000 cycles / 128,000,000 cycles/s ≈ 7.8 ms.

    - **Postprocessing:** Decision logic, formatting a small alert packet. This is typically very fast,
    perhaps 2-5 ms.

    - **BLE Transmission:** For a small notification (e.g., 20 bytes), with a connection interval of 100
    ms, the transmission delay can be 50-150 ms from handover to the BLE stack. Let''s assume an average
    100 ms.


    **Total Estimated Latency (end-to-end from start of window to BLE send):** The 1-second acquisition
    window dominates. After the window is complete, inference + postprocessing + BLE takes ~7.8 + 5 +
    100 = ~113 ms. The observed 250ms+ exceedances during the post-window pipeline stage are explained
    by BLE connection interval variability, RTOS scheduling jitter, or data retransmissions.'
