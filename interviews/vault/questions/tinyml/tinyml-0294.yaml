title: The Microcontroller's Compute Limit
scenario: When analyzing the performance of a model on a microcontroller like the Cortex-M4, we use a
  'roofline' model to understand its limits. What is the approximate 'ridge point' (operational intensity)
  for this class of device, and what does it tell you about where the bottleneck usually is?
question: "What is the approximate 'ridge point' (operational intensity) for this class of device, and what does it tell you about where the bottleneck usually is?"
details:
  realistic_solution: A Cortex-M4 has a ridge point of approximately 0.2 Ops/Byte. This is an extremely
    low value, indicating that the system has abundant memory bandwidth relative to its compute power.
    As a result, nearly all neural network workloads on a microcontroller are **compute-bound**, limited
    by the CPU's ability to perform calculations, not by the speed of data access from its on-chip SRAM.
  common_mistake: Engineers accustomed to datacenter GPUs (like an H100) often assume all systems are
    fighting for memory bandwidth. They apply this intuition to microcontrollers, forgetting that the
    on-chip SRAM is incredibly fast relative to the slow CPU core. They incorrectly diagnose workloads
    as memory-bound when they are almost always compute-bound.
  napkin_math: 'The ridge point is the ratio of peak compute to peak memory bandwidth. Using the standard
    numbers:'
  options:
  - ~300 Ops/Byte; most workloads are memory-bound.
  - ~0.2 Ops/Byte; most workloads are memory-bound.
  - ~0.2 Ops/Byte; most workloads are compute-bound.
  - ~1,300 Ops/Byte; workloads are balanced between compute and memory.
  correct_index: 2
