title: The Microcontroller's Compute Limit
scenario: When analyzing the performance of a model on a microcontroller like the Cortex-M4, we use a 'roofline' model to understand its limits.
question: What is the approximate 'ridge point' (operational intensity) for this class of device, and what does it tell you about where the bottleneck usually is?
details:
  realistic_solution: A Cortex-M4 has a ridge point of approximately 0.2 Ops/Byte. This is an extremely low value, indicating that the system has abundant memory bandwidth relative to its compute power. As a result, nearly all neural network workloads on a microcontroller are **compute-bound**, limited by the CPU's ability to perform calculations, not by the speed of data access from its on-chip SRAM.
  common_mistake: |
    **The Pitfall:** Assuming workloads are memory-bound.
    **The Rationale:** Engineers accustomed to datacenter GPUs apply that intuition to microcontrollers, forgetting on-chip SRAM is incredibly fast relative to the slow CPU core.
    **The Consequence:** They incorrectly diagnose bottlenecks and waste effort optimizing memory access instead of compute.
  napkin_math: |
    - **Peak Compute:** ~336 MOps/s.
    - **Peak Memory Bandwidth:** ~1.6 GB/s.
    - **Ridge Point:** 336 MOps/s / 1.6 GB/s = **0.21 Ops/Byte**.
    - **Conclusion:** Nearly all workloads are compute-bound.
  options:
  - ~300 Ops/Byte; most workloads are memory-bound.
  - ~0.2 Ops/Byte; most workloads are memory-bound.
  - ~0.2 Ops/Byte; most workloads are compute-bound.
  - ~1,300 Ops/Byte; workloads are balanced between compute and memory.
  correct_index: 2
