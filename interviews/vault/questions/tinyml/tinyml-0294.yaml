title: The Microcontroller's Compute Limit
scenario: When analyzing the performance of a model on a microcontroller like the Cortex-M4, we use a 'roofline' model to understand its limits.
question: What is the approximate 'ridge point' (operational intensity) for this class of device, and what does it tell you about where the bottleneck usually is?
details:
  realistic_solution: Embedded MCUs manifest an extremely low ridge point of ~0.2 Ops/Byte. The architecture inherently provides abundant internal SRAM bandwidth compared to its highly constrained arithmetic logic. Consequently, deep ML kernels natively operate deep into the compute-bound plateau.
  common_mistake: |
    **The Pitfall:** Blindly diagnosing ML kernels as memory-bound solely due to the chip's limited total memory volume.
    **The Rationale:** Engineers mistakenly conflate total SRAM physical size limits with SRAM bandwidth throughput.
    **The Consequence:** Countless engineering hours are vaporized attempting to optimize SRAM bus access, missing the true CPU latency bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Architecture: Standard M4.
    - Peak Compute: ~336 MOps/s.
    - Peak Memory Bandwidth: ~1.6 GB/s.

    **Calculations:**
    - Ridge Point = Compute / Bandwidth.
    - Ridge Point = 336 MOps/s / 1.6 GB/s = 0.21 Ops/Byte.

    **Conclusion & Interpretation:**
    - **Result: 0.21 Ops/Byte (Compute-Bound Ceiling)**. With intensity > 0.21, any dense convolutional workload will securely max out the CPU ALU.
  options:
  - ~300 Ops/Byte; most workloads are memory-bound.
  - ~0.2 Ops/Byte; most workloads are memory-bound.
  - ~0.2 Ops/Byte; most workloads are compute-bound.
  - ~1,300 Ops/Byte; workloads are balanced between compute and memory.
  correct_index: 2
