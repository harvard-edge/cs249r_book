title: 'TinyML Nibble Packing'
scenario: 'A TinyML model has 90,000 4-bit weights.'
question: 'How much storage do 90,000 4-bit weights require when packed two per byte?'
details:
  realistic_solution: 'Two 4-bit weights fit in one byte, so storage is 45,000 bytes, or about 44 KiB. This excludes scales and alignment.'
  common_mistake: 'Treating each 4-bit weight as a full byte.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Total weights: 90,000.
    - Precision: 4-bit (1 nibble per weight).

    **Calculations:**
    - Packed bytes: 90,000 / 2 = 45,000 bytes.
    - KiB conversion: 45,000 / 1024 = 43.945 KiB.

    **Conclusion & Interpretation:**
    - **Result: 44 KiB (Memory Bound)**. Two 4-bit weights fit into a single byte, reducing the raw payload footprint to approximately 44 KiB before scales and alignment overheads.
