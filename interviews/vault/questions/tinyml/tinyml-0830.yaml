title: TinyML Nibble Packing
scenario: A TinyML model has 90,000 4-bit weights. Calculate the packed weight storage
  in bytes and KiB.
question: How much storage do 90,000 4-bit weights require when packed two per byte?
details:
  realistic_solution: Two 4-bit weights fit in one byte, so storage is 45,000 bytes,
    or about 44 KiB. This excludes scales and alignment.
  common_mistake: Treating each 4-bit weight as a full byte.
  napkin_math: 90,000 / 2 = 45,000 bytes. 45,000 / 1024 ≈ 44 KiB.
