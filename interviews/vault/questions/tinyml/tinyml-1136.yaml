title: Evaluate Race-to-Sleep vs DVFS for Cortex-M4 KWS
scenario: You are designing a battery-powered keyword spotting system on an ARM Cortex-M4 (STM32F4). The model requires 2M INT8 MACs per inference running at 10 Hz. You must evaluate two power strategies: running the core at its max 168 MHz (40 mA active current) to sleep faster, or using DVFS to scale down to 42 MHz (12 mA active current). The system uses a 3.3V supply and has a sleep current of 10 uA. Both implementations utilize CMSIS-NN SIMD instructions.
question: Which power strategy uses less energy for Cortex-M4 keyword spotting, race-to-sleep or DVFS, and by how much?
details:
  realistic_solution: Calculate the total energy per 100ms inference window for both strategies. Because CMSIS-NN provides 2x INT8 MACs/cycle, the 2M MACs take only 1M cycles. By calculating the energy per cycle (or active energy per inference), the candidate will prove that race-to-sleep at 168 MHz is actually more efficient because the current draw scales sub-linearly with frequency in this specific operational curve (40mA/168MHz < 12mA/42MHz).
  common_mistake: |
    **The Pitfall:** Blindly assuming DVFS saves energy.
    **The Rationale:** Candidates often assume that scaling down frequency always saves energy without calculating the energy per cycle for the specific chip.
    **The Consequence:** They might choose a slower clock that actually consumes more total energy per inference, reducing battery life.
  napkin_math: |
    - Cycles required: 2M MACs / 2 MACs/cycle = 1M cycles.
    - Inference period: 100ms (10 Hz).
    - **Race-to-sleep at 168 MHz:**
      - Active time: 1M cycles / 168 MHz = 5.95 ms.
      - Active power: 40 mA * 3.3 V = 132 mW.
      - Active energy: 132 mW * 5.95 ms = 785.4 µJ.
      - Sleep time: 100 ms - 5.95 ms = 94.05 ms.
      - Sleep energy: 10 µA * 3.3 V * 94.05 ms = 3.1 µJ.
      - Total energy: ~788.5 µJ.
    - **DVFS at 42 MHz:**
      - Active time: 1M cycles / 42 MHz = 23.8 ms.
      - Active power: 12 mA * 3.3 V = 39.6 mW.
      - Active energy: 39.6 mW * 23.8 ms = 942.5 µJ.
      - Sleep time: 100 ms - 23.8 ms = 76.2 ms.
      - Sleep energy: 10 µA * 3.3 V * 76.2 ms = 2.5 µJ.
      - Total energy: ~945.0 µJ.
    - **Conclusion:** Race-to-sleep wins by ~156.5 µJ per inference.
