title: The DMA Dividend
scenario: You need to capture 1 second of audio data from a microphone into a 32 KB SRAM buffer. The audio is 16-bit at a 16 kHz sample rate. Assume a PIO transfer requires 10 CPU cycles per sample.
question: "How many CPU cycles does DMA save when capturing 1 second of 16 kHz 16-bit audio versus PIO at 10 cycles per sample?"
details:
  realistic_solution: DMA completely offloads structural I/O overhead. PIO burns cycles waiting on peripheral registers. DMA executes parallel block transfers, charging only a one-time fixed interrupt configuration cost.
  common_mistake: |
    **The Pitfall:** Confusing memory bandwidth payload (32KB) with the actual sample count requiring CPU intervention.
    **The Rationale:** Engineers calculate transfer time based on bus width, ignoring that the CPU is the scalar bottleneck in PIO.
    **The Consequence:** They incorrectly estimate the cycle count by looking at the 32 KB buffer size instead of sample count, missing the optimization magnitude.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Audio: 16 kHz, 16-bit, 1 second duration.
       - PIO cost: 10 CPU cycles/sample.
       - DMA cost: ~200 fixed setup cycles.
    2. **Calculations:**
       - Total samples: 16,000 samples/sec * 1 sec = 16,000 samples.
       - PIO cycle cost: 16,000 * 10 = 160,000 cycles.
       - DMA cycle cost: 200 cycles.
       - Saved cycles: 160,000 - 200 = 159,800 cycles.
    3. **Conclusion & Interpretation:**
       - **Result: DMA saves 159,800 CPU cycles per second (Compute/Latency-Bound).**
  options:
  - 'PIO: 32,000 cycles, DMA: 200 cycles'
  - 'PIO: 16,000 cycles, DMA: 200 cycles'
  - 'PIO: 160,000 cycles, DMA: 200 cycles'
  - 'PIO: 1,600,000 cycles, DMA: 200 cycles'
