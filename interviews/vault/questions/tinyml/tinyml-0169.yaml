title: The DMA Dividend
scenario: Your team is building a voice-activated device on a Cortex-M4 MCU (168 MHz). You need to capture 1 second of audio data from a microphone into a 32 KB SRAM buffer. The audio is 16-bit at a 16 kHz sample rate. Assume a PIO transfer requires 10 CPU cycles per sample.
question: "How many CPU cycles does DMA save when capturing 1 second of 16 kHz 16-bit audio versus PIO at 10 cycles per sample?"
details:
  realistic_solution: The solution requires calculating the total number of samples and then multiplying by the per-sample CPU cost for PIO. The DMA cost is simply its fixed setup cost, as the CPU is free during the actual transfer.
  common_mistake: |
    **The Pitfall:** Confusing bandwidth with CPU overhead or forgetting to calculate the total number of samples.
    **The Rationale:** Engineers might calculate transfer time based on bus width and clock speed, ignoring that the CPU is the bottleneck in PIO.
    **The Consequence:** They incorrectly estimate the cycle count by looking only at the 32 KB buffer size instead of sample count.
  napkin_math: |
    1. Calculate total samples: 16,000 samples/sec * 1 sec = 16,000 samples.
    2. Calculate PIO cycle cost: 16,000 samples * 10 cycles/sample = 160,000 CPU cycles.
    3. Evaluate DMA cycle cost: DMA setup requires ~200 fixed setup cycles, while the CPU is free during transfer.
    4. Calculate saved cycles: 160,000 (PIO) - 200 (DMA) = 159,800 cycles.
    5. **Final Result: DMA saves approximately 159,800 CPU cycles per second.**
  options:
  - 'PIO: 16,000 cycles, DMA: 200 cycles'
  - 'PIO: 32,000 cycles, DMA: 200 cycles'
  - 'PIO: 160,000 cycles, DMA: 200 cycles'
  - 'PIO: 1,600,000 cycles, DMA: 200 cycles'
