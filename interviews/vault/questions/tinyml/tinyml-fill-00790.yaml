title: Hardware-aware NAS for Edge Deployment on Cortex-M7/Ethos-U55
scenario: You are tasked with deploying a real-time object detection model on an edge device featuring
  a Cortex-M7 microcontroller and an Ethos-U55 NPU. The Cortex-M7 operates at 480 MHz, and the system
  has 512 KB of SRAM. The Ethos-U55 NPU can perform between 128 and 512 MACs/cycle. Your goal is to design
  a Neural Architecture Search (NAS) strategy that explicitly incorporates hardware constraints (SRAM,
  FLOPs, latency) into its search objective to find the most efficient model architecture. Describe your
  approach to defining the search space, integrating hardware feedback, and how you would estimate the
  latency and memory footprint of candidate architectures before actual deployment. Reference MCUNet-style
  optimization principles.
details:
  realistic_solution: A strong solution would involve defining a search space tailored for efficient operations
    on a given NPU (e.g., Ethos-U55 specific ops, depthwise separable convolutions, inverted residuals)
    and for low SRAM footprint (e.g., micro-architectures found in MCUNet). Hardware feedback would be
    integrated through a differentiable NAS approach combined with a lightweight hardware simulator or
    performance predictor that can estimate latency and memory usage on the Cortex-M7/Ethos-U55. The objective
    function for NAS would explicitly balance accuracy with these predicted hardware metrics. Memory estimation
    would consider both weights and intermediate activations, and latency estimation would account for
    NPU utilization and data movement overheads.
  common_mistake: Candidates often propose NAS solutions that are not genuinely hardware-aware, relying
    solely on FLOPs or parameter count without considering the actual execution latency or memory constraints
    (especially SRAM) on a deeply embedded platform like Cortex-M7. They might also suggest general NAS
    techniques without adapting the search space for the unique characteristics of the Ethos-U55 NPU or
    the limited SRAM.
  napkin_math: Given 512 KB SRAM, estimate the maximum number of parameters a model could have, considering
    typical 8-bit quantization (e.g., 512KB / 1 byte/param ≈ 512k params).  For latency, if a model requires
    X MACs, and the NPU can do 512 MACs/cycle at 480 MHz, then ideal latency = X / (512 MACs/cycle * 480
    * 10^6 cycles/sec). Discuss the impact of activation memory for a given input size and batch size.
    Consider a typical layer's input/output feature maps and their contribution to SRAM usage.
