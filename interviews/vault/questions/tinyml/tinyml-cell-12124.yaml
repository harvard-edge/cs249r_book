title: 'Model Size Estimation: Diagnose Flash Overflow on ESP32-S3 Multi-Model Deployment'
scenario: 'An ESP32-S3 (16MB Flash, 512KB SRAM, 8MB PSRAM) firmware with 2 TFLite Micro models fails to
  link: ''Flash section overflow by 2.1MB''. Models: keyword spotter (500K INT8=500KB) + gesture recognition
  (1.5M INT8=1.5MB). Application + FreeRTOS + WiFi: 3.8MB. Total: 5.8MB but linker says overflow. Diagnose
  and fix.'
details:
  realistic_solution: 'Actual breakdown: App+FreeRTOS: 1MB. WiFi stack (ESP-IDF full): 2MB (much larger
    than estimated). BT stack: 0.5MB. TFLM runtime + all ops: 0.3MB. Model 1: 500KB. Model 2: 1.5MB. Total:
    1+2+0.5+0.3+0.5+1.5=5.8MB. Linker reports 2.1MB overflow beyond 16MB? 5.8MB < 16MB — can''t be Flash
    overflow. Actual issue: may be IRAM overflow (ESP32-S3 IRAM is 400KB for code, not Flash). WiFi stack
    must run from IRAM: 2MB >> 400KB IRAM. Fix: use ESP-IDF `CONFIG_WIFI_IRAM_OPT=n` to move WiFi from
    IRAM to Flash.'
  common_mistake: Calculating only model weights and application code without accounting for TFLM op kernels
    being linked for each model separately, and WiFi/BT library size (~2MB in ESP-IDF).
  napkin_math: 'ESP32-S3 IRAM: 400KB for instructions. DRAM: 512KB. WiFi stack in IRAM: ~250KB. TFLM with
    all ops in IRAM: 100KB. App: 50KB. Total IRAM: 400KB — exactly at limit. Fix: move models to Flash
    (XIP) and WiFi to Flash execution. IRAM: 400KB. Flash: 16MB. Model 1 (500KB) + Model 2 (1.5MB) in
    Flash (XIP). App+WiFi+TFLM in Flash. IRAM for hot paths only. Resolves overflow.'
