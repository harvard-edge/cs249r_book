title: Non-linear Latency Scaling on Corstone-300
scenario: We are deploying a CNN-based anomaly detection model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform (480 MHz, 256 MAC/cycle, 512 KB shared SRAM). Model A (10 million MACs) executes in 2 milliseconds. Model B has slightly wider layers totaling 12 million MACs, but executes in 15 milliseconds.
question: Why does a mere 20% increase in compute requirements result in a 7.5x increase in total inference latency on the Corstone-300?
details:
  realistic_solution: The disproportionate latency increase is caused by exceeding the 512 KB SRAM capacity, triggering an SRAM spill. Model A's weights and activations fit entirely within the fast on-chip SRAM, allowing the Ethos-U55 to operate continuously with high MAC utilization. Model B's wider layers increase the peak memory footprint beyond 512 KB, forcing the system to store intermediate activations in slower off-chip memory (such as QSPI flash or external DRAM). The severe bandwidth limitation of off-chip memory access starves the NPU of data, shifting the workload from compute-bound to heavily memory-bound.
  common_mistake: |
    **The Pitfall:** Assuming that execution time scales linearly with MAC operations.
    **The Rationale:** Candidates focus solely on the NPU's peak compute capacity and fail to analyze the system-level memory hierarchy and the rigid boundaries of the shared SRAM.
    **The Consequence:** Being completely blindsided when a minor model tweak causes the system to violently hit a memory wall, breaking all real-time deadlines.
  napkin_math: |
    *   **Ethos-U55 Peak Compute:** 256 MAC/cycle * 480 MHz = 122.88 GMAC/s.
    *   **Model A Ideal Compute:** 10M MACs / 122.88 GMAC/s = 0.08 ms (plus OS/SRAM overhead ≈ 2ms total).
    *   **Model B Memory Spill:** Widened layers push peak activation size beyond the 512 KB SRAM limit by 100 KB.
    *   **Spill Penalty:** If 100 KB must be paged to QSPI flash (e.g., 40 MB/s bandwidth) across 5 layers, data transfer is 500 KB.
    *   **Transfer Latency:** 500 KB / 40 MB/s = 12.5 ms.
    *   **Conclusion:** Adding the 12.5 ms memory transfer time explains the massive jump to **~15 ms total latency**.
