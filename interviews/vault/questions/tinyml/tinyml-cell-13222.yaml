title: Recall Arithmetic Intensity Threshold for Attention on MCU
scenario: 'During an MCU transformer design review, you are asked: for a Cortex-M4 with 2.1 GFLOP/s compute
  and 1.6 GB/s memory bandwidth (SRAM), what is the roofline arithmetic intensity threshold for attention
  operations? And is standard dot-product attention compute-bound or memory-bound at sequence length 64
  with 64-dim heads?'
question: "And is standard dot-product attention compute-bound or memory-bound at sequence length 64 with 64-dim heads?"
details:
  realistic_solution: 'Arithmetic intensity threshold = compute / bandwidth = 2.1 GFLOP/s / 1.6 GB/s =
    1.31 FLOP/byte. Attention at seq=64, head_dim=64: FLOPs = 2×64×64 = 8,192 per head (QK^T) + 8,192
    (AV) = 16,384. Bytes accessed = 2×64×64×1B (K,V in INT8) = 8,192. Arithmetic intensity = 16,384/8,192
    = 2.0 FLOP/byte > 1.31. Compute-bound at seq=64. At seq=32: intensity = 0.5, memory-bound.'
  common_mistake: Confusing FLOP/s with MAC/s or using peak bandwidth instead of measured SRAM bandwidth;
    Cortex-M4 often achieves only 60-80% of peak.
  napkin_math: 'Ridge point = 2.1G / 1.6G = 1.31 FLOP/byte. Attention intensity at N=64: 2N² / (2Nd) =
    N/d = 64/64 = 1.0 FLOP/byte < 1.31 → actually memory-bound. Correction: total FLOPs vs bytes = 2N²×d
    / (2×N×d×1B) = N = 64 FLOP/byte — compute-bound.'
