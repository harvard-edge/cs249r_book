title: 'NPU to CPU Fallback Latency Analysis'
scenario: 'You are testing an int8 quantized audio classification model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform. The system features a 480 MHz M7, 512 KB of shared SRAM, and an Ethos-U55 NPU configured for 256 MAC/cycle. The team replaces a standard ReLU activation with a custom, unaccelerated ''Swish-like'' activation function on a 100,000-element feature map.'
question: 'Why does replacing ReLU with a zero-MAC custom activation increase total layer execution time by roughly 60x?'
details:
  realistic_solution: 'The latency spike occurs because the Ethos-U55 executes the heavy convolution with massive parallelism, while the unsupported activation forces the CPU to process elements sequentially from the shared 512 KB SRAM. Because the M7 lacks an accelerated SIMD implementation for this specific custom function, the integer arithmetic takes significantly more cycles per element. The combination of losing the NPU''s 256 MAC/cycle throughput pipeline and the M7 taking 12 cycles per element shifts the bottleneck entirely to the computationally ''light'' activation.'
  common_mistake: |
    **The Pitfall:** Focusing solely on the lack of MAC operations in the activation function.
    **The Rationale:** Assuming an operation with zero MACs will execute almost instantly on a 480 MHz CPU, ignoring the massive parallelism difference between NPU and CPU.
    **The Consequence:** Creating a severe bottleneck where the unoptimized scalar CPU fallback dominates the execution time, nullifying the NPU's acceleration.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU Convolution requires 5,000,000 MACs with 256 MACs/cycle.
    - CPU Fallback processes 100,000 elements at 12 cycles/element.
    - Core frequency for both M7 and U55 is 480 MHz.

    **Calculations:**
    - NPU Convolution cycles: 5,000,000 MACs / 256 MACs/cycle = 19,531 cycles.
    - CPU Fallback cycles: 100,000 elements * 12 cycles/element = 1,200,000 cycles.
    - Total NPU Time: 19,531 / 480 MHz = 41 µs.
    - Total CPU Time: (19,531 + 1,200,000) / 480 MHz = 1,219,531 / 480 MHz = 2.54 ms.

    **Conclusion & Interpretation:**
    - **Result: 61x slower (Compute-Bound)**. Speed degradation of 2.54 ms / 0.041 ms = 61x slower due to unaccelerated scalar CPU fallback.
