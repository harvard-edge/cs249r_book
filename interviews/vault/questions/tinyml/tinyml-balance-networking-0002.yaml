title: TinyML Radio Budget Spec
scenario: A battery sensor sends anomaly reports over a low-power radio. Specify the network budget needed before choosing BLE, LoRa, or Wi-Fi.
question: What network budget must be specified before choosing a TinyML sensor radio?
details:
  realistic_solution: Specify payload size, event frequency, latency target, energy per transmission, coverage range, duty-cycle limits, retry policy, and gateway availability. Radio choice depends on the communication envelope, not just peak bitrate.
  common_mistake: Choosing the highest-bitrate radio and ignoring battery, range, and duty-cycle constraints.
  napkin_math: A 10 KB report every minute is only 167 B/s on average, but if it must arrive within 1 second the burst requirement is 80 kbps.
