title: 'The Interrupt Jitter Crisis'
scenario: 'You have a vibration-analysis model running on an industrial motor''s MCU. It must sample an accelerometer via an ADC every 100 microseconds, buffer it, and run an FFT + NN inference. Occasionally, the system misses an ADC sample entirely, causing the FFT frequencies to skew and the model to output false positives. The CPU utilization is only at 60%.'
question: 'Why can a 150 us interrupt-disabled section make a 100 us ADC sampling loop drop a vibration sample at only 60% CPU?'
details:
  realistic_solution: 'You suffered from interrupt blocking (jitter). In bare-metal or RTOS systems, hardware peripherals (like the ADC) trigger an Interrupt Service Routine (ISR) to tell the CPU to read the data. If the neural network inference code (or a communication task, like sending data over WiFi) disables interrupts temporarily to update a shared memory buffer safely, the CPU goes deaf to the outside world. If the ADC fires its 100µs interrupt while the CPU is locked in a 150µs critical section, the ADC''s data register is overwritten by the next reading before the CPU ever sees it.'
  common_mistake: '"Looking at average CPU utilization and ignoring the absolute worst-case execution time (WCET) of critical interrupt service routines."'
  napkin_math: |
    **Assumptions & Constraints:**
    - Sampling rate: 10 kHz (100 µs interval)
    - Processor speed: 20 MHz
    - Critical section: 3000 clock cycles

    **Calculations:**
    - Critical section time = 3000 cycles / 20,000,000 Hz = 150 µs

    **Conclusion & Interpretation:**
    - **Result: 150 µs lock (Latency-Bound)**. The 100 µs deadline is mathematically impossible to meet during a 150 µs critical section, guaranteeing dropped data.
