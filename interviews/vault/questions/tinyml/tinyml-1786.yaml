title: MCU Power Cycle Averages
scenario: 'A Cortex-M4 microcontroller draws 10mA when active and 10uA in sleep mode at 3.3V. It wakes up for 1 second every 10 seconds to run an inference.'
question: 'Calculate the average power consumption of the microcontroller over a full 10-second cycle.'
details:
  realistic_solution: 'The active duty cycle is 1s/10s = 10%, leaving the sleep duty cycle at 90%. Average current is calculated by weighting the active and sleep currents by their respective duty cycles, then multiplying by voltage for power.'
  common_mistake: |
    **The Pitfall:** Ignoring the sleep current entirely or calculating an unweighted average.
    **The Rationale:** Candidates fail to realize that even low sleep currents matter when integrated over a massive 90% duty cycle.
    **The Consequence:** The power estimate is inaccurate, leading to poor battery sizing.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active time: 1s, Sleep time: 9s (10s total cycle).
    - Active current: 10 mA.
    - Sleep current: 0.01 mA.
    - Voltage: 3.3V.

    **Calculations:**
    - Active duty cycle: 1s / 10s = 0.1 (10%).
    - Sleep duty cycle: 0.9 (90%).
    - Average current: (0.1 * 10 mA) + (0.9 * 0.01 mA) = 1.009 mA.
    - Power = 1.009 mA * 3.3V = 3.33 mW.

    **Conclusion & Interpretation:**
    - **Result: 3.33 mW ([Power-Bound])**. Average power consumption is 3.33 mW.
