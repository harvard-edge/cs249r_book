title: MCU Power Cycle Averages
scenario: A Cortex-M4 microcontroller draws 10mA when active and 10uA in sleep mode
  at 3.3V. It wakes up for 1 second every 10 seconds to run an inference.
question: Calculate the average power consumption of the microcontroller over a full
  10-second cycle.
details:
  realistic_solution: The active duty cycle is 1s/10s = 10%, leaving the sleep duty
    cycle at 90%. Average current is calculated by weighting the active and sleep
    currents by their respective duty cycles, then multiplying by voltage for power.
  common_mistake: Ignoring the sleep current entirely or calculating the simple unweighted
    average of the two power states.
  napkin_math: Average current = (0.1 * 10mA) + (0.9 * 0.01mA) = 1.009mA. Power =
    1.009mA * 3.3V = 3.33mW.
