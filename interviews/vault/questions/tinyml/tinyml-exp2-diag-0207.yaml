title: Diagnosing Fully Connected Layer Bottlenecks on STM32F4
scenario: You have deployed an INT8 neural network on an ARM Cortex-M4 (STM32F4) microcontroller (168
  MHz, 256 KB SRAM, 1 MB flash, no FPU). Profiling reveals that while the convolutional layers match expected
  execution times, a specific fully connected layer takes 4x longer than expected based on its MAC count.
  The model uses optimized CMSIS-NN SIMD instructions (2x INT8 MACs/cycle). Diagnose the architectural
  root cause of this latency spike.
question: "Why does a CMSIS-NN fully connected layer on STM32F4 run 4x slower than its INT8 MAC count predicts?"
details:
  realistic_solution: The diagnosis is a memory bandwidth bottleneck caused by fetching weights from flash
    memory. Convolutional layers reuse weights heavily, which hides memory latency. Fully connected layers
    have no weight reuse (batch size 1); every MAC requires fetching a new weight. At 168 MHz, the STM32F4
    flash memory requires multiple wait states, whereas the 256 KB SRAM provides zero-wait-state access.
    The CPU is stalling while waiting for weights to arrive from flash.
  common_mistake: Candidates often blame CPU pipeline stalls, lack of an FPU, or assume an issue with
    the CMSIS-NN library. They frequently overlook the fact that fully connected layers are heavily memory-bound
    and fail to analyze the latency differences between SRAM and flash memory.
  napkin_math: 'Theoretical peak: 168 MHz * 2 MACs/cycle = 336 MMACs/sec. For the FC layer, 1 MAC needs
    1 weight byte. The CPU can process 4 MACs in 2 cycles. Fetching 4 weights (32 bits) from zero-wait-state
    SRAM takes 1 cycle, easily keeping the SIMD units fed. However, at 168 MHz, STM32F4 flash requires
    5 wait states, meaning a 32-bit read takes 6 cycles. Thus, computing 4 MACs from flash takes 6 cycles
    (fetch) + 2 cycles (compute, partially overlapped) ≈ 6-8 cycles, compared to ~2 cycles from SRAM.
    This perfectly explains the observed 3x to 4x slowdown.'
