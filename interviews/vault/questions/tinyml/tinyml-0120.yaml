title: On-Device Anomaly Detection System
scenario: You're deploying 500 vibration sensors on industrial motors for predictive maintenance. Each
  sensor has a Cortex-M4F (256 KB SRAM, 1 MB flash) with a 3-axis accelerometer sampling at 3.2 kHz. The
  system must detect bearing faults (inner race, outer race, ball, cage defects) with <1% false positive
  rate and <5% false negative rate. The models must run entirely on-device — no cloud dependency. Design
  the anomaly detection pipeline, including feature extraction, model architecture, and the threshold
  calibration strategy.
details:
  realistic_solution: 'Hybrid pipeline: (1) Feature extraction — 3x 1600-point FFT (CMSIS-DSP) per 1-second
    window extracts frequency-domain features in 6ms. Compute spectral kurtosis, envelope spectrum peaks,
    and band energy ratios in 1ms. (2) ML classifier — a 2-layer fully-connected network (512 input features,
    64 hidden, 4 fault classes) at 2 KB weights, runs in 6 microseconds. Total: 7ms per window, 0.7% CPU
    utilization. (3) Threshold calibration — per-motor baseline during healthy operation, exponentially-weighted
    moving average for drift compensation. False positive rate <1% via per-motor thresholds rather than
    global thresholds. Battery: 264 days on AA lithium.'
  common_mistake: '"Train a CNN on raw accelerometer data." Raw 3-axis accelerometer data at 3.2 kHz generates
    19.2 KB/s. A 1-second window is 19.2 KB — feeding this directly to a CNN requires a large input layer
    and wastes compute on learning features that signal processing can extract analytically.'
  napkin_math: 'Feature extraction: 3-axis x 1,024-point FFT (3.2 kHz for 320 ms window, zero-padded to
    1,024 for radix-2 efficiency) on M4F with CMSIS-DSP = 3 × 2ms = 6ms. Feature computation: 1ms. Inference:
    6 µs. Total: 7ms per 1-second window. CPU utilization: 0.7%. Power: 0.007 × 30 mW + 0.993 × 0.5 mW
    = 0.71 mW. Battery life (AA lithium, 3,000 mAh, 1.5V): 3,000 × 1.5 / 0.71 = 6,338 hours = 264 days.
    Model size: 2 KB weights + 1 KB arena = 3 KB total. Flash usage: 3 KB / 1 MB = 0.3%. You could fit
    300+ models in flash. The feature extraction (FFT) dominates compute, not the ML model — a common
    pattern in TinyML where the "ML" part is trivially small.'
