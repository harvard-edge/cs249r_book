title: The Silent Misfire
scenario: You are debugging a keyword spotting model on a Cortex-M4 based device. The model was trained in FP32 and works perfectly. To save Flash space, you use post-training quantization to convert the entire model to INT8, using a calibration dataset of speech recorded in a quiet office. Now, when testing in a real-world environment with background noise, the device frequently misfires. `dmesg` shows no hardware errors.
question: Why does quiet-office PTQ calibration make a Cortex-M4 KWS model misfire in busy-street noise?
details:
  realistic_solution: The most likely cause is activation overflow. The INT8 data type has a fixed range of [-128, 127]. The quantization scale factor was calculated using the quiet audio from the calibration set. Loud background noise in the real world pushes the values of the input features and intermediate activations beyond the maximum value captured during calibration. These values are then 'clipped' to 127, distorting the feature maps passed to subsequent layers and leading to incorrect classifications. The solution is to use a more representative calibration dataset that includes noisy environments.
  common_mistake: |
    **The Pitfall:** Blaming the INT8 format itself for sudden accuracy collapse.
    **The Rationale:** Engineers assume INT8 lacks the capacity for the task, forgetting that calibration data's dynamic range governs the scaling factors.
    **The Consequence:** The system suffers severe activation clipping in noisy environments, destroying accuracy.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Precision: INT8 (range [-128, 127]).
       - Calibration Max Activation: 6.0.
       - Noisy Input Max Activation: 9.0.
    2. **Calculations:**
       - Scale Factor: 127 / 6.0 = 21.17.
       - Quiet Input (5.5): round(5.5 * 21.17) = 116 (Fits).
       - Noisy Input (9.0): round(9.0 * 21.17) = 190 (Exceeds 127).
       - Information Loss: (190 - 127) / 190 = 33.1% clipping error.
    3. **Conclusion & Interpretation:**
       - **Result: Precision-Bound** (Unrepresentative calibration datasets cause severe INT8 activation clipping under real-world noise).
  options:
  - Weight overflow occurred during the conversion process.
  - The Cortex-M4 CPU has bugs in its INT8 processing instructions.
  - The model's activations are clipping because the calibration data did not capture the full dynamic range of real-world inputs.
  - The model requires FP32 precision and is too complex for INT8 quantization to ever work.
  correct_index: 2
