title: TFLite Micro vs AOT Compilation on nRF5340
scenario: Your team is deploying an anomaly detection model on a Nordic nRF5340 MCU (128 MHz app core, 64 MHz net core, 256 KB SRAM, 1 MB flash) with an active current budget of ~5mA. You must evaluate converting the ONNX model to TFLite and using the TFLite Micro (TFLM) interpreter versus using an Ahead-Of-Time (AOT) compiler to generate static C code directly from the ONNX graph.
question: How do TFLite Micro and AOT compilation compare regarding SRAM footprint, operator support, and runtime overhead on the nRF5340?
details:
  realistic_solution: A strong L5 candidate will advocate for the AOT compilation approach. They will point out that TFLM introduces a fixed SRAM overhead for the micro-interpreter and requires dynamic tensor arena allocation, which is risky on a 256 KB device. By AOT compiling, we strip out the interpreter, statically allocate memory, and potentially avoid ONNX-to-TFLite conversion bugs, saving crucial SRAM and CPU cycles (lowering active time and preserving the ~5mA budget).
  common_mistake: |
    **The Pitfall:** Blindly recommending TFLite Micro because it is the industry standard.
    **The Rationale:** Candidates often default to TFLM without realizing that its micro-interpreter and dynamic tensor arena introduce fixed SRAM overheads that are highly detrimental on a 256 KB device.
    **The Consequence:** The TFLM interpreter consumes ~30 KB of critical SRAM, leaving dangerously tight margins for the RTOS and potentially causing out-of-memory crashes.
  napkin_math: |
    - **Total SRAM:** 256 KB.
    - **System Overhead:** Zephyr RTOS + BLE 5.3 stack = 64 KB.
    - **Remaining App SRAM:** 256 KB - 64 KB = 192 KB.
    - **Model Activations:** 140 KB.
    - **TFLM Overhead (Alternative A):** 140 KB + 30 KB (interpreter) = 170 KB. Remaining = 22 KB (dangerously tight).
    - **AOT Compilation (Alternative B):** 140 KB + 0 KB (static C) = 140 KB. Remaining = 52 KB (safe margin).
    - **Conclusion:** **AOT compilation saves ~30 KB of SRAM by stripping out the dynamic interpreter, providing a safer margin.**
