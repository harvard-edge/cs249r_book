title: The Wildlife Camera's Lifespan
scenario: You're designing a battery-powered wildlife camera using a Cortex-M4 microcontroller. The device
  wakes up once every 10 seconds to perform an inference that takes 1 second. When active, the system
  consumes 50 mW. In its deep sleep state, it consumes 1 mW. Given a 675 mWh battery, calculate the approximate
  operational lifespan of the device in days.
details:
  realistic_solution: The correct way to calculate lifespan is to first find the weighted average power
    consumption. The device is active for 1s and sleeps for 9s in each 10-second cycle. The average power
    is the total energy per cycle divided by the cycle duration. Once you have the true average power,
    you can divide the total battery energy by this average to find the lifespan.
  common_mistake: Engineers often calculate average power by either ignoring the sleep state's consumption
    (assuming it's negligible), or by incorrectly averaging the active and sleep power values without
    weighting them by the time spent in each state. Both mistakes lead to a significant miscalculation
    of battery life.
  napkin_math: 'In a 10-second cycle, the camera is active for 1s (inference) and in deep sleep for 9s.
    Active energy: 1s * 50mW = 50 mJ. Sleep power is 10 µW (0.01 mW). Sleep energy: 9s * 0.01mW = 0.09
    mJ. Total energy per 10s cycle = 50.09 mJ. Average power consumption = 50.09 mJ / 10s = ~5.01 mW.
    Using a standard 10Wh battery, the lifespan is 10Wh / 5.01mW = 1996 hours (~83 days).'
  options:
  - ~1.1 days
  - ~5.6 days
  - ~4.8 days
  - ~0.6 days
  correct_index: 2
