title: The Wildlife Camera's Lifespan
scenario: You're designing a battery-powered wildlife camera using a Cortex-M4 microcontroller. The device wakes up once every 10 seconds to perform an inference that takes 1 second. When active, the system consumes 50 mW. In its deep sleep state, it consumes 1 mW. Given a 675 mWh battery, calculate the approximate operational lifespan of the device in days.
question: What is the approximate battery life in days after computing the wildlife camera's duty-cycled average power?
details:
  realistic_solution: The correct way to calculate lifespan is to first find the weighted average power consumption. The device is active for 1s and sleeps for 9s in each 10-second cycle. The average power is the total energy per cycle divided by the cycle duration. Once you have the true average power, you can divide the total battery energy by this average to find the lifespan.
  common_mistake: |
    **The Pitfall:** Calculating average power by ignoring the sleep state's consumption or incorrectly averaging the values without weighting them by time.
    **The Rationale:** Engineers apply basic averages instead of duty-cycled weighted averages, failing to account for the massive time duration spent in sleep mode.
    **The Consequence:** A significant miscalculation of battery life, leading to unexpected field failures and battery replacements.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cycle: 10 seconds (1s active, 9s sleep).
       - Active Power: 50 mW.
       - Sleep Power: 1 mW.
       - Battery Capacity: 675 mWh.
    2. **Calculations:**
       - Active energy: 1s * 50mW = 50 mJ.
       - Sleep energy: 9s * 1mW = 9 mJ.
       - Total energy per 10s cycle = 59 mJ.
       - Average power consumption = 59 mJ / 10s = 5.9 mW.
       - Lifespan: 675 mWh / 5.9 mW = 114.4 hours.
       - Lifespan in days: 114.4 hours / 24 hours/day = ~4.8 days.
    3. **Conclusion & Interpretation:**
       - **Result: ~4.8 days (Energy-Feasible).** The device will operate for roughly 4.8 days based on the duty-cycled average power.
  options:
  - ~1.1 days
  - ~5.6 days
  - ~4.8 days
  - ~0.6 days
