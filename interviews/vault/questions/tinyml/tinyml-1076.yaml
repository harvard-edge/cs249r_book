title: Tensor Arena Peak Overlap Analysis
scenario: You are deploying a quantized vision model on an ARM Cortex-M4 (STM32F4) with 256 KB SRAM, 1 MB flash, and CMSIS-NN. The runtime uses a flat tensor arena for static memory allocation. During a specific Conv2D layer execution, the planner must hold the input activation tensor (120 KB), allocate a scratch buffer for the CMSIS-NN im2col operation (60 KB), and reserve space for the output activation tensor (90 KB).
question: "Why does the static memory planner fail with an OOM error at the Conv2D layer, despite the largest single tensor fitting in SRAM?"
details:
  realistic_solution: In a flat tensor arena, memory is statically planned based on tensor lifespans. During the execution of a layer, the memory must simultaneously hold the input tensor (which is still being read), the output tensor (which is being written to), and any temporary scratch buffers required by the compute kernel. Since CMSIS-NN requires an im2col buffer to utilize the 2x INT8 MACs/cycle efficiently, this scratch space overlaps with the I/O tensors, pushing the peak SRAM usage beyond the physical limit.
  common_mistake: |
    **The Pitfall:** Assuming peak memory is simply the size of the largest single tensor in the network.
    **The Rationale:** Candidates forget that input and output tensors must coexist in memory during a layer's execution, alongside library scratchpads.
    **The Consequence:** The model crashes with OOM during the memory allocation phase because the overlapping lifespans exceed SRAM.
  napkin_math: |
    * Peak SRAM Required = Input Tensor (120 KB) + Output Tensor (90 KB) + CMSIS-NN Scratch Buffer (60 KB).
    * Total Peak = 120 + 90 + 60 = **270 KB**.
    * Since 270 KB strictly exceeds the 256 KB physical SRAM available on the STM32F4, the arena planning fails.
