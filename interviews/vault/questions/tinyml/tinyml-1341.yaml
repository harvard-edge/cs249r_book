title: Latency Decomposition for Keyword Spotting on ARM Cortex-M4
scenario: You are tasked with deploying a real-time keyword spotting model on an ARM Cortex-M4 STM32F4 microcontroller (168 MHz clock, 256 KB SRAM, no FPU). The strict end-to-end latency requirement from audio input to detected keyword output is 100ms.
question: How you would systematically decompose, measure, and analyze each component on this resource-constrained embedded platform to meet the latency target?
details:
  realistic_solution: "To accurately decompose and measure latency on the STM32F4, one would: \n1. **Instrument with Hardware Timers:** Utilize the microcontroller's internal timers (e.g., DWT_CYCCNT, TIMx peripherals) to precisely timestamp the start and end of each processing stage. \n2. **Model Inference (TTFT/TPOT):** Profile the execution time of the quantized model's main loop and individual layers. Analyze memory access patterns and data caching (or lack thereof) effects. \n3. **Data Acquisition/Network:** Measure the time taken for analog-to-digital conversion (ADC) or digital audio interface (I2S) transfers and any subsequent memory buffering. If communicating with another chip, profile SPI/I2C/UART transfer times. \n4. **Preprocessing:** Profile audio feature extraction (e.g., MFCCs) implemented in fixed-point arithmetic. Optimize buffer management to reduce memory copy overheads. \n5. **Postprocessing:** Measure the time for decision logic, filtering, and any output actions (e.g., LED toggling, sending command over UART). \n6. **Tooling:** Use a hardware debugger (e.g., J-Link, ST-Link with STM32CubeIDE or Keil µVision) to set breakpoints and observe cycle counts, analyze execution trace, and monitor stack/heap usage. For lack of FPU, ensure all math is explicitly fixed-point and avoid implicit floating-point conversions."
  common_mistake: |
    **The Pitfall:** Focusing only on the model inference time (TTFT/TPOT) and neglecting other significant overheads.
    **The Rationale:** Developers often rely strictly on high-level library profiles and assume data acquisition, memory copying, and preprocessing are instantaneous.
    **The Consequence:** The system misses its strict latency deadlines in production because of hidden overheads like OS context switching and inefficient software-emulated fixed-point math, leading to failed system validations.
  napkin_math: |
    - Clock speed: 168 MHz, cycle duration = 1 / 168M ≈ **5.95 ns**.
    - Target Latency: 100 ms.
    - Total Cycles Budget: 100 ms / 5.95 ns/cycle ≈ **16.8 million cycles**.
    - Model MACs: 5 million.
    - Fixed-point arithmetic overhead (no FPU): ~6 cycles/MAC (average data fetch/store + compute).
    - Model Inference Cycles: 5M MACs × 6 cycles/MAC = **30 million cycles**.
    - Inference Time: 30 million cycles × 5.95 ns/cycle ≈ **178.5 ms**.
    - Conclusion: The 178.5 ms inference alone exceeds the 100 ms target, proving aggressive quantization or model compression is mandatory before even considering preprocessing.
