title: Latency Decomposition for Keyword Spotting on ARM Cortex-M4
scenario: You are tasked with deploying a real-time keyword spotting model on an ARM Cortex-M4 STM32F4 microcontroller (168 MHz clock, 256 KB SRAM, no FPU). The strict end-to-end latency requirement from audio input to detected keyword output is 100ms.
question: How you would systematically decompose, measure, and analyze each component on this resource-constrained embedded platform to meet the latency target?
details:
  realistic_solution: "To accurately decompose and measure latency on the STM32F4, one would: \n1. **Instrument with Hardware Timers:** Utilize DWT cycle counters and ETM tracing to precisely timestamp the start and end of each processing stage. \n2. **Model Inference (TTFT/TPOT):** Profile the execution time of the quantized model's main loop and individual layers using nsys profiling equivalents. \n3. **Data Acquisition/Network:** Measure the time taken for analog-to-digital conversion (ADC) or digital audio interface (I2S) transfers and any subsequent DMA memory buffering. \n4. **Preprocessing:** Profile audio feature extraction (e.g., MFCCs) implemented in fixed-point arithmetic. Optimize buffer management to reduce memory copy overheads. \n5. **Postprocessing:** Measure the time for decision logic, filtering, and any output actions. \n6. **Tooling:** Use a hardware debugger (e.g., J-Link) to set breakpoints and observe cycle counts. For lack of FPU, ensure all math is explicitly fixed-point and avoid implicit floating-point conversions."
  common_mistake: |
    **The Pitfall:** Focusing only on the model inference time (TTFT/TPOT) and neglecting other significant I/O overheads.
    **The Rationale:** Developers often rely strictly on high-level library profiles and assume data acquisition, memory copying, and preprocessing are instantaneous.
    **The Consequence:** The system misses its strict latency deadlines in production because of hidden overheads like OS context switching and inefficient software-emulated fixed-point math, leading to failed system validations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - STM32F4 (168 MHz, no FPU).
       - Target Latency: 100 ms.
       - Model MACs: 5 million.
       - Fixed-point arithmetic overhead: ~6 cycles/MAC.
    2. **Calculations:**
       - Clock cycle duration: 1 / 168 MHz ≈ 5.95 ns.
       - Total Cycles Budget: 100 ms / 5.95 ns/cycle ≈ 16.8 million cycles.
       - Model Inference Cycles: 5,000,000 MACs × 6 cycles/MAC = 30,000,000 cycles.
       - Inference Time: 30,000,000 cycles × 5.95 ns/cycle ≈ 178.5 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Latency Violation.** The 178.5 ms inference alone exceeds the 100 ms target, proving aggressive quantization or model compression is mandatory before preprocessing overhead is even considered.
