title: TinyML Gateway Burst Capacity
scenario: A gateway receives anomaly reports from 2,000 sensors after a power event. Each report is 2 KB and the gateway uplink to cloud is 5 Mbps. Estimate the minimum time to drain the burst.
question: How long does a gateway need to upload 2,000 TinyML reports of 2 KB each over a 5 Mbps uplink?
details:
  realistic_solution: Total data is 4,000 KB, or 32 megabits. At 5 Mbps, the lower-bound drain time is 6.4 seconds. Retries and protocol overhead increase this, so the gateway should buffer and rate-limit reports.
  common_mistake: Assuming each report is tiny and ignoring synchronized fleet bursts.
  napkin_math: 2,000 x 2 KB = 4,000 KB = 32 Mb. Time = 32 / 5 = 6.4 s.
