title: INT4 Weight Quantization Feasibility for Cortex-M4 Without DSP
scenario: A Cortex-M4 without DSP extension (base M4) needs to run a 200KB INT8 model in 64KB flash budget. INT4 compression would halve storage to 100KB. However, the M4 without DSP lacks SIMD for efficient INT4 unpacking.
question: Is INT4 worthwhile for a 200 KB INT8 model on a Cortex-M4 without DSP when the flash budget is 64 KB?
details:
  realistic_solution: 'Cortex-M4 (no DSP): no SIMD packed operations. INT4 unpacking requires: load byte, mask nibble, shift → 3-4 instructions per weight vs 1 for INT8. Throughput: INT8 at 64MHz: ~64M inferences/sec (scalar); INT4 effectively: 64M/3.5 ≈ 18M — 3.5× slower than INT8. Flash: 200KB → 100KB with INT4 — fits 64KB only if using another 40% compression (Huffman). Better approach: prune model to 64KB INT8 (32K INT8 params = 32KB code + 32KB data). Or use INT8 with 32KB flash model (aggressive NAS + pruning). INT4 on base M4 adds complexity without throughput benefit — not recommended.'
  common_mistake: |
    **The Pitfall:** Assuming INT4 automatically runs faster.
    **The Rationale:** Candidates assume lower precision natively correlates to faster execution times.
    **The Consequence:** Without hardware support for INT4 SIMD, manual bit-shifting cripples performance, making the system vastly slower than simple INT8 reads.
  napkin_math: |
    - INT4 unpacking takes 3-4 instructions vs 1 for INT8 (3.5x slower latency).
    - INT4 model size: 100KB (Still > 64KB flash budget, requires further compression).
    - Pruned INT8 model: 64K parameters = 64KB (Fits exactly).
    - **Recommend: INT8 pruned model, avoid INT4.**
