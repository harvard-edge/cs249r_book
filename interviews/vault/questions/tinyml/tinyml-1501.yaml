title: INT4 Weight Quantization Feasibility for Cortex-M4 Without DSP
scenario: A Cortex-M4 without DSP extension (base M4) needs to run a 200KB INT8 model
  in 64KB flash budget. INT4 compression would halve storage to 100KB. However, the
  M4 without DSP lacks SIMD for efficient INT4 unpacking. Evaluate INT4 feasibility
  given the hardware constraint.
question: Is INT4 worthwhile for a 200 KB INT8 model on a Cortex-M4 without DSP when
  the flash budget is 64 KB?
details:
  realistic_solution: 'Cortex-M4 (no DSP): no SIMD packed operations. INT4 unpacking
    requires: load byte, mask nibble, shift → 3-4 instructions per weight vs 1 for
    INT8. Throughput: INT8 at 64MHz: ~64M inferences/sec (scalar); INT4 effectively:
    64M/3.5 ≈ 18M — 3.5× slower than INT8. Flash: 200KB → 100KB with INT4 — fits 64KB
    only if using another 40% compression (Huffman). Better approach: prune model
    to 64KB INT8 (32K INT8 params = 32KB code + 32KB data). Or use INT8 with 32KB
    flash model (aggressive NAS + pruning). INT4 on base M4 adds complexity without
    throughput benefit — not recommended.'
  common_mistake: Assuming INT4 always runs faster than INT8 on MCUs; without SIMD
    support, INT4 requires bit manipulation to unpack weights, which is slower than
    direct INT8 SRAM reads.
  napkin_math: 'INT4 unpacking: 3-4 instructions vs 1 INT8. Slowdown: 3.5×. INT4 model:
    100KB still > 64KB flash. Needs additional compression. INT8 pruned model: 64K
    params × 1B = 64KB → fits exactly. Pruning 200K→64K params: aggressive but achievable
    with NAS. Recommend: INT8 pruned, not INT4.'
