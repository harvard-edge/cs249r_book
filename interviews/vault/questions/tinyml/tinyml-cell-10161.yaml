title: 'Specification: define CNN architecture constraints for Cortex-M4 vision inference'
scenario: You are writing the architectural specification for a TinyML CNN that must run inference on
  a Cortex-M4 (168MHz, 256KB SRAM, 512KB Flash) for a 3-class fault detection system using 64×64 grayscale
  images from a vibration sensor. Write the complete model architecture constraints, memory budget, and
  performance spec.
details:
  realistic_solution: 'Spec: (1) Architecture: depthwise separable CNN, max 6 layers; (2) Input: 64×64×1
    INT8; (3) Max MACs: 5M (target <100ms at 168MHz, 50M MACs/sec via SIMD); (4) Flash budget: model weights
    ≤128KB (leaving 384KB for firmware); (5) SRAM budget: TFLite Micro arena ≤128KB (leaving 128KB for
    OS + stack); (6) Activation functions: ReLU6 only (CMSIS-NN optimized); (7) Channel counts: multiples
    of 8 for SIMD efficiency; (8) Performance: fault-class recall ≥99%, false alarm rate ≤5% on 500-sample
    test set; (9) Latency: ≤150ms per inference (updated at 6.7 Hz); (10) Quantization: INT8 QAT, accuracy
    drop vs FP32 ≤2%.'
  common_mistake: Specifying accuracy in terms of top-1 on a benchmark dataset rather than the specific
    fault-detection precision/recall requirements (e.g., 99% recall for fault class is the safety-critical
    metric, not 85% top-1 average accuracy).
  napkin_math: 'SRAM budget: 128KB arena. Peak activation: 64×64×8 = 32KB (early layer). With ping-pong:
    32KB + 16KB (half-spatial next layer) = 48KB. Weights in arena if using mmap: 0. Static weights in
    Flash: up to 128KB → 128K params INT8. 128K params with MobileNetV1 density (~4 MACs/param): 512K
    MACs. That exceeds 5M MACs target — so 128K params ceiling is fine. Flash: 128KB weights + overhead.
    At 128K params INT8: model can have 8 DW blocks with C=32 → 32×9 × 8 = 2.3KB DW weights + 32×32 ×
    8 = 8.2KB PW weights → 10.5KB total, well under 128KB limit. Target: >90% Flash utilization for accuracy.'
