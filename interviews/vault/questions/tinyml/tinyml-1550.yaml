title: I2C Sensor Polling Congestion
scenario: A primary Cortex-M4 polls 3 secondary sensors via a single 400 kHz I2C bus to gather INT8 features. Each poll response consists of 32 bytes of feature data plus 3 bytes of addressing and I2C overhead.
question: Calculate the theoretical maximum uniform polling frequency (Hz) for the entire 3-sensor array before saturating the I2C bus.
visual:
  kind: svg
  path: tinyml-1550.svg
  alt: Tree structure showing a single Cortex-M4 master polling three separate sensors over a shared I2C bus.
  caption: I2C Polling Topology
details:
  realistic_solution: Each sensor payload is 32 + 3 = 35 bytes. A byte over I2C requires 9 clock cycles (8 data bits + 1 ACK bit). Therefore, one sensor transaction requires 35 * 9 = 315 cycles. Polling all 3 sensors takes 315 * 3 = 945 cycles. Given the bus clock is 400,000 Hz, the maximum polling rate is 400,000 / 945 = 423.28 Hz.
  common_mistake: |
    **The Pitfall:** Assuming 1 byte equals exactly 8 bits on the physical I2C wire.
    **The Rationale:** Candidates calculate raw throughput via 8-bit bytes, omitting the mandatory hardware ACK bit appended to every byte transmission.
    **The Consequence:** Artificially inflating the maximum polling frequency, leading to mysterious bus saturation and dropped sensor readings in production.
  napkin_math: |
    - Each sensor payload: 32 + 3 = 35 bytes.
    - I2C byte size: 8 data bits + 1 ACK bit = 9 bits (cycles).
    - Cycles per sensor: 35 * 9 = 315 cycles.
    - Cycles for 3 sensors: 315 * 3 = 945 cycles.
    - Max polling frequency: 400,000 Hz / 945 cycles = **423.28 Hz**.
