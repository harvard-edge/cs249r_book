title: The Input-Dependent Watchdog Reset
scenario: 'Your team is optimizing a pruned, keyword-spotting CNN on a Cortex-M4 microcontroller with
  256KB of SRAM and a 150ms watchdog timer. To meet a strict 100ms latency budget, an engineer fuses several
  CONV-RELU layers into a single, large kernel. Benchmarks on typical audio are great: average latency
  drops from 95ms to 70ms. However, after deploying to a fleet of devices, you get reports of random watchdog
  resets. Your investigation reveals the resets only happen in noisy environments (e.g., near a running
  microwave). When profiling with these noisy clips, the fused kernel''s execution time skyrockets to
  140ms, violating the deadline and causing the watchdog to trip. The non-fused version, while slower
  on average, only hits 110ms in the worst case and never resets. Evaluate the decision to fuse the layers.
  Why did an optimization that improved average-case compute latency lead to a catastrophic, input-dependent
  failure?'
question: "Why did an optimization that improved average-case compute latency lead to a catastrophic, input-dependent failure?"
details:
  realistic_solution: The core issue is a failure to evaluate the system's worst-case behavior, particularly
    the interaction between software optimizations and specialized hardware features. The optimization
    was evaluated on average-case compute, but the failure mode was in worst-case memory transfer time.
  common_mistake: Engineers often assume the failure is a software bug in the fused kernel's logic or
    a numerical instability from pruning. While possible, the input-dependent nature points to a systemic
    hardware-software interaction. Another common guess is instruction cache misses from the larger kernel,
    but on microcontrollers, the bottleneck is almost always SRAM bandwidth and latency, not instruction
    decoding.
  napkin_math: 'Cortex-M4 at 168 MHz, 256KB SRAM. Fused kernel: clean audio (sparse activations) → many
    zeros skipped, 70 ms. Noisy audio → dense activations, zero-skipping disabled, all MAC operations
    execute. Unfused: 9×9 conv = 81 MACs/pixel vs fused 9×9 = 81 MACs but with larger intermediate buffer
    (e.g., 32×16×16 = 8,192 activations × 1B = 8KB). Dense input fills full buffer → cache thrashing in
    256KB SRAM, memory stalls add ~70 ms → total 140 ms. While 140 ms is under the 150 ms watchdog, the
    timing is dangerously close and leaves only 10 ms margin. In practice, interrupt handling and OS jitter
    consume 5–10 ms, pushing the worst case past the 150 ms limit. Unfused version: smaller per-layer
    buffers (~2KB each), worst-case only 110 ms. Lesson: WCET, not average, governs safety-critical systems.'
