title: Roofline Ridge Point Calculation on Ethos-U55
scenario: You are deploying a vision model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300)
  platform. The M7 and Ethos-U55 run at 480 MHz and share 512 KB of SRAM over an 8-byte
  per cycle interface. Assuming the Ethos-U55 is configured for 256 MACs/cycle, calculate
  the system's peak compute in GOPS and the roofline ridge point to determine if a
  layer with an arithmetic intensity of 16 OPs/byte is compute-bound or memory-bound.
question: What are the Ethos-U55 peak GOPS, SRAM roofline ridge point, and bottleneck
  for a 16 OP/byte layer?
details:
  realistic_solution: The correct approach requires calculating the theoretical peak
    operations per second and the theoretical peak memory bandwidth. The ridge point
    is the ratio of peak compute to peak memory bandwidth. Layers with an arithmetic
    intensity below this ridge point are fundamentally memory-bound because the system
    cannot fetch data fast enough to keep the MAC units fully utilized.
  common_mistake: Candidates often forget to multiply MACs by 2 to get Operations
    (since 1 MAC = 1 multiply + 1 accumulate), underestimating peak compute by half.
    They may also confuse the relationship between arithmetic intensity and the ridge
    point, incorrectly identifying a low-intensity layer as compute-bound.
  napkin_math: '1. Peak Compute: 480 MHz * 256 MACs/cycle * 2 OPs/MAC = 245.76 GOPS.
    2. Peak SRAM Bandwidth: 480 MHz * 8 bytes/cycle = 3.84 GB/s. 3. Ridge Point: 245.76
    GOPS / 3.84 GB/s = 64 OPs/byte. 4. Conclusion: The layer''s arithmetic intensity
    of 16 OPs/byte is strictly less than the 64 OPs/byte ridge point, meaning the
    workload is heavily memory-bound.'
