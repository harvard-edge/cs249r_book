title: Vibration-Based Predictive Maintenance
scenario: Design a vibration-based predictive maintenance system for 500 industrial motors using Cortex-M4 sensors. The system must detect bearing degradation 2 weeks before failure, run for 2 years on a battery, and cost less than $30 per sensor in BOM.
question: How would you design a vibration-based predictive maintenance system for 500 industrial motors using Cortex-M4 sensors?
details:
  realistic_solution: Design from the constraints inward. Budget 171 µW from a CR2477 coin cell. Allocate low-power accelerometer sampling and BLE advertisements, triggering a lightweight INT8 CNN inference only when anomalies are structurally detected. Utilize CMSIS-DSP for efficient FFT preprocessing and keep the active tensor arena well under the SRAM limits to prevent flash swapping.
  common_mistake: |
    **The Pitfall:** Proposing to sample at high frequency, run a large model, and transmit raw data to the cloud.
    **The Rationale:** Candidates apply cloud-first architectures without respecting edge constraints.
    **The Consequence:** The design simultaneously blows the power budget, the SRAM budget, and the $30 BOM target.
  napkin_math: |
    **Assumptions & Constraints:**
    - Battery: CR2477 (3 Wh over 2 years) = 171 µW average limit.
    - Sensor + Sleep + BLE Power: 20.4 µW.
    - Inference: 15 ms every 60 s at 3 mW.
    - Hardware limits: 256 KB SRAM, 1 MB Flash, $30 BOM.

    **Calculations:**
    - Inference Duty Cycle: 15 / 60000 = 0.025%.
    - Inference Power: 3 mW * 0.00025 = 0.75 µW.
    - Total Power: 20.4 + 0.75 = 21.15 µW.
    - Memory: 36.2 KB SRAM (14%), 90 KB Flash (9%).

    **Conclusion & Interpretation:**
    - **Result: 21.15 µW (Energy-Abundant)**. The 21.15 µW draw is easily sustained by the 171 µW budget, proving the architectural feasibility.
