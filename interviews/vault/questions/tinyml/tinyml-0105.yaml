title: Vibration-Based Predictive Maintenance
scenario: Design a vibration-based predictive maintenance system for 500 industrial motors using Cortex-M4
  sensors. The system must detect bearing degradation 2 weeks before failure, run for 2 years on a battery,
  and cost less than $30 per sensor in BOM. Walk through the full system design.
question: "How would you design a vibration-based predictive maintenance system for 500 industrial motors using Cortex-M4 sensors?"
details:
  realistic_solution: 'Design from the constraints inward. Power budget: 171 uW average from CR2477 (1000
    mAh at 3V = 3 Wh over 2 years). Allocation: accelerometer at 25 Hz = 14.4 uW. MCU sleep = 3 uW. MCU
    wake for inference (15 ms every 60 s at 3 mW) = 0.75 uW. BLE advertisement (2 ms every 10 s at 15
    mW) = 3 uW. Total = 21.15 uW, well within 171 uW budget with 88% margin for BLE connections and peak
    events. Memory budget on Cortex-M4 (256 KB SRAM, 1 MB flash): sensor buffer = 19.2 KB (25 Hz x 3 axes
    x 2 bytes x 128 samples). FFT workspace = 2 KB. Model weights = 15 KB (pruned 8-bit CNN). Tensor arena
    = 8 KB. Total SRAM = 44.2 KB of 256 KB (17%). Flash: 15 KB model + 40 KB firmware = 55 KB of 1 MB
    (5.5%). BOM: MCU ($3) + accelerometer ($1.50) + BLE SoC ($2) + CR2477 ($1.50) + PCB + passives + enclosure
    = ~$18-22, within $30 target.'
  common_mistake: '"Sample at high frequency, run a big model, transmit everything to the cloud." This
    blows the power budget, the memory budget, and the BOM budget simultaneously.'
  napkin_math: 'BOM: $30 (OK). Power: 14.4 µW average (budget: 171 µW) (OK). Memory: 19.2 KB sensor data
    + 2 KB FFT workspace + 15 KB tensor arena = 36.2 KB SRAM (budget: 256 KB) (OK). Flash: 50 KB model
    weights + 40 KB firmware = 90 KB (budget: 1 MB) (OK). Detection lead time: bearing degradation increases
    vibration RMS by 3-6 dB over 2-4 weeks. Sampling every 10 minutes captures the trend with 2-week advance
    warning. Cost per motor-year of monitoring: $30 BOM amortized over 2-year battery life = $15/year
    hardware cost. Unplanned motor failure cost: $5,000-50,000. ROI: 2000-20,000×.'
