title: Vibration-Based Predictive Maintenance
scenario: >
  Design a vibration-based predictive maintenance system for 500 industrial motors using Cortex-M4 sensors. The system must detect bearing degradation 2 weeks before failure, run for 2 years on a battery, and cost less than $30 per sensor in BOM. Walk through the full system design.
question: >
  How would you design a vibration-based predictive maintenance system for 500 industrial motors using Cortex-M4 sensors?
details:
  realistic_solution: >
    Design from the constraints inward. Power budget: 171 uW average from CR2477 (1000 mAh at 3V = 3 Wh over 2 years). Allocation: accelerometer at 25 Hz = 14.4 uW. MCU sleep = 3 uW. MCU wake for inference (15 ms every 60 s at 3 mW) = 0.75 uW. BLE advertisement (2 ms every 10 s at 15 mW) = 3 uW. Total = 21.15 uW, well within 171 uW budget with 88% margin for BLE connections and peak events. Memory budget on Cortex-M4 (256 KB SRAM, 1 MB flash): sensor buffer = 19.2 KB (25 Hz x 3 axes x 2 bytes x 128 seconds). FFT workspace = 2 KB. Tensor arena = 15 KB. Total SRAM = 36.2 KB of 256 KB (14%). Flash: 50 KB model weights + 40 KB firmware = 90 KB of 1 MB (9%). BOM: MCU ($3) + accelerometer ($1.50) + BLE SoC ($2) + CR2477 ($1.50) + PCB + passives + enclosure = ~$18-22, within $30 target.
  common_mistake: |
    **The Pitfall:** Proposing to "sample at high frequency, run a big model, and transmit everything to the cloud."
    **The Rationale:** Candidates apply cloud-first architectures without respecting embedded constraints.
    **The Consequence:** This blows the power budget, the memory budget, and the BOM budget simultaneously.
  napkin_math: |
    - **Power Budget:** CR2477 (1000 mAh at 3V = 3 Wh over 2 years) = 171 μW average limit.
    - **Power Draw:** Accelerometer (25 Hz) = 14.4 μW. MCU sleep = 3 μW. MCU inference (15 ms every 60 s at 3 mW) = 0.75 μW. BLE (2 ms every 10 s at 15 mW) = 3 μW.
    - **Total Power:** ~21.15 μW, comfortably under the 171 μW budget.
    - **Memory Budget:** Sensor buffer = 19.2 KB. FFT workspace = 2 KB. Tensor arena = 15 KB. Total SRAM = 36.2 KB (14% of 256 KB). Total Flash = 90 KB (9% of 1 MB).
    - **BOM Cost:** MCU ($3) + accelerometer ($1.50) + BLE SoC ($2) + CR2477 ($1.50) + PCB/passives/enclosure = ~$18-22, under the $30 target.
    - **ROI:** A $30 sensor over 2 years ($15/year) prevents an unplanned $5k-$50k failure, yielding a **2000x - 20000x ROI**.
