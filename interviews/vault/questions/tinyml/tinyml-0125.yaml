title: Always-On Multi-Modal Sensor Fusion System
scenario: 'You''re designing an always-on context-aware wearable that fuses data from 5 sensors: microphone (16 kHz), 3-axis accelerometer (50 Hz), PPG heart rate sensor (25 Hz), skin temperature (1 Hz), and ambient light (1 Hz). The device must classify 8 activities (walking, running, sleeping, talking, eating, driving, exercising, idle) with <500ms latency on a Cortex-M33 (256 KB SRAM, 512 KB flash, 64 MHz). The battery is 80 mAh and must last 5 days.'
question: "How would you design the full sensor fusion architecture, specifying which sensors are always-on vs triggered, the fusion model, and the power budget?"
details:
  realistic_solution: 'Design a tiered power architecture: (1) Always-on tier (23 uA): accelerometer + temperature + light at low rates. IMU-based activity classifier runs on Cortex-M33 DSP extension every 500ms (0.1 mJ). (2) Triggered tier: microphone (1.5 mA) activates only when accelerometer detects non-movement states (talking, eating) — ~20% duty cycle. PPG (0.8 mA) activates for exercise and sleep only — ~30% duty. (3) Fusion model (0.8 MB) runs at 1 Hz, consuming buffered outputs. Average current: 23 µA (base) + 300 µA (mic) + 240 µA (PPG) = 563 µA. Battery: 80 mAh / 0.563 mA = 142 hours = 5.9 days (exceeds 5-day target). Key: the microphone dominates power — duty-cycling it saves 48% of total budget.'
  common_mistake: |
    **The Pitfall:** Running all 5 sensors continuously and fusing with a single multi-input model.
    **The Rationale:** Candidates ignore the disproportionate power draw of high-frequency sensors like the microphone.
    **The Consequence:** Continuous audio processing on the M33 at 64 MHz draws ~4 mA, killing the battery in 20 hours instead of the required 5 days.
  napkin_math: |
    1. All sensors always-on: 23 µA + 1,500 µA (mic) + 800 µA (PPG) + MCU = ~2.5 mA.
    2. Always-on battery life: 80 mAh / 2.5 mA = 32 hours (1.3 days).
    3. Tiered approach average: 23 µA (base) + 300 µA (mic, 20%) + 240 µA (PPG, 30%) = 563 µA.
    4. Tiered battery life: 80 mAh / 0.563 mA = 142 hours.
    **Result:** 142 hours equals 5.9 days, which exceeds the 5-day target and saves 4.4x power.
