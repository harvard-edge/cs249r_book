title: Always-On Multi-Modal Sensor Fusion System
scenario: 'You''re designing an always-on context-aware wearable that fuses data from 5 sensors: microphone (16 kHz), 3-axis accelerometer (50 Hz), PPG heart rate sensor (25 Hz), skin temperature (1 Hz), and ambient light (1 Hz). The device must classify 8 activities (walking, running, sleeping, talking, eating, driving, exercising, idle) with <500ms latency on a Cortex-M33 (256 KB SRAM, 512 KB flash, 64 MHz). The battery is 80 mAh and must last 5 days.'
question: How would you design the full sensor fusion architecture, specifying which sensors are always-on vs triggered, the fusion model, and the power budget?
details:
  realistic_solution: 'Design a tiered power architecture. (1) Always-on tier (23 uA): accelerometer + temperature + light at low rates. IMU-based activity classifier runs on Cortex-M33 DSP extension every 500ms. (2) Triggered tier: microphone (1.5 mA) activates only when accelerometer detects non-movement states (talking, eating) ~20% duty cycle. PPG (0.8 mA) activates for exercise and sleep only ~30% duty. (3) Fusion model runs at 1 Hz, consuming buffered outputs. Average current: 23 uA + 300 uA + 240 uA = 563 uA. Battery life exceeds 5 days.'
  common_mistake: |
    **The Pitfall:** Running all 5 sensors continuously and fusing with a single multi-input model.
    **The Rationale:** Candidates ignore the disproportionate power draw of high-frequency sensors like the microphone.
    **The Consequence:** Continuous audio processing on the M33 at 64 MHz draws ~4 mA, killing the battery in 20 hours instead of the required 5 days.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Battery: 80 mAh, Target: 120 hours (5 days).
       - Continuous Mic: 1.5 mA, Continuous PPG: 0.8 mA.
    2. **Calculations:**
       - All always-on: 23 uA + 1500 uA + 800 uA = 2.323 mA. Lifetime = 80 / 2.323 = 34.4 hours.
       - Tiered average: 23 uA + (1500 * 0.20) + (800 * 0.30) = 563 uA.
       - Tiered lifetime: 80 mAh / 0.563 mA = 142 hours.
    3. **Conclusion & Interpretation:**
       - **Result: Energy Bound.** A tiered, triggered architecture is mandatory to achieve the 120-hour lifetime target.
