title: 'The ESP32 WiFi-ADC Interference'
scenario: 'Your smart agriculture system on an ESP32-C6 (RISC-V, 160 MHz, 512 KB SRAM) reads soil moisture via a capacitive sensor on ADC1 channel 3 and runs a crop health model. The system uploads results over WiFi every 5 minutes. You notice soil moisture readings taken during WiFi transmission are consistently 8-12% higher than readings taken with WiFi off.'
question: 'Why do ESP32-C6 WiFi transmissions make ADC1 soil-moisture readings read 8-12% high, and how should sampling be hardened?'
details:
  realistic_solution: 'Three interference paths on the ESP32-C6: (1) Substrate coupling — WiFi PA injects RF energy (2.4 GHz) into shared silicon, coupling into the ADC''s analog frontend. (2) Power supply noise — WiFi TX draws 300 mA bursts, causing supply rail droop that shifts the ADC''s reference voltage. (3) Digital switching noise from the WiFi baseband processor couples through ground bounce. Combined: 8-12% ADC offset during TX bursts. Fix: add an RC filter on the ADC input to attenuate high-frequency noise, and crucially, schedule the 400 µs ADC reads in the 95 ms WiFi TX quiet periods between beacon intervals. Oversampling alone cannot fix this if the entire sample burst falls within the 5 ms TX window.'
  common_mistake: |
    **The Pitfall:** Assuming the issue is purely a software logic bug or a statistical outlier.
    **The Rationale:** Software engineers often forget that on a System-on-Chip (SoC), digital and analog peripherals share physical silicon and power rails.
    **The Consequence:** They attempt to fix the problem by oversampling or averaging, which mathematically fails if the entire sampling burst occurs during the WiFi transmission window.
  napkin_math: |
    **Assumptions & Constraints:**
    - WiFi TX Burst: 5 ms burst every 100 ms (5% duty cycle).
    - ADC Sampling: 1 sample = 25 µs. 16 continuous samples = 400 µs.

    **Calculations:**
    - Collision Probability: (5 ms - 0.4 ms) / 100 ms = 4.6%.

    **Conclusion & Interpretation:**
    - **Result: 4.6% (Signal-Bound)**. There is a 4.6% chance an entire 16-sample burst is corrupted by RF/power noise. Software averaging fails here.
