title: The ESP32 WiFi-ADC Interference
scenario: Your smart agriculture system on an ESP32-C6 (RISC-V, 160 MHz, 512 KB SRAM) reads soil moisture
  via a capacitive sensor on ADC1 channel 3 and runs a crop health classification model. The system also
  uploads results over WiFi every 5 minutes. You notice that soil moisture readings taken during WiFi
  transmission are consistently 8-12% higher than readings taken with WiFi off. The model misclassifies
  'dry soil' as 'adequate moisture' during WiFi-active periods. Quantify the interference mechanism.
question: "Why do ESP32-C6 WiFi transmissions make ADC1 soil-moisture readings read 8-12% high, and how should sampling be hardened?"
details:
  realistic_solution: 'Three interference paths on the ESP32-C6: (1) Substrate coupling — WiFi PA injects
    RF energy (2.4 GHz) into shared silicon, coupling into the ADC''s analog frontend. (2) Power supply
    noise — WiFi TX draws 300 mA bursts, causing supply rail droop that shifts the ADC''s reference voltage.
    (3) Digital switching noise from the WiFi baseband processor couples through ground bounce. Combined:
    8-12% ADC offset during TX bursts. Fix: add an RC filter on the ADC input to attenuate high-frequency noise,
    and crucially, schedule the 400 µs ADC reads in the 95 ms WiFi TX quiet periods between beacon intervals.
    Oversampling alone cannot fix this if the entire sample burst falls within the 5 ms TX window.'
  common_mistake: '"WiFi and ADC are digital and analog — they shouldn''t interfere. Must be a software
    timing issue." On a system-on-chip where the WiFi radio and ADC share the same silicon die, substrate,
    and power supply, interference is a physics problem, not a software problem.'
  napkin_math: 'WiFi TX burst: 5 ms every 100 ms = 5% duty cycle. ADC sampling: 1 sample takes 25 µs.
    With 16 continuous samples per reading (400 µs total), the probability of the entire burst falling
    inside the 5 ms TX window is (5ms + 0.4ms) / 100ms = 5.4%. If this happens, ALL 16 samples are
    contaminated, meaning a trimmed mean or oversampling alone will fail to remove the offset. The only
    robust software fix is scheduling: the WiFi baseband must notify the application to trigger the 400 µs
    ADC read strictly during the 95 ms quiet period. Hardware fix: an RC filter with R=100 ohm, C=100 nF
    provides a cutoff of 15.9 kHz, heavily attenuating MHz/GHz range RF.'
