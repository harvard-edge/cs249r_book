title: On-Device Data Collection for Retraining
scenario: You've deployed 2,000 vibration sensors on industrial motors, each running anomaly detection on a Cortex-M4 (1 MB flash, 256 KB SRAM). After 6 months, accuracy has drifted. Your ML team wants raw sensor data to retrain the model, but the devices only have BLE connectivity to a gateway.
question: How much triggered anomaly data can 2,000 Cortex-M4 vibration sensors store in 114 KB flash and upload over BLE?
details:
  realistic_solution: 'You cannot log raw data — 6.4 KB/s fills 114 KB of available flash in 18 seconds. Instead, use triggered logging: record only anomaly events (800 bytes compressed per event, ~10/day = 8 KB/day). Flash holds 14 days of triggered data. Upload via BLE at 60 KB/s takes 1.9s per device. For 2,000 devices through 10 gateways: 6.3 minutes total. This yields 284,000 labeled edge cases (227 MB) — a rich retraining dataset despite each device having only 114 KB logging space. The key insight: log anomalies, not normal operation.'
  common_mistake: |
    **The Pitfall:** Attempting to log all raw continuous sensor data to flash.
    **The Rationale:** Treating the microcontroller like a cloud server with infinite storage.
    **The Consequence:** A vibration sensor sampling at 3.2 kHz produces 6.4 KB/s, completely filling the 114 KB of available flash in under 18 seconds, rendering data collection useless.
  napkin_math: |
    1. **Raw Rate:** 6.4 KB/s. Flash fills in 114 / 6.4 = 17.8 seconds.
    2. **Triggered Strategy:** Compress anomaly events to 800 bytes. ~10 events/day = 8 KB/day.
    3. **Storage Duration:** 114 KB / 8 KB = 14 days of triggered data.
    4. **Upload Time:** 114 KB / 60 KB/s (BLE) = 1.9 seconds per device.
    5. **Fleet Total:** 2,000 devices * 142 snapshots = 284,000 labeled edge cases (**227 MB** total).
  options:
  - 'Use raw continuous logging: stream 6.4 KB/s of sensor data to flash, filling 114 KB in 17.8 seconds, then upload via BLE. This gives the ML team the full fidelity data they need for retraining.'
  - 'Use triggered + compressed logging: record only anomaly events (800 bytes/event, ~10/day = 8 KB/day). Flash holds 14 days of data. BLE upload at 60 KB/s takes 1.9s per device. For 2,000 devices through 10 gateways: 6.3 minutes total. This yields 284,000 labeled edge cases (227 MB) despite each device having only 114 KB of logging space.'
  - Upgrade to a microcontroller with more flash (16 MB) to store weeks of raw sensor data before uploading.
  - Use federated learning to retrain the model on-device, eliminating the need to collect and upload any raw sensor data to the cloud.
  correct_index: 1
