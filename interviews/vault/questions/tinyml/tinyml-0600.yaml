title: The LDO Regulator Brownout
scenario: Your TinyML acoustic sensor runs on a small LiPo battery. The MCU operates at 3.3V, powered
  by an LDO (Low Dropout) voltage regulator connected to the battery. The system works perfectly when
  the battery is fully charged (4.2V). However, when the battery reaches 3.5V (still holding 30% of its
  capacity), the MCU randomly resets during ML inference. Why is a 3.5V battery failing to power a 3.3V
  system?
details:
  realistic_solution: 'The LDO needs headroom (dropout voltage ~0.3V) above its output to regulate. At
    3.5V battery with 40mA inference spike through 5-ohm internal resistance: sag = 0.04A * 5ohm = 0.2V.
    Battery drops to 3.3V under load. LDO output: 3.3V - 0.3V dropout = 3.0V at MCU. The brown-out detector
    trips at 3.1V, resetting the MCU. Fix: (1) use a buck-boost converter instead of LDO — it can boost
    from below 3.3V, (2) add a 100uF capacitor to handle transient current spikes, (3) stagger high-current
    tasks. The battery has 30% energy left but the power delivery path cannot handle peak current demands.'
  common_mistake: '"The battery is dead." A LiPo at 3.5V has plenty of energy left. The issue is the power
    delivery circuitry.'
  napkin_math: Battery = 3.5V. Internal Resistance = 5 Ohms. Inference Spike = 40mA (0.04A). Voltage Sag
    = V = I*R = 0.04 * 5 = 0.2V. Battery instantly drops to 3.3V under load. LDO Dropout = 0.3V. Final
    MCU Voltage = 3.0V. BOD trips at 3.1V. System crashes.
