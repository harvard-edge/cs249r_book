title: The LDO Regulator Brownout
scenario: Your TinyML acoustic sensor runs on a small LiPo battery. The MCU operates at 3.3V, powered by an LDO (Low Dropout) voltage regulator connected to the battery. The system works perfectly when the battery is fully charged (4.2V). However, when the battery reaches 3.5V (still holding 30% of its capacity), the MCU randomly resets during ML inference.
question: Why is a 3.5V battery failing to power a 3.3V system?
details:
  realistic_solution: 'The LDO needs headroom (dropout voltage ~0.3V) above its output to regulate. At 3.5V battery with 40mA inference spike through 5-ohm internal resistance: sag = 0.04A * 5ohm = 0.2V. Battery drops to 3.3V under load. LDO output: 3.3V - 0.3V dropout = 3.0V at MCU. The brown-out detector trips at 3.1V, resetting the MCU. Fix: (1) use a buck-boost converter instead of LDO — it can boost from below 3.3V, (2) add a 100uF capacitor to handle transient current spikes, (3) stagger high-current tasks. The battery has 30% energy left but the power delivery path cannot handle peak current demands.'
  common_mistake: |
    **The Pitfall:** Assuming the battery is simply dead at 3.5V.
    **The Rationale:** Engineers assume a static voltage drop without considering the dynamic internal resistance V=IR drop caused by inference current spikes.
    **The Consequence:** Viable battery life is cut artificially short, abandoning 30% of the usable energy.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Unloaded battery voltage: 3.5V.
       - Inference current spike: 40mA (0.04A).
       - Battery internal resistance: 5 ohms.
       - LDO dropout voltage: ~0.3V.
       - MCU brown-out detector threshold: 3.1V.
    2. **Calculations:**
       - Voltage sag (V=IR): 0.04A * 5 ohms = 0.2V.
       - Loaded battery voltage: 3.5V - 0.2V = 3.3V.
       - LDO output voltage: 3.3V - 0.3V = 3.0V.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound.** The MCU receives 3.0V during inference spikes, tripping the 3.1V brown-out detector and crashing the system despite having 30% capacity remaining.
  options:
  - The MCU's internal oscillator loses synchronization when the voltage drops below 3.6V, causing the system to halt.
  - The battery's 30% remaining capacity is not enough to sustain the 40mA current spike, causing the voltage to drop to 0V momentarily.
  - The LDO requires a ~0.3V dropout headroom. A 40mA inference spike through the battery's 5-ohm internal resistance causes a 0.2V sag, dropping the battery to 3.3V. The LDO output then drops to 3.0V, tripping the MCU's 3.1V brown-out detector.
  - The ML model's weights in Flash memory become corrupted when the battery voltage drops below its nominal 3.7V, leading to a hard fault.
  correct_index: 2
