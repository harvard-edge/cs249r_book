title: The Keyword Spotting Pipeline
scenario: Design the complete inference pipeline for an always-on keyword spotting system. The microphone samples at 16 kHz. You need to detect the wake word 'Hey Device' within 500 ms.
question: How would you design the complete inference pipeline for an always-on keyword spotting system on a Cortex-M4?
details:
  realistic_solution: 'The pipeline must be streaming and integer-only: Raw audio at 16 kHz × 16-bit × 1 second = 32 KB. But streaming with 30 ms frames only needs 960 bytes live — a 34× memory reduction. The 512-point fixed-point FFT on Cortex-M4 takes ~0.18 ms via CMSIS-DSP. The pipeline uses continuous double-buffering over DMA to feed the Mel Filterbank without CPU stalling.'
  common_mistake: |
    **The Pitfall:** Buffering 1 full second of audio, computing a floating-point FFT, and running the model in a single batch.
    **The Rationale:** Candidates treat edge audio processing like batch cloud processing, ignoring the streaming nature of audio and the lack of an FPU on the microcontroller.
    **The Consequence:** The system immediately exhausts SRAM with audio buffers and takes far too long to compute the FFT without hardware acceleration.
  napkin_math: |
    **Assumptions & Constraints:**
    - Microphone: 16 kHz, 16-bit.
    - Frame size: 30 ms.
    - Fixed-point FFT length: 512-point.

    **Calculations:**
    - Streaming Buffer: 30 ms * 16,000 samples/s * 2 bytes/sample = 960 bytes.
    - Full 1s Buffer (for comparison): 16,000 * 2 = 32 KB.
    - FFT Compute (CMSIS-DSP): ~0.18 ms per frame.
    - Mel Filterbank: 40 filters * 256 bins = 10,240 MACs ≈ 0.06 ms.
    - Total Feature Extraction: ~0.24 ms per 30 ms frame.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound.** Streaming 30 ms frames drastically reduces SRAM usage to <1 KB, and optimized fixed-point CMSIS-DSP pipelines keep active CPU time under 1 ms per frame.
