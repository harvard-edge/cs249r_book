classification_review: Flash's point is reasonable. RC-8 (Cost Optimization & TCO) doesn't fit a question
  about designing a complete inference pipeline under tight memory/compute constraints. RC-8 is about
  dollar costs. This is really RC-3 (Performance Optimization) or could be RC-2 (Technical Knowledge).
