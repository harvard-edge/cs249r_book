title: Cortex-M4 Vibration FFT Queue
scenario: A predictive maintenance sensor samples vibration data at 1kHz. Every 1000
  samples (1 second of data), it queues the window for an FFT on the Cortex-M4. The
  FFT takes 1.2 seconds, making service slower than the 1.0 second arrival rate. However,
  the machine only vibrates in 5-second bursts followed by 20-second silences.
question: Design the minimum required FFT window queue size to prevent data loss during
  a vibration burst.
visual:
  kind: svg
  path: tinyml-1551.svg
  alt: Chart showing queue building up to 1 during the 5 second burst, then draining
    to 0 during silence.
  caption: Burst Queue Accumulation
details:
  realistic_solution: During a 5-second burst, 5 windows arrive (one every 1.0s).
    The FFT processes them at 1.2s per window. After 5 seconds, 5 windows have arrived,
    but only floor(5.0 / 1.2) = 4 windows have been fully processed. At the exact
    5.0s mark, 1 window is actively processing, and 1 remains in the queue. Therefore,
    a queue size of 1 (holding 1 pending window) is sufficient to weather the burst
    before the 20-second silence allows the processor to catch up.
  common_mistake: Claiming the system is unconditionally unstable because service
    time (1.2s) > arrival time (1.0s), ignoring the duty-cycle burst constraints.
  napkin_math: Arrivals = 5. Processed in 5s = 5.0 / 1.2 = 4.16. Max backlog = 5 -
    4 = 1 pending in queue.
