title: 'TinyML TCO Implement: TinyML Inference Energy per Inference'
scenario: Calculate the energy per inference for a keyword spotting model (100K ops
  INT8) on Cortex-M4 (168MHz, 30mA active, 1.8V supply). Assume 5 cycles per operation
  average. Compare to Cortex-M7+Ethos-U55 (480MHz, 15mA active NPU, 1.8V) for the
  same model. Express in μJ and calculate cost for 1 million inferences at $0.10/kWh.
question: How would you compare to Cortex-M7+Ethos-U55 (480MHz, 15mA active NPU, 1.8V)
  for the same model?
details:
  realistic_solution: 'M4: Cycles = 100K ops * 5 cycles/op = 500K cycles. Time = 500K
    / 168M = 2.976ms. Energy = 30mA * 1.8V * 2.976ms = 160.7μJ. M7+Ethos: NPU executes
    100K ops in ~100K cycles (1 cycle/op for systolic). At 50MHz NPU: 100K/50M = 2ms.
    At 15mA, 1.8V: 15*1.8*2=54μJ. NPU is 2.98x more energy efficient. 1 million inferences:
    M4: 160.7μJ * 1M = 160.7J = 0.04464Wh = $0.000004464. M7+Ethos: 54μJ * 1M = 54J
    = 0.015Wh = $0.0000015. Cost difference for 1M inferences: $0.0000030 — negligible!
    The energy cost is not the differentiator; battery life and latency are.'
  common_mistake: Confusing operations (integer multiply-accumulates) with clock cycles,
    and not accounting for the NPU executing operations more efficiently (fewer cycles
    per op) than the CPU.
  napkin_math: 'M4: cycles=500K, time=2.976ms, power=30mA*1.8V=54mW, energy=54mW*2.976ms=160.7μJ.
    M7+Ethos: cycles_NPU=100K, time=2ms@50MHz, power=15mA*1.8V=27mW, energy=27mW*2ms=54μJ.
    Cost 1M infs: M4=160.7μJ*1M=160.7J*$0.10/(3.6M J/kWh)=$0.00000446. Ethos=$0.00000150.
    Daily at 100 inf/hr: M4=2400*160.7μJ=386mWh=$0.0000386/day. Ethos=2400*54μJ=130mWh=$0.000013/day.
    Annual: M4=$0.0141, Ethos=$0.00474. All negligible. True advantage of Ethos: 2ms
    vs 2.976ms latency (33% faster), and 66% less energy per inference extends battery
    life proportionally.'
