title: 'TinyML TCO Implement: TinyML Inference Energy per Inference'
scenario: A keyword spotting model (100K ops INT8) runs on a Cortex-M4 (168MHz, 30mA active, 1.8V supply, 5 cycles/op average) and a Cortex-M7+Ethos-U55 (50MHz, 15mA active NPU, 1.8V, 1 cycle/op). The cost of electricity is $0.10/kWh.
question: What is the energy per inference (in μJ) and the cost for 1 million inferences on both platforms, and which factor is the true differentiator?
details:
  realistic_solution: 'M4: Cycles = 100K ops * 5 cycles/op = 500K cycles. Time = 500K / 168M = 2.976ms. Energy = 30mA * 1.8V * 2.976ms = 160.7μJ. M7+Ethos: NPU executes 100K ops in ~100K cycles (1 cycle/op for systolic). At 50MHz NPU: 100K/50M = 2ms. At 15mA, 1.8V: 15*1.8*2=54μJ. NPU is 2.98x more energy efficient. 1 million inferences: M4: 160.7μJ * 1M = 160.7J = 0.04464Wh = $0.000004464. M7+Ethos: 54μJ * 1M = 54J = 0.015Wh = $0.0000015. Cost difference for 1M inferences: $0.0000030 — negligible! The energy cost is not the differentiator; battery life and latency are.'
  common_mistake: |
    **The Pitfall:** Confusing operations with clock cycles and ignoring the NPU's efficiency.
    **The Rationale:** Candidates often assume 1 op = 1 cycle on CPUs, forgetting that operations like multiply-accumulates can take multiple cycles without an NPU.
    **The Consequence:** This leads to drastically underestimating the CPU's latency and energy consumption, hiding the true value of the NPU.
  napkin_math: |
    - **M4 cycles:** 100K ops * 5 cycles/op = 500K cycles.
    - **M4 time:** 500K / 168MHz = 2.976 ms.
    - **M4 power:** 30mA * 1.8V = 54 mW.
    - **M4 energy:** 54 mW * 2.976 ms = 160.7 μJ.
    - **M7+Ethos cycles:** 100K ops * 1 cycle/op = 100K cycles.
    - **M7+Ethos time:** 100K / 50MHz = 2 ms.
    - **M7+Ethos power:** 15mA * 1.8V = 27 mW.
    - **M7+Ethos energy:** 27 mW * 2 ms = 54 μJ.
    - **M4 Cost (1M):** 160.7 J * ($0.10 / 3.6M J) = **$0.00000446**.
    - **M7+Ethos Cost (1M):** 54 J * ($0.10 / 3.6M J) = **$0.00000150**.
    - **Conclusion:** Cost difference is negligible. The true advantage is lower latency and **66% less energy** per inference.
