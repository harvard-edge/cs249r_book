title: Continuous Learning on MCU
scenario: Your Cortex-M7 (480 MHz, 2 MB flash, 1 MB SRAM) runs a 50 KB anomaly detection model. After deployment, the distribution shifts — new motor types produce vibration patterns the model hasn't seen. Your ML team says 'just retrain in the cloud and push an update.' But the devices are in remote oil rigs with satellite connectivity (2400 bps, $8/MB).
question: Can a 480 MHz STM32H7 retrain the final layer of a 50 KB anomaly model cheaper than satellite OTA?
details:
  realistic_solution: 'On-device incremental learning is feasible with last-layer-only fine-tuning. Freeze all layers except the final classification head. Memory: forward pass activations for the last layer (~4KB) + gradient buffer (~4KB) + optimizer state (~4KB) + training data buffer (100 samples * 800 bytes = 80KB) = ~92KB. Fits in 1MB SRAM with room to spare. Training time: 10 epochs * 100 samples * 5000 MACs/sample / (480MHz * 2 MACs/cycle) = 0.52ms per epoch = 5.2ms total compute time. Energy: 7ms realistic (with memory loads and I/O overhead) * 150mW = 1.05mJ. Satellite alternative: 50KB / 2400bps = 167s at $0.39/update. For 500 devices: $195/cycle vs $0 on-device.'
  common_mistake: |
    **The Pitfall:** Rejecting on-device backprop outright.
    **The Rationale:** Engineers assume standard backpropagation takes too much memory for any MCU, dismissing it immediately.
    **The Consequence:** They resort to immensely expensive cloud retraining cycles, burning money on slow satellite links when the hardware had capacity for a localized fix.
  napkin_math: |
    - Training memory: 84 KB (last-layer only).
    - Training compute: 100 samples * 5000 MACs / (480M * 2) = 0.52 ms/epoch.
    - 10 epochs = 5.2 ms. Total energy = 7 ms * 150 mW = **1.05 mJ**.
    - Satellite upload cost: 50 KB / 2400 bps = 170 seconds airtime.
    - At $8/MB: 50 KB = **$0.39 per device**. On-device learning = **$0**.
