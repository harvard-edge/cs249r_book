title: The Execute-in-Place Energy Tax
scenario: You deploy an audio wake-word model to a tiny hearing aid battery. The microcontroller has 256KB
  of SRAM and 2MB of NOR Flash. The model weights are 1MB, so you use Execute-in-Place (XIP) to read the
  weights directly from Flash over the SPI bus during inference. The inference speed is fine, but the
  battery dies in 2 days instead of the required 14 days. What physical hardware reality did you ignore?
question: "Why does reading 1 MB of wake-word weights over SPI NOR Flash drain a hearing-aid battery in 2 days?"
details:
  realistic_solution: You fell victim to the Energy-Movement Invariant. Computing a math operation (a
    MAC) takes very little energy. Moving data is what drains batteries. Reading data from off-chip NOR
    Flash over physical SPI bus pins requires charging and discharging relatively massive external copper
    traces and PCB capacitance. Doing this for every single weight, on every single inference cycle, consumes
    orders of magnitude more power than reading from the tightly integrated, on-chip SRAM right next to
    the ALU.
  common_mistake: '"Focusing solely on whether the model fits in memory and meets latency deadlines, completely
    ignoring the energy cost of moving bits across physical wires."'
  napkin_math: An arithmetic operation (MAC) on a Cortex-M might cost `~1 picojoule (pJ)`. Reading a 32-bit
    word from on-chip SRAM costs `~5 pJ`. Reading that same 32-bit word from an external Flash chip over
    an SPI bus can cost `~1000 pJ` due to off-chip capacitance. By fetching the 1MB of weights from Flash
    every inference, you are spending 99% of your battery power physically moving bits across the motherboard,
    rather than doing AI math.
