title: 'RP2040 Core FIFO Spinlock'
scenario: 'A dual-core MCU runs an audio model. Core 0 extracts features (12ms), Core 1 runs the INT8 net (10ms). They pass a 1KB buffer via a hardware FIFO.'
question: 'Analyze the pipeline latency per audio frame if the FIFO spinlock synchronization costs 100us.'
details:
  realistic_solution: 'The pipeline step time is governed by the longest stage (Core 0 at 12ms) plus the spinlock synchronization. The end-to-end latency is the sum of both stages plus the sync overhead.'
  common_mistake: |
    **The Pitfall:** Confusing throughput step time with end-to-end latency.
    **The Rationale:** Candidates add the stage times together to find throughput, or assume total latency equals the longest stage.
    **The Consequence:** The system architecture under-reports real-time responsiveness, missing critical audio detection SLAs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Stage 1 (Core 0): 12 ms.
    - Stage 2 (Core 1): 10 ms.
    - Spinlock Sync: 0.1 ms.

    **Calculations:**
    - Pipeline Step (Throughput limit) = max(12, 10) + 0.1 = 12.1 ms.
    - Total Frame Latency = 12 + 10 + 0.1 = 22.1 ms.

    **Conclusion & Interpretation:**
    - **Result: 22.1 ms (Latency-Bound)**. The end-to-end latency is 22.1 ms, strictly governed by the sum of stages plus sync overhead.
