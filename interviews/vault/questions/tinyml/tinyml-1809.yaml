title: RP2040 Core FIFO Spinlock
scenario: A dual-core RP2040 runs an audio model. Core 0 extracts features (12ms),
  Core 1 runs the INT8 net (10ms). They pass a 1KB buffer via a hardware FIFO.
question: Analyze the pipeline latency per audio frame if the FIFO spinlock synchronization
  costs 100us.
details:
  realistic_solution: The pipeline step time is governed by the longest stage (Core
    0 at 12ms) plus the 0.1ms spinlock synchronization. The latency for a single frame
    to traverse both cores is the sum of both stages plus the sync, totaling 22.1ms.
  common_mistake: Adding the stage times together (12+10=22ms) to find throughput,
    rather than taking the maximum stage plus sync overhead.
  napkin_math: Step = max(12, 10) + 0.1 = 12.1ms. Total Latency = 12 + 10 + 0.1 =
    22.1ms.
