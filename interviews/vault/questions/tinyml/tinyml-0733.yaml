title: The Zero-Point Question
scenario: A junior engineer says 'to quantize a model to INT8, just round each FP32 weight to the nearest
  integer.' Why is this wrong, and what is a zero-point?
question: "' Why is this wrong, and what is a zero-point?"
details:
  realistic_solution: 'Quantization is an affine mapping from the float range to the integer range, not
    simple rounding. The formula is: $x_q = \text{round}(x_f / s) + z$, where $s$ is the scale (step size)
    and $z$ is the zero-point (the integer value that represents float 0.0).'
  common_mistake: '"Rounding FP32 to INT8 is quantization." This destroys the model because FP32 weights
    are typically in the range [-0.1, 0.1] — rounding them all to 0 gives you a zero model.'
  napkin_math: 'Weight range [-0.1, 0.1]. Naive rounding: all weights → 0. Model is dead. Proper quantization:
    scale = 0.2/255 = 0.000784. Weight 0.05 → round(0.05/0.000784) + 128 = 192. Weight -0.03 → round(-0.03/0.000784)
    + 128 = 90. Dequantized: (192-128) × 0.000784 = 0.0502, (90-128) × 0.000784 = -0.0298. Error: <0.001
    — acceptable.'
