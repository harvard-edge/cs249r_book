title: Dual-Core Memory-Aware Operator Scheduling on ESP32-S3
scenario: You are designing the operator execution schedule for a real-time keyword spotting CNN on a microcontroller. The system features a dual-core processor, 512 KB of fast internal SRAM, and 8 MB of slower external PSRAM. Your model has a memory bottleneck where intermediate activations between a large Conv2D layer and a subsequent Depthwise Convolution spike to 400 KB.
question: How should the microcontroller schedule Conv2D and depthwise operators to avoid materializing a 400 KB intermediate tensor?
details:
  realistic_solution: "The optimal design maps the operator schedule to the memory hierarchy by fusing the Conv2D and Depthwise layers. By computing the layers in tiles (depth-first scheduling), the system never materializes the full 400 KB intermediate tensor."
  common_mistake: |
    **The Pitfall:** Placing all buffers in external PSRAM or scheduling operators sequentially.
    **The Rationale:** Assuming a flat memory hierarchy or failing to consider layer fusion to reduce peak memory.
    **The Consequence:** Massive latency hits due to cache misses, or out-of-memory crashes trying to fit everything into the 512 KB SRAM.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 512 KB SRAM, 8 MB PSRAM.
       - Peak Activation: 400 KB (OOM risk).
    2. **Calculations:**
       - SRAM Budget: 512 KB - ~150 KB (OS/WiFi) = ~362 KB available.
       - Optimization: Fuse layers and compute in 4 tiles.
       - New Intermediate Buffer: 400 KB / 4 = 100 KB.
       - Working Set: Input (100 KB) + Output (100 KB) + Weights (50 KB) = 250 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (250 KB fits in SRAM, avoiding 8 MB PSRAM latency).**
