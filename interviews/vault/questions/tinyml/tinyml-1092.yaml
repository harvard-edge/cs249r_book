title: Dual-Core Memory-Aware Operator Scheduling on ESP32-S3
scenario: You are designing the operator execution schedule for a real-time keyword spotting CNN on an ESP32-S3 microcontroller. The system features a 240 MHz dual-core Xtensa processor, 512 KB of fast internal SRAM, and 8 MB of slower external PSRAM. Your model has a memory bottleneck where intermediate activations between a large Conv2D layer and a subsequent Depthwise Convolution spike to 400 KB.
question: How should the ESP32-S3 schedule Conv2D and depthwise operators to avoid materializing a 400 KB intermediate tensor?
details:
  realistic_solution: The optimal design maps the operator schedule to the memory hierarchy by fusing the Conv2D and Depthwise layers. By computing the layers in tiles (depth-first scheduling), the system never materializes the full 400 KB intermediate tensor. The working set is kept small enough to fit entirely in the 512 KB SRAM. Furthermore, one core can handle the INT8 vector extensions for the fused operators while the second core pre-fetches the next layer's weights from the 8 MB PSRAM using DMA, hiding the external memory latency.
  common_mistake: |
    **The Pitfall:** Placing all buffers in external PSRAM or scheduling operators sequentially.
    **The Rationale:** Assuming a flat memory hierarchy or failing to consider layer fusion to reduce peak memory.
    **The Consequence:** Massive latency hits due to cache misses, or out-of-memory crashes trying to fit everything into the 512 KB SRAM.
  napkin_math: |
    1. **SRAM Budget:** 512 KB total - ~150 KB (OS/WiFi) = ~362 KB available.
    2. **Peak Activation:** 400 KB (OOM if fully materialized).
    3. **Optimization (Layer Fusion/Tiling):** Fuse layers and compute in 4 tiles.
    4. **New Intermediate Buffer:** 400 KB / 4 = 100 KB.
    5. **Working Set:** Input (100 KB) + Output (100 KB) + Weights (50 KB) = **250 KB**.
    6. **Conclusion:** 250 KB < 362 KB. Fits safely in SRAM, completely avoiding the latency penalty of the 8 MB PSRAM.
