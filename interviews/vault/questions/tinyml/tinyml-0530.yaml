title: The Silent Overflow Catastrophe
scenario: You are a TinyML engineer optimizing a keyword spotting model for a Cortex-M4 based microcontroller. Your FP32 model achieves 95% accuracy. After applying standard post-training INT8 quantization using a calibration dataset of 100 clean audio samples, the model's accuracy on the validation set plummets to 11% (effectively random guessing for your 10-class model). You profile the layers and discover that one specific convolutional layer's FP32 activations are typically in the `[-4.0, 4.0]` range for the clean calibration data. However, the validation set contains noisy real-world audio where these same activations occasionally spike to `+8.0`. What is the most likely cause of this catastrophic accuracy drop?
question: "Why does clean-audio PTQ calibration make noisy +8.0 activations collapse a Cortex-M4 KWS model to random accuracy?"
details:
  realistic_solution: The root cause is activation overflow due to an unrepresentative calibration dataset. The quantization parameters (scale and zero-point) were calculated based on the limited `[-4.0, 4.0]` dynamic range seen in the clean calibration data. When the model later encounters a noisy sample causing an activation of `+8.0`, this value is clipped to the maximum representable INT8 value. This saturation destroys the feature information, causing a cascade of errors through subsequent layers and leading to a near-total collapse in accuracy. The fix is to use a more representative calibration dataset that includes noisy samples reflecting real-world conditions, or to selectively keep the problematic layer in a higher precision format like FP16 (mixed-precision quantization).
  common_mistake: Engineers often blame the model architecture itself (e.g., 'this model just can't be quantized') or assume a toolchain bug, leading them to abandon quantization prematurely. They fail to recognize that the quantization process is only as good as the data used to calibrate it.
  napkin_math: 'Symmetric INT8 over [-4,4]: scale=4/127=0.0315. Activation +8.0: q=8/0.0315=254->clipped to 127. Dequant=127*0.0315=4.0. Error=50%. All values >4 collapse to 127. Fix: recalibrate with noisy data [-8,8], scale=8/127=0.063. Now +8->127=8.0, <1% error. Or mixed-precision FP16 for that layer: zero clipping.'
  options:
  - The model's architecture uses activation functions that are fundamentally incompatible with 8-bit integers.
  - Weight quantization error was too high, destroying the model's learned representations across all layers.
  - The calibration dataset was not representative, causing activation value clipping during inference on real-world data.
  - The Cortex-M4's DSP instructions have a bug in the INT8 convolution kernel, leading to incorrect matrix multiplications.
  correct_index: 2
