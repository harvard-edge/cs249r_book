title: Dual-Core Latency Pipeline for BLE Wake-Word
scenario: You are designing a continuous keyword spotting system for a wearable device using the Nordic nRF5340 dual-core SoC. The system must capture audio, run MFCC feature extraction, execute a quantized neural network that fits entirely in the 256 KB SRAM and 1 MB flash, and transmit a trigger via BLE 5.3 to a host phone. The strict end-to-end latency budget from audio event to phone reception is 150ms.
question: How should nRF5340 cores pipeline audio, MFCC, inference, and BLE to meet a 150 ms wake-word budget?
details:
  realistic_solution: A robust design decomposes the latency by fully pipelining tasks across the SoC's hardware boundaries. Audio DMA handles continuous sensing independently. The 128 MHz app core processes the completed audio frame (MFCCs + inference) while the next frame is buffering. Upon a positive detection, the app core immediately dispatches the event via inter-core messaging to the 64 MHz network core. The network core asynchronously handles the BLE 5.3 stack and transmission, allowing the app core to immediately return to a low-power state or begin processing the next frame, thereby safely meeting the 150ms budget by overlapping compute and network latencies.
  common_mistake: |
    **The Pitfall:** Designing a purely sequential pipeline on a single core and treating network transmission as a blocking post-processing step.
    **The Rationale:** Engineers default to single-threaded logic, ignoring the heterogeneous multi-core architecture of the nRF5340.
    **The Consequence:** The system fails to overlap compute and network latency, frequently missing the 150ms deadline and wasting power by keeping the high-power app core active during blocking network operations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target Latency: 150 ms.
       - App core (128 MHz): Preprocessing (2 ms), Inference (45 ms).
       - DMA Audio buffer: 20 ms.
       - Inter-core IPC: 1 ms.
       - Net core (64 MHz): BLE TX (30 ms).
    2. **Calculations:**
       - Sequential execution latency: 20 + 2 + 45 + 1 + 30 = 98 ms.
       - Margin against budget: 150 - 98 = 52 ms.
       - Pipelined execution: App core sleeps during the 30 ms BLE TX on the Net core.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound Optimization.** Offloading the 30 ms BLE TX to the network core allows the high-power app core to sleep, saving energy while easily meeting the 150 ms budget.
