title: Active Learning Storage Constraints
scenario: We are employing an active learning strategy to curate a dataset for a keyword spotting model on a Nordic nRF5340. The 128 MHz app core runs a baseline model, and when its confidence is low, it saves the 1-second, 16 kHz, 16-bit audio clip to flash for later offloading via BLE 5.3 and human annotation. The device has 1 MB of flash, but the application firmware, BLE stack, and baseline model consume 640 KB.
question: "How many 1-second uncertain audio clips can be stored on-device before needing to offload data?"
details:
  realistic_solution: To curate a high-value dataset without overwhelming the limited on-device storage, the system should only capture complete audio windows where the model exhibits uncertainty. By buffering these clips in the remaining flash memory, the device can periodically wake the BLE radio to transmit the batch to a gateway for human annotation, effectively targeting the dataset bias without requiring a continuous high-bandwidth connection.
  common_mistake: |
    **The Pitfall:** Forgetting to subtract the firmware footprint from the total flash capacity.
    **The Rationale:** Candidates assume the full 1 MB is available for data logging, or they confuse bits and bytes when calculating sample size.
    **The Consequence:** The calculated capacity is drastically overstated, leading to partial samples or hard crashes when flash overflows.
  napkin_math: |
    * Available flash storage: 1 MB (1024 KB) total - 640 KB firmware = 384 KB available.
    * Size of a 1-second audio sample: 16,000 samples/sec × 2 bytes/sample (16-bit) = 32,000 bytes.
    * Convert sample size to KB: 32,000 bytes / 1024 = 31.25 KB per clip.
    * Calculate total samples: 384 KB / 31.25 KB/clip = 12.28 clips.
    * Round down to whole samples: We can store exactly **12 full audio clips** for annotation.
