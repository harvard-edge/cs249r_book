title: 'The Silent Drift Catastrophe'
scenario: 'You''ve deployed a fleet of 1,000 battery-powered audio sensors based on a Cortex-M4 MCU to detect ''chainsaw'' sounds in a remote rainforest. The model uses an input normalization layer that adapts its mean and standard deviation statistics over time. To ensure uptime, you''ve implemented a watchdog timer with a 5-second timeout. To persist the normalization stats across reboots, you checkpoint the mean/std dev vectors to Flash memory every 100 inferences.'
question: 'What cascading failure is caused by checkpointing adaptive normalization statistics to Flash every 100 inferences?'
details:
  realistic_solution: 'This is a classic cascading failure caused by Flash memory wear-out, which is accelerated by the adaptive model and then triggers two different fault states. Frequent checkpointing exhausts Flash erase cycles rapidly.'
  common_mistake: |
    **The Pitfall:** Attributing failures to ''software bugs'', ''bad batteries'', or ''model drift'' without analyzing system-level physical interactions.
    **The Rationale:** Cloud-native engineers often underestimate the physical limitations of Flash memory on microcontrollers, assuming writes are fast, cheap, and infinite.
    **The Consequence:** The Flash memory wears out, causing corrupted normalization stats. The model outputs garbage, but the MCU code still executes, meaning the watchdog is never triggered. Silent failure ensues.
  napkin_math: |
    **Assumptions & Constraints:**
    - Flash endurance is 10,000 cycles.
    - Checkpoint every 100 inferences.
    - Inference runs every 10 seconds.

    **Calculations:**
    - Inferences per day: (24 * 60 * 60) / 10 = 8,640.
    - Writes per day: 8,640 / 100 = 86.4.
    - Days to failure: 10,000 cycles / 86.4 writes/day = ~115.7 days.

    **Conclusion & Interpretation:**
    - **Result: ~116 days to failure (Reliability-Bound)**. Corrupted stats lead to silent accuracy degradation, then total failure.
