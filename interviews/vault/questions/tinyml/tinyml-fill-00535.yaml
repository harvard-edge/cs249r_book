title: Extreme Quantization for Keyword Spotting on Nordic nRF5340
scenario: 'You are tasked with deploying a keyword spotting model on a Nordic nRF5340 microcontroller
  (128 MHz CPU, 256 KB SRAM, 1 MB flash). The current 32-bit floating-point baseline model has 1,000,000
  weights. These weights, along with other model parameters and code, currently occupy 4.5 MB of flash
  memory. During inference, this model requires 100 KB of SRAM for its 32-bit activations.


  To deploy on the nRF5340, you decide to implement a sub-4-bit quantization strategy. Specifically, you
  choose to quantize weights to 2-bit using a technique like AWQ, while activations are quantized to 8-bit.


  1. Calculate the flash memory occupied by *only* the weights after 2-bit quantization.

  2. If the original model''s code and non-weight parameters occupy 500 KB of flash, what is the *total*
  flash memory footprint of the 2-bit weight, 8-bit activation quantized model?

  3. Assuming the SRAM required for activations scales linearly with bit-width (from 32-bit to 8-bit),
  what would be the new SRAM requirement for activations?'
details:
  realistic_solution: 'A realistic solution would involve: (1) Applying advanced post-training quantization
    (PTQ) techniques such as AWQ or GPTQ for sub-4-bit weights to minimize accuracy loss. (2) Carefully
    selecting layers for different bit-widths (mixed-precision) based on sensitivity analysis. (3) Implementing
    custom, highly optimized inference kernels that efficiently handle 2-bit weights (e.g., packed into
    bytes) and 8-bit activations, making the most of the nRF5340''s 128 MHz CPU. (4) Thoroughly evaluating
    model accuracy on the target device after quantization.'
  common_mistake: A common mistake is to aggressively quantize without considering the accuracy degradation
    and the need for specialized quantization-aware training or post-training optimization techniques
    (like GPTQ/AWQ) to recover performance. Another mistake is neglecting the overheads of bit-packing/unpacking
    or the need for custom optimized kernels for sub-8-bit arithmetic on target hardware, especially given
    the nRF5340's limited compute capabilities.
  napkin_math: '1. Original weights: 1,000,000 weights * 4 bytes/weight = 4,000,000 bytes = 4 MB.

    2. 2-bit quantized weights: 1,000,000 weights * (2 bits/weight / 8 bits/byte) = 250,000 bytes = 250
    KB.

    3. Flash memory occupied by 2-bit weights: 250 KB.

    4. Total flash memory for quantized model: 500 KB (code/other params) + 250 KB (2-bit weights) = 750
    KB.

    5. Original 32-bit activation SRAM: 100 KB.

    6. 8-bit activation SRAM: 100 KB * (8 bits / 32 bits) = 25 KB.'
