title: Interrupt-Driven Missed Audio Deadlines
scenario: You are deploying an audio event detector on an ARM Cortex-M4 (STM32F4) running at 168 MHz with
  256 KB SRAM and 1 MB flash. The system must process an incoming audio frame every 16ms to avoid buffer
  overflows. The pipeline requires 1.2 million clock cycles for MFCC feature extraction, followed by a
  neural network that performs 2 million INT8 MAC operations utilizing CMSIS-NN SIMD instructions (2 MACs/cycle).
  While the model runs fine in isolation, the system occasionally drops frames when a high-priority Bluetooth
  interrupt fires, which consumes 600,000 cycles. Analyze why the system drops frames during these events.
details:
  realistic_solution: The candidate should systematically calculate the total cycle budget provided by
    the 168 MHz clock for the 16ms window. They must then apply the CMSIS-NN SIMD throughput to find the
    exact cycles needed for the neural network and sum this with the feature extraction time. By factoring
    in the preemptive interrupt overhead, the candidate will demonstrate that the worst-case execution
    time (WCET) exceeds the strict real-time budget. This proves that the deadline miss is a fundamental
    compute starvation issue rather than a software bug.
  common_mistake: Candidates often assume that MAC operations take exactly 1 cycle each without accounting
    for SIMD optimizations, leading to incorrect baseline latency calculations. Furthermore, they may
    fail to calculate the exact total cycle budget available in the 16ms window, ignoring the impact of
    asynchronous hardware interrupts stealing CPU cycles.
  napkin_math: '1. Cycle budget: 168 MHz * 16ms = 2,688,000 cycles available per frame. 2. NN computation:
    2,000,000 MACs / 2 MACs per cycle (CMSIS-NN SIMD) = 1,000,000 cycles. 3. Normal pipeline: 1,200,000
    (MFCC) + 1,000,000 (NN) = 2,200,000 cycles. 4. With communication interrupt: 2,200,000 + 600,000 =
    2,800,000 cycles. Since 2,800,000 > 2,688,000, the pipeline exceeds the deadline by 112,000 cycles
    (approx 0.67ms).'
