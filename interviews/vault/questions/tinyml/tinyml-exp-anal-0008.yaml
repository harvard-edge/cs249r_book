title: 4-Bit Quantization Latency Regression on nRF5340
scenario: Your team deployed an audio classification model on the Nordic nRF5340 (128 MHz app core, 1
  MB flash, 256 KB SRAM, BLE 5.3). To reduce flash usage, you applied 4-bit weight quantization, successfully
  shrinking the weights from 800 KB to 400 KB. However, during on-device profiling, you observe that inference
  latency increased by 50% and battery drain worsened, even though the active current remained steady
  at ~5mA. Given the nRF5340's architecture, explain why decreasing the precision and memory footprint
  resulted in worse latency and energy consumption.
question: "Why did 4-bit quantization on nRF5340 shrink Flash use but increase latency and battery drain?"
details:
  realistic_solution: The Nordic nRF5340's Cortex-M33 application core lacks native hardware support for
    4-bit multiply-accumulate (MAC) instructions. While 4-bit packing halves the flash memory reads, the
    CPU must perform software unpacking on the fly. It uses bitwise AND masks and logical bit-shifts to
    expand the 4-bit values into 8-bit or 16-bit registers before executing the standard MAC instructions.
    The additional CPU cycles required for this unpacking overhead exceed the cycles saved from fewer
    flash fetches, increasing overall execution time and total energy consumed at the ~5mA active draw.
  common_mistake: Candidates often assume that reducing the memory payload automatically translates to
    faster execution due to reduced memory bandwidth usage, failing to account for the processor's instruction
    set limitations regarding sub-byte operations.
  napkin_math: 'Assume a layer with 100,000 weights. 8-bit baseline: 100k flash fetches (1 cycle) + 100k
    MACs (1 cycle) = 200,000 cycles. At 128 MHz: 200,000 / 128M = 1.56 ms. Energy: 1.56 ms * 5 mA = 7.8
    uC. 4-bit packed: 50k flash fetches (2 weights/byte) + 50k unpack routines (assume 3 cycles for mask/shift
    per byte) = 200,000 cycles just to load and unpack. Adding 100k MACs = 300,000 total cycles. At 128
    MHz: 300,000 / 128M = 2.34 ms. Energy: 2.34 ms * 5 mA = 11.7 uC. Latency and total energy increase
    by 50% despite half the memory footprint.'
