title: ESP-NOW Link Bubble
scenario: Two ESP32s pass a 500-byte activation of an anomaly model over an ESP-NOW
  link (1 Mbps). The model layer takes 2ms to compute.
question: Analyze the resulting pipeline bubble given the ESP-NOW MAC protocol imposes
  a 1.5ms synchronization latency per packet.
details:
  realistic_solution: 500 bytes is 4000 bits. At 1 Mbps, raw transfer takes 4ms. Adding
    the 1.5ms MAC synchronization yields a 5.5ms network phase. Since compute is only
    2ms, the pipeline is entirely network-bound, leaving a 3.5ms compute bubble.
  common_mistake: Forgetting to convert bytes to bits when dividing by the 1 Mbps
    PHY rate, yielding a heavily underestimated 0.5ms transfer time.
  napkin_math: 500B = 4000b. 4000b / 1Mbps = 4ms. Total sync = 4ms + 1.5ms = 5.5ms.
    Bubble = 5.5 - 2 = 3.5ms.
