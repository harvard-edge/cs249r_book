title: ESP-NOW Link Bubble
scenario: >
  Two ESP32s pass a 500-byte activation of an anomaly model over an ESP-NOW link (1 Mbps).
  The model layer takes 2ms to compute.
question: Analyze the resulting pipeline bubble given the ESP-NOW MAC protocol imposes a 1.5ms synchronization latency per packet.
details:
  realistic_solution: |
    At 1 Mbps, raw transfer of 4000 bits takes 4ms. Adding the 1.5ms MAC synchronization yields a 5.5ms network phase. Since compute is only 2ms, the pipeline is entirely network-bound, leaving a 3.5ms compute bubble where the NPU/CPU is idle waiting for data.
  common_mistake: |
    **The Pitfall:** Forgetting to convert bytes to bits when dividing by the 1 Mbps PHY rate.
    **The Rationale:** Candidates casually divide 500 bytes by 1,000,000 bps, confusing bytes and bits.
    **The Consequence:** They estimate a 0.5ms transfer time and falsely conclude the pipeline is compute-bound.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Payload: 500 bytes.
       - Network: 1 Mbps (megabits per second), 1.5ms sync overhead.
       - Compute time: 2ms.
    2. **Calculations:**
       - 500 bytes = 4,000 bits.
       - Transfer time: 4,000 bits / 1,000,000 bits/s = 0.004s (4 ms).
       - Total network latency: 4 ms + 1.5 ms = 5.5 ms.
       - Compute bubble: 5.5 ms - 2 ms = 3.5 ms.
    3. **Conclusion & Interpretation:** Network takes 5.5ms, Compute takes 2ms. **Result: Network-Bound (3.5ms bubble)**.
