title: Evaluating Memory Constraints on Shared SRAM Architectures
scenario: You are evaluating two INT8 anomaly detection models for deployment on an ARM Cortex-M7 + Ethos-U55
  (Corstone-300) system. The system runs at 480 MHz and features exactly 512 KB of shared SRAM between
  the M7 and the Ethos-U55 NPU. The RTOS, network stack, and sensor buffers require a strict 140 KB of
  this SRAM. Model A is a standard CNN with 120,000 parameters and a peak activation buffer of 260 KB.
  Model B is a depthwise-separable architecture with 190,000 parameters but a highly optimized peak activation
  buffer of 110 KB. Which architecture is more feasible for this target and why?
question: "Which Corstone-300 model is feasible: 120K params with 260 KB activations or 190K params with 110 KB activations?"
details:
  realistic_solution: Model B is the correct and only viable choice. In TinyML, especially on devices
    like the Corstone-300 where the MCU and NPU share the same SRAM pool, total peak memory footprint
    dictates feasibility. Even though Model B has more weights, its severely reduced activation footprint
    keeps the total memory well within the physical limits of the 512 KB SRAM, whereas Model A will cause
    an immediate Out-Of-Memory (OOM) fault.
  common_mistake: Candidates often look purely at the parameter count and incorrectly conclude that Model
    A is the smaller, more efficient choice. They fail to calculate the total memory footprint by combining
    weights, peak activations, and system overhead within a shared memory architecture.
  napkin_math: 'Total System SRAM: 512 KB. Overhead: 140 KB. Available SRAM for Model: 512 - 140 = 372
    KB. Model A footprint (INT8 = 1 byte/param): 120 KB (weights) + 260 KB (activations) = 380 KB (Exceeds
    372 KB limit by 8 KB). Model B footprint: 190 KB (weights) + 110 KB (activations) = 300 KB (Leaves
    a safe 72 KB margin for heap fragmentation).'
