title: The Unstable Keyword Augmentation
scenario: You are building a keyword spotting model for a wearable device on a Cortex-M4 MCU. Your initial dataset of the keyword 'start' was recorded in a quiet room. To improve robustness, you decide to augment the data by additively mixing in background noise from a public audio dataset. After retraining your model on this augmented data, you find that its accuracy on your original clean test set has dropped by 50%, and it now has an extremely high false positive rate on noisy real-world audio. You did not change the model architecture or the MFCC feature extraction pipeline.
question: "Why does uncontrolled noise mixing ruin the Cortex-M4 keyword `start` model clean accuracy and false-positive rate?"
details:
  realistic_solution: The problem is a poorly controlled data augmentation pipeline that creates low-quality, unrealistic training data. By simply adding background noise without controlling the Signal-to-Noise Ratio (SNR), many of the training examples likely had noise levels far exceeding the keyword's energy. The model didn't learn to 'hear the keyword through the noise'; it learned that samples with high energy or certain frequency profiles are 'not keyword'. This degrades performance on clean data (where the keyword is the only energy) and fails on noisy data. The correct approach is to scale the noise to achieve a specific, realistic target SNR (e.g., +5 dB, +10 dB, +15 dB) for each augmented sample, creating a dataset that teaches the model to isolate the keyword across a variety of challenging but plausible conditions.
  common_mistake: |
    **The Pitfall:** Performing naive data augmentation by simply adding noise to a clean signal without normalizing for intensity.
    **The Rationale:** This creates unrealistic training examples where the noise can be significantly louder than the signal, teaching the model incorrect patterns.
    **The Consequence:** The model learns that any high-energy frame is "not-keyword", destroying its accuracy.
  napkin_math: |
    * **Uncontrolled Noise:** Signal RMS = 0.1, Noise RMS = 1.0 => SNR = -20dB. The model learns 'loud = not keyword'.
    * **Fix:** Scale noise to a target SNR. For +10dB: noise_scale = signal_RMS / 10^(10/20) = 0.1 / 3.16 = 0.032.
    * **Result:** Controlled augmentation preserves the signal while adding **realistic background noise**.
  options:
  - The MFCC feature extraction is failing to process the complex augmented audio, creating garbage input vectors.
  - The model is too small; a larger model is needed to learn from a more diverse and noisy dataset.
  - The Cortex-M4's limited precision (no FPU) is causing numerical underflow when processing the low-energy noise signals.
  - The data augmentation created unrealistic samples with uncontrolled Signal-to-Noise Ratios (SNR), corrupting the training data quality.
  correct_index: 3
