title: Novel Distillation Strategy for ESP32-S3
scenario: You are designing an always-on anomaly detection system for industrial motors using the ESP32-S3 (240 MHz dual-core Xtensa, 512 KB SRAM, 8 MB PSRAM, INT8 vector extensions). Your baseline model is a 12MB ResNet teacher that achieves 99% accuracy but vastly exceeds hardware limits. You must design a knowledge distillation architecture for a highly specialized student model that fits entirely within SRAM and completely avoids the slower 8 MB PSRAM.
question: How do you construct the student architecture and distillation loss function to fit within 512 KB SRAM while maximizing the Xtensa cores?
details:
  realistic_solution: The optimal solution requires Quantization-Aware Knowledge Distillation (QAKD) where the student is trained in simulated INT8 precision while matching both the logits and intermediate feature maps of the FP32 teacher. The student architecture must be synthesized specifically for the ESP32-S3, using depthwise-separable convolutions tailored to the vector extension's register sizes, and carefully structured so that the combined size of weights, input buffers, and peak intermediate activations never exceeds the 512 KB SRAM limit.
  common_mistake: |
    **The Pitfall:** Using standard logit matching followed by post-training quantization.
    **The Rationale:** Candidates stick to standard distillation pipelines, which severely degrade accuracy when the student is heavily quantized afterwards.
    **The Consequence:** This produces an inaccurate model. Furthermore, blindly allocating memory that spills over into the 8 MB PSRAM results in high latency cache misses.
  napkin_math: |
    - **SRAM Constraint:** 512 KB limit.
    - **Student Design:** 250 KB INT8 parameters, 16 KB input buffer, 64 KB peak activation buffer = 330 KB total (fits securely).
    - **Compute Requirement:** 15M MACs per inference.
    - **Effective Throughput:** INT8 vector extensions yield ~8 MACs/cycle. 8 MACs * 240 MHz = 1.92 GMACs/sec.
    - **Inference Latency:** 15,000,000 MACs / 1.92 GMACs/sec = **7.81 ms**.
    - **Conclusion:** A carefully designed student model stays clear of the slow PSRAM, leaving ample headroom for the dual cores to handle WiFi/BLE stacks.
