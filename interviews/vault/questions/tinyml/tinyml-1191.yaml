title: Novel Distillation Strategy for ESP32-S3
scenario: You are designing an always-on anomaly detection system for industrial motors
  using the ESP32-S3. Your baseline model is a 12MB ResNet teacher that achieves 99%
  accuracy but vastly exceeds the hardware limits. You must design a novel knowledge
  distillation architecture to train a highly specialized student model that fits
  entirely within the 512 KB SRAM, utilizes the INT8 vector extensions, and completely
  avoids the slower 8 MB PSRAM during critical inference paths. How do you construct
  the student architecture and the distillation loss function to achieve this while
  maximizing the 240 MHz dual-core Xtensa performance?
question: How do you construct the student architecture and the distillation loss
  function to achieve this while maximizing the 240 MHz dual-core Xtensa performance?
details:
  realistic_solution: The optimal solution requires Quantization-Aware Knowledge Distillation
    (QAKD) where the student is trained in simulated INT8 precision while matching
    both the logits and intermediate feature maps of the FP32 teacher. The student
    architecture must be synthesized specifically for the ESP32-S3, using depthwise-separable
    convolutions tailored to the vector extension's register sizes, and carefully
    structured so that the combined size of weights, input buffers, and peak intermediate
    activations never exceeds the 512 KB SRAM limit.
  common_mistake: Candidates often propose standard logit matching followed by post-training
    quantization, which severely degrades accuracy for highly compressed models. They
    also typically fail to consider memory hierarchy, blindly allocating memory that
    spills over into the 8 MB PSRAM, resulting in high latency cache misses.
  napkin_math: 'Assume the student model is designed with 250K INT8 parameters (250
    KB). The input audio spectrogram is 16 KB. The peak activation buffer at the widest
    layer is designed to be 64 KB. Total SRAM requirement: 250 KB + 16 KB + 64 KB
    = 330 KB, comfortably fitting in the 512 KB SRAM and avoiding the 8 MB PSRAM completely.
    If the student requires 15M MACs per inference, and the ESP32-S3 INT8 vector extensions
    achieve a conservative effective throughput of 8 MACs/cycle at 240 MHz (1.92 GMACs/sec),
    inference latency is 15M / 1.92G = 7.81 milliseconds, leaving ample headroom for
    the dual cores to handle WiFi/BLE stacks.'
