title: 'Real-time RMS Feature Extraction on Cortex-M7 for TinyML Streaming'
scenario: 'You are designing a real-time anomaly detection system for industrial machinery using a tinyML setup. The system utilizes a Cortex-M7 microcontroller (480 MHz clock, 512 KB SRAM) paired with an Ethos-U55 NPU (configured for 256 MAC/cycle). The sensor provides vibration data at 10 kHz, with each sample being a 16-bit integer. Your task is to compute the Root Mean Square (RMS) value over a sliding window of 128 samples. The Ethos-U55 is dedicated to the MAC operations for RMS calculation, which is triggered once a full window is accumulated. The Cortex-M7 is responsible for ingesting samples, managing the sliding window in SRAM, and preparing data for the NPU. To ensure real-time performance, the entire process of ingesting a new sample, updating the window, and initiating the NPU computation (if a window is complete) must complete within the inter-sample arrival time.'
question: 'How many Cortex-M7 cycles per incoming 10 kHz sample are available for ingestion and sliding-window management?'
details:
  realistic_solution: 'Implement a highly optimized circular buffer for the sliding window to minimize memory copy operations. Utilize DMA (Direct Memory Access) for sensor data ingestion to offload the Cortex-M7 CPU from byte-level data transfers. Employ NPU-aware scheduling strategies, potentially using double-buffering, to allow the Cortex-M7 to prepare the next data window while the NPU processes the current one. The calculation highlights the extremely tight budget for even minimal CPU tasks.'
  common_mistake: 'Overlooking the CPU overhead for data movement, memory management, and NPU orchestration. Developers often focus solely on NPU throughput, assuming that offloading computationally intensive tasks guarantees real-time performance, without accounting for the critical path tasks that must still execute on the host CPU within tight deadlines.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Sensor data rate (Fs): 10 kHz
    - Cortex-M7 Clock Frequency (Fc): 480 MHz

    **Calculations:**
    - Time per sample (Ts) = 1 / 10,000 s = 0.0001 s = 100 µs
    - Cycles_per_sample = 480,000,000 cycles/s * 0.0001 s = 48,000 cycles

    **Conclusion & Interpretation:**
    - **Result: 48,000 cycles (Compute-Bound)**. This highlights the extremely tight CPU budget for data ingestion and sliding-window management before falling out of real-time constraints.
