title: The Over-Engineered Sensor Bus
scenario: You are the Staff ML Systems Engineer designing a sensor fusion system for a smart factory.
  The system has 50 TinyML devices, each with a microcontroller running a 1024-point FFT on vibration
  data sampled at 1kHz (16-bit). Each device sends its complete 1024-point spectral result (16-bit magnitude)
  to a central NVIDIA Jetson AGX Orin edge computer once per second. A junior engineer, citing their HPC
  background, is concerned about data bus contention and proposes using a multi-port PCIe switch to connect
  all 50 devices to the Jetson. Using the provided hardware constants, diagnose the primary flaw in this
  proposal.
details:
  realistic_solution: The proposal is fundamentally flawed because it misapplies a high-power, high-cost,
    short-range datacenter interconnect to a low-bandwidth, physically distributed microcontroller system.
    The actual bandwidth required is minuscule (~0.82 Mbps), thousands of times less than a single PCIe
    lane's capacity. The correct approach is to use a bus protocol appropriate for microcontrollers, such
    as CAN bus (for its robustness in noisy industrial environments) or SPI (for its simplicity and sufficient
    speed). These protocols meet the performance needs with far lower power consumption, component cost,
    and wiring complexity. Proposing PCIe demonstrates a failure to recognize the different physical and
    economic constraints between cloud and edge/tiny systems.
  common_mistake: Focusing solely on maximum bandwidth as the primary selection criteria for an interconnect,
    ignoring power, cost, physical distance, and protocol overhead. Engineers accustomed to datacenter
    design often assume 'more bandwidth is always better' without considering the context of the physical
    system and the extreme cost-per-bit penalty of high-speed interconnects when misapplied at the wrong
    scale.
  napkin_math: 1. **Data per Sensor:** Each device sends a 1024-point result with 16-bit (2-byte) values.
    `1024 points * 2 bytes/point = 2,048 bytes`.
  options:
  - The proposal is flawed. The total required bandwidth is only ~102 KB/s, making a low-power bus like
    CAN or SPI a vastly more appropriate and cost-effective choice than the massive overkill of PCIe.
  - The proposal is correct. While raw data rate is low, the protocol overhead and interrupt handling
    for 50 devices would saturate a simple bus like SPI. PCIe with RDMA is necessary for the Jetson to
    handle the firehose efficiently.
  - The proposal is flawed because PCIe's switched fabric introduces too much variable latency. A direct,
    multi-channel SPI interface on the Jetson would provide the deterministic, hard real-time performance
    needed.
  - The proposal is correct because a factory floor is electrically noisy. Standard microcontroller buses
    like SPI lack the robust differential signaling of PCIe, which is required to ensure reliable data
    transmission over distance.
  correct_index: 0
