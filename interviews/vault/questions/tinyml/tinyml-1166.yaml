title: Calculate Fallback Model MAC Budget on Cortex-M7
scenario: An anomaly detection system runs on an ARM Cortex-M7 + Ethos-U55 platform. During thermal throttling, the NPU is power-gated, and the system falls back to a smaller model running solely on the 480 MHz Cortex-M7.
question: If the system requires a strict latency budget of 15ms and the Cortex-M7 achieves 0.5 MACs per cycle, what is the maximum MAC limit for the fallback model?
details:
  realistic_solution: Isolate the CPU's available cycles for the specific 15ms window and calculate the absolute compute ceiling using the CPU's much lower effective MAC throughput.
  common_mistake: |
    **The Pitfall:** Applying NPU-level MAC throughput to the CPU fallback calculation.
    **The Rationale:** Engineers anchor on the Ethos-U55's high MAC/cycle capability and fail to isolate the M7's severely limited effective MAC throughput.
    **The Consequence:** The fallback model is sized too large, missing the 15ms deadline and causing a complete system failure during thermal throttling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - M7 Clock: 480 MHz.
       - Real-time deadline: 15 ms.
       - M7 Effective Throughput: 0.5 MACs/cycle.
    2. **Calculations:**
       - Total cycles available: 480,000,000 cycles/s * 0.015 s = 7,200,000 cycles.
       - Maximum MACs: 7,200,000 cycles * 0.5 MACs/cycle = 3,600,000 MACs.
    3. **Conclusion & Interpretation:**
       - **Result: 3.6 MMACs.** The fallback model is intensely compute-bound. To guarantee fail-operational behavior, the architecture must be pruned strictly below 3.6 million MACs.
