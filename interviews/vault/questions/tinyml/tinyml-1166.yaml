title: Calculate Fallback Model MAC Budget on Cortex-M7
scenario: You are deploying an anomaly detection system on an ARM Cortex-M7 + Ethos-U55
  (Corstone-300) platform with 512 KB shared SRAM. Normally, the primary model executes
  on the Ethos-U55 NPU (configured for 256 MAC/cycle). As a graceful degradation strategy
  during severe thermal throttling, the NPU is power-gated, and the system falls back
  to a smaller model running solely on the 480 MHz Cortex-M7. If the system requires
  a strict real-time latency budget of 15ms per inference and the Cortex-M7 achieves
  an effective throughput of 0.5 MACs per clock cycle due to shared SRAM access overhead,
  calculate the maximum MAC limit for the fallback model.
question: What maximum MAC count can a Cortex-M7 fallback model support within a 15
  ms thermal-throttling deadline?
details:
  realistic_solution: To guarantee fail-operational behavior, the fallback model must
    be strictly bounded by the Cortex-M7's compute capacity within the deadline. The
    engineer calculates the total CPU cycles in 15ms and multiplies by the effective
    CPU MAC throughput to find the absolute computational ceiling.
  common_mistake: Candidates often fail to isolate the CPU's available cycles for
    the specific 15ms time window, or they mistakenly apply the Ethos-U55's high MAC/cycle
    throughput to the CPU fallback calculation.
  napkin_math: '1. M7 Clock speed: 480 MHz = 480,000,000 cycles/sec. 2. Total available
    cycles in 15ms budget = 480,000,000 cycles/sec * 0.015 sec = 7,200,000 cycles.
    3. Cortex-M7 effective throughput = 0.5 MACs/cycle. 4. Maximum model complexity
    = 7,200,000 cycles * 0.5 MACs/cycle = 3,600,000 MACs (3.6 MMACs).'
