title: The Quantization Cliff
scenario: Your keyword spotting model runs at 92% accuracy in FP32. Post-training quantization to INT8
  drops it to 91%. Your manager asks you to push to INT4 to halve the model size again. You try it and
  accuracy collapses to 74%. What happened, and how do you recover?
details:
  realistic_solution: 'INT4 has only 16 discrete levels per weight. For layers with wide weight distributions
    (like the first convolutional layer processing raw spectrograms, or the final classification head),
    16 levels cannot capture the dynamic range, causing severe clipping and rounding errors that cascade
    through the network. The fix is mixed-precision quantization: keep sensitive layers (first and last)
    at INT8 while quantizing the middle depthwise layers to INT4. This recovers most of the accuracy while
    still shrinking the model significantly.'
  common_mistake: '"INT4 is just too aggressive — we need to stay at INT8." This gives up without understanding
    the mechanism or the fix.'
  napkin_math: 'A 250 KB INT8 keyword spotting model: first conv + last FC ≈ 40 KB (keep at INT8). Remaining
    layers ≈ 210 KB → 105 KB at INT4. Total = 145 KB — a 42% reduction instead of 50%, but accuracy recovers
    to ~90% vs the 74% of uniform INT4.'
