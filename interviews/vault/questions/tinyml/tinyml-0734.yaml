title: The Quantization Cliff
scenario: 'Your keyword spotting model runs at 92% accuracy in FP32. Post-training quantization to INT8 drops it to 91%. Your manager asks you to push to INT4 to halve the model size again. You try it and accuracy collapses to 74%.'
question: 'Why does pushing a keyword model from INT8 to INT4 collapse accuracy from 91% to 74%, and how do you recover?'
details:
  realistic_solution: 'INT4 has only 16 discrete levels per weight. For layers with wide weight distributions (like the first convolutional layer processing raw spectrograms, or the final classification head), 16 levels cannot capture the dynamic range, causing severe clipping and rounding errors that cascade through the network. The fix is mixed-precision quantization via PTQ or QAT: keep sensitive layers (first and last) at INT8 while quantizing the middle depthwise layers to INT4. This recovers most of the accuracy while still shrinking the model significantly.'
  common_mistake: |
    **The Pitfall:** Throwing hands up and stating "INT4 is just too aggressive — we need to stay at INT8."
    **The Rationale:** Engineers treat the network as a monolith instead of evaluating the sensitivity of individual layers.
    **The Consequence:** The model remains unnecessarily large, missing out on massive deployment optimizations possible via mixed precision.
  napkin_math: |
    **Assumptions & Constraints:**
    - 250 KB INT8 keyword spotting model.
    - First conv + last FC = ~40 KB (in INT8).
    - Remaining layers = ~210 KB (in INT8).

    **Calculations:**
    - If uniform INT4: 250 KB / 2 = 125 KB (74% accuracy).
    - Mixed precision: Keep sensitive layers at INT8 (40 KB).
    - Quantize middle layers to INT4: 210 KB / 2 = 105 KB.
    - Total mixed precision size = 40 KB + 105 KB = 145 KB.

    **Conclusion & Interpretation:**
    - **Result: 145 KB mixed-precision model yields a 42% size reduction with recovered accuracy (Accuracy-Bound)**. Mixed precision via PTQ/QAT is required for 4-bit edge deployments.
