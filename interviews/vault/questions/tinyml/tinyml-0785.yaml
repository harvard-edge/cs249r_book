title: Tinyml New 0007
scenario: You replace standard convolutions with depthwise separable convolutions on a Jetson Orin to
  speed up a vision model. Despite FLOPs dropping by 9x, the end-to-end latency only improves by 10%.
details:
  realistic_solution: Depthwise convolutions have notoriously low arithmetic intensity because they don't
    reuse input channels across output channels. While you slashed the FLOPs, you pushed the operation
    deep into the memory-bound region of the roofline model. The Jetson Orin's ridge point is 275 TOPS
    / 204 GB/s ≈ 1348 ops/byte. With AI ≈ 0.9 ops/byte, the attainable throughput is only ~184 GOPS —
    far below the 275 TOPS compute ceiling. The GPU is now idling waiting for memory. The solution is
    to fuse the depthwise convolution with the pointwise convolution or activation layers to increase
    arithmetic intensity and reach the compute-bound regime.
  common_mistake: Assuming that reducing theoretical FLOPs will yield a linearly proportional decrease
    in latency on modern bandwidth-constrained hardware.
  napkin_math: 'Standard 3x3 conv over C channels reuses inputs C times. Depthwise 3x3 does 9 MACs per
    10 bytes (1 input + 9 weights). Arithmetic intensity AI = 9 MACs / 10 B = 0.9 MACs/B. Ridge point
    of Orin: 275 TOPS / 204 GB/s = 1348 ops/byte. AI=0.9 << 1348 → deeply memory-bound. Attainable compute
    = 0.9 × 204 GB/s = ~184 GOPS, far below the 275 TOPS compute ceiling.'
