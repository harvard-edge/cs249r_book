title: Tinyml New 0007
scenario: You replace standard convolutions with depthwise separable convolutions on a Jetson Orin to speed up a vision model. Despite FLOPs dropping by 9x, the end-to-end latency only improves by 10%.
question: Why does replacing standard convolutions with depthwise separable convolutions barely improve Jetson Orin latency?
details:
  realistic_solution: Depthwise convolutions have notoriously low arithmetic intensity because they don't reuse input channels across output channels. While you slashed the FLOPs, you pushed the operation deep into the memory-bound region of the roofline model. The Jetson Orin's ridge point is 275 TOPS / 204 GB/s ≈ 1348 ops/byte. With AI ≈ 0.9 ops/byte, the attainable throughput is only ~184 GOPS — far below the 275 TOPS compute ceiling. The GPU is now idling waiting for memory. The solution is to fuse the depthwise convolution with the pointwise convolution or activation layers to increase arithmetic intensity and reach the compute-bound regime.
  common_mistake: |
    **The Pitfall:** Assuming that reducing theoretical FLOPs will yield a linearly proportional decrease in latency on modern bandwidth-constrained hardware.
    **The Rationale:** Engineers evaluate algorithms entirely on FLOPs instead of factoring in the cost of memory movement and arithmetic intensity.
    **The Consequence:** Heavy refactoring effort yields practically zero real-world speedup because the bottleneck shifted entirely to memory bandwidth.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Orin ridge point: 275 TOPS / 204 GB/s ≈ 1348 OPs/byte.
       - Depthwise 3x3: 9 MACs (18 OPs) per 10 bytes read.
    2. **Calculations:**
       - Arithmetic Intensity: 18 OPs / 10 bytes = 1.8 OPs/byte.
       - Attainable compute: 1.8 OPs/byte × 204 GB/s = 367.2 GOPS.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** AI (1.8) << Ridge Point (1348). 367.2 GOPS is roughly 0.1% of the 275 TOPS ceiling, idling the GPU with memory stalls.
