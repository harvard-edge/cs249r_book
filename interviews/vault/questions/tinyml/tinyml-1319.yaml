title: TinyML Accelerator Trade-offs for Edge Anomaly Detection
scenario: A startup is developing a battery-powered smart sensor for real-time anomaly detection. They need to run a small CNN (~1M MACs per inference) at 10 inferences per second (100ms budget). Platform A is an ARM Cortex-M7 with an Ethos-U55 NPU. Platform B is a Cortex-M4 without an NPU, relying on CMSIS-NN CPU acceleration.
question: Which platform best meets the 10 Hz anomaly detection requirement while optimizing for long battery life?
details:
  realistic_solution: 'Platform A (Cortex-M7 + Ethos-U55) offers significantly higher energy efficiency and lower latency for neural network inference due to the dedicated NPU. This translates to longer battery life and more headroom for other tasks. It requires using specialized tools and frameworks (e.g., TensorFlow Lite for Microcontrollers with Ethos-U drivers), which might increase initial development complexity but yields long-term performance and power benefits. Platform B is more programmable but consumes significantly more power per inference.'
  common_mistake: |
    **The Pitfall:** Assuming that meeting the 100ms deadline is the only metric of success.
    **The Rationale:** Candidates check if the CPU can finish the task in time (30ms < 100ms) but ignore the energy cost of keeping the CPU active for 30ms versus 0.004ms.
    **The Consequence:** The CPU-only device spends 30% of its total lifecycle at peak active power, drastically shortening the battery-powered sensor's lifespan.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Constraint: 10 inferences/sec (100 ms budget).
    - Platform A (NPU): 512 MAC/cycle, 480 MHz.
    - Platform B (M4 CPU): 5 cycles/MAC, 168 MHz.

    **Calculations:**
    - Platform A Latency: 1,000,000 MACs / 512 = 1,953 cycles. 1,953 / 480 MHz ≈ 0.004 ms.
    - Platform B Latency: 1,000,000 MACs * 5 = 5,000,000 cycles. 5,000,000 / 168 MHz = 29.7 ms.

    **Conclusion & Interpretation:**
    - **Result: Platform A (Compute-Bound).** Both meet the 100 ms deadline, but Platform A completes the task ~7,400x faster, allowing heavy sleep states and massively extending battery life.
