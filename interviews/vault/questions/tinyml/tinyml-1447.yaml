title: Hardware Security for TinyML Model Integrity on Nordic nRF5340
scenario: A critical tinyML anomaly detection model is deployed on a Nordic nRF5340 SoC (128 MHz, 256 KB SRAM, 1 MB flash). Advanced software-based adversarial training or large defense mechanisms are impractical due to constraints.
question: "Which nRF5340 hardware security feature protects TinyML firmware and model integrity against tampering or extraction?"
details:
  realistic_solution: A crucial hardware security feature is Secure Boot (or a hardware root of trust), which verifies the integrity and authenticity of the firmware (including the ML model) during startup, preventing unauthorized code execution or model tampering. Additionally, Memory Protection Units (MPU) or Access Port Protection (APP) can restrict unauthorized access to sensitive memory regions containing model weights and parameters.
  common_mistake: |
    **The Pitfall:** Proposing overly complex software-defined defenses or external security modules.
    **The Rationale:** Candidates overlook fundamental hardware-level protections inherent to the microcontroller.
    **The Consequence:** They propose solutions that consume too much memory, CPU, or BOM cost, making them impractical for TinyML.
  napkin_math: |
    1. Assume firmware image with ML model occupies 500 KB of Flash.
    2. Estimate secure boot overhead: Cryptographic signature verification (e.g., 256-bit ECDSA) adds ~5-10 ms boot time.
    3. Evaluate impact: 5-10 ms boot overhead is acceptable for protecting firmware integrity without impacting runtime SRAM.
    4. **Final Result: Hardware secure boot imposes only ~5-10 ms boot latency while guaranteeing integrity.**
