title: The Wildlife Sensor's Power Budget
scenario: You're designing a battery-powered sensor for a remote wildlife monitoring system. It uses a microcontroller to run a simple motion detection model. The device wakes up once every 20 seconds to perform a 2-second inference. The MCU consumes 40 mW in active mode and 10 µW in deep sleep mode.
question: What average power does the wildlife sensor draw with 2 s active at 40 mW and 18 s sleep at 10 µW?
details:
  realistic_solution: 'Calculate total energy per cycle: E_cycle = P_active * t_active + P_sleep * t_sleep. Average power: P_avg = E_cycle / t_period.'
  common_mistake: |
    **The Pitfall:** Ignoring sleep energy or failing unit conversions.
    **The Rationale:** Candidates either completely ignore the energy consumed during sleep (because 10 µW seems negligible) or make a critical unit conversion error between milliwatts (mW) and microwatts (µW).
    **The Consequence:** Over long periods, sleep power heavily influences the energy budget. Unit errors result in wildly inaccurate battery life projections.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Period: 20 seconds.
       - Active time: 2 seconds at 40 mW.
       - Sleep time: 18 seconds at 10 µW (0.01 mW).
    2. **Calculations:**
       - Active energy per cycle: 40 mW * 2s = 80 mJ.
       - Sleep energy per cycle: 0.01 mW * 18s = 0.18 mJ.
       - Total energy per cycle: 80 mJ + 0.18 mJ = 80.18 mJ.
       - Average power: 80.18 mJ / 20s = 4.009 mW.
    3. **Conclusion & Interpretation:**
       - **Result: Energy-Bound.** The average power is **~4.01 mW**. Duty cycling reduces power consumption by ~90% compared to a continuously active system.
  options:
  - ~13.0 mW
  - ~4.01 mW
  - ~4.90 mW
  - ~4.00 mW
  correct_index: 1
