title: The Wildlife Sensor's Power Budget
scenario: You're designing a battery-powered sensor for a remote wildlife monitoring system. It uses a
  Cortex-M4 microcontroller to run a simple motion detection model. The device wakes up once every 20
  seconds to perform a 2-second inference. The Cortex-M4 consumes 40 mW in active mode and 10 µW in deep
  sleep mode. Calculate the average power consumption over one full duty cycle.
question: "What average power does the wildlife sensor draw with 2 s active at 40 mW and 18 s sleep at 10 uW?"
details:
  realistic_solution: 'Calculate total energy per cycle: E_cycle = P_active * t_active + P_sleep * t_sleep.
    Average power: P_avg = E_cycle / t_period. For P_active = 30 mW, t_active = 100 ms, P_sleep = 5 uA
    * 3.0V = 15 uW, t_sleep = 9,900 ms: E_active = 30 mW * 0.1s = 3,000 uJ. E_sleep = 0.015 mW * 9.9s
    = 148.5 uJ. E_cycle = 3,148.5 uJ. P_avg = 3,148.5 / 10,000 ms = 0.315 mW = 315 uW. Battery: CR2032
    at 225 mAh * 3.0V = 675 mWh. Lifetime = 675 / 0.315 = 2,143 hours = 89.3 days. To reach 1-year target:
    need P_avg < 77 uW, requiring either 4x less active time (25 ms) or 4x less frequent wakeups (every
    40s).'
  common_mistake: The most common mistake is either completely ignoring the energy consumed during sleep
    or making a unit conversion error between milliwatts (mW) and microwatts (µW). While the sleep power
    is tiny, it dominates the energy budget over long periods in ultra-low-power applications. A second
    mistake is incorrectly averaging the power figures directly without weighting them by the time spent
    in each state.
  napkin_math: 1. **Convert Units:** Sleep power = 10 µW = 0.01 mW. 2. **Define Cycle:** Period = 20s.
    Active time = 2s. Sleep time = 18s. 3. **Calculate Energy per Cycle:** E_active = 40 mW * 2s = 80
    mJ. E_sleep = 0.01 mW * 18s = 0.18 mJ. E_total = 80.18 mJ. 4. **Calculate Average Power:** P_avg =
    80.18 mJ / 20s = 4.01 mW. The duty cycle is 2/20 = 10%, so average power is roughly 10% of active
    power (4 mW) plus a negligible sleep contribution. Compared to a continuously active system (40 mW),
    duty cycling reduces power consumption by ~90%.
  options:
  - ~14.0 mW
  - ~25.0 mW
  - ~5.00 mW
  - ~4.01 mW
  correct_index: 3
