title: INT8 Quantization Accuracy Drop on ARM Cortex-M4 STM32F4
scenario: 'You are tasked with deploying a pre-trained convolutional neural network (CNN) for a critical image classification task onto an ARM Cortex-M4 microcontroller (STM32F4 series) with specific constraints: 168 MHz CPU, 256 KB SRAM, and no Hardware FPU. The original model was trained in FP32. To meet the strict memory and computational budget, you quantize the model to INT8 using a Post-Training Static Quantization (PTQ) strategy. Upon deployment, you observe a significant and unacceptable drop in inference accuracy compared to the FP32 baseline on a representative test dataset.'
question: Why might INT8 post-training quantization cause an unacceptable accuracy drop for a Cortex-M4 image classifier?
details:
  realistic_solution: 'A realistic solution involves several steps: 1. **Analyze Activation/Weight Distributions:** Deep dive into the distribution of activations and weights across layers using a diverse calibration set to identify problematic layers (e.g., those with large dynamic ranges or significant outliers). 2. **Per-Channel Quantization:** Employ per-channel quantization for weights, which offers finer granularity and can preserve more precision than per-tensor, especially for convolutional layers. 3. **Quantization-Aware Training (QAT):** If PTQ proves insufficient, migrate to QAT, allowing the model to adapt to quantization noise during retraining and compensate for accuracy loss. 4. **Fixed-Point Implementation Audit:** Carefully examine the specific fixed-point arithmetic implementation on the Cortex-M4 to ensure proper handling of zero-point offsets, scaling factors, and potential overflows/underflows, especially during accumulation. 5. **Mixed-Precision or Hybrid Strategies:** For critical layers, explore using higher precision (e.g., INT16) or custom quantization schemes if the accuracy impact is localized. 6. **Hardware-aware Benchmarking:** Iteratively profile and benchmark different quantization schemes directly on the STM32F4 to validate accuracy and performance, rather than relying solely on PC-side simulations.'
  common_mistake: |
    **The Pitfall:** Assuming that simple per-tensor uniform PTQ always yields acceptable accuracy.
    **The Rationale:** Overlooking the impact of non-linear operations (e.g., ReLU bounds) or ignoring how wide activation distributions squash standard values into a few quantization bins.
    **The Consequence:** Suffering massive accuracy degradation because outliers consume the entire dynamic range.
  napkin_math: |
    * **Memory Impact:** 2MB FP32 model shrinks to 0.5MB INT8.
    * **Quantization Range:** If activations range [-500, 500], the INT8 scale factor is 1000 / 255 ≈ 3.9.
    * **Error:** Each integer step represents ~3.9. If most effective values are actually in [-10, 10], they get squashed into just 5 bins.
    * **Result:** The outliers disproportionately consume the dynamic range, leading to **severe quantization noise**.
