title: The Heterogeneous MCU Scheduling Problem
scenario: 'You''re deploying a multi-modal anomaly detection system on a heterogeneous MCU. Your system runs two models: a vibration FFT + classifier (compute-heavy, 2M MACs) and a temperature trend LSTM (memory-heavy, 500K MACs but 180 KB of state).'
question: Which i.MX RT1170 core should run the 2M-MAC vibration classifier and the 180 KB-state temperature LSTM?
details:
  realistic_solution: 'Assign by bottleneck type: the vibration classifier (2M MACs, compute-bound) goes on the M7 (1 GHz, FPU, large I/D caches for fast matrix ops) — completes in 1ms. The temperature LSTM (500K MACs but 180 KB state, memory-bound) goes on the M4 (400 MHz, 256 KB SRAM fits the state without cache thrashing) — completes in 5ms. Parallel execution: max(1ms, 5ms) = 5ms per cycle, vs 9ms sequential on M7 alone (LSTM thrashes M7''s cache). Communication via shared SRAM mailbox (16 bytes per message, <1us latency). Energy savings: 78% lower than M7-only (0.30 mJ vs 1.35 mJ), plus 1.8x latency improvement.'
  common_mistake: |
    **The Pitfall:** Putting both models on the faster M7 core.
    **The Rationale:** Candidates assume the faster core will complete tasks quicker sequentially, ignoring the massive cache thrashing caused by the memory-bound LSTM model.
    **The Consequence:** Wasting the M4 entirely, doubling inference latency, and dramatically increasing energy consumption.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Models: Vibration (2M MACs, 1ms on M7), LSTM (500K MACs, 180KB state, 5ms on M4).
       - Power: ~150 mW active power.
    2. **Calculations:**
       - Parallel Execution: M7 runs classifier (1ms, 150 µJ), M4 runs LSTM (5ms, 150 µJ). Total = 5ms, 300 µJ.
       - Sequential (M7 only): Cache-thrashing LSTM takes 8ms + 1ms classifier = 9ms. Total = 9ms * 150 mW = 1350 µJ.
       - Savings: 1350 µJ - 300 µJ = 1050 µJ.
    3. **Conclusion & Interpretation:**
       - **Result: Heterogeneous Efficiency**. Dual-core scheduling saves 78% energy and reduces latency from 9ms to 5ms by avoiding cache thrashing.
