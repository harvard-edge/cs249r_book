title: The Heterogeneous MCU Scheduling Problem
scenario: 'You''re deploying a multi-modal anomaly detection system on an NXP i.MX RT1170 — a heterogeneous
  MCU with a Cortex-M7 (1 GHz, 2 MB SRAM, I/D caches, FPU) and a Cortex-M4 (400 MHz, 256 KB SRAM, DSP,
  no cache). Your system runs two models: a vibration FFT + classifier (compute-heavy, 2M MACs) and a
  temperature trend LSTM (memory-heavy, 500K MACs but 180 KB of state). Which model goes on which core,
  and how do they communicate?'
details:
  realistic_solution: 'Assign by bottleneck type: the vibration classifier (2M MACs, compute-bound) goes
    on the M7 (1 GHz, FPU, large I/D caches for fast matrix ops) — completes in 1ms. The temperature LSTM
    (500K MACs but 180 KB state, memory-bound) goes on the M4 (400 MHz, 256 KB SRAM fits the state without
    cache thrashing) — completes in 5ms. Parallel execution: max(1ms, 5ms) = 5ms per cycle, vs 9ms sequential
    on M7 alone (LSTM thrashes M7''s cache). Communication via shared SRAM mailbox (16 bytes per message,
    <1us latency). Power savings: 78% lower than M7-only (0.30 mW vs 1.35 mW), plus 1.8x latency improvement.'
  common_mistake: '"Put both models on the M7 — it''s faster." The M7 is faster per-core, but running
    both models sequentially on the M7 wastes the M4 entirely and doubles your inference latency.'
  napkin_math: M7 (1 GHz, 150 mW) runs the heavy CNN in 5ms -> 750 µJ. M4 (400 MHz, 30 mW) runs the vibration
    FFT in 15ms -> 450 µJ. Total energy = 1,200 µJ. If M7 did both, FFT might take 6ms, CNN 5ms -> 11ms
    at 150 mW = 1,650 µJ. The dual-core approach saves 450 µJ (27% energy) per cycle while running in
    parallel to halve latency.
