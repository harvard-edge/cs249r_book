title: 'Data Type Formatting for ESP32-S3 Hardware Acceleration'
scenario: 'You are curating an audio dataset for a keyword spotting model that will be deployed on an ESP32-S3 microcontroller. The target ESP32-S3 features a 240 MHz dual-core Xtensa processor, 512 KB SRAM, 8 MB PSRAM, WiFi/BLE, and specific vector extensions for INT8 operations. As part of the data preparation and labeling pipeline, you must ensure the dataset features align with the hardware''s capabilities to leverage inference acceleration.'
question: 'What specific numeric data type should the dataset features be mapped to for optimal hardware-accelerated inference on this platform?'
details:
  realistic_solution: 'The correct answer is INT8 (8-bit integer). While raw data is typically collected at higher bit depths (e.g., 16-bit PCM audio) and models are trained in FP32, the ESP32-S3''s vector extensions are specifically optimized for INT8 arithmetic. Therefore, the data preparation pipeline must include a calibration and quantization step to map the curated features to an 8-bit range (-128 to 127). Recognizing this constraint during curation is essential, as it dictates the required dynamic range and helps identify potential dataset bias or signal degradation early in the pipeline.'
  common_mistake: 'Candidates often state FP32 (32-bit float) because it is the standard format used during the initial training phase on desktop GPUs. They fail to recall that the target hardware relies on integer-based vector extensions for efficient execution.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: ESP32-S3 with 512 KB SRAM.
    - Input: 1-second audio at 16 kHz, 16-bit PCM.
    - Feature map: 40 Mel bins x 49 time frames.

    **Calculations:**
    - Raw Memory: 16,000 samples * 2 bytes = 32,000 bytes.
    - INT8 Feature Map Memory: 40 * 49 * 1 byte = 1,960 bytes.
    - SRAM Usage: 1,960 bytes / 524,288 bytes = 0.37%.

    **Conclusion & Interpretation:**
    - **Result: 1,960 bytes (Compute-Bound)**. Quantizing features to INT8 leverages hardware vector extensions and consumes only ~0.37% of SRAM.
