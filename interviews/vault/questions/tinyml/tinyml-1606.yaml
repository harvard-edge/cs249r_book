title: A/B Bank Model OTA Updates
scenario: Evaluating an OTA (Over-The-Air) update mechanism for model weights on a
  Cortex-M4 device with 1MB Flash.
question: Implement an A/B bank flash layout for model OTA updates and analyze the
  wear-leveling penalty, available program space, and rollback semantics implied by
  the implementation.
details:
  realistic_solution: Splitting the 1MB Flash into two 500KB banks allows seamless
    background downloads of a new model into Bank B while running inference from Bank
    A. However, this restricts the maximum model size to ~400KB (leaving room for
    the bootloader/OS). Additionally, repeatedly writing 400KB weights to the same
    Flash sectors will burn out those pages much faster than normal firmware.
  common_mistake: Allocating the full 1MB for the model size, completely ignoring
    the need for dual banking and the RTOS code footprint.
  napkin_math: 1MB / 2 banks = 500KB per slot max
