title: A/B Bank Model OTA Updates
scenario: You are evaluating an OTA (Over-The-Air) update mechanism for model weights on a Cortex-M4 device with 1MB Flash.
question: How does an A/B bank flash layout impact available program space and wear-leveling?
details:
  realistic_solution: Splitting the 1MB Flash into two 500KB banks allows seamless background downloads of a new model into Bank B while running inference from Bank A. However, this restricts the maximum model size to ~400KB (leaving room for the bootloader/OS). Additionally, repeatedly writing 400KB weights to the same Flash sectors will burn out those pages much faster than normal firmware.
  common_mistake: |
    **The Pitfall:** Allocating the full 1MB for the model size.
    **The Rationale:** Candidates focus on total available flash without considering OTA constraints.
    **The Consequence:** They fail to account for the need for dual banking and RTOS code footprint, resulting in a design that cannot be updated over the air.
  napkin_math: |
    - **Total Flash:** 1MB.
    - **Bank Size:** 1MB / 2 banks = **500KB per bank**.
    - **Model Limit:** 500KB - ~100KB (Bootloader/OS) = **~400KB maximum model size**.
