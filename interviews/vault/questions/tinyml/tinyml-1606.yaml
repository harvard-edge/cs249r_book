title: A/B Bank Model OTA Updates
scenario: You are evaluating an OTA (Over-The-Air) update mechanism for model weights on a Cortex-M4 device with 1MB Flash.
question: How does an A/B bank flash layout impact available program space and wear-leveling?
details:
  realistic_solution: Splitting the 1MB Flash into two dual 500KB banks enables seamless background downloads of novel model payloads into Bank B while evaluating real-time inference concurrently from Bank A. However, this forcibly restricts maximum model capacity to roughly 400KB to safeguard footprint for the immutable bootloader and OS kernel. Continual 400KB block erasures will additionally degrade specific sector durability rapidly.
  common_mistake: |
    **The Pitfall:** Allocating the full 1MB flash specification purely to the ML model footprint.
    **The Rationale:** Candidates focus mechanically on total available flash hardware without accounting for OTA duplication boundaries.
    **The Consequence:** They architect models that cannot physically be updated via standard A/B bank procedures without hard-bricking the edge device.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Flash Capacity: 1 MB (1024 KB).
    - Requirement: A/B dual banking for safe OTA.
    - OS/Bootloader Baseline: ~100 KB per bank.

    **Calculations:**
    - Split Banking = 1024 KB / 2 = 512 KB available per bank.
    - Actual ML Capacity = 512 KB - 100 KB OS overhead = 412 KB.

    **Conclusion & Interpretation:**
    - **Result: 400 KB (Structural Capacity Limit)**. Dual banking slashes the deployable model size to ~400 KB, halving the theoretical specification limits.
