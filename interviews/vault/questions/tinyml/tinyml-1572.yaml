title: TinyML Daisy-Chain Hop Count
scenario: Three Cortex-M4 boards are wired in a linear daisy-chain topology (A <->
  B <-> C) to exchange environmental sensor aggregates.
question: Recall the maximum number of network hops required for a full broadcast
  radiating from the central root node (B) to all leaf nodes.
visual:
  kind: svg
  path: tinyml-1572.svg
  alt: Three nodes labeled A, B, and C connected in a straight line with edges connecting
    A to B and B to C.
  caption: Linear Daisy Chain Topology
details:
  realistic_solution: In a linear daisy-chain (A <-> B <-> C), node B is physically
    adjacent to both A and C. A broadcast from B goes directly to A (1 hop) and directly
    to C (1 hop). The maximum topological depth from the root B is exactly 1 hop.
  common_mistake: Adding the hops sequentially and declaring 2 hops, failing to recognize
    that broadcasts travel parallel topological branches.
  napkin_math: max(dist(B,A), dist(B,C)) = max(1, 1) = 1 hop
