title: SRAM Arena Anti-Fragmentation
scenario: Analyzing a memory fragmentation issue on a 256KB SRAM Cortex-M4 running
  a dynamically allocated TensorFlow Lite Micro model.
question: Develop a static memory arena allocation strategy that completely eliminates
  heap fragmentation while sharing buffers between disjoint model sub-graphs.
details:
  realistic_solution: Replace dynamic `malloc` calls with a fixed contiguous `uint8_t`
    array of 150KB at compile time. Implement a memory planner during the model initialization
    phase that computes the liveness of intermediate tensors. Overlay tensors that
    are not needed simultaneously onto the same byte offsets within the static arena.
  common_mistake: Implementing a garbage collector or compaction algorithm on the
    MCU, which steals precious CPU cycles and breaks real-time deadlines.
  napkin_math: 256KB total - 150KB arena = 106KB OS/stack
