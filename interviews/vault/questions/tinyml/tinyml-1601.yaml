title: SRAM Arena Anti-Fragmentation
scenario: 'Analyzing a memory fragmentation issue on a 256KB SRAM Cortex-M4 running a dynamically allocated TensorFlow Lite Micro model.'
question: 'How can you develop a static memory arena allocation strategy that completely eliminates heap fragmentation while sharing buffers between disjoint model sub-graphs?'
details:
  realistic_solution: 'Replace dynamic `malloc` calls with a fixed contiguous `uint8_t` array of 150KB at compile time. Implement a memory planner during the model initialization phase that computes the liveness of intermediate tensors. Overlay tensors that are not needed simultaneously onto the same byte offsets within the static arena.'
  common_mistake: |
    **The Pitfall:** Implementing a garbage collector or compaction algorithm on the MCU.
    **The Rationale:** Candidates familiar with higher-level languages assume dynamic memory management is standard, ignoring MCU constraints.
    **The Consequence:** Steals precious CPU cycles, introduces non-deterministic latency, and breaks real-time deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total SRAM is strictly 256 KB.
    - Static tensor arena is pre-allocated as a 150 KB array.
    - Dynamic `malloc` calls are completely eliminated.

    **Calculations:**
    - Allocate fixed arena during model compilation.
    - Compute remaining SRAM for RTOS/stack: 256 KB - 150 KB.

    **Conclusion & Interpretation:**
    - **Result: 106 KB Headroom (Memory-Bound)**. The static memory planner permanently eradicates fragmentation risk while leaving 106 KB safely available for the OS.
