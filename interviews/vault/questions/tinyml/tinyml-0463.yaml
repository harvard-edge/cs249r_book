title: The Vision Transformer Memory Explosion
scenario: 'You are working on a visual wake-word system on a device with a Cortex-M7 and 1MB of SRAM.
  You''re comparing two models: a MobileNetV2-style CNN and a tiny Vision Transformer (ViT). On a GPU,
  the ViT has 2% higher accuracy. However, when deployed to the device, the ViT model crashes with an
  out-of-memory error during the forward pass of its first attention block. The input is a 96x96 pixel
  image, and the ViT uses a patch size of 2x2. What is the most likely cause of the memory overflow?'
details:
  realistic_solution: The ViT's self-attention mechanism is the culprit. Its memory complexity is quadratic
    with respect to the sequence length (the number of patches). The model must instantiate an `N x N`
    attention matrix in memory. For a 96x96 image with 2x2 patches, N = (96/2) * (96/2) = 48 * 48 = 2304.
    The attention matrix is 2304x2304. Storing this requires 2304^2 * 4 bytes = ~21 MB of SRAM, which
    massively overflows the 1MB limit.
  common_mistake: The most common mistake is to blame the model's parameter count. While the ViT might
    have more parameters, the actual cause of the crash is the intermediate activation memory, specifically
    for the attention map. Engineers accustomed to GPUs with gigabytes of RAM often forget that on-chip
    SRAM is measured in kilobytes, and an activation tensor that is small for a GPU can easily overflow
    a microcontroller's SRAM.
  napkin_math: 'Image: 96x96. Patch size: 2x2. Number of patches N = 48 * 48 = 2304. Attention matrix
    size = N x N = 2304 x 2304 = 5,308,416 elements. In FP32 (4 bytes), 5.3M * 4 = 21.2 MB. Available
    SRAM = 1 MB. 21.2 MB >> 1 MB → OOM crash.'
  options:
  - The ViT model has too many parameters to fit in 1MB of Flash.
  - The self-attention mechanism requires storing a quadratically-scaling attention matrix in SRAM, which
    overflows the memory.
  - The Cortex-M7 CPU does not have hardware acceleration for the softmax operation in the attention block.
  - Transformers are impossible to quantize to INT8, and the FP32 representation is too large.
  correct_index: 1
