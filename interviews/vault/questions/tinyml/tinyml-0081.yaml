title: The Keyword Spotting Latency Budget
scenario: 'Your keyword spotting system must respond within 500ms of the user saying the wake word. Budget
  the time across the full pipeline: audio capture, feature extraction, inference, and action.'
question: "How would you budget a 500ms keyword-spotting response deadline across audio capture, feature extraction, inference, and action?"
details:
  realistic_solution: 'Break down the 500ms budget: Audio capture: 20ms (hop size). Feature extraction:
    3ms. Inference: 1.5ms. Post-processing + action: 0.2ms. Total: **24.7ms**. Budget: 500ms. Utilization:
    24.7/500 = 5%. The MCU sleeps 95% of the time'
  common_mistake: '"The model inference is the bottleneck — optimize the model." On MCUs, the non-ML pipeline
    stages often dominate.'
  napkin_math: 'Audio capture: 20ms (hop size). Feature extraction: 3ms. Inference: 1.5ms. Post-processing
    + action: 0.2ms. Total: **24.7ms**. Budget: 500ms. Utilization: 24.7/500 = 5%. The MCU sleeps 95%
    of the time. At 5mW active, 10μW sleep: average power = 0.05 × 5 + 0.95 × 0.01 = **0.26 mW**. On a
    225 mAh coin cell (3.3V = 742 mWh): 742/0.26 = **2,854 hours ≈ 119 days**.'
