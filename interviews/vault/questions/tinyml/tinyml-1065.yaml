title: SRAM Optimization via Fused Operator Scheduling
scenario: You are deploying a sequential CNN on an ARM Cortex-M4 (STM32F4) microcontroller
  with 256 KB SRAM, 1 MB flash, and no FPU. The network has a 40 KB input, followed
  by Conv1 (outputs a 120 KB tensor) and Conv2 (outputs a 120 KB tensor), using CMSIS-NN
  SIMD (2x INT8 MACs/cycle). A standard sequential operator schedule crashes with
  an Out-Of-Memory (OOM) error during the transition between the two layers. However,
  when the compiler applies a strip-mined layer fusion schedule with a tile factor
  of 4, the inference runs successfully. Explain why the default sequential schedule
  fails and how the fused execution order resolves the SRAM bottleneck.
question: Why the default sequential schedule fails and how the fused execution order
  resolves the SRAM bottleneck?
details:
  realistic_solution: 'In a standard sequential schedule, the entire output of Conv1
    must be materialized in SRAM before Conv2 can begin execution, forcing the input,
    the full intermediate tensor, and the final output buffer to coexist in memory
    simultaneously to prevent overwriting unconsumed data. A fused schedule interleaves
    the execution order: it computes a small spatial tile of Conv1 and immediately
    feeds it into Conv2. This dramatically reduces the lifespan of the intermediate
    tensor, replacing the massive 120 KB buffer with a small tile buffer, dropping
    peak memory well below the hardware limit.'
  common_mistake: Candidates often incorrectly assume that total SRAM usage is just
    the size of the largest single layer's output, forgetting that intermediate tensors
    must overlap in memory during the transition between consecutive operators. They
    may also fail to recognize how interleaving operator execution at a sub-tensor
    (tile) level changes the lifetime and size of intermediate memory allocations.
  napkin_math: 'Standard Sequential Peak SRAM: 40 KB (Input) + 120 KB (Conv1 Out)
    + 120 KB (Conv2 Out allocated before Conv1 Out can be safely freed) = 280 KB.
    Since 280 KB > 256 KB (STM32F4 SRAM limit), the device OOMs. Fused Schedule Peak
    SRAM: The 120 KB intermediate is tiled by a factor of 4, creating a localized
    30 KB intermediate buffer. Peak SRAM = 40 KB (Input) + 30 KB (Conv1 Tile) + 120
    KB (Conv2 Out, where tiles are accumulated) = 190 KB. Since 190 KB < 256 KB, the
    model fits securely in the Cortex-M4''s memory.'
