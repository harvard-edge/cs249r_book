title: The Sensor Data Ingestion Budget
scenario: You are designing a TinyML device for wake-word detection. Your system uses a single microphone
  sampling at 16 kHz with a 16-bit resolution. To perform inference, your model requires a buffer containing
  exactly 1 second of audio data.
details:
  realistic_solution: The calculation is a direct conversion of the audio stream's data rate into a memory
    footprint. You need to multiply the sampling frequency by the size of each sample in bytes.
  common_mistake: The most common mistakes are confusing bits with bytes or miscalculating the data rate.
    Engineers might use the sample rate (16,000) as the final answer, or forget to multiply by the number
    of bytes per sample (16-bit resolution = 2 bytes), leading to a buffer that is 2x too small and causes
    immediate overflows and system crashes.
  napkin_math: '16 kHz sample rate = 16,000 samples per second. 16-bit resolution = 2 bytes per sample.
    For exactly 1 second of audio, the buffer size is: 16,000 samples * 2 bytes = 32,000 bytes (31.25
    KB). On a Cortex-M4 with 256 KB SRAM, this continuous audio ring buffer consumes ~12.2% of the total
    available memory.'
  options:
  - '16 KB. (Mistake: Assumes 8-bit resolution instead of 16-bit, a common off-by-two error).'
  - '64 KB. (Mistake: Assumes stereo/dual-channel audio, over-provisioning memory).'
  - '32 KB. (Correct: 16,000 samples/sec * 2 bytes/sample * 1 sec = 32,000 bytes).'
  - '256 KB. (Mistake: Confuses bits and bytes, calculating 16,000 * 16 bits = 256,000, then misinterpreting
    as KB).'
  correct_index: 2
