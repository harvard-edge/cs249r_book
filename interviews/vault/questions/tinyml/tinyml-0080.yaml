title: The Sensor Data Ingestion Budget
scenario: You are designing a TinyML device for wake-word detection. Your system uses a single microphone sampling at 16 kHz with a 16-bit resolution. To perform inference, your model requires a buffer containing exactly 1 second of audio data.
question: How much SRAM is required to buffer exactly 1 second of 16 kHz, 16-bit mono audio for TinyML wake-word inference?
details:
  realistic_solution: The calculation is a direct conversion of the audio stream's data rate into a memory footprint. You need to multiply the sampling frequency by the size of each sample in bytes.
  common_mistake: |
    **The Pitfall:** Confusing bits with bytes or miscalculating the data rate.
    **The Rationale:** Engineers might use the sample rate (16,000) as the final answer, or forget to multiply by the number of bytes per sample.
    **The Consequence:** This leads to a buffer that is 2x too small (or 8x too large), causing immediate overflows and system crashes.
  napkin_math: |
    * **Sample Rate:** 16,000 samples per second.
    * **Resolution:** 16-bit = 2 bytes per sample.
    * **Buffer Size:** 16,000 samples * 2 bytes = **32,000 bytes (31.25 KB)**.
    * **SRAM Impact:** On a Cortex-M4 with 256 KB SRAM, this consumes ~12.2% of total memory.
  options:
  - 16 KB
  - 64 KB
  - 32 KB
  - 256 KB
  correct_index: 2
