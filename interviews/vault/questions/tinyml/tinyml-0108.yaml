title: The Hardware Crypto Engine Latency
scenario: Your ML device connects to AWS over Wi-Fi. Every hour, it performs a TLS handshake to securely upload a model update. The MCU has a hardware crypto accelerator (AES/RSA). You use an RTOS. When the hourly TLS handshake occurs, the ML audio inference task (which runs every 20ms) misses its deadline and drops audio frames.
question: "Why does an hourly TLS handshake freeze the CPU and cause a Cortex-M4 with hardware AES to drop 20 ms audio frames?"
details:
  realistic_solution: 'The TLS handshake requires RSA-2048 or ECDSA signature verification, which is CPU-bound even with a hardware AES accelerator (AES != RSA). Software RSA-2048 verify on a Cortex-M4 takes 200-500ms of continuous CPU time in a blocking loop. During this time, the RTOS cannot schedule the ML audio thread, which misses its 20ms deadline 10-25 times. Fix: (1) Split the RSA computation across multiple RTOS ticks using a state-machine-based big-integer library. (2) Use ECDSA-P256 instead of RSA-2048 (10x faster: ~20-50ms). (3) Perform TLS handshake in a low-priority thread and yield every 5ms to allow ML inference to run.'
  common_mistake: |
    **The Pitfall:** Assuming the crypto engine handles all TLS operations efficiently in the background.
    **The Rationale:** Engineers see "Hardware Crypto Accelerator" on the datasheet and assume it covers asymmetric RSA/ECDSA used in handshakes, when it usually only covers symmetric AES.
    **The Consequence:** The software fallback blocks the CPU for hundreds of milliseconds, causing strict real-time deadlines to fail.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cortex-M4 MCU running at 168 MHz.
       - Strict 20ms audio frame deadline.
       - TLS Handshake requires RSA-2048 verification (software fallback).
    2. **Calculations:**
       - Software RSA-2048 verification = 200ms to 500ms.
       - Preempted ML task duration = 200ms to 500ms.
       - Dropped frames = 200ms / 20ms = 10 frames (min) to 500ms / 20ms = 25 frames (max).
    3. **Conclusion & Interpretation:**
       - **Result: 10 to 25 dropped audio frames sequentially.**
       - **Compute-Bound (Cryptography Priority Inversion)**
