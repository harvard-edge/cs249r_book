title: Watchdog Timers and Hard Real-Time Guarantees
scenario: Your Cortex-M4 runs inference for a safety-critical vibration monitor. The system must produce a result every 100ms. A colleague suggests using a 50ms average inference time as a margin.
question: Why must a watchdog timeout be based on worst-case ML execution time rather than average inference latency?
details:
  realistic_solution: The 50ms average margin hides the data-dependent execution time of the ML model. If the model uses an early-exit architecture or depends on ReLU sparsity, inference time is highly variable. The watchdog must accommodate the absolute worst-case path through the graph.
  common_mistake: |
    **The Pitfall:** Believing a 50ms average margin is sufficient for safety guarantees.
    **The Rationale:** Candidates fail to understand that on bare-metal MCUs running ML, execution time is data-dependent.
    **The Consequence:** The watchdog fires incorrectly during legitimate worst-case latency spikes, causing unnecessary system reboots.
  napkin_math: |
    - IWDG timeout: 100ms.
    - Average inference: 50ms.
    - Worst-case inference: 85ms.
    - Worst-case with interrupt storm (10ms): 95ms.
    - **The watchdog must be tuned to >95ms to avoid false resets while still catching an infinite hang.**
