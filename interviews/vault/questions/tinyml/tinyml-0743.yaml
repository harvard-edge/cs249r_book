title: The CMSIS-NN vs Manual Implementation
scenario: A colleague hand-wrote a Conv2D kernel in plain C for a Cortex-M4 at 168 MHz — nested loops over height, width, channels, and kernel dimensions. The layer has 32 input channels, 64 output channels, a 3x3 kernel, and a 16x16 input feature map. CMSIS-NN's optimized `arm_convolve_s8` runs the same layer.
question: "Why does CMSIS-NN beat plain C by about 8x on a 3x3, 32-to-64 channel Cortex-M4 Conv2D?"
details:
  realistic_solution: 'CMSIS-NN achieves ~8x speedup over naive C through three techniques: (1) SMLAD instruction packs two 16-bit MACs into one cycle (2x throughput), (2) im2col buffer layout enables sequential memory access instead of strided reads (eliminates cache misses), (3) loop unrolling and software pipelining hide memory latency.'
  common_mistake: |
    **The Pitfall:** Assuming CMSIS-NN is only ~2x faster simply because it is written in assembly.
    **The Rationale:** Candidates underestimate the power of SIMD instructions and optimal memory layouts.
    **The Consequence:** They fail to realize the compiler cannot auto-vectorize nested C loops, missing an 8-16x speedup.
  napkin_math: |
    1. Calculate Layer MACs: 16 * 16 (spatial) * 64 (out channels) * 32 (in channels) * 9 (kernel) = 4.72M MACs.
    2. Evaluate Naive C: ~5.5 cycles/MAC = 26M cycles = 155 ms at 168 MHz.
    3. Evaluate CMSIS-NN: ~0.7 cycles/MAC = 3.3M cycles = 19.7 ms at 168 MHz.
    4. Calculate speedup: 155 ms / 19.7 ms = 7.9x.
    5. **Final Result: CMSIS-NN is ~8x faster (19.7 ms) than naive C (155 ms).**
