title: The SRAM Memory Ceiling
scenario: You are starting a new project to deploy a keyword-spotting model on a Cortex-M4 class microcontroller.
  Before you even consider model architecture, you need to know your primary constraint. State the typical
  amount of on-chip SRAM available on this class of device.
question: "What typical on-chip SRAM range should you assume for a Cortex-M4 class TinyML device?"
details:
  realistic_solution: A typical Cortex-M4 or similar microcontroller has between 256 KB and 2 MB of SRAM.
    This isn't just for your model's weights and activations; it must also be shared with the real-time
    operating system (RTOS) and any other application logic, making the effective memory available for
    the ML model even smaller.
  common_mistake: Engineers accustomed to mobile or edge development often assume they have megabytes
    or even gigabytes of memory to work with. They completely underestimate the extreme memory scarcity
    of microcontrollers, where memory is measured in kilobytes and every byte counts.
  napkin_math: A cloud GPU like an NVIDIA H100 has 80 GB of HBM. A typical TinyML device has around 2
    MB of SRAM. The ratio is `80,000 MB / 2 MB = 40,000x`. You have forty thousand times less memory to
    work with compared to a cloud developer. This is the fundamental constraint of TinyML.
  options:
  - 80 GB
  - 8 GB
  - 256 KB - 2 MB
  - 32 MB
  correct_index: 2
