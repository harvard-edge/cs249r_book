title: The SRAM Memory Ceiling
scenario: You are starting a new project to deploy a keyword-spotting model on a Cortex-M4 class microcontroller. Before you even consider model architecture, you need to firmly establish your primary hardware constraint.
question: "What typical on-chip SRAM range should you assume for a Cortex-M4 class TinyML device?"
details:
  realistic_solution: Typical edge microcontrollers operate within a 256 KB to 2 MB SRAM envelope. This tiny arena must multiplex OS stacks, network buffers, heap allocations, and tensor arenas, leaving extreme constraints for actual model activations.
  common_mistake: |
    **The Pitfall:** Assuming microcontrollers have megabytes or gigabytes of memory space available purely for models.
    **The Rationale:** Engineers accustomed to mobile or edge server development fail to recalibrate intuition to deeply embedded structural constraints.
    **The Consequence:** They architect overparameterized topologies that trigger immediate Out-Of-Memory (OOM) failures at compiler lowering.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cloud reference: Datacenter GPU (e.g., 80 GB memory).
       - Edge reference: TinyML MCU SRAM (~2 MB max).
    2. **Calculations:**
       - Cloud memory: 80 GB = 80,000 MB.
       - Edge memory: 2 MB.
       - Ratio: 80,000 / 2 = 40,000x difference.
    3. **Conclusion & Interpretation:**
       - **Result: A TinyML developer targets environments 40,000x smaller than cloud counterparts (Memory-Bound).**
  options:
  - 80 GB
  - 8 GB
  - 256 KB - 2 MB
  - 32 MB
  correct_index: 2
