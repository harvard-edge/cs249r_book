title: The SRAM Memory Ceiling
scenario: You are starting a new project to deploy a keyword-spotting model on a Cortex-M4 class microcontroller. Before you even consider model architecture, you need to know your primary constraint.
question: "What typical on-chip SRAM range should you assume for a Cortex-M4 class TinyML device?"
details:
  realistic_solution: A typical Cortex-M4 or similar microcontroller has between 256 KB and 2 MB of SRAM. This isn't just for your model's weights and activations; it must also be shared with the real-time operating system (RTOS) and any other application logic, making the effective memory available for the ML model even smaller.
  common_mistake: |
    **The Pitfall:** Assuming microcontrollers have megabytes or gigabytes of memory.
    **The Rationale:** Engineers accustomed to mobile or edge development fail to adjust their intuition to embedded constraints.
    **The Consequence:** They design models that are orders of magnitude too large for the device.
  napkin_math: |
    1. Identify cloud GPU memory: NVIDIA H100 has 80 GB = 80,000 MB.
    2. Identify typical TinyML SRAM: ~2 MB.
    3. Calculate ratio: 80,000 MB / 2 MB = 40,000x.
    4. **Final Result: A TinyML developer has 40,000 times less memory than a cloud developer.**
  options:
  - 80 GB
  - 8 GB
  - 256 KB - 2 MB
  - 32 MB
  correct_index: 2
