title: Fallback Model Latency Scaling Analysis
scenario: You are analyzing a keyword spotting system deployed on an ARM Cortex-M4 (STM32F4) microcontroller
  running at 168 MHz with 256 KB SRAM and no FPU. The system implements graceful degradation by switching
  from a primary INT8 CNN (8 million MACs) to a fallback INT8 CNN (1 million MACs) when battery is low.
  Both models leverage CMSIS-NN SIMD instructions capable of 2x INT8 MACs/cycle. However, telemetry shows
  that switching to the 8x smaller fallback model only reduces the total inference cycle latency by about
  half. Explain why this system behavior occurs based on the hardware and pipeline constraints.
question: "Why does an 8x smaller fallback CNN reduce Cortex-M4 inference latency by only about half?"
details:
  realistic_solution: The non-linear scaling occurs because the total system latency includes both the
    neural network execution and fixed preprocessing overhead. While CMSIS-NN SIMD instructions efficiently
    execute the MACs, the fixed cost of computing audio features (like MFCCs) on a processor with no FPU
    takes a significant and constant amount of time. When the compute-heavy primary model is swapped for
    the fallback model, the fixed preprocessing time dominates the overall latency, causing the degradation
    in power draw and latency to plateau at roughly 2x instead of 8x.
  common_mistake: Candidates often assume that reducing a model's MAC operations by a factor of 8 will
    yield a proportional 8x reduction in total system latency and power consumption. They fail to account
    for Amdahl's Law applied to the fixed costs of the audio processing pipeline, such as feature extraction
    and sensor DMA transfers, which do not scale with the model size.
  napkin_math: 'Primary CNN compute: 8,000,000 MACs / 2 MACs/cycle = 4,000,000 cycles. Time = 4,000,000
    / 168,000,000 Hz = 23.8 ms.

    Fallback CNN compute: 1,000,000 MACs / 2 MACs/cycle = 500,000 cycles. Time = 500,000 / 168,000,000
    Hz = 2.98 ms.

    Fixed MFCC feature extraction overhead (no FPU, integer/soft-float math): ~15.0 ms.

    Total Primary Latency = 23.8 ms + 15.0 ms = 38.8 ms.

    Total Fallback Latency = 2.98 ms + 15.0 ms = 17.98 ms.

    Latency Reduction Ratio = 38.8 ms / 17.98 ms = 2.15x. The 8x MAC reduction only yields a ~2.15x system-level
    speedup.'
