title: Depthwise Convolution Latency Discrepancy
scenario: You deployed a vision model on an ESP32-S3 (240 MHz dual-core Xtensa, 512 KB SRAM) utilizing its INT8 vector extensions. After converting a standard 3x3 convolution layer (32 input channels, 64 output channels, 16x16 feature map) to a depthwise separable convolution, the theoretical MAC operations dropped by nearly 8x. However, the measured execution latency only improved by 2x, and peak SRAM usage during the layer's execution actually increased.
question: Why does the latency improvement not match the MAC reduction, and why did the SRAM footprint grow on this architecture?
details:
  realistic_solution: The discrepancy occurs because depthwise convolutions are severely memory-bandwidth bound. While the ESP32-S3's INT8 vector extensions process MACs rapidly, depthwise layers have very low arithmetic intensity per input activation (9 MACs vs 576 for standard conv), causing the 240 MHz Xtensa cores to stall waiting for SRAM reads. Furthermore, splitting the standard convolution into depthwise and pointwise operations forces the system to allocate and write an intermediate activation tensor to the 512 KB SRAM, causing the observed increase in peak memory footprint and adding costly memory roundtrip latency.
  common_mistake: |
    **The Pitfall:** Assuming execution latency scales perfectly with MAC count.
    **The Rationale:** Missing the impact of memory bandwidth bottlenecks on microcontrollers and the concept of arithmetic intensity.
    **The Consequence:** Overestimating the performance gains of depthwise convolutions and encountering unexpected out-of-memory errors due to intermediate tensor materialization.
  napkin_math: |
    1. **Standard 3x3 MACs:** 3 * 3 * 32 * 64 * 16 * 16 = 4,718,592 MACs.
    2. **Depthwise MACs:** 3 * 3 * 32 * 1 * 16 * 16 = 73,728 MACs.
    3. **Pointwise MACs:** 1 * 1 * 32 * 64 * 16 * 16 = 524,288 MACs.
    4. **Total DSConv MACs:** 73,728 + 524,288 = 598,016 MACs.
    5. **MAC Reduction Factor:** 4,718,592 / 598,016 = **7.89x**.
    6. **Arithmetic Intensity (MACs per input activation loaded):** Standard = 9 * 64 = 576; Depthwise = 9 * 1 = 9.
    7. **Note:** MACs per weight loaded is 256 (16x16 spatial reuse) for both. The bottleneck shift is due to reduced output-channel reuse, not weight reuse.
