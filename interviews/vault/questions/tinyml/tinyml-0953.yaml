title: Depthwise Convolution Latency Discrepancy
scenario: You deployed a vision model utilizing INT8 vector extensions. After converting a standard 3x3 convolution layer (32 input channels, 64 output channels, 16x16 feature map) to a depthwise separable convolution, the theoretical MAC operations dropped by nearly 8x. However, the measured execution latency only improved by 2x, and peak SRAM usage during the layer's execution actually increased.
question: Why does the latency improvement not match the MAC reduction, and why did the SRAM footprint grow on this architecture?
details:
  realistic_solution: "The discrepancy occurs because depthwise convolutions are severely memory-bandwidth bound. While the INT8 vector extensions process MACs rapidly, depthwise layers have very low arithmetic intensity per input activation, causing the core to stall waiting for SRAM reads. Splitting the standard convolution into depthwise and pointwise operations forces the system to allocate and write an intermediate activation tensor to the SRAM, adding memory roundtrip latency."
  common_mistake: |
    **The Pitfall:** Assuming execution latency scales perfectly with MAC count.
    **The Rationale:** Missing the impact of memory bandwidth bottlenecks on microcontrollers and the concept of arithmetic intensity.
    **The Consequence:** Overestimating the performance gains of depthwise convolutions and encountering unexpected out-of-memory errors due to intermediate tensor materialization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard Conv: 3x3, 32 C_in, 64 C_out, 16x16 spatial.
    - INT8 Vector Extensions accelerate compute.

    **Calculations:**
    - Standard MACs: 3 * 3 * 32 * 64 * 16 * 16 = 4,718,592.
    - Separable MACs: (3*3*32*16*16) + (1*1*32*64*16*16) = 598,016.
    - MAC Reduction Factor: 4,718,592 / 598,016 = 7.89x.
    - Activation Reuse (MACs per input activation): Standard = 9 * 64 = 576; Depthwise = 9 * 1 = 9.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound (Low arithmetic intensity per activation stalls the CPU waiting for SRAM).**
