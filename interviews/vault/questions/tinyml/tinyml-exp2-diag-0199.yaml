title: Shared SRAM Contention Side-Channel
scenario: A secure biometric system is deployed on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform.
  Security researchers report they successfully extracted the proprietary model's architecture and partial
  weights without physical hardware access. Logs show NPU inference times occasionally jittering, while
  the 480 MHz Cortex-M7 runs a seemingly harmless unprivileged background telemetry task. The Ethos-U55
  (256 MACs/cycle) strictly shares the 512 KB SRAM with the M7. Diagnose how the researchers are extracting
  the model.
question: "How can an unprivileged M7 telemetry task extract model structure from Ethos-U55 SRAM contention?"
details:
  realistic_solution: The root cause is a bus-contention timing side-channel attack. The unprivileged
    M7 telemetry task continuously performs reads from the shared 512 KB SRAM and measures its own read
    latency. Because the Ethos-U55 NPU and M7 share the same memory interconnect, the U55's heavy burst
    accesses for weights and activations cause bus arbitration stalls for the M7. By profiling the M7's
    memory read latencies over time, the attacker creates a precise execution trace of the U55, revealing
    the model's exact layer structure, execution time, and data-dependent sparsity patterns.
  common_mistake: Candidates often assume the model is extracted via a software memory leak, malicious
    prompt injection, or traditional differential power analysis (which requires physical equipment).
    They frequently overlook microarchitectural timing side-channels caused by shared on-chip hardware
    resources.
  napkin_math: The Cortex-M7 runs at 480 MHz (2.08 ns/cycle). The Ethos-U55 executing 256 8-bit MACs/cycle
    demands massive bandwidth, saturating the SRAM bus. When the bus is idle, an M7 SRAM read takes 1
    cycle (2.08 ns). During heavy U55 DMA bursts, M7 reads are stalled by bus arbitration, taking up to
    4 cycles (8.32 ns). If the attacker's M7 task times a loop of 10,000 memory reads, an idle bus yields
    10,000 cycles (~20.8 µs), while a saturated bus during a U55 Conv2D layer yields 40,000 cycles (~83.2
    µs). This easily measurable 62.4 µs timing delta provides a high-resolution side-channel to reverse-engineer
    the network.
