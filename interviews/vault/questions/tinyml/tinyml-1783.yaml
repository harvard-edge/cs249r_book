title: Analyzing Watchdog Timers for Simple Recovery
scenario: An agricultural sensor runs a soil model once a day on a Cortex-M4 powered
  by a tiny, inconsistent solar panel.
question: Analyze the simplest fault-tolerance mechanism to recover from a brownout
  during the middle of the daily inference.
details:
  realistic_solution: The simplest mechanism is a hardware watchdog timer (WDT). If
    power drops, the device resets. Since inference only runs once a day, the system
    can reboot, check the RTC, and restart the inference entirely without complex
    intermediate flash checkpoints.
  common_mistake: Overengineering a layer-by-layer flash checkpointing system for
    a task so infrequent that a simple restart is practically free.
  napkin_math: 1 inference / 86400s
