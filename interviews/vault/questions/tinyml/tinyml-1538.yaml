title: TinyML Federated Update Size
scenario: A fleet of 20,000 TinyML sensors participates in a federated update. Each device can upload only 40 KB per night over a low-power link. The model has 120 KB of trainable parameters, but top-k sparsification keeps 10% of the update as a dense 12 KB payload plus 2 KB metadata.
question: Can a TinyML device upload a 12 KB sparse update plus 2 KB metadata under a 40 KB/night link budget?
details:
  realistic_solution: The sparse update is 12 KB plus 2 KB metadata, or 14 KB. It fits within the 40 KB nightly budget with 26 KB headroom. Full 120 KB updates would not fit; if coordinate/index overhead is larger than assumed, the metadata budget must be revisited.
  common_mistake: |
    **The Pitfall:** Assuming federated learning requires uploading the full 120 KB model update every round.
    **The Rationale:** Standard federated learning tutorials teach full-model averaging, leading engineers to believe constrained devices cannot participate.
    **The Consequence:** Federated learning is prematurely dismissed as impossible on low-power edge nodes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Upload budget: 40 KB/night.
       - Sparse update payload: 12 KB.
       - Metadata overhead: 2 KB.
    2. **Calculations:**
       - Total update size: 12 KB + 2 KB = 14 KB.
       - Budget check: 14 KB < 40 KB.
       - Remaining headroom: 40 KB - 14 KB = 26 KB.
    3. **Conclusion & Interpretation:**
       - **Result: 26 KB Headroom. Network-Bound.** The update comfortably fits within the nightly link budget due to top-k sparsification.
