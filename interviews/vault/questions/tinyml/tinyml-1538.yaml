title: TinyML Federated Update Size
scenario: A fleet of 20,000 TinyML sensors participates in a federated update. Each
  device can upload only 40 KB per night over a low-power link. The model has 120
  KB of trainable parameters, but top-k sparsification keeps 10% of the update as
  a dense 12 KB payload plus 2 KB metadata. Determine whether one update fits.
question: Can a TinyML device upload a 12 KB sparse update plus 2 KB metadata under
  a 40 KB/night link budget?
details:
  realistic_solution: The sparse update is 12 KB plus 2 KB metadata, or 14 KB. It
    fits within the 40 KB nightly budget with 26 KB headroom. Full 120 KB updates
    would not fit; if coordinate/index overhead is larger than assumed, the metadata
    budget must be revisited.
  common_mistake: Assuming federated learning requires uploading the full model update
    every round.
  napkin_math: Sparse payload = 12 KB. Total = 12 + 2 = 14 KB. Headroom = 40 - 14
    = 26 KB.
