title: 'Diagnosing Bias Amplification in Compressed Audio Models'
scenario: 'You are deploying a keyword spotting model on an ARM Cortex-M4 (STM32F4) wearable to detect distress words for elderly care. During field testing, the model exhibits a 30% higher false negative rate for users with non-native accents compared to native speakers. Given the strict 256 KB SRAM limit, you aggressively quantized the model to INT8 and applied magnitude pruning before deployment.'
question: 'How would you diagnose the root cause of this demographic performance disparity and explain how hardware constraints contributed to the symptom?'
details:
  realistic_solution: 'The root cause is bias amplification due to aggressive compression necessary to fit the ARM Cortex-M4 (STM32F4) constraints. Magnitude pruning often removes weights crucial for classifying minority demographic features, and INT8 quantization reduces the precision needed to distinguish subtle acoustic differences. The solution is to evaluate model performance on demographic slices before and after compression, and utilize quantization-aware training (QAT) combined with fairness constraints to preserve accuracy for marginalized groups.'
  common_mistake: 'Candidates often solely blame the original training dataset for lacking diversity, missing the impact of the deployment pipeline. They fail to recognize that aggressive compression techniques like magnitude pruning and INT8 quantization disproportionately degrade performance on underrepresented or harder-to-classify edge cases.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: STM32F4 (168 MHz) with 256 KB SRAM, no FPU.
    - Available SRAM: ~200 KB (after 56 KB RTOS allocation).
    - Model: 200K parameters.

    **Calculations:**
    - FP32 Model Size: 200K * 4 bytes = 800 KB (Exceeds SRAM).
    - INT8 Model Size: 200K * 1 byte = 200 KB (Fits SRAM).
    - CMSIS-NN Processing: 2x INT8 MACs/cycle -> 200K ops in ~100K cycles = 0.6ms at 168 MHz.

    **Conclusion & Interpretation:**
    - **Result: 200 KB model (Precision-Bound)**. The 4x precision drop combined with magnitude pruning destroys critical low-magnitude weights, amplifying demographic bias.
