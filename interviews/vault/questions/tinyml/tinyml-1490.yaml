title: Lightweight Attention Approximation on ESP32-S3
scenario: You need keyword spotting with temporal context on ESP32-S3 (240MHz, 512KB SRAM). A standard self-attention with 4 heads, seq_len=50, d_model=64 requires materializing a 50x50 attention matrix in float32.
question: Does 4-head self-attention with seq_len 50 and d_model 64 fit in 512 KB SRAM on an ESP32-S3, and what alternative would you propose?
details:
  realistic_solution: 'Attention matrix: 4 heads x 50x50 x 4 bytes = 40KB. QKV activations: 3x50x64x4 = 38.4KB. Output: 50x64x4 = 12.8KB. Model weights (4-head, d=64): QKV = 3x64x64x4 = 48KB, O = 64x64x4 = 16KB. Total ~ 155KB — fits in 512KB SRAM but leaves little room. Alternative: local attention with window=5 reduces attention matrix to 4x50x5x4 = 4KB. Or depthwise temporal convolutions can replace attention entirely at 1/10th the SRAM cost.'
  common_mistake: |
    **The Pitfall:** Forgetting that the attention matrix must be stored alongside activations and model weights.
    **The Rationale:** Candidates often calculate the size of the attention matrix alone and ignore the memory required for QKV, output, and weights.
    **The Consequence:** Designing models that barely fit in memory, leaving no room for system overhead or causing out-of-memory errors during runtime.
  napkin_math: |
    - **Attention Matrix**: 4 heads * 50 * 50 * 4 bytes = 40 KB.
    - **QKV Activations**: 3 * 50 * 64 * 4 bytes = 38.4 KB.
    - **Output**: 50 * 64 * 4 bytes = 12.8 KB.
    - **Weights**: QKV (48 KB) + O (16 KB) = 64 KB.
    - **Total Footprint**: 40 + 38.4 + 12.8 + 64 = **~155 KB** (Fits in 512 KB, but large).
    - **Alternative (Local Attention, w=5)**: 4 * 50 * 5 * 4 bytes = **4 KB** (10x reduction).
