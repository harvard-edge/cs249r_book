title: Lightweight Attention Approximation on ESP32-S3
scenario: You need keyword spotting with temporal context on ESP32-S3 (240MHz, 512KB
  SRAM). A standard self-attention with 4 heads, seq_len=50, d_model=64 requires materializing
  a 50×50 attention matrix in float32. Calculate if this fits in SRAM and propose
  an alternative.
question: Does 4-head self-attention with seq_len 50 and d_model 64 fit in 512 KB
  SRAM on an ESP32-S3?
details:
  realistic_solution: 'Attention matrix: 4 heads × 50×50 × 4 bytes = 40KB. QKV activations:
    3×50×64×4 = 38.4KB. Output: 50×64×4 = 12.8KB. Model weights (4-head, d=64): QKV
    = 3×64×64×4 = 48KB, O = 64×64×4 = 16KB. Total ≈ 155KB — fits in 512KB SRAM but
    leaves little room. Alternative: local attention with window=5 reduces attention
    matrix to 4×50×5×4 = 4KB. Or depthwise temporal convolutions can replace attention
    entirely at 1/10th the SRAM cost.'
  common_mistake: Forgetting that the attention matrix must be stored alongside activations
    and the model weights; the total memory footprint is much larger than just the
    attention matrix.
  napkin_math: 'Full attention matrix: 4×50×50×4B = 40KB. With QKV + weights ≈ 155KB
    total, fits 512KB. Local attention (w=5): 4×50×5×4B = 4KB — 10× reduction. Depthwise
    conv alternative: ~15KB total — preferred for TinyML.'
