title: SRAM-Constrained Layer Fusion on Cortex-M4
scenario: We are deploying an INT8 CNN for acoustic event detection to an ARM Cortex-M4 (STM32F4) microcontroller.
  The device has a strict 256 KB SRAM limit and a 1 MB flash, running at 168 MHz with CMSIS-NN SIMD. During
  execution, the sequence requires holding a 180 KB intermediate activation tensor while computing the
  next layer's 120 KB output tensor. Specify an operator execution schedule and memory management architecture
  that ensures peak memory usage stays strictly under 256 KB without modifying the model's weights or
  retraining.
question: "How would you specify an operator execution schedule and memory management architecture that ensures peak memory usage stays strictly under 256 KB without modifying the model's weights or retraining?"
details:
  realistic_solution: The correct specification involves designing a depth-first (or tiled) scheduling
    strategy to fuse the execution of the two layers. By calculating a spatial tile of the 180 KB tensor
    and immediately passing it to the second layer to compute the corresponding output tile, the system
    can reuse a much smaller circular buffer in SRAM. This avoids materializing the full 180 KB tensor
    at once, drastically reducing peak memory while maintaining CMSIS-NN utilization.
  common_mistake: Candidates often suggest lowering the precision to INT4, which breaks CMSIS-NN SIMD
    (2x INT8 MACs/cycle) optimization and requires retraining. Another common error is proposing to stream
    intermediate activations to the 1 MB flash memory, ignoring that flash cannot be written to at high
    speeds or byte-level granularity during standard execution.
  napkin_math: 'Standard sequential schedule peak memory: 180 KB (input) + 120 KB (output) = 300 KB, which
    triggers an OOM error against the 256 KB limit. With a 4-tile depth-first schedule: Live input tile
    size ≈ (180 KB / 4) + receptive field overlap ≈ 55 KB. Live output tile size = 120 KB / 4 = 30 KB.
    New peak activation memory = 55 KB + 30 KB = 85 KB. Remaining SRAM: 256 KB - 85 KB = 171 KB, which
    safely leaves room for RTOS overhead, static buffers, and CMSIS-NN scratch memory while executing
    at the theoretical peak of 336 MMAC/s (168 MHz * 2 MACs/cycle).'
