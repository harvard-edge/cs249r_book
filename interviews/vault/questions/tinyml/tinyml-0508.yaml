title: The Keyword Spotting Dilemma
scenario: 'You are a TinyML engineer optimizing a keyword spotting model for a Cortex-M4 device with 256KB
  of SRAM. The current FP32 standard CNN model compiles, but inference fails because its largest activation
  tensor (a `48x20x32` tensor) exceeds the available runtime memory. A junior engineer proposes two alternatives:
  A) A micro-Vision Transformer (ViT), or B) Replacing the standard convolutions with depthwise separable
  convolutions via Neural Architecture Search (NAS). Based on your understanding of on-device constraints,
  diagnose the core problem and determine the correct path forward.'
question: "Which path should you choose for the Cortex-M4 keyword spotting model, micro-ViT or NAS with depthwise separable CNNs?"
details:
  realistic_solution: The primary bottleneck is the peak SRAM usage required for the model's activations,
    often called the 'Tensor Arena' in TensorFlow Lite Micro. The ViT is a poor choice for a Cortex-M4
    because its self-attention mechanism has O(N²) computational and memory complexity with respect to
    the number of input patches (N). This scaling is catastrophic on a microcontroller. The correct path
    is to use depthwise separable convolutions. This architecture is designed for computational efficiency,
    drastically reducing the number of Multiply-Accumulate (MAC) operations and, consequently, latency
    and energy. NAS is the right tool to discover the optimal channel/layer configuration for this efficient
    architecture within the device's constraints.
  common_mistake: Focusing only on parameter count (which affects flash storage) instead of the peak activation
    memory (which affects SRAM and is often the real bottleneck). Another common mistake is assuming modern,
    powerful architectures like Transformers are universally better without considering their computational
    complexity in a severely resource-constrained hardware context.
  napkin_math: 'Activation 48x20x32 FP32: 48*20*32*4=120KB. That''s 47% of 256KB SRAM. ViT on 960 patches:
    attention=960*960*4B=3.7MB — impossible. DS-Conv: same spatial dims, INT8: 48*20*32*1=30KB. After
    NAS+INT8: 30KB peak fits 256KB with room. CNN scales linearly, Transformer quadratically. Choose CNN.'
  options:
  - The model has too many parameters. Using depthwise separable convolutions reduces the parameter count,
    which will solve our problem by making the model smaller for the flash.
  - The model is too slow. The ViT architecture is more modern and can be heavily quantized to INT4 to
    fit within the memory and latency budget.
  - The bottleneck is peak SRAM usage (Tensor Arena). The ViT is infeasible due to its quadratic attention
    complexity. We must switch to depthwise separable convolutions to reduce computation by ~8x and the
    resulting activation memory footprint.
  - The SRAM usage is too high. We should implement a Mixture-of-Experts (MoE) layer to ensure only a
    fraction of the model is executed per inference, which is the standard way to scale down large models.
  correct_index: 2
