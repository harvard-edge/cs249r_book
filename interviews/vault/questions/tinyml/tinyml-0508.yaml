title: The Keyword Spotting Dilemma
scenario: You are optimizing a keyword spotting model for a Cortex-M4. Inference fails because the standard CNN's largest activation tensor (a 48x20x32 FP32 tensor) exceeds runtime memory. A junior engineer proposes replacing it with either a micro-Vision Transformer (ViT) or depthwise separable convolutions via Neural Architecture Search (NAS).
question: Which path should you choose for the Cortex-M4 keyword spotting model, micro-ViT or NAS with depthwise separable CNNs?
details:
  realistic_solution: 'The primary bottleneck is the peak SRAM usage required for the model''s activations, often called the ''Tensor Arena'' in TensorFlow Lite Micro. The ViT is a poor choice for a Cortex-M4 because its self-attention mechanism has O(N²) computational and memory complexity with respect to the number of input patches (N). This scaling is catastrophic on a microcontroller. The correct path is to use depthwise separable convolutions. This architecture is designed for computational efficiency, drastically reducing the number of Multiply-Accumulate (MAC) operations and, consequently, latency and energy. NAS is the right tool to discover the optimal channel/layer configuration for this efficient architecture within the device''s constraints.'
  common_mistake: |
    **The Pitfall:** Proposing modern architectures like Vision Transformers without checking memory scaling.
    **The Rationale:** Candidates assume newer architectures are universally better, ignoring the O(N²) quadratic memory complexity of self-attention.
    **The Consequence:** They design models that require megabytes of SRAM, which are fundamentally un-deployable on highly constrained microcontrollers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Cortex-M4.
    - Activation Tensor: 48x20x32 (FP32).
    - Target Architecture: INT8 Depthwise Separable CNN.

    **Calculations:**
    - Standard CNN Activation: 48 * 20 * 32 * 4 bytes = 122.88 KB.
    - Micro-ViT Memory Scaling: O(N²) complexity. 960 patches = 960 * 960 * 4B = 3.68 MB.
    - INT8 Depthwise Separable Activation: 48 * 20 * 32 * 1 byte = 30.72 KB.

    **Conclusion & Interpretation:**
    - **Result: NAS + Depthwise Separable CNNs in INT8 (Memory-Bound).** Reduces peak memory to ~30 KB, securely fitting in the SRAM.
  options:
  - 'The model has too many parameters. Using depthwise separable convolutions reduces the parameter count, which will solve our problem by making the model smaller for the flash.'
  - 'The model is too slow. The ViT architecture is more modern and can be heavily quantized to INT4 to fit within the memory and latency budget.'
  - 'The bottleneck is peak SRAM usage (Tensor Arena). The ViT is infeasible due to its quadratic attention complexity. We must switch to depthwise separable convolutions to reduce computation by ~8x and the resulting activation memory footprint.'
  - 'The SRAM usage is too high. We should implement a Mixture-of-Experts (MoE) layer to ensure only a fraction of the model is executed per inference, which is the standard way to scale down large models.'
  correct_index: 2
