title: TinyML Memory Foundations
scenario: Reviewing the memory hierarchy of a standard Cortex-M4 microcontroller for TinyML workloads.
question: Identify the typical relative sizes of SRAM versus Flash memory and their roles in model deployment.
visual:
  kind: svg
  path: tinyml-1578.svg
  alt: Bar chart comparing 256KB SRAM and 1MB Flash on a Cortex-M4.
  caption: Microcontroller Memory Sizes
details:
  realistic_solution: The candidate should recall that non-volatile Flash is typically in the megabyte range and houses read-only model weights, whereas volatile SRAM is severely constrained to the kilobyte range and houses dynamic activation tensors (the memory arena).
  common_mistake: |
    **The Pitfall:** Assuming microcontrollers have MBs or GBs of SRAM.
    **The Rationale:** Candidates map intuition from larger embedded Linux systems or mobile phones to bare-metal logic.
    **The Consequence:** They design wide networks with massive activation memory arenas that physically cannot map to MCU SRAM.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target hardware: Standard Cortex-M4 MCU.
       - SRAM acts as dynamic memory; Flash acts as static code/weight memory.
    2. **Calculations:**
       - Typical SRAM size: ~256 KB.
       - Typical Flash size: ~1 MB (1024 KB).
       - Ratio: 1024 / 256 = 4.
    3. **Conclusion & Interpretation:**
       - **Result: Volatile Memory Scarcity**. Flash is roughly 4x larger than SRAM, forcing architects to prioritize activation limits over sheer parameter counts.
