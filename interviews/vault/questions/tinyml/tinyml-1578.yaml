title: TinyML Memory Foundations
scenario: >
  Reviewing the memory hierarchy of a standard Cortex-M4 microcontroller for TinyML workloads.
question: >
  Identify the typical relative sizes of SRAM versus Flash memory and their roles in model deployment.
visual:
  kind: svg
  path: tinyml-1578.svg
  alt: Bar chart comparing 256KB SRAM and 1MB Flash on a Cortex-M4.
  caption: Microcontroller Memory Sizes
details:
  realistic_solution: >
    The candidate should recall that Flash is typically in the MB range (used for weights) and SRAM is in the KB range (used for activations).
  common_mistake: |
    **The Pitfall:** Assuming microcontrollers have MBs of SRAM or external DRAM.
    **The Rationale:** Candidates are used to larger embedded Linux systems or mobile phones.
    **The Consequence:** They design models with massive activation arenas that physically cannot fit on an MCU.
  napkin_math: |
    - **SRAM:** Typically ~256 KB (used for volatile activations).
    - **Flash:** Typically ~1 MB (used for static weights).
    - **Conclusion:** Flash is roughly **4x larger** than SRAM on standard Cortex-M4 devices.
