title: ESP32-S3 PSRAM to SRAM DMA Streaming Latency
scenario: You are deploying a vision model on an ESP32-S3 target (240 MHz dual-core Xtensa, 512 KB SRAM, 8 MB PSRAM, WiFi/BLE, vector extensions for INT8). Your model's activations consume 300 KB of the 512 KB SRAM. The model's INT8 weights total 4 MB and reside in the 8 MB PSRAM. You must transfer these weights into the remaining SRAM in chunks via DMA to utilize the vector extensions for INT8 inference.
question: "What is the minimum latency incurred by DMA-streaming 4 MB of ESP32-S3 weights from PSRAM to SRAM at 40 MB/s?"
details:
  realistic_solution: To maintain high utilization of the 240 MHz dual-core Xtensa processor, weights must be streamed in chunks to the internal SRAM via DMA. The total theoretical data movement latency is simply the total size of the weights divided by the PSRAM-to-SRAM DMA bandwidth. In a real implementation, you would double-buffer this transfer in the remaining SRAM to hide the latency behind compute.
  common_mistake: |
    **The Pitfall:** Assuming weights can be processed directly from PSRAM without penalty.
    **The Rationale:** Developers forget that Xtensa vector extensions require data to be mapped into the internal 512 KB SRAM for optimal single-cycle access.
    **The Consequence:** The model falls back to slow scalar execution from PSRAM, missing latency targets entirely.
  napkin_math: |
    * Available SRAM for DMA buffers = 512 KB (Total SRAM) - 300 KB (Activations) = 212 KB.
    * Total Weights to Transfer = 4 MB.
    * DMA Bandwidth = 40 MB/s.
    * Total Data Movement Latency = 4 MB / 40 MB/s = 0.1 seconds = **100 milliseconds** per inference.
