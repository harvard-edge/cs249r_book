title: Energy Tradeoffs of LUT vs On-the-Fly Computation
scenario: 'You are optimizing an audio processing model for a Nordic nRF5340 (128 MHz app core, 256 KB SRAM, 1 MB flash, ~5mA active power). To implement a complex non-linear activation, the team presents two alternatives: Alternative A uses a 4KB Lookup Table (LUT) stored in SRAM to fetch the result in 1-2 CPU cycles, while Alternative B computes a polynomial approximation on-the-fly requiring 6 MAC operations over 12 cycles.'
question: How would you evaluate which approach is more energy-efficient per operation and how it impacts the overall system power budget?
details:
  realistic_solution: Alternative B is the correct design choice for optimizing energy per operation. Fetching data from the 256 KB SRAM costs significantly more energy than performing a few ALU operations on the 128 MHz app core. Even though the polynomial approximation takes more clock cycles, computing on-the-fly minimizes memory bandwidth and reduces the overall picojoules (pJ) consumed per inference, which is critical for maintaining the tight ~5mA active power constraint.
  common_mistake: |
    **The Pitfall:** Assuming fewer CPU cycles automatically translates to lower energy consumption.
    **The Rationale:** Candidates favor the LUT approach because it seems faster from a cycle-counting perspective.
    **The Consequence:** Failing to apply Horowitz energy models, leading to a memory-bound design that blows past the strict ~5mA active power constraint.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM Read Energy: ~50 pJ for 32-bit read.
    - MAC Energy: ~3.2 pJ for 32-bit Multiply-Add.

    **Calculations:**
    - Alternative A (LUT): 1 SRAM read = 50 pJ per activation.
    - Alternative B (Compute): 6 MACs * 3.2 pJ = 19.2 pJ per activation.

    **Conclusion & Interpretation:**
    - **Result: 19.2 pJ vs 50 pJ (Energy-Bound)**. Alternative B consumes over 60% less energy per operation, proving that recomputing is cheaper than memory access.
