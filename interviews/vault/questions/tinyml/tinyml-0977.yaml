title: Latency Analysis of On-Device Privacy Guardrails
scenario: To meet organizational accountability frameworks, a 3 MB FP32 privacy guardrail model is deployed to an ESP32-S3 smart microphone alongside a 250 KB INT8 wake-word model. The wake-word model runs in the SRAM utilizing the CPU's INT8 vector extensions, completing in 15ms. Because of SRAM limits, the 3 MB guardrail model is placed in the PSRAM, which operates over an SPI bus with a practical read bandwidth of 40 MB/s. When the guardrail is triggered, system latency jumps by 90ms, causing the audio buffer to overflow.
question: Why does the guardrail cause this specific latency bottleneck, and what is its minimum execution time floor due to memory fetches?
details:
  realistic_solution: The behavior occurs because fetching model weights from external PSRAM over SPI is drastically slower than internal SRAM access. Even with a fast 240 MHz CPU, the processor stalls waiting for data. The guardrail must be quantized to INT8 to fit within the 512 KB SRAM, which would eliminate the memory bottleneck and allow it to leverage the INT8 vector extensions.
  common_mistake: |
    **The Pitfall:** Blaming the CPU clock speed or lack of FP32 vector extensions.
    **The Rationale:** Candidates assume FP32 compute is the bottleneck, failing to analyze the memory interface bandwidth.
    **The Consequence:** They try to optimize the model architecture instead of addressing the fundamental PSRAM SPI bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:** Model size: 3 MB. PSRAM read bandwidth: 40 MB/s. Compute overhead: 15 ms.
    2. **Calculations:** Minimum fetch time = 3 MB / 40 MB/s = 0.075 seconds = 75 ms. Total latency = 75 ms + 15 ms = 90 ms.
    3. **Conclusion & Interpretation:** **The 75 ms memory-fetch floor fully explains the 90 ms latency spike. Result: Memory-Bandwidth-Bound.**
