title: Optimizing Real-time KWS Latency on Cortex-M7 + Ethos-U55
scenario: You are designing an always-on keyword spotting (KWS) system for a low-power edge device. The
  system uses an ARM Cortex-M7 microcontroller clocked at 480 MHz with 512 KB SRAM, paired with an ARM
  Ethos-U55 microNPU configured for 256 MAC/cycle (equivalent to 512 MAC operations/cycle). The end-to-end
  latency from audio capture to an actionable output must not exceed 100 ms. The KWS model is a small
  CNN (e.g., a variant of 'Hello Edge' or similar). Describe the critical components of end-to-end latency
  in such a system, and outline a detailed strategy to decompose, measure, and optimize each part, considering
  the architectural characteristics and potential bottlenecks of the Cortex-M7 and Ethos-U55.
question: "How should you decompose and optimize end-to-end KWS latency on a Cortex-M7 plus Ethos-U55 system under a 100 ms target?"
details:
  realistic_solution: "1. **Audio Preprocessing (Cortex-M7 CPU):** Implement highly optimized audio feature\
    \ extraction (e.g., MFCCs) using Arm's CMSIS-DSP libraries for efficient fixed-point arithmetic on\
    \ the Cortex-M7. Consider windowing/overlapping strategies to minimize CPU busy time. Profiling will\
    \ identify hotspots. \n2. **Data Transfer (M7 to Ethos-U55):** Leverage DMA controllers to transfer\
    \ preprocessed audio features from the M7's SRAM to the Ethos-U55's internal scratchpad SRAM. Implement\
    \ a double-buffering scheme to enable pipelining, where the CPU preprocesses the next frame while\
    \ the NPU infers on the current frame, minimizing idle time. \n3. **NPU Inference (Ethos-U55):** Ensure\
    \ the KWS model is quantized to INT8 (Ethos-U55's native format) and optimized using Arm's Vela compiler\
    \ or equivalent tools to efficiently map it to the NPU's MAC units and memory architecture. Verify\
    \ the model's intermediate tensors and weights fit within the NPU's scratchpad to avoid external memory\
    \ accesses which significantly increase latency. \n4. **Post-processing (Cortex-M7 CPU):** Keep post-inference\
    \ logic (e.g., confidence thresholding, state machine updates, wake-word confirmation) on the M7 CPU\
    \ extremely lean and highly optimized. This should be minimal given the NPU's role.\n5. **System-level\
    \ Optimization & Measurement:** Adopt an event-driven, pipelined architecture. Use hardware performance\
    \ counters (PMU) on both the M7 and Ethos-U55 to accurately measure cycles spent in each stage (TTFT:\
    \ Time To First Token/Feature, TPOT: Time Per Output Token/Inference, network/bus transfer, pre/post-processing)\
    \ and identify true bottlenecks."
  common_mistake: Candidates often focus almost exclusively on NPU inference time, severely underestimating
    the latency contributions from CPU-bound audio preprocessing, inefficient data transfers between the
    M7 and Ethos-U55's scratchpad SRAM, and CPU post-processing logic that can collectively dominate the
    overall latency budget.
  napkin_math: "Given a 16 kHz audio sampling rate and a 30 ms analysis window with a 10 ms hop: \n- Audio\
    \ input buffer: `16000 samples/s * 0.030 s = 480 samples`. \n- Required processing rate: A new inference\
    \ must complete every 10 ms (hop). \n- Ethos-U55 Inference: For small KWS models, inference on Ethos-U55\
    \ (256 MAC/cycle) is typically sub-millisecond, e.g., ~0.1-0.5 ms. \n- Data Transfer: A 64-feature\
    \ MFCC vector (4 bytes/feature = 256 bytes) transferred via DMA can take microseconds, which is often\
    \ negligible in the overall budget. \n- M7 Pre-processing (MFCCs): Unoptimized, this could take 5-20\
    \ ms for a frame. With CMSIS-DSP, target < 3-5 ms. \n- M7 Post-processing: Aim for < 1 ms. \n- Total\
    \ desired latency (end-to-end): < 100 ms. The bulk of the latency budget is typically consumed by\
    \ the CPU's pre-processing and overall system orchestration, not the NPU inference itself."
