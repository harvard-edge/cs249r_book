title: 'Model Format Conversion: Full MCU Model Format Pipeline from Research to Flash'
scenario: 'You need to convert and deploy a LSTM-based anomaly detection model (2 LSTM layers x 64 units, 1 FC layer, 50K params) to ESP32-S3 (240MHz, 512KB SRAM, 8MB PSRAM). LSTM is not well-supported in TFLite Micro, requiring evaluation of all format options.'
question: 'Should a 50K-parameter LSTM for ESP32-S3 stay in TFLM, use a custom engine, or be replaced by a 1D CNN?'
details:
  realistic_solution: 'Options: (1) TFLM with LSTM — check if model uses UnidirectionalSequenceLSTM (supported) vs. decomposed LSTMCell ops (not all supported). (2) Export to ONNX → custom inference engine (e.g., uTensor, or hand-roll forward pass). (3) Replace LSTM with 1D-CNN (faster on MCU, similar accuracy for anomaly detection, fully TFLM supported). Recommendation: Option 3. 1D-CNN equivalent: 3 layers, 50K params, 0.5 MOPs. Inference on ESP32-S3: 0.5M/240M = 2.1ms. Fits in 512KB SRAM easily. LSTM would need 50K×4B=200KB for weights × 4 gates × 2 layers = exceeds SRAM if state tensors included.'
  common_mistake: 'Assuming TFLM supports all LSTM variants; TFLM supports UnidirectionalSequenceLSTM (the fully-fused op) but not all LSTM decompositions from some frameworks.'
  napkin_math: |
    **Assumptions & Constraints:**
    - LSTM: 2 layers x 64 units, 1 FC layer. Input dim=20.
    - 1D-CNN equivalent: ~50K params, 0.5 MOPs.
    - ESP32-S3 clock: 240MHz.

    **Calculations:**
    - LSTM params Layer 1: (20+64)*64*4 = 21,504. Layer 2: (64+64)*64*4 = 32,768. FC: 64. Total = ~54K params (54KB INT8).
    - LSTM state SRAM: 2 * 64 * 4B = 512B per timestep.
    - 1D-CNN Inference: 0.5M ops / 240M = ~2.1ms.
    - TFLM LSTM Inference: 0.1M ops / 240M = 0.42ms per timestep * 50 = ~21ms.

    **Conclusion & Interpretation:**
    - **Result: 1D-CNN preferred (Compute Bound)**. Replacing LSTM with a 1D-CNN offers faster inference (~2.1ms) and full TFLM support while fitting easily in SRAM.
