title: The Frozen Doorbell
scenario: You've deployed a keyword spotting model on thousands of TinyML-based smart doorbells. A bug in an audio preprocessing library causes about 1 in 100 devices to freeze each month, becoming completely unresponsive. A manual power cycle fixes the issue, but this requires a costly technician visit.
question: What is the standard, low-cost hardware peripheral on a microcontroller designed specifically to automatically recover from this type of software hang?
details:
  realistic_solution: The correct answer is a watchdog timer. This is a simple hardware counter integrated into the microcontroller that is independent of the main CPU core. The application firmware must 'pat the dog' (reset the timer) periodically to signal that it is still running correctly. If the software freezes, it fails to pat the timer. The timer then overflows and triggers a hardware reset of the entire system, automatically rebooting the device out of the frozen state without any external intervention.
  common_mistake: |
    **The Pitfall:** Suggesting software-based monitoring or remote pings.
    **The Rationale:** Engineers without an embedded systems background fail to account for a total system freeze where the software itself can no longer execute.
    **The Consequence:** Implementing complex solutions that fail to trigger during a hard lockup, resulting in expensive manual service visits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet size: 10,000 devices.
       - Failure Rate: 1% per month.
       - Cost of Manual Reset: $50/visit.
    2. **Calculations:**
       - Frozen devices: 10,000 * 0.01 = 100 devices/month.
       - Monthly Cost: 100 devices * $50 = $5,000/month.
       - Annual Loss: $5,000 * 12 = $60,000.
    3. **Conclusion & Interpretation:**
       - **Result: Cost-Bound Reliability**. A simple hardware watchdog timer saves $60,000 annually by automatically recovering from software hangs.
  options:
  - A remote monitoring service that pings the device for a health check.
  - A high-priority software timer interrupt to break the frozen loop.
  - A hardware watchdog timer.
  - Periodically saving a state checkpoint to Flash memory.
