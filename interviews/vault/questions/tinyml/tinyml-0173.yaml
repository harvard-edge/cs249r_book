title: The 1ms Interrupt Budget
scenario: You are designing a keyword spotting system on a Cortex-M4 microcontroller. The system uses
  DMA to fill an audio buffer, which then triggers an interrupt. To ensure the system feels instantaneous
  and never misses an audio packet, what is the typical latency budget for the Interrupt Service Routine
  (ISR) that handles this trigger?
question: "To ensure the system feels instantaneous and never misses an audio packet, what is the typical latency budget for the Interrupt Service Routine (ISR) that handles this trigger?"
details:
  realistic_solution: The latency budget for a real-time ISR on a microcontroller is extremely tight,
    typically around 1 millisecond (1ms). The ISR's job is to perform the absolute minimum work required—like
    acknowledging the interrupt and swapping buffer pointers—and then return control to lower-priority
    tasks that will run the actual inference. Exceeding this budget can block other critical system interrupts
    (like timers) and lead to system failure.
  common_mistake: Engineers accustomed to cloud or mobile development often assume latencies are in the
    tens or hundreds of milliseconds. They confuse a hard real-time interrupt deadline, which must be
    met to prevent system instability or data loss, with softer deadlines like UI 'jank' budgets or web
    request latencies. In an embedded system, an ISR that takes 16ms would be a catastrophic failure,
    not a minor performance issue.
  napkin_math: The 1ms budget is a hard constraint dictated by the physics of the system. A mobile 'jank'
    budget of 16ms is **16x too slow**. A real-time edge deadline of 33ms is **33x too slow**. A cloud
    P99 latency of 100ms is **100x too slow**. In the time it takes to serve one cloud request, the microcontroller
    must have successfully handled 100 independent, critical interrupts.
  options:
  - ~100 ms
  - ~33 ms
  - ~16 ms
  - ~1 ms
  correct_index: 3
