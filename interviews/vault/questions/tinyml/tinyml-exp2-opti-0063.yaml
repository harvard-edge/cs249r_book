title: Corstone-300 Vision Pipeline Bottleneck
scenario: You are deploying a quantized MobileNetV2 for object detection on an ARM Cortex-M7 + Ethos-U55
  (Corstone-300) platform. The M7 runs at 480 MHz and shares 512 KB SRAM with the Ethos-U55 (configured
  for 256 MAC/cycle). The total inference latency per frame is 80ms, but the NPU hardware counters show
  it is only active for 20ms. You need to decompose the remaining 60ms latency, which consists of image
  resizing, normalization on the M7, and NPU weight fetching, and propose an optimization.
question: "What causes the 60 ms non-NPU latency in the Corstone-300 vision pipeline, and how should preprocessing and weight fetching be optimized?"
details:
  realistic_solution: The bottleneck is the M7 spending excessive cycles on image resizing and the NPU
    stalling due to memory contention. The solution is to use CMSIS-DSP on the M7 for vectorized preprocessing
    and implement double-buffering. By separating the memory banks for the M7's active working set and
    the NPU's activation buffers, you eliminate contention.
  common_mistake: Candidates often assume the NPU is compute-bound and try to prune the model, or they
    overlook the impact of memory bandwidth contention in the shared 512 KB SRAM when the M7 is aggressively
    preprocessing the next frame while the NPU runs.
  napkin_math: M7 at 480 MHz gives 480k cycles/ms. 60ms overhead = 28.8M cycles. Resizing a 240x240 image
    to 120x120 (14,400 pixels) naively takes ~1000 cycles/pixel (14.4M cycles = 30ms). The NPU at 256
    MAC/cycle * 480 MHz = 122 GMAC/s theoretical, but it stalls for 30ms waiting for weights from Flash
    to shared SRAM. Optimizing preprocessing with CMSIS-DSP cuts resizing to 200 cycles/pixel (2.88M cycles
    = 6ms). Prefetching weights via DMA hides the 30ms stall. New latency = 20ms (NPU) + 6ms (M7 prep)
    = 26ms (3x speedup).
