title: The Knowledge Distillation MCU Fit
scenario: A teacher model achieves 92% accuracy on a visual wake-word task. You must deploy a student model on a Cortex-M4 with >85% accuracy. The student architecture is a 3-layer CNN.
question: What accuracy can you realistically expect from knowledge distillation at this compression ratio, and what are the memory constraints?
details:
  realistic_solution: 'Available Flash: 1,000 - 300 = 700 KB for model. At INT8: 700 KB = 700,000 parameters max. Teacher: 3.4M params. Compression: 3.4M / 700K = 4.86x parameter reduction. With INT8 quantization on top: 13.6 MB / 700 KB = 19.4x total size reduction. SRAM constraint: 256 KB must hold the largest intermediate tensor. For a 96x96 input with 32 channels: 96x96x32x1 byte = 294,912 bytes > 256 KB! Must reduce to 24 channels: 96x96x24 = 221,184 bytes ≈ 216 KB. Knowledge distillation at ~5x parameter compression typically retains 95-97% of teacher accuracy. Expected: 0.95 * 92% ≈ 87.4% — above the 85% target.'
  common_mistake: |
    **The Pitfall:** Only considering Flash for model storage and ignoring SRAM.
    **The Rationale:** Candidates often forget that SRAM must hold the largest activation tensor during inference.
    **The Consequence:** A model that fits in Flash may still fail to run, and distillation expectations are over-optimistic.
  napkin_math: |
    **Assumptions & Constraints:**
    - Flash Budget: 1,000 KB - 300 KB = 700 KB.
    - Teacher params: 3.4M.
    - SRAM: 256 KB.

    **Calculations:**
    - Compression: 3.4M / 700K = 4.86x.
    - Total Reduction: 13.6 MB / 700 KB = 19.4x.
    - SRAM Peak (32 ch): 96x96x32 = 294,912 bytes (Exceeds 256 KB).
    - Fix to 24 ch: 96x96x24 = 221,184 bytes (Fits).
    - Expected Accuracy: ~95% of 92% = 87.4%.

    **Conclusion & Interpretation:**
    - **Result: 87.4% accuracy (Memory-Capacity-Bound)**. Fits 24 channels in SRAM, achieving accuracy above the 85% target.
