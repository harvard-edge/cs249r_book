title: 'The Energy Cost of Privacy: Federated Learning'
scenario: You're designing a battery-powered smart doorbell that uses Federated Learning (FL) to update
  its person detection model while preserving user privacy. During one FL round, the device wakes up,
  computes a model update, and transmits it. Which of these operations consumes the most energy?
question: "Which of these operations consumes the most energy?"
details:
  realistic_solution: Wireless data transmission is by far the most energy-intensive operation. The power
    required to operate a WiFi or cellular radio (hundreds of milliwatts) is typically 1-2 orders of magnitude
    higher than the power consumed by a low-power MCU (tens of milliwatts) during active computation.
  common_mistake: Engineers often focus on optimizing the compute (FLOPs) for model training, assuming
    it's the most expensive part. They drastically underestimate the energy cost of wireless transmission.
    On a TinyML device, turning on the radio for even a few seconds can consume more energy than minutes
    of computation.
  napkin_math: 'Compute: MCU at ~50mW for 60s = 3J. WiFi TX: ~300mW for model upload. Model = 500K params
    * 4B = 2MB. At 1Mbps WiFi: 2MB/1Mbps = 16s. Energy = 300mW * 16s = 4.8J. Radio TX (4.8J) >> compute
    (3J). Transmission dominates by ~1.6x, and real-world WiFi overhead makes it worse.'
  options:
  - On-device computation (e.g., backpropagation)
  - Wireless data transmission (e.g., sending model weights)
  - Reading the model from Flash memory
  - Device idle/sleep power between cycles
  correct_index: 1
