title: TinyML Calibration Set Spec
scenario: A sensor model will be INT8 quantized for deployment on a Cortex-M4. The
  training set has lab data, but field data includes temperature and vibration ranges
  not seen in the lab. Specify the calibration set requirements.
question: What calibration data is required before INT8 quantizing a TinyML sensor
  model for field deployment?
details:
  realistic_solution: The calibration set must cover field temperature, vibration
    amplitude, sensor noise, expected input ranges, rare events, and device-to-device
    variation. It should be collected from representative hardware, not only lab recordings.
  common_mistake: Calibrating on clean lab data and causing activation clipping when
    field signals exceed observed ranges.
  napkin_math: If field amplitudes are 2x lab amplitudes, lab-only calibration may
    set scales too narrowly and clip real activations.
