title: 'TinyML Calibration Set Spec'
scenario: 'A sensor model will be INT8 quantized for deployment on a microcontroller. The training set has lab data, but field data includes temperature and vibration ranges not seen in the lab.'
question: 'What calibration data is required before INT8 quantizing a TinyML sensor model for field deployment?'
details:
  realistic_solution: 'The calibration set must cover field temperature, vibration amplitude, sensor noise, expected input ranges, rare events, and device-to-device variation. It should be collected from representative hardware, not only lab recordings.'
  common_mistake: |
    **The Pitfall:** Calibrating solely on clean lab data.
    **The Rationale:** Candidates fail to realize that field signals will exceed the ranges observed during controlled lab recordings.
    **The Consequence:** The quantization scale is set too narrowly, causing real-world activations to clip and degrading model accuracy.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target format: INT8 (Maximum value = 127).
    - Field data amplitude = 2× maximum lab data amplitude.

    **Calculations:**
    - Lab calibration sets 100% of max lab value to INT8 127.
    - Field inputs range up to 200% of max lab value.
    - Values between 101% and 200% are clipped to 127.
    - 100% / 200% = 50% of the dynamic range is lost.

    **Conclusion & Interpretation:**
    - **Result: 50% Range Clipped (Precision-Bound)**. Failing to calibrate on field data sets the quantization scale too narrowly, destructively clipping out-of-distribution real-world amplitudes.
