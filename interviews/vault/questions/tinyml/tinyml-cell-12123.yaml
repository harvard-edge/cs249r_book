title: 'Model Size Estimation: Diagnose and Fix MCU SRAM Overflow at Inference'
scenario: 'A TFLite Micro deployment on Cortex-M4 (256KB SRAM) crashes with a HardFault exception during
  the third convolutional layer of a 5-layer CNN (300K params INT8). TFLM error log says: ''Failed to
  allocate tensor arena.'' The arena is set to 180KB. Diagnose and quantify the fix.'
details:
  realistic_solution: 'HardFault at layer 3 means activation tensor for layer 3 exceeds remaining arena
    space. Diagnosis: check peak activation size. Layer 3 output (say 28×28×128): 100.4KB. Layer 2 needs
    to remain until layer 3 finishes: double buffering: 100.4×2=200.8KB > 180KB. Fix: (1) Increase arena
    to 210KB (210+30KB runtime+8KB stack+4KB input=252KB < 256KB ✓, but tight). (2) Use TFLM memory planning
    to find non-overlapping tensors (via offline arena planning in TFLM toolchain): reduces peak to 130KB.
    (3) Restructure model: reduce layer 3 channels from 128 to 64 → 50.2KB activation. Arena 90KB. SRAM
    comfortable.'
  common_mistake: Increasing the arena size without checking what it overflows into (stack, heap, global
    variables), causing stack corruption.
  napkin_math: 'Layer 3: 28×28×128×1B=100.4KB. Layer 2 output (needed for residual?): 28×28×128=100.4KB.
    Peak overlap: 200.8KB > 180KB arena. Fix option 1: arena=210KB. SRAM: 210+30+8+4+4KB(input)=256KB.
    Exactly 256KB — too tight. Option 2: TFLM offline planning: typically 30-40% arena reduction. 180KB×0.65=117KB.
    With planning: 130KB arena. SRAM: 130+30+8+4=172KB < 256KB ✓.'
