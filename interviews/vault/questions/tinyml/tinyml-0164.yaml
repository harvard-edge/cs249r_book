title: Microcontroller Arithmetic Intensity
scenario: "Using a hardware spec sheet that specifies a Cortex-M4 microcontroller operating at 168 MHz with a 32-bit memory bus and a peak compute of 336 MFLOPS, explain how you would calculate the 'Ridge Point' or theoretical Arithmetic Intensity. Based on your calculation, are these devices generally compute-bound or memory-bound?"
question: "Based on your calculation, are these devices generally compute-bound or memory-bound?"
details:
  realistic_solution: 'The Arithmetic Intensity (AI) of a processor, also known as its Roofline ''Ridge
    Point'', is calculated by dividing its peak theoretical compute performance by its peak memory bandwidth.
    For the Cortex-M4, we use the specified values:

    - Compute: ~336 MFLOPS = 0.336 GFLOPS

    - Memory Bandwidth: A 168 MHz Cortex-M4 with a 32-bit (4-byte) bus has a theoretical peak of 168M
    × 4 = 672 MB/s ≈ 0.672 GB/s


    The ridge point = 0.336 GFLOPS / 0.672 GB/s = 0.5 FLOPs/Byte. This extremely low ridge point means
    that almost any ML workload with even modest data reuse will be compute-bound on a Cortex-M4. Unlike
    GPUs (which have ridge points of 100-700 Ops/Byte and are often memory-bound), microcontrollers have
    so little compute relative to their memory bandwidth that compute is almost always the bottleneck.'
  common_mistake: Engineers often invert the formula, calculating Bytes/FLOP instead of FLOPs/Byte. Another
    common mistake is a unit mismatch, failing to align the scales of the compute (MFLOPS) and bandwidth
    (GB/s) figures before dividing, leading to an answer that is orders of magnitude off.
  napkin_math: 'Cortex-M4 specs:

    Clock: 168 MHz. FPU: single-precision, supports fused multiply-accumulate (MAC) which executes 2 FLOPs per cycle in a pipelined loop.

    Peak FP32 compute: 168 MHz × 2 FLOPs/cycle = 336 MFLOPS.

    (Note: with the DSP extension for INT16/INT8 MAC, throughput is also 336 MOPS for INT16 MAC via
    SIMD (SMLAD instruction: 2 x 16-bit MACs per cycle at 168 MHz).)


    Memory bandwidth: 168 MHz × 4 bytes (32-bit bus) = 672 MB/s = 0.672 GB/s.

    (In practice, flash wait states and bus arbitration reduce this to ~400-500 MB/s.)


    Ridge Point (FP32 or INT16 DSP):

    336 MFLOPS / 672 MB/s = 0.5 FLOPs/Byte (theoretical). With practical bandwidth of ~450 MB/s: 336
    / 450 = 0.75 FLOPs/Byte.


    Interpretation:

    A typical convolution layer has AI of 10-100 FLOPs/Byte.

    Since 10 >> 0.5, convolutions are compute-bound on the Cortex-M4.


    Cortex-M4 devices are nearly universally compute-bound for ML workloads. This is the opposite of GPUs/NPUs
    (ridge points of 100-1000+). Optimization for TinyML should focus on reducing operations (pruning,
    INT8 quantization to leverage the DSP''s MAC unit at higher throughput) rather than reducing memory
    traffic.'
  options:
  - ~3.57 FLOPs/Byte (Memory-bound)
  - ~280 FLOPs/Byte (Compute-bound)
  - ~0.5 FLOPs/Byte (Compute-bound)
  - ~0.25 FLOPs/Byte (Memory-bound)
  correct_index: 2
