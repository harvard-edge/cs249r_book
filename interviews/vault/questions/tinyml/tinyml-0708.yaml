title: The CMSIS-NN Alignment Fault
scenario: You define a global `int8_t tensor_arena[20000]` for your TFLite Micro model. You are using
  the highly optimized ARM CMSIS-NN library. The model compiles, but the moment you call `invoke()`, the
  microcontroller instantly crashes with a Hard Fault (Unaligned Memory Access). The array is large enough.
  What trivial C-language mistake caused the crash?
details:
  realistic_solution: 'CMSIS-NN''s optimized kernels use ARM SIMD instructions (LDR, LDRD) that require
    4-byte or 8-byte aligned addresses. An unaligned int8_t array may start at any address. When CMSIS-NN
    tries to load 4 bytes at once from an unaligned address, the Cortex-M4 triggers a UsageFault (hard
    fault). Fix: declare the arena with alignment: __attribute__((aligned(16))) int8_t tensor_arena[20000];
    or use alignas(16) in C11/C++11. The 16-byte alignment ensures all SIMD loads within the arena are
    naturally aligned. This is a compile-time fix — zero runtime cost, zero memory overhead.'
  common_mistake: '"The weights are too big." If it was a size issue, TFLite Micro would return an error
    code during allocation, not a hardware fault.'
  napkin_math: A 16-byte aligned address ends in `0x0`. If your array starts at `0x20000001`, an attempt
    to load 4 bytes (`LDR`) spans across two physical 32-bit memory boundaries, which the M-class core
    refuses to do in a single cycle.
