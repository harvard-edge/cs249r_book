title: The CMSIS-NN Alignment Fault
scenario: You define a global `int8_t tensor_arena[20000]` for your TFLite Micro model. You are using the highly optimized ARM CMSIS-NN library. The model compiles, but the moment you call `invoke()`, the microcontroller instantly crashes with a Hard Fault (Unaligned Memory Access). The array is large enough.
question: Why does an unaligned `int8_t tensor_arena[20000]` crash CMSIS-NN with a Hard Fault?
details:
  realistic_solution: 'CMSIS-NN''s optimized kernels use ARM SIMD instructions (LDR, LDRD) that require 4-byte or 8-byte aligned addresses. An unaligned int8_t array may start at any address. When CMSIS-NN tries to load 4 bytes at once from an unaligned address, the Cortex-M4 triggers a UsageFault (hard fault). Fix: declare the arena with alignment: __attribute__((aligned(16))) int8_t tensor_arena[20000]; or use alignas(16) in C11/C++11. The 16-byte alignment ensures all SIMD loads within the arena are naturally aligned. This is a compile-time fix — zero runtime cost, zero memory overhead.'
  common_mistake: |
    **The Pitfall:** Assuming the model weights are too large.
    **The Rationale:** Candidates confuse hardware execution faults with memory allocation errors.
    **The Consequence:** They spend time reducing model size instead of fixing the trivial memory alignment bug.
  napkin_math: |
    - Identify SIMD instruction requirement: ARM SIMD instructions (LDR, LDRD) require 4-byte or 8-byte aligned addresses.
    - Analyze unaligned access: If an array starts at `0x20000001`, loading 4 bytes spans across two physical 32-bit memory boundaries.
    - **The M-class core refuses to execute this across boundaries in a single cycle, resulting in a UsageFault.**
