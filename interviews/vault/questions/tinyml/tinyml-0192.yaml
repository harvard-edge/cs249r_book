title: The Energy Harvesting Deficit
scenario: An outdoor air quality sensor uses a Cortex-M7 that consumes 50mW for 0.5 seconds while active,
  and 10µW during deep sleep. To extend its life, you've added a small solar panel that provides 2.0mW
  of average power. If the device wakes once every 10 seconds, compare the device's average power consumption
  to the power generated. Can it run indefinitely from solar power?
question: "Can the Cortex-M7 air-quality sensor run indefinitely from a 2.0 mW solar panel while waking for 0.5 s every 10 s?"
details:
  realistic_solution: To determine if the system is sustainable, we must compare the *average* power consumed
    over a full duty cycle to the *average* power generated by the solar panel. If generation is greater
    than or equal to consumption, the device can run indefinitely (assuming a battery to buffer for nights/clouds).
    If consumption is greater, it has an energy deficit and will eventually fail.
  common_mistake: The most common error is to perform a simple comparison. Some will see the active power
    (50mW) is much higher than the solar generation (2mW) and wrongly conclude the system is non-viable.
    Others will see the sleep power (10µW) is much lower and wrongly conclude it is viable. Both mistakes
    fail to calculate the time-weighted average power consumption, which is the only way to determine
    the true energy balance.
  napkin_math: 'Active: 50mW * 0.5s = 25mJ. Sleep: 10uW * 9.5s = 95uJ = 0.095mJ. Total energy/cycle =
    25.095mJ over 10s. Avg power = 25.095mJ/10s = 2.51mW. Solar provides 2.0mW. Deficit = 2.51 - 2.0 =
    0.51mW. Cannot run indefinitely -- consumes 25% more power than solar generates.'
  options:
  - Yes, it is sustainable; sleep power is negligible compared to generation.
  - No, it is not sustainable; active power of 50mW far exceeds generation.
  - No, it is not sustainable; it has a net energy deficit of ~0.5mW.
  - Yes, it is sustainable; it has a net energy surplus of ~1.5mW.
  correct_index: 2
