title: The Energy Harvesting Deficit
scenario: An outdoor air quality sensor uses a Cortex-M7 that consumes 50mW for 0.5 seconds while active, and 10µW during deep sleep. A small solar panel provides 2.0mW of average power. The device wakes once every 10 seconds.
question: Can the Cortex-M7 air-quality sensor run indefinitely from a 2.0 mW solar panel while waking for 0.5 s every 10 s?
details:
  realistic_solution: To determine if the system is sustainable, we must compare the *average* power consumed over a full duty cycle to the *average* power generated by the solar panel. If generation is greater than or equal to consumption, the device can run indefinitely (assuming a battery to buffer for nights/clouds). If consumption is greater, it has an energy deficit and will eventually fail.
  common_mistake: |
    **The Pitfall:** Performing a simple comparison between peak active power (50mW) and solar generation (2.0mW).
    **The Rationale:** Candidates fail to calculate the time-weighted average power consumption over the full duty cycle.
    **The Consequence:** The device is wrongly deemed non-viable due to overestimating power, or wrongly deemed viable by only looking at sleep power.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Active phase: 50 mW for 0.5 s.
       - Sleep phase: 10 µW (0.01 mW) for 9.5 s.
       - Total period: 10 s.
       - Solar Generation (avg): 2.0 mW.
    2. **Calculations:**
       - Active Energy: 50 mW * 0.5 s = 25 mJ.
       - Sleep Energy: 0.01 mW * 9.5 s = 0.095 mJ.
       - Total Energy per cycle: 25 mJ + 0.095 mJ = 25.095 mJ.
       - Average Consumption: 25.095 mJ / 10 s = 2.51 mW.
       - Deficit: 2.51 mW (consumed) - 2.0 mW (generated) = 0.51 mW.
    3. **Conclusion & Interpretation:**
       - **The device consumes 2.51 mW on average but only generates 2.0 mW, resulting in an unsustainable 0.51 mW deficit.**
       - **Result: Power-Bound (Unsustainable).**
  options:
  - Yes, it is sustainable; sleep power is negligible compared to generation.
  - No, it is not sustainable; active power of 50mW far exceeds generation.
  - No, it is not sustainable; it has a net energy deficit of ~0.5mW.
  - Yes, it is sustainable; it has a net energy surplus of ~1.5mW.
  correct_index: 2
