title: Distillation vs Pruning Latency on Ethos-U55
scenario: You are optimizing a vision model for an ARM Cortex-M7 + Ethos-U55 (Corstone-300) with 512 KB shared SRAM, running at 480 MHz. The system uses the 256 MAC/cycle Ethos-U55 configuration. You have two INT8 candidate models. Model A uses 50% unstructured pruning, yielding 10 million non-zero MACs. Since the Ethos-U55 lacks unstructured sparsity support, Model A executes entirely on the M7 CPU, taking 2 cycles per MAC. Model B is a dense CNN generated via knowledge distillation, also requiring exactly 10 million MACs, but executing 100% on the Ethos-U55 at 80% utilization.
question: How would you calculate the inference latency in milliseconds for unstructured pruning vs distillation to demonstrate why distillation beats pruning?
details:
  realistic_solution: Knowledge distillation into a smaller dense architecture is vastly superior to unstructured pruning for NPU targets. The Ethos-U55 is an ASIC optimized for dense block processing; unstructured sparsity forces a fallback to the M7 CPU, resulting in a massive latency penalty despite having the exact same computational MAC volume as the distilled model.
  common_mistake: |
    **The Pitfall:** Assuming equal MAC counts equate to equal latency.
    **The Rationale:** Candidates fail to recognize that the Ethos-U55 requires dense tensors, forcing pruned models to run on the slower CPU.
    **The Consequence:** They incorrectly choose unstructured pruning, resulting in a massive latency penalty.
  napkin_math: |
    * Model A (Pruned, M7): 10M MACs * 2 cycles/MAC = 20M cycles.
    * Model A Latency: 20M / 480 MHz = 41.67 ms.
    * Model B (Distilled, U55): Peak MACs/s = 480 MHz * 256 = 122.88 GMAC/s.
    * Model B Effective MACs/s (80% util) = 98.304 GMAC/s.
    * Model B Latency: 10M / 98.304 GMAC/s = 0.102 ms.
    * **Result: Distillation (0.102 ms) is over 400x faster than pruning (41.67 ms).**
