title: Distillation vs Pruning Latency on Ethos-U55
scenario: You are optimizing a vision model for an ARM Cortex-M7 + Ethos-U55 subsystem. You have two INT8 candidate models. Model A uses 50% unstructured pruning, yielding 10 million non-zero MACs. Since the Ethos-U55 lacks unstructured sparsity support, Model A executes entirely on the M7 CPU, taking 2 cycles per MAC. Model B is a dense CNN generated via knowledge distillation, also requiring exactly 10 million MACs, but executing 100% on the NPU at 80% utilization.
question: How would you calculate the inference latency in milliseconds for unstructured pruning vs distillation to demonstrate why distillation beats pruning?
details:
  realistic_solution: Knowledge distillation into a smaller dense architecture is vastly superior to unstructured pruning for NPU targets. The Ethos-U55 is an ASIC optimized for dense block processing; unstructured sparsity forces a fallback to the M7 CPU, resulting in a massive latency penalty despite having the exact same computational MAC volume as the distilled model.
  common_mistake: |
    **The Pitfall:** Assuming equal MAC counts equate to equal latency.
    **The Rationale:** Candidates fail to recognize that the Ethos-U55 requires dense tensors, forcing pruned models to run on the slower CPU.
    **The Consequence:** They incorrectly choose unstructured pruning, resulting in a massive latency penalty.
  napkin_math: |
    **Assumptions & Constraints:**
    - M7 at 480 MHz (2 cycles/MAC).
    - U55 at 480 MHz (256 MAC/cycle).
    - 10M MACs workload.

    **Calculations:**
    - Model A (CPU): 10M * 2 = 20M cycles.
    - Latency = 20M / 480M = 41.67 ms.
    - Model B (NPU): Peak = 480M * 256 = 122.88 GMAC/s.
    - Effective (80%) = 98.3 GMAC/s.
    - Latency = 10M / 98.3G = 0.102 ms.

    **Conclusion & Interpretation:**
    - **Result: 0.102 ms (Compute-Bound)**. Distillation (0.102 ms) is over 400x faster than pruning (41.67 ms).
