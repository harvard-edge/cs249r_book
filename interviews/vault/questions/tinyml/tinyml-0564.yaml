title: The RP2040 Dual-Core ML
scenario: The Raspberry Pi Pico uses an RP2040 with two Cortex-M0+ cores at 133 MHz sharing 264 KB SRAM. Your audio classification model takes 80ms on a single core. A colleague suggests splitting the model across both cores to halve the latency.
question: Can two 133 MHz RP2040 cores halve an 80 ms audio classifier, or does SRAM bus contention limit speedup?
details:
  realistic_solution: The RP2040's dual cores share a single SRAM bus through a 4-port bus fabric (each core has a read port and a write port, but SRAM is divided into 6 banks).
  common_mistake: |
    **The Pitfall:** Assuming a perfect 2x speedup by splitting the workload across two cores.
    **The Rationale:** Candidates ignore the reality of SRAM bus contention and synchronization overhead.
    **The Consequence:** The expected latency is wildly optimistic, and the complexity cost is underestimated.
  napkin_math: |
    - Single core latency: 80 ms.
    - Ideal dual-core latency: 40 ms.
    - Add 20% bus contention penalty: 40 ms * 1.20 = 48 ms.
    - Add sync overhead: ~0.1 ms.
    - **Actual speedup is roughly 1.66x (48.1 ms total latency), making the sensor-offload approach often more practical.**
