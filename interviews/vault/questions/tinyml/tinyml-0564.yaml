title: The RP2040 Dual-Core ML
scenario: The Raspberry Pi Pico uses an RP2040 with two Cortex-M0+ cores at 133 MHz sharing 264 KB SRAM.
  Your audio classification model takes 80ms on a single core. A colleague suggests splitting the model
  across both cores to halve the latency. Analyze whether this is feasible and what the actual speedup
  would be.
details:
  realistic_solution: 'The RP2040''s dual cores share a single SRAM bus through a 4-port bus fabric (each
    core has a read port and a write port, but SRAM is divided into 6 banks). Parallelism is limited by:'
  common_mistake: '"Two cores = 2× speedup. Split the model in half, each core runs 5 layers, inference
    drops to 40ms." This ignores three critical realities of the RP2040''s architecture.'
  napkin_math: 'Single core: 80ms. Ideal dual-core split: 40ms. With 20% bus contention: 48ms. With sync
    overhead: 48.1ms. Actual speedup: 1.66×. But the complexity cost is high: two separate firmware images,
    shared memory management, debugging race conditions. The sensor-offload approach: 0% speedup on inference
    latency, but 100% of Core 0 dedicated to ML (no sensor ISR jitter), and sensor data is always ready.
    For a product, the simpler architecture wins.'
