title: The RP2040 Dual-Core ML
scenario: The RP2040 features dual Cortex-M0+ cores sharing 264 KB SRAM. Your audio classification model takes 80ms on a single core. A colleague suggests splitting the model across both cores to perfectly halve the latency.
question: Can two 133 MHz RP2040 cores halve an 80 ms audio classifier, or does SRAM bus contention limit speedup?
details:
  realistic_solution: The RP2040's dual cores share a single SRAM bus through a 4-port bus fabric (each core has a read port and a write port, but SRAM is divided into 6 banks).
  common_mistake: |
    **The Pitfall:** Assuming a perfect 2x linear speedup by splitting a neural network workload across multiple cores on a microcontroller.
    **The Rationale:** Candidates apply distributed-computing intuition without understanding the severe bottlenecks of shared physical SRAM buses and cross-core synchronization.
    **The Consequence:** The expected latency gains are highly optimistic, and the engineering complexity introduced by multi-core synchronization yields diminishing returns.
  napkin_math: |
    1. **Assumptions & Constraints:** Single core latency = 80 ms. Ideal dual-core latency = 40 ms. RP2040 has a shared SRAM bus fabric causing bus contention when both cores fetch weights simultaneously.
    2. **Calculations:** Add empirical bus contention penalty (e.g., ~20%): 40 ms * 1.20 = 48 ms. Add cross-core sync overhead (e.g., RTOS spinlocks): ~0.1 ms. Total latency ≈ 48.1 ms.
    3. **Conclusion & Interpretation:** **Result: ~1.66x Speedup, not 2x.** Due to memory bus contention, splitting the model yields diminishing returns. A better architectural pattern is often to dedicate Core 0 to I/O and preprocessing, and Core 1 purely to continuous inference.
