title: Energy-Aware Inference Optimization on ESP32-S3 for TinyML
scenario: 'A voice activity detection model on an ESP32-S3 (512 KB internal SRAM, 8 MB external PSRAM) stores 256 KB intermediate activation maps in PSRAM. Energy profiling shows memory access dominating the power budget, heavily reducing battery life.'
question: 'How would you quantify potential energy savings using the Horowitz energy principles for memory access vs. arithmetic operations?'
details:
  realistic_solution: 'The primary bottleneck is frequent accesses to the slower, higher-energy external PSRAM. The solution requires quantizing/pruning to fit intermediate maps in the 512 KB internal SRAM, fusing operators to minimize memory traffic, and explicitly managing data placement to keep frequently accessed data on-chip.'
  common_mistake: |
    **The Pitfall:** Focusing purely on reducing FLOPs or clock frequency.
    **The Rationale:** Candidates fail to distinguish between the disproportionately high energy costs of off-chip memory accesses (PSRAM) versus on-chip SRAM.
    **The Consequence:** Optimization efforts yield minimal battery life improvements because the primary energy bottleneck is ignored.
  napkin_math: |
    **Assumptions & Constraints:**
    - Horowitz estimates (per 32-bit): Compute = ~3.7 pJ, SRAM Read = ~10 pJ, PSRAM Read = ~100 pJ.
    - 256 KB tensor = 65,536 elements (32-bit).

    **Calculations:**
    - PSRAM transfer cost: 65,536 * 100 pJ (write) + 65,536 * 100 pJ (read) = 13.1 µJ.
    - SRAM transfer cost: 65,536 * 10 pJ (write) + 65,536 * 10 pJ (read) = 1.3 µJ.

    **Conclusion & Interpretation:**
    - **Result: 1.3 µJ vs 13.1 µJ ([Power-Bound])**. Keeping activations in internal SRAM yields a ~90% energy reduction for memory operations.
