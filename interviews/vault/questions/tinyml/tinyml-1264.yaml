title: Identifying Side-Channel Attacks on Edge NPUs
scenario: You are deploying a proprietary anomaly detection model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) system in a physically accessible smart-city sensor. The secret model weights are loaded into the shared 512 KB SRAM for fast access by both the M7 and the NPU.
question: What physical side-channel attack can reveal proprietary Ethos-U55 model weights through power or electromagnetic traces during inference?
details:
  realistic_solution: The correct answer is Side-Channel Attacks (specifically Differential Power Analysis or SPA/DPA). Since the Ethos-U55 NPU and the Cortex-M7 share the same 512 KB SRAM, the dynamic power consumed during repeated memory fetches and intense MAC operations strongly correlates with the operands, allowing an attacker to deduce the proprietary weights being processed.
  common_mistake: |
    **The Pitfall:** Confusing physical hardware vulnerabilities with algorithmic adversarial attacks.
    **The Rationale:** Candidates assume standard software encryption at rest protects the model during active inference in SRAM, unaware of physical probing.
    **The Consequence:** Failing to identify the correct threat model for physically accessible edge NPUs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target: Ethos-U55 @ 480 MHz, 256 MAC/cycle = 122.8 GMAC/s.
       - Oscilloscope: 1 GS/s sampling rate.
    2. **Calculations:**
       - Layer Execution Time for 1.22M MACs = 1.22e6 / 122.8e9 = ~10 microseconds.
       - Trace Samples Captured = 10 µs * 1e9 samples/s = 10,000 data points.
    3. **Conclusion & Interpretation:**
       - **Result: Physical Security Vulnerability.** A high-speed oscilloscope easily captures enough granular samples per layer to execute Differential Power Analysis (DPA) and extract SRAM contents.
