title: Cortex-M4 Battery Lifetime
scenario: A wildlife trap powered by a 2000mAh battery uses a Cortex-M4. The MCU draws 10uA asleep, and 15mA when awake for 200ms to run a motion classifier.
question: Design a duty-cycling schedule to ensure the battery lasts exactly one year (8760 hours), determining the maximum allowable wakeups per day.
details:
  realistic_solution: To last 8760 hours on 2000mAh, the average current budget is 228.3uA. The sleep state consumes 10uA, leaving 218.3uA for active time. Active time consumes 15,000uA. Setting up the duty cycle equation yields the percentage of time the device can be active, which can be converted into daily wakeups.
  common_mistake: |
    **The Pitfall:** Forgetting to subtract the baseline sleep current or failing to align units.
    **The Rationale:** Candidates often calculate the active budget based on the full capacity, ignoring the constant drain of the sleep state.
    **The Consequence:** The device dies months earlier than the target one-year lifespan.
  napkin_math: |
    - Target average current: 2000 mAh / 8760 h = 0.2283 mA (228.3 uA).
    - Equation: D * 15mA + (1 - D) * 0.01mA = 0.2283mA.
    - 14.99 * D = 0.2183 -> Duty cycle D = 0.01456 (1.456%).
    - Daily active seconds: 86400 * 0.01456 = 1258 seconds.
    - **Max wakeups per day: 1258 / 0.2s = 6,290 wakeups/day.**
