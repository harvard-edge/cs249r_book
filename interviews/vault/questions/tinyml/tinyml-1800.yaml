title: Cortex-M4 Battery Lifetime
scenario: A wildlife trap powered by a 2000mAh battery uses a Cortex-M4. The MCU draws
  10uA asleep, and 15mA when awake for 200ms to run a motion classifier.
question: Design a duty-cycling schedule to ensure the battery lasts for exactly one
  year (8760 hours), determining the maximum allowable wakeups per day.
details:
  realistic_solution: 'To last 8760 hours on 2000mAh, the average current budget is
    2000 / 8760 = 228.3uA. The sleep state consumes 10uA, leaving 218.3uA for active
    time. Active time consumes 15,000uA. Setting up the duty cycle (D) equation: D
    * 15000 + (1-D) * 10 = 228.3. This yields D ≈ 0.01456 (1.45% active time). Since
    there are 86,400 seconds in a day, active time is 1258.2 seconds/day. Dividing
    by 0.2s per wakeup gives the daily allowance.'
  common_mistake: Failing to convert 15mA to 15000uA or forgetting to subtract the
    sleep current when allocating the remaining power budget.
  napkin_math: I_avg = 2000/8760 = 0.2283mA. D*15 + (1-D)*0.01 = 0.2283 -> 14.99D
    = 0.2183 -> D=0.01456. Wakeups = (86400*D)/0.2 = 6291/day.
