title: The CPU-Sparing Transfer
scenario: In a TinyML audio sensing application, your microcontroller needs to continuously sample data
  from a microphone's ADC and place it into a memory buffer for inference. To avoid stalling the CPU with
  this repetitive data copy task, what specialized hardware peripheral is essential?
question: "To avoid stalling the CPU with this repetitive data copy task, what specialized hardware peripheral is essential?"
details:
  realistic_solution: 'Direct Memory Access (DMA) is the correct answer. DMA transfers data between peripherals
    and memory independently of the CPU. For audio at 16 kHz, 16-bit samples: 32 KB/s data rate. Without
    DMA: CPU executes load+store per sample = 2 cycles * 16,000/s = 32,000 cycles/s. Seems trivial at
    168 MHz (0.019%). But interrupt latency is the real cost: each sample triggers an ISR with 12-cycle
    entry + 12-cycle exit = 24 cycles * 16,000/s = 384,000 cycles/s of context switching. With DMA: configure
    a 512-sample circular buffer (1 KB). DMA fills half-buffer (256 samples = 16 ms of audio) then interrupts
    once. ISR rate drops from 16,000/s to 62.5/s — a 256x reduction. CPU is free to run inference during
    the 16 ms DMA fill window. Total DMA overhead: <0.01% of CPU vs ~0.23% with per-sample ISR.'
  common_mistake: Engineers without embedded experience often assume the CPU must execute a loop to copy
    data from the peripheral's data register into SRAM, byte by byte. This would completely occupy the
    CPU, preventing it from running the ML model or any other tasks, violating the real-time constraints
    of the system.
  napkin_math: 'Assume a 16kHz audio stream (16-bit samples) feeding a 1-second buffer: `16,000 samples/s
    * 2 bytes/sample = 32 KB/s`. If the CPU had to copy this with `memcpy`, it would be constantly interrupted
    or tied up in a tight loop. With DMA, the CPU simply sets up a ~32KB transfer and is then free for
    nearly a full second to run inference on the *previous* buffer, achieving a pipelined, real-time system.'
  options:
  - A software interrupt handler
  - The CPU's L1 Cache
  - A Direct Memory Access (DMA) controller
  - A memory-mapped I/O register
  correct_index: 2
