title: The Checkpoint Wear-Out Cascade
scenario: You are building a system for an industrial water pump that uses a sensitive flow sensor. To
  be robust against frequent power glitches in the factory, the firmware saves its 256-byte sensor calibration
  state to NOR flash after every single measurement. The device is designed for a 10-year lifespan. After
  just 8 months, a whole batch of devices begins to fail, reporting corrupted calibration data on boot.
  Your team's initial analysis suggests 'defective flash chips' from the supplier. Critique this analysis.
  Propose an alternative failure hypothesis and justify it with quantitative reasoning about the underlying
  hardware physics.
details:
  realistic_solution: The 'defective chips' analysis is almost certainly wrong; it's a classic case of
    blaming hardware for a systems design flaw. The root cause is flash memory wear-out, accelerated by
    coupling the checkpoint frequency directly to the measurement frequency in a noisy environment. NOR
    flash has a finite number of erase/write cycles. By writing to flash after every measurement, the
    design transforms high-frequency power glitches into high-frequency write cycles, rapidly aging the
    memory. The system, designed for fault tolerance, inadvertently created a wear-out accelerator. The
    correct fix is to decouple writes from measurements. Implement a 'dirty bit' in RAM; only write the
    calibration state to flash if it has changed by a significant amount since the last save. Alternatively,
    buffer the latest state in RAM and only commit it to flash on a much slower, fixed interval (e.g.,
    once every 5 minutes), or during a clean shutdown. This makes the system resilient to high-frequency
    noise without destroying the underlying hardware.
  common_mistake: Blaming the hardware (defective chips) or suggesting a simple software fix ('add error
    correction codes'). While ECC is good, it doesn't solve the fundamental problem if the media itself
    is being destroyed. This issue is about premature aging induced by a design choice, a 'death by a
    thousand cuts'.
  napkin_math: 'NOR flash: 100K erase cycles. Flow sensor writes 256B calibration per measurement. In
    noisy factory: ~300 glitches/day→300 writes/day. 100K/300=333 days≈11 months. Matches 8-month failure
    for slightly noisier environments. Not defective chips—design flaw coupling write frequency to measurement
    frequency. Fix: dirty-bit in RAM, write to flash only on significant change or 5-min interval.'
