title: Calculate energy efficiency between slow and fast microcontroller clock modes
scenario: Two Cortex-M4 MCUs run identical keyword spotting. MCU-A runs at 100 MHz, finishes in 200ms, and draws 10mA. MCU-B runs at 200 MHz, finishes in 100ms, but draws 25mA.
question: Calculate which MCU configuration consumes less total energy per inference.
details:
  realistic_solution: Energy is proportional to Current multiplied by Time. MCU-A consumes 10mA * 0.2s = 2.0 mAs per inference. MCU-B consumes 25mA * 0.1s = 2.5 mAs. MCU-A consumes less total energy per inference, even though it takes twice as long to finish.
  common_mistake: |
    **The Pitfall:** Assuming the faster chip is always more energy efficient.
    **The Rationale:** Candidates blindly apply the "race to sleep" heuristic without verifying the non-linear power penalty of higher clock speeds.
    **The Consequence:** Selecting a sub-optimal MCU configuration that drains the battery faster despite finishing computations sooner.
  napkin_math: |
    - **MCU-A Energy**: 10mA * 0.2s = **2.0 mAs**.
    - **MCU-B Energy**: 25mA * 0.1s = **2.5 mAs**.
    - **Result**: MCU-A consumes less total energy.
