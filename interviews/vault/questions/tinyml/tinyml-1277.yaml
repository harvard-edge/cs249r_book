title: Peak Compute Derivation for ARM Cortex-M4 Roofline
scenario: You are building a roofline model to analyze a keyword spotting model deployed on an ARM Cortex-M4 (STM32F4) microcontroller. To establish the compute roof of the model, you need to determine the theoretical maximum operations per cycle. The MCU runs at 168 MHz, has 256 KB SRAM, and utilizes the CMSIS-NN library.
question: What is the peak INT8 multiply-accumulate (MAC) throughput per clock cycle on this specific architecture?
details:
  realistic_solution: The candidate should successfully recall that the ARM Cortex-M4 architecture, particularly when using CMSIS-NN, can perform 2 INT8 MACs per clock cycle using SIMD instructions. This specific hardware fact dictates the absolute horizontal compute ceiling of the roofline model. Knowing this structural limit correctly grounds any compute-bound expectations for the STM32F4 platform.
  common_mistake: |
    **The Pitfall:** Assuming the Cortex-M4 can only execute a standard scalar multiply (1 MAC per cycle).
    **The Rationale:** Candidates fail to recall the availability of DSP/SIMD instructions in the CMSIS-NN library that double this throughput for 8-bit integers.
    **The Consequence:** The compute ceiling of the roofline model will be exactly 50% lower than reality, skewing all performance analysis.
  napkin_math: |
    1. **Hardware specification:** 2 INT8 MACs per cycle via SIMD.
    2. **Operating frequency:** 168 MHz (168,000,000 cycles/second).
    3. **Peak MAC throughput:** 168 MHz * 2 MACs/cycle = **336 Million MACs/second**.
    4. **Total Operations:** 336 MMAC/s * 2 ops/MAC (1 multiply, 1 add) = **672 Mega-operations per second (MOps/s)** for the roofline compute ceiling.
