validation_issues:
- The 'Napkin Math' states 'We assume INT8, so each element is 1 byte.' This assumption is not explicitly
  stated in the scenario for the tensor sizes given (e.g., 10KB, 25KB), which could imply these are already
  in bytes. While typical for INT8 models, this explicit assumption should be part of the scenario or
  realistic solution for clarity, especially since the question mentions INT8 quantization but provides
  tensor sizes as KB.
- The 'Napkin Math' is incomplete; it outlines the setup but does not actually calculate the peak memory
  usage based on the provided graph, which is required to fully answer the question 'what is the minimum
  required size for the Tensor Arena?'
