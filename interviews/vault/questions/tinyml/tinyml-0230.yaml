title: The TinyML Tensor Arena Squeeze
scenario: 'You are deploying a keyword spotting model on a Cortex-M4 microcontroller with 128KB of SRAM.
  The TensorFlow Lite for Microcontrollers interpreter needs to pre-allocate a ''Tensor Arena'' for all
  activations. Your model, using INT8 quantization, has the following simplified execution graph:'
details:
  realistic_solution: The correct approach is to analyze the model's execution step-by-step and find the
    point where the sum of all concurrently 'live' tensors is at its maximum. Tensors are live from the
    moment they are created until they are last used as an input to a subsequent layer.
  common_mistake: The most common mistake is to simply sum the sizes of all tensors in the model, which
    vastly overestimates the required memory. Another error is to only consider the single largest tensor,
    which underestimates memory by ignoring the period where an input tensor and an output tensor must
    exist in memory simultaneously during an operation.
  napkin_math: We assume INT8, so each element is 1 byte.
  options:
  - '~4.6 KB. (Mistake: Sums all tensor sizes: 512 + 2048 + 2048 + 4 = 4612 bytes)'
  - '~2.0 KB. (Mistake: Only accounts for the single largest tensor, ignoring concurrency)'
  - ~4.1 KB. (Correctly identifies the peak concurrent usage during the second operation)
  - '~16.4 KB. (Mistake: Correctly calculates the peak element count of 4096 but assumes FP32 (4 bytes)
    instead of INT8)'
  correct_index: 2
