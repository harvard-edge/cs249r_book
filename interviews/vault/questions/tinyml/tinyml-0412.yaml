title: 'The Watchdog Reset During Inference'
scenario: 'Your environmental monitoring node on a Cortex-M0+ (RP2040, 133 MHz, 264 KB SRAM) runs a 12-layer anomaly detection model. Inference takes 280 ms. The system watchdog is set to 500 ms. In the field, the device resets every few hours. The watchdog is kicked (fed) in the main loop before and after inference.'
question: 'Why can a 280 ms RP2040 inference trip a 500 ms watchdog every few hours in the field?'
details:
  realistic_solution: 'The 280 ms inference time was measured in isolation on the dev board. In the field, factors extend it past 500 ms intermittently: (1) Flash wait states: RP2040 at 133 MHz with XIP from external QSPI flash. Cache misses add 5-50 ms. Worst case cold cache after sleep: +50 ms. (2) Interrupt preemption: sensor ISRs, UART logging steal CPU cycles. 100+ ISRs during 280 ms = 5-10 ms overhead. (3) Rare flash writes: logging events (10/hour) trigger 100 ms flash sector erase. If flash write coincides with inference: 280 + 50 (cache) + 100 (flash) = 430 ms. Add pre-inference work (50 ms) = 480 ms. Any additional ISR pushes past 500 ms WDT. Probability: ~8% per hour = resets every few hours. Fix: kick watchdog inside inference loop (between layers), not just before/after.'
  common_mistake: '"280 ms is well under the 500 ms watchdog timeout — there''s plenty of margin." The 280 ms is the average inference time. The worst case is what matters for watchdog compliance.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Nominal inference: 280 ms.
    - Cache misses/interrupts overhead: 70 ms.
    - Flash write event (rare): 100 ms.
    - Watchdog Timeout (WDT): 500 ms.

    **Calculations:**
    - Worst-case compute = 280 ms + 70 ms = 350 ms.
    - Pre-inference work = 50 ms.
    - Total without rare event = 350 ms + 50 ms = 400 ms.
    - Total with flash write = 400 ms + 100 ms = 500 ms (Trips WDT).
    - Flash write window = 10 writes/hour, inference is 60/hour.
    - Probability over 10 hours: ~56% chance of collision.

    **Conclusion & Interpretation:**
    - **Result: 500 ms (Latency-Bound)**. Rare flash writes overlapping with worst-case inference cache misses perfectly exceed the 500ms WDT, causing intermittent resets.
