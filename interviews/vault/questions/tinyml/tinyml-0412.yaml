title: The Watchdog Reset During Inference
scenario: Your environmental monitoring node on a Cortex-M0+ (RP2040, 133 MHz, 264 KB SRAM) runs a 12-layer
  anomaly detection model. Inference takes 280 ms. The system watchdog is set to 500 ms. In the field,
  the device resets every few hours. The watchdog is kicked (fed) in the main loop before and after inference.
  Why is it resetting?
details:
  realistic_solution: 'The 280 ms inference time was measured in isolation on the dev board. In the field,
    factors extend it past 500 ms intermittently: (1) Flash wait states: RP2040 at 133 MHz with XIP from
    external QSPI flash. Cache misses add 5-50 ms. Worst case cold cache after sleep: +50 ms. (2) Interrupt
    preemption: sensor ISRs, UART logging steal CPU cycles. 100+ ISRs during 280 ms = 5-10 ms overhead.
    (3) Rare flash writes: logging events (10/hour) trigger 100 ms flash sector erase. If flash write
    coincides with inference: 280 + 50 (cache) + 100 (flash) = 430 ms. Add pre-inference work (50 ms)
    = 480 ms. Any additional ISR pushes past 500 ms WDT. Probability: ~8% per hour = resets every few
    hours. Fix: kick watchdog inside inference loop (between layers), not just before/after.'
  common_mistake: '"280 ms is well under the 500 ms watchdog timeout — there''s plenty of margin." The
    280 ms is the average inference time. The worst case is what matters for watchdog compliance.'
  napkin_math: 'Nominal inference: 280 ms. Worst-case: 350 ms. Pre-inference work: 50 ms. Post-inference
    before kick: 0 ms. Total nominal: 330 ms. Total worst-case: 400 ms (80% of 500 ms WDT). Rare event
    (flash write/logging): +100 ms → 500 ms (100%). Probability of rare event during inference: Logging
    events happen ~10 times an hour. Inference runs 1/min = 60/hour. A collision occurs if the 100ms write
    overlaps with the 400ms inference (a 500ms window). Total vulnerable time = 60 × 500ms = 30 seconds
    per hour. P(collision per write) = 30s / 3600s = 0.83%. With 10 writes per hour, P(collision per hour)
    = 1 - (1 - 0.0083)^10 ≈ 8%. Over 10 hours: 1 - (1 - 0.08)^10 ≈ 56%. This matches the ''every few hours''
    reset observation.'
