title: The TinyML 'Micro-Cluster' Fallacy
scenario: 'You are a senior engineer reviewing a design for a new industrial vibration sensor. The device
  uses two co-located microcontrollers on the same PCB: MCU ''A'' performs an FFT on the raw sensor data,
  and MCU ''B'' runs a small anomaly detection model. A junior engineer on your team, inspired by datacenter
  technologies like InfiniBand, proposes connecting the two MCUs with a custom protocol that mimics RDMA
  (Remote Direct Memory Access) to ''eliminate OS overhead and achieve the lowest possible latency.''
  Use your knowledge of microcontroller hardware to diagnose the primary flaw in this reasoning.'
details:
  realistic_solution: The primary flaw is that the proposed 'RDMA' solution is solving a non-existent
    problem at this scale, while ignoring the real bottleneck. On a bare-metal microcontroller, there
    is no 'OS overhead' in the way a Linux server has. Communication is handled via memory-mapped peripherals
    and DMA controllers, which are already extremely fast and low-level. The latency of a standard on-board
    protocol like SPI (measured in microseconds for a typical data transfer) is completely dwarfed by
    the actual compute time of the ML model (measured in milliseconds). The engineering effort to create
    a custom RDMA-like protocol is enormous and yields zero practical benefit because the true bottleneck
    is compute, not the on-board interconnect.
  common_mistake: Getting lost in the theoretical benefits of RDMA (kernel bypass, zero-copy) without
    considering the physical reality of the hardware. They might argue it's a clever idea in principle,
    failing to see the overwhelming practical bottleneck and the microscopic scale of the problem.
  napkin_math: '4KB FFT over SPI@10MHz: 4096*8/10M=3.3ms. DMA setup: ~10 cycles@240MHz=42ns. ML inference
    on MCU B: 1M MACs@240MHz=4.2ms. Transfer=44% of pipeline but SPI+DMA is already near-optimal — bare-metal,
    no OS, no TCP/IP. Custom RDMA saves ~0ns. Engineering cost: months. Benefit: zero.'
  options:
  - RDMA would be too power-hungry for a microcontroller because it requires constant polling of the memory
    bus.
  - A custom protocol is impossible because microcontroller peripherals like SPI/I2C have fixed-function
    hardware that cannot be reprogrammed.
  - The interconnect latency is negligible compared to the millisecond-scale compute time of the ML model,
    making the complex RDMA implementation pointless.
  - The real bottleneck would be the clock speed difference between the two MCUs, causing synchronization
    issues that RDMA cannot solve.
  correct_index: 2
