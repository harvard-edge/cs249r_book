title: Cascaded Wake-Up Architecture
scenario: >
  You are optimizing a battery-powered wildlife camera trap where the Cortex-M4 consumes 15mW active and 10uW in deep sleep.
question: >
  Propose a cascaded wake-up duty-cycling architecture using a 1uW passive PIR sensor to trigger a fast 2ms INT8 cascade model before waking up the main 50ms classification model.
details:
  realistic_solution: >
    The system rests in a 10uW sleep state while the 1uW PIR sensor listens. Motion triggers a GPIO interrupt, waking the M4 to run a lightweight 2ms binary classifier (taking 15mW). Only if this INT8 model detects an animal does the heavy 50ms model run. This keeps average power in empty scenes strictly under 15uW.
  common_mistake: |
    **The Pitfall:** Waking up the main 50ms model directly on every PIR trigger.
    **The Rationale:** Candidates fail to anticipate the high false-positive rate of passive sensors in wild environments (e.g., moving branches).
    **The Consequence:** The massive battery drain from evaluating false positives drastically cuts the camera's deployment lifespan.
  napkin_math: |
    - **Sleep State:** 10 μW base + 1 μW PIR sensor = 11 μW.
    - **INT8 Cascade (2ms):** 0.002s × 15,000 μW / 1s = 30 μW (if triggered once per second).
    - **Total Average Power:** 11 μW + 30 μW = **41 μW** average.
    - **Conclusion:** The system remains highly power-efficient, drastically reducing wake-up costs for false positives.
