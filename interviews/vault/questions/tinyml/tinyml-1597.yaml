title: Cascaded Wake-Up Architecture
scenario: You are optimizing a battery-powered wildlife camera trap where the Cortex-M4 consumes 15mW active and 10uW in deep sleep.
question: Propose a cascaded wake-up duty-cycling architecture using a 1uW passive PIR sensor to trigger a fast 2ms INT8 cascade model before waking up the main 50ms classification model.
details:
  realistic_solution: The system rests in a 10µW sleep state while the 1µW PIR sensor listens. Motion triggers a GPIO interrupt, waking the M4 to run a lightweight 2ms binary classifier (drawing 15mW). Only if this tiny INT8 cascade model verifies an animal signature does the heavy 50ms target model execute. This prevents continuous heavy inference, keeping average power strictly minimized in noisy environments.
  common_mistake: |
    **The Pitfall:** Waking up the main 50ms model directly on every PIR sensor trigger.
    **The Rationale:** Candidates fail to anticipate the high false-positive rate of passive environmental sensors (e.g., moving branches or shadows).
    **The Consequence:** The massive battery drain from fully evaluating thousands of false positives drastically cuts the camera's deployment lifespan.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Sleep power: 10 µW (MCU) + 1 µW (PIR) = 11 µW.
       - Target trigger rate: 1 per second.
       - Cascade inference: 2ms @ 15,000 µW.
    2. **Calculations:**
       - Active Energy per trigger: 0.002 s * 15,000 µW = 30 µJ.
       - Average cascade power (1/sec) = 30 µW.
       - Total Average System Power: 11 µW (base) + 30 µW (cascade ops) = 41 µW.
    3. **Conclusion & Interpretation:**
       - **Result: False-Positive Suppression**. The 41 µW baseline drastically guards the battery from the lethal 15mW spikes of the 50ms target model.
