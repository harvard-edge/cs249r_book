title: Cascaded Wake-Up Architecture
scenario: Optimizing a battery-powered wildlife camera trap where the Cortex-M4 consumes
  15mW active and 10uW in deep sleep.
question: Propose a cascaded wake-up duty-cycling architecture using a 1uW passive
  PIR sensor to trigger a fast 2ms INT8 cascade model before waking up the main 50ms
  classification model.
details:
  realistic_solution: The system rests in a 10uW sleep state while the 1uW PIR sensor
    listens. Motion triggers a GPIO interrupt, waking the M4 to run a lightweight
    2ms binary classifier (taking 15mW). Only if this INT8 model detects an animal
    does the heavy 50ms model run. This keeps average power in empty scenes strictly
    under 15uW.
  common_mistake: Waking up the main 50ms model directly on PIR triggers, leading
    to massive battery drain from false positives like moving branches.
  napkin_math: 10uW + 1uW + (0.002s * 15000uW / 1s) = 41uW avg
