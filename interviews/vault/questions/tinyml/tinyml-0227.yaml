title: The TinyML Update Cost Fallacy
scenario: You are managing a fleet of one million smart home sensors. You have developed a new version of your keyword-spotting model which is 100 KB larger than the previous one. To deploy this, you need to perform an over-the-air (OTA) update over a cellular IoT network.
question: Based on the numbers provided, which of the following is the largest cost associated with this single, global update?
details:
  realistic_solution: The single largest cost is the aggregate cellular data transmission fee. While the cost per device is minuscule, the total cost for the fleet is substantial. This operational expenditure (OpEx) for a single update can easily dwarf the one-time engineering or compute cost required to create the model. At scale, bandwidth is not free, and logistics dominate.
  common_mistake: |
    **The Pitfall:** Fixating on the one-time model training compute cost or upfront hardware CapEx.
    **The Rationale:** Engineers with a cloud background dramatically underestimate how small, per-device operational costs (like data transmission) aggregate into massive OpEx when multiplied across a million-unit fleet.
    **The Consequence:** Severe budget overruns due to unforeseen cellular data fees during OTA deployments.
  napkin_math: |
    1. **Assumptions & Constraints:** Fleet size is 1,000,000 devices. OTA update payload delta is 100 KB per device. Cellular data cost is approximately $1.00 per MB.
    2. **Calculations:** Total data = 1,000,000 * 100 KB = 100,000,000 KB. 100,000,000 KB / 1024 = 97,656 MB. Total cost = 97,656 MB * $1.00/MB = $97,656.
    3. **Conclusion & Interpretation:** **Result: $97,656 bandwidth cost for a single deployment.** This operational bandwidth cost dwarfs the cloud GPU training cost for a TinyML model, making network efficiency the dominant financial bottleneck.
  options:
  - The cloud compute cost (GPU hours) to train the new model.
  - The aggregate cellular data transmission cost.
  - The electricity cost for all one million devices to power their modems during the download.
  - The initial hardware (CapEx) cost of the microcontrollers in the fleet.
  correct_index: 1
