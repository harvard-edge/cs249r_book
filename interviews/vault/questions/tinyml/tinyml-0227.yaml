title: The TinyML Update Cost Fallacy
scenario: You are managing a fleet of one million smart home sensors. You have developed a new version
  of your keyword-spotting model which is 100 KB larger than the previous one. To deploy this, you need
  to perform an over-the-air (OTA) update over a cellular IoT network. Based on the numbers provided,
  which of the following is the largest cost associated with this single, global update?
details:
  realistic_solution: The single largest cost is the aggregate cellular data transmission fee. While the
    cost per device is minuscule, the total cost for the fleet is substantial. This operational expenditure
    (OpEx) for a single update can easily dwarf the one-time engineering or compute cost required to create
    the model. At scale, bandwidth is not free, and logistics dominate.
  common_mistake: Engineers, particularly those from a cloud background, often fixate on either the one-time
    model training cost or the upfront hardware cost. They tend to dramatically underestimate how the
    small, per-device operational costs (like data transmission) aggregate into massive expenses when
    multiplied across a million-unit fleet.
  napkin_math: 'An OTA update size is 100 KB per device. For 1,000,000 devices, total data = 100,000,000
    KB. Converting to Megabytes: 100,000,000 KB / 1024 KB/MB = 97,656 MB. At a cellular data cost of $1.00
    per MB, this single OTA update costs $97,656. Optimizing the model to use an 8-bit diff could shrink
    the payload to 10KB, saving ~$87,800 per deployment!'
  options:
  - The cloud compute cost (GPU hours) to train the new model.
  - The aggregate cellular data transmission cost.
  - The electricity cost for all one million devices to power their modems during the download.
  - The initial hardware (CapEx) cost of the microcontrollers in the fleet.
  correct_index: 1
