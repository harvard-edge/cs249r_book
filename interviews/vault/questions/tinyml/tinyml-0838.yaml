title: TinyML Radio Budget Spec
scenario: A battery sensor sends anomaly reports over a low-power radio. You need to specify the network budget needed before choosing BLE, LoRa, or Wi-Fi.
question: What network budget must be specified before choosing a TinyML sensor radio?
details:
  realistic_solution: Specify payload size, event frequency, latency target, energy per transmission, coverage range, duty-cycle limits, retry policy, and gateway availability. Radio choice depends on the communication envelope, not just peak bitrate.
  common_mistake: |
    **The Pitfall:** Choosing the highest-bitrate radio based purely on payload size.
    **The Rationale:** Candidates focus on peak bitrate and ignore the surrounding constraints like battery life, range, and duty-cycle limits.
    **The Consequence:** Selecting a radio that exceeds the power budget or fails to meet coverage requirements.
  napkin_math: |
    - A 10 KB report every minute is 167 B/s on average.
    - If it must arrive within 1 second, the burst requirement is **80 kbps**.
