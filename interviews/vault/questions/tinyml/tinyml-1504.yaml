title: Thermal Shutdown Prevention for High-Accuracy Inference on ESP32-S3
scenario: An ESP32-S3 runs continuous image classification at 10fps for a quality control camera in a 45°C factory environment. The module has θ_ja = 45°C/W.
question: How would you determine if thermal throttling occurs and propose the thermal solution?
details:
  realistic_solution: 'θ_ja = 45°C/W. Power: 40mW = 0.04W. ΔT = 0.04W × 45°C/W = 1.8°C. T_junction = 45 + 1.8 = 46.8°C. ESP32-S3 max junction: 105°C. Current: 46.8°C — 58°C below limit. No thermal throttling at 40mW. However: 10fps continuous on ESP32-S3 PSRAM + camera interface likely draws more than 40mW. Actual system power: ESP32-S3 (40mW) + camera module OV2640 (60mW) + PSRAM (20mW) = 120mW. ΔT = 0.12W × 45 = 5.4°C. Junction = 50.4°C — still safe. Worst case with WiFi active: +100mW = 220mW total. ΔT = 0.22×45 = 9.9°C. Junction = 54.9°C — safe. No thermal intervention needed for this scenario.'
  common_mistake: |
    **The Pitfall:** Over-engineering a thermal heatsink solution.
    **The Rationale:** Candidates fail to perform the actual thermal resistance math, assuming an industrial environment and continuous inference automatically cause throttling.
    **The Consequence:** Unnecessary cost, size, and weight are added to the device for a non-existent thermal bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Ambient temp: 45°C.
       - Thermal resistance (θ_ja): 45°C/W.
       - Max junction temp: 105°C.
       - ESP32-S3 power: 40mW.
       - Camera (OV2640): 60mW.
       - PSRAM: 20mW.
       - WiFi (worst-case): +100mW.
    2. **Calculations:**
       - Base system power: 40 + 60 + 20 = 120mW (0.12W).
       - Base ΔT: 0.12W * 45°C/W = 5.4°C.
       - Base Junction: 45°C + 5.4°C = 50.4°C.
       - Worst-case power: 120 + 100 = 220mW (0.22W).
       - Worst-case ΔT: 0.22W * 45°C/W = 9.9°C.
       - Worst-case Junction: 45°C + 9.9°C = 54.9°C.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound (Thermal).** The system is perfectly safe with a 50°C margin; no heatsink is needed.
