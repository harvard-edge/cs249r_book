title: MCU Weight Storage Hierarchy
scenario: A Cortex-M4 features 256KB of SRAM and 1MB of Flash. An audio model requires
  500KB for its weights.
question: Explain how this memory hierarchy strictly dictates the storage and execution
  strategy for the model's weights.
visual:
  kind: svg
  path: tinyml-1646.svg
  alt: Bar chart showing a 500KB model fitting in 1MB Flash but overflowing 256KB
    SRAM.
  caption: Memory capacity vs model footprint.
details:
  realistic_solution: Because the 500KB weights exceed the 256KB SRAM capacity, they
    cannot be loaded entirely into RAM. They must reside in the 1MB Flash memory.
    During inference, the weights must either be executed directly from Flash (Execute-in-Place)
    or paged into the SRAM in small chunks, limiting bandwidth.
  common_mistake: Assuming all weights are loaded into SRAM at boot time, causing
    an Out of Memory error.
  napkin_math: 500KB > 256KB SRAM
