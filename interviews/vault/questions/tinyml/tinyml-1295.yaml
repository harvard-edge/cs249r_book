title: Designing a Distilled Keyword Spotter for Cortex-M4
scenario: 'You are tasked with designing a keyword spotting system that must run on an ARM Cortex-M4 (STM32F4) microcontroller. The hardware provides 168 MHz compute, 256 KB SRAM, 1 MB flash, no FPU, and relies entirely on CMSIS-NN SIMD instructions (2x INT8 MACs/cycle). You have a highly accurate floating-point ResNet teacher model that exceeds the flash and SRAM limits by 10x.'
question: 'How should you design an INT8 distilled keyword-spotting student model for a Cortex-M4 with no FPU and tight SRAM limits?'
details:
  realistic_solution: 'The specification must define an INT8-quantized CNN student model optimized for CMSIS-NN, utilizing depthwise separable convolutions to minimize MACs and parameter footprint. The pipeline should use Quantization-Aware Training (QAT) combined with temperature-scaled logit distillation from the FP32 teacher, avoiding intermediate feature distillation due to student quantization noise.'
  common_mistake: |
    **The Pitfall:** Applying knowledge distillation to intermediate feature maps of heavily quantized models.
    **The Rationale:** Candidates suggest complex feature-based distillation without realizing that pushing INT8 representations to match FP32 intermediate features causes severe instability.
    **The Consequence:** The student model fails to converge, or the candidate recommends an FP32 student that exceeds the Cortex-M4's capabilities.
  napkin_math: |
    1. **Assumptions & Constraints:** 168 MHz Cortex-M4. 50ms latency budget. CMSIS-NN SIMD (2 INT8 MACs/cycle). 80% MAC utilization.
    2. **Calculations:**
       - Available cycles in 50ms: 168,000,000 * 0.05 = 8,400,000 cycles.
       - Maximum MACs = 8,400,000 cycles * 2 MACs/cycle * 0.80 utilization = 13,440,000 MACs.
    3. **Conclusion & Interpretation:** **The student model is strictly constrained to < 13.44 million MACs.** Result: Compute-Bound.
