title: TinyML Training Buffer Overrun
scenario: A TinyML device continuously collects vibration data for local calibration. The sensor stream produces 12 KB/s, the calibration routine writes to flash at 4 KB/s, and the system allocates a 96 KB SRAM buffer. After several minutes of operation, telemetry shows packet drops.
question: Why does the TinyML local calibration buffer inevitably overflow when sensor input is 12 KB/s and flash writes are 4 KB/s?
details:
  realistic_solution: The system is fundamentally I/O bound by the flash write speed. The continuous ingestion rate (12 KB/s) significantly exceeds the maximum sustained drain rate (4 KB/s), creating a permanent net accumulation in SRAM. A 96 KB buffer only delays the inevitable overflow by a few seconds. The architecture requires data decimation, compression, or a faster storage interface to reach equilibrium.
  common_mistake: |
    **The Pitfall:** Optimizing CPU ML compute to solve an I/O bottleneck.
    **The Rationale:** Engineers assume data drops are caused by slow ML model execution pipelines rather than calculating the basic I/O mass-balance equation.
    **The Consequence:** They needlessly optimize model assembly code, while the buffer continues to catastrophically overflow due to strict physical flash write limits.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sensor Ingress = 12 KB/s.
    - Flash Drain = 4 KB/s.
    - SRAM Buffer = 96 KB.

    **Calculations:**
    - Net Accumulation Rate: 12 KB/s - 4 KB/s = +8 KB/s.
    - Time to Overflow: 96 KB / 8 KB/s = 12 seconds.

    **Conclusion & Interpretation:**
    - **Result: I/O-Bound Overflow**. The 8 KB/s deficit guarantees the 96 KB SRAM buffer will overflow in exactly 12 seconds once calibration initiates, dropping all subsequent packets.
