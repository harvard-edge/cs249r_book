title: Hardware-Aware NAS for TinyML on Cortex-M7 + Ethos-U55
scenario: 'You are leading a TinyML project focused on real-time anomaly detection for industrial equipment,
  leveraging a hardware platform featuring an Arm Cortex-M7 microcontroller (operating at 480 MHz) paired
  with an Arm Ethos-U55 NPU. The Ethos-U55 is configured with 256 MACs/cycle, and the system has a total
  of 512 KB of SRAM available for both code and data. Your team has developed a large candidate model
  space, but deployment requires inference latency under 80ms and a memory footprint (weights + activations)
  of less than 350KB.


  Describe how you would implement a hardware-aware Neural Architecture Search (NAS) pipeline, potentially
  drawing inspiration from MCUNet-style approaches, to discover an optimal neural network architecture
  that meets these stringent requirements. Detail your approach to defining the search space, incorporating
  hardware constraints into the search algorithm, and evaluating candidates.'
details:
  realistic_solution: 'A realistic solution involves a tightly coupled hardware-software co-design approach.

    1.  **Search Space Definition**: The search space should be specifically tailored to operations efficiently
    executed on the Ethos-U55 (e.g., depthwise separable convolutions, specific kernel sizes, and activation
    functions). It should also include options for varying channel widths and depths, and consider different
    quantization schemes (e.g., 8-bit integer quantization).

    2.  **Hardware Constraint Integration**: Instead of theoretical FLOPs, use a hardware-specific latency
    predictor (e.g., based on Arm''s Cycle Model or a trained proxy model from empirical measurements
    on the target) to estimate inference time. Develop a memory estimation module that accurately calculates
    total memory footprint (weights, biases, intermediate activations) for each candidate, accounting
    for memory layout and quantization. The 350KB limit needs to be a hard constraint or a strong penalty
    term in the reward function. MCUNet''s two-stage NAS (Macro-NAS for architecture, Micro-NAS for layer-level
    optimization with memory constraints) is a strong inspiration here.

    3.  **Search Algorithm**: Employ an evolutionary algorithm or reinforcement learning-based NAS, where
    the reward function incorporates both accuracy and penalties for exceeding latency and memory budgets.
    Candidates violating hard constraints are pruned early.

    4.  **Evaluation**: Use a combination of simulated execution (with the latency predictor) and potentially
    early-stage deployment on a hardware prototype or simulator for critical candidates to validate metrics
    before final training.'
  common_mistake: A common mistake is treating NAS as purely algorithmic optimization without deeply integrating
    hardware specifics. Candidates might propose generic NAS techniques that don't account for the Ethos-U55's
    specific supported operations, quantization capabilities, or the severe SRAM limitations. They might
    also overlook data movement costs between Cortex-M7 and Ethos-U55, assuming NPU FLOPs directly translate
    to overall latency without considering memory bandwidth or CPU overhead.
  napkin_math: 'Given 512 KB SRAM total, and a 350 KB target for the model, this leaves ~160 KB for the
    OS, firmware, and other buffers.

    *   **Memory Footprint**: A common 8-bit quantized convolutional layer (e.g., 3x3 kernel, 32 input
    channels, 64 output channels) has 3*3*32*64 = 18432 weights. At 1 byte/weight, this is approximately
    18 KB. Activations for a 32x32 feature map with 64 channels (8-bit) would be 32*32*64 bytes = 65.5
    KB. Summing these up quickly illustrates how fast the 350 KB budget can be consumed.

    *   **Latency Budget**: For an 80ms latency target, with the Ethos-U55 at 256 MACs/cycle and Cortex-M7
    at 480 MHz: The theoretical peak MACs within 80ms on the NPU alone are 256 MACs/cycle * (0.080 s *
    480 * 10^6 cycles/s) ≈ 9.8 GMACs. This is a very rough upper bound and doesn''t account for NPU utilization,
    data transfer overhead, or CPU-side processing. An optimized 8-bit quantized MobileNetV2 (typically
    300-600 MMACs for ImageNet) would need to fit well within this budget, requiring significant architectural
    pruning and efficient MAC utilization.'
