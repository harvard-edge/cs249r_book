title: ESP32-S3 PSRAM Bottleneck Diagnosis
scenario: Your team deployed a 1.2 MB INT8 wake-word CNN (10 million MACs) to an ESP32-S3. Based on the
  240 MHz dual-core Xtensa CPU with INT8 vector extensions, the theoretical compute cost was estimated
  at ~10-15ms per inference. However, production profiling shows inference consistently taking over 120ms,
  leading to dropped audio frames. What is the root cause of this massive compute estimation discrepancy
  and how would you prove it?
details:
  realistic_solution: The root cause is a severe memory bandwidth bottleneck caused by placing model weights
    in the 8 MB external PSRAM. Because the model exceeds the 512 KB internal SRAM limit, the fast 240
    MHz CPU and its INT8 vector extensions are completely starved waiting on the SPI bus. Compute cost
    estimation on embedded devices must account for memory access latency, not just ALU throughput. The
    solution is to prove this via cache miss profiling and then prune the model to fit within the internal
    SRAM.
  common_mistake: Candidates often assume the discrepancy is due to RTOS scheduling overhead, WiFi/BLE
    stack interruptions, or a failure to utilize both cores. They compute theoretical FLOPs but fail to
    analyze the memory hierarchy, missing that a 1.2 MB model cannot fit into the 512 KB internal SRAM.
  napkin_math: 'Compute bound theory: 10M MACs / (240 MHz * 2 MACs/cycle * 2 cores) = ~10.4 ms. Memory
    bound reality: The 1.2 MB model sits in PSRAM. Assuming an Octal SPI bus at 80 MHz, peak theoretical
    bandwidth is 80 MB/s. Minimum time to fetch weights just once is 1.2 MB / 80 MB/s = 15 ms. With CPU
    cache thrashing during multi-pass convolution memory access, effective bandwidth drops dramatically
    to ~10 MB/s, causing the ~120 ms observed latency.'
