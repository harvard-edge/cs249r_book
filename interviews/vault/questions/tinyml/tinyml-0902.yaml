title: 'TinyML TCO Evaluation: Cortex-M4 vs ESP32-S3 for Production Deployment'
scenario: >
  Evaluate Cortex-M4 (168MHz, 256KB SRAM, $2 chip, 30mA active, 30μA sleep) vs ESP32-S3 (168MHz, 512KB SRAM, 8MB PSRAM, WiFi, $4 chip, 240mA WiFi, 20μA deep sleep) for a warehouse RFID tag reader running ML-based signal processing (100ms inference every 5 minutes, 24/7, battery-powered from 2000mAh LiPo).
question: >
  Calculate the 2-year battery replacement TCO for 500 units.
details:
  realistic_solution: >
    ESP32-S3 battery life is 2.31 years > 2-year evaluation period, so 0 battery replacements needed within 2 years. Both M4 and ESP32-S3 require 0 battery replacements in this period. M4 wins on hardware cost ($1K vs $2K) with significantly longer battery life.
  common_mistake: |
    **The Pitfall:** Choosing ESP32-S3 for its larger SRAM without checking if the model fits on M4 (256KB).
    **The Rationale:** Candidates fail to calculate that the WiFi activation during inference could drain the battery 10x faster than the M4.
    **The Consequence:** Recommending a more expensive and less power-efficient hardware platform unnecessarily.
  napkin_math: |
    - **M4 Power:** Inference is 100ms every 5 mins (300s). Duty cycle = 0.1/300 = 0.033%.
    - **M4 Average Current:** (0.00033 * 30mA) + (0.99967 * 0.030mA) = 0.010mA + 0.030mA = 0.040mA.
    - **M4 Battery Life:** 2000mAh / 0.040mA = 50,000 hours = 5.71 years.
    - **ESP32-S3 Average Current:** WiFi active 100ms every 5 mins. (0.00033 * 240mA) + (0.99967 * 0.020mA) = 0.079mA + 0.020mA = 0.099mA.
    - **ESP32-S3 Battery Life:** 2000mAh / 0.099mA = 20,202 hours = 2.31 years.
    - **Replacements in 2 years:** Both M4 (5.71yr) and ESP32-S3 (2.31yr) require **0 replacements** in 2 years.
    - **Hardware Cost:** M4 (500 * $2) = $1K. ESP32-S3 (500 * $4) = $2K.
    - **Total TCO:** M4 is **$1K**, ESP32-S3 is **$2K**.
