title: 'TinyML TCO Evaluation: Cortex-M4 vs ESP32-S3 for Production Deployment'
scenario: >
  A battery-powered warehouse RFID tag reader runs ML inference (100ms every 5 minutes, 24/7), and the team is evaluating Cortex-M4 vs ESP32-S3.
question: What is the 2-year battery replacement TCO for 500 units?
details:
  realistic_solution: |
    ESP32-S3 battery life is 2.31 years > 2-year evaluation period, so 0 battery replacements needed within 2 years. Both M4 and ESP32-S3 require 0 battery replacements in this period. M4 wins on hardware cost ($1K vs $2K) with significantly longer battery life.
  common_mistake: |
    **The Pitfall:** Choosing the ESP32-S3 purely for its larger SRAM without evaluating the WiFi energy penalty.
    **The Rationale:** Candidates fail to calculate that ESP32's idle/active WiFi current drains the battery significantly faster than the M4.
    **The Consequence:** Recommending a more expensive platform that needlessly limits battery life.
  napkin_math: |
    **Assumptions & Constraints:**
    - Duty cycle: 100ms active every 300s (0.033%).
    - Battery: 2000mAh. M4 active: 30mA, sleep: 30μA. ESP32 active: 240mA, sleep: 20μA.

    **Calculations:**
    - M4 Avg Current: (0.00033 * 30mA) + (0.99967 * 0.030mA) = 0.040mA.
    - M4 Life: 2000mAh / 0.040mA = 50,000 hours = 5.71 years.
    - ESP32 Avg Current: (0.00033 * 240mA) + (0.99967 * 0.020mA) = 0.099mA.
    - ESP32 Life: 2000mAh / 0.099mA = 20,202 hours = 2.31 years.
    - 2-year replacements for both: 0.
    - Hardware Cost: M4 = $1K, ESP32 = $2K.

    **Conclusion & Interpretation:**
    - **Result: Cost-Bound ($1K TCO)**. Both survive 2 years, making M4 the clear winner.
