title: The Micro-Convolution Budget
scenario: You are tasked with optimizing a keyword-spotting model for a Cortex-M4 MCU with only 256KB of SRAM. A profiler shows one specific layer, a standard 3x3 convolution with 64 input channels and 128 output channels operating on a 16x16 feature map, is consuming the majority of your compute budget. A colleague suggests you apply a depthwise separable convolution instead.
question: "What MAC reduction factor results from replacing the standard 3x3 64-to-128 convolution with a depthwise separable one?"
details:
  realistic_solution: The correct approach is to calculate the MACs for both the standard convolution and the two parts of the depthwise separable convolution (depthwise and pointwise) and then find the ratio. The reduction is typically dramatic, on the order of 8-9x for common kernel sizes, making it a foundational optimization for mobile and edge devices.
  common_mistake: |
    **The Pitfall:** Confusing parameter reduction with computational reduction, or miscalculating the separable convolution cost.
    **The Rationale:** Engineers either guess the reduction or only calculate the depthwise step, ignoring the pointwise cost.
    **The Consequence:** The computational savings are heavily under- or over-estimated.
  napkin_math: |
    - Standard conv MACs: 3*3 * 64 * 128 * 16*16 = 18,874,368 MACs.
    - Depthwise step MACs: 3*3 * 64 * 16*16 = 147,456 MACs.
    - Pointwise step MACs: 1*1 * 64 * 128 * 16*16 = 2,097,152 MACs.
    - Separable total: 147,456 + 2,097,152 = 2,244,608 MACs.
    - **Reduction ratio: 18,874,368 / 2,244,608 = ~8.4x reduction in MAC operations.**
  options:
  - It provides no computational savings, only parameter savings.
  - Roughly a 2x reduction in MACs.
  - Roughly an 8-9x reduction in MACs.
  - Roughly a 64x reduction, proportional to the number of input channels.
  correct_index: 2
