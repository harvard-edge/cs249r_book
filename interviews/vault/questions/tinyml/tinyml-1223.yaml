title: Depthwise and Pointwise Convolution Scheduling for SRAM Optimization
scenario: You are deploying a MobileNet-style keyword spotting model. During profiling, you notice that executing a Depthwise convolution sequentially followed by a Pointwise convolution causes an out-of-memory (OOM) error, as materializing the full intermediate activation tensor exceeds the available SRAM when combined with input and output buffers.
question: How do you diagnose this bottleneck and quantify the memory savings of an optimized scheduling approach on a memory-constrained MCU?
details:
  realistic_solution: 'Implement depth-first scheduling (tiling or fusion) for the DW and PW layers. By computing a small spatial tile of the DW layer and immediately processing it with the PW layer, you eliminate the need to store the full intermediate tensor, heavily reducing peak SRAM usage.'
  common_mistake: |
    **The Pitfall:** Proposing aggressive sub-byte weight quantization.
    **The Rationale:** Candidates confuse model parameter size with runtime activation memory bottlenecks.
    **The Consequence:** Engineering effort is wasted on complex quantization that hurts accuracy without fixing the actual SRAM activation overflow.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Intermediate tensor: 32x32 spatial, 64 channels (INT8).
       - Depth-first tile: 8x8 spatial.
    2. **Calculations:**
       - Sequential memory = 32 * 32 * 64 * 1 byte = 65,536 bytes (64 KB).
       - Depth-first memory = 8 * 8 * 64 * 1 byte = 4,096 bytes (4 KB).
       - Memory saved = 64 KB - 4 KB = 60 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** Depth-first scheduling eliminates the 64 KB activation bottleneck, resolving the SRAM overflow dynamically.
