title: The Factory Floor Cascade Failure
scenario: You are a TinyML engineer working on a predictive maintenance sensor for a factory assembly line. The device uses a Cortex-M7 MCU, which delivers approximately 960 MFLOPS. It runs a vibration analysis model that requires 80 MFLOPs to execute. The system has a hard real-time deadline of 50ms per event. The average arrival rate is 1 Hz, but events frequently arrive in bursts.
question: "Is the 80 MFLOP vibration model viable under the 50 ms hard real-time deadline on the Cortex-M7?"
details:
  realistic_solution: 'The diagnosis depends on the real-time deadline, which must be specified. The service time is Ts = 80 MFLOPs / 960 MFLOPS = 83.3 ms. If events arrive faster than every 83.3 ms, the system is fundamentally non-viable — the queue grows without bound and every event misses its deadline. Increasing queue size only delays the crash. The only valid solutions are: (a) reduce model FLOPs via quantization/pruning to bring Ts below the inter-arrival time, (b) use a faster MCU, or (c) reduce the sampling rate if the application permits.'
  common_mistake: |
    **The Pitfall:** Focusing on the symptom (queue overflow) instead of the root cause (service time).
    **The Rationale:** Engineers might suggest increasing queue size to handle bursts.
    **The Consequence:** A larger queue only delays the inevitable crash; the system still fundamentally misses deadlines.
  napkin_math: |
    - Calculate service time (Ts): 80 MFLOPs / 960 MFLOPS = 0.0833 seconds (83.3 ms).
    - Compare to deadline: Ts (83.3 ms) > 50 ms deadline.
    - **The system is fundamentally non-viable because the service time exceeds the hard deadline. INT8 quantization or pruning is required.**
  options:
  - The event queue size is too small to handle the burst. Increasing the queue size would solve the problem.
  - The Cortex-M7 is thermally throttling under the burst load, reducing its effective FLOPS.
  - The per-event processing time (83.3ms) exceeds the real-time deadline (50ms), making the system unstable even for a single event.
  - The average arrival rate (1 Hz) is much lower than the service rate (~12 Hz), so the issue is a software bug in the event handler, not a performance bottleneck.
  correct_index: 2
