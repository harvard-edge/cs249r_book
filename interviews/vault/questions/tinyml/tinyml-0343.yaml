title: The Microcontroller's Memory Wall (tinyml-0343)
scenario: You are profiling a simple operation—like an element-wise vector addition—on a Cortex-M4 microcontroller.
  Based on the typical hardware characteristics of this device class, what is the *primary* performance
  bottleneck you would expect to encounter?
question: "Based on the typical hardware characteristics of this device class, what is the *primary* performance bottleneck you would expect to encounter?"
details:
  realistic_solution: The primary bottleneck is almost certainly memory bandwidth. Microcontrollers have
    a very low 'ridge point' in the roofline model, meaning they have a low ratio of compute performance
    to memory bandwidth. Simple operations like vector addition have very low arithmetic intensity (few
    operations per byte moved), placing them squarely in the memory-bound portion of the roofline plot.
    Performance is dictated by how fast you can get data from SRAM to the CPU core, not how fast the core
    can perform additions.
  common_mistake: Engineers often assume that performance is limited by compute (the processor's clock
    speed or FLOPS). However, on many systems, especially memory-constrained ones like microcontrollers,
    the bottleneck is the rate at which data can be fed to the processor. They focus on the 'Ops' part
    of TOPS/W and forget the underlying memory system constraints.
  napkin_math: 'Let''s analyze a vector addition: `C[i] = A[i] + B[i]` using 32-bit floats. For each element,
    we do 1 FLOP (the add). We must read two floats (2 * 4 bytes = 8 bytes) and write one float (4 bytes),
    totaling 12 bytes of memory traffic.'
  options:
  - The core's compute throughput (MFLOPS)
  - The on-chip SRAM memory bandwidth
  - The speed of the external SPI bus
  - The latency of a single Flash memory read
  correct_index: 1
