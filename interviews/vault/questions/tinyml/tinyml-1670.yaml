title: Depthwise Convolutions on MCU
scenario: A Cortex-M4 runs a depthwise separable convolution layer with a 3x3 kernel,
  32 input/output channels, and a 16x16 spatial resolution.
question: Analyze the total MAC count compared to a standard convolution, and estimate
  the minimal clock cycles required assuming 1 MAC/cycle.
details:
  realistic_solution: The depthwise step requires 3x3 x 32 x 16x16 = 73,728 MACs.
    The pointwise (1x1) step requires 32x32 x 16x16 = 262,144 MACs. Total is 335,872
    MACs, or ~335K cycles. A standard convolution would take 3x3 x 32x32 x 16x16 =
    2,359,296 MACs. The separable approach provides roughly a 7x reduction in compute.
  common_mistake: Multiplying the input and output channels together during the depthwise
    calculation, treating it incorrectly like a standard 3D convolution kernel.
  napkin_math: (9 * 32 * 256) + (1024 * 256) = 73,728 + 262,144 = 335,872 MACs.
