title: Depthwise Convolutions on MCU
scenario: A Cortex-M4 runs a depthwise separable convolution layer with a 3x3 kernel, 32 input/output channels, and a 16x16 spatial resolution.
question: Analyze the total MAC count compared to a standard convolution, and estimate the minimal clock cycles required assuming 1 MAC/cycle.
details:
  realistic_solution: The depthwise step requires 3x3 x 32 x 16x16 = 73,728 MACs. The pointwise (1x1) step requires 32x32 x 16x16 = 262,144 MACs. Total is 335,872 MACs, or ~335K cycles. A standard convolution would take 3x3 x 32x32 x 16x16 = 2,359,296 MACs. The separable approach provides roughly a 7x reduction in compute.
  common_mistake: |
    **The Pitfall:** Multiplying the input and output channels together during the depthwise calculation.
    **The Rationale:** Treating the depthwise step incorrectly like a standard 3D convolution kernel instead of a channel-wise 2D filter.
    **The Consequence:** Dramatically overestimating the required operations for the depthwise step, leading to incorrect performance analysis.
  napkin_math: |
    1. **Spatial Resolution:** 16 * 16 = 256 pixels.
    2. **Depthwise MACs:** 3 * 3 * 32 channels * 256 pixels = 73,728 MACs.
    3. **Pointwise MACs:** 32 in * 32 out * 256 pixels = 262,144 MACs.
    4. **Total Separable MACs:** 73,728 + 262,144 = **335,872 MACs** (~335K cycles).
    5. **Standard Conv MACs:** 3 * 3 * 32 in * 32 out * 256 pixels = **2,359,296 MACs**.
    6. **Conclusion:** The separable approach provides roughly a 7x reduction in compute.
