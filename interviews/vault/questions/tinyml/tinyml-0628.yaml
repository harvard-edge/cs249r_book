title: The Watchdog and the Unseen Workload
scenario: You've deployed a fleet of battery-powered audio sensors using a Cortex-M7 to classify bird calls. The system has a 250ms watchdog timer; if the main loop takes longer, the device reboots. For six months, everything works perfectly with an average inference time of 180ms. Suddenly, a monitoring alert fires: 10% of the fleet, all in a specific geographic area, are rebooting every 5 minutes. The model code and firmware haven't changed. You pull the logs and confirm the watchdog is triggering.
question: How would you evaluate the root causes of a localized inference latency increase causing watchdog reboots?
details:
  realistic_solution: The root cause is likely environmental data drift that changes the computational cost of inference. The arrival of a new, non-native insect species or localized construction noise in that specific area is creating audio inputs with higher spectral complexity. This translates to more non-zero values after the MFCC/FFT preprocessing stage. For many efficient model architectures (e.g., using sparse operations), a denser input requires more clock cycles to process, even with the same model code. The inference time (180ms) had only a 70ms safety margin (250ms - 180ms). The 'denser' data pushed the computation time just over 250ms, causing the watchdog to consistently fire. The system failed because it was only monitoring the classification output, not the input data's computational characteristics or the inference latency itself.
  common_mistake: |
    **The Pitfall:** Blaming hardware failures like battery droop or flash corruption.
    **The Rationale:** When a stable firmware suddenly begins rebooting in the field, engineers assume the hardware is degrading.
    **The Consequence:** True data distribution shifts (which change the computational complexity of the input) are ignored, leading to futile hardware replacements instead of updating the watchdog or optimizing the preprocessing.
  napkin_math: |
    *   **Baseline:** Average inference is 180 ms. Watchdog is 250 ms. Safety margin is 70 ms.
    *   **Compute Split:** Assume 30 ms preprocessing (MFCC) and 150 ms base compute (180 ms - 30 ms).
    *   **Data Drift:** Environmental noise increases spectral density, causing preprocessing to jump to 90 ms.
    *   **New Latency:** 150 ms (base) + 90 ms (new preprocessing) = 240 ms average.
    *   **Failure:** Natural variance pushes some inferences to 260 ms, tripping the 250 ms watchdog.
    *   **Downtime:** Rebooting takes 30s. Triggering every 5 mins = 12 reboots/hr. 12 × 30s = 6 mins/hr = 10% downtime.
