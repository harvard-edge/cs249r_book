title: The Watchdog and the Unseen Workload
scenario: 'You''ve deployed a fleet of battery-powered audio sensors to classify bird calls. The system has a 250ms watchdog timer; if the main loop takes longer, the device reboots. For six months, everything works perfectly with an average inference time of 180ms. Suddenly, a monitoring alert fires: 10% of the fleet, all in a specific geographic area, are rebooting every 5 minutes. The model code and firmware haven''t changed. You pull the logs and confirm the watchdog is triggering.'
question: How would you evaluate the root causes of a localized inference latency increase causing watchdog reboots?
details:
  realistic_solution: The root cause is likely environmental data drift that changes the computational cost of inference. The arrival of a new noise source in that area creates audio inputs with higher spectral complexity. This translates to more non-zero values after the MFCC/FFT preprocessing stage. For sparse model architectures, a denser input requires more clock cycles to process. The 180ms inference time had only a 70ms safety margin, and the denser data pushed the computation time over 250ms.
  common_mistake: |
    **The Pitfall:** Blaming hardware failures like battery droop or flash corruption.
    **The Rationale:** When a stable firmware suddenly begins rebooting in the field, engineers assume the hardware is degrading.
    **The Consequence:** True data distribution shifts are ignored, leading to futile hardware replacements instead of updating the watchdog or optimizing preprocessing.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline average inference: 180 ms. Watchdog: 250 ms. Safety margin: 70 ms.
    - Compute Split: 30 ms preprocessing (MFCC), 150 ms base compute.

    **Calculations:**
    - Data Drift: Environmental noise increases spectral density, causing preprocessing to jump to 90 ms.
    - New Latency: 150 ms (base) + 90 ms (new preprocessing) = 240 ms average.
    - Natural variance pushes some inferences to >250 ms, tripping the watchdog.
    - Downtime: Rebooting takes 30s. Triggering every 5 mins = 12 reboots/hr. 12 * 30s = 6 mins/hr = 10% downtime.

    **Conclusion & Interpretation:**
    - **Result: 240 ms average (Compute-Bound via Data Drift)**. Natural variance pushes some inferences to >250 ms, tripping the watchdog.
