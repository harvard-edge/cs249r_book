title: The Watchdog and the Unseen Workload
scenario: 'You''ve deployed a fleet of battery-powered audio sensors using a Cortex-M7 to classify bird
  calls. The system has a 250ms watchdog timer; if the main loop takes longer, the device reboots. For
  six months, everything works perfectly with an average inference time of 180ms. Suddenly, a monitoring
  alert fires: 10% of the fleet, all in a specific geographic area, are rebooting every 5 minutes. The
  model code and firmware haven''t changed. You pull the logs and confirm the watchdog is triggering.
  Evaluate the potential root causes and justify why a sudden, localized increase in inference latency
  is occurring, leading to this non-linear system failure.'
question: "How would you evaluate the potential root causes and justify why a sudden, localized increase in inference latency is occurring, leading to this non-linear system failure?"
details:
  realistic_solution: The root cause is likely environmental data drift that changes the computational
    cost of inference. The arrival of a new, non-native insect species or localized construction noise
    in that specific area is creating audio inputs with higher spectral complexity. This translates to
    more non-zero values after the MFCC/FFT preprocessing stage. For many efficient model architectures
    (e.g., using sparse operations), a denser input requires more clock cycles to process, even with the
    same model code. The inference time (180ms) had only a 70ms safety margin (250ms - 180ms). The 'denser'
    data pushed the computation time just over 250ms, causing the watchdog to consistently fire. The system
    failed because it was only monitoring the classification output, not the input data's computational
    characteristics or the inference latency itself.
  common_mistake: Blaming hardware failure like battery droop or flash corruption. While possible, these
    don't explain the geographical clustering or the fact that the system runs for a few minutes before
    rebooting. A voltage drop would likely cause an immediate brown-out reset, not a predictable watchdog
    timeout.
  napkin_math: 'M7@480MHz≈960 MFLOPS. Avg inference: 180ms, watchdog: 250ms, margin: 70ms. Desert audio→denser
    spectral content. Preprocessing jumps from 30ms to 90ms. Base compute (excluding preprocessing): 180-30=150ms.
    New total: 150+90=240ms. Variance: some clips hit 260ms→watchdog fires. Reboot every 5min: 30s reboot×12/hr=6min/hr=10%
    downtime. Localized to desert region explains geographic clustering.'
