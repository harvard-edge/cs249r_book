title: Diagnosing SRAM Overflow During Concurrent Bluetooth Operations
scenario: You are deploying an audio classification model on a Nordic nRF5340, utilizing its 128 MHz app
  core for inference while the 64 MHz net core manages BLE 5.3 communications. The system has 1 MB of
  flash and 256 KB of SRAM, with static analysis indicating the model requires 160 KB of peak memory.
  However, the system experiences sporadic Out-Of-Memory (OOM) crashes during inference exclusively when
  the BLE stack is actively transmitting at ~5mA. The crashes always occur during a specific sequence
  of operations involving residual connections. What is the root cause of this failure?
question: "Why does the nRF5340 audio model OOM during residual blocks only while BLE 5.3 is transmitting?"
details:
  realistic_solution: The root cause is an inefficient operator schedule that extends the lifetime of
    residual connection buffers during concurrent execution. When the BLE stack is active, it dynamically
    allocates SRAM, reducing the available memory pool for the ML application. The default scheduler processes
    the residual network branches in an order that keeps the large initial input tensor alive in memory
    while subsequent depthwise and pointwise convolutions simultaneously allocate their own intermediate
    buffers. By reordering the execution schedule to consume the residual branch earlier, or by implementing
    layer fusion, the overlapping tensor lifetimes are eliminated and peak memory drops safely below the
    threshold.
  common_mistake: Candidates often misdiagnose this as strictly a networking issue and suggest reducing
    the BLE MTU or disabling the radio during inference. They fail to examine how the default execution
    order of neural network operators dictates the lifespan and overlap of intermediate activation buffers.
  napkin_math: 'Nordic nRF5340 Total SRAM = 256 KB. BLE 5.3 stack + RTOS baseline = 60 KB, leaving 196
    KB usable. During a residual block, the input buffer is 50 KB, the intermediate depthwise output is
    70 KB, and the pointwise output is 70 KB. With poor scheduling, all three remain alive: 50 + 70 +
    70 = 190 KB. Total system memory becomes 190 KB (ML) + 60 KB (OS/BLE) = 250 KB. This leaves a mere
    6 KB of headroom, which is instantly exhausted when an active BLE interrupt allocates dynamic buffers,
    triggering the OOM.'
