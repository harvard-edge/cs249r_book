title: DMA Mic Data Overlap
scenario: A Cortex-M4 receives audio via an I2S peripheral. Transferring a 10ms audio chunk via CPU polling takes 2ms of clock time. Inference on that chunk takes 6ms. Alternatively, a DMA controller can transfer the chunk with zero CPU cycles.
question: Calculate the total CPU active time required to process 10 consecutive audio chunks using DMA compared to CPU polling.
details:
  realistic_solution: Using CPU polling, each chunk requires 2ms for transfer + 6ms for inference = 8ms per chunk, totaling 80ms for 10 chunks. Using DMA, the transfer is entirely handled in the background without CPU intervention. The CPU only wakes to perform the 6ms inference per chunk. Total CPU active time is simply 10 * 6ms = 60ms.
  common_mistake: |
    **The Pitfall:** Adding the background DMA transfer time to the CPU active time.
    **The Rationale:** Candidates fail to realize that the primary advantage of DMA is zero CPU cycle consumption during the physical data transfer.
    **The Consequence:** Overestimating the required CPU clock speed and power budget for the application.
  napkin_math: |
    - **CPU Polling:** 10 chunks * (2 ms transfer + 6 ms inference) = **80 ms total CPU active time**.
    - **DMA Strategy:** CPU is asleep during transfer (0 ms). Wakes only for inference.
    - **DMA Total CPU Time:** 10 chunks * 6 ms inference = **60 ms total CPU active time**.
