title: DMA Mic Data Overlap
scenario: A Cortex-M4 receives audio via an I2S peripheral. Transferring a 10ms audio
  chunk via CPU polling takes 2ms of clock time. Inference on that chunk takes 6ms.
  Alternatively, a DMA controller can transfer the chunk with zero CPU cycles.
question: Calculate the total CPU active time required to process 10 consecutive audio
  chunks using DMA compared to CPU polling.
details:
  realistic_solution: Using CPU polling, each chunk requires 2ms for transfer + 6ms
    for inference = 8ms per chunk, totaling 80ms for 10 chunks. Using DMA, the transfer
    is entirely handled in the background without CPU intervention. The CPU only wakes
    to perform the 6ms inference per chunk. Total CPU active time is simply 10 * 6ms
    = 60ms.
  common_mistake: Adding the transfer time to the DMA approach, failing to realize
    the goal of DMA is zero CPU active time during the transfer.
  napkin_math: 10 * (2 + 6) = 80ms vs 10 * 6 = 60ms.
