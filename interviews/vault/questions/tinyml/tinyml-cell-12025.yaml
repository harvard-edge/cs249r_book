title: 'Latency Decomposition: Size End-to-End Latency for Environmental Sensor TinyML Node'
scenario: 'Size the end-to-end inference latency for an air quality classification system on ESP32-S3
  (240MHz, 512KB SRAM, 8MB PSRAM). Sensors: CO2 (I2C, 50ms per reading), temperature (1ms), humidity (1ms).
  Classification model: 10K params INT8, 0.05 MOPs. Total pipeline: sensor read → normalization → inference
  → LoRa transmission (100ms). Size each component.'
question: "How should end-to-end latency be sized for the ESP32-S3 air quality pipeline, including sensor reads and LoRa transmission?"
details:
  realistic_solution: 'CO2 I2C: 50ms (hardware, irreducible). Temp+humidity: 2ms. Normalization: 0.1ms.
    Inference: 0.05M/240M = 0.21ms. LoRa TX: 100ms. Sequential total: 152ms. With pipelining (sensor read
    overlapped with previous LoRa TX): effective cycle = max(50+2, 100) + 0.3 = 100.3ms. Measurement interval:
    every 5 minutes — latency largely irrelevant for duty cycle.'
  common_mistake: Identifying CO2 sensor read (50ms) as a target for ML optimization when it is a hardware
    constraint; the correct optimization is to pipeline sensor reads with prior inference.
  napkin_math: 'Model: 10K × 1B = 10KB (fits in SRAM). Inference: 0.05M/240M = 0.208ms. I2C CO2 at 100kHz:
    50ms (sensor integration time). LoRa: 100ms at SF7 BW125. Total sequential: 152ms. Pipeline: sensor
    read during LoRa TX: 50ms overlap. Effective: 102ms per sample. At 5-min intervals: 0.033% duty cycle.'
