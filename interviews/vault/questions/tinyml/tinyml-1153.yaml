title: Estimating Inference Latency and Energy on nRF5340
scenario: 'We are deploying a keyword spotting model on a Nordic nRF5340 microcontroller for a battery-powered wearable. The model requires 2.5 million multiply-accumulate (MAC) operations per inference. The nRF5340''s application core runs at 128 MHz and can execute one MAC per clock cycle, with an estimated 20% overhead for memory access.'
question: 'Calculate the expected latency for a single inference and the active energy consumed if the system draws ~5mA at 3.0V.'
details:
  realistic_solution: 'To find the energy per inference, first determine the execution time by dividing the total CPU cycles by the clock frequency. Next, calculate the active power consumption using the standard P = I * V formula. Finally, multiply the active power by the execution time to yield the energy in Joules.'
  common_mistake: |
    **The Pitfall:** Confusing power and energy, or neglecting the 20% memory overhead.
    **The Rationale:** Candidates often calculate the active power draw (15 mW) but fail to multiply it by the execution time, or miss the memory stalls entirely.
    **The Consequence:** Energy per inference is severely underestimated, leading to wearables with unacceptably short battery lifespans.
  napkin_math: |
    1. **Assumptions & Constraints:** 2.5M MACs. 1 cycle/MAC. 20% memory overhead. 128 MHz clock. 5mA at 3.0V.
    2. **Calculations:**
       - Total cycles = 2.5M * 1.2 = 3,000,000 cycles.
       - Latency = 3,000,000 / 128,000,000 Hz = 0.0234375 seconds = 23.4 ms.
       - Power = 5 mA * 3.0 V = 15 mW = 0.015 W.
       - Energy = 0.015 W * 0.0234375 s = 0.0003515 Joules = 351.6 µJ.
    3. **Conclusion & Interpretation:** **Latency is 23.4 ms, and energy consumed is ~351.6 µJ per inference.** Result: Compute-Bound.
