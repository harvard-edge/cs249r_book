title: 'Optimizing and Deploying a Quantized Model on ARM Cortex-M4 STM32F4'
scenario: 'You are tasked with deploying a pre-trained convolutional neural network (CNN) for a keyword spotting application onto an ARM Cortex-M4 STM32F4 microcontroller (168 MHz, 256 KB SRAM, no FPU). The model was originally trained in PyTorch and converted to ONNX, resulting in a 300KB floating-point model. Your goal is to achieve real-time inference within the stringent memory and computational constraints of the STM32F4.'
question: 'How should you convert a PyTorch or ONNX KWS CNN to TFLite Micro for an FPU-less STM32F4 and fit 256 KB SRAM while maintaining acceptable latency?'
details:
  realistic_solution: '1. Convert the ONNX model to TensorFlow Lite (TFLite) format using tools like `onnx_tf`. 2. Apply post-training full integer quantization to the TFLite model, mapping both weights and activations to 8-bit integers. This is crucial for both memory reduction and leveraging integer-only hardware capabilities. 3. Target TensorFlow Lite Micro as the runtime. 4. Analyze the TFLite quantized model for operator coverage against TFLite Micro''s supported operations. If gaps exist, identify unsupported ops and either implement custom fixed-point kernels for them (if feasible and performance-critical) or consider architectural changes to replace them with supported operations. 5. Perform a memory analysis of the quantized model, including weights, biases, and all intermediate activation buffers, to ensure the total memory footprint remains below 256 KB SRAM. Tools like `tflite-model-analyzer` or custom profiling on the target hardware can aid this. If memory exceeds limits, explore techniques like pruning, advanced quantization schemes (e.g., quantization-aware training for specific layers), or re-evaluating the model''s complexity.'
  common_mistake: 'Ignoring the critical absence of a Floating-Point Unit (FPU) on the STM32F4, leading to prohibitively slow software-emulated floating-point operations. Another common mistake is neglecting the memory footprint of intermediate activation tensors during inference, assuming only model weights contribute significantly to RAM usage, or not using full integer quantization when memory is severely limited.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Original model: 300 KB (Float32).
    - Float32 Activations: 100 KB.
    - Target SRAM: 256 KB.
    - Quantization: INT8.

    **Calculations:**
    - INT8 weights = 300 KB / 4 = 75 KB.
    - INT8 activations = 100 KB / 4 = 25 KB.
    - Total quantized footprint = 75 KB + 25 KB = 100 KB.
    - Remaining SRAM = 256 KB - 100 KB = 156 KB.

    **Conclusion & Interpretation:**
    - **Result: 100 KB (Memory-Bound)**. Converting to full INT8 perfectly fits the model into the 256 KB limit while leaving 156 KB for runtime, OS, and stack requirements.
