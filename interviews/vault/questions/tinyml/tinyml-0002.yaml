title: The RF Energy Sink
scenario: You spend weeks optimizing your model math to save 1 mJ of energy per inference. However, when
  you enable BLE to report results, the total energy per cycle jumps by 8 mJ. Based on the RF breakdown,
  why is BLE consuming so much more than a simple packet transmission?
question: "Based on the RF breakdown, why is BLE consuming so much more than a simple packet transmission?"
details:
  realistic_solution: 'You are hitting the **BLE Handshake Overhead**. BLE doesn''t just ''send a packet'';
    it advertises on 3 separate channels and opens a receive window to listen for connection requests.
    This handshake consumes 3-4x more energy than the actual data transmission. The fix is to **Amortize
    Radio Costs**: don''t report every inference. Buffer 100 results locally and send them in a single
    connection event to minimize radio uptime.'
  common_mistake: '"The model inference dominates the power budget." In many TinyML apps, the radio is
    the actual power hog.'
  napkin_math: Inference = 2.5 mJ. BLE Transmission = 0.8 mJ. BLE Sync/Handshake = 7.2 mJ. Total = 10.5
    mJ. By reporting every 100 samples, the amortized cost drops to 2.5 + (8.0/100) = 2.58 mJ—a nearly
    4x reduction.
