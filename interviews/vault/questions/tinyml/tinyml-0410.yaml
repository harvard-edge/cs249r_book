title: The MAC Budget
scenario: Your Cortex-M4 runs at 168 MHz with no FPU. Your keyword spotting model requires 5 million INT8
  multiply-accumulate (MAC) operations per inference. Can you run inference in under 100ms?
details:
  realistic_solution: 'A Cortex-M4 without SIMD extensions executes one 32-bit instruction per cycle,
    but an INT8 MAC requires multiple instructions: load two 8-bit operands (1-2 cycles), multiply (1
    cycle), accumulate (1 cycle), store (1 cycle). Effective throughput: ~1 MAC per 3-4 cycles. At 168
    MHz: 168M / 4 = 42 million MACs/second. Time for 5M MACs: 5M / 42M = 119ms — over budget. With CMSIS-NN
    SIMD (4 INT8 MACs/cycle): 672 MMAC/s → 5M / 672M = 7.44ms — well within budget.'
  common_mistake: '"168 MHz means 168 million operations per second, so 5M MACs takes 30ms — easy." This
    assumes one MAC per clock cycle, which is wrong for a scalar processor without SIMD.'
  napkin_math: 'Without SIMD: 168 MHz / 4 cycles per MAC = 42 MMAC/s. 5M MACs / 42M = 119ms ✗. With CMSIS-NN
    SIMD: 168 MHz × 4 MACs/cycle = 672 MMAC/s. 5M / 672M = 7.44ms ✓. SIMD gives 16× speedup for INT8 workloads
    on Cortex-M4.'
