title: The MAC Budget
scenario: >
  Your Cortex-M4 runs at 168 MHz with no FPU. Your keyword spotting model requires 5 million INT8 multiply-accumulate (MAC) operations per inference.
question: >
  Can you run inference in under 100ms?
details:
  realistic_solution: >
    A Cortex-M4 without SIMD extensions executes one 32-bit instruction per cycle, but an INT8 MAC requires multiple instructions: load two 8-bit operands (1-2 cycles), multiply (1 cycle), accumulate (1 cycle), store (1 cycle). Effective throughput: ~1 MAC per 3-4 cycles. At 168 MHz: 168M / 4 = 42 million MACs/second. Time for 5M MACs: 5M / 42M = 119ms — over budget. With CMSIS-NN SIMD (2 INT8 MACs/cycle): 336 MMAC/s -> 5M / 336M = 14.9ms — well within budget.
  common_mistake: |
    **The Pitfall:** Assuming "168 MHz means 168 million operations per second, so 5M MACs takes 30ms — easy."
    **The Rationale:** Candidates assume one MAC per clock cycle, which is incorrect for a scalar processor without SIMD.
    **The Consequence:** They vastly underestimate inference latency and miss real-time deadlines.
  napkin_math: |
    - **Without SIMD:** 168 MHz / 4 cycles per MAC = 42 MMAC/s. Time: 5M MACs / 42 MMAC/s = **119 ms** (Misses 100ms budget).
    - **With CMSIS-NN SIMD:** 168 MHz × 2 MACs/cycle = 336 MMAC/s. Time: 5M / 336M = **14.9 ms** (Well under 100ms budget).
    - **Conclusion:** SIMD gives an 8× speedup for INT8 workloads on a Cortex-M4.
  options:
  - Yes, a 168 MHz processor can easily do 5 million operations in ~30ms, which is well under the budget.
  - No, the Cortex-M4 has no floating-point unit, so integer operations are software-emulated and too slow.
  - Yes, but only if you utilize the CMSIS-NN SIMD instructions (2 MACs/cycle), which reduces latency from ~119ms to ~15ms.
  - No, even with SIMD instructions, 5 million MACs will take over 120ms on a 168 MHz processor.
  correct_index: 2
