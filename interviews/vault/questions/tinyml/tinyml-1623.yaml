title: LSTM Memory Layout Constraints on MCU
scenario: You are analyzing memory layouts for an LSTM sequence model running locally
  on a Cortex-M4.
question: Contrast the memory hierarchy layout requirements for the LSTM's hidden
  state versus the model's weight matrices.
details:
  realistic_solution: LSTM weights are read-only and persist across inferences, so
    they belong in non-volatile Flash memory. The hidden state dynamically updates
    every sequence step, requiring high-speed read/write access, mandating placement
    in volatile SRAM. Thus, max hidden size is bounded by SRAM, while layer count
    is bounded by Flash.
  common_mistake: Attempting to store the mutable hidden state in Flash memory, which
    is too slow to update and suffers from write endurance degradation.
  napkin_math: Weights (Flash, ~1MB) vs State (SRAM, ~128KB).
