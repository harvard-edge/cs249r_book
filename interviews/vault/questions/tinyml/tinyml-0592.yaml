title: The Ghost in the Microcontroller
scenario: 'You are leading the ML systems for an automotive safety feature. A small radar-based object detection model is running on a microcontroller to meet a strict 5ms inference budget. A junior engineer successfully quantized the FP32 model to full INT8, and it passed all regression tests with the existing validation dataset. The model is now in field trials and is exhibiting a critical, intermittent failure: it fails to detect large, stationary metal objects at very close range, causing the system to disengage.'
question: What causes the intermittent close-range radar detection failure in the INT8 automotive model?
details:
  realistic_solution: 'The core issue is a quantization-data mismatch. The full INT8 model is failing due to activation overflow. The original calibration dataset used to determine the INT8 scaling factors did not contain examples of high-intensity radar returns from large, close, reflective surfaces. When the real-world sensor data hits these specific layers, the floating-point activations exceed the calibrated range, get clipped to the INT8 max value, and cause a catastrophic loss of information for that feature map.'
  common_mistake: |
    **The Pitfall:** Blaming the model architecture or hardware instead of the quantization calibration dataset.
    **The Rationale:** Engineers often miss that post-training quantization scales are derived directly from the distribution of the calibration dataset, which might lack extreme outlier values (like close-range radar returns).
    **The Consequence:** High-intensity activations overflow the calibrated INT8 range, clamping at 127, destroying the feature signal, and causing intermittent catastrophic field failures.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Inference budget: 5ms.
       - Calibration dataset max activation value: 50 units.
       - INT8 max value: 127.
    2. **Calculations:**
       - INT8 Scale factor: 50 / 127 ≈ 0.394 units per step.
       - Real-world close-range truck radar return amplitude: 200 units.
       - Unclamped quantized value: 200 / 0.394 = 508.
       - Actual INT8 value: min(508, 127) = 127.
       - Signal loss: (508 - 127) / 508 ≈ 75%.
    3. **Conclusion & Interpretation:**
       - **Result: Activation Overflow.** The signal is aggressively clamped, losing 75% of its magnitude information. The fix requires outlier-aware calibration datasets that include these close-range returns.
