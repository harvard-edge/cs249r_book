title: The Ghost in the Microcontroller
scenario: 'You are leading the ML systems for an automotive safety feature. A small radar-based object
  detection model is running on a Cortex-M4 microcontroller to meet a strict 5ms inference budget. A junior
  engineer successfully quantized the FP32 model to full INT8, and it passed all regression tests with
  the existing validation dataset. The model is now in field trials and is exhibiting a critical, intermittent
  failure: it fails to detect large, stationary metal objects (like a truck tailgate) at very close range,
  causing the system to disengage.'
details:
  realistic_solution: The core issue is a quantization-data mismatch. The full INT8 model is failing due
    to activation overflow. The original calibration dataset used to determine the INT8 scaling factors
    did not contain examples of high-intensity radar returns from large, close, reflective surfaces. When
    the real-world sensor data hits these specific layers, the floating-point activations exceed the calibrated
    range, get clipped to the INT8 max value (e.g., 127), and cause a catastrophic loss of information
    for that feature map, leading to a failed detection.
  common_mistake: Focusing only on the model architecture or suggesting retraining from scratch. Many
    engineers miss that post-training quantization is critically dependent on the calibration dataset's
    representativeness. They might also incorrectly attribute the INT8 failure to hardware limits or suggest
    a more powerful MCU, which isn't an option in a cost-sensitive automotive context.
  napkin_math: '1M MACs=2M-Ops. M4@336MFLOPS: 6ms, tight for 5ms→use M7. INT8 calibration max=50 units,
    scale=50/127=0.394/step. Close-range truck: amplitude 200→200/0.394=508→clamped to 127. Signal loss:
    75%. Fix: per-channel quantization + outlier-aware calibration including close-range returns in calibration
    set.'
