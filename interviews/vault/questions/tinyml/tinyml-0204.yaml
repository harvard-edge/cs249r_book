title: The Solar-Powered Sensor's Inference Budget
scenario: You're building a weather monitoring station using a TinyML device. It's powered by a solar panel that provides an average of 5mW of power over a 24-hour cycle. The device consumes 40mW when running a 250ms inference, and 10µW in sleep mode.
question: To remain power-neutral, what is the maximum number of inferences the station can perform per hour?
details:
  realistic_solution: First, calculate the total energy harvested in one hour. Then, calculate the baseline energy consumed by sleeping for that entire hour. The difference is the energy budget available for running inferences. Finally, divide this budget by the energy cost of a single inference to find the total number of inferences possible.
  common_mistake: |
    **The Pitfall:** Dividing total harvested energy directly by inference energy.
    **The Rationale:** Engineers ignore the baseline energy cost of keeping the device in sleep mode for the entire hour.
    **The Consequence:** Overestimating the allowable inference rate by failing to account for the constant, albeit tiny, parasitic drain of the sleep state.
  napkin_math: |
    1. **Assumptions & Constraints:** 5mW solar panel average over 24h. 40mW for 250ms inference. 10µW baseline sleep power.
    2. **Calculations:** Energy harvested per hour = 5mW * 3600s = 18 J. Baseline sleep energy per hour = 10µW * 3600s = 0.036 J. Available inference budget = 18 - 0.036 = 17.964 J. Energy per inference = 40mW * 0.25s = 0.01 J. Max inferences/hour = 17.964 / 0.01 = 1796.4.
    3. **Conclusion & Interpretation:** **1,796 inferences per hour** (Energy-Bound Power Budget).
  options:
  - 450 inferences per hour
  - 1,796 inferences per hour
  - 1,800 inferences per hour
  - 18,000 inferences per hour
  correct_index: 1
