title: Analyzing Preemption and Real-Time Misses on STM32F4
scenario: You are deploying an INT8 vibration analysis model on an ARM Cortex-M4 (STM32F4) operating at
  168 MHz, featuring 256 KB SRAM, 1 MB flash, and no FPU. The system must process sensor data within a
  strict 16ms real-time budget. The model requires 1.5 million MAC operations and leverages CMSIS-NN SIMD
  instructions (2x INT8 MACs/cycle). In isolation, profiling shows the model takes 12ms to execute. However,
  when a high-priority sensor interrupt taking 5ms fires during the processing window, the system misses
  the 16ms deadline and drops frames. Analyze why the theoretical execution time differs from the observed
  12ms, and explain the timeline of the deadline miss.
question: "How would you analyze why the theoretical execution time differs from the observed 12ms, and explain the timeline of the deadline miss?"
details:
  realistic_solution: The candidate should recognize that theoretical MAC capacity is a lower bound. Real
    execution is bound by memory bandwidth (fetching weights from flash and activations from SRAM) and
    software overhead, leading to the 12ms empirical WCET. Preemption by the 5ms interrupt pauses the
    model execution, pushing the total CPU time required in that window to 17ms, which exceeds the 16ms
    budget.
  common_mistake: Candidates often calculate only the theoretical compute time based on MACs and assume
    the system has plenty of headroom for the interrupt, ignoring memory access overhead from SRAM/flash
    and pipeline stalls.
  napkin_math: 'Theoretical compute time = 1,500,000 MACs / 2 MACs per cycle = 750,000 cycles. At 168
    MHz: 750,000 cycles / 168,000,000 Hz = 4.46 ms. Actual measured time = 12 ms (approx 2.7x overhead
    due to memory fetches and CMSIS-NN scheduling). Total execution time with interrupt = 12 ms (model
    WCET) + 5 ms (interrupt) = 17 ms. 17 ms > 16 ms budget, causing the deadline miss.'
