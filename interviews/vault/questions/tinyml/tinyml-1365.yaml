title: Extreme Quantization for TinyML Transformer on Cortex-M7/Ethos-U55
scenario: You are tasked with deploying an anomaly detection transformer on a Cortex-M7 microcontroller paired with an Ethos-U55 NPU. The system has only 512 KB of SRAM. The target model in FP32 requires 10MB of memory and executes at 500ms inference time.
question: How would you approach quantizing this model to sub-4-bit precision to fit within the 512KB SRAM limit and meet a 10ms inference latency requirement?
details:
  realistic_solution: Utilize Quantization-Aware Training (QAT) to reach sub-4-bit weights, combining this with unstructured pruning and custom NPU kernels to compensate for accuracy degradation.
  common_mistake: |
    **The Pitfall:** Blindly applying post-training quantization (PTQ) without considering sub-4-bit precision challenges.
    **The Rationale:** Candidates assume standard 8-bit or 4-bit quantization will suffice, ignoring the math that shows a 20x compression ratio is needed.
    **The Consequence:** The model will fail to fit in memory, suffer catastrophic accuracy drops, or run at unsupportable inference speeds on the Ethos-U55.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cortex-M7/Ethos-U55 SRAM: 512 KB.
       - FP32 Transformer Memory: 10 MB.
    2. **Calculations:**
       - Target Size: < 500 KB.
       - Compression Ratio required: 10 MB / 0.5 MB = 20x.
       - INT8 (1 byte/param): 4x (2.5 MB) -> Insufficient.
       - INT4 (0.5 byte/param): 8x (1.25 MB) -> Insufficient.
       - INT2 (0.25 byte/param): 16x (0.625 MB) -> Close, needs pruning.
    3. **Conclusion & Interpretation:**
       **Result: 20x compression required.** The transformer is massively **Memory-Footprint-Bound**, mandating sub-4-bit QAT or binary weight networks.
