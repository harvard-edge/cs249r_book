title: Task-Based FRAM Checkpointing
scenario: Specifying behavior for an energy-harvesting smart switch that uses an intermittent
  computing paradigm.
question: Specify a task-based checkpointing rule that writes registers to FRAM before
  the final fully-connected layer, including the boundary condition (what state must
  be preserved) and the recovery procedure on brownout.
details:
  realistic_solution: Wrap the fully connected layer computation in an atomic task
    block. At the boundary, the runtime dumps the CPU registers and the pointer to
    the activation map into non-volatile FRAM. If a brownout occurs mid-matrix multiply,
    the system boots, reads the FRAM boundary state, and restarts the task cleanly
    from the exact layer input.
  common_mistake: Allowing the system to overwrite the input activation tensor during
    computation, destroying the checkpoint state needed to restart the layer.
  napkin_math: 100uJ harvest - 20uJ checkpoint = 80uJ compute
