title: Task-Based FRAM Checkpointing
scenario: Specifying behavior for an energy-harvesting smart switch that uses an intermittent computing paradigm.
question: Specify a task-based checkpointing rule that writes registers to FRAM before the final fully-connected layer, including the boundary condition and the recovery procedure on brownout.
details:
  realistic_solution: Wrap the fully connected layer computation in an atomic task block. At the boundary, the runtime dumps the CPU registers and the pointer to the activation map into non-volatile FRAM. If a brownout occurs mid-matrix multiply, the system boots, reads the FRAM boundary state, and restarts the task cleanly from the exact layer input.
  common_mistake: |
    **The Pitfall:** Overwriting the input activation tensor in-place during computation.
    **The Rationale:** In-place operations are standard for saving SRAM on constrained devices.
    **The Consequence:** If a brownout occurs mid-computation, the original input state is lost, preventing the task from restarting cleanly and corrupting the forward pass.
  napkin_math: |
    *   **Energy Harvested:** 100 µJ available per active burst.
    *   **Checkpoint Cost:** 20 µJ to write state to FRAM.
    *   **Compute Budget:** 100 µJ - 20 µJ = **80 µJ remaining** for layer computation.
