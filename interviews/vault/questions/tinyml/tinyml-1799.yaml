title: 8-bit Unsigned Affine Quantization
scenario: A 32-bit floating point model is deployed to a Cortex-M4. Post-training
  integer quantization utilizes affine transformations with scale factors and zero
  points.
question: Describe the mathematical transformation used to map a floating-point activation
  range [min, max] into an 8-bit unsigned integer range [0, 255].
details:
  realistic_solution: The transformation requires finding a scale factor (S) and a
    zero point (Z). The scale factor represents the step size between quantized values,
    calculated as S = (max - min) / 255. The zero point ensures that the real value
    0.0 maps exactly to an integer, calculated as Z = round(-min / S). The mapping
    formula to convert a real floating-point value (r) to its quantized integer equivalent
    (q) is q = round(r / S) + Z.
  common_mistake: Forgetting to add the zero point, which shifts the integer representation
    so that asymmetrical floating-point bounds map correctly without losing the exact
    representation of zero.
  napkin_math: 'If min=-1.0, max=1.0: S = 2.0 / 255 = 0.00784. Z = round(1.0 / 0.00784)
    = 128. r=0.0 -> q=128.'
