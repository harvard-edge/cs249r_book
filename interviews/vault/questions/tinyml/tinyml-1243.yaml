title: Graceful Degradation for Anomaly Detection on nRF5340
scenario: We are deploying an industrial vibration monitoring sensor on a Nordic nRF5340 (128 MHz app core, 64 MHz net core, 256 KB SRAM, 1 MB flash). The device normally runs a high-fidelity 1D-CNN anomaly model and streams detailed spectrograms over BLE 5.3 (drawing ~5mA active). When the battery drops below 10% or the BLE environment becomes severely congested, we need a fail-operational degradation ladder to guarantee critical fault detection is not lost.
question: How would you design this fallback architecture and concretely size the memory and compute allocations?
details:
  realistic_solution: 'A robust degradation ladder shifts from streaming raw data to local edge alerting. State 1 (Normal): Runs the primary 1D-CNN on the 128 MHz app core and uses the 64 MHz net core for BLE 5.3 streaming. State 2 (Degraded QoS): Suspends BLE streaming entirely, powers down the net core to shed the ~5mA active load, and unloads the primary model. It then loads a highly compressed 15 KB Random Forest model from the 1 MB flash to run sparse, low-duty-cycle inference on the app core, logging only catastrophic faults to flash memory for later retrieval.'
  common_mistake: |
    **The Pitfall:** Offloading inference to the cloud as a fallback.
    **The Rationale:** Candidates assume cloud fallback is universally applicable, ignoring that network congestion or low battery precludes reliable BLE transmission.
    **The Consequence:** Breaking the fail-operational requirement when the network is unavailable or battery is critical.
  napkin_math: |
    - **Total SRAM**: 256 KB.
    - **Normal Overhead**: BLE stack + RTOS (64 KB) + Ring buffer (16 KB) = 80 KB.
    - **Remaining Normal SRAM**: 176 KB (Primary CNN takes 140 KB, fitting within budget).
    - **Degraded Overhead**: Shedding BLE frees 64 KB, dropping current below 2mA.
    - **Fallback Model**: Random Forest uses **15 KB SRAM**, seamlessly fitting the remaining budget.
