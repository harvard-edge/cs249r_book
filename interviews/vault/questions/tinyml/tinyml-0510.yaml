title: The Silent Saturation (tinyml-0510)
scenario: You are a TinyML engineer working on a keyword spotting device using a Cortex-M4 with 256KB of SRAM. Your CNN model achieves 96% accuracy in FP32 simulation. To meet the memory constraints, you apply post-training static quantization to convert the model to INT8. The model now fits on the device, but its accuracy plummets to less than 20% (near-random guessing). You have already verified that the model's weights were quantized correctly.
question: What most likely causes the catastrophic INT8 accuracy drop when weights are known to be quantized correctly?
details:
  realistic_solution: The most likely cause is activation saturation due to an unrepresentative calibration dataset. Post-training static quantization uses a small set of data to determine the dynamic range (min/max values) of each layer's activations. If the real-world audio contains sounds that are louder or have a different frequency profile than the calibration set, the activation values in an intermediate layer (e.g., after a ReLU) can exceed the range observed during calibration. These values are then 'clipped' or 'saturated' to the INT8 min/max value (-128 or 127), destroying the information in that layer and causing a catastrophic failure downstream. The fix is to provide a calibration dataset that is truly representative of the inputs the device will see in production.
  common_mistake: |
    **The Pitfall:** Blaming the hardware or software toolchain for accuracy drops.
    **The Rationale:** Engineers forget that PTQ calibrations act on activations, not just weights. Unrepresentative data clips out-of-distribution real-world inputs.
    **The Consequence:** Near-random inference accuracy in production despite perfect simulator results.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Clean calibration range: [-4, 4].
       - Noisy input spike: +8.0.
    2. **Calculations:**
       - Scale: 8 / 255 = 0.0313/step.
       - Quantized noisy input: 8.0 / 0.0313 = 255 (clips to 127).
       - Dequantized value: 127 * 0.0313 = 3.98.
    3. **Conclusion & Interpretation:**
       - **Result: 50% signal value lost.** Saturation destroys the input signal; recalibration with noisy [-8, 8] data is required.
  options:
  - A bug in the quantization toolchain is incorrectly converting floating-point weights to integers.
  - The INT8 model requires a slightly larger tensor arena, causing a stack overflow that corrupts model execution.
  - The calibration dataset was not representative, causing real-world activation values to saturate the INT8 range.
  - The model's architecture has too many layers, leading to cumulative quantization errors that degrade performance.
  correct_index: 2
