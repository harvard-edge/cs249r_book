title: Secure TinyML Anomaly Detection on ESP32-S3 Against Adversarial Attacks
scenario: Imagine you are designing a critical TinyML application for anomaly detection on an ESP32-S3 microcontroller. This device is deployed in a remote industrial setting where physical access is difficult but not impossible. The ESP32-S3 features a 240 MHz dual-core processor, 512 KB of SRAM, and 8 MB of PSRAM. The anomaly detection model, a small neural network, runs locally on the device.
question: How should an ESP32-S3 anomaly detector defend against model tampering, side-channel leakage, and poisoned OTA model updates?
details:
  realistic_solution: 'A realistic solution would involve a multi-layered approach tailored to the ESP32-S3''s capabilities: 1. Secure Boot & Firmware Updates: Implement secure boot with cryptographic verification (e.g., using RSA or ECC) for all firmware and model OTA updates, leveraging the ESP32''s hardware trust features to prevent model tampering. 2. Efficient Adversarial Training: Train the anomaly detection model with carefully chosen adversarial examples, optimized for the ESP32-S3''s constrained resources, using lightweight techniques. 3. Runtime Integrity Checks: Implement periodic, lightweight integrity checks for critical model parameters stored in PSRAM to detect potential runtime corruption. 4. Side-Channel Resistance: Design the inference code to minimize data-dependent operations and memory access patterns that could leak sensitive information, aiming for constant-time operations where feasible for critical sections. 5. Environmental Monitoring: Integrate sensor data redundancy and cross-validation to detect anomalous input patterns that might indicate data poisoning attempts or adversarial inputs.'
  common_mistake: |
    **The Pitfall:** Ignoring the strict resource limits of the ESP32-S3 when designing defenses.
    **The Rationale:** Candidates propose cloud-scale security measures without verifying SRAM availability.
    **The Consequence:** The defense mechanisms exceed the 512 KB SRAM budget, rendering the system un-deployable.
  napkin_math: |
    * Base SRAM budget: 512 KB.
    * Add Bootloader footprint: 64 KB.
    * Add Integrity checks logic: 50 KB.
    * Remaining SRAM: 512 - 64 - 50 = 398 KB.
    * **Result: The system can accommodate defenses, leaving 398 KB for model inference and RTOS.**
