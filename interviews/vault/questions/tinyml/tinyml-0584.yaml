title: Cortex-M55 + Ethos-U55 + Cortex-A32 — Which Core Runs What?
scenario: 'The Alif Ensemble E7 has three compute elements on one die: a Cortex-A32 (Linux-capable, 400
  MHz, with MMU and L1/L2 caches), a Cortex-M55 (with Helium, 160 MHz), and an Ethos-U55 (128 MACs/cycle
  microNPU). You''re building a smart security camera that must run person detection (MobileNetV2-SSD,
  300×300 input), track detected persons across frames, and stream H.264 video over Wi-Fi. Assign each
  task to the right core and explain why.'
question: "Which Alif Ensemble E7 compute element should run detection, tracking, and H.264 streaming, and why?"
details:
  realistic_solution: Heterogeneous computing means matching each task to the core whose architecture
    best fits the workload's characteristics.
  common_mistake: '"Run everything on the Cortex-A32 since it''s the most powerful core — it has Linux,
    caches, and the highest clock speed." The A32 is the most flexible but not the most efficient for
    any single task. Running ML inference on the A32 wastes 10–50× more energy than the Ethos-U55, and
    the A32 can''t sustain real-time inference + video encoding + network stack simultaneously at 400
    MHz.'
  napkin_math: 'Ethos-U55 for detection: 20.9ms, 20 mW. A32 for detection (hypothetical): 375ms, 400 mW.
    Energy: NPU = 0.42 mJ vs A32 = 150 mJ. NPU is **357× more energy-efficient** for this task. But A32
    for H.264: 30ms, 200 mW = 6 mJ — no other core can do this. M55 for tracking: 1ms, 15 mW = 15 µJ —
    trivial. The heterogeneous split saves 150 mJ - 0.42 mJ = 149.6 mJ per frame on detection alone. At
    15 fps: 2.24 W saved. This is the difference between a battery-powered camera (52 hours) and one that
    needs a wall plug.'
  options:
  - Run all three tasks on the Cortex-A32 since it has the highest clock speed, Linux support, and can
    multitask with threads. The NPU and M55 add unnecessary complexity.
  - Assign person detection to Ethos-U55 (128 MACs/cycle, 20.9ms, 20 mW — 357x more energy-efficient than
    A32 for this workload). Assign H.264 encoding to Cortex-A32 (needs MMU + caches for codec complexity,
    30ms at 200 mW). Assign object tracking to Cortex-M55 (lightweight Kalman filter, 1ms at 15 mW). This
    heterogeneous split saves ~2.24W vs running everything on A32.
  - Assign all ML tasks (detection + tracking) to the Ethos-U55 NPU and use the A32 only for H.264 encoding.
    The M55 should remain idle to save power.
  - Assign person detection to Cortex-M55 with Helium (it has SIMD for CNNs), H.264 to Cortex-A32, and
    use the Ethos-U55 NPU for tracking since it can maintain state across frames.
  correct_index: 1
