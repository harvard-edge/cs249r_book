title: Cortex-M55 + Ethos-U55 + Cortex-A32 — Which Core Runs What?
scenario: The Alif Ensemble E7 has three compute elements on one die: a Cortex-A32 (Linux-capable, 400 MHz, with MMU and L1/L2 caches), a Cortex-M55 (with Helium, 160 MHz), and an Ethos-U55 (128 MACs/cycle microNPU). You're building a smart security camera that must run person detection (MobileNetV2-SSD, 300x300 input), track detected persons across frames, and stream H.264 video over Wi-Fi.
question: Which Alif Ensemble E7 compute element should run detection, tracking, and H.264 streaming, and why?
details:
  realistic_solution: Heterogeneous computing means matching each task to the core whose architecture best fits the workload's characteristics. Assign person detection to the Ethos-U55, tracking to the Cortex-M55, and H.264 encoding to the Cortex-A32.
  common_mistake: |
    **The Pitfall:** Assigning everything to the Cortex-A32 because it's the most "powerful" core.
    **The Rationale:** Candidates from traditional software backgrounds view the highest clock speed and Linux support as the universal solution, ignoring the massive efficiency differences of heterogeneous compute elements.
    **The Consequence:** Creating a system that draws watts instead of milliwatts, making it impossible to battery-power the camera.
  napkin_math: |
    - NPU detection: 20.9ms, 20 mW -> 0.42 mJ.
    - A32 detection (hypothetical): 375ms, 400 mW -> 150 mJ.
    - NPU is **357x more energy-efficient** for detection.
    - A32 H.264: 30ms, 200 mW -> 6 mJ.
    - M55 tracking: 1ms, 15 mW -> 15 µJ.
    - Energy saved per frame vs A32-only: 150 mJ - 0.42 mJ = 149.6 mJ.
    - At 15 fps: 149.6 mJ * 15 = **2.24 W saved**.
  options:
  - Run all three tasks on the Cortex-A32 since it has the highest clock speed, Linux support, and can multitask with threads. The NPU and M55 add unnecessary complexity.
  - Assign person detection to Ethos-U55 (128 MACs/cycle, 20.9ms, 20 mW — 357x more energy-efficient than A32 for this workload). Assign H.264 encoding to Cortex-A32 (needs MMU + caches for codec complexity, 30ms at 200 mW). Assign object tracking to Cortex-M55 (lightweight Kalman filter, 1ms at 15 mW). This heterogeneous split saves ~2.24W vs running everything on A32.
  - Assign all ML tasks (detection + tracking) to the Ethos-U55 NPU and use the A32 only for H.264 encoding. The M55 should remain idle to save power.
  - Assign person detection to Cortex-M55 with Helium (it has SIMD for CNNs), H.264 to Cortex-A32, and use the Ethos-U55 NPU for tracking since it can maintain state across frames.
  correct_index: 1
