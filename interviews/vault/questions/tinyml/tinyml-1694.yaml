title: Calibration Bias in PTQ
scenario: A Wake Word detection model runs on a Cortex-M4. The FP32 model works perfectly,
  but the INT8 Post-Training Quantization causes a massive accuracy drop for a specific
  user demographic.
question: Evaluate the potential causes of this accuracy drop and identify which quantization
  step likely introduced the bias.
details:
  realistic_solution: The calibration dataset used to determine the min/max activation
    ranges for PTQ likely lacked diverse voice samples. Consequently, the quantization
    scale factors clipped the outlier activations generated by the underrepresented
    demographic, destroying the signal.
  common_mistake: Blaming the limited precision of the Cortex-M4 rather than the skewed
    distribution of the calibration dataset.
  napkin_math: Scale = (Max_calib - Min_calib) / 255
