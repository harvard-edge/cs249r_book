title: 'Dataset Curation: Mastery — End-to-End Data Strategy for TinyML Anomaly Detection'
scenario: You are deploying a vibration-based machine anomaly detection model on ESP32-S3. The model must detect bearing failures from 3-axis accelerometer data. You have only 200 labeled anomaly examples (rare events) and 10,000 normal examples.
question: How would you design the complete data strategy for an anomaly detection model that achieves < 5% false alarm rate and > 90% anomaly detection rate?
details:
  realistic_solution: Utilize an unsupervised or semi-supervised autoencoder strategy, training strictly on the augmented 10,000 'normal' telemetry sequences. At inference time, classify anomalies via reconstruction loss thresholds. Dedicate the 200 rare anomaly labels solely to the validation/test splits to rigorously dial in the 95th percentile reconstruction threshold guaranteeing the <5% false positive mandate.
  common_mistake: |
    **The Pitfall:** Framing extreme-imbalance predictive maintenance as a standard supervised binary classification task.
    **The Rationale:** Candidates mechanically default to standard supervised learning paradigms without addressing the physical scarcity of failure data.
    **The Consequence:** The model overfits, achieving dismal recall on rare anomalies while triggering constant false alarms in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Input Data: 10k normal * 1-sec * 100Hz * 3-axis * 1 byte (int8) = 3 MB (Fits PSRAM).
       - Autoencoder Architecture: 300->64->16->64->300 = 40,448 parameters.
       - Hardware limits: 512 KB SRAM.
    2. **Calculations:**
       - Weights footprint = 40,448 bytes (~40 KB).
       - Activations ~3 KB.
       - Total memory = < 50 KB.
    3. **Conclusion & Interpretation:**
       - **Result: SRAM Execution Verified**. The lightweight 40KB autoencoder easily fits in SRAM, avoiding PSRAM bottlenecks and perfectly supporting threshold-based inference.
