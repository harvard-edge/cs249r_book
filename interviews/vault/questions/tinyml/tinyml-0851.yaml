title: 'Dataset Curation: Mastery — End-to-End Data Strategy for TinyML Anomaly Detection'
scenario: >
  You are deploying a vibration-based machine anomaly detection model on ESP32-S3 (240MHz, 512KB SRAM, 8MB PSRAM). The model must detect bearing failures from 3-axis accelerometer data. You have only 200 labeled anomaly examples (rare events) and 10,000 normal examples.
question: >
  How would you design the complete data strategy for an anomaly detection model that achieves < 5% false alarm rate and > 90% anomaly detection rate?
details:
  realistic_solution: >
    Use autoencoder anomaly detection: train only on 10,000 normal samples. Threshold reconstruction error at test time. Augment normal data: random noise, phase shifts. Validate on 200 anomaly samples (hold out 40 for final test). Threshold tuning on validation set.
  common_mistake: |
    **The Pitfall:** Framing the problem as a binary classification task.
    **The Rationale:** Candidates default to supervised learning with heavily imbalanced data.
    **The Consequence:** The model achieves poor recall on the rare anomaly class and high false positive rates in production.
  napkin_math: |
    - **Data Size:** 10K normal × 1-sec × 100Hz × 3-axis × int8 = 3MB (fits in PSRAM).
    - **Autoencoder Params:** 300->64->16->64->300 = 40,448 parameters × 1 byte = 40 KB.
    - **SRAM Budget:** Model 40 KB + Activations ~3 KB + Misc = < 50 KB (easily fits 512 KB SRAM).
    - **Thresholding:** Set reconstruction error threshold at the 95th percentile of normal validation data to guarantee a < 5% false positive rate.
