title: nRF5340 Roofline Memory Hierarchy Tradeoffs
scenario: 'You are designing an always-on audio classifier on a Nordic nRF5340. The 256 KB SRAM is heavily
  utilized by the BLE 5.3 stack and audio buffers, leaving only 64 KB for your model. Any weights exceeding
  this must be read directly from the 1 MB flash via XIP at a bandwidth of roughly 32 MB/s. You must choose
  between two models: Model A is a standard CNN requiring 200K MACs and 50 KB of weights. Model B is a
  Depthwise Separable CNN requiring 40K MACs but 150 KB of weights. Evaluate both models using a roofline
  analysis to determine which is better for minimizing active time and maintaining the ~5mA active power
  constraint.'
details:
  realistic_solution: The candidate should calculate the arithmetic intensity of both models and compare
    them against the machine balance of the nRF5340's SRAM and Flash interfaces. Because Model A fits
    entirely in the remaining 64 KB of SRAM, it operates in the fast compute-bound region. Model B exceeds
    SRAM, forcing flash reads, making it memory-bound and slower despite fewer operations. Model A is
    the correct design choice to minimize active time.
  common_mistake: Candidates often look only at the total MACs (40K vs 200K) and immediately assume Model
    B is faster and more energy-efficient. They fail to construct the roofline model for the platform's
    memory hierarchy, missing that Model B's weights exceed available SRAM and force slow flash reads,
    shifting the workload into a severe memory-bound region.
  napkin_math: '1. Peak Compute: 128 MHz app core = 128 MMAC/s.

    2. SRAM Bandwidth (Model A): ~512 MB/s. SRAM Ridge Point = 128 / 512 = 0.25 MACs/byte.

    3. Flash Bandwidth (Model B): ~32 MB/s. Flash Ridge Point = 128 / 32 = 4.0 MACs/byte.

    4. Model A (in SRAM): 200K MACs / 50 KB = 4.0 MACs/byte. (4.0 > 0.25 -> Compute-bound). Max Throughput
    = 128 MMAC/s. Time = 200K / 128M = 1.56 ms.

    5. Model B (in Flash): 40K MACs / 150 KB = ~0.27 MACs/byte. (0.27 < 4.0 -> Memory-bound). Max Throughput
    = 0.27 * 32 MB/s = 8.6 MMAC/s. Time = 40K / 8.6M = 4.65 ms.

    6. Result: Model A executes ~3x faster despite having 5x more MACs, allowing the device to return
    to sleep quicker.'
