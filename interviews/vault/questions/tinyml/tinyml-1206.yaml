title: Real-Time Vibration Ingestion on Corstone-300
scenario: You are designing a continuous anomaly detection pipeline for an industrial
  motor using an ARM Cortex-M7 + Ethos-U55 (Corstone-300) system. A vibration sensor
  streams 16-bit data at 16 kHz over I2S, which must be converted into Mel-spectrograms
  for a CNN running on the NPU. Given the 480 MHz M7 core and the strict 512 KB of
  shared SRAM between the M7 and Ethos-U55, design the real-time data ingestion architecture,
  the DMA buffering strategy, and the feature computation schedule to guarantee zero
  dropped frames.
question: How should Corstone-300 use DMA and zero-copy feature computation to avoid
  dropped 16 kHz vibration frames?
details:
  realistic_solution: Use a DMA controller configured with ping-pong (double) buffering
    to handle I2S ingestion asynchronously. While the DMA fills one buffer, the Cortex-M7
    uses CMSIS-DSP to compute the spectrogram on the other buffer, writing the output
    directly into the Ethos-U55's input tensor arena to avoid a memory copy. This
    zero-copy architecture allows I/O, M7 preprocessing, and NPU inference to overlap
    perfectly within the shared SRAM constraint.
  common_mistake: Candidates often propose a naive synchronous loop where the CPU
    blocks on I2S reads, causing sample drops during the M7's feature extraction or
    the NPU's inference. They also frequently fail to account for the shared SRAM
    architecture, duplicating memory for the DSP output and the NPU input tensor,
    which easily exhausts the 512 KB limit.
  napkin_math: 'Ingestion rate is 16 kHz * 2 bytes = 32 KB/s. A 500 ms ping-pong buffer
    needs 2 * 16 KB = 32 KB SRAM. Computing a 1024-point FFT via CMSIS-DSP on the
    M7 takes ~20k cycles; doing 16 frames per 500ms window requires 320k cycles. At
    480 MHz, the M7 completes this in ~0.67 ms. If the NPU model needs 10 M-MACs,
    an Ethos-U55 configured for 256 MAC/cycle at 480 MHz finishes in ~0.1 ms. Memory
    budget: 32 KB (buffers) + 200 KB (model weights) + 200 KB (NPU arena/spectrogram)
    + 80 KB (RTOS) = 512 KB. The system comfortably meets the 500 ms real-time deadline
    while respecting the strict 512 KB shared SRAM limit.'
