title: Real-Time Vibration Ingestion on Corstone-300
scenario: You are designing a continuous anomaly detection pipeline for an industrial motor using a Cortex-M7 + Ethos-U55 system. A vibration sensor streams 16-bit data at 16 kHz over I2S, which must be converted into Mel-spectrograms for a CNN running on the NPU. The system has a strict 512 KB of shared SRAM.
question: How should the system use DMA and zero-copy feature computation to avoid dropped 16 kHz vibration frames?
details:
  realistic_solution: Use a DMA controller configured with ping-pong (double) buffering to handle I2S ingestion asynchronously. While the DMA fills one buffer, the Cortex-M7 uses CMSIS-DSP to compute the spectrogram on the other buffer, writing the output directly into the Ethos-U55's input tensor arena to avoid a memory copy. This zero-copy architecture allows I/O, M7 preprocessing, and NPU inference to overlap perfectly within the shared SRAM constraint.
  common_mistake: |
    **The Pitfall:** Proposing a naive synchronous loop where the CPU blocks on I2S reads.
    **The Rationale:** Candidates fail to leverage DMA for asynchronous I/O and duplicate memory buffers, exhausting the SRAM limit.
    **The Consequence:** Sample drops occur during feature extraction, and the system crashes from Out-Of-Memory errors.
  napkin_math: |
    **Assumptions & Constraints:**
    - Ingestion rate: 16 kHz * 2 bytes = 32 KB/s.
    - SRAM limit: 512 KB.

    **Calculations:**
    - Buffer size: 500 ms ping-pong buffer needs 2 * 16 KB = 32 KB SRAM.
    - M7 FFT compute: 320k cycles for 16 frames. At 480 MHz, completes in ~0.67 ms.
    - NPU compute: 10 M-MACs at 256 MAC/cycle at 480 MHz completes in ~0.1 ms.
    - Memory budget: 32 KB (buffers) + 200 KB (weights) + 200 KB (arena) + 80 KB (RTOS) = 512 KB.

    **Conclusion & Interpretation:**
    - **Result: 512 KB (Memory-Bound)**. Meets 500 ms real-time deadline within the strict 512 KB limit using Ping-Pong DMA.
