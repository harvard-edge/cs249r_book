title: Extreme Quantization for Keyword Spotting
scenario: You are tasked with deploying a keyword spotting model. The current FP32 baseline has 1,000,000 weights occupying 4.5 MB of flash (including 500 KB of code/params). Inference requires 100 KB of SRAM for FP32 activations. You quantize weights to 2-bit using AWQ and activations to 8-bit.
question: What is the total flash memory footprint of the quantized model, and assuming linear scaling, what is the new SRAM requirement for activations?
details:
  realistic_solution: 'Apply advanced Post-Training Quantization (PTQ) techniques like AWQ for sub-4-bit weights. The flash footprint reduces heavily due to 2-bit packing. Deploy highly optimized inference kernels to efficiently unpack 2-bit weights and process 8-bit activations without CPU bottlenecks.'
  common_mistake: |
    **The Pitfall:** Aggressively quantizing to sub-4-bit without specialized optimization techniques.
    **The Rationale:** Candidates overlook the severe accuracy degradation and hardware unpacking overheads of custom sub-byte formats.
    **The Consequence:** The model fits in memory but produces random predictions, while bit-unpacking logic crushes the CPU real-time latency budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Original weights: 1,000,000 (FP32).
       - Weight quantization: 2-bit.
       - Activation quantization: 8-bit.
       - Original activation SRAM: 100 KB.
       - Code/non-weight params: 500 KB.
    2. **Calculations:**
       - 2-bit weights footprint = 1,000,000 weights * (2 bits / 8 bits/byte) = 250,000 bytes = 250 KB.
       - Total flash = 500 KB (code) + 250 KB (weights) = 750 KB.
       - 8-bit SRAM = 100 KB * (8 bits / 32 bits) = 25 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Optimization.** The quantized model achieves a 750 KB flash footprint and 25 KB SRAM footprint, making it highly viable for MCU deployment.
