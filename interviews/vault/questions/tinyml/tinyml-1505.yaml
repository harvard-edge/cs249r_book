title: Inference Latency Bound Analysis for Time-Critical Control on Cortex-M4
scenario: A motor control system uses Cortex-M4 (168MHz) for anomaly detection. The
  control loop runs at 10kHz (100μs period). Each inference must complete within 80μs
  (20μs overhead reserved). The model has 50K multiply-accumulate operations (MACs)
  in INT8. Determine if the model fits the timing constraint.
question: Can a 50K-MAC INT8 anomaly model fit an 80 us deadline on a 168 MHz Cortex-M4
  control loop?
details:
  realistic_solution: 'Cortex-M4 with DSP SIMD: 4 INT8 MACs per cycle (using SMLAD/SMLABT
    instructions for packed 8-bit). At 168MHz: 168M × 4 = 672M INT8 MACs/sec. 50K
    MACs / 672M = 74μs theoretical. But: pipeline stalls, cache misses, branch overhead
    add ~20-30% overhead. Realistic: 74μs × 1.25 = 92.5μs. Exceeds 80μs budget! Fix
    options: (1) Reduce model to 42K MACs: 42K/672M × 1.25 = 78μs — fits. (2) Use
    M-profile Vector Extension (MVE) instructions if available (Cortex-M55) — 2× throughput.
    (3) Use TFLite Micro with CMSIS-NN which hand-tunes MAC throughput: may achieve
    4-5 MACs/cycle → 50K/670M = 74.6μs × 1.1 = 82μs — still tight. (4) Optimize data
    layout for contiguous memory access to reduce cache misses.'
  common_mistake: Using peak theoretical throughput for the timing estimate; real
    Cortex-M4 SIMD achieves 2-4 MACs/cycle for packed INT8, not the theoretical maximum.
  napkin_math: 'Cortex-M4 DSP: 4 MACs/cycle × 168MHz = 672 MMACS. 50K MACs / 672M
    = 74.4μs ideal. With 25% overhead: 93μs > 80μs budget. Need: 80μs / 1.25 / (1/672M)
    = 42.9K MAC budget maximum. Reduce model by 14% or use CMSIS-NN to improve MAC
    rate to 5/cycle.'
