title: Inference Latency Bound Analysis for Time-Critical Control on Cortex-M4
scenario: A motor control system uses Cortex-M4 (168MHz) for anomaly detection. The control loop runs at 10kHz (100µs period). Each inference must complete within 80µs (20µs overhead reserved). The model has 50K multiply-accumulate operations (MACs) in INT8.
question: Can a 50K-MAC INT8 anomaly model fit an 80 us deadline on a 168 MHz Cortex-M4 control loop?
details:
  realistic_solution: 'Cortex-M4 with DSP SIMD: 4 INT8 MACs per cycle (using SMLAD/SMLABT instructions for packed 8-bit). At 168MHz: 168M × 4 = 672M INT8 MACs/sec. 50K MACs / 672M = 74.4µs theoretical. But: pipeline stalls, cache misses, branch overhead add ~25% overhead. Realistic: 74.4µs × 1.25 = 93µs. Exceeds 80µs budget! Fix options: (1) Reduce model to 43K MACs: 43K/672M × 1.25 = 80µs — fits. (2) Use M-profile Vector Extension (MVE) instructions if available (Cortex-M55) — 2× throughput. (3) Use TFLite Micro with CMSIS-NN which hand-tunes MAC throughput: may achieve 4-5 MACs/cycle.'
  common_mistake: |
    **The Pitfall:** Using peak theoretical throughput for the timing estimate.
    **The Rationale:** Candidates simply divide MACs by MACs/sec, assuming the Cortex-M4 SIMD achieves a perfect 4 MACs/cycle for packed INT8 without considering instruction overhead.
    **The Consequence:** The model consistently overruns the strict 80µs deadline in the control loop, causing system failures.
  napkin_math: |
    - **Theoretical MAC Rate**: 4 MACs/cycle × 168 MHz = 672 MMACs/sec.
    - **Ideal Time**: 50,000 MACs / 672,000,000 MACs/sec = 74.4 µs.
    - **Realistic Time**: 74.4 µs × 1.25 (overhead) = 93 µs.
    - **Result**: 93 µs > 80 µs budget. The model **does not fit**.
    - **Max Allowed MACs**: 80 µs / 1.25 × 672 MMACs/sec = **~43,000 MACs**.
