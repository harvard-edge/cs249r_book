title: The Lookup Table Optimization
scenario: Your Cortex-M4 model uses a Sigmoid activation after a bottleneck layer with 128 output elements.
  Computing `1/(1+exp(-x))` in software takes ~80 cycles per element using the CMSIS-DSP `arm_vexp_f32`
  path. Your colleague proposes a 256-entry INT8 lookup table for Sigmoid. Calculate the memory cost,
  the speedup, and when this optimization breaks down.
details:
  realistic_solution: The INT8 Sigmoid LUT maps each of the 256 possible INT8 input values to a pre-computed
    INT8 output. Since the model is already quantized to INT8, the input is already an 8-bit index — no
    conversion needed.
  common_mistake: '"A 256-entry table is tiny and always faster." The table itself is small, but the accuracy
    loss from quantizing the LUT input matters, and for large tensors the table can thrash the M4''s limited
    data cache (if present).'
  napkin_math: 'LUT: 256 bytes, 2 cycles/element, 1.5 µs for 128 elements. Software: 0 bytes, 80 cycles/element,
    61 µs. Speedup: 40×. For a model with 10 Sigmoid layers × 128 elements: LUT saves 10 × (61 − 1.5)
    = 595 µs per inference. If total inference is 20ms, that''s a 3% improvement — modest. But for Softmax-heavy
    models (NLP, classification heads), the savings compound. Trade-off: 256 bytes of flash for 40× faster
    activations. Always worth it on Cortex-M4.'
