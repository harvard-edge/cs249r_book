title: The INT8 Energy Dividend (tinyml-0273)
scenario: You're optimizing a keyword spotting model on a Cortex-M4 microcontroller to maximize battery
  life. To save power, you are considering quantizing a compute-heavy layer from 32-bit floating point
  (FP32) to 8-bit integer (INT8). Roughly how much more energy-efficient is a single INT8 MAC operation
  compared to a single FP32 MAC operation?
question: "Roughly how much more energy-efficient is a single INT8 MAC operation compared to a single FP32 MAC operation?"
details:
  realistic_solution: A single INT8 operation is approximately **18 times** more energy-efficient than
    an FP32 operation. This is a fundamental physical constant related to the complexity of the underlying
    silicon. FP32 requires complex floating-point units (FPUs) to handle exponents and mantissas, while
    integer ALUs are far simpler, smaller, and consume less power per operation. For a battery-powered
    device, this is a massive and critical saving.
  common_mistake: Engineers often underestimate the energy savings by confusing the INT8 gain with the
    more modest ~3-4x gain from FP16. Another common mistake is assuming savings are linear with bit-width
    reduction (e.g., 32 bits / 8 bits = 4x), which ignores the disproportionate energy cost of the exponent
    and mantissa logic in a floating-point unit (FPU).
  napkin_math: The relationship is a physical invariant. From the 'Numbers Every ML Systems Engineer Should
    Know' table, the ratio of 'FP32 vs INT8 energy' is ~18x. If an FP32 operation cost 18 nanojoules,
    the equivalent INT8 operation would cost only 1 nanojoule. This 'energy dividend' is critical for
    extending battery life on power-constrained TinyML devices.
  options:
  - ~3.4x more efficient
  - ~580x more efficient
  - ~18x more efficient
  - The energy savings are negligible
  correct_index: 2
