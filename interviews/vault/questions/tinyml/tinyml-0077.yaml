title: Federated Learning on Constrained Devices
scenario: You manage 10,000 vibration sensors on factory equipment. Each sensor runs anomaly detection on a Cortex-M4. After 6 months, the model drifts because equipment ages and vibration patterns change. You want to update the model using data from the fleet, but you can't upload raw proprietary manufacturing data.
question: "Can 10,000 Cortex-M4 vibration sensors update a drifted model without uploading 100 TB of raw data using federated learning?"
details:
  realistic_solution: 'Standard federated learning is infeasible on a Cortex-M4 with 256 KB SRAM: backward pass needs 2x forward memory (~400 KB), plus optimizer state (another 400 KB). Instead, use MCU-compatible alternatives: (1) Head-only fine-tuning (freeze the backbone, retrain only the 64x4 classification head). (2) Federated statistics (each device computes feature means/variances without backprop, uploads 2 KB of summary statistics). The cloud retrains the full model using these statistics.'
  common_mistake: |
    **The Pitfall:** Proposing standard federated averaging (each device trains locally and sends gradients).
    **The Rationale:** Standard FL requires backpropagation, which needs storing all activations, float32 arithmetic, and an optimizer state.
    **The Consequence:** The model will immediately OOM on a Cortex-M4 with 256 KB SRAM, rendering the solution impossible.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - MCU: Cortex-M4, 256 KB SRAM.
       - Full model FL requires ~800 KB RAM.
       - Classification head: 64 features, 4 classes.
    2. **Calculations:**
       - Head weights = 64 * 4 * 2 bytes = 512 bytes.
       - Gradient computation = 64 * 4 * 2 bytes = 512 bytes.
       - SGD update state = 512 bytes.
       - Total head-only memory = 512 + 512 + 512 = 1,536 bytes (1.5 KB).
    3. **Conclusion & Interpretation:**
       - **Result: Head-only fine-tuning fits comfortably in 1.5 KB of SRAM.**
       - **Memory-Bound (Backpropagation Activations)**
