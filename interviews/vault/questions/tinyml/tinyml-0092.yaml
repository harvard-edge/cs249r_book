title: The I2C Bus Lockup
scenario: Your predictive maintenance system on a Cortex-M4 reads a BME680 environmental sensor over I2C at 400 kHz while running a 35ms anomaly detection inference. Randomly, the I2C bus locks up — the SDA line is held low permanently by the sensor.
question: How does a long ML inference blocking the I2C ISR cause the sensor to clock-stretch indefinitely, and how does the model's layer execution time determine the maximum safe I2C timeout?
details:
  realistic_solution: 'I2C is a clocked protocol where the master (MCU) drives SCL and the slave (sensor) drives SDA. During a read transaction, the slave pulls SDA low for ''0'' bits. If the master fails to clock SCL at the expected time (because the CPU is busy with inference and misses the I2C interrupt), the slave enters an undefined state: it''s partway through transmitting a byte, holding SDA low, waiting for the next clock edge that never comes.'
  common_mistake: |
    **The Pitfall:** Assuming the I2C peripheral hardware is buggy and attempting to switch to SPI.
    **The Rationale:** Candidates fail to trace the interaction between interrupt latency caused by long ML computation blocks and the synchronous I2C state machine.
    **The Consequence:** The true software timing issue remains unresolved, and unnecessary hardware changes are pursued.
  napkin_math: |
    - **Step 1:** Calculate I2C byte time at 400 kHz: 9 bits / 400 kHz = 22.5 µs.
    - **Step 2:** Note CMSIS-NN Conv2D critical section: 200-500 µs (measured).
    - **Step 3:** If the I2C timeout is 100 µs, the HAL aborts mid-byte while the CPU is executing Conv2D.
    - **Step 4:** The sensor holds SDA low forever waiting for a clock pulse.
    - **Result:** **Setting the timeout to 1ms (2× the longest layer execution time) allows the layer to finish and the transaction to complete safely.**
