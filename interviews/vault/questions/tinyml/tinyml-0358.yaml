validation_issues:
- The 'Napkin Math' uses a Cortex-M4 at 168 MHz with 336 MOps/s and SRAM bandwidth of ~672 MB/s, but 672
  MB/s is not equivalent to 4 bytes/cycle at 168 MHz (168 MHz * 4 bytes/cycle = 672 MB/s, which is correct
  for 168 MHz clock and 32-bit bus, but the 336 MOps/s comes from 168MHz * 2ops/cycle, so all is consistent.
  So no issue here).
