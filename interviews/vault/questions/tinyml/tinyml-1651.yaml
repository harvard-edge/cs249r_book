title: DMA Batching vs Direct Polling Energy
scenario: A Cortex-M4 needs to read an accelerometer 100 times per second. It can either wake the CPU every 10ms to poll, or use DMA to batch 100 samples into SRAM and wake the CPU once per second.
question: Analyze the energy impact of DMA batching versus CPU polling over a 1-second interval.
visual:
  kind: svg
  path: tinyml-1651.svg
  alt: Bar chart comparing the high energy of polling 100 times vs low energy of single DMA wake-up.
  caption: Energy profile of Polling vs DMA Batching.
details:
  realistic_solution: DMA batching mitigates overall energy consumption because the high-power CPU core remains in deep sleep for the 1-second interval, letting the low-power DMA controller shuttle data. The true energy tax of polling is not the data processing itself, but the massive 100x transition penalties from context switching and PLL stabilization.
  common_mistake: |
    **The Pitfall:** Assuming the active compute energy to process 100 samples is identical in both scenarios.
    **The Rationale:** Candidates fail to account for the transition energy penalties (wake-up routines, cache misses, PLL spin-up) when toggling the CPU.
    **The Consequence:** The deployed device drains its battery drastically faster due to hidden OS scheduling overhead.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Polling wakes CPU 100 times per second.
       - DMA batching wakes CPU 1 time per second.
       - Energy_Process (E_p) and Energy_Wake (E_w) are constant.
    2. **Calculations:**
       - Polling Energy = 100 * (E_w + E_p).
       - DMA Energy = 1 * E_w + 100 * E_p.
       - Savings = 99 * E_w.
    3. **Conclusion & Interpretation:**
       - **Result: Wake-Up Cost Domination**. DMA drastically cuts total energy by sidestepping 99 expensive wake-up sequences.
