title: DMA Batching vs Direct Polling Energy
scenario: >
  A Cortex-M4 needs to read an accelerometer 100 times per second. It can either wake the CPU every 10ms to poll, or use DMA to batch 100 samples into SRAM and wake the CPU once per second.
question: >
  Analyze the energy impact of DMA batching versus CPU polling over a 1-second interval.
visual:
  kind: svg
  path: tinyml-1651.svg
  alt: Bar chart comparing the high energy of polling 100 times vs low energy of single DMA wake-up.
  caption: Energy profile of Polling vs DMA Batching.
details:
  realistic_solution: >
    DMA batching significantly reduces overall energy consumption because the power-hungry CPU remains in deep sleep for the entire 1-second interval while the low-power DMA controller handles data transfers. Waking the CPU 100 times incurs massive overhead from context switching and PLL stabilization, dwarfing the active compute energy.
  common_mistake: |
    **The Pitfall:** Assuming the active energy to process 100 samples is identical in both scenarios.
    **The Rationale:** Candidates fail to account for the massive 100x transition energy penalties (context switching and PLL stabilization) when waking the CPU.
    **The Consequence:** The device drains its battery drastically faster due to polling overhead.
  napkin_math: |
    - **Polling:** Wakes CPU 100 times. Energy = 100 × (E_wake + E_process).
    - **DMA Batching:** Wakes CPU 1 time. Energy = 1 × E_wake + 100 × E_process.
    - **Conclusion:** DMA drastically reduces total energy by avoiding 99 `E_wake` penalties.
