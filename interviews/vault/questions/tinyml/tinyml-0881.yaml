title: 'Model Size Estimation: Compare DS-CNN-S vs. MobileNetV1-0.25 on ESP32-S3'
scenario: Compare DS-CNN-S (100K params, 0.9 MOPs, INT8) vs. MobileNetV1-0.25 (475K
  params, 14.9 MOPs, INT8) for audio keyword detection on ESP32-S3 (240MHz, 512KB
  SRAM, 8MB PSRAM). Evaluate SRAM fit, inference latency, and accuracy. Assume audio
  input (49x10 MFCC for DS-CNN, 28x28 spectrogram for MobileNet).
question: 'Which fits ESP32-S3 audio KWS better: DS-CNN-S at 0.9 MOPs or MobileNetV1-0.25
  at 14.9 MOPs?'
details:
  realistic_solution: 'DS-CNN-S: 100KB Flash. SRAM: 30KB peak activations + 30KB runtime
    = 60KB. Inference: 0.9M/240M=3.75ms. MobileNetV1-0.25: 475KB Flash. SRAM: 28x28x32x1B=25KB
    peak + runtime = 55KB. But full model 475KB + 55KB = 530KB > 512KB SRAM -> weights in PSRAM (80MB/s
    effective). Inference: 14.9M/240M = 62ms compute + 475KB/80MB/s = 6ms PSRAM fetch
    = 68ms. DS-CNN-S wins on latency (3.75ms vs 68ms) and SRAM. For audio KWS, DS-CNN-S
    is clearly the right architecture.'
  common_mistake: Comparing raw accuracy numbers from different datasets; DS-CNN-S
    is trained on MFCC audio features, MobileNetV1 on images — direct comparison requires
    same task benchmark.
  napkin_math: 'DS-CNN: 0.9M/240M=3.75ms. SRAM: 60KB. MobileNetV1-0.25: weights 475KB
    in PSRAM. Compute: 14.9M/240M=62ms. PSRAM fetch: 475KB/80MB/s=6ms. Total: ~68ms.
    DS-CNN ~18x faster. DS-CNN-S achieves 94% on Google KWS vs MobileNetV1-0.25
    ~90% (using audio features directly vs forcing through image path).'
