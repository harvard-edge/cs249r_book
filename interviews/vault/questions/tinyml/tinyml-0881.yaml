title: 'Model Size Estimation: Compare DS-CNN-S vs. MobileNetV1-0.25 on ESP32-S3'
scenario: Compare DS-CNN-S (100K params, 0.9 MOPs, INT8) vs. MobileNetV1-0.25 (475K params, 14.9 MOPs, INT8) for audio keyword detection on ESP32-S3 (240MHz, 512KB SRAM, 8MB PSRAM). Assume audio input (49x10 MFCC for DS-CNN, 28x28 spectrogram for MobileNet).
question: Which fits ESP32-S3 audio KWS better: DS-CNN-S at 0.9 MOPs or MobileNetV1-0.25 at 14.9 MOPs?
details:
  realistic_solution: 'DS-CNN-S: 100KB Flash. SRAM: 30KB peak activations + 30KB runtime = 60KB. Inference: 0.9M / 240M = 3.75ms. MobileNetV1-0.25: 475KB Flash. SRAM: 28x28x32x1B = 25KB peak + runtime = 55KB. But full model 475KB + 55KB = 530KB > 512KB SRAM -> weights must reside in PSRAM (80MB/s effective). Inference: 14.9M / 240M = 62ms compute + 475KB / 80MB/s = 6ms PSRAM fetch = 68ms. DS-CNN-S wins on latency (3.75ms vs 68ms) and SRAM fit.'
  common_mistake: |
    **The Pitfall:** Comparing raw accuracy numbers from different datasets directly.
    **The Rationale:** DS-CNN-S is trained on MFCC audio features, while MobileNetV1 is trained on images. Direct comparison requires the same task benchmark.
    **The Consequence:** Selecting a suboptimal, bloated architecture because of misleading accuracy claims rather than evaluating task-specific efficiency on the ESP32-S3.
  napkin_math: |
    *   **DS-CNN-S Compute:** 0.9M MOPs / 240 MHz = 3.75 ms.
    *   **DS-CNN-S Memory:** Fits entirely in SRAM (~60KB).
    *   **MobileNetV1 Compute:** 14.9M MOPs / 240 MHz = 62 ms.
    *   **MobileNetV1 PSRAM Fetch:** 475KB weights in PSRAM at 80MB/s effective bandwidth = 475KB / 80MB/s ≈ 6 ms.
    *   **MobileNetV1 Total Latency:** 62 ms + 6 ms = 68 ms.
    *   **Conclusion:** DS-CNN-S is **~18x faster** (68 / 3.75 = 18.1).
