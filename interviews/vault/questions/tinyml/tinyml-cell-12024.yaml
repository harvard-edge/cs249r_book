title: 'Latency Decomposition: Size and Validate TinyML Model for Real-Time ECG on Cortex-M4'
scenario: 'Size and validate a TinyML model deployment for real-time ECG arrhythmia detection on Cortex-M4
  (168MHz, 256KB SRAM). ECG sample rate: 360Hz. The model processes 1-second windows (360 samples), must
  infer faster than window arrival (< 1000ms). Model: 1D-CNN with 50K params, INT8, 2.5 MOPs. Verify SRAM
  fits activations + weights + buffers.'
question: "Do the ECG model's 50 KB weights, activations, and buffers fit in 256 KB SRAM on a 168 MHz Cortex-M4?"
details:
  realistic_solution: 'Weights: 50K × 1 byte = 50KB. Input buffer: 360 × 2 bytes (int16 ADC) = 720 bytes.
    Max activation size (1D-CNN peak at first layer): 360×32 filters = 11.5KB. With double buffering:
    23KB. Total peak: 50+23+1 = 74KB << 256KB SRAM. Inference: 2.5M/168M = 14.9ms << 1000ms budget. Huge
    slack — could run 60Hz inference for 60fps-equivalent.'
  common_mistake: Checking only model weight size without accounting for activation memory (often 2-5×
    larger than weights for CNN models) and input buffer.
  napkin_math: 'Weights: 50K × 1B = 50KB. Peak activations: 360 samples × 32 channels × 4 bytes (FP32
    scratch) = 46KB; with INT8: 11.5KB. Buffers: 5KB. Total: 66.5KB. SRAM: 256KB. Headroom: 189KB. ✓ Latency:
    2.5M/168M = 14.9ms. Window: 1000ms. Duty: 1.49%. Can run at 60Hz (16.7ms budget) comfortably.'
