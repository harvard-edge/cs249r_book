title: 'The Sleep-Wake Power Chasm'
scenario: 'You''re designing a battery-powered sensor that wakes up, runs a tiny keyword-spotting model for one second, and then goes back to sleep for nine seconds. To estimate the device''s battery life, you must understand the power draw in both states.'
question: 'What is the approximate ratio of active power consumption to deep sleep power consumption for a typical Cortex-M4 class microcontroller?'
details:
  realistic_solution: 'The ratio is typically in the range of 1,000x to 10,000x. Active power consumption for a microcontroller is measured in milliwatts (mW), while its deep sleep power is measured in microwatts (uW), a thousand-fold difference in units alone.'
  common_mistake: |
    **The Pitfall:** Underestimating the active-to-sleep power ratio.
    **The Rationale:** Engineers without low-level embedded experience often assume it's similar to a mobile phone's sleep mode (10-100x), ignoring that Cortex-M deep sleep is measured in microwatts.
    **The Consequence:** Catastrophic miscalculations in battery life, failing to appreciate that TinyML viability hinges on spending over 99% of time in deep sleep.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active Power: ~50mW (running inference at 168MHz).
    - Deep Sleep Power: ~5uW (RTC + minimal leakage).

    **Calculations:**
    - Power Ratio: 50mW / 5uW = 10,000x.
    - Average Power: (50mW * 1s + 0.005mW * 9s) / 10s = 5.0045mW.

    **Conclusion & Interpretation:**
    - **Result: 10,000x (Power-Bound)**. Active to deep sleep ratio highlights the criticality of minimizing active time.
  options:
    - '~10x'
    - '~100x'
    - '>1,000x'
    - 'They are roughly the same'
