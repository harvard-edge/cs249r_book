title: The Sensor Buffer Overflow
scenario: A wearable device with a Cortex-M4 (256 KB SRAM) samples a 3-axis accelerometer at 100 Hz. Each
  axis produces a 16-bit value. The inference model needs a 5-second window of data. How much SRAM does
  the input buffer require, and what fraction of total SRAM does it consume?
details:
  realistic_solution: 'Each sample: 3 axes × 2 bytes = 6 bytes. Samples in 5 seconds: 100 Hz × 5 s = 500
    samples. Buffer size: 500 × 6 = 3,000 bytes = 3 KB. Fraction of SRAM: 3,000 / 262,144 ≈ 1.1%. This
    is manageable, but double-buffering (for concurrent sampling and inference) doubles it to ~2.3%.'
  common_mistake: Forgetting to multiply by the number of axes (3) or the window length. Some candidates
    also forget that 16 bits = 2 bytes.
  napkin_math: '3 axes × 2 B = 6 B/sample. 100 Hz × 5 s = 500 samples. 500 × 6 = 3,000 B = 2.93 KB. SRAM
    fraction: 3,000 / 262,144 = 1.14%. Double buffer: 2.3%.'
  options:
  - A) 1,000 bytes (~0.4% of SRAM)
  - B) 3,000 bytes (~1.1% of SRAM)
  - C) 6,000 bytes (~2.3% of SRAM)
  - D) 30,000 bytes (~11.4% of SRAM)
  correct_index: 1
