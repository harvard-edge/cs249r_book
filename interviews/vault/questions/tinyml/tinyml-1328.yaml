title: ESP32-S3 Memory Bottleneck Diagnosis
scenario: A TinyML model for keyword spotting is deployed on an ESP32-S3 (240 MHz
  dual-core, 512 KB internal SRAM, 8 MB external PSRAM). The model runs inference
  periodically, taking 150ms on average. However, every few seconds, the inference
  time spikes to over 500ms. Observing the system, you notice that during these spikes,
  the CPU utilization drops significantly, and there's an increase in external memory
  access requests. The model weights (2MB) are stored in PSRAM, and intermediate activations
  (1MB) are also primarily in PSRAM due to the limited internal SRAM. The inference
  loop itself is small and fits in internal SRAM.
question: What is the likely cause of ESP32-S3 inference spikes when CPU utilization
  drops and PSRAM access requests increase?
details:
  realistic_solution: "The most likely root cause is contention for the external PSRAM\
    \ bus. While one core is performing inference, the other core (or an interrupt\
    \ service routine) might be attempting to access the PSRAM for logging, data acquisition,\
    \ or other background tasks. This leads to bus contention and stalls for the inference\
    \ core. A realistic solution involves optimizing memory access patterns to minimize\
    \ contention: \n1. Profile memory access to identify the concurrent operations\
    \ causing contention.\n2. Reorganize data: place critical, frequently accessed\
    \ data (e.g., current inference input, output) in internal SRAM if possible. \n\
    3. Buffer management: implement double-buffering or circular buffers for data\
    \ transfer to/from PSRAM to reduce stall times. \n4. Task scheduling: adjust task\
    \ priorities or synchronize PSRAM access between cores using mutexes or semaphores,\
    \ ensuring critical inference operations have priority. \n5. Optimize PSRAM usage:\
    \ ensure memory alignment and burst access are maximized where possible."
  common_mistake: Incorrectly assuming the CPU is the bottleneck or that the PSRAM
    itself is inherently slow without considering concurrent access patterns or caching.
    Another common mistake is overlooking the dual-core nature of the ESP32-S3 and
    potential contention.
  napkin_math: If the ESP32-S3's PSRAM clock is, for instance, 120 MHz (half the core
    clock, common for external memory interfaces) and a PSRAM read operation takes
    4 cycles (simplified), then a 1MB read would ideally take (1MB / (32-bit bus /
    8 bits/byte)) * 4 cycles / 120 MHz = (1024*1024 / 4) * 4 / (120*10^6) = 10^6 cycles
    / 120*10^6 Hz = ~8.5 ms. If another operation also tries to access PSRAM, this
    time can easily double or triple due to arbitration and wait states, leading to
    significant spikes in latency that can add up to hundreds of milliseconds when
    multiple smaller accesses are stalled. The 500ms spike suggests prolonged stalls
    due to contention over many memory operations or a significant number of smaller,
    contended accesses.
