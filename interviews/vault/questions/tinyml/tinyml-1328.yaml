title: ESP32-S3 Memory Bottleneck Diagnosis
scenario: A TinyML keyword spotting model deployed on a dual-core microcontroller runs inference in 150ms. Periodically, inference spikes to >500ms, CPU utilization drops, and external memory access requests increase. The 2MB weights and 1MB activations are stored in PSRAM.
question: "What is the likely cause of the inference latency spikes when CPU utilization drops and PSRAM access requests increase?"
details:
  realistic_solution: "The most likely root cause is bus contention on the SPI interface. While the inference core accesses weights, the secondary core or an ISR accesses the PSRAM concurrently for I/O operations, leading to massive bus arbitration stalls and memory backpressure."
  common_mistake: |
    **The Pitfall:** Incorrectly assuming the CPU is the bottleneck or that PSRAM is inherently slow.
    **The Rationale:** Candidates overlook the asymmetric dual-core architecture and shared external memory bus contention.
    **The Consequence:** They fail to diagnose hardware arbitration stalls and pursue ineffective algorithmic model optimizations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Activations: 1MB transferred from PSRAM.
       - Interface: Octal SPI at 80 MHz (80 MB/s max bandwidth).
       - Baseline latency: 150 ms. Spike latency: >500 ms.
    2. **Calculations:**
       - Ideal 1MB read time: 1 MB / 80 MB/s = 12.5 ms.
       - Unexplained latency penalty: 500 ms - 150 ms = 350 ms.
       - Penalty ratio vs ideal: 350 ms / 12.5 ms = 28x slowdown.
    3. **Conclusion & Interpretation:**
       - **Result: Bus contention multiplies the 12.5 ms ideal transfer time into hundreds of milliseconds of stalls (Memory Bandwidth Bound).**
