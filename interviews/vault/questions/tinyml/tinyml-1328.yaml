title: ESP32-S3 Memory Bottleneck Diagnosis
scenario: A TinyML model for keyword spotting is deployed on an ESP32-S3 (240 MHz dual-core, 512 KB internal SRAM, 8 MB external PSRAM). The model runs inference periodically, taking 150ms on average. Every few seconds, inference time spikes to over 500ms, while CPU utilization drops and external memory access requests increase. The model weights (2MB) and intermediate activations (1MB) are stored in PSRAM.
question: "What is the likely cause of ESP32-S3 inference spikes when CPU utilization drops and PSRAM access requests increase?"
details:
  realistic_solution: "The most likely root cause is contention for the external PSRAM bus. While one core is performing inference, the other core (or an interrupt service routine) might be attempting to access the PSRAM for logging, data acquisition, or other background tasks. This leads to bus contention and stalls for the inference core."
  common_mistake: |
    **The Pitfall:** Incorrectly assuming the CPU is the bottleneck or that PSRAM is inherently slow.
    **The Rationale:** Candidates overlook the dual-core nature of the ESP32-S3 and potential concurrent access patterns.
    **The Consequence:** They fail to diagnose bus contention and pursue ineffective CPU optimizations.
  napkin_math: |
    1. Assume PSRAM uses Octal SPI (8 data lines) running at 80 MHz (1 byte per clock cycle).
    2. Calculate ideal PSRAM bandwidth: 80 MB/s.
    3. Calculate ideal 1MB read time: 1 MB / 80 MB/s = 12.5 ms.
    4. Note the discrepancy: A spike from 150 ms to 500 ms is a 350 ms penalty, not 12.5 ms.
    5. Conclude contention impact: Unsynchronized dual-core access causes massive bus arbitration stalls.
    6. **Final Result: Bus contention multiplies the 12.5 ms ideal transfer time into hundreds of milliseconds of stalls.**
