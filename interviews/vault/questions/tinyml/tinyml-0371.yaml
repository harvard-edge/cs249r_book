title: The INT8 Memory Diet
scenario: You're optimizing a keyword spotting model to run on a Cortex-M4 microcontroller. The model is currently using FP16 precision for its weights. To reduce the flash memory footprint, you decide to quantize the model's weights to INT8.
question: What is the expected reduction factor for the memory occupied by the model's weights?
details:
  realistic_solution: The reduction factor is exactly 2x. FP16 (half-precision floating-point) uses 16 bits, or 2 bytes, per parameter. INT8 (8-bit integer) uses 8 bits, or 1 byte, per parameter. By halving the bit width for each weight, the total memory footprint for the weights is also halved.
  common_mistake: |
    **The Pitfall:** Confusing FP16-to-INT8 with FP32-to-INT8 quantization.
    **The Rationale:** Engineers often memorize the 4x reduction for FP32-to-INT8 and apply it blindly.
    **The Consequence:** They overestimate the memory savings by a factor of 2.
  napkin_math: |
    * FP16 uses 16 bits (2 bytes) per parameter.
    * INT8 uses 8 bits (1 byte) per parameter.
    * Memory reduction = 2 bytes / 1 byte = 2.
    * **Result: 2x memory reduction.**
  options:
  - 4x
  - ~3.4x
  - 2x
  - 1.1x
  correct_index: 2
