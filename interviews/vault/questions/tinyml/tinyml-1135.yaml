title: Corstone-300 Operator Cascading and CPU-NPU Pipelining
scenario: You are deploying a vision model on a Corstone-300 subsystem. You must evaluate two scheduling plans for a Conv2D -> DepthwiseConv2D -> Dense layer sequence. Plan A schedules all operators sequentially on the Ethos-U55, writing a 150 KB intermediate activation to the shared SRAM. Plan B cascades the convolutions on the Ethos-U55 to keep the 150 KB activation internal, and schedules the Dense layer on the M7 CPU concurrently with the next frame's convolutions.
question: Should Corstone-300 use Ethos-U55 layer cascading or sequential SRAM writes for a Conv2D-Depthwise-Dense chain?
details:
  realistic_solution: Plan B is the better system-level choice. By cascading the Conv2D and DepthwiseConv2D layers on the Ethos-U55, we avoid reading and writing the 150 KB intermediate tensor to the main 512 KB SRAM, significantly reducing memory contention and saving power. Even though the M7 CPU is slower at computing the Dense layer, running it in parallel with the NPU's execution of the next frame's convolutions increases overall system throughput and hides the Dense layer latency.
  common_mistake: |
    **The Pitfall:** Reflexively choosing Plan A because the Ethos-U55 has significantly higher MAC throughput than the Cortex-M7.
    **The Rationale:** Candidates focus solely on compute FLOPs and fail to account for the shared SRAM memory bandwidth bottleneck.
    **The Consequence:** Spilling the 150 KB intermediate activation to main SRAM causes severe bus contention, increasing latency and power consumption.
  napkin_math: |
    1. **Assumptions & Constraints:** 480 MHz system with 32-bit bus (4 bytes/cycle). 150 KB intermediate activation. Dense layer requires 200,000 MACs. M7 uses dual-MAC SIMD DSP instructions.
    2. **Calculations:** Plan A SRAM Traffic: 150 KB write + 150 KB read = 300 KB. 307,200 bytes / 4 bytes/cycle = 76,800 cycles ≈ 160 µs penalty purely for memory. Plan B CPU execution: 200,000 MACs / 2 MACs/cycle = 100,000 cycles ≈ 208 µs. Next frame convolutions on NPU will take significantly longer than 208 µs.
    3. **Conclusion & Interpretation:** **Result: Memory-Bandwidth Optimized.** Plan B completely hides the 208 µs M7 Dense layer execution within the NPU's macro-pipeline and eliminates 300 KB of SRAM traffic, vastly improving system throughput.
