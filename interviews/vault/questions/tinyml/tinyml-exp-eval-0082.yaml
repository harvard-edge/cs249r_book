title: On-Device Anti-Spoofing Guardrail Evaluation
scenario: Your team is deploying a voice-activated smart lock using the Nordic nRF5340. To comply with
  Responsible AI guardrails against adversarial attacks, you must evaluate two alternatives for an anti-spoofing
  filter. Strategy A deploys a 150 KB anti-spoofing model alongside the 700 KB primary acoustic model
  directly on the 128 MHz app core. Strategy B uses the BLE 5.3 radio to transmit a 16 KB audio snippet
  to a companion smartphone for cloud-based guardrail verification before unlocking. Which alternative
  is better and why?
details:
  realistic_solution: Strategy B is the required choice due to strict flash memory constraints, despite
    the added latency. The Nordic nRF5340 has 1 MB of flash, and accommodating 850 KB of models leaves
    insufficient room for the application code, Zephyr RTOS, and BLE 5.3 stack. The energy cost of transmitting
    16 KB over BLE is minimal for a low-frequency unlocking event.
  common_mistake: Candidates often choose Strategy A to minimize latency and dependency on a phone, failing
    to account for the total flash memory requirements of the RTOS and BLE stack. They may also overestimate
    the power penalty of BLE transmission for infrequent events like unlocking a door.
  napkin_math: 'Strategy A Flash: 700 KB (primary) + 150 KB (guardrail) = 850 KB. nRF5340 total flash
    = 1024 KB. Remaining flash = 174 KB. The Zephyr RTOS and BLE stack typically require 200-250 KB, causing
    a memory overflow. Strategy B BLE transfer: 16 KB = 128 kbits. At 1 Mbps effective BLE throughput,
    transmission takes ~128 ms. Operating at ~5mA active current at 3V, this consumes about 5mA * 3V *
    0.128s = 1.92 mJ per unlock, which is highly efficient.'
