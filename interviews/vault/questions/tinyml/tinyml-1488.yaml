title: Attention Alternatives to Flash Attention for Cortex-M7 + Ethos-U55
scenario: You're deploying a small transformer (4 layers, 8 heads, d=256, seq_len=64) on Cortex-M7 + Ethos-U55 for embedded NLP. The Ethos-U55 has 256KB SRAM for activations. Standard FP32 attention requires 128KB for attention maps alone. Flash Attention is not available for Ethos-U55.
question: "What attention alternative should replace Flash Attention on Ethos-U55, and what dimension changes keep activation memory within SRAM?"
details:
  realistic_solution: Use linear attention (e.g. Performer or cosine attention) which replaces the softmax(QK^T)V with φ(Q)(φ(K)^T V), reducing attention to O(n) per token instead of O(n^2). For seq_len=64, this is marginal (64^2=4096 ops), but memory usage drops from 128KB to 64KB for KV projections. Ethos-U55 can execute the linear attention operators natively via TensorFlow Lite for Microcontrollers.
  common_mistake: |
    **The Pitfall:** Porting the Flash Attention algorithm manually to Cortex-M7 assembly.
    **The Rationale:** Developers familiar with CUDA assume they can just write a custom memory-aware kernel for the accelerator.
    **The Consequence:** The Ethos-U55 is a fixed-function NPU that only executes pre-compiled Vela operator graphs; the M7 CPU would need to handle attention in software, defeating the purpose and ruining latency.
  napkin_math: |
    * Ethos-U55: 256KB SRAM activation budget.
    * Standard 8-head attention (FP32): 64^2 × 4 bytes × 8 heads = 131,072 bytes (128 KB).
    * Linear attention K^T V outer product: 256 × 256 × 4 bytes = 262,144 bytes (256 KB) — worse for d=256!
    * For reduced head dim (d=64): 64 × 64 × 4 bytes = 16 KB.
    * Recommendation: reduce d_head to 64 from 256, apply linear attention.
    * **Total model size:** 4 layers × (Q+K+V+O projections) × 256 × 64 × 4 bytes = 262,144 bytes = **256 KB** (needs external Flash).
