title: Implement depthwise separable conv for Cortex-M4 with CMSIS-NN
scenario: 'You are deploying a 3-layer depthwise separable CNN on an STM32F4 (Cortex-M4,
  168MHz, 256KB SRAM) for keyword detection. The model has layers: depthwise 3×3 (16ch,
  32×32 input), pointwise 1×1 (16→32ch), depthwise 3×3 (32ch, 16×16). Implement using
  CMSIS-NN and verify the model fits in SRAM.'
question: How should the three-layer depthwise separable CNN be implemented with CMSIS-NN
  and buffered to fit STM32F4 SRAM?
details:
  realistic_solution: 'CMSIS-NN functions: arm_depthwise_conv_s8() for depthwise,
    arm_convolve_1x1_s8_fast() for pointwise 1×1. Buffer strategy: ping-pong buffers
    A and B. Layer 1: input from A, output to B. Layer 2: input from B, output to
    A. Layer 3: input from A, output to B. Peak SRAM: max(|A|, |B|) + scratch buffer.
    |A_0| = 32×32×16×1B = 16KB. |B_0| = 32×32×32×1B = 32KB after pointwise... wait,
    after layer 1 depthwise: 32×32×16 = 16KB. After pointwise: 32×32×32 = 32KB. After
    layer 3 depthwise: 16×16×32 = 8KB. Peak: 32KB (B after pointwise) + 16KB (A input).
    Plus model weights.'
  common_mistake: Allocating separate input and output buffers for each layer simultaneously,
    which requires holding two activation tensors in SRAM at once; with only 256KB
    SRAM, this can cause OOM — use in-place or ping-pong buffers to reduce peak SRAM.
  napkin_math: 'Model weights: layer 1 depthwise: 16×9 = 144 params × 1B (INT8) =
    144B. Layer 2 pointwise: 16×32 = 512B. Layer 3 depthwise: 32×9 = 288B. Total weights:
    944B ≈ 1KB. BN params: 4 × (16+32+32) = 320B. Total model: ~1.3KB. Peak activation
    SRAM: 32KB (largest tensor). Scratch buffer for CMSIS-NN: 16×9×1B = 144B. Total
    SRAM: 1.3KB weights + 32KB activations + 0.3KB scratch + 4KB stack = 37.6KB <<
    256KB SRAM. Fits easily. Cortex-M4 at 168MHz: CMSIS-NN depthwise throughput ~50M
    MACs/sec. Layer 1: 16×9×32² = 147K MACs → 2.9ms. All 3 layers: ~8ms.'
