title: Watchdog Timeout Sizing
scenario: A TinyML controller must complete sensing, inference, and actuation every
  100 ms. Normal loop time is 72 ms, but rare flash logging adds 18 ms. Size a watchdog
  timeout that catches hangs without resetting healthy worst-case loops.
question: What watchdog timeout should you choose if a healthy TinyML loop can take
  72 ms plus 18 ms logging?
details:
  realistic_solution: The healthy worst case is 90 ms. A watchdog below 90 ms would
    reset valid loops. A timeout around 120 ms provides 30 ms margin while still catching
    hangs quickly; exact value depends on safety requirements.
  common_mistake: Setting the watchdog at the average loop time and causing false
    resets during valid worst-case work.
  napkin_math: Worst-case healthy loop = 72 + 18 = 90 ms. A 120 ms watchdog gives
    30 ms margin.
