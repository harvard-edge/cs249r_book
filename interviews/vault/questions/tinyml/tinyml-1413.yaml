title: TinyML Graph Optimization for FPU-less ARM Cortex-M4
scenario: You are tasked with deploying a pre-trained, quantized (INT8) convolutional neural network for a simple audio classification task onto an ARM Cortex-M4 STM32F4 microcontroller. The device operates at 168 MHz, has 256 KB of SRAM, and crucially, lacks a Floating-Point Unit (FPU). Your goal is to achieve real-time inference (sub-10ms latency per inference) while minimizing power consumption. The current inference time is 50ms, and the model's memory footprint barely fits within SRAM.
question: How should AOT graph compilation optimize an INT8 Cortex-M4 audio CNN from 50 ms toward sub-10 ms latency?
details:
  realistic_solution: Utilize an ahead-of-time (AOT) compiler to analyze the graph offline and generate highly optimized, target-specific C code. Operator lowering translates high-level Conv2D into low-level integer matrix multiplications. Constant folding pre-computes static parts of the graph (e.g., BatchNorm). CMSIS-NN libraries are essential for replacing unoptimized loops with SIMD fixed-point kernels.
  common_mistake: |
    **The Pitfall:** Overlooking compiler-level ahead-of-time optimizations.
    **The Rationale:** Candidates rely solely on weight quantization without realizing the lack of FPU requires low-level operator fusion and fixed-point intrinsic kernels.
    **The Consequence:** Inference time blows past real-time deadlines due to software floating-point emulation and naive MAC cycles.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 168 MHz Clock, 10ms target -> 1.68M cycle budget.
       - Target layer: 32x32 map, 64 Cin, 64 Cout, 3x3 kernel.
    2. **Calculations:**
       - MACs required: 32 * 32 * 3 * 3 * 64 * 64 ≈ 37.7 million.
       - Unoptimized (5 cycles/MAC): 37.7M * 5 = 188.5M cycles.
       - Resulting latency: 188.5M / 168M = ~1.12 seconds (1120 ms).
    3. **Conclusion & Interpretation:**
       - **Result: >100x over budget.** The unoptimized graph is heavily **Compute-Bound**, mandating compiler-driven operator lowering and CMSIS-NN SIMD utilization to hit sub-10ms.
