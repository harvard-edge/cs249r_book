title: The Checkpoint-Watchdog Death Spiral
scenario: >
  Your team is building a safety-critical misfire detection system for an automotive ECU using a TinyML model. To prevent hanging, you've implemented a hardware watchdog timer (WDT) with a 100ms timeout. Normal inference takes ~80ms. For added resilience, the system checkpoints state to flash memory after every inference (30ms). During a 'cold start', complex input causes inference to spike to 105ms. The WDT correctly fires and reboots the device, but the ECU then enters a continuous reboot loop.
question: Why does the watchdog and checkpoint design enter a deterministic reboot loop during cold-start inference?
details:
  realistic_solution: >
    The total success path (110ms) inherently violates the 100ms WDT limit. The design only survives normal operation because the watchdog is pet mid-cycle (between inference and checkpoint). During a cold start, inference alone exceeds the WDT. Upon reboot, the system restores the checkpoint, retries the exact same complex input, takes 105ms, and triggers the WDT again. The fix requires a boot counter to discard pathological input frames.
  common_mistake: |
    **The Pitfall:** Blaming the checkpointed data corruption instead of the timing architecture.
    **The Rationale:** Candidates guess the checkpoint is corrupt, ignoring that the scenario describes a clean WDT timeout due to an execution spike.
    **The Consequence:** Engineers will rewrite Flash drivers instead of fixing the fundamental real-time scheduling flaw.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - WDT Timeout: 100 ms.
       - Normal: 80ms (inf) + 30ms (chkpt) = 110ms. Petting occurs at 80ms.
       - Cold Start: 105ms (inf).
    2. **Calculations:**
       - Cold Start Cycle: Boot (50ms) + Restore (10ms) + Inference (105ms).
       - WDT fires at 100ms exactly during the 105ms inference step.
    3. **Conclusion & Interpretation:**
       - **Result: 105ms > 100ms WDT.** The system deterministically reboots before petting the WDT on the retried input. **Bottleneck: Real-Time Scheduling.**
