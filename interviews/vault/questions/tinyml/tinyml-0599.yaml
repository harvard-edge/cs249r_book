title: The Double-Precision FPU Trap
scenario: You are porting a Python model to C for a Cortex-M7. In Python, you have the line `y = x * 0.5`. In your C code, you write exactly that: `float y = x * 0.5;`. Your profiling shows this one line is incredibly slow. The M7 has a hardware FPU.
question: Why does `float y = x * 0.5;` stall on a Cortex-M7 with a single-precision FPU?
details:
  realistic_solution: 'The literal 0.5 is a double (64-bit) in C. The M7''s FPU only supports single-precision (32-bit). So the compiler promotes x to double, calls a software emulation library for the 64-bit multiply (~50-100 cycles), then truncates back to float. Fix: write 0.5f to force single-precision. Hardware float multiply: 1 cycle. Software double multiply: ~50-100 cycles. A single missing ''f'' suffix made this operation 50-100x slower. Additionally, linking the soft-double library bloats flash by 5-10KB. Always use -Wdouble-promotion compiler flag to catch this.'
  common_mistake: |
    **The Pitfall:** Ignoring C-language typing defaults for floating-point literals.
    **The Rationale:** Python natively handles type promotion, so ML engineers writing C code simply write `0.5` without realizing it is cast as a 64-bit double.
    **The Consequence:** The compiler forcefully promotes the variable, triggers an expensive software emulation library for the multiply, and then truncates back to float, devastating performance.
  napkin_math: |
    *   **Hardware Float Multiply:** 1 cycle.
    *   **Software Double Multiply:** ~50-100 cycles.
    *   **Flash Bloat:** Linking the soft-double library bloats flash by 5-10 KB.
    *   **Conclusion:** A single missing 'f' suffix (`0.5` instead of `0.5f`) makes the math 100x slower.
