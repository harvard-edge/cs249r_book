title: TinyML Ring AllReduce Transmit Cost
scenario: Three Cortex-M4 nodes communicate via a UART daisy-chain to fuse localized
  sensor embeddings using Ring AllReduce. (Note - SPI cannot natively form a peer-to-peer
  ring because it is master-slave; UART RX/TX pairs allow each node to forward
  to the next, forming a true logical ring at the protocol layer.)
question: Apply the Ring AllReduce formula to calculate the total bytes transmitted
  per node for a 600-byte feature vector.
visual:
  kind: svg
  path: tinyml-1652.svg
  alt: Three node cyclic ring topology.
  caption: Ring AllReduce logical topology for 3 nodes.
details:
  realistic_solution: The total bytes transmitted by each node in a Ring AllReduce
    algorithm is 2 * ((N-1) / N) * Size. With N=3 and a size of 600 bytes, the calculation
    is 2 * (2/3) * 600. This results in 800 bytes total transmitted per node.
  common_mistake: Failing to multiply by 2 for the two distinct phases (reduce-scatter
    and all-gather) of the algorithm.
  napkin_math: 2 * (2 / 3) * 600 = 800 bytes
