title: BLE Mesh Federated Embedding Reduce
scenario: Three battery-powered nRF52840 (Cortex-M4F) sensor nodes deployed in a building-monitoring mesh share periodic 600-byte feature embeddings to compute a fused mean-vector before forwarding to the gateway. Each node has BLE 5.0 connections to its two neighbours, forming a logical 3-node ring (the figure). The mesh protocol uses Ring AllReduce with reduce- scatter followed by all-gather; per-byte radio energy on this part is ~3 uJ/byte (TX) at the chosen TX power. The team wants to size battery budget against the per-round transmit volume per node.
question: Apply the Ring AllReduce communication-cost formula to compute the total bytes transmitted per node for a 600-byte feature vector across the 3-node ring, and explain why Ring AllReduce wins.
visual:
  kind: svg
  path: tinyml-1652.svg
  alt: Three node cyclic ring topology.
  caption: Ring AllReduce logical topology for 3 nodes.
details:
  realistic_solution: 'Ring AllReduce per-node transmit bytes = 2 * ((N-1) / N) * Size. With N=3 and Size=600 B, per-node transmit = 2 * (2/3) * 600 = 800 B. Per-byte TX energy is 3 uJ/B, so per-node per-round radio energy = 800 * 3 = 2400 uJ = 2.4 mJ. Naive broadcast-to-two-neighbours sends Size to each neighbour = 2 * 600 = 1200 B per node = 3.6 mJ. Ring AllReduce saves 33% per round vs naive broadcast. The savings grow with N: at N=10 the ring transmits 1.8 * Size per node vs 9 * Size naive (5x saving). The structural reason - Ring AllReduce never sends a byte that has not been folded into a partial reduction, so each node only forwards 2*(N-1)/N copies of the original instead of (N-1) full copies.'
  common_mistake: |
    **The Pitfall:** Forgetting the factor of 2 for the two phases, or naive broadcasting.
    **The Rationale:** Candidates miss that Ring AllReduce sends partial reductions rather than the full feature vector to each neighbor per round.
    **The Consequence:** Overestimating transmit costs or choosing a less efficient broadcast topology.
  napkin_math: |
    - **Ring AllReduce Transmit**: 2 * ((N-1) / N) * Size = 2 * (2/3) * 600 = 800 Bytes/node.
    - **Ring Energy/Round**: 800 B * 3 µJ/B = **2.4 mJ**.
    - **Naive Broadcast**: 2 * 600 = 1200 Bytes/node = **3.6 mJ**.
    - **Savings**: Ring topology saves 33% energy per round.
