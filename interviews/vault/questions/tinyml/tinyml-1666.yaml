title: SPI/DMA Pipeline Overlap
scenario: A vibration sensor samples data via SPI at 1 Mbps while running predictive
  maintenance inference on a Cortex-M4.
question: Develop a dual-buffer (ping-pong) system utilizing DMA to overlap SPI sensor
  reads with DSP computations, ensuring zero dropped samples.
details:
  realistic_solution: Allocate two 1KB memory buffers. Configure the DMA controller
    to write SPI data to Buffer A while the CPU processes Buffer B. At 1 Mbps, a 1KB
    buffer fills in roughly 8ms. The CPU computation for Buffer B must complete strictly
    in under 8ms; an interrupt then toggles the buffer pointers for the next cycle.
  common_mistake: Using blocking CPU polling for the SPI reads, which stalls the Cortex-M4
    pipeline and breaks deterministic inference latency.
  napkin_math: 1 Mbps = 125 KB/s. 1KB buffer fill time = 1024 / 125,000 = 8.19 ms.
