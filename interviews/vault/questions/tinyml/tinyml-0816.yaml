title: Wake-Word Duty Cycle Evaluation Under Power Constraints
scenario: You are designing a battery-powered sensor using a Cortex-M4 that runs a
  wake-word model. The active inference phase (including sensor sampling) takes 20
  ms at 15 mW, and the deep sleep state consumes 10 µW. The device has a strict 40
  µW average power budget and a 2-second worst-case response latency SLO.
question: Evaluate the maximum allowable sampling frequency to meet the power budget,
  and determine if the architecture satisfies the latency SLO.
visual:
  kind: svg
  path: tinyml-0816.svg
  alt: Log-scale timeline diagram showing active power spikes of 15 mW lasting 20
    ms interspersed with a 10 micro-watt sleep state baseline over a 10 second period.
  caption: Power profile of the wake-word sensor duty cycle.
details:
  realistic_solution: The energy per inference is 15 mW * 20 ms = 300 µJ. To maintain
    an average active power of 30 µW (the 40 µW budget minus the 10 µW baseline sleep
    power), the maximum sampling frequency is 30 µW / 300 µJ = 0.1 Hz, which corresponds
    to a period of 10 seconds. A 10-second period results in a ~10-second worst-case
    response time, which severely violates the 2-second latency SLO, meaning the single-tier
    architecture is inadequate.
  common_mistake: Failing to subtract the baseline sleep power from the total budget
    before calculating the allowable active duty cycle, or confusing the units (mW
    vs µW vs µJ).
  napkin_math: E_inf = 15e-3 W * 0.02 s = 300 µJ. P_avail = 40 µW - 10 µW = 30 µW.
    f_max = 30 µW / 300 µJ = 0.1 Hz. T = 10s > 2s.
