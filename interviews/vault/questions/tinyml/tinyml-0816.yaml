title: Wake-Word Duty Cycle Evaluation Under Power Constraints
scenario: You are designing a battery-powered sensor that runs a wake-word model. The active inference phase takes 20 ms at 15 mW, and the deep sleep state consumes 10 µW. The device has a strict 40 µW average power budget and a 2-second worst-case response latency SLO.
question: Evaluate the maximum allowable sampling frequency to meet the power budget, and determine if the architecture satisfies the latency SLO.
visual:
  kind: svg
  path: tinyml-0816.svg
  alt: Log-scale timeline diagram showing active power spikes.
  caption: Power profile of the wake-word sensor duty cycle.
details:
  realistic_solution: "The energy per inference is 15 mW * 20 ms = 300 µJ. To maintain an average active power of 30 µW (the 40 µW budget minus the 10 µW baseline sleep power), the maximum sampling frequency is 30 µW / 300 µJ = 0.1 Hz, which corresponds to a period of 10 seconds. A 10-second period results in a ~10-second worst-case response time, which severely violates the 2-second latency SLO, meaning the single-tier architecture is inadequate."
  common_mistake: |
    **The Pitfall:** Failing to subtract the baseline sleep power from the total power budget.
    **The Rationale:** Candidates often divide the total budget by the active energy, forgetting that the device continuously drains power even when sleeping.
    **The Consequence:** The calculated duty cycle exceeds the power limits, killing the battery prematurely.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Active phase: 20 ms at 15 mW.
       - Deep sleep: 10 µW.
       - Constraint: 40 µW budget, 2-second latency SLO.
    2. **Calculations:**
       - Energy Per Inference: 15 mW * 20 ms = 300 µJ.
       - Available Active Power: 40 µW (Budget) - 10 µW (Sleep) = 30 µW.
       - Max Sampling Frequency: 30 µW / 300 µJ = 0.1 Hz.
       - Response Latency: 1 / 0.1 Hz = 10 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Architecture Inadequate (10s latency violates 2s SLO).**
