title: The Depthwise Dividend
scenario: You are optimizing a simple CNN for a Cortex-M4 microcontroller. To reduce the computational load, you are replacing a standard convolutional layer that uses a 3x3 kernel with a 3x3 depthwise separable convolution.
question: What is the approximate ratio of FLOPs between the standard and the optimized layer?
details:
  realistic_solution: The computational cost is reduced by a factor roughly equal to the kernel size squared. For a 3x3 kernel, the reduction is approximately 8-9x. This is because a standard convolution's cost scales with `Kernel^2 * Channels_Out`, while the depthwise separable version splits this into a depthwise step (cost proportional to `Kernel^2`) and a pointwise step (cost proportional to `Channels_Out`). The total cost is dominated by the pointwise step when channels are numerous, making the ratio of costs approximately `Kernel^2`.
  common_mistake: |
    **The Pitfall:** Underestimating the impact, believing savings are a small constant factor (e.g., 2x).
    **The Rationale:** Confusing the scaling factor, believing it is related to the number of channels rather than the kernel size squared.
    **The Consequence:** Failing to accurately estimate the performance gains of transitioning to depthwise separable convolutions.
  napkin_math: |
    1. **Standard MACs:** Cost scales with Kernel^2 * Channels_Out. For a 3x3 kernel with 64 channels: 3 * 3 * 64 = 576 MACs per pixel.
    2. **Depthwise Separable MACs:** Splits into depthwise (Kernel^2) + pointwise (Channels_Out). 3*3*1 + 1*1*64 = 9 + 64 = 73 MACs per pixel.
    3. **Reduction Ratio:** 576 / 73 = 7.89x.
    4. **Conclusion:** The computational reduction is approximately **8-9x**.
  options:
  - Approximately 2x reduction
  - Approximately 8-9x reduction
  - Approximately 64x reduction (equal to the number of output channels)
  - The reduction is equal to the stride of the convolution
  correct_index: 1
