title: The Depthwise Dividend
scenario: You are optimizing a simple CNN for a Cortex-M4 microcontroller. To reduce the computational
  load, you are replacing a standard convolutional layer that uses a 3x3 kernel with a 3x3 depthwise separable
  convolution. Identify the approximate computational reduction (the ratio of FLOPs between the standard
  and the optimized layer) you would expect from this change.
details:
  realistic_solution: The computational cost is reduced by a factor roughly equal to the kernel size squared.
    For a 3x3 kernel, the reduction is approximately 8-9x. This is because a standard convolution's cost
    scales with `Kernel^2 * Channels_Out`, while the depthwise separable version splits this into a depthwise
    step (cost proportional to `Kernel^2`) and a pointwise step (cost proportional to `Channels_Out`).
    The total cost is dominated by the pointwise step when channels are numerous, making the ratio of
    costs approximately `Kernel^2`.
  common_mistake: Engineers often recall that depthwise separable convolutions are more efficient but
    misremember the source and magnitude of the savings. A common error is to believe the savings are
    a small, constant factor (e.g., 2x), underestimating the impact. Another is to confuse the scaling
    factor, believing it's related to the number of channels rather than the kernel size.
  napkin_math: Let's compare the FLOPs for a single output pixel. Let K=3 be the kernel size and C_out
    be the number of output channels (e.g., C_out=64).
  options:
  - Approximately 2x reduction
  - Approximately 8-9x reduction
  - Approximately 64x reduction (equal to the number of output channels)
  - The reduction is equal to the stride of the convolution
  correct_index: 1
