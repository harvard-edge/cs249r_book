title: In-Place Depth-First Execution on Cortex-M4
scenario: An audio classification model on a Cortex-M4 has a peak activation footprint
  of 80KB, but the MCU only has 64KB of SRAM.
question: Apply in-place depth-first execution to reduce the peak memory footprint
  below 64KB.
details:
  realistic_solution: Instead of computing entire layers sequentially (breadth-first),
    tile the execution to compute small vertical patches of the network. By discarding
    intermediate activations as soon as the final output for that specific patch is
    generated, the peak SRAM requirement drops drastically.
  common_mistake: Running layers sequentially, causing intermediate activation tensors
    to exceed the physical SRAM.
  napkin_math: 80 * 0.5 = 40KB < 64KB
