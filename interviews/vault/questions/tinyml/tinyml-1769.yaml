title: In-Place Depth-First Execution on Cortex-M4
scenario: 'An audio classification model on a Cortex-M4 has a peak activation footprint of 80KB, but the MCU only has 64KB of SRAM.'
question: 'Apply in-place depth-first execution to reduce the peak memory footprint below 64KB.'
details:
  realistic_solution: 'Instead of computing entire layers sequentially (breadth-first), tile the execution to compute small vertical patches of the network. By discarding intermediate activations as soon as the final output for that specific patch is generated, the peak SRAM requirement drops drastically.'
  common_mistake: |
    **The Pitfall:** Running layers strictly sequentially (breadth-first).
    **The Rationale:** Candidates default to standard deep learning execution paths, fully materializing huge intermediate tensors.
    **The Consequence:** The model crashes with an Out-Of-Memory error because the intermediate activations exceed the 64KB limit.
  napkin_math: |
    **Assumptions & Constraints:**
    - Breadth-first peak memory: 80 KB.
    - SRAM limit: 64 KB.

    **Calculations:**
    - Depth-first execution (e.g., tiling by half): 80 KB * 0.5 = 40 KB.

    **Conclusion & Interpretation:**
    - **Result: 40 KB peak memory ([Memory-Bound])**. 40 KB peak memory easily fits under the 64 KB limit.
