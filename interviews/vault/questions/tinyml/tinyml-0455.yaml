title: The Vision Transformer Memory Trap
scenario: "You're deploying a person-detection model on a smart doorbell camera equipped with a Cortex-M7 microcontroller (MCU) that has 512KB of SRAM. You have two models with identical accuracy: a MobileNetV2-style CNN and a small Vision Transformer (ViT). The ViT has fewer parameters. During inference, the CNN's largest activation map is 14x14x160 (FP32). The ViT operates on 196 patches (14x14 sequence) with an embedding dimension of 256. Its largest memory consumer is the N-by-N attention score matrix inside the transformer block."
question: 'Which person-detection model fits a 512 KB Cortex-M7: MobileNetV2 activations or a ViT attention matrix?'
details:
  realistic_solution: The key is to calculate the peak SRAM usage for each model. The CNN's peak activation size fits comfortably within the MCU's SRAM. However, the ViT's self-attention mechanism requires instantiating an attention matrix of size N x N, where N is the sequence length (number of patches). This quadratic memory scaling makes it infeasible for the limited SRAM of the microcontroller, even if its parameter count is smaller. The CNN is the only deployable option.
  common_mistake: |
    **The Pitfall:** Assuming fewer parameters always means a smaller peak memory footprint.
    **The Rationale:** Engineers with cloud backgrounds equate parameter count to model size, forgetting that for TinyML, peak SRAM usage (dominated by activations) is the primary constraint.
    **The Consequence:** Deploying a model that easily fits in Flash but instantly causes an Out-of-Memory (OOM) error in SRAM during inference.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SRAM Limit: 512 KB.
       - CNN Peak: 14x14x160 FP32.
       - ViT Tokens: 196 (4 heads).
    2. **Calculations:**
       - CNN Peak Activation: 14 * 14 * 160 * 4 = 125,440 Bytes (~122.5 KB).
       - ViT Attention Matrix (per head): 196 * 196 * 4 Bytes = 153,664 Bytes (~150 KB).
       - ViT Total (4 heads): 4 * 150 KB = 600 KB.
    3. **Conclusion & Interpretation:**
       - **Result: 600 KB > 512 KB.** ViT self-attention quadratic scaling causes OOM; only the CNN fits.
  options:
  - The ViT, because it has fewer parameters and is more modern.
  - The CNN, because the ViT's quadratic memory scaling in its MLP or attention block exceeds the MCU's SRAM.
  - Both will fit easily, as 512KB is plenty of memory for either model architecture.
  - Neither will fit; both CNNs and ViTs require multiple megabytes of SRAM for vision tasks.
  correct_index: 1
