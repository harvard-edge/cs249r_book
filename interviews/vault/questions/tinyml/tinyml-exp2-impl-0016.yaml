title: Calculate End-to-End Wake Word Pipeline Latency
scenario: You are deploying a quantized INT8 keyword spotting model on an ARM Cortex-M4 (STM32F4) microcontroller
  with 256 KB SRAM and 1 MB flash. The MCU runs at 168 MHz and lacks an FPU, but features CMSIS-NN SIMD
  instructions capable of executing 2 INT8 MACs per clock cycle. The end-to-end pipeline requires 8 ms
  for MFCC audio preprocessing and 1 ms for post-processing. If the neural network requires exactly 1,680,000
  MAC operations per inference, calculate the theoretical minimum end-to-end latency for a single audio
  frame assuming 100% MAC utilization.
details:
  realistic_solution: The correct approach decomposes the pipeline into its distinct stages and sums their
    latencies. For the inference stage, the hardware throughput must be calculated by multiplying the
    clock rate by the SIMD MAC operations per cycle. The theoretical minimum inference time is then derived
    and added to the fixed peripheral processing times to establish the final end-to-end latency.
  common_mistake: Candidates often forget to account for the 2x MACs per cycle throughput provided by
    the CMSIS-NN SIMD instructions, resulting in doubled calculated inference time. They may also focus
    purely on the model inference and forget to sum the preprocessing and post-processing times for the
    full end-to-end latency.
  napkin_math: '1. MCU Clock: 168 MHz = 168,000,000 cycles/sec.

    2. MAC Throughput: 168,000,000 cycles/sec * 2 INT8 MACs/cycle = 336,000,000 MACs/sec.

    3. Inference Latency: 1,680,000 MACs / 336,000,000 MACs/sec = 0.005 seconds = 5 ms.

    4. Total End-to-End Latency: 8 ms (preprocessing) + 5 ms (inference) + 1 ms (post-processing) = 14
    ms.'
