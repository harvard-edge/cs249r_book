title: TinyML Tensor Arena Headroom
scenario: A TFLite Micro model needs 96 KB weights in flash, 72 KB peak activations, 24 KB input/output buffers, and 18 KB runtime scratch. The MCU has 192 KB SRAM, of which the RTOS reserves 48 KB.
question: Does the TensorFlow Lite Micro arena fit in 192 KB SRAM after a 48 KB RTOS reserve?
details:
  realistic_solution: Available SRAM is 144 KB. The arena needs 72 + 24 + 18 = 114 KB; weights are in flash and do not count against SRAM. The arena fits with 30 KB headroom.
  common_mistake: |
    **The Pitfall:** Adding flash-resident weights to SRAM demand.
    **The Rationale:** Candidates forget that weights can be executed in place (XIP) directly from flash on many microcontrollers.
    **The Consequence:** They falsely conclude the model will not fit, rejecting a viable deployment target.
  napkin_math: |
    - Calculate available SRAM: 192 KB - 48 KB (RTOS) = 144 KB.
    - Calculate arena requirement: 72 KB (activations) + 24 KB (I/O) + 18 KB (scratch) = 114 KB.
    - Note: 96 KB weights are stored in flash and do not count against SRAM.
    - **Headroom: 144 KB - 114 KB = 30 KB. The arena comfortably fits.**
