title: Dataset Specification for Constrained INT8 Acoustic Models
scenario: You are tasked with specifying the dataset curation and labeling pipeline for an acoustic anomaly
  detection model targeting an ARM Cortex-M7 + Ethos-U55 (Corstone-300) system. The hardware has a strict
  limit of 512 KB shared SRAM, meaning the model must be heavily quantized to INT8 to fit and to leverage
  the NPU's MAC array. Given the extremely constrained capacity of the final model, design a dataset selection
  and active learning strategy that balances diverse background noises against the severe risk of underfitting.
  How do you specify the curation workflow to ensure the resulting dataset yields a robust INT8-quantized
  model optimized for the Ethos-U55?
question: "How do you specify the curation workflow to ensure the resulting dataset yields a robust INT8-quantized model optimized for the Ethos-U55?"
details:
  realistic_solution: The workflow should specify a targeted active learning loop that prioritizes hard
    negatives only if they frequently trigger false positives in the target environment, avoiding adding
    all possible noise types. The annotation specification must include strict event boundaries to maximize
    information density per frame. Crucially, the pipeline must automatically isolate a strictly balanced
    offline calibration dataset (e.g., 100-500 samples) that perfectly matches the deployment distribution
    to ensure the Vela compiler calculates optimal INT8 activation ranges for the Ethos-U55.
  common_mistake: Candidates often propose massive, highly diverse datasets typical of cloud ML, ignoring
    that a deeply constrained INT8 model lacks the capacity to learn overly complex, noisy distributions,
    leading to severe underfitting. They also frequently overlook the need to curate a highly specific,
    strictly balanced calibration subset for the offline quantization process.
  napkin_math: To fit the 512 KB shared SRAM, we might allocate 350 KB for the INT8 model (e.g., 250 KB
    weights, 100 KB activations). A 1-second 16kHz audio sample takes 32 KB. To curate a reliable calibration
    set for the Vela compiler's INT8 quantization, we need ~500 representative samples. 500 * 32 KB =
    16 MB of raw audio. Since 16 MB is far larger than the 512 KB SRAM, the pipeline must specify that
    calibration dataset selection happens offline. The Ethos-U55 provides 122.8 GMAC/s peak throughput
    (480 MHz * 256 MAC/cycle), executing a 10M MAC model in ~0.08 ms. This proves the system is strictly
    memory-bound (512 KB), dictating that the dataset curation strategy must aggressively filter training
    examples to avoid overwhelming the 250 KB model's limited representation capacity.
