title: The TinyML Tensor Arena Squeeze
scenario: You are deploying a keyword spotting model on a Cortex-M4 microcontroller. After analyzing the model graph, you determine the point of peak memory usage occurs during the execution of Layer 5. At this moment, TensorFlow Lite needs to hold the input tensor for Layer 5 (which is the output from Layer 4) and the output tensor for Layer 5 in memory concurrently. Layer 4 output tensor dimensions are 8x8x16 (INT8 precision). Layer 5 output tensor dimensions are 8x8x32 (INT8 precision).
question: What peak tensor arena memory is needed at Layer 5, and does it fit within 256 KB SRAM?
details:
  realistic_solution: 'The Tensor Arena is a statically allocated block of memory in SRAM used for all input, output, and intermediate tensors. To find the peak usage, you must identify the point in the model''s execution where the sum of all concurrently live tensors is at its maximum.'
  common_mistake: |
    **The Pitfall:** Only accounting for the single largest tensor in memory.
    **The Rationale:** Candidates often focus purely on the output tensor size, forgetting that the inputs to a layer must safely coexist in memory with its outputs during the operator execution.
    **The Consequence:** This leads to underestimating the peak memory requirement, resulting in unexpected out-of-memory errors during real-time deployment.
  napkin_math: |
    **Assumptions & Constraints:**
    - Layer 4 Output (L5 Input): 8x8x16 INT8.
    - Layer 5 Output: 8x8x32 INT8.
    - Precision: INT8 (1 byte per element).

    **Calculations:**
    - L5 Input Size: 8 * 8 * 16 * 1 = 1,024 bytes (1.0 KB).
    - L5 Output Size: 8 * 8 * 32 * 1 = 2,048 bytes (2.0 KB).
    - Peak Memory at Layer 5: 1.0 KB (input) + 2.0 KB (output) = 3.0 KB.

    **Conclusion & Interpretation:**
    - **Result: 3.0 KB (Memory-Bound)**. 3.0 KB is the minimum required size for these tensors concurrently residing in the arena.
  options:
  - '2.0 KB. The arena only needs to hold the single largest tensor (Layer 5 output).'
  - '1.0 KB. Only the smallest input tensor matters.'
  - '3.0 KB. The sum of the input (1.0 KB) and output (2.0 KB) tensors for the peak operation.'
  - '6.0 KB. You must sum all tensors in the model.'
  correct_index: 2
