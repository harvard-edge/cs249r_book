title: The TinyML Tensor Arena Squeeze
scenario: You are deploying a keyword spotting model on a Cortex-M4 microcontroller which has 256 KB of SRAM. After analyzing the model graph, you determine the point of peak memory usage occurs during the execution of Layer 5. At this moment, TensorFlow Lite needs to hold the input tensor for Layer 5 (which is the output from Layer 4) and the output tensor for Layer 5 in memory concurrently. Layer 4 output tensor dimensions are 8x8x16 (INT8 precision). Layer 5 output tensor dimensions are 8x8x32 (INT8 precision).
question: What peak tensor arena memory is needed at Layer 5, and does it fit within 256 KB SRAM?
details:
  realistic_solution: The Tensor Arena is a statically allocated block of memory in SRAM used for all input, output, and intermediate tensors. To find the peak usage, you must identify the point in the model's execution where the sum of all concurrently live tensors is at its maximum.
  common_mistake: |
    **The Pitfall:** Only accounting for the single largest tensor.
    **The Rationale:** Candidates often focus on the 2.0 KB output of Layer 5, forgetting that the inputs to a layer must coexist in memory with its outputs.
    **The Consequence:** This leads to underestimating the peak memory requirement and potential out-of-memory errors during runtime.
  napkin_math: |
    - Calculate L4 Output Size (Input to L5): 8 × 8 × 16 × 1 byte = 1,024 bytes (1.0 KB).
    - Calculate L5 Output Size: 8 × 8 × 32 × 1 byte = 2,048 bytes (2.0 KB).
    - Calculate Peak Memory at Layer 5: 1,024 bytes + 2,048 bytes = 3,072 bytes (3.0 KB).
    - **Conclusion:** 3.0 KB is the minimum required size for these tensors. It fits easily within the 256 KB SRAM budget.
  options:
  - 2.0 KB. The arena only needs to hold the single largest tensor (Layer 5 output).
  - 1.0 KB. Only the smallest input tensor matters.
  - 3.0 KB. The sum of the input (1.0 KB) and output (2.0 KB) tensors for the peak operation.
  - 6.0 KB. You must sum all tensors in the model.
  correct_index: 2
