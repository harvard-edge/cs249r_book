title: Ethos-U55 Memory Hierarchy Design
scenario: You are designing a vision-based anomaly detection system on an ARM Cortex-M7 + Ethos-U55 (Corstone-300)
  platform. The system operates at 480 MHz and features exactly 512 KB of SRAM, which is shared between
  the M7 and the U55 NPU. You need to deploy a 1.5 MB quantized CNN, meaning weights must reside in external
  QSPI Flash. Design a memory hierarchy and scheduling strategy to maximize the U55's utilization (which
  supports up to 512 MAC/cycle) while preventing the shared SRAM from becoming a bottleneck for the M7's
  RTOS tasks.
details:
  realistic_solution: The optimal design implements depth-first scheduling (layer fusion) to keep intermediate
    activations entirely within the 512 KB SRAM, preventing intermediate trips to Flash. The system should
    use double-buffered DMA transfers for weights, streaming them from QSPI Flash into a dedicated SRAM
    partition while the U55 computes the previous chunk, utilizing the U55's built-in weight decoder to
    decompress weights on the fly.
  common_mistake: Candidates often assume the NPU's peak compute dictates inference time, failing to realize
    that external Flash bandwidth completely bottlenecks the system. They also frequently overlook the
    SRAM contention between the U55 fetching activations and the M7 handling interrupts or I/O.
  napkin_math: 'Assuming the U55 uses the 256 MAC/cycle configuration at 480 MHz, peak compute is ~122.8
    GMAC/s. A convolution layer with 5M MACs and 100 KB of weights takes ~19,531 cycles to compute (40.7
    µs). However, fetching 100 KB of weights from a typical 50 MB/s QSPI Flash takes 2 ms. The memory
    transfer is ~50x slower than the compute! To mitigate this, the 512 KB SRAM must be carefully partitioned:
    128 KB for M7/RTOS, 256 KB for ping-pong activation buffers, and 128 KB for double-buffered compressed
    weights, relying on weight compression (e.g., 4x) to reduce the Flash read time to 500 µs per layer.'
