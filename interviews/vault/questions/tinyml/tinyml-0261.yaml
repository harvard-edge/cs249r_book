title: 'The Interrupt Deadline: Real-Time Deadlines'
scenario: You are designing a keyword spotting model for a low-power microcontroller that triggers on a hardware interrupt. The inference must complete before the next interrupt arrives to avoid dropping data.
question: What hard real-time latency budget is typical for interrupt-driven TinyML inference?
details:
  realistic_solution: |
    The standard latency budget is roughly 1 millisecond. Inference triggered by a sensor's data-ready interrupt must complete before the hardware buffer overwrites, requiring a strict real-time deadline.
  common_mistake: |
    **The Pitfall:** Applying mobile or edge latency budgets (16ms-33ms) to microcontrollers.
    **The Rationale:** Candidates confuse the UI 'jank' budget or video frame rate budget with hardware sensor deadlines.
    **The Consequence:** The system drops real-time sensor data because the inference pipeline misses the hardware buffer cycle.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Mobile UI jank budget: ~16ms
       - Edge video frame budget: ~33ms
       - Sensor interrupt buffer: ~1ms
    2. **Calculations:**
       - Stricter deadline factor vs mobile = 16ms / 1ms = 16x
       - Stricter deadline factor vs edge = 33ms / 1ms = 33x
    3. **Conclusion & Interpretation:**
       - **Result: ~1 ms. Latency-Bound.** Interrupt-driven TinyML systems operate on a fundamentally tighter timescale.
  options:
  - ~100 ms
  - ~33 ms
  - ~16 ms
  - ~1 ms
  correct_index: 3
