title: ESP32-S3 Speech-to-Intent Latency Breakdown
scenario: You are architecting a local speech-to-intent engine on an ESP32-S3 microcontroller (240 MHz
  dual-core Xtensa, 512 KB SRAM, 8 MB PSRAM, WiFi/BLE, INT8 vector extensions). The pipeline captures
  audio, extracts MFCC features, runs a 2.5M parameter INT8 autoregressive sequence model to generate
  a 5-token intent, and transmits the command via WiFi. Evaluate the end-to-end latency by decomposing
  it into preprocessing, Time to First Token (TTFT), Time per Output Token (TPOT), and network transmission,
  given the platform's specific memory hierarchy.
question: "How should you decompose end-to-end speech-to-intent latency on an ESP32-S3 running a 2.5M-parameter autoregressive model?"
details:
  realistic_solution: The correct approach recognizes that autoregressive generation (batch size of 1)
    is entirely memory-bandwidth bound. While compute is heavily accelerated by the INT8 vector extensions,
    fetching weights from PSRAM dominates the time per output token. A comprehensive L5 response decomposes
    latency into SRAM-based preprocessing, PSRAM-bound TPOT, and fixed WiFi overhead.
  common_mistake: Candidates often assume latency is compute-bound by the 240 MHz CPU, overlooking that
    the 2.5MB model exceeds the 512KB SRAM and must reside in PSRAM. They fail to account for the massive
    memory bandwidth bottleneck of PSRAM (typically ~80 MB/s) which heavily dictates TPOT for autoregressive
    generation.
  napkin_math: '1) Preprocessing (MFCCs in SRAM): ~20ms. 2) PSRAM Bandwidth (Octal SPI): ~80 MB/s. 3)
    TPOT: Fetching 2.5MB INT8 weights per token = 2.5 MB / 80 MB/s = 31.25ms. Compute (2.5M MACs @ 240MHz
    with vectorization) takes <5ms, making total TPOT ~35ms. 4) TTFT: Preprocessing (20ms) + First Token
    (35ms) = 55ms. 5) 5-Token Generation: TTFT (55ms) + 4 * TPOT (140ms) = 195ms. 6) Network: WiFi wake
    and payload transmission = ~150ms. Total End-to-End Latency: 195ms + 150ms = 345ms.'
