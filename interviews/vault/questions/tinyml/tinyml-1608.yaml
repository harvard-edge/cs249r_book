title: Identify TinyML memory regions for static weights and dynamic activations
scenario: A Cortex-M4 microcontroller has 256KB of SRAM and 1MB of Flash. A TensorFlow Lite for Microcontrollers model requires 800KB for weights and 150KB for intermediate activation buffers.
question: Identify the correct memory regions where the weights and activation buffers must be placed to fit this model on the device.
details:
  realistic_solution: The 800KB weights are strictly read-only and must be compiled directly into the 1MB non-volatile Flash memory. The 150KB intermediate activation buffers (the tensor arena) are read-write and must be allocated in the 256KB volatile SRAM.
  common_mistake: |
    **The Pitfall:** Attempting to load the entire model (weights and activations) into SRAM at startup.
    **The Rationale:** This is standard practice in desktop or cloud ML, where the entire model is loaded into RAM/VRAM.
    **The Consequence:** Immediate failure with an out-of-memory error since 800 KB > 256 KB SRAM.
  napkin_math: |
    1. **Weights Validation:** 800 KB weights < 1,024 KB (1 MB) Flash memory.
    2. **Activations Validation:** 150 KB activations < 256 KB SRAM memory.
    3. **Result:** The **800 KB weights reside in Flash**, and the **150 KB tensor arena resides in SRAM**.
