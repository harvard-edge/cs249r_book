title: Identify TinyML memory regions for static weights and dynamic activations
scenario: A Cortex-M4 microcontroller has 256KB of SRAM and 1MB of Flash. A TensorFlow
  Lite for Microcontrollers model requires 800KB for weights and 150KB for intermediate
  activation buffers.
question: Identify the correct memory regions where the weights and activation buffers
  must be placed to fit this model on the device.
details:
  realistic_solution: The 800KB weights are strictly read-only and must be compiled
    directly into the 1MB non-volatile Flash memory. The 150KB intermediate activation
    buffers (the tensor arena) are read-write and must be allocated in the 256KB volatile
    SRAM.
  common_mistake: Attempting to load the entire model into SRAM at startup, which
    will immediately fail with an out-of-memory error since 800KB > 256KB.
  napkin_math: 800KB weights < 1MB Flash, 150KB activations < 256KB SRAM
