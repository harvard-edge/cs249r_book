title: OTA Rollback due to Shared SRAM Exhaustion
scenario: A Corstone-300 system (ARM Cortex-M7 at 480 MHz + Ethos-U55) uses an A/B partition scheme for
  OTA firmware updates. The platform has exactly 512 KB of shared SRAM between the M7 and U55. The baseline
  firmware requires 200 KB of SRAM for the RTOS, TLS network stack, and OTA agent to connect to the cloud
  and acknowledge updates. A new OTA payload is downloaded containing an updated vision model requiring
  a 320 KB tensor arena. Upon rebooting into the new partition, the device successfully verifies the firmware
  signature and begins booting, but triggers a watchdog reset during system initialization, causing an
  automatic rollback to the previous partition. Based on the system architecture, why does this runtime
  failure occur?
question: "Why does a Corstone-300 OTA rollback after boot when a 320 KB tensor arena and 200 KB network stack share 512 KB SRAM?"
details:
  realistic_solution: The rollback occurs due to an Out-Of-Memory (OOM) or HardFault during the initialization
    phase. Because the Ethos-U55 NPU and Cortex-M7 share the unified 512 KB SRAM pool, allocating the
    newly sized 320 KB tensor arena concurrently with the 200 KB needed by the RTOS and network stack
    exceeds the physical memory limit. The system crashes before it can successfully send the OTA acknowledgment
    over the network, which lets the watchdog timer expire and safely revert the device to the working
    firmware partition.
  common_mistake: Candidates often assume the failure is related to Flash memory constraints in the A/B
    partition scheme, a corrupted OTA payload, or an invalid firmware signature. They frequently fail
    to analyze the runtime memory requirements and overlook the architectural detail that the M7 and Ethos-U55
    share the exact same physical SRAM pool.
  napkin_math: Total available shared SRAM = 512 KB. Required memory for RTOS/Network/OTA agent = 200
    KB. Required memory for Ethos-U55 Tensor Arena = 320 KB. Total required SRAM during boot/acknowledgment
    = 200 KB + 320 KB = 520 KB. 520 KB > 512 KB (Total SRAM), resulting in an 8 KB memory deficit.
