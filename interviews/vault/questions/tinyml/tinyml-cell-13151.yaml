title: 'TinyML TCO Analyze: Power Dominates Cost for Battery-Powered TinyML'
scenario: 'Analyze the TCO for 1000 battery-powered ESP32-S3 (168MHz, 512KB SRAM, 8MB PSRAM) soil moisture
  sensors running TinyML inference (keyword detection every 10 minutes). Battery: 2xAA = 3Wh at $0.50/pair.
  Hardware: $5/unit. Analyze: battery replacement cost, battery change frequency, and whether switching
  to Cortex-M4+Ethos-U55 ($3/unit, 480MHz, 15mW active) reduces 5-year TCO.'
question: "How would you analyze : battery replacement cost, battery change frequency, and whether switching to Cortex-M4+Ethos-U55 ($3/unit, 480MHz, 15mW active) reduces 5-year TCO?"
details:
  realistic_solution: 'ESP32-S3 battery life: 24.5 days → 14.9 replacements/yr. Labor cost: $400/day ×
    20 days/replacement × 14.9 replacements/yr = $119,200/yr labor. Total annual: $7,450 + $119,200 =
    $126,650/yr for 1000 units.'
  common_mistake: Not calculating battery replacement frequency based on actual power consumption duty
    cycle, and forgetting that battery replacement requires technician visits (labor cost often exceeds
    battery cost).
  napkin_math: 'ESP32-S3 avg: 5.1mW. Battery 3Wh: 3000mWh/5.1mW=588hr=24.5 days. Battery cost/unit/yr:
    $0.50*(365/24.5)=$7.45. Replacements/yr: 365/24.5=14.9. Labor to replace 1000 units at 14.9 times/yr:
    $400/day × (1000/50 days per replacement) × 14.9 replacements/yr = $400/day × 20 days × 14.9 = $119,200/yr.
    Total: $7450+$119,200=$126,650/yr. M4+Ethos: avg 0.0025mW. Battery: 3000mWh/0.0025mW=1.2M hr=136 yr.
    No replacement needed. 5yr: ESP32=$5*1000+5*$126,650=$638,250. M4+Ethos=$3*1000=$3,000. Savings: $635,250.'
