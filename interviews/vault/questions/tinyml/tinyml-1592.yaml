title: Swarm Broadcast Scalability Limit
scenario: A swarm of 8 Cortex-M4 micro-robots shares mapped bounding boxes over a
  low-power mesh RF network (e.g., Bluetooth Mesh or Zigbee).
question: Analyze the scalability bottleneck of a naive all-to-all broadcast protocol
  within this constrained single-collision-domain RF mesh.
visual:
  kind: svg
  path: tinyml-1592.svg
  alt: Diagram showing nodes broadcasting simultaneously into a shared central collision
    zone.
  caption: RF Mesh Collision Domain
details:
  realistic_solution: In a single-collision domain, only one node can transmit successfully
    at a time. If all N nodes try to broadcast to all other N-1 nodes simultaneously,
    the number of required transmissions scales as O(N), but the collision probability
    scales exponentially. CSMA/CA backoffs will choke the channel, limiting effective
    bandwidth to near-zero as N grows.
  common_mistake: Thinking the limitation is the CPU speed of the Cortex-M4 rather
    than the physics of shared medium RF interference.
  napkin_math: Collisions scale heavily as N increases
