title: Swarm Broadcast Scalability Limit
scenario: A swarm of 8 Cortex-M4 micro-robots shares mapped bounding boxes over a low-power mesh RF network (e.g., Bluetooth Mesh or Zigbee).
question: Analyze the scalability bottleneck of a naive all-to-all broadcast protocol within this constrained single-collision-domain RF mesh.
visual:
  kind: svg
  path: tinyml-1592.svg
  alt: Diagram showing nodes broadcasting simultaneously into a shared central collision zone.
  caption: RF Mesh Collision Domain
details:
  realistic_solution: In a single-collision domain, only one node can transmit successfully at a time. If all N nodes try to broadcast to all other N-1 nodes simultaneously, the number of required transmissions scales as O(N^2), but the collision probability scales exponentially. CSMA/CA backoffs will choke the channel, limiting effective bandwidth to near-zero as N grows.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is CPU bound rather than medium-bound.
    **The Rationale:** Engineers familiar with cloud computing assume network constraints are just a matter of bandwidth, forgetting the physics of shared-medium RF interference.
    **The Consequence:** The system experiences massive packet loss and exponential CSMA/CA backoffs, causing the swarm's communication to completely halt as network size scales.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Swarm size: N nodes.
       - Protocol: All-to-all broadcast in a single RF collision domain (e.g., CSMA/CA).
    2. **Calculations:**
       - Transmissions per cycle: O(N²).
       - Collision probability approaches 1 as N increases.
       - Exponential backoff timers scale geometrically.
    3. **Conclusion & Interpretation:**
       - **Result: Medium-Bound Network Collapse.** Effective bandwidth approaches zero due to compounding CSMA/CA backoffs, making naive broadcast non-viable for scaled swarms.
