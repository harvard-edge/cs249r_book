title: Acoustic Pipeline Scheduling on Dual-Core MCU
scenario: You are designing an always-on acoustic anomaly detection system using the
  Nordic nRF5340 dual-core MCU (1 MB flash, 256 KB SRAM). The system must process
  audio frames, run a neural network inference, and transmit alerts over BLE 5.3 within
  a strict 50ms latency budget. Given the 128 MHz application core and 64 MHz network
  core, how do you partition and schedule the pipeline to guarantee this real-time
  deadline while respecting the ~5mA active current constraint?
question: Given the 128 MHz application core and 64 MHz network core, how do you partition
  and schedule the pipeline to guarantee this real-time deadline while respecting
  the ~5mA active current constraint?
details:
  realistic_solution: The architecture must partition the workload to decouple deterministic
    inference from non-deterministic radio events. The 128 MHz application core executes
    the ML inference to minimize active compute time, then returns to sleep. Upon
    detecting an anomaly, it sends a minimal alert payload via IPC to the 64 MHz network
    core. The network core independently manages the BLE 5.3 stack and queues the
    transmission, ensuring the radio schedule does not block the application core's
    deadlines.
  common_mistake: Candidates often schedule the entire pipeline sequentially on the
    application core or fail to account for the asynchronous nature of the BLE stack.
    They frequently overlook the synchronization latency between the 128 MHz app core
    and the 64 MHz net core, leading to worst-case execution time (WCET) violations.
  napkin_math: 'Assuming the ML model requires 2.5 million operations. App core (128
    MHz) execution time: 2.5M / 128,000,000 = 19.5ms. Active energy cost: 19.5ms *
    ~5mA = 0.027 uAh. Inter-core IPC latency = 0.5ms. Remaining deadline budget for
    radio: 50ms - 19.5ms - 0.5ms = 30ms. With the 64 MHz network core managing a BLE
    5.3 connection interval of 15ms, the transmission is guaranteed to occur within
    the remaining 30ms window.'
