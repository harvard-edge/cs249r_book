title: Acoustic Pipeline Scheduling on Dual-Core MCU
scenario: >
  An always-on acoustic anomaly detection system uses the Nordic nRF5340 dual-core MCU.
  The system must process audio frames, run inference, and transmit BLE 5.3 alerts within a strict 50ms latency budget.
question: Given the 128 MHz app core and 64 MHz net core, how do you partition the pipeline to guarantee this deadline while respecting a ~5mA current limit?
details:
  realistic_solution: |
    The architecture must partition the workload to decouple deterministic inference from non-deterministic radio events. The 128 MHz application core executes the ML inference to minimize active compute time, then returns to sleep. Upon detecting an anomaly, it sends a minimal alert payload via IPC to the 64 MHz network core. The network core independently manages the BLE 5.3 stack and queues the transmission, ensuring the radio schedule does not block the application core's deadlines.
  common_mistake: |
    **The Pitfall:** Scheduling the entire pipeline sequentially on the application core or failing to account for asynchronous BLE stacks.
    **The Rationale:** Candidates overlook the inter-core synchronization latency between the 128 MHz app core and the 64 MHz net core.
    **The Consequence:** Worst-case execution time (WCET) violations lead to missed real-time deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - App core: 128 MHz. Net core: 64 MHz.
    - Deadline: 50 ms.
    - App core compute: 2.5M ops.

    **Calculations:**
    - Compute time: 2.5M ops / 128e6 Hz = 19.5 ms.
    - IPC latency: ~0.5 ms.
    - Remaining radio budget: 50 ms - 19.5 ms - 0.5 ms = 30 ms.
    - A BLE connection interval of 15ms guarantees transmission within the 30ms window.

    **Conclusion & Interpretation:**
    - **Result: Latency-Feasible (30ms margin)**. Partitioning guarantees the radio transmits within the window.
