title: Acoustic Monitor Power Budgeting
scenario: A battery-operated acoustic anomaly monitor uses a Cortex-M4 at 80 MHz.
  The sensor pipeline (MFCC + CNN) requires 5 million MAC operations per inference
  and must run continuously at 10 inferences per second.
question: Evaluate the exact CPU cycle requirements and design a system frequency
  configuration to ensure the device remains under a 15mW active compute power budget.
details:
  realistic_solution: Running at 10 inferences per second requires 50 million MACs
    per second. Given the Cortex-M4's DSP instructions (e.g., SIMD MACs), the CPU
    can theoretically achieve >1 MAC/cycle. The candidate should propose lowering
    the clock frequency from 80 MHz to around 50-60 MHz to just meet the 50M MACs/s
    deadline while scaling down the voltage, dramatically dropping the dynamic power
    consumption (P = C V^2 f).
  common_mistake: Keeping the clock at 80 MHz and relying purely on race-to-sleep,
    failing to recognize that voltage scaling at lower frequencies yields better quadratic
    power savings.
  napkin_math: 5M MACs * 10 Hz = 50M MACs/s; requires ~50 MHz minimum clock with DSP
    extensions.
