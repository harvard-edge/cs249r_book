title: Acoustic Monitor Power Budgeting
scenario: A battery-operated acoustic anomaly monitor uses a Cortex-M4 at 80 MHz. The sensor pipeline (MFCC + CNN) requires 5 million MAC operations per inference and must run continuously at 10 inferences per second.
question: Evaluate the exact CPU cycle requirements and design a system frequency configuration to ensure the device remains under a 15mW active compute power budget.
details:
  realistic_solution: 'Running at 10 inferences per second requires 50 million MACs per second. Given the Cortex-M4''s DSP instructions (e.g., SIMD MACs), the CPU can theoretically achieve >1 MAC/cycle. The candidate should propose lowering the clock frequency from 80 MHz to around 50-60 MHz to just meet the deadline while scaling down the voltage, dramatically dropping the dynamic power consumption (P = C V^2 f).'
  common_mistake: |
    **The Pitfall:** Relying purely on race-to-sleep instead of voltage scaling.
    **The Rationale:** Engineers keep the clock speed at the maximum 80 MHz to finish quickly and sleep, failing to recognize that scaling down the frequency allows scaling down the voltage.
    **The Consequence:** They miss the quadratic power savings of voltage scaling, causing the device to blow past the strict 15mW active compute power budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - MCU: Cortex-M4 at 80 MHz max.
       - Model cost: 5 million MACs.
       - Inference rate: 10 Hz.
       - Budget: 15mW active.
    2. **Calculations:**
       - Compute throughput required: 5M MACs * 10 Hz = 50M MACs/sec.
       - CPU scaling: With DSP instructions (e.g., SIMD), the M4 achieves roughly 1 MAC/cycle.
       - Minimum clock frequency needed: 50 MHz.
    3. **Conclusion & Interpretation:**
       - **Result: Energy-Bound Compute.** Lowering the clock frequency from 80 MHz to ~50-60 MHz allows for proportional voltage reduction, drastically cutting dynamic power while safely meeting the 50M MACs/s deadline.
