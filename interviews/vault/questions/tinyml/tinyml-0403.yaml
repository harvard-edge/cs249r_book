title: 'The TCO of Privacy: Federated vs. Centralized Data Upload'
scenario: You manage 10,000 smart audio sensors. Each device captures 1 hour of raw audio (16-bit, 16kHz mono) per day. Strategy 1 uploads all raw audio at $0.05/GB. Strategy 2 trains on-device and uploads a 100 KB model update daily per device at the same rate.
question: Which strategy is more economical for data transfer over a year, and what are the approximate costs?
details:
  realistic_solution: Federated Learning is overwhelmingly more economical. The centralized approach costs approximately $21,000 per year in data ingress fees alone, whereas the federated approach costs only about $18. The ~1,150x cost reduction makes a strong economic case for on-device learning, in addition to the privacy benefits of not uploading raw user audio.
  common_mistake: |
    **The Pitfall:** Miscalculating total data volume by orders of magnitude.
    **The Rationale:** Candidates forget to convert bits to bytes, confuse KB with MB, or calculate the cost for a single device instead of the entire 10,000-unit fleet.
    **The Consequence:** A massive underestimation of the TCO of centralized data ingestion, leading to financially unviable system architectures.
  napkin_math: |
    *   **Strategy 1 (Raw Audio):** 16,000 samples/sec * 2 bytes * 3600 sec = 115.2 MB/day/device.
    *   **Strategy 1 Annual:** 115.2 MB * 10,000 devices * 365 days ≈ 420,480 GB/year. Cost = 420,480 * $0.05 = **~$21,024**.
    *   **Strategy 2 (Federated):** 100 KB * 10,000 devices = 1 GB/day.
    *   **Strategy 2 Annual:** 1 GB * 365 days = 365 GB/year. Cost = 365 * $0.05 = **~$18.25**.
    *   **Conclusion:** Federated learning is astronomically cheaper (~$18 vs ~$21,000).
  options:
  - 'The costs are comparable, with Federated Learning saving only a few thousand dollars (Centralized: ~$21,000 vs. Federated: ~$18,000).'
  - Federated Learning is vastly cheaper, costing about $18 per year compared to over $21,000 for the centralized approach.
  - The centralized approach is cheaper, as the 100 KB daily model update is larger than the raw audio stream.
  - The centralized approach costs about $2,600 per year, making it more expensive than Federated Learning, but still feasible.
  correct_index: 1
