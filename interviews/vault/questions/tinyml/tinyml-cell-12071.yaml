title: 'Model Format Conversion: Size TFLM Deployment for ESP32-S3 with PSRAM'
scenario: Size the memory layout for deploying MobileNetV1-0.25 (475K INT8 params, 14.9 MOPs) on ESP32-S3
  (240MHz, 512KB SRAM, 8MB PSRAM, 16MB Flash). Allocate model to PSRAM, activations to SRAM, and TFLM
  runtime to SRAM. Quantify PSRAM access penalty on inference latency.
question: "What latency penalty comes from placing 475 KB MobileNetV1 weights in ESP32-S3 PSRAM instead of SRAM?"
details:
  realistic_solution: 'Layout: model Flatbuffer → PSRAM (475KB, accessed once per inference for weight
    loading). Activation arena → SRAM (100KB). TFLM runtime → SRAM (30KB). Total SRAM: 130KB of 512KB
    ✓. PSRAM access: weights read 14.9M × 1B = 14.9MB total weight reads per inference? No: 475KB per
    layer pass. Weight reads: 14.9M MACs × 1B weight per MAC = 14.9MB of weight data read. At PSRAM BW
    ~40MB/s (SPI): 14.9MB/40MB/s = 373ms! Catastrophic. Fix: copy model to SRAM at startup? 475KB > 512KB
    SRAM. Use ping-pong: copy 1 layer at a time to SRAM → layer-by-layer.'
  common_mistake: Storing all data including activations in PSRAM (for simplicity), ignoring that PSRAM
    has 5-10× higher latency than SRAM and will dominate inference time.
  napkin_math: 'Weight reads per inference: 14.9 MOPs → reads ~14.9MB of weight data (each MAC reads 1
    weight). PSRAM at 40 MB/s: 14.9/40 = 373ms just for weight reads. SRAM layer-by-layer (largest layer
    weights: 128×64×3×3 = 73.7KB): copy 73.7KB from PSRAM at 40MB/s = 1.84ms per layer copy. 13 layers
    × 1.84ms = 23.9ms overhead. Plus compute: 14.9M/240M = 62ms. Total: ~86ms. Still much better than
    373ms with random PSRAM access.'
