title: CMSIS-NN Quantization Format Constraints
scenario: You are converting a trained wake-word detection model for deployment on an ARM Cortex-M4 microcontroller without an FPU. You plan to use TensorFlow Lite for Microcontrollers (TFLM) linked with the CMSIS-NN library.
question: "What specific data type and quantization scheme must the model's weights and activations be converted to during the TFLite conversion process to leverage the CMSIS-NN SIMD instructions?"
details:
  realistic_solution: The model must be converted using INT8 per-channel symmetric quantization for weights and asymmetric for activations. CMSIS-NN relies on DSP extension instructions (SMLAD) to pack operands and execute dual MAC operations per cycle, which is mandatory when avoiding soft-float fallback overhead.
  common_mistake: |
    **The Pitfall:** Confusing dynamic range quantization or FP16 with the strict integer requirements of microcontrollers.
    **The Rationale:** Candidates assume standard INT16 or FP16 provides the best balance of accuracy and speed, typical of cloud deployment.
    **The Consequence:** They trigger massive soft-float emulation latency, failing real-time requirements entirely.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 10 MMAC footprint.
       - Hardware: Cortex-M4 at 168 MHz (No FPU).
       - CMSIS-NN SMLAD throughput: 2 INT8 MACs/cycle.
       - Soft-float emulation: ~50 cycles/MAC.
    2. **Calculations:**
       - Peak INT8 SIMD rate: 168 MHz * 2 MACs/cycle = 336 MMACs/sec.
       - INT8 latency: 10M / 336M = 29.8 ms.
       - Soft-float execution: 10M * 50 cycles = 500M cycles.
       - Soft-float latency: 500M / 168 MHz = 2.98 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: INT8 leverages hardware SIMD (29.8ms), avoiding a catastrophic 2.98s soft-float penalty (Compute-Bound).**
