title: CMSIS-NN Quantization Format Constraints
scenario: You are converting a trained wake-word detection model for deployment on an ARM Cortex-M4 (STM32F4) microcontroller. The device has no FPU, 256 KB SRAM, and 1 MB flash. You plan to use TensorFlow Lite for Microcontrollers (TFLM) linked with the CMSIS-NN library.
question: "What specific data type and quantization scheme must the model's weights and activations be converted to during the TFLite conversion process to leverage the CMSIS-NN SIMD instructions?"
details:
  realistic_solution: The model must be converted using INT8 (8-bit integer) quantization, typically with per-channel symmetric quantization for weights and asymmetric for activations. CMSIS-NN is heavily optimized for INT8, utilizing DSP extension instructions (like SMLAD) to pack operands and execute dual MAC operations per cycle, which is strictly required when no FPU is present.
  common_mistake: |
    **The Pitfall:** Confusing dynamic range quantization or FP16 with the strict integer requirements of microcontrollers.
    **The Rationale:** Candidates assume that standard INT16 or FP16 provides the best balance of accuracy and speed.
    **The Consequence:** They fail to utilize the highly optimized INT8 SIMD instructions, resulting in massive latency penalties.
  napkin_math: |
    1. Calculate theoretical peak INT8 performance: 168 MHz * 2 MACs/cycle (SIMD) = 336 MMACs/sec.
    2. Estimate INT8 latency for 10 MMAC model: 10M / 336M = 29.8 ms.
    3. Evaluate soft-float fallback (no FPU): Takes ~50 cycles per MAC.
    4. Estimate soft-float latency: 10M * 50 cycles / 168 MHz = 2.98 seconds.
    5. **Final Result: INT8 conversion enables a 29.8 ms latency, avoiding a 2.98 second soft-float penalty.**
