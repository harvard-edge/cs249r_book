title: 'Model Format Conversion: Optimize MCU Model Conversion for Minimal Flash Footprint'
scenario: A TFLite Micro model for Cortex-M4 (168MHz, 256KB SRAM, 512KB Flash) currently uses 380KB Flash (model) + 50KB Flash (TFLM runtime) = 430KB, leaving only 82KB for application code — insufficient. The model has 370K INT8 params.
question: How would you diagnose and quantify optimizations to free 100KB Flash?
details:
  realistic_solution: '(1) Audit TFLM op resolver: if unused kernels are linked, they consume Flash. Fix: use MicroMutableOpResolver with only needed ops -> reduce 50KB runtime to 15KB (save 35KB). New total: 380+15 = 395KB. Remaining gap: 65KB. (2) Prune model 20%: 370K->296K params -> save 74KB. New total: 395-74 = 321KB. App: 512-321=191KB ✓. (3) Alternatively, use model compression: replace 3x3 convs with 1x1 where possible -> architecture reduction.'
  common_mistake: |
    **The Pitfall:** Immediately trying to force aggressive quantization without checking runtime bloat.
    **The Rationale:** Engineers hyper-focus on the neural network weights instead of the inference engine wrapping it.
    **The Consequence:** They sacrifice model accuracy by pushing to INT4 when simply dropping unused TFLM operation kernels would have freed 50-150KB of flash instantly.
  napkin_math: |
    *   **Current State:** 380 KB model + 50 KB TFLM = 430 KB.
    *   **Application Needs:** 82 KB (current) + 100 KB (shortfall) = 182 KB.
    *   **Target Available Space:** 512 KB - 182 KB = 330 KB for model + runtime.
    *   **Fix 1 (TFLM Ops):** Use MicroMutableOpResolver to drop unused kernels. Runtime goes from 50 KB to 15 KB (saves 35 KB). New total: 395 KB. (Still 65 KB short).
    *   **Fix 2 (Pruning):** Prune 20%. 370K params -> 296K params. Saves 74 KB.
    *   **Final Result:** 395 KB - 74 KB = **321 KB**. This is less than 330 KB, leaving 191 KB for the app.
