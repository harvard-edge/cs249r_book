title: 'Model Format Conversion: Optimize MCU Model Conversion for Minimal Flash Footprint'
scenario: A TFLite Micro model for Cortex-M4 (168MHz, 256KB SRAM, 512KB Flash) currently
  uses 380KB Flash (model) + 50KB Flash (TFLM runtime) = 430KB, leaving only 82KB
  for application code — insufficient. The model has 370K INT8 params. Diagnose and
  quantify optimizations to free 100KB Flash.
question: How would you diagnose and quantify optimizations to free 100KB Flash?
details:
  realistic_solution: '(1) Audit TFLM op resolver: if all 50 ops are registered but
    model uses only 5 ops, unused kernels add ~90KB Flash. Fix: use MicroMutableOpResolver
    with only needed ops → save 85KB. New total: 380+50-85 = 345KB. Remaining gap:
    33KB. (2) Prune model 10%: 370K→333K params → 37KB. New total: 345-37 = 308KB.
    App: 512-308=204KB ✓. (3) Alternatively, use model compression: replace 3×3 convs
    with 1×1 where possible → architecture reduction.'
  common_mistake: Immediately trying to quantize further (already INT8) without first
    checking if unused TFLM op kernels are being linked unnecessarily, which can add
    50-150KB Flash.
  napkin_math: 'Current: 380KB model + 50KB TFLM = 430KB. App needs: 82+100=182KB.
    Available: 512-182=330KB for model+runtime. Gap: 430-330=100KB to save. Fix 1:
    TFLM ops reduce 50KB→15KB (3 ops registered): save 35KB → 395KB. Still 65KB short.
    Fix 2: prune 20%: 370K→296K params=296KB: save 74KB → 321KB < 330KB ✓. App gets
    191KB.'
