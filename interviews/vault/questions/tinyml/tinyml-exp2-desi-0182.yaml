title: Architecting Graceful Degradation for ESP32-S3 Voice Commands
scenario: You are designing an always-on smart speaker on an ESP32-S3 microcontroller. The device normally
  streams audio to the cloud over WiFi, but it must degrade gracefully when connectivity drops or power
  is critically low. Given the ESP32-S3's 512 KB SRAM, 8 MB PSRAM, and INT8 vector extensions, architect
  a degradation ladder that maintains core functionality. How do you structure your models and memory
  to ensure a fail-operational state?
question: "How should an ESP32-S3 smart speaker stage SRAM and PSRAM models for WiFi loss and low-power fallback?"
details:
  realistic_solution: 'The optimal design uses a multi-stage degradation ladder. State 1 (Normal): A tiny
    wake-word model in SRAM triggers cloud WiFi streaming. State 2 (Offline Fallback): When WiFi drops,
    a local INT8 command model is dynamically loaded from PSRAM into SRAM, shedding complex query capabilities
    but retaining basic controls. State 3 (Low Power): WiFi is disabled entirely to save power, and the
    system relies purely on the local INT8 model. The design leverages the ESP32-S3''s INT8 vector extensions
    to run the fallback model efficiently within the tight SRAM constraints.'
  common_mistake: Candidates often propose keeping multiple separate models in SRAM simultaneously, which
    easily exceeds the 512 KB limit. They also frequently rely on the slower 8 MB PSRAM for real-time
    inference activations, which introduces unacceptable latency and power draw.
  napkin_math: 'Total SRAM: 512 KB. OS and WiFi stack overhead: ~150 KB. Always-on wake-word model (INT8):
    50 KB. Remaining SRAM for the fallback model: 512 - 150 - 50 = 312 KB. We design the local fallback
    INT8 model to be 250 KB, fitting safely in SRAM. Loading this 250 KB model from the 8 MB PSRAM via
    Octal SPI (approx 40 MB/s throughput) takes 250 KB / 40,000 KB/s = 6.25 ms, causing negligible latency
    when shedding cloud dependency.'
