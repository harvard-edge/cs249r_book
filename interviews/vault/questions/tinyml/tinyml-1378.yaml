title: Diagnosing Unexpected Energy Drain in TinyML on STM32F4
scenario: A research team deploys a small, 8-bit quantized CNN model for gesture recognition on an ARM Cortex-M4 STM32F4 microcontroller (168 MHz, 256 KB SRAM, no FPU). Despite careful pruning and quantization, and theoretical calculations showing a low number of MAC operations, the device's battery life is significantly shorter than expected. The team observes that the microcontroller spends a considerable amount of time active.
question: Why can memory access dominate energy drain for an 8-bit CNN on an STM32F4 despite a low MAC count?
details:
  realistic_solution: "The primary culprit is likely the energy cost of memory access. For a Cortex-M4 without FPU, even fetching 8-bit weights and activations from the 256 KB SRAM for each MAC operation consumes far more energy than the MAC itself. A realistic solution involves: \n1. **Profiling Memory Accesses:** Use hardware counters or detailed simulations to quantify the number of memory reads/writes. \n2. **Applying Horowitz Energy Tables:** Compare the energy cost of SRAM access (e.g., 10-100 pJ/access) versus an 8-bit integer MAC (e.g., 0.1-1 pJ/MAC). It's common for a single memory access to cost as much as 100-1000 integer operations. \n3. **Optimizing Data Locality & Reuse:** Reorder computations, use loop tiling, and optimize data structures to maximize register reuse and minimize repetitive SRAM fetches, keeping frequently used data closer to the processing unit. \n4. **Instruction Set Efficiency:** Ensure the inference kernel leverages the ARM CMSIS-NN library or hand-optimized assembly routines that are memory-access efficient and utilize SIMD instructions where available for integer operations."
  common_mistake: |
    **The Pitfall:** Focusing solely on reducing FLOPs/MACs as the primary metric for energy efficiency.
    **The Rationale:** Standard ML optimization theory teaches that compute is the primary bottleneck, overlooking the physical energy costs of on-device memory buses.
    **The Consequence:** Models are deployed that minimize math but require excessive memory fetching, drastically reducing battery life.
  napkin_math: |
    - **8-bit INT MAC Cost**: ~0.1 pJ.
    - **8-bit SRAM Read**: ~10 pJ.
    - **Operation Cost**: 1 MAC + 2 SRAM reads (weight + activation) = 0.1 pJ + 20 pJ = 20.1 pJ.
    - **Energy Distribution**: 20 pJ / 20.1 pJ = **~99.5% of energy** is spent on memory access.
    - **Total for 1M MACs**: Memory (20 µJ) vastly overshadows Compute (0.1 µJ).
