title: Cycle-Accurate Execution Cost Model for 1D Convolutions
scenario: An engineer is designing an ultra-low power fall-detection algorithm using
  an accelerometer and a bare-metal Cortex-M4.
question: Formulate an exact mathematical cost model for a single unrolled 1D convolution
  layer executing strictly in SRAM.
details:
  realistic_solution: The theoretical MAC operations are L_out * K * C. With DSP loop
    unrolling, cycles_per_MAC approaches 1. The clock cycle formula becomes MACs *
    1.2, assuming a 20% overhead for memory loads, register spilling, and boundary
    padding logic.
  common_mistake: Only calculating theoretical MACs and entirely ignoring the register
    spilling and boundary checking overheads.
  napkin_math: Output L=100, Kernel=3, Channels=16. MACs = 100 * 3 * 16 = 4800 MACs
    = ~5760 CPU cycles.
