title: Real-time Compute Estimation for Sensor Data
scenario: 'You are deploying a vibration anomaly detection model on an ARM Cortex-M4 (STM32F4) running at 168 MHz with 256 KB SRAM, 1 MB flash, and no FPU. The processor supports CMSIS-NN SIMD instructions capable of 2x INT8 MACs/cycle. You are evaluating two fully INT8-quantized architectures to process a 50 Hz (20ms inference budget) sensor stream: Model A is a standard CNN requiring 4.5 million MACs per inference, and Model B is a Depthwise Separable CNN requiring 1.5 million MACs.'
question: Which INT8 model meets the 20ms STM32F4 sensor stream budget when operating at 50% MAC utilization?
details:
  realistic_solution: The candidate should calculate the effective compute throughput by factoring in the clock speed, SIMD capability, and the 50% efficiency penalty. They must then compute the inference time for both models against the 20ms budget. Model A exceeds the budget, making Model B the mathematically viable choice, though a strong L5 candidate will note that Model B's actual utilization might drop below 50% in practice.
  common_mistake: |
    **The Pitfall:** Assuming 100% theoretical peak compute utilization.
    **The Rationale:** Candidates fail to account for memory loading overheads from SRAM stalling the CPU.
    **The Consequence:** They incorrectly conclude that heavier models (like Model A) fit within the latency budget.
  napkin_math: |
    *   **Peak Compute**: 168 MHz * 2 INT8 MACs/cycle = 336 MMACs/sec.
    *   **Effective Throughput**: 336 * 0.50 utilization = 168 MMACs/sec.
    *   **Latency Constraint**: 1000 ms / 50 Hz = 20 ms.
    *   **Model A**: 4.5M MACs / 168 MMACs/sec = 26.78 ms (Fails budget).
    *   **Model B**: 1.5M MACs / 168 MMACs/sec = 8.92 ms (Passes budget).
    *   **Conclusion**: **Model B successfully meets the 20ms budget.**
