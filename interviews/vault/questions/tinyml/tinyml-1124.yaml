title: Real-time Compute Estimation for Sensor Data
scenario: 'You are deploying a vibration anomaly detection model on an ARM Cortex-M4
  (STM32F4) running at 168 MHz with 256 KB SRAM, 1 MB flash, and no FPU. The processor
  supports CMSIS-NN SIMD instructions capable of 2x INT8 MACs/cycle. You are evaluating
  two fully INT8-quantized architectures to process a 50 Hz (20ms inference budget)
  sensor stream: Model A is a standard CNN requiring 4.5 million MACs per inference,
  and Model B is a Depthwise Separable CNN requiring 1.5 million MACs. Assuming a
  realistic 50% MAC utilization efficiency due to memory loading overheads from the
  SRAM, evaluate which architecture successfully meets the system requirements.'
question: Which INT8 model meets the 20 ms STM32F4 sensor-stream budget after accounting
  for 50% MAC utilization?
details:
  realistic_solution: The candidate should calculate the effective compute throughput
    by factoring in the clock speed, SIMD capability, and the 50% efficiency penalty.
    They must then compute the inference time for both models against the 20ms budget.
    Model A exceeds the budget, making Model B the mathematically viable choice, though
    a strong L5 candidate will note that Model B's actual utilization might drop below
    50% in practice.
  common_mistake: Candidates often assume 100% theoretical peak compute utilization
    (336 MMACs/sec) and incorrectly conclude both models fit the budget. They also
    frequently fail to recognize that depthwise layers often have even worse memory-bound
    utilization than standard convolutions.
  napkin_math: Peak compute = 168 MHz * 2 INT8 MACs/cycle = 336 MMACs/sec. Effective
    throughput = 336 * 0.50 utilization = 168 MMACs/sec. Latency constraint = 1000ms
    / 50 Hz = 20ms. Model A latency = 4.5M MACs / 168 MMACs/sec = 26.78ms (fails 20ms
    budget). Model B latency = 1.5M MACs / 168 MMACs/sec = 8.92ms (passes 20ms budget).
