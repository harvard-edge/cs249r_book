title: 'Edge AI Power Budget: Optimizing Gesture Recognition on ESP32-S3'
scenario: Your team is developing a battery-powered wearable device for gesture recognition, using an
  ESP32-S3 as the main microcontroller. The device needs to run a small neural network (e.g., a tiny CNN)
  for real-time inference on accelerometer data, with a target latency of under 100ms. The ESP32-S3 features
  a 240 MHz dual-core Xtensa LX7 processor, 512 KB internal SRAM, 8 MB external PSRAM, and dedicated SIMD
  instructions for AI acceleration. You are tasked with estimating the total compute cost over a year,
  encompassing both the cloud-based training of the model and its continuous inference on the ESP32-S3,
  to inform battery design and operational expenses.
details:
  realistic_solution: A realistic approach involves a multi-pronged estimation strategy. For cloud training,
    quantify the model's total FLOPs during training and map this to estimated GPU-hours on a suitable
    cloud instance, using actual cloud provider pricing. For on-device inference, profile the model's
    execution on the ESP32-S3 using real hardware to measure actual cycle counts and energy consumption
    for different layers and the entire inference pipeline. This empirical data, combined with manufacturer
    power profiles and the device's operational duty cycle, allows for accurate long-term energy and cost
    projections. Factor in memory bandwidth limitations and SIMD instruction set efficiency for various
    operations.
  common_mistake: A common mistake is to underestimate the actual inference time and energy consumption
    on the ESP32-S3 by only considering theoretical FLOPs/cycle without accounting for memory access overheads
    (especially between SRAM and PSRAM), variable SIMD utilization across different operations, and the
    efficiency penalties of a highly constrained embedded environment with limited parallelism and thermal
    management.
  napkin_math: "1. **Training Cost (Cloud GPU):** Calculate total training FLOPs (model FLOPs per step\
    \ * num_steps * num_epochs). Convert to GPU-hours based on target GPU's TFLOPS and its hourly cost.\
    \ \n2. **On-Device Inference Cycles:** Measure/estimate cycles per inference (C). Total cycles/year\
    \ = C * (inferences/second) * (seconds/year). For ESP32-S3 240MHz dual-core, ~480M cycles/sec theoretical\
    \ peak. \n3. **On-Device Energy:** (Average Power in Active State * Active Time) + (Average Power\
    \ in Sleep State * Sleep Time). Example: ESP32-S3 active power ~0.264W (80mA @ 3.3V). If 10 inferences/min,\
    \ each 50ms, active time is 262800 seconds/year. Energy/year ≈ 0.264W * 262800s ≈ 69379 Joules. \n\
    4. **Dollar Cost (Operational):** Primarily battery replacement frequency or charging costs, derived\
    \ from annual energy consumption. E.g., a 1000mWh (3600J) battery lasts ~60 days, requiring ~6 batteries/year."
