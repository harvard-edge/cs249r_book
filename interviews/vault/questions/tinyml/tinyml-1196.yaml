title: 'Hardware-Aware NAS Design for ARM Cortex-M4 Keyword Spotting'
scenario: 'You are leading a TinyML team building a keyword spotting model for a smart home device running on an ARM Cortex-M4 (STM32F4). The system has a strict latency budget of 50ms per inference, and the entire model, including peak activation memory, must fit within 256 KB of SRAM and 1 MB of flash.'
question: 'How should a Cortex-M4 hardware-aware NAS encode SRAM, Flash, latency, and CMSIS-NN SIMD constraints?'
details:
  realistic_solution: 'The correct approach involves a two-stage NAS similar to MCUNet. First, design a TinyNAS search space that heavily penalizes peak SRAM usage, restricting early layer resolutions and channel widths. Second, the search loop should incorporate a cycle-accurate cost model or an on-device latency lookup table rather than proxy metrics like FLOPs. The search algorithm will evaluate candidates by jointly optimizing accuracy and the strict 256KB SRAM and 50ms latency constraints, prioritizing operations that maximize the 2x INT8 MACs/cycle SIMD efficiency.'
  common_mistake: |
    **The Pitfall:** Relying on generic NAS techniques or proxy metrics like FLOPs.
    **The Rationale:** Assuming theoretical FLOPs perfectly correlate with latency, and ignoring the strict peak activation bottlenecks on microcontrollers.
    **The Consequence:** Generating models that fit in Flash but crash due to SRAM out-of-memory errors, or miss the 50ms latency target due to poor CMSIS-NN MAC utilization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cycle Budget constraint: 50ms latency at 168 MHz.
    - Max Operations constraint assumes CMSIS-NN SIMD utilization of ~0.7.
    - SRAM limit: 256 KB total, ~200 KB available for activations.

    **Calculations:**
    - Cycle Budget: 0.050 s * 168,000,000 cycles/sec = 8.4 million cycles.
    - Max Operations: 8.4M cycles * 2 MACs/cycle * 0.7 utilization = 11.76 million MACs.
    - Activation Memory Example: INT8 input 40x98. First layer output (32 channels, 20x49) = 20 * 49 * 32 * 1 byte = 31.36 KB.

    **Conclusion & Interpretation:**
    - **Result: 11.76 million MACs (Compute-Bound)**. Double-buffering requires that no two consecutive layers' combined outputs exceed the ~200 KB available SRAM constraint.
