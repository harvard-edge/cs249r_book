title: Depthwise Separable Convolution Execution Cycles on Microcontrollers
scenario: A keyword spotting model uses Depthwise Separable Convolutions to reduce
  MACs by 8x compared to standard convolutions on a Cortex-M4.
question: Evaluate why the actual inference latency on the Cortex-M4 only improved
  by 2.5x despite the 8x reduction in theoretical MAC operations.
details:
  realistic_solution: Depthwise convolutions possess extremely low arithmetic intensity.
    The Cortex-M4 becomes bottlenecked by SRAM load/store operations and loop branching
    overhead. Standard convolutions utilize DSP MAC instructions more efficiently
    via SIMD register reuse, whereas depthwise layers are heavily memory-bound.
  common_mistake: Assuming execution time scales perfectly linearly with MAC count
    on microcontrollers without analyzing memory access latency and DSP instruction
    efficiency.
  napkin_math: 'Standard Conv MACs = 800k, Depthwise = 100k. Real cycles observed:
    1,000,000 vs 400,000.'
