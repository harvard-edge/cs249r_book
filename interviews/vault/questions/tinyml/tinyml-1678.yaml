title: Depthwise Separable Convolution Execution Cycles on Microcontrollers
scenario: A keyword spotting model uses Depthwise Separable Convolutions to reduce MACs by 8x compared to standard convolutions on a Cortex-M4.
question: Evaluate why the actual inference latency on the Cortex-M4 only improved by 2.5x despite the 8x reduction in theoretical MAC operations.
details:
  realistic_solution: Depthwise convolutions possess extremely low arithmetic intensity. The Cortex-M4 becomes bottlenecked by SRAM load/store operations and loop branching overhead. Standard convolutions utilize DSP MAC instructions more efficiently via SIMD register reuse, whereas depthwise layers are heavily memory-bound.
  common_mistake: |
    **The Pitfall:** Assuming execution time scales perfectly linearly with MAC count on microcontrollers.
    **The Rationale:** Engineers often ignore memory access latency and DSP instruction efficiency, forgetting that arithmetic intensity drops dramatically in depthwise layers.
    **The Consequence:** Overestimating the real-world latency improvements of model compression techniques like depthwise separation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Standard Conv MACs: 800k.
       - Depthwise Conv MACs: 100k.
       - Standard cycles observed: 1,000,000.
       - Depthwise cycles observed: 400,000.
    2. **Calculations:**
       - MAC Reduction: 800k / 100k = 8x.
       - Cycle Reduction: 1,000,000 / 400,000 = 2.5x.
    3. **Conclusion & Interpretation:**
       - **Result: 2.5x speedup (Memory-Bound).** The latency improvement is severely sub-linear due to the low arithmetic intensity of depthwise convolutions.
