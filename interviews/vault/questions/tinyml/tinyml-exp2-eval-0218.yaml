title: Partitioning Workloads on Cortex-M7 and Ethos-U55
scenario: 'You are deploying a predictive maintenance model on an ARM Corstone-300 subsystem featuring
  a Cortex-M7 at 480 MHz and an Ethos-U55 NPU, sharing a strict 512 KB SRAM budget. You are evaluating
  two architectures: Architecture A is a pure CNN that is 100% supported by the U55 but requires 420 KB
  of SRAM for weights and activation buffers. Architecture B introduces custom recurrent layers requiring
  Cortex-M7 fallback, reducing total SRAM footprint to 250 KB but splitting the computation. You must
  evaluate which architecture is optimal for a system that also needs memory for RTOS, stack, and sensor
  DMA buffers.'
details:
  realistic_solution: Architecture B is the superior choice because it respects system-level constraints.
    While CPU fallback incurs a latency penalty and requires context switching between the M7 and U55,
    leaving 262 KB of shared SRAM ensures system stability. A strong engineer will propose using CMSIS-NN
    on the M7 to optimize the custom layers and leveraging double buffering so the CPU can prepare the
    next inference window's data while the NPU computes.
  common_mistake: Candidates often choose Architecture A because they assume that keeping 100% of the
    workload on the NPU is always optimal for latency and efficiency. They fail to account for system-level
    memory constraints, realizing too late that leaving only 92 KB of SRAM for the RTOS, networking stack,
    and audio/vibration DMA buffers will cause memory exhaustion.
  napkin_math: 'For Architecture A: 512 KB - 420 KB = 92 KB remaining SRAM. NPU compute time for 5M MACs
    at 256 MACs/cycle on a 480 MHz clock: 5,000,000 / (256 * 480,000,000) = ~0.04 ms. For Architecture
    B: 512 KB - 250 KB = 262 KB remaining SRAM. NPU computes 4M MACs in ~0.03 ms. The M7 computes the
    remaining 1M MACs using DSP instructions (~2 MACs/cycle): 1,000,000 / (2 * 480,000,000) = ~1.04 ms.
    Total latency is ~1.07 ms. The 1 ms penalty is entirely acceptable for typical >10ms sensor windows,
    whereas crashing due to an OOM error is catastrophic.'
