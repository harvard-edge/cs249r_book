title: The 10mW Power Budget
scenario: You are designing a keyword-spotting device that runs on a tiny solar cell, providing a continuous power budget of 10 milliwatts (mW). You are evaluating a new accelerator chip with an efficiency of 20 GOPS/W.
question: What compute rate can a 10 mW solar budget sustain on a 20 GOPS/W accelerator?
details:
  realistic_solution: Standardize units to Watts and Ops/second. A 10 mW budget at 20 GOPS/W yields a strict 200 MOPS compute ceiling.
  common_mistake: |
    **The Pitfall:** Neglecting the unit conversion from milliwatts (mW) to Watts (W).
    **The Rationale:** Engineers multiply 20 GOPS/W by 10 directly, resulting in 200 GOPS.
    **The Consequence:** A performance estimate that is 1000x greater than achievable, which would require 10W and instantly brown out the 10mW solar-powered system.
  napkin_math: |
    **Assumptions & Constraints:**
    - Continuous power budget: 10 mW.
    - Accelerator efficiency: 20 GOPS/W.

    **Calculations:**
    - Convert power: 10 mW = 0.01 W.
    - Max sustained operations: 0.01 W * 20 GOPS/W = 0.2 GOPS.
    - 0.2 GOPS = 200 MOPS.

    **Conclusion & Interpretation:**
    - **Result: 200 MOPS (Power-Bound)**. Exceeding this compute rate will brown out the device.
  options:
  - 200 GOPS
  - 2 GOPS
  - 0.2 GOPS (or 200 MOPS)
  - 0.002 GOPS (or 2 MOPS)
  correct_index: 2
