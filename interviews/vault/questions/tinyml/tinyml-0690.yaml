title: The Sun-Blinded Driver Monitor
scenario: You are the lead ML systems architect for a new automotive product: a driver drowsiness detection system. A competitor's similar product is suffering from catastrophic field failures in hot climates. Their devices, after several months, become unresponsive ('bricked'), requiring physical replacement. Their post-mortem suggests two root causes: 1) The model, when faced with high sun glare, enters a pathological state, outputting 'drowsy' at 100% confidence continuously. 2) This triggers excessive logging of the 'anomaly' to internal flash storage, leading to premature wear-out and corruption of the flash memory, bricking the device. Your product manager mandates a 5-year operational lifetime with zero required dealership visits for software faults. Your constraints are a Cortex-M4 class MCU with 1MB of Flash and 256KB of SRAM.
question: What software and system architecture prevents this class of failure, and what are your first three architectural decisions?
details:
  realistic_solution: The correct approach is to design a self-sufficient, resilient system that can detect and recover from faults on its own, treating the hardware constraints as the primary design driver.
  common_mistake: |
    **The Pitfall:** Relying on cloud connectivity for anomaly handling or ignoring hardware constraints.
    **The Rationale:** Engineers accustomed to high-end systems assume infinite logging capacity or continuous backend streaming is always available.
    **The Consequence:** The device rapidly wears out its local flash memory or drains its battery trying to transmit data, leading to a bricked product in the field.
  napkin_math: |
    *   **Flash Endurance:** Assume 10,000 erase/write cycles per block.
    *   **Lifespan Requirement:** 5 years = ~1,825 days = ~43,800 hours.
    *   **Log Rate Constraint:** To last 43,800 hours with 10,000 cycles, you can only write to a specific block once every ~4.38 hours.
    *   **Conclusion:** Continuous logging (e.g., multiple times per second) will destroy the flash in a matter of days or weeks. Wear-leveling and severe rate-limiting are required.
