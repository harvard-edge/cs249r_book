title: The Sun-Blinded Driver Monitor
scenario: 'You are the lead ML systems architect for a new automotive product: a driver drowsiness detection
  system. A competitor''s similar product is suffering from catastrophic field failures in hot climates.
  Their devices, after several months, become unresponsive (''bricked''), requiring physical replacement.
  Their post-mortem suggests two root causes: 1) The model, when faced with high sun glare, enters a pathological
  state, outputting ''drowsy'' at 100% confidence continuously. 2) This triggers excessive logging of
  the ''anomaly'' to internal flash storage, leading to premature wear-out and corruption of the flash
  memory, bricking the device. Your product manager mandates a 5-year operational lifetime with zero required
  dealership visits for software faults. Your constraints are a Cortex-M4 class MCU with 1MB of Flash
  and 256KB of SRAM. Propose a software and system architecture that prevents this class of failure. What
  are your first three architectural decisions, and how do you justify them with quantitative reasoning?'
question: "What are your first three architectural decisions, and how do you justify them with quantitative reasoning?"
details:
  realistic_solution: The correct approach is to design a self-sufficient, resilient system that can detect
    and recover from faults on its own, treating the hardware constraints as the primary design driver.
  common_mistake: Candidates often propose cloud-centric solutions, like streaming logs or feature vectors
    to a backend for analysis. This is infeasible on a TinyML device due to power, connectivity, and cost
    constraints, and in this case, would directly cause the flash wear-out problem. Another common mistake
    is focusing only on the model and suggesting retraining, which doesn't address the core systems problem
    of fault tolerance and on-device recovery.
  napkin_math: The core constraint is the 5-year lifetime, which translates to a flash write budget. Assume
    a standard flash endurance of 10,000 erase/write cycles per block.
