title: The Sun-Blinded Driver Monitor
scenario: You are designing a driver drowsiness detection system. A competitor's product suffers field failures where high sun glare causes the model to continuously output 'drowsy', triggering excessive anomaly logging that wears out the internal flash memory and bricks the device. Your product must have a 5-year operational lifetime with zero dealership visits.
question: What software and system architecture prevents this class of failure, and what are your first three architectural decisions?
details:
  realistic_solution: The correct approach is to design a self-sufficient, resilient system that can detect and recover from faults on its own, treating the hardware constraints as the primary design driver.
  common_mistake: |
    **The Pitfall:** Relying on cloud connectivity for anomaly handling or ignoring hardware constraints.
    **The Rationale:** Engineers accustomed to high-end systems assume infinite logging capacity or continuous backend streaming is always available.
    **The Consequence:** The device rapidly wears out its local flash memory or drains its battery trying to transmit data, leading to a bricked product in the field.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Flash Endurance: 10,000 erase/write cycles per block.
       - Lifespan Requirement: 5 years (~43,800 hours).
    2. **Calculations:**
       - Log Rate Constraint: 43,800 hours / 10,000 cycles = 4.38 hours.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound Wear Out**. Continuous logging destroys the flash memory; the system must rate-limit writes to at most once per 4.38 hours per block.
