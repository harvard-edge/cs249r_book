title: TinyML Offload Partition Spec
scenario: A firmware team wants to partition a model between Cortex-M CPU kernels and an external NPU.
question: What information is needed to partition a TinyML model between Cortex-M kernels and an external NPU?
details:
  realistic_solution: 'You need operator support, per-layer latency on each engine, activation sizes crossing the boundary, setup overhead, SRAM buffers, quantization compatibility, and deadline headroom. The best partition is not simply all supported ops; it minimizes boundary cost and memory pressure.'
  common_mistake: |
    **The Pitfall:** Offloading every supported operator by default.
    **The Rationale:** Teams assume the NPU is strictly better, blindly offloading operations without accounting for data transfer.
    **The Consequence:** Transfer overhead completely negates any compute speedup, causing net latency regression.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU offload provides a raw compute speedup vs CPU baseline.
       - Crossing the CPU/NPU boundary requires DMA transfer and setup latency.
    2. **Calculations:**
       - Net Latency = (CPU baseline latency) - (NPU speedup) + (Boundary setup + DMA transfer).
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound.** A 1 ms NPU compute speedup is a net loss if the boundary overhead adds 2 ms of setup and transfer.
