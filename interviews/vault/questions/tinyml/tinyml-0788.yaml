title: Tinyml New 0010
scenario: A hybrid edge-cloud setup offloads heavy inference to a local A100 (312 TFLOPS). However, the
  end-to-end latency for the TinyML sensor data is severely bottlenecked, achieving only 1% GPU utilization.
question: "Why is the local A100 underutilized when processing many tiny TinyML sensor payloads?"
details:
  realistic_solution: The symptom is a severe I/O and PCIe bottleneck. The TinyML edge devices are sending
    thousands of tiny payloads (e.g., 1KB audio frames). Processing these small requests across the PCIe
    Gen4 bus incurs massive transactional overhead, shifting the system left on the roofline to total
    starvation. The solution is to batch the sensor data on the CPU before issuing a single large DMA
    copy to the GPU.
  common_mistake: Focusing solely on GPU TOPS and network bandwidth, completely ignoring PCIe transaction
    overhead for high-frequency, small-payload TinyML data.
  napkin_math: PCIe Gen4 x16 BW is 32GB/s, but latency per transaction is ~2us. Sending 1KB takes 2us
    overhead + 30ns transfer. For 10,000 requests/sec, that's 20ms of overhead latency, starving the 312
    TFLOPS GPU.
