title: Nordic nRF5340 Duty Cycling for Solar-Powered Edge ML
scenario: A solar-powered environmental sensor node uses an nRF5340. The ML model takes 50ms active processing (15mA). Deep sleep draws 1.5uA. BLE advertisement occurs every 5 minutes and takes 100ms (5mA).
question: Why is a fixed periodic wake schedule risky for a solar-powered nRF5340 ML sensor in a variable energy-harvesting environment?
details:
  realistic_solution: A realistic solution involves an adaptive duty cycling strategy based on current coin cell voltage and solar panel output. During low light, the device extends sleep cycles; during high light, it increases frequency. A fixed schedule drains the battery during extended low-light conditions.
  common_mistake: |
    **The Pitfall:** Implementing a fixed duty cycle without adapting to available energy.
    **The Rationale:** Candidates assume average energy consumption will always perfectly match average energy harvesting rates.
    **The Consequence:** The battery depletes completely during prolonged low-light conditions, killing the node.
  napkin_math: |
    - Inference: 15mA * 50ms = 0.208 µAh.
    - BLE: 5mA * 100ms = 0.139 µAh.
    - 5-min active total: 0.347 µAh.
    - 5-min sleep: 1.5µA * 300s = 0.125 µAh.
    - Total per 5-min cycle: 0.472 µAh.
    - Daily average draw: ~5.6 µA.
    - **If solar harvesting drops below the 5.6 µA threshold during bad weather, a fixed schedule predictably drains the battery.**
