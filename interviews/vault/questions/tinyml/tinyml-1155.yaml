title: 2-Bit Weight Unpacking and Execution on Cortex-M4
scenario: You are deploying a 2-bit weight / 8-bit activation (W2A8) acoustic model
  on an ARM Cortex-M4 (STM32F4). The microcontroller features a 168 MHz clock, 256
  KB of SRAM, 1 MB of Flash, and relies on CMSIS-NN SIMD since it has no FPU. One
  specific dense layer has exactly 1,048,576 parameters stored in Flash, which must
  be unpacked to INT8 into SRAM at runtime to be processed. Calculate the total Flash
  footprint for these weights and the theoretical minimum compute cycles for the multiply-accumulate
  (MAC) operations.
question: How would you calculate the total Flash footprint for these weights and
  the theoretical minimum compute cycles for the multiply-accumulate (MAC) operations?
details:
  realistic_solution: The correct approach calculates the highly compressed Flash
    footprint by packing four 2-bit weights per byte to fit within the 1 MB limit.
    For compute, the weights must be dynamically unpacked into the 256 KB SRAM in
    tiles, and the execution bottleneck is strictly defined by the CMSIS-NN SIMD instruction
    throughput (2 MACs/cycle).
  common_mistake: Candidates frequently assume that extreme quantization accelerates
    compute on this architecture by processing 4x or 8x operations per cycle. They
    forget that the Cortex-M4 DSP instructions only support a maximum of 2x INT8 MACs/cycle,
    meaning sub-byte quantization only saves memory, not raw MAC cycles.
  napkin_math: '1. Flash Storage: 1,048,576 parameters * 2 bits/param = 2,097,152
    bits.

    2. Byte Conversion: 2,097,152 bits / 8 bits/byte = 262,144 bytes (exactly 256
    KB, using 25% of the 1 MB Flash).

    3. Compute Cycles: 1,048,576 MACs are required for the layer pass.

    4. SIMD Throughput: Cortex-M4 CMSIS-NN handles 2x INT8 MACs per cycle.

    5. Total Compute: 1,048,576 / 2 = 524,288 cycles.

    6. Ideal Execution Time: 524,288 cycles / 168,000,000 Hz = ~3.12 ms (excluding
    unpacking memory overhead).'
