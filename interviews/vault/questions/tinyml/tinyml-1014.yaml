title: Floating-Point Emulation Overhead in Safety Guardrails
scenario: To comply with Responsible AI guidelines, your team added an out-of-distribution
  (OOD) detection guardrail to an anomaly detection system running on an ARM Cortex-M4
  (STM32F4). The main INT8 neural network executes in 5ms, comfortably beating the
  20ms real-time deadline. However, after adding the guardrail to compute Mahalanobis
  distances for three safety constraints on 128-dimensional embeddings, the execution
  time spiked to over 60ms. You are tasked with diagnosing the root cause of this
  latency regression without access to a profiler.
question: Why does the Cortex-M4 OOD guardrail push latency past 60 ms, and how should
  the distance computation be changed?
details:
  realistic_solution: The root cause is that the OOD guardrail was implemented using
    FP32 math. Because this specific Cortex-M4 configuration lacks a hardware FPU,
    all floating-point operations must be emulated in software via a soft-float library,
    taking hundreds of cycles per instruction. Meanwhile, the main model runs fast
    because it leverages CMSIS-NN SIMD instructions capable of executing 2x INT8 MACs
    per cycle. The solution is to quantize the guardrail logic to integer arithmetic
    or switch to a computationally cheaper integer-based distance metric.
  common_mistake: Candidates often blame memory bandwidth bottlenecks, suggesting
    the 256 KB SRAM is thrashing during the covariance matrix lookups. Others might
    incorrectly assume the 1 MB flash memory is too slow for loading the guardrail
    parameters, completely missing the architectural compute limitations.
  napkin_math: 'CPU Clock: 168 MHz (168,000 cycles/ms). The guardrail computes 3 covariance
    matrix multiplications (128x128), totaling 49,152 FP32 MACs. With no FPU, a soft-float
    MAC (multiply + add) takes roughly 200 cycles. Total compute cycles: 49,152 MACs
    * 200 cycles = 9,830,400 cycles. Guardrail execution time: 9,830,400 cycles /
    168,000 cycles/ms = ~58.5ms. Total inference time: 5ms (main NN) + 58.5ms (guardrail)
    = 63.5ms, violating the 20ms deadline.'
