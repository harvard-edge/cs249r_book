title: Understanding Flash Wear Out in High Frequency Checkpointing
scenario: A tinyML system running off harvested solar energy writes a backup of its
  inference state (1 KB) to internal Flash memory before brownouts.
question: Explain why standard internal Flash memory might be unsuitable for this
  high-frequency checkpointing, and what alternative on-chip component is preferred.
details:
  realistic_solution: Standard internal Flash memory has a limited endurance (often
    10,000 to 100,000 erase/write cycles) and requires blocking page erases. A better
    alternative is to write to an external FRAM or use a battery-backed SRAM retention
    mode, supporting virtually unlimited writes.
  common_mistake: Believing flash memory can be written to byte-by-byte indefinitely
    without block erases wearing it out.
  napkin_math: 100000 cycles / 10 writes per day = 10000 days endurance
