title: INT8 Cortex-M4 Footprint
scenario: An engineering team is evaluating shifting from FP32 to INT8 quantization
  for a 50K-parameter LSTM on a Cortex-M4 with DSP instructions.
question: Evaluate the exact SRAM/Flash footprint reduction and the qualitative impact
  on cycle count.
details:
  realistic_solution: Shifting to INT8 reduces the weight footprint from 200KB (FP32)
    to 50KB (INT8), saving 150KB. Additionally, the Cortex-M4 has SIMD DSP instructions
    (e.g., SMLAD) that can perform dual 16-bit or quad 8-bit MACs per cycle, significantly
    reducing the cycle count compared to software-emulated or standard scalar FP32
    operations.
  common_mistake: Calculating memory reduction correctly but failing to identify that
    the M4's SIMD DSP instructions heavily accelerate INT8 compute compared to baseline
    FP32.
  napkin_math: 50,000 params * (4 bytes - 1 byte) = 150,000 bytes saved.
