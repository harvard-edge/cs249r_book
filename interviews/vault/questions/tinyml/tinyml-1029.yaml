title: Evaluating Profiling Strategies for nRF5340 Audio Inference Bottlenecks
scenario: 'You are deploying a keyword spotting model on a Nordic nRF5340. The system
  uses the 128 MHz application core for inference and the 64 MHz network core for
  BLE 5.3 communication. The end-to-end latency is missing the 200ms target by 40ms.
  You are presented with two profiling approaches to identify the bottleneck: (A)
  Instrumenting the code with GPIO toggles and an oscilloscope, or (B) using Segger
  SystemView for software tracing via SWD. Evaluate both alternatives, considering
  the 256 KB SRAM constraint and the dual-core architecture, and determine which approach
  is better for isolating compute vs. I/O bottlenecks.'
question: How would you evaluate both alternatives, considering the 256 KB SRAM constraint
  and the dual-core architecture, and determine which approach is better for isolating
  compute vs?
details:
  realistic_solution: The better approach is to use GPIO toggles (Option A) for macro-level
    timing of the dual-core synchronization and I/O events (e.g., audio DMA, IPC to
    the net core). GPIO toggling provides zero-jitter, microsecond precision across
    both cores. Once the bottleneck is isolated to a specific phase on the 128 MHz
    core, selectively enable software tracing for just that phase to minimize SRAM
    usage and avoid perturbing BLE 5.3 timing.
  common_mistake: Candidates often choose software tracing (Option B) unconditionally
    because of its rich detail, failing to account for the memory overhead it introduces
    on the 256 KB SRAM. They also frequently overlook the difficulty of synchronizing
    software traces across the independent 128 MHz app core and 64 MHz net core.
  napkin_math: At 128 MHz, 1ms equals 128,000 cycles, so the 40ms overrun is ~5.12
    million cycles. If software tracing logs 5,000 events per inference at 16 bytes
    each, it requires 80 KB of SRAM. Out of the total 256 KB SRAM, dedicating 80 KB
    (31%) to tracing likely starves the ~150 KB KWS model and audio buffers, causing
    crashes. Conversely, a GPIO toggle takes 1-2 cycles (<0.02 microseconds) and 0
    bytes of SRAM, making it the only viable method for full-system profiling.
