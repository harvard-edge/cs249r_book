title: Evaluating Profiling Strategies for nRF5340 Audio Inference Bottlenecks
scenario: You are deploying a keyword spotting model on a dual-core microcontroller. The end-to-end latency is missing the 200ms target by 40ms. You must choose between (A) GPIO toggles and an oscilloscope, or (B) Segger SystemView software tracing via SWD.
question: Which profiling approach is better for isolating compute vs. I/O bottlenecks given the 256 KB SRAM constraint?
details:
  realistic_solution: The better approach is to use GPIO toggles (Option A) for macro-level timing of the dual-core synchronization and I/O events (e.g., audio DMA, IPC to the net core). GPIO toggling provides zero-jitter, microsecond precision across both cores. Once the bottleneck is isolated to a specific phase on the 128 MHz core, selectively enable software tracing for just that phase to minimize SRAM usage and avoid perturbing timing.
  common_mistake: |
    **The Pitfall:** Unconditionally choosing rich software tracing tools like SystemView.
    **The Rationale:** Candidates from desktop/mobile backgrounds ignore the massive SRAM footprint that tracing buffers require.
    **The Consequence:** The profiling tool itself alters the system state, causing OOM errors or delaying critical interrupts, making the timing bug unobservable (Heisenbug).
  napkin_math: |
    **Assumptions & Constraints:**
    - Total SRAM: 256 KB.
    - KWS Model RAM usage: 150 KB.
    - Software Tracing Overhead (SystemView): 5,000 events * 16 bytes/event = 80 KB.

    **Calculations:**
    - SystemView Remaining SRAM: 256 KB - 150 KB - 80 KB = 26 KB (Highly likely to OOM the RTOS/buffers).
    - GPIO Toggle Overhead: 1-2 CPU cycles (<0.02 µs) and 0 bytes of SRAM.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound.** Heavy software tracing tools consume massive SRAM buffers, causing Heisenbugs or OOM crashes on constrained devices. GPIO toggling provides zero-jitter, zero-SRAM profiling.
