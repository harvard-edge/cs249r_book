title: Evaluating Profiling Strategies for nRF5340 Audio Inference Bottlenecks
scenario: You are deploying a keyword spotting model on a Nordic nRF5340. The system uses the 128 MHz app core for inference and the 64 MHz network core for BLE 5.3. The end-to-end latency is missing the 200ms target by 40ms. You must choose between (A) GPIO toggles and an oscilloscope, or (B) Segger SystemView software tracing via SWD.
question: Which profiling approach is better for isolating compute vs. I/O bottlenecks given the 256 KB SRAM constraint?
details:
  realistic_solution: The better approach is to use GPIO toggles (Option A) for macro-level timing of the dual-core synchronization and I/O events (e.g., audio DMA, IPC to the net core). GPIO toggling provides zero-jitter, microsecond precision across both cores. Once the bottleneck is isolated to a specific phase on the 128 MHz core, selectively enable software tracing for just that phase to minimize SRAM usage and avoid perturbing BLE 5.3 timing.
  common_mistake: |
    **The Pitfall:** Unconditionally choosing rich software tracing tools like SystemView.
    **The Rationale:** Candidates from desktop/mobile backgrounds ignore the massive SRAM footprint that tracing buffers require.
    **The Consequence:** The profiling tool itself alters the system state, causing OOM errors or delaying critical interrupts, making the timing bug unobservable (Heisenbug).
  napkin_math: |
    *   **Software Tracing (Option B):** 5,000 events * 16 bytes/event = 80 KB of SRAM overhead.
    *   **Memory Impact:** 80 KB is 31% of the total 256 KB SRAM. This likely starves the 150 KB KWS model and causes OOM crashes.
    *   **GPIO Toggle (Option A):** Takes 1-2 cycles (<0.02 µs) and **0 bytes of SRAM**.
    *   **Conclusion:** GPIO toggling is the only viable method for full-system timing on highly memory-constrained targets.
