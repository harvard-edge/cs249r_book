title: Optimizing CNN Energy on ARM Cortex-M4 STM32F4
scenario: You are deploying a small convolutional neural network (CNN) for keyword spotting on an ARM Cortex-M4 microcontroller. The CNN involves several 3x3 convolutions and ReLU activations, with feature maps that occasionally exceed the 256KB SRAM, requiring external memory access.
question: How would you cut CNN energy on an STM32F4 when SRAM access costs 10x a MAC and external flash costs 100x?
details:
  realistic_solution: '1. **Quantization**: Aggressively quantize the model to 8-bit or even 4-bit integers to reduce memory footprint and enable more efficient fixed-point operations. 2. **Operator Fusion/Reordering**: Reschedule operations to maximize data reuse in SRAM and reduce external memory accesses. For example, process feature map tiles that fit entirely within SRAM. 3. **Data Layout Optimization**: Choose data layouts (e.g., NHWC vs NCHW) that improve spatial locality and cache utilization, even if there''s no explicit cache on this specific M4, it helps with SRAM access patterns. 4. **Energy-aware Pruning/Sparsity**: Explore pruning or sparsity to reduce the number of operations and model size, prioritizing layers that are bottlenecks for memory or computation. 5. **Fixed-Point Arithmetic**: Implement all computations using optimized fixed-point libraries, avoiding floating-point emulation due to the lack of FPU, which is highly inefficient in terms of cycles and energy.'
  common_mistake: |
    **The Pitfall:** Optimizing purely for compute (MACs) and ignoring data movement.
    **The Rationale:** Candidates focus on FLOPs/MACs as the primary metric for performance, overlooking the energy physics where moving data from external flash costs 100x more than the compute itself.
    **The Consequence:** The model runs, but drains the battery incredibly fast due to excessive external flash fetches.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3x3 conv layer: 32 in channels, 32 out channels, 16x16 input feature map (all 8-bit).
    - 32-bit INT MAC energy: ~1 pJ.
    - 32-bit SRAM access: ~10 pJ.
    - External flash access: ~100 pJ.

    **Calculations:**
    - MACs: 3 * 3 * 32 * 16 * 16 * 32 = 2,359,296 MACs.
    - Compute energy: 2.36M MACs * 1 pJ = 2.36 µJ.
    - Memory size: Input (8 KB) + Output (8 KB) + Weights (9.2 KB) = 25.2 KB accessed.
    - SRAM energy: 25.2 KB * (10 pJ / 4 bytes) = ~64.5 µJ.

    **Conclusion & Interpretation:**
    - **Result: 64.5 µJ (Energy-Bound)**. Memory access (64.5 µJ) dominates compute (2.36 µJ) by nearly 30x, making operator fusion and memory optimization critical to avoid 100x external flash costs.
