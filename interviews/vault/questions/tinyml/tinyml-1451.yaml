title: Adversarial Robustness Evaluation on Cortex-M7 + Ethos-U55 for TinyML
scenario: You are evaluating the adversarial robustness of two TinyML models, Model A (standard CNN) and Model B (adversarial training defense), deployed on a Cortex-M7 (480 MHz, 512 KB SRAM) paired with an Ethos-U55 NPU (512 MAC/cycle). Both models perform image classification on a constrained dataset.
question: "How would you design an evaluation framework to compare resilience against common adversarial attacks given platform constraints?"
details:
  realistic_solution: A realistic solution involves hardware-aware adversarial training, potentially incorporating techniques like quantization-aware training to maintain model size and speed. The evaluation framework should include on-device profiling of both attack generation (if feasible) and defense inference.
  common_mistake: |
    **The Pitfall:** Directly applying adversarial defense strategies designed for cloud/edge GPUs.
    **The Rationale:** Candidates fail to account for the severe memory and computational constraints of TinyML platforms like the Cortex-M7 + Ethos-U55.
    **The Consequence:** They propose solutions that are either too slow or too large to fit, or defenses that introduce unacceptable latency.
  napkin_math: |
    1. Estimate attack memory footprint: Storing adversarial examples and intermediate activations must fit within 512 KB SRAM.
    2. Calculate approximate MAC operations per inference for both models and defenses.
    3. Evaluate PGD attack feasibility: 'k' iterations * ('M' MACs for gradient + 'N' MACs for inference).
    4. Determine if the attack executes within a few seconds at 480 MHz and 512 MAC/cycle.
    5. **Final Result: Framework must constrain attack generation and defenses strictly within SRAM and MAC limits.**
