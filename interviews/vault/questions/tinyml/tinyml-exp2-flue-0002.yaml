title: Guardrail Latency Budget on Ethos-U55
scenario: As part of a Responsible AI impact assessment for a smart-home audio device, your team mandated
  a local PII (Personally Identifiable Information) filtering guardrail model to run before cloud transmission.
  You are deploying this on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform, where the system runs
  at 480 MHz, features 512 KB of shared SRAM, and the Ethos-U55 is configured for 128 MAC/cycle. The total
  system latency budget for the guardrail evaluation is 2.5 milliseconds, but the Cortex-M7 requires 0.5
  ms for memory orchestration and data movement in the SRAM. Calculate the maximum theoretical MAC complexity
  the guardrail model can have to meet this deadline, assuming 100% NPU utilization.
details:
  realistic_solution: The correct approach isolates the execution time available exclusively for the Ethos-U55
    NPU. By subtracting the Cortex-M7's SRAM data movement overhead from the total budget, we establish
    the exact time window for the NPU. We then calculate the total clock cycles available in that specific
    window and multiply by the NPU's structural MAC throughput to find the maximum model complexity.
  common_mistake: Candidates often forget to subtract the Cortex-M7 memory orchestration time from the
    total latency budget, or they fail to multiply the clock speed (480 MHz) by the hardware's specific
    MAC/cycle throughput (128). Some also incorrectly calculate frequencies by mixing up milliseconds
    and microseconds.
  napkin_math: '1. Available NPU Time = Total Budget (2.5 ms) - M7 Orchestration (0.5 ms) = 2.0 ms.

    2. NPU Cycles Available = 480 MHz (480,000,000 cycles/sec) * 0.002 sec = 960,000 cycles.

    3. Max MACs = Cycles * MACs/cycle = 960,000 cycles * 128 MACs/cycle.

    4. Calculation: 960,000 * 128 = 122,880,000 MACs.

    5. The guardrail model can have a maximum theoretical complexity of 122.88 Million MACs.'
