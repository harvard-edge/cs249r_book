title: Gossip-Based Gradient Averaging on Cortex-M4 Mesh Network
scenario: A 16-node Cortex-M4 mesh network runs distributed on-device learning for a smart building system. Each node trains on local sensor data and must share model updates. There is no central coordinator.
question: How would you design a gossip-based gradient averaging protocol that converges in under 60 seconds with minimal memory overhead per node?
details:
  realistic_solution: 'Utilize asynchronous gossip averaging: nodes independently pick a random neighbor at interval T, execute an FP16 delta-exchange, and merge updates. Enforcing Top-10% sparsity compression on the deltas ensures the payload comfortably bridges the 250 kbps mesh radio while the FP16 model structure preserves the tight 256 KB SRAM constraints.'
  common_mistake: |
    **The Pitfall:** Defaulting to synchronous AllReduce protocols across an ad-hoc mesh architecture.
    **The Rationale:** Candidates automatically apply heavy data-center synchronization concepts without evaluating network diameter latency.
    **The Consequence:** The model experiences extreme congestion stalls, violating real-time update boundaries and missing the 60s convergence deadline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Nodes: 16 (4x4 Mesh). Required Convergence Rounds: O(N log N) = 64 rounds.
       - Model: 50K parameters (FP16 = 100 KB). SRAM: 256 KB.
       - Radio: 250 kbps (~31.25 KB/s).
    2. **Calculations:**
       - Delta Compress: Send 10% parameters = 10 KB payload per exchange.
       - Payload latency = 10 KB / 31.25 KB/s = 0.32s per round.
       - Total Convergence = 64 rounds * 0.32s = 20.48s.
       - SRAM Load = 100 KB model + 10 KB delta + stack = < 150 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Verified Top-K Sparsification**. The sparse FP16 update solves the mesh latency puzzle, converging in ~20s and fully respecting the 256KB threshold.
