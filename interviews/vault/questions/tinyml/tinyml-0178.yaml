title: The Sensor Bandwidth Chasm
scenario: When moving a model from a PC-based training environment to a microcontroller, you shift from
  reading data from files in memory to ingesting it from a sensor over a bus like I2C. Identify the approximate
  bandwidth difference. How much faster is reading from on-chip SRAM compared to a standard I2C bus?
details:
  realistic_solution: On-chip SRAM has a bandwidth of ~1.2 GB/s, while a standard I2C bus is limited to
    ~400 Kbps (50 KB/s). This represents a performance gap of about 24,000x. This chasm means the real-time
    data pipeline from the sensor is fundamentally constrained compared to the ideal conditions of training
    from memory, often leading to issues like buffer overruns or missed samples.
  common_mistake: Engineers often underestimate the bandwidth limitations of peripheral interfaces like
    I2C or SPI. They assume that because the components are on the same small PCB, data transfer is uniformly
    fast. In reality, these buses are serial and clocked orders of magnitude slower than the parallel,
    high-speed memory bus, creating a massive performance gap that is a common source of training-serving
    skew if not properly buffered.
  napkin_math: 'SRAM Bandwidth: ~1.2 GB/s | I2C Bandwidth: 400 Kbps = 0.4 Mbits/s = 0.05 MBytes/s | Ratio
    = (1,200,000,000 Bytes/s) / (50,000 Bytes/s) = 24,000x. | SRAM is ~24,000 times faster than I2C.'
  options:
  - They are roughly the same speed
  - About 100x faster
  - About 24,000x faster
  - About 1,000x faster
  correct_index: 2
