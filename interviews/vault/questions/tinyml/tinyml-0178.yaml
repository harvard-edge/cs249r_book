title: The Sensor Bandwidth Chasm
scenario: When moving a model from a PC-based training environment to a microcontroller, you shift from reading data from files in memory to ingesting it from a sensor over a bus like I2C.
question: How much faster is reading from on-chip SRAM compared to a standard I2C bus?
details:
  realistic_solution: On-chip SRAM has a bandwidth of ~1.2 GB/s, while a standard I2C bus is limited to ~400 Kbps (50 KB/s). This represents a performance gap of about 24,000x. This chasm means the real-time data pipeline from the sensor is fundamentally constrained compared to the ideal conditions of training from memory.
  common_mistake: |
    **The Pitfall:** Underestimating the bandwidth limitations of peripheral interfaces like I2C.
    **The Rationale:** Engineers assume that because components are on the same PCB, data transfer is uniformly fast, forgetting serial bus limits.
    **The Consequence:** They design systems that suffer from severe buffer overruns and missed sensor samples.
  napkin_math: |
    - SRAM Bandwidth: ~1.2 GB/s.
    - I2C Bandwidth: 400 Kbps = 50 KB/s.
    - Ratio: 1,200,000,000 Bytes/s / 50,000 Bytes/s = 24,000x.
    - **On-chip SRAM is approximately 24,000 times faster than a standard I2C bus.**
  options:
  - They are roughly the same speed
  - About 100x faster
  - About 24,000x faster
  - About 1,000x faster
  correct_index: 2
