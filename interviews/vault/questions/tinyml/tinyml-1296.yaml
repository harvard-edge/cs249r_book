title: Keyword Spotting Latency Budget on Corstone-300
scenario: You are designing an always-on keyword spotting system on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform. The system requirement dictates a maximum end-to-end latency of 50ms from audio capture to action trigger. The neural network requires 10 million MAC operations per inference. You need to decompose the latency budget across the M7 running at 480 MHz, the Ethos-U55 NPU (256 MAC/cycle), and the shared 512 KB SRAM.
question: How should you decompose a 50 ms Corstone-300 keyword-spotting latency budget across audio capture, M7 preprocessing, and U55 inference?
details:
  realistic_solution: A robust design decomposes the 50ms budget across capture, preprocessing (M7), inference (Ethos-U55), and post-processing (M7). The M7 should extract features using CMSIS-DSP while managing ping-pong buffers in the shared 512 KB SRAM to ensure the U55 is not starved of data. Because the U55 handles MACs so efficiently, the critical path usually shifts to the M7's feature extraction and memory bandwidth management.
  common_mistake: |
    **The Pitfall:** Assuming the NPU executes the entire pipeline without accounting for M7 preprocessing time.
    **The Rationale:** Candidates focus entirely on the neural network inference speed, ignoring feature extraction (MFCC) and memory contention.
    **The Consequence:** The system misses the real-time deadline because M7 preprocessing and SRAM contention become the actual bottleneck.
  napkin_math: |
    * **Ethos-U55 peak compute:** 480 MHz * 256 MAC/cycle = 122.8 GMAC/s.
    * **Theoretical inference:** 10,000,000 MACs / 122.8e9 = 0.081 ms.
    * **Effective inference:** Assuming 25% utilization due to SRAM contention = **0.33 ms**.
    * **Remaining budget:** 50 ms - 0.33 ms = 49.67 ms left.
    * **Budget allocation:** ~20 ms audio capture framing, ~10-15 ms for M7 MFCC compute, <1 ms decision logic. Total safely fits under 50 ms.
