title: The Federated Wearable ROI Proposal
scenario: You are the Principal ML Systems Engineer at a med-tech startup. Your company's flagship product
  is a 'smart patch' that detects early-stage neurological tremors using a small, on-device model. It
  runs on a Cortex-M4 MCU. The current V1 product works, but the model is static—it's flashed at the factory
  and never updated.
details:
  realistic_solution: 'First prove physical viability: last-layer fine-tuning on Cortex-M4 with 1M-MAC
    model needs ~84KB SRAM (fits in 256KB), takes ~5.95s per 10-epoch round at 168MHz, consuming ~0.298J.
    On a 225mAh coin cell (~2430J total), each FL round costs ~0.298J. While a single round is only ~0.012%
    of the battery, typical FL requires thousands of rounds (e.g., 2000 rounds = 596J, draining ~25% of
    the battery just for training), significantly reducing the device lifespan for intensive training
    regimes. This makes full continuous backprop FL impractical on battery power. Instead, propose federated
    analytics: devices upload compressed gradient statistics (100 bytes, not full gradients) weekly. Server
    aggregates and pushes improved model via BLE OTA. ROI: if the improved model prevents even one misdiagnosed
    tremor episode per 1000 patients, the $50K saved in ER costs justifies the $15/device OTA infrastructure.'
  common_mistake: Focusing exclusively on the technical implementation of Federated Learning (e.g., the
    specific algorithm) while neglecting the economic justification and physical constraints. A junior
    engineer builds what's asked; a principal engineer determines *if* it should be built and *how to
    prove* its value. Another common mistake is ignoring the severe power and memory limitations of TinyML,
    for instance, by proposing a full backpropagation approach that would be impossible on a Cortex-M4.
  napkin_math: 'Last-layer fine-tune: 1M MACs, 10 epochs, 100 samples = 1G MACs. At M4@168 MHz: 1G/168M=5.95s.
    Energy: 50mW*5.95s=0.298J/round. Coin cell=2430J. Weekly FL: 52*0.298=15.5J/yr=0.64% battery. Viable.
    Full backprop 10x: 2.98J/round, 2000 rounds=5960J>2430J — battery dead. Federated analytics (100B/wk)
    is safest.'
