title: The Federated Wearable ROI Proposal
scenario: You are the Principal ML Systems Engineer at a med-tech startup. Your company's flagship product is a 'smart patch' that detects early-stage neurological tremors using a small, on-device model. The current V1 product works, but the model is static and never updated.
question: What ROI and power analysis justifies or limits federated learning for the smart tremor-detection patch?
details:
  realistic_solution: 'First prove physical viability: last-layer fine-tuning on a low-power MCU with a 1M-MAC model needs ~84KB SRAM, takes ~5.95s per 10-epoch round, consuming ~0.298J. On a coin cell (~2430J total), 2000 FL rounds drain ~25% of the battery. This makes full continuous backprop FL impractical on battery power. Instead, propose federated analytics: devices upload compressed gradient statistics (100 bytes, not full gradients) weekly. Server aggregates and pushes improved model via BLE OTA. ROI: if the improved model prevents even one misdiagnosed tremor episode per 1000 patients, the $50K saved in ER costs justifies the $15/device OTA infrastructure.'
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the technical implementation of Federated Learning.
    **The Rationale:** Engineers ignore severe power and memory limitations, proposing full backpropagation that is impossible on a coin-cell device.
    **The Consequence:** Designing a mathematically sound FL system that instantly drains the device battery in the real world.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - FL round compute: 1G MACs at 168MHz takes ~5.95s.
       - Active Power: 50mW.
       - Coin cell total energy: ~2430J.
    2. **Calculations:**
       - Energy per round: 50mW * 5.95s = 0.298J.
       - Full backprop cost: 2000 rounds * 0.298J = 596J (~25% of battery).
       - Federated analytics cost: 100 bytes/week via BLE OTA. Weekly cost is ~0.64% of battery.
    3. **Conclusion & Interpretation:**
       - **Result: Full FL is physically unviable (25% battery drain). Federated Analytics is the viable alternative.**
