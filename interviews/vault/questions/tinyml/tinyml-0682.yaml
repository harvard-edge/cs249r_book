title: The Federated Wearable ROI Proposal
scenario: You are the Principal ML Systems Engineer at a med-tech startup. Your company's flagship product is a 'smart patch' that detects early-stage neurological tremors using a small, on-device model running on a Cortex-M4 MCU. The current V1 product works, but the model is static—it's flashed at the factory and never updated.
question: What ROI and power analysis justifies or limits federated learning for the smart tremor-detection patch?
details:
  realistic_solution: 'First prove physical viability: last-layer fine-tuning on Cortex-M4 with 1M-MAC model needs ~84KB SRAM (fits in 256KB), takes ~5.95s per 10-epoch round at 168MHz, consuming ~0.298J. On a 225mAh coin cell (~2430J total), each FL round costs ~0.298J. While a single round is only ~0.012% of the battery, typical FL requires thousands of rounds (e.g., 2000 rounds = 596J, draining ~25% of the battery just for training), significantly reducing the device lifespan for intensive training regimes. This makes full continuous backprop FL impractical on battery power. Instead, propose federated analytics: devices upload compressed gradient statistics (100 bytes, not full gradients) weekly. Server aggregates and pushes improved model via BLE OTA. ROI: if the improved model prevents even one misdiagnosed tremor episode per 1000 patients, the $50K saved in ER costs justifies the $15/device OTA infrastructure.'
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the technical implementation of Federated Learning.
    **The Rationale:** Engineers ignore severe power and memory limitations, proposing full backpropagation that is impossible on a Cortex-M4 coin-cell device.
    **The Consequence:** Designing a mathematically sound FL system that instantly drains the device battery in the real world.
  napkin_math: |
    - FL round compute: 1G MACs at 168MHz takes ~5.95s.
    - Energy per round: 50mW * 5.95s = 0.298J.
    - Coin cell total energy: ~2430J.
    - Full backprop cost: 2000 rounds = 596J (~25% of battery). Impractical.
    - Federated analytics cost: 100 bytes/week via BLE OTA. Weekly cost is ~0.64% of battery.
    - **ROI Justification:** Preventing one misdiagnosis saves $50K, easily covering the **$15/device** OTA infrastructure.
