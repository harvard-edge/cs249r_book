title: 'Optimizing a TinyML Model for Cortex-M7 with Ethos-U55: Graph Compilation Strategy'
scenario: You are tasked with deploying a TensorFlow CNN for keyword spotting onto a 480 MHz Cortex-M7 paired with an Ethos-U55 NPU (512 MAC/cycle). The model marginally exceeds the 1 MB flash memory if not optimized, and shares 512 KB of SRAM. Your goal is to achieve < 100ms real-time inference latency.
question: "How should a graph compiler convert and partition a TensorFlow CNN for Cortex-M7 plus Ethos-U55 real-time KWS?"
details:
  realistic_solution: A realistic solution involves a multi-stage graph compilation and optimization strategy using an AOT compiler toolchain. This includes operator lowering, graph partitioning, constant folding, and dead code elimination.
  common_mistake: |
    **The Pitfall:** Relying solely on default TensorFlow Lite for Microcontrollers (TFLu) conversion.
    **The Rationale:** Candidates do not understand the underlying graph compilation process and the necessity of Ahead-Of-Time (AOT) tools like Vela.
    **The Consequence:** They suffer inefficient operator mapping, sub-optimal memory utilization, and miss Ethos-specific constant folding.
  napkin_math: |
    1. Calculate total cycle budget: 100 ms * 480 MHz = 48 million cycles available.
    2. Estimate ideal NPU execution: 10M MACs / 512 MACs/cycle = ~19,531 cycles.
    3. Calculate 32x32x64 INT8 feature map footprint: 65,536 bytes (~64 KB).
    4. Compare buffer size to SRAM: A few 64 KB buffers quickly fill the 512 KB SRAM.
    5. **Final Result: While NPU compute is fast (~19k cycles), memory optimization is critical to fit activations in 512 KB SRAM.**
