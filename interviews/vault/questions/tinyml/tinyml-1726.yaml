title: Static Quantization Parameters
scenario: 'A smart doorbell uses a 200K parameter CNN, migrating from FP32 to INT8
  to execute within the 256 KB SRAM limits of a Cortex-M4. Note: a 2M parameter model
  at 1 byte INT8 would still be 2 MB - far exceeding the on-chip SRAM and even most
  MCU on-board flash; 200K parameters at INT8 = 200 KB is the canonical fit for bare-metal
  MCU deployment.'
question: Explain how post-training static quantization computes the specific integer
  parameters required to convert FP32 activations into INT8.
details:
  realistic_solution: Static quantization passes a representative calibration dataset
    through the FP32 model to observe minimum and maximum activation values for each
    tensor. It calculates a 'scale' by dividing the (max - min) range by the INT8
    range (255), and sets a 'zero-point' integer that directly corresponds to the
    floating-point value 0.0.
  common_mistake: Confusing static quantization with dynamic quantization, falsely
    stating that min/max are computed at runtime per inference.
  napkin_math: Scale = (max - min) / 255
