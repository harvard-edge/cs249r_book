title: Static Quantization Parameters
scenario: A smart doorbell uses a 200K parameter CNN, migrating from FP32 to INT8 to execute within the SRAM limits of a Cortex-M4.
question: Explain how post-training static quantization computes the specific integer parameters required to convert FP32 activations into INT8.
details:
  realistic_solution: Static quantization passes a representative calibration dataset through the FP32 model to observe minimum and maximum activation values for each tensor. It calculates a 'scale' by dividing the (max - min) range by the INT8 range (255), and sets a 'zero-point' integer that directly corresponds to the floating-point value 0.0.
  common_mistake: |
    **The Pitfall:** Confusing static quantization with dynamic quantization.
    **The Rationale:** Falsely stating that min/max are computed at runtime per inference instead of offline using a representative calibration dataset.
    **The Consequence:** Misunderstanding the performance benefits of static quantization, as dynamic quantization incurs heavy runtime overhead.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 8-bit integer quantization (INT8 range: 0 to 255, or -128 to 127).
       - Need to map an FP32 range [min, max] to this integer range.
    2. **Calculations:**
       - Scale = (max - min) / 255.
       - Zero-point calculation aligns the floating-point 0.0 perfectly to an integer value to ensure zero-padding has no effect.
    3. **Conclusion & Interpretation:**
       - **Result: Precision-Bound.** The zero-point is set directly to the integer corresponding to 0.0, avoiding accumulation drift during padding.
