title: The INT8 Quantization Memory Savings
scenario: A keyword spotting model has 250,000 parameters stored in FP32 (4 bytes each). After post-training
  quantization to INT8, how much Flash memory does it save? Will the quantized model fit in 1 MB of Flash?
question: "Will the quantized model fit in 1 MB of Flash?"
details:
  realistic_solution: 'FP32 size: 250,000 × 4 = 1,000,000 bytes = 1,000 KB ≈ 977 KB. INT8 size: 250,000
    × 1 = 250,000 bytes = 250 KB ≈ 244 KB. Savings: 750 KB (75%). The INT8 model (244 KB) fits comfortably
    in 1 MB Flash, leaving ~780 KB for firmware, buffers, and other code.'
  common_mistake: Forgetting to account for quantization metadata (scale and zero-point per layer/channel).
    For a model this small with ~20 layers, the overhead is negligible (<1 KB), but candidates should
    mention it.
  napkin_math: 'FP32: 250K*4B=1000KB. INT8: 250K*1B=250KB. Savings: 750KB (75%). 1MB Flash=1024KB. INT8
    model=244KiB=24% of Flash. Remaining 780KB for bootloader(32KB), RTOS(64KB), OTA buffer, app code.
    INT8 also ~2-4x faster on M4 via SIMD: 4 INT8 ops/cycle vs 1 FP32/cycle.'
  options:
  - A) 250 KB saved (25%), INT8 model is 750 KB
  - B) 500 KB saved (50%), INT8 model is 500 KB
  - C) 750 KB saved (75%), INT8 model is 250 KB
  - D) 875 KB saved (87.5%), INT8 model is 125 KB
  correct_index: 2
