title: 'The INT8 Quantization Memory Savings'
scenario: 'A keyword spotting model has 250,000 parameters stored in FP32 (4 bytes each).'
question: 'How much Flash memory does INT8 quantization save, and will the quantized model fit in 1 MB of Flash?'
details:
  realistic_solution: 'FP32 size: 250,000 x 4 = 1,000,000 bytes = 1,000 KB ≈ 977 KB. INT8 size: 250,000 x 1 = 250,000 bytes = 250 KB ≈ 244 KB. Savings: 750 KB (75%). The INT8 model (244 KB) fits comfortably in 1 MB Flash, leaving ~780 KB for firmware, buffers, and other code.'
  common_mistake: 'Forgetting to account for quantization metadata (scale and zero-point per layer/channel). For a model this small with ~20 layers, the overhead is negligible (<1 KB), but candidates should mention it.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Model parameters: 250,000
    - FP32 size: 4 bytes/param
    - INT8 size: 1 byte/param
    - Flash capacity: 1 MB (1024 KB)

    **Calculations:**
    - FP32 footprint = 250,000 * 4 = 1,000,000 bytes = 1000 KB
    - INT8 footprint = 250,000 * 1 = 250,000 bytes = 250 KB
    - Savings = 1000 KB - 250 KB = 750 KB (75%)

    **Conclusion & Interpretation:**
    - **Result: 250 KB (Memory-Bound)**. The INT8 model uses only 24% of the 1MB Flash, leaving ~780 KB for bootloader, RTOS, and app code.
  options:
  - 'A) 250 KB saved (25%), INT8 model is 750 KB'
  - 'B) 500 KB saved (50%), INT8 model is 500 KB'
  - 'C) 750 KB saved (75%), INT8 model is 250 KB'
  - 'D) 875 KB saved (87.5%), INT8 model is 125 KB'
