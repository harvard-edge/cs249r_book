title: ESP32-S3 Memory Hierarchy Energy Analysis
scenario: 'You are designing an always-on anomaly detection system for an industrial sensor using an ESP32-S3. The data science team proposes two INT8 quantized models using the vector extensions: Model A (400 KB) which fits entirely in internal SRAM, and Model B (2.5 MB) which is slightly more accurate but requires storing weights in the external 8 MB PSRAM. You need to analyze the system-level energy implications to specify the final deployment strategy for a battery-constrained environment.'
question: 'Which ESP32-S3 model placement strategy is more energy efficient: a 400 KB SRAM-resident model or a 2.5 MB PSRAM model?'
details:
  realistic_solution: A strong candidate will identify that the energy bottleneck is memory access, not compute. They will propose using Model A to keep all weight fetches within the low-energy SRAM domain. If Model B's accuracy is strictly required, they should suggest a cascaded architecture where Model A acts as a low-power wake-up stage, and Model B (loaded from PSRAM) is only executed when Model A detects a potential anomaly, thus amortizing the high cost of external memory access.
  common_mistake: |
    **The Pitfall:** Focusing solely on the computational cost (MACs) while ignoring memory access energy.
    **The Rationale:** Candidates assume hardware vector extensions guarantee high efficiency, oblivious to the massive energy disparity between traversing an on-chip bus vs an external SPI interface.
    **The Consequence:** Deploying an "accurate" model that utterly obliterates the power budget via SPI toggling overhead.
  napkin_math: |
    1. **Assumptions & Constraints:** 1 INT8 MAC = ~0.2 pJ. 32-bit SRAM fetch = ~10 pJ. 32-bit PSRAM SPI fetch = ~100 pJ. 100KB FC layer.
    2. **Calculations:** Compute energy = 100,000 * 0.2 pJ = 0.02 µJ. SRAM fetch energy = (100,000 / 4 bytes) * 10 pJ = 0.25 µJ. PSRAM fetch energy = (100,000 / 4 bytes) * 100 pJ = 2.5 µJ. PSRAM vs SRAM penalty = 2.5 / 0.25 = 10x.
    3. **Conclusion & Interpretation:** **PSRAM access consumes 10x more energy than SRAM and 100x more than compute** (Energy-Bound Memory Hierarchy).
