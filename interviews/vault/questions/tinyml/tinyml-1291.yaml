title: ESP32-S3 Memory Hierarchy Energy Analysis
scenario: 'You are designing an always-on anomaly detection system for an industrial
  sensor using an ESP32-S3 (240 MHz dual-core Xtensa, 512 KB SRAM, 8 MB PSRAM). The
  data science team proposes two INT8 quantized models using the vector extensions:
  Model A (400 KB) which fits entirely in internal SRAM, and Model B (2.5 MB) which
  is slightly more accurate but requires storing weights in the external 8 MB PSRAM.
  You need to analyze the system-level energy implications of these two architectures
  to specify the final deployment strategy for a battery-constrained environment.'
question: 'Which ESP32-S3 model placement strategy is more energy efficient: a 400
  KB SRAM-resident model or a 2.5 MB PSRAM model?'
details:
  realistic_solution: A strong candidate will identify that the energy bottleneck
    is memory access, not compute. They will propose using Model A to keep all weight
    fetches within the low-energy SRAM domain. If Model B's accuracy is strictly required,
    they should suggest a cascaded architecture where Model A acts as a low-power
    wake-up stage, and Model B (loaded from PSRAM) is only executed when Model A detects
    a potential anomaly, thus amortizing the high cost of external memory access.
  common_mistake: Candidates often focus solely on the computational cost (number
    of MAC operations) and assume that since the ESP32-S3 has hardware vector extensions
    for INT8, both models will be highly efficient. They frequently fail to account
    for the massive energy disparity between accessing on-chip SRAM versus off-chip
    PSRAM over the SPI bus.
  napkin_math: 'Assuming standard Horowitz energy scaling: 1 INT8 MAC operation costs
    ~0.2 pJ. Fetching 32 bits from on-chip SRAM costs ~10 pJ, while fetching 32 bits
    from off-chip PSRAM via SPI costs ~100 pJ. For a fully connected layer with 100K
    weights (100 KB): Compute energy = 100K * 0.2 pJ = 0.02 uJ. SRAM fetch energy
    = (100KB / 4 bytes) * 10 pJ = 0.25 uJ. PSRAM fetch energy = (100KB / 4 bytes)
    * 100 pJ = 2.5 uJ. Fetching weights from PSRAM consumes 10x more energy than SRAM
    and over 100x more energy than the actual INT8 compute, making Model B severely
    power-inefficient for always-on use.'
