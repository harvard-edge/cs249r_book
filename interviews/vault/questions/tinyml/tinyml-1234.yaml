title: ESP32-S3 SRAM vs PSRAM Activation Bottleneck
scenario: You are deploying an INT8 keyword spotting model on an ESP32-S3 microcontroller. The model weights are 1.5 MB and the peak activation buffer is 350 KB. Allocating both in the 8 MB PSRAM causes inference latency to hit 450ms, missing the 100ms real-time deadline.
question: How would you diagnose the bottleneck and quantify how reallocating memory resolves the latency issue?
details:
  realistic_solution: Pin the highly-mutated 350 KB activation buffer to the fast 512 KB internal SRAM (leaving 162 KB for system tasks), while keeping the read-only 1.5 MB weights in PSRAM. This utilizes zero-wait-state memory for activations, avoiding severe SPI bus stalls.
  common_mistake: |
    **The Pitfall:** Treating external PSRAM identically to internal SRAM simply because it is memory-mapped.
    **The Rationale:** Engineers assume addressable memory implies uniform latency, ignoring the severe bandwidth limits of the serial SPI bus connecting the PSRAM.
    **The Consequence:** Heavy read/write operations for activations cause massive cache thrashing, blowing past the real-time latency deadline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SRAM bandwidth: ~960 MB/s. PSRAM (SPI) bandwidth: ~40 MB/s.
       - Activation traffic (reads/writes): ~15 MB for 10M INT8 MACs.
    2. **Calculations:**
       - Activation time in PSRAM: 15 MB / 40 MB/s = 375 ms.
       - Activation time in SRAM: 15 MB / 960 MB/s = 15.6 ms.
       - Time saved: 375 ms - 15.6 ms = 359.4 ms.
       - New total latency: 450 ms - 359.4 ms = 90.6 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 90.6 ms latency.** The system was entirely bandwidth-bound over the SPI bus. Moving activations to SRAM meets the 100ms deadline.
