title: 'CNN Feature Map Optimization: SRAM vs. External DRAM on Cortex-M7/Ethos-U55'
scenario: You are deploying a 16-bit quantized CNN on an ARM Cortex-M7 (480 MHz) integrated with an ARM Ethos-U55 NPU. The Ethos-U55 has direct, low-latency access to 512 KB of tightly-coupled SRAM. An intermediate feature map of size 16x16x128 (int16) is repeatedly accessed by subsequent layers. Due to the model's footprint, this feature map is stored in slower external DRAM, resulting in significant memory access latency and bottlenecking the NPU.
question: How would you diagnose this memory bottleneck and quantify the potential performance improvement by moving it to SRAM?
details:
  realistic_solution: The realistic solution involves detailed profiling to pinpoint the memory bottleneck, focusing on the time spent fetching the 16x16x128 (int16) feature map from external DRAM. This tensor's size (16*16*128*2 bytes = 65,536 bytes = 64 KB) comfortably fits within the Ethos-U55's 512 KB tightly-coupled SRAM. The optimization would involve strategically allocating this critical feature map to the SRAM before its first access by the NPU, potentially using compiler pragmas, specific memory region mapping, or direct data transfer mechanisms.
  common_mistake: |
    **The Pitfall:** Optimizing NPU compute while ignoring data movement latency.
    **The Rationale:** Developers assume the NPU handles everything efficiently, missing the external DRAM bottleneck.
    **The Consequence:** The massive NPU throughput is entirely starved by slow memory fetches.
  napkin_math: |
    * Feature map size: 16x16x128 * 2 bytes = 65,536 bytes (64 KB).
    * Cache lines needed: 65,536 / 32 = 2048 cache lines.
    * DRAM Read (100 cycles/line * 5 reads): 5 * 2048 * 100 = 1,024,000 cycles.
    * SRAM Read (2 cycles/line * 5 reads): 5 * 2048 * 2 = 20,480 cycles.
    * **Result: Moving the 64 KB map to SRAM saves over 1 million CPU cycles (50x speedup).**
