title: 'The Real-Time Audio Deadline: Real-Time Deadlines'
scenario: You are building a keyword spotting system on a Cortex-M4 microcontroller. The system continuously
  samples audio into 40ms frames. Your KWS neural network takes 30ms to run inference on a single frame.
  Explain the real-time performance of this system. Can it keep up with the incoming audio stream, and
  if so, what is its processing buffer?
question: "Can it keep up with the incoming audio stream, and if so, what is its processing buffer?"
details:
  realistic_solution: The system can keep up with the audio stream. A new audio frame arrives every 40ms,
    and the inference process finishes in 30ms. This leaves a 10ms 'slack' or processing buffer time per
    frame. This buffer is critical for absorbing small variations in system performance (e.g., handling
    interrupts) and ensuring the hard real-time deadline is consistently met. The system's utilization
    for the inference task is 75% (30ms / 40ms), which is a healthy margin.
  common_mistake: Engineers accustomed to cloud development often assume that data can be queued indefinitely
    if processing falls behind. In a hard real-time TinyML system with minimal SRAM, falling behind the
    data arrival rate means frames are permanently dropped and the system fails its core requirement.
    There is no 'catching up' by processing a backlog.
  napkin_math: The microphone delivers a new audio frame every 40ms. The Cortex-M4 completes the KWS inference
    in 30ms. Processing Time (30ms) < Frame Arrival Rate (40ms). This gives a 10ms idle window per frame.
    CPU Utilization = 30ms / 40ms = 75%. The Cortex-M4 can safely enter deep sleep for 10ms each cycle,
    saving roughly 25% of active compute energy.
  options:
  - The system is overloaded and will immediately drop frames.
  - It's fine, the system can queue incoming frames while it's busy.
  - The system meets the deadline with a 10ms buffer per frame.
  - The system has a 30ms buffer, equal to the inference time.
  correct_index: 2
