title: 'The Real-Time Audio Deadline: Real-Time Deadlines'
scenario: A keyword spotting system on a Cortex-M4 microcontroller continuously samples audio into 40ms frames. The KWS neural network takes 30ms to run inference on a single frame.
question: Can the system keep up with the incoming audio stream, and if so, what is its processing buffer?
details:
  realistic_solution: The system completes inference faster than the arrival rate, leaving a 10ms slack buffer to absorb RTOS overhead or enter deep sleep.
  common_mistake: |
    **The Pitfall:** Assuming data can be queued indefinitely if processing falls behind.
    **The Rationale:** Cloud engineers are accustomed to scalable queues and backpressure, assuming momentary overloads are harmless.
    **The Consequence:** In a hard real-time TinyML system with minimal SRAM, falling behind causes permanent frame drops and catastrophic failure of the core pipeline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Audio frame arrival rate: 40 ms.
       - Inference compute time: 30 ms.
    2. **Calculations:**
       - Processing buffer (slack): 40 ms - 30 ms = 10 ms.
       - CPU Utilization: 30 ms / 40 ms = 75%.
    3. **Conclusion & Interpretation:**
       - **Result: 10ms slack (75% utilization).** The system is safely real-time-bound. The 10ms buffer absorbs interrupts and allows power-saving sleep states.
  options:
  - "The system is overloaded and will immediately drop frames."
  - "It's fine, the system can queue incoming frames while it's busy."
  - "The system meets the deadline with a 10ms buffer per frame."
  - "The system has a 30ms buffer, equal to the inference time."
  correct_index: 2
