title: Tinyml New 0020
scenario: A Cortex-M4 sleeps 99% of the time, only waking up on audio triggers. Power profiling shows
  a continuous 20uA drain during deep sleep, missing the 2uA target required for 10-year battery life.
details:
  realistic_solution: The symptom is SRAM retention leakage. The MCU retains the full 256KB SRAM during
    deep sleep so the ML model state isn't lost. SRAM cells leak current continuously. To reach the 2uA
    target, you must power off the SRAM banks that are not actively holding the model weights or state.
    If the model is in Flash, you can disable almost all SRAM banks before sleeping.
  common_mistake: Assuming 'deep sleep' automatically optimizes power without explicitly managing SRAM
    bank retention policies.
  napkin_math: 256KB SRAM has 16 banks of 16KB. Leakage = 1.2uA per bank. 16 banks = ~19.2uA. If only
    2 banks are needed for retention, power off 14 banks. Savings = 14 * 1.2uA = 16.8uA, dropping total
    to ~2.4uA.
