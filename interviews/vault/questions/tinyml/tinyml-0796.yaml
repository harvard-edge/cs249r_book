title: Tinyml New 0020
scenario: A Cortex-M4 sleeps 99% of the time, only waking up on audio triggers. Power profiling shows a continuous 20uA drain during deep sleep, missing the 2uA target required for 10-year battery life.
question: What retained SRAM leakage explains the 20 microamp deep-sleep drain, and how can bank power-down meet the target?
details:
  realistic_solution: The symptom is SRAM retention leakage. The MCU retains the full 256KB SRAM during deep sleep so the ML model state isn't lost. SRAM cells leak current continuously. To reach the 2uA target, you must power off the SRAM banks that are not actively holding the model weights or state. If the model is in Flash, you can disable almost all SRAM banks before sleeping.
  common_mistake: |
    **The Pitfall:** Assuming "deep sleep" automatically optimizes power without manual configuration.
    **The Rationale:** Engineers treat sleep states as a black box and fail to explicitly manage SRAM bank retention policies for ML model state.
    **The Consequence:** The entire 256KB of SRAM leaks current continuously, destroying the 10-year battery life target.
  napkin_math: |
    1. Identify leakage: 256 KB SRAM has 16 banks of 16 KB.
    2. Bank leakage rate: ~1.2 µA per bank. Total 16 banks = ~19.2 µA (explaining the 20 µA drain).
    3. Optimization: If the ML model is in Flash, only 2 banks are needed for state retention.
    4. Power down: Disable 14 unused banks. Savings = 14 × 1.2 µA = 16.8 µA.
    5. New drain: 19.2 µA - 16.8 µA = **2.4 µA** (approaching the 2 µA target).
