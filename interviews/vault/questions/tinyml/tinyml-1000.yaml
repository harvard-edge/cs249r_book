title: 'Real-Time Vibration Ingestion Pipeline on Corstone-300'
scenario: 'You are designing a real-time predictive maintenance system for industrial motors using the ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform. The system ingests 3-axis vibration data at 16 kHz (16-bit resolution) and must continuously extract spectrogram features on the 480 MHz Cortex-M7 before passing them to the Ethos-U55 for inference.'
question: 'How would you architect the streaming ingestion pipeline, detailing your DMA buffering strategy, feature computation overlap, and memory partitioning to guarantee no dropped frames?'
details:
  realistic_solution: 'A robust design uses a DMA ping-pong (double) buffer to ingest raw sensor data asynchronously. While DMA fills one half, the Cortex-M7 processes the other half into spectrogram features, storing them in a dedicated ring buffer. To handle the shared 512 KB SRAM, memory must be strictly partitioned to prevent overlap: reserving sufficient space for the DMA buffers, M7 DSP workspace, and the Ethos-U55 model and activations.'
  common_mistake: |
    **The Pitfall:** Proposing a naive single-buffer approach that blocks ingestion during feature computation.
    **The Rationale:** Candidates fail to account for the shared memory architecture and over-allocate SRAM to the model without leaving scratchpad memory for the DSP.
    **The Consequence:** The M7 halts data ingestion during FFT execution, dropping 16 kHz sensor frames and destroying predictive maintenance accuracy.
  napkin_math: |
    **Assumptions & Constraints:**
    - 16 kHz, 3 axes, 16-bit (96 KB/sec).
    - 500ms inference window.
    - Shared 512 KB SRAM.
    - 480 MHz Cortex-M7.

    **Calculations:**
    - DMA Ping-Pong Buffer: 48 KB * 2 = 96 KB.
    - M7 FFT Scratchpad: 128 KB.
    - Remaining SRAM for U55: 512 KB - 96 KB - 128 KB = 288 KB.
    - Cycles available in 500ms: 480 MHz * 0.5s = 240,000,000 cycles.

    **Conclusion & Interpretation:**
    - **Result: 288 KB remaining for Ethos-U55 (Memory-Bound)**. Easily handles the ~50K cycle FFT cost.
