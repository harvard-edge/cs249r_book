title: Energy-Aware Model Architecture for Corstone-300
scenario: You are tasked with architecting a vision-based wake-word model for an IoT device using the
  ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform. The system features a 480 MHz M7, 512 KB of shared
  SRAM, and an Ethos-U55 NPU capable of up to 512 MACs/cycle. The battery budget is extremely tight, and
  you must design an operator pipeline that minimizes the energy cost of memory accesses between the NPU
  and the shared 512 KB SRAM.
question: "How should the Corstone-300 vision wake-word model minimize SRAM access energy while using the Ethos-U55 efficiently?"
details:
  realistic_solution: The optimal design relies heavily on layer fusion and operator selection (like depthwise
    convolutions) that maximize data reuse within the Ethos-U55's internal buffers. The candidate should
    evaluate the energy tradeoff of recomputing activations versus storing them in the shared SRAM, explicitly
    designing the network topology to keep the working memory footprint well below the 512 KB limit.
  common_mistake: Candidates often optimize purely for total MAC counts to reduce compute time, forgetting
    that the energy per operation for an SRAM read/write is orders of magnitude higher than a single MAC
    on the NPU. They might design wide layers that spill out of the NPU's local registers, forcing constant
    energy-intensive swapping with the 512 KB SRAM.
  napkin_math: Assuming a MAC operation on the Ethos-U55 takes ~0.1pJ and a 32-bit read from the 512 KB
    SRAM takes ~5pJ (a 50x difference based on Horowitz tables). For a standard layer requiring 512K MACs
    and 512K SRAM accesses, compute energy is 51.2nJ and memory energy is 2.56µJ. By architecting the
    model to fuse operations and leverage the NPU's 512 MACs/cycle throughput efficiently without intermediate
    SRAM writes, we can reduce SRAM accesses to 128K. The new memory energy drops to 640nJ, reducing total
    energy consumption by over 70% while utilizing the same 480 MHz clock.
