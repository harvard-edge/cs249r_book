title: The Power Supply Noise Impact
scenario: Your environmental monitoring device uses a Cortex-M4 with a 12-bit ADC reading a gas sensor
  (analog output, 0-3.3V). The device runs on a switching regulator with 50 mV peak-to-peak ripple at
  1 MHz. During ML inference, the MCU draws current spikes that cause additional 30 mV supply droops.
  Your model was trained on clean lab data. Quantify the SNR degradation and its impact on model accuracy.
question: "How do 50 mV regulator ripple and 30 mV inference droop degrade a 12-bit gas-sensor ADC's SNR?"
details:
  realistic_solution: 'Trace the noise through the signal chain: Clean ADC has 12-bit ENOB. The 30 mV
    supply droop plus 50 mV ripple severely degrades the ADC reference, plummeting the effective resolution
    to ~5.6 bits. Applying a 16× oversampling technique adds exactly 2 bits of resolution, bringing it
    to 7.6 bits. However, because the gas sensor''s useful voltage swing is narrow, the model (trained
    on thousands of clean ADC levels) is now fed only ~194 coarse, noisy levels. This drastic resolution
    loss will crush inference accuracy. The solution is hardware filtering (an RC or LC filter to kill
    the 1 MHz ripple) combined with software oversampling to restore the ENOB before feeding the data
    to the ML model.'
  common_mistake: '"50 mV ripple on a 3.3V supply is only 1.5% — negligible." The ADC doesn''t measure
    the full 3.3V range. The gas sensor''s useful signal range might be much smaller, making the noise
    proportionally larger.'
  napkin_math: 'Clean ADC: 12-bit ENOB. With supply noise: 5.6-bit ENOB. Gas sensor useful range is small,
    so the noise consumes most of the signal. With 16× oversampling, the resolution improves by exactly
    2 bits ($\log_4(16)$). New ENOB: 5.6 + 2 = 7.6 bits. This represents ~194 levels, down from 2,482
    in lab conditions, which will still severely degrade model accuracy. With an RC filter (20 dB at 1
    MHz): ripple drops by 10× (to 5 mV). Combined with oversampling, the system can recover most of the
    lost bits, restoring ENOB to an acceptable level for the model.'
