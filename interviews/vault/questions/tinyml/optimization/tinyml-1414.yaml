title: Ethos-U55 Scheduling for Memory and Parallelism
scenario: A neural network inference workload is designed for an Arm Cortex-M7 processor paired with an Arm Ethos-U55 NPU (Cortex-M7 at 480 MHz, 512 KB SRAM, Ethos-U55 with 128-512 MAC/cycle).
question: How should Ethos-U55 operator scheduling use memory reuse, parallelism, and layer fusion to reduce SRAM footprint and latency?
details:
  realistic_solution: Implement a graph-based scheduler that considers operator dependencies, memory access patterns, and the Ethos-U55's tensor capabilities. Prioritize memory-constrained layers for fusion to reduce peak memory usage, and use techniques like double-buffering or ping-pong buffering for parallel execution to maximize NPU utilization while minimizing SRAM transfers. Leverage Arm's CMSIS-NN and Ethos-U drivers for optimized primitives and scheduling hints.
  common_mistake: |
    **The Pitfall:** Ignoring data dependencies or memory alignment constraints when scheduling.
    **The Rationale:** Not fully exploiting the Ethos-U55's parallel MAC units by misaligning layer fusion or data partitioning.
    **The Consequence:** Leading to inefficient memory access patterns, stalls, and failing to leverage the NPU's potential throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM: 512KB.
    - Example unfused layer boundary: 180KB input activation and 120KB output activation.
    - Ethos-U55 peak range from scenario: 128-512 MACs/cycle.
    - Example workload: 20M MACs on NPU-supported operators.

    **Calculations:**
    - Without reuse at that boundary: 180KB + 120KB = 300KB live activation storage.
    - With legal fusion/reuse: max(180KB, 120KB) = 180KB live storage, saving about 120KB of SRAM.
    - Ideal compute cycles across the Ethos-U55 range: 20M / 512 = ~39k cycles best case; 20M / 128 = ~156k cycles lower-end configuration.

    **Conclusion & Interpretation:**
    - **Result: Fusion can turn a 300KB live-buffer boundary into a 180KB one, leaving more of the 512KB SRAM for arena and scratch space. The MAC calculation is only an ideal bound; real latency depends on whether scheduling avoids stalls, copies, and bandwidth pressure.**
