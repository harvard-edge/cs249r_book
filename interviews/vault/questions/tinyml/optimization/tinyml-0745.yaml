title: The CMSIS-NN Speedup
scenario: Your colleague wrote a naive C implementation of an INT8 matrix multiply for a Cortex-M4. It runs in 45 ms. You replace it with the CMSIS-NN equivalent and it drops to 6 ms — a 7.5x speedup. The clock speed didn't change.
question: Why does CMSIS-NN cut Cortex-M4 INT8 matrix multiply latency from 45 ms to 6 ms without changing the clock?
details:
  realistic_solution: CMSIS-NN exploits the Cortex-M4's DSP extension with instructions such as `SMLAD` and `SMLALD`, which operate on two signed 16-bit lanes and accumulate into a 32-bit or 64-bit accumulator. For INT8 matrix multiply, optimized kernels pack INT8 data, handle widening/sign extension, and arrange the inner loops so the 16-bit DSP instructions can perform useful dual-lane MAC work. Combined with loop unrolling, reduced branch overhead, and memory-access patterns suited to MCU SRAM, this can explain the 7.5x speedup over naive C at the same clock.
  common_mistake: |
    **The Pitfall:** Confusing the ARM Cortex-M4 DSP extensions with Cortex-A NEON SIMD.
    **The Rationale:** Developers assume all ARM speedups are due to NEON, misidentifying the underlying ISA capabilities of MCUs.
    **The Consequence:** They write code aiming for 128-bit vectorization that simply will not compile or run on the Cortex-M4.
  napkin_math: |
    **Assumptions & Constraints:**
    - MCU: Cortex-M4 with DSP extensions.
    - Naive C performance: ~4.5 cycles/MAC.
    - CMSIS-NN performance: ~0.6 cycles/MAC effective throughput for this kernel after packing, widening/sign handling, and loop unrolling.
    - Workload: ~1,000,000 MACs.
    - Clock implied by the measured naive run: 4.5M cycles / 45 ms = 100 MHz.

    **Calculations:**
    - Naive C cycles: ~1M * 4.5 = 4.5M cycles.
    - CMSIS-NN cycles: ~1M * 0.6 = 600K cycles.
    - CMSIS-NN latency at 100 MHz: 600K / 100M cycles/s = 6 ms.
    - Speedup ratio: 4.5 / 0.6 = 7.5x.

    **Conclusion & Interpretation:**
    - **Result: 7.5x (Compute-Bound)**. The combination of packed INT8 data, 16-bit DSP MAC instructions, and loop unrolling drops execution from 45 ms to about 6 ms under the implied 100 MHz clock.
  options:
    - CMSIS-NN uses NEON SIMD instructions on the Cortex-M4, processing 4 INT8 values per cycle compared to the naive C code's scalar processing.
    - CMSIS-NN exploits the M4's DSP extension with instructions such as SMLAD, which perform dual 16-bit MACs. INT8 kernels pack values and handle widening/sign extension so those DSP instructions, plus loop unrolling and SRAM-friendly access patterns, reach about 0.6 cycles/MAC effective throughput versus naive C's roughly 4.5 cycles/MAC.
    - The speedup comes entirely from compiler auto-vectorization that the CMSIS-NN headers enable via special pragma directives, not from any ISA-level instructions.
    - CMSIS-NN achieves 7.5x speedup by moving the matrix multiply computation to the DMA controller, which performs the arithmetic while the CPU handles other tasks.
