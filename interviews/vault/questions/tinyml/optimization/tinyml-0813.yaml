title: Tinyml New 0038
scenario: A vision model compiled with TensorRT for Jetson Orin runs 2x slower than expected. You notice the architecture uses a custom Swish activation function instead of ReLU.
question: Why does the TensorRT Jetson Orin model slow down with a custom Swish activation, and how should the operator be handled?
details:
  realistic_solution: The custom Swish activation breaks operator fusion. The compiler knows how to fuse Conv2D + ReLU into a single kernel, reading and writing to main memory only once. Because Swish is unsupported or custom, the compiler executes Conv2D, writes the massive tensor to memory, then loads it back to execute Swish. Replace it with a supported activation or write a custom fused CUDA plugin.
  common_mistake: |
    **The Pitfall:** Using exotic activation functions without verifying compiler fusion support.
    **The Rationale:** Candidates assume all activation functions cost the same, ignoring the massive memory bandwidth penalty when the compiler cannot fuse operations.
    **The Consequence:** Severe inference slowdowns due to excessive reads and writes to main memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Jetson Orin with 204GB/s memory bandwidth.
    - Tensor size: 2MB per layer.
    
    **Calculations:**
    - Memory Traffic Penalty (Unfused): Write 2MB + Read 2MB = 4MB extra memory traffic per layer.
    - Latency Penalty: 4MB / 204GB/s = ~20 µs per layer.
    - Total Wasted Time: 20 µs * 100 layers = 2 ms.
    
    **Conclusion & Interpretation:**
    - **Result: Memory-Bound I/O (Memory-Bound)**. Lack of fusion causes 2 ms wasted purely on main memory I/O.
