title: Dual-Core Operator Scheduling for Heterogeneous Memory
scenario: You are deploying a custom keyword spotting and speaker verification cascade on an ESP32-S3. The model consists of a depthwise separable CNN followed by an LSTM, and requires 800 KB of peak working memory if scheduled naively, which exceeds the 512 KB internal SRAM. The 8 MB PSRAM is available but has significantly higher access latency.
question: How should the ESP32-S3 schedule the CNN-LSTM cascade across cores and memory tiers to fit 512 KB SRAM and 50 ms?
details:
  realistic_solution: The optimal strategy uses depth-first scheduling and layer fusion for the CNN to eliminate intermediate activation buffers, fitting the CNN working set entirely into SRAM. Core 0 executes the INT8 CNN using the vector extensions. Concurrently, Core 1 acts as a background orchestrator, prefetching the first LSTM weight tile from PSRAM into a dedicated SRAM ping-pong buffer before the CNN handoff. During the LSTM, Core 1 must continue loading later tiles far enough ahead that each PSRAM transfer is hidden by compute on the current tile. If profiling shows any tile load cannot be overlapped, that stall is added to latency or the LSTM tile/model size must be reduced.
  common_mistake: |
    **The Pitfall:** Naively placing all weights in the 8 MB PSRAM and activations in SRAM.
    **The Rationale:** Candidates overlook the dual-core nature of the ESP32-S3 for software pipelining and layer fusion techniques.
    **The Consequence:** The PSRAM latency stalls the compute, causing the inference to miss the strict 50ms latency constraint.
  napkin_math: |
    **Assumptions & Constraints:**
    - Naive peak memory requires 800 KB, but SRAM is 512 KB.
    - PSRAM latency is high (40 MB/s fetch rate).
    - Core 0 runs CNN in 15 ms and LSTM compute in 20 ms; Core 1 can prefetch the first LSTM weights while the CNN runs.
    - The LSTM cannot start until the CNN output buffer is finalized and the first LSTM weight tile is present in SRAM.

    **Calculations:**
    - CNN layer fusion shrinks 400 KB activations to 100 KB (fit to SRAM).
    - Fetching the 400 KB LSTM weight stream from PSRAM: 400 KB / 40,000 KB/s = 10 ms of transfer time total.
    - Timeline: t=0 starts CNN on Core 0 and LSTM prefetch on Core 1; prefetch completes at t=10 ms.
    - CNN completes and hands off its fused output buffer at t=15 ms, so the 10 ms prefetch is hidden with 5 ms slack.
    - LSTM can run from t=15 ms to t=35 ms only if the remaining LSTM weight tiles are double-buffered so each later PSRAM fetch is hidden by compute on the current tile.
    - Best-case latency under full overlap = max(15 ms CNN, 10 ms initial prefetch) + 20 ms LSTM compute = 35 ms.
    - Conservative bound if later streaming cannot overlap = 15 ms CNN + 20 ms LSTM compute + uncovered PSRAM stall time, up to 45 ms if all 10 ms of LSTM transfer is exposed.

    **Conclusion & Interpretation:**
    - **Result: 35-45 ms latency depending on measured overlap.** The 35 ms schedule is valid only when the first tile is ready before the CNN output is produced and all later LSTM tile loads are hidden behind LSTM compute; otherwise each uncovered PSRAM stall must be added explicitly.
