title: 'Cortex-M4 Audio DMA Pipelining'
scenario: 'Diagnosing dropped frames in an audio wearable where DMA transfers from the I2S microphone are starving the M4 core during inference.'
question: 'Create an interrupt priority and double-buffering scheme that overlaps the 16kHz audio DMA collection with the 10ms feature extraction compute phase.'
details:
  realistic_solution: 'Design a ping-pong (double) buffer where each half holds 10ms of 16kHz 16-bit audio (320 bytes). The DMA writes to Buffer A while the M4 processes Buffer B. Set the DMA half-transfer and full-transfer interrupts to the lowest priority, ensuring the 10ms compute block is not preempted, and swap pointers upon completion.'
  common_mistake: 'Using a single buffer and pausing the model compute to read samples, or setting the DMA interrupt priority higher than the RTOS scheduler.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Audio Sample Rate: 16,000 Hz.
    - Processing Window: 10 ms (0.010 s).
    - Precision: 16-bit (2 Bytes/sample).

    **Calculations:**
    - Samples per window = 16,000 Hz * 0.010 s = 160 samples.
    - Buffer size = 160 samples * 2 Bytes/sample = 320 Bytes.
    - Ping-Pong size = 320 Bytes * 2 = 640 Bytes.

    **Conclusion & Interpretation:**
    - **Result: 640 Bytes (Memory-Bound)**. The double buffer consumes a tiny fraction of SRAM while completely decoupling the DMA timing from the CPU inference execution.
