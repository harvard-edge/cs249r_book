title: 'The CMSIS-NN Dimension Limit'
scenario: 'You are porting an anomaly detection Autoencoder to an STM32. The input is a very long 1D time-series signal of shape `(1, 1, 100000, 1)`. When you run this through TFLite Micro using CMSIS-NN kernels, the convolution layer produces completely random garbage outputs, but it doesn''t crash.'
question: 'Why does a 100,000-sample 1D input produce garbage outputs in CMSIS-NN on STM32 without crashing?'
details:
  realistic_solution: 'CMSIS-NN uses int16_t for dimension variables internally. Your input dimension of 100,000 exceeds INT16_MAX (32,767). The dimension wraps: 100,000 % 65,536 = 34,464, interpreted as signed = -31,072. The convolution loop iterates `for(i=0; i < -31072; i++)` which immediately exits, leaving the output buffer uninitialized with garbage. Fix: split the 100K time series into chunks of 30,000 or fewer, or use a TFLite Micro build with int32 dimension support.'
  common_mistake: |
    **The Pitfall:** Assuming the issue is an Out-Of-Memory (OOM) error.
    **The Rationale:** Candidates assume "The MCU doesn't have enough RAM for 100,000 floats" without analyzing the framework's internal types.
    **The Consequence:** They miss the true root cause. If it OOM'd, the framework would throw an explicit error or hard fault, not silently corrupt data.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input dimension is 100,000.
    - CMSIS-NN uses `int16_t` (max 32,767) for dimension sizes.

    **Calculations:**
    - Integer overflow math: 100,000 % 65,536 = 34,464.
    - Two's complement signed interpretation of 34,464 is -31,072.

    **Conclusion & Interpretation:**
    - **Result: -31,072 loop bound (Compute-Bound)**. The loop exits immediately, leaving uninitialized memory.
  options:
  - 'The 100,000-sample input exceeds the Cortex-M''s maximum DMA transfer size.'
  - 'CMSIS-NN uses int16_t for dimensions. 100,000 wraps to -31,072. The loop exits immediately, leaving uninitialized memory.'
  - 'The input tensor exceeds the MCU''s maximum contiguous SRAM allocation, causing silent fallback.'
  - 'The STM32''s memory protection unit (MPU) triggers a bus fault.'
