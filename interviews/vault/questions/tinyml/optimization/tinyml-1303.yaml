title: Designing a Pruning Strategy for ESP32-S3 SRAM Constraints
scenario: You are deploying an INT8 keyword spotting model on an ESP32-S3. The baseline quantized model's weights take up 750 KB. To avoid the latency and power penalty of fetching weights from the 8 MB PSRAM, you must fit the entire model into the 512 KB internal SRAM, leaving at least 150 KB for the OS, network stack, and activation buffers.
question: How would you design a pruning specification that achieves this memory target while ensuring the model fully utilizes the ESP32-S3's INT8 acceleration?
details:
  realistic_solution: The optimal design specifies structured pruning, specifically channel or filter pruning. By physically removing entire filters, the resulting weight tensors remain dense but smaller. This directly reduces the memory footprint without index overhead and perfectly aligns with the Xtensa vector instructions, guaranteeing both memory reduction and proportional inference speedups.
  common_mistake: |
    **The Pitfall:** Proposing unstructured magnitude pruning to hit the memory target.
    **The Rationale:** Candidates choose unstructured pruning because it preserves accuracy best, forgetting that sparse metadata (CSR indices) consumes memory.
    **The Consequence:** The overhead of storing sparse indices actually increases the memory footprint, and the lack of unstructured sparse vector instructions on the ESP32-S3 severely degrades latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: ESP32-S3 (512 KB internal SRAM).
       - Baseline INT8 Model Weights: 750 KB.
       - SRAM Reservation: 150 KB (OS, network, activations).
    2. **Calculations:**
       - Usable SRAM for Weights: 512 KB - 150 KB = 362 KB.
       - Target Sparsity: 362 KB / 750 KB = 48.2% max remaining (need ~50% reduction).
       - Unstructured 50% Cost: (750 KB / 2) weights + (750 KB / 2) indices = 750 KB (0 savings).
       - Structured (Channel) 50% Cost: 750 KB × 0.5 = 375 KB (Dense format, 0 index overhead).
    3. **Conclusion & Interpretation:**
       - **Result: Structured pruning hits ~362 KB target without sparse metadata overhead.** **Result: Memory-Bound Optimization.**
