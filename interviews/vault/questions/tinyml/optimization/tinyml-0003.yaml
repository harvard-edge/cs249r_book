title: Accuracy Collapse After Unstructured Magnitude Pruning
scenario: Your gesture-recognition model achieves 95% accuracy before compression, but after pruning 80% of its smallest weights and deploying the sparse model on a microcontroller, accuracy falls to 50% random chance.
question: Why can aggressive unstructured pruning destroy the model's gesture decision boundaries?
details:
  realistic_solution: This is a classic case of **sparsity-induced capacity loss**. Magnitude pruning assumes small weights are individually unimportant, but gesture classifiers often rely on many weak weights acting together to preserve subtle temporal and cross-axis features. At 80% unstructured sparsity, entire feature paths can lose enough support that class margins collapse. The fix is to prune gradually with fine-tuning, use a validation-driven sparsity target, and prefer structured sparsity only when the deployment kernel can exploit it without damaging critical channels.
  common_mistake: |
    **The Pitfall:** Assuming small-magnitude weights are always disposable.
    **The Rationale:** Candidates treat pruning as a local weight-ranking problem and ignore that many weak connections can jointly encode discriminative motion patterns.
    **The Consequence:** They deploy a sparse model whose feature paths and class margins have collapsed, then incorrectly blame the MCU or dataset.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline model: 95% accuracy with dense weights.
    - Pruning target: remove 80% of weights, leaving 20%.
    - Gesture features depend on many weak temporal/cross-axis connections.

    **Calculations:**
    - Remaining parameter fraction: 1 - 0.80 = 0.20.
    - If a useful feature path needs several weak connections, pruning any one can break the path.
    - Random-chance accuracy indicates class margins are no longer separable, not merely slightly noisier.
    - A safer schedule prunes in smaller steps, fine-tunes after each step, and stops when validation accuracy starts to fall.

    **Conclusion & Interpretation:**
    - **Result: Over-Pruned Sparse Model**. The 80% sparsity target removed too much distributed signal, so pruning must be validation-guided and paired with fine-tuning.
