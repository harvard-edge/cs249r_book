title: Optimizing Keyword Spotting CNN for ESP32-S3 with Pruning & Sparsity
scenario: You are tasked with deploying a convolutional neural network for keyword spotting. The initial model has 2 million parameters and requires 100 MB of memory for weights and activations, significantly exceeding the dual-core microcontroller's 512 KB SRAM and 8 MB PSRAM. The target inference latency is under 50ms.
question: How would you design a comprehensive strategy to optimize this model using pruning and sparsity techniques to fit within memory constraints and meet performance targets?
details:
  realistic_solution: Use structured channel/filter pruning and INT8 quantization as a deployment plan, not just a compression report. Store the compressed weights in PSRAM or flash and stage only the current layer weights plus hot kernels in SRAM. Keep the TFLite Micro tensor arena, stack, I/O buffers, and scratch space inside the 512 KB SRAM by pruning channels until peak activations fit, fusing adjacent operators, reusing buffers, and tiling any oversized feature maps. Retrain after pruning, then run QAT or calibrated PTQ, compile the dense pruned graph with kernels that actually accelerate the remaining layers, and profile both peak arena usage and latency against the 50 ms target.
  common_mistake: |
    **The Pitfall:** Applying unstructured pruning indiscriminately.
    **The Rationale:** Candidates assume any sparsity reduces compute time, neglecting the overhead of irregular memory access patterns on constrained hardware without specialized sparse accelerators.
    **The Consequence:** The pruned model yields no actual speedups and fails to meet latency targets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Initial total memory: 100 MB for weights plus activations/runtime buffers.
    - Initial weights: 2M FP32 parameters = 8 MB; the remaining ~92 MB is activation/runtime footprint.
    - PSRAM: 8 MB, SRAM: 512 KB.
    - Target latency: <50 ms.

    **Calculations:**
    - Weight quantization: 2M params * 1 byte = 2 MB INT8 weights.
    - 75% structured channel/filter pruning leaves 25% of weights: 0.25 * 2 MB = 0.5 MB weights.
    - Weight storage can fit in 8 MB PSRAM, and hot layers may be staged into SRAM.
    - The original 100 MB total footprint cannot be treated as solved by weight compression alone because peak activations and scratch buffers must fit within the 512 KB SRAM working set.
    - Required activation strategy: redesign/prune channels, fuse operators, reuse tensor buffers, and tile any large feature maps until profiled peak arena <512 KB minus stack/runtime reserve.
    - Required latency strategy: benchmark dense structured-pruned kernels; unstructured sparsity should not be counted as a speedup unless the deployed kernel actually skips zeros efficiently.

    **Conclusion & Interpretation:**
    - **Result: ~0.5 MB compressed weights, but fit is not proven until peak activation arena and latency are profiled (Memory-Bound)**. Quantization plus structured pruning can solve weight storage, while SRAM tiling/fusion and hardware-supported dense kernels are still required to meet the 512 KB and 50 ms targets.
