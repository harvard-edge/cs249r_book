title: Ethos-U55 Operator Offloading and Fallback Analysis
scenario: A custom CNN compiled for Cortex-M7 with Ethos-U55 triggers an unsupported activation fallback, forcing the subgraph back to the host CPU.
question: "How would you analyze the system-level implications of this compilation outcome and specify a graph optimization strategy to satisfy strict latency constraints?"
details:
  realistic_solution: Execute graph-level operator substitution prior to compilation lowering. Replace the custom activation with native NPU-supported piecewise equivalents (HardSwish), directly targeting the Look-Up Table (LUT) to eliminate inter-processor memory bouncing.
  common_mistake: |
    **The Pitfall:** Assuming the only penalty is the slower localized execution of the custom activation on the Cortex-M7 CPU.
    **The Rationale:** Candidates analyze computational FLOPs but miss the monolithic memory bandwidth penalty caused by bouncing execution domains.
    **The Consequence:** They trigger massive SRAM fragmentation and totally destroy latency via repetitive full-tensor I/O bus materialization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Cortex-M7 with Ethos-U55 (512 KiB shared SRAM).
       - Intermediate Tensor: 64 channels * 50 features * 1 byte = 3,200 bytes.
       - Bus bandwidth: 4 bytes/cycle.
    2. **Calculations:**
       - Context switch traffic (NPU out -> M7 read -> M7 write -> NPU read): 4 full passes = 12.8 KB total traffic.
       - Transfer penalty cycles: 12,800 bytes / 4 bytes/cycle = 3,200 cycles.
       - Equivalent NPU internal compute footprint: < 100 cycles.
    3. **Conclusion & Interpretation:**
       - **Result: CPU fallback latency is exponentially dominated by 3,200 memory I/O transfer cycles rather than raw compute (Bandwidth-Bound).**
