title: Structured vs Unstructured Pruning on Cortex-M4
scenario: We are deploying a keyword spotting CNN on an ARM Cortex-M4 (STM32F4) microcontroller. The baseline 8-bit quantized model requires 320 KB of memory, which strictly exceeds the 256 KB SRAM limit of the device. A junior engineer proposes using 90% unstructured magnitude pruning to drastically reduce the model size and speed up inference.
question: How would you evaluate this proposal against an alternative 50% structured channel pruning approach, considering the specific architectural constraints of the target hardware?
details:
  realistic_solution: Structured channel pruning is usually the better architectural choice for the Cortex-M4. It physically reduces tensor dimensions, so the result remains a dense model that can use standard CMSIS-NN kernels and predictable memory access. Unstructured pruning only helps if the deployment stack has efficient sparse kernels and compact metadata; otherwise the 16-bit or 32-bit indices, branchy loops, and irregular loads can consume SRAM and fail to produce latency gains. The right evaluation is not "90% sparsity equals 10x speedup," but whether the compressed representation and kernels reduce real SRAM, flash, and measured cycles on this MCU.
  common_mistake: |
    **The Pitfall:** Assuming that 90% unstructured sparsity automatically translates to a 10x reduction in memory and a 10x speedup.
    **The Rationale:** They fail to realize that the Cortex-M4 lacks sparse matrix acceleration.
    **The Consequence:** Unstructured sparsity requires metadata overhead (like CSR format) that consumes SRAM, and destroys the dense memory access patterns required for CMSIS-NN SIMD.
  napkin_math: |
    **Assumptions & Constraints:**
    - Conv layer: 64 in, 64 out, 3x3 kernel (36,864 INT8 weights).
    - Unstructured: 90% pruned, 16-bit index per remaining weight.
    - Structured: 50% input and output channel pruning (32 in, 32 out), dense INT8 kernels.

    **Calculations:**
    - Dense baseline weights = 64 * 64 * 3 * 3 = 36,864 bytes.
    - Unstructured nonzero weights after 90% pruning = 36,864 * 0.10 = 3,686 bytes.
    - Unstructured metadata with 16-bit indices = 3,686 * 2 = 7,372 bytes.
    - Unstructured stored size = 3,686 + 7,372 = 11,058 bytes, before row pointers or alignment.
    - Structured weights = 32 * 32 * 3 * 3 = 9,216 bytes = 9.2 KB.

    **Conclusion & Interpretation:**
    - **Result: 9.2 KB dense structured layer vs at least 11.1 KB sparse unstructured storage.** Structured pruning is more likely to improve SRAM and latency on Cortex-M4 because it preserves dense kernels; any speedup claim must come from profiling rather than the sparsity percentage alone.
