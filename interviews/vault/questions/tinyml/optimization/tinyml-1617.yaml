title: Compute-Transmission Overlap via Double-Buffering
scenario: A microcontroller is computing FFTs on streaming audio and sending the features to a central hub via a BLE peripheral.
question: How does double-buffering allow the CPU to overlap computing the next audio FFT with the BLE transmission of the previous FFT?
details:
  realistic_solution: Double-buffering uses two SRAM regions. While the CPU writes the current FFT compute to Buffer A, the DMA controller independently reads from Buffer B to send the previous frame over BLE. Once both finish, the pointers swap, hiding the radio latency behind the compute time.
  common_mistake: |
    **The Pitfall:** Stating that the CPU executes both the compute and the radio transmission simultaneously.
    **The Rationale:** Candidates ignore the role of the Direct Memory Access (DMA) controller in handling data transfers independently of the CPU.
    **The Consequence:** The proposed solution relies on an impossible CPU concurrency model rather than practical hardware offloading.
  napkin_math: |
    **Assumptions & Constraints:**
    - T_compute = CPU computation time.
    - T_tx = DMA/BLE transmission time.

    **Calculations:**
    - Total time without double-buffering = T_compute + T_tx.
    - Total time with double-buffering = Max(T_compute, T_tx).

    **Conclusion & Interpretation:**
    - **Result: Max(T_compute, T_tx) (I/O-Bound)**. Total latency becomes Max(T_compute, T_tx).
