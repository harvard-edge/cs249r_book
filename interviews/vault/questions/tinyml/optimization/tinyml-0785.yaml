title: The Depthwise Separable Arithmetic Intensity Drop
scenario: You replace standard convolutions with depthwise separable convolutions on a Jetson Orin to speed up a vision model. Despite FLOPs dropping by 9x, the end-to-end latency only improves by 10%.
question: Why does replacing standard convolutions with depthwise separable convolutions barely improve Jetson Orin latency?
details:
  realistic_solution: Depthwise convolutions have notoriously low arithmetic intensity because they don't reuse input channels across output channels. While you slashed the FLOPs, you pushed the operation deep into the memory-bound region of the roofline model. The Jetson Orin's ridge point is 275 TOPS / 204 GB/s ≈ 1348 ops/byte. With a simple depthwise 3x3 traffic model of 18 ops per roughly 20 bytes, AI ≈ 0.9 ops/byte, so attainable throughput is only about 184 GOPS — far below the 275 TOPS compute ceiling. The GPU is now idling waiting for memory. The solution is to fuse the depthwise convolution with the pointwise convolution or activation layers to increase arithmetic intensity and reduce memory traffic.
  common_mistake: |
    **The Pitfall:** Assuming that reducing theoretical FLOPs will yield a linearly proportional decrease in latency on modern bandwidth-constrained hardware.
    **The Rationale:** Engineers evaluate algorithms entirely on FLOPs instead of factoring in the cost of memory movement and arithmetic intensity.
    **The Consequence:** Heavy refactoring effort yields practically zero real-world speedup because the bottleneck shifted entirely to memory bandwidth.
  napkin_math: |
    **Assumptions & Constraints:**
    - Orin ridge point: 275 TOPS / 204 GB/s ≈ 1348 OPs/byte.
    - Depthwise 3x3 per output element: 9 MACs = 18 OPs.
    - Simple byte model: 9 input bytes + 9 weight bytes + 1 output write + about 1 byte amortized scale/metadata traffic = 20 bytes.

    **Calculations:**
    - Arithmetic Intensity: 18 OPs / 20 bytes = 0.9 OPs/byte.
    - Attainable compute: 0.9 OPs/byte × 204 GB/s = 183.6 GOPS.

    **Conclusion & Interpretation:**
    - **Result: about 184 GOPS (Memory-Bound)**. AI (0.9) << Ridge Point (1348). This is only about 0.07% of the 275 TOPS ceiling, so the depthwise layer can be dominated by memory stalls despite a large FLOP reduction.
