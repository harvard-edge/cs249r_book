title: Distillation vs Pruning for INT8 SIMD
scenario: A keyword spotting model must run within 20ms on an ARM Cortex-M4 (STM32F4) operating at 168 MHz with no FPU. The team initially pruned a baseline model to 80% sparsity (leaving 1 million active MACs), but the inference latency remains around 60ms. You are tasked with analyzing why the sparse model is bottlenecked and quantifying how replacing it with a dense, distilled student model will achieve the latency target.
question: Why does the 80% sparse Cortex-M4 model miss the 20 ms deadline, and how does a dense distilled INT8 model fix it?
details:
  realistic_solution: The correct approach is to abandon unstructured pruning and train a smaller, dense student model using knowledge distillation to recover the accuracy lost from reduced capacity. By quantizing this dense student to INT8, the network can fully utilize the STM32F4's CMSIS-NN SIMD instructions, which execute two 8-bit MACs per cycle, entirely avoiding the missing FPU and branching bottlenecks.
  common_mistake: Candidates often assume unstructured pruning linearly reduces latency on microcontrollers. They fail to realize that without hardware support for sparsity, the branching overhead of skipping zeros in software destroys throughput and prevents the use of optimized CMSIS-NN SIMD instructions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Latency budget: 20 ms at 168 MHz = 3.36 million cycles.
    - Pruned model (1M MACs) averages ~10 cycles/MAC due to branch penalties.
    - Dense distilled student (2M MACs) uses CMSIS-NN INT8 SIMD (~1.5 cycles/MAC).

    **Calculations:**
    - Pruned latency: 1M * 10 cycles/MAC = 10 million cycles (~60ms).
    - Dense distilled latency: 2M * 1.5 cycles/MAC = 3.0 million cycles (~17.9 ms).

    **Conclusion & Interpretation:**
    - **Result: 17.9 ms (Compute-Bound)**. By using a dense model, we avoid software branching overhead and fully utilize SIMD instructions, successfully meeting the 20ms deadline.
