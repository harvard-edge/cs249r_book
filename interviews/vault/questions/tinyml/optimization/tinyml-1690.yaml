title: TinyML DMA Audio Overlap
scenario: An edge device continuously streams microphone data over SPI while running an anomaly detection model on a Cortex-M4.
question: How can Direct Memory Access (DMA) be applied to overlap continuous audio data acquisition with the CPU's neural network inference?
details:
  realistic_solution: Configure the DMA controller to write incoming SPI audio samples directly into a circular ping-pong buffer in SRAM while the Cortex-M4 runs inference on the previous audio window. DMA removes per-byte polling or interrupt service from the critical path, but the CPU still pays a small overhead to configure descriptors, handle half/full-buffer interrupts, and synchronize buffers.
  common_mistake: |
    **The Pitfall:** Using interrupt-driven SPI reads per byte.
    **The Rationale:** which constantly preempts the CPU.
    **The Consequence:** and destroys inference throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Continuous SPI audio streaming.
    - Cortex-M4 running anomaly detection inference.
    - Without DMA, CPU handles SPI per byte.

    **Calculations:**
    - Polling/Interrupt CPU overhead for SPI: >10% when the CPU services many small transfers.
    - DMA CPU overhead for SPI: low but nonzero, typically descriptor setup plus half/full-buffer interrupts and buffer synchronization.
    - Net effect: I/O transfers overlap with inference instead of consuming CPU time byte-by-byte.

    **Conclusion & Interpretation:**
    - **Result: Low-overhead I/O overlap (Compute-Bound)**. DMA substantially reduces CPU involvement in audio acquisition, but it does not make I/O literally free; it overlaps most transfer time with neural network inference.
