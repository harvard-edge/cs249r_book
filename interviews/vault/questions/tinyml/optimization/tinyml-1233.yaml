title: Optimizing CNN Inference on ESP32-S3 via INT8 Lowering
scenario: You are deploying a 1.2M MAC keyword spotting CNN to an ESP32-S3. The model currently uses FP32 weights totaling 1 MB, forcing the weights into the slower PSRAM, and inference takes around 15 ms, missing your 5 ms real-time deadline. The compiler has not applied quantization or operator lowering.
question: How does INT8 lowering fix the ESP32-S3 keyword CNNs PSRAM and latency bottlenecks, and what speedup results?
details:
  realistic_solution: 'The correct approach is to configure the compiler to lower the FP32 graph to an INT8 quantized graph. This achieves two things: it shrinks the model size by 4x, allowing it to fit entirely within the 512 KB SRAM (eliminating PSRAM access latency), and it enables the ESP32-S3''s vector extensions for INT8, which can compute multiple MACs per cycle natively.'
  common_mistake: |
    **The Pitfall:** Suggesting pruning or architecture search without utilizing INT8 lowering.
    **The Rationale:** Not realizing that simply lowering operators to INT8 leverages the hardware's vector instructions and failing to move the compressed model from slow PSRAM to fast SRAM.
    **The Consequence:** Missing a massive, low-effort performance gain and failing to meet the real-time deadline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target deadline: < 5 ms.
    - FP32 Model: 1 MB, PSRAM access (3 cycles/MAC), ESP32-S3 at 240 MHz.
    - INT8 Model: 256 KB, fits in SRAM, uses vector extensions (8 effective MACs/cycle).

    **Calculations:**
    - FP32 Latency: 1.2M MACs x 3 cycles/MAC = 3.6M cycles. 3.6M / 240 MHz = 15.0 ms.
    - INT8 Latency: 1.2M MACs / 8 MACs/cycle = 150,000 cycles. 150,000 / 240 MHz = 0.625 ms.
    - Speedup = 15 ms / 0.625 ms = 24x.

    **Conclusion & Interpretation:**
    - **Result: 0.625 ms (Memory and Compute-Bound)**. By moving weights to SRAM and leveraging INT8 vector instructions, latency drops by 24x, easily beating the 5 ms deadline.
