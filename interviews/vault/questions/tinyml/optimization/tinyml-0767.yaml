title: The Pruning Sparsity Threshold
scenario: >
  A 200 KB dense model runs inference in 50ms on a Cortex-M4 at 100 MHz. After unstructured pruning at 80% sparsity, the model weights drop to 40 KB. However, the sparse inference still takes 48ms because the Cortex-M4 has no hardware sparse-matrix support.
question: Why doesn't the 5x weight reduction translate to a 5x speedup, and what sparsity pattern would help?
details:
  realistic_solution: >
    Unstructured pruning saves static Flash memory but not dynamic compute because the dense matrix multiply loop still iterates over all positions (including zeros), lacking hardware sparse-tensor support. Structured pruning (removing entire filters or channels) reduces both memory and compute proportionally because it eliminates entire dimensions from the GEMM operation, achieving true latency speedup.
  common_mistake: |
    **The Pitfall:** Equating a smaller model file size directly with faster execution speed.
    **The Rationale:** Candidates assume CPUs automatically skip zeros, ignoring the index overhead and lack of specialized sparse execution units.
    **The Consequence:** Wasting time pruning networks to unstructured targets that only benefit Flash footprint, completely missing real-time latency goals.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Dense: 200 KB, 50 ms.
       - Unstructured 80% Sparse: 40 KB, 48 ms.
    2. **Calculations:**
       - Structured 80% Sparse: MACs ∝ C_in * 0.2 * C_out = 0.2x original MACs.
       - New Latency: 50 ms * 0.2 = 10 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 10 ms latency with Structured Pruning.** Unstructured only saves Flash; Structured provides true 5x acceleration. **Bottleneck: Dense GEMM Compute.**
  options:
  - A) Unstructured gives 5x speedup; structured gives 2x
  - B) Both give 5x speedup — the bottleneck is elsewhere
  - C) Unstructured barely helps compute; structured gives the real speedup
  - D) Neither helps on MCUs; only quantization reduces latency
  correct_index: 2
