title: The Depthwise Separable Ops Savings
scenario: A standard convolution layer processes a 32x32 input with 64 input channels, 128 output channels, and a 3x3 kernel. A MobileNet-style depthwise separable convolution achieves the same channel transformation.
question: How many multiply-accumulate operations does each approach require, and what is the reduction factor?
details:
  realistic_solution: 'Standard conv: H × W × K² × C_in × C_out = 32 × 32 × 9 × 64 × 128 ≈ 75.5M MACs. Depthwise: H × W × K² × C_in = 32 × 32 × 9 × 64 = 589,824 ≈ 0.59M. Pointwise: H × W × C_in × C_out = 32 × 32 × 64 × 128 = 8,388,608 ≈ 8.39M. Total separable: 0.59M + 8.39M = 8.98M. Reduction: 75.5M / 8.98M = 8.4×.'
  common_mistake: |
    **The Pitfall:** Calculating only the depthwise FLOPs and omitting the pointwise FLOPs.
    **The Rationale:** Candidates forget that a depthwise separable convolution is composed of TWO distinct operations, and the 1x1 pointwise convolution is actually the compute bottleneck.
    **The Consequence:** They massively underestimate the true computational cost of the layer, misallocating cycle budgets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input: 32x32.
    - Channels: C_in = 64, C_out = 128.
    - Kernel: K = 3x3.

    **Calculations:**
    - Standard Conv: 32^2 * 3^2 * 64 * 128 = 1024 * 9 * 8192 = 75,497,472 MACs (~75.5M).
    - Depthwise: 32^2 * 3^2 * 64 = 1024 * 9 * 64 = 589,824 MACs (~0.59M).
    - Pointwise: 32^2 * 64 * 128 = 1024 * 8192 = 8,388,608 MACs (~8.39M).
    - Total Separable: 0.59M + 8.39M = 8,978,432 MACs (~8.98M).
    - Reduction Factor: 75.5M / 8.98M = 8.4x.

    **Conclusion & Interpretation:**
    - **Result: 8.4x reduction (Compute-Bound)**. The depthwise separable convolution provides an 8.4x reduction in MAC operations.
  options:
  - 'Standard: 75.5M MACs, Separable: 37.7M MACs (2x reduction)'
  - 'Standard: 75.5M MACs, Separable: 18.9M MACs (4x reduction)'
  - 'Standard: 75.5M MACs, Separable: 8.98M MACs (8.4x reduction)'
  - 'Standard: 75.5M MACs, Separable: 0.59M MACs (128x reduction)'
