title: SPI vs DMA Latency Analysis
scenario: Implementing a predictive maintenance model where SPI sensor data arrives concurrently with Cortex-M4 model execution.
question: Realize a non-blocking DMA + ping-pong buffer scheme on the Cortex-M4 SPI controller, then quantify the realized latency improvement versus a blocking SPI read that halts the CPU during transfer.
details:
  realistic_solution: 'A blocking SPI read forces the CPU to halt for 5ms while data clocks in, adding sequentially to the 15ms inference time for a 20ms total latency. With DMA, the 5ms transfer is completely hidden behind the 15ms compute of the previous frame. Total latency per window becomes max(5ms, 15ms) = 15ms, achieving a 25% throughput increase.'
  common_mistake: |
    **The Pitfall:** Adding DMA setup overhead to total runtime without realizing data transfer happens in parallel.
    **The Rationale:** Engineers misapply synchronous timing models to asynchronous, hardware-accelerated DMA pipelines.
    **The Consequence:** Underestimating the throughput capacity of the system and unnecessarily over-provisioning the compute hardware.
  napkin_math: |
    **Assumptions & Constraints:**
    - Blocking Inference Latency: 5 ms (SPI read) + 15 ms (Compute) = 20 ms.

    **Calculations:**
    - DMA Pipelined Latency: Data transfer (5 ms) completely overlaps with the compute of the previous frame (15 ms).

    **Conclusion & Interpretation:**
    - **Result: 15 ms latency (Compute-Bound)**. Total latency per window becomes max(5 ms, 15 ms) = 15 ms, yielding a 25% throughput increase.
