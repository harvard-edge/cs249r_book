title: TinyML Operator Fusion on Cortex-M4 for Memory Constrained CNN
scenario: You are tasked with deploying a small convolutional neural network (CNN) for a voice activity detection task on an ARM Cortex-M4 STM32F4 microcontroller. The device operates at 168 MHz, has only 256 KB of SRAM, and crucially, lacks a Floating Point Unit (FPU). The CNN consists of an input layer (e.g., 64x64x1 feature map), followed by a 3x3 depthwise separable convolution (8 filters, stride 1, no padding), a ReLU activation, and then a 2x2 average pooling layer. Your initial attempt leads to out-of-memory errors due to intermediate activation maps.
question: How should convolution, ReLU, and pooling be fused and scheduled to avoid intermediate activation OOM on a Cortex-M4 VAD CNN?
details:
  realistic_solution: The key is to perform 'in-place' operations and fuse layers. For instance, the ReLU activation can be fused directly into the convolution output generation loop, applying the activation to each element as it's computed, rather than storing a full intermediate convolution output. Similarly, the 2x2 average pooling can often be fused with the preceding ReLU or convolution if the memory layout allows, reducing the need for a separate buffer. Memory reuse involves careful buffer management, potentially allocating a single, smaller buffer that is overwritten by successive layers. Quantization to 8-bit integers (int8) is critical given the 256KB SRAM and lack of FPU. This simplifies arithmetic, makes operations faster, and drastically reduces memory footprint. The execution schedule would prioritize computing small chunks of data (e.g., one output channel/row at a time) and passing them directly to the next fused operation, maximizing data locality and minimizing temporary buffer sizes. For the lack of FPU, all operations must be fixed-point or integer arithmetic, which impacts scaling and precision, requiring careful calibration.
  common_mistake: Candidates might suggest optimizing individual kernel implementations without first considering operator fusion or sophisticated memory planning. They might also overlook the severe impact of the missing FPU and the need for integer-only arithmetic or fixed-point representations, potentially proposing float-heavy solutions or libraries that wouldn't fit the hardware.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input feature map: 64x64x1 INT8 (4 KB).
    - 3x3 depthwise separable conv (8 filters), ReLU, 2x2 avg pool.

    **Calculations:**
    - Conv output map: 62x62x8 = 30,752 bytes (~30 KB).
    - Pool output map: 31x31x8 = 7,688 bytes (~7.5 KB).
    - Without fusion: Peak includes distinct buffers for conv, ReLU, and pool outputs.
    - With in-place fusion: ReLU uses the 30 KB buffer in-place, and pool overwrites part of it.

    **Conclusion & Interpretation:**
    - **Result: ~30 KB Peak (Memory-Bound)**. Optimal fusion ensures peak memory is governed strictly by the single largest intermediate tensor, well within the 256 KB limit.
