title: SRAM Exhaustion in Multi-Branch CNN Inference
scenario: You are deploying a predictive maintenance CNN on a Nordic nRF5340 microcontroller for vibration analysis. The system has 256 KB of SRAM, of which 40 KB is reserved for the BLE 5.3 stack and RTOS overhead. The model has a branched architecture where an early activation tensor is kept alive for a later skip connection. Offline profilers show the largest individual layer only requires 140 KB of activation memory.
question: Why does the branched nRF5340 CNN HardFault even though the largest individual activation is only 140 KB?
details:
  realistic_solution: The root cause is an unoptimized operator schedule that forces the large skip-connection tensor to remain in SRAM while the deep main branch allocates its own 140 KB intermediate tensors. The solution involves analyzing the tensor lifetime graph and applying memory planning techniques. We must reorder the operator execution schedule to minimize overlapping tensor lifespans, or employ memory-aware layer fusion to compute the branch without fully materializing the intermediate states in SRAM.
  common_mistake: |
    **The Pitfall:** Assuming peak memory is dictated strictly by the size of the single largest individual layer.
    **The Rationale:** Candidates forget that topological sort order and tensor lifetimes dictate memory overlaps, especially in branched architectures like ResNets.
    **The Consequence:** Models that theoretically fit fail at runtime because the operator scheduler forces multiple large tensors to coexist in SRAM.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Nordic nRF5340.
       - Available SRAM: 256 KB Total - 40 KB (BLE/RTOS overhead) = 216 KB.
       - Model Topology: Branched ResNet-style network.
       - Skip Connection Tensor: 64x64x20 INT8 = 80 KB.
       - Main Branch Peak Tensor: 140 KB.
    2. **Calculations:**
       - Concurrent Memory Required: 80 KB (held for skip connection) + 140 KB (main branch processing) = 220 KB.
       - SRAM Deficit: 220 KB - 216 KB = 4 KB Overflow.
    3. **Conclusion & Interpretation:**
       - **Result: Unoptimized schedule requires 220 KB, exceeding 216 KB limit. HardFault occurs.** **Result: Memory-Bound (Operator Scheduling).**
