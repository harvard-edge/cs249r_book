title: Optimizing Operator Scheduling for TinyML on Nordic nRF5340
scenario: You are tasked with deploying a small convolutional neural network onto a microcontroller. The network architecture includes several sequential convolutional layers, pooling layers, and fully connected layers.
question: Why are memory reuse, selective layer fusion, and realistic parallelism crucial when scheduling CNN operators on edge microcontrollers?
details:
  realistic_solution: 'A realistic solution involves aggressive in-place memory allocation and activation reuse, where intermediate tensors are carefully managed to occupy the same SRAM regions sequentially. Operator execution order should be optimized to free memory as soon as a tensor is no longer needed. Selective layer fusion can be applied for specific, memory-intensive operations (e.g., Conv2D + ReLU) where the reduction in intermediate memory footprint or cache benefits outweigh potential increases in binary size. Tools like TensorFlow Lite for Microcontrollers (TFLu) with its built-in micro-interpreter and kernel optimizations are often used.'
  common_mistake: |
    **The Pitfall:** Applying cloud-scale operator scheduling strategies.
    **The Rationale:** Candidates attempt to retain multiple large intermediate tensors or assume multithreading benefits without considering the single-core architecture.
    **The Consequence:** The model immediately fails to deploy due to exceeding the SRAM limit or incurring massive context-switch overheads.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM budget: 256 KB.
    - CPU: 128 MHz Cortex-M33.
    - Tensor dimensions: 64x64x16.

    **Calculations:**
    - Float32 tensor: 64 * 64 * 16 * 4 bytes = 262,144 bytes = 256 KB (maxes out RAM).
    - Int8 tensor: 64 KB, allowing multiple buffers.
    - Execution: 128 MHz = 128M cycles/sec.
    - 10M cycle convolution time: 10M / 128M = ~78 ms.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound**. In-place memory reuse and selective fusion are strictly required to avoid exceeding the 256 KB limit.
