title: The Flash Budget Crunch
scenario: You're deploying a keyword-spotting model to a Cortex-M4 microcontroller. The model has 500,000 parameters and is stored in INT8 precision. The microcontroller has 1MB of Flash storage, but the RTOS, bootloader, and application logic already consume 600 KB. Your model is currently too large to fit.
question: Assuming sparse compression so pruned INT8 weights aren't stored densely, which listed unstructured-pruning target is the smallest that fits the model into the remaining Flash?
details:
  realistic_solution: Unstructured pruning only reduces Flash use if the deployment also uses sparse compression or another encoding that avoids storing the pruned weights in the dense model. Under that explicit assumption, 1,024 KB total Flash minus 600 KB of system software leaves 424 KB. The dense INT8 model is 500,000 bytes = 488.28 KB, so it must shrink by 64.28 KB. That is 64.28 / 488.28 = 13.2% sparsity. Since 13.2% is not one of the listed choices, the smallest listed pruning target that fits is 20% sparsity.
  common_mistake: |
    **The Pitfall:** Ignoring the footprint of the RTOS and system software.
    **The Rationale:** Candidates incorrectly calculate the available storage space assuming the entire 1MB is free.
    **The Consequence:** The pruning target is severely miscalculated, causing the deployment to fail.
  napkin_math: |
    **Assumptions & Constraints:**
    - Microcontroller has 1,024 KB (1 MB) of Flash total.
    - RTOS and system software consume 600 KB.
    - Model has 500,000 INT8 parameters (1 byte/parameter).
    - Sparse compression stores only the nonzero weights for this sizing estimate; a dense INT8 model would not shrink from unstructured pruning alone.

    **Calculations:**
    - Calculate available Flash space: 1,024 KB - 600 KB = 424 KB.
    - Calculate baseline model size: 500,000 bytes / 1,024 = 488.28 KB.
    - Calculate required reduction: 488.28 KB - 424 KB = 64.28 KB.
    - Calculate exact sparsity percentage: 64.28 KB / 488.28 KB ≈ 0.1316 (13.2%).
    - Select from options: the smallest listed sparsity above 13.2% is 20%.

    **Conclusion & Interpretation:**
    - **Result: 20% Sparsity (Storage-Bound)**. The exact minimum is about 13.2%, but the smallest listed safe target is 20% when sparse compression is assumed.
  options:
    - 0% (No pruning is needed)
    - 58% Sparsity
    - 20% Sparsity
    - 84% Sparsity
  correct_index: 2
