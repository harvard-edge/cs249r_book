title: The Flash Budget Crunch
scenario: You're deploying a keyword-spotting model to a Cortex-M4 microcontroller. The model has 500,000
  parameters and is stored in INT8 precision. The microcontroller has 1MB of Flash storage, but the RTOS,
  bootloader, and application logic already consume 600 KB. Your model is currently too large to fit.
question: How would you calculate the minimum level of unstructured weight pruning (as a percentage of
  sparsity) needed to fit the model into the remaining Flash?
details:
  realistic_solution: The core task is to calculate the available space and then determine how many parameters
    must be removed. The model's storage size is a direct function of its parameter count and the bytes
    used per parameter. With 1,024 KB total and 600 KB used by the system, 424 KB remains. The 500,000
    INT8 parameters require 488.28 KB (500,000 bytes). To fit, the model must be reduced by 64.28 KB,
    which means pruning approximately 13.2% of the weights.
  common_mistake: '**The Pitfall:** Ignoring the footprint of the RTOS and system software.

    **The Rationale:** Candidates incorrectly calculate the available storage space assuming the entire
    1MB is free.

    **The Consequence:** The pruning target is severely miscalculated, causing the deployment to fail.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Microcontroller has 1,024 KB (1 MB) of Flash total.

    - RTOS and system software consume 600 KB.

    - Model has 500,000 INT8 parameters (1 byte/parameter).


    **Calculations:**

    - Calculate available Flash space: 1,024 KB - 600 KB = 424 KB.

    - Calculate baseline model size: 500,000 bytes / 1,024 = 488.28 KB.

    - Calculate required reduction: 488.28 KB - 424 KB = 64.28 KB.

    - Calculate sparsity percentage: 64.28 KB / 488.28 KB ≈ 0.1316 (13.2%).


    **Conclusion & Interpretation:**

    - **Result: 13.2% Sparsity (Storage-Bound)**. Approximately 13.2% of the weights must be pruned to
    fit the model into the remaining 424 KB of Flash.'
  options:
  - 0% (No pruning is needed)
  - 58% Sparsity
  - 20% Sparsity
  - 84% Sparsity
  correct_index: 2
