title: The Flash Budget Crunch
scenario: You're deploying a keyword-spotting model to a Cortex-M4 microcontroller. The model has 500,000 parameters and is stored in INT8 precision. The microcontroller has 1MB of Flash storage, but the RTOS, bootloader, and application logic already consume 600 KB. Your sparse encoder stores nonzero INT8 weights plus a 1-bit mask per original weight.
question: Assuming sparse compression so pruned INT8 weights aren't stored densely, which listed unstructured-pruning target is the smallest that fits the model into the remaining Flash?
details:
  realistic_solution: Unstructured pruning only reduces Flash use if the deployment uses a sparse representation and includes its metadata cost. Here the encoder stores each nonzero INT8 weight plus a 1-bit mask per original weight. The available Flash is 1,024 KB - 600 KB = 424 KB = 434,176 bytes. The mask costs 500,000 / 8 = 62,500 bytes, leaving 371,676 bytes for nonzero weights. That permits at most 371,676 nonzero weights, so the required sparsity is 1 - 371,676 / 500,000 = 25.7%. The smallest listed target that fits is therefore about 26% sparsity.
  common_mistake: |
    **The Pitfall:** Ignoring the footprint of the RTOS and system software.
    **The Rationale:** Candidates incorrectly calculate the available storage space assuming the entire 1MB is free.
    **The Consequence:** The pruning target is severely miscalculated, causing the deployment to fail.
  napkin_math: |
    **Assumptions & Constraints:**
    - Microcontroller has 1,024 KB (1 MB) of Flash total.
    - RTOS and system software consume 600 KB.
    - Model has 500,000 INT8 parameters (1 byte/parameter).
    - Sparse compression stores nonzero INT8 weights plus a 1-bit mask per original weight.
    - A dense INT8 model would not shrink from unstructured pruning alone.

    **Calculations:**
    - Calculate available Flash space: 1,024 KB - 600 KB = 424 KB = 434,176 bytes.
    - Calculate sparse mask size: 500,000 bits / 8 = 62,500 bytes.
    - Bytes left for nonzero weights: 434,176 - 62,500 = 371,676 bytes.
    - Maximum nonzero weights: 371,676 bytes / 1 byte per weight = 371,676 weights.
    - Required sparsity: 1 - (371,676 / 500,000) = 0.2566, or 25.7%.
    - Select from options: the smallest listed target that reaches the threshold is 26%.

    **Conclusion & Interpretation:**
    - **Result: 26% Sparsity (Storage-Bound)**. After accounting for the sparse mask overhead, the exact minimum is about 25.7%, so the 26% listed target is the smallest safe choice.
  options:
    - 0% (No pruning is needed)
    - 58% Sparsity
    - 26% Sparsity
    - 84% Sparsity
