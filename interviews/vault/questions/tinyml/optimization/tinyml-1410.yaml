title: 'Optimizing a TinyML Model for Cortex-M7 with Ethos-U55: Graph Compilation Strategy'
scenario: You are deploying a CNN onto a 480 MHz Cortex-M7 with an Ethos-U55 NPU (512 MAC/cycle). The model must fit in 512 KiB SRAM and achieve < 100ms real-time inference latency.
question: How should a graph compiler convert and partition a TensorFlow CNN for Cortex-M7 plus Ethos-U55 real-time KWS?
details:
  realistic_solution: Utilize an Ahead-Of-Time (AOT) toolchain (e.g., Vela) to perform aggressive graph partitioning, offline memory scheduling, and operator-to-hardware intrinsic mapping. This minimizes runtime dynamic allocation and optimally bridges the CPU/NPU fabric.
  common_mistake: |
    **The Pitfall:** Treating graph conversion as a single NPU lowering step and assuming every TensorFlow op will run on Ethos-U55.
    **The Rationale:** Unsupported ops, tensor layouts, and memory-lifetime conflicts must be identified offline so the graph can be rewritten, tiled, or partitioned cleanly between Ethos-U55 and Cortex-M7.
    **The Consequence:** The compiled graph may fall back to slow CPU execution at awkward boundaries, require extra activation copies, or exceed the SRAM arena even though the raw MAC count looks small.
  napkin_math: |
    **Assumptions & Constraints:**
       - Hardware: 480 MHz M7 + 512 MAC/cycle Ethos-U55 NPU.
       - Budget: < 100 ms latency, 512 KiB SRAM limit.
       - Tensor geometry: 32x32x64 INT8 feature map.
    **Calculations:**
       - Total latency cycle budget: 100 ms * 480 MHz = 48,000,000 cycles.
       - Ideal NPU baseline: 10M MACs / 512 MACs/cycle = ~19,531 cycles.
       - Activation static size: 32 * 32 * 64 bytes = 65,536 bytes (64 KiB).
       - Two such live activation buffers plus a 128 KiB tensor arena overhead estimate: 64 KiB * 2 + 128 KiB = 256 KiB, before weights and scratch buffers.
    **Conclusion & Interpretation:**
       - **Result: Compute easily fits the latency budget in the ideal case, but graph partitioning and offline memory planning determine whether live activations, copies, and scratch buffers stay within the 512 KiB SRAM limit.**
