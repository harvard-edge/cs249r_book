title: TinyML Operator Scheduling on ARM Cortex-M4 for Ultra-Low Latency Inference
scenario: 'You are tasked with deploying a small, pre-trained CNN for image classification onto an ARM Cortex-M4 STM32F4. The goal is to achieve the lowest possible inference latency and memory footprint.'
question: 'How should you schedule, fuse, and reuse buffers for an INT8 Cortex-M4 CNN to minimize latency and SRAM footprint?'
details:
  realistic_solution: 'Port the CNN to run entirely with INT8 to avoid software FPU emulation. Pre-allocate all tensor buffers in a static memory pool and carefully manage buffer reuse across layers via topological memory planning (e.g., input to layer N reuses output of layer N-2). Identify and fuse sequential operations (Conv2D -> ReLU -> BatchNorm) into a single CMSIS-NN hardware kernel to minimize intermediate writes and maximize SIMD intrinsic efficiency.'
  common_mistake: |
    **The Pitfall:** Treating the ARM Cortex-M4 as a typical embedded CPU with ample resources and an FPU.
    **The Rationale:** Candidates design a naive operator graph that allocates dynamic memory for each tensor and attempts software-emulated floating-point math.
    **The Consequence:** Frequent cache misses, memory pressure exceeding the 256KB SRAM limit, and drastically increased execution time.
  napkin_math: |
    **Assumptions & Constraints:**
    - Typical layer input: 32x32x32 (INT8) = 32 KB.
    - Output buffer: 32x32x64 (INT8) = 64 KB.
    - MAC operations: 32 * 32 * 64 * 3 * 3 * 32 = 18.8 million MACs.
    - CPU architecture: 168 MHz Cortex-M4, assuming 4 cycles/MAC.

    **Calculations:**
    - Peak memory for one layer: 96 KB. (Requires careful reuse to stay under 256 KB across multiple layers).
    - Compute time per layer: 18.8M * 4 / 168M = 0.44 seconds.

    **Conclusion & Interpretation:**
    - **Result: 0.44 seconds per layer ([Compute-Bound])**. Operator fusion and in-place buffer reuse are strictly required to prevent OOM and minimize latency.
