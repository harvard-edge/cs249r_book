title: 'Cortex-M4 SPI-Compute Overlap'
scenario: 'A Cortex-M4 (100 MHz) streaming anomaly results over BLE currently blocks CPU execution. The SPI transfer takes 5ms, and the subsequent inference takes 15ms sequentially.'
question: 'What is the percentage reduction in per-inference latency if DMA is configured to completely overlap the BLE transmission with the next inference computation?'
details:
  realistic_solution: 'Without Direct Memory Access (DMA), the CPU waits 5ms for the SPI transfer to finish before beginning the 15ms inference, yielding a total pipeline latency of 20ms per frame. By offloading the SPI transfer to DMA, the CPU can immediately begin the 15ms inference for frame N+1 while frame N transmits. Since 15ms > 5ms, the transmission is completely hidden, making the effective pipeline latency 15ms.'
  common_mistake: |
    **The Pitfall:** Assuming DMA eliminates the compute time entirely or incorrectly adding the overlapped times.
    **The Rationale:** Candidates misunderstand pipeline bottlenecks, failing to see that the new latency is simply the maximum of the two concurrent operations.
    **The Consequence:** Overestimating the performance gains from DMA offload, leading to incorrect system sizing.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sequential SPI transfer is 5 ms.
    - Inference is 15 ms.
    - DMA allows parallel execution.

    **Calculations:**
    - Old latency: 15 ms + 5 ms = 20 ms.
    - New latency: max(15 ms, 5 ms) = 15 ms.
    - Reduction: (20 ms - 15 ms) / 20 ms = 25%.

    **Conclusion & Interpretation:**
    - **Result: 25% reduction (Compute-Bound)**. The latency is purely driven by the inference.
