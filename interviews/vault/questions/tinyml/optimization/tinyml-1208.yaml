title: Ethos-U55 Compiler Tiling for Operator Fallback
scenario: >
  You are designing an AOT compilation strategy for the ARM Cortex-M7 + Ethos-U55 (Corstone-300) system. A model contains an unsupported custom activation function sandwiched between two U55-supported Conv2D layers. The intermediate activation is 300 KB, but the system only has 512 KB of shared SRAM, leaving insufficient room for ping-pong buffers.
question: How can a compiler synthesize tiling and pipelining between the U55 and M7 to avoid spilling a 300 KB activation to external memory?
details:
  realistic_solution: >
    The compiler must implement spatial tiling (strip-mining) and emit a software pipeline. By slicing the graph into smaller execution sub-graphs (e.g., 50 KB tiles), the U55 can compute tile N+1 while the 480 MHz M7 processes the custom activation for tile N. This easily fits within the 512 KB SRAM limit using circular buffers and partially hides the M7's execution latency behind the NPU's throughput.
  common_mistake: |
    **The Pitfall:** Suggesting a naive operator fallback where the full tensor is passed between processors.
    **The Rationale:** Candidates ignore the 512 KB SRAM limit, failing to realize that holding both 300 KB input and 300 KB output tensors requires 600 KB.
    **The Consequence:** The system will suffer an out-of-memory error or disastrous performance from spilling to slow external memory.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total SRAM: 512 KB. Clock: 480 MHz.
       - Naive Fallback: 300 KB (in) + 300 KB (out) = 600 KB.
    2. **Calculations:**
       - Strip-mining: Slice into 50 KB tiles. 3 buffers = 150 KB.
       - U55 Tile N+1 (1M MACs @ 256/cycle): ~3,900 cycles (8.1 µs).
       - M7 Tile N (50K elems @ 10 cycles): 500,000 cycles (1.04 ms).
    3. **Conclusion & Interpretation:**
       - **Result: 150 KB SRAM usage.** The pipeline fits in SRAM, but the M7 becomes a severe compute bottleneck, necessitating vectorization to balance the pipeline. **Bottleneck: CPU Fallback Compute.**
