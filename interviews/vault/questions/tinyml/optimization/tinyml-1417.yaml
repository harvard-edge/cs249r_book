title: Diagnosing Inefficient Operator Scheduling on Cortex-M7/Ethos-U55 for TinyML
scenario: 'A vision model on a Cortex-M7 + Ethos-U55 platform is unexpectedly slow. Profiling reveals low NPU utilization (~20%) and high execution time (>40%) spent on data transfers between the Cortex-M7 SRAM and the Ethos-U55. The model uses default operator scheduling.'
question: 'Why does default scheduling leave the Ethos-U55 at 20% utilization with 40% of time spent on SRAM transfers?'
details:
  realistic_solution: 'Analyze the operator graph to identify where intermediate tensors are stored. Look for patterns where tensors are written to SRAM, then read back by the NPU. Evaluate layer fusion opportunities (e.g., Conv2D + ReLU) and memory reuse to minimize memory traffic, which is heavily bottlenecking the NPU.'
  common_mistake: |
    **The Pitfall:** Immediately focusing on model quantization or pruning without analyzing the existing operator schedule.
    **The Rationale:** Engineers assume the NPU theoretical peak performance should be easily achievable, overlooking memory bandwidth limits.
    **The Consequence:** They degrade model accuracy unnecessarily when the actual fix requires simple layer fusion to improve data locality.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM transfer speed: e.g., 10 MB/s.
    - NPU clock: 480 MHz, 128 MAC/cycle.

    **Calculations:**
    - Moving a 256 KB feature map takes ~25 ms.
    - The NPU computes the same tensor in <1 ms.

    **Conclusion & Interpretation:**
    - **Result: NPU starvation ([Memory-Bound])**. The massive disparity between memory bandwidth and compute throughput starves the NPU.
