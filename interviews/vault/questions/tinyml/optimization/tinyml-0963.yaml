title: The Distillation Temperature Bottleneck
scenario: A 1000-class classification model on a Cortex-M4 (STM32F4, no FPU) executes 1.5 million MACs in 9 ms. However, profiling reveals that the final Temperature-scaled Softmax layer takes an additional 6 ms, consuming 40% of the total inference time.
question: Why does this specific layer cause such a severe performance degradation, and what is the optimal deployment strategy?
details:
  realistic_solution: Delete the Softmax completely. Temperature scaling and the exponential function are strictly monotonic and do not alter the relative ordering of the logits, so argmax operates perfectly on raw outputs.
  common_mistake: |
    **The Pitfall:** Attempting to optimize the Softmax implementation mathematically (e.g., Taylor series or LUTs).
    **The Rationale:** Candidates get distracted by approximation techniques, missing that Temperature scaling and exponentiation are strictly monotonic and do not alter argmax predictions.
    **The Consequence:** Wasting engineering effort to optimize an operation that is logically completely redundant for edge classification, leaving unnecessary latency in the pipeline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4 (STM32F4): 168 MHz, no hardware FPU.
    - Softmax classes: 1000.

    **Calculations:**
    - Emulated FPU Softmax: 1000 classes * (~1000 cycles for div/exp) = 1M cycles.
    - Latency: 1M / 168 MHz = 5.95 ms.
    - Direct Argmax: 1000 classes * 1 cycle = 1000 cycles.
    - Argmax latency: 1000 / 168 MHz = 0.006 ms.

    **Conclusion & Interpretation:**
    - **Result: Argmax saves ~6 ms (40% total time) (FPU-Emulation-Bound)**. Redundant monotonic operators should be deleted.
