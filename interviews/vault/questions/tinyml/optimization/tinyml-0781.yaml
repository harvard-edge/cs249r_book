title: The QAT Batch Normalization Folding Failure
scenario: A newly trained model performs great with Post-Training Quantization (PTQ), but when Quantization-Aware Training (QAT) is applied to push accuracy higher, the deployed INT8 model on Cortex-M4 generates garbage outputs.
question: What QAT conversion error most likely causes the deployed INT8 Cortex-M4 model to output garbage?
details:
  realistic_solution: The likely failure is mismatched Batch Normalization folding or freezing during QAT-to-INT8 conversion. QAT conversion must use the same folded Conv+BN parameters that the fake-quantized training graph expects; if BN moving mean/variance are still changing, folded late with different statistics, or left as a distinct op during edge compilation, the deployed INT8 scales can be badly miscalibrated and produce garbage activations.
  common_mistake: |
    **The Pitfall:** Blindly porting PTQ compilation scripts to process QAT checkpoint architectures.
    **The Rationale:** Developers habitually reuse build pipelines, falsely assuming the framework auto-handles the complex BN-folding sequence for QAT metadata.
    **The Consequence:** Evaluated outputs are drastically clipped by misaligned scaling parameters, rendering the model useless at the edge.
  napkin_math: |
    **Assumptions & Constraints:**
    - W_fold = W * gamma / sqrt(var + eps).
    - b_fold = beta + (b - mean) * gamma / sqrt(var + eps).
    - Scenario values: var=0.01, gamma=0.5, eps=0.001.

    **Calculations:**
    - Scale factor = 0.5 / sqrt(0.01 + 0.001) = 0.5 / sqrt(0.011).
    - sqrt(0.011) ≈ 0.1049, so scale factor ≈ 4.77.
    - Therefore: W_fold ≈ W * 4.77, and the folded bias must also include the mean, beta, and original bias terms.

    **Conclusion & Interpretation:**
    - **Result: approximately 4.77x weight scaling plus a required bias shift (Range Clipping Failure)**. Incorrect BN folding or freezing can move the INT8 activation ranges far from those learned during QAT.
