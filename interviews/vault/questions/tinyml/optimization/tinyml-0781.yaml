title: Tinyml New 0003
scenario: A newly trained model performs great with Post-Training Quantization (PTQ), but when Quantization-Aware Training (QAT) is applied to push accuracy higher, the deployed INT8 model on Cortex-M4 generates garbage outputs.
question: What QAT conversion error most likely causes the deployed INT8 Cortex-M4 model to output garbage?
details:
  realistic_solution: The fundamental failure is improperly folded Batch Normalization parameters during QAT graph evaluation. In QAT, BN layers must be strictly folded into convolutional weights prior to evaluating fake quantization nodes. If they are left distinct or collapsed late during edge compilation, the moving averages radically skew, injecting catastrophic activation shifts.
  common_mistake: |
    **The Pitfall:** Blindly porting PTQ compilation scripts to process QAT checkpoint architectures.
    **The Rationale:** Developers habitually reuse build pipelines, falsely assuming the framework auto-handles the complex BN-folding sequence for QAT metadata.
    **The Consequence:** Evaluated outputs are drastically clipped by misaligned scaling parameters, rendering the model useless at the edge.
  napkin_math: |
    **Assumptions & Constraints:**
    - W_fold = W * gamma / sqrt(var + eps).
    - Scenario variances: var=0.01, gamma=0.5.

    **Calculations:**
    - Scale factor = 0.5 / sqrt(0.01) = 0.5 / 0.1 = 5.0.
    - Therefore: W_fold = W * 5.0.

    **Conclusion & Interpretation:**
    - **Result: 5.0x Multiplier Missed (Range Clipping Failure)**. Missing this explicit 5x structural multiplier ruins the INT8 boundaries, turning inference into total noise.
