title: 'BatchNorm Constant Folding Flash Savings'
scenario: 'You are deploying a predictive maintenance CNN on the Nordic nRF5340 (128 MHz app core, 256 KB SRAM, 1 MB flash, ~5mA active). The unoptimized model graph contains 8 Convolutional layers, each followed by a Batch Normalization layer with 64 channels. All parameters are stored as 32-bit floats. During graph compilation, the AOT compiler performs constant folding, merging the BatchNorm operations into the Convolutional weights and biases.'
question: 'What is the exact amount of Flash memory saved by this optimization, and what fraction of the nRF5340''s total 1 MB Flash does this represent?'
details:
  realistic_solution: 'The correct approach identifies that constant folding eliminates the need to store the 4 BatchNorm parameters (mean, variance, gamma, beta) per channel by pre-computing the folded weights and biases into the preceding convolution. The candidate should systematically multiply the layers, channels, and bytes-per-parameter to find the total byte savings, and then divide by the 1 MB capacity to find the fraction.'
  common_mistake: |
    **The Pitfall:** Forgetting that BatchNorm requires 4 distinct parameters per channel, or assuming 8-bit weights instead of 32-bit floats.
    **The Rationale:** Candidates often incorrectly calculate the byte size by confusing data types or missing the 4 parameters (mean, variance, gamma, beta).
    **The Consequence:** The flash footprint reduction is miscalculated, potentially leading to incorrect hardware selection or memory allocation strategies.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 layers.
    - 64 channels/layer.
    - 4 parameters/channel.
    - float32 (4 bytes).
    - Total Flash = 1 MB (1,024 KB).

    **Calculations:**
    - Parameters per channel = 4 (mean, variance, gamma, beta).
    - Bytes per channel = 4 params * 4 bytes = 16 bytes.
    - Total channels = 8 layers * 64 channels = 512 channels.
    - Total Flash saved = 512 channels * 16 bytes = 8,192 bytes (8 KB).
    - Fraction = 8 KB / 1,024 KB.

    **Conclusion & Interpretation:**
    - **Result: 8 KB saved (Memory-Bound)**. Saves exactly 1/128 (or ~0.78%) of the 1 MB Flash.
