title: 'Frequency Scaling Duty Cycle'
scenario: 'A Cortex-M4 sensor runs a 5-second active inference every 10 minutes. At 100MHz, active power is 10mW. Dropping the clock to 50MHz doubles the compute time but lowers active power to 4mW.'
question: 'Design a duty-cycling schedule and optimize the clock frequency to minimize total energy consumed per hour.'
details:
  realistic_solution: 'At 100MHz, one inference takes 5s and uses 50mJ. At 50MHz, it takes 10s and uses 40mJ. Since sleep power is negligible and inferences happen only 6 times per hour, the 50MHz mode is more energy-efficient (240mJ/hr vs 300mJ/hr). The schedule should run the MCU at 50MHz for 10s, then deep-sleep for 590s.'
  common_mistake: |
    **The Pitfall:** Blindly applying the 'race-to-sleep' heuristic.
    **The Rationale:** Candidates assume that completing the task faster always saves energy, without calculating the non-linear relationship between voltage/frequency scaling and active power consumption.
    **The Consequence:** The device operates at a sub-optimal energy point, consuming 300mJ/hr instead of 240mJ/hr.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100MHz Energy: 5s * 10mW = 50mJ per inference.
    - 50MHz Energy: 10s * 4mW = 40mJ per inference.

    **Calculations:**
    - Hourly Energy (100MHz): 6 inferences * 50mJ = 300mJ/hr.
    - Hourly Energy (50MHz): 6 inferences * 40mJ = 240mJ/hr.

    **Conclusion & Interpretation:**
    - **Result: 240mJ/hr (Power-Bound)**. Duty cycling at 50MHz saves energy compared to the race-to-sleep strategy.
