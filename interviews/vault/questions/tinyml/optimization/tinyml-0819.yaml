title: BLE Transmission Overlap Diagnosis
scenario: >
  A wearable Cortex-M4 ECG device processes a 10KB feature vector array taking 30ms, then transmits it over a 2 Mbps BLE link. The device is currently missing its 60ms hard real-time deadline.
question: Diagnose the latency failure in the current sequential pipeline and design a specification to overlap operations using hardware peripherals.
details:
  realistic_solution: >
    The current design suffers from sequential execution stall. The 10KB payload takes 40ms to transmit, yielding a 70ms total time. The correct specification dictates a dual-buffer DMA (Direct Memory Access) architecture. By pipelining the process, the CPU computes features for frame N while the DMA controller autonomously transmits frame N-1 over the BLE peripheral, bounding the per-frame latency to the maximum of the two operations.
  common_mistake: |
    **The Pitfall:** Suggesting data compression to reduce transmission time.
    **The Rationale:** Data scientists often try to reduce the payload size without considering the CPU cycles required to execute the compression algorithm.
    **The Consequence:** The added CPU latency for compression pushes the total compute time beyond the 60ms deadline anyway.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Payload: 10 KB. Compute: 30 ms. BLE Link: 2 Mbps.
       - Deadline: 60 ms.
    2. **Calculations:**
       - Payload Size in bits: 10 KB * 8 bits/byte = 80 Kbits.
       - TX Time: 80 Kbits / 2,000 Kbps = 0.040 seconds (40 ms).
       - Sequential Total: 30 ms + 40 ms = 70 ms (Violates deadline).
       - Pipelined Time (Dual-Buffer DMA): Max(30 ms, 40 ms) = 40 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Latency drops from 70 ms to 40 ms.** Overlapping compute and TX via DMA safely meets the deadline. **Bottleneck: Pipeline Stall/Sequential I-O.**
