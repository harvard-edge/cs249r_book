title: Distilled Student SRAM Exhaustion
scenario: A team compressed a predictive maintenance model for the Nordic nRF5340 using knowledge distillation instead of structured pruning. The distilled student model has 150 KB of weights, fitting easily into the 1 MB flash, while an alternatively pruned teacher model has 200 KB of weights. However, when deployed to the 128 MHz app core, the distilled model immediately causes a hard fault due to SRAM exhaustion, whereas the pruned model executes successfully.
question: Why can a smaller distilled nRF5340 model OOM while a larger pruned model runs successfully?
details:
  realistic_solution: The crash is caused by the peak activation memory footprint, which dictates SRAM usage on microcontrollers. Structured pruning directly reduces the number of channels, inherently shrinking intermediate feature maps. In contrast, the custom student architecture designed for distillation likely utilized wider layers or larger spatial dimensions early in the network to match the teacher's capacity, resulting in peak activations that exceeded the available SRAM despite having fewer total weights.
  common_mistake: |
    **The Pitfall:** Assuming a lower parameter count (flash usage) perfectly correlates with lower SRAM usage.
    **The Rationale:** Candidates fixate on weight storage, neglecting the memory required for intermediate activations during forward passes.
    **The Consequence:** The model deploys cleanly to Flash but causes an immediate hard fault when inference is triggered.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total SRAM: 256 KB.
    - BLE/RTOS footprint: 64 KB.
    - Usable ML SRAM is for the tensor arena, including peak activations and scratch.
    - Pruned teacher peak live activations after structured channel pruning: 64 channels * 1000 steps * 1 byte, with one similarly sized scratch buffer.
    - Distilled student peak live activations from a wider early layer: 128 channels * 1000 steps * 1 byte, with one similarly sized scratch buffer.

    **Calculations:**
    - Usable SRAM: 256 KB - 64 KB = 192 KB.
    - Pruned teacher peak arena: (64 * 1000 * 1) * 2 = 128,000 bytes (~125 KiB), which fits inside 192 KB.
    - Distilled student peak arena: (128 * 1000 * 1) * 2 = 256,000 bytes (~250 KiB), which exceeds 192 KB.
    - Weight storage differs in flash (150 KB vs 200 KB) and does not determine this SRAM peak.

    **Conclusion & Interpretation:**
    - **Result: student peak tensor arena is ~250 KiB versus 192 KB available.** The smaller distilled model hard-faults because its wider intermediate activations exceed app-core SRAM, while the larger pruned model runs because channel pruning lowers peak live activation memory. **Bottleneck: Peak Activation SRAM.**
