title: SRAM Bottlenecks and Structured Pruning on ESP32-S3
scenario: We are deploying a keyword spotting CNN on an ESP32-S3 microcontroller. The dense INT8 model
  weights currently occupy 800 KB, forcing us to store them in the 8 MB PSRAM, which causes cache thrashing
  and spikes inference latency to 120ms (our budget is 50ms). A team member proposes applying 50% unstructured
  pruning so the weights can theoretically fit entirely within the fast 512 KB SRAM.
question: Why does 50% unstructured pruning of an 800 KB INT8 model fail to fit in 512 KB SRAM, and how
  does it affect ESP32-S3 performance?
details:
  realistic_solution: 'The team should reject unstructured pruning and utilize structured pruning (such
    as filter or channel pruning) instead. Structured pruning physically shrinks the weight tensors to
    create a smaller, dense model. This eliminates index storage overhead, allows the reduced weights
    to fit comfortably into the 512 KB SRAM alongside activations, and maintains the contiguous data layout
    required to fully saturate the ESP32-S3''s vector extensions.

    '
  common_mistake: '**The Pitfall:** Assuming 50% unstructured pruning perfectly halves the memory footprint
    and directly speeds up inference.

    **The Rationale:** Candidates forget that unstructured sparsity requires auxiliary data structures
    (like bitmasks or CSR format) which consume memory.

    **The Consequence:** Irregular memory access patterns prevent the ESP32-S3''s INT8 vector extensions
    from utilizing SIMD instructions effectively, and the model still fails to fit in SRAM.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Original footprint: 800 KB INT8 weights (in PSRAM).

    - SRAM limit: 512 KB (with ~100 KB needed for activations and RTOS).

    - Unstructured bitmask: 1 bit per 8-bit weight.

    - PSRAM reads have 4x memory bandwidth penalty compared to single-cycle SRAM.


    **Calculations:**

    - 50% Unstructured: 400 KB weights + 100 KB bitmask = 500 KB total (Exceeds available SRAM, forcing
    data back to slow PSRAM).

    - 50% Structured: 400 KB dense weights + 0 KB overhead = 400 KB total (Safely fits in SRAM).

    - Latency impact: Moving 400 KB of reads from PSRAM to single-cycle SRAM.


    **Conclusion & Interpretation:**

    - **Result: ~30ms (Memory-Bound)**. Combined with unhindered vector extension usage, latency drops
    from 120ms to ~30ms, safely meeting the 50ms budget.

    '
