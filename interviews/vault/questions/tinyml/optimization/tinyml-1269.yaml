title: Knowledge Distillation Soft Targets on nRF5340
scenario: We need to deploy an audio classification model on a Nordic nRF5340 microcontroller, which features a 128 MHz app core, 256 KB SRAM, and 1 MB of flash. The original teacher model takes up 5 MB, well over our flash capacity, so we must train a much smaller student model using knowledge distillation.
question: What is the specific term for the temperature-scaled probability distribution produced by the teacher model that the student model attempts to match?
details:
  realistic_solution: The correct term is 'soft targets' (or soft labels). In knowledge distillation, a temperature scaling parameter is applied to the softmax function of the teacher model to produce soft targets, which convey 'dark knowledge' about the similarities between different classes, helping the highly constrained student model learn better representations.
  common_mistake: |
    **The Pitfall:** Incorrectly recalling this as 'hard targets' or 'feature distillation'.
    **The Rationale:** Candidates forget that standard labels do not provide the inter-class relational information necessary for effective distillation, and miss the significance of temperature-scaled outputs.
    **The Consequence:** Demonstrates a superficial understanding of how knowledge distillation transfers representations between models.
  napkin_math: |
    **Assumptions & Constraints:**
    - Nordic nRF5340 flash capacity: 1 MB (1024 KB).
    - Stack/RTOS overhead: ~256 KB.
    - Teacher model size: 5 MB (5120 KB).

    **Calculations:**
    - Available flash for student model: 1024 KB - 256 KB = 768 KB.
    - Required size reduction ratio: 5120 KB / 768 KB = 6.66x.

    **Conclusion & Interpretation:**
    - **Result: 6.66x Reduction (Memory Capacity-Bound)**. Knowledge distillation using soft targets is required to bridge this massive gap while preserving performance.
