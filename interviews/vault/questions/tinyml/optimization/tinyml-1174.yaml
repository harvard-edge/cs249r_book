title: Calculate Latency of Pruning Methods on Cortex-M4
scenario: 'You are deploying an INT8 wake-word model on an ARM Cortex-M4 (STM32F4) operating at 168 MHz with 1 MB of flash and 256 KB SRAM. A fully connected layer in your model has 1024 inputs and 256 outputs. You are evaluating two optimization paths: 75% unstructured weight pruning versus 50% structured pruning (removing half of the output neurons). Standard CMSIS-NN is used, which executes 2x INT8 MACs per cycle via SIMD instructions, but lacks optimized kernels for unstructured sparsity. Calculate the exact inference latency in microseconds and the parameter flash footprint in kilobytes for both pruning strategies.'
question: What latency and flash footprint result from 75% unstructured pruning versus 50% structured pruning?
details:
  realistic_solution: The correct approach recognizes that standard CMSIS-NN still executes the 1024x256 dense matrix for unstructured pruning, so latency remains 262,144 MACs / 2 MACs per cycle / 168 MHz = about 780.2 us and the dense INT8 weight footprint remains 256 KiB. A sparse CSR-style encoding could save nonzero values but would need indices and a custom kernel, so it is outside the stated standard CMSIS-NN path. With 50% structured pruning, the matrix becomes 1024x128, so latency is 131,072 MACs / 2 / 168 MHz = about 390.1 us and the parameter footprint is 128 KiB.
  common_mistake: |
    **The Pitfall:** Candidates often assume unstructured pruning linearly reduces inference latency and memory.
    **The Rationale:** They fail to realize that on the Cortex-M4, standard CMSIS-NN dense kernels cannot skip unstructured zeros without destroying the dual-MAC SIMD vectorization.
    **The Consequence:** Meaning a sparsely populated dense matrix still incurs the full dense latency.
  napkin_math: |
    **Assumptions & Constraints:**
    1. INT8 storage: 1 byte per parameter.
    2. Dense Baseline: 1024 x 256 = 262,144 parameters. Flash footprint = 262,144 bytes = 256 KiB. Total MACs = 262,144.
    **Calculations:**
    3. Unstructured (75% sparse): Processed densely via CMSIS-NN to utilize SIMD. Cycles = 262,144 / 2 MACs/cycle = 131,072 cycles. Latency = 131,072 / 168,000,000 Hz = 780.2 μs. Dense flash footprint remains 256 KiB.
    4. Structured (50% pruned): Matrix becomes 1024 x 128. Flash footprint = 131,072 bytes = 128 KiB. Total MACs = 131,072. Cycles = 131,072 / 2 = 65,536.
    **Conclusion & Interpretation:**
    Structured latency = 65,536 / 168,000,000 Hz = 390.1 μs. Unstructured pruning does not reduce dense CMSIS-NN latency; structured pruning halves both the stored weights and MAC latency.
