title: 'Pruning Pipeline Design for nRF5340'
scenario: 'You are architecting the model optimization pipeline for a continuous vibration monitoring sensor. Your baseline CNN exceeds available memory and execution time constraints.'
question: 'What pruning strategy should compress the CNN while reducing both SRAM and latency, and how does it align with the MCU?'
details:
  realistic_solution: 'The correct design employs structured pruning (such as channel or block pruning) applied prior to deployment. By physically shrinking the dimensions of the weight matrices, structured pruning directly reduces both flash storage and SRAM activation buffers without requiring complex sparse runtime libraries.'
  common_mistake: |
    **The Pitfall:** Candidates propose unstructured magnitude pruning to achieve high sparsity ratios like 80%.
    **The Rationale:** They incorrectly assume it yields a proportional reduction in memory and latency without considering hardware support.
    **The Consequence:** They introduce index storage overhead that bloats flash memory and irregular memory access patterns that destroy cache locality.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target constraints: < 256 KB SRAM, < 1 MB Flash.
    - Baseline model: 350 KB SRAM, 800 KB Flash.
    - Baseline compute: 10M MACs.

    **Calculations:**
    - 50% Unstructured pruning (8-bit weights, 16-bit indices): 400 KB + (400 KB × 2) = 1.2 MB Flash (Exceeds 1 MB limit).
    - 40% Structured pruning SRAM: 350 KB × 0.6 = 210 KB.
    - 40% Structured pruning Flash: 800 KB × 0.6 = 480 KB.
    - Compute Reduction: 10M MACs × 0.6 = 6M MACs.
    - Latency at ~2 cycles/MAC (128 MHz): (6,000,000 × 2) / 128 MHz ≈ 93.75 ms.

    **Conclusion & Interpretation:**
    - **Result: 210 KB SRAM, 93.75 ms Latency (Memory-Bound)**. Structured pruning directly physically shrinks dimensions, avoiding the catastrophic sparse-index storage overhead that breaks Flash limits.
