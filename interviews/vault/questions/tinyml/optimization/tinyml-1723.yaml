title: Triple-Buffering Pipeline Throughput Constraint
scenario: 'A Cortex-M4 pipeline gathers a 2 KB sample window via SPI DMA (5 ms), runs an ML model that uses a 12 KB activation tensor arena and produces a 512 B output (10 ms compute), and transmits via BLE DMA (5 ms). To maximise throughput, the team plans true triple-buffering - three frames are concurrently in flight at all times.'
question: 'Apply a true triple-buffer scheme and compute the strict SRAM footprint needed, comparing it against ping-pong buffering.'
details:
  realistic_solution: 'Triple-buffer SRAM accounting requires 3 slots for I/O so that producer and consumer never collide. The activation arena, however, is only live during the compute stage, and the Cortex-M4 runs compute sequentially. Exactly one frame is in compute at any moment, so a SINGLE 12 KB arena suffices. Triple-buffer SRAM = 3 * 2 KB (inputs) + 1 * 12 KB (arena) + 3 * 0.5 KB (outputs) = 19.5 KB. Ping-pong = 2*2 + 12 + 2*0.5 = 17 KB. The throughput uplift of triple over double is essentially zero here because both are gated by the 10 ms compute stage.'
  common_mistake: |
    **The Pitfall:** Multiplying the activation arena by 3 along with the input/output buffers.
    **The Rationale:** Candidates incorrectly assume that every stage of the pipeline needs its own independent activation arena, ignoring that compute is strictly sequential.
    **The Consequence:** This leads to drastically overestimating SRAM requirements, potentially causing the team to abandon a feasible buffering strategy.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4 (256 KB SRAM).
    - Input DMA: 2 KB.
    - Output DMA: 0.5 KB.
    - Activation Arena: 12 KB.

    **Calculations:**
    - Triple-buffer inputs = 3 * 2 KB = 6 KB.
    - Triple-buffer outputs = 3 * 0.5 KB = 1.5 KB.
    - Single compute arena = 1 * 12 KB = 12 KB.
    - Total triple-buffer = 6 + 1.5 + 12 = 19.5 KB.
    - Ping-pong inputs (2) + outputs (2) + arena = 4 + 1 + 12 = 17 KB.

    **Conclusion & Interpretation:**
    - **Result: 19.5 KB vs 17 KB where Triple-buffering doesn't multiply the arena (Memory-Bound Architecture Planning)**. Compute is strictly sequential; only I/O buffers need multiplication.
