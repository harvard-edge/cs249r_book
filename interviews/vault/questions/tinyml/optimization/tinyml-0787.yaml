title: 'Tinyml New 0009'
scenario: 'You apply 50% unstructured pruning to a heavy CNN deployed on a Jetson Orin (275 TOPS). Training confirms 50% sparsity. Yet, the deployed model shows absolutely 0% speedup and uses more memory.'
question: 'Why does 50% unstructured pruning produce no speedup and higher memory use on Jetson Orin?'
details:
  realistic_solution: 'Unstructured pruning removes weights randomly. To execute this, the hardware uses sparse matrix formats (like CSR) which require reading explicit index arrays. The low arithmetic intensity of random sparse reads heavily throttles memory bandwidth, and GPUs lack dedicated unstructured sparse hardware accelerators. Switch to structured pruning (e.g., removing entire channels) or 2:4 sparsity if supported.'
  common_mistake: |
    **The Pitfall:** Deploying unstructured sparse models on SIMD/GPU hardware expecting linear speedups.
    **The Rationale:** Ignoring the index overhead and memory coalescing rules required for sparse matrix formats like CSR.
    **The Consequence:** The low arithmetic intensity of random sparse reads heavily throttles memory bandwidth, destroying performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dense read requires 1 byte per weight (INT8).
    - Sparse CSR read requires 1 byte weight + 2 bytes index (3 bytes per active weight).
    - Hardware: Jetson Orin with 275 TOPS, memory bandwidth limited for random access.

    **Calculations:**
    - Dense memory traffic: 1.0 byte per weight.
    - Total Traffic at 50% Sparsity: 50% * 3 bytes = 1.5 bytes avg per total original weight.

    **Conclusion & Interpretation:**
    - **Result: 1.5x memory traffic increase (Memory-Bound)**. Memory traffic actually increases by 1.5x, explaining the memory bloat and 0% speedup on GPU hardware lacking unstructured sparse accelerators.
