title: Layer Fusion for SRAM Peak Memory Reduction
scenario: You are deploying a keyword spotting CNN on an ESP32-S3 (240 MHz dual-core Xtensa, 512 KB SRAM, 8 MB PSRAM, vector extensions for INT8). A critical model block consists of a Conv1D layer followed directly by a MaxPool1D layer. The input tensor is 100 KB and the INT8 Conv1D weights take up 150 KB. The Conv1D produces a 300 KB intermediate tensor, which the MaxPool1D downsamples to a 100 KB final output tensor.
question: How would you calculate the peak memory footprint for standard sequential scheduling versus fused operator scheduling, and determine whether they fit entirely within the fast SRAM?
details:
  realistic_solution: By applying layer fusion (depth-first tile scheduling), we compute the Conv1D and MaxPool1D simultaneously in chunks. This completely avoids materializing the massive intermediate tensor. Instead, we allocate a small intermediate tile buffer, keeping the total memory footprint securely within the 512 KB SRAM limit and ensuring maximum throughput on the Xtensa cores.
  common_mistake: Candidates often assume the 8 MB PSRAM operates at the same speed as SRAM and fail to realize that spilling over the 512 KB SRAM limit will bottleneck the INT8 vector extensions. They also frequently forget to include the static weight memory in the peak working memory calculation.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM Limit: 512 KB.
    - Tensors: Input (100 KB), INT8 Conv1D Weights (150 KB), Conv1D Output (300 KB), MaxPool Output (100 KB).

    **Calculations:**
    - Unfused Peak Memory: 100 KB + 150 KB + 300 KB = 550 KB (> 512 KB).
    - Fused Peak Memory: 100 KB + 150 KB + 100 KB + ~10 KB (Tile Buffer) = 360 KB (< 512 KB).
    - Memory Saved: 550 KB - 360 KB = 190 KB.

    **Conclusion & Interpretation:**
    - **Result: 360 KB Fused Peak (Memory-Bound)**. Fusing the operators prevents spilling to slower PSRAM and keeps the entire working set within fast SRAM.
