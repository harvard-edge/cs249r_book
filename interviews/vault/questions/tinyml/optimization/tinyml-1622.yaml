title: Pipelining Compute and SPI Transfer Time
scenario: A Cortex-M4 computes audio chunks and transmits them via SPI using perfect DMA double-buffering.
question: Calculate the total time to process and transmit 4 chunks if compute takes 10ms per chunk and transmission takes 5ms per chunk.
details:
  realistic_solution: 'With double-buffering, compute and transmission overlap. Since compute (10ms) is strictly longer than transmit (5ms), the pipeline bottleneck is the compute phase. Total time is the compute time of all 4 chunks plus the un-overlapped transmission of the final chunk: (4 * 10ms) + 5ms = 45ms.'
  common_mistake: |
    **The Pitfall:** Adding the times sequentially (4 * 15ms = 60ms).
    **The Rationale:** Failing to understand how DMA double-buffering allows the CPU and SPI peripheral to operate concurrently.
    **The Consequence:** Overestimating latency and misconfiguring real-time deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute: 10 ms/chunk.
       - Transmit: 5 ms/chunk.
       - Total chunks: 4.
    2. **Calculations:**
       - Pipeline bottleneck = max(10 ms, 5 ms) = 10 ms.
       - 4 chunks compute = 4 * 10 ms = 40 ms.
       - Final transmission un-overlapped = 5 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Pipeline**. Total time is 45 ms.
