title: Corstone-300 Operator Cascading and CPU-NPU Pipelining
scenario: You are deploying a vision model on a Corstone-300 subsystem. You must evaluate two scheduling plans for a Conv2D -> DepthwiseConv2D -> Dense layer sequence. Plan A schedules all operators sequentially on the Ethos-U55, writing a 150 KB intermediate activation to the shared SRAM. Plan B cascades the convolutions on the Ethos-U55 to keep the 150 KB activation internal, and schedules the Dense layer on the M7 CPU concurrently with the next frame's convolutions.
question: Should Corstone-300 use Ethos-U55 layer cascading or sequential SRAM writes for a Conv2D-Depthwise-Dense chain?
details:
  realistic_solution: Plan B is usually the better system-level choice if the graph partition and frame pipeline provide enough overlap. Cascading the Conv2D and DepthwiseConv2D layers on the Ethos-U55 avoids writing and rereading the 150 KB intermediate tensor in shared SRAM, reducing bandwidth and power. Scheduling the Dense layer on the M7 can improve throughput only when the next frame's NPU convolution window is at least as long as the M7 Dense time; otherwise Plan B still saves SRAM traffic but leaves some Dense latency exposed.
  common_mistake: |
    **The Pitfall:** Reflexively choosing Plan A because the Ethos-U55 has significantly higher MAC throughput than the Cortex-M7.
    **The Rationale:** Candidates focus solely on compute FLOPs and fail to account for the shared SRAM memory bandwidth bottleneck.
    **The Consequence:** Spilling the 150 KB intermediate activation to main SRAM causes severe bus contention, increasing latency and power consumption.
  napkin_math: |
    **Assumptions & Constraints:**
    - 480 MHz system with 32-bit bus (4 bytes/cycle).
    - 150 KB intermediate activation.
    - Dense layer requires 200,000 MACs.
    - M7 uses dual-MAC SIMD DSP instructions.
    - Next frame's cascaded NPU convolutions are estimated at 300 µs.

    **Calculations:**
    - Plan A SRAM Traffic: 150 KB write + 150 KB read = 300 KB.
    - 307,200 bytes / 4 bytes/cycle = 76,800 cycles ≈ 160 µs penalty purely for memory.
    - Plan B CPU execution: 200,000 MACs / 2 MACs/cycle = 100,000 cycles ≈ 208 µs.
    - Available overlap with next frame: 300 µs of NPU convolution work.
    - Hidden Dense time: min(208, 300) = 208 µs, so Dense is fully hidden only under this measured/estimated NPU timing.
    - If next-frame NPU work were only 120 µs, exposed Dense latency would be 208 - 120 = 88 µs.

    **Conclusion & Interpretation:**
    - **Result: Plan B if overlap is available.** The cascade removes 300 KB of shared-SRAM traffic and can hide the 208 µs M7 Dense layer when the following NPU convolution stage lasts at least 208 µs; otherwise the choice is still bandwidth-saving but not completely latency-hidden.
