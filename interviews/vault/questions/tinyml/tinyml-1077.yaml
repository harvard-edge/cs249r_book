title: Evaluating ESP32-S3 Vector Extensions for Audio ML
scenario: You are designing an always-on acoustic event detection system using the ESP32-S3 (240 MHz dual-core Xtensa, 512 KB SRAM, 8 MB PSRAM, WiFi/BLE).
question: What are the tradeoffs between FP32 on the standard CPU versus INT8 on vector extensions for the ESP32-S3?
details:
  realistic_solution: The optimal architecture utilizes the INT8 quantized model executed via the vector extensions. While this reduces programmability by requiring quantization-aware training or post-training quantization pipelines, the vector extensions provide massive compute efficiency gains over standard scalar execution. Additionally, the 4x reduction in weight size from INT8 allows more of the model to be pinned in the fast 512 KB SRAM, avoiding the high latency of fetching over the SPI interface to the 8 MB PSRAM.
  common_mistake: |
    **The Pitfall:** Assuming a smaller FP32 model is sufficient and easier to deploy.
    **The Rationale:** Candidates overlook the extreme latency penalty of scalar execution on an MCU.
    **The Consequence:** They select an architecture that bottlenecks on slow SPI transfers from PSRAM and fails latency requirements.
  napkin_math: |
    *   **Compute Time (FP32)**: 2 million MACs * 4 cycles / 240 MHz = 33.3 ms.
    *   **Compute Time (INT8)**: 2 million MACs / 8 MACs per cycle / 240 MHz = 1.04 ms.
    *   **Memory (FP32)**: 2M parameters * 4 bytes = 8 MB. Requires slow SPI transfers from PSRAM (~200 ms load time).
    *   **Conclusion**: **INT8 reduces memory to 2 MB and compute time from 33.3 ms to 1.04 ms, drastically improving efficiency.**
