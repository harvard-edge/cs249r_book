title: NAS Memory Constraint Analysis on nRF5340
scenario: A hardware-aware NAS targets an nRF5340 (256 KB SRAM, 1 MB flash). Firmware allocates 192 KB SRAM, leaving 64 KB for ML. The NAS evaluates an inverted bottleneck block (int8 input 32x32x16, expansion ratio 6, output 32x32x16). The total model weights are 200 KB, easily fitting in flash.
question: Why does the NAS reject the nRF5340 inverted bottleneck block despite its weights fitting in Flash?
details:
  realistic_solution: For an inverted bottleneck block, the intermediate expanded tensor must be fully materialized in SRAM. The inference engine must hold both the input tensor and the expanded intermediate tensor simultaneously during the first pointwise convolution. This peak memory spike exceeds the remaining 64 KB SRAM.
  common_mistake: |
    **The Pitfall:** Focusing solely on static weight size or computational FLOPs.
    **The Rationale:** Candidates forget that intermediate expanded tensors in inverted bottlenecks must be fully materialized in SRAM.
    **The Consequence:** They design an architecture that mathematically fits in storage but immediately OOMs during execution.
  napkin_math: |
    - Available ML SRAM: 256 KB - 192 KB = 64 KB.
    - Input tensor: 32 * 32 * 16 * 1 byte = 16 KB.
    - Expanded intermediate tensor: 32 * 32 * (16 * 6) * 1 byte = 96 KB.
    - Peak activation memory: 16 KB (Input) + 96 KB (Intermediate) = 112 KB.
    - **112 KB peak memory > 64 KB available SRAM, causing the NAS to reject it.**
