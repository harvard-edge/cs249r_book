title: 'Model Size Estimation: Master Full MCU Memory Budget for Industrial Sensor Node'
scenario: 'Perform a complete memory budget analysis for deploying a vibration anomaly detection model
  on Cortex-M7+Ethos-U55 (480MHz, 512KB SRAM, 1MB Flash). Model: 200K INT8 params. Other consumers: FreeRTOS
  (32KB SRAM, 20KB Flash), Ethernet driver (20KB SRAM), sensor driver (4KB SRAM, 2KB Flash), application
  logic (16KB SRAM, 50KB Flash). Verify complete system fits and compute inference duty cycle for 10Hz
  operation.'
details:
  realistic_solution: 'SRAM budget (512KB): FreeRTOS 32KB + Ethernet 20KB + Sensor 4KB + App logic 16KB
    = 72KB overhead. Remaining: 440KB. Model activation arena (200K param CNN, ~1× ratio): 200KB. TFLM
    runtime: 30KB. Stack (TFLM task): 8KB. Total SRAM: 72+200+30+8=310KB < 512KB ✓ (202KB spare). Flash
    budget (1MB): model weights 200KB + FreeRTOS 20KB + Ethernet driver 50KB + Sensor 2KB + App 50KB +
    TFLM kernels 20KB = 342KB < 1MB ✓. Duty: inference 200K/500G=0.4μs NPU + 0.5ms overhead = 0.5ms/100ms
    = 0.5%.'
  common_mistake: Analyzing model memory in isolation without summing all RTOS and peripheral driver memory,
    which collectively consume 72KB SRAM in this system.
  napkin_math: 'SRAM: 310KB used of 512KB. Flash: 342KB of 1MB. Inference: 0.5ms/100ms=0.5% duty. Power
    (NPU @ 100mW): 0.5ms×100mW/100ms=0.5mW avg. M7 idle @ 2mW. Total avg: 2.5mW. On 1000mAh LiPo at 3.3V:
    1000mAh/2.5mA=400h=16.7 days. If including Ethernet: 100mW when active. 1% Ethernet duty: 1mW avg.
    Total: 3.5mW → 286h=12 days.'
