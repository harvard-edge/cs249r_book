title: TinyML Double Buffer Parallelism
scenario: A Cortex-M7 samples audio into one buffer while an Ethos-U55 processes the previous buffer. Each 1-second audio window is 32 KB. DMA fill time is exactly 1 second, and NPU inference takes 120 ms. Estimate whether the producer and consumer can run without backlog.
question: Can DMA audio capture and Ethos-U55 inference stay in lockstep with 1-second windows and 120 ms inference time?
details:
  realistic_solution: Yes. The producer fills one buffer every 1,000 ms, while the consumer processes a full buffer in 120 ms. With double buffering, inference finishes long before the next buffer is ready, leaving 880 ms headroom.
  common_mistake: Running capture and inference sequentially and concluding the 120 ms inference delays sampling.
  napkin_math: Window period = 1,000 ms. Consumer time = 120 ms. Headroom = 880 ms.
