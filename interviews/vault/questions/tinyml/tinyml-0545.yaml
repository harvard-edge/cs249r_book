title: The Dual-Keyword Memory Overflow
scenario: You are a TinyML engineer developing a keyword-spotting feature for a smart device running on a Cortex-M4 with 256KB of SRAM. Your initial model uses a standard 3x3 2D convolution with 16 input channels and 32 output channels, fitting within the SRAM budget.
question: What architectural change should you make when doubling KWS output channels threatens the Cortex-M4 SRAM budget?
details:
  realistic_solution: The root cause is the quadratic scaling of parameters in a standard convolution with respect to its channel counts (`C_in * C_out`). Doubling the output channels doubled the parameter count of that layer, exceeding the SRAM budget for the tensor arena.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the memory bottleneck and applying complex post-training pruning.
    **The Rationale:** Engineers assume that capacity upgrades inherently require more hardware or heavy compression, missing simple architectural alternatives.
    **The Consequence:** The team wastes cycles on unstructured pruning or fails to meet the feature requirements on the existing hardware.
  napkin_math: |
    - **Original Params**: 3×3 × 16 × 32 = 4,608 bytes (4.5 KB).
    - **Original Activations**: 25×40 × 32 = 32 KB. Total Arena = ~36.5 KB.
    - **Doubled Channels (64 out)**: Params = 9 KB. Activations = 64 KB. Total = 73 KB.
    - **Scaling Reality**: Standard convolution parameters scale quadratically ($C_{in} \times C_{out}$). Depthwise separable breaks this into linear scaling, saving the SRAM budget.
  options:
  - The activation memory is the bottleneck. The input audio features must be downsampled to a lower resolution.
  - The Cortex-M4 is not powerful enough. The device requires a hardware upgrade to a Cortex-M7 with more SRAM.
  - Replace the standard convolution with a depthwise separable convolution to increase capacity while reducing parameter count.
  - Keep the larger standard convolution but apply 80% unstructured weight pruning to fit it into memory.
  correct_index: 2
