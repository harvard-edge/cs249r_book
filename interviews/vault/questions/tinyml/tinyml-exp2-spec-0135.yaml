title: Continuous KWS Power Specification on Corstone-300
scenario: You are tasked with designing the system specification for a continuous keyword spotting application
  targeting an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform. The system is powered by a small battery
  and has a strict average power cap of 1.5 mW. The Cortex-M7 can operate up to 480 MHz, and the Ethos-U55
  performs up to 512 MACs/cycle, both sharing a 512 KB SRAM. Break down the system interactions and specify
  a duty cycle, frequency scaling (DVFS P-states) strategy, and SRAM utilization plan that guarantees
  the power budget is not exceeded while meeting a 100 ms inference latency target.
details:
  realistic_solution: The optimal specification involves lowering the operating voltage and frequency
    (e.g., to 120 MHz) for both the Cortex-M7 and Ethos-U55 to find the optimal point where dynamic energy
    is minimized before static leakage dominates the extended active time. The model should be aggressively
    quantized to fit entirely within the 512 KB SRAM to avoid high-power external memory accesses. The
    system should duty-cycle by keeping the M7 in deep sleep, only waking the U55 to process buffered
    audio every 100 ms, completing the inference quickly and returning to sleep.
  common_mistake: Candidates often assume the highest clock frequency (480 MHz) will always result in
    the lowest energy per inference due to 'race-to-sleep', failing to account for the nonlinear increase
    in dynamic power (P ∝ V^2 * f). They might also forget that the M7 and U55 sharing SRAM means memory
    access contention can extend active time, increasing total energy consumption.
  napkin_math: Assume a KWS model requires 5M MACs. At max frequency (480 MHz), the U55 (assuming effective
    256 MAC/cycle) takes ~19,500 cycles, or 0.04 ms. If active power at 480 MHz is 80 mW, energy per inference
    is 3.2 uJ. Dropping the frequency to 120 MHz allows a lower voltage, reducing active power to ~10
    mW. The inference now takes 0.16 ms, dropping energy per inference to 1.6 uJ. At 10 inferences per
    second, average active power is 16 uW. Combined with a typical 100 uW sleep leakage, the total average
    power is 116 uW, easily meeting the 1.5 mW cap.
