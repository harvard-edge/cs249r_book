title: Design Graceful Degradation for Cortex-M4 Keyword Spotter
scenario: You are designing an always-on smart home audio node running on an ARM Cortex-M4 (STM32F4).
  Under normal conditions, the system runs a 12-command keyword spotter, but unpredictable BLE communication
  interrupts can suddenly reduce the available CPU processing time from 80 ms to just 15 ms per 100 ms
  audio window. Given the 168 MHz clock speed, 256 KB SRAM, and 1 MB flash without an FPU, design a fail-operational
  architecture that guarantees the primary 'wake' command is never missed during these CPU starvation
  events. Break down how the system detects the degradation trigger, manages the transition, and allocates
  memory across these states.
question: "How should a Cortex-M4 keyword spotter degrade gracefully when BLE interrupts reduce the available CPU window to 15 ms?"
details:
  realistic_solution: The optimal approach is an asymmetric degradation ladder where both a full model
    and a tiny 'wake-word only' fallback model permanently reside in the 1 MB flash. Because they never
    execute simultaneously, they can reuse the same SRAM tensor arena for activations, easily fitting
    within the 256 KB limit. An RTOS task monitor evaluates the remaining time budget before inference
    begins; if the budget is under the full model's threshold, it safely sheds the multi-keyword QoS and
    executes only the tiny fallback model to maintain fail-operational status.
  common_mistake: Candidates often suggest dynamically loading fallback model weights from flash to SRAM
    when the load spikes, failing to realize the latency of flash reads will blow the tight 15 ms deadline.
    Another common error is assuming they can easily apply early-exit to the main model without carefully
    managing the 256 KB SRAM constraints, leading to memory fragmentation or buffer overflows.
  napkin_math: The STM32F4 Cortex-M4 runs at 168 MHz and uses CMSIS-NN SIMD for 2x INT8 MACs/cycle, yielding
    a theoretical peak of 336 MMACs/sec. During a degraded 15 ms window, the absolute maximum compute
    budget is 0.015 sec * 336 MMACs/sec = 5.04 MMACs. The full 12-keyword model likely takes ~16.8 MMACs
    (50 ms). Therefore, the designed fallback model must be strictly constrained to under 5 MMACs of complexity
    to ensure execution completes within the 15 ms starvation window.
