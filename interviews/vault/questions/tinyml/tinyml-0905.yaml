title: 'TinyML TCO Fluency: Quick Cost Estimation for TinyML Deployment'
scenario: 'Without a calculator, estimate from memory: (1) annual power cost for 10,000
  Cortex-M4 sensors at 100μA average current, 3V battery, $0.10/kWh, (2) break-even
  inference volume per day where ESP32-S3 ($5, WiFi) beats cloud at $0.001/inference
  over 3 years, (3) battery life for 50mAh coin cell at 10μA average current.'
question: What are the quick estimates for sensor energy cost, ESP32-S3 cloud break-even
  volume, and coin-cell battery life?
details:
  realistic_solution: '(1) Power: 100μA = 0.1mA. Power = 0.1mA * 3V = 0.3mW. Annual
    per sensor: 0.3mW * 8760hr / 1000 = 2.628 Wh. Cost: 2.628 Wh * $0.10/kWh / 1000
    = $0.000263/yr. 10K sensors: $2.63/yr — essentially free. (2) ESP32-S3 TCO 3yr:
    $5 HW + $0.0000263*3yr=$5 (power negligible). Cloud: N*1095days*$0.001=$1.095N.
    Break-even: $5=$1.095N → N=4.57 inf/day ≈ 5 inf/day. Above 5/day: ESP32-S3 cheaper.
    (3) 50mAh / 10μA = 5000mAh/10μA = 5000/0.01mA = 500,000 hours = 57 years. Coin
    cells actually fail from chemical degradation before discharge (10yr shelf life).'
  common_mistake: Not knowing that annual energy cost = current_mA * voltage * 8760hr
    * rate_per_kWh / 1000, and making order-of-magnitude errors when converting between
    μA and mA.
  napkin_math: '(1) 0.1mA*3V*8760hr/1000=$0.000263/yr. 10K=$2.63/yr. (2) $5=$1.095N
    → N=4.57/day. (3) 50mAh/0.01mA=5000hr=208 days. Wait: 10μA=0.01mA. 50mAh/0.01mA=5000hr=208
    days. Not 57 years! Recalculate: 50mAh / (10μA = 0.010mA) = 5000 hours = 208 days
    ≈ 7 months. Shelf life limited. At 1μA: 50,000hr=5.7yr. Rule of thumb: every 10x
    reduction in current → 10x battery life. CR2032 (225mAh) at 1μA: 225,000hr=25.7yr
    → chemical degradation limits to ~10yr.'
