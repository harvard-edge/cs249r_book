title: 'TinyML TCO Fluency: Quick Cost Estimation for TinyML Deployment'
scenario: A fleet of 10,000 Cortex-M4 sensors operates at 100μA average current from a 3V battery. Energy costs $0.10/kWh. An ESP32-S3 costs $5 and replaces cloud inference costing $0.001/inference over 3 years. A coin cell battery provides 50mAh capacity.
question: What are the quick estimates for sensor energy cost, ESP32-S3 cloud break-even volume, and coin-cell battery life?
details:
  realistic_solution: '(1) Power: 100μA = 0.1mA. Power = 0.1mA * 3V = 0.3mW. Annual per sensor: 0.3mW * 8760hr / 1000 = 2.628 Wh. Cost: 2.628 Wh * $0.10/kWh / 1000 = $0.000263/yr. 10K sensors: $2.63/yr — essentially free. (2) ESP32-S3 TCO 3yr: $5 HW + $0.000263*3yr=$5 (power negligible). Cloud: N*1095days*$0.001=$1.095N. Break-even: $5=$1.095N → N=4.57 inf/day ≈ 5 inf/day. Above 5/day: ESP32-S3 cheaper. (3) 50mAh / 10μA = 50,000μAh / 10μA = 5,000 hours = 208 days.'
  common_mistake: |
    **The Pitfall:** Making order-of-magnitude errors when calculating power and converting units.
    **The Rationale:** Candidates forget that annual energy cost = current_mA * voltage * 8760hr * rate_per_kWh / 1000, or they confuse μA with mA.
    **The Consequence:** TCO and battery life estimations are completely inaccurate, leading to flawed deployment decisions.
  napkin_math: |
    - **Step 1:** Calculate sensor power: 100μA = 0.1mA. 0.1mA * 3V = 0.3mW.
    - **Step 2:** Calculate annual cost: 0.3mW * 8760hr / 1000 = 2.628 Wh. 2.628 Wh * $0.10/kWh / 1000 = $0.000263/yr per sensor. For 10K sensors: $2.63/yr.
    - **Step 3:** Calculate break-even: $5 = N * 1095 days * $0.001 -> N = 4.57 inferences/day.
    - **Step 4:** Calculate battery life: 50mAh / 10μA = 50,000μAh / 10μA = 5,000 hours. 5,000 / 24 = 208 days.
    - **Result:** **Annual cost is ~$2.63 for the fleet, break-even is ~5 inferences/day, and battery life is ~7 months.**
