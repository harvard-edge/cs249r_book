title: The Unsigned Integer Wrap
scenario: Your predictive maintenance system uses a Cortex-M0+ to monitor motor vibrations. It keeps a
  running tally of anomalies in a `uint16_t` counter and uploads the total to the cloud every week. After
  about 22 months, the cloud dashboard suddenly reports that the factory had exactly 65,500 *fewer* anomalies
  this week than last week. The factory hasn't changed. What broke?
details:
  realistic_solution: 'The uint16_t counter wraps at 65,535. At 100 anomalies/day, it reaches maximum
    in 655 days (~22 months), then wraps to 0. The cloud sees this week''s count (near 0) minus last week''s
    count (near 65,535) = a massive apparent drop. Fix: use uint32_t (wraps at 4.3 billion — 117,000 years
    at 100/day), or better, send per-interval delta counts instead of cumulative totals. Also implement
    server-side wrap detection: if count decreases by >50%, assume overflow and add 65,536. The root cause
    is using the smallest integer type on a device expected to run for years.'
  common_mistake: '"The ML model drifted and stopped detecting anomalies." Model drift happens slowly;
    an instant drop of 65,000 points to a data type failure.'
  napkin_math: A uint16_t holds a maximum value of 65,535. Assuming the machine experiences ~100 vibration
    anomalies per day, the lifetime running tally accumulates continuously. 65535 / 100 anomalies = 655
    days. At exactly ~1.8 years (21.5 months), the 16-bit integer physically overflows back to zero, corrupting
    the dashboard.
