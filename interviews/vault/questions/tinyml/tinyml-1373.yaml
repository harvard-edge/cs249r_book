title: Energy-Efficient TinyML Inference on ARM Cortex-M4 STM32F4
scenario: You are tasked with deploying a small convolutional neural network (CNN) for keyword spotting on an ARM Cortex-M4 STM32F4 microcontroller, clocked at 168 MHz with 256 KB SRAM and no FPU. The device is battery-powered, and the primary design constraint is to minimize energy consumption per inference while maintaining a low inference latency (e.g., <50ms).
question: How should you analyze STM32F4 energy per inference using CMOS power, DVFS concepts, fixed-point CNNs, and memory access costs?
details:
  realistic_solution: A realistic solution involves a multi-pronged approach. First, a thorough analysis using the CMOS power equation (P = C * V^2 * f) for the core and active peripherals is crucial, estimating the capacitance (C), supply voltage (V), and operating frequency (f). Since the STM32F4 lacks an FPU, fixed-point quantization of the CNN model is essential, which requires careful selection of bit-widths to balance accuracy and computational complexity. Aggressive clock gating and power gating (for unused peripherals) should be employed. Memory access patterns must be optimized to maximize data locality within the 256KB SRAM, minimizing external memory accesses. While true DVFS P-states are more common in higher-end processors, the concept of dynamic frequency scaling can be applied by selectively reducing the clock frequency (f) for less demanding inference phases, observing the relationship between power and frequency in dynamic power consumption. Finally, energy-per-inference calculations would compare different model sizes, quantization schemes, and execution frequencies to identify the most energy-efficient configuration.
  common_mistake: |
    **The Pitfall:** Focusing solely on reducing MAC operations without considering data movement energy.
    **The Rationale:** Candidates often treat compute as the only power draw, neglecting the energy cost of moving data between memory and the CPU on constrained devices.
    **The Consequence:** The resulting architecture will suffer from poor actual energy efficiency due to excessive memory access overhead and suboptimal clock frequency choices.
  napkin_math: |
    1. **Dynamic Power:** P_dynamic ≈ C_effective * V_core^2 * f_core. With f_core = 168 MHz and V_core = 1.2V, P_dynamic can be estimated.
    2. **Energy per Inference:** E_inference = (P_dynamic * T_inference) + (P_static * T_total).
    3. **Frequency Impact:** Comparing 84MHz vs 168MHz shows the impact of frequency scaling on dynamic power.
    4. **CNN Energy:** Estimate MAC operations (N_MAC) and energy per MAC (E_MAC) for a base E_MAC * N_MAC.
    5. **Total Energy:** Add energy for memory accesses and data movement to the base MAC energy.
