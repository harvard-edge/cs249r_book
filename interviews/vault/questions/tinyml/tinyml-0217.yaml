title: The Microcontroller's Ceiling
scenario: You are optimizing a small keyword-spotting model on a Cortex-M4 microcontroller. Given its
  hardware specifications, what is the primary performance bottleneck you would typically expect to encounter
  according to the Roofline Model?
question: "Given its hardware specifications, what is the primary performance bottleneck you would typically expect to encounter according to the Roofline Model?"
details:
  realistic_solution: The primary performance bottleneck on an MCU like the Cortex-M4 is almost always
    compute, not memory bandwidth. Microcontrollers have very low ridge points (compute capacity is extremely
    low compared to on-chip SRAM bandwidth). Because the ridge point is so low, even simple models with
    low arithmetic intensity easily exceed it, placing them in the compute-bound region of the Roofline
    model. Therefore, the system's performance is limited by the slow processor (MAC operations), not
    by how fast it can feed the processor from SRAM.
  common_mistake: Engineers accustomed to datacenter GPUs often incorrectly assume that memory bandwidth
    is the primary bottleneck for all AI workloads. They fail to recognize that microcontrollers have
    vastly different balances of compute vs. memory bandwidth. On an MCU, SRAM is relatively fast, but
    the ALU is very slow (often lacking parallel MAC arrays), making inference compute-bound.
  napkin_math: The 'ridge point' of a roofline model tells you how much arithmetic intensity is needed
    to become compute-bound. With very slow compute and relatively fast on-chip SRAM, an MCU's ridge point
    is extremely low, meaning almost any ML model will exceed it and hit the compute roof.
  options:
  - Compute-bound, as the MCU's MAC throughput is the main constraint.
  - Memory-bound, as the data movement from SRAM to the CPU is the main constraint.
  - Power-bound, as the MCU cannot draw enough power to run at its peak frequency.
  - Flash-bound, as reading the model weights from flash storage is the bottleneck.
