title: The Microcontroller's Ceiling
scenario: You are optimizing a small keyword-spotting model on a Cortex-M4 microcontroller.
question: Given its hardware specifications, what is the primary performance bottleneck you would typically expect to encounter according to the Roofline Model?
details:
  realistic_solution: The primary performance bottleneck on an MCU like the Cortex-M4 is almost always compute, not memory bandwidth. Microcontrollers have very low ridge points (compute capacity is extremely low compared to on-chip SRAM bandwidth). Because the ridge point is so low, even simple models with low arithmetic intensity easily exceed it, placing them in the compute-bound region of the Roofline model. Therefore, the system's performance is limited by the slow processor (MAC operations), not by how fast it can feed the processor from SRAM.
  common_mistake: |
    **The Pitfall:** Assuming memory bandwidth is the primary bottleneck for all AI workloads.
    **The Rationale:** Engineers accustomed to datacenter GPUs assume data movement is always the bottleneck, ignoring the vastly different balance of compute vs. memory on an MCU.
    **The Consequence:** Time is wasted attempting to optimize SRAM read/write patterns when the ALU simply cannot perform MAC operations fast enough.
  napkin_math: |
    1. Observation: Microcontrollers have relatively fast on-chip SRAM but very slow compute (lacking massive parallel MAC arrays).
    2. Roofline Ridge Point: Compute Peak / Memory Bandwidth. A low peak and high bandwidth mean the ridge point is extremely low.
    3. Result: Almost any ML model's arithmetic intensity will exceed the ridge point, placing it firmly in the **compute-bound** region.
  options:
  - Compute-bound, as the MCU's MAC throughput is the main constraint.
  - Memory-bound, as the data movement from SRAM to the CPU is the main constraint.
  - Power-bound, as the MCU cannot draw enough power to run at its peak frequency.
  - Flash-bound, as reading the model weights from flash storage is the bottleneck.
