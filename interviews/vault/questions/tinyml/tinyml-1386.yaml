title: TinyML Model Feasibility on Nordic nRF5340 for Gesture Recognition
scenario: You are developing a real-time gesture recognition system on a Nordic nRF5340 microcontroller (128 MHz, 256 KB SRAM, 1 MB flash). You must select between Model A (Float32 FCNN, 128-64-32, ~15k params) and Model B (INT8 Conv1D, ~50k params).
question: "Based on the nRF5340's specifications, which model is more feasible to deploy given real-time memory and compute constraints?"
details:
  realistic_solution: A realistic approach involves a detailed calculation of memory usage for weights, biases, and activations/intermediate buffers. Computational complexity must be compared against the target MIPS/MHz, considering the efficiency of integer vs. float operations.
  common_mistake: |
    **The Pitfall:** Focusing solely on the parameter count and flash fit.
    **The Rationale:** Candidates neglect the crucial peak activation memory in SRAM and the massive performance penalty of Float32 on an MCU without an FPU.
    **The Consequence:** They wrongly choose Model A because it has fewer parameters, despite it destroying the SRAM and real-time latency budget.
  napkin_math: |
    1. Calculate Model A Flash (Float32): 15,000 params * 4 bytes = 60,000 bytes (~58.6 KB).
    2. Estimate Model A SRAM (Float32): 128 neurons * 4 bytes = 512 bytes peak minimum.
    3. Calculate Model B Flash (INT8): 50,000 params * 1 byte = 50,000 bytes (~48.8 KB).
    4. Estimate Model B SRAM (INT8): 128 neurons * 1 byte = 128 bytes peak minimum.
    5. Compare Flash: Model B (48.8 KB) < Model A (58.6 KB).
    6. **Final Result: Model B uses less Flash, less SRAM, and executes much faster via INT8 SIMD, making it vastly superior.**
