title: 'Latency Decomposition: Compute Per-Layer Latency Budget for MCU CNN'
scenario: 'A 4-layer depthwise-separable CNN for anomaly detection (total 2.1 MOPs, INT8) runs on Cortex-M4
  at 168MHz. Layer breakdown: Conv1 (0.8M ops), DW-Conv2 (0.3M ops), PW-Conv3 (0.9M ops), FC4 (0.1M ops).
  Compute per-layer latency and identify the bottleneck layer. Assume 1 MAC/cycle with DSP extensions.'
details:
  realistic_solution: 'At 1 MAC/cycle, 168MHz: Conv1: 0.8M/168M = 4.8ms. DW-Conv2: 0.3M/168M = 1.8ms (but
    poor data reuse, cache misses add ~50%: 2.7ms). PW-Conv3: 0.9M/168M = 5.4ms (regular pattern, good
    reuse). FC4: 0.1M/168M = 0.6ms. Total: 14.5ms. Bottleneck: PW-Conv3 by compute, DW-Conv2 by efficiency.'
  common_mistake: Treating all layers equally; depthwise conv has poor data reuse and may be memory-bandwidth-limited
    even on MCUs with small SRAM.
  napkin_math: '168 MOPS (M4 DSP). Conv1: 0.8M/168M = 4.76ms. DW-Conv2: 0.3M/168M = 1.79ms × 1.5 (cache
    penalty) = 2.68ms. PW-Conv3: 0.9M/168M = 5.36ms. FC4: 0.1M/168M = 0.60ms. Total: 13.4ms. At 50ms inference
    budget: 36.6ms slack for sensor reading + post-processing.'
