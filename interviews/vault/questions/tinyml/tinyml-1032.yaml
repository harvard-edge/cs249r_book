title: Audio Streaming DMA vs Interrupts on nRF5340
scenario: You are designing an always-on acoustic anomaly detector using the Nordic nRF5340 (128 MHz app core, 256 KB SRAM, ~5mA active). The microphone captures 16-bit audio at 16 kHz, and the ML model requires a 1-second window for inference. You are evaluating two ingestion designs. Design A uses an ADC interrupt to wake the app core every 256 samples (16 ms) to copy data into a rolling SRAM buffer. Design B uses the peripheral's EasyDMA to continuously stream data into a 32 KB ping-pong buffer in SRAM without CPU intervention, waking the app core only once per second.
question: Should an nRF5340 audio detector use 16 ms ADC interrupts or EasyDMA into a 32 KB ping-pong buffer, and why?
details:
  realistic_solution: Design B is the superior choice for an always-on system despite the memory cost. Waking the 128 MHz app core every 16 ms in Design A destroys sleep efficiency due to context switching overhead and the core's ~5mA active draw. To mitigate Design B's memory usage, the system can use a smaller DMA block size (e.g., 250ms) to trigger feature extraction in smaller chunks, accumulating MFCCs over time rather than buffering raw audio.
  common_mistake: |
    **The Pitfall:** Choosing DMA without calculating SRAM cost.
    **The Rationale:** Candidates intuitively know DMA saves power, but fail to analyze the memory impact of ping-pong buffering a full 1-second window.
    **The Consequence:** They might allocate 64 KB of SRAM for the buffer, severely constraining the remaining 192 KB for the ML model, RTOS, and BLE stack.
  napkin_math: |
    - Calculate raw audio throughput: 16,000 samples/sec * 2 bytes/sample = 32 KB/sec.
    - Evaluate Design B memory: A 1-second ping-pong buffer requires 32 KB * 2 = 64 KB SRAM (25% of total 256 KB).
    - Evaluate Design A power penalty: 1000 ms / 16 ms = 62.5 wakeups per second.
    - If wake/sleep transitions and ISR handling take 200 cycles each: 62.5 * 200 = 12,500 wasted cycles per second.
    - **Conclusion:** Design A vastly reduces battery life by repeatedly drawing ~5mA active current. Design B is needed, but should be optimized with smaller DMA chunks to save SRAM.
