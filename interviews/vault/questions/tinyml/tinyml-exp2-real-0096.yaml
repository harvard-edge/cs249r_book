title: Optimizing SIMD Utilization and Memory Stalls on Cortex-M4
scenario: You have deployed a keyword spotting CNN on an ARM Cortex-M4 (STM32F4) microcontroller running
  at 168 MHz with 256 KB SRAM and 1 MB flash. The system requires a strict 20ms inference latency, but
  your initial profiling shows it takes 50ms. A trace reveals that during the heaviest convolution layers,
  the CPU is only performing useful MAC operations 30% of the time, despite using the CMSIS-NN library
  which supports 2x INT8 MACs per cycle. How do you diagnose the root cause of this poor utilization,
  and what architectural or memory-level changes do you make to hit your 20ms target?
details:
  realistic_solution: The candidate should identify that 30% utilization implies a memory bandwidth or
    pipeline stall bottleneck, not a compute deficit. They should propose using hardware trace tools (e.g.,
    ITM/ETM) to look at memory wait states and data alignment. The solution involves ensuring tensors
    are in HWC layout to leverage spatial locality, aligning data to 32-bit boundaries to utilize the
    dual-MAC `__SMLAD` instructions, and potentially pinning frequently accessed weights from the 1 MB
    flash into the faster 256 KB SRAM to eliminate flash wait states.
  common_mistake: Candidates often immediately suggest model compression (pruning or quantization) without
    analyzing the hardware execution trace. They frequently overlook memory access patterns, layout requirements
    for CMSIS-NN (like HWC vs CHW), and the impact of flash memory wait states on instruction and data
    fetch.
  napkin_math: The Cortex-M4 runs at 168 MHz. With SIMD (2 INT8 MACs/cycle), theoretical peak compute
    is 168M * 2 = 336 MMACs/sec. For a 20ms budget, the absolute maximum theoretical compute is 0.02s
    * 336 MMACs/sec = 6.72 MMACs. Assume the model requires 4 MMACs. At 100% efficiency, this takes 4M
    / 336M = 11.9ms. At the profiled 30% efficiency, it takes 11.9ms / 0.3 = ~39.6ms (plus layer overhead,
    reaching the 50ms total). By fixing data alignment and moving critical weights to SRAM to achieve
    70% efficiency, the core compute drops to 11.9ms / 0.7 = 17ms, allowing the system to comfortably
    meet the 20ms real-time deadline.
