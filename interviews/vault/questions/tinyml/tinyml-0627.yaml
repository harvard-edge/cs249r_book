title: The Night-Rain Quantization Failure
scenario: 'Your team has developed a CNN-based emergency braking system for a new vehicle, deployed on
  a Cortex-M7 microcontroller with 512KB of SRAM. To meet the strict memory constraints, the original
  FP32 model was quantized to INT8. The system performs flawlessly on thousands of hours of clear-weather
  test data. However, during fleet deployment, you receive reports of critical failures: the system fails
  to detect obstacles at night in heavy rain. You analyze the telemetry and find that the activations
  of the first convolutional layer are frequently saturating (clipping to the min/max INT8 values) during
  these specific adverse weather events. A junior engineer proposes re-running the quantization calibration
  process using a dataset that includes the rainy night scenarios to capture the wider signal range. Evaluate
  this proposal. Why might it be a dangerous trap, and what more robust system-level solution should you
  justify to your team?'
question: "Why might it be a dangerous trap, and what more robust system-level solution should you justify to your team?"
details:
  realistic_solution: The proposal to simply re-calibrate is a dangerous trap because it ignores the fundamental
    trade-off between dynamic range and precision. The rain introduces high-magnitude outliers. Expanding
    the quantization range to cover `[-10, 10]` instead of the original `[-1, 1]` means the 256 available
    INT8 steps are spread much thinner. This drastically reduces precision for the 99% of cases in the
    nominal `[-1, 1]` range, potentially degrading performance in clear weather, trading one failure mode
    for another. The truly robust solution is a mixed-precision architecture. You must evaluate the trade-offs
    and justify keeping the first one or two layers of the network in FP16. These layers are closest to
    the raw sensor physics and need the higher dynamic range and precision to handle environmental noise
    without information loss. Once the signal is transformed into a more stable feature space by these
    initial layers, the rest of the network can safely and efficiently operate in INT8. This surgically
    applies the higher memory/compute cost of FP16 only where it's critical, preserving overall system
    efficiency while ensuring robustness against environmental shifts.
  common_mistake: The junior engineer's proposal is the correct and complete solution. Re-calibrating
    with a more representative dataset will expand the quantization range to include the high-magnitude
    signals from rain, preventing saturation. This is the standard industry practice for fixing quantization
    overflow.
  napkin_math: 'First layer 40x40x8=12.8K values. INT8: 12.8KB. Clean range [-1,1]: scale=0.0078. Rain
    spikes [-10,10]: re-calibrate scale=0.078, 10x precision loss for clear weather. Mixed-precision:
    FP16 for first 2 layers=25.6KB vs INT8 12.8KB. Extra 12.8KB from 512KB=2.5% overhead. FP16 range ±65504
    — no clipping. Rest stays INT8.'
