title: 'TinyML TCO Evaluation: Cortex-M4 vs ESP32-S3 for Production Deployment'
scenario: Evaluate Cortex-M4 (168MHz, 256KB SRAM, $2 chip, 30mA active, 30μA sleep) vs ESP32-S3 (168MHz,
  512KB SRAM, 8MB PSRAM, WiFi, $4 chip, 240mA WiFi, 20μA deep sleep) for a warehouse RFID tag reader running
  ML-based signal processing (100ms inference every 5 minutes, 24/7, battery-powered from 2000mAh LiPo).
  Calculate 2-year battery replacement TCO for 500 units.
question: "How would you calculate 2-year battery replacement TCO for 500 units?"
details:
  realistic_solution: ESP32-S3 battery life is 2.31 years > 2-year evaluation period, so 0 battery replacements
    needed within 2 years. Both M4 and ESP32-S3 require 0 battery replacements in this period. M4 wins
    on hardware cost ($1K vs $2K) with significantly longer battery life.
  common_mistake: Choosing ESP32-S3 for its larger SRAM without checking if the model fits on M4 (256KB),
    and not calculating that the WiFi activation during inference could drain the battery 10x faster than
    the M4.
  napkin_math: 'M4: avg 0.040mA. Life: 2000/0.040=50,000hr=5.71yr. 2yr: 0 replacements. ESP32-S3 (WiFi
    active during sync only): avg ~0.099mA. Life: 20,202hr=2.31yr. 2yr: 0 replacements (2.31yr > 2yr).
    Cost: $0 battery replacement for both in 2yr. HW: M4 500*$2=$1K, ESP32 500*$4=$2K. Total M4: $1K.
    Total ESP32: $2K. M4 still wins on hardware cost, and has 2.71yr more battery life. Lesson: WiFi power
    consumption (even momentary) dramatically reduces battery life for duty-cycled applications.'
