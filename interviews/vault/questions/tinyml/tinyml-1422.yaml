title: CNN Operator Scheduling on ARM Cortex-M4 with Limited SRAM
scenario: >
  You are tasked with deploying a pre-trained CNN model onto an ARM Cortex-M4 microcontroller running at 168 MHz, with 256 KB of SRAM and no FPU, meaning all computations use fixed-point arithmetic. You must optimize the execution order of operators to minimize peak memory consumption while maximizing inference speed.
question: How should an FPU-less Cortex-M4 schedule CNN operators with memory reuse, fixed-point arithmetic, and fusion under 256 KB SRAM?
details:
  realistic_solution: >
    Deploy a memory-aware scheduling strategy prioritizing in-place operations and operator fusion (e.g., Conv+BiasAdd+ReLU) to eliminate intermediate tensor allocations. Because the system lacks an FPU, rely strictly on fixed-point arithmetic, utilizing CMSIS-NN intrinsics for optimal cycle counts. To prevent memory exhaustion, implement spatial tiling (strip-mining) to manage large activation layers, and a bump allocator that vigorously reuses intermediate buffers throughout the topologically sorted execution graph.
  common_mistake: |
    **The Pitfall:** Scheduling operations sequentially without considering the intermediate activation memory footprint.
    **The Rationale:** Engineers used to deploying on CPUs with gigabytes of RAM assume memory allocation is "free" and focus solely on compute speed.
    **The Consequence:** The model exceeds the 256 KB SRAM limit during intermediate tensor generation, causing an immediate runtime Out-Of-Memory failure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total SRAM: 256 KB. Clock: 168 MHz. No FPU.
       - Example Activation: 64x64x32.
    2. **Calculations:**
       - Memory Footprint (16-bit Fixed-Point): 64 * 64 * 32 * 2 bytes = 262,144 bytes (256 KB).
       - MACs for 3x3 Conv: 64 * 64 * 32 * 32 * 9 = 37,748,736 MACs.
       - Cycles: ~3 cycles/MAC = ~113 million cycles.
       - Throughput: 113,000,000 / 168,000,000 Hz = 0.67 seconds per layer.
    3. **Conclusion & Interpretation:**
       - **Result: A single layer exhausts the 256 KB SRAM.** Memory reuse (in-place ops) and tiling are mandatory to prevent intermediate buffers from crashing the system. **Bottleneck: SRAM Capacity.**
