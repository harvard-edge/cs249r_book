title: CNN Operator Scheduling on ARM Cortex-M4 with Limited SRAM
scenario: You are tasked with deploying a pre-trained CNN model onto an ARM Cortex-M4 STM32F4 microcontroller. The chip runs at 168 MHz, has 256 KB of SRAM, and lacks a Floating-Point Unit (FPU), meaning all computations must use fixed-point arithmetic. You must optimize the execution order of operators to minimize peak memory consumption while maximizing inference speed.
question: How should an FPU-less Cortex-M4 schedule CNN operators with memory reuse, fixed-point arithmetic, and fusion under 256 KB SRAM?
details:
  realistic_solution: 'A realistic solution would involve:

    1.  **Memory-Aware Scheduling**: Employ a topological sort of the computation graph, but prioritize scheduling operations that allow for immediate memory reuse of their inputs/outputs. Techniques like in-place operations (e.g., ReLU on activation maps) and tiling/strip-mining for larger layers can help manage intermediate buffer sizes.

    2.  **Layer Fusion**: Fuse eligible operations like Convolution and ReLU into a single kernel to reduce memory transfers and kernel launch overhead. Depending on the framework/toolchain, other fusions (e.g., Conv+BiasAdd+ReLU) might be possible.

    3.  **Fixed-Point Optimization**: Ensure all operations are implemented efficiently using fixed-point arithmetic, leveraging any available DSP instructions (e.g., SIMD for `__SSAT` or `__SMLAD` if applicable) that the Cortex-M4 might offer, even without a full FPU.

    4.  **Buffer Management**: Implement a sophisticated static memory allocator or a simple bump allocator to manage intermediate buffers, actively reusing memory regions as soon as data is no longer needed.

    5.  **Data Parallelism (Micro-Level)**: While the Cortex-M4 is a single core, techniques like loop unrolling or explicit SIMD intrinsics (if the compiler supports them for fixed-point operations) can provide a form of data parallelism within a single kernel.'
  common_mistake: |
    **The Pitfall:** Scheduling operations purely sequentially without considering the intermediate activation memory footprint.
    **The Rationale:** Engineers used to deploying on CPUs with gigabytes of RAM assume memory allocation is "free" and focus solely on compute speed.
    **The Consequence:** The model exceeds the 256 KB SRAM limit during intermediate tensor generation, causing an immediate runtime Out-Of-Memory failure.
  napkin_math: |
    - **Memory Footprint (16-bit Fixed-Point):** A 64x64x32 activation map requires 64 * 64 * 32 * 2 bytes = 262,144 bytes (256 KB), immediately exhausting the SRAM on its own.
    - **MACs for 3x3 Conv:** 64 * 64 (spatial) * 32 (in) * 32 (out) * 3*3 = 37,748,736 MACs.
    - **Cycles (No FPU):** 2-4 cycles per 16-bit MAC. ~113 million cycles.
    - **Throughput:** 113M cycles / 168 MHz = ~0.67 seconds per layer.
    - **Conclusion:** **Memory reuse (in-place ops) and tiling are mandatory to prevent the 256 KB intermediate buffers from crashing the system.**
