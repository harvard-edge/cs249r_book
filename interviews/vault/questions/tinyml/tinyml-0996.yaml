title: Profiling CPU-NPU Memory Contention on Corstone-300
scenario: >
  A vision model running on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform experiences intermittent high latency spikes.
  The system relies on a tightly constrained 512 KB of shared SRAM, suggesting memory bus contention between M7 data cache misses and the Ethos-U55's DMA engine.
question: How would you architect a non-intrusive trace and profiling strategy to definitively isolate whether the bottleneck is compute-bound on the NPU or memory-bound due to SRAM contention?
details:
  realistic_solution: |
    Architect a hardware-assisted profiling pipeline using the ARM CoreSight ETM for the M7 and the Ethos-U55's dedicated Performance Monitor Units (PMUs). Configure the NPU's PMU to count active MAC cycles versus AXI bus stall cycles, and use the M7's Data Watchpoint and Trace (DWT) to monitor CPU memory stall cycles. Correlating these hardware counters allows the team to pinpoint the exact inference layers where the shared SRAM bandwidth is saturated, driving decisions on memory layout optimization.
  common_mistake: |
    **The Pitfall:** Suggesting software-level instrumentation like toggling GPIOs or injecting RTOS timestamps.
    **The Rationale:** Candidates fail to realize that software instrumentation introduces a massive observer effect and cannot measure bus arbitration.
    **The Consequence:** The profiling overhead distorts the real-time behavior, obscuring the cycle-level AXI bus matrix stalls.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU: 256 MAC/cycle at 480 MHz.
       - Target layer: 2,000,000 MACs.
    2. **Calculations:**
       - Peak NPU throughput: 480 MHz * 256 = 122.8 GMAC/s.
       - Ideal compute cycles: 2,000,000 / 256 = 7,812 cycles (~16.2 μs).
       - Measured via PMU: 15,000 total cycles, 7,000 AXI bus stall cycles.
       - Contention percentage: 7,000 / 15,000 = ~46%.
    3. **Conclusion & Interpretation:** Almost half the latency is AXI stall. **Result: Memory-Bound (SRAM Contention)**.
