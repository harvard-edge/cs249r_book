title: Architecting a Vision Pipeline on Corstone-300
scenario: You are designing a real-time object detection pipeline for a smart doorbell using the ARM Cortex-M7
  + Ethos-U55 (Corstone-300) platform. The system features 512 KB of shared SRAM, with the Cortex-M7 running
  at 480 MHz and the Ethos-U55 configured for 256 MACs/cycle. Your model heavily relies on depthwise separable
  convolutions and requires complex post-processing. You must architect a workload partitioning and memory
  management strategy between the M7 and the U55 to maximize utilization, considering the NPU's position
  on the roofline model given the shared SRAM constraints.
details:
  realistic_solution: A robust design fuses depthwise and pointwise convolutions to increase overall arithmetic
    intensity, shifting the workload closer to the roofline ridge point. The architecture should strictly
    partition the 512 KB SRAM, using double-buffering via DMA so the M7 can perform non-maximum suppression
    (NMS) on output tensors while the Ethos-U55 computes the next inference without memory stalling.
  common_mistake: Candidates often suggest offloading the entire network to the Ethos-U55 without calculating
    its arithmetic intensity, failing to realize that depthwise layers will push the U55 deep into the
    memory-bound region of the roofline. They also frequently overlook the memory contention caused by
    the M7 and U55 sharing the 512 KB SRAM.
  napkin_math: Ethos-U55 Peak Compute = 256 MACs/cycle * 2 OPS/MAC * 480 MHz = 245.7 GOPS. Assuming SRAM
    provides 32 bits (4 bytes) per cycle, max bandwidth = 4 bytes * 480 MHz = 1.92 GB/s. The roofline
    ridge point arithmetic intensity = 245.7 GOPS / 1.92 GB/s = ~128 OPS/byte. A standard depthwise convolution
    has an arithmetic intensity of ~1-2 OPS/byte, meaning it is heavily memory-bound and will achieve
    at most (1.92 GB/s * 2 OPS/byte) = 3.84 GOPS, which is less than 2% of peak compute unless fused.
