title: Depthwise and Pointwise Convolution Scheduling for SRAM Optimization
scenario: 'You are deploying a MobileNet-style keyword spotting model on an ARM Cortex-M4 (STM32F4) microcontroller.
  The device has strict constraints: 168 MHz CPU, 1 MB flash, no FPU, and only 256 KB SRAM. During profiling,
  you notice that executing a Depthwise convolution sequentially followed by a Pointwise convolution causes
  an out-of-memory (OOM) error, as materializing the full intermediate activation tensor exceeds the available
  SRAM when combined with input and output buffers. How do you diagnose this bottleneck and quantify the
  memory savings of an optimized scheduling approach?'
question: "How do you diagnose this bottleneck and quantify the memory savings of an optimized scheduling approach?"
details:
  realistic_solution: The correct approach is to implement depth-first scheduling (tiling or fusion) for
    the DW and PW layers. Instead of computing the entire DW output before starting the PW layer, you
    compute a small spatial tile of the DW layer and immediately process it with the PW layer. This eliminates
    the need to store the full intermediate tensor, reducing peak memory usage while still leveraging
    CMSIS-NN SIMD (2x INT8 MACs/cycle) instructions for the tiled operations.
  common_mistake: Candidates often immediately suggest quantizing weights to sub-byte formats or pruning,
    missing that the bottleneck is activation memory, not parameter size. They may also suggest generic
    'layer fusion' without analyzing how the execution order must change to avoid materializing the full
    intermediate tensor in SRAM.
  napkin_math: Assume an intermediate tensor of 32x32 spatial resolution with 64 channels (INT8). Naive
    layer-by-layer scheduling requires 32 * 32 * 64 * 1 byte = 65,536 bytes (64 KB) of SRAM just for the
    intermediate buffer. With depth-first scheduling using an 8x8 spatial tile, the intermediate buffer
    size becomes 8 * 8 * 64 * 1 byte = 4,096 bytes (4 KB). This execution order optimization saves 64
    KB - 4 KB = 60 KB of SRAM, which is roughly 23% of the entire 256 KB SRAM budget, effectively resolving
    the memory bottleneck.
