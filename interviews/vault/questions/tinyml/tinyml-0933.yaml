title: Evaluate Pruning Strategies for Transformer Attention on ESP32-S3
scenario: 'A 4-head transformer for anomaly detection on ESP32-S3 is 40% over the 100ms latency budget at 140ms. Three pruning strategies are proposed: (A) structured head pruning — remove 2 of 4 attention heads, saving 50% attention FLOPs; (B) weight magnitude pruning — remove 40% of smallest weights across all layers, saving 40% FLOPs with sparse execution; (C) layer pruning — remove 1 of 4 transformer layers, saving 25% FLOPs.'
question: Which ESP32-S3 pruning mix gets a 140 ms transformer under 100 ms with the least accuracy loss?
details:
  realistic_solution: 'A) Head pruning: structured, 50% attention FLOPs. Attention = 30% of latency → saves 0.5×0.3×140 = 21ms. New latency: 119ms — still over budget. B) Weight pruning: 40% FLOPs but no HW sparse support → actual speedup ~5-10% (overhead from mask checks). New latency: ~130ms. C) Layer pruning: removes 25% of all layers → 25% latency reduction → 0.75×140=105ms — still over budget. Combine A+C: head prune + layer prune → 0.85×0.75×140 = 89ms < 100ms target. Accuracy loss: ~4-7% combined.'
  common_mistake: |
    **The Pitfall:** Choosing weight magnitude pruning assuming 40% FLOPs = 40% latency reduction.
    **The Rationale:** Candidates forget that the ESP32-S3 lacks sparse tensor acceleration.
    **The Consequence:** Unstructured pruning requires explicit sparsity handling, offering minimal speedup (~5-10%).
  napkin_math: |
    - Identify latency split: Attention is ~30% of latency, non-attention is ~70%.
    - Head pruning (A): Reduces latency by 0.5 * 0.3 * 140 = 21 ms. New latency = 119 ms.
    - Layer pruning (C): Reduces latency by 25%. New latency = 0.75 * 140 = 105 ms.
    - **Combining A+C: 140 * 0.85 * 0.75 = 89 ms. This achieves the <100 ms target with minimal (~4-7%) accuracy loss.**
