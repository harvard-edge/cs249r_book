title: Wake-Word Event Queue Stability Limit
scenario: 'A Cortex-M4 (80 MHz) processes audio wake-word events triggered by an interrupt. Events arrive following a Poisson process. The inference takes 60ms to process a single event.'
question: 'Specify the maximum arrival rate this wake-word system can handle before the event queue diverges to infinity, and calculate the queue utilization if events arrive at 10 per second.'
details:
  realistic_solution: 'The service rate is 1 / 0.06s = 16.66 events per second, which acts as the maximum stable arrival rate. If events arrive at 10 per second, the traffic intensity (utilization) is ρ = λ / μ = 10 / 16.66 = 0.6, or 60%. Because ρ < 1, the queue is stable.'
  common_mistake: |
    **The Pitfall:** Incorrectly assuming queue stability relies only on average latency.
    **The Rationale:** Failing to convert the processing time into a frequency to find the service rate.
    **The Consequence:** The system is deployed with an arrival rate that exceeds the service rate, leading to unbounded queue growth and memory exhaustion.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inference processing time: 60ms.
    - Arrival rate (λ): 10 events/second.

    **Calculations:**
    - Service rate (μ): 1 / 0.06s = 16.66 events/second.
    - Maximum stable arrival rate: < 16.66 events/second.
    - Utilization (ρ): λ / μ = 10 / 16.66 = 0.6.

    **Conclusion & Interpretation:**
    - **Result: 60% utilization ([Compute-Bound])**. Because ρ (60%) < 1, the queue is stable.
