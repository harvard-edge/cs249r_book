title: Wake-Word Event Queue Stability Limit
scenario: A Cortex-M4 (80 MHz) processes audio wake-word events triggered by an interrupt.
  Events arrive following a Poisson process. The inference takes 60ms to process a
  single event.
question: Specify the maximum arrival rate this wake-word system can handle before
  the event queue diverges to infinity, and calculate the queue utilization if events
  arrive at 10 per second.
details:
  realistic_solution: The service rate is 1 / 0.06s = 16.66 events per second, which
    acts as the maximum stable arrival rate. If events arrive at 10 per second, the
    traffic intensity (utilization) is ρ = λ / μ = 10 / 16.66 = 0.6, or 60%. Because
    ρ < 1, the queue is stable.
  common_mistake: Failing to convert the 60ms processing time into a service rate
    frequency, or incorrectly assuming queue size relies only on average latency.
  napkin_math: 1 / 0.06 = 16.66 requests/sec, 10 * 0.06 = 0.6 utilization
