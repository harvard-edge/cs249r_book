title: The Thermal Duty Cycle
scenario: You're designing a wildlife camera that uses a Cortex-M4 based chip for animal detection. Your thermal tests show the enclosure can only dissipate 15 mW of average power before the chip overheats and throttles. The chip consumes 50 mW when running inference and a negligible amount in sleep mode.
question: "To prevent overheating, what is the maximum duty cycle (the percentage of time the chip can be active) you can sustain?"
details:
  realistic_solution: The solution is to calculate the ratio of the power budget to the active power consumption. Since the sleep power is negligible, the average power is simply the active power multiplied by the duty cycle. To stay within the 15 mW budget, the duty cycle must be limited.
  common_mistake: |
    **The Pitfall:** Inverting the power ratio or incorrectly subtracting the values.
    **The Rationale:** Engineers fail to connect that average power is directly controlled by the duty cycle.
    **The Consequence:** The duty cycle is miscalculated, leading to inevitable thermal throttling in the field.
  napkin_math: |
    - Duty cycle = P_budget / P_active.
    - Calculate ratio: 15 mW / 50 mW = 0.30 (30%).
    - Calculate max active time: 0.30 * 1s = 300 ms per second.
    - **A 30% duty cycle prevents overheating, allowing 3 inferences per second (assuming 100ms per inference).**
  options:
  - 333%
  - 35%
  - 30%
  - 15%
  correct_index: 2
