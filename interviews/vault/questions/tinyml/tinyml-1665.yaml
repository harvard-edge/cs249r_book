title: Energy Harvesting Checkpoints
scenario: An energy-harvesting tracker uses an intermittent power supply. A Cortex-M4
  requires 500ms for a full MLP inference, but power is completely lost every 200ms
  on average.
question: Design an optimal layer-wise activation checkpointing strategy to non-volatile
  memory that maximizes forward progress while minimizing write overhead.
details:
  realistic_solution: The inference must be divided into at least three blocks of
    ~160ms to guarantee completion between power failures. Checkpoints should be written
    to Flash/FRAM at the boundaries. If writing a 2KB intermediate tensor takes 1ms,
    the energy overhead is negligible, but excessive checkpointing (e.g., every 50ms)
    would waste power and reduce overall throughput.
  common_mistake: Attempting to write checkpoints asynchronously without halting the
    pipeline, causing corrupted state upon sudden power failure.
  napkin_math: Inference time 500ms / 200ms MTBF = 2.5, requiring minimum 3 checkpoints.
