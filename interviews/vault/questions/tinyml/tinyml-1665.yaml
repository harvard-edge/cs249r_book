title: Energy Harvesting Checkpoints
scenario: An energy-harvesting tracker uses an intermittent power supply. A Cortex-M4
  requires 500ms for a full MLP inference, but power is completely lost every 200ms
  on average.
question: Design an optimal layer-wise activation checkpointing strategy to non-volatile
  memory that maximizes forward progress while minimizing write overhead.
details:
  realistic_solution: The inference must be divided into at least three execution
    blocks of ~160 ms to guarantee progress between power failures. With 3 blocks
    you need 2 INTERMEDIATE checkpoints (after block 1 and after block 2); the final
    output is the inference result, not a checkpoint. Total writes per inference =
    2 intermediate (each 2 KB at 1 ms = 2 ms total checkpoint overhead per inference).
    Excessive checkpointing (e.g., every 50 ms) would write 9 checkpoints per inference,
    wasting power without making forward progress.
  common_mistake: Counting the final output as a checkpoint and reporting "3 checkpoints
    needed" instead of the correct 2 intermediate checkpoints between 3 execution
    blocks.
  napkin_math: 500 ms inference / 200 ms MTBF = 2.5; need 3 execution blocks; need
    N-1 = 2 intermediate checkpoints; checkpoint overhead = 2 * 1 ms = 2 ms (~0.4%
    of inference time).
