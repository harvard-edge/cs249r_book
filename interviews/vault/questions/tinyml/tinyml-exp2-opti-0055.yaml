title: Optimizing Side-Channel Defenses on nRF5340
scenario: You are deploying a proprietary wake-word model on a Nordic nRF5340 (128 MHz app core, 256 KB
  SRAM). To prevent model extraction via power side-channel attacks, the team implemented randomized dummy
  MAC operations (jitter) across all layers, adding 50% overhead. This defense has pushed the active inference
  energy too high, violating the ~5mA active current constraint over the required battery life. Analyze
  this bottleneck and quantify an optimization that maintains security while reducing the compute overhead.
details:
  realistic_solution: The correct approach is to analyze the side-channel vulnerability profile and apply
    dummy operations only to the most vulnerable layers (typically the first and last layers). The middle
    layers are highly non-linear and harder to exploit, allowing for a significant reduction in dummy
    operations while preserving model security.
  common_mistake: Candidates often suggest disabling the defense entirely, switching to a lighter model,
    or trying to offload compute to the 64 MHz network core, which misses the optimization opportunity
    of targeting specific vulnerabilities.
  napkin_math: Base inference takes 2M MACs. At 2 cycles/MAC, that's 4M cycles. On the 128 MHz app core,
    base time is 4M / 128M = 31.25 ms. Adding 50% jitter to all layers adds 1M MACs (+15.6 ms), totaling
    46.8 ms per inference. At ~5mA active current, this increases energy per inference proportionally.
    By restricting jitter to the first and last layers (assuming they comprise 20% of total MACs), the
    overhead becomes 50% of 400k MACs = 200k dummy MACs. The optimized inference takes 2.2M MACs (4.4M
    cycles), reducing time from 46.8 ms to 34.37 ms and cutting the defense compute and energy overhead
    by 80%.
