title: 'The Flash Budget Crunch: CNN Efficient Design'
scenario: You're optimizing a keyword spotting model for a microcontroller with only 454KB of available
  Flash for the model weights. Your profiler identifies a standard 3x3 convolutional layer as the main
  memory hog. It takes a `32x32` feature map with `64` input channels and produces `128` output channels.
question: "How many parameters does the 3x3 depthwise separable replacement require for the 64-channel to 128-channel layer?"
details:
  realistic_solution: The correct approach is to calculate the parameters for both the depthwise and the
    pointwise stages and sum them.
  common_mistake: 'Engineers often forget that a depthwise separable convolution is a two-part operation:
    a depthwise convolution followed by a 1x1 pointwise convolution. A common error is to calculate only
    the depthwise part (which is tiny) or only the pointwise part, leading to an incorrect parameter count.
    Another mistake is to calculate a standard convolution out of habit, grossly overestimating the size.'
  napkin_math: 'A standard 3x3 conv layer with 64 in / 64 out channels has 3 * 3 * 64 * 64 = 36,864 weights
    (36.8 KB in INT8). The memory bottleneck is the activation buffer: Output is 32x32x64 = 65,536 bytes
    (65.5 KB in INT8). The Cortex-M4 only has 256KB of SRAM total. This single activation tensor consumes
    ~25% of the entire available device memory!'
  options:
  - 8,192 parameters
  - 73,728 parameters
  - 576 parameters
  - 8,768 parameters
  correct_index: 3
