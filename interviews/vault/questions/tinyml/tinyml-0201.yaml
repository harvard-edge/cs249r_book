validation_issues:
- The 'Scenario' explicitly asks to replace a standard 3x3 convolutional layer. The 'Napkin Math' then
  describes a 'standard 3x3 conv layer with 64 in / 64 out channels' and 'Output is 32x32x64'. The original
  standard convolutional layer was producing `128` output channels, not 64. The parameters calculated
  in napkin math (36,864 weights) are based on the incorrect `64` output channels, and the output activation
  (65.5KB) is also for 64 channels, not the `128` output channels as per the scenario.
- The 'Realistic Solution' states 'The correct approach is to calculate the parameters for both the depthwise
  and the pointwise stages and sum them.' However, it does not actually provide this calculation. It should
  show the parameter calculation for the depthwise separable convolution to answer the implicit part of
  the question related to efficient design for the specified layer.
validation_status_pro: WARN
validation_issues_pro:
- The napkin math is a generic example and does not use the numbers from the scenario to calculate the
  parameter count of the problematic layer.
