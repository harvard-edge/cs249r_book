title: 'The Flash Budget Crunch: CNN Efficient Design'
scenario: You're optimizing a keyword spotting model for a microcontroller with 454KB of Flash for weights. A standard 3x3 convolutional layer (32x32 feature map, 64 input channels, 128 output channels) is the main memory hog.
question: "How many parameters does the 3x3 depthwise separable replacement require for the 64-channel to 128-channel layer?"
details:
  realistic_solution: The correct approach is to calculate the parameters for both the depthwise and the pointwise stages and sum them.
  common_mistake: |
    **The Pitfall:** Calculating only the depthwise part or only the pointwise part of the separable convolution.
    **The Rationale:** Engineers forget that a depthwise separable convolution is a two-part operation.
    **The Consequence:** They incorrectly estimate the parameter count, leading to poor architectural decisions.
  napkin_math: |
    1. Calculate standard conv weights: 3 * 3 * 64 * 128 = 73,728 weights.
    2. Calculate depthwise separable weights (Depthwise phase): 3 * 3 * 64 = 576 weights.
    3. Calculate depthwise separable weights (Pointwise phase): 1 * 1 * 64 * 128 = 8,192 weights.
    4. Calculate total separable weights: 576 + 8,192 = 8,768 weights.
    5. **Final Result: The depthwise separable replacement requires 8,768 parameters.**
  options:
  - 8,192 parameters
  - 73,728 parameters
  - 576 parameters
  - 8,768 parameters
  correct_index: 3
