title: 'The Flash Budget Crunch: CNN Efficient Design'
scenario: You're optimizing a keyword spotting model for a microcontroller with 454KB of Flash. A standard 3x3 Conv2D layer (64 input channels, 128 output channels) consumes excessive memory.
question: "How many parameters does the 3x3 depthwise separable replacement require for the 64-channel to 128-channel layer?"
details:
  realistic_solution: Decompose the dense convolution into spatial (Depthwise) and channel-mixing (Pointwise) operations, calculating parameters additively to reveal profound architectural compression ratios.
  common_mistake: |
    **The Pitfall:** Calculating only the spatial depthwise part or only the 1x1 pointwise part of the separable convolution.
    **The Rationale:** Engineers abstract away the internal two-stage decomposition of depthwise-separable mechanics.
    **The Consequence:** They drastically incorrectly estimate parameter counts, breaking static arena planning frameworks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Input channels: 64. Output channels: 128.
       - Standard kernel: 3x3.
       - Separable split: 3x3 Depthwise + 1x1 Pointwise.
    2. **Calculations:**
       - Standard Conv2D: 3 * 3 * 64 * 128 = 73,728 parameters.
       - Depthwise stage: 3 * 3 * 64 = 576 parameters.
       - Pointwise stage: 1 * 1 * 64 * 128 = 8,192 parameters.
       - Total Separable parameters: 576 + 8,192 = 8,768 parameters.
    3. **Conclusion & Interpretation:**
       - **Result: The depthwise separable substitution requires 8,768 parameters, reducing memory footprint by ~88% (Architecture-Bound Optimization).**
  options:
  - 8,192 parameters
  - 73,728 parameters
  - 576 parameters
  - 8,768 parameters
  correct_index: 3
