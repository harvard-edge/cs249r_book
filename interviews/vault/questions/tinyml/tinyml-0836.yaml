title: TinyML Zero-Point Mismatch
scenario: A quantized TinyML model produces biased outputs after deployment. Investigation
  shows the runtime used zero-point 0 while calibration expected zero-point 128 for
  uint8 tensors. Analyze the failure.
question: Why can a zero-point mismatch bias a quantized TinyML model at runtime?
details:
  realistic_solution: The zero-point defines which integer represents real zero. If
    calibration and runtime disagree, every dequantized value is shifted, changing
    layer outputs systematically. This is a quantization parameter mismatch, not random
    noise.
  common_mistake: Checking only scale values and forgetting zero-point must match
    the runtime tensor type.
  napkin_math: For this uint8 deployment, zero was expected near integer code 128.
    Using zero-point 0 creates a Δz of 128 integer codes; the real-value bias is Δz
    × scale.
