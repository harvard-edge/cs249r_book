title: 'TinyML Zero-Point Mismatch'
scenario: 'A quantized TinyML model produces biased outputs after deployment. Investigation shows the runtime used zero-point 0 while calibration expected zero-point 128 for uint8 tensors.'
question: 'Why can a zero-point mismatch bias a quantized TinyML model at runtime?'
details:
  realistic_solution: 'Quantization relies on an affine mapping $x_q = \text{round}(x_f / s) + z$. The zero-point $z$ defines which integer represents real zero. If calibration and runtime disagree, every dequantized value is shifted by a constant delta, systematically skewing all layer activations and producing a deterministic bias, not random noise.'
  common_mistake: |
    **The Pitfall:** Checking only scale values and assuming zero-point defaults are harmless.
    **The Rationale:** Candidates from FP32 backgrounds assume 0 always means 0, forgetting that uint8 zero-points are typically shifted (e.g., to 128) to represent symmetric ranges.
    **The Consequence:** The model compiles and runs but produces wildly skewed outputs, destroying inference accuracy in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tensor type: uint8.
    - Expected zero-point: 128.
    - Runtime zero-point: 0.

    **Calculations:**
    - Δz = 128 - 0 = 128 integer codes.
    - Real-value bias per activation = Δz × scale = 128 × s.

    **Conclusion & Interpretation:**
    - **Result: Systematic Bias (Accuracy-Bound)**. Every zero-valued activation is incorrectly computed as 128 × s, skewing downstream MAC operations.
