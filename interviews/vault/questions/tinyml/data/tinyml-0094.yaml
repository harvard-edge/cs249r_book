title: ESP32 Wi-Fi Supply Noise Coupling Into ADC
scenario: Your vibration monitoring system uses a built-in 12-bit SAR ADC to sample a piezoelectric vibration sensor at 10 kHz. The model was trained on data from a benchtop DAQ with 16-bit resolution. In the field, the model's anomaly detection F1-score drops from 0.92 to 0.71. The vibration signal amplitude is correct, but the frequency spectrum shows unexpected broadband noise above 2 kHz.
question: Why does the ADC introduce broadband noise above 2 kHz, and how does it drop the F1-score to 0.71?
details:
  realistic_solution: 'The ESP32-class SAR ADC shares silicon substrate and power supply with the WiFi radio. When WiFi transmits, current spikes modulate the ADC reference and input front end, injecting a wideband noise floor rather than a single tone. That noise is most visible above 2 kHz because the vibration fault harmonics there are weak and were clean in the 16-bit DAQ training data. The reduced ENOB/SNR buries those features, so borderline anomaly windows flip labels and class separability drops, matching an F1-score fall from 0.92 to 0.71. Fixes: disable WiFi during ADC sampling, improve analog supply isolation, or oversample only if the noise is sufficiently uncorrelated.'
  common_mistake: |
    **The Pitfall:** Assuming the ESP32's ADC is just lower quality than the DAQ and accepting the 12-bit vs 16-bit resolution loss.
    **The Rationale:** Candidates fail to realize that the raw resolution difference only accounts for a ~1-2% accuracy loss, not a 21% drop.
    **The Consequence:** They miss the underlying hardware interference (Wi-Fi supply noise) causing the massive degradation.
  napkin_math: |
    **Assumptions & Constraints:**
    - SAR ADC: 12-bit, 3.3V range.
    - Wi-Fi TX current spike: 300 mA.
    - PCB trace resistance: 100 mΩ.

    **Calculations:**
    - LSB Size: 3.3 V / 2^12 = 3.3 / 4096 ≈ 0.806 mV.
    - Supply Noise Ripple: 300 mA × 100 mΩ = 30 mV.
    - Noise in LSBs: 30 mV / 0.806 mV ≈ 37.2 LSBs.
    - Approximate bit-loss heuristic: log2(37.2) ≈ 5.2 bits, so usable resolution can fall from 12 bits toward about 6.8 bits when the ripple behaves like broadband noise.
    - Approximate dynamic-range/SNR penalty: 5.2 bits * 6.02 dB/bit ≈ 31 dB.
    - Because the coupled ripple is spread across the sampled band, the raised noise floor is especially visible above 2 kHz where the bearing-fault harmonics are low amplitude.

    **Conclusion & Interpretation:**
    - **Result: roughly 5 bits of effective-resolution loss (SNR-Bound)**. The 6.8-bit ENOB estimate is a heuristic for broadband supply-noise coupling, not a lab-grade ADC characterization; it explains why weak >2 kHz vibration signatures disappear and the classifier's F1 score drops.
