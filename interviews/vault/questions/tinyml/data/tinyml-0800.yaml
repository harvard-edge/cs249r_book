title: False Positives from Seasonal Ambient Temperature Drift
scenario: A TinyML model monitoring an industrial machine uses temperature data to predict failures. It works well initially, but after 3 months, it outputs continuous false positives.
question: What long-term sensor drift causes the industrial temperature model to output continuous false positives?
details:
  realistic_solution: The root cause is long-term baseline drift in the temperature signal, such as seasonal ambient temperature increasing after the training period. If the model learned absolute temperature as a proxy for machine failure, a normal summer baseline can look like the failure distribution even when the machine is healthy. Fix by retraining or calibrating with data that spans seasonal baselines, adding baseline-normalized features, and monitoring drift instead of relying on a fixed absolute-temperature boundary.
  common_mistake: |
    **The Pitfall:** Feeding absolute environmental sensor values directly into the model.
    **The Rationale:** Failing to account for long-term ambient baseline shifts, such as seasonal temperature changes.
    **The Consequence:** The model misinterprets normal seasonal changes as anomalous events, leading to a useless flood of false positives.
  napkin_math: |
    **Assumptions & Constraints:**
    - Training normal baseline: 20°C to 24°C.
    - Failure-like region learned by the model: sustained readings above 28°C.
    - Later seasonal baseline shift: +8°C.

    **Calculations:**
    - A healthy 22°C machine reading during training maps to 22°C.
    - After an +8°C seasonal baseline shift, the same healthy operating condition maps to 30°C.
    - 30°C exceeds the learned 28°C failure-like region even though the machine state did not change.

    **Conclusion & Interpretation:**
    - **Result: The absolute temperature baseline moved from normal into the model's failure-like range.** The continuous false positives come from unmodeled seasonal baseline drift, so the data pipeline needs calibration or baseline-normalized features.
