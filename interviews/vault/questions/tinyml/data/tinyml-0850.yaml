title: 'Dataset Curation: Implement Data Augmentation for TinyML Acoustic Models'
scenario: You are training a keyword spotting model for a Cortex-M7+Ethos-U55. Your base dataset has 5,000 samples/keyword for 10 keywords. You implement an offline augmentation pipeline to expand to 50,000 stored audio samples/keyword using noise injection (5 SNR levels) and speed perturbation (2 variants). SpecAugment is applied later to feature tensors during training and is not materialized as stored audio.
question: How large is the stored augmented KWS dataset after applying speed and SNR noise, how does SpecAugment affect storage, and is the pipeline feasible to process?
details:
  realistic_solution: 'Offline augmentation: generate the speed-perturbed and noise-injected audio once, then store it to disk. The 2 speed variants combined with 5 SNR levels create a 10x multiplier: 50,000 base utterances become 500,000 stored audio examples, or 50,000 per keyword. SpecAugment masks the spectrogram or MFCC features during training, so it does not increase stored raw-audio size unless you explicitly materialize each masked feature view. The resulting raw audio is about 16 GB, and extracted MFCC features would be about 1.94 GB, both feasible on a standard SSD for offline training.'
  common_mistake: |
    **The Pitfall:** Attempting online augmentation for thousands of samples per batch.
    **The Rationale:** Candidates are used to GPU clusters that dynamically augment data on-the-fly.
    **The Consequence:** In edge/constrained environments or standard workstations, applying complex DSP audio augmentations online causes severe CPU starvation during the training loop.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base Data: 10 keywords, 5,000 samples each.
    - Audio format: 1 sec, 16 kHz, 16-bit (2 Bytes/sample).
    - Stored offline augmentation: 2 speed variants * 5 SNR levels = 10x multiplier.
    - SpecAugment: applied on feature tensors during training, not stored as extra audio.

    **Calculations:**
    - Base Sample Count: 10 * 5,000 = 50,000 utterances.
    - Stored Augmented Count: 50,000 * 10 = 500,000 utterances.
    - Per-utterance raw audio: 16,000 * 2 = 32,000 bytes.
    - Raw Storage: 500,000 * 32,000 = 16,000,000,000 bytes, about 16 GB.
    - If storing extracted MFCC features instead: 500,000 * 3.87 KB = about 1.94 GB.
    - SpecAugment storage effect: 0 additional stored audio bytes when applied on the fly; materializing N masked feature views would multiply only the stored feature set by N.

    **Conclusion & Interpretation:**
    - **Result: 500,000 stored utterances, about 16 GB as raw audio or about 1.94 GB as MFCC features.** SpecAugment adds training-time compute but no storage under the stated pipeline, so offline generation is feasible on a standard SSD.
