title: 'Audio Ingestion Memory and Cycle Budgeting'
scenario: 'You are designing a real-time ingestion pipeline for a keyword spotting system on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform. A microphone streams 16 kHz, 16-bit audio via DMA into a circular buffer in the shared 512 KB SRAM. The Ethos-U55 runs inference on a 1-second audio context every 250 ms.'
question: 'What circular audio buffer size and M7 cycle budget are needed for zero-copy 250 ms stride processing on Corstone-300?'
details:
  realistic_solution: 'The optimal approach uses a zero-copy circular buffer driven by DMA interrupts. By sizing the buffer to hold exactly the 1-second context plus the 250ms stride, we prevent memory corruption without copying data. Feature extraction is executed on the Cortex-M7 over the newly ingested 250ms chunk within the tight cycle budget before handing the computed features to the Ethos-U55.'
  common_mistake: 'Candidates often forget to account for the extra stride buffer required to prevent DMA from overwriting the oldest data while the system processes the current 1-second frame. They also frequently miscalculate the millisecond-to-clock-cycle conversions, failing to accurately determine the available cycles on the 480 MHz MCU.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Audio: 16 kHz, 16-bit (2 bytes/sample).
    - Buffer: 1.0s context + 0.25s stride.
    - M7 Clock: 480 MHz, Time Budget: 5% of 250ms.

    **Calculations:**
    - Data Rate: 16,000 * 2 = 32 KB/sec.
    - Buffer Duration: 1.0 + 0.25 = 1.25 seconds.
    - Minimum SRAM Buffer: 1.25 * 32 KB/sec = 40 KB.
    - Time Budget: 0.05 * 250 ms = 12.5 ms.
    - Cycle Budget: 12.5 ms * 480,000 cycles/ms = 6,000,000 cycles.

    **Conclusion & Interpretation:**
    - **Result: 40 KB, 6M cycles (Memory & Compute Bound)**. The circular buffer requires 40 KB, leaving 472 KB for the Ethos-U55, and the M7 has 6M cycles for feature extraction.
