title: Active Learning Storage Constraints
scenario: We are employing an active learning strategy to curate a dataset for a keyword spotting model on a Nordic nRF5340. When its confidence is low, it saves the 1-second, 16 kHz, 16-bit audio clip to flash for later offloading and human annotation. The application firmware, BLE stack, and baseline model consume 640 KB of the available 1 MB flash.
question: How many 1-second uncertain audio clips can be stored on-device before needing to offload data?
details:
  realistic_solution: The device has 1024 KB - 640 KB = 384 KB of flash left for audio clips. Each 1-second 16 kHz, 16-bit PCM clip uses 16,000 samples * 2 bytes = 32,000 bytes, or about 31.25 KB. The device can store floor(384 / 31.25) = 12 full clips; the remaining space is not enough for a 13th complete clip.
  common_mistake: |
    **The Pitfall:** Forgetting to subtract the firmware footprint from the total flash capacity.
    **The Rationale:** Candidates assume the full 1 MB is available for data logging, or they confuse bits and bytes when calculating sample size.
    **The Consequence:** The calculated capacity is drastically overstated, leading to partial samples or hard crashes when flash overflows.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total flash: 1 MB (1024 KB).
    - Firmware overhead: 640 KB.
    - Audio clip: 1-second, 16 kHz, 16-bit PCM.

    **Calculations:**
    - Available flash = 1024 KB - 640 KB = 384 KB.
    - Sample size = 16,000 samples/sec * 2 bytes/sample = 32,000 bytes = 31.25 KB.
    - Total clips = 384 KB / 31.25 KB = 12.28 clips.

    **Conclusion & Interpretation:**
    - **Result: 12 full audio clips (Storage-Bound)**. System requires periodic offloading to prevent flash overflow.
