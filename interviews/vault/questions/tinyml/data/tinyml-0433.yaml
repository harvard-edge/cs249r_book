title: The Sensor Fusion Skew
scenario: You are deploying a sensor fusion model fusing a 1kHz accelerometer and microphone. The model was trained on high-fidelity, synchronized lab sensors. The production device uses a cheaper accelerometer with up to 2ms of timing jitter and a microphone with an ADC that adds a slight DC offset. After deployment, you observe a 30% drop in prediction accuracy, though no hardware faults are reported.
question: What hardware-induced data issue most likely explains the 30% accuracy drop after deploying the quantized sensor fusion model?
details:
  realistic_solution: The accuracy degradation is caused by severe training-serving skew originating from hardware tolerance variances. The 2ms jitter shifts the accelerometer data by up to two timesteps (at 1kHz) relative to the audio, destroying the precise cross-sensor temporal correlations the model learned. Simultaneously, the uncalibrated DC offset shifts the input distribution, causing heavily constrained INT8 activations to clip or saturate. Real-world edge deployments require robust data augmentation to model jitter and online calibration routines to nullify DC offsets.
  common_mistake: |
    **The Pitfall:** Blaming the quantization process or the compute hardware for accuracy drops.
    **The Rationale:** Engineers treat the ML optimization pipeline as a black box, assuming it broke the model, rather than auditing physical sensor characteristics.
    **The Consequence:** Teams waste weeks tweaking quantization parameters when the root cause is fundamentally corrupted input data from cheap sensors.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sample Rate: 1 kHz (1 ms/sample).
    - Hardware Jitter: 2 ms.

    **Calculations:**
    - Jitter Impact: 2 ms jitter = ±2 sample misalignment between modalities.
    - A 2-sample temporal shift destroys the tight temporal feature alignment learned in the pristine lab environment.

    **Conclusion & Interpretation:**
    - **Result: ±2 sample misalignment (Data-Distribution Shift)**. Hardware jitter breaks cross-correlation, tanking accuracy.
  options:
  - 'The INT8 quantization process has likely removed crucial features from the model weights.'
  - 'The MCU memory bandwidth is insufficient to load data quickly enough, causing data corruption.'
  - 'Training-serving skew from the production sensors introducing unmodeled jitter and bias shifts the input distribution.'
  - 'The device''s power management unit is throttling the clock speed, leading to calculation timeouts.'
  correct_index: 2
