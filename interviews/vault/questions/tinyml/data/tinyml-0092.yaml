title: The I2C Bus Lockup
scenario: Your predictive maintenance system on a Cortex-M4 reads a BME680 environmental sensor over I2C at 400 kHz while running a 35ms anomaly detection inference. Randomly, the I2C bus locks up — the SDA line is held low permanently by the sensor.
question: How can a long ML inference blocking the I2C ISR stall the bus, and how should layer timing set the I2C timeout?
details:
  realistic_solution: I2C is a clocked protocol where the master drives SCL and the slave drives SDA. During a read transaction, the sensor may be partway through a byte and holding SDA low for a 0 bit while it waits for the next SCL edge. If the ML inference disables interrupts or runs a non-preemptible kernel long enough for the I2C ISR/service routine to miss deadlines, the master stops advancing the transaction; the symptom is a stuck bus or incomplete transaction, not the sensor literally choosing to clock-stretch forever. The safe timeout must be longer than the worst-case interval in which I2C service can be delayed, plus transaction margin, but shorter than the system-level fault recovery budget. Better fixes are to keep inference preemptible, avoid long interrupt-disabled sections, use DMA/peripheral-driven I2C where possible, and add bus recovery clocks on timeout.
  common_mistake: |
    **The Pitfall:** Assuming the I2C peripheral hardware is buggy and attempting to switch to SPI.
    **The Rationale:** Candidates fail to trace the interaction between interrupt latency caused by long ML computation blocks and the synchronous I2C state machine.
    **The Consequence:** The true software timing issue remains unresolved, and unnecessary hardware changes are pursued.
  napkin_math: |
    **Assumptions & Constraints:**
    - I2C clock: 400 kHz.
    - Inference time: 35 ms total.
    - Conv2D critical section: 200-500 µs.
    - I2C timeout setting: 100 µs.
    - Timeout must cover worst-case I2C service delay, not full inference time if inference remains preemptible.

    **Calculations:**
    - I2C byte time: 9 bits / 400 kHz = 22.5 µs.
    - Worst observed non-preemptible Conv2D section: 500 µs.
    - Existing timeout: 100 µs < 500 µs, so the HAL can abort while the transaction is only delayed, leaving SDA stuck until bus recovery.
    - A practical timeout must be greater than the worst interrupt-blocked interval plus byte/ISR margin; for example, 500 µs + several 22.5 µs byte times and software margin suggests about 1 ms.
    - If any layer disables interrupts for longer than 1 ms, the timeout must be raised or, preferably, the layer must be split/preempted.

    **Conclusion & Interpretation:**
    - **Result: Timeout Tied to Worst ISR Blockage**. The model causes I2C stalls when it prevents timely service; choose the timeout from the maximum non-preemptible inference section plus I2C transaction margin, not from the 35 ms average inference time.
