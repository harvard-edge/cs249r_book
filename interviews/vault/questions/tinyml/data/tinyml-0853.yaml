title: 'Dataset Curation: Optimize Dataset Size vs Model Accuracy on Cortex-M4'
scenario: 'Your keyword spotting model for Cortex-M4 (168MHz, 256KB SRAM) achieves 89% accuracy with 10K training samples/class. You need 95% accuracy. Adding more data is expensive ($0.25/sample collected and labeled). Optimize the path to 95% accuracy: more data, augmentation, or model improvements.'
question: 'What is the most cost-effective path from 89% to 95% keyword-spotting accuracy on Cortex-M4?'
details:
  realistic_solution: 'Data-accuracy curve analysis: typical KWS models saturate around 15-20K samples/class. Augmentation (noise, speed) can match the effect of 2-3× more real data. Model improvements (adding depthwise conv layers) may gain 2-3% without any new data.'
  common_mistake: 'Throwing more labeled data at the problem without first saturating augmentation and architecture improvements — data has diminishing returns.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Current state: 89% at 10K samples/class.
    - Cost: $0.25/sample, 12 classes.
    - Power law scaling: accuracy ∝ N^0.1.

    **Calculations:**
    - Double data cost = 10K * 12 * $0.25 = $30K.
    - Double data accuracy = 89% * (20K/10K)^0.1 = 89% * 1.072 = 95.4%.
    - Add 1 Depthwise Conv (+2KB): +2-3% accuracy (cost $0).
    - Data augmentation (effective 5x data): caps at ~94%.
    - Combined (Augment + Architecture) = ~94% for $0.
    - Marginal real data to reach 95%: 5K samples = $15K.

    **Conclusion & Interpretation:**
    - **Result: $15K (Compute-Bound)**. Saturating free architectural and augmentation improvements first drastically reduces the data collection budget required to reach 95%.
