title: 'Dataset Curation: Optimize Dataset Size vs Model Accuracy on Cortex-M4'
scenario: 'Your keyword spotting model for Cortex-M4 (168MHz, 256KB SRAM) achieves 89% accuracy with 10K training samples/class. You need 95% accuracy. Adding more data is expensive ($0.25/sample collected and labeled). Optimize the path to 95% accuracy: more data, augmentation, or model improvements.'
question: What is the most cost-effective path from 89% to 95% keyword-spotting accuracy on Cortex-M4?
details:
  realistic_solution: 'Data-accuracy curve analysis: typical KWS models saturate around 15-20K samples/class, so blindly doubling all 12 classes is expensive and may not buy the full 6-point gap. First apply strong noise/time-shift/speed augmentation and a small depthwise-conv model improvement that still fits Cortex-M4 SRAM; together these plausibly move 89% to about 94%. Then spend targeted labeling only on validation failures and underrepresented noisy conditions. A 5K total targeted set costs $1.25K, while 5K per class would cost $15K, so the cost-effective plan is staged measurement rather than buying a full $30K data doubling up front.'
  common_mistake: |
    **The Pitfall:** Buying a large new labeled-data set before testing augmentation and small model changes.
    **The Rationale:** The decision point is not whether data helps at all; it is whether the next percentage points are cheaper from noise/speed augmentation and a slightly stronger depthwise model than from paid collection.
    **The Consequence:** The project spends tens of thousands of dollars on labels while leaving low-cost accuracy gains unused, and may still need model changes to reach 95%.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current state: 89% at 10K samples/class.
    - Cost: $0.25/sample, 12 classes.
    - Use absolute percentage-point gains near saturation, not multiplicative accuracy scaling.

    **Calculations:**
    - Doubling real data costs 10K * 12 * $0.25 = $30K and is unlikely to add a full +6 percentage points near saturation.
    - Strong augmentation (noise, time shift, speed perturbation) can reasonably add about +3 percentage points: 89% -> ~92%.
    - One small depthwise-conv improvement can add about +2 percentage points within the SRAM budget: ~92% -> ~94%.
    - Remaining gap is about +1 percentage point; collect a focused set of hard/noisy examples rather than another full 10K/class.
    - Chosen targeted-data plan: 5K samples total from the error slices, not 5K/class.
    - Targeted-data cost: 5K * $0.25 = $1.25K.
    - For comparison, 5K samples/class across 12 classes would be 60K * $0.25 = $15K, and a full extra 10K/class would be $30K.

    **Conclusion & Interpretation:**
    - **Result: try augmentation plus the small model improvement first, then buy about 5K targeted total samples if validation remains below 95%**. The likely incremental label budget is about $1.25K, far below a blind $30K data-doubling plan.
