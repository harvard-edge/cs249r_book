title: The HVAC False Positive
scenario: Your keyword spotting model on an nRF5340 (Cortex-M33, 128 MHz, 256 KB SRAM) achieves 96% accuracy in the lab. Deployed in an office building, the false positive rate jumps from 1% to 12%. The building's HVAC system cycles on/off every 15 minutes. The audio pipeline uses a PDM microphone at 16 kHz, 256-point FFT with 128-sample hop, feeding 40 MFCC features to the model.
question: Why does an nRF5340 keyword model's false positive rate jump from 1% to 12% when HVAC cycles every 15 minutes?
details:
  realistic_solution: The false positives jump because the HVAC adds broadband low-frequency noise plus tonal fan/motor harmonics that leak into the MFCC features used by the keyword model. Those features shift toward patterns the model did not see in the quiet lab distribution, so non-keyword office audio is scored as the keyword more often. The fix path is to characterize the noise, add front-end mitigation such as high-pass filtering, notch filtering, or spectral subtraction, and retrain or calibrate thresholds with HVAC-on negatives. The added DSP cost is small enough that compute is not the bottleneck.
  common_mistake: |
    **The Pitfall:** Assuming the model just needs more training data with HVAC noise.
    **The Rationale:** ML practitioners frequently treat performance drops as purely a dataset capacity problem rather than analyzing the signal processing pipeline.
    **The Consequence:** Teams waste time collecting and labeling vast amounts of data instead of implementing a simple high-pass filter or spectral subtraction to remove the tonal noise at the source.
  napkin_math: |
    **Assumptions & Constraints:**
    - Clock: 128 MHz.
    - Baseline MFCC computation: 11,216 cycles per frame.
    - Add noise reduction: 1,152 cycles.

    **Calculations:**
    - Baseline Overhead: 11,216 / 128 MHz = 87.6 μs/frame.
    - At 125 frames/sec: 125 * 87.6 μs = 10.95 ms/sec = 1.1% CPU.
    - New CPU Overhead: (11,216 + 1,152) * 125 / 128,000,000 = 1.21% CPU.

    **Conclusion & Interpretation:**
    - **Result: 1.21% CPU after noise reduction.** The added DSP cost is tiny, so the problem is acoustic feature contamination rather than compute saturation.
