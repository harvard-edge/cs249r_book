title: SPI DMA Single-Buffer Sample Drops
scenario: Your Cortex-M4 reads accelerometer data over SPI at 1.6 kHz. Without DMA, your firmware polls the SPI bus in a tight loop, consuming 100% CPU. With DMA, the CPU is free to run inference. But your colleague's DMA setup drops 5% of samples.
question: Why does single-buffer SPI DMA at 1.6 kHz drop samples during 30-50 ms Cortex-M4 inference, and how do you fix it?
details:
  realistic_solution: The problem is single-buffer ownership. With only one SPI DMA buffer, the firmware has no safe place for new samples while the CPU is consuming that same buffer for feature extraction or inference. Depending on the implementation, the DMA either overwrites samples the CPU has not finished reading or must be stopped while inference runs; both cases create gaps in the stream. The fix is double-buffering or a ring buffer with full/empty ownership flags, so DMA fills one buffer while the CPU processes another and an overrun is detected instead of silently dropping samples.
  common_mistake: |
    **The Pitfall:** Believing DMA automatically prevents data loss.
    **The Rationale:** Engineers assume pointing DMA at a single buffer completely offloads I/O safely.
    **The Consequence:** The DMA overwrites data the CPU hasn't processed yet, creating a race condition and dropping samples.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1.6 kHz SPI (6 bytes/sample).
    - Cortex-M4 inference is 50 ms.
    - Single buffer is 256 samples.

    **Calculations:**
    - Buffer size: 256 * 6 = 1,536 bytes (1.5 KB).
    - DMA fill time: 256 / 1600 Hz = 160 ms.
    - Samples arriving during 30 ms inference: 1600 * 0.030 = 48 samples.
    - Samples arriving during 50 ms inference: 1600 * 0.050 = 80 samples.
    - If DMA is stopped or has no free buffer during a 50 ms inference, up to 80 arriving samples have nowhere safe to go in that interval.
    - A single 256-sample buffer cannot be both the DMA destination and the CPU's processing source without an ownership handoff; the risk is a gap or overwrite, not insufficient SPI bandwidth.
    - With two 256-sample buffers, DMA can fill the next 160 ms buffer while the CPU needs at most 50 ms to finish processing the previous one.

    **Conclusion & Interpretation:**
    - **Result: Single-Buffer Overrun/Gap.** The inference latency is short enough for double-buffering, but not safe with one shared buffer because 48-80 new samples arrive while the CPU is busy and buffer ownership is ambiguous.
