title: 'Real-time Sensor Data Ingestion Optimization on ARM Cortex-M4 TinyML'
scenario: 'A Cortex-M4 STM32F4 (168 MHz, 256 KB SRAM, no FPU) ingests 500 Hz 16-bit 3-axis vibration data. It extracts RMS features over 1-second windows and transmits via wireless. The system drops 15% of data during peak loads.'
question: 'How should you diagnose and eliminate STM32F4 sensor data loss in a fixed-point streaming feature pipeline?'
details:
  realistic_solution: |
    Refactor RMS extraction to use fixed-point arithmetic, circumventing the slow software-emulated FPU. Decouple sensor ingestion from wireless transmission using DMA and implement a non-blocking transmission architecture.
  common_mistake: |
    **The Pitfall:** Retaining floating-point feature extraction on a non-FPU core.
    **The Rationale:** Candidates overlook the hardware constraint (no FPU) and ignore the blocking nature of synchronous wireless transmissions.
    **The Consequence:** Software emulation burns hundreds of thousands of CPU cycles, bottlenecking the RTOS and dropping live samples.
  napkin_math: |
    **Assumptions & Constraints:**
    - CPU: 168 MHz; Sensor Rate: 500 Hz
    - Interval: 2ms (336,000 cycles/sample)

    **Calculations:**
    - FP Emulation Cost = ~200k cycles + 150k I/O = 350,000 cycles (exceeds budget)
    - Fixed-Point Cost = ~20k cycles + 150k I/O = 170,000 cycles

    **Conclusion & Interpretation:**
    - **Result: 170,000 cycles (Compute-Bound)**. Fixed-point conversion secures 180,000 cycles of headroom, easily clearing the 336,000 cycle limit.
