title: Active Learning Curation for INT8 Constrained Edge Devices
scenario: You are deploying an anomaly detection model on an MCU with no FPU. You have 10,000 hours of unlabeled audio but budget to label only 100 hours. Pipeline A uses a large FP32 teacher model to select uncertain samples. Pipeline B uses a bit-exact simulation of the target INT8 model to select samples where the quantized edge model shows low confidence.
question: Which active learning curation pipeline do you choose and how do you implement the selection efficiently?
details:
  realistic_solution: Pipeline B is architecturally superior. Evaluating uncertainty using the exact INT8 target architecture isolates hardware-induced quantization errors and overflow limits. This ensures the labeling budget targets data that the MCU actually struggles with, rather than generic ambiguity identified by an FP32 teacher. Because hardware-in-the-loop over 10,000 hours is computationally intractable, the solution requires running a bit-accurate INT8 emulator parallelized across cloud nodes to score the pool and extract the highest-value 100 hours.
  common_mistake: |
    **The Pitfall:** Choosing Pipeline A under the assumption that a powerful FP32 model globally defines dataset uncertainty.
    **The Rationale:** Cloud-native ML engineers trust their largest, most accurate model to dictate dataset value.
    **The Consequence:** The scarce labeling budget is wasted on fundamentally ambiguous examples, entirely missing the unique, catastrophic failures caused by target hardware's INT8 truncation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute Capacity: ~336 MMACs/sec. Inference: 10 MMACs/frame.
    - Frame duration: 1 second. Total frames: 36,000,000 (10,000 hours).

    **Calculations:**
    - Single MCU Latency: 10 MMACs / 336M = 29.7 ms per frame.
    - Hardware-in-the-loop Total Time: 36,000,000 * 0.0297 s = 1,069,200 seconds (>12 days).

    **Conclusion & Interpretation:**
    - **Result: >12 days (Compute-Bound)**. Hardware-in-the-loop is far too slow; parallel cloud INT8 emulation is strictly required.
