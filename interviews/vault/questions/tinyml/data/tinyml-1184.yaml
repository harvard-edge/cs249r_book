title: On-Device Active Learning for Audio
scenario: You are designing an on-device active learning system for an acoustic event detector running on a Nordic nRF5340. To curate data, the system must identify uncertain audio samples and transmit them via BLE 5.3 to the cloud for annotation.
question: How should the nRF5340 architect data buffering, uncertainty compute, and radio scheduling to strictly respect the 256 KB SRAM, 1 MB flash, and ~5mA active power constraints?
details:
  realistic_solution: The architecture must compute a lightweight uncertainty heuristic (e.g., margin sampling) natively on the 128 MHz application core. Instead of transmitting raw PCM audio, compressed features (like MFCCs) of the uncertain events are persistently buffered into the 1 MB flash. The network core then aggregates and transmits these batches during infrequent, scheduled BLE connection intervals to aggressively amortize the high energy cost of radio wake-ups.
  common_mistake: |
    **The Pitfall:** Streaming raw uncompressed audio synchronously over BLE.
    **The Rationale:** Candidates propose sending raw 16-bit PCM immediately upon detecting an uncertain event to simplify the data pipeline.
    **The Consequence:** Immediate streaming triggers constant radio wake-ups that destroy the coin-cell energy budget, and overestimates SRAM availability by ignoring the RTOS and ML model footprint.
  napkin_math: |
    **Assumptions & Constraints:**
    - Raw 16kHz 16-bit audio = 32 KB/sec.
    - MFCC compression yields ~2 KB/sec.
    - BLE 5.3 throughput ≈ 100 KB/s; radio power ≈ 15 mW (~5mA at 3V).

    **Calculations:**
    - 50 events/day raw: 50 * 32 KB = 1.6 MB (Exceeds 1 MB flash).
    - 50 events/day MFCCs: 50 * 2 KB = 100 KB (Fits safely in flash).
    - Transmission time: 100 KB / 100 KB/s = 1 second of active radio.
    - Energy cost: 1 second * 15 mW = 15 mJ/day.

    **Conclusion & Interpretation:**
    - **Result: Energy-Bound Radio Scheduling**. Compressing audio to MFCCs and batching transmissions drops the curation energy cost to ~15 mJ/day, making continuous active learning viable on a coin cell.
