title: On-Device Data Collection for Retraining
scenario: You've deployed 2,000 vibration sensors on industrial motors, each running anomaly detection on a Cortex-M4 (1 MB flash, 256 KB SRAM). After 6 months, accuracy has drifted. Your ML team wants raw sensor data to retrain the model, but the devices only have BLE connectivity to a gateway.
question: How much triggered anomaly data can 2,000 Cortex-M4 vibration sensors store in 114 KB flash and upload over BLE?
details:
  realistic_solution: 'You cannot log raw data: 6.4 KB/s fills 114 KiB of available flash in about 18 seconds. Triggered logging records only anomaly events: 800 bytes/event at about 10 events/day, or 8,000 bytes/day (7.8 KiB/day). A 114 KiB log region holds about 14.6 days per device. Uploading a full log over 60 KiB/s BLE takes about 1.9 seconds per device. Across 2,000 devices, that is about 3,800 device-seconds of BLE transfer; with 10 gateways handling one device each in parallel, the fleet drain is about 6.3 minutes. The fleet contributes about 292,000 events, or about 233 MB decimal, if every device uploads a full log.'
  common_mistake: |
    **The Pitfall:** Attempting to log all raw continuous sensor data to flash.
    **The Rationale:** Treating the microcontroller like a cloud server with infinite storage.
    **The Consequence:** A vibration sensor sampling at 3.2 kHz produces 6.4 KB/s, completely filling the 114 KB of available flash in under 18 seconds, rendering data collection useless.
  napkin_math: |
    **Assumptions & Constraints:**
    - Storage limit: 114 KiB of available flash.
    - Raw sample rate: 3.2 kHz producing 6.4 KB/s.
    - Triggered anomaly compression: 800 bytes per event, ~10 events/day.
    - BLE upload rate: 60 KiB/s.
    - Fleet upload estimate assumes 10 gateways, each serving one device at a time.

    **Calculations:**
    - Raw Rate Depletion: 114 KiB / 6.4 KB/s = about 18 seconds.
    - Triggered Rate: 800 bytes/event * 10 events/day = 8,000 bytes/day = 7.8 KiB/day.
    - Per-device storage duration: 114 KiB / 7.8 KiB/day = about 14.6 days of triggered data.
    - Upload time per device: 114 KiB / 60 KiB/s = 1.9 seconds.
    - Fleet upload time through 10 gateways: 2,000 devices * 1.9 seconds / 10 = 380 seconds = 6.3 minutes.
    - Full-log fleet data: 2,000 * 14.6 days * 10 events/day = about 292,000 events; 292,000 * 800 bytes = about 233 MB.

    **Conclusion & Interpretation:**
    - **Result: about 14.6 days per device and 1.9 seconds upload per device (Storage-Bound)**. With 10 gateways, a full 2,000-device fleet drain takes about 6.3 minutes and yields about 292,000 triggered events under the stated event rate.
  options:
    - 'Use raw continuous logging: stream 6.4 KB/s of sensor data to flash, filling 114 KB in 17.8 seconds, then upload via BLE. This gives the ML team the full fidelity data they need for retraining.'
    - 'Use triggered + compressed logging: record only anomaly events (800 bytes/event, ~10/day = 8,000 bytes/day). Each 114 KiB log holds about 14.6 days. BLE upload at 60 KiB/s takes 1.9s per device. For 2,000 devices through 10 gateways serving one device each: about 6.3 minutes total. This yields about 292,000 labeled edge cases (233 MB decimal) despite each device having only 114 KiB of logging space.'
    - Upgrade to a microcontroller with more flash (16 MB) to store weeks of raw sensor data before uploading.
    - Use federated learning to retrain the model on-device, eliminating the need to collect and upload any raw sensor data to the cloud.
  correct_index: 1
