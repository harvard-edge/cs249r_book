title: Continuous Audio Ingestion on ARM Cortex-M4
scenario: You are building a continuous keyword spotting system on an ARM Cortex-M4 running at 168 MHz with 256 KB SRAM. The system must ingest a continuous 16 kHz audio stream from an I2S microphone while concurrently executing a neural network.
question: What specific microcontroller hardware peripheral and associated memory layout strategy must you recall and implement to stream this data without overwhelming the CPU?
details:
  realistic_solution: Use the Direct Memory Access (DMA) controller paired with a double buffering (ping-pong) strategy in SRAM. The DMA peripheral autonomously streams the I2S audio directly into memory, firing an interrupt only when a full block of data is ready.
  common_mistake: |
    **The Pitfall:** Using per-sample CPU interrupts.
    **The Rationale:** Candidates incorrectly recall that the CPU should handle data ingestion per byte without considering severe context-switching overhead.
    **The Consequence:** Constant interrupt storms block the inference workload, missing all real-time deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4: 168 MHz. Audio stream: 16 kHz.
    - Context switch overhead: 24 cycles (in + out).

    **Calculations:**
    - Sample arrival: 168M / 16K = 10,500 cycles.
    - Interrupt overhead: 16,000 * 24 = 384,000 cycles/sec.
    - DMA Ping-Pong (512 samples): Interrupt rate drops to 16,000 / 512 = ~31 Hz.

    **Conclusion & Interpretation:**
    - **Result: ~31 Hz Interrupts (I/O-Bound)**. DMA resolves the I/O-bound interrupt storm, freeing ~384k cycles/sec for CMSIS-NN execution.
