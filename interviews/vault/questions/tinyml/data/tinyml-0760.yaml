title: The ADC Resolution Bottleneck
scenario: A Cortex-M4 microcontroller has a 12-bit ADC sampling an analog sensor at 8 kHz.
question: How much data (in bytes per second) does the ADC generate, and how much Flash would 10 minutes of raw recording consume?
details:
  realistic_solution: 'Each sample is stored as a 16-bit (2-byte) value. Data rate: 8,000 samples/s x 2 bytes = 16,000 bytes/s = 16 KB/s. 10 minutes: 16,000 x 600 = 9,600,000 bytes ~ 9.6 MB. This far exceeds the typical 1 MB Flash on a Cortex-M4, so raw recording requires external storage or significant compression.'
  common_mistake: |
    **The Pitfall:** Using 12 bits (1.5 bytes) for memory calculations.
    **The Rationale:** Candidates mechanically multiply 12 bits by the sample rate, ignoring the architectural reality of standard byte-aligned data types (uint16_t).
    **The Consequence:** Underestimating the data rate by 25%, leading to incorrect storage sizing and potential buffer overflows.
  napkin_math: |
    **Assumptions & Constraints:**
    - Data Representation: A 12-bit ADC value requires a 16-bit (2-byte) container.
    - Duration: 10 minutes = 600 seconds.

    **Calculations:**
    - Data Rate: 8,000 samples/sec * 2 bytes/sample = 16,000 bytes/sec (16 KB/s).
    - Total Storage: 16,000 bytes/sec * 600 sec = 9,600,000 bytes.

    **Conclusion & Interpretation:**
    - **Result: ~9.6 MB (Memory-Bound)**. The recording consumes ~9.6 MB, which vastly exceeds a typical 1 MB Flash memory.
  options:
  - 'A) 12 KB/s, consuming 703 KB in 10 min'
  - 'B) 16 KB/s, consuming 9.6 MB in 10 min'
  - 'C) 8 KB/s, consuming 4.7 MB in 10 min'
  - 'D) 96 KB/s, consuming ~56 MB in 10 min'
