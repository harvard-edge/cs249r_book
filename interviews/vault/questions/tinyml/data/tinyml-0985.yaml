title: Active Learning Data Pipeline for nRF5340 Anomaly Detection
scenario: |
  Design an active learning and dataset curation pipeline for a fleet of industrial vibration sensors powered by the Nordic nRF5340. The devices stream data via BLE 5.3. Given the nRF5340's ~5mA active current constraint, transmitting raw vibration data continuously is not viable.
question: How should nRF5340 vibration sensors curate active-learning data without continuously streaming raw signals?
details:
  realistic_solution: |
    Deploy a lightweight uncertainty sampling framework on the nRF5340's 128 MHz app core. A proxy anomaly detection model scores live vibration windows. If confidence is low, the event is flagged and buffered in SRAM, then bulk-transmitted via BLE 5.3 during scheduled intervals. This guarantees rich dataset diversity while keeping the power-hungry BLE radio duty cycle minimal.
  common_mistake: |
    **The Pitfall:** Transmitting all data to the cloud for filtering or using basic local thresholds.
    **The Rationale:** Candidates prioritize cloud convenience, ignoring extreme radio power constraints and class imbalance issues.
    **The Consequence:** Continuously broadcasting raw data drains the coin cell battery in days, completely failing the core hardware constraints.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Continuous BLE draw: ~10mA. App core inference: ~5mA.
       - 1-second 3-axis window at 200Hz (16-bit): 200 samples/s * 3 axes * 2 bytes = 1,200 bytes (~1.17 KiB).
       - SRAM: 256 KB.
    2. **Calculations:**
       - Store 100 uncertain events: 100 * 1,200 bytes = 120,000 bytes (~117 KiB), which fits within the 256 KB SRAM budget after reserving space for firmware buffers.
       - Radio reduction depends on the event flag rate and BLE packet overhead; if only low-confidence windows are uploaded in scheduled batches, radio-on time scales with the flagged subset rather than the full raw stream.
    3. **Conclusion & Interpretation:**
       - **Result: ~117 KiB buffer for 100 uncertain windows.** On-device proxy filtering can greatly reduce BLE usage compared with continuous streaming while capturing crucial edge cases, but the exact duty-cycle reduction must be derived from the observed flag rate and transmit schedule. **Bottleneck: Power/Radio Duty Cycle.**
