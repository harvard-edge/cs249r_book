title: The Double Buffer DMA Pipeline
scenario: A Cortex-M4 at 100 MHz processes 128-sample audio frames. DMA fills one buffer while the CPU
  processes the other. DMA transfer takes 1.28 ms (128 samples at 100 kHz, accounting for I2S overhead).
  CPU feature extraction takes 0.9 ms per frame. What is the maximum sustained throughput, and what is
  the CPU utilization?
question: "What throughput and CPU utilization result when DMA takes 1.28 ms and CPU feature extraction takes 0.9 ms per audio frame?"
details:
  realistic_solution: 'In a double-buffer pipeline, DMA and CPU run concurrently. Pipeline period = max(DMA
    time, CPU time) = max(1.28, 0.9) = 1.28 ms. Throughput: 128 samples / 1.28 ms = 100,000 samples/s
    = 100 kHz — matches the sampling rate. CPU utilization: 0.9 / 1.28 = 70.3%. The CPU is idle for 29.7%
    of the time, available for other tasks like BLE stack processing.'
  common_mistake: Adding DMA time and CPU time sequentially. The whole point of double buffering is that
    DMA and CPU operate in parallel — the pipeline period is the max of the two, not the sum.
  napkin_math: 'Pipeline period = max(1.28, 0.9) = 1.28 ms. Throughput = 128 / 1.28 ms = 100 kHz. CPU
    util = 0.9 / 1.28 = 70.3%. Without double buffering: 1.28 + 0.9 = 2.18 ms → 58.7 kHz (41% throughput
    loss). SRAM cost: 2 × 128 × 2 B = 512 B.'
  options:
  - A) 58.7 kHz throughput, 41% CPU utilization
  - B) 100 kHz throughput, 70% CPU utilization
  - C) 100 kHz throughput, 100% CPU utilization
  - D) 142 kHz throughput, 50% CPU utilization
  correct_index: 1
