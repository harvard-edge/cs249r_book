title: 'TinyML Anomaly Detection: Data Curation for ARM Cortex-M4'
scenario: 'You are tasked with designing a robust data curation and labeling pipeline for a low-power, always-on anomaly detection system deployed on an ARM Cortex-M4 STM32F4 microcontroller. This device operates with significant constraints: a 168 MHz clock speed, 256 KB of SRAM, and no floating-point unit (FPU).'
question: How should you design a device-aware data curation and labeling pipeline for an FPU-less Cortex-M4 anomaly detector?
details:
  realistic_solution: 'A realistic solution involves a multi-faceted approach: 1) **Data Selection**: Prioritize integer-friendly raw sensor data and features that can be computed with fixed-point arithmetic on-device. Focus on collecting ''hard'' or uncertain samples for active learning. 2) **Annotation Workflows**: Develop extremely precise, unambiguous annotation guidelines, potentially leveraging domain experts. For active learning, implement simple, on-device uncertainty sampling (e.g., confidence-based) to select high-value samples for off-device human review. 3) **Inter-Annotator Agreement**: For critical anomaly types, employ redundant labeling and consensus mechanisms. 4) **Bias Mitigation**: Proactively identify sources of bias (e.g., sensor drift, operational environment shifts) and implement stratified sampling or synthetic data generation tailored for fixed-point representation. Crucially, design the entire pipeline to minimize data volume and complexity to align with the STM32F4''s limited resources.'
  common_mistake: |
    **The Pitfall:** Designing data curation without internalizing the severe on-device constraints (168 MHz, 256 KB SRAM, no FPU).
    **The Rationale:** Candidates focus entirely on ML modeling best practices and ignore the embedded system's strict compute and memory limits.
    **The Consequence:** The collected data requires complex floating-point preprocessing or large time windows, resulting in a model that cannot physically run on the STM32F4.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Cortex-M4 STM32F4 (168 MHz, 256 KB SRAM, no FPU).
       - Sensor: 2 channels, 16 kHz sampling, 16-bit resolution.
       - OS/Engine Overhead: 128 KB.
    2. **Calculations:**
       - Available SRAM: 256 KB Total - 128 KB Overhead = 128 KB.
       - Raw Data Rate: 16,000 samples/sec × 2 bytes/sample × 2 channels = 64 KB/sec.
       - Max Window Size (Memory Limit): 128 KB / 64 KB/sec = 2.0 seconds.
       - Practical Window limit (leaving 64 KB for features): 64 KB / 64 KB/sec = 1.0 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Strict memory limit restricts raw buffering; requires continuous fixed-point feature extraction.** **Result: Memory-Bound System Design.**
