title: The DMA Ping-Pong Desync
scenario: >
  You are capturing 16 kHz audio using I2S and DMA on an STM32 with a Ping-Pong double-buffer. DMA writes to Buffer A, fires 'Half-Transfer', then Buffer B, firing 'Full-Transfer'. You process data in the main loop. After a few hours, the audio sounds garbled, like small chunks of time are missing.
question: Why does a 1024-sample I2S ping-pong buffer corrupt audio when inference takes 65 ms?
details:
  realistic_solution: >
    You suffered a Main Loop Processing Overrun. Because hardware I2S DMA is relentless, the CPU must consume the active half-buffer before the DMA peripheral wraps around and overwrites it. If inference latency exceeds the hardware fill rate, silent data corruption occurs systematically.
  common_mistake: |
    **The Pitfall:** Assuming the DMA peripheral drops bytes.
    **The Rationale:** Software engineers assume dynamic buffering handles latency spikes, ignoring the strict real-time rigidness of hardware-driven peripherals.
    **The Consequence:** Misdiagnosing hardware faults instead of fixing the critical real-time software scheduling failure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Audio: 16 kHz. Half-Buffer: 1024 samples.
       - Inference Latency: 65 ms.
    2. **Calculations:**
       - Half-Buffer Fill Time: 1024 samples / 16,000 Hz = 0.064 seconds (64 ms).
       - Overrun: 65 ms (Inference) > 64 ms (Deadline).
    3. **Conclusion & Interpretation:**
       - **Result: CPU misses deadline by 1 ms.** The DMA overwrites the buffer before the CPU finishes, tearing the audio. **Bottleneck: Real-Time Compute Deadline.**
