title: IMU Gesture Dataset Storage Budget for ESP32-S3 PSRAM
scenario: You are curating training data for a gesture recognition model on ESP32-S3. Each sample is 1-second of IMU data (accelerometer + gyroscope, 100Hz, 6-axis).
question: How would you estimate storage requirements for 10K training samples and determine whether they fit in the 8MB PSRAM for on-device training?
details:
  realistic_solution: Each 1-second IMU sample has 100 timesteps x 6 axes = 600 values. For 10,000 samples, float32 storage is 600 x 4 x 10,000 = 24,000,000 bytes, about 24 MB, so it does not fit in 8 MB PSRAM. Int16 storage is 12 MB and also does not fit. Int8 storage is 6 MB, which fits in 8 MB PSRAM with about 2 MB left for indexing and staging, though training may still need to stream minibatches into SRAM.
  common_mistake: |
    **The Pitfall:** Confusing fast SRAM limits with PSRAM capacity and defaulting to float32 datasets.
    **The Rationale:** Engineers assume training must occur entirely in SRAM and use float32, ignoring the massive 8 MB PSRAM available for data staging.
    **The Consequence:** Incorrectly concluding on-device training is impossible because unquantized data blows past memory limits, when INT8 storage would make it feasible.
  napkin_math: |
    **Assumptions & Constraints:**
    - IMU: 100 Hz, 6-axis, 1-second samples. Total samples: 10,000.
    - PSRAM constraint: 8 MB limit.

    **Calculations:**
    - Values per sample: 100 * 6 = 600 values.
    - Float32 size: 600 * 4 bytes = 2,400 bytes/sample. Total = 24,000,000 bytes, about 24 MB (> 8 MB).
    - Int16 size: 600 * 2 bytes = 1,200 bytes/sample. Total = 12,000,000 bytes, about 12 MB (> 8 MB).
    - Int8 size: 600 * 1 byte = 600 bytes/sample. Total = 6,000,000 bytes, about 6 MB (< 8 MB).

    **Conclusion & Interpretation:**
    - **Result: Float32 and Int16 do not fit; Int8 is about 6 MB and fits in 8 MB PSRAM.** The storage budget is memory-capacity-bound, with only limited headroom for metadata and minibatch staging.
