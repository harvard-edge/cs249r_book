title: Optimizing TinyML Data Labeling for nRF5340 Resource Constraints
scenario: Your team is developing a real-time anomaly detection system for industrial sensors using a Nordic nRF5340 SoC (128 MHz Cortex-M33, 256 KB SRAM, 1 MB flash). The model exhibits a high rate of false positives in new environments. The active learning pipeline, designed to incorporate new data, is struggling to select diverse samples for annotation without overwhelming the device's memory or BLE bandwidth.
question: Why does the current active learning pipeline fail under BLE and memory limits, and how should data selection be optimized?
details:
  realistic_solution: Implement a lightweight, on-device active learning sampling strategy focusing on highly informative, low-redundancy data points. This could involve using simple statistical measures (e.g., entropy-based uncertainty sampling on compressed features) directly on the nRF5340's application core to identify salient data. Instead of transmitting raw sensor data, send only compressed feature vectors or metadata (e.g., uncertainty scores, cluster centroids) to a central annotation server via BLE. Prioritize inter-annotator agreement on edge cases and rare events identified by the active learning loop, and use few-shot learning techniques to leverage small, high-quality labeled datasets efficiently.
  common_mistake: |
    **The Pitfall:** Implementing standard cloud-based active learning strategies on edge devices.
    **The Rationale:** Assuming it is feasible to store large pools of unlabeled raw data or transmit high volumes of raw sensor data for uncertainty sampling.
    **The Consequence:** The system runs out of SRAM for buffering or exhausts the battery attempting to transmit raw data over BLE.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total SRAM: 256 KB.
    - Naive sample size: 100 bytes (raw).
    - Optimized sample size: 10 bytes (compressed feature vector).
    - Buffer target: 1,000 raw samples vs 100 salient samples.

    **Calculations:**
    - Naive Approach Memory: 1,000 samples * 100 bytes = 100 KB (~40% of total SRAM).
    - Optimized Approach Memory: 100 samples * 10 bytes = 1 KB.

    **Conclusion & Interpretation:**
    - **Result: 100x SRAM Reduction (Memory Capacity-Bound)**. Compressing and filtering salient points on-edge prevents out-of-memory errors and keeps BLE transmission feasible.
