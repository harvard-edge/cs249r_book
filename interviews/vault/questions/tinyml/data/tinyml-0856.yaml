title: TinyML Training Data Constraints for Cortex-M4 Deployment
scenario: A model is targeting a Cortex-M4 (168MHz, 256KB SRAM) deployment.
question: What are the three key data constraints that differ from cloud ML training, and why does each matter for model accuracy?
details:
  realistic_solution: 'Three constraints: (1) Memory: training data must fit in external flash or be streamed — can''t hold 10M samples in 256KB SRAM. (2) Feature format parity: training features must exactly match MCU fixed-point MFCC format. (3) Data scarcity: embedded deployments often have hundreds not millions of labeled samples.'
  common_mistake: |
    **The Pitfall:** Listing only memory as a constraint.
    **The Rationale:** Candidates forget that inference feature formats must exactly match training, and that few-shot data limits are prevalent at the edge.
    **The Consequence:** Deployed models suffer significant accuracy drops or fail to train properly on limited embedded data.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4 deployment has 256 KB SRAM, so data cannot be treated like a cloud-scale in-memory corpus.
    - Training and inference must use the same fixed-point feature extraction path.
    - Labeled embedded-domain samples are usually scarce.

    **Calculations:**
    - Memory/storage: raw examples and intermediate features must be streamed or stored in flash/external memory rather than assumed resident in SRAM.
    - Feature parity: MCU MFCC/windowing/quantization must be reproduced during training; even small preprocessing mismatches can reduce deployed accuracy.
    - Label scarcity: with hundreds rather than millions of examples, validation splits, augmentation, and transfer learning matter more than brute-force data scaling.

    **Conclusion & Interpretation:**
    - **Result: three data constraints: memory/storage limits, exact feature-format parity, and scarce labeled data**. These constraints matter because they determine whether the trained model sees the same distribution and representation that the MCU will actually execute.
