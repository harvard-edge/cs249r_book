title: The Ghost Drift
scenario: You are building a multimodal model that fuses Audio and Accelerometer data.
  Both sensors are connected to the same microcontroller. In long recordings, you
  notice that the audio and motion events slowly drift apart until they are seconds
  out of sync.
question: Based on the clock diagram, why is a single crystal failing to keep them
  aligned?
details:
  realistic_solution: You have **Clock Divider Rounding Error**. Microcontrollers
    use integer dividers. If a peripheral requires a 62.5 divider to hit a target
    frequency, but the hardware can only use 62 or 63, the sensor will run slightly
    too fast or too slow. Over time, these sub-millisecond errors accumulate into
    seconds of drift. The fix is to use a **Shared PPS (Pulse Per Second)** signal
    to hardware-timestamp every buffer, allowing the ML model to realign the data
    in software.
  common_mistake: '**The Pitfall:** Assuming the sensors are drifting because they
    use physically different oscillators.

    **The Rationale:** Candidates know that multiple distinct crystals drift thermally
    over time, but fail to read the prompt specifying they share a single crystal.

    **The Consequence:** Hardware teams waste time trying to match oscillator tolerances
    when the problem is fundamentally a digital rounding error in the MCU''s clock
    dividers.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - Architecture: Audio and Accelerometer\
    \ sharing a single crystal oscillator.\n   - Hardware Dividers: Integer dividers\
    \ only. Target frequency requires 62.5 divider, hardware uses 62.\n   - Time Window:\
    \ 100 ms blocks.\n2. **Calculations:**\n   - Target Divider: 62.5. Actual Divider:\
    \ 62.\n   - Rounding Error: 0.5 / 62.5 = 0.8% drift.\n   - Error Accumulation:\
    \ 0.008 × 600 seconds (10 minutes) = 4.8 seconds.\n3. **Conclusion & Interpretation:**\n\
    \   - **Result: Sub-millisecond rounding errors accumulate to 4.8 seconds over\
    \ 10 minutes.** **Result: Hardware Clock Drift.**\n"
