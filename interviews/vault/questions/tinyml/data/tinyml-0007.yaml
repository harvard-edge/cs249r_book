title: The Ghost Drift
scenario: You are building a multimodal model that fuses Audio and Accelerometer data. Both sensors are connected to the same microcontroller. In long recordings, you notice that the audio and motion events slowly drift apart until they are seconds out of sync.
question: Why do shared-crystal audio and accelerometer streams drift apart over long recordings?
details:
  realistic_solution: You have **Clock Divider Rounding Error**, not a bad crystal. Microcontrollers often derive peripheral clocks through integer dividers. If one sensor path needs a 62.5 divider but the hardware can only use 62 or 63, that peripheral runs at a slightly different effective sample rate even though both paths start from the same oscillator. Hardware timestamps or a PPS-style marker can align streams at known instants, but they do not correct the ongoing rate mismatch; use a shared sample clock, a fractional divider, or resample one stream against hardware timestamps.
  common_mistake: |
    **The Pitfall:** Assuming the sensors are drifting because they use physically different oscillators.
    **The Rationale:** Candidates know that multiple distinct crystals drift thermally over time, but fail to read the prompt specifying they share a single crystal.
    **The Consequence:** Hardware teams waste time trying to match oscillator tolerances when the problem is fundamentally a digital rounding error in the MCU's clock dividers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Architecture: Audio and Accelerometer sharing a single crystal oscillator.
    - Hardware Dividers: Integer dividers only. Target frequency requires 62.5 divider, hardware uses 62.
    - Time Window: 10 minutes.
    **Calculations:**
    - Target Divider: 62.5. Actual Divider: 62.
    - Ideal sample clock is proportional to 1 / 62.5.
    - Actual sample clock with divider 62 is proportional to 1 / 62.
    - Relative rate error: (62.5 / 62) - 1 = 0.00806 = 0.806%.
    - Drift Accumulation: 0.00806 x 600 seconds = 4.84 seconds.
    **Conclusion & Interpretation:**
    - **Result: Divider Quantization Drift.** A 0.806% sample-rate mismatch accumulates to about 4.8 seconds over 10 minutes. Timestamps help measure and align the streams, but corrected clocking or resampling is needed to remove drift.
