title: The Ghost Drift
scenario: You are building a multimodal model that fuses Audio and Accelerometer data. Both sensors are connected to the same microcontroller. In long recordings, you notice that the audio and motion events slowly drift apart until they are seconds out of sync.
question: Based on the clock diagram, why is a single crystal failing to keep them aligned?
details:
  realistic_solution: You have **Clock Divider Rounding Error**. Microcontrollers often derive peripheral clocks through integer dividers. If one sensor path needs a 62.5 divider but the hardware can only use 62 or 63, that peripheral runs at a slightly different effective sample rate even though both paths start from the same crystal. The primary fix is to put the sensors in a shared clock domain or resample one stream against hardware timestamps from the actual sample clocks; a PPS-style timestamp can help alignment, but it does not remove the divider error by itself.
  common_mistake: |
    **The Pitfall:** Assuming the sensors are drifting because they use physically different oscillators.
    **The Rationale:** Candidates know that multiple distinct crystals drift thermally over time, but fail to read the prompt specifying they share a single crystal.
    **The Consequence:** Hardware teams waste time trying to match oscillator tolerances when the problem is fundamentally a digital rounding error in the MCU's clock dividers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Architecture: Audio and Accelerometer sharing a single crystal oscillator.
    - Hardware Dividers: Integer dividers only. Target frequency requires 62.5 divider, hardware uses 62.
    - Time Window: 10 minutes.
    **Calculations:**
    - Target Divider: 62.5. Actual Divider: 62.
    - Rounding Error: 0.5 / 62.5 = 0.8% drift.
    - Error Accumulation: 0.008 x 600 seconds = 4.8 seconds.
    **Conclusion & Interpretation:**
    - **Result: Divider Quantization Drift.** A 0.8% sample-rate error accumulates to 4.8 seconds over 10 minutes, so long recordings require corrected clocking, resampling, or timestamp-based alignment.
