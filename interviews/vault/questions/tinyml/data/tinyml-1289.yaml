title: Dataset Specification for Constrained INT8 Acoustic Models
scenario: You are tasked with specifying the dataset curation and labeling pipeline for an acoustic anomaly detection model targeting an ARM Cortex-M7 + Ethos-U55 (Corstone-300) system. The hardware has a strict limit of 512 KB shared SRAM, meaning the model must be heavily quantized to INT8 to fit and to leverage the NPU's MAC array. Given the extremely constrained capacity of the final model, design a dataset selection and active learning strategy that balances diverse background noises against the severe risk of underfitting.
question: How do you specify the curation workflow to ensure the resulting dataset yields a robust INT8-quantized model optimized for the Ethos-U55?
details:
  realistic_solution: |
    Specify a curation loop that starts with deployment-relevant audio across devices, rooms, background noises, and operating conditions, then uses error analysis to mine hard negatives that actually cause false positives in the target environment. Keep the constrained model's capacity in mind: add diverse noise coverage deliberately, but do not flood training with rare backgrounds that dilute the target anomaly patterns. The labeling guide should define consistent event boundaries, overlap rules, minimum event duration, and ambiguous-label handling. For INT8 calibration, reserve a representative subset that captures activation ranges across normal, anomalous, quiet, and noisy conditions; it should reflect deployment statistics well enough for quantization, but it does not need to be perfectly matched or strictly class-balanced.
  common_mistake: |
    **The Pitfall:** Proposing massive, highly diverse datasets typical of cloud ML, and overlooking the need to curate a specific calibration subset.
    **The Rationale:** Candidates ignore that a deeply constrained INT8 model lacks the capacity to learn overly complex, noisy distributions.
    **The Consequence:** This leads to severe underfitting and failure during the offline quantization process.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: ARM Cortex-M7 + Ethos-U55 with 512 KB shared SRAM.
    - Calibration examples: 500 one-second clips.
    - Audio format for offline storage estimate: 16 kHz, 16-bit mono PCM.

    **Calculations:**
    - 1-second clip size: 16,000 samples * 2 bytes = 32,000 bytes, about 31.25 KiB.
    - 500-clip calibration subset: 500 * 32,000 bytes = 16,000,000 bytes, about 15.3 MiB offline.
    - This dataset is used during training/quantization tooling; it is not stored in the 512 KB device SRAM for inference.

    **Conclusion & Interpretation:**
    - **Result: about 15.3 MiB offline calibration audio under the stated PCM assumption (Curation-Bound)**. The key requirement is representative activation coverage and targeted hard-negative selection, not perfect class balance or deriving inference memory pressure from dataset size.
