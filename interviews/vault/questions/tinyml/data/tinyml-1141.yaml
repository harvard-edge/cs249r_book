title: Dual-Core BLE Streaming Architecture Evaluation
scenario: You are deploying a continuous gesture recognition model on a Nordic nRF5340. The sensor samples 6-axis IMU data at 200 Hz. Option A has the app core read the I2C sensor via DMA, buffer raw data, run inference, and batch predictions/data via IPC to the network core for BLE transmission. Option B has the network core handle I2C directly, streaming raw data immediately, and selectively waking the app core.
question: How would you evaluate which architecture is better for maximizing battery life (~5mA active current constraint) while ensuring no dropped packets during high-throughput BLE streaming?
details:
  realistic_solution: Option A is superior. The 128 MHz app core should handle I2C ingestion using EasyDMA directly into its 256 KB SRAM, allowing the CPU to sleep during transfers. The app core can run inference quickly and then batch both predictions and compressed raw data over IPC to the 64 MHz network core only when a BLE connection event approaches. This keeps the network core's BLE stack unblocked and allows both cores to maximize their sleep states.
  common_mistake: |
    **The Pitfall:** Choosing Option B to "offload" I2C to the network core.
    **The Rationale:** Candidates assume offloading peripheral management to the slower core always saves power, failing to realize the network core should remain asleep to respect strict BLE timing constraints and save overall system energy.
    **The Consequence:** Keeping the network core unnecessarily active, draining the battery rapidly and risking BLE stack packet drops.
  napkin_math: |
    **Assumptions & Constraints:**
    - 200 Hz 6-axis IMU (16-bit). 4 KB buffer. App core (128 MHz, ~10ms inference). Option B continuous Net core (64 MHz, ~5mA active). Option A batched IPC.

    **Calculations:**
    - Data rate = 200 * 6 * 2 bytes = 2400 bytes/sec. Time to fill 4 KB = 4096 / 2400 ≈ 1.7 seconds. Option B continuous draw = 5mA. Option A duty cycle = ~5ms active every ~1.7s. 5mA * (5/1700) = 0.014mA (14 µA) avg.

    **Conclusion & Interpretation:**
    - **Result: Batched IPC drops network core current to ~14 µA (Energy-Bound Architecture)**.
