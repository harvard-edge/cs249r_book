title: 'Active Learning Pipeline for nRF5340 Wearable'
scenario: 'You are designing a data collection and active learning pipeline for a continuous anomaly detection wearable using the Nordic nRF5340. The device features a 128 MHz app core, 64 MHz net core, 256 KB SRAM, 1 MB flash, and uses BLE 5.3 with a ~5mA active current. Continuous raw data streaming drains the battery too quickly.'
question: 'How should an nRF5340 wearable selectively buffer and transmit active-learning samples without draining the battery?'
details:
  realistic_solution: 'A strong design implements a lightweight confidence-threshold filter (e.g., simple softmax entropy or reconstruction error) on the 128 MHz app core to identify out-of-distribution or uncertain samples. Only these high-value snippets are buffered in the limited SRAM and transmitted via BLE 5.3 during periodic connection intervals. The cloud pipeline then routes these specific hard examples to expert annotators, ensuring the curated dataset grows with maximal information density while preserving the wearable''s strict energy and memory constraints.'
  common_mistake: 'Candidates often propose running heavy uncertainty estimation algorithms (like deep ensembles) on-device, which exceeds the 256 KB SRAM and spikes power consumption. Another mistake is relying on continuous data streaming for labeling, failing to realize the constant BLE transmission will exhaust the limited battery budget.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Sensor Rate: 250 Hz (16-bit).
    - Event Window: 2 seconds.
    - SRAM capacity: 256 KB.

    **Calculations:**
    - Continuous data rate = 250 * 2 bytes * 3600s = 1.8 MB/hour.
    - Event size = 250 Hz * 2 seconds * 2 bytes = 1,000 bytes (~1 KB).
    - Active learning sample rate (10 events/hr) = 10 * 1 KB = 10 KB/hour.
    - SRAM usage per event = 1 KB / 256 KB = 0.39%.

    **Conclusion & Interpretation:**
    - **Result: 10 KB/hour (Bandwidth-Bound)**. Selectively transmitting only uncertain samples reduces BLE bandwidth by 180x while consuming less than 1% of the available SRAM.
