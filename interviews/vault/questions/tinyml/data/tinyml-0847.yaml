title: 'Dataset Curation: Design Training Data Pipeline for MCU Keyword Spotting'
scenario: >
  You are training a 12-class keyword spotting model to deploy on a Cortex-M4.
question: How would you design the training data collection and curation pipeline that produces balanced training data suitable for this ultra-constrained deployment context?
details:
  realistic_solution: |
    Collect: 1,000+ samples/keyword in diverse environments. Augment: background noise (SNR 0-20dB), speed perturbation (+/-10%), room impulse response convolution. Feature: 40-dim MFCC, 25ms window, 10ms hop, 1-second clip = 99 frames * 40 = 3,960 floats. Balance: 10K samples/class.
  common_mistake: |
    **The Pitfall:** Collecting data exclusively in clean studio conditions and ignoring the deployment target's feature extraction logic.
    **The Rationale:** Data engineers assume clean audio makes for better models, forgetting the harsh acoustic reality of embedded deployments.
    **The Consequence:** The model fails completely in noisy real-world environments.
  napkin_math: |
    **Assumptions & Constraints:**
    - 12 classes, 10K samples/class.
    - Audio: 1-second at 16kHz (32KB raw).
    - M4 Compute: 168MHz, ~10ms compute budget per frame.

    **Calculations:**
    - Dataset size: 120K samples.
    - Raw storage: 120K * 32KB = 3.84 GB.
    - MCU Inference Feature Extraction: 99 frames * 40-dim MFCC.
    - FFT-512 cost: 9 * 512 = 4,608 FLOPs.
    - Available M4 FLOPs in 10ms: 1.68M FLOPs.

    **Conclusion & Interpretation:**
    - **Result: Compute-Feasible**. Feature extraction comfortably fits within the 10ms real-time budget.
