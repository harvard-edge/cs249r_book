title: Optimizing Window Annotations for NPU SRAM
scenario: We are deploying a predictive maintenance vibration model. The original dataset was annotated with broad 2.0-second event windows, leading to an input size that consumes 450 KB of the shared 512 KB SRAM for intermediate activations, causing frequent out-of-memory errors. A data audit reveals the actual mechanical fault transients last only 0.4 seconds.
question: How do you adjust the annotation workflow to resolve this hardware bottleneck, and what is the quantified impact?
details:
  realistic_solution: Implement a re-annotation workflow to label tight 0.4-second bounding boxes around the transient fault signatures, discarding the irrelevant 2.0-second padding. By retraining the model on this curated, tightly-cropped dataset, the temporal dimension of the input is reduced by 5x. The quantified impact is that intermediate activations drop from 450 KB to 90 KB, freeing 360 KB of the 512 KB SRAM budget, while compute drops from about 10M MACs to 2M MACs before fixed overheads.
  common_mistake: |
    **The Pitfall:** Jumping immediately to model compression techniques.
    **The Rationale:** Candidates suggest aggressive quantization or depthwise-separable convolutions, missing that the root cause is a poorly scoped dataset annotation strategy.
    **The Consequence:** Deploying complex model architectures when simply tightening the annotation windows would solve the memory bottleneck far more effectively.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original SRAM Footprint (2.0s): 450 KB.
    - New Window: 0.4s.
    - Original compute: 10M MACs, assumed proportional to window length.
    - NPU throughput must be taken from the compiled deployment profile; peak hardware rates give only a lower-bound time.

    **Calculations:**
    - Window Reduction: 2.0s / 0.4s = 5x reduction.
    - New SRAM Footprint: 450 KB / 5 = 90 KB (frees 360 KB).
    - Compute Drop: 10M MACs -> 2M MACs.
    - At an optimistic 122.8 GMAC/s peak, 2M MACs / 122,800M MAC/s = 16.3 µs as a lower bound; real latency will be higher after memory traffic and operator overhead.

    **Conclusion & Interpretation:**
    - **Result: 90 KB activations and 2M MACs.** Tightening the annotation window directly resolves the 450 KB activation bottleneck by freeing 360 KB of SRAM and gives a 5x proportional compute reduction, with final latency confirmed by deployment profiling.
