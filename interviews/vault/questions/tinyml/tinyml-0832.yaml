title: TinyML Saturation Diagnosis
scenario: A TinyML audio classifier drops from 94% to 70% accuracy after INT8 quantization. Logs show many intermediate values at +127 during loud environments. Analyze the likely cause.
question: What does frequent +127 saturation indicate after INT8 quantization of a TinyML audio classifier?
details:
  realistic_solution: Values at +127 indicate activation clipping at the INT8 maximum. Loud environments exceed the calibrated dynamic range, so information is lost. The fix is better representative calibration, adjusted scaling, or quantization-aware training.
  common_mistake: |
    **The Pitfall:** Treating saturation as a harmless integer artifact.
    **The Rationale:** Engineers unfamiliar with low-precision integer arithmetic may ignore clipping if no explicit errors are thrown.
    **The Consequence:** Information is irreversibly lost, causing silent accuracy degradation.
  napkin_math: |
    1. **Assumptions & Constraints:** INT8 signed range is -128 to +127. Target is audio classifier.
    2. **Calculations:** A spike at +127 means the signal amplitude exceeds the calibration range.
    3. **Conclusion & Interpretation:** **Activation clipping destroys signal variance, degrading accuracy. Result: Numerical Overflow.**
