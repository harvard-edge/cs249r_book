title: The CPU Cycle Thief
scenario: Your keyword spotting model needs 40ms to run, and your frame deadline is 50ms. On paper, this fits. But in practice, the system crashes every few seconds. Based on the timeline, an I2C ISR is running frequently.
question: Which 100 kHz I2C ISR workload steals enough cycles to break a 40 ms KWS model with a 50 ms deadline?
details:
  realistic_solution: You are suffering from **Blocking ISR Overruns**. The system executes slow, blocking I2C sensor reads inside an Interrupt Service Routine (ISR). While the ISR runs, the main ML loop is completely halted. If I2C takes 5ms and fires frequently, it consumes the 10ms of margin you thought you had. The fix is to use **DMA (Direct Memory Access)** for sensor reads so the CPU can keep doing ML math while the hardware handles the data transfer.
  common_mistake: |
    **The Pitfall:** Assuming the processor isn't fast enough and blindly increasing the clock speed.
    **The Rationale:** Candidates fail to recognize Blocking ISR Overruns, where slow hardware protocols (like I2C) executed inside an interrupt completely halt the main execution thread.
    **The Consequence:** The system continues to crash randomly due to jitter, even on faster microcontrollers, until DMA is implemented.
  napkin_math: |
    *   **I2C Bandwidth:** 100 kHz = ~10 kB/s.
    *   **Blocking Read Cost:** Reading 64 bytes inside the ISR takes (64 * 8) / 100,000 = 5.12 ms.
    *   **Window Overhead:** If audio is fetched every 10ms, a 50ms window contains 5 reads = 25.6 ms of blocked CPU time.
    *   **Remaining CPU:** 50 ms - 25.6 ms = 24.4 ms.
    *   **Conclusion:** The 40ms model fails the deadline by 15.6 ms. The fix is to use **DMA**.
