title: Cortex-M4 Flash vs SRAM execution
scenario: A 100KB ECG model takes 2 cycles/word to load from Flash, but 1 cycle/word from SRAM. Computations require iterating over weights.
question: "What is the execution cycle difference between streaming directly from Flash for 5 passes versus copying the 100KB model to SRAM once?"
details:
  realistic_solution: Direct execution from Flash requires reading the weights for every pass. At 2 cycles per word, reading 100KB (25,000 32-bit words) takes 50,000 cycles per pass. Copying to SRAM takes 50,000 cycles upfront. Once in SRAM, reading takes 1 cycle per word (25,000 cycles). By the 5th pass, the upfront copy strategy massively outperforms direct execution due to memory bandwidth optimization and avoiding the Flash wait-state penalty in the inner loops.
  common_mistake: |
    **The Pitfall:** Incorrectly treating bytes as the unit of memory cycles instead of 32-bit words.
    **The Rationale:** Candidates fail to account for the fact that a 100KB model is actually 25,000 32-bit words.
    **The Consequence:** They calculate cycle times that are 4x higher than reality, leading to incorrect performance estimations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 100KB (25,000 32-bit words).
       - Flash read: 2 cycles/word.
       - SRAM read: 1 cycle/word.
       - Execution: 5 passes over weights.
    2. **Calculations:**
       - Flash direct (5 passes): 5 * 25,000 * 2 = 250,000 cycles.
       - SRAM upfront copy: 25,000 * 2 = 50,000 cycles.
       - SRAM execution (5 passes): 5 * 25,000 * 1 = 125,000 cycles.
       - Total SRAM strategy: 50,000 + 125,000 = 175,000 cycles.
       - Difference: 250,000 - 175,000 = 75,000 cycles.
    3. **Conclusion & Interpretation:**
       - **Result: Copying to SRAM saves 75,000 cycles (Memory-Bound Optimization).**
