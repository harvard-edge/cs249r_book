title: Cortex-M4 TinyML Memory Partitioning
scenario: A TinyML model requires 300 KB of memory for weights and activations combined. A Cortex-M4 microcontroller has exactly 256 KB of fast SRAM and 1 MB of slower Flash memory. The model activations require 80 KB.
question: Explain how to partition the model between SRAM and Flash to ensure it runs, identifying the minimum required amount of weights stored in Flash.
visual:
  kind: svg
  path: tinyml-1570.svg
  alt: A stacked bar chart comparing the 256KB SRAM capacity with the distribution of the 300KB model footprint.
  caption: SRAM Allocation Strategy
details:
  realistic_solution: 'Activations are mutable and must reside in SRAM. The 80 KB of activations leaves 256 KB - 80 KB = 176 KB of SRAM available for weights. Since total weights are 300 KB - 80 KB = 220 KB, at least 220 KB - 176 KB = 44 KB of weights must reside permanently in the read-only Flash memory.'
  common_mistake: |
    **The Pitfall:** Placing mutable activations in read-only memory.
    **The Rationale:** Engineers simply look at the total 300 KB footprint and randomly partition it without separating mutable state (activations) from immutable state (weights).
    **The Consequence:** Placing activations in Flash is physically impossible due to write-cycle latency and read-only constraints, causing immediate runtime faults.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model footprint: 300 KB total.
    - Activations: 80 KB (Must be in SRAM).
    - MCU: 256 KB SRAM, 1 MB Flash.

    **Calculations:**
    - Total weights: 300 KB - 80 KB = 220 KB.
    - SRAM available for weights: 256 KB (Total SRAM) - 80 KB (Activations) = 176 KB.
    - Minimum weights forced to Flash: 220 KB - 176 KB = 44 KB.

    **Conclusion & Interpretation:**
    - **Result: 44 KB (Storage-Bound)**. At least 44 KB of weights must be statically compiled into the read-only Flash memory to prevent SRAM overflow.
