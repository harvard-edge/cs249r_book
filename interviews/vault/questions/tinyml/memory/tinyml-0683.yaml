title: The TinyML Conversational AI Memory Wall
scenario: 'You are the firmware architect for a new offline-first smart appliance. The flagship feature is a ''Verbal User Manual'': users can ask the device questions and a tiny generative model provides a spoken answer. The system runs on a single microcontroller with 480 KB of SRAM and 2 MB of Flash; there is no cloud connection.'
question: How should the system handle conversational context and follow-up questions within the strict 480 KB SRAM and 2 MB Flash constraints?
details:
  realistic_solution: "The correct architectural approach treats the limited SRAM as a 'L1 cache' and the larger on-chip Flash as 'L2' or 'swap space' for the conversational context. The key is to implement a paged KV-cache system orchestrated by DMA."
  common_mistake: |
    **The Pitfall:** Declaring the problem impossible or severely compromising the feature (e.g., limiting history to 3 turns).
    **The Rationale:** Not thinking of the entire memory hierarchy as a tiered cache and failing to leverage hardware features like DMA.
    **The Consequence:** Delivering a poor user experience or unnecessarily abandoning a flagship feature.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 480KB SRAM, 2MB Flash.
    - Model: ~500K INT4 parameters.
    - KV Cache: 2 (K,V) * 4 layers * 4 heads * 32 dim * 1 byte = 1024B (1KB) per token.

    **Calculations:**
    - Model Storage: ~500K INT4 = 250KB in Flash.
    - SRAM Budget: ~200KB for arena, ~200KB for KV pages.
    - Max tokens in SRAM: 200KB / 1KB/token = 200 tokens.
    - Flash read ~50ns/byte -> 1KB page = 50µs overhead.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound (Requires paging KV cache to Flash via DMA).**
