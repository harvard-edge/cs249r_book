title: LSTM Memory Layout Constraints on MCU
scenario: You are analyzing memory layouts for an LSTM sequence model running locally on a Cortex-M4.
question: How do the memory hierarchy layout requirements contrast between the LSTM's hidden state and the model's weight matrices?
details:
  realistic_solution: LSTM weights are read-only and persist across inferences, so they belong in non-volatile Flash memory. The hidden state dynamically updates every sequence step, requiring high-speed read/write access, mandating placement in volatile SRAM. Thus, max hidden size is bounded by SRAM, while layer count is bounded by Flash.
  common_mistake: |
    **The Pitfall:** Attempting to store the mutable hidden state in Flash memory.
    **The Rationale:** Candidates group all model parameters together, forgetting that LSTM hidden states are continuously updated.
    **The Consequence:** The system suffers severe write endurance degradation and latency bottlenecks when writing to Flash.
  napkin_math: |
    **Assumptions & Constraints:**
    - Weights: Read-only (~1 MB).
    - Hidden State: Read/Write (~128 KB).

    **Calculations:**
    - Flash Write Latency: Orders of magnitude slower than SRAM.
    - SRAM Bandwidth: Nanosecond-level read/write.

    **Conclusion & Interpretation:**
    - **Result: Storage-Bound**. Max hidden size is strictly bounded by SRAM capacity, while total layer count is bounded by Flash capacity.
