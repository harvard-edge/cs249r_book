title: SPI Polling Busy-Wait Bottleneck
scenario: Your TinyML vibration monitoring system uses a Cortex-M0+ (48 MHz, 32 KB SRAM) with an external accelerometer connected via SPI. The accelerometer produces 3-axis INT16 samples at 3.2 kHz. Your colleague reads each sample by polling the SPI data register in a busy-wait loop inside the main inference function. The system works, but inference latency is 3x worse than expected.
question: Why does busy-wait SPI polling make Cortex-M0+ vibration inference 3x slower than expected?
details:
  realistic_solution: 'Polling SPI stalls the CPU pipeline while the transfer completes, so the problem is CPU occupancy rather than raw SPI bandwidth. A 512-sample-group window contains 512 time steps * 3 axes * 2 bytes = 3,072 bytes. With a polling loop that costs about 156 cycles per 3-axis sample group, the CPU burns 79,872 cycles, or 1.66ms at 48MHz, before doing useful inference work. That overhead alone can explain a multi-x latency regression for a sub-millisecond kernel. Fix: configure SPI DMA to fill the sample buffer autonomously in the background. DMA setup is about 20 cycles (~0.4 microseconds), so the CPU no longer busy-waits through the I/O window.'
  common_mistake: |
    **The Pitfall:** Blaming the SPI bus bandwidth instead of CPU overhead.
    **The Rationale:** Candidates assume the 8 MHz SPI bus is too slow, overlooking that transferring 6 bytes takes only 6 µs, while busy-waiting stalls the CPU pipeline.
    **The Consequence:** Unnecessary hardware redesigns instead of implementing a simple DMA software fix.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M0+ at 48 MHz.
    - 512 three-axis sample groups per window.
    - Polling takes ~156 cycles per three-axis sample group.
    - DMA setup takes 20 cycles (~0.4 microseconds).

    **Calculations:**
    - Without DMA: 512 * 156 = 79,872 cycles.
    - Polling time: 79,872 / 48 MHz = 1.66 ms of CPU busy-wait overhead.
    - DMA setup time: 20 / 48 MHz = 0.00042 ms.
    - CPU time saved by DMA: about 1.66 ms - 0.00042 ms ≈ 1.66 ms per window.

    **Conclusion & Interpretation:**
    - **Result: ~1.66 ms of avoidable CPU stall per inference window (Polling-Overhead-Bound).** DMA removes the polling overhead, so the measured latency returns toward the compute-only expectation without changing the SPI bus.
