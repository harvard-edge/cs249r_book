title: The SRAM Tensor Arena Squeeze
scenario: You're deploying a KWS model via TFLite Micro (TFLM). An input audio spectrogram tensor is 40 KB. The second stage produces an intermediate feature tensor of 20 KB. The final stage produces a 10 KB output tensor with classification scores. TFLM requires both the input and output of a layer to be simultaneously present during calculation, but reuses memory when tensors are freed.
question: What is the minimum tensor arena size required when the 40 KB input, 20 KB intermediate, and 10 KB output tensors overlap?
details:
  realistic_solution: 'The tensor arena size is determined by the peak memory usage at any point during inference. The TensorFlow Lite for Micro memory planner calculates this high-water mark to allocate the smallest possible arena.

    1.  During the calculation of the intermediate tensor, both the 40 KB input and the 20 KB intermediate tensor must co-exist in memory. Peak usage: `40 KB + 20 KB = 60 KB`.

    2.  Once the intermediate tensor is calculated, the 40 KB input tensor is no longer needed for future steps.

    3.  During the calculation of the final output tensor, the 20 KB intermediate tensor and the 10 KB output tensor must co-exist. The memory from the original input tensor can be reused for the output tensor. Peak usage for this stage: `20 KB + 10 KB = 30 KB`.

    The overall minimum size for the arena is the maximum of these peaks, which is 60 KB.'
  common_mistake: |
    **The Pitfall:** Summing the sizes of all tensors together (40 + 20 + 10 = 70 KB).
    **The Rationale:** Engineers assume the tensor arena must hold all variables simultaneously, forgetting the purpose of the memory planner is lifecycle reuse.
    **The Consequence:** The required memory footprint is vastly overestimated, causing models to be rejected for hardware they actually fit on.
  napkin_math: |
    **Assumptions & Constraints:**
    - TFLM memory planner allocates a flat arena.
    - Memory is sequentially reused based on tensor lifecycles.
    - Tensors: Input (40 KB), Intermediate (20 KB), Output (10 KB).

    **Calculations:**
    - Stage 1 (Input → Intermediate): Requires Input + Intermediate in memory.
    - Peak 1 = 40 KB + 20 KB = 60 KB.
    - Lifecycle Event: Input (40 KB) is freed.
    - Stage 2 (Intermediate → Output): Requires Intermediate + Output in memory.
    - Peak 2 = 20 KB + 10 KB = 30 KB.
    - Overall Minimum Arena Size: max(Peak 1, Peak 2) = max(60 KB, 30 KB) = 60 KB.

    **Conclusion & Interpretation:**
    - **Result: 60 KB (Memory-Capacity-Bound)**. The tensor arena requires a minimum of 60 KB to hold the maximum concurrent tensors during Stage 1.
  options:
  - 70 KB
  - 40 KB
  - 60 KB
  - 30 KB
  correct_index: 2
