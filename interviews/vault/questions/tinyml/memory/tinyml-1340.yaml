title: Optimizing Data Movement for TinyML Inference on Nordic nRF5340
scenario: You are tasked with deploying a tiny ML model for acoustic event detection on a Nordic nRF5340 (128 MHz Cortex-M33, 256 KB SRAM, 1 MB flash). The device captures audio from an I2S microphone at 16 kHz sample rate, 16-bit mono. The ML model requires 512-sample (1 KB) windows of audio data for inference, performing an inference every 32 ms. The results, a small classification vector, need to be periodically sent over BLE.
question: How should an nRF5340 pipeline I2S audio windows into an ML model and BLE output with minimal CPU copying?
details:
  realistic_solution: A realistic solution involves leveraging the nRF5340's DMA capabilities extensively. Implement a double-buffered DMA transfer from the I2S peripheral directly into two 1 KB regions of SRAM. While the I2S peripheral fills one buffer via DMA, the CPU can run inference on the other. Once inference is complete, the buffers swap. For the BLE transmission, if the classification vector is small, it can be copied directly into a BLE advertising or notification buffer. For larger data, a zero-copy approach could be explored if the BLE stack supports DMA directly from application memory. Memory for DMA buffers should be allocated from a non-cacheable or write-through region of SRAM (if cache is present and configurable) to ensure cache coherence. Pinned memory, while not strictly 'pinned' in the OS sense on an RTOS, implies ensuring these buffers are fixed in SRAM and not subject to relocation, which is typical for embedded DMA.
  common_mistake: |
    **The Pitfall:** Using CPU-intensive memcpy operations to move data between peripherals and model buffers.
    **The Rationale:** Candidates neglect memory alignment requirements for DMA or fail to employ double-buffering.
    **The Consequence:** Exhausting the CPU budget, leading to dropped I2S samples, increased inference latency, and missed BLE transmission windows.
  napkin_math: |
    **Assumptions & Constraints:**
    - I2S Rate: 16 kHz, 16-bit mono.
    - Window: 512 samples. Inference every 32 ms.

    **Calculations:**
    - I2S Data Rate: 16,000 * 2 = 32 KB/s.
    - Window Size: 512 * 2 = 1 KB.
    - CPU Copy Overhead: 1 KB * 4 cycles/byte = 4096 cycles per 32 ms (~0.128 MHz).

    **Conclusion & Interpretation:**
    - **Result: 2 KB SRAM for DMA double-buffers (CPU-Bound).** Zero-copy DMA prevents CPU exhaustion while handling continuous I2S streaming.
