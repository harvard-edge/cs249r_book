title: Optimizing Sensor Data Ingest for TinyML on ESP32-S3
scenario: 'You are deploying a real-time anomaly detection model on an ESP32-S3 microcontroller. The system continuously samples data from an external high-speed ADC, generating approximately 200KB of raw sensor data per inference cycle, processed every 50ms. Currently, data is transferred from the ADC to PSRAM, then copied byte-by-byte into internal SRAM before model inference, missing deadlines.'
question: 'How should ESP32-S3 DMA and buffering replace CPU copies for 200 KB sensor transfers in a 50 ms anomaly pipeline?'
details:
  realistic_solution: 'Leverage the ESP32-S3 DMA capabilities and memory-mapped IO. Configure the external ADC interface to use DMA to transfer data directly into a dedicated buffer in PSRAM using a ping-pong double-buffering scheme. For the model input, utilize zero-copy techniques where the inference engine directly accesses the sensor data in PSRAM. If a partial copy to SRAM is unavoidable, use DMA-capable memory regions and configure a DMA transfer from PSRAM to SRAM, allowing the CPU to prepare for the next inference cycle concurrently.'
  common_mistake: |
    **The Pitfall:** Relying solely on CPU-driven data copying between PSRAM and internal SRAM or using blocking I/O.
    **The Rationale:** Candidates fail to realize the immense CPU cycle cost of byte-by-byte copies for large datasets.
    **The Consequence:** The CPU is blocked from performing concurrent inference or other critical tasks, causing the pipeline to miss the 50ms deadline.
  napkin_math: |
    **Assumptions & Constraints:**
    - CPU-driven copy: 200 KB = 204,800 bytes.
    - CPU architecture: 240 MHz ESP32-S3.
    - Copy cost: Assuming 10 CPU cycles/byte.

    **Calculations:**
    - CPU cycles required: 204,800 * 10 = 2,048,000 cycles.
    - CPU time: 2,048,000 / 240,000,000 = 8.53 ms (wasting ~17% of the 50ms budget on data movement).
    - DMA transfer setup: <1 ms CPU overhead.

    **Conclusion & Interpretation:**
    - **Result: 8 ms saved ([I/O-Bound])**. Using DMA saves ~8 ms of CPU time, allowing parallel data acquisition and inference to meet the 50 ms deadline.
