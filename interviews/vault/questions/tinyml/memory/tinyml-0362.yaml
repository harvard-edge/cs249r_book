title: 'The TinyML Flash Budget: MCU Compute Constraints'
scenario: You're scoping a new audio keyword-spotting feature for a microcontroller with 1MB of Flash storage. State the formula for the usable model space and estimate the final available budget, accounting for typical system overhead.
question: What Flash budget remains for the ML model after bootloader, RTOS, runtime, OTA buffer, and app overhead on a 1MB MCU?
details:
  realistic_solution: |
    The available space is the total flash minus the bootloader, the Real-Time Operating System (RTOS), the inference runtime, and the OTA update buffer. On a typical 1MB device, this leaves significantly less than half the total space for the actual application code and ML model.
  common_mistake: |
    **The Pitfall:** Forgetting to budget for an Over-the-Air (OTA) update buffer.
    **The Rationale:** Engineers accustomed to larger systems with separate storage drives often forget that on microcontrollers, the new firmware image must be downloaded entirely into the same Flash storage before installation.
    **The Consequence:** Failing to account for A/B partitioning effectively halves the available space, leading to out-of-memory errors late in the development cycle.
  napkin_math: |
    1. Total Flash: 1,000 KB.
    2. Bootloader overhead: ~16 KB.
    3. RTOS + drivers overhead: ~64 KB.
    4. TFLM runtime overhead: ~50 KB.
    5. App code overhead: ~50 KB.
    6. OTA update buffer (A/B partitioning): ~500 KB (half of total flash).
    7. Total overhead = 16 + 64 + 50 + 50 + 500 = 680 KB.
    8. **Available budget for ML model = 1,000 KB - 680 KB = 320 KB.**
  options:
  - ~900 KB
  - ~750 KB
  - ~320 KB
  - ~256 KB
  correct_index: 2
