title: Diagnosing Fully Connected Layer Bottlenecks on STM32F4
scenario: You have deployed an INT8 neural network on a 168 MHz ARM Cortex-M4. Profiling reveals that while convolutional layers match expected SIMD execution times, a specific fully connected layer executes 4x slower than its MAC count predicts.
question: Why does a CMSIS-NN fully connected layer on the STM32F4 run 4x slower than its theoretical INT8 SIMD performance?
details:
  realistic_solution: The performance degradation is caused by an acute memory bandwidth bottleneck when fetching non-reusable weights directly from Flash. Convolutional layers exhibit high spatial reuse, effectively hiding memory latency. Conversely, fully connected layers process at a batch size of 1, requiring a unique weight fetch for every MAC. The STM32F4 Flash controller requires multiple wait states at 168 MHz, whereas internal SRAM is zero-wait-state. The CPU pipeline stalls continuously waiting for Flash reads.
  common_mistake: |
    **The Pitfall:** Misdiagnosing memory latency as a CPU compute limit.
    **The Rationale:** Candidates focus entirely on the CMSIS-NN library limits or the lack of an FPU, completely ignoring the microcontroller's memory hierarchy and Flash wait states.
    **The Consequence:** They waste weeks attempting to optimize assembly code or prune the network, failing to address the fundamental Flash read bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - 168 MHz Cortex-M4 executing CMSIS-NN SIMD (4 MACs per 2 compute cycles).
    - Fully connected layer = 1 weight byte fetched per MAC.
    - STM32F4 Flash requires 5 wait states at 168 MHz (6 cycles per 32-bit read).

    **Calculations:**
    - SRAM Execution: 1 cycle (32-bit load) + 2 cycles (Compute 4 MACs) = 3 cycles.
    - Flash Execution: 6 cycles (Flash load) + 2 cycles (Compute 4 MACs) = 8 cycles.
    - Performance Ratio: 8 cycles / 2 compute cycles = 4x slower than compute baseline.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound Stall**. The pipeline is entirely starved by the 6-cycle Flash wait states, perfectly explaining the observed 4x performance degradation.
