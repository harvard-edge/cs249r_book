title: 'The Execute-in-Place Energy Tax'
scenario: 'You deploy an audio wake-word model to a tiny hearing aid battery. The model weights are 1MB, so you use Execute-in-Place (XIP) to read weights directly from external NOR Flash over the SPI bus. Inference speed meets the deadline, but the battery dies in 2 days instead of the required 14 days.'
question: 'What physical hardware reality did you ignore that causes reading 1 MB over SPI NOR Flash to drain a battery in 2 days?'
details:
  realistic_solution: 'You fell victim to the Energy-Movement Invariant. Computing a math operation (a MAC) takes very little energy. Moving data is what drains batteries. Reading data from off-chip NOR Flash over physical SPI bus pins requires charging and discharging relatively massive external copper traces and PCB capacitance. Doing this for every single weight, on every single inference cycle, consumes orders of magnitude more power than reading from tightly integrated, on-chip SRAM.'
  common_mistake: |
    **The Pitfall:** Focusing solely on memory capacity and latency deadlines while ignoring the energy cost of data movement across physical buses.
    **The Rationale:** Candidates assume that if a model fits in Flash and executes fast enough, it is optimized, failing to account for the Energy-Movement Invariant.
    **The Consequence:** The system spends orders of magnitude more power physically charging and discharging PCB traces than doing AI math, catastrophically draining the battery.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M MAC operation cost ~1 pJ.
    - On-chip SRAM 32-bit read cost ~5 pJ.
    - External SPI Flash 32-bit read cost ~1000 pJ (due to off-chip PCB capacitance).
    - Model weights are 1MB.

    **Calculations:**
    - Fetching 1MB per inference via XIP requires 250,000 32-bit reads.
    - Energy per inference (XIP) = 250,000 * 1000 pJ = 250 µJ just for weight movement.
    - Energy per inference (SRAM) = 250,000 * 5 pJ = 1.25 µJ.

    **Conclusion & Interpretation:**
    - **Result: 250 µJ per inference (Energy-Bound)**. Reading from external flash is ~200x more energetically expensive than reading from on-chip SRAM. The battery is drained purely by moving bits across the motherboard, not by the neural network computations.
