title: 'Cortex-M4 INT8 Model Size: Flash Storage vs SRAM Tensor Arena Limit'
scenario: 'A firmware engineer says: "The Cortex-M4 has 256KB SRAM and 512KB Flash, so we can run INT8 models up to 512KB."'
question: Why is 512 KB Flash not the real limit for INT8 model size on Cortex-M4, and what SRAM-based limit applies?
details:
  realistic_solution: Flash is only where read-only weights and code are stored; it is not the runtime working-memory limit. During inference the Cortex-M4 must also hold the TFLM runtime, stack, input buffers, scratch buffers, and the tensor arena for live activations in 256KB SRAM. With 30KB runtime, 8KB stack, and 4KB input, only 214KB remains for the activation arena. For a CNN whose peak activations are about 2x the INT8 weight size, the SRAM-derived weight limit is about 214KB / 2 = 107KB, far below the 512KB Flash size. For an MLP with activations around 0.2x weight size, SRAM would allow more, so Flash and code footprint become the limit. The correct answer is architecture-dependent, but for CNN-style TinyML models SRAM tensor-arena pressure is usually the first hard limit.
  common_mistake: |
    **The Pitfall:** Equating Flash size with maximum model size.
    **The Rationale:** Engineers assume that if the weights fit on disk (Flash), the model will run, forgetting that inference requires substantial working memory for dynamic activation tensors.
    **The Consequence:** Designing huge CNNs that compile fine but crash instantly during initialization due to insufficient SRAM for the tensor arena.
  napkin_math: |
    **Assumptions & Constraints:**
    - 256KB SRAM, 512KB Flash.
    - Runtime SRAM: TFLM 30KB, stack 8KB, input buffer 4KB.
    - CNN peak activation/weight ratio: ~2x.
    - MLP peak activation/weight ratio: ~0.2x.

    **Calculations:**
    - Available SRAM for tensor arena = 256KB - 30KB - 8KB - 4KB = 214KB.
    - CNN SRAM-limited weight size = 214KB / 2 = 107KB.
    - MLP SRAM-limited weight size = 214KB / 0.2 = 1,070KB, so an MLP would hit Flash/code storage first.

    **Conclusion & Interpretation:**
    - **Result: SRAM Tensor-Arena Limit**. A CNN may be limited to roughly 107K INT8 parameters even though the chip has 512KB Flash, because activations and scratch memory must fit in 256KB SRAM.
