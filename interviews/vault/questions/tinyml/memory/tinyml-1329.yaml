title: 'TinyML Model Deployment: nRF5340 Memory Hierarchy Optimization'
scenario: You are tasked with deploying a machine learning model for a real-time anomaly detection application onto a Nordic nRF5340 microcontroller. The nRF5340 features a 128 MHz ARM Cortex-M33 application core, 256 KB of SRAM, and 1 MB of flash memory. The trained model (weights and biases) is 700 KB, and the input feature buffer requires an additional 50 KB. The application needs to perform inferences at a rate of 10 Hz.
question: How would you manage the model and data placement across the nRF5340's memory hierarchy to meet the real-time constraints, considering capacity, bandwidth, and latency tradeoffs?
details:
  realistic_solution: A realistic solution involves careful memory segmentation. The bulk of the 700 KB model that exceeds SRAM capacity must reside in flash. Critical, frequently accessed layers or lookup tables might be explicitly loaded into SRAM at runtime, or directly executed from flash if the access pattern is sequential. Intermediate activation buffers and the 50 KB input feature buffer must fit within SRAM. For the 700 KB model, using a framework that supports in-place flash execution (e.g., TFLM with OpData in flash) is crucial.
  common_mistake: |
    **The Pitfall:** Ignoring flash access latency during inference.
    **The Rationale:** Candidates focus solely on fitting the 700 KB model into the 1 MB flash without considering the cycle penalties of reading weights directly from flash over the memory bus during a tight 100 ms inference budget.
    **The Consequence:** The model fits in memory but fails to meet the 10 Hz real-time constraint due to instruction and data fetch stalls.
  napkin_math: |
    **Assumptions & Constraints:**
    - 128 MHz clock.
    - 256 KB SRAM, 1 MB flash.
    - 700 KB weights.
    - 10 Hz rate (100ms budget).
    - Flash accesses have extra wait states, but wait states are not the same as a sustained model-transfer bandwidth.

    **Calculations:**
    - Capacity: 700 KB weights fit in 1 MB flash but cannot fit in 256 KB SRAM alongside a 50 KB input buffer and activations.
    - SRAM after input buffer: 256 KB - 50 KB = 206 KB for activations, tensor arena, stack, and any staged hot weights.
    - 100 ms budget at 128 MHz: 12.8 million cycles/inference.
    - If inference rereads the full 700 KB weight set once, the effective flash bandwidth needed is 700 KB / 100 ms = 7 MB/s; repeated layer reuse or random access raises this requirement.
    - Flash wait states add stalls to instruction/data fetches, so the per-inference cost must be measured or modeled from access counts and effective bandwidth, not from a one-time full-model load estimate.

    **Conclusion & Interpretation:**
    - **Result: capacity fits in flash but real-time performance is access-pattern dependent (Memory-Bandwidth-Bound)**. Keep most weights in flash, stage only hot layers or tables in SRAM, and verify the 100 ms budget with on-target profiling.
