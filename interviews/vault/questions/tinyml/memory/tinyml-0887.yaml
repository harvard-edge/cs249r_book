title: 'Model Size Estimation: Diagnose Flash Overflow on ESP32-S3 Multi-Model Deployment'
scenario: An ESP32-S3 board has 16MB physical Flash but uses the default OTA partition table with a 4MB application slot. A firmware with 2 TFLite Micro models fails to link with 'app partition overflow by 2.1MB'. The models are a keyword spotter (500KB) and gesture recognition model (1.5MB). Application + FreeRTOS + WiFi stack is estimated at 3.8MB before debug symbols, optional ops, and embedded assets.
question: Why does an ESP32-S3 two-model firmware report a 2.1 MB overflow when the board has 16 MB of physical Flash?
details:
  realistic_solution: 'The overflow is against the configured application partition, not the total Flash chip. A plausible Flash image is: App + FreeRTOS + WiFi stack: 3.8MB; TFLM runtime and registered kernels: 0.5MB; keyword model: 0.5MB; gesture model: 1.5MB; embedded assets/config/debug tables: 0.3MB. Total image size is about 6.6MB. With a 4MB OTA app slot, the overflow is 6.6MB - 4.0MB = 2.6MB, close to the reported 2.1MB after link-time stripping. The fix is to reduce Flash-resident code and assets or change the partition plan: prune unused TFLM ops, compress or externalize assets, remove unused ESP-IDF components, quantize/prune the models, or allocate a larger app partition if OTA requirements permit. This is not a generic WiFi IRAM issue.'
  common_mistake: |
    **The Pitfall:** Comparing the firmware image against the 16MB Flash chip instead of the configured application partition.
    **The Rationale:** Engineers see a large physical Flash number on the module and miss the OTA partition table limit enforced by the linker/build system.
    **The Consequence:** They chase unrelated IRAM or PSRAM settings while the release image still cannot fit in the app slot.
  napkin_math: |
    **Assumptions & Constraints:**
    - Physical Flash: 16 MB.
    - Configured OTA app partition: 4.0 MB.
    - Flash-resident payload estimate: App + FreeRTOS + WiFi (3.8 MB), TFLM kernels (0.5 MB), models (2.0 MB), assets/config tables (0.3 MB).

    **Calculations:**
    - Estimated image size: 3.8 + 0.5 + 2.0 + 0.3 = 6.6 MB.
    - Partition overflow: 6.6 MB - 4.0 MB = 2.6 MB before link-time stripping.
    - A reported 2.1 MB overflow is therefore consistent with a Flash app-partition limit.

    **Conclusion & Interpretation:**
    - **Result: ~2.1-2.6 MB Flash app-partition overflow (Flash-Bound)**. Shrink Flash-resident code/models/assets or choose a partition table with a larger app slot.
