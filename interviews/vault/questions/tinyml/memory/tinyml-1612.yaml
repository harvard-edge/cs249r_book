title: Explain SRAM weight copying to eliminate external SPI flash latency
scenario: An engineer ports a 100KB wake-word model to a Cortex-M4 with 256KB of SRAM but observes extremely slow inference because weights are fetched directly from external SPI flash.
question: How does relocating the weights to internal memory mathematically improve inference throughput on the Cortex-M4?
details:
  realistic_solution: Reading from an external SPI flash imposes severe serialization bottlenecks, typically requiring dozens of clock cycles per byte. Because the 100KB model easily fits inside the available 256KB internal SRAM alongside the activation buffers, the firmware should explicitly copy the weights into SRAM during boot. This transforms memory accesses from multi-cycle SPI transactions into zero-wait-state, single-cycle SRAM reads, maximizing MAC throughput.
  common_mistake: |
    **The Pitfall:** Assuming microcontrollers feature automatic transparent caching.
    **The Rationale:** Candidates familiar with high-end CPUs assume the memory hierarchy automatically caches external SPI flash into fast SRAM seamlessly.
    **The Consequence:** They fail to write the explicit data movement routines, leaving the matrix multiplications severely bottlenecked by serial flash fetching.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4 with 256 KB internal SRAM.
    - Model weights = 100 KB.
    - SPI Flash access = Multi-cycle. SRAM access = 1 cycle.

    **Calculations:**
    - SRAM Balance: 256 KB - 100 KB (weights) = 156 KB remaining for activations and stack.
    - Cycle ratio: >10 cycles (SPI) vs 1 cycle (SRAM).

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound Latency**. Explicitly mapping the 100KB weights to SRAM consumes only ~39% of the memory but yields a 10x+ improvement in memory bandwidth for the execution pipeline.
