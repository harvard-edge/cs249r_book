title: 'The CMSIS-NN Alignment Fault'
scenario: 'You define a global `int8_t tensor_arena[20000]` for a TFLite Micro model using the ARM CMSIS-NN library. The model compiles, but calling `invoke()` instantly crashes the MCU with a Hard Fault (Unaligned Memory Access), despite having enough memory.'
question: 'Why does an unaligned `int8_t tensor_arena[20000]` crash CMSIS-NN with a Hard Fault?'
details:
  realistic_solution: 'CMSIS-NN''s optimized kernels use ARM SIMD instructions (LDR, LDRD) that require 4-byte or 8-byte aligned addresses. An unaligned int8_t array may start at any address. When CMSIS-NN tries to load 4 bytes at once from an unaligned address, the Cortex-M4 triggers a UsageFault (hard fault). Fix: declare the arena with alignment: __attribute__((aligned(16))) int8_t tensor_arena[20000]; or use alignas(16) in C11/C++11. The 16-byte alignment ensures all SIMD loads within the arena are naturally aligned. This is a compile-time fix — zero runtime cost, zero memory overhead.'
  common_mistake: |
    **The Pitfall:** Assuming the neural network model weights are too large and overflowing the stack/heap.
    **The Rationale:** Candidates confuse hardware execution pipeline faults with simple memory capacity exhaustion errors.
    **The Consequence:** They waste days unnecessarily quantizing or pruning the model instead of applying a trivial 1-line C++ memory alignment compiler directive.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard C/C++ `int8_t` array has 1-byte natural alignment.
    - ARM CMSIS-NN utilizes SIMD instructions (LDRD) requiring 4-byte or 8-byte aligned addresses.

    **Calculations:**
    - If `tensor_arena` is placed by the linker at an arbitrary address like `0x20000001`, a 32-bit or 64-bit SIMD load from that address spans across physical 32-bit SRAM boundaries.

    **Conclusion & Interpretation:**
    - **Result: UsageFault (Memory-Bound)**. The ARM Cortex-M hardware refuses to execute SIMD loads across misaligned boundaries, triggering an instant fault. The fix requires explicitly declaring `alignas(16) int8_t tensor_arena[20000]`.
