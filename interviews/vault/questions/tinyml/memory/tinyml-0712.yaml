title: The STM32H7 Dual-Bank Flash
scenario: 'Your STM32H743 has 2 MB flash organized as two 1 MB banks. Your ML model (350 KB) and firmware (200 KB) occupy Bank 1. You need to perform an OTA model update over BLE while the device continues running inference.'
question: 'How does STM32H743 dual-bank flash let a 350 KB model update run over BLE while inference continues?'
details:
  realistic_solution: 'The STM32H743 flash controller has two independent bank controllers. Bank 1 and Bank 2 can perform simultaneous operations: one bank can be read (for code execution or weight access) while the other is being erased/programmed.'
  common_mistake: |
    **The Pitfall:** Believing inference must stop because flash cannot be read and written simultaneously.
    **The Rationale:** Engineers generalize from single-bank flash architecture where read-while-write is prohibited.
    **The Consequence:** They unnecessarily architect downtime into safety-critical applications during updates.
  napkin_math: |
    **Assumptions & Constraints:**
    - BLE transfer speed: 175 KB/s.
    - Model size: 350 KB.
    - Flash erase time: 2s per sector (3 sectors).
    - Flash program speed: 350 KB / fast programming rate.

    **Calculations:**
    - BLE transfer: 350 KB / 175 KB/s = 2.0s.
    - Flash erase: 3 sectors * 2s = 6.0s.
    - Flash program: 0.175s.
    - Verify & Swap: ~0.011s.
    - Total update time: 8.2 seconds.

    **Conclusion & Interpretation:**
    - **Result: 0ms downtime ([Compute-Bound])**. Inference downtime is 0ms due to dual-bank read-while-write capability.
