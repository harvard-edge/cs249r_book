title: The SRAM Arena Squeeze
scenario: 'You''re deploying a keyword spotting model to an MCU with 256KB of SRAM. The three largest consecutive tensors are: Input tensor (40 KB), Intermediate feature tensor (32 KB), and Output tensor (8 KB). The memory planner requires both the input and output of a given operation to be resident in SRAM simultaneously, but reclaims memory from tensors no longer needed by any future operation.'
question: What tensor-arena peak is required for 40 KB input, 32 KB Conv1, and 8 KB Conv2 tensors on a 256 KB MCU?
details:
  realistic_solution: Memory planners calculate required arena capacity by mapping the peak concurrent allocation bounds. During the first convolutional operation, the 40 KB input and 32 KB intermediate tensors coexist, consuming 72 KB. During the second convolution, the 40 KB input is freed, and the 32 KB intermediate coexists with the 8 KB output, consuming 40 KB. The high-water mark dictates the strict minimum arena size.
  common_mistake: |
    **The Pitfall:** Adding the sizes of all tensors in the computational graph together sequentially.
    **The Rationale:** Engineers mistakenly evaluate static memory footprints without understanding dynamic runtime allocation lifecycles.
    **The Consequence:** Systems over-provision SRAM, blocking the coexistence of critical network stacks or RTOS buffers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tensors: Input = 40 KB, Conv1 = 32 KB, Conv2 = 8 KB.
    - Operation strictly frees preceding tensors after execution.

    **Calculations:**
    - Peak during Conv1: 40 KB + 32 KB = 72 KB.
    - Peak during Conv2: 32 KB + 8 KB = 40 KB.
    - High-water mark = max(72 KB, 40 KB) = 72 KB.

    **Conclusion & Interpretation:**
    - **Result: 72 KB (Memory Peak Identified)**. Minimum tensor arena size strictly required is 72 KB.
  options:
  - '50 KB'
  - '32 KB'
  - '72 KB'
  - '40 KB'
