title: 'The Tensor Arena Peak: Tensor Arena Planning'
scenario: 'You are deploying a keyword-spotting model on a Cortex-M4 microcontroller with 256 KB of SRAM. A convolution operation requires a 20 KB input tensor, produces an 80 KB output tensor, and requires a 5 KB persistent tensor for its parameters. The TFLM runtime itself requires a 10 KB tail for its internal state management.'
question: 'How would you calculate the minimum required tensor arena size for this single operation to execute successfully?'
details:
  realistic_solution: 'The tensor arena must be large enough to hold all concurrently active memory allocations at the point of peak usage. For a single operation, this includes its input tensor, its output tensor, any persistent tensors that are live, and the runtime''s own bookkeeping memory.'
  common_mistake: |
    **The Pitfall:** Only accounting for the largest tensor (e.g., 80 KB output) or summing just the inputs and outputs.
    **The Rationale:** Candidates forget that input and output tensors must coexist in memory during execution, along with parameters and runtime overhead.
    **The Consequence:** This leads to under-allocating the tensor arena, resulting in an OOM crash exactly at the model's bottleneck layer.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input Tensor: 20 KB.
    - Output Tensor: 80 KB.
    - Persistent Tensor: 5 KB.
    - TFLM Runtime Tail: 10 KB.

    **Calculations:**
    - Peak Memory: 20 + 80 + 5 + 10 = 115 KB.

    **Conclusion & Interpretation:**
    - **Result: 115 KB (Memory-Bound)**. The tensor arena must hold all concurrently active memory allocations including overhead.
  options:
  - '105 KB'
  - '100 KB'
  - '115 KB'
  - '80 KB'
  correct_index: 2
