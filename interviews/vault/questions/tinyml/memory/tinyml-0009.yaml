title: The SRAM Weight Corruption
scenario: You deploy a keyword spotting model where weights are copied from Flash into SRAM for accelerator access. A bug in your audio code causes a buffer overflow. The device doesn't crash, but the neural network "forgets" the wake word until a reboot reloads the weights.
question: If the audio buffer starts at 0x20000000 and SRAM model weights start at 0x20010000, how did the overflow corrupt the model?
details:
  realistic_solution: You have Memory-Mapped SRAM Corruption. The model weights are mutable after being copied into the accelerator's SRAM region, so a rogue audio-buffer write can march past the end of the buffer and overwrite the live weight tensor. The Flash copy is still intact, which is why rebooting reloads the model and restores behavior. The fix is to use the MPU (Memory Protection Unit) or arena bounds checks to make the weight region read-only after initialization.
  common_mistake: |
    **The Pitfall:** Assuming model weights are always protected because the original copy lives in Flash.
    **The Rationale:** Candidates miss that accelerators and optimized runtimes often use a RAM-resident working copy of weights.
    **The Consequence:** They debug classifier behavior while ignoring ordinary SRAM buffer corruption next to the live model arena.
  napkin_math: |
    **Assumptions & Constraints:**
    - Audio buffer starts at `0x20000000`.
    - RAM-resident model weights start at `0x20010000`.

    **Calculations:**
    - Gap between buffer and weights = `0x20010000` - `0x20000000` = `0x10000` (65,536 bytes, or 64 KB).
    - Writing exactly 64 KB fills addresses `0x20000000` through `0x2000FFFF`.

    **Conclusion & Interpretation:**
    - **Result: 64 KB (Memory Corruption)**. An overflow writing more than 64 KB reaches `0x20010000` and silently overwrites the model weights in the unified address space.
