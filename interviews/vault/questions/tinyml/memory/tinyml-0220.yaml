title: 'The Hidden Cost of CPU `memcpy`'
scenario: 'You are designing a real-time audio classification device on a Cortex-M4 running at 168 MHz. Every 20ms, a 4 KB frame of audio data arrives in a peripheral hardware buffer. To process it, this data must be copied into the model''s input tensor located in SRAM.'
question: 'What CPU opportunity cost does a CPU-driven `memcpy` impose for a 4 KB audio frame compared to using DMA?'
details:
  realistic_solution: 'The correct answer involves calculating the CPU time for the copy and explaining the opportunity cost.'
  common_mistake: |
    **The Pitfall:** Dismissing memcpy time as "just a few microseconds".
    **The Rationale:** Engineers calculate the absolute time (24.4 µs) and deem it negligible against a 20 ms budget.
    **The Consequence:** They miss the opportunity cost: 100% CPU utilization blocks concurrent neural network inference or data preprocessing.
  napkin_math: |
    **Assumptions & Constraints:**
    - Data Size: 4 KB = 4096 bytes = 1024 32-bit words
    - CPU Clock: 168 MHz
    - CPU memcpy: ~4 cycles/word
    - DMA Setup: ~2 µs

    **Calculations:**
    - Memcpy cycles = 1024 words * 4 cycles/word = 4096 cycles
    - Memcpy time = 4096 / 168,000,000 = 24.4 µs

    **Conclusion & Interpretation:**
    - **Result: 24.4 µs (Compute-Bound)**. Using memcpy stalls the CPU for 24.4 µs, whereas DMA frees the CPU to perform inference concurrently.
  options:
  - 'The CPU is busy for ~24µs with memcpy, which is negligible in a 20ms budget.'
  - 'DMA is slower because it has configuration overhead.'
  - 'The CPU is busy for ~24µs with memcpy, stalling inference, while it''s only busy for <1µs with DMA, enabling parallelism.'
  - 'Both methods take roughly the same time since SRAM bandwidth is the bottleneck.'
