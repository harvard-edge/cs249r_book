title: Tensor Arena Optimization for BLE-Enabled nRF52840 Edge Devices
scenario: You are finalizing the memory architecture for a predictive maintenance wearable running on
  a Nordic nRF52840. The system must continuously infer using a 1D CNN while maintaining an active BLE
  5.3 connection. The MCU has 256 KB of SRAM and 1 MB of flash. Your team proposes an operator schedule
  that requires a 180 KB flat tensor arena, but the BLE stack and Zephyr RTOS already consume a combined
  96 KB of SRAM.
question: How would you evaluate the tradeoffs of different memory planning strategies to resolve this
  constraint without degrading the ~5mA active power budget?
details:
  realistic_solution: A strong candidate will evaluate restructuring the operator schedule to reduce peak
    intermediate tensor lifespans, effectively lowering the required arena size. They will propose memory-mapped
    execution for weights directly from the 1 MB flash and apply operator fusion (e.g., fusing Conv1D
    with MaxPool) to ensure peak activations fit comfortably within the remaining SRAM without requiring
    external memory that violates the 5mA budget.
  common_mistake: '**The Pitfall:** Assuming one can just compress the model weights or swap activations
    to flash to save memory.

    **The Rationale:** Candidates forget that the tensor arena size is dictated by the peak activation
    bottleneck, not the weights, and ignore that internal flash is primarily read-only.

    **The Consequence:** Failing to fit the arena, or destroying both latency and the active power budget
    by dynamically writing to flash.'
  napkin_math: '**Assumptions & Constraints:**

    - Total SRAM: 256 KB.

    - RTOS/BLE overhead: 96 KB.

    - Proposed Arena: 180 KB.


    **Calculations:**

    - Available SRAM: 256 - 96 = 160 KB.

    - Deficit: 180 KB - 160 KB = 20 KB.

    - Fusing Conv1D + MaxPool: Skips storing 120 KB intermediate map.

    - New peak arena: 64 KB (input) + 16 KB (output) = 80 KB.


    **Conclusion & Interpretation:**

    - **Result: 80 KB Peak (Memory Bound)**. Fusing operators eliminates the intermediate activation bottleneck,
    fitting safely within the 160 KB limit and avoiding slow/power-hungry external memory.

    '
