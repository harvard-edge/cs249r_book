title: Tensor Arena Optimization for BLE-Enabled nRF52840 Edge Devices
scenario: You are finalizing the memory architecture for a predictive maintenance wearable running on a Nordic nRF52840. The system must continuously infer using a 1D CNN while maintaining an active BLE 5.3 connection. The MCU has 256 KB of SRAM and 1 MB of flash. Your team proposes an operator schedule that requires a 180 KB flat tensor arena, but the BLE stack and Zephyr RTOS already consume a combined 96 KB of SRAM.
question: How would you evaluate the tradeoffs of different memory planning strategies to resolve this constraint without degrading the ~5mA active power budget?
details:
  realistic_solution: A strong candidate focuses on the tensor arena, because the 20 KB deficit is caused by peak live activations rather than weight storage. The fix is to change the operator schedule so large intermediates are consumed immediately, for example by fusing Conv1D with pooling or reordering layers to shorten tensor lifetimes. Quantization-aware retraining or smaller windows can be used if scheduling alone is not enough. Flash-resident weights may be fine for storage, but dynamic activation spill or flash writes should be avoided because they add latency, wear, and active power.
  common_mistake: |
    **The Pitfall:** Assuming one can just compress the model weights or swap activations to flash to save memory.
    **The Rationale:** Candidates forget that the tensor arena size is dictated by the peak activation bottleneck, not the weights, and ignore that internal flash is primarily read-only.
    **The Consequence:** Failing to fit the arena, or destroying both latency and the active power budget by dynamically writing to flash.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total SRAM: 256 KB.
    - RTOS/BLE overhead: 96 KB.
    - Proposed Arena: 180 KB.

    **Calculations:**
    - Available SRAM: 256 - 96 = 160 KB.
    - Deficit: 180 KB - 160 KB = 20 KB.
    - Original peak includes a 120 KB intermediate map plus 60 KB of other live tensors = 180 KB.
    - Fusing Conv1D + MaxPool consumes the 120 KB map tile-by-tile instead of storing it at full size.
    - New peak arena: 60 KB other live tensors + 20 KB fused tile/scratch = 80 KB.
    - Margin after scheduling change: 160 KB - 80 KB = 80 KB.

    **Conclusion & Interpretation:**
    - **Result: 80 KB Peak (Memory Bound).** Reducing activation lifetimes fixes the 20 KB SRAM deficit with about 80 KB of margin, while avoiding activation spill or flash writes that would hurt the power budget.
