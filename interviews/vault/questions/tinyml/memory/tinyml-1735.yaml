title: Mitigating High Activation Memory in Deep Layers
scenario: A 2MB visual wake-word model needs to run on a Cortex-M4 featuring only 256KB of SRAM and 2MB of Flash. The INT8 quantized model requires 300KB for intermediate activations at its bottleneck layer.
question: What memory management strategies can execute this specific bottleneck layer without exceeding the 256KB hardware SRAM limit?
details:
  realistic_solution: The weights can execute-in-place (XIP) directly from Flash. The activation bottleneck must be solved by implementing patch-based inference (spatial tiling) to bound the peak memory to under 200KB at the cost of redundant boundary computations.
  common_mistake: |
    **The Pitfall:** Assuming Flash memory can directly hold mutable activations or proposing paging to Flash.
    **The Rationale:** Candidates treat Flash memory like a desktop SSD swap file, misunderstanding MCU memory hierarchies.
    **The Consequence:** Paging activations to Flash degrades performance unacceptably due to extreme write latency and will quickly wear out the Flash sectors.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4 SRAM: 256 KB.
    - Visual Wake Word bottleneck activation: 300 KB.

    **Calculations:**
    - Deficit: 300 KB > 256 KB.
    - Spatial Tiling Pass: Compute 2 passes (e.g., top half, bottom half).
    - Tiled Peak Memory: 300 KB / 2 + receptive field overlap buffer = ~160 KB.

    **Conclusion & Interpretation:**
    - **Result: Peak memory drops to ~160 KB (SRAM-Bound)**. Requires spatial patch-based inference (tiling) to avoid Flash paging.
