title: 'The TinyML Memory Wall: SRAM vs. Flash'
scenario: 'You are profiling memory access bottlenecks in a TinyML system to decide where to place critical neural network weights.'
question: 'On a typical microcontroller used for a TinyML application, roughly how much slower is reading the model''s weights from Flash memory compared to accessing the tensor arena in on-chip SRAM?'
details:
  realistic_solution: 'On-chip SRAM access is extremely fast, on the order of an L2 cache read at about 4 nanoseconds. Flash memory, while often on the same chip, is designed for non-volatile storage and has a significantly higher read latency of about 50 nanoseconds. Therefore, reading from Flash is approximately 12.5 times slower than reading from SRAM.'
  common_mistake: |
    **The Pitfall:** Applying analogies from desktop computing (like DRAM vs. NVMe SSD) and guessing a massive 1,000x+ difference.
    **The Rationale:** Engineers without embedded experience don't realize that MCU flash is physically on the same die and directly memory-mapped.
    **The Consequence:** The candidate drastically over-optimizes SRAM usage or rejects XIP (execute-in-place) architectures entirely.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM Access Time: ~4 ns (equivalent to L2 cache).
    - Flash Read Latency: ~50 ns (due to wait states).

    **Calculations:**
    - Difference: 50 ns / 4 ns = 12.5x.

    **Conclusion & Interpretation:**
    - **Result: 12.5x Slower (Memory-Bound)**. Flash access is a significant bottleneck compared to SRAM.
  options:
    - 'About 2x slower'
    - 'About 1,000x slower'
    - 'About 10-15x slower'
    - 'They are nearly the same speed'
