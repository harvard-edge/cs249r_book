title: TinyML Tensor Arena Sizing
scenario: |
  You are deploying a keyword spotting model on a Cortex-M4 microcontroller. The TensorFlow Lite for Microcontrollers interpreter gives you the following memory plan for the largest operator in your model: a 25KB activation tensor is computed from a 10KB input tensor. A separate, earlier layer had a peak temporary tensor of 12KB. The model's overall input tensor is 1KB and the final output tensor is 1KB.
question: To prevent memory allocation errors, what is the minimum required size for the Tensor Arena?
details:
  realistic_solution: The Tensor Arena must be large enough to hold all tensors that are live simultaneously. The peak memory usage occurs during the execution of a single operator. For the largest operator, both its input tensor(s) and output tensor(s) must exist in memory at the same time. In this case, the peak is when the 25KB activation is being generated from the 10KB input. Therefore, the minimum arena size is the sum of these two tensors.
  common_mistake: Summing the sizes of all tensors in the model (1KB + 10KB + 25KB + 12KB + 1KB = 49KB). This mistake ignores that the interpreter reclaims and reuses memory for tensors that are no longer needed. The arena only needs to be large enough for the peak concurrent memory usage at any single point in time.
  napkin_math: |
    **Assumptions & Constraints:**
    - TFLite Micro reuses memory for tensors no longer needed.
    - Largest operator: 10 KB input, 25 KB output.
    - Other tensors: 12 KB temporary, 1 KB model input, 1 KB model output.

    **Calculations:**
    - Peak Memory = Size(Largest Op Input) + Size(Largest Op Output).
    - Peak Memory = 10 KB + 25 KB = 35 KB.
    - Non-overlapping tensors (12 KB temp) do not add to this peak.

    **Conclusion & Interpretation:**
    - **Result: 35 KB (Memory-Bound)**. The arena size is dictated strictly by the peak concurrent memory required during the largest single operation.
  options:
  - '25 KB'
  - '49 KB'
  - '35 KB'
  - '37 KB'
  correct_index: 2
