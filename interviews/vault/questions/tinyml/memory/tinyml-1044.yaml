title: SRAM Capacity Limits on Corstone-300
scenario: You are deploying a vision model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform, which features a shared 512 KB SRAM running at 480 MHz. A critical convolutional layer requires processing an int8 input feature map of 128x128x16 into an int8 output feature map of 128x128x16, using 32 KB of weights.
question: Does the Corstone-300 convolution fit in 512 KB SRAM without tiling, and how much memory is missing?
details:
  realistic_solution: The correct approach is to calculate the sum of input, output, and weight memory footprints, realizing it totals 544 KB and thus exceeds the 512 KB limit. The candidate should then identify that standard execution is impossible and propose leveraging the Ethos-U55's native support for hardware feature map tiling (block-based processing) to reduce the peak SRAM working memory requirement.
  common_mistake: Candidates often miscalculate the buffer sizes by forgetting the channel depth or data type size (int8 = 1 byte). They also frequently fail to recognize that the total memory requirement strictly exceeds the 512 KB physical limit of the hardware, missing the trick of the question.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM limit: 512 KB.
    - Input feature map: 128x128x16 (INT8, 1 byte/val).
    - Output feature map: 128x128x16 (INT8, 1 byte/val).
    - Weights: 32 KB.

    **Calculations:**
    - Input Activations: 128 * 128 * 16 * 1 = 262,144 bytes (256 KB).
    - Output Activations: 128 * 128 * 16 * 1 = 262,144 bytes (256 KB).
    - Total Memory Required: 256 KB + 256 KB + 32 KB = 544 KB.
    - Remaining SRAM: 512 KB - 544 KB = -32 KB.

    **Conclusion & Interpretation:**
    - **Result: 32 KB Shortfall (Memory Capacity-Bound)**. Standard execution is impossible without hardware feature map tiling.
