title: Memory-Optimal Operator Execution Order
scenario: 'A DAG model executes Operator C (consuming A and B) and Operator D (consuming B). Tensors sized: A=40 KB, B=60 KB, C=30 KB, D=20 KB. Two candidate routes exist.'
question: Which execution order (A→B→C→D or A→B→D→C) has lower peak arena usage on a 512 KB Cortex-M7, and what is the general principle?
details:
  realistic_solution: A->B->C->D has the lower peak arena usage. C consumes both A and B, so running C first allows A to be released before D runs; only B must remain live for D. If D runs before C, both A and B must stay live for the later C while D's output is also live, increasing the peak. The general principle is to schedule ready operators that consume large tensors and shorten live ranges early, as long as the topological dependencies are satisfied.
  common_mistake: |
    **The Pitfall:** Assuming execution routes maintain entirely mathematically neutral memory outcomes.
    **The Rationale:** Candidates model spatial memory footprints identically to statically compiled blocks rather than cascading temporal overlaps.
    **The Consequence:** Reversing specific routes structurally aggregates massive dead tensors inside live limits, immediately triggering deep OOM faults.
  napkin_math: |
    **Assumptions & Constraints:**
    - Execution route Option 1: A -> B -> C -> D.
    - Execution route Option 2: A -> B -> D -> C.
    - Spatial limits: A(40 KB), B(60 KB), C(30 KB), D(20 KB).

    **Calculations:**
    - Option 1, A->B->C->D:
      after A: A = 40 KB.
      after B: A + B = 40 + 60 = 100 KB.
      during C: A + B + C = 40 + 60 + 30 = 130 KB peak; after C, A can be released.
      during D: B + C + D = 60 + 30 + 20 = 110 KB.
      peak = 130 KB.
    - Option 2, A->B->D->C:
      after A: A = 40 KB.
      after B: A + B = 100 KB.
      during D: A + B + D = 40 + 60 + 20 = 120 KB; A and B must remain for C.
      during C: A + B + D + C = 40 + 60 + 20 + 30 = 150 KB peak.
      peak = 150 KB.

    **Conclusion & Interpretation:**
    - **Result: A->B->C->D has the lower peak, 130 KB vs 150 KB (Scheduling-Bound Optimization).** Prefer valid schedules that consume large shared inputs earlier so their live ranges end sooner.
