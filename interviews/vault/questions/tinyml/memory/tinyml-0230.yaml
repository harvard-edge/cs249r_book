title: 'The TinyML Tensor Arena Squeeze'
scenario: 'You are deploying an INT8 keyword spotting model on a Cortex-M4 microcontroller with 128KB of SRAM. The TensorFlow Lite for Microcontrollers interpreter needs to pre-allocate a Tensor Arena for all activations. The model''s simplified execution graph produces sequential tensors of sizes 512 B, 2048 B, 2048 B, and 4 B.'
question: 'What is the minimum tensor arena size required for this INT8 keyword spotting graph?'
details:
  realistic_solution: 'The correct approach is to analyze the model''s execution step-by-step and find the point where the sum of all concurrently live tensors is at its maximum. Tensors are live from the moment they are created until they are last used as an input to a subsequent layer.'
  common_mistake: |
    **The Pitfall:** Summing the sizes of all tensors in the model.
    **The Rationale:** Candidates assume memory must be allocated for all intermediate representations simultaneously, ignoring that memory can be reused after a tensor is no longer needed.
    **The Consequence:** This vastly overestimates the required memory (e.g., 4.6 KB), potentially causing the model to be wrongly deemed too large for the device.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tensors: 512 B, 2048 B, 2048 B, 4 B.
    - Execution graph produces sequential tensors.

    **Calculations:**
    - Layer 1 (Input -> Hidden) live: 512 B + 2048 B = 2560 B.
    - Layer 2 (Hidden -> Hidden) live: 2048 B + 2048 B = 4096 B.
    - Layer 3 (Hidden -> Output) live: 2048 B + 4 B = 2052 B.
    - Peak Memory: Maximum concurrent usage is during the second operation.

    **Conclusion & Interpretation:**
    - **Result: 4096 bytes (Memory-Bound)**. Minimum tensor arena size required is exactly the peak memory of overlapping active tensors.
  options:
  - '~4.6 KB. (Mistake: Sums all tensor sizes: 512 + 2048 + 2048 + 4 = 4612 bytes)'
  - '~2.0 KB. (Mistake: Only accounts for the single largest tensor, ignoring concurrency)'
  - '~4.1 KB. (Correctly identifies the peak concurrent usage during the second operation)'
  - '~16.4 KB. (Mistake: Correctly calculates the peak element count of 4096 but assumes FP32 (4 bytes) instead of INT8)'
  correct_index: 2
