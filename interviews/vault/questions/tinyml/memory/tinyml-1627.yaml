title: SRAM-Constrained Depthwise Execution
scenario: A Cortex-M4 has 64KB SRAM available. A depthwise separable convolution generates an intermediate activation tensor of 120KB.
question: How can a computational schedule be designed to execute this layer entirely on-chip without requiring external DRAM?
details:
  realistic_solution: Implement depth-first execution (or loop tiling/fusion). Rather than computing the entire spatial map of the depthwise layer before the pointwise layer, compute a small spatial tile (e.g., 16x16) through both layers immediately, discarding intermediate depthwise values.
  common_mistake: |
    **The Pitfall:** Suggesting quantization or paging to Flash memory.
    **The Rationale:** Candidates ignore the prompt's constraint to design a "computational schedule" and instead propose format changes or hardware workarounds.
    **The Consequence:** Paging to Flash severely degrades performance due to write latency, and quantization may degrade accuracy unacceptably.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4 SRAM: 64 KB.
    - Intermediate activation size: 120 KB.

    **Calculations:**
    - Full intermediate tensor: 120 KB, which exceeds the 64 KB SRAM budget.
    - A tiled schedule stores only a fraction of the spatial map at once.
    - Required tile fraction must be less than 64 KB / 120 KB = 53.3% of the full intermediate, with additional margin for input, output, stack, and operator scratch buffers.
    - Depth-first fusion processes each tile through the depthwise and pointwise stages immediately, then discards the intermediate tile.

    **Conclusion & Interpretation:**
    - **Result: Use depth-first tiling/loop fusion (SRAM-Bound)**. The exact tile dimensions depend on channel count, datatype, and scratch buffers, but the schedule must keep each intermediate tile comfortably below 64 KB to avoid external DRAM.
