title: Derive Power, Duty Cycle, and Latency Budget for a CR2032-Powered Cortex-M4 Sensor
scenario: A battery-powered presence detection sensor runs on a Cortex-M4 (168MHz, 256KB SRAM, 512KB Flash) and is powered by a CR2032 coin cell (220mAh, 3V). Requirements include detecting presence within 1 second, achieving >95% accuracy, and operating continuously for 1 year.
question: How would you derive maximum model parameters, inference latency, duty cycle, and average power budget?
details:
  realistic_solution: Derive the energy envelope first. A 220mAh, 3V CR2032 stores about 660mWh, so 1 year allows 75.34µW average. With 2µA sleep current consuming 6µW, active inference can use only 69.34µW on average. At 50mA active current and 3V, that is a 0.046% duty cycle, or about 0.46ms of active time per 1-second detection window. At 168MHz, the hard compute budget is about 77K cycles per inference at 1Hz. Maximum parameters are not directly derivable from that energy budget without a model topology, kernel cycles/MAC, activation arena, and Flash layout; the parameter cap must be set from measured cycles plus the 512KB Flash and 256KB SRAM limits. The key answer is that the derivable budget is power, duty cycle, and cycles; parameter count needs a separate model-specific memory and latency estimate.
  common_mistake: |
    **The Pitfall:** Designing for maximum accuracy without power constraints.
    **The Rationale:** Candidates build a complex model to hit 95% accuracy without verifying if running it continuously fits the tiny energy envelope.
    **The Consequence:** The CR2032 battery drains in weeks rather than a year, resulting in total product failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - CR2032: 220 mAh at 3V = 660 mWh. Target life: 8760 hours.
    - M4 active: 50 mA (150 mW). Sleep: 2 µA (6 µW).
    - Detection requirement: evaluate at least once per 1-second window.

    **Calculations:**
    - Total power budget: 660 mWh / 8760 h = 0.07534 mW = 75.34 µW.
    - Active inference average-power budget after sleep: 75.34 - 6 = 69.34 µW.
    - Max duty cycle: 69.34 µW / 150,000 µW = 0.000462 = 0.0462%.
    - At 1 Hz: 0.000462 * 1 s = 0.462 ms active time per inference.
    - Cycle budget at 1 Hz: 0.462 ms * 168 MHz = about 77,600 cycles per inference.
    - A parameter limit is not determined by this energy budget alone; it depends on topology, cycles/MAC, reuse, activation memory, and Flash layout.
    - Memory ceilings still apply separately: model plus code must fit 512 KB Flash, and tensor arena plus stack/runtime must fit 256 KB SRAM.

    **Conclusion & Interpretation:**
    - **Result: 75.34 µW average, 0.0462% duty cycle, and ~0.462 ms active latency budget at 1 Hz (Power-Bound)**. These values bound cycles per inference; maximum parameters require an additional model-specific memory and cycle model against the 512 KB Flash and 256 KB SRAM ceilings.
