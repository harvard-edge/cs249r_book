title: TinyML Memory Hierarchy Optimization on STM32F4
scenario: You must deploy a CNN requiring 512 KB for weights and activations on an MCU with 256 KB SRAM. Approach A aggressively quantizes and prunes the model to 192 KB. Approach B uses external QSPI Flash with a software-managed cache for the weights.
question: Which approach would you recommend for maximizing inference throughput while maintaining acceptable power consumption for a real-time application?
details:
  realistic_solution: 'Approach A is architecturally superior. If profiling confirms the accuracy degradation from pruning/quantization is acceptable, fitting the model entirely inside native SRAM yields massively lower latency and higher energy efficiency. Approach B introduces severe hardware penalties: QSPI flash access is roughly 75x slower than internal SRAM. Software-managed caching incurs massive CPU overhead and demands highly optimized access patterns to prevent cache thrashing, which typically ruins both real-time throughput and the power budget.'
  common_mistake: |
    **The Pitfall:** Underestimating the latency and CPU overhead penalties of software-managed caching for external memory.
    **The Rationale:** Cloud engineers assume caches magically hide latency, ignoring the brutal initial access penalties and bus constraints of SPI Flash.
    **The Consequence:** The model nominally fits in memory but executes so slowly and consumes so much power it fails all real-time and battery constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - MCU Clock: 168 MHz (SRAM access ~6 ns).
    - QSPI Initial Access: 50 ns. QSPI Bandwidth: 80 MB/s.

    **Calculations:**
    - Burst Read Time (32-byte cache line): 32 bytes / 80 MB/s = 400 ns.
    - Total QSPI Cache Line Fetch: 50 ns + 400 ns = 450 ns.
    - Speed Gap: QSPI fetch (450 ns) vs SRAM (6 ns).

    **Conclusion & Interpretation:**
    - **Result: 450 ns (Memory-Bandwidth Bound)**. QSPI is ~75x slower, requiring near-perfect cache hits to maintain real-time throughput.
