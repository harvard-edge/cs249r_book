title: The Unaligned Access Fault
scenario: You port a TFLite Micro vision model from a Cortex-M4 to a cheaper Cortex-M0+. The code compiles perfectly. But when the inference engine loads the model's tensor arena, it immediately crashes with a `HardFault` exception.
question: How does TFLite Micro's packed tensor memory layout cause unaligned access on the Cortex-M0+, and why does the ISA constraint force you to pad your ML tensors?
details:
  realistic_solution: You triggered an unaligned memory access fault due to how the ML runtime packs tensors. TFLite Micro allocates all activations and weights contiguously in a single `tensor_arena` byte array to save SRAM. If a 3-channel INT8 image tensor (size $W \times H \times 3$ bytes) is followed immediately by a 32-bit quantization multiplier or a 32-bit bias vector, that 32-bit value may start at an address not divisible by 4.
  common_mistake: |
    **The Pitfall:** Assuming all ARM Cortex-M processors handle memory access rules identically.
    **The Rationale:** Engineers who have only worked with higher-end Cortex-M cores (like M4/M7) are unaware that smaller cores (M0/M0+) lack the silicon logic to transparently handle unaligned memory reads.
    **The Consequence:** The model crashes inexplicably at runtime on cost-optimized hardware, requiring painful low-level debugging to identify padding issues.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Cortex-M0+ (Lacks hardware support for unaligned access).
       - Memory Layout: TFLite Micro packs tensors contiguously in `tensor_arena`.
       - Example Tensors: 11-byte INT8 activation tensor followed by a 32-bit bias vector.
    2. **Calculations:**
       - INT8 Tensor Address Range: `0x20000000` to `0x2000000A` (11 bytes).
       - Bias Vector Start Address: `0x2000000B`.
       - Alignment Check: `0x2000000B` mod 4 = 3 (Not divisible by 4).
    3. **Conclusion & Interpretation:**
       - **Result: Unaligned 32-bit read at 0x2000000B causes a HardFault on M0+ unless padded to 12 bytes.** **Result: Memory Alignment Architecture Bound.**
