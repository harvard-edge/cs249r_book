title: The DMA Double-Buffer Lifeline
scenario: You are building a device that continuously listens for a wake-word. The microcontroller uses DMA to capture 16-bit audio from a microphone sampling at 16 kHz, while the CPU runs a wake-word model that has an inference latency of 120 ms. To ensure no audio data is lost while the CPU is busy, you implement a double-buffering scheme.
question: How much SRAM is required for the double-buffered 16 kHz, 16-bit audio pipeline when inference takes 120 ms?
details:
  realistic_solution: 'Use two buffers of equal size, each covering the inference latency. Data rate: 16kHz * 2 bytes = 32 KB/s. Each buffer must hold 120ms of audio: 32,000 * 0.120 = 3,840 bytes. Total memory: 2 * 3,840 = 7,680 bytes. While DMA fills buffer A, the CPU runs inference on buffer B, then they swap. This guarantees zero sample loss because the DMA always has a free buffer to write into, regardless of CPU load. The key insight: buffer size is dictated by inference latency (120ms), not by any arbitrary frame duration.'
  common_mistake: |
    **The Pitfall:** Calculating the size for only a single buffer or mixing up bits and bytes.
    **The Rationale:** Engineers forget that two buffers are needed for continuous DMA operation while the CPU processes one, and frequently mistake bits for bytes in audio specs.
    **The Consequence:** Allocating half the necessary memory or making an 8x error, leading to buffer overflows and lost audio samples during inference.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sampling Rate: 16,000 samples/s.
    - Sample Size: 16-bit (2 bytes).
    - Inference Latency: 120 ms (0.120 s).

    **Calculations:**
    - Data Rate: 16,000 * 2 = 32,000 bytes/s (32 KB/s).
    - Single Buffer Size: 32,000 bytes/s * 0.120 s = 3,840 bytes.
    - Double Buffer Total: 2 * 3,840 bytes = 7,680 bytes.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound**. Exactly 7,680 bytes are required to maintain continuous double-buffered DMA sampling.
  options:
  - 3,840 bytes
  - 30,720 bytes
  - 7,680 bytes
  - 32,000 bytes
  correct_index: 2
