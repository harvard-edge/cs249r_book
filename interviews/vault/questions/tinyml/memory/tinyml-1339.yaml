title: Optimizing DMA and Data Movement for Real-time ML Inference on Cortex-M7 + Ethos-U55
scenario: 'An anomaly detection model runs on a Cortex-M7 (480 MHz) and Ethos-U55 NPU. A camera produces 16KB images. The CPU copies images from SPI Flash to SRAM, then to the NPU. Inference takes 30ms. Frame time is 100ms (10 FPS), failing the 50ms (20 FPS) target.'
question: 'How should DMA and ping-pong buffering raise a Cortex-M7 plus Ethos-U55 image pipeline from 10 FPS to 20 FPS?'
details:
  realistic_solution: 'Implement DMA for all significant data transfers: from SPI Flash to Cortex-M7 SRAM, and from SRAM to the Ethos-U55. Utilize ping-pong buffering to overlap DMA transfers with NPU computation, allowing the CPU to initiate the next transfer while the NPU is processing the current frame.'
  common_mistake: |
    **The Pitfall:** Relying solely on CPU-bound memory copies for data movement.
    **The Rationale:** Engineers neglect memory alignment and platform-specific DMA controllers when moving data to/from the NPU.
    **The Consequence:** The CPU blocks execution for tens of milliseconds, stalling the pipeline and missing frame rate targets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target frame time: 50 ms.
    - NPU inference: 30 ms.
    - Current CPU block time: 100 ms (total) - 30 ms (NPU) = 70 ms overhead.

    **Calculations:**
    - Allowed data transfer budget: < 20 ms.
    - Offloading 70 ms of blocking copies to DMA overlaps them with the 30 ms NPU compute.
    - Total frame time drops to ~30 ms (NPU) + ~20 ms (setup) = 50 ms.

    **Conclusion & Interpretation:**
    - **Result: 50 ms frame time ([I/O-Bound])**. DMA overlaps data movement with computation, hitting the 20 FPS target.
