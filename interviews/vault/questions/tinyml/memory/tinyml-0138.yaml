title: The Flash vs. SRAM Divide
scenario: You've compiled a TensorFlow Lite for Microcontrollers model for a keyword spotting device. The device has 1MB of Flash memory and 256KB of SRAM.
question: Where are the convolutional filter values primarily located, and where is the tensor arena for calculating activations allocated?
details:
  realistic_solution: 'Model weights (static, read-only) are stored in Flash memory (1 MB available) along with program code. The tensor arena (dynamic read/write during inference) is allocated in SRAM (256 KB available). On a Cortex-M4: Flash read latency = 1-2 wait states at 168 MHz (8-16 ns). SRAM access = 0 wait states (6 ns). Weights in flash: a 500 KB model reads directly via memory-mapped flash (XIP), no copy needed. Tensor arena in SRAM: 48 KB peak activation memory allocated at boot. SRAM provides the zero-wait-state random access needed for repeated read/write during convolution accumulation. Why not copy weights to SRAM? A 500 KB model would consume 500/256 = 195% of SRAM. Even a 100 KB model in SRAM leaves only 156 KB for activations and stack. The flash/SRAM split is not optional on MCUs; it is dictated by the memory hierarchy.'
  common_mistake: |
    **The Pitfall:** Assuming the entire model is loaded from Flash into SRAM for execution.
    **The Rationale:** Engineers accustomed to standard PC architectures expect full memory loads, unaware of 'execute-in-place' (XIP) patterns on microcontrollers.
    **The Consequence:** The model immediately fails to deploy because it exceeds SRAM capacity.
  napkin_math: |
    **Assumptions & Constraints:**
    - Flash memory: 1MB (read-only, slower).
    - SRAM: 256KB (read/write, fast).
    - Model weights: ~100KB (static).
    - Tensor arena (activations): ~60KB (dynamic).

    **Calculations:**
    - Weights in SRAM: 100KB / 256KB = 39% of SRAM (inefficient).
    - Weights in Flash (XIP): 0% SRAM overhead.

    **Conclusion & Interpretation:**
    - **Result: 0% SRAM overhead (Memory-Bound)**. Weights reside in Flash via Execute-In-Place (XIP); the tensor arena must be allocated in SRAM for fast, repeated read/writes.
  options:
  - 'Both the weights and the tensor arena are loaded into SRAM.'
  - 'The weights are loaded into SRAM, and the tensor arena is allocated in Flash.'
  - 'The weights are stored in Flash, and the tensor arena is allocated in SRAM.'
  - 'Both the weights and the tensor arena are allocated in Flash memory.'
  correct_index: 2
