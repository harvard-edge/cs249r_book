title: DMA vs. CPU for Sensor Data
scenario: You're building a 'wake-word' device using a Cortex-M4 MCU running at 168 MHz. A microphone provides a continuous stream of audio data that needs to be moved into SRAM for processing. For a 1-second buffer of 16-bit audio sampled at 16kHz, assume a direct `memcpy` takes roughly 4 clock cycles per byte transferred.
question: How much CPU time does a direct memcpy of the 1-second audio buffer take compared with a DMA transfer?
details:
  realistic_solution: A DMA (Direct Memory Access) controller is a dedicated piece of hardware that can move data between peripherals and memory without involving the CPU. Once configured, the transfer is 'free' from the CPU's perspective, allowing the CPU to perform other tasks (like inference) in parallel. A CPU-based `memcpy` blocks the processor for the entire duration of the copy, wasting valuable cycles.
  common_mistake: |
    **The Pitfall:** Underestimating the cost of the CPU copy and assuming DMA is too complex for "small" data.
    **The Rationale:** Engineers think "it's just a memcpy, it's fast," failing to translate that into blocked clock cycles.
    **The Consequence:** The CPU is unnecessarily blocked from performing ML inference, missing real-time deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Cortex-M4 at 168 MHz.
       - Audio Stream: 16 kHz sampling, 16-bit (2 bytes) resolution.
       - Buffer Duration: 1 second.
       - CPU `memcpy` Efficiency: 4 clock cycles per byte.
    2. **Calculations:**
       - Data Size: 16,000 samples × 2 bytes/sample = 32,000 bytes.
       - CPU `memcpy` Cycles: 32,000 bytes × 4 cycles/byte = 128,000 cycles.
       - CPU Block Time: 128,000 cycles / 168,000,000 Hz = 0.76 ms.
       - DMA CPU Overhead Time: ~0 ms (Hardware peripheral handles transfer).
    3. **Conclusion & Interpretation:**
       - **Result: CPU memcpy blocks for 0.76 ms, while DMA requires 0 ms of CPU time.** **Result: I/O Compute Optimization.**
  options:
  - DMA is slower due to a 1.5ms setup overhead that exceeds the memcpy time.
  - The CPU copy takes ~0.76ms, while the DMA transfer takes ~0 CPU time.
  - Both take ~0.76ms because they share the same physical memory bus.
  - The CPU copy takes ~7.6ms because you need 40 cycles/byte.
  correct_index: 1
