title: INT16 Activation SRAM Trade-off
scenario: 'Porting an audio model to a Cortex-M4. Weights are INT8, but activations are kept in INT16 due to extreme sensitivity to precision loss. A hidden layer outputs 10,000 dimensions.'
question: 'Analyze the quantitative SRAM size trade-off for the activation buffers when choosing INT16 over INT8 for this hidden layer.'
details:
  realistic_solution: 'A 10,000-dimension layer output in INT8 requires exactly 10,000 bytes (10KB) of contiguous SRAM. Promoting these activations to INT16 doubles the required memory per element to 2 bytes, demanding 20KB of SRAM. While this preserves high dynamic range, it forces the tiny microcontroller to permanently dedicate an extra 10KB of tight SRAM purely to state buffering.'
  common_mistake: |
    **The Pitfall:** Confusing weight quantization with activation quantization.
    **The Rationale:** Candidates calculate the memory difference for the static model parameters rather than the transient activation layer.
    **The Consequence:** They incorrectly estimate the runtime memory footprint, leading to unexpected OOMs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Layer outputs 10,000 dimensions.

    **Calculations:**
    - INT8 footprint: 10,000 dimensions * 1 byte = 10 KB.
    - INT16 footprint: 10,000 dimensions * 2 bytes = 20 KB.

    **Conclusion & Interpretation:**
    - **Result: +10 KB transient SRAM ([Memory-Bound])**. Promoting activations to INT16 costs an additional 10 KB of transient SRAM.
