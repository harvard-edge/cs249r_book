title: The Zero-Copy Race Condition
scenario: |
  You are the principal engineer designing a smart camera on a Cortex-M7 based MCU. To meet the strict power budget of 15mW, the team wants to implement a 'zero-copy' inference pipeline: the camera sensor writes image data directly into a buffer using Direct Memory Access (DMA), and the ML model reads from that *same buffer* for inference, avoiding any `memcpy` operations. The initial tests are failing catastrophically: the model produces garbage output and occasionally faults. Your analysis reveals the DMA controller is overwriting the image buffer while the model is still performing inference on it.
question: How would you design a complete, robust data flow architecture that achieves a safe, zero-copy pipeline?
details:
  realistic_solution: The problem is a classic race condition between the DMA hardware and the CPU/ML-accelerator. The L6+ solution is a hardware-aware software pattern, typically a **ping-pong (or double) buffer** synchronized with DMA interrupts.
  common_mistake: Suggesting locks, mutexes, or semaphores without specifying *how* they are implemented and integrated with the hardware. A common but incorrect answer is to simply have the DMA task take a mutex before writing and the inference task take the same mutex before reading. This completely defeats the purpose of concurrency, as one will always be blocking the other, serializing the pipeline and destroying performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Image size: 96x96x3 (27.6 KB).
    - Camera rate: 30 FPS.
    - Frame interval: 33.3ms.

    **Calculations:**
    - Ping-pong buffer size: 2 * 27.6 KB = 55.2 KB SRAM.
    - Interrupt frequency: Every 33.3ms to swap buffers.

    **Conclusion & Interpretation:**
    - **Result: 33.3ms Deadline (Compute-Bound)**. As long as the inference task completes within 33.3ms, the zero-copy pipeline will not drop frames.
