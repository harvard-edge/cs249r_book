title: The Zero-Copy Race Condition
scenario: |
  You are the principal engineer designing a smart camera on a Cortex-M7 based MCU. To meet the strict power budget of 15mW, the team wants to implement a 'zero-copy' inference pipeline: the camera sensor writes image data directly into a buffer using Direct Memory Access (DMA), and the ML model reads from that *same buffer* for inference, avoiding any `memcpy` operations. The initial tests are failing catastrophically: the model produces garbage output and occasionally faults. Your analysis reveals the DMA controller is overwriting the image buffer while the model is still performing inference on it.
question: How would you design a complete, robust data flow architecture that achieves a safe, zero-copy pipeline?
details:
  realistic_solution: The problem is a classic race condition between the DMA hardware and the CPU/ML accelerator. A robust zero-copy design uses two frame buffers with explicit ownership. DMA writes into buffer A while the CPU or accelerator consumes buffer B. On the DMA-complete interrupt, the driver marks A as full and owned by the inference task; when inference finishes, it returns B to the DMA-free pool. The DMA controller may only write buffers in the free state, and inference may only read buffers in the full state. If inference misses the frame deadline, the system should drop or overwrite only a free/stale buffer, never one currently owned by inference.
  common_mistake: |
    **The Pitfall:** Suggesting locks, mutexes, or semaphores without specifying how they are implemented.
    **The Rationale:** One will always be blocking the other.
    **The Consequence:** Serializing the pipeline and destroying performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Image size: 96x96x3 (27.6 KB).
    - Camera rate: 30 FPS.
    - Frame interval: 33.3ms.

    **Calculations:**
    - Ping-pong buffer size: 2 * 27.6 KB = 55.2 KB SRAM.
    - Interrupt frequency: every 33.3ms to mark the DMA-filled buffer as full.
    - Safe ownership rule: DMA may write only a free buffer; inference may read only a full buffer.
    - If inference time <= 33.3ms, double buffering can keep up without backlog.
    - If inference time > 33.3ms, the driver must drop the next frame or reuse only a free/stale buffer, never overwrite the buffer owned by inference.

    **Conclusion & Interpretation:**
    - **Result: explicit buffer ownership (Race-Condition Bound)**. Meeting the 33.3ms frame interval is necessary for no drops, but correctness comes from the ownership state machine that prevents DMA from overwriting a buffer while inference reads it.
