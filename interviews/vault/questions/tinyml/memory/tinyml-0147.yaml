title: 'The SRAM Overflow Trap'
scenario: 'A junior engineer is deploying a keyword spotting model on a microcontroller that has 512KB of Flash and 128KB of SRAM. They report an out-of-memory crash, and they''re confused because the model file is only 250KB, which easily fits in the available Flash storage. Your investigation reveals the model requires a 90KB tensor arena for its activations and intermediate buffers. Separately, the RTOS and other system processes consume a constant 48KB of SRAM.'
question: 'How would you calculate the total SRAM requirement and explain why the crash is happening?'
details:
  realistic_solution: 'The crash occurs because the device runs out of SRAM. The total runtime memory required is the sum of the model''s tensor arena and the system''s SRAM usage. The 250KB model size is stored in Flash and is irrelevant to the SRAM calculation for the tensor arena. The device only has 128KB of SRAM, but the demand is 138KB, causing an overflow.'
  common_mistake: |
    **The Pitfall:** Confusing storage (Flash) with working memory (SRAM).
    **The Rationale:** Engineers assume that if the model file fits in memory, it will run, forgetting that runtime memory usage (tensor arena) is a separate, critical budget.
    **The Consequence:** Attempting to deploy a model that exceeds SRAM capacity, resulting in immediate out-of-memory crashes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Required Tensor Arena: 90 KB.
    - System SRAM (RTOS): 48 KB.

    **Calculations:**
    - Total SRAM Demand: 90 KB + 48 KB = 138 KB.

    **Conclusion & Interpretation:**
    - **Result: 138 KB (Memory-Bound)**. 138 KB exceeds the 128 KB available SRAM, causing a crash.
  options:
    - 'The model fits. The 90 KB tensor arena is smaller than the 128 KB of available SRAM.'
    - 'The model is too large. The 250 KB model file must be loaded from Flash into the 128 KB SRAM, which is impossible.'
    - 'The device is out of SRAM. The required 138 KB (90 KB arena + 48 KB system) exceeds the 128 KB available. The model''s 250 KB file size is for Flash storage, not runtime RAM.'
    - 'The device is out of Flash. The 250 KB model and 48 KB system SRAM don''t leave enough space in the 512 KB of Flash for the OS.'
