title: The TinyML Tensor Arena Trap
scenario: You are deploying a simple audio keyword-spotting model to a Cortex-M4 microcontroller that has 256 KB of SRAM. The model's weights are stored in Flash. The system uses an SRAM 'tensor arena' to hold input, output, and all intermediate activation tensors.
question: How should you calculate the minimum tensor arena size for the keyword-spotting model's activation tensors?
details:
  realistic_solution: 'To find the peak memory usage, we must simulate the memory requirements at each step of the model''s execution.'
  common_mistake: |
    **The Pitfall:** Summing the sizes of all tensors to calculate the arena size.
    **The Rationale:** Assuming memory is statically allocated for all activations, like declaring global arrays for every layer.
    **The Consequence:** Drastically overestimating the memory required (e.g., 58 KB instead of 24 KB), leading to inefficient memory usage or failing to deploy on smaller MCUs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tensors: The model has tensors of sizes 12 KB, 28 KB, 16 KB, and 2 KB.

    **Calculations:**
    - Layer 1 Lifetime: Reads 12 KB input to write 28 KB output. Memory = 12 + 28 = 40 KB.
    - Layer 2 Lifetime: Reads 28 KB input to write 16 KB output. Memory = 28 + 16 = 44 KB.
    - Layer 3 Lifetime: Reads 16 KB input to write 2 KB output. Memory = 16 + 2 = 18 KB.

    **Conclusion & Interpretation:**
    - **Result: 44 KB (Memory-Bound)**. The peak concurrent usage is max(40, 44, 18) = 44 KB.
  options:
  - '58 KB'
  - '28 KB'
  - '44 KB'
  - '40 KB'
  correct_index: 2
