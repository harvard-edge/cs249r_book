title: Flash Weight Mapping
scenario: A 300KB INT8 keyword spotting model needs to run on a Cortex-M4 with 256KB SRAM and 1MB Flash.
question: Analyze the memory mapping strategy required to execute the model by fetching weights directly from Flash while keeping activations in SRAM.
visual:
  kind: svg
  path: tinyml-1580.svg
  alt: Bar chart showing model weights exceeding SRAM capacity but fitting in Flash.
  caption: Model Size vs Capacity Constraints
details:
  realistic_solution: 'The candidate analyzes the sizes and determines the model weights (300KB) exceed SRAM (256KB). Therefore, weights must be kept in Flash (execute-in-place / XIP), and SRAM is strictly reserved for the mutable activations/buffers.'
  common_mistake: |
    **The Pitfall:** Suggesting copying the entire model into SRAM before execution.
    **The Rationale:** Developers accustomed to systems with gigabytes of RAM assume all code and data must be loaded into memory prior to execution.
    **The Consequence:** The application throws an Out of Memory (OOM) error at boot time and immediately crashes because the 300KB model exceeds the 256KB SRAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Weight Size: 300 KB.
    - Available SRAM: 256 KB.

    **Calculations:**
    - Strategy: 300 KB > 256 KB.

    **Conclusion & Interpretation:**
    - **Result: Execute-in-Place Required (Memory-Bound).** Must use Flash for weights and strictly reserve SRAM for mutable activations to avoid boot-time OOM errors.
