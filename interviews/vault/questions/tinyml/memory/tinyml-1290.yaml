title: nRF5340 DMA Pipeline Design for Audio ML
scenario: We are designing an always-on keyword spotting system on the Nordic nRF5340. The system captures audio from an I2S microphone, processes it on the 128 MHz application core, and transmits triggers via the 64 MHz network core over BLE 5.3. The system is constrained by a strict 256 KB SRAM constraint and a target of sub-5mA active current.
question: How should an nRF5340 audio ML pipeline use EasyDMA and SRAM buffers to ingest 16 kHz audio without unnecessary CPU wakeups?
details:
  realistic_solution: Specify a double-buffered (ping-pong) EasyDMA setup. The I2S peripheral directly writes 20ms audio chunks into SRAM via EasyDMA without CPU intervention. The 128 MHz application core remains in a low-power state until a DMA completion event wakes it, then passes the memory pointer directly to the ML model (zero-copy) for inference, minimizing data movement overhead.
  common_mistake: Candidates often propose an interrupt-driven approach that wakes the CPU per sample or small block, draining the battery well beyond the ~5mA budget. Alternatively, they might suggest copying data multiple times between the I2S DMA buffer, DSP buffer, and the ML input tensor, wasting the limited 256 KB SRAM and CPU cycles.
  napkin_math: |
    **Assumptions & Constraints:**
    - Audio rate: 16 kHz, 16-bit (32 KB/sec).
    - Buffer length: 20ms ping-pong buffers.
    - Core constraints: 128 MHz app core, 256 KB SRAM, ~5mA active budget.
    - Inference time: 10ms per 20ms window.

    **Calculations:**
    - Buffer memory: 32 KB/sec * 0.02s * 2 buffers = 1.28 KB.
    - CPU duty cycle: 10ms inference / 20ms window = 50%.
    - Average CPU active current: 50% * ~5mA = 2.5mA.

    **Conclusion & Interpretation:**
    - **Result: 2.5mA Average (Compute-Feasible)**. The ping-pong buffers take <1% of SRAM, and the CPU duty cycle easily meets the sub-5mA power budget.
