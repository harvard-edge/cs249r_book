title: 'Model Size Estimation: Realize Parameter Count and Memory for MCU Anomaly Detector'
scenario: 'You need to size the complete memory layout for a vibration anomaly detector on Cortex-M4 (168MHz, 256KB SRAM, 512KB Flash). The model contains 3 Conv1D layers (filters: 16, 32, 64; kernel: 8, 4, 2; input: 256 samples INT16) + Global Average Pooling + FC-2.'
question: 'How many bias bytes are required for the Conv1D anomaly detector, and why is that count different from the incorrect estimate?'
details:
  realistic_solution: 'Bias count = sum of neurons per layer: 16+32+64+2 = 114 biases × 4B = 456 bytes.'
  common_mistake: |
    **The Pitfall:** Forgetting that Conv1D parameters depend on (filters × previous_filters × kernel_size) + biases.
    **The Rationale:** Candidates often use standard dense layer parameter formulas or miscalculate the number of bias terms.
    **The Consequence:** The model size estimate is inaccurate, leading to poor memory allocation on the MCU.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3 Conv1D layers (filters: 16, 32, 64).
    - Output FC layer: 2 neurons.

    **Calculations:**
    - Layer 1 biases: 16.
    - Layer 2 biases: 32.
    - Layer 3 biases: 64.
    - FC biases: 2.
    - Total biases: 16 + 32 + 64 + 2 = 114.
    - Memory: 114 * 4 bytes (FP32) = 456 bytes.

    **Conclusion & Interpretation:**
    - **Result: 456 bytes (Memory Bound)**. A standard bias count depends solely on the number of filters per layer, requiring exactly 456 bytes of storage.
