title: SRAM Allocation and Peak Memory Calculation on nRF5340
scenario: >
  A continuous health monitoring ML model is deployed on an nRF5340 with 256 KB of SRAM.
  The BLE stack and RTOS reserve 64 KB, and application buffers consume 48 KB. The model requires a 150 KB tensor arena.
question: How much SRAM remains for the ML arena, and will this deployment fit?
details:
  realistic_solution: |
    The candidate should identify the total SRAM and subtract the memory reserved for the OS, BLE stack, and application buffers to find the true available memory for the ML arena. Since the available SRAM is less than the model's required peak memory, the deployment will fail with an out-of-memory error. The candidate should conclude that the model must be optimized further, such as by reducing the activation footprint via structural changes or memory arena reuse.
  common_mistake: |
    **The Pitfall:** Assuming the entire 256 KB of SRAM is available exclusively for the ML model's activations.
    **The Rationale:** Candidates ignore the memory footprint of the RTOS, BLE stack, and application state.
    **The Consequence:** The model is deployed but immediately fails with an out-of-memory error.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total SRAM: 256 KB.
    - Required Peak Arena: 150 KB.
    - System overhead: 64 KB (RTOS/BLE) + 48 KB (App) = 112 KB.

    **Calculations:**
    - Available SRAM for ML: 256 KB - 112 KB = 144 KB.
    - Deficit: 150 KB - 144 KB = 6 KB shortage.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound (OOM Crash)**. The required arena strictly exceeds available memory.
