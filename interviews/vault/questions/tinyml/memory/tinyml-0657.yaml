title: The DMA Energy Break-Even Point
scenario: 'You are architecting the data input path for a visual wake-word system on a Cortex-M4. The camera produces a 96x96 grayscale image (9,216 bytes) that must be moved from a peripheral buffer into the model input tensor. You must minimize total energy consumption per inference.'
question: 'How would you calculate the DMA-vs-CPU-copy energy break-even transfer size for a 9,216-byte camera frame on a Cortex-M4?'
details:
  realistic_solution: 'The break-even point occurs when the energy consumed by the CPU to perform the copy equals the energy consumed by the DMA controller plus the energy consumed by the sleeping CPU during the transfer. The architecture should use nsys profiling for tuning and be interrupt-driven: for DMA, the CPU configures the transfer, enters a deep sleep state, and is woken by a DMA complete interrupt. For all but the most trivial transfer sizes, the DMA approach is vastly more energy-efficient.'
  common_mistake: |
    **The Pitfall:** Comparing latency directly without translating it into energy or ignoring power states.
    **The Rationale:** Engineers often correctly identify DMA is faster but fail to consider the CPU can sleep during DMA transfers.
    **The Consequence:** They misunderstand the dominant factor in energy savings and fail to optimize battery life effectively.
  napkin_math: |
    **Assumptions & Constraints:**
    - Image size: 9,216 bytes.
    - CPU Frequency: 168 MHz.
    - Power states: CPU active ~30 mW, Sleep ~0.5 mW, DMA active ~0.5 mW.

    **Calculations:**
    - CPU memcpy: ~1 cycle/byte -> 9,216 / 168M = 55 µs active. Energy = 55 µs * 30 mW = 1.65 µJ.
    - DMA transfer: setup ~5 µs active + 55 µs sleep. Energy = (5 µs * 30 mW) + (55 µs * 0.5 mW) = 0.15 µJ + 0.0275 µJ = 0.1775 µJ.
    - Break-even equation: P_active * (S/BW) = P_active * setup_time + P_sleep * (S/BW).
    - Solving for S yields ~50-100 bytes.

    **Conclusion & Interpretation:**
    - **Result: ~100 bytes break-even ([Power-Bound])**. Above ~100 bytes, DMA is vastly more energy-efficient (saving ~9x energy for a 9KB image).
