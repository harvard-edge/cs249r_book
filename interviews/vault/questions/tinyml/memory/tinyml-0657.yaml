title: The DMA Energy Break-Even Point
scenario: You are architecting the data input path for a visual wake-word system on a Cortex-M4. The camera produces a 96x96 grayscale image (9,216 bytes) that must be moved from a peripheral buffer into the model input tensor. You must minimize total energy consumption per inference.
question: What is the DMA-vs-CPU-copy energy break-even size, and is a 9,216-byte camera frame above it?
details:
  realistic_solution: The break-even point occurs when CPU-copy energy equals DMA setup energy plus DMA-transfer energy while the CPU sleeps. Using the stated Cortex-M4 assumptions, CPU copy time is about S / 168 MB/s and DMA setup costs 5 us of active CPU time. Solve 30 mW * (S / 168 MB/s) = 30 mW * 5 us + (0.5 mW sleep + 0.5 mW DMA) * (S / 168 MB/s), which gives a break-even of roughly 870 bytes. A 9,216-byte frame is far above that threshold, so the data path should configure DMA, enter sleep, and wake on a DMA-complete interrupt.
  common_mistake: |
    **The Pitfall:** Comparing latency directly without translating it into energy or ignoring power states.
    **The Rationale:** Engineers often correctly identify DMA is faster but fail to consider the CPU can sleep during DMA transfers.
    **The Consequence:** They misunderstand the dominant factor in energy savings and fail to optimize battery life effectively.
  napkin_math: |
    **Assumptions & Constraints:**
    - Image size: 9,216 bytes.
    - CPU Frequency: 168 MHz.
    - Power states: CPU active ~30 mW, Sleep ~0.5 mW, DMA active ~0.5 mW.

    **Calculations:**
    - Simplifying CPU memcpy bandwidth assumption: ~1 cycle/byte -> 168 MB/s.
    - CPU memcpy for 9,216 bytes: 9,216 / 168M = 55 µs active. Energy = 55 µs * 30 mW = 1.65 µJ.
    - DMA transfer for 9,216 bytes: setup ~5 µs active + 55 µs transfer while CPU sleeps and DMA is active.
    - DMA energy = (5 µs * 30 mW) + (55 µs * (0.5 mW sleep + 0.5 mW DMA)) = 0.15 µJ + 0.055 µJ = 0.205 µJ.
    - Break-even equation: 30 mW * (S / 168 MB/s) = 30 mW * 5 µs + 1.0 mW * (S / 168 MB/s).
    - Break-even transfer time = 150 nJ / 29 mW = 5.17 µs.
    - Break-even size = 168 MB/s * 5.17 µs = ~868 bytes.

    **Conclusion & Interpretation:**
    - **Result: ~870 bytes break-even (Power-Bound)**. A 9,216-byte frame is about 10.6x larger than the break-even size, and DMA saves roughly 1.65 µJ / 0.205 µJ = 8x energy for the frame under these assumptions.
