title: DMA Cycle Stealing Overhead
scenario: You are deploying an INT8 vision model. A camera sensor feeds 96x96 grayscale images (1 byte per pixel) into the SRAM via DMA at 10 frames per second. The CPU processes these images using CMSIS-NN SIMD instructions.
question: What DMA bandwidth and cycle-stealing overhead does a 96x96 camera stream impose on inference when running at 168 MHz?
details:
  realistic_solution: Each 96x96 grayscale frame is 9,216 bytes, so a continuous 10 fps camera stream requires 92,160 B/s, or about 92.2 kB/s, of DMA bandwidth into SRAM. With the stated 1-cycle penalty per transferred byte, DMA steals 9,216 cycles per frame. At 168 MHz and 10 fps, each frame period has 16,800,000 CPU cycles, so the bus-contention overhead is about 9,216 / 16,800,000 = 0.055%.
  common_mistake: |
    **The Pitfall:** Assuming DMA operations cost absolutely zero CPU cycles.
    **The Rationale:** Candidates believe hardware controllers entirely offload the CPU, forgetting the penalty of SRAM bus contention (cycle stealing).
    **The Consequence:** Real-time throughput is lower than calculated because the CPU stalls every time the DMA accesses the shared memory bank.
  napkin_math: |
    **Assumptions & Constraints:**
    - Image size: 96 x 96 bytes.
    - Frame rate: 10 fps.
    - CPU clock: 168 MHz.
    - Cycle penalty: 1 cycle per DMA byte transfer.

    **Calculations:**
    - Image size = 9,216 bytes.
    - DMA bandwidth = 9,216 * 10 = 92,160 bytes/sec = ~92.2 kB/sec.
    - Cycles stolen = 9,216 cycles/frame.
    - Total CPU cycles per frame = 168,000,000 / 10 = 16,800,000 cycles.
    - Cycle-stealing overhead = 9,216 / 16,800,000 = 0.0005486 = 0.055%.
    - Available cycles for inference = 16,800,000 - 9,216 = 16,790,784 cycles.

    **Conclusion & Interpretation:**
    - **Result: 92,160 B/s DMA bandwidth and 0.055% cycle-stealing overhead**. The cycle stealing is measurable but small for this 10 fps stream; whether inference is compute-bound requires comparing against the model's own cycle budget.
