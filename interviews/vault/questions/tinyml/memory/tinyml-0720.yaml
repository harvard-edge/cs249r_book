title: The Peak RAM Puzzle
scenario: Your 8-layer convolutional model needs 300 KB of peak activation RAM, but your Cortex-M7 only has 256 KB of SRAM available after firmware and stack. You cannot change the model architecture.
question: How can an 8-layer CNN needing 300 KB peak activation RAM fit in 256 KB of Cortex-M7 SRAM?
details:
  realistic_solution: 'Operator scheduling for peak RAM reduction. The key insight: not all layers'' activations are alive at the same time. By reordering operator execution (computing and immediately consuming activations before moving to the next layer), you can overwrite dead tensors. Tools like TFLite Micro''s memory planner and MCUNet''s patch-based inference take this further — instead of computing an entire feature map at once, you compute it in spatial patches, reducing peak RAM from the full feature map size to a single patch''s worth.'
  common_mistake: '"Quantize the model to use less memory." Quantizing weights from FP32 to INT8 shrinks the weight storage in Flash, but activations are already INT8 in a quantized pipeline — the peak activation footprint barely changes.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard 8-layer CNN with 64 channels at 48x48 spatial resolution.
    - Cortex-M7 SRAM: 256 KB available.

    **Calculations:**
    - Full activation tensor = 64 * 48 * 48 * 1 byte (INT8) = 144 KB.
    - Two full tensors alive = 288 KB (exceeds 256 KB).
    - Patch-based inference (12x48 patches): 64 * 12 * 48 * 1 byte = 36 KB per tensor.
    - Two patch tensors alive = 72 KB.

    **Conclusion & Interpretation:**
    - **Result: 72 KB peak activation RAM (Memory-Capacity-Bound)**. With spatial patch-based execution, the model now easily fits in SRAM with room to spare.
