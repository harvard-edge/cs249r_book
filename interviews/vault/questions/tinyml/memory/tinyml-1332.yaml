title: TinyML Memory Hierarchy Optimization on Nordic nRF5340
scenario: You are developing a sophisticated keyword spotting application using a small Convolutional Neural Network (CNN) on the Nordic nRF5340, which features 256 KB SRAM and 1 MB flash memory.
question: How should an nRF5340 place 100 KB CNN weights, 50 KB activations, buffers, and code across flash, SRAM, and registers?
details:
  realistic_solution: Put program code and the constant model image in flash. If the 100 KB weight figure is the original FP32 size, INT8 conversion makes the stored weights about 25 KB; if it is already a deployed byte size, do not shrink it again. Keep activations, input/output tensors, scratch buffers, the TFLM arena, stack, and any staged hot weights in SRAM. Use registers only for loop counters, accumulators, pointers, and tiny temporaries chosen by the compiler. Weights can remain in flash when latency is acceptable, or selected layers can be copied to SRAM when flash stalls dominate.
  common_mistake: |
    **The Pitfall:** Proposing external memory solutions (like HBM/DRAM) for an MCU.
    **The Rationale:** Candidates accustomed to cloud ML hardware fail to understand the architectural impedance mismatch, cost, and power implications for a microcontroller.
    **The Consequence:** Proposing a hardware design that is impossible to build within the power and cost constraints of a TinyML device.
  napkin_math: |
    **Assumptions & Constraints:**
    - nRF5340: 256 KB SRAM, 1 MB Flash.
    - CNN: 100 KB weights (FP32 originally, quantizable to INT8), 50 KB activations.

    **Calculations:**
    - INT8 Quantization: 100 KB weights -> 25 KB.
    - Minimum SRAM for tensors if weights stay in flash: 50 KB activations + tensor arena/scratch/stack overhead.
    - Default placement: code and constant INT8 weights live in flash; SRAM must cover 50 KB activations plus the TFLM arena, scratch buffers, I/O tensors, stack, and any copied hot layer weights.
    - Optional staged-weight case: 50 KB activations + 25 KB INT8 weights = 75 KB before arena, I/O buffers, stack, and scratch, so it is a special optimization only after runtime overhead is budgeted.
    - If the 100 KB figure is already the deployed INT8 byte size, flash weight storage is 100 KB and staging all weights would consume 100 KB SRAM, not 25 KB.

    **Conclusion & Interpretation:**
    - **Result: flash should hold code and constant weights; SRAM should be reserved for activations, arena, scratch, stack, I/O, and only selected staged weights (Memory-Footprint-Bound)**. Do not treat a leftover SRAM number after staging all weights as the default deployment budget.
