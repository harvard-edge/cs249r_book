title: Cortex-M4 Memory Fit Check for a 50K Parameter INT8 Model
scenario: A 50K parameter INT8 model runs on a Cortex-M4.
question: Does a 50K-parameter INT8 model fit in 512 KB Flash and 256 KB SRAM on a Cortex-M4?
details:
  realistic_solution: 'Model storage is 50K * 1B = 50KB Flash. With about 64KB app code and 20KB TFLM kernels, total Flash is 134KB, well below 512KB. SRAM depends on the activation arena, so state the assumption: if this is a small CNN with peak activations around 2x the weight size, activations are about 100KB. Add 30KB TFLM runtime and 8KB stack for total SRAM of 138KB, below 256KB. Under that assumption, the model fits comfortably in both Flash and SRAM.'
  common_mistake: |
    **The Pitfall:** Stating '50KB Flash' and ignoring the RTOS, TFLM runtime, and activations.
    **The Rationale:** Candidates fail to size the full software stack required to actually execute the model on bare metal.
    **The Consequence:** The model fits but the system OOMs at runtime because the OS and activations exceed available SRAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM: 256KB.
    - Flash: 512KB.
    - INT8 Model: 50K parameters (1 byte/param).
    - App code: ~64KB.
    - TFLM runtime: 20KB Flash, 30KB SRAM.
    - Stack: 8KB.

    **Calculations:**
    - Flash Budget: 50KB (model) + 64KB (app) + 20KB (runtime) = 134KB.
    - SRAM Fixed: 30KB (runtime) + 8KB (stack) = 38KB.
    - SRAM Activations: assume a small CNN with peak activations ~2x weight size = ~100KB.
    - Total SRAM: 38KB + 100KB = 138KB.

    **Conclusion & Interpretation:**
    - **Result: Fits Comfortably**. The model uses about 134KB Flash and 138KB SRAM under the stated activation assumption, both below the Cortex-M4 budgets.
