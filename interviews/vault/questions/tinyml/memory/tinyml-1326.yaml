title: 'ESP32-S3 Memory Hierarchy: Capacity, Bandwidth, Latency Tradeoffs'
scenario: Consider an MCU equipped with a dual-core processor, 512 KB internal SRAM, and 8 MB external PSRAM.
question: What are the memory tiers and how do their capacity, bandwidth, and latency affect TinyML placement?
details:
  realistic_solution: The memory hierarchy spans ultra-fast CPU registers, highly performant internal SRAM (512 KB), larger but slower external PSRAM (8 MB), and persistent Flash. Optimal TinyML placement demands mapping critical execution paths and dynamic intermediate activation tensors to the high-bandwidth internal SRAM. Larger, static model weights can be pushed to external PSRAM, accepting the latency hit, while the core ML binary resides in Flash. Explicit DMA (Direct Memory Access) transfers should be orchestrated to pipeline data movement between PSRAM and internal SRAM, masking the external memory latency.
  common_mistake: |
    **The Pitfall:** Overlooking the profound latency disparity between internal SRAM and external PSRAM.
    **The Rationale:** Developers map continuous variables or critical activation buffers to PSRAM, assuming uniform memory access times across the address space.
    **The Consequence:** The model compiles, but execution stalls constantly on bus latency, causing severe performance bottlenecks and broken real-time deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - CPU Clock: 240 MHz.
    - Internal SRAM access: ~1-2 cycles.
    - External PSRAM access: ~10-30 cycles.

    **Calculations:**
    - Effective Bandwidth Ratio: SRAM natively delivers gigabytes/sec, while PSRAM limits out at ~100-200 Mbps due to SPI bus constraints.
    - Accessing a 100 KB tensor continuously from PSRAM incurs a 10x-20x latency penalty per iteration.

    **Conclusion & Interpretation:**
    - **Result: 10x-20x penalty (Memory-Bandwidth Bound)**. Activation tensors must stay in SRAM to preserve inference throughput.
