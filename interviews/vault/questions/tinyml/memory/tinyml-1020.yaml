title: 'Audio Pipeline DMA Tradeoffs on ESP32-S3'
scenario: 'You are designing an audio pipeline for a continuous keyword spotting model on the ESP32-S3. The microphone captures 16-bit audio at 16 kHz, requiring a 1-second window for inference using INT8 vector extensions.'
question: 'Which memory pipeline design maximizes inference bandwidth and CPU sleep time on the ESP32-S3?'
details:
  realistic_solution: |
    Use DMA with a 32 KB ping-pong buffer routed directly to internal SRAM. This allows the CPU to sleep entirely while the buffer fills, and feeds the INT8 vector extensions at maximum SRAM bandwidth, bypassing slow PSRAM SPI latency.
  common_mistake: |
    **The Pitfall:** Storing 1-second audio buffers in external PSRAM via CPU interrupts.
    **The Rationale:** Candidates assume 1 second of audio is 'large' and must go to PSRAM without calculating the precise 32 KB footprint.
    **The Consequence:** High-frequency CPU interrupts and slow external SPI latency bottleneck vector MAC operations and ruin battery life.
  napkin_math: |
    **Assumptions & Constraints:**
    - Audio: 16 kHz, 16-bit (2 bytes/sample)
    - Window: 1 second

    **Calculations:**
    - Total Audio Data = 16,000 * 2 = 32,000 bytes (~32 KB)
    - CPU Interrupts (32B chunks) = 1,000 Hz = ~100k wasted cycles/sec
    - DMA Interrupts (16KB ping-pong) = 2 Hz

    **Conclusion & Interpretation:**
    - **Result: 32 KB in SRAM (Memory-Bandwidth-Bound)**. DMA routing to SRAM keeps the 240 MHz CPU asleep 99.8% of the time.
