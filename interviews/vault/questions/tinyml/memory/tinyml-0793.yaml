title: Tinyml New 0015
scenario: A Cortex-M4 device dynamically allocates memory for variable-length audio ML inferences. It works perfectly for 12 hours, then predictably crashes with a HardFault due to memory allocation failure.
question: Why does variable-length dynamic allocation eventually crash the Cortex-M4 despite enough total free SRAM?
details:
  realistic_solution: The symptom is classic heap fragmentation. Dynamic allocation (`malloc`/`free`) of varying lengths of audio tensors leaves small, unusable gaps in the SRAM over time. Eventually, although the total free memory is sufficient, there is no contiguous block large enough for the next tensor, causing `malloc` to return NULL. The solution is to use static memory pools or a global tensor arena.
  common_mistake: |
    **The Pitfall:** Using standard dynamic memory allocation (`malloc`/`free`) for variable-length ML inferences.
    **The Rationale:** Candidates ignore the inevitability of heap fragmentation over time on a constrained RTOS without a memory management unit (MMU).
    **The Consequence:** Unpredictable HardFault crashes in production despite having enough total free SRAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Free SRAM: 100 KB.
    - Fragmentation: Five 20 KB gaps.
    - Requested Tensor: 30 KB.

    **Calculations:**
    - Max Contiguous Memory: 20 KB. 30 KB > 20 KB.

    **Conclusion & Interpretation:**
    - **Result: Malloc returns NULL (Memory-Bound).** Heap fragmentation inevitably destroys availability despite having sufficient total bytes.
