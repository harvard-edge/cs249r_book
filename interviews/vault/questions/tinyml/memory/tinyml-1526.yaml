title: Tensor Arena Planning for Streaming Audio on MCU
scenario: >
  Your keyword spotting model on ESP32-S3 processes 1-second audio windows at 16 kHz. The MFCC features require 7.84 KB. The tensor arena is 85 KB. You use double-buffered audio capture (2 x 32 KB = 64 KB). A colleague says you can reduce audio buffer memory by 50% using ping-pong DMA with smaller buffers.
question: Can smaller ping-pong DMA buffers cut ESP32-S3 audio capture SRAM by 50% for 1-second, 16 kHz KWS windows?
details:
  realistic_solution: >
    Yes, utilizing sub-window ping-pong DMA transfers (e.g., 250ms chunks) cuts audio buffer RAM drastically (up to 75%). However, this mandates a sliding-window MFCC feature extraction pipeline. Instead of processing a full 1-second batch, the CPU calculates features incrementally, accumulating them in the persistent 7.84 KB feature buffer before triggering the 85ms inference.
  common_mistake: |
    **The Pitfall:** Processing single 32 KB buffers in-place without double buffering.
    **The Rationale:** Candidates fail to understand that physical sensors stream asynchronously and must be captured while the CPU is busy computing.
    **The Consequence:** Single-buffering causes catastrophic data corruption and audio tearing when capture and processing overlap.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Audio: 16 kHz, 2 bytes/sample. Window: 1s.
       - Original: 2 * 32 KB = 64 KB.
       - Inference Time: 85 ms.
    2. **Calculations:**
       - 250ms chunks: 16,000 * 0.25 * 2 = 8 KB/buffer.
       - Double-buffered 250ms: 2 * 8 KB = 16 KB (75% reduction from 64 KB).
       - Processing Slack: 250 ms (deadline) - 85 ms (inference) = 165 ms safe slack.
    3. **Conclusion & Interpretation:**
       - **Result: 75% savings (16 KB total).** Smaller DMA buffers work perfectly provided inference easily fits within the sub-window deadline. **Bottleneck: SRAM/Interrupt Overhead.**
