title: Tensor Lifetime Analysis for U-Net on MCU
scenario: 'You''re deploying a tiny U-Net (for anomaly detection) on Cortex-M7 (512 KB SRAM). The U-Net has skip connections: encoder layer 1 output must stay alive until it''s consumed by decoder layer 4 (the last decoder layer). This means the encoder 1 tensor (32 KB) has a very long lifetime — it''s alive during the entire encoder and decoder. Combined with normal activation memory, the arena peaks at 580 KB.'
question: How do you reduce peak memory below 512 KB without changing the model architecture?
details:
  realistic_solution: 'The 580 KB peak is 68 KB above the 512 KB SRAM cap, so the fix must remove at least 68 KB of simultaneously live tensors. A coherent plan is to eliminate the long-lived skip tensors from the arena and also reduce a small amount of scratch/overlap memory: recompute the cheap early skips or spill them to external storage, and use the TFLM planner to reuse the freed lifetime ranges for decoder temporaries. The four skips are 32 KB + 16 KB + 8 KB + 4 KB = 60 KB, which lowers peak from 580 KB to 520 KB if all are removed from the live arena. That is still 8 KB over the cap, so add a targeted 2-way tile only for the peak decoder block or reduce its scratch buffer by at least 8 KB through operator scheduling/buffer reuse. Final peak is about 580 - 60 - 16 = 504 KB with a 16 KB tiled/scratch reduction. This keeps the architecture and weights unchanged; the tradeoff is extra compute for recomputation or extra I/O for spill, plus careful halo handling if tiling is used.'
  common_mistake: |
    **The Pitfall:** Removing skip connections to reduce memory.
    **The Rationale:** Candidates assume that simply cutting out layers or connections is a valid optimization without considering the functional impact.
    **The Consequence:** This fundamentally changes the model architecture and degrades accuracy significantly, as skip connections are essential for U-Net's precision in dense prediction tasks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak memory: 580 KB (exceeds 512 KB limit).
    - Skip connections: 32 KB, 16 KB, 8 KB, 4 KB (total 60 KB).

    **Calculations:**
    - Original Peak: 580 KB (68 KB over).
    - Removing only Encoder-1 skip: 580 KB - 32 KB = 548 KB (still over).
    - Removing Encoder-1 and Encoder-2 skips: 580 KB - 32 KB - 16 KB = 532 KB (still over).
    - Removing all long-lived skips from the arena: 580 KB - (32 + 16 + 8 + 4) KB = 520 KB (still 8 KB over).
    - Add targeted tiling or scratch reuse at the peak decoder block to save at least 16 KB.
    - Final estimated peak: 520 KB - 16 KB = 504 KB.

    **Conclusion & Interpretation:**
    - **Result: ~504 KB Peak (Memory-Bound)**. Skip recomputation/spill alone is not enough for the stated 580 KB peak; it must be combined with a small, explicit tiling or scratch-buffer reduction to get below 512 KB.
