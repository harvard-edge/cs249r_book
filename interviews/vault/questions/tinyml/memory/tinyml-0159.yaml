title: The Whole-Graph Arena Plan
scenario: Your team is debugging an 'arena is too small' error on a device. You have the memory plan for a simple two-op model from the TFLM analyzer. Op1 requires a 10 KB input tensor, a 50 KB output tensor, and 5 KB for persistent parameters. Op2 takes Op1's output as its input, and produces a 20 KB output tensor. The runtime will manage buffer reuse between ops, and requires a 10 KB tail for its internal state.
question: How do you compute the minimum tensor arena size for a two-op TFLM model with buffer reuse and runtime tail overhead?
details:
  realistic_solution: |
    To find the minimum arena size, we must simulate the execution and find the point in time where the sum of all live tensors is at its maximum. Persistent tensors from earlier ops remain live throughout the graph's execution.
  common_mistake: |
    **The Pitfall:** Incorrectly summing all memory requirements without considering reuse, or forgetting the runtime tail.
    **The Rationale:** Engineers either assume all tensors must be kept in memory simultaneously, or they find the peak tensor usage but overlook the framework's internal overhead.
    **The Consequence:** This leads to vastly overestimated sizes (wasting SRAM) or an off-by-a-little error that still fails to allocate on-device.
  napkin_math: |
    1. Op1 memory: 10 KB (Input) + 50 KB (Output) + 5 KB (Persistent) = 65 KB.
    2. Op2 memory: Op1's Output becomes Input (50 KB) + new Output (20 KB) = 70 KB.
    3. The transition point between Op1 and Op2 requires holding both Op1's output and Op2's output.
    4. Peak memory = 50 KB (Op1 Out) + 20 KB (Op2 Out) + 5 KB (Persistent) + 10 KB (runtime tail) = 85 KB.
    5. **Peak memory is 85 KB, which fits comfortably within a typical 256 KB SRAM.**
  options:
  - 75 KB
  - 145 KB
  - 85 KB
  - 80 KB
  correct_index: 2
