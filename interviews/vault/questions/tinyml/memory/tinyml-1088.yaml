title: 'Corstone-300 Memory Allocation for KWS'
scenario: 'You are architecting an always-on keyword spotting pipeline for an ARM Corstone-300 platform (Cortex-M7 at 480 MHz + Ethos-U55). The SoC features exactly 512 KB of shared SRAM. The system must support an RTOS, an audio feature extraction pipeline on the M7, and neural network inference on the U55.'
question: 'How should the Corstone-300 allocate the 512 KB of shared SRAM and external Flash to maximize Ethos-U55 utilization without hitting OOM errors?'
details:
  realistic_solution: 'The best design leverages the Ethos-U55''s weight streaming capability directly from external embedded Flash, while strictly reserving the 512 KB SRAM for intermediate activations, the M7''s audio ring buffer, and RTOS state. The candidate should evaluate using offline weight compression (supported by the Ethos-U compiler) to reduce Flash bandwidth requirements, ensuring the U55 MACs are not memory-starved.'
  common_mistake: |
    **The Pitfall:** Proposing to fetch all weights into SRAM before inference.
    **The Rationale:** Candidates assume SRAM can fit the whole model, failing to account for the RTOS and audio buffer footprints.
    **The Consequence:** This leads to out-of-memory (OOM) errors and overlooks the Ethos-U55's capability to stream compressed weights directly from Flash.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM Allocation: 512 KB total.
    - U55: 480 MHz with 256 MAC/cycle.
    - Flash Streaming: 100 MB/s.

    **Calculations:**
    - Assign 64 KB for RTOS/stack and 128 KB for M7 audio ring buffer.
    - Leaves 320 KB for U55 activations.
    - Peak Compute: 122.88 GMAC/s. A 500K MAC layer takes ~4 μs.
    - Flash Streaming Latency: Loading 10 KB of compressed weights at 100 MB/s takes 100 μs.

    **Conclusion & Interpretation:**
    - **Result: 320 KB activations (Memory-Bandwidth-Bound)**. Weights must be compressed offline and streamed from Flash to avoid OOM.
