title: 'Constrained Memory Allocation'
scenario: 'An INT8 CNN requires 300KB for weights and 50KB for peak intermediate activations. The target Cortex-M4 has 256KB SRAM and 1MB Flash.'
question: 'How must the model''s memory be laid out to successfully execute without out-of-memory errors?'
details:
  realistic_solution: 'The 300KB of read-only INT8 weights must be stored in the 1MB Flash memory and read sequentially (Execute in Place). The 50KB of mutable intermediate activations are allocated in the 256KB SRAM.'
  common_mistake: |
    **The Pitfall:** Attempting to load all weights into SRAM during initialization.
    **The Rationale:** Candidates apply cloud/desktop memory models where all assets are loaded into RAM before execution.
    **The Consequence:** Immediate Out-Of-Memory (OOM) hard fault on the MCU since weights exceed available SRAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM: 256 KB, Flash: 1024 KB.
    - Weights: 300 KB, Activations: 50 KB.

    **Calculations:**
    - Flash storage check = 300 KB < 1024 KB (Pass).
    - SRAM storage check = 50 KB < 256 KB (Pass).

    **Conclusion & Interpretation:**
    - **Result: XIP Layout (Memory Bound)**. Weights must be executed in place (XIP) from Flash to leave enough SRAM for the 50 KB activations.
