title: The Cache Miss Penalty
scenario: You're running a 400 KB INT8 model on a Cortex-M7. The model's weights are in flash. During profiling, you see inference takes 8ms when weights are in DTCM but 22ms when left in flash.
question: How would you explain the 2.75x slowdown and calculate the cache miss rate?
details:
  realistic_solution: 'The 2.75x slowdown is due to D-cache thrashing. The 400KB model far exceeds the 16KB D-cache. Because the working set of the largest layers exceeds the cache, convolution loops repeatedly evict and re-fetch the same weights. The 14ms penalty represents ~6.7M stall cycles, which at 6 cycles per miss equals ~1.12M cache misses. Since the model is only 12,800 cache lines (400KB), it means the weights are fetched ~90 times per inference due to severe cache thrashing. Fix: place the hottest layers'' weights in DTCM (zero wait states) to eliminate flash reads.'
  common_mistake: |
    **The Pitfall:** Assuming that because the MCU has a cache, flash reads are effectively zero-wait-state.
    **The Rationale:** Candidates underestimate the massive write amplification that occurs when the working set of convolution loops continuously evicts the tiny 16KB D-cache.
    **The Consequence:** Accepting a 3x performance penalty instead of simply placing the hottest layers in zero-wait-state DTCM memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - 400 KB INT8 model. Cortex-M7 at 480 MHz. 16 KB D-cache. 6 wait states for flash miss. DTCM time 8ms, Flash time 22ms.

    **Calculations:**
    - Penalty = 22ms - 8ms = 14ms. Stall cycles = 14ms * 480 MHz = 6.72M cycles. Cache misses = 6.72M / 6 cycles = 1.12M misses. Cache lines in model = 409.6 KB / 32 bytes/line = 12,800 lines. Misses per line = 1.12M / 12,800 = 87.5 fetches.

    **Conclusion & Interpretation:**
    - **Result: ~87 fetches per cache line due to extreme D-cache thrashing (Memory-Bandwidth-Bound)**.
  options:
  - The first run is slow due to TFLite Micro interpreter initialization overhead. Subsequent runs reuse cached interpreter state and skip the setup, achieving the 8ms baseline.
  - 'The 400 KB model far exceeds the 16 KB D-cache. When executing from flash, severe cache thrashing occurs. 14ms of stall = ~6.7M penalty cycles = 1.12M cache misses (6 wait-state penalty). This means the 12,800 cache lines (400 KB) are fetched ~90 times per inference. Fix: place the hottest layers (top 3, 60 KB) in DTCM for zero-wait-state access, reducing inference to ~12ms.'
  - The slowdown is caused by flash memory write-back operations that occur on first access. The flash controller must initialize its page buffers, which takes exactly 14ms for a 400 KB binary.
  - The 2.75x slowdown is due to branch prediction cold-start. The Cortex-M7's branch predictor has no history on the first run, causing pipeline stalls on every conditional branch in the inference loop.
  correct_index: 1
