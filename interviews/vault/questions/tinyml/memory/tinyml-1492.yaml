title: PSRAM vs SRAM Streaming Cost for ESP32-S3 Weight Loads
scenario: An ESP32-S3 uses a 500KB INT8 model that doesn't fit in internal SRAM and requires external PSRAM.
question: What total streaming time and bandwidth penalty should you expect when ESP32-S3 streams 500 KB of INT8 weights from PSRAM vs internal SRAM, and how does PSRAM access latency affect it?
details:
  realistic_solution: 'SRAM has roughly single-cycle access at 240 MHz, so a 32-bit peak load path is about 240 MHz × 4 B = 960 MB/s in the best case. PSRAM has a fixed burst-start access latency of about 4-8 cycles at 80 MHz, or 50-100 ns, but sequential model-weight streaming is dominated by bandwidth. Octal SPI at 80 MHz transfers 8 bits per cycle, or about 640 Mb/s = 80 MB/s peak. Streaming 500 KB therefore takes about 500 KB / 80 MB/s = 6.25 ms from PSRAM versus 500 KB / 960 MB/s = 0.52 ms from SRAM, a throughput penalty of about 12x and an added streaming time of roughly 5.7 ms. The fixed 50-100 ns access latency matters for many small random reads, but it is negligible compared with a multi-millisecond sequential burst. Strategy: keep activations and scratch buffers in SRAM, stream weights from PSRAM in long aligned bursts.'
  common_mistake: |
    **The Pitfall:** Assuming PSRAM bandwidth is the only bottleneck.
    **The Rationale:** Engineers focus purely on the MB/s bandwidth rating and forget the severe access latency (4-8 cycles) required to initiate burst reads over SPI.
    **The Consequence:** Sequential streaming efficiency is overestimated, leading to unexpected stuttering in real-time inference tasks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 500 KB INT8.
    - SRAM peak throughput estimate: 240 MHz × 4 bytes = 960 MB/s.
    - PSRAM fixed burst-start access latency: 4-8 cycles at 80 MHz = 50-100 ns.
    - PSRAM octal SPI throughput: 80 MHz × 8 bits/cycle = 640 Mb/s = 80 MB/s.

    **Calculations:**
    - Load from PSRAM: 500 KB / 80 MB/s = 6.25 ms.
    - Load from SRAM: 500 KB / 960 MB/s ≈ 0.52 ms.
    - Added streaming time: 6.25 ms - 0.52 ms ≈ 5.7 ms.
    - Throughput penalty: 6.25 ms / 0.52 ms ≈ 12× slower.
    - The fixed 50-100 ns access latency is small for one long burst, but hurts random or short-burst reads.

    **Conclusion & Interpretation:**
    - **Result: ~6.25 ms total PSRAM streaming time, ~5.7 ms added versus peak SRAM, and ~12× lower bandwidth (Memory-Bound)**. Sequential streaming from PSRAM is mainly bandwidth-limited; fixed access latency is a secondary cost unless reads are fragmented.
