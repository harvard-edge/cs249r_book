title: Huffman Encoding for Weight Compression on Cortex-M4
scenario: A 200KB INT8 CNN model needs to be compressed to fit alongside a 700KB firmware on a 1MB flash device. The weight histogram shows 60% of values cluster around 0 (±3), 30% in ±10, and 10% are outliers.
question: Estimate the compression ratio achievable with Huffman encoding and assess the runtime decompression cost?
details:
  realistic_solution: Using the three coarse histogram buckets, the entropy is H = -0.60×log2(0.60) - 0.30×log2(0.30) - 0.10×log2(0.10) = 1.295 bits per bucket symbol. A Huffman code for these three buckets would have code lengths of roughly 1, 2, and 2 bits, for an average of 0.60×1 + 0.30×2 + 0.10×2 = 1.4 bits per bucket label. Because the actual weights are still INT8 values inside each bucket, the encoded stream must also identify values within the bucket or use a second-stage codebook, so 1.4 bits/value is an optimistic lower-bound style estimate rather than a guaranteed final file size. Under that optimistic estimate, compression ratio is 8/1.4 = 5.7×, so 200KB compresses to about 35KB and easily fits with 700KB firmware. Runtime decompression for the full model is 200K weights × 5 cycles/weight = 1.0M cycles; at 168MHz this is 1.0M / 168M = 0.006s, or about 6ms per inference if every weight is decoded once. The flash fit is plausible, but feasibility still depends on the actual symbol
    table, per-layer decode buffering, and whether the added decode time fits the latency budget.
  common_mistake: |
    **The Pitfall:** Only calculating the compression ratio and ignoring the on-device decompression requirements.
    **The Rationale:** Candidates forget that decompression at inference time on a Cortex-M4 adds cycle latency and requires a large decompression buffer in SRAM.
    **The Consequence:** The model fits in Flash but violates real-time latency deadlines or crashes due to lack of SRAM for the decompression buffer.
  napkin_math: |
    **Assumptions & Constraints:**
    - Uncompressed Model: 200 KB (INT8).
    - Flash Available: 1,024 KB - 700 KB = 324 KB.
    - Decompression Target Hardware: 168 MHz CPU.

    **Calculations:**
    - Coarse bucket entropy (H): -0.60*log2(0.60) - 0.30*log2(0.30) - 0.10*log2(0.10) = ~1.295 bits/bucket-symbol.
    - Example Huffman lengths for 3 buckets: common bucket = 1 bit, two rarer buckets = 2 bits.
    - Average bucket code length: 0.60*1 + 0.30*2 + 0.10*2 = 1.4 bits/value for the bucket label.
    - Optimistic compression ratio from 8-bit weights: 8 bits / 1.4 bits = ~5.7x before codebook and within-bucket value overhead.
    - Optimistic compressed size: 200 KB / 5.7 = ~35 KB.
    - Total flash footprint: 700 KB + 35 KB = 735 KB < 1,024 KB.
    - Decompression cost: 200K weights * 5 cycles/weight = 1.0M cycles.
    - Time: 1.0M cycles / 168M cycles/s = 0.006 s = ~6 ms per inference.

    **Conclusion & Interpretation:**
    - **Result: likely flash-feasible, with about ~6 ms decode overhead under the stated cost model.** The compression estimate is optimistic because the coarse histogram does not fully specify all INT8 symbol probabilities, and runtime feasibility still depends on decode buffering and the latency target.
