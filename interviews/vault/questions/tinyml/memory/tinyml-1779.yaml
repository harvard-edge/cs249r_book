title: 'Applying Loop Tiling to SRAM Limits'
scenario: 'A developer is porting a CNN to a Cortex-M4 with 64KB SRAM. The first Conv2D layer requires an 80KB activation buffer natively.'
question: 'Which memory optimization technique can be applied to fit this layer''s execution within the available 64KB limit?'
details:
  realistic_solution: 'Apply loop tiling (patch-based inference). By computing the network in spatial chunks, the peak intermediate activation size is bounded to the tile size. This reduces the SRAM footprint well below the 64KB limit at the cost of slight recomputation overlaps.'
  common_mistake: |
    **The Pitfall:** Attempting to aggressively quantize weights to solve an activation memory bottleneck.
    **The Rationale:** Candidates instinctively default to quantization as a panacea, failing to realize intermediate activations are the actual bottleneck.
    **The Consequence:** Quantization degrades accuracy without solving the OOM error, because the spatial activation buffer still exceeds 64KB.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4 with 64KB SRAM.
    - Conv2D activation buffer requires 80KB natively.

    **Calculations:**
    - Required Memory (80 KB) > Available Memory (64 KB).
    - Tiling reduces spatial dimensions (e.g., 1/4 size patch).
    - New buffer size ≈ 80 KB / 4 + overlap margin ≈ 25 KB.

    **Conclusion & Interpretation:**
    - **Result: ~25 KB buffer (Memory-Bound)**. Tiling dynamically shrinks the activation buffer to fit the SRAM.
