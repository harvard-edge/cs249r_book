title: 'The Flash Page Erase Block'
scenario: 'Your edge device runs a continuous audio inference loop every 50ms. When an anomaly is detected, it logs a 20-byte string to SPI Flash using LittleFS. The logging usually takes 1ms, but occasionally spikes to 500ms, causing the system to drop 10 audio frames.'
question: 'Why can a 20-byte LittleFS log write to SPI flash stall for 500 ms and drop 10 audio frames?'
details:
  realistic_solution: 'You hit a Flash Page Erase Cycle. Writing 20 bytes = ~1ms. Erasing a 64 KB SPI Flash sector = ~500ms. If your real-time deadline is 50ms, a single hardware Erase command destroys your latency budget by 10x.'
  common_mistake: |
    **The Pitfall:** Blaming the software filesystem (e.g., fragmentation or garbage collection algorithms) for the massive latency spike.
    **The Rationale:** Candidates lack low-level hardware knowledge regarding how NAND/NOR Flash memory physically manages data.
    **The Consequence:** Teams waste time tuning software filesystems instead of buffering the I/O or using a dual-core architecture to prevent the hardware erase cycle from blocking the real-time inference loop.
  napkin_math: |
    **Assumptions & Constraints:**
    - Normal write = 1 ms for 20 bytes.
    - Real-time deadline = 50 ms.
    - Spike = 500 ms.
    - Underlying storage is SPI Flash.

    **Calculations:**
    - Writing bits to Flash is fast (~1ms). However, Flash memory cannot overwrite data; a sector must be erased before new data is written.
    - Erasing a typical 64 KB SPI Flash sector takes physically ~500 ms.
    - 500 ms / 50 ms deadline = 10 missed frames.

    **Conclusion & Interpretation:**
    - **Result: 500 ms Stall (I/O-Bound)**. The latency is caused by the physical Flash Erase Cycle. A 500ms hardware block completely destroys the 50ms real-time deadline budget by a factor of 10x.
