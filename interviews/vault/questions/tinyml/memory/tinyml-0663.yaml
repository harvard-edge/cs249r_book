title: The Conversational Doorbell's Memory Deficit
scenario: >
  You are designing a context-aware doorbell on a Cortex-M7 MCU. The product features a tiny transformer model requiring a KV-cache for at least 256 tokens of conversational context. The model's tensor arena requires 200KB of SRAM. The FP16 KV-cache requires 256KB. With the RTOS (~80KB), the 536KB total requirement exceeds the 512KB SRAM.
question: How can a Cortex-M7 doorbell support a 256-token transformer KV cache when SRAM needs exceed 512 KB?
details:
  realistic_solution: >
    Treat the device's Flash memory as a secondary storage tier for the KV-cache using 'Flash Paging', analogous to virtual memory on a PC. Store older conversational tokens in Flash (which supports XIP reads at high bandwidth) and only keep the active token window in the SRAM tensor arena. This seamlessly resolves the 24 KB memory deficit while maintaining conversational latency requirements.
  common_mistake: |
    **The Pitfall:** Declaring the feature impossible or arbitrarily shrinking the model/context length.
    **The Rationale:** Software engineers often view SRAM as a hard boundary and Flash purely as read-only code storage, ignoring the potential for Flash-based virtual memory architectures on bare-metal systems.
    **The Consequence:** Failing to meet the product requirements when a creative, hardware-aware systems design could have delivered the feature.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total SRAM: 512 KB. Flash Read Speed: QSPI at ~40 MB/s.
       - Requirements: 200 KB (Arena) + 256 KB (KV Cache) + 80 KB (RTOS) = 536 KB.
    2. **Calculations:**
       - SRAM Deficit: 536 KB - 512 KB = 24 KB.
       - Token Vector Size: 1 KB. Fetch Latency: 1 KB / 40,000 KB/s = 25 µs.
    3. **Conclusion & Interpretation:**
       - **Result: 24 KB deficit resolved via Flash Paging.** The 25 µs Flash read latency per token is perfectly acceptable, allowing the system to use Flash as virtual memory. **Bottleneck: SRAM Capacity.**
