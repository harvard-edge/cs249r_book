title: The Conversational Doorbell's Memory Deficit
scenario: |
  You are designing a context-aware doorbell on a Cortex-M7 MCU. The product features a tiny transformer model requiring a KV-cache for at least 256 tokens of conversational context. The model's tensor arena requires 200KB of SRAM. The FP16 KV-cache requires 256KB. With the RTOS (~80KB), the 536KB total requirement exceeds the 512KB SRAM.
question: What SRAM-first strategy makes the KV cache feasible without paging it through Flash?
details:
  realistic_solution: |
    Do not treat Flash as transparent virtual memory for the KV-cache. On a Cortex-M7, naive paging adds latency jitter and write/endurance problems that are a poor fit for a transformer decode loop. The feasible design is to reduce and explicitly manage the KV footprint so the hot state stays in SRAM: quantize the KV-cache to INT8 or another validated compact format, use a sliding or summarized context window if accuracy allows, and reserve fixed SRAM buffers for the active decode state. Flash can hold immutable model weights or precomputed tables, but frequently updated KV state should not be swapped through Flash on the real-time path.
  common_mistake: |
    **The Pitfall:** Treating Flash like PC-style swap or virtual memory for the KV-cache.
    **The Rationale:** Engineers focus on Flash read bandwidth and ignore erase/write granularity, endurance limits, lack of an MMU, and latency jitter.
    **The Consequence:** The design appears to solve a 24 KB SRAM deficit on paper but fails in the real decode loop when KV updates and cache misses become unpredictable.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total SRAM: 512 KB.
       - Requirements: 200 KB (Arena) + 256 KB (KV Cache) + 80 KB (RTOS) = 536 KB.
    2. **Calculations:**
       - SRAM Deficit: 536 KB - 512 KB = 24 KB.
       - INT8 KV-cache size: 256 KB * (1 byte / 2 bytes) = 128 KB.
       - Revised SRAM requirement: 200 KB arena + 128 KB KV-cache + 80 KB RTOS = 408 KB.
       - Headroom after compression: 512 KB - 408 KB = 104 KB.
    3. **Conclusion & Interpretation:**
       - **Result: 104 KB SRAM headroom if INT8 KV accuracy is validated.** If compression is not accurate enough, the feasible path is a shorter context window or redesigned model, not Flash paging. The release design should keep frequently updated KV state in SRAM and use Flash only for immutable or infrequently accessed data.
