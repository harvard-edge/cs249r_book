title: SRAM Tiling Strategy for Large Conv Layer on Cortex-M7+Ethos-U55
scenario: An Ethos-U55 NPU has 512 KiB on-chip SRAM. A colleague claims a layer processing a 28x28x96 activation map (INT8) with 96 filters of 3x3 requires spatial tiling to avoid Out-Of-Memory.
question: "Is your colleague correct that the 28x28x96 Ethos-U55 CNN layer needs tiling within 512 KiB SRAM, and how would you tile a larger 56x56x96 input?"
details:
  realistic_solution: Execute a direct static tensor arena calculation. The combined buffer allocations for weights, input activations, and output activations fit natively. Tiling is unneeded unless input resolution scales up (e.g., 56x56), wherein spatial feature map tiling is necessary while anchoring invariant weights in SRAM.
  common_mistake: |
    **The Pitfall:** Tiling only the output feature map without keeping dense weights resident in fast SRAM.
    **The Rationale:** Candidates fail to realize that re-streaming weight vectors from slower external Flash for every spatial tile is I/O catastrophic.
    **The Consequence:** The resultant bandwidth bottleneck totally destroys inference latency due to massive redundant memory access.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Memory: 512 KiB shared SRAM.
       - 28x28x96 INT8 input/output = 75,264 bytes (~73.5 KiB).
       - Weights (3x3x96x96) = 82,944 bytes (~81.0 KiB).
    2. **Calculations:**
       - Total 28x28 need: 73.5 KiB (input) + 81.0 KiB (weights) + 73.5 KiB (output) = 228 KiB. (Fits natively).
       - Total 56x56x96 need: 294 KiB (input) + 81.0 KiB (weights) + 294 KiB (output) = 669 KiB. (>512 KiB).
       - 56x56 Spatial 4-tile setup (4x 28x28 tiles): 73.5 KiB (tile-in) + 81.0 KiB (resident weights) + 73.5 KiB (tile-out) = 228 KiB memory span.
    3. **Conclusion & Interpretation:**
       - **Result: 28x28x96 natively fits (228 KiB). Only the 56x56 configuration mandates spatial tiling (Memory-Bound).**
