title: ESP32-S3 Inference Latency Anomaly Analysis
scenario: You are deploying an INT8 keyword spotting model on an ESP32-S3 microcontroller (240 MHz dual-core Xtensa). The model's total memory footprint for weights and peak activations is 450 KB. When executing entirely within the 512 KB internal SRAM, inference takes 15ms. To accommodate a new WiFi/BLE stack, you move 350 KB of read-only model weights to the external 8 MB PSRAM. You observe that inference latency immediately spikes to 75ms, despite utilizing the same INT8 vector extensions and core frequency.
question: Why does moving 350 KB of ESP32-S3 INT8 weights from SRAM to PSRAM raise inference latency from 15 ms to 75 ms?
details:
  realistic_solution: The degradation is a classic memory wall problem caused by moving data from on-chip SRAM to off-chip PSRAM. The ESP32-S3 internal SRAM is accessed at the core clock speed (240 MHz) with parallel buses, providing massive bandwidth. The 8 MB PSRAM, however, is connected via an external interface (typically Octal SPI at 80 MHz or 120 MHz). When weights are in PSRAM, the processor experiences severe cache miss penalties and stalls waiting for data over the serial interface, making the inference completely memory-bound rather than compute-bound.
  common_mistake: |
    **The Pitfall:** Attributing the latency increase to slower compute instruction execution rather than memory bandwidth limitations.
    **The Rationale:** Candidates often assume the compute instructions (vector extensions) execute slower when weights are in PSRAM, or they vaguely mention 'PSRAM is slower' without identifying the bandwidth bottleneck of the external SPI bus compared to the internal data bus.
    **The Consequence:** Optimization efforts are misdirected toward tweaking vector code instead of restructuring memory locality to minimize cache thrashing over the SPI bus.
  napkin_math: |
    **Assumptions & Constraints:**
    - Internal SRAM bandwidth at 240 MHz (32-bit bus): ~960 MB/s.
    - External PSRAM bandwidth via Octal SPI at 80 MHz: ~80 MB/s.
    - Weight size: 350 KB.

    **Calculations:**
    - One sequential read from SRAM: 350 KB / 960 MB/s = 0.36 ms.
    - One sequential read from PSRAM: 350 KB / 80 MB/s = 4.37 ms.
    - The one-pass bandwidth delta is only about 4.0 ms, so it cannot by itself explain the observed 60 ms increase.
    - Observed extra latency = 75 ms - 15 ms = 60 ms. That corresponds to repeated stalls/cache misses causing an effective extra PSRAM traffic term of roughly 60 ms * 80 MB/s = 4.8 MB, or about 14 repeated passes over the 350 KB weight set.

    **Conclusion & Interpretation:**
    - **Result: 60 ms observed latency penalty from repeated external-memory stalls**. The raw 350 KB transfer is too small to explain the slowdown alone; the spike implies poor locality, cache thrashing, and repeated PSRAM fetches during layer execution. The CPU spends much of inference stalled on the external memory interface rather than executing INT8 vector MACs.
