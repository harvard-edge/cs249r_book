title: ESP32-S3 Inference Latency Anomaly Analysis
scenario: You are deploying an INT8 keyword spotting model on an ESP32-S3 microcontroller (240 MHz dual-core Xtensa). The model's total memory footprint for weights and peak activations is 450 KB. When executing entirely within the 512 KB internal SRAM, inference takes 15ms. To accommodate a new WiFi/BLE stack, you move 350 KB of read-only model weights to the external 8 MB PSRAM. You observe that inference latency immediately spikes to 75ms, despite utilizing the same INT8 vector extensions and core frequency.
question: Why does moving 350 KB of ESP32-S3 INT8 weights from SRAM to PSRAM raise inference latency from 15 ms to 75 ms?
details:
  realistic_solution: The degradation is a classic memory wall problem caused by moving hot weights from on-chip SRAM to off-chip PSRAM. The ESP32-S3 internal SRAM is accessed through fast on-chip buses, while PSRAM is reached over an external serial interface with much lower effective bandwidth and higher miss latency. A single sequential 350 KB read is too small to explain a 60 ms slowdown, so the observation points to repeated PSRAM accesses, poor locality, and cache misses during layer execution rather than slower INT8 instructions.
  common_mistake: |
    **The Pitfall:** Attributing the latency increase to slower compute instruction execution rather than memory bandwidth limitations.
    **The Rationale:** Candidates often assume the compute instructions (vector extensions) execute slower when weights are in PSRAM, or they vaguely mention 'PSRAM is slower' without identifying the bandwidth bottleneck of the external SPI bus compared to the internal data bus.
    **The Consequence:** Optimization efforts are misdirected toward tweaking vector code instead of restructuring memory locality to minimize cache thrashing over the SPI bus.
  napkin_math: |
    **Assumptions & Constraints:**
    - Internal SRAM bandwidth at 240 MHz (32-bit bus): ~960 MB/s.
    - External PSRAM effective bandwidth after serial-interface and cache overhead: ~80 MB/s.
    - Weight size: 350 KB.

    **Calculations:**
    - One sequential read from SRAM: 350 KB / 960 MB/s = 0.36 ms.
    - One sequential read from PSRAM: 350 KB / 80 MB/s = 4.37 ms.
    - As an order-of-magnitude one-pass estimate, the bandwidth delta is only about 4.0 ms, so a single sequential transfer cannot by itself explain the observed 60 ms increase.
    - Observed extra latency = 75 ms - 15 ms = 60 ms.
    - If PSRAM delivered a sustained 80 MB/s on every access, 60 ms would correspond to 4.8 MB of effective traffic; this is only a sanity check showing that repeated or poorly localized accesses are plausible, not a precise characterization of the access pattern.
    - The measured penalty therefore requires repeated PSRAM fetches, cache misses, low locality, protocol overhead, or some combination of these effects.

    **Conclusion & Interpretation:**
    - **Result: 60 ms observed latency penalty from repeated external-memory access effects**. The raw 350 KB transfer explains only a small fraction of the slowdown; the spike implies poor locality, cache thrashing, and repeated PSRAM fetches during layer execution. The dominant fix is to improve SRAM residency and access locality, not to tune the INT8 vector instructions.
