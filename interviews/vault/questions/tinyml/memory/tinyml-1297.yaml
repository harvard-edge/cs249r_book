title: Optimizing Keyword Spotting Memory Allocation on ESP32-S3
scenario: You are tasked with deploying a continuous Keyword Spotting (KWS) model and a secondary speaker verification model on an ESP32-S3 microcontroller. The KWS model requires 300 KB for its weights and 150 KB for activations, while the speaker verification model requires 2 MB for weights and 500 KB for activations. Both models use INT8 quantization to leverage the vector extensions.
question: Where should ESP32-S3 KWS and speaker-verification weights, activations, and audio buffers reside to minimize latency and power?
details:
  realistic_solution: The continuous KWS model is latency-critical and runs constantly. Its 300 KB weights and 150 KB activations (450 KB total) should be pinned to the internal 512 KB SRAM. The secondary speaker verification model only runs conditionally when a keyword is detected, so its 2 MB weights and 500 KB activations should be allocated to the 8 MB PSRAM.
  common_mistake: |
    **The Pitfall:** Placing all weights in external PSRAM.
    **The Rationale:** Candidates prioritize capacity over bandwidth, ignoring the continuous polling nature of KWS.
    **The Consequence:** Constant fetching of KWS weights over SPI completely drains the power budget and introduces severe latency overhead per pass.
  napkin_math: |
    **Assumptions & Constraints:**
    - Internal SRAM: 512 KB. KWS requirements: 450 KB total.
    - External PSRAM: 8 MB. Octal SPI bandwidth: ~40 MB/s.

    **Calculations:**
    - KWS in SRAM: 512 KB - 450 KB = 62 KB remaining for RTOS/buffers.
    - Speaker Verification in PSRAM: 8 MB - 2.5 MB = 5.5 MB remaining.
    - Penalty if KWS in PSRAM: 300 KB / 40 MB/s = 7.5 ms fetch per inference.

    **Conclusion & Interpretation:**
    - **Result: 7.5 ms fetch penalty (Memory-Bound)**. KWS must reside in SRAM; otherwise, the continuous system becomes severely memory-bound and power-inefficient.
