title: The Look-aside Attention Cache
scenario: 'You are designing a driver drowsiness detection system using a Cortex-M7 MCU (512KB SRAM, 2MB Flash) to analyze a driver''s eye gaze. The goal is to use a small Vision Transformer (ViT) to detect temporal patterns over a 5-second window (50 frames at 10 FPS). Your constraints are a hard 100ms inference deadline and the 512KB SRAM budget.'
question: 'What are your first three design decisions for a look-aside KV-cache architecture on a 512KB SRAM MCU, and how do you justify them quantitatively?'
details:
  realistic_solution: 'The correct approach is to design a hierarchical cache that leverages the different memory types on the MCU. The key insight is that not all history is needed in fast SRAM simultaneously. I would propose a Look-aside Cache architecture, persisting older KV vectors to QSPI flash and swapping them into a fixed-size SRAM ring buffer during inference via DMA.'
  common_mistake: |
    **The Pitfall:** Grossly underestimating the KV-cache size or giving up entirely and reverting to a CNN.
    **The Rationale:** Candidates fail to bridge the gap between Transformer requirements and MCU memory hierarchies.
    **The Consequence:** The system either OOMs instantly, or the candidate fails the systems architecture portion of the interview by evading the core prompt.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4 layers, 64 patches/frame, hidden dim 128.
    - Sequence length (N) = 50 frames * 64 patches = 3,200 patches.
    - Attention map size = N^2 elements.

    **Calculations:**
    - N^2 = 3,200^2 = 10,240,000 elements.
    - FP16 memory = 10,240,000 * 2 bytes = 20,480,000 bytes (~19.53 MiB).

    **Conclusion & Interpretation:**
    - **Result: ~19.5 MiB map completely overflows the 512 KB SRAM by 40x (Memory-Bound Attention Map Explosion)**. ViT requires hierarchical KV-cache strategies or FlashAttention tiling to be viable on MCUs.
