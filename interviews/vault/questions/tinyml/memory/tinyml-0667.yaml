title: The Look-aside Attention Cache
scenario: You are designing a driver drowsiness detection system using a Cortex-M7 MCU (512KB SRAM, 2MB Flash) to analyze a driver's eye gaze. The goal is to use a small Vision Transformer (ViT) to detect temporal patterns over a 5-second window (50 frames at 10 FPS). Your constraints are a hard 100ms inference deadline and the 512KB SRAM budget.
question: What are your first three design decisions for a look-aside KV-cache architecture on a 512KB SRAM MCU, and how do you justify them quantitatively?
details:
  realistic_solution: 'The first decision is to reduce the token stream before designing the cache: 64 patches per frame over 50 frames is too large, so use patch pooling or a learned frame summary to keep about 8 temporal tokens per frame. The second decision is the SRAM-resident cache size and layout: store INT8 K/V vectors for the most recent 128 tokens in a contiguous ring buffer, with per-layer blocks aligned for DMA and vector loads. The third decision is the look-aside policy: older summarized tokens may be stored in Flash as read-mostly history and fetched in fixed DMA tiles, but eviction is recency- or salience-based and the real-time path must be bounded so a cache miss cannot exceed the 100ms deadline.'
  common_mistake: |
    **The Pitfall:** Grossly underestimating the KV-cache size or giving up entirely and reverting to a CNN.
    **The Rationale:** Candidates fail to bridge the gap between Transformer requirements and MCU memory hierarchies.
    **The Consequence:** The system either OOMs instantly, or the candidate fails the systems architecture portion of the interview by evading the core prompt.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4 layers, 64 patches/frame, hidden dim 128.
    - Raw sequence length = 50 frames * 64 patches = 3,200 tokens.
    - KV-cache stores K and V for each token and layer.

    **Calculations:**
    - Full FP16 KV-cache = 2 (K+V) * 3,200 tokens * 4 layers * 128 dim * 2 bytes = 6,553,600 bytes (~6.25 MiB).
    - Token pooling to 8 tokens/frame gives 50 * 8 = 400 tokens.
    - INT8 KV-cache for 400 tokens = 2 * 400 * 4 * 128 * 1 byte = 409,600 bytes (~400 KB).
    - SRAM hot ring for 128 recent INT8 tokens = 2 * 128 * 4 * 128 * 1 byte = 131,072 bytes (128 KB).
    - DMA tile for 32 older tokens = 2 * 32 * 4 * 128 * 1 byte = 32,768 bytes (32 KB).

    **Conclusion & Interpretation:**
    - **Result: 6.25 MiB raw KV-cache reduced to a bounded 128 KB hot SRAM ring plus 32 KB DMA tile (Memory-Hierarchy-Bound)**. The design decisions are token reduction, SRAM ring-buffer sizing/layout, and a bounded look-aside fetch/eviction policy; the math is KV-cache capacity, not N^2 attention-map storage.
