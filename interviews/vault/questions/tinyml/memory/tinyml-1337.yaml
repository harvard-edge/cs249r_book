title: Optimizing Sensor Data Ingress on nRF5340 for TinyML Inference
scenario: You're deploying a tinyML model for anomaly detection on a Nordic nRF5340 to analyze incoming sensor data streams. The model requires 16KB of input data per inference, arriving via a high-speed peripheral interface that generates interrupts upon data availability.
question: How should an nRF5340 move 16 KB sensor inputs from a high-speed peripheral to a TinyML model with minimal CPU overhead?
details:
  realistic_solution: The optimal approach involves utilizing DMA (Direct Memory Access) transfers. Configure the peripheral to directly write its received data into a pre-allocated, 'pinned' memory region in SRAM that serves as the model's input buffer. This 'zero-copy' technique avoids CPU involvement for data movement, freeing up the 128 MHz core to focus on model inference and other application logic. Interrupts would only signal DMA completion, triggering the ML inference directly.
  common_mistake: |
    **The Pitfall:** Performing CPU-intensive byte-by-byte copies from peripheral buffers to model input buffers.
    **The Rationale:** Using general-purpose CPU instructions for data movement introduces significant CPU cycle overhead.
    **The Consequence:** Increasing latency and power consumption, potentially starving the inference engine of CPU time.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input block size: 16 KB.
    - CPU Clock: 128 MHz.
    - CPU copy rate approximation: 2 bytes/cycle.
    - Peripheral DMA speed: 10 MB/s.

    **Calculations:**
    - CPU copy cycles: 16,384 bytes / 2 bytes/cycle = 8,192 cycles.
    - CPU copy time: 8,192 cycles / 128 MHz = 64 us of blocking CPU time, plus interrupt and loop overhead.
    - DMA transfer time: 16,384 bytes / 10,000,000 bytes/s = 1.64 ms.
    - CPU time during DMA: only setup and completion interrupt handling, so the core can sleep or run inference while the peripheral transfer proceeds.

    **Conclusion & Interpretation:**
    - **Result: about 8,192 blocking copy cycles avoided per 16 KB block (Memory-Movement-Bound)**. DMA may take longer in wall-clock time than an ideal CPU copy, but it removes the blocking CPU copy and enables overlap with other work.
