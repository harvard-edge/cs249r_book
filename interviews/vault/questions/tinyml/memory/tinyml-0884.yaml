title: 'Model Size Estimation: Master Full MCU Memory Budget for Industrial Sensor Node'
scenario: 'A memory budget analysis is required for deploying a vibration anomaly detection model on Cortex-M7+Ethos-U55 (480MHz, 512KB SRAM, 1MB Flash). Model: 200K INT8 params, profiled TFLM activation arena 96KB, measured NPU inference time 0.5ms. Other consumers: FreeRTOS (32KB SRAM, 20KB Flash), Ethernet driver (20KB SRAM), sensor driver (4KB SRAM, 2KB Flash), application logic (16KB SRAM, 50KB Flash), TFLM runtime (30KB SRAM, 20KB Flash), stack reserve (8KB SRAM).'
question: How would you verify complete system fits and compute inference duty cycle for 10Hz operation?
details:
  realistic_solution: 'Verify SRAM by summing the stated system consumers and the profiled tensor arena. Fixed SRAM is FreeRTOS 32KB + Ethernet 20KB + sensor 4KB + app 16KB + TFLM runtime 30KB + stack 8KB = 110KB. Add the 96KB activation arena for total SRAM of 206KB, leaving 306KB spare in a 512KB SRAM part. Flash is model weights 200KB + FreeRTOS 20KB + sensor driver 2KB + app 50KB + TFLM kernels 20KB = 292KB, leaving about 732KB spare in 1MB Flash; no Ethernet Flash footprint was provided, so do not invent one. Duty cycle uses the measured 0.5ms inference time: at 10Hz the period is 100ms, so active inference duty is 0.5ms / 100ms = 0.5%.'
  common_mistake: |
    **The Pitfall:** Analyzing model memory in isolation without summing RTOS and peripheral driver memory.
    **The Rationale:** Candidates focus solely on the neural network footprint and ignore the essential real-time OS and networking stacks.
    **The Consequence:** The deployment experiences hard faults in the field when the Ethernet driver and ML model collide in SRAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - 512KB SRAM, 1MB Flash.
    - 200K INT8 params, so model Flash is about 200KB.
    - Profiled activation arena: 96KB.
    - Measured NPU inference time: 0.5ms.
    - 10Hz operation (100ms budget).
    - FreeRTOS, drivers, app, TFLM, and stack footprints are given.

    **Calculations:**
    - SRAM fixed overhead: 32KB + 20KB + 4KB + 16KB + 30KB + 8KB = 110KB.
    - SRAM Used: 110KB + 96KB activation arena = 206KB.
    - Flash Used: 200KB model + 20KB FreeRTOS + 2KB sensor + 50KB app + 20KB TFLM = 292KB.
    - Duty Cycle: 0.5ms NPU inference / 100ms window = 0.5%.

    **Conclusion & Interpretation:**
    - **Result: System Fits**. SRAM usage is about 40% and Flash usage is about 29%, with a 0.5% inference duty cycle at 10Hz.
