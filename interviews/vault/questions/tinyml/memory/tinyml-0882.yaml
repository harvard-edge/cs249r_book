title: 'Model Size Estimation: Compare Quantized vs. Float Model on Cortex-M7+NPU'
scenario: A gesture recognition model (300K params, 1.2M arithmetic ops per inference) is deployed on Cortex-M7+Ethos-U55 in FP32 vs. INT8. The Ethos-U55 only supports INT8. The INT8 model has a 96KB peak activation arena; the FP32 model uses the same tensor shapes at 4 bytes per activation.
question: How would you compare Flash usage, SRAM peak activation memory, inference latency, and power for a 10Hz detection rate?
details:
  realistic_solution: 'FP32 storage is 300K * 4B = 1.2MB Flash, which exceeds a 512KB-class MCU and is tight even on 1MB Flash after code. Its peak activation memory is 96KB * 4 = 384KB before runtime/stack, which is also difficult on a 512KB SRAM part. Because Ethos-U55 only accelerates INT8, FP32 runs on the M7 CPU: 1.2M FP ops / (480MHz * 2 ops/cycle) = 1.25ms. At 10Hz, that is 1.25ms / 100ms = 1.25% duty; at 150mW active, average compute power is about 1.875mW. INT8 storage is 300KB Flash and 96KB peak activation arena. Count the 1.2M as scalar INT8 ops and assume 500 GOPS effective NPU throughput: compute time is 1.2M / 500G = 2.4us, dominated by about 0.5ms invocation/DMA overhead, for about 0.502ms total. At 100mW active and 10Hz, average compute power is about 0.502mW. INT8 therefore fits the NPU path, reduces Flash and SRAM by 4x, reduces latency from about 1.25ms to about 0.5ms, and cuts this active compute power estimate by about 3.7x.'
  common_mistake: |
    **The Pitfall:** Assuming the FP32 model can run on the Ethos-U55.
    **The Rationale:** Candidates overlook that embedded NPUs often strictly support only quantized integer math (like INT8) to save area and power.
    **The Consequence:** The system is designed around impossible hardware acceleration, leading to a catastrophic 4x size and latency penalty when forced onto the CPU fallback.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 300K parameters, 1.2M arithmetic ops per inference.
       - INT8 peak activation arena: 96KB. FP32 uses the same shapes at 4 bytes/value.
       - FP32 CPU execution: 480MHz, 2 ops/cycle, 1.2M FLOPs, 150mW active.
       - INT8 NPU execution: 500 GOPS effective throughput, counting the given 1.2M as scalar ops, 100mW active.
       - Duty Cycle: 10Hz detection rate (100ms period).
    2. **Calculations:**
       - Flash Usage: FP32 = 300K × 4B = 1.2 MB. INT8 = 300K × 1B = 300 KB.
       - SRAM Peak Activations: FP32 = 96KB * 4 = 384KB. INT8 = 96KB.
       - CPU FP32 Latency: 1.2M FLOPs / (480 MHz × 2) = 1.25 ms.
       - NPU INT8 Latency: (1.2M ops / 500 GOPS) + 0.5ms overhead = 2.4us + 0.5ms ≈ 0.502 ms, so invocation/DMA overhead dominates.
       - CPU Average Power: (1.25 ms / 100 ms) × 150 mW = 1.875 mW.
       - NPU Average Power: (0.502 ms / 100 ms) × 100 mW ≈ 0.502 mW.
    3. **Conclusion & Interpretation:**
       - **Result: INT8 uses 300KB Flash, 96KB peak activation SRAM, about 0.502ms latency, and about 0.502mW average compute power.** FP32 requires 1.2MB Flash, 384KB peak activation SRAM, about 1.25ms CPU latency, and about 1.875mW average compute power, so INT8 is the realistic Ethos-U55 deployment path.
