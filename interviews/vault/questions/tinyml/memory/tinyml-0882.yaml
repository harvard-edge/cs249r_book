title: 'Model Size Estimation: Compare Quantized vs. Float Model on Cortex-M7+NPU'
scenario: A gesture recognition model (300K params) is deployed on Cortex-M7+Ethos-U55 in FP32 vs. INT8. The Ethos-U55 only supports INT8.
question: How would you compare Flash usage, SRAM peak activation memory, inference latency, and power for a 10Hz detection rate?
details:
  realistic_solution: 'FP32: 300K × 4B = 1.2MB Flash (exceeds 512KB of typical MCU). If using M7 with 1MB Flash: barely fits. CPU-only at 480MHz: 300K× 4 FLOPs/param (CNN) = 1.2M FLOPs / (480M × 2 FP ops/cycle) = 1.25ms per inference. Power: M7 at 480MHz ≈ 150mW active, 10Hz → 1.25ms active/100ms = 1.25% duty → avg 1.875mW. INT8: 300KB Flash. Ethos-U55: 1.2M INT8 ops / 500G = 2.4µs NPU + 0.5ms overhead = 0.5ms. Power: NPU at ~100mW, 0.5ms/100ms = 0.5% → avg 0.5mW. 3.75× power reduction.'
  common_mistake: |
    **The Pitfall:** Assuming the FP32 model can run on the Ethos-U55.
    **The Rationale:** Candidates overlook that embedded NPUs often strictly support only quantized integer math (like INT8) to save area and power.
    **The Consequence:** The system is designed around impossible hardware acceleration, leading to a catastrophic 4x size and latency penalty when forced onto the CPU fallback.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 300K parameters.
       - FP32 CPU execution: 480MHz, 2 ops/cycle, 1.2M FLOPs, 150mW active.
       - INT8 NPU execution: Ethos-U55, 256 MACs/cycle, 1.2M ops, 100mW active.
       - Duty Cycle: 10Hz detection rate (100ms period).
    2. **Calculations:**
       - Flash Usage: FP32 = 300K × 4B = 1.2 MB. INT8 = 300K × 1B = 300 KB.
       - CPU FP32 Latency: 1.2M FLOPs / (480 MHz × 2) = 1.25 ms.
       - NPU INT8 Latency: (1.2M ops / 500G) + 0.5ms overhead ≈ 0.5 ms.
       - CPU Average Power: (1.25 ms / 100 ms) × 150 mW = 1.875 mW.
       - NPU Average Power: (0.5 ms / 100 ms) × 100 mW = 0.5 mW.
    3. **Conclusion & Interpretation:**
       - **Result: INT8 requires 3.75x less average power and fits in 300 KB Flash.** **Result: Memory and Power-Bound Optimization.**
