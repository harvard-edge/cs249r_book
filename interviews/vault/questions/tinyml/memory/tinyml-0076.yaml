title: 'The Continuous Logging Flash Death'
scenario: 'Your smart thermostat logs the room temperature and the ML model''s occupancy prediction to internal Flash memory every 5 minutes for user analytics. You are using a standard SPIFFS filesystem. The internal flash has a 10,000 cycle erase limit. A year later, 15% of the devices are permanently bricked.'
question: 'How did logging 20 bytes every 5 minutes destroy the Flash?'
details:
  realistic_solution: 'SPIFFS doesn''t do wear-leveling on metadata sectors. Each 20-byte log triggers a metadata sector update (file size, timestamp). At 288 logs/day, that sector sees 288 erases/day x 365 = 105,120 cycles/year — 10x the 10,000-cycle flash rating, killing the sector in 34 days. Once the metadata sector dies, the entire filesystem is corrupted, bricking the device. Fix: replace SPIFFS with LittleFS (built-in wear-leveling), use a circular buffer in a dedicated flash region with manual wear-leveling, or accumulate logs in RAM and batch-write once per hour (reduces erase cycles from 288/day to 24/day).'
  common_mistake: '"20 bytes * 105,000 logs a year is only 2 MB. It didn''t fill up the drive." It didn''t fill up the drive, it destroyed the silicon via Write Amplification.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Logs: 1 every 5 minutes.
    - Flash erase rating: 10,000 cycles. SPIFFS writes metadata per log.

    **Calculations:**
    - Logs per day: (60 / 5) * 24 = 288 logs/day.
    - Logs per year: 288 * 365 = 105,120 erase cycles/year.
    - Device death time: 10,000 / 288 = ~34.7 days.

    **Conclusion & Interpretation:**
    - **Result: 34 Days (Endurance Bound)**. Lack of wear-leveling on metadata sectors physically destroys the Flash silicon through localized write amplification.
