title: The DMA Power-Saving Trade-Off
scenario: You are designing a TinyML device that wakes once per second to capture a 4 KB sensor sample into SRAM. You can either use the Cortex-M4 CPU to memcpy the data, which takes 30 microseconds of active CPU time, or use a DMA controller. The DMA setup requires 5 microseconds of CPU time, after which the hardware performs the 30 microsecond transfer independently while the CPU sleeps.
question: "Which transfer approach minimizes energy for the 4 KB sensor sample, CPU memcpy or DMA with CPU sleep?"
details:
  realistic_solution: The DMA approach provides an optimal energy-delay product. By offloading I/O data movement to the DMA peripheral, the power-hungry core transitions to deep sleep, dramatically lowering the active power profile.
  common_mistake: |
    **The Pitfall:** Concluding that the CPU copy is superior because the total wall-clock time is faster (30 µs vs 35 µs).
    **The Rationale:** Engineers focus exclusively on latency rather than time spent in high-power states, misapplying server logic to edge devices.
    **The Consequence:** They miss the crucial energy savings gained by allowing the power-hungry CPU to sleep, draining the battery prematurely.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Sample size: 4 KB.
       - CPU active power: 50 mW.
       - CPU sleep power: 10 µW.
       - CPU memcpy: 30 µs active.
       - DMA transfer: 5 µs active setup + 30 µs sleep transfer.
    2. **Calculations:**
       - CPU copy energy: 50 mW * 30 µs = 1.5 µJ.
       - DMA setup energy: 50 mW * 5 µs = 0.25 µJ.
       - DMA transfer energy: 0.01 mW * 30 µs = 0.0003 µJ.
       - Total DMA energy: 0.25 + 0.0003 = 0.2503 µJ.
    3. **Conclusion & Interpretation:**
       - **Result: DMA consumes 0.2503 µJ, saving >80% energy vs 1.5 µJ CPU copy (Energy-Bound).**
  options:
  - CPU copy, because its total latency is lower (1.5 µJ vs 1.75 µJ calculated improperly).
  - DMA, because it allows the power-hungry CPU to sleep during the transfer, saving significant energy.
  - CPU copy, because the DMA setup overhead makes it inefficient for small data transfers.
  - They are equivalent in power consumption because the transfer time is the same in both scenarios.
