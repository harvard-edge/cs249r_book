title: The Tensor Arena Overflow
scenario: Your model's tensor arena needs 210 KB for peak activation memory, but your Cortex-M4 only has 200 KB of SRAM available (after firmware and stack). The model fits in flash. You can't change the model architecture.
question: Can a 210 KB tensor arena fit when a Cortex-M4 has only 200 KB of SRAM available, and what must change if the model architecture cannot be changed?
details:
  realistic_solution: |
    It cannot fit as stated. A 210 KB planned peak activation arena exceeds the 200 KB SRAM budget by 10 KB, and TFLite Micro's memory planner cannot make that disappear if it has already computed the true tensor lifetime peak for the deployed graph. In-place reuse only helps when the operator semantics and runtime kernels allow it; tiling only helps if the operator implementation is changed to process smaller chunks. Both are model/runtime changes, not a free allocator trick.

    With the model architecture fixed, the engineering answer is to reduce the required arena or increase available memory: use a different kernel implementation with lower scratch demand, remove nonessential runtime buffers from SRAM, place weights/constants in flash, enable operator-specific memory optimizations that preserve graph semantics, or choose a device with more SRAM/PSRAM. If none of those reduces the measured peak below 200 KB with margin, the model cannot be deployed on that MCU as-is.
  common_mistake: |
    **The Pitfall:** "Reduce the input resolution."
    **The Rationale:** The constraint explicitly states you can't change the model, and input resolution is part of the model's expected input shape.
    **The Consequence:** The proposed solution violates problem constraints and fails to execute.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tensor arena requirement from the memory planner: 210 KB.
    - Hardware limit after firmware and stack: 200 KB available SRAM.
    - Required safety margin: nonnegative; production systems usually need additional headroom.

    **Calculations:**
    - Deficit: 210 KB - 200 KB = 10 KB over budget.
    - Fit test: 210 KB / 200 KB = 1.05, so the arena requires 105% of available SRAM.
    - Required reduction: at least 10 KB, and more if stack, DMA buffers, or interrupt buffers share the same SRAM region.

    **Conclusion & Interpretation:**
    - **Result: does not fit as-is (Memory-Capacity-Bound).** The deployment needs a measured arena reduction of at least 10 KB through runtime/kernel changes that preserve model semantics, or a hardware target with more available SRAM.
