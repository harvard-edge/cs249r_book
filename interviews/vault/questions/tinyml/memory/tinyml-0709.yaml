title: 'The Tensor Arena Overflow'
scenario: 'Your model''s tensor arena needs 210 KB for peak activation memory, but your Cortex-M4 only has 200 KB of SRAM available (after firmware and stack). The model fits in flash. You can''t change the model architecture.'
question: 'How can a 210 KB tensor arena fit when a Cortex-M4 has only 200 KB of SRAM available?'
details:
  realistic_solution: 'The 210 KB peak occurs at one specific point in the model — typically where two large activation tensors coexist (e.g., the input and output of the largest layer). TFLite Micro''s memory planner already optimizes tensor lifetimes, but you can push further: using in-place operations or tiling algorithms to overwrite activations without allocating dedicated buffers.'
  common_mistake: '"Reduce the input resolution." The question says you can''t change the model — input resolution is part of the model''s expected input shape.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Tensor arena target: 210 KB.
    - Hardware limit: 200 KB available SRAM.
    - Layer 5 Peak: input (100 KB) + output (110 KB) = 210 KB.

    **Calculations:**
    - In-place ReLU: output overwrites input -> peak drops to 110 KB.
    - 2x tiling logic: input tile (50 KB) + output tile (55 KB) = 105 KB.
    - New global peak shifts to layer 8: 180 KB.

    **Conclusion & Interpretation:**
    - **Result: 180 KB peak (Memory-Capacity-Bound)**. Advanced memory planning optimizations reduce the peak below the strict 200 KB SRAM constraint.
