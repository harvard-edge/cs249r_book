title: The Tensor Arena Sizing Puzzle
scenario: >
  You are using TensorFlow Lite for Microcontrollers to deploy a keyword spotting model.
  The memory planner shows sizes for three sequential operations: Step 1 (In: 10 KB, Out: 40 KB), Step 2 (In: 40 KB, Out: 20 KB), and Step 3 (In: 20 KB, Out: 1 KB).
question: What tensor arena size follows from the peak coexisting tensors rather than summing every tensor?
details:
  realistic_solution: |
    The Tensor Arena is a single contiguous block of memory allocated for all input, output, and intermediate tensors. Its size must be large enough to accommodate the peak memory usage at any single point in the execution graph. This peak occurs when the tensors for the single most memory-intensive operation must coexist in memory.
  common_mistake: |
    **The Pitfall:** Summing the sizes of all tensors mentioned (10 + 40 + 20 + 1 = 71 KB).
    **The Rationale:** Candidates fail to account for the lifecycle of tensors; memory is reused once intermediate tensors are consumed.
    **The Consequence:** Overestimating required memory, leading to falsely concluding the model won't fit on the device.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sequential ops require both Input and Output in memory simultaneously.

    **Calculations:**
    - Step 1 Peak: 10 KB + 40 KB = 50 KB.
    - Step 2 Peak: 40 KB + 20 KB = 60 KB.
    - Step 3 Peak: 20 KB + 1 KB = 21 KB.
    - Global Peak: max(50, 60, 21) = 60 KB.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound (60 KB)**. The arena only needs to fit the largest concurrent memory phase.
  options:
  - '71 KB'
  - '40 KB'
  - '60 KB'
  - '50 KB'
  correct_index: 2
