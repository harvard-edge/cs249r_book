title: The Flash vs. SRAM Budget
scenario: 'You are deploying a new model to an MCU with 1 MB of Flash memory and 256 KB of SRAM. The model weights are 400 KB, the RTOS takes 64 KB of Flash and 48 KB of SRAM for heap/stack, the Bootloader takes 32 KB of Flash, the OTA buffer requires 450 KB of Flash, and the model activations require 80 KB of SRAM.'
question: 'How should you separately budget Flash for code/weights/OTA storage versus SRAM for runtime data?'
details:
  realistic_solution: 'We must calculate the budget for Flash and SRAM independently. Flash is for permanent storage (code, weights), while SRAM is for volatile runtime data (activations, heap).'
  common_mistake: |
    **The Pitfall:** Conflating Flash and SRAM budgets into one monolithic memory pool.
    **The Rationale:** Engineers might incorrectly add model weights (Flash) to SRAM usage, leading them to believe they are OOM.
    **The Consequence:** They mistakenly reject viable hardware or over-provision the system, wasting money.
  napkin_math: |
    **Assumptions & Constraints:**
    - Flash Limit: 1 MB (1024 KB).
    - SRAM Limit: 256 KB.
    - Flash items: 400 KB (weights), 64 KB (RTOS), 32 KB (Bootloader), 450 KB (OTA).
    - SRAM items: 48 KB (RTOS), 80 KB (Activations).

    **Calculations:**
    - Total Flash = 400 + 64 + 32 + 450 = 946 KB.
    - Total SRAM = 48 + 80 = 128 KB.

    **Conclusion & Interpretation:**
    - **Result: Fits perfectly with Flash at 946 KB and SRAM at 128 KB (Memory-Bound SRAM & Flash verified independently)**. Static weights and code consume Flash while transient activations consume SRAM.
  options:
  - 'No, it doesn''t fit because SRAM (128 KB) + model weights (400 KB) = 528 KB > 256 KB.'
  - 'Yes, it fits. Flash usage is 946 KB and SRAM usage is 128 KB.'
  - 'No, it doesn''t fit because Flash usage is 400+64+32 = 496 KB, making it impossible to add OTA.'
  - 'No, it doesn''t fit because total memory is 946 + 128 = 1074 KB > 1024 KB.'
  correct_index: 1
