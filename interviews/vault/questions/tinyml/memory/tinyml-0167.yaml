title: The CPU-Sparing Transfer
scenario: In a TinyML audio sensing application, your microcontroller needs to continuously sample data from a microphone's ADC and place it into a memory buffer for inference.
question: To avoid stalling the CPU with this repetitive data copy task, what specialized hardware peripheral is essential?
details:
  realistic_solution: Direct Memory Access (DMA) is strictly required. DMA transfers data autonomously between hardware peripherals and memory without CPU intervention. For a 16 kHz audio stream, relying on the CPU to copy individual samples triggers thousands of Interrupt Service Routines (ISRs) per second, burning massive cycle overhead on context switching. Configuring DMA to fill a double-buffer slashes ISR rates dramatically, freeing the CPU to execute the neural network inference in parallel.
  common_mistake: |
    **The Pitfall:** Writing a software loop or per-sample interrupt to copy ADC data.
    **The Rationale:** Engineers without embedded systems experience assume the CPU must explicitly execute data movement via memcpy or tight loops.
    **The Consequence:** The CPU is overwhelmed by context switching overhead, violating real-time inference deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - 16 kHz audio, 16-bit samples (32 KB/s data rate).
    - ISR overhead: ~24 cycles per context switch.

    **Calculations:**
    - CPU per-sample ISR: 16,000/s * 24 cycles = 384,000 cycles/s wasted.
    - DMA double-buffering (512-sample buffer): interrupts once every 256 samples.
    - DMA ISR rate: 16,000 / 256 = 62.5 interrupts/s.

    **Conclusion & Interpretation:**
    - **Result: 62.5 interrupts/s (Compute-Bound by Interrupts)**. DMA provides a 256x reduction in context switching overhead.
