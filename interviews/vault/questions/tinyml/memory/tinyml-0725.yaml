title: The Multi-Tenant MCU
scenario: Your smart home device on an nRF5340 application core (Cortex-M33, 128 MHz, 256 KB SRAM) must support two models in one firmware image. A keyword spotting model runs normally (15ms inference, 80 KB arena), and a command recognition model runs only after the wake word (45ms inference, 140 KB arena). The system may pause KWS during command recognition. Total arena requirement if independent is 220 KB. Available SRAM after firmware is 230 KB.
question: How should an nRF5340 schedule 80 KB KWS and 140 KB command arenas when both must fit in 230 KB SRAM?
details:
  realistic_solution: Because command recognition is on-demand, schedule the models as mutually exclusive users of the arena memory. Keep KWS active during normal listening with its 80 KB arena. After a wake word, stop KWS, run the command model in a 140 KB arena, then restore KWS. The peak arena SRAM is max(80 KB, 140 KB) = 140 KB, leaving 90 KB of the 230 KB post-firmware SRAM for stack, ISR frames, and BLE IPC buffers. If both models truly had to execute concurrently, they would need separate arenas totaling 220 KB and only 10 KB headroom.
  common_mistake: |
    **The Pitfall:** Allocating 220 KB for both arenas simultaneously.
    **The Rationale:** Candidates see 220 KB < 230 KB and assume the memory plan is safe, ignoring stack, interrupt frames, BLE buffers, and other runtime SRAM users.
    **The Consequence:** This leaves only 10 KB of headroom, which is insufficient for the stack, ISR frames, or BLE IPC buffers, leading to a crash.
  napkin_math: |
    **Assumptions & Constraints:**
    - Available SRAM: 230 KB.
    - KWS Arena: 80 KB.
    - CMD Arena: 140 KB.
    - KWS gap analysis: 45ms command inference / 100ms KWS period.

    **Calculations:**
    - Concurrent allocation: 80 KB + 140 KB = 220 KB peak. Headroom = 230 KB - 220 KB = 10 KB, which is too little for normal runtime overhead.
    - Time-multiplexed allocation: max(80 KB, 140 KB) = 140 KB peak.
    - Headroom while CMD runs = 230 KB - 140 KB = 90 KB.
    - Scheduling cost: KWS is deliberately paused for the 45ms command inference and resumes afterward.

    **Conclusion & Interpretation:**
    - **Result: 140 KB peak (Memory-Bound)**. This is valid because the prompt permits KWS to pause during the on-demand command model. Without that scheduling constraint, simultaneous execution would require 220 KB of arenas.
  options:
    - Allocate 80 KB + 140 KB = 220 KB for both arenas simultaneously. 230 KB available, leaving 10 KB headroom — sufficient for both models to coexist.
    - 'Time-multiplex the physical arena memory. During normal listening, run KWS with its 80 KB arena. When CMD triggers, pause KWS and repurpose the arena region for CMD''s 140 KB arena. Peak arena SRAM: max(80 KB, 140 KB) = 140 KB, leaving 90 KB for stack, ISR frames, and BLE buffers. If KWS and CMD had to execute concurrently, this reuse would not be valid.'
    - Run both models in a single TFLite Micro interpreter by concatenating the model graphs. The interpreter will automatically manage memory sharing between the two models.
    - Allocate the full 230 KB as a shared arena and let TFLite Micro's dynamic memory planner handle the allocation for both models during concurrent execution.
