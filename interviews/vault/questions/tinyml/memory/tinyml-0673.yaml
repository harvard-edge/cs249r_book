title: The Streaming Sensor Fusion Dilemma
scenario: You are the technical lead for a new autonomous drone project. The drone uses a low-cost Cortex-M7 microcontroller (1MB Flash, 256KB SRAM) for its flight controller. A new requirement has come down to add a 'situational awareness' feature that fuses data from three high-frequency sensors (IMU, barometer, microphone) in real-time to predict flight instability. The research team has proposed a small, transformer-like model with 16 layers, embedding dimension 128, using FP16 precision. It requires a 512-token KV-cache to maintain temporal context. Your constraints are a hard real-time deadline of 1ms per inference and the existing MCU. The junior team's initial analysis concludes it's impossible, as the KV-cache alone (2 * 512 tokens * 16 layers * 128 embed_dim * 2 bytes = 4 MiB) is 16x larger than the available SRAM.
question: Which decisions on context, model size, quantization, and SRAM layout make this MCU design feasible?
details:
  realistic_solution: 'The first architectural decision is to reject a 512-token, 16-layer FP16 KV-cache on this MCU and turn the requirement into a fixed-window streaming problem: keep a 64-token recent window plus a compact learned summary of older sensor history. The second decision is to reduce the deployed transformer-like block to a small SRAM-resident model, such as 4 layers with INT8 KV-cache, because the flight-control loop cannot tolerate Flash-backed paging or swap. The third decision is to use a fixed SRAM arena with static ownership: one KV ring buffer, bounded activation buffers, and sensor feature buffers, all sized at compile time so the 1ms loop has no cache-miss or erase/write jitter. This does not claim the original research model fits; it defines the MCU-plausible architecture that must be retrained and profiled.'
  common_mistake: |
    **The Pitfall:** Applying virtual memory or mobile-style memory management concepts.
    **The Rationale:** Engineers assume you can just "offload" to Flash like it's slow RAM or a swap file, without accounting for the physical realities of Flash (erase/write cycles, block-based access) and the lack of an MMU.
    **The Consequence:** Proposing architectures that are fundamentally impossible to implement on a microcontroller, failing to solve the KV-cache state size problem.
  napkin_math: |
    **Assumptions & Constraints:**
    - KV-cache = 2 (K+V) * tokens * layers * total embedding dimension * bytes/value.
    - Original KV-cache = 2 * 512 tokens * 16 layers * 128 dim * 2 bytes (FP16) = 4 MiB.
    - Available SRAM: 256 KB.

    **Calculations:**
    - Original ratio: 4 MiB / 256 KB = 16x oversubscribed.
    - Sliding window alone (64 tokens, 16 layers, FP16): 2 * 64 * 16 * 128 * 2 = 524,288 bytes = 512 KB, still 2x SRAM.
    - Reduced 4-layer FP16 window: 2 * 64 * 4 * 128 * 2 = 131,072 bytes = 128 KB.
    - Reduced 4-layer INT8 KV-cache: 2 * 64 * 4 * 128 * 1 = 65,536 bytes = 64 KB.
    - Example fixed SRAM budget: 64 KB KV ring + 96 KB activations/sensor features + 32 KB stack/RTOS margin = 192 KB, leaving ~64 KB headroom.

    **Conclusion & Interpretation:**
    - **Result: ~192 KB fixed SRAM footprint for a redesigned 64-token, 4-layer INT8 streaming model (Memory-Capacity-Bound)**. The original 512-token FP16 design is not made practical by Flash paging; the viable path is context reduction, model reduction, quantized SRAM-only state, and profiling against the 1ms loop.
  options:
    - Apply virtual memory by using external flash as swap space, paging KV-cache layers in and out as needed, similar to how mobile operating systems handle memory pressure.
    - 'Three architectural decisions: (1) Reduce context from 512 to a 64-token sliding window plus a compact summary state. (2) Reduce the deployable model to a small SRAM-resident variant, such as 4 layers, and quantize KV-cache to INT8: 2 * 64 * 4 * 128 * 1 = 64 KB. (3) Use a fixed SRAM arena for KV ring, activations, and sensor buffers with no Flash-backed paging in the 1ms loop. Example SRAM: 64 KB KV + 96 KB activations/features + 32 KB stack/RTOS margin = 192 KB, leaving ~64 KB headroom.'
    - Quantize the entire model from FP16 to INT4, reducing the KV-cache from 4 MiB to 1 MiB. Then use aggressive structured pruning to remove 75% of attention heads, bringing it to 256 KB.
    - The junior team is correct — it is impossible. A transformer with 16 layers and 512-token KV-cache fundamentally cannot run on a 256 KB SRAM MCU. The requirement should be changed to a simpler RNN-based model.
  correct_index: 1
