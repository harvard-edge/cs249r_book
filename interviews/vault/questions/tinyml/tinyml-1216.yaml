title: ESP32-S3 Keyword Spotting Energy Bottleneck Optimization
scenario: You are deploying an always-on keyword spotting (KWS) model on an ESP32-S3. The model processes 1-second audio frames at 16kHz and runs inferences every 100ms. Currently, the system drains the battery in 12 hours, far short of the 7-day target. Profiling shows that while the Xtensa core's INT8 vector extensions perform the MAC operations efficiently, reading the 2MB model weights from the 8MB external PSRAM for every inference is dominating the energy consumption.
question: How should ESP32-S3 reduce keyword-spotting energy when PSRAM weight reads dominate each inference?
details:
  realistic_solution: The solution is to minimize external memory access by leveraging the 512 KB internal SRAM. The model should be compressed (via techniques like aggressive quantization, structured pruning, or knowledge distillation) to fit entirely within the internal SRAM. Alternatively, caching strategies or breaking the model into stages where only the initial, frequently run feature-extraction layers reside in SRAM can drastically reduce PSRAM accesses.
  common_mistake: |
    **The Pitfall:** Focusing solely on reducing the number of MAC operations.
    **The Rationale:** Engineers often equate compute cycles directly with energy consumption, ignoring that fetching data from external memory (PSRAM) costs orders of magnitude more energy than ALU operations.
    **The Consequence:** They implement extreme pruning or reduce model accuracy without meaningfully improving battery life.
  napkin_math: |
    1. Define energy costs: PSRAM access ~100 pJ, SRAM access ~10 pJ, MAC ~1 pJ.
    2. PSRAM cost: 2 MB model (500,000 32-bit words) × 100 pJ = 50 µJ per inference.
    3. PSRAM total drain: At 10 inferences/sec = 500 µJ/sec (**500 µW**).
    4. SRAM optimization: Compress to 500 KB (125,000 words) in SRAM. 125,000 × 10 pJ = 1.25 µJ per inference.
    5. SRAM total drain: At 10 inferences/sec = 12.5 µJ/sec (**12.5 µW**).
    6. Result: Moving to SRAM yields a **40× reduction** in memory energy cost.
