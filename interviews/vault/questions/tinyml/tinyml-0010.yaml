title: The SPI Bus Latency Choke
scenario: You are running a large model using Execute-In-Place (XIP) from an external Serial Flash. Your
  CPU is at 240 MHz, but inference takes 10x longer than your simulator predicted. Based on the chip diagram,
  what physical link is starving your CPU?
details:
  realistic_solution: 'The bottleneck is the **SPI Bus Latency**. Serial Flash operates at a much lower
    frequency (40-80 MHz) than the CPU (240 MHz) and over a narrow 1-bit or 4-bit bus. Every weight fetch
    triggers a CPU stall of 50-100 cycles. The fix is **SRAM Pinning**: copy the most frequently used
    layers (or the current layer''s weights) into fast internal SRAM at boot time to avoid the SPI bus
    during inference.'
  common_mistake: '"The model is too big for the CPU." The CPU can handle the math; it''s starving for
    data.'
  napkin_math: 240 MHz CPU vs 40 MHz SPI = 6x clock ratio. 1-bit SPI vs 32-bit CPU internal bus = 32x
    width ratio. Total bottleneck = $6 \times 32 = 192\text{x}$ theoretical bandwidth gap.
