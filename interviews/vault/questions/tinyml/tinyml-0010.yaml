title: The SPI Bus Latency Choke
scenario: You are running a large model using Execute-In-Place (XIP) from an external Serial Flash. Your CPU is at 240 MHz, but inference takes 10x longer than your simulator predicted.
question: Why does XIP from external serial flash make a 240 MHz CPU run inference 10x slower than simulation?
details:
  realistic_solution: 'The bottleneck is the **SPI Bus Latency**. Serial Flash operates at a much lower frequency (40-80 MHz) than the CPU (240 MHz) and over a narrow 1-bit or 4-bit bus. Every weight fetch triggers a CPU stall of 50-100 cycles. The fix is **SRAM Pinning**: copy the most frequently used layers (or the current layer''s weights) into fast internal SRAM at boot time to avoid the SPI bus during inference.'
  common_mistake: |
    **The Pitfall:** Assuming the model is simply too computationally complex for the CPU.
    **The Rationale:** Candidates focus on compute (MACs) and ignore the severe latency of fetching weights over a slow, narrow SPI bus.
    **The Consequence:** Wasted effort optimizing model architecture when the true bottleneck is I/O memory bandwidth.
  napkin_math: |
    - Clock ratio: 240 MHz CPU vs 40 MHz SPI = 6x slower clock.
    - Width ratio: 32-bit CPU internal bus vs 1-bit SPI bus = 32x narrower bus.
    - **Total theoretical bottleneck:** 6 x 32 = **192x slower bandwidth** compared to internal SRAM.
