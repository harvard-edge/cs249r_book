title: NPU-CPU Bus Contention and Trace Profiling in Corstone-300
scenario: You are deploying a real-time keyword spotting model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300)
  subsystem. The system runs at 480 MHz and features 512 KB of shared SRAM between the M7 and the NPU.
  Profiling shows that despite the NPU's theoretical 256 MAC/cycle capability, overall inference latency
  is drastically higher than expected, and trace tools reveal massive pipeline bubbles in the NPU execution
  graph. Design a profiling strategy to isolate the root cause and propose an architectural modification
  to the model or memory layout to achieve the target latency.
question: "How would you design a profiling strategy to isolate the root cause and propose an architectural modification to the model or memory layout to achieve the target latency?"
details:
  realistic_solution: The correct approach is to use hardware performance counters (PMUs) to correlate
    M7 memory accesses with NPU idle cycles. By analyzing the operator fallback trace, we identify that
    a non-native activation function is forcing context switches back to the M7 CPU. The architectural
    fix is to fuse the activation into the NPU's native operator pipeline (e.g., replacing a custom Swish
    with a hardware-supported ReLU6) and pin critical buffers in specific SRAM banks to eliminate bus
    contention, allowing the NPU to run at peak MAC utilization.
  common_mistake: Candidates often assume the NPU is simply underpowered or focus purely on pruning MACs
    to reduce compute. They fail to realize that the Ethos-U55 and Cortex-M7 share the same SRAM, and
    frequent operator fallbacks to the M7 cause severe memory bus contention and NPU stalling.
  napkin_math: Assume a convolutional layer requires 2.5 million MACs. At 480 MHz with the NPU doing 256
    MACs/cycle, theoretical compute time is (2,500,000) / (480,000,000 * 256) = 20.3 microseconds. If
    an unsupported activation forces a fallback to the M7 for a 100,000-element tensor, taking 10 cycles/element
    due to memory fetches from the 512 KB SRAM, the CPU time is (100,000 * 10) / 480,000,000 = 2.08 milliseconds.
    The CPU fallback alone adds over 100x the latency of the NPU compute, perfectly explaining the profiling
    bubbles.
