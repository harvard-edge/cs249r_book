title: ESP32-S3 Low-Battery Model Fallback
scenario: Your smart doorbell on an ESP32-S3 (240 MHz dual-core) runs a primary INT8 face detection model that requires 12 million MAC operations per frame. During a low-battery event, the system must gracefully degrade to a lightweight presence detection model requiring only 1.2 million MACs. Assume the vector extensions execute 2 INT8 MACs per clock cycle.
question: "What are the ESP32-S3 inference latencies for the primary and low-battery fallback doorbell models?"
details:
  realistic_solution: 'The correct approach applies the standard latency formula: Latency = Total MACs / (MACs per cycle * Clock Frequency). By dividing the MACs by the hardware throughput and the 240 MHz clock speed, we find the baseline and degraded latencies.'
  common_mistake: |
    **The Pitfall:** Forgetting to account for the vector extensions' throughput (2 MACs per cycle).
    **The Rationale:** Candidates default to standard 1 cycle/MAC scalar assumptions or mishandle the MHz to Hz conversion.
    **The Consequence:** They calculate latency estimates that are off by a factor of 2 or 1000.
  napkin_math: |
    1. Calculate Primary Model cycles: 12,000,000 MACs / 2 MACs/cycle = 6,000,000 cycles.
    2. Calculate Primary Latency: 6,000,000 cycles / 240,000,000 Hz = 0.025 seconds (25 ms).
    3. Calculate Fallback Model cycles: 1,200,000 MACs / 2 MACs/cycle = 600,000 cycles.
    4. Calculate Fallback Latency: 600,000 cycles / 240,000,000 Hz = 0.0025 seconds (2.5 ms).
    5. Calculate savings: 25 ms - 2.5 ms = 22.5 ms.
    6. **Final Result: Time saved per frame is 22.5 ms (25 ms vs 2.5 ms).**
