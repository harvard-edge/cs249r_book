title: XIP Execution and SRAM Limits in Microcontrollers
scenario: A Cortex-M4 has 256KB of SRAM and 1MB of Flash. A model has 200KB of static
  weights and requires 100KB for intermediate activations.
question: Explain why copying weights to SRAM will cause an OOM error, and how the
  memory hierarchy should be mapped to succeed.
details:
  realistic_solution: If weights (200KB) and activations (100KB) are both in SRAM,
    the total (300KB) exceeds the 256KB physical limit, causing an Out of Memory error.
    Because weights are read-only, they should remain in Flash memory and be accessed
    directly via eXecute In Place (XIP). This reserves the entire 256KB SRAM exclusively
    for the 100KB mutable activations.
  common_mistake: Believing Flash memory can be used to store frequently updated intermediate
    activations.
  napkin_math: 200 + 100 = 300 > 256
