title: Nordic nRF5340 Dual-Core Architecture for Operator Scheduling
scenario: When configuring operator scheduling for a neural network on the Nordic nRF5340, engineers often
  partition tasks between its two cores to optimize execution order and power consumption. The device
  features an asymmetric dual-core architecture with a total of 256 KB SRAM and 1 MB flash. What are the
  specific clock frequencies of the application core and the network core on the Nordic nRF5340?
question: "What are the specific clock frequencies of the application core and the network core on the Nordic nRF5340?"
details:
  realistic_solution: The correct specification is a 128 MHz application core and a 64 MHz network core.
    Operator scheduling should target the 128 MHz application core for heavy ML computations while leaving
    the 64 MHz network core to handle the BLE 5.3 stack.
  common_mistake: Candidates often assume the nRF5340 has a single core or symmetric dual cores, incorrectly
    stating that both cores run at the same frequency (e.g., both at 64 MHz or 128 MHz).
  napkin_math: App Core Frequency = 128 MHz. Net Core Frequency = 64 MHz. Compute ratio = 128 MHz / 64
    MHz = 2x. Therefore, scheduling ML operators on the app core provides twice the clock cycles per second
    compared to the net core, keeping active current draw around ~5mA.
