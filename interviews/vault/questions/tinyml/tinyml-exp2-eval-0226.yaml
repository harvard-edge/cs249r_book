title: Evaluating Distillation vs Pruning for Ethos-U55 Deployment
scenario: 'You are deploying a wake-word detection model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300)
  system. Your current baseline model requires 800 KB of SRAM, but the system only provides 512 KB of
  SRAM shared between the 480 MHz M7 and the Ethos-U55 NPU. You are presented with two optimization alternatives
  to fit the memory budget: 1) applying unstructured pruning to achieve 40% sparsity on the 800 KB model,
  or 2) using knowledge distillation to train a smaller, denser student model that directly requires only
  350 KB of SRAM. Which approach is better for this specific hardware target, and why?'
details:
  realistic_solution: Knowledge distillation into a dense student model is significantly better for the
    ARM Ethos-U55 than unstructured pruning. The U55 NPU relies on continuous, dense memory accesses to
    effectively utilize its 128-512 MAC/cycle throughput, and the shared 512 KB SRAM necessitates predictable
    memory patterns. Distillation shrinks the model's physical footprint to fit entirely within the 512
    KB SRAM limit while maintaining the dense execution efficiency required to leverage the NPU hardware.
  common_mistake: Candidates often suggest unstructured pruning because it reduces theoretical MAC counts
    and parameter storage requirements. However, they fail to realize that NPU architectures like the
    Ethos-U55 are optimized for dense matrix operations and do not efficiently accelerate unstructured
    sparsity, leading to worse actual latency on the device.
  napkin_math: Assume an Ethos-U55 configured for 256 MAC/cycle running at 480 MHz. Peak theoretical throughput
    is 480 MHz * 256 MACs = ~122.8 GMAC/s. A 40% sparse 800 KB model still requires the full 800 KB weight
    tensor to be loaded into the 512 KB shared SRAM, causing cache thrashing or requiring fallback to
    the M7 CPU for sparse operations (dropping throughput to <1 GMAC/s). Conversely, a dense 350 KB distilled
    student model fits entirely within the 512 KB SRAM alongside application memory, allowing the Ethos-U55
    to execute the dense layers near its peak 122.8 GMAC/s throughput.
