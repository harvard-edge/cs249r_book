title: Oscillator Drift Guardband
scenario: A smart agricultural sensor on a Cortex-M4 uses an RC oscillator to wake
  up from a 1 uA sleep state to a 12 mA active state. The oscillator has a 5% drift
  over time.
question: Implement a drift-tolerant duty-cycling guardband and calculate its impact
  on battery life if the baseline active time is 10 ms per second.
visual:
  kind: svg
  path: tinyml-1566.svg
  alt: Timeline showing a 10ms window expanding to 60ms.
  caption: Active window expansion due to guardbanding.
details:
  realistic_solution: A 5% drift over a 1-second sleep interval means the system might
    wake up 50 ms early or late. To guarantee catching an exact synchronized external
    beacon, the active window must expand by 50 ms, bringing active time from 10 ms
    to 60 ms. Average current jumps from $10\text{ms} \times 12\text{mA} \approx 120$
    uA to $60\text{ms} \times 12\text{mA} = 720$ uA, a 6x penalty.
  common_mistake: Assuming the oscillator drift doesn't affect power, forgetting that
    the processor must stay awake longer to catch asynchronous events.
  napkin_math: 5% of 1s = 50ms guardband. 10ms + 50ms = 60ms active. 60 * 12mA / 1000
    = 720 uA avg.
