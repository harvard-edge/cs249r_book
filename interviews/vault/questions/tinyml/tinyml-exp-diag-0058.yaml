title: Distilled Student SRAM Exhaustion
scenario: A team compressed a predictive maintenance model for the Nordic nRF5340 using knowledge distillation
  instead of structured pruning. The distilled student model has 150 KB of weights, fitting easily into
  the 1 MB flash, while an alternatively pruned teacher model has 200 KB of weights. However, when deployed
  to the 128 MHz app core, the distilled model immediately causes a hard fault due to SRAM exhaustion,
  whereas the pruned model executes successfully. Given the nRF5340's strict memory limits, diagnose why
  the distilled model caused an Out-Of-Memory (OOM) error while the larger pruned model did not.
question: "Why can a smaller distilled nRF5340 model OOM while a larger pruned model runs successfully?"
details:
  realistic_solution: The crash is caused by the peak activation memory footprint, which dictates SRAM
    usage on microcontrollers. Structured pruning directly reduces the number of channels, inherently
    shrinking intermediate feature maps. In contrast, the custom student architecture designed for distillation
    likely utilized wider layers or larger spatial dimensions early in the network to match the teacher's
    capacity, resulting in peak activations that exceeded the available SRAM despite having fewer total
    weights.
  common_mistake: Candidates often assume that a smaller parameter count (lower flash usage) naturally
    correlates with lower SRAM usage. They may mistakenly believe distillation adds hidden runtime operations,
    forgetting that the student is just a standard standalone network during deployment.
  napkin_math: 'nRF5340 SRAM total: 256 KB. Assume the BLE 5.3 stack and RTOS consume 64 KB, leaving 192
    KB for the ML app. Pruned Teacher max activation: 64 channels * 1000 steps * 1 byte (int8) = 64 KB.
    Ping-pong buffered = 128 KB (fits in 192 KB). Distilled Student max activation: Uses a wider 128-channel
    initial layer. 128 * 1000 * 1 byte = 128 KB. Ping-pong buffered = 256 KB. 256 KB > 192 KB available
    SRAM, directly triggering the hard fault.'
