title: OTA Memory Alignment Faults
scenario: A microcontroller downloads a flatbuffer model via an OTA update. Appending
  the blob dynamically to the heap causes a HardFault upon inference.
question: Evaluate the memory layout and identify the low-level addressing error crashing
  the CPU.
details:
  realistic_solution: Flatbuffers rely on direct memory mapping and pointer arithmetic.
    Microprocessors strictly require multi-byte variables (like floats or 32-bit integers)
    to be aligned to 4-byte or 8-byte memory boundaries. If the OTA blob is placed
    arbitrarily on the heap without ensuring correct word-alignment, the CPU throws
    an unaligned access hardware fault.
  common_mistake: Suspecting network corruption of the weights rather than a purely
    local memory-alignment pointer issue.
  napkin_math: Mod 4 alignment check != 0 triggers 1 fault.
