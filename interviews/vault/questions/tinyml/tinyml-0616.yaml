title: The Watchdog Flash Stall
scenario: Your smart agriculture sensor uses an ESP32. It has a hardware watchdog timer set to 5 seconds.
  To save the 1 MB ML model permanently, you download it via Wi-Fi and write it to the internal SPI Flash
  using standard `esp_flash_write` commands. The download takes 10 seconds. Even though your download
  loop calls `vTaskDelay` to let other tasks run, the watchdog triggers and resets the chip mid-download.
  Why?
question: "Why does writing a 1 MB model to ESP32 SPI flash trip a 5 s watchdog despite `vTaskDelay`?"
details:
  realistic_solution: 'You triggered a **Flash Cache Disable Stall**. Erasing a 64 KB block of SPI Flash
    can take ~500ms. If your code calls `esp_flash_erase_region` for the entire 1MB partition before writing,
    it causes 8 seconds of continuous bus lockup. If your watchdog expects a ping every 5 seconds, the OS
    mathematically cannot ping it in time because the flash cache is disabled and the CPU is stalled.'
  common_mistake: '"Wi-Fi is blocking the CPU." The Wi-Fi task runs on a separate core or is yielded.
    The issue is the physical Flash memory.'
  napkin_math: 'Erasing a 64 KB block of SPI Flash can take ~500ms. Erasing a 1 MB partition all at once takes 16 blocks * 500ms = 8 seconds of total bus lockup. The CPU is stalled (cache disabled) and cannot run the idle task to pet the 5s watchdog.'
