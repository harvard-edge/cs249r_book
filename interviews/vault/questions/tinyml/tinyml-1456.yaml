title: 'TinyML Anomaly Detection: Data Curation for ARM Cortex-M4'
scenario: 'You are tasked with designing a robust data curation and labeling pipeline
  for a low-power, always-on anomaly detection system deployed on an ARM Cortex-M4
  STM32F4 microcontroller. This device operates with significant constraints: a 168
  MHz clock speed, 256 KB of SRAM, and no floating-point unit (FPU). The system''s
  goal is to detect critical machine failures by analyzing sensor data (e.g., vibration,
  temperature) and must run a TinyML model on-device. Describe how you would strategically
  approach data selection, establish annotation workflows (considering the device''s
  limitations for eventual model deployment), manage inter-annotator agreement for
  nuanced anomaly types, and implement strategies for active learning to efficiently
  gather high-value data, all while meticulously mitigating dataset bias to ensure
  reliable performance on this resource-constrained edge device.'
question: How should you design a device-aware data curation and labeling pipeline
  for an FPU-less Cortex-M4 anomaly detector?
details:
  realistic_solution: 'A realistic solution involves a multi-faceted approach: 1)
    **Data Selection**: Prioritize integer-friendly raw sensor data and features that
    can be computed with fixed-point arithmetic on-device. Focus on collecting ''hard''
    or uncertain samples for active learning. 2) **Annotation Workflows**: Develop
    extremely precise, unambiguous annotation guidelines, potentially leveraging domain
    experts. For active learning, implement simple, on-device uncertainty sampling
    (e.g., confidence-based) to select high-value samples for off-device human review.
    3) **Inter-Annotator Agreement**: For critical anomaly types, employ redundant
    labeling and consensus mechanisms. 4) **Bias Mitigation**: Proactively identify
    sources of bias (e.g., sensor drift, operational environment shifts) and implement
    stratified sampling or synthetic data generation tailored for fixed-point representation.
    Crucially, design the entire pipeline to minimize data volume and complexity to
    align with the STM32F4''s limited resources.'
  common_mistake: A common mistake is to design a data curation process without fully
    internalizing the severe on-device constraints (168 MHz, 256 KB SRAM, no FPU).
    This often leads to collecting data that, when used to train models, results in
    architectures too large, too computationally expensive (e.g., requiring floating-point
    operations), or too slow for the target hardware. Another oversight is neglecting
    the power and bandwidth costs associated with active learning's data offloading
    for re-labeling and retraining.
  napkin_math: If an anomaly detection model and its inference engine require 128
    KB of SRAM for weights, activations, and runtime, and the STM32F4 has 256 KB SRAM,
    this leaves approximately 128 KB for input sensor buffers, pre-processing features,
    and potentially small active learning buffers. Given a 16 kHz sampling rate and
    16-bit integer samples for two sensors, a 1-second window would require 16000
    * 2 * 2 = 64 KB. How would this impact the maximum window size or the need for
    on-the-fly feature extraction if memory becomes a bottleneck, especially considering
    no FPU mandates fixed-point math and potentially larger integer types for intermediate
    calculations?
