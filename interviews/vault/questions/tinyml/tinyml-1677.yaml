title: 'Microcontroller Duty-Cycling Energy Estimation for Acoustic Sensors'
scenario: 'A smart agricultural sensor uses a Cortex-M4 to classify acoustic machinery breakdowns, running strictly off a coin cell battery.'
question: 'How does waking the Cortex-M4 every 5 seconds for a 50ms inference impact the average energy estimation for duty-cycling?'
details:
  realistic_solution: 'The average power profile is dominated by the active time. Active energy per cycle is computed and amortized over the sleep interval. The protocol yields a 1% duty cycle, providing extended battery life, but must be checked against the start-up overhead of the oscillator and ADC.'
  common_mistake: |
    **The Pitfall:** Ignoring the oscillator wake-up time and ADC settling time.
    **The Rationale:** Assuming the active time is exactly equal to the 50ms inference time without accounting for hardware initialization overhead.
    **The Consequence:** Underestimating the active energy budget, as hidden start-up costs can add 10-20ms of peak power draw per cycle.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inference active time: 50 ms = 0.05 seconds.
    - Sleep time per cycle: 5.0 s - 0.05 s = 4.95 seconds.
    - Active current draw: 10 mA.
    - Sleep current draw: 1 µA = 0.001 mA.

    **Calculations:**
    - Active Energy: 10 mA * 0.05 s = 0.50 mAs.
    - Sleep Energy: 0.001 mA * 4.95 s = 0.00495 mAs.
    - Average Current: (0.50 + 0.00495) / 5.0 s = 0.101 mA.

    **Conclusion & Interpretation:**
    - **Result: 0.101 mA (Power-Bound)**. Hardware initialization overhead adds peak power draw, meaning true average current is slightly higher.
