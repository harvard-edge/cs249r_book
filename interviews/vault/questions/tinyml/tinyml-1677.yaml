title: Microcontroller Duty-Cycling Energy Estimation for Acoustic Sensors
scenario: A smart agricultural sensor uses a Cortex-M4 to classify acoustic machinery
  breakdowns, running strictly off a coin cell battery.
question: Evaluate an implemented duty-cycling protocol that wakes the Cortex-M4 from
  a 1uA sleep state to an 80MHz active state drawing 10mA every 5 seconds to run a
  50ms inference.
details:
  realistic_solution: The average power profile is dominated by the active time. Active
    energy per cycle is computed and amortized over the sleep interval. The protocol
    yields a 1% duty cycle, providing extended battery life, but must be checked against
    the start-up overhead of the oscillator and ADC.
  common_mistake: Ignoring the oscillator wake-up time and ADC settling time, which
    can add 10-20ms of hidden active power consumption per cycle.
  napkin_math: Average current = (10mA * 0.05s + 0.001mA * 4.95s) / 5.0s = 0.101 mA.
