title: Continuous Learning on MCU
scenario: Your Cortex-M7 (480 MHz, 1 MB SRAM) runs a 50 KB anomaly detection model on remote oil rigs utilizing expensive satellite connectivity (2400 bps, $8/MB). The data distribution has shifted, requiring an updated model.
question: Is it economically and computationally feasible to perform on-device incremental learning on the Cortex-M7 rather than pushing a full model update via satellite?
details:
  realistic_solution: On-device incremental learning is practical only if restricted to last-layer fine-tuning. By freezing the convolutional backbone and updating a small classification head, the memory requirements for activation buffers, gradients, optimizer state, and a local training buffer can be kept around 92 KB, which fits inside the 1 MB SRAM. The arithmetic kernel is small, but end-to-end training also includes data movement, loss computation, optimizer updates, and scheduling overhead, so the compute cost should be treated as a bounded local maintenance task rather than a negligible 10 ms operation. Avoiding a full 50 KB satellite model transfer saves both per-MB charges and about 3 minutes of link occupancy per device at 2400 bps.
  common_mistake: |
    **The Pitfall:** Dismissing backpropagation on microcontrollers outright.
    **The Rationale:** Engineers assume standard backpropagation memory footprints mathematically rule out any form of on-device training.
    **The Consequence:** They architect massively expensive cloud retraining loops, burning significant capital transmitting raw data over slow satellite links when the local hardware possesses adequate capacity for targeted fine-tuning.
  napkin_math: |
    **Assumptions & Constraints:**
    - 50 KB model on 480 MHz Cortex-M7 (1 MB SRAM).
    - Satellite Cost: $8/MB at 2400 bps.
    - Training samples: 100 samples, buffered locally at 800 bytes/sample.
    - Last-layer training cost: 5000 MACs/sample/epoch for 10 epochs.
    - Best-case effective kernel throughput: 1 MAC/cycle for the small last-layer MAC loop.

    **Calculations:**
    - Data buffer: 100 samples * 800 bytes/sample = 80 KB.
    - SRAM Footprint: Activations (4 KB) + Gradients (4 KB) + Optimizer (4 KB) + Data Buffer (80 KB) = 92 KB.
    - Local compute: 10 epochs * 100 samples * 5000 MACs = 5,000,000 MACs.
    - Best-case MAC kernel time: 5,000,000 cycles / 480,000,000 cycles/s = 10.4 ms.
    - End-to-end local training time will be higher after loss, optimizer, memory traffic, and firmware scheduling overhead, but it remains a local task rather than a satellite transfer.
    - Satellite transfer size: 50 KiB = 409,600 bits.
    - Satellite transfer time at 2400 bps: 409,600 / 2400 = 171 seconds, or about 2.8 minutes per device.
    - Satellite data charge using decimal MB: 50 KiB = 0.051 MB; 0.051 * $8/MB = about $0.41 per device, before connection overhead or minimum billing.

    **Conclusion & Interpretation:**
    - **Result: Cost-and-link-bound deployment.** Last-layer fine-tuning requires about 92 KB of SRAM and has a small best-case MAC workload, while a full model update costs about $0.41 and occupies the 2400 bps link for about 2.8 minutes per device.
