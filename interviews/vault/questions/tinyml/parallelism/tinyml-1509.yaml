title: 'TinyML Double Buffer Parallelism'
scenario: 'A Cortex-M7 samples audio into one buffer while an Ethos-U55 processes the previous buffer. Each 1-second audio window is 32 KB. DMA fill time is exactly 1 second, and NPU inference takes 120 ms.'
question: 'Can DMA audio capture and Ethos-U55 inference stay in lockstep with 1-second windows and 120 ms inference time?'
details:
  realistic_solution: 'Yes. The producer fills one buffer every 1,000 ms, while the consumer processes a full buffer in 120 ms. With double buffering, inference finishes long before the next buffer is ready, leaving 880 ms headroom.'
  common_mistake: |
    **The Pitfall:** Concluding that inference will delay sampling.
    **The Rationale:** Candidates often assume that capture and inference must run sequentially without considering double buffering and DMA.
    **The Consequence:** Failing to recognize the parallelism capabilities leads to unnecessarily complex architectural workarounds or the false assumption that the system cannot meet real-time constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Double buffering enabled with DMA.
    - Producer time (DMA audio capture): 1-second windows (1,000 ms).
    - Consumer time (NPU inference): 120 ms.

    **Calculations:**
    - Headroom: 1,000 ms - 120 ms = 880 ms.

    **Conclusion & Interpretation:**
    - **Result: 880 ms headroom (Compute-Bound)**. They remain in lockstep since inference finishes well before the next buffer fills.
