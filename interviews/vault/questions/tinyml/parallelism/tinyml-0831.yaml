title: TinyML Radio Compute Overlap
scenario: 'A TinyML node computes features for 40 ms and transmits the previous result for 15 ms using a radio peripheral that can run while the CPU computes.'
question: 'What steady-state cycle time results when 40 ms compute overlaps a 15 ms radio transmit from the previous result?'
details:
  realistic_solution: 'The steady-state cycle is compute-bound at 40 ms if the radio transfer truly overlaps using DMA or a dedicated peripheral. Without overlap, the cycle would be 55 ms. The design needs appropriate double-buffering so radio completion does not block the next sample.'
  common_mistake: |
    **The Pitfall:** Serializing compute and radio work.
    **The Rationale:** Assuming that the CPU must manage the transmission synchronously, failing to utilize the independent radio peripheral's capabilities.
    **The Consequence:** The system will have a longer cycle time (55 ms instead of 40 ms), reducing overall throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - CPU compute time: 40 ms.
    - Radio transmit time: 15 ms.
    - Radio peripheral operates asynchronously.

    **Calculations:**
    - Sequential Execution = 40 ms + 15 ms = 55 ms.
    - Overlapped Pipeline = Max(40 ms, 15 ms) = 40 ms.

    **Conclusion & Interpretation:**
    - **Result: Cycle time is 40 ms (Compute-Bound Pipeline Optimized)**. DMA-driven peripherals effectively hide transmission latency.
