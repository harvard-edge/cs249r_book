title: 'TinyML Model Compression AutoML Pipeline'
scenario: 'You need to deploy an image classification model on 5 different MCU targets: (A) Cortex-M4, (B) Cortex-M7, (C) Cortex-M33, (D) ESP32-S3, (E) Cortex-M55. Each target has different memory constraints, instruction sets, and optimal model architectures.'
question: 'How would you design a hardware-aware AutoML pipeline to automatically produce the best model for each of these 5 MCU targets from a single dataset?'
details:
  realistic_solution: 'Design a hardware-aware NAS + compression pipeline that co-optimizes architecture and compression for each target.'
  common_mistake: |
    **The Pitfall:** Training one large model and simply compressing it differently for each target.
    **The Rationale:** Candidates assume quantization and pruning are sufficient to span from a Cortex-M7 down to a Cortex-M4.
    **The Consequence:** Pruning a large model for a tiny device loses far more accuracy than training a properly-sized network architecture from scratch using Neural Architecture Search (NAS).
  napkin_math: |
    **Assumptions & Constraints:**
    - Supernet Training: 100 GPU-hours * $3/hr = $300 (one-time).
    - Per-target Search: 3.8 GPU-hours * $3 = $11.40 per target.
    - Manual Engineering: 2 weeks * $5,000/week * 5 targets = $50,000.

    **Calculations:**
    - Total Pipeline Cost (5 targets): $300 + (5 * $11.40) = $357.

    **Conclusion & Interpretation:**
    - **Result: $357 (Cost-Bound)**. AutoML provides a >140x ROI while delivering models within 1% of human-designed accuracy in 1 day instead of 10 weeks.
