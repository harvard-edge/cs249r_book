title: TinyML Federated Eligibility Spec
scenario: 'A TinyML fleet wants to participate in federated updates without draining batteries or blocking real-time sensing.'
question: 'What eligibility rules should decide whether a TinyML device joins a federated update round?'
details:
  realistic_solution: 'The spec should require battery level, radio link budget, sensor idle window, flash write headroom, temperature, model version, update size, and safety-critical task status. TinyML parallelism is fleet parallelism: many devices participate only when local constraints allow it.'
  common_mistake: |
    **The Pitfall:** Selecting every online device for the training round.
    **The Rationale:** Engineers ignore local constraints like battery level, model version, and sensor schedules.
    **The Consequence:** This causes severe battery drain and missed real-time sensing deadlines across the fleet.
  napkin_math: |
    **Assumptions & Constraints:**
    - Device uses a 220 mAh coin cell battery.
    - One federated learning update costs 1 mAh.

    **Calculations:**
    - Calculate monthly update cost: 1 mAh * 30 days = 30 mAh.
    - Calculate percentage of total capacity: (30 mAh / 220 mAh) * 100.

    **Conclusion & Interpretation:**
    - **Result: 13.6% (Power-Bound)**. Joining updates daily consumes roughly 14% of the total battery capacity per month, severely impacting the device's lifespan.
