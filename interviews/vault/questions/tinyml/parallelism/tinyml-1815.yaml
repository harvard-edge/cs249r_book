title: ESP-NOW Asynchronous Microbatching Communication Strategy
scenario: Three ESP32-S3 chips are daisy-chained via a 1 Mbps ESP-NOW link. Chip A computes early layers in 500ms and must transfer a 300KB activation tensor to Chip B. Sending 300KB at 1 Mbps takes ~2.4 seconds, heavily dominating the compute time.
question: What is the optimal microbatching strategy that minimizes the pipeline bubble caused by the RF network congestion, given Chip A's compute latency?
details:
  realistic_solution: Because the communication (2.4s) is roughly 5 times slower than the compute (0.5s), you must slice the 300KB tensor into smaller microbatches to overlap computation with transmission. An optimal strategy divides the tensor into 5 microbatches of 60KB each. Chip A computes the first 60KB in 100ms, then transmits it over ESP-NOW (taking ~480ms), perfectly overlapping Chip A's compute of the second microbatch and preventing Chip B from starving for 2.4 seconds.
  common_mistake: |
    **The Pitfall:** Treating the 1 Mbps ESP-NOW link as a dedicated full-duplex wire instead of a shared half-duplex RF medium.
    **The Rationale:** Candidates often assume perfect point-to-point connections like PCIe, ignoring RF collision domains.
    **The Consequence:** This causes massive collisions if Chip A and Chip B try to pipeline overlapping transmissions, destroying throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute latency is 0.5s, tensor size is 300KB, link is 1 Mbps ESP-NOW (half-duplex).

    **Calculations:**
    - 300KB at 1 Mbps = ~2.4s. Compute/Comm ratio = 0.5 / 2.4 = 1/4.8. Optimal chunks = ceil(4.8) = 5. Chunk size = 300KB / 5 = 60KB. Compute per chunk = 100ms. Comm per chunk = ~480ms.

    **Conclusion & Interpretation:**
    - **Result: 60KB chunks (Network-Bound Pipeline)**.
