title: 'AHB Bus Interrupt Barrier'
scenario: 'A smart sensor splits a CNN between a CPU taking 4ms to preprocess and an AI accelerator taking 2ms to infer, communicating over an AHB bus.'
question: 'Calculate the pipeline throughput assuming an AHB bus interrupt barrier requires 50us to clear.'
details:
  realistic_solution: 'The CPU preprocessing is the bottleneck. The step time is 4ms compute plus the 50us AHB interrupt synchronization barrier, totaling 4.05ms. The blazing fast 2ms AI accelerator sits idle half the time.'
  common_mistake: |
    **The Pitfall:** Using only the AI accelerator's blazing fast 2ms inference time to calculate system throughput.
    **The Rationale:** Developers assume the accelerator dictates system speed, entirely ignoring the CPU preprocessing bottleneck and bus synchronization overhead.
    **The Consequence:** Claimed throughput is 500 FPS, but actual system throughput maxes out at less than half that, missing production requirements.
  napkin_math: |
    **Assumptions & Constraints:**
    - CPU preprocessing: 4 ms.
    - AI accelerator inference: 2 ms.
    - AHB bus interrupt barrier: 50 µs (0.05 ms).

    **Calculations:**
    - Pipeline bottleneck step time: max(4 ms, 2 ms) = 4 ms.
    - Total step time with barrier: 4 ms + 0.05 ms = 4.05 ms.
    - System Throughput: 1 / 0.00405 s = 246.9 FPS.

    **Conclusion & Interpretation:**
    - **Result: 246.9 FPS (Compute-Bound)**. The system throughput is dictated entirely by the slower CPU preprocessing stage and bus synchronization overhead, leaving the AI accelerator idle 50% of the time.
