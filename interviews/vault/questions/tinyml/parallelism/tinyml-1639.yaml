title: LoRa Drone Swarm Consensus
scenario: 5 worker drones and 1 leader drone (all Cortex-M4 + LoRa) must reach consensus on target location via an AllReduce of 1KB maps over a 50 kbps shared RF medium.
question: Create a schedule that avoids packet collisions and compute the minimum consensus time?
visual:
  kind: svg
  path: tinyml-1639.svg
  alt: A star topology with Drone 0 as the central leader
  caption: TDMA Star Consensus Topology
details:
  realistic_solution: Use TDMA gather to the leader, then broadcast. The leader already has its own local 1KB map, so the 5 worker drones send 1KB each to the leader = 5KB (40Kb). After reducing all 6 maps, the leader broadcasts the 1KB consensus result once over the shared medium = 8Kb. Total RF payload = 48Kb. Latency = 48Kb / 50kbps = 0.96 seconds.
  common_mistake: |
    **The Pitfall:** Designing a ring topology for communication.
    **The Rationale:** Candidates may default to datacenter AllReduce patterns, forgetting that a shared CSMA/CA wireless medium suffers heavily from half-duplex interference.
    **The Consequence:** The proposed schedule will result in massive packet collisions and catastrophic failure to reach consensus within any reasonable timeframe.
  napkin_math: |
    **Assumptions & Constraints:**
    - Nodes: 5 drones sending to 1 leader (star topology).
    - Payload size: 1KB per drone.
    - Shared RF medium: 50 kbps LoRa link.

    **Calculations:**
    - Data collection phase: 5 drones * 1KB = 5KB (40 Kb).
    - Broadcast phase: Leader broadcasts 1KB (8 Kb).
    - Total data exchanged: 40 Kb + 8 Kb = 48 Kb.
    - Transmission Latency: 48 Kb / 50 kbps = 0.96 seconds.

    **Conclusion & Interpretation:**
    - **Result: 0.96 seconds (Network Bandwidth-Bound)**. Using a TDMA star topology avoids the catastrophic CSMA/CA collisions that a ring topology would suffer.
