title: LoRa Drone Swarm Consensus
scenario: 5 worker drones and 1 leader drone (all Cortex-M4 + LoRa) must reach consensus on target location via an AllReduce of 1KB maps over a 50 kbps shared RF medium.
question: Create a schedule that avoids packet collisions and compute the minimum consensus time?
visual:
  kind: svg
  path: tinyml-1639.svg
  alt: A star topology with Drone 0 as the central leader
  caption: TDMA Star Consensus Topology
details:
  realistic_solution: Use a TDMA star schedule with one transmitter active at a time on the shared LoRa channel. Slots 1-5 are worker-to-leader transmissions where W1, W2, W3, W4, and W5 each send a 1KB map. The leader includes its own local 1KB map without transmitting it, reduces all 6 maps into one 1KB consensus result, then uses slot 6 to broadcast that result once to all workers. Payload on air is 5KB gather + 1KB broadcast = 6KB = 48Kb. At 50 kbps, the minimum payload time is 48Kb / 50kbps = 0.96 seconds, plus any packet headers or guard intervals.
  common_mistake: |
    **The Pitfall:** Designing a ring topology for communication.
    **The Rationale:** Candidates may default to datacenter AllReduce patterns, forgetting that a shared CSMA/CA wireless medium suffers heavily from half-duplex interference.
    **The Consequence:** The proposed schedule will result in massive packet collisions and catastrophic failure to reach consensus within any reasonable timeframe.
  napkin_math: |
    **Assumptions & Constraints:**
    - Nodes: 5 worker drones plus 1 leader in a star topology.
    - AllReduce semantics: each node contributes a 1KB map; the reduced consensus output is 1KB.
    - Shared RF medium: 50 kbps LoRa link.

    **Calculations:**
    - Collision-free TDMA slots: W1->L, W2->L, W3->L, W4->L, W5->L, then L->all.
    - Leader contribution: already local, so it adds no RF payload during gather.
    - Data collection phase: 5 workers * 1KB = 5KB = 40Kb.
    - Broadcast phase: 1 reduced consensus map = 1KB = 8Kb.
    - Total RF payload: 40Kb + 8Kb = 48Kb.
    - Transmission latency: 48Kb / 50kbps = 0.96 seconds.

    **Conclusion & Interpretation:**
    - **Result: 0.96 seconds (Network Bandwidth-Bound)**. The explicit six-slot TDMA schedule avoids packet collisions by ensuring only one LoRa transmitter is active in each slot.
