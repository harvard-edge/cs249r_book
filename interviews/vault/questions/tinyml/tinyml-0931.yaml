title: Evaluate Transformer vs CNN for Wake-Word Detection on MCU
scenario: A product team must choose between a 500K-parameter transformer (MHAttention, 2 layers) and a 300K-parameter DS-CNN for wake-word detection on Cortex-M4 at 168 MHz. The transformer achieves 97.2% accuracy vs DS-CNN's 95.8% on the Google Speech Commands dataset. Transformer inference: 145ms, 1.8mW average power. DS-CNN: 28ms, 0.4mW. The device must wake the host MCU within 200ms of audio event and battery is 200mAh at 3.3V.
question: Is a 500K-parameter transformer worth 1.4% KWS accuracy over a DS-CNN given 15 versus 69 days of battery life?
details:
  realistic_solution: 'Battery life: always-on inference every 200ms. Transformer: 1.8mW continuous -> 200mAh*3.3V / 1.8mW = 660Wh/1.8mW ... 200mAh*3.3V=0.66Wh; 0.66Wh/1.8mW=367h=15.3 days. DS-CNN: 0.66Wh/0.4mW=1650h=68.8 days. Trade-off: 1.4% accuracy gain costs 53.5 days battery life. For wake-word (false negative = missed wake), transformer is better only if false-negative cost exceeds user re-charge friction.'
  common_mistake: |
    **The Pitfall:** Choosing the transformer based on accuracy alone without quantifying battery life impact.
    **The Rationale:** Candidates often prioritize state-of-the-art architectures and minor accuracy gains without considering edge deployment constraints.
    **The Consequence:** Deploying a model that drains the battery 4.5x faster (reducing life from 69 to 15 days), rendering the always-on product unusable.
  napkin_math: |
    - **Battery Capacity:** 200 mAh * 3.3V = 0.66 Wh.
    - **Transformer Life:** 0.66 Wh / 0.0018 W = 366.7 hours ≈ 15.3 days.
    - **DS-CNN Life:** 0.66 Wh / 0.0004 W = 1650 hours = 68.75 days.
    - **Power Ratio:** 1.8 mW / 0.4 mW = 4.5x higher power for the transformer.
    - **Conclusion:** **The 1.4% accuracy gain reduces battery life from ~69 days to ~15 days.**
