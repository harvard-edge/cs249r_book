title: The TinyML Transformer Trap
scenario: A Cortex-M4 smart home device runs a CNN baseline (150KB peak memory). A junior engineer ports a 'Tiny-ViT' model with 5x fewer parameters, but it immediately crashes with an out-of-memory error.
question: Why does a 5x smaller Tiny-ViT OOM on a 256 KB Cortex-M4 when the 150 KB CNN fits perfectly?
details:
  realistic_solution: The Transformer's self-attention mechanism creates an intermediate attention matrix of size (sequence_length x sequence_length). For a typical audio spectrogram, this sequence length causes the matrix to exceed available SRAM. Evolving the CNN baseline with depthwise separable convolutions is the linear-scaling, memory-efficient path forward.
  common_mistake: |
    **The Pitfall:** Focusing only on parameter count as a proxy for memory footprint.
    **The Rationale:** Engineers from cloud backgrounds assume fewer parameters mean less memory, ignoring the O(N^2) peak activation memory of Transformers.
    **The Consequence:** They deploy models that OOM on hardware that easily runs linearly-scaling CNNs.
  napkin_math: |
    - CNN peak arena: 150 KB.
    - Tiny-ViT attention matrix: sequence_length x sequence_length.
    - For 800 audio tokens: 800 * 800 * 1 byte = 640 KB.
    - **640 KB vastly exceeds the 256 KB SRAM, causing the OOM despite having fewer static parameters.**
  options:
  - The Cortex-M4 is too weak. Propose upgrading the hardware to a mobile-class chip that has enough RAM to support a Transformer architecture.
  - The model conversion process is buggy. With 5x fewer parameters, the Transformer should be much smaller. Focus on debugging the TFLite conversion script.
  - The model needs more aggressive quantization. Apply post-training INT4 or INT2 quantization to the Transformer to reduce its memory footprint until it fits.
  - The Transformer's O(N^2) self-attention matrix is too large for the SRAM. Replace the CNN's standard convolutions with depthwise separable convolutions to improve efficiency and accuracy within the memory budget.
  correct_index: 3
