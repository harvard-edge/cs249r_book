title: The Operator Fusion on MCU
scenario: Your MobileNet-based gesture model on a Cortex-M7 (480 MHz, 512 KB SRAM) has a recurring pattern: Conv2D (32 output channels, 3x3, 16x16 input) -> Batch Normalization -> ReLU. The unfused execution materializes three intermediate tensors. Your runtime engineer proposes fusing all three into a single kernel.
question: How much SRAM and latency can fusing Conv2D, BatchNorm, and ReLU save on a Cortex-M7 MobileNet block?
details:
  realistic_solution: 'Trace the memory through the unfused pipeline: Unfused peak: 40 KB (Conv2D INT32 output + BN output live simultaneously). Fused peak: 16 KB (input + output only). Savings: 24 KB per block. For the largest layer (32x32 input, 64 channels): unfused peak = 32x32x64x4 + 32x32x64 = 256 KB + 64 KB = 320 KB, which exceeds the 512 KB SRAM when combined with other tensors. Fused peak: 32x32x64 + 32x32x64 = 128 KB. Fusion makes the model fit in SRAM. Latency also improves because eliminating intermediate memory transfers saves bandwidth.'
  common_mistake: |
    **The Pitfall:** Believing operator fusion primarily optimizes compute latency by saving function call overhead.
    **The Rationale:** In standard cloud deployments, fusion reduces kernel launch overhead. On microcontrollers, the primary benefit is entirely different.
    **The Consequence:** Engineers underestimate the value of fusion and fail to prioritize it when trying to fit a model into a constrained SRAM budget.
  napkin_math: |
    - **Unfused Peak**: 32 KB (INT32 Conv2D output) + 8 KB (INT8 BN output) = 40 KB live simultaneously.
    - **Fused Peak**: 16 KB (input + output only, fused internally).
    - **Savings**: 40 KB - 16 KB = **24 KB per block**.
    - **Largest Layer Impact (32x32, 64ch)**: 
      - Unfused: 256 KB (INT32) + 64 KB (INT8) = 320 KB.
      - Fused: 128 KB.
      - **Conclusion**: 320 KB exceeds the remaining SRAM margin, making fusion **mandatory** for the model to fit.
