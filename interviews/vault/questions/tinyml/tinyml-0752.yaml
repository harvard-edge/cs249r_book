title: The Operator Fusion on MCU
scenario: 'Your MobileNet-based gesture model on a Cortex-M7 (480 MHz, 512 KB SRAM) has a recurring pattern:
  Conv2D (32 output channels, 3×3, 16×16 input) → Batch Normalization → ReLU. The unfused execution materializes
  three intermediate tensors. Your runtime engineer proposes fusing all three into a single kernel. Quantify
  the SRAM savings and the latency improvement.'
question: "How much SRAM and latency can fusing Conv2D, BatchNorm, and ReLU save on a Cortex-M7 MobileNet block?"
details:
  realistic_solution: 'Trace the memory through the unfused pipeline: Unfused peak: 40 KB (Conv2D INT32
    output + BN output live simultaneously). Fused peak: 16 KB (input + output only). Savings: 24 KB per
    block. For the largest layer (32×32 input, 64 channels): unfused '
  common_mistake: '"Fusion just saves a few function call overheads — maybe 5% faster." The real win is
    memory, not compute. On an MCU where SRAM is the binding constraint, fusion can be the difference
    between fitting and not fitting.'
  napkin_math: 'Unfused peak: 40 KB (Conv2D INT32 output + BN output live simultaneously). Fused peak:
    16 KB (input + output only). Savings: 24 KB per block. For the largest layer (32×32 input, 64 channels):
    unfused peak = 32×32×64×4 + 32×32×64 = 256 KB + 64 KB = 320 KB — exceeds 512 KB SRAM with other tensors.
    Fused: 32×32×64 + 32×32×64 = 128 KB. Fusion makes the model fit; without it, the model is infeasible.'
  options:
  - Fusion saves a few function call overheads — approximately 5% faster from eliminating the BN and ReLU
    function dispatch.
  - 'Unfused: Conv2D outputs INT32 (16x16x32x4 = 32 KB), BN reads INT32 + writes INT8 (16 KB), ReLU reads
    + writes INT8 (16 KB). Peak: ~40 KB live simultaneously. Fused: Conv2D accumulates in INT32, applies
    BN scale/shift and ReLU clamp in-place, outputs INT8 directly. Peak: 16 KB (input + output only).
    Savings: 24 KB per block. For the largest layer (32x32, 64ch): unfused peaks at 320 KB; fused at 128
    KB. Fusion makes the model fit in 512 KB SRAM — without it, the model is infeasible.'
  - Fusion only helps with latency by reducing memory transfer overhead. SRAM usage is identical because
    the intermediate tensors are allocated from the same arena regardless of fusion.
  - Fusing Conv2D + BN + ReLU saves exactly 33% SRAM (eliminating one of three intermediate buffers) but
    has no effect on latency since the same number of MACs are computed.
  correct_index: 1
