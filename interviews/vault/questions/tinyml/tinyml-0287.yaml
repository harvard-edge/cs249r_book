title: 'The MCU Ridge Point: MCU Compute Constraints'
scenario: A Cortex-M4 microcontroller, a common choice for TinyML, has a peak performance of approximately
  336 MFLOPS and its on-chip SRAM provides about 1.2 GB/s of memory bandwidth. Calculate the 'Ridge Point'
  for this device and interpret its meaning. What does this value tell you about the relationship between
  compute and memory on this chip?
question: "What does this value tell you about the relationship between compute and memory on this chip?"
details:
  realistic_solution: The Ridge Point is where the system transitions from memory-bound to compute-bound.
    It's the minimum Arithmetic Intensity (AI) required to saturate the compute units. For the Cortex-M4,
    the extremely low ridge point of ~0.28 Ops/Byte means that it is very easy to make workloads compute-bound.
    Almost any neural network operation, which typically has an AI > 1.0, will be limited by the processor's
    speed, not by how fast it can be fed data from SRAM. This is characteristic of many microcontrollers
    where on-chip memory is relatively fast compared to the limited compute.
  common_mistake: A common mistake is to invert the ratio, calculating Bytes/Op instead of Ops/Byte. Another
    is unit confusion, failing to align the magnitudes (e.g., using MFLOPS with MB/s instead of GB/s),
    leading to an answer that's off by orders of magnitude. This stems from memorizing the formula without
    understanding that the Ridge Point represents the 'price' of a FLOP in terms of memory bytes.
  napkin_math: The Cortex-M4 (e.g. STM32F4) running at 168MHz can achieve roughly 336 MFLOPS. The internal SRAM
    provides ~1.2 GB/s bandwidth. The Ridge Point = Peak Compute / Memory Bandwidth = (336 * 10^6 FLOPs/s)
    / (1.2 * 10^9 Bytes/s) = 0.28 FLOPs/Byte. If an INT8 conv layer requires 2 FLOPs per byte loaded, Arithmetic
    Intensity is 2.0. Since 2.0 > 0.28, the M4 is firmly compute-bound.
  options:
  - ~3.57 Bytes/Op. It means most workloads will be memory-bound.
  - ~280 Ops/Byte. It means the chip requires extremely high arithmetic intensity to be compute-bound.
  - ~0.28 Ops/Byte. It means most ML workloads will be compute-bound.
  - ~1.4 Ops/Byte. This would be typical for a more powerful edge device, not an MCU.
  correct_index: 2
