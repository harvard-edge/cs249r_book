title: Diagnose Attention Head Collapse in Quantized MCU Transformer
scenario: After INT4 quantization of a 4-head attention transformer deployed on Cortex-M4,
  word error rate jumps from 8% to 31% on a wake-word detection task. Attention visualization
  shows 3 of 4 heads produce nearly uniform distributions (entropy > 0.95 of maximum)
  while 1 head handles all meaningful patterns. The model was quantized using post-training
  quantization (PTQ) with 100 calibration samples. Diagnose why INT4 caused head collapse
  and propose a targeted fix.
question: How would you diagnose why INT4 caused head collapse and propose a targeted
  fix?
details:
  realistic_solution: 'INT4 provides only 16 discrete levels. Attention logits before
    softmax typically span [-3, 3] std devs. With 100 calibration samples, scale =
    max(|logits|)/7 ≈ 3.0/7 = 0.43. Values < 0.43 quantize to 0 (dead zone). Heads
    2-4 with lower-magnitude weights get zeroed out. Fix: (1) increase calibration
    to 1000+ samples, (2) use per-head quantization scales instead of per-tensor,
    (3) apply attention logit clipping at 2.5σ before quantization.'
  common_mistake: Blaming INT4 precision uniformly across all heads; the real issue
    is PTQ calibration with too few samples causing outlier-driven scale factors that
    crush small attention weights.
  napkin_math: 'INT4 range: -8 to +7, scale=max/7. If calibration max=3.0, scale=0.43.
    Weights < 0.43 → quantized to 0. Head entropy test: uniform dist entropy = log(seq_len)
    = log(64) = 4.16 bits; observed 0.95×4.16 = 3.95 bits → near-uniform = collapsed.'
