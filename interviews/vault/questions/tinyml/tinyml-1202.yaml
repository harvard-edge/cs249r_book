title: Dual-Core Real-Time Inference Architecture
scenario: You are designing a predictive maintenance sensor. The system must process vibration data at 1 kHz, requiring a CNN-based anomaly detector to execute within a strict 1ms real-time deadline while simultaneously streaming alerts over BLE 5.3. You need to synthesize an interrupt-driven pipeline across dual cores.
question: How should nRF5340 guarantee a 1 ms vibration inference deadline while streaming BLE alerts without causing connection drops?
details:
  realistic_solution: Architect a hard-partitioned system utilizing the nRF5340's asymmetric dual cores. Dedicate the 64 MHz network core entirely to the BLE 5.3 stack to guarantee rigid radio timing. Run the DSP and ML CNN on the 128 MHz application core, triggered via DMA interrupts. Use a lock-free ring buffer in the 256 KB shared SRAM for IPC to pass anomaly flags asynchronously, decoupling ML execution from radio preemptions.
  common_mistake: |
    **The Pitfall:** Running ML inference and BLE stack on the same core.
    **The Rationale:** Candidates attempt to utilize the faster 128 MHz core for everything, oblivious to high-priority BLE radio interrupts preempting the ML pipeline.
    **The Consequence:** Extending the inference WCET past the 1ms budget, causing dropped frames and BLE connection timeouts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Budget: 1 ms (128,000 cycles at 128 MHz).
    - CNN MACs: 40,000. Cycles per MAC: 1.5.
    
    **Calculations:**
    - CNN Execution: 40,000 * 1.5 = 60,000 cycles (0.47 ms).
    - Overhead (DMA + DSP): 20,000 cycles (0.15 ms).
    - Total WCET: 80,000 cycles = 0.62 ms.
    
    **Conclusion & Interpretation:**
    - **Result: Latency-Bound Real-Time (Compute-Bound)**. Decoupling the BLE stack guarantees the ML pipeline meets the 1 ms deadline with 0.38 ms of margin.
