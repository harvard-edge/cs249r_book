title: The Depthwise Convolution Advantage
scenario: You're tasked with optimizing a CNN for a resource-constrained microcontroller. For a typical
  layer with a 3x3 kernel and a large number of channels, identify the approximate computational cost
  reduction you gain by replacing the standard convolution with a 3x3 depthwise separable convolution.
question: "What approximate compute reduction does a 3x3 depthwise separable convolution provide over a standard convolution?"
details:
  realistic_solution: The computational savings are approximately a factor of the kernel's area (K*K).
    For a 3x3 kernel, the reduction is about 8-9x compared to a standard convolution, especially when
    the number of channels is large. This is because the standard convolution's cost scales with `K*K*C_in*C_out`,
    while the separable version scales with `K*K*C_in + C_in*C_out`, making the kernel size squared the
    dominant factor in the reduction ratio for large C.
  common_mistake: Candidates often recall that it's 'more efficient' but fail to remember the magnitude
    of the savings. A common error is to assume the savings are linear with the kernel size (e.g., 3x
    for a 3x3 kernel), rather than quadratic (close to 9x).
  napkin_math: 1. **Standard Convolution Cost:** `Cost_std = K_h × K_w × C_in × C_out`
  options:
  - About a 3x reduction
  - The savings are negligible on microcontrollers
  - About a 9x reduction
  - It's a 2x reduction, same as using FP16 instead of FP32
  correct_index: 2
