title: The Arena Swiss Cheese
scenario: Your TFLite Micro model requires 85 KB of SRAM. Your device has 100 KB free. However, the allocator throws an 'Allocation Failed' error during initialization.
question: Based on the arena map, why can't the system satisfy a 30 KB request?
details:
  realistic_solution: You have **Internal Memory Fragmentation**. Even though you have 30 KB of total free space, it is split into two non-contiguous 15 KB "holes." The allocator cannot satisfy a 30 KB request because tensors must be contiguous in memory. The fix is to use a **Linear Memory Planner** that sorts tensors by lifetime to minimize holes, or manually reorder operators in the graph to reduce the "peak" lifetime overlap.
  common_mistake: |
    **The Pitfall:** Blaming an "allocation failed" error on a runtime memory leak in TFLite Micro.
    **The Rationale:** Candidates fail to understand that TFLite Micro uses a static memory arena planned ahead-of-time.
    **The Consequence:** Searching for dynamic memory leaks instead of diagnosing internal memory fragmentation in the tensor arena.
  napkin_math: |
    - **Total Free Space:** 30 KB.
    - **Fragmentation:** Split into two non-contiguous 15 KB gaps.
    - **Max Contiguous Block:** 15 KB.
    - **Requested Size:** 30 KB.
    - **Result:** Request fails because tensors require **contiguous** memory.
