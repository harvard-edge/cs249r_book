title: Asymmetric Quantization Equation for nRF5340
scenario: You are deploying a 200,000 parameter keyword spotting model to a Nordic nRF5340. To ensure the model weights and BLE 5.3 networking stack both fit within the available memory, you must apply INT8 Post-Training Quantization (PTQ).
question: When converting weights from FP32 to INT8, what is the standard mathematical equation for asymmetric quantization that maps a real-world floating-point value to a quantized integer value?
details:
  realistic_solution: 'The candidate should immediately recall the standard affine quantization mapping: r = S * (q - Z) or its inverse q = round(r / S) + Z. They must correctly identify ''r'' as the real FP32 value, ''S'' as the FP32 scale factor, ''q'' as the quantized INT8 value, and ''Z'' as the integer zero-point. Recalling this exact relationship is fundamental, as the zero-point ensures the real value 0.0 is exactly representable, which is crucial for efficient zero-padding in CNNs on resource-constrained MCUs.'
  common_mistake: |
    **The Pitfall:** Forgetting the zero-point term and confusing asymmetric with symmetric quantization.
    **The Rationale:** Candidates simplify the equation to just scaling, failing to account for cases where the min/max values are not centered on zero.
    **The Consequence:** The model completely loses its ability to perfectly represent the value 0.0, causing catastrophic accuracy loss in padded convolutions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model parameters: 200,000.
       - Flash memory: 1 MB (1024 KB).
       - FP32: 4 bytes/parameter.
       - INT8: 1 byte/parameter.
    2. **Calculations:**
       - FP32 size: 200,000 * 4 = 800 KB (78.1% of Flash).
       - INT8 size: 200,000 * 1 = 200 KB (19.5% of Flash).
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** The INT8 model shrinks the footprint from 800 KB to 200 KB, safely leaving room for the RTOS and network stack.
