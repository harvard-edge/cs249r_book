title: The Wake-Word Deadline
scenario: You are designing a 'Hey, Sparky!' wake-word detection system on a Cortex-M4 microcontroller. The system has a hard real-time deadline of 500ms from the end of the user's utterance to trigger a downstream action. The model takes 150ms to run one inference.
question: Which metric must you optimize to guarantee the wake-word system meets its hard real-time response deadline?
details:
  realistic_solution: The most critical metric is the end-to-end, single-inference latency. This is the total time from when the audio frame is ready to when the model produces a decision. To meet a hard real-time deadline, every component in this chain (data preprocessing, inference, post-processing) must be minimized. Unlike batch systems, we don't care about the average performance over time, only the worst-case latency for a single event.
  common_mistake: |
    **The Pitfall:** Optimizing for throughput or batch processing efficiency.
    **The Rationale:** Engineers from cloud backgrounds instinctively focus on maximizing inferences per second, which introduces latency buffers.
    **The Consequence:** Failing to respond within the hard 500ms deadline, leading to a sluggish and unusable wake-word experience.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Latency Budget: 500 ms.
       - Model Execution: 150 ms.
    2. **Calculations:**
       - Remaining Overhead Budget: 500 ms - 150 ms = 350 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound System**. The system must process buffers, inference, and interrupts within the 350 ms remaining budget to guarantee hard real-time execution.
  options:
  - Throughput in inferences/second
  - Batch processing efficiency
  - Single-inference end-to-end latency
  - Average power consumption over one minute
