title: 'Optimizing Real-time ML Inference on ESP32-S3: Diagnosing Latency Bottlenecks'
scenario: You are deploying a tinyML model for real-time anomaly detection on a microcontroller. The model is a small CNN, and initial testing reveals that inference latency occasionally exceeds your target of 50ms, causing missed detections.
question: How should you diagnose whether ESP32-S3 TinyML latency spikes come from compute, memory, or I/O bottlenecks?
details:
  realistic_solution: |
    To diagnose ESP32-S3 latency spikes, instrument the actual firmware path with ESP-IDF-appropriate timing and tracing. Use `esp_timer_get_time()` or CPU cycle counters around sensor input, preprocessing, each inference layer or operator, postprocessing, logging, and communication. Use ESP-IDF monitor logs, `perfmon` where available, FreeRTOS run-time stats, heap tracing, and JTAG/OpenOCD or SystemView traces for deeper timing.
    1. **Compute Bottleneck:** Compare per-layer cycle counts against the 50 ms budget and check whether fixed-point kernels are running from optimized internal SRAM/IRAM paths.
    2. **Memory Bottleneck:** Track heap and PSRAM use, cache behavior, tensor copies, and whether weights or activations spill from internal SRAM to PSRAM. Treat PSRAM as a memory-latency/bandwidth issue, not as sensor I/O.
    3. **I/O Bottleneck:** Separately time sensor reads, blocking SPI/I2C calls, logging, BLE/Wi-Fi, and task scheduling delays so they are not confused with model execution.
  common_mistake: |
    **The Pitfall:** Immediately optimizing the model architecture or quantization without profiling.
    **The Rationale:** Developers assume ML latency is always compute-bound, ignoring the massive penalties of embedded OS interrupts, sensor I/O, or PSRAM accesses.
    **The Consequence:** Months are spent pruning a model when the actual fix was optimizing a blocking SPI call or pinning memory to internal SRAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: ESP32-S3 (240 MHz, 512 KB SRAM, 8 MB PSRAM).
    - Constraint: Target latency is 50 ms.

    **Calculations:**
    - Total cycle budget: 0.050 s * 240,000,000 cycles/s = 12,000,000 cycles.
    - A 60 ms spike consumes 0.060 s * 240,000,000 cycles/s = 14,400,000 cycles, or 2,400,000 cycles over budget.
    - If layer timing accounts for only 7M cycles, the remaining ~7.4M cycles in a 60 ms trace must come from memory stalls, tensor copies, I/O, interrupts, or task scheduling and must be measured directly.

    **Conclusion & Interpretation:**
    - **Result: Unknown Bottleneck (Requires ESP32-S3 on-device timing to isolate).** The arithmetic defines the cycle budget; it does not prove whether compute, PSRAM/cache behavior, or I/O caused the spike.
