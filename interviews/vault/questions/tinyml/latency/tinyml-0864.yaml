title: 'Latency Decomposition: Size and Validate TinyML Model for Real-Time ECG'
scenario: 'Size and validate a TinyML model deployment for real-time ECG arrhythmia detection on an MCU with 256KB SRAM. ECG sample rate: 360Hz. The model processes 1-second windows (360 samples) and must infer faster than window arrival (< 1000ms). Model: 1D-CNN with 50K INT8 params, 2.5 MOPs.'
question: Do the ECG model's 50 KB weights, activations, and buffers fit in 256 KB SRAM on a 168 MHz MCU?
details:
  realistic_solution: The model comfortably passes the deployment feasibility checks under explicit memory-residency assumptions. The 50KB INT8 weights usually reside in Flash; if copied into SRAM, they still fit alongside the tensor arena. The 1D-CNN activations peak at the first layer, requiring roughly 11.5KB for INT8 intermediate tensors, plus input and scratch buffers. Combining weights, activations, and input buffering yields a peak under about 75KB, well below 256KB SRAM. For latency, 2.5 MOPs on a 168MHz MCU is about 14.9ms only under an optimistic 1 op/cycle assumption; even with several cycles per op and kernel overhead, it remains far below the 1000ms window deadline.
  common_mistake: |
    **The Pitfall:** Checking only the static model weight size without accounting for peak activation memory.
    **The Rationale:** Engineers look at the .tflite file size on disk and ignore the dynamic tensor arena required during inference execution.
    **The Consequence:** CNN models with large initial activation layers unexpectedly crash with OOM errors in production despite seemingly fitting in Flash.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM: 256KB. Clock: 168MHz. Budget: 1000ms.
    - Model: 50K INT8 params, 2.5 MOPs.
    - Weights can remain in Flash on many MCU deployments; count them against SRAM only if copied into the tensor arena.
    - Latency estimate assumes an optimistic 1 op/cycle for a lower-bound check.

    **Calculations:**
    - Weights: 50K * 1 byte = 50 KB in Flash, or 50 KB SRAM in the conservative copied-weights case.
    - Input Buffer: 360 samples * 2 bytes = 720 bytes.
    - Peak Activations (INT8): 360 * 32 channels = 11.5 KB.
    - Conservative SRAM check if weights are copied: 50 KB + 11.5 KB + ~1 KB input/scratch = ~62.5 KB.
    - If weights execute from Flash, SRAM arena is closer to activations + input/scratch, roughly 13 KB plus runtime overhead.
    - Ideal latency lower bound: 2.5M ops / 168M ops/s = 14.9 ms at 1 op/cycle.
    - At 3-5 cycles/op, latency is roughly 45-75 ms before additional small overheads, still below 1000 ms.

    **Conclusion & Interpretation:**
    - **Result: memory fits comfortably and latency has large real-time headroom**. The precise latency depends on the kernel throughput, but the feasibility conclusion does not require pretending every operation completes in one cycle.
