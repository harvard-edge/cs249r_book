title: The Real-Time Deadline
scenario: You're designing a keyword-spotting system on a microcontroller. The system continuously analyzes 1-second audio clips to detect a wake word. Your ML model requires 100 Million FLOPs to process one clip. The MCU provides ~336 MFLOPS of compute. Assume a 5ms overhead for audio buffering and other post-processing.
question: Can the system meet its hard real-time deadline of finishing one clip before the next 1-second clip arrives?
details:
  realistic_solution: 'Yes, the system can meet its deadline. The total processing time is approximately 303 ms, which is well under the 1000 ms (1 second) budget. The inference time is the bulk of the work, but the 5ms overhead is crucial to include for an accurate system estimate.'
  common_mistake: |
    **The Pitfall:** Excluding system overhead from real-time analysis.
    **The Rationale:** Engineers often calculate only the raw tensor inference time and forget to include hardware overheads like data buffering, feature extraction, or context switching.
    **The Consequence:** Every millisecond matters. Failing to account for the full pipeline latency leads to missed deadlines, dropped audio frames, and system instability.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model cost: 100 MFLOPs.
    - Compute capacity: 336 MFLOPS.
    - System overhead: 5 ms.
    - Hard deadline: 1000 ms.

    **Calculations:**
    - Inference time: 100 MFLOPs / 336 MFLOPS = 0.2976 seconds (297.6 ms).
    - Total pipeline time: 297.6 ms + 5 ms = 302.6 ms.
    - Idle time: 1000 ms - 302.6 ms = 697.4 ms.

    **Conclusion & Interpretation:**
    - **Result: ~303 ms (Compute-Bound)**. The total time is ~303 ms, safely meeting the 1000 ms deadline and allowing nearly 70% utilization for deep sleep.
  options:
  - '~298 ms'
  - '~303 ms'
  - '~3.36 s'
  - '~8 ms'
