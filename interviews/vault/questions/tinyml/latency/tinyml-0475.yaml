title: The Overwhelmed Sensor Fusion MCU
scenario: 'You are a TinyML engineer diagnosing a fault in a new industrial sensor.
  The device uses a Cortex-M7 MCU to fuse data from an accelerometer (sampled at 100Hz)
  and a microphone (sampled at 16kHz) to predict machine failures. The system has
  a hard real-time deadline: it must issue a shutdown command within 2ms of detecting
  a failure signature. During testing, you observe that after a few seconds of running,
  the device''s latency for detecting a known test signature spikes from ~1ms to over
  50ms, missing the deadline. You profile the MCU and find that the accelerometer
  model takes 8ms to run per inference, and the microphone''s audio preprocessing
  pipeline takes 3ms for every 10ms worth of audio data.'
question: Why does 11 ms of CPU work per 10 ms sensor window make the Cortex-M7 miss
  a 2 ms shutdown deadline?
details:
  realistic_solution: The system is computationally overloaded, leading to an unstable
    processing queue. The total workload exceeds the time available between sensor
    events, causing the input data buffer to grow continuously until data is dropped
    or delayed significantly. The accelerometer data arrives every 10ms (100Hz). The
    processing time for this data is 8ms. The audio preprocessing adds another 3ms
    of CPU work within that same 10ms window. The total required compute time is 8ms
    + 3ms = 11ms. Since the data arrives every 10ms, the CPU is falling behind by
    1ms for every single sample. This creates a growing backlog (queue), and the time
    to process any new sample becomes the time to clear the entire backlog first,
    hence the latency spike.
  common_mistake: '**The Pitfall:** Misdiagnosing compute bottlenecks as memory issues.

    **The Rationale:** Seeing a buffer overflowing and assuming the problem is insufficient
    SRAM, when the root cause is that the CPU can''t drain the buffer fast enough.

    **The Consequence:** Adding unneeded RAM or focusing solely on memory optimization
    instead of addressing the unstable processing queue.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Accelerometer arrives every 10 ms (100 Hz).

    - MCU processing time per window = Accel (8 ms) + Audio (3 ms) = 11 ms.


    **Calculations:**

    - Utilization ratio = 11 ms required / 10 ms available = 1.1 (unstable queue).

    - Backlog grows 1 ms per sample.

    - After 50 samples (0.5 seconds), processing backlog = 50 ms.


    **Conclusion & Interpretation:**

    - **Result: 1.1 Utilization (Compute-Bound)**. The utilization ratio > 1.0 creates
    an unstable, infinitely growing queue, destroying real-time determinism.

    '
  options:
  - The Cortex-M7's instruction cache is thrashing due to context switching between
    the audio and accelerometer tasks.
  - The model is too large, causing an SRAM overflow which leads to system resets
    and missed data.
  - The total required processing time (11ms) exceeds the data arrival interval (10ms),
    creating an unstable queue and growing latency.
  - The SPI bus connecting the sensors to the MCU is saturated and cannot deliver
    the data fast enough.
  correct_index: 2
