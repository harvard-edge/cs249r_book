title: ESP32-S3 Edge Latency Decomposition for Real-time Object Detection
scenario: You're deploying a small object detection model for a battery-powered security camera. The system captures a 240x240 RGB image, preprocesses it, runs inference, applies non-max suppression (NMS), and sends a JSON alert over Wi-Fi. The end-to-end latency is 700ms, but the requirement is under 300ms.
question: How should you decompose the 700 ms latency and identify the components blocking the 300 ms target?
details:
  realistic_solution: "Optimize image preprocessing using C/assembly routines. Quantize the model aggressively and ensure the inference engine is highly optimized. Implement asynchronous Wi-Fi transmission to overlap with other tasks."
  common_mistake: |
    **The Pitfall:** Overlooking the cost of image preprocessing and Wi-Fi overhead on a constrained MCU.
    **The Rationale:** Assuming the inference model is the sole bottleneck and neglecting the time required for resizing, color conversion, NMS on raw CPU, and PSRAM access delays.
    **The Consequence:** Focusing optimization purely on the model while ignoring massive delays in the surrounding data pipeline, failing to hit the real-time target.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Latency: 700 ms.
    - Target: < 300 ms.

    **Calculations:**
    - Wi-Fi Overhead: 100-300 ms.
    - Preprocessing (240x240 RGB): 100-200 ms.
    - Inference (TTFT + TPOT): 100-400 ms.
    - Postprocessing (NMS): 50-150 ms.

    **Conclusion & Interpretation:**
    - **Result: Pipeline-Bound (Preprocessing and Network overhead dominate; model alone is not the sole bottleneck).**
