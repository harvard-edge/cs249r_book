title: Queue Stability on Cortex-M4 Sensor Fusion Pipeline
scenario: 'A Cortex-M4 (168MHz, 256KB SRAM) reads IMU samples at 200Hz and runs a gesture classifier. The classifier takes 3ms per inference.'
question: 'What is the stability condition for an M/M/1 queue and does this system satisfy it?'
details:
  realistic_solution: 'M/M/1 stability requires ρ=λ/μ<1. λ=200 samples/s, μ=333 samples/s (1/3ms). ρ=200/333=0.6. Queue is stable. Mean items in system L=ρ/(1-ρ)=0.6/0.4=1.5. At 256KB SRAM, easily buffer 10-20 samples. System is comfortably stable with 40% headroom.'
  common_mistake: |
    **The Pitfall:** Checking only the average load without verifying the strict inequality.
    **The Rationale:** Candidates may incorrectly assume that as long as the system can process the average rate, it is stable, ignoring queueing theory fundamentals.
    **The Consequence:** Failure to properly guarantee queue stability, potentially leading to unbounded queue growth in real-world scenarios.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival rate (λ) is 200 samples/s.
    - Inference takes 3ms, giving a service rate (μ) of 333 samples/s.
    - SRAM allows buffering 10-20 samples.

    **Calculations:**
    - Utilization (ρ): λ / μ = 200 / 333 = 0.6.
    - Stability check: ρ = 0.6 < 1.
    - Mean queue length (L): 0.6 / (1 - 0.6) = 1.5 samples.

    **Conclusion & Interpretation:**
    - **Result: 1.5 Samples (Compute-Bound)**. The M/M/1 queue is mathematically stable with a 40% compute headroom, safely avoiding memory exhaustion.
