title: ESP32-S3 Wake-Word Profiling Specification
scenario: A new wake-word system deployed on a dual-core microcontroller has a strict 150ms latency budget, but early prototypes occasionally spike to 400ms. The hardware uses 512 KB of internal SRAM for critical data, 8 MB of external PSRAM for model weights, and concurrent WiFi/BLE.
question: How should you profile wake-word latency spikes to distinguish vectorization failures, PSRAM cache thrashing, and I/O preemption?
details:
  realistic_solution: The specification should define a multi-layered hardware-aware profiling approach. First, utilize task trace facilities to monitor task preemption and identify if the WiFi/BLE stack on Core 0 is blocking the audio/inference task on Core 1. Second, configure the internal performance counters to track instruction cache and data cache miss rates when accessing the 8 MB PSRAM. Finally, use instruction cycle counting around the specific MAC loops to verify that the compiler is successfully utilizing the INT8 vector extensions rather than falling back to scalar operations.
  common_mistake: |
    **The Pitfall:** Proposing generic software profilers or simple timestamp logging.
    **The Rationale:** Candidates overlook the specific hardware architecture, such as the massive latency gap between SRAM and PSRAM, or how the closed-source WiFi/BLE stack might preempt the neural network task on the dual-core system.
    **The Consequence:** The profiling strategy fails to identify the true hardware-level bottlenecks, leading to ineffective optimizations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak INT8 throughput: 16 MACs/cycle at 240 MHz = 3.84 GMACs/s.
    - Compute needed: 15M MACs.
    - PSRAM bandwidth: 80 MB/s sequential best case; cache-thrashed/random effective bandwidth can fall to ~10 MB/s.
    - Model weights fetched from PSRAM on the profiled path: 3 MB; activations and critical buffers are assumed to occupy the 512 KB internal SRAM.
    - WiFi/BLE preemption can add a 30-50 ms scheduling stall.

    **Calculations:**
    - Hypothesis A, vectorized compute lower bound: 15M / 3.84 GMACs/s = 3.9 ms.
    - Hypothesis B, scalar fallback compute: 15M / 240 MHz = 62.5 ms.
    - Hypothesis C, ideal sequential PSRAM weight fetch: 3 MB / 80 MB/s = 37.5 ms.
    - Hypothesis D, cache-thrashed/random PSRAM fetch: 3 MB / 10 MB/s = 300 ms.
    - Profiling should measure these as separate contributors using cycle counters, cache-miss counters, and RTOS traces before adding them.
    - One worst-case path that explains a 400 ms outlier is cache-thrashed PSRAM plus scalar fallback plus radio preemption: 300 ms + 62.5 ms + ~40 ms = ~402.5 ms.

    **Conclusion & Interpretation:**
    - **Result: profiling hypotheses for a 300-400 ms spike (Memory/I-O Bound)**. Do not treat the contributors as always additive; first classify whether an outlier is dominated by PSRAM misses, scalar fallback, radio preemption, or a measured combination such as the ~402.5 ms worst-case path.
