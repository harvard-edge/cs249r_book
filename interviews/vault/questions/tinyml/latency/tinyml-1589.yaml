title: Deterministic Processing Queueing Delay
scenario: A Cortex-M4 performs acoustic anomaly detection. Inference takes a highly deterministic 10ms (service time). Audio snippets arrive exponentially with an average interval of 12ms.
question: Calculate the expected queueing delay utilizing the M/D/1 queue formula.
visual:
  kind: svg
  path: tinyml-1589.svg
  alt: Graph showing M/D/1 queueing delay rising sharply but at half the rate of M/M/1.
  caption: M/D/1 Queueing Delay
details:
  realistic_solution: 'For M/D/1, arrival rate lambda is 1/12 ms^-1. Service time D is 10 ms. Utilization rho = lambda * D = 10/12 = 0.833. The M/D/1 queueing delay formula is (rho * D) / (2 * (1 - rho)). Delay = (0.833 * 10) / (2 * (1 - 0.833)) = 8.33 / 0.333 = 25ms.'
  common_mistake: |
    **The Pitfall:** Using the M/M/1 queue formula for deterministic service times.
    **The Rationale:** Engineers default to the standard M/M/1 queue calculation, incorrectly assuming that the ML model's service time varies exponentially.
    **The Consequence:** They overestimate the expected queueing delay by exactly a factor of 2, leading to over-provisioned hardware or unnecessarily rejected inference requests.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival rate (lambda): 1/12 arrivals/ms.
    - Service time (D): 10 ms (Deterministic).
    - Utilization (rho): lambda * D.

    **Calculations:**
    - Utilization (rho): (1/12) * 10 = 5/6 ≈ 0.833.
    - M/M/1 delay (incorrect): (rho * D) / (1 - rho) = (50/6) / (1/6) = 50 ms.
    - M/D/1 queue formula (correct): (rho * D) / (2 * (1 - rho)).
    - Numerator: 5/6 * 10 = 50/6 ≈ 8.333.
    - Denominator: 2 * (1 - 5/6) = 2/6 ≈ 0.333.
    - M/D/1 Delay: 8.333 / 0.333 = 25 ms.

    **Conclusion & Interpretation:**
    - **Result: 25 ms (Latency-Bound)**. The deterministic nature of the ML inference strictly halves the expected queueing delay to 25 ms.
