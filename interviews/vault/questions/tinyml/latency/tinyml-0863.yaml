title: 'Latency Decomposition: Optimize MCU Inference Latency from 200ms to Under 50ms'
scenario: 'A deployed Cortex-M4 system runs a speech command model in 200ms. The target is <50ms. Profiling shows: Conv layers 140ms, memory copies between layers 45ms, other 15ms.'
question: Which optimizations can move the 168 MHz Cortex-M4 speech model from 200 ms toward the 50 ms target?
details:
  realistic_solution: 'Use one coherent path: first remove most inter-layer copies with in-place activation reuse, cutting memory-copy time from 45ms to about 5ms. Next enable CMSIS-NN kernels for the convolution stack, reducing the 140ms convolution time by roughly 3x to about 47ms. That gives 47+5+15 = 67ms, still above target. Finally reduce model width by 20%; convolution work scales roughly with width squared, so 47ms * 0.64 ≈ 30ms. Final estimate is 30+5+15 = 50ms, which only barely meets a 50ms target and should be validated on hardware. If the requirement is strictly below 50ms, use a slightly larger width/input reduction or optimize the remaining 15ms path.'
  common_mistake: |
    **The Pitfall:** Trying to quantize further or prune aggressively right away.
    **The Rationale:** Ignoring the obvious memory copy overhead from SRAM ping-pong buffers that is taking up a significant portion of latency.
    **The Consequence:** Wasting time on complex model changes when simpler system optimizations are available.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original Latency: 200 ms.
    - Breakdown: Conv (140 ms), Memory copies (45 ms), Other (15 ms).
    - Target: < 50 ms.

    **Calculations:**
    - In-place Activations: Eliminates most memory copies. 200 ms - 40 ms = 160 ms (Conv: 140 ms, Mem: 5 ms, Other: 15 ms).
    - CMSIS-NN Kernels: Conv time drops by ~3x. 140 ms / 3 ≈ 47 ms. New total = 47 + 5 + 15 = 67 ms.
    - Width reduction (20%): Conv ops scale quadratically (0.8² = 0.64x). 47 ms x 0.64 ≈ 30 ms.
    - Final Total = 30 ms (Conv) + 5 ms (Mem) + 15 ms (Other) = 50 ms.

    **Conclusion & Interpretation:**
    - **Result: 50 ms (Compute-Bound)**. A combination of in-place buffers, SIMD optimization, and slight width reduction drops latency exactly to the 50 ms target.
