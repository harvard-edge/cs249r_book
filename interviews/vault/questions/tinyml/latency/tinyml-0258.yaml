title: The Audio Buffer Deadline
scenario: You're designing a keyword spotting system. An audio sensor feeds the device 16-bit audio sampled at 16kHz. The system collects audio into a 1-second buffer.
question: To ensure no audio data is ever lost, what is the absolute maximum processing latency your model can have to process one buffer?
details:
  realistic_solution: The real-time hard deadline is dictated by the temporal length of the data buffer. Because a new 1-second buffer of audio arrives continuously every second, the model must complete inference on the current buffer within exactly 1000 ms. If execution exceeds this boundary, the system will systematically drop incoming audio frames, violating the real-time continuous sensing constraint.
  common_mistake: |
    **The Pitfall:** Over-complicating system-level deadlines with sample rates or bandwidth calculations.
    **The Rationale:** Engineers get bogged down calculating the microscopic time between individual samples (e.g., 62.5 µs at 16kHz).
    **The Consequence:** They define mathematically invalid latency targets and prematurely conclude the TinyML workload is computationally impossible.
  napkin_math: |
    **Assumptions & Constraints:**
    - Buffer length: 1 second of audio data.
    - Continuous streaming system.

    **Calculations:**
    - A full buffer is filled and ready for inference exactly every 1 second (1000 ms).

    **Conclusion & Interpretation:**
    - **Result: 1000 ms (Latency-Bound)**. Latency cannot exceed the physical buffer fill time.
  options:
  - '62.5 us'
  - '640 ms'
  - '1000 ms'
  - '500 ms'
  correct_index: 2
