title: 'Latency Decomposition: Compute Per-Layer Latency Budget for MCU CNN'
scenario: 'A 4-layer depthwise-separable CNN for anomaly detection (total 2.1 MOPs, INT8) runs on a Cortex-M4 at 168MHz. Layer breakdown: Conv1 (0.8M ops), DW-Conv2 (0.3M ops), PW-Conv3 (0.9M ops), FC4 (0.1M ops). Assume 1 MAC/cycle with DSP extensions.'
question: Which layer is the raw compute bottleneck for a 2.1 MOP depthwise-separable CNN on a 168 MHz Cortex-M4 at 1 MAC/cycle?
details:
  realistic_solution: 'At the stated 1 MAC/cycle model, the raw compute bottleneck is PW-Conv3 because it has the largest operation count. Conv1: 0.8M/168M = 4.8ms. DW-Conv2: 0.3M/168M = 1.8ms. PW-Conv3: 0.9M/168M = 5.4ms. FC4: 0.1M/168M = 0.6ms. Total ideal compute time is about 12.5ms before loop, memory, and kernel overheads.'
  common_mistake: |
    **The Pitfall:** Treating all convolution types equally and assuming execution time scales perfectly linearly with raw MOP counts.
    **The Rationale:** Candidates may ignore kernel efficiency and memory access patterns after identifying the largest operation count.
    **The Consequence:** PW-Conv3 is still the raw compute bottleneck, but the final measured profile can differ if a depthwise kernel has poor locality, alignment, or vectorization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4 at 168 MHz.
    - Throughput = 1 MAC/cycle.
    - Total Ops = 2.1M.
    - This is an ideal raw-compute estimate; Cortex-M4 implementations may add loop and memory stalls, especially for less optimized kernels.

    **Calculations:**
    - Conv1: 0.8M / 168M = 4.76 ms.
    - DW-Conv2: 0.3M / 168M = 1.79 ms.
    - PW-Conv3: 0.9M / 168M = 5.36 ms.
    - FC4: 0.1M / 168M = 0.60 ms.
    - Ideal total = 12.51 ms.

    **Conclusion & Interpretation:**
    - **Result: PW-Conv3 at 5.36 ms (raw compute bottleneck)**. Depthwise efficiency is worth profiling on real kernels, but it is not the answer to the raw operation-count question.
