title: Smart Doorbell Priority Scheduling
scenario: A smart doorbell handles continuous audio wake-word detection (20ms compute) and intermittent image-based person detection (800ms compute). New audio packets arrive every 100ms.
question: What task scheduling specification guarantees wake-word audio latency under 50ms while preventing queue overflow for the intermittent video frames?
details:
  realistic_solution: A strict non-preemptive queue will cause audio packets to stall for up to 800ms behind a video task, dropping wake-words. The candidate must specify a preemptive priority RTOS scheduler where the audio task is assigned high priority, preempting the video task. Because the audio task only consumes 20% of the CPU (20ms per 100ms interval), the remaining 80% is safely left for the background video processing without starving it.
  common_mistake: |
    **The Pitfall:** Using a standard FIFO queue or attempting to batch audio packets.
    **The Rationale:** Candidates fail to utilize a preemptive priority RTOS scheduler, allowing large tasks to block small critical tasks.
    **The Consequence:** Audio packets stall for up to 800ms behind the video task, causing dropped wake-words and a broken user experience.
  napkin_math: |
    **Assumptions & Constraints:**
    - Audio compute: 20ms.
    - Audio arrival: Every 100ms.
    - Preemption switch time: <1ms.

    **Calculations:**
    - Audio Duty Cycle = 20ms / 100ms = 20% CPU.
    - Remaining CPU for Video = 80%.
    - Audio Task Latency = 20ms compute + <1ms context switch = 21ms.

    **Conclusion & Interpretation:**
    - **Result: 21ms (Compute-Bound)**. Preemptive scheduling achieves ~21ms latency (< 50ms deadline).
