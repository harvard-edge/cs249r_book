title: CPU Preprocessing Bottleneck in Edge Vision Pipelines
scenario: A smart camera system handles a 60fps 1080p video stream. The NPU inference takes only 5ms,
  yet the overall pipeline struggles to hit 15fps. Profiling shows the CPU at 100% utilization.
question: What preprocessing bottleneck keeps the video pipeline below 15 FPS despite 5 ms NPU inference?
details:
  realistic_solution: The bottleneck is the CPU doing heavy data format conversion, specifically RGB to
    Grayscale or resizing, before feeding the NPU. While the NPU finishes in 5ms, the CPU is memory-bandwidth
    bound and cache-thrashing while sequentially transforming the 6MB raw camera frames, taking roughly
    60ms. The solution is to utilize the hardware VIC (Video Image Compositor) or ISP to perform zero-copy
    colorspace conversions and resizing.
  common_mistake: '**The Pitfall:** Assuming high NPU TOPS guarantee fast edge vision systems.

    **The Rationale:** Candidates completely neglect the CPU-bound pixel preprocessing overhead required
    before feeding data to the NPU.

    **The Consequence:** Building an unbalanced pipeline where a powerful NPU sits idle waiting on a bottlenecked
    CPU.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Image size: 1080p = 1920x1080 ~ 2M pixels.

    - Raw RGB frame size: 2M * 3 bytes = 6 MB.

    - CPU memory bandwidth (effective for unoptimized access): ~133 MB/s.

    - 60fps target requires <16.6ms per frame total latency.


    **Calculations:**

    - Memory transferred for read + write: 6 MB (read) + 2 MB (write) = 8 MB.

    - Data transfer time at 133 MB/s: 8 MB / 133 MB/s = 0.060 s = 60 ms.

    - Optimized target time left for CPU: 16.6ms - 5ms (NPU) = 11.6ms.


    **Conclusion & Interpretation:**

    - **Result: 60 ms overhead (Memory-Bandwidth-Bound).** The CPU memory access latency for processing
    8 MB of pixel data far exceeds the 11.6 ms budget, throttling the pipeline to ~15 FPS.'
