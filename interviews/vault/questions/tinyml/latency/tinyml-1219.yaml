title: Corstone-300 Vision Pipeline Bottleneck
scenario: You are deploying a quantized MobileNetV2 for object detection on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform. The M7 runs at 480 MHz and shares 512 KB SRAM with the Ethos-U55 (configured for 256 MAC/cycle). The total inference latency per frame is 80ms, but the NPU hardware counters show it is only active for 20ms.
question: What causes the 60 ms non-NPU latency in the Corstone-300 vision pipeline, and how should preprocessing and weight fetching be optimized?
details:
  realistic_solution: 'The bottleneck is the M7 spending excessive cycles on image resizing and the NPU stalling due to memory contention. The solution is to use CMSIS-DSP on the M7 for vectorized preprocessing and implement double-buffering. By separating the memory banks for the M7''s active working set and the NPU''s activation buffers, you eliminate contention.'
  common_mistake: |
    **The Pitfall:** Assuming the NPU is strictly compute-bound and trying to prune the model.
    **The Rationale:** Developers see high latency and automatically blame the ML model size, failing to profile the preprocessing and memory I/O bottlenecks.
    **The Consequence:** Wasting time degrading the model's accuracy through pruning when the actual bottleneck is memory bandwidth contention on the M7's shared SRAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - M7 Capacity: 480 MHz = 480k cycles/ms. 60 ms overhead = 28.8M cycles.
    - Naive Resizing: 240x240 to 120x120 (14,400 pixels).

    **Calculations:**
    - CPU Resizing: 14.4M cycles = 30 ms (at ~1000 cycles/pixel).
    - NPU Stall: 30 ms is spent waiting for weights from Flash to shared SRAM.
    - CMSIS-DSP Optimization: Vectorizing resizing cuts it to 200 cycles/pixel. 2.88M cycles = 6 ms.
    - DMA Optimization: Prefetching weights via DMA completely hides the 30 ms Flash read stall.

    **Conclusion & Interpretation:**
    - **Result: 26 ms total latency (Compute-Bound)**. 20 ms (NPU) + 6 ms (M7 prep) = 26 ms total latency (a ~3x speedup).
