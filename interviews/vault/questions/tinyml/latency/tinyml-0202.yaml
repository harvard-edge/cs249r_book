title: The Real-Time Deadline Trap
scenario: A keyword-spotting device uses a Cortex-M4 to process 1-second audio chunks. The model takes 600ms to run inference on one chunk. The system has a hard real-time deadline of 1000ms to process each chunk before the next one must be handled. If two valid keywords are spoken back-to-back, causing two chunks to enter the processing queue almost simultaneously, what is the total time from the arrival of the *second* chunk until its processing is complete?
question: How long after the second audio chunk arrives will its processing complete on the single-threaded Cortex-M4?
details:
  realistic_solution: The correct answer is 1200ms. Since the Cortex-M4 is a single-threaded processor, the second chunk must wait for the first chunk to finish processing. Its total time in the system is the wait time (600ms for the first chunk) plus its own processing time (another 600ms). The total latency for the second chunk is 1200ms, which misses the 1000ms deadline.
  common_mistake: |
    **The Pitfall:** Ignoring queueing theory on single-threaded MCUs.
    **The Rationale:** Engineers compare average inference (600ms) to the deadline (1000ms) and incorrectly assume 400ms of slack.
    **The Consequence:** Sequential bursts queue up linearly, causing the system to silently drop frames and fail in the field.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inference time: 600 ms per chunk.
    - Hard Deadline: 1000 ms. Single-threaded execution.

    **Calculations:**
    - Chunk 1 arrival: t=0. Completes at t=600.
    - Chunk 2 arrival: t~0. Waits 600 ms.
    - Chunk 2 execution: 600 ms to 1200 ms.
    - Total latency for Chunk 2: 1200 ms.

    **Conclusion & Interpretation:**
    - **Result: 1200 ms (Throughput-Bound)**. The system is fundamentally throughput-bound and fails under burst conditions without threading or DSP offloading.
  options:
  - '600ms'
  - '1000ms'
  - '1200ms'
  - '400ms'
