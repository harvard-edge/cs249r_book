title: The Single Batch Memory Bandwidth Wall
scenario: An object detection model benchmarked on Jetson Orin at Batch Size 32 utilizes 80% of the 275 TOPS. In production at Batch Size 1, utilization drops to 5% and latency misses the 10ms real-time target.
question: Why does the Jetson Orin model lose utilization and miss latency targets when moving from batch size 32 to batch size 1?
details:
  realistic_solution: |
    The model shifted from being compute-bound to memory-bandwidth-bound on the roofline. At BS=1, the arithmetic intensity (FLOPs per byte of memory traffic) drops because the model's weights are loaded or fetched for only one image, while at BS=32 that weight traffic is amortized across 32 images. The fix is to reduce memory traffic or increase reuse: weight quantization, pruning, operator fusion, and L2/shared-memory blocking are more relevant than quoting peak TOPS.
  common_mistake: |
    **The Pitfall:** Using server-style large batch benchmarking to estimate real-time edge performance.
    **The Rationale:** Engineers assume compute capacity (TOPS) is the only metric that matters and expect performance to scale linearly down to single batches.
    **The Consequence:** The deployment misses strict real-time latency targets because the hardware hits a memory bandwidth bottleneck that was completely hidden during high batch-size testing.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin Compute: 275 TOPS.
    - Memory bandwidth: 204 GB/s.
    - Model layer requirement per image: 40M FLOPs, 20 MB weights.
    - Non-weight activation/input/output traffic estimate: 4 MB per image.
    - Use decimal units for the roofline estimate: MB = 10^6 bytes, GB/s = 10^9 bytes/s.

    **Calculations:**
    - BS=1 traffic per image: 20 MB weights + 4 MB activations = 24 MB.
    - BS=1 arithmetic intensity: 40M FLOPs / 24M bytes ≈ 1.67 FLOPs/byte.
    - Bandwidth roof at BS=1: 1.67 FLOPs/byte * 204 GB/s ≈ 340 GFLOP/s, far below the 275 TOPS compute peak.
    - BS=32 total traffic with weight reuse: 20 MB weights + (32 * 4 MB activations) = 148 MB.
    - BS=32 arithmetic intensity: (32 * 40M FLOPs) / 148M bytes ≈ 8.65 FLOPs/byte.
    - Per image, BS=32 amortizes weight traffic to 20 MB / 32 = 0.625 MB instead of 20 MB, so the kernel has much more useful work per byte moved.

    **Conclusion & Interpretation:**
    - **Result: BS=1 is memory-bandwidth-bound because weight reuse collapses.** The exact sustained throughput depends on cache behavior and kernels, but the roofline estimate shows why utilization can fall sharply even when the arithmetic workload is small.
