title: Watchdog Timer Integration with Inference
scenario: Your Cortex-M33 (nRF5340, 128 MHz) runs a 12-layer anomaly detection model. Inference takes 85 ms. The nRF watchdog peripheral is set to 100 ms because the safety spec requires a response within 100 ms. Your test engineer reports that the watchdog fires randomly during normal inference — about 1 in 50 runs. The model isn't hanging.
question: Why does an 85 ms nRF5340 inference randomly trip a 100 ms watchdog, and where should the watchdog be kicked?
details:
  realistic_solution: 'Average inference (85ms) leaves only 15ms margin to the 100ms nRF watchdog timeout. Worst-case add-ons such as BLE interrupt servicing (+5ms), flash wait states on cache miss (+16ms), and I-cache cold-start after context switch (+0.78ms) sum to 106.78ms, which can exceed the watchdog deadline even though the model is not hung. The reported 1-in-50 rate is an observation from testing, not something derived from the timing numbers alone. Fix: feed the watchdog at a deterministic profiled point before the 100ms deadline with margin, such as after layer 6 only if profiling shows both intervals around the feed remain below 100ms in worst case. Do not simply increase the watchdog timeout if the safety spec requires 100ms response.'
  common_mistake: |
    **The Pitfall:** Increasing the watchdog timeout to 200 ms to "give the software more room."
    **The Rationale:** Engineers treat the watchdog as an arbitrary software annoyance rather than a hard constraint dictated by external safety requirements.
    **The Consequence:** This directly violates the safety specification; if the monitored system experiences a true anomaly, it could cause damage if it goes undetected for longer than the strictly mandated 100 ms.
  napkin_math: |
    **Assumptions & Constraints:**
    - Average inference: 85 ms.
    - Watchdog Timeout: 100 ms.
    - Worst-case add-ons: BLE (+5 ms), flash wait (+16 ms), I-cache (+0.78 ms).

    **Calculations:**
    - Worst-case latency: 85 + 5 + 16 + 0.78 = 106.78 ms.
    - The observed 1/50 reset rate is a test result; timing data only shows that some worst-case runs can exceed 100 ms.
    - A deterministic mid-inference feed is safe only if the measured worst-case time before the feed and after the feed are each below 100 ms with margin.
    - Layer 6 is a candidate placement, not proof of safety; profiling must include interrupts, cache misses, and flash wait states on the actual firmware.

    **Conclusion & Interpretation:**
    - **Result: Feed Before the Worst-Case Deadline**. A mid-inference watchdog feed prevents false resets only if profiling proves every interval between feeds remains below the 100 ms nRF watchdog timeout with margin.
