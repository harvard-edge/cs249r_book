title: The Watchdog Reset During Inference
scenario: Your environmental monitoring node on a Cortex-M0+ (RP2040, 133 MHz, 264 KB SRAM) runs a 12-layer anomaly detection model. Inference takes 280 ms. The system watchdog is set to 500 ms. In the field, the device resets every few hours. The watchdog is kicked (fed) in the main loop before and after inference.
question: Why can a 280 ms RP2040 inference trip a 500 ms watchdog every few hours in the field?
details:
  realistic_solution: The 280 ms inference time was measured in isolation, but the watchdog cares about the elapsed time between feeds in the main loop. In the field, that gap can include pre-inference work, cache-miss stalls from XIP flash, ISR preemption, and a rare flash erase or logging write. A worst-case path such as 50 ms pre-work + 280 ms inference + 70 ms cache/ISR jitter + 120 ms flash latency reaches 520 ms, so a 500 ms watchdog can trip even though nominal inference alone is shorter. Fix by feeding the watchdog at bounded points inside inference or restructuring the work so the worst-case feed interval stays below the watchdog timeout.
  common_mistake: |
    **The Pitfall:** Assuming "280 ms is well under the 500 ms watchdog timeout — there's plenty of margin."
    **The Rationale:** The 280 ms is only the average inference time. The worst case is what matters for watchdog compliance.
    **The Consequence:** Intermittent resets in the field due to WDT timeouts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Nominal inference: 280 ms.
    - Cache misses/interrupts overhead: 70 ms.
    - Flash write or erase latency (rare): 120 ms.
    - Pre-inference main-loop work before the next feed: 50 ms.
    - Watchdog Timeout (WDT): 500 ms.

    **Calculations:**
    - Worst-case compute = 280 ms + 70 ms = 350 ms.
    - Total without rare event = 350 ms + 50 ms = 400 ms.
    - Total with flash latency = 400 ms + 120 ms = 520 ms.

    **Conclusion & Interpretation:**
    - **Result: 520 ms worst-case feed interval.** Rare latency spikes can exceed the 500 ms watchdog even when the nominal 280 ms inference looks safe.
