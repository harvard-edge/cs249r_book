title: 'Latency Decomposition: Compare Cortex-M4 vs. Cortex-M7+Ethos-U55 for Keyword Spotting'
scenario: >
  A keyword spotting model (DS-CNN, 0.9 MMACs per inference) is deployed on two microcontrollers: Cortex-M4 (168MHz) vs. Cortex-M7+Ethos-U55 (480MHz, NPU with 0.5 TOPS INT8).
question: How would you compare inference latency and explain which dominates the power budget for always-on detection?
details:
  realistic_solution: >
    Decompose the latency by calculating pure MAC cycles bounded by execution ports. The M4 utilizes DSP instructions (1 MAC/cycle). The Ethos-U55 processes massive parallel arrays but suffers ~1ms of hardware startup overhead. The rapid NPU execution radically lowers the active duty cycle, making the M7+U55 heavily favorable for always-on battery life despite its higher peak current.
  common_mistake: |
    **The Pitfall:** Using raw clock speed to estimate Cortex-M4 latency.
    **The Rationale:** Candidates ignore the Instruction Set Architecture (ISA) capabilities (e.g., DSP extensions) and assume CPUs process 1 scalar operation per cycle.
    **The Consequence:** Misestimating execution time and making completely flawed hardware platform selections.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 0.9M MACs.
       - M4: 168 MHz, 1 MAC/cycle.
       - U55 NPU: 0.5 TOPS (0.25 TMACs/s), ~1ms overhead.
    2. **Calculations:**
       - M4 Latency: 900,000 MACs / 168,000,000 Hz = 5.36 ms.
       - NPU Compute: 900,000 MACs / 250,000,000,000 MACs/s = 3.6 µs.
       - NPU Total: 3.6 µs + 1 ms overhead = ~1 ms.
    3. **Conclusion & Interpretation:**
       - **Result: NPU is ~5x faster (1ms vs 5.36ms).** The NPU significantly shrinks the active duty cycle, preserving power for always-on tasks. **Bottleneck: Compute Duty Cycle.**
