title: Real-Time TinyML Inference on Nordic nRF5340
scenario: You are tasked with designing a real-time anomaly detection system for an industrial sensor on a Nordic nRF5340 SoC. The system needs to process a new sensor reading and output an inference result within a strict 33ms frame budget to prevent critical system jank and meet a hard real-time control loop deadline. The pre-trained, quantized CNN requires approximately 60 KB of memory for its weights and intermediate activations.
question: How should the architectural design guarantee a 33 ms real-time frame budget and prevent ANR timeouts on the nRF5340?
details:
  realistic_solution: A robust design starts with WCET measurement for sensor I/O, preprocessing, inference, postprocessing, and scheduling overhead using the nRF5340 cycle counter, Zephyr timing APIs/tracing, GPIO deadline markers, and a logic analyzer or debugger. Use SPI/I2C DMA or interrupt-driven acquisition into fixed SRAM buffers, then schedule inference as a high-priority bounded Zephyr thread with appropriate preemption and priority settings rather than making the whole task non-preemptible. Keep the model INT8 with CMSIS-NN/TFLM kernels, reserve static memory for the 60 KB weights/activations plus stack and tensor arena, avoid dynamic allocation in the frame path, and use watchdogs or deadline monitors to detect overruns. The nRF5340 does not provide the cache/TCM placement model implied by larger Cortex-M systems, so memory guidance should focus on deterministic internal SRAM use and avoiding copies.
  common_mistake: |
    **The Pitfall:** Assuming average-case execution time (ACET) for the ML inference and I/O operations is sufficient.
    **The Rationale:** Software engineers often benchmark nominal conditions without analyzing Worst-Case Execution Time (WCET) bounds.
    **The Consequence:** The system misses deadlines under peak load or unexpected contention, causing jank or ANR timeouts in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - CPU: 128 MHz.
    - Frame budget: 33 ms.
    - Model memory: 60 KB.

    **Calculations:**
    - Total available cycles per frame = 128,000,000 cycles/second * 0.033 seconds = 4,224,000 CPU cycles.
    - Hypothetical ML WCET = 1,500,000 cycles.
    - Remaining cycles = 4,224,000 - 1,500,000 = 2,724,000 cycles.

    **Conclusion & Interpretation:**
    - **Result: 2,724,000 cycles remaining to cover all I/O and pre/post-processing overhead (Latency-Bound)**. Requires rigorous WCET analysis and RTOS task prioritization.
