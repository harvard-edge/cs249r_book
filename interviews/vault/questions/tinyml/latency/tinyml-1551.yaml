title: Cortex-M4 Vibration FFT Queue
scenario: A predictive maintenance sensor samples vibration data at 1kHz. Complete 1-second windows arrive at t=1,2,3,4,5s during each burst. The FFT starts immediately when the processor is idle, takes 1.2 seconds, and has a pending queue that excludes the active FFT. The machine vibrates in 5-second bursts followed by 20-second silences.
question: What pending-window FFT queue size, excluding the active FFT, prevents loss under end-of-window arrivals?
visual:
  kind: svg
  path: tinyml-1551.svg
  alt: Chart showing queue building up to 1 during the 5 second burst, then draining to 0 during silence.
  caption: Burst Queue Accumulation
details:
  realistic_solution: During a 5-second burst, 5 complete windows arrive at t=1,2,3,4,5s. The first FFT starts when the first window arrives and finishes at t=2.2s, then subsequent completions occur at t=3.4s and t=4.6s before the burst ends. Just after the t=5s arrival, 5 windows have arrived, 3 have completed, and 1 is in service, so 1 window is pending. During the following silence, the active window finishes at t=5.8s and the final pending window finishes at t=7.0s. Therefore, a pending queue size of 1 is sufficient under this end-of-window arrival model; counting the active FFT as capacity would require 2 total slots.
  common_mistake: |
    **The Pitfall:** Claiming the system is unconditionally unstable because service time (1.2s) > arrival time (1.0s).
    **The Rationale:** Candidates calculate utilization based on active periods while ignoring the duty-cycle burst constraints and long silent periods.
    **The Consequence:** They unnecessarily over-provision the processor or SRAM, failing to realize the system easily catches up during the 20-second silence.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival model: complete 1-second windows become ready at t=1,2,3,4,5s during the burst.
    - Service time: 1.2 seconds per FFT window.
    - Queue size excludes the window currently being processed.

    **Calculations:**
    - Start first FFT at t=1.0s; completions occur at t=2.2s, 3.4s, and 4.6s before the last burst arrival at t=5.0s.
    - Just after t=5.0s: arrivals = 5, completions = 3.
    - Total occupancy = 5 - 3 = 2 windows.
    - Pending occupancy = 2 total - 1 in service = 1 waiting window.
    - Drain during silence: remaining completions at t=5.8s and t=7.0s, well before the next burst.

    **Conclusion & Interpretation:**
    - **Result: Queue size of 1 pending slot (Compute-Bound Burst)**. The slower service rate creates backlog, but with end-of-window arrivals the peak is 2 total windows: 1 active FFT and 1 pending slot.
