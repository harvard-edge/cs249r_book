title: Cortex-M4 Vibration FFT Queue
scenario: A predictive maintenance sensor samples vibration data at 1kHz. Every 1000 samples (1 second of data), it queues the window for an FFT on the Cortex-M4. The FFT takes 1.2 seconds, making service slower than the 1.0 second arrival rate. However, the machine only vibrates in 5-second bursts followed by 20-second silences.
question: Design the minimum required pending-window FFT queue size, excluding the window currently being processed, to prevent data loss during a vibration burst?
visual:
  kind: svg
  path: tinyml-1551.svg
  alt: Chart showing queue building up to 1 during the 5 second burst, then draining to 0 during silence.
  caption: Burst Queue Accumulation
details:
  realistic_solution: During a 5-second burst, 5 windows arrive (one every 1.0s). The FFT processes them at 1.2s per window. Interpreting queue size as pending slots only, the peak state during the burst is 1 window actively processing and 1 additional window waiting. Therefore, a queue size of 1 pending window is sufficient; the total system occupancy at the peak is 2 windows including the one in service.
  common_mistake: |
    **The Pitfall:** Claiming the system is unconditionally unstable because service time (1.2s) > arrival time (1.0s).
    **The Rationale:** Candidates calculate utilization based on active periods while ignoring the duty-cycle burst constraints and long silent periods.
    **The Consequence:** They unnecessarily over-provision the processor or SRAM, failing to realize the system easily catches up during the 20-second silence.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrivals: 5 windows during 5-second burst.
    - Processing rate: 1.2 seconds per window.

    **Calculations:**
    - By the end of the burst, 5 windows have arrived.
    - With service time longer than the 1.0s inter-arrival time, the processor can be busy on one window while one later arrival waits.
    - Peak occupancy: 2 windows total = 1 in service + 1 pending in the queue.

    **Conclusion & Interpretation:**
    - **Result: Queue size of 1 pending slot (Compute-Bound Burst)**. If capacity is counted as total windows in the system, the required capacity is 2; if counted as pending queue slots, the required queue size is 1.
