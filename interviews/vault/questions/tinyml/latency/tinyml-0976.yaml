title: Analyzing Preemption and Real-Time Misses on STM32F4
scenario: An INT8 vibration analysis model runs on a 168 MHz ARM Cortex-M4 with 256 KB SRAM and no FPU. The system has a strict 16ms budget. The model requires 1.5 million MACs utilizing CMSIS-NN SIMD. Profiling shows isolated execution takes 12ms. When a 5ms high-priority sensor interrupt fires, the system drops frames.
question: Why does theoretical execution time differ from the observed 12ms, and what causes the deadline miss?
details:
  realistic_solution: Theoretical MAC throughput is only a lower bound; actual execution is bottlenecked by SRAM/flash fetch latency. Preemption by the 5ms interrupt forces the total computation window to exceed the 16ms budget.
  common_mistake: |
    **The Pitfall:** Calculating execution time strictly from theoretical MAC capability and ignoring RTOS preemption.
    **The Rationale:** Engineers assume perfect pipeline utilization and fail to account for memory load overheads or high-priority interrupts that pause the CPU.
    **The Consequence:** The model misses real-time deadlines in the field because the combined Worst-Case Execution Time (WCET) and interrupt preemption overruns the budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Clock: 168 MHz. Model: 1.5M MACs. CMSIS-NN SIMD: 2 MACs/cycle.
    - Budget: 16 ms. Interrupt duration: 5 ms. Measured model time: 12 ms.

    **Calculations:**
    - Theoretical compute time: (1,500,000 / 2) / 168,000,000 = 4.46 ms.
    - Memory/Stall overhead ratio: 12 ms / 4.46 ms = ~2.7x.
    - Total execution window: 12 ms (model) + 5 ms (interrupt) = 17 ms.

    **Conclusion & Interpretation:**
    - **Result: 17 ms > 16 ms budget (Preemption-Bound)**. The system is preemption-bound in production, proving that theoretical bounds are insufficient for RTOS deadline guarantees.
