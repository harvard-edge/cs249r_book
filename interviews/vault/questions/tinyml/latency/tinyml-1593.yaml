title: Cortex-M4 Sensor Queue Sizing
scenario: Designing an anomaly detection pipeline on a Cortex-M4 where sensor readings arrive via interrupts.
question: Specify the optimal queue depth and drop policy to handle a Poisson arrival rate of 50 Hz given a model execution time of 15 ms, to maintain 99% availability without overflowing a 2 KB SRAM buffer.
details:
  realistic_solution: 'The arrival rate is 50 Hz and service rate is 1/0.015 = 66.6 Hz, yielding a utilization ratio of 0.75. Using M/M/1 queueing bounds, maintaining 99% availability requires a queue depth of approximately 17 items. With each data frame taking 32 bytes, a 544-byte ring buffer with a tail-drop policy is specified, easily fitting in the 2 KB SRAM.'
  common_mistake: |
    **The Pitfall:** Assuming a deterministic arrival rate and specifying a shallow queue depth of 1 or 2.
    **The Rationale:** Candidates often ignore the bursty nature of Poisson arrivals and size the queue based only on the average rate.
    **The Consequence:** Silently dropped interrupts and lost data during sensor arrival bursts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival Rate (λ): 50 Hz Poisson.
    - Service Rate (µ): 1 / 0.015 s = 66.6 Hz.
    - Buffer limit: 2 KB SRAM (32 bytes/item).

    **Calculations:**
    - Utilization (ρ): 50 / 66.6 = 0.75.
    - Target Availability: 99% (1 - ρ^K ≈ 0.99).
    - Queue Depth (K): log(0.01) / log(0.75) ≈ 16.01 -> 17 items.
    - Buffer Size: 17 items × 32 bytes/item = 544 bytes.

    **Conclusion & Interpretation:**
    - **Result: 544 bytes (Memory-Bound)**. A 544-byte ring buffer easily fits within the 2 KB SRAM while mathematically guaranteeing 99% availability against Poisson bursts.
