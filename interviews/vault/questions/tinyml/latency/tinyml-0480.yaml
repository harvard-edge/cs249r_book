title: The Real-Time Queueing Cascade
scenario: 'You are designing a predictive maintenance sensor for a factory assembly line using a Cortex-M7 microcontroller. The sensor must analyze high-frequency vibration patterns to detect imminent machine failures. Your ML model inference and signal processing takes exactly 20ms to complete for one event. The system has a hard real-time deadline: a classification must be completed within 35ms of the vibration event occurring, otherwise the machine risks damage.'
question: Which event misses the 35 ms deadline when 20 ms vibration inferences arrive at 0, 10, and 20 ms?
details:
  realistic_solution: The third event will miss its deadline. While a single event can be processed well within the 35ms budget, the sequential, single-threaded nature of processing on the MCU creates a queue. The delay incurred waiting for prior events to finish causes the total time-in-system for the third event to exceed its individual deadline. This is a classic queueing failure mode. The only solutions are to get a faster processor (reduce service time), add more processors (parallel queues), or implement admission control to drop events when the queue is too long.
  common_mistake: |
    **The Pitfall:** Focusing only on the average-case service time versus the average arrival rate.
    **The Rationale:** Engineers see a 50 Hz service rate handling a 10 Hz arrival rate and assume safety, completely missing the queueing delays caused by bursty arrivals.
    **The Consequence:** Occasional, catastrophic deadline misses that damage factory equipment despite the system appearing "fast enough" on average.
  napkin_math: |
    **Assumptions & Constraints:**
    - 20ms service time per inference. 35ms strict real-time deadline. Arrivals at 0ms, 10ms, and 20ms. Single-threaded MCU execution.

    **Calculations:**
    - Event 1: arrives 0ms, starts 0ms, finishes 20ms. Delay = 20ms < 35ms. Event 2: arrives 10ms, starts 20ms (waits for E1), finishes 40ms. Delay = 40 - 10 = 30ms < 35ms. Event 3: arrives 20ms, starts 40ms (waits for E2), finishes 60ms. Delay = 60 - 20 = 40ms > 35ms.

    **Conclusion & Interpretation:**
    - **Result: Event 3 delays by 40ms, missing the 35ms deadline (Queueing-Bound Real-Time Failure)**.
  options:
  - All events will be processed on time, since the 20ms processing time is well under the 35ms deadline.
  - The system will crash due to an SRAM overflow from having to buffer three events simultaneously.
  - The third event misses its deadline because the queueing delay from the first two events pushes its completion time past its deadline.
  - A real-time operating system (RTOS) would use preemption to pause the earlier events, ensuring all three deadlines are met.
  correct_index: 2
