title: The Sensor Pipeline Without Drops
scenario: Your vibration sensor samples at 1000 Hz (1 sample per ms). Your anomaly detection model processes windows of 256 samples and takes 50ms to run inference.
question: How can a 1 kHz vibration pipeline process 256-sample windows with 50 ms inference without dropping samples?
details:
  realistic_solution: 'Use a double-buffer (ping-pong) scheme with DMA. While DMA fills buffer A with 256 new samples over 256ms, the CPU processes the previous full buffer B through the ML model in 50ms. When buffer A is full, swap: CPU processes A while DMA fills B. No samples are lost because acquisition and inference overlap, and the processing time is less than the window-arrival interval. For non-overlapping windows, CPU utilization is 50ms / 256ms = 19.5%. If the design intentionally uses overlapping windows, define the stride explicitly; a 128-sample stride creates a new window every 128ms, so utilization is 50/128 = 39%, and any stride below 50 samples would create backlog.'
  common_mistake: |
    **The Pitfall:** Treating the 256 ms window length as if the CPU must stop sampling while inference runs.
    **The Rationale:** Candidates forget that DMA or an interrupt-driven ring buffer can keep acquiring samples while the CPU works on the previous window.
    **The Consequence:** They invent a false data-drop problem or choose an unnecessarily small model, instead of overlapping acquisition and compute with correct buffering.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sensor data rate is 1000 Hz (1 ms per sample).
    - Window size is 256 samples (256 ms).
    - Inference time is 50 ms.
    - Non-overlapping baseline: new window every 256 ms.
    - Optional overlap must be described by a stride.

    **Calculations:**
    - Time DMA takes to fill a buffer: 256 ms.
    - CPU inference execution time: 50 ms.
    - Non-overlapping utilization: 50 ms / 256 ms = 19.5%.
    - No backlog condition: inference time <= window-arrival interval.
    - For an explicit 128-sample stride, arrival interval = 128 ms and utilization = 50 / 128 = 39%.
    - Minimum stride before backlog is 50 samples at 1 kHz, but only for an overlapping-window design.

    **Conclusion & Interpretation:**
    - **Result: 19.5% Utilization Without Drops**. With ping-pong DMA and non-overlapping 256-sample windows, 50 ms inference finishes well before the next window arrives.
