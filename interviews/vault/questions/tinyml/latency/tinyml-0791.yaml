title: Shared L2 Thrash Between Concurrent Orin Models
scenario: Two TinyML models (vision and audio) run concurrently on a Jetson Orin. Running either model alone hits 10ms latency.
question: Why do two models that run in 10 ms alone spike to 45 ms latency when run concurrently on Jetson Orin?
details:
  realistic_solution: The concurrent execution is causing shared resource contention on the Orin rather than a software correctness bug. Jetson Orin uses LPDDR5 main memory, not HBM, and the two models can contend for GPU/CPU execution slots, memory bandwidth, shared caches, and runtime scheduling. If their activation and weight streams no longer stay local when overlapped, extra LPDDR5 traffic and scheduler stalls can turn two individually 10 ms models into a much longer tail-latency path. Practical fixes include serializing the models, reducing one working set, assigning priorities or separate execution windows, and profiling memory bandwidth and GPU occupancy; do not assume a generic MPS setting can pin cache lines or prevent cache interference.
  common_mistake: |
    **The Pitfall:** Assuming edge GPUs can seamlessly multitask like cloud GPUs.
    **The Rationale:** Candidates overlook the capacity limits of shared L2 caches and the extra memory-controller contention created by concurrent workloads on edge devices.
    **The Consequence:** Concurrent models evict each other's data, forcing frequent DRAM fetches and destroying real-time performance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Jetson Orin with shared compute resources, shared cache hierarchy, and LPDDR5 memory bandwidth.
       - Baseline Latency (Isolated): 10 ms each.
       - Concurrent Latency Observed: 45 ms.
    2. **Calculations:**
       - Ideal overlap would keep tail latency near max(10 ms, 10 ms) = 10 ms if the models used independent resources.
       - Sequential execution would take about 10 ms + 10 ms = 20 ms if contention were avoided.
       - Observed extra delay beyond sequential: 45 ms - 20 ms = 25 ms.
       - That 25 ms cannot be derived from a cache-capacity formula alone; it indicates shared compute, memory-bandwidth, cache-pressure, and scheduling stalls during overlap.
    3. **Conclusion & Interpretation:**
       - **Result: Concurrent execution adds about 25 ms beyond simple serialization, pointing to shared-resource contention rather than HBM or cache pinning behavior.** **Result: Contention-Bound Latency.**
