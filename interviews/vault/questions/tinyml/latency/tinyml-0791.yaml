title: Tinyml New 0013
scenario: Two TinyML models (vision and audio) run concurrently on a Jetson Orin. Running either model alone hits 10ms latency.
question: Why do two models that run in 10 ms alone spike to 45 ms latency when run concurrently on Jetson Orin?
details:
  realistic_solution: The concurrent execution is causing catastrophic thrashing of the Orin's L2 cache. Model A loads its activations and weights, and immediately Model B overwrites those cache lines. This forces both models to fetch from the much slower main memory (HBM/LPDDR) continuously. The solution is to execute them sequentially, or use partitioning/MPS to pin cache resources.
  common_mistake: |
    **The Pitfall:** Assuming edge GPUs can seamlessly multitask like cloud GPUs.
    **The Rationale:** Candidates overlook the critical capacity limits of shared L2 caches on edge devices when multiple workloads overlap.
    **The Consequence:** Concurrent models evict each other's data, forcing continuous fetches from slow main memory and destroying real-time performance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Jetson Orin. L2 Cache Size = 2 MB.
       - Model A Working Set (Activations + Weights) = 1.5 MB.
       - Model B Working Set = 1.0 MB.
       - Baseline Latency (Isolated): 10 ms each.
    2. **Calculations:**
       - Combined Working Set: 1.5 MB + 1.0 MB = 2.5 MB.
       - Cache Deficit: 2.5 MB > 2.0 MB L2 capacity.
       - Thrashing Penalty: 10 million evictions/sec × 100 ns LPDDR fetch penalty = 1.0 second added latency overhead spread across frames.
    3. **Conclusion & Interpretation:**
       - **Result: 2.5 MB working set exceeds 2 MB L2 cache, destroying real-time performance.** **Result: Memory-Bound (L2 Cache Thrashing).**
