title: NPU-CPU Bus Contention and Trace Profiling in Corstone-300
scenario: >
  You are deploying a real-time keyword spotting model on an ARM Cortex-M7 + Ethos-U55 subsystem. Profiling shows that despite the NPU's theoretical 256 MAC/cycle capability, overall inference latency is drastically higher than expected, and trace tools reveal massive pipeline bubbles in the NPU execution graph.
question: How would you design a profiling strategy to isolate the root cause and propose an architectural modification to the model or memory layout to achieve the target latency?
details:
  realistic_solution: >
    Leverage hardware performance counters (PMUs) to correlate M7 memory accesses with NPU idle cycles. The pipeline bubbles indicate severe bus contention caused by operator fallback. A non-native activation function is forcing context switches to the M7. The architectural fix is operator substitution: fuse the activation into the NPU's native pipeline (e.g., swapping a custom Swish for hardware-supported ReLU6) and pin buffers to specific SRAM banks to eliminate AXI bus collisions.
  common_mistake: |
    **The Pitfall:** Assuming the NPU is underpowered or focusing purely on pruning MACs.
    **The Rationale:** Candidates fail to realize that the Ethos-U55 and Cortex-M7 share the same SRAM, and frequent operator fallbacks to the M7 cause severe memory bus contention and NPU stalling.
    **The Consequence:** Pruning compute achieves zero latency gains because the system is starved by CPU-bound fallback memory operations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Layer: 2.5M MACs, 100K element activation.
       - U55 NPU: 256 MACs/cycle at 480 MHz. M7 CPU: 10 cycles/element fallback.
    2. **Calculations:**
       - Theoretical NPU time: 2,500,000 / (480,000,000 * 256) = 20.3 µs.
       - M7 Fallback time: (100,000 * 10) / 480,000,000 = 2,083 µs (~2.08 ms).
    3. **Conclusion & Interpretation:**
       - **Result: CPU fallback adds >100x the latency of NPU compute.** The profiling bubbles are perfectly explained by operator fallback stalling the pipeline. **Bottleneck: Operator Support/Bus Contention.**
