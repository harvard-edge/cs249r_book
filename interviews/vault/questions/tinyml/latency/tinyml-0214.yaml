title: The Dropped Audio Packet
scenario: You are designing a wake-word detector using a Cortex-M4 microcontroller. The audio subsystem provides a new data chunk every 1,000 milliseconds. The model requires 200 Million FLOPs to process one chunk.
question: Can the Cortex-M4 process the 200 MFLOP audio chunk within the strict 1000 ms real-time deadline?
details:
  realistic_solution: Yes, the system can hit the real-time deadline. A 168 MHz Cortex-M4 equipped with DSP extensions can theoretically execute 2 FLOPS per cycle, achieving ~336 MFLOPS. Processing 200 MFLOPs requires ~595 ms. However, realistic system engineering must budget a 15-20% margin for RTOS jitter, DMA interrupts, and I/O orchestration. Even with this overhead, the execution takes ~684 ms, comfortably leaving >300 ms for deep sleep to conserve power.
  common_mistake: |
    **The Pitfall:** Evaluating theoretical throughput while ignoring system-level overhead.
    **The Rationale:** Candidates strictly divide FLOPs by clock speed, completely ignoring the mandatory OS jitter, context switching, and data movement overhead.
    **The Consequence:** They architect systems directly on the theoretical limit (e.g., 300 MFLOPs), which mathematically fits but inevitably drops packets in the real world when an interrupt fires.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4 at 168 MHz (2 FLOPS/cycle) = 336 MFLOPS.
    - Model complexity: 200 MFLOPs.
    - Hard deadline: 1,000 ms.

    **Calculations:**
    - Ideal Execution: 200 MFLOPs / 336 MFLOPS = 0.595 seconds (595 ms).
    - Realistic Overhead: Add 15% for RTOS/Interrupts.
    - Effective Execution: 595 ms * 1.15 ≈ 684 ms.
    - Margins: 1,000 ms - 684 ms = 316 ms remaining.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound Feasibility**. The architecture successfully processes the chunk in ~684 ms, satisfying the 1000 ms deadline while providing a robust 30%+ safety margin.
  options:
  - No, it would take over 500 seconds to process one chunk.
  - No, it can only process about 1.68 chunks per second, which is too slow.
  - Yes, it takes about 595ms, which is less than the 1000ms deadline.
  - Yes, but the 95ms of slack time is too small for a production system.
