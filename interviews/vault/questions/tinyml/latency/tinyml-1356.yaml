title: Optimizing TinyML Latency on FPU-less Microcontrollers
scenario: 'You are tasked with deploying a real-time anomaly detection model on an ARM Cortex-M4 STM32F4 microcontroller (168 MHz, 256 KB SRAM, no FPU). The current quantized model has an inference latency of 150ms, while the hard real-time requirement is 80ms. You are considering two alternative model architectures: Architecture A (a MobileNet-like quantized CNN) and Architecture B (a highly optimized recurrent neural network). Both fit within the 256 KB SRAM.'
question: Which bottlenecks keep an STM32F4 anomaly model at 150 ms, and which candidate architecture can meet the 80 ms target?
details:
  realistic_solution: Begin with on-device profiling using tools like the ST-Link profiler or timing macros to measure layers, preprocessing, and postprocessing. The likely bottlenecks at 150 ms are fixed-point kernel efficiency, memory traffic from im2col or tensor reshaping, non-contiguous activation access, and any remaining scalar code paths on the FPU-less Cortex-M4. Architecture A, the MobileNet-like quantized CNN, is the candidate that can meet the 80 ms target if it maps cleanly to CMSIS-NN-style convolution/depthwise kernels and keeps activation movement small. Architecture B fits SRAM, but recurrent dependence serializes work across timesteps and limits SIMD/kernel reuse, so the example budget misses 80 ms. Benchmark both candidates on the STM32F4, but absent contrary measurements choose Architecture A.
  common_mistake: |
    **The Pitfall:** Jumping directly to code optimization without systematic profiling.
    **The Rationale:** Candidates overlook the significant performance impact of fixed-point arithmetic overheads or inefficient memory access patterns on an FPU-less architecture.
    **The Consequence:** Wasting time optimizing non-critical paths or deploying architectures that fundamentally cannot meet the 80ms real-time target.
  napkin_math: |
    **Assumptions & Constraints:**
    - MCU: 168 MHz, no FPU.
    - Real-time limit: 80 ms.
    - Architecture A estimate after CMSIS-NN optimization: 1.2M MACs at 4 cycles/MAC plus 18 ms preprocessing/postprocessing/memory overhead.
    - Architecture B estimate: 1.0M recurrent MACs at 8 cycles/MAC plus 40 sequential timesteps at 2 ms/timestep for state updates and memory movement.

    **Calculations:**
    - Total Cycle Budget: 0.08 s * 168 MHz = 13.44M cycles.
    - Architecture A compute: 1.2M MACs * 4 cycles/MAC = 4.8M cycles = 28.6 ms.
    - Architecture A end-to-end estimate: 28.6 ms + 18 ms overhead = 46.6 ms, which is below 80 ms.
    - Architecture B compute: 1.0M MACs * 8 cycles/MAC = 8.0M cycles = 47.6 ms.
    - Architecture B recurrent overhead: 40 timesteps * 2 ms = 80 ms.
    - Architecture B end-to-end estimate: 47.6 ms + 80 ms = 127.6 ms, which exceeds 80 ms.

    **Conclusion & Interpretation:**
    - **Result: Architecture A is the candidate that can meet the 80 ms target in this estimate.** Architecture B's serialized recurrent overhead dominates despite fitting SRAM, so profiling should verify A's layer sum and memory movement against the 13.44M-cycle budget.
