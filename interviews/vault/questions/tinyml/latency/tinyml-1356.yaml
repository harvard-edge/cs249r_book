title: Optimizing TinyML Latency on FPU-less Microcontrollers
scenario: 'You are tasked with deploying a real-time anomaly detection model on an ARM Cortex-M4 STM32F4 microcontroller (168 MHz, 256 KB SRAM, no FPU). The current quantized model has an inference latency of 150ms, while the hard real-time requirement is 80ms. You are considering two alternative model architectures: Architecture A (a MobileNet-like quantized CNN) and Architecture B (a highly optimized recurrent neural network). Both fit within the 256 KB SRAM.'
question: Which bottlenecks keep an STM32F4 anomaly model at 150 ms, and which candidate architecture can meet the 80 ms target?
details:
  realistic_solution: Begin with on-device profiling using tools like the ST-Link profiler or timing macros to measure layers, preprocessing, and postprocessing. The likely bottlenecks at 150 ms are fixed-point kernel efficiency, memory traffic from im2col or tensor reshaping, non-contiguous activation access, and any remaining scalar code paths on the FPU-less Cortex-M4. Architecture A, the MobileNet-like quantized CNN, is more likely to meet the 80 ms target if it maps to CMSIS-NN-style convolution/depthwise kernels and avoids excessive activation movement. Architecture B can fit SRAM, but recurrent dependence usually serializes work across timesteps and limits SIMD/kernel reuse, so it should be selected only if target benchmarks show its sequence length and state updates stay within the 13.44M-cycle budget. Benchmark the dominant kernels for both candidates on the STM32F4 and choose the one whose measured layer sum plus preprocessing overhead is below 80 ms; absent contrary measurements,
    prefer the optimized CNN path.
  common_mistake: |
    **The Pitfall:** Jumping directly to code optimization without systematic profiling.
    **The Rationale:** Candidates overlook the significant performance impact of fixed-point arithmetic overheads or inefficient memory access patterns on an FPU-less architecture.
    **The Consequence:** Wasting time optimizing non-critical paths or deploying architectures that fundamentally cannot meet the 80ms real-time target.
  napkin_math: |
    **Assumptions & Constraints:**
    - MCU: 168 MHz, no FPU.
    - Real-time limit: 80 ms.

    **Calculations:**
    - Total Cycle Budget: 0.08 s * 168 MHz = 13.44M cycles.
    - Fixed-Point MAC Cost: ~8 clock cycles/MAC.
    - Layer Example (1M MACs): 1M * 8 = 8M cycles.
    - Remaining Overhead: 13.44M - 8M = 5.44M cycles.

    **Conclusion & Interpretation:**
    - **Result: 5.44 million overhead cycles remaining (Compute-Bound).** FPU-less architectures suffer severe performance penalties from fixed-point scaling overhead.
