title: 'Calculate Inference Latency from Trace Cycles'
scenario: 'You are analyzing the latency bottleneck of an anomaly detection model on the Nordic nRF5340. The application core runs at 128 MHz. Your trace tool indicates the model executes 1,500,000 MAC operations per inference. Using optimized instructions, each MAC takes exactly 1 clock cycle, but accesses to the 256 KB SRAM add an overhead of 600,000 clock cycles per inference.'
question: 'What is the total latency for 1.5M MAC cycles plus 600K SRAM overhead cycles on a 128 MHz nRF5340?'
details:
  realistic_solution: 'The correct approach is to calculate the total number of clock cycles required for one inference by summing the compute cycles and the memory overhead. Then, divide the total cycles by the application core''s clock frequency to determine the absolute time. This reflects how profiling tools aggregate cycle counts to identify real-world latency bottlenecks.'
  common_mistake: 'Candidates often forget to include the memory access overhead in their calculations, computing only the theoretical MAC latency. They may also make arithmetic errors converting the 128 MHz clock speed into cycles per millisecond.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Core clock: 128 MHz (128,000 cycles/ms)
    - Compute cycles: 1,500,000 MACs (1 cycle/MAC)
    - SRAM overhead: 600,000 cycles

    **Calculations:**
    - Total cycles = 1,500,000 + 600,000 = 2,100,000 cycles
    - Total latency = 2,100,000 cycles / 128,000 cycles/ms = 16.40625 ms

    **Conclusion & Interpretation:**
    - **Result: 16.4 ms (Latency-Bound)**. Profiling tools aggregate these real-world memory access cycles along with compute to pinpoint bottlenecks.
