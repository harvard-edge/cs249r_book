title: Optimizing Real-time KWS Latency on Cortex-M7 + Ethos-U55
scenario: You are designing an always-on keyword spotting (KWS) system for a low-power edge device using an ARM Cortex-M7 and an ARM Ethos-U55 microNPU. The end-to-end latency from audio capture to actionable output must not exceed 100 ms.
question: How should you decompose and optimize end-to-end KWS latency on a Cortex-M7 plus Ethos-U55 system under a 100 ms target?
details:
  realistic_solution: "1. **Audio Preprocessing:** Implement highly optimized audio feature extraction (e.g., MFCCs) using CMSIS-DSP libraries for efficient fixed-point arithmetic on the M7. \n2. **Data Transfer:** Leverage DMA controllers to transfer preprocessed audio features from SRAM to the Ethos-U55's internal scratchpad SRAM. Implement a double-buffering scheme to enable pipelining. \n3. **NPU Inference:** Ensure the KWS model is quantized to INT8 and optimized using the Vela compiler to efficiently map it to the NPU's MAC units. \n4. **Post-processing:** Keep post-inference logic on the M7 CPU extremely lean. \n5. **System-level Optimization:** Adopt an event-driven, pipelined architecture. Use hardware performance counters to accurately measure cycles spent in each stage (TTFT, TPOT) and identify true bottlenecks."
  common_mistake: |
    **The Pitfall:** Focusing almost exclusively on NPU inference time.
    **The Rationale:** Candidates underestimate latency from CPU-bound audio preprocessing, inefficient data transfers, and post-processing logic.
    **The Consequence:** The overall system fails latency constraints despite having a highly optimized NPU model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Audio input buffer: 16kHz sampling, 30ms window = 480 samples.
    - Hop time: New inference completes every 10ms.
    - Target end-to-end latency: <100ms.

    **Calculations:**
    - Ethos-U55 Inference: 256 MAC/cycle -> ~0.1-0.5 ms for small KWS model.
    - DMA Transfer: 64-feature MFCC vector (256 bytes) -> negligible microseconds.
    - M7 Pre-processing (MFCCs): ~3-5 ms with CMSIS-DSP.
    - Total Latency = 5ms (CPU) + 0ms (DMA) + 0.5ms (NPU) = 5.5ms.

    **Conclusion & Interpretation:**
    - **Result: 5.5ms (Compute-Bound)**. CPU pre-processing dominates but total latency safely meets the 100ms target.
