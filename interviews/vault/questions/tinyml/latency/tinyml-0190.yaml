title: The Millisecond Machine Stop
scenario: You're designing a TinyML system to monitor vibrations on a high-speed bottling line. If an anomalous vibration is detected, the device must trigger an emergency stop to prevent a pile-up.
question: "What is the typical, non-negotiable latency budget for such a hard real-time interrupt?"
details:
  realistic_solution: Hard real-time industrial requirements demand deterministic latency under 1 millisecond. The event must map to a top-priority Interrupt Service Routine (ISR) that forcefully preempts OS background tasking.
  common_mistake: |
    **The Pitfall:** Misjudging real-time constraints by benchmarking against UI frames (16-33ms) or network limits (100ms).
    **The Rationale:** Engineers apply soft-real-time UX standards to rigid industrial physical constraints.
    **The Consequence:** Missing the execution deadline by milliseconds results in catastrophic kinetic collisions and equipment failure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cloud API target: 100 ms.
       - Mobile UX "jank" target: 16 ms.
       - Industrial hard real-time target: 1 ms.
    2. **Calculations:**
       - Divergence ratio: 100 ms / 1 ms = 100x.
    3. **Conclusion & Interpretation:**
       - **Result: A cloud response budget is 100x larger than the critical 1 ms hardware interrupt reaction time (Latency-Bound).**
  options:
  - 100 ms (Typical for a cloud service response)
  - 33 ms (Typical for a real-time video frame on an edge device)
  - 16 ms (The budget to avoid UI 'jank' on a mobile device)
  - 1 ms (The budget for a hardware interrupt)
