title: The Real-Time Wakeword Deadline
scenario: You are designing a keyword-spotting (KWS) system for a smart device using a Cortex-M4 microcontroller running at 168 MHz. The audio pipeline feeds you a new 1000ms (1-second) chunk of audio for analysis, and you must process it before the next chunk arrives to avoid dropping data. Your KWS model requires exactly 70 Million Floating Point Operations (MFLOPs) to run one inference.
question: Can a 168 MHz Cortex-M4 finish a 70 MFLOP KWS inference before the next 1000 ms audio chunk arrives?
details:
  realistic_solution: 'Yes, the system meets its deadline. Cortex-M4 at 168 MHz with DSP delivers ~336 MFLOPS (2 FLOPS/cycle via single-cycle FMA). Model: 70 MFLOPs. Inference time = 70,000,000 / 336,000,000 = 208 ms. Deadline: 1,000 ms (next audio chunk). Since 208 ms < 1,000 ms, deadline is met with 792 ms slack (79.2% idle). This slack absorbs: MFCC feature extraction (~20 ms), interrupt overhead (~5 ms), I/O buffering (~5 ms). MCU can sleep for ~750 ms per cycle, saving significant power. Note: with a 250 ms sliding window stride, 208 ms barely fits (42 ms slack = 17% margin), making optimization critical.'
  common_mistake: |
    **The Pitfall:** Confusing microcontroller clock speed (MHz) with floating-point performance (MFLOPS).
    **The Rationale:** Engineers often assume a 1:1 ratio between clock cycles and FLOPs, ignoring superscalar execution or FMA instructions.
    **The Consequence:** The latency is calculated as 2x longer than reality, leading to over-optimization or rejecting a feasible hardware platform.
  napkin_math: |
    **Assumptions & Constraints:**
    - Clock speed: 168 MHz Cortex-M4.
    - Peak Compute: FPU supports single-cycle FMA (2 FLOPS/cycle).
    - Workload: 70 MFLOPs per inference.
    - Deadline: 1000 ms (1 second).

    **Calculations:**
    - Peak Throughput: 168 MHz * 2 FLOPS/cycle = 336 MFLOPS.
    - Inference Latency: 70 MFLOPs / 336 MFLOPS = 0.208 seconds = 208 ms.
    - Slack: 1000 ms - 208 ms = 792 ms.

    **Conclusion & Interpretation:**
    - **Result: 208 ms (Compute-Bound)**. The inference safely meets the 1000 ms deadline with 79% idle slack.
  options:
  - No, it will take ~417 ms.
  - No, it will take ~4.8 seconds.
  - Yes, it will take ~208 ms.
  - Yes, it will take only 0.208 ms.
