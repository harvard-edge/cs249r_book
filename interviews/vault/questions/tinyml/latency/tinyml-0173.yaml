title: The 1ms Interrupt Budget
scenario: You are designing a keyword spotting system on a Cortex-M4 microcontroller. The system uses DMA to fill an audio buffer, which then triggers an interrupt.
question: To ensure the system feels instantaneous and never misses an audio packet, what is the typical latency budget for the Interrupt Service Routine (ISR) that handles this trigger?
details:
  realistic_solution: Design the real-time ISR to perform the absolute minimum work required, acknowledging the interrupt and swapping buffer pointers before returning control to the RTOS.
  common_mistake: |
    **The Pitfall:** Assuming latencies are in the tens or hundreds of milliseconds.
    **The Rationale:** Engineers accustomed to cloud or mobile development confuse a hard real-time interrupt deadline with softer deadlines like UI 'jank' budgets or web request latencies.
    **The Consequence:** An ISR that takes 16ms will block other critical system interrupts (like timers) and lead to catastrophic system failure and data loss.
  napkin_math: |
    **Assumptions & Constraints:**
    - MCU: Cortex-M4.
    - Task: Audio DMA interrupt servicing.

    **Calculations:**
    - Hard Real-Time Constraint: ~1 ms limit.
    - Context Switch & minimal buffer swap operations: ~100s of cycles (~1-2 µs).

    **Conclusion & Interpretation:**
    - **Result: 1 ms budget (Latency-Bound)**. The ISR is strictly latency-bound; exceeding this blocks other critical system interrupts like OS ticks.
  options:
  - ~100 ms
  - ~33 ms
  - ~16 ms
  - ~1 ms
  correct_index: 3
