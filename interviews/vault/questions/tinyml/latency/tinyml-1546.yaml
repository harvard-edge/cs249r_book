title: Cortex-M4 Audio Buffer Overflow
scenario: A microphone triggers an interrupt on a Cortex-M4, appending an INT8 audio packet to a 100-packet
  buffer strictly every 10ms. Due to a DSP software regression, processing a packet now takes 12ms.
question: What is the time elapsed from an empty buffer until the system drops its first audio packet?
visual:
  kind: svg
  path: tinyml-1546.svg
  alt: Linear growth chart showing the buffer filling up steadily over 5 seconds until it hits the 100-packet
    cap.
  caption: Deterministic Buffer Growth
details:
  realistic_solution: Packets arrive every 10ms, but service takes 12ms. The net queue growth is 1/60th
    of a packet per millisecond (arriving at 1/10 ms, processing at 1/12 ms). To accumulate a backlog
    of 100 packets, it will take 100 / (1/10 - 1/12) = 6000 milliseconds. Therefore, overflow occurs exactly
    at 6.0 seconds.
  common_mistake: '**The Pitfall:** Calculating based purely on queueing theory probability distributions.

    **The Rationale:** Candidates fail to recognize this as a strictly deterministic overflow scenario,
    overcomplicating the analysis.

    **The Consequence:** Wasting time on complex probability models instead of simple deterministic arithmetic.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Arrivals strictly every 10ms.

    - Service time is 12ms.

    - Buffer capacity is 100 packets.


    **Calculations:**

    - Arrival rate = 1 packet / 10ms = 0.1 packets/ms.

    - Service rate = 1 packet / 12ms ≈ 0.0833 packets/ms.

    - Net growth rate = 0.1 - 0.0833 = 1/60 packets/ms.

    - Time to overflow = 100 packets / (1/60 packets/ms) = 6000ms.


    **Conclusion & Interpretation:**

    - **Result: 6.0 seconds (Compute-Bound Deterministic Overflow)**. The system will drop its first packet
    at exactly 6.0 seconds.

    '
