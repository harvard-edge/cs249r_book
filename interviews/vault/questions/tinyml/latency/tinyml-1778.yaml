title: Analyzing Queue Capacity During Traffic Bursts
scenario: A smart sensor cluster sends events to a Cortex-M4 at 5 events/sec. The MCU processes events
  in exactly 150ms.
question: Analyze the utilization of the MCU and predict if the system can handle a temporary burst of
  10 events/sec for 2 seconds.
details:
  realistic_solution: Queueing theory demonstrates that transient overload can be absorbed if sustained
    utilization (rho) is strictly less than 1. By buffering the 6.7 unhandled events during the burst,
    the system gracefully degrades in latency without dropping payload.
  common_mistake: '**The Pitfall:** Assuming a burst rate greater than the processing rate instantly drops
    events.

    **The Rationale:** Candidates ignore the transient absorption capacity of the queue and focus only
    on instantaneous bandwidth.

    **The Consequence:** They drastically over-provision hardware instead of relying on memory buffers
    to smooth out temporal peaks.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - Normal rate: 5 events/sec. Processing time: 150\
    \ ms/event.\n   - Burst rate: 10 events/sec for 2 seconds.\n2. **Calculations:**\n   - Normal utilization:\
    \ 5 events/sec * 0.150 sec = 0.75 (75%).\n   - Burst total arrivals: 10 events/sec * 2 sec = 20 events.\n\
    \   - MCU processing capacity during burst: 2 sec / 0.150 sec/event = 13.33 events.\n   - Queued events:\
    \ 20 - 13.33 = 6.67 events.\n3. **Conclusion & Interpretation:**\n   - **Result: 6.7 events are queued\
    \ and safely drain post-burst because baseline utilization is 0.75 (Queue-Bound).**\n"
