title: 'Calculate End-to-End Wake Word Pipeline Latency'
scenario: 'You are deploying a quantized INT8 keyword spotting model on a Cortex-M4. The end-to-end pipeline requires 8 ms for MFCC audio preprocessing and 1 ms for post-processing. The neural network requires exactly 1,680,000 MAC operations per inference.'
question: 'What is the theoretical end-to-end Cortex-M4 wake-word latency including MFCC, inference, and post-processing assuming 100% MAC utilization?'
details:
  realistic_solution: 'The correct approach decomposes the pipeline into its distinct stages and sums their latencies. For the inference stage, the hardware throughput must be calculated by multiplying the clock rate by the SIMD MAC operations per cycle. The theoretical minimum inference time is then derived and added to the fixed peripheral processing times to establish the final end-to-end latency.'
  common_mistake: |
    **The Pitfall:** Forgetting the SIMD throughput multiplier or ignoring non-inference pipeline stages.
    **The Rationale:** Candidates often treat an INT8 MAC as 1 cycle and focus purely on the neural network, neglecting the fixed preprocessing latency.
    **The Consequence:** The calculated end-to-end latency is drastically incorrect, leading to faulty system requirements and missed real-time deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Preprocessing: 8 ms.
    - Post-processing: 1 ms.
    - Network MACs: 1,680,000.
    - Cortex-M4 Clock: 168 MHz.
    - SIMD MAC throughput: 2 INT8 MACs/cycle.

    **Calculations:**
    - MAC throughput: 168,000,000 cycles/sec × 2 MACs/cycle = 336,000,000 MACs/sec.
    - Inference latency: 1,680,000 / 336,000,000 = 0.005 seconds (5 ms).
    - Total pipeline latency: 8 ms (MFCC) + 5 ms (inference) + 1 ms (post-processing) = 14 ms.

    **Conclusion & Interpretation:**
    - **Result: 14 ms (Compute-Bound)**. The end-to-end latency heavily depends on hardware SIMD throughput and fixed peripheral processing times.
