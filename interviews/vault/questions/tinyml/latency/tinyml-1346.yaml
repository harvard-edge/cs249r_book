title: Latency Decomposition for TinyML Keyword Spotting on Cortex-M7 + Ethos-U55
scenario: 'You are tasked with deploying a keyword spotting model on an embedded system featuring an ARM Cortex-M7 processor (480 MHz) paired with an Ethos-U55 NPU configured for 256 MAC/cycle and 512 KB SRAM. Your team has developed two candidate models, Model A and Model B, which offer comparable accuracy. The critical requirement is minimizing end-to-end latency. Design an evaluation strategy to decompose the end-to-end latency for both models into the following key components: first-result latency (time until the first inference result is produced, including initial setup), per-inference latency for subsequent frames, network transfer time (e.g., sensor data acquisition to device, or inter-chip communication), preprocessing time (typically on Cortex-M7), and postprocessing time (typically on Cortex-M7).'
question: How would you compare Model A and Model B using first-result, per-inference, transfer, preprocessing, NPU, and postprocessing latency?
details:
  realistic_solution: Implement precise timing mechanisms using hardware cycle counters on the Cortex-M7 and leverage any performance counters provided by the Ethos-U55 NPU. Utilize an integrated profiling framework capable of capturing execution times on both the CPU and NPU. Analyze data transfer bottlenecks by monitoring memory bandwidth usage and cache misses. For network latency, simulate or measure actual sensor data acquisition and inter-chip communication overhead. Optimize data formats, minimize data copies, and explore DMA for efficient data movement between components. The final recommendation should stem from a holistic analysis of how each model's architecture influences the performance of all decomposed latency stages, including the partitioning of operations between CPU and NPU.
  common_mistake: |
    **The Pitfall:** Ignoring inter-processor communication overhead or assuming NPU inference time is the only dominant factor.
    **The Rationale:** Candidates overlook the impact of varying model architectures on memory access patterns, cache utilization, and CPU-NPU synchronization.
    **The Consequence:** Inaccurate latency estimations and failing to identify the true system bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model A CNN: 500,000 MACs.
    - Model B CNN: 350,000 MACs but 0.4 ms extra CPU postprocessing.
    - Ethos-U55: 256 MAC/cycle at 480 MHz.
    - First-result setup/model invocation overhead: 0.5 ms.
    - Preprocessing (M7): 2 ms.
    - I/O Transfer: 1 ms.
    - Model A postprocessing: 0.2 ms.
    - Model B postprocessing: 0.6 ms.

    **Calculations:**
    - Model A NPU cycles = 500,000 / 256 ≈ 1,953 cycles; inference time = 1,953 / 480 MHz ≈ 0.004 ms.
    - Model B NPU cycles = 350,000 / 256 ≈ 1,367 cycles; inference time = 1,367 / 480 MHz ≈ 0.003 ms.
    - Model A first-result latency = 1.0 ms I/O + 2.0 ms preprocessing + 0.5 ms setup + 0.004 ms inference + 0.2 ms postprocessing = 3.704 ms.
    - Model B first-result latency = 1.0 ms I/O + 2.0 ms preprocessing + 0.5 ms setup + 0.003 ms inference + 0.6 ms postprocessing = 4.103 ms.
    - Model A per-inference latency after setup = 1.0 + 2.0 + 0.004 + 0.2 = 3.204 ms.
    - Model B per-inference latency after setup = 1.0 + 2.0 + 0.003 + 0.6 = 3.603 ms.

    **Conclusion & Interpretation:**
    - **Result: choose Model A in this example despite more MACs (CPU/I-O-Bound)**. NPU time is only microseconds, so preprocessing, transfer, setup, and postprocessing dominate the first-result and steady-state per-inference recommendation.
