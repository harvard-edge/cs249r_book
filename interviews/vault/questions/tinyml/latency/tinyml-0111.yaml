title: The Interrupt Latency Impact
scenario: Your industrial vibration monitor runs a 25ms inference on a Cortex-M4 at 168 MHz. A high-priority sensor interrupt fires every 100 µs (10 kHz). The ISR requires 2.5 µs to execute, but CPU pipeline disruptions add further overhead.
question: How do you calculate the effective inference time under interrupt load, and at what sensor sampling rate does the system miss the 30ms inference deadline?
details:
  realistic_solution: Interrupts act as a hidden computational tax. The effective execution time is `Base Time / (1 - Overhead)`. At 10 kHz, a 2.5 µs ISR consumes 2.5% of the CPU, but context-switching and pipeline flushing often increase the effective overhead to ~4 µs per interrupt. To guarantee the 30ms deadline with a 25ms baseline, the maximum allowable interrupt overhead is 16.67%. Using the realistic 4 µs overhead, the maximum sustainable sampling rate is 41.7 kHz. The optimal solution is to offload the SPI transfer to hardware DMA.
  common_mistake: |
    **The Pitfall:** Treating interrupts as instantaneous and ignoring context-switch overhead.
    **The Rationale:** Candidates calculate raw compute time but ignore the cycle-stealing nature of ISRs, including pushing registers to the stack and flushing the instruction pipeline.
    **The Consequence:** The main inference loop is starved of cycles, causing the device to continuously miss strict real-time deadlines in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - 25ms baseline inference, 30ms hard deadline.
    - ISR raw execution = 2.5 µs, effective execution = 4 µs.

    **Calculations:**
    - Allowable overhead: (30ms - 25ms) / 30ms = 16.67%.
    - At 10 kHz: 4 µs / 100 µs = 4% overhead -> 25ms / (1 - 0.04) = 26.04 ms.
    - Max rate (theoretical 2.5 µs): 16.67% / 2.5 µs = 66.7 kHz.
    - Max rate (effective 4 µs): 16.67% / 4 µs = 41.7 kHz.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound ISR Overhead**. With realistic pipeline disruption, any sampling rate above 41.7 kHz will breach the 30ms deadline, demanding a DMA-based zero-copy architecture.
