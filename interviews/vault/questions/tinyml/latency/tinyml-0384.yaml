title: 'The Real-Time KWS Deadline'
scenario: 'You are building a "Hey, Genie" keyword spotting (KWS) device on a Cortex-M4 microcontroller. The model analyzes 1-second (1000ms) audio clips to detect the keyword. To ensure the system is responsive and doesn''t miss a command, you implement a sliding window approach, starting a new inference every 250ms (a 75% overlap between consecutive clips). Your trained KWS model requires exactly 80 MFLOPs to process one full audio clip.'
question: 'Based on the hardware constants, can this MCU architecture keep up with the continuous stream of audio data without falling behind?'
details:
  realistic_solution: 'Yes, the MCU can keep up, but just barely. The Cortex-M4 provides approximately 336 MFLOPS of compute performance. To calculate the time required for one inference, we divide the model''s workload (80 MFLOPs) by the MCU''s performance (336 MFLOPS). This gives us an inference time of ~238.1 milliseconds. Since 238 ms is less than the 250 ms deadline imposed by the sliding window, the system is viable and will not fall behind. It has a slack of about 12 ms per inference cycle.'
  common_mistake: 'Two common errors. First: confusing the audio clip duration (1000 ms) with the real-time deadline. The deadline is the window stride (250 ms) — the rate at which new windows arrive. Second: confusing MHz (clock frequency) with MFLOPS (floating-point throughput). 168 MHz is not 168 MFLOPS. The Cortex-M4 executes ~2 FLOPS per cycle, giving 336 MFLOPS. Mixing these units produces nonsense answers.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4 Clock: 168 MHz.
    - Throughput: 2 FLOPS/cycle.
    - Model Workload: 80 MFLOPs.
    - Stride Deadline: 250 ms.

    **Calculations:**
    - Peak Compute = 168 MHz * 2 FLOPS/cycle = 336 MFLOPS.
    - Inference Time = 80 MFLOPs / 336 MFLOPS = 0.2381 s = 238 ms.
    - Slack = 250 ms - 238 ms = 12 ms.

    **Conclusion & Interpretation:**
    - **Result: 238 ms (Compute-Bound)**. The inference easily runs within the real-time window, leaving a 12 ms slack to handle OS and feature extraction overhead.
  options:
  - "Yes. The MCU takes ~238 ms per inference (80 MFLOPs / 336 MFLOPS), which is less than the 250 ms deadline from the window stride."
  - "Yes, easily. The MCU's inference time of ~238 ms is much shorter than the 1000 ms audio clip, leaving over 750 ms of slack."
  - "No. The MCU is too slow. The required processing time is 4.2 seconds (80 MFLOPs / 20 MFLOPS at 10 MHz effective throughput), which badly misses the 250 ms deadline."
  - "No. The system needs to process 4 windows per second (1000ms / 250ms), requiring 320 MFLOPS (4 * 80), but the MCU only runs at 168 MHz."
