title: Mitigating Shared SRAM Contention in U55
scenario: 'You are deploying a predictive maintenance model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform to meet a strict 10ms real-time deadline per sensor reading. The system features a 480 MHz M7 and 512 KB of shared SRAM. While the Ethos-U55 is configured for 256 MAC/cycle, sporadic inference latencies spike to 12ms when the M7 concurrently processes high-frequency sensor interrupts and logs data into the same SRAM.'
question: 'Why do Ethos-U55 latencies spike to 12 ms when M7 sensor interrupts log into the shared 512 KB SRAM, and how is it resolved?'
details:
  realistic_solution: 'The bottleneck is AXI bus contention for the shared 512 KB SRAM. The M7''s continuous memory accesses during interrupts stall the U55''s DMA memory controller. The solution is to isolate memory traffic: map the M7''s sensor logging buffers and stack/heap to the M7''s Tightly Coupled Memory (TCM), which has a dedicated internal bus, and reserve the main 512 KB SRAM exclusively for the U55''s tensors. This eliminates bus contention and allows the U55 to hit its peak MAC utilization.'
  common_mistake: |
    **The Pitfall:** Suggesting the model be aggressively pruned or quantized further to speed up compute.
    **The Rationale:** Candidates see a latency spike and assume the NPU compute pipeline is too slow.
    **The Consequence:** The model accuracy drops, but the latency spikes persist because the root cause (AXI bus contention over SRAM) remains completely unaddressed.
  napkin_math: |
    **Assumptions & Constraints:**
    - System: 480 MHz Corstone-300.
    - Deadline: 10 ms.
    - Model: 20M MACs.

    **Calculations:**
    - Ethos-U55 peak compute = 480 MHz * 256 MAC/cycle = 122.8 GMAC/s.
    - Ideal compute time for 20M MACs = 0.16 ms.
    - Ideal memory R/W (400 KB) = ~0.21 ms latency.
    - Total ideal latency = ~0.4 ms.
    - Bus contention stalls U55 DMA memory fetches, forcing a 50x latency penalty (> 10 ms).

    **Conclusion & Interpretation:**
    - **Result: Isolating M7 to TCM drops latency from 12 ms back to ~0.4 ms (Latency-Bound AXI Bus Contention)**. Memory bus contention degrades NPU performance far more than raw compute limits.
