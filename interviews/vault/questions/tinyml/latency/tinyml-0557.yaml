title: The Timer-Driven Inference Scheduler
scenario: Your air quality monitoring system runs inference every 30 seconds on a
  Cortex-M0+ (48 MHz, 32 KB SRAM). A junior engineer implements the schedule using
  `HAL_Delay(30000)` — a busy-wait delay. The system works but draws 12 mA continuously.
question: How should the timer-driven inference schedule be redesigned to reduce average
  current below 50 microamps?
details:
  realistic_solution: 'Replace HAL_Delay (busy-wait at 12mA continuous) with LPTIM
    or RTC wake-from-STOP-mode. Configure LPTIM to fire every 30s, then enter STOP2
    mode (draws ~2uA). On wake: run inference (~12ms at 12mA = 0.115mAh per day),
    then immediately re-sleep. Average current: (12mA * 12ms + 2uA * 29,988ms) / 30,000ms
    = 6.8uA. Battery life on CR2477 (1000mAh): 1000/0.163 = 6,134 days (16.8 years)
    vs 3.5 days with busy-wait. That is a 1,750x improvement from one architectural
    change — the difference between a disposable prototype and a deployed sensor.'
  common_mistake: '"Use `sleep()` instead of `HAL_Delay()`." The standard `sleep()`
    on bare-metal MCUs is often just another busy-wait, or at best enters a light
    sleep that still draws milliamps.'
  napkin_math: '**Assumptions & Constraints:**

    - HAL_Delay (Busy-wait): 12 mA continuous.

    - LPTIM + STOP2 Mode: 2 µA idle, 12 mA for 12 ms active.

    - Battery: CR2477 (1000 mAh).


    **Calculations:**

    - Busy-wait current = 12 mA.

    - Busy-wait life = 1000 mAh / (12 mA * 24h) ≈ 3.5 days.

    - STOP2 Average Current = (12 mA * 12 ms + 0.002 mA * 29,988 ms) / 30,000 ms ≈
    0.0068 mA (6.8 µA).

    - STOP2 life = 1000 mAh / (0.0068 mA * 24h) ≈ 6,134 days (16.8 years).


    **Conclusion & Interpretation:**

    - **Result: 16.8 years vs 3.5 days (Power-Bound)**. Using a hardware timer and
    deep sleep extends battery life by 1,750x, moving the design from a prototype
    to a deployable sensor.

    '
