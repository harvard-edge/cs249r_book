title: Evaluate minimal queue capacity for transient TinyML sensor bursts
scenario: A Cortex-M4 microcontroller handles anomaly detection from vibration sensors. The model takes 5ms to run. Sensor spikes cause arrivals at 150 events/second in transient 1-second bursts, though the average is 50 events/second.
question: Assuming the 150 burst events are evenly spaced across the 1-second interval, what is the minimum pending-event queue capacity required to ensure zero dropped events?
details:
  realistic_solution: The MCU can process 1 event every 5ms, which equals a service rate of 200 events/second. If 150 events are evenly spaced over 1 second, the inter-arrival time is 1000ms / 150 = 6.67ms. Since each event finishes in 5ms before the next event arrives, the pending backlog never grows above zero. Under this deterministic burst model, no pending queue slots are required beyond the event currently being serviced; a real implementation may still provision a small queue for ISR handoff or arrival jitter.
  common_mistake: |
    **The Pitfall:** Allocating a queue size of 150.
    **The Rationale:** Candidates incorrectly assume that 150 events/second means 150 items must be buffered at once.
    **The Consequence:** They waste precious SRAM on a large queue when the system is actually draining faster than it fills.
  napkin_math: |
    **Assumptions & Constraints:**
    - Service Time: 5 ms/event.
    - Burst: 150 events evenly spaced over 1 second.
    - Queue capacity counts pending events, excluding the event currently in service.

    **Calculations:**
    - Service Rate: 1000 ms / 5 ms = 200 events/sec.
    - Inter-arrival time: 1000 ms / 150 = 6.67 ms/event.
    - Service completes 6.67 - 5 = 1.67 ms before the next arrival.
    - Maximum pending backlog: 0 events under the evenly spaced model.

    **Conclusion & Interpretation:**
    - **Result: 0 pending slots for the ideal evenly spaced burst (Compute-Bound).** A larger queue is needed only if arrivals are jittery or front-loaded; in the arbitrary worst case where all 150 arrive at once, the pending queue would need 149 slots while one event is processed.
