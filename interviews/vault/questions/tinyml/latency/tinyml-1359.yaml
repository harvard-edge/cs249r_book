title: 'Optimizing Latency for a TinyML Model on nRF5340'
scenario: 'You are deploying a real-time anomaly detection model on an nRF5340 SoC. The model must process sensor data with a strict 10ms latency budget per inference, but initial tests show execution consistently exceeding 50ms.'
question: 'Describe a detailed profiling methodology to identify whether the bottleneck is compute, memory access, or I/O, utilizing standard embedded development tools.'
details:
  realistic_solution: "A systematic approach involves:\n1.  **Baseline Measurement:** Use the nRF Connect SDK's built-in timers or GPIO toggling to precisely measure the total inference time and key sub-components.\n2.  **CPU Profiling:** Leverage the ARM Cortex-M33's DWT (Data Watchpoint and Trace) unit to count CPU cycles for specific code blocks. Use a debugger (e.g., GDB via VS Code) to halt execution and inspect the call stack.\n3.  **Memory Profiling:** Monitor peak SRAM usage during inference using the linker map file and runtime heap monitors. Evaluate flash access patterns for models stored in flash.\n4.  **I/O Profiling:** Measure the time taken for sensor data acquisition via SPI/I2C/UART. If BLE is active, monitor radio duty cycle impact with nRF Sniffer."
  common_mistake: |
    **The Pitfall:** Jumping straight to model architecture optimization (e.g., pruning, quantization) or assembly rewriting without profiling.
    **The Rationale:** Developers often assume the bottleneck is raw compute capacity without verifying memory access patterns or I/O contention constraints.
    **The Consequence:** Wasted engineering effort on model compression while the actual system remains I/O bound or stalls on cache/memory bus contention.
  napkin_math: |
    **Assumptions & Constraints:**
    - 128 MHz clock ≈ 7.8 ns/cycle.
    - Target latency = 10 ms = 1,280,000 cycles.
    - Typical MAC on Cortex-M33 with DSP takes 1-2 cycles.
    - Flash read speed = 1 MB/s.

    **Calculations:**
    - For compute: 10M MACs * 1 cycle/MAC * 7.8 ns = 78 ms (compute bound).
    - For memory I/O: 10 KB loaded from Flash to SRAM at 1 MB/s = 10 KB / 1 MB/s = 0.01s = 10 ms (I/O bound).

    **Conclusion & Interpretation:**
    - **Result: Profiling-Dependent (Compute or I/O Bound)**. Mathematical boundaries show the model could easily be compute-bound (>1.28M MACs) or I/O bound (frequent flash reads), proving why hardware-in-the-loop cycle-accurate profiling (e.g., DWT tracing) is mandatory before software optimization.
