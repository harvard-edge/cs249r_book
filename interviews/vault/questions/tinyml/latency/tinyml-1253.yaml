title: Optimizing SIMD Utilization and Memory Stalls on Cortex-M4
scenario: You have deployed a keyword spotting CNN on an ARM Cortex-M4 (STM32F4) microcontroller running at 168 MHz with 256 KB SRAM and 1 MB flash. The system requires a strict 20ms inference latency, but your initial profiling shows it takes 50ms. A trace reveals that during the heaviest convolution layers, the CPU is only performing useful MAC operations 30% of the time, despite using the CMSIS-NN library which supports 2x INT8 MACs per cycle.
question: How do you diagnose the root cause of this poor utilization, and what architectural or memory-level changes do you make to hit your 20ms target?
details:
  realistic_solution: |
    The candidate should identify that 30% useful-MAC utilization implies a memory bandwidth, alignment, cache/Flash wait-state, or pipeline stall bottleneck rather than a pure compute-capacity deficit. They should use hardware trace tools (e.g., ITM/ETM), cycle counters, and layer-level profiling to measure stalls, then fix the measured cause: align tensors and kernels for CMSIS-NN SIMD instructions, choose the layout expected by the specific kernel, place only hot tiles or small lookup tables in SRAM, and double-buffer Flash reads when full weight residency is impossible.
  common_mistake: |
    **The Pitfall:** Immediately suggesting aggressive model compression (pruning or quantization) to solve the latency deficit.
    **The Rationale:** Engineers assume slow performance equals a model that is simply "too big," ignoring hardware execution traces that explicitly show low CPU utilization.
    **The Consequence:** Unnecessary accuracy loss through compression without actually fixing the underlying memory alignment or layout bottleneck, failing to maximize the hardware's existing capabilities.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4 Clock: 168 MHz. Target latency: 20 ms.
    - SIMD Engine: 2 INT8 MACs/cycle.
    - Observed baseline: 50 ms.
    - Useful MAC utilization in the trace: 30%.
    - Let W be the model's MAC count; do not assume a MAC count that was not measured.

    **Calculations:**
    - Peak Compute: 168 MHz × 2 = 336 MMACs/sec.
    - If the trace reports 30% useful-MAC utilization over 50 ms, effective throughput is 0.30 × 336 = 100.8 MMAC/s.
    - Inferred workload from that trace = 100.8 MMAC/s × 0.050 s = 5.04 MMAC.
    - Ideal compute time for the same workload at peak = 5.04 MMAC / 336 MMAC/s = 15 ms.
    - Non-useful elapsed time = 50 ms - 15 ms = 35 ms.
    - To hit 20 ms without changing the model, non-useful time must fall to at most 20 ms - 15 ms = 5 ms, so about 30 ms of stalls must be removed.

    **Conclusion & Interpretation:**
    - **Result: reduce measured stalls by about 30 ms for this trace-derived workload.** The trace supports diagnosing a memory or pipeline bottleneck; layout, alignment, SRAM tiling, and Flash-wait-state fixes must be measured to show the useful-MAC time plus remaining stalls is under 20 ms.
