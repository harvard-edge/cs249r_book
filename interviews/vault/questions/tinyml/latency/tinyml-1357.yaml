title: Optimizing TinyML Latency on ESP32-S3
scenario: You are deploying a keyword spotting TinyML model on an ESP32-S3 microcontroller. Initial testing reveals that the end-to-end inference latency is consistently exceeding 150ms, leading to noticeable delays in response.
question: Which ESP-IDF profiling metrics and tools should identify why ESP32-S3 KWS latency exceeds 150 ms?
details:
  realistic_solution: A realistic solution uses ESP-IDF profiling and tracing facilities rather than desktop GPU profilers. Add timestamps with `esp_timer_get_time()` or CPU cycle counters around audio capture, feature extraction, each inference operator, postprocessing, logging, and task handoff. Use ESP-IDF monitor logs, `perfmon` where available, FreeRTOS run-time stats, heap tracing, and ESP-PROG/JTAG with OpenOCD or SystemView for deeper traces. The metrics to inspect are task runtime by core, per-function and per-layer cycle counts, interrupt/scheduling delays, instruction and data cache behavior, heap and PSRAM allocation patterns, tensor-copy time, and SRAM-vs-PSRAM access timing.
  common_mistake: |
    **The Pitfall:** Immediately jumping to optimize the model architecture or quantization without systematically identifying the actual bottleneck.
    **The Rationale:** Engineers often assume that high latency is purely a compute limitation of the model itself rather than a system-level constraint.
    **The Consequence:** Effort is wasted optimizing CPU-bound operations when the actual issue is memory access latency to PSRAM, or vice-versa, failing to hit the target latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - ESP32-S3 Clock: 240 MHz.
    - Inference Latency: 150 ms (0.150 s).
    - External Memory: 8 MB PSRAM.

    **Calculations:**
    - Total Cycles Consumed: 240,000,000 cycles/s * 0.150 s = 36,000,000 cycles.
    - Targeting 50 ms would allow 0.050 s * 240,000,000 cycles/s = 12,000,000 cycles.
    - The trace therefore needs to explain roughly 24,000,000 excess cycles.
    - If per-layer compute is near 12M cycles but end-to-end time is 36M cycles, inspect cache misses, PSRAM stalls, tensor copies, audio I/O, and FreeRTOS scheduling to attribute the difference.

    **Conclusion & Interpretation:**
    - **Result: 36M-cycle end-to-end budget overrun.** This does not prove a memory-bandwidth bottleneck by itself; the named ESP-IDF metrics are needed to distinguish CPU compute, cache/PSRAM stalls, I/O, and scheduling overhead.
