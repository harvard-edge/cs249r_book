title: Latency Decomposition for Keyword Spotting on ARM Cortex-M4
scenario: You are tasked with deploying a real-time keyword spotting model on an ARM Cortex-M4 STM32F4 microcontroller (168 MHz clock, 256 KB SRAM, no FPU). The strict end-to-end latency requirement from audio input to detected keyword output is 100ms.
question: How would you decompose, measure, and analyze latency on this resource-constrained embedded platform to meet the target?
details:
  realistic_solution: Decompose the 100 ms budget into audio capture/DMA buffering, fixed-point MFCC preprocessing, quantized model inference, postprocessing, and output signaling. On STM32F4, measure stage boundaries with the DWT cycle counter, GPIO pulses observed on a logic analyzer, SWO/ITM logs, or J-Link/OpenOCD timing; use ETM only if the exact MCU and board expose it. Profile inference per layer with TFLM/CMSIS-NN hooks or cycle counters, not NVIDIA nsys. The rough pessimistic math shows the current 5M-MAC model at 6 cycles/MAC could take about 178.5 ms for inference alone if kernels are poorly optimized, so the plan should first measure actual kernels, reduce MACs, use CMSIS-NN INT8 paths, simplify preprocessing, or choose a smaller model before expecting the 100 ms end-to-end target to pass.
  common_mistake: |
    **The Pitfall:** Focusing only on the model inference time (TTFT/TPOT) and neglecting other significant I/O overheads.
    **The Rationale:** Developers often rely strictly on high-level library profiles and assume data acquisition, memory copying, and preprocessing are instantaneous.
    **The Consequence:** The system misses its strict latency deadlines in production because of hidden overheads like OS context switching and inefficient software-emulated fixed-point math, leading to failed system validations.
  napkin_math: |
    **Assumptions & Constraints:**
    - STM32F4 (168 MHz, no FPU).
    - Target Latency: 100 ms.
    - Model MACs: 5 million.
    - Pessimistic software fixed-point cost: ~6 cycles/MAC if optimized CMSIS-NN kernels are not used effectively.

    **Calculations:**
    - Clock cycle duration: 1 / 168 MHz ≈ 5.95 ns.
    - Total Cycles Budget: 100 ms / 5.95 ns/cycle ≈ 16.8 million cycles.
    - Pessimistic Model Inference Cycles: 5,000,000 MACs × 6 cycles/MAC = 30,000,000 cycles.
    - Inference Time: 30,000,000 cycles × 5.95 ns/cycle ≈ 178.5 ms.

    **Conclusion & Interpretation:**
    - **Result: pessimistic upper bound of 178.5 ms for inference.** This exceeds the 100 ms target before preprocessing, so the team must measure actual CMSIS-NN layer timings and either reduce MACs, fix kernel coverage, or choose a smaller model.
