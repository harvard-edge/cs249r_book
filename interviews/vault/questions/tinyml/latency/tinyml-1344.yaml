title: Latency Decomposition on Nordic nRF5340 for TinyML Inference
scenario: You are deploying a tinyML model for real-time anomaly detection on a Nordic nRF5340 SoC. The end-to-end latency budget from sensor data acquisition to decision output is 50ms. The model processes 100-byte sensor data arriving via BLE every 10ms.
question: How should you measure and optimize TTFT, TPOT, BLE, preprocessing, and postprocessing latency on nRF5340 anomaly detection?
details:
  realistic_solution: 'Define TTFT for this pipeline as the time from BLE packet arrival or sensor sample readiness to the first anomaly decision, including buffering, preprocessing, inference startup, and postprocessing. Define TPOT as the steady-state time per subsequent decision when packets arrive every 10 ms. Instrument BLE ISR entry/exit, packet copy or DMA completion, preprocessing start/end, TFLM/CMSIS-NN inference start/end, postprocessing, and application output with the nRF5340 cycle counter, GPIO toggles, or Zephyr tracing. Optimize the stage that consumes the budget: tune BLE connection interval and payload packing, avoid extra copies, keep preprocessing fixed-point, use INT8 kernels, reduce MACs or tensor arena pressure if inference dominates, and keep postprocessing constant time.'
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the model inference time (TPOT/TTFT).
    **The Rationale:** Candidates fail to account for the significant overheads of BLE communication protocols and the interrupt service routines (ISRs) for data acquisition.
    **The Consequence:** They miss the real bottleneck, leaving the system failing the 50ms latency budget despite an optimized ML model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Clock: 128 MHz.
    - BLE data: 100 bytes per packet, arriving every 10 ms.
    - Use a 1 Mbps effective payload-rate example only to sanity-check the measurement budget; actual BLE scheduling and stack overhead must be traced.
    - Preprocessing: 500 cycles; postprocessing: 200 cycles.
    - BLE ISR and queue/copy overhead: 2,000 cycles.
    - Example inference: 100,000 MACs at 10 cycles/MAC.

    **Calculations:**
    - BLE payload airtime lower bound: 100 bytes * 8 bits / 1 Mbps = 0.8 ms.
    - Measurement budget should separately record connection-event delay, ISR time, queue/copy time, and local processing instead of folding all BLE behavior into airtime.
    - ISR/queue overhead: 2,000 / 128 MHz = 0.016 ms.
    - Preprocessing: 500 / 128 MHz = 0.004 ms.
    - Example inference: 100,000 MACs * 10 cycles/MAC = 1,000,000 cycles; 1,000,000 / 128 MHz = 7.8 ms.
    - Postprocessing: 200 / 128 MHz = 0.002 ms.
    - Example local processing after packet availability: 0.016 + 0.004 + 7.8 + 0.002 = 7.822 ms.
    - TTFT is measured from packet arrival or sample readiness to first decision; TPOT is the steady-state decision interval and is bounded by max(10 ms packet cadence, measured local pipeline time) when pipelined.

    **Conclusion & Interpretation:**
    - **Result: define the timing boundary before interpreting TTFT or TPOT**. In the example, local processing is about 7.8 ms and the 10 ms BLE cadence can dominate steady-state output, but the 50 ms claim is valid only after measuring BLE scheduling jitter, Zephyr overhead, and inference on target.
