title: Audio Inference Queue
scenario: Audio frames arrive at a Cortex-M4 queue at 20 frames/sec. The model processes one frame in 40ms.
question: Summarize the relationship between arrival rate, service rate, and queue length using M/M/1 queueing principles to find the system utilization.
details:
  realistic_solution: 'The calculation reveals a utilization of 0.8. According to M/M/1 queuing theory, since the utilization is less than 1, the queue is mathematically stable. However, a non-zero wait time will still exist.'
  common_mistake: |
    **The Pitfall:** Miscalculating utilization by directly multiplying mismatched units.
    **The Rationale:** Candidates compute `20 * 40 = 800` instead of converting milliseconds to seconds.
    **The Consequence:** This incorrectly suggests a utilization > 1, leading them to wrongly conclude the system is fundamentally unstable.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival Rate (λ): 20 frames/sec.
    - Service Time: 40 ms/frame.

    **Calculations:**
    - Service Rate (μ): 1000 ms / 40 ms = 25 frames/sec.
    - Utilization (ρ): λ / μ = 20 / 25 = 0.8.

    **Conclusion & Interpretation:**
    - **Result: 0.8 Utilization (Compute-Bound).** The queue is stable but will have a non-zero wait time since queue length climbs asymptotically.
