title: 'The Real-Time Interrupt Stall'
scenario: 'You are a TinyML engineer diagnosing a fault in a smart factory sensor. The device uses a Cortex-M4 MCU (168 MHz) to monitor a conveyor belt. It runs two concurrent tasks: a vibration analysis and a temperature check.'
question: 'What scheduling fault causes the vibration analysis to miss its 1 ms deadline despite sufficient MCU compute?'
details:
  realistic_solution: 'The most likely cause is uncontrolled preemption. The 0.2ms temperature check interrupt is firing in the middle of the vibration analysis. While the MCU is fast enough to run the analysis in time, the interruption adds just enough overhead and delay to push it over the 1ms deadline. The high-priority, real-time task is being sabotaged by a low-priority, non-critical one. The solution is to use a Real-Time Operating System (RTOS) to manage priorities correctly, or, for a bare-metal system, to disable interrupts during the time-critical section of the FFT calculation to ensure it runs to completion without being preempted.'
  common_mistake: 'Engineers often blame the hardware first, suggesting a faster MCU or more memory. They might also incorrectly calculate the compute time without considering the cost of preemption (context switching and cache misses) or assume that a short interrupt task can''t impact a longer one.'
  napkin_math: |
    **Assumptions & Constraints:**
    - MCU: 168 MHz (336 MFLOPS peak). Deadline: 1ms.
    - FFT Task: 50M FLOPs. Temp Interrupt: 0.2ms every 5ms.

    **Calculations:**
    - Base FFT time: 50M / 336M = 0.149ms.
    - Worst-case preemption: 0.149ms + 0.2ms = 0.349ms (still fits).
    - If real-world FFT time approaches 0.9ms: 0.9ms + 0.2ms = 1.1ms.

    **Conclusion & Interpretation:**
    - **Result: >1ms Latency (Compute Bound / Scheduling)**. The low-priority temperature interrupt pushes the execution time over the 1ms deadline due to uncontrolled preemption.
  options:
  - 'The FFT model (0.3 MFLOPs) is too computationally expensive for the Cortex-M4 MCU to meet the 1ms deadline.'
  - 'The 2MB of available SRAM is insufficient to hold both the FFT model''s tensors and the temperature task''s state.'
  - 'The low-priority temperature check is preempting the high-priority vibration analysis, causing it to miss its deadline due to the combined execution time.'
  - 'The 168 MHz clock speed of the MCU is the bottleneck; upgrading to a 480 MHz Cortex-M7 would solve the problem.'
  correct_index: 2
