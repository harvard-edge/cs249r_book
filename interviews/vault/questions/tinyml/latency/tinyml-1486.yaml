title: Deterministic Latency on Cortex-M4 for Safety-Critical Inference
scenario: A microcontroller runs a 4-class gesture classifier for a medical device. Worst-case latency must be bounded at 50ms for safety certification (IEC 62304). Current P99 is 38ms but P999 is 120ms due to cache miss patterns on a 12KB model.
question: How should you prove a medical gesture classifier has deterministic worst-case latency under a 50 ms safety bound?
details:
  realistic_solution: Perform static Worst-Case Execution Time (WCET) analysis using tools like AbsInt aiT. Lock the model weights into TCM (Tightly Coupled Memory) if available, or restructure inference to prefetch weights into SRAM in deterministic order. Disable interrupts during inference or use strict interrupt latency budgeting. Verify with hardware cycle counters.
  common_mistake: |
    **The Pitfall:** Using standard statistical benchmarking (P99) to claim safety compliance.
    **The Rationale:** Cloud ML engineers rely on average or percentile latencies, which are invalid for safety-critical real-time constraints.
    **The Consequence:** The system passes average testing but catastrophically violates the hard 50ms deadline in production due to a cache miss storm.
  napkin_math: |
    **Assumptions & Constraints:**
    - Clock: 168MHz (168M cycles/sec).
    - Budget: 50ms = 8.4M cycles.
    - Model: 500 KMACs, 12KB weights.

    **Calculations:**
    - Base compute at 1 MAC/cycle: 500K cycles = 3ms.
    - Cache miss penalty: 10-50 cycles each.
    - Worst-case cache thrashing pushes total execution time to 120ms.

    **Conclusion & Interpretation:**
    - **Result: 120ms (Memory-Access Bound)**. Cache misses cause non-deterministic WCET failures.
