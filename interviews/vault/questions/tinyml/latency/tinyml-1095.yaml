title: ESP32-S3 Real-Time Audio Anomaly Detection Pipeline
scenario: Design a continuous audio anomaly detection system for industrial machinery using an ESP32-S3. The system must sample audio, run an INT8 ML model to detect anomalies within a strict 10ms real-time deadline per frame, and occasionally transmit alerts over WiFi. Evaluate the architectural tradeoffs and design a task and memory allocation strategy across the 240 MHz dual-core Xtensa processor, 512 KB SRAM, and 8 MB PSRAM.
question: How should ESP32-S3 isolate real-time audio inference from WiFi jitter to guarantee a 10 ms deadline?
details:
  realistic_solution: 'Architect a strictly partitioned system. Pin the audio I2S DMA interrupts and the ML inference task to Core 0, and allocate all audio buffers, INT8 model weights, and inference state strictly within the 512 KB internal SRAM for deterministic access. Pin the WiFi stack and network alerting tasks to Core 1, using a lock-free queue in SRAM to pass anomaly alerts from Core 0 to Core 1, ensuring the real-time pipeline is fully isolated from network jitter.'
  common_mistake: |
    **The Pitfall:** Placing real-time ML model weights or state in the external 8 MB PSRAM.
    **The Rationale:** Because the 8 MB PSRAM is spacious, developers naturally place large arrays there without considering the unpredictable access latency compared to internal SRAM.
    **The Consequence:** PSRAM cache misses and WiFi stack OS preemptions introduce severe latency spikes, causing the system to frequently miss its strict 10ms deadline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cycle budget: 10 ms deadline at 240 MHz = 2.4 million cycles.
    - Ideal inference: A 1M MAC INT8 model in internal SRAM takes ~0.5 ms.

    **Calculations:**
    - PSRAM penalty: If placed in PSRAM, a 10% cache miss rate (10,000 misses * ~40 cycles) adds 400,000 cycles (1.6 ms) of unpredictable stall time.
    - OS preemption penalty: A WiFi task running on the same core could introduce >5 ms of scheduling latency.

    **Conclusion & Interpretation:**
    - **Result: Guarantee 2.4M cycle budget (Latency-Bound).** Pinning inference and audio DMA to Core 0 with all buffers in 512 KB SRAM easily avoids OS and cache latency spikes.
