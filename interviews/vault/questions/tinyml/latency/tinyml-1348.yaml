title: 'Latency Decomposition and Optimization for Real-time TinyML on ESP32-S3'
scenario: 'You are tasked with deploying a real-time keyword spotting (KWS) model on an ESP32-S3, aiming for an end-to-end latency of under 100ms from audio capture to network alert. The KWS model is a small Convolutional Neural Network (CNN) that processes 1-second audio frames. The ESP32-S3 has a 240 MHz dual-core LX7 CPU, 512 KB SRAM, and 8 MB PSRAM. The system flow involves: audio acquisition (microphone via I2S), pre-processing (MFCC feature extraction), model inference, and finally, sending a small JSON alert payload via MQTT over Wi-Fi.'
question: 'How should you profile and optimize ESP32-S3 KWS latency from audio capture through MQTT alert under a 100 ms target?'
details:
  realistic_solution: 'A realistic solution involves a multi-pronged approach: 1. **Detailed Profiling**: Implement fine-grained timing mechanisms (e.g., using ESP-IDF''s `esp_timer` or toggling GPIOs for oscilloscope measurement) to measure the latency of each stage: audio acquisition buffer fill, MFCC computation, model input preparation, inference execution, post-inference processing, and MQTT message serialization/transmission. 2. **Hardware-Aware Optimization**: * **Memory Management**: Prioritize critical, frequently accessed data (e.g., MFCC buffers, active model inputs/outputs) in fast 512KB SRAM. Use the 8MB PSRAM for storing larger model weights or historical data, being mindful of its lower access speed (e.g., Octal SPI PSRAM typically offers ~100 MB/s bandwidth). * **Parallel Processing**: Leverage the dual-core architecture by dedicating one core to time-critical tasks like audio acquisition and MFCC processing, and the other core primarily to model inference, carefully managing inter-core communication overhead. * **DMA**: Utilize Direct Memory Access (DMA) for I2S audio input to offload the CPU during data transfer, allowing the CPU to perform other computations concurrently. 3. **Software/Model Optimization**: * **Model Pruning/Quantization**: Ensure the CNN is heavily quantized (e.g., 8-bit integer) and pruned to minimize size and computational load. Explore lightweight architectures designed for TinyML. * **Efficient Libraries**: Use highly optimized DSP libraries (e.g., `esp_dsp`) for MFCC calculation and efficient TinyML inference engines (e.g., TensorFlow Lite Micro). * **Network Stack Optimization**: Minimize MQTT payload size, optimize Wi-Fi connection establishment, and ensure efficient network handling to reduce transmission latency. 4. **Iterative Refinement**: Continuously profile and optimize based on measurements, understanding that optimizations in one area might expose bottlenecks in another.'
  common_mistake: 'A common mistake is to focus almost exclusively on optimizing the inference time of the ML model, neglecting the often-significant overheads of data movement, I/O operations (like I2S audio acquisition and Wi-Fi transmission), and memory access patterns (especially the performance difference between SRAM and PSRAM). Developers might also overlook the impact of software architecture, task scheduling, and interrupts on the overall system responsiveness, or fail to accurately profile the actual time spent in each component rather than relying on theoretical estimates.'
  napkin_math: |
    **Assumptions & Constraints:**
    - PSRAM Bandwidth: 100 MB/s (Octal SPI)
    - Single core clock: 240 MHz (240,000,000 cycles/second)
    - Model load size: 2 MB
    - MFCC processing: 24,000,000 cycles

    **Calculations:**
    - Time to load 2MB model = 2 MB / 100 MB/s = 0.02 seconds = 20 ms
    - Time for MFCC processing = 24,000,000 cycles / 240,000,000 cycles/s = 0.1 seconds = 100 ms

    **Conclusion & Interpretation:**
    - **Result: >120 ms (Latency-Bound)**. The 20ms memory load consumes 20% of the budget, and DSP tasks like MFCC single-core blow the budget completely.
