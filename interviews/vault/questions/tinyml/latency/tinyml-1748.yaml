title: Sensor Queue Buildup Analysis
scenario: An industrial Cortex-M4 receives vibration samples randomly at an average rate of 20 per second (Poisson process). The NN inference takes exactly 35 ms per sample.
question: What is the system's expected wait time in the queue, and can the MCU maintain stability without dropping packets?
details:
  realistic_solution: |
    Since the arrival rate is less than the service rate, the queue is stable. However, because arrivals are a Poisson process, temporary bursts will cause a queue to build up. We must use M/D/1 queue formulas to determine the expected wait time.
  common_mistake: |
    **The Pitfall:** Using deterministic uniform arrivals instead of Poisson to model the system.
    **The Rationale:** Candidates see that the average inter-arrival time (50ms) is greater than the service time (35ms) and mistakenly assume no queue will ever build up.
    **The Consequence:** They conclude there is zero wait time, failing to account for random bursts that cause queuing delays and potential packet drops.
  napkin_math: |
    1. Arrival rate (lambda, λ) = 20 / sec.
    2. Service time = 0.035 sec.
    3. Service rate (mu, μ) = 1 / 0.035 ≈ 28.57 / sec.
    4. Utilization (rho, ρ) = λ / μ = 20 / 28.57 = 0.7.
    5. Since λ (20) < μ (28.57), the queue is stable.
    6. Expected wait time (M/D/1 queue) = (ρ * service_time) / (2 * (1 - ρ)).
    7. Expected wait time = (0.7 * 35ms) / (2 * 0.3) = 40.83 ms.
    8. **The system is stable, but each sample experiences an expected wait time of ~40.8 ms before processing.**
