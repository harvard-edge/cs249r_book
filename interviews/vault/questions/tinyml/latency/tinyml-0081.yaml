title: The Keyword Spotting Latency Budget
scenario: A keyword spotting system is being designed to process an end-to-end pipeline covering audio capture, feature extraction, inference, and action.
question: How would you budget a 500ms keyword-spotting response deadline across audio capture, feature extraction, inference, and action?
details:
  realistic_solution: 'Break down the 500ms budget: Audio capture: 20ms (hop size). Feature extraction: 3ms. Inference: 1.5ms. Post-processing + action: 0.2ms. Total: **24.7ms**. Budget: 500ms. Utilization: 24.7/500 = 5%. The MCU sleeps 95% of the time'
  common_mistake: '"The model inference is the bottleneck — optimize the model." On MCUs, the non-ML pipeline stages often dominate.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Hard latency budget: 500 ms.
    - Active power: 5 mW, Sleep power: 10 µW.
    - Battery: 225 mAh coin cell at 3.3V (742 mWh).

    **Calculations:**
    - Component times: Capture (20ms) + Feature extraction (3ms) + Inference (1.5ms) + Action (0.2ms) = 24.7 ms.
    - CPU utilization: 24.7 / 500 = ~5% (95% sleep).
    - Average power: (0.05 * 5 mW) + (0.95 * 0.01 mW) = 0.2595 mW.
    - Battery life: 742 mWh / 0.26 mW = 2,854 hours (~119 days).

    **Conclusion & Interpretation:**
    - **Result: 24.7 ms latency (Power-Bound)**. The pipeline is easily within the 500ms deadline, making the overall system power-bound to extend battery life.
