title: 'Latency Decomposition: Size End-to-End Latency for Environmental Sensor TinyML Node'
scenario: 'Size the end-to-end inference latency for an air quality classification system on ESP32-S3. Sensors: CO2 (I2C, 50ms per reading), temperature (1ms), humidity (1ms). Classification model: 10K params INT8, 0.05 MOPs. Total pipeline: sensor read -> normalization -> inference -> LoRa transmission (100ms).'
question: How should end-to-end latency be sized for the ESP32-S3 air quality pipeline, including sensor reads and LoRa transmission?
details:
  realistic_solution: |
    CO2 I2C: 50ms (hardware, irreducible). Temp+humidity: 2ms. Normalization: 0.1ms. Inference: 0.05M/240M = 0.21ms. LoRa TX: 100ms. Sequential total: 152.3ms. With pipelining (sensor read overlapped with previous LoRa TX): effective cycle = max(50+2, 100) + 0.31 = 100.3ms. Measurement interval: every 5 minutes — latency largely irrelevant for duty cycle.
  common_mistake: |
    **The Pitfall:** Targeting the CO2 sensor read for software optimization.
    **The Rationale:** Candidates see 50ms and attempt to optimize it with ML, ignoring that it is an irreducible hardware integration time.
    **The Consequence:** They waste time optimizing a hardware constraint instead of pipelining reads with transmission.
  napkin_math: |
    **Assumptions & Constraints:**
    - ESP32-S3 at 240 MHz.
    - Model: 0.05 MOPs.
    - Sequential components: 50 ms (CO2), 2 ms (Temp/Hum), 0.1 ms (Norm), 100 ms (LoRa).

    **Calculations:**
    - Inference time = 0.05M Ops / 240 MHz = 0.21 ms.
    - Sequential pipeline = 50 + 2 + 0.1 + 0.21 + 100 = 152.3 ms.
    - Overlapped = max(52, 100) + 0.31 = 100.3 ms.

    **Conclusion & Interpretation:**
    - **Result: 100.3 ms (I/O-Bound)**. Effective latency drops to 100.3 ms with pipelining, enabling extreme low-power operation.
