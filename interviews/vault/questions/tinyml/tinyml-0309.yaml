title: 'The Federated Learning Energy Tax: Federated Learning'
scenario: You are evaluating two model update strategies for a fleet of 100,000 battery-powered keyword-spotting sensors. Your goal is to minimize energy consumption to maximize device lifetime and reduce Total Cost of Ownership (TCO).
question: Which update strategy uses less energy per round across the sensor fleet, a 1 MB centralized OTA or a 100 KB federated learning update with 10 epochs of local training?
details:
  realistic_solution: 'Calculate energy for every step in each strategy. Strategy A (Centralized OTA): download 1 MB over BLE at 1 Mbps = 8s at 40 mW = 320 mJ. Flash write 1 MB at 5 mJ/KB = 5,000 mJ. Total: 5,320 mJ (5.32 J) per device. Fleet: 5.32 * 100K = 532 kJ. Strategy B (Federated Learning): local training = 10 epochs * 1,000 samples * 0.5 mJ/sample = 5,000 mJ. Upload gradients 100 KB at 1 Mbps = 0.8s at 40 mW = 32 mJ. Download model 100 KB = 32 mJ. Flash write 100 KB = 500 mJ. Total: 5,564 mJ (5.56 J) per device. FL is 5% more expensive per round despite 10x less data transfer because on-device training energy (5,000 mJ) dominates. FL advantage is privacy, not energy. FL becomes favorable only if centralized requires multiple cycles.'
  common_mistake: |
    **The Pitfall:** Assuming federated learning is more energy-efficient just because the data payload is smaller.
    **The Rationale:** Engineers often focus only on the smaller data transfer size (100KB vs 1MB), forgetting to account for the significant energy tax of performing the on-device training computation.
    **The Consequence:** Selecting the wrong update strategy, resulting in slightly worse battery life when OTA would have been simpler and more efficient.
  napkin_math: |
    **Assumptions & Constraints:**
    - Strategy A (Centralized OTA): 1 MB over BLE at 1 Mbps, Flash write 1 MB at 5 mJ/KB.
    - Strategy B (Federated Learning): 10 epochs * 1000 samples * 0.5 mJ/sample compute, upload 100 KB, download 100 KB, Flash write 100 KB.

    **Calculations:**
    - Strategy A (Centralized OTA): Download 1 MB at 1 Mbps = 8 s. At 40 mW radio = 320 mJ. Flash write 1 MB at 5 mJ/KB = 5,000 mJ. Total: ~5,320 mJ (5.32 J).
    - Strategy B (Federated Learning): Local training: 10 epochs * 1,000 samples * 0.5 mJ/sample = 5,000 mJ compute.
    - FL Networking: Upload 100 KB at 1 Mbps = 0.8 s at 40 mW = 32 mJ. Download 100 KB = 32 mJ. Flash write 100 KB = 500 mJ.
    - FL Total: 5,000 + 32 + 32 + 500 = ~5,564 mJ (5.56 J).

    **Conclusion & Interpretation:**
    - **Result: FL is ~5% more expensive per round (Compute-Energy-Bound)**. FL is more expensive despite 10x less data transfer, because on-device training energy dominates.
  options:
  - 'OTA: ~5.3 J, FL: ~0.5 J. FL is 10x more efficient due to smaller data transfer.'
  - 'OTA: ~5.3 J, FL: ~5.3 J. Both strategies are approximately equivalent in total energy.'
  - 'OTA: ~5.3 J, FL: ~5.6 J. FL is slightly MORE expensive due to on-device training energy.'
  - 'OTA: ~53 J, FL: ~5.6 J. OTA is 10x more expensive.'
