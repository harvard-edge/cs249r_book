title: 'The Federated Learning Energy Tax: Federated Learning'
scenario: You are evaluating two model update strategies for a fleet of 100,000 battery-powered keyword-spotting
  sensors. Your goal is to minimize energy consumption to maximize device lifetime and reduce Total Cost
  of Ownership (TCO).
details:
  realistic_solution: 'Calculate energy for every step in each strategy. Strategy A (Centralized OTA):
    download 1 MB over BLE at 1 Mbps = 8s at 40 mW = 320 mJ. Flash write 1 MB at 5 mJ/KB = 5,000 mJ. Total:
    5,320 mJ (5.32 J) per device. Fleet: 5.32 * 100K = 532 kJ. Strategy B (Federated Learning): local
    training = 10 epochs * 1,000 samples * 0.5 mJ/sample = 5,000 mJ. Upload gradients 100 KB at 1 Mbps
    = 0.8s at 40 mW = 32 mJ. Download model 100 KB = 32 mJ. Flash write 100 KB = 500 mJ. Total: 5,564
    mJ (5.56 J) per device. FL is 5% more expensive per round despite 10x less data transfer because on-device
    training energy (5,000 mJ) dominates. FL advantage is privacy, not energy. FL becomes favorable only
    if centralized requires multiple cycles.'
  common_mistake: Engineers often over-simplify the trade-off, focusing only on the smaller data transfer
    size of federated learning (100KB vs 1MB). They forget to account for the significant energy 'tax'
    of performing the on-device training computation, which can sometimes negate the benefits of the smaller
    upload.
  napkin_math: '**Strategy A: Centralized OTA update.** Download new model: 1 MB over BLE at 1 Mbps =
    8 s at 40 mW radio = 320 mJ. Flash write: 1 MB at ~5 mJ/KB = 5,000 mJ. Total per device: ~5,320 mJ.
    Fleet (100K devices): 532 kJ. **Strategy B: Federated Learning.** Local training: 10 epochs × 1,000
    samples × 0.5 mJ/sample = 5,000 mJ compute. Upload gradients: 100 KB at 1 Mbps = 0.8 s at 40 mW =
    32 mJ. Download aggregated model: 100 KB = 32 mJ. Flash write: 100 KB at 5 mJ/KB = 500 mJ. Total per
    device: ~5,564 mJ. Fleet: 556 kJ. **Comparison:** Strategy A ≈ 5.3 J/device. Strategy B ≈ 5.6 J/device.
    FL is ~5% more expensive per round despite 10× less data transfer, because on-device training energy
    dominates. The FL advantage emerges only if you need many rounds of centralized OTA (each 5.3 J) vs.
    fewer FL rounds. The real FL benefit is **privacy**, not energy.'
  options:
  - 'OTA: ~5.3 J, FL: ~0.5 J. FL is 10x more efficient due to smaller data transfer.'
  - 'OTA: ~5.3 J, FL: ~5.3 J. Both strategies are approximately equivalent in total energy.'
  - 'OTA: ~5.3 J, FL: ~5.6 J. FL is slightly MORE expensive due to on-device training energy.'
  - 'OTA: ~53 J, FL: ~5.6 J. OTA is 10x more expensive.'
