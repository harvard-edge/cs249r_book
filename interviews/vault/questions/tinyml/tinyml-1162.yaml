title: Estimating Inference Latency for INT8 Convolution on Cortex-M4
scenario: You are deploying an audio keyword spotting model onto a Cortex-M4. The core supports CMSIS-NN SIMD instructions (2x INT8 MACs per cycle). The largest bottleneck is an INT8 2D convolution with 32 input channels, 64 output channels, a 3x3 kernel, and a 16x16 output feature map. Assume 100% compute utilization and no memory stalls.
question: What is the theoretical minimum latency of the 32-to-64 channel INT8 convolution on Cortex-M4 running at 168 MHz?
details:
  realistic_solution: First, calculate the total number of Multiply-Accumulate (MAC) operations required for the convolution layer based on the output feature map and filter dimensions. Then, determine the theoretical peak MACs per second by multiplying the clock speed (168 MHz) by the SIMD throughput (2 MACs/cycle). Finally, divide the total MACs by the peak MACs per second to find the minimum theoretical latency in seconds, converting the final result to milliseconds.
  common_mistake: |
    **The Pitfall:** Calculating latency assuming 1 MAC per cycle, ignoring the SIMD DSP extensions.
    **The Rationale:** Candidates apply generic scalar processor math and forget that ARMv7E-M architecture provides dual-MAC SIMD instructions for INT8.
    **The Consequence:** The estimated latency is doubled, leading to incorrect architectural decisions like unnecessarily pruning the model.
  napkin_math: |
    1. **Assumptions & Constraints:** Output = 16x16. Kernel = 3x3. In_Channels = 32. Out_Channels = 64. Clock = 168 MHz. Throughput = 2 MACs/cycle.
    2. **Calculations:** Total MACs = 16 * 16 * 3 * 3 * 32 * 64 = 4,718,592 MACs. Peak Throughput = 168,000,000 cycles/sec * 2 MACs/cycle = 336,000,000 MACs/sec. Minimum Latency = 4,718,592 / 336,000,000 = 0.014043 seconds.
    3. **Conclusion & Interpretation:** **Result: 14.04 ms compute-bound latency.** This represents the absolute theoretical floor; actual execution will be slightly slower due to pipeline stalls and memory load/store overhead.
