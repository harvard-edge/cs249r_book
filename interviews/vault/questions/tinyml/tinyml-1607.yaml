title: Evaluate minimal queue capacity for transient TinyML sensor bursts
scenario: A Cortex-M4 microcontroller handles anomaly detection from vibration sensors. The model takes 5ms to run. Sensor spikes cause arrivals at 150 events/second in transient 1-second bursts, though the average is 50 events/second.
question: What is the minimum queue capacity required to ensure zero dropped events during a 1-second burst of 150 events?
details:
  realistic_solution: The MCU can process 1 event every 5ms, which equals a service rate of 200 events/second. During the 1-second burst of 150 events, the processing rate (200/s) exceeds the peak arrival rate (150/s). Because the queue drains faster than it fills, a minimal queue of 1 or 2 items to handle jitter is sufficient.
  common_mistake: |
    **The Pitfall:** Allocating a queue size of 150.
    **The Rationale:** Candidates incorrectly assume that 150 events/second means 150 items must be buffered at once.
    **The Consequence:** They waste precious SRAM on a large queue when the system is actually draining faster than it fills.
  napkin_math: |
    - **Service Time:** 5 ms per event.
    - **Service Rate:** 1000 ms / 5 ms = 200 events/second.
    - **Burst Arrival Rate:** 150 events/second.
    - **Comparison:** Service Rate (200/s) > Burst Arrival Rate (150/s).
    - **Conclusion:** The MCU processes events faster than they arrive, even during a burst. A minimal queue of **1 to 2 items** (just for jitter) is sufficient.
