title: Evaluate minimal queue capacity for transient TinyML sensor bursts
scenario: A Cortex-M4 microcontroller handles anomaly detection from vibration sensors.
  The model takes 5ms to run. Sensor spikes cause arrivals at 150 events/second in
  transient 1-second bursts, though the average is 50 events/second.
question: Evaluate the minimum queue capacity required to ensure zero dropped events
  during a 1-second burst of 150 events.
details:
  realistic_solution: The MCU can process 1 event every 5ms, which equals a service
    rate of 200 events/second. During the 1-second burst of 150 events, the processing
    rate (200/s) exceeds the peak arrival rate (150/s). Because the queue drains faster
    than it fills, a minimal queue of 1 or 2 items to handle jitter is sufficient.
  common_mistake: Assuming that 150 events/second requires a queue size of 150 items,
    ignoring that the service rate exceeds the burst arrival rate.
  napkin_math: 1000ms / 5ms = 200/s service rate > 150/s arrival rate
