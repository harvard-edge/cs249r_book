title: The Real-Time Deadline
scenario: You're designing a keyword-spotting system on a Cortex-M4 microcontroller. The system continuously
  analyzes 1-second audio clips to detect a wake word. Your ML model requires **100 Million FLOPs** to
  process one clip. The Cortex-M4 provides **~336 MFLOPS** of compute. Assuming a **5ms overhead** for
  audio buffering and other post-processing, calculate the total time required to process a single clip.
  Can the system meet its hard real-time deadline of finishing one clip before the next 1-second clip
  arrives?
details:
  realistic_solution: Yes, the system can meet its deadline. The total processing time is approximately
    303 ms, which is well under the 1000 ms (1 second) budget. The inference time is the bulk of the work,
    but the 5ms overhead is crucial to include for an accurate estimate.
  common_mistake: Engineers often calculate only the raw inference time and forget to include system overheads
    like data buffering, feature extraction, or post-processing. In a real-time system, every millisecond
    counts, and failing to account for the full pipeline latency leads to missed deadlines and dropped
    frames.
  napkin_math: 'Inference time = 100M FLOPs / 336 MFLOPS = 297.6ms. Add overhead: 297.6 + 5 = 302.6ms.
    Budget = 1000ms. 302.6ms << 1000ms. Utilization = 302.6/1000 = 30.3%. Yes, meets deadline with 69.7%
    idle time for sleep/power savings.'
  options:
  - ~298 ms
  - ~303 ms
  - ~3365 ms
  - ~8 ms
  correct_index: 1
