title: The Energy Cost of an OTA Update
scenario: A battery-powered environmental sensor needs to receive a 450 KB firmware update over-the-air (OTA). The device uses a low-power microcontroller and a Bluetooth Low Energy (BLE) radio.
question: "Which phase of a 450 KB BLE OTA update usually consumes the most battery energy, and why?"
details:
  realistic_solution: Downloading the firmware image. Radio communication is one of the most energy-intensive operations on a constrained device, not because of its peak power draw, but because of the long time it must remain active to transfer a large amount of data. Even with a low-power protocol like BLE, transferring hundreds of kilobytes can take tens of seconds, far longer than any on-chip computation or memory operation.
  common_mistake: |
    **The Pitfall:** Focusing on the peak power consumption of the CPU.
    **The Rationale:** Assuming CPU-intensive tasks like verification are the most expensive, while forgetting that the long duration of radio transmission dominates total energy (Power x Time).
    **The Consequence:** Optimizing the wrong phase of the OTA update and failing to extend battery life.
  napkin_math: |
    * **Radio Rx Phase:** At 20 KB/s, receiving 450 KB takes 22.5s. Active BLE draws ~15mA at 3.3V (50 mW) = 1,125 mJ.
    * **Flash Write Phase:** Erasing/writing to internal Flash takes ~10ms per 4KB page, drawing 20mA (66 mW). Flash time = 1.1s = ~74 mJ.
    * **Result:** The Radio Rx phase consumes **~15x more energy** than writing to Flash.
  options:
  - Writing the 450 KB image to the internal flash memory
  - Downloading the 450 KB image via the BLE radio
  - Verifying the cryptographic signature of the downloaded image
  - Rebooting the device to activate the new firmware
  correct_index: 1
