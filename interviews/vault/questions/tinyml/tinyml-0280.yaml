title: The TinyML Tensor Arena
scenario: 'You are optimizing a keyword spotting model for a microcontroller with 256 KB of SRAM. TensorFlow
  Lite for Microcontrollers uses a ''tensor arena'' to manage memory for activations. The model''s data
  flow is: `Tensor A (Input) -> Layer 1 -> Tensor B -> Layer 2 -> Tensor C -> Layer 3 -> Tensor D (Output)`.
  The sizes are: Tensor A = 10 KB, Tensor B = 40 KB, Tensor C = 20 KB, and Tensor D = 2 KB. To minimize
  the SRAM footprint, explain how you would calculate the required tensor arena size, and then calculate
  that minimum size.'
question: "What minimum tensor arena size is needed for tensors A, B, C, and D when memory is reused between layers?"
details:
  realistic_solution: The tensor arena is a pre-allocated block of memory that TFLM reuses for activations.
    The required size is not the sum of all tensors, but the *peak* memory usage at any point during inference.
    This peak occurs during the execution of an operation, which requires both its input and output tensors
    to be in memory simultaneously. We must calculate this for each layer and find the maximum.
  common_mistake: The most common mistake is to simply sum the sizes of all tensors (`10+40+20+2 = 72
    KB`), assuming they all need to be in memory at once. A second common mistake is to only account for
    the single largest tensor (`40 KB`), forgetting that during an operation, both its input and output
    tensors must coexist in memory.
  napkin_math: 'A Cortex-M4 has 256KB SRAM. The TF Lite tensor arena must hold the largest sum of active
    tensors at any point. Execution phases: 1) Layer 1: Tensor A (10KB) + Tensor B (40KB) = 50KB. 2) Layer
    2: Tensor B (40KB) + Tensor C (20KB) = 60KB. The peak memory usage is during Layer 2 execution (60KB).
    This easily fits in the 256KB SRAM with 196KB left for OS/heap.'
  options:
  - 72 KB
  - 40 KB
  - 60 KB
  - 50 KB
  correct_index: 2
