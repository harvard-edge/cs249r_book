title: The TinyML Tensor Arena
scenario: 'You are optimizing a model for a microcontroller with 256 KB of SRAM. TFLite Micro uses a memory planner to manage a statically allocated ''tensor arena''. The model''s execution sequentially processes four tensors: A (10 KB) -> Layer 1 -> B (40 KB) -> Layer 2 -> C (20 KB) -> Layer 3 -> D (2 KB).'
question: What is the absolute minimum tensor arena size required for these activations when leveraging memory reuse between sequential layers?
details:
  realistic_solution: The TFLite Micro memory planner reuses memory for tensors based on their lifespan. Tensors do not need to exist simultaneously across the entire network. However, during the execution of any specific layer, both its input and output tensors must reside in memory. The arena size is strictly dictated by the single maximum concurrent memory footprint (the peak) across all individual operations, plus any necessary scratch buffers.
  common_mistake: |
    **The Pitfall:** Naively summing all tensor sizes.
    **The Rationale:** Candidates incorrectly assume all activation tensors must persist in SRAM concurrently throughout the entire inference pass.
    **The Consequence:** They heavily over-allocate memory, wasting precious SRAM, and erroneously conclude the model cannot fit on the selected microcontroller.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tensors: A=10 KB, B=40 KB, C=20 KB, D=2 KB.
    - Layer requires input and output tensors simultaneously.

    **Calculations:**
    - Layer 1 Execution (A + B): 10 KB + 40 KB = 50 KB.
    - Layer 2 Execution (B + C): 40 KB + 20 KB = 60 KB.
    - Layer 3 Execution (C + D): 20 KB + 2 KB = 22 KB.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound Allocation**. The memory planner determines the peak concurrent usage is 60 KB during Layer 2, setting the minimum required tensor arena size to 60 KB.
  options:
  - 72 KB
  - 40 KB
  - 60 KB
  - 50 KB
  correct_index: 2
