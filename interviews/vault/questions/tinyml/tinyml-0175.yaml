title: The Flash Budget Crunch
scenario: You're deploying a keyword-spotting model to a Cortex-M4 microcontroller. The model has 500,000
  parameters and is stored in INT8 precision. The microcontroller has 1MB of Flash storage, but the RTOS,
  bootloader, and application logic already consume 600 KB. Your model is currently too large to fit.
  Explain the minimum level of unstructured weight pruning (as a percentage of sparsity) you would need
  to apply for the model to fit into the remaining Flash.
details:
  realistic_solution: The core task is to calculate the available space and then determine how many parameters
    must be removed. The model's storage size is a direct function of its parameter count and the bytes
    used per parameter. For pruning to reduce Flash size, we assume a sparse representation is used where
    zeroed-out weights consume no storage. With 1,000 KB total and 600 KB used by the system, 400 KB remains.
    The 500,000 INT8 parameters require 500 KB. To fit, the model must be reduced by 100 KB, which means
    pruning exactly 20% of the weights (20% sparsity).
  common_mistake: A common mistake is to miscalculate the available storage by ignoring the significant
    footprint of the RTOS and other system software, assuming the entire 1MB is free. Another frequent
    error is to confuse the storage requirements of different data precisions, for instance, calculating
    the model size using FP16 (2 bytes/param) instead of the specified INT8 (1 byte/param), leading to
    a wildly incorrect pruning target.
  napkin_math: '1. **Available Space:** 1,000 KB (1 MB) - 600 KB = 400 KB.

    2. **Model Size:** 500,000 parameters × 1 byte/parameter (INT8) = 500 KB.

    3. **Pruning Required:** We need to fit 500 KB of weights into 400 KB of space. We must remove 100
    KB. 100 KB / 500 KB = 20% sparsity required.'
  options:
  - 0% (No pruning is needed)
  - 58% Sparsity
  - 20% Sparsity
  - 84% Sparsity
  correct_index: 2
