title: The Flash Budget Crunch
scenario: 'You''re deploying a keyword-spotting model to a Cortex-M4 microcontroller. The model has 500,000 parameters and is stored in INT8 precision. The microcontroller has 1MB of Flash storage, but the RTOS, bootloader, and application logic already consume 600 KB. Your model is currently too large to fit.'
question: 'How would you calculate the minimum level of unstructured weight pruning (as a percentage of sparsity) needed to fit the model into the remaining Flash?'
details:
  realistic_solution: 'The core task is to calculate the available space and then determine how many parameters must be removed. The model''s storage size is a direct function of its parameter count and the bytes used per parameter. For pruning to reduce Flash size, we assume a sparse representation is used where zeroed-out weights consume no storage. With 1,000 KB total and 600 KB used by the system, 400 KB remains. The 500,000 INT8 parameters require 500 KB. To fit, the model must be reduced by 100 KB, which means pruning exactly 20% of the weights (20% sparsity).'
  common_mistake: |
    **The Pitfall:** Ignoring the footprint of the RTOS and system software.
    **The Rationale:** Candidates incorrectly calculate the available storage space assuming the entire 1MB is free.
    **The Consequence:** The pruning target is severely miscalculated, causing the deployment to fail.
  napkin_math: |
    **Assumptions & Constraints:**
    - Microcontroller has 1,000 KB (1 MB) of Flash total.
    - RTOS and system software consume 600 KB.
    - Model has 500,000 INT8 parameters (1 byte/parameter).

    **Calculations:**
    - Calculate available Flash space: 1,000 KB - 600 KB = 400 KB.
    - Calculate baseline model size: 500,000 bytes = 500 KB.
    - Calculate required reduction: 500 KB - 400 KB = 100 KB.
    - Calculate sparsity percentage: 100 KB / 500 KB = 0.20.

    **Conclusion & Interpretation:**
    - **Result: 20% Sparsity (Storage-Bound)**. Exactly 20% of the weights must be pruned to fit the model into the remaining 400 KB of Flash.
  options:
  - '0% (No pruning is needed)'
  - '58% Sparsity'
  - '20% Sparsity'
  - '84% Sparsity'
