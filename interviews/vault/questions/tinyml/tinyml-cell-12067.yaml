title: 'Model Format Conversion: Full TFLM Deployment Mastery for Embedded Vision on M7'
scenario: You are deploying a person detection model (MobileNetV1-0.25, 475K INT8 params, 14.9 MOPs, 28×28
  input) on Cortex-M7+Ethos-U55 (480MHz, 512KB SRAM, NPU). Walk through the full conversion pipeline from
  TensorFlow to TFLM Flatbuffer with Vela NPU optimization, validate the memory layout, and confirm it
  meets a 50ms latency budget on a battery-powered device.
details:
  realistic_solution: 'Pipeline: TF SavedModel → TFLite (INT8, representative dataset 100 images) → Vela
    compiler (ethos-u55-256 config, SRAM 512KB, DRAM bandwidth 1.6 GB/s). Vela output: optimized .tflite
    with NPU dispatch groups. Flash: 475KB model. SRAM: Vela assigns activation arena: peak ~120KB. Total:
    475+120+50KB (TFLM runtime+buffers) = 645KB? Exceeds 512KB SRAM. Fix: model weights to Flash, only
    activations in SRAM (120KB). Flash: 475KB model + 64KB app = 539KB (if Flash > 512KB, need 1MB Flash
    MCU). NPU inference: 14.9M/500G = 29.8μs + 1ms overhead = 1ms << 50ms ✓.'
  common_mistake: Running Vela compiler with default settings without specifying the Ethos-U55 system
    configuration (memory bandwidth, SRAM size), producing a suboptimal NPU schedule.
  napkin_math: 'MobileNetV1-0.25 weights INT8: 475K × 1B = 475KB. Flash storage ✓ (need ≥540KB Flash).
    SRAM: only activation tensors. Peak activation: 28×28×128 = 100KB (after second conv). Plus buffers:
    ~120KB. TFLM runtime: 30KB. Total SRAM: 150KB < 512KB ✓. Inference: Ethos-U55 at 500 GOPS, 14.9M ops:
    29.8μs compute + 1ms overhead = 1.03ms. At 50ms budget: 98% slack. Power: Ethos at ~100mW, duty 1ms/50ms
    = 2% → avg 2mW from Ethos.'
