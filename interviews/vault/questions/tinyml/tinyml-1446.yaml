title: ASIL-C ML Safety on Cortex-M7 + Ethos-U55 for Automotive
scenario: 'You are designing an embedded ML system for an ASIL-C certified automotive application, specifically a critical sensor fusion module. This module runs on a Cortex-M7 (480 MHz) processor paired with an Ethos-U55 NPU (configured for 256 MAC/cycle), leveraging 512 KB SRAM. The primary task is real-time object detection and classification, providing inputs to the vehicle''s braking system.'
question: 'Given the strict requirements of ISO 26262 ASIL-C, how would you architect the system to ensure functional safety, particularly concerning the ML inference pipeline?'
details:
  realistic_solution: 'A robust solution requires a multi-faceted approach: 1. System Architecture: dual execution with comparison. 2. Watchdog Timers: internal and external. 3. Self-Test Routines: Memory integrity checks and NPU BIST. 4. Deterministic Execution: Fixed-point arithmetic, no dynamic allocation, strict priority scheduling. 5. Fault Mitigation: transition to a minimal risk condition (MRC).'
  common_mistake: |
    **The Pitfall:** Overlooking the non-deterministic aspects of ML inference in safety-critical contexts.
    **The Rationale:** Candidates propose generic safety mechanisms without addressing dynamic memory allocation or floating-point variability inherent in standard ML frameworks.
    **The Consequence:** The system cannot achieve ASIL-C certification, and edge cases could lead to catastrophic braking failures.
  napkin_math: |
    1. **Assumptions & Constraints:** Ethos-U55 at 256 MAC/cycle, 480 MHz. 80 MMAC model. FTTI (Fault Tolerant Time Interval) = 50 ms.
    2. **Calculations:**
       - NPU Throughput: 256 MAC/cycle * 480 MHz = 122.88 GMAC/s.
       - Inference time: 80,000,000 MACs / 122,880,000,000 MACs/s = ~0.65 ms.
    3. **Conclusion & Interpretation:** **Inference takes ~0.65 ms, well within the 50 ms FTTI.** Result: Compute-Bound. This leaves ample time for redundancy checks and software voting.
