title: TinyML Layer Offload Split
scenario: A model has 10 layers. The MCU runs layers at 4 ms each. An external NPU runs supported layers at 1 ms each, but each offload boundary costs 2 ms for transfer/setup. If 6 consecutive layers are offloaded as one block, estimate latency.
question: What latency results from offloading 6 consecutive layers to an external NPU when MCU layers cost 4 ms and each offload boundary costs 2 ms?
details:
  realistic_solution: Four MCU layers cost 16 ms. Six NPU layers cost 6 ms. Entering and leaving the NPU block costs 4 ms total. Total latency is 26 ms. Offloading is useful only because supported layers are consecutive; fragmented offloads would add more boundary costs.
  common_mistake: Counting NPU compute speedup but forgetting transfer/setup boundaries.
  napkin_math: MCU = 4 x 4 = 16 ms. NPU = 6 x 1 = 6 ms. Boundaries = 2 x 2 = 4 ms. Total = 26 ms.
