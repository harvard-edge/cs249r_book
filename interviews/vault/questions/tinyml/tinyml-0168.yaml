title: The Tensor Arena Squeeze
scenario: |
  You're deploying a keyword spotting model to a Cortex-M4 microcontroller with 256 KB of SRAM. Your model has three layers. TensorFlow Lite for Microcontrollers reports the following tensor memory requirements:
  Layer 1: Input 12 KB, Output 28 KB
  Layer 2: Input 28 KB, Output 8 KB
  Layer 3: Input 8 KB, Output 1 KB
question: What is the minimum tensor arena size required for the three-layer keyword spotter when TFLM reuses buffers between layers?
details:
  realistic_solution: |
    The tensor arena peak is determined by the maximum memory needed at any one time, since TFLM reuses memory buffers for tensors whose lifetimes do not overlap.
    Layer 1 requires 12 KB (input) + 28 KB (output) = 40 KB simultaneously.
    Once Layer 1 completes, its 12 KB input is freed.
    Layer 2 requires 28 KB (its input, which was Layer 1's output) + 8 KB (output) = 36 KB simultaneously.
    Finally, Layer 3 requires 8 KB (input) + 1 KB (output) = 9 KB simultaneously.
    The peak memory usage is max(40, 36, 9) = 40 KB.
    On 256 KB SRAM: 40 KB arena + model weights in flash (0 KB SRAM) + 16 KB stack + 8 KB RTOS = 64 KB used, 192 KB free for application logic.
  common_mistake: |
    **The Pitfall:** Summing the memory of all tensors instead of calculating the peak overlapping usage.
    **The Rationale:** Candidates sum all inputs/outputs (49 KB) or all outputs (37 KB), failing to account for the fact that TFLM reuses memory buffers for tensors that are not live concurrently.
    **The Consequence:** The allocated arena is incorrectly sized, representing an inefficient use of limited SRAM.
  napkin_math: |
    1. Layer 1 peak: 12 KB (input) + 28 KB (output) = 40 KB.
    2. Memory reuse: Layer 1 input is freed. Layer 2 reuses the memory.
    3. Layer 2 peak: 28 KB (input) + 8 KB (output) = 36 KB.
    4. Layer 3 peak: 8 KB (input) + 1 KB (output) = 9 KB.
    5. Minimum Arena Size: max(40, 36, 9) = **40 KB**.
  options:
  - 49 KB
  - 28 KB
  - 40 KB
  - 37 KB
  correct_index: 2
