title: The Tensor Arena Squeeze
scenario: |
  You're deploying a keyword spotting model to a Cortex-M4 microcontroller with 256 KB of SRAM.
  Your model has three layers. TensorFlow Lite for Microcontrollers reports the following tensor memory requirements:
  Layer 1: Input 12 KB, Output 28 KB
  Layer 2: Input 28 KB, Output 8 KB
  Layer 3: Input 8 KB, Output 1 KB
question: "What tensor arena size is required for the three-layer keyword spotter when TFLM reuses buffers between layers?"
details:
  realistic_solution: |
    The tensor arena peak is determined by the maximum memory needed at any one time, since TFLM reuses memory buffers for tensors whose lifetimes do not overlap.
    Layer 1 requires 12 KB (input) + 28 KB (output) = 40 KB simultaneously.
    Once Layer 1 completes, its 12 KB input is freed.
    Layer 2 requires 28 KB (its input, which was Layer 1's output) + 8 KB (output) = 36 KB simultaneously.
    Finally, Layer 3 requires 8 KB (input) + 1 KB (output) = 9 KB simultaneously.
    The peak memory usage is max(40, 36, 9) = 40 KB.
    On 256 KB SRAM: 40 KB arena + model weights in flash (0 KB SRAM) + 16 KB stack + 8 KB RTOS = 64 KB used, 192 KB free for application logic.
  common_mistake: Summing the memory of all tensors (12+28+8+1 = 49 KB) or just the output tensors (28+8+1
    = 37 KB). This fails to account for the fact that TFLM reuses memory, and the peak is determined by
    the maximum memory needed *at one time* during any layer's execution.
  napkin_math: |
    Peak Memory = max(L1_in + L1_out, L2_in + L2_out, L3_in + L3_out)
    
    Assuming the following tensor sizes from the scenario:
    - Layer 1: Input = 12 KB, Output = 28 KB → Simultaneous = 40 KB
    - Layer 2: Input = 28 KB, Output = 8 KB → Simultaneous = 36 KB
    - Layer 3: Input = 8 KB, Output = 1 KB → Simultaneous = 9 KB
    
    Peak = max(40, 36, 9) = 40 KB
    
    The tensor arena must be at least 40 KB, not 49 KB (sum of all tensors). TFLM reuses memory: after Layer 1 completes, the 12 KB input tensor is freed, and that space can be reused by Layer 2's output. The peak occurs at Layer 1, where both the 12 KB input and 28 KB output must coexist in memory simultaneously.
    
    On a 256 KB SRAM device, 40 KB for the tensor arena leaves 216 KB for the RTOS, stack, and application logic — a comfortable margin.
  options:
  - 49 KB
  - 28 KB
  - 40 KB
  - 37 KB
  correct_index: 2
