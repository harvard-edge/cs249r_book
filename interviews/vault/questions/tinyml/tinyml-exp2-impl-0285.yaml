title: Calculate Energy Per Inference on Cortex-M4
scenario: You are deploying a wake-word detection model on an ARM Cortex-M4 (STM32F4) running at 168 MHz.
  The MCU consumes 40 mA at 3.3V when active, and your model requires 2.5 million INT8 MAC operations
  per inference. Assuming CMSIS-NN SIMD instructions achieve an average of 1.5 INT8 MACs per clock cycle
  due to SRAM access overhead, calculate the total energy consumed per inference.
question: "How much energy does one STM32F4 wake-word inference consume at 1.5 INT8 MACs per cycle and 40 mA?"
details:
  realistic_solution: To find the energy per inference, first calculate the total clock cycles required
    by dividing the total MACs by the MACs per cycle. Next, determine the execution time by dividing the
    total cycles by the 168 MHz clock frequency. Finally, calculate the active power (Current x Voltage)
    and multiply it by the execution time to get the total energy.
  common_mistake: Candidates often use the theoretical peak of 2x INT8 MACs/cycle instead of the provided
    1.5 average. Another common error is failing to correctly calculate active power in Watts and convert
    the final result into Joules.
  napkin_math: Cycles = 2,500,000 MACs / 1.5 MACs/cycle = 1,666,666 cycles. Execution Time = 1,666,666
    cycles / 168,000,000 Hz = 0.00992 seconds (9.92 ms). Active Power = 0.040 A * 3.3 V = 0.132 W. Energy
    per inference = 0.132 W * 0.00992 s = 0.001309 Joules (1.31 mJ).
