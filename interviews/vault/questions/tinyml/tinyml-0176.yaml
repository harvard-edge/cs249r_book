title: The Silent Battery Killer
scenario: You've deployed a fleet of 10,000 battery-powered keyword-spotting sensors. A rare software bug causes some devices to enter an infinite loop, hanging in their 'active' state instead of returning to 'deep sleep'. When hung, the device is unresponsive.
question: What hardware peripheral recovers a battery-powered TinyML device from an infinite loop that leaves it stuck active?
details:
  realistic_solution: The correct answer is a Watchdog Timer (WDT). A WDT is an independent hardware counter that, if not 'kicked' (reset) by the main software loop within a specific timeout period, will automatically trigger a full hardware reset of the microcontroller. This forces a clean reboot, recovering the device from the software freeze.
  common_mistake: |
    **The Pitfall:** Suggesting software-only solutions like checkpointing or OTA updates.
    **The Rationale:** Engineers unfamiliar with embedded systems fail to realize that if the main software loop is frozen, it cannot execute recovery code.
    **The Consequence:** Deploying edge devices that permanently brick themselves upon hitting a software hang.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Normal Cycle: 1s active (50 mW) + 9s sleep (10 µW) = ~5 mW average.
       - Battery Capacity: 10,000 Joules.
    2. **Calculations:**
       - Normal Battery Life = 10,000 J / 0.005 W = 2,000,000 seconds = ~23 days.
       - Hung State Power = 50 mW continuous.
       - Hung Battery Life = 10,000 J / 0.050 W = 200,000 seconds = ~2.3 days.
    3. **Conclusion & Interpretation:**
       - **Result: Reliability-Bound.** Without a Watchdog Timer (WDT) to trigger a hardware reset, the bug causes a 10x increase in power draw, bricking the device by draining the battery in 2.3 days.
  options:
  - Brown-Out Reset (BOR) circuit
  - Software Checkpointing
  - Watchdog Timer (WDT)
  - Over-the-Air (OTA) Update
