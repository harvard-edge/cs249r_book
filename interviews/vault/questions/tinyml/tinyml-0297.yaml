title: 'The Energy Cost of Precision: MCU Compute Constraints'
scenario: You're working on a keyword-spotting model for a Cortex-M4 microcontroller, where every microjoule
  counts. To save power, you are considering quantizing the model's compute-heavy layers from 32-bit floating-point
  (FP32) to 8-bit integer (INT8). Based on the fundamental physics of computation, what is the approximate
  energy reduction you should recall for the MAC (multiply-accumulate) operations themselves?
details:
  realistic_solution: An FP32 operation consumes roughly 18 times more energy than an INT8 operation.
    This is a stable, physics-based invariant. The energy consumed by a digital logic operation is proportional
    to the number of transistors switching. An FP32 multiplier/adder is vastly more complex than its INT8
    equivalent, leading to this significant, order-of-magnitude energy gap.
  common_mistake: Engineers often mistakenly assume the energy savings are linear with the reduction in
    bit-width (e.g., 32 bits / 8 bits = 4×). This ignores the fact that floating-point units are significantly
    more complex and energy-intensive than integer ALUs, which require separate, power-hungry logic for
    mantissas and exponents.
  napkin_math: 'From the ''Invariants'' section of the ML Systems Engineer playbook, this is a direct
    recall of a first-principles ratio:'
  options:
  - ~4×, because you are reducing the bit-width by a factor of four (32/8).
  - ~2×, representing a modest but noticeable improvement.
  - ~18×, due to the fundamental architectural complexity difference between FPUs and integer ALUs.
  - Effectively no difference, as on-chip SRAM access energy dominates compute.
  correct_index: 2
