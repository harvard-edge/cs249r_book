title: 'The Energy Cost of Precision: MCU Compute Constraints'
scenario: You're working on a keyword-spotting model where every microjoule counts. To save power, you are considering quantizing the model's compute-heavy layers from 32-bit floating-point (FP32) to 8-bit integer (INT8).
question: Based on the fundamental physics of computation, what is the approximate energy reduction you should recall for the MAC (multiply-accumulate) operations themselves?
details:
  realistic_solution: An FP32 operation consumes roughly 18 times more energy than an INT8 operation. This is a stable, physics-based invariant. The energy consumed by a digital logic operation is proportional to the number of transistors switching. An FP32 multiplier/adder is vastly more complex than its INT8 equivalent.
  common_mistake: |
    **The Pitfall:** Assuming energy savings scale linearly with bit-width reduction.
    **The Rationale:** Engineers mistakenly divide 32 bits by 8 bits and assume a 4x reduction, ignoring hardware architecture.
    **The Consequence:** Energy savings are vastly underestimated, leading to oversized power budgets or missed optimization opportunities.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Comparing FP32 MAC and INT8 MAC operations.
    2. **Calculations:**
       - First-principles logic complexity yields an ~18x ratio for FP32 vs INT8 ALU switching energy.
    3. **Conclusion & Interpretation:**
       - **Result: Energy-Bound.** INT8 is ~18x more efficient.
  options:
  - ~4x, because you are reducing the bit-width by a factor of four (32/8).
  - ~2x, representing a modest but noticeable improvement.
  - ~18x, due to the fundamental architectural complexity difference between FPUs and integer ALUs.
  - Effectively no difference, as on-chip SRAM access energy dominates compute.
  correct_index: 2
