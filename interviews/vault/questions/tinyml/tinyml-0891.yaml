title: 'Model Format Conversion: TFLM Fluency — Compute Activation Arena Size in 30 Seconds'
scenario: A 3-layer CNN on a Cortex-M4 processes a 32x32x1 input. The intermediate layer outputs are 30x30x8, 28x28x16, and 26x26x32 (all INT8).
question: What is the minimum TFLM activation arena size needed for this 3-layer INT8 CNN?
details:
  realistic_solution: 'TFLM memory planning: layer N can free layer N-1 output once layer N is computed. Peak = max concurrent activations. For sequential CNN: need input + output of current layer simultaneously. Peak: layer 3 (largest): needs layer 2 output (28×28×16=12544B) and layer 3 output (26×26×32=21632B) simultaneously = 34176B ≈ 34KB. Plus input tensor: 32×32=1024B (can be freed). Minimum arena: ~34KB + 2KB overhead = 36KB.'
  common_mistake: |
    **The Pitfall:** Summing all layer activations together (e.g., L1 + L2 + L3).
    **The Rationale:** Candidates forget that TFLite Micro reuses memory buffers for non-overlapping layers sequentially.
    **The Consequence:** The calculated arena is massively oversized, potentially causing the model to be falsely rejected for not fitting in SRAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - TFLite Micro memory planner reuses buffers sequentially.
    - Peak memory is determined by the maximum simultaneous requirement of `Layer(N-1)_Output + Layer(N)_Output`.
    - Data type: INT8 (1 byte per element).

    **Calculations:**
    - L1 Output: 30 * 30 * 8 = 7,200 B.
    - L2 Output: 28 * 28 * 16 = 12,544 B.
    - L3 Output: 26 * 26 * 32 = 21,632 B.
    - L1 to L2 transition peak: 7,200 B + 12,544 B = 19,744 B.
    - L2 to L3 transition peak: 12,544 B + 21,632 B = 34,176 B.
    - TFLM Overhead: ~2 KB for metadata/structs.
    - Total: 34,176 B + 2,048 B ≈ 36.2 KB.

    **Conclusion & Interpretation:**
    - **Result: ~36.2 KB (Memory-Capacity-Bound)**. The peak concurrent memory is ~36.2 KB, dominated by the L2-to-L3 transition.
