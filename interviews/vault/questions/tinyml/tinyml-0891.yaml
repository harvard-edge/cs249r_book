title: 'Model Format Conversion: TFLM Fluency — Compute Activation Arena Size in 30
  Seconds'
scenario: 'Without reference, in 30 seconds: ''A 3-layer CNN on Cortex-M4 processes
  32×32×1 input. Layer outputs: 30×30×8, 28×28×16, 26×26×32 (INT8). What is the minimum
  TFLM activation arena size needed?'''
question: What TFLM arena is needed for a Cortex-M4 3-layer INT8 CNN with 30x30x8,
  28x28x16, and 26x26x32 outputs?
details:
  realistic_solution: 'TFLM memory planning: layer N can free layer N-1 output once
    layer N is computed. Peak = max concurrent activations. For sequential CNN: need
    input + output of current layer simultaneously. Peak: layer 3 (largest): needs
    layer 2 output (28×28×16=12544B) and layer 3 output (26×26×32=21632B) simultaneously
    = 34176B ≈ 34KB. Plus input tensor: 32×32=1024B (can be freed). Minimum arena:
    ~34KB + 2KB overhead = 36KB.'
  common_mistake: 'Adding all layer activations: 30×30×8 + 28×28×16 + 26×26×32 = 7200+12544+21632=41376
    bytes. Wrong — TFLM can reuse buffers between non-overlapping layers.'
  napkin_math: 'Layer sizes: L1=7200B, L2=12544B, L3=21632B. Peak concurrent: L2 input
    + L3 output = 12544+21632=34176B=33.4KB. Plus input 1024B during L1: 7200+1024=8224B.
    Peak is L2→L3: 34.2KB. Arena: 34.2KB + 2KB TFLM overhead = 36.2KB. On M4 with
    256KB SRAM: trivial (14% SRAM used).'
