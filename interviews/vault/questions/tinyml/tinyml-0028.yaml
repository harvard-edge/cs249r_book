title: The Remote Wildlife Camera's Lifespan
scenario: You are designing a remote wildlife camera that uses a Cortex-M4 microcontroller for bird detection. It runs inference for 200ms, 120 times per hour. For the rest of the time, it's in deep sleep. The device is powered by a 4,000 mAh, 3.7V battery.
question: Given the Cortex-M4's active power consumption is 50mW and its deep sleep power is 10µW, approximately how long will the battery last?
details:
  realistic_solution: The correct way to solve this is to calculate the average power consumption by creating a weighted average of the active and sleep power based on the duty cycle. This average power is then used to determine the total lifetime based on the battery's energy capacity.
  common_mistake: |
    **The Pitfall:** Underestimating or ignoring the power consumption during sleep mode, or only considering the active power drain.
    **The Rationale:** While sleep power is small (10µW), over long periods (months or years), the cumulative energy drain from sleep is significant and cannot be treated as zero.
    **The Consequence:** A wild overestimation of device lifetime, leading to unexpected field failures when batteries die years earlier than modeled.
  napkin_math: |
    *   **Active time:** 120 inferences/hr * 0.2s = 24s/hr.
    *   **Sleep time:** 3600s/hr - 24s = 3576s/hr.
    *   **Power:** Cortex-M4 active = 50 mW; sleep = 10 µW (0.01 mW).
    *   **Energy per hour:** (50 mW * 24s) + (0.01 mW * 3576s) = 1,200 mJ + 35.76 mJ = 1,235.76 mJ = 0.343 mWh.
    *   **Battery capacity:** 4,000 mAh * 3.7V = 14,800 mWh.
    *   **Estimated battery life:** 14,800 mWh / 0.343 mWh/hr = 43,148 hours = **~4.9 years** (~1,800 days).
  options:
  - ~12 days
  - ~60 days
  - ~1,800 days
  - ~5,500 days
  correct_index: 2
