title: The Federated Simulator Stall
scenario: You are a TinyML systems engineer designing a keyword-spotting application. To accelerate research,
  your team is simulating a federated learning workload on a single cloud server with 8 H100 GPUs. The
  server simulates 100,000 devices, each producing a 50 KB gradient update per round. The simulation is
  unexpectedly slow, with `htop` showing the CPU pegged at 100% and `nvidia-smi` showing GPU utilization
  near 0%. A profiler reveals the bottleneck is the host CPU transferring the 100,000 tiny gradient packets
  to the 8 GPUs for aggregation over a standard PCIe Gen5 bus. Using the hardware constants, diagnose
  the primary bottleneck.
details:
  realistic_solution: The primary bottleneck is the PCIe transfer latency overhead, not bandwidth. The
    CPU is spending all its time initiating tens of thousands of tiny, individual data transfers. Each
    transfer, no matter how small, incurs a fixed latency penalty (~1,000 ns for PCIe Gen5). When multiplied
    by 100,000 transfers, this latency overhead cripples the pipeline. The correct solution is for the
    CPU to batch all the small gradients destined for a single GPU into one large, contiguous buffer and
    perform a single, large DMA transfer. This amortizes the high latency cost over a large amount of
    data, allowing the system to become bandwidth-bound again, which is much more efficient.
  common_mistake: Engineers often focus on a bus's peak bandwidth (e.g., PCIe Gen5 at ~63 GB/s) and assume
    it's always fast. They forget that for small, frequent transfers, the fixed latency cost of setting
    up each transfer (the 'dispatch tax') completely dominates the total time, making bandwidth irrelevant.
  napkin_math: '100K devices, 50KB each=5GB total. PCIe Gen5 x16: 64GB/s. Bulk BW: 5/64=78ms. But 12,500
    transfers/GPU*1us latency=12.5ms + CPU setup 5us*12.5K=62.5ms. Total: 75ms. Batched: 1 transfer of
    625MB@64GB/s=9.8ms. Speedup: 75/9.8=7.7x. GPU goes from idle to working.'
  options:
  - The 5 GB of total gradients is too large to send over the network to the server.
  - The H100 GPUs don't have enough HBM to store the 0.625 GB of gradients allocated to each.
  - The high number of small transfers creates a latency bottleneck on the PCIe bus, as the CPU is overwhelmed
    by dispatch overhead.
  - The H100's compute capacity (989 TFLOPS) is insufficient to aggregate the gradients quickly.
  correct_index: 2
