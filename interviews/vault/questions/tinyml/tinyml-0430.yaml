title: The Keyword Spotting Deadline Miss
scenario: 'You are a TinyML engineer optimizing a keyword spotting model running on
  a Cortex-M4 based microcontroller (168 MHz). Your model consists of a sequence of
  layers: `Conv2D` -> `ReLU` -> `DepthwiseConv2D`. The end-to-end latency budget is
  a strict 100ms to ensure a responsive user experience. Your profiler reports the
  following: the current latency is 110ms, and there is ~15ms of pure memory overhead
  between the Conv2D and ReLU operations due to SRAM reads/writes.'
question: Which optimization addresses the deadline miss caused by separate Conv2D
  and ReLU kernels on the Cortex-M4?
details:
  realistic_solution: The correct solution is to apply operator fusion. The 15ms gap
    between the `Conv2D` and `ReLU` operations is a classic symptom of memory access
    overhead. The microcontroller is executing the `Conv2D` kernel, writing the entire
    output tensor back to SRAM, and then the TFLite Micro interpreter invokes the
    `ReLU` kernel, which reads that same tensor back from SRAM into registers.
  common_mistake: Engineers often misdiagnose the bottleneck on microcontrollers.
    They assume the problem is always compute (FLOPs) or model size (parameters),
    as it often is in the cloud. They fail to recognize that on low-power devices
    with low Arithmetic Intensity (Ops/Byte), the overhead of moving data between
    SRAM and registers for each separate operation can dominate the actual computation
    time.
  napkin_math: 'Without fusion: Conv2D writes output to SRAM, ReLU reads it back. For a typical KWS model, total activation memory traffic across all layers might be ~1.2 MB. At 2 clock cycles per byte (SRAM access), 1.2 MB transferred = ~2.5 million extra clock cycles. At 168 MHz, 2.5M cycles / 168M cycles/s = 15 ms of pure memory overhead. With operator fusion, ReLU is applied in-register immediately after Conv2D computes each value, entirely eliminating this 1.2 MB of SRAM traffic and saving the 15 ms, allowing the model to hit the 100 ms deadline.'
  options:
  - The model is too large. Apply 50% unstructured weight pruning to the DepthwiseConv2D
    layer.
  - The CPU is compute-bound. Use a microcontroller with a faster clock speed, like
    a Cortex-M7.
  - The system is memory-bound. Apply operator fusion to combine the Conv2D and ReLU
    kernels.
  - The ReLU activation is inefficient. Replace it with a hardware-accelerated PReLU.
  correct_index: 2
