title: Diagnosing Battery Drain in ESP32-S3 Wake-Word Engine
scenario: An ESP32-S3 (240 MHz dual-core Xtensa, 512 KB SRAM, 8 MB PSRAM) is running an always-on wake-word detection model using INT8 vector extensions. The system is designed to run off a 2000 mAh battery for 30 days, but field telemetry shows the battery draining in just 4 days. The model runs inference every 500ms, taking 20ms per pass, while the WiFi/BLE radio is supposedly powered down between daily syncs.
question: What hardware or software interactions are likely causing this massive power budget violation, and how would you diagnose the root cause?
details:
  realistic_solution: The root cause is typically improper power state management between inferences, specifically leaving the external PSRAM or WiFi baseband powered on. To diagnose, the candidate should propose using a power analyzer (like an Otii Arc or Joulescope) to measure the baseline current between the 20ms active inference spikes. If the base current is ~20mA instead of <1mA, it indicates the ESP32-S3 is failing to enter light sleep, likely because the 8 MB PSRAM is kept active to hold model weights or the RTOS tick is waking the cores too frequently.
  common_mistake: |
    **The Pitfall:** Assuming the INT8 inference itself is consuming too much power.
    **The Rationale:** Candidates fixate on the ML workload and overlook the static leakage power of the remaining 96% idle time, specifically the cost of keeping 8 MB PSRAM active.
    **The Consequence:** Wasting time trying to quantize or prune the model further when the bug is simply an un-invoked deep sleep command in the RTOS.
  napkin_math: |
    - Target budget: 2000 mAh / 720 h (30 days) = 2.77 mA avg.
    - Actual drain: 2000 mAh / 96 h (4 days) = 20.8 mA avg.
    - Duty cycle: 4% (20ms active / 500ms period).
    - ESP32-S3 active draw at 240 MHz: ~40 mA.
    - Active inference current: 0.04 * 40 mA = 1.6 mA avg.
    - Idle current during remaining 96%: (20.8 mA - 1.6 mA) / 0.96 = **20 mA idle current**.
    - This perfectly matches the Modem Sleep state with PSRAM active, indicating failure to enter Light Sleep.
