title: Acoustic Double Buffering
scenario: An acoustic event detector on a Cortex-M4 samples data. Feature extraction (MFCC) takes 12 ms, and neural network inference takes 20 ms. Overlapping windowing requires processing a frame every 30 ms.
question: Evaluate whether a single-buffered or double-buffered DMA queue is necessary to prevent data loss.
details:
  realistic_solution: Sequential processing takes 12 + 20 = 32 ms, missing the 30 ms deadline. By using a double-buffered queue, feature extraction and inference can be pipelined, effectively reducing the bottleneck to the longest stage (20 ms), thus easily meeting the deadline.
  common_mistake: |
    **The Pitfall:** Stating that processing is mathematically impossible because 32ms > 30ms.
    **The Rationale:** Candidates fail to realize that pipelining breaks the strict sequential dependency.
    **The Consequence:** The candidate incorrectly concludes the hardware is insufficient and proposes unnecessary upgrades.
  napkin_math: |
    - Sequential processing: 12 ms + 20 ms = 32 ms (> 30 ms deadline).
    - Pipeline max stage: max(12 ms, 20 ms) = 20 ms.
    - **20 ms < 30 ms deadline, so a double-buffered queue enables the system to meet its requirements.**
