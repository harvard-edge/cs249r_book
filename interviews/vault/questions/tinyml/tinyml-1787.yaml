title: Acoustic Double Buffering
scenario: An acoustic event detector on a Cortex-M4 samples data. Feature extraction
  (MFCC) takes 12 ms, and neural network inference takes 20 ms. Overlapping windowing
  requires processing a frame every 30 ms.
question: Evaluate whether a single-buffered or double-buffered DMA queue is necessary
  to prevent data loss.
details:
  realistic_solution: Sequential processing takes 12 + 20 = 32 ms, missing the 30
    ms deadline. By using a double-buffered queue, feature extraction and inference
    can be pipelined, effectively reducing the bottleneck to the longest stage (20
    ms), thus easily meeting the deadline.
  common_mistake: Stating that processing is mathematically impossible because 32ms
    > 30ms, failing to realize that pipelining breaks the strict sequential dependency.
  napkin_math: Pipeline max stage = max(12ms, 20ms) = 20ms. 20ms < 30ms deadline.
