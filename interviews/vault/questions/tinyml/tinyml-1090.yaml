title: ESP32-S3 Audio Wake Word System Architecture
scenario: You are leading the design of an always-on audio wake word detection system
  for a smart home device using an ESP32-S3 microcontroller. The system needs to continuously
  listen for a wake word while maintaining a low power profile, triggering a larger
  cloud-based model via WiFi only when activated. The ESP32-S3 features a 240 MHz
  dual-core Xtensa processor, 512 KB of internal SRAM, 8 MB of external PSRAM, and
  vector extensions for INT8 operations. Given these constraints, architect the memory
  management and execution strategy for the audio processing pipeline and the ML model.
question: How should ESP32-S3 manage SRAM, PSRAM, cores, and audio buffers for an
  always-on wake-word system?
details:
  realistic_solution: A robust architecture pins the critical path to internal SRAM
    while leveraging PSRAM for non-blocking storage. The audio DMA buffer (e.g., 16kHz,
    16-bit, 1-second rolling window) and the model's inference arena (activations)
    must reside in the 512 KB SRAM to utilize the INT8 vector extensions efficiently
    without memory stalling. The model weights, if they exceed remaining SRAM, should
    be stored in PSRAM, but ideally, the model is quantized and pruned to fit entirely
    within the internal memory for true always-on efficiency. One core handles WiFi/BLE
    and system tasks, while the other is dedicated to the DSP and inference pipeline.
  common_mistake: Candidates often assume they can just load the entire model into
    the 8 MB PSRAM and execute from there, ignoring the significant latency and power
    penalties of fetching data from external memory. They also frequently overlook
    the need to partition the 512 KB SRAM between the RTOS, audio ring buffers (DMA),
    feature extraction (MFCCs), and the model's working arena.
  napkin_math: 'Audio buffer: 16,000 samples/sec * 2 bytes/sample = 32 KB for a 1-second
    window. RTOS + networking overhead: ~150 KB SRAM. Feature extraction (MFCC) buffers:
    ~20 KB. Remaining SRAM for model: 512 KB - 32 KB - 150 KB - 20 KB = 310 KB. An
    INT8 quantized MobileNetV2-based keyword spotter might require ~200 KB for weights
    and ~50 KB for the activation arena, comfortably fitting within the remaining
    310 KB internal SRAM, avoiding PSRAM latency entirely during inference.'
