title: ESP32-S3 Audio Wake Word System Architecture
scenario: You are leading the design of an always-on audio wake word detection system for a smart home device using an ESP32-S3 microcontroller. The system needs to continuously listen for a wake word while maintaining a low power profile, triggering a larger cloud-based model via WiFi only when activated. The ESP32-S3 features a 240 MHz dual-core Xtensa processor, 512 KB of internal SRAM, 8 MB of external PSRAM, and vector extensions for INT8 operations.
question: How should ESP32-S3 manage SRAM, PSRAM, cores, and audio buffers for an always-on wake-word system?
details:
  realistic_solution: A robust architecture pins the critical path to internal SRAM while leveraging PSRAM for non-blocking storage. The audio DMA buffer (e.g., 16kHz, 16-bit, 1-second rolling window) and the model's inference arena (activations) must reside in the 512 KB SRAM to utilize the INT8 vector extensions efficiently without memory stalling. The model weights, if they exceed remaining SRAM, should be stored in PSRAM, but ideally, the model is quantized and pruned to fit within the internal memory for true always-on efficiency. One core handles WiFi/BLE and system tasks, while the other is dedicated to the DSP and inference pipeline.
  common_mistake: |
    **The Pitfall:** Loading the entire model into the 8 MB PSRAM.
    **The Rationale:** Candidates ignore the significant latency and power penalties of fetching data from external memory over SPI.
    **The Consequence:** The model suffers from severe memory stalling, missing real-time inference deadlines and consuming excess power.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Audio Buffer (1s): 16 kHz * 2 bytes = 32 KB.
       - Overhead: RTOS/Networking (~150 KB) + MFCC Buffers (~20 KB) = 170 KB.
       - Total SRAM: 512 KB.
    2. **Calculations:**
       - Remaining SRAM: 512 - 32 - 170 = 310 KB.
       - Model Requirement: ~200 KB weights + ~50 KB activations = 250 KB.
    3. **Conclusion & Interpretation:**
       - **Result: 310 KB remaining.** Model and activations perfectly fit within internal SRAM, preventing external PSRAM stalls.
