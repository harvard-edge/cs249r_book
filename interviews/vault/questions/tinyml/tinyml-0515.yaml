title: The Flash Memory Diet
scenario: You are a TinyML engineer building a keyword spotting model for a new smart thermostat. Your
  baseline CNN model achieves 95% accuracy but its compiled binary is 900KB. The target device is a Cortex-M4
  MCU with 1MB of Flash. After accounting for the bootloader (32KB), RTOS (64KB), and the OTA update buffer
  (450KB), your available Flash budget is only 454KB. Your model is dominated by a single 3x3 convolutional
  layer with 64 input channels and 128 output channels. A junior engineer suggests slashing the output
  channels to 16 to meet the budget. Using your knowledge of CNN architectures, diagnose why this is a
  suboptimal solution and propose a better one.
question: "Why is replacing the standard convolution with a depthwise separable convolution better than slashing output channels?"
details:
  realistic_solution: The best solution is to replace the standard 3x3 convolution with a 3x3 depthwise
    separable convolution. This architectural change drastically reduces the parameter count for a minimal
    accuracy trade-off. While slashing channels also reduces parameters, it severely damages the model's
    ability to learn diverse features, causing a much larger accuracy drop for a similar parameter reduction.
    Depthwise separable convolutions are a standard, highly effective technique for creating efficient
    models that fit within the tight memory constraints of microcontrollers.
  common_mistake: Engineers from cloud backgrounds often apply brute-force scaling (e.g., slashing channel
    counts) to shrink models. This is a naive approach that aggressively destroys the model's representational
    capacity and accuracy. They fail to select architecturally efficient operators, like depthwise separable
    convolutions, which are specifically designed to reduce parameters with a much smaller impact on performance.
  napkin_math: 'Original 3x3 Conv 64→128: 73,728 params*4B=288KB. Slash to 16 out: 9,216*4=36KB — fits
    but 8x fewer features, accuracy tanks. DS-Conv 64→128: DW 576+PW 8,192=8,768*4B=34KB. Same 128 channels
    preserved, ~1-3% accuracy loss. Full model: 900-288+34=646KB, still big. Add INT8: 646/4=161KB<454KB.
    Done.'
  options:
  - The junior engineer is right. Slashing output channels from 128 to 16 is the simplest and most direct
    way to achieve the required ~8x size reduction.
  - Use a smaller kernel, like 1x1, instead of 3x3. This reduces parameters without changing the channel
    depth.
  - Replace the standard convolution with a depthwise separable convolution. It achieves a similar ~8.4x
    parameter reduction while preserving the 128-channel feature depth, thus retaining higher model accuracy.
  - Apply 4-bit integer quantization to the existing layer. This will reduce the model size by 4x, which
    is the most significant saving possible.
  correct_index: 2
