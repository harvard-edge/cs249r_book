title: 'TinyML TCO Evaluation: Make vs Buy for TinyML Model Development'
scenario: 'A company needs a gesture recognition TinyML model for Cortex-M4 (256KB SRAM, 168MHz). Option
  A: license a pre-trained model ($5K/year, 200KB SRAM, 95% accuracy). Option B: develop in-house (2 ML
  engineers at $150K/year each, 3 months development = $75K, 180KB SRAM, 92% accuracy, 0 royalties). Calculate
  3-year TCO for each and identify when in-house becomes cheaper.'
question: "How would you calculate 3-year TCO for each and identify when in-house becomes cheaper?"
details:
  realistic_solution: 'Option A: License: $5K*3=$15K. Engineering time to integrate: 0.25 engineer * $150K
    * 1/4yr = $9.375K. Total 3yr: $24.375K. Option B: Development: 2 engineers * $150K * 0.25yr = $75K.
    Maintenance (0.5 FTE/yr): $75K/yr * 3yr = $225K. Engineering integration (same): $9.375K. Total 3yr:
    $75K+$225K+$9.375K=$309.375K. Option A is 12.7x cheaper over 3yr! Break-even: License $5K/yr vs maintenance
    $75K/yr. License wins indefinitely ($5K << $75K). In-house only makes sense at very high scale (>100
    products needing the model) where license fee stacks up vs fixed maintenance cost.'
  common_mistake: 'Not accounting for ongoing model maintenance in option B (model drift, accuracy decay
    over time requires retraining: 0.5 FTE/year = $75K/year) and not including the opportunity cost of
    2 engineers spending 3 months on this vs other projects.'
  napkin_math: 'Option A 3yr: $5K*3+$9.375K=$24.375K. Option B 3yr: dev$75K + maint 0.5*$150K*3=$225K
    + integration $9.375K = $309.375K. Ratio: 309/24.4=12.7x. Break-even: License grows as $5K*N (where
    N=years). In-house: $75K (dev) + $75K*N (maintenance). Break-even: 75K+75K*N = 5K*N → 75K = N*(5K-75K)
    = -70K*N → no break-even (in-house always more expensive if maintenance > license). License cheaper
    at all time horizons when maintenance>license! Only reversal: if 0 maintenance needed (unlikely) or
    license fee exceeds dev amortization ($75K dev / $5K license savings = 15yr payback).'
