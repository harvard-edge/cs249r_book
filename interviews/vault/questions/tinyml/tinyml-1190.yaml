title: Asymmetric Dual-Model Degradation on ESP32-S3
scenario: You are designing an always-on acoustic anomaly detection system for an industrial sensor using an ESP32-S3. Under normal conditions, the system streams a 3 MB INT8 CNN from PSRAM to classify faults. However, when the battery drops below 10% or the PSRAM interface experiences thermal throttling, the system must shed power while maintaining fail-operational status.
question: How should ESP32-S3 degrade from a PSRAM-streamed CNN to an SRAM-resident anomaly model under low battery or PSRAM throttling?
details:
  realistic_solution: Architect a hard fallback regime utilizing an asymmetric dual-model strategy. Pin a tiny, sub-100 KB temporal convolutional network (TCN) permanently in the 512 KB internal SRAM alongside the OS kernel. During deep degradation, forcibly power-collapse the PSRAM controller and halt the secondary core, routing all continuous telemetry strictly through the sub-100 KB SRAM gatekeeper to preserve zero-cost QoS baseline monitoring.
  common_mistake: |
    **The Pitfall:** Attempting to dynamically page a fallback model from cold non-volatile Flash into SRAM strictly upon hitting a low-battery state.
    **The Rationale:** Candidates conventionally assume that "lazy loading" from Flash on demand provides elegant memory efficiency.
    **The Consequence:** Pulling megabytes from Flash generates a monstrous I/O energy spike, triggering battery brownout voltage drops precisely when the system is weakest.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - ESP32-S3 @ 240 MHz. SRAM: 512 KB.
       - OS/Network stack: ~200 KB.
       - Fallback Model: 2M MAC inference, 100 KB weights + 100 KB arena.
    2. **Calculations:**
       - Usable SRAM = 512 KB - 200 KB = 312 KB.
       - Fallback Footprint = 200 KB. (200 KB < 312 KB).
       - Compute Execution = 2M MACs / (240 MHz * 1 MAC/cycle) = ~8.33 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Verified Graceful Shedding**. The model executes smoothly inside native SRAM, consuming just 8.33 ms and completely severing the PSRAM power drain.
