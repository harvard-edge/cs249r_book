title: Vibration Monitor Max Frequency
scenario: A Cortex-M4 vibration monitor runs an FFT+ML taking 100ms at 12mW. Sleep
  power is 0.1mW. Target average power is 1mW.
question: Apply a duty cycle constraint to determine the maximum continuous sampling
  frequency in Hz.
visual:
  kind: svg
  path: tinyml-1635.svg
  alt: Timeline showing 100ms active spike followed by ~1.2s sleep
  caption: 0.75 Hz Execution Pattern
details:
  realistic_solution: 1mW = 12mW * (0.1s * f) + 0.1mW * (1 - 0.1s * f). 1 = 1.2f +
    0.1 - 0.01f. 0.9 = 1.19f. f = 0.9 / 1.19 = 0.756 Hz.
  common_mistake: Using pure duty cycle percentage but failing to convert it back
    to actual Hz given the 100ms active window.
  napkin_math: f = 0.9 / 1.19 = 0.75 Hz.
