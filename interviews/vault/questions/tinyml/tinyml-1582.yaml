title: SRAM Tiling Bottleneck
scenario: An application is thrashing between SRAM and Flash on a Cortex-M4 (80 MHz), leading to missed inference deadlines for 10ms audio frames.
question: Evaluate whether rewriting the loop to block spatial convolution tiles into the 64KB SRAM bank will resolve the flash memory bottleneck.
visual:
  kind: svg
  path: tinyml-1582.svg
  alt: Comparison of memory access latencies between SRAM and Flash.
  caption: Memory Access Latency
details:
  realistic_solution: The candidate should evaluate that tiling reduces Flash memory fetches by reusing activations loaded into SRAM. If the bottleneck is the slow Flash read latency, blocking maximizes SRAM utilization and minimizes the repeated Flash access penalty.
  common_mistake: |
    **The Pitfall:** Assuming the computation speed (80 MHz) is the bottleneck.
    **The Rationale:** Candidates focus on the CPU clock rate rather than analyzing the memory access pattern and the high latency of repeated Flash fetches.
    **The Consequence:** Optimizing the wrong component (compute) while the pipeline continues to stall on memory I/O.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - CPU Clock: 80 MHz.
       - SRAM Latency: 1 cycle.
       - Flash Latency: >3 cycles.
       - SRAM Capacity: 64KB.
    2. **Calculations:**
       - Fetching from Flash costs 3x more cycles per memory access compared to SRAM.
       - Blocking spatial convolution tiles directly into the 64KB SRAM maximizes utilization.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Resolved**. Tiling into SRAM eliminates repeated 3-cycle stalls from Flash memory fetches.
