title: SRAM Tiling Bottleneck
scenario: An application is thrashing between SRAM and Flash on a Cortex-M4 (80 MHz),
  leading to missed inference deadlines for 10ms audio frames.
question: Evaluate whether rewriting the loop to block spatial convolution tiles into
  the 64KB SRAM bank will resolve the flash memory bottleneck.
visual:
  kind: svg
  path: tinyml-1582.svg
  alt: Comparison of memory access latencies between SRAM and Flash.
  caption: Memory Access Latency
details:
  realistic_solution: The candidate should evaluate that tiling reduces Flash memory
    fetches by reusing activations loaded into SRAM. If the bottleneck is the slow
    Flash read latency, blocking maximizes SRAM utilization and minimizes the repeated
    Flash access penalty.
  common_mistake: Assuming that the computation speed (80 MHz) is the issue rather
    than the memory access pattern.
  napkin_math: SRAM latency (1 cycle) << Flash latency (>3 cycles)
