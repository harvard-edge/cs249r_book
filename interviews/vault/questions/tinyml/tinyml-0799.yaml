title: Tinyml New 0023
scenario: A vision model on an M4 accurately processes 5 frames per second. However, the system's real-time control loops periodically miss their strict 1ms deadlines whenever a camera frame is captured.
question: Why do camera frame captures cause 1 ms control-loop deadlines to be missed on the M4?
details:
  realistic_solution: The symptom is caused by blocking CPU I/O. The camera is connected via a parallel or SPI interface, and the CPU is manually polling and copying every byte of the incoming frame into SRAM. This monopolizes the CPU, starving the RTOS control loops. The solution is to configure Direct Memory Access (DMA) to stream the camera data into SRAM asynchronously while the CPU handles control tasks.
  common_mistake: |
    **The Pitfall:** Implementing synchronous blocking reads for high-bandwidth sensors.
    **The Rationale:** Developers often rely on simple polling loops to read data, ignoring the impact on RTOS scheduling.
    **The Consequence:** The CPU is monopolized by I/O, starving real-time control loops and missing deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:** QVGA frame is 320x240 RGB. CPU copy at 168 MHz (1 byte/cycle). 1 ms control loop deadline.
    2. **Calculations:** Frame size = 320 * 240 * 3 = 230,400 bytes. Transfer cycles = 230,400 cycles. Transfer time = 230,400 / 168,000,000 = 1.37 ms.
    3. **Conclusion & Interpretation:** **1.37 ms lockup exceeds the 1 ms control loop deadline. Result: I/O-Bound.**
