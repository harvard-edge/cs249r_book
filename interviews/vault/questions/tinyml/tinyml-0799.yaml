title: Tinyml New 0023
scenario: A vision model on an M4 accurately processes 5 frames per second. However, the system's real-time
  control loops periodically miss their strict 1ms deadlines whenever a camera frame is captured.
details:
  realistic_solution: The symptom is caused by blocking CPU I/O. The camera is connected via a parallel
    or SPI interface, and the CPU is manually polling and copying every byte of the incoming frame into
    SRAM. This monopolizes the CPU, starving the RTOS control loops. The solution is to configure Direct
    Memory Access (DMA) to stream the camera data into SRAM asynchronously while the CPU handles control
    tasks.
  common_mistake: Implementing synchronous blocking reads for high-bandwidth sensors (cameras) in a real-time
    system.
  napkin_math: QVGA frame 320×240 RGB = 230KB. CPU copy at 168MHz (1 byte/cycle) = 230,000 cycles = ~1.37ms
    of 100% CPU lockup. If the control loop deadline is 1ms, it will be missed during the frame transfer.
