title: 'Hardware-Aware NAS for Keyword Spotting on nRF5340'
scenario: 'You are tasked with designing a hardware-aware Neural Architecture Search (NAS) pipeline for a keyword spotting application running on a Nordic nRF5340. The system must operate within the strict constraints of the 128 MHz application core, 512 KB SRAM, and 1 MB flash, while reserving 64 KB SRAM for the Bluetooth stack (BLE 5.3) and application logic.'
question: 'How should a hardware-aware NAS pipeline constrain memory, latency, and search rewards for nRF5340 keyword spotting?'
details:
  realistic_solution: 'The NAS must explicitly constrain peak memory usage to the available SRAM after system overheads. The reward function should penalize models exceeding this peak memory and those failing the latency budget. A latency look-up table (LUT) or proxy model built specifically for the nRF5340''s 128 MHz core should be used during the search to evaluate candidate architectures efficiently, as FLOP counts do not perfectly correlate with on-device latency.'
  common_mistake: 'Candidates often fail to account for the SRAM overhead required by the RTOS, audio buffers, and BLE stack, leading to a NAS search space that produces models with peak memory footprints too large to fit in the remaining memory. They might also rely on FLOPs instead of measuring empirical latency on the nRF5340, ignoring the impact of memory access patterns.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Total SRAM: 512 KB, Reserved: 64 KB.
    - Target latency: 50ms at 128 MHz.
    - Hardware efficiency: ~2 cycles per MAC.

    **Calculations:**
    - Available SRAM: 512 KB - 64 KB = 448 KB.
    - Max cycles per inference: 128,000,000 * 0.05 = 6.4 million cycles.
    - Max theoretical MACs: 6.4M / 2 = 3.2 million MACs.

    **Conclusion & Interpretation:**
    - **Result: 448 KB, 3.2M MACs (Memory & Compute Bound)**. The NAS search space must strictly constrain peak memory to 448 KB and operations to < 3.2M MACs.
