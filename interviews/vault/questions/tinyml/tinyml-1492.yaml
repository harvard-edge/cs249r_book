title: PSRAM vs SRAM Latency Impact on Inference on ESP32-S3
scenario: ESP32-S3 has 512KB on-chip SRAM (single-cycle access) and 8MB external PSRAM (Octal SPI at ~80MHz, 4-8 cycle latency). A 500KB INT8 model doesn't fit in SRAM and requires PSRAM.
question: How much latency does PSRAM add when an ESP32-S3 streams 500 KB of INT8 weights instead of using SRAM?
details:
  realistic_solution: 'SRAM: single-cycle at 240MHz = 4.17ns access. PSRAM: 80MHz Octal SPI = 12.5ns clock, 4-8 cycles = 50-100ns access latency. For sequential reads (model weight streaming), PSRAM burst bandwidth: 8 bits × 80MHz × 8 (octal) = ~80 MB/s. For 500KB model inference: streaming bandwidth limit = 500KB / 80MB/s = 6.25ms per weight load. SRAM equivalent: 500KB / (240MHz × 4B) = 500KB/960MB/s = 0.52ms — 12× faster. Strategy: keep activations in SRAM (50-100KB), stream weights from PSRAM sequentially to maximize burst efficiency.'
  common_mistake: |
    **The Pitfall:** Assuming PSRAM bandwidth is the only bottleneck.
    **The Rationale:** Engineers focus purely on the MB/s bandwidth rating and forget the severe access latency (4-8 cycles) required to initiate burst reads over SPI.
    **The Consequence:** Sequential streaming efficiency is overestimated, leading to unexpected stuttering in real-time inference tasks.
  napkin_math: |
    1. SRAM throughput: 240 MHz × 4 Bytes = 960 MB/s.
    2. PSRAM Octal SPI throughput: 80 MHz × 8 lines = ~80 MB/s effective.
    3. Load from PSRAM: 500 KB / 80 MB/s = 6.25 ms.
    4. Load from SRAM: 500 KB / 960 MB/s = 0.52 ms.
    5. Latency penalty: 6.25 ms vs 0.52 ms makes PSRAM access **12× slower**.
