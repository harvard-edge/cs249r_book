title: Throughput Impact of I/O Overlap on Microcontrollers
scenario: 'A Cortex-M4 at 120 MHz processes incoming audio in a 4-stage pipeline:
  ADC sample (3 ms), filter+windowing (2 ms), inference (10 ms), SPI transmit (5
  ms). The pipeline shares a single 64 KB SRAM bank, and DMA transfers contend
  with CPU loads on bus arbitration - empirically each DMA-active ms costs 8% extra
  CPU time. Two SRAM banks could double-buffer to eliminate contention but only
  if the chip has dual-bank SRAM (Cortex-M4 reference part has unified bank).'
question: Evaluate the realized throughput gain from double-buffering, accounting
  for DMA bus contention (~8% per active ms). Identify whether the chip's single-bank
  SRAM bottlenecks the maximum overlap, and quantify the gap from ideal.
details:
  realistic_solution: 'Sequential baseline (no overlap): total frame time =
    3 + 2 + 10 + 5 = 20 ms; throughput = 50 fps. Idealised double-buffered
    model: stages overlap, so steady-state rate is gated by max(stage_i) =
    max(3, 2, 10, 5) = 10 ms; throughput = 100 fps; ideal speedup = 2.0x.
    DMA contention correction. The single-bank SRAM forces DMA (used for
    ADC and SPI transfers) to contend with CPU loads during the inference
    stage. The 8% per-active-ms penalty applies to the inference stage
    while DMA is active. If ADC DMA spans 3 ms and SPI DMA spans 5 ms but
    they overlap with the 10 ms inference (8 ms total DMA-active during
    inference), the inference stage inflates to 10 + 8 * 0.08 = 10.64 ms.
    Realised throughput = 1000 / 10.64 = 94 fps. Realised speedup = 94 / 50
    = 1.88x, not the idealised 2.0x. The 8% bus-arbitration tax costs ~6
    fps - a 6.4% gap from ideal. A dual-bank-SRAM part eliminates this
    contention and recovers full 2.0x speedup. Conclusion: single-bank
    chip already gets 94% of the ideal benefit, so the dual-bank cost
    premium is justified only if the application is hard-real-time at the
    tail.'
  common_mistake: 'Computing the overlap speedup as max(stage_i) without
    applying the 8% DMA-contention tax during the binding (inference)
    stage; or attributing the penalty to the wrong stage (e.g., adding it
    to ADC, which is shorter than inference and not the bind).'
  napkin_math: 'Sequential = 20 ms = 50 fps. Ideal overlap = max(3,2,10,5)
    = 10 ms = 100 fps. Inference stretched by DMA contention = 10 + 8 *
    0.08 = 10.64 ms = 94 fps. Realised speedup = 1.88x (vs ideal 2.0x).'
