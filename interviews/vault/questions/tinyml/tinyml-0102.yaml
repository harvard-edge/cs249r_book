title: The BLE Connection Event Starvation
scenario: Your wearable device runs a gesture recognition model. It streams the classification results (4 bytes) over Bluetooth Low Energy (BLE) to a phone. The model takes 30ms to run. You configure the BLE connection interval to 15ms to ensure low latency. The system works, but the model's inference time randomly spikes to 45ms or 60ms.
question: Why does a 15 ms BLE connection interval make a 30 ms gesture model spike to 45-60 ms?
details:
  realistic_solution: You caused Radio Interrupt Preemption. The BLE stack relies on high-priority radio interrupts (typically IRQ priority 0-1) that fire precisely at connection event boundaries. When your 30ms model inference runs with interrupts disabled (or in a critical section), it blocks the radio ISR from servicing the 15ms connection interval. After missing consecutive connection events, the phone drops the link. The fix is to split inference into chunks that yield to the radio ISR. Use PendSV (priority 15) for model inference and keep the radio ISR at priority 0. Alternatively, extend the connection interval to 50ms.
  common_mistake: |
    **The Pitfall:** Assuming the BLE data transmission payload size (4 bytes) is the bottleneck.
    **The Rationale:** Candidates think sending 4 bytes takes milliseconds, ignoring the actual radio scheduling priority and interrupt overhead.
    **The Consequence:** Failing to diagnose interrupt preemption, leading to missed real-time deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - BLE interval: 15ms.
    - Overhead per BLE interrupt: 3ms.
    - Base inference time: 30ms.

    **Calculations:**
    - 30ms inference spans at least two BLE intervals.
    - CPU loses 2 * 3ms = 6ms to high-priority radio interrupts.
    - Actual latency = 30ms + 6ms = 36ms (or worse with jitter).

    **Conclusion & Interpretation:**
    - **Result: 36ms+ (Interrupt-Bound)**. Preemption increases latency from 30ms to 36ms+.
