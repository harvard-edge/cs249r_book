title: The BLE Connection Event Starvation
scenario: Your wearable device runs a gesture recognition model on a single-core Cortex-M4. It streams
  the classification results (4 bytes) over Bluetooth Low Energy (BLE) to a phone. The model takes 30ms
  to run. You configure the BLE connection interval to 15ms to ensure low latency. The system works, but
  the model's inference time randomly spikes to 45ms or 60ms. What protocol conflict is causing the ML
  latency spikes?
details:
  realistic_solution: You caused Radio Interrupt Preemption. The BLE stack on Cortex-M4 relies on high-priority
    radio interrupts (typically IRQ priority 0–1) that fire precisely at connection event boundaries.
    When your 30ms model inference runs with interrupts disabled (or in a critical section), it blocks
    the radio ISR from servicing the 15ms connection interval. After missing 6 consecutive connection
    events (the BLE supervision timeout), the phone drops the link. The fix is to split inference into
    chunks that yield to the radio ISR. On Cortex-M4, use PendSV (priority 15) for model inference and
    keep the radio ISR at priority 0. Alternatively, extend the connection interval to 50ms (trading latency
    for reliability) or use a dual-core SoC where one core handles BLE and the other runs inference without
    contention.
  common_mistake: '"The BLE transmission takes too long." Sending 4 bytes over BLE takes microseconds.
    The issue is the radio''s scheduling priority.'
  napkin_math: The BLE radio stack operates at highest interrupt priority. A BLE connection interval of
    15ms means the stack preempts the CPU every 15ms for 3ms of event overhead. A baseline 30ms inference
    will span at least two BLE intervals. The CPU loses 2 * 3ms = 6ms. Actual latency increases from 30ms
    to 36ms (+20% overhead).
