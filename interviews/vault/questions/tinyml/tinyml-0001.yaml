title: The Memory Collision
scenario: >
  Your model occasionally produces random garbage results, but only when the device is under heavy interrupt load (e.g., fast UART logging + high-speed sensor polling).
question: >
  Based on the SRAM layout, how is your 'stable' tensor arena being corrupted?
details:
  realistic_solution: >
    You have a Stack-Arena Collision. On Cortex-M, the stack grows downward. Deep function calls or nested interrupts can push the stack into the memory space of the tensor arena, overwriting model activations. The fix is to place a Stack Canary at the boundary, use the MPU (Memory Protection Unit) to forbid stack access to the arena region, or move the stack to the very top of SRAM so it faults at the limit rather than corrupting data.
  common_mistake: |
    **The Pitfall:** Assuming the tensor arena is simply too small and needs to be increased.
    **The Rationale:** Candidates immediately jump to sizing issues rather than spatial layout relative to dynamic memory regions.
    **The Consequence:** The real issue (stack collision) is ignored, and increasing the arena size might actually worsen the collision.
  napkin_math: |
    - **Stack size:** If your stack is 8 KB and your arena starts at the 8 KB mark.
    - **Interrupt overhead:** A single nested interrupt pushes an extra 256 bytes of context.
    - **Collision:** The stack grows downward into the arena region.
    - **Conclusion:** The first several rows of your input tensor are **overwritten**.
