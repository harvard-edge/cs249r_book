title: The Memory Collision
scenario: >
  Your model occasionally produces random garbage results, but only when the device is under heavy interrupt load (e.g., fast UART logging + high-speed sensor polling).
question: Based on the SRAM layout, how is your 'stable' tensor arena being corrupted?
details:
  realistic_solution: |
    You have a Stack-Arena Collision. On Cortex-M, the stack grows downward. Deep function calls or nested interrupts can push the stack into the memory space of the tensor arena, overwriting model activations. The fix is to place a Stack Canary at the boundary, use the MPU (Memory Protection Unit) to forbid stack access to the arena region, or move the stack to the very top of SRAM so it faults at the limit rather than corrupting data.
  common_mistake: |
    **The Pitfall:** Assuming the tensor arena is simply too small and requires a size increase.
    **The Rationale:** Candidates jump to sizing issues rather than spatial layout relative to dynamic memory regions.
    **The Consequence:** The real issue is ignored, and increasing arena size might worsen the collision.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cortex-M stack grows downward into the heap/arena space.
       - Heavy interrupts push deep stack frames.
    2. **Calculations:**
       - Single nested interrupt context: 256 bytes pushed to stack.
       - If stack boundary is adjacent to tensor arena, 256 bytes of tensor data is overwritten per interrupt layer.
    3. **Conclusion & Interpretation:** The stack physically overwrites the tensor space. **Result: Memory-Bound (Stack Collision)**.
