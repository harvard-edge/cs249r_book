title: Smart Doorbell Shedding Policy
scenario: A smart doorbell uses a Cortex-M4 at 100 MHz for wake-word detection. Audio
  frames arrive every 16ms, and feature extraction plus NN inference takes 1.3M cycles
  combined.
question: Specify the maximum tolerable arrival rate before the queue length goes
  to infinity, and design a shedding policy if arrivals burst to 100 frames per second.
details:
  realistic_solution: At 100 MHz, the system can process 1 frame in 13ms (1.3M / 100M).
    The maximum processing rate is 76.9 fps. If arrivals burst to 100 fps, the queue
    will grow unboundedly; a strict tail-drop shedding policy that drops 1 in every
    4 frames (effectively reducing the rate to 75 fps) must be implemented to maintain
    real-time execution.
  common_mistake: Ignoring the hard physical limit of the clock frequency and assuming
    a larger queue size can permanently solve an over-capacity arrival rate.
  napkin_math: Max rate = 100,000,000 / 1,300,000 = 76.9 fps.
