title: ESP32-S3 Roofline Memory Architecture Specification
scenario: You are tasked with deploying a visual wake word model on the ESP32-S3. The hardware features
  a 240 MHz dual-core Xtensa processor with INT8 vector extensions, 512 KB of SRAM, and 8 MB of PSRAM.
  The model requires 30 million MAC operations and has 800 KB of INT8 weights, needing to run in under
  50ms. Specify a memory placement and execution architecture using roofline analysis to determine if
  the system will be compute-bound or memory-bound, and how you will meet the latency requirements.
question: "How should an ESP32-S3 visual wake-word model stage 800 KB of weights so roofline analysis meets a 50 ms latency target?"
details:
  realistic_solution: The candidate should specify an architecture where activations and the current layer's
    weights are strictly allocated in the 512 KB SRAM, using double-buffering via DMA to stream the 800
    KB of weights from PSRAM. By plotting the roofline, they should demonstrate that reading weights directly
    from PSRAM drops the operational intensity into the memory-bound region, whereas pinning execution
    to SRAM keeps the workload compute-bound and satisfies the 50ms constraint.
  common_mistake: Candidates often calculate the theoretical peak compute of the vector extensions but
    fail to construct a roofline model that accounts for the massive bandwidth disparity between SRAM
    and PSRAM. They mistakenly assume relying on the PSRAM cache will be sufficient for high-throughput
    convolutions without explicit memory management.
  napkin_math: 'Required throughput: 30M MACs / 0.05s = 600 MMACs/s. ESP32-S3 Peak Compute: 240 MHz *
    2 cores * 16 MACs/cycle = 7.68 GMACs/s. PSRAM Bandwidth (typical Octal SPI): ~40 MB/s. If computing
    directly from PSRAM (assume 1 Byte per MAC), max throughput is 40 MMACs/s (fails 600 MMACs/s target).
    SRAM Bandwidth (32-bit/cycle at 240 MHz): 960 MB/s. Staging weights into SRAM yields up to 960 MMACs/s
    memory bandwidth, moving the workload to the compute-bound region and successfully exceeding the 600
    MMACs/s requirement.'
