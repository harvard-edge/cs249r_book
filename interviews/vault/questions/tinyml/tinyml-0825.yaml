title: Shared Tensor Arena for Sequential Models
scenario: 'A smart speaker runs two sequential models using TensorFlow Lite for Microcontrollers
  on a Cortex-M4: a 120KB wake-word model and a 300KB command-recognition model. The
  system has 500KB of total SRAM.'
question: Analyze the memory allocation strategy required to serve both models sequentially
  without exceeding the 500KB SRAM limit.
details:
  realistic_solution: The sum of the static weights is 120KB + 300KB = 420KB. This
    leaves exactly 80KB of SRAM available. Because the models execute sequentially,
    they do not need separate activation buffers. They can safely share a single 80KB
    tensor arena, provided neither model's peak activation footprint exceeds 80KB.
  common_mistake: Assuming both models require strictly separate, independent tensor
    arenas for activations rather than reusing a shared memory block.
  napkin_math: 500 - 120 - 300 = 80KB
