title: Shared Tensor Arena for Sequential Models
scenario: A smart speaker runs two sequential models using TensorFlow Lite for Microcontrollers on a Cortex-M4: a 120KB wake-word model and a 300KB command-recognition model. The system has 500KB of total SRAM.
question: Analyze the memory allocation strategy required to serve both models sequentially without exceeding the 500KB SRAM limit.
details:
  realistic_solution: The sum of the static weights is 120KB + 300KB = 420KB. This leaves exactly 80KB of SRAM available. Because the models execute sequentially, they do not need separate activation buffers. They can safely share a single 80KB tensor arena, provided neither model's peak activation footprint exceeds 80KB.
  common_mistake: |
    **The Pitfall:** Allocating separate tensor arenas for sequential models.
    **The Rationale:** Developers instantiate complete runtime environments for each model independently.
    **The Consequence:** The combined activation memory overflows the tight SRAM budget, when a single shared arena could have accommodated both safely.
  napkin_math: |
    *   **Total SRAM:** 500 KB.
    *   **Static Weights:** 120 KB + 300 KB = 420 KB.
    *   **Remaining SRAM:** 500 KB - 420 KB = **80 KB**.
    *   **Conclusion:** Both models must share a single 80 KB tensor arena for activations, limiting the peak activation footprint of either model to 80 KB.
