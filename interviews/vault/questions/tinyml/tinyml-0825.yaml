title: Shared Tensor Arena for Sequential Models
scenario: 'A smart speaker runs two sequential models using TensorFlow Lite for Microcontrollers: a 120KB wake-word model and a 300KB command-recognition model. The system has 500KB of total SRAM.'
question: Analyze the memory allocation strategy required to serve both models sequentially without exceeding the 500KB SRAM limit.
details:
  realistic_solution: The sum of the static weights is 420KB, leaving exactly 80KB of SRAM available. Because the models execute sequentially, they do not need separate, concurrent activation buffers. They can safely share a single 80KB tensor arena, provided neither model's peak activation footprint independently exceeds this 80KB threshold.
  common_mistake: |
    **The Pitfall:** Allocating separate tensor arenas for sequential models.
    **The Rationale:** Developers natively instantiate complete runtime environments for each model independently.
    **The Consequence:** The combined activation memory natively overflows the tight SRAM budget, when a single shared arena would have avoided OOM hard faults.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total SRAM: 500 KB.
       - Static Weights: 120 KB + 300 KB = 420 KB.
    2. **Calculations:**
       - Remaining SRAM: 500 KB - 420 KB = 80 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** Both models must share a single 80 KB tensor arena for activations.
