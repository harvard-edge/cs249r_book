title: Wake-up Latency Blind Spots in Audio ML
scenario: A battery-powered Cortex-M4 acoustic sensor sleeps until triggered by an
  analog threshold, but misses rapid successive gunshots.
question: Diagnose the cause of the dropped audio events given the Cortex-M4 requires
  20ms to transition from deep sleep to active execution.
details:
  realistic_solution: The 20ms wake-up latency creates a blind spot. When the first
    sound triggers the interrupt, the MCU spends 20ms stabilizing clocks and initializing
    the ADC. Any subsequent rapid sounds in this window are dropped because the MCU
    isn't ready to buffer audio.
  common_mistake: Blaming inference execution latency for missed sounds rather than
    the hardware transient boot time.
  napkin_math: 1 / 0.020s = max 50 wakeups/sec.
