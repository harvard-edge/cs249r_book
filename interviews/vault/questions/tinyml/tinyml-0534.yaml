title: 'The Silent Doorbell Failure'
scenario: 'You are deploying a ''Hello'' keyword-spotting model on a smart doorbell''s Cortex-M4 MCU. To meet the strict 256KB Flash budget, you''ve quantized the entire model to INT8. The model performs flawlessly in the lab. However, field reports show it frequently fails to activate when users speak loudly or are very close to the device. Analyzing a failed inference run, you discover that the activation outputs of the first convolutional layer are heavily clustered at the minimum INT8 value, -128.'
question: 'Why do loud close-range doorbell activations clamp to -128 in a 256 KB Flash INT8 keyword model?'
details:
  realistic_solution: 'The root cause is a quantization calibration mismatch. The dataset used to calibrate the FP32-to-INT8 conversion had a narrower dynamic range than the audio captured in the field. Loud sounds produce floating-point activation values that exceed the range observed during calibration. When these values are quantized, they ''saturate'' or ''overflow,'' getting clamped to the min/max of the INT8 range ([-128, 127]). This corruption in the first layer''s feature map cascades through the network, leading to an incorrect prediction (a false negative). The solution is to re-calibrate the model with a more representative dataset that includes loud and close-proximity audio samples.'
  common_mistake: 'Engineers often misdiagnose this as a classic ML generalization problem (overfitting) or a hardware issue (mic clipping). While related, the specific evidence—activations clamped at the integer boundary—points to a more precise systems-level failure: the quantization parameters are wrong for the real-world signal''s dynamic range.'
  napkin_math: |
    **Assumptions & Constraints:**
    - MCU: 1MB Flash, 64KB RTOS, 32KB Bootloader, 450KB OTA.
    - FP32 Model: 500KB.

    **Calculations:**
    - Available Flash: 1024 - 64 - 32 - 450 = ~478 KB.
    - FP32 Model size check: 500KB > 478KB (fails).
    - INT8 Model size check: 500KB / 4 = 125KB < 478KB (passes).

    **Conclusion & Interpretation:**
    - **Result: Calibration Mismatch (Precision Bound)**. Quantization is required for memory limits, but narrow calibration data causes loud signals to exceed the INT8 dynamic range and clamp to -128.
  options:
  - 'The model has overfit to the clean lab audio and cannot generalize to noisy field conditions.'
  - 'The microphone''s analog-to-digital converter is clipping the raw audio waveform before it reaches the MCU.'
  - 'The calibration dataset for INT8 quantization was not representative, causing activation values from loud sounds to overflow.'
  - 'The Tensor Arena in SRAM is too small, and the larger activations from loud sounds are causing memory corruption.'
  correct_index: 2
