title: Architecting a KWS Memory Pipeline for ESP32-S3
scenario: You are tasked with designing a continuous keyword spotting system for a
  smart home device using an ESP32-S3 microcontroller. The device must listen for
  a wake word while maintaining a WiFi connection, and the ML inference must run locally.
  Given the ESP32-S3's 512 KB of fast internal SRAM, 8 MB of slower external PSRAM,
  and vector extensions for INT8, how would you architect the memory hierarchy and
  model execution strategy to meet real-time latency constraints?
question: How should ESP32-S3 SRAM and PSRAM be partitioned for continuous keyword
  spotting with WiFi enabled?
details:
  realistic_solution: A robust architecture pins the RTOS, WiFi stack, audio ring
    buffer, and the model's intermediate activations (working memory) to the 512 KB
    internal SRAM to ensure deterministic low-latency execution. The INT8 quantized
    model weights should reside in the 8 MB PSRAM, accessed via cache, to maximize
    the use of the fast SRAM for highly volatile data and vector math.
  common_mistake: Candidates often place all model weights and activations in the
    8 MB PSRAM because of its size, ignoring the significant latency penalty and cache
    misses compared to the 512 KB SRAM. They also frequently forget to account for
    the memory overhead of the WiFi stack and RTOS.
  napkin_math: Total internal SRAM = 512 KB. Estimated WiFi stack + FreeRTOS overhead
    = 150 KB. Audio ring buffer (1 sec of 16kHz, 16-bit) = 32 KB. Remaining SRAM =
    330 KB. A typical INT8 CNN requires ~100 KB peak memory for activations, fitting
    safely in SRAM. The ~2 MB model weights are placed in the 8 MB PSRAM.
