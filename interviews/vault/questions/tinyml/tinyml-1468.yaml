title: ESP32-S3 Sensor Data Buffering
scenario: You are designing a real-time anomaly detection system for industrial machinery. The device samples a 3-axis accelerometer at 1000 samples/second, with each axis generating a 16-bit integer. This data needs to be streamed over Wi-Fi to a gateway. Due to potential intermittent network connectivity, you must buffer the data on the device.
question: How should SRAM and PSRAM buffers prevent data loss during short Wi-Fi outages for 3-axis accelerometer streaming?
details:
  realistic_solution: 'Utilize a small, high-priority circular buffer in SRAM for immediate samples awaiting processing. Implement a larger, secondary circular buffer in PSRAM to absorb data during network outages. Employ efficient binary serialization to minimize payload size.'
  common_mistake: |
    **The Pitfall:** Allocating massive continuous buffers exclusively in SRAM.
    **The Rationale:** Candidates fail to distinguish between the fast/scarce SRAM and slow/abundant PSRAM memory hierarchy.
    **The Consequence:** Critical system interrupts crash due to SRAM starvation while gigabytes of PSRAM sit idle.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Data rate: 3 axes * 1000 Hz * 2 bytes = 6 KB/s.
       - SRAM Buffer: 64 KB.
       - PSRAM Buffer: 4096 KB (4 MB).
    2. **Calculations:**
       - SRAM capacity = 64 KB / 6 KB/s ≈ 10.6 seconds.
       - PSRAM capacity = 4096 KB / 6 KB/s ≈ 682 seconds (11.3 minutes).
    3. **Conclusion & Interpretation:**
       - **Result: IO-Bound.** The dual-buffer architecture provides over 11 minutes of resilience to Wi-Fi outages before data loss occurs.
