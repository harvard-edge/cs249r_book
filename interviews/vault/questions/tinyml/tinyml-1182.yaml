title: Adversarial Defense for Wake-Word on ARM Cortex-M4
scenario: You are deploying a TinyML wake-word detection model for a smart safe lock on an ARM Cortex-M4 (STM32F4). Recent reports show the system is vulnerable to over-the-air adversarial audio perturbations that force false accepts. The platform has a 168 MHz clock, 256 KB SRAM, 1 MB flash, no FPU, and utilizes CMSIS-NN SIMD (2x INT8 MACs/cycle).
question: How should the STM32F4 wake-word system defend against adversarial audio within a strict 50 ms latency budget?
details:
  realistic_solution: Design an architecture integrating integer-only randomized smoothing directly into the INT8 MFCC feature pipeline, coupled with an adversarially trained, highly quantized DS-CNN. By injecting bounded integer uniform noise via a fast PRNG (like Xorshift) prior to the first convolutional layer, the system disrupts the structured gradients of the adversarial attack. Leveraging CMSIS-NN SIMD ensures the INT8 operations execute efficiently without FPU overhead, easily accommodating the memory and latency boundaries.
  common_mistake: |
    **The Pitfall:** Proposing secondary autoencoders or floating-point spectral defenses.
    **The Rationale:** Candidates apply standard deep learning adversarial defenses without accounting for the 256 KB SRAM limit or the lack of an FPU.
    **The Consequence:** The defense mechanism immediately triggers Out-of-Memory errors or massive latency violations on the STM32F4.
  napkin_math: |
    - **Cycle Budget:** 50 ms at 168 MHz = 8.4 million cycles.
    - **Practical MAC Limit:** CMSIS-NN SIMD achieves ~1.5 MACs/cycle = up to 12.6 million MACs.
    - **DS-CNN Model:** ~4 million MACs, easily fitting within budget.
    - **Defense Overhead (Xorshift PRNG):** 10x49 spectrogram = 490 features. ~5 cycles/feature = 2,450 cycles.
    - **Result:** Defense consumes 2,450 / 8,400,000 = **< 0.03%** of the latency budget.
