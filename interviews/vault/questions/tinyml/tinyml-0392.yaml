title: The INT8 Energy Dividend (tinyml-0392)
scenario: You are designing a keyword spotting model for a battery-powered device. To maximize battery life, you are considering quantizing the model from FP16 to INT8.
question: From an energy consumption perspective, approximately how much less energy does a single INT8 multiplication consume compared to a single FP16 multiplication?
details:
  realistic_solution: 'An INT8 MAC operation consumes roughly 5x less energy than an FP16 MAC. The physics of the silicon dictate this non-linear relationship: while memory bandwidth scales linearly (2x reduction from 16-bit to 8-bit), the combinatorial logic for floating-point exponents and mantissas requires significantly more power than integer ALUs.'
  common_mistake: |
    **The Pitfall:** Conflating memory bandwidth savings with arithmetic energy savings.
    **The Rationale:** Engineers assume that because INT8 halves the memory footprint compared to FP16, the energy savings for computation must also be exactly 2x.
    **The Consequence:** They drastically underestimate the power efficiency gains of integer quantization, potentially over-provisioning battery capacity or discarding viable ML features.
  napkin_math: |
    1. **Assumptions & Constraints**:
       - 45nm process physical characteristics.
       - FP32 MAC = 3.7 pJ; FP16 MAC uses ~3.4x less than FP32.
       - INT8 MAC = 0.2 pJ.
    2. **Calculations**:
       - FP16 energy: 3.7 pJ / 3.4 ≈ 1.08 pJ.
       - Energy Ratio (FP16 / INT8): 1.08 pJ / 0.2 pJ ≈ 5.4x.
    3. **Conclusion & Interpretation**:
       - **Result: Power-Bound Optimization**. An INT8 operation uses roughly ~5x less energy than FP16, proving that arithmetic complexity reduction scales super-linearly compared to bit-width.
  options:
  - ~2x less energy
  - ~5x less energy
  - ~18x less energy
  - The energy is the same, only memory is saved
  correct_index: 1
