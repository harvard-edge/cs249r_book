title: 'TinyML TCO Realization: Manufacturing Cost Scaling for TinyML Product'
scenario: 'Realize the manufacturing cost scaling for a Cortex-M7+Ethos-U55 ($8) based TinyML industrial
  sensor at volumes of 1K, 10K, and 100K units. BOM at 1K: $8 MCU + $4 sensor + $3 PCB + $2 power management
  = $17. PCB cost scales as: 1K=$3, 10K=$1.50, 100K=$0.75. MCU volume discount: 10K=10%, 100K=20%. Calculate
  gross margin at each volume assuming $99 retail price.'
question: "How would you calculate gross margin at each volume assuming $99 retail price?"
details:
  realistic_solution: 'Retail: $99. Distributor 30%: manufacturer receives $69.30. 1K volume BOM: $17.
    Gross margin: ($69.30-$17)/$69.30=75.4%. 10K: MCU $8*0.90=$7.20. PCB=$1.50. BOM=(7.20+4+1.50+2)=$14.70.
    Assembly (volume: $1 vs $2): $14.70+$1=$15.70. Gross margin: ($69.30-$15.70)/$69.30=77.3%. 100K: MCU
    $8*0.80=$6.40. PCB=$0.75. Assembly=$0.50. BOM=(6.40+4+0.75+2+0.50)=$13.65. Gross margin: ($69.30-$13.65)/$69.30=80.3%.
    Margin improvement 1K→100K: 4.9pp. Hardware margins don''t scale as dramatically as software — BOM
    floor limits compression.'
  common_mistake: Applying volume discounts only to the MCU without recognizing that sensors, assembly
    labor, and packaging also have volume price breaks, understating the margin improvement at scale.
  napkin_math: 'Retail $99, mfr revenue $69.30. 1K: BOM=$17. GM=($69.30-$17)/$69.30=75.4%. 10K: MCU$7.20+sensor$3.60(10%)+PCB$1.50+PM$1.80(10%)+asm$1=$15.10.
    GM=($69.30-$15.10)/$69.30=78.1%. 100K: MCU$6.40+sensor$3.20(20%)+PCB$0.75+PM$1.60(20%)+asm$0.50=$12.45.
    GM=($69.30-$12.45)/$69.30=82.0%. 1K→100K: +6.6pp margin. For 100K units: gross profit=100K*($69.30-$12.45)=$5.685M.
    Net profit after OpEx (20%rev=100K*$19.80=$1.98M): $5.685M-$1.98M=$3.705M. Industrial IoT pricing
    power: $99 price on $12.45 BOM is 8x markup — justified by certification costs, warranty, support.'
