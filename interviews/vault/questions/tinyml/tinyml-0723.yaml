title: 'The L1 Cache Miss Penalty'
scenario: 'You are implementing a Transposed Convolution on an MCU with an L1 Data Cache. To perform the transpose, your C code reads sequentially from the input array, but writes to the output array using a massive stride (`output[i * 256] = val;`). The profiler shows the CPU is stalling constantly.'
question: 'Why does writing to memory with a massive stride destroy performance on an MCU with an L1 Data Cache?'
details:
  realistic_solution: |
    Strided writes cause constant cache line evictions. Reorder the loop to write sequentially, maximizing cache line utilization and eliminating the read-allocate/write-back thrashing.
  common_mistake: |
    **The Pitfall:** Assuming SRAM write speeds are inherently slower than reads.
    **The Rationale:** Candidates rely on asymmetrical memory intuition (like Flash/SSD) and fail to recognize cache thrashing on MCUs.
    **The Consequence:** Engineers waste time modifying algorithm math without fixing the underlying strided memory access pattern.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cache line size: 32 bytes (8 floats)
    - SRAM access: ~6 cycles read, ~6 cycles write

    **Calculations:**
    - Strided write (1 float/line): Fetch 32B (6c) + Evict 32B (6c) = 12 cycles/float
    - Sequential write (8 floats/line): 12 cycles / 8 floats = 1.5 cycles/float

    **Conclusion & Interpretation:**
    - **Result: 12 cycles per strided write (Memory-Bandwidth-Bound)**. Strided writes amplify memory bandwidth overhead by 8x.
