title: The L1 Cache Miss Penalty
scenario: You are implementing a Transposed Convolution (often used in audio upsampling) on an MCU with an L1 Data Cache. The input array is small. To perform the transpose, your C code reads sequentially from the input array, but writes to the output array using a massive stride (`output[i * 256] = val;`). The profiler shows the CPU is stalling constantly.
question: Why does writing to memory with a massive stride destroy performance on an MCU with an L1 Data Cache?
details:
  realistic_solution: Strided writes cause continuous cache line evictions. Writing to output[i*256] with 32-byte cache lines means each write targets a different cache line. The CPU must: (1) fetch the entire 32-byte cache line from SRAM (read-allocate policy, ~6 cycles), (2) modify 4 bytes, (3) evict the previous cache line (write-back, ~6 cycles). Effective cost: 12 cycles per write vs 1 cycle for sequential writes. Fix: transpose the loop order so writes are sequential.
  common_mistake: |
    **The Pitfall:** Assuming RAM write speeds are inherently slower than reads.
    **The Rationale:** Candidates know that reading is often faster in some media, but RAM speeds are symmetrical.
    **The Consequence:** They fail to identify cache line evictions as the root cause, leading to incorrect optimization attempts.
  napkin_math: |
    *   **Sequential write**: Packs 8 floats per 32-byte cache line = 1 SRAM access per 8 floats.
    *   **Strided write**: Each float lands in a different cache line.
    *   **Overhead**: Fetches 32 bytes (~6 cycles), modifies 4 bytes, evict 32 bytes (~6 cycles). Total ~12 cycles per float.
    *   **Conclusion**: **Strided writes amplify physical memory bandwidth requirements by ~16x compared to sequential writes.**
