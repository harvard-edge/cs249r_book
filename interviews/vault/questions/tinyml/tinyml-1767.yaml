title: XIP Flash Memory for TinyML Models
scenario: A Cortex-M4 smart watch application needs to switch between a wake-word
  detection model and a sleep-tracking model. RAM is 128KB, both models are 100KB.
question: Apply a memory management strategy to seamlessly switch models without requiring
  a full device reboot or adding external RAM.
details:
  realistic_solution: Store the models in ROM or Flash. Use XIP (eXecute In Place)
    to stream the weights directly from Flash over the SPI bus into the MAC units,
    reserving the entire 128KB SRAM purely for activations.
  common_mistake: Trying to copy weights from Flash to SRAM dynamically and crashing
    due to out-of-memory errors.
  napkin_math: 100 + 100 = 200KB > 128KB
