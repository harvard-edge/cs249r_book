title: XIP Flash Memory for TinyML Models
scenario: A Cortex-M4 smart watch application needs to switch between a wake-word detection model and a sleep-tracking model. RAM is 128KB, both models are 100KB.
question: Apply a memory management strategy to seamlessly switch models without requiring a full device reboot or adding external RAM.
details:
  realistic_solution: Store the models in ROM or Flash. Use XIP (eXecute In Place) to stream the weights directly from Flash over the SPI bus into the MAC units, reserving the entire 128KB SRAM purely for activations.
  common_mistake: |
    **The Pitfall:** Trying to dynamically copy weights from Flash to SRAM.
    **The Rationale:** Failing to account for OS overhead and activation memory sizes.
    **The Consequence:** Triggering out-of-memory (OOM) crashes when switching models.
  napkin_math: |
    * **SRAM Capacity:** 128 KB.
    * **Model Total:** 100 KB + 100 KB = 200 KB.
    * **Result:** 200 KB > 128 KB. Models must be stored in Flash and streamed via **eXecute In Place (XIP)**.
