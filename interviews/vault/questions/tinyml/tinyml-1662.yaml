title: Cortex-M4 Cascade Wakeword
scenario: 'A Cortex-M4 keyword spotter uses a cascade: a 0.5 mW DSP runs constantly.
  Only if triggered (10% of the time), a 20 mW neural net analyzes a 100 ms audio
  window.'
question: Identify the expected average power consumption of this cascade architecture
  by combining the always-on DSP draw with the duty-cycled neural-net draw.
visual:
  kind: svg
  path: tinyml-1662.svg
  alt: Sleep/wake timeline showing constant DSP baseline with occasional Neural Net
    spikes.
  caption: Cascade architecture duty cycling.
details:
  realistic_solution: 'The DSP is always on, consuming 0.5 mW. The 20 mW neural net
    runs 10% of the time. Average power = 0.5 mW + (0.10 * 20 mW) = 0.5 + 2.0 = 2.5
    mW. (Note: the 100ms window size describes the inference duration, but duty cycle
    is already given as 10% globally).'
  common_mistake: Multiplying the 100ms window into the 10% probability incorrectly,
    instead of treating 10% as the aggregate duty cycle.
  napkin_math: 0.5 + (0.10 * 20) = 2.5 mW
