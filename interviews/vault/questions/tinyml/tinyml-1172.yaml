title: Layer Fusion SRAM Calculation
scenario: Two sequential Conv2D layers process a 120 KB input through a 320 KB intermediate tensor into a 160 KB output. Layer fusion cascades execution, utilizing a single 90 KB spatial intermediate tile instead of materializing the entire 320 KB buffer.
question: "What are the sequential and fused peak SRAM requirements for the two-layer convolution subgraph?"
details:
  realistic_solution: Model inference utilizes localized buffer reuse mechanics. Deep layer cascaded fusion structurally eradicates complete temporal buffer allocation cycles by spatially interlocking operators directly via tightly mapped SRAM tiles.
  common_mistake: |
    **The Pitfall:** Incorrectly summing independent tensor boundaries linearly for sequential execution footprints.
    **The Rationale:** Candidates fundamentally fail to process Directed Acyclic Graph (DAG) temporal memory reclamation mechanisms.
    **The Consequence:** The model footprint drastically overestimates actual runtime usage, falsely diagnosing hard SRAM bound exhaustion.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Tensors: 120 KB (Input), 320 KB (Intermediate), 160 KB (Output).
       - Fused intermediate geometry: 320 KB / 4 spatial tiles + 10 KB temporal halo = 90 KB tile footprint.
    2. **Calculations:**
       - Sequential Stage 1 trace: 120 KB + 320 KB = 440 KB.
       - Sequential Stage 2 trace: 320 KB + 160 KB = 480 KB.
       - Max sequential execution envelope: 480 KB.
       - Fused graph envelope: 120 KB (In) + 90 KB (Tiled buffer) + 160 KB (Out) = 370 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Fused allocation isolates a 370 KB peak versus a sequential 480 KB baseline (Memory-Bound Optimization).**
