title: Battery-Powered Water Meter Life
scenario: A battery-powered water meter runs on a Cortex-M4. It wakes up once a day
  for exactly 10 seconds, drawing 15 mA to run an inference and transmit data. The
  rest of the day, it is in deep sleep drawing 2 µA. The battery is a 2000 mAh coin
  cell with a 1.5%/year self-discharge rate (typical for lithium primary cells).
question: Compute the expected battery life in years, accounting for both the average
  current draw AND the 1.5%/year self-discharge floor that becomes the limiting factor
  for ultra-low-duty-cycle systems.
visual:
  kind: svg
  path: tinyml-1553.svg
  alt: A stacked bar chart showing that despite the 15mA peak, sleep current dominates
    daily energy consumption due to extreme time weighting.
  caption: Daily Energy Consumption Breakdown
details:
  realistic_solution: Average current = 15*(10/86400) + 0.002*(86390/86400) ~= 0.003735
    mA. Naive lifetime = 2000 / 0.003735 = 535,475 h = ~61 years. But self-discharge
    at 1.5%/yr drains 30 mAh/yr, equivalent to a continuous 0.00342 mA draw - nearly
    matching the load. Combined effective current = 0.003735 + 0.00342 = 0.00716 mA,
    giving 2000 / 0.00716 = 279,330 h = ~32 years. Even this is optimistic since self-discharge
    is non-linear; in practice lithium primary cells are rated at 10-15 year shelf
    life regardless of load.
  common_mistake: Reporting the load-only 61-year figure as the answer, ignoring that
    for ultra-low-duty-cycle systems the chemistry''s own self-discharge dominates
    and shelf-life caps the useful life around 10-15 years regardless of how little
    current the load draws.
  napkin_math: I_load = 0.003735 mA; I_self_discharge = 0.015 * 2000 / 8760 = 0.00342
    mA; I_total = 0.00716 mA; lifetime = 2000 / 0.00716 = 32 years (capped to ~10-15
    years by chemistry shelf life).
