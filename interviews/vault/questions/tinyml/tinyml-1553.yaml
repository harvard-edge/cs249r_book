title: Battery-Powered Water Meter Life
scenario: A battery-powered water meter runs on a Cortex-M4. It wakes up once a day
  for exactly 10 seconds, drawing 15 mA to run an inference and transmit data. The
  rest of the day, it is in deep sleep drawing 2 µA. The battery is a 2000 mAh coin
  cell.
question: Compute the expected battery life of the system in years.
visual:
  kind: svg
  path: tinyml-1553.svg
  alt: A stacked bar chart showing that despite the 15mA peak, sleep current dominates
    daily energy consumption due to extreme time weighting.
  caption: Daily Energy Consumption Breakdown
details:
  realistic_solution: The active time per day is 10 seconds. The sleep time is 86,400
    - 10 = 86,390 seconds. Average current draw = (15 mA * (10 / 86400)) + (0.002
    mA * (86390 / 86400)). The active contribution is ~0.001736 mA. The sleep contribution
    is ~0.001999 mA. Total average current is 0.003735 mA. Battery life = 2000 mAh
    / 0.003735 mA = 535,475 hours. Divided by 24 = 22,311 days, or roughly 61 years.
  common_mistake: Converting 2 µA incorrectly as 0.02 mA or 0.2 mA, artificially destroying
    the battery life calculation by overestimating the baseline sleep draw.
  napkin_math: I_avg = 15*(10/86400) + 0.002*(1) ≈ 0.003735 mA. 2000 / 0.003735 =
    535,475 h = ~61.1 years.
