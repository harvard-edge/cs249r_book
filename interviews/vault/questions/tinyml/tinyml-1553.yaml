title: Battery-Powered Water Meter Life
scenario: A battery-powered water meter runs on a Cortex-M4. It wakes up once a day for exactly 10 seconds, drawing 15 mA to run an inference and transmit data. The rest of the day, it is in deep sleep drawing 2 µA. The battery is a 2000 mAh coin cell with a 1.5%/year self-discharge rate.
question: Compute the expected battery life in years, accounting for average current draw and the 1.5%/year self-discharge floor.
visual:
  kind: svg
  path: tinyml-1553.svg
  alt: A stacked bar chart showing that despite the 15mA peak, sleep current dominates daily energy consumption due to extreme time weighting.
  caption: Daily Energy Consumption Breakdown
details:
  realistic_solution: Average current calculates to roughly 0.0037 mA. Naive lifetime is ~61 years. However, self-discharge at 1.5%/yr drains an equivalent of 0.00342 mA, nearly matching the load. The combined effective drain leads to a ~32 year theoretical life. In practice, lithium primary cells are rated at 10-15 year shelf life regardless of load.
  common_mistake: |
    **The Pitfall:** Reporting the load-only figure and ignoring chemistry self-discharge.
    **The Rationale:** Candidates focus solely on the explicit active and sleep current draws of the circuit.
    **The Consequence:** They falsely guarantee a 60+ year lifespan, failing to realize the battery's inherent shelf life caps it at 10-15 years.
  napkin_math: |
    - Active daily time: 10s. Sleep daily time: 86390s.
    - Average load current: 15 mA * (10 / 86400) + 0.002 mA * (86390 / 86400) = 0.001736 + 0.002 = 0.003736 mA.
    - Self-discharge current: (0.015 * 2000 mAh) / 8760 h = 0.00342 mA.
    - Total average current: 0.003736 + 0.00342 = 0.007156 mA.
    - Calculated lifetime: 2000 mAh / 0.007156 mA = 279,485 h = 31.9 years.
    - **In practice, life is capped to ~10-15 years due to the battery chemistry's maximum shelf life.**
