title: Intermittent Computing FRAM Checkpoints
scenario: An energy-harvesting wildlife tracker powered by a miniature solar cell
  occasionally loses power mid-inference. The device uses non-volatile FRAM to checkpoint
  the neural network's progress layer-by-layer.
question: Analyze the overhead of this checkpointing mechanism if the model has 10
  layers, each producing a 10KB output tensor, and writing to FRAM takes 2 microseconds
  per byte.
details:
  realistic_solution: The model must save its intermediate state after each of the
    10 layers. For each layer, it writes the 10KB output tensor to FRAM. The time
    to write 10,000 bytes is 10,000 * 2µs = 20ms. Across 10 layers, the total checkpointing
    overhead is 10 * 20ms = 200ms per full inference cycle.
  common_mistake: Calculating the write time for a single layer but failing to multiply
    by the total number of layers in the model architecture.
  napkin_math: 10 * 10000 * 2e-6 = 0.2s
