title: Multi-Tiered Wake Word Power Pipeline
scenario: A battery-powered acoustic sensor using a Cortex-M4 (80 MHz) must detect
  rare audio anomalies over a year. The MCU supports a 10 uA sleep state, a 2 mA low-power
  listening state, and a 15 mA active state for full neural network inference.
question: Design a duty-cycling state machine and cascaded filtering strategy that
  ensures sub-500ms detection latency while minimizing total daily energy consumption.
details:
  realistic_solution: The optimal design uses an analog threshold interrupt (10 uA)
    to wake the MCU into a low-power listening state. If a simple zero-crossing or
    spectral energy heuristic passes (2 mA for 50ms), the MCU enters full active mode
    (15 mA for 200ms) to run the CMSIS-NN classifier. This cascades the true positive
    and false positive rates, keeping average current near 20 uA while meeting the
    500ms SLA.
  common_mistake: Candidates often propose running the NN periodically or fail to
    cascade the filters, missing the necessity of an ultra-low-power hardware trigger
    preceding software inference.
  napkin_math: 10uA + (0.01 * 2mA) + (0.001 * 15mA) = ~45 uA average current.
