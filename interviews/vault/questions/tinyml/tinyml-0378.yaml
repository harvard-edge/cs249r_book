title: 'The TinyML Ridge Point: MCU Compute Constraints'
scenario: For a typical Cortex-M4 microcontroller, identify the approximate Ridge Point of its roofline model. This value separates memory-bound from compute-bound operations.
question: What approximate Roofline ridge point should you assume for a typical Cortex-M4 TinyML workload?
details:
  realistic_solution: The correct answer is ~0.2 Ops/Byte. This extremely low Ridge Point indicates that the device's weak computational capability is easily saturated. Because typical ML layers (like Convolutions or dense layers) have an Arithmetic Intensity significantly higher than 0.2 Ops/Byte, they easily exceed the Ridge Point and fall solidly on the compute-bound side of the Roofline. Most operations will be limited by the raw processing power of the core, not by how fast data can be fed from SRAM.
  common_mistake: |
    **The Pitfall:** Assuming microcontrollers are heavily memory-bound for ML tasks.
    **The Rationale:** Candidates know memory bandwidth is low, but fail to realize the compute capacity is relatively even lower, creating a tiny Ridge Point.
    **The Consequence:** Misidentifying system bottlenecks and applying the wrong optimization techniques (e.g., focusing on memory access when compute is the limiter).
  napkin_math: |
    - Peak Compute: 336 MFLOPS.
    - Peak Memory Bandwidth: 1.2 GB/s.
    - Ridge Point: 336 MFLOPS / 1200 MB/s.
    - **Result:** ≈ **0.28 FLOPs/Byte** (or ~0.2 Ops/Byte).
  options:
  - ~300 Ops/Byte
  - ~20 Ops/Byte
  - ~0.2 Ops/Byte
  - ~2 Ops/Byte
  correct_index: 2
