title: The Coin Cell Battery Lifetime
scenario: A remote bird-call detector has a duty cycle where it's active for 500ms (drawing 50mW) and then sleeps for 4.5s (drawing 10µW). It's powered by a standard 3V, 225 mAh coin cell battery.
question: Can a 3V 225 mAh coin cell power the bird-call detector for a full week with 500 ms active and 4.5 s sleep cycles?
details:
  realistic_solution: To find the lifetime, you must first calculate the true average power consumption based on the duty cycle. Then, calculate the total energy capacity of the battery in milliamp-hours (mWh). Finally, divide the total energy capacity by the average power consumption to get the total operational hours, which can then be converted to days.
  common_mistake: |
    **The Pitfall:** Calculating lifetime using only the active power consumption or confusing energy units.
    **The Rationale:** It's easy to forget to perform a time-weighted average across the duty cycle or to divide mAh directly by mW without multiplying by the battery voltage to get mWh.
    **The Consequence:** The battery life is massively underestimated or calculated incorrectly, leading to over-specced batteries or failed deployments.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Active State: 50 mW for 0.5 s.
       - Sleep State: 10 µW for 4.5 s.
       - Battery: 3V, 225 mAh.
    2. **Calculations:**
       - Energy per Cycle (5s): (50 mW * 0.5 s) + (0.01 mW * 4.5 s) = 25.045 mJ.
       - Average Power: 25.045 mJ / 5 s = 5.009 mW.
       - Battery Capacity: 225 mAh * 3 V = 675 mWh.
       - Total Lifetime: 675 mWh / 5.009 mW = 134.7 hours.
       - Days: 134.7 / 24 = 5.6 days.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound Lifetime**. The device operates for 5.6 days, falling short of a 7-day target due to high active power consumption.
  options:
  - ~0.56 days. (Calculated using only the active power draw)
  - ~1.1 days. (Calculated by incorrectly averaging power states)
  - ~5.6 days. (Calculated using the time-weighted average power)
  - ~45 days. (Calculated by ignoring battery voltage and dividing mAh by mW)
  correct_index: 2
