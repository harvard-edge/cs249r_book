title: 'TinyML TCO Evaluation: Cloud-in-the-Loop vs Fully On-Device TinyML'
scenario: 'Compare fully on-device TinyML (ESP32-S3, $5, 240MHz) vs cloud-in-the-loop
  architecture (ESP32-S3 with WiFi, sends data to cloud for inference) for a predictive
  maintenance model (5 GOPS, requires far more than 240MHz MCU can handle). Inference:
  every 10 minutes, 5-second audio clip. Cloud at $0.01/inference. 1000-unit deployment
  over 3 years.'
question: When should the predictive maintenance fleet use on-device TinyML versus
  cloud inference, and what is the three-year TCO?
details:
  realistic_solution: 'ESP32-S3 compute: 240MHz with DSP extension ≈ 240 MOPS (million
    ops). 5 GOPS model: 5000/240=20.8 seconds per inference. Latency too high (10
    min trigger → 20s inference → real-time analysis impossible). Cloud required.
    Cloud TCO: 1000 units * 6 inferences/hr * 24 * 365 * 3 * $0.01 = 1000 * 157,680
    * $0.01 = $1,576,800. Hardware: 1000 * $5 = $5K. WiFi connectivity: 1000 * $1/month
    * 36 = $36K. Total: $1,576,800 + $5K + $36K = $1.617M. On-device alternative:
    use smaller 30 MOPS model (94% accuracy vs 98%): 30M/240M=0.125s inference. Cost:
    $1,617K - $1,576K cloud = $41K. Dramatic savings from model compression for TinyML.'
  common_mistake: 'Not recognizing that the full 5 GOPS model CANNOT run on ESP32-S3
    at any acceptable latency (ESP32-S3 peak: 240M*ops ≈ 240 MOPS, not GOPS), making
    on-device impossible and cloud mandatory.'
  napkin_math: 'Full model (5 GOPS on ESP32-S3 240 MOPS): time=5000M/240M=20.8s. Too
    slow. Cloud: 1000*6/hr*24*365*3*$0.01=1000*157680*$0.01=$1.577M. HW+WiFi=$41K.
    Total=$1.618M. With compressed model (30 MOPS, 0.125s): total HW+WiFi=$41K. Savings:
    $1.577M cloud cost avoided. Development cost for compression: $30K (1 engineer-month).
    Net savings: $1.547M. ROI: 5157%. TinyML compression is THE highest ROI optimization
    in this scenario. Accuracy tradeoff: 94% vs 98% means 4% more missed failures
    per year = 1000 pumps * 0.04 * $1000 repair = $40K/yr undetected failures. After
    3yr: $120K penalty. Net: $1.547M-$120K=$1.427M saved.'
