title: The Environmental Sensor's Duty Cycle
scenario: You are designing a battery-powered environmental sensor with a target battery life of 1 year. The device is powered by a 2400 mAh, 3.7V battery. When taking a measurement and transmitting data, it consumes 150 mW. In its deep sleep state, it consumes 10 µW.
question: To meet the 1-year lifetime goal, what is the maximum total time, in seconds, that the device can afford to be in its active state each hour?
details:
  realistic_solution: First, calculate the total energy in the battery in Watt-hours by multiplying capacity (in Amp-hours) by voltage. Second, calculate the average power budget in milliwatts by dividing the total energy by the target lifetime in hours. Finally, use the average power equation, plugging in the known power values and the 1-hour period (3600s), to solve for the unknown active time ($t_{\text{active}}$).
  common_mistake: |
    **The Pitfall:** Miscalculating total battery energy or ignoring sleep state consumption.
    **The Rationale:** Candidates often use Amp-hours as energy without multiplying by voltage, or they assume 10 µW is negligible.
    **The Consequence:** This leads to overly optimistic duty cycle budgets that fail to meet the 1-year lifetime goal.
  napkin_math: |
    - **Total Battery Energy:** 2400 mAh * 3.7 V = 8.88 Wh = **8,880 mWh**.
    - **Target Lifespan:** 1 year = **8,760 hours**.
    - **Max Average Power:** 8,880 mWh / 8,760 h = **1.0137 mW**.
    - **Sleep Power:** 10 µW = **0.010 mW**.
    - **Available Active Power:** 1.0137 mW - 0.010 mW = **1.0037 mW**.
    - **Maximum Duty Cycle:** 1.0037 mW / 150 mW = **0.669%** active time.
    - **Active Time per Hour:** 0.00669 * 3600s = **24.09 seconds**.
  options:
  - ~6.3 seconds
  - ~24.1 seconds
  - ~24.3 seconds
  - The budget is impossible; it's below sleep power.
  correct_index: 1
