title: The Environmental Sensor's Duty Cycle
scenario: You are designing a battery-powered environmental sensor with a target battery life of 1 year.
  The device is powered by a 2400 mAh, 3.7V battery. When taking a measurement and transmitting data,
  it consumes 150 mW. In its deep sleep state, it consumes 10 µW. To meet the 1-year lifetime goal, what
  is the maximum total time, in seconds, that the device can afford to be in its active state each hour?
question: "To meet the 1-year lifetime goal, what is the maximum total time, in seconds, that the device can afford to be in its active state each hour?"
details:
  realistic_solution: First, calculate the total energy in the battery in Watt-hours by multiplying capacity
    (in Amp-hours) by voltage. Second, calculate the average power budget in milliwatts by dividing the
    total energy by the target lifetime in hours. Finally, use the average power equation, plugging in
    the known power values and the 1-hour period (3600s), to solve for the unknown active time ($t_{\text{active}}$).
  common_mistake: A common error is to miscalculate the total energy available in the battery (e.g., by
    ignoring the voltage and incorrectly using Amp-hours as a unit of energy). Another mistake is to ignore
    the energy consumed during the sleep state, which, although small per second, accumulates significantly
    over a year and reduces the budget available for active operations.
  napkin_math: Total battery energy = 2400 mAh * 3.7 V = 8.88 Wh = 8,880 mWh. Target lifespan = 1 year
    = 8,760 hours. Max average power = 8,880 mWh / 8,760 h = 1.01 mW. Deep sleep consumes 10 µW (0.010
    mW). Power available for active state = 1.01 - 0.010 = 1.00 mW. Maximum duty cycle = 1.00 mW / 150
    mW = 0.67% active time.
  options:
  - ~6.3 seconds
  - ~24.1 seconds
  - ~24.3 seconds
  - The budget is impossible; it's below sleep power.
  correct_index: 1
