title: The Environmental Sensor's Duty Cycle
scenario: You are designing a battery-powered environmental sensor with a target battery life of 1 year. The device is powered by a 2400 mAh, 3.7V battery. When taking a measurement and transmitting data, it consumes 150 mW. In its deep sleep state, it consumes 10 µW.
question: To meet the 1-year lifetime goal, what is the maximum total time, in seconds, that the device can afford to be in its active state each hour?
details:
  realistic_solution: Ascertain the rigorous baseline power constraint by translating battery capacity (mAh) to Watt-hours (Wh). Next, establish the continuous average power budget required to bridge the 8,760-hour annual lifespan. Finally, structure a straightforward duty cycle equation solving for the unknown active temporal fraction.
  common_mistake: |
    **The Pitfall:** Miscalculating total battery energy or summarily ignoring deep sleep current.
    **The Rationale:** Candidates mechanically map Amp-hours as absolute energy units without integrating hardware voltage, or wrongly presume 10 µW is negligible.
    **The Consequence:** Flawed arithmetic formulates duty cycles that aggressively deplete the hardware in 6 months.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Battery: 2400 mAh * 3.7 V = 8,880 mWh.
       - Annual Lifespan: 1 year = 8,760 hours.
       - Active Power: 150 mW. Sleep Power: 0.010 mW.
    2. **Calculations:**
       - Average Power Budget = 8,880 mWh / 8,760 h = 1.0137 mW.
       - Available Active Budget = 1.0137 mW - 0.010 mW = 1.0037 mW.
       - Active Duty Fraction = 1.0037 mW / 150 mW = 0.00669.
       - Time Active per Hour = 0.00669 * 3600 seconds = 24.09 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: 24-Second Constraint**. The sensor can securely sustain up to ~24 seconds of ML telemetry per hour while guaranteeing 12-month survivability.
  options:
  - ~6.3 seconds (Forgetting to multiply mAh by voltage)
  - ~24.1 seconds
  - ~24.3 seconds (Ignoring the 10 µW sleep current)
  - The budget is impossible; it is below sleep power.
  correct_index: 1
