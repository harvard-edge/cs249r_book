title: Battery Drain Anomaly in Dual-Core Always-On Audio
scenario: A smart wearable uses the Nordic nRF5340 for an always-on acoustic event detection model running on the application core. The system wakes up every 100ms, running a 10ms inference. During field testing on a 200mAh coin cell, the battery dies in just 4 days instead of the mathematically expected 16 days.
question: Why does the dual-core always-on audio system drain the 200mAh coin cell in 4 days despite the application core's low 10% duty cycle?
details:
  realistic_solution: The discrepancy stems from ignoring the BLE connection interval overhead and the wake-up/sleep state transitions. While the application core strictly observes a 10% duty cycle, the network core handling the BLE 5.3 stack adds significant hidden active time. The ~5mA peak current applies not only during inference but also during radio transition periods and periodic BLE keep-alive events.
  common_mistake: |
    **The Pitfall:** Calculating duty cycle strictly based on the primary compute core.
    **The Rationale:** Candidates calculate the average power using only the active inference time and sleep time for the primary application core.
    **The Consequence:** They ignore the baseline power consumption of waking up the system and the network core's BLE overhead, leading to a massive underestimation of the average current draw and premature field death.
  napkin_math: |
    1. **Assumptions & Constraints**:
       - 200mAh battery.
       - Expected 10ms active (5mA), 90ms sleep (0.002mA).
       - Field battery life = 4 days (96 hours).
    2. **Calculations**:
       - Naive Expected Average: (10ms * 5mA + 90ms * 0.002mA) / 100ms ≈ 0.502mA -> ~398 hours (~16 days).
       - Actual Field Average: 200mAh / 96 hours ≈ 2.08mA.
       - Unaccounted Overhead: 2.08mA - 0.502mA = ~1.58mA.
    3. **Conclusion & Interpretation**:
       - **Result: Power-Bound Transition Overhead**. The missing ~1.58mA is consumed by wake-up state transitions (~2ms per cycle) and the BLE connection events on the secondary network core (~30ms active time), drastically skewing the energy profile.
