title: The Sensor Duty Cycle Optimization
scenario: Your wearable fall detection system uses a Cortex-M33 (Apollo4 Blue Plus)
  with a 3-axis accelerometer. The current design samples at 100 Hz continuously.
  A colleague proposes reducing to 25 Hz to save power. The accelerometer draws 150
  µA at 100 Hz and 40 µA at 25 Hz (at 1.8V supply). Analyze the power savings, the
  Nyquist implications for fall detection, and propose a smarter duty-cycling strategy.
question: "How would you analyze the power savings, the Nyquist implications for fall
  detection, and propose a smarter duty-cycling strategy?"
details:
  realistic_solution: 'The smart duty cycle uses a hybrid approach: continuous 25
    Hz sampling for baseline activity and fall detection preparation, combined with
    a hardware FIFO interrupt that triggers 200 Hz high-rate sampling for 500 ms only
    when an impact is detected. Expected impact events: ~10/day. The extra energy
    for 10 high-rate bursts per day is negligible (~0.17 µW average). This captures
    the high-frequency fall signature without the massive energy penalty of continuous
    100 Hz sampling.'
  common_mistake: '"25 Hz is fine — falls are slow events, maybe 1-2 Hz. Nyquist says
    we only need 4 Hz." Falls are slow in terms of the overall event duration (~0.5-1s),
    but the impact signature contains high-frequency components (50-100 Hz) that distinguish
    a fall from sitting down quickly.'
  napkin_math: 'Always 100 Hz: 270 µW (accel) + 59 µW (MCU) = 329 µW. Always 25 Hz:
    72 µW (accel) + 59 µW (MCU) = 131 µW. Smart duty cycle: runs at 25 Hz (131 µW)
    but bursts to 200 Hz on impact. Assuming 10 impacts/day at 500 ms each = 5s of
    active 3 mW MCU processing. 5s * 3 mW = 15 mJ/day = 0.17 µW average. Total smart
    power = 131.17 µW. On a 225 mAh CR2032 (3V, 675 mWh effective): Always 100 Hz:
    675/0.329 = 2,051 hours = 85 days. Always 25 Hz: 675/0.131 = 5,152 hours = 214
    days. Smart: 675/0.13117 = 5,145 hours = 214 days. The smart approach gives 2.5×
    battery life with full impact resolution.'
