title: The Sensor Duty Cycle Optimization
scenario: Your wearable fall detection system uses a Cortex-M33 with a 3-axis accelerometer. The current design samples at 100 Hz continuously. A colleague proposes reducing to 25 Hz to save power. The accelerometer draws 150 µA at 100 Hz and 40 µA at 25 Hz.
question: How would you analyze the power savings, the Nyquist implications for fall detection, and propose a smarter duty-cycling strategy?
details:
  realistic_solution: 'The smart duty cycle uses a hybrid approach: continuous 25 Hz sampling for baseline activity and fall detection preparation, combined with a hardware FIFO interrupt that triggers 200 Hz high-rate sampling for 500 ms only when an impact is detected. Expected impact events: ~10/day. The extra energy for 10 high-rate bursts per day is negligible (~0.17 µW average). This captures the high-frequency fall signature without the massive energy penalty of continuous 100 Hz sampling.'
  common_mistake: |
    **The Pitfall:** Assuming 25 Hz is universally sufficient because falls are macro-level "slow" events.
    **The Rationale:** Candidates conflate the overall event duration (~1s) with the high-frequency impact signature components (50-100 Hz) needed to distinguish a fall from sitting down quickly.
    **The Consequence:** Proposing a system that misses the critical impact transient, drastically increasing false negatives.
  napkin_math: |
    1. **Assumptions & Constraints:** 1.8V supply. Accel 100 Hz = 150 µA. 25 Hz = 40 µA. MCU baseline = 59 µW. Smart duty cycle: 25 Hz baseline + 10 bursts (200 Hz, 500 ms) per day. 3 mW MCU active. 225 mAh (675 mWh) CR2032 battery.
    2. **Calculations:** Continuous 100 Hz power = (150 µA * 1.8V) + 59 µW = 329 µW. Continuous 25 Hz power = (40 µA * 1.8V) + 59 µW = 131 µW. Burst energy per day = 10 * 500 ms * 3 mW = 15 mJ. Average burst power = 15 mJ / 86400 s = 0.17 µW. Smart avg power = 131 + 0.17 = 131.17 µW. 100 Hz lifetime = 675 mWh / 329 µW = 2051 hr (85 days). Smart lifetime = 675 mWh / 131.17 µW = 5145 hr (214 days).
    3. **Conclusion & Interpretation:** **214 days (2.5x increase in battery life)** (Energy-Bound Optimization).
