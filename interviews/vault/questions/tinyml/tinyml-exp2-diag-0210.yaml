title: Diagnosing NAS SRAM Constraints on Corstone-300
scenario: Your team is using a hardware-aware NAS to find an optimal image classification model for the
  ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform. The NAS search space is strictly constrained to models
  with a peak SRAM usage of under 400 KB, targeting the 512 KB shared SRAM. The NAS outputs a winning
  architecture that theoretically peaks at 380 KB of activation memory. However, when the compiled model
  is flashed and executed, the system immediately HardFaults due to memory exhaustion during the first
  inference.
question: "Why does the Corstone-300 NAS winner HardFault despite a 380 KB activation estimate, and what memory overhead was missed?"
details:
  realistic_solution: The root cause is a discrepancy between the NAS's generic hardware model and the
    actual memory requirements of the Ethos-U55 toolchain (like the Vela compiler). The NAS only calculated
    theoretical tensor sizes, but the U55 requires additional SRAM for DMA double-buffering, command streams,
    and tensor alignment padding. Furthermore, because the 512 KB SRAM is shared, the M7 requires a dedicated
    chunk for its RTOS stack and heap, which the NAS constraint failed to account for.
  common_mistake: Candidates often assume the NAS accurately models peak memory footprint based solely
    on standard theoretical activation tensor sizes. They might incorrectly diagnose the issue as a memory
    leak in the application code, a stack overflow, or suggest pruning the model weights, completely ignoring
    the specific compilation and execution characteristics of the NPU.
  napkin_math: Total physical SRAM = 512 KB. M7 RTOS and application stack overhead = 64 KB, leaving 448
    KB available for the tensor arena. The NAS predicted a peak activation footprint of 380 KB. However,
    compiling for the U55 adds approximately 96 KB of overhead for the NPU command stream and DMA double-buffering
    buffers to feed the MACs efficiently. Actual required memory = 380 KB (model) + 96 KB (NPU overhead)
    + 64 KB (M7 RTOS) = 540 KB. Since 540 KB > 512 KB, the allocation fails and causes a HardFault.
