title: The Real-Time Audio Deadline
scenario: 'You''re designing a keyword spotting device using a Cortex-M4 microcontroller, which runs at 168 MHz and has a peak performance of ~336 MFLOPS. The audio pre-processing pipeline delivers a new feature frame every 25ms, creating a hard real-time deadline. Your neural network model requires 10 Million FLOPs to process one frame.'
question: 'How would you calculate the time needed for a single inference and explain if the Cortex-M4 can meet this real-time deadline?'
details:
  realistic_solution: 'The Cortex-M4 cannot meet the deadline. To determine if the system is real-time capable, we must calculate the time required for one inference and compare it to the time budget.'
  common_mistake: |
    **The Pitfall:** Assuming high MFLOPS ratings guarantee real-time performance without calculating latency.
    **The Rationale:** Engineers often calculate the theoretical throughput (inferences/sec) but fail to convert that back to the per-inference latency, confusing units (ms vs. s).
    **The Consequence:** The system is deployed but misses its 25ms real-time deadline, resulting in stuttering and dropped audio frames.
  napkin_math: |
    1. **Assumptions & Constraints:** 336 MFLOPS peak. 10M FLOPs per frame. 25ms real-time deadline.
    2. **Calculations:**
       - Time = 10,000,000 FLOPs / 336,000,000 FLOPs/sec = 0.02976 seconds = 29.8 ms.
       - 29.8 ms > 25 ms deadline.
    3. **Conclusion & Interpretation:** **Misses deadline by 4.8 ms (19% over budget).** Result: Compute-Bound. Use INT8 quantization with CMSIS-NN to achieve a 2-4x speedup.
  options:
  - Yes, easily. It only takes ~0.03ms, which is well under the 25ms deadline.
  - Yes, it's fast enough. It can process ~33 frames per second.
  - No, it fails. The required time is ~29.8ms, which exceeds the 25ms deadline.
  - No, it fails. A 168 MHz processor is too slow for any real-time audio processing.
  correct_index: 2
