title: The Wildlife Camera's Power Budget
scenario: You are designing a wildlife camera that uses a Cortex-M4 MCU for motion detection. The system consumes 50 mW when actively processing an image for 500 ms. In deep sleep, it consumes 10 μW. The camera is triggered on average once every 5 minutes.
question: What is its average power consumption?
details:
  realistic_solution: The average power is heavily weighted towards the sleep consumption, as the brief, high-power active periods are amortized over long, low-power sleep periods. The correct method calculates total energy per cycle and divides by the total cycle duration.
  common_mistake: |
    **The Pitfall:** Calculating a simple arithmetic mean of active and sleep power.
    **The Rationale:** Candidates average 50 mW and 0.01 mW without weighting them by time.
    **The Consequence:** This completely ignores that the device spends >99% of its time asleep, leading to grossly oversized battery requirements.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Active state: 50 mW for 0.5 s.
       - Sleep state: 10 μW (0.01 mW).
       - Cycle Duration: 5 minutes (300 s).
    2. **Calculations:**
       - Sleep Time: 300 s - 0.5 s = 299.5 s.
       - Active Energy: 50 mW * 0.5 s = 25 mJ.
       - Sleep Energy: 0.01 mW * 299.5 s = 2.995 mJ.
       - Total Energy per Cycle: 25 + 2.995 = 27.995 mJ.
       - Average Power: 27.995 mJ / 300 s = 0.0933 mW.
    3. **Conclusion & Interpretation:**
       - **Result: 93.3 μW Average Power.** The system is deeply asleep, so average power approaches the baseline leakage.
  options:
  - ~0.083 mW
  - ~25.0 mW
  - ~10.1 mW
  - ~0.093 mW
  correct_index: 3
