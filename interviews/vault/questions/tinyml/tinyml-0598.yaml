title: 'The Bus Arbitration Starvation'
scenario: 'Your industrial IoT sensor runs a vibration anomaly detection model. The system simultaneously streams accelerometer data via SPI+DMA, runs inference on the buffered data, and transmits results over Ethernet+DMA. In isolation, inference takes 2.8 ms. With all three running, inference balloons to 7.0 ms. CPU utilization is only 45%.'
question: 'How would you explain the 2.5x slowdown?'
details:
  realistic_solution: 'AXI bus matrix contention occurs when the CPU, SPI DMA, and Ethernet DMA compete for the same SRAM bank. Place the tensor arena in SRAM1, camera DMA in SRAM2, and Ethernet in SRAM3 to eliminate contention entirely.'
  common_mistake: |
    **The Pitfall:** Relying solely on CPU utilization metrics.
    **The Rationale:** Candidates assume low CPU utilization means compute headroom, failing to recognize that the CPU is stalled waiting for the saturated AXI bus.
    **The Consequence:** Unnecessary code optimization efforts fail to improve latency because the bottleneck is purely hardware bus arbitration.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inference alone: 2.8 ms.
    - Bus masters: CPU, SPI DMA, Ethernet DMA targeting SRAM1.

    **Calculations:**
    - CPU bus share during DMA bursts ≈ 40%.
    - Cache miss penalty inflates from 1 to 3 cycles.
    - Contended inference time = 2.8 ms * 2.5 = 7.0 ms.

    **Conclusion & Interpretation:**
    - **Result: 7.0 ms (Memory-Bandwidth Bound)**. The AXI bus contention inflates memory access times, starving the CPU.
  options:
  - "The CPU is thermal throttling under combined load, reducing clock speed by 2.5x."
  - "AXI bus matrix contention: CPU and DMA compete for SRAM, increasing cache miss penalties. Place buffers in separate SRAM banks to resolve."
  - "The DMA controller is stealing CPU cycles for addressing, taking 60% of instruction bandwidth."
  - "The Ethernet TCP stack requires CPU intervention for every 25.6 kHz packet, starving inference."
  correct_index: 1
