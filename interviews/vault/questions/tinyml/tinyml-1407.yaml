title: Knowledge Distillation vs. Pruning on ARM Cortex-M4 for Real-time Anomaly Detection
scenario: >
  Your team is deploying an anomaly detection model on an ARM Cortex-M4 microcontroller with no FPU.
  You must choose between aggressively pruning a large teacher model or using knowledge distillation to train a smaller student architecture.
question: How should you compare knowledge distillation and pruning for a real-time Cortex-M4 anomaly detector with no FPU?
details:
  realistic_solution: |
    Prioritize architectures inherently suitable for resource-constrained FPU-less devices via 8-bit integer fixed-point quantization (QAT). Implement a knowledge distillation strategy where the large teacher supervises the training of this quantized student model, leveraging CMSIS-NN kernels. Pruning an FP32 teacher often leaves unstructured sparsity or relies on operations that map poorly to the M4's integer SIMD instructions, whereas distillation allows designing an optimal dense INT8 architecture from scratch.
  common_mistake: |
    **The Pitfall:** Applying pruning or distillation strategies designed for GPUs without accounting for the lack of a floating-point unit.
    **The Rationale:** Candidates overlook the absolute necessity of dense INT8 quantization for efficient execution on Cortex-M4.
    **The Consequence:** The resulting model relies on software FP emulation, destroying latency and battery life, or fails to fit in SRAM.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 256 KB SRAM, no FPU.
       - INT8 precision target.
    2. **Calculations:**
       - Example Layer: 32x32x16 input, 32x32x32 output, 3x3 kernel.
       - Activations: (32*32*16) + (32*32*32) = 16 KB + 32 KB = 48 KB.
       - Weights: 3*3*16*32 = 4.6 KB. Biases: 32 bytes.
       - Total Memory per Layer: ~52.6 KB.
       - 5 layers * 52.6 KB ≈ 263 KB (Exceeds 256 KB SRAM).
    3. **Conclusion & Interpretation:** Standard pruned architectures still exhaust SRAM via activations. **Result: Memory-Bound**.
