title: Knowledge Distillation vs. Pruning on ARM Cortex-M4 for Real-time Anomaly Detection
scenario: Your team is tasked with deploying a deep learning model for real-time anomaly detection on an ARM Cortex-M4 STM32F4 microcontroller (168 MHz CPU, 256 KB SRAM, no FPU). You have a large, highly accurate teacher model (e.g., ResNet-50) running on a server, and you need to achieve 90% of its accuracy on the embedded device. Two main strategies are being considered for creating the on-device student model: (1) aggressive pruning of the teacher model, or (2) knowledge distillation (e.g., logit matching or feature distillation) to train a smaller, simpler student architecture.
question: How should you compare knowledge distillation and pruning for a real-time Cortex-M4 anomaly detector with no FPU?
details:
  realistic_solution: The realistic solution involves a multi-pronged approach. First, prioritize architectures inherently suitable for resource-constrained embedded devices. Explicitly design for 8-bit integer fixed-point quantization from the outset using quantization-aware training. Implement a knowledge distillation strategy where the large teacher model supervises the training of this quantized, compact student model. During distillation, ensure the student model's operations are compatible with the FPU-less environment, leveraging libraries like CMSIS-NN. For evaluation, establish a clear benchmark directly on the STM32F4 hardware, measuring peak SRAM usage, average inference time per sample, and accuracy. The comparison with pruning would involve taking a pruned version of the teacher, quantizing it appropriately, and performing the same rigorous on-device evaluation.
  common_mistake: |
    **The Pitfall:** Overlooking the absolute necessity of integer quantization on an FPU-less MCU.
    **The Rationale:** Candidates often apply pruning or distillation strategies designed for GPUs without accounting for the lack of a floating-point unit on the Cortex-M4.
    **The Consequence:** The resulting model either relies on software FP emulation (destroying latency/battery) or fails to fit in the 256 KB SRAM constraint entirely.
  napkin_math: |
    1. Input/Output Activations: For a 32x32x16 input and 32x32x32 output (8-bit HWC), memory = (32 * 32 * 16) + (32 * 32 * 32) = 16,384 + 32,768 = 49,152 bytes (~48 KB).
    2. Weights: 3x3 kernel, 16 in, 32 out = 3 * 3 * 16 * 32 = 4,608 bytes (~4.5 KB).
    3. Biases: 32 elements = 32 bytes.
    4. Total Memory per Layer: 49,152 + 4,608 + 32 = 53,792 bytes (**~52.5 KB**).
    5. Conclusion: With 256 KB SRAM, a model with more than 4-5 such layers exhausts memory rapidly, highlighting the need for highly compressed INT8 architectures derived via Knowledge Distillation.
