title: The Solar-Powered Wildlife Cam
scenario: You're designing a remote wildlife camera using a Cortex-M4 microcontroller. The device stays
  in deep sleep and wakes up once every minute to capture an image and run an inference, which takes 200ms.
  Given the specs from our cheat sheet, calculate the average power consumption of the device. The Cortex-M4
  consumes 50 mW during active inference and 10 µW during deep sleep.
details:
  realistic_solution: The correct way to solve this is to calculate the total energy consumed over one
    full cycle (active + sleep) and then divide by the cycle's duration to find the average power. The
    device is active for 0.2 seconds and sleeps for 59.8 seconds in each 60-second period. This weighted
    average is the only accurate method to determine if a small solar panel can sustain the device.
  common_mistake: A common mistake is to simply average the active and sleep power ratings, or to ignore
    the sleep power entirely because it seems negligible. Both approaches fail to account for the fact
    that the device spends the vast majority of its time in the low-power state, which dominates the total
    energy budget over time.
  napkin_math: 1.  **Parameters:** | `P_active = 50 mW` | `P_sleep = 10 µW = 0.01 mW` | `t_active = 200
    ms = 0.2 s` | `t_period = 1 minute = 60 s` | 2.  **Calculate sleep time:** | `t_sleep = t_period -
    t_active = 60 s - 0.2 s = 59.8 s` | 3.  **Calculate energy per cycle:** | `E_cycle = (P_active × t_active)
    + (P_sleep × t_sleep)` | `E_cycle = (50 mW × 0.2 s) + (0.01 mW × 59.8 s) = 10 mJ + 0.598 mJ = 10.598
    mJ` | 4.  **Calculate average power:** | `P_avg = E_cycle / t_period = 10.598 mJ / 60 s ≈ 0.177 mW`
  options:
  - ~10.13 mW (Misinterprets µW as mW)
  - ~25.0 mW (Averages power without time weighting)
  - ~0.167 mW (Ignores sleep power in calculation)
  - ~0.177 mW
  correct_index: 3
