title: Diagnose Transformer Inference Latency Regression on ESP32-S3
scenario: 'A production keyword-spotting transformer on ESP32-S3 at 240 MHz suddenly shows 340ms inference
  latency, up from 85ms baseline after a firmware update that increased context window from 32 to 128
  tokens. The model is unchanged: 2 layers, 4 heads, 64-dim heads, INT8. The team suspects attention is
  O(n²) but profiling shows only 60% CPU utilization during inference. Diagnose the root cause beyond
  naive O(n²) scaling.'
question: "Why did the ESP32-S3 transformer jump from 85 ms to 340 ms when context increased from 32 to 128 tokens?"
details:
  realistic_solution: 'Attention FLOPs scale 16×: 0.30 × 85ms × 16 = 408ms for attention alone if it were
    100%... but it''s 30%. Non-attention ops scale 4×: 0.70 × 85ms × 4 = 238ms. Total predicted: 0.30×85×16
    + 0.70×85×4 = 408+238 = 646ms. But actual is 340ms. Low CPU utilization (60%) suggests memory bandwidth
    saturation: KV cache at 128 tokens = 4×64×128×1B = 32KB, exceeding L1 cache (32KB on S3), causing
    cache thrashing. Fix: use tiled attention with 32-token tiles to stay in L1.'
  common_mistake: Assuming O(n²) attention FLOPs explain the 4× latency increase; 4× context → 16× attention
    FLOPs but model has 2 layers and attention is <30% of total FLOPs.
  napkin_math: 'KV cache: 2layers×4heads×64dim×128seq×1B = 65,536B = 64KB > 32KB L1. At 128 tokens, cache
    thrashing adds ~2× memory latency. Tiling to 32-token windows: 16KB per tile fits L1, restores bandwidth
    efficiency.'
