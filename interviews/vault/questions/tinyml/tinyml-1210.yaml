title: Cross-Hierarchy Tensor Arena for ESP32-S3
scenario: You are deploying an audio keyword spotting and speaker verification dual-head model on an ESP32-S3. The model requires 750 KB of intermediate activation memory at its peak and 1.2 MB of INT8 weights.
question: How would you design a custom static memory planner and operator schedule that partitions the tensor arena across SRAM and PSRAM to ensure real-time execution?
details:
  realistic_solution: The optimal architecture splits the tensor arena into a fast-tier (SRAM) and slow-tier (PSRAM). The static planner schedules operators such that memory-bound INT8 vector operations have their working tensors pinned to SRAM. The 750 KB peak is mitigated by tiling the attention block, slicing the sequence dimension so that only a 250 KB chunk is in SRAM at any given time. The 1.2 MB of weights remain mapped in Flash/PSRAM, using the second Xtensa core or DMA to prefetch upcoming tiles into SRAM.
  common_mistake: |
    **The Pitfall:** Allocating the entire flat tensor arena in the 8 MB PSRAM.
    **The Rationale:** Candidates solve the capacity issue but ignore the massive latency penalty of PSRAM cache misses.
    **The Consequence:** The memory bus thrashing causes the inference latency to exceed real-time budgets, rendering the system useless.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total SRAM: 512 KB.
       - OS/WiFi stack: ~160 KB.
       - Available for ML: ~352 KB.
       - Peak Activation: 750 KB.
    2. **Calculations:**
       - Flat PSRAM overhead: 750 KB read/write = 1.5 MB traffic at 80 MB/s takes 18.75 ms per layer (Too slow).
       - Tiling Strategy: Tile the 750 KB activation into three 250 KB chunks.
    3. **Conclusion & Interpretation:**
       - **Result: 250 KB active tile fits in 352 KB SRAM budget, avoiding memory bus thrashing.**
