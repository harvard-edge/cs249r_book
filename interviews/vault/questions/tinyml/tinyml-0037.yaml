title: The Wildlife Camera's Battery Budget
scenario: 'You''re designing a remote wildlife camera using a Cortex-M4 MCU. To conserve power, the device
  operates on a duty cycle: it wakes up for 1 second to capture and classify an image, consuming 50 mW.
  It then enters a deep sleep state for 59 seconds, consuming only 10 µW. The entire system is powered
  by a 400 mAh, 3.7V LiPo battery. Explain how you would calculate the operational lifetime of the device
  and what that lifetime is.'
question: "How you would calculate the operational lifetime of the device and what that lifetime is?"
details:
  realistic_solution: First, calculate the average power consumption over one full cycle (60 seconds)
    by time-weighting the active and sleep power states. Second, calculate the total energy stored in
    the battery by multiplying its capacity in Amp-hours by its voltage to get Watt-hours. Finally, divide
    the battery's total energy by the system's average power consumption to find the operational lifetime.
    The device can operate for approximately 73 days.
  common_mistake: 'The most common mistakes are: 1) Forgetting to convert the battery''s mAh capacity
    into Watt-hours (or milliWatt-hours) by multiplying by the voltage, leading to unit mismatch. 2) Only
    considering the active power consumption and ignoring the duty cycle, which dramatically underestimates
    the device''s lifetime. 3) Incorrectly averaging the active and sleep power values without weighting
    by the time spent in each state.'
  napkin_math: 'Active: 50mW*1s = 50mJ. Sleep: 10uW*59s = 590uJ = 0.59mJ. Per cycle (60s): 50.59mJ. Avg
    power = 50.59/60 = 0.843mW. Battery = 400mAh*3.7V = 1480mWh = 1.48Wh. Life = 1480mWh / 0.843mW = 1755.6h
    = 73.2 days.'
  options:
  - About 1.2 days
  - About 20 days
  - About 73 days
  - About 2.5 days
  correct_index: 2
