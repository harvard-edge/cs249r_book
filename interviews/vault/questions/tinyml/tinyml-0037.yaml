title: 'The Wildlife Camera''s Battery Budget'
scenario: 'You''re designing a remote wildlife camera using a Cortex-M4 MCU. To conserve power, the device operates on a duty cycle: it wakes up for 1 second to capture and classify an image, consuming 50 mW. It then enters a deep sleep state for 59 seconds, consuming only 10 uW. The entire system is powered by a 400 mAh, 3.7V LiPo battery.'
question: 'How would you calculate the operational lifetime of the device and what is that lifetime?'
details:
  realistic_solution: 'First, calculate the average power consumption over one full cycle (60 seconds) by time-weighting the active and sleep power states. Second, calculate the total energy stored in the battery by multiplying its capacity in Amp-hours by its voltage to get Watt-hours. Finally, divide the battery''s total energy by the system''s average power consumption to find the operational lifetime.'
  common_mistake: |
    **The Pitfall:** Forgetting to convert battery mAh capacity into Watt-hours or failing to time-weight the power states.
    **The Rationale:** Candidates often perform simple division of peak current by capacity, ignoring the massive duty cycle sleep time.
    **The Consequence:** The operational lifetime is dramatically underestimated, leading to over-engineered battery solutions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active: 50 mW for 1s. Sleep: 0.01 mW for 59s.
    - Battery: 400 mAh at 3.7V.

    **Calculations:**
    - Active Energy: 50 mW * 1s = 50 mJ.
    - Sleep Energy: 0.01 mW * 59s = 0.59 mJ.
    - Average Power: (50.59 mJ) / 60s = 0.843 mW.
    - Battery Energy: 400 mAh * 3.7V = 1480 mWh.
    - Lifetime: 1480 mWh / 0.843 mW = 1755.6 hours.

    **Conclusion & Interpretation:**
    - **Result: 1755.6 hours (Energy Bound)**. The operational lifetime is approximately 73.2 days.
  options:
  - 'About 1.2 days'
  - 'About 20 days'
  - 'About 73 days'
  - 'About 2.5 days'
