title: Ethos-U55 Shared SRAM Architecture
scenario: You are deploying a wake-word detection model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300)
  system. The 480 MHz Cortex-M7 handles the MFCC feature extraction, and the resulting tensor needs to
  be consumed by the Ethos-U55 NPU for inference. What specific memory architecture feature of the Corstone-300
  allows the NPU to access the 512 KB SRAM without requiring explicit host-to-device DMA transfers?
question: "What specific memory architecture feature of the Corstone-300 allows the NPU to access the 512 KB SRAM without requiring explicit host-to-device DMA transfers?"
details:
  realistic_solution: The correct fact to recall is that the ARM Cortex-M7 and the Ethos-U55 NPU share
    the same 512 KB SRAM. Because they share this memory, zero-copy data passing is natively supported
    by simply providing the SRAM pointer to the NPU's command stream.
  common_mistake: Candidates often assume the NPU acts like a discrete PCIe accelerator or has isolated
    local memory, suggesting explicit DMA transfers are always needed to move data from the Cortex-M7
    to the Ethos-U55.
  napkin_math: If we had to explicitly DMA copy a 16 KB input tensor, moving 1 byte per cycle at 480 MHz
    would take 16,384 cycles (~34.1 microseconds). By utilizing the shared 512 KB SRAM for zero-copy,
    the data movement overhead becomes 0 cycles, saving memory bandwidth to feed the Ethos-U55's 128-512
    MAC/cycle execution engines.
