title: The Microcontroller's Ridge Point (tinyml-0344)
scenario: You are evaluating a Cortex-M4 possessing a peak compute of 336 MFLOPS and an on-chip SRAM bandwidth of 1.2 GB/s.
question: "What is the arithmetic intensity (in FLOPs/Byte) required to saturate the processor's compute capability?"
details:
  realistic_solution: Utilize the Roofline Performance Model. The hardware's ridge point defines the strict inflection parameter dividing Memory-Bound algorithms from Compute-Bound algorithms, established by computing maximum MACs divided by structural byte limits.
  common_mistake: |
    **The Pitfall:** Inverting the structural ratio calculation (Bytes/Op) or failing to align unit prefixes (Mega vs Giga).
    **The Rationale:** Engineers accustomed to datacenter GPUs anchor intuition on huge numerical capacities, forgetting edge MCUs are fundamentally severely memory-constrained.
    **The Consequence:** They calculate inaccurate ridge points and misallocate optimization engineering time toward the wrong architectural bottlenecks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak Compute capability: 336 MFLOPS.
       - Peak Memory Bandwidth: 1.2 GB/s.
    2. **Calculations:**
       - Normalize compute: 336 * 10^6 FLOPs/sec.
       - Normalize memory: 1.2 * 10^9 Bytes/sec.
       - Ridge Point: (336 * 10^6) / (1.2 * 10^9) = 336 / 1200 = 0.28 FLOPs/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: The algorithm needs exactly 0.28 Ops/Byte to reach the inflection point (Arithmetic-Intensity Bound).**
  options:
  - 3.57 Ops/Byte
  - 280 Ops/Byte
  - 0.28 Ops/Byte
  - 295 Ops/Byte
