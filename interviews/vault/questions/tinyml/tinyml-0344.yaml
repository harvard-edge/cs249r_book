title: The Microcontroller's Ridge Point (tinyml-0344)
scenario: You are evaluating a common microcontroller, the Cortex-M4, for a real-time audio keyword-spotting
  application. According to the reference specs, it has a peak compute of about 336 MFLOPS and an on-chip
  SRAM memory bandwidth of 1.2 GB/s. To understand whether your workloads will be compute-bound or memory-bound,
  you need to calculate the chip's roofline ridge point. What is the arithmetic intensity (in FLOPs/Byte)
  required to saturate the processor's compute capability?
details:
  realistic_solution: The roofline's ridge point is the ratio of the processor's peak compute performance
    to its peak memory bandwidth. For the Cortex-M4, this is calculated by dividing its MFLOPS by its
    GB/s, making sure the units are consistent.
  common_mistake: The most common mistakes are inverting the ratio (calculating Bytes/Op instead of Ops/Op),
    or failing to reconcile the different numeric prefixes (MFLOPS vs. GB/s). Engineers used to working
    with datacenter GPUs may also anchor on a high number, forgetting that the balance of compute to memory
    is fundamentally different on a microcontroller.
  napkin_math: 1. **Identify peak compute:** 336 MFLOPS = 336 × 10^6 FLOPs/second.
  options:
  - 3.57 Ops/Byte
  - 280 Ops/Byte
  - 0.28 Ops/Byte
  - 295 Ops/Byte
  correct_index: 2
