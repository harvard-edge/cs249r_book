title: The Microcontroller's Ridge Point (tinyml-0344)
scenario: You are evaluating the Cortex-M4 for a real-time audio keyword-spotting application. The processor has a peak compute of 336 MFLOPS and an on-chip SRAM bandwidth of 1.2 GB/s.
question: "What is the arithmetic intensity (in FLOPs/Byte) required to saturate the processor's compute capability?"
details:
  realistic_solution: The roofline's ridge point is the ratio of the processor's peak compute performance to its peak memory bandwidth. For the Cortex-M4, this is calculated by dividing its MFLOPS by its GB/s.
  common_mistake: |
    **The Pitfall:** Inverting the ratio (calculating Bytes/Op instead of Ops/Byte) or failing to reconcile numeric prefixes (MFLOPS vs GB/s).
    **The Rationale:** Engineers used to datacenter GPUs anchor on a high number and forget that microcontrollers are fundamentally memory-bound.
    **The Consequence:** They miscalculate the ridge point and pursue the wrong optimization strategy.
  napkin_math: |
    1. Identify Peak Compute: 336 MFLOPS = 336 * 10^6 FLOPs/sec.
    2. Identify Memory Bandwidth: 1.2 GB/s = 1.2 * 10^9 Bytes/sec.
    3. Calculate Ridge Point: (336 * 10^6) / (1.2 * 10^9) = 336 / 1200 = 0.28 FLOPs/Byte.
    4. **Final Result: 0.28 Ops/Byte.**
  options:
  - 3.57 Ops/Byte
  - 280 Ops/Byte
  - 0.28 Ops/Byte
  - 295 Ops/Byte
