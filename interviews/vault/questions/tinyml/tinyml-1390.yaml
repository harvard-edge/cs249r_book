title: 'Hardware-Aware NAS on ESP32-S3: Performance & Memory Trade-offs'
scenario: 'Your team has successfully deployed a keyword spotting model on an MCU, selected through a hardware-aware NAS process. The chosen model consumes 400 KB of SRAM, has a computational complexity of 50 MFLOPs, and achieves an end-to-end inference latency of 150 ms.'
question: 'Why would the hardware-aware NAS converge to a 400 KB SRAM, 50 MFLOP model with 150 ms latency?'
details:
  realistic_solution: 'A strong answer would identify that the 400 KB SRAM usage clearly indicates that memory was a primary constraint guiding the NAS. The 150 ms latency for 50 MFLOPs suggests that while compute-intensive, the NAS balanced compute with memory efficiency. The trade-off is between model complexity and fitting within the hardware''s strict SRAM and latency budget.'
  common_mistake: |
    **The Pitfall:** Attributing the 150ms latency solely to FLOPs.
    **The Rationale:** Candidates ignore the impact of memory access patterns (SRAM vs PSRAM), cache performance, and CPU instructions per cycle (IPC).
    **The Consequence:** They focus purely on theoretical optimizations without considering real-world hardware limitations, leading to unrealistic expectations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model SRAM: 400 KB. Physical SRAM: 512 KB.
    - Compute complexity: 50 MFLOPs.
    - Measured latency: 150 ms.
    - MCU clock: 240 MHz, Dual-core.

    **Calculations:**
    - SRAM Utilization: 400 KB / 512 KB = ~78% utilized.
    - Theoretical Max Throughput: 2 cores × 240 MHz = 480 M cycles/sec.
    - Ideal Latency at 1 FLOP/cycle: 50 MFLOPs / 480 MFLOPs/sec = 0.104 s (104 ms).
    - Performance Gap: 150 ms - 104 ms = 46 ms.

    **Conclusion & Interpretation:**
    - **Result: 46 ms Overhead (Memory-Bound)**. The NAS hit the SRAM ceiling, heavily penalizing operations that cause cache misses and memory stalls, accounting for the latency gap.
