title: Symmetric Weights and SIMD Utilization
scenario: You are deploying a keyword spotting model to an ARM Cortex-M4 (STM32F4) running at 168 MHz
  with 256 KB SRAM. The team used Post-Training Quantization (PTQ) to convert the model to INT8, utilizing
  asymmetric quantization for both activations and weights to maximize representational precision. However,
  profiling shows the pointwise convolutions are taking nearly 3 times longer than expected, failing to
  utilize the CMSIS-NN SIMD capabilities and causing the device to drop incoming audio frames.
details:
  realistic_solution: Diagnose that asymmetric weights prevent the use of the SMLAD SIMD instruction.
    The fix is to switch the weights to symmetric quantization (zero-point = 0) while keeping activations
    asymmetric. This eliminates the activation-dependent zero-point arithmetic in the innermost loop.
    The CMSIS-NN backend can now pack two INT8 values into 32-bit registers and execute 2 MACs per cycle.
    To recover any accuracy lost from symmetric quantization, transition the pipeline from PTQ to Quantization-Aware
    Training (QAT).
  common_mistake: Candidates often assume all INT8 quantization formats perform equally and focus on tweaking
    the memory layout or clock speed. They fail to realize that asymmetric weight quantization requires
    dynamic multiplication and subtraction of the weight zero-point with the activation in the innermost
    loop, breaking the ability to use tightly packed SIMD instructions.
  napkin_math: 'For a pointwise convolution layer with 2,000,000 MACs: The Cortex-M4 theoretically executes
    2 INT8 MACs/cycle using SIMD SMLAD, taking 1,000,000 cycles (5.95 ms at 168 MHz). Asymmetric weights
    introduce scalar arithmetic overhead that breaks SIMD packing, dropping throughput to ~0.5 MACs/cycle,
    requiring ~4,000,000 cycles (23.8 ms). Switching to symmetric weights restores the 1,000,000 cycle
    SIMD baseline. Furthermore, because the STM32F4 lacks an FPU, replacing the subsequent floating-point
    dequantization scale with an integer multiplier and bit-shift saves an additional ~100 software FP
    emulation cycles per output pixel, reducing layer latency from >24 ms down to ~6 ms.'
