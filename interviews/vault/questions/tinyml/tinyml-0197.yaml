classification_review: 'Flash is correct. The question asks about calculating tensor arena sizes — this requires quantitative computation of tensor dimensions and peak memory, not just concept recall. Mode should be ''napkin-math''. The napkin_math field is also incomplete (''1. Calculate size of each tensor:'' with no actual calculations).'
