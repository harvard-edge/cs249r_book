title: 'The Tensor Arena Squeeze: Tensor Arena Planning'
scenario: 'You''re deploying a keyword spotting model to a Cortex-M4 microcontroller with 256KB of SRAM. The TensorFlow Lite for Microcontrollers interpreter needs a pre-allocated ''tensor arena'' for activations. Your model has the following structure and intermediate tensor sizes: Input=490 bytes. Conv1 Output=2000 bytes. Conv2 Output=1040 bytes. Conv3 Output=4 bytes.'
question: How should you size the tensor arena for the keyword spotting model, accounting for live tensor reuse rather than summing all tensors?
details:
  realistic_solution: The tensor arena is a single, contiguous block of memory allocated upfront. TFLite Micro carves out space for all input, output, and intermediate activation tensors. It uses a memory manager to reuse space from tensors that are no longer live in the computation graph.
  common_mistake: |
    **The Pitfall:** Summing the sizes of all tensors in the model.
    **The Rationale:** Engineers ignore that the memory manager reuses space from tensors that are no longer live in the computation graph.
    **The Consequence:** They massively oversize the memory requirements and falsely conclude the model won't fit on the device.
  napkin_math: |
    - Conv1 peak (Input + Conv1 Out): 490 + 2000 = 2490 bytes.
    - Conv2 peak (Conv1 Out + Conv2 Out): 2000 + 1040 = 3040 bytes.
    - Conv3 peak (Conv2 Out + Conv3 Out): 1040 + 4 = 1044 bytes.
    - **The absolute peak arena size is 3040 bytes at Conv2, saving 494 bytes compared to a naive sum (3534 bytes).**
  options:
  - 3534 bytes (Sum of all tensors; forgets memory reuse)
  - 2000 bytes (Size of largest single tensor; forgets concurrent tensors)
  - 3040 bytes
  - 2490 bytes (Peak usage during Conv1, but not the absolute peak)
  correct_index: 2
