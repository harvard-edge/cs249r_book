title: 'Model Size Estimation: Analyze Why MCU Cannot Run INT8 Models Larger Than 200KB'
scenario: 'A firmware engineer says: ''The Cortex-M4 has 256KB SRAM and 512KB Flash, so we can run INT8
  models up to 512KB (512K parameters).'' Explain why this is incorrect and derive the actual maximum
  model size, accounting for all SRAM consumers during inference.'
details:
  realistic_solution: 'Flash: model weights (read-only). Max model in Flash: 512KB - 64KB (application
    code) - 20KB (TFLM kernels) = 428KB → 428K parameters INT8. SRAM consumers during inference: (1) TFLM
    runtime: 30KB. (2) Stack: 8KB. (3) Input buffer (audio/sensor): 4KB. (4) Activation tensor arena (peak):
    depends on model, but typically 30-50% of model weight size for MLPs, 100-300% for CNNs. For 428K
    model with CNN activations (200% ratio): 428K × 2 = 856KB >> 256KB SRAM. Actual max: activation arena
    < 256-30-8-4=214KB. If CNN activations = 200% of model: max model = 107K params INT8 = 107KB Flash.
    MLP activations (20% ratio): max model = 214/0.2 = 1.07MB Flash — limited by Flash (428KB).'
  common_mistake: Equating Flash size with max model size; model weights go in Flash, but SRAM must hold
    activations, runtime stack, input buffers, and TFLM runtime simultaneously.
  napkin_math: 'SRAM: 256KB total. Runtime: 30KB. Stack: 8KB. Input: 4KB. Available for activations: 214KB.
    CNN activation/weight ratio: ~2×. Max CNN model: 214KB/2=107K params INT8=107KB Flash. MLP ratio:
    ~0.2×. Max MLP: 214/0.2=1.07M params INT8=1.07MB → Flash-limited to 428K params. Actual MCU practical
    limit: 100-400K params depending on architecture.'
