title: The I2C Clock Stretching Deadlock
scenario: Your MCU reads an ML sensor via I2C every 10ms. It runs flawlessly for weeks, then suddenly the entire MCU freezes completely. A hardware watchdog resets the board. You trace the freeze to a while() loop inside the I2C driver waiting for the SCL line to go High.
question: "Why can a crashed I2C sensor hold SCL low forever and freeze an MCU in a wait loop?"
details:
  realistic_solution: 'I2C clock stretching allows a slave device to hold the SCL line low when it needs processing time. If the sensor crashes, it may hold SCL low indefinitely. Fix: (1) always add a timeout to I2C wait loops (e.g., 10ms), (2) implement SCL recovery by toggling the clock line 9 times to reset the bus.'
  common_mistake: |
    **The Pitfall:** Blaming the hardware by assuming the pull-up resistor physically broke.
    **The Rationale:** Candidates overlook active I2C protocol behavior like clock stretching.
    **The Consequence:** They fail to implement a software timeout or bus recovery sequence in the I2C driver.
  napkin_math: |
    1. Calculate 400kHz clock cycle: 1 / 400,000 = 2.5 µs.
    2. Evaluate normal stretch limit: Normal device stretching takes < 10 µs.
    3. Evaluate fault condition: Holding the line > 1,000 µs (1 ms) indicates a crash.
    4. **Final Result: Without a timeout, waiting an infinite number of microseconds for a 2.5 µs clock will deadlock the MCU.**
