title: Arithmetic Intensity and SRAM Energy Tradeoffs
scenario: >
  A continuous keyword spotting model on an STM32F4 (168 MHz) misses battery life targets.
  Standard convolutions were aggressively replaced with depthwise separable convolutions to reduce total MAC count.
question: Why can depthwise separable convolutions hurt STM32F4 battery life, and how should arithmetic intensity guide layer choices?
details:
  realistic_solution: |
    A strong candidate will recognize that memory access dominates compute energy. They will explain that standard convolutions offer high data reuse, allowing the CMSIS-NN kernels to keep activations in the STM32F4's registers to amortize the SRAM read costs. To optimize energy, they will suggest balancing MAC reduction with arithmetic intensity, potentially reverting some depthwise layers back to standard convolutions or employing channel-grouping to maximize SIMD register utilization.
  common_mistake: |
    **The Pitfall:** Assuming that minimizing total MACs directly minimizes energy consumption.
    **The Rationale:** Candidates overlook Horowitz energy principles and ignore that low arithmetic intensity leads to frequent, expensive SRAM accesses.
    **The Consequence:** Battery life drops because SRAM reads consume significantly more energy per operation than SIMD INT8 arithmetic.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Energy costs: INT8 MAC ≈ 0.1 pJ, 32-bit SRAM read ≈ 5 pJ (~1.25 pJ/byte).
       - Depthwise Conv arithmetic intensity: 1 MAC per weight.
    2. **Calculations:**
       - Depthwise Energy: 1 weight byte (1.25 pJ) + 1 activation byte (1.25 pJ) + 1 MAC (0.1 pJ) = 2.6 pJ/MAC.
       - Standard 1x1 Conv (32 output channels): Activations are reused in registers. Fetch cost drops to 1.25 pJ / 32 = 0.04 pJ.
       - Standard Conv Energy: ~0.5 pJ/MAC.
    3. **Conclusion & Interpretation:** Standard layers execute far more MACs but draw less energy due to register reuse. **Result: Memory-Energy-Bound**.
