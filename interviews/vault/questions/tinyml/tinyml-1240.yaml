title: Arithmetic Intensity and SRAM Energy Tradeoffs
scenario: >
  You are optimizing a continuous keyword spotting model for an ARM Cortex-M4 (STM32F4) microcontroller operating at 168 MHz with 256 KB SRAM and 1 MB flash. The device lacks an FPU but leverages CMSIS-NN SIMD to execute 2x INT8 MACs per cycle. Despite aggressively replacing standard convolutions with depthwise separable convolutions to reduce the total MAC count, the system is missing its battery life target.
question: >
  Why can depthwise separable convolutions hurt STM32F4 battery life, and how should arithmetic intensity guide layer choices?
details:
  realistic_solution: >
    A strong candidate will recognize that memory access dominates compute energy. They will explain that standard convolutions offer high data reuse, allowing the CMSIS-NN kernels to keep activations in the STM32F4's registers to amortize the SRAM read costs. To optimize energy, they will suggest balancing MAC reduction with arithmetic intensity, potentially reverting some depthwise layers back to standard convolutions or employing channel-grouping to maximize SIMD register utilization.
  common_mistake: |
    **The Pitfall:** Assuming that minimizing total MACs directly minimizes energy consumption.
    **The Rationale:** Candidates often overlook the Horowitz energy principles and fail to realize the low arithmetic intensity of depthwise convolutions leads to frequent, expensive SRAM accesses.
    **The Consequence:** The model misses battery life targets because SRAM reads consume significantly more energy per operation than efficient SIMD INT8 arithmetic.
  napkin_math: |
    - **Energy Costs:** INT8 MAC ≈ 0.1 pJ. 32-bit SRAM read (4 bytes) ≈ 5 pJ (~1.25 pJ/byte).
    - **Depthwise Conv:** Arithmetic intensity is 1 MAC per weight. Energy = ~2.5 pJ (1 weight byte + 1 activation byte) + 0.1 pJ compute = 2.6 pJ/MAC.
    - **Standard 1x1 Conv (32 output channels):** Activation bytes are reused across 32 filters in registers. Activation fetch cost drops to 1.25 pJ / 32 = 0.04 pJ.
    - **Standard Conv Total:** Coupled with 2x INT8 MACs/cycle, a standard block consumes < 0.5 pJ/MAC overall.
    - **Conclusion:** A standard layer with 3x more MACs but high reuse can consume **less than half the total energy** of a strictly memory-bound depthwise layer.
