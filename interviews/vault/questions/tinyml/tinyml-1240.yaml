title: Arithmetic Intensity and SRAM Energy Tradeoffs
scenario: You are optimizing a continuous keyword spotting model for an ARM Cortex-M4
  (STM32F4) microcontroller operating at 168 MHz with 256 KB SRAM and 1 MB flash.
  The device lacks an FPU but leverages CMSIS-NN SIMD to execute 2x INT8 MACs per
  cycle. Despite aggressively replacing standard convolutions with depthwise separable
  convolutions to reduce the total MAC count, the system is missing its battery life
  target. You need to evaluate the energy consumption breakdown between compute operations
  and memory accesses on this specific platform.
question: Why can depthwise separable convolutions hurt STM32F4 battery life, and
  how should arithmetic intensity guide layer choices?
details:
  realistic_solution: A strong candidate will recognize that memory access dominates
    compute energy. They will explain that standard convolutions offer high data reuse,
    allowing the CMSIS-NN kernels to keep activations in the STM32F4's registers to
    amortize the SRAM read costs. To optimize energy, they will suggest balancing
    MAC reduction with arithmetic intensity, potentially reverting some depthwise
    layers back to standard convolutions or employing channel-grouping to maximize
    SIMD register utilization.
  common_mistake: Candidates typically assume that minimizing total MACs directly
    minimizes energy consumption. They often overlook the Horowitz energy principles
    and fail to realize that the low arithmetic intensity of depthwise convolutions
    leads to frequent SRAM accesses, which consume significantly more energy per operation
    than the efficient SIMD INT8 arithmetic.
  napkin_math: Assume an INT8 MAC costs ~0.1 pJ and a 32-bit SRAM read (4 bytes) costs
    ~5 pJ (~1.25 pJ/byte). In a depthwise convolution, arithmetic intensity is strictly
    1 MAC per weight, resulting in memory energy of ~2.5 pJ (1 weight byte + 1 activation
    byte) plus 0.1 pJ compute, totaling 2.6 pJ/MAC. In a standard 1x1 convolution
    with 32 output channels, each fetched activation byte is reused across 32 filters
    in registers. The activation fetch cost per MAC drops to 1.25 pJ / 32 = 0.04 pJ.
    Coupled with the platform's 2x INT8 MACs/cycle throughput, a standard convolution
    block can consume less than 0.5 pJ/MAC overall. Thus, a layer with 3x more MACs
    but high reuse can still consume half the total energy of a strictly memory-bound
    depthwise layer.
