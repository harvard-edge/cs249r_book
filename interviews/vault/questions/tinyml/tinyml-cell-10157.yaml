title: Implement MobileNet-style INT8 quantization for ESP32-S3 inference
scenario: You are deploying a 5-class image classifier based on MobileNetV1-0.25x (0.027 GFLOPs, 225K
  params) on an ESP32-S3 (240MHz, 512KB SRAM, 8MB PSRAM) using TensorFlow Lite Micro. Implement the full
  quantization-aware training and deployment pipeline targeting INT8 inference.
question: "How should the MobileNetV1-0.25x model be quantized and deployed on ESP32-S3 for reliable INT8 inference?"
details:
  realistic_solution: 'QAT pipeline: (1) Train FP32 to convergence; (2) Apply tf.quantization.experimental.quantize_model()
    or torch.quantization.prepare_qat(); (3) Fine-tune 20 epochs with fake quantize nodes; (4) Convert
    to TFLite INT8 with full-integer quantization; (5) Copy .tflite to ESP32-S3 flash; (6) TFLite Micro
    on ESP32-S3: use esp_tflite_micro library, allocate tensor arena in PSRAM (8MB available). Arena size
    calculation: largest activation 96×96×8×1B (if input resized) = 73KB; allocate 200KB arena. Verify
    with MicroInterpreter::AllocateTensors().'
  common_mistake: 'Using post-training quantization alone on MobileNetV1-0.25x which, due to small channel
    counts (C×0.25 → e.g., 8 channels in early layers), suffers significant quantization error: with only
    8 channels × 8-bit quantization per tensor, the dynamic range is severely limited. QAT is essential.'
  napkin_math: 'MobileNetV1-0.25×: 225K params × 1B INT8 = 225KB weights. TFLite Micro arena: need to
    hold weights + activations + scratch. Input 96×96×3 = 27KB. Layer 1 output 48×48×8 = 18KB. Peak activation:
    96×96×8 = 73KB. Arena estimate: 225KB + 73KB + 50KB scratch = 348KB. ESP32-S3 PSRAM: 8MB → abundant.
    SRAM (512KB) cannot hold all, but TFLite Micro can use PSRAM for tensor arena via custom allocator.
    ESP32-S3 at 240MHz, Xtensa LX7: CMSIS-NN equivalent throughput ~30M MACs/sec. Total MACs: 0.027G/2
    = 13.5M MACs → 450ms per inference. Reduce input to 64×64: 6M MACs → 200ms. Acceptable for 5 FPS.'
