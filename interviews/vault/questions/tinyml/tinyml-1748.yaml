title: Sensor Queue Buildup Analysis
scenario: An industrial Cortex-M4 receives vibration samples randomly at an average
  rate of 20 per second (Poisson process). The NN inference takes exactly 35 ms per
  sample.
question: Analyze the system's expected wait time in the queue and determine if the
  MCU can maintain stability without dropping packets.
details:
  realistic_solution: The arrival rate (lambda) is 20/sec. The service time is 0.035
    sec, meaning the service rate (mu) is 1 / 0.035 = 28.57/sec. Since lambda (20)
    < mu (28.57), the queue is stable. The utilization is rho = 20 / 28.57 = 0.7.
    Using M/D/1 queue formulas, the expected wait time is (rho * service_time) / (2
    * (1 - rho)) = (0.7 * 35ms) / (2 * 0.3) = 40.8 ms.
  common_mistake: Using deterministic uniform arrivals instead of Poisson, concluding
    there is zero wait time because 50ms > 35ms.
  napkin_math: 20 / (1 / 0.035) = 0.7 utilization.
