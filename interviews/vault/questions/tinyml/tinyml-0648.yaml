title: The Bootloader Vector Table Relocation
scenario: You implement a custom bootloader for your TinyML device to handle OTA updates. The bootloader lives at Flash address `0x08000000`. It verifies the new ML application at `0x08020000` and jumps to it. The ML application's first line of code executes perfectly. But the moment a hardware timer interrupt fires, the device crashes and reboots.
question: Why does the application crash immediately when a hardware timer interrupt fires after a bootloader jump?
details:
  realistic_solution: 'The interrupt vector table (IVT) was not relocated. At boot, the CPU fetches interrupt handlers from the IVT at 0x08000000 (bootloader''s IVT). After jumping to the application at 0x08020000, the VTOR register still points to the bootloader''s IVT. When a timer interrupt fires, the CPU fetches the handler address from the bootloader''s vector table, which points to bootloader code — executing random instructions from the wrong binary, causing an immediate hard fault. Fix: the application''s first instruction must set VTOR = 0x08020000 (SCB->VTOR = APP_BASE_ADDRESS) before enabling any interrupts.'
  common_mistake: |
    **The Pitfall:** Blaming the application's timer initialization.
    **The Rationale:** Candidates assume the timer was configured incorrectly because it crashes when the timer fires.
    **The Consequence:** They fail to identify the missing Vector Table Offset Register (VTOR) relocation, causing the CPU to execute random code.
  napkin_math: |
    1. **Assumptions & Constraints:** Jump instruction latency: 1-3 cycles. VTOR offset required.
    2. **Calculations:** Without VTOR relocation, CPU fetches ISR from 0x08000000 instead of 0x08020000.
    3. **Conclusion & Interpretation:** **CPU jumps to the wrong binary address, triggering a hard fault in microseconds. Result: Control-Flow-Error.**
  options:
  - The bootloader's CRC verification of the application image has a bug that passes invalid binaries, causing random code execution when the first interrupt fires.
  - 'The interrupt vector table (IVT) was not relocated. After jumping to the application at 0x08020000, the VTOR register still points to the bootloader''s IVT at 0x08000000. When a timer interrupt fires, the CPU fetches the handler address from the wrong vector table, executing bootloader code as if it were an ISR handler — causing an immediate hard fault. Fix: set SCB->VTOR = 0x08020000 as the application''s first instruction before enabling interrupts.'
  - The timer peripheral's interrupt priority was not reconfigured after the jump, causing a priority inversion that deadlocks the application's interrupt handler.
  - The bootloader disables the timer before jumping, but the application re-enables it before the clock tree is fully initialized, causing the timer to fire at the wrong frequency and crash the interrupt handler.
  correct_index: 1
