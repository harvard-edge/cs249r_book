title: The Unaligned Access Fault
scenario: You port a TFLite Micro vision model from a Cortex-M4 to a cheaper Cortex-M0+. The code compiles
  perfectly. But when the inference engine loads the model's tensor arena, it immediately crashes with
  a `HardFault` exception. How does TFLite Micro's packed tensor memory layout cause unaligned access
  on the Cortex-M0+, and why does the ISA constraint force you to pad your ML tensors?
details:
  realistic_solution: You triggered an unaligned memory access fault due to how the ML runtime packs tensors.
    TFLite Micro allocates all activations and weights contiguously in a single `tensor_arena` byte array
    to save SRAM. If a 3-channel INT8 image tensor (size $W \times H \times 3$ bytes) is followed immediately
    by a 32-bit quantization multiplier or a 32-bit bias vector, that 32-bit value may start at an address
    not divisible by 4.
  common_mistake: '"Assuming all ARM Cortex-M processors handle memory access rules identically, or thinking
    the model weights are corrupted."'
  napkin_math: If an INT8 tensor of size 11 bytes starts at `0x20000000`, it ends at `0x2000000A`. The
    next tensor (a 32-bit float bias) starts at `0x2000000B`. Attempting a 32-bit read at `0x2000000B`
    fails because `0x2000000B % 4 != 0`. The M4 silently resolves it in 2 cycles. The M0+ hard crashes
    in 1 cycle. Padding the 11-byte tensor to 12 bytes wastes 1 byte but aligns the next tensor to `0x2000000C`,
    preventing the crash.
