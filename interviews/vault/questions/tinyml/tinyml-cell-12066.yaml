title: 'Model Format Conversion: Implement TFLite Flatbuffer Size Calculation for MCU'
scenario: 'Calculate the TFLite Micro model size (Flatbuffer .tflite file) for a small CNN to be stored
  in Flash on Cortex-M4 (256KB SRAM, 512KB Flash). Model: 3 Conv2D layers (32, 64, 128 filters, 3×3 kernels,
  INT8), 1 FC layer (10 outputs). Input: 28×28×1 (MNIST). Determine if it fits in 512KB Flash alongside
  a 64KB application binary.'
details:
  realistic_solution: 'Conv1: 32×1×3×3 = 288 params. Conv2: 64×32×3×3 = 18,432. Conv3: 128×64×3×3 = 73,728.
    FC: 128×10 = 1,280. Biases: 32+64+128+10 = 234 (int32, 4B each = 936B). Quantization metadata: ~50
    bytes per tensor × 8 tensors = 400B. Flatbuffer overhead: ~2KB. Total: (288+18432+73728+1280)×1B +
    936 + 400 + 2000 = 93728 + 3336 = 97KB. Flash: 97KB model + 64KB app = 161KB << 512KB ✓.'
  common_mistake: Calculating weight size only without accounting for Flatbuffer overhead, bias terms,
    and quantization scale/zero-point metadata per tensor.
  napkin_math: 'Weights: (288+18432+73728+1280)=93728 bytes ≈ 91.5KB INT8. Biases (int32): 234×4=936B.
    Metadata: ~2.4KB. Total .tflite: ~94KB. Flash: 64KB app + 94KB model = 158KB of 512KB = 30.9%. ✓ SRAM
    for activation arena: peak at Conv3 output: 14×14×128=25KB + input buffer 28×28×1=784B. Total arena:
    ~30KB of 256KB = 11.7%.'
