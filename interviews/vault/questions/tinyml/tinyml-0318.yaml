title: 'The Microcontroller''s Ceiling: MCU Compute Constraints'
scenario: You're profiling a keyword-spotting model on a Cortex-M4 microcontroller. To understand its
  performance limits, you need to know the hardware's fundamental characteristics. What is the approximate
  Ridge Point of a typical Cortex-M4, and what does it signify?
details:
  realistic_solution: The Ridge Point is approximately 0.2 Ops/Byte. This value marks the transition from
    being memory-bound to compute-bound. Since the value is so low, it signifies that nearly any ML operation
    will have an Arithmetic Intensity greater than 0.2, meaning the model's performance will almost always
    be limited by the processor's peak compute speed, not memory bandwidth.
  common_mistake: Engineers accustomed to cloud or edge GPUs often assume a high Ridge Point (e.g., >100
    Ops/Byte), incorrectly believing that memory bandwidth is the primary bottleneck. On a microcontroller,
    the opposite is true; the system has abundant on-chip SRAM bandwidth relative to its weak compute,
    leading to a very low Ridge Point and making workloads compute-bound.
  napkin_math: The Ridge Point determines if a workload is bottlenecked by the CPU or memory. For a 168MHz
    Cortex-M4 (480 peak MFLOPS with MACs) and ~1.2 GB/s SRAM bandwidth, Ridge Point = 480 MFLOPS / 1.2
    GB/s = 0.4 FLOPs/Byte. A KWS model using dense INT8 convolutions reads 1 byte per MAC (2 FLOPs), yielding
    an intensity of 2.0. Thus, KWS on the M4 is overwhelmingly compute-bound.
  options:
  - ~200 Ops/Byte, meaning it's almost always compute-bound.
  - ~2 Ops/W, meaning it's very power efficient.
  - ~0.2 Ops/Byte, meaning it's almost always compute-bound.
  - ~20 Ops/Byte, meaning it's balanced between compute and memory.
  correct_index: 2
