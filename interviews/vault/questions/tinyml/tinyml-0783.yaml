title: Tinyml New 0005
scenario: An audio wake-word model uses INT16 activations and INT8 weights. It randomly produces silent misclassifications. Profiling shows intermediate buffers mysteriously overflowing their data types.
question: Why do INT16 activations with INT8 weights overflow intermediate buffers during large dot products?
details:
  realistic_solution: 'The intermediate buffer overflow is caused by the hardware accumulator exceeding 32 bits during the dot product of large filters. While INT8 x INT16 fits in 24 bits, accumulating thousands of these products in a 32-bit register causes integer overflow. Use a 64-bit accumulator or constrain weight magnitudes.'
  common_mistake: |
    **The Pitfall:** Focusing only on the bit-width of inputs and outputs.
    **The Rationale:** Candidates ignore the internal bit-width limits of the hardware accumulator used for summation loops.
    **The Consequence:** Models suffer from catastrophic silent integer overflow in production, leading to wildly incorrect predictions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Activations: INT16 (Max 32767).
       - Weights: INT8 (Max 127).
       - Accumulator: 32-bit signed int (Max 2,147,483,647).
    2. **Calculations:**
       - Max single product = 127 * 32767 = 4,161,409.
       - Max safe accumulations = 2,147,483,647 / 4,161,409 ≈ 516.
    3. **Conclusion & Interpretation:**
       - **Result: Hardware-Bound.** Convolutions with greater than 516 parameters will reliably overflow a 32-bit accumulator.
