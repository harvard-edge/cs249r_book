title: 'TinyML Anomaly Detection: Data Curation for Constrained Devices'
scenario: >
  You're tasked with developing a vibration anomaly detection system for critical industrial equipment. The ML model must run entirely on an ARM Cortex-M4 microcontroller running at 168 MHz, with 256 KB of SRAM and no FPU. Sensor data streams at 100 Hz from a 3-axis accelerometer.
question: How should you curate and label vibration data so a Cortex-M4 anomaly model is representative, unbiased, and deployable?
details:
  realistic_solution: >
    Deploy an active learning strategy directly on the target hardware. Use an uncertainty-sampling proxy model on the Cortex-M4 to selectively buffer and flag boundary-case samples for human annotation. This minimizes labeling overhead and ensures the curated data strictly reflects the operational domain and fixed-point hardware constraints.
  common_mistake: |
    **The Pitfall:** Collecting a large, generic dataset without considering unique operational conditions and tinyML constraints.
    **The Rationale:** Candidates assume more data is always better, failing to account for the massive domain shift or memory overhead when deployed to memory-constrained devices lacking an FPU.
    **The Consequence:** This leads to models that are too large, computationally inefficient, or completely incompatible with the target hardware's fixed-point reality.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Stream: 100 Hz, 3-axis, 16-bit (600 bytes/second).
       - Annotation Time: 1 minute per 1-second sample.
    2. **Calculations:**
       - Standard Curation (10,000 random samples): 10,000 minutes = ~167 hours.
       - Active Learning (Top 30% uncertain): 3,000 samples = 50 hours.
    3. **Conclusion & Interpretation:**
       - **Result: Labeling time reduced from 167 to 50 hours.** Active learning captures only informative samples, making curation feasible for small edge teams. **Bottleneck: Annotation Scaling.**
