title: 'TinyML Anomaly Detection: Data Curation for Constrained Devices'
scenario: You're tasked with developing a vibration anomaly detection system for critical industrial equipment. The ML model must run entirely on an ARM Cortex-M4 STM32F4 microcontroller (specifically, an STM32F407VGT6) clocked at 168 MHz, with only 256 KB of SRAM available and no floating-point unit (FPU). The sensor data streams at 100 Hz, producing 3-axis accelerometer readings. Your challenge is to curate a high-quality dataset for training this anomaly detection model, considering the severe resource constraints for both model size and inference on the device.
question: How should you curate and label vibration data so a Cortex-M4 anomaly model is representative, unbiased, and deployable?
details:
  realistic_solution: Implement an active learning strategy where the model (or a proxy) identifies uncertain samples on the STM32F4 for human annotation, minimizing labeling effort and focusing on informative data. Conduct targeted data collection directly from the target STM32F4-equipped machinery under various operational conditions. Establish rigorous, device-aware annotation guidelines, train annotators, and regularly measure inter-annotator agreement (IAA) to ensure consistent and high-quality labels for anomalies. Focus on feature engineering that is robust and computationally inexpensive in a fixed-point environment.
  common_mistake: |
    **The Pitfall:** Collecting a large, generic dataset without considering unique operational conditions and tinyML constraints.
    **The Rationale:** Candidates assume more data is always better, failing to account for the massive domain shift or memory overhead when deployed to memory-constrained devices lacking an FPU.
    **The Consequence:** This leads to models that are too large, computationally inefficient, or completely incompatible with the target hardware's fixed-point reality.
  napkin_math: |
    - Assuming model weights/activations take 50 KB (50,000 quantized 8-bit params).
    - A 1-second window of 3-axis accelerometer data (100 samples, 3 axes, 2 bytes/sample) = 100 * 3 * 2 = 600 bytes.
    - If each annotation takes 1 minute, 10,000 anomaly samples = 166.7 hours (~167 hours).
    - **Final Result:** An active learning approach capturing only informative samples can reduce this labeling time to **~50 hours**, making curation feasible for small teams.
