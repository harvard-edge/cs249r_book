title: The CMSIS-DSP Buffer Overrun
scenario: You are using ARM's CMSIS-DSP library to compute an FFT on raw audio before feeding it to a TinyML model. You allocate an array `float audio_buffer[1024]`. You call `arm_cfft_f32()`. The function returns, but your program immediately crashes with a Hard Fault on the next line of code.
question: Why does `arm_cfft_f32()` HardFault after running on a `float[1024]` audio buffer?
details:
  realistic_solution: Ensure the buffer accounts for the real and imaginary parts. Allocate `float fft_buffer[2048]` (or 1024 complex pairs). Complex FFTs require 2N-element buffers in C libraries lacking implicit bounds checking.
  common_mistake: |
    **The Pitfall:** Assuming the array is too big for the stack.
    **The Rationale:** Candidates guess that a 4KB array blew the stack size limit, ignoring that this would crash *during* allocation, not after the function returns.
    **The Consequence:** Hunting for stack overflow issues instead of reading the CMSIS-DSP documentation, which states complex FFTs require 2N-element buffers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Audio Buffer: 1024 points (allocated as float[1024] = 4096 bytes).
    - CMSIS-DSP arm_cfft_f32() requires complex arrays (real + imaginary).

    **Calculations:**
    - Required Buffer: 1024 points * 2 (complex) * 4 bytes (float) = 8,192 bytes.
    - Deficit: 8,192 bytes - 4,096 bytes = 4,096 bytes of buffer overrun.

    **Conclusion & Interpretation:**
    - **Result: Silent 4 KB memory corruption (Memory-Safety-Bound)**. The crash is caused by missing bounds checking in the C DSP library.
