title: The CMSIS-DSP Buffer Overrun
scenario: You are using ARM's CMSIS-DSP library to compute an FFT (Fast Fourier Transform) on raw audio
  before feeding it to a TinyML model. You allocate an array `float audio_buffer[1024]` for the FFT. You
  call `arm_cfft_f32()`. The function returns, but your program immediately crashes with a Hard Fault
  on the next line of code. The FFT algorithm works perfectly. Why did it crash?
question: "Why does `arm_cfft_f32()` HardFault after running on a `float[1024]` audio buffer?"
details:
  realistic_solution: 'CMSIS-DSP''s arm_cfft_f32 operates on complex numbers — each sample needs real
    + imaginary parts. For 1024 points: 1024 * 2 (complex) * 4 bytes (float) = 8,192 bytes required. You
    allocated float[1024] = 4,096 bytes. The FFT writes 4KB beyond your buffer, corrupting adjacent stack
    or heap memory. The function itself completes successfully because it has no bounds checking. The
    corruption manifests on the next line when the program accesses the destroyed memory. Fix: allocate
    float fft_buffer[2048] (or 1024 complex pairs). Always read the CMSIS-DSP documentation — complex
    FFTs require 2N-element buffers.'
  common_mistake: '"The array is too big for the stack." 4KB is large for a stack, but it would crash
    *during* allocation, not after the FFT function returns.'
  napkin_math: 1024 points * 2 (complex) * 4 bytes = 8,192 bytes. You only allocated 4,096 bytes. The
    DSP library silently nuked exactly 4 KB of your adjacent application memory.
