title: PTQ vs QAT fallback on Ethos-U55
scenario: You are deploying a predictive maintenance CNN on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) system. The hardware features a 480 MHz M7 and an Ethos-U55 NPU capable of 256 MAC/cycle, both sharing a strict 512 KB of SRAM. Standard INT8 Post-Training Quantization (PTQ) drops accuracy unacceptably due to activation outliers. You must evaluate two alternatives: keep sensitive layers in FP32 on the M7, or use Quantization-Aware Training (QAT) with per-channel quantization to run exclusively on the U55.
question: Should Corstone-300 keep sensitive layers FP32 on the M7 or use full INT8 QAT for the Ethos-U55?
details:
  realistic_solution: Full INT8 QAT mapped entirely to the Ethos-U55 is the correct choice. The U55 natively supports per-channel quantization scales, meaning QAT can recover the accuracy without adding runtime overhead. Falling back to the M7 destroys the latency budget and thrashes the shared SRAM, as data must be converted and moved between the NPU's localized memory access patterns and the M7.
  common_mistake: |
    **The Pitfall:** Suggesting partial FP32 fallback to the CPU as a quick fix for accuracy drops.
    **The Rationale:** Candidates focus solely on model accuracy without accounting for the massive performance penalty of context switching and lack of hardware acceleration.
    **The Consequence:** The latency budget is destroyed by a 256x compute penalty, and the shared SRAM overflows due to 4x larger FP32 intermediate activations.
  napkin_math: |
    - **NPU INT8 Latency (1M MACs)**: 1,000,000 / 256 MACs/cycle = 3,906 cycles = 8.1 µs (at 480 MHz).
    - **CPU FP32 Latency (1M MACs)**: 1,000,000 / 1 MAC/cycle = 1,000,000 cycles = 2.08 ms.
    - **Latency Penalty**: 2.08 ms / 8.1 µs = **~256x slower**.
    - **Memory Penalty**: A 32x32x64 activation tensor takes 64 KB in INT8, but 256 KB in FP32, instantly consuming half of the **512 KB SRAM**.
