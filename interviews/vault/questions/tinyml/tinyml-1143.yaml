title: PTQ vs QAT fallback on Ethos-U55
scenario: 'You are deploying a predictive maintenance CNN on an ARM Cortex-M7 + Ethos-U55
  (Corstone-300) system. The hardware features a 480 MHz M7 and an Ethos-U55 NPU capable
  of 256 MAC/cycle, both sharing a strict 512 KB of SRAM. Standard INT8 Post-Training
  Quantization (PTQ) drops accuracy unacceptably due to activation outliers in several
  depthwise layers. You must evaluate two alternatives: 1) Keep the sensitive layers
  in FP32 and run them on the Cortex-M7, or 2) Implement Quantization-Aware Training
  (QAT) with per-channel quantization for the entire model to run exclusively on the
  U55. Which approach is better for this architecture and why?'
question: Should Corstone-300 keep sensitive layers FP32 on the M7 or use full INT8
  QAT for the Ethos-U55?
details:
  realistic_solution: Full INT8 QAT mapped entirely to the Ethos-U55 is the correct
    choice. The U55 natively supports per-channel quantization scales, meaning QAT
    can recover the accuracy without adding runtime overhead. Falling back to the
    M7 destroys the latency budget and thrashes the shared SRAM, as data must be converted
    and moved between the NPU's localized memory access patterns and the M7.
  common_mistake: Candidates often suggest the partial FP32 fallback as a quick fix,
    focusing only on accuracy. They fail to account for the massive performance penalty
    of context switching between the NPU and CPU, and the memory bloat of storing
    FP32 intermediate activations in the highly constrained shared SRAM.
  napkin_math: Consider a layer requiring 1,000,000 MACs. On the Ethos-U55 (256 MAC/cycle),
    it executes in ~3,906 cycles. At a system clock of 480 MHz, this is ~8.1 microseconds.
    If mapped to the M7 in FP32 (optimistically assuming 1 MAC/cycle with DSP extensions),
    it takes 1,000,000 cycles, or ~2.08 milliseconds. This is a 256x latency penalty
    for compute alone. Additionally, a modest 32x32x64 activation tensor in FP32 takes
    256 KB of memory, immediately consuming half of the 512 KB shared SRAM and likely
    causing an out-of-memory error, whereas the INT8 equivalent takes only 64 KB.
