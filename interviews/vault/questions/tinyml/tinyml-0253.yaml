title: The Microcontroller Ridge Point
scenario: You are evaluating a Cortex-M4 microcontroller for a real-time audio keyword-spotting task. According to its specs, it offers a peak performance of approximately 336 MFLOPS and has an on-chip SRAM bandwidth of 0.672 GB/s. To understand how to best utilize this chip, you need to determine its operational boundary between being memory-bound and compute-bound.
question: How would you calculate the 'ridge point' of this microcontroller's roofline model to find the minimum arithmetic intensity required to be compute-bound?
details:
  realistic_solution: The ridge point is the ratio of peak compute to peak memory bandwidth. For the Cortex-M4, this is 336 MFLOPS (or 0.336 GFLOPS) divided by 0.672 GB/s. This yields an arithmetic intensity of approximately 0.50 Ops/Byte. This low ridge point means that an operation only needs to perform slightly more than one operation for every two bytes it reads to become limited by compute. Most neural network layers have an arithmetic intensity higher than this (e.g., standard dense layers are >1 Ops/Byte), meaning that TinyML models are usually compute-bound on this MCU.
  common_mistake: |
    **The Pitfall:** Inverting the formula or mismatching units (e.g., dividing MFLOPS directly by GB/s without conversions).
    **The Rationale:** Candidates accustomed to GPU roofline models lazily apply the formula without ensuring the numerator and denominator share the same magnitude prefixes.
    **The Consequence:** Generating non-sensical arithmetic intensity thresholds that lead to misdiagnosed performance bottlenecks.
  napkin_math: |
    - Peak compute: 336 MFLOPS.
    - Peak SRAM bandwidth (32-bit bus at 168 MHz): 168M * 4 bytes = 0.672 GB/s.
    - Ridge point = 336 MFLOPS / 0.672 GB/s = **0.50 FLOPS/byte**.
    - Standard 3x3 conv (INT8): 18 FLOPs / 18 bytes = 1.0 FLOPS/byte > 0.50 = compute-bound.
    - Depthwise 3x3: 18 FLOPs / 10 bytes = 1.8 = compute-bound.
    - FC layer: 2 FLOPs / 2 bytes = 1.0 = compute-bound.
    - Element-wise add: 1 FLOP / 3 bytes = 0.33 = memory-bound.
  options:
  - 280 Ops/Byte
  - 3.57 Ops/Byte
  - 0.50 Ops/Byte
  - 2.24 Ops/Byte
  correct_index: 2
