title: 'TinyML TCO Design: Optimized Power Budget for Wearable TinyML'
scenario: 'Design a power budget and TCO model for a health monitoring wearable using a Cortex-M4: heart rate monitor, ECG classification, and BLE data sync. The battery is a 100mAh LiPo with a 7-day target life.'
question: Can a 100 mAh LiPo meet a 7-day wearable budget with a continuous 2 mA heart-rate sensor and 30-minute BLE syncs?
details:
  realistic_solution: 'Heart rate sensor: 2mA * 100% = 2mA avg. ECG classification: 168MHz at 30mA for 10ms every 300s = 30mA * 10ms/300s = 1mA avg. Wait — MCU at 168MHz ≈ 30mA active. ECG every 5min: 30mA*10ms/(5*60*1000ms) = 1mA/1000=0.001mA avg. Negligible! BLE sync: 20mA * 2s / (30*60s) = 20mA*2/1800=0.022mA avg. MCU sleep between operations: <1µA=0.001mA. Total avg: 2 (HR sensor) + 0.001 (ECG) + 0.022 (BLE) + 0.001 (MCU sleep) ≈ 2.024mA. Battery life: 100mAh / 2.024mA = 49.4 hours ≈ 2.06 days. NOT 7 days! Heart rate sensor dominates. Fix: pulse HR sensor at 30Hz but duty cycle 10% = 0.2mA avg. New total: 0.2+0.001+0.022+0.001=0.224mA. Battery life: 100/0.224=446hr=18.6 days > 7 days target.'
  common_mistake: |
    **The Pitfall:** Leaving analog sensors continuously powered instead of duty-cycling them.
    **The Rationale:** Candidates meticulously calculate the microamp savings of the MCU and ML inferences but ignore the massive static draw of the peripherals feeding the model.
    **The Consequence:** Creating a technically flawless TinyML pipeline attached to a sensor that drains the battery in 48 hours.
  napkin_math: |
    1. **Assumptions & Constraints:** 100mAh LiPo. Continuous HR sensor (2mA avg). ECG inference (1mA avg). BLE sync (0.022mA avg). MCU sleep (0.001mA avg). Target is 7 days (168 hours).
    2. **Calculations:** Total continuous avg current = 2.0 + 0.001 + 0.022 + 0.001 = 2.024 mA. Baseline battery life = 100 / 2.024 = 49.4 hours (2.06 days). Fix: Duty-cycle HR sensor to 10% = 0.2 mA avg. New total = 0.2 + 0.001 + 0.022 + 0.001 = 0.224 mA. Optimized battery life = 100 / 0.224 = 446.4 hours.
    3. **Conclusion & Interpretation:** **18.6 days life achieved only after duty-cycling the 2mA analog sensor** (Energy-Bound Peripherals).
