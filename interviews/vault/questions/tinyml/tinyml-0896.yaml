title: 'TinyML TCO Design: Optimized Power Budget for Wearable TinyML'
scenario: 'Design a power budget and TCO model for a health monitoring wearable using
  Cortex-M4 (168MHz, 256KB SRAM): heart rate monitor (continuous, 30Hz, 2mA sensor),
  ECG classification (every 5 minutes, 10ms inference at 168MHz), BLE data sync (every
  30 minutes, 20mA for 2s). Battery: 100mAh LiPo at 3.7V = 370mWh. Target: 7-day battery
  life. Calculate average current and verify feasibility.'
question: Can a 100 mAh LiPo meet a 7-day wearable budget with a 2 mA heart-rate sensor
  and 30-minute BLE syncs?
details:
  realistic_solution: 'Heart rate sensor: 2mA * 100% = 2mA avg. ECG classification:
    168MHz at 30mA for 10ms every 300s = 30mA * 10ms/300s = 1mA avg. Wait — MCU at
    168MHz ≈ 30mA active. ECG every 5min: 30mA*10ms/(5*60*1000ms) = 1mA/1000=0.001mA
    avg. Negligible! BLE sync: 20mA * 2s / (30*60s) = 20mA*2/1800=0.022mA avg. MCU
    sleep between operations: <1μA=0.001mA. Total avg: 2 (HR sensor) + 0.001 (ECG)
    + 0.022 (BLE) + 0.001 (MCU sleep) ≈ 2.024mA. Battery life: 100mAh / 2.024mA =
    49.4 hours ≈ 2.06 days. NOT 7 days! Heart rate sensor dominates. Fix: pulse HR
    sensor at 30Hz but duty cycle 10% = 0.2mA avg. New total: 0.2+0.001+0.022+0.001=0.224mA.
    Battery life: 100/0.224=446hr=18.6 days > 7 days target.'
  common_mistake: Adding peak currents from all components instead of calculating
    average current based on duty cycles, and not accounting for MCU sleep current
    between active periods.
  napkin_math: 'HR sensor: 2mA continuous=2mA. ECG: 30mA*0.01s/(5*60s)=0.001mA. BLE:
    20mA*2/(30*60)=0.0222mA. MCU idle: 0.001mA. Total: 2.024mA. Life: 100/2.024=49.4hr=2.06
    days. Failure! Fix: duty cycle HR sensor 10%: 2mA*0.1=0.2mA. New: 0.2+0.001+0.022+0.001=0.224mA.
    Life: 100/0.224=446hr=18.6 days ✓. TCO: Cortex-M4 dev kit ($10) + HR sensor ($3)
    + BLE module ($5) + LiPo ($5) = $23/unit. Battery replacement: never (18.6 day
    life, charged daily). Annual charging cost: 100mAh*3.7V*365=135Wh=$0.0135/yr.
    Negligible.'
