title: Dual-Core Operator Scheduling on Nordic nRF5340
scenario: You are deploying an anomaly detection model on a Nordic nRF5340 microcontroller (128 MHz app
  core, 64 MHz net core, 256 KB total SRAM). The system must maintain a continuous BLE 5.3 connection
  while running inferences within a ~5mA active power budget. The neural network contains two parallel
  convolutional branches that concatenate at the end. Evaluate how you would design the operator execution
  schedule to leverage the dual cores, apply layer fusion, and optimize memory reuse to fit within the
  strict SRAM limits.
question: "How would you evaluate how you would design the operator execution schedule to leverage the dual cores, apply layer fusion, and optimize memory reuse to fit within the strict SRAM limits?"
details:
  realistic_solution: 'The correct system-level decision is to isolate the BLE 5.3 stack and sensor DMA
    on the 64 MHz net core, ensuring radio stability. The 128 MHz app core should handle all ML operations
    to minimize active compute time and stay within the ~5mA budget. To solve the memory bottleneck, apply
    a depth-first operator schedule: compute Branch A entirely, fuse its output layers to shrink the intermediate
    tensor size, and only then compute Branch B. An in-place memory arena can then reuse Branch A''s freed
    activation SRAM for Branch B''s computations.'
  common_mistake: Candidates often propose offloading one ML branch to the 64 MHz net core for parallel
    execution, failing to realize the net core must be dedicated to the timing-critical BLE 5.3 stack.
    Additionally, they default to breadth-first topological scheduling, allocating SRAM for both branches
    simultaneously, which causes out-of-memory errors on memory-constrained devices.
  napkin_math: Total SRAM = 256 KB. BLE 5.3 stack + Net core RTOS = 64 KB. Sensor DMA buffers = 16 KB.
    Remaining App core SRAM = 176 KB. Branch A peak activation = 90 KB, Branch B peak activation = 80
    KB. Breadth-first schedule peak memory = 90 + 80 = 170 KB (leaving a dangerously low 6 KB for the
    app core RTOS). Depth-first schedule reduces Branch A to a 10 KB fused output before Branch B starts.
    New peak memory = max(90, 10 + 80) = 90 KB. This safely leaves 86 KB (176 - 90) for application state
    and dynamic heap.
