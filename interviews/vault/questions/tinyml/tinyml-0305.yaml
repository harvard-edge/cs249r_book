title: 'The Quantization Energy Dividend: MCU Compute Constraints'
scenario: You're profiling a keyword spotting model on a Cortex-M4 microcontroller and notice high battery
  drain. To reduce power consumption, you consider quantizing the model's operations from 32-bit floating-point
  (FP32) to 8-bit integer (INT8). From a hardware physics perspective, what is the approximate energy
  reduction per operation you should expect to gain?
details:
  realistic_solution: The energy savings are approximately 18x. The energy consumed by digital logic like
    multipliers and adders scales with the number of bits being processed. Moving from 32 bits down to
    8 bits drastically reduces the transistor switching activity for each operation, which is the primary
    source of dynamic power consumption. The 'Invariants' table in the playbook shows this physical relationship
    is stable.
  common_mistake: Engineers often confuse the energy savings with the memory footprint reduction. A model
    quantized from FP32 (4 bytes/param) to INT8 (1 byte/param) has a 4x smaller memory footprint, leading
    many to incorrectly assume the energy savings are also 4x. The actual energy savings are much higher
    because the switching energy in the ALU is directly related to bit width.
  napkin_math: This is a direct application of the 'FP32 vs INT8 energy' invariant. For every 18 joules
    spent on an FP32 operation, you only spend ~1 joule on the equivalent INT8 operation. This is a fundamental
    hardware efficiency gain, critical for power-constrained TinyML devices.
  options:
  - ~4×
  - ~2×
  - ~18×
  - Energy savings are negligible; it only affects memory size.
  correct_index: 2
