title: DMA Transfer Time vs Inference Time
scenario: Your TinyML audio classification system on a Cortex-M4F samples audio at 16 kHz (16-bit PCM)
  via I2S + DMA into a ping-pong buffer. Each buffer holds 1,024 samples (64ms of audio). The MFCC feature
  extraction takes 3ms and the DS-CNN inference takes 15ms. The DMA controller transfers data at the I2S
  clock rate. Can the system run in real-time without dropping audio samples, and what's the critical
  timing constraint?
question: "Can the system run in real-time without dropping audio samples, and what's the critical timing constraint?"
details:
  realistic_solution: 'Analyze the ping-pong buffer timing. 16 kHz: fill time = 64ms, process time = 18ms,
    utilization = 28%. 48 kHz: fill time = 21.3ms, process time = 18ms, utilization = 85% (danger zone).
    DMA bandwidth: 16 kHz × 2 bytes = 32 KB/s (trivial for the AHB bus). DMA bandwidth is trivial, but
    CPU must finish processing before the next buffer fills to avoid data loss.'
  common_mistake: '"DMA is automatic and free — just process the buffer when it''s full." DMA is indeed
    automatic (no CPU involvement during transfer), but the CPU must finish processing buffer A before
    DMA fills buffer B and wraps back to A. If processing takes longer than the fill time, you overwrite
    unprocessed data.'
  napkin_math: '16 kHz: fill time = 64ms, process time = 18ms, utilization = 28%. 48 kHz: fill time =
    21.3ms, process time = 18ms, utilization = 85% (danger zone). DMA bandwidth: 16 kHz × 2 bytes = 32
    KB/s (trivial for the AHB bus at ~100 MB/s). CPU utilization for processing: 18ms / 64ms = 28% at
    16 kHz. Remaining 72% available for other tasks (BLE communication, sensor fusion, housekeeping).
    Power impact: 28% active × 30 mW + 72% light sleep × 5 mW = 12 mW average. On a 225 mAh coin cell:
    225 × 3V / 12 = 56.25 hours = 2.3 days. Not viable for coin cell — need energy harvesting or a larger
    battery.'
  options:
  - The system cannot run in real-time because DMA and CPU share the AHB bus, and the 32 KB/s DMA transfer
    rate consumes most of the available bandwidth.
  - 'Yes, real-time is feasible. Fill time: 1024 samples / 16 kHz = 64ms. Process time: MFCC (3ms) + inference
    (15ms) = 18ms. Since 18ms < 64ms, the CPU finishes processing Buffer A before DMA fills Buffer B.
    CPU utilization: 28%. Critical constraint: process time must always be less than fill time. At 48
    kHz sampling (21.3ms fill), utilization rises to 85% — danger zone for jitter.'
  - The system drops samples because the I2S DMA transfer consumes 50% of the AHB bus bandwidth, leaving
    insufficient bandwidth for the CPU to access the tensor arena during inference.
  - Real-time is possible only if the MFCC feature extraction is offloaded to a hardware DSP accelerator,
    freeing the CPU to focus exclusively on the 15ms neural network inference.
  correct_index: 1
