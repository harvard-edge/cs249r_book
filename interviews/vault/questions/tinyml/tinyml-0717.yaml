title: DMA Transfer Time vs Inference Time
scenario: Your TinyML audio classification system on a Cortex-M4F samples audio at 16 kHz (16-bit PCM) via I2S + DMA into a ping-pong buffer. Each buffer holds 1,024 samples (64ms of audio). The MFCC feature extraction takes 3ms and the DS-CNN inference takes 15ms. The DMA controller transfers data at the I2S clock rate.
question: Can the system run in real-time without dropping audio samples, and what's the critical timing constraint?
details:
  realistic_solution: 'Analyze the ping-pong buffer timing. 16 kHz: fill time = 64ms, process time = 18ms. Since 18ms < 64ms, the CPU finishes processing Buffer A before DMA fills Buffer B. CPU utilization: 28%. Critical constraint: process time must always be less than fill time.'
  common_mistake: |
    **The Pitfall:** Believing DMA makes processing immune to real-time deadlines.
    **The Rationale:** Engineers assume "DMA is automatic and free" and forget the CPU must finish processing before the circular buffer overwrites.
    **The Consequence:** Unprocessed data is overwritten silently, causing audio dropouts and model degradation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sample rate: 16 kHz (64 ms per 1024 samples).
    - CPU Processing: 3 ms (MFCC) + 15 ms (CNN) = 18 ms.
    - Power profile: 225 mAh battery at 3V, active=30mW, sleep=5mW.

    **Calculations:**
    - CPU Utilization: 18 ms / 64 ms = 28%.
    - DMA bandwidth: 16 kHz * 2 bytes = 32 KB/s.
    - Average Power: (0.28 * 30 mW) + (0.72 * 5 mW) = 12 mW.
    - Battery Life: (225 mAh * 3V) / 12 mW = 56.25 hours.

    **Conclusion & Interpretation:**
    - **Result: 56 hours life (Power-Bound)**. The system meets the real-time deadline but is power-bound, requiring a larger battery for sustained deployments.
  options:
  - 'The system cannot run in real-time because DMA and CPU share the AHB bus, and the 32 KB/s DMA transfer rate consumes most of the available bandwidth.'
  - 'Yes, real-time is feasible. Fill time: 1024 samples / 16 kHz = 64ms. Process time: MFCC (3ms) + inference (15ms) = 18ms. Since 18ms < 64ms, the CPU finishes processing Buffer A before DMA fills Buffer B. CPU utilization: 28%. Critical constraint: process time must always be less than fill time. At 48 kHz sampling (21.3ms fill), utilization rises to 85% — danger zone for jitter.'
  - 'The system drops samples because the I2S DMA transfer consumes 50% of the AHB bus bandwidth, leaving insufficient bandwidth for the CPU to access the tensor arena during inference.'
  - 'Real-time is possible only if the MFCC feature extraction is offloaded to a hardware DSP accelerator, freeing the CPU to focus exclusively on the 15ms neural network inference.'
  correct_index: 1
