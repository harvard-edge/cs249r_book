title: Diagnosing Peak SRAM OOM on Nordic nRF5340
scenario: You are deploying an audio keyword spotting model to a Nordic nRF5340 microcontroller. The model
  weights take up 400 KB, which fits easily within the 1 MB flash. During initialization, the static memory
  planner allocates a flat tensor arena in the 256 KB SRAM. However, the system encounters a hard fault
  during the execution of a specific memory-intensive convolution layer despite the sum of all individual
  tensor sizes being much less than the total available SRAM. What is the root cause of this failure?
question: "Why does a Nordic nRF5340 HardFault on one convolution despite 400 KB weights fitting in flash and tensors summing under 256 KB?"
details:
  realistic_solution: The root cause is a peak memory spike exceeding the tensor arena capacity due to
    overlapping tensor lifetimes. During the convolution, the input tensor, output tensor, and a temporary
    scratch buffer must be concurrently resident in SRAM. The static memory planner calculates this peak
    offline, which failed to fit. To fix it, you analyze the planner's memory map to identify the bottleneck,
    then either reduce the layer's dimensions, use an operator that supports in-place updates, or shift
    network processing to the 64 MHz net core to free up app core SRAM.
  common_mistake: Candidates often assume that memory footprint is simply the sum of all activations,
    or they fail to account for temporary scratch buffers required by specific operations like CMSIS-NN
    convolutions. They might incorrectly suggest a dynamic memory leak, forgetting that TinyML frameworks
    use static arena allocation.
  napkin_math: 'Total nRF5340 SRAM = 256 KB. RTOS, BLE 5.3 stack, and app state use ~106 KB, leaving exactly
    150 KB for the tensor arena. At the bottleneck convolution layer: Input tensor = 40 KB, Output tensor
    = 40 KB. The CMSIS-NN im2col scratch buffer requires an additional 80 KB. Peak memory required = 40
    + 40 + 80 = 160 KB. 160 KB > 150 KB available arena, resulting in an OOM hard fault.'
