title: The Microcontroller's Memory Wall (tinyml-0386)
scenario: >
  On a typical microcontroller like a Cortex-M4, you need to determine if neural network operations are compute-bound or memory-bound.
question: >
  Are most neural network operations compute-bound or memory-bound, and what is the approximate Ridge Point in Ops/Byte?
details:
  realistic_solution: >
    Nearly all operations are compute-bound. A Cortex-M4 has a very low Ridge Point of approximately 0.28 Ops/Byte. This means a kernel only needs an arithmetic intensity of 0.28 FLOPs per byte to become bottlenecked by the CPU rather than memory. Since standard operations like a CONV2D layer easily achieve higher arithmetic intensity than this, they are almost always waiting on the CPU to finish calculating, not on data from SRAM.
  common_mistake: |
    **The Pitfall:** Assuming that deep learning is always memory-bound on MCUs just because SRAM is small.
    **The Rationale:** Engineers accustomed to cloud GPUs (which have high ridge points and hit memory walls easily) apply the same logic to microcontrollers.
    **The Consequence:** They optimize for the wrong bottleneck, focusing on memory bandwidth instead of CPU cycle efficiency.
  napkin_math: |
    - **Ridge Point Formula:** Ridge Point = Peak Performance / Memory Bandwidth.
    - **Hardware Specs:** Peak Performance = 336 MFLOPS. Memory Bandwidth = 1.2 GB/s.
    - **Calculation:** 336 MFLOPS / 1.2 GB/s ≈ **0.28 Ops/Byte**.
    - **Conclusion:** With such a low Ridge Point, operations only need an arithmetic intensity of 0.28 Ops/Byte to become **compute-bound**. Since standard CONV2D layers exceed this easily, they are wait on the CPU, not SRAM.
  options:
  - Compute-bound; neural networks always require massive FLOPs.
  - Memory-bound; the Ridge Point is high (~300 Ops/Byte), making it easy to hit the memory wall.
  - Compute-bound; the Ridge Point is extremely low (~0.28 Ops/Byte).
  - Neither; they are power-bound due to the low thermal budget, which makes performance secondary.
  correct_index: 2
