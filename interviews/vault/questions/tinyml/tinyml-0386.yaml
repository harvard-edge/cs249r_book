title: The Microcontroller's Memory Wall (tinyml-0386)
scenario: On a typical microcontroller like a Cortex-M4, you need to determine if neural network operations are compute-bound or memory-bound.
question: Are most neural network operations compute-bound or memory-bound, and what is the approximate Ridge Point in Ops/Byte?
details:
  realistic_solution: Nearly all convolutional and dense ML operations on embedded MCUs are intrinsically compute-bound. Because a Cortex-M4 has massive SRAM bandwidth relative to its sluggish ALU, the Ridge Point is an incredibly low ~0.28 Ops/Byte. Any standard operation easily exceeds this arithmetic intensity, ensuring the hardware bottleneck is almost always CPU execution cycles, not memory data supply.
  common_mistake: |
    **The Pitfall:** Assuming that deep learning is strictly memory-bound on MCUs simply because total SRAM capacity is small.
    **The Rationale:** Engineers accustomed to datacenter GPUs (which have high ridge points and hit memory walls rapidly) blindly project that same mental model to microcontrollers.
    **The Consequence:** They optimize for the wrong bottleneck, unnecessarily complicating memory access routines instead of maximizing compute MAC utilization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak M4 Compute: 336 MFLOPS.
       - Peak M4 Memory Bandwidth: 1.2 GB/s.
    2. **Calculations:**
       - Ridge Point = Compute / Bandwidth.
       - Ridge Point = 336e6 Ops / 1.2e9 Bytes = 0.28 Ops/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Execution**. Operations only require an intensity of 0.28 Ops/Byte to stall the CPU. Standard convolutions easily clear this, making them compute-bound.
  options:
  - Compute-bound; neural networks inherently demand 10+ MFLOPS making memory irrelevant.
  - Memory-bound; the Ridge Point is roughly 300 Ops/Byte, forcing regular SRAM pipeline stalls.
  - Compute-bound; the Ridge Point is extremely low at ~0.28 Ops/Byte.
  - Neither; they are strictly thermal-bound due to missing heatsinks.
  correct_index: 2
