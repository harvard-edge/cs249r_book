title: The Concurrent Wake-Word Crisis
scenario: You are the tech lead for a smart home device featuring a keyword spotting (KWS) system on a Cortex-M4 MCU with 256KB of SRAM and 1MB of Flash. The system reliably detects 'Hey Lumi'. It uses DMA to feed a double-buffer of 16-bit, 16kHz audio into an MFCC pipeline, which feeds the KWS model. The product team wants to run a second TinyML model concurrently.
question: How should the scheduler and tensor arenas be designed so two TinyML models can run without additive SRAM residency?
details:
  realistic_solution: The core insight is that 'concurrent' on a single-core MCU means time-slicing, not true parallelism. The two models don't need their Tensor Arenas resident in SRAM at the *exact same time*. A robust solution is to re-architect the inference scheduler.
  common_mistake: |
    **The Pitfall:** Assuming memory requirements for multiple models are strictly additive.
    **The Rationale:** Engineers from larger systems assume both models must be fully resident in memory at all times, summing their sizes.
    **The Consequence:** Concluding the 256KB SRAM is insufficient and demanding a hardware upgrade, failing the core engineering constraint.
  napkin_math: |
    - **KWS Arena:** ~20 KB. Second Model Arena: ~30 KB.
    - **Concurrent Naive Total:** 20 KB + 30 KB = 50 KB.
    - **System Overhead:** DMA audio buffer (7.7 KB) + MFCC scratch (4 KB) + Stack (2 KB) = 13.7 KB.
    - **Sequential (Time-Sliced) Arena:** Max(20 KB, 30 KB) = 30 KB.
    - **Sequential Total:** 30 KB + 13.7 KB = 43.7 KB.
    - **Conclusion:** **Time-slicing the models and sharing a single tensor arena saves 20 KB of SRAM, allowing both models to run easily.**
