title: The Concurrent Wake-Word Crisis
scenario: You are the tech lead for a smart home device featuring a keyword spotting (KWS) system on a
  Cortex-M4 MCU with 256KB of SRAM and 1MB of Flash. The system reliably detects 'Hey Lumi'. It uses DMA
  to feed a double-buffer of 16-bit, 16kHz audio into an MFCC pipeline, which then feeds the KWS model.
  The current SRAM consumption is stable.
question: "How should the scheduler and tensor arenas be designed so two TinyML models can run without additive SRAM residency?"
details:
  realistic_solution: The core insight is that 'concurrent' on a single-core MCU means time-slicing, not
    true parallelism. The two models don't need their Tensor Arenas resident in SRAM at the *exact same
    time*. A robust solution is to re-architect the inference scheduler.
  common_mistake: 'Engineers from larger systems assume memory requirements are simply additive. They
    will sum the sizes of the two Tensor Arenas, conclude the 256KB SRAM is insufficient, and declare
    the request impossible without a hardware upgrade. This violates the core constraint and misses the
    central challenge of TinyML engineering: creative optimization under extreme scarcity. Another common
    mistake is to focus only on model size (Flash), ignoring the runtime activation memory (SRAM) which
    is the actual bottleneck.'
  napkin_math: 'KWS arena: ~20KB typical. Second model arena: ~30KB. If concurrent: 50KB. But 256KB SRAM
    also holds: audio DMA double-buffer (2×3.84KB=7.7KB), MFCC scratch (~4KB), stack (~2KB). Available:
    256-14≈242KB. Sequential arenas: max(20,30)=30KB + shared buffers = 44KB total. Saves 20KB vs concurrent.
    Time-slice: KWS runs in <50ms, second model in remaining 950ms of 1s cycle.'
