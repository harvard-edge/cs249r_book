title: The Concurrent Wake-Word Crisis
scenario: >
  You are the tech lead for a smart home device featuring a keyword spotting (KWS) system on a Cortex-M4 MCU. The KWS model reliably detects 'Hey Lumi' using DMA to feed a double-buffer of 16-bit, 16kHz audio into an MFCC pipeline. The product team wants to run a second TinyML model concurrently.
question: How should the scheduler and tensor arenas be designed so two TinyML models can run without additive SRAM residency?
details:
  realistic_solution: >
    The core insight is that 'concurrent' on a single-core MCU means time-slicing, not true parallelism. The two models don't need their Tensor Arenas resident in SRAM at the exact same time. The robust architectural solution is an orchestrated inference scheduler that shares a single, persistent tensor arena, dynamically re-initializing the model pointers based on the active time-slice, effectively taking the `Max(Arena_A, Arena_B)` instead of their sum.
  common_mistake: |
    **The Pitfall:** Assuming memory requirements for multiple models are strictly additive.
    **The Rationale:** Engineers from larger systems assume both models must be fully resident in memory at all times, summing their sizes.
    **The Consequence:** Concluding the 256KB SRAM is insufficient and demanding a hardware upgrade, failing the core engineering constraint.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total SRAM: 256 KB. KWS Arena: 20 KB. Second Model Arena: 30 KB.
       - System Overhead: DMA buffer (7.7 KB) + MFCC (4 KB) + Stack (2 KB) = 13.7 KB.
    2. **Calculations:**
       - Concurrent Naive Total: 20 KB + 30 KB + 13.7 KB = 63.7 KB.
       - Time-Sliced Arena Requirement: Max(20 KB, 30 KB) = 30 KB.
       - Shared Arena Total: 30 KB + 13.7 KB = 43.7 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Saves 20 KB of SRAM.** Time-slicing the models and sharing a single tensor arena allows both models to run efficiently. **Bottleneck: SRAM Residency.**
