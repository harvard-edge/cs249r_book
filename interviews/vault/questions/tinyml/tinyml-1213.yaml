title: Ethos-U55 Compute Utilization and Bottleneck Analysis
scenario: You are deploying an audio processing CNN on a Corstone-300 subsystem featuring
  a 480 MHz ARM Cortex-M7 and an Ethos-U55 NPU (configured for 256 MAC/cycle), sharing
  512 KB of SRAM. A specific convolutional block requires 24 million MAC operations,
  but profiling reveals it takes a full 10 ms to execute. You discover that because
  the intermediate feature maps exceed the 512 KB shared SRAM, the NPU is constantly
  stalled waiting for DMA transfers from slower external memory. Diagnose this compute
  utilization bottleneck and quantify the expected inference latency if the feature
  maps are optimized to fit entirely within the on-chip SRAM.
question: How would you diagnose this compute utilization bottleneck and quantify
  the expected inference latency if the feature maps are optimized to fit entirely
  within the on-chip SRAM?
details:
  realistic_solution: The correct approach calculates the theoretical peak latency
    to determine the actual NPU utilization, identifying the massive discrepancy caused
    by memory stalls. The engineer should propose an optimization like INT8 quantization,
    operator fusion, or SRAM tiling to ensure the working set stays within the 512
    KB SRAM. Once the data fits in SRAM, the compute becomes purely bounded by the
    NPU MAC throughput, and latency can be re-estimated using a realistic hardware
    utilization factor.
  common_mistake: Candidates often calculate latency by simply dividing the total
    MACs by the NPU's peak MACs/cycle, ignoring memory bandwidth constraints and the
    512 KB SRAM limit. They fail to realize that the Ethos-U55's massive compute throughput
    can only be sustained when weights and activations reside in the shared on-chip
    SRAM, and falling back to external memory causes severe utilization drops.
  napkin_math: '1. Peak NPU throughput: 256 MAC/cycle * 480 MHz = 122.88 billion MAC/sec
    (or 122.88 million MAC/ms).

    2. Theoretical minimum latency: 24M MACs / 122.88M MAC/ms = ~0.195 ms.

    3. Current NPU utilization: 0.195 ms (theoretical) / 10.0 ms (actual) = ~1.95%.

    4. Quantify the fix: If optimizations keep data in the 512 KB SRAM, memory stalls
    are removed. Assuming a realistic 50% sustained NPU utilization, the optimized
    compute latency is 0.195 ms / 0.5 = ~0.39 ms, resulting in a 25x latency reduction.'
