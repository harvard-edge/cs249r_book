title: Ethos-U55 Compute Utilization and Bottleneck Analysis
scenario: You are deploying an audio processing CNN on a Corstone-300 subsystem featuring a 480 MHz ARM Cortex-M7 and an Ethos-U55 NPU (configured for 256 MAC/cycle), sharing 512 KB of SRAM. A specific convolutional block requires 24 million MAC operations, but profiling reveals it takes a full 10 ms to execute. You discover that because the intermediate feature maps exceed the 512 KB shared SRAM, the NPU is constantly stalled waiting for DMA transfers from slower external memory.
question: How would you quantify the compute utilization bottleneck and the expected latency if the feature maps are optimized to fit entirely within SRAM?
details:
  realistic_solution: The correct approach calculates the theoretical peak latency to determine the actual NPU utilization, identifying the massive discrepancy caused by memory stalls. The engineer should propose an optimization like INT8 quantization, operator fusion, or SRAM tiling to ensure the working set stays within the 512 KB SRAM. Once the data fits in SRAM, the compute becomes purely bounded by the NPU MAC throughput, and latency can be re-estimated using a realistic hardware utilization factor.
  common_mistake: |
    **The Pitfall:** Calculating latency purely based on MAC throughput while ignoring memory bandwidth.
    **The Rationale:** Candidates divide total MACs by peak MACs/cycle, failing to realize the massive performance drop caused by spilling over the 512 KB shared SRAM into external memory.
    **The Consequence:** Vastly underestimating inference latency and failing to meet real-time constraints.
  napkin_math: |
    - **Peak NPU Throughput:** 256 MAC/cycle * 480 MHz = 122.88 million MAC/ms.
    - **Theoretical Minimum Latency:** 24M MACs / 122.88M MAC/ms = ~0.195 ms.
    - **Current NPU Utilization:** 0.195 ms / 10.0 ms = **~1.95%**.
    - **Optimized Latency (SRAM fit):** Assuming 50% sustained utilization, 0.195 ms / 0.5 = **~0.39 ms** (a ~25x latency reduction).
