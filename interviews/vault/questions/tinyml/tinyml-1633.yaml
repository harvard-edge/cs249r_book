title: DVFS Energy Optimization
scenario: A wearable runs a CNN on Cortex-M4. Active power is 20mW (50ms duration),
  sleep is 5uW. Total cycle is 1 second.
question: Formulate an optimized duty-cycling plan to reduce the active compute energy,
  evaluating if doubling clock frequency (25ms duration at 45mW) helps.
visual:
  kind: svg
  path: tinyml-1633.svg
  alt: Bar chart comparing 1mJ base energy vs 1.125mJ high-frequency energy
  caption: 'Energy Comparison: Base vs High Frequency'
details:
  realistic_solution: Original active energy = 20mW * 0.05s = 1mJ. New active energy
    = 45mW * 0.025s = 1.125mJ. Doubling frequency increases total energy because power
    scales non-linearly with voltage/frequency.
  common_mistake: Assuming running twice as fast halves the energy without checking
    the nonlinear power penalty.
  napkin_math: 1.125mJ > 1.0mJ, so DVFS hurts here.
