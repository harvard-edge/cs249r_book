title: Burst Handling and Queue Overflow on ESP32-S3
scenario: An ESP32-S3 (240MHz, 512KB SRAM, 8MB PSRAM) processes audio keyword detection at 10 inferences/s
  normally, but bursty noise events arrive at 50/s for 200ms bursts. Each inference takes 80ms. Design
  a queuing strategy to handle bursts without losing critical events.
details:
  realistic_solution: 'During burst: λ=50/s, μ=12.5/s → ρ=4, unstable. Queue grows at 37.5 items/s during
    200ms burst → accumulates 7-8 events. After burst (λ=10/s, μ=12.5/s, ρ=0.8), drain time ≈ 8 events
    / (2.5 items/s drain rate) ≈ 3.2s. Strategy: (1) cap queue at 8 items using PSRAM (8MB easily holds
    1000 items), (2) use priority queue — keep only highest-confidence partial events during overload,
    (3) implement token bucket to limit effective λ to 15/s.'
  common_mistake: Using a simple FIFO queue and assuming the burst will drain; ignoring that 50/s × 80ms/inference
    = 4 server-loads during burst.
  napkin_math: 'Burst: 50/s × 200ms = 10 events arrive, 12.5×0.2=2.5 processed → 7.5 queued. Drain at
    ρ=0.8: net drain rate=12.5-10=2.5/s → 3s to drain. 8 events × ~2KB/event = 16KB PSRAM needed.'
