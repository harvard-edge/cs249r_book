title: Sub-4-bit Quantization Specification for nRF5340 Audio Model
scenario: You are tasked with deploying a continuous audio event classification model on a Nordic nRF5340. The baseline float32 model has 1.2 million parameters and peak float32 activations of 600 KB. The system must run concurrently with the BLE 5.3 stack.
question: How should you specify sub-4-bit weights and INT8 activations so a 1.2M-parameter nRF5340 audio model fits flash and SRAM?
details:
  realistic_solution: The correct specification applies an advanced mixed-precision or Top-K Sparsification technique combined with extreme quantization like AWQ or GPTQ to the weights, reducing them to an average of 3 bits per parameter, and quantizes activations to INT8. The design must explicitly partition the flash to leave room for the BLE stack and application code, and similarly partition the SRAM to ensure the INT8 activations do not trigger out-of-memory (OOM) errors during context switching.
  common_mistake: |
    **The Pitfall:** Suggesting standard uniform 8-bit quantization for weights and forgetting OS memory overhead.
    **The Rationale:** Candidates assume INT8 is always sufficient and treat the entire memory footprint as available strictly for the ML model.
    **The Consequence:** The model weights require 1.2 MB (exceeding the 1 MB flash limit) and activation buffers overflow the remaining SRAM.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline weights: 1.2M params * 4 bytes = 4.8 MB.
       - Flash available: 1 MB total - 300 KB (RTOS + BLE) = 700 KB.
       - Max weight bit-width: (700 KB * 1024 * 8 bits) / 1,200,000 params = 4.77 bits/param.
       - SRAM available: 256 KB total - 64 KB (OS/BLE) = 192 KB.
    2. **Calculations:**
       - Specifying 3-bit average weight quantization: 1.2M * 3 / 8 = 450 KB (fits safely in flash).
       - Quantizing activations to INT8 reduces peak from 600 KB to 150 KB.
    3. **Conclusion & Interpretation:**
       - **150 KB activations < 192 KB available SRAM, satisfying the memory limits. Result: Memory-Bound.**
