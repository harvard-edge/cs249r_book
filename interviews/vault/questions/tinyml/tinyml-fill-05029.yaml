title: Duty Cycling Strategy for Battery Life on Cortex-M4 Wearable
scenario: A wearable device uses Cortex-M4 at 168MHz (50mW active) for fall detection. The accelerometer
  samples at 100Hz. Each inference takes 10ms and consumes 0.5mJ. The device has a 300mAh battery at 3.7V.
  Without duty cycling, the device runs inference at 10Hz (every 100ms). Calculate battery life and propose
  a duty cycling strategy for 7-day operation.
details:
  realistic_solution: 'Current inference rate: 10 inferences/sec. Energy per inference: 0.5mJ. Inference
    power: 10 × 0.5mJ/s = 5mW. Sleep power (Cortex-M4 stop mode): ~0.5mW. Accelerometer active: ~0.1mA
    × 3.7V = 0.37mW. Total active: ~10mW (including peripherals). Battery: 300mAh × 3.7V = 1.11Wh = 3996J.
    Current life: 3996J / (10mW × 3600s/hr) = 111 hours ≈ 4.6 days. Target: 7 days = 168 hours. Required
    power: 3996J / (168 × 3600) = 6.6mW. Duty cycle: run inference 1Hz instead of 10Hz = save 4.5mW inference.
    New power: 5.5mW → 202 hours = 8.4 days. Add wake-on-motion: sleep at 0.5mW, wake only on motion threshold
    → average ~1mW → 40+ days.'
  common_mistake: Calculating only inference energy without including the sleep-mode wake-up overhead
    and the sensor/radio power draw that may dominate over inference cost.
  napkin_math: 'Battery: 300mAh × 3.7V = 1.11Wh. 10Hz inference: ~10mW → 4.6 days. 1Hz inference: ~5.5mW
    → 8.4 days (goal met). Wake-on-motion: ~1mW average → 46 days. Strategy: reduce inference rate to
    1Hz + wake-on-motion trigger.'
