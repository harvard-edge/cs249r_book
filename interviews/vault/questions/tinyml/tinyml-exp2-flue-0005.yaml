title: ESP32-S3 Tensor Arena Sizing with WiFi
scenario: You are deploying an INT8 keyword spotting model onto an ESP32-S3 microcontroller. The system
  runs FreeRTOS with the WiFi and BLE stacks active, which consumes a fixed 280 KB of the internal SRAM.
  The model requires a peak intermediate activation buffer of 128 KB, 16 KB for input/output buffers,
  and an additional 24 KB of scratchpad memory for the INT8 vector extension operators. Calculate the
  required size of the flat tensor arena and determine if it can be allocated entirely in the internal
  SRAM.
details:
  realistic_solution: The correct approach is to calculate the available internal SRAM by subtracting
    the system overhead from the total capacity, and then sum the peak memory requirements to size the
    flat tensor arena. Because the required arena size fits within the remaining internal SRAM, it should
    be allocated entirely in internal memory (avoiding PSRAM) to ensure the Xtensa vector extensions run
    at peak performance without memory stalls.
  common_mistake: Candidates often forget to account for the substantial SRAM footprint of the WiFi/BLE
    stacks and RTOS, assuming the full 512 KB SRAM is available for the model. They might also incorrectly
    suggest placing the tensor arena in the 8 MB PSRAM to save space, which would drastically degrade
    inference latency due to cache misses and slower bus speeds.
  napkin_math: Total ESP32-S3 SRAM = 512 KB. System Overhead = 280 KB. Available SRAM = 512 KB - 280 KB
    = 232 KB. Required Tensor Arena = Peak Activations (128 KB) + I/O Buffers (16 KB) + Scratchpad (24
    KB) = 168 KB. Since 168 KB <= 232 KB, the arena fits completely in internal SRAM with 64 KB of headroom.
