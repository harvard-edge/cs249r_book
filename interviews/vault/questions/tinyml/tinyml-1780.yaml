title: 'Evaluating OTA Payload Limits for Firmware'
scenario: 'An audio wake-word model requires over-the-air (OTA) updates on a fleet of Cortex-M4 smart speakers with 1MB of total Flash.'
question: 'What are the trade-offs of A/B partitioned firmware updates versus dynamically loadable neural network blob updates?'
details:
  realistic_solution: 'A/B firmware updates require partitioning the 1MB flash into two 500KB halves, reducing space but ensuring system rollback. Dynamically loadable blobs (like TFLite FlatBuffers) only update the 100KB model file, drastically saving bandwidth and Flash space, but risk breaking if the underlying runtime changes.'
  common_mistake: |
    **The Pitfall:** Assuming OTA updates always require full OS flashing.
    **The Rationale:** Candidates ignore the fact that separating the model file from the firmware dramatically reduces the OTA payload size.
    **The Consequence:** OTA updates consume excessive bandwidth and time, potentially exceeding the flash storage limits or causing fleet-wide update failures.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1 MB total Flash.
    - Firmware A/B partition needs two 500 KB halves.
    - Model blob is 100 KB.

    **Calculations:**
    - A/B Firmware Payload = 500 KB.
    - Dynamic Blob Payload = 100 KB.

    **Conclusion & Interpretation:**
    - **Result: 100 KB dynamic blob (Memory-Bound)**. Requires 5x less bandwidth and flash space than the 500 KB firmware partition.
