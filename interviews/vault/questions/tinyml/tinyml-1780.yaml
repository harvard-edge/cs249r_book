title: Evaluating OTA Payload Limits for Firmware
scenario: An audio wake-word model requires over-the-air (OTA) updates on a fleet
  of Cortex-M4 smart speakers with 1MB of total Flash.
question: Evaluate the trade-offs of A/B partitioned firmware updates versus dynamically
  loadable neural network blob updates.
details:
  realistic_solution: A/B firmware updates require partitioning the 1MB flash into
    two 500KB halves, reducing space but ensuring system rollback. Dynamically loadable
    blobs (like TFLite FlatBuffers) only update the 100KB model file, drastically
    saving bandwidth and Flash space, but risk breaking if the underlying runtime
    changes.
  common_mistake: Assuming OTA updates always require full OS flashing, ignoring that
    separating the model file dramatically reduces the payload.
  napkin_math: 100KB blob < 500KB firmware partition
