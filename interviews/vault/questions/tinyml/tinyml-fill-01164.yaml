title: Designing Robust OTA Updates for TinyML on Resource-Constrained STM32F4
scenario: You are tasked with designing a firmware over-the-air (OTA) update mechanism for a TinyML application
  deployed on an ARM Cortex-M4 STM32F4 microcontroller. This device operates at 168 MHz, has 256 KB of
  SRAM, and lacks an FPU. The TinyML model consumes 80KB of flash and requires 40KB of SRAM for inference.
  Your solution must ensure system reliability, minimize downtime during updates, and provide a robust
  rollback mechanism in case of update failures. Describe the architecture, considering flash programming
  constraints and an A/B partition scheme. What are the key challenges and how would you address them?
question: "How should an STM32F4 OTA design use A/B partitions and rollback for an 80 KB TinyML model?"
details:
  realistic_solution: Implement an A/B partition scheme where two identical application partitions reside
    in flash memory. A small, secure bootloader (residing in a protected boot block) is responsible for
    validating and booting from either partition. During an OTA update, the new firmware is downloaded
    to the inactive partition. Before switching, the bootloader performs integrity checks (e.g., CRC,
    digital signature verification). Upon successful validation, the bootloader updates a flag to switch
    to the new partition. If the new firmware fails to boot or a watchdog timer expires, the bootloader
    automatically reverts to the previously working partition (rollback). Flash programming constraints
    (like erase block sizes and write times) must be carefully managed to ensure atomic updates and minimize
    corruption risk. Memory mapping should reserve enough space for two application images, a staging
    area for downloads, and the bootloader.
  common_mistake: Overlooking flash endurance limitations and failing to account for the memory footprint
    of the update images, bootloader, and rollback images, leading to insufficient space or premature
    device failure. Another common mistake is not properly securing the update process, making the device
    vulnerable to malicious firmware injections.
  napkin_math: Given 256 KB SRAM, 40KB for model inference leaves 216KB. If a new firmware image is 80KB,
    plus an additional 10KB for OTA update logic and buffer, the total SRAM needed for update operation
    (download buffer, validation) might be around 90-100KB, which fits within the remaining SRAM. Flash
    memory must accommodate at least two 80KB application images (160KB total) plus bootloader (~32KB)
    and potentially a staging area, so a device with at least 256KB-512KB of flash is required for practical
    A/B updates.
