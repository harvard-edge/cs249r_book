title: Federated Learning on Resource-Constrained BLE Devices
scenario: You are designing a federated learning system for wearable sensors using a Nordic nRF5340 SoC (128 MHz Arm Cortex-M33, 1MB flash, 64KB RAM). The devices collect continuous physiological data and aggregate anomaly detection model updates over BLE without centralizing raw data.
question: Outline a concrete architecture and strategy to implement federated averaging given the strict 64KB RAM and BLE communication constraints.
details:
  realistic_solution: Utilize aggressive INT8 quantization, Federated Dropout, or Parameter-Efficient Fine-Tuning (PEFT) to compress model updates. Transfer sparse matrices over BLE using difference-based compression to minimize radio-on time and preserve battery.
  common_mistake: |
    **The Pitfall:** Deploying standard FP32 models and full gradient syncs over BLE.
    **The Rationale:** Engineers port cloud-based federated learning approaches without adjusting for edge physical constraints, assuming floating-point math and massive gradient transfers are viable.
    **The Consequence:** The training process triggers an Out-Of-Memory (OOM) fault immediately or rapidly exhausts the battery due to prolonged BLE radio usage.
  napkin_math: |
    **Assumptions & Constraints:**
    - RAM: 64 KB limit. BLE throughput: ~150 kbps.
    - FP32 parameters: 8 bytes (weight + gradient). INT8: 2 bytes.

    **Calculations:**
    - FP32 parameter limit: 65,536 bytes / 8 = ~8,192 parameters.
    - INT8 parameter limit: 65,536 bytes / 2 = ~32,768 parameters.
    - BLE transfer time (16 KB INT8 update): (16,384 * 8 bits) / 150,000 bps = ~0.87 seconds.

    **Conclusion & Interpretation:**
    - **Result: Max 32K parameters in INT8 (Memory-Capacity-Bound)**. The system is deeply memory-capacity-bound and bandwidth-bound. Quantization and sparse updates are mandatory to make local training feasible.
