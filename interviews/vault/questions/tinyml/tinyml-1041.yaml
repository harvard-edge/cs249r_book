title: BatchNorm Constant Folding Flash Savings
scenario: You are deploying a predictive maintenance CNN on the Nordic nRF5340 (128
  MHz app core, 256 KB SRAM, 1 MB flash, ~5mA active). The unoptimized model graph
  contains 8 Convolutional layers, each followed by a Batch Normalization layer with
  64 channels. All parameters are stored as 32-bit floats. During graph compilation,
  the AOT compiler performs constant folding, merging the BatchNorm operations into
  the Convolutional weights and biases. Calculate the exact amount of Flash memory
  saved by this optimization, and determine what fraction of the nRF5340's total 1
  MB Flash this represents.
question: How would you calculate the exact amount of Flash memory saved by this optimization,
  and determine what fraction of the nRF5340's total 1 MB Flash this represents?
details:
  realistic_solution: The correct approach identifies that constant folding eliminates
    the need to store the 4 BatchNorm parameters (mean, variance, gamma, beta) per
    channel by pre-computing the folded weights and biases into the preceding convolution.
    The candidate should systematically multiply the layers, channels, and bytes-per-parameter
    to find the total byte savings, and then divide by the 1 MB capacity to find the
    fraction.
  common_mistake: Candidates often forget that BatchNorm requires 4 distinct parameters
    per channel, or they incorrectly calculate the byte size by assuming 8-bit parameters
    instead of 32-bit floats. They may also struggle to accurately compute the fractional
    savings against the 1 MB flash constraint.
  napkin_math: '1. Parameters per channel = 4 (mean, variance, gamma, beta).

    2. Bytes per channel = 4 parameters * 4 bytes (float32) = 16 bytes.

    3. Total channels = 8 layers * 64 channels = 512 channels.

    4. Total Flash saved = 512 channels * 16 bytes = 8,192 bytes (8 KB).

    5. nRF5340 Total Flash = 1 MB = 1,024 KB.

    6. Fraction of Flash saved = 8 KB / 1,024 KB = 1/128 (or ~0.78%).'
