title: Calculate End-to-End Wake Word Pipeline Latency
scenario: You are deploying a quantized INT8 keyword spotting model on an ARM Cortex-M4 (STM32F4) microcontroller with 256 KB SRAM and 1 MB flash. The MCU runs at 168 MHz and lacks an FPU, but features CMSIS-NN SIMD instructions capable of executing 2 INT8 MACs per clock cycle. The end-to-end pipeline requires 8 ms for MFCC audio preprocessing and 1 ms for post-processing. If the neural network requires exactly 1,680,000 MAC operations per inference, calculate the theoretical minimum end-to-end latency for a single audio frame assuming 100% MAC utilization.
question: What is the theoretical end-to-end STM32F4 wake-word latency including MFCC, inference, and post-processing?
details:
  realistic_solution: The correct approach decomposes the pipeline into its distinct stages and sums their latencies. For the inference stage, the hardware throughput must be calculated by multiplying the clock rate by the SIMD MAC operations per cycle. The theoretical minimum inference time is then derived and added to the fixed peripheral processing times to establish the final end-to-end latency.
  common_mistake: |
    **The Pitfall:** Forgetting the SIMD throughput multiplier or ignoring non-inference pipeline stages.
    **The Rationale:** Candidates often treat an INT8 MAC as 1 cycle and focus purely on the neural network, neglecting the fixed preprocessing latency.
    **The Consequence:** The calculated end-to-end latency is drastically incorrect, leading to faulty system requirements and missed real-time deadlines.
  napkin_math: |
    1. MCU Clock: 168 MHz = 168,000,000 cycles/sec.
    2. MAC Throughput: 168,000,000 cycles/sec × 2 INT8 MACs/cycle = 336,000,000 MACs/sec.
    3. Inference Latency: 1,680,000 MACs / 336,000,000 MACs/sec = 0.005 seconds = 5 ms.
    4. Total Latency: 8 ms (MFCC) + 5 ms (inference) + 1 ms (post-processing) = **14 ms**.
