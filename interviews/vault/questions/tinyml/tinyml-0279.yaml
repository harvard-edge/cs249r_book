title: 'The Microcontroller''s Ridge Point: MCU Compute Constraints'
scenario: You're evaluating a Cortex-M4 microcontroller for a keyword spotting application. To understand
  its performance characteristics, you need to create a simple roofline model. The Cortex-M4 has a peak
  compute throughput of ~336 MFLOPS (running at 168 MHz with single-cycle MAC) and an SRAM bandwidth of
  ~1.2 GB/s. What is the 'ridge point' of this MCU? The ridge point tells you the minimum arithmetic intensity
  (Operations per Byte) a model needs to be compute-bound rather than memory-bound.
question: "What ridge point do 336 MFLOPS and 1.2 GB/s SRAM bandwidth imply for a Cortex-M4 KWS roofline?"
details:
  realistic_solution: 'The ridge point is the ratio of the processor''s peak compute performance to its
    peak memory bandwidth. For the Cortex-M4, the peak compute is ~336 MFLOPS and the SRAM bandwidth is
    ~1.2 GB/s. To find the ridge point, divide the compute by the bandwidth: 336M / 1.2G = 0.28 Ops/Byte.
    Because most ML operations have an arithmetic intensity far greater than 0.28 (e.g., standard convolutions),
    almost any model deployed on this MCU will hit the compute ceiling before saturating the memory bus.
    This extremely low ridge point demonstrates that this microcontroller is massively compute-bound.'
  common_mistake: 'A common mistake is inverting the ratio (dividing bandwidth by compute) or failing
    to normalize the units (e.g., dividing MFLOPS directly by GB/s). This shows a misunderstanding of
    what arithmetic intensity represents: how many operations you can perform for each byte of data you
    move from memory.'
  napkin_math: '1. Get Peak Compute: 336 MFLOPS = 336,000,000 FLOPS = 3.36 × 10^8 FLOPS. 2. Get Peak Bandwidth:
    1.2 GB/s = 1,200,000,000 B/s = 1.2 × 10^9 B/s. 3. Calculate Ridge Point: Ridge Point = Peak Compute
    / Peak Bandwidth = 3.36 × 10^8 / 1.2 × 10^9 = 0.28 Ops/Byte. 4. Interpretation: The ridge point of
    0.28 Ops/Byte is extremely low, meaning models with arithmetic intensity > 0.25 Ops/Byte (the ridge
    point) will be compute-bound. Many TinyML operations (depthwise conv, pointwise conv with few channels,
    fully connected layers with small batch size) have AI < 1 Ops/Byte and may be memory-bound depending
    on implementation. This is characteristic of microcontrollers: their memory bandwidth (SRAM) is relatively
    generous compared to their limited compute. This is the opposite of GPU systems, where the ridge point
    is very high and models are often memory-bound.'
  options:
  - ~3.57 Ops/Byte
  - ~280 Ops/Byte
  - ~0.28 Ops/Byte
  - ~0.035 Ops/Byte
  correct_index: 2
