title: 'The Microcontroller''s Ridge Point'
scenario: 'You''re evaluating a microcontroller for a keyword spotting application. To understand its performance characteristics, you need to create a simple roofline model. The ridge point tells you the minimum arithmetic intensity (Operations per Byte) a model needs to be compute-bound rather than memory-bound.'
question: 'What ridge point do 336 MFLOPS and 1.2 GB/s SRAM bandwidth imply for a roofline model?'
details:
  realistic_solution: 'The ridge point is the ratio of peak compute to peak memory bandwidth. At 0.28 Ops/Byte, almost any standard ML operation (which has far greater arithmetic intensity) will hit the compute ceiling before saturating the memory bus. This demonstrates the MCU is massively compute-bound.'
  common_mistake: |
    **The Pitfall:** Inverting the ratio to Bandwidth / Compute.
    **The Rationale:** Candidates fail to normalize units (MFLOPS to FLOPS) or misunderstand that arithmetic intensity represents operations per byte of data moved.
    **The Consequence:** The roofline model is plotted incorrectly, leading to misguided optimizations focusing on memory rather than compute.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak Compute: 336 MFLOPS.
    - Peak Bandwidth: 1.2 GB/s.

    **Calculations:**
    - Peak Compute = 3.36 x 10^8 FLOPS.
    - Peak Bandwidth = 1.2 x 10^9 B/s.
    - Ridge Point = (3.36 x 10^8) / (1.2 x 10^9) = 0.28 Ops/Byte.

    **Conclusion & Interpretation:**
    - **Result: 0.28 Ops/Byte (Compute-Bound)**. With a ridge point of 0.28 Ops/Byte, standard models easily exceed this intensity and are constrained by the MCU's compute ceiling.
  options:
  - "~3.57 Ops/Byte"
  - "~280 Ops/Byte"
  - "~0.28 Ops/Byte"
  - "~0.035 Ops/Byte"
