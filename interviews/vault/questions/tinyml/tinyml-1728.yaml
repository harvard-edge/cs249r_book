title: Camera Trap State Machine
scenario: A wildlife camera powered by a coin cell battery uses a passive infrared (PIR) sensor to trigger a Cortex-M4 image classifier taking 500ms.
question: Describe the optimal hardware power state transitions to minimize energy per event.
details:
  realistic_solution: The Cortex-M4 must rest in a deep sleep state consuming microamps. The PIR sensor generates a hardware interrupt to wake the SoC to active mode (milliamps). The device immediately powers up the camera, computes the 500ms inference, saves the result, and immediately powers down peripherals to return to deep sleep.
  common_mistake: |
    **The Pitfall:** Using busy-waiting (polling) on the PIR sensor.
    **The Rationale:** Developers accustomed to continuous power supplies use simple infinite loops to check sensor states.
    **The Consequence:** The CPU remains active continuously, draining the coin cell battery in days instead of years.
  napkin_math: |
    - **Phase 1**: Deep Sleep (µA draw).
    - **Trigger**: Hardware interrupt from PIR sensor.
    - **Phase 2**: Active Compute (mA draw) for 500 ms.
    - **Phase 3**: Immediate return to Deep Sleep.
    - **Result**: Minimizes the active time integral, maximizing battery life.
