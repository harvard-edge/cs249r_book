title: Camera Trap State Machine
scenario: A wildlife camera powered by a coin cell battery uses a passive infrared
  (PIR) sensor to trigger a Cortex-M4 image classifier taking 500ms.
question: Describe the optimal hardware power state transitions to minimize energy
  per event.
details:
  realistic_solution: The Cortex-M4 must rest in a deep sleep state consuming microamps.
    The PIR sensor generates a hardware interrupt to wake the SoC to active mode (milliamps).
    The device immediately powers up the camera, computes the 500ms inference, saves
    the result, and immediately powers down peripherals to return to deep sleep.
  common_mistake: Using busy-waiting (polling) on the PIR sensor instead of a low-power
    hardware interrupt.
  napkin_math: Sleep (uA) -> 500ms Active (mA) -> Sleep (uA)
