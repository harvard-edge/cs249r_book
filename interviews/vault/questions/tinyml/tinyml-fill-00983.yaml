title: Optimizing Operator Scheduling for TinyML on Nordic nRF5340
scenario: You are tasked with deploying a small convolutional neural network (e.g., for keyword spotting
  or simple sensor data classification) onto a Nordic nRF5340 microcontroller. This device features a
  128 MHz Arm Cortex-M33 CPU, 256 KB SRAM, and 1 MB flash memory. The network architecture includes several
  sequential convolutional layers, pooling layers, and fully connected layers. Explain in detail *why*
  specific operator scheduling decisions – such as execution order optimization for memory reuse, the
  feasibility and implications of parallel operator execution, and the selective application of layer
  fusion – are crucial for successful deployment. Justify your choices by referencing the nRF5340's real
  hardware specifications and discussing the critical trade-offs involved in achieving acceptable inference
  latency within these severe memory and computational constraints.
details:
  realistic_solution: A realistic solution involves aggressive in-place memory allocation and activation
    reuse, where intermediate tensors are carefully managed to occupy the same SRAM regions sequentially.
    Operator execution order should be optimized to free memory as soon as a tensor is no longer needed.
    Selective layer fusion can be applied for specific, memory-intensive operations (e.g., Conv2D + ReLU)
    where the reduction in intermediate memory footprint or cache benefits outweigh potential increases
    in binary size. Parallel execution on a single-core system would typically mean interleaving tasks,
    which might incur context switching overhead, making it less beneficial for critical inference paths
    unless specific hardware accelerators were available (which the nRF5340 generally lacks for general
    ML ops). Tools like TensorFlow Lite for Microcontrollers (TFLu) with its built-in micro-interpreter
    and kernel optimizations are often used, requiring careful model quantization and pruning to fit within
    memory and performance budgets.
  common_mistake: A common mistake is to overlook the extremely constrained 256 KB SRAM and attempt to
    apply operator scheduling strategies (like retaining multiple large intermediate tensors) that are
    common in environments with gigabytes of RAM. Another error is assuming parallel execution benefits
    without considering the single-core nature and potential overheads on the Cortex-M33, or indiscriminately
    applying layer fusion without evaluating the increased code size which could exceed the 1 MB flash
    memory.
  napkin_math: With 256 KB SRAM, a single `float32` tensor of size `64x64x16` consumes `64 * 64 * 16 *
    4 bytes = 262,144 bytes`, which is exactly 256 KB. This illustrates that only one such large intermediate
    tensor can reside in SRAM at a time. If using `int8` quantization, the same tensor would be `64 *
    64 * 16 * 1 byte = 65,536 bytes = 64 KB`, allowing more tensors or larger feature maps. For computation,
    a 128 MHz CPU means 128 million cycles per second. If a specific convolutional operation requires,
    say, 10 million cycles, it would take `10,000,000 / 128,000,000 ≈ 78 ms`. Summing such times for all
    layers gives a rough estimate of total inference latency, which scheduling and fusion aim to reduce
    by optimizing data movement and computational efficiency.
