title: The AMP Mailbox Full
scenario: Your system uses Asymmetric Multi-Processing (AMP). A Linux Cortex-A processor handles the network, and a bare-metal Cortex-M processor handles the real-time ML sensors. They communicate via an RPMsg (Remote Processor Messaging) mailbox. The ML core detects anomalies at 500 Hz and sends a 10-byte message to Linux for each one. The system runs for 5 seconds and then the ML core crashes with a `Mailbox Full` error. Linux is running fine.
question: "Why does an RPMsg mailbox overflow in 5 s when a Cortex-M core sends 500 Hz anomaly messages to Linux?"
details:
  realistic_solution: 'The Linux Cortex-A processes RPMsg messages through the kernel driver, context switches, and userspace handler — effective throughput ~100 msg/sec. The ML Cortex-M generates anomalies at 500 Hz. Net gain: +400 messages/sec. With a 2,000-message mailbox: overflow in exactly 5.0 seconds. Fix: (1) Aggregate on the M core — batch 50 anomalies into one message (reduces rate to 10 msg/sec). (2) Implement backpressure — M core checks mailbox occupancy before sending, dropping or buffering locally if >80% full. (3) Use a shared-memory ring buffer instead of RPMsg for high-throughput sensor data, reserving RPMsg for low-rate control messages.'
  common_mistake: |
    **The Pitfall:** Assuming the mailbox size is simply too small.
    **The Rationale:** Candidates fail to recognize the processing rate disparity between bare-metal messaging and Linux kernel overhead.
    **The Consequence:** Increasing mailbox size only delays the crash rather than fixing the fundamental system bottleneck.
  napkin_math: |
    - Inflow rate: 500 messages/sec (Cortex-M).
    - Outflow rate: ~100 messages/sec (Linux RPMsg overhead).
    - Net gain in mailbox: +400 messages/sec.
    - **If the mailbox holds 2000 messages, it will completely fill in exactly 5.0 seconds (2000 / 400 = 5), causing the crash.**
