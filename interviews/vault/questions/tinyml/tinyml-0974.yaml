title: Unstructured vs Structured Pruning on Ethos-U55
scenario: Your team is deploying a wake-word CNN on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) system. You applied 75% unstructured weight pruning, compressing the weights from 400 KB to 100 KB, which fits easily into SRAM. However, profiling shows the inference compute cycles are exactly the same as the unpruned dense model.
question: "Why does unstructured sparsity provide no speedup on the Ethos-U55, and what is the compute cycle difference with 50% structured channel pruning?"
details:
  realistic_solution: The Ethos-U55 processes data using a dense compute engine evaluating up to 256 MACs/cycle. Unstructured pruning scatters zeros randomly, so the NPU's rigid dataflow must still feed those zeros into the MAC array, meaning compute cycles remain unchanged. Structured pruning physically shrinks the tensor dimensions (e.g., fewer channels), directly reducing the total number of dense MAC operations the hardware must schedule and perform.
  common_mistake: |
    **The Pitfall:** Assuming zero-valued weights automatically skip compute cycles on edge NPUs.
    **The Rationale:** Candidates conflate offline memory compression (which the Ethos-U55 handles well to save SRAM) with active hardware zero-skipping logic.
    **The Consequence:** Unstructured pruning is implemented heavily, dropping accuracy for absolutely zero latency benefit on the target hardware.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - U55 throughput: 256 MACs/cycle.
       - Dense layer: 1,024,000 MACs.
    2. **Calculations:**
       - Dense U55 latency = 1,024,000 / 256 = 4,000 cycles.
       - 75% unstructured pruning = Hardware still processes 1,024,000 ops = 4,000 cycles.
       - 50% structured channel pruning = MACs reduce by half to 512,000.
       - Structured U55 latency = 512,000 / 256 = 2,000 cycles.
    3. **Conclusion & Interpretation:**
       - **Result: 50% structured pruning halves latency to 2,000 cycles; unstructured stays at 4,000 cycles.**
       - **Latency-Bound (Hardware Sparsity Support)**
