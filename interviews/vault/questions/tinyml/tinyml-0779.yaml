title: Tinyml New 0001
scenario: A TFLite Micro model deployed on a Cortex-M4 (168MHz) classifies anomalies perfectly in FP32. After 8-bit quantization, the model exhibits a severe drop in recall but only for specific extreme sensor values. Memory usage dropped as expected.
question: What calibration issue explains the recall drop for extreme sensor values after 8-bit quantization?
details:
  realistic_solution: The symptom is triggered by asymmetric quantization combined with extreme outliers in the sensor data. If the calibration dataset missed extreme values, the quantization range is too narrow. When extreme values arrive in production, they are clipped to the maximum INT8 value, destroying the anomaly signal. Recalibrate the model using a representative dataset that includes these extreme anomalies.
  common_mistake: |
    **The Pitfall:** Blaming the model architecture or the inherent limitations of INT8 precision.
    **The Rationale:** Engineers jump to the conclusion that 8-bit precision is simply insufficient for anomaly detection tasks without investigating the quantization range parameters.
    **The Consequence:** The team abandons efficient integer quantization and reverts to slower, more expensive FP32 models unnecessarily.
  napkin_math: |
    1. FP32 Range: [-10.0, 10.0] maps to INT8 [-128, 127].
    2. Scale Factor: 20.0 / 255 = 0.078.
    3. Extreme Input: A sensor reads 15.0 (outside calibration range).
    4. Quantized Value: 15.0 / 0.078 = 192.
    5. Clipping: 192 is clipped to maximum INT8 value of **127** (equivalent to 9.9 in FP32).
    6. Result: The critical anomaly signal is destroyed.
