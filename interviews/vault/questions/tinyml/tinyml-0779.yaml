title: Tinyml New 0001
scenario: A TFLite Micro model deployed on a Cortex-M4 (168MHz) classifies anomalies perfectly in FP32.
  After 8-bit quantization, the model exhibits a severe drop in recall but only for specific extreme sensor
  values. Memory usage dropped as expected.
details:
  realistic_solution: The symptom is triggered by asymmetric quantization combined with extreme outliers
    in the sensor data. If the calibration dataset missed extreme values, the quantization range is too
    narrow. When extreme values arrive in production, they are clipped to the maximum INT8 value, destroying
    the anomaly signal. Recalibrate the model using a representative dataset that includes these extreme
    anomalies.
  common_mistake: Blaming the model architecture or assuming INT8 simply lacks the precision for anomaly
    detection, rather than verifying the calibration dataset's coverage.
  napkin_math: FP32 range [-10.0, 10.0] maps to INT8 [-128, 127]. Scale = 20.0/255 = 0.078. If a sensor
    reads 15.0, quantized = 15.0/0.078 = 192 -> clipped to 127 (equivalent to 9.9). The critical signal
    is lost.
