title: The Mel Spectrogram Compute Budget
scenario: Your keyword spotting system on a Cortex-M4 at 168 MHz must compute a 40-bin Mel spectrogram from 16 kHz audio in real time. The pipeline processes 25ms frames with a 10ms hop, a 512-point FFT, and 40 Mel filter banks. You have a 100ms latency budget for the full pipeline. The model inference takes 15ms.
question: Does 40-bin Mel feature extraction on a 168 MHz Cortex-M4 fit beside a 15 ms model in a 100 ms budget?
details:
  realistic_solution: 'Yes, feature extraction fits easily. For 1 second of 16kHz audio with 25ms frames and 10ms hop: 98 frames. Per frame: 512-point FFT (~50us with CMSIS-DSP) + 40 Mel filters (~67us) = ~117us/frame. Total: 98 * 117us = 11.5ms. Add model inference (15ms) = 26.5ms total, using only 26.5% of the 100ms budget. The real bottleneck is not compute but memory: the full Mel spectrogram (98 frames * 40 bins * 1 byte INT8 = 3.9KB) plus FFT scratch (1KB) fits comfortably. The 73.5ms headroom allows streaming overlap or BLE transmission.'
  common_mistake: |
    **The Pitfall:** Assuming a 512-point FFT is an insurmountable compute bottleneck on an MCU.
    **The Rationale:** Engineers rely on outdated intuition that FFTs are too heavy for microcontrollers, ignoring modern DSP extensions (like CMSIS-DSP).
    **The Consequence:** Rejecting a viable feature pipeline or needlessly sacrificing model accuracy to simplify preprocessing, when memory footprint is actually the tighter constraint.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Cortex-M4 at 168 MHz.
       - Budget: 100 ms.
       - Frames: 25ms width, 10ms hop (98 frames/sec).
    2. **Calculations:**
       - Time per frame (CMSIS-DSP): ~50 µs (FFT) + ~67 µs (Mel) = 117 µs.
       - Feature Extraction Latency: 98 * 117 µs = 11.466 ms.
       - Total Pipeline Latency: 11.466 ms + 15 ms = 26.466 ms.
       - SRAM Usage: 98 * 40 * 1 byte = 3.92 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound** (Feature extraction uses only ~26.5% of the 100 ms budget, comfortably passing the real-time constraint).
