title: Evaluate Race-to-Sleep vs DVFS for Cortex-M4 KWS
scenario: 'You are designing a battery-powered keyword spotting system on an ARM Cortex-M4 (STM32F4).
  The model requires 2M INT8 MACs per inference running at 10 Hz. You must evaluate two power strategies:
  running the core at its max 168 MHz (40 mA active current) to sleep faster, or using DVFS to scale down
  to 42 MHz (12 mA active current). The system uses a 3.3V supply and has a sleep current of 10 uA. Both
  implementations utilize CMSIS-NN SIMD instructions.'
details:
  realistic_solution: An L5 engineer will calculate the total energy per 100ms inference window for both
    strategies. Because CMSIS-NN provides 2x INT8 MACs/cycle, the 2M MACs take only 1M cycles. By calculating
    the energy per cycle (or active energy per inference), the candidate will prove that race-to-sleep
    at 168 MHz is actually more efficient because the current draw scales sub-linearly with frequency
    in this specific operational curve (40mA/168MHz < 12mA/42MHz).
  common_mistake: Candidates often blindly assume that DVFS (scaling down frequency) always saves energy
    without calculating the energy per cycle. They may also forget to factor in the CMSIS-NN SIMD capabilities
    which halve the required cycle count, drastically changing the active time duration.
  napkin_math: 'Cycles = 2M MACs / 2 MACs/cycle = 1M cycles. Inference period = 100ms. At 168 MHz: Active
    time = 1M / 168MHz = 5.95ms. Active power = 40mA * 3.3V = 132mW. Active energy = 132mW * 5.95ms =
    785.4 uJ. Sleep energy = 10uA * 3.3V * 94.05ms = 3.1 uJ. Total = ~788.5 uJ. At 42 MHz: Active time
    = 1M / 42MHz = 23.8ms. Active power = 12mA * 3.3V = 39.6mW. Active energy = 39.6mW * 23.8ms = 942.5
    uJ. Sleep energy = 33uW * 76.2ms = 2.5 uJ. Total = ~945.0 uJ. Race-to-sleep wins by ~156 uJ per inference.'
