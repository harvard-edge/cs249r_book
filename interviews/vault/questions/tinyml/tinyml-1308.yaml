title: ESP32-S3 Continuous Audio Ingestion and Feature Extraction Design
scenario: You need to design an always-on acoustic anomaly detection pipeline on an ESP32-S3. The system continuously samples audio at 16 kHz (16-bit PCM) via I2S and must compute MFCCs every 20ms to feed a classifier. Given the ESP32-S3's 512 KB internal SRAM, 8 MB PSRAM, and dual-core 240 MHz Xtensa architecture, design the real-time data ingestion and buffering strategy.
question: "How should an ESP32-S3 audio pipeline buffer I2S data and compute MFCCs while preserving 300 KB SRAM for inference?"
details:
  realistic_solution: Allocate a ping-pong DMA buffer in the fast 512 KB internal SRAM for zero-latency I2S ingestion. Pin the DMA interrupts and WiFi/BLE stack to Core 0. Assign Core 1 to process the filled DMA buffers, utilizing the vector extensions to rapidly compute MFCCs. The resulting compact MFCC features can be safely accumulated into a rolling window stored in the 8 MB PSRAM, preserving the critical internal SRAM for the 300 KB inference engine and RTOS overhead.
  common_mistake: |
    **The Pitfall:** Placing all raw audio buffers directly in the slower 8 MB PSRAM to save space.
    **The Rationale:** Developers see an 8MB pool and assume it's perfectly fine for I2S DMA, ignoring the latency and SPI cache-miss overhead.
    **The Consequence:** The PSRAM bandwidth disruptions cause dropped frames during WiFi spikes, ruining the real-time continuous ingestion.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Sampling: 16 kHz, 16-bit PCM.
       - Frame size: 20 ms.
       - SRAM constraint: 300 KB reserved for inference.
    2. **Calculations:**
       - Raw audio rate = 16,000 samples/sec * 2 bytes = 32 KB/sec.
       - 20 ms chunk = 0.02 sec * 32,000 B/s = 640 bytes.
       - Double DMA buffer = 2 * 640 bytes = 1.28 KB.
       - Inference (300 KB) + DMA (1.28 KB) = 301.28 KB.
       - Remaining SRAM = 512 KB - 301.28 KB = 210.72 KB for RTOS/WiFi.
    3. **Conclusion & Interpretation:**
       - **Result: 1.28 KB internal SRAM buffer fits easily while protecting PSRAM bandwidth.**
       - **Latency-Bound (I/O Buffer Management)**
