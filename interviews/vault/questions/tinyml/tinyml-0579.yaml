title: The Deep Sleep I2C Leakage
scenario: Your TinyML sensor goes into Deep Sleep, cutting power to the main CPU core. The theoretical
  deep sleep current of the MCU is 2 microamps. However, your multimeter measures 700 microamps of constant
  drain. You discover the I2C peripheral lines (SDA/SCL) are still physically connected to an external
  sensor. How are the data lines draining power?
details:
  realistic_solution: 'The I2C pull-up resistors (typically 4.7 kohm to VCC) are always connected, even
    in deep sleep. With one end at 3.3V and one of the sensor''s I2C lines pulled low during sleep: I
    = V/R = 3.3V / 4,700ohm = 702uA per line. If one line is pulled low, that''s ~700uA total, which is
    350x the MCU''s 2uA deep sleep current. Fix: (1) power the pull-ups from a GPIO that you can disable
    in sleep, (2) use a load switch (MOSFET) to cut power to the entire sensor + pull-up circuit, or (3)
    switch GPIOs to analog/high-Z mode before sleeping. A single resistor can dominate the entire system''s
    power budget.'
  common_mistake: '"The sensor is still on." The sensor might be in sleep mode too. The drain is coming
    from the bus architecture itself.'
  napkin_math: $V = I \times R$. $3.3V / 4700 \Omega = 0.0007A = 700 \mu A$. A single misconfigured pull-up
    resistor (one line pulled low) burns 350x more power than the entire sleeping microcontroller.
