title: The Watchdog Timer Recovery
scenario: A remote environmental sensor running on a Cortex-M4 occasionally hangs during inference due to a rare floating-point edge case. The device is solar-powered and deployed 50 km from the nearest technician. Normal inference takes 120ms.
question: If the watchdog timeout is set to 500ms, what is the maximum downtime per hang event, and what is the risk of an aggressive 150ms timeout?
details:
  realistic_solution: 'With a 500ms watchdog: maximum downtime per hang = 500ms (watchdog fires) + ~200ms (reboot and re-init) = 700ms total. The device misses at most one inference cycle. If the 150ms timeout is used and inference occasionally takes 140ms (due to longer audio input or ISR preemption), the watchdog triggers false resets. Each false reset costs 200ms of reboot time plus lost sensor data. A good rule of thumb: set watchdog to 3-4× typical inference time. 120ms × 4 = 480ms ≈ 500ms is appropriate.'
  common_mistake: |
    **The Pitfall:** Setting the watchdog timeout just barely above the normal inference time.
    **The Rationale:** Failing to account for inference time variance due to input complexity, interrupt handling, or temperature-dependent clock drift.
    **The Consequence:** Spurious resets during legitimate but slightly slow inferences, causing constant reboot loops and data loss.
  napkin_math: |
    1. **Normal Execution:** 120ms.
    2. **500ms Timeout Case:** Headroom = 380ms. Max downtime = 500ms (wait) + 200ms (reboot) = **700ms**. Safe margin.
    3. **150ms Timeout Case:** Headroom = 30ms. If ISR preemption adds 40ms, total time = 160ms.
    4. **Conclusion:** 160ms > 150ms. An aggressive 150ms timeout guarantees false resets. Use 3-4x inference time for safety.
  options:
  - A) 500ms max downtime; 150ms timeout is safe with 30ms margin
  - B) 700ms max downtime; 150ms timeout risks false resets under ISR preemption
  - C) 120ms max downtime; the watchdog resets instantly
  - D) No downtime — the watchdog prevents hangs from occurring
  correct_index: 1
