title: The Watchdog Timer Recovery
scenario: A remote environmental sensor occasionally hangs during inference due to a rare floating-point edge case. The device is solar-powered and deployed 50 km from the nearest technician. Normal inference takes 120ms.
question: If the watchdog timeout is set to 500ms, what is the maximum downtime per hang event, and what is the risk of an aggressive 150ms timeout?
details:
  realistic_solution: "With a 500ms watchdog: max downtime = 500ms + 200ms reboot = 700ms total. If the 150ms timeout is used and inference takes 140ms due to variance, the watchdog triggers false resets. A 3-4x margin is required."
  common_mistake: |
    **The Pitfall:** Setting the watchdog timeout just barely above the normal inference time.
    **The Rationale:** Failing to account for inference time variance due to input complexity, interrupt handling, or temperature-dependent clock drift.
    **The Consequence:** Spurious resets during legitimate but slightly slow inferences, causing constant reboot loops and data loss.
  napkin_math: |
    **Assumptions & Constraints:**
    - Normal Execution: 120ms.
    - Reboot Time: ~200ms.

    **Calculations:**
    - 500ms Timeout Case: Headroom = 380ms. Max downtime = 500ms + 200ms = 700ms.
    - 150ms Timeout Case: Headroom = 30ms. ISR preemption could push total > 150ms.

    **Conclusion & Interpretation:**
    - **Result: Reliability-Bound (150ms timeout guarantees false resets; 500ms provides safe margin).**
  options:
  - A) 500ms max downtime; 150ms timeout is safe with 30ms margin
  - B) 700ms max downtime; 150ms timeout risks false resets under ISR preemption
  - C) 120ms max downtime; the watchdog resets instantly
  - D) No downtime — the watchdog prevents hangs from occurring
  correct_index: 1
