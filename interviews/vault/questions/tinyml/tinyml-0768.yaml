title: The Watchdog Timer Recovery
scenario: A remote environmental sensor running on a Cortex-M4 occasionally hangs during inference due
  to a rare floating-point edge case. The device is solar-powered and deployed 50 km from the nearest
  technician. Without a watchdog timer, the device stays hung until a manual reset. If the watchdog timeout
  is set to 500ms and normal inference takes 120ms, what is the maximum downtime per hang event, and what
  is the risk if you set the timeout too aggressively (e.g., 150ms)?
question: ", 150ms)?"
details:
  realistic_solution: 'With a 500ms watchdog: maximum downtime per hang = 500ms (watchdog fires) + ~200ms
    (reboot and re-init) = 700ms total. The device misses at most one inference cycle. If the 150ms timeout
    is used and inference occasionally takes 140ms (due to longer audio input or ISR preemption), the
    watchdog triggers false resets. Each false reset costs 200ms of reboot time plus lost sensor data.
    A good rule of thumb: set watchdog to 3-4× typical inference time. 120ms × 4 = 480ms ≈ 500ms is appropriate.'
  common_mistake: Setting the watchdog timeout just barely above the normal inference time. Inference
    time varies due to input complexity, interrupt handling, and temperature-dependent clock drift. A
    tight watchdog causes spurious resets during legitimate but slow inferences.
  napkin_math: 'Normal inference: 120ms. Watchdog at 500ms: headroom = 500-120 = 380ms (3.2× margin).
    Max downtime per hang: 500ms timeout + 200ms reboot = 700ms. At 150ms watchdog: headroom = 30ms (1.25×
    margin). If inference varies ±15%, worst case = 138ms — OK. But ISR preemption can add 20-50ms → 170ms
    > 150ms → false reset.'
  options:
  - A) 500ms max downtime; 150ms timeout is safe with 30ms margin
  - B) 700ms max downtime; 150ms timeout risks false resets under ISR preemption
  - C) 120ms max downtime; the watchdog resets instantly
  - D) No downtime — the watchdog prevents hangs from occurring
  correct_index: 1
