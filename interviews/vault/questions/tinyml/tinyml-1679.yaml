title: Statically Allocated Tensor Arena in Bare Metal Devices
scenario: An engineer is deploying a compiled TensorFlow Lite Micro model onto a Cortex-M4
  bare-metal environment lacking an operating system.
question: Describe the purpose of the 'tensor arena' in TFLM and how its size is determined
  prior to deployment.
details:
  realistic_solution: The tensor arena is a statically allocated byte array in SRAM
    used to hold the model's input, output, and intermediate activation tensors. Its
    exact size is determined offline by analyzing the model's execution plan to find
    the maximum memory required by any single layer's inputs and outputs combined.
  common_mistake: Believing the tensor arena dynamically allocates and frees memory
    via malloc() during runtime execution.
  napkin_math: Max(layer_i_input + layer_i_output + scratch) across all i = 45 KB
    continuous arena size.
