title: Statically Allocated Tensor Arena in Bare Metal Devices
scenario: An engineer is deploying a compiled TensorFlow Lite Micro model onto a bare-metal microcontroller environment lacking an operating system.
question: Describe the purpose of the tensor arena in TFLM and how its size is determined prior to deployment.
details:
  realistic_solution: 'The tensor arena is a statically allocated byte array in SRAM used to hold the model''s input, output, and intermediate activation tensors. Its exact size is determined offline by analyzing the model''s execution plan to find the maximum memory required by any single layer''s inputs and outputs combined.'
  common_mistake: |
    **The Pitfall:** Assuming dynamic memory allocation is used.
    **The Rationale:** Candidates believe the tensor arena dynamically allocates and frees memory via malloc() during runtime execution, mirroring high-level OS behavior.
    **The Consequence:** Attempting to use dynamic allocation in an OS-less environment causes fragmentation, non-deterministic execution times, and eventual heap exhaustion.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Environment: Bare-metal microcontroller.
       - Framework: TensorFlow Lite Micro.
    2. **Calculations:**
       - Arena size = Max(layer_i_input + layer_i_output + scratch) across all layers.
       - Example: Layer N needs 15KB input, 20KB output, 10KB scratch = 45KB peak usage.
    3. **Conclusion & Interpretation:**
       - **Result: Statically Allocated Memory.** The tensor arena must be precisely pre-calculated to a continuous 45 KB block offline to ensure deterministic execution without malloc().
