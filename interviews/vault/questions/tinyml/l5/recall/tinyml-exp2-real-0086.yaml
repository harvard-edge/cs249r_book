schema_version: 1
id: tinyml-exp2-real-0086
title: Graceful Degradation for Anomaly Detection on nRF5340
topic: graceful-degradation
status: published
provenance: imported
scenario: We are deploying an industrial vibration monitoring sensor on a Nordic nRF5340 (128 MHz app
  core, 64 MHz net core, 256 KB SRAM, 1 MB flash). The device normally runs a high-fidelity 1D-CNN anomaly
  model and streams detailed spectrograms over BLE 5.3 (drawing ~5mA active). When the battery drops below
  10% or the BLE environment becomes severely congested, we need a fail-operational degradation ladder
  to guarantee critical fault detection is not lost. Design this fallback architecture and concretely
  size the memory and compute allocations.
details:
  realistic_solution: 'A robust degradation ladder shifts from streaming raw data to local edge alerting.
    State 1 (Normal): Runs the primary 1D-CNN on the 128 MHz app core and uses the 64 MHz net core for
    BLE 5.3 streaming. State 2 (Degraded QoS): Suspends BLE streaming entirely, powers down the net core
    to shed the ~5mA active load, and unloads the primary model. It then loads a highly compressed 15
    KB Random Forest model from the 1 MB flash to run sparse, low-duty-cycle inference on the app core,
    logging only catastrophic faults to flash memory for later retrieval.'
  common_mistake: Candidates often suggest offloading inference to the cloud as a fallback, which breaks
    the fail-operational requirement during network congestion. They also frequently fail to account for
    the BLE stack's SRAM footprint, wrongly assuming the full 256 KB SRAM is available to the ML models.
  napkin_math: 'Total SRAM available: 256 KB. Net core BLE 5.3 stack + RTOS overhead requires ~64 KB.
    Sensor ring buffer takes 16 KB. Remaining SRAM for primary ML = 176 KB. The primary 1D-CNN activations
    and weights take 140 KB, fitting within the 176 KB budget alongside the ~5mA active current. In degraded
    mode, shedding the BLE connection frees the 64 KB net core SRAM and drops system draw below 2mA. The
    fallback Random Forest model requires only 15 KB SRAM and 45 KB Flash, seamlessly fitting the remaining
    budget and ensuring the fail-operational state extends battery life dramatically.'
