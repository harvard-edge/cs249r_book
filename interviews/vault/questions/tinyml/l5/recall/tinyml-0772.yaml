schema_version: 1
id: tinyml-0772
title: The DMA-Inference Overlap
topic: 3d-parallelism
status: draft
provenance: imported
scenario: On a Cortex-M7 (1 MB SRAM, 400 MHz), inference takes 25ms and consumes the CPU entirely. Meanwhile,
  a camera module delivers 320×240 grayscale frames at 15 FPS via SPI at 25 MHz. Each frame is 76.8 KB.
  Can DMA-based frame capture fully overlap with inference, or does bus contention degrade performance?
  Calculate the DMA transfer time and bus utilization.
details:
  realistic_solution: 'DMA transfer time: 76,800 bytes × 8 bits / 25 MHz = 24.6ms. Frame interval at 15
    FPS: 66.7ms. DMA bus utilization: 24.6/66.7 = 0.4%. Inference bus utilization (typical for NN on M7):
    ~60% of cycles are memory-bound. During DMA overlap, both contend for the AHB bus. With 36.9% + 60%
    ≈ 97% bus demand, arbitration delays add ~10-15% to both. Inference stretches from 25ms to ~28ms.
    DMA stretches from 24.6ms to ~27ms. Both still fit within 66.7ms frame budget, but barely. At 30 FPS
    (33.3ms budget), this pipeline breaks.'
  common_mistake: Assuming DMA is 'free' because it doesn't use the CPU. DMA still uses the system bus
    (AHB), and on Cortex-M7, inference memory accesses and DMA transfers contend for the same bus matrix.
    At high bus utilization, both slow down.
  napkin_math: 'Frame: 320×240×1 = 76,800 B. SPI transfer: 76,800 × 8 / 25MHz = 24,576 µs ≈ 24.6ms. Frame
    interval (15 FPS): 66.7ms. DMA bus util: 24.6/66.7 = 0.4%. Inference bus util: ~60%. Combined: 97%.
    Contention penalty: ~12%. Stretched inference: 25 × 1.12 = 28ms. Stretched DMA: 24.6 × 1.12 = 27.6ms.
    Max(28, 27.6) = 28ms < 66.7ms ✓.'
