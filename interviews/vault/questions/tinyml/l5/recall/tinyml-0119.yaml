schema_version: 1
id: tinyml-0119
title: Designing an Inference Duty Cycle on 0.5 mW Solar
topic: duty-cycling
status: published
provenance: imported
scenario: You're deploying a keyword spotting sensor on a building facade powered by a small solar cell
  that provides 0.5 mW average (accounting for day/night, clouds, and seasons). The sensor uses an Ambiq
  Apollo4 Lite (Cortex-M4F, 5 µW sleep, 3 mW active at 96 MHz). Inference takes 15ms per keyword detection
  pass. Design the duty cycle. How many inferences per hour can you sustain year-round?
details:
  realistic_solution: 'Energy budget from bottom up: always-on consumers (comparator + voltage regulator
    + leakage) = 30 uW. Per inference: MCU active 15ms at 3 mW = 45 uJ, plus wake-up overhead 2ms at 3
    mW = 6 uJ, plus storage round-trip losses (20%) = 10 uJ. Total: 61 uJ effective per inference. Available
    for inference: 500 uW - 30 uW (always-on) = 470 uW. Max inference rate: 470 uW / 61 uJ = 7.7/s. With
    30% seasonal margin: 5.4/s = 19,400/hour. For overnight operation (10 hours no solar): a 1F supercap
    stores 5.45J, supporting 5.45J / 61 uJ = 89,000 inferences. At reduced nighttime rate of 0.1/s: lasts
    247 hours.'
  common_mistake: '"0.5 mW average harvest, 3 mW active for 15ms = 45 µJ per inference. Energy budget
    per hour: 0.5 mW × 3600s = 1.8 J. Inferences per hour: 1.8 J / 45 µJ = 40,000." This ignores sleep
    power, microphone power, wake-up overhead, and the energy storage inefficiency. You cannot spend 100%
    of harvested energy on inference.'
  napkin_math: 'Harvest: 500 µW. Always-on: 30 µW. Available: 470 µW. Per inference: 61 µJ (45µJ active
    + 6µJ wakeup + 10µJ loss). Max rate: 470 µW / 61 µJ = 7.7/s. With 30% margin: 5.4/s = 19,400/hour.
    Energy storage: a 1F supercap stores 5.45 J = enough for 89,000 inferences without any solar input.
    At reduced nighttime rate of 0.1/s, a 1F cap lasts 247 hours.'
