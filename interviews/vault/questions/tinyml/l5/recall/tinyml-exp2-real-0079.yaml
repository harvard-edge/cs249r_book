id: tinyml-exp2-real-0079
title: MobileNet Partitioning for ESP32-S3 Memory Hierarchy
topic: cnn-efficient-design
status: published
provenance: imported
scenario: We are deploying a visual wake word detection model using a MobileNetV2-like architecture on
  an ESP32-S3 microcontroller. The device features 512 KB of fast internal SRAM and 8 MB of external PSRAM
  connected via SPI. The model's INT8 quantized parameters and maximum activation feature maps require
  about 1.5 MB total, forcing us to utilize the slower PSRAM. You must design an execution strategy that
  minimizes latency by optimally partitioning weights and activations between SRAM and PSRAM, while fully
  utilizing the dual-core 240 MHz Xtensa processors and INT8 vector extensions.
details:
  realistic_solution: The optimal approach is to use depth-first execution or patch-based inference to
    fuse the operations within the inverted residual blocks. This ensures the massive expanded intermediate
    activations (which occur between the 1x1 expansion and 3x3 depthwise convolutions) remain entirely
    within the 512 KB SRAM. Weights are stored in PSRAM and streamed into a small SRAM double-buffer using
    DMA, overlapping the slow PSRAM read latency with the INT8 vector computations performed by the dual
    cores on the SRAM-resident activations.
  common_mistake: Candidates typically suggest a naive layer-by-layer execution where both weights and
    large intermediate activations are spilled to PSRAM. They fail to recognize that the SPI-connected
    PSRAM bandwidth is significantly slower than the dual-core Xtensa computation speed, turning a compute-bound
    convolution into a severe memory-bound bottleneck.
  napkin_math: Consider an inverted residual block expanding a 32x32x16 input to 32x32x96. The INT8 expanded
    activation is 32 * 32 * 96 bytes = 98.3 KB, which safely fits in the 512 KB SRAM. If spilled to PSRAM
    (assuming ~40 MB/s effective bandwidth over SPI), reading and writing this tensor takes roughly (98.3
    KB / 40 MB/s) * 2 = 4.9 ms. Meanwhile, computing the depthwise convolution (~884,000 MACs) on the
    240 MHz Xtensa cores with INT8 vector extensions (assuming a conservative 4 MACs/cycle throughput)
    takes only ~0.9 ms. Fusing the layers to keep the 98.3 KB activation in SRAM avoids the 4.9 ms memory
    penalty, proving that PSRAM bandwidth, not compute, dictates performance if memory hierarchy is ignored.
