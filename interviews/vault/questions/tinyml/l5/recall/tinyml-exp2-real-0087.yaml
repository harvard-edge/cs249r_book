schema_version: 1
id: tinyml-exp2-real-0087
title: Sizing a Distilled Keyword Spotting Model for nRF5340
topic: knowledge-distillation
status: published
provenance: imported
scenario: We are deploying a continuous keyword spotting model on a Nordic nRF5340, leveraging its 128
  MHz app core for inference while the 64 MHz net core handles BLE 5.3 communications to keep the system
  near its ~5mA active power target. The baseline teacher model achieves high accuracy but requires 4MB
  of Flash and 1MB of SRAM, vastly exceeding the device's 1MB Flash and 256KB SRAM. We are using knowledge
  distillation to train a highly optimized student model. Evaluate the strict platform constraints and
  size the student model's parameters and peak activations concretely.
details:
  realistic_solution: A robust solution reserves sufficient Flash and SRAM for the BLE stack and OS components
    before sizing the neural network. The candidate should propose a student model architecture designed
    to fit the remaining memory budget, relying on INT8 quantization to halve the distilled model's footprint.
    They must structure the network such that the largest single layer's input and output feature maps
    do not exceed the restricted SRAM peak memory arena.
  common_mistake: Candidates often forget to account for the memory overhead of the RTOS, the BLE stack,
    and application state. They might size the student model to consume the entire 256KB SRAM and 1MB
    Flash, which leads to out-of-memory crashes or starves the networking core.
  napkin_math: nRF5340 Total Flash = 1 MB (1024 KB), SRAM = 256 KB. The BLE 5.3 stack running on the 64
    MHz net core requires ~250 KB Flash and ~64 KB SRAM. Application code on the 128 MHz app core needs
    ~100 KB Flash and ~32 KB SRAM. Available Flash for weights = 1024 KB - 350 KB = 674 KB. Available
    SRAM for inference = 256 KB - 96 KB = 160 KB. An INT8 student model must therefore be under 674,000
    parameters (674 KB). The maximum activation buffer in SRAM must be < 160 KB (e.g., a bottleneck layer
    with 32x32x64 INT8 inputs and outputs requires 32*32*64 = 65,536 bytes = 64 KB + 64 KB = 128 KB, which
    safely fits).
