schema_version: 1
id: tinyml-exp2-real-0092
title: SRAM-Constrained NAS on Ethos-U55
topic: neural-architecture-search
status: published
provenance: imported
scenario: You are deploying a person-detection model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) system
  running at 480 MHz. The system has 512 KB of shared SRAM and no external memory. You are configuring
  a hardware-aware NAS to find a topology that maximizes the Ethos-U55's throughput (configured for 256
  MAC/cycle). How do you formulate the NAS memory constraint function to ensure the discovered models
  can be compiled and executed without SRAM overflow?
details:
  realistic_solution: The NAS must evaluate the peak memory footprint per layer, not just total parameters.
    Since the Ethos-U55 and M7 share the 512 KB SRAM, the NAS constraint must ensure that max(weights_i
    + input_activations_i + output_activations_i) < 512 KB - system_overhead for all layers 'i'. The search
    space should also prioritize standard operations which map efficiently to the U55's MAC array, avoiding
    operations that force execution fallback to the M7.
  common_mistake: Candidates often use total model size (sum of all weights) as the memory constraint
    in their NAS cost model. They forget that in an MCU without paging, the peak memory is determined
    by the maximum sum of (weights + input activations + output activations) for any single layer, plus
    runtime overhead.
  napkin_math: Total SRAM = 512 KB. Assume OS/buffers use 112 KB, leaving 400 KB for the model. If the
    NAS considers an initial layer taking a 128x128x3 int8 input (48 KB) and producing a 64x64x16 int8
    output (64 KB), the activations use 112 KB. This leaves exactly 288 KB for the layer's weights and
    intermediate buffers. If the NAS proposes a layer that requires 300 KB of weights, the peak memory
    would be 48 + 64 + 300 = 412 KB > 400 KB available, and the NAS must reject this architecture.
