id: tinyml-0770
title: The CMSIS-NN SIMD Speedup
topic: graph-compilation
status: published
provenance: imported
scenario: A Cortex-M4 has SIMD instructions (via DSP extension) that can perform 4 × INT8 multiply-accumulates
  in a single cycle using the __SMLAD intrinsic. A naive C implementation of a 1024-element dot product
  takes 1 MAC per cycle. Calculate the theoretical speedup from SIMD, and explain why the real speedup
  is closer to 2.5× instead of 4×.
details:
  realistic_solution: 'Theoretical: naive = 1024 cycles. SIMD = 1024/4 = 256 cycles. Speedup = 4×. In
    practice, SIMD achieves ~2.5× because: (1) data must be loaded and packed into 32-bit registers —
    each load pair costs 1-2 cycles, (2) loop overhead (branch, counter) adds ~1 cycle per 4 MACs, (3)
    unaligned data requires extra shift instructions, (4) pipeline stalls from data dependencies between
    consecutive SMLADs. Measured: ~410 cycles for SIMD vs 1024 naive → 2.5× real speedup.'
  common_mistake: Claiming a clean 4× speedup from 4-wide SIMD. Real code has loop overhead, data alignment
    requirements, and pipeline stalls from memory accesses that reduce the gain.
  napkin_math: 'Naive: 1024 MACs × 1 cycle = 1024 cycles. Ideal SIMD: 1024/4 = 256 cycles (4×). Real SIMD
    breakdown: 256 SMLAD cycles + 64 load cycles (2 loads per 4 MACs, pipelined) + 64 loop overhead cycles
    + 26 alignment/stall cycles ≈ 410 cycles. Real speedup: 1024/410 = 2.5×. At 100 MHz: naive = 10.24
    µs, SIMD = 4.1 µs.'
