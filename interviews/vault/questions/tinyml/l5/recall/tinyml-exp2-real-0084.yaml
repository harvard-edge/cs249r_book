id: tinyml-exp2-real-0084
title: Sub-4-bit Quantization Tradeoffs for Keyword Spotting on Corstone-300
topic: extreme-quantization
status: published
provenance: imported
scenario: You are deploying a 1.2 million parameter CNN for continuous keyword spotting on an ARM Cortex-M7
  + Ethos-U55 (Corstone-300) system. The system features 512 KB of shared SRAM, and the Ethos-U55 NPU
  processes 256 MACs/cycle. At standard INT8 quantization, the model's weights require 1.2 MB, vastly
  exceeding the available SRAM and forcing power-hungry fetches from external Flash memory. You need to
  evaluate the system-level tradeoffs of applying extreme 2-bit weight quantization to fit the entire
  model into SRAM, considering both the accuracy recovery techniques and the hardware execution realities.
details:
  realistic_solution: A senior engineer recognizes that since the Ethos-U55 does not natively support
    2-bit MAC operations, weights must be stored in 2-bit format but unpacked to INT8 in SRAM before execution.
    The architecture decision involves partitioning the 512 KB SRAM to hold the 300 KB compressed weights,
    a double-buffer for unpacked INT8 weights, and the activation maps. The Cortex-M7 will unpack chunks
    of weights just-in-time for the Ethos-U55 to process, trading M7 compute cycles for a massive reduction
    in external Flash memory bandwidth.
  common_mistake: Candidates often assume that any reduction in bit-width automatically translates to
    latency and energy savings on the NPU. They propose 2-bit or ternary weights but fail to realize that
    the Ethos-U55 natively accelerates INT8 and INT16, not 2-bit math, meaning the NPU cannot directly
    execute the 2-bit compressed graph without significant software overhead.
  napkin_math: 'Standard INT8 memory footprint: 1.2M params * 1 byte = 1.2 MB. With 2-bit quantization:
    1.2M params * 2 bits = 2.4M bits = 300 KB, which fits entirely within the 512 KB SRAM. Since the NPU
    (256 MAC/cycle) requires INT8, the Cortex-M7 (480 MHz) must unpack the weights. Assuming a highly
    optimized M7 SIMD routine takes 4 cycles to unpack 4 weights (1 byte of 2-bit data into 4 bytes of
    INT8 data), unpacking the full model takes 1.2M cycles. At 480 MHz, this adds exactly 2.5 ms of M7
    overhead per inference. If fetching 1.2 MB from a standard SPI Flash at 40 MB/s takes 30 ms, the 2.5
    ms M7 unpacking penalty is a highly favorable system-level tradeoff.'
