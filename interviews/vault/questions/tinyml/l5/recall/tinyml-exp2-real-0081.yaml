id: tinyml-exp2-real-0081
title: On-Device Hard Negative Mining for ESP32-S3
topic: dataset-curation
status: published
provenance: imported
scenario: You are deploying an audio-based predictive maintenance model on an ESP32-S3 (240 MHz dual-core
  Xtensa, 512 KB SRAM, 8 MB PSRAM, WiFi/BLE). The current INT8 quantized model suffers from false positives
  in novel factory environments. You must design an automated on-device hard-negative mining strategy
  to curate a targeted dataset for retraining, balancing human annotation constraints with device memory
  and power limitations.
details:
  realistic_solution: Establish a confidence margin threshold (e.g., 0.45 to 0.55) to flag hard negatives.
    Buffer the raw audio for these uncertain events exclusively in the 8 MB PSRAM. Batch upload the buffer
    via WiFi only when full to optimize radio active time and power budget, then send the batch to human
    annotators to prioritize their labeling efforts on edge cases.
  common_mistake: Candidates often propose streaming all uncertain audio directly to the cloud over WiFi,
    ignoring the massive power drain of continuous radio usage. Others fail to properly partition memory,
    trying to buffer audio in the limited 512 KB SRAM which causes out-of-memory errors during inference.
  napkin_math: 'Audio stream: 16 kHz @ 16-bit = 32 KB/s. A 3-second context window = 96 KB per event.
    The device has 512 KB SRAM and 8 MB PSRAM. We reserve the 512 KB SRAM for the 240 MHz dual-core Xtensa
    and INT8 vector extensions during inference. Allocating 4 MB of the 8 MB PSRAM for the logging buffer
    yields capacity for ~42 events (4096 KB / 96 KB). Batch uploading 4 MB via WiFi/BLE at 1 Mbps takes
    ~32 seconds, vastly outperforming the energy cost of 42 individual TCP handshakes.'
