id: tinyml-0111
title: The Interrupt Latency Impact
topic: real-time-deadlines
status: published
provenance: imported
scenario: Your industrial vibration monitor runs inference on a Cortex-M4 at 168 MHz. A high-priority
  sensor interrupt fires every 100 µs (10 kHz sampling). The ISR reads 6 bytes from SPI and writes to
  a buffer — taking 2.5 µs including entry/exit overhead. Your model inference takes 25ms. Calculate the
  effective inference time with interrupt overhead, and determine at what sampling rate the interrupts
  make inference infeasible within a 30ms deadline.
details:
  realistic_solution: 'Quantify the interrupt tax on inference: At 10 kHz: 250 ISRs × 2.5 µs = 0.625ms
    overhead (2.5%). At 50 kHz: 1,250 ISRs × 2.5 µs = 3.125ms (12.5%). At 66.7 kHz: 2,000 ISRs × 2.5 µs
    = 5ms (20%) — hits 30ms deadline exactly. With pipeline disru'
  common_mistake: '"Interrupts are instantaneous — they don''t affect inference timing." Every interrupt
    steals cycles from the main inference loop. On Cortex-M4, the minimum interrupt entry latency is 12
    cycles (push 8 registers to stack), plus the ISR body, plus 12 cycles exit (pop registers). These
    cycles are stolen from inference.'
  napkin_math: 'At 10 kHz: 250 ISRs × 2.5 µs = 0.625ms overhead (2.5%). At 50 kHz: 1,250 ISRs × 2.5 µs
    = 3.125ms (12.5%). At 66.7 kHz: 2,000 ISRs × 2.5 µs = 5ms (20%) — hits 30ms deadline exactly. With
    pipeline disruption (4 µs effective): 50 kHz → 5ms overhead → hits deadline. Safe limit: ~40 kHz with
    ISR, unlimited with DMA. DMA uses ~0.5 KB SRAM for the transfer buffer — trivial cost for eliminating
    all interrupt overhead.'
