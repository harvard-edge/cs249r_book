id: tinyml-cell-11045
title: 'Dataset Curation: Mastery — End-to-End Data Strategy for TinyML Anomaly Detection'
topic: dataset-curation
status: published
provenance: imported
scenario: You are deploying a vibration-based machine anomaly detection model on ESP32-S3 (240MHz, 512KB
  SRAM, 8MB PSRAM). The model must detect bearing failures from 3-axis accelerometer data. You have only
  200 labeled anomaly examples (rare events) and 10,000 normal examples. Design the complete data strategy
  for an anomaly detection model that achieves < 5% false alarm rate and > 90% anomaly detection rate.
details:
  realistic_solution: 'Use autoencoder anomaly detection: train only on 10,000 normal samples. Threshold
    reconstruction error at test time. Augment normal data: random noise, phase shifts. Validate on 200
    anomaly samples (hold out 40 for final test). Threshold tuning on validation set.'
  common_mistake: 'Framing as binary classification with imbalanced data — poor performance on rare anomaly
    class. Better framing: one-class classification (autoencoder anomaly detection) trained only on normal
    data.'
  napkin_math: 'Data: 10K normal × 1-sec × 100Hz × 3-axis × int8 = 10K × 300B = 3MB — fits in PSRAM. Autoencoder:
    encoder 300→64→16, decoder 16→64→300. Params: 300×64 + 64×16 + 16×64 + 64×300 = 19,200 + 1,024 + 1,024
    + 19,200 = 40,448 params × 1B (int8) = 40KB. SRAM budget: model 40KB + activations (300 + 64 + 16
    + 64 + 300) × 4B = 3KB + misc = 50KB total << 512KB. Training: cloud or PC (not on device). 10K samples
    × 100 epochs / batch 128 = 7,812 steps × 1ms = 7.8 seconds on GPU. Validation: 160 anomaly examples.
    Threshold at FPR=5%: reconstruction error percentile 95% of normal = threshold. Expected TPR on anomalies:
    > 90% (autoencoders typical for bearing faults).'
