schema_version: 1
id: tinyml-exp2-real-0268
title: nRF5340 Always-On Wake Word Energy Budgeting
topic: duty-cycling
status: published
provenance: imported
scenario: You are designing a battery-operated smart home sensor using the Nordic nRF5340. The system
  needs to run an always-on wake word detection model on the 128 MHz app core, which draws ~5mA active
  current. You are constrained to a 220mAh CR2032 coin cell and must achieve a 1-year battery life while
  periodically transmitting over BLE 5.3 using the 64 MHz net core. Evaluate the required duty cycle and
  sleep state power constraints to make this system feasible.
details:
  realistic_solution: At L5, a candidate should recognize that running a ~5mA core continuously will drain
    a 220mAh battery in roughly 44 hours. The solution requires duty cycling the wake word model (e.g.,
    using a lower-power hardware VAD to wake the 128 MHz core only when voice activity is detected), optimizing
    inference time to stay active for less than 1% of the time, and ensuring deep sleep currents remain
    in the microamp range.
  common_mistake: Candidates often assume the app core can run continuously or fail to account for the
    baseline sleep current and BLE transmission overhead. They might simply divide the battery capacity
    by the active current without designing a cascaded wake-up or aggressive duty cycling strategy.
  napkin_math: 'Total battery capacity: 220mAh. Target life: 1 year (8760 hours). Maximum average continuous
    draw = 220mAh / 8760h ≈ 25µA. Active inference draws ~5mA (5000µA). If the system sleeps at 5µA, the
    available budget for active time is 20µA. Duty cycle = 20µA / 5000µA = 0.4%. Thus, the 128 MHz app
    core can only be active for 4ms per second to meet the 1-year requirement.'
