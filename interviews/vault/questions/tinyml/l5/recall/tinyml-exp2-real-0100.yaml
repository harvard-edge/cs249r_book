schema_version: 1
id: tinyml-exp2-real-0100
title: Roofline Analysis of Depthwise Convolutions
topic: roofline-analysis
status: published
provenance: imported
scenario: We are deploying a keyword spotting CNN on an ARM Cortex-M4 (STM32F4) running at 168 MHz. The
  microcontroller features 256 KB of SRAM, 1 MB flash, and uses CMSIS-NN for SIMD execution (2x INT8 MACs/cycle).
  The network's most time-consuming layer is a 3x3 depthwise convolution. You must evaluate whether this
  specific layer is compute-bound or memory-bound under the roofline model and calculate its theoretical
  maximum throughput.
details:
  realistic_solution: Unlike standard convolutions, depthwise convolutions lack weight reuse across input
    channels, drastically lowering their arithmetic intensity. On the STM32F4, the peak MAC throughput
    outpaces the SRAM memory bandwidth for low-intensity operations. The layer operates on the memory-bound
    slope of the roofline model, meaning performance is dictated by memory fetch speed rather than the
    SIMD MAC units.
  common_mistake: Candidates often assume that all convolutions are compute-bound and fail to recalculate
    arithmetic intensity for depthwise layers. They also frequently forget to account for the dual-MAC
    per cycle SIMD capability of the STM32F4, leading to an incorrect ridge point calculation.
  napkin_math: 'Peak Compute: 168 MHz * 2 MACs/cycle * 2 OPs/MAC = 672 MOPs/sec. Max Memory Bandwidth:
    1 32-bit word/cycle = 4 bytes * 168 MHz = 672 MB/sec. Machine Balance (Ridge Point): 672 MOPs / 672
    MB/s = 1.0 MOPs/byte. Depthwise Conv (3x3) Arithmetic Intensity: 9 MACs (18 OPs) requires 9 bytes
    of input, 9 bytes of weights, and 1 byte of output = 19 bytes. Intensity = 18 OPs / 19 bytes = 0.947
    MOPs/byte. Since 0.947 < 1.0, the operation is memory-bound. Max throughput = 0.947 MOPs/byte * 672
    MB/sec = 636.4 MOPs/sec (under-utilizing the 672 MOPs/sec peak).'
