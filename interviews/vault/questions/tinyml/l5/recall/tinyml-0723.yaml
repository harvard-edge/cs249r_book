schema_version: 1
id: tinyml-0723
title: The L1 Cache Miss Penalty
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You are implementing a Transposed Convolution (often used in audio upsampling) on an MCU with
  an L1 Data Cache. The input array is small. To perform the transpose, your C code reads sequentially
  from the input array, but writes to the output array using a massive stride (`output[i * 256] = val;`).
  The profiler shows the CPU is stalling constantly. Why does writing to memory with a stride destroy
  performance?
details:
  realistic_solution: 'Strided writes cause continuous cache line evictions. Writing to output[i*256]
    with 32-byte cache lines means each write targets a different cache line. The CPU must: (1) fetch
    the entire 32-byte cache line from SRAM (read-allocate policy, ~6 cycles), (2) modify 4 bytes, (3)
    evict the previous cache line (write-back, ~6 cycles). Effective cost: 12 cycles per write vs 1 cycle
    for sequential writes (which pack 8 floats per cache line). That is a 12-16x bandwidth amplification.
    Fix: transpose the loop order so writes are sequential, or use a tile-based approach that keeps the
    output within one cache line.'
  common_mistake: '"Writing to RAM is slower than reading." RAM write speeds are symmetrical. The problem
    is how the cache handles the writes.'
  napkin_math: Sequential write = 1 SRAM access per 8 floats. Strided write = 2 SRAM accesses per 1 float.
    You increased the physical memory bandwidth requirement by a factor of 16x.
