schema_version: 1
id: tinyml-0771
title: The Interrupt-Driven Sensor Fusion
topic: 3d-parallelism
status: draft
provenance: imported
scenario: 'A Cortex-M4 fuses data from 3 sensors: accelerometer (100 Hz, 2ms ISR), microphone (16 kHz
  via DMA, 0.1ms ISR per 256-sample block), and temperature (1 Hz, 0.5ms ISR). The main loop runs a 30ms
  neural network inference. Calculate the total ISR overhead per second and determine whether any inference
  deadlines are missed due to ISR preemption.'
details:
  realistic_solution: 'Accelerometer ISR: 100 Hz × 2ms = 200ms/s. Microphone DMA ISR: 16,000/256 = 62.5
    Hz × 0.1ms = 6.25ms/s. Temperature ISR: 1 Hz × 0.5ms = 0.5ms/s. Total ISR load: 206.75ms/s = 20.7%
    CPU overhead. During a 30ms inference: ISR preemption adds ~30ms × 0.207 = 6.2ms. Actual inference
    wall time: 30 + 6.2 = 36.2ms. If the deadline is 40ms (25 Hz), it''s met. If 33ms (30 Hz), it''s missed.
    The accelerometer ISR dominates — consider moving its processing to DMA + polling to reduce ISR overhead.'
  common_mistake: Ignoring that ISRs preempt the main loop inference. Even if each ISR is short, their
    cumulative effect extends the inference wall time beyond 30ms. Candidates also forget that the microphone
    ISR fires very frequently (62.5 Hz for 256-sample blocks at 16 kHz).
  napkin_math: 'Accel: 100 × 2ms = 200ms/s. Mic DMA: 62.5 × 0.1ms = 6.25ms/s. Temp: 1 × 0.5ms = 0.5ms/s.
    Total ISR: 206.75ms/s → 20.7% CPU. Inference stretch: 30ms / (1 - 0.207) = 37.8ms. Or approximation:
    30 + 30×0.207 = 6.2ms. Budget at 25 Hz (40ms): OK. Budget at 30 Hz (33ms): MISS by 3.2ms.'
