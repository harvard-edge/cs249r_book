schema_version: 1
id: tinyml-0607
title: The Energy Harvesting Inference Budget
topic: duty-cycling
status: draft
provenance: imported
scenario: 'Your structural health monitoring sensor is powered by a solar energy harvesting system: a
  2 cm² indoor solar cell (generating ~10 µW under 500 lux office lighting) charging a 100 µF supercapacitor.
  The MCU is an Apollo4 Blue (Cortex-M4F, 192 MHz, 2 MB SRAM, 2 MB MRAM) running a vibration anomaly model.
  The model inference costs 1.2 mJ. How many inferences per hour can you sustain, and what happens during
  a cloudy day when light drops to 50 lux?'
details:
  realistic_solution: 'Build the complete energy budget: 500 lux: 10 µW net → 36 mJ/hr. Sleep: 3.6 mJ/hr.
    Inference budget: 32.4 mJ/hr → 27 inferences/hr. 200 lux: 4 µW net → 14.4 mJ/hr. Sleep: 3.6 mJ/hr.
    Budget: 10.8 mJ/hr → 9 inferences/hr. 50 lux: 1 µW net → 3.6 mJ/hr. Sleep: 3.6 mJ/hr. Budget: 0 mJ/hr
    → 0 inferences. The system cannot sustain any inferences at 50 lux without draining the capacitor.'
  common_mistake: '"20 µW harvested / energy per inference = inferences per second. Simple division."
    This ignores the energy storage dynamics, the MCU''s sleep power, and the harvester''s efficiency.'
  napkin_math: '500 lux: 10 µW net → 36 mJ/hr. Sleep: 3.6 mJ/hr. Inference budget: 32.4 mJ/hr → 27 inferences/hr.
    200 lux: 4 µW net → 14.4 mJ/hr. Sleep: 3.6 mJ/hr. Budget: 10.8 mJ/hr → 9 inferences/hr. 50 lux: 1
    µW net → 3.6 mJ/hr. Sleep: 3.6 mJ/hr. Budget: 0 mJ/hr → 0 inferences. Breakeven lux for 1 inference/hr:
    sleep + 1 inference = 3.6 + 1.2 = 4.8 mJ/hr. Required harvest: 4.8 mJ / 3,600 s = 1.33 µW net = 2.67
    µW gross. Solar cell output at breakeven: 2.67 µW / (20 µW / 500 lux) = 66.7 lux. Below 67 lux: the
    system cannot sustain even 1 inference per hour.'
