schema_version: 1
id: tinyml-exp-desi-0037
title: ESP32-S3 Acoustic Degradation Ladder
topic: graceful-degradation
status: published
provenance: imported
scenario: You are designing an always-on acoustic anomaly detection system for industrial machinery running
  on an ESP32-S3 (240 MHz dual-core Xtensa, 512 KB SRAM, 8 MB PSRAM). The primary INT8 CNN uses vector
  extensions for high-accuracy classification and relies on WiFi to report anomalies. If the WiFi connection
  drops or the device experiences severe battery drain, the system must continue to provide value. Architect
  a graceful degradation strategy that maintains fail-operational safety monitoring while adapting to
  constrained resources.
details:
  realistic_solution: 'A robust design uses a degradation ladder. Tier 1 (Normal): Dual-core active, primary
    CNN utilizing INT8 vector extensions in PSRAM, WiFi reporting. Tier 2 (Network Loss): Cache events
    in PSRAM, switch to lower-power BLE for proximity alerts. Tier 3 (Critical Power): Shut down the 8
    MB PSRAM, WiFi/BLE, and one core. Fallback to a tiny DSP energy-thresholding algorithm or a micro-CNN
    that fits entirely within the 512 KB SRAM, ensuring the system remains fail-operational for catastrophic
    anomalies.'
  common_mistake: Candidates often suggest dropping the audio sampling rate, which breaks the acoustic
    model's expected input shape without retraining. Another common error is assuming they can dynamically
    load fallback models from flash without interrupting the real-time audio buffer, or ignoring the power
    penalties of keeping the 8 MB PSRAM active during low-battery states.
  napkin_math: The primary model uses 2 MB of the 8 MB PSRAM. During critical power degradation, PSRAM
    is powered off. The ESP32-S3 has 512 KB SRAM. Reserving 128 KB for the RTOS and audio DMA buffers
    leaves 384 KB. A fallback INT8 model with 150K parameters needs 150 KB for weights and ~100 KB for
    intermediate activations (250 KB total), safely fitting in the remaining 384 KB SRAM to maintain a
    fail-safe operational state.
