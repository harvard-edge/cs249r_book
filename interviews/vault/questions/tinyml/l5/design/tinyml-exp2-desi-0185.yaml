schema_version: 1
id: tinyml-exp2-desi-0185
title: Dual-Core Latency Pipeline for BLE Wake-Word
topic: latency-decomposition
status: published
provenance: imported
scenario: You are designing a continuous keyword spotting system for a wearable device using the Nordic
  nRF5340 dual-core SoC. The system must capture audio, run MFCC feature extraction, execute a quantized
  neural network that fits entirely in the 256 KB SRAM and 1 MB flash, and transmit a trigger via BLE
  5.3 to a host phone. The strict end-to-end latency budget from audio event to phone reception is 150ms.
  How would you architect the pipeline across the 128 MHz application core and 64 MHz network core to
  decompose these latency components and minimize overlapping active time to respect the ~5mA active power
  constraint?
details:
  realistic_solution: A robust design decomposes the latency by fully pipelining tasks across the SoC's
    hardware boundaries. Audio DMA handles continuous sensing independently. The 128 MHz app core processes
    the completed audio frame (MFCCs + inference) while the next frame is buffering. Upon a positive detection,
    the app core immediately dispatches the event via inter-core messaging to the 64 MHz network core.
    The network core asynchronously handles the BLE 5.3 stack and transmission, allowing the app core
    to immediately return to a low-power state or begin processing the next frame, thereby safely meeting
    the 150ms budget by overlapping compute and network latencies.
  common_mistake: Candidates often design a purely sequential pipeline on a single core and treat the
    network transmission as a blocking post-processing step. They fail to leverage the nRF5340's dual-core
    architecture to parallelize heavy inference on the 128 MHz app core with the BLE protocol stack and
    packet transmission on the 64 MHz net core.
  napkin_math: 'App core (128 MHz) budget for 150ms: 19.2M cycles. Audio DMA frame buffer: 20ms. Preprocessing
    (MFCCs on app core): 2ms. Inference (DS-CNN on app core): 45ms. Inter-core IPC overhead: 1ms. BLE
    5.3 connection interval and TX (on 64 MHz net core): 30ms. Sequential end-to-end latency: 20ms + 2ms
    + 45ms + 1ms + 30ms = 98ms. This provides a comfortable 52ms margin against the 150ms budget. By isolating
    the 30ms BLE TX to the network core, the application core can sleep earlier, reducing the time spent
    at the ~5mA active current peak.'
