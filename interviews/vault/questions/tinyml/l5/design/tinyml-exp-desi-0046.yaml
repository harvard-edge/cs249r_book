id: tinyml-exp-desi-0046
title: Profiling CPU-NPU Memory Contention on Corstone-300
topic: profiling-bottleneck-analysis
status: published
provenance: imported
scenario: You are tasked with designing a continuous profiling subsystem for a vision model running on
  an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform. The M7 runs at 480 MHz and the system relies on
  a tightly constrained 512 KB of shared SRAM. The model experiences intermittent high latency spikes
  during deployment, and you suspect memory bus contention between the M7's data cache misses and the
  Ethos-U55's DMA engine. Architect a non-intrusive trace and profiling strategy to definitively isolate
  whether the bottleneck is compute-bound on the NPU or memory-bound due to SRAM contention.
details:
  realistic_solution: Architect a hardware-assisted profiling pipeline using the ARM CoreSight ETM for
    the M7 and the Ethos-U55's dedicated Performance Monitor Units (PMUs). Configure the NPU's PMU to
    count active MAC cycles versus AXI bus stall cycles, and use the M7's Data Watchpoint and Trace (DWT)
    to monitor CPU memory stall cycles. Correlating these hardware counters allows the team to pinpoint
    the exact inference layers where the shared SRAM bandwidth is saturated, driving decisions on memory
    layout optimization.
  common_mistake: Candidates often suggest software-level instrumentation, such as toggling GPIOs or injecting
    RTOS timestamps before and after inference operations. On a strict real-time system with shared 512
    KB SRAM, software instrumentation introduces a massive observer effect and cannot capture cycle-level
    bus matrix stalls between the M7 and the Ethos-U55 NPU.
  napkin_math: Assume the Ethos-U55 is instantiated with the 256 MAC/cycle configuration. At the system
    clock of 480 MHz, peak NPU throughput is 480,000,000 * 256 = 122.8 GMAC/s. A convolution layer requiring
    2,000,000 MACs should ideally take 2,000,000 / 256 = 7,812 cycles (approx. 16.2 microseconds). If
    the NPU PMU reports 15,000 total cycles for this layer alongside 7,000 AXI bus stall cycles, it proves
    that roughly 46% (7,000 / 15,000) of the layer's latency is caused purely by SRAM contention, dictating
    a need to redesign the memory access patterns rather than pruning the model architecture.
