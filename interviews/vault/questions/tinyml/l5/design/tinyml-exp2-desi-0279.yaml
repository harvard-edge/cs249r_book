schema_version: 1
id: tinyml-exp2-desi-0279
title: ESP32-S3 Dual-Model Tensor Arena Architecture
topic: tensor-arena-planning
status: published
provenance: imported
scenario: You are architecting an audio processing pipeline on an ESP32-S3, featuring a 240 MHz dual-core
  Xtensa, 512 KB of internal SRAM, and 8 MB of PSRAM. The system runs an always-on wake-word model requiring
  a 150 KB tensor arena, and a secondary noise-cancellation model requiring a 350 KB arena. WiFi, BLE,
  and audio DMA buffers consume a fixed 150 KB of internal SRAM. How do you design the memory planning,
  operator scheduling, and arena placement between SRAM and PSRAM to meet real-time latency requirements
  without exceeding the memory budget?
details:
  realistic_solution: A strong L5 candidate will evaluate the memory hierarchy and permanently pin the
    150 KB wake-word arena in the fast internal SRAM for low-power, always-on inference. Since the remaining
    SRAM cannot hold the 350 KB noise-cancellation arena, they will place it in the 8 MB PSRAM. They should
    also design a scheduling strategy that utilizes the ESP32-S3's cache or allocates a small SRAM scratchpad
    to buffer intermediate INT8 tensor operations, mitigating the PSRAM latency penalty.
  common_mistake: Candidates often try to allocate all arenas dynamically or place both in internal SRAM,
    ignoring the hard 512 KB limit. Another mistake is placing the always-on wake-word arena in PSRAM,
    which severely degrades inference latency and increases power consumption due to cache misses.
  napkin_math: 'Total internal SRAM: 512 KB. Fixed system/radio/DMA overhead: 150 KB. Available SRAM for
    inference: 512 - 150 = 362 KB. Wake-word arena: 150 KB. Remaining SRAM: 362 - 150 = 212 KB. Noise-cancellation
    arena: 350 KB. Since 350 KB > 212 KB, the noise-cancellation arena cannot fit in internal SRAM and
    must be allocated within the 8 MB PSRAM, relying on the ESP32-S3''s data cache to feed the INT8 vector
    extensions.'
