schema_version: 1
id: tinyml-exp2-desi-0194
title: ESP32-S3 Audio Wake-Word Quantization Pipeline
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You are designing the quantization architecture for a 400K parameter CNN wake-word model deploying
  to an ESP32-S3. To meet a strict 15ms inference latency, the model weights and activations must reside
  entirely within the 512 KB SRAM, avoiding the slower 8 MB PSRAM. The ESP32-S3 features a 240 MHz dual-core
  Xtensa processor with vector extensions specifically optimized for INT8 MAC operations. Evaluate and
  design the optimal quantization strategy (PTQ vs QAT, symmetric vs asymmetric) to fit the memory constraints
  while preserving audio classification accuracy.
details:
  realistic_solution: The best approach is to use Quantization-Aware Training (QAT) with symmetric INT8
    quantization for both weights and activations. Symmetric quantization forces the zero-point to 0,
    eliminating the cross-term multiplication overhead in the MAC operations, perfectly aligning with
    the ESP32-S3's INT8 vector instructions. QAT recovers the accuracy lost by restricting the dynamic
    range symmetrically, and per-channel weight scales can be folded offline.
  common_mistake: Candidates often blindly recommend per-channel asymmetric PTQ to preserve accuracy without
    considering the ESP32-S3's hardware. Asymmetric quantization requires zero-point arithmetic overhead
    during runtime, which consumes extra CPU cycles and registers, potentially missing the 15ms latency
    deadline.
  napkin_math: 'FP32 Model Size: 400,000 params * 4 bytes/param = 1,600 KB (Exceeds 512 KB SRAM, would
    force use of PSRAM). INT8 Model Size: 400,000 params * 1 byte/param = 400 KB. Remaining SRAM: 512
    KB - 400 KB = 112 KB. With symmetric quantization, we save 2 operations per MAC (no zero-point offset
    subtraction). For a 10M MAC inference at 240 MHz, saving 2 ops/MAC eliminates 20M operations, ensuring
    we hit the 15ms deadline when utilizing the Xtensa vector extensions.'
