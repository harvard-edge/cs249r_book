schema_version: 1
id: tinyml-exp-desi-0039
title: Designing a Distillation Pipeline for ESP32-S3 Audio Classification
topic: knowledge-distillation
status: published
provenance: imported
scenario: You are tasked with deploying an always-on audio classification model on an ESP32-S3 to detect
  environmental anomalies. The cloud-based teacher model is a 25MB transformer, which vastly exceeds the
  ESP32-S3's 512 KB SRAM and 8 MB PSRAM limits, and its latency is too high for the 240 MHz Xtensa cores.
  Design a knowledge distillation pipeline to compress this teacher into an INT8-quantized student CNN
  that fits entirely in SRAM. Evaluate the tradeoffs between logit matching and feature distillation while
  maximizing the use of the ESP32-S3's INT8 vector extensions.
details:
  realistic_solution: The optimal design restricts the student model to fit entirely within the 512 KB
    SRAM for minimal power consumption and maximum speed. The training pipeline should rely primarily
    on soft-target logit matching, as the architectural gap between the transformer and CNN makes feature
    matching brittle. The student architecture must be co-designed with quantization-aware training (QAT)
    to ensure operations align perfectly with the Xtensa cores' INT8 vector extensions.
  common_mistake: Candidates often suggest placing the student model weights in the 8 MB PSRAM without
    considering the significant latency and power penalties of SPI transactions. They also frequently
    propose complex intermediate feature distillation that does not easily map from a large transformer
    to a highly quantized INT8 CNN student.
  napkin_math: Total SRAM is 512 KB. Reserving ~162 KB for ESP-IDF RTOS, WiFi/BLE stacks, and DMA audio
    buffers leaves ~350 KB for the model. For an INT8 student, 1 weight = 1 byte, so max size is ~300K
    parameters, leaving 50 KB for activations. The 25MB teacher has ~6.5M FP32 parameters, requiring a
    >20x parameter compression. The ESP32-S3 vector extensions compute 16 INT8 MACs per cycle per core.
    At 240 MHz, peak throughput is 2 * 240M * 16 = 7.68 GMAC/s. A 15 MMAC INT8 student will take roughly
    15M / 7.68G = 1.95ms to execute, comfortably meeting real-time latency goals.
