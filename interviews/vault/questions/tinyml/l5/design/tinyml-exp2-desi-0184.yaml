id: tinyml-exp2-desi-0184
title: Architecting Knowledge Distillation for KWS on ESP32-S3
topic: knowledge-distillation
status: published
provenance: imported
scenario: You are designing an always-on keyword spotting system for an ESP32-S3 microcontroller (240
  MHz dual-core Xtensa, 512 KB SRAM, 8 MB PSRAM) deployed in a smart home device. The baseline teacher
  model achieves high accuracy but requires 2MB of RAM, far exceeding the fast 512 KB SRAM limit. You
  need to architect a knowledge distillation pipeline to train a student model that fits entirely in SRAM
  and leverages the ESP32-S3's INT8 vector extensions. How do you design the distillation process and
  student architecture to maximize accuracy while guaranteeing inference executes solely from SRAM?
details:
  realistic_solution: The optimal design combines knowledge distillation with QAT. The FP32 teacher model
    generates soft targets and intermediate feature representations. The student model is constructed
    with depthwise separable convolutions optimized for INT8 execution and is trained using QAT to match
    the teacher's outputs. To ensure the model fits in SRAM alongside system overhead, the student architecture
    is heavily constrained, aiming for a peak memory footprint of around 250-300 KB, completely avoiding
    PSRAM during inference to meet strict latency requirements.
  common_mistake: Candidates often propose standard logit matching without incorporating Quantization-Aware
    Training (QAT), leading to severe accuracy drops when the student is post-training quantized for the
    ESP32-S3's INT8 extensions. They also frequently fail to account for the RTOS and application memory
    overhead in the 512 KB SRAM, proposing a student model that is too large and spills into the significantly
    slower PSRAM.
  napkin_math: 'Available SRAM: 512 KB. Assume RTOS/WiFi and audio buffers consume ~200 KB, leaving ~312
    KB for the model. At INT8 (1 byte/parameter and activation), the student model''s combined weights
    and peak activation buffer must be < 312 KB. With ESP32-S3 running at 240 MHz and executing INT8 vector
    instructions (e.g., 4 MACs/cycle), theoretical peak throughput is 240M * 4 = 960 MMACs/sec. For a
    20ms inference latency target, the student model''s complexity is strictly bounded to 960 MMACs/sec
    * 0.02s = 19.2 MMACs.'
