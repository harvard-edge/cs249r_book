schema_version: 1
id: tinyml-exp-desi-0049
title: On-Device Bias Guardrails for Edge Audio
topic: responsible-ai
status: published
provenance: imported
scenario: You are designing a health monitoring wearable that uses voice biomarkers to detect respiratory
  anomalies, deploying on an ARM Cortex-M7 + Ethos-U55 (Corstone-300). Impact assessments reveal the primary
  model exhibits significant bias, failing on specific demographic dialects and age groups. To satisfy
  organizational accountability frameworks, you must architect an on-device guardrail system to identify
  out-of-distribution (OOD) dialects and safely reject predictions. Detail how you would design this guardrail
  architecture, partition the workloads between the 480 MHz M7 and the Ethos-U55, and manage the 512 KB
  shared SRAM to ensure fairness without violating latency constraints.
details:
  realistic_solution: Architect a cascaded pipeline where the 480 MHz M7 CPU runs a lightweight feature
    extractor and a classical anomaly detector (like an Isolation Forest or GMM) as the guardrail. The
    system only triggers the Ethos-U55 NPU to execute the primary respiratory model if the audio is deemed
    in-distribution. This isolates the inference workload, guarantees privacy, mitigates bias, and efficiently
    partitions tasks to avoid memory bottlenecks in the shared SRAM.
  common_mistake: Candidates often suggest cloud-based OOD detection, which violates privacy constraints,
    or propose running a secondary deep neural network for dialect classification on the Ethos-U55, causing
    memory thrashing and exceeding the 512 KB shared SRAM limit.
  napkin_math: Total shared SRAM is 512 KB. Allocate 150 KB for audio ring buffers and RTOS overhead.
    The primary NPU-accelerated model requires 250 KB, leaving 112 KB. An Isolation Forest guardrail with
    100 trees takes roughly 50 KB, fitting within budget. The M7 CPU at 480 MHz executes 9.6 million cycles
    per 20ms audio frame. Running MFCC extraction and the anomaly detector takes ~2.5 million CPU cycles,
    leaving the CPU idle for power savings while keeping the Ethos-U55 (capable of 128-512 MAC/cycle)
    asleep until the guardrail explicitly permits execution.
