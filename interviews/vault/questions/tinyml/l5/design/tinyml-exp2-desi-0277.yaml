id: tinyml-exp2-desi-0277
title: CNN Backbone Architecture for Corstone-300
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You are tasked with designing the CNN backbone for a real-time vision pipeline on an ARM Cortex-M7
  + Ethos-U55 (Corstone-300) system. The platform features a 480 MHz M7 and an Ethos-U55 NPU (configured
  for 256 MACs/cycle), both sharing a strict 512 KB SRAM budget for weights and activations. How would
  you architect the network's convolution blocks (e.g., standard vs. depthwise separable, inverted residuals,
  expansion ratios) to maximize NPU utilization while preventing out-of-memory errors in the shared SRAM?
details:
  realistic_solution: The optimal design modifies the standard inverted residual blocks specifically for
    the Ethos-U55 and tight SRAM constraints. The candidate should propose using smaller expansion ratios
    (e.g., 2x or 3x instead of 6x) to control the peak activation memory footprint. Additionally, they
    should evaluate using 'fused' inverted residual blocks (replacing the 1x1 expansion and 3x3 depthwise
    convolutions with a single 3x3 standard convolution) in the early stages of the network, which significantly
    improves NPU MAC utilization and reduces memory bandwidth overhead.
  common_mistake: Candidates often blindly apply off-the-shelf MobileNetV2/V3 architectures, assuming
    depthwise separable convolutions and large expansion ratios are universally optimal. They fail to
    account for the fact that large inverted residual expansion phases can cause peak memory spikes exceeding
    the 512 KB SRAM limit, and that depthwise layers can have poor MAC utilization on the Ethos-U55 compared
    to standard convolutions.
  napkin_math: Assume an intermediate feature map of 56x56 resolution with 64 channels, using int8 quantization
    (1 byte per activation). The input tensor is 56 * 56 * 64 = 200 KB. A standard MobileNetV2 block with
    a 6x expansion creates an intermediate tensor of 56 * 56 * 384 = 1.2 MB, vastly exceeding the 512
    KB shared SRAM limit and forcing expensive tiling or failing entirely. By architecting the block with
    a reduced 2x expansion ratio, the intermediate tensor becomes 56 * 56 * 128 = 401 KB. This comfortably
    fits within the 512 KB SRAM alongside the 480 MHz M7's working memory, allowing the Ethos-U55 to execute
    the block efficiently without memory bottlenecks.
