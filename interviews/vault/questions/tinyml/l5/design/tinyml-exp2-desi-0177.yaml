schema_version: 1
id: tinyml-exp2-desi-0177
title: nRF5340 Dual-Core Compute Partitioning
topic: compute-cost-estimation
status: published
provenance: imported
scenario: You are designing a continuous health monitoring wearable on the Nordic nRF5340 platform (128
  MHz app core, 64 MHz net core, 256 KB SRAM, 1 MB flash, BLE 5.3, ~5mA active). The system extracts features
  from an IMU sensor and runs a neural network to detect anomalies, requiring a strict 100ms processing
  deadline per window. Evaluate how to architect the compute pipeline, partitioning the DSP, model inference,
  and BLE tasks across the two cores to minimize energy consumption and respect the hardware limits.
details:
  realistic_solution: The ideal architecture leverages the asymmetric cores by placing the IMU buffering,
    lightweight DSP feature extraction, and BLE 5.3 stack on the 64 MHz network core. The 128 MHz application
    core remains in deep sleep, waking only when pre-processed features are ready for the heavier anomaly
    detection inference. This minimizes the duty cycle of the ~5mA active state and prevents Bluetooth
    timing interrupts from preempting critical ML math.
  common_mistake: Candidates often map the entire ML pipeline (DSP and NN) onto the faster 128 MHz application
    core for simplicity, treating the 64 MHz core purely as a BLE black box. They fail to evaluate the
    compute cost tradeoffs of waking the high-power core for trivial DSP tasks versus pipelining operations
    to maximize sleep time.
  napkin_math: Within a 100ms deadline, the 128 MHz app core yields 12.8M cycles and the 64 MHz net core
    yields 6.4M cycles. Assume DSP takes 3M cycles and the NN takes 8M cycles. Running both on the app
    core takes 11M cycles (85.9ms active at ~5mA). Offloading the 3M cycle DSP to the net core uses 46.8ms
    of its budget (concurrent with BLE), allowing the app core to wake for only 8M cycles (62.5ms). This
    isolates the compute workloads, saves app core power, and comfortably meets the 100ms latency requirement.
