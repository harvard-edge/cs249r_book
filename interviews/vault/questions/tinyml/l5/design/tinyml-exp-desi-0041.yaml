schema_version: 1
id: tinyml-exp-desi-0041
title: Ethos-U55 Fallback Delegation and SRAM Strategy
topic: model-format-conversion
status: published
provenance: imported
scenario: You are deploying a quantized vision model to an ARM Cortex-M7 + Ethos-U55 (Corstone-300) subsystem.
  The platform features a 480 MHz Cortex-M7 and an Ethos-U55 NPU configured for 256 MACs/cycle, sharing
  a strict 512 KB of SRAM. During TFLite to Vela compiler conversion, you notice a custom activation block
  is unsupported by the NPU and must fall back to the Cortex-M7. Design the model conversion and runtime
  delegation strategy to handle this fallback without exceeding the 512 KB SRAM limit or causing severe
  latency bottlenecks.
details:
  realistic_solution: The optimal design evaluates avoiding the fallback entirely by replacing the unsupported
    operators with NPU-native equivalents (e.g., standard ReLU) during model authoring. If the fallback
    is unavoidable, the candidate should architect a sub-graph splitting strategy where the Vela compiler
    statically schedules the NPU portions, and a custom memory planner overlaps the M7 tensor arena with
    the NPU's working memory, ensuring peak memory usage during the context switch remains under 512 KB.
  common_mistake: Candidates often assume that CPU fallback only affects latency and ignore the memory
    implications. They fail to realize that crossing the NPU-CPU boundary forces intermediate tensors
    to be fully materialized in the shared 512 KB SRAM, bypassing the NPU's internal buffering, which
    frequently leads to out-of-memory errors.
  napkin_math: If the model's intermediate tensor at the fallback boundary is 112x112x32 (int8), it requires
    112 * 112 * 32 = 401,408 bytes (~392 KB). With only 512 KB total SRAM shared with the M7, this leaves
    just ~120 KB for the RTOS, stack, and NPU command stream. In terms of compute, falling back to the
    480 MHz M7 (assuming ~0.5 MAC/cycle for unoptimized custom ops) for a 5M MAC layer takes 5,000,000
    / (480,000,000 * 0.5) = ~20.8ms. In contrast, the Ethos-U55 at 256 MACs/cycle executes it in 5,000,000
    / (480,000,000 * 256) = ~0.04ms, highlighting a massive latency penalty alongside the memory risk.
