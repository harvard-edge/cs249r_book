schema_version: 1
id: tinyml-exp-desi-0032
title: Secure TinyML Keyword Spotting Architecture
topic: adversarial-robustness
status: published
provenance: imported
scenario: Architect an always-on keyword spotting system for a smart lock running on an ARM Cortex-M4
  (STM32F4) that must be resilient against model extraction via timing and power side-channel attacks.
  You have a 168 MHz CPU, 256 KB SRAM, 1 MB flash, no FPU, and CMSIS-NN SIMD (2x INT8 MACs/cycle). Design
  a defense strategy that masks execution patterns without violating a strict 50ms end-to-end inference
  latency budget.
details:
  realistic_solution: The optimal design relies on constant-time execution and lightweight execution randomization.
    By exclusively using deterministic CMSIS-NN INT8 operations, timing side-channels are inherently mitigated.
    To defend against power analysis, the architecture should implement random channel shuffling during
    grouped convolutions and inject deterministic dummy MAC operations, trading a small amount of latency
    and SRAM for security.
  common_mistake: Candidates often propose heavyweight cryptographic masking or homomorphic encryption,
    which completely overwhelm the 168 MHz CPU and lack of FPU. Another common error is failing to leverage
    the deterministic timing of CMSIS-NN, instead suggesting complex software workarounds that break real-time
    guarantees.
  napkin_math: A standard KWS model requires 4 million MACs. On the STM32F4 using CMSIS-NN SIMD (2 MACs/cycle
    at 168 MHz), theoretical peak is 336M MACs/sec. Base inference takes 4M / 336M = 11.9ms. Adding a
    30% compute overhead for channel shuffling and dummy MACs increases the workload to 5.2M MACs (15.5ms).
    Assuming audio feature extraction takes 10ms, total latency is ~25.5ms, safely under the 50ms budget
    while operating entirely in INT8.
