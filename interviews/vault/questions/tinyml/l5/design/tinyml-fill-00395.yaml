id: tinyml-fill-00395
title: Real-Time TinyML Inference on Nordic nRF5340
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are tasked with designing a real-time anomaly detection system for an industrial sensor,
  running on a Nordic nRF5340 SoC (128 MHz CPU, 256 KB SRAM, 1 MB flash). The system needs to process
  a new sensor reading and output an inference result within a strict 33ms frame budget to prevent critical
  system jank and meet a hard real-time control loop deadline. The ML model is a pre-trained, quantized
  convolutional neural network that requires approximately 60 KB of memory for its weights and intermediate
  activations. Describe your architectural design, focusing on how you would guarantee real-time performance
  and prevent ANR (Application Not Responding) timeouts, considering the constraints of the nRF5340.
details:
  realistic_solution: 'A robust solution involves: 1. Performing WCET analysis for the ML inference kernel
    and critical I/O paths on the nRF5340 to ensure the 33ms budget is never exceeded. This might involve
    static timing analysis or extensive profiling under stress. 2. Implementing an interrupt-driven pipeline
    for sensor data acquisition (e.g., via SPI/I2C DMA to offload CPU) and scheduling the ML inference
    as a high-priority, non-preemptible task within a real-time operating system (RTOS) like Zephyr. 3.
    Aggressively optimizing the ML model (further quantization, pruning, hardware-aware optimizations)
    to minimize its footprint and execution time. 4. Carefully managing memory access patterns and avoiding
    cache misses where possible, leveraging nRF5340''s memory architecture. 5. Utilizing hardware timers
    and watchdogs to monitor and enforce task deadlines, triggering appropriate error handling if an ANR
    condition is imminent.'
  common_mistake: A common mistake is to assume average-case execution time (ACET) for the ML inference
    and I/O operations, rather than performing Worst-Case Execution Time (WCET) analysis. This often leads
    to missed deadlines under peak load or unexpected contention, causing jank or ANR timeouts. Another
    pitfall is relying on a busy-polling architecture instead of a more efficient interrupt-driven pipeline
    for sensor data acquisition and result dispatch.
  napkin_math: Given a 128 MHz CPU and a 33ms frame budget, the system has approximately `128,000,000
    cycles/second * 0.033 seconds = 4,224,000 CPU cycles` available for all operations within that frame.
    If the ML model's inference takes `1.5 million cycles` (a hypothetical WCET), it leaves `4,224,000
    - 1,500,000 = 2,724,000 cycles` for sensor acquisition, pre-processing, post-processing, and communication
    overhead. This calculation highlights the tight budget and the need for significant optimization and
    careful WCET estimation for all components.
