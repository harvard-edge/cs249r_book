id: tinyml-exp-desi-0033
title: Architecting Energy-Constrained Audio Inference
topic: compute-cost-estimation
status: published
provenance: imported
scenario: You are designing an always-on acoustic event detection system on a Nordic nRF5340. The platform
  features a 128 MHz app core, a 64 MHz net core, 256 KB SRAM, 1 MB flash, and BLE 5.3, with an active
  current draw of ~5mA. You must architect the compute pipeline and duty cycle strategy to determine if
  a 1.2 MMAC neural network can be deployed while meeting a strict 1-year battery life requirement.
details:
  realistic_solution: A strong L5 candidate will evaluate the compute cost by designing a cascaded architecture
    where the MCU remains in deep sleep and is woken by a low-power hardware interrupt. They will calculate
    the maximum allowed active duty cycle to process the model and design the system to buffer audio data
    efficiently, ensuring the 128 MHz app core runs for the minimum time required.
  common_mistake: Candidates often look only at the 256 KB SRAM and 1 MB flash limits to check if the
    model fits, completely ignoring the dynamic power cost of running the 128 MHz core. They fail to evaluate
    the system-level tradeoffs between race-to-sleep strategies and the ~5mA active current penalty.
  napkin_math: Assuming a 1000 mAh battery for 1 year (8760 hours), the average current budget is 114
    µA. With the Nordic nRF5340 drawing ~5mA (5000 µA) active, the max active duty cycle is 114 / 5000
    = 2.28%. At 128 MHz, 2.28% of 1 second gives 22.8 ms of active time, yielding ~2.9 million clock cycles.
    A 1.2 MMAC model takes roughly 2.4 million cycles (assuming 2 cycles/MAC), consuming 18.7 ms or 1.87%
    duty cycle. This leaves only ~0.4% duty cycle for BLE 5.3 transmission and overhead.
