id: tinyml-cell-13214
title: Design Layer-Wise Quantization Schedule for Transformer on MCU
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'A 6-layer transformer with 512 hidden dimensions targets Cortex-M7+Ethos-U55. Full INT8 quantization
  reduces model from 12MB to 3MB (fits flash) but drops accuracy by 8%. Sensitivity analysis shows: embedding
  layer and final classifier are high-sensitivity (INT8 drops 5%), middle layers 2-5 are low-sensitivity
  (INT8 drops <1% each). SRAM budget is 256KB for activations. Design a mixed-precision quantization schedule
  that preserves accuracy while fitting memory constraints.'
details:
  realistic_solution: 'Mixed precision model: 1M params × FP16 = 2MB weights. Activation overhead is small
    (<<1MB for batch=1). Total ≈ 2MB (not 2.5MB).'
  common_mistake: Applying uniform INT4 to all layers to save more memory; embedding quantization to INT4
    causes vocabulary collapse for rare tokens.
  napkin_math: 'Model memory in mixed precision: weights FP16 + activations FP32. 1M params × 2B (FP16)
    = 2MB weights. Activations at FP32: input 32×32×16×4B = 65,536B = 64KB. Total: 2MB + 64KB = ~2MB (not
    2.5MB — 2.5MB would require 512KB activations which needs batch=8 or larger intermediate layers).'
