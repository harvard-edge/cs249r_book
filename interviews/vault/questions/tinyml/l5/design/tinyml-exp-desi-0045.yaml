schema_version: 1
id: tinyml-exp-desi-0045
title: Dual-Core Power Partitioning on nRF5340
topic: power-budgeting
status: published
provenance: imported
scenario: You are designing an always-on acoustic anomaly detector using the Nordic nRF5340, which features
  a 128 MHz application core, a 64 MHz network core, 256 KB SRAM, 1 MB flash, and BLE 5.3 capabilities.
  The system must sample audio continuously, run inference, and transmit an alert via BLE upon detecting
  an anomaly, all while strictly adhering to a 1 mW average power budget on a coin cell battery. Evaluate
  the architectural tradeoffs of partitioning the DSP feature extraction and neural network inference
  across the two cores versus using a race-to-sleep strategy on the application core alone.
details:
  realistic_solution: 'The optimal design involves a cascaded pipeline: the DMA and low-power peripherals
    handle continuous audio buffering into SRAM while both cores sleep. The lower-power 64 MHz network
    core wakes up periodically to perform basic DSP (e.g., MFCCs) and run a tiny first-stage cascade classifier.
    The power-hungry 128 MHz app core and BLE subsystem are only awakened when the network core detects
    a high-probability event, thereby minimizing the average active duty cycle.'
  common_mistake: Candidates often blindly apply a 'race-to-sleep' strategy by waking the 128 MHz application
    core to process every audio frame as quickly as possible, ignoring the fact that frequent wake-ups
    dominate the power profile. They also frequently fail to utilize the 64 MHz network core for anything
    other than BLE, missing the opportunity to use it as a low-power sensor hub.
  napkin_math: At 3V, the ~5mA active current equates to 15 mW of active power. To stay under a 1 mW (1000
    μW) average budget, the system can only afford a ~6.6% active duty cycle (1mW / 15mW). In a 1-second
    window, this allows roughly 66ms of active time. If inference takes 20ms on the app core (300 μJ)
    and BLE transmission takes 15ms (225 μJ), a single event consumes 525 μJ. If the app core wakes up
    every second, it consumes over half the budget before accounting for sleep currents, microphone power,
    and DMA, demonstrating the necessity of offloading continuous listening to a lower-power state or
    the 64 MHz core.
