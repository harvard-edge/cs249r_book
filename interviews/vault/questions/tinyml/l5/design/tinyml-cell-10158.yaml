title: 'Mastery: depthwise separable conv SRAM layout optimization for Cortex-M4'
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You are optimizing a depthwise separable convolution for Cortex-M4 (168MHz, 256KB SRAM, no cache,
  Harvard architecture). The layer processes 16×16×64 input with 3×3 depthwise + 64→64 pointwise. Demonstrate
  mastery of the memory access pattern, tiling strategy, and SIMD optimization using the M4's DSP extensions.
details:
  realistic_solution: 1.05M MACs at 4 MACs/2 cycles SIMD = 1.05M × 0.5 cycles/MAC = 525K cycles (not 262K
    which assumes 4 MACs/1 cycle).
  common_mistake: Loading the full 16×16×64 input tensor before computing any outputs, requiring 16KB
    in SRAM just for the input; instead, use row-by-row tiling so only 3 rows at a time need to be in
    SRAM (halo tiling for 3×3 kernel).
  napkin_math: 'Cortex-M4 at 168MHz: 1.05M MACs. Each MAC = 2 FLOPs. SIMD: 4 MACs per 2 cycles (using
    SIMD instruction). Cycles required: 1.05M MACs / (4 MACs/2 cycles) = 1.05M × 2/4 = 525K cycles (not
    262K which uses 4 MACs/1 cycle — SIMD takes 2 cycles not 1).'
