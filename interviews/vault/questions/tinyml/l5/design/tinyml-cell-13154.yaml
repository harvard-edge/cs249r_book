id: tinyml-cell-13154
title: 'TinyML TCO Design: Cortex-M7+Ethos-U55 for Industrial TinyML'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Design the cost model for deploying Cortex-M7+Ethos-U55 (480MHz, 512KB SRAM, NPU) vs bare Cortex-M4
  (168MHz, 256KB SRAM) for vibration-based anomaly detection in 500 industrial pumps. Model: MobileNetV2-adapted
  (600K ops INT8). Inference every 1 second. Include hardware, power, and total 5-year TCO. NPU enables
  INT8 inference; M4 must use INT16 or software INT8.'
details:
  realistic_solution: 'M4 (600K ops at 168MHz, 5 CPI avg): cycles = 600K*5=3M cycles. Time = 3M/168M=17.9ms.
    At 30mA (active): 30mA*17.9ms=0.537mC. Every second: 0.537mA continuous from inference. Plus 30μA
    idle between: 0.982s*0.03mA=0.0295mA. Total: 0.567mA + 0.03mA = 0.597mA avg. M7+Ethos: NPU runs at
    ~50MHz, 5mA for NPU. Time: 600K ops at 50MHz (NPU efficient): 600K/50M=12ms. Plus M7 at 1mA idle.
    Avg: 5mA*12ms/1s+1mA*988ms/1s=0.06+0.988=1.048mA. Wait — M4 is more efficient here! M7 higher idle
    current. Check: M4 active 30mA vs M7+Ethos NPU at 5mA: M7+Ethos wins if inference time is long.'
  common_mistake: Assuming the NPU doesn't change inference power vs CPU, when in fact the Ethos-U55 NPU
    runs at a lower power state than the full Cortex-M7 CPU, reducing average power during inference significantly.
  napkin_math: 'M4: Active 30mA at 167.9ms/sec total active time (17.9ms inference + standby). Wait: 1
    inference/sec at 17.9ms: duty=1.79%. M4 avg: 0.0179*30mA + 0.9821*0.05mA (deep sleep)=0.537+0.049=0.586mA.
    M7+Ethos: NPU 5mA for 12ms, M7 idle 1mA: 0.012*5+0.988*1=0.06+0.988=1.048mA. M4 WINS on power (0.586
    vs 1.048mA)! M7+Ethos only wins if: model is too large for M4 (limited to 256KB SRAM: MobileNetV2-adapted
    likely fits). Conclusion: M4 cheaper ($5 vs $15 MCU) AND more power efficient for this workload. 5yr
    TCO: M4=500*($5+5yr*0.586mA*3.7V*8760hr*$0.10/1000)=500*($5+$0.0948)=$2,547. M7+Ethos: 500*$15+power=$7,500+$4,303=$11,803.
    M4 wins by $9,256.'
