id: tinyml-exp2-desi-0278
title: Solar-Powered Acoustic Event Duty Cycle Design
topic: duty-cycling
status: published
provenance: imported
scenario: You are architecting a remote acoustic poaching detection system powered entirely by a small
  solar harvester and a supercapacitor. The core processing unit is an ARM Cortex-M4 (STM32F4) running
  at 168 MHz with 256 KB SRAM, 1 MB flash, and no FPU. Design a sleep/wake scheduling strategy that balances
  the need for continuous environmental monitoring with the strict energy constraints, evaluating tradeoffs
  between always-on sampling versus hardware-triggered inference.
details:
  realistic_solution: The optimal design uses an external ultra-low-power microphone with an analog envelope
    detector to serve as a primary hardware wake-up interrupt. When triggered, the STM32F4 wakes from
    deep sleep, buffers the audio into SRAM, and rapidly executes the quantized INT8 model. By utilizing
    CMSIS-NN SIMD instructions, the MCU completes the inference in half the clock cycles, heavily minimizing
    its active time at 168 MHz before returning to a micro-amp deep sleep state.
  common_mistake: Candidates often propose a continuous polling architecture that keeps the 168 MHz MCU
    active too long, bleeding the energy budget. They also frequently fail to leverage the platform's
    CMSIS-NN SIMD capabilities to compress the active inference window, or ignore the power costs of retaining
    the 256 KB SRAM during deep sleep.
  napkin_math: 'Assume an acoustic classification model requires 5M MACs. Without SIMD: 5M cycles / 168
    MHz = 29.7 ms active time. With CMSIS-NN SIMD (2x INT8 MACs/cycle): 2.5M cycles / 168 MHz = 14.8 ms.
    Assuming the STM32F4 draws 30 mA at 3.3V (99 mW) active power: 99 mW * 14.8 ms = 1.46 mJ per inference.
    If the solar harvester provides a continuous 5 mW (5 mJ/sec), the system can support a maximum of
    3 full wake-ups per second (4.38 mJ) while keeping the energy budget positive.'
