id: tinyml-fill-01401
title: Secure TinyML Anomaly Detection on ESP32-S3 Against Adversarial Attacks
topic: adversarial-robustness
status: published
provenance: imported
scenario: Imagine you are designing a critical TinyML application for anomaly detection on an ESP32-S3
  microcontroller. This device is deployed in a remote industrial setting where physical access is difficult
  but not impossible. The ESP32-S3 features a 240 MHz dual-core processor, 512 KB of SRAM, and 8 MB of
  PSRAM. The anomaly detection model, a small neural network, runs locally on the device. Your team is
  concerned about adversarial attacks that could compromise the reliability of the system, potentially
  leading to missed anomalies or false positives. Specifically, consider the risks of model tampering,
  side-channel attacks during inference, and data poisoning during potential over-the-air (OTA) updates
  for model retraining. Design a robust system architecture and propose defense strategies to ensure the
  integrity and reliability of the ML model and its predictions on the ESP32-S3, given its hardware constraints.
details:
  realistic_solution: 'A realistic solution would involve a multi-layered approach tailored to the ESP32-S3''s
    capabilities: 1. Secure Boot & Firmware Updates: Implement secure boot with cryptographic verification
    (e.g., using RSA or ECC) for all firmware and model OTA updates, leveraging the ESP32''s hardware
    trust features to prevent model tampering. 2. Efficient Adversarial Training: Train the anomaly detection
    model with carefully chosen adversarial examples, optimized for the ESP32-S3''s constrained resources,
    using lightweight techniques. 3. Runtime Integrity Checks: Implement periodic, lightweight integrity
    checks for critical model parameters stored in PSRAM to detect potential runtime corruption. 4. Side-Channel
    Resistance: Design the inference code to minimize data-dependent operations and memory access patterns
    that could leak sensitive information, aiming for constant-time operations where feasible for critical
    sections. 5. Environmental Monitoring: Integrate sensor data redundancy and cross-validation to detect
    anomalous input patterns that might indicate data poisoning attempts or adversarial inputs.'
  common_mistake: Overlooking the unique resource constraints of the ESP32-S3 (limited SRAM, CPU, and
    potentially no hardware secure element) when proposing defense mechanisms, leading to computationally
    infeasible or memory-intensive solutions. Another common mistake is to only consider software-level
    adversarial attacks without adequately addressing physical security or side-channel attack vectors
    relevant to embedded systems.
  napkin_math: Calculate the memory footprint impact of incorporating adversarial defenses (e.g., secure
    boot images, integrity check hashes, additional model parameters from adversarial training) on the
    512 KB SRAM and 8 MB PSRAM. For instance, if a secure bootloader takes 64KB of flash, and adversarial
    training increases model size by 15% (requiring more PSRAM), and runtime integrity checks need 50KB
    of additional SRAM for verification logic, determine if the ESP32-S3 can still accommodate the base
    model, defense mechanisms, and other system functionalities while maintaining real-time inference
    latency (e.g., a 10ms inference budget).
