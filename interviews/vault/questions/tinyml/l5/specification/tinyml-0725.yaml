schema_version: 1
id: tinyml-0725
title: The Multi-Tenant MCU
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: 'Your smart home device on an nRF5340 application core (Cortex-M33, 128 MHz, 256 KB SRAM) must
  run two models simultaneously: a keyword spotting model (always-on, 15ms inference, 80 KB arena) and
  a command recognition model (triggered after wake word, 45ms inference, 140 KB arena). Total arena:
  220 KB. Available SRAM after firmware: 230 KB. It fits — barely. But during command recognition, keyword
  spotting must continue running. Design the memory and scheduling architecture.'
details:
  realistic_solution: 'Two TFLite Micro interpreter instances cannot share an arena — the interpreter
    is not reentrant. Use two separate interpreters: KWS interpreter (80KB arena, always loaded) and CMD
    interpreter (140KB arena, loaded on demand). Time-multiplex: during CMD inference (45ms), pause KWS.
    With KWS''s 100ms period and 50% window overlap, missing one 45ms window loses zero detections. Memory:
    The CMD interpreter can reuse the same physical memory space as the KWS arena when triggered. Since
    CMD requires 140KB, the peak memory usage is simply the maximum of the two: 140KB. Headroom: 230-140
    = 90KB for stack, ISR frames, and BLE IPC buffers.'
  common_mistake: '"Allocate 80 KB + 140 KB = 220 KB and run both models. 230 KB available, so 10 KB headroom
    — done." This ignores that TFLite Micro''s interpreter is not reentrant. You cannot run two models
    simultaneously with a single interpreter instance. Also, 10 KB headroom leaves no room for the stack,
    ISR frames, or BLE IPC buffers.'
  napkin_math: 'Scheme 1: 220 KB peak, 10 KB headroom. Risk: stack overflow on deep ISR nesting. Scheme
    2: 140 KB peak, 90 KB headroom. KWS gap during command: 45ms / 100ms period = 0.45 cycles missed →
    rounds to 0 or 1 missed inference. If KWS uses a sliding window with 50% overlap: the missed window
    is covered by the previous window''s overlap. Effective detection gap: 0ms. Memory savings: 220 -
    140 = 80 KB freed for BLE buffers, logging, or a third model.'
