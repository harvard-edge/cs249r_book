id: tinyml-cell-13232
title: Specify KV Cache Layout for Ethos-U55 DMA Access Patterns
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'You are specifying the memory layout for a KV cache on Cortex-M7+Ethos-U55. The cache must
  support: 4 layers, 4 heads, 64-dim heads, up to 128-token context, INT8. The Ethos-U55 DMA controller
  requires tensor data in NHWC format with 16-byte aligned start addresses. The SRAM is 512KB with 256KB
  reserved for weights and activations. Specify the complete KV cache memory map including layer offsets,
  head offsets, and alignment padding.'
details:
  realistic_solution: 'Cache per component (K or V): layers × heads × seq × dim × 1B = 4×4×128×64 = 131,072B
    = 128KB. Total KV: 2×128KB = 256KB. Fits in 256KB SRAM budget (512KB - 256KB weights). Layout [layer][kv][head][seq][dim]:
    layer stride = 2×4×128×64=65,536B; kv stride=4×128×64=32,768B; head stride=128×64=8,192B; seq stride=64B=1
    cache line. 16-byte alignment: all strides are multiples of 64 > 16, so inherently aligned. Layer
    0 K offset: 0×00. Layer 0 V offset: 32,768. Layer 1 K: 65,536. NPU DMA: access pattern head[seq][dim]
    = sequential 8,192-byte reads — optimal for burst DMA.'
  common_mistake: Storing KV cache in row-major [layer][seq][head][dim] format; Ethos-U55 accesses along
    the head dimension sequentially, making [layer][head][seq][dim] more cache-friendly.
  napkin_math: 'KV size: 2×4×4×128×64 = 262,144B = 256KB. Layer stride: 256KB/4 = 64KB. KV stride: 64KB/2
    = 32KB. Head stride: 32KB/4 = 8KB. All 16-byte aligned (8192 = 512×16). Memory map: [0, 32KB)=L0-K,
    [32KB,64KB)=L0-V, [64KB,96KB)=L1-K, ..., [224KB,256KB)=L3-V.'
