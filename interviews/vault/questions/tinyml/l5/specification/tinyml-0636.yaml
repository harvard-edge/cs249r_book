id: tinyml-0636
title: The Federated Learning Battery Drain Catastrophe
topic: federated-learning
status: published
provenance: imported
scenario: 'You are the tech lead for a fleet of 1 million battery-powered smart doorbells. The devices
  use federated learning (FL) to periodically update an on-device person detection model. The current
  model is 250KB and the battery lasts for one year. The modeling team has developed a new, 400KB model
  that is 5% more accurate. Your team proposes a standard A/B test: deploy the new model to a 10% cohort
  via the existing OTA mechanism and monitor its accuracy. Shortly after the test begins, support is flooded
  with complaints from the test cohort that their doorbell batteries are dying in a matter of days. The
  A/B test is immediately rolled back, but it results in a multi-million dollar incident due to the cost
  of replacing thousands of now-dead devices. Evaluate the A/B testing plan. Why did a modest increase
  in model size and accuracy lead to a catastrophic, non-linear failure in battery life, and what critical
  TCO factor did the team''s plan ignore?'
details:
  realistic_solution: The plan failed because it completely ignored the **Total Energy Cost of Communication**,
    which is the dominant power draw in battery-powered federated systems. The catastrophic failure was
    not due to the increased *inference* cost, but the increased *communication* cost during the federated
    learning update cycle.
  common_mistake: The most common mistake is to state that the new model was simply 'too big' or 'used
    more compute'. While the new model is larger and does require more FLOPS per inference, this linear
    increase in compute cost (typically in milliwatts) cannot, by itself, explain a reduction in battery
    life from one year to a few days. This answer focuses only on the inference component and misses the
    much larger, system-level power dynamics.
  napkin_math: 'FL upload per round ≈ model size. Old 250KB: TX energy=250K×5µJ/B=1.28J. New 400KB: 2.05J/round.
    4 rounds/day: old=5.1J, new=8.2J. Battery 10kJ: old=1953 days≈5.3yr, new=1220 days≈3.3yr. With faster
    FL rounds for convergence(8/day): 610 days. Communication energy, not inference, is the killer. 60%
    increase in model size→2× battery drain.'
