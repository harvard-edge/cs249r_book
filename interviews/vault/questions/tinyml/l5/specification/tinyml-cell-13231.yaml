schema_version: 1
id: tinyml-cell-13231
title: Specify Transformer Architecture for Sub-1mW Inference on MCU
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'You must specify a transformer architecture for continuous gesture recognition on a Cortex-M4
  at 48 MHz (low-power mode, 0.5mW active power budget, 10μA/MHz dynamic power). The task requires processing
  16-token sequences of 16-channel IMU features at 10 Hz. Specify: number of layers, heads, embedding
  dimension, FFN ratio, and quantization precision to fit the power budget, with accuracy target >90%
  on the HCI gesture dataset.'
details:
  realistic_solution: 'Power budget: 0.5mW. Active current at 48MHz: 10μA/MHz × 48MHz = 0.48mA × 3.3V
    = 1.58mW too high. Use 32 MHz: 10μA×32MHz=0.32mA×3.3V=1.06mW still too high. Use 16MHz: 0.16mA×3.3V=0.53mW
    ≈ 0.5mW. At 16MHz, Cortex-M4: ~32 MFLOP/s. Inference at 10Hz → 100ms budget. Max FLOPs: 32MFLOP/s
    × 0.1s = 3.2M FLOPs per inference. Architecture for 3.2M FLOPs: 1 layer, 2 heads, 32-dim, FFN ratio
    2×, seq=16. FLOPs: 2×16×32×(128+64+16) ≈ 2×16×32×208 = 213K FLOPs per layer — well under budget. Final
    spec: 4 layers, 2 heads, 32-dim, FFN 2×, INT8. FLOPs: 4×213K = 852K << 3.2M FLOPs. Accuracy: 4-layer
    32-dim achieves ~92% on HCI gesture.'
  common_mistake: Starting with a large architecture and pruning down; better to start from power budget
    and derive max FLOPs, then select architecture that fits.
  napkin_math: 'FLOPs budget: 32MFLOP/s × 0.1s = 3.2M. Per-layer FLOPs (1L, 2H, 32D, seq=16): attention=2×16²×32=16,384;
    QKV=3×2×16×32²=98,304; FFN=2×2×16×32×64=131,072; total≈246K. 4 layers: 984K << 3.2M. Power: 0.5mW
    at 16MHz.'
