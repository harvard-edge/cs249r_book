schema_version: 1
id: tinyml-r2-43054
title: Peak SRAM Optimization via Channel Splitting
topic: tensor-arena-planning
status: published
provenance: imported
scenario: Your image classification model on Cortex-M7 (512 KB SRAM) has a depthwise separable conv layer
  with 128 channels at 24×24 spatial resolution. The activation tensor at this layer is 24×24×128 = 73,728
  bytes. Combined with other live tensors, the peak is 520 KB — exceeding the 512 KB arena by 8 KB. You
  can't reduce model accuracy. How does channel splitting (computing 64 channels at a time) reduce the
  peak?
details:
  realistic_solution: 'Channel splitting: instead of computing all 128 channels at once (73,728 bytes),
    compute in 2 passes of 64 channels (36,864 bytes each). The key insight: the depthwise conv is channel-independent
    — each output channel depends only on its corresponding input channel. Processing 64 channels at a
    time: (1) Load input channels 0-63, compute depthwise conv, produce 24×24×64 = 36,864 bytes. (2) Pass
    this to the pointwise conv for channels 0-63. The pointwise conv''s output can be written directly
    to the final output buffer. (3) The 36,864-byte intermediate buffer is now free. Repeat for channels
    64-127. Peak memory reduction: 73,728 → 36,864 bytes. Savings: 36 KB. New peak: 520 - 36 = 484 KB.
    Fits in 512 KB. Cost: operator dispatch overhead (2 calls instead of 1 per depthwise layer). On Cortex-M7:
    ~2 μs per dispatch × 2 extra calls = 4 μs. Negligible vs ~500 μs for the actual computation.'
  common_mistake: Assuming channel splitting doubles the number of operator invocations and thus doubles
    compute time. While it does increase invocations, the actual compute is identical — you're just processing
    fewer channels per invocation. The overhead is purely in loop control and operator dispatch.
  napkin_math: 'Full channels: 24 × 24 × 128 × 1 byte = 72 KB. Split 2-way: 24 × 24 × 64 × 1 byte = 36
    KB. Savings: 36 KB. Split 4-way: 18 KB. Could also split 8-way: 9 KB. Each split level halves the
    activation memory for this layer. But splitting doesn''t help the pointwise conv (it needs all channels
    for each output). The pointwise conv''s intermediate: 24 × 24 × C_out — this is the real bottleneck
    for deeper layers. Channel splitting at depthwise is always free in compute; channel splitting at
    pointwise requires accumulation across splits.'
