id: tinyml-fill-01206
title: Optimizing Semantic Segmentation Deployment on Cortex-M7 + Ethos-U55 with Model Format Conversion
topic: model-format-conversion
status: published
provenance: imported
scenario: You are tasked with deploying a pre-trained semantic segmentation model (e.g., a lightweight
  MobileNetV3-like architecture) onto an embedded system powered by an ARM Cortex-M7 microcontroller (480
  MHz, 512 KB SRAM) and an ARM Ethos-U55 microNPU (supporting 128-512 MAC/cycle). The model, originally
  trained in PyTorch, needs to be converted to a suitable format (e.g., ONNX, TFLite) for efficient execution
  on this platform. The deployment requires inference within 100ms and a total memory footprint (model
  weights + activations) under 256KB. You've identified several custom operators or less common layers
  in your PyTorch model that are not natively supported by standard TFLite or ONNX runtime conversions
  for the Ethos-U55.
details:
  realistic_solution: 'A realistic solution involves a methodical approach: 1. **Operator Mapping & Profiling**:
    Identify all unsupported operators. For each, explore if a simpler, supported equivalent exists, or
    if model architecture modifications can replace them. 2. **Hybrid Delegation Strategy**: For truly
    unavoidable unsupported operators, implement a hybrid execution strategy. This involves partitioning
    the model: convert the majority to TFLite for Ethos-U55 acceleration, and implement the unsupported
    segments as highly optimized custom C/C++ kernels running on the Cortex-M7. 3. **Aggressive Quantization**:
    Apply post-training quantization (e.g., int8) and potentially pruning to drastically reduce model
    size and improve Ethos-U55 throughput, ensuring accuracy targets are met. 4. **Memory Optimization**:
    Analyze and optimize activation memory usage through techniques like activation recomputation or careful
    layer fusion to stay within the 256KB total memory budget. 5. **Iterative Benchmarking**: Continuously
    benchmark on actual hardware or high-fidelity simulators to validate latency and memory constraints,
    iterating on conversion and optimization strategies.'
  common_mistake: A common mistake is to blindly convert the model without a thorough understanding of
    the target hardware accelerator's operator coverage and capabilities. This often leads to performance
    bottlenecks where unsupported operations transparently fall back to the much slower Cortex-M7 CPU,
    or require suboptimal custom kernel implementations. Another frequent error is underestimating the
    memory footprint of intermediate activations, resulting in memory overflows on resource-constrained
    devices like those with 512 KB SRAM.
  napkin_math: The Ethos-U55 at 480 MHz with 512 MAC/cycle provides a theoretical peak of ~245 GMACs/second.
    To meet a 100ms inference deadline, the model must execute within ~24.5 GMACs, assuming perfect NPU
    utilization. A typical MobileNetV3-small has around 16 GMACs for a 224x224 input, which suggests the
    NPU has sufficient theoretical capacity. However, operator coverage gaps forcing CPU fallback will
    drastically increase execution time, as the Cortex-M7 at 480MHz typically delivers only ~0.5 GMAC/s.
    For memory, 512 KB SRAM must house the model (weights, biases), intermediate activations, and runtime
    code. A typical FP32 MobileNetV3 model is several MBs; aggressive 8-bit quantization (e.g., 4x reduction)
    is essential, bringing a 2MB model down to 500KB, which *still* exceeds the 256KB target for model+activations.
    This highlights the critical need for activation memory optimization and potentially further model
    compression.
