schema_version: 1
id: tinyml-0623
title: The OTA Wear-Out Catastrophe
topic: ota-firmware-updates
status: published
provenance: imported
scenario: You're leading the firmware update process for a fleet of 100,000 automotive MCUs. To save on
  costly cellular data, you deploy a binary patching system for Over-the-Air (OTA) updates. Instead of
  sending a full 450KB firmware image, you send a ~50KB patch. The device applies the patch to the old
  firmware in SRAM and writes the new image back. To guard against power loss during the write, the system
  checkpoints its progress by writing the index of the last successful 16KB block to a dedicated 'progress
  sector' in flash. A few years after deployment, a routine OTA update bricks several thousand devices,
  requiring physical replacement. A recovered device shows stable power during the update, but its firmware
  checksum is invalid post-reboot. Assess this OTA design and predict the specific, time-delayed physical
  failure mode that caused this mass-bricking event.
details:
  realistic_solution: 'The root cause is flash memory wear-out on the ''progress sector''. Flash memory
    has a finite number of erase/write cycles, typically 10,000-100,000. The OTA design repeatedly erases
    and writes to the *exact same physical memory sector* to store the update progress. While any single
    update only writes to it a few dozen times, these cycles accumulate over every update the device has
    ever received. After several years, the progress sectors on the oldest devices in the fleet begin
    to fail.

    The catastrophic failure happens when the progress sector fails *during a write*. For instance, the
    system successfully writes 20 of 28 blocks, but when it tries to write ''20'' to the progress sector,
    the write fails due to wear-out. On the next reboot, the bootloader reads a stale value (e.g., ''19''),
    assumes the update was interrupted, and tries to apply the patch starting from block 20 onto a firmware
    image that is *already partially patched*. This corrupts the binary irrecoverably. The mechanism designed
    for robustness became a single point of failure and a ticking time bomb that guarantees eventual device
    failure.'
  common_mistake: Blaming the patch logic or transmission errors. Engineers might suspect the binary patch
    was created incorrectly or corrupted during download. This is a possibility, but doesn't explain why
    it affected thousands of older devices simultaneously and why it hadn't happened before. It's a 'now'
    problem, but the cause is historical.
  napkin_math: 'Flash endurance: 10K-100K cycles. 450KB/16KB=29 blocks. Progress writes per update: 29.
    Over lifetime: 240 updates×29=6,960 cycles. At 10K endurance: 70% worn at 5yr. Failure: write to progress
    sector fails mid-update→stale checkpoint→reboot applies patch to already-patched image→corruption.
    Oldest devices fail first, statistically.'
