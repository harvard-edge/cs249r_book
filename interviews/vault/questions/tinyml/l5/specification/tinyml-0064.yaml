id: tinyml-0064
title: Hardware-in-the-Loop Testing
topic: ota-firmware-updates
status: published
provenance: imported
scenario: Your CI pipeline tests ML models in simulation (x86 QEMU), but you've been burned twice by models
  that pass simulation and fail on real hardware — once due to CMSIS-NN kernel differences, once due to
  flash timing. You have 5 hardware variants (Cortex-M0+, M4, M4F, M7, M33). Design a hardware-in-the-loop
  (HIL) CI system. How many test boards do you need, and what's the test time per commit?
details:
  realistic_solution: 'Build a parallel HIL farm: 2 boards per variant (10 boards total, ~$940). Per-commit
    pipeline: flash firmware (30s), run smoke test (5s), execute model inference + validate output (2s
    per board). All 5 variants test in parallel: 37s wall time. At 20 commits/day: 22 minutes total HIL
    time, boards idle 90% of the time. Add nightly extended tests: power measurement via INA219 current
    sensor (4.2 min per variant), accuracy regression on reference dataset. Cost of one prevented field
    failure: $500K (10,000 devices x $50 per visit). HIL farm ROI: 531x return on a single prevented bug.'
  common_mistake: '"Buy one of each board and run tests sequentially." With 5 boards tested sequentially,
    each taking 2-3 minutes, your CI feedback loop is 10-15 minutes per commit. Developers will skip HIL
    tests or ignore failures because the feedback is too slow.'
  napkin_math: 'Per-commit HIL: 67 seconds. At 20 commits/day: 22 minutes of total HIL time. Board utilization:
    7 s active / 67 s cycle = 10.4%. Boards are idle 90% of the time — plenty of headroom for parallel
    branches. Cost of one missed hardware bug (field failure on 10,000 devices): $50 per device visit
    × 10,000 = $500,000. HIL farm cost: $940. ROI: prevents one field failure = **531× return**. Nightly
    power test: 4.2 minutes × 5 variants = 21 minutes. Catches power regressions before they reach production.'
