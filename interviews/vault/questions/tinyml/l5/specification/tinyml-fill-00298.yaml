id: tinyml-fill-00298
title: Optimizing Data Movement for Real-time TinyML on Cortex-M7 + Ethos-U55
topic: dma-data-movement
status: published
provenance: imported
scenario: You are tasked with designing an embedded ML system for real-time image classification (e.g.,
  MobileNetV2) on a Cortex-M7 microcontroller (480 MHz, 512 KB SRAM) integrated with an Ethos-U55 NPU
  (512 MAC/cycle). The system needs to process a continuous stream of 224x224x3 (UINT8) images at 30 frames
  per second. The input tensor alone is 224x224x3 bytes, and the model's intermediate feature maps can
  consume up to 256 KB. The Ethos-U55 requires input data to be in a specific, cache-coherent memory region
  for optimal DMA transfers. Design a memory and data movement strategy that minimizes inference latency
  and ensures continuous processing without dropping frames, considering the highly constrained 512 KB
  SRAM. Explain how you would leverage DMA, zero-copy techniques, and memory pinning (if applicable) to
  avoid CPU-bound data movement overheads.
details:
  realistic_solution: Implement a double-buffering scheme for the input and output tensors. Allocate two
    224x224x3 byte buffers in a memory region that is shared and cache-coherent between the Cortex-M7
    and Ethos-U55, specifically for DMA. Configure the Cortex-M7's DMA controller to transfer incoming
    image data directly into one buffer while the Ethos-U55 processes the other. Once the NPU completes
    inference, its output is DMA'd out, and the buffers are swapped. For intermediate feature maps (up
    to 256 KB), carefully allocate non-overlapping regions within the remaining SRAM, potentially reusing
    memory between stages or partitioning larger tensors if needed. Employ zero-copy by ensuring the Ethos-U55
    can directly access the DMA'd input buffer and write its outputs to a designated buffer without CPU
    intervention, thus minimizing CPU load and maximizing throughput.
  common_mistake: A common mistake is to rely on CPU-initiated data copies for every frame, or to misalign
    memory buffers, which leads to frequent CPU stalls waiting for data transfers, cache invalidation
    issues, and ultimately missed real-time deadlines. In a memory-constrained environment, failing to
    meticulously budget and manage memory for double-buffering or intermediate tensors can lead to system
    crashes or performance degradation.
  napkin_math: 'Input image size: 224 * 224 * 3 bytes = 150,528 bytes (~147 KB). Double buffering for
    input requires ~294 KB. If intermediate feature maps consume 256 KB, total required memory is 294
    KB (input) + 256 KB (intermediate) = 550 KB. This exceeds the 512 KB SRAM, indicating that the intermediate
    feature maps must be carefully managed. Options include: (1) Overlapping intermediate feature map
    allocations if their lifetimes don''t coincide, (2) Using an NPU configuration (e.g., tiling) that
    processes feature maps in smaller, memory-resident chunks, or (3) utilizing external memory if available
    (not specified in this scenario, so assume not). Data rate for input: 147 KB * 30 FPS = 4.41 MB/s.
    A 480 MHz Cortex-M7, even with its high clock rate, would struggle with raw CPU copies of this magnitude
    for a complex ML pipeline without efficient DMA.'
