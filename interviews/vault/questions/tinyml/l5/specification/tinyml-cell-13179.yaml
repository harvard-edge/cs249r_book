id: tinyml-cell-13179
title: 'TinyML TCO Specification: Design TinyML Fleet Budget for Healthcare'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Specify a TinyML fleet budget for a hospital deploying 200 patient vital sign monitors (Cortex-M7+Ethos-U55,
  $12) with medical-grade requirements: FDA 510(k) clearance ($150K), IEC 62304 compliance software development
  ($200K), 5-year FDA-mandated maintenance contract ($30K/yr). Include: hardware, development, regulatory,
  operations, and clinical validation ($50K). Total 5-year budget.'
details:
  realistic_solution: 'Hardware: 200*$12=$2,400. Development: firmware=$200K + algorithm=$100K = $300K.
    Regulatory: FDA 510(k)=$150K + ISO 13485 QMS=$50K + IEC 62304 docs=$50K=$250K. Clinical validation:
    $50K. Annual maintenance (regulatory-mandated): $30K*5=$150K. Cloud backend (HIPAA-compliant): $5K/yr*5=$25K.
    Staff training: $20K. Monitoring + calibration: $10K/yr*5=$50K. Total 5yr: $2.4K+$300K+$250K+$50K+$150K+$25K+$20K+$50K=$847.4K.
    Per device 5yr: $4,237. Hardware is 0.3% of total cost! Regulatory dominates at 29.5%. Most expensive:
    compliant software development ($300K = 35.4%). Medical TinyML is fundamentally different economics
    from industrial TinyML.'
  common_mistake: Treating medical TinyML as regular IoT without accounting for regulatory costs (FDA
    clearance) and mandatory quality system requirements (IEC 62304, ISO 13485) that typically cost 5-10x
    hardware cost.
  napkin_math: 'HW=$2.4K. Dev=$300K. Regulatory=$250K. Clinical=$50K. Maint 5yr=$150K. Backend=$25K. Training=$20K.
    Monitoring=$50K. Total=$847.4K. Per unit: $847.4K/200=$4,237/unit. vs $12 hardware = 353x regulatory
    premium. Compare to industrial: 200-unit industrial sensor: $847K-(FDA$150K+ISO$50K+IEC$50K+clinical$50K)
    = $847K-$350K = $497K. Still 40x hardware. Medical adds $350K for compliance = $1,750/device compliance
    premium. Amortization: 200 devices over 5yr. If hospital pays $5K/device/5yr: revenue=$1M, cost=$847K,
    margin=$153K. 15% margin typical for medical devices.'
