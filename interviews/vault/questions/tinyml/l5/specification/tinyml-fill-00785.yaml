schema_version: 1
id: tinyml-fill-00785
title: Hardware-Aware NAS on ESP32-S3 for TinyML Vision
topic: neural-architecture-search
status: published
provenance: imported
scenario: You need to develop an efficient image classification model for a low-power, edge device using
  an ESP32-S3 microcontroller. The device has a 240 MHz dual-core processor, 512 KB of on-chip SRAM, and
  8 MB of external PSRAM. The model must classify 32x32 grayscale images into 10 categories with an inference
  latency under 200ms and a peak SRAM usage below 400KB (leaving room for OS and other buffers). Describe
  your approach using hardware-aware Neural Architecture Search (NAS) to find an optimal architecture.
  How would you define the search space to prioritize architectures suitable for this constrained environment,
  and how would you incorporate the ESP32-S3's specific hardware limitations (SRAM, FLOPs, latency) into
  the NAS reward function or search constraints? Consider MCUNet-style optimization strategies.
details:
  realistic_solution: A realistic solution would involve defining a NAS search space heavily biased towards
    compact, mobile/tiny architectures (e.g., MobileNetV2, GhostNet variants, ShuffleNet) with a strong
    emphasis on extremely low-bit quantization (e.g., 8-bit or 4-bit integer quantization) and aggressive
    pruning. The NAS reward function would be multi-objective, explicitly balancing accuracy, on-device
    measured or accurately estimated latency (considering the ESP32-S3's specific instruction set and
    memory hierarchy), and SRAM footprint. Techniques inspired by MCUNet's two-stage NAS, which co-optimizes
    architecture and efficient inference (e.g., tiny-scale operator search, memory-efficient inference
    engine tailored for microcontrollers), would be highly relevant. Crucially, pre-calculating or predicting
    SRAM usage for candidate layers and using a memory-aware predictor during search to prune infeasible
    architectures early would be implemented. PSRAM would primarily be considered for storing the full
    model weights at boot-up, or for less latency-critical auxiliary data, while the active model and
    activations would strictly target SRAM for optimal performance.
  common_mistake: Overlooking the critical difference between total memory (PSRAM) and fast on-chip memory
    (SRAM) for critical activations and weights, leading to architectures that exceed SRAM capacity and
    suffer severe performance degradation due to external memory access latency. Another common mistake
    is defining a NAS search space that includes operations or layer types inherently unsuitable for microcontrollers,
    such as large convolutional kernels or complex attention mechanisms, without proper quantization and
    pruning considerations from the outset.
  napkin_math: "1. **SRAM Constraint**: With 512 KB SRAM and targeting 400 KB for the model, a 32-bit\
    \ floating-point model could only hold approximately `400 * 1024 / 4 = 102,400` parameters. For an\
    \ 8-bit integer quantized model, this capacity increases significantly to `400 * 1024 / 1 = 409,600`\
    \ parameters. This severe constraint immediately necessitates aggressive quantization and extremely\
    \ compact architectures. \n2. **Latency Constraint**: A 200 ms inference time on a 240 MHz dual-core\
    \ processor implies an upper bound of approximately `240 * 10^6 cycles/second * 0.2 seconds = 48 *\
    \ 10^6` cycles for the entire inference process (per core, assuming one core for model execution).\
    \ If a typical Multiply-Accumulate (MAC) operation takes 1-2 cycles, this translates to roughly `24-48\
    \ million` MAC operations as the absolute maximum FLOPs budget. This calculation underscores the need\
    \ for highly optimized, low-FLOP convolutional operations like depth-wise separable convolutions or\
    \ extremely shallow networks."
