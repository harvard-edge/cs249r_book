id: tinyml-0605
title: The MAX78000 CNN Accelerator
topic: cnn-efficient-design
status: published
provenance: imported
scenario: The Maxim MAX78000 has a dedicated CNN accelerator with 442 KB of weight SRAM and a 64-processor
  array that operates at 50 MHz. Analog Devices claims 1-3 µJ per inference for a keyword spotting model.
  A Cortex-M4 at 168 MHz with CMSIS-NN uses ~100 µJ for the same model. Explain architecturally why the
  accelerator achieves 30-100× better energy efficiency, and identify what workloads it cannot accelerate.
details:
  realistic_solution: 'The MAX78000''s CNN accelerator achieves 30-100x energy efficiency through three
    architectural advantages: (1) weight-stationary dataflow — 442KB of on-chip weight SRAM eliminates
    external memory access during inference, (2) massive parallelism — 64 processors execute 64 MACs/cycle
    at only 50MHz, matching the M4''s throughput at 1/3 the clock, and (3) no instruction fetch overhead
    — the processors are hardwired for conv/pool/activation, eliminating the ~60% overhead that a general-purpose
    CPU spends on instruction decode and control flow. Limitation: only supports standard CNN layers —
    no RNNs, attention, or custom ops.'
  common_mistake: '"The accelerator is just a faster processor — more MHz means less energy." The MAX78000''s
    CNN accelerator actually runs at only 50 MHz — 3.4× slower clock than the M4. The efficiency comes
    from architecture, not clock speed.'
  napkin_math: 'Keyword spotting model: 500K MACs. **Cortex-M4:** 500K MACs / 336 MMAC/s = 1.49ms. Energy:
    50 mW × 1.49ms = 74.5 µJ. Add memory access overhead (~30%): **~97 µJ**. **MAX78000 accelerator:**
    500K MACs / 3.2 GMAC/s = 0.156ms. Energy: 64 processors × 0.3 mW each × 0.156ms = 3.0 µJ. Add I/O
    and control: **~3.5 µJ**. Ratio: 97/3.5 = **27.7×** more efficient. For larger models (2M MACs): the
    ratio improves because the accelerator''s fixed overhead is amortized.'
