id: tinyml-fill-00438
title: TinyML Latency Bottleneck on Cortex-M7+Ethos-U55
topic: profiling-bottleneck-analysis
status: published
provenance: imported
scenario: You are tasked with deploying a real-time keyword spotting (KWS) model on a system featuring
  an Arm Cortex-M7 (480 MHz) and an Ethos-U55 NPU (with 128-512 MAC/cycle capability and 512 KB SRAM).
  The target latency for inference is 50ms. Initial deployment shows consistent inference times of 80ms.
  Describe your approach to identify the specific bottlenecks (compute, memory, or I/O) using available
  profiling tools and techniques suitable for this embedded platform. How would you determine if the NPU
  is being fully utilized, or if data movement is the limiting factor?
details:
  realistic_solution: The realistic solution involves a systematic profiling approach. First, leverage
    Arm Streamline or similar embedded profiling tools (if available) with a focus on CPU activity, NPU
    counters, and memory access patterns. Alternatively, implement custom instrumentation (e.g., GPIO
    toggling, cycle counters, DWT unit) at key stages (data acquisition, pre-processing, NPU inference,
    post-processing) to measure elapsed time. Analyze the resulting trace data to identify where the most
    time is spent. For NPU utilization, inspect Ethos-U55 specific performance monitors (if exposed via
    CMSIS-NN/Arm NN) to determine actual MACs/cycle and active cycles. Generate flame graphs from CPU
    call stack profiling to visualize function hot spots. If memory bound, analyze data transfer times
    between SRAM and NPU, considering memory layout optimizations, data packing, and double buffering
    techniques to overlap computation and data movement. If compute bound on the Cortex-M7, investigate
    compiler optimizations, hand-optimized DSP libraries (e.g., CMSIS-DSP), or offloading more tasks to
    the NPU where possible. Address I/O bottlenecks by optimizing sensor interfaces or communication protocols.
  common_mistake: A common mistake is to immediately jump to optimizing the neural network model (e.g.,
    further quantization or pruning) without first accurately pinpointing the bottleneck. Another is neglecting
    the specific characteristics of embedded profiling, such as limited debugging interfaces or the need
    for custom instrumentation, leading to incomplete or misleading performance data. Failing to consider
    memory access patterns and data locality for the given 512KB SRAM constraints can also be a pitfall,
    particularly for data buffering and inter-component communication.
  napkin_math: Given an Ethos-U55 with a peak of 512 MAC/cycle at 480 MHz, the theoretical peak throughput
    is 512 MACs/cycle * 480 * 10^6 cycles/sec ≈ 245.7 GMACs/sec. If the KWS model requires, say, 100 MMACs
    per inference, the theoretical NPU compute time is 100 * 10^6 MACs / (245.7 * 10^9 MACs/sec) ≈ 0.41
    ms. If the measured NPU inference time is significantly higher (e.g., 20ms), this disparity immediately
    indicates NPU underutilization, data starvation, or significant overheads. For memory, if 256KB of
    intermediate data needs to be moved multiple times within the 512KB SRAM, and assuming a simple transfer
    rate of 4 bytes/cycle on a 480MHz bus, moving 256KB once takes approximately (256 * 1024 bytes) /
    (4 bytes/cycle * 480 * 10^6 cycles/sec) ≈ 0.13 ms. Multiple transfers or inefficient access patterns
    could quickly accumulate, consuming significant portions of the 50ms budget. If the Cortex-M7 pre-processing
    takes 30ms, that translates to (30 * 10^-3 sec) * (480 * 10^6 cycles/sec) = 14.4 million cycles, highlighting
    a potential CPU bottleneck if not efficiently coded.
