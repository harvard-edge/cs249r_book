schema_version: 1
id: tinyml-0629
title: The Fault-Tolerant Battery Killer
topic: safety-certification
status: published
provenance: imported
scenario: You're designing a remote agricultural sensor on a Cortex-M4 that adapts its calibration model
  on-device. Power can be intermittent due to solar charging. To ensure fault tolerance, you checkpoint
  the 256KB model to the device's 1MB internal flash memory after every 50 inferences. The device performs
  one inference per minute. Your power budget calculations projected a 14-day battery life. However, deployed
  devices are dying in less than 3 days. Your telemetry confirms the device is sleeping correctly and
  the inference compute is within budget. Critique your fault-tolerance design and pinpoint the miscalculation
  that's causing this catastrophic power drain.
details:
  realistic_solution: The design catastrophically underestimates the energy cost of flash memory writes.
    On a microcontroller, writing to flash is not a simple 'mov' instruction. It requires erasing a page
    or sector (a slow, high-power operation) and then programming the new bits, drawing significantly
    more power than the CPU core itself. The system's energy budget is being dominated by the checkpointing
    process, not the ML inference. Checkpointing 256KB every 50 minutes means the device is performing
    a costly flash write sequence far too frequently, draining the battery. The 'fault tolerance' feature
    is the source of the system failure.
  common_mistake: Engineers from a cloud background assume writes are cheap. They might blame a software
    bug (e.g., the radio staying on) or an external factor (e.g., cloudy weather). They fail to quantify
    the immense energy cost of a flash write operation relative to SRAM/compute on a microcontroller.
  napkin_math: 'Model=256KB. Flash erase: 4KB sectors, 64 erases per checkpoint. Erase 30ms+write 15ms/sector:
    64*45=2.88s. At 60mW: 0.173J/checkpoint. 28.8 checkpoints/day: 4.98J. Inference: 200ms*50mW*1440=14.4J/day.
    Flash=26% of daily energy — unbudgeted. With aggressive erase power (200mW): 16.6J/day. After 10K
    erases, wear causes retries → 10x longer → battery death in <3 days.'
