id: tinyml-0728
title: The Flash Read Disturb
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: Your always-on vibration monitoring system on a Cortex-M4 (STM32L4, 80 MHz, 256 KB SRAM, 1 MB
  internal flash) runs inference 10 times per second, reading the 400 KB model weights from flash via
  XIP (Execute-in-Place) each time. After 6 months of continuous operation, the model's anomaly detection
  precision drops from 0.94 to 0.82. A firmware update (re-flashing the same model) restores performance.
  What degraded?
details:
  realistic_solution: The culprit is **NOR flash read disturb** — a well-documented but rarely encountered
    phenomenon in embedded systems.
  common_mistake: '"Flash doesn''t wear out from reading — only writes cause wear. Must be a firmware
    bug that accumulated over time." Flash does have a read-related degradation mechanism that most embedded
    developers never encounter because their devices don''t read the same addresses billions of times.'
  napkin_math: 'Reads per cell over 6 months: 155.5M × 8 = 1.24B. Disturb threshold: ~500M reads (for
    STM32L4''s 90nm NOR flash). Margin exceeded by: 1.24B / 500M = 2.48×. Expected bit flip rate: ~15%
    of cells in hot pages. Model weight errors: 480K flipped bits across 400 KB. Average weight error:
    ~3 LSBs (weighted by bit position probability). Accuracy impact: empirically, ±3 LSB average weight
    noise on INT8 models causes ~10-15% accuracy drop — matches the observed 0.94 → 0.82. Refresh interval
    to prevent: 500M reads / (10 inf/s × 8 disturbs × 86,400 s/day) = 72.3 days. Refresh monthly for safety
    margin.'
