id: tinyml-0610
title: Fusing Accelerometer + Microphone + Temperature on One MCU
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: 'You''re building an industrial equipment health monitor on a single Cortex-M4 (256 KB SRAM,
  168 MHz). It must fuse data from three sensors: a 3-axis accelerometer (1 kHz), a microphone (16 kHz),
  and a temperature sensor (1 Hz). Each sensor feeds a different model branch. Design the memory layout,
  DMA strategy, and inference scheduling.'
details:
  realistic_solution: 'Use a shared-backbone multi-head architecture to fit in 256KB SRAM. Three separate
    models need 360KB SRAM (doesn''t fit). Instead: shared backbone (100KB weights in flash) + 3 small
    heads (30KB total). Single tensor arena: 180KB SRAM. DMA strategy: mic uses DMA double-buffer (continuously
    fills at 16kHz), accelerometer uses DMA single-buffer (1kHz bursts), temp uses polled I2C (1Hz). Scheduling:
    mic inference runs every 64ms (highest priority), accelerometer every 1s, temp every 60s. Total SRAM:
    180KB + 40KB firmware + 20KB DMA buffers = 240KB. Fits with 16KB headroom.'
  common_mistake: '"Run three separate models sequentially." Three separate models triple the weight storage
    and likely exceed flash. And sequential execution may miss real-time deadlines.'
  napkin_math: 'Three separate models: 3 × 80 KB weights = 240 KB flash + 3 × 120 KB arenas = 360 KB SRAM.
    Doesn''t fit. Shared backbone + 3 heads: 100 KB weights (shared backbone) + 3 × 10 KB heads = 130
    KB flash. Single arena: 180 KB SRAM. Fits with 76 KB headroom. Weight savings: 46%. SRAM savings:
    50%.'
