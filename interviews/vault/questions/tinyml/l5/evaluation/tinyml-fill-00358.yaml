id: tinyml-fill-00358
title: Latency Decomposition for TinyML Keyword Spotting on Cortex-M7 + Ethos-U55
topic: latency-decomposition
status: published
provenance: imported
scenario: 'You are tasked with deploying a keyword spotting model on an embedded system featuring an ARM
  Cortex-M7 processor (480 MHz) paired with an Ethos-U55 NPU configured for 256 MAC/cycle and 512 KB SRAM.
  Your team has developed two candidate models, Model A and Model B, which offer comparable accuracy.
  The critical requirement is minimizing end-to-end latency. Design an evaluation strategy to decompose
  the end-to-end latency for both models into the following key components: Time To First Token (TTFT
  - time until the first inference result is produced, including initial setup), Time Per Output Token
  (TPOT - time taken for each subsequent inference result), network transfer time (e.g., sensor data acquisition
  to device, or inter-chip communication), preprocessing time (typically on Cortex-M7), and postprocessing
  time (typically on Cortex-M7). How would you measure each component, identify bottlenecks, and ultimately
  recommend one model over the other based on this detailed latency analysis?'
details:
  realistic_solution: Implement precise timing mechanisms using hardware cycle counters on the Cortex-M7
    and leverage any performance counters provided by the Ethos-U55 NPU. Utilize an integrated profiling
    framework capable of capturing execution times on both the CPU and NPU. Analyze data transfer bottlenecks
    by monitoring memory bandwidth usage and cache misses. For network latency, simulate or measure actual
    sensor data acquisition and inter-chip communication overhead. Optimize data formats, minimize data
    copies, and explore DMA for efficient data movement between components. The final recommendation should
    stem from a holistic analysis of how each model's architecture influences the performance of all decomposed
    latency stages, including the partitioning of operations between CPU and NPU.
  common_mistake: Ignoring inter-processor communication overhead or assuming NPU inference time is the
    only dominant factor. Often, data movement, memory access patterns, and CPU-NPU synchronization contribute
    significantly to overall latency, especially in tight embedded systems. Overlooking the impact of
    varying model architectures on memory access patterns and cache utilization on the Cortex-M7 also
    leads to inaccurate latency estimations.
  napkin_math: Consider a 16 kHz audio input, with 10ms frame stride, generating ~100 frames/second. If
    a model requires 500,000 MAC operations per inference and the Ethos-U55 NPU operates at 256 MAC/cycle,
    the raw NPU inference cycles are 500,000 / 256 ≈ 1,953 cycles. On a 480 MHz Cortex-M7, this NPU compute
    time translates to approximately 1,953 cycles / (480 * 10^6 cycles/s) ≈ 4.07 microseconds. However,
    if preprocessing on the M7 takes 2ms per frame and data transfer from sensor to device takes 1ms,
    the total per-frame latency becomes dominated by CPU and I/O (3ms), not the raw NPU compute, highlighting
    the importance of system-level decomposition.
