id: tinyml-0116
title: The LoRaWAN Confirmed ACK Spiral
topic: collective-communication
status: draft
provenance: imported
scenario: Your smart agriculture sensor uses LoRaWAN to send ML anomaly predictions to a gateway 5 miles
  away. To ensure data is never lost, you configure the device to send 'Confirmed Messages' (requiring
  an ACK from the gateway). During a rainstorm, the signal quality drops. The sensor's battery dies in
  3 days instead of 3 years. What protocol trap destroyed the battery?
details:
  realistic_solution: You triggered a **Confirmed ACK Retry Spiral**. Unconfirmed message at SF7 = 60ms
    of radio time (1 mAs energy). Confirmed message at SF12 with 8 retries = 20,000ms of radio time (300
    mAs energy). One failed ACK costs 300x more battery than a successful transmission.
  common_mistake: '"The radio used more power to transmit through the rain." LoRa transmits at a fixed
    power unless ADR (Adaptive Data Rate) tells it otherwise. The issue is the retry logic.'
  napkin_math: Unconfirmed message at SF7 = 60ms of radio time (1 mAs energy). Confirmed message at SF12
    with 8 retries = 20,000ms of radio time (300 mAs energy). One failed ACK costs 300x more battery than
    a successful transmission.
