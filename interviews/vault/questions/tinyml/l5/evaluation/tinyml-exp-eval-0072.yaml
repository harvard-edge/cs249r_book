schema_version: 1
id: tinyml-exp-eval-0072
title: Energy-Aware Model Selection on nRF5340
topic: energy-per-operation
status: published
provenance: imported
scenario: 'You are designing an always-on anomaly detection system for a wearable device using a Nordic
  nRF5340. The application core runs at 128 MHz and draws ~5mA active current at 3V, while you have 256
  KB of SRAM and 1 MB of flash available. You have two model architectures that achieve identical accuracy:
  Model A requires 5M MACs but fits entirely in a 128 KB SRAM buffer, while Model B requires only 1M MACs
  but has 512 KB of weights, forcing you to stream weights directly from flash during inference. Which
  model do you choose to minimize total energy per inference, and how do memory access costs influence
  this decision?'
details:
  realistic_solution: At L5, the candidate must evaluate the system-level energy cost, recognizing that
    fetching data from flash dominates the energy budget. Model A is the superior choice. Even though
    it has 5x more compute, all memory accesses are to the local, low-latency 256 KB SRAM. In Model B,
    streaming 512 KB of weights from the 1 MB flash incurs a massive energy penalty and introduces wait
    states that keep the power-hungry 128 MHz core active longer, outweighing the savings from fewer MACs.
  common_mistake: Candidates often look solely at the MAC count (compute) and assume Model B is 5x more
    energy efficient. They fail to account for the Horowitz energy table principles, where memory access—especially
    fetching from flash—costs orders of magnitude more energy than a single ALUs operation and introduces
    CPU stalls.
  napkin_math: nRF5340 active power is ~15mW (5mA @ 3V). At 128 MHz (assuming 1 MAC/cycle), Model A's
    5M MACs take ~39ms, consuming ~585 µJ of compute energy with negligible SRAM access cost. Model B's
    1M MACs take ~7.8ms (~117 µJ compute). However, Model B must read 512 KB from flash. Flash reads introduce
    wait states at 128 MHz; if streaming 512 KB stalls the CPU for an additional 25ms, this adds 375 µJ
    (15mW * 25ms) in active wait time alone, plus the actual flash peripheral energy overhead. Model A's
    zero-wait-state SRAM execution provides a lower and more deterministic total energy footprint.
