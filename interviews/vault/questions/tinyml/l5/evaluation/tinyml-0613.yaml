id: tinyml-0613
title: NPU Delegation Coverage Determines Actual Speedup
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You're deploying a MobileNetV2 (300K parameters, 22 layers) on a Corstone-300 platform (Cortex-M55
  + Ethos-U55 at 128 MACs/cycle, 250 MHz). The Vela compiler reports that 18 of 22 layers are delegated
  to the Ethos-U55, and 4 layers fall back to the M55 CPU. Your PM sees '82% delegation' and expects 5×
  speedup over M55-only. What's the actual speedup?
details:
  realistic_solution: Apply Amdahl's Law correctly by measuring the compute fraction, not the layer fraction,
    and account for the NPU↔CPU data transfer tax.
  common_mistake: '"82% of layers on the NPU means 82% of compute is accelerated, so speedup ≈ 1 / (1
    - 0.82) = 5.6× by Amdahl''s Law." This confuses layer count with compute distribution. Not all layers
    have equal MACs, and the fallback layers incur data transfer overhead.'
  napkin_math: 'Layer delegation: 18/22 = 0.8182%. Compute delegation: 28.5M/30M = 95%. Expected speedup
    (naive Amdahl): 1/0.05 = 20×. Actual speedup (with transfer overhead): 6.8×. After fixing Mean op:
    9.4×. The lesson: delegation percentage is misleading — always measure compute fraction and transfer
    overhead. A model with 95% compute delegation and 4 fallback transitions achieves only 6.8× speedup
    on a 20× capable NPU. Each fallback transition costs ~50 µs of dead time where neither the NPU nor
    CPU is doing useful compute.'
