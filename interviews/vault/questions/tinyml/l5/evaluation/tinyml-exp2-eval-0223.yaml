id: tinyml-exp2-eval-0223
title: Energy Tradeoffs of LUT vs On-the-Fly Computation
topic: energy-per-operation
status: published
provenance: imported
scenario: 'You are optimizing an audio processing model for a Nordic nRF5340 (128 MHz app core, 256 KB
  SRAM, 1 MB flash, ~5mA active power). To implement a complex non-linear activation, the team presents
  two alternatives: Alternative A uses a 4KB Lookup Table (LUT) stored in SRAM to fetch the result in
  1-2 CPU cycles, while Alternative B computes a polynomial approximation on-the-fly requiring 6 MAC operations
  over 12 cycles. Evaluate which approach is more energy-efficient per operation and how it impacts the
  overall system power budget.'
details:
  realistic_solution: Alternative B is the correct design choice for optimizing energy per operation.
    Fetching data from the 256 KB SRAM costs significantly more energy than performing a few ALU operations
    on the 128 MHz app core. Even though the polynomial approximation takes more clock cycles, computing
    on-the-fly minimizes memory bandwidth and reduces the overall picojoules (pJ) consumed per inference,
    which is critical for maintaining the tight ~5mA active power constraint.
  common_mistake: Candidates often assume that fewer CPU cycles automatically translates to lower energy
    consumption, thereby favoring the LUT approach. They fail to apply the principles of the Horowitz
    energy table, which dictates that memory access is orders of magnitude more energy-intensive than
    arithmetic compute.
  napkin_math: 'Based on standard energy models (Horowitz), a 32-bit SRAM read consumes roughly 50 pJ.
    A 32-bit MAC operation (Multiply + Add) consumes about 3.2 pJ. For Alternative A (LUT): 1 SRAM read
    = 50 pJ per activation. For Alternative B (Compute): 6 MACs * 3.2 pJ = 19.2 pJ per activation. Alternative
    B consumes over 60% less energy per operation, proving that recomputing is cheaper than memory access.'
