schema_version: 1
id: tinyml-0737
title: The CMSIS-DSP FFT Scaling Bug
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You use the ARM CMSIS-DSP library to compute a 256-point FFT for an audio wake-word model. The
  audio signal is a perfect sine wave. However, the FFT output values are bizarrely small, much lower
  than the theoretical amplitude. The code isn't crashing, but the TinyML model fails to trigger because
  the input features are too weak. What scaling behavior of the CMSIS-DSP library did you forget to reverse?
details:
  realistic_solution: 'CMSIS-DSP''s fixed-point FFT functions (arm_cfft_q15, arm_cfft_q31) apply internal
    bit-growth downscaling to prevent overflow. For N=256 points, the output is scaled by 1/N = 1/256.
    A sine wave with amplitude 1.0 outputs as 0.0039. Your neural network expecting values near 1.0 sees
    near-zero features, producing 0% confidence. Fix: multiply the FFT output by N (256) after the transform,
    or use the arm_cfft_f32 floating-point variant which does not downscale. Alternatively, retrain the
    model on the scaled features. The function is correct — it is preventing integer overflow at the cost
    of dynamic range.'
  common_mistake: '"The microphone volume is too low." A hardware gain issue wouldn''t just make the FFT
    numbers small; it would increase the noise floor ratio. The prompt says it''s a *perfect* sine wave.'
  napkin_math: $N=256$. If the true amplitude of a frequency bin is $1.0$, the CMSIS-DSP function will
    output roughly $0.0039$ ($1 / 256$). If your neural network was expecting values near $1.0$, passing
    $0.0039$ guarantees a $0\%$ confidence score.
