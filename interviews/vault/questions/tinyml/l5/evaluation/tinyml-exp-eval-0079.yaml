schema_version: 1
id: tinyml-exp-eval-0079
title: Ethos-U55 Depth-First Scheduling for Memory Reuse
topic: operator-scheduling
status: published
provenance: imported
scenario: 'We are deploying an object detection model on a Corstone-300 subsystem featuring an ARM Cortex-M7
  (480 MHz) and an Ethos-U55 NPU sharing 512 KB of SRAM. The model has an early high-resolution feature
  extraction phase followed by two parallel branches for classification and bounding box regression. We
  have two scheduling options: Option A executes operators strictly breadth-first across both branches
  to maximize NPU batching and MAC utilization per cycle. Option B schedules operators depth-first, completing
  the regression branch before starting the classification branch, which risks higher M7-NPU context switching
  overhead. Evaluate which scheduling strategy is optimal given the hardware constraints.'
details:
  realistic_solution: Option B (depth-first scheduling) is the correct approach. On an Ethos-U55 system
    sharing just 512 KB SRAM with the Cortex-M7, memory availability strictly dictates performance bounds.
    Depth-first scheduling allows the system to compute and consume the intermediate tensors of one branch,
    immediately freeing that SRAM for the second branch. The overhead of context switching between the
    M7 and U55 is negligible compared to the latency penalties or outright failure of exhausting the on-chip
    SRAM.
  common_mistake: Candidates often default to Option A because they assume maximizing the Ethos-U55 MAC
    utilization is the primary objective in Edge AI. They fail to evaluate the shared 512 KB SRAM constraint,
    where holding multiple branch activations simultaneously inevitably leads to memory fragmentation
    or out-of-memory (OOM) errors.
  napkin_math: Assume the shared feature map before branching is 150 KB. Branch 1 needs 200 KB for intermediate
    activations; Branch 2 needs 180 KB. Under Option A (breadth-first), peak memory is 150 KB + 200 KB
    + 180 KB = 530 KB. This immediately exceeds the 512 KB total SRAM without even accounting for M7 RTOS/stack
    overhead (~64 KB), causing OOM. Under Option B (depth-first), peak memory is max(150+200, 150+180)
    = 350 KB. Adding the 64 KB M7 overhead totals 414 KB, safely fitting within the 512 KB shared SRAM
    while keeping the U55 fed.
