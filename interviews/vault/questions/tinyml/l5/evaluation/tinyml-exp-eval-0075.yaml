schema_version: 1
id: tinyml-exp-eval-0075
title: Evaluating Pipeline Latency on Cortex-M4
topic: latency-decomposition
status: published
provenance: imported
scenario: 'You are designing an anomaly detection system for an ARM Cortex-M4 (STM32F4) microcontroller
  running at 168 MHz with 256 KB SRAM, 1 MB flash, and explicitly no FPU. You must evaluate two latency
  breakdowns for the end-to-end pipeline: Alternative A relies on a 1024-point floating-point FFT preprocessing
  block followed by a tiny 50k MAC INT8 neural network. Alternative B uses lightweight integer-based time-domain
  preprocessing followed by a larger 200k MAC INT8 CNN. Both models use CMSIS-NN SIMD instructions, which
  achieve 2x INT8 MACs/cycle. Which end-to-end pipeline has lower latency?'
details:
  realistic_solution: Alternative B has significantly lower end-to-end latency. A proper latency decomposition
    reveals that the software-emulated floating-point FFT in Alternative A will dominate the total execution
    time, dwarfing the inference time. Alternative B intelligently shifts the computational burden from
    unoptimized preprocessing to the neural network inference step, where it can aggressively leverage
    the STM32F4's CMSIS-NN SIMD instructions to perform 2 INT8 MACs per cycle.
  common_mistake: 'Candidates typically focus solely on the neural network size and assume Alternative
    A is faster because the model has 4x fewer MAC operations. They fail to decompose the end-to-end latency
    and ignore the severe platform constraint: without an FPU, floating-point preprocessing requires software
    emulation and catastrophically bottlenecks the CPU.'
  napkin_math: 'STM32F4 clock speed: 168 MHz (168,000 cycles/ms). Alternative A: A 1024-point soft-float
    FFT takes ~3,000,000 cycles. Inference of 50k MACs @ 2 MACs/cycle = 25,000 cycles. Total Latency =
    3,025,000 cycles (~18.0 ms). Alternative B: Simple integer time-domain preprocessing takes ~50,000
    cycles. Inference of 200k MACs @ 2 MACs/cycle = 100,000 cycles. Total Latency = 150,000 cycles (~0.89
    ms). Alternative B reduces end-to-end latency by over 95%.'
