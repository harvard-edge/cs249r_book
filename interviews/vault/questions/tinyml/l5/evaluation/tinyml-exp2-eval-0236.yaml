schema_version: 1
id: tinyml-exp2-eval-0236
title: Evaluating On-Device Privacy Guardrails for Audio ML
topic: responsible-ai
status: published
provenance: imported
scenario: 'You are deploying a continuous audio keyword spotting model on a Nordic nRF5340 for a consumer
  wearable. The product team requires on-device privacy guardrails to ensure no non-keyword audio is transmitted
  or locally stored, while also demanding an evaluation framework to audit false positive rates across
  diverse demographics. Given the strict 256 KB SRAM limit and ~5mA active power constraint, evaluate
  two approaches: running a secondary, lightweight anomaly detection model alongside the keyword spotter
  vs. implementing deterministic audio buffering and cryptographic hashing of triggers.'
details:
  realistic_solution: The optimal approach is deterministic privacy via secure audio buffering that only
    retains the last few seconds of audio, immediately overwriting it unless a trigger is detected. For
    auditing fairness without transmitting raw audio, the system should compute and transmit anonymized,
    cryptographic hashes of the triggering audio features via BLE 5.3 alongside the activation event,
    allowing post-hoc statistical analysis of false activation distributions without exposing raw user
    data.
  common_mistake: Candidates often propose running a secondary ML-based guardrail model for fairness or
    privacy filtering without realizing it will exceed the 256 KB SRAM limit when combined with the primary
    model. They also frequently suggest transmitting audio samples for cloud-based auditing, violating
    the fundamental privacy requirement.
  napkin_math: Assuming the primary KWS model uses 150 KB SRAM, only 106 KB remains. A 3-second audio
    buffer at 16kHz (16-bit) requires 96 KB SRAM (3 * 16000 * 2 bytes), leaving just 10 KB for the OS
    and guardrail logic, making a secondary ML model impossible. Transmitting a 256-bit (32 byte) hash
    via BLE 5.3 takes minimal energy compared to the 96 KB raw audio, which at realistic BLE throughput
    (125 KB/s) would require ~0.76 seconds of transmission, drawing ~5mA active current and severely impacting
    the power budget.
