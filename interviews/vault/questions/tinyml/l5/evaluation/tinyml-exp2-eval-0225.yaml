schema_version: 1
id: tinyml-exp2-eval-0225
title: Degradation Strategy for Ethos-U55 Anomaly Detection
topic: graceful-degradation
status: published
provenance: imported
scenario: 'You are designing an industrial anomaly detection system on an ARM Cortex-M7 + Ethos-U55 (Corstone-300)
  platform. The primary model runs on the Ethos-U55 NPU (configurable up to 512 MACs/cycle), processing
  high-frequency vibration data. However, the system sometimes experiences thermal throttling that forces
  the NPU to shut down to prevent damage. You must design a graceful degradation strategy that maintains
  fail-operational status using only the Cortex-M7 (480 MHz) and the shared 512 KB SRAM. Evaluate two
  alternatives: A) switching to a smaller, less accurate CNN running on the Cortex-M7 using CMSIS-NN,
  or B) shedding the complex feature extraction and falling back to a simple time-domain variance thresholding
  heuristic on the M7.'
details:
  realistic_solution: Alternative B is superior for L5 graceful degradation on this platform. Time-domain
    variance thresholding requires negligible memory and compute, guaranteeing fail-operational status
    during thermal events without memory contention in the 512 KB shared SRAM. The goal of degradation
    here is safety and continuous baseline monitoring, not maintaining ML accuracy. The M7 can easily
    handle the heuristic at 480 MHz while allowing the system to cool down and safely reboot the NPU.
  common_mistake: Candidates often choose Alternative A because it maintains the ML paradigm, underestimating
    the memory and compute overhead of running even a small CNN on the M7 compared to the NPU. They forget
    that the M7 shares the 512 KB SRAM with the NPU; if the NPU model's weights and activations are still
    occupying SRAM during thermal shutdown, there isn't enough memory to load a fallback CNN without a
    complex and slow eviction process.
  napkin_math: Let's say the NPU model uses 400 KB of the 512 KB shared SRAM for weights/activations.
    Leaving only 112 KB. A small fallback CNN (e.g., MobileNetV2-tiny) might require 250 KB, causing OOM.
    Even if it fit, the NPU at 512 MACs/cycle does 512 ops per cycle. The M7 (with DSP extensions) might
    do 2 MACs/cycle. NPU throughput is 256x higher per clock. A 10M MAC inference takes ~20k cycles on
    NPU vs ~5M cycles on M7. At 480 MHz, 5M cycles is ~10ms, but running it continuously under thermal
    stress will generate more heat. The heuristic (Alternative B) takes ~1000 cycles (<3 us) and needs
    <1 KB SRAM, perfectly fitting the constraints.
