id: tinyml-cell-13219
title: Evaluate KV Cache Compression Techniques on Ethos-U55
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'Three KV cache compression techniques are compared for a 4-layer, 64-dim transformer on Cortex-M7+Ethos-U55:
  (A) sliding window 32 tokens (18KB cache), (B) grouped-query attention with 2 KV heads for 8 query heads
  (32KB cache), (C) key quantization to INT4 preserving full context (32KB cache for 128 tokens vs 64KB
  INT8). Context: 128-token input, downstream task requires >93% accuracy on MNLI-Small benchmark. Evaluate
  which technique provides best accuracy-memory Pareto point.'
details:
  realistic_solution: 'A) Sliding window: 18KB, accuracy drops to 89% (misses long-range dependencies).
    B) GQA 2 KV heads: 32KB, accuracy 94.1% (maintains most attention capacity with 4× KV reduction).
    C) Key INT4: 32KB for full 128-token context, accuracy 92.8% (quantization noise in keys vs queries
    hurts attention sharpness). Pareto winner: GQA at 32KB with 94.1% — achieves target >93% while saving
    50% vs baseline 64KB. Recommendation: GQA with 2 KV heads.'
  common_mistake: Evaluating only memory savings without measuring accuracy per KB saved; GQA often provides
    better Pareto trade-off than window attention for tasks requiring global context.
  napkin_math: 'Baseline KV: 4L×8H×64D×128T×1B = 262,144B = 256KB (INT8). GQA 2KV: 4L×2H×64D×128T×1B =
    65,536B = 64KB. Window 32T: 4L×8H×64D×32T×1B = 65,536B = 64KB. INT4 full: 256KB×0.5 = 128KB. Memory
    budget 64KB → A and B fit; C does not at full precision.'
