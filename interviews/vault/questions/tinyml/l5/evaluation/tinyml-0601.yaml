schema_version: 1
id: tinyml-0601
title: The Watchdog Interrupt Starvation
topic: real-time-deadlines
status: published
provenance: imported
scenario: Your Cortex-M4 runs a heavy anomaly detection model that takes 800ms to execute. Because this
  blocks the main loop, you move the ML inference into a timer interrupt (ISR) that fires every 1 second.
  Your device has a hardware watchdog timer that must be reset in the main loop every 500ms. After you
  move the ML to the ISR, the device constantly resets. Why?
details:
  realistic_solution: 'Running 800ms of ML inference inside an ISR blocks all lower-priority interrupts
    and the main loop for 800ms. The hardware watchdog requires a reset (kick) every 500ms from the main
    loop. Since the main loop is starved for 800ms, the watchdog times out at 500ms and resets the MCU.
    Fix: never run heavy computation in an ISR. Instead, set a flag in the timer ISR and run inference
    in the main loop. Or use an RTOS task with appropriate priority. ISRs should complete in microseconds,
    not hundreds of milliseconds. The watchdog is working correctly — it detected that the system became
    unresponsive.'
  common_mistake: '"The watchdog timer is too fast." While true, the fundamental architectural error is
    running heavy math inside an interrupt context.'
  napkin_math: ISR duration = 800ms. Watchdog deadline = 500ms. The CPU is trapped in the interrupt context
    300ms past the physical hardware kill-switch deadline.
