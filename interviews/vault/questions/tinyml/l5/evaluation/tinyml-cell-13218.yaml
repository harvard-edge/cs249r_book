schema_version: 1
id: tinyml-cell-13218
title: Evaluate Transformer vs CNN for Wake-Word Detection on MCU
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'A product team must choose between a 500K-parameter transformer (MHAttention, 2 layers) and
  a 300K-parameter DS-CNN for wake-word detection on Cortex-M4 at 168 MHz. The transformer achieves 97.2%
  accuracy vs DS-CNN''s 95.8% on the Google Speech Commands dataset. Transformer inference: 145ms, 1.8mW
  average power. DS-CNN: 28ms, 0.4mW. The device must wake the host MCU within 200ms of audio event and
  battery is 200mAh at 3.3V. Evaluate the system-level trade-offs.'
details:
  realistic_solution: 'Battery life: always-on inference every 200ms. Transformer: 1.8mW continuous →
    200mAh×3.3V / 1.8mW = 660Wh/1.8mW ... 200mAh×3.3V=0.66Wh; 0.66Wh/1.8mW=367h=15.3 days. DS-CNN: 0.66Wh/0.4mW=1650h=68.8
    days. Trade-off: 1.4% accuracy gain costs 53.5 days battery life. For wake-word (false negative =
    missed wake), transformer is better only if false-negative cost exceeds user re-charge friction.'
  common_mistake: Choosing the transformer based on accuracy alone without quantifying battery life impact;
    1.4% accuracy gain often doesn't justify 4.5× power increase in always-on applications.
  napkin_math: 'Battery: 200mAh × 3.3V = 0.66 Wh. Transformer: 0.66Wh / 0.0018W = 367h ≈ 15 days. DS-CNN:
    0.66Wh / 0.0004W = 1650h ≈ 69 days. Power ratio: 4.5×. Latency: both < 200ms budget. Decision criterion:
    false-negative rate and recharge UX.'
