schema_version: 1
id: tinyml-0603
title: The MCU Throughput Ceiling
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: Your anomaly detection model needs 10 million MACs per inference. You need 10 inferences per
  second on a Cortex-M4 at 168 MHz with CMSIS-NN SIMD. Does the math work? And what happens to the rest
  of the system?
details:
  realistic_solution: 'The 336 MMAC/s is the peak throughput for pure MAC operations. Real inference includes:
    (1) **Memory loads** — fetching weights and activations from SRAM takes cycles. If data isn''t in
    the CPU''s small cache (typically 4-16 KB on M4), every load stalls the pipeline. (2) **Activation
    functions** — ReLU is cheap (1 cycle), but sigmoid/tanh require lookup tables or polynomial approximation
    (10-20 cycles each). (3) **Requantization** — between layers, INT32 accumulator results must be rescaled
    back to INT8 (shift, round, clamp: ~5 cycles per element). (4) **Loop overhead** — index computation,
    bounds checking, pointer arithmetic.'
  common_mistake: '"336 MMAC/s with SIMD. 10M × 10 = 100 MMAC/s needed. That''s only 30% utilization —
    plenty of headroom." This ignores the non-MAC overhead.'
  napkin_math: 'Peak: 336 MMAC/s. Effective (60% utilization): 202 MMAC/s. ML workload: 100 MMAC/s = 50%
    of effective throughput. Sensor acquisition (16 kHz ADC, FFT): ~30 MMAC/s = 15%. UART comms: ~10 MMAC/s
    = 5%. Total: 70% utilization. Headroom: 30% — tight but feasible. At 80% effective utilization threshold
    (reliability margin): 100/0.8 = 125 MMAC/s needed → 62% of effective capacity. Feasible with careful
    scheduling.'
