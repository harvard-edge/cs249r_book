schema_version: 1
id: tinyml-0731
title: Flash Endurance Under Continuous Inference Logging
topic: vram-budgeting
status: published
provenance: imported
scenario: Your vibration monitoring sensor logs inference results to on-chip flash. The sensor runs 1
  inference per second, 24/7. How does the ML model's output dimensionality (e.g., a 20-class classifier
  vs a 1000-class model) dictate the flash write rate, and how does the flash endurance budget determine
  the maximum model output complexity you can log?
details:
  realistic_solution: Flash endurance is dictated by the number of page erases, which is driven by the
    volume of data written. The ML model's output tensor size is the primary variable. If you deploy a
    simple 4-class anomaly detector, the output is just 4 bytes (INT8 probabilities) plus a timestamp
    = 8 bytes per inference. If you deploy a 1000-class fine-grained diagnostic model, the output tensor
    is 1000 bytes.
  common_mistake: '"1 MB of flash is huge, we can log whatever the model outputs." This ignores the physics
    of NOR flash write amplification and how the ML output tensor size directly drives hardware failure.'
  napkin_math: 'STM32L4 flash: 2 KB pages, 10,000 cycle endurance. Reserve 256 KB (128 pages) for logging.
    Total lifetime page erases = 128 × 10,000 = 1.28 million erases. 5 years = 157 million seconds. To
    survive 5 years, you can only erase a page every 122 seconds (157M / 1.28M). A 2 KB page filling every
    122 seconds means your maximum write budget is 16 bytes per second. If the inference runs at 1 Hz,
    the ML output tensor + metadata *cannot exceed 16 bytes*. A 1000-class model (1000 bytes) will destroy
    the flash in 28 days. You are physically constrained to a model with ≤12 classes (assuming 4 bytes
    for timestamp).'
