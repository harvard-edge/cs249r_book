schema_version: 1
id: tinyml-0008
title: The Observation Gap
topic: duty-cycling
status: published
provenance: imported
scenario: To save power, your forest-monitoring device wakes up for 5 seconds every minute to listen for
  bird calls. Your model has 99% accuracy in the lab, but in the field, it misses over 90% of the bird
  calls. Based on the duty-cycle diagram, why is your accuracy 'failing' in production?
details:
  realistic_solution: 'You have a **Duty Cycle Coverage Gap**. Uniform duty cycling is fundamentally wrong
    for event-driven detection. If a bird calls during the 55-second sleep window, it is never recorded.
    The fix is a **Two-Tier Wake Architecture**: use a low-power analog comparator (~5 µW) to listen for
    *any* sound above a threshold. This comparator triggers an interrupt to wake the MCU only when an
    actual event is occurring.'
  common_mistake: '"The model needs retraining — it''s missing detections." The model is fine; the microphone
    is simply turned off when the birds are calling.'
  napkin_math: With a 5s/60s cycle, your probability of missing a random 1-second event is $1 - (5/60)
    = 91.7\%$. No amount of model optimization can recover data that was never captured.
