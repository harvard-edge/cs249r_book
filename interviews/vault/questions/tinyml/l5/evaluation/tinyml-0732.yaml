schema_version: 1
id: tinyml-0732
title: The Unaligned Struct Padding
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: 'You define a C-struct to hold your sensor telemetry and ML prediction before writing it to
  Flash memory. It looks like this: `struct { char sensor_id; int32_t prediction; char status; }`. You
  expect it to take 6 bytes (1+4+1). When you check your Flash usage, you are writing 12 bytes per log.
  You are running out of Flash twice as fast as expected. Why?'
details:
  realistic_solution: 'C compiler struct padding for alignment. The int32_t requires 4-byte alignment.
    Layout: char sensor_id (1 byte) + 3 bytes padding + int32_t prediction (4 bytes) + char status (1
    byte) + 3 bytes trailing padding = 12 bytes. Fix: reorder fields by size descending: struct { int32_t
    prediction; char sensor_id; char status; } = 4 + 1 + 1 + 2 padding = 8 bytes. Or use __attribute__((packed))
    for exactly 6 bytes (but this causes unaligned access penalties on ARM). For 100K logs: packed saves
    600KB of flash. Always check sizeof() and order struct fields largest-to-smallest.'
  common_mistake: '"The compiler is adding null terminators to the chars." Null terminators only apply
    to strings, not single characters.'
  napkin_math: 100,000 logs * 12 bytes = 1.2 MB Flash used. 100,000 logs * 6 bytes (packed) = 600 KB Flash
    used. You just saved 600 KB of physical silicon by rearranging lines of code.
