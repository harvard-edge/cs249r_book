schema_version: 1
id: tinyml-fill-00440
title: Optimizing TinyML Latency on FPU-less Microcontrollers
topic: profiling-bottleneck-analysis
status: published
provenance: imported
scenario: 'You are tasked with deploying a real-time anomaly detection model on an ARM Cortex-M4 STM32F4
  microcontroller (168 MHz, 256 KB SRAM, no FPU). The current quantized model has an inference latency
  of 150ms, while the hard real-time requirement is 80ms. You suspect bottlenecks in either compute, memory
  access, or I/O. Outline a systematic approach to identify the primary bottleneck(s). Furthermore, you
  are considering two alternative model architectures: Architecture A (a MobileNet-like quantized CNN)
  and Architecture B (a highly optimized recurrent neural network). Both fit within the 256 KB SRAM. How
  would you evaluate and compare these two architectures to determine which one is more likely to meet
  the 80ms latency target on this specific hardware, considering the CPU clock speed and the absence of
  a Floating Point Unit?'
details:
  realistic_solution: Begin with on-device profiling using tools like the ST-Link profiler or by instrumenting
    the code with timing macros to measure execution times of different model layers, pre-processing,
    and post-processing steps. Analyze instruction cycle counts, memory access patterns, and potential
    cache misses. For architecture evaluation, create simplified benchmarks for core operations (e.g.,
    fixed-point matrix multiplication, convolution kernels) for both architectures, specifically optimized
    for the Cortex-M4, and measure their execution on the target hardware. Use these benchmarks to estimate
    the overall inference time. Pay close attention to MAC operations, data movement, and the efficiency
    of fixed-point implementations.
  common_mistake: Jumping directly to code optimization or complex algorithmic changes without systematic
    profiling. Overlooking the significant performance impact of fixed-point arithmetic overheads or inefficient
    memory access patterns on an FPU-less architecture. Not considering the overhead of the operating
    system, device drivers, or peripheral interactions.
  napkin_math: Given the 168 MHz clock speed and an 80ms latency target, the total available cycles for
    inference are approximately 0.08 s * 168 * 10^6 cycles/s = 13,440,000 cycles. If a critical fixed-point
    multiply-accumulate (MAC) operation, without FPU, takes an estimated 8 clock cycles on the Cortex-M4,
    then a layer requiring 1 million MACs would consume 1,000,000 MACs * 8 cycles/MAC = 8,000,000 cycles.
    This leaves approximately 5.44 million cycles for other model layers, pre/post-processing, and system
    overheads. Compare the total estimated cycle count for each candidate architecture (A and B) against
    the 13.44 million cycle budget.
