id: tinyml-fill-00896
title: Knowledge Distillation vs. Pruning on ARM Cortex-M4 for Real-time Anomaly Detection
topic: knowledge-distillation
status: published
provenance: imported
scenario: 'Your team is tasked with deploying a deep learning model for real-time anomaly detection on
  an ARM Cortex-M4 STM32F4 microcontroller (168 MHz CPU, 256 KB SRAM, no FPU). You have a large, highly
  accurate teacher model (e.g., ResNet-50) running on a server, and you need to achieve 90% of its accuracy
  on the embedded device. Two main strategies are being considered for creating the on-device student
  model: (1) aggressive pruning of the teacher model, or (2) knowledge distillation (e.g., logit matching
  or feature distillation) to train a smaller, simpler student architecture. Compare and contrast these
  two approaches specifically for this hardware platform, detailing how you would evaluate their effectiveness
  in terms of inference latency, peak memory footprint, and final accuracy. Provide concrete metrics you
  would track for evaluation.'
details:
  realistic_solution: The realistic solution involves a multi-pronged approach. First, for the student
    model, prioritize architectures inherently suitable for resource-constrained embedded devices (e.g.,
    MobileNetV2 with reduced width/depth, EfficientNet-Lite variants, or custom CNNs with group convolutions).
    Explicitly design for 8-bit integer fixed-point quantization from the outset, using quantization-aware
    training. Implement a knowledge distillation strategy (e.g., logit matching or transfer of intermediate
    feature representations) where the large teacher model supervises the training of this quantized,
    compact student model. During distillation, ensure the student model's operations are compatible with
    the FPU-less environment, leveraging libraries like CMSIS-NN for optimized integer arithmetic. For
    evaluation, establish a clear benchmark directly on the STM32F4 hardware, measuring peak SRAM usage,
    average inference time per sample, and accuracy using a representative real-world dataset. The comparison
    with pruning would involve taking a pruned version of the teacher, quantizing it appropriately for
    the hardware, and performing the same rigorous on-device evaluation to determine which method yields
    the best trade-off between accuracy, memory footprint, and latency given the 256 KB SRAM and 168 MHz
    CPU constraints.
  common_mistake: Overlooking the unique constraints of an FPU-less microcontroller. Without an FPU, floating-point
    operations are extremely slow or require software emulation, which significantly impacts performance
    and battery life. A common mistake is to directly apply a distillation or pruning strategy designed
    for higher-end hardware without accounting for the absolute necessity of quantization-aware training
    or fixed-point arithmetic for deployment on the STM32F4, leading to models that either don't fit in
    the 256 KB SRAM or fail to meet real-time inference requirements.
  napkin_math: 'Consider the memory footprint for a typical convolutional layer''s activations and weights
    within a compact student model. For an 8-bit quantized model:

    - Input feature map (e.g., 32x32x16, HWC) and output feature map (e.g., 32x32x32): (32 * 32 * 16 +
    32 * 32 * 32) bytes ≈ 49 KB.

    - Convolutional kernel (e.g., 3x3x16 input channels x 32 output channels): (3 * 3 * 16 * 32) bytes
    ≈ 4.6 KB.

    - Bias (32 elements): 32 bytes.

    - Total for just *one* layer (activations + weights) can easily be ~50-60 KB. With 256 KB SRAM, a
    model with more than 4-5 such layers can quickly exhaust available memory for just model parameters
    and activations, without accounting for the OS, stack, heap, and other application data. This highlights
    the extreme pressure on model size and the need for careful architectural choices and aggressive compression.'
