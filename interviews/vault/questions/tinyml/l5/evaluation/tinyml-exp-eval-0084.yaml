schema_version: 1
id: tinyml-exp-eval-0084
title: Evaluate SRAM vs Flash Tensor Arena Placement
topic: tensor-arena-planning
status: published
provenance: imported
scenario: You are deploying a vision model to an ARM Cortex-M7 + Ethos-U55 (Corstone-300) system featuring
  a 480 MHz M7 and 512 KB of shared SRAM. You must choose between two tensor arena allocation strategies
  for a memory-intensive layer. Strategy A maps all intermediate activations to the shared SRAM, resulting
  in a peak memory of 460 KB. Strategy B modifies the operator schedule to spill a 200 KB intermediate
  activation tensor to execute-in-place (XIP) external flash, reducing peak SRAM to 260 KB. Evaluate which
  memory planning strategy is better for the overall system performance and state the architectural tradeoffs.
details:
  realistic_solution: Strategy A is the correct approach because the Ethos-U55 requires fast, shared SRAM
    access to sustain its 128-512 MAC/cycle throughput. While 460 KB of peak SRAM usage is aggressive
    and leaves only 52 KB for the M7 stack and heap, placing intermediate activations in external flash
    introduces a massive memory wall that negates the NPU's hardware acceleration. If 52 KB is strictly
    insufficient for the application, the correct system-level decision is to rewrite the network using
    operator cascading or memory-efficient blocks to lower the peak arena size, rather than spilling activations
    to slow flash.
  common_mistake: Candidates often choose Strategy B to leave more headroom in the 512 KB SRAM for the
    RTOS and other application code. They fail to realize that the Ethos-U55's high throughput relies
    entirely on high-bandwidth shared SRAM, and reading/writing intermediate activations to flash will
    cause severe pipeline stalls.
  napkin_math: Assuming the Ethos-U55 is configured for 256 MACs/cycle running at 480 MHz, its peak compute
    is 122.8 GMACs/sec. Fetching the 200 KB activation tensor from the shared SRAM (assuming a 32-bit
    AXI bus at 480 MHz providing ~1.9 GB/s) takes roughly 0.105 ms. In contrast, reading 200 KB from typical
    quad-SPI flash (averaging ~50 MB/s) takes 4.0 ms. This 38x increase in data movement time per layer
    will stall the NPU almost entirely, severely degrading inference latency.
