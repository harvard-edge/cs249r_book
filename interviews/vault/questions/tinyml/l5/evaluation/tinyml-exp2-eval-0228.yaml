schema_version: 1
id: tinyml-exp2-eval-0228
title: XIP vs DMA Paging on nRF5340
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: 'You are deploying an always-on keyword spotting CNN on the Nordic nRF5340 (128 MHz app core,
  256 KB SRAM, 1 MB flash, ~5mA active). The model requires 120 KB for intermediate activation buffers
  and 200 KB for quantized weights. Since the total memory footprint exceeds the 256 KB SRAM, you must
  evaluate two memory architectures: (A) storing weights in flash and reading them directly via XIP (Execute-in-Place)
  during inference, or (B) allocating a 32 KB SRAM double-buffer to dynamically page weights from flash
  via DMA. Evaluate both approaches, focusing on the latency and power trade-offs for this specific hardware.'
details:
  realistic_solution: Given the nRF5340's 128 MHz app core, flash access incurs significant wait states
    compared to zero-wait-state SRAM, which severely degrades MAC throughput if executing directly (Option
    A). Option B (DMA double-buffering) is the superior architectural choice. By using 32 KB of the remaining
    136 KB SRAM (256 KB - 120 KB), the system can page in the next weight chunk via DMA while the CPU
    computes on the current chunk. This overlaps memory access with compute, maximizing the 128 MHz core
    utilization and allowing the device to return to a low-power sleep state faster, which is critical
    for optimizing the ~5mA active power budget.
  common_mistake: Candidates often assume XIP is zero-cost or evaluate only the static capacity without
    considering the wait-state penalty of reading from flash at 128 MHz. They may also incorrectly assume
    that setting up DMA double-buffering is always inefficient due to SRAM overhead, without realizing
    it hides flash access latency behind compute.
  napkin_math: Assume inference requires loading the 200 KB weights exactly once. Reading from flash at
    128 MHz incurs ~3 cycles per byte, totaling ~600,000 wait-state cycles for Option A. At 128 MHz, this
    adds 4.68 ms of execution time per inference (600k / 128M). With the device drawing ~5mA in active
    mode, Option A wastes 23.4 µC (4.68 ms * 5mA) per inference compared to Option B, which completely
    hides the 600k cycle fetch behind CPU compute. For an always-on model running at 10 inferences per
    second, Option B saves ~234 µA of average continuous current.
