id: tinyml-exp-eval-0073
title: NPU Thermal Fallback Strategy
topic: graceful-degradation
status: published
provenance: imported
scenario: 'You are designing a fail-operational predictive maintenance system on an ARM Cortex-M7 + Ethos-U55
  (Corstone-300) platform. Under normal operation, the Ethos-U55 (configured for 256 MAC/cycle) executes
  a 25M MAC primary CNN model. When a thermal limit is reached, the NPU is power-gated, requiring a fallback
  model to run on the 480 MHz Cortex-M7 sharing the 512 KB SRAM. You must evaluate two fallback designs
  against a strict 5ms inference deadline: Design A is a distilled 5M MAC CNN, while Design B is a 200K
  operation Random Forest.'
details:
  realistic_solution: Design B is the correct fail-operational choice. While the distilled CNN (Design
    A) provides a smoother accuracy degradation curve, it violates the 5ms latency constraint when executed
    on the CPU. The Random Forest meets the deadline, ensuring the system safely degrades its predictive
    quality without starving the real-time control loop.
  common_mistake: Candidates often choose Design A because it preserves the deep learning feature extraction
    pipeline, assuming a 5x reduction in MACs is sufficient. They fail to calculate the actual execution
    time on the M7 without the NPU's massive parallelism, missing the hard real-time latency deadline.
  napkin_math: 'Primary NPU inference: 25M MACs / (480 MHz * 256 MAC/cycle) = 0.20 ms. Design A on M7:
    Assuming an optimistic 2 MACs/cycle using Cortex-M DSP extensions, throughput is 960 MMAC/s. 5M MACs
    / 960 MMAC/s = 5.2 ms (Violates 5ms deadline). Design B on M7: Assuming ~1 operation/cycle, 200K ops
    / 480 MHz = 0.41 ms (Safely under the 5ms deadline).'
