schema_version: 1
id: tinyml-0077
title: Federated Learning on Constrained Devices
topic: 3d-parallelism
status: draft
provenance: imported
scenario: You manage 10,000 vibration sensors on factory equipment. Each sensor runs anomaly detection
  on a Cortex-M4. After 6 months, the model drifts because equipment ages and vibration patterns change.
  You want to update the model using data from the fleet — but you can't upload raw sensor data (proprietary
  manufacturing data, 100 TB total). Can you do federated learning on MCUs?
details:
  realistic_solution: 'Standard federated learning is infeasible on a Cortex-M4 with 256 KB SRAM: backward
    pass needs 2x forward memory (~400 KB), plus optimizer state (another 400 KB). Instead, use MCU-compatible
    alternatives: (1) Head-only fine-tuning — freeze the backbone, retrain only the 64x4 classification
    head (512 bytes of weights, 1.5 KB total gradient memory). Recovers 60-80% of drift. (2) Federated
    statistics — each device computes feature means/variances (no backprop), uploads 2 KB of summary statistics.
    The cloud retrains the full model using these statistics. Recovers 90-95% of drift. Both fit in 256
    KB SRAM.'
  common_mistake: '"Run standard federated averaging — each device trains locally and sends gradients."
    Standard FL requires backpropagation, which needs: (1) storing all activations for the backward pass
    (2× the forward-pass memory), (2) float32 arithmetic for stable gradients, (3) an optimizer state
    (momentum, Adam state). None of this fits on a Cortex-M4 with 256 KB SRAM.'
  napkin_math: 'Full FL (infeasible): backward pass memory = 2× forward = 400 KB. Doesn''t fit in 256
    KB. Optimizer state (Adam): 2× model size = 400 KB. Doesn''t fit. Head-only FL: head weights = 64
    × 4 classes × 2 bytes = 512 bytes. Gradient computation: 64 activations × 4 classes × 2 bytes = 512
    bytes. SGD update: 512 bytes. Total: ~1.5 KB. Fits in 256 KB with 254.5 KB to spare. Accuracy recovery:
    head-only fine-tuning typically recovers 60-80% of the drift-induced accuracy loss. Full model retraining
    (in the cloud, using federated statistics) recovers 90-95%.'
