id: tinyml-fill-00220
title: TinyML Memory Hierarchy Optimization on STM32F4
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: 'You are tasked with deploying a convolutional neural network (CNN) for image classification
  on an **ARM Cortex-M4 STM32F4 microcontroller (168 MHz, 256 KB SRAM, no FPU)**. The original model requires
  512 KB for its weights and activations. Since the STM32F4''s internal SRAM is only 256 KB, you must
  optimize the memory usage. You are considering two primary architectural approaches:


  **Approach A: Aggressive Quantization & Pruning**

  You apply aggressive 4-bit quantization and pruning techniques, reducing the model size to 192 KB, which
  comfortably fits into the internal SRAM. This approach leverages the fastest available memory (SRAM)
  for all model parameters and intermediate activations.


  **Approach B: External QSPI Flash with Software Cache**

  You decide to store the full 512 KB model weights in an external 4 MB QSPI NOR Flash memory (read latency:
  50 ns for initial access, 10 ns per subsequent byte in burst mode; burst transfer rate up to 80 MHz).
  Activations are still processed in SRAM. You implement a custom software-managed cache in SRAM to bring
  frequently used weight blocks into internal SRAM, aiming to minimize QSPI access latency.


  **Question:** Evaluate these two architectural approaches in terms of capacity-bandwidth-latency tradeoffs.
  Which approach would you recommend for maximizing inference throughput while maintaining acceptable
  power consumption for a real-time application? Justify your choice with qualitative analysis and consider
  any necessary napkin math.'
details:
  realistic_solution: 'A candidate should first assess the accuracy degradation of Approach A through
    profiling. If acceptable, this approach is generally superior due to lower latency, higher energy
    efficiency, and simpler implementation. If not, Approach B requires careful design: analyzing weight
    access patterns to optimize cache line size and replacement policies, prioritizing burst reads from
    QSPI to maximize bandwidth, and performing detailed power consumption estimates. The solution should
    emphasize the iterative process of profiling and optimization, and acknowledge that the optimal choice
    depends on the specific model, performance targets, and power budget.'
  common_mistake: Overlooking the CPU overhead and power consumption associated with software-managed
    caching for external memory access, or failing to quantify the accuracy impact of aggressive quantization.
    Another common mistake is underestimating the true latency cost of non-cached external memory reads
    versus burst reads, and the CPU cycles lost to cache management.
  napkin_math: 'SRAM access: ~1 CPU cycle (~6 ns @ 168 MHz). A 32-byte cache line read from QSPI Flash
    (non-cached, initial access) would take approximately 50 ns (initial latency) + (32 bytes / 80 MB/s)
    = 50 ns + 400 ns = 450 ns. This is roughly 75 times slower than SRAM per block access, highlighting
    the critical need for a high cache hit rate in Approach B to approach SRAM-like performance, or the
    power/latency cost will be prohibitive.'
