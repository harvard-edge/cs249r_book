id: tinyml-0070
title: The OTA Bandwidth Congestion
topic: ota-firmware-updates
status: published
provenance: imported
scenario: You have a fleet of 5,000 smart factory sensors connected via a shared LoRaWAN gateway. You
  push a 100 KB model update to the fleet simultaneously. The OTA update process stalls, taking days to
  complete, and normal sensor telemetry stops functioning entirely. What network characteristic of LoRaWAN
  did you violate?
details:
  realistic_solution: 'LoRaWAN uses an ALOHA-based MAC with mandatory duty cycle limits (1% in EU868).
    A 51-byte payload at SF12 takes 2.5s airtime, requiring 247s of silence before the next transmission.
    Pushing 100 KB to 5,000 devices unicast requires 100,000/51 = ~2,000 packets per device x 250s spacing
    = 500,000s per device — 5.8 days, but all 5,000 devices share the same channel, causing massive collisions.
    Fix: use LoRaWAN Class C multicast (all devices listen simultaneously for a single broadcast stream),
    fragment the update into 51-byte chunks, and implement forward error correction to handle missed packets
    without individual retransmission.'
  common_mistake: '"100 KB is too large for the gateway." While true, it''s not just the size; it''s the
    collision domain and the protocol duty cycle.'
  napkin_math: In LoRa SF12, a 51-byte payload takes ~2.5 seconds of airtime. A 1% duty cycle means the
    device must remain completely silent for the next 247 seconds before it can send an ACK. Sending 100
    KB point-to-point to 5,000 devices is mathematically impossible under these physics.
