schema_version: 1
id: tinyml-0608
title: The OTA Heap Fragmentation
topic: ota-firmware-updates
status: published
provenance: imported
scenario: Your ESP32 has 150 KB of free heap memory. You initiate an Over-The-Air (OTA) update that requires
  allocating a 64 KB download buffer. The `malloc(65536)` call fails with an Out-of-Memory error. You
  have 150 KB free. Why did a 64 KB allocation fail?
details:
  realistic_solution: 'Heap fragmentation. The ESP32''s 150KB of free heap is split across hundreds of
    small, non-contiguous blocks after allocations and frees from WiFi, BLE, and TLS stacks. The largest
    contiguous free block may be only 12KB despite 150KB total free. malloc(64KB) requires a single contiguous
    64KB region — which does not exist. Fix: (1) allocate the OTA buffer at boot before fragmentation
    occurs, (2) use a static buffer (uint8_t ota_buf[65536]), (3) use a memory pool allocator for dynamic
    allocations. Check heap health with esp_get_largest_free_block() before attempting large allocations.'
  common_mistake: '"The OS reserves that memory." The OS already took its share; 150 KB is what''s reported
    as free for the application.'
  napkin_math: Total Free = 150 KB. Largest Free Block = 12 KB. Asking for 64 KB fails instantly, crashing
    the OTA process and stranding the device on old firmware forever.
