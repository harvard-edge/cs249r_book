id: tinyml-0076
title: The Continuous Logging Flash Death
topic: vram-budgeting
status: published
provenance: imported
scenario: Your smart thermostat logs the room temperature and the ML model's occupancy prediction to internal
  Flash memory every 5 minutes for user analytics. You are using a standard SPIFFS filesystem. The internal
  flash has a 10,000 cycle erase limit. A year later, 15% of the devices are permanently bricked. How
  did logging 20 bytes every 5 minutes destroy the Flash?
details:
  realistic_solution: 'SPIFFS doesn''t do wear-leveling on metadata sectors. Each 20-byte log triggers
    a metadata sector update (file size, timestamp). At 288 logs/day, that sector sees 288 erases/day
    x 365 = 105,120 cycles/year — 10x the 10,000-cycle flash rating, killing the sector in 34 days. Once
    the metadata sector dies, the entire filesystem is corrupted, bricking the device. Fix: replace SPIFFS
    with LittleFS (built-in wear-leveling), use a circular buffer in a dedicated flash region with manual
    wear-leveling, or accumulate logs in RAM and batch-write once per hour (reduces erase cycles from
    288/day to 24/day).'
  common_mistake: '"20 bytes * 105,000 logs a year is only 2 MB. It didn''t fill up the drive." It didn''t
    fill up the drive, it destroyed the silicon via Write Amplification.'
  napkin_math: 1 log every 5 mins = 288 logs/day. If each log updates a metadata sector, that sector is
    erased 288 times a day. 288 * 365 = 105,120 erase cycles per year. The Flash is rated for 10,000 cycles.
    You physically destroyed the silicon in exactly 34 days.
