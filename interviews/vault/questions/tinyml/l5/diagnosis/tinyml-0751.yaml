id: tinyml-0751
title: The TFLite Micro Resolving Pointer
topic: graph-compilation
status: published
provenance: imported
scenario: You profile a TFLite Micro inference loop on a Cortex-M4. You notice that the actual math kernel
  (`arm_convolve_s8`) takes 10ms, but the overall `invoke()` call takes 13ms. You trace the extra 3ms
  to the framework's internal `GetTensor()` function. Why does looking up a tensor address take 3ms?
details:
  realistic_solution: 'TFLite Micro stores tensors in a FlatBuffer — a serialized format designed for
    mobile, not MCUs. Each GetTensor() call parses the FlatBuffer''s offset tables, performs bounds checking,
    and resolves nested pointers. With poor cache locality on the FlatBuffer''s vtable structure (scattered
    across memory), each lookup incurs multiple cache misses. For 150 GetTensor calls per inference at
    ~1000 cycles each: 150K cycles = 1-3ms overhead. Fix: (1) use TFLite Micro''s static memory planner
    which pre-resolves all tensor pointers at init, or (2) cache resolved pointers in a lookup table after
    the first inference. This eliminates repeated FlatBuffer parsing.'
  common_mistake: '"The tensor is stored in slow Flash." `GetTensor()` just returns a pointer; it doesn''t
    read the whole tensor.'
  napkin_math: A 50-layer model with 3 tensors per layer = 150 `GetTensor` calls per inference. If a dynamic
    lookup and bounds check takes 1,000 cycles (due to poor cache locality on the FlatBuffer), you lose
    150,000 cycles (~1-3ms) purely on framework plumbing.
