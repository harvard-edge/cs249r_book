id: tinyml-0122
title: The AMP Mailbox Full
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your system uses Asymmetric Multi-Processing (AMP). A Linux Cortex-A processor handles the network,
  and a bare-metal Cortex-M processor handles the real-time ML sensors. They communicate via an RPMsg
  (Remote Processor Messaging) mailbox. The ML core detects anomalies at 500 Hz and sends a 10-byte message
  to Linux for each one. The system runs for 5 seconds and then the ML core crashes with a `Mailbox Full`
  error. Linux is running fine. Why did the mailbox fill up?
details:
  realistic_solution: 'The Linux Cortex-A processes RPMsg messages through the kernel driver, context
    switches, and userspace handler — effective throughput ~100 msg/sec. The ML Cortex-M generates anomalies
    at 500 Hz. Net gain: +400 messages/sec. With a 2,000-message mailbox: overflow in exactly 5.0 seconds.
    Fix: (1) Aggregate on the M core — batch 50 anomalies into one message (reduces rate to 10 msg/sec).
    (2) Implement backpressure — M core checks mailbox occupancy before sending, dropping or buffering
    locally if >80% full. (3) Use a shared-memory ring buffer instead of RPMsg for high-throughput sensor
    data, reserving RPMsg for low-rate control messages.'
  common_mistake: '"The mailbox size is too small." You can''t just make the mailbox infinitely large;
    the issue is the processing rate disparity.'
  napkin_math: Inflow = 500/sec. Outflow = 100/sec. Net gain = +400 msgs/sec. If the mailbox holds 2000
    messages, the system mathematically guarantees a catastrophic crash in exactly 5.0 seconds.
