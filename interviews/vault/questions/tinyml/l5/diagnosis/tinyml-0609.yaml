id: tinyml-0609
title: The Sensor ODR Aliasing
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your ML model detects motor bearing faults by looking for a high-frequency vibration spike at
  400 Hz. You configure your IMU sensor's Output Data Rate (ODR) to 500 Hz to save power. You collect
  the data, run an FFT, and the ML model completely fails to see the 400 Hz spike. In fact, it thinks
  there is a massive anomaly at 100 Hz. Why did 400 Hz become 100 Hz?
details:
  realistic_solution: 'Nyquist-Shannon aliasing. The 500Hz ODR gives a Nyquist limit of 250Hz — any signal
    above 250Hz aliases to a mirror frequency. The 400Hz signal aliases to |500 - 400| = 100Hz, creating
    a phantom peak that the model interprets as a different fault. Fix: set ODR to at least 2x the highest
    frequency of interest: 400Hz * 2 = 800Hz minimum (1kHz recommended for margin). Alternatively, if
    the sensor has an anti-aliasing filter (most IMUs do), configure its cutoff below Nyquist. The math
    is correct; the data is fundamentally compromised before it reaches the FFT.'
  common_mistake: '"The FFT math is wrong." The math is right; the data going into the math is fundamentally
    compromised.'
  napkin_math: Nyquist Limit = ODR / 2. 500 Hz / 2 = 250 Hz. You are completely blind to anything vibrating
    faster than 250 times a second.
