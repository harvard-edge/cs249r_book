schema_version: 1
id: tinyml-0115
title: The Sleep Mode Wi-Fi Disconnect
topic: duty-cycling
status: published
provenance: imported
scenario: Your ESP32 battery-powered camera needs to send an image to the cloud when motion is detected.
  To save power, you put it into Light Sleep. The Wi-Fi modem stays powered on to maintain the router
  connection. However, when it wakes up to send an image, the `send()` call fails, and it has to do a
  full 3-second DHCP reconnection, draining the battery. Why did the router drop the connection if the
  modem was on?
details:
  realistic_solution: 'In Light Sleep, the WiFi modem stays powered but the CPU is halted. The modem cannot
    respond to the router''s DTIM (Delivery Traffic Indication Message) beacons — periodic broadcasts
    that tell clients ''I have buffered data for you, acknowledge within Xms.'' After missing several
    consecutive DTIM beacons (~30 minutes worth), the router deauthenticates the client and frees its
    association slot. The modem physically has power but is functionally disconnected. Fix: configure
    Light Sleep to wake the CPU briefly for each DTIM interval (~100ms wake every ~300ms), costing ~2ms
    at 50 mA per beacon — 9,000x cheaper than a full 3-second DHCP reconnection.'
  common_mistake: '"The ESP32 turned off the antenna." The prompt specifies the modem was kept on.'
  napkin_math: A DTIM wake-up takes ~2ms at 50mA (0.1 mAs). A full DHCP/TLS reconnect takes ~3000ms at
    300mA (900 mAs). Missing the beacons costs you 9,000x more energy when you finally need to transmit.
