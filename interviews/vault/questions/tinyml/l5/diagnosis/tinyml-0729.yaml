schema_version: 1
id: tinyml-0729
title: The SRAM Fragmentation Crash
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: 'Your smart doorbell on a Cortex-M7 (STM32H7, 480 MHz, 1 MB SRAM) runs three models: (1) person
  detection (200 KB arena), (2) face recognition (300 KB arena), (3) gesture recognition (150 KB arena).
  Only one model runs at a time, switched based on context. After 48 hours of continuous operation with
  frequent model switching, `AllocateTensors()` fails for the face recognition model even though 300 KB
  should be available. Total SRAM used by firmware: 400 KB. Free SRAM: 600 KB. Why can''t it allocate
  300 KB?'
details:
  realistic_solution: 'The problem is **heap fragmentation** in the system allocator that manages the
    arenas themselves. Here''s the memory timeline:'
  common_mistake: '"600 KB free > 300 KB needed — must be a bug in TFLite Micro''s allocator." TFLite
    Micro''s arena allocator is a simple bump allocator that doesn''t fragment. But the system-level memory
    management around it does.'
  napkin_math: 'SRAM: 1 MB. Firmware: 400 KB. Available: 600 KB. Model arenas: 200/300/150 KB. Small allocations:
    ~50 KB total (BLE 8 KB + DMA 32 KB + sensor 4 KB + logs 6 KB). After 48 hours of switching (assume
    1 switch per minute = 2,880 switches): each switch has a 10% chance of leaving a small allocation
    in the heap. After 2,880 switches: expected small allocations scattered in heap: ~50 (some are freed,
    some persist). Average fragment size: 600 KB / 50 fragments = 12 KB average. Largest contiguous (exponential
    distribution): ~3× average = 36 KB. Way below 300 KB. Time to fragmentation failure: depends on allocation
    pattern, but typically 12-48 hours for this scenario. Static arena: 300 KB reserved. Remaining for
    firmware + small allocs: 700 KB - 300 KB = 400 KB... wait, firmware is 400 KB. Total: 400 + 300 =
    700 KB. Available for small allocs: 300 KB. Plenty.'
