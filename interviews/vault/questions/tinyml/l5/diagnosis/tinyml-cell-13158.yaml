schema_version: 1
id: tinyml-cell-13158
title: 'TinyML TCO Diagnosis: Battery Life Mismatch Root Cause'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 1000 deployed Cortex-M4 sensors (168MHz, 256KB SRAM, 3xAA = 4.5Wh) were designed for 1-year
  battery life at 500μA avg current. After deployment, batteries die in 6 weeks. The application log shows
  inference running at 10 FPS instead of 0.1 FPS (design spec). Diagnose the root cause and calculate
  the actual vs expected average current.
details:
  realistic_solution: 'Design: 0.1 FPS (1 inference/10s). Expected: 30mA active for 10ms inference + 0.03mA
    sleep for 9990ms = 30*10/10000+0.03*9990/10000=0.03+0.03=0.06mA... wait: 30mA*10ms per 10s = 30*0.001/10=3μA
    + sleep. Actually: avg = 30mA*(10ms/10s) + 30μA*(9990ms/10s) = 30mA*0.001+0.03mA*0.999=0.030+0.0300=0.060mA.
    At 4500mAh battery (3xAA≈3Ah * 1.5=4.5Ah=4500mAh): life = 4500mAh/0.060mA = 75,000 hours = 8.56 years.
    Actual 10 FPS: inference 10x/second. 30mA*(10ms*10/s) = 30mA*10% = 3mA continuous. Life: 4500/3=1500hr=62.5
    days ≈ 9 weeks. Observed: 6 weeks. Close (debug overhead explains difference). Root cause: firmware
    timer bug (10 FPS instead of 0.1 FPS).'
  common_mistake: Blaming the hardware without checking the firmware configuration — 10 FPS vs 0.1 FPS
    is a 100x duty cycle error that should be caught in testing but may occur due to timer misconfiguration
    or debug mode left enabled.
  napkin_math: 'Design 0.1 FPS: active fraction = 0.1*0.01s=0.001. Avg I = 30mA*0.001+0.03mA*0.999=0.030+0.030=0.060mA.
    Life: 4500/0.060=75,000hr=8.56yr. Actual 10 FPS: active = 10*0.01=0.1. Avg I = 30mA*0.1+0.03mA*0.9=3.0+0.027=3.027mA.
    Life: 4500/3.027=1486hr=61.9 days ≈ 9 weeks. Observed 6 weeks implies slightly higher current (maybe
    4.5mA). Fix: correct timer to 0.1 FPS. After fix: 8.56yr battery life. No battery replacement needed
    for device lifetime. Lost due to firmware bug: 1000 units * 6 weeks early battery replacement * $0.50/battery
    = $500 in batteries + $150*1000/50=... labor to replace: 1000 units/50/day*$400/day=$8,000 labor.
    Firmware bug cost: $8,500.'
