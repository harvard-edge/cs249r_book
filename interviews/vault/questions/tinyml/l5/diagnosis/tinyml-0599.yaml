schema_version: 1
id: tinyml-0599
title: The Double-Precision FPU Trap
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: 'You are porting a Python model to C for a Cortex-M7. In Python, you have the line `y = x *
  0.5`. In your C code, you write exactly that: `float y = x * 0.5;`. Your profiling shows this one line
  is incredibly slow. The M7 has a hardware FPU. Why is this math operation stalling the pipeline?'
details:
  realistic_solution: 'The literal 0.5 is a double (64-bit) in C. The M7''s FPU only supports single-precision
    (32-bit). So the compiler promotes x to double, calls a software emulation library for the 64-bit
    multiply (~50-100 cycles), then truncates back to float. Fix: write 0.5f to force single-precision.
    Hardware float multiply: 1 cycle. Software double multiply: ~50-100 cycles. A single missing ''f''
    suffix made this operation 50-100x slower. Additionally, linking the soft-double library bloats flash
    by 5-10KB. Always use -Wdouble-promotion compiler flag to catch this.'
  common_mistake: '"Floating point math is just naturally slow on microcontrollers." While true historically,
    an M7 with an FPU should execute this in one cycle. The problem is a specific C language default.'
  napkin_math: 'Software double-precision multiply: ~50-100 cycles. Hardware single-precision multiply:
    1 cycle. Missing one `f` in your source code made that specific operation 100x slower.'
