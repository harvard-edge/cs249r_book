schema_version: 1
id: tinyml-0641
title: The Watchdog Boot Loop Catastrophe
topic: safety-certification
status: published
provenance: imported
scenario: 'You are in charge of a fleet of 1 million in-cabin automotive sensors that use a Cortex-M4
  to detect driver drowsiness. To ensure reliability, each device has a 2-second hardware watchdog timer;
  if the main inference loop doesn''t ''pet'' the watchdog within that window, the device reboots. After
  a successful OTA model update, your fleet monitoring system reports that 0.5% of devices (5,000 cars)
  are dropping offline and then briefly reappearing every ~2 seconds, continuously. A junior engineer
  suggests the fix is simple: ''The new model must be slightly slower. Let''s just push an OTA to increase
  the watchdog timeout to 3 seconds.'' Evaluate this proposal. Why is it likely wrong, what is the probable
  root cause of the failure, and what catastrophic, non-linear fleet behavior is this masking?'
details:
  realistic_solution: 'Critique: The proposal to lengthen the timeout is a dangerous patch, not a fix.
    It increases the time-to-recovery for *actual* hangs and masks the real problem. The watchdog isn''t
    failing; it''s doing its job based on a new, unexpected system state.'
  common_mistake: Focusing on the software execution time in isolation. Engineers without embedded experience
    will agree with the junior engineer, assuming the model is just 'slow'. They fail to consider the
    interaction between the data, the model's data-dependent execution path, and the hardware timer. They
    see the watchdog as a simple timeout, not as a critical state-machine component.
  napkin_math: '5000 devices in reboot loop. Boot 500ms + inference 200ms + crash, WDT at 2s. Active 700ms/2s=35%
    duty. P_avg=35mW vs normal 0.1mW. Battery 675mWh: normal=675/0.1=6750hrs=281 days, loop=675/35=19.3hrs.
    Root cause: new model OOM on specific audio → crash → same audio → repeat. Fix: boot counter in RTC
    RAM; 3 fast reboots → enter safe mode.'
