title: The Per-Channel Trade-off
scenario: Your per-tensor quantized keyword spotting model loses 5% accuracy going from FP32 to INT8.
  Switching to per-channel quantization recovers 3%. Your colleague says 'always use per-channel — it's
  strictly better.' Why might you still choose per-tensor on an MCU?
question: "Why might an MCU still choose per-tensor quantization after per-channel recovers only 3% accuracy?"
details:
  realistic_solution: Per-channel quantization assigns a separate scale and zero-point to each output
    channel of a convolution. For a layer with 64 output channels, that's 64 scales and 64 zero-points
    instead of 1 each. The accuracy benefit comes from each channel having its own optimal range.
  common_mistake: '"Per-channel is always better because it has more quantization parameters." More parameters
    means more accuracy, but ignores the system cost.'
  napkin_math: 'Per-tensor: 1 scale + 1 zero-point = 8 bytes per layer. 20 layers = 160 bytes. Requantization:
    1 multiply + 1 shift per element. Per-channel: 64 scales + 64 zero-points = 512 bytes per layer. 20
    layers = 10 KB. Requantization: 1 multiply + 1 shift + 1 load per element per channel. Overhead: ~18%
    more cycles. On a 100ms inference budget: per-tensor = 85ms, per-channel = 100ms. Accuracy: per-tensor
    = 87%, per-channel = 90%. If the deadline is 100ms: per-channel barely fits. If 90ms: per-tensor only.'
  options:
  - Always use per-channel quantization — it's strictly better because it recovers 3% accuracy with no
    downsides on any hardware.
  - 'Per-channel adds ~18% compute overhead (64 separate requantization ops per layer vs 1 for per-tensor).
    On a 100ms inference budget: per-tensor = 85ms (fits), per-channel = 100ms (barely fits). If deadline
    is 90ms: only per-tensor works. Per-channel also needs 10 KB metadata (vs 160 bytes) for 20 layers
    with 64 channels each. Choose per-tensor when latency or memory is tight; per-channel when accuracy
    is critical and headroom exists.'
  - Per-tensor is always better on MCUs because the single scale/zero-point fits in a register, enabling
    CMSIS-NN to use the fast SMLAD path without any memory lookups.
  - The 3% accuracy recovery from per-channel is a benchmark artifact — in real-world deployment on MCUs,
    per-channel and per-tensor achieve identical accuracy because the quantization noise is dominated
    by other factors.
  correct_index: 1
