title: The Per-Channel Trade-off
scenario: Your per-tensor quantized keyword spotting model loses 5% accuracy going from FP32 to INT8. Switching to per-channel quantization recovers 3%. Your colleague says 'always use per-channel — it's strictly better.'
question: Why might an MCU still choose per-tensor quantization after per-channel recovers only 3% accuracy?
details:
  realistic_solution: Per-channel quantization assigns a separate scale and zero-point to each output channel. The accuracy benefit comes from each channel having its own optimal range. However, the hardware cost of loading distinct scales and executing multiple requantizations per layer creates significant latency overhead compared to single-scale per-tensor approaches.
  common_mistake: |
    **The Pitfall:** Assuming more quantization parameters is strictly better.
    **The Rationale:** Candidates see an accuracy boost in benchmarks and ignore the hardware cost of loading distinct scales/zero-points for every channel.
    **The Consequence:** The overhead of metadata storage and extra per-element memory lookups causes the system to miss real-time inference deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Network: 20 layers, 64 channels each.
       - Deadline: ~90ms latency budget.
    2. **Calculations:**
       - Per-Tensor Metadata: 8 bytes/layer * 20 = 160 bytes.
       - Per-Channel Metadata: (64 scales + 64 zp) * 20 = 10 KB.
       - Latency Impact: Lookups add ~18% compute overhead.
       - Total Time: Per-tensor = 85ms vs Per-channel = 100ms.
    3. **Conclusion & Interpretation:**
       - **Result: Real-time Deadline Violation.** Per-channel quantization adds structural latency. On a 90ms budget, only per-tensor quantization succeeds.
  options:
  - Always use per-channel quantization — it's strictly better because it recovers 3% accuracy with no downsides on any hardware.
  - 'Per-channel adds ~18% compute overhead (64 separate requantization ops per layer vs 1 for per-tensor). On a 100ms inference budget: per-tensor = 85ms (fits), per-channel = 100ms (barely fits). If deadline is 90ms: only per-tensor works. Per-channel also needs 10 KB metadata (vs 160 bytes) for 20 layers with 64 channels each. Choose per-tensor when latency or memory is tight; per-channel when accuracy is critical and headroom exists.'
  - Per-tensor is always better on MCUs because the single scale/zero-point fits in a register, enabling CMSIS-NN to use the fast SMLAD path without any memory lookups.
  - The 3% accuracy recovery from per-channel is a benchmark artifact — in real-world deployment on MCUs, per-channel and per-tensor achieve identical accuracy because the quantization noise is dominated by other factors.
  correct_index: 1
