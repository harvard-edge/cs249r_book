title: The TCO of Sleep
scenario: 'You''re deploying a fleet of 100,000 battery-powered environmental sensors. You''re A/B testing
  two different microcontrollers (MCUs) to see which is more economical over a 5-year device lifespan.

  - **MCU A:** $2.00 unit cost. High sleep current requires 5 battery replacements.

  - **MCU B:** $3.00 unit cost. Ultra-low sleep current requires only 1 battery replacement.

  Each battery replacement costs $10 in truck-roll labor and parts. Which MCU is cheaper over 5 years?'
question: "Which MCU is cheaper over 5 years?"
details:
  realistic_solution: The correct approach is to calculate the average power consumption for each device
    based on its duty cycle, determine the battery life, find the number of replacements needed over 5
    years, and sum the upfront cost with the total replacement cost.
  common_mistake: Engineers often focus only on the upfront hardware cost (CapEx) and ignore the operational
    cost (OpEx). In battery-powered systems, OpEx is dominated by battery replacement labor. Another common
    mistake is assuming deep sleep power is negligible and can be rounded to zero, which is false at scale
    and over long time horizons.
  napkin_math: 'MCU A: $2.00 + 5 replacements × $10 = $2 + $50 = $52/device. MCU B: $3.00 + 1 replacement
    × $10 = $3 + $10 = $13/device. Fleet of 100K: MCU A = 100K × $52 = $5.2M. MCU B = 100K × $13 = $1.3M.
    Savings: $3.9M (75%). MCU B costs $1 more upfront but saves $40 in maintenance. Lesson: OpEx dominates
    CapEx at fleet scale by 4×.'
  options:
  - MCU A is cheaper, with a TCO of $2.00, because it has the lowest upfront hardware cost.
  - MCU A is cheaper, with a TCO of ~$52, because sleep power is negligible and both require 5 replacements.
  - MCU B is cheaper, with a 5-year TCO of ~$53.
  - They are roughly equivalent; MCU A has a TCO of $112 and MCU B has a TCO of $113.
  correct_index: 2
