title: The TCO of Sleep
scenario: You're deploying a fleet of 100,000 battery-powered environmental sensors. You're A/B testing two different microcontrollers (MCUs) to see which is more economical over a 5-year device lifespan. MCU A costs $2.00 upfront, but its high sleep current requires 5 battery replacements. MCU B costs $3.00 upfront, but its ultra-low sleep current requires only 1 battery replacement. Each battery replacement costs $10 in truck-roll labor and parts.
question: "Which MCU is cheaper over a 5-year lifespan considering upfront costs and $10 truck-roll battery replacements?"
details:
  realistic_solution: The correct approach is to calculate the average power consumption for each device based on its duty cycle, determine the battery life, find the number of replacements needed over 5 years, and sum the upfront cost with the total replacement cost.
  common_mistake: |
    **The Pitfall:** Focusing only on the upfront hardware CapEx ($2 vs $3) and ignoring OpEx.
    **The Rationale:** Hardware engineers naturally optimize the BOM cost, forgetting that maintenance labor dominates fleet costs.
    **The Consequence:** The $2 MCU is chosen, leading to a massive $3.9M loss in battery replacement truck rolls.
  napkin_math: |
    * **MCU A:** $2.00 + (5 replacements × $10) = $52/device.
    * **MCU B:** $3.00 + (1 replacement × $10) = $13/device.
    * Fleet of 100K MCU A = 100K × $52 = $5.2M.
    * Fleet of 100K MCU B = 100K × $13 = **$1.3M**.
    * Savings: $3.9M (75%). MCU B costs $1 more upfront but saves $40 in maintenance.
  options:
  - MCU A is cheaper, with a TCO of $2.00, because it has the lowest upfront hardware cost.
  - MCU A is cheaper, with a TCO of ~$52, because sleep power is negligible and both require 5 replacements.
  - MCU B is cheaper, with a 5-year TCO of ~$53.
  - They are roughly equivalent; MCU A has a TCO of $112 and MCU B has a TCO of $113.
  correct_index: 2
