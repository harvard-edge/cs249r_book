title: Diagnosing Power Regressions in Sparse Networks
scenario: You deployed an audio classification model on an ARM Cortex-M4 (STM32F4) microcontroller. To optimize battery life, the team replaced a dense CNN with a highly sparse fully-connected network, reducing total compute by 80%. The new model fits in memory and uses CMSIS-NN SIMD. However, profiling reveals the active energy consumption per inference has tripled.
question: Why can an 80% sparser Cortex-M4 network triple active energy per inference despite utilizing CMSIS-NN SIMD instructions?
details:
  realistic_solution: The candidate should diagnose that the sparse fully-connected network has extremely low arithmetic intensity (data reuse) compared to the CNN. According to the Horowitz energy principles, fetching data from memory costs orders of magnitude more energy than performing an ALU operation. Even though the CMSIS-NN SIMD executes MACs highly efficiently, the sparse model requires constantly streaming non-contiguous weights and sparsity indices from the 1 MB flash memory. The massive increase in expensive flash reads completely overrides the energy saved by reducing the compute operations.
  common_mistake: |
    **The Pitfall:** Assuming that computing operations (MACs) are a direct and linear proxy for energy consumption.
    **The Rationale:** Candidates ignore the energy cost of memory access, specifically that reading from Flash memory costs orders of magnitude more energy than performing an ALU operation.
    **The Consequence:** Deploying "optimized" models that actually degrade battery life due to catastrophic drops in arithmetic intensity.
  napkin_math: |
    *   **Compute Energy:** ~0.1 pJ per INT8 MAC.
    *   **Flash Read Energy:** ~1000 pJ (1 nJ) per 32-bit read.
    *   **Original Dense CNN:** 5M MACs (0.5 µJ) + high data reuse requiring 100 KB flash reads (25,000 reads * 1 nJ = 25 µJ) = **~25.5 µJ total**.
    *   **Sparse FC Network:** 1M MACs (0.1 µJ) + low arithmetic intensity requiring 300 KB flash reads for scattered weights and indices (75,000 reads * 1 nJ = 75 µJ) = **~75.1 µJ total**.
    *   **Conclusion:** Despite an 80% reduction in MACs, the memory bandwidth bottleneck caused a **~3x increase in total energy** (25.5 µJ to 75.1 µJ).
