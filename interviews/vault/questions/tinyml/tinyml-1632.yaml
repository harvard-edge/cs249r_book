title: Solar Brownout Checkpointing
scenario: A solar-powered Cortex-M4 wildlife camera experiences brownouts. Inference takes 2s, but power consistently fails after 1.5s.
question: What is the checkpointing strategy into NVRAM (FRAM) that minimizes write energy while ensuring the task completes across reboots?
visual:
  kind: svg
  path: tinyml-1632.svg
  alt: Timeline showing compute phase, checkpoint at 1s, brownout at 1.5s, and resumption
  caption: Intermittent Power Execution Timeline
details:
  realistic_solution: Insert checkpoints of intermediate activation maps at 1-second intervals. Checkpoint 1 occurs before brownout. Upon reboot, the system resumes from 1s, completing the remaining 1s inference.
  common_mistake: |
    **The Pitfall:** Setting the checkpoint interval longer than the uptime.
    **The Rationale:** Candidates fail to profile the exact brownout threshold.
    **The Consequence:** The system enters an infinite loop of failure, never completing an inference.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total inference time: 2.0s.
    - Guaranteed uptime window: 1.5s.

    **Calculations:**
    - Selected checkpoint interval = 1.0s.
    - 1.0s < 1.5s window.

    **Conclusion & Interpretation:**
    - **Result: 1.0s checkpoint interval (Energy-Bound)**. A 1.0s checkpoint interval safely guarantees progress across the 1.5s brownout limit.
