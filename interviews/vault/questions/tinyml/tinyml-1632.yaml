title: Solar Brownout Checkpointing
scenario: A solar-powered Cortex-M4 wildlife camera experiences brownouts. Inference
  takes 2s, but power consistently fails after 1.5s.
question: Devise a checkpointing strategy into NVRAM (FRAM) that minimizes write energy
  while ensuring the task completes across reboots.
visual:
  kind: svg
  path: tinyml-1632.svg
  alt: Timeline showing compute phase, checkpoint at 1s, brownout at 1.5s, and resumption
  caption: Intermittent Power Execution Timeline
details:
  realistic_solution: Insert checkpoints of intermediate activation maps at 1-second
    intervals. Checkpoint 1 occurs before brownout. Upon reboot, the system resumes
    from 1s, completing the remaining 1s inference.
  common_mistake: Setting the checkpoint interval longer than the uptime, resulting
    in infinite loops of failure.
  napkin_math: 1s checkpoint < 1.5s uptime limit.
