title: Evaluating Profiling Strategies for BLE Audio on nRF5340
scenario: You are deploying a keyword spotting model on a Nordic nRF5340 to wake up a device and transmit audio over BLE 5.3. The system is missing its 10ms latency target for inference. Option A uses software instrumentation (toggling GPIOs) on the 128 MHz app core, while Option B uses the ARM CoreSight ETM for non-intrusive hardware tracing.
question: How would you evaluate which profiling method is better without disrupting the BLE timing on the 64 MHz network core?
details:
  realistic_solution: Hardware tracing (Option B) is the correct choice. The nRF5340's dual-core architecture requires precise synchronization between the 128 MHz app core and the 64 MHz net core. ETM provides cycle-accurate, non-intrusive profiling, allowing you to pinpoint compute bottlenecks in the ML model without altering the temporal dynamics or causing BLE protocol timeouts.
  common_mistake: |
    **The Pitfall:** Choosing software instrumentation (Option A) because it is universally applicable and easy to set up.
    **The Rationale:** Engineers often rely on familiar `printf` or GPIO toggling, unaware of the "probe effect" where added execution time disrupts real-time systems.
    **The Consequence:** The overhead of the software instrumentation perturbs the strict real-time scheduling required by the BLE stack, leading to inaccurate latency measurements or protocol timeouts.
  napkin_math: |
    - **App Core Cycle Time:** 1 / 128 MHz ≈ 7.8 ns.
    - **GPIO Toggle Overhead:** ~15 cycles ≈ 117 ns per toggle.
    - **Profiling 500 layers:** 500 * 2 (start/stop) * 117 ns ≈ 117 µs overhead.
    - **Overhead Percentage:** 117 µs / 10 ms = 1.17%.
    - **Conclusion:** **While 1.17% seems small, the 117 µs jitter completely disrupts the microsecond-level timing windows required by the BLE 5.3 protocol.**
