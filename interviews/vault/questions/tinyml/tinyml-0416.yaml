title: Cortex-M55 Helium Speedup for Depthwise Conv
scenario: You're upgrading an MCU for a keyword spotting model. The model's hottest layer is a 3x3 depthwise convolution with 64 channels on a 24x24 feature map.
question: How would you calculate the speedup for a 3x3 depthwise convolution when migrating from Cortex-M4F to Cortex-M55?
details:
  realistic_solution: "Depthwise conv processes each channel independently, changing vectorization efficiency per architecture. M4F wastes cycles on odd kernel sizes while Helium handles spatial parallelism efficiently, exceeding naive predictions."
  common_mistake: |
    **The Pitfall:** Assuming a simple theoretical speedup based purely on MAC count and clock speed.
    **The Rationale:** Calculating (8/2) * (160/168) = 3.8x, assuming both cores achieve peak throughput on depthwise convolutions.
    **The Consequence:** Missing how the M4F wastes cycles on odd-sized kernels, leading to an underestimation of the actual Helium MVE speedup.
  napkin_math: |
    **Assumptions & Constraints:**
    - M4F: 168 MHz, 2 INT8 MACs/cycle (wastes 1 on 3x3).
    - M55: 160 MHz, 8 INT8 MACs/cycle (Helium MVE).
    - Layer: 3x3 depthwise, 64 channels, 24x24 output.

    **Calculations:**
    - M4F Cycles: 5 cycles per 9 MACs. 5 * 576 = 2,880 cycles/ch. 184,320 total. Time: 1.316 ms.
    - M55 Cycles: 16-wide vector. 9 MACs * 576 / 8 = 648 iterations/ch. 41,472 total. Time: 0.259 ms.
    - Speedup: 1.316 / 0.259 = 5.1x.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound (5.1x speedup exceeds 3.8x peak due to SIMD utilization).**
  options:
  - 'The M55 does 8 MACs/cycle vs the M4F''s 2 MACs/cycle, and clocks slightly slower. The speedup is exactly (8/2) * (160/168) = 3.8x.'
  - 'Depthwise convolutions cannot be vectorized. The speedup is purely based on the clock speed ratio: 160/168 = 0.95x.'
  - 'The M4F wastes cycles on the odd 3x3 kernel size due to its 2-wide SIMD, while the M55''s 16-wide vector processes spatial dimensions efficiently. The actual speedup is ~5.1x, exceeding the theoretical 3.8x ratio.'
  - 'The M55 has a dedicated hardware accelerator for depthwise convolutions, resulting in a fixed 10x speedup across all kernel sizes.'
  correct_index: 2
