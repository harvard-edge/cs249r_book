title: Cortex-M55 Helium Speedup for Depthwise Conv
scenario: You're upgrading from a Cortex-M4F (168 MHz, SMLAD: 2 INT8 MACs/cycle) to a Cortex-M55 (160 MHz, Helium MVE: 8 INT8 MACs/cycle) for a keyword spotting model. The model's hottest layer is a 3x3 depthwise convolution with 64 channels on a 24x24 feature map.
question: How would you calculate the speedup for a 3x3 depthwise convolution when migrating from Cortex-M4F to Cortex-M55?
details:
  realistic_solution: 'Depthwise conv processes each channel independently, changing vectorization efficiency per architecture. M4F (SMLAD, 2 INT8 MACs/cycle): 3x3 kernel = 9 MACs per output per channel. SMLAD does 2 MACs/cycle, so 9 MACs = 5 cycles (wastes 1 slot on odd count). Per channel: 24*24 outputs * 5 cycles = 2,880 cycles. 64 channels: 184,320 cycles. With 20% loop overhead: 221,184 cycles / 168 MHz = 1.316 ms. M55 (Helium MVE, 8 INT8 MACs/cycle): 16-wide vector processes spatial dimension in parallel. 9 MACs * 576 outputs / 8 = 648 iterations per channel. 64 channels: 41,472 cycles / 160 MHz = 0.259 ms. Speedup: 1.316/0.259 = 5.1x. Exceeds naive 4x prediction (8/2 * 160/168 = 3.81x) because M4F wastes cycles on odd kernel size while Helium handles spatial parallelism efficiently.'
  common_mistake: |
    **The Pitfall:** Assuming a simple theoretical speedup based purely on MAC count and clock speed.
    **The Rationale:** Calculating (8/2) * (160/168) = 3.8x, assuming both cores achieve peak throughput on depthwise convolutions.
    **The Consequence:** Missing how the M4F wastes cycles on odd-sized kernels, leading to an underestimation of the actual Helium MVE speedup.
  napkin_math: |
    1. **M4F Base Cycles:** 9 MACs per output * 24x24 outputs = 5184 MACs per channel. SMLAD processes 2/cycle but wastes 1 slot on odd 9-MAC kernels (takes 5 cycles, not 4.5).
    2. **M4F Execution:** 5 cycles * 576 = 2,880 cycles/channel. Total = 184,320 cycles. With 20% overhead = 221,184 cycles.
    3. **M4F Time:** 221,184 / 168 MHz = 1.316 ms.
    4. **M55 Helium Cycles:** 16-wide vector processes spatial dims directly. 9 MACs * 576 / 8 = 648 iterations/channel. Total = 41,472 cycles.
    5. **M55 Time:** 41,472 / 160 MHz = 0.259 ms.
    6. **Speedup:** 1.316 ms / 0.259 ms = **5.1x** (Exceeds theoretical 3.8x peak).
  options:
  - 'The M55 does 8 MACs/cycle vs the M4F''s 2 MACs/cycle, and clocks slightly slower. The speedup is exactly (8/2) * (160/168) = 3.8x.'
  - 'Depthwise convolutions cannot be vectorized. The speedup is purely based on the clock speed ratio: 160/168 = 0.95x.'
  - 'The M4F wastes cycles on the odd 3x3 kernel size due to its 2-wide SIMD, while the M55''s 16-wide vector processes spatial dimensions efficiently. The actual speedup is ~5.1x, exceeding the theoretical 3.8x ratio.'
  - 'The M55 has a dedicated hardware accelerator for depthwise convolutions, resulting in a fixed 10x speedup across all kernel sizes.'
  correct_index: 2
