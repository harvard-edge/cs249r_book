title: Structured vs Unstructured Pruning on nRF5340
scenario: 'You are deploying a wake-word model on a Nordic nRF5340 (128 MHz app core, 256 KB SRAM, 1 MB
  flash, ~5mA active). The baseline dense model requires 350 KB of SRAM, failing to fit, and takes 25ms
  per inference. You are presented with two optimization paths to fit the device constraints: Option A
  uses 80% unstructured pruning, and Option B uses 50% structured (filter) pruning. Evaluate these alternatives
  and determine which is better suited for this hardware.'
details:
  realistic_solution: Option B (50% structured pruning) is the superior choice. Structured pruning physically
    shrinks the tensor dimensions, allowing the model to remain dense and leverage highly optimized, vectorized
    CMSIS-NN kernels on the 128 MHz app core without any branching overhead. It guarantees a reduction
    in both the 1 MB flash footprint for weights and the 256 KB SRAM requirement for activations, ensuring
    deterministic execution time and lower energy consumption.
  common_mistake: Candidates often choose Option A due to the higher theoretical sparsity rate of 80%,
    assuming it will result in the smallest memory footprint and fastest execution. They fail to account
    for the lack of hardware sparse-matrix acceleration on the nRF5340's ARM Cortex-M33 core, where unstructured
    sparsity introduces index storage overhead and branching penalties.
  napkin_math: 'Baseline model: 350 KB SRAM required (exceeds 256 KB limit), 25ms inference. Option A
    (80% unstructured): 20% non-zero weights + 16-bit indices roughly equates to 40% of the original weight
    size. It fits in SRAM, but zero-skipping branches keep execution time near 25ms, consuming ~125 uC
    per inference (25ms × 5mA). Option B (50% structured): Halving filters reduces weights quadratically
    by 75% (0.5 input × 0.5 output channels) and activation buffers by 50%. Model size drops to ~150 KB,
    fitting comfortably in the 256 KB SRAM. MACs also drop by 75%, cutting inference time to 25ms × 0.25
    = 6.25ms, drawing only ~31.25 uC (6.25ms × 5mA).'
