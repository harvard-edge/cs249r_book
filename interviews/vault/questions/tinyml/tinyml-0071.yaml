title: The MCU Model Extraction Attack
scenario: Your company deploys a proprietary defect detection model on an STM32F4 MCU inside an industrial
  inspection camera. A competitor buys your product, connects a JTAG debugger to the exposed debug header,
  and dumps the entire Flash memory — including your model weights — in under 60 seconds. How do you protect
  the model on a $3 MCU?
details:
  realistic_solution: 'Defense-in-depth: (1) Enable STM32F4 Read-Out Protection Level 2 (RDP2) — permanently
    disables JTAG and SWD debug ports, requiring a $50K-100K decap+FIB attack to bypass. (2) Store AES-256
    key in OTP (one-time programmable) fuses. (3) Encrypt model weights in flash; decrypt layer-by-layer
    into SRAM at boot (500 KB / 168 MB/s = 3ms overhead). Only the current layer''s 40 KB of weights is
    decrypted in SRAM at a time, fitting within 256 KB. (4) Remove or depopulate the JTAG header on production
    boards. Total cost: $0.50 for a secure element per unit at scale.'
  common_mistake: '"Encrypt the model in Flash and decrypt at runtime." On an MCU with 256 KB SRAM and
    a 500 KB model in Flash, you can''t decrypt the entire model into SRAM — it doesn''t fit. Decrypting
    layer-by-layer adds latency and the decryption key must be stored *somewhere* on the same chip.'
  napkin_math: 'JTAG dump without protection: 60 seconds, $0 cost (just a $20 ST-Link). RDP Level 2: blocks
    JTAG entirely. Decap + FIB: $50K-$100K, 2-4 weeks. AES decryption overhead: 500 KB model / 168 MB/s
    = 3 ms (one-time at boot). SRAM budget for layer-by-layer decryption: largest layer = 40 KB. Fits
    in 256 KB SRAM with room for inference. Secure element cost: $0.50 per unit × 100K units = $50K —
    same as one FIB attack.'
