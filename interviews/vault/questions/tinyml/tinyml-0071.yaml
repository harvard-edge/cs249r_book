title: 'The MCU Model Extraction Attack'
scenario: 'You deploy a proprietary defect detection model on an STM32F4 MCU. A competitor connects a JTAG debugger to the exposed header and dumps the entire Flash memory, stealing your model weights in under 60 seconds.'
question: 'How do you architect a defense-in-depth security strategy to protect the model on a constrained $3 MCU?'
details:
  realistic_solution: 'Defense-in-depth: (1) Enable STM32F4 Read-Out Protection Level 2 (RDP2) — permanently disables JTAG and SWD debug ports, requiring a $50K-100K decap+FIB attack to bypass. (2) Store AES-256 key in OTP (one-time programmable) fuses. (3) Encrypt model weights in flash; decrypt layer-by-layer into SRAM at boot. Only the current layer''s 40 KB of weights is decrypted in SRAM at a time, fitting within 256 KB. (4) Remove or depopulate the JTAG header on production boards. Total cost: $0.50 for a secure element per unit at scale.'
  common_mistake: |
    **The Pitfall:** Proposing to encrypt the entire model in Flash and decrypt it completely into SRAM at runtime.
    **The Rationale:** Candidates apply cloud-security paradigms where RAM is abundant, ignoring the hard physical constraints of the MCU.
    **The Consequence:** The proposed solution is physically impossible; a 500 KB decrypted model cannot fit into 256 KB of SRAM, causing a memory fault at boot.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500 KB model in Flash.
    - 256 KB SRAM.
    - STM32F4 AES decryption throughput ≈ 168 MB/s.
    - JTAG Read-Out Protection (RDP Level 2) is available.

    **Calculations:**
    - Attempting full decryption: 500 KB > 256 KB (OOM crash).
    - Layer-by-layer decryption: Max layer size = 40 KB.
    - 40 KB fits easily within 256 KB SRAM.
    - AES overhead for 500 KB = 0.5 MB / 168 MB/s ≈ 3 ms (negligible boot latency).

    **Conclusion & Interpretation:**
    - **Result: 40 KB Peak SRAM (Memory-Bound)**. The solution requires enabling hardware RDP2 to block JTAG, storing the AES key in OTP fuses, and decrypting the model layer-by-layer into SRAM to respect the 256 KB physical boundary.
