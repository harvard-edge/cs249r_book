title: The Milliwatt-Microwatt Gulf
scenario: You're designing a battery-powered audio sensor for a massive deployment. To make the project economically viable, the device must have a multi-year battery life, which means it will be idle over 99% of the time. To correctly model the battery life and thus the Total Cost of Ownership (TCO), you must know the power ratio between the device's two main states.
question: What is the approximate power consumption ratio between the 'active' state (running inference) and the 'deep sleep' state for a typical TinyML microcontroller?
details:
  realistic_solution: The ratio is approximately 1,000 to 1. A typical microcontroller consumes milliwatts (mW) when active but only microwatts (µW) in deep sleep. This vast difference is the fundamental principle that enables multi-year battery life in duty-cycled applications and makes them economically feasible.
  common_mistake: |
    **The Pitfall:** Underestimating the power ratio between active and deep sleep states.
    **The Rationale:** Engineers new to deeply embedded systems often assume sleep states only provide a 10x-100x reduction based on experience with larger systems like smartphones.
    **The Consequence:** This leads to drastically overestimating average power consumption and incorrectly concluding that multi-year battery life is economically unfeasible.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Active State: MCU running inference.
       - Deep Sleep State: MCU idle.
    2. **Calculations:**
       - Active Power: ~10 mW.
       - Sleep Power: ~10 µW.
       - Ratio: 10 mW / 0.01 mW = 1,000x.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound Ratio**. The 1,000x difference dictates that optimizing sleep current is more critical than optimizing active compute for multi-year battery life.
  options:
  - ~10x
  - ~100x
  - ~1,000x
  - ~10,000,000x
  correct_index: 2
