schema_version: 1
id: tinyml-0221
title: The Quantization Energy Tax
topic: quantization-fundamentals
status: draft
provenance: imported
scenario: On a battery-powered TinyML device, you're deciding between using an FP16 model and a quantized
  INT8 model. From a pure energy consumption perspective for the compute operations, which is more expensive,
  and by roughly what factor is one multiplication operation more energetic than the other?
details:
  realistic_solution: An FP16 multiply is significantly more energy-intensive. According to the standard
    hardware invariants, an FP32 multiply consumes ~18x the energy of an INT8 multiply and ~3.4x the energy
    of an FP16 multiply. Therefore, the relative cost of an FP16 op to an INT8 op is approximately 18
    divided by 3.4, which is about 5.3x. On a device where every microjoule matters, a 5x energy reduction
    per operation is a massive win for battery life.
  common_mistake: Engineers often assume energy savings are linear with the reduction in bit-width (e.g.,
    16-bit to 8-bit saves 2x energy). They confuse energy savings with memory footprint reduction (which
    is 2x) or potential SIMD throughput gains (which can be 4x). The actual energy savings come from the
    physics of digital logic, where switching energy is non-linearly related to the number of bits being
    manipulated.
  napkin_math: 'From the invariants table: | Energy(FP32) ≈ 18 × Energy(INT8) | Energy(FP32) ≈ 3.4 × Energy(FP16)'
