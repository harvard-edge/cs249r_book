id: tinyml-exp2-reca-0117
title: Peak Compute Derivation for ARM Cortex-M4 Roofline
topic: roofline-analysis
status: published
provenance: imported
scenario: You are building a roofline model to analyze a keyword spotting model deployed on an ARM Cortex-M4
  (STM32F4) microcontroller. To establish the compute roof of the model, you need to determine the theoretical
  maximum operations per cycle. The MCU runs at 168 MHz, has 256 KB SRAM, and utilizes the CMSIS-NN library.
  What is the peak INT8 multiply-accumulate (MAC) throughput per clock cycle on this specific architecture?
details:
  realistic_solution: The candidate should successfully recall that the ARM Cortex-M4 architecture, particularly
    when using CMSIS-NN, can perform 2 INT8 MACs per clock cycle using SIMD instructions. This specific
    hardware fact dictates the absolute horizontal compute ceiling of the roofline model. Knowing this
    structural limit correctly grounds any compute-bound expectations for the STM32F4 platform.
  common_mistake: Candidates often assume the Cortex-M4 can only execute a standard scalar multiply, stating
    the peak throughput is 1 MAC per cycle. They fail to recall the availability of DSP/SIMD instructions
    that double this throughput.
  napkin_math: 'Hardware specification: 2 INT8 MACs per cycle via SIMD. Operating frequency: 168 MHz (168,000,000
    cycles/second). Peak MAC throughput = 168 MHz * 2 MACs/cycle = 336 Million MACs/second. Total Operations
    = 336 MMAC/s * 2 ops/MAC (1 multiply, 1 add) = 672 Mega-operations per second (MOps/s) for the roofline
    compute ceiling.'
