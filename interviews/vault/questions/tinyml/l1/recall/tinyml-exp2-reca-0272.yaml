schema_version: 1
id: tinyml-exp2-reca-0272
title: Ethos-U55 Supported Quantization Precisions
topic: extreme-quantization
status: published
provenance: imported
scenario: You are deploying a highly compressed keyword spotting model to an ARM Cortex-M7 + Ethos-U55
  (Corstone-300) system. To fit the model within the 512 KB shared SRAM, you are considering sub-4-bit
  and binary quantization techniques. Before compiling the model with the Vela compiler for the Ethos-U55
  NPU, you need to verify which extreme quantization formats are natively accelerated by the hardware
  versus which will fall back to the 480 MHz M7 CPU.
details:
  realistic_solution: The candidate should recall that the Ethos-U55 natively supports INT8, UINT8, and
    INT16 data types. If a model uses sub-4-bit quantization, the Vela compiler will map these unsupported
    operations to the ARM Cortex-M7, completely bypassing the NPU and severely degrading performance.
  common_mistake: Candidates often assume that because the Ethos-U55 is an edge AI accelerator, it natively
    supports binary or ternary networks (1-bit or 2-bit quantization). They fail to recall that the hardware
    is optimized specifically for standard 8-bit and 16-bit integer formats.
  napkin_math: 'For a layer with 1,000,000 MACs: Executing on the Ethos-U55 with native INT8 (assuming
    256 MACs/cycle at 480 MHz) takes 1,000,000 / 256 = ~3,906 cycles (8.1 µs). If using 1-bit quantization
    that falls back to the M7 CPU (assuming 2 cycles/MAC for software emulation), it takes 2,000,000 cycles
    (4.1 ms), making the unsupported extreme quantization ~500x slower.'
