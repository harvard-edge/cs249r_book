id: tinyml-0378
title: 'The TinyML Ridge Point: MCU Compute Constraints'
topic: mcu-compute-constraints
status: draft
provenance: imported
scenario: For a typical Cortex-M4 microcontroller, identify the approximate Ridge Point of its roofline
  model. This value separates memory-bound from compute-bound operations.
details:
  realistic_solution: The correct answer is ~0.2 Ops/Byte. This extremely low Ridge Point indicates that
    the device's weak computational capability is easily saturated. Because typical ML layers (like Convolutions
    or dense layers) have an Arithmetic Intensity significantly higher than 0.2 Ops/Byte, they easily
    exceed the Ridge Point and fall solidly on the compute-bound side of the Roofline. Most operations
    will be limited by the raw processing power of the core, not by how fast data can be fed from SRAM.
  common_mistake: Engineers often assume that microcontrollers are memory-bound for ML tasks because they
    have low memory bandwidth compared to larger systems. They fail to realize that the compute capacity
    is *so* low that the Ridge Point is tiny, making almost all standard ML layers compute-bound on these
    tiny devices.
  napkin_math: The Ridge Point is the ratio of peak compute to peak memory bandwidth.
