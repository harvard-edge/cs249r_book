id: tinyml-0386
title: The Microcontroller's Memory Wall (tinyml-0386)
topic: mcu-compute-constraints
status: draft
provenance: imported
scenario: On a typical microcontroller like a Cortex-M4, are most neural network operations compute-bound
  or memory-bound? State the approximate Ridge Point in Ops/Byte.
details:
  realistic_solution: Nearly all operations are **compute-bound**. A Cortex-M4 has a very low Ridge Point
    of approximately **0.2 Ops/Byte**. This means a kernel only needs an arithmetic intensity of 0.2 FLOPs
    per byte to become bottlenecked by the CPU rather than memory. Since standard operations like a CONV2D
    layer easily achieve higher arithmetic intensity than this, they are almost always waiting on the
    CPU to finish calculating, not on data from SRAM.
  common_mistake: Engineers accustomed to cloud GPUs (like H100s) often assume that deep learning is always
    compute-bound. They focus on FLOPs, forgetting that on a microcontroller, the bottleneck isn't the
    CPU core's speed but the slow, narrow bus to the tiny SRAM. The physics are completely inverted from
    the datacenter.
  napkin_math: 'A microcontroller''s performance is defined by its Ridge Point, where `Ridge Point = Peak
    Performance / Memory Bandwidth`. Using the hardware specs: `(336 MFLOPS) / (1.2 GB/s) ≈ 0.28 Ops/Byte`.
    The playbook''s value is ~0.2 Ops/Byte. This extremely low number means you only need to do 1 FLOP
    for every 5 bytes of data you touch before you''re completely bottlenecked by the CPU speed.'
