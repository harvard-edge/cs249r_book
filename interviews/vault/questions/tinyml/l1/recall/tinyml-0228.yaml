id: tinyml-0228
title: The TinyML Ridge Point
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You are analyzing the performance of a keyword spotting model on a Cortex-M4 microcontroller.
  You've generated a Roofline plot for the device. What does the 'Ridge Point' on this plot represent?
details:
  realistic_solution: The Ridge Point identifies the minimum Arithmetic Intensity (AI), measured in Operations
    per Byte (Ops/Byte), that a workload must have to become limited by the processor's peak compute speed
    rather than by its memory bandwidth. Below this AI, the system is memory-bound; above it, it's compute-bound.
    For a typical Cortex-M4, the Ridge Point is exceptionally low (e.g., ~0.28 Ops/Byte). Because typical
    neural network layers have an AI greater than 1, they easily exceed this ridge point, meaning these
    systems are fundamentally compute-bound for almost all ML workloads.
  common_mistake: Many engineers incorrectly assume that microcontrollers, because of their limited SRAM
    bandwidth, must be memory-bound. They fail to calculate the Ridge Point, which reveals that because
    the peak FLOPS are so drastically low, typical ML workloads easily exceed the required Arithmetic
    Intensity and are entirely compute-bound.
  napkin_math: 'Using the hardware constants: | Peak Compute (Cortex-M4): ~336 MFLOPS (or 0.336 GFLOPS)
    | Memory Bandwidth (On-chip SRAM): ~1.2 GB/s'
