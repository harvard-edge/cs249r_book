title: The Truck Roll Multiplier
topic: tco-cost-modeling
status: published
provenance: imported
scenario: You are the systems architect for a smart building product that deploys 100,000 battery-powered
  environmental sensors. Each device costs $10 and runs a TinyML model to detect anomalies. Over the product's
  5-year lifespan, what single factor is most likely to dominate the Total Cost of Ownership (TCO)?
details:
  realistic_solution: The dominant cost will be physical maintenance, specifically the operational expense
    (OpEx) of replacing batteries or entire units across 100,000 locations. Even with a multi-year battery
    life, the 'truck roll' cost to service a failed device far outweighs the initial hardware cost and
    the negligible cost of energy or backend cloud services.
  common_mistake: Applying cloud-centric thinking, where the cost of compute (training, inference servers)
    is the primary concern. Engineers often forget the physical reality of deploying and maintaining hardware
    in the real world. The cost of sending a technician to replace a battery ('truck roll') can be orders
    of magnitude higher than the device's silicon cost or its energy usage.
  napkin_math: Let's assume a device has a 3-year battery life, meaning a significant portion of the fleet
    requires at least one replacement over 5 years.
