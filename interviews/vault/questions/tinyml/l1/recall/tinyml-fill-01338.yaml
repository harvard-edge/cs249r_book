schema_version: 1
id: tinyml-fill-01338
title: Graceful Degradation for Real-time TinyML Anomaly Detection
topic: graceful-degradation
status: published
provenance: imported
scenario: A smart industrial sensor performs real-time vibration analysis for anomaly detection using
  an ML model deployed on an ARM Cortex-M7 microcontroller clocked at 480 MHz, equipped with 512 KB of
  SRAM, and an Ethos-U55 NPU configured for 256 MAC/cycle. The system is designed to provide rapid alerts
  (<10ms latency) for critical anomalies while continuously monitoring for subtler deviations. During
  peak operational hours, increased sensor noise and data throughput cause the primary high-fidelity model
  to exceed its latency budget, leading to missed deadlines and potential system instability. Describe
  a comprehensive graceful degradation strategy for this TinyML system, specifically addressing how you
  would implement degradation ladders, model fallbacks, distinguish between fail-safe and fail-operational
  states, and apply quality-of-service shedding to ensure continued, albeit reduced, functionality.
details:
  realistic_solution: 'Implement a multi-tier ''degradation ladder'' with pre-quantized and pruned models
    stored in flash. A primary high-accuracy model (e.g., 8-bit quantized MobileNetV2 variant), a medium-accuracy
    model (e.g., 4-bit quantized smaller model), and a low-accuracy fallback (e.g., simple statistical
    thresholding or a highly compressed 1-bit model). Monitor key performance indicators (KPIs) like inference
    latency, NPU utilization, and incoming data queue depth. Use a state machine to transition between
    model tiers: if latency exceeds 8ms for 5 consecutive inferences, switch to the medium model. If the
    medium model also fails or NPU utilization consistently hits 90%+, transition to the low-accuracy
    model (fail-operational). If all ML-based detection fails, the system enters a ''fail-safe'' state,
    perhaps by simply collecting raw data and signaling a fault condition via an LED or communication
    channel, bypassing any ML inference. Quality-of-service shedding can include dynamic sensor sampling
    rate reduction, selective logging of non-critical events, or reducing the frequency of non-essential
    communication updates.'
  common_mistake: Candidates often propose solutions that are too resource-intensive for the given TinyML
    constraints (e.g., dynamic model loading from external flash without considering latency overhead,
    or assuming abundant memory/compute). Another common mistake is not clearly defining the criteria
    and mechanisms for switching between degradation levels, or failing to differentiate between a truly
    'fail-safe' state (minimal operation, potentially just signaling failure) and a 'fail-operational'
    state (reduced, but still functional, performance).
  napkin_math: Given 512 KB SRAM and assuming 150 KB for OS/buffers/code, leaving 362 KB for models/activations.
    If a model requires 100 GMACs for inference, the 256 MAC/cycle Ethos-U55 @ 480 MHz provides 122.88
    GMAC/s. Thus, theoretical inference time for the primary model is approximately 100 GMACs / 122.88
    GMAC/s ≈ 0.81 ms, which is well within the 10ms budget. A candidate should identify that this ideal
    calculation does not account for data movement, pre/post-processing, or NPU pipeline stalls. For a
    fallback model to meet a tighter 5ms deadline, considering these overheads, it would likely need to
    target significantly fewer effective MACs, perhaps below 60 GMACs after accounting for real-world
    system inefficiencies.
