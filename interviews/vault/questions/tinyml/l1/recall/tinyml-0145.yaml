schema_version: 1
id: tinyml-0145
title: The Thousand-Fold Sleep
topic: duty-cycling
status: published
provenance: imported
scenario: A battery-powered audio sensor you deployed in a remote forest keeps resetting unpredictably.
  You suspect a 'power brown-out'—where the battery voltage sags under load, causing the microcontroller
  to restart. To begin your investigation, you must first recall the fundamental power characteristics
  of your device. Identify the typical ratio of power consumption for a TinyML microcontroller when it
  is 'active' (e.g., running an inference) compared to when it is in 'deep sleep' mode.
details:
  realistic_solution: The correct ratio is typically 1,000x or greater. A TinyML device's entire power
    budget relies on spending the absolute minimum time possible in the active state and maximizing time
    in a deep sleep state that consumes mere microwatts. A software bug that prevents the device from
    entering deep sleep will drain the battery thousands of times faster than designed, leading to a rapid
    voltage drop (brown-out) and system reset.
  common_mistake: Engineers accustomed to cloud or mobile systems often underestimate the extreme dynamic
    power range of microcontrollers. They might guess a ratio of 10-50x, similar to a smartphone's idle
    vs. load states. This misses the several-orders-of-magnitude difference that is fundamental to TinyML's
    energy-sipping design and a primary cause of such field failures.
  napkin_math: 'Active power: Cortex-M4 at 168MHz ~50mW (tens of mW). Deep sleep: ~5uW (single-digit uW).
    Ratio = 50mW / 5uW = 50e-3/5e-6 = 10,000x. A bug preventing sleep: device stays at 50mW vs designed
    avg of ~1mW (with 98% sleep). Battery drains 50x faster. 1-year battery life becomes ~7 days.'
