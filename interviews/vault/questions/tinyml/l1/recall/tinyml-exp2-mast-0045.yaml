id: tinyml-exp2-mast-0045
title: Asymmetric Dual-Core ML Power Partitioning
topic: power-budgeting
status: published
provenance: imported
scenario: You are architecting an always-on wearable fall-detection monitor using the Nordic nRF5340.
  The system features a 128 MHz app core, a 64 MHz net core, 256 KB SRAM, 1 MB flash, and BLE 5.3 connectivity,
  drawing ~5mA in active mode. It is powered by a 220mAh coin cell and must operate continuously for at
  least 1 year. The IMU samples at 50Hz, and the system must run a sliding-window ML inference every 1
  second. Synthesize an architecture that partitions sensor DMA, DSP, ML inference, and BLE tasks across
  the two cores and sleep states to meet the energy budget.
details:
  realistic_solution: The optimal L6+ architecture uses hardware DMA to route IMU data directly into the
    256 KB SRAM without waking either CPU. Once the 1-second buffer is full, the system wakes the 128
    MHz app core to execute the inference as fast as possible. Because dynamic power dominates (race-to-sleep),
    running the 128 MHz core for a shorter duration is more efficient than running the 64 MHz core longer,
    especially given the ~5mA active draw. The 64 MHz net core is strictly isolated to handle the BLE
    5.3 stack asynchronously, avoiding OS context-switching overhead on the ML core.
  common_mistake: Candidates often default to keeping the 64 MHz net core awake for sensor polling to
    'save power' compared to the 128 MHz core, or they fail to translate the battery capacity into a strict
    CPU cycle budget per inference. They also frequently overlook the use of hardware DMA to bypass CPU
    wakeups entirely during data accumulation.
  napkin_math: 1 year = 8760 hours. Target average current = 220 mAh / 8760 h = 25.1 uA. Assume sleep
    state and BLE 5.3 connection events consume a baseline of 5.1 uA, leaving exactly 20.0 uA for ML processing.
    The app core draws ~5 mA (5000 uA) active. Max allowed duty cycle = 20 uA / 5000 uA = 0.004 (0.4%).
    At 1 inference per second (1 Hz), the active time budget is 4 ms per inference. At 128 MHz, the cycle
    budget is 128,000,000 * 0.004 = 512,000 CPU cycles. A well-optimized 150k MAC CNN takes ~300k cycles
    (assuming DSP instructions), which safely fits within the 512k cycle constraint.
