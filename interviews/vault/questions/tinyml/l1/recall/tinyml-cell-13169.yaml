schema_version: 1
id: tinyml-cell-13169
title: 'TinyML TCO Mastery: Make On-Device vs Cloud Decision for Industrial TinyML'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Make a comprehensive make-vs-buy-vs-cloud decision for 50,000 vibration sensors in a manufacturing
  facility. Options: (A) Cortex-M4+Ethos-U55 ($15/unit, 0.5mW avg), (B) ESP32-S3 with cloud (unit $5,
  cloud $0.001/inference at 144/day = $52.56/unit/yr), (C) off-the-shelf Siemens SIMATIC sensor ($200/unit,
  pre-trained model, SaaS $10/unit/month). 5-year TCO analysis.'
details:
  realistic_solution: 'Option A: HW: 50K*$15=$750K. Power: 50K*0.5mW*8760*5*$0.10/1000=$109.5K. Model
    dev: $200K one-time + $50K/yr maint = $450K. Connectivity (LoRa): $0.05*50K*60mo=$150K. Total 5yr:
    $750+$109.5+$450+$150=$1,459.5K=$1.46M. Option B: HW: 50K*$5=$250K. Cloud: 50K*$52.56*5=$13.14M. 5yr:
    $13.39M. Option C: HW: 50K*$200=$10M. SaaS: 50K*$10*60=$30M. 5yr: $40M. Ranking: A ($1.46M) << B ($13.4M)
    << C ($40M). Option A wins by 9.2x vs B and 27.4x vs C. Key: cloud inference at scale is prohibitively
    expensive. The $200K model development is a one-time cost amortized over 50K units.'
  common_mistake: Not including the data science team cost for options A and B (model development and
    maintenance) or the vendor lock-in risk and price escalation risk for option C.
  napkin_math: 'A: HW=$750K+power=$109.5K+dev=$450K+connectivity=$150K=$1,459.5K. B: HW=$250K+cloud=50K*144inf/day*365*5*$0.001=$13,140K+HW=$13,390K.
    C: HW=$10M+SaaS=$30M=$40M. Ratio A:B=1:9.2, A:C=1:27.4. Per-unit 5yr: A=$29.19, B=$267.80, C=$800.
    A wins overwhelmingly due to eliminating cloud inference cost at scale. Sensitivity: if model dev
    costs 5x ($2.5M one-time): A=$3.26M. Still cheaper than B ($13.4M). Cloud only wins at very low inference
    volume. 144 inf/day*50K units is too high for cloud.'
