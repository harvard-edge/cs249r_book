id: tinyml-exp2-mast-0043
title: Hardware-Aware NAS Design for ARM Cortex-M4 Keyword Spotting
topic: neural-architecture-search
status: published
provenance: imported
scenario: You are leading a TinyML team building a keyword spotting model for a smart home device running
  on an ARM Cortex-M4 (STM32F4). The system has a strict latency budget of 50ms per inference, and the
  entire model, including peak activation memory, must fit within 256 KB of SRAM and 1 MB of flash. You
  need to design a hardware-aware Neural Architecture Search (NAS) strategy that optimizes the search
  space specifically for CMSIS-NN SIMD instructions, which can perform 2x INT8 MACs per cycle at 168 MHz.
  Synthesize the components of your NAS pipeline, detailing how you formulate the latency/memory constraints
  in the search loop.
details:
  realistic_solution: The correct approach involves a two-stage NAS similar to MCUNet. First, design a
    TinyNAS search space that heavily penalizes peak SRAM usage, restricting early layer resolutions and
    channel widths. Second, the search loop should incorporate a cycle-accurate cost model or an on-device
    latency lookup table rather than proxy metrics like FLOPs. The search algorithm will evaluate candidates
    by jointly optimizing accuracy and the strict 256KB SRAM and 50ms latency constraints, prioritizing
    operations that maximize the 2x INT8 MACs/cycle SIMD efficiency.
  common_mistake: Candidates often suggest generic NAS techniques like DARTS or mobile-specific spaces
    like MobileNetV2 without accounting for the peak activation memory bottleneck on microcontrollers.
    They might also assume theoretical FLOPs perfectly correlate with latency, ignoring the specific CMSIS-NN
    SIMD optimization where operations like depthwise convolutions often suffer from poor MAC utilization
    compared to point-wise convolutions.
  napkin_math: To meet the 50ms latency budget at 168 MHz, the total available cycles per inference are
    0.050s * 168,000,000 cycles/sec = 8.4 million cycles. Assuming an aggressive 70% utilization of the
    CMSIS-NN dual-MAC SIMD pipeline, the maximum theoretical operations are 8.4M cycles * 2 MACs/cycle
    * 0.7 = 11.76 million MACs per inference. For memory, if the input is a 40x98 spectrogram (INT8),
    a first layer output (e.g., 32 channels, 20x49 spatial size) will consume 20 * 49 * 32 * 1 byte =
    31.36 KB. With a double-buffering scheme for activations, the NAS must ensure no two consecutive layers'
    combined output tensors exceed the ~200 KB remaining SRAM (leaving ~50 KB for OS and audio buffers).
