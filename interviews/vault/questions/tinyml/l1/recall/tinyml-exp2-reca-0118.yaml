id: tinyml-exp2-reca-0118
title: Continuous Audio Ingestion on ARM Cortex-M4
topic: streaming-ingestion
status: published
provenance: imported
scenario: You are building a continuous keyword spotting system on an ARM Cortex-M4 (STM32F4) running
  at 168 MHz with 256 KB SRAM. The system must ingest a continuous 16 kHz audio stream from an I2S microphone
  while concurrently executing a neural network. What specific microcontroller hardware peripheral and
  associated memory layout strategy must you recall and implement to stream this data without overwhelming
  the CPU?
details:
  realistic_solution: The correct answer is to use the Direct Memory Access (DMA) controller paired with
    a double buffering (ping-pong) strategy in SRAM. The DMA peripheral autonomously streams the I2S audio
    directly into memory. By using a ping-pong buffer, the DMA fills one half of the buffer while the
    CPU safely processes the other half, firing an interrupt only when a full block of data is ready.
  common_mistake: Candidates often incorrectly recall that the CPU should handle data ingestion via per-sample
    interrupts or polling. They fail to remember that per-sample interrupts create severe context-switching
    bottlenecks that block the inference workload.
  napkin_math: At 168 MHz, a 16 kHz audio stream means a new sample arrives every 10,500 clock cycles.
    A standard Cortex-M4 interrupt context switch takes at least 12 cycles to enter and 12 to exit (24
    cycles total). Using per-sample interrupts wastes 384,000 cycles/second (16,000 * 24) purely on switching
    overhead. Using DMA with two 512-sample ping-pong buffers reduces the interrupt rate to ~31 Hz, freeing
    nearly 100% of those previously wasted cycles for CMSIS-NN 2x INT8 MACs/cycle operations.
