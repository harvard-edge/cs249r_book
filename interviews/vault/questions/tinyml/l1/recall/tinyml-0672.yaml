schema_version: 1
id: tinyml-0672
title: The Automotive Sensor Fusion Overflow
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: 'You are the lead architect for a new Automotive Emergency Braking System (AEBS) running on
  a Cortex-M7 microcontroller. The system must fuse data from two sensors: a standard camera (8-bit pixel
  values, 0-255) and a new, low-cost LiDAR sensor whose output represents distance in millimeters (0-65535,
  i.e., 16-bit). The fusion model has two input branches that meet at a shared ''fusion layer''. Your
  hard real-time deadline from sensor read to brake signal is 1ms. The MCU''s SRAM is 1MB. Propose a quantization
  strategy for the two branches of the network. Justify your design by showing how it avoids catastrophic
  failures while meeting the strict latency and memory constraints. What is the dominant factor in your
  energy budget calculation: compute or memory access?'
details:
  realistic_solution: The correct architectural decision is to use mixed precision. The camera branch,
    with its native 8-bit input, is a perfect candidate for full INT8 quantization. Its weights and activations
    will fit neatly within the 8-bit dynamic range. The LiDAR branch, however, requires its early layers
    to be kept in FP16 (or at least 16-bit integer) to preserve the high dynamic range of the distance
    measurements. After several layers of processing where the internal feature maps have been normalized
    or their range has been reduced (e.g., through activation functions like ReLU6), the LiDAR branch
    can then be quantized to INT8 before the fusion layer. This hybrid approach prevents overflow on the
    critical sensor while still reaping most of the benefits of INT8 quantization in the deeper parts
    of the model and the entire camera branch. You must use a representative calibration dataset that
    captures the full range of LiDAR values to determine the precise layer to transition from FP16 to
    INT8. The dominant energy cost will be memory access, not compute, as is typical for memory-bound
    TinyML systems.
  common_mistake: A common proposal is to quantize the entire model, including both branches, to INT8
    to maximize speed and minimize memory footprint. This approach fails to consider the vastly different
    dynamic ranges of the input sensors. The LiDAR branch's 16-bit input data (0-65535) will suffer catastrophic
    overflow when linearly quantized to INT8's limited range (-128 to 127), causing the model to misinterpret
    distant objects as being right in front of the car, potentially triggering false braking events.
  napkin_math: Let's analyze the latency constraint. A Cortex-M7 at 480 MHz gives ~960 MFLOPS. A typical
    250K-parameter fusion model might require ~500 M-ops. A full FP32 run would be ~500M / 960 MFLOPS
    = 520ms, missing the 1ms deadline by orders of magnitude.
