id: tinyml-0776
title: The Knowledge Distillation MCU Fit
topic: graph-compilation
status: published
provenance: imported
scenario: A teacher model (MobileNetV2, 3.4M parameters, FP32 = 13.6 MB) achieves 92% accuracy on a visual
  wake-word task. You must deploy a student model on a Cortex-M4 (256 KB SRAM, 1 MB Flash) with >85% accuracy.
  The student architecture is a 3-layer CNN. Calculate the maximum student model size given Flash constraints
  (firmware uses 300 KB), and determine the parameter budget at INT8 precision. What accuracy can you
  realistically expect from knowledge distillation at this compression ratio?
details:
  realistic_solution: 'Available Flash: 1,000 - 300 = 700 KB for model. At INT8: 700 KB = 700,000 parameters
    max. Teacher: 3.4M params. Compression: 3.4M / 700K = 4.86× parameter reduction. With INT8 quantization
    on top: 13.6 MB / 700 KB = 19.4× total size reduction. SRAM constraint: 256 KB must hold the largest
    intermediate tensor. For a 96×96 input with 32 channels: 96×96×32×1 byte = 294,912 bytes > 256 KB!
    Must reduce to 24 channels: 96×96×24 = 221,184 bytes ≈ 216 KB. Knowledge distillation at ~5× parameter
    compression typically retains 95-97% of teacher accuracy. Expected: 0.95 × 92% ≈ 87.4% — above the
    85% target.'
  common_mistake: Only considering Flash for model storage and forgetting that SRAM must hold the largest
    activation tensor during inference. A model that fits in Flash may still fail to run if intermediate
    activations exceed SRAM. Also, expecting distillation to close arbitrary accuracy gaps — at 20× compression,
    some loss is inevitable.
  napkin_math: 'Flash: 1000-300 = 700 KB. INT8 params: 700K. Teacher: 3.4M → 4.86× param reduction. Size:
    13.6MB → 700KB = 19.4× compression. SRAM peak activation (32 ch): 96×96×32 = 288 KB > 256 KB SRAM
    ✗. Fix (24 ch): 96×96×24 = 216 KB < 256 KB ✓. Expected accuracy: ~87% (95% of teacher''s 92%).'
