id: tinyml-0362
title: 'The TinyML Flash Budget: MCU Compute Constraints'
topic: mcu-compute-constraints
status: draft
provenance: imported
scenario: You're scoping a new audio keyword-spotting feature for a microcontroller with 1MB of Flash
  storage. State the formula for the usable model space and estimate the final available budget, accounting
  for typical system overhead.
details:
  realistic_solution: The available space is the total flash minus the bootloader, the Real-Time Operating
    System (RTOS), and the OTA update buffer. On a typical 1MB device, this leaves less than half the
    total space for the actual application code and ML model.
  common_mistake: Engineers accustomed to larger systems often forget the significant percentage of storage
    consumed by firmware components. The most common error is forgetting to budget for an Over-the-Air
    (OTA) update buffer, which must be large enough to hold the *entire* new firmware image, effectively
    halving the available space.
  napkin_math: 'Using standard values for a 1MB (1000 KB) microcontroller:

    1. **Bootloader:** ~16 KB

    2. **RTOS + drivers:** ~64 KB

    3. **TFLM runtime:** ~50 KB

    4. **OTA update buffer (A/B partitioning):** ~500 KB (half of total flash)

    5. **Application code:** ~50 KB

    6. **Total overhead:** 16 + 64 + 50 + 500 + 50 = **680 KB**

    7. **Available for ML model:** 1,000 - 680 = **~320 KB**


    **Formula:** Model Budget = Total Flash − Bootloader − RTOS − TFLM Runtime − OTA Buffer − App Code


    The OTA buffer alone consumes 50% of flash. Without it, the model budget would be ~820 KB — but OTA
    is essential for field updates. This is why INT8 quantization (4× smaller than FP32) is non-negotiable
    for TinyML.'
