title: The Depthwise Efficiency Dividend
topic: attention-scaling
status: published
provenance: imported
scenario: You're optimizing a CNN for a Cortex-M4 microcontroller and need to reduce the computational
  load. You are considering replacing a standard 3x3 convolution layer with a 3x3 depthwise separable
  convolution. For a layer with the same number of input and output channels, identify the approximate
  computational reduction (in terms of Multiply-Accumulate operations) you would expect from making this
  change.
details:
  realistic_solution: A 3x3 depthwise separable convolution is approximately 9 times cheaper than a standard
    3x3 convolution. This is because it decouples the spatial filtering (depthwise step) from the channel-mixing
    (pointwise step), dramatically reducing the total number of parameters and MAC operations.
  common_mistake: Engineers often underestimate the massive efficiency gain of depthwise separable convolutions,
    assuming it's a minor optimization like 2x. They forget that the cost of a standard convolution scales
    quadratically with the number of channels, while the depthwise separable version scales linearly,
    leading to an order-of-magnitude difference.
  napkin_math: Let's assume a kernel size K=3, input channels C_in=128, and output channels C_out=128.
