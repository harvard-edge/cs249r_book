schema_version: 1
id: tinyml-exp2-mast-0030
title: Continuous Acoustic Wake-Word on nRF5340
topic: compute-cost-estimation
status: published
provenance: imported
scenario: Design a continuous acoustic wake-word detection system for a battery-powered wearable using
  the Nordic nRF5340. The system must process 16kHz audio using a depthwise separable CNN while maintaining
  an average system current under 100 µA to achieve a long battery life. You must partition the workload
  between the 128 MHz application core and the 64 MHz network core, fit the model within the 256 KB SRAM
  constraints, and estimate the total compute FLOPs and energy cost per inference.
details:
  realistic_solution: A cascaded architecture is required to meet the power budget. A tiny first-stage
    Voice Activity Detector (VAD) runs on the lower-power 64 MHz network core or a dedicated DSP, keeping
    the 128 MHz app core asleep. Only when speech is detected does the system wake the app core to execute
    the larger CNN, heavily quantized to INT8 to fit within the 1 MB flash and 256 KB SRAM, optimizing
    MAC operations to minimize active compute time.
  common_mistake: Candidates often run the full neural network on the 128 MHz application core continuously,
    drawing the full ~5mA active current and instantly blowing the 100 µA budget. They also frequently
    fail to account for the SRAM required by intermediate activation buffers, exceeding the 256 KB limit
    when combined with the Bluetooth stack.
  napkin_math: Assume the main DS-CNN requires ~5M MACs (10M FLOPs) per second. On the 128 MHz core, assuming
    roughly 1 MAC/cycle, execution takes ~39ms per second of audio (5M / 128M). During this 39ms, the
    core draws ~5mA. If the first-stage VAD draws 50 µA continuously and only triggers the 5mA app core
    1% of the time, the average current is 50 µA (VAD) + (0.01 * 5000 µA) (App Core) = 100 µA, successfully
    meeting the strict power constraints.
