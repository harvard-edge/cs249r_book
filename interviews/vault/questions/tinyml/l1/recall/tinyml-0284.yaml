id: tinyml-0284
title: The Energy Tax of the Cloud
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'For a battery-powered smart home sensor that continuously listens for a wake-word, what is
  the dominant factor in its total cost of ownership (TCO) from an energy perspective: the on-device compute
  for the keyword spotting model, or the network energy required to constantly stream audio to the cloud
  for analysis?'
details:
  realistic_solution: The network energy is the dominant factor, by several orders of magnitude. A highly
    optimized, duty-cycled TinyML device for keyword spotting can have an average power consumption in
    the low single-digit milliwatts. In contrast, keeping a Wi-Fi or cellular radio active to stream audio
    consumes hundreds of milliwatts. This massive difference in the power budget is the fundamental reason
    why on-device AI (TinyML) is critical for battery-powered products, as it directly impacts battery
    life and therefore user experience and TCO.
  common_mistake: Engineers often focus exclusively on computational FLOPs and model size, assuming compute
    is the most expensive operation. They dramatically underestimate the energy physics of data transmission.
    On battery-powered devices, moving data (especially wirelessly) is almost always more power-hungry
    than the on-device computation it enables.
  napkin_math: Let's use the 'Duty cycle energy' formula as a model. An optimized TinyML device might
    average **~1 mW** (e.g., 10mW when active for 10% of the time, and deep sleep for the other 90%).
    In contrast, a device streaming audio over Wi-Fi might consume **~200-500 mW**. The ratio of energy
    consumption is therefore **200:1 to 500:1**. Over a year, the cloud-streaming device would consume
    hundreds of times more energy, requiring a much larger battery or frequent recharging, which dominates
    its TCO.
