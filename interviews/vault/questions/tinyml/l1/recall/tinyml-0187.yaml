title: 'The INT8 Energy Dividend: MCU Compute Constraints'
topic: mcu-compute-constraints
status: draft
provenance: imported
scenario: You're optimizing a keyword spotting model on a Cortex-M4 microcontroller. To reduce battery
  consumption, you're considering converting the model's layers from FP32 to INT8. For the arithmetic
  operations alone, what is the approximate reduction in energy consumption you can expect by using an
  INT8 multiply-accumulate (MAC) instead of an FP32 MAC?
details:
  realistic_solution: The energy saving is approximately 18-fold. FP32 operations require complex circuitry
    for handling exponents and mantissas, leading to significantly higher switching energy per operation
    compared to a simple INT8 integer multiplier.
  common_mistake: Engineers often conflate bit-width reduction with energy savings in a linear way, assuming
    that reducing from 32 bits to 8 bits (a 4x reduction) would result in a 4x energy saving. This ignores
    the non-linear relationship where floating-point units are significantly more complex and power-hungry
    than simpler integer units.
  napkin_math: Based on the physical invariants of silicon, an FP32 MAC operation consumes ~18x more energy
    than an INT8 MAC operation. This is a fundamental ratio based on the energy cost of computation. Therefore,
    switching to INT8 provides an ~18x energy saving for the compute portion.
