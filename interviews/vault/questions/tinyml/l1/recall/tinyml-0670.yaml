schema_version: 1
id: tinyml-0670
title: The Ghost in the Dashboard
topic: monitoring-observability
status: published
provenance: imported
scenario: You are the lead architect for a fleet of 100,000 vehicles, each equipped with a Cortex-M4 based
  voice assistant. The system uses a keyword spotting model to activate on 'Hey VINCENT'. After a year,
  users in humid climates report the assistant activating randomly, causing significant battery drain
  and user frustration. The root cause is microphone degradation leading to a severe input data drift.
  The devices have no cloud connectivity; they are only serviced once a year. Your constraints are the
  remaining 20% of the device's 1MB Flash and 256KB SRAM. The current RTOS, model, and app are immutable.
  Design a complete, on-device system to (1) autonomously detect this specific audio drift, (2) gracefully
  disable the model to prevent battery drain, and (3) store a compressed diagnostic 'fingerprint' of the
  corrupted audio statistics for retrieval during the annual service. Formulate a three-part architecture
  that can be deployed via a small patch and fits these tight resource constraints.
details:
  realistic_solution: 'The correct architecture has three components that work together within the resource
    budget.

    1. **Lightweight Drift Detector:** Instead of analyzing the full distribution, the patch implements
    a running statistics calculator on the input audio buffer''s energy (sum of squares). It computes
    the mean and variance over a sliding window (e.g., 10 seconds). This requires only a few dozen bytes
    of SRAM and minimal CPU cycles on the Cortex-M4.

    2. **Automated Circuit Breaker:** The factory-calibrated mean and variance are stored in Flash as
    part of the patch. If the running statistics deviate by a predefined threshold (e.g., > 5 standard
    deviations) for a sustained period, the system declares a fault. It then writes a single byte flag
    to a dedicated page in non-volatile Flash memory. On the next boot or model invocation, the application
    logic checks this flag. If the flag is set, the keyword-spotting inference loop is bypassed entirely,
    stopping the battery drain. The system has gracefully degraded itself.

    3. **Compressed Fault Fingerprint:** The system cannot store audio. Instead, upon detecting a fault,
    it writes a small diagnostic packet to a reserved log sector in Flash. This ''fingerprint'' contains
    the timestamp of the fault, the aberrant mean and variance values, and perhaps a 16-bin histogram
    of the audio energy that triggered the fault. This provides the engineering team with a quantitative
    signature of the failure mode upon vehicle servicing, without ever storing raw data.'
  common_mistake: Proposing a solution that requires storing raw audio samples (impossible given memory),
    suggesting a complex drift detection algorithm like a K-S test (impossible given compute), or requiring
    a full model replacement OTA (violates constraints). These mistakes fail to appreciate the extreme
    resource poverty of the environment.
  napkin_math: 'Free Flash: 20% of 1MB=205KB. Free SRAM: 20% of 256KB=51KB. Drift detector: running mean/var=12B
    SRAM, ~2KB Flash. Circuit breaker: 1-byte flag + threshold=32B Flash. Diagnostic: 16-bin histogram*4B
    + timestamp + stats=76B. Store 100 records=7.6KB Flash. Total: ~10KB Flash (5% of budget), <1KB SRAM.
    Fits easily.'
