id: tinyml-fill-00151
title: TinyML Resource Estimation for Keyword Spotting on nRF5340
topic: compute-cost-estimation
status: published
provenance: imported
scenario: 'You are designing a low-power, always-on keyword spotting system for a smart home device. The
  chosen microcontroller is the Nordic nRF5340, featuring a 128 MHz Arm Cortex-M33 processor, 256 KB of
  SRAM, and 1 MB of flash memory, with integrated Bluetooth Low Energy (BLE). You''ve developed a small
  convolutional neural network (CNN) model for detecting a specific wake word.


  Describe your approach to estimating the following:

  1. The approximate number of Multiply-Accumulate Operations (MACCs) the model performs per inference.

  2. The peak RAM usage required for the model''s weights, activations, and I/O buffers during inference.

  3. The expected inference latency (in milliseconds) on the nRF5340, considering its clock speed and
  typical cycles per MACC for this architecture.

  4. How these estimations would influence your decision on model quantization (e.g., 8-bit integer vs.
  32-bit float) and overall model architecture given the nRF5340''s constraints.'
details:
  realistic_solution: A realistic solution involves using tools like TensorFlow Lite Micro's built-in
    profiler or similar utilities to get accurate MACC counts and memory footprints specific to the target
    device. Employing aggressive post-training quantization (e.g., 8-bit integer quantization for weights
    and activations) is crucial, potentially even exploring binary or ternary neural networks. Benchmarking
    critical model layers or even the full model on the target hardware or a cycle-accurate simulator
    provides the most accurate latency estimates. Consideration of specialized TinyML compilers or frameworks
    that optimize for such constrained devices is also key, along with careful model architecture design
    to minimize computational and memory demands.
  common_mistake: Underestimating the severe resource constraints (SRAM, flash, CPU clock speed) of TinyML
    platforms like the nRF5340. A common mistake is to treat MACCs as equivalent to FLOPs from a desktop/server
    context, where floating-point operations are often faster and memory is abundant. Also, neglecting
    the memory footprint of intermediate activations and system overhead (OS, BLE stack) can lead to models
    that don't fit or perform poorly on such constrained hardware.
  napkin_math: '1.  **MACCs Estimation**: For a convolutional layer, MACCs ≈ `Output_Channels × Input_Channels
    × Kernel_Height × Kernel_Width × Output_Feature_Map_Height × Output_Feature_Map_Width`. Sum this across
    all layers. For fully connected layers, MACCs ≈ `Input_Neurons × Output_Neurons`. Sum across layers.

    2.  **Memory (RAM) Estimation**: Peak RAM ≈ `(Total_Model_Weights_Size_Bytes) + (Max_Activation_Size_Bytes)
    + (I/O_Buffer_Sizes_Bytes) + (System_Overhead_Bytes)`. For 8-bit quantized models, `Bytes_per_param`
    becomes 1.

    3.  **Latency Estimation**: Latency ≈ `Total_MACCs / (Effective_MACCs_per_Second)`. `Effective_MACCs_per_Second`
    can be roughly estimated as `Clock_Frequency_Hz / (Cycles_per_MACC_approx)`. On a Cortex-M33, a MACC
    operation might take 1-4 cycles depending on the instruction set and data types. For integer operations,
    `Cycles_per_MACC_approx` could be ~2-3. Thus, for nRF5340 (128 MHz): `128,000,000 Hz / ~2 cycles/MACC
    = ~64 MMACCs/sec` (rough estimate). Latency would be `Total_MACCs / 64,000,000` seconds.'
