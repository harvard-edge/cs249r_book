title: The INT8 Energy Payoff
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You're optimizing a keyword spotting model for a Cortex-M4 microcontroller. To save energy and
  fit the model into a tiny power budget, you're considering quantizing the model's weights and activations
  from 32-bit floating point (FP32) to 8-bit integer (INT8). From a pure computational energy perspective,
  what is the approximate energy saving for a single operation when you move from FP32 to INT8?
details:
  realistic_solution: An INT8 operation consumes approximately 18 times less energy than an FP32 operation.
    This is a foundational hardware invariant rooted in semiconductor physics. The dramatic reduction
    comes from the far simpler circuitry of an integer arithmetic logic unit (ALU) compared to a floating-point
    unit (FPU). This makes INT8 quantization a critical, non-negotiable optimization for power-sensitive
    TinyML devices.
  common_mistake: 'Engineers often incorrectly assume that the energy savings scale linearly with the
    reduction in bit width (e.g., 32 bits / 8 bits = 4x). This ignores the fundamental physics: floating-point
    arithmetic requires vastly more complex and power-hungry circuitry (for handling exponents and mantissas)
    than simple integer arithmetic. The savings are non-linear and much more significant.'
  napkin_math: 'This is a direct recall question based on the physical invariants of computation. The
    ratio is not calculated, but remembered as a core principle: Energy(FP32) / Energy(INT8) ≈ 18. For
    a device running on milliwatts or even microwatts, this 18x reduction in compute energy is often the
    enabling factor that makes a product feasible.'
