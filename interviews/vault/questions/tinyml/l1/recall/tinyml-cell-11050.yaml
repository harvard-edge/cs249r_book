id: tinyml-cell-11050
title: 'Dataset Curation: Recall — What is the Key Data Constraint for TinyML Training?'
topic: dataset-curation
status: published
provenance: imported
scenario: For a model targeting Cortex-M4 (168MHz, 256KB SRAM), what are the three key data constraints
  that differ from cloud ML training, and why does each matter for model accuracy?
details:
  realistic_solution: 'Three constraints: (1) Memory: training data must fit in external flash or be streamed
    — can''t hold 10M samples in 256KB SRAM. (2) Feature format parity: training features must exactly
    match MCU fixed-point MFCC format. (3) Data scarcity: embedded deployments often have hundreds not
    millions of labeled samples.'
  common_mistake: Listing only memory as a constraint; forgetting that inference feature format must match
    training, and that limited labeled data (few-shot) is common in embedded deployments.
  napkin_math: '(1) SRAM 256KB: one 1-sec MFCC sample = 99×40×4B = 15.8KB. Max simultaneous: 256KB/15.8KB
    = 16 samples. Batch size 16 maximum in SRAM. (2) Format mismatch cost: float32 vs int8 MFCC → 5% accuracy
    drop without quantization-aware feature extraction. (3) Data scarcity: typical embedded sensor deployment
    has 100-1,000 labeled examples/class vs millions for cloud. Solution: transfer learning (pretrain
    on cloud, fine-tune on device data).'
