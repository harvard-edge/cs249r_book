schema_version: 1
id: tinyml-0248
title: The OTA Flash Budget
topic: ota-firmware-updates
status: draft
provenance: imported
scenario: You are planning the firmware for a new TinyML device with 1MB of Flash. According to the typical
  budget allocations listed in the 'Numbers Every ML Systems Engineer Should Know', what is the approximate
  space available for your actual ML model?
details:
  realistic_solution: The available space is approximately 478 KB. A significant portion of the Flash
    must be reserved not just for the bootloader (~32KB) and RTOS (~64KB), but critically for an OTA partition
    (~450KB). This partition holds a copy of the current firmware, allowing the device to safely roll
    back if an update fails, which is a fundamental requirement for managing a fleet of devices and running
    A/B tests in production.
  common_mistake: Forgetting to budget for the Over-the-Air (OTA) update partition. Many engineers new
    to embedded systems only subtract the bootloader and RTOS, leading them to overestimate available
    model space by nearly 2x. This mistake can force a hardware re-spin late in the project when the model
    doesn't fit.
  napkin_math: 'TinyML devices with 1MB (1024KB) Flash need space for system overhead. Typical allocations:
    Bootloader ~32KB, RTOS ~64KB. Over-the-air (OTA) update requires a dual-bank setup, reserving half
    of remaining flash for the new image: (1024 - 32 - 64) / 2 = 928 / 2 = 464KB. This leaves roughly
    464KB for the actual ML model weights and application code.'
