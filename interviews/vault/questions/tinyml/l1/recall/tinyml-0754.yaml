id: tinyml-0754
title: TFLite Micro vs TVM vs Custom Compiler
topic: graph-compilation
status: published
provenance: imported
scenario: 'Your team is choosing the inference runtime for a new TinyML product line targeting Cortex-M4
  and RISC-V MCUs. The candidates are TFLite Micro, Apache TVM (microTVM), and a custom ahead-of-time
  compiler. Compare them across five dimensions: code size, inference speed, memory efficiency, portability,
  and engineering effort.'
details:
  realistic_solution: "**TFLite Micro (Interpreter-based):**\n  - **Code size:** ~50-100 KB for the interpreter\
    \ + kernel library. Only kernels for operators used by your model are linked (selective registration).\
    \ But the interpreter loop itself adds overhead.\n  - **Inference speed:** Baseline. The interpreter\
    \ dispatches operators at runtime via function pointers — each operator call has ~10-20 cycles of\
    \ dispatch overhead. For a 20-layer model: ~400 cycles of pure overhead. Negligible for large layers,\
    \ but for small models with many tiny layers, dispatch overhead can be 5-10% of total inference time.\n\
    \  - **Memory efficiency:** The tensor arena is statically allocated, but tensor placement is computed\
    \ at runtime. This means the memory planner runs on the MCU at model load time — consuming stack space\
    \ and time. Arena size is optimal but load time is ~100ms for complex models.\n  - **Portability:**\
    \ Excellent. Supports Cortex-M, RISC-V, Xtensa (ESP32), and ARC. Adding a new target requires implementing\
    \ ~20 kernel functions.\n  - **Engineering effort:** Low. Well-documented, large community, Google-maintained.\
    \ Model conversion from TensorFlow is one command."
  common_mistake: '"TFLite Micro is the industry standard — just use it." TFLite Micro is the safest choice
    but not always the best. Each runtime makes fundamentally different trade-offs.'
  napkin_math: '20-layer keyword spotting model on Cortex-M4 at 168 MHz. TFLite Micro: 15ms inference,
    95 KB code, 60 KB arena. microTVM: 11ms inference (-27%), 35 KB code (-63%), 52 KB arena (-13%). Custom
    compiler: 9ms inference (-40%), 12 KB code (-87%), 48 KB arena (-20%). Engineering cost: TFLite Micro
    = 1 week. TVM = 1 month. Custom = 6 months. At 1M units, the per-unit code size savings of TVM (60
    KB less flash) could allow a cheaper MCU ($0.50 savings × 1M = $500K).'
