schema_version: 1
id: tinyml-fill-00632
title: Optimizing CNN Energy on ARM Cortex-M4 STM32F4
topic: energy-per-operation
status: published
provenance: imported
scenario: You are deploying a small convolutional neural network (CNN) for keyword spotting on an ARM
  Cortex-M4 STM32F4 microcontroller (168 MHz, 256 KB SRAM, no FPU). Your goal is to minimize energy consumption
  while maintaining a target inference latency. The CNN involves several 3x3 convolutions and ReLU activations,
  with feature maps that occasionally exceed the 256KB SRAM, requiring external memory access (e.g., QSPI
  flash, which has significantly higher energy cost per access compared to SRAM). Based on Horowitz's
  energy estimations, a 32-bit integer MAC operation consumes ~1 pJ, while a 32-bit SRAM access consumes
  ~10 pJ, and an external flash access consumes ~100 pJ. How would you analyze and optimize the energy
  profile of your CNN?
details:
  realistic_solution: '1. **Quantization**: Aggressively quantize the model to 8-bit or even 4-bit integers
    to reduce memory footprint and enable more efficient fixed-point operations. 2. **Operator Fusion/Reordering**:
    Reschedule operations to maximize data reuse in SRAM and reduce external memory accesses. For example,
    process feature map tiles that fit entirely within SRAM. 3. **Data Layout Optimization**: Choose data
    layouts (e.g., NHWC vs NCHW) that improve spatial locality and cache utilization, even if there''s
    no explicit cache on this specific M4, it helps with SRAM access patterns. 4. **Energy-aware Pruning/Sparsity**:
    Explore pruning or sparsity to reduce the number of operations and model size, prioritizing layers
    that are bottlenecks for memory or computation. 5. **Fixed-Point Arithmetic**: Implement all computations
    using optimized fixed-point libraries, avoiding floating-point emulation due to the lack of FPU, which
    is highly inefficient in terms of cycles and energy.'
  common_mistake: Ignoring memory access costs or treating all memory accesses equally, leading to designs
    that are compute-optimized but memory-inefficient, especially when relying on external flash. Another
    mistake is using floating-point emulation (due to no FPU) when fixed-point arithmetic would be more
    energy-efficient for the given precision requirements.
  napkin_math: 'Consider a single 3x3 convolution with 32 input channels and 32 output channels, processing
    a 16x16 input feature map, all 8-bit integers.

    *   Number of MACs per output pixel: 3 * 3 * 32 = 288

    *   Number of MACs for the entire layer: 288 * 16 * 16 * 32 = 2,359,296

    *   Energy for MACs: 2,359,296 * 1 pJ = 2.36 uJ

    *   Input feature map size: 16 * 16 * 32 bytes = 8 KB

    *   Output feature map size: 16 * 16 * 32 bytes = 8 KB

    *   Kernel size: 3 * 3 * 32 * 32 bytes = 9.2 KB

    *   Total memory accessed (rough estimate for input/output/weights, assuming each accessed once from
    SRAM): 8KB + 8KB + 9.2KB = 25.2KB

    *   Energy for SRAM access: 25.2 KB * 1024 bytes/KB * (10 pJ / 4 bytes per access) = 64.5 uJ

    This simplified calculation immediately highlights that memory access dominates compute energy for
    this layer, even with SRAM.'
