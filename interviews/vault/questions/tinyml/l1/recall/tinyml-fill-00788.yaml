id: tinyml-fill-00788
title: Hardware-Aware NAS for Vision on ARM Cortex-M4
topic: neural-architecture-search
status: published
provenance: imported
scenario: 'Your team is tasked with deploying a real-time object classification model on an extremely
  resource-constrained embedded system: an ARM Cortex-M4 STM32F4 microcontroller, featuring a 168 MHz
  CPU, only 256 KB of SRAM, and crucially, no Floating Point Unit (FPU). Traditional NAS techniques often
  yield models too large or computationally intensive for this platform. Describe how you would design
  a hardware-aware Neural Architecture Search (NAS) pipeline to discover a high-performing vision model
  that respects these strict SRAM and computational (integer-only arithmetic) constraints, focusing on
  the search space definition, search strategy, and hardware-feedback mechanisms. Reference specific challenges
  posed by the STM32F4''s limited SRAM and lack of FPU, and how your NAS approach would explicitly address
  them, potentially drawing inspiration from MCUNet-style optimization strategies.'
details:
  realistic_solution: An L6+ candidate would propose a search space heavily biased towards integer-friendly
    operations (e.g., 8-bit integer convolutions, bit-shift operations, small kernel sizes), and memory-efficient
    blocks (e.g., inverted residuals with low expansion ratios and depthwise separable convolutions).
    The NAS reward function would incorporate a hardware cost model (e.g., measured inference latency
    on the STM32F4, estimated SRAM footprint) as a primary objective alongside accuracy. Techniques like
    MCUNet's two-stage search (macro-micro decoupling) or evolutionary algorithms with hardware-specific
    mutations would be discussed. They would also detail strategies for efficient integer quantization-aware
    training within the NAS loop and potential custom integer-only kernel implementations for critical
    operations.
  common_mistake: Overlooking the severe impact of the 'no FPU' constraint, leading to models that require
    floating-point operations which are either not supported or incur massive performance penalties due
    to software emulation. Another common mistake is defining a search space too broad for the target
    hardware, or not integrating hardware latency/memory estimations directly into the search reward function,
    resulting in sub-optimal or infeasible architectures.
  napkin_math: For a simple 3x3 convolution with 32 input channels and 32 output channels, a single layer's
    weights alone (8-bit integers) would be 3*3*32*32 bytes = 9216 B (~9 KB). An activation map of 64x64
    with 32 channels (8-bit) would be 64*64*32 bytes = 131072 B (~128 KB). These figures quickly consume
    the 256 KB SRAM, highlighting the need for extremely shallow and narrow networks, and careful memory
    allocation for intermediate activations. The lack of FPU means floating point operations need to be
    emulated in software or approximated with integer arithmetic, adding significant latency per FLOP
    and making operations like batch normalization or activation functions (e.g., GELU) computationally
    expensive.
