id: tinyml-exp2-reca-0111
title: Nordic nRF5340 Memory Limits Recall
topic: model-size-estimation
status: published
provenance: imported
scenario: Your team is evaluating the Nordic nRF5340 for a new always-on audio classification project.
  A proposed INT8 neural network requires 300 KB of memory for its weights and activations combined. Based
  on the hardware specifications of the Nordic nRF5340, what are its exact SRAM and flash memory capacities,
  and will this model fit into SRAM?
details:
  realistic_solution: The candidate should state that the Nordic nRF5340 Application Core features exactly
    512 KB of SRAM and 1 MB of flash memory. They should correctly identify that a 300 KB memory requirement
    fits within the available 512 KB of SRAM, making it feasible to run the model entirely in RAM.
  common_mistake: Candidates often recall the 1 MB flash memory limit but mistakenly assume the SRAM is
    similarly large, or they forget that weights and activations must share the highly constrained SRAM
    space during inference.
  napkin_math: Model requirement = 300 KB. Nordic nRF5340 SRAM = 512 KB. Nordic nRF5340 Flash = 1 MB (1024
    KB). 300 KB < 512 KB, thus the model fits within SRAM with 212 KB to spare.
