id: tinyml-0176
title: The Silent Battery Killer
topic: safety-certification
status: published
provenance: imported
scenario: You've deployed a fleet of 10,000 battery-powered keyword-spotting sensors. A rare software
  bug causes some devices to enter an infinite loop, hanging in their 'active' state instead of returning
  to 'deep sleep'. When hung, the device is unresponsive. State the name of the essential hardware peripheral
  used to automatically recover the device from this type of software freeze.
details:
  realistic_solution: The correct answer is a Watchdog Timer (WDT). A WDT is an independent hardware counter
    that, if not 'kicked' (reset) by the main software loop within a specific timeout period, will automatically
    trigger a full hardware reset of the microcontroller. This forces a clean reboot, recovering the device
    from the software freeze.
  common_mistake: Engineers unfamiliar with embedded systems often suggest software-only solutions (like
    checkpointing or OTA updates) or confuse the fault type. They fail to realize that if the main software
    loop is frozen, it cannot execute recovery code. The only solution is an independent hardware-level
    intervention.
  napkin_math: 'A normal 10s cycle on Cortex-M4 (168MHz): 1s active (50mW) + 9s sleep (10µW) averages
    ~5mW. If a device hangs in active state, it continuously draws 50mW. This is a 10x increase in power
    draw (50mW / 5mW = 10). A 10,000J battery that normally lasts ~23 days will drain in just 10,000J
    / 0.05W = 200,000 seconds = 2.3 days.'
