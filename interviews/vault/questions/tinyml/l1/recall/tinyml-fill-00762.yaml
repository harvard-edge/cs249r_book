schema_version: 1
id: tinyml-fill-00762
title: TinyML Model Feasibility on Cortex-M7 + Ethos-U55
topic: model-size-estimation
status: published
provenance: imported
scenario: You are tasked with deploying a convolutional neural network (CNN) for keyword spotting onto
  an edge device. The target hardware is an ARM Cortex-M7 microcontroller coupled with an Ethos-U55 NPU
  (480 MHz CPU, 512 KB SRAM, 128-512 MAC/cycle NPU). Before training begins, you need to perform a thorough
  feasibility study to ensure the model, which is expected to have around 500,000 parameters, can fit
  within the available memory and meet a strict inference latency budget of 50ms. Describe your systematic
  approach to estimate the model's parameter count, its total memory footprint (weights and peak activations)
  after 8-bit integer quantization, and its approximate inference latency on this specific NPU. What key
  assumptions would you make, and how would you identify potential bottlenecks?
details:
  realistic_solution: '1. **Parameter Count:** Sum parameters per layer. Assume 8-bit quantization: 1
    parameter = 1 byte for weights. 2. **Memory Footprint (Weights):** Sum of (param_count * 1 byte) across
    all layers. 3. **Memory Footprint (Activations):** Identify the layer producing the largest intermediate
    tensor. Calculate its size (e.g., for an NCHW tensor with 8-bit activations: N*C*H*W*1 byte). The
    peak memory usage will be roughly (weights_memory + max_activation_memory). 4. **MAC Operations:**
    Sum up MACs for each layer. For a CONV layer, MACs ≈ kernel_h * kernel_w * in_channels * out_channels
    * output_h * output_w. 5. **Inference Latency (NPU):** Approximate as Total MACs / (NPU_MACs_per_cycle
    * NPU_frequency). Adjust for a realistic NPU utilization factor (e.g., 50-80% of peak). Compare against
    50ms budget. 6. **Assumptions:** Assume 8-bit integer quantization throughout. Assume a reasonable
    NPU utilization. Neglect minor CPU overheads unless a specific operation is offloaded to the CPU.
    Consider a typical input size (e.g., 40x40 spectrographic image). 7. **Bottlenecks:** If memory is
    tight, investigate activation sizes. If latency is high, examine MAC-intensive layers or NPU utilization.'
  common_mistake: Overlooking the memory required for activations, especially for intermediate layers,
    which can often exceed the memory needed for model weights. Failing to account for overheads like
    OS, buffer management, or specific NPU compiler limitations. Not understanding that the NPU's MAC/cycle
    rating is a theoretical peak and actual throughput depends on layer types, data locality, and NPU
    utilization efficiency.
  napkin_math: "1. **Total Parameters (approx):** 500,000.  \n2. **Weight Memory (INT8):** 500,000 params\
    \ * 1 byte/param = 500 KB. (Already exceeds 512KB SRAM if activations are not carefully managed).\
    \ \n3. **Max Activation Memory (example):** For a 32x32x128 feature map (INT8): 32 * 32 * 128 * 1\
    \ byte = 131 KB. \n4. **Example Total MACs for a tiny CNN:** ~50 million MACs. \n5. **Theoretical\
    \ NPU throughput:** 128 MACs/cycle * 480 * 10^6 cycles/sec = ~61 GigaMACs/sec. \n6. **Estimated Inference\
    \ Time (NPU):** 50 * 10^6 MACs / (128 MACs/cycle * 480 * 10^6 cycles/sec) ≈ 0.0008 seconds (0.8 ms).\
    \ (This theoretical number is often much lower than reality due to overheads and non-ideal utilization.\
    \ Real-world latency might be 10-20x this due to memory access, data movement, and NPU pipeline stalls.\
    \ So 0.8ms * 15 = 12ms might be more realistic, still within budget but tight if higher utilization\
    \ is not achieved.)"
