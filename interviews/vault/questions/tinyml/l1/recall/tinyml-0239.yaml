schema_version: 1
id: tinyml-0239
title: The Frozen Doorbell
topic: safety-certification
status: published
provenance: imported
scenario: You've deployed a keyword spotting model on thousands of TinyML-based smart doorbells. A bug
  in an audio preprocessing library causes about 1 in 100 devices to freeze each month, becoming completely
  unresponsive. A manual power cycle fixes the issue, but this requires a costly technician visit. What
  is the standard, low-cost hardware peripheral on a microcontroller designed specifically to automatically
  recover from this type of software hang?
details:
  realistic_solution: The correct answer is a watchdog timer. This is a simple hardware counter integrated
    into the microcontroller that is independent of the main CPU core. The application firmware must 'pat
    the dog' (reset the timer) periodically to signal that it is still running correctly. If the software
    freezes, it fails to pat the timer. The timer then overflows and triggers a hardware reset of the
    entire system, automatically rebooting the device out of the frozen state without any external intervention.
  common_mistake: Engineers without an embedded systems background often suggest complex software-based
    solutions, like external monitoring services or intricate retry logic within the application. These
    approaches fail to account for a total system freeze where the software itself can no longer execute.
    They miss the fundamental, hardware-based safety net that is standard practice in reliable embedded
    design.
  napkin_math: Fleet size = 10,000 devices. Failure rate = 1% per month. 10,000 * 0.01 = 100 frozen devices
    monthly. Without a hardware watchdog timer to automatically reset them, these require manual intervention
    or returns. If a manual support ticket or RMA costs $50 per device, the cost is 100 * $50 = $5,000
    per month. Over a year, this $60k loss dwarfs the cost of robust firmware.
