schema_version: 1
id: tinyml-fill-00441
title: Optimizing TinyML Latency on ESP32-S3
topic: profiling-bottleneck-analysis
status: published
provenance: imported
scenario: You are deploying a keyword spotting TinyML model (e.g., for 'wake word' detection) on an ESP32-S3
  microcontroller. The model processes 16kHz mono audio and is designed for real-time inference with a
  target latency of under 100ms per audio frame. The ESP32-S3 features a 240 MHz dual-core processor,
  512 KB on-chip SRAM, and 8 MB external PSRAM. Initial testing reveals that the end-to-end inference
  latency is consistently exceeding 150ms, leading to noticeable delays in response. Describe your approach
  to identify the primary bottlenecks using profiling and tracing tools available for the ESP32-S3 platform.
  What specific tools would you use, what metrics would you look for, and how would you interpret the
  data to pinpoint whether the issue is compute-bound (CPU cycles), memory-bound (access patterns/data
  movement), or I/O-bound (sensor data acquisition)?
details:
  realistic_solution: A realistic solution involves using ESP-IDF's built-in tracing and profiling tools
    like `perfmon` (performance monitor) for cycle counting and event profiling, or more detailed trace
    capabilities (e.g., using ESP-PROG JTAG debugger with ESP-IDF's OpenOCD integration for real-time
    tracing of CPU activity, function calls, and memory access patterns). You would specifically look
    at CPU utilization across cores, instruction cache misses, data cache misses, PSRAM access times vs.
    SRAM access times, and the duration of key functions (e.g., audio capture, pre-processing, inference
    kernel execution). Flame graphs generated from trace data can visually pinpoint hot spots. If memory-bound,
    analyze data placement (e.g., moving critical tensors to SRAM). If compute-bound, look for opportunities
    in model optimization, kernel acceleration (e.g., ESP-DSP), or better utilization of dual cores. If
    I/O-bound, optimize ADC sampling or DMA transfers.
  common_mistake: A common mistake is to immediately jump to optimizing the model architecture or quantization
    without first systematically identifying the actual bottleneck. Without profiling, engineers might
    optimize CPU-bound operations when the issue is memory access latency to PSRAM, or vice-versa, wasting
    effort.
  napkin_math: Given a 240 MHz CPU, if the inference takes 150ms, it consumes `240,000,000 cycles/second
    * 0.150 seconds = 36,000,000 cycles` for this operation. If a critical part of the inference loop
    requires, say, accessing 1 MB of data from PSRAM, and PSRAM access is, for example, 10-20x slower
    than SRAM, this could significantly impact latency. For instance, if a cache line fetch from PSRAM
    takes 100 cycles compared to 10 cycles from SRAM, and many such accesses are occurring, the cumulative
    impact could easily lead to tens of millions of extra cycles and increased latency.
