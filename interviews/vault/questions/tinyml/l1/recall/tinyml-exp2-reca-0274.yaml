schema_version: 1
id: tinyml-exp2-reca-0274
title: CMSIS-NN Quantization Format Constraints
topic: model-format-conversion
status: published
provenance: imported
scenario: You are converting a trained wake-word detection model for deployment on an ARM Cortex-M4 (STM32F4)
  microcontroller. The device has no FPU, 256 KB SRAM, and 1 MB flash. To achieve real-time inference,
  you plan to use TensorFlow Lite for Microcontrollers (TFLM) linked with the CMSIS-NN library. What specific
  data type and quantization scheme must the model's weights and activations be converted to during the
  TFLite conversion process to leverage the CMSIS-NN SIMD instructions?
details:
  realistic_solution: The model must be converted using INT8 (8-bit integer) quantization, typically with
    per-channel symmetric quantization for weights and asymmetric for activations. CMSIS-NN is heavily
    optimized for INT8, utilizing DSP extension instructions (like SMLAD) to pack operands and execute
    dual MAC operations per cycle, which is strictly required when no FPU is present.
  common_mistake: Candidates often confuse dynamic range quantization or FP16 with the strict integer
    requirements of microcontrollers, or assume that standard INT16 provides the best balance of accuracy
    and speed on 32-bit architectures.
  napkin_math: The ARM Cortex-M4 runs at 168 MHz and the CMSIS-NN SIMD allows 2x INT8 MACs/cycle, giving
    a theoretical peak of 168 MHz * 2 = 336 MMACs/sec. If you deploy a 10 MMAC model, an optimized INT8
    conversion yields a theoretical minimum latency of 10M / 336M ≈ 29.8 ms. Without this INT8 conversion,
    falling back to soft-float (due to no FPU) takes ~50 cycles per MAC, exploding latency to 10M * 50
    / 168M ≈ 2.97 seconds.
