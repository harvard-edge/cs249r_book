schema_version: 1
id: tinyml-exp2-mast-0032
title: Continuous DMA Ingestion and Bus Contention
topic: dma-data-movement
status: published
provenance: imported
scenario: You are designing a continuous vibration anomaly detection pipeline on an ARM Cortex-M4 (STM32F4)
  running at 168 MHz with 256 KB SRAM, 1 MB flash, and no FPU. A sensor streams 16-bit data at 32 kHz
  over SPI via DMA. Your INT8 model requires 120 KB of SRAM for activations and 800 KB of Flash for weights,
  executing 15 million MACs per inference using CMSIS-NN. Design the memory architecture and data movement
  strategy to guarantee zero-copy ingestion, zero data loss, and minimal memory bus contention between
  the DMA controller and the CPU.
details:
  realistic_solution: Implement a zero-copy ping-pong (double) buffering strategy where the DMA controller
    automatically alternates between two memory regions. To prevent bus contention, explicitly map the
    DMA buffers to a peripheral SRAM bank while placing the 120 KB NN activations in the main SRAM or
    Core Coupled Memory (CCM, which offers zero-wait-state CPU access but is invisible to DMA). The CPU
    processes the 'pong' buffer directly in-place while the DMA fills the 'ping' buffer.
  common_mistake: Candidates frequently propose basic single-buffer DMA with CPU copying, which wastes
    SRAM and cycles. They also typically overlook ARM bus matrix contention, where the CPU fetching CMSIS-NN
    activations and the DMA writing sensor data to the same SRAM bank cause pipeline stalls, degrading
    the expected 2x INT8 MACs/cycle throughput.
  napkin_math: 'Sensor data rate is 32 kHz * 2 bytes = 64 KB/sec. Processing 500 ms windows requires 32
    KB per buffer, so ping-pong buffers consume 64 KB SRAM. Remaining SRAM: 256 KB - 64 KB = 192 KB, which
    comfortably fits the 120 KB activations and leaves 72 KB for the RTOS/stack. Compute time: 15 million
    MACs / (2 MACs/cycle * 168 MHz) = 44.6 ms ideal compute time. Since 44.6 ms is strictly less than
    the 500 ms window, the CPU can finish inference and sleep for ~455 ms, provided bus contention is
    properly mitigated.'
