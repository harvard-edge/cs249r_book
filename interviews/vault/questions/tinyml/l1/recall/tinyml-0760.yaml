schema_version: 1
id: tinyml-0760
title: The ADC Resolution Bottleneck
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: A Cortex-M4 microcontroller has a 12-bit ADC sampling an analog sensor at 8 kHz. How much data
  (in bytes per second) does the ADC generate, and how much Flash would 10 minutes of raw recording consume?
details:
  realistic_solution: 'Each sample is stored as a 16-bit (2-byte) value. Data rate: 8,000 samples/s ×
    2 bytes = 16,000 bytes/s = 16 KB/s. 10 minutes: 16,000 × 600 = 9,600,000 bytes ≈ 9.6 MB. This far
    exceeds the typical 1 MB Flash on a Cortex-M4, so raw recording requires external storage or significant
    compression.'
  common_mistake: Using 12 bits as 1.5 bytes. In practice, 12-bit ADC values are stored as 16-bit (2-byte)
    integers because there is no native 12-bit data type. Candidates who use 1.5 bytes get the wrong answer.
  napkin_math: 12-bit ADC → stored as 16-bit = 2 bytes. 8 kHz × 2 B = 16 KB/s. 10 min = 600 s. 16 KB/s
    × 600 = 9,600 KB = 9.6 MB >> 1 MB Flash.
