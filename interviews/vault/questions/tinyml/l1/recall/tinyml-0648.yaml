schema_version: 1
id: tinyml-0648
title: The Bootloader Vector Table Relocation
topic: ota-firmware-updates
status: published
provenance: imported
scenario: You implement a custom bootloader for your TinyML device to handle OTA updates. The bootloader
  lives at Flash address `0x08000000`. It verifies the new ML application at `0x08020000` and jumps to
  it. The ML application's first line of code executes perfectly. But the moment a hardware timer interrupt
  fires, the device crashes and reboots. Why?
details:
  realistic_solution: 'The interrupt vector table (IVT) was not relocated. At boot, the CPU fetches interrupt
    handlers from the IVT at 0x08000000 (bootloader''s IVT). After jumping to the application at 0x08020000,
    the VTOR register still points to the bootloader''s IVT. When a timer interrupt fires, the CPU fetches
    the handler address from the bootloader''s vector table, which points to bootloader code — executing
    random instructions from the wrong binary, causing an immediate hard fault. Fix: the application''s
    first instruction must set VTOR = 0x08020000 (SCB->VTOR = APP_BASE_ADDRESS) before enabling any interrupts.'
  common_mistake: '"The ML application didn''t initialize the timer correctly." The timer fired, so it
    was initialized. The problem is what the CPU does *after* the timer fires.'
  napkin_math: A jump instruction takes 1-3 cycles. Without VTOR relocation, the CPU jumps to an address
    compiled for a completely different binary, executes random bytes as instructions, and triggers a
    fault in less than a microsecond.
