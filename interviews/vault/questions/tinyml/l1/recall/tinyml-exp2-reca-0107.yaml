schema_version: 1
id: tinyml-exp2-reca-0107
title: SRAM vs Compute Energy Cost
topic: energy-per-operation
status: published
provenance: imported
scenario: Your team is deploying a wake-word detection model to an ARM Cortex-M4 (STM32F4). The device
  runs at 168 MHz, features 256 KB SRAM, 1 MB flash, and uses CMSIS-NN SIMD (2x INT8 MACs/cycle) without
  an FPU. During a code review to optimize battery life, an engineer suggests caching all intermediate
  layer outputs in SRAM to save compute cycles. What fundamental fact from the Horowitz energy table should
  you recall regarding the relative energy cost of SRAM access versus integer compute?
details:
  realistic_solution: The candidate must recall that a local SRAM memory access consumes roughly one to
    two orders of magnitude (10x to 100x) more energy than a simple arithmetic operation like an INT8
    MAC. Therefore, on memory-constrained devices, it is often much more energy-efficient to recompute
    intermediate values using the processor's ALUs rather than paying the energy penalty of reading and
    writing to SRAM.
  common_mistake: Candidates often incorrectly recall that compute operations are the primary driver of
    energy consumption. They mistakenly recommend aggressively caching intermediate tensors in the 256
    KB SRAM to minimize total ALU cycles, ignoring the high energy cost of memory transfers.
  napkin_math: 'Using standard Horowitz estimates: an integer operation costs ~0.1 pJ, while a 32-bit
    SRAM access costs ~5 pJ. On the ARM Cortex-M4 (STM32F4) using CMSIS-NN SIMD (2x INT8 MACs/cycle),
    2 INT8 MACs take ~0.2 pJ. Fetching a 32-bit word (containing four INT8 values) from the 256 KB SRAM
    costs ~5.0 pJ. The SRAM access requires 25x more energy (5.0 / 0.2) than executing the dual MACs.
    Recomputing an activation is therefore more energy-efficient as long as the recompute requires fewer
    than 50 MACs per word fetched.'
