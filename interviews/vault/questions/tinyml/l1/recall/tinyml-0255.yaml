id: tinyml-0255
title: The Energy Cost of Precision
topic: mcu-compute-constraints
status: draft
provenance: imported
scenario: You're optimizing a keyword-spotting model on a Cortex-M4 microcontroller. To save power, you're
  considering quantizing a key convolutional layer from 16-bit floating-point (FP16) to 8-bit integer
  (INT8). State the approximate energy reduction you'd expect for the arithmetic operations in that layer.
details:
  realistic_solution: The energy saving is approximately 5x. Floating-point arithmetic, with its separate
    exponent and mantissa logic, is inherently more complex and energy-intensive than simpler integer
    operations. Based on established hardware physics, FP32 compute costs ~18x the energy of INT8, and
    ~3.4x the energy of FP16. The ratio for FP16 vs. INT8 can be derived from these two invariants.
  common_mistake: Engineers often conflate memory savings with energy savings. They correctly state that
    INT8 uses half the memory of FP16 (a 2x reduction) and incorrectly assume the energy savings are also
    2x. Another common mistake is recalling the FP32-to-INT8 ratio (~18x) instead of the FP16-to-INT8
    ratio.
  napkin_math: 1. **Recall FP32 vs. INT8 invariant:** FP32 uses ~18× more energy than INT8.
