schema_version: 1
id: tinyml-exp2-reca-0115
title: Cycle Count Profiling on ARM Cortex-M4
topic: profiling-bottleneck-analysis
status: published
provenance: imported
scenario: You are profiling the latency of a quantized neural network inference on an ARM Cortex-M4 (STM32F4)
  microcontroller running at 168 MHz. To accurately measure the execution time of individual layers without
  the overhead of external timers or RTOS context switches, you need to read a specific internal hardware
  register. What is the name of the standard ARM CoreSight register used to count clock cycles for precise
  profiling?
details:
  realistic_solution: The correct approach is to use the Data Watchpoint and Trace (DWT) unit, specifically
    the DWT_CYCCNT (Cycle Count) register. It increments every clock cycle, providing the exact cycle-level
    resolution needed for accurate latency profiling on Cortex-M processors.
  common_mistake: Candidates often suggest using RTOS ticks or generic system timers (SysTick), which
    typically have a resolution of 1 ms and are entirely insufficient for microsecond-level profiling
    of individual neural network layers.
  napkin_math: On the STM32F4 running at 168 MHz, 1 clock cycle is approximately 5.95 ns. Using CMSIS-NN
    SIMD (2x INT8 MACs/cycle), a layer with 336,000 MACs takes a theoretical minimum of 168,000 cycles.
    Measuring exactly 168,000 cycles (1 ms) requires DWT_CYCCNT; a 1 ms SysTick timer cannot reliably
    resolve this.
