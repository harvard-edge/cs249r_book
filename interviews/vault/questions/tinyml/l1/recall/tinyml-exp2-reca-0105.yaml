id: tinyml-exp2-reca-0105
title: ESP32-S3 Memory Hierarchy for Model Deployment
topic: compute-cost-estimation
status: published
provenance: imported
scenario: You are deploying a quantized keyword spotting model on an ESP32-S3 microcontroller. The model
  requires frequent memory access for intermediate activations during inference, and you need to estimate
  if it will fit in the fastest available memory. What are the specific sizes of the internal SRAM and
  external PSRAM on the ESP32-S3, and why does this distinction matter for compute performance?
details:
  realistic_solution: The correct answer is recalling that the ESP32-S3 has exactly 512 KB of internal
    SRAM and 8 MB of external PSRAM. The candidate should note that placing compute-heavy activations
    in the 512 KB SRAM is critical because accessing the 8 MB PSRAM incurs significantly higher latency
    and reduces the effective utilization of the INT8 vector extensions.
  common_mistake: Candidates often confuse the 512 KB of internal SRAM with the 8 MB of external PSRAM,
    assuming the entire 8.5 MB is accessible with the same low latency. Another mistake is forgetting
    that the ESP32-S3 has vector extensions for INT8, which require fast memory access to prevent stalling
    the 240 MHz dual-core Xtensa processor.
  napkin_math: Available Fast Memory = 512 KB SRAM. Available Slower Memory = 8 MB PSRAM. Processor Speed
    = 240 MHz. If an INT8 model requires 200 KB for weights and 150 KB for maximum peak activations, Total
    Fast Memory Needed = 200 KB + 150 KB = 350 KB. Since 350 KB < 512 KB SRAM, the model can reside entirely
    in the fast internal memory, avoiding the bottleneck of external PSRAM access.
