id: tinyml-0371
title: The INT8 Memory Diet
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You're optimizing a keyword spotting model to run on a Cortex-M4 microcontroller. The model
  is currently using FP16 precision for its weights. To reduce the flash memory footprint, you decide
  to quantize the model's weights to INT8. What is the expected reduction factor for the memory occupied
  by the model's weights?
details:
  realistic_solution: The reduction factor is exactly 2×. FP16 (half-precision floating-point) uses 16
    bits, or 2 bytes, per parameter. INT8 (8-bit integer) uses 8 bits, or 1 byte, per parameter. By halving
    the bit width for each weight, the total memory footprint for the weights is also halved.
  common_mistake: Engineers often confuse this with the more widely discussed FP32-to-INT8 quantization,
    which yields a 4× reduction. Another common error is to conflate memory savings with energy savings
    ratios, which are governed by different physics.
  napkin_math: Memory = Parameters × Bytes/Parameter
