id: tinyml-0281
title: The INT8 Energy Prize
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You're optimizing a keyword spotting model on a Cortex-M4 microcontroller to run on a coin-cell
  battery. To meet the aggressive power budget, you're considering quantizing the model's weights and
  activations from 32-bit floating point (FP32) to 8-bit integer (INT8). State the approximate energy
  savings you would expect to gain *per operation* from this change.
details:
  realistic_solution: The energy savings are approximately 18x. An FP32 multiply-accumulate (MAC) operation
    is fundamentally more expensive than an INT8 MAC. The FP32 unit requires complex circuitry for handling
    exponents and mantissas, leading to significantly higher switching capacitance and static power leakage
    compared to the much simpler integer ALU. This non-linear energy scaling is a core principle of hardware-aware
    model optimization.
  common_mistake: Engineers often mistakenly believe energy savings scale linearly with the reduction
    in bit width. They calculate 32 bits / 8 bits = 4x savings. This ignores the fundamental hardware
    reality that floating-point arithmetic units are vastly more complex and energy-intensive than integer
    units, which don't have to manage exponents and special values.
  napkin_math: According to the invariants of ML systems physics, the energy ratio of an FP32 op to an
    INT8 op is ~18x. If a single FP32 operation on your model costs 18 picojoules (pJ), the equivalent
    INT8 operation would cost only ~1 pJ. This is the primary reason why quantization is non-negotiable
    for battery-powered TinyML devices.
