id: tinyml-0361
title: The Quantization Energy Dividend (tinyml-0361)
topic: mcu-compute-constraints
status: draft
provenance: imported
scenario: You are optimizing a keyword spotting model for a battery-powered device using a Cortex-M4 microcontroller.
  To maximize battery life, you are considering quantizing the model from 32-bit floating-point (FP32)
  to 8-bit integer (INT8). Based on the fundamental physics of computation, what is the approximate energy
  saving for a single arithmetic operation (like a multiply-accumulate) when switching from FP32 to INT8?
details:
  realistic_solution: An INT8 operation consumes approximately 18 times less energy than an FP32 operation.
    The hardware required for 32-bit floating-point multiplication and addition is significantly more
    complex (requiring shifters, and separate exponent/mantissa logic) than a simple 8-bit integer multiplier.
    This complexity translates directly to higher switching energy for every calculation.
  common_mistake: A common mistake is to assume that the energy savings are linear with the reduction
    in bit-width. That is, since we are moving from 32 bits to 8 bits (a 4x reduction), the energy saving
    should also be 4x. This ignores the non-linear relationship between circuit complexity and energy
    consumption for floating-point vs. integer arithmetic.
  napkin_math: This is a fundamental invariant of silicon physics. If a single FP32 operation costs 18
    nanojoules (nJ) on a given chip, the equivalent INT8 operation would only cost about 1 nJ. For a model
    with millions of operations per inference, this ~18x factor per-operation is the dominant reason quantization
    is so effective for extending battery life on edge and TinyML devices.
