schema_version: 1
id: tinyml-0181
title: The Microcontroller's Memory Bottleneck
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: A key metric for understanding a processor's performance is its 'Ridge Point' on a roofline
  model, which defines its Arithmetic Intensity. What is the approximate Ridge Point for a typical Cortex-M4
  microcontroller, and what does this value signify for ML workloads?
details:
  realistic_solution: The Ridge Point is approximately 0.2 Ops/Byte. This extremely low value signifies
    that the processor is heavily memory-bound. For every byte of data it fetches from its SRAM, it can
    only perform a fraction of a single floating-point operation. This is a fundamental constraint of
    TinyML hardware; most workloads will be limited by memory bandwidth, not by the processor's peak MFLOPS.
  common_mistake: Engineers often mistakenly assume that all ML-capable hardware is compute-dense like
    a datacenter GPU. They might quote a Ridge Point in the hundreds, failing to recognize that microcontrollers
    are fundamentally different. A high Ridge Point (e.g., >100 Ops/Byte) means the chip can do many computations
    per byte of data fetched, making it compute-bound. A low Ridge Point means the opposite.
  napkin_math: The Ridge Point is the ratio of peak compute to peak memory bandwidth.
