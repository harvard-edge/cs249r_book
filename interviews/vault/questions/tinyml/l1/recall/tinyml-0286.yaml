id: tinyml-0286
title: The Microcontroller's Low Ceiling
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: A typical microcontroller like a Cortex-M4 has a 'ridge point' of approximately 0.2 Ops/Byte
  on its roofline performance model. What fundamental performance bottleneck does this extremely low value
  imply for most neural network workloads?
details:
  realistic_solution: A ridge point of 0.2 Ops/Byte means the system becomes compute-bound with very little
    work. Any operation with an arithmetic intensity greater than 0.2 FLOPs per byte will be limited by
    the CPU's processing speed, not memory bandwidth. Since most neural network layers (like convolutions)
    have a much higher arithmetic intensity, microcontrollers are almost always **compute-bound**.
  common_mistake: 'Engineers often transpose their intuition from large datacenter GPUs, where memory
    bandwidth is a frequent bottleneck (e.g., for attention layers). They mistakenly assume all ML hardware
    is memory-bound. For a microcontroller, the opposite is true: the CPU is so slow relative to its fast
    on-chip SRAM that almost any work will max out the processor long before it maxes out memory access.'
  napkin_math: 'The ridge point is the ratio of peak compute to peak memory bandwidth. For a Cortex-M4:
    (336 MFLOPS) / (1.2 GB/s) ≈ 0.28 Ops/Byte. This means a workload only needs to perform ~1 operation
    for every 4 bytes of data it reads to become limited by the CPU. A simple 3x3 convolution performs
    hundreds of operations per byte, making it heavily compute-bound.'
