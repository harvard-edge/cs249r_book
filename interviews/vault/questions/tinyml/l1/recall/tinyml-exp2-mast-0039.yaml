id: tinyml-exp2-mast-0039
title: Dual-Core Anomaly Latency Decomposition
topic: latency-decomposition
status: published
provenance: imported
scenario: You are designing an industrial vibration anomaly detection system using the Nordic nRF5340.
  The system continuously samples accelerometer data, and upon detecting a potential fault, must extract
  FFT features, run a CNN inference on the 128 MHz app core, and transmit an alert via the 64 MHz net
  core over BLE 5.3. The strict end-to-end latency budget from physical anomaly to BLE transmission is
  40ms. Synthesize a dual-core pipelined architecture to decompose and minimize this latency, and prove
  it fits within the 256 KB SRAM and time budget.
details:
  realistic_solution: 'A mastery-level design pipelines the workload: the app core handles DMA-driven
    SPI ingestion, runs the FFT (preprocessing), and executes the quantized CNN. To minimize latency,
    the system uses shared memory for IPC rather than serializing data. The net core handles the BLE 5.3
    stack independently. The total latency is decomposed into Sensing/DMA, Preprocessing, Inference, IPC,
    and Network Tx, carefully scheduled to meet the 40ms budget while staying under the ~5mA active current
    constraint.'
  common_mistake: Candidates often treat the nRF5340 as a single-core system, ignoring the IPC (Inter-Processor
    Communication) latency between the 128 MHz app core and 64 MHz net core. They also frequently fail
    to decompose preprocessing (FFT) and network stack latency, assuming inference time dominates the
    entire budget.
  napkin_math: '1. Sensing/DMA: 5ms buffer fill. 2. Preprocessing: 1024-pt FFT on 128 MHz app core using
    CMSIS-DSP takes ~2ms. 3. Inference: 3M MAC CNN. At 128 MHz (assuming 1 cycle/MAC with DSP extensions),
    inference takes 3M / 128M = ~23.4ms. 4. IPC (App to Net core): 0.5ms via shared SRAM. 5. Network (BLE
    Tx on 64 MHz core): 7.5ms connection interval delay + 1.5ms stack processing = 9ms. Total Latency
    = 5 + 2 + 23.4 + 0.5 + 9 = 39.9ms, fitting within the 40ms budget.'
