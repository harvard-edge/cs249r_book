id: tinyml-0025
title: The Energy Cost of an OTA Update
topic: model-format-conversion
status: published
provenance: imported
scenario: A battery-powered environmental sensor needs to receive a 450 KB firmware update over-the-air
  (OTA). The device uses a low-power microcontroller and a Bluetooth Low Energy (BLE) radio. State which
  phase of the OTA process typically consumes the most energy from the battery.
details:
  realistic_solution: Downloading the firmware image. Radio communication is one of the most energy-intensive
    operations on a constrained device, not because of its peak power draw, but because of the long time
    it must remain active to transfer a large amount of data. Even with a low-power protocol like BLE,
    transferring hundreds of kilobytes can take tens of seconds, far longer than any on-chip computation
    or memory operation.
  common_mistake: Focusing on the peak power consumption of the CPU (during verification) rather than
    the total energy (Power × Time). While CPU-intensive tasks have high peak power, the long duration
    of the radio transmission usually dominates the total energy budget.
  napkin_math: BLE OTA has two main phases. At 20 KB/s, receiving 450 KB takes 22.5s. An active BLE radio
    draws ~15mA at 3.3V (50 mW) -> 1,125 mJ. Erasing/writing to internal Flash takes ~10ms per 4KB page,
    drawing 20mA (66 mW). Flash time = 1.1s -> 74 mJ. The Radio Rx phase consumes 15x more energy than
    writing to Flash.
