schema_version: 1
id: tinyml-fill-00443
title: Optimizing Latency for a TinyML Model on nRF5340
topic: profiling-bottleneck-analysis
status: published
provenance: imported
scenario: You are tasked with deploying a real-time anomaly detection model (e.g., a small CNN) on a Nordic
  nRF5340 SoC, which has a 128 MHz ARM Cortex-M33 processor, 256 KB SRAM, and 1 MB flash memory. The model
  needs to process sensor data with a strict latency budget of 10ms per inference, but initial tests show
  inference times consistently exceeding 50ms. Describe a detailed methodology to identify the primary
  bottleneck (compute, memory access, or I/O) causing this performance degradation. Your explanation should
  consider the specific hardware constraints of the nRF5340 and the tools/techniques available in a tinyML
  embedded development context.
details:
  realistic_solution: "A systematic approach involves:\n1.  **Baseline Measurement:** Use the nRF Connect\
    \ SDK's built-in timers or GPIO toggling to precisely measure the total inference time and key sub-components\
    \ (data acquisition, pre-processing, model inference, post-processing).\n2.  **CPU Profiling:**\n\
    \    *   **Instruction Cycle Counting:** Leverage the ARM Cortex-M33's DWT (Data Watchpoint and Trace)\
    \ unit to count CPU cycles for specific code blocks. This pinpoints computationally intensive functions.\
    \ Tools like SEGGER J-Link's SystemView or Arm Development Studio can visualize this.\n    *   **Function\
    \ Call Graph/Stack Analysis:** Use a debugger (e.g., GDB via VS Code with nRF Connect Extension) to\
    \ halt execution and inspect the call stack, looking for deep recursion or unexpectedly long function\
    \ calls.\n    *   **Compiler Optimization Reports:** Analyze reports from GCC/Clang to understand\
    \ loop unrolling, vectorization, and inlining, which can impact compute.\n3.  **Memory Profiling:**\n\
    \    *   **SRAM Usage Analysis:** Monitor peak SRAM usage during inference using the linker map file\
    \ (`.map`) and runtime heap/stack monitors (e.g., FreeRTOS's `uxTaskGetStackHighWaterMark` if an RTOS\
    \ is used). Overflows or near-overflows can lead to cache thrashing or slower memory access.\n   \
    \ *   **Cache Utilization:** While nRF5340 has limited cache, understanding data access patterns (e.g.,\
    \ sequential vs. random) can reveal issues. Profilers might show stalls due to memory accesses.\n\
    \    *   **Flash Access Patterns:** For models stored in flash, evaluate the impact of code/data locality\
    \ and flash read speeds.\n4.  **I/O Profiling:**\n    *   **Sensor Interface:** Measure the time taken\
    \ for sensor data acquisition via SPI/I2C/UART using GPIO toggles or internal timers. Latency here\
    \ can block the CPU.\n    *   **BLE/Radio Activity:** If BLE is active, its radio duty cycle can impact\
    \ CPU availability and introduce delays. Use nRF Sniffer or logic analyzer to monitor radio events.\n\
    5.  **Tools:** SystemView for real-time OS tracing, GDB for debugging, nRF Connect SDK's profiling\
    \ tools, logic analyzers for external I/O, and power profilers for correlating power consumption spikes\
    \ with performance events."
  common_mistake: A common mistake is to immediately jump into optimizing the model architecture (e.g.,
    reducing layers, aggressive quantization) or writing highly optimized assembly code without first
    systematically profiling the existing implementation. Developers might also incorrectly assume the
    bottleneck without data, e.g., blaming compute when it's actually memory access patterns or I/O contention
    (e.g., sensor data acquisition or logging to flash).
  napkin_math: 'Given nRF5340''s 128 MHz clock, a single cycle takes approximately 1/128,000,000 seconds
    ≈ 7.8 ns. Target latency: 10 ms = 10,000,000 ns. Available cycles per inference: 10 ms / 7.8 ns/cycle
    ≈ 1,280,000 cycles. If a typical MAC operation on Cortex-M33 takes 1-2 cycles (with DSP extensions),
    and our model requires, say, 10 million MACs, then MACs alone would take 10,000,000 * 1 cycle/MAC
    * 7.8 ns/cycle = 78 ms, immediately indicating a severe computational bottleneck if the model is too
    large. Alternatively, if the model (weights + activations) requires 100 KB SRAM, and the device has
    256 KB, it fits comfortably, but peak usage during inference might be higher due to intermediate tensors.
    Memory bandwidth is typically lower on embedded devices. If an operation requires loading 10KB from
    flash to SRAM, and flash read speed is 1MB/s, it takes 10KB / 1MB/s = 0.01s = 10ms, which could be
    a significant I/O bottleneck if done frequently.'
