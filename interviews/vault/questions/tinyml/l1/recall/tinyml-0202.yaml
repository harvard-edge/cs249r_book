schema_version: 1
id: tinyml-0202
title: The Real-Time Deadline Trap
topic: real-time-deadlines
status: published
provenance: imported
scenario: A keyword-spotting device uses a Cortex-M4 to process 1-second audio chunks. The model takes
  600ms to run inference on one chunk. The system has a hard real-time deadline of 1000ms to process each
  chunk before the next one must be handled. If two valid keywords are spoken back-to-back, causing two
  chunks to enter the processing queue almost simultaneously, what is the total time from the arrival
  of the *second* chunk until its processing is complete?
details:
  realistic_solution: The correct answer is 1200ms. Since the Cortex-M4 is a single-threaded processor,
    the second chunk must wait for the first chunk to finish processing. Its total time in the system
    is the wait time (600ms for the first chunk) plus its own processing time (another 600ms). The total
    latency for the second chunk is 1200ms, which misses the 1000ms hard real-time deadline, leading to
    a system failure (e.g., a dropped audio frame).
  common_mistake: Engineers often focus only on the average inference time (600ms) and compare it to the
    deadline (1000ms), incorrectly assuming there is 400ms of slack. They forget that in a single-threaded,
    sequential processing system, requests can queue up. The 'Time to Process One Token' (TPOT) must include
    any wait time, not just the service time.
  napkin_math: Total Latency = Wait Time + Service Time
