id: tinyml-cell-13226
title: Master Flash-Aware Transformer Scheduling on ESP32-S3
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'A production team deploys a 6-layer, 256-dim transformer (12MB INT8) on ESP32-S3 with 8MB flash
  and 512KB SRAM. The model exceeds flash by 4MB. The team proposes layer-swapping: store layers in a
  second flash chip via SPI at 80MHz (10 MB/s), swapping each layer''s weights before execution. With
  6 layers × 2MB each and 100ms processing per layer: analyze the swap overhead, propose an optimal prefetch
  schedule, and evaluate whether the design is feasible for a 1-second latency budget.'
details:
  realistic_solution: 'Swap time per layer: 2MB / 10 MB/s = 200ms. Processing time: 100ms. Sequential:
    (200+100)×6 = 1800ms >> 1s budget. With DMA prefetch: while layer N processes (100ms), DMA loads layer
    N+1 (200ms). But 200ms > 100ms → DMA can''t keep up. Solution: Double-buffer with reduced model. Compress
    layers to 1MB via INT4: swap = 100ms ≤ processing = 100ms. Now overlap perfectly: total = 100ms (first
    load) + 6×100ms (compute, overlapped with next load) + 0 = 700ms < 1s. INT4 accuracy test required.'
  common_mistake: Assuming compute and SPI flash transfer can overlap without DMA; blocking SPI reads
    stall the CPU entirely during 200ms weight transfer.
  napkin_math: 'SPI at 80MHz quad: 80M×4bits/8 = 40MB/s theoretical; actual ~10MB/s due to latency. 2MB/layer
    ÷ 10MB/s = 200ms/swap. INT4: 1MB/layer ÷ 10MB/s = 100ms/swap = compute time → perfect overlap. Total:
    100ms init + 5×100ms overlapped + 100ms last = 700ms.'
