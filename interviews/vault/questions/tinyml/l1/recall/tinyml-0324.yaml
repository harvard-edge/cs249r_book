id: tinyml-0324
title: The Economic Viability of Sleep
topic: duty-cycling
status: published
provenance: imported
scenario: To ensure a battery-powered TinyML device is economically viable, it might need to last for
  a year or more on a single coin cell. This is only possible if its power consumption in its idle state
  is extremely low. State the typical power consumption of a modern microcontroller in deep sleep mode.
details:
  realistic_solution: A typical microcontroller's deep sleep power consumption is in the low single-digit
    microwatts (µW), specifically around 1–10 µW. This ultra-low power state is the core economic enabler
    for long-life battery-powered devices, as they often spend over 99.9% of their time in this mode between
    brief moments of activity.
  common_mistake: Engineers accustomed to larger, wall-powered systems often guess in the milliwatt (mW)
    range. This is the power draw during *active* computation, not sleep. An error of this magnitude (over
    1,000×) makes the difference between a product lasting one year and a product lasting less than half
    a day, rendering it economically non-viable.
  napkin_math: 'From the playbook, a Cortex-M4''s active power is ~10-50 mW, while its deep sleep power
    is ~1-10 µW. Let''s use the lower-end values for a concrete ratio: `Active Power / Sleep Power = 10
    mW / 10 µW = 10,000 µW / 10 µW = 1,000x`. A device that fails to enter deep sleep will drain its battery
    one thousand times faster.'
