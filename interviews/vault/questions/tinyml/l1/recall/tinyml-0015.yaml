schema_version: 1
id: tinyml-0015
title: The Duty Cycle Power Tax
topic: duty-cycling
status: draft
provenance: imported
scenario: A wildlife tracking device using a Cortex-M4 microcontroller wakes up for 1 second to perform
  an inference, consuming 50 mW. It then returns to a deep sleep state for the next 119 seconds, consuming
  10 µW. State the approximate average power consumption of the device over this 2-minute cycle.
details:
  realistic_solution: The average power is the total energy consumed during the cycle divided by the total
    cycle time. The device is active for 1 second (50 mJ) and sleeps for 119 seconds (1.19 mJ), consuming
    51.19 mJ over a total period of 120 seconds. The average power is therefore ~0.43 mW.
  common_mistake: Engineers often neglect the power consumed during the 'sleep' phase, assuming it's zero.
    While small, sleep current can dominate the energy budget in very low duty cycle applications. Another
    common error is mixing units (milliwatts and microwatts) or incorrectly calculating the total period
    for the average.
  napkin_math: Total Energy = 1s * 50 mW + 119s * 0.01 mW = 50 + 1.19 = 51.19 mJ. Total Period = 1s +
    119s = 120s. Average power = 51.19 mJ / 120 s ≈ 0.426 mW (rounds to 0.43 mW).
