id: tinyml-0170
title: The INT8 Energy Dividend
topic: mcu-compute-constraints
status: draft
provenance: imported
scenario: You're optimizing a keyword spotting model for a Cortex-M4 microcontroller, where every microwatt
  counts. To reduce power consumption, you are deciding which data type to use for your primary convolution
  layers. State the approximate energy reduction when performing a single multiply-accumulate (MAC) operation
  using INT8 versus FP32 precision.
details:
  realistic_solution: An INT8 MAC operation is approximately 18 times more energy-efficient than an FP32
    MAC. This is a crucial hardware invariant rooted in silicon physics. The simpler logic gates in an
    integer unit result in less switching activity and lower power draw, making INT8 a cornerstone of
    power-efficient TinyML inference.
  common_mistake: 'Engineers often mistakenly assume energy cost is linear with bit-width, guessing the
    savings are around 4x (32 bits / 8 bits). This ignores the fundamental architectural difference: floating-point
    units (FPUs) have far more complex circuitry for handling exponents and normalization than simple
    integer ALUs. This complexity directly translates to significantly higher power consumption.'
  napkin_math: From the 'Invariants' table, the `FP32 vs INT8 energy` ratio is ~18x. If a single FP32
    MAC costs 18 picojoules (pJ), an INT8 MAC would only cost ~1 pJ. For a model with 1 million MACs,
    the difference is 18 µJ vs 1 µJ per inference. This 18x factor is a primary lever for staying within
    a TinyML power budget of tens of milliwatts.
