schema_version: 1
id: tinyml-exp2-reca-0273
title: Identifying Latency Components on ESP32-S3
topic: latency-decomposition
status: published
provenance: imported
scenario: You are profiling the end-to-end latency of an anomaly detection model on an ESP32-S3. The system
  reads vibration data, processes it, runs INT8 inference using the vector extensions, and triggers an
  alert via BLE. When breaking down the total latency, what term describes the time spent computationally
  converting the raw sensor data into the input tensor required by the model?
details:
  realistic_solution: The correct term is 'preprocessing latency' or 'feature extraction latency'. This
    is a distinct component of the latency decomposition that must occur before the 240 MHz Xtensa cores
    can begin executing the INT8 neural network layers.
  common_mistake: Candidates might lump this step into 'inference time' or call it 'sensor read time',
    failing to distinguish between physical data acquisition and the computational overhead of data preparation.
  napkin_math: Total Latency = t_acquire + t_preprocess + t_inference + t_transmit. If t_acquire is 2ms,
    INT8 inference on the 240 MHz core is 12ms, and BLE transmission is 5ms, out of a 25ms budget, the
    maximum allowable t_preprocess is 25 - (2 + 12 + 5) = 6ms.
