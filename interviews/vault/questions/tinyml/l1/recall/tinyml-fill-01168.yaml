id: tinyml-fill-01168
title: OTA Firmware Update Design for Resource-Constrained STM32F4 ML Device
topic: ota-firmware-updates
status: published
provenance: imported
scenario: You are a lead embedded ML engineer responsible for designing and implementing an OTA (Over-the-Air)
  firmware update system for a critical edge AI device. The device is powered by an ARM Cortex-M4 STM32F4
  microcontroller (168 MHz, 256 KB SRAM, no FPU) and performs real-time inference on sensor data. The
  system must support robust A/B partition schemes, minimize downtime during updates, provide reliable
  rollback mechanisms, and operate within the strict flash programming constraints and limited SRAM of
  the STM32F4. Outline your comprehensive design, highlighting the specific challenges posed by the hardware
  and your strategies to overcome them, including considerations for secure updates and power loss during
  the process.
details:
  realistic_solution: Implement a dual-bank A/B firmware update strategy using the STM32F4's internal
    flash, carefully partitioning memory for active firmware, inactive firmware, and bootloader/NV storage.
    Utilize a secure bootloader that validates firmware integrity (e.g., using ECC or cryptographic signatures)
    before booting. The update process would involve downloading the new firmware to the inactive bank,
    verifying its integrity, and then atomically switching the boot target. Rollback is achieved by simply
    reverting to the previous valid firmware bank. To handle flash programming constraints and power loss,
    employ write-ahead logging or journaling techniques, and a watchdog timer to detect and recover from
    stalled updates. Given the 256 KB SRAM, the update agent must be extremely lean, possibly streaming
    portions of the new firmware from external storage (if available) or downloading directly to the inactive
    flash bank in chunks.
  common_mistake: A common mistake is underestimating the flash memory requirements for an A/B scheme,
    especially with limited internal flash, leading to insufficient space for two complete firmware images
    plus metadata. Another mistake is neglecting power-loss protection during the flash write operation,
    which can brick the device if an update is interrupted. Overlooking cryptographic verification of
    firmware images also compromises security and robustness.
  napkin_math: If the firmware image is 128 KB (a reasonable size for TinyML on STM32F4), an A/B scheme
    requires 2 * 128 KB = 256 KB of flash for the applications alone. Add ~32 KB for the bootloader and
    persistent data, totaling 288 KB. If the STM32F4 has 512 KB or 1 MB flash, this is feasible. Flash
    write endurance is typically 10,000 cycles; track updates to ensure longevity. Average flash write
    speed for STM32F4 can be ~1-2 MB/s; for a 128 KB firmware, this translates to ~0.06-0.12 seconds write
    time, but verification and other overhead increases the total update window.
