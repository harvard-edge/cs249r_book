schema_version: 1
id: tinyml-exp2-mast-0035
title: Ternary Weight Transformer on Cortex-M4
topic: extreme-quantization
status: published
provenance: imported
scenario: You are tasked with deploying a continuous Keyword Spotting (KWS) transformer model on an ARM
  Cortex-M4 (STM32F4). The baseline 8-bit quantized model requires 800 KB of Flash and 350 KB of SRAM,
  exceeding the MCU's 1 MB Flash and 256 KB SRAM limits once the RTOS and audio buffers are accounted
  for. You must design a novel mixed-precision architecture using 2-bit ternary weights (-1, 0, 1) and
  8-bit activations, implementing a custom CMSIS-NN SIMD kernel to process a 64x64 KWS attention layer
  matrix multiplication.
details:
  realistic_solution: Store ternary weights packed as 2-bits in the 1 MB Flash. During inference, read
    weights into registers directly, applying a bitmask to unpack them on the fly. Since weights are only
    -1, 0, or 1, you can completely bypass the standard multiplier. Pack two 8-bit activations into a
    32-bit register and use the Cortex-M4 SIMD add/sub instructions based on the ternary value, or use
    __SMLAD (2x 16-bit MACs/cycle) with padded activations. This achieves extreme compression while maintaining
    SIMD throughput.
  common_mistake: Candidates often unpack ternary weights into 8-bit integers in SRAM before multiplication,
    which blows up the 256 KB SRAM budget. They also frequently rely on generic MAC loops instead of leveraging
    the specific Cortex-M4 DSP instructions for 2x INT8 SIMD operations, or forget the device has no FPU.
  napkin_math: A 64x64 by 64x64 KWS matrix multiplication (e.g., QxK) requires 64 * 64 * 64 = 262,144
    MACs. The ARM Cortex-M4 (STM32F4) operates at 168 MHz. Using CMSIS-NN SIMD optimizations, we achieve
    2x INT8 MACs per cycle. The theoretical compute cycles are 262,144 / 2 = 131,072 cycles. At 168 MHz,
    this takes 131,072 / 168,000,000 = 0.78 ms. Factoring in a 2.5x overhead for bit-unpacking the 2-bit
    ternary weights and memory loads (since there is no FPU and memory latency exists), it takes roughly
    2.0 ms per matrix. The weight footprint drops from 4096 bytes (8-bit) to just 1024 bytes (2-bit packed),
    easily fitting the 1 MB Flash and leaving plenty of the 256 KB SRAM for activations.
