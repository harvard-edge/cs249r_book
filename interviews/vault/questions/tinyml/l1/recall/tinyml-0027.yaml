id: tinyml-0027
title: The Deep Sleep Power Chasm
topic: duty-cycling
status: published
provenance: imported
scenario: To maximize battery life for a device that is idle most of the time, you use duty cycling. What
  is the approximate ratio of power consumption for a typical microcontroller in an active state versus
  a deep sleep state?
details:
  realistic_solution: The ratio is approximately 10,000:1. A typical Cortex-M4 microcontroller consumes
    around 10 mW while active, but its power consumption can drop to as low as 1 µW in deep sleep. This
    enormous difference is the fundamental physical invariant that makes duty cycling the most critical
    power-saving technique in the TinyML playbook.
  common_mistake: Engineers from a cloud or mobile background often underestimate this ratio, thinking
    it's around 10-100×. They don't realize that a microcontroller's deep sleep state is not just 'idle'
    but a state where nearly all clocks and peripherals are powered off, leading to a much more dramatic
    power drop.
  napkin_math: 'Active Power (Cortex-M4): ~10 mW'
