id: tinyml-fill-01538
title: 'Edge AI Keyword Spotting: Active Learning for Constrained Dataset Curation'
topic: dataset-curation
status: published
provenance: imported
scenario: You are developing a keyword spotting (KWS) application for a low-power, always-on edge device
  powered by a Cortex-M7 microcontroller (480 MHz) and an Ethos-U55 MicroNPU (offering 128-512 MAC/cycle)
  with a total of 512 KB SRAM. Your initial KWS model performs well for common keywords but struggles
  with a newly identified, rare keyword. To improve its performance, you need to expand your training
  dataset. Describe a concrete active learning strategy for selecting the most informative new audio samples
  for annotation, considering the severe memory constraints of the target device, the need for high inter-annotator
  agreement for rare events, and how dataset bias might manifest in such a specialized domain. Focus on
  the practical implementation steps of this data selection and annotation workflow.
details:
  realistic_solution: 'Implement an active learning loop that prioritizes samples where the current KWS
    model exhibits high uncertainty (e.g., using entropy or least confidence sampling) specifically for
    the rare keyword. For annotation, set up a multi-pass workflow: initial annotation by a general team,
    followed by a review by an expert annotator focusing on the rare keyword to ensure high inter-annotator
    agreement. To mitigate device constraints, samples should be pre-processed (e.g., compressed audio,
    specific feature extraction like MFCCs) to reduce memory footprint *before* being used in the active
    learning selection process. Actively monitor the distribution of the collected rare keyword samples
    for potential biases (e.g., specific accents, recording environments) that could negatively impact
    generalization on the target device.'
  common_mistake: Overlooking the critical memory and computational constraints of the edge device during
    the data selection and augmentation phases, leading to a dataset that trains a model too large or
    computationally intensive for the target hardware. Another common mistake is failing to establish
    a robust annotation agreement protocol for rare classes, resulting in noisy labels that degrade model
    performance for the specific keyword.
  napkin_math: Given the 512 KB SRAM constraint on the Cortex-M7 + Ethos-U55, if 400 KB is reserved for
    the OS, model, and immediate buffers, leaving approximately 112 KB for incoming data. How many 1-second
    audio snippets (16 kHz, 16-bit mono) can be buffered for on-device inference or pre-processing before
    offloading or discarding? Each 1-second snippet requires 16,000 samples * 2 bytes/sample = 32,000
    bytes (~31 KB). Thus, roughly 112 KB / 31 KB/snippet ≈ 3-4 snippets can be held in SRAM at any given
    time. This extreme limitation underscores the need for highly selective data curation and efficient
    on-device processing.
