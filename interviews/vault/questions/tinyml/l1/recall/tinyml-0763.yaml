id: tinyml-0763
title: The Lookup Table vs Compute Tradeoff
topic: graph-compilation
status: published
provenance: imported
scenario: A sigmoid activation function on a Cortex-M4 takes ~120 CPU cycles to compute using a math library.
  Alternatively, you can use a 256-entry lookup table (LUT) stored in Flash (256 bytes for INT8 inputs).
  Each LUT access takes ~3 cycles. If a model layer has 1,000 activations per inference, how many cycles
  does each approach use, and what is the speedup?
details:
  realistic_solution: 'Compute approach: 1,000 × 120 = 120,000 cycles. LUT approach: 1,000 × 3 = 3,000
    cycles. Speedup: 120,000 / 3,000 = 40×. The LUT costs only 256 bytes of Flash — negligible. For INT8
    inputs, this is the standard optimization in TFLite Micro and CMSIS-NN.'
  common_mistake: Thinking lookup tables are always better. They trade Flash memory for speed. For very
    large tables (e.g., 16-bit input = 65,536 entries), the Flash cost becomes prohibitive on an MCU with
    only 1 MB.
  napkin_math: 'Compute: 1,000 × 120 = 120,000 cycles. LUT: 1,000 × 3 = 3,000 cycles. Speedup = 40×. LUT
    cost = 256 B of Flash (0.025% of 1 MB). At 100 MHz: compute = 1.2 ms, LUT = 0.03 ms.'
