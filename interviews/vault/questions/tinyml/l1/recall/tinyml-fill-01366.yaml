id: tinyml-fill-01366
title: ASIL-C ML Safety on Cortex-M7 + Ethos-U55 for Automotive
topic: safety-certification
status: published
provenance: imported
scenario: You are designing an embedded ML system for an ASIL-C certified automotive application, specifically
  a critical sensor fusion module. This module runs on a Cortex-M7 (480 MHz) processor paired with an
  Ethos-U55 NPU (configured for 256 MAC/cycle), leveraging 512 KB SRAM. The primary task is real-time
  object detection and classification, providing inputs to the vehicle's braking system. Given the strict
  requirements of ISO 26262 ASIL-C, how would you architect the system to ensure functional safety, particularly
  concerning the ML inference pipeline? Describe the specific measures you would implement, focusing on
  watchdog timers, self-test routines, and achieving deterministic execution on this hardware. Detail
  how you would handle potential silent data corruption or transient faults affecting the NPU's operations.
details:
  realistic_solution: "A robust solution requires a multi-faceted approach:\n1.  **System Architecture**:\
    \ Implement a software redundancy strategy, e.g., dual execution on the Cortex-M7 with comparison\
    \ of critical intermediate results or NPU outputs. For the NPU, employ input/output plausibility checks\
    \ and potentially diverse ML model implementations.\n2.  **Watchdog Timers**: Utilize both CPU-internal\
    \ (e.g., MPU/MPU-based access violations, timing violations) and external hardware watchdogs. The\
    \ external watchdog should monitor overall system liveness, including periodic 'pings' from the ML\
    \ inference task after successful completion within a defined ASIL-C Fault Tolerant Time Interval\
    \ (FTTI). Implement NPU-specific timeout monitoring to detect hung states.\n3.  **Self-Test Routines**:\
    \ \n    *   **Boot-up Diagnostics**: Perform comprehensive memory integrity checks (e.g., CRC, ECC\
    \ for SRAM) and NPU built-in self-test (BIST) routines to verify MAC units and internal data paths.\
    \ Load a golden reference model input and verify output on NPU at startup.\n    *   **Runtime Diagnostics**:\
    \ Implement periodic NPU health checks by running small, pre-validated diagnostic inference tasks\
    \ (known input -> known output) and comparing results against expected values. Implement data integrity\
    \ checks (e.g., checksums) for tensors transferred between Cortex-M7 and Ethos-U55. The Cortex-M7\
    \ can perform range and plausibility checks on the Ethos-U55's inference results.\n4.  **Deterministic\
    \ Execution**: \n    *   **Software**: Use fixed-point arithmetic for the ML model. Avoid dynamic\
    \ memory allocation. Configure the RTOS for strict priority-based scheduling to guarantee inference\
    \ deadlines. Ensure NPU driver operations are non-blocking and have bounded execution times.\n   \
    \ *   **Hardware**: Configure Ethos-U55 to disable features that could introduce non-determinism (e.g.,\
    \ specific cache behaviors if applicable). Use memory protection units (MPUs) on Cortex-M7 to prevent\
    \ critical code/data corruption. Utilize error-correcting codes (ECC) on SRAM to mitigate transient\
    \ faults.\n5.  **Fault Mitigation**: Define specific reactions for detected faults, e.g., NPU reset,\
    \ switching to a safe fallback ML model running solely on Cortex-M7 (if performance allows), or transitioning\
    \ the vehicle to a minimal risk condition (MRC) as per ISO 26262."
  common_mistake: Candidates often overlook the non-deterministic aspects of ML inference, such as dynamic
    memory allocation or floating-point precision variability, when discussing safety. They might also
    propose generic safety mechanisms without tailoring them to the specific hardware (Cortex-M7, Ethos-U55)
    or the real-time constraints of ASIL-C.
  napkin_math: '1.  **SRAM Allocation**: 512 KB SRAM. If a complex model requires 300 KB for weights and
    intermediate activations, only 212 KB remains for OS, application logic, safety mechanisms (e.g.,
    redundant data structures, diagnostic code), and stack/heap, demanding careful memory budgeting.

    2.  **NPU Throughput**: An Ethos-U55 at 256 MAC/cycle and 480 MHz provides 122.88 GMAC/s. If a critical
    object detection model requires 80 GMACs per inference, the NPU compute time is approximately 0.65
    ms. If the ASIL-C FTTI is 50 ms, this leaves ample time for data transfer, CPU pre/post-processing,
    and safety checks, but synchronization and context switching overheads must be accounted for.

    3.  **Watchdog Period**: For an ASIL-C system with a typical FTTI in the range of 10-100 ms, a watchdog
    refresh period of, say, 20 ms would provide sufficient granularity for fault detection without excessive
    overhead. This means the ML inference pipeline (including pre/post-processing and safety checks) must
    reliably complete within this interval.'
