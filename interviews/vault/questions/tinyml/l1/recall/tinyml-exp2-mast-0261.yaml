schema_version: 1
id: tinyml-exp2-mast-0261
title: Asymmetric OTA Architecture for Dual-Core ML
topic: ota-firmware-updates
status: published
provenance: imported
scenario: You are designing an OTA update architecture for a predictive maintenance sensor using the Nordic
  nRF5340 (128 MHz app core + 64 MHz net core, 256 KB SRAM, 1 MB flash, BLE 5.3). Your base firmware (OS,
  BLE stack, app logic) requires 450 KB of flash, and the ML model weights require 300 KB. The device
  draws ~5mA active current during BLE RX. Design a fail-safe OTA update scheme that can update both the
  model and the firmware, detailing the flash partition map, the role of each core during the update,
  and how you prevent bricking.
details:
  realistic_solution: The optimal architecture decouples the ML model from the application firmware using
    an asymmetric partitioning scheme. Allocate separate flash regions for the primary firmware and the
    primary model, leaving a smaller, shared OTA download slot. By compressing the ML model payload or
    using delta updates (bsdiff), the update fits into the smaller OTA slot. The 64 MHz net core receives
    the BLE 5.3 stream and pushes it into a dedicated ring buffer in the 256 KB SRAM, allowing the 128
    MHz app core to read from SRAM and write to the flash OTA slot without dropping connection events.
    A custom bootloader handles the decompression and cryptographic verification before swapping.
  common_mistake: Candidates instinctively suggest a classic A/B dual-bank update scheme, halving the
    1 MB flash into two 500 KB partitions. They fail to realize that the 450 KB firmware plus the 300
    KB model totals 750 KB, which makes symmetric A/B updates impossible within the 1 MB limit. They also
    often block the 128 MHz app core during flash writes, missing the opportunity to leverage the 64 MHz
    net core to handle BLE traffic asynchronously.
  napkin_math: 'Total Flash: 1024 KB. Allocation: Bootloader (24 KB) + Primary Firmware (450 KB) + Primary
    Model (300 KB) = 774 KB used. Remaining flash for OTA slot: 1024 - 774 = 250 KB. To update the 300
    KB model, it must be compressed to <= 250 KB (a 16.6% reduction). At typical BLE 5.3 throughput (~50
    KB/s), downloading the 250 KB compressed payload takes 5 seconds. With the ~5mA active current draw,
    the energy consumed per OTA is 5mA * (5s / 3600s) = ~0.007 mAh. Buffering the download requires allocating
    a 16 KB ring buffer within the 256 KB SRAM to bridge the 64 MHz net core RX and the 128 MHz app core
    flash write operations.'
