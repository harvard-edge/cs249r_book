schema_version: 1
id: tinyml-0644
title: The SIMD Lane Starvation
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You are optimizing an audio neural network for an ARM Cortex-M55 (which has Helium vector extensions).
  You replace a standard `for` loop with explicit CMSIS-NN SIMD instructions, expecting a 4x speedup since
  it can process four 8-bit integers per clock cycle. The profiler shows you only got a 1.2x speedup.
  What pipeline bottleneck did you fail to feed?
details:
  realistic_solution: You starved the SIMD lanes with scalar memory loads. While the CPU can indeed *multiply
    and accumulate* four 8-bit integers in a single clock cycle, it must first get those integers from
    SRAM into the CPU registers. If your C-code explicitly loads the vector registers byte-by-byte (`LDRB`
    instructions), you are spending 4 clock cycles just loading the data before you can perform the 1-cycle
    SIMD math. The pipeline is entirely bound by the load/store unit.
  common_mistake: '"Assuming that using a SIMD vector instruction automatically guarantees the math will
    execute 4x faster, ignoring how the data gets into the vector registers."'
  napkin_math: 'To process 4 items: | Scalar approach: 4 loads (4 cycles) + 4 multiplies (4 cycles) =
    8 cycles. | Naive SIMD approach: 4 scalar loads (4 cycles) + 1 SIMD multiply (1 cycle) = 5 cycles.
    (Speedup: `8/5 = 1.6x`). | Proper SIMD approach: 1 Word-aligned 32-bit load (1 cycle) + 1 SIMD multiply
    (1 cycle) = 2 cycles. (Speedup: `8/2 = 4x`). By not casting your 8-bit pointers to 32-bit pointers
    for the memory fetch, you left most of the performance on the table.'
