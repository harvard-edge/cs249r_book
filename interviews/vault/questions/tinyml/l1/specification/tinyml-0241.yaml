id: tinyml-0241
title: Microcontroller Performance Reality
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You are profiling a simple keyword-spotting model on a Cortex-M4 microcontroller. Based on its
  fundamental hardware architecture, would you expect the model's performance to be limited by its compute
  capability (compute-bound) or by its memory bandwidth (memory-bound)?
details:
  realistic_solution: Performance on a general-purpose microcontroller like a Cortex-M4 is typically **compute-bound**.
    The core's floating-point unit (FPU) is not highly specialized for ML workloads and is relatively
    weak compared to its fast on-chip SRAM bandwidth. This results in a very low 'ridge point' on the
    roofline model, meaning even moderately complex operations can saturate the processor.
  common_mistake: Engineers often conflate 'small device' with 'memory-bound'. While total memory is scarce,
    the *bandwidth* from fast on-chip SRAM is relatively high compared to the MCU's weak general-purpose
    compute capabilities. They mistakenly apply intuitions from GPUs—which have massive compute power
    making them often memory-bound—to MCUs, which have the opposite architectural balance.
  napkin_math: A typical Cortex-M4 has peak compute of ~336 MFLOPS and its on-chip SRAM bandwidth is ~1.2
    GB/s. The roofline ridge point is the ratio of these two values.
