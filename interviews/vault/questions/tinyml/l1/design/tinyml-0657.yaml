schema_version: 1
id: tinyml-0657
title: The DMA Energy Break-Even Point
topic: dma-data-movement
status: published
provenance: imported
scenario: You are architecting the data input path for a visual wake-word system on a Cortex-M4 (168 MHz)
  with 256KB SRAM. The camera produces a 96x96 grayscale image (9,216 bytes) that must be moved from a
  peripheral buffer into the model's input tensor in SRAM for inference. You can use a CPU-driven `memcpy`
  or configure the DMA controller to perform the transfer. Your primary constraint is minimizing total
  energy consumption per inference to maximize battery life. Propose a method to determine the break-even
  point in terms of transfer size where DMA becomes more energy-efficient than a CPU copy. Your analysis
  must account for CPU active power, CPU sleep power, and the power consumption of the DMA controller
  itself.
details:
  realistic_solution: 'The candidate must formulate the problem in terms of energy, not just latency.
    The break-even point occurs when the energy consumed by the CPU to perform the copy equals the energy
    consumed by the DMA controller plus the energy consumed by the sleeping CPU during the transfer. They
    must construct the energy equation for both scenarios and solve for the transfer size (`S`). The architecture
    should be interrupt-driven: for DMA, the CPU configures the transfer, enters a deep sleep state, and
    is woken by a ''DMA complete'' interrupt. The candidate should conclude that for all but the most
    trivial transfer sizes (a few bytes), the DMA approach is vastly more energy-efficient because deep
    sleep power is orders of magnitude lower than active CPU power. A principal-level answer would also
    discuss second-order effects like the energy cost of waking from sleep and the bus contention if other
    peripherals are active.'
  common_mistake: Most engineers will correctly identify that DMA is faster. However, they often fail
    to translate latency into energy, ignoring the power state implications. They might compare `memcpy`
    latency to DMA latency directly, without considering that the CPU can sleep during a DMA transfer,
    which is the dominant factor in energy savings.
  napkin_math: 'Cortex-M4 at 168 MHz, 256KB SRAM. Image = 96×96×1 = 9,216 B. CPU memcpy: ~1 cycle/byte
    → 9,216/168M = 55 µs active at ~30 mW = 1.65 µJ. DMA: setup ~5 µs active + 55 µs sleep at ~0.5 mW
    = 0.15 µJ + 0.03 µJ = 0.18 µJ. Break-even: E_cpu = E_dma → P_active×(S/BW) = P_dma×(S/BW) + P_sleep×(S/BW).
    Solve: S_min = setup_energy/(P_active − P_dma − P_sleep)/BW ≈ 50–100 bytes. Above ~100 B, DMA wins
    by 5–10× on energy.'
