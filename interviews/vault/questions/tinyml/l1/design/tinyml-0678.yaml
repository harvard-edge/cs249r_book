id: tinyml-0678
title: The Private Factory Floor
topic: federated-learning
status: published
provenance: imported
scenario: You are the founding ML Systems Engineer for 'FactorySense', a startup building predictive maintenance
  sensors for industrial machinery. Your current V1 product uses a simple, hand-tuned FFT-based anomaly
  detector on a Cortex-M4 MCU. It has secured a pilot with 10,000 devices, but customers are complaining
  that the high false positive rate is leading to costly, unnecessary inspections.
details:
  realistic_solution: Synthesize technical design with business economics. The V1 FFT detector's high
    false positives cost ~$500/inspection * 10 false alarms/device/year * 10,000 devices = $50M/year in
    unnecessary maintenance. A federated learning approach reduces false positives by personalizing models
    to each motor's vibration signature. On-device training (last-layer fine-tuning) costs ~2.975mJ per
    update on Cortex-M4 at 168MHz. A standard 225mAh 3V coin cell holds ~2430J. Thus, each FL round consumes
    ~0.012% of the total battery capacity. Size the FL update frequency to 1 round per week to keep annual
    battery drain well under 1% while cutting false positives by 60-80%.
  common_mistake: Engineers fixate on the novelty of the ML algorithm (e.g., arguing over model architectures
    or federated optimizers) while completely ignoring the dominant, second-order system costs and risks.
    They often hand-wave away the massive operational expense of false positives or the crippling cost
    of a premature, fleet-wide battery replacement cycle. They fail to connect the technical choice (on-device
    training) directly to its business consequence (power drain and TCO).
  napkin_math: 'FP cost: $500*10 FP/device/yr*10K=$50M/yr. FL on Cortex-M4@50mW: last-layer 1M MACs, 10
    epochs=10M MACs. At 168MHz (1 MAC/cycle): 10M/168M=59.5ms. Energy=0.05W*59.5ms=2.975mJ/round. Weekly
    for 52wks: 154.7mJ/yr. Coin cell 225mAh*3V=2430J. FL=0.006% battery. Even daily: 0.04%. Totally viable
    while cutting FP 60-80%.'
