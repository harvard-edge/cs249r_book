id: tinyml-0653
title: The Dual-Core Synchronization Deadlock
topic: 3d-parallelism
status: draft
provenance: imported
scenario: 'You are using an RP2040 (Dual-core Cortex-M0+). Core 0 handles camera I/O and Core 1 runs the
  ML model. To share the tensor arena safely, you implement a simple boolean spinlock: `while(lock ==
  true); lock = true;`. Core 0 locks it, writes the image, and unlocks it. Core 1 locks it, runs ML, and
  unlocks it. After an hour, both cores freeze simultaneously in the `while` loop. How did a lock designed
  to prevent collisions cause a permanent deadlock?'
details:
  realistic_solution: 'The boolean spinlock is not atomic on RP2040. The read-modify-write sequence (read
    lock, check if false, write true) takes multiple cycles. If both cores execute the read simultaneously
    and both see ''false'', both set ''true'' and proceed — corrupting shared data. Eventually, a timing
    coincidence causes both cores to enter the while() loop waiting for the other to release. At 133MHz
    with a 15ns race window, this happens roughly once per hour at 30 fps. Fix: use RP2040''s hardware
    spinlocks (SIO block) — atomic test-and-set in a single cycle, guaranteed by silicon, not software.'
  common_mistake: '"One core forgot to release the lock." Assuming the code has no bugs, the lock was
    released, but the hardware didn''t register it correctly.'
  napkin_math: At 133 MHz, the window for a race condition is about 15 nanoseconds. If you pass frames
    30 times a second, a 15ns collision window might take an hour to hit, creating a nightmare "heisenbug"
    that only crashes in production.
