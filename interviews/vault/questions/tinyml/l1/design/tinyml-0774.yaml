schema_version: 1
id: tinyml-0774
title: The Mesh Network Hop Latency
topic: collective-communication
status: draft
provenance: imported
scenario: A BLE mesh network of 50 TinyML nodes monitors a warehouse. Each node can relay messages to
  neighbors within 10m range. The warehouse is 100m × 50m. A critical anomaly detection alert must reach
  the gateway at one corner within 500ms. BLE mesh forwarding adds 15ms per hop (relay processing + retransmission).
  Calculate the maximum number of hops, determine if the latency budget is feasible, and design the mesh
  topology.
details:
  realistic_solution: 'Maximum hops needed: diagonal of warehouse = √(100² + 50²) = √12,500 ≈ 112m. At
    10m range per hop: ceil(112/10) = 12 hops worst case. Hop latency: 12 × 15ms = 180ms base. With BLE
    mesh flooding collisions (random backoff 0-10ms per hop): worst case 12 × 25ms = 300ms. Total with
    processing: 300 + 50ms (source inference) = 350ms < 500ms budget ✓. Topology: place relay nodes in
    a grid (10m spacing). Ensure 2+ paths between any pair for redundancy. Designate 4 ''friend'' nodes
    near the gateway to reduce congestion at the funnel point.'
  common_mistake: Assuming BLE mesh delivers messages in one hop. In a mesh network, messages are flooded
    through relay nodes, and each hop adds latency. Also, BLE mesh uses managed flooding — every relay
    retransmits, which can cause collisions and add random backoff delays.
  napkin_math: 'Warehouse diagonal: √(100²+50²) = 111.8m. Hops: ceil(111.8/10) = 12. Base latency: 12
    × 15ms = 180ms. With contention: 12 × 25ms = 300ms. Total: 300 + 50ms inference = 350ms < 500ms ✓.
    Margin: 150ms (30%). Grid nodes needed: (100/10+1) × (50/10+1) = 11×6 = 66 positions, but 50 nodes
    → every other position → ~8m effective spacing.'
