id: tinyml-0773
title: The LoRa Telemetry Capacity
topic: collective-communication
status: draft
provenance: imported
scenario: You are designing a LoRaWAN-based wildlife monitoring network with 500 sensor nodes. Each node
  transmits a 20-byte inference result every 10 minutes. The LoRaWAN gateway supports SF7 at 50 kbps effective
  (after encoding overhead). Regulatory duty cycle is 1% (transmit max 36 seconds per hour). Calculate
  whether one gateway can handle the load, and design a time-slotted schedule.
details:
  realistic_solution: 'Per-node uplink: 20 bytes = 160 bits. At SF7 (50 kbps effective), airtime ≈ 160
    / 50,000 = 3.2ms plus protocol overhead (~50ms preamble + header at SF7) ≈ 53ms per packet. 500 nodes
    × 6 packets/hour = 3,000 packets/hour. Total airtime: 3,000 × 53ms = 159 seconds/hour. Duty cycle:
    159 / 3600 = 4.42% — exceeds the 1% per-channel limit. Solution: spread across 5 frequency channels
    (standard in EU868) → 4.4%/5 = 0.88% per channel. This fits, but with minimal margin. Alternatively,
    increase the reporting interval to 15 minutes (2,000 packets/hour → 2.9% → 0.58% per channel).'
  common_mistake: Ignoring the regulatory duty cycle limit. Even if raw bandwidth is sufficient, the 1%
    transmit duty cycle means the gateway's receive window is limited, and each node's transmit time counts
    against its own duty cycle budget.
  napkin_math: 'Payload: 20 B = 160 bits. SF7 airtime (with overhead): ~53ms/packet. Packets/hour: 500
    × 6 = 3,000. Total airtime: 3,000 × 53ms = 159s/hr. Single channel duty: 159 / 3600 = 4.42% > 1%.
    Need 5 channels: 4.4/5 = 0.88% ✓. Safety margin: (1.0-0.88)/1.0 = 12%.'
