id: tinyml-0685
title: 'The Dusk Disaster: Quantization-Aware Architecture'
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: You are the Principal Engineer for the perception system of a new Automatic Emergency Braking
  (AEB) feature. To meet strict cost constraints, the system must run on a Cortex-M7 based microcontroller
  with 1MB of Flash and 512KB of SRAM. Your team has developed a highly accurate FP32 pedestrian detection
  model. When they quantize it to INT8 using post-training quantization (PTQ) with a calibration set of
  1,000 diverse daytime images, it passes all lab benchmarks.
details:
  realistic_solution: 'The correct approach is a phased, risk-mitigated plan that tackles the problem''s
    root cause: activation overflow due to a mismatch between calibration and real-world data distribution.'
  common_mistake: The most common mistake is to abandon the constraints, demanding a more powerful MCU
    or more memory, which isn't an option in this scenario. Another frequent error is to simply suggest
    'retrain with more low-light data.' While helpful, retraining alone doesn't address the fundamental
    dynamic range mismatch that causes the INT8 overflow during inference; the quantization process itself
    is the root cause. A junior response focuses on data, a senior response focuses on the arithmetic.
  napkin_math: 'M7: 1MB Flash, 512KB SRAM. FP32 model 100K params=400KB. INT8=100KB. Mixed: first 2 layers
    (20K) FP16=40KB + rest INT8=80KB=120KB total. First layer activation 40x40x8: FP16=25.6KB vs INT8=12.8KB.
    Extra 12.8KB is 2.5% of 512KB SRAM. Recalibrating INT8 alone spreads 256 levels over 10x range → 10x
    precision loss.'
