schema_version: 1
id: tinyml-0078
title: TinyML Federated Learning System
topic: 3d-parallelism
status: draft
provenance: imported
scenario: You have a fleet of 10,000 smart electricity meters, each with a Cortex-M4F (256 KB SRAM, 1
  MB flash, 168 MHz) and a LoRaWAN radio (250 bps effective throughput after duty cycle limits). Each
  meter runs a load forecasting model (2-layer LSTM, 15 KB weights) that predicts next-hour consumption.
  After 1 year, the model has drifted because consumer behavior changed (more EVs, more solar panels).
  Design a federated learning system that retrains the model across the fleet using LoRaWAN's extreme
  bandwidth constraints.
details:
  realistic_solution: 'At 250 bps effective throughput, uploading 15 KB of full gradients takes 13.3 hours
    per device with LoRaWAN duty cycle limits. Design extreme compression: each device trains locally
    for 1 second on M4F, computes INT8 sparse gradient deltas, keeps only the top 0.3% (45 bytes — fits
    in a single LoRaWAN packet). Airtime: 1.44s at SF7. Duty cycle overhead: 144s between transmissions.
    50 rounds to convergence: 174 mJ per device per round, 8.7J total = 0.024% of a 3000 mAh battery.
    The gateway aggregates sparse deltas from 10,000 devices per round and updates the global model. Convergence:
    ~50 rounds over 2 weeks.'
  common_mistake: '"Run standard FedAvg — upload gradients via LoRaWAN." At 250 bps, uploading 15 KB of
    gradients takes 15,000 × 8 / 250 = 480 seconds = 8 minutes per device. With LoRaWAN duty cycle limits
    (1% in EU868): actual airtime = 8 min / 0.01 = 800 minutes = **13.3 hours** per device per round.
    For 10,000 devices: the gateway can handle ~100 devices per hour. One round takes 100 hours = 4.2
    days. 20 rounds to convergence: **84 days**. Unacceptable.'
  napkin_math: 'Per-device upload: 45 bytes (0.3% sparse INT8 delta). LoRaWAN airtime: 1.44s (within single-packet
    limit of 51 bytes for SF7). Duty cycle: 1.44s / 0.01 = 144s between transmissions. Training compute:
    1 second on M4F. Training energy: 1s × 30 mW = 30 mJ. LoRa TX energy: 1.44s × 100 mW = 144 mJ. Total
    per round: 174 mJ. Battery impact (if battery-powered, 3,000 mAh × 3.3V = 9.9 Wh = 35,640 J): 50 rounds
    × 174 mJ = 8.7 J = 0.024% of battery. Negligible. The extreme compression makes federated learning
    viable even on LoRaWAN.'
