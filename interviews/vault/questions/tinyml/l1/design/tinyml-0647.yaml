title: The MCU NAS Search Space
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You're designing a Neural Architecture Search (NAS) pipeline to find the optimal model for a
  Cortex-M4 with 256 KB SRAM and 1 MB flash. What constraints must your search space encode that a standard
  NAS for desktop/cloud would ignore?
details:
  realistic_solution: 'MCU-aware NAS must encode five constraints standard NAS ignores: (1) peak SRAM
    for activations — not just total parameters, but the maximum tensor pair alive simultaneously, (2)
    flash budget for weights + firmware, (3) per-layer latency using hardware-specific lookup tables (not
    FLOPs, since CMSIS-NN speedup varies by op), (4) operator support — only search over TFLite Micro
    + CMSIS-NN supported ops, (5) working set size vs cache/TCM capacity. The search space: ~72 candidate
    ops per block across 5 blocks, requiring one-shot NAS (~24 GPU-hours) with constraint evaluation per
    candidate taking ~1ms.'
  common_mistake: '"Just add a FLOP constraint to the search." FLOPs alone don''t capture the MCU''s constraints
    — memory is the binding constraint, not compute.'
  napkin_math: 'Search space: 5 blocks × 4 kernel sizes × 6 channel widths × 3 expansion ratios = 72 candidate
    ops per block. Total architectures: 72⁵ ≈ 1.9 × 10⁹ — must use efficient search (e.g., one-shot NAS).
    Constraint evaluation per candidate: SRAM check (~1ms simulation), flash check (parameter count),
    latency check (lookup table, ~0.1ms). Full search: ~10,000 candidates evaluated × 1.1ms = 11 seconds.
    Training the supernet: ~24 GPU-hours. Total: 1-2 days vs months for brute-force search.'
