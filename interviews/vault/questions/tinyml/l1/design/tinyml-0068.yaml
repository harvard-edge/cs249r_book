schema_version: 1
id: tinyml-0068
title: The OTA Update Brickening
topic: ota-firmware-updates
status: published
provenance: imported
scenario: You are the architect for a fleet of 100,000 IoT environmental sensors. After pushing a new
  ML model via your Over-the-Air (OTA) update system, 10% of the devices are 'bricked' and unresponsive.
  The MCU is a Cortex-M4 with 1MB Flash and 256KB SRAM. Your OTA design uses a dual-partition scheme ('App
  A' / 'App B'). The bootloader successfully swaps to the new application, but it hangs soon after. Your
  investigation reveals the new model requires a 140KB tensor arena, an increase from 120KB in the previous
  version. The `tflite::MicroInterpreter::AllocateTensors()` call is failing. Formulate a hypothesis for
  why a seemingly small 20KB increase in memory requirement is causing catastrophic failure. Propose a
  set of architectural changes to both your OTA process and your application's memory management to ensure
  future updates are 100% reliable. How would you have caught this issue before it was ever deployed?
details:
  realistic_solution: The root cause is the failure to acquire a single, contiguous 140KB memory block
    from the system's general-purpose heap. While the total *free* memory might be sufficient (e.g., 150KB),
    the heap becomes fragmented over the device's uptime and especially during the OTA process, which
    allocates and frees buffers for radio packets. This leaves many small 'holes' in the heap, with no
    single block large enough for the new tensor arena. The `AllocateTensors` call fails, and since the
    return value was not checked, the program proceeds to use a null pointer, causing a hard fault.
  common_mistake: The most common incorrect analysis is to simply sum the memory requirements (`140KB_arena
    + RTOS_heap < 256KB_total`) and conclude it should fit. This ignores the critical concept of memory
    fragmentation. A junior engineer might suggest simply increasing the heap size, which doesn't solve
    the underlying problem of obtaining a large *contiguous* block of memory after the heap has been used
    by other parts of the system, especially the OTA download manager itself.
  napkin_math: This is a problem of accounting and layout, not complex formulas.
