schema_version: 1
id: tinyml-0683
title: The TinyML Conversational AI Memory Wall
topic: mcu-compute-constraints
status: published
provenance: imported
scenario: 'You are the firmware architect for a new high-end, offline-first smart appliance. The flagship
  feature is a ''Verbal User Manual'': users can ask the device questions (''How do I clean the filter?'')
  and a tiny generative model provides a spoken answer. The model must handle conversational context,
  allowing follow-up questions (''Okay, but where is the filter located?''). The entire system runs on
  a single Cortex-M7 microcontroller with 480 KB of SRAM and 2 MB of Flash; there is no cloud connection.'
details:
  realistic_solution: The correct architectural approach treats the limited SRAM as a 'L1 cache' and the
    larger on-chip Flash as 'L2' or 'swap space' for the conversational context. The key is to implement
    a paged KV-cache system orchestrated by DMA.
  common_mistake: The most common mistake is to declare the problem impossible or to compromise the feature.
    A junior engineer might suggest limiting the conversation history to 3 turns, defeating the purpose.
    A senior engineer might suggest complex compression schemes for the KV-cache, but this adds significant
    CPU overhead and often isn't enough. The key failure is not thinking of the entire memory hierarchy
    as a tiered cache and not leveraging hardware features like DMA.
  napkin_math: '480KB SRAM, 2MB Flash. Tiny generative model: ~500K params INT4 = 250KB in Flash. KV cache
    per token: 2×4layers×4heads×32dim×1byte=1024B/token. 480KB SRAM budget: ~200KB for arena, ~200KB for
    KV pages. Max tokens in SRAM: 200KB/1KB=200 tokens. Overflow → page oldest KV entries to Flash via
    DMA. Flash read: ~50ns/byte, 1KB page = 50µs. Latency acceptable for conversational use (<100ms response).'
