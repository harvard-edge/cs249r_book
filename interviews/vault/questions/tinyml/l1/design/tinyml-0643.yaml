title: The Keyword Spotting Pipeline
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Design the complete inference pipeline for an always-on keyword spotting system on a Cortex-M4
  (100 MHz, 256 KB SRAM, no FPU). The microphone samples at 16 kHz. You need to detect the wake word 'Hey
  Device' within 500 ms of it being spoken. Walk me through every stage — from raw audio samples to classification
  output — and show me the memory budget.
details:
  realistic_solution: 'The pipeline must be streaming and integer-only: Raw audio at 16 kHz × 16-bit ×
    1 second = 32 KB. But streaming with 30 ms frames only needs 960 bytes live — a 34× memory reduction.
    The 512-point fixed-point FFT on Cortex-M4 takes ~0.18 ms via CMSIS-DSP.'
  common_mistake: '"Collect 1 second of audio, compute an FFT, run the model." This approach buffers too
    much audio (32 KB just for raw samples), uses floating-point FFT (no FPU), and doesn''t account for
    the streaming nature of the problem.'
  napkin_math: 'Raw audio at 16 kHz × 16-bit × 1 second = 32 KB. But streaming with 30 ms frames only
    needs 960 bytes live — a 34× memory reduction. The 512-point fixed-point FFT on a Cortex-M4 at 168
    MHz takes ~0.18 ms via CMSIS-DSP. 40 Mel filters on 256 frequency bins = 10,240 multiply-accumulates
    = 0.06 ms. Total feature extraction per frame: ~0.3 ms. The CPU is idle ~99% of the time between frames.'
