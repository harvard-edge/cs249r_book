schema_version: 1
id: tinyml-0671
title: The Redundant Vision Failure
topic: safety-certification
status: published
provenance: imported
scenario: You are designing the safety-critical perception system for an autonomous vehicle. The system
  uses two redundant Cortex-M7 microcontrollers, each processing a video feed with a pedestrian detection
  model. A hard requirement is that if one model's weights are silently corrupted (e.g., by a single-event
  upset from a cosmic ray), the system must (1) detect the resulting garbage output, (2) isolate the faulty
  MCU, and (3) continue operating in a degraded (single-camera) state, all within a single 100ms frame
  budget. A full system reboot, which takes >500ms, is forbidden. Propose a fault tolerance and recovery
  architecture using only on-chip resources. Your design must specify the interaction between the two
  MCUs, the role of a watchdog timer, and how checkpointing is used for a 'hot reload' recovery.
details:
  realistic_solution: 'The architecture is a ''paired watchdog with hot reload''.

    1. **Cross-Coupled Watchdog & Sanity Check:** This is not a standard watchdog. Each MCU runs a watchdog
    timer that is *reset by the other MCU*, not by itself. The reset ''heartbeat'' is only sent over a
    high-speed SPI bus after an MCU has successfully processed a frame AND its output is deemed ''sane''.
    Sanity is checked in two ways: (a) a periodic background task computes a CRC-32 checksum of its own
    model weights in SRAM against a golden copy in Flash, and (b) the primary check: the two MCUs exchange
    their final output vectors (or a hash of them). If the outputs diverge by more than a threshold, the
    heartbeats stop. If either MCU''s watchdog timer expires, it triggers an interrupt, indicating its
    partner is faulty.

    2. **Immediate Isolation:** Upon receiving the watchdog interrupt, the healthy MCU immediately stops
    fusing data from the faulty partner and operates on its own camera feed. This meets the isolation
    requirement instantly.

    3. **Fast Checkpoint Reload:** The healthy MCU then asserts a reset pin on the faulty MCU. This doesn''t
    trigger a full reboot. It triggers a special Non-Maskable Interrupt (NMI). The NMI handler''s only
    job is to initiate a DMA transfer, copying the ''golden'' model weights from a write-protected Flash
    sector back into the working SRAM. This ''hot reload'' is extremely fast as it''s a direct memory
    operation. The MCU is then ready for the next frame cycle.'
  common_mistake: Proposing a simple watchdog that just detects a frozen MCU; this won't catch silent
    data corruption. Suggesting a reboot on failure, which violates the latency budget. Relying on complex
    consensus algorithms that are too slow for a hard real-time system. These answers miss the need for
    a *live, state-aware* fault detection mechanism and a *fast, partial* recovery.
  napkin_math: '100ms frame budget. Inference: ~40ms. CRC-32 of 256KB weights: ~0.5ms on M7@480MHz. SPI
    output exchange(64B): 0.05ms. Compare: <0.01ms. Overhead: ~0.6ms=0.6% of budget. Watchdog: 50ms. DMA
    reload 256KB from Flash: 256KB/1GB/s=0.25ms. Total recovery<1ms, within one frame.'
