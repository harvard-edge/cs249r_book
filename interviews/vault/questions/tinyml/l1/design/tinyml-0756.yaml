schema_version: 1
id: tinyml-0756
title: Continuous Learning on MCU
topic: 3d-parallelism
status: draft
provenance: imported
scenario: Your Cortex-M7 (STM32H7, 480 MHz, 2 MB flash, 1 MB SRAM with TCM) runs a 50 KB anomaly detection
  model. After deployment, the distribution shifts — new motor types produce vibration patterns the model
  hasn't seen. Your ML team says 'just retrain in the cloud and push an update.' But the devices are in
  remote oil rigs with satellite connectivity (2400 bps, $8/MB). Can you do incremental learning on the
  MCU itself?
details:
  realistic_solution: 'On-device incremental learning is feasible with last-layer-only fine-tuning. Freeze
    all layers except the final classification head. Memory: forward pass activations for the last layer
    (~4KB) + gradient buffer (~4KB) + optimizer state (~4KB) + training data buffer (100 samples * 800
    bytes = 80KB) = ~92KB. Fits in 1MB SRAM with room to spare. Training time: 10 epochs * 100 samples
    * 5000 MACs/sample / (480MHz * 2 MACs/cycle) = 0.52ms per epoch = 5.2ms total compute time. Energy:
    7s realistic (with memory loads and I/O overhead) * 150mW = 1.05J. Satellite alternative: 50KB / 2400bps
    = 167s at $0.39/update. For 500 devices: $195/cycle vs $0 on-device.'
  common_mistake: '"Backpropagation requires too much memory for an MCU — it''s impossible." Standard
    backprop does require 2-3× the memory of forward inference (storing activations for the backward pass).
    But the Cortex-M7 with 1 MB SRAM is the most capable MCU available, and the model is only 50 KB. There''s
    room to work.'
  napkin_math: 'Training memory: 84 KB (last-layer only). Training time: 7 seconds for 10 epochs on 100
    samples. Energy: 7 s × 150 mW (M7 active) = 1.05 J. On a wired power supply (oil rig): energy is free.
    Alternative (cloud retrain + satellite upload): 50 KB model / 2400 bps = 167 seconds of satellite
    time. At $8/MB: 50 KB = $0.39 per update. For 500 devices: $195 per retraining cycle. On-device learning:
    $0. Break-even: 1 retraining cycle. Accuracy recovery: last-layer fine-tuning on 100 domain-specific
    samples typically recovers 80-90% of the accuracy lost to distribution shift.'
