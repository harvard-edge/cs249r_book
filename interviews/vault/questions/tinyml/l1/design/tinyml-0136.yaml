id: tinyml-0136
title: MCU-Based Edge AI Gateway
topic: ota-firmware-updates
status: published
provenance: imported
scenario: 'You''re designing an edge AI gateway for a smart building that aggregates data from 50 BLE
  sensors (temperature, occupancy, air quality) and runs local ML models for HVAC optimization. The gateway
  must be ultra-low-cost ($15 BOM) and run on a single MCU. You choose an ESP32-S3 (dual-core Xtensa LX7
  at 240 MHz, 512 KB SRAM, 8 MB PSRAM, WiFi + BLE). The gateway must: (1) maintain BLE connections to
  50 sensors, (2) run 3 ML models (occupancy prediction, temperature forecasting, anomaly detection),
  and (3) serve a local dashboard via HTTP. Can the ESP32-S3 handle this, and what are the bottlenecks?'
details:
  realistic_solution: 'Yes, the ESP32-S3 handles this comfortably. Partition: Core 0 runs the BLE stack
    scanning 50 sensors at 1 adv/s (0.5% utilization). Core 1 runs ML models every 5 minutes (0.0002%
    utilization) and serves HTTP. Total system utilization is under 6%. The critical bottleneck is PSRAM
    latency: at ~10 MB/s effective (SPI bus), any data structure placed in PSRAM incurs 24x latency vs
    internal SRAM. Keep BLE connection tables and model weights in internal 512KB SRAM; use PSRAM only
    for HTTP buffers and logging. Power: ~0.7W average, costing $0.73/year.'
  common_mistake: '"The ESP32-S3 has dual cores and 8 MB PSRAM — it can handle anything." The PSRAM is
    accessed via SPI at ~40 MHz (effective ~10 MB/s after protocol overhead), which is 24× slower than
    internal SRAM. Any data structure in PSRAM incurs massive latency penalties. And the BLE stack on
    ESP32 is notoriously memory-hungry.'
  napkin_math: 'BLE: 50 sensors × 1 adv/s = 50 packets/s. Processing: 50 × 0.1ms = 5ms/s on Core 0 (0.5%
    utilization). ML: 0.6ms every 300s = 0.0002% Core 1 utilization. HTTP: ~5% Core 1 utilization (with
    2 users). Total system utilization: <6%. The ESP32-S3 is massively overpowered for this workload.
    Power: WiFi active = 240 mA. BLE scan = 130 mA. Average (WiFi duty-cycled to 10%): 0.1 × 240 + 0.9
    × 130 = 141 mA. At 5V USB power: 0.7W. Annual electricity: 0.7W × 8,760h = 6.1 kWh × $0.12 = $0.73/year.
    BOM: ESP32-S3 module ($4) + antenna ($0.50) + power supply ($2) + PCB ($3) + enclosure ($3) + passives
    ($2.50) = $15. Meets the target.'
