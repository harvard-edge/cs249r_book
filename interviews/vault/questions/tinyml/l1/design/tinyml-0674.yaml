id: tinyml-0674
title: The Silent Failure of the In-Car AI
topic: safety-certification
status: published
provenance: imported
scenario: You are the Staff ML Systems Engineer for a major automaker. Your team has deployed a keyword-spotting
  (KWS) model on a Cortex-M4 MCU in millions of vehicles to control infotainment functions. The system
  works perfectly in North America. However, six months after launch, you receive reports from the service
  division in Australia that a significant number of customers are reporting the feature 'just doesn't
  work.' The infotainment head-unit receives a full OTA software update only once a year due to bandwidth
  costs and testing requirements, so a fast fix is not possible via the main vehicle computer. Your task
  is to design a fault tolerance and recovery architecture for the KWS MCU itself. The system must be
  able to detect this performance degradation on-device and initiate a self-healing process. Your constraints
  are the Cortex-M4's 1MB of Flash and 256KB of SRAM. Propose a complete system architecture. What are
  your first three architectural decisions, and how do you justify them with quantitative analysis?
details:
  realistic_solution: The correct approach is to design a self-contained, multi-layered defense on the
    MCU that treats silent data drift as a fault condition.
  common_mistake: 'The most common mistake is a cloud-centric mindset: ''Just collect more data from Australia
    and retrain, then push an update.'' This is not feasible given the once-a-year OTA cycle and the lack
    of high-bandwidth connectivity on the MCU. Another common error is proposing to log raw audio or extensive
    feature vectors to the cloud for analysis, which is impossible due to the severe memory, power, and
    network constraints of the microcontroller.'
  napkin_math: '1MB Flash used: boot 32KB + RTOS 64KB + KWS 200KB + OTA 200KB = 496KB. Free: 504KB. Drift
    detector: 12B SRAM, 2KB Flash. Circuit breaker: 32B Flash. Fallback model: ~50KB Flash. Total recovery:
    ~55KB Flash, <1KB SRAM. Fits easily. Detection: flag after 100 anomalous frames (~6s of audio).'
