title: The Sentient Fleet's Dilemma
topic: federated-learning
status: published
provenance: imported
scenario: You are the Principal Engineer for the in-cabin AI team at a major automaker. Your fleet of
  1 million vehicles is equipped with a Cortex-M7 based driver monitoring system (DMS) running on a real-time
  OS. The current on-device model, which detects driver drowsiness, suffers from a high false-positive
  rate in certain lighting conditions, causing user annoyance.
details:
  realistic_solution: A principal-level response would first quantify the TCO of both options to frame
    the decision, demonstrating that the centralized approach is likely economically infeasible due to
    data transmission costs alone. The core of the proposal would then be a hybrid architecture.
  common_mistake: Naively choosing Federated Learning because 'it's better for privacy' without quantifying
    the economic and security trade-offs. Another common mistake is to ignore the second-order costs of
    either approach, such as cloud compute/storage for the centralized path or the increased engineering
    complexity and on-device power drain for the federated path. A junior answer picks one; a senior answer
    compares them; a principal answer derives a hybrid solution based on a cost/benefit framework.
  napkin_math: '1M vehicles. Centralized: 1MB/day*365*1M=365TB/yr. At $0.09/GB: $32,850. Federated: 10KB/day*365*1M=3.65TB/yr.
    Cost: $328. 100x cheaper. On-device M7@480MHz: 100K MACs fine-tune=0.21ms, energy=0.1W*0.21ms=21uJ
    — negligible vs 50ms inference. Hybrid: FL for personalization + quarterly OTA.'
