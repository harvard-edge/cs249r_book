id: tinyml-0686
title: The Mud-Splattered Lens
topic: safety-certification
status: published
provenance: imported
scenario: You are the principal engineer designing the perception module for a new, safety-critical (ASIL
  C) automotive emergency braking system. The core model—a small CNN for vehicle detection—runs on a Cortex-M7
  microcontroller with 2 MB of Flash and 512 KB of SRAM. The system has a hard real-time deadline of 1
  ms per inference to meet the 1000 Hz control loop frequency. A critical, real-world failure mode is
  'sensor occlusion,' where a splash of mud instantly covers the camera lens, inducing severe, non-stationary
  data drift. The system must never fail silently and must recover gracefully. Your primary constraints
  are the hardware limits and the 1ms budget. Design a multi-layered fault tolerance architecture from
  scratch. How do you propose to detect this occlusion on-device, and what is the recovery strategy? Justify
  why simply relying on the hardware watchdog timer is insufficient.
details:
  realistic_solution: A robust L6+ architecture uses a multi-layered defense-in-depth approach, prioritizing
    speed and low-overhead. The key is to handle the fault in software gracefully before the system freezes
    and requires a hard reset from the watchdog.
  common_mistake: Engineers often suggest solutions that are computationally infeasible on a microcontroller,
    like running a second, complex 'occlusion detection' model. Another common mistake is to treat the
    watchdog timer as a primary error-handling mechanism, leading to dangerous system reboots during operation.
  napkin_math: '1ms budget at 1kHz. CNN: ~0.7ms on M7@480MHz. Monitor overhead budget: 0.3ms. Input stats(64×64=4096
    pixels): sum 4096 values at 480MHz≈8.5µs. Threshold compare<1µs. Total: ~10µs=1% of budget. Occlusion→variance
    drops to ~0. Watchdog only detects freeze, not semantic fault. Software monitor catches mud-on-lens
    in 0.01ms.'
