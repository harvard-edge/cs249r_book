id: tinyml-0124
title: The Solar Harvesting Budget
topic: duty-cycling
status: published
provenance: imported
scenario: 'You''re designing a solar-powered wildlife monitor that runs image classification on a Cortex-M7.
  The device has a small solar panel (50mm × 50mm), a 0.47F supercapacitor, and no battery. Design the
  power budget: when can you run inference, and how do you handle cloudy days?'
details:
  realistic_solution: 'Build the energy budget from physics. Sunny: ~100 mW harvest from 25 cm² panel,
    sustains ~4 inferences/s at 25 mJ each — supercap stays full. Cloudy: ~10 mW harvest, net drain if
    running at full rate. Supercap (0.71 mWh) drains in ~170 s at 15 mW net deficit. Solution: monitor
    supercap voltage and adaptively reduce inference rate. At 10 mW harvest, sustainable rate is ~0.4
    inf/s. Implement a voltage-triggered duty cycle: full rate above 3.0V, reduced rate below 2.8V, sleep
    below 2.5V. This ensures the device never fully depletes and can resume when sun returns.'
  common_mistake: '"Solar panel generates power during the day, so run inference during the day." This
    ignores the mismatch between solar harvest rate and inference energy cost.'
  napkin_math: 'Solar panel: 50mm × 50mm = 25 cm². Sunny harvest (~20 mW/cm² × 20% efficiency): ~100 mW.
    Cloudy: ~10 mW (10× less). Supercap energy: 0.5 × 0.47F × 3.3² = 2.56 J = 0.71 mWh. Inference energy:
    assume 25 mJ per inference on Cortex-M7 + quiescent 10 µW. Sunny: harvest 100 mW, consumption per
    inference = 25 mJ. Max rate = 100 mW / 25 mW = 4 inferences/s with energy to spare. Supercap stays
    full. Cloudy: harvest 10 mW. Max sustainable rate = 10 mW / 25 mJ = 0.4 inferences/s. If we try 1
    inf/s (25 mW consumption), net drain = 25 − 10 = 15 mW. Supercap drain time = 2.56 J / 0.015 W = 170
    s ≈ 2.8 min. Strategy: on cloudy days, reduce to 1 inference every 2.5 s (= 10 mW average) to balance
    harvest rate. Sunny: ~4 inf/s. Cloudy: ~0.4 inf/s. Adaptive duty cycling based on supercap voltage
    is essential.'
