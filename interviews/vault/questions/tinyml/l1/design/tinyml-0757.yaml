id: tinyml-0757
title: TinyML Model Compression AutoML Pipeline
topic: 3d-parallelism
status: draft
provenance: imported
scenario: 'You need to deploy an image classification model on 5 different MCU targets: (A) Cortex-M4
  (256 KB SRAM, 1 MB flash), (B) Cortex-M7 (512 KB SRAM, 2 MB flash), (C) Cortex-M33 (128 KB SRAM, 512
  KB flash), (D) ESP32-S3 (512 KB SRAM, 8 MB flash), (E) Cortex-M55 (512 KB SRAM, 2 MB flash, Helium MVE).
  Each target has different memory constraints, instruction sets, and optimal model architectures. Design
  an AutoML pipeline that automatically produces the best model for each target from a single training
  dataset.'
details:
  realistic_solution: Design a hardware-aware NAS + compression pipeline that co-optimizes architecture
    and compression for each target.
  common_mistake: '"Train one model, then compress it differently for each target." A single model architecture
    cannot be optimal for all targets — the M4''s 256 KB SRAM demands a fundamentally different architecture
    than the M55''s 512 KB SRAM with Helium. Compression (pruning, quantization) of a too-large model
    always loses more accuracy than training a right-sized model from scratch.'
  napkin_math: 'Supernet training: 100 GPU-hours × $3/hr = $300 (one-time). Per-target search: 2.8 hours
    + 1 hour fine-tune = 3.8 GPU-hours × $3 = $11.40 per target. 5 targets: $57. Total pipeline cost:
    $357. Manual model design per target: ~2 engineer-weeks × $5K/week = $10K per target × 5 = $50K. AutoML
    ROI: 140×. Time: AutoML = 1 day (automated). Manual = 10 weeks. Accuracy comparison: AutoML typically
    finds models within 1% of hand-designed architectures, and occasionally exceeds them (the search explores
    combinations humans wouldn''t try). The pipeline pays for itself on the first run.'
