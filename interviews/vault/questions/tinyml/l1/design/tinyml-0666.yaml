title: The Unbrickable Automotive OTA System
topic: safety-certification
status: published
provenance: imported
scenario: 'You are the architect for the firmware of a safety-critical in-cabin microcontroller (MCU)
  that uses a model to adjust vehicle settings. A botched Over-the-Air (OTA) update has bricked 0.1% of
  your 100,000-vehicle fleet, requiring an expensive physical recall. The failure mode is a boot loop:
  the new firmware crashes immediately, the watchdog timer reboots the device, and it crashes again. Your
  constraints are a Cortex-M4 MCU with 1MB of Flash and 256KB of SRAM. Design a new, unbrickable OTA and
  boot process from first principles. Propose the key architectural components and explain how they interact
  to guarantee recovery from a bad update.'
details:
  realistic_solution: The core principle is to never overwrite the code that is currently running and
    to always have a known-good, fallback state that is bootable. This is achieved with an immutable bootloader
    and A/B partitioning of the flash memory, orchestrated by a 'commit-confirm' handshake.
  common_mistake: Superficial answers like 'Just add a try/catch block around the main function' or 'We
    need to test the update more before pushing.' These are trivial and miss the systems-level hardware
    reality of embedded systems. A real-world boot loop happens before any application-level code runs.
    An L6+ answer must address the interaction between the bootloader, application partitions, memory
    layout, and hardware watchdogs. It requires a deep understanding of bare-metal fault tolerance.
  napkin_math: Let's verify the flash budget based on the TinyML hardware constants.
