title: The FOTA Update Risk
scenario: You have 10,000 sensor nodes deployed in a warehouse, each running a vibration anomaly detection model on a Cortex-M4. You need to update the model. The nodes communicate via LoRaWAN (250 bytes/second effective throughput).
question: "How should 10,000 Cortex-M4 nodes receive a 200 KB model over 250 B/s LoRaWAN without bricking on failure?"
details:
  realistic_solution: 'Use delta updates over LoRaWAN multicast. Full 200 KB model at 250 B/s per device would take 92.6 days for 10,000 devices. Instead: compute a binary diff (bsdiff) against the current model — typical delta is ~20 KB (10% of full). Broadcast via LoRaWAN Class C multicast so all devices receive simultaneously: 20 KB / 250 B/s = 80 seconds. Each device: verify CRC (1ms), run test inference on known input (50ms), compare output to expected result. If pass: atomic pointer swap to new model. If fail: keep old model, report failure. A/B partition in flash ensures rollback if the new model crashes post-swap.'
  common_mistake: |
    **The Pitfall:** Sending the full new firmware sequentially over LoRaWAN and flashing it directly.
    **The Rationale:** Engineers accustomed to high-bandwidth networks assume point-to-point file transfers are viable and ignore the shared medium constraints.
    **The Consequence:** At 250 bytes/second, a 200 KB model takes 13 minutes per device. With 10,000 devices sharing the channel, the update would take years, causing crippling network congestion and likely bricking devices due to failed updates.
  napkin_math: |
    - Full model size: 200 KB.
    - Binary delta size: ~20 KB (10% of full model).
    - LoRaWAN multicast transfer time: 20 KB / 250 B/s = 80 seconds.
    - Verification time: CRC (1 ms) + test inference (50 ms) = 51 ms.
    - Swap time: Atomic pointer write (1 ms).
    - Total per device: 80 s transfer + 0.051 s verify + 0.001 s swap.
    - Fleet of 10,000 via multicast: **80 seconds** (plus staged validation over 24 hours for safety).
    - Without delta/multicast: 200 KB × 10,000 / 250 B/s = 8,000,000 seconds = **92.6 days**.
