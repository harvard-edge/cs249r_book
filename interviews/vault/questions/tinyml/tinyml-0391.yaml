title: The Power Cost of Privacy
scenario: You're designing a battery-powered audio sensor that listens for a specific keyword. You have
  two architectural choices. Option 1 is to run inference locally on a Cortex-M4 microcontroller, which
  takes 1 second of active time. Option 2 is to stream the 1-second audio clip over a low-power cellular
  (LTE-M) connection to the cloud; the radio consumes about 1 Watt during transmission. Using the 'Numbers
  Every ML Systems Engineer Should Know' playbook, explain the energy consumption trade-off by calculating
  how many times more energy the cloud approach consumes compared to the on-device approach for a single
  inference.
details:
  realistic_solution: 'The cloud approach is vastly more power-hungry. An active Cortex-M4 microcontroller
    consumes between 10-50 mW. Using the typical active value of 50 mW, a 1-second inference consumes
    50 millijoules (mJ) of energy. In contrast, the LTE-M radio consumes 1 Watt (1000 mW) for that same
    1-second transmission, which is 1000 mJ of energy. By comparing the two, the cloud approach consumes
    1000 mJ / 50 mJ = 20 times more energy. This illustrates the fundamental reason why on-device ML is
    critical for battery-powered products: communication is often far more expensive than computation.'
  common_mistake: Engineers new to TinyML often underestimate the massive power cost of radio transmission
    relative to on-chip computation. They may incorrectly assume that offloading compute to the cloud
    is 'free' from the device's energy budget perspective, or they may confuse units (mW vs. W), leading
    to a miscalculation of the energy ratio by orders of magnitude.
  napkin_math: '1. **On-Device Energy:** | Power (Cortex-M4 Active): ~50 mW (from `NUMBERS.md`) | Time:
    1 s | Energy = 50 mW * 1 s = 50 mJ'
  options:
  - It's about the same; compute costs are comparable to communication.
  - 2x more energy
  - 20x more energy
  - 100x more energy
  correct_index: 2
