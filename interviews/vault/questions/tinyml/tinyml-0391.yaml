title: The Power Cost of Privacy
scenario: You're designing a battery-powered audio sensor that listens for a specific keyword. You have two architectural choices. Option 1 is to run inference locally on a Cortex-M4 microcontroller, which takes 1 second of active time. Option 2 is to stream the 1-second audio clip over a low-power cellular (LTE-M) connection to the cloud. the radio consumes about 1 Watt during transmission. The Cortex-M4 consumes 50 mW during active inference.
question: How many times more energy does cloud transmission consume than on-device Cortex-M4 inference for one audio clip?
details:
  realistic_solution: 'The cloud approach is vastly more power-hungry. An active Cortex-M4 microcontroller consumes between 10-50 mW. Using the typical active value of 50 mW, a 1-second inference consumes 50 millijoules (mJ) of energy. In contrast, the LTE-M radio consumes 1 Watt (1000 mW) for that same 1-second transmission, which is 1000 mJ of energy. By comparing the two, the cloud approach consumes 1000 mJ / 50 mJ = 20 times more energy. This illustrates the fundamental reason why on-device ML is critical for battery-powered products: communication is often far more expensive than computation.'
  common_mistake: |
    **The Pitfall:** Underestimating the massive power cost of radio transmission relative to on-chip computation.
    **The Rationale:** Engineers new to TinyML assume offloading compute to the cloud is "free" for the device, or they confuse power units (mW vs. W).
    **The Consequence:** The device's battery is drained orders of magnitude faster than necessary, severely reducing product lifespan.
  napkin_math: |
    **Assumptions & Constraints:**
    - On-Device Energy (Cortex-M4): 50 mW for 1 s inference.
    - Cloud Transmission Energy (LTE-M): 1 W (1000 mW) for 1 s transmission.

    **Calculations:**
    - On-Device Energy: 50 mW * 1 s = 50 mJ.
    - Cloud Transmission Energy: 1000 mW * 1 s = 1000 mJ.
    - Energy Ratio: 1000 mJ / 50 mJ = 20x more energy.

    **Conclusion & Interpretation:**
    - **Result: 20x More Energy (Power-Bound).** Offloading compute to the cloud via radio communication is vastly more expensive energetically than local execution.
  options:
  - 'It''s about the same; compute costs are comparable to communication.'
  - '2x more energy'
  - '20x more energy'
  - '100x more energy'
  correct_index: 2
