title: TFLite Micro Memory Allocation on nRF5340
scenario: You are converting an ONNX anomaly detection model to an INT8 TensorFlow Lite for Microcontrollers flatbuffer to run on the Nordic nRF5340's 128 MHz app core. The nRF5340 has 1 MB of flash and 256 KB of SRAM, but the BLE 5.3 network stack and RTOS reserve 400 KB of flash and 140 KB of SRAM. The converted INT8 model has exactly 250,000 parameters, and the maximum memory required for the largest layer's input and output activation tensors is 50,000 elements.
question: How would you calculate the remaining available Flash and SRAM on the device after deploying and running the converted model?
details:
  realistic_solution: In TFLite Micro, the flatbuffer model is designed to be mapped and evaluated directly from read-only memory (Flash), so weights do not consume SRAM. The SRAM is only allocated for the 'tensor_arena' to hold intermediate activations. The INT8 parameters will consume 250 KB of Flash, and the activation tensors will consume 50 KB of SRAM.
  common_mistake: |
    **The Pitfall:** Assuming model weights must be copied into SRAM during runtime initialization.
    **The Rationale:** Coming from traditional software or desktop ML environments, candidates expect the full model payload to be loaded into main memory.
    **The Consequence:** Falsely concluding the model requires 250 KB + 50 KB = 300 KB of SRAM, and wrongly predicting an Out-Of-Memory (OOM) crash.
  napkin_math: |
    1. **Total Memory:** Flash: 1,024 KB; SRAM: 256 KB.
    2. **Available Flash:** 1,024 KB - 400 KB (BLE/RTOS) = 624 KB.
    3. **Available SRAM:** 256 KB - 140 KB (BLE/RTOS) = 116 KB.
    4. **Model Flash Usage (Weights):** 250,000 INT8 parameters = 250 KB in read-only memory.
    5. **Model SRAM Usage (Tensor Arena):** 50,000 bytes max activation = 50 KB in volatile memory.
    6. **Result:** Remaining Flash is 624 - 250 = **374 KB**. Remaining SRAM is 116 - 50 = **66 KB**.
