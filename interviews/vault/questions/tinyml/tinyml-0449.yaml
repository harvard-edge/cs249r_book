title: The TinyML Accelerator Starvation
scenario: You are designing a smart camera system on a microcontroller (MCU). It uses a small, external AI accelerator chip to run a real-time object detection model. The camera sensor produces 320x240 8-bit grayscale images, and the product requires a frame rate of 20 FPS. Your MCU must read the image from the sensor and send it to the accelerator for processing. You are considering connecting the MCU and the accelerator using the SPI bus.
question: What is the primary bottleneck when sending 320x240 grayscale frames over SPI to the external accelerator at 20 FPS?
details:
  realistic_solution: The primary bottleneck is the SPI bus interconnect. Its maximum bandwidth is insufficient to transfer the image data from the MCU to the accelerator at the required rate of 20 frames per second. The accelerator will be starved for data, making it impossible to meet the performance target. The design requires a faster interconnect, such as a parallel bus, to supply the necessary data bandwidth.
  common_mistake: |
    **The Pitfall:** Underestimating how slow TinyML peripheral buses are.
    **The Rationale:** Engineers accustomed to cloud/mobile environments focus only on the compute (MFLOPS) of the accelerator, assuming interconnects are implicitly fast enough.
    **The Consequence:** The accelerator starves for data, preventing the system from meeting its 20 FPS real-time target despite having adequate compute power.
  napkin_math: |
    1. **Frame Size:** 320 * 240 pixels * 1 byte/pixel (8-bit grayscale) = 76,800 bytes (~75 KB).
    2. **Required Throughput:** 76,800 bytes * 20 FPS = 1,536,000 bytes/sec (~1.54 MB/s).
    3. **Required Bandwidth:** 1.54 MB/s * 8 bits/byte = 12.288 Mbps.
    4. **SPI Constraint:** Typical SPI max bandwidth is ~10 Mbps.
    5. **Result:** 12.288 Mbps > 10 Mbps. The **SPI bus is the primary bottleneck**.
  options:
  - The SPI bus is the bottleneck; its 1.25 MB/s max bandwidth is insufficient for the 1.54 MB/s required at 20 FPS.
  - The SPI bus is sufficient; its 10 Mbps bandwidth is much greater than the 1.54 MB/s requirement.
  - The MCU's compute is the bottleneck; a Cortex-M4 at 336 MFLOPS cannot process a 20 FPS video stream.
  - The accelerator's memory is the bottleneck; the 76.8 KB image frame won't fit into typical on-chip SRAM.
