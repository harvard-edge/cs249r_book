title: The Battery-Powered A/B Test
scenario: You are designing a battery-powered smart doorbell using a keyword-spotting model. The marketing team requires monthly A/B testing model updates for a fleet of 1 million devices. You must minimize Total Cost of Ownership (TCO), dominated by user-visible battery life.
question: 'Which saves more battery for 1M smart doorbells: a 500 KB OTA model download over WiFi, or a 20 KB federated update followed by 15 s of on-device training at 100% CPU?'
details:
  realistic_solution: Calculates the total energy (in Joules) for each option by multiplying component power by active duration. Radio transmissions are extremely expensive, making the compute-heavy FL approach vastly more efficient.
  common_mistake: |
    **The Pitfall:** Assuming 15 seconds of 100% CPU is more expensive than a 4-second WiFi download.
    **The Rationale:** Engineers accustomed to cloud/edge systems focus on raw duration or data volume, underestimating the massive power cost of radio transmission in battery-powered devices.
    **The Consequence:** Selecting the less efficient OTA update, leading to shorter battery life and higher TCO.
  napkin_math: |
    **Assumptions & Constraints:**
    - WiFi transfer rate: ~1 Mbps (125 KB/s).
    - WiFi radio power: ~250 mW.
    - MCU active power: ~50 mW.

    **Calculations:**
    - OTA Download: 500 KB = 4 Mb = 4 s. Energy = 250 mW * 4 s = 1.0 J.
    - FL Download: 20 KB = 0.16 Mb = 0.16 s. Energy = 250 mW * 0.16 s = 0.04 J.
    - FL Training: 15 s * 50 mW = 0.75 J.
    - Total FL Energy: 0.04 J + 0.75 J = 0.79 J.

    **Conclusion & Interpretation:**
    - **Result: FL is 21% more efficient (0.79J vs 1.0J) (Radio-Bound)**. The system is radio-bound for energy, making compute-heavy FL favorable.
  options:
  - OTA Update; the 15 seconds of 100% CPU utilization for on-device training is the biggest power drain.
  - Federated Fine-Tuning; it is more energy-efficient because the energy saved by the shorter radio time for the small upload far outweighs the energy spent on local computation.
  - They are roughly equivalent; the total active time for both tasks is similar (~16 seconds), so the battery impact will be negligible.
  - OTA Update; transferring 500 KB of verified firmware from the cloud is inherently more secure and reliable than running on-device training, justifying the energy cost.
  correct_index: 1
