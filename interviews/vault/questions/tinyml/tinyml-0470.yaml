title: The Battery-Powered A/B Test
scenario: You are a TinyML engineer for a company building a battery-powered smart doorbell that uses a small keyword-spotting model. The marketing team wants to A/B test a new wake-word, requiring monthly model updates to a fleet of 1 million devices. You must choose the update strategy with the lowest Total Cost of Ownership (TCO), where TCO is dominated by user-visible battery life. Option A (OTA Update): Download a 500KB new model over WiFi. Option B (Federated Fine-Tuning): Download a 20KB gradient update over WiFi, then run 15 seconds of on-device training at 100% CPU.
question: Which saves more battery for 1M smart doorbells: a 500 KB OTA model download or 20 KB federated update plus 15 s training?
details:
  realistic_solution: The correct approach is to calculate the total energy (in Joules) for each option by multiplying the power of each component by the time it is active.
  common_mistake: |
    **The Pitfall:** Assuming 15 seconds of 100% CPU is more expensive than a 4-second WiFi download.
    **The Rationale:** Engineers accustomed to cloud/edge systems focus on raw duration or data volume, underestimating the massive power cost of radio transmission in battery-powered devices.
    **The Consequence:** Selecting the less efficient OTA update, leading to shorter battery life and higher TCO.
  napkin_math: |
    1. **OTA Download:** WiFi at ~1Mbps, 500KB = 4Mb. Download time = 4s.
    2. **OTA Energy:** 250mW * 4s = **1.0J**.
    3. **FL Download:** 20KB = 0.16Mb. Download time = 0.16s.
    4. **FL WiFi Energy:** 250mW * 0.16s = 0.04J.
    5. **FL Training Energy:** MCU at 50mW for 15s = 0.75J.
    6. **FL Total Energy:** 0.04J + 0.75J = **0.79J**.
    7. **Conclusion:** FL saves 21% energy per update (0.79J vs 1.0J).
  options:
  - OTA Update; the 15 seconds of 100% CPU utilization for on-device training is the biggest power drain.
  - Federated Fine-Tuning; it is more energy-efficient because the energy saved by the shorter radio time for the small upload far outweighs the energy spent on local computation.
  - They are roughly equivalent; the total active time for both tasks is similar (~16 seconds), so the battery impact will be negligible.
  - OTA Update; transferring 500 KB of verified firmware from the cloud is inherently more secure and reliable than running on-device training, justifying the energy cost.
  correct_index: 1
