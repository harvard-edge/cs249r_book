title: The Quantization Energy Dividend
scenario: 'You''re a TinyML engineer tasked with optimizing a keyword-spotting model for a battery-powered
  wearable device. To maximize its operational life, you are considering quantizing the model''s weights
  and activations. Recall the fundamental energy cost difference: approximately how much more energy does
  a single 32-bit floating-point (FP32) operation consume compared to an 8-bit integer (INT8) operation?'
question: "Recall the fundamental energy cost difference: approximately how much more energy does a single 32-bit floating-point (FP32) operation consume compared to an 8-bit integer (INT8) operation?"
details:
  realistic_solution: A single FP32 operation consumes approximately 18 times more energy than an INT8
    operation. This is a fundamental physical invariant rooted in the energy required to switch transistors
    for arithmetic operations. The bit width is a primary driver of this energy cost, making INT8 quantization
    a critical optimization for power-constrained TinyML devices.
  common_mistake: Engineers often mistakenly believe the energy savings are linearly proportional to the
    reduction in bit-width (e.g., 32 bits / 8 bits = 4×). They forget that the underlying physics of CMOS
    transistor switching energy is non-linear. Another common error is to confuse the FP32-to-INT8 ratio
    with the less dramatic FP32-to-FP16 ratio.
  napkin_math: From the 'Invariants' table, the FP32 vs INT8 energy ratio is ~18×. If your model's inference
    loop is dominated by 10 million MAC operations, switching from an FP32 implementation to INT8 would
    reduce the energy consumed by those operations by a factor of 18. This directly translates to a massive
    increase in battery life for a device that spends most of its time running inference.
  options:
  - Around 4× more energy.
  - Around 18× more energy.
  - Around 3.4× more energy.
  - The energy savings are negligible (~1.2×).
