title: The Quantization Energy Dividend
scenario: You're a TinyML engineer tasked with optimizing a keyword-spotting model for a battery-powered wearable device. To maximize its operational life, you are considering quantizing the model's weights and activations.
question: Approximately how much more energy does a single 32-bit floating-point (FP32) operation consume compared to an 8-bit integer (INT8) operation?
details:
  realistic_solution: A single FP32 operation consumes approximately 18 times more energy than an INT8 operation. This is a fundamental physical invariant rooted in the energy required to switch transistors for arithmetic operations. The bit width is a primary driver of this energy cost, making INT8 quantization a critical optimization for power-constrained TinyML devices.
  common_mistake: |
    **The Pitfall:** Believing the energy savings are linearly proportional to the reduction in bit-width (e.g., 32 / 8 = 4x).
    **The Rationale:** Forgetting that the underlying physics of CMOS transistor switching energy is non-linear, or confusing the FP32-to-INT8 ratio with the FP32-to-FP16 ratio.
    **The Consequence:** Underestimating the massive power savings of INT8 quantization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - FP32 vs INT8 operation switching energy.
    2. **Calculations:**
       - Energy Ratio: FP32 operation requires roughly 18x more switching energy than INT8.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound Improvement**. Switching MACs to INT8 directly reduces active inference energy by a factor of 18.
  options:
  - Around 4x more energy.
  - Around 18x more energy.
  - Around 8x more energy.
  - The energy savings are negligible (~1.2x).
