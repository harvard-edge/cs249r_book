title: Optimizing a TinyML LLM with Sub-4-bit Quantization on ESP32-S3
scenario: You are deploying a fine-tuned language model onto an ESP32-S3 microcontroller. The 8-bit model exceeds available SRAM for activations and misses latency requirements. Weights are in PSRAM, which is a bottleneck. You must achieve sub-4-bit quantization to fit the model within severe constraints.
question: How should you diagnose bottlenecks, propose a sub-4-bit strategy, quantify gains, and recover accuracy for a TinyML LLM on ESP32-S3?
details:
  realistic_solution: Use hardware-aware quantization (e.g., GPTQ, AWQ) to compress weights while avoiding activation overflow. Recover accuracy via quantization-aware training (QAT), knowledge distillation, and empirical calibration. Profile bottlenecks using `idf.py monitor --meminfo` and `esp_timer_get_time()`.
  common_mistake: |
    **The Pitfall:** Focusing solely on weight quantization without considering activation memory.
    **The Rationale:** Candidates frequently apply post-training quantization generically, ignoring the severe SRAM and PSRAM bandwidth constraints of edge devices.
    **The Consequence:** The model fails to execute within the real-time latency budget due to memory thrashing and activation memory overflow.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 1 million parameters.
    - Target hardware: ESP32-S3 (512 KB SRAM, 8 MB PSRAM).

    **Calculations:**
    - FP32: 1M * 4 bytes = 4 MB.
    - INT8: 1M * 1 byte = 1 MB (exceeds SRAM).
    - INT4: 1M * 0.5 bytes = 500 KB.
    - INT2: 1M * 0.25 bytes = 250 KB.

    **Conclusion & Interpretation:**
    - **Result: 250 KB footprint for INT2 (Memory-Capacity-Bound)**. The bottleneck shifts from memory-capacity-bound to compute-bound, allowing critical layers to fit entirely within fast SRAM.
