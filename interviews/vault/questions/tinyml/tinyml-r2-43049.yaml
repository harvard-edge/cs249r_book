title: Tensor Lifetime Analysis for U-Net on MCU
scenario: 'You''re deploying a tiny U-Net (for anomaly detection) on Cortex-M7 (512 KB SRAM). The U-Net
  has skip connections: encoder layer 1 output must stay alive until it''s consumed by decoder layer 4
  (the last decoder layer). This means the encoder 1 tensor (32 KB) has a very long lifetime — it''s alive
  during the entire encoder and decoder. Combined with normal activation memory, the arena peaks at 580
  KB. How do you reduce peak memory below 512 KB without changing the model architecture?'
details:
  realistic_solution: 'The problem is the long-lived skip connection tensors. Three strategies: (1) Tiling:
    process the input in spatial tiles (e.g., 4 tiles of 24×24 instead of 1 tile of 48×48). Each tile''s
    skip connection tensors are 4× smaller. Peak memory drops proportionally, but you need overlap regions
    to avoid boundary artifacts. (2) Spill to flash: write the skip connection tensor to flash (using
    a flash write buffer), read it back when the decoder layer needs it. Flash write: 32 KB at 1 MB/s
    = 32ms. Flash read: 32 KB at 50 MB/s = 0.64ms. Total latency penalty: ~33ms per skip connection ×
    4 connections = 132ms. If inference budget is 500ms, this is 26% overhead — acceptable. (3) Recomputation:
    don''t store the encoder output; when the decoder needs it, re-run the encoder layer. Cost: redundant
    computation of encoder layer 1 (forward pass only). Typically 10-20% compute overhead but saves 32
    KB of arena. Best for compute-cheap encoder layers.'
  common_mistake: Removing skip connections to reduce memory. This fundamentally changes the model architecture
    and degrades accuracy significantly. Skip connections are essential for U-Net's precision in dense
    prediction tasks.
  napkin_math: 'Original peak: 580 KB (exceeds 512 KB by 68 KB). Skip connections total: 32 + 16 + 8 +
    4 = 60 KB alive during decoder. Strategy 1 (tiling, 4 tiles): skip tensors = 60/4 = 15 KB. New peak:
    580 - 60 + 15 = 535 KB. Still over. Need 8 tiles: skip = 7.5 KB. Peak: 527 KB. Still over. Strategy
    2 (spill longest skip): spill 32 KB encoder-1 skip. New peak: 580 - 32 = 548 KB. Spill encoder-2 (16
    KB) too: 532 KB. Plus encoder-3 (8 KB): 524 KB. Close. Strategy 3 (recompute encoder-1): save 32 KB,
    recompute cost = 2ms for tiny encoder layer. Combined (spill encoder-1 + recompute encoder-2): save
    48 KB. Peak: 532 KB. Need more. Combination of all: tiling (2 tiles) + spill encoder-1: peak ≈ 490
    KB. Fits.'
