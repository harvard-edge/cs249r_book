title: The Tensor Arena Squeeze (tinyml-0304)
scenario: >
  You are deploying an INT8 sequential keyword-spotting model using TensorFlow Lite for Microcontrollers.
  The model structure is: Input 32x32x1, Layer 1 (Conv2D) Output 16x16x8, Layer 2 (Conv2D) Output 8x8x16, Layer 3 (Dense) Output 12.
question: What minimum tensor arena size is required for this INT8 sequential keyword-spotting model?
details:
  realistic_solution: |
    Analyze memory at each step and find the max. Input: 32*32*1 INT8 = 1,024 bytes (1 KB). Layer 1 output: 16*16*8 = 2,048 bytes (2 KB). Layer 2 output: 8*8*16 = 1,024 bytes (1 KB). Layer 3 output: 12 bytes. During Layer 1: input (1 KB) + output (2 KB) = 3 KB. During Layer 2: Layer 1 output (2 KB) + Layer 2 output (1 KB) = 3 KB (input freed). During Layer 3: Layer 2 output (1 KB) + output (12 B) = ~1 KB. Peak arena = max(3, 3, 1) = 3 KB. Not 4 KB (sum of all outputs) or 4.1 KB (sum of everything). TFLM reuses freed buffers. On 256 KB SRAM: 3 KB arena + weights in flash = trivial. The model is memory-efficient.
  common_mistake: |
    **The Pitfall:** Summing the sizes of all tensors instead of calculating peak concurrent usage.
    **The Rationale:** A common mistake is to either sum all tensors or only budget for the single largest tensor, ignoring that the runtime must hold a layer's input and output in memory simultaneously.
    **The Consequence:** The arena is under-provisioned, causing a runtime crash, or over-provisioned, wasting SRAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - INT8 precision: 1 byte per value.
    - Sequential execution: TFLM requires holding a layer's input and output tensors simultaneously.

    **Calculations:**
    - Input Size: 32 * 32 * 1 = 1 KB.
    - Layer 1 Output Size: 16 * 16 * 8 = 2 KB.
    - Layer 2 Output Size: 8 * 8 * 16 = 1 KB.
    - Layer 3 Output Size: 12 bytes.
    - Peak at Layer 1: 1 KB (In) + 2 KB (Out) = 3 KB.
    - Peak at Layer 2: 2 KB (In) + 1 KB (Out) = 3 KB.
    - Peak at Layer 3: 1 KB (In) + 12 bytes (Out) ≈ 1 KB.

    **Conclusion & Interpretation:**
    - **Result: 3 KB (Memory-Bound)**. Max(3, 3, 1) = 3 KB.
  options:
  - '2 KB'
  - '3 KB'
  - '~4.1 KB (4108 B)'
  - '6 KB'
  correct_index: 1
status: deleted
