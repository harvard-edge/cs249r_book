title: The Tensor Arena Squeeze (tinyml-0304)
scenario: 'You are deploying a simple keyword-spotting model on a Cortex-M4 microcontroller. The TensorFlow
  Lite for Microcontrollers runtime uses a ''Tensor Arena'' in SRAM to manage memory for input, output,
  and intermediate activation tensors. Your model has the following sequential structure, using INT8 precision:

  - Input: 32×32×1 (grayscale spectrogram)

  - Layer 1 (Conv2D): Output 16×16×8

  - Layer 2 (Conv2D): Output 8×8×16

  - Layer 3 (Dense): Output 12 (number of keywords)

  What is the minimum tensor arena size required to run inference?'
question: "What minimum tensor arena size is required for the INT8 sequential keyword-spotting model?"
details:
  realistic_solution: 'Analyze memory at each step and find the max. Input: 32*32*1 INT8 = 1,024 bytes
    (1 KB). Layer 1 output: 16*16*8 = 2,048 bytes (2 KB). Layer 2 output: 8*8*16 = 1,024 bytes (1 KB).
    Layer 3 output: 12 bytes. During Layer 1: input (1 KB) + output (2 KB) = 3 KB. During Layer 2: Layer
    1 output (2 KB) + Layer 2 output (1 KB) = 3 KB (input freed). During Layer 3: Layer 2 output (1 KB)
    + output (12 B) = ~1 KB. Peak arena = max(3, 3, 1) = 3 KB. Not 4 KB (sum of all outputs) or 4.1 KB
    (sum of everything). TFLM reuses freed buffers. On 256 KB SRAM: 3 KB arena + weights in flash = trivial.
    The model is memory-efficient.'
  common_mistake: A common mistake is to either sum the sizes of all tensors, failing to account for memory
    reuse, or to only budget for the single largest tensor, ignoring that the runtime needs to hold a
    layer's input and output in memory simultaneously during an operation. This leads to under-provisioning
    the arena and causing a runtime crash.
  napkin_math: '1.  **Calculate size of Input Tensor:** `32 * 32 * 1 byte/element = 1,024 bytes (1 KB)`

    2.  **Calculate size of Layer 1 Output:** `16 * 16 * 8 = 2,048 bytes (2 KB)`

    3.  **Calculate size of Layer 2 Output:** `8 * 8 * 16 = 1,024 bytes (1 KB)`

    4.  **Calculate size of Layer 3 Output:** `12 bytes (~0.01 KB)`

    5.  **Peak at Layer 1 execution:** Input + L1 Output = 1 KB + 2 KB = **3 KB**

    6.  **Peak at Layer 2 execution:** L1 Output + L2 Output = 2 KB + 1 KB = **3 KB**

    7.  **Peak at Layer 3 execution:** L2 Output + L3 Output = 1 KB + 0.01 KB ≈ **1 KB**

    8.  **Minimum Arena Size:** max(3, 3, 1) = **3 KB**


    This is well within the 256 KB SRAM budget, leaving ample room for the runtime, stack, and other buffers.'
  options:
  - 2 KB
  - 3 KB
  - ~3.1 KB (3076 B)
  - 6 KB
  correct_index: 1
