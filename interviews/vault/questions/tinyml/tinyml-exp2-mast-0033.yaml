title: Solar-Powered Audio on ARM Cortex-M4
scenario: You are designing an acoustic anomaly detection system for remote pipelines using an ARM Cortex-M4
  (STM32F4) running at 168 MHz with 256 KB SRAM, 1 MB flash, and no FPU. The system is powered by a small
  solar panel that provides an average of 1 mW continuously. You must architect a duty-cycled system that
  samples audio at 16 kHz, extracts MFCCs, and runs a 500k MAC INT8 CNN for anomaly detection without
  exceeding the energy budget. How do you design the sleep/wake schedule and hardware pipeline to guarantee
  perpetual operation?
question: "How can a solar-powered Cortex-M4 audio detector stay under a continuous 1 mW budget?"
details:
  realistic_solution: The optimal architecture leverages a low-power analog hardware Voice Activity Detector
    (VAD) to keep the MCU in deep sleep. Once triggered, the MCU uses DMA to buffer audio into a ping-pong
    buffer in the 256 KB SRAM. The core wakes periodically to compute fixed-point MFCCs. During inference,
    leveraging CMSIS-NN SIMD, the 500k MAC CNN executes extremely quickly, minimizing active time before
    returning to deep sleep, ensuring average power remains under the 1 mW budget.
  common_mistake: Candidates often design a system that wakes up the entire 168 MHz MCU for every audio
    frame, ignoring the massive active power draw of the STM32F4. They also fail to utilize DMA for buffering
    audio while the core sleeps, or they try to perform floating-point MFCC extraction without accounting
    for the lack of a hardware FPU.
  napkin_math: STM32F4 active power at 168 MHz is ~132 mW (40 mA @ 3.3V), while sleep power is ~0.1 mW.
    The 500k MAC INT8 CNN requires ~1 million cycles (assuming 2 cycles/MAC with memory overhead, leveraging
    the 2x INT8 MACs/cycle CMSIS-NN SIMD). Inference time = 1,000,000 / 168,000,000 Hz = ~6 ms. Energy
    per inference = 132 mW * 6 ms = 0.79 mJ. Fixed-point MFCCs take ~1 ms (0.13 mJ). Total active energy
    per event = ~0.92 mJ. With a 1 mW solar budget and 0.1 mW sleep draw, 0.9 mJ/s is available. The system
    can support a maximum of ~1 wake-up event per second to survive perpetually.
