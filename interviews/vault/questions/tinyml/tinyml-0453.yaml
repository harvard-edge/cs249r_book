title: The Cafeteria False Wake
scenario: You've built a keyword spotting model ('Hey, Gizmo!') for a wearable device. The FP32 model
  achieves 99% accuracy on your clean speech test set. You then use post-training static quantization
  (INT8) with a calibration dataset of 1,000 clean utterances of 'Hey, Gizmo!' to determine the activation
  scales. The resulting INT8 model also gets 99% on the clean test set. However, when you test the device
  in a noisy cafeteria, it has an extremely high false-positive rate, triggering constantly on background
  chatter and clatter. What is the most likely reason the INT8 model is failing so spectacularly in a
  noisy environment when the FP32 model was more robust?
question: "What is the most likely reason the INT8 model is failing so spectacularly in a noisy environment when the FP32 model was more robust?"
details:
  realistic_solution: The calibration dataset was not representative of the deployment environment. By
    using only clean speech, the quantization process optimized the dynamic range for quiet inputs. The
    scale factors for activation layers were calculated based on the minimum and maximum values seen during
    these clean runs. When the model is exposed to loud, noisy cafeteria sounds, the activations in early
    layers spike to values far outside the range observed during calibration. These large values are then
    clipped to the INT8 `[-128, 127]` range. This clipping effect can make very different noisy sounds
    look identical after quantization, causing the model to confuse background noise with the keyword.
    The FP32 model, with its much larger dynamic range, can handle these noisy activations without clipping,
    hence its superior robustness. The fix is to create a new calibration set that includes a mix of clean
    speech, background noise, and speech mixed with noise.
  common_mistake: Engineers often use unrepresentative data for quantization calibration. They use the
    same clean data from training, assuming it will generalize. However, quantization is a lossy compression;
    the ranges of activations it learns to preserve are specific to the calibration data. If the calibration
    data doesn't include the kinds of noise seen in the real world, the quantization scales will be poorly
    suited to handle that noise, leading to unexpected behavior.
  napkin_math: 1. **Clean Calibration:** An early Conv layer's activations for clean speech might range
    from `[-2.5, 2.5]`. The quantization scale is set to `S = (2.5 - (-2.5)) / 255 ≈ 0.0196`.
  options:
  - The cafeteria noise is causing power brownouts on the device, leading to random bit-flips in the model's
    weights.
  - The calibration dataset lacked noisy examples, causing quantization to clip noisy activations and
    make them indistinguishable from the keyword.
  - The FP32 model was likely overfitting to the clean dataset, and the INT8 model is simply exposing
    this pre-existing weakness.
  - The INT8 model requires more SRAM than is available, and the stack is colliding with the heap, corrupting
    the activation tensors during inference.
  correct_index: 1
