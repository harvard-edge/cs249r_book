title: The Cafeteria False Wake
scenario: An FP32 keyword spotting model achieves 99% accuracy on clean speech. After INT8 static quantization calibrated on 1,000 clean utterances, it still achieves 99% on the clean test set. However, when deployed in a noisy cafeteria, it triggers constantly on background chatter.
question: What is the mechanical reason the INT8 model fails so spectacularly in a noisy environment when the identical FP32 architecture was robust?
details:
  realistic_solution: The calibration dataset suffered from severe distribution shift relative to the deployment environment. By calibrating strictly on clean speech, the static quantization process established a very narrow dynamic range optimized for quiet activations. In the cafeteria, loud noise spikes push the activations far outside this narrow calibrated range. These extreme values suffer catastrophic destructive clipping against the `[-128, 127]` integer boundaries, homogenizing the noisy inputs into identical activation maps that the network misclassifies as a wake word.
  common_mistake: |
    **The Pitfall:** Assuming quantization calibration is a lossless, data-agnostic conversion.
    **The Rationale:** Engineers assume the pristine training data is sufficient for post-training quantization, failing to test the dynamic range against real-world noise profiles.
    **The Consequence:** The model is deployed with overly narrow activation bounds, causing real-world noise to be aggressively clipped and resulting in a disastrous false-positive rate.
  napkin_math: |
    **Assumptions & Constraints:**
    - Clean calibration range: [-2.5, 2.5].
    - Noisy real-world range: [-10.0, 10.0].
    - INT8 bounds: [-128, 127].

    **Calculations:**
    - Static Scale (S): (2.5 - (-2.5)) / 255 ≈ 0.0196.
    - Noisy Activation (+10.0): 10.0 / 0.0196 ≈ 510.
    - Clipping action: 510 is clamped down to 127.

    **Conclusion & Interpretation:**
    - **Result: Precision-Bound Clipping**. Any real-world activation exceeding 2.5 is mechanically clamped to 127, completely destroying the signal-to-noise ratio and generating false positives.
  options:
  - The cafeteria noise is causing power brownouts on the device, leading to random bit-flips in the model's weights.
  - The calibration dataset lacked noisy examples, causing quantization to clip noisy activations and make them indistinguishable from the keyword.
  - The FP32 model was likely overfitting to the clean dataset, and the INT8 model is simply exposing this pre-existing weakness.
  - The INT8 model requires more SRAM than is available, and the stack is colliding with the heap, corrupting the activation tensors during inference.
  correct_index: 1
