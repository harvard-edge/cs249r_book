title: The Cafeteria False Wake
scenario: You've built a keyword spotting model for a wearable device. The FP32 model achieves 99% accuracy on your clean speech test set. You then use post-training static quantization (INT8) with a calibration dataset of 1,000 clean utterances to determine the activation scales. The resulting INT8 model also gets 99% on the clean test set. However, when you test the device in a noisy cafeteria, it has an extremely high false-positive rate, triggering constantly on background chatter.
question: What is the most likely reason the INT8 model is failing so spectacularly in a noisy environment when the FP32 model was more robust?
details:
  realistic_solution: The calibration dataset was not representative of the deployment environment. By using only clean speech, the quantization process optimized the dynamic range for quiet inputs. When exposed to loud cafeteria sounds, activations spike far outside the range observed during calibration. These large values are clipped to the INT8 `[-128, 127]` range, making different noisy sounds look identical after quantization, confusing the model.
  common_mistake: |
    **The Pitfall:** Using pristine data for quantization calibration.
    **The Rationale:** Engineers assume the same clean data from training will suffice for quantization, treating it like a lossless conversion.
    **The Consequence:** The model fails in the real world because real-world noise pushes activations outside the narrow calibrated range, resulting in destructive clipping.
  napkin_math: |
    - Clean Calibration: An early Conv layer's activations range `[-2.5, 2.5]`.
    - The quantization scale is set to `S = (2.5 - (-2.5)) / 255 ≈ 0.0196`.
    - Noisy Speech: Noise spikes activations to `[-10.0, 10.0]`.
    - With `S = 0.0196`, values beyond `[-2.5, 2.5]` are clipped to -128 or 127.
    - **This clipping destroys the signal-to-noise ratio, causing constant false positives.**
  options:
  - The cafeteria noise is causing power brownouts on the device, leading to random bit-flips in the model's weights.
  - The calibration dataset lacked noisy examples, causing quantization to clip noisy activations and make them indistinguishable from the keyword.
  - The FP32 model was likely overfitting to the clean dataset, and the INT8 model is simply exposing this pre-existing weakness.
  - The INT8 model requires more SRAM than is available, and the stack is colliding with the heap, corrupting the activation tensors during inference.
  correct_index: 1
