title: Master TinyML Fleet Telemetry Architecture
scenario: 'A wildlife project operates 8,000 TinyML sensors over a shared low-power gateway network. Each device can send at most 2 KB/day, but rare events need enough context for scientists to decide whether to dispatch a drone.'
question: 'How would you design the telemetry architecture so the fleet remains useful under a 2 KB/device/day budget?'
details:
  realistic_solution: 'Use a multi-tier telemetry policy. Keep routine messages to compact counters and health bits, send learned event summaries instead of raw windows, reserve emergency budget for top-confidence anomalies, and aggregate or deduplicate at the gateway before cloud upload. The design should include backoff during storms, per-device daily quotas, and a way to request richer context only from a few high-value nodes.'
  common_mistake: |
    **The Pitfall:** Treating the low-power radio link like a high-bandwidth cloud uplink.
    **The Rationale:** Cloud-centric engineers assume it's acceptable to upload raw sensor windows from every anomaly for centralized processing.
    **The Consequence:** The gateway network is completely flooded, causing massive packet collisions and draining sensor batteries within days.
  napkin_math: |
    1. **Assumptions & Constraints:** 8,000 devices. 2 KB/day budget per device. Raw sensor snippet is ~32 KB.
    2. **Calculations:**
       - Total fleet capacity = 8,000 * 2 KB = 16 MB/day.
       - One raw snippet = 32 KB.
       - 32 KB > 2 KB (exceeds budget by 16x).
    3. **Conclusion & Interpretation:** **A single 32 KB raw snippet blows the daily 2 KB budget by 1600%.** Result: Network-Bandwidth-Bound.
