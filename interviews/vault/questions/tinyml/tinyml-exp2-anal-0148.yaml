title: Calibration Dataset Outlier Bias
scenario: Your team is deploying an anomaly detection CNN on an ARM Cortex-M7 + Ethos-U55 (Corstone-300)
  running at 480 MHz. The Ethos-U55 (configured for 256 MAC/cycle) shares 512 KB of SRAM with the M7 and
  strictly requires integer arithmetic. During dataset curation for post-training quantization (PTQ),
  the team uses active learning to aggressively select edge cases, resulting in a calibration dataset
  filled with extreme, high-amplitude sensor outliers. When deployed, inference latency is unaffected,
  but the model completely fails to detect subtle, low-amplitude anomalies that it previously caught as
  a float32 model. Explain why this specific calibration dataset composition caused the integer-only NPU
  to fail on subtle inputs.
question: "Why this specific calibration dataset composition caused the integer-only NPU to fail on subtle inputs?"
details:
  realistic_solution: The inclusion of extreme outliers in the calibration dataset artificially widens
    the minimum and maximum bounds used to calculate the int8 quantization scale. Because the Ethos-U55
    relies purely on 8-bit integer math, this widened range forces a much larger step size. This dramatically
    reduces the numerical resolution available for subtle, low-amplitude features, causing them to round
    to zero and be entirely lost during NPU execution.
  common_mistake: Candidates often assume the model overfit to the outliers during training or incorrectly
    blame the 512 KB SRAM limit for causing activation spillage, missing that PTQ calibration only scales
    activations without changing model weights or memory footprints.
  napkin_math: Assume typical subtle anomalies produce max activations of 5.0, but the curated outliers
    reach 127.5. For int8 quantization (255 positive steps), the outlier-biased scale is 127.5 / 255 =
    0.5 per step. A subtle feature value of 1.0 quantizes to round(1.0 / 0.5) = 2. If calibrated on typical
    data (max 5.1), the scale is 5.1 / 255 = 0.02 per step, and 1.0 quantizes to round(1.0 / 0.02) = 50.
    The outlier dataset bias effectively destroys 96% of the feature's integer resolution for the NPU.
