title: TinyML Keyword Spotting Latency Decomposition on ARM Cortex-M4
scenario: You are tasked with deploying a small keyword spotting (KWS) model on an ARM Cortex-M4 STM32F4 microcontroller for a low-power voice assistant. The system captures audio through an I2S microphone, processes it, runs inference, and triggers an action. The total end-to-end latency must not exceed 150 ms. Your KWS model is a small CNN quantized to 8-bit integers.
question: How should you decompose Cortex-M4 KWS latency across audio acquisition, preprocessing, inference, and postprocessing under 150 ms?
details:
  realistic_solution: 'Use hardware cycle counters (e.g., DWT_CYCCNT) or toggle GPIO pins to precisely measure the duration of data acquisition, preprocessing, inference, and postprocessing. Leverage DMA for efficient data transfers from peripherals (I2S) to memory. Optimize preprocessing by using highly optimized fixed-point arithmetic libraries. Benchmark the 8-bit quantized CNN inference engine with realistic inputs, considering the fixed-point operations overhead.'
  common_mistake: |
    **The Pitfall:** Focusing primarily on the model's inference time (TPOT).
    **The Rationale:** Engineers often overlook significant latency contributions from data acquisition, complex preprocessing steps (e.g., MFCCs without hardware acceleration), or postprocessing logic.
    **The Consequence:** The overall system fails to meet the strict 150 ms real-time deadline despite the ML model itself executing quickly.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 150 ms total latency.
    - Clock: 168 MHz (~6 ns/cycle).
    - Throughput: 1 cycle/MAC (with DSP extensions).
    - Workload: 500,000 MACs for CNN.

    **Calculations:**
    - MAC Latency: 500,000 MACs * 1 cycle/MAC * 6 ns = 3 ms.
    - Remaining Budget: 150 ms - 3 ms = 147 ms.

    **Conclusion & Interpretation:**
    - **Result: 3 ms Inference (Compute-Bound).** The actual ML model only consumes 3 ms. 147 ms remains entirely for DSP preprocessing, I2S DMA, and trigger logic.
