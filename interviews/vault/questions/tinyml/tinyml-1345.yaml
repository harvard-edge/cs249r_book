title: TinyML Keyword Spotting Latency Decomposition on ARM Cortex-M4
scenario: You are tasked with deploying a small keyword spotting (KWS) model on an ARM Cortex-M4 STM32F4 microcontroller (168 MHz clock, 256 KB SRAM, no FPU) for a low-power voice assistant. The system captures audio through an I2S microphone, processes it, runs inference, and triggers an action. The total end-to-end latency, from audio capture start to action trigger, must not exceed 150 ms. Your KWS model is a small convolutional neural network (CNN) that has been quantized to 8-bit integers.
question: How should you decompose Cortex-M4 KWS latency across audio acquisition, preprocessing, inference, and postprocessing under 150 ms?
details:
  realistic_solution: A realistic approach involves meticulous profiling of each stage. Use hardware cycle counters (e.g., DWT_CYCCNT) or toggle GPIO pins to precisely measure the duration of data acquisition, preprocessing, inference, and postprocessing. Leverage DMA for efficient data transfers from peripherals (I2S) to memory. Optimize preprocessing by using highly optimized fixed-point arithmetic libraries or leveraging the Cortex-M4's DSP extensions where applicable. Ensure the model and intermediate tensors fit within the 256 KB SRAM, or implement intelligent tiling/layer-by-layer execution if not possible. For TPOT, benchmark the 8-bit quantized CNN inference engine with realistic inputs, considering the fixed-point operations overhead. Analyze memory layout to minimize cache misses (though M4 caches are simple) and ensure efficient data access.
  common_mistake: |
    **The Pitfall:** Focusing primarily on the model's inference time (TPOT).
    **The Rationale:** Engineers often overlook significant latency contributions from data acquisition, complex preprocessing steps (e.g., MFCCs without hardware acceleration), or postprocessing logic.
    **The Consequence:** The overall system fails to meet the strict 150 ms real-time deadline despite the ML model itself executing quickly.
  napkin_math: |
    1. Determine cycle time: 168 MHz clock means 1 cycle ≈ 6 ns.
    2. Estimate MAC time: A typical 8-bit integer MAC operation takes 1-2 cycles on a Cortex-M4 with DSP extensions (assume 1 cycle for best-case MAC, so 6 ns/MAC).
    3. Compute layer latency: A small CNN layer requiring 500,000 MACs takes 500,000 MACs * 1 cycle/MAC * 6 ns/cycle = **3 ms**.
    4. Identify remaining budget: 150 ms total - 3 ms (inference) = **147 ms** remaining for audio acquisition, preprocessing, and postprocessing.
