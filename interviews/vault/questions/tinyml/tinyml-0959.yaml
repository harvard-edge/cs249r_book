title: 4-Bit Quantization Latency Regression on nRF5340
scenario: Your team deployed an audio classification model on the Nordic nRF5340 (128 MHz app core, 1 MB flash, 256 KB SRAM, BLE 5.3). To reduce flash usage, you applied 4-bit weight quantization, successfully shrinking the weights from 800 KB to 400 KB. However, during on-device profiling, you observe that inference latency increased by 50% and battery drain worsened, even though the active current remained steady at ~5mA.
question: Why did 4-bit weight quantization on the nRF5340 shrink flash usage but increase inference latency and battery drain?
details:
  realistic_solution: The Nordic nRF5340's Cortex-M33 application core lacks native hardware support for 4-bit multiply-accumulate (MAC) instructions. While 4-bit packing halves the flash memory reads, the CPU must perform software unpacking on the fly. It uses bitwise AND masks and logical bit-shifts to expand the 4-bit values into 8-bit or 16-bit registers before executing the standard MAC instructions. The additional CPU cycles required for this unpacking overhead exceed the cycles saved from fewer flash fetches, increasing overall execution time and total energy consumed at the ~5mA active draw.
  common_mistake: |
    **The Pitfall:** Assuming smaller memory footprint guarantees faster execution.
    **The Rationale:** Candidates correlate reduced memory bandwidth with improved performance, ignoring instruction set limitations.
    **The Consequence:** They deploy sub-byte quantization on processors without hardware support, inadvertently slowing down inference.
  napkin_math: |
    *   **8-bit Baseline**: 100,000 fetches (1 cycle) + 100,000 MACs (1 cycle) = 200,000 cycles. At 128 MHz = 1.56 ms. Energy: 1.56 ms * 5 mA = 7.8 µC.
    *   **4-bit Packed**: 50,000 fetches + 50,000 unpack routines (3 cycles for mask/shift per byte) = 200,000 cycles to load/unpack.
    *   **4-bit Compute**: Add 100,000 MACs = 300,000 total cycles. At 128 MHz = 2.34 ms. Energy: 2.34 ms * 5 mA = 11.7 µC.
    *   **Conclusion**: **Latency and energy consumption increased by 50% because the CPU lacks native 4-bit MAC instructions, requiring expensive software unpacking.**
