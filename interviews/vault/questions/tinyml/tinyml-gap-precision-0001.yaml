title: TinyML Binary Weight Savings
scenario: A TinyML classifier has 160 KB of INT8 weights. A binary-weight variant stores 1 bit per weight and adds a 6 KB lookup table. Estimate the flash footprint and savings.
question: How much flash does a binary-weight TinyML model use compared with 160 KB INT8 weights if it adds a 6 KB lookup table?
details:
  realistic_solution: 'Binary weights reduce the weight storage by 8x: 160 KB / 8 = 20 KB. Adding a 6 KB lookup table gives 26 KB. Savings are 134 KB, but accuracy and kernel support must be reviewed.'
  common_mistake: Assuming an 8x storage reduction is the whole story and ignoring lookup tables or accuracy cost.
  napkin_math: Binary footprint = 160/8 + 6 = 26 KB. Savings = 160 - 26 = 134 KB.
