title: The Duty Cycle Power Drain
scenario: You're designing a wildlife camera powered by a small battery. The device stays in a deep sleep state, consuming 10 uW. A motion sensor wakes it up for 1 second to run an image classification inference, consuming 50 mW. This cycle repeats every 10 seconds.
question: What average power should the wildlife camera draw with 1 s at 50 mW and 9 s at 10 uW every 10 s?
details:
  realistic_solution: Average power is derived from the total energy consumed across one complete cycle divided by the cycle duration. By calculating the energy integral (Power * Time) of the active phase and adding it to the energy integral of the sleep phase, you establish the baseline. Dividing this total cycle energy by the 10-second period yields the true time-weighted average power consumption. The sleep phase dominates the timeline, but the active inference strictly dictates the power budget.
  common_mistake: |
    **The Pitfall:** Incorrectly averaging the absolute power values or botching unit conversions.
    **The Rationale:** Candidates lazily average (50mW + 10uW) / 2, completely ignoring the time-weighted duty cycle, or they fail to convert microwatts to milliwatts correctly.
    **The Consequence:** Massive errors in energy calculations lead to deploying undersized batteries that die months ahead of schedule.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Active phase: 1s at 50 mW.
       - Sleep phase: 9s at 10 uW (0.01 mW).
       - Period: 10s.
    2. **Calculations:**
       - Active Energy: 50 mW * 1 s = 50 mJ.
       - Sleep Energy: 0.01 mW * 9 s = 0.09 mJ.
       - Total Cycle Energy: 50 mJ + 0.09 mJ = 50.09 mJ.
       - Average Power: 50.09 mJ / 10 s = 5.009 mW.
    3. **Conclusion & Interpretation:**
       - **Result: Duty-Cycle Power.** The average power is ~5.0 mW, dominated by the active inference spike.
  options:
  - 25.0 mW
  - 5.9 mW
  - ~5.0 mW
  - 50.0 mW
  correct_index: 2
