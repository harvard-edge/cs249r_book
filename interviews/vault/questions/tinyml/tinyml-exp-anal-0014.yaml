title: NPU to CPU Fallback Latency Analysis
scenario: You are testing an int8 quantized audio classification model on an ARM Cortex-M7 + Ethos-U55
  (Corstone-300) platform. The system features a 480 MHz M7, 512 KB of shared SRAM, and an Ethos-U55 NPU
  configured for 256 MAC/cycle. The team replaces a standard ReLU activation with a custom, unaccelerated
  'Swish-like' activation function on a 100,000-element feature map. While the preceding 5-million MAC
  convolution runs entirely on the NPU, the custom activation forces a fallback to the M7 CPU, requiring
  12 cycles per element to compute using basic integer arithmetic without CMSIS-NN SIMD optimizations.
  Explain why this seemingly simple zero-MAC operation causes the total layer execution time to increase
  by roughly 60x.
question: "Why this seemingly simple zero-MAC operation causes the total layer execution time to increase by roughly 60x?"
details:
  realistic_solution: The latency spike occurs because the Ethos-U55 executes the heavy convolution with
    massive parallelism, while the unsupported activation forces the CPU to process elements sequentially
    from the shared 512 KB SRAM. Because the M7 lacks an accelerated SIMD implementation for this specific
    custom function, the integer arithmetic takes significantly more cycles per element. The combination
    of losing the NPU's 256 MAC/cycle throughput pipeline and the M7 taking 12 cycles per element shifts
    the bottleneck entirely to the computationally 'light' activation.
  common_mistake: Candidates often focus solely on the lack of MAC operations in the activation function,
    assuming it will execute almost instantly on a 480 MHz CPU. They fail to account for the massive parallelism
    difference between the NPU and the scalar CPU fallback, as well as the high cycle cost of unoptimized
    integer arithmetic on the Cortex-M7.
  napkin_math: 'NPU Convolution Latency: 5,000,000 MACs / 256 MACs/cycle = ~19,531 cycles. CPU Custom
    Activation Latency: 100,000 elements * 12 cycles/element = 1,200,000 cycles. Total time with NPU-only
    (assuming hardware-fused ReLU): ~19,531 cycles. Total time with CPU fallback: 19,531 + 1,200,000 =
    1,219,531 cycles. At 480 MHz, the NPU-only latency is ~41 microseconds (19,531 / 480,000,000), while
    the CPU fallback increases the latency to ~2.54 milliseconds (1,219,531 / 480,000,000), representing
    roughly a 61x increase in execution time.'
