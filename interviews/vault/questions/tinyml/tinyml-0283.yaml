title: The Depthwise Separable Dividend (tinyml-0283)
scenario: You're optimizing a real-time keyword spotting model for a Cortex-M4 microcontroller. A profiler shows that a standard 3x3 convolutional layer is the main bottleneck. This layer takes a 16x16x32 (HxWxC_in) feature map and produces a 16x16x64 (HxWxC_out) output.
question: What compute reduction does the depthwise separable replacement provide for the 16x16x32 to 16x16x64 convolution?
details:
  realistic_solution: 'A depthwise separable convolution splits a standard convolution into two much cheaper layers:

    1. **Depthwise layer:** One 3×3 filter per input channel, applied spatially. This captures spatial features independently per channel.

    2. **Pointwise layer:** A 1×1 convolution that linearly combines the depthwise outputs to produce the desired number of output channels.


    The computational savings come from avoiding the full cross-channel multiply at every spatial position.'
  common_mistake: |
    **The Pitfall:** Forgetting to include the cost of the 1x1 pointwise convolution.
    **The Rationale:** Engineers often only calculate the cost of the spatial depthwise step, mistakenly believing the reduction is strictly proportional to the number of output channels (~64x).
    **The Consequence:** Theoretical speedup estimates are wildly optimistic, leading to missed latency targets during actual deployment.
  napkin_math: |
    1. Standard Convolution Cost: 3² × 32 × 64 × 16 × 16 = 4,718,592 MACs.
    2. Depthwise Cost (Spatial): 3² × 32 × 16 × 16 = 73,728 MACs.
    3. Pointwise Cost (Channel): 1² × 32 × 64 × 16 × 16 = 524,288 MACs.
    4. Total DS-Conv Cost: 73,728 + 524,288 = 598,016 MACs.
    5. Speedup Factor: 4,718,592 / 598,016 ≈ **7.9× fewer operations**.
  options:
  - ~64x reduction
  - ~9x reduction
  - ~8x reduction
  - No computational savings, only memory savings
  correct_index: 2
