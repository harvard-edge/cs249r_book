title: The Depthwise Separable Dividend (tinyml-0283)
scenario: You're optimizing a real-time keyword spotting model for a microcontroller. A profiler shows that a standard 3x3 convolutional layer is the main bottleneck. This layer takes a 16x16x32 feature map and produces a 16x16x64 output.
question: What compute reduction does the depthwise separable replacement provide for the 16x16x32 to 16x16x64 convolution?
details:
  realistic_solution: 'A depthwise separable convolution splits a standard convolution into two much cheaper layers:\n\n    1. **Depthwise layer:** One 3×3 filter per input channel, applied spatially. This captures spatial features independently per channel.\n\n    2. **Pointwise layer:** A 1×1 convolution that linearly combines the depthwise outputs to produce the desired number of output channels.\n\n\n    The computational savings come from avoiding the full cross-channel multiply at every spatial position.'
  common_mistake: |
    **The Pitfall:** Forgetting to include the cost of the 1x1 pointwise convolution.
    **The Rationale:** Engineers often only calculate the cost of the spatial depthwise step, mistakenly believing the reduction is strictly proportional to the number of output channels (~64x).
    **The Consequence:** Theoretical speedup estimates are wildly optimistic, leading to missed latency targets during actual deployment.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Input shape: 16x16x32 (HxWxC_in).
       - Output shape: 16x16x64 (HxWxC_out).
       - Kernel: 3x3.
    2. **Calculations:**
       - Standard Conv MACs: 3 × 3 × 32 × 64 × 16 × 16 = 4,718,592.
       - Depthwise MACs: 3 × 3 × 32 × 16 × 16 = 73,728.
       - Pointwise MACs: 1 × 1 × 32 × 64 × 16 × 16 = 524,288.
       - Total DS-Conv MACs: 73,728 + 524,288 = 598,016.
       - Speedup Factor: 4,718,592 / 598,016 ≈ 7.89.
    3. **Conclusion & Interpretation:**
       - **Result: ~7.9× Reduction. Compute-Bound.** Replacing the layer yields an almost 8-fold decrease in MACs by decoupling spatial and channel filtering.
  options:
  - ~64x reduction
  - ~9x reduction
  - ~7.9x reduction
  - No computational savings, only memory savings
  correct_index: 2
