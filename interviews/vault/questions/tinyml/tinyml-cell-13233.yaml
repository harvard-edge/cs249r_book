title: Realize Quantization-Aware Training Pipeline for MCU Transformer
scenario: You must deploy an INT8 transformer for predictive maintenance on Cortex-M7 within 3 weeks.
  The FP32 baseline achieves 95% F1 at 48ms inference. PTQ drops accuracy to 88% (unacceptable). You must
  implement QAT using TensorFlow Lite Micro's QAT API with fake quantization. The training dataset has
  50K samples, training time budget is 24 GPU-hours on a single A10G GPU. Realize the QAT pipeline end-to-end.
details:
  realistic_solution: 'Pipeline: (1) Load FP32 checkpoint. (2) Insert fake-quant nodes: weights per-channel
    (128 bins), activations per-tensor (256 bins), attention logits clip at ±6. (3) Phase 1 (4h): fine-tune
    activation scales, LR=1e-5, freeze weights. (4) Phase 2 (8h): unfreeze weights, train all with STE
    gradients. (5) Phase 3 (12h): full QAT convergence. Export: convert fake-quant to INT8 using TFLM
    converter. Expected result: 93-95% F1. (6) Validate on MCU: compare with aarch32 TFLM runtime, verify
    48ms budget met.'
  common_mistake: Applying QAT to all layers simultaneously from the start; best practice is to apply
    fake quant to activations first (1 epoch), then weights (1 epoch), then fine-tune combined to let
    gradients stabilize.
  napkin_math: '50K samples, batch=64: 781 steps/epoch. At A10G throughput ~500 steps/min: 1.56 min/epoch.
    24h = 1440min → 923 epochs available. Phase 1: 50 epochs = 78min; Phase 2: 200 epochs = 312min; Phase
    3: 500 epochs = 780min. Total: 1170min < 1440min. ✓'
