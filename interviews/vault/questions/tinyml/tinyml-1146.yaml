title: Corstone-300 NPU Latency Profiling Math
scenario: You are profiling a wake-word detection model on an ARM Cortex-M7 + Ethos-U55 subsystem running at 480 MHz. The model requires 1.2 million MAC operations per inference. During profiling, overall latency is 12 ms because an unsupported operator forces a fallback from the NPU to the M7 CPU. You optimize the network so the entire graph runs on the Ethos-U55 NPU (configured for 256 MACs/cycle).
question: What is the theoretical Ethos-U55 latency for the 1.2M-MAC wake-word model once CPU fallback is eliminated?
details:
  realistic_solution: The correct approach is to determine the theoretical hardware limit of the NPU by dividing the total operations by the NPU's parallel throughput, then converting those cycles to milliseconds using the system clock. Profiling tools like ARM Streamline would immediately flag this CPU fallback as a major bottleneck. By keeping execution entirely on the Ethos-U55, we avoid both the slow M7 scalar/vector math and the memory movement overhead in the 512 KB shared SRAM.
  common_mistake: |
    **The Pitfall:** Failing to divide by the NPU's parallel throughput or using the wrong clock domain.
    **The Rationale:** Candidates either use 1 MAC/cycle or forget that the M7 and U55 share the 480 MHz clock in this subsystem.
    **The Consequence:** The latency estimate is off by a factor of 256x, obscuring the true value of NPU acceleration.
  napkin_math: |
    * **Total Operations:** 1,200,000 MACs.
    * **NPU Throughput:** 256 MACs/cycle.
    * **Required Cycles:** 1,200,000 / 256 = **4,687.5 cycles**.
    * **System Clock:** 480 MHz = 480,000,000 cycles/sec.
    * **Latency:** 4,687.5 / 480,000,000 = 0.00000976 seconds = **9.77 µs**.
    * **Conclusion:** Resolving the fallback reduces latency from 12,000 µs to ~10 µs.
