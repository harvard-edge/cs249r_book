title: Corstone-300 NPU Latency Profiling Math
scenario: You are profiling a wake-word detection model on an ARM Cortex-M7 + Ethos-U55
  (Corstone-300) subsystem running at 480 MHz. The model requires 1.2 million MAC
  operations per inference. During profiling, you notice the overall latency is 12
  ms because an unsupported operator forces a fallback from the NPU to the M7 CPU.
  If you optimize the network so the entire graph runs on the Ethos-U55 NPU (configured
  for 256 MACs/cycle), calculate the theoretical minimum compute latency assuming
  100% MAC utilization and no memory bottlenecks from the shared 512 KB SRAM.
question: What is the theoretical Ethos-U55 latency for the 1.2M-MAC wake-word model
  once CPU fallback is eliminated?
details:
  realistic_solution: The correct approach is to determine the theoretical hardware
    limit of the NPU by dividing the total operations by the NPU's parallel throughput,
    then converting those cycles to milliseconds using the system clock. Profiling
    tools like ARM Streamline would immediately flag this CPU fallback as a major
    bottleneck. By keeping execution entirely on the Ethos-U55, we avoid both the
    slow M7 scalar/vector math and the memory movement overhead in the 512 KB shared
    SRAM.
  common_mistake: Candidates often forget to use the 480 MHz clock frequency to convert
    NPU cycles back to time, or they fail to divide the total MACs by the NPU's MACs/cycle
    throughput. Many also forget that the M7 and U55 share the same clock domain in
    this typical configuration.
  napkin_math: '1) Total operations: 1,200,000 MACs. 2) Ethos-U55 throughput: 256
    MACs/cycle. 3) Required NPU cycles: 1,200,000 / 256 = 4,687.5 cycles. 4) System
    clock: 480 MHz = 480,000,000 cycles/sec. 5) Theoretical compute latency: 4,687.5
    / 480,000,000 = 0.00000976 seconds, or approximately 9.77 microseconds. This demonstrates
    a massive speedup over the 12 ms unoptimized CPU fallback latency.'
