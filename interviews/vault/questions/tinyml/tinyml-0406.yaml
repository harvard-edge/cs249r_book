title: The Hardware MAC Unit Misconception
scenario: 'Your team is choosing between two MCUs for an ML product: MCU A (Cortex-M4, 100 MHz, single-cycle
  32×32→64 hardware multiplier) and MCU B (Cortex-M55, 100 MHz, single-cycle 32×32→64 hardware multiplier
  + optional Helium MVE vector extension). Both cost $2.50. Your manager says ''they both have hardware
  multipliers, so ML performance will be the same.'' Is the manager right?'
details:
  realistic_solution: 'The manager is wrong. The hardware multiplier is necessary but not sufficient for
    ML performance. The difference is in *how many operations the multiplier feeds per cycle*:'
  common_mistake: '"A hardware multiplier is a hardware multiplier — they''re both single-cycle, so performance
    is identical." This treats the multiplier in isolation and ignores the surrounding datapath.'
  napkin_math: '1.5M MAC model. M4 (2 MACs/cycle, 100 MHz): 7.5 ms. M55 scalar (2 MACs/cycle): 7.5 ms.
    M55 + Helium (4 MACs/cycle): 3.75 ms. M55 + Helium + loop overhead reduction (vector instructions
    eliminate loop bookkeeping): ~3.2 ms. Speedup: 2.3×. Energy: M55 Helium uses ~10% more dynamic power
    per cycle (wider datapath), but finishes 2.3× faster. Energy ratio: 1.1 / 2.3 = 0.48×. Helium uses
    *half* the energy per inference.'
