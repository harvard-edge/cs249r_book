title: 'TinyML TCO Diagnosis: Battery Life Mismatch Root Cause'
scenario: 1000 deployed Cortex-M4 sensors (168MHz, 256KB SRAM, 4500mAh battery) were
  designed for 1-year battery life at ~500μA avg current budget. After deployment, batteries
  die in 6 weeks. The application log shows inference running at 10 FPS instead of
  0.1 FPS (design spec). Diagnose the root cause and calculate the actual vs expected
  average current.
question: How would you diagnose the root cause and calculate the actual vs expected
  average current?
details:
  realistic_solution: 'Design: 0.1 FPS (1 inference/10s). Expected: 30mA active for
    10ms inference + 0.03mA sleep for 9990ms. Avg = 30mA*(10ms/10s) + 30μA*(9990ms/10s)
    = 30μA + 30μA = 60μA = 0.060mA for the ML subsystem. With a 4500mAh battery: life
    = 4500mAh / 0.060mA = 75,000 hours = 8.56 years (well within the 1-year 500μA budget).
    Actual 10 FPS: inference 10x/second. Avg I = 30mA*10% + 30μA*90% = 3.027mA.
    Life: 4500mAh / 3.027mA = 1486 hr = 61.9 days ≈ 9 weeks. Observed: 6 weeks. Close
    (debug overhead or higher radio activity explains difference). Root cause: firmware
    timer bug (10 FPS instead of 0.1 FPS).'
  common_mistake: Blaming the hardware without checking the firmware configuration
    — 10 FPS vs 0.1 FPS is a 100x duty cycle error that should be caught in testing
    but may occur due to timer misconfiguration or debug mode left enabled.
  napkin_math: 'Design 0.1 FPS: active fraction = 0.1*0.01s = 0.001. Avg I = 30mA*0.001
    + 0.03mA*0.999 = 0.030 + 0.030 = 0.060mA. Life: 4500 / 0.060 = 75,000 hr = 8.56 yr.
    Actual 10 FPS: active = 10*0.01 = 0.1. Avg I = 30mA*0.1 + 0.03mA*0.9 = 3.0 + 0.027
    = 3.027mA. Life: 4500 / 3.027 = 1486 hr = 61.9 days ≈ 9 weeks. Observed 6 weeks
    implies slightly higher system current (maybe 4.5mA). Fix: correct timer to 0.1 FPS.
    After fix: 8.56 yr ML battery life. Lost due to firmware bug: 1000 units * 6 weeks
    early battery replacement * $0.50/battery = $500 in batteries + labor. Firmware
    bug cost: >$8,500.'
