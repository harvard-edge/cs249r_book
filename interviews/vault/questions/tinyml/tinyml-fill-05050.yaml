title: NAS Search Space Design for MCU-Deployable Model
scenario: 'A TinyML researcher runs Neural Architecture Search (NAS) to find an image classifier for ESP32-S3
  (240MHz, 512KB SRAM). Constraints: <100KB SRAM, <500KB flash, >80% accuracy on CIFAR-10, <50ms inference.
  Design the NAS search space with hardware-aware constraints.'
details:
  realistic_solution: 'Valid operators: depthwise separable conv (3×3, 5×5), pointwise conv (1×1), average
    pooling, skip connections. Forbidden: standard 3×3 conv with >16 channels at resolution >16×16 (activation
    too large). SRAM constraint: largest activation layer must fit in 100KB. At 16×16 resolution, 32 channels
    INT8: 16×16×32=8KB — fine. At 32×32 with 64 channels: 64KB — acceptable. Resolution reduction: CIFAR-10
    32×32 input; must reduce to 16×16 before >32 channels. Channel search: [8, 16, 32] for early layers,
    max 64 for later. Estimated architecture: 4 blocks, ~200K params → ~180KB INT8 (flash OK), peak activation
    ~60KB. NAS with latency predictor targeting ESP32-S3: MCUNet-style search.'
  common_mistake: Including large operators (e.g., standard 3×3 conv with large channel counts) in the
    search space that cannot meet SRAM constraints; the search will waste time evaluating infeasible architectures.
  napkin_math: 'SRAM budget: 100KB = activations + runtime buffers. Peak activation must be <60KB (40KB
    for runtime). Max activation: input×channels. At 32×32×16: 16KB. At 16×16×64: 16KB — well within budget.
    Use 2-stage reduction: 32→16→8 pixels while channels grow. Flash: 500KB = ~500K INT8 params.'
