title: Analyze TCO of Custom ASIC vs MCU for TinyML at Scale
scenario: 'A smart meter manufacturer must choose between deploying anomaly detection on an existing Cortex-M4
  MCU ($2.50 BOM cost, 1mW average, 35% accuracy) vs a custom ML ASIC ($8.00 BOM, 0.2mW, 94% accuracy).
  Production volume: 5M units/year. ASIC NRE: $2M. Battery life (2000mAh, 3.3V): MCU = 2000mAh/(1mA active
  + 0.01mA sleep × 0.95) = 1.78 years; ASIC = 8.9 years. Analyze 5-year TCO for both options including
  warranty costs from missed anomalies.'
details:
  realistic_solution: 'MCU 5-year TCO: BOM: 5M×5yr×$2.50=$62.5M. Battery replacement (1.78yr life → 2.8
    replacements per 5yr at $3/battery): 5M×2.8×$3=$42M. Warranty: 5M×0.65×$50=$162.5M/yr × 5yr = $812.5M.
    Total MCU: $917M. ASIC 5-year TCO: NRE: $2M. BOM: 5M×5yr×$8=$200M. Battery replacement (8.9yr life
    → 0.56 replacements at $3): 5M×0.56×$3=$8.4M. Warranty: 5M×0.06×$50=$15M/yr×5yr=$75M. Total ASIC:
    $285.4M. Savings: $631M over 5 years. NRE amortized: $2M / $631M = 0.3% of savings.'
  common_mistake: Ignoring warranty cost impact of lower accuracy; at 5M units/year, 65% miss rate on
    MCU means 3.25M anomalies/year undetected, each potentially causing a service call at $50 cost.
  napkin_math: 'MCU warranty: 5M units × 65% miss rate × $50/call/year × 5 = $812M. ASIC warranty: 5M
    × 6% × $50 × 5 = $75M. Warranty difference: $737M. BOM difference: (8-2.50)×5M×5yr = $137.5M extra
    for ASIC. Battery savings: $42M - $8.4M = $33.6M saved. Net ASIC advantage: $737M - $137.5M + $33.6M
    - $2M NRE = $631M.'
