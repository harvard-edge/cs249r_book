title: The Overwhelmed Sensor Fusion MCU
scenario: 'You are a TinyML engineer diagnosing a fault in a new industrial sensor. The device uses a
  Cortex-M7 MCU to fuse data from an accelerometer (sampled at 100Hz) and a microphone (sampled at 16kHz)
  to predict machine failures. The system has a hard real-time deadline: it must issue a shutdown command
  within 2ms of detecting a failure signature. During testing, you observe that after a few seconds of
  running, the device''s latency for detecting a known test signature spikes from ~1ms to over 50ms, missing
  the deadline. You profile the MCU and find that the accelerometer model takes 8ms to run per inference,
  and the microphone''s audio preprocessing pipeline takes 3ms for every 10ms worth of audio data. Given
  this data, what is the most likely cause of the missed deadlines?'
details:
  realistic_solution: The system is computationally overloaded, leading to an unstable processing queue.
    The total workload exceeds the time available between sensor events, causing the input data buffer
    to grow continuously until data is dropped or delayed significantly. The accelerometer data arrives
    every 10ms (100Hz). The processing time for this data is 8ms. The audio preprocessing adds another
    3ms of CPU work within that same 10ms window. The total required compute time is 8ms + 3ms = 11ms.
    Since the data arrives every 10ms, the CPU is falling behind by 1ms for every single sample. This
    creates a growing backlog (queue), and the time to process any new sample becomes the time to clear
    the entire backlog first, hence the latency spike.
  common_mistake: Engineers often misdiagnose compute bottlenecks as memory issues in TinyML. They see
    a buffer overflowing and assume the problem is insufficient SRAM, when the root cause is that the
    CPU can't drain the buffer fast enough. Another common mistake is to focus solely on optimizing one
    part of the pipeline (e.g., the model) without considering the total system workload relative to the
    event arrival rate.
  napkin_math: 'Accel: 100Hz = 1 event/10ms. Processing per window: accel 8ms + audio 3ms = 11ms. Window
    = 10ms. Utilization = 11/10 = 1.1 > 1.0 (unstable). Backlog grows 1ms/sample. After 50 samples (0.5s):
    latency = 50ms. Fix: reduce accel model to <7ms (budget 10-3=7ms), or lower accel rate to 50Hz giving
    20ms window, utilization=11/20=0.55.'
  options:
  - The Cortex-M7's instruction cache is thrashing due to context switching between the audio and accelerometer
    tasks.
  - The model is too large, causing an SRAM overflow which leads to system resets and missed data.
  - The total required processing time (11ms) exceeds the data arrival interval (10ms), creating an unstable
    queue and growing latency.
  - The SPI bus connecting the sensors to the MCU is saturated and cannot deliver the data fast enough.
  correct_index: 2
