title: The Federated Learning Energy Tax
scenario: 'You are designing the update strategy for a fleet of 10,000 battery-powered smart doorbells
  using a Cortex-M4 MCU. To improve the person detection model, you can either: 1) Centralized: upload
  500 MB of raw video per day at 10 Mbps using 1W active power. 2) Federated Learning: locally train and
  upload a 125 MB model update per day at 10 Mbps using 1W active power. What is the daily energy consumption
  for data transmission per device for each approach?'
question: "What is the daily energy consumption for data transmission per device for each approach?"
details:
  realistic_solution: The key is to calculate the energy (Power × Time) for data transmission in each
    scenario and then scale it to the fleet. At 1.25 MB/s, sending 500 MB takes 400 seconds and consumes
    400 J. Sending 125 MB takes 100 seconds and consumes 100 J. The federated approach uses 4x less energy
    for transmission.
  common_mistake: Engineers often focus only on the privacy benefits of Federated Learning and forget
    to quantify the significant second-order effects on system constraints like power and battery life.
    They might also miscalculate units, confusing bits and bytes (e.g., 10 Mbps is 1.25 MB/s, not 10 MB/s)
    or mixing up power (Watts) and energy (Joules).
  napkin_math: 'Data Rate: 10 Mbps / 8 = 1.25 MB/s. Centralized: 500 MB / 1.25 MB/s = 400s. Energy = 400s
    × 1W = 400 J. Federated: 125 MB / 1.25 MB/s = 100s. Energy = 100s × 1W = 100 J.'
  options:
  - 'Centralized: 50 J, Federated: 12.5 J. The federated approach is 4x more energy efficient.'
  - 'Centralized: 40 J, Federated: 100 J. The centralized approach is 2.5x more energy efficient.'
  - 'Centralized: 400 J, Federated: 100 J. The federated approach is 4x more energy efficient.'
  - 'Centralized: 40 mJ, Federated: 10 mJ. The difference is negligible at the fleet level.'
  correct_index: 2
