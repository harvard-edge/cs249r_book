title: Knowledge Distillation Soft Targets on nRF5340
scenario: We need to deploy an audio classification model on a Nordic nRF5340 microcontroller, which features
  a 128 MHz app core, 256 KB SRAM, and 1 MB of flash. The original teacher model takes up 5 MB, well over
  our flash capacity, so we must train a much smaller student model using knowledge distillation. What
  is the specific term for the temperature-scaled probability distribution produced by the teacher model
  that the student model attempts to match?
question: "What is the specific term for the temperature-scaled probability distribution produced by the teacher model that the student model attempts to match?"
details:
  realistic_solution: The correct term is 'soft targets' (or soft labels). In knowledge distillation,
    a temperature scaling parameter is applied to the softmax function of the teacher model to produce
    soft targets, which convey 'dark knowledge' about the similarities between different classes, helping
    the highly constrained student model learn better representations.
  common_mistake: Candidates often mistakenly recall this as 'hard targets' or 'feature distillation'
    instead of identifying the temperature-scaled outputs. They may forget that standard labels do not
    provide the inter-class relational information necessary for effective distillation.
  napkin_math: Nordic nRF5340 flash capacity = 1 MB (1024 KB). Assuming the BLE 5.3 stack and RTOS consume
    roughly 256 KB of flash, the maximum available flash for the student model is 1024 KB - 256 KB = 768
    KB. To distill the 5 MB (5120 KB) teacher model down to fit this space, we require a size reduction
    of at least 5120 KB / 768 KB = 6.66x.
