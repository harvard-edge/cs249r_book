title: Operator Fusion Memory Tradeoff on nRF5340
scenario: You are deploying an audio classification model on a Nordic nRF5340 MCU. An ahead-of-time (AOT) compiler applies aggressive operator fusion to a sequence of convolutions, reducing inference latency by 12%. However, the system now crashes with an out-of-memory (OOM) error during inference.
question: Why does fusing operators to reduce latency cause a significant increase in peak SRAM usage?
details:
  realistic_solution: AOT operator fusion eliminates intermediate tensor materialization but forces the compiler to allocate a larger contiguous scratchpad buffer to hold the combined working context for the fused layers concurrently.
  common_mistake: |
    **The Pitfall:** Assuming operator fusion strictly reduces memory requirements.
    **The Rationale:** Candidates correctly know fusion eliminates intermediate tensor materialization, but fail to realize it requires holding a larger combined working context (scratchpad) simultaneously.
    **The Consequence:** The compiler's strategy violates the hard memory constraint, trading a minor latency win for a fatal system crash.
  napkin_math: |
    **Assumptions & Constraints:**
    - nRF5340: 256 KB SRAM, BLE Stack reserves 80 KB.
    - Unfused peak arena: 140 KB. Fused overhead: +45 KB.

    **Calculations:**
    - Available SRAM for ML: 256 - 80 = 176 KB.
    - Fused Peak Memory: 140 + 45 = 185 KB.
    - Deficit: 185 KB > 176 KB.

    **Conclusion & Interpretation:**
    - **Result: 185 KB peak usage causes OOM (SRAM-Bound)**. AOT operator fusion trades bandwidth for peak memory footprint.
