title: Master Transformer FLOPs-to-Power Model for Battery Sizing
scenario: 'Design a complete power model for a keyword-spotting transformer on Cortex-M4 (0.5 pJ/MAC active,
  10μA sleep at 3.3V) to size the battery for 1-year operation. The model runs every 200ms to process
  32ms audio frames. Architecture: 2 layers, 4 heads, 64-dim, seq=16 tokens. INT8. Total MACs per inference:
  12M. Between inferences the MCU sleeps. Compute: (1) active energy per inference, (2) sleep energy between
  inferences, (3) total annual energy, (4) required battery capacity.'
details:
  realistic_solution: '(1) Active energy: 12M MAC × 0.5 pJ/MAC = 6 μJ per inference. Plus memory: 500KB
    weight reads × 10 pJ/byte (SRAM) = 5 μJ. Total active: ~11 μJ. Inference time: 12M MACs / (168M×0.5
    MAC/cycle) = 143ms. (2) Sleep time: 200ms - 143ms = 57ms. Sleep power: 10μA × 3.3V = 33μW. Sleep energy:
    33μW × 0.057s = 1.88 μJ. (3) Per cycle (200ms): 11+1.88 = 12.88 μJ. Cycles/year: 365×24×3600/0.2 =
    157.7M. Annual energy: 157.7M × 12.88μJ = 2.03 kJ = 0.565 Wh. (4) Battery: 0.565 Wh / 3.3V = 171 mAh.
    With 20% margin: 205 mAh ≈ 220 mAh cell.'
  common_mistake: Forgetting to include memory access energy (SRAM reads dominate over compute energy
    on ultra-low-power MCUs); also ignoring wake-up latency overhead.
  napkin_math: 'Active: 12M×0.5pJ=6μJ compute + 500K×10pJ=5μJ memory = 11μJ. Sleep: 33μW×57ms=1.9μJ. Cycle
    total: 12.9μJ. Year: 157.7M cycles × 12.9μJ = 2.03kJ = 0.565Wh. Battery: 0.565Wh/3.3V = 171mAh + 20%
    = 205mAh.'
