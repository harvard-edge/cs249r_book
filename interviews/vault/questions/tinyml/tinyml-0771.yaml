title: The Interrupt-Driven Sensor Fusion
scenario: A Cortex-M4 fuses data from 3 sensors: accelerometer (100 Hz, 2ms ISR), microphone (16 kHz via DMA, 0.1ms ISR per 256-sample block), and temperature (1 Hz, 0.5ms ISR). The main loop runs a 30ms neural network inference.
question: How would you calculate the total ISR overhead per second and determine whether inference deadlines are missed due to ISR preemption?
details:
  realistic_solution: 'Accelerometer ISR: 100 Hz * 2ms = 200ms/s. Microphone DMA ISR: 16,000/256 = 62.5 Hz * 0.1ms = 6.25ms/s. Temperature ISR: 1 Hz * 0.5ms = 0.5ms/s. Total ISR load: 206.75ms/s = 20.7% CPU overhead. During a 30ms inference: ISR preemption adds ~30ms * 0.207 = 6.2ms. Actual inference wall time: 30 + 6.2 = 36.2ms. If the deadline is 40ms (25 Hz), it''s met. If 33ms (30 Hz), it''s missed. The accelerometer ISR dominates — consider moving its processing to DMA + polling to reduce ISR overhead.'
  common_mistake: |
    **The Pitfall:** Ignoring that high-frequency Interrupt Service Routines (ISRs) preempt the main loop inference.
    **The Rationale:** Engineers often look at individual ISR times (e.g., 0.1ms) and deem them "negligible," forgetting to multiply them by their high trigger frequencies.
    **The Consequence:** The cumulative CPU preemption stretches the wall-clock inference time beyond the hard real-time deadline, causing the system to drop frames or crash.
  napkin_math: |
    - **Accelerometer Load:** 100 Hz * 2 ms = 200 ms/s.
    - **Microphone Load:** (16,000 / 256) Hz * 0.1 ms = 62.5 Hz * 0.1 ms = 6.25 ms/s.
    - **Temperature Load:** 1 Hz * 0.5 ms = 0.5 ms/s.
    - **Total ISR Load:** 200 + 6.25 + 0.5 = 206.75 ms/s = 20.675% CPU utilization.
    - **Inference Stretch:** 30 ms / (1 - 0.20675) ≈ 37.8 ms.
    - **Conclusion:** **The 37.8 ms wall-clock inference meets a 25 Hz (40ms) deadline but misses a 30 Hz (33ms) deadline.**
  options:
  - ISR overhead is negligible because each ISR is short (0.1-2ms). The 30ms inference will always complete within its deadline.
  - 'Total ISR load: accel (100 x 2ms = 200ms/s) + mic DMA (62.5 x 0.1ms = 6.25ms/s) + temp (1 x 0.5ms = 0.5ms/s) = 206.75ms/s = 20.7% CPU. ISR preemption stretches 30ms inference to ~37.8ms (30 / (1 - 0.207)). At 25 Hz (40ms deadline): OK. At 30 Hz (33ms deadline): MISS by 4.8ms. The accelerometer ISR dominates — move it to DMA + polling to reclaim 200ms/s of CPU time.'
  - The microphone DMA ISR is the bottleneck because it fires 16,000 times per second, consuming 1.6 seconds of CPU time per second — more than 100% utilization.
  - ISR overhead is exactly 3ms per inference (100 ISRs x 0.03ms average) because ISRs fire uniformly distributed in time and each one adds a fixed 30us context switch cost.
  correct_index: 1
