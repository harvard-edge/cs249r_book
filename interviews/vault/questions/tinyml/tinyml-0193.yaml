title: The Energy Cost of Privacy
scenario: You are designing a battery-powered smart doorbell. When motion is detected, it can either (A) run a local person-detection model on its Cortex-M4 MCU (168MHz) for 1 second, or (B) wake its WiFi radio and transmit a 100KB image to the cloud, which takes 1 second.
question: For the purpose of total device energy consumption, which of these two operations is more expensive?
details:
  realistic_solution: Transmitting the image over WiFi is far more expensive. A typical MCU's active power is orders of magnitude lower than a WiFi radio's transmission power. The radio's energy consumption dominates the on-device compute energy by about 20x.
  common_mistake: |
    **The Pitfall:** Assuming ML compute is always the power bottleneck.
    **The Rationale:** Engineers new to embedded systems focus entirely on FLOPs and ignore peripheral power costs.
    **The Consequence:** They offload to the cloud to "save power" but instead dramatically decrease battery life.
  napkin_math: |
    **Assumptions & Constraints:**
    - Local Inference: 1s at 50 mW.
    - WiFi Transmission: 1s at 1000 mW (1 W) for 100 KB.

    **Calculations:**
    - Local Energy: 50 mW * 1 s = 50 mJ.
    - Cloud Tx Energy: 1000 mW * 1 s = 1000 mJ.
    - Ratio: 1000 mJ / 50 mJ = 20x.

    **Conclusion & Interpretation:**
    - **Result: 20x more expensive (I/O-Bound)**. Wireless communication completely dominates the budget, making the cloud approach fundamentally I/O-bound for energy.
  options:
  - 'Running the model locally is more expensive; ML compute is always the bottleneck.'
  - 'The energy costs are roughly equal.'
  - 'Transmitting the image is ~20x more expensive.'
  - 'Transmitting the image is over 1,000x more expensive.'
