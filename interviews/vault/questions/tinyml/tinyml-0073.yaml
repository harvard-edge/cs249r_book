title: Secure Boot Chain for ML Models
scenario: Your company ships a medical wearable running a cardiac arrhythmia detection model on an STM32U5 (Cortex-M33 with TrustZone, 160 MHz, 2 MB flash, 786 KB SRAM). Regulatory compliance (IEC 62443) requires that only authenticated firmware and models can execute on the device. An attacker who gains physical access must not be able to replace the model with a malicious one.
question: How should an STM32U5 TrustZone wearable authenticate both firmware and cardiac model weights at boot?
details:
  realistic_solution: 'The secure boot chain must cover firmware AND model weights as separate signed artifacts. Boot sequence: (1) ROM bootloader verifies Stage 1 bootloader signature using OTP-fused public key. (2) Stage 1 verifies application firmware signature (RSA-2048, 82ms with HW crypto). (3) Application verifies model hash (SHA-256 of weights in flash) against a signed manifest. This prevents model-only tampering — an attacker can''t swap in a model that always reports ''normal rhythm.'' Total boot overhead: 82ms. Runtime integrity: re-hash a random 4 KB page every inference (0.38ms, 0.038% CPU). Attack cost: requires the private signing key, never stored on-device.'
  common_mistake: |
    **The Pitfall:** Enabling Secure Boot for the firmware but ignoring the model weights.
    **The Rationale:** Engineers often equate "firmware" with the entire system state, forgetting that ML models are often stored as separate binary blobs in flash.
    **The Consequence:** An attacker can flash a malicious model (e.g., one that always outputs "normal rhythm") while leaving the signed firmware intact, completely bypassing the security mechanism.
  napkin_math: |
    - **Boot Time Budget:** 82 ms (Hardware Crypto).
    - **Storage Overhead:** 256 B (FW Signature) + 256 B (Model Signature) + 32 B (SHA-256 Hash) = 544 bytes.
    - **Runtime Integrity (4KB page):** SHA-256 of 4 KB = 4,096 * 15 cycles / 160 MHz = 0.38 ms.
    - **CPU Overhead at 1 Hz:** 0.38 ms / 1000 ms = 0.038%.
    - **Conclusion:** **A separate model manifest and a 0.038% CPU overhead runtime hash check guarantees model integrity against physical attackers.**
