title: Secure Boot Chain for ML Models
scenario: Your company ships a medical wearable running a cardiac arrhythmia detection model on an STM32U5
  (Cortex-M33 with TrustZone, 160 MHz, 2 MB flash, 786 KB SRAM). Regulatory compliance (IEC 62443) requires
  that only authenticated firmware and models can execute on the device. An attacker who gains physical
  access must not be able to replace the model with a malicious one. Design the secure boot chain.
question: "How should an STM32U5 TrustZone wearable authenticate both firmware and cardiac model weights at boot?"
details:
  realistic_solution: 'The secure boot chain must cover firmware AND model weights as separate signed
    artifacts. Boot sequence: (1) ROM bootloader verifies Stage 1 bootloader signature using OTP-fused
    public key. (2) Stage 1 verifies application firmware signature (RSA-2048, 82ms with HW crypto). (3)
    Application verifies model hash (SHA-256 of weights in flash) against a signed manifest. This prevents
    model-only tampering — an attacker can''t swap in a model that always reports ''normal rhythm.'' Total
    boot overhead: 82ms. Runtime integrity: re-hash a random 4 KB page every inference (0.38ms,
    0.038% CPU). Attack cost: requires the private signing key, never stored on-device.'
  common_mistake: '"Enable Secure Boot and sign the firmware." This protects the firmware but not the
    model weights, which are stored separately in flash. An attacker could replace the model weights (e.g.,
    a model that always reports "normal rhythm") without touching the signed firmware, and the device
    would boot successfully with a compromised model.'
  napkin_math: 'Boot time budget: 82 ms (with HW crypto) or 280 ms (SW only). Flash overhead: 256 B RSA
    signature per firmware slot + 256 B per model slot + 32 B SHA-256 hash per model = 544 bytes. Key
    storage: 256 B public key in secure OTP. Runtime integrity check: SHA-256 of 4 KB page = 4,096 × 15
    / 160M = 0.38 ms every inference. At 1 inference/second: 0.38 ms per verification / 1000 ms = 0.038%
    CPU overhead. Attack cost to bypass: requires extracting the private key (stored only on the signing
    server, never on the device) or finding a SHA-256 collision (infeasible).'
