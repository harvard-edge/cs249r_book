title: Evaluating End-to-End Latency Tradeoffs on Cortex-M4
scenario: 'You are deploying a keyword spotting (KWS) system on an ARM Cortex-M4 (STM32F4) microcontroller
  operating at 168 MHz with 256 KB SRAM and 1 MB flash. The system continuously samples audio at 16 kHz.
  You have two proposed pipelines: Pipeline A uses a complex MFCC feature extractor taking 15 ms, followed
  by a small 100K INT8 MAC depthwise-separable CNN. Pipeline B uses a simple FFT taking 5 ms, followed
  by a larger 500K INT8 MAC standard CNN. Without an FPU, the DSP operations rely heavily on fixed-point
  math, while the neural network leverages the CMSIS-NN SIMD instructions (2x INT8 MACs/cycle). Which
  pipeline provides better end-to-end latency, and how do the preprocessing and inference components contribute
  to the total time?'
details:
  realistic_solution: Pipeline B is the superior choice for overall latency. Although Pipeline A has a
    much smaller neural network, the complex MFCC preprocessing without an FPU is extremely slow, negating
    the inference speedup. On the Cortex-M4, the CMSIS-NN library highly optimizes INT8 MAC operations
    utilizing the SIMD capabilities, meaning inference for the larger CNN is still remarkably fast. Therefore,
    shifting the computational burden from FPU-starved preprocessing to SIMD-accelerated inference yields
    a lower end-to-end latency.
  common_mistake: Candidates often focus solely on the MAC count of the neural network, assuming the smaller
    CNN in Pipeline A will automatically result in lower total latency. They frequently underestimate
    the severe latency penalty of complex preprocessing steps (like MFCCs) on an MCU lacking a hardware
    FPU.
  napkin_math: 'For Pipeline A: Preprocessing = 15 ms. Inference = 100,000 MACs. With CMSIS-NN on Cortex-M4
    (2 MACs/cycle) at 168 MHz: (100,000 / 2) cycles = 50,000 cycles. Time = 50,000 / 168,000 cycles/ms
    ≈ 0.3 ms. Total Pipeline A Latency = 15.3 ms. For Pipeline B: Preprocessing = 5 ms. Inference = 500,000
    MACs. Cycles = 250,000. Time = 250,000 / 168,000 cycles/ms ≈ 1.5 ms. Total Pipeline B Latency = 6.5
    ms. Pipeline B is over 2x faster end-to-end.'
