title: The Requantization Shift
scenario: On a microcontroller, you've just performed a convolution and have a 32-bit accumulator value. To pass this to the next INT8 layer, you must requantize it. You've already multiplied the accumulator by the requantization scale `M`.
question: What is the final arithmetic operation needed to produce the final INT8 value, `q_out`, before saturation?
details:
  realistic_solution: The correct final step is to **add the zero-point of the output tensor** (`Z_out`) to the scaled value. This correctly shifts the scaled result into the target data type's range before the final saturation and cast to INT8.
  common_mistake: |
    **The Pitfall:** Forgetting the zero-point adjustment or subtracting it instead of adding it.
    **The Rationale:** Engineers often conceptualize quantization purely as scaling, forgetting that it is fundamentally an affine transformation mapping real values to an asymmetrical integer space.
    **The Consequence:** The quantized output range is incorrectly shifted, leading to catastrophic accuracy loss during inference.
  napkin_math: |
    - **Formula**: `q_out = clamp(round(q_acc × M) + Z_out, -128, 127)`
    - **Example Variables**: `q_acc` = 50,000, `M` = 0.001, `Z_out` = -10.
    - **Scaling**: 50,000 × 0.001 = 50.
    - **Zero-Point Addition**: 50 + (-10) = 40.
    - **Final Output**: **40**.
  options:
  - Subtract the output zero-point (`Z_out`)
  - No operation is needed, just cast to INT8
  - Add the output zero-point (`Z_out`)
  - Multiply by the output zero-point (`Z_out`)
  correct_index: 2
