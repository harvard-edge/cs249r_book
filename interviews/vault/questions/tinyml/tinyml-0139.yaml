title: The Requantization Shift
scenario: On a microcontroller, you've just performed a convolution and have a 32-bit accumulator value.
  To pass this to the next INT8 layer, you must requantize it. You've already multiplied the accumulator
  by the requantization scale `M`. What is the final arithmetic operation needed to produce the final
  INT8 value, `q_out`, before saturation?
details:
  realistic_solution: The correct final step is to **add the zero-point of the output tensor** (`Z_out`)
    to the scaled value. This correctly shifts the scaled result into the target data type's range before
    the final saturation and cast to INT8.
  common_mistake: Engineers often forget that quantization is not just about scaling; it's an affine transformation.
    They either omit the zero-point adjustment entirely or subtract it instead of adding it, which incorrectly
    shifts the quantized output range and leads to catastrophic accuracy loss.
  napkin_math: 'The requantization formula mapping a 32-bit accumulator back to an 8-bit integer is: q_out
    = clamp(round(q_acc * M) + Z_out, -128, 127). Given q_acc = 50,000, scale M = 0.001, and next layer
    zero-point Z_out = -10: q_out = 50,000 * 0.001 = 50. Add zero-point: 50 + (-10) = 40. The final 8-bit
    activation passed is 40.'
  options:
  - Subtract the output zero-point (`Z_out`)
  - No operation is needed, just cast to INT8
  - Add the output zero-point (`Z_out`)
  - Multiply by the output zero-point (`Z_out`)
  correct_index: 2
