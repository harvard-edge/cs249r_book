title: 'The Microcontroller''s Memory Wall: MCU Compute Constraints'
scenario: You are optimizing a small keyword-spotting model for a Cortex-M4 microcontroller. Based on
  the fundamental architectural trade-offs of this class of device, would you generally expect the model's
  performance to be compute-bound or memory-bound?
details:
  realistic_solution: The model's performance will almost certainly be compute-bound. A Cortex-M4 microcontroller
    has a very low 'ridge point' on a roofline plot (around 0.28 Ops/Byte), meaning its ratio of compute
    to memory bandwidth is tiny. Because typical neural network layers (like convolutions) have arithmetic
    intensities well above 0.28 Ops/Byte, they quickly hit the compute ceiling (336 MFLOPS) before exhausting
    the memory bandwidth. Operations will be spent saturating the ALU, not waiting for SRAM.
  common_mistake: 'Engineers often assume that microcontrollers, having low memory bandwidth, must be
    memory-bound for all tasks. They overlook the roofline model: because the MCU''s compute ceiling (MFLOPS)
    is even lower relative to its bandwidth (yielding a low ridge point), standard neural network layers
    easily become compute-bound.'
  napkin_math: The hardware constants reveal the story. A Cortex-M4 has ~336 MFLOPS (3.36e8 FLOPS) of
    compute but only ~1.2 GB/s (1.2e9 Bytes/s) of memory bandwidth. This gives it a hardware arithmetic
    intensity limit (the 'Ridge Point') of approximately 0.28 Ops/Byte. Since most neural network layers
    have an arithmetic intensity significantly higher than this (i.e., they perform many operations per
    byte loaded), they are compute-bound, bottlenecked by the processor's MFLOPS limit, not the memory
    system.
  options:
  - Compute-bound, because the typical arithmetic intensity of neural network layers is higher than the
    microcontroller's low ridge point.
  - Memory-bound, because the chip's memory bandwidth is very low compared to its processing speed.
  - Power-bound, because the device has a strict thermal design power (TDP) of a few milliwatts.
  - It depends entirely on whether the model uses depthwise or standard convolutions.
