title: 'The Microcontroller''s Memory Wall: MCU Compute Constraints'
scenario: 'You are optimizing a small keyword-spotting model for a Cortex-M4 microcontroller.'
question: 'Based on the fundamental architectural trade-offs of this class of device, would you generally expect the model''s performance to be compute-bound or memory-bound?'
details:
  realistic_solution: 'The model''s performance will almost certainly be compute-bound. A Cortex-M4 microcontroller has a very low ridge point on a roofline plot (around 0.28 Ops/Byte), meaning its ratio of compute to memory bandwidth is tiny. Because typical neural network layers (like convolutions) have arithmetic intensities well above 0.28 Ops/Byte, they quickly hit the compute ceiling (336 MFLOPS) before exhausting the memory bandwidth. Operations will be spent saturating the ALU, not waiting for SRAM.'
  common_mistake: |
    **The Pitfall:** Assuming microcontrollers are memory-bound.
    **The Rationale:** Engineers know MCUs have low memory bandwidth and assume this makes them memory-bound for all tasks.
    **The Consequence:** They optimize for memory accesses instead of maximizing ALU saturation and MAC throughput, wasting optimization effort.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak Compute: 336 MFLOPS (3.36e8 FLOPS).
    - Memory Bandwidth: ~1.2 GB/s.

    **Calculations:**
    - Ridge Point: 336 MFLOPS / 1.2 GB/s = 0.28 Ops/Byte.
    - Neural Network Arithmetic Intensity: Typical layers (like Convolutions) have an intensity > 1.0 Ops/Byte.

    **Conclusion & Interpretation:**
    - **Result: 0.28 Ops/Byte (Compute-Bound)**. Since arithmetic intensity > Ridge Point, the model will saturate the ALU before exhausting memory bandwidth.
  options:
  - 'Compute-bound, because the typical arithmetic intensity of neural network layers is higher than the microcontroller''s low ridge point.'
  - 'Memory-bound, because the chip''s memory bandwidth is very low compared to its processing speed.'
  - 'Power-bound, because the device has a strict thermal design power (TDP) of a few milliwatts.'
  - 'It depends entirely on whether the model uses depthwise or standard convolutions.'
