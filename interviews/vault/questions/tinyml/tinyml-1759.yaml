title: Wake-up Transition Overhead in Audio Duty Cycling
scenario: A smart earbud uses a Cortex-M4 to run a wake-word detector on 16 kHz audio.
  The MCU takes 10 ms to process a 1-second buffer and consumes 5 mW active, 0.1 mW
  asleep.
question: Analyze the energy per second if the MCU wakes up every 250 ms to process
  a 250 ms chunk versus waiting a full 1 second to process the whole buffer.
details:
  realistic_solution: Processing a 250ms chunk takes 2.5ms active time. Waking up
    4 times a second yields 10ms active time total, the same compute duration as a
    1-second buffer. However, 4 wake-up transition overheads (e.g., PLL lock time
    and power rail stabilization) add hidden active power, making the 1-second buffer
    more energy-efficient.
  common_mistake: Concluding the energy is mathematically identical without accounting
    for the hardware wake-up transition overheads.
  napkin_math: (10ms * 5mW) + (990ms * 0.1mW) = 0.149 mJ base energy without transitions.
