title: 'Wake-up Transition Overhead in Audio Duty Cycling'
scenario: 'A smart earbud uses a Cortex-M4 to run a wake-word detector on 16 kHz audio. The MCU takes 10 ms to process a 1-second buffer and consumes 5 mW active, 0.1 mW asleep.'
question: 'What is the energy tradeoff when processing 250 ms chunks versus a full 1-second buffer?'
details:
  realistic_solution: |
    Process the full 1-second buffer. While base mathematical active compute time is identical, aggressive micro-chunking incurs hidden hardware transition penalties (PLL lock, power rail stabilization) 4x as often, worsening total energy.
  common_mistake: |
    **The Pitfall:** Concluding both approaches consume identically low energy.
    **The Rationale:** Candidates perform basic arithmetic without considering hardware state-transition physics.
    **The Consequence:** The deployed duty-cycling strategy unknowingly burns massive battery stabilizing power rails.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute: 10ms at 5mW/sec; Sleep: 0.1mW
    - Wake-up transition overhead adds fixed active current spikes

    **Calculations:**
    - Base Energy (both) = (10ms * 5mW) + (990ms * 0.1mW) = 0.149 mJ
    - 250ms chunks = 4 Wakeups/sec
    - 1s buffer = 1 Wakeup/sec
    - Total Energy = 0.149 mJ + (Wakeups * Overhead Penalty)

    **Conclusion & Interpretation:**
    - **Result: 1-second buffer wins (Power-Bound)**. Minimizing hardware transition cycles is critical for ultra-low-power.
