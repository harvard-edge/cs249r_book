title: Wake-up Transition Overhead in Audio Duty Cycling
scenario: A smart earbud uses a Cortex-M4 to run a wake-word detector on 16 kHz audio. The MCU takes 10 ms to process a 1-second buffer and consumes 5 mW active, 0.1 mW asleep.
question: What is the energy per second when processing 250 ms chunks versus a full 1-second buffer?
details:
  realistic_solution: Processing a 250ms chunk takes 2.5ms active time. Waking up 4 times a second yields 10ms active time total, the same compute duration as a 1-second buffer. However, 4 wake-up transition overheads (e.g., PLL lock time and power rail stabilization) add hidden active power, making the 1-second buffer more energy-efficient.
  common_mistake: |
    **The Pitfall:** Concluding both approaches consume identical energy.
    **The Rationale:** Candidates mathematically calculate the active and sleep times as identical across the 1-second window.
    **The Consequence:** They fail to account for hardware wake-up transition overheads, leading to suboptimal duty-cycling strategies.
  napkin_math: |
    *   **1-second buffer**: 10 ms active at 5 mW + 990 ms asleep at 0.1 mW = 0.05 mJ + 0.099 mJ = 0.149 mJ.
    *   **250 ms chunk**: 2.5 ms active at 5 mW + 247.5 ms asleep at 0.1 mW. Waking 4 times a second yields the same base energy.
    *   **Overhead**: Each of the 4 wake-ups incurs transition overhead (PLL lock, power rail stabilization).
    *   **Conclusion**: **The 1-second buffer is more energy-efficient due to fewer wake-up transitions.**
