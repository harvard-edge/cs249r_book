math_issues:
- 'Inconsistent KB math leading to a false conclusion: 64*64*16*4 bytes = 262,144 bytes, which is exactly
  256 KB (using 1024 bytes per KB), not 262 KB. This means the tensor uses exactly half of the 512 KB
  SRAM, not ''more than half''. Similarly, 65,536 bytes is exactly 64 KB, not 65.5 KB.'
