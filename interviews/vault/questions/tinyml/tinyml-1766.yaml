title: Preventing SD Corruption in TinyML Checkpoints
scenario: A wildlife camera trap using a Cortex-M4 saves its inference state to an
  SD card periodically. Corrupted SD cards are frequently reported after power loss.
question: Diagnose why SD card corruption occurs during checkpointing and propose
  a hardware/software mitigation.
details:
  realistic_solution: SD cards use NAND flash that requires atomic block erases, and
    power loss during a long write cycle corrupts the entire block. To fix this, add
    a small supercapacitor to hardware to flush the buffer on power failure, or use
    a journaling file system/append-only log in software.
  common_mistake: Assuming standard FAT32 writes are safe against tearing during a
    power failure.
  napkin_math: 200e-6 write time > 10e-6 power loss window
