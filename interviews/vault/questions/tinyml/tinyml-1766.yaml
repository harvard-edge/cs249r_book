title: Preventing SD Corruption in TinyML Checkpoints
scenario: A wildlife camera trap using a Cortex-M4 saves its inference state to an SD card periodically. Corrupted SD cards are frequently reported after power loss.
question: Diagnose why SD card corruption occurs during checkpointing and propose a hardware/software mitigation.
details:
  realistic_solution: SD cards use NAND flash that requires atomic block erases, and power loss during a long write cycle corrupts the entire block. To fix this, add a small supercapacitor to hardware to flush the buffer on power failure, or use a journaling file system/append-only log in software.
  common_mistake: |
    **The Pitfall:** Assuming standard FAT32 writes are safe against tearing during a power failure.
    **The Rationale:** Candidates overlook that SD cards use NAND flash requiring atomic block erases that take significant time.
    **The Consequence:** Power loss during a long write cycle irreversibly corrupts the entire memory block.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Write Medium: SD Card (NAND flash).
       - Failure Mode: Power loss during block erase/write.
    2. **Calculations:**
       - Block Write Time: ~200 µs.
       - Power Loss Window: ~10 µs.
       - Write vulnerability: 200 µs > 10 µs.
    3. **Conclusion & Interpretation:**
       - **Result: Logic-Bound** (Hardware supercapacitors or append-only software logs are required to bridge the 200 µs write vulnerability).
