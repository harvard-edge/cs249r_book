title: 'TinyML TCO Specification: Design TinyML Fleet Budget for Healthcare'
scenario: 'You need to specify a TinyML fleet budget for a hospital deploying 200 patient vital sign monitors (Cortex-M7+Ethos-U55, $12) with medical-grade requirements. Costs include FDA 510(k) clearance ($150K), IEC 62304 compliance software development ($200K), and a 5-year FDA-mandated maintenance contract ($30K/yr). You must include hardware, development, regulatory, operations, and clinical validation ($50K) in the total 5-year budget.'
question: 'What five-year budget should a hospital plan for 200 regulated TinyML vital sign monitors, and what dominates the cost?'
details:
  realistic_solution: 'Hardware: 200*$12=$2,400. Development: firmware=$200K + algorithm=$100K = $300K. Regulatory: FDA 510(k)=$150K + ISO 13485 QMS=$50K + IEC 62304 docs=$50K=$250K. Clinical validation: $50K. Annual maintenance (regulatory-mandated): $30K*5=$150K. Cloud backend (HIPAA-compliant): $5K/yr*5=$25K. Staff training: $20K. Monitoring + calibration: $10K/yr*5=$50K. Total 5yr: $2.4K+$300K+$250K+$50K+$150K+$25K+$20K+$50K=$847.4K. Per device 5yr: $4,237. Hardware is 0.3% of total cost! Regulatory dominates at 29.5%. Most expensive: compliant software development ($300K = 35.4%). Medical TinyML is fundamentally different economics from industrial TinyML.'
  common_mistake: 'Treating medical TinyML as regular IoT without accounting for regulatory costs (FDA clearance) and mandatory quality system requirements (IEC 62304, ISO 13485) that typically cost 5-10x hardware cost.'
  napkin_math: |
    **Assumptions & Constraints:**
    - 200 monitors, 5-year budget. Hardware: $12/unit.
    - Development, regulatory, and maintenance are mandatory.

    **Calculations:**
    - Hardware: 200 * $12 = $2,400.
    - Development & Maintenance: $300K + $150K = $450K.
    - Regulatory & Clinical: $250K + $50K = $300K.
    - Backend, Training, Ops: $25K + $20K + $50K = $95K.
    - Total: $847.4K.

    **Conclusion & Interpretation:**
    - **Result: $4,237/unit (Economics Bound)**. Regulatory and software compliance overhead completely dominate the fleet cost, eclipsing the raw hardware cost by hundreds of times.
