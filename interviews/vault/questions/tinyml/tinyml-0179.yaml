title: The TinyML Fleet TCO Trap
scenario: You are designing a system with one million battery-powered smart sensors
  deployed across a city. Each device costs $5.
question: What cost dominates the 5-year Total Cost of Ownership (TCO) of this massive
  fleet, despite the $5 hardware per device?
details:
  realistic_solution: The recurring data connectivity cost for Over-the-Air (OTA)
    updates and data uplink. While each microcontroller is cheap, the cumulative cost
    of a cellular data plan for one million devices over several years vastly exceeds
    the initial hardware purchase price.
  common_mistake: '**The Pitfall:** Focusing on the upfront hardware cost (Capital
    Expenditure).

    **The Rationale:** Engineers accustomed to datacenter economics often underestimate
    how operational costs (like data plans) scale for massive fleets of low-cost devices.

    **The Consequence:** The project severely underbudgets for operational expenses,
    leading to massive cost overruns over the product lifecycle.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Devices: 1,000,000.

    - Hardware cost: $5 per device.

    - Data rate: 10 KB/day per device.

    - Cellular data cost: $1.00 per MB.

    - Duration: 5 years (1,825 days).


    **Calculations:**

    - CapEx: 1,000,000 * $5 = $5,000,000.

    - Daily data volume: 1,000,000 * 10 KB = 10,000 MB.

    - Daily data cost: 10,000 MB * $1.00 = $10,000.

    - 5-year OpEx: 1,825 days * $10,000 = $18,250,000.


    **Conclusion & Interpretation:**

    - **Result: $18.25M (Cost-Bound)**. The recurring data cost ($18.25M) is more
    than triple the initial hardware cost ($5M).

    '
  options:
  - The initial hardware purchase price (CapEx)
  - The cumulative electricity cost for power consumption
  - Recurring data connectivity for OTA updates and telemetry
  - Cloud-side data storage and processing
