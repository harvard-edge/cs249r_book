title: The TinyML Fleet TCO Trap
scenario: You are designing a system with one million battery-powered smart sensors deployed across a
  city. Each device costs $5. For this massive fleet, identify the most significant contributor to its
  Total Cost of Ownership (TCO) over a 5-year lifespan.
details:
  realistic_solution: The recurring data connectivity cost for Over-the-Air (OTA) updates and data uplink.
    While each microcontroller is cheap, the cumulative cost of a cellular data plan for one million devices
    over several years vastly exceeds the initial hardware purchase price. Fleet management and updates
    are an operational nightmare and a huge cost center.
  common_mistake: Focusing on the upfront hardware cost (Capital Expenditure). Engineers accustomed to
    datacenter economics, where a single server costs thousands, often underestimate how operational costs
    (like data plans) dominate at the scale of a TinyML fleet, even when the per-device cost is low.
  napkin_math: 'Hardware cost: 1,000,000 devices * $5 = $5,000,000. Let''s calculate data cost: Assume
    each device sends 10KB/day over cellular IoT at $0.10 per MB. Daily data = 10,000,000 KB = 10 GB.
    Cost per day = 10,000 MB * $0.10 = $1,000. Over 5 years (1,825 days): 1,825 * $1,000 = $1,825,000.
    Data is a huge recurring TCO factor compared to hardware.'
  options:
  - The initial hardware purchase price (CapEx)
  - The cumulative electricity cost for power consumption
  - Recurring data connectivity for OTA updates and telemetry
  - Cloud-side data storage and processing
