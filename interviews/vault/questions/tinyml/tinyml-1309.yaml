title: 'Designing a Static Tensor Arena for Wake-Word CNN'
scenario: 'You are deploying a quantized wake-word detection model onto an STM32F4 (168 MHz) with 256 KB of SRAM and 1 MB of flash, relying on CMSIS-NN SIMD.'
question: 'How should the static memory allocation be designed to fit the tensor arena in SRAM and handle model parameters?'
details:
  realistic_solution: |
    Allocate a single contiguous static tensor arena in SRAM sized to the maximum sum of adjacent layer activations. Compile the weights directly into the 1 MB flash memory as read-only data (XIP), entirely bypassing SRAM for parameter storage.
  common_mistake: |
    **The Pitfall:** Relying on dynamic memory allocation (`malloc`) or copying weights to SRAM.
    **The Rationale:** Candidates rely on standard OS paradigms and fail to leverage Execute-in-Place (XIP) flash memory.
    **The Consequence:** Heap fragmentation causes unpredictable OOM crashes, or SRAM is artificially exhausted by storing static weights.
  napkin_math: |
    **Assumptions & Constraints:**
    - Max adjacent activations (e.g., Layer A + B) = 100 KB + 120 KB = 220 KB
    - Model weights: 800 KB (INT8)
    - Hardware: 256 KB SRAM, 1 MB Flash

    **Calculations:**
    - SRAM Used = 220 KB (Activations)
    - SRAM Free = 256 KB - 220 KB = 36 KB
    - Flash Used = 800 KB (Weights)
    - Flash Free = 1024 KB - 800 KB = 224 KB

    **Conclusion & Interpretation:**
    - **Result: 36 KB SRAM margin (Memory-Bound)**. Static allocation reliably fits the activations while XIP safely stores weights.
