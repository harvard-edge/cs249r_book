title: Designing a Static Tensor Arena for Wake-Word CNN
scenario: You are tasked with deploying a quantized wake-word detection model onto an ARM Cortex-M4 (STM32F4) microcontroller operating at 168 MHz. The device has strict memory constraints with 256 KB of SRAM and 1 MB of flash, and relies on CMSIS-NN SIMD (2x INT8 MACs/cycle) since there is no FPU.
question: How should the static memory allocation be designed to fit the tensor arena in SRAM and handle model parameters?
details:
  realistic_solution: The correct approach involves static memory planning to create a single contiguous tensor arena in SRAM for all intermediate activations. Since memory is only needed for the inputs and outputs of the currently executing operator, the arena size is determined by the maximum sum of adjacent layer activation sizes across the network. Weights and biases must be compiled directly into the 1 MB flash memory as read-only data, preserving the limited SRAM.
  common_mistake: |
    **The Pitfall:** Proposing dynamic memory allocation or moving weights to SRAM.
    **The Rationale:** Candidates assume dynamic allocation is standard, failing to realize fragmentation risks on bare-metal MCUs. They also forget weights are read-only and can stay in flash.
    **The Consequence:** The model is incorrectly deemed too large to fit, or the proposed solution incurs massive latency and fragmentation overhead.
  napkin_math: |
    *   **Activation Memory**: Layer A produces 100 KB, Layer B produces 120 KB. To compute Layer B, both must coexist, requiring a peak of 220 KB of SRAM.
    *   **Remaining SRAM**: Out of 256 KB total SRAM, 256 KB - 220 KB = 36 KB is left for the RTOS, stack, and application state.
    *   **Model Weights**: **The 800 KB of INT8 weights fit safely within the 1 MB flash memory as read-only data.**
