title: The OTA Flash Budget
scenario: You are planning the firmware for a new TinyML device with 1MB of Flash. You must allocate budgets for the bootloader, RTOS, Over-the-Air (OTA) update partition, and the ML model.
question: According to typical budget allocations, what is the approximate space available for your actual ML model?
details:
  realistic_solution: The available space is approximately 464 KB. A significant portion of the Flash must be reserved not just for the bootloader (~32KB) and RTOS (~64KB), but critically for an OTA partition (~450KB). This partition holds a copy of the current firmware, allowing the device to safely roll back if an update fails, which is a fundamental requirement for managing a fleet of devices and running A/B tests in production.
  common_mistake: |
    **The Pitfall:** Forgetting to budget for the Over-the-Air (OTA) update partition.
    **The Rationale:** Engineers new to embedded systems often only subtract the bootloader and RTOS sizes, failing to account for the dual-bank setup required for safe OTA rollbacks.
    **The Consequence:** The team overestimates available space by nearly 2x, potentially forcing a costly hardware re-spin late in the project when the model doesn't fit.
  napkin_math: |
    - **Total Flash:** 1,024 KB.
    - **Overhead:** Bootloader (~32 KB) + RTOS (~64 KB) = 96 KB.
    - **Remaining Flash:** 1,024 KB - 96 KB = 928 KB.
    - **OTA Dual-Bank:** 928 KB / 2 partitions = 464 KB per partition.
    - **Conclusion:** **Approximately 464 KB is available for the ML model and application code.**
  options:
  - Approximately 900 KB
  - Approximately 750 KB
  - Approximately 464 KB
  - Approximately 100 KB
  correct_index: 2
