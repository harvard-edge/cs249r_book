title: The Keyword Spotting Memory Blowout
scenario: You are designing a keyword spotting model for a new device powered by a Cortex-M4 with 256KB
  of SRAM. Your initial prototype uses a standard 2D convolution layer that takes a `16x16x32` input tensor
  and applies 64 `3x3` kernels (using FP32 precision) to produce a `16x16x64` output. This single layer
  is consuming too much of your SRAM budget just for its parameters. You propose replacing it with a depthwise
  separable convolution. To justify the change, demonstrate the parameter memory savings by calculating
  the memory footprint for the parameters of both the standard and the depthwise separable versions.
question: "What FP32 parameter memory savings result from replacing the standard 3x3 convolution with a depthwise separable convolution?"
details:
  realistic_solution: The correct approach is to calculate the parameter memory for both convolution types
    and compare them directly. The depthwise separable convolution breaks the operation into two smaller
    steps, drastically reducing the parameter count.
  common_mistake: Engineers often calculate the parameter count for only the first step (the depthwise
    filter) of a depthwise separable convolution, forgetting to include the second step (the 1x1 pointwise
    projection). This leads them to drastically underestimate the final parameter count and memory footprint.
  napkin_math: 'Standard Conv 3x3, 32→64: params=3*3*32*64=18,432. FP32: 18,432*4=72KB. DS-Conv: DW 3x3*32=288
    + PW 32*64=2,048=2,336 params. FP32: 9.1KB. Savings: 72→9.1KB=87% reduction (7.9x fewer). On 256KB
    SRAM, 72KB is 28% for one layer. DS uses 3.6%. Activation 16*16*64*4=65KB same for both.'
  options:
  - The standard convolution requires ~72 KB, while the depthwise separable version requires only ~1.1
    KB, an almost 66x reduction.
  - The device is compute-bound, not memory-bound. A Cortex-M4 cannot execute this many FLOPs, so changing
    convolution type is irrelevant.
  - The standard convolution requires ~72 KB for parameters, while the depthwise separable version requires
    ~9.1 KB, an almost 8x reduction.
  - The standard convolution requires ~18 KB. The depthwise separable version requires ~2.3 KB. The savings
    are not significant enough.
  correct_index: 2
