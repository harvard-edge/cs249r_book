title: The Keyword Spotting Memory Blowout
scenario: You are designing a keyword spotting model for a Cortex-M4 with 256KB of SRAM. Your initial prototype uses a standard 2D convolution layer that takes a 16x16x32 input tensor and applies 64 3x3 kernels (using FP32 precision) to produce a 16x16x64 output.
question: What FP32 parameter memory savings result from replacing the standard 3x3 convolution with a depthwise separable convolution?
details:
  realistic_solution: Decouple the spatial convolution from the cross-channel projection to minimize parameter size, drastically reducing the total MACs and memory required.
  common_mistake: |
    **The Pitfall:** Calculating the parameter count for only the first step (the depthwise filter) of a depthwise separable convolution.
    **The Rationale:** Forgetting to include the second step (the 1x1 pointwise projection), which often contains the majority of the parameters.
    **The Consequence:** Drastically underestimating the final parameter count and memory footprint, leading to broken memory budgets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Standard Conv: 16x16x32 input, 64 3x3 kernels.
       - Precision: FP32 (4 bytes per parameter).
    2. **Calculations:**
       - Standard Conv params: 3 * 3 * 32 * 64 = 18,432.
       - Standard Conv memory: 18,432 * 4 = 73,728 bytes (~72 KB).
       - DS-Conv params: (3 * 3 * 32) [depthwise] + (32 * 64) [pointwise] = 288 + 2048 = 2,336.
       - DS-Conv memory: 2,336 * 4 = 9,344 bytes (~9.1 KB).
    3. **Conclusion & Interpretation:**
       **Result: ~72 KB drops to ~9.1 KB (87% reduction).** The standard convolution is heavily **Parameter-Memory-Bound**, solved by DS-Conv decoupling.
  options:
  - The standard convolution requires ~72 KB, while the depthwise separable version requires only ~1.1 KB, an almost 66x reduction.
  - The device is compute-bound, not memory-bound. A Cortex-M4 cannot execute this many FLOPs, so changing convolution type is irrelevant.
  - The standard convolution requires ~72 KB for parameters, while the depthwise separable version requires ~9.1 KB, an almost 8x reduction.
  - The standard convolution requires ~18 KB. The depthwise separable version requires ~2.3 KB. The savings are not significant enough.
  correct_index: 2
