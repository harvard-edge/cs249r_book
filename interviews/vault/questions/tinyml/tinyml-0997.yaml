title: Pruning Pipeline Design for nRF5340
scenario: You are architecting the model optimization pipeline for a continuous vibration monitoring sensor powered by a Nordic nRF5340 (128 MHz app core, 256 KB SRAM, 1 MB flash, ~5mA active). Your baseline CNN exceeds available memory and execution time constraints.
question: "What pruning strategy should compress the nRF5340 vibration CNN while reducing both SRAM and latency, and how does it align with the MCU?"
details:
  realistic_solution: The correct design employs structured pruning (such as channel or block pruning) applied prior to deployment. By physically shrinking the dimensions of the weight matrices, structured pruning directly reduces both flash storage and SRAM activation buffers without requiring complex sparse runtime libraries.
  common_mistake: |
    **The Pitfall:** Candidates propose unstructured magnitude pruning to achieve high sparsity ratios like 80%.
    **The Rationale:** They incorrectly assume it yields a proportional reduction in memory and latency without considering hardware support.
    **The Consequence:** They introduce index storage overhead that bloats flash memory and irregular memory access patterns that destroy cache locality.
  napkin_math: |
    1. Assume baseline model: 350 KB SRAM (activations) and 800 KB flash (weights).
    2. Evaluate 50% unstructured sparsity (8-bit weights, 16-bit indices): (400 KB * 1) + (400 KB * 2) = 1.2 MB flash (exceeds 1 MB limit).
    3. Evaluate 40% structured pruning: Reduces SRAM proportionally: 350 KB * 0.6 = 210 KB (fits 256 KB limit) and flash to 480 KB.
    4. Compute reduction: For 10M MACs, compute drops to 6M.
    5. Estimate latency: At ~2 cycles/MAC on 128 MHz core, latency is (6M * 2) / 128 MHz = ~93.75 ms.
    6. **Final Result: 40% structured pruning safely fits the memory limits (210 KB SRAM) and achieves ~93.75 ms latency.**
