title: Pruning Pipeline Design for nRF5340
scenario: You are architecting the model optimization pipeline for a continuous vibration
  monitoring sensor powered by a Nordic nRF5340 (128 MHz app core, 256 KB SRAM, 1
  MB flash, ~5mA active). Your baseline CNN exceeds the available memory constraints
  and takes too long to execute, jeopardizing the strict battery life requirements.
  Design a comprehensive pruning strategy to compress this model, justifying your
  choice between structured and unstructured sparsity patterns and how your architecture
  specifically aligns with the MCU's capabilities.
question: What pruning strategy should compress the nRF5340 vibration CNN while reducing
  both SRAM and latency?
details:
  realistic_solution: The correct design employs structured pruning (such as channel
    or block pruning) applied prior to deployment. By physically shrinking the dimensions
    of the weight matrices, structured pruning directly reduces both flash storage
    and SRAM activation buffers without requiring complex sparse runtime libraries.
    The architecture should align pruned channel counts to multiples of 4 to leverage
    the SIMD instructions of the Cortex-M33, ensuring deterministic latency reduction.
  common_mistake: Candidates often propose unstructured magnitude pruning to achieve
    high sparsity ratios like 80%, incorrectly assuming it yields a proportional reduction
    in memory and latency. They fail to account for the lack of hardware sparse matrix
    support on the nRF5340, resulting in index storage overhead that bloats flash
    memory and irregular memory access patterns that destroy cache locality.
  napkin_math: 'Assume a baseline model requiring 350 KB SRAM (activations) and 800
    KB flash (weights). Using 50% unstructured sparsity (8-bit weights, 16-bit indices)
    uses: (400K * 1B) + (400K * 2B) = 1.2 MB flash, exceeding the 1 MB limit. Instead,
    40% structured pruning reduces SRAM proportionally: 350 KB * 0.6 = 210 KB (safely
    under the 256 KB limit) and flash to 480 KB. For 10M MACs, compute drops to 6M.
    At ~2 cycles/MAC on the 128 MHz app core, latency is (6M * 2) / 128MHz = ~93.75
    ms, allowing the device to return to sleep quickly to meet the ~5mA active profile.'
