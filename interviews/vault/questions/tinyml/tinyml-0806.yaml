title: Tinyml New 0030
scenario: >
  A model is trained on a typical x86 Linux machine. When deployed to a specific legacy DSP microcontroller, the model runs but outputs wildly incorrect predictions, acting as if it's untrained.
question: >
  What endianness mismatch can make weights trained on x86 produce nonsense on a legacy DSP microcontroller?
details:
  realistic_solution: >
    The system is suffering from an endianness mismatch. x86 machines use Little-Endian, but the legacy DSP uses Big-Endian architecture. When the model weights (binary floats or ints) are read by the DSP, the byte order is reversed, turning perfectly valid weights into effectively random noise. Ensure the export script serializes weights matching the target hardware's endianness.
  common_mistake: |
    **The Pitfall:** Overlooking fundamental hardware bit-level architecture differences between the training cloud and the edge device.
    **The Rationale:** ML engineers often assume deployment targets use the same Little-Endian architecture as modern CPUs/GPUs.
    **The Consequence:** The model fails silently with 0% accuracy, and teams waste time debugging the model architecture rather than the deployment pipeline.
  napkin_math: |
    - **FP32 1.0:** In hex, 1.0 is `0x3F800000`.
    - **Little-Endian:** x86 stores this as `00 00 80 3F`.
    - **Big-Endian Read:** A Big-Endian DSP reads those bytes exactly as `0x0000803F`, which equals 4.6e-41.
    - **Conclusion:** The weight is effectively zeroed out, completely destroying the neural network layer.
