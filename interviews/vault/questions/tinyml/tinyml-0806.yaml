title: Tinyml New 0030
scenario: A model is trained on a typical x86 Linux machine. When deployed to a specific legacy DSP microcontroller,
  the model runs but outputs wildly incorrect predictions, acting as if it's untrained.
question: "What endianness mismatch can make weights trained on x86 produce nonsense on a legacy DSP microcontroller?"
details:
  realistic_solution: The system is suffering from an endianness mismatch. x86 machines use Little-Endian,
    but the legacy DSP uses Big-Endian architecture. When the model weights (binary floats or ints) are
    read by the DSP, the byte order is reversed, turning perfectly valid weights into effectively random
    noise. Ensure the export script serializes weights matching the target hardware's endianness.
  common_mistake: Overlooking fundamental hardware bit-level architecture differences between the training
    cloud and the edge device.
  napkin_math: 'FP32 1.0 = 0x3F800000. In Little-Endian binary: 00 00 80 3F. A Big-Endian DSP reads those
    bytes as 0x0000803F, which equals 4.6e-41. The weight is effectively zeroed out, destroying the layer.'
