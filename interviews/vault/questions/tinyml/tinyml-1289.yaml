title: 'Dataset Specification for Constrained INT8 Acoustic Models'
scenario: 'You are tasked with specifying the dataset curation and labeling pipeline for an acoustic anomaly detection model targeting an ARM Cortex-M7 + Ethos-U55 (Corstone-300) system. The hardware has a strict limit of 512 KB shared SRAM, meaning the model must be heavily quantized to INT8 to fit and to leverage the NPU''s MAC array. Given the extremely constrained capacity of the final model, design a dataset selection and active learning strategy that balances diverse background noises against the severe risk of underfitting.'
question: 'How do you specify the curation workflow to ensure the resulting dataset yields a robust INT8-quantized model optimized for the Ethos-U55?'
details:
  realistic_solution: 'The workflow should specify a targeted active learning loop that prioritizes hard negatives only if they frequently trigger false positives in the target environment, avoiding adding all possible noise types. The annotation specification must include strict event boundaries to maximize information density per frame. Crucially, the pipeline must automatically isolate a strictly balanced offline calibration dataset (e.g., 100-500 samples) that perfectly matches the deployment distribution to ensure the Vela compiler calculates optimal INT8 activation ranges for the Ethos-U55.'
  common_mistake: 'Candidates often propose massive, highly diverse datasets typical of cloud ML, ignoring that a deeply constrained INT8 model lacks the capacity to learn overly complex, noisy distributions, leading to severe underfitting. They also frequently overlook the need to curate a highly specific, strictly balanced calibration subset for the offline quantization process.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: ARM Cortex-M7 + Ethos-U55 with 512 KB shared SRAM.
    - INT8 model footprint target: 350 KB (250 KB weights, 100 KB activations).
    - Target throughput: 122.8 GMAC/s peak.

    **Calculations:**
    - 1-second 16kHz audio sample size: 32 KB.
    - Calibration dataset size (500 samples): 500 * 32 KB = 16 MB.
    - Inference Execution Time (10M MAC model): 10M / 122.8 GMAC/s = ~0.08 ms.

    **Conclusion & Interpretation:**
    - **Result: 16 MB dataset (Memory-Capacity-Bound)**. Inference is overwhelmingly memory-bound by the 512 KB limit, demanding a small, highly specific calibration dataset.
