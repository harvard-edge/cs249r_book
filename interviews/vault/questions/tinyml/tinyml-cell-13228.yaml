title: Optimize Prefill Batching on Ethos-U55 for Batch Documents
scenario: 'An industrial edge device processes sensor event logs: 8 events arrive simultaneously every
  500ms, each requiring transformer encoding (prefill) of 64 tokens. The Ethos-U55 supports batch sizes
  1-8. Single-item prefill: 8ms. The device has 256KB SRAM, and batch-8 prefill requires 8× the KV cache
  (128KB). Optimize the batching strategy to maximize throughput while staying within the 500ms processing
  window and 256KB SRAM budget.'
question: "What batch size should the Ethos-U55 use for eight simultaneous 64-token prefill jobs under the 256 KB SRAM budget?"
details:
  realistic_solution: 'Batch-1: 8ms, 16KB KV cache. Batch-8 KV cache: 8×16KB=128KB. Total SRAM with model
    weights buffered (~64KB) + activations (~32KB) + 128KB KV = 224KB < 256KB — fits. Batch-8 latency
    (measured): 3.5× single = 28ms (weight loading amortized). Processing 8 events: batch-8=28ms vs 8×batch-1=64ms.
    Throughput: batch-8 = 8/28ms = 286 events/s; batch-1 serial = 8/64ms = 125 events/s. Batch-8 is 2.3×
    faster. Both fit in 500ms window. Recommendation: batch-8 for maximum NPU utilization.'
  common_mistake: Assuming batch-8 prefill = 8× single latency; NPU batching amortizes weight loading
    costs, making batch-8 typically 2-4× slower than batch-1, not 8×.
  napkin_math: 'Batch-N latency ≈ (N^0.6) × single_latency (sub-linear due to weight amortization). Batch-8:
    8^0.6 × 8ms ≈ 3.48 × 8ms = 27.8ms ≈ 28ms. Throughput: 8/28ms = 286 items/s. Budget check: 28ms <<
    500ms window. KV: 8×16KB=128KB + 96KB other = 224KB < 256KB.'
