title: Ethos-U55 Shared SRAM Architecture
scenario: You are deploying a wake-word detection model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) system. The 480 MHz Cortex-M7 handles the MFCC feature extraction, and the resulting tensor needs to be consumed by the Ethos-U55 NPU for inference.
question: What specific memory architecture feature of the Corstone-300 allows the NPU to access the 512 KB SRAM without requiring explicit host-to-device DMA transfers?
details:
  realistic_solution: The correct fact to recall is that the ARM Cortex-M7 and the Ethos-U55 NPU share the same 512 KB SRAM. Because they share this memory, zero-copy data passing is natively supported by simply providing the SRAM pointer to the NPU's command stream.
  common_mistake: |
    **The Pitfall:** Assuming explicit DMA transfers are required to move data from CPU to NPU.
    **The Rationale:** Candidates treat the NPU like a discrete PCIe accelerator (e.g., a desktop GPU) with isolated local memory.
    **The Consequence:** Unnecessary software overhead and code complexity are introduced, wasting CPU cycles and memory bandwidth.
  napkin_math: |
    - **DMA Copy Time**: 16 KB tensor at 1 byte/cycle (480 MHz) = 16,384 cycles = ~34.1 µs.
    - **Zero-Copy Time**: By providing the shared SRAM pointer directly to the NPU = **0 µs**.
    - **Conclusion**: Shared SRAM saves 100% of data movement latency.
