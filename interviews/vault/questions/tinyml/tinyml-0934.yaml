title: Flash Attention FLOPs Formula for Tiny Transformers
scenario: A candidate is asked to compute total FLOPs for a single forward pass of a 2-layer, 4-head transformer with hidden dimension 128 and sequence length 64, targeting ESP32-S3.
question: What total FLOPs should be used for the tiny transformer forward pass, and what calculation pitfalls must be avoided?
details:
  realistic_solution: The correct total FLOPs for the transformer layers is approximately 54.6M. Attention FLOPs per layer ~10.5M FLOPs. MLP FLOPs per layer ~16.8M FLOPs. Total per layer = ~27.3M FLOPs. Total model FLOPs (2 layers) = ~54.6M FLOPs.
  common_mistake: |
    **The Pitfall:** Forgetting the factor of 2 for multiply-add (1 MAC = 2 FLOPs).
    **The Rationale:** Candidates often confuse MACs and FLOPs, or mistakenly use the 6ND formula intended for training instead of 2ND for inference.
    **The Consequence:** This leads to halving the true FLOP count, causing severe underestimation of latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Layers: 2, D: 128, N: 64.
       - 1 MAC = 2 FLOPs.
    2. **Calculations:**
       - QKV: 3 * N * D^2 * 2 = 6,291,456 FLOPs.
       - Scores: 2 * N^2 * D * 2 = 2,097,152 FLOPs.
       - Out Proj: N * D^2 * 2 = 2,097,152 FLOPs.
       - MLP: 2 * N * D * 4D * 2 = 16,777,216 FLOPs.
       - Total per layer: 10.5M + 16.8M = 27.3M FLOPs.
    3. **Conclusion & Interpretation:**
       - **Result: Compute Bound.** For 2 layers, the total inference cost is precisely ~54.6M FLOPs.
