title: Flash Attention FLOPs Formula for Tiny Transformers
scenario: 'A candidate is asked to compute total FLOPs for a single forward pass of
  a 2-layer, 4-head transformer with hidden dimension 128 and sequence length 64,
  targeting ESP32-S3. The interviewer wants: (1) attention FLOPs per layer, (2) MLP
  FLOPs per layer (FFN ratio 4x), (3) total model FLOPs. No calculator — napkin math
  only.'
question: What total FLOPs should be used for the tiny transformer forward pass, and
  what calculation pitfalls must be avoided?
details:
  realistic_solution: "The correct total FLOPs for the transformer layers is approximately 54.5M. (1) Attention FLOPs per layer: QKV projections (3*2*64*128^2 = 6.3M), Attention scores (2*64^2*128 = 1.05M), Attention context (2*64^2*128 = 1.05M), Output projection (2*64*128^2 = 2.1M) -> Total ~10.5M FLOPs. (2) MLP FLOPs per layer: Up projection (2*64*128*512 = 8.4M), Down projection (2*64*512*128 = 8.4M) -> Total ~16.8M FLOPs. Total per layer = ~27.3M FLOPs. (3) Total model FLOPs (2 layers) = ~54.5M FLOPs."
  common_mistake: "Forgetting the factor of 2 for multiply-add (1 MAC = 2 FLOPs), which leads to halving the result (~27.3M total), or confusing the attention score matrix dimensions. Another mistake is using the 6ND formula for training instead of 2ND for inference."
  napkin_math: "Per layer Attention:\nQKV: 3 matrices * 64 seq * 128 d_in * 128 d_out * 2 FLOPs = 6.3M.\nScores/Context: 2 * (64 * 64 * 128) * 2 FLOPs = 2.1M.\nOut Proj: 64 * 128 * 128 * 2 = 2.1M.\nAttention = 10.5M.\nPer layer MLP (ratio 4):\nUp Proj: 64 * 128 * 512 * 2 = 8.4M.\nDown Proj: 64 * 512 * 128 * 2 = 8.4M.\nMLP = 16.8M.\nLayer Total = 27.3M.\n2 Layers = 54.5M FLOPs."
