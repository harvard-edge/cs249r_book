title: Flash Attention FLOPs Formula for Tiny Transformers
scenario: 'A candidate is asked to compute total FLOPs for a single forward pass of a 2-layer, 4-head transformer with hidden dimension 128 and sequence length 64, targeting ESP32-S3.'
question: What total FLOPs should be used for the tiny transformer forward pass, and what calculation pitfalls must be avoided?
details:
  realistic_solution: "The correct total FLOPs for the transformer layers is approximately 54.6M. (1) Attention FLOPs per layer: QKV projections (3*2*64*128^2 = 6.3M), Attention scores (2*64^2*128 = 1.05M), Attention context (2*64^2*128 = 1.05M), Output projection (2*64*128^2 = 2.1M) -> Total ~10.5M FLOPs. (2) MLP FLOPs per layer: Up projection (2*64*128*512 = 8.4M), Down projection (2*64*512*128 = 8.4M) -> Total ~16.8M FLOPs. Total per layer = ~27.3M FLOPs. (3) Total model FLOPs (2 layers) = ~54.6M FLOPs."
  common_mistake: |
    **The Pitfall:** Forgetting the factor of 2 for multiply-add (1 MAC = 2 FLOPs).
    **The Rationale:** Candidates often confuse MACs and FLOPs, or mistakenly use the 6ND formula intended for training instead of 2ND for inference.
    **The Consequence:** This leads to halving the true FLOP count, causing severe underestimation of latency.
  napkin_math: |
    1. Per layer Attention QKV: 3 matrices * 64 seq * 128 d_in * 128 d_out * 2 FLOPs = 6,291,456 (~6.3M FLOPs).
    2. Attention Scores/Context: 2 * (64 * 64 * 128) * 2 FLOPs = 2,097,152 (~2.1M FLOPs).
    3. Attention Out Proj: 64 * 128 * 128 * 2 = 2,097,152 (~2.1M FLOPs). Total Attention = 10.5M FLOPs.
    4. Per layer MLP (ratio 4) Up/Down Proj: 2 * (64 * 128 * 512 * 2) = 16,777,216 (~16.8M FLOPs).
    5. Total per layer = 10.5M + 16.8M = 27.3M FLOPs.
    **Result:** For 2 layers, the total inference cost is approximately 54.6M FLOPs.
