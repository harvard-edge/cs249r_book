title: Cortex-M4 Energy-Harvesting Checkpoints
scenario: An energy-harvesting Cortex-M4 node trains an anomaly detector, but suffers
  power loss approximately every 5 minutes. Writing to non-volatile flash memory draws
  5mA and takes 100ms for a full model snapshot.
question: Propose an optimal checkpointing interval that minimizes total training
  overhead while bounding maximum lost progress (RPO) to 1 minute.
visual:
  kind: svg
  path: tinyml-1542.svg
  alt: Timeline showing training progress interrupted by power failures, with checkpoints
    saving state periodically.
  caption: Training Progress and Rollback
details:
  realistic_solution: 'Since the constraint dictates maximum lost progress (RPO) must
    be ≤ 1 minute, the checkpointing interval must be 1 minute or less. A 1-minute
    interval implies 5 checkpoints between typical failures. The overhead is minimal:
    5 * 100ms = 500ms of checkpoint time every 300 seconds, ensuring we satisfy the
    RPO with only ~0.16% time overhead.'
  common_mistake: Calculating Young's optimal checkpoint interval without overriding
    it with the strict 1-minute RPO business constraint.
  napkin_math: Interval = 60s (RPO bound); Overhead = 0.1s / 60s = 0.16%.
