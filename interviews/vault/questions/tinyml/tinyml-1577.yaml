  caption: Periodic Wake Timeline
details:
  realistic_solution: The candidate should simply express the duty cycle as the ratio
    of active time to total time period.
  common_mistake: Confusing the awake time with sleep time in the numerator.
  napkin_math: 50 / 1000 = 0.05 or 5%
