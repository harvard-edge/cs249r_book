title: Smart Doorbell Duty Cycle
scenario: A Cortex-M4 smart doorbell wakes up periodically to run a tiny person detection model from its KB-scale SRAM.
question: Define the basic duty cycle ratio formula for this system waking up for 50ms every 1 second.
visual:
  kind: svg
  path: tinyml-1577.svg
  alt: Timeline showing brief active periods followed by long sleep periods.
  caption: Periodic Wake Timeline
details:
  realistic_solution: The candidate should simply express the duty cycle as the ratio of active time to total time period.
  common_mistake: |
    **The Pitfall:** Confusing the awake time with sleep time in the numerator.
    **The Rationale:** Candidates might mistakenly calculate the sleep ratio (950 / 1000) or fail to convert units properly.
    **The Consequence:** Completely misestimating the power profile and battery life of the system.
  napkin_math: |
    1. **Active Time:** 50 ms per cycle.
    2. **Total Time Period:** 1 second = 1000 ms.
    3. **Duty Cycle Calculation:** 50 ms / 1000 ms = 0.05.
    4. **Result:** The generic duty cycle ratio is **5%**.
