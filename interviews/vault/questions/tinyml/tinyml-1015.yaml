title: HardFault During High-Frequency Sensor Ingestion
scenario: We are deploying a predictive maintenance model on an ARM Cortex-M4 with 256 KB SRAM. The system ingests 16-bit industrial vibration data at a 50 kHz sampling rate, using a 1-second rolling window to extract features. The engineer implemented a ping-pong (double) DMA buffer for the raw data. The model requires 80 KB of SRAM for its arena.
question: Why does a Cortex-M4 with 256 KB SRAM HardFault after buffering 1 s of 50 kHz vibration data and an 80 KB model arena?
details:
  realistic_solution: The system is experiencing SRAM exhaustion, causing the stack and heap to collide. Double buffering a 1-second window at this sample rate requires too much memory. The correct approach is to either reduce the time window, downsample the incoming data before it hits the main buffer, or compute features continuously on-the-fly (e.g., using a streaming FFT or cascaded biquad filters) rather than storing the entire 1-second raw waveform in SRAM.
  common_mistake: |
    **The Pitfall:** Assuming the HardFault is caused by CPU starvation or misconfigured DMA priorities.
    **The Rationale:** At 50 kHz, interrupts fire rapidly, leading candidates to suspect the 168 MHz CPU is overwhelmed by processing.
    **The Consequence:** They spend days profiling CPU cycles and tweaking IRQ priorities while ignoring the massive out-of-memory stack collision causing the crash.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Cortex-M4 with 256 KB SRAM.
    - Sample Rate: 50,000 samples/sec.
    - Data Type: 16-bit (2 bytes/sample).
    - Buffering: Ping-pong (double) buffering of a 1-second window.
    - Model Arena: 80 KB.

    **Calculations:**
    - Raw Data Rate: 50,000 samples/sec * 2 bytes/sample = 100 KB/sec.
    - Single Buffer Size: 100 KB.
    - Ping-Pong Buffer Total: 2 * 100 KB = 200 KB.
    - Total Memory Required: 200 KB (Buffer) + 80 KB (Arena) = 280 KB.
    - SRAM Deficit: 280 KB - 256 KB = 24 KB overflow.

    **Conclusion & Interpretation:**
    - **Result: 280 KB (Memory-Capacity-Bound)**. The baseline memory requirement is 280 KB, exceeding the 256 KB SRAM and guaranteeing a stack/heap collision (HardFault).
