title: TinyML Knowledge Distillation for nRF5340 Anomaly Detection
scenario: You are deploying a real-time anomaly detection system on a microcontroller. The teacher model achieves 98% accuracy but requires 5MB of flash memory, 512KB of SRAM for inference, and takes 200ms to execute. Strict operational requirements dictate the student model footprint must not exceed 500KB flash and 150KB SRAM, with an inference latency under 50ms.
question: How should you distill a 5 MB teacher anomaly model into a student under 500 KB flash, 150 KB SRAM, and 50 ms?
details:
  realistic_solution: A realistic solution would involve starting with a very compact student model architecture designed from scratch for the nRF5340. The primary distillation strategy would likely begin with logit matching (using a temperature-scaled softmax output from the teacher as soft targets for the student) due to its simplicity and effectiveness. If necessary, feature distillation from crucial intermediate layers could be explored, but with careful consideration of its increased complexity and memory overhead during training. Post-distillation, aggressive 8-bit integer quantization (or even 4-bit if feasible with minimal accuracy loss) would be essential. The solution should emphasize the need for a custom, highly optimized inference engine (e.g., TensorFlow Lite Micro) and potentially hardware acceleration features if available on the M33 (e.g., DSP instructions). The justification for distillation over pruning would center on distillation's ability to transfer 'dark knowledge' and retain higher accuracy at very high compression ratios, which pure pruning often struggles to achieve.
  common_mistake: |
    **The Pitfall:** Relying exclusively on unstructured pruning to reach extreme compression targets.
    **The Rationale:** Developers often try to prune massive teacher networks directly instead of transferring dark knowledge to a purpose-built student architecture.
    **The Consequence:** The pruned network suffers catastrophic accuracy loss because extreme magnitude pruning destroys the functional connectivity of the architecture.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Constraints: < 500 KB flash, < 150 KB SRAM, < 50 ms latency.
       - Clock speed: 128 MHz. Throughput: ~1 MAC/cycle.
       - Teacher size: 5 MB flash, 512 KB SRAM, 200 ms latency.
    2. **Calculations:**
       - Flash reduction required: 5 MB / 0.5 MB = 10× smaller.
       - SRAM reduction required: 512 KB / 150 KB ≈ 3.4× smaller.
       - Speedup required: 200 ms / 50 ms = 4× faster.
       - Student cycle budget: 50 ms × 128 MHz = 6.4 million cycles.
       - MAC limit: ~5-6 million MACs max.
    3. **Conclusion & Interpretation:**
       - **Result: 6.4 Million Cycle Budget. Compute-Bound.** The distillation target necessitates a custom student architecture capped at ~5 million MACs to hit the strict 50 ms real-time window.
