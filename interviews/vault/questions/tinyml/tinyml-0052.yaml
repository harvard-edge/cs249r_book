title: The Bird-Call Battery Drain
scenario: You're designing a battery-powered acoustic sensor to detect a rare bird call in a remote forest. Your device uses a Cortex-M4 microcontroller. It wakes up for 2 seconds every minute (60 seconds) to listen and run an inference model. From the playbook, we know the Cortex-M4 consumes about 50 mW while active and 10 µW while in deep sleep.
question: What average power does the bird-call sensor draw with 2 s at 50 mW and 58 s at 10 µW each minute?
details:
  realistic_solution: The correct way to calculate average power is to find the total energy consumed over one full cycle (active + sleep) and then divide by the cycle's time period.
  common_mistake: |
    **The Pitfall:** Calculating only duty-cycled active power and ignoring sleep power.
    **The Rationale:** Engineers assume sleep power is too tiny to matter, forgetting that it dominates the energy budget over long deployments.
    **The Consequence:** Significant errors in battery life estimations over multi-year deployments.
  napkin_math: |
    - **Active Energy/cycle:** 50 mW * 2 s = 100 mJ.
    - **Sleep Energy/cycle:** 0.01 mW * 58 s = 0.58 mJ.
    - **Total Energy/cycle:** 100 mJ + 0.58 mJ = 100.58 mJ.
    - **Average Power:** 100.58 mJ / 60 s = **~1.68 mW**.
    - **Insight:** The 3.3% duty cycle reduces average power by ~30x vs always-on.
  options:
  - '~1.67 mW (Incorrect: This result comes from completely ignoring the sleep power contribution, a common oversight.)'
  - '~11.33 mW (Incorrect: This result comes from misinterpreting 10µW as 10mW, a 1000x unit error.)'
  - '~1.68 mW (Correct: This accurately accounts for the energy consumed during both the active and sleep states over the full period.)'
  - '~100.6 mW (Incorrect: This fails to divide the total energy (mJ) by the time period (s), confusing energy with average power.)'
  correct_index: 2
