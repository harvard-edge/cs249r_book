title: 'Model Size Estimation: Master Full MCU Memory Budget for Industrial Sensor Node'
scenario: 'A memory budget analysis is required for deploying a vibration anomaly detection model on Cortex-M7+Ethos-U55 (480MHz, 512KB SRAM, 1MB Flash). Model: 200K INT8 params. Other consumers: FreeRTOS (32KB SRAM, 20KB Flash), Ethernet driver (20KB SRAM), sensor driver (4KB SRAM, 2KB Flash), application logic (16KB SRAM, 50KB Flash).'
question: 'How would you verify complete system fits and compute inference duty cycle for 10Hz operation?'
details:
  realistic_solution: 'SRAM budget: FreeRTOS 32KB + Ethernet 20KB + Sensor 4KB + App logic 16KB = 72KB overhead. Remaining: 440KB. Model activation arena: 200KB. TFLM runtime: 30KB. Stack: 8KB. Total SRAM: 72+200+30+8=310KB < 512KB (202KB spare). Flash budget: model weights 200KB + FreeRTOS 20KB + Ethernet driver 50KB + Sensor 2KB + App 50KB + TFLM kernels 20KB = 342KB < 1MB. Duty: inference 200K/500G=0.4µs NPU + 0.5ms overhead = 0.5ms/100ms = 0.5%.'
  common_mistake: |
    **The Pitfall:** Analyzing model memory in isolation without summing RTOS and peripheral driver memory.
    **The Rationale:** Candidates focus solely on the neural network footprint and ignore the essential real-time OS and networking stacks.
    **The Consequence:** The deployment experiences hard faults in the field when the Ethernet driver and ML model collide in SRAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - 512KB SRAM, 1MB Flash.
    - 200K INT8 params.
    - 10Hz operation (100ms budget).
    - FreeRTOS and driver footprint given.

    **Calculations:**
    - SRAM Used: 72KB (OS/Drivers) + 200KB (Arena) + 30KB (TFLM) + 8KB (Stack) = 310KB.
    - Flash Used: 200KB (Model) + 142KB (OS/Drivers/Kernels) = 342KB.
    - Duty Cycle: 0.5ms NPU inference / 100ms window = 0.5%.

    **Conclusion & Interpretation:**
    - **Result: SRAM 60%, Flash 33% (Memory-Bound)**. System is adequately provisioned.
