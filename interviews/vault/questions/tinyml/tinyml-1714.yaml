title: Recalling Little's Law Stability Conditions for Buffers
scenario: A sensor hub on a Cortex-M4 receives I2C interrupt events and places them
  in a fixed-size ring buffer for the ML model to process.
question: State the condition under which Little's Law (L = lambda * W) holds true
  for this buffer system.
details:
  realistic_solution: Little's Law holds true as long as the system is in a stable
    state (arrival rate lambda is less than service rate mu) and no packets are being
    dropped due to a full buffer.
  common_mistake: Assuming Little's law describes transient states like when the system
    is just booting up and filling the buffer.
  napkin_math: L = 10 events/s * 0.5 s = 5 events in system
