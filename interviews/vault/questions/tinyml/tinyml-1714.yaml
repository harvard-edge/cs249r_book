title: Recalling Little's Law Stability Conditions for Buffers
scenario: A sensor hub on a Cortex-M4 receives I2C interrupt events and places them in a fixed-size ring buffer for the ML model to process.
question: State the condition under which Little's Law (L = lambda * W) holds true for this buffer system.
details:
  realistic_solution: Little's Law holds true as long as the system is in a stable state (arrival rate lambda is less than service rate mu) and no packets are being dropped due to a full buffer.
  common_mistake: |
    **The Pitfall:** Assuming Little's law describes transient states.
    **The Rationale:** Candidates forget that Little's Law only applies to systems in a steady state.
    **The Consequence:** They incorrectly apply the formula while the system is just booting up and filling the buffer, yielding wrong queuing predictions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Arrival Rate (lambda): 10 events/s.
       - Wait Time (W): 0.5 s.
    2. **Calculations:**
       - Little's Law (L) = lambda * W = 10 * 0.5 = 5 events.
    3. **Conclusion & Interpretation:**
       - **Result: Steady State Queue**. There are 5 events in the system on average, assuming stable operation.
