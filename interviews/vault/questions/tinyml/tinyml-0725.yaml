title: The Multi-Tenant MCU
scenario: Your smart home device on an nRF5340 application core (Cortex-M33, 128 MHz, 256 KB SRAM) must run two models simultaneously. A keyword spotting model (always-on, 15ms inference, 80 KB arena) and a command recognition model (triggered after wake word, 45ms inference, 140 KB arena). Total arena requirement if independent is 220 KB. Available SRAM after firmware is 230 KB.
question: How should an nRF5340 schedule 80 KB KWS and 140 KB command arenas when both must fit in 230 KB SRAM?
details:
  realistic_solution: 'Two TFLite Micro interpreter instances cannot share an arena — the interpreter is not reentrant. Use two separate interpreters: KWS interpreter (80KB arena, always loaded) and CMD interpreter (140KB arena, loaded on demand). Time-multiplex: during CMD inference (45ms), pause KWS. With KWS''s 100ms period and 50% window overlap, missing one 45ms window loses zero detections. Memory: The CMD interpreter can reuse the same physical memory space as the KWS arena when triggered. Since CMD requires 140KB, the peak memory usage is simply the maximum of the two: 140KB. Headroom: 230-140 = 90KB for stack, ISR frames, and BLE IPC buffers.'
  common_mistake: |
    **The Pitfall:** Allocating 220 KB for both arenas simultaneously.
    **The Rationale:** Candidates see 220 KB < 230 KB and assume it's safe, ignoring that TFLite Micro interpreters are not reentrant and cannot share an arena if running concurrently.
    **The Consequence:** This leaves only 10 KB of headroom, which is insufficient for the stack, ISR frames, or BLE IPC buffers, leading to a crash.
  napkin_math: |
    - **Available SRAM:** 230 KB.
    - **Scheme 1 (Simultaneous):** 80 KB + 140 KB = 220 KB peak. Headroom = 10 KB (risk of stack overflow).
    - **Scheme 2 (Time-multiplexed):** Max(80 KB, 140 KB) = 140 KB peak. Headroom = 230 KB - 140 KB = 90 KB.
    - **KWS Gap Analysis:** 45ms command inference / 100ms KWS period = 0.45 cycles missed (rounds to 0 or 1).
    - **Overlap Coverage:** With 50% overlap on a sliding window, the missed window is covered.
    - **Conclusion:** **140 KB peak memory usage** is achieved by reusing the physical memory space for the CMD arena, saving 80 KB.
  options:
  - Allocate 80 KB + 140 KB = 220 KB for both arenas simultaneously. 230 KB available, leaving 10 KB headroom — sufficient for both models to coexist.
  - 'Use two separate TFLite Micro interpreter instances but time-multiplex the physical memory. During KWS (normal): 80 KB arena. When CMD triggers: pause KWS, repurpose the memory for CMD''s 140 KB arena. With KWS''s 100ms period and 50% window overlap, missing one 45ms window loses zero detections. Peak SRAM: 140 KB, leaving 90 KB for stack, ISR frames, and BLE buffers.'
  - Run both models in a single TFLite Micro interpreter by concatenating the model graphs. The interpreter will automatically manage memory sharing between the two models.
  - Allocate the full 230 KB as a shared arena and let TFLite Micro's dynamic memory planner handle the allocation for both models during concurrent execution.
  correct_index: 1
