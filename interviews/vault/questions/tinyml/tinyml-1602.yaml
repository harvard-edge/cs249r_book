title: MCU Convolution Cycle Cost
scenario: Writing a custom INT8 convolution kernel for a hearing aid on a Cortex-M4 running at 100 MHz.
question: Implement an analytical model to calculate the exact cycle count of a 3x3 depthwise convolution considering MAC instructions and SRAM load/store overheads.
details:
  realistic_solution: 'For a 3x3 depthwise patch, there are 9 MACs per channel. The M4 supports SIMD instructions like SMLAD (dual MAC per cycle). Loading 4 bytes of activations and weights takes 2 cycles each. The core computation takes roughly 5 cycles for math + 4 cycles for loads. Across a 16-channel map, calculate `16 * 9 / 2 * (SIMD) + overhead`, summing to roughly 144 cycles per output pixel.'
  common_mistake: |
    **The Pitfall:** Assuming every MAC operation executes perfectly in 1 cycle without pipeline stalls.
    **The Rationale:** Engineers blindly quote hardware specification peaks without analyzing memory fetch overhead or register starvation.
    **The Consequence:** Theoretical cycle estimations are entirely detached from reality, leading to missed strict real-time deadlines upon deployment.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: Cortex-M4 (SIMD SMLAD, dual MAC/cycle).
    - Depthwise patch: 9 MACs per channel.

    **Calculations:**
    - Pure math cycles: 9 MACs / 2 MACs/cycle = 4.5 cycles.
    - Load overhead (activations/weights): ~4 cycles.
    - Compute + load per channel: 4.5 + 4 = 8.5 cycles.
    - Across a 16-channel map: 16 channels × ~9 cycles = ~144 cycles per output pixel.

    **Conclusion & Interpretation:**
    - **Result: ~144 cycles (Compute-Bound)**. Even with SIMD, memory fetch overhead nearly doubles the theoretical cycle count, highlighting why cycle-accurate analytical models are mandatory for edge sizing.
