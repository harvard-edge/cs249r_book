title: Sleep and Active Power Averaging
scenario: A vibration sensor using a Cortex-M4 operates on a coin cell battery. It
  draws 2 mA during its active state (inference) and 5 uA in its deep sleep state.
  The device is active for exactly 100 ms every 2 seconds.
question: Calculate the average current draw of this system across a complete operating
  cycle.
details:
  realistic_solution: 'The duty cycle is 100 ms active / 2000 ms total = 0.05 (5%).
    The sleep cycle is 95%. The average current is the weighted sum of both states:
    (0.05 * 2 mA) + (0.95 * 0.005 mA) = 0.1 mA + 0.00475 mA = 0.10475 mA, or approximately
    104.75 uA.'
  common_mistake: Forgetting to convert the 5 uA to 0.005 mA before adding, leading
    to mathematically nonsensical results like 2.05 mA.
  napkin_math: (0.05 * 2000uA) + (0.95 * 5uA) = 104.75 uA.
