title: Adversarial Robustness Evaluation on Cortex-M7 + Ethos-U55 for TinyML
scenario: You are tasked with evaluating the adversarial robustness of two TinyML models, Model A and
  Model B, deployed on a Cortex-M7 (480 MHz, 512 KB SRAM) paired with an Ethos-U55 NPU (512 MAC/cycle).
  Both models perform image classification on a constrained dataset. Model A is a standard CNN, while
  Model B incorporates an adversarial training defense. Design an evaluation framework to compare their
  resilience against common adversarial attacks (e.g., FGSM, PGD) given the resource constraints of the
  platform. Consider how the NPU's performance impacts defense efficacy and attack generation.
details:
  realistic_solution: A realistic solution involves hardware-aware adversarial training, potentially incorporating
    techniques like quantization-aware training to maintain model size and speed. The evaluation framework
    should include on-device profiling of both attack generation (if feasible) and defense inference.
    Consider defenses that are inherently lightweight, such as feature squeezing or small-perturbation
    detection. The comparison should quantify performance (accuracy, inference time) under attack and
    clean conditions, as well as the overhead introduced by the defense mechanism, all measured on the
    target platform.
  common_mistake: A common mistake is to directly apply adversarial defense strategies designed for cloud/edge
    GPUs without accounting for the severe memory and computational constraints of TinyML platforms like
    the Cortex-M7 + Ethos-U55. This often leads to solutions that are either too slow or too large to
    fit, or defenses that introduce unacceptable latency, negating their benefits.
  napkin_math: Estimate the memory footprint for storing adversarial examples and intermediate activations
    during an attack on a 512 KB SRAM. Calculate the approximate MAC operations per inference for both
    models and defenses. For example, if a PGD attack requires 'k' iterations, and each iteration involves
    'M' MACs for gradient calculation and 'N' MACs for model inference, assess if this is feasible within
    a few seconds given the 480 MHz clock and 512 MAC/cycle NPU. Consider the bandwidth limitations between
    CPU and NPU for data transfer during attacks.
