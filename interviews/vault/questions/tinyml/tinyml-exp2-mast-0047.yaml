title: NPU-Aware Sparsity on Corstone-300
scenario: You are deploying a 15 million MAC, 750 KB acoustic anomaly detection model on an ARM Cortex-M7
  + Ethos-U55 (Corstone-300) system. The system has 512 KB of shared SRAM, but your model currently exceeds
  this physical budget. You must design a pruning methodology from scratch that not only compresses the
  model to fit into SRAM but also maximizes the specific MAC utilization of the Ethos-U55 NPU. How do
  you co-design the sparsity pattern and hardware-aware deployment strategy?
question: "How should a 750 KB acoustic model be pruned to fit Corstone-300's 512 KB SRAM and preserve Ethos-U55 utilization?"
details:
  realistic_solution: Design a hardware-aware structured pruning pipeline tailored to the Ethos-U55's
    native weight compression format and MAC array configuration. By aligning the pruned blocks with the
    NPU's 128-512 MAC/cycle burst sizes, the hardware can efficiently decode weights and skip zero-fetches
    entirely. This reduces the memory footprint to fit within the 512 KB SRAM and drastically reduces
    the memory bandwidth contention with the 480 MHz M7.
  common_mistake: Candidates often propose generic unstructured magnitude pruning to reach the size constraint,
    failing to realize that the Ethos-U55's DMA and MAC engines require specific hardware-aligned sparsity
    to yield actual latency improvements. They also overlook that unstructured sparse formats like CSR
    require indexing metadata that can bloat the memory footprint, negating the expected savings in the
    tight 512 KB SRAM.
  napkin_math: 'Baseline model: 750 KB weights, 15M MACs. Target SRAM: 512 KB (budgeting ~137 KB for activations,
    leaving max 375 KB for weights). Required sparsity: 50%. Assuming a 256 MAC/cycle Ethos-U55 configuration
    at 480 MHz, peak compute is 122.8 GMAC/s. Applying 50% structured block pruning reduces weights to
    375 KB and active MACs to 7.5M. Because the U55 compresses zero weights natively, we save 50% on SRAM
    weight fetch bandwidth. Inference time on the NPU at a conservative 40% memory-bound utilization is
    7.5M / (122.8 * 10^9 * 0.4) = ~0.15 ms. The 375 KB model safely fits alongside activations within
    the 512 KB shared SRAM.'
