title: 'TinyML TCO Implement: ESP32-S3 vs Cloud for TinyML Inference'
scenario: Implement the break-even analysis for ESP32-S3 (240MHz, 512KB SRAM, $5) vs cloud inference at $0.0001/inference over 2 years. The sensor makes 50 inferences/day. Include ESP32-S3 power (100μA avg, 3.3V, $0.10/kWh) and the BLE/WiFi transmission cost if cloud is used (1KB per inference via NB-IoT at $0.01/MB).
question: How do hardware, power, cloud inference, data transmission, and SIM costs compare for ESP32-S3 versus cloud inference?
details:
  realistic_solution: 'ESP32-S3 power cost: 100μA × 3.3V × 17,520hr × $0.10/kWh / 1000 = $0.000578/2yr. At ~$5 hardware cost, the power cost is negligible. The cellular SIM cost ($48) dominates the cloud option.'
  common_mistake: |
    **The Pitfall:** Calculating only the direct hardware and API cloud inference costs while ignoring data transmission.
    **The Rationale:** Engineers treat the cloud as functionally "free" beside the API fee, failing to account for cellular network tariffs.
    **The Consequence:** The operational cost heavily blows past budget boundaries because the network carrier charges for data transmission exceed the API computation cost entirely.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - ESP32 Hardware: $5. Active Power: 100 µA at 3.3V. Energy: $0.10/kWh.
       - Cloud: 50 inferences/day. API: $0.0001/inf. Data: $0.01/MB. SIM: $48.
    2. **Calculations:**
       - Edge Energy (2yrs): 0.00033 W × 17,520 hrs = 0.00578 kWh. Cost = $0.000578.
       - Total Edge Cost: ~$5.00.
       - Cloud API (2yrs): 50 × 730 × $0.0001 = $3.65.
       - Cloud Data (2yrs): 50 KB × 730 = 36.5 MB × $0.01 = $0.365.
       - Total Cloud Cost (Cellular): $3.65 + $0.365 + $48 = $52.02.
    3. **Conclusion & Interpretation:**
       - **Result: TCO Edge Advantage.** ESP32 is >10x cheaper. The hardware and energy costs are dwarfed by the cellular data transmission and base SIM provisioning.
