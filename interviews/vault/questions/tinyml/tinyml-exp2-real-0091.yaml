title: Sizing an Audio Wakeword Model for Nordic nRF5340
scenario: Your team is deploying an always-on audio wakeword detector on a Nordic nRF5340 with a target
  of ~5mA active current. The chosen architecture is a Depthwise Separable CNN, and the system must run
  inference on the 128 MHz app core while the 64 MHz net core handles BLE 5.3 connectivity. You need to
  size the model to fit within the 256 KB SRAM and 1 MB flash. Critically, you must allocate and justify
  the memory budget for the RTOS, Bluetooth stack overhead, audio ring buffers, and the ML model itself.
details:
  realistic_solution: A realistic approach reserves roughly 80 KB for the Zephyr RTOS, BLE IPC, and application
    state, plus 8 KB for a ping-pong audio DMA buffer. This leaves around 168 KB for the TFLite Micro
    tensor arena to hold peak activations. For flash, since OTA updates require dual-banking, the 1 MB
    flash is halved, leaving about 300 KB for the model weights after the bootloader and firmware are
    accounted for. The model should be INT8 quantized to maximize this remaining budget.
  common_mistake: Candidates often assume the entire 256 KB SRAM is available for the ML model's tensor
    arena. They forget to account for the RTOS heap, network stack IPC overhead, audio DMA buffers, and
    the flash partitioning required for over-the-air (OTA) updates.
  napkin_math: 'Total SRAM: 256 KB. OS/App/BLE overhead: ~80 KB. Audio buffers (16kHz, 16-bit, 250ms):
    8 KB. Remaining for Tensor Arena: 256 - 80 - 8 = 168 KB. Total Flash: 1 MB. Dual-bank OTA partition:
    512 KB per slot. Bootloader + App Firmware: ~200 KB. Remaining Flash for Weights: 512 - 200 = 312
    KB. A 250k parameter model in INT8 requires 250 KB of flash and typically <150 KB of peak activations,
    fitting safely within the hardware limits.'
