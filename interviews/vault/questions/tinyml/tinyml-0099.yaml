title: Power Profiling Methodology
scenario: Your team claims their keyword spotting model on an Apollo4 Blue Plus (Cortex-M4F, 192 MHz,
  2 MB flash, 2 MB SRAM) draws '120 µA average.' You suspect this number is wrong. Design a measurement
  setup to get the real power profile, and explain what the team likely missed.
question: "How would you design a measurement setup to get the real power profile, and explain what the team likely missed?"
details:
  realistic_solution: 'Proper power profiling requires measuring at multiple time scales: (1) Microsecond
    scale: use a current sense amplifier (INA219) at 10 kHz to capture MCU wake spikes (15 mA for 2 ms)
    and sensor sampling pulses. (2) Millisecond scale: capture BLE TX bursts (8 mA for 2 ms) and BLE advertising events (6 mA for 2 ms every 100 ms), which dominate the idle power budget. (3) Second scale: log duty cycle transitions
    between sleep (10 µA), idle (1.2 mA), and active (40 mA) states. The methodology: connect a 0.1 ohm
    shunt resistor in series with the battery, sample voltage across it at 10 kHz for 10 minutes covering
    all operating modes. Compute: total charge = integral of I(t)dt. Average current = total charge /
    time. Real average is typically 3-5x higher than the sum-of-datasheet-currents estimate because datasheets
    report typical values, not worst-case, and miss transient spikes during state transitions.'
  common_mistake: '"Use a multimeter to measure average current." A multimeter averages over seconds,
    hiding the microsecond-scale current spikes that dominate energy consumption in duty-cycled systems.
    A low "average" reading could obscure 40 mA peaks — the thermal and peak current
    implications for coin cell batteries are completely different.'
  napkin_math: 'Claimed: 120 µA average. Measured breakdown: sleep (990 ms at 10 µA = 0.01 mA avg) + wake+sensor
    (3 ms at 8 mA = 0.024 mA avg) + inference (5 ms at 40 mA = 0.2 mA avg) + BLE TX (2 ms at 8 mA = 0.016
    mA avg) = 0.25 mA average for a 1 Hz duty cycle. Add BLE advertising (continuous): 6 mA × 2 ms
    / 100 ms = 0.12 mA. Regulator losses: ×1.18. Total: (0.25 + 0.12) × 1.18 = 0.436 mA (~0.44 mA). The team''s
    estimate was merely the BLE advertising average. Real battery life on 300 mAh: 300 / 0.44 = 682 hours
    = 28 days. This is 3.5x less than the naive estimate of 300 / 0.12 = 2,500 hours (104 days).'
