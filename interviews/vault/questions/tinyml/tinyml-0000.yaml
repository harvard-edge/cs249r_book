title: 'The Firmware Brick'
scenario: 'Your TinyML device is performing a field update. The power is accidentally disconnected halfway through the write. Upon reboot, the device is completely bricked and won''t even start the bootloader.'
question: 'Based on the memory map, why did your update process fail so catastrophically?'
details:
  realistic_solution: 'The flaw is **writing directly to the active application region**. By erasing the old firmware to make room for the new one, you leave the device with no valid executable if interrupted. The fix is **A/B Partitioning (Dual-Bank)**: use the 508 KB of free space as a staging area. Download the update there, validate the checksum, and only then tell the bootloader to swap the active partition.'
  common_mistake: |
    **The Pitfall:** Believing a CRC check provides sufficient safety against power loss.
    **The Rationale:** Engineers assume that if corruption occurs, the CRC check will catch it. They forget that the CRC check only runs *after* the write completes.
    **The Consequence:** If power is lost mid-write to the active application region, the device is left with no valid executable, completely bricking it in the field.
  napkin_math: |
    **Assumptions & Constraints:**
    - In-place firmware update overwriting active application region.
    - Mid-write power failure occurs.
    - 508 KB of free flash space is available but unused.

    **Calculations:**
    - In-place update recovery probability: 0%.
    - A/B partition recovery probability: 100%.

    **Conclusion & Interpretation:**
    - **Result: 0% Recovery (Reliability-Bound)**. Writing directly to the active application region without a valid staging partition creates a catastrophic single point of failure.
