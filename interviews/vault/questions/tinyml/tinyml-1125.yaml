title: On-Device Active Learning Curation for STM32F4
scenario: You are deploying a vibration anomaly detector on an ARM Cortex-M4 (STM32F4). To improve dataset curation for rare anomalies without exceeding annotation budgets, you must evaluate two on-device data selection strategies. Strategy A buffers and transmits random 1-second sensor windows (16kHz, 16-bit) to the cloud for manual labeling. Strategy B acts as an active learning filter: it runs the current INT8 CNN (requiring 120KB SRAM for activations, 5 million MACs per window) and only buffers and transmits the raw window if the model's prediction entropy is high.
question: "Which on-device data selection strategy is best given the STM32F4's hardware constraints?"
details:
  realistic_solution: 'Strategy B is superior because it drastically reduces dataset bias and annotation costs by exclusively capturing hard-to-predict edge cases. The system-level tradeoffs support this: the MCU can easily process the INT8 model in real-time using its SIMD instructions, and the concurrent memory footprint of the raw data buffer and the activation arena fits comfortably within the strict 256 KB SRAM limit without requiring external RAM.'
  common_mistake: |
    **The Pitfall:** Assuming the lack of an FPU will bottleneck the inference or failing to analyze the concurrent SRAM footprint.
    **The Rationale:** Candidates often advocate for Strategy B purely for data efficiency but forget the workload is optimized via CMSIS-NN SIMD which doesn't need an FPU.
    **The Consequence:** They wrongly conclude that active learning cannot fit on the constrained MCU, missing out on massive dataset curation savings.
  napkin_math: |
    * Buffer sizing: 1-second 16kHz 16-bit window = 16,000 × 2 bytes = 32 KB.
    * SRAM evaluation: 32 KB (buffer) + 120 KB (CNN activations) + 40 KB (OS/stack overhead) = 192 KB.
    * 192 KB safely fits within the 256 KB SRAM limit.
    * Compute evaluation: STM32F4 operates at 168 MHz using CMSIS-NN SIMD (2x INT8 MACs/cycle), yielding max 336 MMACs/sec.
    * Assuming 30% utilization efficiency (100 MMACs/sec), a 5M MAC inference takes **~50 ms**.
    * Since 50 ms << 1000 ms window, the device easily curates and filters data in real-time.
