title: AHB Bus Interrupt Barrier
scenario: A smart sensor splits a CNN between a Cortex-M4 (80 MHz) taking 4ms to preprocess
  and an AI accelerator taking 2ms to infer, communicating over an AHB bus.
question: Calculate the pipeline throughput assuming an AHB bus interrupt barrier
  requires 50us to clear.
details:
  realistic_solution: The CPU preprocessing is the bottleneck. The step time is 4ms
    compute plus the 50us AHB interrupt synchronization barrier, totaling 4.05ms.
    The blazing fast 2ms AI accelerator sits idle half the time.
  common_mistake: Using the AI accelerator's blazing fast 2ms inference time to calculate
    system throughput, entirely ignoring the CPU preprocessing bottleneck.
  napkin_math: Bottleneck = 4ms. Sync = 0.05ms. Step = 4.05ms. Throughput = 1 / 0.00405
    = 246.9 FPS.
