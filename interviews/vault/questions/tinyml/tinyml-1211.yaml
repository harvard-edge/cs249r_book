title: SIMD vs NPU for STM32F4 Inference
scenario: Your team is deploying an INT8 anomaly detection CNN on a microcontroller featuring a 168 MHz core with no FPU. The naive C implementation takes ~40ms per inference, missing the 20ms real-time constraint.
question: Should the microcontroller add an external NPU or use CMSIS-NN SIMD to meet the 20 ms CNN deadline, and why?
details:
  realistic_solution: "The correct approach is to analyze the compute bounds using specialized instructions before adding an accelerator. By leveraging CMSIS-NN, which uses the SMLAD instruction for 2x INT8 MACs per cycle, compute efficiency drastically improves."
  common_mistake: |
    **The Pitfall:** Immediately agreeing to add an external NPU.
    **The Rationale:** Candidates compare GPU/TPU architectures without analyzing the capabilities of the existing microcontroller and its specialized instructions.
    **The Consequence:** Proposing drastic and expensive hardware changes, increasing BOM cost and power overhead unnecessarily.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 168 MHz MCU.
    - Workload: 3 million MACs.
    - Constraint: 20ms maximum latency.

    **Calculations:**
    - Cycle Budget: 20 ms * 168 MHz = 3.36 million cycles.
    - Naive Scalar CPU: ~2.2 cycles/MAC * 3M = 6.6 million cycles (39.3 ms, Fails).
    - CMSIS-NN SIMD: 2x INT8 MACs/cycle. Effective ~1.6 MACs/cycle.
    - Optimized CPU: 3M / 1.6 = 1.875 million cycles (11.16 ms, Passes).

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound (Software SIMD optimization meets deadline, avoiding NPU hardware).**
