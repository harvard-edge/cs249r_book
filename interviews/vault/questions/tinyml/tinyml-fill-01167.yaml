title: Optimizing A/B OTA Firmware Updates on Nordic nRF5340
scenario: Your team is deploying a TinyML model for anomaly detection on a fleet of Nordic nRF5340 devices
  (128 MHz ARM Cortex-M33, 256 KB SRAM, 1 MB flash, BLE connectivity). You've implemented an A/B partition
  scheme for reliable firmware-over-the-air (FOTA) updates. However, after an update, a significant number
  of devices are failing to boot, often reverting to the old firmware. Initial diagnostics suggest the
  update process itself is consuming too much power or time, leading to brownouts or watchdog timeouts,
  especially on devices with critically low battery levels or during high BLE traffic. Your task is to
  diagnose the bottleneck in the FOTA update process, particularly concerning the flash programming and
  validation phases, and propose a solution. Crucially, you must quantify the potential performance gain
  or resource savings of your proposed fix on the nRF5340's specific hardware constraints.
question: "How should nRF5340 FOTA updates reduce flash write time, validation overhead, and brownout risk during A/B updates?"
details:
  realistic_solution: Implement a byte-level differential update mechanism instead of full image updates,
    reducing the amount of data written to flash. Optimize the flash programming routine by utilizing
    the nRF5340's Flash Controller Direct Memory Access (DMA) capabilities for faster writes and minimizing
    CPU involvement. Introduce granular power management during flash operations, potentially pausing
    non-critical tasks like BLE advertisements during critical write phases to conserve power. Implement
    a robust checksumming (e.g., CRC32) on smaller blocks of data to detect corruption early, rather than
    validating the entire image post-write, reducing validation time.
  common_mistake: Overlooking the write endurance and speed limitations of internal flash memory, leading
    to inefficient flash programming algorithms or excessive logging/validation during the update, which
    can deplete battery or trigger watchdogs on resource-constrained MCUs like the nRF5340.
  napkin_math: 'Consider a 200 KB firmware update. Current (full image write): If flash write speed is
    ~10 KB/s (typical for internal flash), total write time is 200KB / 10KB/s = 20 seconds. Proposed (differential
    update): If only 20% of the image changes (40 KB), and differential patching and writing takes ~15
    KB/s (including patch application overhead). Total write time becomes 40KB / 15KB/s ≈ 2.7 seconds.
    Power Savings: Reducing active flash write time from 20s to ~3s significantly reduces average power
    consumption during FOTA, mitigating brownout risks, especially if flash write operations consume 10s
    of mA. If a full image validation takes 5 seconds (reading 200KB at 40KB/s), reducing this to block-level
    validation could halve that time.'
