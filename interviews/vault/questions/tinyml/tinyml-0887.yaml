title: 'Model Size Estimation: Diagnose Flash Overflow on ESP32-S3 Multi-Model Deployment'
scenario: An ESP32-S3 (16MB Flash, 512KB SRAM, 8MB PSRAM) firmware with 2 TFLite Micro models fails to link with 'Flash section overflow by 2.1MB'. The models are a keyword spotter (500KB) and gesture recognition (1.5MB). Application + FreeRTOS + WiFi stack is estimated at 3.8MB.
question: Why does an ESP32-S3 two-model firmware report a 2.1 MB overflow when its apparent Flash total is only 5.8 MB?
details:
  realistic_solution: 'Actual breakdown: App+FreeRTOS: 1MB. WiFi stack (ESP-IDF full): 2MB (much larger than estimated). BT stack: 0.5MB. TFLM runtime + all ops: 0.3MB. Model 1: 500KB. Model 2: 1.5MB. Total: 1+2+0.5+0.3+0.5+1.5=5.8MB. Linker reports 2.1MB overflow beyond 16MB? 5.8MB < 16MB — can''t be Flash overflow. Actual issue: may be IRAM overflow (ESP32-S3 IRAM is 400KB for code, not Flash). WiFi stack must run from IRAM: 2MB >> 400KB IRAM. Fix: use ESP-IDF `CONFIG_WIFI_IRAM_OPT=n` to move WiFi from IRAM to Flash.'
  common_mistake: |
    **The Pitfall:** Misinterpreting "section overflow" as a main Flash capacity issue rather than an IRAM (Instruction RAM) limit.
    **The Rationale:** Engineers see "overflow" and assume the total bin file exceeds the 16MB SPI Flash chip.
    **The Consequence:** They aggressively shrink model sizes, degrading accuracy, when the real issue is executing too much code from the tiny 400KB IRAM.
  napkin_math: |
    * **Total Payload:** App (1MB) + WiFi (2MB) + BT (0.5MB) + TFLM (0.3MB) + Models (2.0MB) = **5.8 MB**.
    * **Flash Capacity:** 16 MB. (5.8 MB << 16 MB → Not a Flash capacity issue).
    * **IRAM Capacity (ESP32-S3):** 400 KB for fast instruction execution.
    * **IRAM Usage:** WiFi stack natively demands ~250 KB in IRAM. TFLM ops take ~100 KB. App takes ~50 KB. Total = **400 KB** (at the absolute limit).
    * **Resolution:** Reconfigure ESP-IDF (`CONFIG_WIFI_IRAM_OPT=n`) to execute WiFi code from Flash (XIP), freeing up critical IRAM for ML kernels.
