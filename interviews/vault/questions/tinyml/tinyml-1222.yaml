title: Hardware-Aware NAS Constraints on Dual-Core MCU
scenario: You are using a Hardware-Aware NAS to design a Keyword Spotting model for the Nordic nRF5340. Your search space initially constrained the model to 220 KB peak SRAM and 15 million MACs, which technically fits within the 256 KB SRAM and 128 MHz app core specifications. However, when deployed alongside the BLE 5.3 stack running on the 64 MHz network core, the device experiences frequent out-of-memory hard faults and dropped Bluetooth connections.
question: How would you analyze the system-level interactions causing OOM faults on the nRF5340 and quantify the new constraints for your NAS?
details:
  realistic_solution: 'The bottleneck is two-fold: memory contention and latency blocking. The BLE stack and network core require reserved shared SRAM, meaning the 220 KB model footprint overflows the actually available memory when BLE buffers are allocated. Furthermore, a 15M MAC inference takes too long to execute, violating the BLE connection interval timing. The fix requires updating the NAS multi-objective constraints to target a strictly partitioned SRAM budget and a maximum MAC count that guarantees inference completes well within the BLE connection interval.'
  common_mistake: |
    **The Pitfall:** Treating datasheet hardware specs as fully available for ML workloads.
    **The Rationale:** NAS tools are configured using total physical SRAM and peak clock speeds without accounting for system-level cohabitation.
    **The Consequence:** The resulting model competes with the BLE stack for memory and compute time, causing hard faults and breaking critical communication deadlines.
  napkin_math: |
    *   **SRAM Constraint:** 256 KB Total - 64 KB (BLE stack) - 32 KB (RTOS/App buffers) = **160 KB max peak memory** for NAS.
    *   **Latency Constraint:** Inference must complete within ~30ms to avoid dropping a 50ms BLE connection interval.
    *   **MAC Constraint:** At 128 MHz, assuming 2 cycles/MAC: (0.030 s × 128,000,000 cycles/s) / 2 = **1.92 million MACs**.
    *   **Conclusion:** NAS constraints must be drastically tightened from 220 KB/15M MACs down to <160 KB and <1.92M MACs.
