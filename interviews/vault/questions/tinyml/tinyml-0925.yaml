title: Design Speculative Decoding for Cortex-M4 Transformer
scenario: You are designing a speculative decoding system for a 500K-parameter draft model running on Cortex-M4 at 168 MHz paired with a 2M-parameter target model on Ethos-U55. The draft model generates 4 candidate tokens per step at 8ms each; the target model verifies all 4 simultaneously at 12ms. Token acceptance rate from pilot testing is α=0.75.
question: How would you design the speculation window size and fallback strategy to maximize tokens/second?
details:
  realistic_solution: 'Expected tokens per cycle: E[tokens] = (1-0.75^5)/0.25 ≈ 3.05. Time per cycle: 4×8ms + 12ms = 44ms. Throughput: 3.05/44ms ≈ 69.3 tok/s vs baseline 1/12ms = 83.3 tok/s... speculative decoding hurts here. Reduce draft steps to k=2: E=2.31 tokens, time=2×8+12=28ms, throughput=82.5 tok/s. Still worse. Only beneficial if draft model is much faster.'
  common_mistake: |
    **The Pitfall:** Using a fixed window size without adapting to the acceptance rate.
    **The Rationale:** Candidates assume that more candidate tokens always lead to higher throughput.
    **The Consequence:** A large speculation window can actively harm throughput if the draft model is too slow.
  napkin_math: |
    - Expected tokens per cycle (k=4): E[tokens] = (1 - 0.75^5) / (1 - 0.75) = 3.05 tokens.
    - Time per cycle (k=4): 4 * 8ms + 12ms = 44ms.
    - Throughput (k=4): 3.05 / 44ms ≈ 69.3 tok/s.
    - Baseline throughput (no speculation): 1 / 12ms = 83.3 tok/s.
    - Check k=2: E=2.31 tokens, time = 2*8+12 = 28ms, throughput = 82.5 tok/s.
    - **Speculative decoding hurts performance here; the draft model needs a speedup to <4ms/token to be beneficial.**
