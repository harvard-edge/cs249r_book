title: Design Speculative Decoding for Cortex-M4 Transformer
scenario: You are designing a speculative decoding system for a 500K-parameter draft
  model running on Cortex-M4 at 168 MHz paired with a 2M-parameter target model on
  Ethos-U55. The draft model generates 4 candidate tokens per step at 8ms each; the
  target model verifies all 4 simultaneously at 12ms. Token acceptance rate from pilot
  testing is α=0.75. Design the speculation window size and fallback strategy to maximize
  tokens/second.
question: How would you design the speculation window size and fallback strategy to
  maximize tokens/second?
details:
  realistic_solution: 'Expected tokens per cycle: E[tokens] = (1-0.75^5)/0.25 ≈ 3.05.
    Time per cycle: 4×8ms + 12ms = 44ms. Throughput: 3.05/44ms ≈ 69.3 tok/s vs baseline
    1/12ms = 83.3 tok/s... speculative decoding hurts here. Reduce draft steps to k=2:
    E=2.31 tokens, time=2×8+12=28ms, throughput=82.5 tok/s. Still worse. Only beneficial
    if draft model is much faster.'
  common_mistake: Using fixed window size without adapting to acceptance rate; at
    α=0.75 with k=4, expected accepted tokens = (1-α^(k+1))/(1-α) = (1-0.75^5)/0.25
    ≈ 3.05 tokens per verification cycle.
  napkin_math: 'Benefit threshold: k×t_draft + t_target < E[k,α]×t_target → k×8 +
    12 < E×12. For k=4, 44 < 36.6 (False). For k=2, 28 < 27.7 (False). Marginal benefit; draft model
    needs speedup to <4ms/token.'
