title: 'The Transformer''s Memory Spike: Attention Scaling & Variants'
scenario: 'You are trying to deploy a person-detection model on a microcontroller with 512KB of SRAM. You have two models with similar parameter counts: a MobileNet-based CNN and a tiny Vision Transformer (ViT). The input is a 96x96 grayscale image, and the ViT uses a patch size of 8x8. During inference, the CNN runs fine, but the ViT immediately crashes with an out-of-memory error.'
question: Why does a tiny ViT on 96x96 images spike memory versus a similarly sized MobileNet CNN on a 512 KB SRAM MCU?
details:
  realistic_solution: The root cause is the intrinsic quadratic scaling of the self-attention activation memory matrix. While MobileNet scales linearly with input resolution, generating narrow feature maps, the ViT must construct an exhaustive N x N attention matrix. When fully populated across multiple attention heads in FP32 precision, this dense activation blob physically exceeds the microcontroller's 512 KB SRAM, prompting an immediate hard OOM crash.
  common_mistake: |
    **The Pitfall:** Comparing disparate network architectures utilizing parameter counts exclusively.
    **The Rationale:** Engineers assume parameter footprint dominates storage, ignoring the peak intermediate activation tensor dimensions.
    **The Consequence:** They mistakenly push memory-aggressive mechanisms (like self-attention) to MCUs, resulting in unbootable graph allocations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Image: 96x96. Patch size: 8x8.
       - ViT: 4 Heads, 128 embedding dimension. FP32 (4 bytes).
       - Constraint: 512 KB SRAM limit.
    2. **Calculations:**
       - Sequence Length (N) = (96/8)^2 = 144 patches.
       - Single Head Attention Matrix: 144 * 144 = 20,736 elements * 4 bytes = ~81 KiB.
       - All 4 Heads: 81 KiB * 4 = 324 KiB.
       - Q, K, V Projections: 3 * 144 * 128 * 4 bytes = 216 KiB.
       - Peak Activation Layer = 324 KiB + 216 KiB = 540 KiB.
    3. **Conclusion & Interpretation:**
       - **Result: Hard OOM Failure**. The peak 540 KiB activation alone breaches the 512 KB boundary, crashing the chip.
  options:
  - The ViT MLP blocks hold 600 KB of parameters, structurally blowing past the MCU limit while the CNN maintains lighter dense layers.
  - The self-attention matrix generates an N x N activation tensor per head that sums to 540 KB, instantly breaching the 512 KB limit.
  - The initial patch embedding layer creates a massive 96x96x128 feature block summing to 1.1 MB, violating memory.
  - ViT networks inherently demand specialized Tensor Core hardware instructions that panic the generic ARM instruction set.
  correct_index: 1
