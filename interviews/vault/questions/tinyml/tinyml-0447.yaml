title: 'The Transformer''s Memory Spike: Attention Scaling & Variants'
scenario: 'You are trying to deploy a person-detection model on a microcontroller with 512KB of SRAM. You have two models with similar parameter counts (~250K): a MobileNet-based CNN and a tiny Vision Transformer (ViT). The input is a 96x96 grayscale image, and the ViT uses a patch size of 8x8. During inference, the CNN runs fine, but the ViT immediately crashes with an out-of-memory error. Diagnose the most likely cause of the ViT''s memory spike.'
question: "Why does a tiny ViT on 96x96 images spike memory versus a similarly sized MobileNet CNN on a 512 KB SRAM MCU?"
details:
  realistic_solution: 'The root cause is the quadratic scaling of self-attention activation memory. For the ViT: a 96x96 input with 8x8 patches yields a sequence length N = (96/8)^2 = 144. The attention matrix per head is 144*144 = 20,736 elements. At FP32, this is ~81 KB per head. With 4 heads, that''s 324 KB. Plus the Q/K/V projections (216 KB), the peak activation memory for a single attention layer is 540 KB. This 540 KB activation alone exceeds the entire 512 KB SRAM budget, causing an immediate out-of-memory crash. A CNN like MobileNet scales linearly with resolution, and its peak activation is much smaller (e.g., ~288 KB), comfortably fitting within the memory budget.'
  common_mistake: Engineers often compare models based on parameter count alone, assuming it's the primary driver of memory usage. They forget that intermediate activation tensors, especially in memory-intensive architectures like Transformers, can vastly exceed the parameter memory and are stored in SRAM during inference. They might incorrectly blame the MLP blocks or the embedding layer without quantifying the specific bottleneck.
  napkin_math: '**1. Sequence Length (N):** N = (96 × 96) / (8 × 8) = 9,216 / 64 = **144 patches**. **2. Attention matrix size per head:** N × N = 144 × 144 = 20,736 elements. At FP32 (4 bytes): 20,736 × 4 = 82,944 B ≈ **81 KiB per head**. At INT8 (1 byte): 20,736 B ≈ **20.25 KiB per head**. **3. Multi-head attention:** With 4 heads (typical for tiny ViT): 4 × 81 KiB = 324 KiB (FP32) or 4 × 20.25 = 81 KiB (INT8). **4. Q, K, V matrices:** Each is N × d_model. With d_model=128 (d_head=32, 4 heads): 3 matrices × 144 tokens × 128 dim × 4 bytes = 221,184 B ≈ 216 KiB (FP32). **5. Total attention layer peak:** Attention matrices + Q/K/V ≈ 324 + 216 = **540 KiB (FP32)** for ONE layer. This single attention layer alone exceeds the 512 KB SRAM budget. The CNN''s peak activation (e.g., 48×48×32 = 73,728 elements = 288 KiB (FP32)) is far smaller because convolutions process local patches, never materializing an N×N matrix.'
  options:
  - The ViT's MLP blocks have far more parameters than the CNN's convolutional layers, causing the memory overflow.
  - The ViT crashes because its self-attention mechanism creates a large (N x N) activation tensor that scales quadratically with the number of image patches.
  - The patch embedding layer of the ViT requires storing the entire 96x96 image in a special format that exceeds the 512KB SRAM.
  - The ViT is a newer architecture that requires special hardware acceleration not present on the microcontroller.
  correct_index: 1
