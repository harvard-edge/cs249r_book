title: Diagnosing Asymmetric Quantization Overhead
scenario: You deploy an INT8 audio wake-word model on a Nordic nRF5340. The model is quantized using asymmetric
  per-tensor quantization for both weights and activations. On a desktop emulator, it achieves 92% accuracy
  and runs smoothly. However, when flashed to the device's 1 MB flash and executed on the 128 MHz app
  core, accuracy plummets to 45% and inference takes ~600ms, keeping the chip in its ~5mA active state
  far longer than the expected 20ms. Diagnose the root cause of this performance and accuracy collapse.
question: "Why do asymmetric INT8 weights make the nRF5340 wake-word model fall from 20 ms to about 600 ms?"
details:
  realistic_solution: The root cause is the use of asymmetric quantization for model weights. Microcontroller
    optimized libraries like CMSIS-NN on the Cortex-M33 (nRF5340's app core) require symmetric weights
    (zero-point = 0) to avoid computing the expensive `activation * weight_zero_point` cross-terms during
    convolution. Forcing asymmetric weights causes the runtime to fall back to an unoptimized reference
    C kernel, causing the 30x latency spike. The accuracy drop typically occurs because the unoptimized
    fallback kernel or the emulator handles intermediate 32-bit accumulator overflows differently.
  common_mistake: Candidates often assume the hardware itself is faulty or that the 256 KB SRAM is exhausted,
    causing memory thrashing. They might also incorrectly guess that BLE 5.3 interrupts on the 64 MHz
    net core are preempting the app core, without recognizing that the underlying quantization math is
    incompatible with hardware-accelerated kernels.
  napkin_math: 'Assuming a 5M MAC model: With symmetric weights, CMSIS-NN utilizes SIMD instructions (e.g.,
    SMLAD) to perform ~2 MACs/cycle. Latency on the 128 MHz core: 5,000,000 / (128,000,000 * 2) = 19.5ms.
    With asymmetric weights, the fallback C kernel requires ~15 cycles per MAC (load, offset zero-points,
    multiply, accumulate). Latency: (5,000,000 * 15) / 128,000,000 = 585.9ms. Energy consumption per inference
    spikes from (5mA * 19.5ms) = 0.098 mAs to (5mA * 586ms) = 2.93 mAs.'
