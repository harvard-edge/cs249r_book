title: Calculate Roofline Throughput on nRF5340
scenario: >
  You are deploying an audio processing model on the Nordic nRF5340. The 128 MHz app core can execute 1 MAC instruction per cycle. The 256 KB SRAM provides a 32-bit (4 byte) wide bus. A specific 1D convolutional layer in your model has an operational intensity of 0.125 MACs/byte.
question: What roofline throughput can the nRF5340 achieve for a 1D convolution with 0.125 MACs per byte?
details:
  realistic_solution: >
    Calculate the peak compute and memory bandwidth to derive the roofline ridge point. Since 0.125 MACs/byte is below the ridge point, the layer is strictly memory-bound. The maximum achievable throughput is calculated by scaling the operational intensity by the memory bandwidth.
  common_mistake: |
    **The Pitfall:** Assuming the layer automatically hits the peak compute rate without calculating the ridge point.
    **The Rationale:** Candidates ignore the memory wall and assume small MCUs are always compute-bound.
    **The Consequence:** Radically overestimating inference speed and missing real-time deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Clock: 128 MHz (1 MAC/cycle = 128 MMACs/s).
       - Bus: 4 bytes/cycle (512 MB/s bandwidth).
       - Operational Intensity: 0.125 MACs/byte.
    2. **Calculations:**
       - Ridge Point: 128 MMACs/s / 512 MB/s = 0.25 MACs/byte.
       - 0.125 MACs/byte < 0.25 MACs/byte -> Memory Bound.
       - Max Throughput: 0.125 MACs/byte * 512 MB/s = 64 MMACs/s.
    3. **Conclusion & Interpretation:**
       - **Result: 64 MMACs/s.** The throughput is halved because the layer starves for data. **Bottleneck: Memory Bandwidth.**
