title: Unstructured Pruning Latency Regression
scenario: You are deploying an audio classification model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) subsystem, featuring a 480 MHz M7, 512 KB shared SRAM, and a 256 MAC/cycle U55 NPU. To fit the 600 KB dense model into the 512 KB SRAM, your team applied 50% unstructured pruning, reducing the stored weights to 300 KB. During profiling, you notice that while the model now fits in SRAM, the inference latency jumped from an estimated 5 ms to over 15 ms, and NPU utilization dropped significantly.
question: Why does unstructured pruning cause a latency regression on the Ethos-U55 architecture?
details:
  realistic_solution: The Ethos-U55 is optimized for dense, block-based tensor operations using its 256 MAC/cycle engine and DMA engine. Unstructured sparsity breaks the contiguous data access patterns required by the NPU. Since the U55 lacks hardware support for unstructured sparse matrix multiplication, the Vela compiler must either insert zero-padding to run it densely or fall back to executing the operations on the Cortex-M7, which processes far fewer MACs per cycle, drastically increasing overall latency.
  common_mistake: |
    **The Pitfall:** Assuming parameter reduction always proportionally reduces latency.
    **The Rationale:** Candidates incorrectly guess the latency increase is due to decompression overhead on the M7, failing to realize how the Ethos-U55 NPU requires dense, contiguous data for sparse execution and falls back to the M7.
    **The Consequence:** Proposing hardware-incompatible pruning strategies that drastically increase latency and reduce NPU utilization.
  napkin_math: |
    - **Dense execution (Ethos-U55):** 10,000,000 MACs / 256 MAC/cycle = ~39,062 cycles.
    - **Dense latency:** 39,062 / 480 MHz = ~0.08 ms.
    - **Sparse execution fallback (Cortex-M7):** 5,000,000 MACs / 2 MAC/cycle = 2,500,000 cycles.
    - **Sparse latency:** 2,500,000 / 480 MHz = **~5.2 ms** (over 60x slower than dense).
