title: The SRAM Fragmentation Crash
scenario: 'Your smart doorbell on a Cortex-M7 (STM32H7, 480 MHz, 1 MB SRAM) runs three models: (1) person
  detection (200 KB arena), (2) face recognition (300 KB arena), (3) gesture recognition (150 KB arena).
  Only one model runs at a time, switched based on context. After 48 hours of continuous operation with
  frequent model switching, `AllocateTensors()` fails for the face recognition model even though 300 KB
  should be available. Total SRAM used by firmware: 400 KB. Free SRAM: 600 KB. Why can''t it allocate
  300 KB?'
question: "Why can't it allocate 300 KB?"
details:
  realistic_solution: 'The problem is **heap fragmentation** in the system allocator that manages the
    arenas themselves. Over time, interleaving large arena allocations and small OS allocations scatters
    small used blocks across the heap. When the 300 KB arena is requested, even if 600 KB is technically
    free, there is no single contiguous 300 KB block available.'
  common_mistake: '"600 KB free > 300 KB needed — must be a bug in TFLite Micro''s allocator." TFLite
    Micro''s arena allocator is a simple bump allocator that doesn''t fragment. But the system-level memory
    management around it does.'
  napkin_math: 'SRAM: 1 MB. Firmware: 400 KB. Available: 600 KB. Model arenas: 200/300/150 KB. Small allocations:
    ~50 KB total. Over 48 hours of switching (assume 1 switch/min = 2,880 switches): small allocations
    scatter across the heap. Average fragment size: 600 KB / 50 fragments = 12 KB average. Largest contiguous
    block is way below 300 KB. Fix: statically allocate arenas.'
  options:
  - If 600 KB is free and 300 KB is needed, the allocation should succeed. This must be a bug in TFLite
    Micro's arena allocator that fails on large allocations.
  - 'Heap fragmentation from frequent model switching. Over 2,880 switches (48 hours), small allocations
    (BLE buffers, DMA descriptors, sensor logs) scatter across the heap. After 48 hours: 600 KB total
    free but no single contiguous 300 KB block. Fix: reserve a static 300 KB arena at boot (never freed),
    or use a pool allocator for small objects to prevent heap fragmentation.'
  - The RTOS is consuming additional SRAM through stack growth in background threads, reducing the actual
    free memory from 600 KB to below 300 KB over 48 hours.
  - A memory leak in the model switching code allocates 200 bytes per switch without freeing, consuming
    200 x 2,880 = 576 KB over 48 hours, leaving only 24 KB free.
  correct_index: 1
