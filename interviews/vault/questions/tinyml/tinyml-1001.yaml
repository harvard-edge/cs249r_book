title: 'NPU Shared SRAM Bus Contention Side-Channel'
scenario: 'You are deploying a proprietary audio classification model on a system with a shared SRAM bus. A security audit reveals that a malicious, unprivileged RTOS task can accurately reverse-engineer your proprietary model architecture and layer-by-layer weight sparsity. The attacker''s code only executes a tight loop repeatedly reading an array from the shared 512 KB SRAM and measuring the loop''s execution time.'
question: 'What is the root cause of this vulnerability, and how does the attack mechanism extract the model architecture?'
details:
  realistic_solution: 'The root cause is a bus contention timing side-channel caused by the Ethos-U55''s offline weight compression. Because the M7 and U55 share the 512 KB SRAM, concurrent memory access leads to bus arbitration stalls. The U55 fetches compressed weights layer-by-layer. By timing the duration of memory access stalls in the M7 loop, the attacker measures the length of the U55''s burst transfers.'
  common_mistake: |
    **The Pitfall:** Misdiagnosing the attack as a standard L1 cache timing attack or physical power analysis (DPA/SPA).
    **The Rationale:** Candidates forget that the NPU executes the model and overlook the architectural detail that the M7 and U55 share the same SRAM bus.
    **The Consequence:** They fail to address the core issue of bus contention and propose irrelevant countermeasures.
  napkin_math: |
    **Assumptions & Constraints:**
    - Bus width: 32-bit (4 bytes). CPU clock: 480 MHz.
    - Uncompressed layer weights: 64 KB.
    - Dense compression: 32 KB. Sparse compression: 16 KB.

    **Calculations:**
    - Dense layer fetch cycles: 32,768 bytes / 4 bytes/cycle = 8,192 cycles.
    - Sparse layer fetch cycles: 16,384 bytes / 4 bytes/cycle = 4,096 cycles.
    - Cycle difference: 8,192 - 4,096 = 4,096 cycles.
    - Timing discrepancy: 4,096 cycles / 480,000,000 Hz ≈ 8.5 µs.

    **Conclusion & Interpretation:**
    - **Result: 8.5 µs Measurable Delta (Security-Bound)**. The execution timing delta directly reveals internal layer sparsity due to hardware bus contention during NPU weight fetches.
