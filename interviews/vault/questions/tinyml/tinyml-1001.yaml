title: NPU Shared SRAM Bus Contention Side-Channel
scenario: You are deploying a proprietary audio classification model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) system. A security audit reveals that a malicious, unprivileged RTOS task running on the 480 MHz M7 can accurately reverse-engineer your proprietary model architecture and layer-by-layer weight sparsity. The attacker's code only executes a tight loop repeatedly reading an array from the shared 512 KB SRAM and measuring the loop's execution time using the CPU cycle counter.
question: "What is the root cause of this vulnerability, and how does the attack mechanism extract the model architecture?"
details:
  realistic_solution: The root cause is a bus contention timing side-channel caused by the Ethos-U55's offline weight compression. Because the M7 and U55 share the 512 KB SRAM, concurrent memory access leads to bus arbitration stalls. The U55 fetches compressed weights layer-by-layer. By timing the duration of memory access stalls in the M7 loop, the attacker measures the length of the U55's burst transfers.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the attack as a standard L1 cache timing attack or physical power analysis (DPA/SPA).
    **The Rationale:** Candidates forget that the NPU executes the model and overlook the architectural detail that the M7 and U55 share the same SRAM bus.
    **The Consequence:** They fail to address the core issue of bus contention and propose irrelevant countermeasures.
  napkin_math: |
    1. Assume Ethos-U55 operates at 256 MACs/cycle at 480 MHz.
    2. Consider a layer with 64 KB of uncompressed weights. Highly sparse compresses to 16 KB; dense compresses to 32 KB.
    3. Calculate fetch cycles on 32-bit (4 byte) bus: 32 KB takes 8,000 cycles; 16 KB takes 4,000 cycles.
    4. Calculate bus contention difference: 8,000 - 4,000 = 4,000 cycles.
    5. Convert cycles to time: 4,000 cycles / 480 MHz = 8.3 microseconds.
    6. **Final Result: The 8.3 microsecond difference is trivially measurable, revealing layer sparsity.**
