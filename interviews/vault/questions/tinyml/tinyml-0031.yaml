title: The Solar-Powered Sensor
scenario: You are designing a remote environmental sensor. When active (sensing and transmitting), it
  consumes 50 mW. In deep sleep, it consumes 10 µW. The device wakes for 1 second every minute. Your small
  solar panel provides an average of 2 mW of power over a 24-hour cycle. Calculate the sensor's average
  power consumption and explain if the system is energy-positive and therefore sustainable.
question: "How would you calculate the sensor's average power consumption and explain if the system is energy-positive and therefore sustainable?"
details:
  realistic_solution: To determine sustainability, we must calculate the average power consumed over a
    full cycle (one minute) and compare it to the average power generated by the solar panel. The average
    power is the weighted sum of the active power and sleep power.
  common_mistake: 'The most common mistake is unit confusion: failing to convert micro-watts (µW) to milli-watts
    (mW) correctly, leading to an answer that is off by orders of magnitude (e.g., adding 10 to 50 instead
    of 0.01). Another mistake is to ignore the sleep power entirely, which, while small, is necessary
    for a precise answer.'
  napkin_math: Period = 60s. Active time = 1s, Sleep time = 59s. Active energy = 50 mW * 1s = 50 mJ. Sleep
    energy = 10 µW (0.01 mW) * 59s = 0.59 mJ. Total energy per minute = 50.59 mJ. Average power draw =
    50.59 mJ / 60s = 0.843 mW. The small solar panel harvests 2 mW average power. 2 mW > 0.843 mW, so
    the system is energy positive.
  options:
  - Not sustainable. Consumes ~10.67 mW, generates 2 mW.
  - Sustainable. Consumes ~0.84 mW, generates 2 mW.
  - Sustainable. Consumes ~0.83 mW, generates 2 mW.
  - Not sustainable. Consumes 50 mW, generates 2 mW.
  correct_index: 1
