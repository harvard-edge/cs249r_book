title: The Solar-Powered Sensor
scenario: You are designing a remote environmental sensor. When active (sensing and transmitting), it consumes 50 mW. In deep sleep, it consumes 10 µW. The device wakes for 1 second every minute. Your small solar panel provides an average of 2 mW of power over a 24-hour cycle.
question: What is the sensor's average power consumption, and is the system energy-positive?
details:
  realistic_solution: To determine sustainability, we must calculate the average power consumed over a full cycle (one minute) and compare it to the average power generated by the solar panel. The average power is the weighted sum of the active power and sleep power.
  common_mistake: |
    **The Pitfall:** Failing to convert micro-watts (µW) to milli-watts (mW) correctly, or ignoring the sleep power entirely.
    **The Rationale:** Engineers often miss orders of magnitude in unit conversions or assume sleep power is mathematically negligible without proving it.
    **The Consequence:** This leads to adding 10 to 50 instead of 0.01 to 50, resulting in an answer that is completely wrong and invalidates the sustainability analysis.
  napkin_math: |
    - **Period:** 60s.
    - **Active Phase:** 1s at 50 mW = 50 mJ of energy.
    - **Sleep Phase:** 59s at 10 µW (0.01 mW) = 0.59 mJ of energy.
    - **Total Energy per Minute:** 50.59 mJ.
    - **Average Power Draw:** 50.59 mJ / 60s = **0.843 mW**.
    - **Result:** Since the solar panel harvests an average of 2 mW, and 2 mW > 0.843 mW, the system is **energy positive and sustainable**.
  options:
  - Not sustainable. Consumes ~10.67 mW, generates 2 mW.
  - Sustainable. Consumes ~0.84 mW, generates 2 mW.
  - Sustainable. Consumes ~0.83 mW, generates 2 mW.
  - Not sustainable. Consumes 50 mW, generates 2 mW.
  correct_index: 1
