title: Architecting Knowledge Distillation for KWS on ESP32-S3
scenario: You are designing an always-on keyword spotting system for an ESP32-S3 microcontroller (240 MHz dual-core Xtensa, 512 KB SRAM, 8 MB PSRAM) deployed in a smart home device. The baseline teacher model achieves high accuracy but requires 2MB of RAM, far exceeding the fast 512 KB SRAM limit.
question: How should an ESP32-S3 KWS student be distilled so weights and activations stay within the 512 KB SRAM?
details:
  realistic_solution: The optimal design combines knowledge distillation with QAT. The FP32 teacher model generates soft targets and intermediate feature representations. The student model is constructed with depthwise separable convolutions optimized for INT8 execution and is trained using QAT to match the teacher's outputs. To ensure the model fits in SRAM alongside system overhead, the student architecture is heavily constrained, aiming for a peak memory footprint of around 250-300 KB, completely avoiding PSRAM during inference to meet strict latency requirements.
  common_mistake: |
    **The Pitfall:** Proposing logit matching without QAT and ignoring RTOS memory overhead.
    **The Rationale:** Candidates fail to account for the severe accuracy drop when post-training quantizing a distilled model for INT8 execution and forget that SRAM must also hold system buffers.
    **The Consequence:** The student model either suffers massive accuracy loss or spills into slower PSRAM, missing strict latency targets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Available SRAM: 512 KB total - ~200 KB (RTOS/WiFi/Audio) = ~312 KB.
       - Peak Compute: 240 MHz * 4 MACs/cycle (INT8) = 960 MMACs/sec.
       - Latency Target: 20 ms.
    2. **Calculations:**
       - Complexity Bound: 960 MMACs/sec * 0.02s = 19.2 MMACs.
    3. **Conclusion & Interpretation:**
       - **Result: 19.2 MMACs maximum.** The student model must stay strictly within this compute bound and 312 KB SRAM limit.
