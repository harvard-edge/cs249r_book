title: Hailo-8 Wake-up Energy Drain
scenario: A smart camera uses a 1mW Cortex-M4 to detect motion, waking up a Hailo-8 accelerator (2.5W active power) for 500ms per event. The 10Wh battery dies in 2 days instead of the expected 30 days despite only 10 expected wakes per day.
question: "Diagnose the power drain discrepancy by calculating the actual continuous average power consumption causing the 2-day battery death."
visual:
  kind: svg
  path: tinyml-1543.svg
  alt: Timeline showing sleep and wake power spikes, highlighting a raised sleep baseline power.
  caption: Elevated Sleep Power Baseline
details:
  realistic_solution: A 10Wh battery drained in 48 hours indicates an average continuous power draw of 10Wh / 48h = 208mW. The expected draw is 1mW (Cortex) + (2.5W * 0.5s * 10 / 86400s) = 1.14mW. The 208mW drain suggests the Hailo-8 is either failing to return to a deep sleep state (leaking ~200mW in standby) or is being spuriously woken up hundreds of times a day.
  common_mistake: |
    **The Pitfall:** Ignoring the baseline Cortex-M4 power or confusing Joules with Watt-hours in the energy equation.
    **The Rationale:** Candidates often focus solely on the active power spikes of the accelerator.
    **The Consequence:** They fail to accurately diagnose that the baseline sleep power has been significantly elevated, pointing to a failure in returning to deep sleep.
  napkin_math: |
    1. Convert battery life to hours: 2 days = 48 hours.
    2. Calculate actual average continuous drain: 10 Wh / 48 h = 0.208 W.
    3. Convert to milliwatts: 0.208 W * 1000 = 208 mW.
    4. **Final Result: The actual continuous power drain is 208 mW.**
