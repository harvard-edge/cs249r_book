title: EEPROM Endurance Limits for Hourly Sensor Model Checkpointing
scenario: A smart agricultural sensor trains an anomaly detection model online. It
  checkpoints its 10KB model state to EEPROM once an hour. The EEPROM wears out after
  100,000 write cycles.
question: Analyze the lifespan of the EEPROM and determine if this checkpointing strategy
  is viable for a 10-year deployment.
details:
  realistic_solution: Checkpointing once an hour results in 24 writes per day, or
    8,760 writes per year. Over a 10-year deployment, this equals 87,600 total write
    cycles. Since this is strictly under the 100,000 cycle endurance limit, the strategy
    is mathematically viable, although it leaves a relatively tight safety margin.
  common_mistake: Dividing 100,000 by 365 days and forgetting the 24 hours multiplier,
    incorrectly predicting a multi-century lifespan.
  napkin_math: 100,000 / (24 * 365) = 11.4 years lifespan.
