title: Delta OTA Optimization for Ethos-U55 NPU Models
scenario: You are designing an OTA update mechanism for a smart sensor running on an ARM Cortex-M7 + Ethos-U55 platform. A recent model update requires replacing the 1.2 MB compiled Vela network, but a standard A/B partition scheme fails due to insufficient Flash.
question: How do you analyze this storage bottleneck and quantify an optimization strategy to perform reliable, in-place OTA updates without external memory?
details:
  realistic_solution: Implement a differential (delta) OTA update strategy targeting only the changed weights and Vela command streams. By downloading only the delta payload, storing it in the small remaining Flash space, and streaming the patching process block-by-block using a minimal SRAM buffer, the update succeeds without violating memory constraints or requiring a full A/B dual-bank setup.
  common_mistake: |
    **The Pitfall:** Relying on external SPI flash or full image compression without considering RAM limits.
    **The Rationale:** Candidates forget that the SRAM is shared between the CPU and NPU, so in-place decompression of a large model causes an SRAM overflow.
    **The Consequence:** The system crashes during the OTA update due to RTOS memory starvation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Flash: 2 MB.
    - Active Firmware: 1.7 MB (Free Flash: 300 KB).
    - Full Model Size: 1.2 MB.
    - Delta Patch Size: 15% of 1.2 MB.

    **Calculations:**
    - Delta Patch: 1.2 MB * 0.15 = 180 KB.
    - Available Flash Buffer: 300 KB (180 KB fits).
    - SRAM Buffer Allocation: 16 KB read/write block.

    **Conclusion & Interpretation:**
    - **Result: Storage-Bound**. Streaming a 180 KB delta patch bypasses the 1.2 MB bottleneck and succeeds within the 300 KB Flash margin.
