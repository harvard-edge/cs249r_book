title: The Real-Time Radar Deadline
scenario: You're designing the ML pipeline for a smart radar gesture sensor running on a Cortex-M4 MCU. The product requirement is that a gesture must be classified within 100ms of the physical hand motion to feel 'instant'. The radar hardware itself takes 20ms to capture the required data.
question: Which performance metric is the most critical to optimize to meet this product requirement?
details:
  realistic_solution: 'The most critical metric is **End-to-End Latency**. This represents the total time from the physical event (hand motion) to the final output (classification result). To meet the 100ms hard deadline, every component in the pipeline—sensing, data transfer, preprocessing, and inference—must have its latency strictly budgeted to ensure the total sum is less than 100ms.'
  common_mistake: |
    **The Pitfall:** Mistakenly focusing on throughput (inferences per second) rather than strict latency.
    **The Rationale:** A high-throughput system can still have high latency for individual events if it relies on batching, which is unacceptable for hard real-time deadlines.
    **The Consequence:** Building a pipeline that processes 50 gestures a second but delivers the result for any single gesture 200ms too late, failing the core UX requirement.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Deadline: 100 ms max allowable latency.
    - Hardware Capture Time: 20 ms.

    **Calculations:**
    - Remaining Budget: 100 ms - 20 ms = 80 ms.

    **Conclusion & Interpretation:**
    - **Result: 80 ms budget (Latency-Bound)**. All preprocessing, feature extraction, inference, and result transmission must fit strictly within this 80 ms end-to-end latency budget.
  options:
  - 'Throughput (inferences/sec)'
  - 'Time To First Token (TTFT)'
  - 'End-to-End Latency'
  - 'Power Consumption (mW)'
