title: Optimizing ML Inference Latency on Cortex-M7/Ethos-U55 for Real-time Edge Applications
scenario: You are deploying a small, quantized convolutional neural network (CNN) for keyword spotting
  on an edge device featuring a Cortex-M7 microcontroller (480 MHz) paired with an Ethos-U55 NPU (configured
  for 256 MAC/cycle, operating at 480 MHz). The application requires an end-to-end inference latency of
  under 10 ms. Initial measurements show an average latency of 30 ms, with significant variance. The model
  consists of several convolutional layers followed by fully connected layers. Explain how you would systematically
  identify the primary bottlenecks contributing to this latency, considering the architecture's specific
  compute, memory (512 KB SRAM), and I/O characteristics. What profiling tools and techniques would you
  employ?
question: "How would you profile a Cortex-M7 plus Ethos-U55 keyword CNN stuck at 30 ms against a 10 ms latency target?"
details:
  realistic_solution: 'The realistic solution involves a systematic profiling approach. First, integrate
    lightweight profiling instrumentation into the application, measuring time spent in key phases: data
    acquisition, pre-processing (on Cortex-M7), NPU inference call, NPU execution, post-processing (on
    Cortex-M7), and data output. Use a cycle-accurate profiler or a tracing tool (e.g., Arm Streamline,
    if available, or custom timestamping via DWT cycle counter on Cortex-M7) to collect fine-grained data.
    Analyze the trace to identify where the 30 ms is spent. Given the platform, likely bottlenecks could
    be:

    1.  **Data Transfer:** Moving input/output tensors between Cortex-M7''s SRAM (512 KB) and the Ethos-U55
    NPU, especially if tensors exceed cache sizes or require multiple transfers.

    2.  **CPU Pre/Post-processing:** Complex operations on the Cortex-M7 before/after NPU execution, such
    as normalization, reshaping, or activation functions not offloaded to the NPU.

    3.  **NPU Utilization:** The Ethos-U55 (256 MAC/cycle) might not be fully saturated if the model''s
    structure or quantization leads to inefficient scheduling or frequent stalls.

    4.  **Memory Access Patterns:** Inefficient memory access (e.g., unaligned, non-contiguous) on the
    Cortex-M7 or NPU can lead to cache misses or increased bus arbitration latency.

    A flame graph or call stack analysis would further pinpoint specific functions in the Cortex-M7 code
    causing delays. If the NPU is the bottleneck, further analysis with the Ethos-U55 specific profiler
    would be needed to understand layer-by-layer execution time, MAC utilization, and memory bandwidth
    usage within the NPU. This data would guide optimization efforts, e.g., optimizing data layout, reducing
    pre/post-processing complexity, or re-evaluating model architecture for better NPU mapping.'
  common_mistake: A common mistake is to immediately assume the NPU is the sole bottleneck or to start
    optimizing individual layers without understanding the overall system's resource utilization. This
    often leads to optimizing components that are not the primary constraint (e.g., trying to optimize
    NPU operations when data transfer or CPU pre/post-processing is the real issue), or making micro-optimizations
    that yield negligible overall improvements, wasting valuable development time and potentially obscuring
    the true root cause.
  napkin_math: 'Let''s estimate the theoretical maximum operations. A 480 MHz Cortex-M7 executes 480 million
    instructions per second (MIPS) ideally. An Ethos-U55 (256 MAC/cycle at 480 MHz) can perform 256 *
    480 * 10^6 = 122.88 GMAC/s. If the model requires, say, 100 MMACs (Million Multiply-Accumulate operations)
    for inference, the theoretical NPU time would be 100 * 10^6 MACs / (122.88 * 10^9 MAC/s) = ~0.8 ms.
    If the observed NPU execution time is much higher (e.g., 5 ms), it suggests NPU underutilization,
    memory stalls, or compiler inefficiencies. If pre/post-processing on the Cortex-M7 takes 20 ms, that''s
    20 * 10^-3 s * 480 * 10^6 cycles/s = 9.6 * 10^6 CPU cycles. This is a significant number, indicating
    substantial CPU work. Consider data transfer: If a 100 KB input tensor needs to be moved to the NPU.
    Assuming a conservative bus bandwidth of 50 MB/s for an embedded system, the transfer time would be
    100 KB / 50 MB/s = 2 ms. If multiple such transfers happen, or the actual bandwidth is lower, this
    can easily become a dominant factor. The 512 KB SRAM is a critical constraint; if intermediate tensors
    exceed this, external memory access (slower) or complex tiling strategies would be needed, significantly
    impacting latency.'
