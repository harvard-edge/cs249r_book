title: Scratch Buffer Allocation for Convolution
scenario: A Conv2D operator on Cortex-M7 uses im2col to convert the convolution into a matrix multiplication.
question: For a 3×3 conv with 32 input channels processing a 24×24 feature map, how large is the im2col scratch buffer, and how does this affect your tensor arena budget?
details:
  realistic_solution: 'The full im2col matrix is (H_out × W_out) × (k × k × C_in) = 576 × 288 = 165,888 elements. At INT8: 162 KB. This is enormous for a 512 KB arena. CMSIS-NN (ARM''s optimized library) doesn''t materialize the full im2col. Instead, it processes one output row at a time: scratch buffer = W_out × k × k × C_in = 24 × 288 = 6,912 bytes (~6.75 KB). Even more optimized: process a few output pixels at a time using SIMD (4-wide on Cortex-M7), needing only 4 × 288 = 1,152 bytes (~1.1 KB). TFLite Micro''s default: allocates a scratch buffer per operator at arena planning time. The planner must account for this scratch buffer as part of the operator''s temporary memory. If multiple operators share the same scratch buffer (non-overlapping lifetimes), the arena only needs max(scratch_i), not sum(scratch_i).'
  common_mistake: |
    **The Pitfall:** Computing the full im2col buffer size (162 KB).
    **The Rationale:** Engineers apply the standard textbook matrix multiplication conversion for convolutions, ignoring memory-constrained optimizations.
    **The Consequence:** Massively overestimating the required memory, potentially concluding the model won't fit on the microcontroller.
  napkin_math: |
    1. **Full im2col Buffer:** 24 * 24 (output positions) * 3 * 3 * 32 (kernel volume) = 165,888 bytes (~162 KB).
    2. **Per-row im2col (CMSIS-NN):** 24 (width) * (3 * 3 * 32) = 6,912 bytes (~6.75 KB).
    3. **Per-pixel SIMD:** 4 * (3 * 3 * 32) = 1,152 bytes (~1.1 KB).
    4. **CMSIS-NN Compromise:** Processing 2-4 rows at a time requires 13.5 to 27 KB scratch.
    5. **Result:** By not materializing the full matrix, SRAM usage drops from 162 KB to **< 30 KB**, significantly reducing the tensor arena budget footprint.
