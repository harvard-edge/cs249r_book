title: Sizing an On-Device Anti-Spoofing Guardrail
scenario: You are deploying a biometric voice authentication system on an ARM Cortex-M4 (STM32F4) featuring
  a 168 MHz clock, 256 KB SRAM, 1 MB flash, and CMSIS-NN SIMD capabilities. Following an internal red-team
  audit, the Responsible AI committee mandates adding an on-device anti-spoofing guardrail model to prevent
  replay attacks and ensure system integrity. The main authentication model currently uses 150 KB SRAM,
  400 KB flash, and 150ms of execution time per 1-second audio frame. Given a strict total system latency
  limit of 400ms per frame to maintain real-time responsiveness, evaluate the remaining hardware constraints
  and size the maximum allowable capacity (in memory and MACs) for this new INT8 guardrail model.
details:
  realistic_solution: A strong L5 candidate will immediately reserve 40-50 KB of SRAM for system overhead
    (RTOS, double-buffered audio DMA, and MFCC buffers), leaving a strict ~56 KB SRAM bottleneck for the
    guardrail's tensor arena. They will allocate the remaining 250ms latency budget conservatively by
    setting aside 50ms for DSP preprocessing. Recognizing the CMSIS-NN capability of 2x INT8 MACs/cycle,
    they will calculate the peak throughput but correctly apply a realistic 50% utilization factor to
    account for memory load/store stalls on the Cortex-M4, sizing the guardrail at roughly 33.6 million
    MACs.
  common_mistake: Candidates often assume the theoretical peak MACs equals achievable performance and
    forget to budget SRAM for the RTOS, audio DMA buffers, and DSP feature extraction. They frequently
    allocate all 106 KB of remaining SRAM to the guardrail model, which inevitably causes memory corruption
    or stack overflows during real-time execution.
  napkin_math: 'SRAM Budget: 256 KB (Total) - 150 KB (Main Model) - 50 KB (OS/DMA/DSP Buffers) = 56 KB
    available for the guardrail''s peak memory arena.

    Flash Budget: 1024 KB (Total) - 400 KB (Main Model) - 150 KB (Firmware) = 474 KB available for weights.

    Latency Budget: 400ms (Total limit) - 150ms (Main Model) = 250ms remaining. Subtract 50ms for feature
    extraction = 200ms (0.2s) for guardrail inference.

    Peak Compute: 168 MHz * 2 MACs/cycle = 336 MMACs/sec.

    Effective Compute: 336 MMACs/sec * 0.50 (realistic CMSIS-NN utilization) = 168 MMACs/sec.

    Max Guardrail Complexity: 168 MMACs/sec * 0.2s = 33.6 Million MACs.'
