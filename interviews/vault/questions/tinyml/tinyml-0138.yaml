title: The Flash vs. SRAM Divide
scenario: You've compiled a TensorFlow Lite for Microcontrollers model for a keyword spotting device.
  The device has 1MB of Flash memory and 256KB of SRAM. During inference, where are the model's trained
  weights (e.g., the convolutional filter values) primarily located, and where is the tensor arena for
  calculating activations allocated?
question: ", the convolutional filter values) primarily located, and where is the tensor arena for calculating activations allocated?"
details:
  realistic_solution: 'Model weights (static, read-only) are stored in Flash memory (1 MB available) along
    with program code. The tensor arena (dynamic read/write during inference) is allocated in SRAM (256
    KB available). On a Cortex-M4: Flash read latency = 1-2 wait states at 168 MHz (8-16 ns). SRAM access
    = 0 wait states (6 ns). Weights in flash: a 500 KB model reads directly via memory-mapped flash (XIP),
    no copy needed. Tensor arena in SRAM: 48 KB peak activation memory allocated at boot. SRAM provides
    the zero-wait-state random access needed for repeated read/write during convolution accumulation.
    Why not copy weights to SRAM? A 500 KB model would consume 500/256 = 195% of SRAM. Even a 100 KB model
    in SRAM leaves only 156 KB for activations and stack. The flash/SRAM split is not optional on MCUs;
    it is dictated by the memory hierarchy.'
  common_mistake: A common mistake is to assume the entire model is loaded from Flash into SRAM for execution,
    similar to how a PC loads a program into RAM. In the microcontroller world, memory is so constrained
    that we often execute code 'in place' (XIP) from Flash and only use the precious SRAM for dynamic
    data that changes during computation (the activations).
  napkin_math: SRAM is the 'working memory' for a reason. A read from on-chip SRAM is extremely fast,
    similar to a cache hit (~1-4 ns). A read from the microcontroller's internal Flash is significantly
    slower (~50 ns). For the thousands or millions of reads and writes needed to compute activations,
    this ~10-50x latency difference is critical. Storing the ~100KB of model weights in the 1MB of Flash
    is acceptable (they are read infrequently), but the ~60KB of rapidly changing activation tensors *must*
    live in the fast 256KB SRAM to meet any real-time deadline.
  options:
  - Both the weights and the tensor arena are loaded into SRAM.
  - The weights are loaded into SRAM, and the tensor arena is allocated in Flash.
  - The weights are stored in Flash, and the tensor arena is allocated in SRAM.
  - Both the weights and the tensor arena are allocated in Flash memory.
  correct_index: 2
