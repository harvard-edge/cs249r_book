title: Dual-Core Memory-Aware Operator Scheduling on ESP32-S3
scenario: You are designing the operator execution schedule for a real-time keyword spotting CNN on an
  ESP32-S3 microcontroller. The system features a 240 MHz dual-core Xtensa processor, 512 KB of fast internal
  SRAM, and 8 MB of slower external PSRAM. Your model has a memory bottleneck where intermediate activations
  between a large Conv2D layer and a subsequent Depthwise Convolution spike to 400 KB. Design an operator
  scheduling and memory management strategy that evaluates the tradeoffs between SRAM/PSRAM placement,
  layer fusion, and dual-core parallelization to ensure the model runs within real-time constraints without
  exhausting internal memory.
question: "How should ESP32-S3 schedule Conv2D and depthwise operators to avoid materializing a 400 KB intermediate tensor?"
details:
  realistic_solution: The optimal design maps the operator schedule to the memory hierarchy by fusing
    the Conv2D and Depthwise layers. By computing the layers in tiles (depth-first scheduling), the system
    never materializes the full 400 KB intermediate tensor. The working set is kept small enough to fit
    entirely in the 512 KB SRAM. Furthermore, one core can handle the INT8 vector extensions for the fused
    operators while the second core pre-fetches the next layer's weights from the 8 MB PSRAM using DMA,
    hiding the external memory latency.
  common_mistake: Candidates often assume flat memory and place all buffers in external PSRAM, causing
    massive latency hits due to cache misses. Alternatively, they fail to consider layer fusion and simply
    schedule operators sequentially, trying to fit both the 400 KB peak activation and the OS overhead
    into the limited 512 KB SRAM, resulting in an out-of-memory crash.
  napkin_math: 'ESP32-S3 SRAM: 512 KB. WiFi/Bluetooth OS stack reserves ~150 KB, leaving ~362 KB for ML.
    Peak intermediate tensor: 400 KB (OOM if fully materialized). By fusing layers and computing in 4
    tiles, the intermediate buffer drops to 400 KB / 4 = 100 KB. Input (100 KB) + Output (100 KB) + Weights
    (50 KB) = 250 KB working set, which easily fits within the 362 KB available SRAM, completely avoiding
    the latency penalty of the 8 MB PSRAM for activations.'
