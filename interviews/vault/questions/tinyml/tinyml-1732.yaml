title: DMA Audio Pipelining
scenario: A Cortex-M4 sensor node samples audio via an I2S microphone while simultaneously
  executing an ML wake-word model.
question: Explain the ping-pong (double) buffering mechanics that permit continuous
  I2S DMA - specifically how the half-transfer interrupt lets the CPU process buffer
  A while the DMA fills buffer B, and what pointer-swap logic is required to never
  drop an audio frame.
details:
  realistic_solution: 'Mechanics. The DMA controller is configured in circular mode
    pointing at a single 2N-sample buffer split conceptually into two N-sample halves:
    A (samples 0..N-1) and B (samples N..2N-1). The DMA writes incoming I2S samples
    linearly through the buffer and automatically wraps from index 2N-1 back to 0
    thanks to the circular bit. The DMA peripheral fires two interrupts per full sweep
    - the Half-Transfer Interrupt (HTIF) when it has finished writing index N-1 (so
    half A is complete and half B is now being written), and the Transfer-Complete
    Interrupt (TCIF) when it has finished writing index 2N-1 (so half B is complete
    and half A is now being overwritten). Pointer-swap logic. The application maintains
    a single ready_ptr that the inference task consumes from. On HTIF: ready_ptr =
    &A; signal the inference task; the task processes A while DMA writes into B. On
    TCIF: ready_ptr = &B; signal the inference task; the task processes B while DMA
    wraps and writes into A. Critical invariant: the inference task must finish processing
    the current half before the next interrupt fires - i.e., compute_time < N / sample_rate.
    Otherwise the DMA overwrites a half that has not been read yet (silent data corruption,
    no underrun signal). On a Cortex-M4 with 16 kHz audio and N=512 samples per half,
    the deadline is 32 ms - any inference fitting that budget runs zero-drop indefinitely.
    If the inference runs longer, the correct fix is to grow N (giving more slack
    per pointer swap) until DMA half-period >= worst-case inference time, not to skip
    frames.'
  common_mistake: Stopping at the high-level claim "DMA frees the CPU" without describing
    the half-transfer/transfer-complete interrupt pair and the explicit pointer swap
    that picks which half to process next. Or assuming a buffer-overrun would raise
    an error - on most Cortex-M4 DMA controllers the overwrite is silent and the inference
    sees corrupted samples without any underrun signal.
  napkin_math: HTIF fires at index N-1, TCIF at index 2N-1. Per-half deadline = N
    / sample_rate (32 ms at 16 kHz, N=512). compute_time < per-half deadline = no
    drops; otherwise grow N.
