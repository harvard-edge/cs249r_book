title: DMA Audio Pipelining
scenario: A Cortex-M4 sensor node samples audio via an I2S microphone while simultaneously
  executing an ML wake-word model.
question: Analyze the hardware mechanism that permits 100% computational overlap without
  dropping incoming audio frames.
details:
  realistic_solution: Direct Memory Access (DMA) allows the I2S peripheral to continuously
    write incoming audio bytes directly into a background SRAM buffer. Because the
    CPU is bypassed during data transfer, it is 100% free to execute the ML inference
    on the primary buffer, completely overlapping I/O communication with computation.
  common_mistake: Assuming a multi-core processor is required to handle I/O and computation
    concurrently.
  napkin_math: 1 DMA channel = 0% CPU overhead for I/O.
