title: PSRAM Latency in Real-Time Audio Streaming
scenario: An ESP32-S3 (240 MHz, 512 KB SRAM, 8 MB PSRAM) processes a 16kHz, 16-bit audio stream for wake-word
  detection. A new frame is ingested via DMA every 10ms, requiring strict real-time feature computation.
  The DSP function requires 4.8 million operations per frame and utilizes the CPU's INT8 vector extensions,
  executing 4 operations per clock cycle. The FFT algorithm reads each byte of the 1.6 KB rolling audio
  buffer 100 times during windowing. When the engineer places this DMA ring buffer in the 8 MB PSRAM to
  save space, the system consistently drops frames. When moved to the 512 KB internal SRAM, it processes
  flawlessly. Explain why this happens by calculating the per-frame processing time for both memory locations,
  assuming SRAM has a 1-cycle access latency and PSRAM has a 20-cycle average access latency due to SPI
  bus cache misses.
details:
  realistic_solution: The system drops frames because of memory bandwidth starvation caused by the high
    latency of off-chip PSRAM. While the CPU's INT8 vector extensions can process the math operations
    extremely fast, the repetitive reads required by the FFT algorithm create massive stall penalties
    over the SPI bus, pushing total execution time past the 10ms deadline. The correct architectural approach
    is to place the hot-path DMA streaming buffer in the zero-wait-state internal SRAM, ensuring the vector
    compute units are constantly fed with data, while pushing larger, infrequently accessed state arrays
    to PSRAM.
  common_mistake: Candidates often only calculate the theoretical compute time based on the vector instructions
    and fail to account for the memory I/O bottleneck. They may wrongly assume PSRAM and SRAM have identical
    access speeds, missing how SPI-attached external memory stalls the CPU during repetitive data-fetching
    operations like FFT windowing.
  napkin_math: '1. Compute Cycles: 4.8M operations / 4 ops per cycle = 1,200,000 cycles. 2. Memory Accesses:
    1,600 bytes * 100 reads = 160,000 reads. 3. SRAM Execution: Memory cycles = 160,000 * 1 = 160k. Total
    cycles = 1.2M + 160k = 1.36M cycles. Processing time = 1.36M / 240,000,000 Hz = 5.66 ms (Safely meets
    the 10ms deadline). 4. PSRAM Execution: Memory cycles = 160,000 * 20 = 3,200,000 cycles. Total cycles
    = 1.2M + 3.2M = 4.4M cycles. Processing time = 4.4M / 240,000,000 Hz = 18.33 ms (Exceeds the 10ms
    deadline, resulting in dropped frames).'
