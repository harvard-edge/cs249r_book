title: Power Budget Allocation on Cortex-M7+Ethos-U55 IoT Node
scenario: A battery-powered IoT device uses Cortex-M7 + Ethos-U55 with a 1000mAh,
  3.7V battery. The system must run for 7 days. The M7 draws 30mW active and 5mW in idle. Ethos-U55
  draws 100mW during inference, radio draws 200mW during transmission. Inference runs
  100 times/day, each taking 10ms. Radio transmits 50 times/day, each 100ms. Design
  a duty cycle to meet the 7-day target.
question: How would you design a duty cycle to meet the 7-day target?
details:
  realistic_solution: 'Battery energy: 1000mAh × 3.7V = 3700mWh = 13,320 Joules. Target duration: 7 days. Max average energy budget: 13,320/7 = 1902 J/day. Energy breakdown/day: M7 idle ≈ 5mW baseline × 24hr = 432 J/day. Inference: 100 × 10ms × 100mW = 0.1 J/day. Radio: 50 × 100ms × 200mW = 1 J/day. Total/day ≈ 432 + 0.1 + 1 = 433.1 J/day. Target is easily met without any modifications, lasting over 30 days.'
  common_mistake: Mixing up power (mW) and energy (mWh) without converting seconds to hours properly, leading to massively overstated radio energy consumption.
  napkin_math: 'Radio energy/day: 50×0.1s×0.2W = 1 J. Inference/day: 100×0.01s×0.1W = 0.1 J. M7 baseline: 5mW×24×3600 = 432 J/day. Total = 433.1 J/day. Battery = 13,320 J. Life = 13320/433.1 = 30.7 days. The 7-day target is already met.'
