title: Power Budget Allocation on Cortex-M7+Ethos-U55 IoT Node
scenario: A battery-powered IoT device uses Cortex-M7 + Ethos-U55 with a 1000mAh,
  3.7V battery. The system must run for 7 days. The M7 draws 30mW active, Ethos-U55
  draws 100mW during inference, radio draws 200mW during transmission. Inference runs
  100 times/day, each taking 10ms. Radio transmits 50 times/day, each 100ms. Design
  a duty cycle to meet the 7-day target.
question: How would you design a duty cycle to meet the 7-day target?
details:
  realistic_solution: 'Battery energy: 1000mAh × 3.7V = 3700mWh. Target duration:
    7 days = 168hr. Max average power budget: 3700/168 = 22mW. Energy breakdown/day:
    M7 idle ≈ 5mW baseline × 24hr = 120mWh. Inference: 100 × 10ms × 100mW = 100mWh/day
    (Ethos-U55). Radio: 50 × 100ms × 200mW = 1000mWh/day! Radio dominates. Reduce
    radio to 10 transmits/day → 200mWh/day. Total/day ≈ 120+100+200=420mWh → 3700/420=8.8
    days. Goal met.'
  common_mistake: Calculating only peak power without integrating energy over the
    duty cycle; forgetting that energy = power × time.
  napkin_math: 'Radio energy/day: 50×0.1s×0.2W=1Wh=1000mWh. Inference/day: 100×0.01s×0.1W=0.1Wh=100mWh.
    M7 baseline: 5mW×24×60×60=432mWh/day. Total: 1532mWh/day → 3700/1532=2.4 days
    (fails). Reduce radio to 10/day: 200mWh → total 732mWh/day → 5.05 days. Reduce
    M7 to 2mW sleep: 172mWh/day → total 572mWh/day → 6.5 days. Add low-power sleep
    mode to M7 to hit 7 days.'
