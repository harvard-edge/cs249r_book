title: Power Budget Allocation on Cortex-M7+Ethos-U55 IoT Node
scenario: A battery-powered IoT device uses Cortex-M7 + Ethos-U55 with a 1000mAh, 3.7V battery. The system must run for 7 days. The M7 draws 30mW active and 5mW in idle. Ethos-U55 draws 100mW during inference, and the radio draws 200mW during transmission. Inference runs 100 times/day (10ms each). Radio transmits 50 times/day (100ms each).
question: Can the current duty cycle meet the 7-day operational target?
details:
  realistic_solution: 'Battery energy: 1000mAh × 3.7V = 3700mWh = 13,320 Joules. Target duration: 7 days. Max average energy budget: 13,320/7 = 1902 J/day. Energy breakdown/day: M7 idle ≈ 5mW baseline × 24hr = 432 J/day. Inference: 100 × 10ms × 100mW = 0.1 J/day. Radio: 50 × 100ms × 200mW = 1 J/day. Total/day ≈ 432 + 0.1 + 1 = 433.1 J/day. Target is easily met without any modifications, lasting over 30 days.'
  common_mistake: |
    **The Pitfall:** Mixing up power (mW) and energy (mWh/Joules) or failing to convert time units.
    **The Rationale:** Candidates multiply 200mW by 50 without converting 100ms to a fraction of an hour or second.
    **The Consequence:** This produces a massively overstated daily energy consumption, leading candidates to falsely conclude the system will fail and to unnecessarily cripple the duty cycle.
  napkin_math: |
    - **Battery Energy:** 1000 mAh * 3.7V = 3700 mWh = 13,320 Joules.
    - **Target Duration:** 7 days. Target max average budget = 13,320 / 7 = 1902 J/day.
    - **M7 Idle Energy:** 5 mW * 24 hours * 3600 sec = 432 J/day.
    - **Inference Energy:** 100 inferences * 0.01 sec * 100 mW = 0.1 J/day.
    - **Radio Energy:** 50 transmissions * 0.1 sec * 200 mW = 1 J/day.
    - **Total Energy/Day:** 432 + 0.1 + 1 = 433.1 J/day.
    - **Lifespan:** 13,320 J / 433.1 J/day = **30.7 days**.
    - **Conclusion:** The 7-day target is already met easily; no modifications are needed.
