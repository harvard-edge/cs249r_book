title: The Interrupt Latency Impact
scenario: Your industrial vibration monitor runs inference on a Cortex-M4 at 168 MHz. A high-priority sensor interrupt fires every 100 µs (10 kHz sampling). The ISR reads 6 bytes from SPI and writes to a buffer — taking 2.5 µs including entry/exit overhead. Your model inference takes 25ms.
question: How would you calculate the effective inference time with interrupt overhead, and determine at what sampling rate the interrupts make inference infeasible within a 30ms deadline?
details:
  realistic_solution: 'Quantify the interrupt tax on inference: total effective time T = Base / (1 - overhead). At 10 kHz with 2.5 µs overhead: T = 25ms / (1 - 0.025) = 25.64 ms. At 50 kHz: T = 25ms / (1 - 0.125) = 28.57 ms. To hit the 30ms deadline exactly, the maximum allowed overhead is (30-25)/30 = 16.67%. With a 2.5 µs ISR, the max safe rate is 16.67% / 2.5 µs = 66.7 kHz. However, actual ISR overhead is often higher due to pipeline disruptions (e.g., 4 µs effective overhead). With a 4 µs effective overhead, the maximum rate drops to 16.67% / 4 µs = 41.7 kHz. Thus, with pipeline disruptions, 50 kHz would miss the deadline. Safe approach: use DMA to eliminate interrupt overhead entirely.'
  common_mistake: |
    **The Pitfall:** Assuming interrupts don't affect main loop timing.
    **The Rationale:** Candidates think "Interrupts are instantaneous" and ignore the cycle-stealing effect of context switching.
    **The Consequence:** Every interrupt steals cycles from the main inference loop. On Cortex-M4, pushing registers to stack and pipeline disruption adds hidden overhead, causing the device to miss real-time deadlines.
  napkin_math: |
    - At 10 kHz: 2.5 µs / 100 µs = 2.5% overhead. T = 25 / (1 - 0.025) = 25.64 ms.
    - At 50 kHz: 2.5 µs / 20 µs = 12.5% overhead. T = 25 / (1 - 0.125) = 28.57 ms.
    - Max overhead for 30ms deadline: (30 - 25) / 30 = 16.67%.
    - Max rate with 2.5 µs ISR: 16.67% / 2.5 µs = 66.7 kHz.
    - With pipeline disruption (4 µs effective): Max rate = 16.67% / 4 µs = **41.7 kHz**.
    - At 50 kHz with 4 µs overhead, T = 25 / (1 - 0.20) = 31.25 ms (misses deadline).
