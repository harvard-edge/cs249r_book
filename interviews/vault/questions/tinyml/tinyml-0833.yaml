title: TinyML Gateway Hotspot
scenario: A farm has 100 sensors and 4 gateways. One gateway receives 70 sensors because of radio range, while the others receive 10 each. Each gateway can process 30 reports/minute.
question: Why does one TinyML gateway overload when 100 sensors are spread 70/10/10/10 across four gateways, and what happens during a 1 report/minute burst per sensor?
details:
  realistic_solution: The bottleneck is RF topology and spatial load balancing, not total gateway count. The system requires sensor reassignment, an additional gateway in the hotspot, or a strict edge shedding policy to drop lower-priority packets.
  common_mistake: |
    **The Pitfall:** Averaging the total sensor load equally across all gateways.
    **The Rationale:** Engineers assume uniform distribution of network traffic, ignoring the physical RF constraints and geographical clustering of edge sensors.
    **The Consequence:** The hotspot gateway severely overloads, leading to dropped packets and incomplete system data despite adequate theoretical total capacity.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hotspot gateway sensors: 70.
       - Burst rate: 1 report/min per sensor.
       - Gateway capacity: 30 reports/min.
    2. **Calculations:**
       - Peak demand on hotspot: 70 sensors * 1 report/min = 70 reports/min.
       - Capacity deficit: 70 reports/min - 30 reports/min = 40 reports/min.
    3. **Conclusion & Interpretation:**
       - **Result: 40 reports/min dropped.** The system is bottlenecked by spatial load balancing, requiring RF topology adjustments or strict data shedding.
