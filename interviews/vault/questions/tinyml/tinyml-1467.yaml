title: TinyML Streaming Anomaly on nRF5340
scenario: You are developing a real-time anomaly detection system for industrial equipment using a Nordic nRF5340 SoC. The device continuously collects vibration data from an accelerometer at 800 Hz (3-axis, 16-bit samples) and streams it via BLE to a local edge gateway. A tinyML model on the device performs pre-filtering, generating a 32-byte feature vector every 100ms. Operators report intermittent 'blind spots' where data updates cease for 1-2 seconds, followed by a burst of delayed data. Monitoring reveals CPU utilization spikes to 95-100% just before these data gaps, despite the feature extraction model itself consuming only 10% CPU.
question: "What is the most likely root cause of the data drops and CPU spikes before inference on the nRF5340?"
details:
  realistic_solution: "The symptoms indicate a pipeline stall or resource exhaustion, likely due to inefficient data buffering, context switching, or interrupt handling under sustained load. Implement a non-blocking, circular DMA-driven buffer for raw sensor data acquisition to minimize CPU overhead. Optimize data structures for BLE payloads to reduce CPU cycles spent on packing/unpacking and minimize the number of packets where possible. Focus diagnosis on the interplay between sensor data acquisition, intermediate buffering, and the BLE transmit buffer management, especially under load when the BLE stack might demand more CPU for data preparation or retransmissions."
  common_mistake: |
    **The Pitfall:** Immediately suspecting the tinyML model's inference time or the BLE radio's reliability.
    **The Rationale:** Engineers default to blaming the ML workload or RF environment when timing issues arise.
    **The Consequence:** Time is wasted optimizing a model that only uses 10% CPU, while the true MCU data handling pipeline bottleneck remains unfixed.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Sensor: 800 Hz, 3-axis, 16-bit.
       - Feature vector: 32 bytes every 100 ms.
       - CPU: 128 MHz (approx 128M instructions/sec).
    2. **Calculations:**
       - Raw sensor data rate = 800 samples/sec * 3 axes * 2 bytes/sample = 4,800 B/s (4.8 KB/s).
       - Feature vector output = 32 B / 0.1 s = 320 B/s.
    3. **Conclusion & Interpretation:**
       - **Result: CPU spike caused by polling/interrupt overhead handling 4.8 KB/s raw data without DMA.**
       - **I/O-Bound**
