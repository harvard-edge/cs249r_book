title: TinyML Streaming Anomaly on nRF5340
scenario: You are developing a real-time anomaly detection system for industrial equipment using a Nordic nRF5340 SoC (128 MHz ARM Cortex-M33, 256 KB SRAM, 1 MB flash, BLE 5.2). The device continuously collects vibration data from an accelerometer at 800 Hz (3-axis, 16-bit samples) and streams it via BLE to a local edge gateway for further processing. A tinyML model on the nRF5340 performs pre-filtering and feature extraction, generating a 32-byte feature vector every 100ms. Lately, operators have reported intermittent 'blind spots' in the real-time dashboard — periods where data updates cease for 1-2 seconds, followed by a burst of delayed data. Monitoring reveals the nRF5340's CPU utilization frequently spikes to 95-100% just before these data gaps, despite the feature extraction model itself consuming only an average of 10% CPU. The BLE link quality is generally stable.
question: "What is the most likely root cause of the data drops and CPU spikes before inference on the nRF5340?"
details:
  realistic_solution: "The symptoms indicate a pipeline stall or resource exhaustion on the nRF5340, likely due to inefficient data buffering, context switching, or interrupt handling under sustained load. Given the high sensor data rate (800 Hz * 3 axes * 2 bytes/sample = 4.8 KB/s raw data) and a 128 MHz CPU with only 256 KB SRAM, consider: \n1. **Inefficient Buffering:** The raw sensor data is significant. If a simple blocking buffer or frequent memory allocations/copies are used, it can lead to stalls. Implement a non-blocking, circular DMA-driven buffer for raw sensor data acquisition to minimize CPU overhead and ensure continuous sampling. \n2. **Task Prioritization/RTOS:** Ensure that the BLE transmission task and critical sensor data processing have appropriate priorities. If an RTOS is used, verify task stack sizes and prevent priority inversions. \n3. **BLE Packetization Overhead:** While feature vectors are 32 bytes/100ms, raw data handling is concurrent. Aggressive polling or synchronous operations within the BLE stack's interaction could block other critical tasks. Optimize data structures for BLE payloads to reduce CPU cycles spent on packing/unpacking and minimize the number of packets where possible. \n4. **Interrupt Latency:** High-frequency sensor interrupts or other peripherals might be causing excessive context switching or blocking higher-priority tasks if their handlers are not optimized for speed. \nFocus diagnosis on the interplay between sensor data acquisition, intermediate buffering, and the BLE transmit buffer management, especially under load when the BLE stack might demand more CPU for data preparation or retransmissions."
  common_mistake: |
    **The Pitfall:** Immediately suspecting the tinyML model's inference time or the BLE radio's reliability.
    **The Rationale:** Engineers default to blaming the ML workload or RF environment when timing issues arise.
    **The Consequence:** Time is wasted optimizing a model that only uses 10% CPU, while the true MCU data handling pipeline bottleneck remains unfixed.
  napkin_math: |
    * Raw sensor data rate: 800 samples/sec × 3 axes × 2 bytes/sample = 4,800 B/s (4.8 KB/s).
    * Feature vector output: 32 B / 100 ms = 320 B/s.
    * The 128 MHz CPU executes ~128 million instructions per second.
    * If each byte copied or each buffer management operation takes 100s of cycles, handling 4.8 KB/s (raw) + 320 B/s (features) consumes significant cycles if not highly optimized via DMA.
    * A 1-2 second 'blind spot' suggests a buffer overflow or a critical path blocking for an extended duration, leading to dropped frames.
