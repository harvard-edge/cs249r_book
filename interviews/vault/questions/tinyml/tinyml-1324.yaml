title: TinyML Resource Estimation for Keyword Spotting on nRF5340
scenario: You are designing a low-power, always-on keyword spotting system for a smart home device. The chosen microcontroller is the Nordic nRF5340, featuring a 128 MHz Arm Cortex-M33 processor, 256 KB of SRAM, and 1 MB of flash memory, with integrated Bluetooth Low Energy (BLE). You've developed a small convolutional neural network (CNN) model for detecting a specific wake word.
question: How should you estimate MACs, peak RAM, latency, and quantization choices for nRF5340 keyword spotting?
details:
  realistic_solution: A realistic solution involves using tools like TensorFlow Lite Micro's built-in profiler or similar utilities to get accurate MACC counts and memory footprints specific to the target device. Employing aggressive post-training quantization (e.g., 8-bit integer quantization for weights and activations) is crucial, potentially even exploring binary or ternary neural networks. Benchmarking critical model layers or even the full model on the target hardware or a cycle-accurate simulator provides the most accurate latency estimates. Consideration of specialized TinyML compilers or frameworks that optimize for such constrained devices is also key, along with careful model architecture design to minimize computational and memory demands.
  common_mistake: |
    **The Pitfall:** Treating MACCs as equivalent to FLOPs from a desktop/server context.
    **The Rationale:** Candidates underestimate the severe resource constraints (SRAM, flash, CPU clock speed) and forget that intermediate activations and system overhead consume critical SRAM.
    **The Consequence:** Designing models that either don't fit in the 256 KB SRAM or perform too poorly for real-time always-on use.
  napkin_math: |
    1. **MACCs Estimation:** Conv layer MACCs ≈ `Out_Channels × In_Channels × Kernel_H × Kernel_W × Out_H × Out_W`. FC MACCs ≈ `In_Neurons × Out_Neurons`.
    2. **Memory (RAM) Estimation:** Peak RAM ≈ `Weights_Size` + `Max_Activation_Size` + `I/O_Buffers` + `System_Overhead`.
    3. **Quantization Impact:** For 8-bit quantized models, `Bytes_per_param` becomes 1.
    4. **Latency Estimation:** Latency ≈ `Total_MACCs / (Clock_Frequency_Hz / Cycles_per_MACC)`.
    5. **nRF5340 Latency:** At 128 MHz with ~2 cycles/MACC for integer ops: `128M / 2 = 64 MMACCs/sec`. Latency = `Total_MACCs / 64M` seconds.
