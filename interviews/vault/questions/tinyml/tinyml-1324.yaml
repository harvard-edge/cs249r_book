title: TinyML Resource Estimation for Keyword Spotting on nRF5340
scenario: You are designing a low-power, always-on keyword spotting system using a small Convolutional Neural Network (CNN) on a Nordic nRF5340 microcontroller.
question: How should you estimate MACs, peak RAM, latency, and quantization choices for nRF5340 keyword spotting?
details:
  realistic_solution: Utilize nsys profiling or TFLM profiler. Apply aggressive PTQ (INT8/INT4) and estimate latency using cycles-per-MAC limits.
  common_mistake: |
    **The Pitfall:** Treating MACCs as equivalent to FLOPs from a desktop/server context.
    **The Rationale:** Candidates underestimate the severe resource constraints (SRAM, flash, CPU clock speed) and forget that intermediate activations and system overhead consume critical SRAM.
    **The Consequence:** Designing models that either don't fit in the 256 KB SRAM or perform too poorly for real-time always-on use.
  napkin_math: |
    **Assumptions & Constraints:**
    - nRF5340: 128 MHz Cortex-M33, 256 KB SRAM, 1 MB Flash.
    - SIMD limits: ~2 cycles/MACC for integer ops.

    **Calculations:**
    - Throughput: 128 MHz / 2 cycles/MACC = 64 MMACCs/sec.
    - Quantization: 8-bit weights -> 1 byte/param.
    - Memory: Peak RAM = Weights + Max_Activation + Overhead.

    **Conclusion & Interpretation:**
    - **Result: 64 MMACCs/sec peak throughput at INT8 (SRAM-Bound)**. The MCU requires aggressive PTQ or QAT to fit activations.
