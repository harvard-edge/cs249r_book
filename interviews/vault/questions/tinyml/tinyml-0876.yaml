title: 'Model Format Conversion: Optimize TFLM Model to Fit Within MCU Flash Constraint'
scenario: 'A TFLite Micro anomaly detection model (300K INT8 params, 3 MOPs) must fit in 256KB Flash on ESP32-S3 (stored in internal Flash for XIP). Current .tflite file is 310KB. The application binary uses 80KB. Total: 390KB, overflowing by 134KB.'
question: How would you quantify the minimum combination of optimizations needed without exceeding 2% accuracy degradation?
details:
  realistic_solution: 'Options: (1) Reduce TFLM op kernels (50→5 ops needed): saves 40KB Flash (saves in app, not model). New total: 350KB, still 94KB over. (2) Model architecture reduction: reduce filter counts 50% → 75K params → 75KB Flash. New model: 75+80+40=195KB ✓ but 75% fewer params → likely >2% accuracy drop. (3) Zlib compress model + decompress to PSRAM at boot: compress 300KB INT8 model to ~150KB. Boot time: decompress 150KB → 300KB, ~10ms. Total Flash: 150+80+10 = 240KB ✓. Accuracy: 0%. Best option.'
  common_mistake: |
    **The Pitfall:** Applying unstructured weight pruning and expecting the .tflite file size to reduce proportionally.
    **The Rationale:** Candidates forget that unstructured pruning does not natively compress the file format.
    **The Consequence:** The model still exceeds the Flash constraint without active compression.
  napkin_math: |
    - Compression baseline: Quantized weights (0-255 uniform) compress poorly (~20% reduction).
    - Compress 300KB INT8 model: 300KB * 0.8 = 240KB.
    - Add application binary: 240KB + 80KB = 320KB (>256KB constraint).
    - Reduce model params by 30%: 210K INT8 = 210KB.
    - Compress reduced model: 210KB * 0.8 = 168KB.
    - **Total Flash: 168KB (model) + 80KB (app) = 248KB. This fits under 256KB with only ~1.5% accuracy risk.**
