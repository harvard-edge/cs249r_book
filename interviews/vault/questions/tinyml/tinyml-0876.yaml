title: 'Model Format Conversion: Optimize TFLM Model to Fit Within MCU Flash Constraint'
scenario: 'A TFLite Micro anomaly detection model (300K INT8 params, 3 MOPs) must
  fit in 256KB Flash on ESP32-S3 (stored in internal Flash for XIP). Current .tflite
  file is 310KB. The application binary uses 80KB. Total: 390KB, overflowing by 134KB.
  Quantify the minimum combination of optimizations needed without exceeding 2% accuracy
  degradation.'
question: How would you quantify the minimum combination of optimizations needed without
  exceeding 2% accuracy degradation?
details:
  realistic_solution: 'Options: (1) Reduce TFLM op kernels (50→5 ops needed): saves
    40KB Flash (saves in app, not model). New total: 350KB, still 94KB over. (2) Model
    architecture reduction: reduce filter counts 50% → 75K params → 75KB Flash. New
    model: 75+80+40=195KB ✓ but 75% fewer params → likely >2% accuracy drop. (3) Zlib
    compress model + decompress to PSRAM at boot: compress 300KB INT8 model to ~150KB.
    Boot time: decompress 150KB → 300KB, ~10ms. Total Flash: 150+80+10 = 240KB ✓.
    Accuracy: 0%. Best option.'
  common_mistake: Applying weight pruning and expecting Flash size to reduce proportionally;
    unstructured pruning doesn't reduce .tflite file size — structured pruning or
    compression does.
  napkin_math: 'Compression: INT8 random-looking weights compress poorly (~80% of
    original). INT8 quantized weights (0-255 uniform): ~20% compression. Result: 300KB
    × 0.8 = 240KB. Plus app 80KB = 320KB > 256KB. Still too large. Reduce model 30%:
    210K INT8 = 210KB × 0.8 compressed = 168KB + 80KB = 248KB ✓. Inference: 3M × 0.7
    = 2.1M ops / 240M = 8.75ms. Latency unchanged. Accuracy risk: 30% param reduction
    → ~1.5% degradation.'
