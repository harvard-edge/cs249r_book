title: 'The Wildlife Sensor''s Energy Budget: Duty Cycling & Energy Harvesting'
scenario: You're designing a battery-powered wildlife monitoring sensor using a Cortex-M4 microcontroller. The device wakes up once every minute (the 'period') to perform a 1-second audio classification task, then returns to deep sleep. The Cortex-M4 consumes 40 mW during active inference and 10 µW in deep sleep.
question: How do you compute average power for a Cortex-M4 wildlife sensor's once-per-minute wake-sleep duty cycle?
details:
  realistic_solution: 'Average power for a duty-cycled system: P_avg = (P_active * t_active + P_sleep * t_sleep) / t_period. E_active = 40 mW * 1s = 40 mJ. E_sleep = 0.01 mW * 59s = 0.59 mJ. P_avg = 40.59 mJ / 60s = 0.6765 mW ≈ 0.68 mW. The sleep term contributes ~1.4% of total energy. Battery life on a 225 mAh (3.0V = 675 mWh) battery would be 675 mWh / 0.6765 mW = 997 hours = 41.5 days.'
  common_mistake: |
    **The Pitfall:** Forgetting the sleep duration contributes to total energy or incorrectly averaging power values.
    **The Rationale:** Engineers assume sleep power is zero or calculate simple unweighted averages like (40mW + 10µW)/2.
    **The Consequence:** Battery life estimations are drastically incorrect, leading to premature field deployment failures.
  napkin_math: |
    - Calculate Active Energy: 40 mW * 1s = 40 mJ.
    - Calculate Sleep Energy: 0.01 mW * 59s = 0.59 mJ.
    - Total Energy per period: 40 mJ + 0.59 mJ = 40.59 mJ.
    - **Average Power:** 40.59 mJ / 60s = **0.6765 mW** (≈ 0.68 mW).
  options:
  - ~0.667 mW
  - ~20 mW
  - ~0.677 mW
  - 40 mW
  correct_index: 2
