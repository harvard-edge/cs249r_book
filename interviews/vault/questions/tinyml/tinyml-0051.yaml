title: 'The Wildlife Sensor''s Energy Budget: Duty Cycling & Energy Harvesting'
scenario: You're designing a battery-powered wildlife monitoring sensor using a Cortex-M4 microcontroller.
  The device wakes up once every minute (the 'period') to perform a 1-second audio classification task,
  then returns to deep sleep. The Cortex-M4 consumes 40 mW during active inference and 10 µW in deep sleep.
  Calculate the average power consumption over one full period.
details:
  realistic_solution: 'Average power for a duty-cycled system: P_avg = (P_active * t_active + P_sleep
    * t_sleep) / t_period. If P_active = 40 mW (MCU + sensor), t_active = 30 ms, P_sleep = 4 uA * 3.0V
    = 12 uW, t_sleep = 59,970 ms (once per minute): E_active = 40 * 30 = 1,200 uJ. E_sleep = 0.012 * 59,970
    = 719.6 uJ. P_avg = 1,919.6 / 60,000 = 0.032 mW = 32 uW. Battery: 225 mAh * 3.0V = 675 mWh. Lifetime
    = 675 / 0.032 = 21,094 hours = 2.4 years. The sleep term contributes 37.5% of total energy — unlike
    faster duty cycles, at 1/min the leakage current is no longer negligible and must be included.'
  common_mistake: Engineers new to embedded systems often either (a) forget that the long sleep duration
    still contributes to the total energy budget, even if the power is tiny, or (b) incorrectly average
    the power values (e.g., (40mW + 10µW)/2) without weighting them by the time spent in each state.
  napkin_math: 1. **Calculate Active Energy:** E_active = 40 mW * 1s = 40 mJ. 2. **Calculate Sleep Energy:**
    E_sleep = 0.01 mW * 59s = 0.59 mJ. 3. **Calculate Total Energy:** E_total = 40 + 0.59 = 40.59 mJ.
    4. **Calculate Average Power:** P_avg = 40.59 mJ / 60s = 0.677 mW ≈ 0.68 mW. The duty cycle is 1/60
    = 1.67%. Average power is dominated by the brief active burst. Even though sleep power (10 µW) is
    4,000x less than active power (40 mW), the 59s of sleep still contributes ~0.59 mJ — small but nonzero.
  options:
  - ~0.667 mW
  - ~20 mW
  - ~0.677 mW
  - 40 mW
  correct_index: 2
