title: Diagnosing SRAM Exhaustion on nRF5340 with BLE
scenario: Your team trained a TinyML keyword spotting model for the Nordic nRF5340. The model's int8 weights
  are 200 KB, easily fitting into the 1 MB flash. The inference engine reports a peak activation size
  (tensor arena) of 180 KB. Since the application core of the nRF5340 has 256 KB of SRAM, the team assumed
  the memory footprint was safe. However, when integrated with the main application that transmits inference
  results via BLE 5.3, the device consistently hard faults with an Out-Of-Memory (OOM) error during system
  initialization. What memory components did the team fail to estimate?
question: "Which nRF5340 SRAM users were missing from the team's 180 KB tensor-arena estimate?"
details:
  realistic_solution: The root cause is ignoring the system-level SRAM requirements. On the dual-core
    nRF5340, while the BLE controller runs on the 64 MHz network core, the 128 MHz application core still
    requires significant SRAM for the RTOS (e.g., Zephyr), the BLE host stack, IPC buffers for cross-core
    communication, and the application heap/stack. The model's peak activation memory must be reduced
    to leave adequate room for these system components.
  common_mistake: Candidates often treat the microcontroller's total SRAM as exclusively available for
    the ML model's tensor arena. They fail to account for the memory footprint of the RTOS, communication
    stacks, and application-level buffers required for real-world deployment.
  napkin_math: Total App Core SRAM = 256 KB. Model Tensor Arena = 180 KB. Remaining SRAM for System =
    256 KB - 180 KB = 76 KB. Typical Zephyr RTOS + BLE Host Stack + IPC overhead = ~90 KB to 110 KB. Minimum
    Deficit = 90 KB - 76 KB = 14 KB deficit. The system runs out of memory allocating RTOS/BLE buffers
    before inference even begins.
