title: Duty Cycling Strategy for Battery Life on Cortex-M4 Wearable
scenario: A wearable device uses Cortex-M4 at 168MHz (50mW active) for fall detection. The accelerometer samples at 100Hz. Each inference takes 10ms and consumes 0.5mJ. The device has a 300mAh battery at 3.7V. Without duty cycling, the device runs inference at 10Hz (every 100ms).
question: How would you calculate battery life and propose a duty cycling strategy for 7-day operation?
details:
  realistic_solution: 'Current inference rate: 10 inferences/sec. Energy per inference: 0.5mJ. Inference power: 10 × 0.5mJ/s = 5mW. Sleep power (Cortex-M4 stop mode): ~0.5mW. Accelerometer active: ~0.1mA × 3.7V = 0.37mW. Total active: ~10mW (including peripherals). Battery: 300mAh × 3.7V = 1.11Wh = 3996J. Current life: 3996J / (10mW × 3600s/hr) = 111 hours ≈ 4.6 days. Target: 7 days = 168 hours. Required power: 3996J / (168 × 3600) = 6.6mW. Duty cycle: run inference 1Hz instead of 10Hz = save 4.5mW inference. New power: 5.5mW → 202 hours = 8.4 days. Add wake-on-motion: sleep at 0.5mW, wake only on motion threshold → average ~1mW → 40+ days.'
  common_mistake: |
    **The Pitfall:** Calculating only inference energy without baseline peripheral power.
    **The Rationale:** Candidates ignore the sleep-mode wake-up overhead and the constant sensor/radio power draw that dominate over inference costs.
    **The Consequence:** Estimated battery life predictions are wildly inaccurate compared to real hardware.
  napkin_math: |
    - Battery Energy: 300mAh * 3.7V = 1.11Wh = 3996 Joules.
    - 10Hz Baseline Power: Inference (5mW) + Sleep (0.5mW) + Sensor (0.37mW) $\approx$ 10mW total.
    - Baseline Life: 3996J / 10mW $\approx$ 111 hours (4.6 days - fails 7-day goal).
    - Duty Cycle to 1Hz: Saves 4.5mW inference power. New total $\approx$ 5.5mW.
    - 1Hz Life: 3996J / 5.5mW $\approx$ 202 hours (**8.4 days**).
    - **Optimized Strategy:** Reduce inference to 1Hz + wake-on-motion ($\sim$1mW avg $\rightarrow$ 46 days).
