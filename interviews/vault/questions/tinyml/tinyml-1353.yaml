title: Optimizing TinyML Inference Latency on STM32F4
scenario: A tiny ML model, designed for real-time anomaly detection, is deployed on an ARM Cortex-M4 STM32F4 microcontroller (168 MHz, 256 KB SRAM, no FPU). During initial testing, you observe that the end-to-end inference latency is consistently exceeding your strict 10ms deadline, occasionally spiking to 25ms. The model involves several 8-bit integer convolutions and fully connected layers.
question: What specific profiling techniques and tools would you employ, considering the lack of an FPU and limited SRAM?
details:
  realistic_solution: '1. **Initial Instrumentation**: Insert timestamping (e.g., using a high-resolution timer peripheral like TIM2/TIM5) around major model layers, data acquisition, and output stages. Log these timestamps to a serial port or expose them via a debugger to identify coarse-grained slow sections. 2. **Detailed Function Profiling**: If timestamps indicate a specific section is slow, use a hardware debugger (e.g., GDB with OpenOCD/ST-Link via STM32CubeIDE or Keil MDK) to perform function-level profiling. Leverage the Cortex-M4''s Data Watchpoint and Trace (DWT) unit for precise cycle counting of code blocks and functions. 3. **Memory Access Analysis**: Analyze memory access patterns. Monitor bus activity and assess the impact of SRAM access, especially for large arrays of weights or activations. On an M4, data movement between memory and registers is costly. Look for excessive copying or non-contiguous accesses. Consider the use of DMA for I/O to offload the CPU. 4. **I/O Bottleneck Identification**: Measure the time spent in sensor data acquisition routines (e.g., ADC reads, SPI/I2C transfers). Blocking I/O operations can severely impact latency. Utilize a logic analyzer to visualize timing of external interfaces. 5. **System-Level View**: Combine insights from instrumentation, function profiling, and memory/I/O analysis to construct a mental execution timeline. This helps pinpoint exact latency hot spots and prioritize optimization efforts. For example, if integer convolution kernels are taking excessive cycles, it''s compute. If loading weights from flash or transferring sensor data is slow, it''s I/O/memory.'
  common_mistake: |
    **The Pitfall:** Assuming a compute-bound bottleneck and immediately optimizing arithmetic operations.
    **The Rationale:** Developers often focus on optimizing convolutions without first verifying whether memory access patterns or I/O delays are the true culprits.
    **The Consequence:** Significant effort is wasted rewriting arithmetic kernels while the system remains bottlenecked by slow sensor reads or external memory stalls.
  napkin_math: |
    **Assumptions & Constraints:**
    - Clock Cycle Time: 168 MHz clock = 1 / 168,000,000 ≈ 5.95 ns per cycle.
    - MAC Operations: A single 8-bit integer MAC takes ~2 cycles (no FPU), which is ~11.9 ns.

    **Calculations:**
    - Theoretical Inference: A 1 million MAC layer ideally takes 1,000,000 * 11.9 ns = 11.9 ms.

    **Conclusion & Interpretation:**
    - **Result: Exceeds 10ms deadline (Compute-Bound).** Pure computation alone exceeds the 10ms deadline, indicating profiling must distinguish compute cycles from I/O overheads.
