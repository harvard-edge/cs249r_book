title: Junction Temperature Estimation for Cortex-M4 Under ML Workload
scenario: An STM32F4 (Cortex-M4, 168MHz, 50mW at full load) in a plastic enclosure (θ_jc=1.5°C/W, θ_ca=50°C/W) runs continuous inference for a predictive maintenance system in a 50°C industrial environment.
question: How would you calculate steady-state junction temperature and determine if de-rating is needed?
details:
  realistic_solution: 'Full thermal resistance: θ_ja = θ_jc + θ_ca = 1.5 + 50 = 51.5°C/W. Power: 50mW = 0.05W. ΔT = 0.05W * 51.5°C/W = 2.575°C. Junction temp: 50 + 2.575 = 52.6°C. STM32F4 max junction: 105°C (industrial grade) or 85°C (standard). 52.6°C is well within limits for both grades. No de-rating needed. However, if we run at 168MHz with full DSP utilization (worst case 100mW): ΔT = 0.1 * 51.5 = 5.15°C. Junction = 55.15°C — still safe. The 50°C/W case-to-ambient is high (poor PCB thermal design) but at MCU power levels, junction temperature is benign.'
  common_mistake: |
    **The Pitfall:** Using only the junction-to-case thermal resistance (θ_jc) for calculations.
    **The Rationale:** Candidates forget to add the case-to-ambient resistance (θ_ca) to find the full junction-to-ambient (θ_ja) path.
    **The Consequence:** Drastically underestimating the junction temperature and missing potential thermal failures.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cortex-M4 at 50 mW power. Ambient: 50 °C.
       - Thermal Resistance: θ_jc = 1.5 °C/W, θ_ca = 50 °C/W.
    2. **Calculations:**
       - Thermal Resistance (θ_ja): 1.5 + 50 = 51.5 °C/W.
       - Power: 50 mW = 0.05 W.
       - Temperature Rise: 0.05 * 51.5 = 2.575 °C.
       - Junction Temperature: 50 + 2.575 = 52.575 °C.
    3. **Conclusion & Interpretation:**
       - **Result: 52.6 °C junction temp.** Well within constraints, proving that MCU junction temps are generally safe under ML loads without extreme environment temps.
