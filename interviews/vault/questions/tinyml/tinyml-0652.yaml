title: The Float-to-Int Hardware Trap
scenario: You are profiling a TinyML model on an older Cortex-M4F. The layer is a simple Dequantization
  node that takes an `int8_t` array and converts it to a `float` array. The M4F has a hardware floating-point
  unit (FPU). However, the profiler shows this conversion taking 45 cycles per element instead of the
  expected 2 cycles. Why is the hardware FPU ignoring your code?
question: "Why is the hardware FPU ignoring your code?"
details:
  realistic_solution: 'The Cortex-M4F''s FPU handles float-to-float and int32-to-float (VCVT.F32.S32)
    in 1 cycle, but there is no direct int8-to-float hardware path. The compiler generates: (1) sign-extend
    int8 to int32 via SXTB (~2 cycles), (2) move to FPU register via VMOV (~4 cycles, pipeline stall crossing
    integer-to-FPU domain), (3) convert int32-to-float via VCVT (~1 cycle), plus loop overhead. Total:
    ~15-45 cycles depending on pipeline stalls. Fix: batch convert using SIMD — sign-extend 4 int8 values
    simultaneously with CMSIS intrinsics, then convert in a tight loop, reducing amortized cost to ~5
    cycles/element.'
  common_mistake: '"Memory bandwidth is slowing it down." Fetching 1 byte and writing 4 bytes takes ~6
    cycles, not 45.'
  napkin_math: For a 100,000 element tensor, 45 cycles = 4.5 million cycles. 2 cycles = 200k cycles. Relying
    on implicit compiler casting on an M4F made your dequantization layer 22x slower than it should be.
