title: MCU Power State Machine for Multi-Model ML Pipeline
scenario: 'Design a power state machine for ESP32-S3 running a 3-stage ML pipeline: (1) audio preprocessing
  (always-on, 5mW), (2) keyword detection (triggered, 30mW, 20ms), (3) NLP response classification (triggered
  on keyword, 40mW, 100ms). Target: 1-year battery life on 2000mAh LiPo. Specify states and transitions.'
details:
  realistic_solution: 'Battery: 2000mAh × 3.7V = 7.4Wh = 26,640J. 1 year = 31.5M seconds. Max average
    power: 26640/31500000 = 0.846mW. States: S0=Deep Sleep (20μW, sensors off), S1=Audio Monitoring (5mW,
    microphone+preprocessing), S2=Keyword Detection (30mW, 20ms burst), S3=NLP Processing (40mW, 100ms
    burst). Keyword rate: 10×/day = 1/8640 Hz = 0.0001157 Hz. NLP rate: same as keyword (always follows).
    Average power: S1 always-on (5mW) + S2 bursts (10/day × 30mW × 0.02s = 0.006mW) + S3 bursts (10/day
    × 40mW × 0.1s = 0.046mW) = 5.052mW. Required 0.846mW — S1 alone exceeds budget! Fix: duty-cycle S1
    at 17% duty → 5mW×0.17 = 0.85mW. Wake every 6s, listen 1s. Total: 0.85 + 0.052 = 0.9mW ≈ budget. Or
    use hardware VAD at 0.3mW.'
  common_mistake: Running all three stages simultaneously instead of using triggered activation; a cascade
    pipeline where later stages only activate when earlier stages trigger saves 80%+ power.
  napkin_math: 'Battery avg power budget: 0.846mW. Always-on audio at 5mW exceeds budget. Duty cycle:
    0.846mW/5mW = 16.9% duty cycle. Solution: wake 1s every 6s for audio monitoring. S2 bursts: 0.006mW.
    S3 bursts: 0.046mW. Total: 0.85+0.052 = 0.9mW ≈ 1 year. Or HW VAD: 0.3mW always-on, trigger on voice
    activity.'
