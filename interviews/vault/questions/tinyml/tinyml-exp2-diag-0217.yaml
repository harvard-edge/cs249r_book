title: Nordic nRF5340 SRAM Crash During Convolution
scenario: You are deploying a keyword spotting model on a Nordic nRF5340 (128 MHz app core, 256 KB SRAM,
  1 MB flash). The offline memory planner reports a peak SRAM usage of 140 KB for the tensor arena. The
  RTOS and BLE 5.3 stack statically consume 60 KB of SRAM, which theoretically leaves a safe 56 KB margin
  out of the 256 KB total. However, when you execute the model, the device immediately hard faults with
  an out-of-memory error during the first optimized convolution operation.
question: "Why does the nRF5340 keyword model HardFault during the first optimized convolution despite a 140 KB tensor arena estimate?"
details:
  realistic_solution: The root cause is that the offline planner calculated the peak memory for tensor
    activations but omitted the operator scratchpad memory (such as im2col buffers) required by the CMSIS-NN
    convolution kernel running on the app core. To diagnose this, inspect the fault registers and the
    kernel's workspace allocation request. The fix is to use an MCU-aware memory planner that includes
    scratchpad requirements and adjust the linker script to allocate the correct contiguous arena size.
  common_mistake: Candidates often incorrectly diagnose this as dynamic memory fragmentation caused by
    the BLE stack or suspect a memory leak. They fail to analyze how optimized MCU kernels manage temporary
    workspace and blindly trust the offline planner's activation-only memory estimate.
  napkin_math: 'Total nRF5340 SRAM: 256 KB. System usage (RTOS + BLE 5.3): 60 KB. Available SRAM: 256
    - 60 = 196 KB. Planned arena (activations): 140 KB. Additional scratchpad for first Conv2D (e.g.,
    3x3 filter, 32 input channels, 16x16 output resolution): 3 * 3 * 32 * 16 * 16 bytes = 73,728 bytes
    (~72 KB). Actual peak arena required: 140 KB + 72 KB = 212 KB. Total required SRAM: 212 KB (arena)
    + 60 KB (system) = 272 KB. 272 KB > 256 KB total SRAM, resulting in a deterministic crash.'
