title: PTQ vs QAT Trade-offs on Cortex-M4
scenario: You must choose between post-training quantization (PTQ) and quantization-aware
  training (QAT) for an anomaly detection model on a Cortex-M4 microcontroller.
question: Evaluate the trade-offs of using INT8 PTQ versus INT8 QAT given the Cortex-M4's
  KB-scale SRAM and lack of hardware floating-point acceleration.
details:
  realistic_solution: PTQ is faster to implement but suffers accuracy drops due to
    clipping and rounding errors in sensitive models. QAT simulates quantization during
    training to adapt weights. Since the Cortex-M4 lacks an FPU, inference must be
    pure integer math; QAT's learned scale factors optimize accuracy while adhering
    to strict integer-only arithmetic and tight SRAM bounds.
  common_mistake: Evaluating the trade-off based on training hardware constraints
    rather than the impact on final model accuracy and inference-time integer execution.
  napkin_math: 8-bit / 32-bit = 0.25x memory footprint.
