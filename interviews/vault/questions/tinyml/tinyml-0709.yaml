title: The Tensor Arena Overflow
scenario: Your model's tensor arena needs 210 KB for peak activation memory, but your Cortex-M4 only has
  200 KB of SRAM available (after firmware and stack). The model fits in flash. You can't change the model
  architecture. How do you fit it?
details:
  realistic_solution: 'The 210 KB peak occurs at one specific point in the model — typically where two
    large activation tensors coexist (e.g., the input and output of the largest layer). TFLite Micro''s
    memory planner already optimizes tensor lifetimes, but you can push further:'
  common_mistake: '"Reduce the input resolution." The question says you can''t change the model — input
    resolution is part of the model''s expected input shape.'
  napkin_math: 'Peak at layer 5: input tensor (100 KB) + output tensor (110 KB) = 210 KB. With in-place
    ReLU after layer 5: output overwrites input → peak = 110 KB. With 2× tiling: input tile (50 KB) +
    output tile (55 KB) = 105 KB. With both: 55 KB peak at layer 5. New global peak shifts to layer 8:
    180 KB. Fits in 200 KB with 20 KB headroom.'
