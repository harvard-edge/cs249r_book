title: The Lookup Table vs Compute Tradeoff
scenario: A sigmoid activation function on a Cortex-M4 consumes ~120 cycles using a math library. Replacing it with a 256-entry Flash lookup table (LUT) requires ~3 cycles per execution.
question: "If a model layer has 1,000 activations per inference, how many cycles does each approach use, and what is the speedup?"
details:
  realistic_solution: Compile-time constant folding and discrete non-linear mapping strictly replaces high-latency transcendental calculations with dense index lookups, leveraging idle Flash boundaries to circumvent the CPU's mathematical execution deficits.
  common_mistake: |
    **The Pitfall:** Blindly utilizing Lookup Tables across arbitrarily large resolutions without tracking Flash memory budgets.
    **The Rationale:** Developers obsess over calculation acceleration and fail to contextualize exponential spatial memory expansion.
    **The Consequence:** Resolving 16-bit inputs explodes the LUT array to 65,536 entries, triggering sudden terminal compilation memory bounds on 1 MB microcontrollers.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Math iteration: 120 cycles.
       - LUT iteration: 3 cycles.
       - Volume constraint: 1,000 activations per frame.
    2. **Calculations:**
       - Computational overhead: 1,000 * 120 = 120,000 cycles.
       - LUT indexing execution: 1,000 * 3 = 3,000 cycles.
       - Realized pipeline speedup: 120,000 / 3,000 = 40x.
    3. **Conclusion & Interpretation:**
       - **Result: The LUT consumes 3,000 cycles, generating an absolute 40x speedup factor over math libraries (Compute-Bound Optimization).**
  options:
  - A) LUT is 4× faster (30,000 vs 120,000 cycles)
  - B) LUT is 10× faster (12,000 vs 120,000 cycles)
  - C) LUT is 40× faster (3,000 vs 120,000 cycles)
  - D) LUT is 120× faster (1,000 vs 120,000 cycles)
  correct_index: 2
