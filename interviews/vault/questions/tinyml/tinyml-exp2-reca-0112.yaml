title: Identifying Peak NPU Throughput for Corstone-300 Architecture Search
scenario: We are configuring a hardware-aware Neural Architecture Search (NAS) pipeline targeting an ARM
  Cortex-M7 + Ethos-U55 (Corstone-300) subsystem. The search space must be constrained to avoid proposing
  architectures that exceed the peak compute capabilities of the NPU. The system features a 480 MHz M7
  and shares 512 KB of SRAM with the Ethos-U55. To correctly set the upper bound for the search space's
  latency estimator, what is the configurable range of MAC operations per cycle supported by the Ethos-U55
  NPU?
details:
  realistic_solution: The correct fact to retrieve is that the Ethos-U55 supports 128 to 512 MACs per
    cycle depending on the specific configuration. Recalling this architectural parameter is critical
    for NAS, as it defines the compute roofline for convolution layers and directly informs the hardware-aware
    latency predictor during the search phase.
  common_mistake: Candidates often confuse the microcontroller clock frequency (480 MHz) or total shared
    memory (512 KB SRAM) with the NPU's parallel execution width. They might also guess generic microcontroller
    MAC rates or confuse the M7's SIMD/DSP extensions with the dedicated NPU throughput.
  napkin_math: Ethos-U55 maximum throughput = 512 MACs/cycle. Assuming the NPU is clocked at the system's
    480 MHz rate, Peak Theoretical Performance = 480,000,000 cycles/sec * 512 MACs/cycle = 245.76 * 10^9
    MACs/sec (245.76 GMAC/s). Since 1 MAC = 2 Operations, this yields ~0.49 TOPS, defining the absolute
    compute ceiling for the NAS latency cost model.
