title: The Real-Time Wakeword Deadline
scenario: You are designing a keyword-spotting (KWS) system for a smart device using a Cortex-M4 microcontroller
  running at 168 MHz. The audio pipeline feeds you a new 1000ms (1-second) chunk of audio for analysis,
  and you must process it before the next chunk arrives to avoid dropping data. Your KWS model requires
  exactly 70 Million Floating Point Operations (MFLOPs) to run one inference. Can this system meet its
  real-time deadline? Explain the calculation.
question: "Can a 168 MHz Cortex-M4 finish a 70 MFLOP KWS inference before the next 1000 ms audio chunk arrives?"
details:
  realistic_solution: 'Yes, the system meets its deadline. Cortex-M4 at 168 MHz with DSP delivers ~336
    MFLOPS (2 FLOPS/cycle via single-cycle MAC SMLAD). Model: 70 MFLOPs. Inference time = 70,000,000 /
    336,000,000 = 208 ms. Deadline: 1,000 ms (next audio chunk). Since 208 ms < 1,000 ms, deadline is
    met with 792 ms slack (79.2% idle). This slack absorbs: MFCC feature extraction (~20 ms), interrupt
    overhead (~5 ms), I/O buffering (~5 ms). MCU can sleep for ~750 ms per cycle, saving significant power.
    Note: with a 250 ms sliding window stride, 208 ms barely fits (42 ms slack = 17% margin), making optimization
    critical.'
  common_mistake: The most common mistake is to confuse the microcontroller's clock speed (in MHz) with
    its floating-point performance (in MFLOPS). Engineers often assume a 1:1 ratio, but a modern core
    can execute more than one instruction per cycle (IPC > 1), and not all instructions are FLOPs. The
    hardware constants show the Cortex-M4 at 168MHz delivers ~336 MFLOPS, a 2x difference.
  napkin_math: 'Cortex-M4 at 168 MHz delivers ~336 MFLOPS (2 FLOPS/cycle via single-cycle MAC). Model
    requires 70 MFLOPs. Inference time = 70 MFLOP / 336 MFLOPS = **0.208 s = 208 ms**. Deadline: 1000
    ms (must finish before next audio chunk). 208 ms << 1000 ms → **deadline met** with 792 ms of slack.
    The MCU can sleep for ~79% of each cycle, or the slack can absorb interrupt overhead, feature extraction
    (e.g., MFCC computation), and I/O. Note: if we used a sliding window with 250 ms stride, the 208 ms
    inference would barely fit (42 ms slack), making optimization more critical.'
  options:
  - No, it will take ~417 ms. This is calculated by dividing 70 MFLOPs by the 168 MHz clock speed.
  - No, it will take ~4.8 seconds, which is calculated by dividing 336 MFLOPS by 70 MFLOPs.
  - Yes, it will take ~208 ms, which is well within the 1000 ms deadline.
  - Yes, it will take only 0.208 ms, leaving a massive buffer.
  correct_index: 2
