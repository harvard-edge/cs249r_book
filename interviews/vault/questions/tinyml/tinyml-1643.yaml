title: UART WiFi Bottleneck Analysis
scenario: A Cortex-M4 collects data from 10 BLE nodes (each sending 10 KB/s) and transmits via a 115200 baud UART WiFi module.
question: Evaluate the bandwidth mismatch and justify the required data reduction ratio.
visual:
  kind: svg
  path: tinyml-1643.svg
  alt: 10 BLE nodes mapping to an MCU, bottlenecking at a UART connection to WiFi.
  caption: Bandwidth funneling from BLE nodes through UART bottleneck.
details:
  realistic_solution: Total ingress from BLE nodes is 10 * 10 KB/s = 100 KB/s. The UART egress is 115200 bits per second, which is ~14.4 KB/s (or ~11.5 KB/s with 8N1 overhead). The required data reduction ratio is 100 / 11.5 = ~8.7x. The MCU must run edge inference to compress data before transmission.
  common_mistake: |
    **The Pitfall:** Directly comparing bytes per second to bits per second (baud).
    **The Rationale:** Candidates mistakenly assert that 115200 baud is greater than 100 KB/s without doing the bit-to-byte conversion.
    **The Consequence:** Designing a system that silently drops massive amounts of data at the UART bottleneck.
  napkin_math: |
    - **Ingress Rate:** 10 nodes * 10 KB/s = 100 KB/s.
    - **Egress Rate (UART 115200 baud):** 115200 bits/sec / 10 bits/byte (8N1) = 11,520 bytes/sec = ~11.25 KB/s.
    - **Required Reduction Ratio:** 100 KB/s / 11.25 KB/s = **~8.8x**.
