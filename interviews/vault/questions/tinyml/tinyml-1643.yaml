title: UART WiFi Bottleneck Analysis
scenario: A Cortex-M4 collects data from 10 BLE nodes (each sending 10 KB/s) and transmits
  via a 115200 baud UART WiFi module.
question: Evaluate the bandwidth mismatch and justify the required data reduction
  ratio.
visual:
  kind: svg
  path: tinyml-1643.svg
  alt: 10 BLE nodes mapping to an MCU, bottlenecking at a UART connection to WiFi.
  caption: Bandwidth funneling from BLE nodes through UART bottleneck.
details:
  realistic_solution: Total ingress from BLE nodes is 10 * 10 KB/s = 100 KB/s. The
    UART egress is 115200 bits per second, which is ~14.4 KB/s (or ~11.5 KB/s with
    8N1 overhead). The required data reduction ratio is 100 / 11.5 = ~8.7x. The MCU
    must run edge inference to compress data before transmission.
  common_mistake: Comparing bytes to bits directly, asserting 115200 baud > 100 KB/s.
  napkin_math: 100 / (115200 / 8 / 1024) = 7.11 ratio (min)
