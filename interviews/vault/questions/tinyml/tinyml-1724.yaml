title: Wake-up Penalty Reduction via Batching
scenario: 'A wearable wakes every 50 ms, incurring a 2 ms wake-up penalty. It computes
  inference for 5 ms at 20 mA, then sleeps at 10 uA. The MCU has two retention modes:
  RAM retention (keeps SRAM contents valid, costs 5 uA extra in sleep, no state
  restore on wake) vs cold-boot (no retention, 0 uA in sleep but +1.5 ms wake-time
  cost to reload model state from FRAM at 8 mA).'
question: Analyze how batching 10 inferences every 500 ms affects power efficiency
  AND determine which retention mode (RAM retention vs cold-boot) wins under both
  the unbatched (50 ms) and batched (500 ms) duty cycles.
details:
  realistic_solution: 'Unbatched (every 50ms): 20 wakeups per second. Overhead = 20
    * 2ms = 40ms/sec. Batched (every 500ms): 2 wakeups per second. Overhead = 2 *
    2ms = 4ms/sec. While the total compute time remains 100ms/sec, batching reduces
    the transition overhead by 36ms/sec. This drastically lowers average power draw
    by minimizing time spent in high-power boot states.'
  common_mistake: Assuming batching reduces the actual energy required to compute
    the neural network inferences themselves.
  napkin_math: 40 - 4 = 36ms
