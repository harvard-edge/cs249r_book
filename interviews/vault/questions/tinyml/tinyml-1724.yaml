title: Wake-up Penalty Reduction via Batching
scenario: 'A wearable wakes every 50 ms, incurring a 2 ms wake-up penalty. It computes
  inference for 5 ms at 20 mA, then sleeps at 10 uA. The MCU has two retention modes:
  RAM retention (keeps SRAM contents valid, costs 5 uA extra in sleep, no state restore
  on wake) vs cold-boot (no retention, 0 uA in sleep but +1.5 ms wake-time cost to
  reload model state from FRAM at 8 mA).'
question: Analyze how batching 10 inferences every 500 ms affects power efficiency
  AND determine which retention mode (RAM retention vs cold-boot) wins under both
  the unbatched (50 ms) and batched (500 ms) duty cycles.
details:
  realistic_solution: Per-cycle charge accounting (uC = mA*ms = A*us; note uA*ms =
    nC, not uC). Wake transition draws 20 mA for 2 ms in either retention mode (rail
    bring-up). Cold-boot adds an extra 1.5 ms FRAM reload at 8 mA = 12 uC per wake.
    Sleep current is 15 uA for RAM retention (10 baseline + 5 retention) and 10 uA
    for cold-boot. Compute draws 20 mA for 5 ms unbatched or 50 ms batched (10 inferences).
    Unbatched (every 50 ms = 20 cycles/sec). RAM retention per cycle = 2*20 + 5*20
    + 43 ms*0.015 = 140.6 uC; per second 20 * 140.6 = 2.81 mA. Cold-boot per cycle
    = 2*20 + 1.5*8 + 5*20 + 41.5*0.010 = 152.4 uC; per second 3.05 mA. RAM retention
    wins at 50 ms cadence (saves ~8% current, ~240 uA). Batched (every 500 ms = 2
    cycles/sec). RAM retention per cycle = 2*20 + 50*20 + 448*0.015 = 1046.7 uC; per
    second 2.09 mA. Cold-boot per cycle = 2*20 + 1.5*8 + 50*20 + 446.5*0.010 = 1056.5
    uC; per second 2.11 mA. RAM retention still wins, by only ~1% (~20 uA). Break-even
    cadence. RAM retention pays an extra 5 uA continuous; cold-boot pays an extra
    12 uC per wake. They tie when 5 uA * T_sleep = 12 uC -> T_sleep = 2.4 s. Below
    2.4 s sleep periods, RAM retention wins; above, cold-boot wins. At 50 ms (well
    below) and 500 ms (also below) RAM retention is the correct choice; if the team
    eventually moves to a 5 s wake cadence, cold-boot becomes the right answer.
  common_mistake: Reporting only the wake-overhead time (40 ms/s vs 4 ms/s) without
    converting to charge or current and never determining which retention mode wins.
    Or assuming cold-boot is always cheaper because its sleep current is lower, missing
    the FRAM reload tax that is paid every wake.
  napkin_math: 'Unbatched: RAM ret 2.81 mA, cold-boot 3.05 mA -> RAM wins. Batched:
    RAM 2.09 mA, cold-boot 2.11 mA -> RAM wins. Break-even sleep period = 12 uC /
    5 uA = 2.4 s.'
