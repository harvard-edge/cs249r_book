title: Wake-up Penalty Reduction via Batching
scenario: A wearable wakes every 50ms, incurring a 2ms wake-up penalty. It computes
  an inference for 5ms at 20mA, then sleeps at 10uA.
question: Analyze how batching 10 inferences to run sequentially every 500ms affects
  the overhead power efficiency.
details:
  realistic_solution: 'Unbatched (every 50ms): 20 wakeups per second. Overhead = 20
    * 2ms = 40ms/sec. Batched (every 500ms): 2 wakeups per second. Overhead = 2 *
    2ms = 4ms/sec. While the total compute time remains 100ms/sec, batching reduces
    the transition overhead by 36ms/sec. This drastically lowers average power draw
    by minimizing time spent in high-power boot states.'
  common_mistake: Assuming batching reduces the actual energy required to compute
    the neural network inferences themselves.
  napkin_math: 40 - 4 = 36ms
