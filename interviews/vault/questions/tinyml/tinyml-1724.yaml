title: Wake-up Penalty Reduction via Batching
scenario: 'A wearable wakes every 50 ms, incurring a 2 ms wake-up penalty. It computes inference for 5 ms at 20 mA, then sleeps at 10 uA. The MCU has two retention modes: RAM retention (5 uA extra in sleep, no restore cost) vs cold-boot (0 uA extra, +1.5 ms wake-time cost to reload from FRAM at 8 mA).'
question: Analyze how batching 10 inferences every 500 ms affects power efficiency AND determine which retention mode wins under both the unbatched (50 ms) and batched (500 ms) duty cycles.
details:
  realistic_solution: 'Perform per-cycle charge accounting ($Q = I \times t$). Wake transition draws 20 mA for 2 ms. Cold-boot adds an extra 1.5 ms FRAM reload at 8 mA (12 uC). Sleep current is 15 uA for RAM retention and 10 uA for cold-boot. Unbatched (50 ms): RAM retention = 140.6 uC/cycle (2.81 mA avg), Cold-boot = 152.4 uC/cycle (3.05 mA avg). Batched (500 ms): RAM retention = 1046.7 uC/cycle (2.09 mA avg), Cold-boot = 1056.5 uC/cycle (2.11 mA avg). RAM retention wins in both scenarios. The break-even sleep period is 2.4 seconds.'
  common_mistake: |
    **The Pitfall:** Assuming cold-boot is always cheaper due to its lower sleep current.
    **The Rationale:** Candidates calculate the sleep baseline but miss the periodic FRAM reload tax (12 uC) paid on every wake.
    **The Consequence:** Selecting an inefficient duty cycle that increases overall average current consumption, degrading battery life.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Wake: 2 ms @ 20 mA = 40 uC.
       - Compute: 5 ms @ 20 mA = 100 uC per inference.
       - RAM ret: 15 uA sleep.
       - Cold-boot: 10 uA sleep, +1.5 ms @ 8 mA (12 uC) penalty.
    2. **Calculations:**
       - Unbatched (50 ms): 
         RAM ret = 40 + 100 + (43 * 0.015) = 140.6 uC (2.81 mA).
         Cold-boot = 40 + 12 + 100 + (41.5 * 0.01) = 152.4 uC (3.05 mA).
       - Batched (500 ms, 10 inf):
         RAM ret = 40 + 1000 + (448 * 0.015) = 1046.7 uC (2.09 mA).
         Cold-boot = 40 + 12 + 1000 + (446.5 * 0.01) = 1056.5 uC (2.11 mA).
       - Break-even: 12 uC / 5 uA = 2.4 s.
    3. **Conclusion & Interpretation:**
       - **Result: RAM Retention Wins.** RAM retention is more efficient for both 50 ms and 500 ms cycles.
