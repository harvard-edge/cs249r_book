title: 'Model Format Conversion: Full MCU Model Format Pipeline from Research to Flash'
scenario: 'Convert and deploy a LSTM-based anomaly detection model (2 LSTM layers × 64 units, 1 FC layer,
  50K params) to ESP32-S3 (240MHz, 512KB SRAM, 8MB PSRAM). Challenge: LSTM is not well-supported in TFLite
  Micro. Evaluate all format options, select the best, and size the deployment.'
details:
  realistic_solution: 'Options: (1) TFLM with LSTM — check if model uses UnidirectionalSequenceLSTM (supported)
    vs. decomposed LSTMCell ops (not all supported). (2) Export to ONNX → custom inference engine (e.g.,
    uTensor, or hand-roll forward pass). (3) Replace LSTM with 1D-CNN (faster on MCU, similar accuracy
    for anomaly detection, fully TFLM supported). Recommendation: Option 3. 1D-CNN equivalent: 3 layers,
    50K params, 0.5 MOPs. Inference on ESP32-S3: 0.5M/240M = 2.1ms. Fits in 512KB SRAM easily. LSTM would
    need 50K×4B=200KB for weights × 4 gates × 2 layers = exceeds SRAM if state tensors included.'
  common_mistake: Assuming TFLM supports all LSTM variants; TFLM supports UnidirectionalSequenceLSTM (the
    fully-fused op) but not all LSTM decompositions from some frameworks.
  napkin_math: 'LSTM params: 2 layers × 64 units × (input+hidden) × 4 gates. Layer 1: (input_dim+64)×64×4.
    If input=20: (20+64)×64×4=21,504. Layer 2: (64+64)×64×4=32,768. FC: 64×1=64. Total: ~54K params INT8
    = 54KB. SRAM for LSTM state: 2×64×4B=512B per timestep (hidden + cell). Manageable. But TFLM LSTM
    runs 1 timestep at a time → 50 timesteps × 54KB weights = same, just slow. Inference: 0.1M ops/240M
    = 0.42ms per timestep × 50 = 21ms. Still fast.'
