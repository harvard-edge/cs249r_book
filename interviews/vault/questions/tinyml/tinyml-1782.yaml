title: Analyzing SRAM Placement for Low-Latency Audio
scenario: A smart earbud runs active noise cancellation. The weights are fixed, but the context buffer must hold 1 second of audio (16KB).
question: Analyze the optimal placement of the 16KB audio ring buffer within the Cortex-M4's memory hierarchy to minimize power consumption.
details:
  realistic_solution: 'The 16KB buffer undergoes constant read/write cycles at the audio sample rate. It must be placed in the lowest-latency, lowest-power memory: the on-chip SRAM. Placing it in Flash would consume significantly more power per access and cause massive latency jitter.'
  common_mistake: |
    **The Pitfall:** Storing high-frequency buffers in Flash.
    **The Rationale:** Candidates rely on non-volatile memory for all allocations perceived as large, ignoring access cost.
    **The Consequence:** Immediate wear-out of the Flash cells and massive latency jitter during read/writes ruins ANC synchronization.
  napkin_math: |
    **Assumptions & Constraints:**
    - 16KB audio buffer for ANC.
    - Cortex-M4 SRAM capacity > 16KB.

    **Calculations:**
    - SRAM read/write latency: ~1 cycle.
    - Flash write latency: ~millisecond scale.
    - SRAM power profile: micro-watts.
    - Flash write power profile: milli-watts.

    **Conclusion & Interpretation:**
    - **Result: 16KB fits in SRAM (Memory-Latency-Bound)**. The buffer must reside in SRAM to maintain a low-power, memory-latency-bound hard real-time operation.
