title: Analyzing SRAM Placement for Low-Latency Audio
scenario: A smart earbud runs active noise cancellation. The weights are fixed, but
  the context buffer must hold 1 second of audio (16KB).
question: Analyze the optimal placement of the 16KB audio ring buffer within the Cortex-M4's
  memory hierarchy to minimize power consumption.
details:
  realistic_solution: 'The 16KB buffer undergoes constant read/write cycles at the
    audio sample rate. It must be placed in the lowest-latency, lowest-power memory:
    the on-chip SRAM. Placing it in Flash would consume significantly more power per
    access and cause massive latency jitter.'
  common_mistake: Attempting to store high-frequency read/write buffers in Flash,
    leading to immediate wear-out and massive write latency.
  napkin_math: 16KB < 64KB SRAM limit
