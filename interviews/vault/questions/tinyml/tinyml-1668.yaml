title: Frequency Scaling Duty Cycle
scenario: A Cortex-M4 sensor runs a 5-second active inference every 10 minutes. At
  100MHz, active power is 10mW. Dropping the clock to 50MHz doubles the compute time
  but lowers active power to 4mW.
question: Design a duty-cycling schedule and optimize the clock frequency to minimize
  total energy consumed per hour.
details:
  realistic_solution: At 100MHz, one inference takes 5s and uses 50mJ. At 50MHz, it
    takes 10s and uses 40mJ. Since sleep power is negligible and inferences happen
    only 6 times per hour, the 50MHz mode is more energy-efficient (240mJ/hr vs 300mJ/hr).
    The schedule should run the MCU at 50MHz for 10s, then deep-sleep for 590s.
  common_mistake: Blindly applying the 'race-to-sleep' heuristic without calculating
    the non-linear relationship between voltage/frequency scaling and power consumption.
  napkin_math: '100MHz: 5s * 10mW = 50mJ. 50MHz: 10s * 4mW = 40mJ.'
