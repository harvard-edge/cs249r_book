title: The Depthwise Memory Dividend
scenario: You are designing a visual wake-word model for a Cortex-M4 microcontroller, which has a tight memory budget. The first layer of your CNN must process a `32x32x3` image patch using `3x3` kernels to produce `16` output channels. To save precious memory, you opt for a depthwise separable convolution instead of a standard 2D convolution.
question: "How would you calculate the total number of weight parameters required for this single depthwise separable layer, assuming INT8 precision?"
details:
  realistic_solution: 'Depthwise: 3x3 kernel per input channel = 3*3*3 = 27 weight params. Pointwise: 1x1 conv from 3 to 16 channels = 1*1*3*16 = 48 weight params. Total weights: 27 + 48 = 75 parameters = 75 bytes at INT8. Compare standard conv: 3*3*3*16 = 432 weight params = 432 bytes. Depthwise separable uses 75/432 = 17.4% of the parameters — saving 357 bytes. On a 32KB SRAM Cortex-M4, this 5.8x reduction compounds across layers, often making the difference between fitting in memory or not.'
  common_mistake: |
    **The Pitfall:** Forgetting to account for the pointwise convolution step.
    **The Rationale:** Engineers intuitively understand the "depthwise" part but forget that a separable convolution is a two-step process requiring channel mixing to function identically.
    **The Consequence:** They drastically underestimate the parameter count and memory requirement, causing out-of-memory errors further down the development pipeline.
  napkin_math: |
    - **Depthwise Parameters:** Kernel_H × Kernel_W × In_Channels = 3 × 3 × 3 = **27 parameters**.
    - **Pointwise Parameters:** Kernel_H × Kernel_W × In_Channels × Out_Channels = 1 × 1 × 3 × 16 = **48 parameters**.
    - **Total Depthwise Separable:** 27 + 48 = **75 parameters**.
    - Total bytes at INT8: 75 bytes.
  options:
  - 432 parameters
  - 27 parameters
  - 75 parameters
  - 48 parameters
  correct_index: 2
