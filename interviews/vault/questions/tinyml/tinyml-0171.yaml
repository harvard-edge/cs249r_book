title: The Depthwise Separable Compute Advantage
scenario: To optimize a CNN on a microcontroller, you want to replace a standard 3x3 convolution with
  a 3x3 depthwise separable convolution. Approximately what is the computational savings factor you should
  expect?
details:
  realistic_solution: 'The computational savings are approximately 8-9x. A standard 3x3 convolution has
    a computational cost proportional to the kernel size squared (9) times the input and output channels.
    A depthwise separable convolution splits this into two cheaper steps: a ''depthwise'' filter application
    and a ''pointwise'' channel combination. The net result is a computational load that is roughly divided
    by the square of the kernel size.'
  common_mistake: Engineers often forget the cost of the second 'pointwise' step in a depthwise separable
    convolution, causing them to vastly overestimate the savings. Another common mistake is to assume
    the savings are linear with the kernel size (e.g., 3x for a 3x3 kernel).
  napkin_math: Standard 3x3 Conv MACs per output pixel = 3 * 3 * C_in * C_out = 9 * 64 * 128 = 73,728
    MACs. Depthwise separable replaces this with Depthwise (3 * 3 * C_in = 9 * 64 = 576 MACs) + Pointwise
    (1 * 1 * C_in * C_out = 64 * 128 = 8,192 MACs). Total = 8,768 MACs. Savings factor = 73,728 / 8,768
    = ~8.4x. This drastically reduces cycles on a Cortex-M4.
  options:
  - ~3x
  - ~9x
  - ~64x (the number of input channels)
  - Over 100x
  correct_index: 1
