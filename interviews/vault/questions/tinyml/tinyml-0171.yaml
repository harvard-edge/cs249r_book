title: The Depthwise Separable Compute Advantage
scenario: To optimize a CNN on a microcontroller, you want to replace a standard 3x3 convolution with a 3x3 depthwise separable convolution.
question: Approximately what is the computational savings factor you should expect when replacing a standard 3x3 convolution with a depthwise separable convolution?
details:
  realistic_solution: 'The computational savings are approximately 8-9x. A standard 3x3 convolution has a computational cost proportional to the kernel size squared (9) times the input and output channels. A depthwise separable convolution splits this into two cheaper steps: a ''depthwise'' filter application and a ''pointwise'' channel combination. The net result is a computational load that is roughly divided by the square of the kernel size.'
  common_mistake: |
    **The Pitfall:** Assuming savings are strictly linear with kernel size or completely forgetting the pointwise step.
    **The Rationale:** Engineers mistakenly divide 9 (from 3x3) by 1 and assume a 9x savings, or they forget the heavy 1x1 channel-combining convolution entirely.
    **The Consequence:** The actual speedup achieved on the MCU is misunderstood, leading to incorrectly budgeted compute cycles.
  napkin_math: |
    *   **Standard 3x3 MACs:** 3 × 3 × C_in × C_out = 9 × C_in × C_out.
    *   **Assume C_in = 64, C_out = 128:** 9 × 64 × 128 = 73,728 MACs.
    *   **Depthwise Separable MACs:** Depthwise (3 × 3 × C_in) + Pointwise (1 × 1 × C_in × C_out).
    *   **Calculation:** (9 × 64) + (64 × 128) = 576 + 8,192 = 8,768 MACs.
    *   **Savings Factor:** 73,728 / 8,768 = **~8.4x**.
  options:
  - ~3x
  - ~9x
  - ~64x (the number of input channels)
  - Over 100x
  correct_index: 1
