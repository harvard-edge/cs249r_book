title: TinyML OTA Flash Slot Budget
scenario: A microcontroller has 1 MB flash. Current firmware is 360 KB, the model
  is 220 KB, and the bootloader plus metadata reserve 96 KB. The team wants A/B OTA
  slots so the old image remains until the new one boots. Determine whether the layout
  fits.
question: Can a 1 MB TinyML device support A/B OTA slots for a 360 KB firmware plus
  220 KB model with 96 KB reserved?
details:
  realistic_solution: One full image is 360 + 220 = 580 KB. Two slots require 1,160
    KB, plus 96 KB reserve, totaling 1,256 KB. It does not fit in 1 MB. The design
    needs delta updates, external flash, a smaller model, or single-slot rollback
    tradeoffs.
  common_mistake: Checking only one firmware image and forgetting that A/B OTA needs
    two slots plus bootloader metadata.
  napkin_math: Image = 580 KB. Two slots = 1,160 KB. Total with reserve = 1,256 KB
    > 1,024 KB.
