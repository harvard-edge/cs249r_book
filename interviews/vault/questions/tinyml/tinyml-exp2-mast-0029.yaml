title: Adversarial Defense for Wake-Word on ARM Cortex-M4
scenario: You are deploying a TinyML wake-word detection model for a smart safe lock on an ARM Cortex-M4
  (STM32F4). Recent reports show the system is vulnerable to over-the-air adversarial audio perturbations
  that force false accepts. You must design a robust architecture and defense strategy that evaluates
  incoming audio within a strict 50ms latency budget. The platform has a 168 MHz clock, 256 KB SRAM, 1
  MB flash, no FPU, and utilizes CMSIS-NN SIMD (2x INT8 MACs/cycle). Synthesize an end-to-end design that
  neutralizes these attacks without exceeding these specific hardware constraints.
details:
  realistic_solution: Design an architecture integrating integer-only randomized smoothing directly into
    the INT8 MFCC feature pipeline, coupled with an adversarially trained, highly quantized DS-CNN. By
    injecting bounded integer uniform noise via a fast PRNG (like Xorshift) prior to the first convolutional
    layer, the system disrupts the structured gradients of the adversarial attack. Leveraging CMSIS-NN
    SIMD ensures the INT8 operations execute efficiently without FPU overhead, easily accommodating the
    memory and latency boundaries.
  common_mistake: Candidates often propose adding a secondary autoencoder for adversarial detection or
    using complex defensive distillation, which quickly exceeds the 256 KB SRAM limit. They also frequently
    suggest spectral preprocessing techniques that rely heavily on floating-point operations, failing
    to account for the STM32F4's lack of an FPU.
  napkin_math: A 50ms latency budget at 168 MHz provides an absolute maximum of 8.4 million cycles per
    inference. Using CMSIS-NN SIMD (2x INT8 MACs/cycle), practical utilization is roughly 1.5 MACs/cycle,
    allowing up to 12.6 million MACs. A standard INT8 DS-CNN requires ~4 million MACs. To add defense
    via Xorshift PRNG noise on a 10x49 spectrogram (490 features), it takes ~5 cycles per feature, adding
    just 2,450 cycles of overhead. Storing the 4M MAC model consumes ~100 KB of the 1 MB flash, and INT8
    activations peak at ~30 KB, leaving over 200 KB of the 256 KB SRAM free. The defense consumes < 0.1%
    of the 8.4M cycle budget, proving the design is highly viable for the STM32F4.
