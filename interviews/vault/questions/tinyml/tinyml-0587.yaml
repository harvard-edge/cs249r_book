title: Duty Cycle for Energy Harvesting Budget
scenario: You're designing a vibration-powered predictive maintenance sensor on a Cortex-M4F (30 mW active,
  3 µW deep sleep). The piezoelectric harvester generates 200 µW average from machine vibration. The inference
  model (anomaly detection, 2M INT8 MACs) takes 12ms at 168 MHz. You also need 5ms for sensor sampling
  (accelerometer, 2 mW) and 20ms for BLE transmission (40 mW). Calculate the maximum inference rate (inferences
  per minute) the energy budget supports.
question: "How would you calculate the maximum inference rate (inferences per minute) the energy budget supports?"
details:
  realistic_solution: 'Energy per inference cycle: inference (30mW * 12ms = 360uJ) + sensor (2mW * 5ms
    = 10uJ) + BLE (40mW * 20ms = 800uJ) = 1,170uJ. Harvester: 200uW * 70% efficiency = 140uW effective.
    Period: 1,170uJ / 140uW = 8.36s. Max rate: ~7 inferences/min. BLE dominates at 68% of energy. Optimization:
    batch 10 results per BLE packet, amortizing BLE cost to 80uJ/inference. New total: 450uJ, period:
    3.2s, rate: ~18/min (2.5x improvement). The inference engine is cheap (360uJ); the radio is the dominant
    energy consumer in most TinyML systems.'
  common_mistake: '"200 µW / 30 mW = 0.67% duty cycle. At 12ms per inference: 0.0067 × 60,000ms/min /
    12ms = 33 inferences/min." This only accounts for inference power and ignores sensor sampling, BLE
    transmission, and the energy storage efficiency.'
  napkin_math: 'Energy per cycle: 1,170 µJ (inference 360µJ + sensor 10µJ + BLE 800µJ). Harvest: 140 µW
    effective. Period: 1,170 µJ / 140 µW = 8.36s (ignoring sleep power, which adds <3%). Rate: ~7/min.
    BLE dominates the energy budget (800 µJ = 68% of cycle). If you batch 10 results and send one BLE
    packet every 10 cycles: BLE energy amortized = 80 µJ/cycle. New total: 450 µJ/cycle. New period: 450/140
    = 3.21s. New rate: **~18.7/min** — 2.5× improvement from batching. The BLE radio is the most expensive
    component, not the inference engine.'
  options:
  - 'Maximum rate: 200 uW / 30 mW = 0.67% duty cycle. At 12ms per inference: 0.0067 x 60,000ms/min / 12ms
    = 33 inferences/min.'
  - 'Energy per cycle: inference (360 uJ) + sensor (10 uJ) + BLE TX (800 uJ) = 1,170 uJ. Effective harvest:
    200 uW x 70% = 140 uW. Period: 1,170/140 = 8.36s. Rate: ~7/min. BLE dominates (68%). Optimization:
    batch 10 results per BLE packet, amortizing BLE to 80 uJ/inference. New rate: ~18/min (2.5x improvement).'
  - The vibration harvester cannot sustain any inferences because 200 uW is insufficient to power the
    Cortex-M4F's minimum active current of 30 mW.
  - 'Maximum rate: 60 inferences/min. The harvester generates 200 uW continuously, and inference costs
    only 360 uJ, so the energy budget is limited solely by the 12ms inference time.'
  correct_index: 1
