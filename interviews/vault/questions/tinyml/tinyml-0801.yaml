title: Tinyml New 0025
scenario: A Jetson Orin handles a 60fps 1080p video stream. The NPU inference takes only 5ms, yet the overall pipeline struggles to hit 15fps. Profiling shows the CPU at 100% utilization.
question: What preprocessing bottleneck keeps the Jetson Orin video pipeline below 15 FPS despite 5 ms NPU inference?
details:
  realistic_solution: The bottleneck is the CPU doing heavy data format conversion, specifically RGB to Grayscale or resizing, before feeding the NPU. While the NPU finishes in 5ms, the CPU takes 60ms to transform the raw camera frames sequentially. The solution is to utilize the Orin's hardware VIC (Video Image Compositor) or ISP to perform zero-copy colorspace conversions and resizing.
  common_mistake: |
    **The Pitfall:** Assuming high NPU TOPS guarantee fast edge vision systems.
    **The Rationale:** Candidates completely neglect the CPU-bound pixel preprocessing overhead required before feeding data to the NPU.
    **The Consequence:** Building an unbalanced pipeline where a powerful NPU sits idle waiting on a bottlenecked CPU.
  napkin_math: |
    - Image size: 1080p = 2M pixels.
    - RGB to Grayscale conversion: 3 ops per pixel (R+G+B / 3).
    - Total ops: 2M * 3 = 6M ops per frame.
    - CPU time: Unoptimized CPU at 2GHz takes ~3-5ms. Memory copying overhead pushes this far higher.
    - **Result:** Frame processing easily exceeds the **16.6ms budget** required for 60fps.
