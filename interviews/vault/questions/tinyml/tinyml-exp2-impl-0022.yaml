title: Calculate Inference Latency from Trace Cycles
scenario: You are analyzing the latency bottleneck of an anomaly detection model on the Nordic nRF5340.
  The application core runs at 128 MHz. Your trace tool indicates the model executes 1,500,000 MAC operations
  per inference. Using optimized instructions, each MAC takes exactly 1 clock cycle, but accesses to the
  256 KB SRAM add an overhead of 600,000 clock cycles per inference. Calculate the total inference latency
  in milliseconds.
question: "What is the total latency for 1.5M MAC cycles plus 600K SRAM overhead cycles on a 128 MHz nRF5340?"
details:
  realistic_solution: The correct approach is to calculate the total number of clock cycles required for
    one inference by summing the compute cycles and the memory overhead. Then, divide the total cycles
    by the application core's clock frequency to determine the absolute time. This reflects how profiling
    tools aggregate cycle counts to identify real-world latency bottlenecks.
  common_mistake: Candidates often forget to include the memory access overhead in their calculations,
    computing only the theoretical MAC latency. They may also make arithmetic errors converting the 128
    MHz clock speed into cycles per millisecond.
  napkin_math: Total cycles = 1,500,000 (compute) + 600,000 (SRAM access) = 2,100,000 cycles. Clock speed
    = 128 MHz = 128,000,000 cycles/second = 128,000 cycles/ms. Total latency = 2,100,000 cycles / 128,000
    cycles/ms = 16.40625 ms.
