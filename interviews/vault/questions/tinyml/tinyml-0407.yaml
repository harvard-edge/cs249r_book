title: The Debug Interface Profiling Trap
scenario: 'You''re profiling your ML inference on a Cortex-M4 using the SWD (Serial Wire Debug) interface
  and a Segger J-Link. Your profiler reports inference takes 42 ms. You disconnect the debugger, add GPIO
  toggle pins around the inference call, and measure with an oscilloscope: 28 ms. Why does the debugger
  add 14 ms to your inference?'
details:
  realistic_solution: 'The 14ms overhead comes from ITM (Instrumented Trace Macrocell) printf calls and
    debug sampling. ITM: ~50 trace printfs * 250us each = 12.5ms. DWT sampling and FPB overhead add ~1.5ms.
    Total: 14ms (50% measurement error). The SWD interface does NOT slow the CPU clock — it steals bus
    cycles for trace data. Fix: use DWT cycle counter (CYCCNT register) for timing — it''s a hardware
    counter with +/-1 cycle accuracy and near-zero overhead. Or use GPIO toggle + oscilloscope (10ns accuracy).
    Never trust debugger-reported timing for performance-critical embedded ML code.'
  common_mistake: '"The debugger slows down the CPU clock." SWD does not affect the CPU clock. The CPU
    runs at the same frequency with or without a debugger attached.'
  napkin_math: 'True inference: 28 ms. ITM overhead: 50 printfs × 250 µs = 12.5 ms. Sampling overhead:
    0.56 ms. FPB overhead: ~0.94 ms. Total debugger overhead: 14 ms. Profiled time: 42 ms. Error: 50%.
    This is why experienced embedded engineers never trust debugger-reported timing for performance-critical
    code. DWT cycle counter accuracy: ±1 cycle. GPIO toggle + oscilloscope accuracy: ±10 ns. Both are
    orders of magnitude better than ITM-based profiling.'
