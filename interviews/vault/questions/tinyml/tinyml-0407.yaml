title: The Debug Interface Profiling Trap
scenario: You're profiling your ML inference on a Cortex-M4 using the SWD (Serial Wire Debug) interface and a Segger J-Link. Your profiler reports inference takes 42 ms. You disconnect the debugger, add GPIO toggle pins around the inference call, and measure with an oscilloscope: 28 ms.
question: Why does the debugger add 14 ms to your inference?
details:
  realistic_solution: 'The 14ms overhead comes from ITM (Instrumented Trace Macrocell) printf calls and debug sampling. ITM: ~50 trace printfs * 250us each = 12.5ms. DWT sampling and FPB overhead add ~1.5ms. Total: 14ms (50% measurement error). The SWD interface does NOT slow the CPU clock — it steals bus cycles for trace data. Fix: use DWT cycle counter (CYCCNT register) for timing — it''s a hardware counter with +/-1 cycle accuracy and near-zero overhead. Or use GPIO toggle + oscilloscope (10ns accuracy). Never trust debugger-reported timing for performance-critical embedded ML code.'
  common_mistake: |
    **The Pitfall:** Believing the SWD interface slows down the CPU clock.
    **The Rationale:** Developers observe code running slower with a debugger attached and incorrectly conclude the CPU clock frequency itself is altered.
    **The Consequence:** Engineers mistrust the hardware or attempt to compensate for non-existent clock issues instead of properly disabling intrusive trace macrocells.
  napkin_math: |
    1. True inference (Oscilloscope): 28 ms.
    2. ITM printf overhead: 50 printfs × 250 µs = 12.5 ms.
    3. Trace sampling overhead: 0.56 ms.
    4. FPB overhead: ~0.94 ms.
    5. Total debugger overhead: 12.5 + 0.56 + 0.94 = **14.0 ms**.
    6. Profiled time: 28 ms + 14 ms = 42 ms (a 50% measurement error).
