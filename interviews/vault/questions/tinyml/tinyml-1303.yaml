title: Designing a Pruning Strategy for ESP32-S3 SRAM Constraints
scenario: You are deploying an INT8 keyword spotting model on an ESP32-S3. The baseline
  quantized model's weights take up 750 KB. To avoid the latency and power penalty
  of fetching weights from the 8 MB PSRAM, you must fit the entire model into the
  512 KB internal SRAM, leaving at least 150 KB for the OS, network stack, and activation
  buffers. Design a pruning specification that achieves this memory target while ensuring
  the model can still fully utilize the ESP32-S3's Xtensa vector extensions for INT8
  acceleration.
question: How would you design a pruning specification that achieves this memory target
  while ensuring the model can still fully utilize the ESP32-S3's Xtensa vector extensions
  for INT8 acceleration?
details:
  realistic_solution: The optimal design specifies structured pruning, specifically
    channel or filter pruning. By physically removing entire filters, the resulting
    weight tensors remain dense but smaller. This directly reduces the memory footprint
    without index overhead and perfectly aligns with the Xtensa vector instructions,
    guaranteeing both memory reduction and proportional inference speedups.
  common_mistake: Candidates often propose unstructured magnitude pruning because
    it preserves accuracy better at high sparsity levels. However, they fail to realize
    that storing sparse indices (like CSR format) adds memory overhead, and the ESP32-S3's
    vector extensions lack hardware support for unstructured sparse matrix multiplication,
    meaning inference latency would actually degrade.
  napkin_math: 'Available SRAM for weights: 512 KB (total) - 150 KB (OS/buffers) =
    362 KB. Target compression ratio: 362 KB / 750 KB = ~48% of original size. If
    we use unstructured pruning at 50% sparsity, each remaining 1-byte INT8 weight
    requires a 1-byte or 2-byte index, making the compressed size (750 / 2) * (1 +
    1) = 750 KB (no memory saved). With structured pruning reducing channels by ~30%,
    the parameters in a conv layer drop by ~50% (0.7 * 0.7 = 0.49), cleanly hitting
    the 362 KB target with 0 bytes of metadata overhead.'
