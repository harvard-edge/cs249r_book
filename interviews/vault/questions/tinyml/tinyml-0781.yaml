title: Tinyml New 0003
scenario: A newly trained model performs great with Post-Training Quantization (PTQ), but when Quantization-Aware
  Training (QAT) is applied to push accuracy higher, the deployed INT8 model on Cortex-M4 generates garbage
  outputs.
question: "What QAT conversion error most likely causes the deployed INT8 Cortex-M4 model to output garbage?"
details:
  realistic_solution: The root cause is incorrect batch normalization folding during QAT. In QAT, BN layers
    must be folded into the convolutional weights before fake quantization nodes are evaluated. If BN
    parameters are updated after fake quantization or folded incorrectly during deployment conversion,
    the moving averages will not match the production inference path, leading to massive activation shifts.
  common_mistake: Using PTQ conversion scripts for a QAT model, failing to correctly fuse the BN layers
    before exporting to the edge device.
  napkin_math: 'Folded weight: W_fold = W * gamma / sqrt(var + eps). If var=0.01, gamma=0.5, W_fold =
    W * 5. If this x5 scale is missed during conversion, activations are 5x off, clipping everywhere.'
