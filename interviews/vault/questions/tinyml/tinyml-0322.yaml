title: The Kilobyte Wall
scenario: You are tasked with deploying a keyword-spotting model onto a Cortex-M4 microcontroller with
  256KB of SRAM. Based on the typical hardware specifications for TinyML devices, which resource constraint
  will you almost certainly hit first and is generally the hardest to overcome?
details:
  realistic_solution: Memory (SRAM). A typical microcontroller might only have 256KB of SRAM. A model's
    weights, activations, and intermediate buffers must all fit within this tiny space. The 'Tensor Arena'
    peak memory usage is a critical metric, and it is very common for a model that is computationally
    simple to still be too large to fit in memory. For instance, a single 32x32x8 tensor of 32-bit floats
    requires 32KB, consuming a significant chunk of the entire budget.
  common_mistake: Engineers from cloud or mobile backgrounds often assume compute (FLOPS) is the main
    problem. They focus on algorithmic changes to reduce operations, not realizing that even a simple
    model's activation tensors can easily exceed the few hundred kilobytes of SRAM available on a typical
    microcontroller. The memory footprint is the 'hard wall' that must be addressed before any other optimization
    matters.
  napkin_math: Let's calculate the memory for just the input and output activations of a single, tiny
    convolutional layer.
  options:
  - Compute (MFLOPS)
  - Power Draw (mW)
  - Memory (SRAM)
  - Flash Storage Size
  correct_index: 2
