title: AOT Compiler Memory Architecture for STM32F4
scenario: You are tasked with designing an Ahead-Of-Time (AOT) compiler's memory management and optimization
  passes for deploying a keyword spotting CNN onto an ARM Cortex-M4 (STM32F4). The MCU is constrained
  to 256 KB SRAM and 1 MB flash, with no FPU, so you must rely on CMSIS-NN SIMD instructions (2x INT8
  MACs/cycle). Given a fully quantized INT8 model that requires 300 KB of peak activation memory if compiled
  naively, architect the compiler's operator fusion and static memory planning strategy to guarantee execution
  within the strict 256 KB SRAM limit.
details:
  realistic_solution: The AOT compiler must implement a static memory arena planner that analyzes the
    liveness of all tensors offline to assign overlapping SRAM offsets, completely avoiding runtime allocation.
    The compiler must also apply graph-level lowering to fuse operators (e.g., Conv2D -> Add -> ReLU)
    into single CMSIS-NN library calls. This avoids materializing intermediate feature maps in SRAM. The
    1 MB flash holds read-only weights, while the 256 KB SRAM is partitioned for the static activation
    arena, CMSIS-NN scratchpads, and the RTOS.
  common_mistake: Candidates often suggest runtime garbage collection or basic memory pools without analyzing
    tensor lifetimes. They also frequently overlook how operator fusion (like Conv+ReLU) directly eliminates
    intermediate SRAM buffers, instead focusing solely on compute cycle savings.
  napkin_math: 'Total SRAM: 256 KB. Assume RTOS/stack takes 32 KB, leaving 224 KB. Naive peak activations:
    300 KB. By fusing a 64 KB Convolution output with a subsequent ReLU, we eliminate 64 KB of intermediate
    storage, reducing peak to 236 KB. Further applying a static liveness memory planner (e.g., greedy
    by size) typically overlaps non-concurrent buffers by ~30%, reducing the 236 KB footprint to ~165
    KB, safely fitting inside the 224 KB budget. For compute, executing 10 million MACs at 168 MHz with
    2x MACs/cycle requires at least 5 million cycles, or ~29.8 ms, well within real-time latency targets.'
