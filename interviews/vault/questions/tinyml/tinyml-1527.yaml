title: Compile-Time Arena Verification
scenario: Your TinyML deployment pipeline builds models for 15 different Cortex-M7 boards with SRAM ranging from 256 KB to 1 MB. Each board has different SRAM availability after accounting for stack, heap, and peripheral buffers. A model that fits on one board may exceed SRAM on another. Engineers currently discover this at runtime when TFLite Micro's AllocateTensors() fails.
question: How would you design a compile-time verification system that catches arena overflows before flashing firmware?
details:
  realistic_solution: 'Build a CI/CD pipeline with three stages: (1) Static analysis: parse the TFLite FlatBuffer model offline to extract tensor sizes and the operator execution plan. Run the same memory planning algorithm as TFLite Micro to compute the minimum arena size. (2) Board manifest: maintain a JSON config for each board specifying total SRAM, stack reservation, heap reservation, and available arena size. (3) CI check: for each pair, compare computed_arena_size against board.arena_available. Fail the build with a clear message. Generate a compatibility matrix showing which models fit on which boards.'
  common_mistake: |
    **The Pitfall:** Relying on `sizeof()` compile-time checks in C++.
    **The Rationale:** Candidates assume that simply defining the arena array size and checking it via the linker script ensures it will hold the model.
    **The Consequence:** The linker only verifies if the statically declared array fits in physical memory—it does completely nothing to verify if the TFLite execution plan's dynamic peak memory needs will fit inside that arena, causing unexpected runtime failures.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 15 boards, varying SRAM.
       - Python offline planner runtime: ~50ms per model.
       - CI Pipeline targets: 10 models.
    2. **Calculations:**
       - Checks per build: 15 boards * 10 models = 150 checks.
       - CI latency overhead: 150 checks * 50ms = 7.5 seconds.
       - Cost of failure: 2 incidents/week * 30 min debugging = 52 hours/year saved.
    3. **Conclusion & Interpretation:**
       - **Result: CI-Bound Verification.** Parsing the FlatBuffer execution plan in CI accurately calculates the deterministic TFLite memory footprint, shifting a 30-minute runtime failure into a **7.5-second compile-time check**.
