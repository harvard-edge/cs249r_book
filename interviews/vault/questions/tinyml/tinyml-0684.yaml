title: The Billion-Dollar Doorbell Breach
scenario: You are the Principal Engineer for a fleet of 10 million smart doorbells. A security researcher privately discloses a critical side-channel vulnerability in your custom ML accelerator that can leak feature vectors from your person detection model, potentially allowing reconstruction of user images—a catastrophic privacy breach. A physical recall is financially impossible.
question: What phased response should mitigate the ML accelerator side-channel vulnerability without a physical recall?
details:
  realistic_solution: A Principal-level response involves a multi-phase strategy focused on immediate triage followed by long-term de-risking.
  common_mistake: |
    **The Pitfall:** Choosing Model Replacement without noticing it violates the hard flash memory constraint.
    **The Rationale:** Engineers jump to the "most advanced" option (Federated Retraining) or "cheapest" option without thinking in phases or respecting system limits.
    **The Consequence:** The proposed fix either bricks devices by exceeding flash capacity or leaves the security vulnerability open for months while retraining occurs.
  napkin_math: |
    1. Recall Cost: 10M doorbells × $50/device = **$500M** (impossible).
    2. OTA Fix Cost: 200 KB model × 10M devices = 2 TB data. 2,000 GB × $0.09/GB = **$180**.
    3. Inference overhead: Adding an input noise layer takes ~1,000 cycles at 168 MHz = 5.95 µs (negligible vs 50 ms inference).
    4. Rollout schedule: To cover 10M devices over 7 days (168 hours), update rate is 10M / 168 = **~59,524 devices/hr**.
