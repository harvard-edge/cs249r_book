title: The Billion-Dollar Doorbell Breach
scenario: You are the Principal Engineer for a fleet of 10 million smart doorbells. A security researcher
  privately discloses a critical side-channel vulnerability in your custom ML accelerator that can leak
  feature vectors from your person detection model, potentially allowing reconstruction of user images—a
  catastrophic privacy breach. A physical recall is financially impossible.
details:
  realistic_solution: A Principal-level response involves a multi-phase strategy focused on immediate
    triage followed by long-term de-risking.
  common_mistake: Engineers often treat this as a simple technical choice, picking one option without
    thinking in phases. They either pick the 'cheapest' option (Firmware Patch) without considering its
    tactical, short-term nature, or jump to the 'most advanced' option (Federated Retraining) without
    a plan to mitigate the immediate security risk. The worst mistake is choosing Model Replacement without
    noticing it violates the hard flash memory constraint, indicating a failure to read and respect system
    limits.
  napkin_math: '10M doorbells. Recall: $50/device=$500M — impossible. OTA fix: 200KB model*10M=2TB, at
    $0.09/GB=$180. Add input noise layer: ~1000 cycles@168MHz=5.95us (negligible vs 50ms inference). Differential
    privacy epsilon=1.0: ~2% accuracy loss. OTA cost <$1K vs $500M recall. Stagger rollout: ~59.5K devices/hr
    over 7 days (10M / 168hrs).'
