title: 'Dataset Curation: Mastery — Cross-Device Dataset Portability for TinyML Fleet'
scenario: 'You are deploying keyword spotting models across a heterogeneous fleet: 50% Cortex-M4 (168MHz, 256KB SRAM), 30% ESP32-S3 (168MHz, 512KB SRAM), 20% Cortex-M7+Ethos-U55 (480MHz NPU). Each device class needs a different model size.'
question: How would you design a single data curation pipeline that produces training data suitable for all three MCU model variants?
details:
  realistic_solution: 'One canonical dataset in float32 MFCC. Train a ''teacher'' model (large, cloud-side). Distill to three student sizes: M4-tiny (5KB), ESP32-medium (15KB), M7-large (50KB). Same dataset, same labels, three student targets.'
  common_mistake: |
    **The Pitfall:** Training separate models from separate datasets for each hardware tier.
    **The Rationale:** Engineers assume smaller models need entirely different, down-sampled datasets to train effectively.
    **The Consequence:** Labeling and QA costs triple, and the fleet suffers from inconsistent prediction quality and label drift across device classes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Devices: M4, ESP32, M7+NPU.
       - Canonical Dataset: 120K samples, 40-dim MFCC, 99 frames, FP32.
    2. **Calculations:**
       - Dataset Size: 120,000 * 40 * 99 * 4 bytes = 1.9 GB.
       - Distillation Compute (M4-tiny): 5K params, 4 epochs = 480K forward passes.
       - Compute Time: 480K * 39.6 kFLOPs = 19.0 GFLOPs (~0.8 seconds on H100).
    3. **Conclusion & Interpretation:**
       - **Result: Data-Bound Unification**. A single canonical dataset and teacher distillation pipeline drastically reduces QA costs while maintaining accuracy across the fleet.
