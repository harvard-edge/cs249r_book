title: I2C Sensor Bandwidth Limitations
scenario: A vibration sensor array uses an I2C bus to continuously stream high-frequency data to a Cortex-M4.
question: Recall the bandwidth limits of Standard-mode and Fast-mode I2C to determine the maximum sample throughput.
visual:
  kind: svg
  path: tinyml-1645.svg
  alt: Three sensors mapped to an I2C bus pointing to a Cortex-M4.
  caption: I2C shared bus topology.
details:
  realistic_solution: Standard-mode I2C operates at 100 kbps, and Fast-mode operates at 400 kbps. Accounting for addressing and overhead, Fast-mode yields at most ~40 KB/s. This severely restricts the number of high-frequency sensors (e.g., 10kHz sampling) that can share the bus.
  common_mistake: |
    **The Pitfall:** Overestimating I2C bandwidth.
    **The Rationale:** Candidates casually assume I2C operates in the Megabyte-per-second range like SPI.
    **The Consequence:** They design a system topology that severely bottlenecks high-frequency sensor ingestion.
  napkin_math: |
    - Fast-mode I2C operates at 400 kbps.
    - Accounting for overhead (typically 10 bits per byte).
    - Maximum throughput: 400 kbps / 10 = **~40 KB/s max payload**.
