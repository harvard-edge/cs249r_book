title: The OTA Update Brickening
scenario: You are the architect for a fleet of 100,000 IoT environmental sensors. After pushing a new ML model via your Over-the-Air (OTA) update system, 10% of the devices are 'bricked' and unresponsive. The MCU is a Cortex-M4 with 1MB Flash and 256KB SRAM. Your OTA design uses a dual-partition scheme ('App A' / 'App B'). The bootloader successfully swaps to the new application, but it hangs soon after. Your investigation reveals the new model requires a 140KB tensor arena, an increase from 120KB in the previous version. The `tflite::MicroInterpreter::AllocateTensors()` call is failing. Formulate a hypothesis for why a seemingly small 20KB increase in memory requirement is causing catastrophic failure. Propose a set of architectural changes to your application's memory management to ensure future updates are 100% reliable. How would you have caught this issue before it was ever deployed?
question: Why did a 20 KB tensor-arena increase brick 10% of OTA-updated Cortex-M4 sensors despite dual partitions?
details:
  realistic_solution: The root cause is heap fragmentation during the new application's boot sequence. While total free memory is sufficient (e.g., 192KB), if the RTOS and network stack initialize first, they allocate and free various small buffers (e.g., TLS certificates, MQTT queues) before the ML model is initialized. This fragments the 192KB into smaller non-contiguous blocks. When `AllocateTensors()` asks for a single contiguous 140KB block, it fails. Since the return value wasn't checked, a hard fault occurs. The fix is to either statically allocate the tensor arena (`uint8_t arena[140*1024];`) or allocate it dynamically as the very first step in `main()` before any other subsystem can fragment the heap.
  common_mistake: The most common incorrect analysis is to assume the OTA process itself fragmented the heap. However, a bootloader swap triggers a device reset, meaning the new application starts with a completely fresh, unfragmented heap. The fragmentation must be occurring during the new application's own startup sequence. Another mistake is simply summing memory requirements (`140KB + RTOS_heap < 256KB`) without considering contiguity.
  napkin_math: 'Total SRAM = 256KB. OS/Networking max usage = 64KB. Total Free = 192KB. Previous arena = 120KB. If network initialization creates fragmented holes, the maximum contiguous block might shrink. For example, the 192KB free might be split into 80KB, 60KB, and 52KB blocks. A request for 140KB fails, even though 192KB > 140KB. Allocating the arena statically or first prevents this.'
