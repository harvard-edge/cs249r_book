title: TinyML Radio Compute Overlap
scenario: A TinyML node computes features for 40 ms and transmits the previous result for 15 ms using a radio peripheral that can run while the CPU computes. Estimate steady-state cycle time with overlap.
question: What steady-state cycle time results when 40 ms compute overlaps a 15 ms radio transmit from the previous result?
details:
  realistic_solution: The steady-state cycle is compute-bound at 40 ms if the radio transfer truly overlaps. Without overlap, the cycle would be 55 ms. The design needs buffers so radio completion does not block the next sample.
  common_mistake: Serializing compute and radio work even though the peripheral can transmit independently.
  napkin_math: Overlapped = max(40,15)=40 ms. Sequential = 55 ms.
