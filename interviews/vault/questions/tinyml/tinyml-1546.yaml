title: Cortex-M4 Audio Buffer Overflow
scenario: A microphone triggers an interrupt on a Cortex-M4, appending an INT8 audio packet to a 100-packet buffer strictly every 10ms. Due to a DSP software regression, processing a packet now takes 12ms.
question: Analyze the time elapsed from an empty buffer until the system drops its first audio packet.
visual:
  kind: svg
  path: tinyml-1546.svg
  alt: Linear growth chart showing the buffer filling up steadily over 5 seconds until it hits the 100-packet cap.
  caption: Deterministic Buffer Growth
details:
  realistic_solution: Packets arrive every 10ms, but service takes 12ms. The queue grows by 1 packet every 5 packet arrivals (5 arrivals = 50ms, 4 packets processed = 48ms, leaving a backlog). The net growth is +2ms of backlog per 10ms cycle. To fill the 100-packet buffer (requiring 100 net backlogged packets), it will take 100 * (10ms / (12ms - 10ms)) = 500 arrivals. At 10ms per arrival, overflow occurs exactly at 5.0 seconds.
  common_mistake: |
    **The Pitfall:** Calculating based purely on queueing theory probability distributions.
    **The Rationale:** Candidates fail to recognize this as a strictly deterministic overflow scenario, overcomplicating the analysis.
    **The Consequence:** Wasting time on complex probability models instead of simple deterministic arithmetic.
  napkin_math: |
    1. **Assumptions & Constraints:** Arrivals strictly every 10ms. Service time is 12ms. Buffer capacity is 100 packets.
    2. **Calculations:** Accumulation rate = 12ms - 10ms = +2ms backlog per 10ms interval. Buffer holds 100 packets * 10ms = 1000ms of backlog space. Number of intervals to fill = 1000ms / 2ms = 500 intervals. Time to overflow = 500 * 10ms = 5000ms.
    3. **Conclusion & Interpretation:** **5.0 seconds** (Compute-Bound Deterministic Overflow).
