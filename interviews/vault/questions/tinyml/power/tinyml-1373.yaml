title: Energy-Efficient TinyML Inference on ARM Cortex-M4 STM32F4
scenario: 'You are tasked with deploying a small convolutional neural network (CNN) for keyword spotting on an ARM Cortex-M4 STM32F4 microcontroller. The device is battery-powered, and the primary design constraint is to minimize energy consumption per inference while maintaining an inference latency under 50ms.'
question: 'How should you analyze STM32F4 energy per inference using CMOS power, DVFS concepts, fixed-point CNNs, and memory access costs?'
details:
  realistic_solution: 'A realistic solution involves a multi-pronged approach. First, a thorough analysis using the CMOS power equation for the core and active peripherals is crucial. Since the STM32F4 lacks an FPU, PTQ fixed-point quantization is essential. Memory access patterns must be optimized to maximize data locality within the SRAM, minimizing external flash access. While true DVFS P-states are rare on standard MCUs, dynamic frequency scaling can be applied by selectively downclocking for less demanding phases.'
  common_mistake: |
    **The Pitfall:** Focusing solely on reducing MAC operations without considering data movement energy.
    **The Rationale:** Candidates often treat compute as the only power draw, neglecting the energy cost of moving data between memory and the CPU on constrained devices.
    **The Consequence:** The resulting architecture will suffer from poor actual energy efficiency due to excessive memory access overhead and suboptimal clock frequency choices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4 @ 168 MHz.
    - P_dynamic roughly C * V^2 * f.
    - Latency limit: <50ms.

    **Calculations:**
    - Halving the frequency (84 MHz) doubles the latency but reduces active power.
    - Dynamic energy E = P * T. If V is constant, changing f scales P proportionally, but T inversely, making compute energy roughly constant (C*V^2).
    - Reducing V via DVFS (if hardware supports) yields quadratic energy savings.
    - SRAM read costs ~5 pJ, Flash read costs ~20+ pJ. Keeping activations in SRAM dominates energy savings.

    **Conclusion & Interpretation:**
    - **Result: Energy is dominated by memory fetches and core voltage, not raw MACs (Energy-Bound)**. DVFS and SRAM optimization are critical for energy-efficient edge ML.
