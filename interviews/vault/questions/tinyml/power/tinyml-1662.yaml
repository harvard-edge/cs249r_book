title: Cortex-M4 Cascade Wakeword
scenario: A Cortex-M4 keyword spotter uses a cascade architecture. A 0.5 mW DSP runs constantly. Only if triggered (10% of the time), a 20 mW neural net analyzes a 100 ms audio window.
question: What is the expected average power consumption of this cascade architecture?
visual:
  kind: svg
  path: tinyml-1662.svg
  alt: Sleep/wake timeline showing constant DSP baseline with occasional Neural Net spikes.
  caption: Cascade architecture duty cycling.
details:
  realistic_solution: 'The DSP is always on, consuming 0.5 mW. The 20 mW neural net runs 10% of the time. Average power = 0.5 mW + (0.10 * 20 mW) = 0.5 + 2.0 = 2.5 mW. (Note: the 100ms window size describes the inference duration, but duty cycle is already given as 10% globally).'
  common_mistake: |
    **The Pitfall:** Multiplying the 100ms window into the 10% probability incorrectly.
    **The Rationale:** Candidates see the 100ms duration and try to factor it into the duty cycle, failing to realize the 10% figure is already the aggregate global probability of the neural net being active.
    **The Consequence:** Underestimating the power consumption, leading to premature battery death in the field.
  napkin_math: |
    **Assumptions & Constraints:**
    - Always-on DSP Power: 0.5 mW.
    - Neural Net Active Power: 20 mW.
    - Neural Net Duty Cycle: 10% (0.10).

    **Calculations:**
    - Average Power: 0.5 mW + (0.10 * 20 mW).
    - 0.5 + 2.0 = 2.5 mW.

    **Conclusion & Interpretation:**
    - **Result: Power-Bound**. The average power consumption correctly evaluates to 2.5 mW.
