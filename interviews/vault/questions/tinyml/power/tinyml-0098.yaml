title: Power Profiling for MCU Inference
scenario: 'Your product manager asks how long the battery will last. You answer 10 months based on the datasheet''s active and sleep current specs. Three months later, devices start dying in the field. Your estimate was 2x too optimistic.'
question: 'What did you miss in your datasheet-based estimate, and how do you build an accurate power profile?'
details:
  realistic_solution: 'The datasheet gives a lower bound, not a prediction. Real power profiling requires measuring the actual device. Key factors omitted: (1) Peripheral leakage: sensors, voltage regulators, LEDs in standby draw 10-20 uA. (2) Wake-up transitions: MCU takes 2-5 ms to transition from deep sleep to active, drawing peak current. (3) Temperature: battery capacity derates 20-30% below 0C. Corrected estimate: active = 30 uA (1 inference/min), peripherals = 15 uA, transitions = 5 uA, regulator = 5 uA. Total = 55 uA. Battery derated to 180 mAh. Life = 180 mAh / 0.055 mA = 136 days.'
  common_mistake: |
    **The Pitfall:** Using the datasheet's typical current values directly for battery life estimates.
    **The Rationale:** Datasheets report typical values at 25°C with minimal peripherals active, ignoring wake-up transitions and peripheral leakage.
    **The Consequence:** The resulting estimate is highly optimistic, leading to premature field failures.
  napkin_math: |
    **Assumptions & Constraints:**
    - CR2032 Battery (225 mAh ideal, 180 mAh real-world cold).
    - 30 mA active current, 50 ms inference per minute.
    - 5 uA nominal sleep current.

    **Calculations:**
    - Ideal avg active = 30 mA * (50 ms / 60 s) = 25 uA.
    - Ideal total = 25 uA (active) + 5 uA (sleep) = 30 uA.
    - Ideal life = 225 mAh / 0.030 mA = 7,500 hours = 312 days (~10 months).
    - Real total = 25 uA + 5 uA + 15 uA (peripherals) + 5 uA (transitions) + 5 uA (regulator) = 55 uA.
    - Real life = 180 mAh / 0.055 mA = 3,272 hours = 136 days (~4.5 months).

    **Conclusion & Interpretation:**
    - **Result: Leakage and battery derating halve the expected life to 4.5 months (Energy-Bound OpEx/Leakage Dominance)**. Datasheet values omit real-world thermal derating and transition penalties.
