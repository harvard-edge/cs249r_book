title: The Duty Cycle Power Drain (tinyml-0023)
scenario: You are designing a battery-powered audio sensor that uses a Cortex-M4 microcontroller to detect a wake-word. It wakes up for 1 second to listen and run an inference, then goes into deep sleep for 9 seconds to conserve energy.
question: What average power does a Cortex-M4 wake-word sensor draw when active 1 s and asleep 9 s per cycle?
details:
  realistic_solution: The average power is the time-weighted average of the active and sleep power states. The device is active 10% of the time (1s / 10s) and asleep 90% of the time (9s / 10s).
  common_mistake: |
    **The Pitfall:** Averaging power states without time-weighting.
    **The Rationale:** Engineers focus only on the active power or perform a simple arithmetic mean.
    **The Consequence:** They overestimate the battery requirements by orders of magnitude.
  napkin_math: |
    **Assumptions & Constraints:**
    - Duty cycle: 1s active, 9s sleep (10s total).
    - Active power: 10 mW.
    - Sleep power: 10 uW.

    **Calculations:**
    - Active duty = 1/10 = 10%.
    - Sleep duty = 90%.
    - Active component = 10 mW * 0.10 = 1 mW.
    - Sleep component = 10 uW * 0.90 = 9 uW.

    **Conclusion & Interpretation:**
    - **Result: ~1 mW (Energy-Bound)**. The average power is heavily dominated by the duty cycle at ~1 mW.
  options:
  - ~10 mW
  - ~5 mW
  - ~1 mW
  - ~10 µW
  correct_index: 2
