title: The RF Energy Sink
scenario: You spend weeks optimizing your model math to save 1 mJ of energy per inference. However, when you enable BLE to report results, the total energy per cycle jumps by 8 mJ.
question: Based on the RF breakdown, why is BLE consuming so much more than a simple packet transmission?
details:
  realistic_solution: 'You are hitting the **BLE Handshake Overhead**. BLE doesn''t just ''send a packet''; it wakes the radio, advertises on 3 channels or waits for a connection event, switches between TX and RX, opens receive windows, and pays connection-interval latency before payload bytes move. Those state transitions dominate the 0.8 mJ packet energy. The fix is to **Amortize Radio Costs**: don''t report every inference. Buffer 100 results locally and send them in one connection event so the per-inference radio overhead falls by about 4x.'
  common_mistake: |
    **The Pitfall:** Believing the model inference dominates the power budget.
    **The Rationale:** Candidates assume computation is the primary energy sink, ignoring the massive overhead of RF communication and BLE handshakes.
    **The Consequence:** Spending weeks optimizing ML models while ignoring the radio, resulting in negligible battery life improvements.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inference Energy: 2.5 mJ.
    - BLE Transmission: 0.8 mJ.
    - BLE Sync/Handshake: 7.2 mJ.

    **Calculations:**
    - Total per Inference with immediate BLE report: 2.5 + 0.8 + 7.2 = 10.5 mJ.
    - Amortized Cost (100 samples per BLE event): 2.5 + ((0.8 + 7.2) / 100) = 2.58 mJ per inference.

    **Conclusion & Interpretation:**
    - **Result: 2.58 mJ per inference after batching**. The system is dominated by radio setup and connection-event overhead, so batching reports reduces per-inference energy by about 10.5 / 2.58 = 4.1x.
