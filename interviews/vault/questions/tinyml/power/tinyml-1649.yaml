title: Cortex-M4 Generic Duty Cycle Power Formula
scenario: An acoustic anomaly detection system uses a Cortex-M4 node running at 80 MHz with KB-scale SRAM. It wakes up to process audio segments and immediately returns to deep sleep.
question: State the generic formula for average power consumption given active power, sleep power, and the active duty cycle ratio.
visual:
  kind: svg
  path: tinyml-1649.svg
  alt: A step plot showing brief 10mW active power spikes and long 1uW sleep periods over time.
  caption: Power profile showing extreme duty cycling on Cortex-M4.
details:
  realistic_solution: 'The average power is the time-weighted sum of the power states. It is calculated as P_avg = (P_active * D) + (P_sleep * (1 - D)), where D is the active duty cycle fraction. For extreme duty cycling, P_sleep dominates the overall energy budget.'
  common_mistake: |
    **The Pitfall:** Misapplying the sleep power duration.
    **The Rationale:** Mistakenly multiplying sleep power by the full time interval instead of just the inactive fraction (1 - D).
    **The Consequence:** While the mathematical error is small due to the low sleep power, it demonstrates a fundamental misunderstanding of time-weighted duty cycle analysis.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active Power (P_active): 10 mW.
    - Sleep Power (P_sleep): 1 µW = 0.001 mW.
    - Duty Cycle Fraction (D): 0.1 (10%).

    **Calculations:**
    - Formula: P_avg = (P_active * D) + (P_sleep * (1 - D)).
    - Calculation: (10 mW * 0.1) + (0.001 mW * 0.9) = 1 mW + 0.0009 mW = 1.0009 mW.

    **Conclusion & Interpretation:**
    - **Result: ~1.001 mW (Power-Bound)**. The average power is ~1.001 mW.
