title: DVFS Energy Optimization
scenario: A wearable runs a CNN. Active power is 20mW (50ms duration), sleep is 5uW. Total cycle is 1 second.
question: Formulate an optimized duty-cycling plan to reduce the active compute energy, evaluating if doubling clock frequency (25ms duration at 45mW) helps.
visual:
  kind: svg
  path: tinyml-1633.svg
  alt: Bar chart comparing 1mJ base energy vs 1.125mJ high-frequency energy
  caption: 'Energy Comparison: Base vs High Frequency'
details:
  realistic_solution: Applying Dynamic Voltage and Frequency Scaling (DVFS) to execute faster ironically increases the total active compute energy. While doubling the clock frequency halves the temporal execution duration, it quadratically inflates the power consumption. The baseline requires 1.0mJ per inference, whereas the higher-frequency configuration demands 1.125mJ. Therefore, to minimize strict computational energy, the system should operate at the lowest frequency that securely meets the 1-second real-time deadline.
  common_mistake: |
    **The Pitfall:** Assuming "race-to-sleep" always minimizes total energy consumption.
    **The Rationale:** Engineers linearly correlate execution speed with energy savings, ignoring the non-linear relationship between voltage/frequency scaling and power.
    **The Consequence:** Pumping the clock speed inadvertently increases the energy-per-inference, degrading battery life despite longer sleep windows.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline: 20 mW for 50 ms.
    - High-Frequency: 45 mW for 25 ms.

    **Calculations:**
    - Baseline Active Energy: 20 mW * 0.05 s = 1.0 mJ.
    - DVFS Active Energy: 45 mW * 0.025 s = 1.125 mJ.

    **Conclusion & Interpretation:**
    - **Result: 1.125 mJ (Energy Increment)**. DVFS increases compute energy from 1.0 mJ to 1.125 mJ.
