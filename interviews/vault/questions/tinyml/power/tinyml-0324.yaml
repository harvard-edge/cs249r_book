title: 'The Economic Viability of Sleep'
scenario: 'To ensure a battery-powered TinyML device is economically viable, it might need to last for a year or more on a single coin cell.'
question: 'What deep-sleep power consumption should you expect from a modern microcontroller in a long-life TinyML device?'
details:
  realistic_solution: |
    A typical MCU's deep sleep power consumption is in the low single-digit microwatts (µW), specifically around 1-10 µW. This ultra-low power state enables multi-year battery life, relying on duty cycling where the device spends 99.9% of its time asleep.
  common_mistake: |
    **The Pitfall:** Guessing idle power consumption in the milliwatt (mW) range.
    **The Rationale:** Engineers accustomed to wall-powered systems apply active computation power intuitions to deep-sleep states.
    **The Consequence:** An error of over 1,000x leads to a product lasting less than half a day instead of a year.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active Power (Cortex-M4): ~10-50 mW
    - Deep Sleep Power: ~1-10 µW

    **Calculations:**
    - Ratio = Active Power / Sleep Power
    - Ratio = 10,000 µW / 10 µW = 1,000x

    **Conclusion & Interpretation:**
    - **Result: ~10 microwatts (µW) (Power-Bound)**. Failing to enter deep sleep drains the battery 1,000 times faster.
  options:
  - '~10 milliwatts (mW)'
  - '~100 microwatts (µW)'
  - '~10 microwatts (µW)'
  - '~10 nanowatts (nW)'
