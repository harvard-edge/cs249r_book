title: Power Profiling Methodology
scenario: Your team claims their keyword spotting model on an Apollo4 Blue Plus (Cortex-M4F, 192 MHz, 2 MB flash, 2 MB SRAM) draws '120 uA average.' You suspect this number is wrong.
question: How would you design a measurement setup to get the real power profile, and what did the team likely miss?
details:
  realistic_solution: Proper power profiling requires measuring at multiple time scales with the right instrument. For microsecond and sub-millisecond wake, radio, and inference transients, use a low-value shunt with a wide-bandwidth differential probe/oscilloscope, a current probe, or a dedicated high-speed power analyzer such as a Joulescope/PPK-class setup; an INA219-style monitor is too slow for this job. Also log seconds-to-minutes behavior so the trace includes sleep, sensor sampling, inference, BLE advertising/transmit, and state transitions. Compute charge by integrating I(t) over a representative operating cycle, then divide by cycle time. The team likely missed transient and duty-cycle energy, or averaged only a quiet mode instead of the full operating schedule.
  common_mistake: |
    **The Pitfall:** Using a multimeter to measure average current.
    **The Rationale:** A multimeter averages over seconds, hiding the microsecond-scale current spikes that dominate energy consumption in duty-cycled systems.
    **The Consequence:** A low "average" reading could obscure 40 mA peaks — the thermal and peak current implications for coin cell batteries are completely different.
  napkin_math: |
    **Assumptions & Constraints:**
    - Battery: 300 mAh.
    - Claimed average: 120 uA.
    - Representative 1-second cycle: 990 ms sleep, 3 ms sensor/wake, 5 ms inference, 2 ms BLE event.

    **Calculations:**
    - Sleep contribution: 0.990 s * 10 uA / 1 s = 9.9 uA.
    - Sensor/wake contribution: 0.003 s * 8 mA / 1 s = 24 uA.
    - Inference contribution: 0.005 s * 40 mA / 1 s = 200 uA.
    - BLE contribution: 0.002 s * 60 mA / 1 s = 120 uA.
    - Estimated true average: 9.9 + 24 + 200 + 120 = 353.9 uA, before regulator losses and retries.
    - Claimed battery life: 300 mAh / 0.120 mA ≈ 2,500 h ≈ 104 days.
    - Estimated battery life: 300 mAh / 0.354 mA ≈ 847 h ≈ 35 days.

    **Conclusion & Interpretation:**
    - **Result: ~354 uA True Average (Energy Bound)**. A coherent duty-cycle integral gives about 3x the claimed current and cuts life from roughly 104 days to roughly 35 days; the exact value must come from the measured waveform.
