title: 'Power Profiling Methodology'
scenario: 'Your team claims their keyword spotting model on an Apollo4 Blue Plus (Cortex-M4F, 192 MHz, 2 MB flash, 2 MB SRAM) draws ''120 uA average.'' You suspect this number is wrong.'
question: 'How would you design a measurement setup to get the real power profile, and what did the team likely miss?'
details:
  realistic_solution: 'Proper power profiling requires measuring at multiple time scales: (1) Microsecond scale: use a current sense amplifier (INA219) at 10 kHz to capture MCU wake spikes (15 mA for 2 ms) and sensor sampling pulses. (2) Millisecond scale: capture BLE TX bursts (8 mA for 2 ms) and BLE advertising events (6 mA for 2 ms every 100 ms), which dominate the idle power budget. (3) Second scale: log duty cycle transitions between sleep (10 µA), idle (1.2 mA), and active (40 mA) states. The methodology: connect a 0.1 ohm shunt resistor in series with the battery, sample voltage across it at 10 kHz for 10 minutes covering all operating modes. Compute: total charge = integral of I(t)dt. Average current = total charge / time. Real average is typically 3-5x higher than the sum-of-datasheet-currents estimate because datasheets report typical values, not worst-case, and miss transient spikes during state transitions.'
  common_mistake: '"Use a multimeter to measure average current." A multimeter averages over seconds, hiding the microsecond-scale current spikes that dominate energy consumption in duty-cycled systems. A low "average" reading could obscure 40 mA peaks — the thermal and peak current implications for coin cell batteries are completely different.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Battery: 300 mAh. Claimed Avg: 120 uA.

    **Calculations:**
    - True Sleep: 990ms @ 10 uA = 0.01 mA avg.
    - Sensor/Wake: 3ms @ 8 mA = 0.024 mA avg.
    - Inference: 5ms @ 40 mA = 0.2 mA avg.
    - BLE Events: 0.12 mA avg.
    - True Total Avg: (0.01 + 0.024 + 0.2 + 0.12) * 1.18 (losses) = ~0.44 mA.

    **Conclusion & Interpretation:**
    - **Result: 0.44 mA True Average (Energy Bound)**. Real average current is ~3.5x higher than claimed, dropping battery life from 104 days to just 28 days due to missed transient spikes.
