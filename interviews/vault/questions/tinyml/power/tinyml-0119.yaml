title: Designing an Inference Duty Cycle on 0.5 mW Solar
scenario: You are deploying a keyword spotting sensor powered by a small solar cell providing 0.5 mW average. The sensor uses an Ambiq Apollo4 Lite (Cortex-M4F, 3 mW active at 96 MHz). Inference takes 15ms per keyword detection. The system has an always-on power draw of 30 μW. Assume wake-up overhead is 2ms at 3 mW, energy storage round-trip losses are 10 μJ per inference, and a 30% safety margin is required for seasonal variations.
question: Including the required 30% seasonal safety margin, how many 15 ms Ambiq Apollo4 keyword inferences per hour can a 0.5 mW solar cell sustain?
details:
  realistic_solution: 'Use a continuous steady-state energy budget under average harvested power. Always-on consumers use 30 uW, leaving 470 uW = 470 uJ/s for inference before margin. Per inference: MCU active 15 ms at 3 mW = 45 uJ, plus wake-up overhead 2 ms at 3 mW = 6 uJ, plus storage round-trip losses = 10 uJ. Total: 61 uJ effective per inference. Raw sustainable rate is 470 uJ/s / 61 uJ = 7.70 inferences/s, or about 27,700/hour. Applying the required 30% seasonal safety margin leaves 70% of that steady-state rate: 5.39 inferences/s, or about 19,400 inferences/hour.'
  common_mistake: |
    **The Pitfall:** Dividing total harvested energy directly by active inference energy.
    **The Rationale:** Candidates often calculate "0.5 mW / (3 mW * 15 ms) = 11.1 inferences/sec" and multiply by 3600.
    **The Consequence:** This ignores sleep power, wake-up overhead, storage inefficiency, and seasonal margins, leading to a drastically overestimated rate and a device that frequently dies.
  napkin_math: |
    **Assumptions & Constraints:**
    - Harvest Power: 500 μW.
    - Always-on Power: 30 μW.
    - Inference: 15 ms at 3 mW.
    - Wake-up: 2 ms at 3 mW.
    - Storage loss: 10 μJ per inference.

    **Calculations:**
    - Available Power before margin: 500 μW - 30 μW = 470 μW = 470 μJ/s.
    - Inference Active Energy: 15 ms * 3 mW = 45 μJ.
    - Wake-up Energy: 2 ms * 3 mW = 6 μJ.
    - Total Energy per Inference: 45 μJ + 6 μJ + 10 μJ = 61 μJ.
    - Raw Max Inference Rate: 470 μJ/s / 61 μJ/inference = 7.70 inferences/sec.
    - Raw Inferences per Hour: 7.70 * 3600 = 27,720 inferences/hour.
    - With 30% Margin: 7.70 * 0.70 = 5.39 inferences/sec.
    - Inferences per Hour: 5.39 * 3600 = 19,404 inferences/hour.

    **Conclusion & Interpretation:**
    - **Result: 19,404 margin-adjusted inferences/hour (Energy-Bound)**. The raw limit is about 27,700/hour, and the release answer includes the required seasonal derating.
