title: TinyML Coin Cell Duty Cycle
scenario: A sensor node wakes every 10 seconds, runs a 25 ms inference at 12 mW, transmits for 5 ms at 30 mW, and otherwise sleeps at 20 µW.
question: What average power does a TinyML node consume with a 25 ms inference and 5 ms transmit every 10 seconds?
details:
  realistic_solution: "Average power is active inference energy plus transmit energy plus sleep. Total is about 0.065 mW."
  common_mistake: |
    **The Pitfall:** Ignoring sleep and leakage energy because each active burst is short.
    **The Rationale:** Assuming the high-power inference or transmission events are the only significant drains on the battery.
    **The Consequence:** Underestimating average power and drastically miscalculating the expected battery lifespan of the sensor node.
  napkin_math: |
    **Assumptions & Constraints:**
    - Period: 10s.
    - Active: 25 ms at 12 mW.
    - Transmit: 5 ms at 30 mW.
    - Sleep: ~20 µW (0.020 mW).

    **Calculations:**
    - Inference Contribution: 12 mW * (0.025 s / 10 s) = 0.03 mW.
    - Transmit Contribution: 30 mW * (0.005 s / 10 s) = 0.015 mW.
    - Total Average Power = 0.03 + 0.015 + 0.020 = 0.065 mW.

    **Conclusion & Interpretation:**
    - **Result: Energy-Bound (0.065 mW total defines the coin cell lifespan).**
