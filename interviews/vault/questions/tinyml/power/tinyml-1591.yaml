title: Leakage Current vs Dynamic Power over Time
scenario: A factory predictive maintenance sensor sleeps for exactly 1 hour, wakes for 100ms drawing 10mA (dynamic), and returns to sleep drawing 5uA (leakage).
question: Which component (leakage or dynamic power) dominates the total energy consumption over a 5-year deployment?
visual:
  kind: svg
  path: tinyml-1591.svg
  alt: Pie chart showing leakage current forming the massive majority of total energy drawn.
  caption: 'Energy Breakdown: Leakage vs Active'
details:
  realistic_solution: "In one hour, sleep time is ~3600s. Sleep charge = 3600s * 0.005mA = 18 mAs. Active time is 0.1s. Active charge = 0.1s * 10mA = 1 mAs. Leakage current dominates the battery life."
  common_mistake: |
    **The Pitfall:** Focusing optimization purely on the high 10mA active current.
    **The Rationale:** Seeing the massive difference between 10mA and 5uA, engineers try to optimize the code while ignoring the vast difference in duration.
    **The Consequence:** Wasting time refactoring code when 94% of the energy is already lost to sleep leakage.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sleep: 1 hour (3600 s) at 5 µA (0.005 mA).
    - Active: 100 ms (0.1 s) at 10 mA.

    **Calculations:**
    - Sleep Charge: 3600 s * 0.005 mA = 18 mAs.
    - Active Charge: 0.1 s * 10 mA = 1 mAs.
    - Comparison: 18 mAs > 1 mAs.

    **Conclusion & Interpretation:**
    - **Result: Energy-Bound (Sleep leakage consumes 18x more energy than active computation).**
