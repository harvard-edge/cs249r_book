title: The Birdwatcher's Power Budget
scenario: You're designing a remote acoustic sensor to detect an endangered bird species. It uses a Cortex-M4 microcontroller that wakes up for 1 second to run an audio classification model, then sleeps for the remaining 59 seconds of a 1-minute cycle.
question: What average power comes from 1 s active at 10 mW and 59 s sleep at 10 uW on a Cortex-M4 bird sensor?
details:
  realistic_solution: To find the true average power, you calculate the total energy consumed during the entire 60-second cycle and divide by the cycle duration. This weights the short high-power burst against the long low-power sleep phase accurately.
  common_mistake: |
    **The Pitfall:** Confusing peak active power with average power, or ignoring the sleep current.
    **The Rationale:** Engineers often state the active power (10 mW) as the answer, forgetting that battery life is governed by average cycle power.
    **The Consequence:** They incorrectly estimate battery life by orders of magnitude, causing over-engineered battery packs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active state: 10 mW for 1 s.
    - Sleep state: 0.01 mW (10 µW) for 59 s.
    - Cycle time: 60 s.

    **Calculations:**
    - Active Energy = 10 mW * 1 s = 10 mJ.
    - Sleep Energy = 0.01 mW * 59 s = 0.59 mJ.
    - Total Energy = 10.59 mJ.
    - Average Power = 10.59 mJ / 60 s = 0.1765 mW.

    **Conclusion & Interpretation:**
    - **Result: ~177 µW (Duty-Cycled Efficiency)**. The average power is ~177 µW, stretching a standard coin cell to months of life.
  options:
  - 10.0 mW
  - 0.59 mW
  - 0.177 mW
  - 0.010 mW
  correct_index: 2
