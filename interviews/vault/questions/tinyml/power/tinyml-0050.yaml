title: The Duty Cycle Constraint
scenario: You are designing a battery-powered keyword spotting device. It must process a continuous stream of 1-second audio windows to detect a wake word.
question: What is the correct term for the percentage of time the CPU is in an active state processing audio versus in a low-power sleep state?
details:
  realistic_solution: "The correct term is Duty Cycle. It is the fraction of one period in which a system is active. For a real-time system that must process data arriving every period, the processing time must be less than this period."
  common_mistake: |
    **The Pitfall:** Confusing duty cycle with latency or throughput.
    **The Rationale:** Engineers often focus on the duration of the active period (latency) or the rate of processing (throughput) rather than the ratio.
    **The Consequence:** Miscalculating the critical ratio of active time to total time period, leading to inaccurate energy consumption estimates in battery-powered devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Period: 1-second (1000ms) audio window.
    - Active Inference Time: 150ms per inference.

    **Calculations:**
    - Duty Cycle: (150ms / 1000ms) * 100 = 15%.
    - Average Power: (50 mW * 0.15) + (0.01 mW * 0.85) = 7.5 mW + 0.0085 mW = 7.5085 mW.

    **Conclusion & Interpretation:**
    - **Result: Energy-Bound (Duty cycle correctly quantifies active ratio to compute battery lifespan).**
  options:
  - Latency
  - Throughput
  - Duty Cycle
  - Power Draw
  correct_index: 2
