title: 'Nordic nRF5340 Power Mode Analysis'
scenario: 'A tinyML application running on a Nordic nRF5340, which features a 128 MHz Arm Cortex-M33, 512 KB SRAM, and 1 MB flash, frequently switches between active computation and a low-power BLE advertising state.'
question: 'How should DVFS P-states and power caps be managed on such a device to optimize energy efficiency, considering its constrained resources and variable workload?'
details:
  realistic_solution: 'A realistic solution involves dynamically adjusting DVFS P-states based on immediate computational load, utilizing the nRF5340''s power management unit (PMU) for fine-grained control. Implementing a power cap would further constrain peak power, ensuring battery longevity. Crucially, the BLE radio should be managed independently, minimizing active transmission time and leveraging low-power advertising modes, as its power consumption often dominates the total budget in idle periods. Monitoring actual energy-per-inference would guide optimal P-state and BLE duty cycle settings.'
  common_mistake: 'Overlooking the impact of frequent state transitions on average power, or misapplying DVFS P-states without accounting for peripheral power consumption (like BLE radio) which might not scale linearly with core frequency.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Computation: 5 mA at 128 MHz for 100 ms.
    - Sleep with BLE: 2 uA for 900 ms per cycle.

    **Calculations:**
    - Active Average: 5 mA * 0.1 s = 0.5 mA-s.
    - Sleep Average: 0.002 mA * 0.9 s = 0.0018 mA-s.
    - Total Average Current: (0.5 + 0.0018) / 1s = 0.5018 mA.

    **Conclusion & Interpretation:**
    - **Result: 0.5018 mA (Energy Bound)**. The active computation phase dominates the power budget, indicating DVFS optimizations should aggressively target the 100ms compute window.
