title: Nordic nRF5340 Power Mode Analysis
scenario: A tinyML application running on a Nordic nRF5340, which features a 128 MHz Arm Cortex-M33, 512 KB SRAM, and 1 MB flash, frequently switches between active computation and a low-power BLE advertising state.
question: How should DVFS P-states and power caps be managed on such a device to optimize energy efficiency, considering its constrained resources and variable workload?
details:
  realistic_solution: A realistic solution is to manage clocks, sleep states, and software-controlled peripheral power rather than assuming a generic fine-grained PMU. On nRF5340-class firmware, keep the CPU at the lowest clock configuration that still meets the inference deadline, quickly return to system idle or low-power sleep after compute, and gate unused peripherals. Manage the BLE radio independently by minimizing advertising duty cycle and active transmit time, since radio activity can dominate idle-period energy. A practical "power cap" is enforced through scheduling, duty cycling, low-power modes, and measured energy-per-inference rather than continuous DVFS-style P-state control.
  common_mistake: |
    **The Pitfall:** Overlooking the impact of frequent state transitions on average power.
    **The Rationale:** Misapplying DVFS P-states without accounting for peripheral power consumption (like BLE radio) which might not scale linearly with core frequency.
    **The Consequence:** The device consumes more average power than anticipated, drastically reducing battery life.
  napkin_math: |
    **Assumptions & Constraints:**
    - Computation: 5 mA at 128 MHz for 100 ms.
    - Sleep with BLE: 2 uA for 900 ms per cycle.
    - Cycle length: 1 s.

    **Calculations:**
    - Active charge contribution: 5 mA * 0.1 s = 0.5 mA-s.
    - Sleep charge contribution: 0.002 mA * 0.9 s = 0.0018 mA-s.
    - Total charge per cycle: 0.5018 mA-s.
    - Average current over the 1 s cycle: 0.5018 mA-s / 1 s = 0.5018 mA.

    **Conclusion & Interpretation:**
    - **Result: 0.5018 mA average current.** The active computation phase dominates this duty cycle, so clock selection, compute duration, and rapid return to low-power BLE advertising are the main optimization levers. Energy would require multiplying by supply voltage.
