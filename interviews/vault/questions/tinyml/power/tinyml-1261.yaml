title: nRF5340 Always-On Wake Word Energy Budgeting
scenario: You are designing a battery-operated smart home sensor using the Nordic nRF5340. The system needs to run an always-on wake word detection model on the 128 MHz app core, which draws ~5mA active current. You are constrained to a 220mAh CR2032 coin cell and must achieve a 1-year battery life while periodically transmitting over BLE 5.3 using the 64 MHz net core.
question: How would you evaluate the required duty cycle and sleep state power constraints to make this system feasible?
details:
  realistic_solution: The 220mAh cell must average only about 25 uA over 1 year. With a 5 uA sleep state and a measured or budgeted BLE average, only the remaining current can be spent on the 5 mA app core. For example, reserving 5 uA average for periodic BLE leaves 15 uA for inference, so the app core can be active for about 15 uA / 5000 uA = 0.3% of the time. A feasible wake-word design therefore needs an always-on low-power front end or hardware VAD that keeps the 128 MHz core asleep except for short candidate windows, and BLE advertising/connection intervals must be budgeted alongside inference.
  common_mistake: |
    **The Pitfall:** Assuming the app core can run continuously or failing to account for sleep current.
    **The Rationale:** Candidates simply divide battery capacity by active current without designing a cascaded wake-up or aggressive duty cycling strategy.
    **The Consequence:** The device will drain its 220mAh battery in roughly 44 hours instead of the required 1 year.
  napkin_math: |
    **Assumptions & Constraints:**
    - Battery: CR2032 (220 mAh).
    - Target lifespan: 1 year (8760 hours).
    - App core active draw: 5 mA (5000 µA).
    - Sleep draw: 5 µA.
    - Periodic BLE activity is budgeted as 5 µA average; replace this with a measured radio average for the actual interval and payload.

    **Calculations:**
    - Max allowed continuous average current: 220 mAh / 8760 h = 25 µA.
    - App-core active budget available: 25 µA - 5 µA sleep - 5 µA BLE = 15 µA.
    - Allowed app-core duty cycle: 15 µA / 5000 µA = 0.3%.
    - Without BLE, the upper bound would be (25 µA - 5 µA) / 5000 µA = 0.4%, so radio activity tightens the inference budget.

    **Conclusion & Interpretation:**
    - **Result: about 0.3% app-core duty cycle after a 5 µA BLE reserve, or 3 ms per second (Energy-Bound)**. The system requires hardware VAD cascading and a BLE schedule whose measured average current fits the same 25 µA lifetime budget.
