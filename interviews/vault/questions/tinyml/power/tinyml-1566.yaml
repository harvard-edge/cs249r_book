title: Oscillator Drift Guardband
scenario: A smart agricultural sensor on a Cortex-M4 uses an RC oscillator to wake up from a 1 uA sleep state to a 12 mA active state. The oscillator has a 5% drift over time.
question: Implement a drift-tolerant duty-cycling guardband and calculate its impact on battery life if the baseline active time is 10 ms per second.
visual:
  kind: svg
  path: tinyml-1566.svg
  alt: Timeline showing a 10ms window expanding to 60ms.
  caption: Active window expansion due to guardbanding.
details:
  realistic_solution: A 5% drift over a 1-second sleep interval means the system might wake up 50 ms early or late. To guarantee catching an exact synchronized external beacon, the active window must expand by 50 ms, bringing active time from 10 ms to 60 ms. Average current jumps from 10ms x 12mA ≈ 120 uA to 60ms x 12mA = 720 uA, a 6x penalty.
  common_mistake: |
    **The Pitfall:** Assuming the oscillator drift doesn't affect power.
    **The Rationale:** Forgetting that the processor must stay awake longer to catch asynchronous events.
    **The Consequence:** Underestimating the power budget and significantly shortening the battery life.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline active time: 10 ms per second.
    - Oscillator drift: 5% over 1 second sleep interval.
    - Sleep current: 1 µA. Active current: 12 mA.

    **Calculations:**
    - Guardband needed = 5% of 1s = 50 ms.
    - Total active window = 10 ms (baseline) + 50 ms (guardband) = 60 ms.
    - Average current = (60 ms x 12 mA) / 1000 ms = 0.72 mA = 720 µA.

    **Conclusion & Interpretation:**
    - **Result: 720 µA average current (Power-Bound)**. The guardbanding forces a 6x penalty in average power, heavily impacting battery life.
