title: The Silent Power Drain
scenario: You're designing a battery-powered acoustic sensor to detect anomalies in factory machinery. It wakes up for 1 second every minute to run an inference, then goes into deep sleep. The MCU consumes 50 mW while active and 10 µW in deep sleep.
question: What average power does a Cortex-M4 acoustic sensor draw when active for 1 s each minute at 50 mW and sleeping at 10 uW?
details:
  realistic_solution: The correct way to calculate average power is to determine the total energy consumed over a single cycle (active + sleep) and then divide by the total cycle duration. The energy is the sum of (power x time) for each state.
  common_mistake: |
    **The Pitfall:** Ignoring deep sleep power or incorrectly averaging the values.
    **The Rationale:** Candidates often assume sleep power is exactly zero or average the two power values directly without weighing them by time.
    **The Consequence:** Inaccurate power modeling, leading to incorrectly sized batteries.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active Power: 50 mW for 1 s.
    - Sleep Power: 0.01 mW for 59 s.
    - Cycle Period: 60 s.
    
    **Calculations:**
    - Active Energy: 50 mW * 1 s = 50 mJ.
    - Sleep Energy: 0.01 mW * 59 s = 0.59 mJ.
    - Total Energy per Cycle: 50 mJ + 0.59 mJ = 50.59 mJ.
    - Average Power: 50.59 mJ / 60 s = 0.843 mW.
    
    **Conclusion & Interpretation:**
    - **Result: Power-Bound Average (Power-Bound)**. Time-weighted averaging yields 0.843 mW, demonstrating the critical impact of deep sleep on battery life.
  options:
  - '~0.833 mW'
  - '~10.67 mW'
  - '~0.843 mW'
  - '~25.0 mW'
