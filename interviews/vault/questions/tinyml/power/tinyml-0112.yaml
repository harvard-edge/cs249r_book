title: The Power Supply Noise Impact
scenario: Your environmental monitoring device uses a Cortex-M4 with a 12-bit ADC reading a gas sensor (analog output, 0-3.3V). The device runs on a switching regulator with 50 mV peak-to-peak ripple at 1 MHz. During ML inference, the MCU draws current spikes that cause additional 30 mV supply droops. Your model was trained on clean lab data.
question: How do 50 mV regulator ripple and 30 mV inference droop degrade a 12-bit gas-sensor ADC's SNR?
details:
  realistic_solution: 'Trace the noise through the signal chain: Clean ADC has 12-bit ENOB. The 30 mV supply droop plus 50 mV ripple severely degrades the ADC reference, plummeting the effective resolution to ~5.6 bits. Applying a 16× oversampling technique adds exactly 2 bits of resolution, bringing it to 7.6 bits. However, because the gas sensor''s useful voltage swing is narrow, the model (trained on thousands of clean ADC levels) is now fed only ~194 coarse, noisy levels. This drastic resolution loss will crush inference accuracy. The solution is hardware filtering (an RC or LC filter to kill the 1 MHz ripple) combined with software oversampling to restore the ENOB before feeding the data to the ML model.'
  common_mistake: |
    **The Pitfall:** Assuming 50 mV ripple on a 3.3V supply is only 1.5% and therefore negligible.
    **The Rationale:** Engineers often look at the percentage of the full scale rather than the percentage of the specific sensor's narrow operational voltage swing.
    **The Consequence:** The analog noise completely consumes the small sensor signal, feeding garbage into the ML model and destroying inference accuracy.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline ADC: 12-bit Effective Number of Bits (ENOB) on clean supply.
    - Degraded state: 30 mV droop + 50 mV ripple degrades reference.

    **Calculations:**
    - Degraded ENOB: drops to ~5.6-bit ENOB.
    - Recovery via Oversampling: 16x oversampling adds exactly log4(16) = 2 bits of resolution.
    - New ENOB: 5.6 + 2 = 7.6 bits.
    - Filtering impact: Adding an RC filter drops ripple 10x to 5 mV, restoring ENOB.

    **Conclusion & Interpretation:**
    - **Result: 7.6 bits ENOB (Noise-Bound).** Hardware filtering combined with software oversampling successfully restores the necessary signal integrity before feeding data to the ML model.
