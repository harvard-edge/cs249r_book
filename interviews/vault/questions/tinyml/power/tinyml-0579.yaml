title: 'The Deep Sleep I2C Leakage'
scenario: 'Your TinyML sensor goes into Deep Sleep, cutting power to the main CPU core. The theoretical deep sleep current of the MCU is 2 microamps. However, your multimeter measures 700 microamps of constant drain. You discover the I2C peripheral lines (SDA/SCL) are still physically connected to an external sensor.'
question: 'How can a single 4.7 kohm I2C pull-up drain 700 uA while a TinyML sensor is in 2 uA deep sleep?'
details:
  realistic_solution: 'The I2C pull-up resistors (typically 4.7 kohm to VCC) are always connected, even in deep sleep. With one end at 3.3V and one of the sensor''s I2C lines pulled low during sleep: I = V/R = 3.3V / 4,700ohm = 702uA per line. Fix: (1) power the pull-ups from a GPIO that you can disable in sleep, (2) use a load switch (MOSFET) to cut power to the entire sensor + pull-up circuit, or (3) switch GPIOs to analog/high-Z mode before sleeping.'
  common_mistake: |
    **The Pitfall:** Assuming the external sensor itself is still fully active.
    **The Rationale:** Candidates often focus purely on active component states and ignore passive pull-up/pull-down resistor configurations during sleep states.
    **The Consequence:** The battery drains hundreds of times faster than expected, killing the remote sensor weeks before its intended lifespan.
  napkin_math: |
    **Assumptions & Constraints:**
    - VCC is 3.3V.
    - I2C pull-up resistor is 4.7 kΩ.
    - One I2C line is pulled low during sleep.

    **Calculations:**
    - Current (I) = V / R.
    - I = 3.3 V / 4700 Ω = 0.000702 A = ~702 µA.

    **Conclusion & Interpretation:**
    - **Result: ~702 µA (Power-Bound)**. A single misconfigured pull-up resistor burns 350x more power than the entire sleeping microcontroller.
