title: Energy per Inference from Power Profile
scenario: 'You are profiling a keyword spotting model on a Cortex-M4F powered by a CR2032 coin cell (225 mAh, 3.0V). The MCU draws 0.5 µA in deep sleep, 30 mA during active inference (18ms), and 15 mA during MFCC feature extraction (5ms). The system wakes every 1 second.'
question: 'How do you compute energy per wake cycle for 5 ms MFCC plus 18 ms inference on a 225 mAh CR2032 device?'
details:
  realistic_solution: 'Calculate energy per phase (Power * Time), sum to get energy per wake cycle, then divide by the total cycle duration to find average power. Inference dominates the energy budget.'
  common_mistake: |
    **The Pitfall:** Calculating battery life using the peak current instead of the time-weighted average.
    **The Rationale:** Candidates ignore that the MCU spends 97.7% of its time in deep sleep.
    **The Consequence:** They erroneously conclude the battery will die in hours rather than weeks.
  napkin_math: |
    **Assumptions & Constraints:**
    - MFCC: 15 mA * 5 ms * 3.0V.
    - Inference: 30 mA * 18 ms * 3.0V.
    - Sleep: 0.5 µA * 977 ms * 3.0V.

    **Calculations:**
    - Energy per cycle: 225 µJ (MFCC) + 1,620 µJ (Inference) + 1.5 µJ (Sleep) = 1,846.5 µJ.
    - Average power at 1 Hz: 1,846.5 µW.
    - Average current: 1,846.5 µW / 3.0V = 615.5 µA.
    - Battery life: 225 mAh / 0.6155 mA = 365.5 hours = 15.2 days.

    **Conclusion & Interpretation:**
    - **Result: 15.2 days battery life ([Power-Bound])**. Inference dominates at ~88% of the total energy budget.
