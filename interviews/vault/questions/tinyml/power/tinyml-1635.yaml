title: Vibration Monitor Max Frequency
scenario: A Cortex-M4 vibration monitor runs an FFT+ML taking 100ms at 12mW. Sleep power is 0.1mW. Target average power is 1mW.
question: What is the maximum continuous sampling frequency in Hz when applying a duty cycle constraint?
visual:
  kind: svg
  path: tinyml-1635.svg
  alt: Timeline showing 100ms active spike followed by ~1.2s sleep
  caption: 0.75 Hz Execution Pattern
details:
  realistic_solution: 1mW = 12mW * (0.1s * f) + 0.1mW * (1 - 0.1s * f). 1 = 1.2f + 0.1 - 0.01f. 0.9 = 1.19f. f = 0.9 / 1.19 = 0.756 Hz.
  common_mistake: |
    **The Pitfall:** Calculating the duty cycle percentage but failing to convert it back to frequency.
    **The Rationale:** Candidates easily compute the required duty ratio but forget the physical constraint that each active period is a fixed 100ms block.
    **The Consequence:** Providing a percentage instead of a concrete sampling rate, which cannot be directly programmed into the device's sleep timer.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Average Power: 1 mW.
    - Active Power: 12 mW (for 0.1 s).
    - Sleep Power: 0.1 mW.

    **Calculations:**
    - Equation: 1 mW = (12 mW * 0.1 s * f) + (0.1 mW * (1 - 0.1 s * f))
    - Simplify: 1 = 1.2f + 0.1 - 0.01f
    - 0.9 = 1.19f
    - f = 0.9 / 1.19 = ~0.756 Hz.

    **Conclusion & Interpretation:**
    - **Result: Power-Bound**. The device can sample at a maximum frequency of 0.756 Hz to respect the 1 mW thermal/battery limit.
