title: TinyML System Specification for Predictive Maintenance Sensor Node
scenario: 'A predictive maintenance system for industrial motors uses a sensor node with Cortex-M7+Ethos-U55. Requirements: detect bearing failures from 3-axis vibration at 25kHz, 99% recall for failure events, <1% false positive rate, operate on 4xAA batteries (10,000 mAh at 6V) for 2 years without replacement.'
question: How would you specify a predictive maintenance system for industrial motors using a sensor node with Cortex-M7+Ethos-U55?
details:
  realistic_solution: |
    Specify the node as an always-listening, event-gated vibration monitor rather than a continuously inferencing system. Use a low-power 3-axis accelerometer with FIFO and embedded threshold/RMS logic sampling at 25 kHz. The sensor computes short-window energy or bandpower triggers and wakes the MCU only when vibration exceeds a conservative threshold. The Cortex-M7 then runs preprocessing (windowing plus FFT or filterbank features) and invokes the Ethos-U55-backed CNN only for candidate events. Keep the wake threshold biased toward high recall, then use the CNN threshold and temporal confirmation over adjacent windows to drive <1% false positives while preserving 99% recall.

    Power budget: 10,000 mAh at 6 V = 60 Wh = 216 kJ. Over 2 years (about 63.1M seconds), the node has about 3.4 mW average power. A plausible budget is sensor/FIFO always on at 1.2 mW, MCU stop mode and periodic FIFO checks at 0.6 mW, NPU domain off or power-gated between events at roughly 0.01 mW, and event inference at 50 mW for 50 ms. If candidate events occur at 0.01 Hz, the event energy is 2.5 mJ/event and average event power is 2.5 mJ × 0.01/s = 0.025 mW. Total average is about 1.2 + 0.6 + 0.01 + 0.025 = 1.835 mW, leaving about 1.6 mW for sensor variation, battery derating, logging, and radio reports. The specification should include validation on motor fault data, threshold calibration for 99% recall, and a field false-positive budget measured per motor-day.
  common_mistake: |
    **The Pitfall:** Running continuous inference at 25kHz without leveraging wake-on-anomaly strategies.
    **The Rationale:** Candidates fail to utilize low-power sensor FIFO buffers and sleep states to threshold events.
    **The Consequence:** Always-on inference at a high sampling rate becomes the main battery drain culprit, completely missing the power budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Battery: 10,000 mAh at 6V (60 Wh).
    - Lifetime: 2 years.
    - Candidate event rate after sensor threshold: 0.01 Hz.
    - Event inference: 50 ms at 50 mW.

    **Calculations:**
    - Battery energy: 10 Ah * 6 V = 60 Wh = 216,000 J.
    - Time: 2 years = ~63.1M seconds.
    - Average budget: 216,000 J / 63.1M s = 0.00342 W = 3.42 mW.
    - Sensor FIFO: 1.2 mW.
    - MCU sleep: 0.6 mW.
    - NPU power-gated leakage allowance: 0.01 mW.
    - Event energy: 50 mW * 50 ms = 2.5 mJ.
    - Event average power at 0.01 Hz: 2.5 mJ/event * 0.01 events/s = 0.025 mW.
    - Total average power: 1.2 + 0.6 + 0.01 + 0.025 = 1.835 mW.

    **Conclusion & Interpretation:**
    - **Result: ~1.84 mW average (Energy-Bound)**. The system fits the 3.42 mW battery budget only if inference is event-gated; continuous 25 kHz inference would exceed the lifetime target.
