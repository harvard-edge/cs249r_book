title: Power Budget Allocation on Cortex-M7+Ethos-U55 IoT Node
scenario: A battery-powered IoT device uses a Cortex-M7 + Ethos-U55 with a 1000mAh, 3.7V battery. The system must run for 7 days. The M7 draws 30mW active and 5mW in idle. Ethos-U55 draws 100mW during inference, and the radio draws 200mW during transmission. Inference runs 100 times/day (10ms each). Radio transmits 50 times/day (100ms each).
question: Can the current duty cycle meet the 7-day operational target?
details:
  realistic_solution: Battery energy capacity must be compared against a full 24-hour duty-cycle model. The M7 is idle for the parts of the day not spent in inference or radio transmission, while inference should include both the M7 active power and Ethos-U55 power during the 10 ms inference windows. Radio energy should include the radio power and, if the M7 remains active to service the transmission, the M7 active power during those 100 ms windows. Under those explicit assumptions, idle energy still dominates and the 7-day target is met.
  common_mistake: |
    **The Pitfall:** Mixing up power (mW) and energy (mWh/Joules) or failing to convert time units.
    **The Rationale:** Candidates multiply 200mW by 50 without converting 100ms to a fraction of an hour or second.
    **The Consequence:** This produces a massively overstated daily energy consumption, leading candidates to falsely conclude the system will fail and to unnecessarily cripple the duty cycle.
  napkin_math: |
    **Assumptions & Constraints:**
    - Battery: 1000 mAh, 3.7V.
    - Target: 7 days.
    - Power states: M7 idle (5mW), M7 active (30mW), Ethos-U55 inference (100mW), Radio (200mW).
    - M7 is idle for all time not spent servicing inference or radio.

    **Calculations:**
    - Battery Energy: 1000 mAh * 3.7V = 3700 mWh = 13,320 Joules.
    - Target max average budget: 13,320 J / 7 days = 1902 J/day.
    - Inference active time: 100 * 0.010 s = 1 s/day.
    - Radio active time: 50 * 0.100 s = 5 s/day.
    - M7 idle time: 86,400 s - 1 s - 5 s = 86,394 s/day.
    - M7 Idle Energy: 0.005 W * 86,394 s = 431.97 J/day.
    - M7 Active Energy: 0.030 W * (1 s + 5 s) = 0.18 J/day.
    - Ethos Inference Energy: 0.100 W * 1 s = 0.10 J/day.
    - Radio Energy: 0.200 W * 5 s = 1.00 J/day.
    - Total Energy/Day: 431.97 + 0.18 + 0.10 + 1.00 = 433.25 J/day.
    - Lifespan: 13,320 J / 433.25 J/day = 30.7 days.

    **Conclusion & Interpretation:**
    - **Result: Operational target met under the stated idle-between-events assumption**. The battery lasts about 30.7 days, exceeding the 7-day requirement; the conclusion depends on the M7 truly remaining near 5 mW outside the 6 seconds/day of active inference and radio service.
