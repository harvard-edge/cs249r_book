title: Design a Sub-1mW Cascaded Acoustic Wake-up
scenario: An acoustic monitor has a strict power budget of 1mW. The microphone draws 500uW. The MCU draws 10mW when active and 10uW in sleep.
question: How can you design a multi-stage pipeline that guarantees the total average power stays below 1mW while processing sporadic acoustic events?
details:
  realistic_solution: 'A cascade is necessary: keep the microphone on, route it to a low-power analog comparator (<10uW), and leave the MCU asleep at 10uW except on candidate events. The comparator wakes the MCU for a 2ms energy check; only a smaller subset of events runs the full 20ms ML model. With mic + comparator + MCU sleep using about 520uW, the remaining active-power budget is about 480uW. Since MCU active power is 10mW instead of 10uW sleep, the active duty cycle must stay below about 4.8%, so the combined 2ms checks and 20ms full-model runs must average less than about 48ms per second.'
  common_mistake: |
    **The Pitfall:** Keeping the MCU awake continuously to run a lightweight model.
    **The Rationale:** Believing a "tiny" model saves enough power without realizing the MCU's baseline active current is the primary issue.
    **The Consequence:** The 10mW active draw instantly violates the strict 1mW total system power limit, draining the battery rapidly.
  napkin_math: |
    **Assumptions & Constraints:**
    - Budget: 1 mW total.
    - Mic: 500 µW.
    - Comparator: 10 µW.
    - MCU sleep: 10 µW.
    - MCU active: 10 mW.

    **Calculations:**
    - Always-on baseline: mic 500 µW + comparator 10 µW + MCU sleep 10 µW = 520 µW.
    - Remaining average budget for active MCU above sleep: 1000 µW - 520 µW = 480 µW.
    - Incremental active power: 10,000 µW - 10 µW = 9,990 µW.
    - Maximum active duty cycle: 480 / 9,990 = 4.8%.
    - Active time budget: 0.048 * 1 second = 48 ms of MCU-active time per second.
    - Cascade constraint: 2 ms * energy_checks_per_second + 20 ms * full_model_runs_per_second <= 48 ms/s.
    - Example: 10 energy checks/s plus 1 full model/s uses 40 ms/s active time, giving total average power = 520 µW + 0.040 * 9,990 µW = 920 µW.

    **Conclusion & Interpretation:**
    - **Result: Energy-Bound**. The cascade meets the 1 mW budget only if the weighted event rate keeps MCU active time below about 48 ms/s, including both the 2 ms energy checks and 20 ms full-model stages.
