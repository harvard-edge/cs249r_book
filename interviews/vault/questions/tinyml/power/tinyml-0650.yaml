title: Sub-Milliwatt Always-On Wake Word Detection
scenario: An always-on wake word detection system must consume less than 1 mW total
  — including the microphone, ADC, feature extraction, and neural network inference.
  The system must detect 'Hey Device' with >95% accuracy and <5% false accept rate.
question: What architecture keeps always-on wake-word detection under 1 mW including
  microphone, ADC, features, and inference?
details:
  realistic_solution: 'Sub-milliwatt always-on detection requires a fundamentally
    different architecture than running a standard MCU continuously. A tiered always-on
    architecture is required: Stage 1 — analog VAD or ultra-low-power DSP (~20-50
    uW). Stage 2 — lightweight feature extractor (~200 uW). Stage 3 — full neural
    network (~1.5 mW) runs only on likely wake words.'
  common_mistake: '**The Pitfall:** Attempting to underclock a standard Cortex-M4
    to hit the power budget.

    **The Rationale:** Candidates assume clock scaling linearly reduces power to sub-mW
    levels without accounting for the fixed static power of the MCU, mic, and ADC.

    **The Consequence:** The system draws ~2.7 mW minimum, failing the 1 mW requirement
    and draining the coin cell in 10 days instead of years.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Budget < 1 mW.

    - Cortex-M4 active draws ~2 mW, Mic ~0.5 mW, ADC ~0.2 mW.

    - Dedicated VAD DSP draws ~50 µW.


    **Calculations:**

    - Always-on M4 approach: 2 mW + 0.5 mW + 0.2 mW = 2.7 mW.

    - Tiered approach: VAD (~50 µW) + 10% duty cycle on features (200 µW * 0.1 = 20
    µW) + 1% duty cycle on M4 inference (1.5 mW * 0.01 = 15 µW) = 85 µW average.


    **Conclusion & Interpretation:**

    - **Result: ~85 µW average (Power-Bound)**. A tiered architecture easily beats
    the 1 mW budget.

    '
  options:
  - Use a Cortex-M4 at the lowest clock speed (4 MHz) to stay under 1 mW. At 4 MHz,
    the MCU draws ~1.5 mW active, plus 0.5 mW mic + 0.2 mW ADC = 2.2 mW total.
  - 'A tiered always-on architecture: Stage 1 — analog VAD or ultra-low-power DSP
    (~20-50 uW) screens for speech-like audio 100% of the time. Stage 2 — lightweight
    feature extractor (~200 uW) activates only when VAD triggers (~10% of time). Stage
    3 — full neural network (~1.5 mW) runs only on likely wake words (~1% of time).
    Average power: ~85 uW.'
  - Use a standard Cortex-M4 running the full neural network continuously but power-gate
    the microphone between inference cycles to stay under 1 mW.
  - Achieve sub-milliwatt by using INT4 quantization to reduce the model's compute
    by 4x, bringing the M4's inference power from 2 mW to 0.5 mW.
  correct_index: 1
