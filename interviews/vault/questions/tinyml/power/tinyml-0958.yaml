title: Energy Impact of PSRAM Weight Offloading
scenario: 'You are deploying an INT8 keyword spotting model on an ESP32-S3. To fit a larger audio ring buffer, you move 400 KB of model weights from the internal 512 KB SRAM to the external 8 MB PSRAM. Despite utilizing the exact same INT8 vector extensions and computing the same number of operations per inference, your hardware profiler shows the energy consumed per inference has jumped drastically. Assume an INT8 MAC costs ~0.2 pJ, a 32-bit SRAM read costs ~5 pJ, and a 32-bit PSRAM read costs ~100 pJ.'
question: 'Why does moving 400 KB of weights from SRAM to PSRAM greatly increase the ESP32-S3 energy per inference?'
details:
  realistic_solution: 'According to the Horowitz energy principles, data movement across physical boundaries consumes orders of magnitude more energy than the actual arithmetic operations. Moving weights to external PSRAM forces the ESP32-S3 to drive signals over the external SPI/QSPI bus for memory fetches, replacing cheap on-chip SRAM reads with expensive off-chip accesses. The energy cost of memory access completely dominates the compute energy.'
  common_mistake: |
    **The Pitfall:** Focusing solely on the CPU clock or MAC compute efficiency.
    **The Rationale:** Candidates assume that since the operation count remains constant, the overall energy should remain flat.
    **The Consequence:** They fail to recognize that the energy bottleneck in TinyML is off-chip data movement, not raw compute, leading to massive power regressions.
  napkin_math: |
    **Assumptions & Constraints:**
    - INT8 MAC = 0.2 pJ.
    - 32-bit SRAM read = 5 pJ.
    - 32-bit PSRAM read = 100 pJ.
    - Model: 400,000 INT8 MACs, 400 KB weights.

    **Calculations:**
    - Compute energy = 400,000 * 0.2 pJ = 80 nJ.
    - Memory fetches = 400 KB / 4 bytes = 100,000 words.
    - SRAM energy = 100,000 * 5 pJ = 500 nJ. Total = 580 nJ.
    - PSRAM energy = 100,000 * 100 pJ = 10,000 nJ. Total = 10,080 nJ.

    **Conclusion & Interpretation:**
    - **Result: The energy per inference jumps by ~17.4x (Energy-Bound Memory Bandwidth)**. Data movement to off-chip memory dominates the power budget.
