title: Cortex-M4 Seismic Duty Cycle
scenario: A Cortex-M4 monitors a seismic sensor. The active inference consumes 15 mW and takes 20 ms. Deep sleep baseline is 0.05 mW.
question: Calculate the average power consumption if the MCU runs inference exactly once per second.
visual:
  kind: svg
  path: tinyml-1659.svg
  alt: A sleep/wake timeline showing 15mW spikes every 1 second over a near-zero baseline.
  caption: Duty cycle power spikes across a 3-second window.
details:
  realistic_solution: 'The active time is 20 ms per second (2% duty cycle), and sleep time is 980 ms (98%). Average power = (0.02 * 15 mW) + (0.98 * 0.05 mW) = 0.3 mW + 0.049 mW = 0.349 mW.'
  common_mistake: |
    **The Pitfall:** Ignoring the deep sleep leakage current.
    **The Rationale:** Engineers assume deep sleep is "zero power" and focus purely on the active compute energy.
    **The Consequence:** In extremely low duty-cycle systems, sleep current dominates the budget. Neglecting it leads to severe battery life underestimation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active power: 15 mW.
    - Deep sleep power: 0.05 mW.
    - Active time: 20 ms.
    - Total period: 1000 ms (1 second).

    **Calculations:**
    - Active Duty Cycle: 20 ms / 1000 ms = 0.02 (2%).
    - Sleep Duty Cycle: 980 ms / 1000 ms = 0.98 (98%).
    - Average Active Power: 0.02 * 15 mW = 0.3 mW.
    - Average Sleep Power: 0.98 * 0.05 mW = 0.049 mW.
    - Total Average Power: 0.3 mW + 0.049 mW = 0.349 mW.

    **Conclusion & Interpretation:**
    - **Result: 0.349 mW (Energy-Bound)**. The total average power is 0.349 mW, with sleep leakage contributing noticeably to the final budget.
