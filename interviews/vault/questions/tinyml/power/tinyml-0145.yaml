title: 'The Thousand-Fold Sleep'
scenario: 'A battery-powered audio sensor you deployed in a remote forest keeps resetting unpredictably. You suspect a "power brown-out" where the battery voltage sags under load, causing the microcontroller to restart. To begin your investigation, you must first recall the fundamental power characteristics of your device.'
question: 'What is the typical ratio of power consumption for a TinyML microcontroller when it is "active" compared to when it is in "deep sleep" mode?'
details:
  realistic_solution: 'The correct ratio is typically 1,000x or greater. A TinyML device''s entire power budget relies on spending the absolute minimum time possible in the active state and maximizing time in a deep sleep state that consumes mere microwatts. A software bug that prevents the device from entering deep sleep will drain the battery thousands of times faster than designed, leading to a rapid voltage drop (brown-out) and system reset.'
  common_mistake: |
    **The Pitfall:** Underestimating the extreme dynamic power range of microcontrollers.
    **The Rationale:** Engineers accustomed to cloud or mobile systems assume a ratio of 10-50x (similar to a smartphone's idle vs. load states).
    **The Consequence:** A software bug preventing deep sleep drains the battery thousands of times faster than expected, causing the device to die in days instead of years.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active state power: ~50 mW.
    - Deep sleep state power: ~50 µW (0.05 mW).

    **Calculations:**
    - Ratio: 50 mW / 0.05 mW = 1,000×.
    - Battery life impact: If sleep is blocked, average power jumps from ~1 mW to 50 mW.
    - Depletion rate: 1-year battery life / 50 = ~7.3 days.

    **Conclusion & Interpretation:**
    - **Result: 1,000× Ratio (Power-Bound)**. A software bug preventing deep sleep drains the battery thousands of times faster, leading to a rapid voltage drop.
  options:
    - '~10x (Misconception: Mobile Power Ratios)'
    - '~100x (Misconception: Underestimating Sleep Efficiency)'
    - '~1,000x'
    - '~10,000,000x (Misconception: Conflating with Compute Ratios)'
