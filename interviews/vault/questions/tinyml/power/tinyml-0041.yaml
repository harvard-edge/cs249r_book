title: The Solar-Powered Wildlife Cam
scenario: You're designing a remote wildlife camera using a Cortex-M4 microcontroller. The device stays in deep sleep and wakes up once every minute to capture an image and run an inference, which takes 200ms. The Cortex-M4 consumes 50 mW during active inference and 10 µW during deep sleep.
question: What is the average power for a Cortex-M4 wildlife camera active for 200ms once per minute and asleep otherwise?
details:
  realistic_solution: 'The correct way to solve this is to calculate the total energy consumed over one full cycle (active + sleep) and then divide by the cycle''s duration to find the average power. The device is active for 0.2 seconds and sleeps for 59.8 seconds in each 60-second period. This weighted average is the only accurate method to determine if a small solar panel can sustain the device.'
  common_mistake: |
    **The Pitfall:** Averaging the active and sleep power ratings directly or ignoring sleep power entirely.
    **The Rationale:** Engineers might assume the sleep power is negligible or incorrectly calculate a simple average without weighting by the time spent in each state.
    **The Consequence:** The calculated energy budget will be wildly inaccurate, leading to incorrectly sized batteries or solar panels that fail in the field.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active power: 50 mW, Sleep power: 10 µW (0.01 mW).
    - Active time: 0.2 s, Cycle period: 60 s.

    **Calculations:**
    - Sleep time: 60 s - 0.2 s = 59.8 s.
    - Energy per cycle: (50 mW * 0.2 s) + (0.01 mW * 59.8 s) = 10 mJ + 0.598 mJ = 10.598 mJ.
    - Average power: 10.598 mJ / 60 s ≈ 0.177 mW.

    **Conclusion & Interpretation:**
    - **Result: ~0.177 mW (Power-Bound).** The correctly weighted average power accounts for the overwhelming duration spent in sleep mode.
  options:
  - '~10.13 mW (Misinterprets µW as mW)'
  - '~25.0 mW (Averages power without time weighting)'
  - '~0.167 mW (Ignores sleep power in calculation)'
  - '~0.177 mW'
