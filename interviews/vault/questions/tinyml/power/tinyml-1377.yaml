title: Optimizing an Ultra-Low-Power Edge ML Model on Nordic nRF5340 for Energy Efficiency
scenario: You are tasked with deploying a gesture recognition ML model on a Nordic nRF5340 SoC. The device must operate for 2 years on a coin cell battery, performing frequent inferences.
question: How should you design a two-year coin-cell nRF5340 gesture model using Horowitz energy principles and energy-aware operators?
details:
  realistic_solution: 'The solution requires a holistic approach. First, the model must be aggressively quantized (e.g., to 4-bit or even binary neural networks) and pruned to minimize its memory footprint, ensuring the entire active model fits within the 256 KB SRAM to avoid slow and energy-intensive Flash accesses. Second, leverage Horowitz energy tables to guide operator selection; prioritize compute-bound operations that can utilize the Cortex-M33''s DSP extensions efficiently over memory-bound operations. Third, implement aggressive duty-cycling: the nRF5340 should be in its lowest power sleep state whenever an inference is not actively running. Data transfer over BLE should be bursty and infrequent.'
  common_mistake: |
    **The Pitfall:** Focusing solely on reducing FLOPs while ignoring the energy cost of memory accesses.
    **The Rationale:** Most ML literature emphasizes compute complexity (MACs), but fetching data from Flash costs orders of magnitude more energy than arithmetic operations.
    **The Consequence:** Designing a low-FLOP model that constantly pages data from Flash, rapidly draining the battery and failing to meet the 2-year lifespan.
  napkin_math: |
    **Assumptions & Constraints:**
    - Battery: 200 mAh at 3.0V.
    - Lifespan: 2 years (63,072,000 s).
    - Inference Time: 10 ms.

    **Calculations:**
    - Power Budget: 200 mAh * 3.0V = 600 mWh = 0.6 Wh = 2160 Joules.
    - Average Power: 2160 J / 63,072,000 s = 34 µW.
    - Energy per Inference: 34 µW * 0.010 s = 0.34 µJ.
    - Operation Cost (Horowitz): 32-bit MAC ≈ 1 pJ. Flash read ≈ 100 pJ.

    **Conclusion & Interpretation:**
    - **Result: Power-Bound**. An inference must cost < 0.34 µJ; accessing Flash is 100x more expensive than compute, mandating the model fits entirely in SRAM.
