title: Optimizing CNN Energy on ARM Cortex-M4 STM32F4
scenario: You are deploying a small convolutional neural network (CNN) for keyword spotting on an ARM Cortex-M4 microcontroller. The CNN involves several 3x3 convolutions and ReLU activations, with feature maps that occasionally exceed the 256KB SRAM, requiring external memory access.
question: How would you cut CNN energy on an STM32F4 when SRAM access costs 10x a MAC and external flash costs 100x?
details:
  realistic_solution: 'Under this cost model, first eliminate external flash traffic: fit weights and activations in internal SRAM through int8 quantization, pruning, tiling, and layer-by-layer arena planning. Next reduce SRAM movement by fusing convolution, bias, activation, and requantization where possible; reorder loops and choose layouts that maximize reuse of each input tile and weight block. Then reduce MAC count with channel pruning or smaller kernels only after memory spills are controlled, because one flash read can cost as much as about 100 MACs. Use CMSIS-NN fixed-point kernels and avoid float emulation, but treat compute optimization as secondary when profiling shows repeated SRAM or flash rereads dominate energy.'
  common_mistake: |
    **The Pitfall:** Optimizing purely for compute (MACs) and ignoring data movement.
    **The Rationale:** Candidates focus on FLOPs/MACs as the primary metric for performance, overlooking the energy physics where moving data from external flash costs 100x more than the compute itself.
    **The Consequence:** The model runs, but drains the battery incredibly fast due to excessive external flash fetches.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3x3 conv layer: 32 in channels, 32 out channels, 16x16 input feature map (all 8-bit).
    - Normalize one 8-bit MAC to 1 energy unit.
    - One 8-bit SRAM access costs about 10 MAC-energy units.
    - One external flash access costs about 100 MAC-energy units.

    **Calculations:**
    - MACs: 3 * 3 * 32 * 16 * 16 * 32 = 2,359,296 MACs.
    - Compute energy: 2.36M MAC-energy units.
    - Single-touch tensor traffic: Input 8 KB + Output 8 KB + Weights 9.2 KB = 25.2 KB, about 25,800 byte accesses.
    - If this traffic stays in SRAM: 25,800 * 10 = 258,000 MAC-energy units, about 11% of compute.
    - If the same traffic spills to external flash: 25,800 * 100 = 2,580,000 MAC-energy units, comparable to compute.
    - Repeated rereads multiply the memory term, so two flash passes already exceed the MAC energy.

    **Conclusion & Interpretation:**
    - **Result: prioritize eliminating external flash reads, then reduce SRAM traffic, then reduce MACs.** A single SRAM pass is smaller than compute in this example, but one external flash pass is already compute-sized and repeated flash rereads dominate the energy budget.
