title: The 3x Battery Drain Mystery
scenario: Your wearable gesture recognition device uses an RP2040 with a 150 mAh LiPo battery. Your power budget spreadsheet predicted 45 days of battery life at 1 inference per second. Field units die in 15 days. The model inference itself was benchmarked correctly.
question: Where is the 3x energy gap?
details:
  realistic_solution: 'The inference model was benchmarked correctly — the 3x gap comes from everything the power spreadsheet ignored: (1) always-on sensor current (IMU, ~0.2 mW), (2) LDO quiescent current (~0.3 mW), (3) GPIO leakage on unused/floating pins (~0.15 mW), and (4) voltage regulator efficiency losses (~15%). These ''invisible'' loads are always present, even during sleep, and collectively exceed the MCU''s own sleep current by 10-50x. The fix: measure whole-board current with a µA-resolution meter (e.g., Nordic PPK2), account for every component in the power budget, and configure all unused GPIOs as inputs with pull-downs.'
  common_mistake: |
    **The Pitfall:** Blaming the ML model or inference rate for the battery drain.
    **The Rationale:** Developers assume the primary software task (inference) dominates energy consumption, ignoring hardware-level parasitic loads and peripheral quiescent currents.
    **The Consequence:** Countless hours are wasted optimizing a model that is not the root cause of the power failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - Battery: 150 mAh at 3.7V = 555 mWh.
    - Predicted life: 45 days.
    - Actual life: 15 days.

    **Calculations:**
    - Predicted budget: 555 mWh / (45 * 24h) = 0.514 mW.
    - Actual budget: 555 mWh / (15 * 24h) = 1.54 mW.
    - Missing budget: ~1.03 mW.
    - Parasitic loads: IMU (0.2 mW) + LDO Iq (0.3 mW) + GPIO leakage (0.15 mW) + Regulator loss (0.17 mW) = 0.82 mW.

    **Conclusion & Interpretation:**
    - **Result: 1.54 mW (Energy-Bound)**. The missing "invisible" system loads (quiescent currents, leakage, and regulator inefficiencies) bridge the gap to the measured 1.54 mW reality.
  options:
  - 'The model is running more inferences per second than expected due to a firmware timer bug that doubles the sampling rate in cold temperatures.'
  - 'The power spreadsheet only counted MCU inference and sleep current (~0.51 mW). It missed always-on IMU (~0.2 mW), LDO quiescent current (~0.3 mW), GPIO leakage on floating pins (~0.15 mW), and regulator efficiency losses (~15%). These invisible loads exceed the MCU''s sleep current by 10-50x, explaining the 3x energy gap.'
  - 'The RP2040''s second core is drawing full active power even during sleep because the dual-core sleep mode was not properly configured in firmware.'
  - 'The LiPo battery''s actual capacity at typical operating temperatures (10-25C) is only 50% of the rated 150 mAh, explaining the 3x shorter battery life.'
  correct_index: 1
