title: The Sleep Mode Wi-Fi Disconnect
scenario: Your ESP32 battery-powered camera needs to send an image to the cloud when motion is detected. To save power, you put it into Light Sleep with Wi-Fi power save enabled. The Wi-Fi modem can remain associated when wake timing and power-save parameters are configured correctly. However, this device sleeps through too many beacon/DTIM windows, the AP drops the client, and on wake the send() call fails before a full reconnect and DHCP renewal that takes 3 seconds.
question: Why can an ESP32 in Light Sleep keep Wi-Fi powered yet still suffer a 3 s reconnect after motion?
details:
  realistic_solution: 'Light Sleep does not automatically imply a full Wi-Fi disconnect: the modem can remain associated and use Wi-Fi power-save behavior while the CPU is paused. The failure mode is configuration-dependent. If sleep timing misses the AP beacon/DTIM windows for too long, or the power-save/listen interval is not acceptable to the AP, the AP may drop or deauthenticate the client. The later 3 s cost is the reconnect path, possibly including DHCP renewal, not a direct consequence of a single missed DTIM. Fix by configuring modem-sleep/light-sleep wake timing and listen intervals to match the AP DTIM policy, or by using a static IP/session strategy when reconnects are unavoidable.'
  common_mistake: |
    **The Pitfall:** Assuming the router retains the connection indefinitely if the client's modem is powered.
    **The Rationale:** Developers overlook that Wi-Fi power-save still has timing rules: the station must wake often enough for the AP's beacon/DTIM and listen-interval expectations.
    **The Consequence:** A misconfigured sleep policy can let the AP drop the client, forcing an expensive reconnect path and sometimes a 3-second DHCP renewal upon waking.
  napkin_math: |
    **Assumptions & Constraints:**
    - DTIM Wake-up Cost: 2 ms at 50 mA.
    - Reconnect + DHCP Renewal Cost: 3000 ms at 300 mA.

    **Calculations:**
    - DTIM Wake Charge: 2 ms * 50 mA = 0.1 mAs.
    - Reconnect Charge: 3000 ms * 300 mA = 900 mAs.
    - Energy Ratio: 900 mAs / 0.1 mAs = 9,000x.

    **Conclusion & Interpretation:**
    - **Result: Energy-Bound (a misconfigured sleep policy that triggers reconnect can cost 9,000x more charge than a short scheduled DTIM wake).**
