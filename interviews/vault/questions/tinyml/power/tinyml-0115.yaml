title: The Sleep Mode Wi-Fi Disconnect
scenario: Your ESP32 battery-powered camera needs to send an image to the cloud when motion is detected. To save power, you put it into Light Sleep. The Wi-Fi modem stays powered on to maintain the router connection. However, when it wakes up to send an image, the send() call fails, and it has to do a full 3-second DHCP reconnection, draining the battery.
question: Why does ESP32 Light Sleep keep Wi-Fi powered yet still force a 3 s DHCP reconnect after motion?
details:
  realistic_solution: "In Light Sleep, the WiFi modem stays powered but the CPU is halted. The modem cannot respond to the router's DTIM beacons. After missing several consecutive DTIM beacons, the router deauthenticates the client. Fix: configure Light Sleep to wake the CPU briefly for each DTIM interval."
  common_mistake: |
    **The Pitfall:** Assuming the router retains the connection indefinitely if the client's modem is powered.
    **The Rationale:** Developers don't realize that Light Sleep halts the CPU, preventing it from acknowledging router DTIM broadcasts.
    **The Consequence:** The router deauthenticates the unresponsive device, forcing a massive 3-second DHCP energy penalty upon waking.
  napkin_math: |
    **Assumptions & Constraints:**
    - DTIM Wake-up Cost: 2 ms at 50 mA.
    - DHCP Reconnect Cost: 3000 ms at 300 mA.

    **Calculations:**
    - DTIM Wake Charge: 2 ms * 50 mA = 0.1 mAs.
    - DHCP Reconnect Charge: 3000 ms * 300 mA = 900 mAs.
    - Energy Ratio: 900 mAs / 0.1 mAs = 9,000x.

    **Conclusion & Interpretation:**
    - **Result: Energy-Bound (Failing to wake the CPU for DTIM costs 9,000x more energy).**
