title: ESP32-S3 Brownout During Concurrent Vision Inference and WiFi TX
scenario: You are deploying a wake-word and image classification pipeline on an ESP32-S3. The system mostly sleeps, but upon acoustic wake-up, it captures an image, runs a quantized CNN, and transmits the result over WiFi. In field testing, the device frequently resets with a 'Brownout detector was triggered' error precisely when the vision model finishes and transmission begins, despite the LiPo battery being over 80% charged.
question: Why does ESP32-S3 vision inference plus WiFi TX trigger brownout on an 80% charged LiPo battery?
details:
  realistic_solution: 'The root cause is a transient current spike exceeding the voltage regulator''s capacity or the battery''s instantaneous discharge capability. Running both Xtensa cores at 240 MHz with vector instructions active draws significant power. When the WiFi modem simultaneously fires a TX burst, the combined peak current causes a sudden voltage drop, triggering the hardware brownout reset. The solution is to implement power capping by temporally decoupling the peak loads: use DVFS to scale the CPU down to 80MHz or pause inference during WiFi TX bursts.'
  common_mistake: |
    **The Pitfall:** Assuming the model is causing a memory leak, out-of-memory error, or an RTOS watchdog timeout.
    **The Rationale:** Candidates fixate on software execution boundaries or model sizes, completely ignoring the physical power domain interactions.
    **The Consequence:** Software optimizations are pursued that do not resolve the underlying hardware power delivery failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - CPU @ 240MHz (both cores active + vector ALU): ~100mA.
    - WiFi TX burst (802.11b, max power): ~340mA.
    - PSRAM/Flash continuous access: ~40mA.
    - LiPo internal resistance: 0.5 ohms.
    - ESP32-S3 hardware brownout threshold: 3.1V.
    - Nominal 3.3V rail.

    **Calculations:**
    - Total instantaneous peak current: 100mA + 340mA + 40mA = 480mA.
    - V=IR drop: 0.48A * 0.5 ohms = 0.24V.
    - Supply voltage under load: 3.3V - 0.24V = 3.06V.

    **Conclusion & Interpretation:**
    - **Result: 3.06V (Power-Bound)**. The 3.06V supply voltage falls below the 3.1V ESP32-S3 hardware brownout threshold, causing the reset.
