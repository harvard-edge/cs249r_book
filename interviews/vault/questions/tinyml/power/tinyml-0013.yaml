title: The Wildlife Sensor's Average Power
scenario: A wildlife audio sensor uses a Cortex-M4 microcontroller to listen for a specific animal call. It runs a model for 1 second, consuming 10 mW (active power), and then enters a deep sleep state for 9 seconds, consuming 10 µW (sleep power).
question: How would you explain to your colleague how to calculate the average power consumption over this 10-second cycle?
details:
  realistic_solution: 'The correct way to calculate the average power is to compute a time-weighted average. You calculate the total energy consumed during one full cycle (active + sleep) and then divide by the total period of the cycle. This accounts for the significant energy savings from the long sleep interval.'
  common_mistake: |
    **The Pitfall:** Simple averaging of active and sleep states without calculating the time weights.
    **The Rationale:** When asked for an "average", developers quickly fall back on taking the mean of the two peak power states.
    **The Consequence:** A drastic overestimation of total power consumed, leading to the use of unnecessarily large, heavy, and expensive batteries in deployment.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active state: 10 mW for 1 second.
    - Sleep state: 10 µW (0.01 mW) for 9 seconds.
    - Cycle period: 10 seconds.

    **Calculations:**
    - Active energy: 10 mW × 1 s = 10 mJ.
    - Sleep energy: 0.01 mW × 9 s = 0.09 mJ.
    - Total energy per cycle: 10 + 0.09 = 10.09 mJ.
    - Average power: 10.09 mJ / 10 s = 1.009 mW.

    **Conclusion & Interpretation:**
    - **Result: 1.009 mW (Energy-Bound)**. The duty cycle reduces average power from a peak of 10 mW to ~1 mW, highlighting the necessity of time-weighted calculations.
  options:
  - '10.01 mW. A simple sum of the peak powers.'
  - '1.00 mW. Ignoring the sleep power contribution entirely.'
  - '5.005 mW. A simple unweighted average of the active and sleep power values.'
  - '1.009 mW. A time-weighted average of active and sleep power.'
  correct_index: 3
