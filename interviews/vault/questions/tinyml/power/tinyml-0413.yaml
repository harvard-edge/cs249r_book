title: The Brown-Out Inference Corruption
scenario: Your battery-powered air quality monitor runs a small gas classification model. When the battery drops below 2.5V, the device occasionally outputs a confident but wrong classification, reporting 'dangerous gas detected' when the air is clean. This triggers false alarms.
question: Why can a SAMD21 at 2.5 V produce confident false gas alarms instead of resetting on brownout?
details:
  realistic_solution: The SAMD21's BOD33 (Brown-Out Detector for 3.3V domain) has configurable thresholds. The default threshold is 1.77V — well below the 2.5V where problems start. The MCU is "within spec" at 2.5V (minimum VDD is 1.62V), so the BOD doesn't trigger. But "within spec" for the digital logic doesn't mean "within spec" for analog peripherals and accurate computation.
  common_mistake: |
    **The Pitfall:** Assuming the Brown-Out Detector (BOD) prevents all low-voltage errors.
    **The Rationale:** Engineers believe the default BOD threshold will catch voltage sags before computational errors occur, not realizing the MCU logic is "in spec" while the analog ADC peripheral fails.
    **The Consequence:** Spurious false alarms during the battery's end-of-life discharge cliff.
  napkin_math: |
    **Assumptions & Constraints:**
    - Danger Zone: < 2.5V (lasts ~5% of battery life).
    - Inferences per day: 1,440.
    - CPU Clock: 48 MHz.
    
    **Calculations:**
    - Inferences in Danger Zone: 5% of 1 year * 1,440/day = 26,280 inferences.
    - False Alarms: If 1% fail = 263 false alarms.
    - Fix (Software ADC Monitor): VDD/4 against 1.0V bandgap. At 2.8V, VDD/4 = 0.7V. ADC reading = (0.7 / 1.0) * 4096 = 2867.
    - Overhead: 1 ADC read = 13 µs.
    
    **Conclusion & Interpretation:**
    - **Result: Analog-Bound Failure (Compute-Bound)**. The digital logic remains in spec while the analog ADC fails, requiring a 13 µs software monitor to prevent false alarms.
