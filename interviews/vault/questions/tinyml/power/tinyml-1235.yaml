title: Corstone-300 NPU Power Bottleneck and DVFS Optimization
scenario: We are deploying a continuous vibration monitoring CNN on an ARM Cortex-M7 + Ethos-U55 subsystem. The system runs from a coin cell battery with a strict peak power cap of 50mW to prevent brownouts. During peak inference, the M7 and the NPU concurrently access the shared SRAM, causing the system to draw 70mW and reset.
question: How would you diagnose this power bottleneck and quantify a power optimization strategy to stay under the 50mW cap without missing the 50ms latency SLA?
details:
  realistic_solution: The optimal approach is asymmetric DVFS and execution phasing. Since the M7 and U55 share the 512 KB SRAM, concurrent active states cause memory contention and high power peaks. The solution is to drop the M7 frequency and voltage during the NPU inference phase, delegating the tensor execution heavily to the Ethos-U55 while minimizing the CPU's active power contribution.
  common_mistake: |
    **The Pitfall:** Lowering the clock frequency of the entire SoC.
    **The Rationale:** Candidates assume lower frequency universally solves power issues.
    **The Consequence:** Inference time increases linearly, energy-per-inference worsens due to static leakage, and concurrent memory access still causes peaks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak power cap: 50mW.
    - Baseline: M7 (40mW) + U55 (30mW) = 70mW.
    - P ∝ f * V^2.

    **Calculations:**
    - Scale M7 clock 480 MHz to 120 MHz (4x reduction). Allows 20% voltage drop.
    - New M7 power: 40mW * 0.25 * (0.8)^2 = 6.4mW.
    - New peak power: 6.4mW (M7) + 30mW (U55) = 36.4mW.

    **Conclusion & Interpretation:**
    - **Result: 36.4mW (Power-Bound)**. Asymmetric DVFS reduces peak power to 36.4mW, safely under the 50mW cap.
