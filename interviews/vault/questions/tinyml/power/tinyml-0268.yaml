title: The Active vs. Sleep Power Chasm
scenario: You're designing a battery-powered audio sensor that wakes on a keyword. To maximize its field life and minimize total cost of ownership (TCO), you must understand the power budget.
question: What is the approximate ratio of power consumption for a typical TinyML microcontroller in an active processing state versus a deep sleep state?
details:
  realistic_solution: The ratio is approximately 10,000 to 1. An active Cortex-M4 microcontroller might consume ~10-50 mW, while its deep sleep state can be as low as ~1-10 µW. This massive difference is the core engineering principle that enables multi-year battery life in TinyML devices, dominating their operational cost.
  common_mistake: |
    **The Pitfall:** Underestimating the power delta, assuming a mobile-phone-like idle vs. active ratio (10-100x).
    **The Rationale:** Engineers fail to realize that 'deep sleep' on an MCU is a fundamentally different physical state where almost all clocks and peripherals are powered off.
    **The Consequence:** Suboptimal duty-cycling architectures that fail to aggressively put the MCU to sleep, drastically cutting battery life.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active Processing Power: ~10 mW to 50 mW.
    - Deep Sleep Power: ~1 µW to 10 µW.

    **Calculations:**
    - Typical Active Power: 10 mW = 10,000 µW.
    - Typical Sleep Power: 1 µW.
    - Ratio: 10,000 µW / 1 µW = 10,000x.

    **Conclusion & Interpretation:**
    - **Result: Energy-Bound.** The power delta between active and deep sleep is ~10,000:1, making aggressive duty-cycling the absolute core principle of TinyML battery life.
  options:
  - ~100x
  - ~1,000x
  - ~10,000x
  - ~1,000,000x
  correct_index: 2
