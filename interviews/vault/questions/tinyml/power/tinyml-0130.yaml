title: The Energy Harvesting Wall
scenario: You are designing a structural health monitoring sensor powered by a small solar cell that provides an average of 0.5 mW indoors. The Cortex-M4 draws 50 mW active, and model inference takes 30 ms.
question: What is the maximum inference rate you can sustain indefinitely without a battery?
details:
  realistic_solution: Ensure the system buffers enough energy for the burst compute phase. Factoring in wake-up overhead and sleep current, calculate the exact energy required per inference and size a capacitor appropriately to prevent brownouts.
  common_mistake: |
    **The Pitfall:** Calculating a simple duty cycle without accounting for burst energy buffering and wake-up overhead.
    **The Rationale:** Candidates divide average power by active power to get a naive duty cycle, forgetting that MCU workloads are highly bursty and waking the processor consumes significant energy.
    **The Consequence:** The system experiences catastrophic brownouts during the 50 mW inference bursts because the solar cell cannot provide instantaneous peak power.
  napkin_math: |
    **Assumptions & Constraints:**
    - Harvested power: 0.5 mW (0.5 mJ/s). Sleep power: 10 uW (0.01 mW).
    - Inference: 30 ms @ 50 mW. Wake-up overhead: 5 ms @ 50 mW.

    **Calculations:**
    - Usable power: 0.5 mW - 0.01 mW = 0.49 mJ/s.
    - Energy per inference burst: (30 ms + 5 ms) * 50 mW = 1.75 mJ.
    - Max sustainable rate: 0.49 mJ/s / 1.75 mJ/inference = 0.28 inferences/sec.

    **Conclusion & Interpretation:**
    - **Result: ~0.28 inferences/sec (1 every 3.5s) (Energy-Bound)**. The system is strictly energy-harvesting-bound and requires a localized capacitor sized to deliver a 1.75 mJ burst to prevent voltage collapse.
