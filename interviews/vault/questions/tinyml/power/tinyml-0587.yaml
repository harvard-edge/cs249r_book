title: Duty Cycle for Energy Harvesting Budget
scenario: You're designing a vibration-powered predictive maintenance sensor on a Cortex-M4F. The piezoelectric harvester generates 200 µW average from machine vibration. The inference model takes 12ms at 168 MHz. You also need 5ms for sensor sampling and 20ms for BLE transmission.
question: How would you calculate the maximum inference rate (inferences per minute) the energy budget supports?
details:
  realistic_solution: 'Energy per inference cycle: inference (30mW * 12ms = 360uJ) + sensor (2mW * 5ms = 10uJ) + BLE (40mW * 20ms = 800uJ) = 1,170uJ. Harvester: 200uW * 70% efficiency = 140uW effective. Period: 1,170uJ / 140uW = 8.36s. Max rate: ~7 inferences/min. BLE dominates at 68% of energy. Optimization: batch 10 results per BLE packet, amortizing BLE cost to 80uJ/inference. New total: 450uJ, period: 3.2s, rate: ~18/min (2.5x improvement). The inference engine is cheap (360uJ); the radio is the dominant energy consumer in most TinyML systems.'
  common_mistake: |
    **The Pitfall:** Calculating duty cycle using only inference power.
    **The Rationale:** Candidates focus solely on the ML compute, ignoring sensor sampling, BLE transmission, and energy storage efficiency.
    **The Consequence:** The calculated duty cycle exceeds the actual energy budget, leading to complete system power failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - MCU active power: 30 mW.
    - Sensor power: 2 mW.
    - BLE TX power: 40 mW.
    - Inference time: 12ms.
    - Sensor sampling time: 5ms.
    - BLE TX time: 20ms.
    - Harvester average power: 200 µW.
    - Harvester efficiency: 70%.

    **Calculations:**
    - Energy per cycle: (30mW * 12ms) + (2mW * 5ms) + (40mW * 20ms) = 360µJ + 10µJ + 800µJ = 1,170µJ.
    - Effective harvest power: 200µW * 0.70 = 140µW.
    - Period: 1,170µJ / 140µW = 8.36s (~7 inferences/min).
    - Optimized (batch 10): BLE cost per inference = 80µJ. New energy = 360 + 10 + 80 = 450µJ.
    - New period: 450µJ / 140µW = 3.21s.

    **Conclusion & Interpretation:**
    - **Result: ~18.7/min (Energy-Bound)**. Batching improves the max rate from ~7/min to ~18.7/min by amortizing the dominant BLE radio energy.
  options:
  - 'Maximum rate: 200 uW / 30 mW = 0.67% duty cycle. At 12ms per inference: 0.0067 x 60,000ms/min / 12ms = 33 inferences/min.'
  - 'Energy per cycle: inference (360 uJ) + sensor (10 uJ) + BLE TX (800 uJ) = 1,170 uJ. Effective harvest: 200 uW x 70% = 140 uW. Period: 1,170/140 = 8.36s. Rate: ~7/min. BLE dominates (68%). Optimization: batch 10 results per BLE packet, amortizing BLE to 80 uJ/inference. New rate: ~18/min (2.5x improvement).'
  - 'The vibration harvester cannot sustain any inferences because 200 uW is insufficient to power the Cortex-M4F''s minimum active current of 30 mW.'
  - 'Maximum rate: 60 inferences/min. The harvester generates 200 uW continuously, and inference costs only 360 uJ, so the energy budget is limited solely by the 12ms inference time.'
  correct_index: 1
