title: 'The Sleep Mode Wake-Up Cost'
scenario: 'Your always-on environmental sound classifier runs on an nRF52840 (Cortex-M4F, 64 MHz, 256 KB SRAM). Between inferences (every 2 seconds), you put the MCU in System OFF mode (0.3 µA). But your measured average current is ~300 µA — 1000× higher than your System OFF prediction. The inference itself only takes 25 ms at 3 mA.'
question: 'Why does an nRF52840 sound classifier average 300 µA when System OFF is only 0.3 µA and inference is 25 ms?'
details:
  realistic_solution: 'The hidden power drain is the wake-up sequence, not sleep or inference. System OFF draws 0.3 uA, but waking requires: (1) oscillator startup (HFXO): 1.5ms at 5 mA = 22.5 uJ. (2) RAM restoration and register re-init: 0.5ms at 3 mA = 4.5 uJ. (3) PDM microphone startup and stabilization: 50ms at 10 mA = 1,500 uJ — this dominates. (4) Inference: 25ms at 3 mA = 225 uJ. Total per cycle: 1,752 uJ. Fix: use a hardware voice activity detector (always-on comparator at 2 uA) that triggers wake only on detected audio.'
  common_mistake: |
    **The Pitfall:** Assuming the MCU isn''t actually entering deep sleep.
    **The Rationale:** Engineers focus purely on the sleep state and active compute state, completely forgetting the transitional power costs of peripheral startup (like the PDM microphone).
    **The Consequence:** The system burns 1000x more power than planned due to repeated startup transients, killing battery life.
  napkin_math: |
    **Assumptions & Constraints:**
    - 230 mAh CR2032 at 3V.
    - Inference every 2s. Measured average: 292 µA.
    - Theoretical MCU-only average: 45 µA.
    - Mic startup is 50ms at 10mA.

    **Calculations:**
    - Battery life at 292 µA: 230 mAh / 0.292 mA = 787 hours = ~32 days.
    - Battery life with HW VAD (205 µA): 230 mAh / 0.205 mA = 1,122 hours = 47 days.
    - Battery life theoretical (45 µA): 230 mAh / 0.045 mA = 5,111 hours = 213 days.

    **Conclusion & Interpretation:**
    - **Result: 86% cycle energy (Power-Bound)**. The microphone startup phase dominates the budget.
