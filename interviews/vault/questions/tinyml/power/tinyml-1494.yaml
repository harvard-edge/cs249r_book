title: Duty Cycling Strategy for Battery Life on Cortex-M4 Wearable
scenario: A wearable device uses a microcontroller at 168MHz for fall detection. The accelerometer samples
  at 100Hz. Each inference takes 10ms and consumes 0.5mJ. The device has a 300mAh battery at 3.7V. Without
  duty cycling, the device runs inference at 10Hz.
question: How would you calculate battery life and propose a duty cycling strategy for 7-day operation?
details:
  realistic_solution: 'Current inference rate: 10 inferences/sec. Energy per inference: 0.5mJ. Inference
    power: 10 * 0.5mJ/s = 5mW. Sleep power: ~0.5mW. Accelerometer active: ~0.1mA * 3.7V = 0.37mW. Total
    average power: 5 + 0.5 + 0.37 = 5.87mW. Battery: 300mAh * 3.7V = 1.11Wh = 3996J. Target: 7 days =
    168 hours. Required maximum power: 3996J / (168 * 3600) = 6.6mW. The current system draws 5.87mW,
    yielding roughly 7.8 days, which technically meets the target. However, to provide a solid safety
    margin, reducing the inference duty cycle to 1Hz saves 4.5mW. New power: 1.37mW -> ~33 days of battery
    life.'
  common_mistake: '**The Pitfall:** Calculating only inference energy without baseline peripheral power.

    **The Rationale:** Candidates ignore the sleep-mode wake-up overhead and the constant sensor/radio
    power draw that dominate over inference costs.

    **The Consequence:** Estimated battery life predictions are wildly inaccurate compared to real hardware.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Battery Energy: 300mAh * 3.7V = 1.11Wh = 3996 Joules.

    - 10Hz Baseline Power: Inference (5mW) + Sleep (0.5mW) + Sensor (0.37mW) = 5.87mW.

    - Target: 7 days max power budget = 6.6mW.


    **Calculations:**

    - Baseline Life = 3996J / 5.87mW = 680,749s (189 hours = 7.8 days).

    - Duty Cycle to 1Hz saves 4.5mW inference power -> New total ~ 1.37mW.

    - 1Hz Life = 3996J / 1.37mW = 2,916,788s (810 hours = 33.7 days).


    **Conclusion & Interpretation:**

    - **Result: 33.7 days (Power-Bound)**. The baseline system barely meets the 7-day target (7.8 days).
    Lowering the duty cycle to 1Hz drastically extends the life to 33.7 days, providing a robust power
    margin.

    '
