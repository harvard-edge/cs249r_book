title: 'TinyML Smartwatch Battery Budget'
scenario: 'A Cortex-M4 smartwatch wakes up for 2ms every 100ms interval to poll a low-power accelerometer. During the active 2ms, it draws 5mA. During the 98ms sleep, it draws 10uA (0.01mA).'
question: 'What is the expected theoretical continuous battery life of a smartwatch drawing 5mA for 2ms and 10uA for 98ms every 100ms cycle on a 200mAh battery?'
visual:
  kind: svg
  path: tinyml-1574.svg
  alt: 'A timeline highlighting very brief but large 5mA current spikes interspersed with long, near-zero sleep periods.'
  caption: 'Current Draw Over Time'
details:
  realistic_solution: 'First compute the average current draw over the 100ms cycle: ((2ms * 5mA) + (98ms * 0.01mA)) / 100ms = (10 + 0.98) / 100 = 0.1098 mA. Given a 200mAh capacity, the expected continuous battery life is 200mAh / 0.1098mA = 1821 hours (roughly 75 days).'
  common_mistake: |
    **The Pitfall:** Failing to convert microamps to milliamps correctly.
    **The Rationale:** A simple units error (mixing µA and mA) during the weighted average calculation.
    **The Consequence:** The average current draw is wildly skewed, resulting in vastly incorrect battery life estimations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active phase: 2 ms at 5 mA
    - Sleep phase: 98 ms at 0.01 mA (10 µA)
    - Battery capacity: 200 mAh

    **Calculations:**
    - Active energy per cycle = 2 ms * 5 mA = 10 mA-ms
    - Sleep energy per cycle = 98 ms * 0.01 mA = 0.98 mA-ms
    - Average current = (10 + 0.98) / 100 ms = 0.1098 mA
    - Battery Life = 200 mAh / 0.1098 mA = 1821 hours

    **Conclusion & Interpretation:**
    - **Result: 1821 hours (Power-Bound)**. The expected continuous battery life is roughly 1821 hours (~75 days).
