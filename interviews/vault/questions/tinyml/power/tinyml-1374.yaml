title: Optimizing TinyML Power Budget on ESP32-S3 for Battery-Powered Edge Devices
scenario: You are tasked with designing an embedded ML application for a battery-powered device using an ESP32-S3. The application requires a TinyML model to perform real-time object detection at 10 FPS.
question: How would you approach the power budgeting of this system, considering the processor's DVFS P-states, memory access energy (SRAM vs. PSRAM), and TDP limitations?
details:
  realistic_solution: Implement a hierarchical power management strategy. Profile inference latency and power at various ESP32-S3 DVFS P-states to select the lowest stable frequency meeting the 10 FPS requirement. Utilize ESP-IDF APIs (`esp_pm_configure`) to dynamically switch P-states and transition to sleep modes between inferences. Optimize tensor placement to keep critical parameters in internal SRAM, minimizing energy-intensive Octal SPI accesses to PSRAM. Conduct real-world energy-per-inference measurements to validate CMOS power optimizations ($P = C \times V^2 \times f$).
  common_mistake: |
    **The Pitfall:** Relying solely on average power figures across the entire application lifecycle.
    **The Rationale:** Candidates often underestimate the power cost of frequent external PSRAM accesses, which can significantly outweigh CPU computational power in TinyML workloads.
    **The Consequence:** Drastically reduced battery life and potential thermal throttling due to inefficient memory I/O and suboptimal DVFS utilization.
  napkin_math: |
    **Assumptions & Constraints:**
    - ESP32-S3 active inference power: 80 mW while running each inference.
    - Deep sleep power between frames: 0.005 mW.
    - Target frame rate: 10 FPS.
    - One frame period: 0.1 s, with 10% active inference time and 90% sleep/idle time.
    - Battery: 5 Watt-hours (e.g., 1350 mAh, 3.7V LiPo).

    **Calculations:**
    - Active time per frame = 0.1 s * 10% = 0.01 s.
    - Sleep time per frame = 0.1 s * 90% = 0.09 s.
    - Active energy per frame = 0.080 W * 0.01 s = 0.0008 J (0.8 mJ).
    - Sleep energy per frame = 0.000005 W * 0.09 s = 0.00000045 J (0.00045 mJ).
    - Energy per inference period = 0.80045 mJ.
    - Average power at 10 FPS = 0.80045 mJ * 10/s = 8.0045 mW.
    - Battery life = 5 Wh / 0.0080045 W ≈ 625 hours (~26 days).

    **Conclusion & Interpretation:**
    - **Result: ~0.8 mJ/inference and ~26 days battery life (Duty-Cycle-Bound Power)**. The active phase dominates each frame's energy even though the wall-clock average is reduced by sleeping 90% of the time, so DVFS and SRAM-first tensor placement should be evaluated by measured energy per inference period.
