title: Optimizing TinyML Power Budget on ESP32-S3 for Battery-Powered Edge Devices
scenario: You are tasked with designing an embedded ML application for a battery-powered device using an ESP32-S3. The application requires a TinyML model to perform real-time object detection at 10 FPS.
question: How would you approach the power budgeting of this system, considering the processor's DVFS P-states, memory access energy (SRAM vs. PSRAM), and TDP limitations?
details:
  realistic_solution: Implement a hierarchical power management strategy. Profile inference latency and power at available ESP32-S3 clock and sleep configurations to select the lowest stable setting meeting the 10 FPS requirement. Use ESP-IDF power-management and sleep APIs where they are enabled in the application, and transition to light sleep or another measured low-power state between inferences when wake latency permits. Optimize tensor placement to keep hot activations and kernels in internal SRAM, minimizing external PSRAM traffic if the board includes PSRAM. Validate the budget with measured energy per inference period rather than relying only on nominal CMOS scaling.
  common_mistake: |
    **The Pitfall:** Relying solely on average power figures across the entire application lifecycle.
    **The Rationale:** Candidates often underestimate the power cost of frequent external PSRAM accesses, which can significantly outweigh CPU computational power in TinyML workloads.
    **The Consequence:** Drastically reduced battery life and potential thermal throttling due to inefficient memory I/O and suboptimal DVFS utilization.
  napkin_math: |
    **Assumptions & Constraints:**
    - ESP32-S3 active inference power: 80 mW while running each inference.
    - Lower P-state estimate: 55 mW active power but 16 ms inference time.
    - Deep sleep power between frames: 0.005 mW.
    - Target frame rate: 10 FPS.
    - One frame period: 0.1 s, with 10% active inference time and 90% sleep/idle time.
    - Battery: 5 Watt-hours (e.g., 1350 mAh, 3.7V LiPo).

    **Calculations:**
    - Active time per frame = 0.1 s * 10% = 0.01 s.
    - Sleep time per frame = 0.1 s * 90% = 0.09 s.
    - Active energy per frame = 0.080 W * 0.01 s = 0.0008 J (0.8 mJ).
    - Sleep energy per frame = 0.000005 W * 0.09 s = 0.00000045 J (0.00045 mJ).
    - Energy per inference period = 0.00080045 J = 0.80045 mJ.
    - Average power = 0.00080045 J / 0.1 s = 0.0080045 W = 8.0045 mW.
    - Equivalently, 0.80045 mJ/frame * 10 frames/s = 8.0045 mJ/s = 8.0045 mW.
    - Lower P-state active energy per frame = 0.055 W * 0.016 s = 0.00088 J (0.88 mJ), so it saves peak power but not energy for this workload.
    - Battery life = 5 Wh / 0.0080045 W ≈ 625 hours (~26 days).

    **Conclusion & Interpretation:**
    - **Result: ~0.8 mJ/inference and ~26 days battery life (Duty-Cycle-Bound Power)**. The active phase dominates each frame's energy even though the wall-clock average is reduced by sleeping 90% of the time; choose the P-state with the lowest measured joules per frame, and keep hot tensors in SRAM to avoid PSRAM energy.
