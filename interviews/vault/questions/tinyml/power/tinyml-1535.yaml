title: 'TinyML Energy Per Inference'
scenario: 'An MCU inference requires 2 million operations. The optimized kernel consumes 25 pJ/op, while an unoptimized kernel consumes 90 pJ/op.'
question: 'How much energy does a 2M-operation TinyML inference consume at 25 pJ/op versus 90 pJ/op?'
details:
  realistic_solution: 'Optimized inference consumes 50 µJ. Unoptimized inference consumes 180 µJ. The optimized kernel saves 130 µJ per inference, a 3.6x reduction. At frequent duty cycles this materially changes battery life.'
  common_mistake: 'Treating operation count as a latency metric only and ignoring energy per operation.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Operations: 2,000,000.
    - Optimized: 25 pJ/op. Unoptimized: 90 pJ/op.

    **Calculations:**
    - Optimized inference: 2,000,000 * 25 pJ = 50 uJ.
    - Unoptimized inference: 2,000,000 * 90 pJ = 180 uJ.
    - Energy Savings: 180 uJ - 50 uJ = 130 uJ per inference.

    **Conclusion & Interpretation:**
    - **Result: 130 uJ Savings (Energy Bound)**. The optimized kernel yields a 3.6x energy reduction, directly translating to proportionally longer battery life during inference-heavy duty cycles.
