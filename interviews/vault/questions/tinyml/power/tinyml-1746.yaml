title: Multi-Tiered Wake Word Power Pipeline
scenario: A battery-powered acoustic sensor using a Cortex-M4 (80 MHz) must detect rare audio anomalies over a year. The MCU supports a 10 uA sleep state, a 2 mA low-power listening state, and a 15 mA active state for full neural network inference.
question: Design a duty-cycling state machine and cascaded filtering strategy that ensures sub-500ms detection latency while minimizing total daily energy consumption.
details:
  realistic_solution: 'The optimal design uses an analog threshold interrupt (10 uA) to wake the MCU into a low-power listening state. If a simple zero-crossing or spectral energy heuristic passes (2 mA for 50ms), the MCU enters full active mode (15 mA for 200ms) to run the CMSIS-NN classifier. This cascades the true positive and false positive rates, keeping average current near 20 uA while meeting the 500ms SLA.'
  common_mistake: |
    **The Pitfall:** Running the full neural network periodically without cascading an ultra-low-power analog hardware trigger.
    **The Rationale:** Software engineers are used to handling all logic strictly in software, missing the power savings available via analog comparators.
    **The Consequence:** The device drains its battery in weeks rather than a year, because activating the 15 mA core continuously to check for rare events dominates the energy budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sleep state: 10 µA.
    - Low-power listening (2 mA) hit rate: 1%.
    - Full inference (15 mA) hit rate: 0.1%.

    **Calculations:**
    - Listening average current: 0.01 × 2,000 µA = 20 µA.
    - Inference average current: 0.001 × 15,000 µA = 15 µA.
    - Total average current: 10 µA + 20 µA + 15 µA = 45 µA.

    **Conclusion & Interpretation:**
    - **Result: ~45 µA (Energy-Bound)**. Cascading logic preserves battery life by keeping average current at a highly sustainable ~45 µA, dominated mostly by the sleep and listening states.
