title: Sleep and Active Power Averaging
scenario: A vibration sensor using a Cortex-M4 operates on a coin cell battery. It draws 2 mA during its active state (inference) and 5 uA in its deep sleep state. The device is active for exactly 100 ms every 2 seconds.
question: Calculate the average current draw of this system across a complete operating cycle.
details:
  realistic_solution: 'The duty cycle is 100 ms active / 2000 ms total = 0.05 (5%). The sleep cycle is 95%. The average current is the weighted sum of both states: (0.05 * 2 mA) + (0.95 * 0.005 mA) = 0.1 mA + 0.00475 mA = 0.10475 mA, or approximately 104.75 uA.'
  common_mistake: |
    **The Pitfall:** Failing to align units before summing the weighted currents.
    **The Rationale:** Candidates calculate the duty cycle correctly but add mA and µA directly without conversion.
    **The Consequence:** The calculation produces mathematically nonsensical values (e.g., 2.05 mA), leading to catastrophic mis-sizing of the battery capacity.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Power States: 2 mA (Active), 5 µA (Deep Sleep).
       - Cycle: 100 ms active every 2000 ms (2 seconds).
    2. **Calculations:**
       - Duty Cycle (Active): 100 ms / 2000 ms = 0.05.
       - Duty Cycle (Sleep): 1900 ms / 2000 ms = 0.95.
       - Active Current Contribution: 0.05 × 2000 µA = 100 µA.
       - Sleep Current Contribution: 0.95 × 5 µA = 4.75 µA.
       - Average Current: 100 µA + 4.75 µA = 104.75 µA.
    3. **Conclusion & Interpretation:**
       - **Result: 104.75 µA average current draw.** **Result: Power-Bound.**
