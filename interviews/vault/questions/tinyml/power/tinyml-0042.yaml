title: 'The Duty-Cycled Bird Watcher'
scenario: 'You''re designing a remote bird-song detector using a Cortex-M4 based microcontroller. It needs to operate for months on a small battery. To save energy, you use a duty cycle: the device listens for 1 second (active) and then enters deep sleep for the next 9 seconds. Based on the *Numbers Every ML Systems Engineer Should Know*, a Cortex-M4 consumes about 10 mW when active and 10 µW in deep sleep.'
question: 'What average power does a Cortex-M4 bird-song detector draw with 1 s active at 10 mW and 9 s sleep at 10 uW?'
details:
  realistic_solution: 'The correct way to calculate average power for a duty-cycled system is to find the total energy consumed over one full cycle (active energy + sleep energy) and then divide by the total cycle duration. The active phase dominates the energy budget per second, but the long sleep phase dramatically reduces the *average* power consumption over time, which is the critical metric for battery life estimation.'
  common_mistake: 'Engineers often calculate the average power by simply taking the arithmetic mean of the active and sleep power values, completely ignoring the *time* spent in each state. This leads to a massive overestimation of the power budget because the device spends the vast majority of its time (90% in this case) in the ultra-low-power sleep state.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Active Power: 10 mW for 1 s.
    - Sleep Power: 10 µW (0.01 mW) for 9 s.
    - Total Period: 10 s.

    **Calculations:**
    - Active Energy = 10 mW * 1 s = 10 mJ.
    - Sleep Energy = 0.01 mW * 9 s = 0.09 mJ.
    - Total Energy = 10.09 mJ.
    - Average Power = 10.09 mJ / 10 s ≈ 1.009 mW.

    **Conclusion & Interpretation:**
    - **Result: ~1.0 mW (Power-Bound)**. The 10% duty cycle reduces average power by ~10x compared to always-on, dominating the energy profile over the tiny sleep current.
  options:
  - "5.005 mW"
  - "1.0 mW"
  - "1.009 mW"
  - "10.01 mW"
