title: Continuous KWS Power Specification on Corstone-300
scenario: You are tasked with designing the system specification for a continuous keyword spotting application targeting an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform. The system is powered by a small battery and has a strict average power cap of 1.5 mW. The Cortex-M7 can operate up to 480 MHz, and the Ethos-U55 performs up to 512 MACs/cycle, both sharing a 512 KB SRAM.
question: How should a Corstone-300 continuous KWS system choose DVFS, duty cycling, and SRAM placement to stay below a 1.5 mW cap while meeting a 100 ms inference latency target?
details:
  realistic_solution: The system should keep the KWS model weights, hot tensors, and audio ring buffers in the shared 512 KB SRAM to avoid external-memory energy. Use the lowest Cortex-M7 voltage/frequency that can reliably fill buffers, orchestrate the Ethos-U55, and meet the 100 ms window deadline; run the U55 only for the short MAC burst for each window, then return the M7, U55, and unused SRAM banks to low-power states. The trade-off is to lower M7 DVFS until the active window starts approaching the latency budget, then rely on duty cycling rather than running either block continuously.
  common_mistake: |
    **The Pitfall:** Assuming maximum clock frequency (480 MHz) always minimizes energy via 'race-to-sleep'.
    **The Rationale:** Candidates forget that dynamic power scales non-linearly with voltage and frequency ($P \propto V^2 f$), and shared SRAM accesses can cause stalling.
    **The Consequence:** Specifying an excessively high clock speed that violates the strict 1.5 mW average power cap.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: < 1.5 mW average power, 100 ms latency limit.
    - Continuous KWS evaluates one 100 ms audio window every 100 ms, so inference rate = 10 windows/s.
    - Example low-DVFS policy: M7 orchestration at 120 MHz for 0.5 ms at 6 mW; U55 MAC burst for 0.16 ms at 10 mW; sleep/leakage between windows is 100 µW.

    **Calculations:**
    - Active time per 100 ms window: 0.5 ms + 0.16 ms = 0.66 ms, leaving 99.34 ms for sleep.
    - M7 energy per window: 6 mW * 0.5 ms = 3.0 µJ.
    - U55 energy per window: 10 mW * 0.16 ms = 1.6 µJ.
    - Average active power: 10 windows/s * (3.0 µJ + 1.6 µJ) = 46 µW.
    - Total average power including leakage: 46 µW + 100 µW = 146 µW.

    **Conclusion & Interpretation:**
    - **Result: About 146 µW average power (Power-Bound).** SRAM placement plus low-DVFS orchestration and U55 duty cycling meets the 100 ms window while staying below the 1.5 mW cap.
