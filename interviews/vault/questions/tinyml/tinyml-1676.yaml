title: Microcontroller Cycles and SRAM for Inference Cost
scenario: An anomaly detection model consisting of a 3-layer MLP with 1000 total INT8
  parameters runs on a Cortex-M4 operating at 80 MHz with 128KB SRAM.
question: Calculate the total instruction cycles required for a single forward pass,
  specifying the SRAM footprint required for intermediate activations.
details:
  realistic_solution: Assuming 1 MAC equals 1 cycle with DSP instructions, 1000 parameters
    mean roughly 1000 MACs. Including memory load/store overhead and activation functions,
    expect around 2000-3000 cycles. Memory for activations is strictly bounded by
    the widest layer, likely requiring less than 1KB.
  common_mistake: Forgetting to account for the load/store cycle overhead, incorrectly
    assuming 1 MAC always equals exactly 1 clock cycle end-to-end.
  napkin_math: 1000 MACs * 2 cycles/MAC / 80,000,000 Hz = 25 microseconds inference
    time.
