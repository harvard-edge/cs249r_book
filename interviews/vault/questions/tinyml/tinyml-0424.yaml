title: The Silent Factory Floor
scenario: You are a TinyML engineer for a company that makes audio-based predictive maintenance sensors.
  Your keyword-spotting model, designed to detect 'machine_fault', works perfectly in the lab. The model
  is fully INT8 quantized and deployed on a Cortex-M4 MCU. When deployed to a factory floor, the device
  powers on, but it *never* triggers, even when faults occur. Your telemetry shows that the audio input
  from the factory floor has a persistent, high-frequency hum at 80dB, which wasn't in your original clean
  training data. A quick analysis shows lab-data activations for your key convolutional layer peak at
  a value of 75. The factory-floor audio signal, after the same preprocessing, would add a signal component
  with an amplitude of 60. Given that INT8's range is [-128, 127], what is the most likely cause of the
  model's failure?
details:
  realistic_solution: The model is failing due to activation overflow (also known as saturation). The
    original calibration dataset used for quantization did not include the loud environmental noise from
    the factory. The activations from the model's layers, when presented with this new, high-energy audio,
    are exceeding the maximum value representable by an 8-bit integer (+127). When this happens, the values
    'clip' or 'saturate' at 127, destroying the variance and information in the feature maps. The model's
    subsequent layers receive a flat, uninformative signal, causing the classifier to fail. The fix is
    to perform recalibration using a dataset that is representative of the deployment environment, including
    the factory noise.
  common_mistake: 'Engineers often blame the hardware (e.g., ''the microphone is clipping'') or ML fundamentals
    (''the model overfit''). While plausible, these ignore the most direct cause: the interaction between
    a new data distribution and the brittle nature of low-precision integer arithmetic. They fail to diagnose
    the numerical overflow.'
  napkin_math: 1. **Establish INT8 Range:** An 8-bit signed integer can represent values from $-2^{(8-1)}$
    to $2^{(8-1)} - 1$, which is [-128, 127].
  options:
  - The model has overfit to the clean lab data and cannot generalize to the noisy factory environment.
  - The Cortex-M4's ~336 MFLOPS is insufficient to process the audio in real-time, causing missed events.
  - The high-amplitude factory noise is causing activation values to exceed the INT8 maximum of +127,
    leading to saturation and information loss.
  - The device's microphone is physically clipping the loud audio signal before it even reaches the model.
  correct_index: 2
