title: The Silent Factory Floor
scenario: You are a TinyML engineer for a company that makes audio-based predictive maintenance sensors. Your INT8 quantized keyword-spotting model works perfectly in the lab but never triggers on the factory floor. Telemetry shows a persistent 80dB hum not present in training. Lab-data activations for a key layer peak at 75, but the factory noise adds a signal component with an amplitude of 60.
question: Given INT8's range of [-128, 127], what is the most likely cause of the model's failure in the noisy factory?
details:
  realistic_solution: The model is failing due to activation overflow (also known as saturation). The original calibration dataset used for quantization did not include the loud environmental noise from the factory. The activations from the model's layers, when presented with this new, high-energy audio, are exceeding the maximum value representable by an 8-bit integer (+127). When this happens, the values 'clip' or 'saturate' at 127, destroying the variance and information in the feature maps. The fix is recalibration.
  common_mistake: |
    **The Pitfall:** Blaming the hardware microphone or ML overfitting.
    **The Rationale:** Engineers ignore the brittle nature of low-precision integer arithmetic when encountering new data distributions.
    **The Consequence:** They fail to diagnose numerical overflow and waste time tuning model architecture instead of recalibrating.
  napkin_math: |
    * Identify INT8 bounds: Signed 8-bit integer range is [-128, 127].
    * Lab activation peak: 75. Factory noise addition: +60.
    * Combined activation: 75 + 60 = 135.
    * Clamping effect: 135 > 127, so it saturates at 127.
    * **Result: Saturation destroys feature map variance, causing the model to fail.**
  options:
  - The model has overfit to the clean lab data and cannot generalize to the noisy factory environment.
  - The Cortex-M4's ~336 MFLOPS is insufficient to process the audio in real-time, causing missed events.
  - The high-amplitude factory noise is causing activation values to exceed the INT8 maximum of +127, leading to saturation and information loss.
  - The device's microphone is physically clipping the loud audio signal before it even reaches the model.
  correct_index: 2
