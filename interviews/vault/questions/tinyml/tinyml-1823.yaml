title: Wi-Fi 6 CSMA Gossip Protocol Congestion
scenario: To optimize federated learning across 100 autonomous robots over congested
  Wi-Fi 6, you propose a Gossip-based asynchronous AllReduce. Each robot randomly
  pairs with 1 neighbor per 100ms tick to exchange weights. The network handles a
  maximum of 25 concurrent non-colliding pairs (50 active robots).
question: Evaluate the total expected time to reach 99% weight propagation across
  the network, accounting for the CSMA-enforced concurrency limit.
details:
  realistic_solution: Standard epidemic gossip propagation takes approximately ln(N)
    rounds to infect most nodes; for N=100, this is ~4.6 to 5 rounds. However, because
    the network capacity limits active nodes to 50 out of 100 per tick, there is a
    mandatory 50% communication stall rate. An idealized 'round' where every node
    updates once now spans exactly 2 ticks. Therefore, the 5 required rounds take
    10 ticks. Total expected time is 10 ticks * 100ms = 1000ms (1.0 second).
  common_mistake: Utilizing unconstrained Gossip math (5 ticks) or standard Ring AllReduce
    math without accounting for the shared medium capacity limit that creates a 50%
    networking pipeline stall.
  napkin_math: Rounds ≈ ln(100) ≈ 5; Ticks/Round = 100 / (25 * 2) = 2; Time = 5 *
    2 * 100ms = 1000ms
