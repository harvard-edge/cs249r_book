title: The Ghost Drift
scenario: You are building a multimodal model that fuses Audio and Accelerometer data. Both sensors are
  connected to the same microcontroller. In long recordings, you notice that the audio and motion events
  slowly drift apart until they are seconds out of sync. Based on the clock diagram, why is a single crystal
  failing to keep them aligned?
details:
  realistic_solution: You have **Clock Divider Rounding Error**. Microcontrollers use integer dividers.
    If a peripheral requires a 62.5 divider to hit a target frequency, but the hardware can only use 62
    or 63, the sensor will run slightly too fast or too slow. Over time, these sub-millisecond errors
    accumulate into seconds of drift. The fix is to use a **Shared PPS (Pulse Per Second)** signal to
    hardware-timestamp every buffer, allowing the ML model to realign the data in software.
  common_mistake: '"The sensors use different crystals." They actually use the same crystal as a reference,
    but the math used to divide that clock is the problem.'
  napkin_math: A 0.8ms error per 100ms window is a 0.8% drift. After 10 minutes (600 seconds), the misalignment
    is $600 \times 0.008 = 4.8 \text{ seconds}$.
