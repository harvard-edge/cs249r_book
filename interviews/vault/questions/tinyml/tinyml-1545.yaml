title: Hailo-8 PCIe Frame Ingestion
scenario: A Hailo-8 edge accelerator processes 4 camera streams simultaneously, but its utilization is dropping because the host PCIe Gen 3 x2 link is saturated by uncompressed 4K video frames at 30 FPS.
question: How can you optimize the host-to-accelerator pipeline to prevent PCIe bottlenecking, computing raw bandwidth before and after INT8 cast?
visual:
  kind: svg
  path: tinyml-1545.svg
  alt: Diagram showing 4 camera streams merging into a host CPU, crossing a PCIe link to the Hailo-8 accelerator.
  caption: PCIe Gen 3 x2 Bottleneck
details:
  realistic_solution: 'Four 4K streams (3840x2160, 3 channels) at 30 FPS yield 4 * 8.3M pixels * 3 bytes * 30 FPS = ~2.98 GB/s of raw RGB data, exceeding the 2 GB/s PCIe link. By cropping/scaling or converting the data to a single channel INT8 representation on the host CPU before sending, bandwidth drops by 3x (to ~1 GB/s), cleanly fitting into the PCIe bus.'
  common_mistake: |
    **The Pitfall:** Suggesting H.264 compression over PCIe.
    **The Rationale:** Candidates attempt to solve bandwidth with generic video compression, unaware that the target accelerator lacks a hardware decoder.
    **The Consequence:** The "fix" requires slow software decompression on the Hailo-8, trading a PCIe bottleneck for a catastrophic compute bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4 camera streams.
       - 4K resolution: 3840x2160 (~8.3M pixels).
       - Frame rate: 30 FPS.
       - Raw RGB: 3 bytes/pixel.
       - INT8 single channel: 1 byte/pixel.
       - PCIe Gen 3 x2 bandwidth: ~2 GB/s.
    2. **Calculations:**
       - Raw RGB bandwidth: 4 * 8.3M * 3 bytes * 30 FPS = 2.98 GB/s.
       - INT8 single channel bandwidth: 4 * 8.3M * 1 byte * 30 FPS = 0.99 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound.** Converting to INT8 single channel reduces the payload from 2.98 GB/s to 0.99 GB/s, cleanly fitting the 2 GB/s PCIe limit.
