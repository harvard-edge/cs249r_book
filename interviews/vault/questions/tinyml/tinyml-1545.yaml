title: Hailo-8 PCIe Frame Ingestion
scenario: A Hailo-8 edge accelerator processes 4 camera streams simultaneously, but
  its utilization is dropping because the host PCIe Gen 3 x2 link (approx. 2 GB/s)
  is saturated by uncompressed 4K video frames at 30 FPS.
question: Optimize the host-to-accelerator data pipeline to prevent PCIe bottlenecking,
  computing the raw bandwidth before and after applying an INT8 quantization cast
  on the host.
visual:
  kind: svg
  path: tinyml-1545.svg
  alt: Diagram showing 4 camera streams merging into a host CPU, crossing a PCIe link
    to the Hailo-8 accelerator.
  caption: PCIe Gen 3 x2 Bottleneck
details:
  realistic_solution: Four 4K streams (3840x2160, 3 channels) at 30 FPS yield 4 *
    8.3M pixels * 3 bytes * 30 FPS = ~2.98 GB/s of raw RGB data, exceeding the 2 GB/s
    PCIe link. By cropping/scaling or converting the data to a single channel INT8
    representation on the host CPU before sending, bandwidth drops by 3x (to ~1 GB/s),
    cleanly fitting into the PCIe bus.
  common_mistake: Suggesting H.264 compression over PCIe without realizing the accelerator
    lacks a hardware decoder, which would require software decompression on the Hailo-8.
  napkin_math: 'Raw: 4*8.3M*3*30 = 2.98 GB/s; INT8 gray: 4*8.3M*1*30 = 0.99 GB/s.'
