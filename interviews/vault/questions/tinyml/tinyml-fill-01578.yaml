title: 'Real-Time Anomaly Detection on TinyML: Cortex-M7 + Ethos-U55 Architecture Evaluation'
scenario: 'A large industrial facility needs to implement real-time anomaly detection across hundreds
  of machines. Each machine will be outfitted with an edge device collecting high-frequency sensor data
  (e.g., accelerometer at 10kHz, microphone at 44.1kHz). The goal is to detect anomalous patterns directly
  on the device, triggering immediate alerts. The chosen hardware platform is a System-on-Chip featuring
  a Cortex-M7 processor (480 MHz clock speed, 512 KB SRAM) paired with an Arm Ethos-U55 microNPU (configurable
  from 128 to 512 MAC/cycle).


  Two architectural approaches are proposed for the streaming ingestion and anomaly detection pipeline:


  **Architecture A (Edge-Centric Feature Extraction & NPU Inference)**: Raw sensor data is continuously
  ingested. A lightweight signal processing module (e.g., calculating MFCCs for audio, or statistical
  features for accelerometer data) runs on the Cortex-M7. The extracted features are then passed to a
  small, quantized neural network model optimized for the Ethos-U55 for anomaly inference. The Cortex-M7
  handles NPU orchestration and alert generation.


  **Architecture B (Raw Data NPU Inference with Minimal CPU Pre-processing)**: Raw sensor data is buffered
  in small windows. These raw data windows are directly fed into a highly optimized, compact deep learning
  model deployed on the Ethos-U55 for inference. The Cortex-M7''s primary role is data acquisition, buffer
  management, NPU interfacing, and alert handling, minimizing its involvement in complex feature engineering.


  Evaluate these two architectures. Compare their strengths and weaknesses concerning real-time performance
  (latency, throughput), memory footprint (SRAM usage), power consumption, and overall system complexity
  given the specified hardware constraints.'
question: "How should Cortex-M7 plus Ethos-U55 streaming architectures compare feature extraction versus raw-data NPU inference?"
details:
  realistic_solution: For Architecture A, carefully select very low-complexity feature extractors that
    fit within the Cortex-M7's processing budget and SRAM, coupled with highly quantized NPU models. For
    Architecture B, focus on designing NPU-friendly models (e.g., convolutional networks with efficient
    operations) that can process raw data directly and make optimal use of the Ethos-U55's MAC capabilities,
    using the Cortex-M7 mainly for data marshaling. Using DMA for sensor data transfer to minimize CPU
    overhead. Employing dynamic power management strategies, leveraging the NPU for bursts of activity
    and allowing the CPU to sleep.
  common_mistake: Overlooking the limited SRAM, leading to models that don't fit or require complex external
    memory management. Underestimating the CPU load for feature extraction in Architecture A, or underutilizing
    the NPU's potential in Architecture B by not optimizing the model for direct raw input. Neglecting
    power consumption implications of frequent data transfers or CPU-intensive tasks on battery-powered
    devices.
  napkin_math: Consider an accelerometer sampling at 10 kHz, generating 3-axis float32 data. This is 3
    * 4 bytes * 10,000 samples/sec = 120 KB/s. If Architecture B processes data in 128-sample windows
    (12.8ms per window), each window is 128 * 3 * 4 = 1536 bytes. If the NPU model requires 100,000 MAC
    operations per inference, and the Ethos-U55 operates at 512 MAC/cycle at 480 MHz, then it can perform
    512 * 480 * 10^6 MACs/sec. An inference takes (100,000 MACs) / (512 MACs/cycle * 480 * 10^6 cycles/sec)
    = ~400 nanoseconds, well within the 12.8ms window. However, the model size, input/output buffers,
    and intermediate activations must fit within 512 KB SRAM. A 100KB model leaves 412KB for buffers and
    other code/data.
