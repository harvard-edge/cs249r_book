title: The Smart Doorbell's Dilemma
scenario: You are a TinyML engineer on a smart doorbell team. The prototype, which uses a Cortex-M7 MCU
  with 512KB of SRAM, is failing. The person-detection model is too slow for real-time inference (>500ms)
  and often crashes with out-of-memory errors. Your profiler traces the root cause to a single, standard
  3x3 convolutional layer that takes a 14x14x64 feature map as input and produces a 14x14x128 output map.
question: "What architectural replacement best addresses both latency and memory problems in the smart doorbell convolution layer?"
details:
  realistic_solution: 'The correct approach is to replace the standard convolution with a depthwise separable
    convolution. This architectural change tackles both problems at their root. It factors the single,
    dense operation into two smaller, more efficient ones: a 3x3 depthwise convolution that processes
    each input channel independently, followed by a 1x1 pointwise convolution that combines the outputs.
    This dramatically reduces both the number of parameters (model size) and the multiply-accumulate operations
    (FLOPs), leading to significant improvements in memory usage and latency.'
  common_mistake: Engineers often focus on only one dimension, like memory, without considering the computational
    cost (FLOPs). For example, suggesting INT8 quantization alone might reduce the memory footprint by
    4x, but it fails to address the enormous number of FLOPs in the standard convolution, leaving the
    critical latency issue unresolved. Another common mistake is suggesting advanced but unsuitable architectures
    like Vision Transformers, ignoring their quadratic complexity which makes them a poor fit for MCU-class
    hardware.
  napkin_math: 'Standard 3x3 Conv 64in→128out: params=3*3*64*128=73,728. MACs=73,728*14*14=14.45M. DS-Conv:
    DW 3x3x64=576, PW 1x1x64x128=8,192. Total=8,768 params (8.4x fewer), 1.72M MACs (8.4x fewer). At M7 @480MHz:
    standard=30ms, DS=3.6ms. Peak activation 14*14*128=25KB INT8 — fits 512KB SRAM.'
  options:
  - Apply INT8 post-training quantization to the layer. It will cut the memory footprint by 4x and is
    simple to implement.
  - Replace the layer with a small Vision Transformer block, as they are state-of-the-art for vision tasks.
  - Replace the standard convolution with a 3x3 depthwise separable convolution to reduce computation
    by ~8.4x.
  - Use unstructured weight pruning to remove 85% of the connections, as this will create a sparse and
    efficient layer.
  correct_index: 2
