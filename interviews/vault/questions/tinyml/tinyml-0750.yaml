title: The Float-to-Double Silent Promotion
scenario: You are porting an audio feature extraction script from Python to C on a Cortex-M4F. You write `float result = sample * 3.14159;`. Your profiler shows this single line taking ~60 CPU cycles instead of the expected 1 cycle.
question: Why does `float result = sample * 3.14159;` take ~60 cycles on a Cortex-M4F?
details:
  realistic_solution: 'In C, the literal 3.14159 is a double (64-bit) by default. The M4F''s FPU is single-precision only. The compiler promotes the float ''sample'' to double, performs a 64-bit software multiply (~60 cycles using libgcc emulation), then truncates back to float. Fix: use 3.14159f (note the ''f'' suffix) to keep everything in 32-bit float — the hardware FPU executes the multiply in 1 cycle. Every float literal without an ''f'' suffix is a potential 60x performance trap on single-precision FPU MCUs.'
  common_mistake: |
    **The Pitfall:** Assuming the hardware FPU handles all floating-point math automatically.
    **The Rationale:** Candidates from higher-level languages are unaware that literal constants in C default to double-precision, triggering a silent fallback to software emulation.
    **The Consequence:** Massive performance degradation and increased flash memory usage (by linking libgcc soft-float) for simple arithmetic operations.
  napkin_math: |
    1. **Assumptions & Constraints:** Cortex-M4F at 168 MHz (5.95 ns/cycle). Single-precision FPU only. 16 kHz audio, 256-point FFT = 4,096 multiplies/frame.
    2. **Calculations:** `3.14159` is double (64-bit). Soft-float fallback `__aeabi_dmul` + type conversion = ~100 cycles/op. `3.14159f` uses FPU = 1 cycle/op. Penalty per frame = 4,096 * 99 = 405,504 wasted cycles. Time lost = 405,504 / 168,000,000 = 2.4 ms.
    3. **Conclusion & Interpretation:** **2.4 ms lost per frame due to 64-bit soft-float promotion** (Compute-Bound by Emulation).
