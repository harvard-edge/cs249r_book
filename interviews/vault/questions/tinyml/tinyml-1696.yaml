title: Intermittent Power Checkpoint Overhead
scenario: An energy-harvesting Cortex-M4 runs intermittent inference, writing check-pointed activations to non-volatile memory (FRAM) at 1ms per KB. The model's state size is 16 KB.
question: Design an evaluation metric for the checkpointing overhead and calculate the percentage of time spent checkpointing if state is saved after every 30ms of active compute.
details:
  realistic_solution: 'Writing 16 KB takes 16ms. The total execution cycle is 30ms compute + 16ms checkpoint = 46ms. The time overhead metric is checkpoint_time / total_cycle_time, which accurately reflects the wall-clock efficiency of the system.'
  common_mistake: |
    **The Pitfall:** Dividing the checkpoint time solely by the compute time.
    **The Rationale:** Candidates calculate 16/30 (53%) instead of recognizing that the total system time comprises both the compute phase and the checkpoint phase.
    **The Consequence:** Reporting an incorrect evaluation metric that misrepresents the actual wall-clock efficiency of the system.
  napkin_math: |
    **Assumptions & Constraints:**
    - Checkpoint state size: 16 KB.
    - FRAM write speed: 1ms per KB.
    - Compute phase duration: 30ms.

    **Calculations:**
    - Time to write checkpoint: 16 KB * 1ms/KB = 16ms.
    - Total execution cycle: 30ms compute + 16ms checkpoint = 46ms.
    - Overhead metric: checkpoint_time / total_cycle_time.
    - Overhead = 16ms / 46ms = 0.3478.

    **Conclusion & Interpretation:**
    - **Result: 34.78% Overhead (I/O-Bound)**. The system spends over a third of its time strictly in I/O operations, heavily impacting effective compute throughput.
