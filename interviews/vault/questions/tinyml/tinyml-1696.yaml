title: Intermittent Power Checkpoint Overhead
scenario: An energy-harvesting Cortex-M4 runs intermittent inference, writing check-pointed
  activations to non-volatile memory (FRAM) at 1ms per KB. The model's state size
  is 16 KB.
question: Design an evaluation metric for the checkpointing overhead and calculate
  the percentage of time spent checkpointing if state is saved after every 30ms of
  active compute.
details:
  realistic_solution: Writing 16 KB takes 16ms. The total execution cycle is 30ms
    compute + 16ms checkpoint = 46ms. The time overhead metric is checkpoint_time
    / total_cycle_time, which equals 16 / 46 = 34.78%.
  common_mistake: Dividing the checkpoint time solely by the compute time (16/30)
    rather than the entire cycle time.
  napkin_math: 16 / (30 + 16) = 16 / 46 = 0.3478
