title: Optimizing Data Movement for TinyML Inference on Nordic nRF5340
scenario: You are tasked with deploying a tiny ML model for acoustic event detection on a Nordic nRF5340
  (128 MHz Cortex-M33, 256 KB SRAM, 1 MB flash). The device captures audio from an I2S microphone at 16
  kHz sample rate, 16-bit mono. The ML model requires 512-sample (1 KB) windows of audio data for inference,
  performing an inference every 32 ms. The results, a small classification vector, need to be periodically
  sent over BLE. Design a highly efficient data pipeline from the I2S peripheral to the ML model's input
  buffer, and then to the BLE peripheral, minimizing CPU overhead and ensuring real-time performance.
  Detail your choices for data transfer mechanisms, memory management, and how to maintain data integrity
  given the device's constraints.
question: "How should an nRF5340 pipeline I2S audio windows into an ML model and BLE output with minimal CPU copying?"
details:
  realistic_solution: A realistic solution involves leveraging the nRF5340's DMA capabilities extensively.
    Implement a double-buffered DMA transfer from the I2S peripheral directly into two 1 KB regions of
    SRAM. While the I2S peripheral fills one buffer via DMA, the CPU can run inference on the other. Once
    inference is complete, the buffers swap. For the BLE transmission, if the classification vector is
    small, it can be copied directly into a BLE advertising or notification buffer. For larger data, a
    zero-copy approach could be explored if the BLE stack supports DMA directly from application memory.
    Memory for DMA buffers should be allocated from a non-cacheable or write-through region of SRAM (if
    cache is present and configurable) to ensure cache coherence. Pinned memory, while not strictly 'pinned'
    in the OS sense on an RTOS, implies ensuring these buffers are fixed in SRAM and not subject to relocation,
    which is typical for embedded DMA.
  common_mistake: A common mistake is to perform CPU-intensive memcpy operations to move data between
    peripherals and model buffers. This can quickly exhaust the nRF5340's 128 MHz CPU budget, leading
    to dropped samples from the I2S input, increased inference latency, or missed BLE transmission windows.
    Another pitfall is neglecting memory alignment requirements for DMA or not employing double-buffering,
    which causes stalls while waiting for data transfers to complete.
  napkin_math: "1. **I2S Data Rate:** 16,000 samples/sec * 2 bytes/sample = 32,000 bytes/sec (32 KB/s).\
    \ \n2. **Inference Window:** 512 samples * 2 bytes/sample = 1 KB per window. \n3. **Inference Frequency:**\
    \ 1 inference every 32 ms means 1 KB of data needs to be ready every 32 ms. This matches the I2S data\
    \ rate: 1 KB / 32 ms = 31.25 KB/s, which is close to the I2S rate, meaning data transfer must be continuous\
    \ and efficient. \n4. **CPU Cycles for Data Copy (avoided by DMA):** If a single `memcpy` of 1 KB\
    \ (1024 bytes) takes, say, 4 cycles per byte (a rough estimate for simple embedded CPU), that's 4096\
    \ cycles. If this happens every 32 ms, it's 4096 cycles / 0.032 sec ≈ 128,000 cycles/sec, or 0.128\
    \ MHz equivalent. While this might seem small for a 128 MHz CPU, it's CPU time that could be spent\
    \ on ML inference. DMA reduces this to minimal setup overhead (a few dozen cycles). \n5. **SRAM usage:**\
    \ Two 1 KB buffers for I2S input = 2 KB. Plus ML model parameters, activations, and output buffers.\
    \ Total SRAM usage will likely be in the tens of KB, well within the 256 KB SRAM limit."
