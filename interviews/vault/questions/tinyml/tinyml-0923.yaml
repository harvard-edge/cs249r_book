title: Analyze Transformer FLOPs on Cortex-M7+Ethos-U55
scenario: A MobileViT-XXS model (1.3M parameters, 400M MACs per inference) runs on an Arm Cortex-M7 at 480 MHz paired with Ethos-U55 at 128 MACs/cycle at 400 MHz. The attention layers account for 35% of total MACs.
question: How much MobileViT computation falls back to the Cortex-M7 versus Ethos-U55, and how does that affect latency?
details:
  realistic_solution: Attention uses dynamic shapes, forcing fallback to CPU. Ethos-U55 executes MLP. The severe throughput mismatch causes CPU compute time to dominate, taking ~146ms for attention alone.
  common_mistake: |
    **The Pitfall:** Assuming all MACs run on the NPU automatically.
    **The Rationale:** Candidates ignore that NPU compilers (like Vela) require specific operator support; attention with dynamic shapes often falls back to the CPU.
    **The Consequence:** Drastically underestimating inference latency (expecting ~8ms but getting ~151ms) and missing real-time deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cortex-M7: 480 MHz, 2 MACs/cycle.
       - Ethos-U55: 400 MHz, 128 MACs/cycle.
       - MobileViT-XXS: 400M MACs (35% Attention, 65% MLP).
    2. **Calculations:**
       - CPU throughput: 480 MHz * 2 = 0.96 GMAC/s.
       - NPU throughput: 400 MHz * 128 = 51.2 GMAC/s.
       - Attention (CPU fallback): 140M MACs / 0.96 GMAC/s = 145.8 ms.
       - MLP (NPU): 260M MACs / 51.2 GMAC/s = 5.1 ms.
    3. **Conclusion & Interpretation:**
       **Result: ~151 ms latency due to fallback.** The system is **Compute-Bound on the CPU** unless static shapes map attention to the NPU.
