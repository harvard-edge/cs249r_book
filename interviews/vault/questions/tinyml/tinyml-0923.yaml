title: Analyze Transformer FLOPs on Cortex-M7+Ethos-U55
scenario: A MobileViT-XXS model (1.3M parameters, 400M MACs per inference) runs on an Arm Cortex-M7 at 480 MHz paired with Ethos-U55 at 128 MACs/cycle at 400 MHz. The attention layers account for 35% of total MACs.
question: How much MobileViT computation falls back to the Cortex-M7 versus Ethos-U55, and how does that affect latency?
details:
  realistic_solution: 'Attention MACs: 0.35×400M=140M on CPU if unsupported; MLP: 260M on Ethos-U55. CPU time: 140M/0.96G=146ms; NPU time: 260M/51.2G=5ms. Total ≈151ms. Moving attention to NPU via static shapes drops to ~8ms total.'
  common_mistake: |
    **The Pitfall:** Assuming all MACs run on the NPU automatically.
    **The Rationale:** The Ethos-U55 only supports specific operators, and attention with dynamic shapes often falls back to the CPU.
    **The Consequence:** Drastically underestimating inference latency (expecting ~8ms but getting ~151ms).
  napkin_math: |
    1. **Throughput NPU:** 128 MACs/cycle × 400 MHz = **51.2 GMAC/s**.
    2. **Throughput CPU:** 2 MACs/cycle × 480 MHz = **0.96 GMAC/s**.
    3. **Workload Split:** Attention = 35% of 400M = 140M MACs. MLP = 65% of 400M = 260M MACs.
    4. **Execution Time (Fallback):** CPU (140M / 0.96G) = ~146 ms. NPU (260M / 51.2G) = ~5 ms. Total ≈ **151 ms**.
    5. **Execution Time (Optimized):** If attention is moved to NPU via static shapes, total time = 400M / 51.2G ≈ **8 ms**.
