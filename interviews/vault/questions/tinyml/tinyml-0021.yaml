title: The OTA Flash Memory Tax
scenario: You are scoping the flash memory requirements for a new microcontroller that will run a keyword
  spotting model. The device must support robust Over-the-Air (OTA) firmware updates using an A/B partitioning
  scheme to prevent bricking during an update. If the total flash on the chip is 1MB, what is the approximate
  memory cost you must pay for this reliability feature? In other words, how much flash must be reserved
  specifically for the OTA update partition?
question: "In other words, how much flash must be reserved specifically for the OTA update partition?"
details:
  realistic_solution: 'A robust A/B OTA update scheme requires two separate memory partitions of equal
    size: one for the currently running application (''A'') and one to receive the new application (''B'').
    After the new firmware is fully downloaded and verified in partition ''B'', the bootloader will swap
    to it on the next boot. This means approximately 50% of the total available flash must be reserved
    for the update partition. It''s a direct ''tax'' on memory in exchange for update reliability.'
  common_mistake: Engineers unfamiliar with embedded constraints often assume they can overwrite the application
    'in-place', forgetting that a power failure or failed write would permanently brick the device. Others
    assume only a small 'patch' or 'diff' is sent, underestimating the need to store a full, second application
    binary for a safe swap.
  napkin_math: 'A/B scheme: need two equal partitions. Total flash = 1MB = 1024KB. Partition A (active
    firmware) = 512KB. Partition B (OTA staging) = 512KB. Cost of OTA reliability = 512KB = 50% of total
    flash. Remaining per-partition for app+model = 512KB minus bootloader (~16KB) = ~496KB usable per
    slot.'
  options:
  - ~50 KB, for storing a small patch file.
  - Effectively 0 KB, as you can overwrite the existing application in-place.
  - ~500 KB, to hold a complete second copy of the application binary.
  - ~32 KB, the space taken by the bootloader itself.
  correct_index: 2
