title: Huffman Encoding for Weight Compression on Cortex-M4
scenario: A 200KB INT8 CNN model for Cortex-M4 (1MB flash) needs to be compressed to fit alongside a 700KB firmware. The weight histogram shows 60% of values cluster around 0 (±3), 30% in ±10, and 10% are outliers.
question: Estimate the compression ratio achievable with Huffman encoding and assess the runtime decompression cost.
details:
  realistic_solution: 'Entropy of weight distribution: H = -0.60×log2(0.60) - 0.30×log2(0.30) - 0.10×log2(0.10) = 0.442 + 0.521 + 0.332 = 1.295 bits/symbol at coarse level. For 256 INT8 values with cluster distribution: typical Huffman gives ~3-4 bits average for clustered INT8. Compression ratio: 8 bits/3.5 bits average = 2.3×. Compressed model: 200KB/2.3 = 87KB. Fits with 700KB firmware: 787KB < 1MB. Decompression cost: 200K weights × ~5 cycles (lookup + branch) at 168MHz = ~6ms per layer if decompressed on-the-fly. Buffer requirement: decompress layer-by-layer, need largest layer weight buffer (e.g., 32KB SRAM). Feasible for inference latency >100ms targets.'
  common_mistake: |
    **The Pitfall:** Only calculating the compression ratio and ignoring the on-device decompression requirements.
    **The Rationale:** Candidates forget that decompression at inference time on a Cortex-M4 adds cycle latency and requires a large decompression buffer in SRAM.
    **The Consequence:** The model fits in Flash but violates real-time latency deadlines or crashes due to lack of SRAM for the decompression buffer.
  napkin_math: |
    *   **Weight Entropy (H):** -0.60*log2(0.60) - 0.30*log2(0.30) - 0.10*log2(0.10) = 0.442 + 0.521 + 0.332 = 1.295 bits/symbol (coarse).
    *   **Typical INT8 Huffman:** Achieves ~3.5 bits/symbol average for clustered data.
    *   **Compression Ratio:** 8 bits / 3.5 bits = ~2.3x.
    *   **Compressed Size:** 200 KB / 2.3 = **87 KB** (Fits comfortably with 700 KB firmware under 1 MB).
    *   **Decompression Cost:** 200K weights * 5 cycles (lookup + branch) / 168 MHz = **~6 ms** overhead per inference.
