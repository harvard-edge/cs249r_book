title: The Silent Failure of the Emergency Keyword
scenario: You are the Staff ML Engineer for an automotive division. Your team deployed a keyword-spotting (KWS) model on a Cortex-M4 microcontroller to detect the phrase 'call 911' for emergency assistance. The original model was FP32 and took up 500KB of the 1MB Flash storage. To add a new, non-critical 'play music' feature, the team quantized the safety-critical KWS model to INT8 using post-training static quantization, reducing its size to 125KB and freeing up space.
question: What root-cause analysis and mitigation plan should be used after INT8 quantization makes the emergency KWS model fail in noise?
details:
  realistic_solution: The root cause is a **quantization-calibration mismatch**, where the statistical distribution of the activations during inference with noisy audio is drastically different from the clean audio used for calibration. The high-frequency noise is pushing the activation values in certain layers beyond the narrow dynamic range captured during calibration. This leads to massive precision loss via **clipping** (saturation), where many distinct activation values are clipped to -128 or 127.
  common_mistake: |
    **The Pitfall:** Blaming the calibration dataset size or the inherent inaccuracy of INT8.
    **The Rationale:** Candidates suggest getting more noisy data or reverting to FP32, missing the fundamental quantization saturation issue.
    **The Consequence:** Wasting time collecting data that won't fix the architectural flaw, or violating strict flash memory constraints by returning to a 500KB FP32 model.
  napkin_math: |
    - **Compression:** 500 KB (FP32) to 125 KB (INT8) = 4x compression.
    - **Clean Calibration Range:** [-2, 2], step scale = 4 / 255 = 0.016.
    - **Noisy Audio Range:** Activations hit [-5, 5].
    - **Clipping Loss:** Values beyond ±2 are clipped to -128/127, losing ~60% of the dynamic range.
    - **Mitigation (Mixed-Precision):** First 3 layers in FP32 = 3 * 20 KB = 60 KB extra.
    - **Final Size:** 125 KB + 60 KB = **185 KB** (< 1MB Flash).
