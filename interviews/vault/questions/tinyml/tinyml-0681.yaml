title: The Silent Failure of the Emergency Keyword
scenario: You are the Staff ML Engineer for an automotive division. Your team deployed a keyword-spotting
  (KWS) model on a Cortex-M4 microcontroller to detect the phrase 'call 911' for emergency assistance.
  The original model was FP32 and took up 500KB of the 1MB Flash storage. To add a new, non-critical 'play
  music' feature, the team quantized the safety-critical KWS model to INT8 using post-training static
  quantization, reducing its size to 125KB and freeing up space.
details:
  realistic_solution: The root cause is a **quantization-calibration mismatch**, where the statistical
    distribution of the activations during inference with noisy audio is drastically different from the
    clean audio used for calibration. The high-frequency noise is pushing the activation values in certain
    layers beyond the narrow dynamic range captured during calibration. This leads to massive precision
    loss via **clipping** (saturation), where many distinct activation values are clipped to -128 or 127.
  common_mistake: The most common and incorrect immediate diagnosis is 'our calibration dataset needs
    more noisy audio.' While adding data helps, it doesn't fix the underlying architectural flaw. Another
    is to declare 'INT8 is too inaccurate for critical tasks' and demand a return to FP32, which ignores
    the hard memory constraints. These reactions fail to identify the precise mechanism of failure.
  napkin_math: 'FP32: 500KB→INT8: 125KB (4× compression). Calibration on clean audio: range [-2,2], scale=4/255=0.016/step.
    Noisy audio: activations hit [-5,5]. Values beyond ±2 clipped to -128/127→60% of range lost. Fix:
    mixed-precision first 3 layers in FP32: 3×20KB=60KB extra. Total 185KB<1MB Flash ✓. Noisy accuracy
    restored >95%.'
