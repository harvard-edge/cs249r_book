title: 'Hardware-aware NAS Deployment on Resource-Constrained Microcontrollers'
scenario: 'Your team is deploying an image classification model, designed via Neural Architecture Search (NAS), onto an ARM Cortex-M4 STM32F4 microcontroller (168 MHz, 256 KB SRAM, no FPU) for a new edge AI product. Initial testing reveals that the model consistently crashes or experiences significant latency spikes during inference on the target device. The NAS process prioritized accuracy and FLOPs without explicitly tightening SRAM constraints during the search.'
question: 'How would you diagnose the root causes of the NAS model deployment failure considering STM32F4 hardware limitations?'
details:
  realistic_solution: 'Implement a truly hardware-aware NAS approach. This involves integrating the STM32F4''s SRAM and latency budgets directly into the NAS reward function or as hard constraints on the search space. Explore MCUNet-style architectures specifically designed for memory-constrained microcontrollers. Quantize the model aggressively (e.g., to 8-bit) and use an inference framework optimized for integer-only arithmetic on Cortex-M.'
  common_mistake: |
    **The Pitfall:** Overlooking SRAM constraints and FPU absence during NAS.
    **The Rationale:** Candidates assume FLOPs directly translate to latency and that parameter count is the only memory constraint, ignoring activation memory and software-emulated floating-point overhead.
    **The Consequence:** Deploying a model that exceeds the 256 KB SRAM limit or suffers massive latency spikes from FP32 emulation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Parameters: 3x3x32 filters, 32 input channels = 9,248 parameters (~9 KB if 8-bit).
    - Activations: 64x64x32 (8-bit) = 131,072 bytes (~128 KB).

    **Calculations:**
    - Memory Peak: Multiple intermediate layers needing simultaneous storage easily exceed the 256 KB SRAM limit.
    - Latency: 10^7 MACs taking ~4 cycles each = 4*10^7 cycles. At 168 MHz, latency is ~238 ms.

    **Conclusion & Interpretation:**
    - **Result: 256 KB Exceeded (Memory-Bound)**. The memory overhead and emulation latency cause the deployment to fail.
