title: The Datacenter Brain on a Tiny Body
scenario: You are the tech lead for a new battery-powered smart camera product. A junior engineer has designed a sensor fusion pipeline where a low-power microcontroller (MCU) must stream 320x320 grayscale (8-bit) video at 30 FPS to a small, external AI accelerator chip for real-time analysis using a standard SPI bus.
question: Why does streaming 320x320 grayscale video at 30 FPS over SPI starve an external AI accelerator?
details:
  realistic_solution: The primary bottleneck is the physical SPI bus, which lacks the bandwidth to handle the video stream. Datacenter protocols like InfiniBand and concepts like RDMA are completely irrelevant at this scale. The problem isn't the protocol's efficiency; it's the raw data rate limit of the bus itself. The required data rate exceeds what SPI can provide, meaning the accelerator will be perpetually starved for data, regardless of how fast it can compute.
  common_mistake: |
    **The Pitfall:** Misapplying datacenter concepts like RDMA to embedded systems.
    **The Rationale:** Focusing on optimizing protocol software overhead while ignoring the physical bandwidth limits of low-power embedded buses.
    **The Consequence:** Designing a fundamentally broken architecture where the AI accelerator is perpetually starved for data, regardless of compute speed.
  napkin_math: |
    1. **Frame Size:** 320 * 320 * 1 Byte = 102,400 Bytes (~102 KB).
    2. **Required Data Rate:** 102 KB * 30 FPS = 3.07 MB/s = **24.6 Mbps**.
    3. **SPI Max Capacity:** Typical SPI maxes out around **10-20 Mbps**.
    4. **Conclusion:** 24.6 Mbps > 20 Mbps. The physical SPI bus is fully saturated; RDMA optimizations are irrelevant.
  options:
  - The MCU's processing power is too low to handle a 30 FPS stream.
  - The lack of RDMA (Direct Memory Access) on the SPI bus is causing high CPU overhead on the MCU.
  - The physical SPI bus itself has insufficient bandwidth for the required data rate.
  - The external AI accelerator is not powerful enough, causing backpressure to the MCU.
  correct_index: 2
