title: Dual-Core Memory Allocation for Keyword Spotting
scenario: You are designing the memory hierarchy for a keyword spotting application running on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) system. You need to partition the 512 KB SRAM between the M7 (which handles audio feature extraction via MFCCs) and the U55 (which runs the neural network inference).
question: How would you evaluate the trade-offs of different memory allocation strategies considering the shared SRAM constraint?
details:
  realistic_solution: 'A robust design uses dynamic memory management or carefully orchestrates a ping-pong buffer system. Since the M7 and U55 share the 512 KB SRAM, the optimal approach is to overlap M7 feature extraction (writing to Buffer A) with U55 inference (reading from Buffer B). The design must also evaluate whether weights should be executed in place from flash (saving SRAM but hurting latency) or paged into SRAM dynamically.'
  common_mistake: |
    **The Pitfall:** Allocating static memory partitions to the CPU and NPU.
    **The Rationale:** Candidates treat the NPU and CPU as completely independent systems without considering the temporal pipeline of real-time audio inference.
    **The Consequence:** The static partition fails to utilize memory efficiently, leading to OOM errors or completely blocked pipelines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - M7 + Ethos-U55 (512 MACs/cycle @ 480 MHz).
       - Shared SRAM: 512 KB.
       - Weights: 200 KB.
       - Activations: 100 KB.
       - M7 MFCC buffer: 150 KB.
    2. **Calculations:**
       - Peak throughput: 512 MACs/cycle * 480 MHz = 245.76 GMAC/s.
       - Single buffer requirement: 200 + 100 + 150 = 450 KB.
       - Ping-pong buffer requirement: 200 + (2 * 100) + 150 = 550 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** Ping-pong buffering exceeds the 512 KB SRAM by 38 KB, requiring a redesign of the buffering strategy or executing weights directly from Flash via XIP.
