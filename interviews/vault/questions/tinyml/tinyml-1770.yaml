title: Bare-Metal DMA Ring Buffers for TinyML
scenario: An industrial vibration sensor array uses an ultra-low-power Cortex-M4.
  It needs to run a tiny RNN, but the device lacks an OS (bare-metal).
question: Design a bare-metal inference loop leveraging DMA to feed the RNN without
  CPU polling.
details:
  realistic_solution: Configure the ADC to trigger a DMA transfer directly into a
    ring buffer in SRAM. Set a DMA hardware interrupt to fire when the buffer is half-full.
    The CPU wakes from a low-power Wait For Interrupt (WFI) state, processes the RNN
    on the half-buffer, and immediately sleeps again.
  common_mistake: Writing a while-loop that polls the ADC for data, keeping the CPU
    awake and draining battery.
  napkin_math: 16kHz * 2B = 32KB/s DMA
