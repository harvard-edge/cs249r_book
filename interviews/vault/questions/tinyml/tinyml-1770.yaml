title: Bare-Metal DMA Ring Buffers for TinyML
scenario: An industrial vibration sensor array uses an ultra-low-power Cortex-M4. It needs to run a tiny RNN, but the device lacks an OS (bare-metal).
question: Design a bare-metal inference loop leveraging DMA to feed the RNN without CPU polling.
details:
  realistic_solution: Configure the ADC to trigger a DMA transfer directly into a ring buffer in SRAM. Set a DMA hardware interrupt to fire when the buffer is half-full. The CPU wakes from a low-power Wait For Interrupt (WFI) state, processes the RNN on the half-buffer, and immediately sleeps again.
  common_mistake: |
    **The Pitfall:** Writing a while-loop that polls the ADC for data.
    **The Rationale:** Candidates used to high-level programming assume data must be actively requested by the CPU, ignoring the power-saving peripheral capabilities of microcontrollers.
    **The Consequence:** The CPU remains awake 100% of the time, continuously polling the ADC, which drastically drains the battery of the ultra-low-power device.
  napkin_math: |
    - **Data Rate:** 16 kHz * 2 bytes = 32 KB/s.
    - **DMA Transfer:** Handled entirely by hardware (0 CPU cycles).
    - **Conclusion:** **Using DMA allows the CPU to remain in a deep sleep state (WFI) while 32 KB/s of data is buffered, waking only when the half-full interrupt fires.**
