title: Asymmetric Cortex-M Pipeline Synchronization Overhead
scenario: A heterogeneous pipeline runs a ResNet-8 model via a shared SRAM mailbox with a 50µs barrier latency. The first stage processes 6 layers in 12ms, and the second stage processes the final 2 layers in 8ms. You are implementing a 4-microbatch 1F1B schedule.
question: Calculate the total latency for the 4-microbatch pipeline, including the pipeline flush and barrier synchronization overheads.
details:
  realistic_solution: The pipeline has K=2 stages and N=4 microbatches. The total latency is the time for the first microbatch to traverse both stages plus (N-1) times the bottleneck stage latency. The M7 bottleneck stage takes 12ms + 0.05ms = 12.05ms. The M4 stage takes 8ms + 0.05ms = 8.05ms. The first microbatch takes 12.05 + 8.05 = 20.1ms. The remaining 3 microbatches complete at the rate of the bottleneck (3 * 12.05ms = 36.15ms). Total latency is 20.1ms + 36.15ms = 56.25ms.
  common_mistake: |
    **The Pitfall:** Neglecting the pipeline flush time and mailbox barrier latency.
    **The Rationale:** Candidates simply multiply the number of microbatches by the longest stage latency (4 * 12ms = 48ms), completely missing the first stage lead-in time and the synchronization overhead.
    **The Consequence:** Inaccurate latency profiling that underestimates the real-world pipeline delay.
  napkin_math: |
    **Assumptions & Constraints:**
    - Stage 1 (M7) compute: 12 ms.
    - Stage 2 (M4) compute: 8 ms.
    - Mailbox barrier latency: 0.05 ms.
    - Pipeline configuration: K=2 stages, N=4 microbatches.

    **Calculations:**
    - Stage 1 Bottleneck: 12 ms + 0.05 ms = 12.05 ms.
    - Stage 2 Latency: 8 ms + 0.05 ms = 8.05 ms.
    - Pipeline Fill (First Microbatch): 12.05 ms + 8.05 ms = 20.1 ms.
    - Pipeline Flush (Remaining Microbatches): (N-1) * Bottleneck = 3 * 12.05 ms = 36.15 ms.
    - Total Latency: 20.1 ms + 36.15 ms = 56.25 ms.

    **Conclusion & Interpretation:**
    - **Result: Latency-Bound.** The pipeline synchronization and flush overheads dictate a total latency of 56.25ms, not 48ms.
