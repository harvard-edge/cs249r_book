title: Asymmetric Cortex-M Pipeline Synchronization Overhead
scenario: A Cortex-M7 (480 MHz) and Cortex-M4 (240 MHz) pipeline a ResNet-8 model
  via a shared SRAM mailbox with a 50us barrier latency. The M7 computes the first
  6 layers in 12ms, and the M4 processes the final 2 layers in 8ms. You are implementing
  a 4-microbatch 1F1B schedule.
question: Calculate the total latency for the 4-microbatch pipeline, including the
  pipeline flush and barrier synchronization overheads.
details:
  realistic_solution: The pipeline has K=2 stages and N=4 microbatches. The total
    latency is the time for the first microbatch to traverse both stages plus (N-1)
    times the bottleneck stage latency. The M7 bottleneck stage takes 12ms + 0.05ms
    = 12.05ms. The M4 stage takes 8ms + 0.05ms = 8.05ms. The first microbatch takes
    12.05 + 8.05 = 20.1ms. The remaining 3 microbatches complete at the rate of the
    bottleneck (3 * 12.05ms = 36.15ms). Total latency is 20.1ms + 36.15ms = 56.25ms.
  common_mistake: Neglecting the pipeline flush time (K-1 factor) and simply multiplying
    4 * max(12, 8), missing both the first stage lead-in and the mailbox barrier latency.
  napkin_math: (12.05 + 8.05) + (4 - 1) * 12.05 = 20.1 + 36.15 = 56.25ms
