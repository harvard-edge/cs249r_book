title: The SRAM Overflow Options
scenario: 'Your model fits in flash (weights: 180 KB, flash: 1 MB) but the tensor arena needs 240 KB and
  your SRAM is only 200 KB. Walk through the optimization options in order of engineering effort.'
details:
  realistic_solution: 'Optimization ladder for SRAM overflow: Baseline: 240 KB peak. Step 1 (planner):
    -10% → 216 KB (still over). Step 2 (in-place): -12% → 190 KB ✓ (fits in 200 KB with 10 KB headroom).
    If Step 2 isn''t enough: Step 3 (96→80 resolution): 240 × ('
  common_mistake: '"Use a smaller model." That''s the nuclear option — there are several less destructive
    approaches.'
  napkin_math: 'Device: Cortex-M4, 200 KB SRAM, 1 MB flash. Model weights: 180 KB (fits flash). Tensor
    arena baseline: 240 KB peak (exceeds 200 KB SRAM by 40 KB). Step 1 — TFLM memory planner optimization:
    reorder tensor allocation for max reuse. Saves ~10%: 240 * 0.9 = 216 KB (still 16 KB over). Step 2
    — In-place ops (ReLU, add): eliminate separate output buffers. Saves ~12%: 216 * 0.88 = 190 KB (fits
    in 200 KB with 10 KB headroom). Step 3 (if needed) — Reduce input resolution from 96x96 to 80x80:
    activation memory scales with (H*W). 240 * (80/96)^2 = 240 * 0.694 = 167 KB. Engineering time: Steps
    1+2 = ~4 hours. Step 3 = 5 min + accuracy validation. Accuracy impact: Steps 1+2 = zero. Step 3 =
    1-3% loss.'
