title: 'The SRAM Overflow Options'
scenario: 'Your model fits in flash (weights: 180 KB, flash: 1 MB) but the tensor arena needs 240 KB and your SRAM is only 200 KB.'
question: 'What optimization ladder would you try when model weights fit flash but a 240 KB tensor arena exceeds 200 KB SRAM?'
details:
  realistic_solution: 'Optimization ladder for SRAM overflow: Baseline: 240 KB peak. Step 1 (planner): -10% → 216 KB (still over). Step 2 (in-place): -12% → 190 KB ✓ (fits in 200 KB with 10 KB headroom). If Step 2 isn''t enough: Step 3 (96→80 resolution): 240 × (80/96)^2 = 167 KB. Engineering time: Steps 1+2 = ~4 hours. Step 3 = 5 min + accuracy validation. Accuracy impact: Steps 1+2 = zero. Step 3 = 1-3% loss.'
  common_mistake: '"Use a smaller model." That''s the nuclear option — there are several less destructive approaches.'
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM: 200 KB. Peak Tensor Arena: 240 KB (40 KB over).

    **Calculations:**
    - Step 1 (Planner Reorder): 240 KB * 0.90 = 216 KB.
    - Step 2 (In-place Ops): 216 KB * 0.88 = ~190 KB.
    - Step 3 (Input Res 96 to 80): 240 * (80/96)^2 = 167 KB.

    **Conclusion & Interpretation:**
    - **Result: 190 KB (Memory Bound)**. Using the memory planner and in-place operations allows the model to comfortably fit within the 200 KB limit with zero accuracy degradation.
