title: The TinyML Memory Diet
scenario: You are tasked with deploying a keyword-spotting model on a Cortex-M4 microcontroller. To fit the device's limited Flash memory, you must quantize it.
question: How does the memory footprint and inference speed compare when storing the model's weights in FP16 versus INT8 precision?
details:
  realistic_solution: INT8 quantization yields a 50% memory reduction over FP16, shrinking the footprint from 500 KB to 250 KB and leaving ample flash for application firmware. Furthermore, INT8 unlocks CMSIS-NN SIMD acceleration (e.g., SMLAD instructions, processing dual 16-bit or quad 8-bit MACs per cycle), delivering approximately a 2x inference speedup beyond the base memory bandwidth savings.
  common_mistake: |
    **The Pitfall:** Conflating bits and bytes or assuming FP32 baselines.
    **The Rationale:** Engineers default to FP32 (4 bytes) mental models or confuse bit-widths, leading to 8x miscalculations. Some forget FP16 requires 2 bytes.
    **The Consequence:** They wildly miscalculate flash requirements, either over-provisioning hardware or failing to fit the model in the available ROM.
  napkin_math: |
    **Assumptions & Constraints:**
    - 250,000 parameters.
    - FP32 = 4 bytes/param, FP16 = 2 bytes/param, INT8 = 1 byte/param.

    **Calculations:**
    - FP32 baseline: 250,000 * 4 bytes = 1,000 KB.
    - FP16 footprint: 250,000 * 2 bytes = 500 KB.
    - INT8 footprint: 250,000 * 1 byte = 250 KB.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound Optimization**. INT8 halves the storage requirement versus FP16 (saving 250 KB), fitting comfortably into MCU flash constraints while unlocking SIMD compute acceleration.
  options:
  - 1,000 KB for FP16, 250 KB for INT8
  - 500 KB for FP16, 125 KB for INT8
  - 500 KB for FP16, 250 KB for INT8
  - 2,000 KB for FP16, 1,000 KB for INT8
  correct_index: 2
