title: The TinyML Memory Diet
scenario: You're tasked with deploying a keyword-spotting model on a Cortex-M4 microcontroller.
  The model has 250,000 parameters. To fit it into the device's limited Flash memory,
  you need to quantize it. Compare the memory footprint required to store the model's
  weights in FP16 versus INT8 precision.
question: How would you compare the memory footprint required to store the model's
  weights in FP16 versus INT8 precision?
details:
  realistic_solution: 'FP16: 250,000 params * 2 bytes = 500 KB. INT8: 250,000 params
    * 1 byte = 250 KB. Savings: 250 KB (50% reduction). On a Cortex-M4 with 512 KB
    flash, the FP16 model consumes 97.6% of flash leaving no room for firmware, while
    INT8 uses 48.8% leaving 262 KB for application code. INT8 also enables CMSIS-NN
    SIMD acceleration (2 MACs/cycle via SMLAD), giving ~2x inference speedup beyond
    just the memory savings. The memory reduction is linear with bit-width: halving
    precision halves storage.'
  common_mistake: A common mistake is to confuse the memory requirements for different
    data types, often forgetting that FP16 takes two bytes and INT8 takes one. Some
    engineers default to thinking in FP32 (4 bytes), leading to an overestimation
    for FP16. Another error is confusing bits and bytes, resulting in an 8x miscalculation.
  napkin_math: 'The KWS model has 250,000 parameters. In standard FP32, memory footprint = 250,000 * 4 bytes = 1,000,000 bytes (1,000 KB). FP16 footprint (2 bytes/param) = 500 KB. Quantizing to INT8 (1 byte/param) shrinks it to 250 KB (a 50% savings over FP16), fitting cleanly into the microcontroller''s memory limits.'
  options:
  - 1,000 KB for FP16, 250 KB for INT8
  - 500 KB for FP16, 125 KB for INT8
  - 500 KB for FP16, 250 KB for INT8
  - 2,000 KB for FP16, 1,000 KB for INT8
  correct_index: 2
