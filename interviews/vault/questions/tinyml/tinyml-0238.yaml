classification_review: 'Flash is correct: ''concept-recall'' is wrong for a question that asks to ''compare
  the memory footprint'' and ''calculate''. This is ''napkin-math''. The math is trivially correct (250K
  * 2 = 500KB for FP16, 250K * 1 = 250KB for INT8). The napkin_math field only shows the FP16 calculation,
  missing the INT8 result and the comparison -- another minor content gap.'
