title: Rolling Anomaly Checkpoint
scenario: A Cortex-M4 vibration monitor occasionally resets due to power fluctuations.
  It tracks a rolling anomaly score over time.
question: Apply a lightweight checkpointing scheme to save the 4-byte anomaly score
  to non-volatile memory every 5 minutes.
visual:
  kind: svg
  path: tinyml-1581.svg
  alt: Timeline showing regular state saves every 5 minutes.
  caption: Periodic Checkpoint RPO
details:
  realistic_solution: The candidate suggests periodically writing the 4-byte float/int
    to Flash memory or EEPROM every 5 minutes. They should mention wear-leveling if
    writing to Flash frequently.
  common_mistake: Overcomplicating the checkpointing by suggesting full RAM snapshots
    for a single scalar state.
  napkin_math: 60 / 5 = 12 checkpoints / hour = 48 bytes / hour
