title: Decentralized Anomaly Detection via Federated Averaging on nRF5340
scenario: You are designing a predictive maintenance system using a fleet of Nordic nRF5340 sensors deployed
  in a factory. Each device must locally update an anomaly detection model using its 128 MHz app core
  and participate in Federated Averaging over BLE 5.3 without exceeding the 256 KB SRAM limit or depleting
  the battery excessively (~5mA active current). The data across the factory is highly non-IID due to
  varying machine ages, and communication bandwidth is severely constrained. Architect a cross-device
  federated learning system that handles the non-IID challenge while strictly adhering to the memory and
  power budgets of the nRF5340.
details:
  realistic_solution: A robust architecture uses FedProx to handle the non-IID data by adding a proximal
    term to the local objective, preventing models from diverging too much. To fit within the 256 KB SRAM,
    the model should be heavily quantized (e.g., INT8) and employ parameter-efficient fine-tuning (like
    LoRA) to only update a small subset of weights. Communication efficiency over BLE 5.3 is achieved
    by transmitting only sparse, quantized weight updates and accumulating them locally before infrequent,
    asynchronous syncs with the edge server.
  common_mistake: Candidates often propose standard FedAvg without considering the communication overhead
    and memory constraints of the nRF5340. They might suggest storing full model gradients in SRAM, which
    quickly exceeds the 256 KB limit for any meaningful model, or ignore the energy cost of frequent BLE
    transmissions, rapidly draining the battery.
  napkin_math: Assuming a base model size of 100K parameters (INT8). Storing weights requires 100 KB flash
    (well within 1 MB). During local training, storing activations and gradients might need ~120 KB, fitting
    inside the 256 KB SRAM. Using rank-4 LoRA, we update only ~2K parameters (2 KB). Transmitting 2 KB
    over BLE 5.3 (approx 1 Mbps throughput or 125 KB/s) takes roughly 16ms. At ~5mA active current, a
    single communication round costs 5mA * 16ms = 0.08 mAs. A local training epoch taking 500ms on the
    128 MHz core costs 5mA * 500ms = 2.5 mAs, keeping total energy strictly constrained.
