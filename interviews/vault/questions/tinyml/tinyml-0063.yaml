title: Fleet-Wide Model Update Strategy
scenario: You manage 100,000 predictive maintenance sensors across 200 factories. The fleet has 5 MCU variants (64KB to 8MB flash) and mixed connectivity (BLE, LoRaWAN, cellular LTE-M). You need to deploy a retrained anomaly detection model to the entire fleet.
question: How should 100,000 sensors across 5 MCU variants and BLE, LoRaWAN, and LTE-M receive a retrained model update?
details:
  realistic_solution: 'Employ a multi-tiered, differential OTA strategy. Build a model family sharing a core architecture but tiered by width (40KB to 1MB) to fit varied constraints. Utilize delta patches (e.g., bsdiff) to transmit only the changed weights, minimizing payload size. Route via connectivity constraints: LTE-M gets immediate unicast OTA, LoRaWAN utilizes Class C multicast to bypass strict duty cycle limits, and BLE propagates via gateway proximity over days. Enforce a staged rollout to mitigate bricking.'
  common_mistake: |
    **The Pitfall:** Attempting to compile and push a single monolithic model binary to all edge devices.
    **The Rationale:** Unified pipelines simplify backend management, leading engineers to ignore severe edge hardware constraints.
    **The Consequence:** Large models OOM on smaller devices, and transmitting full binaries over LoRaWAN violates strict duty cycles or takes months.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 25,000 Cellular, 35,000 LoRaWAN devices.
       - Average Model: 250 KB. Delta Patch: 50 KB (20%).
    2. **Calculations:**
       - Cellular Savings: 25,000 * 200 KB = 5 GB saved. At $0.50/MB = $2,500 saved.
       - LoRaWAN Transmission: Max payload ~50 bytes. 50 KB patch = 1,000 packets.
       - At 1% duty cycle (SF7), unicast takes ~2 hours per device. Class C Multicast serves all 35,000 concurrently in 2-6 hours.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound.** Delta patches and multicast are strictly required to bypass LoRaWAN limits.
