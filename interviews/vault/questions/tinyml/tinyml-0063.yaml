title: Fleet-Wide Model Update Strategy
scenario: 'You manage 100,000 predictive maintenance sensors across 200 factories. The fleet has 5 hardware
  variants: Cortex-M0+ (nRF52810, 64 KB flash), Cortex-M4 (STM32L4, 1 MB flash), Cortex-M4F (Apollo4,
  2 MB flash), Cortex-M33 (nRF5340, 1 MB flash), and ESP32-S3 (8 MB flash). Connectivity is mixed: 40%
  BLE-only, 35% LoRaWAN, 25% cellular (LTE-M). You need to deploy a retrained anomaly detection model
  to the entire fleet. Design the update strategy.'
question: "How should 100,000 sensors across 5 MCU variants and BLE, LoRaWAN, and LTE-M receive a retrained model update?"
details:
  realistic_solution: 'This is a multi-dimensional logistics problem: 5 hardware variants x 3 connectivity
    types. Build a model family with size tiers (40 KB for nRF52810, up to 1 MB for ESP32-S3) sharing
    the same architecture but different widths. Use delta patches (10-20% of full model) to minimize transfer
    size. Route updates by connectivity: cellular devices get immediate OTA (21 min for 25K devices),
    LoRaWAN uses Class C multicast (2-6 hours for 35K devices), BLE rolls out over 3-7 days via gateway
    proximity. Staged rollout: 1% canary for 24 hours, then 10%, then full fleet. Delta patches save $2,500
    per update cycle in cellular costs.'
  common_mistake: '"Build one model, compile for each target, push to all devices." This ignores that
    a model fitting in 64 KB flash (nRF52810) is fundamentally different from one using 2 MB flash (Apollo4).
    You can''t deploy the same model to all variants — you need a model family.'
  napkin_math: "Model sizes by variant:\n- nRF52810 (64 KB flash): ~40 KB model. Delta patch: ~10 KB.\n\
    - STM32L4 (1 MB flash): ~200 KB model. Delta patch: ~50 KB.\n- Apollo4 (2 MB flash): ~500 KB model.\
    \ Delta patch: ~100 KB.\n- nRF5340 (1 MB flash): ~200 KB model. Delta patch: ~50 KB.\n- ESP32-S3 (8\
    \ MB flash): ~1 MB model. Delta patch: ~200 KB.\n\nUpdate time by connectivity (per device, delta\
    \ patch):\n- Cellular (25% = 25,000 devices): 50 KB avg patch at 10 KB/s = 5 s/device. Batched 100\
    \ concurrent: 25,000 / 100 = 250 batches x 5 s = 1,250 s = 21 min/100 × 5 s = 1,250 s ≈ ~21 min.\n\
    - BLE (40% = 40,000 devices): 50 KB at 20 KB/s = 2.5 s/device. Sequential per gateway is impractical.\
    \ Realistic: rolling OTA on next BLE connection, spread over 3-7 days (long tail).\n- LoRaWAN (35%\
    \ = 35,000 devices): LoRaWAN has severe constraints: duty cycle limits (1% in EU868), max payload\
    \ ~50 bytes/packet, downlink limited to a few packets per day per device.\n  50 KB patch / 50 bytes\
    \ per packet = 1,000 packets per device.\n  At 1% duty cycle with SF7 (5.5 kbps gross): effective\
    \ throughput ≈ 55 bps = 6.9 bytes/s.\n  Per device: 50 KB / 6.9 B/s = 7,246 s ≈ 2 hours per device\
    \ (unicast).\n  With Class C multicast (all devices listen simultaneously): all receive the 50 KB\
    \ stream in ~2 hours.\n  Realistic rollout for LoRa segment: 2-6 hours with multicast, days with unicast.\n\
    \nCost:\n- Cellular: 25,000 × 50 KB = 1.25 GB at $0.50/MB = 1,250 MB × $0.50 = $625.\n- BLE/LoRa:\
    \ $0 (local).\n- Without delta: 25,000 × 250 KB avg = 6.25 GB = 6,250 MB × $0.50 = $3,125.\n- Delta\
    \ saves $2,500 per update cycle.\n\nTotal rollout: 24-hour canary → cellular complete in ~21 min →\
    \ LoRa multicast in ~2-6 hours → BLE rolling over 3-7 days."
