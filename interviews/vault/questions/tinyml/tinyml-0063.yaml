title: Fleet-Wide Model Update Strategy
scenario: You manage 100,000 predictive maintenance sensors across 200 factories. The fleet has 5 hardware variants: Cortex-M0+ (nRF52810, 64 KB flash), Cortex-M4 (STM32L4, 1 MB flash), Cortex-M4F (Apollo4, 2 MB flash), Cortex-M33 (nRF5340, 1 MB flash), and ESP32-S3 (8 MB flash). Connectivity is mixed: 40% BLE-only, 35% LoRaWAN, 25% cellular (LTE-M). You need to deploy a retrained anomaly detection model to the entire fleet.
question: How should 100,000 sensors across 5 MCU variants and BLE, LoRaWAN, and LTE-M receive a retrained model update?
details:
  realistic_solution: 'This is a multi-dimensional logistics problem: 5 hardware variants x 3 connectivity types. Build a model family with size tiers (40 KB for nRF52810, up to 1 MB for ESP32-S3) sharing the same architecture but different widths. Use delta patches (10-20% of full model) to minimize transfer size. Route updates by connectivity: cellular devices get immediate OTA (21 min for 25K devices), LoRaWAN uses Class C multicast (2-6 hours for 35K devices), BLE rolls out over 3-7 days via gateway proximity. Staged rollout: 1% canary for 24 hours, then 10%, then full fleet. Delta patches save $2,500 per update cycle in cellular costs.'
  common_mistake: |
    **The Pitfall:** Attempting to compile and push a single monolithic model to all devices.
    **The Rationale:** Unified pipelines simplify backend management, leading engineers to ignore severe downstream constraints.
    **The Consequence:** A model sized for 1MB flash utterly fails on 64KB devices, and transmitting full binaries over LoRaWAN violates duty cycles or takes months to complete.
  napkin_math: |
    *   **Model Tiering:** nRF52810 needs ~40KB model. ESP32-S3 can take ~1MB model.
    *   **Delta Patches:** Sending 10-20% diffs. A 250KB average model becomes a 50KB patch.
    *   **Cellular Cost:** 25,000 devices × 50 KB = 1.25 GB. At $0.50/MB = $625 (saves $2,500 compared to full 250KB image).
    *   **LoRaWAN Constraint:** Max payload ~50 bytes. 50 KB patch = 1,000 packets.
    *   **LoRaWAN Time:** At 1% duty cycle (SF7, ~55 bps), unicast takes ~2 hours per device. Class C Multicast serves all 35,000 in 2-6 hours total.
