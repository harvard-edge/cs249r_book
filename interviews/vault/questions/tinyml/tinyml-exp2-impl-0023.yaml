title: Calculate Latency of Pruning Methods on Cortex-M4
scenario: 'You are deploying an INT8 wake-word model on an ARM Cortex-M4 (STM32F4) operating at 168 MHz
  with 1 MB of flash and 256 KB SRAM. A fully connected layer in your model has 1024 inputs and 256 outputs.
  You are evaluating two optimization paths: 75% unstructured weight pruning versus 50% structured pruning
  (removing half of the output neurons). Standard CMSIS-NN is used, which executes 2x INT8 MACs per cycle
  via SIMD instructions, but lacks optimized kernels for unstructured sparsity. Calculate the exact inference
  latency in microseconds and the parameter flash footprint in kilobytes for both pruning strategies.'
question: "How would you calculate the exact inference latency in microseconds and the parameter flash footprint in kilobytes for both pruning strategies?"
details:
  realistic_solution: The correct approach recognizes that Cortex-M4 SIMD instructions (like __SMLAD)
    require contiguous 32-bit memory access (packing four 8-bit operands). Unstructured pruning yields
    no speedup when using standard dense kernels and actually increases memory if stored in compressed
    formats like CSR due to 16-bit index overhead. Structured pruning directly reduces the matrix dimensions,
    yielding a proportional, hardware-aligned decrease in both latency and memory footprint.
  common_mistake: Candidates often assume unstructured pruning linearly reduces inference latency and
    memory. They fail to realize that on the Cortex-M4, standard CMSIS-NN dense kernels cannot skip unstructured
    zeros without destroying the dual-MAC SIMD vectorization, meaning a sparsely populated dense matrix
    still incurs the full dense latency.
  napkin_math: '1. Dense Baseline: 1024 x 256 = 262,144 parameters. Flash footprint = 256 KB. Total MACs
    = 262,144.

    2. Unstructured (75% sparse): Processed densely via CMSIS-NN to utilize SIMD. Cycles = 262,144 / 2
    MACs/cycle = 131,072 cycles. Latency = 131,072 / 168,000,000 Hz = 780.2 μs. Flash = 256 KB.

    3. Structured (50% pruned): Matrix becomes 1024 x 128. Flash footprint = 128 KB. Total MACs = 131,072.
    Cycles = 131,072 / 2 = 65,536. Latency = 65,536 / 168,000,000 Hz = 390.1 μs.'
