title: Optimizing Peak SRAM Footprint for CNN on STM32F4
scenario: You are deploying a depthwise separable CNN for keyword spotting onto an ARM Cortex-M4 (STM32F4) microcontroller. The model weights are quantized to INT8 and take up 400 KB, easily fitting within the 1 MB flash. However, during execution, the system crashes due to out-of-memory errors, despite the total parameter size suggesting it should be fine.
question: Why does a 400 KB-weight STM32F4 CNN OOM at runtime, and how should the bottleneck activation layer be changed?
details:
  realistic_solution: The solution requires analyzing the memory lifecycle to find the bottleneck layer with the highest peak SRAM usage. Since the STM32F4 has only 256 KB of SRAM, the system must hold the input tensor, output tensor, and any CMSIS-NN scratch buffers simultaneously for the widest layer. The optimization involves quantifying this peak and reducing the spatial dimensions or channel width of that specific bottleneck layer, or altering the topology to avoid wide intermediate representations.
  common_mistake: |
    **The Pitfall:** Only calculating the static memory footprint (weights in flash).
    **The Rationale:** Candidates overlook the peak activation memory (transient SRAM) required during intermediate layer execution, especially for non-in-place operations.
    **The Consequence:** The system will continually crash with OOM errors during the widest execution layer, rendering the deployment failed.
  napkin_math: |
    1. **Initial Bottleneck Layer:** Input tensor 64x64x32 INT8 (128 KB) + Output tensor 64x64x32 INT8 (128 KB).
    2. **Initial Peak SRAM:** 128 KB + 128 KB = 256 KB. Adding 10 KB scratchpad + 4 KB stack = **270 KB** (> 256 KB limit, causing OOM).
    3. **Optimization:** Reduce the channel width of this specific layer from 32 to 16 channels.
    4. **New Tensors:** Input 64x64x16 (64 KB) + Output 64x64x16 (64 KB).
    5. **New Peak SRAM:** 64 KB + 64 KB + 10 KB + 4 KB = **142 KB**.
    6. **Conclusion:** The topology adjustment allows the model to comfortably fit the hardware limits.
