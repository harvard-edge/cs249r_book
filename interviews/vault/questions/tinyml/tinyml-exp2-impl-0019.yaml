title: SRAM Constraint Calculation for Ethos-U55 CNN Deployment
scenario: You are deploying an INT8 quantized CNN on a Corstone-300 subsystem featuring an ARM Cortex-M7
  running at 480 MHz and an Ethos-U55 NPU. The system has 512 KB of SRAM that is shared between the M7
  and the NPU. The RTOS and application logic require a fixed 100 KB footprint, and the network's peak
  activation buffer during inference is 150 KB. Calculate the maximum number of model parameters you can
  support if the entire model must reside in SRAM to meet latency targets.
question: "How would you calculate the maximum number of model parameters you can support if the entire model must reside in SRAM to meet latency targets?"
details:
  realistic_solution: The correct approach involves a simple memory budget equation. You must subtract
    the RTOS/app overhead and the peak activation memory from the total available SRAM. The remaining
    memory represents the absolute maximum space for model weights, which directly translates to the parameter
    count since the model is quantized to INT8.
  common_mistake: Candidates often forget that the 512 KB SRAM is shared and fail to subtract the application
    overhead and activation buffers before calculating weight capacity. They may also confuse INT8 parameter
    sizes, forgetting that 1 parameter equals exactly 1 byte.
  napkin_math: Total SRAM = 512 KB. App/RTOS Overhead = 100 KB. Peak Activation Buffer = 150 KB. Remaining
    SRAM for Weights = 512 - 100 - 150 = 262 KB. With INT8 quantization, 1 parameter = 1 byte. Maximum
    parameters = 262 KB * 1024 bytes/KB = 268,288 parameters.
