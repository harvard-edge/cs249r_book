title: Tinyml New 0027
scenario: To secure the device, you add a cryptographic SHA-256 hash check of the 200KB model weights
  on boot. The Cortex-M4 device now enters an infinite reboot loop upon powering up.
question: "Why does adding a SHA-256 boot-time model hash cause a watchdog reboot loop on the Cortex-M4?"
details:
  realistic_solution: The SHA-256 calculation over the large 200KB model takes too long, triggering the
    hardware Watchdog Timer (WDT) before the boot sequence finishes. The WDT thinks the system has frozen
    and resets it, causing an infinite loop. The solution is to explicitly 'pet' (reset) the WDT inside
    the hashing loop, or use a streaming hardware cryptographic accelerator if available.
  common_mistake: Adding heavy security verification routines to the bootloader without accounting for
    hardware watchdog timeouts.
  napkin_math: Software SHA-256 = ~1000 cycles/byte. Model = 200KB. 200,000 × 1000 = 200M cycles. At 168
    MHz, 200M/168M = 1.19 seconds. If the WDT is configured to trigger at 0.5s, the system will reliably
    reset.
