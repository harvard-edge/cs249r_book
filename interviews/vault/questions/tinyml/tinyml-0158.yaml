title: 'The Tensor Arena Peak: Tensor Arena Planning'
scenario: You are deploying a keyword-spotting model on a Cortex-M4 microcontroller with 256 KB of SRAM.
  The TensorFlow Lite for Microcontrollers profiler shows that the most memory-intensive operation is
  a convolution. During this op's execution, it needs a 20 KB input tensor, produces an 80 KB output tensor,
  and requires a 5 KB persistent tensor (for its parameters). The TFLM runtime itself requires a 10 KB
  'tail' for its internal state management. Explain how you would calculate the minimum required tensor
  arena size for this single operation to execute successfully.
question: "How you would calculate the minimum required tensor arena size for this single operation to execute successfully?"
details:
  realistic_solution: The tensor arena must be large enough to hold all concurrently active memory allocations
    at the point of peak usage. For a single operation, this includes its input tensor, its output tensor,
    any persistent tensors that are live, and the runtime's own bookkeeping memory.
  common_mistake: A common mistake is to only account for the largest tensor (the 80 KB output) or to
    sum the input and output but forget the persistent tensors or the framework's own overhead (the 'tail').
    All live tensors and the runtime's needs must be accounted for at the moment of peak usage.
  napkin_math: 1. **Identify live tensors:** Input (20 KB), Output (80 KB), and Persistent (5 KB) are
    all needed during the op's execution.
  options:
  - 105 KB
  - 100 KB
  - 115 KB
  - 80 KB
  correct_index: 2
