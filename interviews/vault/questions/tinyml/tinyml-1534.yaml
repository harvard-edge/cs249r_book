title: TinyML Fallback Latency Budget
scenario: A TinyML smoke detector uses a neural classifier taking 120 ms and a rule-based fallback taking 8 ms. The alarm loop must respond within 150 ms.
question: "Can an 8 ms rule-based fallback meet a 150 ms alarm deadline if the neural classifier times out after 100 ms?"
details:
  realistic_solution: Yes. If the neural path is cut off at 100 ms and fallback takes 8 ms, the response completes in 108 ms, leaving 42 ms headroom. The system should timeout early enough to preserve fallback time.
  common_mistake: |
    **The Pitfall:** Letting the neural classifier run until the full 150 ms deadline expires.
    **The Rationale:** Engineers mistakenly set the timeout exactly equal to the system deadline.
    **The Consequence:** The fallback rule-based system has 0 ms to execute, causing the alarm response to violently fail its deadline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total Deadline: 150 ms.
       - Neural Timeout: 100 ms.
       - Fallback Compute: 8 ms.
    2. **Calculations:**
       - Worst-case time = Timeout + Fallback = 100 ms + 8 ms = 108 ms.
       - Headroom = Deadline - Worst-case time = 150 ms - 108 ms = 42 ms.
    3. **Conclusion & Interpretation:**
       - **Result: The fallback meets the deadline with 42 ms headroom.**
       - **Latency-Bound (Graceful Degradation)**
