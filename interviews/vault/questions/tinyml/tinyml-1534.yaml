title: TinyML Fallback Latency Budget
scenario: A TinyML smoke detector uses a neural classifier taking 120 ms and a rule-based
  fallback taking 8 ms. The alarm loop must respond within 150 ms. If the classifier
  times out after 100 ms, size whether fallback can still meet the loop deadline.
question: Can an 8 ms rule-based fallback meet a 150 ms alarm deadline after a 100
  ms neural timeout?
details:
  realistic_solution: Yes. If the neural path is cut off at 100 ms and fallback takes
    8 ms, the response completes in 108 ms, leaving 42 ms headroom. The system should
    timeout early enough to preserve fallback time.
  common_mistake: Letting the neural classifier run until the full 150 ms deadline
    and leaving no time for fallback.
  napkin_math: Timeout + fallback = 100 + 8 = 108 ms. Headroom = 150 - 108 = 42 ms.
