title: Sub-Milliwatt Always-On Wake Word Detection
scenario: Design an always-on wake word detection system that consumes less than 1 mW total — including
  the microphone, ADC, feature extraction, and neural network inference. The system must detect 'Hey Device'
  with >95% accuracy and <5% false accept rate. What architectural choices make this possible?
question: "What architecture keeps always-on wake-word detection under 1 mW including microphone, ADC, features, and inference?"
details:
  realistic_solution: 'Sub-milliwatt always-on detection requires a fundamentally different architecture
    than running a standard MCU continuously:'
  common_mistake: '"Use a Cortex-M4 at low clock speed." Even at the lowest clock speed (e.g., 4 MHz),
    a Cortex-M4 draws ~1-2 mW in active mode. With the microphone and ADC, you''re already over budget
    before inference starts.'
  napkin_math: 'Cortex-M4 always-on approach at 168 MHz: 2 mW MCU + 0.5 mW mic + 0.2 mW ADC = 2.7 mW.
    Battery life: 675 / 2.7 = 250 hours = 10 days. Tiered approach (dedicated always-on DSP at ~50 µW
    + MCU duty-cycled): 48 µW average. Battery life: 14,063 hours = 1.6 years. Improvement: **56×** longer
    battery life. The tiered architecture is the only way to achieve always-on detection on a coin cell.
    This is why products like Amazon Echo Buds and Google Pixel Buds use dedicated always-on DSPs — not
    the main application processor.'
  options:
  - Use a Cortex-M4 at the lowest clock speed (4 MHz) to stay under 1 mW. At 4 MHz, the MCU draws ~1.5
    mW active, plus 0.5 mW mic + 0.2 mW ADC = 2.2 mW total — close enough to the 1 mW budget.
  - 'A tiered always-on architecture: Stage 1 — analog VAD or ultra-low-power DSP (~20-50 uW) screens
    for speech-like audio 100% of the time. Stage 2 — lightweight feature extractor (~200 uW) activates
    only when VAD triggers (~10% of time). Stage 3 — full neural network (~1.5 mW) runs only on likely
    wake words (~1% of time). Average power: ~48 uW, delivering 56x longer battery life (1.6 years on
    CR2032) vs always-on MCU approach (10 days).'
  - Use a standard Cortex-M4 running the full neural network continuously but power-gate the microphone
    between inference cycles to stay under 1 mW.
  - Achieve sub-milliwatt by using INT4 quantization to reduce the model's compute by 4x, bringing the
    M4's inference power from 2 mW to 0.5 mW.
  correct_index: 1
