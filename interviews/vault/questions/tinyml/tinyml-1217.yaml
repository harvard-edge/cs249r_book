title: Audio Model Degradation Ladder on Cortex-M4
scenario: >
  You are deploying an always-on audio analysis pipeline combining keyword spotting and acoustic scene classification on an ARM Cortex-M4 (STM32F4) featuring a 168 MHz clock, 256 KB SRAM, and no FPU. The system has a strict 50ms inference deadline per audio window. During periods of heavy concurrent RTOS network activity, the primary 10M INT8 MAC model is preempted, misses its deadline, and drops frames.
question: >
  How should the Cortex-M4 audio pipeline shed work when RTOS network activity leaves too few cycles for the primary model?
details:
  realistic_solution: >
    Implement a quality-of-service shedding degradation ladder where a secondary, lightweight 2M MAC keyword-only model is kept resident in the 1 MB internal flash alongside the primary model. When the RTOS monitors high CPU utilization from the network stack, the ML pipeline skips the acoustic scene classification and routes data only to the lightweight model. This ensures the critical wake-word detection remains fail-operational while respecting the reduced compute slice.
  common_mistake: |
    **The Pitfall:** Suggesting dynamic frequency scaling (DVFS) or dynamically paging model weights from external flash to save SRAM.
    **The Rationale:** Candidates apply cloud or mobile concepts to a microcontroller environment, failing to recognize that MCUs lack the hardware to page quickly and that scaling frequency won't fix a cycle-starvation issue.
    **The Consequence:** The proposed solutions are unviable and fail to guarantee latency.
  napkin_math: |
    - **Total Cycles:** STM32F4 at 168 MHz yields 8.4M total cycles in the 50ms deadline.
    - **Primary Model:** Leveraging CMSIS-NN SIMD (2x INT8 MACs/cycle), the 10M MAC primary model takes ~5M cycles.
    - **Network Preemption:** If a network interrupt burst consumes 60% of the CPU (5.04M cycles), only 3.36M cycles remain for ML inference.
    - **Failure:** 3.36M < 5M, causing the primary model to miss the deadline.
    - **Fallback:** A 2M MAC fallback model drops inference to ~1M cycles (2M / 2).
    - **Conclusion:** The 1M cycle fallback model fits safely within the 3.36M available cycles, **saving 4M cycles** per window.
