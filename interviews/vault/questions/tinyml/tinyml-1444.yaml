title: Functional Safety for TinyML on Resource-Constrained Automotive ECUs
scenario: You are tasked with deploying a safety-critical TinyML model for predictive maintenance in an automotive system, specifically monitoring brake pad wear. The target platform is an ARM Cortex-M4 STM32F4 microcontroller (168 MHz clock speed, 256 KB SRAM, no FPU). The system must adhere to ISO 26262 ASIL-B requirements.
question: How should you ensure ISO 26262 ASIL-B functional safety for a Cortex-M4 brake-wear TinyML model?
details:
  realistic_solution: 'Implement deterministic INT8 execution to prevent FPU drift, utilize MPU configurations, and enforce software/hardware watchdogs alongside cyclic redundancy checks (CRCs) on static memory. Disable interrupts during critical sections to guarantee timing constraints.'
  common_mistake: |
    **The Pitfall:** Porting float models without safety scaffolding.
    **The Rationale:** Candidates assume standard software error handling is sufficient for ASIL-B compliance, disregarding FPU-emulation non-determinism.
    **The Consequence:** Unpredictable timing and inadequate fault detection mechanisms lead to catastrophic real-time system failures.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - STM32F4: 168 MHz, 256 KB SRAM, no FPU.
       - INT8 MAC: 3 cycles average.
       - Model: 100,000 MACs.
       - Watchdog ASIL-B reset: ~10 ms.
    2. **Calculations:**
       - Total Cycles: 100,000 * 3 = 300,000 cycles.
       - Inference Latency: 300,000 / 168,000,000 = 1.78 ms.
       - Safety Headroom: 10 ms (watchdog) - 1.78 ms = 8.22 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 1.78 ms Latency.** The system is well within timing limits, but is strictly **Reliability-Bound** requiring watchdogs and CRCs to enforce determinism.
