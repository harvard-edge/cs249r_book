title: The Memory-Mapped Sensor Bottleneck
scenario: Your TinyML vibration monitoring system uses a Cortex-M0+ (48 MHz, 32 KB SRAM) with an external accelerometer connected via SPI. The accelerometer produces 3-axis INT16 samples at 3.2 kHz. Your colleague reads each sample by polling the SPI data register in a busy-wait loop inside the main inference function. The system works, but inference latency is 3x worse than expected.
question: Why does busy-wait SPI polling make Cortex-M0+ vibration inference 3x slower than expected?
details:
  realistic_solution: 'Polling SPI stalls the CPU pipeline for every byte transfer. At 3.2kHz * 3 axes * 2 bytes = 19.2KB/s, reading 512 samples (one inference window) requires the CPU to execute a busy-wait loop for each of the 3,072 bytes. Each poll cycle: check SPI status register (~4 cycles) + read data (~2 cycles) + store + loop = ~156 cycles/sample. Total I/O overhead: 79,872 cycles = 1.66ms, doubling the 0.83ms inference time to 2.49ms (3x expected). Fix: configure SPI DMA to fill the buffer autonomously in background. DMA setup: 20 cycles. Result: CPU is 100% free during I/O, inference runs at the expected 0.83ms.'
  common_mistake: |
    **The Pitfall:** Blaming the SPI bus bandwidth instead of CPU overhead.
    **The Rationale:** Candidates assume the 8 MHz SPI bus is too slow, overlooking that transferring 6 bytes takes only 6 µs, while busy-waiting stalls the CPU pipeline.
    **The Consequence:** Unnecessary hardware redesigns instead of implementing a simple DMA software fix.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cortex-M0+ at 48 MHz.
       - 512 samples per window.
       - Polling takes ~156 cycles/sample.
       - DMA setup takes 50 cycles (1 µs).
    2. **Calculations:**
       - Without DMA: 512 * 156 = 79,872 cycles.
       - Polling Time: 79,872 / 48 MHz = 1.66 ms. Total Latency = 1.66 + 0.83 (compute) = 2.49 ms.
       - With DMA: 0.83 ms + 0.001 ms (setup) = 0.831 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 0.831 ms latency.** Using DMA removes the massive CPU polling bottleneck, restoring real-time performance.
