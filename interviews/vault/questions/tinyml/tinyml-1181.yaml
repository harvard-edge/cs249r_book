title: Heterogeneous Vision Architecture on ESP32-S3
scenario: You are designing a battery-powered security camera running a 200M MAC, 4MB INT8 object detection model. The system uses a microcontroller with a 240 MHz dual-core processor, 512 KB SRAM, and 8 MB PSRAM.
question: Why should the security camera use an external SPI NPU, and how do communication costs affect the design?
details:
  realistic_solution: The correct architecture offloads the 200M MAC inference to a dedicated NPU ASIC due to the compute and cache bottlenecks, while retaining the CPU for WiFi/BLE and programmable preprocessing. Because the 4MB model exceeds the 512KB SRAM, running it on the CPU requires constant fetching from the 8MB PSRAM, causing severe cache thrashing. The design must utilize QSPI to stream the image to the NPU to ensure the communication overhead does not eclipse the accelerator's compute speedup.
  common_mistake: |
    **The Pitfall:** Overestimating CPU vector extensions or blindly proposing an external NPU without calculating SPI transfer overhead.
    **The Rationale:** Candidates fail to calculate the actual cycles required for 200M MACs or ignore the massive latency of transferring images over the SPI bus.
    **The Consequence:** Deploying an architecture that either misses latency deadlines by seconds (CPU bound) or bottlenecks on the memory bus (I/O bound).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - CPU Vector Compute: ~150 MMAC/s.
       - Model: 200M MAC, 4MB INT8.
       - CPU SRAM: 512 KB.
    2. **Calculations:**
       - CPU Compute Time: 200M MAC / 150 MMAC/s = ~1.3 seconds (plus PSRAM cache misses).
       - NPU Communication: Sending a 320x240 INT8 grayscale image (76.8 KB) over QSPI at 40 MB/s takes ~1.9 ms.
       - External NPU latency: ~5ms compute + 1.9ms SPI transfer = ~7 ms.
    3. **Conclusion & Interpretation:**
       - **Result: NPU (~7 ms) is orders of magnitude faster than CPU (~1.3s).**
