title: The Overheating Desert Sensor
scenario: You are diagnosing a fleet of solar-powered wildlife sensors deployed in the Sahara. The device uses a Cortex-M4, is designed for a 3-year battery life, and is powered by a solar panel providing 1.5mW on average. Its operational cycle is to wake every 10 minutes, take 1s to capture an image, run a 2s inference, and sleep. Devices are failing in weeks. Telemetry shows internal temperatures reaching 70°C on sunny days.
question: What coupled thermal effects explain the Sahara sensors' rapid battery drain despite the nominal duty cycle?
details:
  realistic_solution: The core issue is a thermal death spiral. High ambient temperatures cause the MCU to overheat. To protect itself, it thermally throttles, drastically slowing its clock speed. This extends the t_active period required to complete the inference, possibly to 8-10 seconds. Concurrently, high temperatures exponentially increase leakage current, raising both P_active and P_sleep. Finally, the solar panel's efficiency also decreases in extreme heat. The combination of spending longer in a higher-power active state while the energy being harvested is lower creates a severe energy deficit, rapidly draining the battery.
  common_mistake: |
    **The Pitfall:** Blaming the solar panel or battery health in isolation.
    **The Rationale:** Engineers fail to consider the coupled effect of temperature on both energy supply (solar efficiency) and demand (thermal throttling and leakage).
    **The Consequence:** Proposing hardware changes (e.g., larger panels) without addressing the root cause of the thermal death spiral.
  napkin_math: |
    - Baseline Power Budget (25°C): P_active ≈ 40mW, P_sleep ≈ 5µW.
    - Average Power (Baseline): (40mW * 3s + 0.005mW * 597s) / 600s ≈ 0.20mW (< 1.5mW solar).
    - Thermal Throttling (70°C): t_active extends from 3s to 8-10s.
    - Leakage Current: High temps exponentially increase P_active and P_sleep.
    - **Conclusion:** Degraded solar efficiency combined with longer, higher-power active times creates a severe energy deficit.
  options:
  - The model is too complex, causing an excessive P_active that the solar panel cannot support.
  - The solar panel is simply undersized and its efficiency is collapsing in the desert heat, failing to charge the battery.
  - Overheating causes thermal throttling, which increases t_active and power draw due to leakage, creating an energy deficit against the heat-degraded solar panel.
  - The duty cycle is too aggressive; waking every 10 minutes doesn't give the battery enough time to recharge between cycles.
  correct_index: 2
