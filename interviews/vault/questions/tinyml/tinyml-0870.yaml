title: 'Model Format Conversion: Full TFLM Deployment Mastery for Embedded Vision on M7'
scenario: You are deploying a person detection model (MobileNetV1-0.25, 475K INT8 params, 14.9 MOPs, 28x28 input) on Cortex-M7+Ethos-U55 (480MHz, 512KB SRAM, NPU).
question: Walk through the full conversion pipeline and validate if the memory layout meets a 50ms latency budget on a battery-powered device.
details:
  realistic_solution: 'Pipeline: TF SavedModel → TFLite (INT8, representative dataset 100 images) → Vela compiler (ethos-u55-256 config, SRAM 512KB, DRAM bandwidth 1.6 GB/s). Vela output: optimized .tflite with NPU dispatch groups. Flash: 475KB model. SRAM: Vela assigns activation arena: peak ~120KB. Total: 475+120+50KB (TFLM runtime+buffers) = 645KB? Exceeds 512KB SRAM. Fix: model weights to Flash, only activations in SRAM (120KB). Flash: 475KB model + 64KB app = 539KB (if Flash > 512KB, need 1MB Flash MCU). NPU inference: 14.9M/500G = 29.8μs + 1ms overhead = 1ms << 50ms ✓.'
  common_mistake: |
    **The Pitfall:** Running the Vela compiler with default settings.
    **The Rationale:** Failing to specify the Ethos-U55 system configuration (memory bandwidth, SRAM size) for the specific target hardware.
    **The Consequence:** Producing a suboptimal NPU schedule that causes memory spilling and misses latency budgets.
  napkin_math: |
    1. **Weights:** MobileNetV1-0.25 INT8 has 475K params = **475 KB**. (Fits in >540KB Flash).
    2. **Activations:** Peak activation (28×28×128) = 100 KB. Plus buffers = ~120 KB SRAM.
    3. **TFLM Runtime:** ~30 KB.
    4. **Total SRAM:** 120 KB + 30 KB = **150 KB** (Fits easily in 512 KB).
    5. **Compute:** Ethos-U55 at 500 GOPS. 14.9 MOPs compute: 29.8 μs compute + 1 ms overhead = **1.03 ms**.
    6. **Conclusion:** 1.03 ms is well under the 50 ms budget (98% slack). Average power from Ethos is ~2 mW.
