title: 'TinyML TCO Realization: Concrete Cost Breakdown for TinyML Widget'
scenario: Concretely calculate the unit economics for a commercial TinyML motion sensor (Cortex-M4, $2, + PIR sensor $1 + CR2032 $0.30 + PCB+enclosure $2 + assembly $1 = $6.30 BOM) retailing at $29.99. Include: distributor margin 30%, return rate 3%, warranty (2-year, 5% failure at $15 repair cost).
question: What are the gross and net margins for a $29.99 TinyML motion sensor with a $6.30 BOM, factoring in distributor, return, and warranty costs?
details:
  realistic_solution: 'Retail: $29.99. Distributor 30%: $29.99*0.70=$20.99 to manufacturer. COGS: BOM=$6.30. Returns: 3% * BOM=$0.189. Warranty reserve: 5% failure * $15 repair = $0.75/unit expected. Total COGS: $6.30+$0.189+$0.75=$7.239. Gross profit: $20.99-$7.239=$13.751. Gross margin: $13.751/$20.99=65.5%. Operating expenses: 20% of revenue for sales/marketing/R&D = $4.20. Net margin: ($13.751-$4.20)/$20.99=45.5%. High margins — typical for IoT hardware with sticky recurring revenue (none here) or brand premium. For 100K units: net profit = 100K*$9.551=$955K.'
  common_mistake: |
    **The Pitfall:** Confusing distributor margin with manufacturer markup, and ignoring warranty reserves.
    **The Rationale:** Software-focused engineers often model hardware costs using only the raw BOM, forgetting the real-world liabilities of physical products.
    **The Consequence:** COGS is severely underestimated, leading to fundamentally flawed profitability projections and potentially bankrupting hardware businesses.
  napkin_math: |
    *   **Manufacturer Revenue:** Retail price $29.99 × (1 - 0.30 distributor margin) = $20.99.
    *   **Returns Cost:** 3% return rate × $6.30 BOM = $0.189 per unit.
    *   **Warranty Cost:** 5% failure rate × $15 repair cost = $0.75 per unit.
    *   **Total COGS:** $6.30 BOM + $0.189 returns + $0.75 warranty = $7.239.
    *   **Gross Margin:** ($20.99 - $7.239) / $20.99 = **65.5%**.
    *   **Operating Expenses:** Assume 20% of revenue = $4.198.
    *   **Net Margin:** ($20.99 - $7.239 - $4.198) / $20.99 = **45.5%**.
    *   **Total Net Profit (100K units):** 100,000 × ($20.99 - $7.239 - $4.198) = **$955,300**.
