title: PSRAM Bandwidth Bottleneck on ESP32-S3
scenario: You are deploying a 1 MB INT8 keyword spotting model on an ESP32-S3. The microcontroller features a 240 MHz Xtensa core with vector extensions capable of 4 MACs per cycle. The model requires 2.5 million MAC operations per inference. Because the weights exceed the 512 KB internal SRAM, they are stored in the 8 MB external PSRAM, connected via a Quad SPI bus running at 80 MHz. Profiling reveals the inference latency is a flat 25 ms, drastically underutilizing the processor.
question: Why does an ESP32-S3 spend 25 ms on a 1 MB INT8 model stored in 80 MHz Quad SPI PSRAM?
details:
  realistic_solution: The bottleneck is strictly caused by the memory bandwidth of the Quad SPI interface connecting the PSRAM. Even though the processor can compute the inference in a fraction of the time, it stalls while waiting for the 1 MB of weights to be transferred over the bus. The system is entirely I/O bound.
  common_mistake: |
    **The Pitfall:** Blaming RTOS context switching, cache miss penalties, or inefficient vector instruction usage.
    **The Rationale:** Candidates focus solely on the processor's high compute specs without actually calculating the physical data transfer limits of the memory bus.
    **The Consequence:** Countless hours are wasted optimizing code or tweaking compiler flags while completely ignoring the fundamental physical limitation of the memory interface, leading to no latency improvement.
  napkin_math: |
    - Theoretical Compute Time: 2.5M MACs / 4 MACs/cycle = 625,000 cycles.
    - At 240 MHz, compute takes: 625,000 / 240,000,000 = **~2.6 ms**.
    - PSRAM Bandwidth: Quad SPI provides 4 bits (0.5 bytes) per cycle.
    - At 80 MHz clock, throughput is: 80 MHz × 0.5 bytes = **40 MB/s**.
    - Memory Transfer Time: Fetching 1 MB of weights requires 1 MB / 40 MB/s = 0.025 seconds (**25 ms**).
    - The 25 ms inference latency is exactly equal to the weight transfer time, proving a strict **I/O bottleneck**.
