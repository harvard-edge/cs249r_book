title: Audio Streaming DMA vs Interrupts on nRF5340
scenario: 'You are designing an always-on acoustic anomaly detector using the Nordic nRF5340 (128 MHz
  app core, 256 KB SRAM, ~5mA active). The microphone captures 16-bit audio at 16 kHz, and the ML model
  requires a 1-second window for inference. You are evaluating two ingestion designs. Design A uses an
  ADC interrupt to wake the app core every 256 samples (16 ms) to copy data into a rolling SRAM buffer.
  Design B uses the peripheral''s EasyDMA to continuously stream data into a 32 KB ping-pong buffer in
  SRAM without CPU intervention, waking the app core only once per second. Evaluate these two alternatives:
  which architecture do you choose and why?'
question: "Should an nRF5340 audio detector use 16 ms ADC interrupts or EasyDMA into a 32 KB ping-pong buffer, and why?"
details:
  realistic_solution: Design B is the superior choice for an always-on system despite the memory cost.
    Waking the 128 MHz app core every 16 ms in Design A destroys sleep efficiency due to context switching
    overhead and the core's ~5mA active draw. To mitigate Design B's memory usage, the system can use
    a smaller DMA block size (e.g., 250ms) to trigger feature extraction in smaller chunks, accumulating
    MFCCs over time rather than buffering raw audio.
  common_mistake: Candidates often choose Design B purely for power savings without analyzing the memory
    impact of ping-pong buffering. They may fail to realize that a 1-second ping-pong buffer requires
    64 KB of SRAM, which is 25% of the nRF5340's total 256 KB memory, severely constraining the remaining
    memory for the ML model and BLE stack.
  napkin_math: 'Raw audio throughput: 16,000 samples/sec * 2 bytes/sample = 32 KB/sec. For Design B''s
    ping-pong buffer, memory required is 32 KB * 2 = 64 KB. Total SRAM available is 256 KB, leaving 192
    KB for the RTOS, BLE net core IPC, and ML model arena. Design A wakes the core 62.5 times per second;
    if wake/sleep transitions and ISR handling take 200 cycles each, that''s 12,500 wasted cycles per
    second while drawing ~5mA, vastly reducing battery life compared to sleeping for a full second.'
