title: Ethos-U55 Depth-First Scheduling for Memory Reuse
scenario: 'We are deploying an object detection model on a Corstone-300 subsystem featuring an ARM Cortex-M7 (480 MHz) and an Ethos-U55 NPU sharing 512 KB of SRAM. The model has an early high-resolution feature extraction phase followed by two parallel branches for classification and bounding box regression. We have two scheduling options: Option A executes operators strictly breadth-first across both branches to maximize NPU batching and MAC utilization per cycle. Option B schedules operators depth-first, completing the regression branch before starting the classification branch, which risks higher M7-NPU context switching overhead.'
question: Which scheduling strategy is optimal given the shared SRAM constraints, and why?
details:
  realistic_solution: Option B (depth-first scheduling) is the correct approach. On an Ethos-U55 system sharing just 512 KB SRAM with the Cortex-M7, memory availability strictly dictates performance bounds. Depth-first scheduling allows the system to compute and consume the intermediate tensors of one branch, immediately freeing that SRAM for the second branch. The overhead of context switching between the M7 and U55 is negligible compared to the latency penalties or outright failure of exhausting the on-chip SRAM.
  common_mistake: |
    **The Pitfall:** Defaulting to breadth-first execution to maximize NPU batching.
    **The Rationale:** Candidates assume maximizing Ethos-U55 MAC utilization is the primary goal, ignoring the strict 512 KB shared SRAM limit.
    **The Consequence:** Holding multiple branch activations simultaneously fragments memory and predictably triggers an Out-of-Memory (OOM) error.
  napkin_math: |
    **Assumptions & Constraints:**
    - Shared Input: 150 KB. Branch 1: 200 KB. Branch 2: 180 KB. RTOS: 64 KB.
    - SRAM Limit: 512 KB.

    **Calculations:**
    - Option A (Breadth-First): 150 + 200 + 180 + 64 = 594 KB.
    - Option B (Depth-First): Max(150+200, 150+180) + 64 = 350 + 64 = 414 KB.

    **Conclusion & Interpretation:**
    - **Result: 414 KB vs 594 KB (Memory-Bound).** Depth-first scheduling safely stays within the 512 KB limit, avoiding OOM.
