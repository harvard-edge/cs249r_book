title: The Microcontroller Ridge Point (tinyml-0271)
scenario: You are evaluating a new microcontroller based on a Cortex-M4, which provides around 336 MFLOPS of peak compute and has an SRAM memory bandwidth of 1.2 GB/s.
question: What is the arithmetic intensity (in Ops/Byte) required to saturate the processor's compute and hit its roofline ridge point?
details:
  realistic_solution: The ridge point is the ratio of the processor's peak compute performance to its peak memory bandwidth. For the Cortex-M4, with 336 MFLOPS and 1.2 GB/s of bandwidth, the ridge point is 0.28 Ops/Byte. This low value is characteristic of microcontrollers and signifies that most neural network layers, even those with relatively low operational intensity, will easily exceed this threshold and be compute-bound. Only operations with an intensity lower than 0.28 Ops/Byte can become memory-bound. Understanding this is a prerequisite to analyzing power efficiency (TOPS/W), as a compute-bound system will have high FLOPS utilization.
  common_mistake: |
    **The Pitfall:** Inverting the ratio (Bytes/Op instead of Ops/Byte) or misaligning units.
    **The Rationale:** Candidates divide 1.2 by 336 (resulting in ~0.0035) or fail to align the Mega (10^6) and Giga (10^9) prefixes.
    **The Consequence:** This gives a ridge point that is orders of magnitude off, completely invalidating the roofline analysis.
  napkin_math: |
    - **Peak Compute:** 336 MFLOPS = 3.36 * 10^8 OPs/s.
    - **Memory Bandwidth:** 1.2 GB/s = 1.2 * 10^9 Bytes/s.
    - **Ridge Point Calculation:** (3.36 * 10^8) / (1.2 * 10^9) = 0.28 OPs/Byte.
    - **INT8 KWS Intensity:** Loads 1 byte for 1 MAC (2 FLOPs) = 2.0 OPs/Byte.
    - **Conclusion:** Since 2.0 > 0.28, the model is solidly in the compute-bound region. The ridge point is **0.28 Ops/Byte**.
  options:
  - 3.57 Ops/Byte
  - 280 Ops/Byte
  - 0.28 Ops/Byte
  - 2.24 Ops/Byte
  correct_index: 2
