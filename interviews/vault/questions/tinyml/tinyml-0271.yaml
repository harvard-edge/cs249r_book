title: The Microcontroller Ridge Point (tinyml-0271)
scenario: You're evaluating a new microcontroller for a keyword spotting model. The datasheet specifies
  it's based on a Cortex-M4, providing around 336 MFLOPS of peak compute and its SRAM has a memory bandwidth
  of 1.2 GB/s. To understand if your models will be limited by memory or compute, you first need to calculate
  the chip's 'ridge point'. What is the arithmetic intensity (in Ops/Byte) required to saturate the processor's
  compute?
question: "What is the arithmetic intensity (in Ops/Byte) required to saturate the processor's compute?"
details:
  realistic_solution: The ridge point is the ratio of the processor's peak compute performance to its
    peak memory bandwidth. For the Cortex-M4, with 336 MFLOPS and 1.2 GB/s of bandwidth, the ridge point
    is 0.28 Ops/Byte. This low value is characteristic of microcontrollers and signifies that most neural
    network layers, even those with relatively low operational intensity, will easily exceed this threshold
    and be compute-bound. Only operations with an intensity lower than 0.28 Ops/Byte can become memory-bound.
    Understanding this is a prerequisite to analyzing power efficiency (TOPS/W), as a compute-bound system
    will have high FLOPS utilization.
  common_mistake: A common mistake is inverting the ratio (calculating Bytes/Op instead of Ops/Byte) or
    making a unit conversion error between MFLOPS (10^6) and GB/s (10^9), leading to an answer that is
    off by orders of magnitude.
  napkin_math: With 336 MFLOPS and an SRAM bandwidth of 1.2 GB/s, the Ridge Point = Peak Compute / Memory Bandwidth. 336 MFLOPS / 1.2 GB/s = 0.28 FLOPs/Byte. A keyword spotting model typically loads 1 byte (INT8) for 2 FLOPs (1 MAC), an arithmetic intensity of 2.0. Since 2.0 > 0.28, it's compute-bound.
  options:
  - 3.57 Ops/Byte
  - 280 Ops/Byte
  - 0.28 Ops/Byte
  - 2.24 Ops/Byte
  correct_index: 2
