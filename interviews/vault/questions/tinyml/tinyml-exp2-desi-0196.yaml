title: On-Device Guardrails for Predictive Maintenance
scenario: You are deploying an anomaly detection system for predictive maintenance on an ARM Cortex-M7
  + Ethos-U55 (Corstone-300). Safety standards dictate that the system cannot autonomously shut down machinery
  without an on-device guardrail verifying the decision, and operators need a basic explanation of the
  fault. Architect an inference pipeline that fits the primary model, a safety guardrail, and an explainability
  logger within the 512 KB shared SRAM. Evaluate the design tradeoffs of implementing the guardrail as
  a secondary model on the Ethos-U55 (128-512 MAC/cycle) versus a deterministic physical-bounds check
  running on the 480 MHz M7.
details:
  realistic_solution: The most robust architecture separates the AI prediction from the safety bounds.
    The Ethos-U55 handles the main anomaly detection. The safety guardrail is implemented as a deterministic,
    physical-limits check (e.g., maximum temperature thresholds) running strictly on the 480 MHz Cortex-M7.
    This provides a distinct failure domain. Explainability is achieved by having the M7 log the top three
    anomalous sensor values that triggered the threshold, rather than computing complex attributions.
  common_mistake: Candidates often propose running a secondary neural network for the guardrail on the
    NPU, which shares the same failure modes as the primary model and unnecessarily consumes the limited
    shared SRAM. They also frequently suggest computationally expensive explainability methods like SHAP
    that exceed the M7's capabilities.
  napkin_math: If the main NPU model uses 400 KB of the 512 KB SRAM, 112 KB remains. Running a secondary
    NPU guardrail model would consume another ~80 KB, leaving just 32 KB for the M7 RTOS, stack, and I/O
    buffers, risking memory exhaustion. Conversely, an M7 deterministic rule-check takes ~15 KB of SRAM
    and requires 10,000 CPU cycles. At 480 MHz, this check takes 10,000 / 480,000,000 = 20.8 microseconds,
    adding negligible latency while preserving 97 KB of SRAM for system operations and explainability
    logging.
