title: The DMA Buffer Corruption
scenario: Your audio keyword spotting system on a Cortex-M7 uses DMA to stream PDM microphone data into a circular buffer in AXI SRAM. The model reads from this buffer for inference. Occasionally — about once every 500 inferences — the model outputs a confident but completely wrong classification. The audio data in the buffer looks correct when you pause and inspect it.
question: Why does Cortex-M7 DMA audio in AXI SRAM produce one confident wrong KWS result every 500 inferences?
details:
  realistic_solution: 'The Cortex-M7 has a data cache (D-cache) — typically 16 KB on STM32H7. The D-cache sits between the CPU and the AXI bus. The DMA controller writes directly to AXI SRAM, bypassing the D-cache. This creates a cache coherency problem: the CPU reads stale cached data instead of the fresh DMA data. The fix is to invalidate the D-cache region before reading DMA buffers.'
  common_mistake: |
    **The Pitfall:** Trusting the debugger's view of memory completely.
    **The Rationale:** Engineers assume that if the data looks correct when paused, the hardware is fine and the model must be at fault.
    **The Consequence:** They fail to realize that pausing the processor flushes the cache, hiding the underlying coherency issue and leading to pointless model retraining.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - D-cache: 16 KB, 4-way set associative, 32-byte lines.
       - DMA buffer: 4 KB = 128 cache lines.
       - Inference tensor arena thrashes cache (~200 KB).
    2. **Calculations:**
       - Probability of a cache line surviving the thrash: P(survive) = (4 ways - 1) / 4 = 0.75 per set access.
       - Over ~50 set accesses during inference: P(survive) = 0.75^50 ≈ 5.66e-7 per line.
       - For 128 lines, expected stale lines: 128 * 5.66e-7 ≈ 0.000072.
       - Correlated eviction makes effective probability of at least one stale line affecting inference ~0.2% = 1 in 500 inferences.
       - Cache invalidation cost: 128 lines * 8 cycles/line = 1,024 cycles = 2.1 µs at 480 MHz.
    3. **Conclusion & Interpretation:**
       - **Result: Cache Coherency Failure.** The rare failure rate mathematically aligns with cache coherency probabilities, and the D-cache invalidation fix takes negligible time.
