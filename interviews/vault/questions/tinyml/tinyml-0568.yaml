title: The 3× Battery Drain Mystery
scenario: Your wearable gesture recognition device uses an RP2040 (dual Cortex-M0+, 133 MHz, 264 KB SRAM)
  with a 150 mAh LiPo battery. Your power budget spreadsheet predicted 45 days of battery life at 1 inference
  per second. Field units die in 15 days. The model inference itself was benchmarked correctly. Where
  is the 3× energy gap?
details:
  realistic_solution: 'The inference model was benchmarked correctly — the 3× gap comes from everything
    the power spreadsheet ignored: (1) always-on sensor current (IMU, ~0.2 mW), (2) LDO quiescent current
    (~0.3 mW), (3) GPIO leakage on unused/floating pins (~0.15 mW), and (4) voltage regulator efficiency
    losses (~15%). These ''invisible'' loads are always present, even during sleep, and collectively exceed
    the MCU''s own sleep current by 10-50×. The fix: measure whole-board current with a µA-resolution
    meter (e.g., Nordic PPK2), account for every component in the power budget, and configure all unused
    GPIOs as inputs with pull-downs.'
  common_mistake: '"The model must be running more often than expected — add a duty cycle counter." The
    inference rate is correct. The problem is everything the spreadsheet didn''t account for.'
  napkin_math: '**Battery:** 150 mAh × 3.7V = 555 mWh. **Predicted (spreadsheet):** Target 45 days → budget
    = 555 mWh / (45 × 24h) = 0.514 mW average = 139 µA at 3.7V. **Actual:** 15 days → actual = 555 mWh
    / (15 × 24h) = 1.54 mW = 416 µA at 3.7V. **Gap: 3.0× (416/139).** The spreadsheet likely only counted:
    MCU inference (1 inf/s × 0.5 mJ = 0.5 mW) + MCU sleep (10 µW) ≈ 0.51 mW → matches 139 µA prediction.
    **What the spreadsheet missed:** (1) IMU always-on: accelerometer at 100 Hz ≈ 0.2 mW. (2) LDO quiescent
    current: typical low-cost LDO Iq ≈ 50-100 µA × 3.7V ≈ 0.19-0.37 mW. (3) GPIO leakage on unused pins:
    ~10-50 µA total. (4) Voltage regulator efficiency loss: ~15% overhead. **Reconstructed budget:** MCU
    active: 0.5 mW. MCU sleep: 0.01 mW. IMU: 0.2 mW. LDO Iq: 0.3 mW. GPIO leakage: 0.15 mW. Regulator
    loss: 0.17 mW. **Total: ~1.33 mW ≈ 360 µA** — close to measured 416 µA. Remaining gap is board-level
    parasitics. **Lesson:** Always measure whole-board current, not just MCU. The MCU is often <40% of
    system power.'
  options:
  - The model is running more inferences per second than expected due to a firmware timer bug that doubles
    the sampling rate in cold temperatures.
  - The power spreadsheet only counted MCU inference and sleep current (~0.51 mW). It missed always-on
    IMU (~0.2 mW), LDO quiescent current (~0.3 mW), GPIO leakage on floating pins (~0.15 mW), and regulator
    efficiency losses (~15%). These 'invisible' loads exceed the MCU's sleep current by 10-50x, explaining
    the 3x energy gap.
  - The RP2040's second core is drawing full active power even during sleep because the dual-core sleep
    mode was not properly configured in firmware.
  - The LiPo battery's actual capacity at typical operating temperatures (10-25C) is only 50% of the rated
    150 mAh, explaining the 3x shorter battery life.
  correct_index: 1
