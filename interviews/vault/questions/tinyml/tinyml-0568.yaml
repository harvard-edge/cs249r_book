validation_issues_pro:
- The scenario states a predicted battery life of 45 days, but the solution's math uses a baseline of
  99 µA which corresponds to 63 days.
- The 'Breakdown of the 420 µA' lists currents that sum to 3000 µA, not 420 µA, making the explanation
  mathematically incoherent.
- The classification RC-10 (trade-offs) and mode 'tradeoff-analysis' are a poor fit; the question is about
  root cause analysis of a failure.
