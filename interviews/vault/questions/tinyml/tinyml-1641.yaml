title: IoT Image Aggregation Capacity
scenario: 10 IoT sensors (Cortex-M4) send 2.5KB grayscale images at 1 fps to a central
  hub. RF protocol maxes out at 150 kbps.
question: Specify whether the network can support this without compression, and calculate
  the utilization.
visual:
  kind: svg
  path: tinyml-1641.svg
  alt: 10 nodes pointing to 1 hub node
  caption: 10-to-1 Star Topology
details:
  realistic_solution: 10 sensors * 2.5KB = 25 KB/s. 25 KB/s * 8 bits/byte = 200 kbps
    total load. Capacity is 150 kbps. Utilization is 200/150 = 133%. Network fails;
    compression required.
  common_mistake: Failing to convert Bytes to bits, calculating 25 < 150 and falsely
    assuming the network works.
  napkin_math: 200 kbps load > 150 kbps link.
