title: IoT Image Aggregation Capacity
scenario: 10 IoT sensors (Cortex-M4) send 2.5KB grayscale images at 1 fps to a central hub. RF protocol maxes out at 150 kbps.
question: Specify whether the network can support this without compression, and calculate the utilization.
visual:
  kind: svg
  path: tinyml-1641.svg
  alt: 10 nodes pointing to 1 hub node
  caption: 10-to-1 Star Topology
details:
  realistic_solution: 10 sensors * 2.5KB = 25 KB/s. 25 KB/s * 8 bits/byte = 200 kbps total load. Capacity is 150 kbps. Utilization is 200/150 = 133%. Network fails; compression required.
  common_mistake: |
    **The Pitfall:** Failing to convert Bytes to bits.
    **The Rationale:** Calculating 25 < 150 by directly comparing KB/s to kbps without unit conversion.
    **The Consequence:** Falsely assuming the network works, leading to severe packet loss and network failure in deployment.
  napkin_math: |
    1. **Calculate total data rate in Bytes:** 10 sensors * 2.5 KB/sensor = 25 KB/s.
    2. **Convert to bits:** 25 KB/s * 8 bits/Byte = 200 kbps total load.
    3. **Compare to capacity:** 200 kbps load > 150 kbps link capacity.
    4. **Calculate utilization:** 200 / 150 = **133%**.
    5. **Conclusion:** Network fails; **compression is required**.
