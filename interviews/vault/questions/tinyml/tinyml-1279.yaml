title: Nordic nRF5340 Dual-Core Clock Frequency Recall
scenario: You are deploying a keyword spotting model on a Nordic nRF5340 for a battery-powered smart home device. The device maintains a constant BLE 5.3 connection while listening for audio triggers.
question: What are the application-core and network-core clock frequencies of the Nordic nRF5340 for mapping BLE and ML workloads?
details:
  realistic_solution: The correct answer is to state that the Nordic nRF5340 features a 128 MHz application core and a 64 MHz network core. The application core is designed to handle heavier compute tasks like ML inference, while the network core is dedicated to the BLE 5.3 stack. You must also recall the memory constraints of 256 KB SRAM and 1 MB flash to ensure the model fits.
  common_mistake: |
    **The Pitfall:** Assuming the nRF5340 has a single core or confusing the clock speeds between the two cores.
    **The Rationale:** Many microcontrollers are single-core, and candidates may guess that both cores run at the same speed (e.g., 64 MHz).
    **The Consequence:** The ML workload is mapped to the slower core or constrained unnecessarily, leading to missed latency deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Device: Nordic nRF5340 (Dual-core).
       - Application Core (ML/DSP): 128 MHz.
       - Network Core (BLE stack): 64 MHz.
       - Active current: ~5 mA.
    2. **Calculations:**
       - Compute Efficiency: 128,000,000 cycles / 5 mA = 25.6 million cycles per mA on the application core.
    3. **Conclusion & Interpretation:**
       - **The 128 MHz application core handles ML, while the 64 MHz network core maintains BLE, preventing ML workloads from stalling the radio.**
       - **Result: Compute-Bound (Core Partitioning).**
