title: Nordic nRF5340 Dual-Core Clock Frequency Recall
scenario: You are deploying a keyword spotting model on a Nordic nRF5340 for a battery-powered
  smart home device. The device maintains a constant BLE 5.3 connection while listening
  for audio triggers. The interviewer asks you to recall the distinct clock frequencies
  of the application and network cores on the nRF5340 to verify where the ML workload
  should be mapped.
question: What are the application-core and network-core clock frequencies of the
  Nordic nRF5340 for mapping BLE and ML workloads?
details:
  realistic_solution: The correct answer is to state that the Nordic nRF5340 features
    a 128 MHz application core and a 64 MHz network core. The application core is
    designed to handle heavier compute tasks like ML inference, while the network
    core is dedicated to the BLE 5.3 stack. You must also recall the memory constraints
    of 256 KB SRAM and 1 MB flash to ensure the model fits.
  common_mistake: Candidates often assume the nRF5340 has a single core or confuse
    the clock speeds between the two cores. They might mistakenly state both cores
    run at 64 MHz, underestimating the compute available for the ML model.
  napkin_math: 'App core frequency = 128 MHz. Net core frequency = 64 MHz. Active
    power consumption is ~5mA. Compute efficiency estimate: 128,000,000 cycles / 5
    mA = 25.6 million cycles per mA on the application core. Model size must fit within
    the 256 KB SRAM and 1 MB flash.'
