title: The Operator Support Gap
scenario: Your person detection model uses MobileNetV2 as the backbone. TFLite Micro on your Cortex-M4 supports 85% of the operators. The remaining 15% include Resize Bilinear (in the feature pyramid), Pad (before some convolutions), and a custom Swish activation.
question: How should MobileNetV2 on a Cortex-M4 replace Resize Bilinear, Pad, and Swish to keep CMSIS-NN coverage?
details:
  realistic_solution: 'Operator support gaps require targeted substitutions, not custom C implementations (which run 10-50x slower than CMSIS-NN kernels). Resize Bilinear: replace with nearest-neighbor resize (fully supported, negligible accuracy impact). Pad: fuse into the subsequent convolution by adjusting input offsets. Swish activation: replace with ReLU6 (supported, -0.3% accuracy). After substitutions: 100% CMSIS-NN coverage, inference drops from 60ms to 18ms (3.3x speedup). The 0.3% accuracy loss is a worthwhile trade for 3.3x latency improvement and guaranteed real-time operation.'
  common_mistake: |
    **The Pitfall:** Implementing missing operators in custom C code.
    **The Rationale:** Candidates assume that writing a quick C function for a missing op is the standard way to unblock deployment.
    **The Consequence:** Unoptimized scalar C code can be 10-50x slower than CMSIS-NN kernels, completely destroying the real-time latency budget.
  napkin_math: |
    * **Baseline (15% in scalar C):** 85% CMSIS-NN (~15ms) + 15% scalar C (~45ms) = **60ms total latency**.
    * **Substitution Strategy:**
      * Resize Bilinear → Nearest-Neighbor (supported, ~0% accuracy drop).
      * Pad → Fuse into conv strides/offsets (supported).
      * Swish → ReLU6 (supported, ~0.3% accuracy drop).
    * **Optimized Latency:** 100% CMSIS-NN = **18ms total latency**.
    * **Conclusion:** Achieves a **3.3x speedup** for a negligible 0.3% accuracy penalty.
