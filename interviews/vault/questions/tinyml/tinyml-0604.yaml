title: The Operator Support Gap
scenario: Your person detection model uses MobileNetV2 as the backbone. TFLite Micro on your Cortex-M4
  supports 85% of the operators. The remaining 15% include Resize Bilinear (in the feature pyramid), Pad
  (before some convolutions), and a custom Swish activation. What is your strategy?
question: "How should MobileNetV2 on a Cortex-M4 replace Resize Bilinear, Pad, and Swish to keep CMSIS-NN coverage?"
details:
  realistic_solution: 'Operator support gaps require targeted substitutions, not custom C implementations
    (which run 10-50x slower than CMSIS-NN kernels). Resize Bilinear: replace with nearest-neighbor resize
    (fully supported, negligible accuracy impact). Pad: fuse into the subsequent convolution by adjusting
    input offsets. Swish activation: replace with ReLU6 (supported, -0.3% accuracy). After substitutions:
    100% CMSIS-NN coverage, inference drops from 60ms to 18ms (3.3x speedup). The 0.3% accuracy loss is
    a worthwhile trade for 3.3x latency improvement and guaranteed real-time operation.'
  common_mistake: '"Implement the missing operators in C." You can, but custom operator implementations
    are unoptimized and can be 10-50× slower than CMSIS-NN kernels, potentially blowing your latency budget.'
  napkin_math: 'Original model: 85% supported (CMSIS-NN, ~15ms) + 15% unsupported (scalar C, ~45ms) =
    60ms total. After substitutions: 100% supported = 18ms total (15ms + 3ms for the slightly different
    ops). Speedup: 3.3×. Accuracy change: -0.3% (Swish→ReLU6) + 0% (resize) + 0% (pad fusion) = -0.3%
    total. Acceptable.'
