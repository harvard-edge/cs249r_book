title: Ethos-U55 CPU Fallback Latency Penalty
scenario: You are deploying a vision model on an ARM Cortex-M7 + Ethos-U55 system. During compiler conversion, an unsupported operator causes a convolutional layer requiring 4.8 million MACs to fall back to the Cortex-M7 CPU.
question: What execution-time penalty occurs when a 4.8M-MAC Ethos-U55 layer falls back to the Cortex-M7, assuming standard CMSIS-NN throughput?
details:
  realistic_solution: 'Calculate the theoretical cycle count for both the NPU and CPU based on their respective MACs/cycle capabilities. Then, divide both cycle counts by the system clock speed to find the execution time, and subtract the NPU time from the CPU time to find the exact fallback penalty.'
  common_mistake: |
    **The Pitfall:** Incorrectly calculating CPU cycle latency.
    **The Rationale:** Candidates forget the specific MAC/cycle throughput differences between the processors and fail to convert cycles into absolute time correctly.
    **The Consequence:** Underestimating the devastating real-time performance impact of an unsupported operator triggering a CPU fallback.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - System clock: 480 MHz.
       - Ethos-U55 throughput: 256 MACs/cycle.
       - Cortex-M7 throughput: 2 MACs/cycle.
       - Target layer: 4.8 million MACs.
    2. **Calculations:**
       - NPU Cycles: 4,800,000 / 256 = 18,750 cycles.
       - NPU Execution Time: 18,750 / 480,000,000 = 39 µs.
       - CPU Cycles: 4,800,000 / 2 = 2,400,000 cycles.
       - CPU Execution Time: 2,400,000 / 480,000,000 = 5,000 µs (5.0 ms).
       - Latency Penalty: 5.000 ms - 0.039 ms = 4.961 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Fallback.** The unsupported operator triggers a ~128x latency regression, adding a **4.961 ms penalty** and highlighting the devastating impact of CPU fallback.
