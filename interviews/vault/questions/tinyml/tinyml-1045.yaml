title: Ethos-U55 CPU Fallback Latency Penalty
scenario: You are deploying a vision model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300)
  system running at 480 MHz. The Ethos-U55 is configured for 256 MACs/cycle and shares
  512 KB SRAM with the M7. During TFLite to Vela compiler conversion, an unsupported
  operator causes a convolutional layer requiring 4.8 million MACs to fall back to
  the Cortex-M7 CPU. Assuming the Cortex-M7 achieves 2 MACs/cycle using CMSIS-NN,
  calculate the absolute execution time penalty incurred by this fallback.
question: What execution-time penalty occurs when a 4.8M-MAC Ethos-U55 layer falls
  back to the Cortex-M7?
details:
  realistic_solution: Calculate the theoretical cycle count for both the NPU and CPU
    based on their respective MACs/cycle capabilities. Then, divide both cycle counts
    by the system clock speed (480 MHz) to find the execution time, and subtract the
    NPU time from the CPU time to find the penalty.
  common_mistake: Candidates often incorrectly calculate the cycle count by forgetting
    the specific MAC/cycle throughput of both processors, or they fail to convert
    the final cycle count into milliseconds using the shared 480 MHz clock frequency.
  napkin_math: '1. NPU Cycles: 4,800,000 MACs / 256 MACs/cycle = 18,750 cycles.

    2. NPU Execution Time: 18,750 cycles / 480,000,000 Hz = 0.000039 seconds (39 microseconds).

    3. CPU Cycles: 4,800,000 MACs / 2 MACs/cycle = 2,400,000 cycles.

    4. CPU Execution Time: 2,400,000 cycles / 480,000,000 Hz = 0.005 seconds (5 milliseconds).

    5. Latency Penalty: 5.000 ms - 0.039 ms = 4.961 milliseconds.'
