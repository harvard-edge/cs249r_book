title: Ethos-U55 CPU Fallback Latency Penalty
scenario: You are deploying a vision model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) system running at 480 MHz. The Ethos-U55 is configured for 256 MACs/cycle and shares 512 KB SRAM with the M7. During TFLite to Vela compiler conversion, an unsupported operator causes a convolutional layer requiring 4.8 million MACs to fall back to the Cortex-M7 CPU. Assuming the Cortex-M7 achieves 2 MACs/cycle using CMSIS-NN.
question: What execution-time penalty occurs when a 4.8M-MAC Ethos-U55 layer falls back to the Cortex-M7?
details:
  realistic_solution: Calculate the theoretical cycle count for both the NPU and CPU based on their respective MACs/cycle capabilities. Then, divide both cycle counts by the system clock speed (480 MHz) to find the execution time, and subtract the NPU time from the CPU time to find the penalty.
  common_mistake: |
    **The Pitfall:** Incorrectly calculating CPU cycle latency.
    **The Rationale:** Candidates forget the specific MAC/cycle throughput differences between the processors and fail to convert cycles into absolute time correctly.
    **The Consequence:** Underestimating the devastating real-time performance impact of an unsupported operator triggering a CPU fallback.
  napkin_math: |
    - NPU Cycles: 4,800,000 MACs / 256 MACs/cycle = 18,750 cycles.
    - NPU Execution Time: 18,750 / 480,000,000 Hz = 0.000039s (39 µs).
    - CPU Cycles: 4,800,000 MACs / 2 MACs/cycle = 2,400,000 cycles.
    - CPU Execution Time: 2,400,000 / 480,000,000 Hz = 0.005s (5,000 µs).
    - Latency Penalty: 5.000 ms - 0.039 ms = **4.961 ms**.
