title: The Contextual Awareness Crash
scenario: You are designing the firmware for a next-gen hearing aid that runs multiple ML models. It uses a small, always-on 20KB Wake Word model. When the wake word is detected, it invokes a larger, 150KB Speaker ID model to verify the user. Your MCU has 512KB of SRAM. The team implements a naive approach: load both models at startup using a shared 150KB tensor arena, assuming they won't run simultaneously. However, when the Wake Word is detected and the Speaker ID model is invoked, the system crashes from an OOM error, even though the maximum required memory at any time is 150KB, and the total system SRAM is 512KB. TFLite Micro's default `SingleArenaBufferAllocator` is being used.
question: What memory management architecture avoids the TFLite Micro single-arena OOM when switching between wake-word and speaker ID models?
details:
  realistic_solution: 'The root cause is the `SingleArenaBufferAllocator` used by TFLite for Microcontrollers. It''s a simple, fast bump allocator that allocates memory from a large, contiguous block (the "tensor arena"). Crucially, it **cannot free memory**. When the Wake Word model is initialized, it permanently carves its 20KB from the start of the 150KB arena. When the Speaker ID model is initialized, it attempts to carve its 150KB right after that, exceeding the 150KB limit and causing an OOM. The memory is never reclaimed. The solution is to dynamically destroy the TFLite Micro interpreter and model state for the Wake Word model, and then re-initialize the interpreter with the Speaker ID model using the exact same starting memory address for the arena. This memory swap takes ~5ms of latency overhead but completely avoids the OOM while utilizing only 150KB of peak SRAM.'
  common_mistake: |
    **The Pitfall:** Blaming generic 'memory fragmentation' or suggesting standard `malloc`/`free`.
    **The Rationale:** Candidates do not understand the underlying mechanics of TFLite Micro's bump allocator, which cannot free memory sequentially.
    **The Consequence:** Implementing convoluted dynamic memory schemes that violate hard real-time constraints instead of simply orchestrating a rapid interpreter teardown/re-init.
  napkin_math: |
    - Wake model: 20KB arena. Speaker ID: 150KB arena.
    - SingleArenaBufferAllocator is a bump allocator with no free().
    - Load wake: allocates 20KB.
    - Load speaker: attempts to allocate 150KB at offset 20KB, requiring 170KB total.
    - 170KB > 150KB arena = OOM Crash.
    - Fix: Destroy wake model (~0.1ms), then allocate 150KB speaker model at offset 0 (~2-5ms).
    - Total latency penalty: **~5ms for a safe model swap.**
