title: The Contextual Awareness Crash
scenario: 'You are designing the firmware for a next-gen hearing aid that runs multiple ML models. It
  uses a small, always-on 20KB ''Wake Word'' model. When the wake word is detected, it''s supposed to
  invoke a larger, 150KB ''Speaker ID'' model to verify the user. Your MCU has 512KB of SRAM. The team
  implements a naive approach: load both models at startup using a shared 150KB tensor arena, assuming
  they won''t run simultaneously. However, when the Wake Word is detected and the Speaker ID model is
  invoked, the system crashes from an OOM error, even though the maximum required memory at any time is
  150KB, and the total system SRAM is 512KB. TFLite Micro''s default `SingleArenaBufferAllocator` is being
  used. Formulate a memory management architecture that allows for deterministic and safe invocation of
  multiple, variably-sized models. Your solution must account for the latency cost of your proposed architecture.'
details:
  realistic_solution: The root cause is the `SingleArenaBufferAllocator` used by TFLite for Microcontrollers.
    It's a simple, fast bump allocator that allocates memory from a large, contiguous block (the 'tensor
    arena'). Crucially, it **cannot free memory**. When the Wake Word model is initialized, it permanently
    carves its 20KB from the start of the 150KB arena. When the Speaker ID model is initialized, it attempts
    to carve its 150KB right after that, exceeding the 150KB limit and causing an OOM. The memory is never
    reclaimed.
  common_mistake: Blaming generic 'memory fragmentation' without understanding the specific allocation
    mechanism of TFLite Micro. A junior answer suggests using `malloc` and `free`, which is often disabled
    or non-deterministic in hard real-time systems. They also fail to consider the performance implications
    (latency) of loading/unloading models.
  napkin_math: 'Wake model: 20KB arena. Speaker ID: 150KB arena. SingleArenaBufferAllocator = bump allocator,
    no free(). Load wake: occupies 20KB. Load speaker: needs 150KB starting at offset 20KB = needs 170KB
    total > 150KB arena. OOM. Fix: destroy + reinitialize arena. Teardown wake model: ~0.1ms. Reallocate
    150KB arena + load speaker: ~2-5ms. Total latency penalty: ~5ms for safe model swap.'
