title: Constrained Memory Allocation
scenario: An INT8 CNN requires 300KB for weights and 50KB for peak intermediate activations.
  The target Cortex-M4 has 256KB SRAM and 1MB Flash.
question: How must the model's memory be laid out to successfully execute without
  out-of-memory errors?
details:
  realistic_solution: The 300KB of read-only INT8 weights must be stored in the 1MB
    Flash memory and read sequentially (Execute in Place). The 50KB of mutable intermediate
    activations are allocated in the 256KB SRAM.
  common_mistake: Attempting to load all weights into SRAM during initialization.
  napkin_math: 300 KB < 1024 KB Flash; 50 KB < 256 KB SRAM
