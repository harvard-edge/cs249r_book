title: TinyML On-Device Review Spec
scenario: A TinyML medical sensor adapts thresholds locally but cannot store raw patient
  data. Specify the review evidence needed before allowing local adaptation in the
  field.
question: What review evidence is required before a TinyML medical sensor can adapt
  thresholds locally without storing raw data?
details:
  realistic_solution: The spec should require bounded adaptation rules, audit counters,
    rollback thresholds, validation across patient subgroups, clinician override,
    firmware versioning, and proof that no raw data is persisted. Local adaptation
    must be constrained and observable despite privacy limits.
  common_mistake: Treating “no raw data stored” as sufficient safety evidence for
    local adaptation.
  napkin_math: If only 32 counters of 4 bytes are stored, the audit footprint is 128
    bytes, but the counters must be chosen to support safety review.
