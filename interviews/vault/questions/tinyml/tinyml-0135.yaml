title: TinyML Model Serving Pipeline
scenario: 'You''re building a smart factory quality inspection system on an STM32H7 (Cortex-M7, 480 MHz,
  1 MB SRAM, 2 MB flash). The system inspects products on a conveyor belt moving at 0.5 m/s. Each product
  is 10 cm long, giving a 200ms window per product. The pipeline: camera capture (DCMI + DMA) → preprocessing
  (resize, normalize) → inference (defect detection CNN) → actuator trigger (reject solenoid via GPIO).
  Design the serving pipeline to guarantee zero missed products.'
question: "How would you schedule camera DMA, preprocessing, inference, and GPIO actuation within a 200 ms conveyor window?"
details:
  realistic_solution: 'Design a hard real-time pipeline with WCET analysis per stage: camera capture via
    DCMI+DMA (~3ms), preprocessing with fixed-point resize+normalize (~5ms), CNN inference (~1.6ms for
    a pruned 150KB model), and GPIO actuator trigger (<0.5ms). Total WCET: ~10.5ms, well within the 200ms
    window (5.25% utilization). Use triple-redundant inference (31.5ms total, 15.75% utilization) for
    safety. Key: DMA double-buffering decouples capture from compute so the next product''s image loads
    while the current one is classified.'
  common_mistake: '"If inference takes <200ms, we''re fine." This ignores the pipeline stages that must
    complete sequentially AND the jitter in each stage. A single stage exceeding its budget causes a missed
    product.'
  napkin_math: 'Conveyor: 0.5 m/s, product = 10 cm, window = 200ms. Pipeline WCET: 10.5ms (single), 31.5ms
    (3× for robustness). Utilization: 31.5 / 200 = 15.75%. Products per minute: 0.5 m/s / 0.1 m = 5 products/s
    = 300/min. Inferences per minute: 300 × 3 = 900. CPU utilization for inference: 900 × 1.6ms / 60,000ms
    = 2.4%. The M7 is vastly underutilized — you could inspect 10× faster conveyors or run a 10× larger
    model. Flash budget: CNN weights = 150 KB (1.5M params × 0.1 bytes avg with pruning). Firmware = 200
    KB. OTA staging = 500 KB. Total: 850 KB / 2 MB = 42.5%.'
