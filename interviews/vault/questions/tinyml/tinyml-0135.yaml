title: TinyML Model Serving Pipeline
scenario: 'You''re building a smart factory quality inspection system on an STM32H7 (Cortex-M7, 480 MHz, 1 MB SRAM, 2 MB flash). The system inspects products on a conveyor belt moving at 0.5 m/s. Each product is 10 cm long, giving a 200 ms window per product. The pipeline is: camera capture (DCMI + DMA) -> preprocessing -> inference -> actuator trigger.'
question: How would you schedule camera DMA, preprocessing, inference, and GPIO actuation within a 200 ms conveyor window to guarantee zero missed products?
details:
  realistic_solution: Design a hard real-time pipeline with strict Worst-Case Execution Time (WCET) analysis. Utilize DCMI+DMA double-buffering to decouple image capture from compute, allowing the next image to load concurrently with inference. Execute preprocessing and INT8 CNN inference sequentially within a ~10.5 ms total WCET budget. This represents ~5.25% utilization, leaving massive headroom for multi-pass triple-redundancy to guarantee functional safety.
  common_mistake: |
    **The Pitfall:** Relying on average execution time instead of WCET analysis.
    **The Rationale:** Candidates assume that if inference takes less than 200 ms on average, the system is safe.
    **The Consequence:** Pipeline jitter or a single anomalous frame causes sequential blocking, missing the 200 ms hard deadline and letting defective products pass.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Conveyor window: 200 ms.
       - DCMI+DMA capture: 3 ms.
       - Preprocessing: 5 ms.
       - CNN Inference: 1.6 ms.
       - Actuation: 0.5 ms.
    2. **Calculations:**
       - Single Pass WCET: 3 + 5 + 1.6 + 0.5 = 10.1 ms.
       - Triple-redundant WCET: 10.1 ms * 3 = 30.3 ms.
       - Utilization: 30.3 ms / 200 ms = 15.15%.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Abundant.** The 30.3 ms WCET easily fits the 200 ms window, allowing for triple redundancy with zero missed deadlines.
