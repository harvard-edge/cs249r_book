title: Arena Fragmentation in Dynamic TinyML Workloads
scenario: Your MCU application on Cortex-M7 (512 KB SRAM) previously switched between 3 TFLite Micro models using a max-sized 300 KB fixed arena. A new requirement adds a fourth model requiring a 350 KB arena, but you can only dedicate 310 KB to the tensor arena.
question: How would you design an arena management strategy that supports all 4 models without exceeding the strict 310 KB SRAM limit?
details:
  realistic_solution: 'The 350 KB model doesn''t fit in 310 KB — so you must reduce its arena size or restructure memory. Options: (1) Model-specific optimizations: analyze the 350 KB model''s memory plan. Often, 10-15% of arena is padding/alignment waste. Re-running the TFLite Micro memory planner with tighter alignment (4-byte vs 16-byte) might reduce to 310 KB. (2) Overlay strategy: partition the 310 KB arena into a fixed region (used by all models, ~180 KB) and a swappable region (130 KB). For the 350 KB model: use the fixed 180 KB + swappable 130 KB = 310 KB. Spill the remaining 40 KB of tensors to flash (sequential write/read for skip connections). (3) Model surgery: the 350 KB model likely has one bottleneck layer. Apply channel splitting (as in tensor-arena-planning) to reduce the peak layer''s activation size by splitting into 2 passes. Target: reduce peak from 350 to 310 KB. (4) Two-tier arena: 310 KB in SRAM + use the flash-backed memory for cold tensors. All approaches maintain static allocation — no malloc at runtime.'
  common_mistake: |
    **The Pitfall:** Implementing dynamic memory allocation (`malloc`/`free`) for each model's arena.
    **The Rationale:** Candidates think allocating and freeing memory perfectly matches the memory footprint of the currently active model.
    **The Consequence:** Dynamic allocation causes heap fragmentation over time, leading to non-deterministic allocation times and inevitable hard faults in long-running embedded systems.
  napkin_math: |
    - **Current Max Arena:** max(180, 250, 300) = 300 KB.
    - **New Max Arena:** max(180, 250, 300, 350) = 350 KB (exceeds 310 KB by 40 KB).
    - **Channel Splitting:** If the 350 KB model has an 80 KB peak activation layer, splitting it 2-way saves 40 KB. New arena size = 310 KB.
    - **Flash Spill (Alternative):** Spill 40 KB of cold tensors to Flash. Write 40 KB at 1 MB/s = 40 ms, read at 50 MB/s = 0.8 ms. Total penalty = ~41 ms per inference.
    - **Alignment Optimization:** Dropping 16-byte alignment to 4-byte saves ~3-5% (10-17 KB).
    - **Conclusion:** Combining **channel splitting** or **Flash spilling** reduces peak SRAM to exactly 310 KB.
