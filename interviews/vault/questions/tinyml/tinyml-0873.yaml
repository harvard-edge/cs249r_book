title: 'Model Format Conversion: Size TFLM Model for Cortex-M4 Flash and SRAM'
scenario: 'Size the Flash and SRAM requirements for deploying a MobileNetV1-0.25 model (475K params, INT8) on Cortex-M4. Include: model Flatbuffer in Flash, TFLM op kernels in Flash, activation tensor arena in SRAM, and TFLM runtime overhead in SRAM. Verify all constraints.'
question: How would you size Flash and SRAM for MobileNetV1-0.25 INT8 on a 512 KB Flash, 256 KB SRAM Cortex-M4?
details:
  realistic_solution: 'Flash: model Flatbuffer 475KB (EXCEEDS 512KB Flash if app code is included). Problem: 475KB model alone uses 92.8% of Flash. Application code (bootloader + firmware): ~64KB. Total: 539KB > 512KB. Fix: use Flash with execute-in-place (XIP) + external QSPI Flash (4MB). Or reduce model: MobileNetV1-0.1 (47K params) = 47KB -> 47+64=111KB Flash. SRAM: Activation arena for MobileNetV1-0.25: peak ~100KB. TFLM runtime: 30KB. Total SRAM: 130KB < 256KB.'
  common_mistake: |
    **The Pitfall:** Adding read-only model weights to the SRAM budget.
    **The Rationale:** Candidates incorrectly assume the entire model must be loaded into RAM, just like on a desktop GPU.
    **The Consequence:** They erroneously conclude that models cannot fit on the MCU.
  napkin_math: |
    1. **Assumptions & Constraints:** MobileNetV1-0.25 (475 KB model). Flash budget: 512 KB. App size: 64 KB. MobileNetV1-0.1 (47 KB model).
    2. **Calculations:** V1-0.25 Flash = 475 + 64 = 539 KB (Exceeds 512 KB). V1-0.1 Flash = 47 + 64 = 111 KB (Fits). SRAM = 25 KB + 30 KB = 55 KB (Fits).
    3. **Conclusion & Interpretation:** **The -0.25 variant fails Flash constraints, but the -0.1 variant easily fits both Flash and SRAM. Result: Memory-Capacity-Bound.**
