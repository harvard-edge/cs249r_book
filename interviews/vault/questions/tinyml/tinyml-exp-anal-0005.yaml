title: DMA Overhead on Small Audio Chunks
scenario: You are optimizing a continuous keyword spotting pipeline on a Nordic nRF5340 (128 MHz app core,
  256 KB SRAM, 1 MB flash, ~5mA active). The audio sensor provides 16-bit PCM samples, and the system
  triggers a data transfer every 16 samples (32 bytes). A colleague enabled DMA to move these 32-byte
  chunks from the I2S peripheral to SRAM, expecting lower power consumption compared to an interrupt-driven
  CPU copy. Instead, the overall system power consumption increased. Explain why this behavior occurs.
details:
  realistic_solution: For very small payloads, the fixed cycle cost of setting up the DMA peripheral exceeds
    the cost of a simple CPU memory copy. The CPU is awake longer to configure the DMA than it would be
    to just copy the data. The correct approach is to either increase the transfer chunk size to amortize
    the setup cost, or revert to a direct CPU copy for the 32-byte transfers.
  common_mistake: Candidates often assume DMA is universally more efficient than the CPU for data movement,
    forgetting that configuring DMA registers and handling completion interrupts has a fixed cycle cost.
    They fail to compare this fixed overhead against the extremely fast execution of a CPU copy for tiny
    payloads.
  napkin_math: A direct CPU copy of 32 bytes using 32-bit loads/stores takes 8 operations (~8 cycles).
    At 128 MHz, 8 cycles = 62.5 ns. Setting up DMA registers and context switching for the DMA ISR takes
    ~50 cycles. At 128 MHz, 50 cycles = 390 ns. Both approaches require the CPU to be active (~5mA). Thus,
    the DMA approach keeps the CPU active for over 6x longer per transfer, increasing energy consumption.
