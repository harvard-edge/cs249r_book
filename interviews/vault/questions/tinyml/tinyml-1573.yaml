title: Wildlife Camera RPO Overhead
scenario: A wildlife camera powered by a Cortex-M4 saves local INT8 inferences to
  a slow SD card. A full state write takes 200ms and is scheduled exactly once every
  5 minutes.
question: Summarize the system's Recovery Point Objective (RPO) and compute the cumulative
  daily time overhead spent strictly on SD card writes.
visual:
  kind: svg
  path: tinyml-1573.svg
  alt: A timeline emphasizing the empty 5-minute gaps between write operations, labeled
    as the RPO window.
  caption: RPO Window Illustration
details:
  realistic_solution: 'The RPO is the maximum time window of lost data, which matches
    the interval between writes: exactly 5 minutes. Over a 24-hour day (1440 minutes),
    there are 1440 / 5 = 288 writes. The daily time overhead is 288 * 0.2 seconds
    = 57.6 seconds per day spent writing.'
  common_mistake: Confusing RPO (data loss window) with RTO (recovery time) and stating
    the RPO is the 200ms write duration.
  napkin_math: (1440 min / 5 min) * 0.2s = 57.6s
