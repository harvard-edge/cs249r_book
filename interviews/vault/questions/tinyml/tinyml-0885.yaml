title: 'Model Size Estimation: Master Memory-Constrained Model Selection for Medical Wearable'
scenario: Select and justify the memory-optimal model architecture for a medical-grade arrhythmia detector on ESP32-S3 (240MHz, 512KB SRAM, 8MB PSRAM, 16MB Flash). Requirements: >95% sensitivity, <1% false positive rate on MIT-BIH, always-on at 360Hz ECG, 5-year battery life on AAA cell.
question: "Which model and platform choice can meet the medical arrhythmia accuracy and 5-year battery requirements, and why?"
details:
  realistic_solution: 'AAA: 1200mAh * 1.5V = 1.8Wh. 5 years = 43,800h. Power budget: 1800mWh/43800h = 0.041mW avg. ESP32-S3 deep sleep: 20μA * 3.3V = 66μW. That alone exceeds budget! Need ultra-low-power MCU.'
  common_mistake: |
    **The Pitfall:** Choosing a model architecture that meets accuracy requirements but fails the power budget.
    **The Rationale:** Candidates focus entirely on memory constraints and model performance metrics.
    **The Consequence:** They propose a system using an ESP32-S3 that fundamentally cannot achieve a 5-year battery life on a AAA cell.
  napkin_math: |
    1. Calculate battery capacity: AAA cell = 1200 mAh * 1.5 V = 1.8 Wh.
    2. Calculate 5-year power budget: 1.8 Wh / 43,800 h = 0.041 mW (or 27 μA at 1.5V).
    3. Evaluate ESP32-S3 deep sleep: 20 μA * 3.3V = 66 μW (Exceeds 41 μW budget before any compute).
    4. Evaluate Cortex-M4 class MCU: Sleep is ~2 μA. Active at 0.5% duty cycle: (0.005 * 10,000 μA) + (0.995 * 2 μA) = 52 μA.
    5. **Final Result: The ESP32-S3 fundamentally fails the 5-year budget; an ultra-low-power MCU like Cortex-M4 is required.**
