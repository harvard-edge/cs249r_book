title: 'Model Size Estimation: Master Memory-Constrained Model Selection for Medical Wearable'
scenario: 'Select and justify the memory-optimal model architecture for a medical-grade arrhythmia detector. Requirements: >95% sensitivity, <1% false positive rate on MIT-BIH, always-on at 360Hz ECG, 5-year battery life on AAA cell.'
question: "Which model and platform choice can meet the medical arrhythmia accuracy and 5-year battery requirements, and why?"
details:
  realistic_solution: 'AAA battery is 1200mAh * 1.5V = 1.8Wh. 5 years = 43,800h. Power budget: 1800mWh/43800h = 41μW avg. ESP32-S3 deep sleep alone (20μA * 3.3V = 66μW) exceeds budget. An ultra-low-power MCU with aggressive duty-cycling is structurally required.'
  common_mistake: |
    **The Pitfall:** Choosing a model architecture that meets accuracy requirements but fails the power budget.
    **The Rationale:** Candidates focus entirely on memory constraints and model performance metrics, applying cloud-centric evaluation.
    **The Consequence:** They propose a system using a platform that fundamentally cannot achieve a 5-year battery life on a AAA cell.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Battery: AAA cell (1200 mAh, 1.5V).
       - Lifespan target: 5 years (43,800 h).
       - Hardware evaluated: ESP32-S3 vs Cortex-M4 class.
    2. **Calculations:**
       - Total capacity: 1200 mAh * 1.5V = 1.8 Wh.
       - Continuous budget: 1.8 Wh / 43,800 h = 41 μW.
       - ESP32-S3 sleep power: 20 μA * 3.3V = 66 μW.
       - Cortex-M4 sleep power: ~2 μA * 3.0V = 6 μW.
    3. **Conclusion & Interpretation:**
       - **Result: ESP32-S3 sleep exceeds the 41 μW budget (Power-Bound). Ultra-low-power MCU required.**
