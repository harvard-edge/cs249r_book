title: The Whole-Graph Arena Plan
scenario: Your team is debugging an 'arena is too small' error on a device. You have the memory plan for
  a simple two-op model from the TFLM analyzer. The runtime will manage buffer reuse between ops.
details:
  realistic_solution: To find the minimum arena size, we must simulate the execution and find the point
    in time where the sum of all live tensors is at its maximum. Persistent tensors from earlier ops remain
    live throughout the graph's execution.
  common_mistake: 'Engineers often make one of two mistakes: either they incorrectly sum the memory requirements
    of all ops without considering reuse (e.g., (10+50+5) + (50+20)), leading to a vastly overestimated
    size. Or, they correctly find the peak tensor usage but forget to add the runtime''s required 10 KB
    tail, causing an off-by-a-little error that still fails on-device.'
  napkin_math: Cortex-M4 has 256KB SRAM. Op1 uses 10KB (Input) + 50KB (Output) + 5KB (Persistent) = 65KB.
    Op2 uses Op1's Output as Input (50KB) + new Output (150KB) + Persistent (5KB) = 205KB. Peak memory
    during the transition is 50KB + 150KB + 5KB + 10KB (briefly overlapping) = 215KB. 215KB < 256KB SRAM,
    so it fits, but leaves only 41KB for the OS and heap.
  options:
  - 75 KB
  - 145 KB
  - 85 KB
  - 80 KB
  correct_index: 2
