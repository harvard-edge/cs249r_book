title: The Whole-Graph Arena Plan
scenario: "Your team is debugging an 'arena is too small' error on a device. You have the memory plan for a simple two-op model from the TFLM analyzer. Op1 requires a 10 KB input tensor, a 50 KB output tensor, and 5 KB for persistent parameters. Op2 takes Op1's output as its input, and produces a 20 KB output tensor. The runtime will manage buffer reuse between ops, and requires a 10 KB tail for its internal state."
question: "How do you compute the minimum tensor arena size for a two-op TFLM model with buffer reuse and runtime tail overhead?"
details:
  realistic_solution: To find the minimum arena size, we must simulate the execution and find the point
    in time where the sum of all live tensors is at its maximum. Persistent tensors from earlier ops remain
    live throughout the graph's execution.
  common_mistake: 'Engineers often make one of two mistakes: either they incorrectly sum the memory requirements
    of all ops without considering reuse (e.g., (10+50+5) + (50+20)), leading to a vastly overestimated
    size. Or, they correctly find the peak tensor usage but forget to add the runtime''s required 10 KB
    tail, causing an off-by-a-little error that still fails on-device.'
  napkin_math: 'Cortex-M4 has 256KB SRAM. Op1 uses 10KB (Input) + 50KB (Output) + 5KB (Persistent) = 65KB.
    Op2 uses Op1''s Output as Input (50KB) + new Output (20KB) = 70KB. Peak memory
    during the transition is 50KB (Op1 Out) + 20KB (Op2 Out) + 5KB (Persistent) + 10KB (runtime tail) = 85KB.
    85KB < 256KB SRAM, so it fits comfortably.'
  options:
  - 75 KB
  - 145 KB
  - 85 KB
  - 80 KB
  correct_index: 2
