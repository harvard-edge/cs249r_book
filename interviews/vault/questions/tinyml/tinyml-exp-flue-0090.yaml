title: Energy Cost of Memory vs Compute on Ethos-U55
scenario: You are deploying a keyword spotting model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform
  running at 480 MHz with 512 KB of shared SRAM. The model contains a dense classification layer requiring
  100 KB of 8-bit weights. The NPU must fetch all 100 KB from the shared SRAM to perform 100,000 MAC operations.
  Using standard Horowitz table estimations—where an 8-bit MAC costs ~0.2pJ and a 32-bit SRAM read costs
  ~10pJ—estimate the total energy required for this layer's compute and weight memory accesses.
details:
  realistic_solution: A proficient TinyML engineer knows that data movement dominates power consumption,
    as demonstrated by Horowitz's energy tables. By calculating the compute and memory fetch energies
    separately, the engineer proves that SRAM accesses cost significantly more than pure arithmetic. This
    insight drives design decisions like aggressive weight quantization, clustering, or maximizing register-file
    reuse.
  common_mistake: Candidates often focus solely on the arithmetic (MAC) operations to calculate power
    and completely ignore the energy cost of fetching data from SRAM. Additionally, they may fail to convert
    the total byte count into the correct number of 32-bit word memory accesses.
  napkin_math: '1. Compute Cost: 100,000 MACs * 0.2 pJ/MAC = 20,000 pJ = 0.02 uJ. 2. Memory Accesses:
    100 KB of 8-bit weights fetched via 32-bit (4-byte) SRAM reads = 100,000 bytes / 4 bytes = 25,000
    SRAM accesses. 3. Memory Cost: 25,000 accesses * 10 pJ/access = 250,000 pJ = 0.25 uJ. 4. Total Energy
    = 0.02 uJ (Compute) + 0.25 uJ (Memory) = 0.27 uJ. Memory consumes over 12x more energy than compute.'
