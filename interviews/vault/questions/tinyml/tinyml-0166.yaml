title: The SRAM Budget Constraint
scenario: You're deploying a keyword spotting model to a Cortex-M4 microcontroller. Before analyzing the model's peak memory usage, you first need to know your total budget.
question: What is the typical on-chip SRAM size you can expect to work with for the Tensor Arena?
details:
  realistic_solution: 'The typical SRAM budget is hundreds of kilobytes, e.g., 256 KB on a Cortex-M4. This memory holds input, output, and all intermediate activation tensors during inference. For a keyword spotting model: input MFCC features = 40 * 49 * 1 byte (INT8) = 1.96 KB. First conv output = 20 * 25 * 64 = 32 KB (the largest tensor, setting the peak). Arena peak: input (2 KB) + largest intermediate (32 KB) coexisting = 34 KB. On 256 KB SRAM: 34 KB arena + 50 KB model weights (if loaded to SRAM) + 16 KB stack + 8 KB RTOS = 108 KB used, 148 KB free. A model with 128-channel intermediates: 20 * 25 * 128 = 64 KB peak, still fits with 84 KB margin. The critical constraint is peak memory (simultaneous live tensors), not total model parameter count.'
  common_mistake: |
    **The Pitfall:** Confusing on-chip SRAM with off-chip DRAM.
    **The Rationale:** Candidates apply mobile or cloud assumptions (megabytes/gigabytes) to deeply embedded microcontrollers.
    **The Consequence:** They propose models that are orders of magnitude too large to fit in physical memory.
  napkin_math: |
    * Typical MCU SRAM = 256 KB.
    * Typical Mobile RAM = 8 GB.
    * Ratio = 8,589,934,592 bytes / 262,144 bytes = 32,768x.
    * **Result: A phone has over 32,000x more RAM; a single 1 MB tensor exceeds the entire MCU budget.**
  options:
  - ~8 GB
  - ~2 MB
  - ~256 KB
  - ~50 mW
  correct_index: 2
