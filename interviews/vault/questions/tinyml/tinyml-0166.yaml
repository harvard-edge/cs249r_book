title: The SRAM Budget Constraint
scenario: You're deploying a keyword spotting model to a Cortex-M4 microcontroller. Before analyzing the
  model's peak memory usage, you first need to know your total budget. What is the typical on-chip SRAM
  size you can expect to work with for the Tensor Arena?
details:
  realistic_solution: 'The typical SRAM budget is hundreds of kilobytes, e.g., 256 KB on a Cortex-M4.
    This memory holds input, output, and all intermediate activation tensors during inference. For a keyword
    spotting model: input MFCC features = 40 * 49 * 1 byte (INT8) = 1.96 KB. First conv output = 20 *
    25 * 64 = 32 KB (the largest tensor, setting the peak). Arena peak: input (2 KB) + largest intermediate
    (32 KB) coexisting = 34 KB. On 256 KB SRAM: 34 KB arena + 50 KB model weights (if loaded to SRAM)
    + 16 KB stack + 8 KB RTOS = 108 KB used, 148 KB free. A model with 128-channel intermediates: 20 *
    25 * 128 = 64 KB peak, still fits with 84 KB margin. The critical constraint is peak memory (simultaneous
    live tensors), not total model parameter count.'
  common_mistake: Candidates often confuse on-chip SRAM with off-chip DRAM or Flash storage. They might
    assume memory is in the megabytes or even gigabytes, like on a mobile phone, failing to appreciate
    the extreme constraints of a microcontroller.
  napkin_math: 'A typical TinyML device has ~256 KB of SRAM. A mobile phone has ~8 GB of RAM. Ratio: 8
    GB / 256 KB = (8 × 1,073,741,824) / (256 × 1,024) = 8,589,934,592 / 262,144 = **32,768×**. A phone
    has over 32,000× more RAM than a microcontroller. This illustrates the massive resource gap: a single
    INT8 activation tensor of 256 × 256 × 16 = 1 MB already exceeds the entire MCU SRAM budget.'
  options:
  - ~8 GB
  - ~2 MB
  - ~256 KB
  - ~50 mW
  correct_index: 2
