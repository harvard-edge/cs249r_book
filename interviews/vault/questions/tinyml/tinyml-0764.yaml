title: The MFCC Feature Memory Budget
scenario: A keyword spotting system on a Cortex-M4 computes 40 MFCC features from 1-second audio windows
  with a 30ms frame step. Each MFCC value is stored as an INT8. Calculate the total SRAM needed for the
  feature matrix that feeds the neural network.
details:
  realistic_solution: 'Number of frames in 1 second with 30ms step: floor(1000/30) = 33 frames. Feature
    matrix: 33 frames × 40 MFCCs × 1 byte (INT8) = 1,320 bytes. This is tiny — only 0.5% of 256 KB SRAM.
    This is why MFCC features are so popular on MCUs: they compress ~16 KB/s of raw audio into ~1.3 KB
    of features per second.'
  common_mistake: Confusing frame length with frame step. The number of frames is determined by the step
    (stride), not the window length. Also, some forget to check whether the result fits in SRAM alongside
    the model.
  napkin_math: 'Frames = floor(1000ms / 30ms) = 33. Matrix = 33 × 40 × 1 B = 1,320 B ≈ 1.3 KB. Raw 16
    kHz audio for 1s = 16,000 × 2 B = 32 KB. Compression ratio: 32 KB / 1.3 KB ≈ 24×.'
  options:
  - A) 160 bytes (40 features × 4 bytes)
  - B) 1,320 bytes (33 frames × 40 features × 1 byte)
  - C) 5,280 bytes (33 frames × 40 features × 4 bytes)
  - D) 32,000 bytes (raw audio for 1 second)
  correct_index: 1
