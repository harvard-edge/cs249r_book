title: The MFCC Feature Memory Budget
scenario: A keyword spotting system on a Cortex-M4 computes 40 MFCC features from 1-second audio windows with a 30ms frame step. Each MFCC value is stored as an INT8.
question: How would you calculate the total SRAM needed for the feature matrix that feeds the neural network?
details:
  realistic_solution: 'Number of frames in 1 second with 30ms step: floor(1000/30) = 33 frames. Feature matrix: 33 frames × 40 MFCCs × 1 byte (INT8) = 1,320 bytes. This is tiny — only 0.5% of 256 KB SRAM. This is why MFCC features are so popular on MCUs: they compress ~16 KB/s of raw audio into ~1.3 KB of features per second.'
  common_mistake: |
    **The Pitfall:** Confusing frame length with frame step.
    **The Rationale:** Candidates often use the window length (e.g., 40ms or 1000ms) to calculate the number of frames, rather than the step (stride) size.
    **The Consequence:** This produces a wildly incorrect feature matrix size, leading to poor memory planning.
  napkin_math: |
    - **Number of Frames:** 1000 ms / 30 ms step = 33.33 -> 33 frames.
    - **Features per Frame:** 40 MFCCs.
    - **Bytes per Feature:** 1 byte (INT8).
    - **Total Matrix Size:** 33 frames * 40 features * 1 byte = **1,320 bytes**.
    - **Compression Ratio:** Raw 16 kHz audio (1 sec) = 32,000 bytes. 32,000 / 1,320 ≈ 24x compression.
  options:
  - A) 160 bytes (40 features × 4 bytes)
  - B) 1,320 bytes (33 frames × 40 features × 1 byte)
  - C) 5,280 bytes (33 frames × 40 features × 4 bytes)
  - D) 32,000 bytes (raw audio for 1 second)
  correct_index: 1
