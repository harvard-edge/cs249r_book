title: Ethos-U55 Compiler Fallback Latency
scenario: You are compiling a TFLite model using the Vela compiler for an ARM Corstone-300 subsystem featuring
  a Cortex-M7 (480 MHz), 512 KB shared SRAM, and an Ethos-U55 NPU (configured for 256 MAC/cycle). During
  conversion, an unsupported operator causes 10% of the model's 2.56 million total MACs to fall back to
  the Cortex-M7. Assuming the M7 achieves 2 MACs/cycle using CMSIS-NN and the NPU achieves its peak 256
  MACs/cycle, calculate the total inference cycles and the percentage of execution time spent on the CPU
  fallback.
details:
  realistic_solution: The correct approach is to compute the independent cycle counts for both processors
    based on their respective throughputs and sum them up (accounting for the lack of parallel execution
    in standard TFLite Micro fallback). To fix this in practice, the engineer must replace the unsupported
    operator with an NPU-supported alternative before conversion to keep the entire graph delegated to
    the Ethos-U55.
  common_mistake: Candidates often assume that a 10% fallback in MAC operations equates to a roughly 10%
    penalty in overall latency. They fail to quantify the massive throughput disparity between the NPU
    and the CPU, ignoring how CPU fallback can completely bottleneck a heterogeneous TinyML pipeline.
  napkin_math: '1. Total Workload = 2,560,000 MACs.

    2. CPU Fallback Workload (10%) = 256,000 MACs.

    3. NPU Workload (90%) = 2,304,000 MACs.

    4. CPU Execution Cycles = 256,000 MACs / 2 MACs/cycle = 128,000 cycles.

    5. NPU Execution Cycles = 2,304,000 MACs / 256 MACs/cycle = 9,000 cycles.

    6. Total Inference Cycles = 128,000 + 9,000 = 137,000 cycles.

    7. Total Time at 480 MHz = 137,000 cycles / 480,000 cycles/ms = ~0.285 ms.

    8. CPU Time Percentage = (128,000 / 137,000) * 100 = 93.4%. The 10% operation fallback consumes over
    93% of the execution time.'
