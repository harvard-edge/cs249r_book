title: The MCU Performance Bottleneck
scenario: 'When running a typical ML model on a Cortex-M4 microcontroller, which is the most likely performance
  bottleneck: the processor''s ability to perform calculations (compute) or its ability to fetch data
  from on-chip SRAM (memory)?'
question: "Is a typical Cortex-M4 ML model more likely compute-bound or SRAM-bandwidth-bound, and why?"
details:
  realistic_solution: The system is overwhelmingly **compute-bound**. The Cortex-M4's processor is extremely
    slow compared to its on-chip SRAM bandwidth. The hardware's 'ridge point'—the ratio of its peak compute
    to peak memory bandwidth—is very low. This means that even models with low arithmetic intensity will
    be limited by the processor's calculation speed, not by how fast they can get data.
  common_mistake: Applying intuition from datacenter GPUs, where large models are frequently memory-bound.
    Engineers often assume memory is always the bottleneck, but on a resource-constrained MCU, the physics
    are different. The on-chip SRAM is relatively fast compared to the very slow processor core.
  napkin_math: We can identify the bottleneck by calculating the hardware's ridge point (Ops/Byte ratio).
  options:
  - It is memory-bound; fetching weights from SRAM is the bottleneck.
  - It is compute-bound; the processor's calculation speed is the bottleneck.
  - It is I/O-bound; the SPI bus for sensor data is the bottleneck.
  - The compute and memory are perfectly balanced.
  correct_index: 1
