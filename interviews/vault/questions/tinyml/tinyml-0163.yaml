title: The MCU Performance Bottleneck
scenario: 'When running a typical ML model on a Cortex-M4 microcontroller, you need to identify the most likely performance bottleneck.'
question: "Is a typical Cortex-M4 ML model more likely compute-bound or SRAM-bandwidth-bound, and why?"
details:
  realistic_solution: The system is overwhelmingly **compute-bound**. The Cortex-M4's processor is extremely slow compared to its on-chip SRAM bandwidth. The hardware's 'ridge point'—the ratio of its peak compute to peak memory bandwidth—is very low. This means that even models with low arithmetic intensity will be limited by the processor's calculation speed, not by how fast they can get data.
  common_mistake: |
    **The Pitfall:** Assuming memory is always the bottleneck.
    **The Rationale:** Engineers apply intuition from datacenter GPUs, where large models are frequently memory-bound.
    **The Consequence:** Optimization efforts focus on memory access patterns rather than core calculation efficiency.
  napkin_math: |
    - Cortex-M4 compute vs memory ratio: The hardware's 'ridge point' is very low.
    - **Because the on-chip SRAM is relatively fast compared to the processor core, even low arithmetic intensity models are compute-bound.**
  options:
  - It is memory-bound; fetching weights from SRAM is the bottleneck.
  - It is compute-bound; the processor's calculation speed is the bottleneck.
  - It is I/O-bound; the SPI bus for sensor data is the bottleneck.
  - The compute and memory are perfectly balanced.
  correct_index: 1
