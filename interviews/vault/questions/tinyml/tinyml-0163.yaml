title: The MCU Performance Bottleneck
scenario: When running a typical ML model on a Cortex-M4 microcontroller, you need to identify the most likely performance bottleneck.
question: Is a typical Cortex-M4 ML model more likely compute-bound or SRAM-bandwidth-bound, and why?
details:
  realistic_solution: The system is overwhelmingly **compute-bound**. The Cortex-M4's processor is extremely slow compared to its on-chip SRAM bandwidth. The hardware's 'ridge point'—the ratio of its peak compute to peak memory bandwidth—is very low. This means that even models with low arithmetic intensity will be limited by the processor's calculation speed, not by how fast they can get data.
  common_mistake: |
    **The Pitfall:** Assuming memory bandwidth is universally the primary performance limitation across all ML hardware.
    **The Rationale:** Engineers incorrectly transfer performance intuition from high-end datacenter GPUs (where massive parameter models are severely memory-bound) directly to constrained edge devices.
    **The Consequence:** Optimization efforts are wasted on rewriting memory access patterns and DMA pipelines rather than optimizing the core arithmetic calculations and loop unrolling.
  napkin_math: |
    1. **Assumptions & Constraints:** Cortex-M4 possesses highly integrated, fast on-chip SRAM but a relatively slow, scalar (or basic SIMD) arithmetic pipeline.
    2. **Calculations:** The hardware's "Ridge Point" (Peak Compute / Peak Memory Bandwidth) is mathematically very low (e.g., < 1.0 Ops/Byte). Standard neural network layers (convolutions, dense layers) typically possess an arithmetic intensity well above this ridge point.
    3. **Conclusion & Interpretation:** **Result: Compute-Bound Roofline.** Because the operation's arithmetic intensity lies far to the right of the hardware's low ridge point, the system is structurally compute-bound. The core simply cannot perform MACs fast enough to keep up with the SRAM's ability to feed it data.
  options:
  - It is memory-bound; fetching weights from SRAM is the bottleneck.
  - It is compute-bound; the processor's calculation speed is the bottleneck.
  - It is I/O-bound; the SPI bus for sensor data is the bottleneck.
  - The compute and memory are perfectly balanced.
  correct_index: 1
