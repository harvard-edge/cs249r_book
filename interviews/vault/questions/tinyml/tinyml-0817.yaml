title: Smart Doorbell Priority Scheduling
scenario: A smart doorbell built on a Cortex-M4 (120 MHz) handles continuous audio
  wake-word detection (20ms compute) and intermittent image-based person detection
  (800ms compute). New audio packets arrive every 100ms.
question: Formulate a task scheduling specification that guarantees wake-word audio
  latency under 50ms while preventing queue overflow for the intermittent video frames.
details:
  realistic_solution: A strict non-preemptive queue will cause audio packets to stall
    for up to 800ms behind a video task, dropping wake-words. The candidate must specify
    a preemptive priority RTOS scheduler where the audio task is assigned high priority,
    preempting the video task. Because the audio task only consumes 20% of the CPU
    (20ms per 100ms interval), the remaining 80% is safely left for the background
    video processing without starving it.
  common_mistake: Using a standard FIFO queue or attempting to batch audio packets,
    which still violates the hard real-time latency requirement when stuck behind
    the large video task.
  napkin_math: 20ms compute / 100ms arrival = 20% CPU for audio; max preemption delay
    = context switch time (< 1ms) << 50ms deadline.
