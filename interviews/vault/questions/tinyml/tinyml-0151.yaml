title: The Cost of Unoptimized C Code
scenario: You're prototyping a simple keyword spotting model that requires 5 Million MAC (Multiply-Accumulate) operations for a single inference. You've deployed it to a Cortex-M4 microcontroller running at 168 MHz. Your initial, unoptimized C code is measured to take 4 clock cycles to execute a single INT8 MAC operation.
question: How long should a 5M-MAC KWS inference take on a 168 MHz Cortex-M4 when unoptimized INT8 C costs 4 cycles per MAC?
details:
  realistic_solution: 'The correct approach is to calculate the total number of clock cycles required and divide by the processor''s clock speed.

    1.  **Total Cycles:** 5,000,000 MACs × 4 cycles/MAC = 20,000,000 cycles.

    2.  **Inference Time:** Divide the total cycles by the clock frequency: 20,000,000 cycles / 168,000,000 cycles/second = 0.119 seconds, or approximately 119 ms.'
  common_mistake: |
    **The Pitfall:** Assuming theoretical peak performance (1 MAC/cycle) for unoptimized C code.
    **The Rationale:** Without profiling, engineers rely on hardware spec sheets to estimate inference latency.
    **The Consequence:** Standard C code without compiler intrinsics or libraries like CMSIS-NN is highly inefficient, leading to severely underestimated latency and missed real-time deadlines.
  napkin_math: |
    *   **Total Cycles:** 5,000,000 MACs × 4 cycles/MAC = 20,000,000 cycles.
    *   **Inference Time:** 20,000,000 cycles / 168,000,000 cycles/second = 0.119 seconds.
    *   **Result:** **~119 ms**.
  options:
  - ~30 ms
  - ~60 ms
  - ~119 ms
  - ~238 ms
  correct_index: 2
