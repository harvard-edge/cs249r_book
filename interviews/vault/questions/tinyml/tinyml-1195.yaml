title: ESP32-S3 Memory Hierarchy Design for Always-On Audio
scenario: You are architecting an always-on acoustic anomaly detection system for industrial predictive maintenance on the ESP32-S3 (240 MHz dual-core, 512 KB SRAM, 8 MB PSRAM, INT8 vector extensions). The model requires extracting Mel-spectrograms and passing them through a CNN. You must design a memory hierarchy and execution strategy that guarantees the inference critical path never stalls due to external PSRAM latency, while fitting within the 512 KB internal SRAM limit alongside system tasks.
question: How should ESP32-S3 keep the always-on audio inference critical path in SRAM while prefetching PSRAM weights?
details:
  realistic_solution: A robust L6 architecture pins the RTOS, networking stacks, DMA audio buffers, and layer activations strictly to the fast 512 KB internal SRAM. Because the ESP32-S3 has INT8 vector extensions that demand high memory bandwidth, the INT8 model weights are stored in the larger 8 MB PSRAM (or Flash), but the candidate must design a pipelined execution engine. This engine uses a ping-pong buffer in SRAM to prefetch the next layer's weights via DMA while the current layer computes, entirely masking the PSRAM latency.
  common_mistake: |
    **The Pitfall:** Placing both model weights and activations entirely in the 8 MB PSRAM simply because it has enough space.
    **The Rationale:** Engineers treat all memory spaces uniformly and prioritize avoiding out-of-memory errors over optimizing access times.
    **The Consequence:** The 240 MHz cores suffer catastrophic cache thrashing and latency penalties over the slower PSRAM bus, breaking the strict timing requirements of the always-on audio stream.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - ESP32-S3 internal SRAM: 512 KB.
       - RTOS/Network/DMA overhead: ~200 KB.
       - CNN layer (INT8, 64x64x32): 131 KB activations.
       - Weights (3x3, 32 in, 64 out): ~18 KB.
    2. **Calculations:**
       - Remaining ML SRAM: 512 KB - 200 KB = 312 KB.
       - Activation ping-pong buffers: 131 KB × 2 = 262 KB.
       - Weight DMA prefetch buffers: 18 KB × 2 = 36 KB.
       - Total ML SRAM used: 262 + 36 = 298 KB.
    3. **Conclusion & Interpretation:**
       - **Result: SRAM-Bound Pipelining.** The architecture successfully fits within 512 KB with a 14 KB margin, entirely masking PSRAM latency via concurrent DMA ping-pong buffers.
