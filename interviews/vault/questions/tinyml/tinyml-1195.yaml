title: ESP32-S3 Memory Hierarchy Design for Always-On Audio
scenario: You are architecting an always-on acoustic anomaly detection system for
  industrial predictive maintenance on the ESP32-S3 (240 MHz dual-core, 512 KB SRAM,
  8 MB PSRAM, INT8 vector extensions). The model requires extracting Mel-spectrograms
  and passing them through a CNN. You must design a memory hierarchy and execution
  strategy that guarantees the inference critical path never stalls due to external
  PSRAM latency, while fitting within the 512 KB internal SRAM limit alongside system
  tasks.
question: How should ESP32-S3 keep the always-on audio inference critical path in
  SRAM while prefetching PSRAM weights?
details:
  realistic_solution: A robust L6 architecture pins the RTOS, networking stacks, DMA
    audio buffers, and layer activations strictly to the fast 512 KB internal SRAM.
    Because the ESP32-S3 has INT8 vector extensions that demand high memory bandwidth,
    the INT8 model weights are stored in the larger 8 MB PSRAM (or Flash), but the
    candidate must design a pipelined execution engine. This engine uses a ping-pong
    buffer in SRAM to prefetch the next layer's weights via DMA while the current
    layer computes, entirely masking the PSRAM latency.
  common_mistake: Candidates often place both model weights and activations entirely
    in the 8 MB PSRAM because it easily fits the footprint, completely ignoring the
    cache thrashing and latency penalties that will bottleneck the 240 MHz cores.
    They also frequently forget to subtract the memory overhead required for the RTOS,
    WiFi/BLE stacks, and continuous DMA audio buffering from the internal SRAM.
  napkin_math: 'Total internal SRAM: 512 KB. Deduct ~150 KB for RTOS/WiFi/BLE and
    ~50 KB for DMA audio ping-pong buffers, leaving ~312 KB for ML. Assume a bottleneck
    CNN layer: 64x64 spatial resolution, 32 channels. Activations (INT8) take 64 *
    64 * 32 = 131 KB. We need two activation buffers (input and output) = 262 KB,
    fitting safely under 312 KB. For a 3x3 Conv layer mapping 32 to 64 channels, weights
    require 3 * 3 * 32 * 64 = 18,432 bytes (~18 KB). We allocate two 18 KB weight
    buffers (36 KB total) in SRAM for DMA prefetching from the 8 MB PSRAM. Total SRAM
    used by ML: 262 + 36 = 298 KB, leaving a 14 KB safety margin.'
