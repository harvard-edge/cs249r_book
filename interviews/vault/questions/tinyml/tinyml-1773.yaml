title: Optimal Checkpointing for Intermittent Power
scenario: An energy-harvesting Cortex-M4 device experiences sudden power loss. It
  runs an inference pass taking 2.0s, but power usually lasts only 0.5s to 1.5s.
question: Determine an optimal checkpointing frequency for the intermediate layer
  activations to ensure forward progress across power cycles.
details:
  realistic_solution: Checkpoints must be saved to non-volatile memory more frequently
    than the minimum power-on time minus the save overhead. A frequency of every 0.3
    seconds guarantees at least one successful computation segment per cycle, allowing
    the 2.0s inference to complete over multiple cycles.
  common_mistake: Setting the checkpoint interval equal to the average power duration
    rather than accounting for the worst-case minimum bound.
  napkin_math: 0.3s < 0.5s minimum
