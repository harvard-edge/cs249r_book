title: 'The INT8 Energy Dividend: Extreme Quantization'
scenario: You're optimizing a keyword-spotting model on a battery-powered device to maximize its operational
  life. You are considering quantizing the model's operations from 32-bit floating point (FP32) to 8-bit
  integer (INT8). State the approximate energy savings you would expect to gain *per operation* from this
  switch.
question: "What per-operation energy savings should FP32-to-INT8 quantization provide on a battery-powered device?"
details:
  realistic_solution: The energy savings are approximately 18×. The energy consumed by arithmetic logic
    units (ALUs) is dominated by gate switching. An 8-bit integer multiplier has significantly fewer active
    gates than a 32-bit floating-point unit, leading to a super-linear reduction in energy consumption.
    This is a fundamental invariant in ML system design.
  common_mistake: Engineers often assume energy savings are linear with the reduction in bit width (i.e.,
    32-bit / 8-bit = 4×). This ignores the physics of digital circuits, where the energy of an arithmetic
    operation is related to the number of switching transistors, which scales more than linearly with
    bit width.
  napkin_math: 'From the ''Invariants'' table in the playbook:'
  options:
  - ~4× savings
  - ~2× savings
  - ~18× savings
  - ~3× savings
  correct_index: 2
