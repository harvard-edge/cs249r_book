title: 'The INT8 Energy Dividend: Extreme Quantization'
scenario: 'You''re optimizing a keyword-spotting model on a battery-powered device to maximize its operational life. You are considering quantizing the model''s operations from 32-bit floating point (FP32) to 8-bit integer (INT8).'
question: What per-operation energy savings should FP32-to-INT8 quantization provide on a battery-powered device?
details:
  realistic_solution: The energy savings are approximately 18x. The energy consumed by arithmetic logic units (ALUs) is dominated by gate switching. An 8-bit integer multiplier has significantly fewer active gates than a 32-bit floating-point unit, leading to a super-linear reduction in energy consumption. This is a fundamental invariant in ML system design.
  common_mistake: Engineers often assume energy savings are linear with the reduction in bit width (i.e., 32-bit / 8-bit = 4x). This ignores the physics of digital circuits, where the energy of an arithmetic operation is related to the number of switching transistors, which scales more than linearly with bit width.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline: 32-bit floating point (FP32) ALU.
    - Target: 8-bit integer (INT8) ALU.
    - Energy is dominated by gate switching.

    **Calculations:**
    - FP32 to INT8 bit width reduction = 4x.
    - Multiplier area and switching power scale quadratically with bit width.
    - Switching energy savings > 4x due to reduced complexity of integer logic versus floating point.

    **Conclusion & Interpretation:**
    - **Result: ~18x savings (Compute-Bound)**. An 8-bit integer multiplier has significantly fewer active gates than a 32-bit floating-point unit, leading to super-linear energy reduction.
  options:
  - ~4x savings
  - ~2x savings
  - ~18x savings
  - ~3x savings
