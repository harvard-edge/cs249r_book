title: The SPI DMA Cache Coherency Failure
scenario: You configure a DMA controller on a Cortex-M7 to stream SPI camera data directly into a RAM
  buffer. When the DMA finishes, an interrupt fires, and your CPU prints the first few pixels of the buffer
  to the console. The printed values are all zeros (the old data), but if you pause the debugger and look
  at the raw memory, the correct camera pixels are physically there. Why is the CPU printing stale data?
question: "Why does a Cortex-M7 print zeros after DMA writes correct SPI camera pixels into RAM?"
details:
  realistic_solution: 'You encountered a **D-Cache Coherency Failure**. A D-Cache hit takes 1 cycle. An
    SRAM read takes ~6 cycles. The cache is doing exactly what it''s supposed to do (being fast), but
    in hardware architectures with parallel DMA bus masters, software must '
  common_mistake: '"The DMA didn''t finish." The interrupt fired, which means the DMA hardware signaled
    completion.'
  napkin_math: A D-Cache hit takes 1 cycle. An SRAM read takes ~6 cycles. The cache is doing exactly what
    it's supposed to do (being fast), but in hardware architectures with parallel DMA bus masters, software
    must manually act as the referee to maintain data truth.
