title: TinyML Producer Consumer Spec
scenario: A TinyML device must sample, preprocess, infer, and transmit without missing sensor deadlines.
question: What concurrency contract prevents DMA, CPU preprocessing, NPU inference, and radio transmission from blocking each other on TinyML?
details:
  realistic_solution: The contract should specify buffer ownership, interrupt priorities, DMA completion signals, NPU job queue, CPU preprocessing windows, radio transmit windows, and overflow policy. Each stage needs bounded time and a buffer handoff protocol so a slow radio or inference job does not block sampling.
  common_mistake: |
    **The Pitfall:** Treating TinyML execution as a single sequential loop.
    **The Rationale:** Candidates ignore that peripherals continue producing data continuously via DMA while inference or transmission runs in the foreground.
    **The Consequence:** Buffer overflows, missed sensor deadlines, and dropped data whenever a slower stage like radio transmission executes.
  napkin_math: |
    *   **Sampling rate:** 4 KB every 100 ms.
    *   **Block duration:** Radio can block for 300 ms.
    *   **Buffer required:** (300 ms / 100 ms) * 4 KB = 12 KB.
    *   **Conclusion:** At least **12 KB of buffering** is needed before adding a safety margin.
