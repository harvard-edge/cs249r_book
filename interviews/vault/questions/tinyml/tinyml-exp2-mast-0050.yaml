title: On-Device PII Redaction Guardrail
scenario: You are designing an acoustic monitoring wearable for hospital staff using an ARM Cortex-M7
  + Ethos-U55 (Corstone-300) with 512 KB shared SRAM. Strict privacy governance requires an on-device
  guardrail that detects and irreversibly scrambles spoken patient names (PII) before logging the audio
  to prevent data leaks. Synthesize a streaming architecture that partitions DSP tasks and a PII-detection
  neural network between the 480 MHz M7 and the Ethos-U55, ensuring the entire pipeline fits within the
  tight memory constraints and prevents adversarial bypasses.
question: "How should Corstone-300 detect and redact spoken PII on-device while fitting DSP, CNN, and buffers in 512 KB SRAM?"
details:
  realistic_solution: Implement a zero-copy pipelined architecture where the M7 writes DMA audio directly
    into a ring buffer in shared SRAM. The M7 extracts acoustic features and triggers the Ethos-U55 to
    execute a quantized INT8 depthwise-separable CNN for PII spotting. If a sensitive entity is flagged
    via NPU interrupt, the M7 immediately applies a cryptographic hash or noise overlay to the original
    audio buffer in-place prior to non-volatile storage, guaranteeing governance compliance.
  common_mistake: Candidates often propose complex transformer-based redaction models that vastly exceed
    the 512 KB SRAM, ignoring the lack of external memory on typical microcontroller profiles. Furthermore,
    they frequently forget that the Cortex-M7 and Ethos-U55 share the same SRAM, failing to account for
    memory bandwidth contention during simultaneous DSP scrambling and NPU activation fetches.
  napkin_math: Standard 16 kHz, 16-bit audio requires 32 KB/sec. A 500 ms processing window with double-buffering
    consumes 32 KB of the 512 KB SRAM. Assuming 128 KB is reserved for the RTOS and M7 stack, 352 KB remains.
    A compact INT8 CNN takes ~250 KB for weights and 50 KB for U55 peak activations, leaving 52 KB headroom.
    Running at 480 MHz, an Ethos-U55 configured for 256 MAC/cycle yields a theoretical peak of ~122 GMAC/s;
    processing a 20 million MAC inference completes in under 1 ms, leaving the M7 499 ms to safely redact
    the audio.
