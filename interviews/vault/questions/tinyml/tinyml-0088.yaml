title: The Sensor Pipeline Without Drops
scenario: Your vibration sensor samples at 1000 Hz (1 sample per ms). Your anomaly detection model processes windows of 256 samples and takes 50ms to run inference.
question: "How can a 1 kHz vibration pipeline process 256-sample windows with 50 ms inference without dropping samples?"
details:
  realistic_solution: 'Use a double-buffer (ping-pong) scheme with DMA. While the DMA fills buffer A with 256 new samples (256ms), the CPU processes buffer B through the ML model (50ms). When buffer A is full, swap: CPU processes A, DMA fills B. No samples are lost because collection and processing overlap. CPU utilization: 50ms / 256ms = 19.5%. With 50% overlap (stride=128): new window every 128ms, utilization = 50/128 = 39%. Maximum overlap: stride >= 50 samples (50ms at 1 kHz), giving 78% utilization. Below stride=50, inference cannot complete before the next window, causing drops.'
  common_mistake: |
    **The Pitfall:** Waiting to collect a full window before starting inference without overlapping.
    **The Rationale:** Candidates process 256ms of data, take 50ms for inference, and then start collecting again.
    **The Consequence:** This leaves a 50ms blind spot where sensor data is permanently dropped.
  napkin_math: |
    - Sensor data rate: 1000 Hz (1 ms per sample).
    - Window size: 256 samples (256 ms).
    - Inference time: 50 ms.
    - Ping-pong scheme: While DMA fills buffer A (256 ms), CPU runs inference on buffer B (50 ms).
    - **Maximum overlap allowed: Stride must be ≥ 50 samples (50 ms). A smaller stride forces the CPU to miss the next buffer swap.**
