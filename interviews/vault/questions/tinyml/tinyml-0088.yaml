title: The Sensor Pipeline Without Drops
scenario: Your vibration sensor samples at 1000 Hz (1 sample per ms). Your anomaly detection model processes
  windows of 256 samples and takes 50ms to run inference. How do you ensure no samples are dropped?
question: "How can a 1 kHz vibration pipeline process 256-sample windows with 50 ms inference without dropping samples?"
details:
  realistic_solution: 'Use a double-buffer (ping-pong) scheme with DMA. While the DMA fills buffer A with
    256 new samples (256ms), the CPU processes buffer B through the ML model (50ms). When buffer A is
    full, swap: CPU processes A, DMA fills B. No samples are lost because collection and processing overlap.
    CPU utilization: 50ms / 256ms = 19.5%. With 50% overlap (stride=128): new window every 128ms, utilization
    = 50/128 = 39%. Maximum overlap: stride >= 50 samples (50ms at 1 kHz), giving 78% utilization. Below
    stride=50, inference cannot complete before the next window, causing drops.'
  common_mistake: '"Process every 256 samples: 256ms of data, 50ms inference, repeat." This leaves a 50ms
    gap where samples are lost.'
  napkin_math: 'Sensor: 1000 Hz. Window: 256 samples = 256ms. Inference: 50ms. Ping-pong: 50ms processing
    / 256ms window = 19.5% CPU utilization. With 50% overlap (stride=128): 128ms between windows. 50ms
    / 128ms = 39% utilization. With 75% overlap (stride=64): 64ms between windows. 50ms / 64ms = 78% utilization
    — tight but feasible. With 87.5% overlap (stride=32): 32ms < 50ms → **drops samples**. Maximum overlap:
    stride ≥ 50 samples (50ms at 1 kHz).'
