title: Specify KV Cache Layout for Ethos-U55 DMA Access Patterns
scenario: 'You are specifying the memory layout for a KV cache on a microcontroller with an NPU. The cache must support: 4 layers, 4 heads, 64-dim heads, up to 128-token context, INT8. The NPU DMA controller requires tensor data in NHWC format with 16-byte aligned start addresses. The SRAM is 512KB with 256KB reserved for weights and activations.'
question: How would you specify the complete KV cache memory map including layer offsets, head offsets, and alignment padding?
details:
  realistic_solution: "Total KV cache size fits within the 256KB SRAM budget. Layout [layer][kv][head][seq][dim]: layer stride = 65,536B; kv stride=32,768B; head stride=8,192B; seq stride=64B. All strides are multiples of 64 > 16, so inherently aligned. NPU DMA access pattern head[seq][dim] enables sequential 8,192-byte reads, optimal for burst DMA."
  common_mistake: |
    **The Pitfall:** Storing KV cache in row-major [layer][seq][head][dim] format.
    **The Rationale:** Not aligning the data layout with the NPU's specific DMA access patterns, which reads along the head dimension sequentially.
    **The Consequence:** Forcing non-sequential, unaligned memory accesses that severely degrade NPU throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Specs: 2 (K,V) * 4 layers * 4 heads * 128 tokens * 64 dim * 1 byte.
       - Constraint: 16-byte alignment, 256 KB budget.
    2. **Calculations:**
       - Total Size: 2 * 4 * 4 * 128 * 64 = 262,144 bytes = 256 KB.
       - Layer Stride: 256 KB / 4 = 65,536 bytes (64 KB).
       - KV Stride: 64 KB / 2 = 32,768 bytes (32 KB).
       - Head Stride: 32 KB / 4 = 8,192 bytes (8 KB).
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (Strides are multiples of 16, so 0 padding required).**
