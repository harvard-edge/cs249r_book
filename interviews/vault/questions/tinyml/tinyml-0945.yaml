title: Specify KV Cache Layout for Ethos-U55 DMA Access Patterns
scenario: You are specifying the memory layout for a KV cache on Cortex-M7+Ethos-U55. The cache must support: 4 layers, 4 heads, 64-dim heads, up to 128-token context, INT8. The Ethos-U55 DMA controller requires tensor data in NHWC format with 16-byte aligned start addresses. The SRAM is 512KB with 256KB reserved for weights and activations.
question: How would you specify the complete KV cache memory map including layer offsets, head offsets, and alignment padding?
details:
  realistic_solution: 'Cache per component (K or V): layers × heads × seq × dim × 1B = 4×4×128×64 = 131,072B = 128KB. Total KV: 2×128KB = 256KB. Fits in 256KB SRAM budget (512KB - 256KB weights). Layout [layer][kv][head][seq][dim]: layer stride = 2×4×128×64=65,536B; kv stride=4×128×64=32,768B; head stride=128×64=8,192B; seq stride=64B=1 cache line. 16-byte alignment: all strides are multiples of 64 > 16, so inherently aligned. Layer 0 K offset: 0×00. Layer 0 V offset: 32,768. Layer 1 K: 65,536. NPU DMA: access pattern head[seq][dim] = sequential 8,192-byte reads — optimal for burst DMA.'
  common_mistake: |
    **The Pitfall:** Storing KV cache in row-major [layer][seq][head][dim] format.
    **The Rationale:** Not aligning the data layout with the Ethos-U55's specific DMA access patterns, which reads along the head dimension sequentially.
    **The Consequence:** Forcing non-sequential, unaligned memory accesses that severely degrade NPU throughput.
  napkin_math: |
    1. **KV Cache Size:** 2 (K,V) * 4 layers * 4 heads * 128 tokens * 64 dim * 1 byte = 262,144 bytes = **256 KB**.
    2. **Layer Stride:** 256 KB / 4 = 65,536 bytes (64 KB).
    3. **KV Stride:** 64 KB / 2 = 32,768 bytes (32 KB).
    4. **Head Stride:** 32 KB / 4 = 8,192 bytes (8 KB).
    5. **Alignment Check:** All strides (8192, 32768, 65536) are multiples of 16 bytes. No padding required.
    6. **Memory Map:** 
       - L0-K: [0, 32KB)
       - L0-V: [32KB, 64KB)
       - L1-K: [64KB, 96KB)
       - ... L3-V: [224KB, 256KB)
