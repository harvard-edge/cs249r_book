title: INT16 Activation SRAM Trade-off
scenario: Porting an audio model to a Cortex-M4. Weights are INT8, but activations
  are kept in INT16 due to extreme sensitivity to precision loss. A hidden layer outputs
  10,000 dimensions.
question: Analyze the quantitative SRAM size trade-off for the activation buffers
  when choosing INT16 over INT8 for this hidden layer.
details:
  realistic_solution: A 10,000-dimension layer output in INT8 requires exactly 10,000
    bytes (10KB) of contiguous SRAM. Promoting these activations to INT16 doubles
    the required memory per element to 2 bytes, demanding 20KB of SRAM. While this
    preserves high dynamic range and prevents overflow during intermediate MAC accumulation,
    it forces the tiny microcontroller to permanently dedicate an extra 10KB of tight
    SRAM purely to state buffering.
  common_mistake: Confusing weight quantization with activation quantization, calculating
    the memory difference for the model parameters rather than the transient activation
    layer.
  napkin_math: INT8 = 10,000 * 1 byte = 10KB. INT16 = 10,000 * 2 bytes = 20KB. Trade-off
    is +10KB SRAM consumption.
