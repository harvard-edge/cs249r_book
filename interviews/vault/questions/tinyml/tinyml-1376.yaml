title: Optimizing ML Inference Power on Nordic nRF5340
scenario: Your team is deploying a tinyML model for anomaly detection on a Nordic nRF5340 microcontroller (128 MHz ARM Cortex-M33, 256 KB SRAM, 1 MB flash, integrated BLE). The device is battery-powered, and the model's inference needs to run periodically while adhering to a strict average power budget of 100 µW. The current implementation, running at full 128 MHz, consumes too much power during inference bursts. How would you analyze the power consumption, identify key optimization areas related to CPU frequency scaling (P-states/DVFS), and calculate the energy-per-inference to ensure the solution stays within the specified power budget, considering the CMOS power equation (P ∝ CV²f)?
question: How should you use DVFS and energy-per-inference measurements to keep nRF5340 anomaly detection within a 100 uW power budget?
details:
  realistic_solution: Implement dynamic voltage and frequency scaling (DVFS) by utilizing the nRF5340's power management capabilities to switch to lower P-states (e.g., reducing clock frequency to 64 MHz or even lower during inference, or only boosting to 128 MHz when absolutely necessary). Profile the model's execution time and power consumption at different frequencies and voltages. Quantify the energy savings per inference using the CMOS power equation for active states. Additionally, optimize data movement within memory, leverage low-power peripheral modes (e.g., for BLE communication), and ensure the device enters the most efficient sleep modes between inference cycles to meet the average power budget.
  common_mistake: Focusing solely on model size reduction or quantization without considering the dynamic power consumption aspects of the MCU, or neglecting the impact of operating frequency and voltage scaling on the overall energy budget. Another mistake is not accounting for quiescent power consumption between inference cycles, leading to an inaccurate overall power budget.
  napkin_math: Given the CMOS power equation P ∝ CV²f, if we reduce the clock frequency (f) by half (e.g., from 128 MHz to 64 MHz) and assume a proportional reduction in supply voltage (V) by 20% (e.g., from 1.8V to 1.44V for core logic), the dynamic power consumption during inference could be reduced by a factor of (1 * 0.8² * 0.5) = 0.32, representing an approximate 68% power reduction. If an inference takes 10ms at 128 MHz, and 20ms at 64 MHz, the total energy (E = P * t) could still be significantly lower. For example, if power at 128 MHz is P_max, then E_max = P_max * 10ms. At 64 MHz, power P_low ≈ P_max * 0.32. The energy E_low ≈ (P_max * 0.32) * 20ms = P_max * 6.4ms. This calculation demonstrates that even with increased execution time, significant energy savings are achievable through DVFS.
