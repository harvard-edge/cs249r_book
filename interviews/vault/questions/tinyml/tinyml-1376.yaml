title: Optimizing ML Inference Power on Nordic nRF5340
scenario: Your team is deploying a tinyML model for anomaly detection on a Nordic nRF5340 microcontroller (128 MHz ARM Cortex-M33, 256 KB SRAM, 1 MB flash, integrated BLE). The device is battery-powered, and the model's inference needs to run periodically while adhering to a strict average power budget of 100 uW. The current implementation, running at full 128 MHz, consumes too much power during inference bursts.
question: How should you use DVFS and energy-per-inference measurements to keep nRF5340 anomaly detection within a 100 uW power budget?
details:
  realistic_solution: Implement dynamic voltage and frequency scaling (DVFS) by utilizing the nRF5340's power management capabilities to switch to lower P-states (e.g., reducing clock frequency to 64 MHz or even lower during inference, or only boosting to 128 MHz when absolutely necessary). Profile the model's execution time and power consumption at different frequencies and voltages. Quantify the energy savings per inference using the CMOS power equation for active states. Additionally, optimize data movement within memory, leverage low-power peripheral modes (e.g., for BLE communication), and ensure the device enters the most efficient sleep modes between inference cycles to meet the average power budget.
  common_mistake: |
    **The Pitfall:** Focusing solely on model size reduction or quantization.
    **The Rationale:** Neglecting the impact of operating frequency and voltage scaling on the overall energy budget, and not accounting for quiescent power consumption between inference cycles.
    **The Consequence:** Failing to meet the strict average power budget despite having a highly optimized model.
  napkin_math: |
    * **Power Equation:** P ∝ CV²f.
    * **Reduction:** Reduce frequency (f) from 128 MHz to 64 MHz (0.5x), and voltage (V) from 1.8V to 1.44V (0.8x).
    * **Dynamic Power:** New power P_low ≈ P_max * 0.8² * 0.5 = 0.32 * P_max.
    * **Energy Usage:** E_max = P_max * 10ms. E_low ≈ (P_max * 0.32) * 20ms = P_max * 6.4ms.
    * **Result:** Total energy per inference is reduced by **36%**, keeping the system within the 100 uW average budget.
