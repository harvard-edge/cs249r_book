title: The Jitter Storm
scenario: Your real-time gesture model has a 25.6ms hard deadline. The math takes exactly 23ms. However,
  you are seeing intermittent 'Frame Dropped' errors. You find that whenever a BLE event occurs, the error
  rate spikes. Based on the timeline, why is a background task breaking your ML math?
details:
  realistic_solution: 'You have **Interrupt Latency Jitter**. Because the BLE handler and UART logging
    have the same or higher priority than the ML inference interrupt, they can block the inference from
    starting. If a BLE event fires, it steals 8ms, pushing the 23ms task to finish at 31ms—well past the
    25.6ms deadline. The fix is to **Reprioritize Interrupts**: set the ML DMA complete interrupt to Priority
    0 and move logging/BLE to lower priorities.'
  common_mistake: '"23ms is too close to the deadline — reduce the model size." The model has 2.6ms of
    margin. The problem is that the margin is being stolen.'
  napkin_math: Total latency = Latency(Wait) + Latency(Compute). If Wait jumps from 0ms to 8ms due to
    an interrupt, your total latency exceeds the 25.6ms budget even though compute is constant at 23ms.
