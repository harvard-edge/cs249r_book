title: The Jitter Storm
scenario: Your real-time gesture model has a 25.6ms hard deadline. The math takes exactly 23ms. However, you are seeing intermittent 'Frame Dropped' errors. You find that whenever a BLE event occurs, the error rate spikes.
question: Why can an 8 ms BLE event make a 23 ms gesture task miss a 25.6 ms hard deadline?
details:
  realistic_solution: 'You have **Interrupt Latency Jitter**. Because the BLE handler and UART logging have the same or higher priority than the ML inference interrupt, they can block the inference from starting. If a BLE event fires, it steals 8ms, pushing the 23ms task to finish at 31ms—well past the 25.6ms deadline. The fix is to **Reprioritize Interrupts**: set the ML DMA complete interrupt to Priority 0 and move logging/BLE to lower priorities.'
  common_mistake: |
    **The Pitfall:** Concluding that 23ms is too close to the deadline and proposing a model size reduction.
    **The Rationale:** Candidates fail to recognize that the 2.6ms margin is adequate, but it is being stolen by higher-priority interrupt latency.
    **The Consequence:** Engineering effort is wasted shrinking a model that is not the actual bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Deadline: 25.6ms.
       - Compute: 23ms.
       - BLE Event Wait: 8ms.
    2. **Calculations:**
       - Baseline latency: 0ms (Wait) + 23ms (Compute) = 23ms (Under 25.6ms budget).
       - Interrupted latency: 8ms (BLE Wait) + 23ms (Compute) = 31ms.
    3. **Conclusion & Interpretation:**
       - **Result: 31ms latency misses the 25.6ms deadline due to interrupt jitter.**
