title: Optimizing Convolution Lowering for Cortex-M4 SIMD
scenario: You are deploying a keyword spotting CNN on an ARM Cortex-M4 (STM32F4) operating at 168 MHz
  with 256 KB SRAM and 1 MB flash. The model has been quantized to INT8, but your initial profiling shows
  the depthwise convolutions are severely underutilizing the CPU. You need to design a graph compilation
  pass that lowers these convolutions to fully leverage the CMSIS-NN SIMD instructions, which can perform
  2x INT8 MACs per cycle.
details:
  realistic_solution: A senior engineer will realize that depthwise convolutions require specialized lowering
    passes, such as layout transformations to ensure data is contiguous for 16-bit wide SIMD loads. The
    compilation strategy must reorder loops and pack activations so the CMSIS-NN kernel can execute two
    8-bit MACs simultaneously per cycle without stalling on unaligned memory access from the 256 KB SRAM.
  common_mistake: Candidates often assume that standard im2col lowering works efficiently out-of-the-box
    for all convolutions. They might fail to recognize that depthwise convolutions have low arithmetic
    intensity and standard lowering patterns do not map well to the specific 2x INT8 MAC SIMD capabilities
    of the Cortex-M4, leading to memory-bound execution rather than compute-bound.
  napkin_math: A 3x3 depthwise convolution on a 32x32x64 feature map requires 32 * 32 * 64 * 3 * 3 = 589,824
    MACs. At 168 MHz, a perfect scalar execution takes 589,824 / 168,000,000 = ~3.5 ms. Leveraging the
    CMSIS-NN 2x INT8 MACs/cycle SIMD, the theoretical minimum cycle count is 294,912 cycles. Assuming
    a 1.5x overhead for loop control and memory loads, the optimized execution time is (294,912 * 1.5)
    / 168,000,000 = ~2.63 ms.
