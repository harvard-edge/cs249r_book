title: Degradation Strategy for Ethos-U55 Anomaly Detection
scenario: You are designing an industrial anomaly detection system on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform sharing 512 KB SRAM. The system sometimes experiences thermal throttling forcing the NPU to shut down. You evaluate two degradation alternatives. A) falling back to a smaller CNN running on the Cortex-M7 using CMSIS-NN, or B) shedding the complex ML model and falling back to a simple time-domain variance thresholding heuristic on the M7.
question: What graceful degradation strategy should keep Corstone-300 anomaly detection fail-operational during NPU thermal shutdown?
details:
  realistic_solution: Alternative B is superior for L5 graceful degradation on this platform. Time-domain variance thresholding requires negligible memory and compute, guaranteeing fail-operational status during thermal events without memory contention in the 512 KB shared SRAM. The goal of degradation here is safety and continuous baseline monitoring, not maintaining ML accuracy. The M7 can easily handle the heuristic at 480 MHz while allowing the system to cool down and safely reboot the NPU.
  common_mistake: |
    **The Pitfall:** Clinging to the ML paradigm during thermal emergencies.
    **The Rationale:** Candidates choose a fallback CNN (Alternative A) without calculating that the M7 shares SRAM with the deactivated NPU.
    **The Consequence:** The fallback CNN triggers an out-of-memory error because the NPU's state still occupies RAM, crashing the entire system when it should be fail-operational.
  napkin_math: |
    - **Shared SRAM Remaining:** NPU model uses 400 KB, leaving 112 KB. A fallback CNN (250 KB) causes an OOM crash.
    - **M7 Compute Latency:** NPU does 256x more operations per clock than M7. A 10M MAC inference takes ~10 ms on M7, generating excessive heat.
    - **Heuristic Compute (Alternative B):** Variance thresholding takes ~1000 cycles (<3 μs) and <1 KB SRAM.
    - **Conclusion:** **Alternative B** perfectly fits the remaining 112 KB SRAM and minimizes thermal load while the NPU cools.
