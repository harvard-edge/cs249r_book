title: Degradation Strategy for Ethos-U55 Anomaly Detection
scenario: You are designing an industrial anomaly detection system on an ARM Cortex-M7 + Ethos-U55 platform sharing 512 KB SRAM. The system sometimes experiences thermal throttling forcing the NPU to shut down. You evaluate two degradation alternatives. A) falling back to a smaller CNN running on the Cortex-M7 using CMSIS-NN, or B) shedding the complex ML model and falling back to a simple time-domain variance thresholding heuristic on the M7.
question: What graceful degradation strategy should keep Corstone-300 anomaly detection fail-operational during NPU thermal shutdown?
details:
  realistic_solution: Alternative B is superior for L5 graceful degradation. Time-domain variance thresholding requires negligible memory and compute, guaranteeing fail-operational status during thermal events without memory contention. The M7 can easily handle the heuristic while allowing the system to cool down.
  common_mistake: |
    **The Pitfall:** Clinging to the ML paradigm during thermal emergencies.
    **The Rationale:** Candidates choose a fallback CNN (Alternative A) without calculating that the M7 shares SRAM with the deactivated NPU.
    **The Consequence:** The fallback CNN triggers an out-of-memory error because the NPU's state still occupies RAM, crashing the entire system when it should be fail-operational.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total SRAM: 512 KB (Shared).
       - NPU Model Footprint: 400 KB.
       - Alternative A (CNN): 250 KB. Alternative B (Heuristic): <1 KB.
    2. **Calculations:**
       - Remaining SRAM: 512 KB - 400 KB = 112 KB.
       - Alternative A Requirement: 250 KB > 112 KB (OOM Crash).
       - Alternative B Requirement: 1 KB < 112 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Fallback to Heuristic.** Alternative B perfectly fits the remaining 112 KB SRAM and minimizes thermal load while the NPU cools.
