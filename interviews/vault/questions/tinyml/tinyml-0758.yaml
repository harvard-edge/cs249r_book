title: TinyML Memory Hierarchy
scenario: On a typical $2 microcontroller used for TinyML (like an ARM Cortex-M), what are the two main
  types of memory, and what are they used for?
details:
  realistic_solution: Flash (read-only, persistent) and SRAM (volatile, temporary). Model weights and
    code are stored in Flash. Intermediate activations and the heap/stack reside in the much smaller SRAM.
  common_mistake: Assuming microcontrollers have DDR4 RAM or NVMe SSDs.
  napkin_math: '- Cortex-M4 (STM32F4): 1 MB Flash, 256 KB SRAM. Model weights (INT8) must fit in Flash;
    activations must fit in SRAM. | - A 250K-param keyword spotting model: 250K × 1B = 250 KB Flash. Peak
    activation: ~50 KB SRAM. | - => Flash:SRAM ratio is typically 4:1 to 8:1 — the SRAM ceiling is the
    binding constraint for model complexity.'
  options:
  - HBM for weights and NVMe for activations.
  - Flash memory for read-only model weights, and SRAM for intermediate activations.
  - L3 Cache for weights and DDR4 for activations.
  - Virtual memory backed by a cloud server.
  correct_index: 1
