title: Optimizing Side-Channel Defenses on nRF5340
scenario: You are deploying a proprietary wake-word model on a Nordic nRF5340 (128 MHz app core, 256 KB SRAM). To prevent model extraction via power side-channel attacks, randomized dummy MAC operations (jitter) were added across all layers, causing a 50% compute overhead and violating the ~5mA active current constraint.
question: How can you optimize this side-channel defense to maintain security while reducing compute overhead to meet power constraints?
details:
  realistic_solution: The correct approach is to analyze the side-channel vulnerability profile and apply dummy operations only to the most vulnerable layers (typically the first and last layers). The middle layers are highly non-linear and harder to exploit, allowing for a significant reduction in dummy operations while preserving model security.
  common_mistake: |
    **The Pitfall:** Suggesting disabling the defense entirely or offloading compute to the slower network core.
    **The Rationale:** Candidates fail to analyze the side-channel vulnerability profile, not realizing that deep, highly non-linear middle layers are naturally resistant to power analysis.
    **The Consequence:** Either compromising the intellectual property of the model or failing the power constraints of the battery.
  napkin_math: |
    *   **Base Compute:** 2M MACs. At 2 cycles/MAC = 4M cycles. 4M / 128 MHz = 31.25 ms.
    *   **Unoptimized Defense (50% overhead):** +1M dummy MACs (+15.6 ms) = 46.8 ms total time at ~5 mA.
    *   **Optimized Defense:** Apply jitter only to vulnerable first/last layers (assume 20% of total MACs).
    *   **Optimized Overhead:** 50% of 400k MACs = 200k dummy MACs.
    *   **New Compute:** 2.2M MACs = 4.4M cycles / 128 MHz = **34.3 ms**.
    *   **Conclusion:** Cuts the defense energy overhead by 80%.
