title: The Flash Wear-Leveling Blindspot
scenario: Your edge sensors log anomaly data to internal Flash. To prevent wearing out the Flash (which
  has a 10,000 cycle limit), you write a script to always save logs starting at memory address 0x08000000,
  and sequentially move forward to 0x08004000 before looping back. After roughly 5 years, the system crashes because
  the flash sector at 0x08000000 is physically destroyed. Why didn't your sequential logging work as wear-leveling?
question: "Why does sequentially logging 64 bytes per minute from 0x08000000 still wear out the first 16 KB flash sector?"
details:
  realistic_solution: 'You ignored **Flash Page Erase Granularity**. If you log 64 bytes a minute, a 16
    KB sector fills in 256 minutes (~4.26 hours). You are erasing that sector 5.63 times a day. 5.63 erases
    * 365 days = 2,055 erase cycles per year. The flash will die in roughly 4.86 years.'
  common_mistake: '"You didn''t make the loop big enough." The size of the loop isn''t the primary failure
    mode; it''s how Flash physics requires data to be updated.'
  napkin_math: 'If you log 64 bytes a minute, a 16 KB sector fills in 256 minutes (~4.26 hours).
    You are therefore erasing that sector 24 / 4.26 = 5.63 times a day.
    5.63 erases * 365 days = 2,055 erase cycles per year.
    With a 10,000 cycle limit, the flash will die in 10,000 / 2,055 = 4.86 years.'
