title: The Flash Wear-Leveling Blindspot
scenario: Edge sensors log anomaly data sequentially to internal Flash to prevent wear. Data is written starting at 0x08000000 and loops back after 0x08004000. After 5 years, the system crashes due to physical destruction of the first flash sector.
question: Why does sequentially logging 64 bytes per minute from 0x08000000 still wear out the first 16 KB flash sector?
details:
  realistic_solution: Flash memory cannot be overwritten byte-by-byte; entire sectors must be erased. True wear-leveling requires a Flash Translation Layer (FTL) or a filesystem like LittleFS to handle block abstraction.
  common_mistake: |
    **The Pitfall:** Assuming flash memory can be appended to byte-by-byte without a block erase cycle.
    **The Rationale:** Software engineers treat raw flash memory identically to SRAM or high-level filesystems, ignoring the physics of Flash Page Erase Granularity.
    **The Consequence:** The entire 16 KB sector is erased repeatedly for tiny 64-byte writes, destroying the physical memory cells far before their expected lifespan.
  napkin_math: |
    **Assumptions & Constraints:**
    - Log rate: 64 bytes/minute. Flash sector size: 16 KB (16,384 bytes).
    - Flash endurance limit: 10,000 erase cycles.

    **Calculations:**
    - Time to fill one sector: 16,384 bytes / 64 bytes/min = 256 minutes (~4.26 hours).
    - Erase rate per sector: 24 hours / 4.26 hours = 5.63 erases/day.
    - Annual wear: 5.63 erases/day * 365 days = 2,055 erases/year.
    - Lifespan: 10,000 cycles / 2,055 erases/year = 4.86 years.

    **Conclusion & Interpretation:**
    - **Result: Flash sector dies in ~4.86 years (Write-Amplification-Bound)**. The logging strategy is write-amplification-bound, causing a catastrophic hardware failure precisely on schedule.
