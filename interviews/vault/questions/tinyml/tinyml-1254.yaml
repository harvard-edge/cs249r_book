title: 'Structured vs Unstructured Pruning on Cortex-M4'
scenario: 'We are deploying a keyword spotting CNN on an ARM Cortex-M4 (STM32F4) microcontroller. The baseline 8-bit quantized model requires 320 KB of memory, which strictly exceeds the 256 KB SRAM limit of the device. A junior engineer proposes using 90% unstructured magnitude pruning to drastically reduce the model size and speed up inference.'
question: 'How would you evaluate this proposal against an alternative 50% structured channel pruning approach, considering the specific architectural constraints of the target hardware?'
details:
  realistic_solution: 'Structured channel pruning is the correct architectural choice for the Cortex-M4. Structured pruning physically reduces the tensor dimensions, creating a smaller, dense model that perfectly aligns with CMSIS-NN optimizations and utilizes the 2x INT8 MACs/cycle SIMD instructions without branching overhead. Unstructured pruning introduces index tracking which bloats the tight 256 KB SRAM and causes pipeline stalls on the 168 MHz CPU due to irregular memory accesses.'
  common_mistake: 'Candidates often assume that 90% unstructured sparsity automatically translates to a 10x reduction in memory and a 10x speedup. They fail to realize that the Cortex-M4 lacks sparse matrix acceleration, meaning unstructured sparsity requires metadata overhead (like CSR format) that consumes SRAM, and destroys the dense memory access patterns required for CMSIS-NN SIMD.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Conv layer: 64 in, 64 out, 3x3 kernel (36,864 INT8 weights).
    - Unstructured: 90% pruned, 16-bit indices, 4 cycles/MAC.
    - Structured: 50% pruned (32 in, 32 out), 2 MACs/cycle (CMSIS-NN).

    **Calculations:**
    - Unstructured weights = 3,686 bytes + 7,372 bytes (indices) = ~11 KB.
    - Unstructured cycles = 3,686 * 4 = 14,744 cycles.
    - Structured weights = 32 * 32 * 3 * 3 = 9,216 bytes = 9.2 KB.
    - Structured cycles = 9,216 / 2 = 4,608 cycles.

    **Conclusion & Interpretation:**
    - **Result: 9.2 KB vs 11 KB, 3x Faster (Memory-Bound)**. Structured pruning strictly outperforms unstructured pruning on Cortex-M4 by saving memory on indices and utilizing SIMD instructions.
