title: The Flash vs. SRAM Budget
scenario: You're planning to deploy a new model to a fleet of microcontrollers. The device has 1 MB of
  Flash memory and 256 KB of SRAM.
question: "How should you separately budget Flash for code, weights, and OTA storage versus SRAM for runtime data?"
details:
  realistic_solution: We must calculate the budget for Flash and SRAM independently. Flash is for permanent
    storage (code, weights), while SRAM is for volatile runtime data (activations, heap).
  common_mistake: A frequent error is to conflate Flash and SRAM budgets. Engineers might incorrectly
    add the model weights (stored in Flash) to the SRAM usage calculation, leading them to believe they
    are out of memory when they are not. They might also forget to account for non-model code like the
    RTOS and the critical OTA buffer when calculating the Flash budget.
  napkin_math: '**Flash Calculation:** | `Usage = 400 KB (Model) + 64 KB (RTOS) + 32 KB (Bootloader) +
    450 KB (OTA)` | `Total Flash = 946 KB` | `946 KB < 1024 KB (1 MB) -> OK`'
  options:
  - No, it doesn't fit because the SRAM usage (80+48) plus the model weights (400) is 528 KB, which exceeds
    the 256 KB of SRAM.
  - Yes, it fits. The Flash usage is 946 KB and the SRAM usage is 128 KB, both within limits.
  - No, it doesn't fit because the Flash usage is 400+64+32 = 496 KB, and adding the 450 KB OTA buffer
    makes it 946 KB. This seems too close to the 1MB limit to be safe.
  - No, it doesn't fit because the total required memory (Flash parts + SRAM parts) is 946 + 128 = 1074
    KB, which is more than the 1MB of Flash.
  correct_index: 1
