title: 'Analyze Chinchilla Scaling for MCU-Deployable Transformers'
scenario: 'You are evaluating whether a 1M-parameter transformer trained on 20B tokens follows Chinchilla-optimal scaling (20 tokens/parameter). The model targets ESP32-S3 deployment with 512KB SRAM and 8MB flash. INT8 quantization yields 1MB model size fitting flash but exceeds SRAM for full KV cache with 512-token context. Analyze the tension between Chinchilla-optimal training compute and the memory constraints forcing architectural compromises at inference.'
question: 'How would you analyze the tension between Chinchilla-optimal training compute and the memory constraints forcing architectural compromises at inference?'
details:
  realistic_solution: 'Chinchilla-optimal: 1M params × 20 = 20B tokens training. But KV cache = 2 × layers × heads × head_dim × seq_len × 2 bytes. For 6L/8H/64-dim: 2×6×8×64×512×2 = 6MB >> 512KB SRAM. Must reduce context to 64 tokens: 768KB → 96KB. Training optimality and deployment feasibility are orthogonal axes.'
  common_mistake: 'Conflating training-optimal model size with inference-feasible model size; Chinchilla optimizes loss, not memory footprint.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware constraints: ESP32-S3 with 512KB SRAM and 8MB Flash.
    - Transformer config: 6 layers, 8 heads, 64-dim, 512-token context.
    - Chinchilla-optimal training compute vs inference limits.

    **Calculations:**
    - KV Cache per layer: 2 * 8 * 64 * 512 * 2 bytes = 1MB.
    - Total KV Cache: 1MB * 6 layers = 6MB total.
    - Max Context capacity: 512KB / (6 * 2 * 8 * 64 * 2) = ~42 tokens.

    **Conclusion & Interpretation:**
    - **Result: 6MB KV Cache (Memory-Capacity-Bound)**. Chinchilla optimality applies to training, but deployment memory constraints dictate a maximum practical context window of 32-42 tokens.
