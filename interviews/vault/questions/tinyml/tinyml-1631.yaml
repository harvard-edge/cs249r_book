title: BLE Mesh Bandwidth Collapse
scenario: A smart-home mesh of 8 Cortex-M4 sensors sends 16KB uncompressed audio chunks
  every second to a central hub over a 128 kbps BLE link.
question: Diagnose the bandwidth bottleneck and determine if the current architecture
  can support the data rate.
visual:
  kind: svg
  path: tinyml-1631.svg
  alt: 8 nodes pointing to 1 central node
  caption: 8-to-1 Sensor Fanout Topology
details:
  realistic_solution: 8 sensors * 16KB/s = 128 KB/s. 128 KB/s = 1024 kbps. The link
    is only 128 kbps. Network needs 8x the capacity. The system will drop 87.5% of
    packets.
  common_mistake: Confusing KB/s (Kilobytes) with kbps (Kilobits), falsely concluding
    128 KB/s fits on a 128 kbps link.
  napkin_math: 128 KB/s * 8 = 1024 kbps required.
