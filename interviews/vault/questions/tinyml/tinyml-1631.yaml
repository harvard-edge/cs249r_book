title: BLE Mesh Bandwidth Collapse
scenario: A smart-home mesh of 8 Cortex-M4 sensors sends 16KB uncompressed audio chunks every second to a central hub over a 128 kbps BLE link.
question: What is the bandwidth bottleneck, and can the current architecture support the data rate?
visual:
  kind: svg
  path: tinyml-1631.svg
  alt: 8 nodes pointing to 1 central node
  caption: 8-to-1 Sensor Fanout Topology
details:
  realistic_solution: Calculate total network throughput in kbps. The link is only 128 kbps while demand is 1024 kbps. The network needs 8x the capacity. The system will drop 87.5% of packets.
  common_mistake: |
    **The Pitfall:** Confusing KB/s (Kilobytes per second) with kbps (Kilobits per second).
    **The Rationale:** Candidates see "128" in both the requirement (128 KB/s) and the spec (128 kbps) and assume they match.
    **The Consequence:** Falsely concluding the architecture can support the data rate, resulting in catastrophic packet loss in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 sensor nodes sending data to 1 hub.
    - Data rate per node: 16 KB/s uncompressed audio.
    - BLE link capacity: 128 kbps (kilobits per second).

    **Calculations:**
    - Total data rate = 8 * 16 KB/s = 128 KB/s.
    - Convert to kbps: 128 KB/s * 8 bits/byte = 1024 kbps.
    - Link deficit: 1024 kbps / 128 kbps = 8x.

    **Conclusion & Interpretation:**
    - **Result: The network needs 8x the capacity and will drop 87.5% of packets (Bandwidth-Bound)**. The architecture is severely bandwidth-constrained.
