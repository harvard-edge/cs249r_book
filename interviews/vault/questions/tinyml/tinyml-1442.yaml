title: ASIL-B TinyML Determinism on ARM Cortex-M4 STM32F4
scenario: An automotive functional safety system, targeting ISO 26262 ASIL-B, uses a TinyML-based object detection model for critical environment perception. This system is deployed on an ARM Cortex-M4 STM32F4 microcontroller. To meet strict latency requirements and achieve deterministic execution, the ML model is quantized to operate entirely on integer arithmetic. The design incorporates a hardware watchdog timer and periodic self-test routines for memory and CPU.
question: Why do ASIL-B determinism, watchdogs, self-tests, and limited Cortex-M4 resources require WCET, interrupt, and memory discipline?
details:
  realistic_solution: 1. **Worst-Case Execution Time (WCET) Analysis:** Perform exhaustive WCET analysis for all safety-critical tasks and the ML inference pipeline. 2. **Memory Protection Unit (MPU) Configuration:** Utilize the ARM Cortex-M4 MPU to enforce strict memory partitioning for critical code, data, and stack areas, preventing accidental corruption. 3. **Deterministic OS/Scheduler:** Employ a real-time operating system (RTOS) like FreeRTOS, configured for fixed-priority preemptive scheduling, with careful assignment of task priorities to guarantee critical task execution. 4. **Hardware Watchdog Implementation:** Configure the independent watchdog timer (IWDG) or window watchdog timer (WWDG) to monitor critical task execution and ensure timely refreshing. Implement a clear policy for watchdog refreshing across different task priorities. 5. **Robust Self-Test Routines:** Design self-test routines (e.g., CRC checks for code, memory BIST for SRAM, CPU register checks) to run periodically during non-critical periods or with minimal impact on safety-critical tasks, ensuring their execution doesn't compromise deterministic model inference. 6. **FPU Emulation Avoidance/Integer Optimization:** Ensure the ML model and all relevant algorithms are strictly integer-only to avoid the performance penalties and non-determinism associated with software FPU emulation on a 'no FPU' device. 7. **Interrupt Latency Management:** Minimize and optimize ISRs, ensuring that critical sections are as short as possible and that high-priority interrupts do not starve safety-critical tasks for extended periods.
  common_mistake: |
    **The Pitfall:** Assuming a simple 'run-to-completion' model without analyzing concurrent task interactions.
    **The Rationale:** Candidates fail to account for the cumulative overhead of context switching, ISRs, and self-test memory footprints, which destroy deterministic execution times.
    **The Consequence:** Missing hard real-time deadlines, triggering watchdog resets, and failing ASIL-B certification.
  napkin_math: |
    1. **Assumptions & Constraints:** Cortex-M4 at 168 MHz (no FPU). Safety deadline 50ms. Watchdog timeout 250ms. 10 million int8 MACs. 2 cycles/MAC.
    2. **Calculations:** Inference cycles = 10,000,000 * 2 = 20,000,000 cycles. Inference latency = 20,000,000 / 168,000,000 = 119 ms. 119 ms > 50 ms deadline.
    3. **Conclusion & Interpretation:** **119 ms execution violates the 50 ms ASIL-B real-time deadline** (Compute-Bound Safety Violation).
