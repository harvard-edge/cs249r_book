title: ESP32-S3 INT8 Keyword Spotting Memory Footprint
scenario: 'You are tasked with deploying an INT8 quantized keyword spotting CNN on an ESP32-S3 microcontroller to leverage its vector extensions. The model consists of 250,000 parameters, and the peak intermediate activation buffer requires 150,000 elements.'
question: 'Does the INT8 keyword-spotting CNN fit entirely in ESP32-S3 internal SRAM, or must it use the slower PSRAM?'
details:
  realistic_solution: 'To verify if the model fits in the internal SRAM, calculate the sum of the memory required for the quantized weights and the peak intermediate activations. Since the model targets the ESP32-S3 INT8 vector extensions, each parameter and activation element occupies exactly 1 byte. We compare the total required memory against the 512 KB SRAM limit to ensure zero-copy execution.'
  common_mistake: |
    **The Pitfall:** Forgetting to account for intermediate activation memory or sizing parameters as 4-byte FP32.
    **The Rationale:** Candidates focus solely on weight storage and default to standard 32-bit float sizes.
    **The Consequence:** They incorrectly estimate memory usage, leading to unexpected performance penalties if forced into slower PSRAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - ESP32-S3 SRAM limit: 512 KB.
    - Weights: 250,000 parameters.
    - Activations: 150,000 elements.
    - Precision: INT8 (1 byte per element).

    **Calculations:**
    - Weights footprint: 250,000 parameters * 1 byte/param = 250 KB.
    - Activations footprint: 150,000 elements * 1 byte/element = 150 KB.
    - Total SRAM required: 250 KB + 150 KB = 400 KB.

    **Conclusion & Interpretation:**
    - **Result: 400 KB ([Memory-Bound])**. 400 KB is less than the 512 KB limit, so the model fits entirely in the fast internal SRAM.
