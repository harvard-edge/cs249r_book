title: ESP32-S3 INT8 Keyword Spotting Memory Footprint
scenario: You are tasked with deploying an INT8 quantized keyword spotting CNN on
  an ESP32-S3 microcontroller to leverage its vector extensions. The model consists
  of 250,000 parameters, and the peak intermediate activation buffer requires 150,000
  elements. Calculate the memory footprint required for inference and determine if
  it can run entirely within the ESP32-S3's fast 512 KB internal SRAM, or if it must
  spill over into the slower 8 MB PSRAM.
question: Does the INT8 keyword-spotting CNN fit entirely in ESP32-S3 internal SRAM,
  or must it use PSRAM?
details:
  realistic_solution: To verify if the model fits in the internal SRAM, calculate
    the sum of the memory required for the quantized weights and the peak intermediate
    activations. Since the model targets the ESP32-S3's INT8 vector extensions, each
    parameter and activation element occupies exactly 1 byte. We compare the total
    required memory against the 512 KB SRAM limit.
  common_mistake: Candidates often forget to account for the memory needed for intermediate
    activations (the tensor arena) alongside the weights. They might also mistakenly
    calculate the parameter size using 4-byte FP32 instead of 1-byte INT8, or fail
    to distinguish between the performance implications of the 512 KB internal SRAM
    versus the 8 MB external PSRAM.
  napkin_math: 'Weights footprint: 250,000 parameters * 1 byte/parameter = 250 KB.
    Activations footprint: 150,000 elements * 1 byte/element = 150 KB. Total SRAM
    required = 250 KB + 150 KB = 400 KB. Since 400 KB is less than the ESP32-S3''s
    512 KB limit, the model fits entirely in the fast internal SRAM and does not require
    the 8 MB PSRAM.'
