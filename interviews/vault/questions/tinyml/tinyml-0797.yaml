title: Tinyml New 0021
scenario: An audio keyword spotting model achieves 99% accuracy in the test set. Deployed on the actual
  M4 device, it randomly misses words in quiet rooms but works perfectly in noisy environments.
details:
  realistic_solution: The root cause is the microphone's Auto Gain Control (AGC) behavior interacting
    poorly with the model. In a quiet room, the AGC maximizes gain, causing the target keyword to clip
    at the rails and distort the Mel-spectrogram. In a noisy environment, the AGC lowers the gain, preventing
    clipping. The solution is to disable AGC, lock the gain, or augment the training data with clipped
    audio.
  common_mistake: Treating the sensor as a transparent pass-through and ignoring hardware preprocessing
    like AGC and filtering.
  napkin_math: 16-bit audio range = +/- 32767. Quiet word = +/- 1000. AGC gain kicks in at 35x -> +/-
    35000, which clips at 32767. The harmonic distortion destroys the spectrogram features the CNN relies
    on.
