title: Tinyml New 0021
scenario: >
  An audio keyword spotting model achieves 99% accuracy in the test set but randomly misses words in quiet rooms on the deployed device.
question: What microphone AGC behavior causes missed wake words in quiet rooms but not noisy environments?
details:
  realistic_solution: |
    The root cause is the microphone's Auto Gain Control (AGC) behavior interacting poorly with the model. In a quiet room, the AGC maximizes gain, causing the target keyword to clip at the rails and distort the Mel-spectrogram. In a noisy environment, the AGC lowers the gain, preventing clipping. The solution is to disable AGC, lock the gain, or augment the training data with clipped audio.
  common_mistake: |
    **The Pitfall:** Treating the sensor as a transparent pass-through and ignoring hardware preprocessing like AGC and filtering.
    **The Rationale:** Candidates often assume that digital audio fed into the MCU exactly matches the raw acoustic environment.
    **The Consequence:** They spend weeks debugging the ML model while the actual problem lies in the analog hardware configuration.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 16-bit audio range: +/- 32,767.
       - Quiet word baseline amplitude: +/- 1,000.
    2. **Calculations:**
       - AGC applies massive gain in quiet room: 35x multiplier.
       - 1,000 * 35 = 35,000.
       - Signal clips at 32,767, causing harmonic distortion.
    3. **Conclusion & Interpretation:** The AGC artificially distorts low-amplitude signals. **Result: Sensor-Signal-Bound (Clipping)**.
