title: LoRa Drone Swarm Consensus
scenario: 6 drones (Cortex-M4 + LoRa) must reach consensus on target location via
  an AllReduce of 1KB maps over a 50 kbps shared RF medium.
question: Create a schedule that avoids packet collisions and compute the minimum
  consensus time.
visual:
  kind: svg
  path: tinyml-1639.svg
  alt: A star topology with Drone 0 as the central leader
  caption: TDMA Star Consensus Topology
details:
  realistic_solution: Use TDMA gather to a leader, then broadcast. 5 drones send 1KB
    to leader = 5KB (40Kb). Leader broadcasts 1KB (8Kb). Total = 48Kb. Latency = 48Kb
    / 50kbps = 0.96 seconds.
  common_mistake: Designing a ring topology, which fails terribly on a shared CSMA/CA
    wireless medium due to half-duplex interference.
  napkin_math: 48Kb / 50kbps = 0.96s.
