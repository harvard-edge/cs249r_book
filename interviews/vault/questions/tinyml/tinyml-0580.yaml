title: The High-Speed SPI Ringing
scenario: To get a higher framerate from an external SPI camera, you bump the SPI clock from 10 MHz to
  40 MHz. The MCU and the camera both support 40 MHz. However, the image data suddenly looks like static
  noise. You check the clock line with an oscilloscope and see massive, violent voltage spikes (ringing)
  going up to 5V on your 3.3V system. What analog phenomenon ruined your digital signal?
details:
  realistic_solution: 'Signal reflection (ringing) due to impedance mismatch. At 40MHz with 2ns rise times,
    PCB traces as short as 2-3 inches act as transmission lines. Without proper termination, the 3.3V
    signal reflects off the unterminated end, creating constructive interference up to 5V — violating
    absolute maximum ratings and causing double-clocking. Fix: (1) add a 33-ohm series termination resistor
    near the SPI MOSI/CLK outputs, (2) keep traces under 1 inch or use controlled-impedance routing, (3)
    add ground guard traces alongside the SPI bus. This is a PCB design problem, not a firmware or silicon
    problem.'
  common_mistake: '"The MCU doesn''t have enough power." Power isn''t the issue; signal integrity is.'
  napkin_math: A 40 MHz clock with a 2ns rise time creates wavelengths where traces as short as 2-3 inches
    become active transmission lines. Without termination, the 3.3V signal can bounce to 5V, violating
    the camera's input voltage limits and triggering double-reads.
