title: TinyML Tensor Arena Headroom
scenario: A TFLite Micro model needs 96 KB weights in flash, 72 KB peak activations, 24 KB input/output buffers, and 18 KB runtime scratch. The MCU has 192 KB SRAM, of which the RTOS reserves 48 KB. Determine whether the tensor arena fits.
question: Does the TensorFlow Lite Micro arena fit in 192 KB SRAM after a 48 KB RTOS reserve?
details:
  realistic_solution: Available SRAM is 144 KB. The arena needs 72 + 24 + 18 = 114 KB; weights are in flash and do not count against SRAM. The arena fits with 30 KB headroom.
  common_mistake: Adding flash-resident weights to SRAM demand, or forgetting the RTOS reserve.
  napkin_math: Available = 192 - 48 = 144 KB. Arena = 72 + 24 + 18 = 114 KB. Headroom = 30 KB.
