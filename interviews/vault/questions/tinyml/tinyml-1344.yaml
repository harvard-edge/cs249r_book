title: Latency Decomposition on Nordic nRF5340 for TinyML Inference
scenario: >
  You are deploying a tinyML model for real-time anomaly detection on a Nordic nRF5340 SoC (128 MHz ARM Cortex-M33, 256 KB SRAM, 1 MB flash). The end-to-end latency budget from sensor data acquisition to decision output is 50ms. The model processes 100-byte sensor data arriving via BLE every 10ms.
question: >
  How should you measure and optimize TTFT, TPOT, BLE, preprocessing, and postprocessing latency on nRF5340 anomaly detection?
details:
  realistic_solution: >
    Implement detailed profiling using hardware timers (e.g., SysTick or dedicated timers) or GPIO toggles at key execution points: sensor read completion, preprocessing start/end, BLE packet transmission start/end (including acknowledgments), model inference start/end (distinguishing TTFT from subsequent TPOTs), and postprocessing start/end. Analyze the collected data to identify bottlenecks. Optimize each stage individually by: 1) data packing and efficient BLE advertisements/connections, 2) utilizing DSP extensions (if available on Cortex-M33) and fixed-point arithmetic for preprocessing, and 3) applying extreme model quantization (e.g., 8-bit or 4-bit), pruning, and custom kernel optimization for inference. Prioritize reducing memory access and data movement, which are often major bottlenecks on devices with limited SRAM and no cache.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the model inference time (TPOT/TTFT).
    **The Rationale:** Candidates fail to account for the significant overheads of BLE communication protocols and the interrupt service routines (ISRs) for data acquisition.
    **The Consequence:** They miss the real bottleneck, leaving the system failing the 50ms latency budget despite an optimized ML model.
  napkin_math: |
    - **BLE Transmission:** 100-byte packet at 1Mbps effective data rate = ~1ms.
    - **Preprocessing:** 500 CPU cycles at 128 MHz = ~4 μs.
    - **Inference:** 100,000 MACs at 10 cycles/MAC = 1M cycles. Time = 1,000,000 / 128 MHz = ~7.8ms.
    - **Postprocessing:** 200 cycles = ~1.5 μs.
    - **Total Processing Time:** 1ms (BLE) + 4 μs (Pre) + 7.8ms (Inf) + 1.5 μs (Post) ≈ **8.8ms**.
    - **Conclusion:** This leaves ~41.2ms for OS scheduling, ISRs, and the initial TTFT.
