title: Latency Decomposition on Nordic nRF5340 for TinyML Inference
scenario: You are deploying a tinyML model for real-time anomaly detection on a Nordic
  nRF5340 SoC (128 MHz ARM Cortex-M33, 256 KB SRAM, 1 MB flash). The end-to-end latency
  budget from sensor data acquisition to decision output is 50ms. The model processes
  100-byte sensor data arriving via BLE every 10ms. Your task is to decompose the
  end-to-end latency, considering Time-To-First-Token (TTFT), Time-Per-Output-Token
  (TPOT), BLE network transmission, sensor data preprocessing, and decision postprocessing.
  Provide a plan to measure and optimize these components.
question: How should you measure and optimize TTFT, TPOT, BLE, preprocessing, and
  postprocessing latency on nRF5340 anomaly detection?
details:
  realistic_solution: 'Implement detailed profiling using hardware timers (e.g., SysTick
    or dedicated timers) or GPIO toggles at key execution points: sensor read completion,
    preprocessing start/end, BLE packet transmission start/end (including acknowledgments),
    model inference start/end (distinguishing TTFT from subsequent TPOTs), and postprocessing
    start/end. Analyze the collected data to identify bottlenecks. Optimize each stage
    individually by: 1) data packing and efficient BLE advertisements/connections,
    2) utilizing DSP extensions (if available on Cortex-M33) and fixed-point arithmetic
    for preprocessing, and 3) applying extreme model quantization (e.g., 8-bit or
    4-bit), pruning, and custom kernel optimization for inference. Prioritize reducing
    memory access and data movement, which are often major bottlenecks on devices
    with limited SRAM and no cache.'
  common_mistake: Failing to account for the significant overheads of BLE communication
    protocols (e.g., connection setup, packet overheads, retransmissions) and the
    interrupt service routines (ISRs) for data acquisition, or exclusively focusing
    on the model inference time (TPOT/TTFT) without comprehensively profiling preprocessing,
    postprocessing, and communication latencies on a highly resource-constrained device.
  napkin_math: 'Given a 100-byte sensor packet and a 1Mbps BLE effective data rate,
    BLE transmission could take ~1ms. For preprocessing, 500 CPU cycles on a 128 MHz
    CPU is ~4µs. If the model has 100,000 MAC operations and takes an average of 10
    cycles/MAC (due to memory access and instruction pipeline), total inference cycles
    = 1,000,000. Inference time = 1,000,000 cycles / 128 MHz = ~7.8ms. Postprocessing
    (e.g., thresholding) might take 200 cycles = ~1.5µs. Approximate total for one
    sample processing (excluding TTFT and OS overhead): 1ms (BLE) + 4µs (Pre) + 7.8ms
    (Inf) + 1.5µs (Post) ≈ 8.8ms. This leaves ~41.2ms for OS scheduling, ISRs, and
    the initial TTFT, which can be substantial for recurrent or complex first-pass
    models.'
