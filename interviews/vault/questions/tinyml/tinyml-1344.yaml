title: Latency Decomposition on Nordic nRF5340 for TinyML Inference
scenario: You are deploying a tinyML model for real-time anomaly detection on a Nordic nRF5340 SoC. The end-to-end latency budget from sensor data acquisition to decision output is 50ms. The model processes 100-byte sensor data arriving via BLE every 10ms.
question: How should you measure and optimize TTFT, TPOT, BLE, preprocessing, and postprocessing latency on nRF5340 anomaly detection?
details:
  realistic_solution: 'Implement detailed profiling using hardware timers or GPIO toggles at key execution points. Optimize each stage individually by: 1) data packing and efficient BLE connections, 2) utilizing DSP extensions and fixed-point arithmetic for preprocessing, and 3) applying extreme INT8 quantization, Top-K Sparsification, and custom CMSIS-NN kernel optimization for inference to reduce memory access.'
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the model inference time (TPOT/TTFT).
    **The Rationale:** Candidates fail to account for the significant overheads of BLE communication protocols and the interrupt service routines (ISRs) for data acquisition.
    **The Consequence:** They miss the real bottleneck, leaving the system failing the 50ms latency budget despite an optimized ML model.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Clock: 128 MHz. BLE data: 100 bytes (1Mbps effective).
       - Pre/Post: 700 CPU cycles.
       - Inference: 100,000 MACs at 10 cycles/MAC.
    2. **Calculations:**
       - BLE Transmission: ~1.0 ms.
       - Pre/Post DSP: 700 / 128 MHz = ~5.5 µs.
       - Inference: 1M cycles / 128 MHz = ~7.8 ms.
       - Total Active Time: 1.0 + 0.0055 + 7.8 = ~8.8 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Latency**. 8.8 ms is well within the 50ms budget, leaving 41.2ms for OS scheduling and TTFT overhead.
