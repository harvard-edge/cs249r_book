title: The Secure Doorbell A/B Test
scenario: >
  You are the tech lead for a smart doorbell product using a Cortex-M7 MCU with 1MB of Flash and 256KB of SRAM. The current system uses a 32KB bootloader, a 64KB RTOS, and a 200KB person-detection model. You need to A/B test a new, promising 450KB model. For security, OTA updates must be atomic, preventing bricked devices. For privacy, raw images cannot be sent to the cloud.
question: >
  What A/B testing strategy fits both the 200 KB and 450 KB models while preserving privacy and rollback safety?
details:
  realistic_solution: >
    Store both models in the application partition and use a config flag to select which loads into SRAM. Flash: 1 MB - 32 KB bootloader - 64 KB RTOS = 928 KB available. Model A (200 KB) + Model B (450 KB) = 650 KB. Remaining: 278 KB for app code. SRAM at runtime: only one model's activations active. Model A arena: ~40 KB peak. Model B: ~80 KB. 256 KB SRAM: 80 KB arena + 16 KB stack + 32 KB RTOS + 20 KB app = 148 KB used, 108 KB free. Switching: read config flag (1 byte), reallocate tensor arena, reinitialize TFLM interpreter. Time: ~50 ms (flash read + arena setup). No A/B partition needed. Rollback: flip config byte (1 flash page write = 10 ms). Both models always present in flash.
  common_mistake: |
    **The Pitfall:** Suggesting a dual-partition OTA scheme without calculating if two full copies of the application would fit into the 1MB of flash.
    **The Rationale:** Many engineers are used to cloud or mobile environments where storage is plentiful and ignore the physical flash memory constraints.
    **The Consequence:** A dual-partition scheme would exceed the 928KB budget, making the solution impossible to deploy.
  napkin_math: |
    - **Total Flash:** 1024 KB
    - **System Reserved:** 32 KB (Bootloader) + 64 KB (RTOS) = 96 KB
    - **Available Flash for Application & Models:** 1024 KB - 96 KB = 928 KB
    - **Required Space for both models:** 200 KB (Model A) + 450 KB (Model B) = 650 KB
    - **Remaining Flash:** 928 KB - 650 KB = **278 KB** for the core application logic.
    - **Conclusion:** This leaves a feasible budget, making the "store both" strategy viable. A dual-partition scheme would require at least `2 * (App Logic + 450KB)`, which would exceed the 928KB budget.
  options:
  - Stream images to the cloud to run the new model server-side, allowing for rapid iteration without touching the device.
  - Use a dual-partition OTA scheme, writing the new model to an inactive partition and swapping on boot for maximum safety.
  - Overwrite the old model with the new one on 50% of devices; the risk of bricking is acceptable for a test rollout.
  - Store both models concurrently in the available flash and use a runtime flag to switch between them, as there is sufficient space (278KB left for app logic).
  correct_index: 3
