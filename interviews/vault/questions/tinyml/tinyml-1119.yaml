title: Diagnosing Sensor Buffer Overrun During Inference
scenario: Your team is deploying an anomaly detection model on an ARM Cortex-M4 (STM32F4) microcontroller (168 MHz, 256 KB SRAM, 1 MB flash, no FPU). The system samples a 3-axis accelerometer at 4 kHz (16-bit resolution) using DMA into a 1024-byte ping-pong buffer (512 bytes per half). The INT8 model inference takes 35 ms leveraging CMSIS-NN SIMD (2x INT8 MACs/cycle). During testing, the model intermittently outputs garbage predictions, and you notice discontinuous jumps in the input feature windows.
question: Why does a 4 kHz accelerometer DMA ping-pong buffer corrupt windows during a 35 ms Cortex-M4 inference?
details:
  realistic_solution: The root cause is a buffer overrun condition. The DMA half-transfer completes and begins overwriting the memory region before the blocking inference task finishes processing it. The solution is to increase the ping-pong buffer size to hold all samples accumulated during the worst-case 35 ms inference time.
  common_mistake: |
    **The Pitfall:** Blaming the model's training data or suggesting increasing the MCU clock speed.
    **The Rationale:** Candidates fail to calculate the exact hardware constraints and relate DMA ingestion rate to inference time.
    **The Consequence:** The buffer overrun issue remains unresolved, and system architecture is misdiagnosed.
  napkin_math: |
    - Calculate data generation rate: 4,000 samples/sec * 3 axes * 2 bytes/sample = 24,000 bytes/sec.
    - Calculate fill time for a 512-byte buffer half: 512 bytes / 24,000 bytes/sec = 21.33 ms.
    - Compare fill time to inference time: 35 ms (inference) > 21.33 ms (fill time).
    - **The DMA will completely fill the alternate half and start overwriting the active half being processed, resulting in data loss.**
