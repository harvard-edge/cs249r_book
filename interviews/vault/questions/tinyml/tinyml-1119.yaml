title: Diagnosing Sensor Buffer Overrun During Inference
scenario: You are deploying an anomaly detection model on a Cortex-M4. The system samples a 3-axis accelerometer at 4 kHz (16-bit resolution) using DMA into a 1024-byte ping-pong buffer (512 bytes per half). The INT8 model inference takes 35 ms. During testing, the model intermittently outputs garbage predictions, and input feature windows show discontinuous jumps.
question: Why does a 4 kHz accelerometer DMA ping-pong buffer corrupt windows during a 35 ms Cortex-M4 inference?
details:
  realistic_solution: The root cause is a buffer overrun condition. The DMA half-transfer completes and begins overwriting the memory region before the blocking inference task finishes processing it. The solution is to increase the ping-pong buffer size to hold all samples accumulated during the worst-case 35 ms inference time.
  common_mistake: |
    **The Pitfall:** Blaming the model's training data, quantization error, or suggesting an MCU clock speed increase without analyzing data ingestion rates.
    **The Rationale:** Candidates treat software bugs and ML model accuracy as separate domains from real-time hardware DMA constraints.
    **The Consequence:** The fundamental buffer overrun architecture flaw is ignored, guaranteeing continuous data corruption during inference execution regardless of ML optimizations.
  napkin_math: |
    1. **Assumptions & Constraints:** 4 kHz sample rate. 3 axes, 16-bit (2 bytes) per axis. Ping-pong buffer half-size = 512 bytes. Inference blocking time = 35 ms.
    2. **Calculations:** Data ingestion rate = 4,000 samples/sec * 3 axes * 2 bytes = 24,000 bytes/sec. Fill time for one 512-byte buffer half = 512 bytes / 24,000 bytes/sec = 0.02133 seconds = 21.33 ms.
    3. **Conclusion & Interpretation:** **Result: DMA Overrun Condition.** The buffer half fills in 21.33 ms, but inference takes 35 ms. The DMA engine will wrap around and blindly overwrite 13.67 ms of active sensor data being processed by the neural network, causing garbage predictions.
