title: 'Dataset Curation: Implement Data Augmentation for TinyML Acoustic Models'
scenario: You are training a keyword spotting model for a Cortex-M7+Ethos-U55 (480MHz, 512KB SRAM, NPU). Your base dataset has 5,000 samples/keyword for 10 keywords. You implement an offline augmentation pipeline to expand to 50,000 samples/keyword using noise injection (5 SNR levels), speed perturbation (2 variants), and SpecAugment.
question: How large is the augmented KWS dataset after applying speed, SNR noise, and SpecAugment, and is it feasible to process?
details:
  realistic_solution: 'Offline augmentation: generate augmented samples once, store to disk. Apply speed perturbation (e.g., 0.9x, 1.1x) combined with noise injection (e.g., 5 SNR levels) to create a 10x multiplier. 5,000 × 10 = 50,000 per class.'
  common_mistake: |
    **The Pitfall:** Attempting online augmentation for thousands of samples per batch.
    **The Rationale:** Candidates are used to GPU clusters that dynamically augment data on-the-fly.
    **The Consequence:** In edge/constrained environments, applying complex DSP audio augmentations online causes severe CPU starvation during the training loop.
  napkin_math: |
    - **Base Data:** 10 keywords * 5,000 samples = 50,000 samples.
    - **Augmentation Factor:** 2 speed variants * 5 SNR levels = 10x multiplier.
    - **Target Data:** 50,000 samples * 10 = 500,000 samples.
    - **Storage Size:** 500K samples * 1 sec * 16 kHz * 2 Bytes = **16 GB raw audio**.
    - **Feature Storage (MFCC):** 500K * 3.87 KB = **1.94 GB**.
    - **Conclusion:** The dataset scales to 500,000 samples. At ~1.94 GB of extracted features, it easily fits on a standard SSD and is highly feasible for offline storage and training.
