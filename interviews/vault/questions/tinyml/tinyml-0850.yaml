title: 'Dataset Curation: Implement Data Augmentation for TinyML Acoustic Models'
scenario: You are training a keyword spotting model for Cortex-M7+Ethos-U55 (480MHz,
  512KB SRAM, NPU). Your base dataset has 5,000 samples/keyword (10 keywords). Implement
  an offline augmentation pipeline to expand to 50,000 samples/keyword using noise
  injection, speed perturbation, and SpecAugment. Quantify augmented dataset size.
question: How large is the augmented KWS dataset after applying speed, SNR noise,
  and SpecAugment for Cortex-M7+Ethos-U55 training?
details:
  realistic_solution: 'Offline augmentation: generate augmented samples once, store
    to disk. Apply speed perturbation (e.g., 0.9x, 1.1x) combined with noise injection
    (e.g., 5 SNR levels) to create a 10x multiplier. 5,000 \u00d7 10 = 50,000 per class.'
  common_mistake: Applying augmentation online during training without verifying the
    CPU can keep up; or generating augmented data that falls outside the expected
    SNR range for the deployment environment.
  napkin_math: '10 keywords \u00d7 5,000 base = 50,000 original samples. Target: 500,000
    augmented (50K/keyword). Augmentation factor needed: 10\u00d7. Apply: 2 speed variants \u00d7 5 SNR levels = 10\u00d7.
    Storage: 500K samples \u00d7 1-sec \u00d7 16kHz \u00d7 2B = 16GB raw audio. MFCC: 500K \u00d7 3.87KB = 1.94GB — manageable.
    Training: 500K \u00d7 3 epochs / batch 512 = 2,930 steps on H100 (cloud training for
    tinyml models). At 50ms/step: 146 seconds = 2.4 minutes. Ethos-U55 inference:
    99 \u00d7 40 int8 MFCC \u2192 1ms per keyword check. Real-time feasible.'
