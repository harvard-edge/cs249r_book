title: 'Dataset Curation: Implement Data Augmentation for TinyML Acoustic Models'
scenario: You are training a keyword spotting model for a Cortex-M7+Ethos-U55. Your base dataset has 5,000 samples/keyword for 10 keywords. You implement an offline augmentation pipeline to expand to 50,000 samples/keyword using noise injection (5 SNR levels), speed perturbation (2 variants), and SpecAugment.
question: How large is the augmented KWS dataset after applying speed, SNR noise, and SpecAugment, and is it feasible to process?
details:
  realistic_solution: 'Offline augmentation: generate augmented samples once, store to disk. Apply speed perturbation (e.g., 0.9x, 1.1x) combined with noise injection (e.g., 5 SNR levels) to create a 10x multiplier. This scales the dataset significantly but remains perfectly feasible to store and process on standard SSDs for offline training.'
  common_mistake: |
    **The Pitfall:** Attempting online augmentation for thousands of samples per batch.
    **The Rationale:** Candidates are used to GPU clusters that dynamically augment data on-the-fly.
    **The Consequence:** In edge/constrained environments or standard workstations, applying complex DSP audio augmentations online causes severe CPU starvation during the training loop.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Base Data: 10 keywords, 5,000 samples each.
       - Audio format: 1 sec, 16 kHz, 16-bit (2 Bytes/sample).
       - Augmentation: 2 speed variants * 5 SNR levels = 10x multiplier.
    2. **Calculations:**
       - Target Sample Count: 50,000 base samples * 10 = 500,000 samples.
       - Raw Storage: 500,000 * 16,000 * 2 = 16 GB raw audio.
       - Feature Storage (MFCC): 500,000 * 3.87 KB = 1.94 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Feasible to Process.** The ~1.94 GB of extracted features easily fits on an SSD or RAM, making offline generation optimal.
