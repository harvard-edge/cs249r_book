title: Cycle Count Profiling on ARM Cortex-M4
scenario: You are profiling the latency of a quantized neural network inference on an MCU running at 168 MHz. To accurately measure the execution time of individual layers without the overhead of external timers or RTOS context switches, you need to read a specific internal hardware register.
question: What is the name of the standard ARM CoreSight register used to count clock cycles for precise profiling?
details:
  realistic_solution: To achieve zero-overhead, microsecond-level profiling, engineers must utilize the ARM CoreSight Data Watchpoint and Trace (DWT) unit, specifically reading the DWT_CYCCNT (Cycle Count) register. DWT_CYCCNT increments linearly with every CPU clock cycle, providing absolute deterministic timing resolution vital for isolating cycle-level bottlenecks in specific CMSIS-NN layers.
  common_mistake: |
    **The Pitfall:** Utilizing the SysTick timer or RTOS system ticks for layer-level profiling.
    **The Rationale:** Software engineers default to familiar OS-level timing primitives (which tick every 1ms).
    **The Consequence:** The 1ms granularity of SysTick completely obfuscates microsecond-level ML operations, rendering precise bottleneck analysis or cycle-level optimization impossible.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - MCU Clock: 168 MHz (1 cycle = ~5.95 ns).
    2. **Calculations:**
       - A fast layer executing 168,000 cycles takes exactly 1.0 ms.
       - A standard SysTick (1 ms resolution) cannot reliably resolve this execution.
       - DWT_CYCCNT resolves down to 5.95 ns increments natively.
    3. **Conclusion & Interpretation:**
       - **Result: Resolution-Bound.** Cycle-level hardware tracing is mandatory for TinyML latency profiling.
