title: ESP32-S3 PSRAM Bottleneck Diagnosis
scenario: Your team deployed a 1.2 MB INT8 wake-word CNN (10 million MACs) to an ESP32-S3. Based on the 240 MHz dual-core CPU with INT8 vector extensions, the theoretical compute cost was estimated at ~10-15ms per inference. However, production profiling shows inference consistently taking over 120ms, leading to dropped audio frames.
question: What is the root cause of this massive compute estimation discrepancy and how would you prove it?
details:
  realistic_solution: The root cause is a severe memory bandwidth bottleneck caused by placing model weights in the 8 MB external PSRAM. Because the model exceeds the 512 KB internal SRAM limit, the fast 240 MHz CPU and its INT8 vector extensions are completely starved waiting on the SPI bus. Compute cost estimation on embedded devices must account for memory access latency, not just ALU throughput. The solution is to prove this via nsys profiling and then Top-K Sparsification to fit within the internal SRAM.
  common_mistake: |
    **The Pitfall:** Overlooking external memory latency.
    **The Rationale:** Candidates blame RTOS scheduling, WiFi stacks, or dual-core utilization because they only compute theoretical ALU FLOPs.
    **The Consequence:** They miss that the 1.2 MB model lives in slow external PSRAM, failing to diagnose the true memory bottleneck starving the CPU pipeline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 1.2 MB INT8.
       - Compute: 10 million MACs.
       - ESP32-S3: 240 MHz dual-core, INT8 vector extensions, Octal SPI PSRAM at 80 MHz.
    2. **Calculations:**
       - Theoretical compute: 10M MACs / (240M * 4 MACs/cycle) ≈ 10.4 ms.
       - Ideal memory fetch: 1.2 MB / 80 MB/s = 15 ms.
       - Effective bandwidth with cache thrashing: ~10 MB/s.
       - Actual fetch time: 1.2 MB / 10 MB/s = 120 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 120 ms.** The architecture is severely **Memory-Bound**, completely stalling the CPU pipeline on SPI transactions.
