title: ESP32-S3 PSRAM Bottleneck Analysis
scenario: You are profiling an INT8 keyword spotting model on an ESP32-S3. The model's weights exceed the 512 KB SRAM and are stored in the 8 MB PSRAM, accessed via an 80 MHz Octal SPI bus. A specific fully connected layer requires 800,000 INT8 MAC operations and loads 800 KB of weight data. Your profiler trace shows this layer takes exactly 10 ms to execute.
question: How would you analyze why the execution takes 10 ms despite the high-speed CPU?
details:
  realistic_solution: Performance is bounded by the roofline ridge point. By calculating both compute and memory bandwidth limits, it's clear the layer is memory-bound. While the ESP32-S3's dual-core and vector extensions compute the MACs in under 1 ms, the processor stalls waiting for weights to stream over the Octal SPI bus from PSRAM.
  common_mistake: |
    **The Pitfall:** Assuming the 10 ms latency is due to poorly optimized compute code.
    **The Rationale:** Candidates focus exclusively on the 240 MHz CPU clock and miss the I/O bottleneck caused by external memory fetches.
    **The Consequence:** Wasted engineering effort optimizing assembly instructions when the real bottleneck requires memory access optimizations like weight compression or caching.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - PSRAM Bus: 80 MHz Octal SPI (8 bits/clock).
       - Layer Weights: 800 KB.
       - Compute: 800,000 MACs on 240 MHz CPU.
    2. **Calculations:**
       - PSRAM Bandwidth: 80 MHz * 1 byte/clock = 80 MB/sec.
       - Memory Fetch Time: 800 KB / 80,000 KB/sec = 10 ms.
       - Theoretical Compute Time: 800,000 MACs / 240,000,000 cycles/sec = 3.33 ms (no vector extensions), < 1 ms (with vector extensions).
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** Fetch time (10 ms) vastly exceeds compute time (<1 ms).
