title: 'The Predictive Maintenance TCO Dilemma: Federated Learning'
scenario: You are testing a new predictive maintenance model (Model B) for 100,000 battery-powered tinyML vibration sensors. Model A results in $10 million annually in unpredicted failure costs. Model B reduces these failures by 45% (saving $4.5 million). However, Model B's updates increase each sensor's average continuous power draw by 15 mW. The sensors run 24/7 (8,760 hours/year) on industrial batteries where energy effectively costs $0.025 per Wh.
question: Should Model B be deployed after accounting for failure savings and the added sensor energy cost?
details:
  realistic_solution: The correct approach is to calculate the total annual financial impact, which is the sum of the savings from improved accuracy and the cost of increased power consumption.
  common_mistake: |
    **The Pitfall:** Rejecting the model due to unit conversion errors in power costs.
    **The Rationale:** Engineers often fixate on the increased power draw and mistakenly calculate energy costs off by orders of magnitude (e.g., confusing mW with W).
    **The Consequence:** They wrongly conclude that the $300k energy cost outweighs the $4.5M operational savings, blocking a highly profitable deployment.
  napkin_math: |
    - **Extra Power per Sensor:** 15 mW = 0.015 W.
    - **Annual Energy per Sensor:** 0.015 W * 8,760 hours = 131.4 Wh.
    - **Total Annual Energy:** 131.4 Wh * 100,000 sensors = 13,140,000 Wh (13.14 MWh).
    - **Total Annual Energy Cost:** 13,140,000 Wh * $0.025/Wh = $328,500.
    - **Gross Savings:** $4,500,000.
    - **Net Impact:** $4,500,000 - $328,500 = **$4,171,500 net decrease** in Total Cost of Ownership.
  options:
  - Do not deploy. The new model adds over $300,000 in annual energy costs, making it too expensive.
  - Deploy. The TCO decreases by approximately $200,000 annually due to the reduction in false positives.
  - Deploy. The TCO decreases by approximately $4.2 million annually, as failure cost savings vastly outweigh the minimal increase in power cost.
  - Do not deploy. The marginal improvement in accuracy does not justify the complexity of a federated learning deployment.
  correct_index: 2
