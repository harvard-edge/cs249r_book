title: 'The Microcontroller''s Bottleneck: MCU Compute Constraints'
scenario: You are estimating the approximate ridge point of the Roofline model for a typical microcontroller.
question: What does a microcontroller roofline ridge point around 0.28 Ops/Byte imply for TinyML bottlenecks?
details:
  realistic_solution: "The ridge point is approximately 0.28 Ops/Byte. This extremely low value indicates that the system is easily compute-bound for typical ML workloads."
  common_mistake: |
    **The Pitfall:** Assuming all edge/tiny hardware is memory-bound due to limited SRAM bandwidth.
    **The Rationale:** Overlooking that the compute capacity (e.g., DSP/FPU FLOPS) is comparatively even more limited than the memory bandwidth.
    **The Consequence:** Wasting effort optimizing memory access patterns when the system is actually starved for compute cycles.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak Compute: ~336 MFLOPS.
    - Peak Memory Bandwidth: ~1.2 GB/s.

    **Calculations:**
    - Ridge Point: 336 MFLOPS / 1.2 GB/s = 0.28 Ops/Byte.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound (Almost all NN layers have > 0.28 Ops/Byte).**
  options:
  - ~300 Ops/Byte, meaning it's strongly memory-bound.
  - ~0.28 Ops/Byte, meaning it's strongly memory-bound.
  - ~0.28 Ops/Byte, meaning it's strongly compute-bound.
  - ~20 Ops/Byte, meaning it's slightly compute-bound.
  correct_index: 2
