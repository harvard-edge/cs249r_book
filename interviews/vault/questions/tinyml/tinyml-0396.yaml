title: 'The Microcontroller''s Bottleneck: MCU Compute Constraints'
scenario: State the approximate ridge point of the Roofline model for a typical microcontroller like an
  Arm Cortex-M4. What does this value fundamentally tell you about its performance bottleneck?
question: "What does a Cortex-M4 roofline ridge point around 0.2 Ops/Byte imply for TinyML bottlenecks?"
details:
  realistic_solution: The ridge point is approximately 0.2 Ops/Byte. This extremely low value indicates
    that the system is easily compute-bound for typical ML workloads. To saturate the compute units, a
    model only needs an arithmetic intensity greater than 0.2 Ops/Byte, which is almost always the case
    for neural network layers. Therefore, performance is dictated by the processor's peak FLOPS, not by
    how fast data can be moved from SRAM.
  common_mistake: Engineers might mistakenly assume that all edge/tiny hardware is memory-bound due to
    limited SRAM bandwidth. However, because the compute capacity (e.g., DSP/FPU FLOPS) is comparatively
    even more limited, these microcontrollers are predominantly compute-bound for neural networks.
  napkin_math: The ridge point is the ratio of peak compute to peak memory bandwidth.
  options:
  - ~300 Ops/Byte, meaning it's strongly memory-bound.
  - ~0.2 Ops/Byte, meaning it's strongly memory-bound.
  - ~0.2 Ops/Byte, meaning it's strongly compute-bound.
  - ~20 Ops/Byte, meaning it's slightly compute-bound.
  correct_index: 2
