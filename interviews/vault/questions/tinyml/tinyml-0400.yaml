title: 'The Depthwise Separable Memory Dividend: CNN Efficient Design'
scenario: Your team is building a keyword spotting model for a Cortex-M4 microcontroller. You have a Flash
  budget of 454KB. A key layer in your CNN is a standard 2D convolution with a 3x3 kernel that takes 16
  input channels and produces 32 output channels. To save space, a colleague suggests replacing it with
  a depthwise separable convolution. Calculate the approximate reduction factor in parameter count (and
  thus, Flash memory usage) for this single layer.
question: "How would you calculate the approximate reduction factor in parameter count (and thus, Flash memory usage) for this single layer?"
details:
  realistic_solution: 'The correct approach is to calculate the parameters for both the standard and the
    depthwise separable convolutions separately and then find their ratio. The depthwise separable layer
    consists of two sub-layers: a 3x3 depthwise convolution and a 1x1 pointwise convolution.'
  common_mistake: 'Engineers often forget that a depthwise separable convolution has two parts: a depthwise
    convolution and a 1x1 pointwise convolution. They only calculate the parameters for the depthwise
    part, leading to a wildly optimistic estimation of the memory savings (e.g., >30x). They forget to
    add the cost of the pointwise ''mixing'' step.'
  napkin_math: Standard Conv Params = 3 * 3 * 16 * 32 = 4,608
  options:
  - A ~32x reduction.
  - A ~2x reduction.
  - A ~7x reduction.
  - There is no significant parameter reduction.
  correct_index: 2
