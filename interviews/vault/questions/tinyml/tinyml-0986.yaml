title: Energy-Aware Model Architecture for Corstone-300
scenario: You are architecting a vision-based wake-word model for an ARM Cortex-M7 + Ethos-U55 (Corstone-300). The system features 512 KB of shared SRAM and an Ethos-U55 NPU (512 MACs/cycle).
question: How should the Corstone-300 vision wake-word model minimize SRAM access energy while using the Ethos-U55 efficiently?
details:
  realistic_solution: The optimal design relies heavily on layer fusion and operator selection (like depthwise convolutions) that maximize data reuse within the Ethos-U55's internal buffers, preventing frequent activation swapping with the shared SRAM.
  common_mistake: |
    **The Pitfall:** Optimizing purely for total MAC counts to reduce compute time.
    **The Rationale:** Candidates forget that the energy per operation for an SRAM read/write is orders of magnitude higher than an NPU MAC.
    **The Consequence:** They design wide layers that spill out of the NPU's local registers, causing energy-intensive thrashing with the shared SRAM.
  napkin_math: |
    - Ethos-U55 MAC: ~0.1 pJ. 32-bit SRAM read: ~5 pJ.
    - Standard layer (512K MACs, 512K SRAM accesses): Compute = 51.2 nJ, Memory = 2.56 µJ.
    - Fused operations reducing SRAM accesses to 128K: Memory drops to 640 nJ.
    - **Fusing layers reduces total energy consumption by over 70% by minimizing memory traffic.**
