title: ESP32-S3 Audio Wake-Word Quantization Pipeline
scenario: >
  You are designing the quantization architecture for a 400K parameter CNN wake-word model deploying to an ESP32-S3. To meet a strict 15ms inference latency, the model weights and activations must reside entirely within the 512 KB SRAM, avoiding the slower 8 MB PSRAM. The ESP32-S3 features a 240 MHz dual-core Xtensa processor with vector extensions specifically optimized for INT8 MAC operations.
question: >
  How would you evaluate and design the optimal quantization strategy to fit the memory constraints while preserving audio classification accuracy?
details:
  realistic_solution: >
    The best approach is to use Quantization-Aware Training (QAT) with symmetric INT8 quantization for both weights and activations. Symmetric quantization forces the zero-point to 0, eliminating the cross-term multiplication overhead in the MAC operations, perfectly aligning with the ESP32-S3's INT8 vector instructions. QAT recovers the accuracy lost by restricting the dynamic range symmetrically, and per-channel weight scales can be folded offline.
  common_mistake: |
    **The Pitfall:** Blindly recommending per-channel asymmetric PTQ to preserve accuracy without considering the ESP32-S3's hardware.
    **The Rationale:** Candidates ignore that asymmetric quantization requires zero-point arithmetic overhead during runtime.
    **The Consequence:** This consumes extra CPU cycles and registers, potentially missing the strict 15ms latency deadline.
  napkin_math: |
    - **FP32 Model Size:** 400,000 params × 4 bytes = 1,600 KB (Exceeds 512 KB SRAM, forcing slow PSRAM).
    - **INT8 Model Size:** 400,000 params × 1 byte = 400 KB.
    - **Remaining SRAM:** 512 KB - 400 KB = 112 KB.
    - **Symmetric Savings:** Symmetric quantization saves 2 operations per MAC (no zero-point offset subtraction).
    - **Conclusion:** For a 10M MAC inference at 240 MHz, saving 2 ops/MAC eliminates 20M operations, ensuring the **15ms deadline** is met using Xtensa vector extensions.
