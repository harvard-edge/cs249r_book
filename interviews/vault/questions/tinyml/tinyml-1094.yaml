title: ESP32-S3 Audio Wake-Word Quantization Pipeline
scenario: >
  You are designing a 400K parameter CNN wake-word model for an ESP32-S3 (240 MHz Xtensa processor with INT8 vector extensions).
  To meet a 15ms latency deadline, weights and activations must reside entirely within the 512 KB SRAM.
question: How would you evaluate and design the optimal quantization strategy to fit memory constraints while preserving accuracy?
details:
  realistic_solution: |
    The best approach is to use Quantization-Aware Training (QAT) with symmetric INT8 quantization for both weights and activations. Symmetric quantization forces the zero-point to 0, eliminating the cross-term multiplication overhead in the MAC operations, perfectly aligning with the ESP32-S3's INT8 vector instructions. QAT recovers the accuracy lost by restricting the dynamic range symmetrically, and per-channel weight scales can be folded offline.
  common_mistake: |
    **The Pitfall:** Blindly recommending per-channel asymmetric PTQ to preserve accuracy without considering the ESP32-S3's hardware.
    **The Rationale:** Candidates ignore that asymmetric quantization requires zero-point arithmetic overhead during runtime.
    **The Consequence:** This consumes extra CPU cycles and registers, potentially missing the strict 15ms latency deadline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 400,000 parameters.
       - SRAM limit: 512 KB.
       - Latency limit: 15 ms.
    2. **Calculations:**
       - FP32 Size: 400k * 4 bytes = 1,600 KB (Exceeds SRAM).
       - INT8 Size: 400k * 1 byte = 400 KB (Fits, leaving 112 KB for activations).
       - Symmetric quant saves 2 zero-point operations per MAC.
       - For a 10M MAC inference, this eliminates 20M scalar operations.
    3. **Conclusion & Interpretation:** Symmetric quantization avoids arithmetic penalties and memory spills. **Result: Compute/Memory-Bound**.
