title: The Power-Aware NAS Dilemma
scenario: You are using NAS for an always-on audio sensor. The system has a strict average power budget of 1mW to ensure a 1-year battery life. The device runs on a MCU consuming 10mW active and 10uW in sleep. The audio pipeline runs once every second. The NAS returns Model A (Accuracy = 92%, Active time = 50 ms) and Model B (Accuracy = 89%, Active time = 20 ms).
question: Which NAS candidate should be selected under the 1 mW average power constraint, and why?
details:
  realistic_solution: Select Model A. Compute the time-weighted average power utilizing the active and deep-sleep duty cycles. Model A achieves an average power of 0.51mW, while Model B achieves 0.21mW. Since both models satisfy the absolute 1mW constraint, the selection criteria must pivot to maximizing predictive accuracy. Sacrificing accuracy to push power metrics needlessly below a met threshold is a fundamental systems engineering anti-pattern.
  common_mistake: |
    **The Pitfall:** Instinctively selecting the lowest-power model regardless of the system budget.
    **The Rationale:** Engineers assume that if low power is critical, the absolute lowest power configuration is always globally optimal.
    **The Consequence:** Critical model accuracy is needlessly sacrificed. Once the hard power threshold is met, over-optimizing power degrades product utility.
  napkin_math: |
    **Assumptions & Constraints:**
    - Budget: 1 mW average. Period: 1000 ms.
    - Active power: 10 mW. Sleep power: 0.01 mW.

    **Calculations:**
    - Model A Average: (50/1000 * 10 mW) + (950/1000 * 0.01 mW) = 0.5 mW + 0.0095 mW = 0.51 mW.
    - Model B Average: (20/1000 * 10 mW) + (980/1000 * 0.01 mW) = 0.2 mW + 0.0098 mW = 0.21 mW.

    **Conclusion & Interpretation:**
    - **Result: 0.51 mW (Power Budget Satisfied)**. Both fit the 1mW envelope, allowing Model A to be chosen for superior accuracy.
  options:
  - 'Model A is the correct choice; its average power is ~0.51 mW (under budget), so we can prioritize its higher accuracy.'
  - 'Model B is the correct choice; its average power is ~0.21 mW, and you must always select the lowest power model regardless of the budget.'
  - 'Neither model works; Model A draws ~1.01 mW and Model B draws ~1.005 mW, both over the 1 mW budget.'
  - 'Both models work, but their power consumption is dominated by the 10 uW sleep state.'
