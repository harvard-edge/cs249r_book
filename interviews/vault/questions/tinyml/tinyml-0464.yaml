title: The Power-Aware NAS Dilemma
scenario: 'You are using Neural Architecture Search (NAS) to find a model for an always-on audio sensor.
  The system has a strict average power budget of 1mW to ensure a 1-year battery life. The device runs
  on a Cortex-M4, which consumes 10mW when active and 10µW in deep sleep. The audio pipeline runs once
  every second (t_period = 1s). The NAS returns two candidate models:

  - **Model A:** Accuracy = 92%, Active inference time = 50 ms

  - **Model B:** Accuracy = 89%, Active inference time = 20 ms

  Which model should you select based on the power budget constraint?'
question: "Which NAS candidate should be selected under the 1 mW average power constraint, and why?"
details:
  realistic_solution: 'Calculate average power per model. P_avg = (t_active/t_period) * P_active + (1
    - t_active/t_period) * P_sleep. Model A: 50/1000 * 10 mW + 950/1000 * 0.01 mW = 0.5 + 0.0095 = 0.51
    mW (under 1 mW). Model B: 20/1000 * 25 mW + 980/1000 * 0.01 mW = 0.5 + 0.0098 = 0.51 mW (also under
    1 mW). Both meet the constraint at 0.51 mW despite different profiles. A runs longer (50 ms) at lower
    power (10 mW). B runs shorter (20 ms) at higher power (25 mW). The NAS should then optimize for accuracy
    since both are power-equivalent. Battery life (CR2032, 675 mWh): 675/0.51 = 1,324 hours = 55 days
    for either model.'
  common_mistake: A common mistake is to instinctively choose the model with the shortest active time
    (Model B) or the highest accuracy (Model A) without doing the math. Engineers often forget that sleep
    power, while tiny, dominates the energy budget when the duty cycle is very low. A failure to correctly
    apply the average power formula can lead to selecting a model that drains the battery months ahead
    of schedule.
  napkin_math: '**Formula for Average Power:**

    P_avg = (t_active / t_period) × P_active + (1 − t_active / t_period) × P_sleep


    **Model A:**

    - Duty cycle = 50 ms / 1000 ms = 0.05

    - P_avg = 0.05 × 10 mW + 0.95 × 0.01 mW = 0.5 + 0.0095 = **0.51 mW** ✓ (under 1 mW budget)


    **Model B:**

    - Duty cycle = 20 ms / 1000 ms = 0.02

    - P_avg = 0.02 × 10 mW + 0.98 × 0.01 mW = 0.2 + 0.0098 = **0.21 mW** ✓ (under 1 mW budget)


    **Decision:** Both models fit within the 1 mW power budget. Since both are feasible, **select Model
    A** for its higher accuracy (92% vs. 89%). Model B''s lower power (0.21 vs. 0.51 mW) provides no additional
    benefit once the constraint is met — accuracy should be maximized within the power envelope.'
  options:
  - Model B is the correct choice, with an average power of 0.51mW.
  - Model A is the correct choice because its higher accuracy is worth the 1.01mW power draw.
  - Neither model works; Model A is 1.01mW and Model B is 1.005mW, both over budget.
  - Both models work; their power consumption is dominated by the 10µW sleep state.
  correct_index: 0
