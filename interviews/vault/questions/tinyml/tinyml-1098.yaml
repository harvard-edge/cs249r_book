title: Continuous Audio Ingestion Pipeline on Corstone-300
scenario: You are designing a real-time predictive maintenance sensor that continuously ingests 16 kHz acoustic data to detect machine anomalies. The system runs on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform, which features a 480 MHz M7 and an Ethos-U55 NPU (capable of 128-512 MAC/cycle) that share a strict 512 KB SRAM constraint.
question: How should the Corstone-300 pipeline be architected to ingest 16 kHz audio without dropping frames while sharing 512 KB SRAM?
details:
  realistic_solution: Architect a DMA-backed ping-pong buffer for raw audio ingestion (e.g., 20ms frames). While DMA fills buffer B, the Cortex-M7 computes MFCC features from buffer A. These features are appended to a compact sliding-window ring buffer. The M7 then triggers the Ethos-U55 to run inference on the feature window. By keeping raw audio buffers tiny and using DMA, the CPU is freed, and the shared 512 KB SRAM is preserved for the NPU's execution.
  common_mistake: |
    **The Pitfall:** Proposing a naive sequential pipeline without DMA or over-allocating large ring buffers for raw audio.
    **The Rationale:** Candidates fail to utilize DMA to offload the CPU or forget that the 512 KB SRAM is shared with the NPU.
    **The Consequence:** This leads to dropped samples during M7/NPU processing or starves the NPU's activation arena.
  napkin_math: |
    *   **Audio Data Rate**: 16 kHz at 16-bit = 32 KB/sec.
    *   **DMA Ping-Pong Buffer**: 20 ms frames require 2 * (16,000 * 0.02 * 2) = 1,280 bytes (1.25 KB) SRAM.
    *   **Feature Buffer**: 50 frames (1 sec) * 40 bytes/frame = 2 KB SRAM.
    *   **CPU Cycles**: 480 MHz gives 9.6M cycles per 20 ms frame. MFCC takes <2M cycles.
    *   **Conclusion**: **Total ingestion buffer is ~3.25 KB, leaving >500 KB of SRAM for the NPU tensor arena without contention.**
