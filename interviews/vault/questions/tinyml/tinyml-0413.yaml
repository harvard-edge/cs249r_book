title: The Brown-Out Inference Corruption
scenario: Your battery-powered air quality monitor on a Cortex-M0+ (SAMD21, 48 MHz, 32 KB SRAM) runs a
  small gas classification model. When the battery drops below 2.5V (the MCU's minimum is 1.62V), the
  device occasionally outputs a confident but wrong classification — it reports 'dangerous gas detected'
  when the air is clean. This triggers false alarms. Why doesn't the MCU just reset when the voltage is
  low?
details:
  realistic_solution: The SAMD21's BOD33 (Brown-Out Detector for 3.3V domain) has configurable thresholds.
    The default threshold is 1.77V — well below the 2.5V where problems start. The MCU is "within spec"
    at 2.5V (minimum VDD is 1.62V), so the BOD doesn't trigger. But "within spec" for the digital logic
    doesn't mean "within spec" for analog peripherals and accurate computation.
  common_mistake: '"The brown-out detector (BOD) should catch this and reset the MCU before it produces
    wrong results." The BOD does exist, but its threshold and response time create a dangerous window.'
  napkin_math: 'Battery voltage curve (CR123A lithium): 3.0V at 100% -> 2.5V at 5% remaining -> 2.0V at
    1% remaining (sharp cliff: 95% of capacity is delivered between 3.0V and 2.5V, then voltage drops
    rapidly). The 2.5V danger zone lasts for ~5% of battery life. At 1 inference/minute: 5% of 1-year
    battery = 18.25 days × 1,440 inferences/day = 26,280 inferences in the danger zone. If 1% produce
    false alarms: 263 false alarms over the battery''s end-of-life period. BOD at 2.7V: eliminates the
    danger zone entirely, but sacrifices ~3% of battery capacity (the MCU resets 3% earlier). For a 1-year
    deployment: loses ~11 days of operation. Acceptable trade-off vs 263 false alarms. Voltage monitoring
    via ADC: VDD/4 through a resistor divider, measured against 1.0V bandgap. At 2.8V: VDD/4 = 0.7V. ADC
    reading: 0.7/1.0 × 4096 = 2,867. Threshold: if ADC < 2,867, enter safe mode. Cost: 1 ADC read per
    inference cycle = 13 µs at 48 MHz. Negligible.'
