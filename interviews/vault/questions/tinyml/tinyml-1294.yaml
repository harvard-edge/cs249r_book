title: Ethos-U55 Operator Offloading and Fallback Analysis
scenario: You are deploying a custom CNN for keyword spotting on an ARM Corstone-300 subsystem (480 MHz Cortex-M7, Ethos-U55 NPU, 512 KB shared SRAM). During compilation, an unsupported custom activation function forces a fallback to the Cortex-M7.
question: "How would you analyze the system-level implications of this compilation outcome and specify a graph optimization strategy to satisfy strict latency constraints?"
details:
  realistic_solution: The optimal strategy is to use the compiler to perform operator substitution or constant folding prior to lowering. Specifically, the custom activation should be approximated with a framework-supported piecewise linear function (like HardSwish) that the Ethos-U55 compiler can map directly to its internal Look-Up Table (LUT) or native instructions, keeping the entire subgraph on the NPU and preserving SRAM.
  common_mistake: |
    **The Pitfall:** Assuming the only penalty is the slower execution of the custom activation on the Cortex-M7.
    **The Rationale:** Candidates miss the memory bandwidth penalty caused by transitioning execution domains.
    **The Consequence:** They ignore SRAM fragmentation, broken operator fusion, and the massive I/O cost of materializing intermediate tensors.
  napkin_math: |
    1. Consider intermediate tensor size: 64 channels * 50 features * 1 byte = 3,200 bytes.
    2. Calculate context switch memory traffic (NPU->M7->NPU): 4 reads/writes = 12.8 KB.
    3. Calculate memory latency: At 4 bytes/cycle, memory transfers alone take 3,200 cycles.
    4. Compare to NPU compute: NPU processing at 256 MACs/cycle might take tens of cycles.
    5. **Final Result: The fallback latency is entirely dominated by the 3,200 cycle memory I/O bottleneck.**
