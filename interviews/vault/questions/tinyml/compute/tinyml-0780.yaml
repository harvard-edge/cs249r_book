title: Tinyml New 0002
scenario: You are deploying a quantized INT8 CNN on a Cortex-M4 using CMSIS-NN. You expected a 4x speedup over FP32, but execution time actually increased by 20%. Profiling shows the CPU is fully utilized but taking significantly longer.
question: Why did the INT8 CNN become slower than FP32 despite the expected CMSIS-NN SIMD speedups?
details:
  realistic_solution: 'The compiler failed to find an optimized INT8 kernel for a specific layer configuration (e.g., asymmetric padding or unsupported stride). It falls back to a slow reference implementation, or inserts dequantize and quantize nodes around an FP32 kernel. You must analyze the operator support matrix and adjust the padding or stride to match CMSIS-NN SIMD requirements.'
  common_mistake: |
    **The Pitfall:** Assuming all INT8 operations automatically use hardware SIMD instructions.
    **The Rationale:** Candidates assume that simply compiling an INT8 model guarantees acceleration, without verifying the operator support matrix.
    **The Consequence:** If the layer uses an unsupported configuration (e.g., asymmetric padding), the runtime inserts slow dequantize/quantize nodes and uses an unoptimized reference kernel, completely ruining latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Workload: ~10,000 MACs.
    - Hardware: Cortex-M4 (168 MHz).
    - SIMD MAC: ~1 cycle. Reference MAC: ~15 cycles + Dequantization overhead.

    **Calculations:**
    - SIMD Path Latency: 10,000 cycles / 168 MHz = 0.06 ms.
    - Fallback Path Cycles: (10,000 MACs * 15) + (~50 cycles/element overhead) ≈ 650,000 cycles.
    - Fallback Path Latency: 650,000 cycles / 168 MHz = 3.87 ms.

    **Conclusion & Interpretation:**
    - **Result: SIMD Fallback to Reference Kernel (Compute-Bound).** The latency exploded from 0.06 ms to 3.87 ms because the layer configuration triggered an unoptimized reference fallback.
