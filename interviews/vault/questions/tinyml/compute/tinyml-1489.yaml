title: Roofline Feasibility Check for MobileNetV2 on Cortex-M4
scenario: A firmware team wants to run MobileNetV2 (300M FLOPs, 3.4M params) on STM32F4 with Cortex-M4 at 168MHz and 256KB SRAM. Flash is 1MB. The processor achieves ~100 MFLOPS in optimized SIMD.
question: Can MobileNetV2 fit on an STM32F4 with 1 MB flash and 256 KB SRAM, and what latency remains if you shrink it to a 0.35x MobileNetV2 variant and, if needed, reduce the input to 96x96?
details:
  realistic_solution: Model weights INT8 = 3.4M bytes = 3.4MB, which exceeds 1MB flash; even INT4 weights are about 1.7MB and still exceed flash. A 0.35x width multiplier variant can bring weights to roughly 400KB, but at the original input size its peak activations can still exceed 256KB SRAM. Reducing the input to 96x96 gives an example shrunk variant with about 14M FLOPs and about 180KB peak activations. Latency = 14M / 100M FLOPS = 140ms, or about 7 FPS, so this is feasible only for workloads that can tolerate below-10-FPS throughput.
  common_mistake: |
    **The Pitfall:** Confusing total parameter count with activation memory.
    **The Rationale:** Candidates focus only on flash storage limits for weights and ignore the transient memory needed for feature maps.
    **The Consequence:** They mistakenly conclude the model fits, only to crash at runtime because MobileNetV2 peak activation memory exceeds the available SRAM even with quantization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Full MobileNetV2: 300M FLOPs, 3.4M parameters
    - Flash: 1 MB, SRAM: 256 KB
    - 0.35x/96x96 variant estimate: ~400KB INT8 weights, ~14M FLOPs, and ~180KB peak activations before stack, runtime buffers, and operator scratch.
    - SIMD Peak: ~100 MFLOPS

    **Calculations:**
    - Full model weights = 3.4 MB (Exceeds 1 MB Flash)
    - Full model cannot fit in 1 MB flash even before activation SRAM is considered.
    - Example shrunk weights leave about 1 MB - 400 KB = 600 KB flash for code, metadata, and constants.
    - Example shrunk SRAM headroom before non-model reserves = 256 KB - 180 KB = 76 KB, which must cover stack, tensor arena overhead, temporary buffers, and peripheral/runtime needs.
    - 0.35x variant latency = 14,000,000 FLOPs / 100,000,000 FLOPS = 140 ms

    **Conclusion & Interpretation:**
    - **Result: 140 ms / ~7 FPS for the illustrative 0.35x/96x96 variant (Compute-Bound after memory fit is proven)**. The full model fails flash constraints; the shrunk variant is only a candidate fit until the actual TFLite Micro arena, stack, scratch buffers, and operator implementation are profiled against the 256 KB SRAM limit.
