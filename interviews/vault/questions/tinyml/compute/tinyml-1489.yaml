title: 'Roofline Feasibility Check for MobileNetV2 on Cortex-M4'
scenario: 'A firmware team wants to run MobileNetV2 (300M FLOPs, 3.4M params) on STM32F4 with Cortex-M4 at 168MHz and 256KB SRAM. Flash is 1MB. The processor achieves ~100 MFLOPS in optimized SIMD.'
question: 'Can MobileNetV2 fit on an STM32F4 with 1 MB flash and 256 KB SRAM, and what latency remains after shrinking it?'
details:
  realistic_solution: 'Model weights INT8 = 3.4M bytes = 3.4MB — exceeds 1MB flash. Even at INT4, 1.7MB still exceeds flash. Must use a 0.35x width multiplier variant (~400KB weights, 75M FLOPs). Peak activations for 0.35x at 224x224 input exceed 256KB SRAM — must reduce input to 96x96 (~14M FLOPs). Latency = 14M / 100M FPS = 140ms. Feasible for <10fps applications only.'
  common_mistake: 'Confusing total parameter count with activation memory; MobileNetV2 peak activation memory exceeds the available SRAM even with quantization.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Full MobileNetV2: 300M FLOPs, 3.4M parameters
    - Flash: 1 MB, SRAM: 256 KB
    - 0.35x variant: ~400KB weights, 96x96 input (~14M FLOPs, ~180KB peak activations)
    - SIMD Peak: ~100 MFLOPS

    **Calculations:**
    - Full model weights = 3.4 MB (Exceeds 1 MB Flash)
    - 0.35x variant latency = 14,000,000 FLOPs / 100,000,000 FLOPS = 140 ms

    **Conclusion & Interpretation:**
    - **Result: 140 ms / ~7 FPS (Compute-Bound)**. The full model fails memory constraints, but the aggressively shrunk 0.35x variant fits and runs feasibly for <10 FPS tasks.
