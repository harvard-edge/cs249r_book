title: The Microcontroller's Compute Ceiling
scenario: A typical microcontroller like a Cortex-M4 has specific peak compute and
  peak memory bandwidth characteristics that dictate its performance bottlenecks.
question: What does the Ridge Point of a roofline model for a Cortex-M4 indicate about
  its performance, and what is its approximate value?
details:
  realistic_solution: The Ridge Point is the ratio of peak compute (FLOPS) to peak
    memory bandwidth (Bytes/s). For a Cortex-M4, this value is extremely low (approximately
    0.2 Ops/Byte). This indicates that the on-chip SRAM is quite fast relative to
    the simple compute core. Consequently, most ML operations, which have an arithmetic
    intensity greater than 0.2, are compute-bound.
  common_mistake: '**The Pitfall:** Assuming all ML systems are memory-bandwidth-bound
    with a high ridge point.

    **The Rationale:** Engineers from a GPU/cloud background see low MFLOPS and incorrectly
    conclude the memory system is an even bigger bottleneck.

    **The Consequence:** They optimize the wrong part of the system, ignoring the
    fact that the MCU SRAM is fast relative to its compute core.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Cortex-M4 peak compute: ~336 MFLOPS.

    - SRAM bandwidth: ~1.68 GB/s (168MHz * 4 Bytes * 2.5 cycles).


    **Calculations:**

    - Ridge point: 336,000,000 / 1,680,000,000 = 0.2 Ops/Byte.

    - Most ML ops have Arithmetic Intensity > 0.2.


    **Conclusion & Interpretation:**

    - **Result: 0.2 Ops/Byte ([Compute-Bound])**. Nearly all workloads on a Cortex-M4
    are compute-bound, not memory-bound.

    '
  options:
  - ~5.0 Bytes/Op, meaning most workloads are memory-bound. (Inverted ratio trap)
  - ~1.6 Ops/Byte, meaning memory and compute are perfectly balanced. (Forgot 8-bit
    to 32-bit word size multiplier)
  - ~0.2 Ops/Byte, meaning most workloads are compute-bound.
  - ~0.025 Ops/Bit, meaning memory bandwidth is severely constrained. (Bit vs Byte
    confusion trap)
  correct_index: 2
