title: The Hardware MAC Unit Misconception
scenario: >
  Your team is choosing between MCU A (Cortex-M4, 100 MHz, single-cycle multiplier) and MCU B (Cortex-M55, 100 MHz, single-cycle multiplier + Helium MVE vector extension).
question: Are a Cortex-M4 and Cortex-M55 equally fast for ML just because both have a single-cycle hardware multiplier?
details:
  realistic_solution: |
    The manager is wrong. The hardware multiplier is necessary but not sufficient for ML performance. The difference is in *how many operations the multiplier feeds per cycle*.
  common_mistake: |
    **The Pitfall:** Assuming "a hardware multiplier is a hardware multiplier — they're both single-cycle, so performance is identical."
    **The Rationale:** This treats the multiplier in isolation and ignores the surrounding datapath and vector extensions.
    **The Consequence:** Teams select outdated MCU architectures, leaving massive performance and energy efficiency gains on the table.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 1.5M MACs. Base clock: 100 MHz.

    **Calculations:**
    - M4: 2 MACs/cycle -> 7.5 ms.
    - M55 + Helium: 4 MACs/cycle -> 3.75 ms.
    - Vector loop bookkeeping elimination yields ~3.2 ms (2.3x speedup).
    - Energy Ratio: M55 uses 10% more power per cycle but finishes in 43% of the time (1.1 * 0.43 = ~0.48x energy).

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound (Datapath Efficiency)**. M55 vector extensions double throughput and halve energy.
