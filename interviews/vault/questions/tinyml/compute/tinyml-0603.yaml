title: The MCU Throughput Ceiling
scenario: Your anomaly detection model needs 10 million MACs per inference. You need 10 inferences per second on a Cortex-M4 at 168 MHz with CMSIS-NN SIMD.
question: Can a 168 MHz Cortex-M4 sustain 10 inferences per second for a 10M-MAC model while serving sensors and UART?
details:
  realistic_solution: 'The 336 MMAC/s is the peak throughput for pure MAC operations. Real inference includes: (1) **Memory loads** — fetching weights and activations from SRAM takes cycles. If data isn''t in the CPU''s small cache (typically 4-16 KB on M4), every load stalls the pipeline. (2) **Activation functions** — ReLU is cheap (1 cycle), but sigmoid/tanh require lookup tables or polynomial approximation (10-20 cycles each). (3) **Requantization** — between layers, INT32 accumulator results must be rescaled back to INT8 (shift, round, clamp: ~5 cycles per element). (4) **Loop overhead** — index computation, bounds checking, pointer arithmetic.'
  common_mistake: |
    **The Pitfall:** Calculating purely on peak MACs without modeling overheads.
    **The Rationale:** Candidates assume 100% pipeline utilization (100 MMAC/s / 336 MMAC/s = 30%), ignoring the massive stall cycles from SRAM loads, non-linear activations, and requantization loops.
    **The Consequence:** Deploying a system that theoretically has 70% headroom but practically starves sensor interrupts due to execution stalls.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4 at 168 MHz. CMSIS-NN SIMD (2x MACs/cycle). 10M MAC model at 10 Hz. 60% pipeline utilization due to SRAM loads/activations. Sensors (15%) + UART (5%).

    **Calculations:**
    - Peak compute = 168 * 2 = 336 MMAC/s. Effective compute = 336 * 0.60 = 201.6 MMAC/s. ML workload requirement = 10M * 10 = 100 MMAC/s. ML CPU utilization = 100 / 201.6 = 49.6%. Total utilization = 49.6% (ML) + 15% (Sensors) + 5% (UART) = 69.6%.

    **Conclusion & Interpretation:**
    - **Result: ~70% CPU utilization leaves ~30% headroom (Compute-Bound Pipeline Feasibility)**.
