title: The MCU Throughput Ceiling
scenario: Your anomaly detection model needs 10 million MACs per inference. You need 10 inferences per second on a Cortex-M4 at 168 MHz with CMSIS-NN SIMD.
question: Can a 168 MHz Cortex-M4 sustain 10 inferences per second for a 10M-MAC model while serving sensors and UART?
details:
  realistic_solution: |
    Yes, under the stated efficiency and fixed-overhead assumptions, the Cortex-M4 can sustain 10 Hz but with modest headroom. The 336 MMAC/s figure is only the peak MAC rate; applying 60% sustained CMSIS-NN efficiency gives 201.6 MMAC/s effective throughput. The model needs 100 MMAC/s, or 49.6% of the effective compute budget. If sensor service and UART together are specified as another 20% of the same CPU-time budget, total utilization is about 69.6%, leaving about 30% headroom. The risk is that real memory loads, requantization, activation functions, and loop overhead can reduce sustained efficiency below 60%, so this requires profiling rather than relying on peak MACs.
  common_mistake: |
    **The Pitfall:** Calculating purely on peak MACs without modeling overheads.
    **The Rationale:** Candidates assume 100% pipeline utilization (100 MMAC/s / 336 MMAC/s = 30%), ignoring the massive stall cycles from SRAM loads, non-linear activations, and requantization loops.
    **The Consequence:** Deploying a system that theoretically has 70% headroom but practically starves sensor interrupts due to execution stalls.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4 at 168 MHz.
    - CMSIS-NN SIMD peak: 2 MACs/cycle.
    - Sustained inference efficiency: 60% of peak after memory, activation, requantization, and loop overhead.
    - Model: 10M MACs/inference at 10 inferences/s.
    - Sensor service and UART are fixed CPU-time costs on the same utilization basis: 15% + 5%.

    **Calculations:**
    - Peak compute = 168 MHz * 2 MAC/cycle = 336 MMAC/s.
    - Effective compute = 336 * 0.60 = 201.6 MMAC/s.
    - ML workload requirement = 10M * 10 = 100 MMAC/s.
    - ML CPU utilization = 100 / 201.6 = 49.6%.
    - Total utilization = 49.6% + 15% + 5% = 69.6%.

    **Conclusion & Interpretation:**
    - **Result: Feasible at ~70% CPU utilization if 60% sustained efficiency is achieved (Compute-Bound Pipeline Feasibility)**. If measured efficiency is lower, the sensor/UART workload can consume the remaining headroom.
