title: Continuous Acoustic Wake-Word on nRF5340
scenario: Design a continuous acoustic wake-word detection system for a wearable. The system must process 16kHz audio using a depthwise separable CNN while maintaining an average system current under 100 µA.
question: How would you partition the workload between the 128 MHz app core and 64 MHz network core to meet the 100 µA limit?
details:
  realistic_solution: A cascaded architecture is required to meet the power budget. A tiny first-stage Voice Activity Detector (VAD) runs on the lower-power 64 MHz network core or a dedicated DSP, keeping the 128 MHz app core asleep. Only when speech is detected does the system wake the app core to execute the larger CNN, heavily quantized to INT8 to fit within the 1 MB flash and 256 KB SRAM, optimizing MAC operations to minimize active compute time.
  common_mistake: |
    **The Pitfall:** Running the full neural network on the 128 MHz application core continuously.
    **The Rationale:** Candidates calculate that the MCU is fast enough to execute the model in real-time, but ignore the power draw.
    **The Consequence:** The continuous 5 mA active draw instantly blows the 100 µA budget, killing the wearable's battery in hours instead of weeks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Audio Sampling: 16 kHz.
    - App Core: 128 MHz, draws ~5 mA active.
    - Target Average Current: < 100 µA.

    **Calculations:**
    - CNN Compute Time: 5M MACs/sec on 128 MHz core = ~39 ms of active time per second (3.9% duty cycle).
    - Active CNN Current Drain: 5 mA * 0.039 = 195 µA (Violates 100 µA budget if run continuously).
    - VAD Duty Cycle (Cascaded): VAD runs continuously at 50 µA, waking App Core 1% of the time.
    - Cascaded Average Current: 50 µA (VAD) + (0.01 * 5,000 µA) = 100 µA.

    **Conclusion & Interpretation:**
    - **Result: Energy-Bound.** Running the full CNN continuously blows the energy budget. A cascaded architecture with a low-power VAD is mandatory to achieve the 100 µA target.
