title: Co-Designing a TinyML Accelerator
scenario: Your company is designing a custom TinyML accelerator to be integrated alongside
  a Cortex-M4 core on the same die. The accelerator must run INT8 inference 10× faster
  than CMSIS-NN on the M4 while adding less than 0.5 mm² of silicon area (in 28nm
  process).
question: What sub-0.5 mm² INT8 accelerator blocks would beat CMSIS-NN on a Cortex-M4
  by 10x?
details:
  realistic_solution: 'Build a weight-stationary systolic array: 64 INT8 MAC units
    (0.15mm²), 32KB weight SRAM (0.1mm²), 8KB activation SRAM (0.03mm²), DMA engine
    + control (0.1mm²). Total: ~0.38mm². Performance: 64 MACs/cycle at 100MHz = 6.4
    GMAC/s vs CMSIS-NN''s ~68 MMAC/s = 94x speedup. Energy: fixed datapath eliminates
    instruction fetch/decode. Leave to the M4: activation functions, pooling, non-standard
    layers, and control flow.'
  common_mistake: '**The Pitfall:** Attempting to build a miniature GPU with many
    stream processors.

    **The Rationale:** Candidates incorrectly assume GPU architectures scale down
    linearly, forgetting that GPUs optimize for massive throughput at the expense
    of power and area efficiency.

    **The Consequence:** The resulting accelerator exceeds the 0.5 mm² budget and
    consumes too much power for TinyML applications.

    '
  napkin_math: '**Assumptions & Constraints:**

    - <0.5 mm² area limit in 28nm.

    - Target >10x speedup over CMSIS-NN (~68 MMAC/s).


    **Calculations:**

    - Array area: 0.15 (MACs) + 0.1 (Weights) + 0.03 (Activations) + 0.1 (DMA) = 0.38
    mm².

    - Performance: 64 MACs/cycle * 100 MHz = 6.4 GMAC/s.

    - Speedup: 6.4 GMAC/s / 0.068 GMAC/s = ~94x.


    **Conclusion & Interpretation:**

    - **Result: 94x speedup (Compute-Bound)**. A 0.38 mm² weight-stationary array
    hits 6.4 GMAC/s.

    '
  options:
  - Build a mini-GPU with 16 streaming multiprocessors (0.4 mm²) to handle all floating-point
    and integer ops.
  - Build a weight-stationary systolic array with 64 INT8 MACs, 32KB weight SRAM,
    and 8KB activation SRAM (~0.38 mm²). Leave activations, pooling, and control flow
    to the M4.
  - Add a 512KB L2 cache (0.45 mm²) to the Cortex-M4 to solve the CMSIS-NN memory
    bandwidth bottleneck.
  - Implement a dedicated FP16 matrix multiplication unit (0.2 mm²) that offloads
    the entire network execution from the M4.
