title: 'The Microcontroller''s Ceiling: MCU Compute Constraints'
scenario: 'You''re profiling a keyword-spotting model on a Cortex-M4 microcontroller. To understand its performance limits, you need to know the hardware''s fundamental characteristics.'
question: 'What is the approximate Ridge Point of a typical Cortex-M4, and what does it signify?'
details:
  realistic_solution: 'The Ridge Point is approximately 0.28 Ops/Byte. This value marks the transition from being memory-bound to compute-bound. Since the value is so low, it signifies that nearly any ML operation will have an Arithmetic Intensity greater than 0.28, meaning the model''s performance will almost always be limited by the processor''s peak compute speed, not memory bandwidth.'
  common_mistake: |
    **The Pitfall:** Assuming a high Ridge Point (e.g., >100 Ops/Byte) for microcontrollers.
    **The Rationale:** Engineers accustomed to cloud or edge GPUs often incorrectly believe that memory bandwidth is the primary bottleneck.
    **The Consequence:** Misidentifying the bottleneck causes developers to needlessly optimize memory bandwidth instead of compute efficiency, leading to sub-optimal model architectures.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: Cortex-M4 running at 168MHz.
    - Peak Compute: 336 MFLOPS.
    - SRAM Memory Bandwidth: ~1.2 GB/s.

    **Calculations:**
    - Ridge Point: 336 MFLOPS / 1.2 GB/s = 0.28 Ops/Byte.
    - Typical KWS INT8 Conv reads 1 byte per MAC (2 FLOPs), yielding an arithmetic intensity of 2.0.

    **Conclusion & Interpretation:**
    - **Result: 0.28 Ops/Byte (Compute-Bound)**. Since arithmetic intensity (2.0) is much greater than the Ridge Point (0.28), KWS on the M4 is overwhelmingly compute-bound.
  options:
  - '~200 Ops/Byte, meaning it''s almost always compute-bound.'
  - '~2 Ops/W, meaning it''s very power efficient.'
  - '~0.28 Ops/Byte, meaning it''s almost always compute-bound.'
  - '~20 Ops/Byte, meaning it''s balanced between compute and memory.'
