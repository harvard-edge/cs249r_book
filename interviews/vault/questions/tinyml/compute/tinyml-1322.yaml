title: 'TinyML Compute Estimation for Nordic nRF5340'
scenario: 'You are tasked with deploying a CNN for keyword spotting on a Nordic nRF5340 microcontroller (128 MHz Cortex-M33).'
question: 'Which compute and memory metrics must be estimated before deploying, and what is the theoretical latency floor for a 500k MAC model?'
details:
  realistic_solution: 'To realistically estimate compute cost for tinyML on the Nordic nRF5340, one must consider both the number of Multiply-Accumulate operations (MACs/FLOPs) for the model and its memory footprint (weights and activations). Utilize dedicated tools like TensorFlow Lite for Microcontrollers (TFLu) built-in model analyzer to get precise MACs and memory usage. Furthermore, actual profiling on the target hardware or a development board with representative workloads is essential to account for real-world factors like memory access patterns and peripheral interactions.'
  common_mistake: |
    **The Pitfall:** Relying exclusively on FLOPs/MACs sizing while completely ignoring peak intermediate activation sizing.
    **The Rationale:** Candidates assume that if a model executes fast enough, it will inherently fit onto the device.
    **The Consequence:** The model compiles successfully but instantly throws an Out-Of-Memory (OOM) hard fault at runtime when intermediate tensors overflow the SRAM capacity.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M33 at 128 MHz (128,000,000 cycles/sec).
    - KWS CNN workload = 500,000 INT8 MACs.
    - 8-bit integer MAC takes 1-2 clock cycles utilizing DSP extensions.

    **Calculations:**
    - Lower bound cycles = 500,000 MACs * 1 cycle/MAC = 500,000 cycles.
    - Upper bound cycles = 500,000 MACs * 2 cycles/MAC = 1,000,000 cycles.
    - Minimum Execution Time = 500,000 / 128,000,000 = 3.9 ms.
    - Maximum Execution Time = 1,000,000 / 128,000,000 = 7.8 ms.

    **Conclusion & Interpretation:**
    - **Result: 3.9 - 7.8 ms (Compute-Bound)**. This provides a strict lower bound for compute. Any actual deployment will take longer due to memory movement (SRAM constraints) and peripheral I/O overhead.
