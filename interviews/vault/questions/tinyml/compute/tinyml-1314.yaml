title: 'Roofline Analysis for TinyML: Cortex-M7 + Ethos-U55 Performance Evaluation'
scenario: You are tasked with deploying a convolutional neural network (CNN) for keyword spotting on an embedded platform featuring a Cortex-M7 processor (480 MHz) and an Ethos-U55-128-class NPU, with 512 KB of SRAM. The CNN involves a series of 3x3 convolutions followed by pooling layers.
question: How should roofline analysis predict whether a Cortex-M7 plus Ethos-U55 CNN workload is compute-bound or memory-bound, and predict NPU utilization?
details:
  realistic_solution: 'A realistic solution involves: 1. Calculating the selected NPU peak from the implemented Ethos-U55 class and clock, using the same convention throughout (for example, an Ethos-U55-128-class design is about 128 INT8 operations/cycle, or 64 MACs/cycle, so at 480 MHz the peak is about 30.72 GMAC/s). 2. Measuring or conservatively estimating effective 512 KB SRAM bandwidth for the tensor arena and DMA path, rather than assuming external-memory bandwidth. 3. Plotting the compute roof and SRAM bandwidth roof on a log-log graph. 4. For each CNN layer, calculating operational intensity in MACs per byte from input, weight, output, and scratch traffic after accounting for reuse within SRAM. 5. Comparing each layer against the roofline knee to determine compute-bound versus SRAM-bandwidth-bound behavior and expected NPU utilization. Wider NPU variants or different clocks require recomputing the peak rather than reusing a generic 512 MAC/cycle number.'
  common_mistake: |
    **The Pitfall:** Assuming a generic roofline model without proper embedded system memory constraints.
    **The Rationale:** Candidates fail to incorporate SRAM vs. external flash bandwidth limits and specific NPU MAC/cycle capabilities.
    **The Consequence:** Inaccurate performance predictions and misidentification of system bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3x3 Conv: 16x16 spatial output, 64 input channels, 64 output channels, INT8 activations and weights.
    - Operations: 16 * 16 * 64 * 64 * 3 * 3 = 9,437,184 MACs.
    - Minimum SRAM traffic with ideal reuse: input 16 * 16 * 64 = 16,384 B; weights 3 * 3 * 64 * 64 = 36,864 B; output 16 * 16 * 64 = 16,384 B; total = 69,632 B.
    - Example Ethos-U55-128-class setting: 128 INT8 ops/cycle, counted here as 64 MACs/cycle, at 480 MHz = 30.72 GMAC/s peak.
    - Assumed effective on-chip SRAM bandwidth for this tensor path: 1 GB/s.

    **Calculations:**
    - 9,437,184 MACs / 69,632 Bytes = 135.5 MACs/byte.
    - Roofline knee for this NPU setting = 30.72 GMAC/s / 1 GB/s = 30.72 MACs/byte.
    - Since 135.5 MACs/byte > 30.72 MACs/byte, this layer is compute-bound if the minimum-traffic reuse pattern is achieved in the 512 KB SRAM.
    - Predicted best-case layer time at peak = 9,437,184 MACs / 30.72 GMAC/s = 0.307 ms; any extra SRAM refetches, flash stalls, or unsupported operators lower utilization.

    **Conclusion & Interpretation:**
    - **Result: 135.5 MACs/byte.** The example is compute-bound for the stated Ethos-U55-128-class peak and 1 GB/s SRAM bandwidth, but utilization prediction remains layer-specific and must be recomputed for the actual NPU variant, clock, SRAM bandwidth, and achieved data reuse.
