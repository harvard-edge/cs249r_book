title: 'Roofline Analysis for TinyML: Cortex-M7 + Ethos-U55 Performance Evaluation'
scenario: You are tasked with deploying a convolutional neural network (CNN) for keyword spotting on an embedded platform featuring a Cortex-M7 processor (480 MHz) and an Ethos-U55 NPU (configurable from 128 to 512 MACs/cycle), with 512 KB of SRAM. The CNN involves a series of 3x3 convolutions followed by pooling layers.
question: How should roofline analysis predict whether a Cortex-M7 plus Ethos-U55 CNN workload is compute-bound or memory-bound, and predict NPU utilization?
details:
  realistic_solution: 'A realistic solution involves: 1. Calculating the peak operational performance (TOPs/s) for the Ethos-U55 based on its configurable MAC/cycle (e.g., 512 MACs/cycle * 480 MHz). 2. Determining the effective memory bandwidth of the 512 KB SRAM. 3. Plotting these as horizontal (peak performance) and inclined (memory bandwidth) lines on a log-log graph. 4. For the CNN workload, calculate its operational intensity (MACs/byte) by analyzing the memory access patterns and compute requirements of each layer, considering data reuse within the 512 KB SRAM. 5. Plot the workload''s operational intensity on the roofline graph to determine if it falls under the compute-bound or memory-bound region, and estimate the expected performance. This analysis helps in predicting Ethos-U55 utilization by comparing achieved performance with its peak capacity and identifying if memory bandwidth or compute throughput is the bottleneck.'
  common_mistake: |
    **The Pitfall:** Assuming a generic roofline model without proper embedded system memory constraints.
    **The Rationale:** Candidates fail to incorporate SRAM vs. external flash bandwidth limits and specific NPU MAC/cycle capabilities.
    **The Consequence:** Inaccurate performance predictions and misidentification of system bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3x3 Conv: 16x16 spatial output, 64 input channels, 64 output channels, INT8 activations and weights.
    - Operations: 16 * 16 * 64 * 64 * 3 * 3 = 9,437,184 MACs.
    - Minimum SRAM traffic with ideal reuse: input 16 * 16 * 64 = 16,384 B; weights 3 * 3 * 64 * 64 = 36,864 B; output 16 * 16 * 64 = 16,384 B; total = 69,632 B.
    - Example Ethos-U55 setting: 128 MACs/cycle at 480 MHz = 61.44 GMAC/s peak. Assumed effective SRAM bandwidth: 1 GB/s.

    **Calculations:**
    - 9,437,184 MACs / 69,632 Bytes = 135.5 MACs/byte.
    - Roofline knee for this NPU setting = 61.44 GMAC/s / 1 GB/s = 61.44 MACs/byte.
    - Since 135.5 MACs/byte > 61.44 MACs/byte, this layer is compute-bound at the 128 MAC/cycle setting if the minimum-traffic reuse pattern is achieved.
    - At 512 MACs/cycle, the compute peak is 245.76 GMAC/s and the knee rises to 245.76 MACs/byte, so the same layer would become SRAM-bandwidth-limited unless bandwidth or reuse improves.

    **Conclusion & Interpretation:**
    - **Result: 135.5 MACs/byte.** The example is compute-bound for a 128 MAC/cycle U55 with 1 GB/s SRAM bandwidth, but not automatically for the 512 MAC/cycle configuration; utilization prediction must compare each layer's intensity against the selected NPU peak and measured SRAM bandwidth.
