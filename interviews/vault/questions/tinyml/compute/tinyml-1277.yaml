title: Cortex-M4 INT8 MAC Roofline Ceiling
scenario: You are building a roofline model to analyze a keyword spotting model deployed on an ARM Cortex-M4 (STM32F4) microcontroller running at 168 MHz with 256 KB SRAM, utilizing the CMSIS-NN library.
question: What is the peak INT8 multiply-accumulate (MAC) throughput per clock cycle on this specific architecture?
details:
  realistic_solution: Use a conservative Cortex-M4 roofline ceiling of 1 effective INT8 MAC per cycle unless a specific CMSIS-NN kernel benchmark proves a higher sustained rate. The STM32F4 Cortex-M4 has DSP instructions such as 16-bit dual MACs, but it does not have a native INT8 dot-product instruction that cleanly defines a 2 INT8 MACs/cycle architectural peak.
  common_mistake: |
    **The Pitfall:** Treating a Cortex-M4 like a core with native INT8 dot-product instructions.
    **The Rationale:** Candidates remember that CMSIS-NN uses DSP instructions, then incorrectly convert that into a clean 2 INT8 MACs/cycle architectural peak.
    **The Consequence:** The roofline ceiling is overstated and hides kernel overhead from unpacking, sign extension, memory access, and loop control.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4 (STM32F4): 168 MHz.
    - Cortex-M4 has DSP extensions but no native INT8 dot-product instruction.
    - The question asks for the per-cycle roofline ceiling, not a full MMAC/s benchmark.

    **Calculations:**
    - Conservative architectural INT8 MAC ceiling: 1 effective MAC/cycle.
    - At 168 MHz, that corresponds to an upper bound of 168 MMAC/s before kernel overhead, memory stalls, and loop control.
    - Any higher number should be justified from a measured CMSIS-NN kernel on this exact MCU, not assumed from a different Arm core.

    **Conclusion & Interpretation:**
    - **Result: use 1 effective INT8 MAC/cycle as the Cortex-M4 roofline ceiling unless target benchmarks prove otherwise**. Do not claim a native 2 INT8 MACs/cycle peak for the STM32F4 Cortex-M4.
