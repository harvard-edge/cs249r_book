title: Peak Compute Derivation for ARM Cortex-M4 Roofline
scenario: You are building a roofline model to analyze a keyword spotting model deployed on an ARM Cortex-M4 (STM32F4) microcontroller running at 168 MHz with 256 KB SRAM, utilizing the CMSIS-NN library.
question: What is the peak INT8 multiply-accumulate (MAC) throughput per clock cycle on this specific architecture?
details:
  realistic_solution: Utilize the CMSIS-NN library's DSP/SIMD instructions, which can perform 2 INT8 MACs per clock cycle, defining the horizontal ceiling of the roofline model.
  common_mistake: |
    **The Pitfall:** Assuming the Cortex-M4 can only execute a standard scalar multiply (1 MAC per cycle).
    **The Rationale:** Candidates fail to recall the availability of DSP/SIMD instructions in the CMSIS-NN library that double this throughput for 8-bit integers.
    **The Consequence:** The compute ceiling of the roofline model will be exactly 50% lower than reality, skewing all performance analysis.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4 (STM32F4): 168 MHz.
    - CMSIS-NN SIMD: 2 INT8 MACs per cycle.

    **Calculations:**
    - Peak per-cycle throughput: 2 INT8 MACs/cycle.
    - At 168 MHz, this corresponds to 168M cycles/s * 2 MACs/cycle = 336 MMAC/s, but the per-cycle roofline fact is the key answer.

    **Conclusion & Interpretation:**
    - **Result: 2 INT8 MACs/cycle (Compute-Bound Ceiling)**. This establishes the per-cycle horizontal compute ceiling for the Cortex-M4 CMSIS-NN roofline.
