title: The CMSIS-DSP FFT Scaling Bug
scenario: You use the ARM CMSIS-DSP fixed-point CFFT path to compute a 256-point FFT for an audio wake-word model. The audio signal is a perfect bin-centered sine wave. However, the FFT output values are much smaller than the feature range used during model training. The code isn't crashing, but the TinyML model fails to trigger because the input features are too weak.
question: Why can a 256-point fixed-point CMSIS-DSP FFT produce features scaled down by 1/256 relative to the training pipeline, and what scaling behavior did you forget to reverse?
details:
  realistic_solution: 'The fixed-point CMSIS-DSP FFT path applies stage-by-stage right shifts to control bit growth. For a 256-point radix-2-equivalent transform, eight stages can produce a net 1/256 scale relative to an unnormalized training pipeline. The missing step is to apply the same normalization convention used in training: multiply the fixed-point FFT magnitudes by the known FFT scale factor before feature extraction, or retrain using the fixed-point scaled features. The exact bin magnitude also depends on the FFT convention and whether you use complex magnitude, power, or windowing, so the diagnosis is the forgotten fixed-point scaling, not a guaranteed zero-confidence output.'
  common_mistake: |
    **The Pitfall:** Blaming the hardware for small FFT outputs.
    **The Rationale:** Candidates assume the microphone gain is too low or the sensor is broken.
    **The Consequence:** Wasting time debugging analog hardware circuits when the actual issue is a deterministic math scaling property of the DSP library.
  napkin_math: |
    **Assumptions & Constraints:**
    - FFT length: N = 256 = 2^8.
    - Fixed-point CFFT scaling: one right shift per stage can produce 8 total right shifts.
    - Training features were built with an unnormalized or differently normalized FFT.

    **Calculations:**
    - Net scale factor = 2^-8 = 1/256.
    - A feature that training expects as 1.0 would arrive as 1.0 / 256 = 0.0039 before compensation.
    - Compensation for this convention: multiply the fixed-point FFT result or derived magnitude by 256 before feeding the model, preserving saturation checks.

    **Conclusion & Interpretation:**
    - **Result: 1/256 feature-scale mismatch (Compute-Bound)**. Reverse the fixed-point FFT scaling or train on the same scaled features; do not treat the tiny values as an analog or model failure.
