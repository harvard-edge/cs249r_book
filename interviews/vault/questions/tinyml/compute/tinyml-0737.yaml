title: The CMSIS-DSP FFT Scaling Bug
scenario: You use the ARM CMSIS-DSP library to compute a 256-point FFT for an audio wake-word model. The audio signal is a perfect sine wave. However, the FFT output values are bizarrely small, much lower than the theoretical amplitude. The code isn't crashing, but the TinyML model fails to trigger because the input features are too weak.
question: Why does a 256-point fixed-point CMSIS-DSP FFT output a sine amplitude near 1/256, and what scaling behavior did you forget to reverse?
details:
  realistic_solution: 'CMSIS-DSP''s fixed-point FFT functions (arm_cfft_q15, arm_cfft_q31) apply internal bit-growth downscaling to prevent overflow. For N=256 points, the output is scaled by 1/N = 1/256. A sine wave with amplitude 1.0 outputs as 0.0039. Your neural network expecting values near 1.0 sees near-zero features, producing 0% confidence. Fix: multiply the FFT output by N (256) after the transform, or use the arm_cfft_f32 floating-point variant which does not downscale. Alternatively, retrain the model on the scaled features. The function is correct — it is preventing integer overflow at the cost of dynamic range.'
  common_mistake: |
    **The Pitfall:** Blaming the hardware for small FFT outputs.
    **The Rationale:** Candidates assume the microphone gain is too low or the sensor is broken.
    **The Consequence:** Wasting time debugging analog hardware circuits when the actual issue is a deterministic math scaling property of the DSP library.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input Amplitude: The true amplitude of the frequency bin is 1.0.
    - CMSIS-DSP Downscaling: To prevent integer overflow, the fixed-point FFT applies a 1/N scaling factor.

    **Calculations:**
    - Calculation: N = 256. 1.0 * (1 / 256) = 0.0039.

    **Conclusion & Interpretation:**
    - **Result: 0.0039 (Compute-Bound)**. The FFT outputs 0.0039. Passing this near-zero value to the neural network guarantees a 0% confidence score.
