title: Cortex-M4 Roofline Compute Bottleneck
scenario: You are optimizing a keyword spotting model on a Cortex-M4 microcontroller. You notice that even with heavily optimized math kernels, you're not seeing the expected performance gains.
question: Based on the typical hardware characteristics of a Cortex-M4, what is the primary performance bottleneck you are likely facing?
details:
  realistic_solution: Under realistic Cortex-M4 assumptions, the workload is likely compute-bound. A Cortex-M4 can commonly sustain about one 32-bit MAC per cycle in optimized DSP code; at 168 MHz, that is 168 MMAC/s, or 336 MOps/s if a multiply and accumulate are counted as two operations. With a 32-bit SRAM path at 168 MHz, bandwidth is about 672 MB/s, so the ridge point is 0.5 Ops/Byte. Optimized convolution layers usually reuse weights and activations enough to exceed that arithmetic intensity, so the limiting factor is the core's MAC throughput rather than SRAM bandwidth.
  common_mistake: |
    **The Pitfall:** Assuming that memory bandwidth is always the bottleneck for neural networks on embedded edge devices.
    **The Rationale:** ML engineers incorrectly apply intuition from datacenter GPUs (where models are often memory-bound) to microcontrollers.
    **The Consequence:** Optimization efforts are misdirected towards tuning memory access patterns instead of recognizing the hard ceiling of the CPU's arithmetic throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4 at 168 MHz with 32-bit SRAM bus.
    - Sustained DSP throughput estimate: 1 32-bit MAC/cycle.
    - Counting 1 MAC as multiply + accumulate gives 2 Ops/cycle = 336 MOps/s.
    - SRAM bandwidth = 4 bytes/cycle = 672 MB/s.

    **Calculations:**
    - Hardware Ridge Point = Peak Compute / Peak Bandwidth = 336 MOps/s / 672 MB/s = 0.5 Ops/Byte.
    - Typical convolutions utilize register tiling to achieve an arithmetic intensity > 0.5 Ops/Byte.

    **Conclusion & Interpretation:**
    - **Result: >0.5 Ops/Byte (Compute-Bound)**. Because the workload's arithmetic intensity exceeds the hardware ridge point, the model is operating on the compute-bound plateau of the Roofline model. The absolute bottleneck is the core's MAC calculation speed.
  options:
    - The system is compute-bound; the CPU's MFLOPS rating is the bottleneck.
    - The system is memory-bound; data cannot be fed to the CPU fast enough.
    - The system is power-bound; the model is causing the chip to thermally throttle.
    - The system is compiler-bound; the toolchain isn't generating efficient instructions.
