title: Roofline Ridge Point Calculation on Ethos-U55
scenario: You are deploying a vision model on an ARM Cortex-M7 + Ethos-U55 platform running at 480 MHz. They share 512 KB of SRAM over an 8-byte per cycle interface. The Ethos-U55 is configured for 256 MACs/cycle.
question: What are the Ethos-U55 peak GOPS, SRAM roofline ridge point, and bottleneck for a 16 OP/byte layer?
details:
  realistic_solution: Construct the roofline model by calculating theoretical peak compute (GOPS) and theoretical peak memory bandwidth (GB/s). The ridge point determines the boundary between memory-bound and compute-bound regions.
  common_mistake: |
    **The Pitfall:** Underestimating peak compute by half.
    **The Rationale:** Candidates often forget to multiply MACs by 2 to get Operations (1 MAC = 1 multiply + 1 accumulate).
    **The Consequence:** Calculating an incorrect ridge point, leading to flawed architectural optimizations based on a false bottleneck analysis.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M7 + Ethos-U55 at 480 MHz.
    - Interface: 8 bytes/cycle shared SRAM.
    - Compute: 256 MACs/cycle.

    **Calculations:**
    - Peak Compute: 480 MHz * 256 MACs/cycle * 2 OPs/MAC = 245.76 GOPS.
    - Peak Bandwidth: 480 MHz * 8 bytes/cycle = 3.84 GB/s.
    - Ridge Point: 245.76 GOPS / 3.84 GB/s = 64 OPs/byte.

    **Conclusion & Interpretation:**
    - **Result: 245.76 GOPS, 64 OPs/byte ridge (Memory-Bandwidth-Bound)**. A 16 OPs/byte layer is strictly memory-bandwidth-bound.
