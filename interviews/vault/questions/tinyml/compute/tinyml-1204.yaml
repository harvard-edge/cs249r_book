title: Corstone-300 Roofline Optimization for Micro-Transformers
scenario: You are architecting a micro-Vision Transformer (mViT) for a smart camera application on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform running at 480 MHz with 512 KB of shared SRAM. The Ethos-U55 is configured for 256 MACs/cycle. Profiling reveals that the self-attention mechanism is severely underutilizing the NPU.
question: How should Corstone-300 fuse micro-transformer attention to move from memory-bound to compute-bound execution within 512 KB?
details:
  realistic_solution: |
    A strong candidate calculates the Corstone-300 roofline and identifies that materializing the full attention score matrix makes the standard path memory-bound. The concrete design is blocked attention: keep one Q block, a K block, a V block, running softmax statistics, and the partial output in the SRAM tensor arena; compute QK^T for the block, apply the softmax update, and immediately accumulate into V without writing the full NxN scores to SRAM. For N=64 and d=32, the score matrix is small enough to tile within 512 KB, but the release-quality claim should be that fusion removes score traffic and moves the kernel to the ridge point or slightly above depending on reuse, not that the command stream alone guarantees compute-bound execution.
  common_mistake: |
    **The Pitfall:** Proposing naive batching or larger tile sizes to improve utilization without verifying the SRAM budget.
    **The Rationale:** Standard GPU-centric optimizations rely on increasing batch sizes, assuming memory is plentiful.
    **The Consequence:** The larger tile immediately overflows the 512 KB shared SRAM, causing a catastrophic fallback to slower external flash memory, massively increasing latency rather than reducing it.
  napkin_math: |
    **Assumptions & Constraints:**
    - Corstone-300 Compute: 480 MHz × 256 MACs/cycle × 2 OPs/MAC = 245.76 GOPS.
    - 64-bit SRAM bandwidth at 480 MHz: 3.84 GB/s.

    **Calculations:**
    - Roofline ridge point: 245.76 GOPS / 3.84 GB/s = 64 OPs/byte.
    - QK^T MACs: 64 × 64 × 32 = 131,072 MACs = 262,144 OPs.
    - Attention-times-V MACs: 64 × 64 × 32 = 131,072 MACs = 262,144 OPs.
    - Total matmul work: 524,288 OPs, plus softmax/update overhead.
    - Unfused traffic: Q, K, V reads (6 KB) + score write/read (8 KB) + output write (2 KB) = 16 KB.
    - Unfused AI: 524,288 OPs / 16,384 bytes = 32 OPs/byte (memory-bound).
    - Fused blocked traffic: Q, K, V reads (6 KB) + output write (2 KB), with only per-row softmax stats kept on-chip = about 8 KB.
    - Fused AI: 524,288 OPs / 8,192 bytes = 64 OPs/byte before softmax overhead.

    **Conclusion & Interpretation:**
    - **Result: 64 OPs/byte (At the Ridge Point)**. Fusing softmax and V-multiplication eliminates the 8 KB score write/read traffic. For the stated dimensions this reaches the roofline ridge point; it should be described as balanced or near compute-bound, not unconditionally above the ridge.
