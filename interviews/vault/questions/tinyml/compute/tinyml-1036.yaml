title: 'Inference Latency and Energy on Nordic nRF5340'
scenario: 'You are deploying a continuous keyword spotting model on a Nordic nRF5340 microcontroller. The model requires 2.5 million operations (MOPs) per inference. The nRF5340 application core runs at 128 MHz and draws ~5mA active current at 3.0V. Assume an average CPI (Cycles Per Instruction) of 1.5 for the model''s workload.'
question: 'What latency and energy per inference result from a 2.5 MOP keyword model on nRF5340 at 128 MHz and 5 mA?'
details:
  realistic_solution: 'First, calculate the total clock cycles required by multiplying the total operations by the CPI. Next, calculate the inference latency by dividing the total cycles by the application core''s clock frequency (128 MHz). Finally, calculate the power consumption (Voltage x Current) and multiply it by the latency to determine the energy per inference.'
  common_mistake: 'Candidates often assume an ideal CPI of 1.0 instead of factoring in memory access and pipeline stalls, or they divide the clock speed by the MOPs incorrectly. They also frequently forget to convert current and voltage into power before multiplying by latency to get energy.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Application Core: 128 MHz
    - Active Current: ~5 mA at 3.0V
    - Operations: 2.5 MOPs
    - Average CPI: 1.5

    **Calculations:**
    - Total cycles = 2.5 MOPs * 1.5 CPI = 3.75 million cycles
    - Latency = 3,750,000 cycles / 128,000,000 Hz = 0.0293 seconds (29.3 ms)
    - Power = 3.0V * 5 mA = 15 mW
    - Energy per inference = 15 mW * 0.0293 s = 0.4395 mJ

    **Conclusion & Interpretation:**
    - **Result: 29.3 ms, 0.44 mJ (Energy-Bound)**. Factoring in CPI accurately projects the real-world latency and energy drain.
