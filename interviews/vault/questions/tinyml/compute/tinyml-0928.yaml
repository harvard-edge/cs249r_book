title: Diagnose Transformer Inference Latency Regression on ESP32-S3
scenario: 'A production keyword-spotting transformer on ESP32-S3 at 240 MHz suddenly shows 340ms inference latency, up from 85ms baseline after a firmware update that increased context window from 32 to 128 tokens. The model is unchanged: 2 layers, 4 heads, 64-dim heads, INT8. The team suspects attention is O(n²) but profiling shows only 60% CPU utilization during inference.'
question: Why did the ESP32-S3 transformer jump from 85 ms to 340 ms when context increased from 32 to 128 tokens?
details:
  realistic_solution: 'The 4x latency jump is not explained by attention FLOPs alone. If the old 85ms profile had 30% attention work and 70% linear-in-sequence work, scaling from 32 to 128 tokens gives a rough upper-bound estimate of 0.30*85*16 + 0.70*85*4 = 646ms. The measured 340ms is lower than that, so the old compute split is not a direct predictor after the firmware change. The stronger clue is 60% CPU utilization: the larger context increases KV-cache traffic and attention working-set movement, so the CPU is often stalled on memory rather than saturated on arithmetic. The full INT8 KV cache at 128 tokens is 2 layers * 2 K/V tensors * 4 heads * 64 dims * 128 tokens * 1 byte = 131,072 bytes (128 KiB), or 64 KiB if the implementation stores only the active layer at a time. Either way it is much larger than the 32-token working set. The fix is to profile memory stalls and use tiled/streamed attention, active-layer KV buffering, or a smaller/sliding context rather than assuming pruning
    compute will recover the regression.'
  common_mistake: |
    **The Pitfall:** Assuming O(n²) attention FLOPs fully explain the 4× latency increase.
    **The Rationale:** Candidates know attention scales quadratically and hastily assume a 4x context increase directly causes the observed latency jump without doing the math.
    **The Consequence:** The team attempts to optimize compute (e.g., pruning) when the actual bottleneck is memory bandwidth and cache thrashing.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: ESP32-S3 at 240 MHz.
       - Model: Transformer (2 layers, 4 heads, 64-dim).
       - Context increase: 32 tokens to 128 tokens (4x increase).
       - Profiling: 85 ms baseline -> 340 ms actual. CPU utilization at 60%.
       - Baseline compute split: 30% attention (O(n²)), 70% non-attention (O(n)).
    2. **Calculations:**
       - Full KV cache at 128 tokens: 2 layers × 2 K/V × 4 heads × 64 dim × 128 tokens × 1 byte = 131,072 bytes = 128 KiB.
       - Active-layer KV working set: 2 K/V × 4 heads × 64 dim × 128 tokens × 1 byte = 65,536 bytes = 64 KiB.
       - Rough compute-only scaling estimate: (0.30 × 85 ms × 16) + (0.70 × 85 ms × 4) = 408 ms + 238 ms = 646 ms.
       - Observed latency: 340 ms, with only 60% CPU utilization, indicating the new bottleneck includes memory stalls rather than pure arithmetic.
    3. **Conclusion & Interpretation:**
       - **Result: Larger KV working set and memory traffic after the 128-token update (Memory-Bandwidth Bound).** The observed 340 ms should be diagnosed with memory-stall profiling and fixed with tiled or streamed attention, not by assuming a simple 16x attention-FLOP model.
