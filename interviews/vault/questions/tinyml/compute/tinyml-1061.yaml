title: NPU Fallback Bottleneck on Ethos-U55
scenario: You deploy an int8 quantized CNN on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) system running at 480 MHz with 512 KB of shared SRAM. The Ethos-U55 is configured for 256 MACs/cycle. During profiling, you notice that overall inference latency spikes drastically whenever a custom non-linear activation layer is inserted between two heavy convolutional blocks, even though this activation layer has negligible FLOPs compared to the convolutions.
question: Why does this massive latency spike occur, and what are the underlying compute and memory constraints of this heterogeneous setup?
details:
  realistic_solution: The latency spike is caused by an NPU fallback. The Ethos-U55 only accelerates supported operations; unsupported layers like a custom activation force the graph compiler to split the network into subgraphs. The NPU executes the first convolutional block, writes the entire intermediate tensor back to the shared 512 KB SRAM, and halts. The Cortex-M7 then wakes up, processes the custom activation using CMSIS-NN at a significantly lower throughput, and writes the results back to SRAM before the NPU can resume. This breaks the NPU's internal data streaming and introduces massive context-switching and memory I/O overhead.
  common_mistake: |
    **The Pitfall:** Assuming the latency spike is due solely to the CPU's lower compute throughput compared to the NPU.
    **The Rationale:** Candidates often assume the latency is due strictly to the M7's lower clock speed or lack of floating-point units. They frequently miss the structural penalty of subgraph partitioning and the fact that breaking the NPU pipeline to fall back to the CPU forces expensive intermediate SRAM round-trips.
    **The Consequence:** Developers misdiagnose the bottleneck as a compute issue rather than a memory bandwidth and context-switching problem, leading to ineffective optimization strategies.
  napkin_math: |
    **Assumptions & Constraints:**
    - The custom activation has negligible MAC count, so the activation's arithmetic throughput is not the main latency term.
    - Activation tensor size: 100 KB

    **Calculations:**
    - Compiler partitions graph: NPU subgraph -> CPU activation -> NPU subgraph.
    - NPU must materialize the 100 KB intermediate tensor in shared SRAM instead of keeping the pipeline internal.
    - Cortex-M7 reads 100 KB from SRAM and writes 100 KB of activated output back to SRAM.
    - Minimum extra explicit tensor traffic = 100 KB NPU write + 100 KB CPU read + 100 KB CPU write = 300 KB, plus synchronization, cache effects, and lost NPU streaming locality.

    **Conclusion & Interpretation:**
    - **Result: subgraph partitioning bottleneck**. The spike comes from breaking the Ethos-U55 pipeline and forcing SRAM round-trips and CPU scheduling around an unsupported op. The activation's FLOPs are small; the cost is the fallback boundary, synchronization, and intermediate tensor movement.
