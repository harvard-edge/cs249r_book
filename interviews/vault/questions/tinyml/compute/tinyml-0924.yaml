title: Analyze Chinchilla Scaling for MCU-Deployable Transformers
scenario: You are evaluating whether a 1M-parameter transformer trained on 20B tokens follows Chinchilla-optimal scaling (20 tokens/parameter). The model targets ESP32-S3 deployment with 512KB SRAM and 8MB flash. INT8 quantization yields 1MB model size fitting flash but exceeds SRAM for full KV cache with 512-token context. Analyze the tension between Chinchilla-optimal training compute and the memory constraints forcing architectural compromises at inference.
question: How would you analyze the tension between Chinchilla-optimal training compute and the memory constraints forcing architectural compromises at inference?
details:
  realistic_solution: Chinchilla-optimal training would use about 1M params × 20,000 tokens/parameter = 20B training tokens, but that training-compute rule is orthogonal to MCU inference memory. KV cache = 2 × layers × heads × head_dim × sequence length × 2 bytes. For 6L/8H/64-dim at 512 tokens, KV cache is 2×6×8×64×512×2 = 6,291,456 bytes, about 6 MiB, far beyond 512 KiB SRAM. Each token needs 2×6×8×64×2 = 12,288 bytes, so 512 KiB supports at most floor(524,288/12,288) = 42 full tokens before other SRAM users. A practical design must use 42 tokens or fewer with additional margin, or change the architecture with grouped-query attention, external memory, or a smaller layer/head configuration.
  common_mistake: |
    **The Pitfall:** Conflating training-optimal model size with inference-feasible model size.
    **The Rationale:** Engineers assume that optimization rules for training (like Chinchilla) apply directly to inference, forgetting that Chinchilla optimizes loss, not memory footprint.
    **The Consequence:** The resulting model completely exceeds the hardware memory limits during deployment.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware constraints: ESP32-S3 with 512KB SRAM and 8MB Flash.
    - Transformer config: 6 layers, 8 heads, 64-dim, 512-token context.
    - Chinchilla-optimal training compute is separate from inference KV-cache memory.

    **Calculations:**
    - KV cache per layer: 2 * 8 * 64 * 512 * 2 bytes = 1,048,576 bytes = 1 MiB.
    - Total KV cache: 1 MiB/layer * 6 layers = 6 MiB total.
    - Per-token KV cache across all layers: 6 * 2 * 8 * 64 * 2 bytes = 12,288 bytes/token.
    - Max context capacity from 512 KiB SRAM: 524,288 bytes / 12,288 bytes/token = 42.7 tokens, so at most 42 full tokens before allowing any SRAM margin.

    **Conclusion & Interpretation:**
    - **Result: 6 MiB KV Cache at 512 tokens (Memory-Capacity-Bound).** Chinchilla optimality applies to training data/compute, not inference state size; the SRAM-derived hard upper bound is 42 tokens before other memory users unless the architecture changes.
