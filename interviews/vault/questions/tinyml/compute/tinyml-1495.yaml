title: CMSIS-NN Kernel Selection for Optimal Inference on Cortex-M7+Ethos-U55
scenario: Deploying a 200KB INT8 CNN for gesture recognition on STM32H7 (Cortex-M7, 480MHz, 1MB SRAM) with Ethos-U55 NPU (256 MAC, 512KB SRAM). CMSIS-NN provides optimized kernels for M7. The model has depthwise separable convolutions.
question: How would you decide which layers to route to M7 CMSIS-NN vs Ethos-U55 and why?
details:
  realistic_solution: 'Ethos-U55 supports: Conv2D, DepthwiseConv2D, FullyConnected, Pooling, ElementWise ops, Softmax. Ethos-U55 256 MACs at 500MHz = 256 GOPS INT8. Routes all supported depthwise conv and standard conv layers. Cortex-M7 with CMSIS-NN: handles custom layers, preprocessing, softmax if not on U55. Memory: Ethos-U55 has 512KB SRAM — must tile model through it. Transfer cost: activations between M7 and U55 via TCM/bus = ~100ns per 4KB. For 200KB model: U55 handles ~90% of FLOPs; M7 handles preprocessing and unsupported ops. Effective speedup vs M7-only: 480MHz M7 SIMD = ~100 MOPS; U55 = 256 GOPS → 2560× raw advantage on supported ops.'
  common_mistake: |
    **The Pitfall:** Routing all layers indiscriminately to the Ethos-U55 NPU.
    **The Rationale:** Candidates assume the NPU acts as a generic co-processor capable of accelerating any operation.
    **The Consequence:** Unsupported custom layers fail to execute or trigger massive data transfer overheads as the runtime falls back to the CPU mid-inference.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Cortex-M7 (480 MHz) + Ethos-U55 (500 MHz).
       - Model: 200 KB INT8 CNN with depthwise separable convolutions.
       - Ethos-U55 capability: 256 MACs/cycle for supported ops.
    2. **Calculations:**
       - Ethos-U55 Throughput: 256 MACs/cycle × 500 MHz = 128.0 GOPS.
       - Cortex-M7 Throughput (SIMD): ~200 MOPS (0.2 GOPS) for depthwise ops.
       - Speedup Ratio: 128.0 GOPS / 0.2 GOPS = 640x speedup.
    3. **Conclusion & Interpretation:**
       - **Result: Route all supported standard/depthwise convolutions to U55 for a 640x compute advantage.** **Result: Compute-Bound Routing.**
