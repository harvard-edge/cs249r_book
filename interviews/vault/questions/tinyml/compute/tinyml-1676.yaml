title: Microcontroller Cycles and SRAM for Inference Cost
scenario: 'An anomaly detection model consisting of a 3-layer MLP with 1000 total INT8 parameters runs on a Cortex-M4 operating at 80 MHz with 128KB SRAM.'
question: 'Calculate the total instruction cycles required for a single forward pass, specifying the SRAM footprint required for intermediate activations.'
details:
  realistic_solution: 'Assuming 1 MAC equals 1 cycle with DSP instructions, 1000 parameters mean roughly 1000 MACs. Including memory load/store overhead and activation functions, expect around 2000-3000 cycles. Memory for activations is strictly bounded by the widest layer, likely requiring less than 1KB.'
  common_mistake: |
    **The Pitfall:** Forgetting to account for the load/store cycle overhead.
    **The Rationale:** Candidates incorrectly assume 1 MAC always equals exactly 1 clock cycle end-to-end.
    **The Consequence:** The predicted latency is significantly underestimated.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3-layer MLP has 1000 INT8 parameters (~1000 MACs).
    - Cortex-M4 operates at 80 MHz with DSP instructions (1 MAC/cycle baseline).
    - Overhead (load/store/activations) adds a 2x cycle multiplier.

    **Calculations:**
    - Adjusted compute cycles: 1000 MACs * 2 cycles/MAC = 2000 cycles.
    - Execution time: 2000 cycles / 80,000,000 Hz = 25 microseconds.
    - Activation SRAM: Bounded by the widest layer (under 1 KB).

    **Conclusion & Interpretation:**
    - **Result: 2000 Cycles (Compute-Bound)**. The total inference time is 25 microseconds, easily meeting latency requirements, and memory overhead is practically negligible.
