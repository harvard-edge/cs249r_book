title: 'Achieve Mastery in Transformer Inference Optimization on MCU'
scenario: 'You own the end-to-end optimization of a real-time anomaly detection transformer on Cortex-M7+Ethos-U55 for an industrial IoT sensor. Requirements: <50ms latency at 10 inferences/second, <5mW average power, 512KB SRAM, 4MB flash, >95% F1-score. Current baseline: 2-layer, 128-dim, 4-head transformer achieving 96% F1 at 280ms, 8.2mW.'
question: 'What optimization roadmap gets the Cortex-M7+Ethos-U55 transformer from 280 ms and 8.2 mW to the targets?'
details:
  realistic_solution: 'Stage 1 — Architecture: reduce to 1 layer, 64-dim, 2 heads. F1 impact: ~94% (marginal). Latency: 280×0.5×0.5 = 70ms. Stage 2 — Quantization: INT8 weights+activations via QAT. F1: 95.2% (QAT recovers). Latency: 70×0.6=42ms (Ethos-U55 INT8 ops). Stage 3 — NPU offload: attention + matmuls to Ethos-U55. CPU handles only embedding lookup + final classifier. Latency: 42×0.7=29ms. Power: 8.2×0.35=2.9mW. Stage 4 — Operator fusion: fuse QKV projection + attention + layer norm into single NPU kernel. Latency: 29×0.85=24ms < 50ms target. F1: 95.5%. All targets met.'
  common_mistake: |
    **The Pitfall:** Optimizing in isolation without co-designing architecture and NPU mapping.
    **The Rationale:** Candidates attempt only quantization or only pruning, assuming a single magic bullet will bridge a massive latency gap.
    **The Consequence:** The model fails to meet the aggressive <50ms and <5mW limits because operator fusion and architectural scaling were ignored.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: <50ms, <5mW, >95% F1.
    - Baseline: 280ms, 8.2mW, 96% F1.

    **Calculations:**
    - Architecture reduction: 280 ms -> 70 ms.
    - INT8 QAT: 70 ms -> 42 ms.
    - NPU offload: 42 ms -> 29 ms, Power drops to 2.9 mW.
    - Operator fusion: 29 ms -> 24 ms.

    **Conclusion & Interpretation:**
    - **Result: 24 ms latency, 2.9 mW power (Compute-Bound)**. All constraints satisfied.
