title: Tinyml New 0018
scenario: A Jetson Orin operates flawlessly at high frame rates for the first 5 minutes of deployment. Suddenly, inference latency doubles and frame rates plummet. Restarting the system after an hour restores performance temporarily.
question: Why does Jetson Orin inference latency severely degrade after several minutes of continuous operation and only recover after an extended cool-down?
details:
  realistic_solution: The symptom indicates severe thermal throttling. The Jetson Orin module is generating more heat than the passive or active cooling design can dissipate. Once the silicon die reaches its critical thermal junction temperature limit (e.g., 90°C), the hardware hardware aggressively downclocks the GPU and CPU to prevent physical degradation. The solution requires adding active cooling, improving the thermal sink, or dropping the hardware power profile via `nvpmodel`.
  common_mistake: |
    **The Pitfall:** Benchmarking ML models outside of thermal equilibrium.
    **The Rationale:** Candidates validate models using short 10-second burst benchmarks and assume peak TOPS will be sustained indefinitely in production.
    **The Consequence:** Heat gradually accumulates in edge environments, triggering catastrophic hardware throttling that breaks the application's real-time latency constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin TDP = 60W.
    - Cooling system dissipation = 40W.
    - Thermal resistance ($R_{th}$) = 2°C/W.

    **Calculations:**
    - Heat buildup: 60W - 40W = 20W excess power.
    - Temperature rise ($\Delta T$): 20W * 2°C/W = +40°C over ambient.
    - At 25°C ambient: $T_{die}$ = 65°C (safe).
    - At 50°C ambient: $T_{die}$ = 90°C.

    **Conclusion & Interpretation:**
    - **Result: Thermal-Bound Throttling**. The 20W cooling deficit drives the die to 90°C in warm environments, forcing the hardware to slash clock speeds to prevent damage.
