title: MCU Minimum Theoretical Inference Latency
scenario: A Cortex-M4 runs a 10M MACs (Multiply-Accumulates) vision model. The core runs at 120 MHz and completes 1 MAC per 2 clock cycles.
question: Apply these hardware constraints to calculate the absolute minimum latency for a single inference, ignoring memory limits.
details:
  realistic_solution: '10M MACs requiring 2 cycles each equals 20 million clock cycles. At a clock frequency of 120 MHz (120 million cycles per second), the time required is 20M / 120M = 0.166 seconds, or 166.6ms.'
  common_mistake: |
    **The Pitfall:** Treating MACs natively as single cycles without applying architectural penalties.
    **The Rationale:** Developers often assume ideal 1-cycle MAC throughput based on marketing specs, ignoring the specific 2-cycle penalty of the implementation.
    **The Consequence:** Theoretical minimum latency calculations are off by 50%, causing downstream system planning failures.
  napkin_math: |
    **Assumptions & Constraints:**
    - Clock Frequency: 120 MHz = 120 million cycles per second.
    - Throughput penalty: 1 MAC per 2 clock cycles.

    **Calculations:**
    - Total Cycles: 10M MACs * 2 cycles/MAC = 20 million cycles.
    - Minimum Latency: 20,000,000 / 120,000,000 = 0.166 seconds (167 ms).

    **Conclusion & Interpretation:**
    - **Result: 167 ms (Compute-Bound).** Theoretical minimum latency calculations must account for architectural penalties to avoid downstream planning failures.
