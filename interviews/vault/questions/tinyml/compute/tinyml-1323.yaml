title: 'Diagnosing High Inference Cost on nRF5340 for Keyword Spotting'
scenario: 'Your team has deployed a compact keyword spotting neural network on a Nordic nRF5340 (128 MHz ARM Cortex-M33, 256 KB SRAM, 1 MB flash, BLE connectivity). Initial field tests indicate two critical issues: battery life is only 30% of the projected target, and average inference latency consistently measures 250ms, significantly exceeding the 100ms requirement for real-time responsiveness. The ML inference process is suspected as the primary driver of this excessive ''compute cost''.'
question: 'How should you diagnose why nRF5340 keyword-spotting inference takes 250 ms and battery life is far below target?'
details:
  realistic_solution: 'A realistic diagnostic approach involves: 1. **On-device Profiling:** Utilize hardware debugging tools (e.g., SEGGER J-Link, ARM Keil MDK, or custom instrumentation) to profile CPU cycles per inference, identify hot-spots within the neural network layers, and measure energy consumption during active inference periods versus idle. 2. **Memory Analysis:** Monitor SRAM usage for activations, intermediate tensors, and stack. Analyze flash usage for model weights and code size. Identify potential memory overflows or frequent data transfers between slow flash and fast SRAM. 3. **FLOPs/MAC Estimation vs. Actual:** Calculate the theoretical FLOPs/MACs of the model and compare against the observed CPU cycle count to understand efficiency gaps. Investigate if any specific operations are unexpectedly expensive on the Cortex-M33. 4. **Software Stack Review:** Evaluate the ML inference engine''s configuration and optimization level for the target core. Check for any non-optimal compiler flags or library versions. 5. **BLE Interaction:** Assess the frequency and duration of BLE transmissions, as radio activity is a major power consumer. Ensure inference isn''t blocking critical BLE operations or vice-versa, causing latency spikes.'
  common_mistake: 'A common pitfall would be to solely focus on theoretical FLOPs or MAC operations, neglecting the practical implications of memory access patterns, cache efficiency (or lack thereof on deeply embedded systems), and the energy cost of data movement between flash and SRAM. Another mistake is to ignore the overhead introduced by the chosen ML inference framework (e.g., TensorFlow Lite Micro) or underlying RTOS/BLE stack, which can consume significant CPU cycles and memory resources.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Target hardware: Nordic nRF5340 at 128 MHz.
    - Target latency: 100 ms (~12.8 million cycles).
    - Model: 5 million MACs.

    **Calculations:**
    - Total CPU Cycles per 250ms Inference: 128 MHz * 0.25 s = 32 million cycles.
    - Theoretical Minimum Cycles: 5 million MACs * 2 cycles/MAC = 10 million cycles.
    - Energy Cost (250ms at 10mA, 3V): 0.01A * 3V * 0.25s = 7.5 mJ per inference.

    **Conclusion & Interpretation:**
    - **Result: 32 million cycles (Compute-Bound)**. The observed latency is over triple the theoretical minimum, suggesting heavy RTOS or memory-access overhead.
