title: The Input-Dependent Watchdog Reset
scenario: Your team is optimizing a pruned, keyword-spotting CNN on a Cortex-M7 microcontroller with 256KB of SRAM, 16KB D-cache, and a 150ms watchdog timer. To meet a strict 100ms latency budget, an engineer fuses several CONV-RELU layers into a single, large kernel. Benchmarks on typical audio show average latency drops from 95ms to 70ms. After deploying to a fleet of devices, you get reports of random watchdog resets in noisy environments. When profiling with noisy clips, the fused kernel's execution time skyrockets to 160ms. The non-fused version only hits 110ms in the worst case and never resets.
question: Why did an optimization that improved average-case compute latency lead to a catastrophic, input-dependent failure?
details:
  realistic_solution: The core issue is a failure to evaluate the system's worst-case behavior, particularly the interaction between software optimizations and specialized hardware features. The optimization was evaluated on average-case compute, but the failure mode was in worst-case memory transfer time due to cache thrashing.
  common_mistake: |
    **The Pitfall:** Assuming the failure is a software bug or evaluating only average-case compute latency.
    **The Rationale:** Engineers often rely on benchmarks from typical, sparse datasets and ignore worst-case execution time (WCET) scenarios like dense noisy activations.
    **The Consequence:** The device violates hard real-time deadlines in the field, triggering safety watchdog resets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Cortex-M7, 16 KB D-cache, 150 ms watchdog timer.
       - Optimization: Fused CONV-RELU layers (Average latency: 70 ms).
       - Fused Buffer Size: 32x16x16 = 8,192 activations (8 KB).
       - Worst-Case Execution (Noisy Input): Zero-skipping fails; memory stalls add ~90 ms.
    2. **Calculations:**
       - Baseline (Clean): 70 ms compute latency.
       - Cache Thrashing Penalty (Dense Noisy Activations + Weights > 16 KB D-cache): +90 ms.
       - Worst-Case Latency: 70 ms + 90 ms = 160 ms.
       - Watchdog Margin: 150 ms (limit) - 160 ms (actual) = -10 ms violation.
    3. **Conclusion & Interpretation:**
       - **Result: 160 ms execution > 150 ms watchdog. System resets.** **Result: Memory-Bound (Input-Dependent Cache Thrashing).**
