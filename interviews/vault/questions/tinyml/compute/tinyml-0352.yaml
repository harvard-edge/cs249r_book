title: 'The Cortex-M4 Ridge Point'
scenario: 'The Cortex-M4 has a peak theoretical compute performance of roughly 336 MFLOPS and its on-chip SRAM provides about 1.2 GB/s of memory bandwidth.'
question: 'What does the Roofline ridge point signify, and what is its calculated value for the given hardware specifications?'
details:
  realistic_solution: 'The ridge point represents the minimum Arithmetic Intensity (the ratio of operations per byte of data moved) that an algorithm must have to be limited by the chip''s compute capability rather than its memory bandwidth. It is the ''corner'' of the Roofline plot.'
  common_mistake: |
    **The Pitfall:** Engineers often misremember the Roofline formula, swapping the numerator and denominator (Bandwidth / Compute).
    **The Rationale:** They have an intuition calibrated for datacenter GPUs, where ridge points are 100-1000x higher.
    **The Consequence:** They fail to appreciate that microcontrollers are fundamentally memory-bandwidth-limited, and a low ridge point quantitatively proves this.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak Compute: 336 MFLOPS.
    - Memory Bandwidth: 1.2 GB/s.

    **Calculations:**
    - Peak Compute: 336 × 10^6 FLOPS.
    - Memory Bandwidth: 1.2 × 10^9 Bytes/second.
    - Ridge Point: (336 × 10^6) / (1.2 × 10^9) = 0.28 Ops/Byte.

    **Conclusion & Interpretation:**
    - **Result: 0.28 Ops/Byte (Compute-Bound)**. The ridge point is exceptionally low; models with arithmetic intensity > 0.28 are bottlenecked by the ALU, not memory bandwidth.
  options:
    - '3.57 Ops/Byte'
    - '0.28 Ops/Byte'
    - '280 Ops/Byte'
    - '295 Ops/Byte'
