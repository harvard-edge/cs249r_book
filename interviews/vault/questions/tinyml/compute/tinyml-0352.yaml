title: The Cortex-M4 Ridge Point
scenario: The Cortex-M4 has a peak theoretical compute performance of roughly 336 MFLOPS and its on-chip SRAM provides about 1.2 GB/s of memory bandwidth.
question: What does the Roofline ridge point signify, and what is its calculated value for the given hardware specifications?
details:
  realistic_solution: 'The ridge point represents the minimum Arithmetic Intensity (the ratio of operations per byte of data moved) that an algorithm must have to be limited by the chip''s compute capability rather than its memory bandwidth. For these specifications, 336 MFLOPS / 1.2 GB/s = 0.28 Ops/Byte. It is the ''corner'' of the Roofline plot: below 0.28 Ops/Byte the workload is memory-bound, and above it the workload is compute-bound.'
  common_mistake: |
    **The Pitfall:** Engineers often misremember the Roofline formula, swapping the numerator and denominator (Bandwidth / Compute).
    **The Rationale:** They have an intuition calibrated for datacenter GPUs, where ridge points are 100-1000x higher.
    **The Consequence:** They misclassify workloads because they confuse the ridge point threshold with a blanket statement about the whole device being memory-bound or compute-bound.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak Compute: 336 MFLOPS.
    - Memory Bandwidth: 1.2 GB/s.

    **Calculations:**
    - Peak Compute: 336 × 10^6 FLOPS.
    - Memory Bandwidth: 1.2 × 10^9 Bytes/second.
    - Ridge Point: (336 × 10^6) / (1.2 × 10^9) = 0.28 Ops/Byte.

    **Conclusion & Interpretation:**
    - **Result: 0.28 Ops/Byte.** The ridge point is the transition threshold; models with arithmetic intensity > 0.28 are compute-bound, while lower-intensity kernels are memory-bound.
  options:
    - 3.57 Ops/Byte
    - 0.28 Ops/Byte
    - 280 Ops/Byte
    - 295 Ops/Byte
