title: The Double-Precision FPU Trap
scenario: You are porting a Python model to C for a microcontroller with a single-precision FPU. You write `float y = x * 0.5;`. Your profiling shows this one line is incredibly slow.
question: Why does `float y = x * 0.5;` stall on an MCU with a single-precision FPU?
details:
  realistic_solution: The literal `0.5` defaults to a 64-bit double in C. Because the MCU only possesses a single-precision (32-bit) FPU, the compiler silently promotes `x` to a double, invokes an expensive software emulation library for the 64-bit multiplication, and truncates the result back to float. Appending the 'f' suffix (`0.5f`) forces single-precision, enabling the hardware FPU to execute the multiply natively in 1 cycle. Use the `-Wdouble-promotion` flag to aggressively catch these degrading type promotions.
  common_mistake: |
    **The Pitfall:** Ignoring C-language typing defaults for floating-point literals.
    **The Rationale:** Python natively handles type promotion, so ML engineers translating to C write `0.5` without realizing it forces 64-bit precision.
    **The Consequence:** The compiler triggers a massive software emulation library, destroying performance and bloating flash memory by 5-10KB.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target hardware has only a single-precision FPU (32-bit).

    **Calculations:**
    - Hardware float multiply (0.5f): 1 cycle.
    - Software double multiply emulation (0.5): ~50-100 cycles.
    - Flash Bloat: Linking the soft-double library adds 5-10 KB.

    **Conclusion & Interpretation:**
    - **Result: 50-100 cycles (Compute-Bound by Emulation)**. A missing 'f' suffix degrades performance by up to 100x.
