title: The TinyML Flash Budget
scenario: 'You''re a TinyML engineer building a visual wake word system on a device with a Cortex-M4 microcontroller. After accounting for the OS and application code, you have 454 KB of available Flash memory for the model weights. You are comparing two architectures, both using FP32 precision: a CNN with 100,000 parameters and a ViT with 125,000 parameters.'
question: Which FP32 model fits within the 454 KB Flash budget, the 100,000-parameter CNN or the 125,000-parameter ViT?
details:
  realistic_solution: The correct approach is to calculate the memory footprint for each model by multiplying its parameter count by the size of the data type (4 bytes for FP32). For example, the 100,000 parameter CNN requires 400 KB of Flash (which fits in the 454 KB budget), while the 125,000 parameter ViT requires 500 KB (which exceeds it).
  common_mistake: |
    **The Pitfall:** Forgetting the bytes-per-parameter conversion.
    **The Rationale:** Engineers compare the raw parameter count directly to the memory budget in KB.
    **The Consequence:** They incorrectly assume a 125k parameter model requires exactly 125 KB.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP32 uses 4 bytes/parameter.
    - Budget: 454 KB.
    - CNN: 100K params.
    - ViT: 125K params.

    **Calculations:**
    - CNN Size = 100,000 * 4 = 400,000 bytes (400 KB).
    - ViT Size = 125,000 * 4 = 500,000 bytes (500 KB).

    **Conclusion & Interpretation:**
    - **Result: 100K CNN fits (Memory-Capacity-Bound)**. The 100K CNN fits (400 KB < 454 KB), but the ViT fails.
  options:
  - The ViT fits with room to spare, but the CNN is too large.
  - Both models fit, as modern microcontrollers have megabytes of Flash.
  - The CNN fits, but the ViT exceeds the 454 KB Flash budget.
  - Neither model fits; FP32 precision requires at least 1MB for any model.
  correct_index: 2
