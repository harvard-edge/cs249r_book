title: The MAC Budget
scenario: Your Cortex-M4 runs at 168 MHz with no FPU. Your keyword spotting model requires 5 million INT8 multiply-accumulate (MAC) operations per inference.
question: Can you run inference in under 100ms?
details:
  realistic_solution: A standard Cortex-M4 executes one 32-bit instruction per cycle, but an INT8 MAC requires multiple instructions (load, multiply, accumulate, store) taking ~4 cycles. However, utilizing CMSIS-NN SIMD instructions packs 2 INT8 MACs into a single cycle. Compiling with SIMD support drastically shifts the latency envelope into the target budget.
  common_mistake: |
    **The Pitfall:** Assuming "168 MHz means 168 million operations per second, so 5M MACs takes 30ms."
    **The Rationale:** Candidates assume one MAC perfectly matches one clock cycle for scalar processors.
    **The Consequence:** They vastly underestimate inference latency, causing the system to miss real-time deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4 @ 168 MHz.
    - Workload: 5,000,000 MACs.
    - Standard math: 4 cycles/MAC.
    - SIMD math: 0.5 cycles/MAC (2 MACs/cycle).

    **Calculations:**
    - Standard Latency: (5M * 4) / 168M = 119 ms.
    - SIMD Latency: (5M * 0.5) / 168M = 14.9 ms.

    **Conclusion & Interpretation:**
    - **Result: 14.9 ms (Hardware SIMD Dependency)**. Without SIMD, the model fails the 100ms deadline (119ms). With SIMD, it comfortably passes (14.9ms).
  options:
  - Yes, a 168 MHz processor does 1 MAC per cycle, completing 5M MACs in ~30 ms.
  - No, standard integer execution takes 4 cycles per MAC, missing the budget at ~119 ms.
  - Yes, but only by utilizing CMSIS-NN SIMD instructions (2 MACs/cycle), dropping latency to ~15 ms.
  - No, even with SIMD it takes 2 cycles per MAC, taking ~60 ms.
  correct_index: 2
