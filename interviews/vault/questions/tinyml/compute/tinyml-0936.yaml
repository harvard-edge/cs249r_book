title: Recall Memory-Bandwidth-Bound Decode on Embedded Hardware
scenario: 'An interviewer asks: why is autoregressive token generation (decode) memory-bandwidth-bound even on tiny MCUs with small models? Explain using the specific case of a 500K-parameter transformer on ESP32-S3 with 6.4 GB/s PSRAM bandwidth and 2.0 GFLOP/s compute.'
question: What arithmetic-intensity threshold makes a 500K-parameter ESP32-S3 transformer decode compute-bound with PSRAM latency?
details:
  realistic_solution: 'Decode processes 1 token at a time. For each token: FLOPs = 2*N_params*1 = 2*500K = 1M FLOPs. Bytes loaded = all weights = 500K*1B (INT8) = 500KB. Arithmetic intensity = 1M/500K = 2 FLOP/byte. Ridge point = 2.0G/6.4G = 0.31 FLOP/byte. Since 2 > 0.31, decode is compute-bound? Actually: PSRAM latency is 10x higher than SRAM; effective bandwidth = 6.4/10 ≈ 0.64 GB/s. New ridge: 2.0/0.64 = 3.1 FLOP/byte > 2 -> memory-bandwidth-bound due to PSRAM latency.'
  common_mistake: |
    **The Pitfall:** Claiming decode is compute-bound simply because MCUs have slow CPUs.
    **The Rationale:** Candidates fail to calculate the compute/bandwidth ratio that actually dictates the roofline.
    **The Consequence:** They mistakenly focus on optimizing compute rather than managing memory access latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500K INT8 parameters.
    - Decode requires 1M FLOPs.
    - PSRAM Bandwidth: 6.4 GB/s.
    - Effective Bandwidth: 0.64 GB/s (10x latency).
    - Compute: 2.0 GFLOPs.

    **Calculations:**
    - Token decode FLOPs: 1M.
    - Bytes loaded: 500 KB.
    - Intensity: 1M / 500K = 2 FLOP/Byte.
    - Raw Ridge: 2.0 / 6.4 = 0.31 FLOP/Byte.
    - Effective Ridge: 2.0 / 0.64 = 3.1 FLOP/Byte.

    **Conclusion & Interpretation:**
    - **Result: 3.1 FLOP/Byte (Memory-Bandwidth-Bound)**. Since 2 < 3.1, the high PSRAM latency makes decode memory-bandwidth-bound.
