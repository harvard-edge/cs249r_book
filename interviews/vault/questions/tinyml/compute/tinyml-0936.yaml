title: Recall Roofline Threshold for ESP32-S3 Transformer Decode
scenario: An interviewer asks why autoregressive token generation (decode) can be memory-bandwidth-bound even on tiny MCUs with small models. Use the specific case of a 500K-parameter INT8 transformer on ESP32-S3 with 6.4 GB/s raw PSRAM bandwidth, an estimated 0.64 GB/s effective bandwidth after PSRAM latency and access overhead, and 2.0 GFLOP/s compute.
question: What roofline arithmetic-intensity threshold separates memory-bound from compute-bound decode for this ESP32-S3 transformer, and where does the 500K-parameter model fall?
details:
  realistic_solution: The roofline ridge point is compute throughput divided by effective memory bandwidth. With 2.0 GFLOP/s compute and 0.64 GB/s effective PSRAM bandwidth, the compute-bound threshold is 2.0 / 0.64 = 3.125 FLOP/byte. The 500K-parameter INT8 model does about 2 * 500K = 1M FLOPs per decoded token and streams about 500K bytes of weights, so its arithmetic intensity is about 2 FLOP/byte. Because 2 is below the 3.125 FLOP/byte ridge point, decode is memory-bound under the effective PSRAM bandwidth assumption. Using raw 6.4 GB/s bandwidth would give a 0.31 FLOP/byte ridge, but that ignores the latency and access overhead stated in the scenario.
  common_mistake: |
    **The Pitfall:** Claiming decode is compute-bound simply because MCUs have slow CPUs.
    **The Rationale:** Candidates fail to calculate the compute/bandwidth ratio that actually dictates the roofline.
    **The Consequence:** They mistakenly focus on optimizing compute rather than managing memory access latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500K INT8 parameters.
    - Decode requires 1M FLOPs.
    - Raw PSRAM bandwidth: 6.4 GB/s.
    - Effective bandwidth after latency/access overhead: 0.64 GB/s.
    - Compute: 2.0 GFLOPs.

    **Calculations:**
    - Token decode FLOPs: 1M.
    - Bytes loaded: 500 KB.
    - Intensity: 1M / 500K = 2 FLOP/Byte.
    - Raw ridge point: 2.0 / 6.4 = 0.31 FLOP/Byte.
    - Effective ridge point: 2.0 / 0.64 = 3.125 FLOP/Byte.

    **Conclusion & Interpretation:**
    - **Result: 3.125 FLOP/Byte compute-bound threshold (Memory-Bandwidth-Bound below threshold).** Since the model's intensity is about 2 FLOP/Byte, it remains memory-bound with the effective PSRAM bandwidth.
