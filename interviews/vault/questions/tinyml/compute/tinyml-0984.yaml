title: Architecting Energy-Constrained Audio Inference
scenario: You are designing an always-on acoustic event detection system on a multi-core edge MCU. A low-power front end wakes the application core once per second for neural inference. You must architect the compute pipeline and duty cycle strategy to determine if a 1.2 MMAC neural network can be deployed while meeting a strict 1-year battery life requirement.
question: Can the MCU run the 1.2 MMAC acoustic model for one-year battery life, and what duty-cycle architecture is needed?
details:
  realistic_solution: A strong L5 candidate will evaluate the compute cost by designing a cascaded architecture where the MCU remains in deep sleep and is woken once per second by a low-power hardware interrupt. Under the simplifying assumption that sleep current and radio overhead are budgeted separately or negligible, the app core can spend about 22.8ms per second active. The 1.2 MMAC model takes about 18.75ms at 128MHz with a 2-cycle/MAC implementation, so the inference itself fits, but the remaining current budget is small and must be explicitly reserved for wake transitions, buffering, BLE, and leakage.'
  common_mistake: |
    **The Pitfall:** Ignoring the dynamic power cost of the application core.
    **The Rationale:** Candidates often look only at the SRAM and flash limits to check if the model fits, completely ignoring the system-level tradeoffs between race-to-sleep strategies and the active current penalty.
    **The Consequence:** The battery depletes in weeks instead of a year due to failing to evaluate the energy cost of the compute pipeline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Battery: 1000 mAh for 1 year (8760 hours).
    - MCU app core active current: ~5mA (5000 µA).
    - Sleep current, BLE, sensing, and leakage are assumed negligible or separately budgeted for this inference-only estimate.
    - Event rate: 1 inference per second.
    - Core clock: 128 MHz.
    - Model size: 1.2 MMAC (~2.4 million cycles at 2 cycles/MAC).

    **Calculations:**
    - Average current budget: 1000 mAh / 8760 h = 114 µA.
    - Maximum active duty cycle: 114 µA / 5000 µA = 2.28%.
    - Allowed active time per second: 2.28% * 1000 ms = 22.8 ms.
    - Inference latency: 2.4M cycles / 128M cycles/s = 18.75 ms.
    - Inference duty cycle at 1 Hz = 18.75 ms / 1000 ms = 1.875%.
    - Inference average current = 5000 µA * 1.875% = 93.75 µA.
    - Remaining average-current budget = 114 µA - 93.75 µA = 20.25 µA.

    **Conclusion & Interpretation:**
    - **Result: 1.875% inference duty cycle (Power-Bound)**. The inference fits within the 2.28% active-duty ceiling only under the stated 1 Hz and negligible-sleep-current assumptions. The remaining margin is about 20 µA average, so BLE transmission and overhead must be budgeted explicitly rather than assumed free.
