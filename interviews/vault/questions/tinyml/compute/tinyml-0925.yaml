title: Design Speculative Decoding for Cortex-M4 Transformer
scenario: You are designing a speculative decoding system for a draft model on a Cortex-M4 paired with a target model on an Ethos-U55. The draft model generates 4 candidate tokens per step at 8ms each. The target model verifies all 4 simultaneously at 12ms. Token acceptance rate is α=0.75.
question: How would you design the speculation window size and fallback strategy to maximize tokens/second?
details:
  realistic_solution: Use a very small speculation window with the current draft speed. With prefix acceptance rate α=0.75 and a fallback/correction token from the target when a draft token is rejected, expected committed tokens for window k are E = 1 + α + ... + α^k. For k=4, E = 3.05 tokens and cycle time is 4*8 + 12 = 44 ms, so throughput is 69.3 tok/s, worse than the target-only baseline of 83.3 tok/s. For k=2, E = 2.31 tokens and time is 28 ms, or 82.6 tok/s, still slightly worse. For k=1, E = 1.75 tokens and time is 20 ms, or 87.5 tok/s, so k=1 is the best of these choices. Fallback should immediately emit the target-corrected token on first rejection, discard later draft tokens, and adaptively disable speculation or keep k=1 when measured acceptance or draft latency falls.
  common_mistake: |
    **The Pitfall:** Assuming that speculative decoding and a larger speculation window size always lead to higher token throughput.
    **The Rationale:** Candidates apply LLM datacenter scaling intuition without mathematically verifying if the weak/slow CPU draft model actually outpaces the NPU target model.
    **The Consequence:** The speculative architecture actively harms system performance, reducing overall tokens/second compared to just running the target model sequentially.
  napkin_math: |
    **Assumptions & Constraints:**
    - Candidate speculation windows: k=1, k=2, and k=4.
    - Draft time = 8 ms/token.
    - Target verify time = 12 ms.
    - Acceptance rate α = 0.75.
    - Target-only baseline time = 12 ms/token (83.3 tok/s).

    **Calculations:**
    - Expected committed tokens with fallback: E(k) = 1 + α + ... + α^k.
    - For k=4: E = 1 + 0.75 + 0.75^2 + 0.75^3 + 0.75^4 = 3.05 tokens; time = 4 * 8ms + 12ms = 44ms; throughput = 3.05 / 0.044 = 69.3 tok/s.
    - For k=2: E = 1 + 0.75 + 0.75^2 = 2.31 tokens; time = 2 * 8ms + 12ms = 28ms; throughput = 2.31 / 0.028 = 82.6 tok/s.
    - For k=1: E = 1 + 0.75 = 1.75 tokens; time = 8ms + 12ms = 20ms; throughput = 1.75 / 0.020 = 87.5 tok/s.
    - Draft latency threshold for benefit is d < 12 * (E(k) - 1) / k. This gives k=4: d < 6.15ms; k=2: d < 7.88ms; k=1: d < 9.0ms.

    **Conclusion & Interpretation:**
    - **Result: k=1 at 87.5 tok/s is best for the stated draft latency (Compute-Bound).** Larger windows hurt because the 8ms/token draft model is too slow; k=4 would need draft tokens below about 6.15ms to beat the target-only baseline.
