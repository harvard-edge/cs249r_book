title: 'Diagnosing TinyML Performance on Nordic nRF5340: Accelerator Trade-offs'
scenario: You are deploying a keyword spotting neural network onto a Nordic nRF5340 microcontroller (128 MHz ARM Cortex-M33, 256 KB SRAM, 1 MB flash, BLE) for a battery-powered edge device. The model is running, but you observe inconsistent inference times (ranging from 100ms to 500ms) and, critically, the device's battery life is significantly shorter than expected. During peak inference, current consumption spikes, occasionally leading to brownouts. You suspect the current computation strategy is inefficient for the given hardware constraints and that the choice of accelerator (or lack thereof) is a root cause.
question: How should you diagnose nRF5340 keyword-spotting latency, brownouts, and battery drain when choosing CPU optimization or acceleration?
details:
  realistic_solution: |
    Diagnose the symptoms before choosing acceleration. First, instrument inference with cycle counters and GPIO/current traces so each latency spike can be aligned with CPU time, flash/SRAM activity, BLE events, and supply droop. If the long tail is mostly scalar or floating-point kernels, convert the model to int8, use CMSIS-NN/TFLM kernels for Cortex-M33 DSP instructions, and reduce layers or activation footprints until the worst-case CPU time fits the schedule. If spikes align with memory movement, shrink weights and activations, keep hot tensors in SRAM, and remove allocation or flash stalls from the inference path. If current traces still show brownout-level peaks or the optimized CPU duty cycle is too high, then evaluate an external or dedicated accelerator with a measured peak-current and energy budget; otherwise CPU optimization is the lower-risk choice.
  common_mistake: |
    **The Pitfall:** Directly porting models optimized for powerful hardware without aggressive quantization or optimized Cortex-M33 kernels.
    **The Rationale:** Engineers assume standard TensorFlow outputs will run efficiently on any generic Cortex CPU without mapping the operations to specific hardware capabilities.
    **The Consequence:** The CPU spends excessive clock cycles emulating floating-point or complex operations, leading to sustained high current draw that dramatically reduces battery life and causes brownouts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model requirement: 10 Million MACs.
    - Cortex-M33 Clock: 128 MHz. Active current: 20 mA.
    - Interval: 5 seconds.

    **Calculations:**
    - Float32 (10 cycles/MAC): 10M × 10 = 100M cycles. Time = 100M / 128M = 0.78 s.
    - Float32 Avg Current: (0.78 s / 5 s) × 20 mA = 3.12 mA.
    - INT8 Optimized (2 cycles/MAC, same 10M MACs): 10M × 2 = 20M cycles. Time = 20M / 128M = 0.156 s.
    - INT8 Avg Current: (0.156 s / 5 s) × 20 mA = 0.624 mA.
    - Peak current remains about 20 mA during CPU inference, so brownouts require checking supply impedance and peak-current margin, not just average current.

    **Conclusion & Interpretation:**
    - **Result: 3.12 mA vs 0.624 mA average CPU inference current (Energy-Bound).** INT8 CPU optimization cuts average compute current by about 5x for the same MAC count; acceleration is warranted only if profiling still shows unacceptable worst-case latency, energy, or peak-current brownout risk after this optimization.
