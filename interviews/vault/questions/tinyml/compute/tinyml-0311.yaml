title: The MCU's Ridge Point
scenario: You are optimizing an INT8 keyword spotting model on a Cortex-M4. One dense layer takes a 128-element input vector to produce a 64-element output vector. The Cortex-M4 has a peak performance of ~336 MMACs/s and an on-chip SRAM bandwidth of 1.2 GB/s.
question: What is the dense layer's arithmetic intensity, and is it compute-bound or memory-bound on the Cortex-M4?
details:
  realistic_solution: 'The layer is compute-bound. The hardware''s ability to supply data from SRAM is greater than its ability to process that data. We can prove this by comparing the layer''s Arithmetic Intensity to the hardware''s ridge point.\n\n    1.  **Hardware Ridge Point:** This is the ratio of peak compute to peak memory bandwidth. `Ridge Point = 336 MFLOPS / 1.2 GB/s = 336e6 Ops/sec / 1.2e9 Bytes/sec ≈ 0.28 Ops/Byte`.\n\n    2.  **Layer''s Operations:** A MAC is 2 Ops (1 multiply, 1 add). Total Ops = `128 * 64 * 2 = 16,384 Ops`.\n\n    3.  **Layer''s Memory Access:** We must read the weights and the input vector, and write the output vector. Total Bytes = `(128 * 64 bytes for weights) + (128 bytes for input) + (64 bytes for output) = 8192 + 128 + 64 = 8384 Bytes`.\n\n    4.  **Layer''s Arithmetic Intensity (AI):** `AI = Total Ops / Total Bytes = 16,384 / 8384 ≈ 1.95 Ops/Byte`.\n\n    5.  **Conclusion:** Since the layer''s AI (1.95) is significantly higher than the MCU''s ridge point (0.28), the system is compute-bound. The bottleneck is the ~16k operations, not the ~8.3kB of data transfer.'
  common_mistake: |
    **The Pitfall:** Assuming that because microcontrollers have very little SRAM, all operations must be memory-bound.
    **The Rationale:** Candidates apply intuition from data center GPUs, where fully-connected layers with small batch sizes are strictly memory-bound.
    **The Consequence:** They waste time optimizing memory access patterns instead of focusing on compute optimizations like SIMD or loop unrolling.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware Ridge Point: 336 MOps/sec / 1.2 GB/s.
    - Data type: INT8 (1 byte per element).
    - Operations: 1 MAC = 2 Ops (Multiply + Accumulate).

    **Calculations:**
    - Ridge Point: 336e6 / 1.2e9 = 0.28 Ops/Byte.
    - Layer Ops: 128 (in) * 64 (out) * 2 Ops/MAC = 16,384 Ops.
    - Memory Access (Bytes): (128 * 64 weights) + 128 (input) + 64 (output) = 8,384 Bytes.
    - Arithmetic Intensity (AI): 16,384 Ops / 8,384 Bytes ≈ 1.95 Ops/Byte.

    **Conclusion & Interpretation:**
    - **Result: 1.95 Ops/Byte (Compute-Bound)**. Since the layer's AI (1.95) is greater than the Ridge Point (0.28), the layer is strictly Compute-Bound.
  options:
  - Memory-bound, because the layer's Arithmetic Intensity (~1.95 Ops/Byte) is greater than the MCU's ridge point.
  - Memory-bound, because all operations on resource-constrained devices like microcontrollers are limited by memory bandwidth.
  - Compute-bound, because the layer's Arithmetic Intensity (~1.95 Ops/Byte) is greater than the MCU's ridge point (~0.28 Ops/Byte).
  - Compute-bound, because its Arithmetic Intensity is low, which means it doesn't require much data from memory.
