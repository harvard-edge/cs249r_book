title: ESP32-S3 SRAM vs PSRAM Roofline Shift
scenario: You are deploying an INT8 CNN on an ESP32-S3 (theoretical peak compute 3.84 GOPS). When the model runs entirely from SRAM (approx. 1.9 GB/s bandwidth), profiling shows high compute utilization. However, when weights are stored in PSRAM (approx. 40 MB/s bandwidth), utilization plummets to under 10%.
question: How does moving ESP32-S3 CNN weights from SRAM to PSRAM shift the roofline and reduce utilization?
details:
  realistic_solution: 'Calculate the machine balance point (Peak Compute / Peak Bandwidth) for both memory tiers. By applying the roofline model, you can demonstrate that the operational intensity of the CNN layers exceeds the SRAM balance point (making it compute-bound), but falls far short of the PSRAM balance point (making it severely memory-bound). The utilization drop is a direct mathematical consequence of hitting the PSRAM memory bandwidth roofline.'
  common_mistake: |
    **The Pitfall:** Intuitive guessing instead of formal Roofline modeling.
    **The Rationale:** Candidates correctly state that PSRAM is slower, but fail to calculate the machine balance point or operational intensity.
    **The Consequence:** Without mathematical justification, they cannot architect a solution (like tiling or operator fusion) because they don't understand exactly where the memory-bound threshold lies.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak Compute: 3.84 GOPS.
    - SRAM Bandwidth: 1.9 GB/s.
    - PSRAM Bandwidth: 0.04 GB/s (40 MB/s).
    - Typical CNN Operational Intensity: ~10 OPS/byte.

    **Calculations:**
    - SRAM Machine Balance: 3.84 GOPS / 1.9 GB/s = 2.02 OPS/byte.
    - PSRAM Machine Balance: 3.84 GOPS / 0.04 GB/s = 96 OPS/byte.
    - In SRAM (10 OPS/byte > 2.02 OPS/byte): Compute-bound, hitting 3.84 GOPS peak.
    - In PSRAM (10 OPS/byte < 96 OPS/byte): Memory-bound performance = 10 OPS/byte * 0.04 GB/s = 0.4 GOPS.
    - Max Utilization: 0.4 GOPS / 3.84 GOPS = 10.4%.

    **Conclusion & Interpretation:**
    - **Result: 10.4% Max Utilization (Memory-Bound)**. Shifting weights to PSRAM moves the system from a compute-bound regime into a severe memory bandwidth bottleneck, crashing utilization mathematically.
