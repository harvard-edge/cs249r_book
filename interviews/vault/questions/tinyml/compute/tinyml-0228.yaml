title: The TinyML Ridge Point
scenario: You are analyzing the performance of a keyword spotting model on a Cortex-M4 microcontroller. You've generated a Roofline plot for the device.
question: What does the 0.28 Ops/Byte ridge point mean on a Cortex-M4 roofline plot?
details:
  realistic_solution: The Ridge Point identifies the minimum Arithmetic Intensity (AI), measured in Operations per Byte (Ops/Byte), that a workload must have to become limited by the processor's peak compute speed rather than by its memory bandwidth. Below this AI, the workload is memory-bound; above it, the workload is compute-bound. Using the sample peak values here, 336 MFLOPS divided by 1.2 GB/s gives a ridge point of about 0.28 Ops/Byte. That value is a threshold, not a statement that every TinyML layer is automatically compute-bound.
  common_mistake: |
    **The Pitfall:** Assuming microcontrollers are always memory-bound due to limited SRAM bandwidth.
    **The Rationale:** Engineers fail to calculate the Ridge Point, missing that peak FLOPS are so low that typical ML workloads easily exceed the required Arithmetic Intensity.
    **The Consequence:** Misidentifying the performance bottleneck and optimizing memory instead of compute.
  napkin_math: |
    **Assumptions & Constraints:**
    - Example Cortex-M4 peak compute at the stated operating point: ~336 MFLOPS.
    - Example on-chip SRAM bandwidth: ~1.2 GB/s.

    **Calculations:**
    - 336 MFLOPS / 1.2 GB/s = 0.28 Ops/Byte.

    **Conclusion & Interpretation:**
    - **Result: 0.28 Ops/Byte.** This is the minimum Arithmetic Intensity needed for a workload to become compute-bound; workloads below this threshold remain memory-bound.
  options:
    - The peak theoretical performance (MFLOPS) of the microcontroller.
    - The maximum memory bandwidth (GB/s) of the on-chip SRAM.
    - The minimum Arithmetic Intensity (Ops/Byte) needed to be compute-bound.
    - The energy cost (in pJ) of a single memory access.
  correct_index: 2
