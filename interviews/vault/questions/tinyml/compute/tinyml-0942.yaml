title: Optimize Weight Sharing Across Transformer Layers on Flash-Limited MCU
scenario: A 4-layer transformer for vibration analysis on Cortex-M4 occupies 4MB INT8 — just at the 4MB flash limit. A new sensor requires adding 2 more layers for better temporal modeling, but flash cannot be expanded. You propose cross-layer weight sharing. layers 1&3 share weights, layers 2&4 share weights, adding 2 virtual layers 5&6 that share with 1&2 respectively.
question: How would you evaluate the computational cost increase, memory impact, and expected accuracy trade-off?
details:
  realistic_solution: 'Original: 4 layers × 1MB/layer = 4MB flash, 4 forward passes. Weight sharing 4 layers → 2 unique: 2MB flash (50% savings). 6 layers × 1MB shared = 6 forward passes but only 2MB unique weights loaded. Compute: 6/4 = 1.5× FLOPs. Latency: 6/4 × baseline = 1.5× (no extra loading since weights stay in SRAM after first load). Flash: 2MB (saved 2MB for new use). Accuracy: cross-layer weight tying typically loses 1-3% on complex tasks but vibration analysis is a structured domain → expect ~1% loss. Net: 50% flash reduction, 50% more compute, ~1% accuracy cost — favorable trade-off.'
  common_mistake: |
    **The Pitfall:** Assuming weight sharing is computationally free.
    **The Rationale:** Engineers often confuse memory savings with compute savings, forgetting that shared weights must still be executed during each forward pass.
    **The Consequence:** The system runs out of compute budget or violates latency deadlines because the actual number of MAC operations has increased.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original flash footprint: 4 layers * 1 MB/layer = 4 MB flash.
    - Shared footprint: 6 virtual layers using 2 unique weight sets.

    **Calculations:**
    - Shared footprint flash size: 2 MB flash (frees up 2 MB).
    - Compute cost: 6 forward passes compared to original 4 forward passes = 6/4 = 1.5x FLOPs.
    - Latency impact: Inference time increases by 1.5x.
    - Accuracy impact: Expect a ~1% loss in this structured domain.

    **Conclusion & Interpretation:**
    - **Result: Favorable Trade-off (Memory-Bound).** Net: 50% flash reduction, 50% more compute, ~1% accuracy cost.
