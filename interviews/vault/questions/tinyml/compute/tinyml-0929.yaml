title: Diagnose Attention Head Collapse in Quantized MCU Transformer
scenario: After INT4 quantization of a 4-head attention transformer deployed on Cortex-M4, word error rate jumps from 8% to 31% on a wake-word detection task. Attention visualization shows 3 of 4 heads produce nearly uniform distributions (entropy > 0.95 of maximum) while 1 head handles all meaningful patterns. The model was quantized using post-training quantization (PTQ) with 100 calibration samples.
question: How would you diagnose why INT4 caused head collapse and propose a targeted fix?
details:
  realistic_solution: 'The entropy observation shows that three heads have lost useful contrast after PTQ, but it does not prove that INT4 precision is uniformly impossible. A likely diagnosis is range mismatch: with only 100 calibration samples, a per-tensor INT4 scale can be dominated by outliers or by the one high-magnitude head, leaving lower-magnitude heads with too few effective levels. For symmetric INT4 with range -8..7 and a calibrated max magnitude of 3.0, the scale is about 3.0/7 = 0.43 per code step, so values within roughly half a step of zero quantize to zero and small logit differences are rounded away. The targeted fix is to collect representative calibration data, inspect per-head activation/logit ranges and saturation rates, and use per-head or per-channel quantization for Q/K/V and attention projections. If INT4 still collapses heads, use quantization-aware training or keep the attention logits/softmax path at INT8 while retaining INT4 weights elsewhere.'
  common_mistake: |
    **The Pitfall:** Blaming INT4 precision uniformly across all heads.
    **The Rationale:** Candidates fail to trace the error back to the PTQ calibration sample size, causing outlier-driven scale factors that crush small attention weights.
    **The Consequence:** The model is unnecessarily bumped to INT8, breaking strict memory/compute constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Quantization: INT4 (range -8 to +7).
    - Sequence length: 64.
    - Example per-tensor calibrated max logit magnitude: 3.0.
    - Symmetric INT4 uses about 15-16 levels; signed range is commonly treated as -8 to +7.

    **Calculations:**
    - Per-tensor scale factor: max / 7 = 3.0 / 7 = 0.43 per quantization step.
    - As an illustrative symmetric per-tensor approximation, values within about half a step of a quantization boundary can be rounded away. Around zero, that region is about 0.43 / 2 = 0.215, but the exact behavior depends on scale, zero-point choice, clipping, and calibration noise.
    - If a low-range head has logits mostly within +/-0.4, it receives only about three integer codes (-1, 0, +1), so softmax contrast can collapse toward uniform.
    - Uniform distribution entropy: log_e(64) = 4.16 nats.
    - Observed entropy: >0.95 * 4.16 = >3.95 nats, showing near-uniform attention in the affected heads. This supports a head-contrast-loss diagnosis but does not by itself prove the exact mechanism.

    **Conclusion & Interpretation:**
    - **Result: Per-tensor INT4 scale can erase low-magnitude head contrast (Precision-Bound).** Treat the step-size math as a diagnostic approximation, then confirm with per-head range, clipping, saturation, and entropy statistics before fixing with representative calibration plus per-head/per-channel quantization or QAT.
