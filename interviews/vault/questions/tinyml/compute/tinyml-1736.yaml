title: 'Design MAC Budget for Sub-50ms Wakeword Engine'
scenario: 'You are building a custom wakeword engine. The system''s DSP frontend consumes exactly 20% of the clock cycles per inference.'
question: 'Create a theoretical compute budget in MACs for the neural network, assuming 4 MACs per SIMD instruction and 25% true pipeline utilization, to guarantee a sub-50ms inference time on an 80 MHz MCU.'
details:
  realistic_solution: 'A 50ms window at 80 MHz provides 4 million total cycles. Deducting 20% for DSP leaves 3.2 million cycles for the NN. Assuming INT8 SIMD yields 4 MACs per cycle but runs at 25% utilization, the effective throughput is 1 MAC per cycle. The maximum architectural budget is 3.2 million MACs.'
  common_mistake: |
    **The Pitfall:** Calculating theoretical peak throughput without utilization penalties.
    **The Rationale:** Candidates often use raw SIMD capabilities without factoring in real-world memory bottlenecks and pipeline stalls.
    **The Consequence:** Deployed models miss real-time deadlines by 4x, causing audio frame drops and catastrophic system failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - CPU Clock: 80 MHz.
    - Inference Deadline: 50 ms.
    - DSP Overhead: 20% of cycles.
    - SIMD Throughput: 4 MACs/cycle, 25% utilization.

    **Calculations:**
    - Total cycles = 80,000,000 Hz * 0.050 s = 4,000,000 cycles.
    - Cycles for NN = 4,000,000 * (1 - 0.20) = 3,200,000 cycles.
    - Effective throughput = 4 MACs/cycle * 0.25 = 1 MAC/cycle.
    - Total MAC budget = 3,200,000 cycles * 1 MAC/cycle = 3,200,000 MACs.

    **Conclusion & Interpretation:**
    - **Result: 3.2 million MACs (Compute-Bound)**. The maximum budget for the architecture strictly caps at 3.2 million MACs to guarantee the SLA.
