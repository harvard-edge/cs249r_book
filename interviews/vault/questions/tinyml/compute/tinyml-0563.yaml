title: 'The Lookup Table Optimization'
scenario: 'Your Cortex-M4 model uses a Sigmoid activation after a bottleneck layer with 128 output elements. Computing `1/(1+exp(-x))` in software takes ~80 cycles per element using the CMSIS-DSP `arm_vexp_f32` path. Your colleague proposes a 256-entry INT8 lookup table for Sigmoid.'
question: 'How would you calculate the memory cost, the speedup, and when this optimization breaks down?'
details:
  realistic_solution: 'The INT8 Sigmoid LUT maps each of the 256 possible INT8 input values to a pre-computed INT8 output. Since the model is already quantized to INT8, the input is already an 8-bit index — no conversion needed.'
  common_mistake: '"A 256-entry table is tiny and always faster." The table itself is small, but the accuracy loss from quantizing the LUT input matters, and for large tensors the table can thrash the M4''s limited data cache (if present).'
  napkin_math: |
    **Assumptions & Constraints:**
    - Layer: 128 elements.
    - Software Sigmoid: 80 cycles/element. LUT Sigmoid: 2 cycles/element.

    **Calculations:**
    - Software Time: 128 * 80 = 10,240 cycles.
    - LUT Time: 128 * 2 = 256 cycles.
    - Speedup: 10,240 / 256 = 40x.
    - Per-inference savings (10 layers): 10 * (10,240 - 256) = 99,840 cycles.

    **Conclusion & Interpretation:**
    - **Result: 40x Speedup (Compute Bound)**. A 256-byte LUT vastly outperforms software math, but savings are absolute; it only marginally improves latency if the model is dominated by convolutions.
