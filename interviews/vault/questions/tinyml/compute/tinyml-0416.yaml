title: Cortex-M55 Helium Speedup for Depthwise Conv
scenario: You're upgrading an MCU for a keyword spotting model. The model's hottest layer is a 3x3 depthwise convolution with 64 channels on a 24x24 feature map.
question: How would you calculate the speedup for a 3x3 depthwise convolution when migrating from Cortex-M4F to Cortex-M55?
details:
  realistic_solution: Depthwise convolution has little cross-channel reuse, so the useful estimate should count the layer MACs and then apply sustained, not peak, throughput for each core. The layer has 24 * 24 * 64 * 9 = 331,776 MACs. If an optimized M4F kernel sustains about 1.5 useful INT8 MACs/cycle and an M55 Helium kernel sustains about 6 useful INT8 MACs/cycle across spatial positions, the slower M55 clock still gives about a 3.8x speedup. The main point is to use a defensible sustained-throughput model rather than assume a fixed speedup for every depthwise layer.
  common_mistake: |
    **The Pitfall:** Assuming a simple theoretical speedup based purely on MAC count and clock speed.
    **The Rationale:** Calculating from advertised SIMD width alone assumes both cores achieve peak throughput on a depthwise kernel with the same memory and loop overheads.
    **The Consequence:** The estimate can be wrong in either direction because depthwise convolution is often limited by data layout, loads, and kernel overhead rather than raw vector width alone.
  napkin_math: |
    **Assumptions & Constraints:**
    - M4F: 168 MHz, ~1.5 useful INT8 MACs/cycle sustained for this depthwise kernel.
    - M55: 160 MHz, ~6 useful INT8 MACs/cycle sustained with Helium MVE.
    - Layer: 3x3 depthwise, 64 channels, 24x24 output.

    **Calculations:**
    - Total MACs: 24 * 24 * 64 * 9 = 331,776 MACs.
    - M4F Cycles: 331,776 / 1.5 = 221,184 cycles. Time: 221,184 / 168 MHz = 1.32 ms.
    - M55 Cycles: 331,776 / 6 = 55,296 cycles. Time: 55,296 / 160 MHz = 0.346 ms.
    - Speedup: 1.32 / 0.346 = ~3.8x.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound (~3.8x speedup).** Under these sustained-throughput assumptions, Helium is much faster, but the estimate does not require unsupported cycle-waste claims or a fixed 5.1x result.
  options:
    - 'Using sustained throughput for this depthwise kernel, the M55 is about 4x faster despite the slightly lower clock: roughly 1.32 ms on M4F versus 0.35 ms on M55, or ~3.8x.'
    - 'Depthwise convolutions cannot be vectorized. The speedup is purely based on the clock speed ratio: 160/168 = 0.95x.'
    - The M4F wastes cycles on the odd 3x3 kernel size due to its 2-wide SIMD, while the M55's 16-wide vector processes spatial dimensions efficiently. The actual speedup is ~5.1x, exceeding the theoretical 3.8x ratio.
    - The M55 has a dedicated hardware accelerator for depthwise convolutions, resulting in a fixed 10x speedup across all kernel sizes.
