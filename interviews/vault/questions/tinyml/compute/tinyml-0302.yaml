title: The TinyML Memory Bottleneck
scenario: When analyzing the performance of a model on a microcontroller, it's critical to know whether you're limited by compute or memory bandwidth.
question: What is the approximate 'Ridge Point' for a typical Cortex-M4, which tells us its operational intensity in Ops-per-Byte?
details:
  realistic_solution: The correct answer is approximately 0.28 Ops/Byte. This is the arithmetic-intensity threshold where the roofline changes from the memory-bandwidth-limited slope to the compute-limited plateau. Workloads below 0.28 Ops/Byte are memory-bound; workloads above 0.28 Ops/Byte are compute-bound.
  common_mistake: |
    **The Pitfall:** Mistakenly assuming TinyML devices are memory-bound like datacenter GPUs.
    **The Rationale:** Engineers guess a high Ops-per-Byte ridge point, failing to recognize that TinyML devices have relatively fast on-chip SRAM but very weak compute ALUs.
    **The Consequence:** Optimizations are misdirected towards memory bandwidth improvements rather than reducing FLOPs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Cortex-M4.
       - Clock: 168 MHz.
       - MAC Throughput: 2 ops/cycle (fused MACs).
       - Peak SRAM Bandwidth: ~1.2 GB/s.
    2. **Calculations:**
       - Peak Compute: 168 MHz × 2 ops/cycle = 336 MFLOPS.
       - Ridge Point: Peak Compute / Peak SRAM Bandwidth.
       - Ridge Point: 336 MFLOPS / 1.2 GB/s = 0.28 Ops/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: 0.28 Ops/Byte.** This is the transition threshold: lower-intensity workloads are memory-bound, while higher-intensity workloads are compute-bound.
  options:
    - ~336 Ops/Byte (Using MFLOPS directly, ignoring bandwidth).
    - ~1.2 Ops/Byte (Confusing bandwidth with the Ridge Point).
    - '~0.28 Ops/Byte (Correct calculation: 336 MFLOPS / 1.2 GB/s).'
    - ~168 Ops/Byte (Using MHz instead of MFLOPS).
  correct_index: 2
