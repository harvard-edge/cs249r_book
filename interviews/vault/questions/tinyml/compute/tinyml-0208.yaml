title: 'TinyML Roofline: Compute or Memory Bound?'
scenario: You're optimizing a keyword spotting model on a Cortex-M4 microcontroller. You profile a single fully-connected layer and find it performs approximately 8,200 floating-point operations (FLOPs) and requires moving 17,000 bytes of data (weights, inputs, and outputs) from SRAM. Assume the Cortex-M4 has a peak compute of 336 MFLOPS and an effective memory bandwidth of 1.2 GB/s.
question: What is the layer's arithmetic intensity, and is it compute-bound or memory-bound on the Cortex-M4?
details:
  realistic_solution: |
    First, calculate the layer's Arithmetic Intensity (AI). Then, compare that value to the Cortex-M4's ridge point derived from the assumed peak compute and bandwidth.
  common_mistake: |
    **The Pitfall:** Inverting the Arithmetic Intensity formula (calculating Bytes/Op instead of Ops/Byte).
    **The Rationale:** Candidates calculate the ratio backwards or fail to compare their calculated AI against the specific hardware's ridge point.
    **The Consequence:** This leads to incorrectly concluding the layer is memory-bound, resulting in misdirected optimization efforts.
  napkin_math: |
    1. Arithmetic Intensity (AI) = Total Ops / Total Bytes.
    2. AI = 8,200 FLOPs / 17,000 bytes = ~0.48 FLOPs/byte.
    3. The Cortex-M4 ridge point = Peak Compute / Peak Bandwidth.
    4. Ridge point = 336 MFLOPS / 1.2 GB/s = 0.28 Ops/byte.
    5. Compare AI to Ridge point: 0.48 > 0.28.
    6. **Since 0.48 Ops/byte > 0.28 Ops/byte, this fully-connected layer sits on the compute-bound side of the Roofline model.**
  options:
  - Memory-bound, because its intensity is ~2.07 Bytes/Op.
  - Memory-bound, because an Arithmetic Intensity of ~0.48 Ops/Byte is very low.
  - Compute-bound, because its Arithmetic Intensity (~0.48 Ops/Byte) is higher than the Cortex-M4's ridge point (~0.28 Ops/Byte).
  - Compute-bound, because all ML operations on microcontrollers are limited by CPU speed.
  correct_index: 2
