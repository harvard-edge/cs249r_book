title: The MCU Roofline
scenario: >
  A Cortex-M7 has 512 KB SRAM, a 64-bit AXI bus at 240 MHz, and SIMD capable of 4 INT8 MACs per cycle at 480 MHz.
question: Where is the ridge point, and what does it tell you about which models are feasible?
details:
  realistic_solution: |
    Build the roofline: Ridge point: 2.0 Ops/Byte.
    Conv2D 3x3 intensity: ~18 Ops/Byte → compute-bound.
    Depthwise Conv2D 3x3 intensity: ~9 Ops/Byte → compute-bound.
    Fully connected layer (1024→1024): ~2 Ops/Byte → compute-bound.
    On an MCU, essentially all standard neural network operations are compute-bound, heavily contrasting with GPUs where most layers are memory-bound.
  common_mistake: |
    **The Pitfall:** Assuming the MCU roofline operates identically to a GPU roofline with a high ridge point.
    **The Rationale:** Candidates fail to realize that the MCU memory hierarchy is flat (no HBM, often no L2 cache), drastically shifting the compute/memory balance.
    **The Consequence:** Applying GPU-centric memory optimization techniques instead of optimizing raw compute cycles.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute: 4 INT8 MACs/cycle at 480 MHz.
    - Memory: 64-bit (8 bytes) AXI bus at 240 MHz.

    **Calculations:**
    - Peak Compute: 4 MACs * 2 ops/MAC * 480 MHz = 3,840 MOPS.
    - Peak Bandwidth: 8 bytes/cycle * 240 MHz = 1,920 MB/s.
    - Ridge Point: 3,840 MOPS / 1,920 MB/s = 2.0 Ops/Byte.
    - Conv2D 3x3 Arithmetic Intensity: ~18 Ops/Byte.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound**. 18 Ops/Byte > 2.0 Ops/Byte.
  options:
  - 'The ridge point is at ~100 Ops/Byte (similar to GPUs), meaning most TinyML models are memory-bound.'
  - 'The ridge point is 2.0 Ops/Byte. Conv2D (~18 Ops/Byte) and depthwise (~9 Ops/Byte) are above it, making them compute-bound.'
  - 'The roofline model doesn''t apply to MCUs because they lack a cache hierarchy.'
  - 'The ridge point is at ~0.1 Ops/Byte because MCU memory bandwidth far exceeds compute throughput.'
  correct_index: 1
