title: Roofline Analysis of Depthwise Convolutions
scenario: We are deploying a keyword spotting CNN on an ARM Cortex-M4 running at 168 MHz. The network's most time-consuming layer is a 3x3 depthwise convolution.
question: Is a 3x3 depthwise convolution on a Cortex-M4 compute-bound or memory-bound under a roofline analysis, and what is its maximum throughput?
details:
  realistic_solution: Unlike standard convolutions, depthwise convolutions lack weight reuse across input channels, drastically lowering their arithmetic intensity. On the Cortex-M4 under this simplified SRAM traffic model, the peak MAC throughput outpaces the memory bandwidth for low-intensity operations. The layer operates on the memory-bound slope of the roofline model, meaning performance is dictated by memory fetch speed rather than the SIMD MAC units. Under the stated assumptions, the roofline throughput is about 636 MOPs/s, below the 672 MOPs/s compute peak.
  common_mistake: |
    **The Pitfall:** Assuming all convolutions are heavily compute-bound.
    **The Rationale:** Candidates fail to realize that depthwise convolutions lack weight reuse across input channels, drastically lowering their arithmetic intensity.
    **The Consequence:** They spend time optimizing the SIMD assembly instructions when the bottleneck is actually SRAM fetch speed.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute: 168 MHz, 2 MACs/cycle (CMSIS-NN).
    - Simplified SRAM Bandwidth: one aligned 32-bit word/cycle (4 bytes/cycle).
    - Operation: stride-1 3x3 depthwise convolution, INT8 input/weights/output, counted per output element per channel.
    - Conservative traffic model: no cross-output input reuse credited; one output byte is written per result.

    **Calculations:**
    - Peak Compute: 168 MHz * 2 MACs/cycle * 2 OPs/MAC = 672 MOPs/sec.
    - SRAM Bandwidth: 168 MHz * 4 bytes/cycle = 672 MB/sec.
    - Ridge Point: 672 MOPs / 672 MB/s = 1.0 MOPs/byte.
    - Work per output element: 9 MACs = 18 OPs.
    - Bytes per output element: 9 input bytes + 9 weight bytes + 1 output byte = 19 bytes.
    - Arithmetic Intensity: 18 OPs / 19 bytes = 0.947 OPs/byte.
    - Roofline Throughput: 0.947 OPs/byte * 672 MB/sec = 636 MOPs/sec.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound.** Under this conservative per-output-element traffic model, AI (0.947) is below the 1.0 OP/byte ridge point, so throughput is capped at about 636 MOPs/sec rather than the 672 MOPs/sec compute peak.
