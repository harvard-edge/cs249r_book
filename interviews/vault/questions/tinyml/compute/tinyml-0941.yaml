title: 'Optimize Prefill Batching on Ethos-U55 for Batch Documents'
scenario: 'An industrial edge device processes sensor event logs: 8 events arrive simultaneously every 500ms, each requiring transformer encoding (prefill) of 64 tokens. The Ethos-U55 supports batch sizes 1-8. Single-item prefill: 8ms. The device has 256KB SRAM, and batch-8 prefill requires 8x the KV cache (128KB).'
question: 'What batch size should the Ethos-U55 use for eight simultaneous 64-token prefill jobs under the 256 KB SRAM budget to maximize throughput?'
details:
  realistic_solution: 'Batch-1: 8ms, 16KB KV cache. Batch-8 KV cache: 8×16KB=128KB. Total SRAM with model weights buffered (~64KB) + activations (~32KB) + 128KB KV = 224KB < 256KB — fits. Batch-8 latency (measured): 3.5× single = 28ms (weight loading amortized). Processing 8 events: batch-8=28ms vs 8×batch-1=64ms. Throughput: batch-8 = 8/28ms = 286 events/s; batch-1 serial = 8/64ms = 125 events/s. Batch-8 is 2.3× faster. Both fit in 500ms window. Recommendation: batch-8 for maximum NPU utilization.'
  common_mistake: 'Assuming batch-8 prefill = 8× single latency; NPU batching amortizes weight loading costs, making batch-8 typically 2-4× slower than batch-1, not 8×.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Batch-1 latency: 8ms.
    - Batch scaling: Latency ≈ (N^0.6) * single_latency.
    - Batch-1 KV Cache: 16KB.
    - Base Weights/Activations: 96KB.

    **Calculations:**
    - Batch-8 latency = (8^0.6) * 8ms ≈ 3.48 * 8ms ≈ 28ms.
    - Batch-8 KV Cache = 8 * 16KB = 128KB.
    - Total SRAM = 128KB (KV) + 96KB = 224KB (Fits in 256KB).
    - Batch-8 Throughput = 8 events / 28ms = 286 items/s.
    - Serial Batch-1 Throughput = 8 events / 64ms = 125 items/s.

    **Conclusion & Interpretation:**
    - **Result: 28ms, 224KB SRAM (Compute-Bound)**. Batch-8 fully fits within SRAM and achieves 2.3x higher throughput by amortizing weight loading overhead on the NPU.
