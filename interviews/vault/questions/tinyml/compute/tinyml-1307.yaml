title: ESP32-S3 Roofline Memory Architecture Specification
scenario: You are tasked with deploying a visual wake word model on the ESP32-S3. The hardware features a 240 MHz processor with INT8 vector extensions, 512 KB of SRAM, and 8 MB of PSRAM. The model requires 30 million MACs and 800 KB of INT8 weights, needing to execute in under 50ms.
question: How should the system stage the 800 KB of weights so the arithmetic intensity remains compute-bound and satisfies the 50 ms latency target?
details:
  realistic_solution: The architecture must allocate the current layer's weights and all activations strictly within the 512 KB internal SRAM. To handle the 800 KB full model, the system must utilize double-buffering via DMA to asynchronously stream upcoming weight layers from the slow 8 MB PSRAM into the fast SRAM in the background. Executing directly from SRAM ensures the INT8 vector units remain fully fed, keeping the operational point on the compute-bound plateau of the roofline model.
  common_mistake: |
    **The Pitfall:** Implicitly relying on the PSRAM transparent cache.
    **The Rationale:** Candidates calculate theoretical compute peaks but ignore the massive bandwidth disparity between internal SRAM and external SPI-attached PSRAM.
    **The Consequence:** Attempting to execute MACs directly against weights residing in PSRAM drags the operational intensity into the memory-bound region, starving the pipeline and missing the 50ms deadline.
  napkin_math: |
    **Assumptions & Constraints:**
    - 30M MACs, 50ms deadline -> Required throughput = 600 MMACs/s.
    - ESP32-S3 peak compute: 240 MHz * 2 cores * 16 MACs/cycle = 7.68 GMACs/s.
    - PSRAM Bandwidth: ~40 MB/s. SRAM Bandwidth: ~960 MB/s.

    **Calculations:**
    - PSRAM Direct Execution: 40 MB/s -> 40 MMACs/s (Fails 600 MMACs/s requirement).
    - SRAM Staged Execution: 960 MB/s -> Supports 960 MMACs/s.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound Bandwidth**. Fetching directly from PSRAM caps throughput at 40 MMACs/s; utilizing DMA to stage weights into SRAM unlocks the required 600 MMACs/s to hit the deadline.
