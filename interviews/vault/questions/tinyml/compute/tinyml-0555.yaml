title: The Clock Tree Surprise
scenario: You're deploying a gesture recognition model on an STM32L4. To save power, your firmware engineer configures the MCU to run at 16 MHz from the MSI oscillator instead of 80 MHz from the PLL. Inference time scales from 20 ms to 100 ms — exactly 5x, as expected.
question: How is running slower using *more* energy?
details:
  realistic_solution: 'Running slower uses more total energy because of static power leakage. The key architectural insight is that static power (leakage current) is voltage-dependent, not frequency-dependent. At 16 MHz, the MCU draws its static baseline for 5x longer. The optimal strategy is "race-to-sleep": run at the maximum clock, finish inference rapidly, and enter deep sleep where static power drops to microwatts.'
  common_mistake: |
    **The Pitfall:** Assuming "lower clock = lower power = lower energy."
    **The Rationale:** Candidates confuse power (Watts) with energy (Joules). Power drops at lower clock speeds, but the MCU runs longer.
    **The Consequence:** They try to save battery life by slowing down the clock, but actually increase total energy consumption due to prolonged leakage.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fast (80 MHz): 50 mW active for 20 ms, 10 µW sleep.
    - Slow (16 MHz): 15 mW active for 100 ms, 10 µW sleep.
    - Duty cycle evaluation window: 1 second.

    **Calculations:**
    - Fast Energy: (50 mW * 20 ms) + (0.01 mW * 980 ms) = 1.0 mJ + 0.0098 mJ = 1.01 mJ.
    - Slow Energy: (15 mW * 100 ms) + (0.01 mW * 900 ms) = 1.5 mJ + 0.009 mJ = 1.51 mJ.

    **Conclusion & Interpretation:**
    - **Result: 1.51 mJ (Static Leakage Domination)**. The slow method uses 50% more total energy, validating the race-to-sleep strategy.
  options:
  - The 16 MHz clock reduces dynamic power proportionally to 10 mW, yielding a total energy of 1.0 mJ per inference, saving battery life.
  - Running at 16 MHz uses 1.5 mJ per inference because dynamic power scales linearly with frequency but active time scales inversely, while accumulating 5x more leakage energy.
  - Static (leakage) power is voltage-dependent. At 16 MHz the MCU stays active 5x longer (100 ms vs 20 ms), accumulating 1.51 mJ total energy compared to 1.01 mJ for race-to-sleep.
  - The 16 MHz clock reduces the active power to 15 mW, saving 35 mW, and yielding a lower total energy of 0.3 mJ per inference.
