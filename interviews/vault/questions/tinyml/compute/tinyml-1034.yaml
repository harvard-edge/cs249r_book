title: ESP32-S3 Vector Extension Efficiency
scenario: You are deploying an audio processing model on an ESP32-S3 (240 MHz dual-core Xtensa, 512 KB SRAM, 8 MB PSRAM, WiFi/BLE). Because the device must maintain active WiFi/BLE connections, compute efficiency is critical. The model requires 20 million INT8 MACs per inference at 10 FPS.
question: What are ESP32-S3 vector and scalar MAC throughputs for 20 MMAC at 10 FPS, and how much CPU utilization does each require?
details:
  realistic_solution: The workload is 20 MMAC/inference * 10 FPS = 200 MMAC/s. With two 240 MHz cores and 16 INT8 MACs/cycle, vector throughput is 240 * 2 * 16 = 7,680 MMAC/s, so utilization is 200 / 7,680 = 2.6%. Scalar throughput is 240 * 2 * 1 = 480 MMAC/s, so utilization is 200 / 480 = 41.6%. The vector path leaves much more CPU headroom for WiFi/BLE work, while the scalar path consumes a large fraction of available CPU cycles.
  common_mistake: |
    **The Pitfall:** Forgetting to account for dual cores or ignoring the impact on wireless stacks.
    **The Rationale:** Candidates miscalculate peak throughput or assume 41.6% utilization is perfectly acceptable.
    **The Consequence:** Failing to realize that high scalar utilization will starve the WiFi/BLE radio stacks, causing connection drops and system instability.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Workload: 20 MMACs/inference * 10 FPS = 200 MMACs/sec.
    - Peak Vector Throughput: 240 MHz * 2 cores * 16 MACs/cycle = 7,680 MMACs/sec (7.68 GMACs/s).
    - Peak Scalar Throughput: 240 MHz * 2 cores * 1 MAC/cycle = 480 MMACs/sec.

    **Calculations:**
    - Vector Utilization: 200 / 7,680 = 0.026.
    - Scalar Utilization: 200 / 480 = 0.416.

    **Conclusion & Interpretation:**
    - **Result: 2.6% Vector, 41.6% Scalar (Compute-Bound)**. Vector execution uses 2.6% CPU, while scalar execution uses 41.6% CPU.
