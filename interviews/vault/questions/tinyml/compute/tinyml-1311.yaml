title: Diagnosing CNN Performance on ESP32-S3 with Roofline Analysis
scenario: A tinyML engineer is tasked with deploying a convolutional neural network (CNN) model for keyword spotting on an ESP32-S3 microcontroller. The model achieves 90% accuracy offline but struggles to meet the real-time latency requirements (e.g., 100 ms inference time) when running on the device. The ESP32-S3 features a 240 MHz dual-core CPU, 512 KB of internal SRAM, and 8 MB of external PSRAM. The current implementation stores model weights in PSRAM and performs computations on the CPU.
question: How should roofline analysis diagnose whether an ESP32-S3 keyword-spotting CNN with PSRAM-resident weights is memory-bound or compute-bound?
details:
  realistic_solution: |
    1. Characterize the model by measuring total operations and bytes moved from each memory level, especially PSRAM-resident weights and activation traffic.
    2. Benchmark ESP32-S3 effective compute throughput for the actual kernels and data type instead of relying on a generic FLOP peak; performance depends on instruction mix, vectorization, and whether the model is float or int8.
    3. Benchmark effective PSRAM and SRAM bandwidth with the access pattern used by inference, including cache effects.
    4. Compare two roofline lower bounds: compute time from operations divided by achieved compute rate, and memory time from bytes moved divided by effective bandwidth. The larger bound diagnoses the bottleneck.
    5. If memory-bound, quantize to int8, reduce model and activation traffic, and place hot weights or tiles in SRAM. If compute-bound after memory traffic is controlled, reduce operations or use ESP32-S3-optimized kernels.
  common_mistake: |
    **The Pitfall:** Assuming performance issues are solely compute-bound and immediately optimizing floating-point operations.
    **The Rationale:** Candidates do this without first assessing memory bandwidth limitations or the impact of data movement between PSRAM and SRAM.
    **The Consequence:** They end up overlooking the implications of limited fast SRAM, leaving the system severely memory-bound.
  napkin_math: |
    **Assumptions & Constraints:**
    - CNN compute: 50 MFLOPs.
    - Operational intensity: 0.5 FLOPs/byte.
    - ESP32-S3 effective compute estimate for this CPU implementation: benchmarked or conservatively estimated at 200 MFLOPs/s.
    - ESP32-S3 effective PSRAM bandwidth for this access pattern: 15 MB/s.

    **Calculations:**
    - Compute lower bound = 50 MFLOPs / 200 MFLOPs/s = 250 ms.
    - Data Movement = 50 MFLOPs / 0.5 FLOPs/byte = 100 MB.
    - Memory lower bound = 100 MB / 15 MB/s ≈ 6.67 s.
    - Roofline diagnosis uses the larger lower bound: max(250 ms, 6.67 s) = 6.67 s.

    **Conclusion & Interpretation:**
    - **Result: 6.67 s memory lower bound (Memory-Bound)**. Under these measured assumptions, PSRAM traffic dominates the compute lower bound and is far beyond the 100 ms target.
