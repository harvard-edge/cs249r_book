title: SRAM Retention Leakage in Deep Sleep Mode
scenario: A Cortex-M4 sleeps 99% of the time, only waking up on audio triggers. Power profiling shows
  a continuous 20uA drain during deep sleep, missing the 2uA target required for 10-year battery life.
question: What retained SRAM leakage explains the 20 microamp deep-sleep drain, and how can bank power-down
  meet the target?
details:
  realistic_solution: The symptom is SRAM retention leakage. The MCU retains the full 256KB SRAM during
    deep sleep so the ML model state isn't lost. SRAM cells leak current continuously. To reach the 2uA
    target, you must power off the SRAM banks that are not actively holding the model state, and locate
    the model weights in Flash to minimize required SRAM.
  common_mistake: '**The Pitfall:** Assuming "deep sleep" automatically optimizes power without manual
    configuration.

    **The Rationale:** Engineers treat sleep states as a black box and fail to explicitly manage SRAM
    bank retention policies for ML model state.

    **The Consequence:** The entire 256KB of SRAM leaks current continuously, destroying the 10-year battery
    life target.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Target deep-sleep drain: 2 µA.

    - Total SRAM: 256 KB (16 banks of 16 KB).

    - Bank leakage rate: ~1.2 µA per bank.

    - Base MCU sleep current (no SRAM): 0.5 µA.

    - Model requires 1 SRAM bank (16 KB) for state.


    **Calculations:**

    - Full SRAM leakage: 16 banks × 1.2 µA/bank + 0.5 µA = 19.7 µA (matches ~20 µA profile).

    - Power down savings: 15 unused banks × 1.2 µA = 18.0 µA.

    - Optimized drain: 19.7 µA - 18.0 µA = 1.7 µA.

    - 1.7 µA < 2.0 µA target.


    **Conclusion & Interpretation:**

    - **Result: 1.7 µA Drain (Power-Bound).** Selectively powering down 15 unused SRAM banks reduces the
    drain below the 2 µA requirement.'
