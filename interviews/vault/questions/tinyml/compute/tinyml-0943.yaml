title: Recall Transformer Token Budget on TinyML Hardware
scenario: During a TinyML interview, you are asked to size a transformer running on Cortex-M4 with 256KB SRAM, 2 layers, 4 heads, 32-dim head dimension, and INT8 precision.
question: What maximum transformer sequence length fits in a 128 KB KV cache on Cortex-M4 with the given layers, heads, and head size?
details:
  realistic_solution: Calculate the exact byte footprint of the KV cache per token across all layers. The KV cache holds both Keys and Values, requiring a strict accounting of dimensions before dividing the SRAM budget by the token footprint.
  common_mistake: |
    **The Pitfall:** Forgetting the factor of 2 for Keys and Values, or forgetting that all layers' KV state must exist simultaneously.
    **The Rationale:** Candidates rush the calculation and drop critical multipliers in the KV tensor formula.
    **The Consequence:** The deployed model encounters hard Out-Of-Memory (OOM) crashes during sequence generation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Layers = 2, Heads = 4, Head_dim = 32.
    - Precision = INT8 (1 byte).
    - Target SRAM Budget = 128 KB (131,072 bytes).

    **Calculations:**
    - Bytes per token = 2 (K & V) * Layers * Heads * Head_dim * Precision.
    - Bytes = 2 * 2 * 4 * 32 * 1 = 512 bytes/token.
    - Max Tokens = 131,072 bytes / 512 bytes/token = 256 tokens.

    **Conclusion & Interpretation:**
    - **Result: 256 Tokens (SRAM Limit)**. The strict SRAM boundary limits the model's context window.
