title: Architecting a Vision Pipeline on Corstone-300
scenario: You are designing a real-time object detection pipeline for a smart doorbell. The system features 512 KB of shared SRAM. Your model heavily relies on depthwise separable convolutions and requires complex post-processing. You must architect a workload partitioning and memory management strategy to maximize utilization, considering the NPU's position on the roofline model given the shared SRAM constraints.
question: How should Corstone-300 partition M7 post-processing and U55 convolutions to improve roofline utilization?
details:
  realistic_solution: A robust design fuses depthwise and pointwise convolutions to increase overall arithmetic intensity, shifting the workload closer to the roofline ridge point. The architecture should strictly partition the 512 KB SRAM, using double-buffering via DMA so the M7 can perform non-maximum suppression (NMS) on output tensors while the Ethos-U55 computes the next inference without memory stalling.
  common_mistake: |
    **The Pitfall:** Offloading the entire network to the Ethos-U55 without calculating arithmetic intensity.
    **The Rationale:** Candidates assume the NPU is universally faster, failing to realize depthwise layers will push the U55 deep into the memory-bound region.
    **The Consequence:** Severe memory contention and stalling, achieving less than 2% of the NPU's peak compute capacity.
  napkin_math: |
    **Assumptions & Constraints:**
    - Ethos-U55 Peak Compute: 256 MACs/cycle * 2 OPS/MAC * 480 MHz = 245.7 GOPS.
    - Max SRAM Bandwidth: 4 bytes/cycle * 480 MHz = 1.92 GB/s.
    
    **Calculations:**
    - Roofline Ridge Point: 245.7 GOPS / 1.92 GB/s = ~128 OPS/byte.
    - Depthwise Layer Intensity: ~1-2 OPS/byte.
    - Achieved Performance: 1.92 GB/s * 2 OPS/byte = 3.84 GOPS.
    
    **Conclusion & Interpretation:**
    - **Result: Memory-Bound Execution (Memory-Bound)**. Depthwise layers achieve less than 2% of peak NPU compute due to severe memory bandwidth limitations.
