title: 'Microcontroller Arithmetic Intensity'
scenario: 'You have a hardware spec sheet that specifies a Cortex-M4 microcontroller operating at 168 MHz with a 32-bit memory bus and a peak compute of 336 MFLOPS.'
question: 'Based on your calculation, are these devices generally compute-bound or memory-bound?'
details:
  realistic_solution: 'The Arithmetic Intensity (AI) of a processor, also known as its Roofline ''Ridge Point'', is calculated by dividing its peak theoretical compute performance by its peak memory bandwidth. For the Cortex-M4, we use the specified values: - Compute: ~336 MFLOPS = 0.336 GFLOPS - Memory Bandwidth: A 168 MHz Cortex-M4 with a 32-bit (4-byte) bus has a theoretical peak of 168M × 4 = 672 MB/s ≈ 0.672 GB/s. The ridge point = 0.336 GFLOPS / 0.672 GB/s = 0.5 FLOPs/Byte. This extremely low ridge point means that almost any ML workload with even modest data reuse will be compute-bound on a Cortex-M4. Unlike GPUs (which have ridge points of 100-700 Ops/Byte and are often memory-bound), microcontrollers have so little compute relative to their memory bandwidth that compute is almost always the bottleneck.'
  common_mistake: 'Engineers often invert the formula, calculating Bytes/FLOP instead of FLOPs/Byte. Another common mistake is a unit mismatch, failing to align the scales of the compute (MFLOPS) and bandwidth (GB/s) figures before dividing, leading to an answer that is orders of magnitude off.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4: 168 MHz clock, 32-bit (4-byte) bus.
    - Peak compute: 336 MFLOPS.

    **Calculations:**
    - Peak Memory Bandwidth: 168 MHz * 4 bytes = 672 MB/s = 0.672 GB/s.
    - Ridge Point: 336 MFLOPS / 0.672 GB/s = 0.5 FLOPs/Byte.
    - Typical convolution AI: 10 to 100 FLOPs/Byte.

    **Conclusion & Interpretation:**
    - **Result: 0.5 FLOPs/Byte (Compute Bound)**. Because the workload AI (10+) massively exceeds the hardware ridge point (0.5), almost any ML workload will be severely compute-bound on the MCU.
  options:
  - '~3.57 FLOPs/Byte (Memory-bound)'
  - '~280 FLOPs/Byte (Compute-bound)'
  - '~0.5 FLOPs/Byte (Compute-bound)'
  - '~0.25 FLOPs/Byte (Memory-bound)'
