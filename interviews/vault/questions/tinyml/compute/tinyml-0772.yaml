title: 'The DMA-Inference Overlap'
scenario: 'On a Cortex-M7 (1 MB SRAM, 400 MHz), inference takes 25 ms and consumes the CPU entirely. Meanwhile, a camera module delivers 320x240 grayscale frames at 15 FPS via SPI at 25 MHz. Each frame is 76.8 KB.'
question: 'Can DMA-based frame capture fully overlap with inference, or does bus contention degrade performance?'
details:
  realistic_solution: 'DMA transfer time is 24.6 ms, and the frame interval is 66.7 ms. While DMA does not use the CPU, it heavily utilizes the AHB bus matrix. Because M7 inference is often memory-bound (high cache miss rate to SRAM), the DMA and CPU contend for the same bus matrix. This arbitration overhead stretches both inference and DMA transfer times by ~10-15%, meaning they do not perfectly overlap, though they still fit within the 15 FPS budget.'
  common_mistake: |
    **The Pitfall:** Assuming DMA is entirely "free" and has zero performance impact on CPU execution.
    **The Rationale:** Candidates know DMA unloads the CPU ALU but forget that both DMA and CPU share the same underlying AHB bus matrix for SRAM access.
    **The Consequence:** Missing the ~12% bus contention penalty, which causes real-time hard deadline misses if the pipeline was already tightly budgeted.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame: 76.8 KB (320x240x1).
    - SPI: 25 MHz.
    - Frame interval (15 FPS): 66.7 ms.
    - Baseline Inference: 25 ms (~60% bus util).

    **Calculations:**
    - DMA transfer time: 76,800 bytes * 8 bits / 25 MHz = 24.576 ms.
    - Bus util during DMA: DMA (~37%) + Inference (~60%) = ~97%.
    - Contention penalty: ~12% stretch.
    - Stretched Inference: 25 ms * 1.12 = 28 ms.
    - Stretched DMA: 24.6 ms * 1.12 = 27.6 ms.

    **Conclusion & Interpretation:**
    - **Result: Bus Contention Exists (Memory-Bandwidth-Bound)**. Both operations stretch to ~28 ms but still fit safely within the 66.7 ms frame budget.
  options:
  - 'DMA is free because it doesn''t use the CPU. The camera capture and inference run in perfect parallel with zero performance impact.'
  - 'DMA frame transfer: 24.6 ms. Bus utilization: DMA (~37%) + inference (~60%) = ~97%, causing arbitration delays of ~10-15%. Inference stretches to ~28 ms; DMA to ~27 ms. Both fit within the 66.7 ms budget.'
  - 'The SPI bus for the camera and the AHB bus for inference are completely separate, so there is zero contention.'
  - 'Bus contention is so severe that inference slows to 50 ms (2x), making even 10 FPS infeasible.'
  correct_index: 1
