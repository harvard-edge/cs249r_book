title: The Microcontroller's Ridge Point
scenario: 'You are designing a keyword spotting model for a microcontroller. The datasheet provides its peak performance: 336 MFLOPS and a memory bandwidth of 1.2 GB/s.'
question: 'What is the ''Ridge Point'' in FLOPs per Byte and what does it tell you about workloads running efficiently on this MCU?'
details:
  realistic_solution: The Ridge Point defines the minimum Arithmetic Intensity (AI) a workload must have to be compute-bound. On this device, it's approximately 0.28 FLOPs/Byte. Any operation with an AI lower than this will be limited by memory bandwidth. Any operation with an AI higher than this will be limited by the core's computational speed.
  common_mistake: |
    **The Pitfall:** Miscalculating the ridge point by inverting the formula or confusing units.
    **The Rationale:** Engineers mistakenly believe a workload should have low arithmetic intensity, when higher intensity is actually needed to overcome the memory bottleneck.
    **The Consequence:** Poorly optimized models that fail to fully utilize the core's compute capability.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak Compute: 336 MFLOPS.
    - Peak Memory Bandwidth: 1.2 GB/s (1200 MB/s).

    **Calculations:**
    - Ridge Point = Peak Compute / Peak Bandwidth.
    - Ridge Point = 336 MFLOPS / 1200 MB/s = 0.28 FLOPs/Byte.

    **Conclusion & Interpretation:**
    - **Result: 0.28 FLOPs/Byte (Compute-Bound)**. ML workloads with AI higher than 0.28 are compute-bound.
  options:
  - 280 FLOPs/Byte. This high value means nearly all workloads are memory-bound.
  - 3.57 FLOPs/Byte. This means the device is extremely compute-heavy.
  - 0.28 FLOPs/Byte. Workloads must exceed this intensity to be compute-bound.
  - 0.28 FLOPs/Byte. Workloads must stay *below* this intensity to avoid bottlenecks.
  correct_index: 2
