title: The TinyML Compute-Memory Tradeoff
scenario: You're optimizing a keyword spotting model on a Cortex-M4 microcontroller (336 MFLOPS peak compute, 1.2 GB/s SRAM bandwidth). A key layer is a 2D convolution with a 16x16x8 input feature map, a 16x16x16 output feature map, a 3x3 kernel, and INT8 precision.
question: Is this convolutional layer compute-bound or memory-bound on the Cortex-M4?
details:
  realistic_solution: |
    First, calculate the Ridge Point of the hardware, which is the ratio of its peak compute to its memory bandwidth. This value tells us the minimum Arithmetic Intensity a workload needs to be compute-bound. Then calculate the layer's total ops vs total bytes moved to find its AI.
  common_mistake: |
    **The Pitfall:** Miscalculating total operations or only counting the input tensor size for data movement.
    **The Rationale:** Engineers often ignore the weights and output tensor bandwidth, or incorrectly guess that all TinyML workloads are memory-bound due to small memory sizes.
    **The Consequence:** Failing to recognize that on-chip SRAM is actually very fast relative to the slow MCU core leads to misidentifying a compute-bound layer as memory-bound.
  napkin_math: |
    1. Hardware Ridge Point = 336 M-ops/s / 1.2 G-bytes/s = 0.28 Ops/Byte.
    2. FLOPs for Conv2D = 2 * K^2 * C_in * C_out * H_out * W_out = 2 * 9 * 8 * 16 * 16 * 16 = 589,824 FLOPs.
    3. Data moved = Input (16x16x8 = 2,048 B) + Weights (3x3x8x16 = 1,152 B) + Output (16x16x16 = 4,096 B) = 7,296 bytes.
    4. Arithmetic Intensity = 589,824 Ops / 7,296 bytes = 80.8 Ops/Byte.
    5. Compare AI to Ridge Point: 80.8 >> 0.28.
    6. **This layer is deeply compute-bound (80.8 Ops/Byte > 0.28 Ops/Byte). Optimizations should target reducing FLOPs.**
  options:
  - Memory-bound, because TinyML devices have very little SRAM, so they are always waiting on memory.
  - Memory-bound, because the arithmetic intensity is ~0.1 Ops/Byte, which is lower than the ridge point.
  - Compute-bound, because the layer's arithmetic intensity (~81 Ops/Byte) is much higher than the MCU's ridge point (~0.28 Ops/Byte).
  - Compute-bound, because its power consumption is high, which means it is doing a lot of computation.
  correct_index: 2
