title: Optimizing a TinyML Model for Nordic nRF5340 Constraints
scenario: You are tasked with deploying a real-time anomaly detection model on a Nordic nRF5340 microcontroller. The model must process sensor data at 100 Hz, with inference latency under 10ms.
question: How should you optimize an nRF5340 anomaly model to meet 100 Hz, sub-10 ms inference without an FPU?
details:
  realistic_solution: 'The solution involves a multi-pronged approach: 1) **Model Architecture Selection:** Choose an inherently lightweight model architecture suitable for TinyML (e.g., MobileNetV2, EfficientNet-Lite, or custom small networks). 2) **Quantization-Aware Training (QAT):** Implement QAT to train the model with 8-bit integer weights and activations, ensuring compatibility with the nRF5340''s integer-only arithmetic. 3) **CMSIS-NN Utilization:** Leverage the ARM CMSIS-NN library for highly optimized integer matrix multiplications, convolutions, and other operations, which exploit the Cortex-M33''s DSP extensions (SIMD). 4) **Memory Optimization:** Analyze the model''s memory footprint, especially intermediate activation buffers, and consider techniques like in-place operations or tiling. 5) **Profiling and Iteration:** Thoroughly profile the model on the target hardware to identify bottlenecks and iteratively optimize code (e.g., hand-optimized loops, unrolling) or further simplify the model.'
  common_mistake: |
    **The Pitfall:** Attempting to deploy a model trained with floating-point operations directly.
    **The Rationale:** Only applying basic post-training quantization without considering the deep implications of integer-only arithmetic, and ignoring memory layout and activation requirements.
    **The Consequence:** The model will fail to meet latency requirements due to floating-point emulation and may crash due to SRAM constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target rate: 100 Hz (10 ms latency deadline).
    - Hardware: 128 MHz Cortex-M33, no FPU. 256 KB SRAM, 1 MB flash.

    **Calculations:**
    - Compute Budget = 128 MHz x 10 ms = 1.28 million CPU cycles.
    - With CMSIS-NN SIMD, ~600k-900k effective 8-bit MACs can fit within this cycle budget.
    - Memory Budget = 256 KB SRAM for activations, parameters, and OS overhead.

    **Conclusion & Interpretation:**
    - **Result: 1.28M cycles (Compute and Memory-Bound)**. To fit within 1.28M cycles and 256 KB SRAM, the INT8 model must execute in-place (XIP) from flash, reserving SRAM strictly for activations and tiling buffers.
