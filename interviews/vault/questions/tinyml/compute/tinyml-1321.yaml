title: Optimizing a TinyML Model for Nordic nRF5340 Constraints
scenario: You are tasked with deploying a real-time anomaly detection model on a Nordic nRF5340 microcontroller. The model must process sensor data at 100 Hz, with inference latency under 10ms.
question: How should you optimize an nRF5340 anomaly model to meet 100 Hz, sub-10 ms inference without an FPU?
details:
  realistic_solution: |
    Use a small anomaly model designed for MCU inference, such as a compact 1D CNN, DS-CNN, or tiny MLP, rather than an unqualified MobileNetV2 or EfficientNet-Lite class model. Train with quantization-aware training or carefully validated post-training quantization so weights and activations are int8, then run the graph with CMSIS-NN or equivalent optimized Cortex-M33 kernels that use the core's integer/DSP instructions. Keep activation buffers, scratch memory, and frequently reused tensors within the nRF5340 application core SRAM, reduce operator count and activation footprint, and profile worst-case latency on device with BLE/RTOS activity enabled. Because the target is sub-10 ms at 100 Hz and no FPU is available for inference, float operators should be removed from the hot path.
  common_mistake: |
    **The Pitfall:** Attempting to deploy a model trained with floating-point operations directly.
    **The Rationale:** Only applying basic post-training quantization without checking operator coverage, Cortex-M33 kernel support, memory layout, and activation requirements.
    **The Consequence:** Float operators or unsupported layers remain in the hot path, causing emulation overhead and excessive SRAM pressure that can miss the 10 ms latency target.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target rate: 100 Hz (10 ms latency deadline).
    - Hardware: nRF5340 application core at 128 MHz, no FPU used for inference, 1 MB flash and 512 KB SRAM on the application core.

    **Calculations:**
    - Compute Budget = 128 MHz x 10 ms = 1.28 million CPU cycles.
    - Reserve roughly 20-30% for scheduling, sensor handling, and framework overhead, leaving about 0.9-1.0 million cycles for kernels.
    - Use a planning target of 2 cycles/MAC for supported int8 CMSIS-NN kernels after accounting for loads, stores, loop overhead, and less-than-ideal layer shapes.
    - Practical kernel budget: 0.9-1.0 million cycles / 2 cycles/MAC = about 450k-500k MACs per inference.
    - Treat any larger MAC estimate as conditional on measured kernels beating 2 cycles/MAC on the actual layer shapes.
    - SRAM Budget = 512 KB total for activations, scratch buffers, stack/RTOS, and any hot weights copied from flash.

    **Conclusion & Interpretation:**
    - **Result: 1.28M total cycles and about 450k-500k planning MACs per inference.** The model should be int8, use supported optimized kernels, fit activations/scratch in SRAM, and keep hot tensors in low-wait-state memory where profiling shows flash/XIP stalls threaten the 10 ms budget.
