title: Non-linear Latency Scaling on Corstone-300
scenario: We are deploying a CNN-based anomaly detection model on a platform with 512 KB shared SRAM. Model A (10 million MACs) executes in 2 milliseconds. Model B has slightly wider layers totaling 12 million MACs, but executes in 15 milliseconds.
question: Why does a mere 20% increase in compute requirements result in a 7.5x increase in total inference latency on the Corstone-300?
details:
  realistic_solution: The disproportionate latency increase is caused by exceeding the 512 KB SRAM capacity, triggering an SRAM spill. Model A's weights and activations fit entirely within the fast on-chip SRAM, allowing the NPU to operate continuously with high MAC utilization. Model B's wider layers increase the peak memory footprint beyond 512 KB, forcing the system to store intermediate activations in slower off-chip memory (such as QSPI flash or external DRAM). The severe bandwidth limitation of off-chip memory access starves the NPU of data, shifting the workload from compute-bound to heavily memory-bound.
  common_mistake: |
    **The Pitfall:** Assuming that execution time scales linearly with MAC operations.
    **The Rationale:** Candidates focus solely on the NPU's peak compute capacity and fail to analyze the system-level memory hierarchy and the rigid boundaries of the shared SRAM.
    **The Consequence:** Being completely blindsided when a minor model tweak causes the system to violently hit a memory wall, breaking all real-time deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model A Compute: 10M MACs.
    - Model B Compute: 12M MACs (20% increase).
    - SRAM Limit: 512 KB.
    - External Memory Bandwidth (e.g., QSPI Flash): 40 MB/s.

    **Calculations:**
    - Model A Execution: ~2 ms (fits in SRAM, high MAC utilization).
    - Model B SRAM Overflow: Widened layers push peak activation size ~100 KB beyond the 512 KB limit.
    - Off-chip Data Transfer: 100 KB spilled across 5 layers = 500 KB total data movement.
    - Transfer Latency: 500 KB / 40,000,000 bytes/s = 12.5 ms.

    **Conclusion & Interpretation:**
    - **Result: Memory Bandwidth-Bound.** Exceeding the SRAM limit triggers a catastrophic SRAM spill to off-chip memory, incurring a 12.5ms penalty and causing a 7.5x total latency jump.
