title: INT8-to-Float Dequantization Trap
scenario: You are profiling a TinyML model on an older Cortex-M4F. The layer is a simple Dequantization node that takes an `int8_t` array and converts it to a `float` array. The M4F has a hardware floating-point unit (FPU). However, the profiler shows this conversion taking 45 cycles per element instead of the expected 2 cycles.
question: Why does INT8-to-float dequantization stay slow even with a Cortex-M4F hardware FPU?
details:
  realistic_solution: 'The FPU is not ignoring the code; the missing primitive is a direct int8-to-float conversion path. The compiler must unpack int8 values in integer registers, sign-extend them to int32, move them across to the floating-point pipeline, then run VCVT-style conversion. That integer-to-FPU domain crossing and scalar unpacking dominate the layer. Fix: batch the unpacking with CMSIS/DSP intrinsics, sign-extend multiple int8 values per loop, and feed the FPU with int32 values in a tight conversion loop.'
  common_mistake: |
    **The Pitfall:** Assuming implicit casting maps directly to hardware FPU instructions.
    **The Rationale:** Candidates believe the FPU natively handles int8-to-float conversions, oblivious to register penalties.
    **The Consequence:** The compiler generates massive pipeline stalls moving data between integer and floating-point domains, crippling throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Cortex-M4F (FPU). Conversion: INT8 to FP32.
    - Observed naive conversion: 45 cycles/element from scalar unpacking and integer/FPU domain crossing.
    - Optimized estimate: about 5-8 cycles/element after reducing scalar unpacking overhead with tighter loops and DSP-style sign-extension helpers.

    **Calculations:**
    - Cortex-M4F does not provide wide NEON/MVE-style SIMD lanes for this conversion, so the fix is not automatic vector FP conversion.
    - Practical optimization: unroll the loop, use DSP intrinsics or packed loads to reduce int8 sign-extension overhead, then feed int32 values to the FPU conversion path.
    - Time for 100K tensor (naive): 100K * 45 = 4.5M cycles.
    - Time for 100K tensor (optimized range): 100K * 5 to 8 = 0.5M to 0.8M cycles.
    - Optimized speedup range: 4.5M / 0.8M to 4.5M / 0.5M = about 5.6x to 9x.

    **Conclusion & Interpretation:**
    - **Result: roughly 5.6-9x recoverable speedup from reducing conversion overhead (Domain-Crossing Bound)**. The naive implicit cast is dominated by scalar int8 unpacking and integer-to-FPU transfer overhead; tighter scalar/DSP-assisted loops remove much of that penalty without implying M55/NEON-style vector lanes.
