title: The Float-to-Int Hardware Trap
scenario: You are profiling a TinyML model on an older Cortex-M4F. The layer is a simple Dequantization node that takes an `int8_t` array and converts it to a `float` array. The M4F has a hardware floating-point unit (FPU). However, the profiler shows this conversion taking 45 cycles per element instead of the expected 2 cycles.
question: Why is the hardware FPU ignoring your code?
details:
  realistic_solution: 'The Cortex-M4F''s FPU handles float-to-float and int32-to-float (VCVT.F32.S32) in 1 cycle, but there is no direct int8-to-float hardware path. The compiler generates cross-domain pipeline stalls. Fix: batch convert using SIMD — sign-extend 4 int8 values simultaneously with CMSIS intrinsics, then convert in a tight loop.'
  common_mistake: |
    **The Pitfall:** Assuming implicit casting maps directly to hardware FPU instructions.
    **The Rationale:** Candidates believe the FPU natively handles int8-to-float conversions, oblivious to register penalties.
    **The Consequence:** The compiler generates massive pipeline stalls moving data between integer and floating-point domains, crippling throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Cortex-M4F (FPU). Conversion: INT8 to FP32.
    - Naive conversion: 45 cycles/element (domain stalls).

    **Calculations:**
    - SIMD optimization: Sign-extend 4 int8 to int32 via SXTB (~2 cycles), move to FPU via VMOV, VCVT.
    - Time for 100K tensor (naive): 100K * 45 = 4.5M cycles.
    - Time for 100K tensor (optimized): 100K * 5 = 500K cycles.
    - Ratio: 4.5M / 500K = 9x. (Original was 22.5x slower than naive 2-cycle goal).

    **Conclusion & Interpretation:**
    - **Result: 22.5x slower than baseline (Pipeline-Bound)**. The naive implicit cast makes the layer heavily pipeline-bound due to domain crossing overhead.
