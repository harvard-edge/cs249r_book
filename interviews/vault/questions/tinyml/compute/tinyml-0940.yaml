title: Master Transformer FLOPs-to-Power Model for Battery Sizing
scenario: 'Design a complete power model for a keyword-spotting transformer to size the battery for 1-year operation. The model runs every 200ms to process 32ms audio frames. Total MACs per inference: 12M. Between inferences the MCU sleeps.'
question: How would you compute the active energy per inference, sleep energy between inferences, total annual energy, and required battery capacity?
details:
  realistic_solution: '(1) Active energy: 12M MAC x 0.5 pJ/MAC = 6 uJ per inference. Plus memory: 500KB weight reads x 10 pJ/byte (SRAM) = 5 uJ. Total active: ~11 uJ. Inference time: 12M MACs / (168Mx0.5 MAC/cycle) = 143ms. (2) Sleep time: 200ms - 143ms = 57ms. Sleep power: 10uA x 3.3V = 33uW. Sleep energy: 33uW x 0.057s = 1.88 uJ. (3) Per cycle (200ms): 11+1.88 = 12.88 uJ. Cycles/year: 365x24x3600/0.2 = 157.7M. Annual energy: 157.7M x 12.88uJ = 2.03 kJ = 0.565 Wh. (4) Battery: 0.565 Wh / 3.3V = 171 mAh. With 20% margin: 205 mAh ~ 220 mAh cell.'
  common_mistake: |
    **The Pitfall:** Ignoring memory access energy and wake-up overhead.
    **The Rationale:** Candidates focus entirely on active compute operations (MACs), forgetting that SRAM reads dominate over compute energy on ultra-low-power MCUs.
    **The Consequence:** Vastly underestimating power consumption, resulting in a battery that drains long before the 1-year operational target.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute Energy: 0.5 pJ/MAC. Total MACs: 12M.
    - Memory Read Energy: 10 pJ/byte. Weight Reads: 500KB.
    - Sleep Power: 10 µA at 3.3V = 33 µW.
    - Cycle Time: 200 ms. Active Time: 143 ms. Sleep Time: 57 ms.
    
    **Calculations:**
    - Compute Energy: 12M * 0.5 pJ = 6 µJ.
    - Memory Energy: 500KB * 10 pJ = 5 µJ.
    - Total Active: 11 µJ per inference.
    - Sleep Energy: 33 µW * 57 ms = 1.9 µJ.
    - Total per Cycle: 12.9 µJ.
    - Annual Energy: 157.7M cycles * 12.9 µJ = 2.03 kJ = 0.565 Wh.
    - Battery Target: 0.565 Wh / 3.3V = 171 mAh.
    
    **Conclusion & Interpretation:**
    - **Result: Power-Bound Sizing (Power-Bound)**. A 205 mAh cell (with 20% margin) is required, highlighting that memory access energy nearly equals compute energy.
