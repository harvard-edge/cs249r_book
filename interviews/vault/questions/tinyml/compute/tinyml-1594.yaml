title: MCU Audio Compute Bounding
scenario: Evaluating a proposed keyword spotting CNN against an RNN for a hearing aid chip running a Cortex-M4 at 80 MHz.
question: For the hearing-aid Cortex-M4, how would you compare the CNN and RNN keyword-spotters by total MACs, cycles, and CPU utilization over one 1-second audio window?
details:
  realistic_solution: The framework must calculate total MACs over the same 1-second audio window for both candidates. For the CNN, sum filter_w * filter_h * in_channels * out_channels * out_w * out_h across all convolution layers, plus any dense layers. For the RNN, compute input-to-hidden and hidden-to-hidden MACs per timestep, roughly hidden_size * input_size + hidden_size^2 per recurrent layer, then multiply by the number of feature timesteps in the 1-second window. Convert each model's total MACs to cycles using the assumed cycles/MAC and add memory-access overhead. Given the 80 MHz clock, the absolute lower bound is 80 million 1-cycle MACs per second, so a 10M-MAC CNN consumes at least 12.5% of the 1-second CPU budget before overhead. The RNN is compared by applying the same cycle budget to its timestep-expanded MAC total.
  common_mistake: |
    **The Pitfall:** Ignoring SRAM memory access overhead.
    **The Rationale:** Engineers rely purely on theoretical MAC operations per cycle (e.g., 1 cycle/MAC) without factoring in the latency of loading inputs and weights.
    **The Consequence:** The actual cycle count is significantly underestimated, leading to models that exceed latency budgets and drain power faster than predicted.
  napkin_math: |
    **Assumptions & Constraints:**
    - Clock Speed: 80 MHz.
    - Window duration: 1 second, so available cycles = 80,000,000.
    - CNN example compute: 10 million MACs.
    - RNN compute must be expanded over all feature timesteps in the same 1-second window.

    **Calculations:**
    - CNN MACs = sum over layers of filter_w * filter_h * in_channels * out_channels * out_w * out_h.
    - RNN MACs = timesteps * (hidden_size * input_size + hidden_size^2) per recurrent layer, plus output layers.
    - Theoretical CPU utilization = total MACs * cycles_per_MAC / 80,000,000.
    - CNN lower bound with 1 cycle/MAC = 10,000,000 / 80,000,000 = 12.5%.

    **Conclusion & Interpretation:**
    - **Result: Window-Normalized Compute Comparison (Compute-Bound)**. Both models must be reduced to total cycles per 1-second window; the CNN example requires at least 12.5% CPU utilization, and the RNN is acceptable only if its timestep-expanded cycle estimate fits the same 80M-cycle budget with memory overhead included.
