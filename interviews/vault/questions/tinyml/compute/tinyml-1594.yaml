title: MCU Audio Compute Bounding
scenario: Evaluating a proposed keyword spotting CNN against an RNN for a hearing aid chip running a Cortex-M4 at 80 MHz.
question: How can a theoretical framework be formulated to estimate and compare the total MAC operations and cycle counts per 1-second audio window for both models?
details:
  realistic_solution: The framework must calculate total MACs by summing (filter_w * filter_h * in_channels * out_channels * out_w * out_h) for CNNs and (hidden_size * input_size + hidden_size^2) for RNNs per timestep. Given the 80 MHz clock, the theoretical maximum is 80 million MACs per second. The CNN taking 10M MACs will use at least 12.5% of the CPU, assuming perfect 1-cycle MAC instructions.
  common_mistake: |
    **The Pitfall:** Ignoring SRAM memory access overhead.
    **The Rationale:** Engineers rely purely on theoretical MAC operations per cycle (e.g., 1 cycle/MAC) without factoring in the latency of loading inputs and weights.
    **The Consequence:** The actual cycle count is significantly underestimated, leading to models that exceed latency budgets and drain power faster than predicted.
  napkin_math: |
    **Assumptions & Constraints:**
    - Clock Speed: 80 MHz.
    - CNN Compute: 10 million MACs.
    
    **Calculations:**
    - Compute Capacity: 80,000,000 cycles per second.
    - Theoretical Max MACs: 80 million MACs per second (assuming 1 cycle/MAC).
    - CPU Utilization: 10,000,000 / 80,000,000 = 12.5%.
    
    **Conclusion & Interpretation:**
    - **Result: Compute-Bound Estimation (Compute-Bound)**. The CNN requires at least 12.5% CPU utilization, before factoring in significant SRAM memory access overhead.
