title: Cortex-M4 Brownout Resets During Convolution Current Bursts
scenario: During the heaviest convolution layer of an anomaly detection model, the Cortex-M4 microcontroller randomly resets. The software logic has been heavily tested and proves flawless.
question: Why can the heaviest convolution layer cause random Cortex-M4 resets even when the software logic is correct?
details:
  realistic_solution: The system is experiencing a brownout reset during the peak compute burst. The heaviest convolution layer raises total MCU current because the core, buses, SRAM, flash interface, and clock tree are active at high utilization. If the regulator, board traces, or local decoupling cannot supply that transient quickly enough, Vdd can dip below the MCU's brownout threshold even though the software is correct. Fix by checking the power rail with a scope, improving local bulk and high-frequency decoupling, reducing supply impedance, lowering clock speed, or spreading the workload.
  common_mistake: |
    **The Pitfall:** Blaming memory leaks or software bugs for hardware resets.
    **The Rationale:** Candidates overlook power delivery network constraints and fail to analyze peak MCU current during dense compute bursts.
    **The Consequence:** Wasting time debugging flawless software while the hardware repeatedly browns out under peak ML load.
  napkin_math: |
    **Assumptions & Constraints:**
    - Normal MCU active current: 50 mA.
    - Extra transient current during heavy MAC operations: up to 150 mA for a short interval.
    - Vdd = 3.3V, Brownout threshold = 2.7V.
    - Local high-frequency decoupling capacitor considered for the first microsecond: 100 nF.

    **Calculations:**
    - Local droop estimate: dV = I * dt / C.
    - If the regulator and bulk capacitance do not respond for the first 1 µs, dV = (0.150 A * 1e-6 s) / 100e-9 F = 1.5 V on that local decoupler.
    - A 1.5 V transient droop from a 3.3 V rail would momentarily pull the local rail toward 1.8 V, below the 2.7 V brownout threshold.
    - In a real board, the regulator, bulk capacitors, trace inductance, and ESR share the transient; the calculation shows why 100 nF alone is not enough for this burst.

    **Conclusion & Interpretation:**
    - **Result: Potential 1.5 V local transient droop (Power-Delivery-Bound).** The heavy compute burst can pull the local rail below the brownout threshold before the power delivery network recovers, causing a hardware reset.
