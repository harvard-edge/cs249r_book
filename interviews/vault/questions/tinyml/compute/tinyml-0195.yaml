title: The Microcontroller Ridge Point
scenario: You're profiling a keyword-spotting model on a Cortex-M4 microcontroller. To understand its performance limits, you need to know the fundamental hardware characteristics.
question: What is the approximate 'ridge point' for a Cortex-M4, and what does its value imply about where performance bottlenecks are likely to occur?
details:
  realistic_solution: The ridge point of a Cortex-M4 is extremely low, approximately 0.2 to 0.5 Ops/Byte. This indicates that the device has relatively high memory bandwidth compared to its limited computational power. As a result, almost any neural network operation (even a simple convolution) will have an arithmetic intensity greater than 0.2. This makes the vast majority of TinyML models **compute-bound**, not memory-bound. The performance bottleneck is the CPU's ability to perform calculations, not its ability to fetch data from SRAM.
  common_mistake: |
    **The Pitfall:** Assuming all hardware systems are memory-bound.
    **The Rationale:** Engineers accustomed to GPU development (where ridge points exceed 200 Ops/Byte) incorrectly apply datacenter intuitions to microcontrollers.
    **The Consequence:** Wasting time compressing weights and activations for memory bandwidth when the CPU pipeline is actually the choking point.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4 memory bandwidth vs compute throughput.

    **Calculations:**
    - Ridge point = Peak Compute / Peak Memory Bandwidth. For M4, this is roughly 0.2 to 0.5 Ops/Byte. Standard NN layers have intensities > 1.0 Ops/Byte.

    **Conclusion & Interpretation:**
    - **Result: 0.2 to 0.5 Ops/Byte (Compute-Bound Architecture)**.
  options:
  - ~300 Ops/Byte, meaning most models are memory-bound.
  - ~0.2 Ops/Byte, meaning most models are memory-bound.
  - ~0.2 Ops/Byte, meaning most models are compute-bound.
  - ~20 Ops/Byte, meaning models are well-balanced between compute and memory.
