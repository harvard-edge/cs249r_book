title: Cycle-Accurate Execution Cost Model for 1D Convolutions
scenario: An engineer is designing an ultra-low-power fall-detection algorithm using a single-axis accelerometer feeding a bare-metal Cortex-M4 at 80 MHz. The first layer is a 1D convolution with output length L_out=100, kernel K=3, input channels C_in=16, single output channel. Inputs are INT16 (Q15). The Cortex-M4 supports SMLAD (signed dual MAC, 1 cycle, 2 INT16 MACs per cycle), LDM (multi-register load, 1 + n cycles for n words), and has 13 general-purpose registers (R0-R12) of which 3 are reserved for kernel-pointer, output-pointer, and loop counter, leaving 10 GPRs for live values.
question: Design an explicit cycle-accurate cost model for this 1D convolution and quantify the gap versus a naive 1.2x MAC heuristic.
details:
  realistic_solution: 'Cost model per output, accounting for inputs, weights, spill, MAC, and store. Per-output operand counts: input window = K * C_in = 3 * 16 = 48 INT16 halfwords = 24 32-bit words; kernel weights = K * C_in = 48 halfwords = 24 words (the kernel is reloaded per output because the full kernel does not fit in the 10 available GPRs). T_load_input = 4 LDM bursts of 6 words = 4 * (1 + 6) = 28 cycles. T_load_weights = same shape = 28 cycles. SMLAD performs 2 INT16 MACs per cycle; per-output MAC count = K * C_in = 48; T_MAC = 48 / 2 = 24 cycles. Register spill: at any moment 12 packed-pair registers'' worth of operands (6 input pairs + 6 weight pairs processed per burst) compete for the 10 available GPRs, plus 2 more for accumulator and address scratch, so we must spill 4 packed-pair registers to the stack. With STM/LDM bursts on Cortex-M4 (1 + n cycles for n words), spilling 4 words via STM = 1 + 4 = 5 cycles and reloading via LDM = 1 + 4 = 5 cycles, plus address-update penalty makes T_spill 12 cycles per output. T_store = 1 STR = 1 cycle. T_padding = 0 for interior outputs. T_interior = 28 + 28 + 24 + 12 + 1 = 93 cycles per output. Boundary outputs (positions 0 and L_out-1, 2 outputs total) add a 6-cycle padding-check sequence (CMP + B + zero-load) -> T_boundary = 93 + 6 = 99 cycles. Total = 98 * 93 + 2 * 99 = 9114 + 198 = 9312 cycles. Outer-loop and function-prologue overhead adds ~200 cycles -> T_total ~= 9512 cycles. At 80 MHz this layer executes in 118.9 us. The naive 1.2x heuristic predicts 4800 * 1.2 = 5760 cycles - a 39% under-estimate vs the cycle-accurate 9512 - because the heuristic silently absorbs the weight-load cost (28 cycles/output, ~32% of the real budget) into a single fudge factor that is calibrated for kernel-resident shapes. The model and the heuristic agree only when C_in is small enough to fit kernel + inputs in registers; for C_in >= 16 the heuristic must be re-tuned per shape.'
  common_mistake: |
    **The Pitfall:** Treating cycles_per_MAC as a fixed scalar (e.g., 1.2) without decomposing into load, spill, MAC, and pad terms.
    **The Rationale:** The heuristic hides the fact that large kernels force per-output weight reloads, and high channel counts force register spilling.
    **The Consequence:** Severe underestimation of execution time, leading to missed deadlines and failed real-time constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Cortex-M4 at 80 MHz, SMLAD (2 MACs/cycle).
    - Operands per output: K (3) * C_in (16) = 48 INT16 halfwords = 24 words for inputs + 24 words for weights.
    - Total outputs: 100 (98 interior, 2 boundary).

    **Calculations:**
    - Cycles per output (Interior): T_load_input (28) + T_load_weights (28) + T_MAC (24) + T_spill (12) + T_store (1) = 93 cycles.
    - Cycles per output (Boundary): 93 + 6 (padding check) = 99 cycles.
    - Total Accurate Cycles: (98 * 93) + (2 * 99) + 200 (loop overhead) = 9,512 cycles.
    - Time at 80 MHz: 9,512 cycles / 80 MHz = 118.9 µs.
    - Naive Heuristic: 4,800 MACs * 1.2 = 5,760 cycles (39% underestimate).

    **Conclusion & Interpretation:**
    - **Result: 9,512 cycles vs 5,760 cycles (Compute/Memory-Bound)**. Treating cycles_per_MAC as a fixed scalar without decomposing into load, spill, and MAC severely underestimates execution time.
