title: Scalar Cortex-M4 Versus CMSIS-NN Latency
scenario: You're running a keyword spotting model (6M INT8 MACs). The baseline target is a 168 MHz scalar Cortex-M4 with no SIMD/DSP extensions, so the compiler emits ordinary load, multiply, accumulate, and loop-control instructions. You are comparing it with the same 168 MHz class Cortex-M4F using CMSIS-NN kernels that can use the DSP extension.
question: How long should a 6M-MAC DS-CNN take on a 168 MHz scalar Cortex-M4 versus CMSIS-NN on Cortex-M4F?
details:
  realistic_solution: For the scalar Cortex-M4, a useful INT8 MAC is not just one multiply instruction; it also needs loads, accumulation, pointer updates, and loop control. A simple estimate of about 5 cycles per useful MAC gives 6M * 5 / 168 MHz = 179 ms. On a Cortex-M4F using CMSIS-NN and the DSP extension, optimized kernels can pack arithmetic and reduce loop overhead; using a conservative sustained estimate of about 1 useful MAC per cycle gives 6M / 168 MHz = 36 ms. The scoped comparison is therefore roughly 179 ms scalar versus 36 ms with CMSIS-NN on M4F, about a 5x speedup.
  common_mistake: |
    **The Pitfall:** Assuming 1 MAC per cycle on a base Cortex-M4.
    **The Rationale:** Engineers read the "1 cycle multiplier" spec and assume every MAC operation in their network will take exactly one cycle.
    **The Consequence:** This ignores that a scalar MAC requires multiple instructions: load operand A, load operand B, multiply, accumulate, increment pointers, and check the loop counter, leading to a massive underestimation of latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Compute: 6M INT8 MACs.
    - Scalar Cortex-M4: 168 MHz, ~5 cycles per useful MAC for load/MUL/accumulate/pointer/loop overhead.
    - CMSIS-NN Cortex-M4F: 168 MHz, ~1 useful MAC per cycle sustained in optimized DSP kernels.

    **Calculations:**
    - Scalar Latency: 6,000,000 MACs * 5 cycles/MAC / 168,000,000 cycles/s = 0.179 s (~179 ms).
    - CMSIS-NN M4F Latency: 6,000,000 MACs / 168,000,000 MAC/s = 0.0357 s (~36 ms).
    - Speedup: 179 ms / 36 ms = ~5.0x.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound.** The scalar M4 estimate is about 179 ms, while CMSIS-NN on the M4F is about 36 ms under the stated assumptions.
