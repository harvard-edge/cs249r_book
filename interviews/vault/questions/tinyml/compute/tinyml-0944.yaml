title: Specify Transformer Architecture for Sub-1mW Inference on MCU
scenario: You must specify a transformer architecture for continuous gesture recognition on a microcontroller in low-power mode with a 0.5mW active power budget and 10μA/MHz dynamic power. The task requires processing 16-token sequences of 16-channel IMU features at 10 Hz.
question: How would you specify the number of layers, heads, embedding dimension, FFN ratio, and quantization precision to fit the 0.5mW power budget with >90% accuracy?
details:
  realistic_solution: 'Determine the maximum frequency allowable by the power budget: 0.5mW / 3.3V = ~0.15mA. At 10µA/MHz, max frequency is 15-16 MHz. At 16MHz, a Cortex-M4 achieves ~32 MFLOP/s. With a 10Hz inference rate (100ms budget), the max FLOPs per inference is 3.2M FLOPs. A 4-layer, 2-head, 32-dim, FFN 2x model in INT8 requires roughly 984K FLOPs, fitting well within the 3.2M budget while providing sufficient capacity for >90% accuracy on HCI gesture tasks.'
  common_mistake: |
    **The Pitfall:** Starting with a large architecture and attempting to prune down.
    **The Rationale:** Candidates approach the problem from an accuracy-first mindset rather than a power-budget-first derivation.
    **The Consequence:** The resulting model invariably exceeds the strict physical power constraints of the MCU.
  napkin_math: |
    **Assumptions & Constraints:**
    - Power constraint: 0.5mW @ 3.3V.
    - Dynamic power: 10µA/MHz.
    - Inference rate: 10 Hz (0.1s budget).

    **Calculations:**
    - Max Current = 0.5mW / 3.3V = 0.151mA = 151µA.
    - Max Frequency = 151µA / 10µA/MHz = 15.1 MHz (use 16 MHz for standard clock).
    - FLOPs budget: Cortex-M4 at 16MHz -> ~32 MFLOP/s * 0.1s = 3.2M FLOPs max.
    - Per-layer FLOPs (1 Layer, 2 Heads, 32 Dim, seq=16): Attention=16K; QKV=98K; FFN (2x)=131K -> Total ~246K FLOPs.
    - 4 layers -> 4 * 246K = 984K FLOPs.

    **Conclusion & Interpretation:**
    - **Result: 984K FLOPs (Power-Bound)**. 4 layers with INT8 quantization fits within the 3.2M FLOPs power budget.
