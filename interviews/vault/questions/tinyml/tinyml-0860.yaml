title: 'Latency Decomposition: Compute Per-Layer Latency Budget for MCU CNN'
scenario: 'A 4-layer depthwise-separable CNN for anomaly detection (total 2.1 MOPs, INT8) runs on a Cortex-M4 at 168MHz. Layer breakdown: Conv1 (0.8M ops), DW-Conv2 (0.3M ops), PW-Conv3 (0.9M ops), FC4 (0.1M ops). Assume 1 MAC/cycle with DSP extensions.'
question: Which layer bottlenecks a 2.1 MOP depthwise-separable CNN on a 168 MHz Cortex-M4 at 1 MAC/cycle?
details:
  realistic_solution: 'At 1 MAC/cycle, 168MHz: Conv1: 0.8M/168M = 4.8ms. DW-Conv2: 0.3M/168M = 1.8ms (but poor data reuse, cache misses add ~50%: 2.7ms). PW-Conv3: 0.9M/168M = 5.4ms (regular pattern, good reuse). FC4: 0.1M/168M = 0.6ms. Total: 14.5ms. Bottleneck: PW-Conv3 by compute, DW-Conv2 by efficiency.'
  common_mistake: |
    **The Pitfall:** Treating all convolution types equally and assuming execution time scales perfectly linearly with raw MOP counts.
    **The Rationale:** Candidates calculate latency purely by dividing operations by clock speed, ignoring the severe lack of data reuse in depthwise operations.
    **The Consequence:** The estimated execution latency for depthwise layers is highly optimistic, leading to unexpected pipeline stalls during actual hardware deployment.
  napkin_math: |
    1. **Assumptions & Constraints:** Cortex-M4 at 168 MHz. Throughput = 1 MAC/cycle. Total Ops = 2.1M. Depthwise convolutions suffer a ~50% cache miss penalty due to lack of channel-wise data reuse.
    2. **Calculations:** Conv1: 0.8M / 168M = 4.76 ms. PW-Conv3: 0.9M / 168M = 5.36 ms (Bottleneck by raw compute). FC4: 0.1M / 168M = 0.60 ms. DW-Conv2 (Ideal): 0.3M / 168M = 1.79 ms. DW-Conv2 (Actual with 50% penalty): 1.79 ms * 1.5 = 2.68 ms.
    3. **Conclusion & Interpretation:** **Result: PW-Conv3 (Compute) and DW-Conv2 (Efficiency).** Pointwise Conv3 dominates absolute latency (5.36ms) purely due to operation volume. However, Depthwise Conv2 is the bottleneck regarding hardware efficiency, suffering massive penalties from cache thrashing.
