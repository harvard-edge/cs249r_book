title: 'Latency Decomposition: Compute Per-Layer Latency Budget for MCU CNN'
scenario: 'A 4-layer depthwise-separable CNN for anomaly detection (total 2.1 MOPs, INT8) runs on a Cortex-M4 at 168MHz. Layer breakdown: Conv1 (0.8M ops), DW-Conv2 (0.3M ops), PW-Conv3 (0.9M ops), FC4 (0.1M ops). Assume 1 MAC/cycle with DSP extensions.'
question: Which layer bottlenecks a 2.1 MOP depthwise-separable CNN on a 168 MHz Cortex-M4 at 1 MAC/cycle?
details:
  realistic_solution: 'At 1 MAC/cycle, 168MHz: Conv1: 0.8M/168M = 4.8ms. DW-Conv2: 0.3M/168M = 1.8ms (but poor data reuse, cache misses add ~50%: 2.7ms). PW-Conv3: 0.9M/168M = 5.4ms (regular pattern, good reuse). FC4: 0.1M/168M = 0.6ms. Total: 14.5ms. Bottleneck: PW-Conv3 by compute, DW-Conv2 by efficiency.'
  common_mistake: |
    **The Pitfall:** Treating all layers equally without considering data reuse.
    **The Rationale:** Candidates ignore the fact that depthwise convolutions have poor data reuse and incur cache penalties.
    **The Consequence:** The estimated latency for depthwise layers is overly optimistic.
  napkin_math: |
    - Conv1: 0.8M / 168M = 4.76 ms.
    - DW-Conv2: 0.3M / 168M = 1.79 ms * 1.5 (cache penalty) = 2.68 ms.
    - PW-Conv3: 0.9M / 168M = 5.36 ms.
    - FC4: 0.1M / 168M = 0.60 ms.
    - **Total execution is ~13.4 ms. PW-Conv3 is the bottleneck by raw compute, while DW-Conv2 is the bottleneck by efficiency.**
