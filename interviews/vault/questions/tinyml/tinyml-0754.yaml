title: TFLite Micro vs TVM vs Custom Compiler
scenario: >
  Your team is choosing the inference runtime for a new TinyML product line targeting Cortex-M4 and RISC-V MCUs.
  The candidates are TFLite Micro, Apache TVM (microTVM), and a custom ahead-of-time compiler.
question: 'How would you compare them across five dimensions: code size, inference speed, memory efficiency, portability, and engineering effort?'
details:
  realistic_solution: |
    **TFLite Micro:**
    - Code size: ~50-100 KB. Selective kernel linking.
    - Inference speed: Baseline. Kernel execution is optimized (e.g., CMSIS-NN), but interpreter dispatch adds overhead (~10-20 cycles/op).
    - Memory: Statically allocated arena, but dynamic placement computation at runtime (~100ms load time).
    - Portability: Excellent, supports many architectures.
    - Effort: Low, industry standard.
    **Apache TVM (microTVM):**
    - Code size: ~35 KB (smaller than TFLM due to AOT compilation).
    - Inference speed: ~20-30% faster than TFLM by eliminating dispatch overhead and fusing operators.
    - Memory: Highly efficient AOT memory planning, smaller arena.
    - Portability: Good, but requires target-specific tuning.
    - Effort: Medium, requires TVM compiler knowledge.
    **Custom AOT Compiler:**
    - Code size: Minimal (~10-15 KB), bare-metal C code.
    - Inference speed: Fastest (up to 40% faster than TFLM), perfectly tuned loops.
    - Memory: Absolute minimum, exact static buffers.
    - Portability: Poor, locked to specific MCU.
    - Effort: High, requires manual graph lowering and kernel writing.
  common_mistake: |
    **The Pitfall:** Assuming TFLite Micro is the universally best choice because it's the industry standard.
    **The Rationale:** Engineers often default to standard tools without evaluating AOT compilation benefits for extreme edge constraints.
    **The Consequence:** Wasted flash storage, increased latency, and potentially requiring a more expensive MCU.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target: 20-layer keyword spotting model.
       - Production scale: 1M units.
    2. **Calculations:**
       - TFLite Micro: 95 KB code, 60 KB arena.
       - microTVM: 35 KB code (-63%), 52 KB arena (-13%).
       - Code size savings with TVM: 60 KB.
       - Cost savings: $0.50 cheaper MCU per unit x 1M units = $500K.
    3. **Conclusion & Interpretation:** AOT compilation yields major footprint reduction. **Result: ROI-Positive Engineering Cost**.
