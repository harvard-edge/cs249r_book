title: The SRAM Arena Squeeze
scenario: 'You''re deploying a keyword spotting model to a Cortex-M4 microcontroller with 256KB of SRAM.
  You''ve analyzed the model in TensorFlow Lite for Microcontrollers and found the three largest consecutive
  tensors have the following sizes:

  - Input tensor (audio spectrogram): 40 KB

  - Intermediate feature tensor (after Conv1): 32 KB

  - Output tensor (after Conv2): 8 KB

  The memory planner requires both the input and output of a given operation to be resident in SRAM simultaneously,
  but reclaims memory from tensors no longer needed by any future operation. What is the minimum tensor
  arena size required?'
question: "What tensor-arena peak is required for 40 KB input, 32 KB Conv1, and 8 KB Conv2 tensors on a 256 KB Cortex-M4?"
details:
  realistic_solution: 'The correct approach is to calculate the memory required at each stage of inference
    and find the maximum. The peak usage occurs at the transition between the largest layers.

    1. **During Conv1:** The input tensor (40 KB) and intermediate tensor (32 KB) must both be live. Peak
    = 40 + 32 = 72 KB.

    2. **During Conv2:** The intermediate tensor (32 KB) and output tensor (8 KB) must both be live. The
    input tensor has been freed. Peak = 32 + 8 = 40 KB.

    The minimum tensor arena size is the maximum of these peaks: **72 KB**.'
  common_mistake: A common mistake is to sum the sizes of all tensors in the network (40 + 32 + 8 = 80
    KB). This is incorrect because the memory manager reclaims the memory from a tensor as soon as it's
    no longer needed to compute a subsequent one. We only need to find the peak concurrent memory usage,
    not the total.
  napkin_math: 'Cortex-M4, 256 KB SRAM. Tensor arena peak: Op 1 (Input to Conv1): input (40 KB) + output
    (32 KB) = 72 KB. Op 2 (Conv1 to Conv2): input freed, intermediate (32 KB) + output (8 KB) = 40 KB.
    High-water mark: max(72, 40) = 72 KB. Arena >= 72 KB. On 256 KB SRAM: 72 KB arena + 16 KB stack +
    8 KB RTOS + 20 KB app = 116 KB used, 140 KB free. Model weights in flash via XIP, 0 KB SRAM. Inference
    latency: Conv1 (40 KB * 32 filters * 9 kernel) = 11.5M MACs / 336 MMAC/s (M4 DSP) = 34 ms. Conv2:
    2.3M MACs / 336M = 7 ms. Total: 41 ms.'
  options:
  - 50 KB
  - 32 KB
  - 72 KB
  - 40 KB
  correct_index: 2
