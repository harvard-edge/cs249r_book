validation_issues:
- 'The ''Napkin Math'' contains latency calculation (e.g., ''Inference latency: Conv1 (40 KB * 32 filters
  * 9 kernel) = 11.5M MACs / 336 MMAC/s (M4 DSP) = 34 ms'') which is not asked for by the scenario and
  might distract from the core question about SRAM arena squeeze. While it adds context, it''s outside
  the direct scope of calculating the arena size.'
- 'The ''Napkin Math'' states ''Op 2 (Conv1 to Conv2): input freed, intermediate (32 KB) + output (8 KB)
  = 40 KB''. This step in Napkin Math seems to have a typo, as ''intermediate (32 KB)'' should refer to
  the intermediate feature tensor after Conv1. If the input (40KB) is freed, then the intermediate (32KB)
  would become the ''input'' to the next stage, and the output of the next stage is 8KB, so 32+8=40KB
  is correct for that stage''s peak.'
