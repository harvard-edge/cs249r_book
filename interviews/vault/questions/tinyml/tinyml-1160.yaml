title: Randomized Smoothing Latency on ESP32-S3
scenario: You are deploying a keyword spotting model on an ESP32-S3 (240 MHz dual-core, 512 KB SRAM, INT8 vector extensions). To defend against adversarial audio perturbations, you implement an input randomized smoothing defense. For every 1-second audio clip (16,000 INT16 samples), the system sequentially generates 5 noisy versions and runs the model on each. A single INT8 inference takes 18 ms. Generating and adding noise takes 15 CPU cycles per sample.
question: How much latency does a five-pass randomized smoothing defense add on ESP32-S3, and does it meet a 150 ms deadline?
details:
  realistic_solution: To quantify the latency impact of the randomized smoothing defense, calculate the time overhead of the noise injection step per pass using the MCU's clock frequency, add it to the base inference latency, and multiply by the total number of sequential passes.
  common_mistake: |
    **The Pitfall:** Forgetting to convert CPU cycles to milliseconds or forgetting to multiply by the number of smoothing passes.
    **The Rationale:** Candidates often incorrectly assume dual-core architectures will automatically parallelize the sequential smoothing pipeline without explicit threading, or they simply fail the unit conversion.
    **The Consequence:** Vastly underestimating the total execution time and falsely certifying that a system meets its real-time constraints.
  napkin_math: |
    - **Noise Cycles per Pass:** 16,000 samples * 15 cycles/sample = 240,000 cycles.
    - **Noise Time per Pass:** 240,000 cycles / 240,000,000 Hz (240 MHz) = 0.001 seconds (1 ms).
    - **Total Time per Pass:** 1 ms (noise) + 18 ms (INT8 inference) = 19 ms.
    - **Total Latency (5 Passes):** 5 * 19 ms = 95 ms.
    - **Conclusion:** **The 95 ms latency is well within the 150 ms deadline.**
