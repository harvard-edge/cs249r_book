title: Tinyml New 0012
scenario: An M4 device continuously runs audio inference. To avoid dropping frames, DMA writes audio to SRAM ping-pong buffers. However, when DMA is active, the CPU inference slows down unpredictably by 50%.
question: Why does DMA audio capture slow CPU inference by 50%, and how should SRAM banks be arranged?
details:
  realistic_solution: The symptom is caused by AHB bus matrix conflicts (SRAM bank conflicts). Both the DMA controller and the CPU are trying to access the exact same physical SRAM bank simultaneously. The bus arbiter stalls the CPU to let the DMA write, halving performance. The solution is to explicitly place the DMA ping-pong buffers in a separate physical SRAM bank from the neural network activation buffers.
  common_mistake: |
    **The Pitfall:** Treating the MCU's SRAM as one monolithic block.
    **The Rationale:** Developers lack knowledge of AHB bus matrix topologies, assuming memory mapping locations don't impact throughput.
    **The Consequence:** Unpredictable bus arbitration stalls that halve performance and destroy hard real-time latency deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - DMA writes and CPU reads target the exact same physical SRAM bank.
    2. **Calculations:**
       - Arbitration stall: Bus arbiter stalls CPU 1 cycle for every DMA access.
       - Compute penalty: A 10M cycle inference incurs up to 5M stall cycles.
    3. **Conclusion & Interpretation:**
       - **Result: Latency spikes by 50% due to wait states.**
