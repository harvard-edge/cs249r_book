title: The Saturated Microphone
scenario: You are deploying a keyword spotting model on a Cortex-M4 MCU with 256KB of SRAM. The model
  was quantized to full INT8 using a calibration dataset of speech at a normal volume. During field testing,
  you discover the model's accuracy is near zero, but only when the user is in a noisy environment (e.g.,
  a city street). Debugging reveals that the activation values in the first convolutional layer, which
  are typically in the `[-10, 10]` range for normal audio, are spiking to `[-90, 90]` in the noisy environment.
  Given your tight memory constraints, how do you solve this activation overflow?
details:
  realistic_solution: The root cause is that the quantization parameters (scale and zero-point) are not
    representative of the real-world audio. They were calculated using only quiet audio, so the scale
    factor is too small, causing loud audio activations to 'clip' or 'saturate' the INT8 range. The most
    effective first step is to re-run the quantization calibration process with a more diverse dataset
    that includes samples of noisy environments. This will compute a new, larger scale factor that can
    properly map the `[-90, 90]` range into the `[-128, 127]` INT8 space. This might slightly reduce precision
    for quiet sounds, but it will prevent catastrophic overflow for loud sounds, restoring model accuracy.
  common_mistake: Engineers often treat quantization as a magic bullet for performance without considering
    the data dependency. They either blame the model architecture or immediately jump to a higher-precision
    format like FP16, failing to realize this would double the model size and likely exceed the memory
    budget of a TinyML device. They forget that the calibration dataset must be representative of the
    full range of data the model will see in production.
  napkin_math: 'Calibration [-10,10]: scale=20/256=0.078. Noisy val 90: q=90/0.078=1154→clipped to 127.
    Dequant=9.9. Error: 89%. Fix: recalibrate [-90,90]: scale=180/256=0.703. Now 90→127=89.3 (<1% error).
    Tradeoff: quiet value 5→7 steps (was 64 steps). Precision drops 9x for quiet sounds but no catastrophic
    clipping.'
  options:
  - Add a clipping function before the first layer to cap activations at 10.0.
  - Recompile the model using FP16 precision for the first layer (mixed precision).
  - Re-run the quantization calibration with a dataset that includes noisy audio samples.
  - Increase the number of channels in the first convolutional layer to better capture features.
  correct_index: 2
