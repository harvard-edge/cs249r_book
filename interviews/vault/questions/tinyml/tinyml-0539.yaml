title: The Saturated Microphone
scenario: You are deploying a keyword spotting model on a Cortex-M4 MCU with 256KB of SRAM. The model was quantized to full INT8 using a calibration dataset of quiet speech. In noisy environments, the first convolutional layer's activations, normally in the [-10, 10] range, spike to [-90, 90], dropping accuracy to near zero.
question: "How do you fix INT8 activation saturation when noisy audio drives first-layer values from [-10,10] to [-90,90]?"
details:
  realistic_solution: The root cause is that the quantization parameters (scale and zero-point) are not representative of the real-world audio. They were calculated using only quiet audio, so the scale factor is too small, causing loud audio activations to 'clip' or 'saturate' the INT8 range. The most effective first step is to re-run the quantization calibration process with a more diverse dataset.
  common_mistake: |
    **The Pitfall:** Blaming the model architecture or jumping to higher-precision formats like FP16.
    **The Rationale:** Engineers treat quantization as a magic bullet and ignore the data dependency of the calibration dataset.
    **The Consequence:** They propose solutions that double the model size and exceed the memory budget instead of simply recalibrating.
  napkin_math: |
    1. Calculate original calibration scale ([-10, 10] mapped to 256 steps): 20 / 256 = 0.078.
    2. Evaluate noisy value 90 with original scale: 90 / 0.078 = 1154 (clips to max INT8 127). Dequantized = 127 * 0.078 = 9.9. (89% error).
    3. Calculate new calibration scale ([-90, 90]): 180 / 256 = 0.703.
    4. Evaluate noisy value 90 with new scale: 90 / 0.703 = 128 (fits INT8). Dequantized = 128 * 0.703 = 90. (<1% error).
    5. **Final Result: Recalibrating scale to 0.703 prevents catastrophic 89% error from clipping.**
  options:
  - Add a clipping function before the first layer to cap activations at 10.0.
  - Recompile the model using FP16 precision for the first layer (mixed precision).
  - Re-run the quantization calibration with a dataset that includes noisy audio samples.
  - Increase the number of channels in the first convolutional layer to better capture features.
  correct_index: 2
