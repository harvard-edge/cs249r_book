title: 'Responsible AI for Edge Safety: ESP32-S3 Anomaly Detection'
scenario: A team is developing a tinyML-powered anomaly detection system for critical industrial machinery using an ESP32-S3 microcontroller (240 MHz dual-core, 512 KB SRAM, 8 MB PSRAM). The system's primary function is to identify deviations that could lead to safety hazards.
question: How should model cards, impact assessments, red-teaming, and guardrails fit an ESP32-S3 safety-critical anomaly detector during the realization phase?
details:
  realistic_solution: For model cards, create a concise, machine-readable format storing essential metadata (e.g., model version, performance under constrained conditions, known limitations) accessible via a debug interface or remote logging. Conduct a focused impact assessment pre-deployment, identifying critical failure modes and their mitigations on-device. Implement lightweight, rules-based guardrails directly on the ESP32-S3 (e.g., confidence score thresholds, sensor plausibility checks) executed by one core, leaving the other for inference. Design a red-teaming strategy that involves hardware-in-the-loop simulation, injecting adversarial sensor data to test robustness and trigger guardrails.
  common_mistake: |
    **The Pitfall:** Blindly copying cloud-scale Responsible AI frameworks and trying to wedge them into the edge device.
    **The Rationale:** Engineers assume standard compliance checklists must be maintained verbatim regardless of hardware limits.
    **The Consequence:** The implementation relies on massive local databases or constant cloud streaming, exceeding the ESP32-S3 capabilities, destroying real-time performance, and making the system less reliable.
  napkin_math: |
    - ESP32-S3 SRAM: 512 KB.
    - On-device model card storage allocation: **~2 KB** for compressed critical metadata.
    - On-device guardrail memory impact: **5-15 KB** of code memory.
    - Guardrail latency: **10-50 microseconds** post-inference per safety check (negligible vs total inference time at 240 MHz).
    - Continuous logging: 100 bytes/event at 1 event/min = **144 KB/day**.
    - Conclusion: The footprint is negligible if strictly managed, but data must be aggressively rotated to avoid filling the 8 MB PSRAM.
