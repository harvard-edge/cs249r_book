title: TFLite Micro vs AOT Compilation on nRF5340
scenario: 'Your team is deploying an anomaly detection model on a Nordic nRF5340 MCU (128 MHz app core,
  64 MHz net core, 256 KB SRAM, 1 MB flash) with an active current budget of ~5mA. The data science team
  provided an ONNX model. You must evaluate two deployment alternatives for the 128 MHz app core: convert
  the ONNX model to TFLite and use the TFLite Micro (TFLM) interpreter, or use an Ahead-Of-Time (AOT)
  compiler (like MicroTVM) to generate static C code directly from the ONNX graph. Evaluate both alternatives
  regarding SRAM footprint, operator support, and runtime overhead, and determine the optimal path.'
question: "How would you evaluate both alternatives regarding SRAM footprint, operator support, and runtime overhead, and determine the optimal path?"
details:
  realistic_solution: A strong L5 candidate will advocate for the AOT compilation approach. They will
    point out that TFLM introduces a fixed SRAM overhead for the micro-interpreter and requires dynamic
    tensor arena allocation, which is risky on a 256 KB SRAM device. By AOT compiling, we strip out the
    interpreter, statically allocate memory, and potentially avoid ONNX-to-TFLite conversion bugs, saving
    crucial SRAM and CPU cycles (lowering active time and preserving the ~5mA budget).
  common_mistake: Candidates often blindly recommend TFLite Micro because it is the industry standard,
    ignoring the SRAM overhead of its interpreter and tensor arena. They also frequently miss the complexity
    of ONNX-to-TFLite operator translation gaps and fail to leverage the nRF5340's specific constraints
    to justify removing the interpreter layer.
  napkin_math: 'Total nRF5340 SRAM = 256 KB. Assume Zephyr RTOS + BLE 5.3 stack = 64 KB overhead, leaving
    192 KB for the app. Model weights (Flash) = 200 KB. Peak model activations (SRAM) = 140 KB. Alternative
    A (TFLM): Activations (140 KB) + TFLM engine overhead (~30 KB) = 170 KB SRAM used. Remaining app SRAM
    = 192 - 170 = 22 KB (dangerously tight). Alternative B (AOT): Activations (140 KB) + Engine overhead
    (~0 KB) = 140 KB SRAM used. Remaining app SRAM = 192 - 140 = 52 KB (safe margin).'
