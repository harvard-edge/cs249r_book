title: Dual-Core Memory Allocation for Keyword Spotting
scenario: You are designing the memory hierarchy for a keyword spotting application running on an ARM
  Cortex-M7 + Ethos-U55 (Corstone-300) system. The system features a 480 MHz Cortex-M7, 512 KB of shared
  SRAM, and an Ethos-U55 NPU capable of up to 512 MACs/cycle. You need to partition the 512 KB SRAM between
  the M7 (which handles audio feature extraction via MFCCs) and the U55 (which runs the neural network
  inference). Evaluate the trade-offs of different memory allocation strategies considering the shared
  SRAM constraint.
details:
  realistic_solution: A robust design uses dynamic memory management or carefully orchestrates a ping-pong
    buffer system. Since the M7 and U55 share the 512 KB SRAM, the optimal approach is to overlap M7 feature
    extraction (writing to Buffer A) with U55 inference (reading from Buffer B). The design must also
    evaluate whether weights should be executed in place from flash (saving SRAM but hurting latency)
    or paged into SRAM dynamically.
  common_mistake: Candidates often assume static partitioning is sufficient, allocating fixed chunks to
    the CPU and NPU without considering the temporal nature of the pipeline. They may also neglect the
    overhead of moving data between external flash and the SRAM if the model weights exceed the available
    SRAM budget.
  napkin_math: Assuming the U55 runs at 256 MACs/cycle on a 480 MHz clock, peak throughput is 122.8 GMAC/s.
    If a layer requires 200 KB of weights and 100 KB of activations, and the M7 needs 150 KB for MFCC
    buffers, total active memory is 450 KB, fitting within the 512 KB SRAM. However, ping-ponging the
    100 KB activations requires 200 KB, bringing total SRAM usage to 550 KB, exceeding the limit and requiring
    a redesign of the buffering strategy or layer splitting.
