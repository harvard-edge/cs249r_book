title: 'Optimizing a TinyML Model for Cortex-M7 with Ethos-U55: Graph Compilation Strategy'
scenario: You are tasked with deploying a pre-trained convolutional neural network (CNN) for keyword spotting
  onto an Arm Cortex-M7 microcontroller (480 MHz) paired with an Ethos-U55 NPU (configurable from 128
  to 512 MAC/cycle). The Cortex-M7 has 512 KB of SRAM. The model, originally trained in TensorFlow, has
  several custom operators and a total size that marginally exceeds available flash memory if not aggressively
  optimized. Your goal is to achieve real-time inference (target latency < 100ms) with minimal power consumption.
details:
  realistic_solution: "A realistic solution involves a multi-stage graph compilation and optimization\
    \ strategy. First, use an AOT compiler toolchain (e.g., Vela for Ethos-U55, or a custom toolchain\
    \ integrating a framework like TVM or Apache Glow). This involves: \n1. **Operator Lowering:** Map\
    \ high-level TensorFlow operations to the native instruction sets of the Cortex-M7 and Ethos-U55.\
    \ Custom operators must be identified and either re-implemented using compatible primitives or provided\
    \ with highly optimized Ethos-U55/Cortex-M7 kernels.\n2. **Graph Partitioning:** Intelligently partition\
    \ the computational graph, identifying subgraphs best suited for the Ethos-U55 (e.g., convolutions,\
    \ matrix multiplications) and those for the Cortex-M7 (e.g., activation functions, custom control\
    \ flow).\n3. **Constant Folding & Dead Code Elimination:** Perform aggressive AOT optimizations to\
    \ reduce graph complexity, memory footprint, and redundant computations.\n4. **Memory Optimization:**\
    \ Analyze dataflow to minimize intermediate buffer allocations and optimize tensor placement within\
    \ the 512 KB SRAM, considering Ethos-U55's specific memory access patterns.\n5. **Quantization-Aware\
    \ Training/Post-Training Quantization:** Ensure the model is quantized to 8-bit integers, which is\
    \ highly optimized for the Ethos-U55, and that the compilation process correctly handles de/requantization\
    \ nodes.\n6. **Framework Compiler Integration (if necessary):** If existing tools aren't sufficient,\
    \ leveraging a framework like TVM to define custom lowering passes and target-specific optimizations\
    \ for the Ethos-U55 and Cortex-M7 can provide fine-grained control."
  common_mistake: A common mistake is to rely solely on default TensorFlow Lite for Microcontrollers (TFLu)
    conversion without understanding the underlying graph compilation process. This often leads to inefficient
    operator mapping, sub-optimal memory utilization, and missed opportunities for ahead-of-time (AOT)
    optimizations like constant folding and aggressive operator fusion tailored specifically for the Ethos-U55's
    architecture. Forgetting that certain complex operations might be better offloaded to the Ethos-U55
    while simpler, element-wise operations might be more efficient on the Cortex-M7 can also lead to poor
    performance.
  napkin_math: Given a target latency of < 100ms and a Cortex-M7 at 480 MHz, we have approximately 48
    million cycles available for the entire inference. If the model has, say, 10 million MAC operations,
    and the Ethos-U55 is configured for 512 MAC/cycle, ideally it could process these in 10,000,000 /
    512 ≈ 19,531 cycles, which is extremely fast. However, real-world performance is bottlenecked by data
    movement (memory bandwidth), control logic, and non-MAC operations on the Cortex-M7. For the 512 KB
    SRAM, if an intermediate tensor is 32x32x64 (e.g., a feature map), and each element is 1 byte (for
    INT8), it consumes 65,536 bytes. A few such large tensors can quickly fill the SRAM. Therefore, memory
    optimization is critical, potentially requiring activation recomputation or on-the-fly decompression
    if the model truly exceeds the 512 KB SRAM budget.
