title: nRF5340 TinyML Anomaly Detection Data Curation Pipeline
scenario: You are designing an always-on anomaly detection system for industrial equipment using a tinyML model running on a Nordic nRF5340 microcontroller (128 MHz CPU, 256 KB SRAM, 1 MB flash). The sensor data streams at 100 Hz, with 16 bytes per sample. You need to collect a labeled dataset to train this model while respecting the nRF5340's operational constraints and limited storage.
question: How should an nRF5340 data curation pipeline select, annotate, and transfer high-value anomaly samples under 256 KB SRAM?
details:
  realistic_solution: Implement an active learning pipeline where the nRF5340 performs very lightweight on-device inference or feature extraction (e.g., simple statistical aggregates, thresholding on raw sensor data, or a highly compressed anomaly score) to identify 'uncertain' or 'novel' data samples. These selected samples are then prioritized for off-device transfer (via BLE with minimal metadata to conserve bandwidth) and human annotation. Develop clear annotation guidelines and enforce inter-annotator agreement checks using metrics like Kappa. For data selection, prioritize samples that are critical for edge cases or model improvements rather than bulk collection, and regularly analyze the labeled dataset for biases using performance metrics across different operational states.
  common_mistake: |
    **The Pitfall:** Failing to account for the severe memory constraints during data selection.
    **The Rationale:** Candidates often design cloud-centric active learning loops that assume abundant storage for raw data buffers, ignoring that storing even one minute of data consumes significant SRAM.
    **The Consequence:** The device runs out of memory, crashes, or generates too much data for BLE transfer, breaking the curation pipeline.
  napkin_math: |
    - **Data Rate:** 100 Hz * 16 bytes/sample = 1.6 KB/s.
    - **Raw Data Volume:** 1.6 KB/s * 60 s = 96 KB per minute (consumes ~37.5% of 256 KB SRAM).
    - **Daily Volume:** 1.6 KB/s * 86,400 s = 138,240 KB ≈ 138 MB/day (exceeds 1 MB flash).
    - **Active Learning Filter (0.1%):** 138 MB * 0.001 ≈ 138 KB/day.
    - **Conclusion:** **On-device filtering is mandatory; selecting 0.1% of data reduces daily transfer to a manageable ~138 KB.**
