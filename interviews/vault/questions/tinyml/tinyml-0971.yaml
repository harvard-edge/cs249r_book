title: OTA Rollback due to Shared SRAM Exhaustion
scenario: A Corstone-300 system uses an A/B partition scheme for OTA firmware updates. The platform has exactly 512 KB of shared SRAM between the M7 and U55. The baseline firmware requires 200 KB of SRAM for the RTOS, TLS network stack, and OTA agent to connect to the cloud and acknowledge updates. A new OTA payload is downloaded containing an updated vision model requiring a 320 KB tensor arena. Upon rebooting into the new partition, the device successfully verifies the firmware signature and begins booting, but triggers a watchdog reset during system initialization, causing an automatic rollback to the previous partition.
question: Why does a Corstone-300 OTA rollback after boot when a 320 KB tensor arena and 200 KB network stack share 512 KB SRAM?
details:
  realistic_solution: The rollback occurs due to an Out-Of-Memory (OOM) or HardFault during the initialization phase. Because the Ethos-U55 NPU and Cortex-M7 share the unified 512 KB SRAM pool, allocating the newly sized 320 KB tensor arena concurrently with the 200 KB needed by the RTOS and network stack exceeds the physical memory limit. The system crashes before it can successfully send the OTA acknowledgment over the network, which lets the watchdog timer expire and safely revert the device to the working firmware partition.
  common_mistake: |
    **The Pitfall:** Assuming the failure is related to Flash memory constraints, a corrupted OTA payload, or an invalid firmware signature.
    **The Rationale:** Frequently failing to analyze the runtime memory requirements and overlooking the architectural detail that the M7 and Ethos-U55 share the exact same physical SRAM pool.
    **The Consequence:** Misdiagnosing an Out-Of-Memory (OOM) crash during system initialization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total shared SRAM: 512 KB.
    - SRAM required by RTOS/Network: 200 KB.
    - SRAM required by Tensor Arena: 320 KB.

    **Calculations:**
    - Total peak SRAM required during boot = 200 KB + 320 KB = 520 KB.
    - Deficit = 520 KB - 512 KB = 8 KB.

    **Conclusion & Interpretation:**
    - **Result: 8 KB deficit (Memory-Bound)**. The 8 KB memory deficit causes an Out-Of-Memory crash during boot before the OTA acknowledgment can be sent.
