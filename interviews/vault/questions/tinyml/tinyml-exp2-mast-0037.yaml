title: Asymmetric Dual-Model Degradation on ESP32-S3
scenario: You are designing an always-on acoustic anomaly detection system for an industrial sensor using
  an ESP32-S3. Under normal conditions, the system runs a highly accurate 3 MB INT8 CNN streamed from
  the 8 MB PSRAM to classify specific machinery faults. However, when the device's battery drops below
  10% or the PSRAM interface experiences thermal throttling in the factory environment, the system must
  shed power and memory bandwidth while maintaining fail-operational status. Design a graceful degradation
  architecture that instantly transitions the system to a low-power state utilizing only the 512 KB internal
  SRAM and a single 240 MHz Xtensa core without missing acoustic events.
question: "How should ESP32-S3 degrade from a PSRAM-streamed CNN to an SRAM-resident anomaly model under low battery or PSRAM throttling?"
details:
  realistic_solution: Design an architecture where a tiny, sub-100 KB temporal convolutional network (TCN)
    is permanently pinned in the 512 KB internal SRAM alongside the OS. Normally, this SRAM model acts
    as a low-power gatekeeper, waking the second core and triggering the 3 MB PSRAM model only on suspicious
    noise. During degradation, the PSRAM is powered down and the second core is halted; the system simply
    stops triggering the large model and relies entirely on the SRAM-resident TCN to flag basic threshold
    anomalies, achieving instant, zero-cost quality-of-service shedding.
  common_mistake: Candidates often suggest dynamically loading a smaller fallback model from flash memory
    into SRAM when the battery drops. They fail to account for the massive energy spike and latency penalty
    incurred by reading from flash during a low-power critical event, which can cause the device to brownout
    or miss critical audio frames during the transition.
  napkin_math: The ESP32-S3 has 512 KB SRAM. Budgeting 200 KB for FreeRTOS and network buffers leaves
    ~312 KB. We allocate 100 KB for the fallback model weights and 100 KB for activations. At 240 MHz,
    the Xtensa core with INT8 vector extensions can execute roughly 2 MACs per cycle theoretically, but
    assume 1 MAC/cycle for overhead. A 2M MAC inference takes 2,000,000 / 240,000,000 = ~8.33 milliseconds.
    Running this once per second consumes less than 1% of the single core's compute, perfectly suiting
    the degraded low-power state.
