title: AOT Compilation Pipeline Design for Cortex-M4 Edge Inference
scenario: You are tasked with designing the ahead-of-time (AOT) graph compilation pipeline for deploying a keyword spotting model on an ARM Cortex-M4. The raw model from training contains unsupported dynamic operators, un-fused batch norms, and floating-point weights.
question: What AOT compilation passes are required to turn the Cortex-M4 keyword model into a static CMSIS-NN executable?
details:
  realistic_solution: 'A robust L5 design defines a strict sequence of passes: first, static shape inference to freeze all tensor dimensions, followed by constant folding and batch norm fusion into convolutional weights. Next, an INT8 post-training quantization (PTQ) pass converts weights and activations, specifically targeting symmetric INT8 to map cleanly to the Cortex-M4 DSP instructions. The compiler then performs operator lowering directly to CMSIS-NN kernel calls, and finally, an offline memory planning pass assigns all intermediate tensors to fixed offsets within a pre-allocated static arena, ensuring zero dynamic allocations.'
  common_mistake: |
    **The Pitfall:** Proposing standard cloud compiler passes without addressing edge hardware restrictions.
    **The Rationale:** Candidates forget that dynamic shapes cannot be allocated at runtime within strict SRAM constraints and often omit the mandatory INT8 quantization pass.
    **The Consequence:** The model falls back to software emulation of floating-point operations, catastrophically destroying latency targets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: ARM Cortex-M4 at 168 MHz.
    - Instructions: CMSIS-NN SIMD (2 INT8 MACs/cycle).
    - Workload: Single convolution layer with 500,000 MACs.

    **Calculations:**
    - Peak Throughput: 168 MHz * 2 = 336 million MACs/sec.
    - Lowered CMSIS-NN Latency: 500,000 / 336,000,000 = ~1.49 ms.
    - Soft-float Fallback Latency (~50 cycles/MAC): (500,000 * 50) / 168,000,000 = ~148.8 ms.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound**. Proper operator lowering to SIMD achieves a ~100x latency reduction, proving compilation is critical.
