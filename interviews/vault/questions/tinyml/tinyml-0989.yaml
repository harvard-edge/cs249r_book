title: AOT Compilation Pipeline Design for Cortex-M4 Edge Inference
scenario: 'You are tasked with designing the ahead-of-time (AOT) graph compilation
  pipeline for deploying a keyword spotting model on an ARM Cortex-M4 (STM32F4) microcontroller.
  The device has strict constraints: 256 KB of SRAM, 1 MB of flash, no FPU, and relies
  on CMSIS-NN SIMD for executing 2x INT8 MACs per cycle. The raw model from training
  contains unsupported dynamic operators, un-fused batch norms, and floating-point
  weights. Architect the compilation passes required to convert this raw graph into
  an optimal, static memory-planned C executable that maximizes CMSIS-NN utilization
  while fitting within the SRAM limits.'
question: What AOT compilation passes are required to turn the Cortex-M4 keyword model
  into a static CMSIS-NN executable?
details:
  realistic_solution: 'A robust L5 design defines a strict sequence of passes: first,
    static shape inference to freeze all tensor dimensions, followed by constant folding
    and batch norm fusion into convolutional weights. Next, an INT8 post-training
    quantization (PTQ) pass converts weights and activations, specifically targeting
    symmetric INT8 to map cleanly to the Cortex-M4 DSP instructions. The compiler
    then performs operator lowering directly to CMSIS-NN kernel calls, and finally,
    an offline memory planning pass assigns all intermediate tensors to fixed offsets
    within a pre-allocated static arena in the 256 KB SRAM, ensuring zero dynamic
    allocations.'
  common_mistake: Candidates often propose standard compiler passes without considering
    the specific restrictions of the STM32F4, such as forgetting that dynamic shapes
    cannot be allocated at runtime within a 256 KB SRAM constraint. They also frequently
    overlook the necessity of a specific quantization pass (INT8) before lowering
    to CMSIS-NN, leading to emulation of floating-point ops in software which destroys
    latency.
  napkin_math: Assuming a single convolution layer requires 500,000 MACs. On the ARM
    Cortex-M4 (STM32F4) at 168 MHz using CMSIS-NN SIMD (2x INT8 MACs/cycle), theoretical
    peak throughput is 336 million MACs/second. Executing this layer takes theoretically
    500,000 / 336,000,000 = ~1.49 milliseconds. Without the INT8 compilation lowering
    (fallback to soft-float taking ~50 cycles/MAC), it would take 500,000 * 50 / 168,000,000
    = ~148 milliseconds. Proper compiler lowering to CMSIS-NN achieves a ~100x latency
    reduction, proving the critical nature of operator lowering.
