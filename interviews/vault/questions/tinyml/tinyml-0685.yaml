title: 'The Dusk Disaster: Quantization-Aware Architecture'
scenario: >
  Your team quantizes an FP32 pedestrian detection model to INT8 using Post-Training Quantization (PTQ) calibrated on daytime images.
  It passes all lab benchmarks but fails at dusk on the target Cortex-M7 (1MB Flash, 512KB SRAM).
question: What quantization-aware architecture plan should address the AEB model's dusk failures within MCU memory limits?
details:
  realistic_solution: |
    The correct approach is a phased, risk-mitigated plan that tackles the problem's root cause: activation overflow due to a mismatch between calibration and real-world data distribution.
  common_mistake: |
    **The Pitfall:** Abandoning the constraints to demand a more powerful MCU, or simply suggesting "retrain with more low-light data."
    **The Rationale:** Retraining alone doesn't address the fundamental dynamic range mismatch causing INT8 overflow.
    **The Consequence:** The quantization process remains the root cause, and the dusk failures persist.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1MB Flash, 512KB SRAM limit.
       - Model: 100K params (400KB FP32, 100KB INT8).
    2. **Calculations:**
       - Recalibrating INT8 spreads 256 levels over a 10x range, causing 10x precision loss.
       - Mixed Precision Plan: First 2 layers (20K) as FP16, rest (80K) as INT8.
       - Mixed Flash Cost: (20K * 2) + (80K * 1) = 120 KB (Fits well in 1MB).
       - Activation Cost: First layer (40x40x8) FP16 = 25.6KB vs INT8 = 12.8KB. +12.8KB is ~2.5% of 512KB SRAM.
    3. **Conclusion & Interpretation:** Mixed precision solves dynamic range issues safely within hardware limits. **Result: Precision-Bound**.
