title: 'The Dusk Disaster: Quantization-Aware Architecture'
scenario: >
  You are the Principal Engineer for the perception system of a new Automatic Emergency Braking (AEB) feature. To meet strict cost constraints, the system must run on a Cortex-M7 based microcontroller with 1MB of Flash and 512KB of SRAM. Your team has developed a highly accurate FP32 pedestrian detection model. When they quantize it to INT8 using post-training quantization (PTQ) with a calibration set of 1,000 diverse daytime images, it passes all lab benchmarks. But it fails at dusk.
question: >
  What quantization-aware architecture plan should address the AEB model's dusk failures within MCU memory limits?
details:
  realistic_solution: >
    The correct approach is a phased, risk-mitigated plan that tackles the problem's root cause: activation overflow due to a mismatch between calibration and real-world data distribution.
  common_mistake: |
    **The Pitfall:** Abandoning the constraints to demand a more powerful MCU, or simply suggesting "retrain with more low-light data."
    **The Rationale:** Retraining alone doesn't address the fundamental dynamic range mismatch that causes the INT8 overflow during inference.
    **The Consequence:** The quantization process itself remains the root cause, and the dusk failures persist.
  napkin_math: |
    - **M7 Memory:** 1MB Flash, 512KB SRAM.
    - **FP32 Size:** 100K params = 400KB. INT8 = 100KB.
    - **Mixed Precision:** First 2 layers (20K) FP16 = 40KB + rest INT8 (80K) = 80KB. Total Flash = 120KB.
    - **SRAM Cost:** First layer activation 40x40x8: FP16 = 25.6KB vs INT8 = 12.8KB. The extra 12.8KB is only 2.5% of the 512KB SRAM.
    - **Conclusion:** Recalibrating INT8 alone spreads 256 levels over a 10x range, causing 10x precision loss. Mixed precision isolates the dynamic range issue while comfortably fitting the MCU constraints.
