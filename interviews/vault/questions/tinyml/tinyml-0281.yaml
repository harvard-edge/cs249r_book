title: 'The INT8 Energy Prize'
scenario: 'You''re optimizing a keyword spotting model on a Cortex-M4 microcontroller to run on a coin-cell battery. To meet the aggressive power budget, you''re considering quantizing the model''s weights and activations from 32-bit floating point (FP32) to 8-bit integer (INT8).'
question: 'What per-operation energy savings should FP32-to-INT8 quantization provide for the coin-cell keyword spotting model?'
details:
  realistic_solution: 'The energy savings are approximately 18x. An FP32 multiply-accumulate (MAC) operation is fundamentally more expensive than an INT8 MAC. The FP32 unit requires complex circuitry for handling exponents and mantissas, leading to significantly higher switching capacitance and static power leakage compared to the much simpler integer ALU. This non-linear energy scaling is a core principle of hardware-aware model optimization.'
  common_mistake: |
    **The Pitfall:** Assuming energy savings scale linearly with bit width.
    **The Rationale:** Engineers calculate 32 bits / 8 bits = 4x savings, ignoring the fundamental hardware reality that floating-point arithmetic units are vastly more complex and energy-intensive.
    **The Consequence:** Severely underestimating the energy benefits of quantization and failing to aggressively pursue INT8 optimization for battery-powered devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Energy Ratio: FP32 to INT8 is roughly 18x.

    **Calculations:**
    - Example: If an FP32 operation costs 18 pJ, an INT8 operation costs ~1 pJ.

    **Conclusion & Interpretation:**
    - **Result: 18x (Power-Bound)**. INT8 heavily reduces switching capacitance and static power leakage.
  options:
    - '~4x savings'
    - '~3.4x savings'
    - '~18x savings'
    - '~100x savings'
