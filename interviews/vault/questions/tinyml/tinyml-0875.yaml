title: 'Model Format Conversion: Optimize INT4 Quantization for Cortex-M4 MCU Deployment'
scenario: A Cortex-M4 is running an INT8 model that uses 200KB Flash. Flash is 80% full. The team wants to add a second model (150K INT8 params) but has only 40KB Flash remaining.
question: How would you evaluate INT4 quantization for the first model and quantify Flash savings vs. accuracy risk?
details:
  realistic_solution: 'INT4 first model: 200K x 0.5B = 100KB (saves 100KB Flash). Second model INT8: 150KB. Total: 100+150=250KB of 512KB Flash. Accuracy: INT4 PTQ typically adds 1-3% accuracy degradation for small models. If unacceptable: use INT4 for weights only with INT8 activations (W4A8) — same Flash savings, better accuracy. Inference: INT4 weights unpacked to INT8 on M4 -> same SIMD throughput. Memory reads: 200KB -> 100KB (50% reduction) -> cache miss reduction -> ~20% latency improvement.'
  common_mistake: |
    **The Pitfall:** Implementing INT4 quantization and expecting a compute speedup.
    **The Rationale:** Cortex-M4 doesn't have native INT4 SIMD support. INT4 must be unpacked to INT8 before computation.
    **The Consequence:** Misunderstanding that the latency improvement comes purely from reduced memory fetch time, not faster computation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - INT8 model = 200 KB.
       - INT4 model = 100 KB.
    2. **Calculations:**
       - Savings = 200 KB - 100 KB = 100 KB.
       - Unpacking INT4 reduces cache loads by 50% (25 to 12.5 loads).
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Latency Improvement**. Flash reduced by 100 KB, latency improves by ~20% due to cache miss reduction.
