title: 'Model Format Conversion: Optimize INT4 Quantization for Cortex-M4 MCU Deployment'
scenario: A Cortex-M4 (168MHz, 256KB SRAM, 512KB Flash) is running an INT8 model (200K
  params, 4.5 MOPs) that uses 200KB Flash. Flash is 80% full. The team wants to add
  a second model (150K INT8 params) but has only 40KB Flash remaining. Evaluate INT4
  quantization for the first model and quantify Flash savings vs. accuracy risk.
question: How would you evaluate INT4 quantization for the first model and quantify
  Flash savings vs. accuracy risk?
details:
  realistic_solution: 'INT4 first model: 200K × 0.5B = 100KB (saves 100KB Flash).
    Second model INT8: 150KB. Total: 100+150=250KB of 512KB Flash ✓. Accuracy: INT4
    PTQ typically adds 1-3% accuracy degradation for small models. If unacceptable:
    use INT4 for weights only with INT8 activations (W4A8) — same Flash savings, better
    accuracy. Inference: INT4 weights unpacked to INT8 on M4 → same SIMD throughput.
    Memory reads: 200KB → 100KB (50% reduction) → cache miss reduction → ~20% latency
    improvement.'
  common_mistake: Implementing INT4 quantization without recognizing that Cortex-M4
    doesn't have native INT4 SIMD support — INT4 is unpacked to INT8 before computation,
    so latency improves only via reduced memory (cache/Flash reads), not compute.
  napkin_math: 'INT8 model: 200K × 1B = 200KB Flash. INT4: 200K × 0.5B = 100KB. Save:
    100KB. Inference: M4 SRAM cache ~8KB. INT8: 200KB/8KB = 25 cache loads. INT4:
    100KB/8KB = 12.5 cache loads. Estimate 30% latency from cache misses → 20% improvement.
    4.5M/168M = 26.8ms × 0.8 = 21.4ms. Accuracy penalty: ~1.5% for small models. Acceptable
    for most anomaly detection.'
