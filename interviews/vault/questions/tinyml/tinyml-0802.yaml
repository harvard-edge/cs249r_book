title: Tinyml New 0026
scenario: A 200KB TinyML model is deployed via OTA (Over-The-Air) update to a Cortex-M4 device with 256KB
  of flash. The deployment repeatedly fails with a memory allocation error during the update process.
details:
  realistic_solution: The system relies on an A/B partition scheme for safe OTA updates, meaning it needs
    enough flash memory to store both the currently running firmware and the incoming downloaded firmware
    simultaneously. A 200KB model plus RTOS easily exceeds the available space. The solution is to use
    a secondary external SPI flash chip for the download, or implement a compressed Delta/Patch update.
  common_mistake: Sizing the MCU flash exactly to the model size, ignoring the 2x flash requirement for
    safe dual-bank OTA updates.
  napkin_math: 'A/B partition requires: (Model Size + RTOS Size) * 2 <= Total Flash. (200KB + 20KB) *
    2 = 440KB, which is significantly larger than the 256KB available on the MCU internal flash.'
