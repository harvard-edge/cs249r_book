title: Evaluating SRAM Constraints on Corstone-300
scenario: You are designing an anomaly detection system for an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform. The system operates at 480 MHz and features 512 KB of shared SRAM between the M7 and the Ethos-U55 (configured for 256 MAC/cycle). The RTOS, network stack, and I/O buffers consume a strict 150 KB of this SRAM. You must choose between two INT8 architectures compiled by Vela: Model A has 200 KB of weights and requires 140 KB of peak activation memory. Model B uses an inverted bottleneck design, resulting in only 120 KB of weights but demanding 260 KB of peak activation memory.
question: "Which model (A or B) should be selected, and how does the shared memory architecture influence this decision on the Corstone-300?"
details:
  realistic_solution: Model A is the correct and only viable choice out-of-the-box. Because the Cortex-M7 and Ethos-U55 share the same 512 KB SRAM, the total memory footprint must account for weights, peak activations, and system overhead simultaneously. Model B exceeds the physical limits of the SRAM due to its large activation buffers. An L5 engineer should point out that unless we use cascading or tensor splitting via the Vela compiler to significantly reduce Model B's peak memory, Model A is the reliable architectural choice.
  common_mistake: |
    **The Pitfall:** Choosing Model B purely because it has fewer parameters (weights).
    **The Rationale:** Candidates trained in cloud ML prioritize parameter counts and forget about runtime memory boundaries.
    **The Consequence:** They fail to account for the peak working memory required for intermediate activations, leading to an immediate OOM crash during inference.
  napkin_math: |
    * Total Platform SRAM: 512 KB.
    * System Overhead (RTOS/IO): 150 KB.
    * Available SRAM for ML workload: 512 KB - 150 KB = 362 KB.
    * Model A footprint: 200 KB (weights) + 140 KB (activations) = **340 KB** (Fits with 22 KB margin).
    * Model B footprint: 120 KB (weights) + 260 KB (activations) = **380 KB** (OOM by 18 KB).
    * Model B fails deployment despite having 80 KB fewer parameters.
