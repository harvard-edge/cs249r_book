title: The Real-Time MAC Budget
scenario: You are designing a voice command system for an industrial application using a Cortex-M4 running at 168 MHz. Inference must complete within a hard 33 ms window. Assume you are using an optimized CMSIS-NN implementation that achieves 1 MAC per cycle.
question: What is the maximum MAC count for a Cortex-M4 voice model that must finish within 33 ms at 168 MHz and 1 MAC per cycle?
details:
  realistic_solution: 'This requires working backwards from the time budget to find the computational budget. Determine how many clock cycles are available within the 33ms window, and map that 1:1 to the MAC budget based on the CMSIS-NN SIMD capabilities.'
  common_mistake: |
    **The Pitfall:** Mismatching units (ms vs seconds) during latency calculation.
    **The Rationale:** Candidates often divide the clock speed by 33 instead of 0.033.
    **The Consequence:** This leads to calculating a MAC budget that is off by a factor of 1000, resulting in a model that takes 33 seconds to run instead of 33 ms.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Clock Speed: 168 MHz (168,000,000 cycles/sec).
       - Time Budget: 33 ms (0.033 seconds).
       - Throughput: 1 MAC per cycle.
    2. **Calculations:**
       - Available Cycles: 168,000,000 cycles/sec * 0.033 sec = 5,544,000 cycles.
       - MAC Budget: 5,544,000 cycles * 1 MAC/cycle = 5,544,000 MACs.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Budget of ~5.5 Million MACs.** The maximum model size must be kept under this limit to meet the strict latency deadline.
  options:
  - ~2.8 Million MACs
  - ~5.1 Million MACs
  - ~5.5 Million MACs
  - ~168 Million MACs
  correct_index: 2
