title: Dense Layer MAC Count
scenario: A simple multi-layer perceptron on a Cortex-M4 features a dense hidden layer with 150 input neurons and 50 output neurons.
question: Calculate the total number of Multiply-Accumulate (MAC) operations required for a single forward pass of this layer.
details:
  realistic_solution: Each of the 50 output neurons is connected to all 150 input neurons. Each connection requires one multiply-accumulate operation (multiplying the input by the weight and adding to the running sum). Therefore, the number of MACs is simply 150 * 50 = 7,500 MACs.
  common_mistake: |
    **The Pitfall:** Confusing MACs with FLOPs or miscalculating matrix dimensions.
    **The Rationale:** Candidates mistakenly multiply the result by 2 to get FLOPs (which counts multiply and add separately) when the question specifically asks for MACs.
    **The Consequence:** Estimating double the actual required compute cycles for architectures that feature single-cycle MAC instructions.
  napkin_math: |
    *   **Connections:** Each of the 50 output neurons connects to all 150 input neurons.
    *   **Operations:** 1 connection = 1 Multiply-Accumulate (MAC) operation.
    *   **Total MACs:** 150 * 50 = **7,500 MACs**.
