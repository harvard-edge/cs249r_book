title: Star Topology Wireless Collision Diagnosis
scenario: A deployment of 50 Cortex-M4 agricultural sensors operates in a star topology, attempting to send embeddings to a central LoRa gateway simultaneously.
question: What is the primary network bandwidth bottleneck specific to this shared medium wireless topology?
visual:
  kind: svg
  path: tinyml-1656.svg
  alt: Multiple sensor nodes pointing to one central gateway.
  caption: Star topology creating a collision domain at the gateway.
details:
  realistic_solution: In a wireless star topology without strict time-division multiplexing (like basic LoRaWAN ALOHA), the primary bottleneck is packet collision probability at the central gateway receiver. As nodes increase, the shared medium becomes congested, dropping throughput exponentially and causing continuous retransmission floods.
  common_mistake: |
    **The Pitfall:** Blaming the compute speed of the Cortex-M4 or the gateway CPU.
    **The Rationale:** Candidates lack networking fundamentals and ignore the physical RF collision domain of a shared medium.
    **The Consequence:** Misdirected optimization efforts (like optimizing MCU code) that do nothing to solve the network congestion.
  napkin_math: |
    - Protocol: Basic LoRaWAN ALOHA.
    - Aloha max theoretical throughput: ~18%.
    - **Bandwidth wasted:** Up to **82%** of bandwidth is lost to collisions under high load.
