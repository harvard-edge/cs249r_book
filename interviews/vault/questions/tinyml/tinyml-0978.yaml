title: 'ESP32-S3 PSRAM Roofline Bottleneck'
scenario: 'You are deploying an INT8 neural network on an MCU with 8 MB external PSRAM. Using the INT8 vector extensions, the processor has a peak compute capacity of 4.0 GOPS. The model''s weights are streamed from the 8 MB PSRAM, which provides an effective memory bandwidth of 0.5 GB/s. When profiling a specific layer, you observe that the hardware only achieves 1.0 GOPS of throughput.'
question: 'Using the roofline model, why are the vector extensions underutilized and what is the layer''s operational intensity?'
details:
  realistic_solution: 'The candidate should apply the roofline model to demonstrate that the layer is heavily memory-bound due to the low bandwidth of the PSRAM relative to the vector compute capabilities. By determining the machine''s ridge point, they can prove that the operational intensity of this specific layer is too low, forcing the throughput to ride the memory bandwidth roof rather than reaching the compute roof.'
  common_mistake: |
    **The Pitfall:** Candidates often intuitively blame the clock speed or instruction decoding overhead for the underutilization.
    **The Rationale:** They fail to formally analyze the machine balance or map the PSRAM limitations to the slanted region of the roofline model.
    **The Consequence:** They pursue incorrect optimizations like loop unrolling instead of addressing the memory bandwidth bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak Compute: 4.0 GOPS.
    - Memory Bandwidth: 0.5 GB/s.
    - Observed Throughput: 1.0 GOPS.

    **Calculations:**
    - Machine Balance (Ridge Point): 4.0 GOPS / 0.5 GB/s = 8 OPS/byte.
    - Since 1.0 GOPS < 4.0 GOPS, it is memory-bound.
    - Operational Intensity (OI) = Performance / Bandwidth.
    - Layer OI: 1.0 GOPS / 0.5 GB/s = 2 OPS/byte.

    **Conclusion & Interpretation:**
    - **Result: 2 OPS/byte (Memory-Bound)**. The layer's operational intensity is far below the 8 OPS/byte ridge point, forcing performance to ride the memory bandwidth roof.
