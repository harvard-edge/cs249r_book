title: ESP32-S3 PSRAM Roofline Bottleneck
scenario: You are deploying an INT8 neural network on an ESP32-S3 (240 MHz dual-core
  Xtensa, 512 KB SRAM, 8 MB PSRAM). Using the INT8 vector extensions, the processor
  has a peak compute capacity of 4.0 GOPS. The model's weights are too large for the
  512 KB SRAM and must be streamed from the 8 MB PSRAM, which provides an effective
  memory bandwidth of 0.5 GB/s. When profiling a specific layer, you observe that
  the hardware only achieves 1.0 GOPS of throughput. Using the roofline model, explain
  why the vector extensions are underutilized and calculate the layer's operational
  intensity.
question: How does the ESP32-S3 PSRAM roofline limit a layer to 1 GOPS, and what operational
  intensity does that imply?
details:
  realistic_solution: The candidate should apply the roofline model to demonstrate
    that the layer is heavily memory-bound due to the low bandwidth of the PSRAM relative
    to the vector compute capabilities. By determining the machine's ridge point,
    they can prove that the operational intensity of this specific layer is too low,
    forcing the throughput to ride the memory bandwidth roof rather than reaching
    the compute roof.
  common_mistake: Candidates often intuitively blame the 240 MHz clock speed or instruction
    decoding overhead for the underutilization without formally analyzing the machine
    balance. They may fail to map the PSRAM limitations to the slanted region of the
    roofline model.
  napkin_math: '1. Calculate Machine Balance (Ridge Point) = Peak Compute / Memory
    Bandwidth = 4.0 GOPS / 0.5 GB/s = 8 OPS/byte. 2. Identify the bottleneck: Since
    the observed 1.0 GOPS is below the 4.0 GOPS peak, the workload is operating under
    the memory-bound roof. 3. Calculate Operational Intensity (OI) using the memory
    roof formula: Performance = Bandwidth * OI. 4. Solve for OI: OI = Performance
    / Bandwidth = 1.0 GOPS / 0.5 GB/s = 2 OPS/byte. The workload only does 2 operations
    per byte loaded, which is less than the 8 OPS/byte required to become compute-bound.'
