title: Battery-Constrained Duty Cycle Maximization
scenario: A Cortex-M4 camera detects persons. Active mode draws 50mW for 200ms per
  frame. Sleep mode draws 0.01mW. The device must last exactly 8760 hours (1 year)
  on a 10Wh battery.
question: Formulate an optimized duty-cycle budget and calculate the maximum number
  of frames per hour the device can process.
details:
  realistic_solution: 'The power budget per hour is 10000mWh / 8760h ≈ 1.141mW. Sleep power
    is 0.01mW, leaving ~1.131mW for active tasks. The active energy above sleep per frame is (50 - 0.01)mW *
    (0.2s / 3600s/h) ≈ 0.002777mWh. The device can process 1.131 / 0.002777 ≈ 407 frames
    per hour.'
  common_mistake: Neglecting sleep mode power entirely, or confusing mWh energy capacities
    with instantaneous mW power consumption.
  napkin_math: '(10000/8760 - 0.01) / ((50 - 0.01) * (0.2/3600)) ≈ 407.44 frames/hr'
