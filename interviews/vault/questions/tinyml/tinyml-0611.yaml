title: Co-Designing a TinyML Accelerator
scenario: Your company is designing a custom TinyML accelerator to be integrated alongside a Cortex-M4
  core on the same die. The accelerator must run INT8 inference 10× faster than CMSIS-NN on the M4 while
  adding less than 0.5 mm² of silicon area (in 28nm process). What hardware blocks do you include, and
  what do you leave to the M4?
question: "What sub-0.5 mm2 INT8 accelerator blocks would beat CMSIS-NN on a Cortex-M4 by 10x?"
details:
  realistic_solution: 'Build a weight-stationary systolic array: 64 INT8 MAC units (0.15mm2), 32KB weight
    SRAM (0.1mm2), 8KB activation SRAM (0.03mm2), DMA engine + control (0.1mm2). Total: ~0.38mm2. Performance:
    64 MACs/cycle at 100MHz = 6.4 GMAC/s vs CMSIS-NN''s ~68 MMAC/s = 94x speedup. Energy: fixed datapath
    eliminates instruction fetch/decode (~60% of CPU energy). Leave to the M4: activation functions, pooling,
    non-standard layers, and control flow. The accelerator handles only the dominant convolution and fully-connected
    operations that consume 85-95% of inference time.'
  common_mistake: '"Build a small GPU with many cores." GPUs are designed for high throughput with high
    power — the wrong trade-off for TinyML. A tiny GPU would be power-hungry and area-inefficient for
    the small, sequential workloads typical of MCU models.'
  napkin_math: 'Area: 0.38 mm² in 28nm. For context: a Cortex-M4 core is ~0.5-1.0 mm² in 28nm. The accelerator
    is smaller than the CPU it augments. Speedup: 93× over CMSIS-NN. Energy: 466× less per inference.
    This is why companies like Syntiant, Eta Compute, and GreenWaves are building dedicated TinyML accelerators
    — the efficiency gains are orders of magnitude, not percentages.'
