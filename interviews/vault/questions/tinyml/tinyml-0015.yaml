title: 'The Duty Cycle Power Tax'
scenario: 'A wildlife tracking device using a Cortex-M4 microcontroller wakes up for 1 second to perform an inference, consuming 50 mW. It then returns to a deep sleep state for the next 119 seconds, consuming 10 µW.'
question: 'What is the average power over a 2-minute cycle with 1 second at 50 mW and 119 seconds at 10 uW sleep?'
details:
  realistic_solution: 'The average power is the total energy consumed during the cycle divided by the total cycle time. The device is active for 1 second (50 mJ) and sleeps for 119 seconds (1.19 mJ), consuming 51.19 mJ over a total period of 120 seconds. The average power is therefore ~0.43 mW.'
  common_mistake: 'Engineers often neglect the power consumed during the ''sleep'' phase, assuming it''s zero. While small, sleep current can dominate the energy budget in very low duty cycle applications. Another common error is mixing units (milliwatts and microwatts) or incorrectly calculating the total period for the average.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Active Power: 50 mW for 1s.
    - Sleep Power: 10 µW (0.01 mW) for 119s.

    **Calculations:**
    - Active Energy = 1s * 50 mW = 50 mJ.
    - Sleep Energy = 119s * 0.01 mW = 1.19 mJ.
    - Total Energy = 50 mJ + 1.19 mJ = 51.19 mJ.
    - Total Period = 120 s.
    - Average Power = 51.19 mJ / 120 s ≈ 0.426 mW.

    **Conclusion & Interpretation:**
    - **Result: ~0.43 mW (Power-Bound)**. The small sleep current over a long duration contributes visibly, but average power remains very low.
  options:
  - "50 mW"
  - "~0.43 mW"
  - "10 µW"
  - "~0.41 mW"
