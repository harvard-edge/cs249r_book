title: Evaluating Distillation vs Pruning for Ethos-U55 Deployment
scenario: 'You are deploying a wake-word detection model on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) system. Your current baseline model requires 800 KB of SRAM, but the system only provides 512 KB of SRAM shared between the 480 MHz M7 and the Ethos-U55 NPU. You are presented with two optimization alternatives to fit the memory budget: 1) applying unstructured pruning to achieve 40% sparsity on the 800 KB model, or 2) using knowledge distillation to train a smaller, denser student model that directly requires only 350 KB of SRAM.'
question: Should a Corstone-300 wake-word model use 40% unstructured pruning or a dense 350 KB distilled student to fit 512 KB SRAM?
details:
  realistic_solution: Knowledge distillation into a dense student model is significantly better for the ARM Ethos-U55 than unstructured pruning. The U55 NPU relies on continuous, dense memory accesses to effectively utilize its 128-512 MAC/cycle throughput, and the shared 512 KB SRAM necessitates predictable memory patterns. Distillation shrinks the model's physical footprint to fit entirely within the 512 KB SRAM limit while maintaining the dense execution efficiency required to leverage the NPU hardware.
  common_mistake: |
    **The Pitfall:** Suggesting unstructured pruning to reduce memory requirements.
    **The Rationale:** Unstructured sparsity reduces theoretical MACs and parameter counts in PyTorch, so candidates assume it seamlessly shrinks the hardware footprint.
    **The Consequence:** Failing to realize that NPUs like the Ethos-U55 are optimized for dense matrix math and cannot efficiently accelerate unstructured sparsity, leading to worse latency or OOM errors.
  napkin_math: |
    1. **Theoretical Throughput:** M7 NPU at 256 MAC/cycle * 480 MHz = ~122.8 GMAC/s.
    2. **Pruning Constraint:** A 40% sparse 800 KB model still requires loading the full 800 KB dense tensor structure, which doesn't fit in 512 KB SRAM. Falling back to the M7 CPU drops throughput to <1 GMAC/s.
    3. **Distillation Advantage:** A dense 350 KB distilled model fits entirely in 512 KB SRAM, keeping the NPU fed.
    4. **Result:** The distilled model successfully maintains **peak ~122.8 GMAC/s execution efficiency**, while the sparse model crashes or thrashes.
