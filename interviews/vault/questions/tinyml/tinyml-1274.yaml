title: CMOS Dynamic Power Equation Recall
scenario: You are deploying an always-on keyword spotting model on an ESP32-S3 micro-controller
  for a battery-powered smart home device. The ESP32-S3 features a 240 MHz dual-core
  Xtensa processor and vector extensions for INT8, which you are utilizing to accelerate
  inference. To optimize the battery life and adjust DVFS P-states effectively, you
  must recall the primary mathematical equation that defines dynamic power dissipation
  in CMOS circuits.
question: What CMOS dynamic power equation should you recall when optimizing ESP32-S3
  DVFS P-states for an always-on keyword spotter?
details:
  realistic_solution: 'The correct answer is recalling the fundamental equation for
    CMOS dynamic power: P = alpha * C * V^2 * f. In this equation, alpha represents
    the activity factor, C is the switched capacitance, V is the supply voltage, and
    f is the operating frequency. By recalling this formula, the candidate demonstrates
    an understanding that reducing the ESP32-S3''s internal core voltage provides
    a quadratic reduction in power, whereas scaling the 240 MHz clock frequency only
    provides a linear reduction.'
  common_mistake: Candidates frequently state that dynamic power scales linearly with
    voltage, missing the quadratic relationship. Another common error is confusing
    static leakage power with dynamic switching power.
  napkin_math: 'If the ESP32-S3 is running its INT8 vector extensions at full speed
    (f = 240,000,000 Hz) with an internal core voltage of 1.1V (V = 1.1) and an estimated
    effective switching capacitance of 200 pF (C = 200e-12 F) with an activity factor
    of 0.5: Dynamic Power (P) = 0.5 * 200e-12 * (1.1)^2 * 240,000,000 = 100e-12 *
    1.21 * 240,000,000 = 29.04 milliwatts.'
