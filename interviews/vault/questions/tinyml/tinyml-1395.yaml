title: 'Hardware-Aware NAS on Nordic nRF5340: Memory and Latency Evaluation'
scenario: 'You are tasked with deploying a tinyML model for a continuous sensor monitoring
  application on a Nordic nRF5340 microcontroller (128 MHz CPU, 256 KB SRAM, 1 MB
  flash). Two candidate neural network architectures, discovered via hardware-aware
  NAS, are proposed, both designed to process sensor data at a rate of 10 Hz:


  *   **Architecture A (Float32):** A small CNN with 500,000 FLOPs, 60KB total parameters
  (float32), and requiring 100KB activation memory (float32) during inference. This
  architecture was optimized primarily for low theoretical FLOPs.

  *   **Architecture B (Int8):** A highly quantized network with 1,200,000 FLOPs,
  30KB total parameters (int8), and requiring 40KB activation memory (int8) during
  inference. This architecture was optimized for a minimal memory footprint.


  Compare these two architectures specifically for deployment on the Nordic nRF5340.
  Which architecture would you recommend and why, considering the given hardware constraints?
  What are the key trade-offs an ML engineer must consider for this platform?'
question: 'Which nRF5340 NAS candidate is better at 10 Hz: 500K FLOP FP32 with 160
  KB SRAM or 1.2M FLOP INT8 with 70 KB SRAM?'
details:
  realistic_solution: 'A realistic solution requires a comprehensive analysis:

    1.  **SRAM Budget Check:** Calculate the total SRAM required for parameters and
    activations for each model, accounting for data type sizes (float32 = 4 bytes/parameter,
    int8 = 1 byte/parameter). Compare this against the 256 KB SRAM. Identify if either
    model exceeds the limit or leaves insufficient room for the rest of the application.

    2.  **Latency/Throughput Estimation:** While precise latency requires profiling,
    estimate the operations per cycle. A 128 MHz CPU provides 128 million cycles/second.
    Consider that float32 operations are typically much slower than int8 operations
    on Cortex-M microcontrollers lacking a Floating Point Unit (FPU) or with limited
    FPU capabilities. Determine if the calculated FLOPs, adjusted for data type efficiency,
    can realistically execute within the 100ms inference budget.

    3.  **Flash Memory Check:** Confirm that the model parameters fit within the 1
    MB flash memory. Both models easily satisfy this constraint, but it''s a necessary
    check.

    4.  **Power Consumption:** Analyze the potential power differences. While Architecture
    A has fewer FLOPs, float32 operations can consume more energy. Architecture B''s
    int8 operations are generally more energy-efficient per operation.

    5.  **Accuracy-Performance Trade-off:** Acknowledge that int8 quantization (Architecture
    B) might lead to a slight drop in accuracy compared to float32 (Architecture A),
    which is a critical trade-off when selecting an architecture. The question implies
    both are ''candidate'' models, so this impact must be considered.


    **Recommendation:** Architecture B is likely the better choice for the Nordic
    nRF5340. Its significantly lower SRAM usage (70 KB vs 160 KB) is a primary advantage
    on a device with only 256 KB SRAM. While it has higher nominal FLOPs, the efficiency
    of int8 operations on embedded hardware often means faster execution and lower
    power consumption compared to float32, making it more feasible to meet the 10
    Hz processing requirement within the available compute budget. The remaining SRAM
    (186 KB) provides ample room for the OS and other application components.'
  common_mistake: A common mistake is to exclusively prioritize lower FLOPs (as in
    Architecture A) without adequately considering the actual memory footprint (SRAM
    for both parameters and activations, especially for float32 data types) and the
    computational efficiency of different data types (float32 vs. int8) on a resource-constrained
    microcontroller. Neglecting to verify if the inference latency meets the 10 Hz
    requirement (100 ms per inference) or assuming the 128 MHz CPU can execute float32
    operations as efficiently as int8 operations are also frequent errors. Furthermore,
    overlooking the total memory budget required by the ML model combined with the
    OS, libraries, and other application components can lead to critical failures.
  napkin_math: "Let's perform napkin math for SRAM usage:\n\n**Architecture A (Float32):**\n\
    *   Parameter memory: 60 KB \n*   Activation memory: 100 KB\n*   Total SRAM required:\
    \ 60 KB + 100 KB = **160 KB**\n*   Remaining SRAM on nRF5340 (256 KB total): 256\
    \ KB - 160 KB = **96 KB**\n\n**Architecture B (Int8):**\n*   Parameter memory:\
    \ 30 KB\n*   Activation memory: 40 KB\n*   Total SRAM required: 30 KB + 40 KB\
    \ = **70 KB**\n*   Remaining SRAM on nRF5340 (256 KB total): 256 KB - 70 KB =\
    \ **186 KB**\n\nThis immediate calculation shows Architecture B consumes less\
    \ than half the SRAM of Architecture A, leaving significantly more memory for\
    \ other system components and making it a much more viable option from a memory\
    \ perspective."
