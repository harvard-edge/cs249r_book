title: 'Hardware-Aware NAS on Nordic nRF5340: Memory and Latency Evaluation'
scenario: You are tasked with deploying a tinyML model for a continuous sensor monitoring application on a Nordic nRF5340 microcontroller (128 MHz CPU, 256 KB SRAM, 1 MB flash). Two candidate neural network architectures, discovered via hardware-aware NAS, are proposed to process sensor data at a rate of 10 Hz. Architecture A is a float32 small CNN with 500K FLOPs, 60KB weights, and 100KB activations. Architecture B is an int8 highly quantized network with 1.2M FLOPs, 30KB weights, and 40KB activations.
question: Which nRF5340 NAS candidate is better at 10 Hz: 500K FLOP FP32 with 160 KB SRAM or 1.2M FLOP INT8 with 70 KB SRAM?
details:
  realistic_solution: 'A realistic solution requires a comprehensive analysis:

    1.  **SRAM Budget Check:** Calculate the total SRAM required for parameters and activations for each model. Compare this against the 256 KB SRAM.

    2.  **Latency/Throughput Estimation:** Estimate the operations per cycle. A 128 MHz CPU provides 128 million cycles/second. Consider that float32 operations are typically much slower than int8 operations on Cortex-M microcontrollers lacking a robust FPU.

    3.  **Flash Memory Check:** Confirm that the model parameters fit within the 1 MB flash memory.

    4.  **Power Consumption:** Analyze the potential power differences.

    **Recommendation:** Architecture B is likely the better choice for the Nordic nRF5340. Its significantly lower SRAM usage (70 KB vs 160 KB) is a primary advantage on a device with only 256 KB SRAM.'
  common_mistake: |
    **The Pitfall:** Exclusively prioritizing the lower FLOP count of Architecture A.
    **The Rationale:** Candidates assume lower FLOPs always equals better performance, forgetting the extreme memory and cycle-cost penalties of float32 operations on MCUs lacking robust FPUs.
    **The Consequence:** Selecting a model that consumes too much SRAM, leading to system instability or out-of-memory errors for the RTOS and application code.
  napkin_math: |
    - Architecture A (Float32): 60 KB (params) + 100 KB (acts) = 160 KB SRAM.
    - Architecture B (Int8): 30 KB (params) + 40 KB (acts) = 70 KB SRAM.
    - Remaining SRAM on nRF5340 (256 KB): Arch A leaves 96 KB; Arch B leaves 186 KB.
    - Inference budget for 10 Hz: 100 ms.
    - 1.2M INT8 FLOPs at 128 MHz easily executes within 100ms, while consuming less than half the SRAM.
    - **Architecture B is the superior choice.**
