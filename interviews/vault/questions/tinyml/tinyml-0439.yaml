title: The Power-Aware Architect
scenario: You are using Neural Architecture Search (NAS) to design a person-detection model for a battery-powered device with a small microcontroller (like a Cortex-M4) and an even smaller energy budget. The goal is to maximize battery life, which means minimizing average power consumption. A junior engineer suggests setting the NAS reward function to `Accuracy / FLOPs`.
question: How would you diagnose the flaw in this approach and propose a more physically accurate reward function?
details:
  realistic_solution: The proposed reward `Accuracy / FLOPs` is flawed because it ignores the energy cost of data movement. According to the 'Numbers Every ML Engineer Should Know', memory access is energetically expensive. A better, more physically-grounded reward function for a NAS controller would be a multi-objective one that models both compute and memory access costs. The reward should be `Accuracy / (\u03b1 * MACs + \u03b2 * Memory_Accesses)`, where \u03b1 and \u03b2 are weighting coefficients derived from the target MCU's datasheet for the energy cost of a compute operation versus a memory read/write. This forces the NAS to find architectures that are not just computationally cheap, but also have small memory footprints and favor data locality (i.e., data stays in registers).
  common_mistake: The most common mistake is assuming that compute (FLOPs) is the only significant driver of power consumption. On resource-constrained hardware, and especially on microcontrollers, data movement (reading/writing to SRAM) can consume as much or even more energy than the computation itself. A model with fewer FLOPs but a large memory footprint or inefficient access patterns could easily use more power.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4 energy costs: compute ~12 pJ/MAC, SRAM read ~5 pJ/byte, Flash read ~50 pJ/byte.
    - Model A: 1M MACs, 500KB Flash reads.
    - Model B: 2M MACs, 100KB Flash reads.

    **Calculations:**
    - Model A Energy: 1M * 12pJ + 500KB * 50pJ = 12µJ + 25µJ = 37µJ.
    - Model B Energy: 2M * 12pJ + 100KB * 50pJ = 24µJ + 5µJ = 29µJ.
    - FLOPs-only metric would pick Model A (fewer MACs), but it uses more total energy due to memory access.

    **Conclusion & Interpretation:**
    - **Result: 29µJ vs 37µJ (Memory-Bound Energy)**. A reward function modeling both compute and memory access energy costs (α*MACs + β*Mem) is physically accurate.
  options:
  - The reward is fine; FLOPs are the main driver of power on microcontrollers.
  - The reward should be `Accuracy / Parameters` to minimize flash size.
  - The reward should model both compute and memory access energy costs, as data movement is a major power drain.
  - The reward should be `Accuracy / Latency`, as faster models use less power.
  correct_index: 2
