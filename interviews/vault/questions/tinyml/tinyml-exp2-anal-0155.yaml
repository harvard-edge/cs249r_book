title: AOT Compiler Memory-Latency Tradeoff Analysis
scenario: You are deploying an anomaly detection model on a Nordic nRF5340 (128 MHz app core, 256 KB SRAM,
  1 MB flash). After running your model through an ahead-of-time (AOT) graph compiler to lower operators
  and perform memory planning, the peak SRAM usage drops from 220 KB to 130 KB. However, you notice that
  the inference latency increases from 40ms to 50ms. The system operates at 3.0V with a ~5mA active current.
  Explain the architectural tradeoffs the compiler made to achieve this memory reduction at the cost of
  latency, and calculate the difference in energy consumed per inference.
question: "How would you explain the architectural tradeoffs the compiler made to achieve this memory reduction at the cost of latency, and calculate the difference in energy consumed per inference?"
details:
  realistic_solution: The AOT compiler heavily prioritized SRAM constraints (to fit comfortably within
    the 256 KB limit alongside the BLE 5.3 stack) by employing aggressive buffer sharing and operator
    fusion. Buffer sharing creates sequential scheduling bottlenecks, while fused operators often fall
    back to generalized implementations instead of utilizing the hand-tuned SIMD/DSP intrinsics available
    for standard layers. The memory footprint was drastically reduced, but the processor requires more
    clock cycles to compute the unoptimized fused operations.
  common_mistake: Candidates often assume that memory-optimized graphs always run faster due to reduced
    memory access overhead. They fail to identify that extreme buffer reuse introduces false data dependencies
    that restrict execution pipelining, or that fusing operators into custom kernels might bypass highly
    optimized, platform-specific DSP instructions available on the 128 MHz app core.
  napkin_math: Active Power = 5mA * 3.0V = 15mW. Original Inference Energy = 15mW * 40ms = 0.6 mJ. New
    Inference Energy = 15mW * 50ms = 0.75 mJ. The tradeoff to save 90 KB of SRAM resulted in a 10ms latency
    penalty and increased the energy cost per inference by 0.15 mJ (a 25% increase).
