title: 'Latency Decomposition for TinyML Keyword Spotting on Cortex-M7 + Ethos-U55'
scenario: 'You are tasked with deploying a keyword spotting model on an embedded system featuring an ARM Cortex-M7 processor (480 MHz) paired with an Ethos-U55 NPU configured for 256 MAC/cycle and 512 KB SRAM. Your team has developed two candidate models, Model A and Model B, which offer comparable accuracy. The critical requirement is minimizing end-to-end latency. Design an evaluation strategy to decompose the end-to-end latency for both models into the following key components: Time To First Token (TTFT - time until the first inference result is produced, including initial setup), Time Per Output Token (TPOT - time taken for each subsequent inference result), network transfer time (e.g., sensor data acquisition to device, or inter-chip communication), preprocessing time (typically on Cortex-M7), and postprocessing time (typically on Cortex-M7).'
question: 'How would you measure each component, identify bottlenecks, and ultimately recommend one model over the other based on this detailed latency analysis?'
details:
  realistic_solution: 'Implement precise timing mechanisms using hardware cycle counters on the Cortex-M7 and leverage any performance counters provided by the Ethos-U55 NPU. Utilize an integrated profiling framework capable of capturing execution times on both the CPU and NPU. Analyze data transfer bottlenecks by monitoring memory bandwidth usage and cache misses. For network latency, simulate or measure actual sensor data acquisition and inter-chip communication overhead. Optimize data formats, minimize data copies, and explore DMA for efficient data movement between components. The final recommendation should stem from a holistic analysis of how each model''s architecture influences the performance of all decomposed latency stages, including the partitioning of operations between CPU and NPU.'
  common_mistake: 'Ignoring inter-processor communication overhead or assuming NPU inference time is the only dominant factor. Often, data movement, memory access patterns, and CPU-NPU synchronization contribute significantly to overall latency, especially in tight embedded systems. Overlooking the impact of varying model architectures on memory access patterns and cache utilization on the Cortex-M7 also leads to inaccurate latency estimations.'
  napkin_math: |
    **Assumptions & Constraints:**
    - CNN: 500,000 MACs.
    - Ethos-U55: 256 MAC/cycle at 480 MHz.
    - Preprocessing (M7): 2 ms.
    - I/O Transfer: 1 ms.

    **Calculations:**
    - NPU cycles = 500,000 / 256 ≈ 1,953 cycles.
    - NPU inference time = 1,953 / (480 * 10^6) ≈ 4.07 µs.
    - Total per-frame latency = 1 ms (I/O) + 2 ms (Preprocessing) + 0.004 ms (NPU).

    **Conclusion & Interpretation:**
    - **Result: 3.004 ms (Compute-Bound)**. The total latency is completely dominated by CPU preprocessing and I/O transfers, highlighting that accelerating the NPU further yields diminishing returns.
