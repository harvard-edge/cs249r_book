title: 'Model Format Conversion: Compare TFLite Micro vs. TensorFlow Lite for MCU Deployment'
scenario: A keyword spotting model (DS-CNN-S, 100K params, INT8, 0.09 MOPs) needs to run on both Cortex-M4 (168MHz, 256KB SRAM) and Jetson Orin.
question: How would you compare TFLite Micro (MCU runtime, <20KB RAM overhead) vs. standard TFLite (GPU delegate) for each platform?
details:
  realistic_solution: 'Cortex-M4: must use TFLite Micro. Dynamic allocation in standard TFLite requires heap ~1MB minimum — impossible on 256KB SRAM. TFLite Micro: static arena, model in Flash, inference arena ~50KB. DS-CNN-S inference: 0.09M/168M = 0.54ms. Jetson Orin: use TFLite standard with GPU delegate: 0.09M/275T = 0.33μs, realistic ~2ms with overhead. Or TensorRT: ~1ms. For Jetson, TensorRT always preferred.'
  common_mistake: |
    **The Pitfall:** Suggesting standard TFLite for the Cortex-M4.
    **The Rationale:** Candidates fail to realize that standard TFLite requires dynamic memory allocation and a file system, which are unavailable on bare-metal MCUs.
    **The Consequence:** The standard TFLite binary simply won't compile or run on a Cortex-M4, requiring a complete rewrite using TFLite Micro.
  napkin_math: |
    1. **Cortex-M4 Memory:** 100K params = 100KB. Weights in Flash (100KB) + Arena (50KB) = 150KB. Fits in 256KB.
    2. **Cortex-M4 Inference:** 0.09 MOPs / 168 MHz = **0.54 ms**.
    3. **Jetson Orin Compute:** 0.09 MOPs / 275 TOPS = 0.33 μs raw compute.
    4. **Jetson Orin Overhead:** Standard TFLite GPU delegate overhead dominates, yielding **~2 ms**. TensorRT yields ~1 ms.
    5. **Conclusion:** M4 uses TFLM; Orin uses TensorRT for optimal latency.
