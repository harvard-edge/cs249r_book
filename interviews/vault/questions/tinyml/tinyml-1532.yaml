title: TinyML Cycle Budget
scenario: A Cortex-M4 runs at 80 MHz and must classify sensor windows every 20 ms.
  The model requires 1.6 million MACs. CMSIS-NN sustains 1 MAC/cycle for this layer
  mix. Determine whether the model fits the deadline before preprocessing.
question: Does a 1.6M-MAC TinyML model fit a 20 ms deadline on an 80 MHz Cortex-M4
  before preprocessing?
details:
  realistic_solution: The deadline provides 80 MHz x 20 ms = 1.6 million cycles. At
    1 MAC/cycle, the model consumes the entire budget, leaving no time for preprocessing,
    I/O, or RTOS overhead. It is not safe without optimization or a longer period.
  common_mistake: Seeing that model MACs equal available cycles and calling it feasible
    without headroom.
  napkin_math: Cycles available = 80M x 0.020 = 1.6M. Required = 1.6M cycles. Headroom
    = 0.
