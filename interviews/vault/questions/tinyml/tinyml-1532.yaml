title: TinyML Cycle Budget
scenario: A Cortex-M4 running at 80 MHz must classify sensor windows every 20 ms. The model requires 1.6 million MACs. The CMSIS-NN kernel sustains 1 MAC/cycle for this operator mix.
question: Does a 1.6M-MAC TinyML model fit a 20 ms deadline on an 80 MHz Cortex-M4 before preprocessing?
details:
  realistic_solution: The deadline provides 80 MHz x 20 ms = 1.6 million cycles. At 1 MAC/cycle, the model consumes the entire budget, leaving no time for preprocessing, I/O, or RTOS overhead. It is not safe without optimization or a longer period.
  common_mistake: |
    **The Pitfall:** Approving a system architecture where inference consumes 100% of the CPU cycle budget.
    **The Rationale:** Candidates calculate that cycles required exactly equal cycles available, failing to leave headroom for OS overhead or peripheral interrupts.
    **The Consequence:** The system will inevitably miss real-time deadlines because zero cycles remain for DMA handling, context switching, or sensor I/O.
  napkin_math: |
    1. **Assumptions & Constraints:** 80 MHz CPU clock = 80,000,000 cycles/sec. Deadline = 20 ms = 0.020 seconds. Model requirement = 1.6M MACs. Throughput = 1 MAC/cycle.
    2. **Calculations:** Available cycles in deadline = 80,000,000 * 0.020 = 1,600,000 cycles. Required cycles for inference = 1,600,000 MACs * 1 cycle/MAC = 1,600,000 cycles. Available Headroom = 1,600,000 - 1,600,000 = 0 cycles.
    3. **Conclusion & Interpretation:** **Result: Compute Starvation.** The model consumes 100% of the budget. It is fundamentally unviable as it leaves 0 cycles for preprocessing, RTOS ticks, or sensor I/O.
