title: The Keyword Spotter's Battery Budget
scenario: You are designing a battery-powered keyword-spotting device using a Cortex-M4 microcontroller
  powered by a **720 mWh battery**. The device wakes up to analyze a 0.5-second audio clip for a keyword,
  a process that consumes 40 mW. This check happens once every 5 seconds. When not active, the device
  is in a deep sleep mode, consuming just 5 µW.
question: "What average power and battery life result from checking 0.5-second audio clips every 5 seconds on a 720 mWh battery?"
details:
  realistic_solution: The correct approach is to calculate the time-weighted average power across one
    full cycle. The device is active for 0.5s and sleeps for the remaining 4.5s of its 5-second period.
    The average power is dominated by the active phase but amortized over the full period.
  common_mistake: A common mistake is to calculate battery life based only on the active power consumption,
    completely ignoring the long periods of deep sleep. This leads to a wildly pessimistic estimate. Another
    error is to incorrectly average the power values without weighting them by time, or to confuse power
    (mW) with energy (mWh) and battery capacity (mAh).
  napkin_math: "1. **Calculate time durations for one period:**\n   - t_active = 0.5 s, t_sleep = 4.5\
    \ s, t_period = 5.0 s.\n2. **Energy per cycle:**\n   - E_active = P_active × t_active = 40 mW × 0.5\
    \ s = 20 mJ.\n   - E_sleep = P_sleep × t_sleep = 0.005 mW × 4.5 s = 0.0225 mJ.\n   - E_total = 20\
    \ + 0.0225 = 20.02 mJ.\n3. **Average power:**\n   - P_avg = E_total / t_period = 20.02 mJ / 5.0 s\
    \ = **4.0 mW**.\n4. **Duty cycle effectiveness:**\n   - Reduction factor: 40 mW / 4.0 mW = 10× → duty\
    \ cycling reduces average power by 10×.\n5. **Battery Life:**\n   - Lifetime = Battery Capacity /\
    \ P_avg = 720 mWh / 4.0 mW = 180 hours = 7.5 days."
  options:
  - ~18 hours
  - ~36 hours
  - ~7.5 days
  - ~2.5 days
  correct_index: 2
