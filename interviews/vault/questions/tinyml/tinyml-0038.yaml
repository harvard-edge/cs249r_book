title: The Keyword Spotter's Battery Budget
scenario: You are designing a battery-powered keyword-spotting device using a Cortex-M4 powered by a 720 mWh battery. The device wakes up to analyze a 0.5-second audio clip for a keyword, consuming 40 mW. This check happens once every 5 seconds. When not active, the device is in a deep sleep mode, consuming just 5 µW.
question: What average power and battery life result from checking 0.5-second audio clips every 5 seconds on a 720 mWh battery?
details:
  realistic_solution: The correct approach is to calculate the time-weighted average power across one full cycle. The device is active for 0.5s and sleeps for the remaining 4.5s of its 5-second period. The average power is dominated by the active phase but amortized over the full period.
  common_mistake: |
    **The Pitfall:** Calculating battery life based only on the active power consumption or confusing mW with mWh.
    **The Rationale:** Candidates often forget to time-weight the active and sleep power across the full cycle period.
    **The Consequence:** This leads to a wildly pessimistic estimate of battery life, drastically altering hardware or battery sizing decisions.
  napkin_math: |
    * **Time Durations:** Active = 0.5 s, Sleep = 4.5 s, Period = 5.0 s.
    * **Energy per Cycle:** 
      * Active Energy = 40 mW * 0.5 s = 20 mJ.
      * Sleep Energy = 0.005 mW * 4.5 s = 0.0225 mJ.
      * Total Energy = 20.0225 mJ.
    * **Average Power:** 20.0225 mJ / 5.0 s = **4.0 mW**.
    * **Battery Life:** 720 mWh / 4.0 mW = 180 hours = **7.5 days**.
  options:
  - ~18 hours
  - ~36 hours
  - ~7.5 days
  - ~2.5 days
  correct_index: 2
