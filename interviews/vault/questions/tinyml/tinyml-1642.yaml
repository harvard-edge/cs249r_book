title: MCU Duty Cycling Impact
scenario: A Cortex-M4 running a wake-word detector consumes 10mW when active and 10uW
  in deep sleep.
question: Evaluate the average power if the MCU wakes every 100ms for 5ms to process
  audio, and verify if it meets a 1mW budget.
visual:
  kind: svg
  path: tinyml-1642.svg
  alt: A square wave timeline showing 5ms active peaks at 10mW and 95ms troughs at
    10uW.
  caption: Power consumption timeline over one 100ms cycle.
details:
  realistic_solution: The active duty cycle is 5ms / 100ms = 5%. The sleep duty cycle
    is 95%. Average power = (0.05 * 10mW) + (0.95 * 0.01mW) = 0.5mW + 0.0095mW = 0.5095mW.
    This safely meets the 1mW budget.
  common_mistake: Ignoring the sleep power completely or incorrectly calculating the
    active time fraction.
  napkin_math: 0.05 * 10 + 0.95 * 0.01 = 0.5095 < 1
