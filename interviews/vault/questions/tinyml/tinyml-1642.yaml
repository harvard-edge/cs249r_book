title: MCU Duty Cycling Impact
scenario: A microcontroller running a wake-word detector consumes 10mW when active and 10uW in deep sleep.
question: Evaluate the average power if the MCU wakes every 100ms for 5ms to process audio, and verify if it meets a 1mW budget.
visual:
  kind: svg
  path: tinyml-1642.svg
  alt: A square wave timeline showing 5ms active peaks at 10mW and 95ms troughs at 10uW.
  caption: Power consumption timeline over one 100ms cycle.
details:
  realistic_solution: The active duty cycle is 5ms / 100ms = 5%. The sleep duty cycle is 95%. Average power = (0.05 * 10mW) + (0.95 * 0.01mW) = 0.5mW + 0.0095mW = 0.5095mW. This safely meets the 1mW budget.
  common_mistake: |
    **The Pitfall:** Ignoring sleep power entirely or botching the duty cycle fraction calculation.
    **The Rationale:** Candidates fail to normalize the times (e.g. 5ms active vs 95ms sleep) into proper percentage weights.
    **The Consequence:** Delivering an inaccurate power profile that causes the product design team to over-spec or under-spec the battery capacity.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Active Power: 10 mW.
       - Sleep Power: 10 µW (0.01 mW).
       - Active Duration: 5 ms.
       - Total Cycle Duration: 100 ms.
       - Average Power Budget: 1 mW.
    2. **Calculations:**
       - Active Duty Cycle: 5 ms / 100 ms = 0.05 (5%).
       - Sleep Duty Cycle: 95 ms / 100 ms = 0.95 (95%).
       - Average Power: (0.05 * 10 mW) + (0.95 * 0.01 mW) = 0.5 mW + 0.0095 mW = 0.5095 mW.
    3. **Conclusion & Interpretation:**
       - **Result: Energy-Bound.** The average power is 0.5095 mW, safely meeting the 1 mW constraint through duty cycling.
