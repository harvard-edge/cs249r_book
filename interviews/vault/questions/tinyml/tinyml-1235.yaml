title: Corstone-300 NPU Power Bottleneck and DVFS Optimization
scenario: We are deploying a continuous vibration monitoring CNN on an ARM Cortex-M7
  + Ethos-U55 (Corstone-300) subsystem. The system runs from a coin cell battery with
  a strict peak power cap of 50mW to prevent brownouts. During peak inference, the
  480 MHz M7 and the Ethos-U55 (configured for 256 MAC/cycle) concurrently access
  the shared 512 KB SRAM, causing the system to draw 70mW and reset. Diagnose this
  power bottleneck and quantify a power optimization strategy to stay under the 50mW
  cap without missing the 50ms latency SLA.
question: How would you diagnose this power bottleneck and quantify a power optimization
  strategy to stay under the 50mW cap without missing the 50ms latency SLA?
details:
  realistic_solution: The optimal approach is asymmetric DVFS and execution phasing.
    Since the M7 and U55 share the 512 KB SRAM, concurrent active states cause memory
    contention and high power peaks. The solution is to drop the M7 frequency and
    voltage during the NPU inference phase, delegating the tensor execution heavily
    to the Ethos-U55 while minimizing the CPU's active power contribution.
  common_mistake: Candidates often suggest lowering the clock frequency of the entire
    SoC, which reduces peak power but increases inference time linearly. This fails
    to address the concurrent memory access bottleneck and often increases the total
    energy-per-inference due to prolonged static power leakage.
  napkin_math: 'Baseline peak power: M7 at 480 MHz draws 40mW, Ethos-U55 draws 30mW
    (Total = 70mW, which exceeds the 50mW cap). Applying the CMOS power equation (P
    ∝ f * V^2): scaling the M7 clock from 480 MHz to 120 MHz (4x reduction) permits
    a 20% voltage reduction. The M7 dynamic power becomes 40mW * (1/4) * (0.8)^2 =
    6.4mW. The Ethos-U55 continues processing 256 MAC/cycle at 30mW from the shared
    512 KB SRAM. Total peak power drops to 36.4mW, satisfying the 50mW cap. At 10ms
    per inference, energy-per-inference is 36.4mW * 10ms = 0.364mJ.'
