title: RTOS Inference Interruption
scenario: An embedded vibration sensor running a TinyML anomaly detector experiences
  unpredictable inference latency spikes every exactly 10 seconds.
question: Identify the standard embedded software feature that disrupts the deterministic
  execution time of the inference thread.
details:
  realistic_solution: The system is being preempted by a higher-priority hardware
    interrupt or RTOS background task, such as a watchdog timer or scheduled sensor
    polling. In strict priority-based RTOS scheduling, a high-priority Interrupt Service
    Routine (ISR) will force the lower-priority ML inference thread to pause, creating
    latency spikes.
  common_mistake: Assuming thermal throttling or garbage collection, which are virtually
    non-existent in bare-metal or simple RTOS microcontrollers.
  napkin_math: 1 high-priority task preempts lower tasks.
