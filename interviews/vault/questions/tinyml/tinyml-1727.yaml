title: RTOS Inference Interruption
scenario: An embedded vibration sensor running a TinyML anomaly detector experiences unpredictable inference latency spikes exactly every 10 seconds.
question: Identify the standard embedded software feature that disrupts the deterministic execution time of the inference thread.
details:
  realistic_solution: The system is being preempted by a higher-priority hardware interrupt or RTOS background task, such as a watchdog timer or scheduled sensor polling. In strict priority-based RTOS scheduling, a high-priority Interrupt Service Routine (ISR) will force the lower-priority ML inference thread to pause, creating latency spikes.
  common_mistake: |
    **The Pitfall:** Assuming thermal throttling or garbage collection causes the latency spikes.
    **The Rationale:** Candidates from higher-level software backgrounds apply concepts from cloud or mobile development (like JVM pauses or CPU throttling) to microcontrollers.
    **The Consequence:** Wasting time debugging non-existent OS features instead of checking hardware interrupt priorities or RTOS task schedules.
  napkin_math: |
    - **Execution Model:** Strict priority-based RTOS scheduling.
    - **Interruption Source:** A higher-priority Interrupt Service Routine (ISR) or scheduled background task (e.g., polling every 10s).
    - **Conclusion:** **The 10-second periodic spike is caused by a higher-priority task preempting the lower-priority ML inference thread.**
