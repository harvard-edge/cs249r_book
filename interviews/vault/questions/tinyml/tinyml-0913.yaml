title: 'TinyML TCO Mastery: 10-Year TinyML Infrastructure for Smart City'
scenario: 'Build a 10-year TCO model for a smart city deploying 100,000 TinyML sensors
  (mix: 60% Cortex-M4 for simple tasks, 30% ESP32-S3 for WiFi tasks, 10% Cortex-M7+Ethos-U55
  for complex AI). Unit costs: M4=$3, ESP32=$5, M7+Ethos=$12. Average power: 50μA,
  100μA, 200μA. All use LoRaWAN ($0.05/device/month). Hardware refresh at year 5.
  Calculate 10-year NPV at 6% discount.'
question: How would you calculate 10-year NPV at 6% discount?
details:
  realistic_solution: 'HW (year 0): 60K*$3+30K*$5+10K*$12=$180K+$150K+$120K=$450K.
    Annual LoRa: 100K*$0.05*12=$60K/yr. Annual power: 60K*50μA*3V*8760*$0.10/1000+30K*100μA*3V*8760*$0.10/1000+10K*200μA*3V*8760*$0.10/1000=60K*$0.01314+30K*$0.02628+10K*$0.05256=$788.4+$788.4+$525.6=$2,102/yr.
    Model dev+maint: $100K/yr. HW refresh (year 5): $450K. Annual cost: $60K+$2.1K+$100K=$162.1K/yr.
    NPV: Y0=$450K. Y1-10 annual: $162.1K. NPV_ops=$162.1K*(1-(1.06)^-10)/0.06=$162.1K*7.36=$1,193K.
    Y5 refresh=$450K/1.06^5=$450K/1.338=$336.3K. Total NPV=$450K+$1,193K+$336.3K=$1,979.3K≈$2M.'
  common_mistake: Not including Year 5 hardware refresh (replacing 100K sensors adds
    major CapEx in year 5) and applying NPV only to operational costs without discounting
    the refresh CapEx.
  napkin_math: 'HW Y0: $450K. Annual opex: $162.1K. Y5 refresh: $450K. NPV factor
    10yr@6%: 7.36. NPV_opex: $162.1K*7.36=$1,193K. NPV_refresh: $450K/1.338=$336K.
    Total NPV=$450+$1193+$336=$1,979K≈$2M. Per sensor 10yr NPV: $2M/100K=$20. Cloud
    alternative (100K sensors * 144 inf/day * 3650days * $0.001/1000... actually cloud
    for 100K sensors sending to cloud is data cost): 100K*$1/sensor/month (cellular)=$100K/month=$12M/yr!
    Cloud ruled out. LoRa+on-device: $2M/10yr. Cloud cellular: $120M/10yr. 60x cheaper
    on-device+LoRaWAN for this scale.'
