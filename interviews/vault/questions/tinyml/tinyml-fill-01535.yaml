title: 'nRF5340 TinyML Anomaly Detection: Data Curation Pipeline'
scenario: You are designing an always-on anomaly detection system for industrial equipment using a tinyML
  model running on a Nordic nRF5340 microcontroller (128 MHz CPU, 256 KB SRAM, 1 MB flash). The sensor
  data (e.g., vibration, temperature) is streaming at 100 Hz, with each sample being 16 bytes. You need
  to collect a labeled dataset to train this model. Design a data curation and labeling pipeline that
  ensures high-quality, relevant data while respecting the nRF5340's operational constraints for any on-device
  processing involved in data selection for active learning, and considering the limited storage for raw
  data and model updates. How would you approach data selection, annotation workflows, inter-annotator
  agreement, active learning strategies, and dataset bias given these constraints and the need for continuous
  model improvement?
question: "How should an nRF5340 data curation pipeline select, annotate, and transfer high-value anomaly samples under 256 KB SRAM?"
details:
  realistic_solution: Implement an active learning pipeline where the nRF5340 performs very lightweight
    on-device inference or feature extraction (e.g., simple statistical aggregates, thresholding on raw
    sensor data, or a highly compressed anomaly score) to identify 'uncertain' or 'novel' data samples.
    These selected samples are then prioritized for off-device transfer (via BLE with minimal metadata
    to conserve bandwidth) and human annotation. Develop clear annotation guidelines and enforce inter-annotator
    agreement checks using metrics like Kappa. For data selection, prioritize samples that are critical
    for edge cases or model improvements rather than bulk collection, and regularly analyze the labeled
    dataset for biases using performance metrics across different operational states.
  common_mistake: Failing to account for the nRF5340's severe memory (256 KB SRAM) and flash (1 MB) constraints
    during data selection, leading to an over-reliance on complex features or model architectures that
    cannot be deployed or efficiently updated on-device. Another common mistake is not designing an efficient
    active learning loop, resulting in redundant or uninformative data being sent for annotation, or over-collecting
    data that exacerbates storage limitations.
  napkin_math: The sensor data stream is 100 Hz * 16 bytes/sample = 1.6 KB/s. Storing even 1 minute of
    raw data (96 KB) consumes a significant portion of the 256 KB SRAM or valuable 1 MB flash. A naive
    raw data collection without on-device filtering would generate ~135 MB per day, quickly overflowing
    any practical storage. Thus, on-device data selection is critical. If only 0.1% of 'interesting' data
    is selected via active learning, this reduces the daily transfer to ~135 KB, making BLE transfer feasible
    and significantly reducing annotation load. The ML model footprint must be aggressively optimized
    to fit within the 1 MB flash, leaving minimal space for application code and any data buffer for selected
    samples.
