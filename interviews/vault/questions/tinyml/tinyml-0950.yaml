title: TinyML Federated Update Design
scenario: A fleet of battery sensors cannot upload raw data but can occasionally exchange 4 KB summaries through a gateway.
question: Design a federated update path that respects the 4 KB communication limit per sensor.
details:
  realistic_solution: Use local training or calibration on device, compress updates into small sketches, Top-K sparsification, or adapter deltas, aggregate at the gateway, and broadcast only compact global updates. Keep raw data local and make participation conditional on battery and link quality.
  common_mistake: |
    **The Pitfall:** Attempting to federate full dense model gradients.
    **The Rationale:** Candidates take cloud-based federated learning algorithms and blindly apply them to microcontrollers without calculating the radio budget.
    **The Consequence:** Buffer overflows, massive packet loss, and immediate battery exhaustion from radio transmission.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Standard Dense Model Size: ~80 KB.
       - Communication Budget: 4 KB per sensor.
    2. **Calculations:**
       - Compression Requirement: 80 KB / 4 KB = 20x compression ratio.
    3. **Conclusion & Interpretation:**
       - **Result: Communication-Bound.** Updates must use highly sparse sketches, Top-K Sparsification, or adapter deltas to achieve the mandatory 20x compression ratio over the gateway link.
