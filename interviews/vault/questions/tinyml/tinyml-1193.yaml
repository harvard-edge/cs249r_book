title: Ethos-U55 Memory Hierarchy Design
scenario: You are designing a vision-based anomaly detection system on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform. The system operates at 480 MHz and features exactly 512 KB of SRAM, which is shared between the M7 and the U55 NPU. You need to deploy a 1.5 MB quantized CNN, meaning weights must reside in external QSPI Flash.
question: How should Corstone-300 stream Flash-resident CNN weights and schedule SRAM to keep the Ethos-U55 utilized?
details:
  realistic_solution: The optimal design implements depth-first scheduling (layer fusion) to keep intermediate activations entirely within the 512 KB SRAM, preventing intermediate trips to Flash. The system should use double-buffered DMA transfers for weights, streaming them from QSPI Flash into a dedicated SRAM partition while the U55 computes the previous chunk, utilizing the U55's built-in weight decoder to decompress weights on the fly.
  common_mistake: |
    **The Pitfall:** Assuming the NPU's peak compute dictates inference time.
    **The Rationale:** Hardware spec sheets heavily advertise MACs/cycle, obscuring the fact that external memory bandwidth is the true bottleneck.
    **The Consequence:** The massively powerful NPU sits idle 98% of the time waiting for weights to stream from slow external Flash, while RTOS interrupts get blocked by SRAM contention.
  napkin_math: |
    *   **Peak Compute:** U55 at 256 MAC/cycle × 480 MHz = ~122.8 GMAC/s.
    *   **Compute Time:** 5M MAC layer with 100 KB weights takes ~19,531 cycles = 40.7 µs.
    *   **Memory Transfer Time:** Fetching 100 KB from 50 MB/s QSPI Flash takes 2,000 µs (2 ms).
    *   **Bottleneck:** Memory transfer is **~50x slower** than compute.
    *   **Partitioning:** Divide 512 KB SRAM: 128 KB for M7/RTOS, 256 KB for ping-pong activation buffers, 128 KB for double-buffered compressed weights.
    *   **Mitigation:** 4x weight compression reduces Flash read time to 500 µs per layer.
