title: Sparse Wake-Word Design for Nordic nRF5340
scenario: You are tasked with deploying an always-on wake-word detection model on a microcontroller. The application must run on the app core, constrained by 256 KB SRAM, 1 MB flash, and a tight power budget of ~5mA active. The current dense CNN model exceeds the SRAM limit when combined with the BLE 5.3 stack.
question: How would you design a pruning and sparsity strategy that leverages the hardware's architecture to meet memory and power constraints without degrading accuracy?
details:
  realistic_solution: The optimal design uses structured pruning (like channel or filter pruning) to reduce the model footprint while maintaining dense memory access patterns suitable for the CPU. The candidate should evaluate combining structured pruning with quantization to comfortably fit activations alongside the RTOS and BLE stack within the 256 KB SRAM.
  common_mistake: |
    **The Pitfall:** Proposing unstructured pruning to achieve maximum theoretical sparsity.
    **The Rationale:** Candidates ignore that the MCU lacks dedicated sparse matrix hardware to accelerate unstructured patterns.
    **The Consequence:** Control-flow overhead and cache misses actually increase inference latency and active power consumption.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline model: 180 KB peak activations, 600 KB weights.
       - Total SRAM: 256 KB.
       - Required Optimization: Fit BLE Stack and Activations in SRAM.
    2. **Calculations:**
       - Current SRAM usage: 180 KB takes 70% of 256 KB SRAM, starving the BLE stack.
       - Apply 50% structured channel pruning.
       - Peak activations drop to 90 KB (180 KB / 2).
    3. **Conclusion & Interpretation:**
       - **Result: 90 KB footprint safely accommodates the network stack and reduces MAC active time.**
