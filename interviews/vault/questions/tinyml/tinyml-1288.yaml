title: Estimating Inference Latency on Corstone-300
scenario: You are designing an always-on keyword spotting system for a smart home device using an ARM Cortex-M7 + Ethos-U55 (Corstone-300) platform. The M7 core operates at 480 MHz, and the Ethos-U55 NPU is configured for 256 MACs/cycle, with both sharing a limited 512 KB SRAM.
question: How should you estimate Corstone-300 inference latency for a 5M-MAC CNN while accounting for shared-SRAM bandwidth bottlenecks?
details:
  realistic_solution: The candidate should calculate the compute-bound latency first, but immediately recognize that TinyML workloads on shared-SRAM architectures are often memory-bound. They must specify a design that pins critical weights in SRAM and accounts for the bandwidth required to feed the NPU 256 MACs per cycle. The solution should break down the latency into NPU compute time and SRAM fetch time, noting that actual performance depends heavily on the memory controller and the compiler's ability to overlap memory fetches with computation.
  common_mistake: |
    **The Pitfall:** Calculating compute time based purely on peak NPU MAC throughput.
    **The Rationale:** Candidates divide total MACs by peak throughput, ignoring the overhead of loading weights/activations from SRAM.
    **The Consequence:** The latency estimate is highly unrealistic, and memory bottlenecks are completely missed.
  napkin_math: |
    - Ethos-U55 Peak Throughput: 256 MACs/cycle * 480 MHz = 122.88 GMAC/s.
    - Ideal Compute Time: 5,000,000 MACs / 122.88 GMAC/s = 0.0407 ms.
    - Determine data requirement: 256 MACs/cycle requires fetching 512 bytes of data per cycle (8-bit).
    - Compare to bandwidth: If SRAM provides only 8 bytes per cycle, the system is severely memory-bandwidth bound.
    - **The true latency will be dictated by memory fetches rather than raw compute, significantly exceeding 40.7 microseconds.**
