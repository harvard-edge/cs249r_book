title: Estimating Inference Latency on Corstone-300
scenario: You are designing an always-on keyword spotting system on a Corstone-300 platform (Cortex-M7 + Ethos-U55). The M7 runs at 480 MHz, and the Ethos-U55 NPU is configured for 256 MACs/cycle. Both share a 512 KB SRAM.
question: How should you estimate Corstone-300 inference latency for a 5M-MAC CNN while accounting for shared-SRAM bandwidth bottlenecks?
details:
  realistic_solution: The candidate should calculate the compute-bound latency first, but immediately recognize that TinyML workloads on shared-SRAM architectures are often memory-bound. They must specify a design that pins critical weights in SRAM and accounts for the bandwidth required to feed the NPU 256 MACs per cycle. The solution should break down the latency into NPU compute time and SRAM fetch time, noting that actual performance depends heavily on the memory controller and the compiler's ability to overlap memory fetches with computation.
  common_mistake: |
    **The Pitfall:** Calculating expected inference time by dividing total MACs directly by the theoretical peak NPU MAC throughput.
    **The Rationale:** Candidates treat the NPU as an isolated unit with infinite memory bandwidth, completely ignoring the shared SRAM bottleneck.
    **The Consequence:** Latency estimates are orders of magnitude too low, resulting in deployed models that stutter, drop audio frames, and fail real-time deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:** Model = 5M MACs. NPU Peak Throughput = 256 MACs/cycle * 480 MHz = 122.88 GMAC/s. To achieve peak throughput, the NPU requires 512 bytes/cycle of INT8 data.
    2. **Calculations:** Ideal Compute Time = 5,000,000 MACs / 122,880,000,000 MAC/s = 0.0407 ms. Shared SRAM bandwidth limit: Assume a typical 64-bit bus yielding 8 bytes/cycle. Data starvation ratio = 512 bytes required / 8 bytes provided = 64x deficit.
    3. **Conclusion & Interpretation:** **Result: Memory-Bandwidth Starved.** The system cannot feed the NPU fast enough. The actual inference latency will be entirely dictated by the 8 bytes/cycle memory fetch limit, severely bottlenecking the NPU and making the 0.0407ms estimate wildly inaccurate.
