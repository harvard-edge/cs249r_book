title: Scaling Dataset Annotation for ESP32-S3 TinyML System
scenario: You are building a tinyML system on an ESP32-S3 for real-time sound event detection. You've gathered 100,000 raw audio snippets, each 5 seconds long. Due to the limited 512 KB SRAM on the ESP32-S3, your deployed model can only process snippets up to 0.5 seconds long. This necessitates a preprocessing step where each 5-second raw snippet is split into 10 smaller 0.5-second windows for annotation and model training. Your annotation team consists of 2 annotators, each working 8 hours a day, 5 days a week. Each 0.5-second window takes 0.5 minutes to review and label.
question: How many 5-second audio snippets can two annotators label per week after splitting each into ten 0.5-second windows?
details:
  realistic_solution: 'Implement a robust data pipeline that intelligently manages the flow of raw data to preprocessed windows and then to the annotation queue. Develop clear dashboards to monitor annotator workload, throughput, and inter-annotator agreement. Regularly review the efficiency of the active learning strategy (if used) to ensure it''s effectively reducing the total number of samples needing review without sacrificing model performance. The preprocessing logic must be highly optimized for the resource constraints of the ESP32-S3, influencing the decision on window size.'
  common_mistake: |
    **The Pitfall:** Overestimating annotation throughput by ignoring the data windowing multiplier.
    **The Rationale:** Candidates calculate raw snippet volume but forget that the memory constraints of the ESP32-S3 necessitate a 10x expansion in the number of annotation tasks per snippet.
    **The Consequence:** The data labeling pipeline bottlenecks, delaying model training and deployment.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 2 annotators, 8 hrs/day, 5 days/week.
       - Time per window review: 0.5 minutes.
       - Raw snippet: 5 seconds.
       - Processing window: 0.5 seconds (10 windows per snippet).
    2. **Calculations:**
       - Total annotation minutes/week: 2 * 8 * 60 * 5 = 4,800 minutes.
       - Total 0.5s windows annotatable/week: 4,800 / 0.5 = 9,600 windows.
       - Max raw 5s snippets managed: 9,600 / 10 = 960 snippets.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound (Human).** The team can effectively preprocess and label a maximum of 960 raw 5-second snippets per week.
