title: Scaling Dataset Annotation for ESP32-S3 TinyML System
scenario: You are building a tinyML system on an ESP32-S3 (240 MHz dual-core, 512
  KB SRAM, 8 MB PSRAM) for real-time sound event detection. The challenge is collecting
  a diverse and representative dataset for specific environmental sounds. You've gathered
  100,000 raw audio snippets, each 5 seconds long (16kHz, mono, 16-bit PCM, resulting
  in ~160KB per snippet). Due to the limited 512 KB SRAM on the ESP32-S3, your deployed
  model can only process snippets up to 0.5 seconds long. This necessitates a preprocessing
  step where each 5-second raw snippet is split into 10 smaller 0.5-second windows
  for annotation and model training. Your annotation team consists of 'A' annotators,
  each working 8 hours a day, 5 days a week. Each 0.5-second window takes 'T_review_minutes'
  minutes to review and label. Formulate an equation to calculate the *maximum number
  of raw 5-second snippets* that your team can effectively preprocess and label per
  week given the annotator capacity. Then, calculate this number for A = 2 annotators
  and T_review_minutes = 0.5 minutes per 0.5-second window.
question: How many 5-second audio snippets can two annotators label per week after
  splitting each into ten 0.5-second windows?
details:
  realistic_solution: Implement a robust data pipeline that intelligently manages
    the flow of raw data to preprocessed windows and then to the annotation queue.
    Develop clear dashboards to monitor annotator workload, throughput, and inter-annotator
    agreement. Regularly review the efficiency of the active learning strategy (if
    used) to ensure it's effectively reducing the total number of samples needing
    review without sacrificing model performance. The preprocessing logic must be
    highly optimized for the resource constraints of the ESP32-S3, influencing the
    decision on window size.
  common_mistake: Overestimating the annotation throughput or failing to account for
    the overhead of preprocessing and data management, leading to a bottleneck in
    the data labeling pipeline. Another common mistake is not considering the memory
    constraints (SRAM/PSRAM) on the target device when designing the data windowing
    strategy, which directly impacts the annotation unit.
  napkin_math: '1. **Total available annotation minutes per week**: `Total_Annotation_Minutes_Per_Week
    = A * 8 hours/day * 60 minutes/hour * 5 days/week`.

    2. **Total 0.5-second windows annotatable per week**: `Total_Windows_Annotated_Per_Week
    = Total_Annotation_Minutes_Per_Week / T_review_minutes`.

    3. **Maximum raw 5-second snippets managed per week**: `Max_Raw_Snippets_Per_Week
    = Total_Windows_Annotated_Per_Week / 10` (since each raw 5-second snippet yields
    10 smaller 0.5-second windows).


    **Calculation for A = 2 annotators and T_review_minutes = 0.5 minutes/window:**

    `Total_Annotation_Minutes_Per_Week = 2 * 8 * 60 * 5 = 4800 minutes`.

    `Total_Windows_Annotated_Per_Week = 4800 / 0.5 = 9600 windows`.

    `Max_Raw_Snippets_Per_Week = 9600 / 10 = 960 raw snippets`.'
