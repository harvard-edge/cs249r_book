title: The Depthwise Separable Dividend
scenario: You're optimizing a CNN layer for a low-power microcontroller. The input feature map is 16x16
  with 32 channels. The layer must produce an output feature map of the same dimensions but with 64 channels,
  using a 3x3 kernel. Your baseline is a standard 2D convolution. Explain the approximate computational
  savings (in terms of Multiply-Accumulate operations) you would achieve by replacing it with a depthwise
  separable convolution.
details:
  realistic_solution: Replacing the standard convolution with a depthwise separable one yields approximately
    an 8x reduction in MAC operations. The standard layer requires ~4.7M MACs, while the separable layer
    requires only ~0.6M MACs. This saving is critical for meeting the latency and power budgets of a TinyML
    device, as it directly reduces the number of cycles the CPU must be active.
  common_mistake: Engineers often forget that a depthwise separable convolution is a two-step process
    (depthwise + pointwise) and only calculate the cost of the first (depthwise) step, leading to a wildly
    overestimated performance gain. Another common error is to confuse the reduction in parameters with
    the reduction in MACs, which are related but not identical.
  napkin_math: 1. **Standard Convolution Cost:** `Cost = K_h × K_w × C_in × C_out × H_out × W_out`
  options:
  - An ~64x reduction in MACs.
  - A ~2x reduction in MACs.
  - An ~8x reduction in MACs.
  - No significant saving; the MACs are roughly the same.
  correct_index: 2
