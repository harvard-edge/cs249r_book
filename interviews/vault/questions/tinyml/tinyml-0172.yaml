title: 'The Depthwise Separable Dividend'
scenario: 'You''re optimizing a CNN layer for a low-power microcontroller. The input feature map is 16x16 with 32 channels. The layer must produce an output feature map of the same dimensions but with 64 channels, using a 3x3 kernel. Your baseline is a standard 2D convolution.'
question: 'What are the approximate computational savings (in terms of Multiply-Accumulate operations) you would achieve by replacing it with a depthwise separable convolution?'
details:
  realistic_solution: 'Replacing the standard convolution with a depthwise separable one yields approximately an 8x reduction in MAC operations. The standard layer requires K * K * C_in * C_out * H * W = 3 * 3 * 32 * 64 * 16 * 16 = 4,718,592 MACs. The separable layer requires (K * K * C_in * H * W) + (C_in * C_out * H * W) = (3 * 3 * 32 * 16 * 16) + (32 * 64 * 16 * 16) = 73,728 + 524,288 = 598,016 MACs. This 7.89x (approx 8x) saving is critical for meeting the latency and power budgets of a TinyML device, as it directly reduces the number of cycles the CPU must be active.'
  common_mistake: |
    **The Pitfall:** Only calculating the cost of the depthwise step and ignoring the pointwise step.
    **The Rationale:** Engineers forget that depthwise separable convolution is a two-step process.
    **The Consequence:** They wildly overestimate the performance gain, leading to incorrect architecture choices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input: 16x16x32, Output: 16x16x64, Kernel: 3x3.
    - Baseline: Standard 2D convolution vs Depthwise Separable.

    **Calculations:**
    - Standard Convolution: 3 * 3 * 32 * 64 * 16 * 16 = 4,718,592 MACs.
    - Depthwise Convolution: 3 * 3 * 32 * 16 * 16 = 73,728 MACs.
    - Pointwise Convolution: 1 * 1 * 32 * 64 * 16 * 16 = 524,288 MACs.
    - Separable Total: 73,728 + 524,288 = 598,016 MACs.

    **Conclusion & Interpretation:**
    - **Result: 7.89x reduction (Compute Bound)**. The MAC reduction from ~4.7M to ~0.6M directly translates to lower active cycle time and energy consumption.
  options:
  - 'An ~64x reduction in MACs.'
  - 'A ~2x reduction in MACs.'
  - 'An ~8x reduction in MACs.'
  - 'No significant saving; the MACs are roughly the same.'
