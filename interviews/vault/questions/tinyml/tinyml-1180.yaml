title: Calculate Vision Pipeline Slack Time
scenario: You are deploying a 30 FPS object detection pipeline on an ARM Cortex-M7 + Ethos-U55 (Corstone-300) system, requiring a strict 33.33ms frame deadline. The Cortex-M7 (running at 480 MHz) sequentially takes 8ms to crop and normalize the camera image before handing it over to the NPU. The Ethos-U55 is configured for 256 MACs/cycle and shares the 512 KB SRAM with the M7. The model requires 400 million MAC operations.
question: How much frame slack remains for the 30 FPS Corstone-300 object detector after M7 preprocessing and NPU inference?
details:
  realistic_solution: The correct approach calculates the NPU's effective MAC throughput by multiplying the clock speed, MACs/cycle, and the utilization factor. The model's total MACs are divided by this effective throughput to find the inference time. The total pipeline time is the sum of the M7 preprocessing time and NPU inference time, which is then subtracted from the 33.33ms deadline.
  common_mistake: |
    **The Pitfall:** Assuming 100% peak theoretical MAC throughput and ignoring CPU preprocessing.
    **The Rationale:** Candidates calculate NPU latency using marketing numbers (peak MACs) and forget that sequential CPU tasks block the critical path.
    **The Consequence:** Calculated latency is highly optimistic, leading to frame drops in production when SRAM contention and preprocessing take their toll.
  napkin_math: |
    - **Peak NPU Throughput**: 256 MACs/cycle × 480 MHz = 122.88 GMACs/sec.
    - **Effective Throughput**: 122.88 GMACs/sec × 0.5 (utilization factor) = 61.44 GMACs/sec (61.44M MACs/ms).
    - **NPU Inference Time**: 400M MACs / 61.44M MACs/ms = 6.51 ms.
    - **Total Pipeline Time**: 8.00 ms (M7) + 6.51 ms (NPU) = 14.51 ms.
    - **Remaining Slack**: 33.33 ms (budget) - 14.51 ms = **18.82 ms**.
