title: Architecting Energy-Constrained Audio Inference
scenario: You are designing an always-on acoustic event detection system on a multi-core edge MCU. You must architect the compute pipeline and duty cycle strategy to determine if a 1.2 MMAC neural network can be deployed while meeting a strict 1-year battery life requirement.
question: Can the MCU run the 1.2 MMAC acoustic model for one-year battery life, and what duty-cycle architecture is needed?
details:
  realistic_solution: 'A strong L5 candidate will evaluate the compute cost by designing a cascaded architecture where the MCU remains in deep sleep and is woken by a low-power hardware interrupt. They will calculate the maximum allowed active duty cycle to process the model and design the system to buffer audio data efficiently, ensuring the high-speed app core runs for the minimum time required via a race-to-sleep strategy.'
  common_mistake: |
    **The Pitfall:** Ignoring the dynamic power cost of the application core.
    **The Rationale:** Candidates often look only at the SRAM and flash limits to check if the model fits, completely ignoring the system-level tradeoffs between race-to-sleep strategies and the active current penalty.
    **The Consequence:** The battery depletes in weeks instead of a year due to failing to evaluate the energy cost of the compute pipeline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Battery: 1000 mAh for 1 year (8760 hours).
       - MCU app core active current: ~5mA (5000 µA).
       - Core clock: 128 MHz.
       - Model size: 1.2 MMAC (~2.4 million cycles at 2 cycles/MAC).
    2. **Calculations:**
       - Average current budget: 1000 mAh / 8760 h = 114 µA.
       - Maximum active duty cycle: 114 µA / 5000 µA = 2.28%.
       - Allowed active time per second: 2.28% * 1000 ms = 22.8 ms.
       - Inference cycles: 2.4 million cycles = 18.7 ms at 128 MHz.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound but Feasible.** The model consumes 1.87% duty cycle out of the 2.28% budget, safely meeting the 1-year constraint while leaving ~0.4% duty cycle for BLE transmission and overhead.
