title: The Solar Harvesting Budget
scenario: You're designing a solar-powered wildlife monitor that runs image classification on a Cortex-M7. The device has a small solar panel (50mm x 50mm), a 0.47F supercapacitor, and no battery.
question: 'Design the power budget: when can you run inference, and how do you handle cloudy days?'
details:
  realistic_solution: Monitor the supercapacitor voltage to create a voltage-triggered duty cycle. Maintain full rate in direct sun and scale back dynamically to sub-1Hz inference rates during cloud cover to prevent brownouts.
  common_mistake: |
    **The Pitfall:** Assuming "Solar panel generates power during the day, so run inference during the day."
    **The Rationale:** Ignoring the massive mismatch between peak solar harvest rate and the peak energy cost of MCU inference.
    **The Consequence:** The device will drain its supercapacitor and brown out within 3 minutes on a cloudy day.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Solar Panel: 50x50mm (25 cm²). Efficiency: ~20%.
       - Supercap: 0.47F at 3.3V.
       - Inference cost: 25 mJ.
    2. **Calculations:**
       - Sunny Harvest: ~20 mW/cm² * 25 cm² * 0.20 = 100 mW.
       - Cloudy Harvest: ~10 mW.
       - Supercap Energy: 0.5 * 0.47F * (3.3V)² = 2.56 J (0.71 mWh).
       - Max Sunny Rate: 100 mW / 25 mJ = 4 inf/s.
       - Max Cloudy Rate: 10 mW / 25 mJ = 0.4 inf/s.
    3. **Conclusion & Interpretation:**
       **Result: 0.4 inf/s safe limit.** The system is **Energy-Harvesting-Bound**, requiring voltage-triggered duty cycling to prevent supercap drain.
