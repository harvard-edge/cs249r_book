title: The Solar Harvesting Budget
scenario: You're designing a solar-powered wildlife monitor that runs image classification on a Cortex-M7. The device has a small solar panel (50mm × 50mm), a 0.47F supercapacitor, and no battery.
question: Design the power budget: when can you run inference, and how do you handle cloudy days?
details:
  realistic_solution: 'Build the energy budget from physics. Sunny: ~100 mW harvest from 25 cm² panel, sustains ~4 inferences/s at 25 mJ each — supercap stays full. Cloudy: ~10 mW harvest, net drain if running at full rate. Supercap (0.71 mWh) drains in ~170 s at 15 mW net deficit. Solution: monitor supercap voltage and adaptively reduce inference rate. At 10 mW harvest, sustainable rate is ~0.4 inf/s. Implement a voltage-triggered duty cycle: full rate above 3.0V, reduced rate below 2.8V, sleep below 2.5V. This ensures the device never fully depletes and can resume when sun returns.'
  common_mistake: |
    **The Pitfall:** Assuming "Solar panel generates power during the day, so run inference during the day."
    **The Rationale:** Ignoring the massive mismatch between peak solar harvest rate and the peak energy cost of MCU inference.
    **The Consequence:** The device will drain its supercapacitor and brown out within 3 minutes on a cloudy day.
  napkin_math: |
    1. **Solar Panel Size:** 50mm × 50mm = 25 cm².
    2. **Sunny Harvest:** ~20 mW/cm² × 20% efficiency = **~100 mW**.
    3. **Cloudy Harvest:** ~10 mW (10× less).
    4. **Supercap Energy:** 0.5 × 0.47F × (3.3V)² = 2.56 J = **0.71 mWh**.
    5. **Inference Cost:** Assume 25 mJ per inference (Cortex-M7).
    6. **Sunny Rate:** 100 mW / 25 mJ = 4 inferences/s. (Supercap stays full).
    7. **Cloudy Rate:** 10 mW / 25 mJ = **0.4 inferences/s**.
    8. **Deficit Check:** If running at 1 inf/s (25 mW) during a cloudy day, net drain is 15 mW. Supercap drains in 2.56 J / 0.015 W = **~170 seconds**.
    9. **Conclusion:** Adaptive duty cycling based on supercap voltage is essential.
