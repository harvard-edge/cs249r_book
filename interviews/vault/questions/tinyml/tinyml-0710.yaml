title: The Double Buffering DMA Strategy
scenario: You're building a predictive maintenance system on a Cortex-M4 at 168 MHz. A vibration sensor
  streams 3-axis INT16 data over SPI at 3.2 kHz (19.2 KB/s). Your anomaly detection model processes 512-sample
  windows and takes 40ms to run. You observe that inference occasionally corrupts sensor data. Design
  a DMA double-buffering scheme and prove mathematically that it eliminates data loss.
question: "How would you design a DMA double-buffering scheme and prove mathematically that it eliminates data loss?"
details:
  realistic_solution: 'Allocate two buffers of equal size: Buffer A and Buffer B, each holding 512 samples
    × 6 bytes/sample = 3,072 bytes. Configure the DMA controller in double-buffer mode (STM32 DMA supports
    this natively with the `DBM` bit in `DMA_SxCR`):'
  common_mistake: '"Just use a large circular buffer — the CPU will always catch up." A circular buffer
    without synchronization still has a race condition: the DMA write pointer can lap the CPU read pointer
    during inference, silently overwriting unprocessed samples. The corruption isn''t a bug in the model
    — it''s stale data fed to the model.'
  napkin_math: 'Buffer size: 2 × 3,072 = 6,144 bytes (2.4% of 256 KB SRAM). Fill time: 160ms. Process
    time: 40ms. Utilization: 40/160 = 25%. Max overlap: 1 − 40/160 = 75%. Throughput: 1 inference
    per 160ms = 6.25 Hz (no overlap) or 1 per 160ms = 6.25 Hz (fill-limited overlap). Power: active 25%
    at 50 mW + sleep 75% at 10 µW = 12.5 mW average. On CR2032 (600 mWh effective): 600/12.5 = 48.0 hours
    — needs a larger battery for multi-day deployment.'
  options:
  - Use a large circular buffer (32 KB) in SRAM. The CPU will always catch up because inference (40ms)
    is faster than the fill time. No synchronization needed.
  - 'Allocate two 3,072-byte buffers (512 samples x 6 bytes/sample). Configure STM32 DMA in double-buffer
    mode (DBM bit). DMA fills Buffer A while CPU processes Buffer B, then swap. Fill time: 160ms. Process
    time: 40ms. Utilization: 25%. This mathematically guarantees no data loss because process time < fill
    time, and the buffers are hardware-isolated — DMA physically cannot write to the buffer the CPU is
    reading.'
  - 'Use a single buffer with an interrupt flag: the DMA sets a flag when complete, and the CPU polls
    the flag before reading. This prevents corruption because the CPU never reads during an active DMA
    transfer.'
  - Disable DMA during inference and re-enable it after. The 40ms gap in sensor data is acceptable because
    the vibration signal changes slowly at 3.2 kHz.
  correct_index: 1
