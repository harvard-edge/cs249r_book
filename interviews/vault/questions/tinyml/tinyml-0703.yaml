title: Flash Wear from Logging Frequency
scenario: >
  A TinyML sensor node logs inference results (32 bytes) to a circular buffer in a 2 MB external NOR flash (rated for 100,000 P/E cycles).
  The device runs 10 inferences per second, 24/7.
question: How long will 2 MB of 100K-cycle external NOR flash last when logging 32 bytes at 10 inferences per second?
details:
  realistic_solution: |
    NOR flash has a critical constraint: writes can only flip bits from 1 to 0. To write new data, you must first erase the sector (flip all bits to 1). Erase granularity for typical NOR flash is 4 KB sectors. Naive metadata pointer updates erase a sector on every write, wearing out extremely fast. Proper logging must use a write-ahead log or FRAM to avoid destroying the chip.
  common_mistake: |
    **The Pitfall:** Treating flash memory like standard RAM with infinite byte-level rewrite capability.
    **The Rationale:** Candidates calculate total byte throughput and divide by daily write rate, ignoring sector erase granularity.
    **The Consequence:** Estimating a 19.8-year lifespan for a system that will physically destroy its flash chip in 2.8 hours.
  napkin_math: |
    **Assumptions & Constraints:**
    - Logging rate: 32 bytes * 10/s.
    - NOR Flash: 2 MB, 100,000 P/E cycles, 4 KB erase sectors.
    - Naive implementation updates a pointer on every write.

    **Calculations:**
    - Writes per day: 10 writes/sec * 86,400 sec/day = 864,000 writes/day.
    - Pointer wear: Updating a naive pointer requires erasing its 4 KB sector on *every* write.
    - 864,000 sector erases/day.
    - Actual Lifespan: 100,000 cycles / 864,000 cycles/day = 0.115 days (~2.8 hours).

    **Conclusion & Interpretation:**
    - **Result: Erase-Cycle-Bound (2.8 Hours)**. The metadata sector fails almost immediately.
  options:
  - '19.8 years (calculating 200 GB total divided by 27.6 MB/day).'
  - '~2.8 hours because naive metadata pointer updates erase a 4 KB sector on every write.'
  - 'Indefinitely, because modern NOR flash has built-in wear leveling.'
  - '17.4 hours until the flash fills up capacity-wise.'
  correct_index: 1
