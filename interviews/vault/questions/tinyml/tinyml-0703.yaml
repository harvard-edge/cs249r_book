title: Flash Wear from Logging Frequency
scenario: Your TinyML sensor node runs on an STM32L4 with 1 MB internal flash and a 2 MB external NOR flash (SPI, rated for 100,000 P/E cycles). The firmware logs inference results (32 bytes per result: timestamp, class, confidence, sensor readings) to a circular buffer in external flash. The device runs 10 inferences per second, 24/7.
question: How long will 2 MB of 100K-cycle external NOR flash last when logging 32 bytes at 10 inferences per second?
details:
  realistic_solution: 'NOR flash has a critical constraint: writes can only flip bits from 1→0. To write new data, you must first erase the sector (flip all bits to 1), then write. Erase granularity for typical NOR flash is 4 KB sectors. Naive metadata pointer updates erase a sector on every write, wearing out extremely fast. Proper logging must use a write-ahead log or FRAM to avoid destroying the chip.'
  common_mistake: |
    **The Pitfall:** Treating flash memory like standard RAM with infinite byte-level rewrite capability.
    **The Rationale:** Candidates naively calculate total byte throughput (200 GB) and divide by the daily write rate.
    **The Consequence:** This ignores NOR flash erase granularity (4 KB sectors), resulting in an estimated lifespan of 19.8 years for a system that will actually fail in 2.8 hours.
  napkin_math: |
    1. Total naive data written per day: 32 bytes * 10/s * 86,400s = 27.6 MB/day.
    2. Data-only cycles: 27.6 MB / 2 MB = 13.8 cycles/day. Lifespan = 100,000 / 13.8 = **~19.8 years**.
    3. **Reality (Erase Granularity):** A naive metadata pointer (knowing where the circular buffer ends) requires erasing a 4 KB sector on *every single write*.
    4. Pointer wear: 10 writes/sec = 864,000 sector erases/day.
    5. Actual Lifespan: 100,000 cycles / 864,000 cycles/day = 0.115 days = **~2.8 hours**.
  options:
  - 2 MB x 100,000 cycles = 200 GB total writes. At 32 bytes x 10/s = 320 bytes/s = 27.6 MB/day. 200 GB / 27.6 MB = 7,246 days = 19.8 years. No problem.
  - 'NOR flash erases in 4 KB sectors. Naive metadata pointer updates erase a sector on every write (864,000 cycles/day), wearing out in 2.8 hours. Even data-only writes with proper circular buffer design (13.2 cycles/day) last 20.8 years. The flash lifetime is determined by the hottest byte, not the average. Fix: use FRAM ($0.50 BOM) for the write pointer, or wear-level the metadata sector across multiple pages.'
  - The flash will last indefinitely because modern NOR flash has built-in wear leveling that automatically distributes writes across all sectors.
  - At 32 bytes per result and 10 results/second, the 2 MB flash fills up in 17.4 hours. The real problem is storage capacity, not endurance — you need a larger flash chip.
  correct_index: 1
