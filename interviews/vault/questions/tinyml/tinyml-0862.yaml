title: 'Latency Decomposition: Full TinyML Gesture Recognition Pipeline with Power Budget'
scenario: A gesture recognition wristband uses ESP32-S3 (240MHz, 512KB SRAM, 8MB PSRAM) with a 6-axis IMU. Pipeline: IMU read (I2C FIFO, 1ms), windowing (50ms window, 10 samples), feature extraction (CPU), gesture CNN (800K ops INT8), softmax + decision, BLE notification. Battery life target is 1 week on 500mAh at 3.7V.
question: Does the ESP32-S3 gesture wristband meet its one-week battery target, and what power changes are needed?
details:
  realistic_solution: 'IMU read: 1ms. Feature extraction: 2ms. CNN: 800K/240M = 3.3ms. BLE notify: 10ms. Per-gesture (every 500ms): total active = 1+2+3.3+10 = 16.3ms. Duty cycle: 3.26%. Power: ESP32-S3 active 240mA, sleep 0.02mA. Average: 0.0326*240 + 0.9674*0.02 = 7.84mA. Battery: 500mAh/7.84mA = 63.8 hours - far short of 1 week (168h). Fix: 1) Reduce BLE to on-demand (removes 10ms from every cycle), 2) Implement cascade (run CNN only on IMU motion trigger, ~10% of time). New active: 1ms+2ms + 0.33ms = 3.33ms. New avg: 3.33/500 * 240mA + 0.02mA = 1.62mA. 500mAh/1.62mA = 308 hours > 1 week.'
  common_mistake: |
    **The Pitfall:** Optimizing inference latency aggressively while ignoring radio and baseline active power.
    **The Rationale:** ML engineers focus on model FLOPs and inference speed, forgetting that BLE transmission and overall duty cycle often dominate the system's energy budget.
    **The Consequence:** The device fails to meet battery life targets by days, despite having a highly optimized neural network.
  napkin_math: |
    - **Baseline Active Time:** 1ms (IMU) + 2ms (Feat) + 3.3ms (CNN) + 10ms (BLE) = 16.3ms per 500ms.
    - **Baseline Duty Cycle:** 16.3 / 500 = 3.26%.
    - **Baseline Avg Power:** (0.0326 * 240mA) + (0.9674 * 0.02mA) = 7.82mA + 0.019mA ≈ 7.84mA.
    - **Baseline Battery Life:** 500mAh / 7.84mA = 63.8 hours (Target is 168 hours).
    - **Optimized Active Time:** Remove fixed BLE (10ms) + Cascade wake (CNN 10% of time -> 0.33ms avg). New active = 1 + 2 + 0.33 = 3.33ms.
    - **Optimized Avg Power:** (3.33 / 500 * 240mA) + 0.02mA = 1.6mA + 0.02mA = 1.62mA.
    - **Conclusion:** **Optimizing the duty cycle to 1.62mA extends battery life to 308 hours, surpassing the 1-week (168h) target.**
