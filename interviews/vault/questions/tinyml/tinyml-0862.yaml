title: 'Latency Decomposition: Full TinyML Gesture Recognition Pipeline with Power Budget'
scenario: 'A gesture recognition wristband uses ESP32-S3 (240MHz, 512KB SRAM, 8MB PSRAM) with a 6-axis IMU. Pipeline: IMU read (I2C FIFO, 1ms), windowing (50ms window, 10 samples), feature extraction (CPU), gesture CNN (800K ops INT8), softmax + decision, BLE notification. Battery life target: 1 week on 500mAh at 3.7V. Audit latency and power.'
question: Does the ESP32-S3 gesture wristband meet its one-week battery target, and what power changes are needed?
details:
  realistic_solution: 'IMU read: 1ms. Feature extraction: 2ms. CNN: 800K/240M = 3.3ms. BLE notify: 10ms. Per-gesture (every 500ms): total active = 1+2+3.3+10 = 16.3ms. Duty cycle: 3.26%. Power: ESP32-S3 active 240mA, sleep 0.02mA. Average: 0.0326×240 + 0.9674×0.02 = 7.84mA. Battery: 500mAh/7.84mA = 63.8 hours — far short of 1 week (168h). Fix: 1) Reduce BLE to on-demand (removes 10ms from every cycle), 2) Implement cascade (run CNN only on IMU motion trigger, ~10% of time). New active: 1ms+2ms + 0.33ms = 3.33ms. New avg: 3.33/500 * 240mA + 0.02mA = 1.62mA. 500mAh/1.62mA = 308 hours > 1 week.'
  common_mistake: Optimizing inference latency aggressively when power consumption is dominated by BLE radio transmission and active CPU time, not the ML inference itself.
  napkin_math: 'Baseline active: 16.3ms. Duty cycle: 16.3ms/500ms = 3.26%. Avg: 0.0326×240 + 0.9674×0.02 = 7.84mA. Life: 500mAh/7.84mA = 63.8h. Target: 168h (max 2.97mA). Fix: BLE on-demand (saves 10ms/cycle), Cascade wake (CNN 10% of time -> 0.33ms avg). New active: 1ms (IMU) + 2ms (Feat) + 0.33ms (CNN) = 3.33ms. New duty cycle: 3.33/500 = 0.666%. New avg: 0.00666×240 + 0.02 = 1.62mA. Life: 500/1.62 = 308h > 168h.'
