title: The INT8 Energy Dividend (tinyml-0337)
scenario: You're optimizing a keyword spotting model on a Cortex-M4 microcontroller and need to drastically
  reduce power consumption to meet a 1mW power budget. From a pure compute standpoint, what is the approximate
  energy cost ratio between a single 32-bit floating-point (FP32) operation and an 8-bit integer (INT8)
  operation?
question: "From a pure compute standpoint, what is the approximate energy cost ratio between a single 32-bit floating-point (FP32) operation and an 8-bit integer (INT8) operation?"
details:
  realistic_solution: An FP32 operation consumes roughly **18 times** more energy than an INT8 operation.
    This is a fundamental invariant derived from the physics of digital logic, as stated in the playbook's
    "Invariants" table. The energy cost of a computation is proportional to the number of transistors
    switching, and the hardware for FP32 math is significantly more complex than for INT8.
  common_mistake: Engineers often assume the energy savings are linearly proportional to the bit-width
    reduction (e.g., 32 bits / 8 bits = 4×). This ignores the non-linear architectural complexity. A floating-point
    unit (FPU) requires separate, complex logic for mantissa and exponent calculations, making it far
    more power-hungry than a simple integer arithmetic logic unit (ALU).
  napkin_math: If the compute portion of your INT8 model can run for a full 18-hour day on a battery,
    switching the compute to use FP32 would drain the same battery in just **1 hour**.
  options:
  - ~4×. The energy scales linearly with the reduction in bit width (32/8).
  - ~2×. Floating point is a bit more expensive, but not significantly so.
  - ~18×. The complexity of the FP32 ALU is vastly higher than the INT8 ALU.
  - ~100×. Moving from integer to float is as expensive as an off-chip memory access.
  correct_index: 2
