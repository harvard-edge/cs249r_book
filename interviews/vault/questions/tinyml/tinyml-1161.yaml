title: MAC Reduction from Depthwise Separable Convolution
scenario: 'You are deploying an anomaly detection CNN on a Nordic nRF5340 microcontroller (128 MHz app core, 256 KB SRAM, ~5mA active). To save power and reduce latency, you are replacing a standard 3x3 convolutional layer (input spatial resolution: 16x16, input channels: 32, output channels: 64) with a depthwise separable convolution.'
question: How would you calculate the exact theoretical reduction factor in multiplication-accumulation operations (MACs) achieved by this architectural change?
details:
  realistic_solution: 'The most efficient way to solve this is to apply the known reduction ratio formula for depthwise separable convolutions compared to standard convolutions: (1 / Output_Channels) + (1 / Kernel_Size^2). Using this formula provides a quick and mathematically sound way to quantify the architectural efficiency gain without having to compute the absolute MAC counts for the spatial dimensions, saving time and reducing errors during the interview.'
  common_mistake: |
    **The Pitfall:** Manually calculating the total MACs for both layers.
    **The Rationale:** Candidates do not use the generic reduction formula (1/N + 1/D_k^2) and sometimes confuse the number of output channels with the input channels when setting up the pointwise convolution parameters.
    **The Consequence:** Wasting time during the interview and often arriving at an incorrect reduction factor due to arithmetic errors.
  napkin_math: |
    * **Standard Conv MACs:** 16 * 16 (spatial) * 32 (in_channels) * 64 (out_channels) * 3 * 3 (kernel) = 4,718,592.
    * **Depthwise Separable MACs:** Depthwise (16 * 16 * 32 * 3 * 3 = 73,728) + Pointwise (16 * 16 * 32 * 64 = 524,288) = 598,016.
    * **Reduction Factor (Direct):** 4,718,592 / 598,016 = 7.89x.
    * **Reduction Factor (Formula):** Ratio = 1/N + 1/D_k^2 = 1/64 + 1/3^2 = 1/64 + 1/9 = 0.015625 + 0.111111 = 0.126736. 
    * **Result:** Reduction Factor = 1 / 0.126736 = **7.89x**.
