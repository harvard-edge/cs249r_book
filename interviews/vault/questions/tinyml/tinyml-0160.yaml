title: The 1-Millisecond Deadline
scenario: You're designing a real-time vibration sensor on a Cortex-M4 microcontroller. An interrupt is triggered when an accelerometer exceeds a threshold.
question: What is the typical total latency budget you have, from the interrupt firing to classifying the event, to meet a hard real-time deadline?
details:
  realistic_solution: The standard hard real-time latency budget for an interrupt-driven TinyML system is 1 millisecond (1,000 microseconds). This entire budget must cover the model's inference time, any data preprocessing, and the logic to actuate a response (e.g., sending a signal to shut down a machine). Exceeding this budget means missing the physical event entirely.
  common_mistake: |
    **The Pitfall:** Confusing the latency budgets between different deployment scales.
    **The Rationale:** Applying a 16ms budget (typical for mobile UI jank) or 33ms budget instead of the microcontroller-scale hard real-time budget.
    **The Consequence:** Exceeding the budget and missing the physical event entirely.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Interrupt-driven hard real-time system.
    2. **Calculations:**
       - Standard budget for microcontroller-scale hardware interrupts = 1 ms (1,000 µs).
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound.** You have 1 ms to process the event from start to finish to avoid dropping transient physical events.
  options:
  - 16 ms
  - 33 ms
  - 1 ms
  - 100 µs
  correct_index: 2
