title: The 1-Millisecond Deadline
scenario: You're designing a real-time vibration sensor on a Cortex-M4 microcontroller. An interrupt is
  triggered when an accelerometer exceeds a threshold. What is the typical total latency budget you have,
  from the interrupt firing to classifying the event, to meet a hard real-time deadline?
details:
  realistic_solution: The standard hard real-time latency budget for an interrupt-driven TinyML system
    is 1 millisecond (1,000 microseconds). This entire budget must cover the model's inference time, any
    data preprocessing, and the logic to actuate a response (e.g., sending a signal to shut down a machine).
    Exceeding this budget means missing the physical event entirely.
  common_mistake: Engineers often confuse the latency budgets between different deployment scales. For
    example, applying a 16ms budget (typical for mobile UI 'jank') or a 33ms budget (for a more powerful
    Edge device) to a microcontroller is orders of magnitude too slow. Another common mistake is to think
    in terms of component latency (e.g., nanoseconds for memory access) instead of the full system budget.
  napkin_math: The Scale Ladder defines the latency budget for a TinyML interrupt as 1ms. If we scale
    1 nanosecond (an L1 cache read) to 1 second of human time, then the 1ms budget (1,000,000 ns) becomes
    1,000,000 seconds. This is ~11.5 days. You have 11.5 'human-scale days' to process the event from
    start to finish.
  options:
  - 16 ms
  - 33 ms
  - 1 ms
  - 100 µs
  correct_index: 2
