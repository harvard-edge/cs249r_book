title: The Audio Buffer Deadline
scenario: You're designing a keyword spotting system on a Cortex-M4 microcontroller. An audio sensor feeds
  the device 16-bit audio sampled at 16kHz. The system collects audio into a 1-second buffer. To ensure
  no audio data is ever lost, what is the absolute maximum processing latency your model can have to process
  one buffer?
question: "To ensure no audio data is ever lost, what is the absolute maximum processing latency your model can have to process one buffer?"
details:
  realistic_solution: The system deadline is dictated by the buffer duration. Since a new 1-second buffer
    of audio is ready for processing every second, the model must complete its inference on the current
    buffer in less than that time. Therefore, the maximum allowed latency is 1 second (1000 ms). If processing
    takes longer, the system will start dropping incoming audio data from the next buffer, failing the
    real-time constraint.
  common_mistake: Engineers often over-complicate this by focusing on the sensor's sampling rate (16kHz)
    or data bandwidth (32 KB/s). They might calculate the time per sample (1/16000s = 62.5 µs) or the
    time to transfer the data over a bus, rather than identifying the core system-level deadline, which
    is the rate at which full data chunks arrive.
  napkin_math: 1. **Identify the data arrival cadence:** A full buffer arrives every 1 second.
  options:
  - 62.5 µs
  - 640 ms
  - 1000 ms
  - 500 ms
  correct_index: 2
