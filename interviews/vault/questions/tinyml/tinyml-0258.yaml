title: The Audio Buffer Deadline
scenario: You're designing a keyword spotting system on a Cortex-M4 microcontroller. An audio sensor feeds the device 16-bit audio sampled at 16kHz. The system collects audio into a 1-second buffer.
question: To ensure no audio data is ever lost, what is the absolute maximum processing latency your model can have to process one buffer?
details:
  realistic_solution: The system deadline is dictated by the buffer duration. Since a new 1-second buffer of audio is ready for processing every second, the model must complete its inference on the current buffer in less than that time. Therefore, the maximum allowed latency is 1 second (1000 ms). If processing takes longer, the system will start dropping incoming audio data from the next buffer, failing the real-time constraint.
  common_mistake: |
    **The Pitfall:** Over-complicating system-level deadlines with sample rates or bandwidth calculations.
    **The Rationale:** Engineers get bogged down in the low-level physical characteristics of the sensor (16kHz, 32 KB/s).
    **The Consequence:** They calculate microscopic deadlines (like 62.5 µs per sample) and prematurely conclude that complex TinyML models are impossible to run.
  napkin_math: |
    *   **Data Arrival Cadence:** A full buffer arrives every 1 second.
    *   **Deadline:** 1 second (1000 ms).
    *   **Result:** **1000 ms**.
  options:
  - 62.5 µs
  - 640 ms
  - 1000 ms
  - 500 ms
  correct_index: 2
