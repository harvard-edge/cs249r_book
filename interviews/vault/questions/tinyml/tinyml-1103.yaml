title: ESP32-S3 PSRAM Bandwidth Compute Bottleneck
scenario: You deployed an INT8 quantized predictive maintenance model (1.2 MB footprint) on an ESP32-S3. The model requires 12 million MAC operations per inference. You estimated an inference time of around 25ms, but profiling shows it takes over 90ms. The ESP32-S3 features 512 KB internal SRAM and 8 MB external PSRAM.
question: What hardware constraint is causing your compute estimation to be inaccurate, and how do you diagnose the root cause?
details:
  realistic_solution: The root cause is memory bandwidth starvation. Because the 1.2 MB model exceeds the 512 KB internal SRAM, the model weights and activations are allocated in the 8 MB external PSRAM. The fast 240 MHz Xtensa cores with INT8 vector extensions spend the majority of their cycles stalled, waiting for data to be fetched from the slower PSRAM.
  common_mistake: |
    **The Pitfall:** Basing compute cost solely on CPU frequency and MAC operations.
    **The Rationale:** Candidates assume memory is uniform and fail to account for the device's memory hierarchy.
    **The Consequence:** They completely miss the severe latency penalty of fetching data from external PSRAM over a serial interface.
  napkin_math: |
    - Compute bound: 12M MACs / (240 MHz * 2 ops/cycle) = 25ms theoretical compute time.
    - Model size: 1.2 MB (> 512 KB SRAM, placed in PSRAM).
    - PSRAM transfer limit: 80 MHz octal-SPI ideal = 80 MB/s, but non-sequential thrashing reduces it to ~15 MB/s.
    - Memory latency: 1.2 MB / 15 MB/s = 80ms memory stall.
    - **Total inference time: 25ms compute + 80ms stalls (with partial overlap) yields the 90ms+ observed time.**
