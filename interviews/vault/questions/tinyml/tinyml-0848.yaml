title: 'Dataset Curation: Fluency — MFCC Feature Storage Budget for MCU Training Data'
scenario: You are curating training data for a gesture recognition model on ESP32-S3
  (240MHz, 512KB SRAM, 8MB PSRAM). Each sample is 1-second of IMU data (accelerometer
  + gyroscope, 100Hz, 6-axis). Estimate storage requirements for 10K training samples
  and whether they fit in PSRAM for on-device training.
question: How would you estimate storage requirements for 10K training samples and
  whether they fit in PSRAM for on-device training?
details:
  realistic_solution: '1-second IMU: 100Hz × 6 axes × 4B float = 2,400 bytes = 2.4KB
    per sample. 10K samples = 24MB. PSRAM = 8MB — does not fit. Compress: use int8
    quantized IMU values (±16g range, 0.1g resolution fits in int8). Then 100 × 6
    × 1B = 600B/sample. 10K = 6MB — fits in PSRAM.'
  common_mistake: Confusing SRAM (for model inference) with PSRAM (for data storage);
    forgetting to account for 6-axis IMU data structure.
  napkin_math: 'Float32: 100 samples/sec × 6 axes × 4B = 2.4KB/sample. 10K samples
    = 24MB > 8MB PSRAM. Int16: 100 × 6 × 2B = 1.2KB/sample. 10K = 12MB > 8MB still.
    Int8: 100 × 6 × 1B = 600B/sample. 10K = 6MB < 8MB. Fits! But: on-device training
    on ESP32-S3 at 240MHz — backprop through even a small network (1K params) needs
    float32 for gradient stability. Solution: store data as int8, dequantize to float32
    during forward pass, 1 sample at a time. Peak RAM during training: model (1K ×
    4B = 4KB) + 1 sample float (600B × 4 = 2.4KB) + activations (~10KB) = 16.4KB <
    512KB SRAM. Feasible.'
