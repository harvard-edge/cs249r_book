title: Deterministic Processing Queueing Delay
scenario: A Cortex-M4 performs acoustic anomaly detection. Inference takes a highly deterministic 10ms (service time). Audio snippets arrive exponentially with an average interval of 12ms.
question: Calculate the expected queueing delay utilizing the M/D/1 queue formula.
visual:
  kind: svg
  path: tinyml-1589.svg
  alt: Graph showing M/D/1 queueing delay rising sharply but at half the rate of M/M/1.
  caption: M/D/1 Queueing Delay
details:
  realistic_solution: For M/D/1, arrival rate lambda is 1/12 ms^-1. Service time D is 10 ms. Utilization rho = lambda * D = 10/12 = 0.833. The M/D/1 queueing delay formula is (rho * D) / (2 * (1 - rho)). Delay = (0.833 * 10) / (2 * (1 - 0.833)) = 8.33 / 0.333 = 25ms.
  common_mistake: |
    **The Pitfall:** Using the M/M/1 queue formula.
    **The Rationale:** Engineers often default to the standard M/M/1 queue calculation, which incorrectly assumes service times vary exponentially.
    **The Consequence:** This overestimates the expected queueing delay by a factor of 2, leading to over-provisioned systems.
  napkin_math: |
    - Arrival rate (lambda): 1 / 12 arrivals per ms.
    - Service time (D): 10 ms.
    - Utilization (rho): (1/12) * 10 = 5/6 (approx 0.833).
    - M/D/1 queue formula: (rho * D) / (2 * (1 - rho)).
    - Calculate numerator: (5/6 * 10) = 50/6 = 8.333.
    - Calculate denominator: 2 * (1 - 5/6) = 2 * (1/6) = 2/6 = 0.333.
    - Calculate delay: (50/6) / (2/6) = 25 ms.
    - **Conclusion: The expected queueing delay is 25 ms.**
