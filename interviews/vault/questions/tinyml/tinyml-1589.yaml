title: Deterministic Processing Queueing Delay
scenario: A Cortex-M4 performs acoustic anomaly detection. Inference takes a highly
  deterministic 10ms (service time). Audio snippets arrive exponentially with an average
  interval of 12ms.
question: Calculate the expected queueing delay utilizing the M/D/1 queue formula.
visual:
  kind: svg
  path: tinyml-1589.svg
  alt: Graph showing M/D/1 queueing delay rising sharply but at half the rate of M/M/1.
  caption: M/D/1 Queueing Delay
details:
  realistic_solution: For M/D/1, arrival rate lambda is 1/12 ms^-1. Service time D
    is 10 ms. Utilization rho = lambda * D = 10/12 = 0.833. The M/D/1 queueing delay
    formula is (rho * D) / (2 * (1 - rho)). Delay = (0.833 * 10) / (2 * (1 - 0.833))
    = 8.33 / 0.333 = 25ms.
  common_mistake: Using the M/M/1 formula instead of M/D/1, which overestimates the
    delay by a factor of 2 because it wrongly assumes service times vary exponentially.
  napkin_math: (5/6 * 10) / (2 * 1/6) = 25 ms
