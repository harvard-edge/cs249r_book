title: Power Profiling for MCU Inference
scenario: Your product manager asks 'how long will the battery last?' You answer '6 months' based on the datasheet's active and sleep current specs. Three months later, devices start dying in the field. Your estimate was 2x too optimistic.
question: What did you miss in your datasheet-based estimate, and how do you build an accurate power profile?
details:
  realistic_solution: 'The datasheet gives a lower bound, not a prediction. Real power profiling requires measuring the actual device. Key factors omitted: (1) Peripheral leakage: sensors, voltage regulators, LEDs in standby draw 10-20 uA combined, often exceeding MCU sleep current (5 uA). (2) Wake-up transitions: MCU takes 2-5 ms to transition from deep sleep to active, drawing ~10 mA. At 1 wake/minute: adds 5 uA average. (3) Temperature: battery capacity derate 20-30% below 0C. A 225 mAh CR2032 delivers only 160 mAh at -10C. (4) Battery self-discharge: 1-2%/year. (5) Voltage regulator quiescent current: 2-10 uA. Corrected estimate: active = 30 uA (1 inference/min), peripherals = 15 uA, transitions = 5 uA, regulator = 5 uA. Total = 55 uA. Battery derated to 180 mAh. Life = 180 mAh / 0.055 mA = 3,273 hours = 136 days. The 2x gap between estimate (10 months) and reality (4.5 months) is explained.'
  common_mistake: |
    **The Pitfall:** Using the datasheet's typical current values directly for battery life estimates.
    **The Rationale:** Datasheets report typical values at 25°C with minimal peripherals active, ignoring wake-up transitions and peripheral leakage.
    **The Consequence:** The resulting estimate is highly optimistic, leading to premature field failures.
  napkin_math: |
    1. **Datasheet estimate:** 30 mA active × 50ms / 60s = 25 µA average active.
    2. **Sleep current:** 5 µA sleep. Total = 30 µA average.
    3. **Original Battery life:** 225 mAh / 0.03 mA = 7,500 hours = 312 days ≈ 10 months.
    4. **Real-world additions:** Peripherals (+15 µA), transitions (+5 µA), regulator (+5 µA) = 55 µA total.
    5. **Battery derating:** Derated to 180 mAh due to temperature/self-discharge.
    6. **Actual life:** 180 mAh / 0.055 mA = 3,273 hours = 136 days ≈ **4.5 months**.
    7. **Conclusion:** The 2× gap between estimate (10 months) and reality (4.5 months) is explained by peripherals, transitions, regulator, and battery derating.
