title: Mitigating Dataset Bias in TinyML Gesture Recognition on Cortex-M7/Ethos-U55
scenario: Consider a TinyML gesture recognition application running on a Cortex-M7
  microcontroller with an integrated Ethos-U55 NPU (operating at 480 MHz, with 512
  KB SRAM, and capable of 128-512 MAC/cycle). To achieve the required low power consumption
  and memory footprint, your team is curating a highly optimized dataset. What specific
  data selection or annotation workflow strategy is crucial to implement to mitigate
  the risk of dataset bias, given these extreme resource constraints, and how does
  it directly impact the model's on-device performance and fairness?
question: What data selection or annotation workflow helps mitigate dataset bias for
  an Ethos-U55 gesture model under TinyML constraints?
details:
  realistic_solution: A crucial strategy is to implement an active learning workflow
    or stratified sampling during data selection. This involves strategically selecting
    data points for annotation that are most informative (e.g., uncertain, diverse,
    or belonging to underrepresented classes) for the model. This method maximizes
    the utility of each annotated sample, allowing the team to build a robust and
    fair dataset with significantly fewer examples, thereby staying within the strict
    memory and computational limits of the Cortex-M7/Ethos-U55 while mitigating dataset
    bias.
  common_mistake: A common mistake is to rely solely on passively collected, randomly
    sampled data for dataset curation. This approach often leads to underrepresentation
    of minority classes, edge cases, or specific environmental conditions, resulting
    in a biased model that performs poorly or unfairly on certain real-world inputs
    when deployed on the resource-constrained Cortex-M7/Ethos-U55.
  napkin_math: If a conventional random sampling approach requires annotating 10,000
    data samples to adequately represent a critical, rare gesture (occurring in 1%
    of natural data), an active learning strategy could potentially reduce the number
    of required annotations for that specific class to 1,000 highly informative samples.
    This 90% reduction in annotation effort directly translates to lower operational
    costs, faster iteration cycles, and a smaller overall dataset footprint, which
    is vital for models designed for devices with only 512 KB of SRAM.
