title: Mitigating Dataset Bias in TinyML Gesture Recognition on Cortex-M7/Ethos-U55
scenario: Consider a TinyML gesture recognition application running on a Cortex-M7 microcontroller with an integrated Ethos-U55 NPU. To achieve the required low power consumption and memory footprint, your team is curating a highly optimized dataset.
question: What data selection or annotation workflow helps mitigate dataset bias for an Ethos-U55 gesture model under TinyML constraints?
details:
  realistic_solution: A crucial strategy is to implement an active learning workflow or stratified sampling during data selection. This involves strategically selecting data points for annotation that are most informative (e.g., uncertain, diverse, or belonging to underrepresented classes) for the model. This method maximizes the utility of each annotated sample, allowing the team to build a robust and fair dataset with significantly fewer examples, thereby staying within the strict memory and computational limits of the Cortex-M7/Ethos-U55 while mitigating dataset bias.
  common_mistake: |
    **The Pitfall:** Relying solely on passively collected, randomly sampled data for dataset curation.
    **The Rationale:** Candidates assume bulk random sampling is sufficient, ignoring that under-representation of edge cases inherently biases small-capacity models that lack the parameter space to learn subtle distinctions.
    **The Consequence:** A biased model that performs poorly on real-world minority inputs and wastes memory on redundant, non-informative training examples.
  napkin_math: |
    1. **Assumptions & Constraints:** 512 KB SRAM limit. Rare 1% gesture class.
    2. **Calculations:** Random sampling requires 10,000 total samples to capture 100 rare instances. Active learning requires 1,000 strategically selected samples to achieve the same coverage. Data reduction = (10,000 - 1,000) / 10,000 = 90%.
    3. **Conclusion & Interpretation:** **90% reduction in dataset footprint** (SRAM-Capacity-Bound Training Pipeline).
