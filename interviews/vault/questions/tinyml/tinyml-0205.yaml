title: The Privacy-First Principle of Federated Learning
scenario: When deploying a fleet of microcontrollers for a keyword-spotting application, what is the primary
  reason to choose a Federated Learning approach for model updates instead of collecting all audio data
  in the cloud to retrain a central model?
question: "What is the primary reason to use federated learning for keyword-spotting updates instead of collecting raw audio centrally?"
details:
  realistic_solution: The primary motivation is to preserve user privacy. Federated Learning (FL) allows
    the model to be updated using gradients or aggregated insights from on-device data without the raw,
    sensitive user data (e.g., spoken words) ever leaving the device. This design fundamentally avoids
    the immense privacy risks, regulatory hurdles (like GDPR), and data governance complexities associated
    with centralizing sensitive user data.
  common_mistake: Engineers often focus on the secondary network benefits (like reduced bandwidth for
    model updates) or potential model personalization. While these can be advantages, the foundational,
    non-negotiable driver for FL in consumer devices is user privacy. Collecting raw user audio data is
    a massive liability and often a non-starter.
  napkin_math: 'Consider the data liability avoided. If 1 million users have their devices capture just
    1 minute of audio per day for potential analysis (a low estimate), using standard 16kHz, 16-bit audio
    (32 KB/s):'
  options:
  - To achieve higher model accuracy than a centrally trained model.
  - To lower the power consumption of the device during the learning process.
  - To preserve user privacy by not sending raw audio data to the cloud.
  - To reduce the network bandwidth costs of downloading the final, large model.
  correct_index: 2
