title: The Separable Convolution Cost-Cutter
scenario: You are designing a keyword-spotting model for a low-power microcontroller with only 256KB of SRAM. To meet the tight memory and compute budget, you replace the standard 2D convolutions with depthwise separable convolutions.
question: What is the primary advantage of this architectural change for a resource-constrained device?
details:
  realistic_solution: 'The primary advantage is a significant reduction in the number of parameters and the total computational cost (FLOPs). This directly translates to lower latency, a smaller memory footprint, and reduced power consumption, which are all critical constraints for TinyML devices. The technique works by factorizing a standard convolution into two smaller, cheaper operations: a depthwise convolution that processes each input channel independently, and a pointwise (1x1) convolution that combines the outputs.'
  common_mistake: |
    **The Pitfall:** Confusing the purpose of depthwise separable convolutions with other optimization techniques like quantization.
    **The Rationale:** Engineers often mix up architectural efficiency techniques with precision reduction, assuming both just "make it smaller."
    **The Consequence:** Fails to recognize that depthwise separable convolutions specifically target a massive reduction in arithmetic operations (FLOPs) and parameter count.
  napkin_math: |
    - **Standard 3x3 Conv**: 3 × 3 (kernel) × 32 (in) × 64 (out) = 18,432 parameters.
    - **Depthwise Separable**: 
      - Depthwise: 3 × 3 × 32 = 288 parameters.
      - Pointwise: 32 × 64 = 2,048 parameters.
      - Total = 288 + 2,048 = 2,336 parameters.
    - **Reduction Factor**: 18,432 / 2,336 = **~7.9x reduction** in parameters and FLOPs.
