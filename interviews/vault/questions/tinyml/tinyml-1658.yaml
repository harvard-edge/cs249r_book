title: Cortex-M4 Quantization Memory Saturation
scenario: A deployment on a Cortex-M4 with 256KB of SRAM changes its model from an
  8-bit quantized format to a 16-bit format, causing latency to suddenly increase
  by 5x.
question: Diagnose the root cause of this massive performance degradation.
visual:
  kind: svg
  path: tinyml-1658.svg
  alt: Bar chart showing INT8 well under the 256KB threshold and INT16 drastically
    over it.
  caption: SRAM Capacity vs Model Quantization Footprint.
details:
  realistic_solution: Doubling the data types from 8-bit to 16-bit doubles the memory
    footprint of both weights and working activations. If the new footprint exceeds
    the 256KB SRAM capacity, the system is forced to evict activations to much slower
    Flash memory or rely on heavy external memory paging. This thrashing effect destroys
    latency.
  common_mistake: Assuming the 5x latency jump is solely due to MAC instructions taking
    slightly longer to multiply 16-bit integers, ignoring the memory capacity cliff.
  napkin_math: 200KB INT8 -> 400KB INT16. 400KB > 256KB SRAM -> Memory Thrashing.
