title: Cortex-M4 Quantization Memory Saturation
scenario: A deployment on a Cortex-M4 with 256KB of SRAM changes its model from an 8-bit quantized format to a 16-bit format, causing latency to suddenly increase by 5x.
question: What is the root cause of the 5x latency degradation when migrating from 8-bit to 16-bit quantization on a Cortex-M4?
visual:
  kind: svg
  path: tinyml-1658.svg
  alt: Bar chart showing INT8 well under the 256KB threshold and INT16 drastically over it.
  caption: SRAM Capacity vs Model Quantization Footprint.
details:
  realistic_solution: Doubling the data types from 8-bit to 16-bit doubles the memory footprint of both weights and working activations. If the new footprint exceeds the 256KB SRAM capacity, the system is forced to evict activations to much slower Flash memory or rely on heavy external memory paging. This thrashing effect destroys latency.
  common_mistake: |
    **The Pitfall:** Assuming the latency jump is due to 16-bit MAC instructions taking slightly longer.
    **The Rationale:** Candidates focus purely on compute cycles and instruction sets, ignoring the system's memory capacity limits.
    **The Consequence:** Engineers will waste time attempting to optimize loops or use DSP instructions when the actual problem is a massive memory wall.
  napkin_math: |
    - Original INT8 footprint = ~200KB (fits in 256KB SRAM).
    - New INT16 footprint = ~400KB.
    - Available SRAM = 256KB.
    - **Final Result:** Since 400KB > 256KB, the system is forced to evict activations to slower Flash memory, causing severe **memory thrashing**.
