title: Cortex-M4 Quantization Memory Saturation
scenario: >
  A deployment on a Cortex-M4 with 256KB of SRAM changes its model from an 8-bit quantized format to a 16-bit format, causing latency to suddenly increase by 5x.
question: What is the root cause of the 5x latency degradation when migrating from 8-bit to 16-bit quantization on a Cortex-M4?
visual:
  kind: svg
  path: tinyml-1658.svg
  alt: Bar chart showing INT8 well under the 256KB threshold and INT16 drastically over it.
  caption: SRAM Capacity vs Model Quantization Footprint.
details:
  realistic_solution: >
    Doubling the data types from INT8 to INT16 doubles the memory footprint of both weights and transient activation buffers. If the expanded footprint eclipses the 256KB SRAM hard limit, the allocator is forced to evict activations to vastly slower external Flash or SPI-RAM. This triggers catastrophic memory thrashing, stalling the CPU during inference.
  common_mistake: |
    **The Pitfall:** Assuming the latency jump is due to 16-bit MAC instructions taking slightly longer.
    **The Rationale:** Candidates focus purely on compute cycles and instruction sets, ignoring the system's memory capacity limits.
    **The Consequence:** Engineers will waste time attempting to optimize loops or use DSP instructions when the actual problem is a massive memory wall.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Available SRAM: 256 KB.
       - Original INT8 Footprint: ~200 KB.
    2. **Calculations:**
       - New INT16 Footprint: 200 KB * 2 = 400 KB.
       - Deficit: 400 KB - 256 KB = 144 KB overflow.
    3. **Conclusion & Interpretation:**
       - **Result: 400 KB > 256 KB SRAM.** The system is forced into heavy paging to slower memory, causing massive memory thrashing. **Bottleneck: I/O Bandwidth/Thrashing.**
