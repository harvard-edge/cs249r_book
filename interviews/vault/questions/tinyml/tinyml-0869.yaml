title: 'Model Format Conversion: Implement TFLite Flatbuffer Size Calculation for MCU'
scenario: Calculate the TFLite Micro model size (Flatbuffer .tflite file) for a small CNN to be stored in Flash on Cortex-M4 (256KB SRAM, 512KB Flash). Model: 3 Conv2D layers (32, 64, 128 filters, 3x3 kernels, INT8), 1 FC layer (10 outputs). Input: 28x28x1 (MNIST).
question: How would you determine if it fits in 512KB Flash alongside a 64KB application binary?
details:
  realistic_solution: 'Conv1: 32x1x3x3 = 288 params. Conv2: 64x32x3x3 = 18,432. Conv3: 128x64x3x3 = 73,728. FC: 128x10 = 1,280. Biases: 32+64+128+10 = 234 (int32, 4B each = 936B). Quantization metadata: ~50 bytes per tensor × 8 tensors = 400B. Flatbuffer overhead: ~2KB. Total: (288+18432+73728+1280)×1B + 936 + 400 + 2000 = 93728 + 3336 = 97KB. Flash: 97KB model + 64KB app = 161KB << 512KB.'
  common_mistake: |
    **The Pitfall:** Overlooking framework overhead.
    **The Rationale:** Candidates calculate weight size only, ignoring bias parameters and Flatbuffer overhead entirely.
    **The Consequence:** The model fails to fit cleanly into tightly partitioned flash pages because quantization metadata pushes the size over limits.
  napkin_math: |
    - Weights: (288 + 18432 + 73728 + 1280) = 93728 bytes (~91.5KB INT8).
    - Biases (int32): 234 * 4 = 936 bytes.
    - Metadata/Overhead: ~2.4KB.
    - Total .tflite model: 93728 + 3336 = **~97KB**.
    - Flash Usage: 64KB app + 97KB model = 161KB (31.4% of 512KB). **Fits easily.**
