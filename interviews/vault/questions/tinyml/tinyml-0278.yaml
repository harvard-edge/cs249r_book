title: The Microcontroller's Low Ridge
scenario: A typical Cortex-M4 microcontroller has a peak performance of around 336 MFLOPS and its on-chip SRAM provides about 1.2 GB/s of bandwidth.
question: Based on the hardware arithmetic intensity (Ridge Point) of a Cortex-M4, where does the bottleneck lie for most neural network operations?
details:
  realistic_solution: The hardware's ridge point is the ratio of its peak compute to its peak memory bandwidth. For a Cortex-M4, this is approximately 0.28 FLOPs/Byte. This is a very *low* ridge point. It means that any algorithm performing more than 0.28 operations for each byte of data it reads will be limited by compute, not memory. Since neural network operations like convolutions and fully-connected layers have high data reuse, their arithmetic intensity easily exceeds this low threshold. Therefore, most TinyML workloads are **compute-bound**, not memory-bound.
  common_mistake: |
    **The Pitfall:** Applying datacenter intuition to microcontrollers.
    **The Rationale:** Engineers accustomed to GPUs assume that ML hardware is fundamentally limited by memory bandwidth.
    **The Consequence:** They over-optimize memory layouts while ignoring compute efficiency, solving the wrong bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak Compute: 336 MFLOPS.
       - Peak Memory Bandwidth: 1.2 GB/s.
    2. **Calculations:**
       - Ridge Point = Peak Compute / Peak Memory Bandwidth.
       - Ratio: 336,000,000 / 1,200,000,000 = 0.28 FLOPs/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Workload**. With a very low ridge point of 0.28 FLOPs/Byte, typical CNNs easily exceed the memory bandwidth threshold and become strictly compute-limited.
  options:
  - The ridge point is very high (~280 Ops/Byte), making workloads memory-bound.
  - The ridge point is very low (~0.28 Ops/Byte), but this means workloads are always memory-bound.
  - The ridge point is very low (~0.28 Ops/Byte), making most neural network workloads compute-bound.
  - The ridge point is irrelevant for microcontrollers; only power matters.
  correct_index: 2
