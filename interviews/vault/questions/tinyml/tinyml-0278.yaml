title: The Microcontroller's Low Ridge
scenario: A typical Cortex-M4 microcontroller has a peak performance of around 336 MFLOPS and its on-chip
  SRAM provides about 1.2 GB/s of bandwidth. Based on these numbers, what is the approximate 'Ridge Point'
  or hardware arithmetic intensity of this device? And what does this imply about where the bottleneck
  is for most neural network operations?
question: "And what does this imply about where the bottleneck is for most neural network operations?"
details:
  realistic_solution: The hardware's ridge point is the ratio of its peak compute to its peak memory bandwidth.
    For a Cortex-M4, this is approximately 0.28 FLOPs/Byte. This is a very *low* ridge point. It means
    that any algorithm performing more than 0.28 operations for each byte of data it reads will be limited
    by compute, not memory. Since neural network operations like convolutions and fully-connected layers
    have high data reuse, their arithmetic intensity easily exceeds this low threshold. Therefore, most
    TinyML workloads are **compute-bound**, not memory-bound.
  common_mistake: Applying datacenter intuition to microcontrollers. Many engineers assume that, like
    GPUs, all ML hardware is fundamentally limited by memory bandwidth. They see a low compute number
    (MFLOPS) and a high bandwidth number (GB/s) and incorrectly conclude the system must be memory-bound.
  napkin_math: '1. **Recall the Ridge Point formula:** Ridge Point = Peak Compute / Peak Memory Bandwidth. 2. **Apply for Cortex-M4:** 336 MFLOPS / 1.2 GB/s = 336,000,000 / 1,200,000,000 = 0.28 FLOPs/Byte.'
  options:
  - The ridge point is very high (~280 Ops/Byte), making workloads memory-bound.
  - The ridge point is very low (~0.28 Ops/Byte), but this means workloads are always memory-bound.
  - The ridge point is very low (~0.28 Ops/Byte), making most neural network workloads compute-bound.
  - The ridge point is irrelevant for microcontrollers; only power matters.
  correct_index: 2
