title: 'Edge Systolic Array Realization: INT8 Quantization Impact on Hailo-8 Throughput'
scenario: 'Concretely calculate the throughput difference for ResNet-18 (FP32: 11.7M params) on Hailo-8 (26 TOPS INT8 only, 6GB/s, 2.5W). Hailo-8 does not support FP32/FP16 inference.'
question: "Calculate FPS, memory footprint reduction, and latency for INT8 vs the theoretical FP16 case if Hailo-8 supported it."
details:
  realistic_solution: 'ResNet-18: FP32 = 11.7M params = 46.8MB. FP16 = 23.4MB. INT8 = 11.7MB. Hailo-8 INT8: 1.8 GOPS / 26 TOPS = 0.069ms compute. BW: 11.7MB weights + ~15MB activations = 26.7MB. Time = 26.7MB/6GB/s = 4.45ms. FPS = 225. If FP16 hypothetical: 1.8 GFLOPS / 13 TFLOPS (half of 26 TOPS) = 0.138ms compute. BW: 23.4+30 = 53.4MB / 6GB/s = 8.9ms. FPS = 112. INT8 is 2x faster and 50% less memory due to bandwidth savings. INT8 quantization: ±0.5% accuracy loss for ResNet-18 (usually).'
  common_mistake: |
    **The Pitfall:** Confusing GFLOPS with GOPS and ignoring memory footprint reductions.
    **The Rationale:** Candidates often focus purely on compute TOPS constraints.
    **The Consequence:** Failing to realize that INT8 doubles performance primarily by halving the memory bandwidth pressure, not just by computing faster.
  napkin_math: |
    *   **INT8 Scenario:** Params = 11.7MB. Activations ≈ 15MB. Total = 26.7MB.
    *   **INT8 BW Time:** 26.7MB / 6GB/s = 4.45ms.
    *   **INT8 Compute:** 1.8 GOPS / 26 TOPS = 0.069ms. Bottleneck is BW. FPS = **225**.
    *   **FP16 Hypothetical:** Params = 23.4MB. Activations = 30MB. Total = 53.4MB.
    *   **FP16 BW Time:** 53.4MB / 6GB/s = 8.9ms. FPS = **112**.
    *   **Result:** INT8 delivers **2x faster FPS** and **2x memory efficiency** due entirely to bandwidth savings.
