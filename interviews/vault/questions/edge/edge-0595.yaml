title: The Fused Perception Model Paradox
scenario: Your team on the autonomous vehicle perception unit is tasked with optimizing two models running concurrently on a Jetson AGX Orin: a dense CNN for camera object detection (compute-bound) and a sparse, attention-based model for LiDAR point cloud segmentation (memory-bound). A junior engineer proposes fusing them into a single multi-head model with a shared backbone. The optimization reduces total memory footprint, but during road tests, overall perception pipeline FPS drops by 20% and power draw increases.
question: Why did fusing the dense and sparse models backfire, leading to a slower and less efficient system?
details:
  realistic_solution: The fusion created a model with a 'poisoned' execution profile that destroyed the system's arithmetic intensity. The Jetson AGX Orin, like any accelerator, achieves its peak TOPS only when it is compute-bound—when the work has high Arithmetic Intensity (AI). The camera CNN was compute-bound, efficiently using the Tensor Cores. The LiDAR model was memory-bound, limited by DRAM bandwidth. By fusing them, you've interleaved memory-intensive sparse operations with compute-intensive dense operations. The frequent, unpredictable memory accesses required by the sparse LiDAR data processing now stall the pipeline, starving the powerful compute units even when they are supposed to be working on the dense camera data. The overall model's AI drops precipitously, falling far below the hardware's ridge point. The GPU is now spending most of its cycles waiting for data from DRAM instead of doing math, resulting in catastrophically low utilization. This low utilization means you get far fewer *effective* TOPS, hence the FPS drop. The increased power draw comes from the chip running 'hot' but inefficiently, unable to enter lower power states, and burning energy on memory access, which is far more expensive than computation.
  common_mistake: |
    **The Pitfall:** Blaming FLOP counts or OS scheduling overhead.
    **The Rationale:** Engineers assume that if FLOPs didn't change significantly, any 20% slowdown must be due to arbitrary OS inefficiencies or "bugs".
    **The Consequence:** They fail to realize the character of the compute and its interaction with the memory subsystem changed entirely, fundamentally breaking accelerator utilization.
  napkin_math: |
    1. **Jetson AGX Orin Specs**: 275 TOPS (INT8 peak) and 204.8 GB/s memory bandwidth.
    2. **Ridge Point Calculation**: `275e12 / 204.8e9 ≈ 1342 Ops/Byte`.
    3. **The Paradox**: Fusing dense and sparse models artificially lowers the overall AI far below 1342 Ops/Byte.
    4. **Result**: The GPU waits on memory instead of computing. **Effective TOPS plummet, and FPS drops 20%**.
