title: The Fused Perception Model Paradox
scenario: 'Your team on the autonomous vehicle perception unit is tasked with optimizing two models running
  concurrently on a Jetson AGX Orin: a dense CNN for camera object detection (compute-bound) and a sparse,
  attention-based model for LiDAR point cloud segmentation (memory-bound). A junior engineer proposes
  fusing them into a single multi-head model with a shared backbone. The optimization is successful in
  that the total on-device memory footprint is reduced. However, during road tests, you are shocked to
  find that the overall perception pipeline''s FPS has dropped by 20%, and the power draw has increased,
  worsening your TOPS/W efficiency. Your junior colleague is stumped, arguing that the fused model should
  be faster as it avoids context switching and reduces DRAM traffic. Evaluate the situation. Why did this
  seemingly logical optimization backfire, leading to a slower and less efficient system?'
details:
  realistic_solution: The fusion created a model with a 'poisoned' execution profile that destroyed the
    system's arithmetic intensity. The Jetson AGX Orin, like any accelerator, achieves its peak TOPS only
    when it is compute-bound—when the work has high Arithmetic Intensity (AI). The camera CNN was compute-bound,
    efficiently using the Tensor Cores. The LiDAR model was memory-bound, limited by DRAM bandwidth. By
    fusing them, you've interleaved memory-intensive sparse operations with compute-intensive dense operations.
    The frequent, unpredictable memory accesses required by the sparse LiDAR data processing now stall
    the pipeline, starving the powerful compute units even when they are supposed to be working on the
    dense camera data. The overall model's AI drops precipitously, falling far below the hardware's ridge
    point. The GPU is now spending most of its cycles waiting for data from DRAM instead of doing math,
    resulting in catastrophically low utilization. This low utilization means you get far fewer *effective*
    TOPS, hence the FPS drop. The increased power draw comes from the chip running 'hot' but inefficiently,
    unable to enter lower power states, and burning energy on memory access, which is far more expensive
    than computation.
  common_mistake: The most common mistake is to blame the increased total FLOPs of the fused model or
    some form of OS-level scheduling overhead. While the FLOPs might be slightly higher, it doesn't account
    for a 20% performance regression. The real issue is not the *amount* of compute, but the *character*
    of the compute and its interaction with the memory subsystem.
  napkin_math: 'Let''s model the performance using the Jetson AGX Orin''s specs: 275 TOPS (INT8 peak)
    and 204.8 GB/s memory bandwidth. The hardware''s ridge point is roughly `275 TOPS / 204.8 GB/s ≈ 1342
    Ops/Byte`.'
