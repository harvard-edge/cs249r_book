title: The A/B Storage Tax
scenario: You are designing the Over-the-Air (OTA) update strategy for a fleet of autonomous edge devices.
  Each device has 16 GB of storage, and the complete system image (OS, runtime, and models) is 4 GB. To
  ensure that a failed update doesn't brick the device, you must implement a seamless A/B partitioning
  scheme. Identify the minimum total storage that must be reserved for the A and B system partitions combined.
question: "What minimum storage must be reserved for the A and B system partitions if the full system image is 4 GB?"
details:
  realistic_solution: A robust A/B OTA update mechanism requires two identical partitions. One is the
    'active' partition, running the current firmware. The other is the 'inactive' partition, which serves
    as the target for the new OTA update. This allows the system to remain fully functional while the
    update is downloaded and installed. If the update fails, the system can simply boot back into the
    original, untouched active partition. Therefore, the total storage required is twice the size of a
    single system image.
  common_mistake: Engineers unfamiliar with embedded systems reliability often only budget for a single
    system partition, forgetting that a robust A/B scheme requires a full, independent copy of the entire
    system image. They mistakenly think about patch/delta sizes, not the space for the inactive slot that
    receives the full update before being swapped to active.
  napkin_math: 'System Image Size: 4 GB | Required Partitions for A/B Scheme: 2 (one active, one inactive)
    | Total Reserved Storage = System Image Size × 2 | Total Reserved Storage = 4 GB × 2 = 8 GB'
  options:
  - 4 GB
  - 16 GB
  - 8 GB
  - 6 GB
  correct_index: 2
