title: 'The A/B Storage Tax'
scenario: 'You are designing the Over-the-Air (OTA) update strategy for a fleet of autonomous edge devices. Each device has 16 GB of storage, and the complete system image (OS, runtime, and models) is 4 GB. To ensure that a failed update doesn''t brick the device, you must implement a seamless A/B partitioning scheme.'
question: 'What minimum storage must be reserved for the A and B system partitions if the full system image is 4 GB?'
details:
  realistic_solution: 'A robust A/B OTA update mechanism requires two identical partitions. One is the active partition, running the current firmware. The other is the inactive partition, which serves as the target for the new OTA update. The total storage required is twice the size of a single system image.'
  common_mistake: 'Only budgeting for a single system partition, or just the size of the delta patch. The device runs out of storage during the OTA extraction process.'
  napkin_math: |
    **Assumptions & Constraints:**
    - System Image Size: 4 GB.
    - Required Partitions for A/B Scheme: 2 (one active, one inactive).

    **Calculations:**
    - Total Reserved Storage = System Image Size * 2.
    - Total Reserved Storage = 4 GB * 2 = 8 GB.

    **Conclusion & Interpretation:**
    - **Result: 8 GB (Storage-Bound)**. 8 GB must be reserved for safe A/B OTA updates.
  options:
  - '4 GB'
  - '16 GB'
  - '8 GB'
  - '6 GB'
  correct_index: 2
