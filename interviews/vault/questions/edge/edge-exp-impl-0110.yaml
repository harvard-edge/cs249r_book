title: Edge Drift Detection Overhead
scenario: You are running a computer vision pipeline on an on-premise Qualcomm Cloud AI 100 accelerator
  (400 TOPS INT8, 32 GB LPDDR4x, 75W) at a remote manufacturing facility. To detect data drift locally
  without transmitting raw frames to the cloud, you must compute the KL divergence of the image brightness
  histogram (256 bins) over a sliding window of 10,000 frames. Write the formula for KL divergence and
  calculate the exact memory footprint in bytes to store both the reference and current distributions
  (assuming FP32 precision), as well as the number of operations required per check.
details:
  realistic_solution: The correct approach is to maintain simple frequency counts for the 256 bins on
    the host. Once 10,000 frames are processed, convert counts to probabilities and compute sum(P(i) *
    log(P(i)/Q(i))). The memory footprint is tiny, and the compute is negligible, making it a perfect,
    lightweight drift monitor for the 75W edge power constraint.
  common_mistake: Candidates often overestimate the cost of statistical drift detection, assuming it requires
    complex parallel reductions on the accelerator. They may also incorrectly assume histograms must be
    computed in INT8 just because the accelerator's peak 400 TOPS is for INT8, forgetting that a 256-bin
    calculation easily fits in host memory and won't affect the 32 GB LPDDR4x footprint.
  napkin_math: 'Memory: 256 bins * 4 bytes/float = 1,024 bytes (1 KB) for the reference distribution Q.
    1 KB for the current distribution P. Total memory = 2 KB, which is a microscopic fraction of the 32
    GB LPDDR4x capacity. Compute for KL divergence: 256 bins * (1 division + 1 log + 1 multiplication
    + 1 addition) = 1,024 FLOPs. Compared to the 400 TOPS (400 trillion ops/sec) capacity, 1,024 operations
    every 10,000 frames adds virtually zero overhead.'
