title: Google Coral Edge TPU Precision Requirement
scenario: Your team is building a smart camera using a Google Coral Edge TPU. The device operates on a strict 2W power budget and you need to optimize the model to run efficiently on the accelerator. You are discussing the deployment pipeline and the necessary model conversion steps.
question: What quantization requirement must the model meet to run on the Coral Edge TPU instead of falling back to the CPU?
details:
  realistic_solution: The candidate must state that the Google Coral Edge TPU strictly requires models to be fully quantized to INT8 precision to utilize the accelerator. If operations are not quantized to INT8, they will fall back to the host CPU, causing severe latency spikes and defeating the purpose of the 4 TOPS accelerator.
  common_mistake: |
    **The Pitfall:** Assuming that the Edge TPU natively supports FP32 or FP16 models.
    **The Rationale:** Candidates incorrectly conflate the Edge TPU with other flexible edge accelerators like NVIDIA Jetson or assume dynamic precision switching exists.
    **The Consequence:** Compiling unsupported models that fall back to the host CPU, causing severe latency spikes and missing deadlines completely.
  napkin_math: |
    - Edge TPU Compute = 4 TOPS INT8 @ 2W.
    - Host CPU compute = ~20 GOPS @ 2W.
    - **Result: A single FP operation falling back to the 200x slower CPU can easily add 20-30ms, missing standard 10ms frame targets entirely.**
