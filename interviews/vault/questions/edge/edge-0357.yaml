title: The Federated Learning Transmission Trade-off
scenario: An automotive company wants to continuously improve its perception models using data from its
  fleet of 100,000 vehicles. For privacy and bandwidth reasons, they are using Federated Learning. In
  this setup, what is primarily transmitted from the vehicle back to the central server to update the
  global model?
question: "In this setup, what is primarily transmitted from the vehicle back to the central server to update the global model?"
details:
  realistic_solution: The correct answer is that only the model updates (e.g., gradients or updated weights)
    are transmitted back to the central server. The raw sensor data, which is large and privacy-sensitive,
    never leaves the vehicle. The server then aggregates these updates from many vehicles to improve the
    global model, which is then sent back to the fleet.
  common_mistake: The most common mistake is to confuse federated learning with centralized training.
    In a centralized approach, raw sensor data is uploaded, which is extremely costly in terms of bandwidth
    and raises significant privacy concerns. Engineers new to FL often forget that the core innovation
    is to move the *computation* to the data, not the other way around.
  napkin_math: 'Let''s quantify the bandwidth savings. A 10-minute segment of driving with a single 640x480
    camera at 30 FPS, with frames compressed to ~100KB, generates: 10 min × 60s/min × 30 FPS × 100KB/frame
    = 1.8 GB of raw data. In contrast, the update for a typical edge perception model (e.g., MobileNet-class)
    might be around 10-50 MB. The ratio is stark: transmitting the 1.8 GB of raw data would be over 100x
    more bandwidth-intensive than sending a ~15 MB model weight update. At fleet scale, this is the difference
    between feasible and impossible.'
  options:
  - Raw sensor data (e.g., images, LiDAR point clouds).
  - Anonymized user driving statistics and routes.
  - Model updates (e.g., gradients or weights).
  - Real-time inference latency and power consumption metrics.
  correct_index: 2
