title: Edge TPU Activation and Weight Budgeting
scenario: You are deploying a real-time object detection model for a battery-powered security camera using the Google Coral Edge TPU in a USB form factor. The platform provides 4 TOPS for INT8 operations and operates on a strict 2W power budget, meaning all compute must happen on-chip to avoid catastrophic power and latency penalties from USB data transfers.
question: How would you size the CNN weights, activations, and intermediate tensors so the Coral Edge TPU keeps the detector in one INT8 subgraph?
details:
  realistic_solution: Commandeer peak activation memory explicitly, noting that early, high-resolution convolutional blocks form the overriding SRAM bottleneck. Enforce aggressive Stride 2 downsampling natively at the ingestion layer to mathematically halve output dimensions, forcing the entire INT8 activation tensor down into the TPU's constrained onboard cache without triggering expensive graph splintering over the host USB bridge.
  common_mistake: |
    **The Pitfall:** Sizing the model footprint explicitly by weight parameters while completely discarding forward-pass activation geometries.
    **The Rationale:** Candidates rely on standard file-size benchmarks rather than analyzing runtime structural tensor volumes.
    **The Consequence:** The compiler is forced to split the execution subgraph, generating immense USB I/O delays that instantly shatter the strict 2W operational envelope.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Input Tensor: 256x256x3 RGB.
       - Coral SRAM Boundary: ~2.3 MB total budget.
       - Early Feature Map: 3x3 Conv, 32 Filters (INT8).
    2. **Calculations:**
       - Base Stride 1 Activation = 256 * 256 * 32 = 2.097 MB.
       - Base Storage Total: Input + Weights + 2.097 MB > 2.3 MB (OOM crash).
       - Optimized Stride 2 Activation = 128 * 128 * 32 = 0.524 MB.
       - Savings: 2.097 MB - 0.524 MB = 1.573 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Maintained Subgraph**. Stride 2 rescues ~1.6 MB, locking the execution fully into the device cache.
