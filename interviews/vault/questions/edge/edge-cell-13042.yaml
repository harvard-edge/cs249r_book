title: 'Edge Queueing Theory Fluency: Back-of-Envelope Edge Queue Sizing'
scenario: 'A Jetson Orin (275 TOPS INT8, 60W) must handle 4 concurrent camera streams each at 30 FPS.
  Your ResNet-50 model (INT8, 4 GOPS) needs to process 120 frames/s. Without looking up formulas, estimate:
  capacity, utilization, queue wait at ρ, and whether the system is feasible. ResNet-50 INT8 throughput
  on Jetson Orin: 1200 FPS (from TensorRT benchmark).'
details:
  realistic_solution: 'Capacity: 1200 FPS (given benchmark). Load: 4 streams * 30 FPS = 120 FPS. Utilization:
    ρ = 120/1200 = 0.1. Very low. M/D/1 Wq = 0.01/(2*1200*0.9) = 0.01/2160 ≈ 4.6μs. W = 4.6μs + 0.83ms
    = 0.835ms. P99 ≈ 2ms. Totally feasible with 90% spare capacity. Can add 10x more cameras (40 streams)
    before hitting ρ=1.0. At 40 streams: ρ=1.0, unstable. At 36 streams: ρ=0.9, W = 0.9²/(2*1200*0.1)
    + 0.83ms = 3.375ms + 0.83 = 4.2ms. Still meets any reasonable SLO.'
  common_mistake: Confusing TOPS capacity with actual model throughput — need benchmark FPS numbers, not
    just TOPS/model_GOPS, because memory bandwidth and dataflow efficiency matter.
  napkin_math: 'μ=1200 FPS, λ=120 FPS, ρ=0.1. Wq (M/D/1)=ρ²/(2μ(1-ρ))=0.01/(2160)=4.6μs. W=0.83ms. P99≈2ms.
    Room for growth: 10x before instability. Power check: 60W for 120 FPS. If needed at 1200 FPS: still
    60W (GPU utilization scales, not power-linear). Real: power scales from idle (~15W) to full load (60W).
    At 120 FPS: ~21W. Efficiency: 120 FPS / 21W = 5.7 FPS/W. Hailo-8 comparison: 26 TOPS / 4 GOPS = 6500
    FPS theoretical, power: 2.5W for 120 FPS = 48 FPS/W, 8x more efficient.'
