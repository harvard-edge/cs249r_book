title: Load Balancing for Dynamic Qualcomm Cloud AI 100 Inference Workloads
scenario: A critical ML inference service is being deployed on a cluster of Qualcomm
  Cloud AI 100 accelerators, each providing 32 GB LPDDR4x memory and 400 TOPS INT8
  performance. The service experiences frequent scaling events (adding or removing
  accelerators). The engineering team needs a request routing strategy that minimizes
  the impact of these events on ongoing inference tasks. Identify the most suitable
  load balancing algorithm for this scenario and explain its core mechanism for reducing
  data re-partitioning and cache invalidation across the Qualcomm Cloud AI 100 devices.
question: Which load balancing algorithm best minimizes re-partitioning and cache
  invalidation during Cloud AI 100 scaling events, and how does it work?
details:
  realistic_solution: Consistent hashing is the most suitable load balancing algorithm.
    Its core mechanism involves mapping both the accelerators and the request keys
    onto a conceptual ring. When an accelerator is added or removed, only a small,
    localized portion of the hash space is affected, meaning only a fraction of the
    request mappings change. This significantly reduces the number of Qualcomm Cloud
    AI 100 accelerators that need to re-cache large ML models (which can occupy a
    substantial portion of the 32 GB LPDDR4x memory), thereby minimizing data re-partitioning,
    preserving cached states, and maintaining stable high-throughput inference performance
    during scaling events.
  common_mistake: A common pitfall is implementing simpler load balancing techniques
    like modulo hashing or basic round-robin without considering the stateful nature
    of ML inference and the significant cost of reloading models (which can be several
    GBs into 32 GB LPDDR4x memory) on Qualcomm Cloud AI 100 accelerators. This oversight
    leads to substantial performance degradation and high latency spikes during dynamic
    scaling or node failures, as most or all cached models might need to be reloaded
    across the cluster.
  napkin_math: "Consider a cluster of 10 accelerators, each with a 16 GB model. Total cache = 160 GB.\nIf 1 accelerator is added (10 to 11):\n1. Naive modulo hashing: ~10/11 (90.9%) of keys are remapped. 0.909 * 160 GB = 145.4 GB of model data must be reloaded.\n2. Consistent hashing: ~1/11 (9.09%) of keys are remapped. 0.0909 * 160 GB = 14.5 GB of model data must be reloaded.\nIf 1 accelerator is removed (10 to 9):\n1. Naive modulo hashing: ~9/10 (90%) of keys are remapped. 0.90 * 160 GB (total cache) = 144 GB of model data must be reloaded.\n2. Consistent hashing: ~1/10 (10%) of keys are remapped. 0.10 * 160 GB = 16 GB of model data must be reloaded.\nIn both scenarios, consistent hashing saves massive amounts of LPDDR4x memory transfers, avoiding latency spikes."
