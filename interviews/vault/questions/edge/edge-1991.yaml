title: Load Balancing for Dynamic Qualcomm Cloud AI 100 Inference Workloads
scenario: A critical ML inference service is being deployed on a cluster of Qualcomm Cloud AI 100 accelerators, each providing 32 GB LPDDR4x memory and 400 TOPS INT8 performance. The service experiences frequent scaling events (adding or removing accelerators). The engineering team needs a request routing strategy that minimizes the impact of these events on ongoing inference tasks.
question: Which load balancing algorithm best minimizes re-partitioning and cache invalidation during Cloud AI 100 scaling events, and how does it work?
details:
  realistic_solution: Consistent hashing is the most suitable load balancing algorithm. Its core mechanism involves mapping both the accelerators and the request keys onto a conceptual ring. When an accelerator is added or removed, only a small, localized portion of the hash space is affected, meaning only a fraction of the request mappings change. This significantly reduces the number of Qualcomm Cloud AI 100 accelerators that need to re-cache large ML models (which can occupy a substantial portion of the 32 GB LPDDR4x memory), thereby minimizing data re-partitioning, preserving cached states, and maintaining stable high-throughput inference performance during scaling events.
  common_mistake: |
    **The Pitfall:** Implementing modulo hashing or basic round-robin load balancing.
    **The Rationale:** Candidates forget the stateful nature of ML inference, where large models must be loaded into local accelerator memory (LPDDR4x).
    **The Consequence:** Massive latency spikes during scaling events because the majority of cached models are unnecessarily invalidated and re-transferred.
  napkin_math: |
    - **Cluster Setup:** 10 accelerators, 16 GB model each. Total cache = 160 GB.
    - **Scale up 10 to 11 (Adding 1 node):**
      - **Modulo hashing:** ~10/11 (90.9%) keys remapped. 0.909 * 160 GB = 145.4 GB reloaded.
      - **Consistent hashing:** ~1/11 (9.09%) keys remapped. 0.0909 * 160 GB = **14.5 GB reloaded**.
    - **Result:** Consistent hashing saves massive amounts of memory transfers, avoiding latency spikes.
