title: Theoretical NPU Execution Time
scenario: An INT8 ResNet requires 8 Giga-operations (4 GMACs) per inference. It runs on a Jetson AGX Orin rated at 275 TOPS.
question: Calculate the theoretical minimum time required for a single inference assuming 100% compute utilization.
details:
  realistic_solution: To determine the absolute minimum execution bound, divide the exact computational requirement by the theoretical peak capability of the hardware. The NPU capacity is scaled in Tera-Operations (10^12), while the model requires Giga-Operations (10^9). At 100% utilization, the math demonstrates that the compute time is virtually zero, heavily implying that real-world performance will be strictly dominated by I/O and memory bottlenecks.
  common_mistake: |
    **The Pitfall:** Using MACs (Multiply-Accumulates) interchangeably with total operations in the final division.
    **The Rationale:** Candidates incorrectly divide GMACs by TOPS without multiplying by 2 (since 1 MAC = 1 multiply + 1 addition = 2 operations).
    **The Consequence:** The latency calculation is artificially halved, leading to overly optimistic throughput projections that the hardware mathematically cannot support.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute requirement: 8 Giga-operations (8 * 10^9 Ops).
       - Hardware capacity: 275 TOPS (275 * 10^12 Ops/sec).
       - Utilization: 100% theoretical peak.
    2. **Calculations:**
       - Theoretical Time = Compute Required / Compute Capacity
       - Time = (8 * 10^9 Ops) / (275 * 10^12 Ops/sec)
       - Time = 0.00002909 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: 29 microseconds (29 μs). The system is theoretically Compute-Bound at 29μs, but realistically will be Memory-Bound by I/O overheads at this microsecond scale.**
