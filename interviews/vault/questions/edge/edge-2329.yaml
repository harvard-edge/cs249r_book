title: Theoretical NPU Execution Time
scenario: An INT8 ResNet requires 8 Giga-operations (4 GMACs) per inference. It runs
  on a Jetson AGX Orin rated at 275 TOPS.
question: Calculate the theoretical minimum time required for a single inference assuming
  100% compute utilization.
details:
  realistic_solution: The compute requirement is 8 * 10^9 operations. The NPU capacity
    is 275 * 10^12 operations per second. Time = 8e9 / 275e12 = 0.000029 seconds,
    or 29 microseconds.
  common_mistake: Using 4 GMACs instead of 8 Giga-operations, throwing off the calculation
    by a factor of 2.
  napkin_math: 8e9 / 275e12 = 29e-6 s
