title: Theoretical NPU Execution Time
scenario: An INT8 ResNet requires 8 Giga-operations (4 GMACs) per inference. It runs on a Jetson AGX Orin rated at 275 TOPS.
question: Calculate the theoretical minimum time required for a single inference assuming 100% compute utilization.
details:
  realistic_solution: The compute requirement is 8 * 10^9 operations. The NPU capacity is 275 * 10^12 operations per second. Time = 8e9 / 275e12 = 0.000029 seconds, or 29 microseconds.
  common_mistake: |
    **The Pitfall:** Using MACs instead of total operations in the calculation.
    **The Rationale:** Candidates incorrectly divide GMACs by TOPS without multiplying by 2 (since 1 MAC = 2 operations).
    **The Consequence:** The calculation is off by a factor of 2, leading to overly optimistic latency projections.
  napkin_math: |
    1. Identify compute requirement: 8 Giga-operations (8 * 10^9 operations).
    2. Identify hardware capacity: 275 TOPS (275 * 10^12 operations per second).
    3. Calculate theoretical time: (8 * 10^9) / (275 * 10^12) = 0.000029 seconds.
    **The theoretical minimum time for a single inference is 29 microseconds (29 μs).**
