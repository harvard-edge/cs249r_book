title: Edge New 0032
scenario: An edge server with a T4 handles 50GFLOP inferences locally, but can offload to a cloud H100 via a 50MB/s 5G link.
question: For a 50GFLOP inference and 5MB image over a 50MB/s 5G link, should the T4 run locally or offload to an H100?
details:
  realistic_solution: Retain execution locally on the T4. While the H100 compute delta is vast, edge-to-cloud physics dictates that wide-area network serialization overhead entirely negates cloud computational supremacy for lightweight queries.
  common_mistake: |
    **The Pitfall:** Ignoring network transmission latency.
    **The Rationale:** Candidates see that a cloud accelerator is over 15x faster at computing and blindly recommend offloading, missing the massive cost of transferring the input payload over a WAN link.
    **The Consequence:** Designing an architecture that is orders of magnitude slower than a purely local processing approach.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Inference Workload: 50 GFLOPs.
       - Payload Size: 5 MB.
       - Network Bandwidth: 50 MB/s.
       - T4 Peak Compute (FP16/INT8 blended heuristic): ~65 TFLOPS.
       - H100 Peak Compute: 989 TFLOPS.
    2. **Calculations:**
       - Local T4 Compute Time = 50 GFLOPs / 65,000 GFLOPS ≈ 0.00076 s (0.76 ms).
       - Cloud Network Transfer Time = 5 MB / 50 MB/s = 0.1 s (100 ms).
       - Cloud H100 Compute Time = 50 GFLOPs / 989,000 GFLOPS ≈ 0.00005 s (0.05 ms).
       - Total Cloud Offload Time = 100 ms (Network) + 0.05 ms (Compute) = 100.05 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 0.76 ms Local (Network-Latency-Bound Cloud)** - Local processing is ~130x faster due to wide-area network serialization costs.
