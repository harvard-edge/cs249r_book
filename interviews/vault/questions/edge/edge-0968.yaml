title: Edge New 0032
scenario: An edge server with a T4 handles 50GFLOP inferences locally, but can offload to a cloud H100
  (989 TFLOPS) via a 50MB/s 5G link. Analyze the latency tradeoff for offloading a 5MB image payload.
details:
  realistic_solution: The H100 has massively superior compute, executing the mathematics almost instantaneously
    compared to the T4. However, the bottleneck is purely the wide-area network transmission of the 5MB
    payload. Processing locally entirely avoids the 5G latency. The mathematical reality dictates running
    this workload locally on the T4, as the network serialization and transfer delay completely dwarfs
    the edge compute duration.
  common_mistake: Offloading workloads to the cloud simply because the cloud accelerator is 15x faster,
    completely ignoring the devastating impact of network I/O.
  napkin_math: 'Local T4 compute: 50 GFLOPs / 65 TFLOPS = 0.76ms. Cloud offload: 5MB / 50MB/s = 100ms
    network transfer + (50 GFLOPs / 989 TFLOPS = ~0.05ms compute) = 100.05ms total. Local is over 100x
    faster.'
