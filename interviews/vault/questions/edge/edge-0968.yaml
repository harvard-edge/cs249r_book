title: Edge New 0032
scenario: An edge server with a T4 handles 50GFLOP inferences locally, but can offload to a cloud H100 (989 TFLOPS) via a 50MB/s 5G link.
question: For a 50GFLOP inference and 5MB image over a 50MB/s 5G link, should the T4 run locally or offload to an H100?
details:
  realistic_solution: The H100 has massively superior compute, executing the mathematics almost instantaneously compared to the T4. However, the bottleneck is purely the wide-area network transmission of the 5MB payload. Processing locally entirely avoids the 5G latency. The mathematical reality dictates running this workload locally on the T4, as the network serialization and transfer delay completely dwarfs the edge compute duration.
  common_mistake: |
    **The Pitfall:** Ignoring network transmission latency.
    **The Rationale:** Candidates see that a cloud accelerator is over 15x faster at computing and blindly recommend offloading, missing the massive cost of transferring the input payload over a WAN link.
    **The Consequence:** Designing an architecture that is orders of magnitude slower than a purely local processing approach.
  napkin_math: |
    1. **Local T4 Compute:** 50 GFLOPs / 65 TFLOPS = 0.76ms.
    2. **Cloud Network Transfer:** 5MB / 50MB/s = 100ms.
    3. **Cloud H100 Compute:** 50 GFLOPs / 989 TFLOPS = ~0.05ms.
    4. **Cloud Total Time:** 100ms + 0.05ms = 100.05ms.
    **Result: Local T4 processing is ~130x faster than cloud offloading.**
