title: Adapter Compression for Bandwidth-Constrained Edge Deployment
scenario: You need to OTA-update LoRA adapters to 10,000 edge devices over a cellular
  network with 1 Mbps average bandwidth. Design the adapter update delivery system.
question: How would you deliver LoRA adapter updates to 10,000 edge devices over 1
  Mbps cellular links?
details:
  realistic_solution: 'Rank-16 adapter (7B model): 2 × 16 × 4096 × 32 layers × 2B
    = 8.4 MB. Over 1 Mbps: 8.4 MB × 8 / 1 Mbps = 67 seconds — ~1 minute per update,
    acceptable for nightly OTA. For weekly incremental updates, delta compression
    (adapter_v2 - adapter_v1): typical delta 5-10% of full size = 0.4-0.8 MB → 3-6 seconds
    over 1 Mbps — excellent. Use adapter quantization (FP16 → INT8) for further 2x
    size reduction at minimal quality loss.'
  common_mistake: Sending full adapter weights even though rank-16 adapters are already
    small. Engineers ignore that delta compression between adapter versions can reduce
    update sizes by 10-100x for incremental weekly updates.
  napkin_math: 'Rank-16 full adapter: 8.4 MB. Delta update (10% change): 0.84 MB. INT8
    quantized delta: 0.42 MB. Transfer at 1 Mbps: 0.42 MB × 8 / 1 Mbps = 3.36 seconds.
    10,000 devices: if pushed simultaneously with CDN, bandwidth cost = 10K × 0.42
    MB = 4.2 GB/week. CDN egress ~$0.01/GB: $0.04/week — negligible.'
