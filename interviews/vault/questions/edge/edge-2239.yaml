title: Adapter Compression for Bandwidth-Constrained Edge Deployment
scenario: 'You need to OTA-update LoRA adapters to 10,000 edge devices over a cellular network with 1 Mbps average bandwidth.'
question: How would you deliver LoRA adapter updates to 10,000 edge devices over 1 Mbps cellular links?
details:
  realistic_solution: 'For incremental updates, use delta compression (adapter_v2 - adapter_v1). A typical delta is 5-10% of the full size. Over 1 Mbps, a compressed delta update takes mere seconds. Use adapter quantization (FP16 → INT8) for a further 2x size reduction at minimal quality loss.'
  common_mistake: |
    **The Pitfall:** Sending full adapter weights for every minor update.
    **The Rationale:** Engineers assume adapters are small enough not to matter, ignoring the compounding cost over low bandwidth links.
    **The Consequence:** Updates take significantly longer and cost 10-100x more bandwidth across the 10,000 device fleet.
  napkin_math: |
    *   **Rank-16 full adapter (7B model):** 2 x 16 x 4096 x 32 layers x 2B (FP16) = 8.4 MB.
    *   **Full transfer at 1 Mbps:** 8.4 MB x 8 / 1 Mbps = 67.2 seconds.
    *   **Delta Update (10% change):** 0.84 MB.
    *   **INT8 Quantized Delta:** 0.42 MB.
    *   **Transfer at 1 Mbps:** 0.42 MB x 8 / 1 Mbps = 3.36 seconds.
    *   **Result:** **10,000 devices at 0.42 MB = 4.2 GB/week CDN bandwidth, making it highly efficient.**
