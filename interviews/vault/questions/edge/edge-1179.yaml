title: 'Edge Transformer Cost Evaluation: Quantized vs Full Transformer on Jetson'
scenario: 'Compare deploying BERT-base (110M params) at FP16 vs INT8 on Jetson Orin
  (32GB LPDDR5, 275 TOPS INT8, 60W) for sentence classification. Calculate: throughput
  (sentences/second), memory footprint, latency at batch=1, and energy per inference.
  Which is better for a real-time document triage system requiring P99 < 50ms?'
question: Which is better for a real-time document triage system requiring P99 < 50ms?
details:
  realistic_solution: 'FP16: 110M*2=220MB model. Inference FLOPs at batch=1, seq=128:
    2*110M*128=28.1G per sample (rough). Memory-bound check: 28.1G/220MB=128 FLOPs/byte.
    Jetson Orin ridge (GPU): 275T/102.4G=2686. Memory bound. Time=220MB/102.4GB/s=2.15ms.
    P99 \u2248 5ms. INT8: 110MB model. Time=110MB/102.4GB/s=1.07ms. P99 \u2248 2.5ms. Both well
    under 50ms SLO. INT8: 2x faster, 2x less memory. Choose INT8. Accuracy: BERT INT8
    classification typically <0.5% degradation. Throughput at batch=64: Compute dominates (AI \u2248 7700).
    FP16 FLOPs: 64*28.1G=1.8T. Time at ~137 TFLOPs=13.1ms \u2192 4885/s. INT8 Time at 275 TOPS=6.5ms \u2192 9846/s.'
  common_mistake: Not checking arithmetic intensity at the given batch size before
    choosing between compute-bound and memory-bound analysis, and assuming INT8 is
    always faster than FP16.
  napkin_math: 'FP16 weight: 220MB. Batch=1 BW: ~220MB/102.4GB/s=2.15ms. P99\u22485ms.
    INT8 weight: 110MB. Batch=1: 1.07ms. P99\u22482.5ms. Both meet 50ms SLO with 10x headroom.
    Energy per inference: FP16 batch=1: 60W*0.00215s=0.129J=129mJ. INT8: 60W*0.00107=0.0642J=64.2mJ.
    INT8: 2x more energy efficient. Throughput advantage: INT8 batch=64 at ~9800/s
    vs FP16 ~4900/s. For 1M documents/day: FP16 needs 1M/86400/(4900*efficiency)=0.002
    Jetson Orins (same Jetson handles easily). Both are massively over-provisioned
    for document triage. Choose INT8 for energy savings and memory headroom.'
