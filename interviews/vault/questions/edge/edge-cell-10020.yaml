title: 'Mastery: Proving the Memory-Compute Optimality of Gradient Checkpointing Under Edge Constraints'
scenario: You are asked to formally justify the checkpoint interval selection for on-device fine-tuning
  of a 100M parameter ResNet on Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, effective 68 GB/s bandwidth).
  The model has N=50 layers, each with activation memory M_L = 50 MB and compute time T_L = 2 ms (forward).
  Memory budget for activations is B = 500 MB. Derive the optimal checkpoint interval k that minimizes
  total training step time, and prove it is a global optimum.
question: "What checkpoint interval k minimizes training step time for the 50-layer ResNet under a 500MB activation budget, and why is it optimal?"
details:
  realistic_solution: 'M_peak(k) = k × M_L (activations in one checkpoint window). Constraint: k ≤ B /
    M_L = 500 / 50 = 10. T_recompute(k): number of checkpoint boundaries = ceil(N/k). Each boundary triggers
    one forward pass through k layers = k × T_L. Total recompute = ceil(N/k) × k × T_L = N × T_L (independent
    of k!). Therefore T_total(k) = T_fwd + T_bwd + N × T_L = constant for all k. Since T_total is constant
    in k, any k satisfying the memory constraint is equally optimal in time. Choose k = floor(B/M_L) =
    10 to maximize memory headroom and minimize checkpoint boundary overhead (fewer synchronization points,
    better for Orin''s DMA engine). QED: k=10 is optimal (or any k ≤ 10 is equally time-optimal; k=10
    maximizes headroom).'
  common_mistake: Minimizing only memory subject to a memory constraint without modeling the actual time
    cost of recomputation as a function of k. The correct objective is to minimize T_total(k) = T_fwd
    + T_bwd + T_recompute(k) subject to M_peak(k) ≤ B.
  napkin_math: 'N=50, M_L=50 MB, B=500 MB → k_max = 10. T_recompute = 50 × 2 ms = 100 ms regardless of
    k. T_fwd = 50 × 2 ms = 100 ms. T_bwd ≈ 2 × T_fwd = 200 ms. T_total = 100 + 200 + 100 = 400 ms/step.
    Throughput: 2.5 steps/sec. With k=5 (more checkpoints): T_recompute still = 100 ms, T_total = 400
    ms — identical. k=10 preferred to halve the number of checkpoint boundary sync calls (5 vs 10).'
