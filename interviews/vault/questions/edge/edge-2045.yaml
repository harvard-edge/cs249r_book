title: Ensuring ISO 26262 Compliance on Google Coral Edge TPU for Safety-Critical ML
scenario: A critical safety system for an industrial robot requires real-time object detection and anomaly classification. The system must achieve ISO 26262 ASIL-B compliance, necessitating robust functional safety measures including deterministic execution, watchdogs, and self-tests under INT8 and 2W edge accelerator constraints.
question: How would you architect edge safety software for ASIL-B deterministic inference, watchdogs, and self-tests under strict INT8 and 2W power constraints?
details:
  realistic_solution: 'Implement a multi-layered safety architecture. For deterministic execution, tightly control the inference schedule and data flow. Utilize a dual-redundant watchdog timer approach: a system-level watchdog monitoring the application processor and a specialized inference watchdog monitoring the accelerator''s activity via its status registers or a dedicated GPIO heartbeat. Self-test routines should include: (1) power-on self-tests (POST) for memory and ALU, (2) periodic background self-tests (BIST), (3) data integrity checks (e.g., checksums) on model weights before loading, and (4) runtime plausibility checks on inference outputs. Quantization-aware training (QAT) with robust validation is crucial to ensure safety-critical outputs retain sufficient precision. Leverage RTOS features for priority-based scheduling.'
  common_mistake: |
    **The Pitfall:** Assuming that software-level error detection is sufficient.
    **The Rationale:** Candidates neglect the need for hardware-level safety mechanisms or overlook the implications of INT8-only inference on numerical stability for safety-critical calculations, as well as the limited power budget for BIST operations.
    **The Consequence:** The system fails to meet ASIL-B compliance and risks critical failure due to power brownouts or unhandled hardware faults.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Total power budget is 2W. The accelerator draws ~1.5W under load.
       * Safety-critical inference response deadline is 50ms.
       * Comprehensive self-test requires 5ms and must execute every 100ms.
    2. **Calculations:**
       * Self-test consumes 5% of the available computation time (5ms / 100ms).
       * Remaining power for other safety-critical sensors or communication modules: 2W - 1.5W = 0.5W.
    3. **Conclusion & Interpretation:**
       * **This tight power limit (0.5W margin) dictates careful power management and potentially lower frequency operation for background tasks to prevent power brownouts. Result: Power-Bound.**
