title: Ensuring ISO 26262 Compliance on Google Coral Edge TPU for Safety-Critical ML
scenario: A critical safety system for an industrial robot requires real-time object detection and anomaly classification using a Google Coral Edge TPU. The system must achieve ISO 26262 ASIL-B compliance, necessitating robust functional safety measures including deterministic execution, watchdogs, and self-tests under INT8 and 2W constraints.
question: How would you architect Coral Edge TPU safety software for ASIL-B deterministic inference, watchdogs, and self-tests under INT8 and 2W constraints?
details:
  realistic_solution: 'Implement a multi-layered safety architecture. For deterministic execution, tightly control the inference schedule and data flow, leveraging the Coral''s single-purpose design. Utilize a dual-redundant watchdog timer approach: a system-level watchdog monitoring the application processor and a specialized ''inference watchdog'' monitoring the Coral TPU''s activity via its status registers or a dedicated GPIO heartbeat. Self-test routines should include: (1) power-on self-tests (POST) for memory and ALU, (2) periodic background self-tests (BIST) for the TPU, (3) data integrity checks (e.g., checksums) on model weights before loading, and (4) runtime plausibility checks on inference outputs. Quantization-aware training (QAT) with robust validation is crucial to ensure safety-critical outputs retain sufficient precision even with INT8-only operations. Leverage dedicated safety libraries or RTOS features for priority-based scheduling to guarantee deterministic execution of safety functions.'
  common_mistake: |
    **The Pitfall:** Assuming that software-level error detection is sufficient.
    **The Rationale:** Candidates neglect the need for hardware-level safety mechanisms or overlook the implications of INT8-only inference on numerical stability for safety-critical calculations, as well as the limited power budget.
    **The Consequence:** The system fails to meet ASIL-B compliance and risks critical failure due to power brownouts or unhandled hardware faults.
  napkin_math: |
    *   If the safety-critical inference requires a response within 50ms, and the Coral provides 4 TOPS (Trillions of Operations Per Second) INT8, compute is not the bottleneck.
    *   If a comprehensive self-test takes 5ms and must run every 100ms, this consumes 5% of the available computation time.
    *   Given a 2W power budget, if the Coral itself draws ~1.5W under load, remaining power for other safety-critical sensors or communication modules is limited to 0.5W.
    *   **This limited power budget dictates careful power management and potentially lower frequency operation for less critical tasks to prevent thermal runaway or power brownouts.**
