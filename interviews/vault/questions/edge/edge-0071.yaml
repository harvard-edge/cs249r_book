title: The Overheating Vision Pipeline
scenario: 'Your new edge AI camera, powered by an NVIDIA Jetson Orin Nano, achieves an impressive 50 FPS for YOLOv5s during initial tests. However, after 30 seconds of continuous operation, the framerate drops sharply to a consistent 25 FPS.'
question: 'What is the most likely culprit for this performance drop, and how does it impact real-time design?'
details:
  realistic_solution: 'The most likely culprit is **thermal throttling**. Edge devices like the Jetson Orin Nano have a Thermal Design Power (TDP) limit. When the SoC''s power consumption exceeds its cooling solution''s dissipation capability for a sustained period, the internal temperature rises. To prevent overheating and potential damage, the system''s firmware or operating system automatically reduces the clock frequencies of the CPU, GPU, and NPU. This directly reduces the available compute power, leading to a drop in sustained performance (e.g., halving the framerate from 50 FPS to 25 FPS).'
  common_mistake: |
    **The Pitfall:** Blaming the drop on software bugs or memory leaks.
    **The Rationale:** Developers often assume static hardware performance and immediately look for code optimization flaws.
    **The Consequence:** They waste time profiling software when the root cause is physical thermal management.
  napkin_math: |
    * Passive heatsink R_thermal ≈ 4.5 °C/W. At 35 °C ambient: max sustained power = (95 − 35) / 4.5 = 13.3 W.
    * Orin Nano peak burst mode: ~15 W → yields 50 FPS.
    * Sustained thermal mode triggers: ~7 W limit → yields 50 × (7/15) ≈ 23 FPS.
    * 50 FPS × 20 ms/frame = 1.0 s compute/s (GPU saturated).
    * After throttle: 25 FPS × 40 ms = same utilization, half throughput.
    * **Conclusion: The system must be designed for the sustained 7 W thermal envelope, not the brief 15 W burst spec.**
