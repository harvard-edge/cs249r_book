title: The Overheating Vision Pipeline
scenario: Your new edge AI camera, powered by an NVIDIA Jetson Orin Nano, achieves an impressive 50 FPS
  for YOLOv5s during initial tests. However, after 30 seconds of continuous operation, the framerate drops
  sharply to a consistent 25 FPS. The CPU/GPU utilization reports are still high. What's the most likely
  culprit, and how does this phenomenon impact the reliability and design of real-time vision applications?
question: "What's the most likely culprit, and how does this phenomenon impact the reliability and design of real-time vision applications?"
details:
  realistic_solution: The most likely culprit is **thermal throttling**. Edge devices like the Jetson
    Orin Nano have a Thermal Design Power (TDP) limit. When the SoC's power consumption exceeds its cooling
    solution's dissipation capability for a sustained period, the internal temperature rises. To prevent
    overheating and potential damage, the system's firmware or operating system automatically reduces
    the clock frequencies of the CPU, GPU, and NPU. This directly reduces the available compute power,
    leading to a drop in sustained performance (e.g., halving the framerate from 50 FPS to 25 FPS).
  common_mistake: Blaming software bugs, memory leaks, or poor code optimization, or assuming a static
    performance profile.
  napkin_math: '- Passive heatsink R_thermal ≈ 4.5 °C/W. At 35 °C ambient: max sustained power = (95 −
    35) / 4.5 = 13.3 W | - Orin Nano peak burst: ~15 W → 50 FPS. Sustained 7 W mode → 50 × (7/15) ≈ 23
    FPS | - 50 FPS × 20 ms/frame = 1.0 s compute/s (GPU saturated). After throttle: 25 FPS × 40 ms = same
    utilization, half throughput | - => Design for the sustained 7 W thermal envelope, not the 15 W burst
    spec'
