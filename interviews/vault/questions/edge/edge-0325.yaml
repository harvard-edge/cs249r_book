title: 'The Quantization Energy Dividend: Quantization Fundamentals'
scenario: You're optimizing a perception model's convolutional layers on an autonomous vehicle's edge device. The baseline model uses FP16 precision. To reduce power consumption and stay within the thermal envelope, you're tasked to evaluate quantizing the model to INT8.
question: What is the approximate energy reduction per operation when moving from an FP16 multiply-accumulate (MAC) to an INT8 MAC?
details:
  realistic_solution: An FP16 operation consumes roughly 5 times more energy than an INT8 operation. This is a fundamental ratio derived from the physics of silicon. While the jump from FP32 to INT8 is a massive ~18x energy saving, and from FP32 to FP16 is ~3.4x, the specific comparison between FP16 and INT8 is the ratio of those two improvements.
  common_mistake: |
    **The Pitfall:** Assuming energy savings scale linearly with bit-width (e.g., 16-bit to 8-bit yields a 2x saving).
    **The Rationale:** Engineers apply basic data sizing logic to circuit physics, ignoring that the energy cost of multipliers and memory access follows a non-linear curve.
    **The Consequence:** Radically underestimating the power efficiency of INT8 quantization, potentially abandoning it in favor of costlier hardware upgrades.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Standard silicon physics invariants for energy.
       * Operation: Multiply-Accumulate (MAC).
       * Precision switch: FP16 to INT8.
    2. **Calculations:**
       * FP16 MAC energy cost: ~5.3 pJ.
       * INT8 MAC energy cost: ~1.0 pJ.
       * Ratio: 5.3 pJ / 1.0 pJ = 5.3x.
    3. **Conclusion & Interpretation:**
       **Result: ~5x energy savings**. Moving from FP16 to INT8 slashes pure computational energy by over 5x and halves DRAM access costs, fundamentally shifting the thermal limits.
  options:
  - ~2× savings
  - ~5× savings
  - ~18× savings
  - Negligible; savings are in memory size, not energy
