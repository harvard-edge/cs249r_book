title: 'The Quantization Energy Dividend: Quantization Fundamentals'
scenario: You're optimizing a perception model's convolutional layers on an autonomous vehicle's edge
  device, which has a strict 30W power budget. The baseline model uses FP16 precision. To reduce power
  consumption and stay within the thermal envelope, you're tasked to evaluate quantizing the model to
  INT8. What is the approximate energy reduction per operation when moving from an FP16 multiply-accumulate
  (MAC) to an INT8 MAC?
question: "What is the approximate energy reduction per operation when moving from an FP16 multiply-accumulate (MAC) to an INT8 MAC?"
details:
  realistic_solution: An FP16 operation consumes roughly 5 times more energy than an INT8 operation. This
    is a fundamental ratio derived from the physics of silicon. While the jump from FP32 to INT8 is a
    massive ~18x energy saving, and from FP32 to FP16 is ~3.4x, the specific comparison between FP16 and
    INT8 is the ratio of those two improvements.
  common_mistake: Engineers often incorrectly assume that energy savings scale linearly with bit-width.
    They think that halving the bits (from 16 to 8) should halve the energy consumption (a 2x saving).
    This mental shortcut ignores the non-linear physics of digital circuits, where the energy cost of
    data movement, control logic, and clocking doesn't scale down as neatly as the arithmetic itself.
  napkin_math: 'From standard silicon physics invariants, an FP16 MAC requires roughly 5.3 pJ of energy,
    while an INT8 MAC requires roughly 1.0 pJ. Ratio: 5.3 / 1.0 = 5.3x. By quantizing from FP16 to INT8,
    the pure computational energy is reduced by more than 5x. Furthermore, INT8 halves the memory bandwidth
    requirement (1 byte vs 2 bytes), saving immense energy on expensive DRAM accesses to stay under 30W.'
  options:
  - ~2× savings
  - ~5× savings
  - ~18× savings
  - Negligible; savings are in memory size, not energy
  correct_index: 1
