title: Optimizing Transformer Inference on Qualcomm Cloud AI 100
scenario: You are tasked with optimizing the inference latency of a transformer model's key attention layer on the Qualcomm Cloud AI 100, which features 32 GB LPDDR4x memory, 400 TOPS INT8 performance, and a 75W power envelope. The layer involves large matrix multiplications. Describe your approach, specifically detailing how you would leverage the GPU execution model (warps, thread blocks, occupancy) and memory coalescing to maximize utilization. How would you investigate the potential use of Tensor Cores for INT8 operations, and what are the trade-offs to consider given the power constraint?
question: How would you optimize the transformer attention GEMMs on Cloud AI 100 using execution model tuning, coalescing, and INT8 Tensor Cores?
details:
  realistic_solution: Implement custom kernels (e.g., using a low-level programming model similar to CUDA for Qualcomm's architecture) with careful attention to thread block and warp sizing to match the hardware's SIMD units. Utilize shared memory for data reuse and ensure global memory accesses are coalesced. Profile the kernel to identify bottlenecks (e.g., compute-bound vs. memory-bound). For Tensor Cores, map matrix multiplication operations to utilize them, often requiring specific data layouts and dimensions, ensuring data is in INT8 format. Continuously monitor power consumption to stay within the 75W budget, potentially by dynamically adjusting clock frequencies or workload distribution, or employing aggressive data quantization techniques.
  common_mistake: |
    **The Pitfall:** Ignoring memory access patterns and assuming peak TOPS translates directly to performance.
    **The Rationale:** Candidates fail to ensure global memory accesses are coalesced or use sub-optimal launch configurations, leading to low occupancy.
    **The Consequence:** The GPU tensor cores starve for data, resulting in extremely poor utilization and failing to meet latency targets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Qualcomm Cloud AI 100: 400 TOPS INT8, 32 GB LPDDR4x.
       - Transformer attention GEMM requires 100 GOPS.
    2. **Calculations:**
       - Theoretical minimum compute time = 100e9 operations / 400e12 operations/s = 0.25 ms.
       - To achieve this, the LPDDR4x bandwidth must supply data fast enough. If the operation needs 16 GB of data, 16 GB / 100 GB/s = 160 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 0.25 ms compute vs 160 ms data load.** Without aggressive coalescing and shared memory reuse, the operation will be completely **Memory-Bandwidth-Bound**.
