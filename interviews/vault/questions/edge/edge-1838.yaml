title: Optimizing Transformer Inference on Qualcomm Cloud AI 100
scenario: You are tasked with optimizing the inference latency of a transformer model's
  key attention layer on the Qualcomm Cloud AI 100, which features 32 GB LPDDR4x memory,
  400 TOPS INT8 performance, and a 75W power envelope. The layer involves large matrix
  multiplications. Describe your approach, specifically detailing how you would leverage
  the GPU execution model (warps, thread blocks, occupancy) and memory coalescing
  to maximize utilization. How would you investigate the potential use of Tensor Cores
  for INT8 operations, and what are the trade-offs to consider given the power constraint?
question: How would you optimize the transformer attention GEMMs on Cloud AI 100 using
  execution model tuning, coalescing, and INT8 Tensor Cores?
details:
  realistic_solution: Implement custom kernels (e.g., using a low-level programming
    model similar to CUDA for Qualcomm's architecture) with careful attention to thread
    block and warp sizing to match the hardware's SIMD units. Utilize shared memory
    for data reuse and ensure global memory accesses are coalesced. Profile the kernel
    to identify bottlenecks (e.g., compute-bound vs. memory-bound). For Tensor Cores,
    map matrix multiplication operations to utilize them, often requiring specific
    data layouts and dimensions, ensuring data is in INT8 format. Continuously monitor
    power consumption to stay within the 75W budget, potentially by dynamically adjusting
    clock frequencies or workload distribution, or employing aggressive data quantization
    techniques.
  common_mistake: Ignoring memory access patterns leading to poor memory coalescing,
    or sub-optimal launch configurations that result in low occupancy, underutilizing
    the available compute units. Another common mistake is not considering the power
    budget when designing an optimized solution, leading to throttling or instability.
  napkin_math: If a specific INT8 matrix multiplication requires 100 GOPS, and the
    Qualcomm Cloud AI 100 offers 400 TOPS INT8 peak performance, theoretically it
    could complete this operation in 100e9 / 400e12 = 0.25 ms (excluding overheads).
    However, memory bandwidth (LPDDR4x) is a critical factor; if the operation requires,
    say, 16 GB/s of bandwidth, and the device has 100 GB/s, it might be memory-bound.
    Optimal occupancy is key to reaching close to peak FLOPS/TOPS.
