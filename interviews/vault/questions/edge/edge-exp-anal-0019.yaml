title: Thermal Throttling and Task Shedding on Orin
scenario: An autonomous drone uses an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP, Ampere
  GPU + DLA accelerator) running a primary navigation model and an auxiliary anomaly detection model.
  Under normal conditions, the system draws 55W (10W static SoC overhead, 32W dynamic navigation on GPU,
  13W dynamic anomaly on DLA). When ambient temperatures spike, the system caps power to 45W. The system
  degrades by completely terminating the DLA workload rather than proportionally downscaling both processors'
  frequencies. Explain why proportional downscaling would lead to a catastrophic failure given a strict
  25ms aerodynamic control loop deadline, assuming baseline navigation inference takes 20ms.
question: "Why should the drone shed the DLA anomaly model instead of proportionally downscaling both workloads under the 45W cap?"
details:
  realistic_solution: The correct analysis demonstrates that proportional downscaling pushes the critical
    navigation model past its real-time deadline, resulting in a crash. To maintain fail-operational status
    for flight control, quality-of-service shedding is required. By shedding the non-critical DLA workload
    entirely, the system frees enough power to run the GPU at full speed, satisfying both the thermal
    power cap and the strict real-time latency requirement.
  common_mistake: Candidates often assume that power scales linearly with frequency and that reducing
    frequency proportionally is a safe way to share a reduced power budget. They fail to calculate the
    impact of reduced frequency on critical-path latency and ignore the non-scaling static power overhead
    of the hardware.
  napkin_math: Original power = 55W (10W static + 45W dynamic). New budget = 45W. Available dynamic power
    = 35W. If scaled proportionally, the navigation model gets 35W * (32W/45W) = 24.8W. Frequency ratio
    = 24.8W / 32W = 0.775. New navigation latency = 20ms / 0.775 = 25.8ms. Since 25.8ms > 25ms deadline,
    the drone crashes. By shedding the DLA model, the required power is 10W static + 32W navigation =
    42W, which is safely under the 45W cap and preserves the original 20ms latency.
