title: Edge Video Analytics Pipeline Architecture
scenario: You are designing an object detection system for a smart camera deployed on a battery-powered drone. The system targets a Google Coral Edge TPU connected via USB, which has a strict 2W power budget and delivers up to 4 TOPS using INT8 precision.
question: How would you architect a pipeline to convert an FP32 PyTorch model to run on the USB Coral Edge TPU while preserving small-object accuracy?
details:
  realistic_solution: The optimal design involves Quantization-Aware Training (QAT) to simulate INT8 precision during the training phase, which mitigates the accuracy loss for small objects. The architecture must strictly constrain the model to operators supported by the Edge TPU compiler, avoiding custom layers.
  common_mistake: |
    **The Pitfall:** Proposing Post-Training Quantization (PTQ) and FP16 fallbacks.
    **The Rationale:** Candidates ignore the Edge TPU's lack of FP16 hardware and the accuracy degradation INT8 causes for small objects when applied post-training.
    **The Consequence:** The model suffers severe accuracy loss, and FP16 layers cause costly CPU fallbacks over the slow USB interface, blowing past the 33.3ms deadline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute limits: 30 FPS target means max inference time is 33.3 ms per frame.
    - Effective compute: 4 TOPS peak * 50% utilization (due to USB) = 2 TOPS effective.
    - Power efficiency: 4 TOPS / 2W = 2 TOPS/W.

    **Calculations:**
    - Operations per frame: (2 * 10^12 ops/sec) / 30 FPS = ~66 billion operations (66 GOPs) per frame.

    **Conclusion & Interpretation:**
    - **Result: 66 GOPs (Compute-Bound).** A strict 66 GOPs budget per frame that prohibits heavy CPU fallbacks due to USB latency.
