title: Hailo-8 Compute Bound FPS Calculation
scenario: We are deploying a real-time object detection model to an edge gateway equipped with a Hailo-8 dataflow accelerator. The Hailo-8 is rated for 26 TOPS (INT8) at a highly efficient 2.5W power envelope, but it lacks local DRAM, meaning all operations must be streamed directly from host memory. The model requires 52 GOPS per inference pass, and sustains a compute utilization of 80% over the streaming pipeline.
question: What is the maximum compute-bound FPS for a 52 GOPS model on Hailo-8 at 80% utilization?
details:
  realistic_solution: The candidate should identify that TOPS and GOPS must be converted to the same base unit. By taking the Hailo-8's 26 TOPS and applying the 80% utilization factor, we get the effective operations per second. Dividing this effective compute capacity by the operations required per frame yields the maximum frames per second. A strong candidate will also mention that because the Hailo-8 has no local DRAM, reaching this 400 FPS compute limit in practice heavily depends on the host streaming interface preventing data starvation.
  common_mistake: |
    **The Pitfall:** Dividing the TOPS directly by the GOPS without aligning the units (Tera vs Giga).
    **The Rationale:** Candidates rush the calculation and miss the magnitude difference, or they ignore the 80% utilization constraint.
    **The Consequence:** This results in off-by-1000 errors or overestimating the true compute capacity, leading to flawed deployment architecture decisions.
  napkin_math: |
    1. Convert theoretical compute to GOPS: 26 TOPS = 26,000 GOPS.
    2. Calculate effective compute: 26,000 GOPS * 0.80 (utilization) = 20,800 GOPS.
    3. Identify compute required per frame: 52 GOPS/frame.
    4. Calculate maximum FPS: 20,800 GOPS / 52 GOPS/frame = 400 FPS.
    **(Optional) Calculate efficiency: 400 FPS / 2.5W = 160 FPS per Watt. The theoretical maximum is 400 FPS.**
