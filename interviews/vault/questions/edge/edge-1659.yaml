title: Dataflow Streaming on Host-Dependent Accelerators
scenario: You are architecting an edge NVR (Network Video Recorder) system using a Hailo-8 accelerator (26 TOPS INT8, 2.5W) connected via PCIe Gen3 x4. The Hailo-8 has no local DRAM and relies entirely on streaming from the host CPU's memory. You need to deploy a 45MB object detection model to process 4 concurrent 1080p video streams at 30 fps.
question: How would you design the Hailo-8 memory hierarchy and streaming strategy for 4 1080p30 streams without stalling PCIe?
details:
  realistic_solution: The correct architecture exploits the Hailo-8's spatial dataflow paradigm by pinning the entire 45MB model's weights into the distributed on-chip SRAM. The host DRAM is used strictly as a ring buffer for incoming frames and final bounding box outputs. By streaming the 4 video feeds sequentially into the dataflow pipeline, intermediate activations remain entirely on-chip, decoupling the compute throughput from host memory latency.
  common_mistake: |
    **The Pitfall:** Treating the dataflow accelerator like a traditional GPU and proposing layer-by-layer execution.
    **The Rationale:** Assuming intermediate activations must be constantly spilled and reloaded from host DRAM due to the lack of on-board device DRAM.
    **The Consequence:** Constant thrashing over the PCIe bus, completely starving the 26 TOPS compute engine and missing real-time deadlines.
  napkin_math: |
    * **Input Payload**: 4 streams × (1920 × 1080 × 3 bytes) × 30 fps = 746 MB/s.
    * **PCIe Bandwidth**: Gen3 x4 provides ~3.2 GB/s practical bandwidth (23% utilized by input).
    * **Compute Requirement**: A typical 45MB model takes ~60 GOPS per frame. 120 total fps × 60 GOPS = 7.2 TOPS.
    * **Conclusion**: If weights or activations swapped over PCIe per frame, it would demand 5.4 GB/s and instantly bottleneck. Keeping the **45MB model pinned entirely in on-chip SRAM** prevents this.
