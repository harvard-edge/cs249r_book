title: Diagnosing Data Starvation on Jetson Orin
scenario: We are deploying a multi-camera computer vision system on an NVIDIA Jetson Orin with 32 GB LPDDR5
  memory and an Ampere GPU + DLA accelerator. The system processes 8 concurrent 1080p video streams, but
  despite the 275 TOPS INT8 compute capability, the overall pipeline throughput is maxing out at 60 FPS
  total across all streams with the GPU utilization sitting around 30%. What is causing this throughput
  bottleneck, and how would you diagnose the root cause within the data ingestion pipeline?
details:
  realistic_solution: The root cause is data starvation; the CPU is bottlenecked on software video decoding
    and frame preprocessing (resizing/normalization), failing to feed the hardware accelerators fast enough.
    The diagnosis involves profiling CPU vs GPU utilization and memory bandwidth to identify the bottleneck.
    The solution is to offload decoding to the dedicated hardware NVDEC and use hardware-accelerated preprocessing
    (like VPI or DeepStream) to keep the data pipeline entirely in shared memory without CPU intervention.
  common_mistake: Candidates often assume the bottleneck is model inference compute and suggest further
    quantization or model pruning. They fail to analyze the CPU overhead of decoding and preprocessing
    high-resolution video streams or the memory copies before the data reaches the Ampere GPU or DLA.
  napkin_math: 8 streams of 1080p video at 30 FPS requires processing 8 * 1920 * 1080 * 3 bytes/pixel
    * 30 = ~1.49 GB/s of raw image data. While the Orin's 32 GB LPDDR5 has a peak bandwidth of ~204 GB/s,
    performing software decoding and CPU-based resizing on 1.5 GB/s of data will completely saturate the
    ARM CPU cores. Moving this to NVDEC frees the CPU, allowing the 275 TOPS INT8 hardware to easily process
    the target 240 total FPS well within the 60W TDP.
