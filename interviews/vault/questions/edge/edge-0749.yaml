title: The Edge Data Collection Funnel
scenario: 'You''re building a data flywheel for an agricultural pest detection system. 2,000 Raspberry Pi 4B devices (4 GB RAM, Coral USB TPU) photograph crops every 10 minutes. Each image is 3 MB. The devices have 32 GB SD cards and 4G connectivity with a 2 GB/month data plan.'
question: 'How should the system decide which images to upload to collect valuable training data without exceeding the 2 GB/month limit?'
details:
  realistic_solution: 'Implement **on-device data triage** — a lightweight scoring function that selects the most valuable images for upload.'
  common_mistake: |
    **The Pitfall:** Uploading all images continuously until the data plan is exhausted.
    **The Rationale:** Candidates calculate that 144 images/day fits the budget for a few days, assuming random sampling is sufficient.
    **The Consequence:** They consume the entire 2 GB budget on uninformative data, leaving zero bandwidth for model updates, telemetry, and system management.
  napkin_math: |
    * Daily captures: 144 images × 3 MB = 432 MB/day.
    * Local storage: 32 GB SD - 8 GB OS - 1 GB model = 23 GB free.
    * Retention: 23 GB / 432 MB = ~53 days.
    * Upload budget: 17 images/day × 3 MB = 51 MB/day × 30 days = 1.53 GB/month.
    * Fleet-wide monthly upload: 500 images × 2,000 devices = 1M curated images/month.
    * **Conclusion: An on-device scoring function is strictly required to filter captures down to the ~17 most valuable images per day.**
