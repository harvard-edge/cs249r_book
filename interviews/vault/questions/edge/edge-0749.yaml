title: The Edge Data Collection Funnel
scenario: You're building a data flywheel for an agricultural pest detection system. 2,000 edge devices photograph crops every 10 minutes. Each image is 3 MB. The devices have 32 GB SD cards and 4G connectivity with a 2 GB/month data plan.
question: How should the system decide which images to upload to collect valuable training data without exceeding the 2 GB/month limit?
details:
  realistic_solution: Implement on-device data triage — a lightweight scoring function that selects the most valuable images for upload.
  common_mistake: |
    **The Pitfall:** Uploading all images continuously until the data plan is exhausted.
    **The Rationale:** Candidates calculate that 144 images/day fits the budget for a few days, assuming random sampling is sufficient.
    **The Consequence:** They consume the entire 2 GB budget on uninformative data, leaving zero bandwidth for model updates, telemetry, and system management.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 144 images/day captured at 3 MB each.
       - Upload budget: 2 GB/month.
    2. **Calculations:**
       - Daily capture volume = 144 * 3 MB = 432 MB/day.
       - Monthly capture volume = 432 MB * 30 = ~12.9 GB/month.
       - Allowed daily upload = 2 GB / 30 days = 66.6 MB/day.
       - Allowed images/day = 66.6 MB / 3 MB = 22 images/day.
    3. **Conclusion & Interpretation:**
       - **An on-device scoring function is required to filter the 144 captures down to the ~22 most valuable images. Result: Bandwidth-Bound Mitigation.**
