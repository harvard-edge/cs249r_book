title: 'Realization: deploy MobileNetV3 on Hailo-8 with model partitioning for multi-task inference'
scenario: You need to run MobileNetV3-Large shared backbone with two task heads (classification + detection)
  on Hailo-8 (26 TOPS, 2.5W). The backbone is 0.18 GFLOPs, classification head 0.04 GFLOPs, detection
  head 0.12 GFLOPs. Realize the model compilation with shared feature extraction to avoid running the
  backbone twice.
details:
  realistic_solution: 'Hailo DFC multi-context compilation: (1) define backbone as shared_context in the
    HN (Hailo Network) specification; (2) attach both task heads as separate output contexts; (3) DFC
    schedules backbone computation once and branches features to both heads. Implementation: export full
    multi-task model to ONNX with two output nodes; DFC automatically identifies shared prefix. Verify
    with profiler: backbone should appear once in execution trace. Total FLOPs: 0.18 + 0.04 + 0.12 = 0.34
    GFLOPs (not 0.34+0.18 = 0.52). At 30 FPS: 0.34G × 30 = 10.2 GOPS, well within 26 TOPS.'
  common_mistake: Compiling two separate HEF files and running backbone inference twice (once per task),
    doubling compute and latency; Hailo DFC supports multi-context models where shared layers are compiled
    once with multiple output branches.
  napkin_math: 'Hailo-8 on-chip SRAM: 24MB. MobileNetV3 backbone INT8: 0.18G × 8-bit ≈ 180KB parameters
    per layer set (rough). Peak activation size: largest feature map in backbone = 28×28×96 = 75KB × 1B
    (INT8) = 75KB. All fits in 24MB SRAM easily. Throughput: 26 TOPS / 0.34G FLOPs per frame = 76,000
    FPS theoretical. Practical: ~2,500 FPS at batch=1 (Hailo DFC scheduling overhead). At 30 FPS with
    2 tasks: 2×0.34G×30 = 20.4 GOPS (if running separately). With shared backbone: 10.2 GOPS → 2× savings.'
