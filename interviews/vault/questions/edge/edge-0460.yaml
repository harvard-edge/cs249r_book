title: 'The Fleet vs. The Cloud: Drowsiness Detection TCO'
scenario: You are an ML Systems Engineer at a major automaker designing a driver-drowsiness detection feature for a fleet of 500,000 vehicles. The finance department has flagged projected cellular data costs ($0.10/GB). Plan A (Centralized) uploads 500 MB of clips per vehicle per month with $5,000/month cloud retraining. Plan B (Federated) involves 1% of the fleet (5,000 vehicles) uploading a 5 MB model diff 4 times per month, with a $2,000/month aggregation server.
question: Which plan is more cost-effective for updating the drowsiness model across 500,000 vehicles, centralized telemetry or federated learning?
details:
  realistic_solution: The Federated Learning approach (Plan B) is overwhelmingly more cost-effective. The centralized telemetry plan uploads a massive amount of video data frequently, which does not scale economically. The federated plan uploads only small model diffs, drastically reducing OpEx.
  common_mistake: |
    **The Pitfall:** Underestimating the scale of data costs for the entire fleet.
    **The Rationale:** Engineers calculate the data per event correctly but fail to multiply by the fleet size of 500,000, missing the exponential cost growth.
    **The Consequence:** They incorrectly recommend centralized telemetry, drastically underestimating a multi-million dollar annual data bill.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet: 500,000 vehicles. Data cost: $0.10/GB.
    - Plan A (Centralized): 500 MB/month/vehicle. $5,000/month compute.
    - Plan B (Federated): 5,000 vehicles * 5 MB * 4 rounds. $2,000/month compute.

    **Calculations:**
    - Plan A volume = 500,000 * 500 MB = 250,000 GB/month.
    - Plan A Cost = (250,000 * $0.10) + $5,000 = $30,000/month ($360,000/year).
    - Plan B volume = 5,000 * 20 MB = 100 GB/month.
    - Plan B Cost = (100 * $0.10) + $2,000 = $2,010/month ($24,120/year).

    **Conclusion & Interpretation:**
    - **Result: ~$335,880/year savings (Bandwidth-OpEx Bound Mitigation)**. Federated learning saves ~$335,880 annually by bypassing raw data uploads.
  options:
  - Plan A is more economical. The 10 MB weekly updates in Plan B are significantly larger than the video clips, making it more expensive in the long run.
  - Plan B is more economical, with an annual cost of ~$24K compared to Plan A's ~$360K, but the difference is modest enough to prefer Plan A for simplicity.
  - Plan B is overwhelmingly more economical. At $0.10/GB, it saves ~$336K/year; at enterprise cellular rates ($10/GB), the gap widens to ~$30M/year, making centralized collection financially infeasible.
  - Both plans cost roughly the same (~$300K/year). The choice depends on model performance needs, not cost.
  correct_index: 2
