title: 'Edge Queueing Theory Specification: Design Smart Meter Edge Queue'
scenario: 'Specify the queueing architecture for a smart electricity meter using Hailo-8 (26 TOPS INT8,
  2.5W) that runs anomaly detection on 10,000 samples/second signal stream. Model: 0.5 GOPS INT8, processes
  100-sample windows. λ=100 windows/s (sliding window every 10ms). Specify buffer size, scheduling policy,
  and latency SLO. Power budget: 3W total.'
details:
  realistic_solution: 'Hailo-8: μ = 26000/0.5 = 52,000 windows/s. ρ = 100/52000 = 0.00192. Essentially
    zero queue. W = 1/52000 = 19.2μs per window. P99 ≈ 100μs. Power: Hailo-8 at 2.5W, MCU host at 0.5W
    = 3W total — exactly meets budget. Buffer: Little''s Law with W=1ms SLO: L = 100 * 0.001 = 0.1 → 1
    window minimum buffer. Window = 100 samples * 2 bytes = 200 bytes. Buffer: 200 bytes. Trivially fits
    anywhere. Scheduling: FIFO with 10ms deadline (hard real-time). Since ρ=0.002, no missed deadlines
    possible.'
  common_mistake: Treating continuous streaming data as independent requests and not accounting for sliding
    window overlap creating temporal dependencies between consecutive windows.
  napkin_math: 'μ=52,000/s, ρ=0.002, Wq≈0, W=19.2μs, P99≈100μs. Buffer: 1 window = 200 bytes. Power: 2.5+0.5=3.0W
    (exactly). Hailo-8 vastly overprovisioned: 52000/100 = 520x over-capacity. Alternative: Coral TPU
    (4 TOPS, 2W): μ=4000/0.5=8000/s, ρ=0.0125, W=125μs, P99=575μs. Still fine. Power: 2+0.5=2.5W < 3W.
    Coral costs $25 vs Hailo-8 $250 — choose Coral for this simple task. Even an MCU with Ethos-U55 (NPU)
    at 480MHz: 0.5 GOPS, μ=1/s at 0.5GOPS on 0.5GOPS NPU... need to check INT8 throughput.'
