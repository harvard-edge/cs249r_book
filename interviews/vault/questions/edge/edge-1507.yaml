title: Diagnosing Throughput Collapse with Dynamic Batching on Cloud AI 100
scenario: 'You are deploying an NLP inference service using dynamic batching on a Qualcomm
  Cloud AI 100 accelerator (400 TOPS INT8, 32 GB LPDDR4x, 75W) in an edge datacenter.
  The service is configured to wait up to 10ms to form a maximum batch size of 16.
  During peak traffic, you notice that while average request latency remains under
  the 50ms SLA, the overall system useful token throughput drops by 40% compared to
  static batching benchmarks of max-length sequences, and the accelerator''s useful compute
  utilization rarely exceeds 60%. What is causing this throughput collapse despite the
  high incoming request rate?'
question: What is causing this throughput collapse despite the high incoming request
  rate?
details:
  realistic_solution: The root cause is likely variable sequence lengths within the
    dynamic batch leading to excessive zero-padding, which wastes the 400 TOPS INT8
    compute capacity on non-productive operations. Because the matrix dimensions are
    padded to match the longest sequence, the Cloud AI 100's compute units spend cycles
    multiplying zeros. To resolve this, you must profile the padding ratios of dispatched
    batches and switch to continuous batching (iteration-level scheduling) or sequence-length
    bucketing to maximize useful tensor utilization.
  common_mistake: Candidates often immediately blame the LPDDR4x memory bandwidth
    bottleneck or suspect thermal throttling due to the 75W power envelope. They might
    suggest increasing the 10ms timeout window without analyzing the interaction between
    variable sequence lengths and the hardware's execution time for under-filled batches.
  napkin_math: 'Assume the model requires 1 Tera-Operation (TOP) per max-length request.
    A max batch of 16 requires 16 TOPs of work. On the 400 TOPS INT8 Cloud AI 100, execution
    takes 16 / 400 = 0.04 seconds (40ms). Combined with the 10ms timeout, latency is
    ~50ms (meeting SLA), yielding 16 / 0.04 = 400 req/s. If dynamic batching includes
    requests with highly variable lengths, causing 40% of the batch volume to be
    zero-padding, the hardware still performs 16 TOPs of matrix math taking 40ms.
    However, the effective useful work is only 9.6 TOPs. The effective token throughput
    drops by 40%, equivalent to serving only 240 max-length req/s (9.6 / 0.04), explaining
    the reduced useful throughput despite meeting latency SLAs.'
