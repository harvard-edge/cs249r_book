title: Diagnosing Guardrail Context-Switching
scenario: To comply with our organizational impact assessment frameworks, the team
  deployed an auxiliary safety guardrail model to run alongside our main perception
  model on a Hailo-8 accelerator. During production testing, the system exhibits severe
  stuttering, with inference latency sporadically spiking by 40-50ms and power consumption
  exceeding the 2.5W limit. The Hailo-8 provides 26 TOPS of INT8 compute and acts
  as a dataflow accelerator that streams directly from host memory, possessing no
  local DRAM. What is the hardware-level root cause of this system degradation?
question: What is the hardware-level root cause of this system degradation?
details:
  realistic_solution: The root cause is dataflow context switching. Because the Hailo-8
    lacks local DRAM, the weights for executing models must fit entirely in the on-chip
    SRAM to maintain its dataflow pipeline. Adding the guardrail model likely exceeded
    the spatial capacity of the chip, forcing the host CPU to constantly stream new
    model configurations and weights back and forth over the PCIe bus. This dynamic
    swapping drains and refills the pipeline, causing massive latency spikes and excessive
    power draw.
  common_mistake: Candidates often assume the 26 TOPS INT8 compute limit is being
    exceeded by the additional model, or they focus entirely on thermal throttling.
    They miss the architectural implication that a dataflow accelerator without local
    DRAM must rely on host streaming for model swapping.
  napkin_math: Assuming a PCIe connection with 2.0 GB/s bandwidth. If the primary
    model is 25MB (INT8) and the guardrail model is 15MB, and they must be swapped
    sequentially, the host must stream 40MB of weights per inference cycle. 40MB /
    2000 MB/s = 20ms of pure transfer latency per swap. At 30 FPS, swapping twice
    per frame (Main -> Guardrail -> Main) adds 40ms of latency and demands 40MB *
    2 swaps * 30 FPS = 2.4 GB/s of continuous PCIe bandwidth, starving the actual
    data stream and easily breaking the 2.5W power budget.
