title: Memory Optimization for Large Language Model Deployment on NVIDIA Jetson Orin
scenario: You are tasked with deploying a large language model (LLM) for real-time inference on an NVIDIA Jetson Orin with 32 GB memory. The target application demands high uptime and low latency. The base LLM, when loaded with FP16 weights and activations, requires 28 GB of memory. Approximately 2 GB of RAM is reserved for the OS and other essential system services. Your team proposes two deployment architectures. Architecture A (Monolithic FP16) deploys the full 28 GB FP16 model. Architecture B (Quantized & Modular) deploys an INT8 quantized version of the LLM, reducing its memory footprint to 18 GB, plus a smaller FP16 model (4 GB) for pre-processing.
question: Which Jetson Orin deployment architecture is more stable under memory pressure, and how would you mitigate OOMs, fragmentation, and future fine-tuning needs?
details:
  realistic_solution: 'Architecture B is generally preferable due to its significantly lower baseline memory footprint, providing more headroom for dynamic activations and OS operations. Key solutions involve: Quantization (INT8), Dynamic Batching & Micro-Batching, Memory Profiling (Nsight Systems), Proactive OOM Handling (watchdogs), Memory Fragmentation Mitigation (custom allocators), and OS-level Eviction management.'
  common_mistake: |
    **The Pitfall:** Focusing solely on static model weight size and ignoring dynamic memory consumption.
    **The Rationale:** Candidates often overlook activations, temporary buffers, and the impact of memory fragmentation over long runtimes.
    **The Consequence:** Recommending an architecture with inadequate memory headroom, leading to inevitable OOM crashes under varying real-world loads.
  napkin_math: |
    1. Usable RAM: 32 GB - 2 GB (OS) = 30 GB.
    2. Architecture A: 28 GB model. Headroom = 30 GB - 28 GB = 2 GB (Highly susceptible to OOM).
    3. Architecture B: 18 GB + 4 GB = 22 GB.
    4. Headroom = 30 GB - 22 GB = 8 GB.
    5. Conclusion: Architecture B provides a **much larger 8 GB buffer**, significantly improving resilience.
