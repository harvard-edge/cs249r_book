title: SPI Microbatch Pipeline Bubble
scenario: 'A 4-stage TinyML vision pipeline is distributed across 4 Cortex-M4 MCUs connected via a 10 MHz SPI daisy chain.'
question: Calculate the pipeline bubble overhead fraction for processing a sequence of 8 microbatches.
details:
  realistic_solution: 'Using GPipe scheduling, the theoretical pipeline bubble fraction is (p-1)/(m+p-1). For p=4 stages and m=8 microbatches, the fraction is 3 / (8 + 4 - 1) = 3/11. The SPI bus serialization latency adds a constant synchronization delay between stages, but the topological bubble fraction dictates the baseline idle time.'
  common_mistake: |
    **The Pitfall:** Ignoring the flush/fill pipeline bubble inherent to microbatching.
    **The Rationale:** Candidates treat throughput as simply `1 / max_stage_latency`.
    **The Consequence:** They overestimate pipeline throughput by failing to account for the ~27% idle time during start-up and drain phases.
  napkin_math: |
    *   **Stages (p):** 4
    *   **Microbatches (m):** 8
    *   **Calculation:** (4 - 1) / (8 + 4 - 1) = 3 / 11.
    *   **Result:** **~27.2% bubble overhead.**
