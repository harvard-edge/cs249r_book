validation_issues:
- The Napkin Math states 'If the vision backbone requires 0.5 TOPS per frame, total backbone compute is
  0.5 * 120 = 60 TOPS', which uses 0.5 TOPS directly rather than showing conversion from GOPS/frame to
  TOPS/frame. While correct, it could be clearer.
- The DLA capacity utilization estimate 'utilizes ~52% of DLA capacity (assuming DLAs provide ~114 TOPS)'
  implies a separate calculation or known spec for DLA TOPS that is not explicitly provided in the scenario.
  This assumption should be stated or derived.
