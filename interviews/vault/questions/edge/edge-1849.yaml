title: Edge LLM Inference Cost on Qualcomm Cloud AI 100
scenario: You are tasked with deploying a small, quantized Large Language Model (LLM)
  for real-time inference on a Qualcomm Cloud AI 100 accelerator. The model requires
  approximately 200 billion (200 x 10^9) INT8 operations per inference request. The
  Qualcomm Cloud AI 100 features 32 GB LPDDR4x memory, 400 TOPS (Tera Operations Per
  Second) INT8 performance, and consumes 75W of power. Assuming the device can operate
  at 80% of its peak INT8 performance for this workload and the operational cost (including
  power, cooling, and amortization) is estimated at $0.05 per device-hour. Estimate
  the maximum inference requests per second this single device can handle and the
  approximate operational cost per million inference requests.
question: What maximum requests per second and cost per million inferences can one
  Cloud AI 100 deliver at 80% of peak on this LLM?
details:
  realistic_solution: The candidate should calculate the effective operations per
    second (400 TOPS * 0.8 = 320 Tera INT8 Ops/sec). Then, divide this by the operations
    per inference (200 x 10^9 INT8 ops) to find inferences per second. For cost, calculate
    inferences per hour (inferences per second * 3600). Then, divide the hourly operational
    cost by inferences per hour to get cost per inference, and multiply by one million
    for the cost per million inferences. Memory bandwidth and capacity should also
    be briefly considered as potential bottlenecks, though not the primary focus for
    this calculation given the stated ops and memory capacity.
  common_mistake: Ignoring the quantization type (INT8) and peak performance (TOPS)
    and instead trying to calculate FLOPs, or neglecting to factor in practical utilization
    rates (e.g., 80% peak performance) and memory constraints. Another common mistake
    is forgetting to convert TOPS to operations per second or confusing TOPS with
    FLOPS.
  napkin_math: '1. Effective Ops/sec: 400 TOPS * 0.8 (utilization) = 320 x 10^12 INT8
    ops/sec.

    2. Max Inferences/sec: (320 x 10^12 INT8 ops/sec) / (200 x 10^9 INT8 ops/inference)
    = 1600 inferences/sec.

    3. Inferences/hour: 1600 inferences/sec * 3600 sec/hour = 5,760,000 inferences/hour.

    4. Cost per inference: $0.05 / 5,760,000 inferences/hour = ~$0.00000000868 per
    inference.

    5. Cost per million inferences: $0.00000000868 * 1,000,000 = ~$0.00868.'
