title: Evaluating Memory Management Strategies on Google Coral Edge TPU
scenario: 'You are deploying a quantized object detection model on a Google Coral Edge TPU (4 TOPS INT8,
  2W) connected via USB to a resource-constrained host device. The system frequently encounters Out-Of-Memory
  (OOM) errors during peak inference loads due to memory fragmentation on the host, which is managing
  the offloading to the TPU. You must evaluate two alternatives: implementing a custom memory allocator
  with fixed-size pools on the host to prevent fragmentation, or applying aggressive OS-level eviction
  policies combined with reducing the batch size to 1. Which approach provides better system stability
  and performance tradeoffs?'
details:
  realistic_solution: The better alternative is implementing a custom memory allocator with fixed-size
    memory pools on the host. Since the Coral Edge TPU requires INT8 quantized models and operations offloaded
    from the host, memory allocation for input/output tensors must be highly predictable. Fixed-size pooling
    eliminates fragmentation and guarantees memory availability for the continuous stream of inferences
    without triggering costly OS-level interventions.
  common_mistake: Candidates often propose relying solely on OS-level eviction or swapping, ignoring the
    severe latency penalties associated with USB data transfer. They may also overlook that reducing batch
    size doesn't solve underlying host memory fragmentation issues.
  napkin_math: Assuming a 300x300 RGB input image quantized to INT8, the input tensor is 300 * 300 * 3
    * 1 byte = 270 KB. With a peak inference rate of 30 FPS, the system processes 8.1 MB/s of input data
    over the USB connection. If memory fragmentation causes a 50ms OS page fault during allocation for
    just 10% of frames, it adds (0.10 * 30 * 50ms) = 150ms of overhead per second, severely degrading
    the target 33ms per-frame latency.
