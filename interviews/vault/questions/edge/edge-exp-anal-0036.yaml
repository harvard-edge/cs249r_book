title: Analyzing Power Spikes on Google Coral Edge TPU
scenario: A smart camera system uses a Google Coral Edge TPU (USB form factor, 4 TOPS INT8, 2W max power)
  to run an object detection model at 10 frames per second. Each inference requires 0.1 Tera-operations.
  When observing the power profile, the engineers notice that the TPU repeatedly spikes to its 2W maximum
  rather than drawing a steady, lower continuous power. Explain why this power behavior occurs and calculate
  the expected energy per inference and average power consumption, assuming negligible idle power.
details:
  realistic_solution: The system is exhibiting 'race-to-sleep' behavior. The Coral Edge TPU processes
    the INT8 quantized workload at its maximum compute capacity (4 TOPS), drawing its peak 2W power, to
    finish the inference as quickly as possible. Once complete, it drops into a low-power idle state.
    This strategy often yields better overall energy efficiency than running continuously at a lower clock
    speed. The average power is simply a function of the active duty cycle.
  common_mistake: Candidates often mistakenly believe the 2W rating is a constant draw regardless of workload,
    failing to account for utilization. They might also incorrectly suggest that power spikes indicate
    an inefficient model, rather than recognizing it as an intentional power management strategy.
  napkin_math: Time per inference = Workload / Performance = 0.1 TOPS / 4 TOPS/s = 0.025 seconds (25 ms).
    Energy per inference = Peak Power * Active Time = 2W * 0.025s = 0.05 Joules (50 mJ). At 10 FPS, the
    total energy per second = 10 * 50 mJ = 500 mJ/s, which equals an average power draw of 0.5W.
