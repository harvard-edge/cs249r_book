title: 'Model Format Conversion: Diagnose TensorRT Conversion Failure for Custom Attention Ops'
scenario: A team is converting a Vision Transformer (ViT-Base, 86M params) from PyTorch to TensorRT INT8 for Jetson Orin. The conversion fails with 'Unsupported node type: ScaledDotProductAttention'.
question: What causes the TensorRT INT8 conversion failure on ScaledDotProductAttention for ViT-Base, how would you fix it, and what speedup should result?
details:
  realistic_solution: 'Root cause: PyTorch 2.0 fused SDPA op is not yet supported in TensorRT 8.x ONNX parser. Fix: (1) export with torch.backends.cuda.enable_flash_sdp(False) to unfuse, or (2) use opset 17 with attention decomposed. After fix: ViT-Base 86M, Ops for 224x224: 17.6 GOPS. TensorRT INT8 on Orin: 17.6G/110T = 0.16ms compute. Realistic: ~5ms. vs. PyTorch FP32: 20ms. 4x speedup.'
  common_mistake: |
    **The Pitfall:** Writing a custom TensorRT C++ plugin to handle attention.
    **The Rationale:** Candidates assume "Unsupported node" requires building bespoke hardware kernels.
    **The Consequence:** Wasting weeks writing fragile C++ when simply decomposing the operator in PyTorch yields native TensorRT support.
  napkin_math: |
    1. **Compute Required:** ViT-Base operations = 17.6 GOPS.
    2. **Theoretical INT8 Time:** Jetson Orin INT8 TensorRT (effective ~110 TOPS): 17.6 GOPS / 110 TOPS = 0.16ms.
    3. **Real-World Latency:** Measured time with memory overhead is ~5ms.
    4. **Baseline:** PyTorch FP32 on GPU takes ~20ms.
    5. **Speedup:** TensorRT INT8 delivers a **4x speedup** (20ms to 5ms) with <0.3% top-1 accuracy drop.
