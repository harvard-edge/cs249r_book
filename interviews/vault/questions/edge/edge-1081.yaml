title: 'Model Format Conversion: Diagnose TensorRT Conversion Failure for Custom Attention Ops'
scenario: "A team is converting a Vision Transformer (ViT-Base, 86M params) from PyTorch to TensorRT INT8 for Jetson Orin. The conversion fails with 'Unsupported node type: ScaledDotProductAttention'."
question: What causes the TensorRT INT8 conversion failure on ScaledDotProductAttention for ViT-Base, how would you fix it, and what speedup should result?
details:
  realistic_solution: 'Root cause: The PyTorch 2.0 fused FlashAttention/SDPA operator is unsupported by the current TensorRT ONNX parser. The fix requires decomposing the attention block by exporting with `torch.backends.cuda.enable_flash_sdp(False)` or targeting ONNX opset 17. The resulting INT8 engine will yield ~4x speedup over the FP32 baseline, bounded by memory bandwidth rather than pure INT8 compute capacity.'
  common_mistake: |
    **The Pitfall:** Writing a custom TensorRT C++ plugin to handle attention.
    **The Rationale:** Candidates assume "Unsupported node" requires building bespoke hardware kernels.
    **The Consequence:** Wasting weeks writing fragile C++ when simply decomposing the operator in PyTorch yields native TensorRT support.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - ViT-Base computational cost: 17.6 GOPS.
       - Jetson Orin effective INT8 throughput: ~110 TOPS.
       - PyTorch FP32 baseline latency: ~20 ms.
    2. **Calculations:**
       - Theoretical INT8 Compute Time: 17.6e9 ops / 110e12 ops/s = 0.16 ms.
       - Realistic INT8 Time (with memory overhead): ~5 ms.
       - Speedup: 20 ms / 5 ms = 4x.
    3. **Conclusion & Interpretation:**
       - **Result: 4x speedup.** The execution shifts from compute-bound in FP32 to memory-bound in INT8, yielding a 5ms real-world latency despite the 0.16ms theoretical minimum.
