title: The Power-Over-Ethernet Budget
scenario: 'You''re deploying AI-powered security cameras in a warehouse. Each camera connects via a single
  Ethernet cable using PoE (Power over Ethernet, IEEE 802.3af Type 1: 15.4W at the PSE, 12.95W at the
  PD after cable loss). The camera needs: image sensor + ISP (2.5W), network PHY + SoC housekeeping (1.5W),
  IR illuminators for night vision (3W), and an AI accelerator for person detection. How much power budget
  remains for the AI accelerator, and which chips actually fit?'
question: "How much power budget remains for the AI accelerator, and which chips actually fit?"
details:
  realistic_solution: 'After cable loss and DC-DC conversion, only 4.66W remains for the AI accelerator
    under PoE Type 1. The cascade: 15.4W PSE output minus 2.45W cable loss = 12.95W at the device, minus
    10% DC-DC conversion = 11.66W usable, minus 7W fixed loads (sensor + ISP + network + IR) = 4.66W for
    AI. Chips that fit: Hailo-8L (2.5W, 13 TOPS), Google Coral (2W, 4 TOPS). Chips that don''t: Jetson
    Orin Nano (7-15W). To use the Orin Nano, upgrade to PoE+ Type 2 (25.5W PSE), which delivers 15.95W
    of AI budget after the same cascade. The 50/switch PoE+ premium for 500 cameras is 25K — likely worth
    it for 40 TOPS.'
  common_mistake: '"PoE delivers 15.4W, so I have 15.4 - 2.5 - 1.5 - 3.0 = 8.4W for the accelerator."
    This uses the PSE (Power Sourcing Equipment) number, not the PD (Powered Device) number. The cable
    itself dissipates 2.45W as heat (up to 100m of copper). The device only receives 12.95W.'
  napkin_math: 'PoE Type 1 power cascade: PSE output = 15.4W → cable loss (2.45W) → PD input = 12.95W
    → DC-DC loss (10%) → usable = 11.66W → fixed loads (7.0W) → AI budget = 4.66W (with 90% DC-DC efficiency).
    PoE+ Type 2: PSE = 30W → PD = 25.5W → usable = 22.95W → fixed = 7.0W → AI budget = 15.95W. Jetson
    Orin Nano fits easily under PoE+. Fleet cost: 500 cameras × 50 PoE+ switch premium = 25K. vs redesigning
    around a 5W accelerator. If the Orin Nano''s 40 TOPS enables multi-model pipelines that the Hailo-8L
    can''t run, the $25K switch upgrade pays for itself in reduced engineering time.'
