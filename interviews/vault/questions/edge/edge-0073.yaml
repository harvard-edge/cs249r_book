title: The Power-Over-Ethernet Budget
scenario: >-
  You're deploying AI-powered security cameras in a warehouse. Each camera connects via a single Ethernet cable using PoE (Power over Ethernet, IEEE 802.3af Type 1: 15.4W at the PSE, 12.95W at the PD after cable loss). The camera needs: image sensor + ISP (2.5W), network PHY + SoC housekeeping (1.5W), IR illuminators for night vision (3W), and an AI accelerator for person detection.
question: How much power budget remains for the AI accelerator, and which edge chips actually fit?
details:
  realistic_solution: 'Calculate the usable power at the device by accounting for cable loss and DC-DC conversion efficiency. Then subtract fixed component loads. Only extremely low-power chips like the Hailo-8L or Google Coral fit the standard PoE budget. Upgrading to PoE+ Type 2 is required to support higher-power chips like the Jetson Orin Nano.'
  common_mistake: |
    **The Pitfall:** Using the Power Sourcing Equipment (PSE) rating instead of the Powered Device (PD) limit.
    **The Rationale:** Engineers read "15.4W PoE" on the spec sheet and simply subtract component wattage from 15.4W.
    **The Consequence:** They ignore the physics of cable resistance dissipating up to 2.45W as heat, causing the device to repeatedly brown-out and reboot in production.
  napkin_math: |
    1. **PoE Type 1 cascade:** PSE output = 15.4W.
    2. Cable loss = 2.45W. PD input = 12.95W.
    3. DC-DC conversion loss (10%) leaves **11.66W usable**.
    4. Fixed loads: Sensor/ISP (2.5W) + PHY/SoC (1.5W) + IR (3.0W) = 7.0W.
    5. **Result: AI budget = 4.66W.** (Fits Coral 2W or Hailo 2.5W; Jetson Orin Nano 7W+ fails).
