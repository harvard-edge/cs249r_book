title: 'Edge Queueing Theory Mastery: Queueing Analysis for Robot Fleet Coordinator'
scenario: 'You are designing the inference queueing architecture for a warehouse robot fleet: 20 robots each sending 10 perception requests/s (λ=200 req/s). Requests are 30% heavy (3D scene reconstruction, 200ms service on Jetson Orin 60W) and 70% light (obstacle check, 5ms). Total P99 SLO is 500ms.'
question: How many Jetson Orins are needed for the mixed heavy/light workload, can priority queues meet the 500 ms P99 SLO, and does power fit the 200W budget?
details:
  realistic_solution: 'Heavy: λ_h=60/s, service 0.2s. Light: λ_l=140/s, service 0.005s. Total load ρ = 12.7 Erlangs from ONE server — system is hugely overloaded on a single Jetson. With 16 Jetsons: ρ_total = 0.794. With priority scheduling (light preempts heavy): light tasks easily pass, but heavy tasks experience massive tail latency. Because the heavy tasks are bursty and take 200ms, P99_heavy exceeds the 500ms SLO. The solution is asynchronous processing for heavy tasks, or splitting the compute heterogeneously (e.g. Hailo-8 for light, Jetson for heavy).'
  common_mistake: |
    **The Pitfall:** Using basic M/M/1 for mixed workloads.
    **The Rationale:** Candidates fail to separate the two classes into a priority queue M/G/1 analysis.
    **The Consequence:** They wrongly assume that simply adding more Jetsons solves the tail latency for the heavy 3D reconstructions without asynchronous decoupling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet Traffic (λ): 200 req/s total.
       - Heavy tasks (30%): λ_h = 60/s, Service time (μ_h) = 200ms (5/s).
       - Light tasks (70%): λ_l = 140/s, Service time (μ_l) = 5ms (200/s).
       - Target P99 SLO: 500ms.
       - Power Budget: 200W. (Jetson Orin = 60W each).
    2. **Calculations:**
       - Single Server Load: ρ_h = 60/5 = 12. ρ_l = 140/200 = 0.7. Total Load = 12.7 Erlangs.
       - Fleet at 20 Jetsons: ρ_h = 60/100 = 0.6. ρ_l = 140/4000 = 0.035.
       - M/G/1 Priority Delay (Heavy): Wq = 0.6 / (100 * (1 - 0.635)) = 16.4ms.
       - Heavy Total Latency (W_h): 200ms + 16.4ms = 216ms. (High variance implies P99 > 500ms).
       - Power for 20 Jetsons: 20 * 60W = 1200W.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound and Latency-Bound.** 20 Jetsons violate the 200W budget by 6x. The architecture must utilize cheaper edge ASICs for light tasks and decouple heavy tasks asynchronously.
