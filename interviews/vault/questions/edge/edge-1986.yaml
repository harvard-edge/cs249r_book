title: 'Optimizing MobileNetV3 for Hailo-8: Scheduling for Memory, Parallelism, and
  Fusion'
scenario: You are tasked with deploying a MobileNetV3-Large model (INT8 quantized)
  onto the Hailo-8 (26 TOPS INT8, 2.5W dataflow accelerator) for a real-time object
  detection application. The primary constraints are achieving an end-to-end inference
  latency of under 5ms while maintaining the given power budget. The model's computational
  graph has several sequential layers, but also branches that could potentially be
  executed in parallel. The Hailo-8's architecture benefits significantly from data
  locality and operator fusion. Design a strategy for scheduling the MobileNetV3 operators,
  focusing on execution order optimization for memory reuse, identifying opportunities
  for parallel operator execution across the accelerator's compute units, and proposing
  layer fusion strategies to minimize data movement and maximize throughput. Justify
  your scheduling decisions with respect to the Hailo-8's specified capabilities.
question: How would you schedule MobileNetV3-Large operators on Hailo-8 to meet <5ms
  latency using memory reuse, parallel branches, and layer fusion?
details:
  realistic_solution: 'A realistic solution involves analyzing the MobileNetV3 graph
    as a Directed Acyclic Graph (DAG) and employing a multi-objective scheduling algorithm.
    This algorithm should prioritize: 1. Layer fusion: Identify adjacent, compatible
    layers (e.g., Conv-ReLU-BN) that can be fused into a single kernel to reduce intermediate
    memory writes. 2. Memory reuse: Schedule operations such that intermediate feature
    maps can be kept on-chip for as long as possible, minimizing off-chip memory access.
    3. Parallelism: Exploit independent branches or subgraphs by mapping them to different
    compute clusters within the Hailo-8, ensuring data dependencies are respected.
    This often requires custom graph transformations and a deep understanding of the
    accelerator''s internal memory hierarchy and execution units.'
  common_mistake: A common mistake is applying a naive, sequential execution order
    from the original model graph, which neglects the Hailo-8's dataflow architecture
    and parallel processing capabilities. This often leads to underutilization of
    compute resources, excessive data movement between memory and processing elements,
    and missed opportunities for operator fusion, resulting in higher latency and
    power consumption than necessary.
  napkin_math: 'Given Hailo-8''s 26 TOPS (INT8), the theoretical maximum operations
    per cycle is very high. For a target latency of 5ms (0.005s), the required average
    throughput is 1 / 0.005s = 200 inferences/second. The total INT8 operations for
    MobileNetV3-Large are approximately 0.5 Giga-Ops (GOPs) per inference. This means
    we need 0.5 GOPs * 200 inferences/s = 100 GOPs/s. With 26 TOPS (INT8) or 26,000
    GOPs/s, there''s significant headroom. However, this calculation assumes 100%
    efficiency. The key is to account for memory bandwidth limitations: if the model
    has a working set of, say, 10MB of intermediate tensors and the DRAM bandwidth
    is 10 GB/s, then just moving data could take 10MB / 10GB/s = 1ms per pass. Effective
    scheduling, fusion, and memory reuse are critical to keep data movement minimal
    and achieve the 5ms target, making the effective TOPS much lower than peak if
    not handled optimally. The power budget of 2.5W also implies that high compute
    utilization must be achieved with high energy efficiency, favoring on-chip data
    reuse and fused operations.'
