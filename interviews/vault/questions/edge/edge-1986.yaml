title: 'Optimizing MobileNetV3 for Hailo-8: Scheduling for Memory, Parallelism, and Fusion'
scenario: You are tasked with deploying a MobileNetV3-Large model (INT8 quantized) onto the Hailo-8 (26 TOPS INT8, 2.5W dataflow accelerator) for a real-time object detection application. The primary constraints are achieving an end-to-end inference latency of under 5ms while maintaining the given power budget. The model's computational graph has several sequential layers, but also branches that could potentially be executed in parallel. The Hailo-8's architecture benefits significantly from data locality and operator fusion.
question: How would you schedule MobileNetV3-Large operators on Hailo-8 to meet <5ms latency using memory reuse, parallel branches, and layer fusion?
details:
  realistic_solution: 'A realistic solution involves analyzing the MobileNetV3 graph as a Directed Acyclic Graph (DAG) and employing a multi-objective scheduling algorithm. This algorithm should prioritize: 1. Layer fusion: Identify adjacent, compatible layers (e.g., Conv-ReLU-BN) that can be fused into a single kernel to reduce intermediate memory writes. 2. Memory reuse: Schedule operations such that intermediate feature maps can be kept on-chip for as long as possible, minimizing off-chip memory access. 3. Parallelism: Exploit independent branches or subgraphs by mapping them to different compute clusters within the Hailo-8, ensuring data dependencies are respected. This often requires custom graph transformations and a deep understanding of the accelerator''s internal memory hierarchy and execution units.'
  common_mistake: A common mistake is applying a naive, sequential execution order from the original model graph, which neglects the Hailo-8's dataflow architecture and parallel processing capabilities. This often leads to underutilization of compute resources, excessive data movement between memory and processing elements, and missed opportunities for operator fusion, resulting in higher latency and power consumption than necessary.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8: 26 TOPS (INT8), 2.5W. Target latency: 5ms (200 inf/sec).
    - MobileNetV3-Large: ~0.5 GOPs per inference.

    **Calculations:**
    - Required throughput: 0.5 GOPs * 200 = 100 GOPs/s.
    - Data movement overhead: 10MB tensor at 10 GB/s bandwidth = 1ms transfer time per pass.

    **Conclusion & Interpretation:**
    - **Result: 100 GOPs/s (Memory-Bandwidth Bound)**. While compute headroom is massive (26,000 GOPs/s vs 100 GOPs/s required), minimizing intermediate data movement through fusion is required to hit the 5ms target.
