title: Edge Inference Load Balancing with Coral Edge TPUs
scenario: A smart city surveillance system routes video frames across thousands of Coral Edge TPUs (4 TOPS INT8, 2W) for on-device object detection.
question: How would you route and load balance inference frames across thousands of Coral Edge TPUs under variable networks, failures, and INT8-only constraints?
details:
  realistic_solution: Use consistent hashing to route requests to logical groups of nearby Edge TPUs, minimizing network latency. Within each group, a weighted round-robin or least-outstanding-requests policy, informed by real-time telemetry (queue depth, power draw, temperature), distributes frames. Pre-quantize models offline to guarantee INT8 compatibility.
  common_mistake: |
    **The Pitfall:** Implementing simple round-robin or least-connections load balancing.
    **The Rationale:** Candidates use cloud-standard L7 balancers without considering device-level thermal throttling, latency asymmetry, and strict INT8 constraints.
    **The Consequence:** Packets route to thermally throttled devices, creating extreme tail latency spikes, or models fail to execute due to precision mismatches.
  napkin_math: |
    - Target QPS: 10,000 requests/second.
    - Single TPU capability: 50 FPS (20ms/frame).
    - Perfect conditions: 10,000 / 50 = 200 TPUs.
    - Power draw: 200 * 2W = 400W.
    - Network/Thermal degraded reality (e.g., 20 FPS effective): 10,000 / 20 = **500 TPUs required**.
