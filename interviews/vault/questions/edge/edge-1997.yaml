title: Edge Inference Load Balancing with Coral Edge TPUs
scenario: A smart city surveillance system routes video frames across thousands of Edge TPUs (4 TOPS INT8, 2W) for on-device object detection.
question: How would you route and load balance inference frames across thousands of Edge TPUs under variable networks, failures, and INT8-only constraints?
details:
  realistic_solution: "Implement consistent hashing combined with active telemetry polling (e.g., thermal thresholds, queue depth). Treating Edge TPUs as immutable cloud instances ignores reality; passive cooling guarantees that a subset will hit DVFS thermal throttling, halving their effective FPS. Dynamic load balancing must actively detour frames away from thermal-capped, 20-FPS degraded units toward cool nodes to satisfy the 10,000 QPS target."
  common_mistake: |
    **The Pitfall:** Implementing simple round-robin or least-connections load balancing.
    **The Rationale:** Candidates use cloud-standard L7 balancers without considering device-level thermal throttling, latency asymmetry, and strict INT8 constraints.
    **The Consequence:** Packets route to thermally throttled devices, creating extreme tail latency spikes, or models fail to execute due to precision mismatches.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target QPS: 10,000.
       - Single TPU peak compute: 50 FPS (20ms/frame).
       - Thermal degradation: Effective 20 FPS.
    2. **Calculations:**
       - Perfect conditions: 10,000 / 50 = 200 TPUs.
       - Real-world thermal degraded conditions: 10,000 / 20 = 500 TPUs.
    3. **Conclusion & Interpretation:**
       - **500 TPUs required.** Routing must account for thermal throttling rather than theoretical peak TOPS.
