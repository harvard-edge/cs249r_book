title: Optimizing PCIe DMA for 4K Video on Cloud AI 100
scenario: 'You are designing the data movement architecture for a real-time 4K video analytics pipeline
  deployed on a 75W Qualcomm Cloud AI 100 accelerator. The host system receives uncompressed frames at
  60 FPS and must stream them to the accelerator for processing. You have two options: use pinned memory
  on the host with explicit asynchronous DMA transfers to the accelerator''s 32 GB LPDDR4x, or implement
  a zero-copy mechanism where the accelerator accesses host memory directly over PCIe. Evaluate both alternatives,
  calculate the bandwidth requirements, and determine which design maximizes the utilization of the 400
  TOPS INT8 compute engine.'
details:
  realistic_solution: Using pinned host memory with explicit asynchronous DMA transfers is the better
    design. The host stages the 4K frames in pinned memory, allowing the PCIe DMA engine to transfer them
    into the Cloud AI 100's 32 GB LPDDR4x memory concurrently with the execution of the previous frame.
    This hides the transfer latency and ensures the 400 TOPS INT8 engine operates on local, high-bandwidth
    LPDDR4x memory rather than stalling on PCIe reads.
  common_mistake: Candidates often assume zero-copy is always superior because it avoids a copy operation,
    ignoring the fact that accessing host memory across the PCIe bus during kernel execution introduces
    severe latency. They may also neglect to calculate whether the PCIe bandwidth can sustain the required
    data rate while the accelerator is fully saturated.
  napkin_math: An uncompressed 4K RGB frame (3840x2160x3 bytes) is ~24.9 MB. At 60 FPS, the continuous
    data rate is 24.9 MB * 60 = ~1.49 GB/s. A typical PCIe Gen4 x8 interface offers ~15.7 GB/s. A single
    frame transfer takes 24.9 MB / 15.7 GB/s = ~1.58 ms via DMA. Since 60 FPS allows 16.67 ms per frame,
    transferring via DMA leaves ~15 ms for local execution. If zero-copy was used, the compute engine
    would fetch data at PCIe latency, severely degrading the theoretical 400 TOPS INT8 performance.
