title: Autonomous Fleet Telemetry on Jetson Orin
scenario: You are designing the observability architecture for a fleet of agricultural
  robots, each powered by an NVIDIA Jetson Orin. The system must process multiple
  high-resolution camera streams using the Ampere GPU and DLA accelerator, operating
  strictly within a 60W TDP. Because the robots experience intermittent connectivity
  for up to 12 hours, you need to design a telemetry system that tracks hardware health,
  thermal throttling, and model stragglers without exhausting the 32 GB LPDDR5 memory
  shared with the perception stack.
question: How would you design telemetry for Jetson Orin robots that can buffer 12
  hours offline without starving the perception stack or memory?
details:
  realistic_solution: Design a lightweight, edge-native telemetry agent that performs
    aggressive local aggregation and downsampling to minimize overhead. High-frequency
    metrics like power draw and DLA utilization should be written to a fixed-size
    ring buffer, while only low-resolution summaries (e.g., 1-minute min/max/p99)
    and critical anomaly events are persisted for eventual cloud transmission. This
    approach strictly bounds the observability memory footprint and ensures telemetry
    processing never competes with the perception models for the 275 TOPS INT8 compute
    budget.
  common_mistake: Candidates often propose deploying standard cloud-native sidecars
    like Prometheus and fluent-bit, ignoring their memory footprint and the massive
    volume of data generated during network partitions. They also frequently fail
    to account for the shared memory architecture, where excessive telemetry buffering
    can cause the OS to evict critical perception models from the limited RAM.
  napkin_math: If we collect 500 system and model metrics at 10Hz (8 bytes per metric),
    the raw data generation rate is 40 KB/s. Over a 12-hour offline period (43,200
    seconds), storing this raw telemetry would consume 1.72 GB of memory (40 KB/s
    * 43,200 s). Since the 32 GB LPDDR5 is heavily utilized by the OS, Ampere GPU
    buffers, and DLA weights, dedicating 1.72 GB purely to telemetry risks out-of-memory
    errors; however, locally downsampling to 1-minute intervals compresses the data
    by a factor of 600x, reducing the storage requirement to a very safe 2.8 MB.
