title: The 30 FPS Frame Deadline
scenario: 'You are designing the perception system for a self-driving car, which has a hard real-time
  requirement to process camera frames at 30 FPS to ensure safety. Your pipeline consists of three stages
  running sequentially on a Jetson AGX Orin: 1) Image pre-processing (CSI-2 camera ingest, resizing, normalization)
  which takes 5ms, 2) The main perception model inference, which takes 20ms, and 3) Post-processing (object
  tracking, sensor fusion) which takes 10ms. Can this pipeline meet its 30 FPS deadline?'
question: "Can this pipeline meet its 30 FPS deadline?"
details:
  realistic_solution: No, the pipeline cannot reliably meet its 30 FPS deadline. The deadline for a 30
    FPS system is approximately 33.3ms per frame. The total worst-case execution time for the sequential
    pipeline is the sum of its stages. In this case, 5ms (pre-processing) + 20ms (inference) + 10ms (post-processing)
    = 35ms. This total latency of 35ms is greater than the 33.3ms budget, meaning the system will drop
    frames, leading to a critical failure in a safety-critical application like autonomous driving.
  common_mistake: Engineers often focus solely on the model inference time and forget to account for the
    full end-to-end pipeline latency. In real-time systems, every millisecond counts, and the pre- and
    post-processing steps are often significant contributors to the total 'glass-to-glass' latency. Another
    mistake is designing for the average case, whereas hard real-time systems must be designed for the
    worst-case execution time (WCET).
  napkin_math: 'The deadline for a 30 FPS system is 1000 ms / 30 = 33.3 ms. The sequential pipeline execution
    time is: 5 ms (Pre-processing) + 20 ms (Inference) + 10 ms (Post-processing) = 35 ms. Since 35 ms
    > 33.3 ms, the pipeline will consistently drop frames. The stages must be pipelined asynchronously
    to overlap operations and fit the 33.3 ms frame window.'
  options:
  - Yes, the 20ms inference time is well within the 33ms budget.
  - Yes, the total latency is 30ms, which is just inside the 33ms budget.
  - No, the 35ms total pipeline latency exceeds the 33.3ms frame budget.
  - It depends on the average case; the worst-case 35ms latency might be rare and acceptable.
  correct_index: 2
