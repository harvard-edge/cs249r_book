title: The Communication Tax of Federated Learning
scenario: You are planning the infrastructure for a federated learning system that will deploy to one million edge devices. Each device will periodically send a 20 MB model update to your central servers for aggregation.
question: From an operational cost perspective, what factor do you need to identify as the primary driver of your budget?
details:
  realistic_solution: The primary operational cost driver is the network bandwidth required to upload the 20 MB model updates from one million devices. At this scale, the total data transfer is massive and directly translates to high cloud provider bills for data ingress and transfer.
  common_mistake: |
    **The Pitfall:** Focusing entirely on the compute cost of the central aggregation server.
    **The Rationale:** Engineers prioritize complex ML processing (aggregation) over the brute-force cost of network data movement.
    **The Consequence:** Massive, unexpected cloud provider bills for data transfer.
  napkin_math: |
    - Total data per cycle: 1,000,000 devices * 20 MB = 20,000 GB.
    - Cloud data ingress price: ~$0.02/GB.
    - Cost per cycle: 20,000 GB * $0.02 = $400.
    **Network bandwidth data transfer costs dominate the operational budget.**
  options:
  - The compute cost of aggregating the one million models on the central server.
  - The power drawn by the one million edge devices to train the model locally.
  - The network bandwidth cost to transfer all model updates to the cloud.
  - The storage cost for the historical archive of all global models.
  correct_index: 2
