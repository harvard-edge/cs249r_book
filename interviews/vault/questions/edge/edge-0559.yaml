validation_issues_pro:
- The napkin math for FPS is misleading; it calculates a theoretical compute time (e.g., 1.18ms) but then
  jumps to a benchmark result (28 FPS, i.e., 35.7ms/frame) without explaining the huge discrepancy.
- The calculation for the Orin NX's effective TOPS is confusingly worded and seems to work backwards from
  the desired answer.
