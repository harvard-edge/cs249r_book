title: The Vision Transformer Performance Regression
scenario: 'Your team has just deployed a new Vision Transformer (ViT) model for an autonomous trucking camera, replacing an older CNN architecture. The new ViT has 20% fewer G-MACs. However, the old CNN achieved 40 FPS, while the new ViT only achieves 15 FPS. You profile the hardware (a Jetson AGX Orin, 204.8 GB/s memory bandwidth): The CNN uses 150 G-MACs and reads 1.2 GB from DRAM. The ViT uses 120 G-MACs and reads 4.5 GB from DRAM.'
question: Why is the new ViT slower than the old CNN on Jetson Orin despite having 20% fewer G-MACs?
details:
  realistic_solution: The ViT is severely memory-bandwidth bound. While it requires fewer calculations (120 G-MACs vs. 150), it reads nearly 4x more data from DRAM (4.5 GB vs. 1.2 GB). The time spent waiting for data from memory far exceeds the time spent on computation, starving the powerful compute units. The model's low Arithmetic Intensity (Ops/Byte) makes it unable to leverage the Orin's high peak TOPS, leading to the performance drop despite having fewer G-MACs.
  common_mistake: |
    **The Pitfall:** Treating G-MACs as the sole indicator of inference speed.
    **The Rationale:** Engineers assume fewer mathematical operations automatically means faster execution.
    **The Consequence:** They ignore memory bandwidth limits and Arithmetic Intensity, deploying models that starve the compute cores while waiting for DRAM.
  napkin_math: |
    1. CNN memory transfer time: 1.2 GB / 204.8 GB/s = 5.8 ms.
    2. ViT memory transfer time: 4.5 GB / 204.8 GB/s = 22.0 ms.
    3. **The ViT spends nearly 4x more time waiting for memory data compared to the CNN, making it memory-bandwidth bound despite having fewer operations.**
  options:
  - The G-MAC count is misleading; Transformer MACs are less efficient and take longer to execute on the Orin's Tensor Cores.
  - The ViT is memory-bandwidth bound; its low arithmetic intensity means the compute units are starved waiting for data from DRAM.
  - The model has too many parameters, causing it to be capacity-bound by the Orin's 8-32GB of DRAM.
  - The performance drop is due to insufficient quantization; the model needs to be converted to INT4 to increase throughput.
  correct_index: 1
