title: The Decaying Sensor Dilemma
scenario: A keyword-spotting model deployed on 50,000 smart speakers achieved 99.2% accuracy in the lab. After a year, fleet-wide accuracy dropped by 5 points. Root cause analysis reveals the microphone's noise floor has increased by 6 dB due to dust and aging.
question: How much has the microphone noise power increased when the noise floor rises by 6 dB?
details:
  realistic_solution: 'A 6 dB increase in the noise floor means the noise power has quadrupled relative to the signal power. The decibel scale is logarithmic.'
  common_mistake: |
    **The Pitfall:** Assuming the decibel scale is linear.
    **The Rationale:** Candidates assume a 'small' 6 dB increase only requires a minor linear adjustment to data volume.
    **The Consequence:** Drastically underestimating the necessary dataset size needed to recalibrate the model, resulting in continued failure in the field.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Noise floor increase: 6 dB.
       - Logarithmic decibel scale.
    2. **Calculations:**
       - Decibel Power Formula: ΔdB = 10 * log10(P_new / P_old).
       - 6 = 10 * log10(Ratio).
       - Ratio = 10^0.6 ≈ 3.98.
    3. **Conclusion & Interpretation:**
       - **Result: ~4x noise power increase (Signal-Degraded).**
  options:
  - 20,000 hours. A 6dB change corresponds to a 2x factor, so we need to double the data.
  - 11,000 hours. A small drift requires a small (10%) increase in data to recalibrate.
  - 40,000 hours. A 6dB noise increase means 4x the noise power, requiring 4x the data to maintain SNR.
  - The data amount is irrelevant; the model architecture needs to be changed to be more robust.
  correct_index: 2
