title: PUE and WUE Optimization for ML Training Infrastructure
scenario: Your on-premises GPU cluster has PUE=1.6 and WUE=2.1 L/kWh. A cloud provider offers PUE=1.2
  and WUE=0.5 L/kWh. The cluster runs 800 H100 GPUs at 80% average utilization. Compute the annual overhead
  energy waste from PUE and the annual water consumption. Determine the carbon and water savings from
  migrating to the cloud facility, and identify what PUE/WUE values would make the on-prem facility competitive.
details:
  realistic_solution: 'Total IT load estimate: 800 H100s × 700W × 0.80 utilization = 448 kW GPU power.
    Add 30% for servers/networking/storage overhead: total IT load ≈ 582 kW. Annual energy: 582 kW × 8,760
    hr = 5,098,320 kWh. On-prem total energy (PUE=1.6): 5,098,320 × 1.6 = 8,157,312 kWh. Overhead waste:
    (1.6-1) × 5,098,320 = 3,058,992 kWh/year wasted on cooling/power distribution. Cloud (PUE=1.2): 5,098,320
    × 1.2 = 6,117,984 kWh. Annual energy savings: 2,039,328 kWh. Water: On-prem WUE=2.1 × 5,098,320 kWh
    = 10,706,472 liters (10.7M liters/year). Cloud WUE=0.5: 2,549,160 liters. Water savings: 8.2M liters/year
    (8,157 cubic meters). Break-even PUE for on-prem: 1.2 (cloud), so on-prem needs PUE < 1.25 to be within
    4% of cloud efficiency.'
  common_mistake: Calculating PUE overhead only on GPU power without accounting for the full IT load (servers,
    networking, storage). PUE applies to total IT load, not just accelerator power.
  napkin_math: 'GPU power: 800 × 700W × 0.80 = 448 kW. IT load: 448 × 1.3 = 582 kW. Annual IT kWh: 582
    × 8760 = 5.1M kWh. PUE overhead: (1.6-1.2) × 5.1M = 2.04M kWh/year wasted. At $0.08/kWh: $163K/year
    extra cost. At 400 gCO2e/kWh grid: 2.04M × 0.4 = 816 tCO2e/year extra. WUE difference: (2.1-0.5) ×
    5.1M kWh = 8.16M liters/year ≈ 8,160 cubic meters ≈ 3.3 Olympic swimming pools/year.'
