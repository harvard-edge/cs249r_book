title: The Autonomous Stack Consolidation
scenario: You are the new technical lead for the perception team at a leading autonomous vehicle company. The current system is a complex web of 15+ specialized CNNs running on a Jetson AGX Orin. This system is stable and meets its 33ms end-to-end latency budget, with the perception stack consuming 25ms of that budget. The research team has developed a new unified Transformer-based model that significantly improves accuracy but takes 200ms per inference.
question: What systematic optimization plan would you use to bring the 200ms Transformer under the <25ms perception budget on the same Orin?
details:
  realistic_solution: A successful plan requires a systematic approach, starting with the biggest sources of waste and moving to more sophisticated techniques. The correct order is crucial because the effectiveness of later stages depends on the success of earlier ones.
  common_mistake: |
    **The Pitfall:** Unsystematic application of fragmented optimization techniques.
    **The Rationale:** Engineers often focus heavily on one area (like aggressive quantization) without addressing fundamental architectural inefficiencies, or they misorder steps (e.g., speculative decoding before fixing attention memory bottlenecks).
    **The Consequence:** The optimization yields minimal overall gains because the true bottlenecks (e.g., memory bandwidth and kernel launch overhead) are never resolved.
  napkin_math: |
    1. **Baseline CNN Math**: 15 CNNs independently. Each uses 2 GOPs, reads 10MB weights.
    2. **Sequential Memory Load**: 15 * 10MB = 150MB. Read time = 150MB / 204.8 GB/s = 0.73ms.
    3. **Compute Time**: 30 GOPs / 275 TOPS = 0.1ms.
    4. **Launch Overhead Dominance**: 15 models * 50 layers * 0.05ms = 37.5ms. 
    5. **Result**: Fusing into one shared backbone eliminates massive kernel launch penalties, drastically shifting the bottleneck and saving enough time to reach the **<25ms target**.
