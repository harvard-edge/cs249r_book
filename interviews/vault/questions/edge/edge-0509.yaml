title: 'The Self-Driving Perception Stall: Real-Time Deadlines'
scenario: A perception model runs on an NVIDIA Jetson AGX Orin compute unit with a 30W power budget, allowing for a sustained 150 TOPS of INT8 compute. The model must process the front camera stream with a latency of 33ms (30 FPS) or less.
question: Why is the ADAS model missing the 33ms deadline despite theoretical compute and memory times fitting, and what is the real bottleneck?
details:
  realistic_solution: The model is severely memory-bound, but not because of the hardware's peak limits. The true bottleneck is the low effective memory bandwidth being achieved by the model's memory access patterns.
  common_mistake: |
    **The Pitfall:** Blaming external factors like 'power throttling' or 'inaccurate profiling'.
    **The Rationale:** Engineers calculate theoretical compute and memory times in isolation, see both fit the 33ms deadline, and stop digging.
    **The Consequence:** Failing to identify poor effective bandwidth utilization as the root cause of the memory bound latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Orin at 30W (150 TOPS peak, 204.8 GB/s memory bandwidth).
    - Model: 200 GigaOps compute, 1 GB data movement.

    **Calculations:**
    - Ridge point = 150e12 / 204.8e9 = 732 Ops/Byte.
    - Arithmetic Intensity = 200 GigaOps / 1 GB = 200 Ops/Byte.
    - Transfer Time = 1 GB / 204.8 GB/s = 4.88ms.
    - Effective TOPS = 200 GigaOps / 4.88ms = 41 TOPS.

    **Conclusion & Interpretation:**
    - **Result: 41 TOPS (Memory-Bandwidth-Bound)**. Since 200 Ops/Byte < 732 Ops/Byte ridge point, the model is memory-bound, achieving only a fraction of the 150 TOPS peak.
  options:
  - The model is compute-bound; the 150 TOPS available at 30W is insufficient for 4T Ops.
  - The device is overheating and power-throttling below the reported 150 TOPS.
  - The model is memory-bound; its access patterns result in poor effective bandwidth utilization.
  - The system profiler is inaccurate; the model must be performing far more than 4T Ops.
  correct_index: 2
