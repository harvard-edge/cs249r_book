title: The V2X Latency Requirement
scenario: You're architecting a cooperative perception system for an intersection where vehicles share their perception data via C-V2X (Cellular Vehicle-to-Everything) over 5G. Each vehicle runs object detection locally and broadcasts compressed feature maps to nearby vehicles so they can 'see around corners'. The safety requirement dictates a vehicle approaching the intersection at 60 km/h must receive and fuse perception data from other vehicles within 10ms end-to-end (detection-to-fusion). The 5G network promises 1ms air interface latency.
question: Can you meet the 10ms budget using standard 5G routing?
details:
  realistic_solution: Meeting 10ms end-to-end is nearly impossible with standard 5G cellular routing. The 1ms marketing claim is the air interface only. The real design must use C-V2X Sidelink (direct vehicle-to-vehicle, bypassing the cellular core) to reliably meet 10ms with a 9ms budget.
  common_mistake: |
    **The Pitfall:** Believing the 5G "1ms latency" marketing claim applies to end-to-end network transmission.
    **The Rationale:** Engineers often confuse theoretical air-interface URLLC latency with full routing round-trip time through a cellular core.
    **The Consequence:** Designing safety-critical systems that fundamentally cannot meet their real-time deadlines, risking fatal collisions.
  napkin_math: |
    - **Total Latency Budget:** 10 ms.
    - **Component Latencies:** On-vehicle detection (3ms) + feature compression (1ms) + 5G air interface (1-5ms) + core network (2-5ms) + edge server (1ms) + return path (1-5ms) = 9-20ms total.
    - **Bandwidth Required:** 8 vehicles × 50 KB/frame × 10 Hz = 4 MB/s (32 Mbps).
    - **Physical Impact:** At 60 km/h (16.7 m/s), a 10ms delay = 0.167m of travel. A 16ms delay = 0.267m of travel.
    - **Final Result:** **End-to-end 5G latency (9-20ms) is too variable to guarantee the 10ms safety deadline. Only C-V2X Sidelink can consistently meet the budget.**
