title: The V2X Latency Requirement
scenario: 'You''re architecting a cooperative perception system for an intersection where vehicles share
  their perception data via C-V2X (Cellular Vehicle-to-Everything) over 5G. Each vehicle runs object detection
  locally and broadcasts compressed feature maps to nearby vehicles so they can ''see around corners.''
  The safety requirement: a vehicle approaching the intersection at 60 km/h must receive and fuse perception
  data from other vehicles within 10ms end-to-end (detection-to-fusion). The 5G network promises 1ms air
  interface latency. Can you meet the 10ms budget?'
question: "Can you meet the 10ms budget?"
details:
  realistic_solution: 'Meeting 10ms end-to-end is nearly impossible with current 5G infrastructure. The
    full latency chain: on-vehicle detection (3ms) + feature compression (1ms) + 5G air interface (1ms
    URLLC ideal, 5ms typical) + core network (2-5ms) + edge server (1ms) + return path (1-5ms) = 9-20ms
    total. Only C-V2X Sidelink (direct vehicle-to-vehicle, bypassing the cellular core) can reliably meet
    10ms with a 9ms budget. The 5G ''1ms latency'' is marketing — it''s the air interface only, under
    ideal URLLC conditions. The real design: use Sidelink for safety-critical sharing, 5G for non-critical
    cloud analytics.'
  common_mistake: '"5G has 1ms latency, so we have 9ms for everything else. Easy." The 1ms is the *air
    interface* latency under ideal conditions (URLLC mode, no congestion). The end-to-end latency includes
    many more hops, and the 1ms number is a lower bound that''s rarely achieved in practice.'
  napkin_math: 'Latency budget: 10ms. Sidelink path: 9ms (10% margin). 5G URLLC path: 9.5ms (5% margin).
    5G eMBB path: 16ms (60% over). Feature map size: raw = 4.88 MB, compressed = 50 KB (100× reduction,
    ~5% information loss). Bandwidth: 8 vehicles × 50 KB × 10 Hz = 4 MB/s = 32 Mbps. At 60 km/h (16.7
    m/s), a 10ms delay = 0.167m of travel. At 100 km/h: 0.278m. A 16ms delay (eMBB): 0.445m — the difference
    between stopping in time and a collision at intersection speeds.'
