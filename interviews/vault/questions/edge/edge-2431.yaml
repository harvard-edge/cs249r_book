title: Jetson Zero-Copy Pipelines
scenario: A Jetson AGX Orin passes decoded 1080p camera frames from GStreamer CPU
  buffers into a TensorRT engine, causing high memory usage.
question: Analyze why standard CPU memory buffers are highly inefficient on this platform
  and name a better primitive.
details:
  realistic_solution: Standard buffers force the unified LPDDR5 memory to copy data
    redundantly from the hardware decoder to CPU memory, and then back to GPU-accessible
    memory. Utilizing zero-copy hardware primitives like NvSciBuf or EGLStreams passes
    memory pointers instead of copying bytes, drastically reducing memory bus utilization.
  common_mistake: Assuming the Jetson has dedicated PCIe VRAM like a desktop GPU and
    requires traditional host-to-device transfers.
  napkin_math: 1 pointer passed vs millions of bytes copied.
