title: Coreset Selection for INT8 Calibration
scenario: Your team is preparing a vision model for deployment on an on-premise accelerator. You must calibrate the model for INT8 execution. The original dataset is 10 million images, so you decide to select a 0.5% coreset for calibration. Calculate the memory footprint of this coreset (assuming uncompressed 224x224 RGB 8-bit images) and determine if it fits within the accelerator's 32 GB memory.
question: How large is the 0.5% uncompressed calibration coreset, and does it fit in 32 GB of memory?
details:
  realistic_solution: Compute the raw byte footprint by multiplying spatial dimensions by the channel depth. A 0.5% coreset drawn from 10M images calculates to roughly 7.5 GB, which effortlessly accommodates itself within the 32 GB VRAM limit, enabling fast on-device post-training quantization calibration.
  common_mistake: |
    **The Pitfall:** Miscalculating raw uncompressed image size or ignoring total memory constraints.
    **The Rationale:** Candidates often omit the channel dimension (x3 for RGB) when calculating image size, or forget that weights and activations also need memory.
    **The Consequence:** Incorrectly sizing the dataset, leading to potential Out-Of-Memory (OOM) errors during the calibration process on the device.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total images: 10,000,000
       - Coreset fraction: 0.5% (0.005)
       - Image shape: 224x224 RGB (3 channels, 8-bit uncompressed)
       - Device Memory: 32 GB
    2. **Calculations:**
       - Single image: 224 * 224 * 3 = 150,528 bytes
       - Coreset size: 10,000,000 * 0.005 = 50,000 images
       - Dataset payload: 50,000 * 150,528 bytes = 7,526,400,000 bytes ≈ 7.53 GB
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Limit.** The 7.53 GB coreset easily fits within the 32 GB RAM, allowing on-device INT8 calibration.
