title: The Adaptive Model Diet
scenario: 'Your edge device for real-time video analytics needs to dynamically adapt its ML model performance based on available power, thermal limits, and real-time workload (e.g., number of objects to detect, scene complexity). You have a base model, but also several optimized variants (e.g., pruned, quantized to different precisions, smaller architectures).'
question: How do you design a runtime that switches among model variants to meet changing latency, throughput, thermal, and power budgets without human intervention?
details:
  realistic_solution: |
    An adaptive, feedback-driven runtime optimization system:
    1.  **Model Zoo & Performance Profiles:** Maintain a "model zoo" of pre-optimized model variants (e.g., different pruning ratios, INT8/FP16/FP32 versions, smaller/larger architectures). Each variant is thoroughly profiled on the target hardware across different compute units (CPU, NPU, GPU) for latency, throughput, power consumption, and accuracy.
    2.  **Runtime Resource Monitoring:** Continuously monitor key system metrics including compute utilization, memory bandwidth, thermal sensors, and power consumption.
    3.  **Performance & Power Controller:** A central control module that continuously evaluates the current system state against defined Service Level Objectives (SLOs) for latency, throughput, and power budget.
    4.  **Adaptive Decision Logic:** Rule-based thresholds or a lightweight RL agent selects the optimal model variant from the zoo based on current resource availability.
    5.  **Dynamic Model Switching:** Efficient model loading with pre-loaded hot variants and smooth context switching to avoid disrupting ongoing tasks.
  common_mistake: |
    **The Pitfall:** Proposing a static deployment ("Pre-select one model and stick with it").
    **The Rationale:** Overlooking the dynamic constraints of edge environments (thermal throttling, varying workloads).
    **The Consequence:** Wasted resources during low workloads or missed performance targets during peak loads/thermal events.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base Model (FP32): Takes 50ms (20 FPS max) and consumes 5W. It handles a 15 FPS input stream.
    - Optimized INT8 Variant: Takes 10ms and consumes 0.5W. It easily handles both 15 FPS and 30 FPS streams.
    - Small INT8 Variant: Takes 5ms and 0.2W.

    **Calculations:**
    - Scenario 1 (Throughput Spike): If input jumps from 15 FPS to 30 FPS (needs \le 33ms), the system switches to the 10ms model.
    - Scenario 2 (Power Drop): If power drops to 0.3W, the system switches to the 5ms/0.2W model.

    **Conclusion & Interpretation:**
    - **Result: <10ms Overhead (Latency-Bound)**. Switching overhead must remain <10ms to avoid frame drops during transition.
