title: Designing a Cascaded Model Pipeline on Jetson Orin + Coral TPU
scenario: An industrial inspection system must classify defects in real-time at 30 fps using a Jetson Orin (32GB LPDDR5, 275 TOPS, 60W) paired with a Coral Edge TPU (4 TOPS, 2W). The pipeline needs a fast first-stage classifier (must run at 30 fps) and a slower second-stage analyzer for uncertain cases.
question: How should you partition the cascaded classifier pipeline between the Jetson Orin and Coral Edge TPU to stay within a 40W total budget?
details:
  realistic_solution: 'Deploy a lightweight INT8 TFLite first-stage classifier on the Coral Edge TPU. The Coral runs continuously at 30 fps to filter out clear negatives, consuming only ~2W. For uncertain cases, the pipeline triggers the Jetson Orin to run a heavier second-stage analyzer. Because uncertain cases represent a small fraction of the total frames, the Jetson Orin can remain in a low-power idle state (~10W) most of the time. This cascaded approach keeps the average power consumption well under the 40W budget.'
  common_mistake: |
    **The Pitfall:** Running everything through the power-hungry Jetson Orin and leaving the low-power Coral TPU idle.
    **The Rationale:** Candidates ignore the fact that uncertain cases represent a small fraction of frames and fail to cascade the architecture.
    **The Consequence:** The system runs continuously at 60W, blowing past the strict 40W power budget.
  napkin_math: |
    * Coral Edge TPU active power: 2W.
    * Jetson Orin idle power: ~10W. Active power: up to 60W.
    * Assume Coral filters 90% of frames. Orin handles 10%.
    * Orin active duty cycle = 10%.
    * Total average power = 2W (Coral) + [0.90 * 10W (Orin idle)] + [0.10 * 60W (Orin active)].
    * Total average power = 2W + 9W + 6W = **17W.**
    * **This easily stays under the 40W budget.**
