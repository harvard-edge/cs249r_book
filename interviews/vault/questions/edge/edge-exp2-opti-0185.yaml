title: Mitigating Edge TPU Thermal Throttling in Sealed Enclosures
scenario: A smart traffic camera uses a USB Google Coral Edge TPU (4 TOPS INT8, 2W max) in a sealed, passively
  cooled enclosure. The system initially runs inference continuously at 30 FPS, but after 10 minutes,
  the Edge TPU hits its thermal limit and throttles, dropping throughput to 15 FPS. Diagnose the thermal
  bottleneck and quantify an optimization strategy to achieve a sustained minimum of 20 FPS without triggering
  thermal throttling.
details:
  realistic_solution: The most effective solution is to implement duty cycling and frame rate capping
    to reduce the average power dissipation below the enclosure's passive thermal limit. By intentionally
    capping the ingestion rate to 22 FPS and letting the TPU idle between frames, the average thermal
    load is reduced, preventing the system from ever reaching the throttle temperature while still meeting
    the minimum requirement.
  common_mistake: Candidates often suggest adding active cooling (fans) which violates the sealed enclosure
    constraint, or they propose complex model pruning without first addressing the duty cycle and baseline
    power dissipation physics.
  napkin_math: 'Continuous 30 FPS inference consumes 2W, causing throttling. Assume the sealed enclosure
    can only dissipate 1.5W continuously. To avoid throttling, Average Power must be <= 1.5W. By capping
    the frame rate to 22 FPS, the TPU is active 73.3% of the time (22/30) and idle 26.7%. Assuming a 0.1W
    idle power: Average Power = (0.733 * 2W) + (0.267 * 0.1W) = 1.466W + 0.0267W = 1.49W. Since 1.49W
    < 1.5W, the system sustains 22 FPS continuously without throttling.'
