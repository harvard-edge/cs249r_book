title: The Edge Efficiency Paradox
scenario: 'Your autonomous vehicle team is upgrading the primary perception model running on a power-constrained
  NVIDIA Jetson AGX Orin (15W budget). You have two candidate models to replace the old one:'
details:
  realistic_solution: The core issue is the disastrous mismatch between the model's architecture and the
    hardware's capabilities, a classic case of ignoring the Roofline model. Model A, the 'Sparseformer',
    is severely **memory-bound**. Its sparse, irregular memory access patterns result in a very low **Arithmetic
    Intensity** (the ratio of compute operations to bytes moved from memory). The Jetson's powerful INT8
    Tensor Cores are starved, spending most of their cycles idle, waiting for data to arrive from the
    relatively slow LPDDR5 memory. This low utilization means the model never approaches the Orin's peak
    TOPS. Furthermore, the constant, inefficient data traffic to and from off-chip DRAM dominates the
    system's power budget, as a DRAM access is orders of magnitude more energetically expensive than an
    on-chip computation. Model B, the dense CNN, while performing more raw operations, is **compute-bound**.
    Its high Arithmetic Intensity keeps the Tensor Cores saturated and busy, achieving much higher hardware
    utilization and therefore higher effective TOPS. It moves data in large, predictable chunks, which
    is far more energy-efficient. The 'more efficient' model was only efficient on paper (in terms of
    MACs), not in the physical reality of silicon.
  common_mistake: 'Blaming software overhead. A junior engineer might say, ''The custom operators in the
    sparse model have high CPU dispatch overhead,'' or ''We just need to fuse more layers.'' While potentially
    true, these are tactical issues that don''t explain the core strategic failure: why a model with less
    math is slower and burns more power. It mistakes a symptom for the root cause.'
  napkin_math: 'At 15W, Orin gives ~75 TOPS; bandwidth remains 204.8 GB/s. Ridge point = 75e12 / 204.8e9
    = 366 Ops/Byte. Model A (Sparseformer): 20 GigaOps, moves 400 MB. AI = 20e9 / 400e6 = 50 Ops/Byte.
    Being memory-bound (50 < 366), its irregular access drops effective bandwidth to ~50 GB/s. Time =
    400 MB / 50 GB/s = 8 ms.'
