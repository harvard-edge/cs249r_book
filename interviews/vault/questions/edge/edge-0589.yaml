title: The Edge Efficiency Paradox
scenario: >-
  Your autonomous vehicle team is upgrading the primary perception model running on a power-constrained NVIDIA Jetson AGX Orin (15W budget). You have two candidate models to replace the old one: a Sparseformer (fewer MACs) and a dense CNN.
question: Which candidate should you choose under the 15W Orin budget, and why can the lower-MAC Sparseformer be slower and use more power than the dense CNN?
details:
  realistic_solution: 'The Sparseformer is severely memory-bound. Its sparse, irregular memory access patterns result in a low Arithmetic Intensity. The Jetson''s powerful INT8 Tensor Cores starve, spending cycles idle waiting for data from LPDDR5 memory. The constant off-chip DRAM data traffic dominates the power budget. The dense CNN, while performing more math, is compute-bound. High AI keeps Tensor Cores saturated, moves data in large chunks, and is fundamentally faster and more energy-efficient in silicon.'
  common_mistake: |
    **The Pitfall:** Equating theoretical MAC reduction with real-world efficiency.
    **The Rationale:** Candidates assume fewer operations natively means lower latency and less power draw.
    **The Consequence:** They blame "software overhead" for the slowdown, missing the root cause that irregular DRAM access patterns are phenomenally expensive in both time and energy, overriding any MAC savings.
  napkin_math: |
    1. **Hardware:** At 15W, Orin gives ~75 TOPS; bandwidth is 204.8 GB/s.
    2. **Ridge point:** `75 TOPS / 204.8 GB/s ≈ 366 Ops/Byte`.
    3. **Sparseformer (Model A):** 20 GigaOps, moves 400 MB. `AI = 20e9 / 400e6 = 50 Ops/Byte`.
    4. **Result:** Since 50 < 366, the Sparseformer is completely memory-bound. Its irregular access drops effective bandwidth severely, causing poor hardware utilization and massive DRAM power spikes.
