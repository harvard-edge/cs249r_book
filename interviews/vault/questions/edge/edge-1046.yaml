title: 'Fault Tolerance: Implement Heartbeat and Health Monitor for Edge ML Device'
scenario: You are implementing a health monitoring system for 2,000 Jetson Orin (32GB
  LPDDR5, 275 TOPS, 60W) devices. Each device runs an inference pipeline that must
  alert within 5 minutes of any degradation (inference latency > 2× baseline, accuracy
  drop > 5%, or power spike > 70W). Implement the monitoring protocol and quantify
  bandwidth requirements.
question: How would you monitor 2,000 Orin devices to alert within 5 minutes on latency,
  accuracy, or power degradation, and what bandwidth is required?
details:
  realistic_solution: 'Edge-side: compute rolling statistics locally, alert only on
    threshold violations. Heartbeat: once per minute with summary stats. Alert: immediate
    push on violation. Server: processes 2000 heartbeats/minute + sparse alerts.'
  common_mistake: Sending raw metrics every second from 2000 devices — overwhelming
    the monitoring server. Not implementing edge-side anomaly detection before alerting.
  napkin_math: 'Heartbeat payload: timestamp (8B) + avg_latency_ms (4B) + p95_latency
    (4B) + power_watts (4B) + temperature (2B) + alert_flag (1B) = 23 bytes. 2000
    devices × 23 bytes / 60 seconds = 767 bytes/sec = 6.1 kbps — trivially small.
    Full telemetry (alternative): 10 metrics × 4B × 10 Hz = 400 bytes/sec per device
    × 2000 = 800 KB/s = 6.4 Mbps — 1000× more. Edge detection: on Orin, rolling window
    (last 100 inferences) latency percentile computation: 100 × 8B = 800B rolling
    buffer. Percentile sort: 100 log 100 = 664 ops per second = negligible. Alert
    latency: 5-second detection window (100 inferences at 50ms each). Well within
    5-minute SLA.'
