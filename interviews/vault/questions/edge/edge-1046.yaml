title: 'Fault Tolerance: Implement Heartbeat and Health Monitor for Edge ML Device'
scenario: You are implementing a health monitoring system for 2,000 Jetson Orin (32GB LPDDR5, 275 TOPS, 60W) devices. Each device runs an inference pipeline that must alert within 5 minutes of any degradation (inference latency > 2× baseline, accuracy drop > 5%, or power spike > 70W).
question: How would you monitor 2,000 Orin devices to alert within 5 minutes on latency, accuracy, or power degradation, and what bandwidth is required?
details:
  realistic_solution: Design an edge-aggregated monitoring architecture. Locally evaluate thresholds directly on the Orins and transmit 1-minute summarized heartbeats rather than constant telemetry streams, slashing massive OpEx networking costs.
  common_mistake: |
    **The Pitfall:** Sending raw telemetry continuously.
    **The Rationale:** Engineers default to cloud-centric monitoring patterns (sending raw metrics every second) without considering edge fleet scale or uplink limits.
    **The Consequence:** Overwhelming the central monitoring server and unnecessarily saturating expensive network bandwidth.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet Size: 2,000 Jetson Orin devices.
    - Alert Requirement: Within 5 minutes.
    - Smart Telemetry Strategy: 1-minute aggregation heartbeats.
    - Heartbeat Payload: timestamp (8B) + avg_lat (4B) + p95_lat (4B) + power (4B) + temp (2B) + flag (1B) = 23 Bytes.

    **Calculations:**
    - Continuous Raw Telemetry (Anti-pattern) = 10 metrics * 4B * 10 Hz = 400 B/s per device. Fleet = 400 B/s * 2000 = 800 KB/s (6.4 Mbps).
    - Edge-Aggregated Heartbeat Bandwidth = 2000 devices * 23 Bytes / 60 seconds = 766.6 Bytes/sec.
    - Fleet Uplink Conversion = 766.6 Bytes/sec * 8 bits/Byte = 6.13 kbps.

    **Conclusion & Interpretation:**
    - **Result: 6.1 kbps (Bandwidth-Optimized)**. Edge local aggregation drops network saturation by three orders of magnitude.
