title: Coral Edge TPU Queue Depth and Tail Latency
scenario: A Coral Edge TPU runs MobileNetV2 classification at 30 FPS. Average inference is 5ms, but when the host Raspberry Pi is under load, P99 frame latency rises to 55ms. The Coral is connected via USB3.
question: Why does Coral MobileNetV2 P99 latency rise to 55ms under Raspberry Pi load, and how would you reduce it without blaming USB3?
details:
  realistic_solution: |
    Pre-allocate input/output tensors and avoid Python object creation in the inference loop. Use multiprocessing with a dedicated process for Coral inference (bypasses GIL). Implement double-buffering: prepare next frame while waiting for Coral result. Profile with `cProfile` to identify Python overhead.
  common_mistake: |
    **The Pitfall:** Blaming the USB3 connection and upgrading to a PCIe module to solve the latency spike.
    **The Rationale:** Assuming physical hardware bottlenecks instead of diagnosing host-side OS scheduling and interpreter locks.
    **The Consequence:** Wasting hardware budgets while failing to fix the actual software contention issue causing the P99 latency spikes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target Latency: 33ms (30 FPS). Average Latency: 5ms.
       - Load: 3 background processes.
    2. **Calculations:**
       - Hardware Transfer: 150 KB image at 400 MB/s = 0.375 ms.
       - TPU Compute: 0.075 ms.
       - Python/GIL Overhead: 5 ms - 0.45 ms = ~4.55 ms.
       - P99 OS Scheduling Spike: OS quantum (10ms) * 5 processes = 50ms delay.
    3. **Conclusion & Interpretation:**
       - **Result: 55 ms latency is entirely OS/GIL driven. Bottleneck: OS Scheduler and GIL-Bound (Host Contention).**
