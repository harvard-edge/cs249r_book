title: Coral Edge TPU Queue Depth and Tail Latency
scenario: A Coral Edge TPU (4 TOPS INT8, 2W) runs MobileNetV2 classification at 30 FPS (33ms/frame budget). Average inference is 5ms, but when the host Raspberry Pi is under load (running 3 other processes), P99 frame latency rises to 55ms. The Coral is connected via USB3.
question: Why does Coral MobileNetV2 P99 latency rise to 55ms under Raspberry Pi load, and how would you reduce it without blaming USB3?
details:
  realistic_solution: 'Pre-allocate input/output tensors and avoid Python object creation in the inference loop. Use multiprocessing with a dedicated process for Coral inference (bypasses GIL). Implement double-buffering: prepare next frame while waiting for Coral result. Profile with cProfile to identify Python overhead.'
  common_mistake: |
    **The Pitfall:** Blaming the USB3 connection and upgrading to a PCIe module to solve the latency spike.
    **The Rationale:** Assuming physical hardware bottlenecks instead of diagnosing host-side OS scheduling and interpreter locks.
    **The Consequence:** Wasting hardware budgets while failing to fix the actual software contention issue causing the P99 latency spikes.
  napkin_math: |
    * **Hardware Latency**: MobileNetV2 (300 MOPs) / 4 TOPS = 75 µs.
    * **USB3 Transfer**: 150 KB image at 400 MB/s = 375 µs. Total hardware = 450 µs.
    * **Python Overhead**: 5 ms average - 0.45 ms = 4.55 ms Python/tflite overhead.
    * **P99 Spike**: Scheduler quantum (10ms) × 5 processes = up to 50ms delay.
    * **Conclusion**: The latency spike to **55 ms** is entirely driven by Python GIL contention and host OS scheduling, not the USB or TPU.
