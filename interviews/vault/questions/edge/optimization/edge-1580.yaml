title: Ampere 2:4 Structured Sparsity on Jetson Orin
scenario: A real-time vision model is deployed on an NVIDIA Jetson Orin featuring an Ampere GPU. A dense INT8 model requires 180 TOPS to meet latency SLAs and its weights occupy 20 GB.
question: Will applying Ampere 2:4 structured sparsity allow the 180 TOPS, 20 GB INT8 model to meet the Orin's limits, and what is the sparse weight size?
details:
  realistic_solution: If the model is actually pruned into Ampere-supported 2:4 structure and its kernels use sparse Tensor Cores, the 180 TOPS-equivalent workload can fit under the 275 TOPS sparse INT8 peak. The 20 GB dense weight tensors can shrink to roughly 10 GB for eligible compressed weights, before format metadata and any dense layers. Without supported sparse kernels and compressed storage, the dense 180 TOPS, 20 GB model does not automatically become feasible.
  common_mistake: |
    **The Pitfall:** Treating 2:4 sparsity as an automatic speedup and memory reduction for every model tensor.
    **The Rationale:** Candidates ignore that sparse Tensor Core throughput requires the exact supported sparsity pattern, compatible kernels, and storage formats that actually compress weights.
    **The Consequence:** They size the system against an advertised sparse peak even when dense layers, metadata, or unsupported operators still dominate latency and memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin peak compute (structured sparsity): 275 TOPS.
    - Dense INT8 requirement: 180 TOPS, 20 GB weights.
    - Total RAM: 32 GB.
    - Assume all weight tensors are eligible for 2:4 pruning, sparse kernels are used, and storage is compressed with negligible metadata for a best-case estimate.

    **Calculations:**
    - Sparse throughput feasibility: 180 TOPS-equivalent required < 275 TOPS sparse peak, so the best-case sparse workload fits the advertised compute limit.
    - Sparse weight size best case: 20 GB * 0.5 = 10 GB before sparse-format metadata and non-sparse tensors.
    - Best-case remaining RAM for other tensors and runtime state: 32 GB - 10 GB = 22 GB.

    **Conclusion & Interpretation:**
    - **Result: Conditionally feasible.** With supported 2:4 sparse execution and compressed eligible weights, the workload fits the 275 TOPS sparse peak and the weights are about 10 GB; otherwise the dense 180 TOPS requirement cannot be judged from the sparse peak alone.
