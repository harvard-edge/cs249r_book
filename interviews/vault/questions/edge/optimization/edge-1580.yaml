title: Ampere 2:4 Structured Sparsity on Jetson Orin
scenario: A real-time vision model is deployed on an NVIDIA Jetson Orin featuring an Ampere GPU. A dense INT8 model requires 180 TOPS to meet latency SLAs and its weights occupy 20 GB.
question: Will applying Ampere 2:4 structured sparsity allow the 180 TOPS, 20 GB INT8 model to meet the Orin's limits, and what is the sparse weight size?
details:
  realistic_solution: Applying a 2:4 structured sparsity pattern ensures compatibility with the Ampere GPU's sparse Tensor Cores. This halves the memory footprint of the weight matrices and effectively doubles the math throughput compared to dense execution, allowing the workload to run comfortably.
  common_mistake: |
    **The Pitfall:** Assuming the 275 TOPS specification represents dense compute capacity.
    **The Rationale:** Candidates fail to realize that NVIDIA's peak advertised TOPS on Ampere architectures require a strict 2:4 sparsity pattern to achieve.
    **The Consequence:** Attempting to run a 180 TOPS dense model on a chip that only supports 137.5 dense TOPS results in severely missed latency SLAs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin peak compute (structured sparsity): 275 TOPS.
    - Dense INT8 requirement: 180 TOPS, 20 GB weights.
    - Total RAM: 32 GB.

    **Calculations:**
    - Dense Capacity Limit: 275 TOPS / 2 = 137.5 Dense TOPS.
    - Dense Feasibility Check: 180 TOPS required > 137.5 available (fails SLA).
    - Sparsity Math: 2:4 structured sparsity halves the TOPS requirement to 90 Sparse TOPS.
    - Sparse Weight Size: 20 GB * 0.5 = 10 GB.
    - Remaining RAM: 32 GB - 10 GB = 22 GB.

    **Conclusion & Interpretation:**
    - **Result: 10 GB sparse weight size, leaving 22 GB RAM. Workload fits SLA when 2:4 sparse (Compute/Memory-Feasible).**
