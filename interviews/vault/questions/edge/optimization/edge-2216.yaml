title: Exporting a model with custom autograd to TensorRT for Jetson Orin deployment
scenario: You have trained a 50M parameter object detection model on H100 with a custom non-maximum suppression (NMS) operation implemented as a torch.autograd.Function. You need to deploy it to Jetson AGX Orin. TensorRT export via torch.onnx.export fails because the custom autograd function has no ONNX equivalent.
question: "How do you resolve the ONNX export failure for the custom autograd NMS, and what is the theoretical compute-bound latency for this 4 GFLOP model on Orin's 275 TOPS engine?"
details:
  realistic_solution: To resolve the export failure, you must define a custom ONNX symbolic function using `@staticmethod def symbolic(g, ...)` within your `torch.autograd.Function`. The exporter only traces the forward pass, so mapping the custom NMS to standard ONNX operators in the symbolic method allows the graph to compile.
  common_mistake: |
    **The Pitfall:** Trying to export the custom autograd function directly to ONNX without a symbolic function, and mixing up TOPS and GOPS.
    **The Rationale:** Engineers forget that ONNX export only traces the forward pass and requires explicit symbolic (forward-only) registration, and incorrectly use GOPS instead of TOPS for latency calculation.
    **The Consequence:** The model fails to compile for TensorRT, and performance predictions are off by three orders of magnitude.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Jetson Orin: 275 TOPS INT8.
       - Model: 4 GFLOPs.
    2. **Calculations:**
       - 4 GFLOPs = 4 * 10^9 operations.
       - 275 TOPS = 275 * 10^12 operations/second.
       - Inference time = (4 * 10^9) / (275 * 10^12) = 1.4545 * 10^-5 seconds = 0.0145 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 0.0145 ms** (Compute-Bound theoretical limit).
