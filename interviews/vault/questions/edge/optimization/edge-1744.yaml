title: Fused Attention Optimization on Qualcomm Cloud AI 100
scenario: You are deploying a real-time vision transformer on an on-premise server using a Qualcomm Cloud AI 100 accelerator to process multiple camera streams. Profiling shows the pipeline is memory-bound during the attention mechanism's softmax and point-wise operations.
question: What fused attention strategy would you use on Cloud AI 100 to remove LPDDR4x round-trips, and how much bandwidth would it save?
details:
  realistic_solution: Use the Cloud AI 100 compiler/runtime path to fuse the attention score, masking, softmax, and value-projection steps into tiled on-chip execution rather than materializing the full attention matrix in LPDDR4x. The implementation should choose sequence tiles that fit the accelerator's local memory, stream Q/K/V blocks through the fused kernel, and write only the final attention output back to external memory.
  common_mistake: |
    **The Pitfall:** Proposing generic kernel fusion without calculating SRAM capacity.
    **The Rationale:** Candidates suggest fusion but ignore the hardware's specific SRAM constraints and fail to quantify the memory traffic reduction.
    **The Consequence:** The fused block exceeds local-memory capacity, forcing compiler-managed intermediate buffers in external memory and nullifying power and latency benefits.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sequence length N=1024, head dim d=64.
    - INT8 precision (1 byte/element).
    - 12 heads at 30 FPS across 10 concurrent streams.

    **Calculations:**
    - Materialized attention scores per head: 1024 * 1024 * 1 byte = 1 MB.
    - A conservative unfused implementation writes scores once and reads them for softmax/value application: 2 MB per head of avoidable LPDDR4x traffic.
    - Avoidable bandwidth = 2 MB/head * 12 heads * 30 FPS * 10 streams = 7,200 MB/s = 7.2 GB/s.

    **Conclusion & Interpretation:**
    - **Result: up to 7.2 GB/s saved for the stated unfused score-matrix traffic (Memory-Bandwidth Bound)**. The exact savings depends on tensor layout and compiler tiling, but avoiding materialized attention scores is the defensible target.
