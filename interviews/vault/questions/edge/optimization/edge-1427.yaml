title: SRAM Spilling in Fused Operators on Cloud AI 100
scenario: You are analyzing a compiled INT8 model on a Qualcomm Cloud AI 100 (400 TOPS INT8, 32 GB LPDDR4x at 136 GB/s, 75W). A compiler pass fuses a Convolution and a large GeLU activation. Before fusion, the operations executed sequentially with a combined latency of 120 microseconds. After fusion, kernel launch overhead is reduced by 5 microseconds, but the fused operator exceeds the local SRAM capacity, forcing an additional 4 MB of intermediate data to be spilled to and read from the LPDDR4x memory.
question: Why does fusing the convolution and GeLU make latency worse, what spill overhead does the 4MB SRAM spill add, and what is the net latency regression after the 5 microsecond launch saving?
details:
  realistic_solution: While fusion saves kernel launch overhead, the excessively large fused operator exhausts the on-chip SRAM, forcing intermediate activation data to spill to LPDDR4x and then be read back. The write-plus-read traffic adds 58.8 microseconds of memory time, which exceeds the 5 microseconds saved from launch overhead and produces a net latency regression of 53.8 microseconds. The fused operator therefore takes about 173.8 microseconds total, and the compiler should restrict fusion based on peak on-chip SRAM capacity.
  common_mistake: |
    **The Pitfall:** Candidates often assume operator fusion is universally beneficial because it reduces kernel launch overhead and typically improves data locality.
    **The Rationale:** They fail to calculate the actual memory bandwidth penalty incurred when a fused operator's working set exceeds the accelerator's on-chip SRAM capacity.
    **The Consequence:** This leads to latency regressions as the fused operator exhausts on-chip SRAM, triggering costly intermediate activation spills to LPDDR4x.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4 MB intermediate data spilled.
    - LPDDR4x bandwidth: 136 GB/s.

    **Calculations:**
    - SRAM Spill Penalty = (4 MB write + 4 MB read) / 136 GB/s.
    - 8 MB / 136,000 MB/s = 0.0000588 seconds, or 58.8 microseconds.
    - Net latency change = -5 us (launch overhead saved) + 58.8 us (spill penalty) = +53.8 microseconds.

    **Conclusion & Interpretation:**
    - **Result: 58.8us spill overhead and +53.8us net regression (SRAM-Bound)**. The fused operator takes 173.8 microseconds total, making it slower than the 120 microsecond unfused baseline due to activation spilling from on-chip SRAM to LPDDR4x.
