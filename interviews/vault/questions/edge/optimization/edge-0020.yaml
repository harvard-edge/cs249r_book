title: 'The TensorRT vs ONNX Runtime'
scenario: 'Your fleet of 5,000 delivery robots runs on Jetson Orin NX. You currently use TensorRT, which gives 2.5× faster inference than ONNX Runtime. But your ML team ships model updates weekly, and each TensorRT engine compilation takes 25 minutes per device. Your fleet manager complains that model updates take 3 days to roll out because devices compile sequentially during overnight idle windows.'
question: 'Should you switch to ONNX Runtime for faster deployment, or is there a better approach?'
details:
  realistic_solution: 'Don''t switch to ONNX Runtime — pre-compile TensorRT engines in the cloud. Build a CI/CD pipeline that compiles TensorRT engines for the exact Orin NX GPU architecture in a cloud build farm, then distribute the pre-built binaries via OTA. Compilation: 25 min once in the cloud. Distribution: 5000 devices x 45MB engine / 50 concurrent downloads = ~5 hours. Total: 5.4 hours vs 41.7 hours. You keep TensorRT''s 2.5x speed advantage (30 FPS vs 12 FPS) while solving the deployment bottleneck. ONNX Runtime is only acceptable if 12 FPS meets your safety minimum, which it likely does not for a delivery robot.'
  common_mistake: '"TensorRT is always the right choice because it''s faster" or "Switch to ONNX Runtime because deployment speed matters more." Both miss the nuance of fleet-scale deployment.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet: 5,000 Jetson Orin NX devices.
    - TensorRT Engine compilation: 25 min/device.
    - Concurrent downloads/compiles: 50.
    - Engine size: 45MB.

    **Calculations:**
    - On-device compilation time: (25 min * 5,000 devices) / 50 concurrent = 2,500 min = 41.7 hours.
    - Pre-compiled engine approach: 25 min (cloud compile once) + (5,000 * 45MB over 5 hours distribution) = ~5.4 hours total.
    - Inference performance: TensorRT (30 FPS) vs ONNX Runtime (12 FPS).

    **Conclusion & Interpretation:**
    - **Result: 5.4 hours deployment time (Deployment-Bound)**. Pre-compiling TensorRT engines in the cloud solves the update bottleneck while retaining the 2.5x inference speedup crucial for safety.
