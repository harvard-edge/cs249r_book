title: The Fusion Priority Inversion
scenario: 'You are optimizing a multi-task perception system on a Jetson AGX Orin for an autonomous vehicle. The system runs two models concurrently on separate, prioritized CUDA streams: a high-priority PedestrianDetector (20ms deadline) and a low-priority SignClassifier (100ms deadline). To reduce kernel launch overhead, your team fuses their identical YOLO-style backbones into a single kernel, leaving the heads separate. Post-deployment profiling shows average latency dropped by 5%. However, the PedestrianDetector is now missing its 20ms deadline in 1% of frames.'
question: Why would operator fusion that improved average performance cause a catastrophic failure in the system's P99 latency?
details:
  realistic_solution: 'This is a classic **Priority Inversion** failure in a real-time system, created by the operator fusion. Before fusion, the device''s scheduler could ensure the high-priority `PedestrianDetector` stream preempted or ran ahead of the low-priority `SignClassifier` stream, guaranteeing its deadline. By creating a single, monolithic, non-preemptible fused kernel, you destroyed this fine-grained scheduling. In the P99 worst-case scenario, the low-priority stream gets scheduled first and launches the giant fused kernel. The high-priority stream, even with its camera frame ready, is now blocked. It must wait for the *entire* fused kernel to complete its run for the low-priority task before it can even begin its own work. The optimization saved microseconds on kernel launch overhead on average, but introduced tens of milliseconds of blocking latency at the tail, violating the safety-critical deadline.'
  common_mistake: |
    **The Pitfall:** Blaming L2 cache misses or register spilling.
    **The Rationale:** Candidates assume large kernels degrade performance due to memory bottlenecks.
    **The Consequence:** They miss the systemic scheduling conflict causing priority inversion, which affects the tail (P99) latency without hurting average latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - PedDetector Compute Time is 3.6ms.
    - SignClassifier Compute Time is 14.6ms.
    - Operator fusion creates a monolithic non-preemptible kernel.

    **Calculations:**
    - Fused Execution compiles into a 14.6ms non-preemptible kernel.
    - Priority Inversion Delay occurs when low-priority schedules first at t=0, blocking high-priority arriving at t=1ms.
    - Total Pedestrian Latency is 14.6ms (wait) + 3.6ms (compute) = 18.2ms.

    **Conclusion & Interpretation:**
    - **Result: 18.2ms (Latency-Bound)**. 18.2ms is dangerously close to the 20ms deadline, causing intermittent drops in P99 latency.
