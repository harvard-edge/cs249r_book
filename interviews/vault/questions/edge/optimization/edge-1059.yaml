title: 'Kernel Fusion: Mastery — Optimize Inference Latency for Real-Time Edge Vision'
scenario: You need to achieve 30 fps YOLOv8-nano (3.2M params, 8.7B FLOPs) on Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) while staying under 20W. Current latency is 45ms (22 fps).
question: What is the theoretical INT8 compute time for 8.7B ops on a 275 TOPS Jetson Orin, and what TOPS/GOPS unit mistake should you avoid?
details:
  realistic_solution: 'At 275 TOPS, a model requiring 8.7 GOPS runs in ~0.03ms. The Jetson Orin''s 275 TOPS INT8 is 275x10^12 ops/s, not 275x10^9.'
  common_mistake: |
    **The Pitfall:** Confusing TOPS (Trillions) with GOPS (Billions) when calculating theoretical limits.
    **The Rationale:** Candidates mistakenly calculate 8.7B / 275 and output 31.6ms instead of 0.0316ms.
    **The Consequence:** They believe the GPU is fully utilized at 45ms when it is actually running at less than 0.1% compute efficiency, masking a massive memory bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin Compute is 275 TOPS (Trillion Operations Per Second).
    - Model Requirement is 8.7B OPS (Billion Operations).

    **Calculations:**
    - Orin Performance is 275 * 10^12 OPS.
    - Model Requirement is 8.7 * 10^9 OPS.
    - Theoretical Inference Time is (8.7 * 10^9) / (275 * 10^12) = 0.0000316 seconds.

    **Conclusion & Interpretation:**
    - **Result: 0.0316 ms (Compute-Bound)**. Calculating 31.6 ms incorrectly assumes the system only has 275 GOPS, an error that masks memory bottlenecks.
