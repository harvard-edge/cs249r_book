title: Jetson Orin INT8 Compute Time for YOLOv8-Nano
scenario: You need to achieve 30 fps YOLOv8-nano (3.2M params, 8.7B FLOPs) on Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) while staying under 20W. Current latency is 45ms (22 fps).
question: What is the theoretical INT8 compute time for 8.7B ops on a 275 TOPS Jetson Orin, and what TOPS/GOPS unit mistake should you avoid?
details:
  realistic_solution: At 275 TOPS, treating the model's 8.7B FLOPs as 8.7B INT8 ops-equivalent gives a theoretical peak compute lower bound of about 0.0316 ms. The Jetson Orin's 275 TOPS INT8 is 275x10^12 ops/s, not 275x10^9 ops/s; the unit mistake is treating TOPS as GOPS. This lower bound does not mean the 45 ms end-to-end pipeline is compute-bound or that the 20W target is met; memory traffic, preprocessing, kernel launch overhead, tensor layout, and power mode must be profiled separately.
  common_mistake: |
    **The Pitfall:** Confusing TOPS (Trillions) with GOPS (Billions) when calculating theoretical limits.
    **The Rationale:** Candidates mistakenly calculate 8.7B / 275 and output 31.6ms instead of 0.0316ms.
    **The Consequence:** They believe the GPU is fully utilized at 45ms and miss that the theoretical compute lower bound must be separated from measured end-to-end latency, memory behavior, and power limits.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin INT8 peak is 275 TOPS (trillion operations per second).
    - Model requirement is treated as 8.7B INT8 ops-equivalent for a peak lower-bound calculation.

    **Calculations:**
    - Orin peak = 275 * 10^12 ops/s.
    - Model requirement = 8.7 * 10^9 ops.
    - Theoretical compute lower bound = (8.7 * 10^9) / (275 * 10^12) = 0.0000316 seconds = 0.0316 ms.
    - Measured latency is 45 ms, so the lower bound is only 0.0316 / 45 = 0.07% of measured end-to-end latency.

    **Conclusion & Interpretation:**
    - **Result: 0.0316 ms peak lower bound (Not End-to-End Latency)**. Calculating 31.6 ms incorrectly assumes the system only has 275 GOPS, while the correct lower bound still does not prove that the full pipeline is compute-bound or power-compliant.
