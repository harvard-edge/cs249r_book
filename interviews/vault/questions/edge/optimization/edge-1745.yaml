title: Jetson Orin DLA-GPU CNN-Transformer Distillation
scenario: A heavy vision transformer running at 5 FPS is distilled into a hybrid CNN-Transformer student model to achieve 30 FPS on a Jetson Orin (60W TDP).
question: How would you design feature distillation and size the student CNN-Transformer to hit 30 FPS while using the Orin's Ampere GPU and DLA efficiently?
details:
  realistic_solution: Implement intermediate feature distillation to align the heavy teacher's attention maps with the student's stages. Architecturally, the student must be heavily front-loaded with convolutional blocks designed specifically to compile down to the Orin's Deep Learning Accelerator (DLA). The subsequent lightweight transformer blocks map to the Ampere GPU. The distillation loss forces the DLA-bound CNN features to mimic the rich semantic representations of the teacher, ensuring maximum heterogeneous hardware utilization without accuracy loss.
  common_mistake: |
    **The Pitfall:** Proposing uniform student sizing and logit-only distillation.
    **The Rationale:** Treating the hardware as a monolithic compute pool rather than recognizing the severe limitations of the DLA regarding attention operations.
    **The Consequence:** The model fails to partition cleanly; convolutions spill over onto the GPU, causing resource contention and missing the 30 FPS target.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 30 FPS. Frame time: 33.3 ms.
    - Orin INT8 peak: 275 TOPS, where 1 MAC is commonly counted as 2 ops.
    - Realistic sustained utilization after memory and scheduling overhead: ~35%.

    **Calculations:**
    - Sustained INT8 throughput estimate: 275 TOPS * 0.35 = 96.25 TOPS.
    - Per-frame operation budget at 30 FPS: 96.25 TOPS / 30 = 3.21e12 ops/frame.
    - Convert ops to MACs: 3.21e12 ops/frame / 2 = 1.60 TMACs/frame.
    - Proposed mapping: about 800 GMACs/frame to DLA-friendly CNN blocks and 300 GMACs/frame to Ampere transformer blocks = 1.1 TMACs/frame.

    **Conclusion & Interpretation:**
    - **Result: ~1.1 TMACs/frame student within a ~1.6 TMACs/frame practical budget (Hardware-Mapping Bound)**. The remaining headroom covers preprocessing, transfers, and scheduling variance.
