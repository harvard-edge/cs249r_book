title: Analyzing computational graph overhead for real-time control on Jetson Orin
scenario: You are deploying a neural network controller for a robotic arm on Jetson Orin. The control loop must run at 100Hz (10ms budget per inference). The model (2M params, LSTM-based) currently runs at 8ms in eager mode. After adding online RL fine-tuning (backward pass), total step time is 45ms — 4.5× over budget.
question: What is the compute-bound inference time for a 4M-op controller on a 275 TOPS Orin, and what unit error makes it 14.5 µs?
details:
  realistic_solution: For the forward pass only, 4M ops at 275 TOPS is 4x10^6 / 275x10^12 = 14.5 nanoseconds = 0.0145µs. Reporting 14.5µs is a three-order-of-magnitude unit error, such as treating 275 TOPS as 0.275 GOPS or converting nanoseconds to microseconds incorrectly. RL fine-tuning and backprop overhead are outside this pure compute-bound inference estimate.
  common_mistake: |
    **The Pitfall:** Confusing TOPS with GOPS or confusing nanoseconds with microseconds.
    **The Rationale:** Candidates divide by 275 as if it meant 275 billion ops/sec, or convert seconds to microseconds incorrectly by three orders of magnitude.
    **The Consequence:** They report 14.5 µs instead of 14.5 ns and mistake a unit-conversion error for a real inference bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute Target is 4 Million Ops (4 * 10^6).
    - Orin Performance is 275 TOPS (275 * 10^12).

    **Calculations:**
    - Compute-Bound Time is (4 * 10^6) / (275 * 10^12) = 1.455 * 10^-8 seconds.
    - Time in microseconds is 0.0145 µs (14.5 ns).

    **Conclusion & Interpretation:**
    - **Result: 0.0145 µs = 14.5 ns forward-pass compute time (Compute-Bound).** A 14.5 µs answer is 1000x too large and usually comes from treating TOPS as much smaller throughput or from an incorrect seconds-to-microseconds conversion.
