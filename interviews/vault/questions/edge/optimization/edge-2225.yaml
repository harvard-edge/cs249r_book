title: Analyzing computational graph overhead for real-time control on Jetson Orin
scenario: You are deploying a neural network controller for a robotic arm on Jetson Orin. The control loop must run at 100Hz (10ms budget per inference). The model (2M params, LSTM-based) currently runs at 8ms in eager mode. After adding online RL fine-tuning (backward pass), total step time is 45ms — 4.5× over budget.
question: What is the compute-bound inference time for a 4M-op controller on a 275 TOPS Orin, and what unit error makes it 14.5 µs?
details:
  realistic_solution: '4M ops at 275 TOPS: 4x10^6 / 275x10^12 = 14.5 nanoseconds = 0.0145µs (not 14.5µs — that requires 0.275 GOPS).'
  common_mistake: |
    **The Pitfall:** Running full BPTT inside a strict control loop.
    **The Rationale:** Candidates assume backpropagation scales like inference, ignoring the unrolled sequential overhead of LSTMs.
    **The Consequence:** They completely blow past real-time deadlines because BPTT adds O(T) non-parallelizable overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute Target is 4 Million Ops (4 * 10^6).
    - Orin Performance is 275 TOPS (275 * 10^12).

    **Calculations:**
    - Compute-Bound Time is (4 * 10^6) / (275 * 10^12) = 1.455 * 10^-8 seconds.
    - Time in microseconds is 0.0145 µs (14.5 ns).

    **Conclusion & Interpretation:**
    - **Result: 0.0145 µs (Compute-Bound)**. The 14.5 µs calculation error implies only 275 GOPS capacity, ignoring the BPTT unrolled sequential overhead of LSTMs.
