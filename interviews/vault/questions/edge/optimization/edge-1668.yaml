title: Optimal LLM Operator Scheduling on Qualcomm Cloud AI 100
scenario: You are deploying a 15-billion parameter LLM quantized to INT8 on a Qualcomm Cloud AI 100 accelerator for high-throughput on-premise inference. The platform provides 32 GB of LPDDR4x memory and delivers an impressive 400 TOPS of INT8 compute within a strict 75W power envelope. You must design a novel operator scheduling architecture and layer fusion strategy that intelligently overlaps memory-bound attention mechanisms with compute-bound dense layers to avoid stalling on the LPDDR4x bandwidth.
question: How would you schedule and fuse operators for a 15B INT8 LLM on Cloud AI 100 to overlap attention memory traffic with dense compute?
details:
  realistic_solution: Design a dynamically interleaved execution schedule that employs aggressive horizontal fusion for QKV projections and temporal pipelining across multiple request streams. The schedule pins the 15 GB of INT8 weights in memory and maximizes weight reuse by batching. By explicitly scheduling compute-heavy matrix multiplications concurrently with memory-bound KV-cache fetches and softmax reductions from different requests, the system can mask the memory latency and keep the INT8 compute engines saturated.
  common_mistake: |
    **The Pitfall:** Defaulting to sequential execution without hardware-aware interleaving.
    **The Rationale:** Candidates often propose basic vertical layer fusion without accounting for the extreme arithmetic intensity required by 400 TOPS over standard LPDDR4x.
    **The Consequence:** The schedule fails to overlap memory-bound operations with compute-bound operations, leading to severe underutilization and bandwidth starvation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory Budget: 15B INT8 model = 15 GB. LPDDR4x remaining = 17 GB for activations/KV-cache.
    - Illustrative KV-cache estimate: assume each live token consumes 256 KB across all layers/heads after INT8 cache storage.
    - Memory bandwidth assumption: 68 GB/s LPDDR4x.

    **Calculations:**
    - KV-cache capacity under the illustrative assumption: 17 GB / 256 KB per token = ~66,400 live tokens before allocator and activation overhead.
    - Required arithmetic intensity to saturate 400 TOPS from 68 GB/s = 400e12 ops/s / 68e9 bytes/s = ~5,882 ops/byte.
    - If one MAC is counted as 2 ops, the same threshold is ~2,941 MACs/byte.
    - Attention/KV-cache reads usually have much lower reuse than dense weight-stationary GEMMs, so they should be scheduled beside compute-heavy dense layers from other requests.

    **Conclusion & Interpretation:**
    - **Result: ~5,882 ops/byte Peak-Saturation Threshold (Memory-Bandwidth Bound)**. The numeric KV-cache capacity is illustrative; the scheduling requirement is to interleave memory-bound attention with dense compute and tune batch size to available cache memory.
