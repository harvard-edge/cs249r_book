title: Optimal LLM Operator Scheduling on Qualcomm Cloud AI 100
scenario: You are deploying a 15-billion parameter LLM quantized to INT8 on a Qualcomm Cloud AI 100 accelerator for high-throughput on-premise inference. The platform provides 32 GB of LPDDR4x memory and delivers an impressive 400 TOPS of INT8 compute within a strict 75W power envelope. You must design a novel operator scheduling architecture and layer fusion strategy that intelligently overlaps memory-bound attention mechanisms with compute-bound dense layers to avoid stalling on the LPDDR4x bandwidth.
question: How would you schedule a 15B INT8 LLM on Cloud AI 100 to reuse weights and hide KV-cache traffic within 32 GB LPDDR4x?
details:
  realistic_solution: Use a weight-stationary, request-interleaved decode schedule rather than a purely layer-by-layer schedule. Fuse QKV projection, bias/scale, dequantization, and adjacent pointwise work where the compiler supports it, batch tokens from requests using the same resident layer weights, and double-buffer KV-cache reads so memory-bound attention for one request overlaps compute-heavy GEMM work from another. Treat the 15 GB INT8 weight footprint as an approximate capacity-planning number; keep only the working set, KV cache, activations, and runtime buffers within the 32 GB LPDDR4x budget, and tune batch size or context admission when profiling shows bandwidth stalls.
  common_mistake: |
    **The Pitfall:** Defaulting to sequential execution without hardware-aware interleaving.
    **The Rationale:** Candidates often propose basic vertical layer fusion without accounting for the extreme arithmetic intensity required by 400 TOPS over standard LPDDR4x.
    **The Consequence:** The schedule fails to overlap memory-bound operations with compute-bound operations, leading to severe underutilization and bandwidth starvation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory budget: 15B INT8 model weights are roughly 15 GB before scales, alignment, and runtime metadata.
    - LPDDR4x capacity: 32 GB total, so usable KV-cache/activation space is less than 17 GB after runtime overhead.
    - Illustrative KV-cache estimate: assume each live token consumes 256 KB across all layers/heads after INT8 cache storage.
    - Memory bandwidth assumption: 68 GB/s LPDDR4x.

    **Calculations:**
    - Illustrative upper-bound KV-cache capacity before overhead: 17 GB / 256 KB per token = ~66,400 live tokens.
    - A production admission limit should be below that upper bound because metadata, activation buffers, and compiler workspaces also consume LPDDR4x.
    - Required arithmetic intensity to saturate 400 TOPS from 68 GB/s = 400e12 ops/s / 68e9 bytes/s = ~5,882 ops/byte.
    - If one MAC is counted as 2 ops, the same threshold is ~2,941 MACs/byte.
    - Attention/KV-cache reads usually have much lower reuse than dense weight-stationary GEMMs, so schedule KV reads/softmax for one stream beside dense projections or MLP GEMMs from another stream.

    **Conclusion & Interpretation:**
    - **Result: Weight-Stationary Interleaving Under a Memory Cap**. The ~5,882 ops/byte threshold explains why attention cannot run as an isolated bandwidth-bound phase; the practical design fuses pointwise/QKV work, reuses resident weights across token batches, overlaps KV-cache traffic with dense compute, and enforces context admission below the measured LPDDR4x capacity.
