title: 'Jetson Orin Deployment: Compiler Optimization for Real-time Inference'
scenario: You are deploying a custom LLM on an edge accelerator. Despite INT8 quantization, initial inference latency hovers around 200ms per token, and the system hits its power limit, leading to thermal throttling. You suspect the deployment relies heavily on a generic JIT compilation pipeline.
question: How would you investigate and improve the graph compilation pipeline to reduce 200ms/token latency and mitigate throttling?
details:
  realistic_solution: 'The candidate should propose leveraging NVIDIA''s TensorRT for AOT compilation specifically targeting the Jetson Orin''s architecture. This involves: 1) Operator Lowering: Identifying generic operations that can be mapped to highly optimized, device-specific kernels (e.g., custom CUDA kernels or TensorRT layers) that exploit INT8 capabilities more effectively than default implementations. 2) Constant Folding: Analyzing the model graph to pre-compute and collapse static operations (e.g., batch normalization folding into convolutions, static activation parameters) during the AOT compilation phase, reducing runtime computation. 3) Graph Fusions and Reordering: Utilizing TensorRT''s capabilities to fuse multiple operations into single, more efficient kernels and reorder operations for better data locality and parallelism on the Orin''s GPU. 4) Memory Optimization: AOT compilation often leads to reduced memory footprint and more efficient memory access patterns, critical given the 32GB LPDDR5, alleviating pressure and mitigating thermal throttling.'
  common_mistake: |
    **The Pitfall:** Relying solely on framework JIT compilers for edge deployments.
    **The Rationale:** Candidates assume generic PyTorch/TensorFlow graph executors are optimal, missing platform-specific AOT compilation benefits (e.g., TensorRT).
    **The Consequence:** Severe CPU overhead, unoptimized memory access patterns, and thermal throttling due to inefficient kernel execution.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak Compute: 275 TOPS (INT8). Operation load: 100 GOPS per critical layer.
    2. **Calculations:**
       - Theoretical min execution: (100 * 10^9) / (275 * 10^12) = 0.36 ms.
       - Observed latency (e.g., 50ms) is >100x theoretical minimum.
    3. **Conclusion & Interpretation:**
       - **Result: Framework Overhead Bottleneck.** The vast gap between theoretical (0.36ms) and actual execution indicates massive graph scheduling and memory access overhead requiring AOT compilation.
