title: 'Kernel Fusion: Design Efficient Inference Kernel for MobileNet on Jetson Orin'
scenario: 'You are designing an inference kernel for MobileNetV3-Large on an edge device. The network has many Depthwise Separable Convolutions followed by BatchNorm and Relu6.'
question: 'What is the activation size of a 112x112x16 depthwise-conv output in float32, and why is 6.4MB wrong?'
details:
  realistic_solution: 'Depthwise conv output activations for MobileNetV2 first layer (112x112x16 in float32): 112 x 112 x 16 x 4B = 803KB. 6.4MB would require 8x more channels or dtype. Confirm fusion via nsys profiling.'
  common_mistake: |
    **The Pitfall:** Confusing training vs inference fusion requirements.
    **The Rationale:** Candidates forget that fusing DWConv + BN requires BN to be in inference mode (scale/bias pre-computed).
    **The Consequence:** Incorrect memory and throughput estimates for deployment.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input: 112 x 112 x 16.
    - DW kernel: 3 x 3.

    **Calculations:**
    - DWConv output = 112 x 112 x 16 (same channels).
    - Activation size: 112 x 112 x 16 x 4 Bytes = 802,816 bytes.

    **Conclusion & Interpretation:**
    - **Result: ~802.8 KB (Memory-Bound)**. Correct size is 802.8 KB, avoiding massive memory overestimation.
