title: The Autonomous 'Cloud-to-Edge' VLM Deployment
scenario: You are the Lead ML Systems Engineer for the autonomous driving unit at a major automaker. Your company has just trained a groundbreaking 100B-parameter, multi-modal Vision-Language Model (VLM) in the cloud. This 'Driver-VLM' achieves state-of-the-art hazard prediction by processing sensor streams and generating descriptive text of potential dangers. However, you need to deploy this VLM on the vehicle's embedded compute platform, which has only 16 GB of shared memory and a strict 50ms latency budget.
question: How should you deploy a 100B-parameter VLM on a 16 GB edge platform when 50ms covers the full hazard response?
details:
  realistic_solution: |
    The full 100B model cannot be deployed directly on the 16 GB edge platform. Use it as a cloud teacher and deploy a much smaller student on the vehicle: typically hundreds of millions of parameters for a strict 50ms safety path, or at most low single-digit billions only if measured latency and memory leave enough margin. Quantize the student to INT8 or FP8, add structured pruning only where it maps to the accelerator, and cap generation to a fixed short hazard response.

    The edge model should produce the safety-critical hazard output locally; the 100B model can support offline labeling, distillation, or non-real-time cloud summaries. Treat the 50ms budget as end-to-end for visual encoding plus all generated tokens, so autoregressive text must be short or replaced with a fixed-class/structured hazard head.
  common_mistake: |
    **The Pitfall:** Proposing a linear, naive application of tools like unstructured pruning or TensorRT on the 100B model.
    **The Rationale:** Candidates assume compilers or pruning can mathematically solve a 10,000x model size gap, and they focus only on single-pass latency, failing to budget for sequential token generation.
    **The Consequence:** The deployment is computationally infeasible, and the autoregressive token generation blows past the 50ms latency budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100B parameters in FP16.
    - Edge platform has 16 GB shared memory.
    - 50ms budget covers the full hazard response, including visual encoding and up to 8 generated tokens.

    **Calculations:**
    - 100B FP16 weights = 100B * 2 bytes = ~200 GB, which exceeds 16 GB by 12.5x before activations, KV cache, image tensors, and runtime workspace.
    - If the response uses 8 autoregressive tokens, the average budget is 50ms / 8 = 6.25ms per token only if visual encoding and pre/post-processing were free; in reality the per-token budget is smaller.
    - A 500M INT8 student has about 500 MB of weights; a 1B INT8 student has about 1 GB. That range is plausible for memory capacity, but latency still must be measured because each generated token reruns decoder work.

    **Conclusion & Interpretation:**
    - **Result: direct deployment is infeasible.** Distill the 100B teacher into a compact INT8/FP8 edge student, keep generation bounded or use a structured hazard head, and choose the final student size from measured end-to-end latency rather than claiming one exact parameter count is optimal.
