title: 'Kernel Fusion: Evaluate ONNX Runtime vs TensorRT Fusion on Jetson Orin'
scenario: You are evaluating ONNX Runtime (with CUDA EP) vs TensorRT for deploying a ResNet-50 on Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W). Both support kernel fusion, but TensorRT has more aggressive fusion.
question: How do ONNX Runtime with CUDA EP and TensorRT compare for ResNet-50 on Jetson Orin in latency, throughput, and power efficiency?
details:
  realistic_solution: TensorRT performs more aggressive layer fusion, including Conv+BN+ReLU, reshape elimination, and plugin-based custom fusions. ONNX Runtime with CUDA EP does basic fusion but less aggressively. Typical gap is 20-40% for CNNs on Jetson. Evaluating throughput/watt under the 60W budget is critical.
  common_mistake: |
    **The Pitfall:** Assuming TensorRT always wins without quantifying the fusion difference.
    **The Rationale:** Candidates often fail to measure power efficiency (throughput/watt) and ignore the actual memory bandwidth savings from fusion.
    **The Consequence:** Deploying suboptimal models without understanding if the system is compute or memory bound.
  napkin_math: |
    **Assumptions & Constraints:**
    - ResNet-50: 4.1B FLOPs, 25M params, input 224x224x3.
    - Jetson Orin 32GB class device: 275 TOPS INT8 peak, roughly 200 GB/s-class LPDDR5 bandwidth, 60W TDP.
    - Peak TOPS is a ceiling; sustained latency depends on TensorRT/ORT fusion, precision, memory locality, launch overhead, and utilization.

    **Calculations:**
    - Throughput lower bound if all 4.1B operations mapped perfectly to peak INT8: 4.1e9 / 275e12 = 0.015ms. This is not an expected end-to-end latency.
    - If sustained utilization is 10-30% of peak, compute-only time is about 0.05-0.15ms before memory movement, scheduling, preprocessing, and framework overhead.
    - INT8 weights are about 25MB, but activations and intermediates can be read/written multiple times. Fusion reduces these intermediate DRAM trips; the exact savings must be measured with profiler counters rather than inferred from parameter size alone.
    - A defensible comparison reports measured latency and power under the same clocks/batch/precision, then attributes the gap to observed kernel count, DRAM bytes, and achieved occupancy.

    **Conclusion & Interpretation:**
    - **Result: TensorRT is expected to win, but measure it (Fusion/Memory-Bound)**. The answer should claim a qualitative 20-40% CNN deployment advantage only after profiling; unsupported exact FPS, fused-block counts, and transfer savings should not be presented as derived facts.
