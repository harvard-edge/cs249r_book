title: 'Kernel Fusion: Evaluate ONNX Runtime vs TensorRT Fusion on Jetson Orin'
scenario: 'You are evaluating ONNX Runtime (with CUDA EP) vs TensorRT for deploying a ResNet-50 on Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W). Both support kernel fusion, but TensorRT has more aggressive fusion.'
question: 'How do ONNX Runtime with CUDA EP and TensorRT compare for ResNet-50 on Jetson Orin in latency, throughput, and power efficiency?'
details:
  realistic_solution: 'TensorRT performs more aggressive layer fusion, including Conv+BN+ReLU, reshape elimination, and plugin-based custom fusions. ONNX Runtime with CUDA EP does basic fusion but less aggressively. Typical gap is 20-40% for CNNs on Jetson.'
  common_mistake: 'Assuming TensorRT always wins without quantifying the fusion difference; not measuring power efficiency (throughput/watt).'
  napkin_math: |
    **Assumptions & Constraints:**
    - ResNet-50: 4.1B FLOPs, 25M params, input 224x224x3.
    - Jetson Orin: 275 TOPS INT8, 68 GB/s memory bandwidth.

    **Calculations:**
    - Theoretical compute latency: 4.1B INT8 OPS / 275 TOPS = 0.015ms.
    - Model INT8 size: 25M params = 25MB.
    - Memory bandwidth needed per inference: 25MB weights + 50MB activations = 75MB.
    - Memory transfer time: 75MB / 68 GB/s = 1.1ms.
    - Measured latency/throughput: TRT ~2ms (500 FPS), ORT ~2.8ms (357 FPS).
    - Power efficiency: TRT (500/15 = 33.3 FPS/W), ORT (357/15 = 23.8 FPS/W).
    - TRT fuses 18 blocks vs ORT ~12; 6 extra fused blocks save 24MB memory transfers (0.35ms).

    **Conclusion & Interpretation:**
    - **Result: TRT wins by 40% (Memory-Bound)**. TRT's aggressive kernel fusion minimizes expensive DRAM read/writes, dominating latency on edge SoCs.
