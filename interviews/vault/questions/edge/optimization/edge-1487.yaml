title: Architecting Structured Sparsity on Jetson Orin
scenario: You are deploying a 15-billion parameter sensor fusion model on an edge accelerator for an autonomous ground vehicle. The system currently misses its 20 FPS target due to memory bandwidth and compute bottlenecks. The research team proposes using magnitude-based unstructured pruning to achieve 80% sparsity.
question: Would you use 80% unstructured pruning for this edge model, and what hardware-aware sparsity strategy would you deploy?
details:
  realistic_solution: Reject 80% unstructured pruning as the primary deployment strategy because the irregular sparsity pattern is unlikely to be accelerated efficiently on this hardware. Prefer a hardware-supported structured pattern such as 2:4 sparsity for layers that can be retrained and exported in that format, while leaving unsupported or accuracy-sensitive layers dense. The deployment decision should be based on compiler/operator support and measured accuracy, not just parameter-count reduction.
  common_mistake: |
    **The Pitfall:** Accepting unstructured sparsity for hardware acceleration.
    **The Rationale:** Candidates fail to realize that modern GPUs and DLAs cannot accelerate unstructured sparsity efficiently due to irregular memory access patterns.
    **The Consequence:** No actual inference speedup is realized, and memory bandwidth remains bottlenecked despite the theoretical reduction in parameters.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target hardware bandwidth: ~204 GB/s.
    - Model: 15B parameter model (INT8 format) running at 20 FPS.
    - Hardware-supported structured option: 2:4 sparsity, which removes 50% of weights in eligible layers.

    **Calculations:**
    - Dense upper-bound weight traffic: 15B INT8 parameters = 15 GB per full model pass.
    - Dense upper-bound bandwidth at 20 FPS: 15 GB * 20 = 300 GB/s.
    - 2:4 structured sparsity on eligible weights: 15 GB * 50% = 7.5 GB.
    - Sparse upper-bound bandwidth at 20 FPS: 7.5 GB * 20 = 150 GB/s.
    - 80% unstructured pruning would reduce parameter count more on paper, but it does not provide the same regular pattern for hardware scheduling.

    **Conclusion & Interpretation:**
    - **Result: Prefer supported structured sparsity.** A 2:4 plan can cut eligible weight traffic from a 300 GB/s upper bound to about 150 GB/s, while 80% unstructured pruning is not a reliable accelerator speedup unless the compiler and kernels explicitly support it.
