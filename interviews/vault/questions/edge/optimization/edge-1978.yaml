title: Diagnosing Coral Edge TPU Graph Compilation & Performance Issues
scenario: You are deploying a large vision model to a Google Coral Edge TPU. The model was trained and quantized to INT8 using TensorFlow Lite. During compilation, the edgetpu_compiler fails with errors like Unsupported custom op or Node operation not supported, and 30-40% of the graph cannot be offloaded. For compiled parts, inference latency is high, showing CPU fallback.
question: Why is the INT8 TFLite model failing or falling back on Coral Edge TPU, and how would you fix the graph compilation pipeline?
details:
  realistic_solution: Use edgetpu_compiler logs and TensorFlow Lite profiling to identify unsupported ops and CPU partitions. Refactor or replace incompatible layers, avoid custom ops, keep tensor shapes and quantization parameters compatible with Edge TPU requirements, and use strict INT8 QAT or representative PTQ so the graph does not insert dequantize/requantize fallbacks.
  common_mistake: |
    **The Pitfall:** Immediately assuming the model is too large or quantization was flawed.
    **The Rationale:** Candidates jump to hardware capacity limits without reading compiler error logs or understanding op support.
    **The Consequence:** Blaming hardware without fixing software compilation prevents successful execution.
  napkin_math: |
    **Assumptions & Constraints:**
    - Edge TPU: 4 TOPS (4 * 10^12 Ops/s).
    - Model: 1.3B MACs, counted as 2.6B INT8 ops for this estimate.
    - 60% of ops compile to TPU; 40% fall back to CPU.
    - CPU fallback is modeled as 1000x lower effective INT8 throughput than the TPU, with serialized partitions.

    **Calculations:**
    - TPU effective throughput: 4 * 10^12 ops/s.
    - CPU fallback throughput assumption: 4 * 10^12 / 1000 = 4 * 10^9 ops/s.
    - TPU partition time: (0.60 * 2.6B) / 4e12 = 0.39 ms.
    - CPU partition time: (0.40 * 2.6B) / 4e9 = 260 ms.
    - Estimated serialized latency before partition overhead: about 260.4 ms.

    **Conclusion & Interpretation:**
    - **Result: CPU-fallback latency dominates.** Even a small unsupported fraction can erase Edge TPU gains, so the fix is to compile the whole hot path or redesign unsupported operators.
