title: Ordering Optimizations for a Transformer on a 15W ECU
scenario: You must deploy a multi-modal Transformer model on a passively cooled automotive-grade ECU. The current FP16 model runs on a 60W Orin but is 5x too slow and over-budget on power.
question: What ordered optimization plan would make the 5x-too-slow valet Transformer meet 33ms on a 15W ECU, and why in that order?
details:
  realistic_solution: |
    Start with profiling on the target ECU to separate compute-bound transformer blocks, memory-bound attention/KV movement, and pre/post-processing overhead. Then reduce the model with structured pruning or distillation, because the baseline is 5x too slow and 15W leaves little room for an oversized FP16 graph. After the target graph is stable, apply QAT/INT8 so calibration reflects the final layer shapes and activation ranges. Finish with compiler/operator fusion, static shapes, memory planning, and runtime scheduling to recover launch and data-movement overhead.

    This order keeps accuracy work before low-level compilation, avoids recalibrating a graph that will later be pruned, and ties each step to latency and power measurements rather than assuming one optimization is mandatory.
  common_mistake: |
    **The Pitfall:** Applying optimizations in a suboptimal order (e.g., quantizing before pruning).
    **The Rationale:** Candidates view optimizations as independent modules rather than a dependent pipeline.
    **The Consequence:** Reduced dynamic range ruins structured pruning effectiveness, leading to severe accuracy loss.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline latency: 165ms on 60W. Target latency: 33ms on 15W.
    - Speedup required: 5x.
    - INT8 Quantization speedup: ~2x if the final graph maps well to the ECU.

    **Calculations:**
    - INT8 alone estimate: 165ms / 2 = 82.5ms, which still misses the 33ms target.
    - Remaining latency reduction after INT8 = 82.5 / 33 = 2.5x.
    - A model-size reduction of about 2x from structured pruning or distillation plus INT8 gives 165 / (2 * 2) = 41.25ms, still above target before compiler work.
    - A further 1.25-1.4x from operator fusion, static memory planning, and removing runtime overhead gives 41.25 / 1.3 = 31.7ms.
    - Combined speedup = 2 * 2 * 1.3 = 5.2x, just over the required 5x.

    **Conclusion & Interpretation:**
    - **Result: The plan needs measured profiling, model reduction, QAT/INT8, and compiler fusion.** Quantization is necessary but insufficient; the full ordered sequence is what closes the 5x latency gap within the 15W deployment target.
