title: Optimizing Multi-branch Vision Model Inference on Google Coral Edge TPU
scenario: A Google Coral Edge TPU (4 TOPS INT8, 2W) runs a multi-branch object detector. Initial profiling shows the model is bottlenecked by latency, and peak memory usage is close to the device's limits.
question: How would you optimize operator execution order on the Coral Edge TPU for the multi-branch INT8 detector to reduce latency, memory, and energy?
details:
  realistic_solution: Analyze the computation graph to optimize memory and kernel launches. Use topological sorting to schedule branches that allow early deallocation of large intermediate feature maps. Implement layer fusion (e.g., fusing Conv2D, BatchNorm, and ReLU6 into a single MAC operation) to prevent memory round-trips to SRAM. Parallelize independent subgraphs to saturate the TPU's systolic array and minimize latency.
  common_mistake: |
    **The Pitfall:** Focusing solely on model quantization or pruning without addressing execution graph optimization.
    **The Rationale:** Overlooking data dependencies and memory transfer overheads between non-fused operations.
    **The Consequence:** Failing to reach latency and memory targets despite deploying an INT8 model, due to inefficient memory reuse and kernel launch overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 10 billion INT8 ops (10 GOPS).
    - Coral Edge TPU: 4 TOPS INT8.
    - Unoptimized memory bandwidth: 1 GB/s. Fused bandwidth: 200 MB/s.

    **Calculations:**
    - Theoretical Compute: 10 GOPS / 4 TOPS = 2.5 ms.

    **Conclusion & Interpretation:**
    - **Result: 2.5ms compute (Memory-Bound)**. The 2.5ms compute leaves ample headroom in a standard 33ms budget, meaning memory I/O is the true bottleneck without fusion.
