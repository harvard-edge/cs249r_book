title: Hailo-8 Graph Compilation and Power Efficiency Calculation
scenario: You are deploying a vision model to a Hailo-8 dataflow accelerator. The initial compiled graph requires 20 GOPS per frame and achieves 50% MAC utilization. By implementing kernel fusion and constant folding during ahead-of-time compilation, you reduce the operations to 13 GOPS per frame and improve MAC utilization to 80%.
question: What is the absolute FPS/Watt improvement from reducing the graph to 13 GOPS/frame and raising MAC utilization to 80%?
details:
  realistic_solution: 'Recompiling applies static optimizations yielding both reduced theoretical GOPS and higher hardware utilization. Establish maximum FPS, then divide by peak device wattage to find the strict inferences/Joule improvement.'
  common_mistake: |
    **The Pitfall:** Forgetting to apply the utilization factor to the theoretical peak TOPS before calculating FPS.
    **The Rationale:** Candidates mistakenly apply the operations reduction but forget that hardware utilization independently limits the effective compute available per frame.
    **The Consequence:** Incorrectly calculating absolute FPS and misreporting the system's true power efficiency improvements.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 26 TOPS (26,000 GOPS), 2.5W
    - Unoptimized: 20 GOPS, 50% MAC utilization
    - Optimized: 13 GOPS, 80% MAC utilization

    **Calculations:**
    - Unoptimized FPS = (26,000 * 0.50) / 20 = 650 FPS. Efficiency = 650 / 2.5W = 260 FPS/Watt
    - Optimized FPS = (26,000 * 0.80) / 13 = 1600 FPS. Efficiency = 1600 / 2.5W = 640 FPS/Watt
    - Absolute Improvement = 640 - 260 = 380 FPS/Watt

    **Conclusion & Interpretation:**
    - **Result: 380 FPS/Watt Efficiency Gain.** Absolute improvement.
