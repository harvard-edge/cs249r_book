title: Parallel Operator Scheduling and Energy on AI 100
scenario: You are deploying a transformer-based model on an inference accelerator. You are optimizing the execution order to run multiple independent self-attention heads in parallel. The parallelized operators require a total of 80 Tera-Operations (INT8).
question: At 80% utilization on a 400 TOPS, 75W accelerator, what are the execution time and energy for an 80 TOP INT8 block?
details:
  realistic_solution: 'Efficient operator scheduling parallelizes the attention heads to maintain high utilization of the INT8 MAC units. Divide the required operations by the effective throughput to find latency, then multiply by the TDP to extract the energy footprint.'
  common_mistake: |
    **The Pitfall:** Calculating execution time using theoretical peak compute.
    **The Rationale:** Candidates fail to discount peak compute by the realistic 80% hardware utilization achieved by the scheduler, and often confuse Watts with Joules.
    **The Consequence:** Underestimating latency by 20% and miscalculating thermal budgets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak Compute: 400 TOPS INT8.
       - Utilization: 80%.
       - Required Workload: 80 Tera-Operations.
       - Power limit: 75 Watts.
    2. **Calculations:**
       - Effective Compute = 400 TOPS * 0.80 = 320 TOPS.
       - Execution Time = 80 TOPs / 320 TOPS = 0.25 seconds (250 ms).
       - Energy Consumed = Power * Time = 75 W (Joules/sec) * 0.25 s = 18.75 Joules.
    3. **Conclusion & Interpretation:**
       - **Result: 250ms Latency, 18.75 Joules**. The block finishes in a quarter of a second, demonstrating the direct translation of high utilization into energy efficiency on edge hardware.
