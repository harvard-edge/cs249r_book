title: Evaluating Serialized Asynchronous CUDA Copies on an Edge SoC
scenario: An edge SoC processes radar data using custom CUDA kernels while receiving gigabit ethernet packets. The network thread copies data to pinned host memory, then asynchronously copies it to device memory.
question: Evaluate why the memory copies might still serialize with computation despite using asynchronous CUDA APIs?
details:
  realistic_solution: |
    Pinned host memory only guarantees page-locked host storage for faster DMA or mapping; it does not always mean the CUDA device pointer and host pointer are the same physical allocation. On an edge SoC, `cudaMemcpyAsync` can still serialize if it is issued on the default stream, if later kernels have stream dependencies, if the copy engine and kernels contend for the same LPDDR bandwidth, if transfers are too small to amortize launch overhead, or if unified/managed memory triggers page migration or coherence work.

    The remedy is conditional: use pinned memory and a consistent non-default stream, remove unnecessary synchronizations, profile copy-engine overlap, and benchmark zero-copy or managed-memory access on the specific radar workload before replacing explicit copies.
  common_mistake: |
    **The Pitfall:** Treating the edge SoC like a discrete GPU over PCIe.
    **The Rationale:** Candidates assume there is a separate PCIe bus and dedicated VRAM, leading them to believe that asynchronous DMA transfers happen completely independently of the unified memory controller.
    **The Consequence:** Developers write redundant `cudaMemcpyAsync` calls that degrade performance by unnecessarily moving data within the same physical memory.
  napkin_math: |
    **Assumptions & Constraints:**
       * 1 Gbps ethernet ingestion.
       * SoC LPDDR5 bandwidth is 204.8 GB/s.
    **Calculations:**
       * 1 Gbps = 125 MB/s payload ingestion.
       * 204.8 GB/s = 204,800 MB/s, so 125 MB/s is about 0.061% of peak LPDDR5 bandwidth.
       * Because raw ingress bandwidth is tiny relative to peak memory bandwidth, serialization is more likely caused by stream ordering, dependency chains, managed-memory migration, transfer granularity, or copy-engine/contention limits.
    **Conclusion & Interpretation:**
       * **The serialization is likely synchronization- or dependency-bound, not raw-bandwidth-bound.** Async copies only overlap when stream ordering, copy engines, memory mappings, and transfer sizes allow real concurrency on the target SoC.
