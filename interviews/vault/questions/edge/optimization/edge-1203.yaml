title: FlashAttention on Jetson Orin's Unified Memory
scenario: An edge hardware accelerator has 32GB unified LPDDR5 (102 GB/s) shared between CPU and GPU, with 128KB shared memory per SM. You want to deploy a 7B model with FlashAttention-2 for inference at seq_len=2048. Analyze whether FlashAttention-2 benefits transfer to unified memory architectures lacking HBM.
question: Do FlashAttention's IO savings still matter for a 7B model at seq_len=2048 on unified LPDDR5, and what bottleneck remains?
details:
  realistic_solution: FlashAttention-2 remains critical because unified memory LPDDR5 is extremely slow compared to data center HBM. Saving I/O by keeping attention matrices in SRAM provides massive speedups. However, the constrained SMEM limits block sizes, pushing the workload to become compute-bound rather than memory-bound at larger seq lengths.
  common_mistake: |
    **The Pitfall:** Assuming FlashAttention is unnecessary on unified memory because there is no HBM bottleneck.
    **The Rationale:** Candidates incorrectly assume unified memory inherently solves all I/O bottlenecks.
    **The Consequence:** Missing massive I/O savings; LPDDR5 at 102 GB/s is 33x slower than H100's HBM3, making IO reduction mathematically even more critical.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware limits: 2 TFLOPS compute, 102 GB/s unified memory.
    - Model: 7B params, 32 layers, seq_len=2048, head_dim=128, 32 heads.

    **Calculations:**
    - Standard IO per layer: 2 * 2048^2 * 2B * 32 = 512MB.
    - Standard IO Time: 512MB / 102 GB/s = 5.0ms.
    - Flash IO: 3 * 2048 * 128 * 2B * 32 = 48MB.
    - Flash IO Time: 48MB / 102 GB/s = 0.47ms.
    - Total Savings: 4.53ms * 32 layers = 145ms.
    - Attention FLOPs: 2 * 32 * 2 * 2048^2 * 128 = 1.1 TFLOP.
    - Compute Time: 1.1 TFLOP / 2 TFLOPS = 550ms.

    **Conclusion & Interpretation:**
    - **Result: 550ms (Compute-Bound)**. Flash IO yields a critical 145ms saving, but the limited 2 TFLOPS compute capacity means the system strictly bottlenecked by raw FLOPs (550ms compute time).
