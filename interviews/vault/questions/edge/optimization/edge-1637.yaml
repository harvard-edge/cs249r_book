title: 'Host Round-Trip Latency in Edge TPU Operator Fusion'
scenario: 'You are optimizing a vision pipeline for a USB Edge TPU. An unsupported intermediate activation forces a 4MB feature map to fall back to the host CPU over the USB connection (400 MB/s effective bandwidth).'
question: 'How much USB communication time per inference is saved by fusing the 4 MB fallback activation so it stays on the Edge TPU?'
details:
  realistic_solution: 'By fusing the unsupported activation with surrounding layers into a single supported INT8 block, the 4MB tensor remains completely on-chip. The latency saved is exactly the round-trip USB data transfer time.'
  common_mistake: |
    **The Pitfall:** Calculating compute time saved using peak INT8 TOPS instead of I/O transfer time.
    **The Rationale:** Candidates focus on the TPU's compute power and forget that host fallback incurs massive data transfer penalties.
    **The Consequence:** They drastically underestimate latency savings, missing that USB transfer time is the dominant cost.
  napkin_math: |
    **Assumptions & Constraints:**
    - Intermediate tensor size: 4 MB.
    - Effective USB bandwidth: 400 MB/s.

    **Calculations:**
    - Unfused round-trip data transfer = 4 MB (TPU to Host) + 4 MB (Host to TPU) = 8 MB total.
    - Transfer time saved = 8 MB / 400 MB/s = 0.02 seconds = 20 ms.

    **Conclusion & Interpretation:**
    - **Result: 20 ms (I/O-Bound)**. Fusing the operator saves exactly 20 ms of USB communication time per inference.
