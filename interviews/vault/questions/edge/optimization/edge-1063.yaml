title: 'Kernel Fusion: Realize Fusion Gain Analysis for Transformer on Jetson Orin'
scenario: 'A 6-layer BERT-tiny (4.4M params) inference runs on a Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) with sequence length 128 and batch size 4.'
question: 'For 6-layer BERT-tiny at batch 4 and sequence 128 on Jetson Orin, how do unfused and fused kernels differ in bandwidth needs and speedup?'
details:
  realistic_solution: |
    BERT-tiny with batch=4, seq=128: check arithmetic intensity of each op type to determine if fusion actually helps. Small model means activation tensors are tiny → kernel launch overhead dominates over bandwidth savings.
  common_mistake: |
    **The Pitfall:** Not accounting for the relatively small model size and batch dimension.
    **The Rationale:** Applying large-model intuition (where memory bandwidth always dominates) to a tiny model that easily fits in cache.
    **The Consequence:** Overestimating the bandwidth savings of fusion while ignoring the massive relative impact of kernel launch overhead on tiny layers.
  napkin_math: |
    **Assumptions & Constraints:**
    - 6-layer BERT-tiny on Jetson Orin (275 TOPS INT8, 68 GB/s bandwidth).
    - Batch size 4, Sequence length 128, Dim 128.
    - Elementwise tensors: 4 * 128 * 128 = 65 KB.
    - Kernel launch overhead: 5 µs per launch.

    **Calculations:**
    - Unfused Memory Traffic: 6 layers * 65 KB * 2 * 6 passes = 4.68 MB (0.07 ms transfer).
    - Fused Memory Traffic: 6 layers * 65 KB * 2 passes = 780 KB (0.011 ms transfer).
    - Unfused Launches: 120 launches * 5 µs = 0.60 ms.
    - Fused Launches: 24 launches * 5 µs = 0.12 ms.

    **Conclusion & Interpretation:**
    - **Result: ~29% expected speedup (Kernel-Launch-Bound).** Fusing saves 0.48 ms of launch overhead vs only 0.06 ms of bandwidth, proving the priority is reducing kernel count for tiny models.
