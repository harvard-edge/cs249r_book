title: 'Kernel Fusion: Recall — Why is Kernel Fusion Critical for Jetson Orin?'
scenario: You are comparing operator optimization strategies between a high-end edge SoC and an NVIDIA H100.
question: Why does kernel fusion matter significantly more on an edge SoC than on an H100, and what is the effective memory bandwidth constraint?
details:
  realistic_solution: 'Edge SoC LPDDR5 has ~68 GB/s bandwidth. Ridge point: 275 TOPS (INT8) / 68 GB/s = 4044 OPS/byte. Any operation with arithmetic intensity < 4044 is memory-bound. This is a much higher bar than H100''s ridge point (295 FLOPS/byte), meaning far more operations are memory-bound on Jetson → fusion helps more.'
  common_mistake: |
    **The Pitfall:** Assuming the H100 needs fusion more because it runs larger models.
    **The Rationale:** Candidates focus on absolute model size rather than mathematically calculating the hardware's specific bandwidth-to-compute ratio (ridge point).
    **The Consequence:** Over-optimizing compute instructions on the edge device while ignoring the devastating memory bandwidth bottlenecks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Edge SoC bandwidth: 68 GB/s. Compute: 275 TOPS INT8.
       * H100 bandwidth: 3350 GB/s. Compute: 989 TFLOPS BF16.
    2. **Calculations:**
       * Edge Ridge point = 275e12 OPS / 68e9 Bytes/s = 4,044 OPS/byte.
       * H100 Ridge point = 989e12 FLOPS / 3350e9 Bytes/s = 295 FLOPS/byte.
       * Operations with AI between 295 and 4,044 are compute-bound on H100, but severely memory-bound on the edge SoC.
    3. **Conclusion & Interpretation:**
       * **Kernel fusion is far more critical on the edge because a much wider range of operations falls under the 4,044 OPS/byte memory-bound regime. Result: Memory Bandwidth-Bound.**
