title: The Pruning Paradox
scenario: You structured-pruned 40% of channels from your detection model. FLOPs dropped 40%. But when you benchmark on the Hailo-8, latency only dropped 10%. On the Jetson Orin, it dropped 35%.
question: Why does the same pruning give wildly different speedups on different hardware?
details:
  realistic_solution: 'Edge accelerators have fundamentally different execution models. The Jetson Orin (GPU) executes layers as CUDA kernels; fewer channels = fewer threads = proportional speedup. The Hailo-8 (dataflow) maps the model onto a fixed spatial pipeline with native SIMD widths (e.g., 16). In a representative 64-channel layer, pruning about 40% down to 38 channels still allocates 48 channels because the Hailo compiler rounds up to the next multiple of 16, so only 25% of that layer''s allocated compute disappears. Fix: use hardware-aware pruning that constrains channel counts to multiples of the target hardware''s native SIMD width.'
  common_mistake: |
    **The Pitfall:** Assuming the Hailo compiler isn't optimized for pruned models.
    **The Rationale:** Engineers assume poor performance is a compiler issue rather than a hardware constraint.
    **The Consequence:** Wasting time tweaking compiler flags instead of fixing the underlying architectural SIMD width mismatch.
  napkin_math: |
    **Assumptions & Constraints:**
    - Worked layer example: 64 channels pruned to 38 channels, about a 40% channel-count reduction.
    - Hailo SIMD width = 16.

    **Calculations:**
    - Allocated channels after pruning: ceil(38 / 16) * 16 = 48.
    - Effective compute reduction on Hailo: (64 - 48) / 64 = 25%, not the apparent 40% channel reduction.
    - Hardware-aware pruning to 32 channels: ceil(32 / 16) * 16 = 32 allocated channels, so (64 - 32) / 64 = 50% true allocated-compute reduction.

    **Conclusion & Interpretation:**
    - **Result: 25% Effective Reduction (Compute-Bound)**. Latency improvement scales properly only when pruned channel counts are aligned to native SIMD widths.
