title: Optimizing a Large Language Model for Edge Deployment on NVIDIA Jetson Orin
scenario: You are tasked with deploying a large language model (LLM) for real-time natural language understanding on an NVIDIA Jetson Orin, which features 32 GB LPDDR5 memory, 275 TOPS (INT8) compute capability, and operates within a 60W power envelope. The LLM, initially developed and trained using PyTorch on cloud GPUs, has a significant memory footprint and requires high throughput.
question: How would you optimize the PyTorch LLM for efficient real-time execution on Jetson Orin using AOT compilation and graph-level compiler passes?
details:
  realistic_solution: |
    Export the PyTorch LLM into an AOT-friendly graph, then target a Jetson-supported backend rather than relying on TorchScript alone. A practical path is torch.export or ONNX export followed by TensorRT or TensorRT-LLM engine build with static or bounded shapes, graph fusion, constant folding, dead-code removal, and precision selection such as FP16 weights plus INT8 weight/activation quantization where accuracy allows. Audit unsupported ops before deployment; either replace them, write plugins, or keep explicit fallback outside the real-time path. Profile prefill and decode separately because KV-cache size, LPDDR5 bandwidth, and the 60W power envelope can dominate latency even when the model weights fit.
  common_mistake: |
    **The Pitfall:** Relying solely on basic weight quantization and running directly in PyTorch.
    **The Rationale:** Candidates often underestimate the overhead of a dynamic Python runtime and framework execution on an edge device.
    **The Consequence:** This overlooks deep performance gains achievable through hardware-aware graph compilation (like kernel fusion), leading to excessive memory bandwidth usage and missed real-time deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory: 32 GB LPDDR5.
    - Jetson Orin Compute: 275 TOPS (INT8).
    - Original 10B parameter FP32 model size: 40 GB.
    - Deployment must reserve memory for runtime buffers, activations, and KV cache.

    **Calculations:**
    - INT8 weights reduce the 10B-parameter model from 40GB to about 10GB before scales, metadata, activations, and KV cache.
    - That can fit in 32GB, but memory bandwidth still matters because decode repeatedly streams weights and KV-cache data.
    - Peak 275 TOPS is an upper bound for supported INT8 kernels; unsupported ops, small batches, and memory-bound decode reduce realized throughput.
    - Graph compilation helps by fusing kernels, removing constants/dead code, choosing TensorRT tactics, and avoiding Python/runtime overhead.

    **Conclusion & Interpretation:**
    - **Result: memory- and compiler-bound deployment.** The model may fit after quantization, but meeting real-time latency requires an AOT TensorRT-style engine, supported ops, explicit precision choices, and profiling under the 60W power and KV-cache bandwidth limits.
