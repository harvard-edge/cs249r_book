title: AOT Compilation Strategy for Cloud AI 100
scenario: Your team is deploying a high-throughput video analytics pipeline onto an on-premise server equipped with a Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). The model includes several custom operations not natively supported by the accelerator's compiler.
question: How would you design AOT graph compilation and partitioning so unsupported ops do not cripple Cloud AI 100 INT8 throughput?
details:
  realistic_solution: 'The candidate should specify a multi-stage compilation pipeline: first, perform constant folding and INT8 quantization calibration. Next, implement an operator lowering and graph partitioning pass that identifies subgraphs supported by the Qualcomm AI 100. Critically, the design must cluster unsupported operations to minimize the number of graph breaks (context switches between the host and the accelerator), thereby preserving the high efficiency required within the 75W TDP.'
  common_mistake: |
    **The Pitfall:** Assuming unsupported operations can easily run on the host CPU.
    **The Rationale:** Candidates ignore the severe latency penalty of host-to-accelerator memory transfers across the PCIe bus.
    **The Consequence:** Graph breaks result in massive context switching, leaving the accelerator underutilized.
  napkin_math: |
    **Assumptions & Constraints:**
    - Theoretical Peak is 400 TOPS.
    - Model requires 100 GOPS per frame.
    - Intermediate tensor is 20 MB.
    - PCIe Gen4 bandwidth is ~16 GB/s.

    **Calculations:**
    - Theoretical Peak FPS is 400 TOPS / 100 GOPS per frame = 4,000 FPS.
    - PCIe Transfer time is 20 MB / 16 GB/s = 1.25 ms per frame.
    - Bottleneck Limit is 1 / 0.00125 = 800 FPS.
    - Wasted Capacity is 4000 - 800 = 3200 FPS (80% of capacity).

    **Conclusion & Interpretation:**
    - **Result: 800 FPS (Memory-Bound)**. Graph breaks hard-cap throughput and waste 80% of the 400 TOPS compute capacity.
