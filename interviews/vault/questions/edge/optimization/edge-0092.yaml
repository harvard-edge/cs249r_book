title: The TensorRT Engine Portability Trap
scenario: 'You compiled a TensorRT INT8 engine on your development Jetson AGX Orin. You copy the engine file to a production Jetson Orin NX. Inference crashes immediately despite both sharing the Ampere architecture.'
question: What went wrong with the TensorRT engine migration?
details:
  realistic_solution: 'TensorRT engines embed hardware-specific optimizations (e.g., CUDA core count, SM architecture, DLA presence, memory bandwidth timings) directly into the compiled graph. The AGX Orin has 2048 CUDA cores and 2 DLAs, while the Orin NX has 1024 CUDA cores and different bandwidth constraints. The auto-tuner selects kernels bound to these exact specs. You must deploy an ONNX IR format and use trtexec or the TensorRT runtime to compile the engine natively on the target device during first boot.'
  common_mistake: |
    **The Pitfall:** Assuming the failure is due to the model being too large for the 8 GB Orin NX memory.
    **The Rationale:** Candidates see the memory size difference (64 GB vs 8 GB) and incorrectly assume an Out-Of-Memory (OOM) error.
    **The Consequence:** They miss the fundamental lack of portability of TensorRT engines across different hardware configurations, leading to failed deployments.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Size (ONNX): 12 MB.
    - Compilation Time: 45 seconds on target hardware.
    - Fleet Size: 1000 devices.

    **Calculations:**
    - Sequential Compilation: 1000 * 45s = 12.5 hours.
    - On-Device Concurrent Compilation: 45 seconds total across fleet.

    **Conclusion & Interpretation:**
    - **Result: 45 seconds (Architecture-Bound)**. Cross-device Engine compilation is invalid; concurrent on-device compilation minimizes downtime.
