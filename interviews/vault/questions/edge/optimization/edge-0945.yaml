title: INT8 vs INT4 for a 14B LLM on a 16GB T4
scenario: Deploying a 14B LLM on a 16GB T4. In FP16, it requires 28GB (OOM). Quantizing to INT8 takes 14GB, while INT4 takes 7GB.
question: Should the 14B LLM use INT8 or INT4 on the 16GB T4, considering memory bandwidth, KV cache, and generation speed?
details:
  realistic_solution: INT4 is the safer deployment choice if the 14B model must run on a 16GB T4 with useful context length or concurrency. INT8 fits the weights at 14GB but leaves only about 2GB for KV cache, allocator overhead, runtime buffers, and activations, so practical serving will be fragile. INT4 reduces the weights to about 7GB and leaves roughly 9GB for serving state. It can also improve decode throughput for bandwidth-heavy kernels, but the exact token rate depends on kernel support, dequantization overhead, batching, and KV-cache traffic, so it should not be presented as a guaranteed 2x speedup.
  common_mistake: |
    **The Pitfall:** Choosing INT8 to avoid the perplexity degradation of INT4.
    **The Rationale:** Focusing purely on academic model accuracy metrics while ignoring physical KV cache constraints and generation latency.
    **The Consequence:** Deploying a model that runs out of memory on moderately long prompts and generates tokens too slowly for interactive use.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: NVIDIA T4 with 16GB VRAM.
    - Model: 14B parameters. INT8 weights ~= 14GB, INT4 weights ~= 7GB.
    - Decode performance depends on weights, KV-cache traffic, dequantization, and kernel efficiency.

    **Calculations:**
    - INT8 residual VRAM budget before runtime overheads: 16GB - 14GB = 2GB.
    - INT4 residual VRAM budget before runtime overheads: 16GB - 7GB = 9GB.
    - INT4 leaves 9GB / 2GB = 4.5x more headroom for KV cache and serving buffers.
    - Weight bandwidth lower bound improves by up to 2x because the weight payload drops from 14GB to 7GB, but realized tok/s is kernel- and workload-dependent.

    **Conclusion & Interpretation:**
    - **Result: choose INT4 for fit and serving headroom.** It expands the non-weight memory budget by 4.5x and may improve decode speed, but the scenario does not justify exact 22 tok/s or 45 tok/s claims.
