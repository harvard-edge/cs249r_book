title: The Kernel Launch Storm
scenario: You are tasked with optimizing a CNN-based object detection model on a Jetson AGX Orin. The model is fully quantized to INT8. Your profiler reports that while the GPU is constantly active, end-to-end latency is poor, and overall TOPS utilization is less than 10% of the theoretical peak. A deeper look reveals that the execution graph consists of hundreds of sequential, very short-duration kernel calls, each taking 20-50µs.
question: What is the most effective first step to solve this performance bottleneck?
details:
  realistic_solution: The workload is completely kernel-launch and DRAM-bandwidth bound. Apply operator fusion (e.g., using TensorRT) to combine sequential operations like Conv-Add-ReLU into a single composite kernel. This keeps intermediate tensors hot in L1/L2 cache and registers, drastically reducing DRAM traffic and eliminating the repetitive 20-50µs kernel dispatch overheads.
  common_mistake: |
    **The Pitfall:** Blaming the model architecture or batch size.
    **The Rationale:** Engineers see low TOPS utilization and assume the GPU simply isn't being 'fed' enough parallel math.
    **The Consequence:** Unnecessary architectural redesigns, while ignoring the massive kernel launch and DRAM overhead that dominates the actual compute time.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tensor size: 256x256x64 INT8 (4 MB).
    - Memory bandwidth: 204.8 GB/s.

    **Calculations:**
    - Transfer latency per 4 MB tensor: 4 MB / 204.8 GB/s ≈ 20 µs.
    - Unfused pipeline (Conv -> Add -> ReLU): 3 independent kernel launches = 3 separate read/writes.
    - Total DRAM I/O latency: ~60-100 µs pure memory overhead.

    **Conclusion & Interpretation:**
    - **Result: Memory I/O bound (>5x overhead) (Kernel Launch/DRAM Bound)**. Fusing the operators into a single kernel keeps the intermediate activations in registers/SRAM, eliminating DRAM roundtrips and kernel launch overhead.
  options:
  - The model's arithmetic intensity is too low for the hardware; the batch size must be increased to provide more parallel work.
  - The model needs to be pruned more aggressively to reduce the total number of FLOPs, as the compute is clearly the bottleneck.
  - The system is bottlenecked by kernel launch overhead and DRAM traffic; apply operator fusion to combine sequential operations into single kernels.
  - The model is not properly quantized, and using FP16 would provide better hardware mapping on the Tensor Cores.
  correct_index: 2
