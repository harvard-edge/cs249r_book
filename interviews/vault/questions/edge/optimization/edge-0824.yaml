title: Mitigating Catastrophic Forgetting on Edge
scenario: You are building an on-device personalization feature for a smart camera (4 TOPS NPU, 512MB RAM). The base model is a 5MB MobileNetV3 trained to detect generic humans. To recognize specific family members, you fine-tune the final 1M parameters on-device using 100 user captures. Post-update, the model achieves 99% accuracy on the family, but its generic human detection accuracy collapses from 95% to 12% due to catastrophic forgetting.
question: Which mitigation—EWC, a 50-image replay buffer, or LoRA/classifier head—best prevents forgetting on the 4 TOPS, 512 MB smart camera?
details:
  realistic_solution: Choose the LoRA/classifier-head mitigation with the backbone frozen. It minimizes forgetting by preserving the shared base representation, keeps the original human-detection path intact when the original head is retained and routed correctly, and adds only tens of kilobytes of parameters. EWC and a 50-image replay buffer can help, but they add multi-megabyte memory overhead and more on-device training work on a 512MB camera.
  common_mistake: |
    **The Pitfall:** Blindly recommending Elastic Weight Consolidation (EWC).
    **The Rationale:** Candidates choose EWC because it is a textbook solution for catastrophic forgetting.
    **The Consequence:** They fail to calculate the massive memory overhead of the Fisher Information Matrix, which exceeds the edge device's constrained RAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - Edge device has 4 TOPS NPU and 512MB RAM.
    - Model has 1M parameters to fine-tune.
    - Replay buffer uses 50 images of 224x224 RGB.
    - Adapter head uses 1280 feature dim and 10 classes.

    **Calculations:**
    - EWC memory overhead for Fisher values plus saved parameter means is about 2 states * 1M params * 4 bytes = 8MB, before optimizer/runtime overhead.
    - Replay buffer RAM is 50 * 224 * 224 * 3 bytes = ~7.5MB if stored as raw RGB.
    - Adapter/head overhead is 1280 * 10 * 4 bytes = 51,200 bytes ≈ 50KB.

    **Conclusion & Interpretation:**
    - **Result: Adapter/head is the lowest-overhead option.** It uses about 50KB versus roughly 7.5-8MB for raw replay or EWC state, and it reduces forgetting only if the original task parameters or head are preserved rather than overwritten.
