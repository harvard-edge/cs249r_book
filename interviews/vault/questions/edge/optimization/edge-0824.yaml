title: Mitigating Catastrophic Forgetting on Edge
scenario: You are building an on-device personalization feature for a smart camera
  (4 TOPS NPU, 512MB RAM). The base model is a 5MB MobileNetV3 trained to detect generic
  humans. To recognize specific family members, you fine-tune the final 1M parameters
  on-device using 100 user captures. Post-update, the model achieves 99% accuracy
  on the family, but its generic human detection accuracy collapses from 95% to 12%
  due to catastrophic forgetting.
question: Which mitigation—EWC, a 50-image replay buffer, or LoRA/classifier head—best
  prevents forgetting on the 4 TOPS, 512 MB smart camera?
details:
  realistic_solution: Option C (Adapters/Separate Head) is the optimal design choice
    for edge devices. By freezing the base network, it guarantees 0% forgetting on
    the original task, bounds the memory overhead to just tens of kilobytes, and massively
    reduces the on-device compute required for backpropagation compared to EWC or
    experience replay.
  common_mistake: '**The Pitfall:** Blindly recommending Elastic Weight Consolidation
    (EWC).

    **The Rationale:** Candidates choose EWC because it is a textbook solution for
    catastrophic forgetting.

    **The Consequence:** They fail to calculate the massive memory overhead of the
    Fisher Information Matrix, which exceeds the edge device''s constrained RAM.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Edge device has 4 TOPS NPU and 512MB RAM.

    - Model has 1M parameters to fine-tune.

    - Replay buffer uses 50 images of 224x224 RGB.

    - Adapter head uses 1280 feature dim and 10 classes.


    **Calculations:**

    - EWC Memory overhead is 2 states * 1M params * 4 bytes = 8MB.

    - Replay Buffer RAM is 50 * 224 * 224 * 3 bytes = ~7.5MB.

    - Adapter Head overhead is 1280 * 10 * 4 bytes = 51KB.


    **Conclusion & Interpretation:**

    - **Result: 51KB (Memory-Bound)**. Adapters are ~150x more memory-efficient than
    Replay or EWC, making them the optimal edge choice.

    '
