title: Making a 3B Model with 16K Context Fit on an Edge SoC
scenario: You need to run a 3B model with 16K context for document summarization on an edge SoC. Without FlashAttention, the 16K attention matrix exhausts memory.
question: How would you make a 3B model with 16K context feasible on an edge SoC, including FlashAttention, KV quantization, and attention pattern?
details:
  realistic_solution: |
    Standard attention can OOM because it materializes large attention intermediates. FlashAttention-2 helps by tiling attention and avoiding full attention-matrix materialization in DRAM, but it does not change the O(N^2) compute cost and is not sufficient by itself for a 16K context edge deployment. The main feasibility levers are compressing the KV cache to INT8 and changing the attention pattern: most layers use local or sliding-window attention, while a smaller set of global layers or sink tokens preserves long-range routing. This makes the design plausible under the memory budget, subject to measured quality and latency.
  common_mistake: |
    **The Pitfall:** Only considering the attention matrix memory.
    **The Rationale:** Candidates often focus on the O(N^2) attention matrix scaling but forget that the KV cache itself for 16K tokens across all layers is a massive, linear memory consumer.
    **The Consequence:** Proposing a solution that still results in an Out-Of-Memory (OOM) error during long-context generation because the KV cache wasn't quantized or windowed.
  napkin_math: |
    **Assumptions & Constraints:**
       - Model: 3B parameters (INT8)
       - Context: 16K tokens
       - Layers: 32, Heads: 16, Dim: 128
       - Hybrid Window: 24 layers @ 2K, 8 layers @ 16K
    **Calculations:**
       - Weights (INT8): 3 * 10^9 bytes = 3 GB
       - Standard KV Cache (FP16, 16K): 32 * 2 * 16 * 128 * 16384 * 2 = 4.29 GB
       - Hybrid sliding KV (INT8, 24 layers, 2K): 24 * 2 * 16 * 128 * 2048 * 1 = 201 MB
       - Hybrid full KV (INT8, 8 layers, 16K): 8 * 2 * 16 * 128 * 16384 * 1 = 536 MB
       - Total Hybrid KV (INT8): 201 MB + 536 MB = 737 MB
       - Total footprint before activations/runtime overhead: 3.00 GB weights + 0.737 GB KV = 3.737 GB
    **Conclusion & Interpretation:**
       - **Result: KV and attention-pattern mitigation.** FlashAttention removes the full attention matrix from DRAM, while INT8 KV plus a hybrid local/global pattern cuts the persistent KV cache to about 737 MB. The remaining fit depends on activation buffers, runtime overhead, and the quality impact of using local attention in most layers.
