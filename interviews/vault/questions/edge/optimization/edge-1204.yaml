title: FlashAttention for On-Device Long Document Summarization
scenario: You need to run a 3B model with 16K context for document summarization on an edge SoC. Without FlashAttention, the 16K attention matrix exhausts memory.
question: How would you make a 3B model with 16K context feasible on an edge SoC, including FlashAttention, KV quantization, and attention pattern?
details:
  realistic_solution: Standard attention mechanisms explicitly materialize the O(N^2) attention matrix, which induces OOM errors on edge devices. FlashAttention-2 computes attention in SRAM tiles to bypass DRAM materialization completely. Furthermore, standard FP16 KV caching for 16K context dominates memory limits. Fusing INT8 KV quantization with a hybrid sliding window layout (local attention with sparse global sinks) radically compresses the memory footprint, ensuring safe deployment.
  common_mistake: |
    **The Pitfall:** Only considering the attention matrix memory.
    **The Rationale:** Candidates often focus on the O(N^2) attention matrix scaling but forget that the KV cache itself for 16K tokens across all layers is a massive, linear memory consumer.
    **The Consequence:** Proposing a solution that still results in an Out-Of-Memory (OOM) error during long-context generation because the KV cache wasn't quantized or windowed.
  napkin_math: |
    **Assumptions & Constraints:**
       - Model: 3B parameters (INT8)
       - Context: 16K tokens
       - Layers: 32, Heads: 16, Dim: 128
       - Hybrid Window: 24 layers @ 2K, 8 layers @ 16K
    **Calculations:**
       - Weights (INT8): 3 * 10^9 bytes = 3 GB
       - Standard KV Cache (FP16, 16K): 32 * 2 * 16 * 128 * 16384 * 2 = 4.29 GB
       - Hybrid sliding KV (INT8, 24 layers, 2K): 24 * 2 * 16 * 128 * 2048 * 1 = 201 MB
       - Hybrid full KV (INT8, 8 layers, 16K): 8 * 2 * 16 * 128 * 16384 * 1 = 536 MB
       - Total Hybrid KV (INT8): 201 MB + 536 MB = 737 MB
       - Total footprint: 3 GB + 737 MB = 3.737 GB
    **Conclusion & Interpretation:**
       - **Result: Memory-Bound Mitigation.** Combining INT8 KV quantization and a hybrid sliding window slashes the KV cache to 737 MB, fitting safely in memory.
