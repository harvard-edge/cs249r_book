title: Optimizing Vision Model Latency with Structured Pruning
scenario: A YOLO model on Jetson Orin hits 20 FPS (memory-bound). 70% unstructured pruning failed to improve latency. Target is 30 FPS.
question: Why did 70% unstructured pruning fail on Jetson Orin, and what structured pruning pattern would you use to reach 30 FPS?
details:
  realistic_solution: Unstructured sparsity fails because dense matrix multiplication units cannot efficiently skip individual zero weights, resulting in poor memory access patterns. Use whole-channel/filter pruning in bandwidth-heavy convolution blocks, for example pruning about 33% of output channels while keeping channel counts aligned to TensorRT-friendly multiples such as 8 or 16, then fine-tune and re-export. The 30 FPS estimate is a rough memory-bound approximation, so profiling must confirm the pruned layers are actually the bottleneck.
  common_mistake: |
    **The Pitfall:** Applying unstructured pruning indiscriminately to reduce FLOPs on dense accelerators.
    **The Rationale:** Engineers assume theoretical FLOP reductions automatically equal faster execution, ignoring systolic array constraints.
    **The Consequence:** Unstructured pruning leaves irregular memory patterns, yielding zero latency improvement on dense INT8 Tensor Cores.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline = 20 FPS, strictly memory bottlenecked.
    - Target = 30 FPS.
    - As a rough first-order estimate, assume FPS scales inversely with memory traffic after pruning bandwidth-heavy layers.

    **Calculations:**
    - Required speedup = 30 / 20 = 1.5x.
    - Remaining memory traffic needed = 1 / 1.5 = 0.667 of baseline.
    - Required structured reduction = 1 - 0.667 = 33.3% of the memory-bound channel/activation traffic.

    **Conclusion & Interpretation:**
    - **Result: prune about one-third of whole output channels/filters in bottleneck layers, keeping tensor dimensions hardware-aligned.** This can reach 30 FPS only if profiling confirms those layers dominate memory traffic and accuracy recovers after fine-tuning.
