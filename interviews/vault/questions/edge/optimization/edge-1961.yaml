title: Optimizing Vision Model Latency with Structured Pruning
scenario: A YOLO model on Jetson Orin hits 20 FPS (memory-bound). 70% unstructured pruning failed to improve latency. Target is 30 FPS.
question: Why did 70% unstructured pruning fail on Jetson Orin, and what structured pruning pattern would you use to reach 30 FPS?
details:
  realistic_solution: Unstructured sparsity fails because dense matrix multiplication units cannot efficiently skip individual zero weights, resulting in poor memory access patterns. Structured channel pruning directly relieves the memory bandwidth bottleneck by reducing contiguous activation maps; reaching 30 FPS from 20 FPS requires roughly one-third less memory-bound work, so the pattern should prune whole channels/filters in bandwidth-heavy layers and then fine-tune.
  common_mistake: |
    **The Pitfall:** Applying unstructured pruning indiscriminately to reduce FLOPs on dense accelerators.
    **The Rationale:** Engineers assume theoretical FLOP reductions automatically equal faster execution, ignoring systolic array constraints.
    **The Consequence:** Unstructured pruning leaves irregular memory patterns, yielding zero latency improvement on dense INT8 Tensor Cores.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline = 20 FPS, strictly memory bottlenecked.
    - Target = 30 FPS.
    - Assume FPS scales inversely with memory traffic after pruning bandwidth-heavy layers.

    **Calculations:**
    - Required speedup = 30 / 20 = 1.5x.
    - Remaining memory traffic needed = 1 / 1.5 = 0.667 of baseline.
    - Required structured reduction = 1 - 0.667 = 33.3% of the memory-bound channel/activation traffic.

    **Conclusion & Interpretation:**
    - **Result: about one-third structured channel pruning in the bottleneck layers.** This can reach 30 FPS only if profiling confirms those layers dominate memory traffic and accuracy recovers after fine-tuning.
