title: Designing Kernel Fusion for ViTs on Jetson Orin
scenario: You are tasked with designing the inference deployment specification for a Vision Transformer (ViT) on an NVIDIA Jetson Orin. The system must process real-time high-resolution video streams, but early profiling shows severe latency bottlenecks due to kernel launch overhead and memory-bound operations like LayerNorm and GELU.
question: What kernel fusion strategy would you use for a ViT on Jetson Orin to reduce LayerNorm, GELU, and launch overhead within 60W?
details:
  realistic_solution: |
    Keep the ViT on the Ampere GPU and use TensorRT/CUDA fusion for valid GPU-side patterns: Linear bias plus GELU epilogues in the MLP, residual add plus following normalization where the implementation supports it, attention projections that avoid materializing unnecessary intermediates, and persistent or specialized LayerNorm kernels. Do not map arbitrary ViT LayerNorm, GELU, or attention subgraphs to DLA, and do not claim LayerNorm can be folded into a preceding Linear layer because it depends on per-token reduction statistics.
  common_mistake: |
    **The Pitfall:** Proposing massive monolithic kernels for all sequential operators or mapping custom fused kernels to the DLA.
    **The Rationale:** Candidates misapply standard GPU kernel fusion techniques without considering the Ampere GPU's register pressure limits or the DLA's inability to handle arbitrary control flow.
    **The Consequence:** Compilation failures, extreme register spilling that degrades performance, or deploying invalid operations to the DLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Activation tensor size: 5 MB (FP16).
    - Memory bandwidth: ~204 GB/s (LPDDR5).
    - Unfused: 6 sequential ops = 6 reads + 6 writes.
    - Fused: 1 read + 1 write.

    **Calculations:**
    - Unfused data movement: 12 * 5 MB = 60 MB.
    - Fused data movement: 2 * 5 MB = 10 MB.
    - Unfused latency: 60 MB / 204 GB/s = ~294 microseconds.
    - Fused latency: 10 MB / 204 GB/s = ~49 microseconds.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound**. For this 5 MB tensor, the ideal bandwidth-only saving is about 294 - 49 = 245 microseconds for the fused region. Across repeated ViT blocks this can add up, but the total frame saving must be measured because launch overhead, occupancy, and register pressure also matter.
