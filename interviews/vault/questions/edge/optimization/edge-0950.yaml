title: Edge New 0011
scenario: An Orin SoC handles 4 independent 1080p camera streams (6MB per frame) at 30 FPS. Analyze the real-time tradeoff of batching all 4 frames into a single inference call versus running 4 concurrent single-batch inference streams.
question: For 4 synchronized 1080p 30 FPS streams on Orin, should you batch all frames or run 4 concurrent single-batch streams?
details:
  realistic_solution: Batching 4 frames together maximizes GPU Tensor Core utilization and reduces kernel launch overhead, but forces the pipeline to wait for the last camera's frame to arrive, adding buffering latency. Concurrent single-batch streams minimize latency for each specific camera but increase CPU overhead and GPU context switching. For a 30 FPS target (33ms budget), the batching wait time is negligible if cameras are hardware-synchronized.
  common_mistake: |
    **The Pitfall:** Assuming batching inherently destroys real-time capabilities.
    **The Rationale:** Candidates fail to measure the actual frame synchronization offset, incorrectly applying single-stream latency logic to multi-stream synchronized sensors.
    **The Consequence:** Running concurrent streams increases CPU overhead and GPU context switching, reducing overall pipeline efficiency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4 synchronized 1080p cameras at 30 FPS.
       - Frame budget: 33.3 ms.
       - Kernel launch overhead: ~0.5 ms per launch.
    2. **Calculations:**
       - Data rate = 4 * 6 MB * 30 FPS = 720 MB/s.
       - Batching wait time = 0 ms (since cameras are hardware-synchronized).
       - Saved kernel overhead = 3 avoided launches * 0.5 ms = 1.5 ms saved per cycle.
    3. **Conclusion & Interpretation:**
       - **Result: 1.5 ms compute saved.** Batching fits comfortably within the 33.3 ms budget without adding buffering latency. This optimizes a **Compute-Bound** task.
