title: Optimizing Sparse Transformer Inference on Qualcomm Cloud AI 100
scenario: You are tasked with deploying a large transformer model, aggressively pruned to 90% unstructured sparsity, onto a Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W TDP). Your goal is to maximize inference throughput while maintaining 99% of the original model's accuracy.
question: How would you convert 90% unstructured sparsity into hardware-friendly sparsity on the AI 100 to maximize throughput while preserving 99% accuracy?
details:
  realistic_solution: The solution requires fine-tuning to convert unstructured sparsity into a structured pattern (e.g., 2:4 block sparsity) that the Qualcomm Cloud AI 100's INT8 engines can exploit. Implement structured pruning techniques during fine-tuning, quantize to INT8, and optimize kernel fusion to minimize memory transfers.
  common_mistake: |
    **The Pitfall:** Assuming unstructured sparsity automatically translates to speedups on specialized hardware.
    **The Rationale:** Engineers ignore that the accelerator might spend more cycles indexing non-zero elements than performing actual computations.
    **The Consequence:** The expected inference speedups are not realized in practice.
  napkin_math: |
    **Assumptions & Constraints:**
    - 400 TOPS INT8 capacity
    - 90% unstructured sparsity must be converted into a sparsity pattern supported by the compiler and kernels.
    - Accuracy target: retain 99% of the original model.

    **Calculations:**
    - Unstructured zeros do not guarantee lower latency because the runtime may still execute dense tiles or pay metadata/indexing overhead.
    - Structured pruning retrains the model into regular blocks, channels, or vendor-supported sparse tiles so whole scheduled units can be skipped or compacted.
    - The achievable speedup is bounded by the fraction of layers converted, sparse-kernel support, memory traffic, and the accuracy recovered during fine-tuning.

    **Conclusion & Interpretation:**
    - **Result: hardware-supported structured sparsity.** Convert only to patterns the AI 100 toolchain can accelerate, then validate throughput with profiling rather than assuming a fixed 5-8x speedup.
