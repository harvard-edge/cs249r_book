title: Edge Accelerator Scheduling for BERT-tiny Inference
scenario: 'You are tasked with deploying a real-time BERT-tiny model for natural language understanding on an edge device. You are comparing two realistic edge targets: an NVIDIA Jetson Orin module with GPU/DLA acceleration and a Hailo-8 module using a compiled dataflow execution plan.'
question: How would you evaluate the impact of memory reuse, parallel execution, and layer fusion on BERT-tiny latency and throughput across the two accelerators?
details:
  realistic_solution: |
    A realistic solution would involve: 1. Profiling the BERT-tiny model to identify critical paths and memory-intensive operations. 2. Utilizing hardware-specific scheduling primitives (e.g., Qualcomm's NPU SDK, or a generic compiler like TVM/Glow customized for each backend) to explore different operator fusion and parallelization schemes. 3. Developing custom benchmarks that isolate the impact of memory reuse for specific layers and measure the overhead of dynamic scheduling. 4. Comparing actual latency and throughput metrics under varying batch sizes and input sequences, alongside detailed power consumption analysis, to determine the optimal platform and scheduling strategy for the specific latency and power budget constraints.
  common_mistake: |
    **The Pitfall:** Focusing only on peak TOPS or raw memory capacity.
    **The Rationale:** Candidates neglect the interplay between operator types, memory access patterns, and the specific scheduling limitations of each accelerator's software stack.
    **The Consequence:** They overlook the true memory bandwidth impacts, leading to highly inaccurate performance predictions and suboptimal hardware selection.
  napkin_math: |
    **Assumptions & Constraints:**
    - BERT-tiny operator group has 2 ms compute time after INT8 compilation on a given target.
    - Without fusion, the group writes and rereads a 64 MB intermediate tensor.
    - Effective off-chip bandwidth available to the workload is 16 GB/s after other system traffic.
    - Two independent branches can overlap only if the backend exposes parallel execution resources.

    **Calculations:**
    - Extra memory time without fusion = 64 MB / 16 GB/s = 4 ms.
    - Unfused latency estimate = 2 ms compute + 4 ms memory traffic = 6 ms.
    - Fused latency estimate = 2 ms compute plus small on-chip buffering overhead, so roughly 2-3 ms.
    - Parallel branches reduce latency only for the independent portion; if 40% of a 6 ms path is parallelizable, the best-case speedup is 6 ms / (0.60 + 0.40/2) / 6 ms = about 1.25x.

    **Conclusion & Interpretation:**
    - **Result: Fusion Can Save Milliseconds, Not Guaranteed 50%.** The comparison should use measured per-target bandwidth, compiler fusion support, and branch independence; peak TOPS alone cannot predict BERT-tiny latency.
