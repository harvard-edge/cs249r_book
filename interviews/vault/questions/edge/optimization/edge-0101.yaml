title: The Memory Copy Ceiling
scenario: Your multi-model vision pipeline is missing its 33ms frame deadline (30 FPS). You check the compute time for each model and it adds up to 41ms total. The memory-flow diagram shows three synchronous GPU-to-CPU or CPU-to-GPU tensor copies between stages, each measured at about 4ms.
question: Based on the memory flow diagram, where are the 'missing' milliseconds being spent, and how do you hit the deadline?
details:
  realistic_solution: You are suffering from **Sync Overruns via Memory Bouncing**. The missing time is spent copying tensors from GPU to CPU and back between pipeline stages, with synchronous copies leaving the GPU idle. Keep tensors resident on the GPU, move preprocessing/postprocessing onto the GPU, and pass device buffers directly between models. Eliminating the copies reduces end-to-end latency from about 53 ms to 41 ms; hitting a 33 ms frame period also requires stream-level pipelining where each resident stage is under 33 ms, or further compute reduction through fusion, pruning, or model changes.
  common_mistake: |
    **The Pitfall:** Assuming the models are too slow and rushing to use smaller models.
    **The Rationale:** Engineers focus on model FLOPs instead of analyzing the synchronous `cudaMemcpy` data movement between models.
    **The Consequence:** The GPU sits idle during transfers, wasting time and missing real-time deadlines despite fast compute.
  napkin_math: |
    **Assumptions & Constraints:**
    - The memory-flow diagram shows 3 synchronous host-device tensor transfers.
    - The profiler measures about 4 ms per transfer.
    - Total model compute time is 41 ms.

    **Calculations:**
    - Total transfer overhead = 3 transfers * 4 ms/transfer = 12 ms.
    - Total latency = 41 ms (compute) + 12 ms (overhead) = 53 ms.

    **Conclusion:** The missing milliseconds are the 12 ms of host-device bounce overhead. Removing them reduces single-frame latency to 41 ms, which is still above 33 ms; the 30 FPS deadline is reachable only if the GPU-resident stages are pipelined so the slowest stage is <=33 ms, or if the 41 ms of compute is also reduced.
