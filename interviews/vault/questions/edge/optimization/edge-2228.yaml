title: Analyzing when torch.compile helps vs hurts on Jetson Orin
scenario: You apply torch.compile to a 5M parameter model for inference on Jetson Orin. TorchInductor compilation takes 45 seconds on first call. After compilation, inference is actually 2ms slower per step than eager mode (12ms vs 10ms). This is unexpected since torch.compile typically speeds up larger models.
question: Why might torch.compile make this 5M-parameter Orin inference model slower, and how would you decide whether to keep it?
details:
  realistic_solution: Treat torch.compile as an optimization to benchmark, not a default. A 5M-parameter inference model has little arithmetic per call, so kernel launch overhead, generated-kernel quality, dynamic shapes, CPU scheduling, and Inductor compile overhead can outweigh fusion benefits on Orin. Since compiled latency is 12ms versus 10ms eager and the first call costs 45s, keep eager mode unless a representative long-running benchmark with fixed shapes shows a real steady-state speedup.
  common_mistake: |
    **The Pitfall:** Assuming `torch.compile` is a universal speedup.
    **The Rationale:** Engineers assume `torch.compile` always improves performance regardless of model size or hardware, given its success on large LLMs.
    **The Consequence:** On small models with short compute kernels, the overhead of launching compiled Triton kernels exceeds the benefit of fusion, causing a performance regression on hardware like Orin.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compile time: 45s on first call.
    - Eager latency: 10ms per inference.
    - Compiled latency: 12ms per inference.

    **Calculations:**
    - Steady-state delta = 12ms - 10ms = 2ms slower per inference.
    - Compile overhead is never amortized when the compiled version is slower.
    - If a future compiled variant became faster by S ms per inference, break-even calls would be 45,000ms / S.

    **Conclusion & Interpretation:**
    - **Result: keep eager mode for this workload.** The observed compiled path is slower before considering the 45s first-call cost, so compilation is not worthwhile unless fixed-shape profiling later shows a positive steady-state speedup.
