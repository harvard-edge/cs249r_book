title: 'Operator Fusion Bottlenecks on Cloud AI 100'
scenario: 'You are deploying a quantized vision transformer. During profiling, you observe that despite the theoretical peak of 400 TOPS for INT8, the system is only achieving 60 TOPS. The compilation graph shows multiple unfused pointwise operations following dense matrix multiplications.'
question: 'How do you analyze this compiler bottleneck and quantify the impact of operator lowering and fusion?'
details:
  realistic_solution: 'Write custom lowering rules or use the platform''s native compiler passes to fuse MatMul + Add + Activation into a single kernel. This keeps intermediate activations in the accelerator''s local SRAM, maximizing utilization of the compute cores and drastically reducing power-hungry reads/writes to off-chip memory.'
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is strictly compute-bound.
    **The Rationale:** Candidates see low TOPS and suggest generic quantization without analyzing the graph compiler's lowering phase.
    **The Consequence:** They fail to recognize that unfused pointwise operations cause excessive trips to the LPDDR memory, stalling the compute engines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Intermediate tensor size: 16MB (INT8).
    - Model depth: 24 blocks.

    **Calculations:**
    - Unfused traffic per block: MatMul writes 16MB; Add reads 16MB, writes 16MB; Activation reads 16MB, writes 16MB. Total = 80MB.
    - Fused traffic per block: All computed in SRAM; only final 16MB result is written to memory.
    - Savings: Reduces memory I/O by 64MB per block (80%).
    - Total Savings: 64MB * 24 blocks = 1,536 MB (~1.5GB) per inference.

    **Conclusion & Interpretation:**
    - **Result: ~1.5GB Savings (Memory-Bandwidth Bound)**. Fusion saves ~1.5GB of memory traffic per inference, instantly unlocking the memory bottleneck.
