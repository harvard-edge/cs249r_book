title: 'Operator Scheduling and Fusion on Edge TPU'
scenario: 'You are deploying a real-time vision model to a Google Coral Edge TPU (4 TOPS INT8, 2W, USB form factor). Profiling reveals a severe latency bottleneck caused by execution graph fragmentation; an unsupported custom operator in the middle of the network forces the compiler to schedule the first half of the model on the TPU, offload an intermediate tensor to the host CPU for the custom op, and transfer it back for the remainder.'
question: 'What scheduling bottleneck is caused by the unsupported custom operator, and how much latency is saved by making the graph fully TPU-compatible?'
details:
  realistic_solution: 'The correct approach is to analyze the Edge TPU compiler logs to identify the unsupported operator causing graph fragmentation. By replacing the custom operator with a mathematically similar, Edge TPU-supported operation (e.g., swapping a custom activation for ReLU), the entire model can be scheduled as a single execution subgraph on the TPU, eliminating costly context switches and host-device memory transfers.'
  common_mistake: |
    **The Pitfall:** Focusing solely on INT8 quantization without analyzing the compiled execution graph for fallback operators.
    **The Rationale:** Candidates assume that if a model is quantized, the entire model will automatically run on the accelerator.
    **The Consequence:** They overlook the catastrophic latency penalty of host-device memory transfers caused by the compiler splitting the graph to run unsupported operators on the CPU.
  napkin_math: |
    **Assumptions & Constraints:**
    - Intermediate tensor size (104x104x128 INT8) = ~1.38 MB.
    - USB bandwidth = 300 MB/s.
    - Total compute time (4 TOPS TPU) ≈ 2.5 ms.

    **Calculations:**
    - Round-trip to Host = 1.38 MB × 2 = 2.76 MB.
    - I/O penalty = 2.76 MB / 300 MB/s = 9.2 ms.

    **Conclusion & Interpretation:**
    - **Result: 9.2 ms Penalty (I/O-Bound)**. The CPU fallback causes a 9.2 ms I/O penalty, inflating total latency by nearly 4x.
