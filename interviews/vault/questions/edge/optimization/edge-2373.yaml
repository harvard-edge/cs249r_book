title: 'Priority Queue Multi-Camera Scheduling'
scenario: 'An edge SOC processes inferences from 10 cameras using a single FIFO queue, resulting in high tail latency. Two of the cameras monitor a safety-critical zone.'
question: 'How can the scheduling model be optimized to ensure safety-critical cameras bypass FIFO without starving the other 8 cameras?'
details:
  realistic_solution: 'Replace the single M/M/1 queue with a non-preemptive priority queue system. Assign High Priority to the 2 safety-critical streams. To prevent starvation, implement a Time-To-Live (TTL) aging mechanism that bumps delayed normal requests to high priority after a threshold.'
  common_mistake: |
    **The Pitfall:** Implementing batching across all 10 cameras to increase overall throughput.
    **The Rationale:** Candidates default to batching to solve latency issues by improving raw accelerator utilization.
    **The Consequence:** Batching actually increases the wait time for the first arrival in the batch, drastically worsening the worst-case tail latency for the safety-critical streams.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10 total streams: 2 critical, 8 normal.
    - FIFO queue baseline wait: ~50ms.

    **Calculations:**
    - Single FIFO queue: Critical streams wait behind 8 normal streams (50ms wait).
    - Priority Queue: High priority guarantees scheduling immediately after current inference finishes.
    - Priority Wait Time: Drops from 50ms to ~15ms (maximum 1 inference delay).

    **Conclusion & Interpretation:**
    - **Result: ~15ms Wait (Queueing-Bound)**. High priority isolation ensures safety, while a 50ms TTL aging mechanism prevents standard stream starvation.
