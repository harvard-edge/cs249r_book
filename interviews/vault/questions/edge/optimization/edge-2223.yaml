title: Power-aware training schedule using autograd profiling on Jetson Orin
scenario: You are running adaptive fine-tuning on Jetson Orin constrained to a 25W power budget (half of Orin's 60W TDP) to avoid thermal throttling during extended outdoor deployment. Standard training at full power runs at 8ms/step but triggers thermal throttling after 10 minutes, slowing to 25ms/step.
question: How would you keep adaptive fine-tuning on Orin within a 25 W budget without hitting the 25 ms thermal-throttled regime?
details:
  realistic_solution: |
    Profile sustained package power and temperature with tegrastats while running the actual fine-tuning step. First try nvpmodel power limiting, mixed precision, and batch-size or gradient-accumulation changes so the measured training loop stays under 25W continuously. If full-power bursts are still needed, enforce a duty cycle derived from the power budget: at 60W active power and near-zero learning work while idle, active training can occupy at most 25/60 of wall time. Schedule short bursts below the 10-minute thermal trigger and resume only after temperature recovers.
  common_mistake: |
    **The Pitfall:** Assuming that reducing batch size proportionally reduces power consumption.
    **The Rationale:** Candidates don't instrument actual power draw, ignoring that smaller batches reduce utilization but may increase per-sample power due to memory access patterns.
    **The Consequence:** The device still triggers thermal throttling, plummeting training throughput unpredictably.
  napkin_math: |
    **Assumptions & Constraints:**
    - Average learning power limit: 25W.
    - Full-power training draw: 60W at 8ms/step = 125 steps/sec.
    - Continuous full-power training throttles after 10 minutes, so bursts must be shorter than that and thermally verified.

    **Calculations:**
    - Maximum active fraction from average power = 25W / 60W = 0.417.
    - Example 60s cycle: train for 25s, cool/idle for 35s.
    - Steps per active burst = 25s / 0.008s per step = 3,125 steps.
    - Average step rate = 3,125 steps / 60s = 52.1 steps/sec.
    - Hourly throughput = 52.1 steps/sec * 3,600s = 187,500 steps/hr.

    **Conclusion & Interpretation:**
    - **Result: about 52 steps/sec with duty-cycled full-power bursts (Thermal-Bound).** A sustained 25W configuration is preferable if profiling shows it avoids throttling; otherwise the duty cycle must be power- and temperature-limited, not arbitrary.
