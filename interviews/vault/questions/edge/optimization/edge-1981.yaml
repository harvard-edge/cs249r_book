title: Optimizing a Large Language Model for Qualcomm Cloud AI 100 via Graph Compilation
scenario: You are tasked with deploying a pre-trained, 7-billion parameter quantized Large Language Model (LLM) on the Qualcomm Cloud AI 100 accelerator. The framework's default compiler struggles to fully utilize INT8 capabilities and resorts to slower FP16 operations for certain layers, leading to performance degradation and memory overruns.
question: How would you compile and optimize the 7B quantized LLM across operator lowering, constant folding, memory, and power?
details:
  realistic_solution: 'Implement custom INT8 kernel operator lowering for unsupported ops rather than relying on FP16 fallbacks. Design compiler passes for aggressive constant folding of static sub-graphs. Enforce strict activation recomputation to fit the 32GB LPDDR4x constraints, and profile using nsys-equivalent tools to ensure optimal scheduling within the 75W envelope.'
  common_mistake: |
    **The Pitfall:** Blindly trusting the framework's default AOT compiler.
    **The Rationale:** Engineers assume standard compilers map complex LLM ops optimally to edge hardware.
    **The Consequence:** Silent fallbacks to FP16, resulting in immediate thermal throttling, massive latency spikes, and OOM failures.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 7B parameters.
       - INT8 quantization (1 byte/param).
       - Available Memory: 32 GB LPDDR4x.
       - Compute: 400 TOPS INT8.
    2. **Calculations:**
       - INT8 Weights size = 7 * 10^9 * 1 byte = 7 GB.
       - Memory for activations/KV = 32 GB - 7 GB = 25 GB.
       - Compute required per token = 7B * 2 (MAC) = 14 GFLOPs.
       - Theoretical max throughput = 400 TOPS / 14 GOPS = ~28,571 tokens/second (unbounded by memory).
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth Bound**. While the weights easily fit (7GB), the theoretical 28K tokens/sec throughput is impossible; execution will be entirely bottlenecked by LPDDR4x memory bandwidth and compiler overhead, not compute.
