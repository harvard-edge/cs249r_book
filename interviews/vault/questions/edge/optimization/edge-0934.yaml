title: Retail Edge vs Cloud LLM TCO
scenario: A retail chain evaluates adding a local voice assistant to 5,000 stores. Average usage per store is 20,000 tokens per day.
question: Which option has lower 3-year TCO per store for 20,000 tokens/day, cloud API serving ($0.50 per 1M tokens) or a local edge server ($1,500 CapEx, 150W continuous, $0.12/kWh)?
details:
  realistic_solution: 'Calculate the operational cost of the cloud API over 3 years based on daily token volume. Compare this to the sum of the edge server''s CapEx and its 3-year operational power cost. For low-utilization edge deployments, the static power draw and upfront hardware amortization vastly outweigh the per-token cost of centralized cloud serving.'
  common_mistake: |
    **The Pitfall:** Focusing only on the per-token inference cost.
    **The Rationale:** Candidates often ignore the continuous static power draw and upfront hardware amortization of edge servers for low-utilization use cases.
    **The Consequence:** Recommending a vastly more expensive edge deployment when a cloud solution is orders of magnitude cheaper.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 20,000 tokens/day per store, 3 years duration.
       - Cloud API: $0.50 per 1M tokens.
       - Edge Server: $1,500 CapEx, 150W continuous power, $0.12/kWh.
    2. **Calculations:**
       - Cloud Volume: 20,000 * 365 * 3 = 21.9M tokens.
       - Cloud Cost: 21.9M * ($0.50 / 1M) = $10.95.
       - Edge Power usage: 0.15 kW * 24 h * 365 days * 3 yrs = 3,942 kWh.
       - Edge Power Cost: 3,942 kWh * $0.12/kWh = $473.04.
       - Edge TCO: $1,500 CapEx + $473.04 Power = $1,973.04.
    3. **Conclusion & Interpretation:**
       - **Result: Cloud-Dominant**. Cloud serving is massively cheaper ($10.95 vs $1,973.04). Static power and hardware amortization render edge deployments economically unviable for low-utilization workloads.
