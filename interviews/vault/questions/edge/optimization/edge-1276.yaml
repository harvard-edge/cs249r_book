title: Operator Scheduling Architecture on Cloud AI 100
scenario: Design the operator scheduling architecture for deploying a multi-modal perception pipeline on an on-premise Qualcomm Cloud AI 100 inference accelerator. The pipeline consists of several concurrent models that share the same accelerator.
question: How would you statically schedule concurrent models on Cloud AI 100 to reuse 32 GB memory, and what utilization do the given numbers support?
details:
  realistic_solution: Design an ahead-of-time (AOT) static scheduler that packs operators from the concurrent models into deterministic time slots, using liveness analysis to assign fixed offsets in a shared activation arena. Fuse producer-consumer chains where memory traffic dominates, but interleave independent operators from different models when one model cannot fill the accelerator by itself. Use double-buffered input/output staging, preplanned DMA windows, and per-model deadlines. With only 300 TOPS of average demand in the stated workload, static scheduling can fit memory and make execution deterministic, but it cannot by itself saturate a 400 TOPS accelerator.
  common_mistake: |
    **The Pitfall:** Proposing dynamic scheduling approaches typical of cloud GPUs.
    **The Rationale:** Candidates fail to realize that dynamic scheduling introduces unacceptable runtime overhead on a 75W edge accelerator, and that memory bandwidth will bottleneck before compute.
    **The Consequence:** The system will fail to saturate compute and will exceed the LPDDR4x memory limits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 3 concurrent models, 4 GB INT8 weights each.
       - Available memory: 32 GB.
       - Unoptimized peak intermediate activation memory: 15 GB.
       - Operator fusion reduces intermediate writes by ~40%.
       - Combined scheduled INT8 work: 300 TOPS effective average demand during the real-time window.
       - Target utilization: at least 75% of 400 TOPS.
    2. **Calculations:**
       - Total weight allocation = 3 * 4 GB = 12 GB.
       - Remaining memory for activations = 32 GB - 12 GB = 20 GB.
       - Optimized peak activation footprint = 15 GB * (1 - 0.4) = 9 GB.
       - Total memory required = 12 GB + 9 GB = 21 GB.
       - Scheduled compute utilization = 300 TOPS / 400 TOPS = 75%.
       - Memory headroom = 32 GB - 21 GB = 11 GB for runtime metadata, staging buffers, and safety margin.
    3. **Conclusion & Interpretation:**
       - **Result: 75% Scheduled Utilization With Memory Fit**. Static buffer reuse makes the workload fit in 21 GB with 11 GB of headroom. Horizontal interleaving improves determinism and avoids idle gaps, but these numbers support only 75% of peak; saturating 400 TOPS would require more concurrent work, faster arrivals, or a different workload mix.
