title: Operator Scheduling Architecture on Cloud AI 100
scenario: Design the operator scheduling architecture for deploying a multi-modal perception pipeline on an on-premise Qualcomm Cloud AI 100 inference accelerator. The pipeline consists of several concurrent models that share the same accelerator.
question: How would you statically schedule concurrent models on Cloud AI 100 to saturate 400 TOPS while reusing memory within 32 GB?
details:
  realistic_solution: 'Design an ahead-of-time (AOT) static scheduler using liveness analysis to aggressively reuse memory buffers for intermediate activations. Evaluate the tradeoff between vertical layer fusion (to reduce memory trips) and horizontal parallel execution (to increase utilization), concluding that a predefined memory pool with static offset assignments is essential for deterministic inference.'
  common_mistake: |
    **The Pitfall:** Proposing dynamic scheduling approaches typical of cloud GPUs.
    **The Rationale:** Candidates fail to realize that dynamic scheduling introduces unacceptable runtime overhead on a 75W edge accelerator, and that memory bandwidth will bottleneck before compute.
    **The Consequence:** The system will fail to saturate compute and will exceed the LPDDR4x memory limits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 3 concurrent models, 4 GB INT8 weights each.
       - Available memory: 32 GB.
       - Unoptimized peak intermediate activation memory: 15 GB.
       - Operator fusion reduces intermediate writes by ~40%.
    2. **Calculations:**
       - Total weight allocation = 3 * 4 GB = 12 GB.
       - Remaining memory for activations = 32 GB - 12 GB = 20 GB.
       - Optimized peak activation footprint = 15 GB * (1 - 0.4) = 9 GB.
       - Total memory required = 12 GB + 9 GB = 21 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound**. The peak activation footprint shrinks to 9 GB, ensuring the memory budget is respected and the system remains compute-bound rather than memory-bandwidth bottlenecked.
