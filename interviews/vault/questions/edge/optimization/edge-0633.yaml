title: The Autonomous Valet Retrofit
scenario: You are the new Principal ML Systems Engineer for a luxury EV company. Your flagship sedan, which shipped to customers in 2023, needs to receive a new 'Autonomous Valet' feature via an over-the-air (OTA) update. This feature requires a state-of-the-art Transformer-based BEV (Bird's-Eye-View) perception model for safe navigation in tight parking structures.
question: What phased optimization strategy would get the OTA Transformer BEV model from 200ms to 33ms with the least deployment risk?
details:
  realistic_solution: A principal-level response involves a phased strategy that tackles different sources of latency in order of increasing risk and engineering cost.
  common_mistake: |
    **The Pitfall:** Proposing a single, aggressive solution like "just prune the model by 85%."
    **The Rationale:** Junior engineers often focus on raw mathematical reduction without considering the massive risk to model accuracy or the engineering cost of extensive retraining.
    **The Consequence:** A high-risk, single-point-of-failure deployment plan that could severely compromise vehicle safety or delay the OTA update indefinitely.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target speedup latency: 33ms.
    - Current latency: 200ms.

    **Calculations:**
    - Speedup factor: 200 / 33 = ~6.06x required speedup.

    **Conclusion & Interpretation:**
    - **Result: ~6x speedup (Latency-Bound)**. A phased strategy is required to achieve this without high deployment risk.
