title: Multi-Tenant Operator Scheduling on Qualcomm Cloud AI 100
scenario: You are tasked with designing the inference execution engine for a multi-tenant on-premise deployment utilizing the Qualcomm Cloud AI 100 accelerator. The system must schedule concurrent execution of multiple transformer-based models within the power envelope while maximizing the INT8 compute capacity. You must architect a scheduling system that handles operator fusion, memory reuse across tenants, and execution order optimization to minimize memory thrashing and ensure high throughput.
question: How would you schedule multiple transformer models on Cloud AI 100 to improve INT8 TOPS utilization without memory thrashing?
details:
  realistic_solution: |
    Use a compiler-aware scheduler rather than simple tenant admission control. Compile each transformer into fused blocks such as QKV projection, attention, MLP, bias, and activation sequences so intermediate tensors are consumed while resident instead of repeatedly materialized. At runtime, schedule layer blocks in waves across tenants: keep enough ready work to fill the accelerator, but avoid running blocks whose peak live activations overlap unnecessarily. Reuse a shared workspace pool, prefer static shapes or bounded microbatches, and order execution to finish a tenant's memory-heavy block before starting another memory-heavy block. This improves useful INT8 TOPS by reducing memory stalls and keeping compute tiles fed.
  common_mistake: |
    **The Pitfall:** Designing a static scheduling approach tailored for a single model instead of multi-tenant environments.
    **The Rationale:** Candidates overlook the necessity of dynamic memory pooling and the severe impact of unfused operators on LPDDR4x bandwidth.
    **The Consequence:** Massive memory thrashing causes the 32 GB limit to be exceeded, collapsing system throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Concurrent models: 4.
    - Let A represent one transformer's peak intermediate activation workspace for a block.
    - Unfused execution materializes about 3A of intermediates for QKV, attention, and MLP substeps.
    - Fused execution keeps the block's peak workspace near A by consuming intermediates in place.
    - TOPS utilization falls when memory traffic and workspace pressure stall compute.

    **Calculations:**
    - If all 4 tenants enter an unfused memory-heavy block together, peak transient workspace is about 4 * 3A = 12A.
    - If the same blocks are fused, peak transient workspace is about 4 * A = 4A.
    - Fusion therefore cuts transient workspace and materialized memory traffic by about 12A / 4A = 3x for that block.
    - Execution-order control can further stagger memory-heavy blocks so compute-heavy blocks from other tenants run while one tenant uses the shared workspace.

    **Conclusion & Interpretation:**
    - **Result: fusion-aware scheduling is Memory-Bandwidth-Bound.** The scheduler maximizes useful INT8 TOPS by fusing operators, reusing workspace, and ordering tenant blocks to avoid overlapping peak activation pressure.
