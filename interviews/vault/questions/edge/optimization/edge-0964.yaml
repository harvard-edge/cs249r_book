title: T4 Continuous Batching Under a 100ms LLM Latency SLA
scenario: A T4 GPU serves an LLM with a 100ms per-token strict SLA. BS=1 takes 40ms. BS=2 takes 45ms. Each item added to the batch increases latency by 5ms.
question: What maximum continuous batch size on the T4 maximizes LLM throughput without exceeding the 100ms per-token SLA?
details:
  realistic_solution: Continuous (iteration-level) batching adds new requests to the active batch on the fly. To maximize throughput, use the largest integer batch size whose per-token iteration latency remains at or below the 100ms SLA. With a 40ms BS=1 baseline and 5ms for each additional sequence, that limit is 13.
  common_mistake: |
    **The Pitfall:** Assuming batching is completely "free" until hitting an OOM error.
    **The Rationale:** Candidates forget the marginal linear increase in memory access time per batch item.
    **The Consequence:** They maximize the batch size strictly based on VRAM, blowing past the strict 100ms latency SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline Latency (BS=1): 40ms.
    - Marginal Latency: +5ms per sequence.
    - SLA Constraint: <= 100ms.

    **Calculations:**
    - Latency Function: Latency = 40ms + (N - 1) * 5ms.
    - SLA Equation: 40 + (N - 1) * 5 <= 100.
    - (N - 1) * 5 <= 60.
    - N - 1 <= 12, so N <= 13.
    - N is an integer batch size, so the maximum valid continuous batch size is 13.

    **Conclusion & Interpretation:**
    - **Result: 13 (Latency-Bound)**. Max continuous batch size is 13; batch size 14 would take 40 + 13 * 5 = 105ms and exceed the 100ms per-token iteration SLA.
