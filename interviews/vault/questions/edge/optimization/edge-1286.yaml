title: Diagnosing Edge TPU Compiler Graph Partitioning
scenario: Your team is deploying a custom CNN to an edge accelerator to leverage its highly efficient INT8 compute. During ahead-of-time compilation, you notice the compiler partitions the graph into three subgraphs, with the middle subgraph falling back to the host CPU. This causes severe latency spikes and high host CPU utilization.
question: How do you identify the root cause of this compilation failure, and what constraints of the hardware architecture typically lead to this symptom?
details:
  realistic_solution: Utilize the compiler's diagnostic logs to isolate the exact node triggering the subgraph partition. This is universally caused by an operator that is unsupported in hardware (e.g., custom activations) or a forced dequantization boundary. The fix requires operator lowering—rewriting the network to map unsupported nodes to mathematically equivalent, natively supported INT8 operations like ReLU6.
  common_mistake: |
    **The Pitfall:** Assuming INT8 post-training quantization guarantees successful hardware compilation.
    **The Rationale:** Candidates believe correct bit-precision is the only requirement, ignoring the extremely rigid operator whitelists of specialized edge silicon.
    **The Consequence:** Silent CPU fallbacks that completely negate the accelerator's throughput and power efficiency advantages due to massive PCIe bus transfers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Compute: ~1 GOPS natively
    - PCIe Gen2 x1 Bandwidth: ~500 MB/s
    - Fallback Tensor Size: 2 MB
    - Partition requires device->host input transfer and host->device output transfer, with read/write traffic on each boundary

    **Calculations:**
    - Accelerator execution time = ~0.25 ms
    - Effective partition traffic = 2 MB tensor * 4 boundary reads/writes = 8 MB
    - Partition transfer cost = 8 MB / 500 MB/s = 16 ms
    - Total execution = 0.25 ms + 16 ms = 16.25 ms

    **Conclusion & Interpretation:**
    - **Result: 16.25 ms (I/O-Bound)**. The graph partition creates a roughly 16 ms data-transfer bottleneck that dwarfs the sub-millisecond compute time.
