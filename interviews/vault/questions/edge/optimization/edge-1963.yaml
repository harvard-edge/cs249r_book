title: 'Optimizing Large Language Models on Qualcomm AI 100: Knowledge Distillation Strategies'
scenario: A machine learning team is preparing to deploy a complex conversational AI model on a fleet of Qualcomm Cloud AI 100 accelerators. The target platform offers 32 GB LPDDR4x memory, 400 TOPS INT8 performance, and operates within a 75W power envelope. The initial large model exceeds these constraints. You propose Knowledge Distillation to create a smaller, more efficient student model.
question: How would you use logit and feature distillation to build an INT8 student for Cloud AI 100, and when is distillation better than pruning?
details:
  realistic_solution: |
    Build a smaller student architecture first, train it with logit distillation from the large teacher, then add a small number of feature-alignment losses only at high-value layers that do not create excessive activation traffic. Use QAT so the student is trained for INT8 behavior before compiling and profiling on Cloud AI 100. Prefer distillation over pruning when the original model is too large architecturally or when aggressive pruning cannot recover accuracy; prefer pruning when the model shape is already deployable and the goal is a smaller incremental latency or memory reduction.
  common_mistake: |
    **The Pitfall:** Ignoring the memory bandwidth implications of LPDDR4x for feature distillation.
    **The Rationale:** Treating edge devices like datacenter GPUs where massive intermediate feature maps can be stored in HBM.
    **The Consequence:** Feature distillation grinds to a halt due to bandwidth saturation, making it far inferior to logit matching for this hardware.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware Compute: 400 TOPS = 400,000 GOPS.
    - LPDDR4x Bandwidth: ~50 GB/s (128-bit bus width).
    - Distillation training can use teacher outputs offline; inference will run only the compact INT8 student.

    **Calculations:**
    - Logit distillation stores one teacher output per example and adds little inference-time complexity because the teacher is absent at deployment.
    - Feature distillation adds training-time activation reads/writes for each matched layer, so its cost scales with the number and size of selected feature maps.
    - Pruning keeps the same broad architecture and removes weights or channels; it works best when the remaining shapes still map efficiently to the accelerator.

    **Conclusion & Interpretation:**
    - **Result: logit-first distillation with selective features.** Distillation is better than pruning when a smaller student can meet accuracy and compile cleanly; feature losses should be used sparingly because their training cost is bandwidth-sensitive.
