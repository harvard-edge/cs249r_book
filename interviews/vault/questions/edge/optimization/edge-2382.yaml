title: 'Overlapping Autoregressive Generation with Wi-Fi Transmission'
scenario: 'An LLM serving on the Jetson AGX Orin streams generated output tokens via Wi-Fi to a local robotic control interface.'
question: 'Specify how to overlap the autoregressive INT8 token generation step with the network transmission of previous tokens to minimize inter-token latency.'
details:
  realistic_solution: 'Utilize two separate execution threads. The first thread runs the token generation matrix multiplications and pushes decoded tokens into a thread-safe ring buffer. The second thread concurrently reads from the buffer and dispatches the payload over the Wi-Fi TCP/IP stack.'
  common_mistake: |
    **The Pitfall:** Sequential execution of generation and transmission.
    **The Rationale:** Engineers might rely on simple, synchronous programming models, waiting for network I/O before returning to the model's generation loop.
    **The Consequence:** Blocking the main inference loop while waiting for the TCP ACK from the Wi-Fi stack increases latency unnecessarily.
  napkin_math: |
    **Assumptions & Constraints:**
    - Token Generation Time: 1 INT8 token generation takes 20ms.
    - Transmission Time: Wi-Fi transmission takes 5ms.

    **Calculations:**
    - Overlapped Latency: Total perceived latency becomes max(20, 5) = 20ms.

    **Conclusion & Interpretation:**
    - **Result: 20ms (Latency-Bound)**. The inter-token latency is bottlenecked by the generation time.
