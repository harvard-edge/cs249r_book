title: Knowledge Distillation for Low-Latency Object Detection on Google Coral Edge TPU
scenario: A distilled object detection model on a Google Coral Edge TPU (4 TOPS INT8, 2W) targets an end-to-end inference latency of 50ms per 224x224 input image. Assume ideal utilization of the Coral's processing capabilities, and that the vast majority of operations are INT8 MACs.
question: What is the maximum INT8 MAC budget for 50ms on the 4 TOPS Coral Edge TPU, and how would distillation preserve accuracy within it?
details:
  realistic_solution: Begin by selecting a very lightweight student architecture suitable for the Edge TPU's parallel INT8 processing. Train this student using a comprehensive knowledge distillation strategy, potentially incorporating both logit matching and feature distillation from a high-performing teacher model.
  common_mistake: |
    **The Pitfall:** Overlooking hardware constraints and proposing large FP32 models.
    **The Rationale:** Neglecting the INT8-only nature of the Coral Edge TPU and the overhead of non-MAC operations.
    **The Consequence:** The model fails to run on the TPU or massively misses the latency target.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 4 TOPS (4 * 10^12 INT8 operations/second).
    - Target latency: 50 ms (0.05 seconds).
    - 1 MAC = 2 operations (multiply and add).

    **Calculations:**
    - Max operations per inference = 4 * 10^12 * 0.05 = 2 * 10^11 INT8 ops.
    - Maximum INT8 MACs = (2 * 10^11) / 2 = 1 * 10^11 MACs.

    **Conclusion & Interpretation:**
    - **Result: 100 billion MACs (Compute-Bound)**. The distilled student model must stay strictly under a 100 billion INT8 MAC budget to meet the 50ms deadline.
