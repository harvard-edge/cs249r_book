title: Dataflow Graph Splitting Overhead
scenario: You are deploying an object detection model on a dataflow accelerator lacking local DRAM. The compiler failed to fuse a heavy Conv2D layer with a custom activation function, splitting the graph and forcing an intermediate 1920x1080x16 INT8 feature map round-trip to the host CPU.
question: Assuming the Conv2D is 52 GOPS, what latency penalty does the 1920x1080x16 INT8 round trip add over a 2 GB/s PCIe link?
details:
  realistic_solution: The 1920x1080x16 INT8 tensor means 16 channels at 1 byte per value, so the feature map is 1920 * 1080 * 16 = 33,177,600 bytes, about 33 MB. A host round trip transfers it out and back, or about 66 MB total. Over a 2 GB/s link, that adds about 33 ms of transfer latency. The Conv2D compute time is 52 GOPS / 26,000 GOPS/s = 2 ms, so the transfer adds roughly 16.5x the compute time and makes the fused operation about 17.5x slower end to end.
  common_mistake: |
    **The Pitfall:** Focusing only on the host CPU execution time for the custom activation.
    **The Rationale:** Engineers underestimate the catastrophic penalty of breaking spatial graph fusion on a dataflow architecture.
    **The Consequence:** Severe I/O bottlenecking, as streaming raw intermediate tensors over PCIe dwarfs the actual compute time.
  napkin_math: |
    **Assumptions & Constraints:**
    - Conv2D load: 52 GOPS.
    - Accelerator peak: 26 TOPS = 26,000 GOPS/s.
    - Feature map: 1920x1080x16 INT8 = 16 channels at 1 byte/value.
    - PCIe link: 2 GB/s, approximated as 2000 MB/s.

    **Calculations:**
    - Feature map size = 1920 * 1080 * 16 bytes = 33,177,600 bytes ≈ 33 MB.
    - Pure compute time = 52 GOPS / 26,000 GOPS/s = 0.002 s = 2 ms.
    - Round-trip transfer size = 33 MB write + 33 MB read = 66 MB.
    - Transfer time = 66 MB / 2000 MB/s = 0.033 s = 33 ms.
    - Transfer-only penalty vs compute = 33 ms / 2 ms = 16.5x; total split latency is about 35 ms, or 17.5x the fused compute time.

    **Conclusion & Interpretation:**
    - **Result: about 33 ms added transfer latency, making the split path about 17.5x slower than the 2 ms fused compute path.**
