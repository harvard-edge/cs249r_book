title: 'Operator Scheduling Tradeoffs on Jetson Orin GPU vs DLA'
scenario: 'You are deploying a multi-camera perception pipeline on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP, Ampere GPU + DLA accelerator). The pipeline consists of a heavy CNN backbone followed by a transformer-based fusion head. You must evaluate two operator scheduling strategies. Strategy A aggressively fuses all backbone layers and schedules the entire pipeline on the Ampere GPU to minimize memory transfers. Strategy B partitions the graph, scheduling the CNN backbone on the DLA accelerator and the transformer head on the GPU to enable concurrent execution.'
question: 'Which strategy do you choose to maximize throughput while staying within the 60W power budget, and why?'
details:
  realistic_solution: 'Strategy B is superior for this platform. The Jetson Orin DLA is specifically designed for high-efficiency CNN execution. Scheduling the backbone on the DLA offloads significant compute from the GPU, allowing the GPU and DLA to run in a pipelined fashion (concurrent execution). Because the Orin uses a unified memory architecture (32 GB LPDDR5), passing intermediate tensors between the DLA and GPU avoids PCIe transfer overhead.'
  common_mistake: 'Candidates often choose Strategy A to avoid the memory copy overhead between the DLA and GPU, assuming layer fusion on the GPU will always yield the lowest latency. They fail to account for the severe 60W power constraints and the fact that the GPU might thermal throttle.'
  napkin_math: |
    **Assumptions & Constraints:**
    - 30 FPS requires 120 sustained TOPS.
    - Strategy A (GPU-only): ~45W for 120 TOPS. Total TDP limit: 60W.
    - Strategy B (DLA+GPU): 80 TOPS DLA (~10W) + 40 TOPS GPU (~15W).

    **Calculations:**
    - GPU-only Headroom: 60W - 45W = 15W for OS/RAM (High Risk).
    - Partitioned Power: 10W (DLA) + 15W (GPU) = 25W.
    - Partitioned Headroom: 60W - 25W = 35W for OS/RAM.

    **Conclusion & Interpretation:**
    - **Result: 25W Compute Power (Power-Bound)**. Scheduling across parallel accelerators vastly lowers power, preventing thermal throttling.
