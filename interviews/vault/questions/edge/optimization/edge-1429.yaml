title: Distillation Arithmetic Intensity on Streaming Edge Accelerators
scenario: Your team is deploying an object detector on an edge dataflow accelerator with limited on-chip memory and a 4 GB/s effective off-chip transfer path for uncached tensors. You used knowledge distillation to train a compact student model that requires only 1 GOP per inference with an arithmetic intensity of 10 OPS/byte. Your baseline is a pruned teacher model requiring 5 GOP per inference with an arithmetic intensity of 100 OPS/byte.
question: Why is the 1 GOP distilled student slower than the 5 GOP pruned teacher when both are constrained by a 4 GB/s off-chip transfer path?
details:
  realistic_solution: On a streaming dataflow accelerator, performance can be limited by off-chip tensor traffic rather than by arithmetic count. The distilled student has much lower arithmetic intensity, so each operation requires more bytes from the transfer path. Its 1 GOP at 10 OPS/byte implies 100 MB of traffic per inference, while the pruned teacher's 5 GOP at 100 OPS/byte implies only 50 MB. With a 4 GB/s transfer path, the student tops out near 40 FPS and the teacher near 80 FPS, so the model with fewer operations is slower because it moves more data per useful operation.
  common_mistake: |
    **The Pitfall:** Assuming that reducing total operations always reduces latency.
    **The Rationale:** Candidates assume lower GOPS through distillation automatically reduces latency, failing to consider arithmetic intensity and memory bandwidth.
    **The Consequence:** Deploying a "smaller" model that starves the compute units because it cannot fetch weights and activations fast enough, worsening performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Effective off-chip transfer bandwidth: 4 GB/s.
    - Distilled Student: 1 GOP per inference, AI = 10 OPS/byte.
    - Pruned Teacher: 5 GOP per inference, AI = 100 OPS/byte.

    **Calculations:**
    - Distilled Student Traffic: 1 GOP / 10 OPS/byte = 0.1 GB/frame.
    - Distilled Max FPS: 4 GB/s / 0.1 GB/frame = 40 FPS.
    - Pruned Teacher Traffic: 5 GOP / 100 OPS/byte = 0.05 GB/frame.
    - Pruned Max FPS: 4 GB/s / 0.05 GB/frame = 80 FPS.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound (Memory-Bound).** Both models are memory-bound, but the pruned teacher is 2x faster (80 FPS vs 40 FPS) due to its higher arithmetic intensity.
