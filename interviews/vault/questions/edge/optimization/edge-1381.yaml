title: Sizing the Distilled INT8 Student Model
scenario: After distilling a 70B parameter teacher model, you are sizing an INT8 student model for deployment on a Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8) for on-premise inference. The student model requires 2 operations (1 MAC) per parameter per token generated.
question: What is the largest INT8 student model that can sustain 10,000 tokens/s at 50% of 400 TOPS, and how much memory remains for KV cache?
details:
  realistic_solution: First, calculate the effective operations per second based on the target utilization. Divide this compute budget by the strict SLA of 10,000 tokens/s to determine the maximum allowable operations per single token generation step. Given the 2 ops/parameter rule, this yields the maximum parameter count. Finally, calculate the static INT8 memory footprint of these weights and subtract it from the total 32GB VRAM to determine the remaining headroom for dynamic KV cache and intermediate activations.
  common_mistake: |
    **The Pitfall:** Conflating TOPS (Tera-Operations) with MACs (Multiply-Accumulates) or miscalculating INT8 footprint.
    **The Rationale:** Candidates frequently forget that 1 MAC equals 2 operations (one multiply, one add), or mistakenly allocate 2 bytes per weight assuming FP16 precision.
    **The Consequence:** Sizing calculations are off by 2x or 4x, leading to deployed models that either drastically underutilize the expensive hardware or immediately crash with OOM errors.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 400 TOPS INT8 peak, 32 GB RAM.
    - Utilization Target: 50% (200 effective TOPS).
    - Throughput Target: 10,000 tokens/sec.
    - Math: 2 operations per parameter per token.

    **Calculations:**
    - Operations available per token = 200e12 Ops/sec / 10,000 tokens/sec = 20e9 Ops/token (20 GigaOps).
    - Max parameter count = 20e9 Ops / 2 Ops/parameter = 10e9 parameters (10 Billion).
    - INT8 Weight memory = 10B params * 1 byte/param = 10 GB.
    - Remaining Memory = 32 GB Total - 10 GB Weights = 22 GB.

    **Conclusion & Interpretation:**
    - **Result: 10B Parameters, 22GB Cache (Compute-Bound)**. The configuration perfectly balances the compute-bound SLA with memory constraints.
