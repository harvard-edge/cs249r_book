title: JIT Tracing Memory Leak
scenario: An NLP model deployed on an edge CPU processes variable-length text sequences. Inference takes 50ms, using 200MB memory. Over long runs with random sequence lengths, memory grows by roughly 2MB each time a previously unseen tensor shape appears until the system OOMs at 4GB.
question: Why does memory grow by 2MB per new variable-length tensor shape on the edge CPU, eventually OOMing at 4GB?
details:
  realistic_solution: The framework is shape-specializing its JIT or graph compiler cache. Each previously unseen sequence length creates a separate compiled graph and associated workspace of about 2MB, so random variable-length inputs grow the cache until memory is exhausted. Bucket or pad sequence lengths to a small set of supported shapes, use dynamic-shape kernels where available, and configure a bounded compiled-graph cache or eviction policy so rare lengths cannot accumulate indefinitely.
  common_mistake: |
    **The Pitfall:** Blaming the failure on mundane heap fragmentation or basic Python garbage collection delays.
    **The Rationale:** Engineers default to generic software-level memory hygiene diagnoses without interrogating compiler-level tensor shape logic.
    **The Consequence:** Teams squander vital hours debugging standard code objects while the immutable underlying JIT architecture continues leaking.
  napkin_math: |
    **Assumptions & Constraints:**
    - Edge Limit: 4 GB (4000 MB).
    - Base Memory: 200 MB.
    - JIT compilation tax: 2 MB per unique tensor shape.

    **Calculations:**
    - Available Buffer = 4000 MB - 200 MB = 3800 MB.
    - Unique shapes required to OOM = 3800 MB / 2 MB/shape = 1900 unique shapes.
    - The 50ms inference time does not mean one new shape every call. OOM occurs after roughly 1900 distinct lengths have appeared; elapsed time depends on how quickly the workload discovers new lengths.
    - Bucketing to 16 or 32 padded lengths caps the cache at about 32 * 2 MB = 64 MB, rather than allowing thousands of shapes to accumulate.

    **Conclusion & Interpretation:**
    - **Result: unbounded shape-cache growth (Compiler Cache Bound)**. The failure is caused by shape-specialized compiled graphs and workspaces, not ordinary heap leakage; bucketing, padding, dynamic-shape execution, or cache limits bound the memory growth.
