title: Implementing efficient knowledge distillation with autograd on Jetson Orin
scenario: You are performing on-device knowledge distillation on Jetson Orin to adapt a compressed 2M parameter student model using soft labels from a 20M parameter teacher. The teacher is frozen. Current implementation runs both models in the same forward pass, consuming 22GB of activation memory — nearly 70% of Orin's 32GB.
question: How would you reduce activation memory for on-device distillation when the 20M-parameter teacher is frozen?
details:
  realistic_solution: Run teacher inference with torch.no_grad() to get soft labels, then build the loss against the student output. Only the student needs an autograd graph; the frozen teacher can release intermediate activations immediately after its forward pass. The exact memory savings depend on batch size, input or sequence length, precision, and layer shapes, but disabling autograd for the teacher removes the teacher activation graph rather than just freezing its parameters.
  common_mistake: |
    **The Pitfall:** Running teacher and student in the same forward-backward pass.
    **The Rationale:** This allows the computational graph to actively track both models simultaneously.
    **The Consequence:** The teacher's activations are stored for a backward pass that never happens, wasting massive amounts of memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - Teacher is frozen and does not need gradients.
    - Activation memory scales with batch size, input or sequence length, precision, and layer shapes.
    - Let tracked teacher activations be A_teacher and tracked student activations be A_student.

    **Calculations:**
    - Without no_grad: retained activation memory is approximately A_teacher + A_student.
    - With torch.no_grad() on the teacher: retained activation memory is approximately A_student.
    - Savings = A_teacher, minus any temporary teacher logits or buffers needed for the loss.

    **Conclusion & Interpretation:**
    - **Result: teacher activation graph removed (Memory-Capacity-Bound).** Explicitly disabling autograd for frozen models prevents retaining activations for a backward pass that will never update the teacher.
