title: Implementing efficient knowledge distillation with autograd on Jetson Orin
scenario: You are performing on-device knowledge distillation on Jetson Orin to adapt a compressed 2M parameter student model using soft labels from a 20M parameter teacher. The teacher is frozen. Current implementation runs both models in the same forward pass, consuming 22GB of activation memory — nearly 70% of Orin's 32GB.
question: How would you reduce activation memory for on-device distillation when the 20M-parameter teacher is frozen?
details:
  realistic_solution: 'Run teacher inference with torch.no_grad() to get soft labels. Only the student''s computational graph needs to be built. This reduces activation memory from 22GB to ~2GB (student only). In code: `with torch.no_grad(): teacher_logits = teacher(x)` followed by loss computation.'
  common_mistake: Running teacher and student in the same forward-backward pass, allowing the computational graph to track both models. The teacher's activations are stored for a backward pass that never happens.
  napkin_math: |
    **Assumptions & Constraints:**
    - Teacher: 20M parameters (~20GB activations if tracked)
    - Student: 2M parameters (~2GB activations)

    **Calculations:**
    - Total without no_grad = 20GB + 2GB = 22GB
    - Total with torch.no_grad() on teacher = 2GB (teacher activations immediately freed)
    - Savings = 22GB - 2GB = 20GB

    **Conclusion & Interpretation:**
    - **Result: 20GB Saved (Memory-Capacity-Bound)**. Explicitly disabling autograd for frozen models prevents massive activation retention during the forward pass.
