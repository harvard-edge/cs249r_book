title: Multi-Model Compilation Strategy for NVIDIA Jetson Orin
scenario: You are designing the inference compilation pipeline for an autonomous robot running on an NVIDIA Jetson Orin. The system must concurrently execute a CNN-based object detector, a Transformer-based planner, and a sensor fusion model within a strict 60W TDP budget.
question: How would you map the detector, planner, and fusion graphs across Jetson Orin's GPU and DLAs within the 60W and 32 GB limits?
details:
  realistic_solution: The optimal design leverages a compiler like TensorRT to partition the execution graph ahead-of-time based on hardware capabilities. The standard convolution layers of the object detector should be explicitly pinned to the DLAs for power-efficient INT8 execution. Meanwhile, the Transformer's attention mechanisms and any custom operators are assigned to the Ampere GPU. This hardware-aware compilation strategy ensures the 60W TDP is respected by offloading sustained workloads to the DLA, while utilizing unified memory to eliminate host-to-device transfer latency.
  common_mistake: |
    **The Pitfall:** Compiling all models to run exclusively on the Ampere GPU.
    **The Rationale:** Candidates default to the GPU for all workloads, ignoring the specialized, highly power-efficient DLAs available on the Orin SoC.
    **The Consequence:** This approach spikes power consumption beyond the 60W TDP and causes contention, whereas offloading standard CNN convolutions to the DLA would free up the GPU and lower power draw.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute Budget: CNN (100 TOPS) + Transformer (80 TOPS) = 180 TOPS
       - Hardware Limit: 275 TOPS INT8 peak performance
       - Hardware Limit: 32 GB LPDDR5 shared memory with 204 GB/s peak bandwidth
       - Input Data: 4 cameras at 1080p/30FPS
    2. **Calculations:**
       - Compute Check: 180 TOPS < 275 TOPS
       - Input Bandwidth: 4 * 1920 * 1080 * 3 bytes * 30 FPS = ~746 MB/s
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** Aggressive operator fusion is required to reduce intermediate activation reads/writes across the 3 models so they stay well below the 204 GB/s limit.
