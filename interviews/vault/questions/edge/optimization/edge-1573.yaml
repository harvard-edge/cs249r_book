title: Knowledge Distillation to INT8 for Google Coral
scenario: You are distilling a large FP32 teacher model into a smaller INT8 student model to run on a
  Google Coral Edge TPU, which operates at 4 TOPS INT8 with a strict 2W power budget. The compact student
  model requires exactly 2 GOPS per inference.
question: What max FPS and energy per inference do you get, and what INT8-aware distillation step is needed
  for Coral?
details:
  realistic_solution: For the Google Coral Edge TPU, the student model must be fully quantized to INT8.
    The knowledge distillation process should incorporate Quantization-Aware Training (QAT) so the INT8
    student can accurately mimic the FP32 teacher's logits without severe accuracy drop. The theoretical
    max throughput is found by dividing the hardware's total compute capacity by the model's compute requirement.
  common_mistake: '**The Pitfall:** Forgetting that the Edge TPU mandates INT8 quantization (missing QAT)
    and misaligning TOPS and GOPS.

    **The Rationale:** Candidates fail to account for the Edge TPU''s limited operator support and strictly
    quantized execution environment.

    **The Consequence:** Proposing un-deployable models or overestimating performance due to arithmetic
    magnitude errors.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Hardware compute: 4 TOPS = 4,000 GOPS.

    - Power budget: 2W = 2 Joules/second.

    - Model compute requirement: 2 GOPS per inference.


    **Calculations:**

    - Max inference rate = 4,000 GOPS / 2 GOPS/inference = 2,000 inferences per second (FPS).

    - Energy per inference = 2 Joules / 2,000 inferences = 0.001 Joules/inference (1 mJ).


    **Conclusion & Interpretation:**

    - **Result: 2,000 FPS (Compute-Bound)**. A fully quantized INT8 model achieves massive throughput
    and efficiency, leveraging the TPU''s compute density.

    '
