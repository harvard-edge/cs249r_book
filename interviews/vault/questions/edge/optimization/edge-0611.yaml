title: The Autonomous Drone Reflex Gap
scenario: 'You are the tech lead for an agricultural AI startup. Your fleet of autonomous drones uses a large Vision-Language Model (VLM) to identify crop diseases from aerial footage. The current system runs on a Jetson AGX Orin with a strict 30W power budget, and it barely achieves the required 15 FPS. An urgent new business requirement has come in: the drones must also detect and issue an immediate alert for a highly invasive locust species, which requires running a second, lightweight detection model. Your constraints are to stay within the 30W power envelope and on the existing Orin hardware.'
question: How would you run the VLM and locust detector within 30W, double the VLM effective rate to 30 FPS, and alert within 100ms?
details:
  realistic_solution: |
    Treat the locust detector as the hard-real-time path and the VLM as a lower-rate semantic path. Run the lightweight detector continuously on the DLA at 30 FPS, with a preallocated input queue and a direct alert path so detections are emitted without waiting for the VLM. Keep the VLM on the GPU, but convert it to a 30 FPS effective stream by using temporal scheduling: process alternating frames at 15 FPS, reuse tracked regions and cached visual embeddings for the intervening frames, and only force an immediate VLM pass when the DLA trigger marks a high-risk frame. Use INT8/FP16 mixed precision, CUDA graph capture, and overlapped camera pre-processing so the GPU and DLA pipelines do not serialize.

    This does not make the full VLM physically run at 30 fresh inferences per second; it delivers 30 FPS effective outputs while preserving a <100ms alert path for locust events within the same 30W envelope.
  common_mistake: |
    **The Pitfall:** Engineers often propose brute-force solutions like simply running the two models sequentially.
    **The Rationale:** Another common mistake is focusing only on one type of optimization (e.g., only quantization) without a holistic system view.
    **The Consequence:** This would halve the frame rate, violating the requirements.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current VLM path: 15 fresh inferences/s at the 30W Orin power mode, or 66.7ms per fresh VLM inference.
    - Required VLM output cadence: 30 FPS effective, not 30 full VLM forward passes/s.
    - Locust detector on DLA: ~2ms/frame at 30 FPS.
    - Alert deadline: 100ms.

    **Calculations:**
    - VLM fresh inference cadence remains 15 FPS: one VLM result every 66.7ms.
    - Effective VLM cadence reaches 30 FPS by producing one cached/tracked update between each fresh VLM result: 15 fresh + 15 propagated = 30 outputs/s.
    - Locust DLA latency per frame is ~2ms; adding camera ingest and alert dispatch budget of ~10-20ms remains well below 100ms.
    - Power remains bounded by the configured 30W Orin mode because the GPU VLM workload is not doubled; DLA work is scheduled inside the same platform power envelope and must be verified with telemetry, not added as a separate 30W + 2W budget.

    **Conclusion & Interpretation:**
    - **Result: Feasible only with effective-rate scheduling.** The architecture meets 30 FPS effective VLM output and <100ms locust alerts by keeping the full VLM at 15 FPS, adding DLA-triggered detection, and avoiding a second full-rate GPU model that would exceed the 30W constraint.
