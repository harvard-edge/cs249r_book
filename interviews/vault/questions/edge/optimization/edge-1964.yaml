title: Optimizing Edge Inference with Knowledge Distillation on Hailo-8
scenario: Your team is deploying an object detection model (YOLOv5s) to the Hailo-8 AI accelerator. The current full-size teacher model achieves 90% mAP but requires 50ms inference time, consuming close to its peak 2.5W power budget. The goal is to deploy a student model that maintains at least 88% mAP, achieves <10ms latency, and significantly reduces average power consumption.
question: How would you distill a 90% mAP YOLOv5s teacher into a Hailo-8 student that achieves at least 88% mAP, <10ms latency, and lower power?
details:
  realistic_solution: |
    Use a smaller YOLO-style detector student rather than a generic classifier backbone, keeping detection heads and feature-pyramid outputs compatible with the deployment task. Train it with the normal box, objectness, and class losses plus detector-specific distillation: soften class/objectness logits, match teacher box distributions or decoded boxes, and align selected FPN feature maps with projection layers when channel counts differ. Run QAT during the later training stages so the student learns INT8 behavior, then compile with the Hailo SDK and profile the actual graph for unsupported layers, memory pressure, latency, mAP, and average power. Iterate width/depth multipliers and feature-distillation weight until the compiled student reaches at least 88% mAP under 10ms with lower measured power.
  common_mistake: |
    **The Pitfall:** Only quantizing the teacher model or ignoring the Hailo-8 dataflow architecture.
    **The Rationale:** Candidates overlook Knowledge Distillation and fail to optimize the student architecture for INT8 efficiency.
    **The Consequence:** Sub-optimal accuracy drops and failure to meet the 10ms latency and 1W average power targets.
  napkin_math: |
    **Assumptions & Constraints:**
       - Hardware: Hailo-8 (26 TOPS peak, up to 2.5W).
       - Target Latency: < 10ms.
       - Target Power: < 1.0W average.
    **Calculations:**
       - Max INT8 Operations (for 10ms): 26 TOPS * 0.010s = 260 GOPS.
       - Current Energy (50ms at 2.5W): 0.050s * 2.5W = 0.125 Joules.
       - Target Energy (10ms at 1W): 0.010s * 1.0W = 0.010 Joules.
       - Energy reduction needed: (0.125J - 0.010J) / 0.125J = 92%.
       - The 260 GOPS figure is an ideal peak compute budget; the usable model size must be determined from compiled latency and power, not inferred as a fixed GFLOP threshold.
    **Conclusion & Interpretation:**
       - **Result: measured detector student required.** The budget demands roughly a 5x latency reduction and up to 92% lower energy per inference versus the teacher, so the YOLO-style student must be selected by Hailo-8 profiling rather than by an unsupported GFLOP rule.
