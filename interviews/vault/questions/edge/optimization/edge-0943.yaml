title: Edge New 0004
scenario: A video analytics model on a T4 GPU processes high-resolution frames. Increasing resolution from 1080p to 4K multiplies FLOPs by 4x (to 10GFLOPs) and activation memory by 4x (to 40MB).
question: How will FPS scale when the video model moves from 1080p to 4K on the T4, and what bottleneck dominates?
details:
  realistic_solution: 'Because CNN architectures maintain high arithmetic intensity, the bottleneck scales linearly with the compute capability of the GPU. Calculate the memory bandwidth ceiling vs the compute ceiling to confirm that the GPU hits its FLOP limit before its memory limit, resulting in a proportional 4x drop in FPS.'
  common_mistake: |
    **The Pitfall:** Assuming the 4x activation size pushes the model into a memory-bound cliff.
    **The Rationale:** Candidates see a 40MB activation footprint and blindly assume memory bandwidth is saturated without doing the arithmetic intensity check.
    **The Consequence:** Unnecessary optimization of memory access patterns when the system is actually starved for raw compute.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - T4 GPU: 65 TFLOPS, 320 GB/s bandwidth.
       - 4K workload: 10 GFLOPs compute, 40 MB memory movement per frame.
    2. **Calculations:**
       - Compute limit (max FPS) = 65,000 GFLOPs / 10 GFLOPs = 6,500 FPS.
       - Memory limit (max FPS) = 320,000 MB/s / 40 MB = 8,000 FPS.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound (Exact 4x Drop)**. Since the compute limit (6,500 FPS) is lower than the memory limit (8,000 FPS), performance is bounded by raw arithmetic, making the scaling penalty a strict linear 4x.
