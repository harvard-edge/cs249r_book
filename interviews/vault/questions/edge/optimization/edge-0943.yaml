title: 'T4 1080p-to-4K Scaling: Compute vs Memory Bottleneck'
scenario: A video analytics model on a T4 GPU processes high-resolution frames. Increasing resolution from 1080p to 4K multiplies FLOPs by 4x (to 10GFLOPs) and activation memory by 4x (to 40MB).
question: How will FPS scale when the video model moves from 1080p to 4K on the T4, and what bottleneck dominates?
details:
  realistic_solution: |
    Treat the 4K frame as 4x the 1080p work: 10 GFLOPs and 40MB, so the 1080p frame is 2.5 GFLOPs and 10MB. On the T4, both resolutions remain compute-bound because the compute FPS ceiling is lower than the memory-bandwidth ceiling. Therefore the 4K throughput is one quarter of the 1080p throughput under this scaling assumption: about 6,500 FPS versus about 26,000 FPS in the idealized roofline model.
  common_mistake: |
    **The Pitfall:** Assuming the 4x activation size pushes the model into a memory-bound cliff.
    **The Rationale:** Candidates see a 40MB activation footprint and blindly assume memory bandwidth is saturated without doing the arithmetic intensity check.
    **The Consequence:** Unnecessary optimization of memory access patterns when the system is actually starved for raw compute.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - T4 GPU: 65 TFLOPS, 320 GB/s bandwidth.
       - 4K workload: 10 GFLOPs compute, 40 MB memory movement per frame.
       - 1080p workload is 1/4 of 4K: 2.5 GFLOPs and 10 MB per frame.
    2. **Calculations:**
       - 1080p compute limit = 65,000 GFLOPs/s / 2.5 GFLOPs = 26,000 FPS.
       - 1080p memory limit = 320,000 MB/s / 10 MB = 32,000 FPS.
       - 4K compute limit = 65,000 GFLOPs/s / 10 GFLOPs = 6,500 FPS.
       - 4K memory limit = 320,000 MB/s / 40 MB = 8,000 FPS.
    3. **Conclusion & Interpretation:**
       - **Result: compute-bound at both resolutions.** Under the stated 4x scaling, ideal FPS drops from 26,000 to 6,500, a 4x reduction, because the compute ceiling remains the tighter roofline limit.
