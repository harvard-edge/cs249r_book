title: Calculate Precision Throughput Delta on Cloud AI 100
scenario: You are porting an object detection model to an on-premise Qualcomm Cloud AI 100 accelerator. The model requires 100 GOPS per inference. The accelerator is rated for 400 TOPS in INT8. Assuming FP16 performance is exactly half of INT8 (200 TOPS) and your workload achieves 50% hardware utilization in both precisions.
question: Calculate the absolute difference in throughput (FPS) when quantizing the model from FP16 to INT8.
details:
  realistic_solution: First, determine the effective GOPS for both FP16 and INT8 by multiplying the peak TOPS by 1000 and then by the 50% utilization factor. Then, divide each effective GOPS value by the model's 100 GOPS requirement to find the FPS for each precision. Finally, subtract the FP16 FPS from the INT8 FPS to find the delta.
  common_mistake: |
    **The Pitfall:** Forgetting to convert TOPS to GOPS.
    **The Rationale:** Candidates blindly divide TOPS by GOPS, missing the 1000x magnitude difference, or fail to apply the 50% utilization factor.
    **The Consequence:** Inaccurate throughput estimations off by a factor of 1000, fundamentally misrepresenting the accelerator's capability.
  napkin_math: |
    - **INT8 Effective:** 400 TOPS * 1000 * 0.5 = 200,000 GOPS.
    - **INT8 FPS:** 200,000 GOPS / 100 GOPS/inf = 2,000 FPS.
    - **FP16 Effective:** 200 TOPS * 1000 * 0.5 = 100,000 GOPS.
    - **FP16 FPS:** 100,000 GOPS / 100 GOPS/inf = 1,000 FPS.
    - **Difference:** 2,000 - 1,000 = **1,000 FPS.**
