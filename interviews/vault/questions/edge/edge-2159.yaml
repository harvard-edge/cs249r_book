title: Edge Tensor Split Communication Budget
scenario: Two edge accelerators split a matrix layer tensor-parallel. Each frame requires
  two 8 MB activation reductions over a 40 GB/s board link. Estimate communication
  time per frame and compare with a 33 ms deadline.
question: How much communication time do two 8 MB tensor-parallel reductions add over
  a 40 GB/s edge board link?
details:
  realistic_solution: The payload is 16 MB per frame. At 40 GB/s, the transfer lower
    bound is 16 MB / 40,000 MB/s = 0.4 ms. This is small relative to a 33 ms deadline,
    but synchronization overhead and repeated layers still matter.
  common_mistake: Rejecting tensor parallelism solely because it communicates, without
    sizing the activation payload.
  napkin_math: Two reductions = 16 MB. Time = 16 / 40,000 s = 0.0004 s = 0.4 ms.
