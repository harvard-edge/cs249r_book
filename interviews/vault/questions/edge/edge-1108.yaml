title: 'Edge Queueing Theory Evaluation: Coral Edge TPU vs Hailo-8 for TinyML Inference'
scenario: Compare Coral Edge TPU (4 TOPS, 2W) vs Hailo-8 (26 TOPS INT8, 2.5W) for
  a keyword detection system with λ=1000 inf/s (short audio windows). Model requires
  0.003 TOPS (3 GOPS). Analyze M/D/1 queueing for each, compute utilization, P99 latency,
  and total power for 10 deployed nodes.
question: For the Coral Edge TPU at λ=1000/s and μ=1333/s, what is the correct M/D/1
  queue wait before comparing to Hailo-8?
details:
  realistic_solution: 'M/D/1 Wq = ρ/(2μ(1-ρ)). With ρ=0.75, μ=1333: Wq = 0.75/(2×1333×0.25)
    = 1.125ms (not 0.84ms).'
  common_mistake: Not recognizing that both platforms are wildly overprovisioned for
    3 GOPS at 1000 inf/s (3 TOPS total needed vs 4 TOPS and 26 TOPS available), making
    the choice about power, cost, and ecosystem rather than performance.
  napkin_math: 'M/D/1 queue: λ=1000/s, service time=0.75ms → μ=1333/s, ρ=1000/1333=0.75.
    Wq = ρ/(2μ(1-ρ)) = 0.75/(2×1333×0.25) = 0.75/666.5 = 0.001125s = 1.125ms (not
    0.84ms from ρ²: 0.5625/666.5 = 0.000844s = 0.84ms — that is the ρ² error).'
