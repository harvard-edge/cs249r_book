title: 'Edge Queueing Theory Evaluation: Coral Edge TPU vs Hailo-8 for TinyML Inference'
scenario: Compare Coral Edge TPU vs Hailo-8 for a keyword detection system with λ=1000 inf/s (short audio windows). Model requires 0.003 TOPS (3 GOPS). Analyze M/D/1 queueing for each, compute utilization, P99 latency, and total power for 10 deployed nodes.
question: For the Coral Edge TPU at λ=1000/s and μ=1333/s, what is the correct M/D/1 queue wait Wq before comparing to Hailo-8?
details:
  realistic_solution: 'With ρ=0.75 and μ=1333, the correct Wq is ~1.125ms.'
  common_mistake: |
    **The Pitfall:** Focusing purely on queueing performance rather than power and cost.
    **The Rationale:** Candidates fail to recognize that both platforms are massively overprovisioned for a 3 GOPS workload at 1000 inf/s.
    **The Consequence:** Recommending an overpowered accelerator based on microscopic latency differences instead of practical edge constraints.
  napkin_math: |
    - **M/D/1 Parameters:** λ = 1000/s, service time = 0.75ms → μ = 1333/s.
    - **Utilization (ρ):** ρ = λ / μ = 1000 / 1333 = 0.75.
    - **Queue Wait (Wq):** Wq = ρ / (2 * μ * (1 - ρ)).
    - **Calculation:** Wq = 0.75 / (2 * 1333 * 0.25) = 0.75 / 666.5.
    - **Result:** Wq = 0.001125 seconds = **1.125 ms**.
