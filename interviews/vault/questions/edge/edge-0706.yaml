title: The Functional Safety Redundancy Cost
scenario: Your autonomous vehicle perception system must meet ISO 26262 ASIL-D. The safety architecture requires a redundant perception path: if the primary neural network fails or produces an implausible result, a secondary path must independently detect obstacles within 50ms. Your primary path runs on the Orin's GPU (YOLOv8m, 25ms). The naive approach is to duplicate everything - second GPU, second model, second sensor set. The CFO says the $1,200 BOM increase per vehicle is unacceptable across a 50,000-unit fleet.
question: How would you design an ASIL-D redundant perception path within 50ms without duplicating the GPU, model, and sensor hardware?
details:
  realistic_solution: 'Design an **asymmetric redundancy** architecture where the secondary path is deliberately simpler, cheaper, and uses different hardware.'
  common_mistake: |
    **The Pitfall:** Using the same primary GPU to run a backup model.
    **The Rationale:** It saves hardware costs and seems like a logical software-only fallback.
    **The Consequence:** Violates ISO 26262 independence requirements since a common-cause GPU failure (power rail fault, driver crash) takes out both paths simultaneously.
  napkin_math: |
    - **Power Overhead:** 5W (secondary) / 200W (primary) = 2.5% (vs 100% for full duplication).
    - **Cost Overhead:** $160 (secondary) / $2,000 (primary) = 8% (vs 60% for full duplication).
    - **Synchronization Latency:** The arbitrator compares outputs every frame (33ms).
    - **Worst Case:** Primary fails at t=0, arbitrator detects at t=33ms, secondary result available at t=10ms (computed in parallel).
    - **Failover Latency:** **33ms** (one frame, well within the 50ms requirement).
