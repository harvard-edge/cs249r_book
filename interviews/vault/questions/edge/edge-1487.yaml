title: Architecting Structured Sparsity on Jetson Orin
scenario: You are deploying a 15-billion parameter sensor fusion model on an NVIDIA
  Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP) for an autonomous ground vehicle.
  The system currently misses its 20 FPS target due to memory bandwidth and compute
  bottlenecks. The research team proposes using magnitude-based unstructured pruning
  to achieve 80% sparsity. Evaluate this proposal and architect a hardware-aware pruning
  and deployment strategy that utilizes both the Ampere GPU and DLA accelerator to
  meet the strict performance and power constraints.
question: Would you use 80% unstructured pruning for the 15B Jetson Orin model, and
  what hardware-aware sparsity strategy would you deploy?
details:
  realistic_solution: 'Reject the unstructured pruning in favor of 2:4 structured
    sparsity, which is natively supported by the Ampere GPU''s Sparse Tensor Cores.
    Architect the system to partition the workload: map the 2:4 sparse compute-heavy
    transformer blocks to the Ampere GPU to effectively double the INT8 throughput,
    and offload dense, standard feature extraction convolutions to the DLA. This design
    leverages the full 275 TOPS budget and keeps power consumption strictly within
    the 60W TDP.'
  common_mistake: Candidates often accept the unstructured pruning proposal, failing
    to realize that Ampere GPUs and DLAs cannot accelerate unstructured sparsity efficiently
    due to irregular memory access patterns. They also frequently ignore the memory
    bandwidth limitations of the shared LPDDR5 memory pool and fail to partition the
    workload across heterogeneous compute units.
  napkin_math: A 15B parameter model in INT8 requires 15 GB of memory. At 20 FPS,
    streaming dense weights requires 15 GB * 20 = 300 GB/s of bandwidth, which exceeds
    the Orin's typical ~204 GB/s LPDDR5 limit. Applying 2:4 structured sparsity compresses
    the stored weights by 50% to 7.5 GB. The required memory bandwidth drops to 7.5
    GB * 20 = 150 GB/s, safely within hardware limits, while leaving ample room in
    the 32 GB LPDDR5 for OS overhead, sensor buffers, and activations.
