title: Architecting Structured Sparsity on Jetson Orin
scenario: You are deploying a 15-billion parameter sensor fusion model on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP) for an autonomous ground vehicle. The system currently misses its 20 FPS target due to memory bandwidth and compute bottlenecks. The research team proposes using magnitude-based unstructured pruning to achieve 80% sparsity.
question: Would you use 80% unstructured pruning for the 15B Jetson Orin model, and what hardware-aware sparsity strategy would you deploy?
details:
  realistic_solution: Reject the unstructured pruning in favor of 2:4 structured sparsity, which is natively supported by the Ampere GPU's Sparse Tensor Cores. Architect the system to partition the workload: map the 2:4 sparse compute-heavy transformer blocks to the Ampere GPU to effectively double the INT8 throughput, and offload dense, standard feature extraction convolutions to the DLA. This leverages the full 275 TOPS budget within the 60W TDP.
  common_mistake: |
    **The Pitfall:** Accepting unstructured sparsity for hardware acceleration.
    **The Rationale:** Candidates fail to realize that Ampere GPUs and DLAs cannot accelerate unstructured sparsity efficiently due to irregular memory access patterns.
    **The Consequence:** No actual inference speedup is realized, and memory bandwidth remains bottlenecked despite the theoretical reduction in parameters.
  napkin_math: |
    1. **Dense Model Cost:** A 15B parameter model in INT8 requires 15 GB of memory.
    2. **Dense Bandwidth:** At 20 FPS, streaming dense weights requires 15 GB * 20 = 300 GB/s of bandwidth, exceeding the Orin's ~204 GB/s limit.
    3. **Structured Sparsity:** Applying 2:4 structured sparsity compresses the stored weights by 50% to 7.5 GB.
    4. **Sparse Bandwidth:** The required memory bandwidth drops to 7.5 GB * 20 = **150 GB/s**, safely within hardware limits.
