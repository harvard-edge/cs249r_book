title: Architecting Structured Sparsity on Jetson Orin
scenario: You are deploying a 15-billion parameter sensor fusion model on an edge accelerator for an autonomous ground vehicle. The system currently misses its 20 FPS target due to memory bandwidth and compute bottlenecks. The research team proposes using magnitude-based unstructured pruning to achieve 80% sparsity.
question: Would you use 80% unstructured pruning for this edge model, and what hardware-aware sparsity strategy would you deploy?
details:
  realistic_solution: 'Reject the unstructured pruning in favor of 2:4 structured sparsity, which is natively supported by the GPU''s Sparse Tensor Cores. Architect the system to partition the workload: map the 2:4 sparse compute-heavy transformer blocks to the GPU to double the INT8 throughput, and offload standard dense convolutions to the DLA coprocessor.'
  common_mistake: |
    **The Pitfall:** Accepting unstructured sparsity for hardware acceleration.
    **The Rationale:** Candidates fail to realize that modern GPUs and DLAs cannot accelerate unstructured sparsity efficiently due to irregular memory access patterns.
    **The Consequence:** No actual inference speedup is realized, and memory bandwidth remains bottlenecked despite the theoretical reduction in parameters.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target hardware bandwidth: ~204 GB/s.
    - Model: 15B parameter model (INT8 format) running at 20 FPS.

    **Calculations:**
    - Dense Model Cost: 15B INT8 parameters = 15 GB of memory.
    - Dense Bandwidth required at 20 FPS: 15 GB * 20 = 300 GB/s (exceeds 204 GB/s limit).
    - Structured Sparsity: Applying 2:4 structured sparsity compresses the stored weights by 50% to 7.5 GB.
    - Sparse Bandwidth required: 7.5 GB * 20 = 150 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 150 GB/s (Bandwidth-Bound)**. Unstructured sparsity fails to relieve the 300 GB/s burden. 2:4 structured sparsity successfully drops bandwidth below the 204 GB/s hardware limit, allowing deployment.
