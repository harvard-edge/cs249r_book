title: Dual Hailo-8 PCIe Sync
scenario: A dual Hailo-8 edge node runs a pipelined ResNet-101 via a PCIe Gen3 x4
  switch. Stage 1 takes 4ms; Stage 2 takes 6ms.
question: Determine the effective pipeline throughput and synchronization stall per
  batch using a 1F1B schedule.
details:
  realistic_solution: Pipeline throughput is bounded by the slowest stage (6ms). With
    1F1B, the synchronization barrier latency includes the 4GB/s PCIe transfer of
    intermediate activations plus the compute imbalance. The faster stage stalls for
    2ms waiting for the slower stage to accept the next microbatch, yielding a throughput
    of 166.6 FPS.
  common_mistake: Adding the stage latencies together to calculate throughput, ignoring
    that pipeline parallelism masks the faster stage's execution time.
  napkin_math: Pipeline Latency = max(4ms, 6ms) = 6ms/batch. Throughput = 1000ms /
    6ms = 166.6 FPS. Stall = 6 - 4 = 2ms.
