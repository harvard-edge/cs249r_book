title: The INT8 Memory Payoff
scenario: You're optimizing a vision model for an autonomous vehicle's perception system, running on a
  Jetson AGX Orin. The model's weights are currently stored in FP16 and occupy 120 MB of DRAM. To reduce
  memory bandwidth pressure, you decide to quantize the weights to INT8. Explain the new memory footprint
  of the weights after quantization.
details:
  realistic_solution: FP16 (half-precision floating-point) uses 2 bytes per parameter, while INT8 (8-bit
    integer) uses 1 byte per parameter. Quantizing the weights from FP16 to INT8 therefore halves the
    memory required for storage. The new memory footprint will be 120 MB / 2 = 60 MB.
  common_mistake: Confusing the memory reduction from a 32-bit baseline with the reduction from a 16-bit
    baseline. Many engineers mentally default to thinking of INT8 quantization as a 4x saving, but that
    is only true when starting from FP32 (4 bytes). On modern edge systems, the baseline is often already
    FP16 (2 bytes), making the saving 2x.
  napkin_math: 1. **Baseline Memory (FP16):** 120 MB
  options:
  - 30 MB
  - 120 MB
  - 60 MB
  - 15 MB
  correct_index: 2
