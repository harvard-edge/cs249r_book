title: 'The INT8 Memory Payoff'
scenario: 'You''re optimizing a vision model for an autonomous vehicle''s perception system, running on a Jetson AGX Orin. The model''s weights are currently stored in FP16 and occupy 120 MB of DRAM. To reduce memory bandwidth pressure, you decide to quantize the weights to INT8.'
question: 'What is the new weight memory footprint after quantizing the 120 MB FP16 weights to INT8?'
details:
  realistic_solution: 'FP16 (half-precision floating-point) uses 2 bytes per parameter, while INT8 (8-bit integer) uses 1 byte per parameter. Quantizing the weights from FP16 to INT8 therefore halves the memory required for storage. The new memory footprint will be 120 MB / 2 = 60 MB.'
  common_mistake: |
    **The Pitfall:** Confusing the memory reduction relative to FP32 instead of FP16.
    **The Rationale:** Many engineers mentally default to thinking of INT8 quantization as a 4x saving (from 32-bit floats), forgetting that edge baselines are often already FP16.
    **The Consequence:** Incorrectly calculating edge hardware memory requirements by a factor of 2.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline Memory (FP16): 120 MB.
    - FP16 uses 2 bytes per parameter.
    - INT8 uses 1 byte per parameter.

    **Calculations:**
    - The reduction is exactly 2x.
    - New memory footprint = 120 MB / 2 = 60 MB.

    **Conclusion & Interpretation:**
    - **Result: 60 MB (Memory Capacity Bound)**. The new memory footprint is half of the original.
  options:
  - '30 MB'
  - '120 MB'
  - '60 MB'
  - '15 MB'
