title: The Rolling Shutter Tear
scenario: You deploy a high-speed robotics perception model that runs at 120 FPS. The object detection
  model's accuracy drops from 95% on a stationary dataset to 40% when the robot is spinning quickly, even
  though motion blur is minimal. Based on the exposure diagram, what physical phenomenon is destroying
  your accuracy?
question: "Based on the exposure diagram, what physical phenomenon is destroying your accuracy?"
details:
  realistic_solution: You are suffering from the **Rolling Shutter Effect**. CMOS sensors read line-by-line.
    If the robot spins rapidly, the bottom of the frame captures the world at a different point in time
    (and space) than the top. The resulting image is physically sheared. Your convolutions, trained on
    orthogonal data, fail to recognize these distorted features. The fix is using a **Global Shutter**
    sensor or augmenting the training set with explicit geometric shear transforms.
  common_mistake: '"Blaming the neural network''s generalization ability, or assuming the frames just
    need standard ''motion blur'' augmentation."'
  napkin_math: Standard CMOS cameras use a rolling shutter, exposing and reading rows sequentially. At
    120 FPS, frame time is 8.3ms. If reading from top to bottom takes 8ms, and the robot spins at 180
    deg/sec (0.18 deg/ms), the camera physically rotates 8 * 0.18 = 1.44 degrees between the first and
    last row. This causes severe 'rolling shutter shear', warping object geometries and breaking the spatial
    CNN features.
