title: SRAM Spills in Aggressive Fusion
scenario: You deploy MobileNetV2 on an edge NPU. A new compiler pass aggressively fuses Depthwise Conv + 1x1 Conv to reduce DRAM trips. Unexpectedly, latency increases from 5ms to 18ms, and DRAM bandwidth usage triples compared to the unfused version.
question: Why did fusing Depthwise Conv + 1x1 Conv on the edge NPU increase latency from 5ms to 18ms and triple DRAM use?
details:
  realistic_solution: The aggressive fusion creates a monolithic kernel that requires materializing the large intermediate activation tensor (between the Depthwise and 1x1 Convs) entirely in SRAM. Because this intermediate tensor exceeds the strict hardware SRAM limit, the memory planner is forced to spill the tensor to DRAM per tile. The unfused version executed sequentially, allowing smaller memory footprints that fit entirely within SRAM without spilling.
  common_mistake: |
    **The Pitfall:** Believing operator fusion always strictly reduces memory bandwidth by keeping activations in registers.
    **The Rationale:** Candidates forget that aggressive fusion creates massive monolithic kernels. If the intermediate tensor exceeds local SRAM capacity, the planner is forced to spill it back to DRAM.
    **The Consequence:** The optimized fused kernel causes a massive spike in DRAM traffic, tripling memory bandwidth usage and degrading latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Intermediate tensor dims: 112x112 spatial, 144 channels.
    - Precision: FP16 (2 bytes).
    - SRAM limit: 2 MB.
    - DRAM bandwidth: 10 GB/s.

    **Calculations:**
    - Intermediate tensor size: 112 * 112 * 144 * 2 bytes = 3,612,672 bytes (~3.44 MB).
    - Since 3.44 MB > 2 MB, the compiler spills.
    - Spill/Fill penalty per tile: (3.44 MB * 2) / 10,000 MB/s = ~0.68ms.
    - Total penalty across 10 tiles: 10 * 0.68ms = 6.8ms.

    **Conclusion & Interpretation:**
    - **Result: 6.8ms (Memory Capacity-Bound)**. Across 10 tiles, this spilling adds ~6.8ms of pure DRAM latency overhead, crippling performance compared to the unfused sequential execution.
