title: Factory Defect Detection Storage Pipeline
scenario: You are designing the storage and data feeding pipeline for an automated optical inspection
  system in a factory. The system uses an on-premise Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x,
  400 TOPS INT8, 75W) to run a defect detection model. The cameras generate 100 high-resolution uncompressed
  images (8MB each) per second. You need to specify how to format, compress, and store this data on local
  NVMe drives before streaming it to the accelerator for batch inference, ensuring the 400 TOPS compute
  is not starved.
question: "How would you format, compress, store, and stream 100 8MB images per second so the Qualcomm Cloud AI 100 is not starved?"
details:
  realistic_solution: The data should be stored in a sequential, row-based binary format like TFRecord
    or WebDataset. To balance storage capacity and host CPU load, use a fast, lightweight compression
    algorithm like LZ4. This minimizes decompression overhead on the host CPU, allowing data to be rapidly
    decoded and moved over PCIe to the AI 100's 32 GB LPDDR4x memory for high-throughput batch inference.
  common_mistake: Candidates might suggest heavy compression like JPEG to save disk space, ignoring the
    host CPU decompression bottleneck which will starve the accelerator. Alternatively, they might suggest
    columnar formats like Parquet, which are ill-suited for sequential image reads.
  napkin_math: 100 images/sec at 8 MB each generates 800 MB/s of incoming data. Uncompressed, this requires
    2.88 TB per hour. The AI 100 (400 TOPS) can process a standard vision model at thousands of frames
    per second, so the bottleneck is the host feeding data. Using LZ4 compression yields a ~2x compression
    ratio, reducing storage to 1.44 TB/hour and disk read requirements to 400 MB/s. With LZ4 decompression
    speeds of >3 GB/s per CPU core, the host can easily decompress the stream and feed the AI 100's 32
    GB memory without bottlenecking the 400 TOPS compute engine.
