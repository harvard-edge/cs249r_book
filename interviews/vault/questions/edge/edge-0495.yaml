title: The Vision Transformer Performance Cliff
scenario: You are an ML Systems Engineer on an autonomous driving team, tasked with evaluating a new perception
  model for a vehicle's forward-facing camera. The system runs on a Jetson AGX Orin and has a hard real-time
  deadline of 33ms per frame (30 FPS).
question: "Why does the ViT underperform the MobileNet-style CNN on Orin despite having fewer parameters?"
details:
  realistic_solution: The root cause is the Vision Transformer's low arithmetic intensity, which makes
    it memory-bandwidth bound on the Jetson platform. The Jetson AGX Orin, while powerful, has a finite
    memory bandwidth. The ViT's self-attention mechanism requires large, non-local memory accesses to
    construct the query, key, and value matrices, leading to a high volume of data movement relative to
    the computations performed. The CNN, particularly a depthwise separable one like MobileNet, exhibits
    high data reuse (a small filter kernel is slid across a large feature map), resulting in higher arithmetic
    intensity. Even though the ViT has fewer parameters, its inefficient memory access pattern means the
    GPU's compute cores are often stalled, waiting for data to arrive from DRAM. The CNN, in contrast,
    keeps the compute cores fed more effectively, achieving higher utilization and better real-world latency.
  common_mistake: Engineers often assume that fewer parameters or fewer FLOPs directly translate to better
    performance. They might incorrectly blame the higher absolute FLOP count of the ViT, without considering
    the crucial ratio of compute to memory access. This leads them to mistakenly believe the problem is
    purely about raw compute power, rather than a system-level bottleneck.
  napkin_math: The key is to calculate the Arithmetic Intensity (AI) for each model and compare it to
    the hardware's capabilities.
  options:
  - The ViT model has a bug causing excessive memory leaks.
  - The ViT's total FLOP count (8 GFLOPs) is simply too high for the Jetson AGX Orin's compute capacity.
  - The ViT has a much lower Arithmetic Intensity, making it severely memory-bandwidth bound on the Jetson
    hardware.
  - The ViT has fewer parameters, which means it cannot take full advantage of the GPU's parallelism.
  correct_index: 2
