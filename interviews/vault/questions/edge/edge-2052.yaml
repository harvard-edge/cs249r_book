title: Diagnosing Intermittent Object Detection Failures on Hailo-8 Due to Adversarial Input
scenario: An embedded vision system deployed on a Hailo-8 accelerator (26 TOPS INT8, 2.5W dataflow accelerator) is experiencing intermittent and subtle object detection failures in production. The INT8-quantized model occasionally shows significantly reduced detection confidence under specific real-world input sequences. Power consumption remains within the 2.5W budget. Debugging reveals visually normal input images, but unusual intermediate activation patterns right before failures.
question: How would you diagnose whether subtle Hailo-8 INT8 object detection failures are targeted adversarial attacks under 2.5W edge constraints?
details:
  realistic_solution: Implement a lightweight, on-device adversarial detection mechanism. This could involve monitoring statistical deviations (e.g., L1/L2 norms, min/max values, entropy) of key intermediate feature maps from a baseline established with clean data. For a more robust approach, a small, highly optimized neural network (e.g., a shallow autoencoder or a small classifier) could be trained specifically to identify adversarial perturbations, leveraging a fraction of the Hailo-8's 26 TOPS INT8 capacity. If an anomaly is detected, the system should log the suspicious input for offline analysis and potentially switch to a more robust (but possibly slower) inference path or trigger a human review. The 2.5W power budget necessitates extreme efficiency for any added defense layer.
  common_mistake: |
    **The Pitfall:** Over-relying on data augmentation or ignoring adversarial threats.
    **The Rationale:** Engineers often attribute silent failures strictly to environmental noise and attempt extensive model retraining without characterizing the specific attack vector.
    **The Consequence:** This leads to inefficient use of compute and memory on the edge device without actually defending against targeted adversarial patterns.
  napkin_math: |
    1. **Accelerator Budget**: Total TOPS = 26.
    2. **Model Footprint**: Primary object detection uses 20 TOPS.
    3. **Defense Allowance**: 6 TOPS remain for an adversarial detector.
    4. **Result**: At 30 frames per second, the maximum INT8 operations budget is 6e12 / 30 = **200 GOPS/frame** to stay within the 2.5W limit.
