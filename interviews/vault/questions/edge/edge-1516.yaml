title: Diagnosing Distillation Latency Spikes on Jetson Orin DLA
scenario: 'You have distilled a large object detection model into a smaller student model to deploy on an NVIDIA Jetson Orin for real-time edge inference. The student model was trained using logit matching and intermediate feature distillation. However, during profiling on the Jetson Orin (using its 275 TOPS INT8 Ampere GPU and DLA accelerator under a 60W TDP), you notice that the student model''s inference latency is highly erratic and frequently spikes above the required 30ms budget.'
question: What is causing these latency spikes and how would you diagnose the bottleneck?
details:
  realistic_solution: 'The erratic latency is likely caused by the DLA (Deep Learning Accelerator) falling back to the Ampere GPU for certain operations that were introduced or structured poorly during the distillation process, such as specific activation functions or unsupported tensor reshapes. To diagnose this, use Nsight Systems to profile the execution timeline and check the TensorRT engine build logs to see if operations are thrashing between the DLA and GPU, causing synchronization overhead. Fixing this involves aligning the student model''s architecture strictly with DLA-supported operations.'
  common_mistake: |
    **The Pitfall:** Assuming latency spikes are due to CPU thermal throttling or generic memory limits.
    **The Rationale:** Candidates often jump to generic edge constraints without considering that specific model layers might not be supported by the dedicated accelerator (DLA), causing a fallback.
    **The Consequence:** Blindly applying aggressive quantization or reducing model size without addressing the actual domain-switching synchronization overhead.
  napkin_math: |
    * 30ms latency budget allows for ~33 FPS.
    * DLA-to-GPU memory copy overhead takes ~2ms per fallback.
    * 5 unsupported layers falling back adds 10ms (33% of the budget) in synchronization overhead alone.
    * A 10MB transfer on LPDDR5 (204 GB/s) theoretically takes ~0.05ms.
    * The real cost is the kernel launch and pipeline stall, severely crippling INT8 utilization.
