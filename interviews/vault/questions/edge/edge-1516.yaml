title: Diagnosing Distillation Latency Spikes on Edge Accelerators
scenario: 'You have distilled a large object detection model into a smaller student model to deploy on an edge device for real-time inference. The student model was trained using logit matching and intermediate feature distillation. However, during profiling on the edge hardware, you notice that the student model''s inference latency is highly erratic and frequently spikes above the required 30ms budget.'
question: "What is causing these latency spikes and how would you diagnose the bottleneck?"
details:
  realistic_solution: 'The erratic latency is likely caused by the dedicated Deep Learning Accelerator (DLA) falling back to the standard GPU/CPU for certain operations structured poorly during distillation, such as specific activation functions or unsupported tensor reshapes. Diagnose this using nsys profiling to check execution timelines and identify thrashing between the DLA and GPU.'
  common_mistake: |
    **The Pitfall:** Assuming latency spikes are due to CPU thermal throttling or generic memory limits.
    **The Rationale:** Candidates often jump to generic edge constraints without considering that specific model layers might not be supported by the dedicated accelerator, causing a fallback.
    **The Consequence:** Blindly applying aggressive quantization or reducing model size without addressing the domain-switching synchronization overhead.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 30ms latency budget allows for ~33 FPS.
       - Fallback memory copy overhead takes ~2ms per occurrence.
       - LPDDR5 theoretical transfer time is ~0.05ms for 10MB.
    2. **Calculations:**
       - 5 unsupported layers falling back adds 10ms (33% of budget) in synchronization overhead alone.
    3. **Conclusion & Interpretation:**
       - **Result: Synchronization-Bound (Kernel Launch Overhead)**
