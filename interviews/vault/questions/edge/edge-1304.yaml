title: INT8 Quantization Impact on Equalized Odds
scenario: A pedestrian detection model achieves equalized odds across demographic subgroups in FP32 evaluation. When deployed to a Google Coral Edge TPU (4 TOPS INT8), the system's recall drops by 25% specifically for pedestrians with darker clothing and skin tones in low-light conditions.
question: What hardware-mandated transformation caused this localized degradation, and how do you diagnose it?
details:
  realistic_solution: The root cause is the mandatory INT8 quantization required to run operators on the Coral Edge TPU. The limited 8-bit dynamic range disproportionately squashes the subtle, low-contrast activations required to identify the minority subgroup in poor lighting. To diagnose, compare the per-channel activation distributions between FP32 and INT8 models.
  common_mistake: |
    **The Pitfall:** Blaming biased training data or suggesting data collection.
    **The Rationale:** Candidates assume fairness issues always stem from biased datasets, ignoring that the FP32 model was previously verified as fair.
    **The Consequence:** Millions of dollars are wasted recollecting and retraining on new data, only for the hardware compilation step to induce the exact same fairness regression again.
  napkin_math: |
    * **Quantization Resolution:** Mapping an FP32 range of [-6.0, 6.0] to INT8 (256 bins) yields a step size of 12.0 / 255 = ~0.047.
    * **Signal Loss:** If distinguishing a minority subgroup in low light relies on subtle activation differences of ~0.02, this signal is completely erased.
    * **Conclusion:** Because 0.02 < 0.047, the hardware forces the distinct features into the same INT8 bin, permanently destroying the model's ability to recognize the subject.
