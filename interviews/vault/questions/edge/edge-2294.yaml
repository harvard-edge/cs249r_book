title: Edge Video Pipeline Queueing Delay Analysis
scenario: A Jetson AGX Orin (275 TOPS, 60W) processes a multi-camera feed. Frames
  arrive exactly at 30 fps (33.3ms), but tracking compute varies exponentially, averaging
  25ms per frame.
question: Calculate the expected queueing delay utilizing M/M/1 principles given the
  average arrival and service rates.
visual:
  kind: svg
  path: edge-2294.svg
  alt: Hockey-stick curve showing exponential growth of queueing delay as utilization
    approaches 1.0.
  caption: Queue Length vs Utilization
details:
  realistic_solution: Using an M/M/1 model, arrival rate lambda is 30 frames/sec.
    Service rate mu is 1000/25 = 40 frames/sec. The expected total time (delay + service)
    is 1 / (mu - lambda) = 1 / 10 = 0.1s. The queueing delay alone is 0.1s - 0.025s
    = 75ms.
  common_mistake: Candidates often confuse total system time with queueing delay,
    or fail to convert milliseconds into consistent frequency units before subtracting.
  napkin_math: 1 / (40 - 30) - 0.025 = 0.075s
