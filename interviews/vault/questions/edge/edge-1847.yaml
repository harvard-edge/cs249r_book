title: Edge AI Perception Model Costing on Qualcomm AI 100
scenario: 'A self-driving car company plans to deploy a new perception model onto 100,000 edge vehicles. Each vehicle operates 8 hours/day, 365 days/year. The perception model performs 200 billion INT8 operations per inference and needs to run at 25 inferences per second. The edge accelerator consumes 75W typical power. Power cost is $0.20/kWh, and the amortized annual cost for one accelerator is $300.'
question: How would you estimate annual INT8 operations, accelerator-hours, and total dollar cost for 100,000 equipped vehicles?
details:
  realistic_solution: 'A robust solution requires breaking down the problem: first, calculate the total INT8 operations per second per device, then aggregate this to annual operations across the entire fleet. Similarly, compute total accelerator-hours. For dollar cost, separately calculate annual power consumption and its cost per device, then scale for the fleet. Finally, add the amortized hardware cost.'
  common_mistake: |
    **The Pitfall:** Confusing theoretical peak performance (TOPS) with actual sustained throughput, or neglecting duty cycles and amortized hardware costs.
    **The Rationale:** Candidates often rush calculations without breaking down operations, duty cycles, and separate cost components (power vs. hardware).
    **The Consequence:** This leads to severe underestimation of total system requirements and massive budget shortfalls.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100,000 vehicles.
    - 2,920 hours/year/vehicle.
    - Model uses 200 GOPs at 25 FPS (5 TOPS).
    - Accelerator uses 75W.
    - Power is $0.20/kWh.
    - Hardware is $300/year.

    **Calculations:**
    - Ops/year = 5e12 ops/sec * 3600 sec/hr * 2920 hrs * 100,000 = 5.256e24 ops.
    - Power cost = 0.075 kW * 2920 hrs * $0.20 * 100,000 = $4,380,000.
    - Hardware cost = $300 * 100,000 = $30,000,000.

    **Conclusion & Interpretation:**
    - **Result: Total annual cost is $34.38M (Cost-Bound)**. Power OPEX is a massive operational consideration.
