title: 'The Activation Memory Budget: Quantization Fundamentals'
scenario: You are an ML Systems Engineer on an autonomous vehicle team, tasked with optimizing a vision
  model on a Jetson AGX Orin. A key performance bottleneck is the memory required for intermediate feature
  maps (activations). For a specific convolutional layer, the output activation tensor has dimensions
  of 128x128 with 64 channels. Calculate the memory footprint for this single activation tensor, comparing
  its size in FP16 precision versus INT8 precision.
details:
  realistic_solution: The correct way to calculate activation memory is to multiply the tensor's dimensions
    (Height, Width, Channels) by the number of bytes required for each element's data type. An FP16 element
    requires 2 bytes, while an INT8 element requires just 1 byte. This means quantizing activations from
    FP16 to INT8 provides a 2x reduction in memory footprint and bandwidth requirements for that tensor.
  common_mistake: Engineers often focus exclusively on the memory savings for model *weights* when considering
    quantization. They forget that at runtime, the *activations* are dynamically created and can consume
    a massive amount of memory and bandwidth, often far more than the weights themselves. Failing to account
    for activation memory leads to inaccurate performance estimates and missed optimization opportunities.
  napkin_math: The calculation is a direct application of the activation memory formula.
  options:
  - 1 MB (FP16) vs. 0.5 MB (INT8)
  - 256 KB (FP16) vs. 128 KB (INT8)
  - 2 MB (FP16) vs. 1 MB (INT8)
  - 16 MB (FP16) vs. 8 MB (INT8)
  correct_index: 2
