title: 'The LiDAR Perception Bottleneck: Roofline Analysis'
scenario: You are an ML Systems Engineer at an autonomous vehicle company, diagnosing a new LiDAR perception model on a Jetson AGX Orin configured to a 30W power profile. Your profiler reports that a single inference requires 1.2 Trillion Operations (TOps) and involves moving 4 Gigabytes of data between the GPU cores and DRAM.
question: Is the 1.2 TOps, 4 GB LiDAR model compute-bound or memory-bound on the 30W Orin, and what should you optimize?
details:
  realistic_solution: Execute a systemic Roofline derivation mapping the model's Arithmetic Intensity against the platform Ridge Point. Because the model's arithmetic density resides drastically below the hardware's equilibrium, it is terminally memory-bound. Restructuring mandates reducing fetch payloads via Operator Fusion or tighter Top-K structural quantization rather than chasing higher compute frequencies.
  common_mistake: |
    **The Pitfall:** Reflexively interpreting idle GPU core statistics as empirical proof of compute throttling.
    **The Rationale:** Engineers analyze low utilization and automatically blame thermal management limits or CPU starvation issues.
    **The Consequence:** Substantial time is wasted pursuing clock-speed optimizations, utterly ignoring the fact that the pipeline is starving for DRAM data.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Orin @ 30W: Peak Compute = 150 TOPS. Memory Bus = 204.8 GB/s.
       - Payload: 1.2 Trillion Ops, 4 GB IO.
    2. **Calculations:**
       - Hardware Ridge Point = 150 TOPS / 204.8 GB/s = ~732 Ops/Byte.
       - Model Arithmetic Intensity (AI) = 1.2e12 Ops / 4e9 Bytes = 300 Ops/Byte.
       - Theoretical Memory Delay = 4 GB / 204.8 GB/s = 19.5 ms latency.
       - Effective Compute ceiling = 1.2 TOps / 19.5 ms = 61.5 TOPS.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Execution**. Because AI (300) < Ridge (732), the model peaks at 61.5 TOPS, endlessly waiting on the data bus.
  options:
  - The model is compute-bound. The 30W power cap enforces thermal throttling, blocking the peak 275 TOPS ceiling.
  - The model is CPU-bound. The slow ARM fabric is incapable of staging the point clouds fast enough for the Ampere architecture.
  - The model is memory-bound. Its arithmetic intensity of 300 Ops/Byte is massively subordinate to the Orin's 732 Ops/Byte Ridge Point.
  - The model is strictly compute-bound. Moving 1.2 Trillion analytical ops forces heavy queueing logic on edge tensor cores.
  correct_index: 2
