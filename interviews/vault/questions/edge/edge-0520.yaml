title: 'The LiDAR Perception Bottleneck: Roofline Analysis'
scenario: You are an ML Systems Engineer at an autonomous vehicle company, diagnosing a new LiDAR perception model on a Jetson AGX Orin configured to a 30W power profile. Your profiler reports that a single inference requires 1.2 Trillion Operations (TOps) and involves moving 4 Gigabytes of data (weights, activations, etc.) between the GPU cores and DRAM.
question: Is the 1.2 TOps, 4 GB LiDAR model compute-bound or memory-bound on the 30W Orin, and what should you optimize?
details:
  realistic_solution: The model is fundamentally **memory-bound**. The key is to calculate the model's Arithmetic Intensity (AI) and compare it to the hardware's ridge point. The Jetson AGX Orin's performance is limited by its memory bandwidth long before the model can supply enough data to max out the compute cores. The GPU is spending most of its time idle, waiting for data from DRAM. To improve FPS, the focus should be on reducing data movement via techniques like operator fusion, re-architecting layers to improve data locality, or more aggressive quantization, rather than trying to increase the compute clock speed.
  common_mistake: |
    **The Pitfall:** Assuming the system is compute-bound due to low GPU utilization.
    **The Rationale:** Engineers see idle GPU cores and incorrectly blame thermal throttling or assume the CPU is starving the GPU.
    **The Consequence:** They focus on increasing clock speeds or compute efficiency instead of reducing data movement.
  napkin_math: |
    - **Arithmetic Intensity (AI):** 1.2e12 Ops / 4e9 Bytes = **300 Ops/Byte**.
    - **Hardware Ridge Point (30W Orin):** ~150 TOPS / 204.8 GB/s = **732 Ops/Byte**.
    - **Analysis:** 300 < 732, therefore the model is strictly **memory-bound**.
    - **Minimum Execution Time:** 4 GB / 204.8 GB/s = **19.5 ms**.
    - **Effective Compute:** 1.2 TOps / 19.5 ms = **61.5 TOPS** (far below the 150 TOPS peak).
  options:
  - The model is compute-bound. The 30W power cap is causing thermal throttling, preventing the GPU from reaching its peak 275 TOPS.
  - The model is CPU-bound. The ARM CPU cores are unable to preprocess the LiDAR point clouds fast enough to feed the GPU.
  - The model is memory-bound. Its Arithmetic Intensity of 300 Ops/Byte is far below the Jetson Orin's ridge point of ~732 Ops/Byte.
  - The model is compute-bound. At 1.2 Trillion operations per inference, the model's logic is too complex for the Jetson's architecture, regardless of data access patterns.
  correct_index: 2
