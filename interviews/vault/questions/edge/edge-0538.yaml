title: The Fleet Firmware Fragmentation
scenario: 'Your company has 2,000 Hailo-8 edge devices deployed across 50 retail stores for customer analytics.
  Over 18 months of OTA updates, the fleet has fragmented: 400 devices run firmware v2.1, 600 run v2.3,
  500 run v2.5, 300 run v3.0, and 200 run v3.1. Each firmware version has a different Hailo runtime and
  supports different model formats. You need to deploy a new model across the entire fleet. How do you
  handle this?'
question: "How do you handle this?"
details:
  realistic_solution: 'The fragmentation exists because OTA updates fail silently in the field. Common
    reasons: (1) store WiFi blocks large downloads (captive portal, bandwidth caps), (2) devices behind
    NAT with no inbound connectivity, (3) v2.1→v2.3 update requires a reboot during business hours (store
    manager disables auto-update), (4) v2.5→v3.0 is a breaking change requiring partition resize (fails
    on devices with full eMMC).'
  common_mistake: '"Update all devices to v3.1 first, then deploy the model." This sounds clean but ignores
    why the fragmentation exists — those 400 devices on v2.1 failed to update for a reason (connectivity
    issues, store IT policies, hardware incompatibilities).'
  napkin_math: 'Model compilation: 5 variants × 2 hours each = 10 hours (one-time, automated in CI/CD).
    Model storage: 5 × 20 MB = 100 MB in cloud repository. Download per device: 20 MB. At 5 Mbps store
    WiFi: 32 seconds per device. Fleet-wide bandwidth: 2000 × 20 MB = 40 GB. Staged rollout: 5% = 100
    devices × 48h monitoring = 2 days. 25% = 500 devices × 48h = 2 more days. 100% = 4 more days. Total
    deployment: ~8 days. Firmware convergence: 6 months. Cost of maintaining 5 model variants: ~2 hours/month
    CI/CD time.'
  options:
  - Update all devices to v3.1 first, then deploy the model.. This sounds clean but ignores why the fragmentation
    exists — those 400 devices on v2.1 failed to update for a reason (connectivity issues, store IT policies,
    hardware incompatibilities).
  - Automatic restart on failure is dangerous for safety-critical systems; manual intervention should
    always be required.
  - The issue stems from OS-level scheduling interference; pinning the inference thread to a dedicated
    core will eliminate the performance variance.
  - The fragmentation exists because OTA updates fail silently in the field.
  correct_index: 3
