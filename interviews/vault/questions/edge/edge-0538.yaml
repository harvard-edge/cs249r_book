title: 'The Fleet Firmware Fragmentation'
scenario: 'Your company has 2,000 Hailo-8 edge devices deployed across 50 retail stores for customer analytics. Over 18 months of OTA updates, the fleet has fragmented: 400 devices run firmware v2.1, 600 run v2.3, 500 run v2.5, 300 run v3.0, and 200 run v3.1. Each firmware version has a different Hailo runtime and supports different model formats.'
question: 'How do you handle deploying a new model across this fragmented fleet?'
details:
  realistic_solution: 'The fragmentation exists because OTA updates fail silently in the field (e.g. WiFi blocks, captive portals, user interference). You must orchestrate a staged, multi-variant deployment pipeline.'
  common_mistake: '"Update all devices to v3.1 first, then deploy the model." This sounds clean but ignores why the fragmentation exists — those 400 devices on v2.1 failed to update for a reason.'
  napkin_math: |
    **Assumptions & Constraints:**
    - 5 firmware variants. Fleet: 2,000 devices. Model size: 20 MB.
    - Store WiFi: 5 Mbps. Download time: 32 seconds/device.

    **Calculations:**
    - Total bandwidth needed: 2000 * 20 MB = 40 GB.
    - Phase 1 (5%): 100 devices + 48h monitor.
    - Phase 2 (25%): 500 devices + 48h monitor.
    - Total deployment time: ~8 days.

    **Conclusion & Interpretation:**
    - **Result: ~8 days total (Deployment-Bound)**. Orchestrated rollouts safely manage fragmented legacy fleets without saturating store WiFi networks.
  options:
    - 'Update all devices to v3.1 first, then deploy the model. This ignores why the fragmentation exists.'
    - 'Automatic restart on failure is dangerous for safety-critical systems; manual intervention should always be required.'
    - 'The issue stems from OS-level scheduling interference; pinning the inference thread to a dedicated core will eliminate the performance variance.'
    - 'The fragmentation exists because OTA updates fail silently in the field.'
  correct_index: 3
