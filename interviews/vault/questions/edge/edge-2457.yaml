title: Energy Calculation for Drone Collision Avoidance on Hailo-8
scenario: A drone uses a Hailo-8 to run collision avoidance. The camera captures at
  20 FPS. Inference takes 10 ms per frame. The accelerator drops to a 0.5 W state
  between frames.
question: Calculate the total energy consumed by the Hailo-8 accelerator over 1 minute
  of active flight.
details:
  realistic_solution: At 20 FPS, the accelerator is active for 20 frames * 10 ms =
    200 ms (0.2s) every second, consuming 2.5W. The remaining 800 ms (0.8s) is spent
    in the 0.5W state. Energy per second is (0.2 * 2.5) + (0.8 * 0.5) = 0.9 Joules.
    Over 60 seconds, the energy is 0.9 * 60 = 54 Joules.
  common_mistake: Assuming the chip remains strictly at 2.5W continuously, incorrectly
    yielding 150 Joules.
  napkin_math: 60 * (0.2 * 2.5 + 0.8 * 0.5) = 54 J
