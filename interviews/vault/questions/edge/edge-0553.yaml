title: The Automotive Parallelism Dilemma
scenario: You are designing the perception system for an autonomous vehicle. The core is a large multi-modal Vision Transformer (20B parameters) fusing data from 8 cameras. This model is too large for a single Jetson AGX Orin, so you must split its execution across two Orin boards connected by a 40 Gbps automotive ethernet link. The pipeline has a hard real-time deadline of 33ms (30 FPS).
question: Should you use tensor or pipeline parallelism for the 20B ViT across two Orins over the 40Gbps link, and why?
details:
  realistic_solution: |
    Pipeline Parallelism is the only viable strategy. Tensor Parallelism requires AllReduce communication at every transformer layer. With 80 layers and a 5 GB/s link, the communication overhead alone is ~640 ms, which is 19x over the 33 ms budget. Pipeline Parallelism requires only a single activation transfer between the two halves (~20 MB, 4 ms), keeping total latency under 27 ms.
  common_mistake: |
    **The Pitfall:** Applying cloud-HPC intuition directly to an edge problem by choosing Tensor Parallelism.
    **The Rationale:** Engineers accustomed to high-bandwidth datacenters (e.g., NVLink) underestimate the communication overhead of TP on constrained automotive ethernet.
    **The Consequence:** Frequent, high-volume AllReduce operations become the dominant bottleneck, completely missing the real-time deadline.
  napkin_math: |
    - System: 20B param ViT (FP16 = 40 GB), 40 Gbps (5 GB/s) link, 33 ms deadline.
    - Tensor Parallelism (TP): 2 AllReduce ops/layer. Activation tensor: ~20 MB.
    - TP Transfer time: 80 layers x 2 x 20 MB = 3.2 GB. 3.2 GB / 5 GB/s = 640 ms **(Fails 33 ms budget)**.
    - Pipeline Parallelism (PP): Split model at layer 40. 1 transfer: 20 MB.
    - PP Transfer time: 20 MB / 5 GB/s = 4 ms.
    - PP Compute time: ~200 GFLOPs / 17.5 TFLOPS = 11.4 ms per half. Total = 11.4 + 4 + 11.4 = 26.8 ms.
    - **Result: PP takes 26.8 ms, successfully meeting the 33 ms deadline.**
