title: The Automotive Parallelism Dilemma
scenario: A 20B parameter Vision Transformer (ViT) must be split across two Jetson AGX Orin boards connected via a 40 Gbps automotive ethernet link. The pipeline has a 33ms real-time deadline.
question: Should you use tensor or pipeline parallelism for the 20B ViT across two Orins over the 40Gbps link, and why?
details:
  realistic_solution: Pipeline Parallelism is the only viable strategy. Tensor Parallelism (TP) requires massive AllReduce communication at every transformer layer, which immediately bottlenecks on the slow 40 Gbps automotive ethernet link, blowing past the 33ms deadline. Pipeline Parallelism splits the model sequentially, requiring only a single forward activation transfer between the two halves per frame, keeping latency within the real-time budget.
  common_mistake: |
    **The Pitfall:** Applying cloud-HPC intuition directly to an edge problem by choosing Tensor Parallelism.
    **The Rationale:** Engineers accustomed to high-bandwidth datacenter interconnects (e.g., NVLink) underestimate the severe communication overhead of TP on constrained edge ethernet.
    **The Consequence:** Frequent, high-volume AllReduce operations become the dominant bottleneck, completely missing the real-time deadline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 20B ViT (80 layers). Deadline: 33 ms.
       - Interconnect: 40 Gbps (5 GB/s).
       - Activation transfer: 20 MB.
    2. **Calculations:**
       - TP Transfer: 80 layers * 2 (AllReduce) * 20 MB = 3.2 GB. 3.2 GB / 5 GB/s = 640 ms (Fails).
       - PP Transfer: 1 transfer of 20 MB. 20 MB / 5 GB/s = 4 ms.
       - PP Compute: ~11.4 ms per half. Total = 11.4 + 4 + 11.4 = 26.8 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound. Tensor Parallelism takes 640ms, while Pipeline Parallelism takes 26.8ms, safely meeting the 33ms deadline.**
