title: 'Latency Decomposition: Diagnose and Fix Jetson Orin Inference Latency Spike'
scenario: A deployed Jetson Orin (275 TOPS INT8, 60W) running a safety classifier at 60fps shows occasional latency spikes from 8ms to 45ms under sustained load. The model is INT8 TensorRT, 2 GOPs. Profiling shows GPU utilization stays at 60% during spikes.
question: What likely causes 8ms-to-45ms latency spikes on the 2 GOP INT8 safety classifier, and what quantified fix would you apply?
details:
  realistic_solution: 'At 60fps, camera ISP consumes ~15 GB/s of LPDDR5 (4K × 3 channels × 60fps × 1 byte = 1.3GB/s — actually modest). More likely: thermal throttling reduces clocks. Jetson Orin at 60W sustained hits thermal limits, throttling GPU from 1.3GHz to 0.8GHz (38% reduction) → latency spikes 1.6×. Fix: enable power mode NVPModel 2 (30W) or add active cooling to sustain 60W without throttle.'
  common_mistake: |
    **The Pitfall:** Assuming latency spikes are compute-bound and adding more GPU resources.
    **The Rationale:** Engineers overlook LPDDR5 bandwidth contention or hardware thermal limits that throttle clock speeds.
    **The Consequence:** Wasting effort on model optimization when the fix requires active cooling or process pinning.
  napkin_math: |
    * Compute required: 2 GOPs
    * Peak compute time: 2 GOPs / 275 TOPS = 0.0073ms
    * Realistic compute time at 60% util: 0.012ms
    * Baseline latency: 8ms (overhead-dominated)
    * Spike latency: 45ms (5.6x slower)
    * **Spikes match thermal throttling from 1.3GHz to 0.8GHz (38% reduction) or LPDDR5 bandwidth contention.**
