title: Average vs. Active Power
scenario: 'You are designing an in-cabin driver monitoring system for a car, using a microcontroller.
  To preserve the car''s battery, you implement a duty cycle: the system is fully active for 1 second
  to analyze the driver''s state, then goes into a deep sleep mode for the next 9 seconds. The datasheet
  states the active power is 50 mW and the deep sleep power is 10 µW. Identify the average power consumption
  of the device over one complete 10-second cycle.'
details:
  realistic_solution: The average power is the total energy consumed over the cycle divided by the cycle's
    duration. The total energy is the sum of the energy used in the active state and the energy used in
    the sleep state. The duty cycle is 10% (1s active out of 10s).
  common_mistake: Engineers often confuse peak/active power with average power. A common mistake is to
    report the active power (50 mW) as the answer, forgetting that the device spends most of its time
    in a low-power state. Another error is to incorrectly average the two power states without weighting
    them by the time spent in each, or to completely ignore the small but non-zero sleep power.
  napkin_math: '1. Calculate Active Energy: 50 mW * 1 s = 50 mJ. 2. Calculate Sleep Energy: 10 µW = 0.01
    mW; 0.01 mW * 9 s = 0.09 mJ. 3. Total Energy per 10s cycle = 50 mJ + 0.09 mJ = 50.09 mJ. 4. Average
    Power = Total Energy / Total Time = 50.09 mJ / 10 s = 5.009 mW. The system averages roughly 5.0 mW
    over time.'
  options:
  - 50 mW
  - 25.01 mW
  - 5.01 mW
  - 0.01 mW
  correct_index: 2
