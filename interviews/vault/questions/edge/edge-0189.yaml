title: Average vs. Active Power
scenario: 'You are designing an in-cabin driver monitoring system for a car, using a microcontroller. To preserve the car''s battery, you implement a duty cycle: the system is fully active for 1 second to analyze the driver''s state, then goes into a deep sleep mode for the next 9 seconds. The datasheet states the active power is 50 mW and the deep sleep power is 10 µW.'
question: 'What is the average power consumption over the 10-second cycle with 1s at 50mW and 9s at 10µW?'
details:
  realistic_solution: The average power is the total energy consumed over the cycle divided by the cycle's duration. The total energy is the sum of the energy used in the active state and the energy used in the sleep state. The duty cycle is 10% (1s active out of 10s).
  common_mistake: |
    **The Pitfall:** Reporting the active power (50 mW) or incorrectly averaging without weighting by time.
    **The Rationale:** Engineers confuse peak/active power with average power, or they completely ignore the small but non-zero deep sleep power.
    **The Consequence:** The overall battery lifetime calculations are drastically incorrect, leading to a severely undersized or oversized power system.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active State: 1s at 50 mW.
    - Deep Sleep State: 9s at 10 µW (0.01 mW).
    - Total Cycle: 10s.

    **Calculations:**
    - Calculate Active Energy: 50 mW * 1 s = 50 mJ.
    - Calculate Sleep Energy: 0.01 mW * 9 s = 0.09 mJ.
    - Total Energy per 10s cycle = 50 mJ + 0.09 mJ = 50.09 mJ.
    - Average Power = Total Energy / Total Time = 50.09 mJ / 10 s = 5.009 mW.

    **Conclusion & Interpretation:**
    - **Result: ~5.01 mW (Power-Bound)**. Weighting by time is essential for accurate average power consumption.
  options:
  - 50 mW
  - 25.01 mW
  - 5.01 mW
  - 0.01 mW
