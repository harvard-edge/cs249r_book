title: Edge AI Dataset Curation for Rare Events on Coral TPU
scenario: >-
  You are designing a smart surveillance system for remote environmental monitoring, deploying real-time object detection models on a Google Coral Edge TPU (4 TOPS INT8, 2W power budget). The system faces intermittent network connectivity. Initial deployment reveals poor performance on rare object classes.
question: How would you curate, label, and use edge-selected data to improve rare-class detection on a Coral Edge TPU with intermittent connectivity?
details:
  realistic_solution: |
    Implement on-device filtering using a lightweight model to pre-select potentially interesting frames (low confidence, unusual motion) for batched upload during connectivity windows. Design an active learning loop where the Coral TPU locally identifies samples close to the decision boundary. Optimize the final model for INT8 inference via QAT.
  common_mistake: |
    **The Pitfall:** Over-collecting raw data without on-device filtering.
    **The Rationale:** Candidates assume all data should be uploaded and processed in the cloud.
    **The Consequence:** This overwhelms the limited 2W power budget and network constraints, rendering the system non-functional at the edge.
  napkin_math: |
    - **Raw Data Rate:** 30 FPS compressed to 1 Mbps.
    - **Daily Raw Upload:** `1 Mbps * 3600s * 24h = 86.4 Gb (~10.8 GB)` per day.
    - **Filtered Data Rate:** With intelligent pre-filtering, only 5% of frames are deemed interesting.
    - **Filtered Upload:** `10.8 GB * 0.05 = 0.54 GB`.
    - **Result:** **Reduces bandwidth, storage, and transmission energy significantly, allowing operation within the 2W power envelope.**
