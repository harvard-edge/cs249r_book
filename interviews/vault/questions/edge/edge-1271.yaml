title: Architecting Multi-Tenant Memory-Mapped Inference for Edge
scenario: 'You are designing an on-premise defect detection system using a Qualcomm Cloud AI 100 accelerator, which features 32 GB LPDDR4x memory, 400 TOPS INT8 compute, and a 75W power envelope. The service must multiplex between a dozen specialized visual inspection models without incurring cold-start latency when switching assembly lines.'
question: 'How would you memory-map and share a dozen model weights to allow processes to switch lines without cold starts within 32 GB?'
details:
  realistic_solution: 'A robust design involves a centralized model-server process that memory-maps all model weights using `MAP_SHARED` and pins active layers into RAM with `mlock`. Worker processes attach to this shared memory region, completely avoiding redundant weight copies and serialization overhead. To optimize the 75W power envelope, the system should strictly use INT8 quantized weights to minimize memory bandwidth utilization and maximize the accelerator''s 400 TOPS INT8 throughput.'
  common_mistake: |
    **The Pitfall:** Proposing naive dynamic weight loading or standard disk-backed OS paging.
    **The Rationale:** Candidates assume standard virtual memory paging is sufficient for dynamic loading.
    **The Consequence:** This introduces severe latency spikes and unpredictable cold starts, and fails to leverage shared memory across processes, quickly exhausting the 32 GB RAM.
  napkin_math: |
    * Original model footprint: 12 models × 6 GB (FP16) = 72 GB (exceeds 32 GB limit).
    * INT8 Quantization: 12 models × 3 GB = 36 GB total footprint.
    * Mapping Strategy: mmap all 36 GB as `MAP_SHARED`.
    * RAM Pinning: Use `mlock` to pin the 8 most frequently used models in RAM (8 × 3 GB = 24 GB).
    * **Conclusion: This leaves 8 GB for the OS, buffers, and activations, eliminating redundant copies and cold-starts.**
