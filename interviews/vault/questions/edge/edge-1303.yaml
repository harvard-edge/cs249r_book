title: Diagnosing Power Throttling in Memory-Bound Inference
scenario: You are deploying a transformer-based model on an on-premise Qualcomm Cloud AI 100 inference accelerator. During profiling, you observe that despite the INT8 compute units operating at less than 15% utilization, the accelerator is hitting its TDP limit and throttling aggressively.
question: Why is the Cloud AI 100 hitting its 75W TDP and throttling while INT8 compute utilization stays below 15%?
details:
  realistic_solution: The root cause is a memory-bound workload. High-frequency LPDDR4x off-chip reads consume orders of magnitude more power than INT8 ALUs. Alleviate the TDP stress through operator fusion and increased sequence batching to reuse activations on-die.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the power draw as a compute-bound problem.
    **The Rationale:** Candidates fail to recall Horowitz energy principles, missing that off-chip LPDDR4x memory accesses consume orders of magnitude more energy than INT8 ALU operations.
    **The Consequence:** Attempting misguided optimizations like extreme quantization, which fail to address the actual off-chip memory access power drain.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - INT8 MAC Energy: ~0.2 pJ
       - LPDDR4x Fetch Energy (8-bit): ~160 pJ
       - Memory bandwidth saturation at ~150 GB/s
    2. **Calculations:**
       - Memory fetches are ~800x more energy-intensive than MACs
       - Bandwidth power: 150 GB/s * 8 bits/byte * 20 pJ/bit = 24W just for memory I/O
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Power Wall.** Off-chip accesses easily saturate the 75W TDP limits.
