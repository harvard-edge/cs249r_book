title: Diagnosing Power Throttling in Memory-Bound Inference
scenario: You are deploying a transformer-based model on an on-premise Qualcomm Cloud AI 100 inference accelerator, which features 400 TOPS of INT8 compute, 32 GB of LPDDR4x memory, and a strict 75W power envelope. During profiling, you observe that despite the INT8 compute units operating at less than 15% utilization, the accelerator is hitting its 75W thermal design power (TDP) limit and throttling aggressively.
question: Why is the Cloud AI 100 hitting its 75W TDP and throttling while INT8 compute utilization stays below 15%?
details:
  realistic_solution: The root cause is a memory-bound workload with low arithmetic intensity, meaning the accelerator is burning its power budget on LPDDR4x memory transactions rather than actual compute. The solution is to profile the memory bandwidth utilization and implement memory-aware optimizations such as operator fusion (to keep intermediate activations on-chip) or increasing the batch size to improve weight reuse, thereby drastically reducing off-chip memory access energy.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the power draw as a compute-bound problem.
    **The Rationale:** Candidates fail to recall Horowitz energy principles, missing that off-chip LPDDR4x memory accesses consume orders of magnitude more energy than INT8 ALU operations.
    **The Consequence:** Attempting misguided optimizations like extreme quantization, which fail to address the actual off-chip memory access power drain.
  napkin_math: |
    - **Energy Costs:** INT8 MAC = ~0.2 pJ. 8-bit fetch from LPDDR4x = ~160 pJ (20 pJ/bit * 8).
    - **Ratio:** Memory fetch is ~800x more energy-intensive than compute.
    - **Bandwidth Power:** At a realistic 150 GB/s bandwidth utilization: 150 GB/s * 8 bits/byte * 20 pJ/bit = **24W**.
    - **Result:** The off-chip memory access alone easily saturates the 75W TDP limit when combined with static power and control logic.
