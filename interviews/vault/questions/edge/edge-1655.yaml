title: Heterogeneous Pipeline Design for Jetson Orin
scenario: You are architecting the compute pipeline for an autonomous robotics platform utilizing the NVIDIA Jetson Orin. The system requires processing multiple sensor modalities under a strict 60W TDP.
question: How would you partition a massive transformer perception model across the Ampere GPU and DLA, and design kernels to avoid LPDDR5 bottlenecks?
details:
  realistic_solution: The optimal architecture statically schedules standard INT8 dense operations (like standard convolutions or MLPs) onto the DLA to maximize power efficiency within the 60W budget. The Ampere GPU's Tensor Cores are reserved for irregular or dynamic operations like fused multi-head attention. To prevent memory bottlenecks, the implementation must use zero-copy memory (pinned memory) to avoid redundant copies, and warp-level primitives with asynchronous copy (cp.async) to load data from the 32 GB LPDDR5 directly into shared memory, maximizing memory coalescing and Tensor Core occupancy.
  common_mistake: |
    **The Pitfall:** Scheduling all matrix operations onto the Ampere SMs and neglecting the DLA.
    **The Rationale:** Candidates treat the system as a standard discrete GPU and ignore the shared unified memory architecture.
    **The Consequence:** Severe memory contention between CPU, GPU, and DLA, wasting power and failing to meet the 60W budget.
  napkin_math: |
    1. Assumptions & Constraints:
       - Orin LPDDR5 bandwidth: 204.8 GB/s
       - Peak INT8 compute: 275 TOPS
       - Standard attention arithmetic intensity: <400 OPS/Byte
    2. Calculations:
       - Required arithmetic intensity = 275e12 OPS / 204.8e9 Bytes/s = 1342 OPS/Byte
    3. Conclusion & Interpretation:
       - **Result: Memory-Bound. Intermediate tensors must be materialized in shared memory (zero-copy) to bypass the 204.8 GB/s bandwidth wall, as 400 OPS/Byte is far below the required 1342 OPS/Byte.**
