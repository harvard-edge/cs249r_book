title: Self-Healing Edge AI Fleet
scenario: |
  You operate a fleet of 5,000 edge AI devices deployed across 300 retail stores for loss prevention. The devices run 24/7 and you have 2 SREs managing the fleet. Current state: 3% of devices require manual intervention each week (150 devices), consuming 80% of SRE time.
question: How would you design a self-healing system to cut interventions from 150 per week to fewer than 15 without adding SREs?
details:
  realistic_solution: |
    Classify failure modes by frequency and automate top causes. Typical: (1) model OOM/crash (40%) — automated restart + fallback model; (2) connectivity loss (25%) — local buffering + exponential backoff; (3) sensor degradation (20%) — automated recalibration triggers; (4) storage full (10%) — automated log rotation. Current: 150 incidents/week x 45 min = 112.5 SRE-hours (140% capacity). After automation: <15/week x 30 min = 7.5 hours. ROI: $45K build cost vs $130K/year savings.
  common_mistake: |
    **The Pitfall:** "Add better monitoring and alerting."
    **The Rationale:** System architects assume visibility is the primary problem when managing edge fleets.
    **The Consequence:** More alerts without automated remediation just increases alert fatigue, overwhelming the already over-capacity SRE team without fixing the underlying issues.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet: 5,000 devices. 150 incidents/week.
    - SRE Capacity: 2 SREs = 80 hours/week.
    - Resolution Time: 45 min average.

    **Calculations:**
    - Current SRE Load: 150 incidents/week * 45 min = 112.5 SRE-hours/week (140% utilization).
    - Post-Automation Target: 30 incidents/week * 30 min = 15 SRE-hours/week.
    - Build Cost: ~3 months of engineering = $45K.
    - Annual Savings: $30K overtime + $100K SLA avoided = $130K/year.

    **Conclusion & Interpretation:**
    - **Result: 2.9x ROI (Operational-Bound)**. Self-healing logic directly drops SRE utilization from 140% to 19%, stabilizing the entire fleet.
  options:
  - 'Increasing the number of inference threads will proportionally increase throughput, since modern accelerators scale linearly with thread count.'
  - 'Classify failure modes by frequency and automate top causes. Typical: (1) model OOM/crash (40%) — automated restart + fallback model; (2) connectivity loss (25%) — local buffering + exponential backoff; (3) sensor degradation (20%) — automated recalibration triggers; (4) storage full (10%) — automated log rotation.'
  - 'The primary issue is insufficient hardware capability; upgrading to next-generation hardware will resolve the performance gap without software changes.'
  - 'Add better monitoring and alerting.. More alerts without automated remediation just increases alert fatigue.'
