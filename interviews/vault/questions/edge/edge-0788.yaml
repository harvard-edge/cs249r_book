title: Self-Healing Edge AI Fleet
scenario: You operate a fleet of 5,000 edge AI devices deployed across 300 retail stores for loss prevention. The devices run 24/7 and you have 2 SREs managing the fleet. Current state: 3% of devices require manual intervention each week (150 devices), consuming 80% of SRE time.
question: How would you design a self-healing system to cut interventions from 150 per week to fewer than 15 without adding SREs?
details:
  realistic_solution: 'Classify failure modes by frequency and automate top causes. Typical: (1) model OOM/crash (40%) — automated restart + fallback model; (2) connectivity loss (25%) — local buffering + exponential backoff; (3) sensor degradation (20%) — automated recalibration triggers; (4) storage full (10%) — automated log rotation. Current: 150 incidents/week x 45 min = 112.5 SRE-hours (140% capacity). After automation: <15/week x 30 min = 7.5 hours. ROI: $45K build cost vs $130K/year savings.'
  common_mistake: |
    **The Pitfall:** "Add better monitoring and alerting."
    **The Rationale:** System architects assume visibility is the primary problem when managing edge fleets.
    **The Consequence:** More alerts without automated remediation just increases alert fatigue, overwhelming the already over-capacity SRE team without fixing the underlying issues.
  napkin_math: |
    1. **Current SRE Load**: 150 incidents/week * 45 min avg resolution = 112.5 SRE-hours/week. 2 SREs * 40 hours = 80 hours available. They are at 140% capacity.
    2. **Post-Automation Target**: 30 incidents/week * 30 min avg (faster diagnosis) = 15 SRE-hours/week (19% utilization). This frees 65 hours/week for proactive work.
    3. **Build Cost**: ~3 months of engineering (1 senior engineer) = $45K.
    4. **Annual Savings**: Reduced SRE overtime ($30K) + fewer SLA penalties avoided (est. $100K) = $130K/year.
    5. **ROI**: $130K / $45K = **2.9x in year 1**.
  options:
  - Increasing the number of inference threads will proportionally increase throughput, since modern accelerators scale linearly with thread count.
  - 'Classify failure modes by frequency and automate top causes. Typical: (1) model OOM/crash (40%) — automated restart + fallback model; (2) connectivity loss (25%) — local buffering + exponential backoff; (3) sensor degradation (20%) — automated recalibration triggers; (4) storage full (10%) — automated log rotation.'
  - The primary issue is insufficient hardware capability; upgrading to next-generation hardware will resolve the performance gap without software changes.
  - Add better monitoring and alerting.. More alerts without automated remediation just increases alert fatigue.
  correct_index: 1
