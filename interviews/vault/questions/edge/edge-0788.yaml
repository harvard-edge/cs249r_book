title: Self-Healing Edge AI Fleet
scenario: 'You operate a fleet of 5,000 edge AI devices deployed across 300 retail stores for loss prevention.
  The devices run 24/7 and you have 2 SREs managing the fleet. Current state: 3% of devices require manual
  intervention each week (150 devices), consuming 80% of SRE time. Design a self-healing system that reduces
  manual interventions by 90% — from 150/week to <15/week — without adding headcount.'
details:
  realistic_solution: 'Classify failure modes by frequency and automate top causes. Typical: (1) model
    OOM/crash (40%) — automated restart + fallback model; (2) connectivity loss (25%) — local buffering
    + exponential backoff; (3) sensor degradation (20%) — automated recalibration triggers; (4) storage
    full (10%) — automated log rotation. Current: 150 incidents/week x 45 min = 112.5 SRE-hours (140%
    capacity). After automation: <15/week x 30 min = 7.5 hours. ROI: $45K build cost vs $130K/year savings.'
  common_mistake: '"Add better monitoring and alerting." More alerts without automated remediation just
    increases alert fatigue. The SREs are already overwhelmed — they need fewer alerts, not more.'
  napkin_math: 'Current: 150 incidents/week × 45 min avg resolution = 112.5 SRE-hours/week. 2 SREs × 40
    hours = 80 hours available. They''re at 140% capacity (working overtime). After automation: 30 incidents/week
    × 30 min avg (faster diagnosis) = 15 SRE-hours/week. SRE utilization: 19%. Freed capacity: 65 hours/week
    for proactive work. Cost of self-healing system: ~3 months of engineering (1 senior engineer) = $45K.
    Annual savings: reduced SRE overtime ($30K) + fewer customer-impacting incidents (est. $100K in SLA
    penalties avoided) = $130K/year. ROI: 2.9× in year 1.'
  options:
  - Increasing the number of inference threads will proportionally increase throughput, since modern accelerators
    scale linearly with thread count.
  - 'Classify failure modes by frequency and automate top causes. Typical: (1) model OOM/crash (40%) —
    automated restart + fallback model; (2) connectivity loss (25%) — local buffering + exponential backoff;
    (3) sensor degradation (20%) — automated recalibration triggers; (4) storage full (10%) — automated
    log rotation.'
  - The primary issue is insufficient hardware capability; upgrading to next-generation hardware will
    resolve the performance gap without software changes.
  - Add better monitoring and alerting.. More alerts without automated remediation just increases alert
    fatigue.
  correct_index: 1
