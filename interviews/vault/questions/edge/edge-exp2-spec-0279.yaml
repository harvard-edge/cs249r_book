title: INT8 Dataflow Specification for Hailo-8
scenario: You are tasked with deploying an FP32 object detection model to a Hailo-8 edge accelerator for
  real-time video analytics. The Hailo-8 is a dataflow accelerator providing 26 TOPS strictly in INT8
  at 2.5W, and it features no local DRAM, streaming data directly from host memory. Specify a precision-reduction
  pipeline and system design that meets the accuracy requirements of the model while fully utilizing the
  26 TOPS INT8 engine without introducing host-memory streaming bottlenecks.
details:
  realistic_solution: The specification must dictate full-network Quantization-Aware Training (QAT) simulating
    INT8, rather than runtime mixed-precision. Because there is no local DRAM, the entire graph must be
    compiled to fit on-chip to maintain the dataflow. If a layer loses too much accuracy in INT8, the
    specification should use per-channel scaling or architectural modifications (like expanding channel
    width) to recover accuracy within the INT8 constraint, rather than breaking the pipeline to stream
    FP16 activations to the host.
  common_mistake: Candidates typically suggest standard mixed-precision execution (keeping sensitive layers
    in FP16) without realizing the hardware constraints. They ignore that on a purely INT8 spatial dataflow
    architecture like Hailo-8 with no local DRAM, falling back to FP16 requires breaking the dataflow
    graph and spilling massive intermediate activations to the host CPU.
  napkin_math: Assume we naively leave one intermediate layer in FP16 to run on the host CPU. A 256-channel
    128x128 feature map in FP16 is 256 * 128 * 128 * 2 bytes = 8.38 MB. Over a typical edge PCIe Gen3
    x4 link (~3.9 GB/s), a single round-trip (device to host and back) for this graph break takes (8.38
    MB * 2) / 3900 MB/s = 4.3 ms. This graph break alone caps the system at 232 FPS, completely wasting
    the 26 TOPS INT8 compute capacity that could otherwise process a 4 GOPS frame in under 0.2 ms.
