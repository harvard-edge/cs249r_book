title: A/B Partition OTA Power Throttling on AI 100
scenario: An on-premise edge server uses a Qualcomm Cloud AI 100 (75W TDP, 400 TOPS INT8, 32 GB LPDDR4x)
  for continuous video analytics. The system implements an A/B partition scheme for OTA firmware updates
  to ensure high availability. During the flash programming phase of a background OTA update, the system
  controller automatically throttles the INT8 inference throughput, even though the neural network weights
  are fully loaded in the 32 GB LPDDR4x memory. Explain why this throttling behavior occurs.
details:
  realistic_solution: The throttling is a necessary power management tradeoff to stay within the strict
    75W TDP limit. Writing to the secondary flash partition (Partition B) requires dedicated power for
    the flash controller and storage cells. To prevent exceeding the 75W envelope and triggering a system
    brownout, the power management IC dynamically downclocks the compute cores, sacrificing temporary
    inference throughput to safely accommodate the flash programming power spike.
  common_mistake: Candidates often incorrectly attribute the throttling to PCIe bus contention, CPU overhead,
    or shared memory bandwidth, failing to recognize that firmware flash programming requires significant
    peak power that competes with the accelerator's strict power budget.
  napkin_math: Maximum board power limit = 75W (yielding 400 TOPS max). The background flash memory programming
    for the OTA update requires 15W of peak power. The available power for the inference engine is therefore
    reduced to 60W (75W - 15W). Assuming linear power-to-performance scaling, the throttled inference
    throughput is (60W / 75W) * 400 TOPS = 320 TOPS. The system safely trades an 80 TOPS performance drop
    to prevent a TDP violation during the OTA update.
