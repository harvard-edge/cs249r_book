title: Heterogeneous Model Routing on Jetson Orin
scenario: 'We are deploying a multi-model inspection pipeline on an NVIDIA Jetson Orin (32 GB LPDDR5,
  60W TDP, 275 TOPS INT8). The system features a 2B parameter vision-language router model (INT8) and
  an 8B specialized diagnostic LLM (INT4). You must evaluate two deployment architectures to maintain
  a strict 150ms end-to-end latency budget per inference: Architecture A runs both models sequentially
  on the Ampere GPU, while Architecture B pins the router to the Deep Learning Accelerator (DLA) and runs
  the LLM on the GPU. Which architecture is better and why?'
details:
  realistic_solution: Architecture B is superior for this compound pipeline. By offloading the 2B router
    to the DLA, we eliminate GPU context switching and maximize the concurrent utilization of the Orin's
    60W power envelope. The bottleneck for the 8B LLM is memory bandwidth during auto-regressive decoding,
    so dedicating the GPU solely to the LLM ensures it monopolizes the memory bandwidth, preventing latency
    spikes during pipeline handoffs.
  common_mistake: Candidates often choose Architecture A, assuming the Ampere GPU's higher peak TOPS will
    yield the fastest sequential execution. They fail to account for the memory bandwidth contention and
    context-switching overhead that occurs when swapping two large models on a unified memory architecture.
  napkin_math: 'The Orin''s 32 GB LPDDR5 provides ~204 GB/s of memory bandwidth. The 8B LLM (INT4) occupies
    ~4.5 GB. Reading the weights for decoding takes: 4.5 GB / 204 GB/s = ~22 ms per token. A 5-token response
    takes 110 ms. The 2B router (INT8) occupies ~2 GB. Processing it sequentially on the GPU requires
    reading its weights: 2 GB / 204 GB/s = ~10 ms. Architecture A latency: Router (10ms) + GPU Context
    Switch (~15ms) + LLM (110ms) = 135ms (dangerously close to 150ms). Architecture B: the DLA handles
    the router asynchronously while the GPU avoids context switching, dedicating its full bandwidth to
    the 110ms LLM decoding, comfortably meeting the 150ms budget.'
