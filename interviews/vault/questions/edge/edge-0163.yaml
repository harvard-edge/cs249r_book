title: The On-Chip vs. Off-Chip Memory Chasm
scenario: You're profiling a real-time object detection model on an edge device like a Jetson AGX Orin.
  You notice significant latency comes from the accelerator waiting for data. The profiler shows the bottleneck
  is moving intermediate tensors between the accelerator's on-chip L2 cache and the main system's LPDDR5
  DRAM. Roughly identify how much slower a read from LPDDR5 is compared to a read that hits the on-chip
  L2 cache.
details:
  realistic_solution: An access to LPDDR5 DRAM is approximately 25 times slower than an L2 cache hit.
    On-chip L2 cache latency is around 4 ns, while LPDDR5 latency is about 100 ns. This physical reality
    is why techniques like layer fusion (to keep intermediate tensors in cache) and careful memory management
    are not optional optimizations but core requirements for performant edge AI.
  common_mistake: Engineers often underestimate the 'memory wall' on edge devices. They may know DRAM
    is slower, but not grasp the order-of-magnitude penalty for going 'off-chip' (from the processor silicon
    to external memory chips). This leads to poor data layout choices where tensors are unnecessarily
    evicted from cache, breaking real-time deadlines.
  napkin_math: 'Using the ''human time'' analogy from the playbook: If an L2 cache read took 4 seconds,
    waiting for the same data from LPDDR5 DRAM would take ~100 seconds. This is over a minute and a half
    of waiting, which is an eternity for a system with a 33ms (30 FPS) deadline.'
  options:
  - ~2-3x slower
  - ~25x slower
  - ~300x slower
  - The speed is the same, just the capacity is different
  correct_index: 1
