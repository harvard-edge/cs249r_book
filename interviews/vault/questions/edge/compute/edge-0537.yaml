title: 'The DVFS Latency Jitter: Real-Time Deadlines'
scenario: 'Your Google Coral Dev Board runs a gesture recognition model for a kiosk application. Average inference latency is 8ms, but you observe periodic spikes to 25ms every 10-15 seconds, causing visible UI stutter. The spikes don''t correlate with input complexity. CPU temperature is a stable 65°C, well below the 85°C throttle point.'
question: 'What''s causing the periodic latency variance?'
details:
  realistic_solution: 'The SoC uses Linux''s schedutil CPU frequency governor. The gesture pipeline has a bursty workload pattern. The governor sees low average utilization and downclocks the CPU from 1.5 GHz to 800 MHz. When the next frame arrives, the CPU needs 2-3ms to ramp back up. During this ramp, preprocessing runs at 800 MHz, taking 15ms instead of 8ms. Total inference becomes 15ms + 10ms (TPU) = 25ms.'
  common_mistake: |
    **The Pitfall:** Assuming the variance is caused by input complexity or background processes stealing CPU.
    **The Rationale:** These are common causes of latency jitter in non-deterministic operating systems.
    **The Consequence:** Engineers waste time debugging the model or writing complex OS schedulers when a simple DVFS governor setting is the root cause.
  napkin_math: |
    **Assumptions & Constraints:**
    - CPU at 1.5 GHz: preprocessing = 8ms.
    - TPU inference time: 10ms (unaffected).

    **Calculations:**
    - CPU at 800 MHz preprocessing: 8ms * (1500 / 800) = 15ms.
    - Spike latency: 15ms (CPU) + 10ms (TPU) = 25ms.
    - Normal latency: 8ms + 10ms = 18ms.

    **Conclusion & Interpretation:**
    - **Result: 25ms strict latency spikes (Compute-Latency-Bound)**. CPU frequency downclocking mathematically inflates preprocessing time under burst workloads.
