title: Inference Compute Specification for Cloud AI 100
scenario: You are tasked with specifying the compute execution strategy for a high-throughput computer vision pipeline deploying on an on-premise Qualcomm Cloud AI 100. The system must process multiple camera streams efficiently. The hardware features 400 TOPS INT8 peak compute, 32 GB of LPDDR4x memory, and a strict 75W TDP limit.
question: How do you balance batch size and operational intensity to maximize the INT8 compute utilization without hitting the LPDDR4x memory bandwidth wall?
details:
  realistic_solution: The specification should choose the smallest micro-batch that raises operational intensity enough to keep the INT8 cores busy without violating stream latency. Profile the model's per-frame operations, weight bytes, activation bytes, and memory bandwidth; then require B such that the per-frame memory traffic is roughly weights/B plus activations and the resulting bandwidth stays below the LPDDR4x limit with headroom. Increase B only until weight reuse stops improving throughput or latency/queueing exceeds the camera deadline, and prefer fused operators and layouts that keep activations local because batching alone cannot fix activation-bandwidth bottlenecks.
  common_mistake: |
    **The Pitfall:** Specifying a batch size of 1 to minimize latency without analyzing operational intensity.
    **The Rationale:** Developers assume that minimizing latency is the only priority, completely ignoring the memory bandwidth wall.
    **The Consequence:** Memory bandwidth bottlenecks the execution because weights must be loaded from memory for every single input, starving the 400 TOPS compute units.
  napkin_math: |
    **Assumptions & Constraints:**
    - LPDDR4x bandwidth: ~136 GB/s.
    - Peak compute: 400 TOPS INT8.
    - Profiled model compute: 10 GOPs/frame.
    - Let W be model-weight bytes read per batch and A be activation/input bytes per frame.

    **Calculations:**
    - Compute-only peak throughput = 400,000 GOPS / 10 GOPs per frame = 40,000 FPS.
    - 50% compute utilization target = 200,000 GOPS/s / 10 GOPs per frame = 20,000 FPS.
    - Per-frame memory traffic with batch size B is approximately W/B + A.
    - Required bandwidth at target FPS is target_FPS * (W/B + A), which must stay below 136 GB/s with margin.
    - Choose the smallest B satisfying the bandwidth inequality and the per-stream latency budget.

    **Conclusion & Interpretation:**
    - **Result: choose the smallest profiled micro-batch that satisfies bandwidth and latency constraints**. Micro-batching should amortize weight reads while avoiding activation traffic, queueing delay, and LPDDR4x saturation.
