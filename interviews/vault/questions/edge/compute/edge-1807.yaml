title: 'Inference Compute Specification for Cloud AI 100'
scenario: 'You are tasked with specifying the compute execution strategy for a high-throughput computer vision pipeline deploying on an on-premise Qualcomm Cloud AI 100. The system must process multiple camera streams efficiently. The hardware features 400 TOPS INT8 peak compute, 32 GB of LPDDR4x memory, and a strict 75W TDP limit.'
question: 'How do you balance batch size and operational intensity to maximize the INT8 compute utilization without hitting the LPDDR4x memory bandwidth wall?'
details:
  realistic_solution: 'The specification must dictate a batched execution model to increase operational intensity (compute operations per byte accessed). Specify a batch size large enough to ensure model weights, once loaded into the local SRAM from the 32 GB LPDDR4x, are reused across multiple inputs.'
  common_mistake: 'Specifying a batch size of 1 to minimize latency without analyzing operational intensity. Memory bandwidth bottlenecks the execution because weights must be loaded from memory for every single input, starving the 400 TOPS compute units.'
  napkin_math: |
    **Assumptions & Constraints:**
    - LPDDR4x bandwidth: ~136 GB/s.
    - Peak compute: 400 TOPS INT8.
    - Model: 10 GOPs/frame, 2 GB of INT8 weights.

    **Calculations:**
    - Batch size 1 weight read time: 2 GB / 136 GB/s = 14.7ms.
    - Batch size 1 max throughput: 1 / 14.7ms ≈ 68 FPS (680 GOPs/s, or 0.17% compute utilization).
    - Target 50% compute utilization (200 TOPS): 20,000 FPS.
    - Minimum batch size to reach 50% utilization: 20,000 / 68 ≈ 294.

    **Conclusion & Interpretation:**
    - **Result: Batch Size 294 (Memory-Bound)**. The specification must require a massive batch size to amortize weight reads and prevent memory starvation.
