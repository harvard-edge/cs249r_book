title: 'The Edge Roofline Ridge Point: Roofline Analysis'
scenario: You're an engineer on an autonomous vehicle team, tasked with characterizing the performance of a new perception model on a Jetson AGX Orin. Before profiling the model itself, you need to understand the hardware's theoretical limits.
question: What is the hardware's ridge point in Ops/Byte?
details:
  realistic_solution: The ridge point separates the memory-bound and compute-bound regions on a Roofline plot. It is defined as Peak Throughput (Ops/sec) divided by Peak Memory Bandwidth (Bytes/sec). Converting TOPS to Ops/sec and GB/s to Bytes/sec is critical before dividing 275e12 by 204.8e9 to yield ~1343 Ops/Byte.
  common_mistake: |
    **The Pitfall:** Unit mismatch when calculating arithmetic intensity.
    **The Rationale:** Candidates fail to convert TOPS (10^12 Ops/s) and GB/s (10^9 Bytes/s) to a common base, or they invert the ratio (calculating Bytes/Op instead).
    **The Consequence:** This leads to an answer that is off by a factor of 1000 or conceptually backwards.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak Compute: 275 TOPS (275e12 Ops/sec).
    - Peak Memory Bandwidth: 204.8 GB/s (204.8e9 Bytes/sec).

    **Calculations:**
    - Ridge Point = Peak Ops / Peak Mem Bandwidth.
    - 275,000,000,000,000 / 204,800,000,000 = 1342.7 Ops/Byte.

    **Conclusion & Interpretation:**
    - **Result: ~1343 Ops/Byte (Roofline Ridge Point)**. Models with arithmetic intensity below this value are memory-bound; above this value, they are compute-bound.
  options:
  - ~1.34 Ops/Byte
  - ~1343 Ops/Byte
  - ~0.74 Ops/Byte
  - ~10744 Ops/Byte
