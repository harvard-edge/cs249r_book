title: ResNet-50 Roofline Throughput for Batch 1 and Batch 64 on Jetson Orin
scenario: ResNet-50 (25 MB INT8 weights, 4.1 GOPS/image) runs inference on a Jetson Orin-class device with 275 TOPS INT8 peak compute and 204.8 GB/s memory bandwidth. Assume about 1 MB/image of input/output activation traffic in addition to weight reads.
question: Why is batch=1 ResNet-50 on Jetson Orin memory-bound, what throughput does Roofline predict, and how does batch=64 change it?
details:
  realistic_solution: |
    Roofline compares arithmetic intensity against the hardware ridge point. The ridge point is 275 TOPS / 204.8 GB/s ≈ 1343 ops/byte. At batch=1, each image moves about 25 MB of weights plus 1 MB of input/output traffic, so AI≈4.1 GOPS / 26 MB = 158 ops/byte, which is memory-bound. Roofline throughput is memory bandwidth divided by bytes/image: 204.8 GB/s / 26 MB ≈ 7877 images/s. At batch=64 with weight-stationary reuse, the batch moves 25 MB of weights plus 64 MB of image traffic, or 1.39 MB/image. AI≈4.1 GOPS / 1.39 MB = 2948 ops/byte, above the ridge point, so throughput becomes compute-bound at 275 TOPS / 4.1 GOPS ≈ 67,073 images/s.
  common_mistake: |
    **The Pitfall:** Not understanding that weight-stationary dataflow only helps when the batch size is > 1.
    **The Rationale:** Engineers assume "dataflow optimizations" automatically improve single-stream real-time latency.
    **The Consequence:** Expecting huge throughput gains for streaming inputs, only to realize the accelerator is still starved by weight-loading delays.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin-class peak INT8 compute = 275 TOPS.
    - Memory bandwidth = 204.8 GB/s = 204,800 MB/s using decimal units.
    - Ridge point = 275e12 ops/s / 204.8e9 bytes/s = 1343 ops/byte.
    - ResNet-50 = 25 MB weights, 4.1 GOPS/image.
    - Input/output activation traffic = 1 MB/image.
    - At batch=64, assume weights are read once for the batch and fully reused across all 64 images.

    **Calculations:**
    - Batch=1 bytes/image = 25 MB weights + 1 MB I/O = 26 MB.
    - Batch=1 AI = 4.1G ops / 26M bytes = 158 ops/byte, below the 1343 ops/byte ridge point.
    - Batch=1 memory-bound throughput = 204,800 MB/s / 26 MB = 7877 img/s.
    - Batch=64 total bytes = 25 MB weights read once + 64*1 MB I/O = 89 MB per batch, or 89/64 = 1.39 MB/image.
    - Batch=64 AI = 4.1G ops / 1.39M bytes = 2948 ops/byte, above the ridge point.
    - Batch=64 compute-bound throughput = 275,000 GOPS/s / 4.1 GOPS/image = 67,073 img/s.

    **Conclusion & Interpretation:**
    - **Result: Batch=1 Memory-Bound, Batch=64 Compute-Bound.** Roofline predicts about 7.9k img/s at batch=1 and about 67k img/s at batch=64 under these assumptions.
