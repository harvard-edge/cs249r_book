title: Systolic Array Tiling Strategy for Google Coral Edge TPU
scenario: You are designing a real-time object detection system for a smart camera connected via USB to a systolic array edge accelerator. You need to deploy a custom CNN onto this hardware.
question: How would you choose weight- versus output-stationary tiling to keep the INT8 array busy without CPU fallbacks?
details:
  realistic_solution: 'A strong candidate will architect a pipeline where all operators are strictly INT8 quantized and fused to guarantee execution exclusively on the accelerator. They will evaluate layer dimensions to dynamically adapt the dataflow: utilizing output-stationary mapping for early layers with massive activation maps to minimize partial sum memory traffic, and weight-stationary mapping for deeper, parameter-heavy layers to keep the systolic array fully fed. Their tiling strategy will be precisely sized to fit weights and activations simultaneously within the on-chip SRAM, completely avoiding costly USB bus transfers during layer execution.'
  common_mistake: |
    **The Pitfall:** Proposing generic tiling architectures without accounting for operator support.
    **The Rationale:** Candidates ignore strict INT8 quantization requirements and limited ops, causing host-CPU fallbacks. They also overlook the USB bandwidth bottleneck, picking tiling sizes that thrash the on-chip SRAM.
    **The Consequence:** Constant data thrashing between host memory and SRAM over a slow USB bus, destroying system performance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Accelerator efficiency: 4 TOPS at 2W (2 TOPS/W).
       * 30 FPS real-time requirement.
       * INT8 CNN workload requires 40 GOPS per frame.
    2. **Calculations:**
       * Compute budget at 30 FPS = 4,000 GOPS / 30 = 133.3 GOPS per frame.
       * Theoretical compute utilization = 40 GOPS / 133.3 GOPS = 30%.
       * Active network compute power = 0.30 * 2W = 0.6W.
    3. **Conclusion & Interpretation:**
       * **This leaves 1.4W of thermal/power headroom to handle critical USB I/O data movement and host communications without exceeding the 2W budget. Result: Power/Thermal-Bound.**
