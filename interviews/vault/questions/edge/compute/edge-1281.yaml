title: Systolic Array Tiling for USB Edge Accelerators
scenario: You are designing a real-time object detection system for a smart camera connected via USB to a systolic array edge accelerator. You need to deploy a custom CNN onto this hardware.
question: How would you choose weight- versus output-stationary tiling to keep the INT8 array busy without CPU fallbacks?
details:
  realistic_solution: 'A strong candidate will first verify that every operator is supported by the accelerator compiler in INT8 form, then choose tiling that keeps each supported layer inside on-chip SRAM as much as possible. They will evaluate layer dimensions to select the dataflow: output-stationary mapping for early layers with large activation maps to reduce partial-sum traffic, and weight-stationary mapping for deeper, parameter-heavy layers to reuse filters and keep the systolic array fed. This reduces USB transfers to graph boundaries and unavoidable staging, but it cannot guarantee zero host involvement if an operator, tensor shape, or tiling choice forces fallback.'
  common_mistake: |
    **The Pitfall:** Proposing generic tiling architectures without accounting for operator support.
    **The Rationale:** Candidates ignore strict INT8 quantization requirements and limited ops, causing host-CPU fallbacks. They also overlook the USB bandwidth bottleneck, picking tiling sizes that thrash the on-chip SRAM.
    **The Consequence:** Constant data thrashing between host memory and SRAM over a slow USB bus, destroying system performance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Accelerator efficiency: 4 TOPS at 2W (2 TOPS/W).
       * 30 FPS real-time requirement.
       * INT8 CNN workload requires 40 GOPS per frame.
       * USB 2.0-class effective bandwidth for this camera module: ~40 MB/s after protocol overhead.
    2. **Calculations:**
       * Compute budget at 30 FPS = 4,000 GOPS / 30 = 133.3 GOPS per frame.
       * Theoretical compute utilization = 40 GOPS / 133.3 GOPS = 30%.
       * This leaves compute headroom, so the tiling risk is not peak TOPS.
       * If one unsupported layer spills a 4 MB activation tensor to the host and reads back 4 MB of results, USB traffic per frame is ~8 MB.
       * At 30 FPS, fallback traffic = 8 MB * 30 = 240 MB/s, which exceeds a ~40 MB/s effective USB budget.
    3. **Conclusion & Interpretation:**
       * **Result: Transfer-Bound Fallback Risk.** The workload uses only ~30% of peak compute, but a single host fallback can exceed USB bandwidth. The tiling strategy should keep supported INT8 layers resident in SRAM and minimize graph-boundary transfers.
