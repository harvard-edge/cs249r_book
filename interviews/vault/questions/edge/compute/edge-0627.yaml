title: The Automotive Roofline Dilemma
scenario: You are the new Principal Engineer designing the perception compute module for a next-generation autonomous truck. The current system uses a power-hungry 150W automotive GPU. Your mandate is to drastically reduce cost and power for the new platform, targeting a total power budget of 45W and a 30 FPS processing rate for a challenging new multi-camera vision model.
question: 'Which compute architecture would you choose to meet 45W and 30 FPS for the memory-intensive vision model, and why isn''t peak TOPS enough?'
details:
  realistic_solution: |
    The correct approach is to recognize that system performance is a function of both the hardware's capabilities and the workload's demands. A Vision Transformer, especially on high-resolution camera data, is fundamentally a memory-intensive architecture. The self-attention mechanism requires large matrix multiplications (Q, K, V) that often exceed on-chip cache, leading to significant memory traffic.
  common_mistake: |
    **The Pitfall:** Fixating on the 'peak TOPS' marketing number and ignoring memory bandwidth.
    **The Rationale:** Engineers assume a high TOPS chip must be better without calculating the Arithmetic Intensity (AI) of the transformer workload.
    **The Consequence:** Selecting hardware with immense compute that stalls waiting for data, completely failing to meet the 30 FPS latency deadline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target ViT compute: 500 GOPs. Memory access: 10 GB/inference.
    - Target Framerate: 30 FPS (33.3 ms).
    - Hardware bandwidth: 204.8 GB/s. Compute: 275 TOPS.

    **Calculations:**
    - Memory read time = 10 GB / 204.8 GB/s = 48.8 ms.
    - Compute time = 500 GOPS / 275 TOPS = 1.8 ms.
    - Arithmetic Intensity = 500 GOPS / 10 GB = 50 Ops/Byte.

    **Conclusion & Interpretation:**
    - **Result: 48.8 ms Latency (Memory-Bandwidth Bound)**. Memory demands of self-attention eclipse raw compute capability, missing the 33ms target.
