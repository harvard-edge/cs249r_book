title: The DLA-GPU Pipeline Overlap
scenario: 'On a Jetson Orin, you split a detection pipeline: the DLA runs a lightweight backbone (6ms) while the GPU runs post-processing on the previous frame (4ms). The remaining detection head runs on the GPU (10ms).'
question: What is the maximum pipeline throughput of this heterogeneous setup compared to sequential execution, and what is the new bottleneck?
details:
  realistic_solution: |
    Sequential entirely on GPU: 18ms per frame -> 55.5 FPS. Heterogeneous Pipelined: DLA runs the backbone (6ms) concurrently with the GPU. The GPU must execute both post-processing (4ms) and the detection head (10ms) sequentially for each frame, meaning total GPU time per frame is 14ms. In a pipelined setup, throughput is limited by the slowest stage. Pipeline period = max(T_DLA, T_GPU) = max(6, 14) = 14ms. Maximum throughput = 1000 / 14ms ≈ 71.4 FPS. The GPU is the new bottleneck at 14ms.
  common_mistake: |
    **The Pitfall:** Assuming independent GPU tasks can run in parallel on a single GPU.
    **The Rationale:** Candidates observe two different GPU tasks (post-processing and detection head) and erroneously assume perfect concurrent execution.
    **The Consequence:** Incorrectly calculating pipeline bottlenecks or overestimating throughput by improperly summing pipelined stages.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sequential on GPU: 18ms (55.5 FPS).
    - Heterogeneous Pipelined: DLA (6ms) + GPU (4ms post-processing + 10ms head).

    **Calculations:**
    - Pipelined Stage 1 (DLA): 6ms.
    - Pipelined Stage 2 (GPU): 4ms + 10ms = 14ms.
    - Pipeline Bottleneck: max(6ms, 14ms) = 14ms.
    - Max Throughput: 1000 / 14ms = 71.4 FPS.

    **Conclusion & Interpretation:**
    - **Result: GPU-Bound Pipeline (Compute-Bound).** The pipeline period is limited by the slowest stage (GPU at 14ms), achieving a max throughput of 71.4 FPS (a 1.28x speedup over sequential).
