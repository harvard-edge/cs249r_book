title: The Autonomous Driving FPS Mystery
scenario: You are a Staff ML Systems Engineer on an autonomous vehicle team. Your new LiDAR-based 3D object detection model must achieve a 20 FPS minimum to meet the real-time perception system's deadline. However, live profiling shows the pipeline only achieves 12 FPS, even though `nvprof` reports 95% GPU utilization. You've determined the model performs approximately 40 GFLOPs and requires moving 16 GB of data (weights, activations, and large intermediate 3D voxel grids from DRAM) for each inference.
question: Using the roofline model, what bottleneck explains 12 FPS despite 95% GPU utilization for the 40 GFLOP, 16 GB LiDAR model?
details:
  realistic_solution: 'The model is memory-bandwidth bound. To determine this, we calculate the Arithmetic Intensity (AI) and compare it to the hardware Ridge Point. The AI is extremely low, meaning it performs relatively few calculations for each byte it fetches. The architecture has powerful compute units, but they are being starved of data by main memory bandwidth. The 95% utilization mostly represents core stall cycles.'
  common_mistake: |
    **The Pitfall:** Assuming high GPU utilization indicates the workload is compute-bound.
    **The Rationale:** Engineers see 'busy' compute units in top-level profilers and fail to realize utilization metrics aggregate memory stall time alongside active compute.
    **The Consequence:** Attempting to optimize math kernels or purchase a higher TOPS GPU instead of addressing the actual data movement bottleneck via fusion or caching.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory Bandwidth: 204.8 GB/s.
    - Peak Compute: 137.5 TFLOPS (FP16).
    - Model Compute: 40 GFLOPs.
    - Model Memory Traffic: 16 GB per inference.

    **Calculations:**
    - Hardware Ridge Point: 137,500 GFLOPS / 204.8 GB/s = 671 OPS/Byte.
    - Model Arithmetic Intensity (AI): 40 GFLOPs / 16 GB = 2.5 OPS/Byte.
    - Inference latency limit: 16 GB / 204.8 GB/s = 78.1 ms per frame.
    - Max achievable throughput: 1000 ms / 78.1 ms = 12.8 FPS.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth Bound**. Since AI (2.5) << Ridge Point (671), the model is severely starved for data, capping theoretical throughput at 12.8 FPS regardless of GPU TOPS capacity.
  options:
  - 'The model is compute-bound. 95% GPU utilization indicates the compute units are saturated and we need a more powerful GPU to reach 20 FPS.'
  - 'The device is thermal throttling, lowering its clock frequency and missing the FPS target.'
  - 'The model is memory-bandwidth bound. Its arithmetic intensity is too low for the architecture, causing the GPU to stall while waiting for data.'
  - 'The model is PCIe-bandwidth bound. The 16 GB of data cannot be transferred over the bus fast enough to support 20 FPS.'
  correct_index: 2
