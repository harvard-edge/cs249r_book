title: 'Edge AI Costing: Large-Scale Vision Deployment on Hailo-8'
scenario: Your team is tasked with deploying a real-time object detection model on 10,000 Hailo-8 edge devices for a smart city surveillance project. The chosen model requires approximately 100 GOPS (INT8 operations) per inference and needs to run continuously at 10 frames per second (FPS) for 24/7 operation over a 5-year lifespan. Each Hailo-8 accelerator offers 26 TOPS (INT8) compute capability with a typical power consumption of 2.5W during active inference.
question: What are the per-device FPS, fleet energy use, 5-year energy cost, and hidden deployment costs for 10,000 Hailo-8 devices?
details:
  realistic_solution: The theoretical per-device capacity is 26 TOPS / 100 GOPS per inference = 260 FPS if the INT8 workload maps linearly to the accelerator peak; sustained FPS may be lower after memory, host, and batching overheads. For 10,000 accelerators at 2.5W running 24/7, accelerator-only fleet energy is 219,000 kWh per year and 1,095,000 kWh over 5 years, costing $164,250 at $0.15/kWh. Hidden deployment costs outside this power-only estimate include host CPU and memory power, enclosure and cooling, networking and backhaul, security updates, maintenance truck rolls, spares, monitoring, and site power conversion losses.
  common_mistake: |
    **The Pitfall:** Confusing theoretical peak TOPS with sustained real-world performance.
    **The Rationale:** Engineers fail to account for quiescent power, power conversion inefficiencies, or network/maintenance costs.
    **The Consequence:** The calculated deployment costs drastically underestimate the total cost of ownership for a large fleet.
  napkin_math: |
    **Assumptions & Constraints:**
    - Device count: 10,000 Hailo-8 accelerators.
    - Workload: 100 GOPS per inference at a required 10 FPS.
    - Device compute: 26 TOPS = 26,000 GOPS/s for INT8-equivalent operations if the model maps efficiently to the accelerator.
    - Power consumption: 2.5 W per device.
    - Lifespan: 5 years (24/7 operation).
    - Energy cost: $0.15/kWh.

    **Calculations:**
    - Maximum theoretical per-device FPS: 26,000 GOPS/s / 100 GOPS/inference = 260 FPS before utilization losses.
    - Required throughput: 100 GOPS/inference * 10 FPS = 1,000 GOPS/s = 1 TOPS, below the 26 TOPS peak.
    - Annual Energy per Device: 2.5 W * 8760 h = 21,900 Wh (21.9 kWh).
    - Fleet Annual Energy: 10,000 devices * 21.9 kWh = 219,000 kWh.
    - Total 5-Year Energy: 219,000 kWh/year * 5 years = 1,095,000 kWh.
    - Total Energy Cost: 1,095,000 kWh * $0.15/kWh = $164,250.

    **Conclusion & Interpretation:**
    - **Result: 260 FPS theoretical per-device capacity, 1,095,000 kWh fleet accelerator energy over 5 years, and $164,250 accelerator energy cost.** The 10 FPS workload is feasible on paper, but this excludes host/platform power, networking, maintenance, and operational overheads.
