title: Architecting a Streaming Pipeline for Hailo-8
scenario: You are architecting an edge perception system that relies on a Hailo-8 dataflow accelerator connected to a low-power host SoC over PCIe Gen3 x2. The accelerator uses an on-chip dataflow memory hierarchy, so intermediate activations should stay inside the compiled graph rather than being materialized through host memory.
question: How do you use the roofline model to evaluate the tradeoffs of which operations execute on the Hailo-8 versus the host, and how does the lack of local DRAM constrain your design?
details:
  realistic_solution: The roofline analysis should separate accelerator compute from host-link traffic. Dense convolutions and other high-operational-intensity kernels should stay on Hailo-8, where the compiler can keep activations in the internal SRAM/dataflow fabric. Low-intensity postprocessing or bookkeeping can run on the host only when it consumes compact outputs and does not force large intermediate feature maps over PCIe. With no local DRAM for arbitrary tensor staging, the design must fuse or schedule intermediate activations on chip; otherwise the host link becomes the effective roofline long before the 26 TOPS peak matters.
  common_mistake: |
    **The Pitfall:** Assuming the 26 TOPS peak compute is achievable without deep analysis of the host connection.
    **The Rationale:** Candidates often design a system that frequently swaps large intermediate feature maps back and forth to the host, ignoring the devastating impact this has on the system's operational intensity.
    **The Consequence:** The design falls onto the memory-bound slope of the roofline, drastically reducing utilization and overall system throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - PCIe Gen3 x2 effective host bandwidth: ~1.97 GB/s.
    - Hailo-8 peak INT8 compute: 26 TOPS = 26,000 GOPS.
    - Decimal units are used for this ridge-point estimate.

    **Calculations:**
    - Host-link ridge point = 26,000 GOPS / 1.97 GB/s = ~13,200 operations/byte.
    - Moving a 2 MB intermediate across the host link costs 2 MB / 1.97 GB/s = ~1.0 ms each direction before software overhead.
    - To amortize a 2 MB one-way transfer at the compute peak, the operation would need about 2,000,000 bytes * 13,200 ops/byte = 26.4 GOPS of useful work.

    **Conclusion & Interpretation:**
    - **Result: host transfers require extremely high operational intensity to amortize.** Keep high-intensity kernels and intermediates inside the Hailo-8 dataflow graph; move only compact, low-intensity outputs to the host.
