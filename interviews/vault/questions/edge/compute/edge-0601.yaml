title: The Integer Roofline
scenario: You're profiling a YOLOv8 detection model on a Jetson Orin NX. The Orin's DLA is rated at 100 TOPS INT8 with 102 GB/s of memory bandwidth. Your model achieves 18 TOPS.
question: How do you construct the integer roofline for YOLOv8 on the Orin DLA, and why might 18 TOPS not mean compute underutilization?
details:
  realistic_solution: Constructing a roofline model reveals the hardware ridge point. Next, calculate the model's Arithmetic Intensity (Ops/Byte) using the same INT8 op-count convention as the advertised DLA TOPS. Because the YOLOv8 arithmetic intensity is below the DLA's ridge point, the workload sits on the sloped memory-bound side of the roofline. Hitting 18 TOPS is below the 100 TOPS compute peak because memory bandwidth sets a lower attainable ceiling, so low peak-TOPS utilization is not by itself proof that the INT8 math kernels are poorly utilized. To improve performance, increase arithmetic intensity with layer fusion, tiling, and reduced DRAM traffic.
  common_mistake: |
    **The Pitfall:** Using peak theoretical hardware TOPS as the denominator for calculating utilization efficiency.
    **The Rationale:** Engineers assume that low TOPS utilization implies inefficiently written compute kernels, failing to construct a roofline model that identifies the true memory ceiling.
    **The Consequence:** Months are wasted optimizing matrix-multiply code that is already sitting completely idle waiting for data fetches from DRAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - Count one INT8 multiply-accumulate as one reported "op" for this roofline. If using two ops per MAC, use the same convention for both model ops and peak TOPS.
    - DLA peak compute: 100 TOPS = 100e12 INT8 ops/s.
    - DLA memory bandwidth: 102 GB/s = 102e9 bytes/s.
    - YOLOv8-S INT8 ops: ~28.4e9 ops. Total memory traffic (weights + activations): ~55e6 bytes.

    **Calculations:**
    - Hardware ridge point = 100e12 ops/s / 102e9 bytes/s = 980 Ops/Byte.
    - Model Arithmetic Intensity (AI) = 28.4e9 Ops / 55e6 Bytes ≈ 516 Ops/Byte.
    - Compare: 516 Ops/Byte < 980 Ops/Byte (Model is memory-bound).
    - Memory-bound attainable ceiling = 102e9 bytes/s * 516 ops/byte = 52.6e12 ops/s = 52.6 TOPS.
    - Utilization of memory-bound ceiling = 18 actual TOPS / 52.6 attainable TOPS = ~34%.
    - Utilization of compute peak alone = 18 actual TOPS / 100 peak TOPS = 18%, but that is the wrong denominator for a memory-bound workload.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth-Bound Roofline.** The model's attainable ceiling under these assumptions is about 52.6 TOPS, not the 100 TOPS compute peak. The observed 18 TOPS may indicate bandwidth, locality, or tiling inefficiency relative to that memory roof; it does not automatically mean the DLA's INT8 arithmetic units are the limiting resource.
