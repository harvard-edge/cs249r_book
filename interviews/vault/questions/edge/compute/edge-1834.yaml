title: Roofline Analysis for MobileNetV2 on Qualcomm Cloud AI 100
scenario: A development team is deploying a MobileNetV2 model on the Qualcomm Cloud AI 100 accelerator. Initial performance metrics show that accelerator utilization is lower than expected, and inference latency is high.
question: How would you use roofline analysis to diagnose if MobileNetV2 is compute-bound or memory-bound on the Qualcomm Cloud AI 100?
details:
  realistic_solution: Compute arithmetic intensity as operations divided by bytes moved, then compare it with the Cloud AI 100 ridge point of peak INT8 compute divided by memory bandwidth. For the stated 1x1 MobileNetV2 layer, the intensity is far below the ridge point, so the bandwidth roof is much lower than peak TOPS and the layer is memory-bound under this reuse model. The right fixes are operator fusion, layout choices, tiling, and weight/activation reuse, not simply chasing the 400 TOPS compute number.
  common_mistake: |
    **The Pitfall:** Focusing solely on peak TOPS without calculating arithmetic intensity.
    **The Rationale:** Candidates see 400 TOPS and assume the chip is just under-utilized due to bad software scheduling.
    **The Consequence:** They misdiagnose the bottleneck and spend weeks optimizing compute kernels when the model is physically starved for data by the memory-bandwidth limit.
  napkin_math: |
    **Assumptions & Constraints:**
       - Hardware: 400 TOPS INT8 = 400e12 ops/s, 136 GB/s peak memory bandwidth
       - MobileNetV2 layer: 1x1 Conv, 256 input channels, 512 output channels, 14x14 map
       - INT8 weights/activations are counted at 1 byte each, with weights read once from memory for this estimate.
    **Calculations:**
       - Ridge point = 400e12 ops/s / 136e9 bytes/s ≈ 2,941 ops/byte
       - Ops = 2 * 256 * 512 * 14 * 14 = 51,380,224 ops
       - Data access = weights + input + output = 131,072 + 50,176 + 100,352 = 281,600 bytes
       - Arithmetic intensity = 51,380,224 ops / 281,600 bytes ≈ 182.5 ops/byte
       - Bandwidth roof at this intensity = 182.5 ops/byte * 136e9 bytes/s ≈ 24.8 TOPS
    **Conclusion & Interpretation:**
       - **Result: Memory-Bound under the stated reuse model.** The layer's 182.5 ops/byte intensity is far below the 2,941 ops/byte ridge point, so the roofline limit is about 24.8 TOPS unless scheduling improves data reuse or reduces memory movement.
