title: Roofline Analysis for MobileNetV2 on Qualcomm Cloud AI 100
scenario: A development team is deploying a MobileNetV2 model on the Qualcomm Cloud AI 100 accelerator. Initial performance metrics show that accelerator utilization is lower than expected, and inference latency is high.
question: How would you use roofline analysis to diagnose if MobileNetV2 is compute-bound or memory-bound on the Qualcomm Cloud AI 100?
details:
  realistic_solution: Calculate the arithmetic intensity (AI) of MobileNetV2 (ratio of operations to data movement). Plot this on a roofline chart against the AI 100's ridge point (Peak Compute / Peak Memory Bandwidth). If the model's AI falls to the left of the ridge, it's memory-bound. Because MobileNetV2 uses depthwise separable convolutions, it has notoriously low AI, meaning optimizations must target memory bandwidth (data reuse, pruning) rather than kernel compute speed.
  common_mistake: |
    **The Pitfall:** Focusing solely on peak TOPS without calculating arithmetic intensity.
    **The Rationale:** Candidates see 400 TOPS and assume the chip is just under-utilized due to bad software scheduling.
    **The Consequence:** They misdiagnose the bottleneck and spend weeks optimizing CUDA/compute kernels when the model is physically starved for data by the 85 GB/s memory limit.
  napkin_math: |
    **Assumptions & Constraints:**
       - Hardware: 400 TOPS INT8 = 400e12 ops/s, 85 GB/s peak memory bandwidth
       - MobileNetV2 layer: 1x1 Conv, 256 input channels, 512 output channels, 14x14 map
       - INT8 weights/activations are counted at 1 byte each, with weights read once from memory for this estimate.
    **Calculations:**
       - Ridge point = 400e12 ops/s / 85e9 bytes/s ≈ 4,705 ops/byte
       - Ops = 2 * 256 * 512 * 14 * 14 = 51,380,224 ops
       - Data access = weights + input + output = 131,072 + 50,176 + 100,352 = 281,600 bytes
       - Arithmetic intensity = 51,380,224 ops / 281,600 bytes ≈ 182.5 ops/byte
       - Bandwidth roof at this intensity = 182.5 ops/byte * 85e9 bytes/s ≈ 15.5 TOPS
    **Conclusion & Interpretation:**
       - **Result: Memory-Bound under the stated reuse model.** The layer's 182.5 ops/byte intensity is far below the 4,705 ops/byte ridge point, so the roofline limit is about 15.5 TOPS unless scheduling improves data reuse or reduces memory movement.
