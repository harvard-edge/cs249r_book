title: 'The Fundamental Bottleneck Metric'
scenario: 'You are profiling a new object detection model for an autonomous vehicle on a power-constrained edge accelerator like a Jetson AGX Orin. You need to determine if the model performance is limited by the GPU raw computational power or its memory bandwidth.'
question: 'What is the fundamental metric you would calculate to make this determination?'
details:
  realistic_solution: 'The fundamental metric is Arithmetic Intensity (AI). It is the ratio of compute operations (OPS) to data movement (Bytes). By comparing the model AI to the hardware ridge point, you can definitively tell if it is compute-bound (AI > ridge point) or memory-bound (AI < ridge point).'
  common_mistake: 'Engineers often confuse the result of a bottleneck (like high latency) with its cause. They might also focus on a related but distinct metric like power efficiency (TOPS/W) or memory capacity (total RAM used), rather than the specific ratio that defines the performance bottleneck.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Layer compute: 20 Giga-OPS (20e9 OPS).
    - Layer data size: 500 MegaBytes (500e6 Bytes).

    **Calculations:**
    - Arithmetic Intensity = 20e9 OPS / 500e6 Bytes = 40 OPS/Byte.

    **Conclusion & Interpretation:**
    - **Result: 40 OPS/Byte (Memory-Bound)**. Comparing this direct ratio against hardware specs prevents misdiagnosing the primary bottleneck.
  options:
    - 'TOPS/W'
    - 'P99 Latency (ms)'
    - 'Arithmetic Intensity (Ops/Byte)'
    - 'Total Activation Memory (MB)'
