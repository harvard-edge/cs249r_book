title: 'Design a Dataflow Accelerator Pipeline for ResNet-50 on Hailo-8'
scenario: 'A multi-camera smart city application runs ResNet-50 on a Hailo-8 dataflow accelerator. The Hailo-8 provides 26 TOPS of INT8 compute at just 2.5W, but it operates purely as a dataflow architecture with no local DRAM, streaming data directly from host memory over PCIe. The target frame rate is 30 FPS across 4 cameras (120 FPS total).'
question: 'Which dataflow strategy would you use for ResNet-50 layers on Hailo-8 at 120 FPS, and how would you buffer weights?'
details:
  realistic_solution: |
    The optimal approach is to map the entire ResNet-50 subgraph onto the Hailo-8's distributed on-chip memory hierarchy, utilizing pipeline parallelism. For early layers with large activations and small weights, a weight-stationary dataflow minimizes PCIe traffic since weights can be pinned on-chip while activations stream through. For later layers with many channels but small spatial dimensions, an output-stationary approach is preferred to accumulate partial sums locally before streaming the final features back to the host, maximizing the 26 TOPS INT8 throughput within the strict 2.5W power budget.
  common_mistake: |
    **The Pitfall:** Assuming traditional layer-by-layer execution with intermediate activations written back to main memory.
    **The Rationale:** Approaching a dataflow accelerator as if it were a standard von Neumann GPU architecture.
    **The Consequence:** Saturating the PCIe bus and crippling throughput, completely missing the performance targets of the chip.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 120 FPS total across 4 cameras.
    - Compute Need: 8 GOPS/frame * 120 FPS = 960 GOPS.
    - Model Weights: 25.6 MB. Input: 150 KB. Output: 1 KB.

    **Calculations:**
    - Naive PCIe Bandwidth (Swapping Weights): 25.6 MB * 120 FPS = ~3 GB/s.
    - Dataflow PCIe Bandwidth (Stationary Weights): (150 KB + 1 KB) * 120 FPS = ~18 MB/s.

    **Conclusion & Interpretation:**
    - **Result: ~18 MB/s optimized traffic (I/O-Bound).** Keeping weights stationary on-chip slashes PCIe traffic, easily supporting the multi-camera pipeline.
