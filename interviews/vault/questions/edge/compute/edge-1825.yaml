title: Design a Dataflow Accelerator Pipeline for ResNet-50 on Hailo-8
scenario: A multi-camera smart city application runs ResNet-50 on a Hailo-8 dataflow accelerator. The Hailo-8 provides 26 TOPS of INT8 compute at just 2.5W, but it operates purely as a dataflow architecture with no local DRAM, streaming data directly from host memory over PCIe. The target frame rate is 30 FPS across 4 cameras (120 FPS total).
question: Which dataflow strategy would you use for ResNet-50 layers on Hailo-8 at 120 FPS, and how would you buffer weights?
details:
  realistic_solution: |
    Use a compiled streaming dataflow schedule with weights kept stationary in Hailo-8's distributed on-chip memories for each scheduled layer group. Stream camera inputs into the pipeline, keep intermediate activations and partial sums on chip across fused blocks where the compiler can schedule them, and emit only final outputs needed by the host. If all ResNet-50 weights cannot be resident at once, tile by compiler-managed layer groups and prefetch the next group's weights while the current group runs; do not reload weights or spill activations per frame.
  common_mistake: |
    **The Pitfall:** Assuming traditional layer-by-layer execution with intermediate activations written back to main memory.
    **The Rationale:** Approaching a dataflow accelerator as if it were a standard von Neumann GPU architecture.
    **The Consequence:** Saturating the PCIe bus and crippling throughput, completely missing the performance targets of the chip.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 120 FPS total across 4 cameras.
    - Compute need: 8 GOP/frame * 120 FPS = 960 GOP/s = 0.96 TOPS.
    - Model Weights: 25.6 MB. Input: 150 KB. Output: 1 KB.

    **Calculations:**
    - Naive per-frame weight streaming = 25.6 MB/frame * 120 frame/s = 3,072 MB/s (~3.1 GB/s).
    - Stationary-weight input/output traffic = (150 KB + 1 KB) * 120 frame/s = 18,120 KB/s (~18 MB/s).
    - The 0.96 TOPS compute demand is well below 26 TOPS peak if the compiled graph avoids host spills.

    **Conclusion & Interpretation:**
    - **Result: stationary-weight streaming dataflow.** The buffering plan reduces PCIe traffic from about 3.1 GB/s of repeated weight loads to about 18 MB/s of frame I/O, making the 120 FPS target depend on compiler scheduling and on-chip fit rather than per-frame weight movement.
