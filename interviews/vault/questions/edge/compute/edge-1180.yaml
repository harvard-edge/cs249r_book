title: 'Edge Transformer Cost Evaluation: Distilled vs Full Transformer on Hailo-8'
scenario: Compare DistilBERT vs BERT-base on Hailo-8 for product review sentiment at batch=1, seq=64.
question: Which should run on Hailo-8 for batch=1 sentiment, DistilBERT or BERT-base, and what throughput and cost tradeoffs result?
details:
  realistic_solution: |
    DistilBERT is the better Hailo-8 target for batch=1, seq=64 sentiment if its accuracy is acceptable. Both models should be compiled ahead of time with a fixed input shape; the weights live in the compiled execution graph and are not swapped over the host link for every request. DistilBERT has about half the layers and fewer parameters than BERT-base, so it should deliver roughly 1.7-2.0x higher throughput and about half the energy per inference under the same Hailo runtime. Using an explicit sizing estimate of 50 inf/s for DistilBERT versus 25 inf/s for BERT-base at 7.5W node power, DistilBERT costs about $0.004 per 1M inferences in energy versus $0.008 per 1M for BERT-base. The tradeoff is accuracy/headroom: choose BERT-base only if DistilBERT misses the sentiment-quality target.
  common_mistake: |
    **The Pitfall:** Ignoring compilation constraints for dynamic attention patterns.
    **The Rationale:** Candidates fail to recognize that dataflow accelerators like Hailo-8 require fixed-shape models compiled ahead of time.
    **The Consequence:** Proposing architectures that cannot actually be compiled or deployed on the target hardware.
  napkin_math: |
    **Assumptions & Constraints:**
    - Deployment uses compiled, fixed-shape Hailo graphs at batch=1, seq=64.
    - Weights are resident in the compiled graph; do not model per-request host-link weight transfers.
    - Node power estimate: Hailo-8 plus host = 7.5W active.
    - Sizing estimate for this small classifier: DistilBERT 50 inf/s, BERT-base 25 inf/s.
    - Electricity: $0.10/kWh.

    **Calculations:**
    - DistilBERT service time estimate = 1 / 50 inf/s = 20 ms.
    - BERT-base service time estimate = 1 / 25 inf/s = 40 ms.
    - DistilBERT energy per inference = 7.5W * 0.020s = 0.150 J.
    - BERT-base energy per inference = 7.5W * 0.040s = 0.300 J.
    - DistilBERT energy per 1M inferences = 150,000 J = 0.0417 kWh = $0.0042.
    - BERT-base energy per 1M inferences = 300,000 J = 0.0833 kWh = $0.0083.

    **Conclusion & Interpretation:**
    - **Result: DistilBERT Wins if accuracy passes.** It is estimated at about 2x throughput and about half the energy cost of BERT-base on the same compiled Hailo-8 deployment, without relying on an invalid per-request weight-swapping model.
