title: Optimizing INT8 Matrix Multiplication on Qualcomm Cloud AI 100
scenario: 'You are tasked with optimizing a critical INT8 matrix multiplication (GEMM) kernel for an edge AI application running on the Qualcomm Cloud AI 100. This device boasts 32 GB LPDDR4x memory and delivers 400 TOPS INT8 performance at 75W. Your current kernel shows poor performance, indicating inefficient memory access patterns and suboptimal execution unit utilization.'
question: 'How would you analyze and optimize the INT8 GEMM kernel on Cloud AI 100 for memory coalescing, occupancy, and INT8 throughput?'
details:
  realistic_solution: 'The solution involves several steps: 1. **Profiling**: Use profiling tools to identify bottlenecks related to memory bandwidth and compute utilization. 2. **Memory Coalescing**: Redesign data access patterns to ensure consecutive threads in a warp (or equivalent execution unit on AI 100) access contiguous memory locations. Implement tiling strategies to bring frequently used data into on-chip memory (e.g., shared memory or local data buffers) to minimize costly global memory accesses. 3. **Occupancy Optimization**: Experiment with thread block dimensions to achieve optimal occupancy. This involves balancing register usage, shared memory per block, and the total number of blocks per streaming multiprocessor (or equivalent compute cluster on AI 100). High occupancy ensures the scheduler can hide memory latencies by switching between ready warps. 4. **INT8 Throughput**: For INT8 operations, explicitly use instructions or libraries optimized for INT8 on the Qualcomm Cloud AI 100. This might involve understanding the specific vector processing units or specialized multiply-accumulate units that contribute to the 400 TOPS INT8, and structuring the kernel to feed them efficiently. 5. **Software Pipelining/Loop Unrolling**: Apply these techniques to keep the compute units busy and hide instruction latencies.'
  common_mistake: |
    **The Pitfall:** Directly translating CPU-centric optimization techniques.
    **The Rationale:** Candidates ignore the GPU's highly parallel and memory-hierarchical architecture, leading to fragmented global memory access or thread block sizes that starve compute units by causing register pressure.
    **The Consequence:** The kernel fails to utilize the dedicated INT8 hardware effectively, achieving a tiny fraction of the device's theoretical peak performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Assume an initial, unoptimized kernel achieves only 5% of peak compute.
    - Memory coalescing improvement (double bandwidth utilization) = 2.0x factor.
    - Occupancy tuning improvement (better compute utilization) = 1.5x factor.
    - Dedicated INT8 hardware utilization improvement = 1.25x factor.

    **Calculations:**
    - Current Performance = 0.05 * 400 TOPS = 20 TOPS.
    - Total expected improvement = 2.0 * 1.5 * 1.25 = 3.75x.
    - Optimized Performance = 3.75 * 20 TOPS = 75 TOPS (nearly 19% of theoretical peak).

    **Conclusion & Interpretation:**
    - **Result: Optimized Performance is 75 TOPS, nearly 19% of theoretical peak (Compute-Bound)**.
