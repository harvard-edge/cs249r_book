title: Optimizing INT8 Matrix Multiplication on Qualcomm Cloud AI 100
scenario: You are tasked with optimizing a critical INT8 matrix multiplication (GEMM) kernel for an edge AI application running on the Qualcomm Cloud AI 100. This device boasts 32 GB LPDDR4x memory and delivers 400 TOPS INT8 performance at 75W. Your current kernel shows poor performance, indicating inefficient memory access patterns and suboptimal execution unit utilization.
question: How would you analyze and optimize the INT8 GEMM kernel on Cloud AI 100 for memory coalescing, occupancy, and INT8 throughput?
details:
  realistic_solution: Start from the Cloud AI 100 compiler/runtime profile rather than a CUDA-style kernel checklist. Check whether the GEMM is lowered to the accelerator INT8 matrix datapath, whether tensor shapes and channel dimensions align with supported tile sizes, and whether the compiler is inserting layout conversions or spills to external LPDDR4x. Improve memory access by choosing packed INT8 layouts, fusing adjacent operators when possible, and keeping reused tiles in the accelerator local buffers instead of repeatedly moving them through DRAM. Improve concurrency by batching or splitting work so the runtime can keep multiple accelerator cores active without exceeding local memory, DMA queue, or command-buffer limits. Validate each change with measured MAC utilization, DRAM bandwidth, DMA stalls, and end-to-end latency on Cloud AI 100, because "occupancy" here means keeping the accelerator engines and data movers scheduled, not maximizing GPU warps per SM.
  common_mistake: |
    **The Pitfall:** Directly translating CPU-centric optimization techniques.
    **The Rationale:** Candidates ignore the accelerator's compiler-managed dataflow and memory hierarchy, leading to fragmented tensor layouts, unnecessary DRAM traffic, or schedules that starve the INT8 engines.
    **The Consequence:** The kernel fails to utilize the dedicated INT8 hardware effectively, achieving a tiny fraction of the device's theoretical peak performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak compute: 400 TOPS INT8 at 75W.
    - Profiling shows the GEMM spends most time waiting on LPDDR4x transfers and layout conversion, not on the INT8 matrix engines.
    - The workload must be measured with the Cloud AI 100 runtime counters for compute-active time, DMA stalls, and DRAM bandwidth.

    **Calculations:**
    - If runtime counters show only 20 TOPS effective throughput, utilization is 20 / 400 = 5% of peak.
    - A layout fix that removes conversion traffic and improves reuse should be evaluated by recomputing effective TOPS from measured GEMM latency, not by multiplying independent speedup factors.
    - For example, reducing a 4 ms GEMM to 1.5 ms on the same operation count gives a measured speedup of 4 / 1.5 = 2.67x; the new utilization is then derived from observed latency and operation count.

    **Conclusion & Interpretation:**
    - **Result: Profile-Guided Accelerator Optimization**. The right analysis is to prove that the compiled GEMM feeds Cloud AI 100's INT8 datapath with compatible layouts and enough queued work; performance claims should come from measured effective TOPS and stall counters.
