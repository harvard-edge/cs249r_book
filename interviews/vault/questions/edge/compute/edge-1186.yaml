title: Phi-3-Mini INT8 vs INT4 Decode SLO on Jetson Orin
scenario: You are sizing the memory footprint and decode latency for Phi-3-Mini (3.8B params) on an edge device with 102.4GB/s bandwidth. Assume 32 transformer layers, 2048 hidden dim, 32 attention heads, seq=512, batch=1.
question: Is the 2-second P99 SLO met for 100 output tokens using either INT8 or INT4 quantization?
details:
  realistic_solution: With the weights already resident in accelerator memory during decode, per-token latency is governed by incremental KV-cache reads and writes rather than by rereading the full weight file. Using an INT8 KV cache, each decode step reads the existing K/V history and writes one new K/V entry, for about 7.37 GB of KV traffic across 100 generated tokens from a 512-token context. At 102.4 GB/s this is about 72 ms, far below the 2-second P99 SLO. INT8 and INT4 weight quantization therefore both meet the stated latency SLO under this decode model; INT4 is a memory-capacity choice, not a requirement for the 2-second token-generation latency.
  common_mistake: |
    **The Pitfall:** Calculating decode latency based only on model weight loading.
    **The Rationale:** Candidates fail to include the KV cache memory bandwidth, which scales with sequence length and must be read every token.
    **The Consequence:** Severe underestimation of token generation latency, leading to missed P99 SLOs in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: Phi-3-Mini (3.8B params).
    - Hardware bandwidth: 102.4 GB/s.
    - Architecture: 32 layers, 2048 hidden dim, 32 heads, seq=512, batch=1.
    - Decode assumption: model weights are resident; per-token bandwidth is KV read/write traffic.
    - KV precision: INT8 KV cache = 1 byte per K or V element.

    **Calculations:**
    - Per-token K+V entry size at INT8 = 2 * 32 layers * 2048 hidden * 1 byte = 131,072 bytes.
    - Starting KV cache footprint at seq=512 = 131,072 * 512 = 67.1 MB.
    - For 100 generated tokens, average context read is about (512 + 611) / 2 = 561.5 tokens.
    - KV traffic per generated token = 131,072 * (561.5 reads + 1 write) = 73.7 MB.
    - Total KV traffic for 100 tokens = 73.7 MB * 100 = 7.37 GB.
    - Bandwidth time = 7.37 GB / 102.4 GB/s = 0.072 s.

    **Conclusion & Interpretation:**
    - **Result: Both INT8 and INT4 weights meet the 2-second P99 SLO when paired with INT8 KV.** The latency estimate is about 72 ms for KV traffic across 100 tokens; INT4 mainly reduces static weight memory.
