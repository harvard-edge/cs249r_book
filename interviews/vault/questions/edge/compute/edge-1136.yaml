title: 'Edge Systolic Array Implement: GOPS to FPS Conversion for Edge Models'
scenario: 'YOLOv5s (7.2 GOPS INT8, 7.2MB weights, ~15MB activations) is being evaluated on three distinct edge accelerators: Hailo-8 (26 TOPS INT8, 6GB/s BW, 2.5W), Jetson Orin (275 TOPS INT8, 102GB/s BW, 60W), and Coral Edge TPU (4 TOPS INT8, 4GB/s BW, 2W).'
question: What FPS and energy per frame can YOLOv5s achieve on Hailo-8, Jetson Orin, and Coral, and which bottleneck limits each?
details:
  realistic_solution: 'First, establish the bandwidth bottleneck for each device since memory traffic vastly outpaces compute capability. Calculate the latency based strictly on memory bandwidth (Total Traffic / Memory BW). Then, invert latency to find FPS, and multiply latency by device wattage to find energy per frame.'
  common_mistake: |
    **The Pitfall:** Dividing TOPS by GOPS directly (FPS = TOPS*1000/GOPS) without checking memory bandwidth limits.
    **The Rationale:** Assuming published theoretical peak TOPS numbers translate directly to achievable throughput, ignoring arithmetic intensity and memory hierarchies.
    **The Consequence:** Reporting wildly unrealistic peak FPS numbers and fundamentally misjudging energy and deployment capabilities.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model traffic: 7.2MB (weights) + 15MB (activations) = 22MB.
    - Hailo-8: 6 GB/s, 2.5W.
    - Jetson Orin: 102.4 GB/s, 60W.
    - Coral TPU: 4 GB/s, 2W.

    **Calculations:**
    - Hailo Latency (Mem): 22MB / 6,000 MB/s = 3.67ms. FPS = 273. Energy = 2.5W * 3.67ms = 9.2 mJ.
    - Orin Latency (Mem): 22MB / 102,400 MB/s = 0.215ms. FPS = 4,651. Energy = 60W * 0.215ms = 12.9 mJ.
    - Coral Latency (Mem): 22MB / 4,000 MB/s = 5.5ms. FPS = 182. Energy = 2W * 5.5ms = 11 mJ.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth Bound**. All three accelerators are severely bottlenecked by memory transfer, achieving only a fraction of their peak theoretical TOPS while displaying distinct efficiency trade-offs.
