title: YOLOv5s FPS and Energy on Hailo-8, Jetson Orin, and Coral TPU
scenario: 'YOLOv5s (7.2 GOPS INT8, 7.2MB weights, ~15MB activations) is being evaluated with measured effective budgets for three edge deployments: Hailo-8-class (26 TOPS INT8, 6GB/s effective BW, 2.5W), Jetson Orin-class (275 TOPS INT8, 102GB/s effective BW, 60W), and Coral TPU-class (4 TOPS INT8, 4GB/s effective BW, 2W).'
question: What FPS and energy per frame can YOLOv5s achieve on Hailo-8, Jetson Orin, and Coral, and which bottleneck limits each?
details:
  realistic_solution: Compare compute time against memory-traffic time for each deployment, then use the slower bound as total per-frame latency for FPS and energy. The model has 7.2 GOPS and about 22MB of traffic per frame if weights and activations are streamed once. Hailo-8-class compute time is 0.277ms versus 3.67ms memory time, so memory limits it to about 273 FPS and 9.2mJ/frame. Jetson Orin-class compute time is 0.026ms versus 0.216ms memory time, so memory limits it to about 4636 FPS and 12.9mJ/frame. Coral TPU-class compute time is 1.8ms versus 5.5ms memory time, so memory limits it to about 182 FPS and 11mJ/frame. These are roofline lower bounds using the stated effective bandwidths, not vendor peak guarantees.
  common_mistake: |
    **The Pitfall:** Dividing TOPS by GOPS directly (FPS = TOPS*1000/GOPS) without checking memory bandwidth limits.
    **The Rationale:** Assuming published theoretical peak TOPS numbers translate directly to achievable throughput, ignoring arithmetic intensity and memory hierarchies.
    **The Consequence:** Reporting wildly unrealistic peak FPS numbers and fundamentally misjudging energy and deployment capabilities.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model traffic: 7.2MB (weights) + 15MB (activations) = 22MB.
    - Hailo-8-class effective budget: 6 GB/s, 2.5W.
    - Jetson Orin-class effective budget: 102 GB/s, 60W.
    - Coral TPU-class effective budget: 4 GB/s, 2W.
    - Energy per frame uses power multiplied by the total roofline latency, max(compute time, memory time).

    **Calculations:**
    - Hailo compute time = 7.2 GOPS / 26 TOPS = 0.277ms. Hailo memory time = 22MB / 6,000 MB/s = 3.67ms. FPS = 273. Energy = 2.5W * 0.00367s = 0.0092J = 9.2mJ.
    - Orin compute time = 7.2 GOPS / 275 TOPS = 0.026ms. Orin memory time = 22MB / 102,000 MB/s = 0.216ms. FPS = 4,636. Energy = 60W * 0.000216s = 0.0129J = 12.9mJ.
    - Coral compute time = 7.2 GOPS / 4 TOPS = 1.8ms. Coral memory time = 22MB / 4,000 MB/s = 5.5ms. FPS = 182. Energy = 2W * 0.0055s = 0.011J = 11mJ.

    **Conclusion & Interpretation:**
    - **Result: memory-bandwidth bound on all three under the one-stream traffic model.** Compute is faster than the memory-traffic lower bound for each device, so FPS and energy should be derived from the memory-limited latency.
