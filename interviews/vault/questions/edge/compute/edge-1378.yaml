title: Hailo-8 Compute Bound FPS Calculation
scenario: We are deploying a real-time object detection model to an edge gateway equipped with a Hailo-8 dataflow accelerator. The model requires 52 GOPS per inference pass, and sustains a compute utilization of 80% over the streaming pipeline.
question: What is the maximum compute-bound FPS for a 52 GOPS model on a 26 TOPS Hailo-8 at 80% utilization?
details:
  realistic_solution: First, align the compute magnitudes (Tera vs Giga). Apply the 80% utilization factor to the theoretical peak 26 TOPS to find the effective operational throughput. Divide this effective compute capacity by the GOPS required per frame to yield the theoretical maximum compute-bound FPS. Notably, because the Hailo-8 is a dataflow architecture lacking local DRAM, achieving this theoretical compute ceiling strictly depends on the host PCIe streaming interface preventing data starvation.
  common_mistake: |
    **The Pitfall:** Failing to properly convert between Tera-Operations (10^12) and Giga-Operations (10^9).
    **The Rationale:** Candidates rush the mental math and divide 26 by 52 directly, or drop a zero in the conversion, ignoring the magnitude scale.
    **The Consequence:** Throughput projections are off by orders of magnitude (e.g., calculating 0.4 FPS instead of 400 FPS), leading to disastrously incorrect hardware provisioning.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Hailo-8 at 26 TOPS peak.
    - Utilization factor: 80%.
    - Model requirement: 52 GOPS per frame.

    **Calculations:**
    - Convert theoretical compute to GOPS: 26 TOPS = 26,000 GOPS.
    - Calculate effective compute: 26,000 GOPS * 0.80 = 20,800 GOPS.
    - Calculate maximum FPS: 20,800 GOPS / 52 GOPS/frame = 400 FPS.

    **Conclusion & Interpretation:**
    - **Result: 400 FPS (Compute-Bound)**. The system theoretical compute ceiling is 400 FPS, strictly contingent on the PCIe host-streaming bandwidth not becoming a bottleneck.
