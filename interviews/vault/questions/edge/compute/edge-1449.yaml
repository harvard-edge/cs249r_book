title: Jetson Orin Roofline Memory Bound Analysis
scenario: You are profiling a quantized INT8 object detection model deployed on an NVIDIA Jetson Orin at the edge. The model has an arithmetic intensity of 100 INT8 operations per byte of memory accessed. You observe that the actual compute utilization of the hardware is extremely low, barely reaching 7%.
question: Using the roofline model, why does a 100 OP/byte INT8 model reach only about 7% compute utilization on Jetson Orin?
details:
  realistic_solution: Apply the roofline model to demonstrate the workload is severely memory-bound. Calculate the hardware ridge point by dividing the peak compute (275 TOPS) by the memory bandwidth (204 GB/s). Because the model's arithmetic intensity is far below this ridge point, the Jetson Orin's Ampere GPU and DLA spend most of their time starved for data, capping performance strictly by memory bandwidth.
  common_mistake: |
    **The Pitfall:** Assuming INT8 quantization automatically guarantees high compute utilization.
    **The Rationale:** Candidates see the peak 275 TOPS spec and fail to check if the model's arithmetic intensity crosses the hardware's ridge point.
    **The Consequence:** Misdiagnosing performance limits and wasting time optimizing compute-bound layers when the system is actually starved for memory bandwidth.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak Compute: 275 TOPS = 275,000 GOPS.
    - Peak Memory Bandwidth: 204 GB/s.
    - Model Arithmetic Intensity: 100 OPs/byte.

    **Calculations:**
    - Hardware Ridge Point: 275,000 GOPS / 204 GB/s = ~1,348 OPs/byte.
    - Since 100 < 1,348, the workload is memory-bound.
    - Achievable Performance: 100 OPs/byte * 204 GB/s = 20,400 GOPS (20.4 TOPS).
    - Hardware Utilization: 20.4 TOPS / 275 TOPS = ~7.4%.

    **Conclusion & Interpretation:**
    - **Result: ~7.4% (Memory Bandwidth-Bound)**. The deployment reaches only ~7.4% compute utilization because it is completely bottlenecked by memory bandwidth.
