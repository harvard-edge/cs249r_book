title: Energy Optimization Strategy Selection
scenario: Two teams optimize inference energy for an edge vision model. Team A reduces FLOPs by 40% via pruning (but adds sparse memory accesses). Team B fuses 5 consecutive layers to increase arithmetic intensity from 15 to 45 FLOPs/byte without reducing total FLOPs.
question: Which saves more energy on a chip with 20 pJ/byte DRAM and 0.5 pJ/FLOP?
details:
  realistic_solution: Team B saves more energy under the stated comparison because it directly reduces DRAM bytes for the same output work. The energy ridge point is 20 pJ/byte divided by 0.5 pJ/FLOP = 40 FLOPs/byte, so the baseline at 15 FLOPs/byte is memory-energy dominated. Team A reduces compute by 40%, but the prompt says pruning adds sparse memory accesses, so there is no justified DRAM-byte reduction to credit. Team B raises arithmetic intensity from 15 to 45 FLOPs/byte without changing FLOPs, which means bytes moved fall to one third for fixed output work. With the given energy costs, that is about 49% total energy savings versus about 11% for compute-only pruning.
  common_mistake: |
    **The Pitfall:** Assuming reducing FLOPs always reduces energy proportionally.
    **The Rationale:** Engineers often equate algorithmic compute complexity directly with physical power consumption.
    **The Consequence:** In memory-bound regimes, this ignores the dominant energy cost of data movement, leading to optimizations with marginal physical impact.
  napkin_math: |
    **Assumptions & Constraints:**
    - Energy costs: 20 pJ/byte (DRAM), 0.5 pJ/FLOP (Compute).
    - Baseline AI = 15 FLOPs/byte.
    - Compare fixed output work. Use a normalized 45-FLOP workload.
    - Team A: -40% FLOPs, no credited DRAM-byte reduction because sparse accesses may preserve or increase memory traffic.
    - Team B: same 45 FLOPs, AI increases to 45 FLOPs/byte, so bytes move from 3 bytes to 1 byte.

    **Calculations:**
    - Baseline bytes = 45 FLOPs / 15 FLOPs/byte = 3 bytes.
    - Baseline energy = (45 * 0.5 pJ) + (3 * 20 pJ) = 22.5 pJ + 60 pJ = 82.5 pJ.
    - Team A energy = (27 * 0.5 pJ) + (3 * 20 pJ) = 13.5 pJ + 60 pJ = 73.5 pJ, an ~11% savings.
    - Team B bytes = 45 FLOPs / 45 FLOPs/byte = 1 byte.
    - Team B energy = (45 * 0.5 pJ) + (1 * 20 pJ) = 22.5 pJ + 20 pJ = 42.5 pJ, an ~48.5% savings.

    **Conclusion & Interpretation:**
    - **Result: ~48.5% Savings (Memory Energy-Bound)**. Team B saves significantly more energy than Team A (~48.5% vs ~11%) because it reduces the dominant DRAM traffic for the same output work.
