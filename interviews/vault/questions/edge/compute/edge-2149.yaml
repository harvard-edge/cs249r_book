title: Depthwise Separable Conv vs Standard Conv Roofline on Jetson Orin DLA
scenario: Jetson Orin DLA runs at ~15 TOPS INT8. Compare standard 3x3 Conv (64->64 channels, 112x112 input) vs depthwise separable Conv (same dimensions) on the DLA.
question: On Orin DLA, how do 3x3 standard and depthwise separable 64->64 convs compare in FLOPs, parameters, and roofline position?
details:
  realistic_solution: Standard Conv performs far more FLOPs, but it reuses the same input and weight data heavily, so its arithmetic intensity is above the DLA ridge point and it tends to be compute-bound. Depthwise separable Conv reduces FLOPs and parameters, but it has much lower reuse. With about 117.3M FLOPs over roughly 1.6MB of activation and weight traffic, its arithmetic intensity is about 73 FLOPs/Byte. That is below the 150 FLOPs/Byte ridge, so the depthwise separable layer is memory-bound and its latency speedup is smaller than the FLOP reduction suggests.
  common_mistake: |
    **The Pitfall:** Comparing FLOPs without considering arithmetic intensity.
    **The Rationale:** Candidates assume lower FLOPs always translates to faster execution, ignoring the memory bandwidth wall.
    **The Consequence:** Deploying depthwise convolutions on accelerators like DLA where they become severely memory-bound, resulting in worse actual latency than standard convolutions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard Conv FLOPs: 924.8M.
    - Standard Conv traffic estimate: ~1.64MB for input/output activation traffic plus weights after cache reuse.
    - DW-Sep Conv FLOPs: 117.3M.
    - DW-Sep traffic estimate: ~1.6MB for activations plus depthwise and pointwise weights.
    - DLA Memory BW: ~100 GB/s. DLA Ridge: 150 FLOPs/Byte.

    **Calculations:**
    - Arithmetic intensity formula: FLOPs / bytes moved.
    - Standard Conv AI = 924.8M FLOPs / 1.64M bytes = ~564 FLOPs/Byte.
    - Standard Conv roofline: 564 > 150 ridge, so it is compute-bound.
    - DW-Sep AI = 117.3M FLOPs / 1.6M bytes = ~73 FLOPs/Byte.
    - DW-Sep roofline: 73 < 150 ridge, so it is memory-bound.
    - DW layer throughput ceiling = 100 GB/s * 73 FLOPs/Byte = 7.3 TOPS.

    **Conclusion & Interpretation:**
    - **Result: DW-Sep AI ~73 FLOPs/Byte, Memory-Bound**. Depthwise separable Conv falls below the 150 FLOPs/Byte ridge point, while standard Conv is compute-bound at roughly 564 FLOPs/Byte.
