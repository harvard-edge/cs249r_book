title: The Pruning Paradox on Edge AI Accelerators
scenario: You are optimizing a dense CNN-based perception model for a real-time system running on a Jetson AGX Orin. The system has a hard 33ms (30 FPS) deadline. Your profiler shows a specific 3x3 convolution layer is the main latency bottleneck. To accelerate it, you apply 80% unstructured magnitude pruning to the layer's weights, expecting a significant speedup close to 5x. However, when you re-deploy and benchmark, you are shocked to find the end-to-end latency has increased, and the utilization of the Orin's Tensor Cores has dropped to near 0% for that layer.
question: Why did 80% unstructured pruning make the 3x3 convolution slower on Jetson AGX Orin and drop Tensor Core utilization to near zero?
details:
  realistic_solution: The root cause is a fundamental mismatch between the irregular memory access patterns induced by unstructured sparsity and the Jetson AGX Orin's architecture, which is optimized for dense, regular computation.
  common_mistake: |
    **The Pitfall:** Believing that FLOPs are a universal measure of performance.
    **The Rationale:** Engineers often assume "80% fewer FLOPs means 80% less latency," ignoring that *how* you compute matters more than *how much* you compute.
    **The Consequence:** This fallacy ignores data movement patterns, memory access irregularity, and specialized hardware units, leading to poor optimization choices that actively degrade performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dense Conv moves 1MB for 100M Ops (AI=100).
    - Memory bandwidth: 204.8 GB/s.
    - With 80% unstructured pruning, Ops drop to 20M, but cache misses increase the effective transferred bytes to 2MB.

    **Calculations:**
    - Dense Time = 1MB / 204.8 GB/s = 4.88 µs.
    - Pruned Time = 2MB / 204.8 GB/s = 9.77 µs.

    **Conclusion & Interpretation:**
    - **Result: Latency essentially doubles to 9.77 µs (Memory-Bound).** Unstructured pruning causes irregular memory access patterns that degrade performance.
