title: The Dataflow vs GPU Roofline
scenario: Your team is choosing between a Hailo-8 (dataflow architecture) and a Jetson Orin NX (GPU architecture) for a drone running YOLOv8-S at 640x640, INT8, batch size 1, using each vendor's optimized runtime. The Orin has about 4x the peak TOPS. But in your benchmark, the Hailo runs the model at 800 FPS while the Orin hits 1000 FPS.
question: Why is the 4x TOPS advantage only yielding a 1.25x speedup?
details:
  realistic_solution: The Hailo-8 is a dataflow architecture — it maps the model graph onto a spatial pipeline of physical compute units, reusing weights and activations through on-chip buffers. The Orin NX is a GPU-style architecture that has much higher peak TOPS but still depends heavily on LPDDR bandwidth and layer scheduling. For a YOLOv8-S run with arithmetic intensity below the Orin's compute/memory ridge point, the Orin cannot convert its 4x TOPS advantage into a 4x throughput gain. The dataflow chip changes the effective memory behavior for this workload, so the benchmark result is better explained by roofline and data movement than by peak TOPS alone.
  common_mistake: |
    **The Pitfall:** Blaming unoptimized drivers or flawed benchmarks for performance discrepancies.
    **The Rationale:** Engineers default to software explanations rather than evaluating the structural differences between Von Neumann (GPU) and Dataflow architectures under memory constraints.
    **The Consequence:** Rejecting the more power-efficient dataflow chip in favor of a theoretical compute advantage that cannot be physically realized.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8: 26 TOPS peak, 2.5W.
    - Orin NX: 100 TOPS peak, 15W, 102.4 GB/s LPDDR5.
    - YOLOv8-S Arithmetic Intensity: 516 Ops/Byte.

    **Calculations:**
    - Orin ridge point = 100 TOPS / 102.4 GB/s = ~977 Ops/Byte.
    - YOLOv8-S AI = 516 Ops/Byte, which is below the ridge point, so the Orin run is expected to be memory-bandwidth-limited before reaching peak TOPS.
    - Orin memory roofline estimate = 516 Ops/Byte * 102.4 GB/s = ~52.8 TOPS, about 53% of peak.
    - Measured speed ratio = 1000 FPS / 800 FPS = 1.25x, not 4x.
    - Measured power efficiency under these benchmark conditions: Hailo-8 = 800 FPS / 2.5W = 320 FPS/W; Orin NX = 1000 FPS / 15W = 66.7 FPS/W.

    **Conclusion & Interpretation:**
    - **Result: Peak TOPS is the wrong metric.** Under the stated benchmark conditions, Hailo measures about 4.8x higher FPS/W, while Orin is only 1.25x faster despite about 4x peak TOPS. The qualitative cause is data movement: Orin is constrained by the memory roofline, while Hailo's dataflow execution improves on-chip reuse.
  options:
    - The Hailo-8 is a dataflow architecture — it maps the entire model graph onto a spatial pipeline of physical compute units.
    - The Orin drivers aren't optimized yet.
    - The system is healthy and no recovery action is needed.
    - Operator fusion primarily reduces compute time.
