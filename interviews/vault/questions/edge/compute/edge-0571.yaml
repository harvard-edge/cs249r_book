title: The Dark Silicon Enigma
scenario: You are designing an edge AI camera with an advanced SoC that has an 8-core CPU, a 4-core GPU, and a 4-core NPU. You write a brilliant pipeline that utilizes 100% of all three processors simultaneously to process video at 120 FPS. When you deploy it, the board immediately crashes and reboots. The power supply is perfectly adequate.
question: What SoC physical limit did you violate?
details:
  realistic_solution: |
    You hit the SoC power and thermal envelope often called the dark silicon limit. Modern edge SoCs include more CPU, GPU, and NPU resources than can be held at each block's peak power indefinitely inside a 15W package. Trying to drive all engines to peak at the same time can exceed the regulator, thermal, or firmware power-management limits and trigger voltage droop, throttling, or a reset. The fix is workload scheduling and power budgeting: overlap blocks only within the supported envelope, cap clocks, stage pipeline phases, or provision a platform with a higher sustained power limit.
  common_mistake: |
    **The Pitfall:** Believing all silicon cores can be held at peak power simultaneously.
    **The Rationale:** Candidates assume transistor presence guarantees sustained power delivery, ignoring dark silicon limits where TDP is lower than the sum of independent block peaks.
    **The Consequence:** Localized voltage droop (brownouts) triggering immediate hardware watchdogs or thermal shutdown.
  napkin_math: |
    **Assumptions & Constraints:**
    - SoC TDP: 15W
    - 8-core CPU: 10W peak
    - 4-core GPU: 8W peak
    - 4-core NPU: 5W peak

    **Calculations:**
    - Sum of independent peak draws = 10W + 8W + 5W = 23W.
    - Package envelope = 15W sustained.
    - Over-envelope demand = 23W - 15W = 8W, or ~53% above the sustained budget.

    **Conclusion & Interpretation:**
    - **Result: 23W > 15W (Power/Thermal Envelope Violation)**. The issue is not that simultaneous use is impossible in every design; it is that this SoC cannot sustain all blocks at their independent peaks within its 15W envelope, so power management or voltage protection resets the board.
