title: 'Edge Transformer Fluency: Prefill FLOPs on Jetson Orin'
scenario: Estimate the prefill time for a 1024-token prompt on a 7B parameter transformer on an edge device. The model has 32 layers, 32 heads, 128 head dimension.
question: Why is the attention cost per layer about 8.59 GFLOPs rather than TFLOPs for this prefill calculation?
details:
  realistic_solution: Attention per layer at these dimensions = ~8.59 GFLOPs (not TFLOPs). GFLOPs is the correct unit for small/medium models.
  common_mistake: |
    **The Pitfall:** Using the 6N training formula or assuming attention dominates at all sequence lengths.
    **The Rationale:** Candidates incorrectly apply rules of thumb meant for massive batches or extremely long contexts to edge prefill scenarios.
    **The Consequence:** Orders-of-magnitude errors in calculating attention compute costs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Batch=1, Seq=1024, 32 heads, Head Dimension=128.
    2. **Calculations:**
       - Attention Matmuls (Q*K^T and Attn*V): 2 operations * 32 heads * (1024 * 1024) seq² * 128 head_dim.
       - 2 * 32 * 1,048,576 * 128 = 8,589,934,592 FLOPs = 8.59 GFLOPs per layer.
    3. **Conclusion & Interpretation:**
       - **Result: 8.59 GFLOPs.** The pure attention mechanism costs exactly 8.59 GFLOPs per layer, operating in the GFLOPs regime, not TFLOPs.
