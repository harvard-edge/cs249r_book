title: 'Edge Systolic Array Evaluation: Hailo-8 vs Coral TPU Dataflow Efficiency'
scenario: Compare Hailo-8 vs Coral Edge TPU for deploying EfficientNet-Lite0 (INT8, 407M FLOPs, 4.7M params) at batch size 1. Assume the 4.7 MB weights are effectively streamed from external memory for each inference.
question: Which chip achieves better Model FLOPs Utilization (MFU) deploying EfficientNet-Lite0 at batch size 1, and why?
details:
  realistic_solution: Both chips are memory-bound at batch size 1 if weights must be streamed for each image. Using decimal units, Coral's 4.7MB weight read at 4GB/s gives about 1.175ms, or ~851 FPS. Hailo-8's 4.7MB at 6GB/s gives about 0.783ms, or ~1277 FPS. Peak compute-limited FPS is 4 TOPS / 407M FLOPs = ~9828 FPS for Coral and 26 TOPS / 407M FLOPs = ~63,882 FPS for Hailo-8. MFU is therefore about 851/9828 = 8.7% on Coral and 1277/63882 = 2.0% on Hailo-8. Coral has higher MFU because its lower peak compute is easier to utilize, even though Hailo-8 delivers higher absolute FPS.
  common_mistake: |
    **The Pitfall:** Calculating TOPS utilization purely as FLOPs/TOPS and assuming higher peak compute directly translates to better utilization.
    **The Rationale:** It is mathematically straightforward, but completely ignores memory bandwidth limits at low batch sizes.
    **The Consequence:** Engineers falsely conclude high-TOPS hardware is efficiently utilized, missing that both are operating far below peak capacity.
  napkin_math: |
    **Assumptions & Constraints:**
    - EfficientNet-Lite0: 407M FLOPs per image, 4.7 MB weights.
    - Use decimal units: 1 TOPS = 10^12 ops/s, 1 GB/s = 10^9 bytes/s, 1 MB = 10^6 bytes.
    - Coral: 4 TOPS, 4 GB/s bandwidth.
    - Hailo-8: 26 TOPS, 6 GB/s bandwidth.

    **Calculations:**
    - Coral compute time = 407e6 / 4e12 = 0.102 ms; compute-limited FPS = 4e12 / 407e6 = 9828 FPS.
    - Coral memory time = 4.7e6 / 4e9 = 1.175 ms; bandwidth-limited FPS ≈ 851 FPS.
    - Hailo compute time = 407e6 / 26e12 = 0.0157 ms; compute-limited FPS = 26e12 / 407e6 = 63,882 FPS.
    - Hailo memory time = 4.7e6 / 6e9 = 0.783 ms; bandwidth-limited FPS ≈ 1277 FPS.
    - Coral MFU = 851 / 9828 = 8.7%.
    - Hailo MFU = 1277 / 63,882 = 2.0%.

    **Conclusion & Interpretation:**
    - **Result: Coral achieves higher MFU (Memory-Bandwidth-Bound)**. Its lower peak compute limit makes it appear more effectively utilized despite both being memory-bound.
