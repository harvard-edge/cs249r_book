title: Optimizing Sensor Fusion Kernels on Jetson Orin
scenario: You are architecting a custom sensor fusion pipeline for an autonomous vehicle using an NVIDIA Jetson Orin. The workload relies heavily on custom CUDA kernels rather than standard deep learning layers. You need to design the GPU execution model, specifying how you will structure thread blocks, warps, and shared memory tiling to maximize occupancy on the Ampere GPU while avoiding LPDDR5 bandwidth saturation.
question: How would you structure CUDA thread blocks, warps, and shared memory tiling on Jetson Orin to avoid LPDDR5 bandwidth saturation?
details:
  realistic_solution: Structure blocks as warp-aligned groups such as 128 or 256 threads, then tune based on occupancy, register pressure, and shared-memory use per SM. Make global loads coalesced and aligned, use structure-of-arrays layouts for sensor channels when possible, and stage data in shared memory only when neighboring threads reuse it. Tile sizes should come from measured reuse and resource pressure; Tensor Cores are relevant only for matrix-multiply-style portions of the pipeline, not for generic sensor-fusion kernels.
  common_mistake: |
    **The Pitfall:** Designing thread blocks solely to maximize theoretical SM occupancy without optimizing memory access patterns.
    **The Rationale:** Developers focus on raw compute utilization, forgetting edge devices have unified memory architectures with lower bandwidth.
    **The Consequence:** Uncoalesced memory accesses and register spilling cripple unified LPDDR5 bandwidth and drastically reduce throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Example fused stencil-like kernel reads 64 bytes and writes 16 bytes per output element.
    - Workload processes 1 million output elements per frame.
    - 200 GB/s LPDDR5 bandwidth.

    **Calculations:**
    - Naive global traffic = (64B read + 16B write) * 1,000,000 = 80 MB/frame.
    - At 30 FPS, bandwidth demand = 80 MB * 30 = 2.4 GB/s.
    - If uncoalesced accesses inflate transactions by 4x, effective demand becomes 9.6 GB/s.
    - Shared-memory tiling that reuses half of the read data reduces traffic to (32B read + 16B write) * 1,000,000 * 30 = 1.44 GB/s.
    - But oversized tiles can reduce occupancy through shared-memory or register pressure, so tile size must be profiled.

    **Conclusion & Interpretation:**
    - **Result: coalescing and selective shared-memory reuse lower LPDDR5 pressure, but no fixed 16x16 tile is universally required.** Choose warp-aligned blocks and the smallest tile that improves reuse without causing register spills or low occupancy.
