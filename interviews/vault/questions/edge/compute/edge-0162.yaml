title: 'The Edge Ridge Point'
scenario: 'You are leading a team evaluating the NVIDIA Jetson AGX Orin for a real-time object detection pipeline that must run at 30 FPS. A junior engineer is confused about why some models are memory-bound while others are compute-bound.'
question: 'How do you calculate the Orin''s INT8 ridge point from 275 TOPS and 204.8 GB/s, and how does it separate memory-bound from compute-bound models?'
details:
  realistic_solution: |
    The ridge point is a key concept in the Roofline Model. It represents the minimum Arithmetic Intensity (AI), measured in Operations per Byte, that an application must have to be limited by the accelerator's peak compute rather than its memory bandwidth. Using profiling tools like Nsight Compute, engineers map model kernels against this ridge point to determine optimization strategies.
  common_mistake: |
    **The Pitfall:** A unit mismatch dividing TOPS directly by GB/s.
    **The Rationale:** Engineers often fail to account for the factor of 1000 difference between Tera- and Giga- prefixes, or they incorrectly invert the formula (Bandwidth / Compute).
    **The Consequence:** Fundamentally misunderstanding the hardware's operational characteristics, leading to the selection of inefficient model architectures.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson AGX Orin Compute: 275 TOPS (Tera-Operations/sec) = 275 * 10^12 Ops/s.
    - Jetson AGX Orin Bandwidth: 204.8 GB/s = 204.8 * 10^9 Bytes/s.

    **Calculations:**
    - Ridge Point = Peak Compute / Memory Bandwidth.
    - Ridge Point = (275 * 10^12 Ops/s) / (204.8 * 10^9 Bytes/s) = 1342.7 Ops/Byte.

    **Conclusion & Interpretation:**
    - **Result: ~1343 Ops/Byte (Memory-Bound vs Compute-Bound)**. Models with Arithmetic Intensity (AI) < 1343 are memory-bound; those with AI > 1343 are compute-bound.
  options:
  - '~1.34 Ops/Byte (Dividing 275 / 204.8 directly without unit conversion).'
  - '~0.0007 Bytes/Op (Inverting the formula: Bandwidth / Compute).'
  - '~1343 Ops/Byte. A model''s AI must be higher than this to be compute-bound.'
  - '~1343 Ops/Byte. A model''s AI must be lower than this to be compute-bound.'
