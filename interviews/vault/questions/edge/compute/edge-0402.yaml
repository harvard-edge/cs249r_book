title: The TOPS Illusion
scenario: 'Your team is evaluating edge accelerators for a robotics perception stack. Your product manager says "just buy the Orin — it''s 10x faster."'
question: 'What critical distinction is the PM missing?'
details:
  realistic_solution: 'The PM is comparing raw TOPS but ignoring TOPS per Watt. The Hailo-8 delivers 26 TOPS at 2.5W (10.4 TOPS/W). The Jetson Orin delivers 275 TOPS at 60W (4.6 TOPS/W). If your robot''s power budget is 10W for the AI module, the Hailo-8 can sustain ~100% of its peak, while the Orin must be power-capped to ~46 TOPS — less than 2x the Hailo. At the edge, the correct comparison is always TOPS/W × available power budget.'
  common_mistake: |
    **The Pitfall:** "TOPS is TOPS — more is faster."
    **The Rationale:** Candidates treat peak throughput as the only metric of value.
    **The Consequence:** Ignoring the thermal and power constraints that dictate sustained performance at the edge, leading to systems that overheat or exceed battery limits.
  napkin_math: |
    **Assumptions & Constraints:**
    - Power budget is 10W.
    - Hailo-8 is 2.5W, 26 TOPS.
    - Jetson Orin is 60W, 275 TOPS.

    **Calculations:**
    - Hailo-8 Efficiency = 26 TOPS / 2.5W = 10.4 TOPS/W.
    - Orin Efficiency = 275 TOPS / 60W = 4.6 TOPS/W.
    - At 10W: Hailo delivers 26 TOPS (capped), Orin delivers 10W * 4.6 = 46 TOPS.

    **Conclusion & Interpretation:**
    - **Result: 46 TOPS vs 26 TOPS (Power-Bound)**. The "10x advantage" shrinks to 1.8x when constrained by edge power budgets.
