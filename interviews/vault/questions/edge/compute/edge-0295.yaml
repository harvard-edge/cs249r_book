title: The Deceptive Pointwise Convolution
scenario: You are optimizing a perception model for an autonomous robot. You observe in the profiler that a 1x1 convolution layer is achieving only a tiny fraction of the peak TOPS, even though it requires billions of floating-point operations.
question: What is the fundamental hardware reason for this poor performance?
details:
  realistic_solution: The layer is memory-bound. A 1x1 convolution has very low arithmetic intensity; it performs very few calculations for each byte it reads from memory. On an edge device, the memory bandwidth is the limiting factor for such layers. The compute cores spend most of their time idle, waiting for data to arrive from DRAM, preventing the GPU from reaching its peak TOPS.
  common_mistake: |
    **The Pitfall:** Believing high FLOP count operations are always compute-bound.
    **The Rationale:** Engineers focus on theoretical peak TOPS and ignore the arithmetic intensity (ops/byte) and memory bandwidth limitations.
    **The Consequence:** Failed optimizations that target compute rather than addressing the actual memory bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Jetson AGX Orin, memory bandwidth 204.8 GB/s, peak compute 275 TOPS.
    2. **Calculations:**
       - Ridge point = 275,000 GFLOPS / 204.8 GB/s = ~1342 Ops/Byte.
       - 1x1 convolution Arithmetic Intensity (AI) is typically << 10 Ops/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** AI (<< 10) is far to the left of the ridge point (1,342), meaning performance is entirely dictated by memory bandwidth.
  options:
  - The layer is compute-bound and the Orin's TOPS are insufficient.
  - The device is thermally throttling due to the high workload.
  - The layer is memory-bound due to its low arithmetic intensity.
  - The CUDA compiler is generating inefficient machine code for 1x1 convolutions.
  correct_index: 2
