title: The Autonomous Trucking Perception Upgrade
scenario: You are the Tech Lead for the perception team at an autonomous trucking company. The fleet is being upgraded from 1.2MP cameras to 4MP cameras to improve long-range object detection. Your current perception model, a standard ResNet-based architecture, now misses its hard real-time 33ms frame deadline on the existing edge SoC platform. The system's thermal design imposes a hard power limit of 45W for the SoC.
question: Why does upgrading from 1.2MP to 4MP cameras break the 33ms deadline, and how would you redesign the model for the 45W budget?
details:
  realistic_solution: The core problem is that increasing image resolution by ~3.3x (4MP/1.2MP) dramatically increases the size of the initial activation maps, pushing the early layers of the network deep into a memory-bound regime. The SoC has immense compute power, but it can't be used if the processors are stalled waiting for data from DRAM. The solution must address the compute-to-memory ratio (Arithmetic Intensity).
  common_mistake: |
    **The Pitfall:** Proposing to immediately quantize the model to INT8.
    **The Rationale:** Candidates focus on raw GFLOPs, assuming more compute automatically means better performance, without considering the memory system.
    **The Consequence:** Quantizing to INT8 speeds up the compute but does nothing to alleviate the massive memory write bottleneck, failing to hit the 33ms deadline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * 4MP (2048x2048) input.
       * First ResNet layer = 7x7 conv, 64 filters, stride 2, FP16 input.
       * Edge SoC bandwidth = 204.8 GB/s. FP16 Compute = 137 TFLOPS.
    2. **Calculations:**
       * Output activation size = 1024 * 1024 * 64 * 2B = 134 MB.
       * Ops = 1024 * 1024 * 64 * 7 * 7 * 3 * 2 = 19.7 GOPs.
       * Compute time = 19.7 GOPs / 137 TFLOPS = 0.14ms.
       * Memory transfer time (just writing output) = 134 MB / 204.8 GB/s = 0.65ms.
    3. **Conclusion & Interpretation:**
       * **The layer drops to an arithmetic intensity of ~147 Ops/Byte, causing memory transfer times to dwarf compute times by 4.6x. Result: Memory Bandwidth-Bound.**
