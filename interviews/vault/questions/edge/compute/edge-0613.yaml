title: 4MP Camera Upgrade Breaks 33ms on Memory Bandwidth
scenario: You are the Tech Lead for the perception team at an autonomous trucking company. The fleet is being upgraded from 1.2MP cameras to 4MP cameras to improve long-range object detection. Your current perception model, a standard ResNet-based architecture, now misses its hard real-time 33ms frame deadline on the existing edge SoC platform. The system's thermal design imposes a hard power limit of 45W for the SoC.
question: Why does upgrading from 1.2MP to 4MP cameras break the 33ms deadline, and how would you redesign the model for the 45W budget?
details:
  realistic_solution: |
    The 4MP upgrade increases pixels by about 3.3x, so the early ResNet stem now produces very large activation maps and becomes dominated by memory traffic rather than peak TOPS. The first 7x7 stride-2 convolution may look cheap in ideal compute time, but writing its output activation and feeding later high-resolution layers consumes a large fraction of the 33ms frame budget.

    Redesign the front of the model for higher arithmetic intensity under the 45W envelope: use an aggressive fused downsampling stem, replace the 7x7 dense stem with smaller or depthwise-separable stages, keep early activations in on-chip SRAM where possible, and move expensive reasoning after spatial reduction. If accuracy requires high resolution, crop or route only ROI tiles through high-cost branches instead of running the full ResNet at 4MP.
  common_mistake: |
    **The Pitfall:** Proposing to immediately quantize the model to INT8.
    **The Rationale:** Candidates focus on raw GFLOPs, assuming more compute automatically means better performance, without considering the memory system.
    **The Consequence:** Quantizing to INT8 speeds up the compute but does nothing to alleviate the massive memory write bottleneck, failing to hit the 33ms deadline.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4MP input approximated as 2048x2048.
    - First ResNet layer: 7x7 convolution, 64 filters, stride 2, same padding, FP16 activations.
    - Output size under those assumptions: 1024x1024x64.
    - Edge SoC bandwidth: 204.8 GB/s. FP16 compute: 137 TFLOPS.

    **Calculations:**
    - Output activation size = 1024 * 1024 * 64 * 2B = 134,217,728 bytes = 134.2 MB decimal.
    - Dense convolution work = 1024 * 1024 * 64 * 7 * 7 * 3 * 2 = 19.7 GOPs.
    - Ideal compute time = 19.7 GOPs / 137,000 GOP/s = 0.144ms.
    - Input read lower bound = 2048 * 2048 * 3 * 2B = 25.2 MB; output write lower bound = 134.2 MB.
    - Minimum input-plus-output traffic time = (25.2 + 134.2) MB / 204.8 GB/s = 0.778ms, before weights, cache misses, later layers, and layout transforms.
    - Output write alone is 0.655ms, already 4.5x the ideal compute time for the stem.

    **Conclusion & Interpretation:**
    - **Result: early high-resolution activations are the binding cost.** The 4MP input does not just add FLOPs; it inflates memory traffic throughout the stem. Fit the 45W/33ms target by reducing spatial resolution early, using separable or fused stems, and spending expensive compute only after downsampling or ROI selection.
