title: The Autonomous Perception Stack Fork
scenario: You are the lead architect for the perception system of a new Level 3 autonomous vehicle. Your team is debating two competing designs for the core perception stack, which must run on an edge processor with a strict 30W thermal design power (TDP) budget and meet a 33ms per-frame deadline.
question: How should you choose between the two 30W perception designs, and why is achieved TOPS-per-watt more useful than FLOPs?
details:
  realistic_solution: The decision cannot be based on FLOPs alone, but on how efficiently each architecture uses the hardware. The correct KPI is Achieved TOPS-per-Watt, which measures the actual realized computational throughput against the power consumed after accounting for memory bandwidth limitations in the Roofline model.
  common_mistake: |
    **The Pitfall:** Relying exclusively on total FLOPs or parameter count.
    **The Rationale:** Candidates incorrectly assume the chip's advertised peak TOPS is achievable for any workload, ignoring that memory-bound operators severely underutilize compute units.
    **The Consequence:** Choosing a model with fewer FLOPs that is actually slower and less power-efficient in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware bounds at 30W: ~137 INT8 TOPS compute, 100 GB/s bandwidth.
    - Design A (Compute-Heavy): 10 T-ops, Arithmetic Intensity (AI) = 500 Ops/Byte.
    - Design B (Compute-Light): 5 T-ops, Arithmetic Intensity (AI) = 50 Ops/Byte.

    **Calculations:**
    - Hardware Ridge Point: 137 TOPS / 100 GB/s = 1370 Ops/Byte.
    - Design A Data Movement: 10 T-ops / 500 = 20 GB. Time = 20 GB / 100 GB/s = 200ms.
    - Design B Data Movement: 5 T-ops / 50 = 100 GB. Time = 100 GB / 100 GB/s = 1000ms.

    **Conclusion & Interpretation:**
    - **Result: 200ms vs 1000ms (Memory-Bound)**. Design A is 5x faster (200ms vs 1000ms) despite executing 2x more FLOPs because its higher AI requires significantly less memory bandwidth.
