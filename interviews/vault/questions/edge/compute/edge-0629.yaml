title: The Autonomous Perception Stack Fork
scenario: You are the lead architect for the perception system of a new Level 3 autonomous vehicle. Your team is debating two competing designs for the core perception stack, which must run on an edge processor with a strict 30W thermal design power (TDP) budget and meet a 33ms per-frame deadline.
question: How should you choose between the two 30W perception designs, and why is achieved TOPS-per-watt more useful than FLOPs?
details:
  realistic_solution: Design A is the better starting point because its higher arithmetic intensity gives much higher achieved throughput per watt, even though it performs more total operations. Under the stated 30W, 137 TOPS, 100 GB/s roofline, both candidates are memory-bound and both miss the 33ms frame deadline, so the decision is not "ship A as-is"; it is "keep A's compute-heavy structure and reduce its traffic/work until the achieved TOPS-per-watt and latency meet the target." FLOPs alone would incorrectly favor Design B.
  common_mistake: |
    **The Pitfall:** Relying exclusively on total FLOPs or parameter count.
    **The Rationale:** Candidates incorrectly assume the chip's advertised peak TOPS is achievable for any workload, ignoring that memory-bound operators severely underutilize compute units.
    **The Consequence:** Choosing a model with fewer FLOPs that is actually slower and less power-efficient in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware bounds at 30W: ~137 INT8 TOPS compute, 100 GB/s bandwidth.
    - Design A (Compute-Heavy): 10 T-ops, Arithmetic Intensity (AI) = 500 Ops/Byte.
    - Design B (Compute-Light): 5 T-ops, Arithmetic Intensity (AI) = 50 Ops/Byte.

    **Calculations:**
    - Hardware Ridge Point: 137 TOPS / 100 GB/s = 1370 Ops/Byte.
    - Both designs have AI below 1370 Ops/Byte, so both are memory-bound.
    - Design A Data Movement: 10e12 ops / 500 ops/byte = 20e9 bytes = 20 GB. Memory time = 20 GB / 100 GB/s = 200ms. Compute-only time = 10 TOP / 137 TOPS = 73ms, so the roofline time is ~200ms.
    - Design B Data Movement: 5e12 ops / 50 ops/byte = 100e9 bytes = 100 GB. Memory time = 100 GB / 100 GB/s = 1000ms. Compute-only time = 5 TOP / 137 TOPS = 36ms, so the roofline time is ~1000ms.
    - Achieved throughput: A = 10 TOP / 0.200s = 50 TOPS, or 1.7 TOPS/W. B = 5 TOP / 1.000s = 5 TOPS, or 0.17 TOPS/W.

    **Conclusion & Interpretation:**
    - **Result: Design A is 5x faster and about 10x better in achieved TOPS/W, but neither design meets 33ms as specified.** Choose A's architecture direction, then reduce memory traffic or operations by roughly 6x before production.
