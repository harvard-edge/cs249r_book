title: The Autonomous Fleet Compute Upgrade
scenario: You are the Principal ML Systems Engineer for an autonomous trucking company. Your current fleet uses a perception system which comfortably meets its 33ms end-to-end latency budget. Your modeling team has just developed a new, much safer, BEV-Transformer model that reduces accident risk by 5%. However, when you benchmark this new model, it badly misses the 33ms deadline. `tegrastats` shows the GPU is pegged at 100%, but the model's arithmetic intensity is known to be significantly lower than the previous-generation CNNs.
question: Why is the BEV-Transformer missing the 33ms deadline, and what should you optimize first?
details:
  realistic_solution: 'The model is fundamentally memory-bandwidth bound. The BEV-Transformer''s lower arithmetic intensity means it cannot leverage the peak compute TOPS; it''s severely limited by HBM speeds. Optimizations must focus on operator fusion to keep activations on-chip or heavy quantization, rather than upgrading to a higher-TOPS GPU.'
  common_mistake: |
    **The Pitfall:** Focusing solely on peak TOPS and upgrading to a compute-heavy next-generation GPU.
    **The Rationale:** Assuming that more peak FLOPS directly translates to more performance, ignoring the arithmetic intensity profile of the new architecture.
    **The Consequence:** Millions spent on hardware upgrades that yield zero FPS improvement because the cores remain idle, starved for data.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware Peak Compute: 275 TOPS (INT8).
    - Memory Bandwidth: 204.8 GB/s.
    - Budget: 33ms.
    - Model AI: 100 Ops/Byte.

    **Calculations:**
    - Ridge Point: 275,000 GOPS / 204.8 GB/s = 1342 Ops/Byte.
    - Effective TOPS limit: 100 Ops/Byte * 204.8 GB/s = 20,480 GOPS = 20.48 TOPS.
    - Time for 1 T-op of work: 1 TOPS / 20.48 TOPS = 48.8 ms.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth Bound**. The extremely low arithmetic intensity starves the compute cores, proving the model is completely capped at 20.48 TOPS regardless of hardware compute capability.
