title: Diagnosing Low Utilization on Jetson Orin DLA
scenario: You are deploying an INT8 quantized CNN on an NVIDIA Jetson Orin edge device. While profiling the model, you notice that the Ampere GPU performs well, but the dedicated Deep Learning Accelerator (DLA) shows drastically low utilization (< 20%) on several pointwise (1x1) convolution layers despite having plenty of bandwidth from the 32 GB LPDDR5. The layers are clearly compute-bound rather than memory-bound.
question: Based on the architecture of a systolic array accelerator like the DLA, what is the root cause of this poor utilization?
details:
  realistic_solution: 'The root cause is spatial under-mapping: the 1x1 convolution has too little channel parallelism to fill the DLA''s fixed-size systolic array. A layer with only 16 input channels and 16 output channels can occupy only a fraction of a 32x32 MAC grid, so most lanes sit idle even when LPDDR5 bandwidth is sufficient. Padding may make the tensor shape legal for a native tile, but it does not create useful work; better fixes are channel bundling, layer fusion, batching, or routing small pointwise layers to the GPU when the DLA tile is too large.'
  common_mistake: |
    **The Pitfall:** Immediately diagnosing a memory bandwidth bottleneck.
    **The Rationale:** Candidates assume that the LPDDR5 memory cannot feed the MACs fast enough for 1x1 convolutions.
    **The Consequence:** They miss the interaction between the mathematical dimensions of the convolution and the fixed physical dimensions of a systolic array, ignoring severe spatial under-mapping.
  napkin_math: |
    **Assumptions & Constraints:**
    - DLA Hardware: 32x32 systolic array (1,024 MACs per cycle).
    - Model Workload: 1x1 convolution, 16 input channels, 16 output channels.

    **Calculations:**
    - Spatial Mapping: 16x16 spatial block of MACs = 256 active MACs.
    - Hardware Utilization: 256 active MACs / 1,024 total MACs = 25%.

    **Conclusion & Interpretation:**
    - **Result: 25% Utilization (Spatial Underutilization)**. Even with abundant memory bandwidth, DLA efficiency drops because the small channel dimensions do not expose enough parallel work to fill the fixed systolic array.
