title: 'The Silent NPU Killer'
scenario: 'Your safety-critical edge system relies heavily on a specialized Neural Processing Unit (NPU) for high-performance ML inference.'
question: 'How do you design the system to detect silent NPU failures, ensure functional safety, and implement graceful degradation without external intervention?'
details:
  realistic_solution: 'A multi-pronged detection and recovery strategy: 1. Redundancy & Cross-Verification (DMR/TMR) or Software Fallback. 2. Internal NPU Health Monitoring (ECC, BIST, Performance Counters). 3. Runtime Output Validation (Plausibility Checks, Confidence Thresholding, Cross-Modal Consistency). 4. Watchdog Timers & Liveness Checks. 5. Graceful Degradation & Recovery: Reset, Software Fallback Activation, and Reduced Functionality.'
  common_mistake: |
    **The Pitfall:** Suggesting to "just restart the NPU if it hangs."
    **The Rationale:** Treating silent data corruption the same as a hard crash or OOM error.
    **The Consequence:** Subtly wrong computations (e.g., missed obstacles) flow downstream undetected, leading to catastrophic safety failures.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU Failure Rate: 1 FIT (1 failure per billion hours).
    - CPU Fallback Latency: 100ms (vs 5ms on NPU).

    **Calculations:**
    - 10,000 devices over 5 years (43,800 hours) = 0.438 failures.
    - DMR reduces simultaneous failure probability to (10^-9)^2.
    - FPS on Fallback: 1000ms / 100ms = 10 FPS (down from 200 FPS).

    **Conclusion & Interpretation:**
    - **Result: 10 FPS (Functionally Safe)**. Adding redundancy practically eliminates undetected failures. The system operates at a degraded (10 FPS) but functionally safe state without crashing.
