title: Transformer Attention Dataflow on an Edge Systolic Accelerator
scenario: A new Transformer-based object detection model is deployed on an edge inference accelerator. Initial profiling shows that while the INT8 throughput is theoretically very high, the actual inference latency is 2x higher than expected for the transformer's self-attention layers, and the AI Cores are significantly underutilized (averaging 30% utilization). You suspect an issue with how data is fed into the systolic arrays.
question: What could be the root cause of this underutilization and increased latency, specifically considering the characteristics of transformer layers and the accelerator's architecture?
details:
  realistic_solution: The problem likely stems from attention tiles that do not fit or reuse well in on-die SRAM, forcing repeated LPDDR4x traffic and starving the systolic arrays. For transformer self-attention, the best dataflow is workload dependent; keep partial outputs, K/V tiles, or projections resident only when that choice reduces total off-chip movement. The fix is to retile sequence, head, and channel dimensions so the active inputs, weights, and partial outputs fit in SRAM, then profile whether output-stationary or weight-stationary scheduling minimizes spills for the specific attention kernels.
  common_mistake: |
    **The Pitfall:** Assuming a 'one-size-fits-all' weight-stationary dataflow.
    **The Rationale:** Candidates apply CNN optimization strategies (weight-stationary) to Transformer attention heads, which have large intermediate activations and smaller weight matrices.
    **The Consequence:** Frequent off-chip memory accesses to LPDDR4x, causing severe latency spikes and leaving the AI Cores starved.
  napkin_math: |
    **Assumptions & Constraints:**
       * Peak compute = 400 TOPS INT8.
       * Observed AI Core utilization = 30%, so useful sustained compute is about 120 TOPS while arrays are active.
       * LPDDR4x bandwidth = 136 GB/s.
       * A badly tiled attention layer performs 10e9 useful INT8 ops but spills about 4 GB of K/V, score, and output traffic.
    **Calculations:**
       * Compute time at observed utilization = 10e9 ops / 120e12 ops/s = 0.000083 s = 0.083 ms.
       * Minimum off-chip transfer time = 4 GB / 136 GB/s = 0.029 s = 29 ms.
       * Since transfer time is hundreds of times larger than compute time, the arrays wait on data instead of arithmetic.
    **Conclusion & Interpretation:**
       * **Result: Memory-bandwidth and tiling bound.** The root cause is not peak TOPS; it is an SRAM tiling/dataflow mismatch that repeatedly spills attention tensors to LPDDR4x.
