title: Coral Edge TPU Model Selection and Throughput
scenario: A Google Coral Edge TPU (4 TOPS INT8, 2W) must process 4 cameras streaming at 15 FPS. Model Alpha uses ReLU (8 GFLOPs), while Model Beta uses Swish (3 GFLOPs).
question: Which model, Alpha or Beta, is the most cost-effective choice for 4 cameras at 15 FPS on a Coral Edge TPU, and why?
details:
  realistic_solution: Model Alpha is the cost-effective choice because it can meet the required 60 FPS while staying on the Edge TPU execution path. Its 8 GFLOPs per frame requires only 0.48 TOPS at 60 FPS, well below the 4 TOPS INT8 peak. Model Beta has fewer nominal GFLOPs, but its Swish layers are unsupported on the Edge TPU and force CPU fallback, so the practical throughput is limited by the fallback stage rather than by the 3 GFLOPs count.
  common_mistake: |
    **The Pitfall:** Choosing Model Beta based on the lower theoretical FLOPs.
    **The Rationale:** Failing to audit hardware-specific operator support lists and assuming all GFLOPs execute with equal efficiency.
    **The Consequence:** Host CPU fallback causes 20ms delays per frame, hard-capping throughput and missing the 60 FPS real-time deadline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 4 cameras * 15 FPS = 60 FPS. Edge TPU = 4 TOPS.
    - Model Alpha: 8 GFLOPs/frame, fully delegated to TPU.
    - Model Beta: 3 GFLOPs/frame, but unsupported Swish causes a CPU fallback stage with ~20 ms per-frame latency.

    **Calculations:**
    - Model Alpha required throughput: 60 FPS * 8 GFLOPs/frame = 480 GFLOP/s, treated as about 0.48 TOPS of INT8 work for this sizing estimate.
    - TPU Utilization (Alpha): 0.48 TOPS / 4 TOPS = 12%.
    - Model Beta fallback-limited throughput: 1,000 ms/s / 20 ms/frame = 50 FPS maximum, even before other pipeline overhead.
    - Required throughput: 60 FPS; Beta shortfall = 60 - 50 = 10 FPS.

    **Conclusion & Interpretation:**
    - **Result: Alpha meets the 60 FPS workload at 12% TPU utilization; Beta fails with a 50 FPS cap (Hardware-Compatibility Bound)**. The lower FLOP count does not help if unsupported operators force CPU fallback.
