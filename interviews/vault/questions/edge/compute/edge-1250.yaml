title: Hailo-8 Data Streaming Bottleneck Analysis
scenario: We deployed a vision model on a Hailo-8 dataflow accelerator. A specific convolutional layer requires 10 GOPS of compute, takes 2 MB of input activations, 1 MB of weights, and produces 2 MB of output activations.
question: What TOPS does the Hailo-8 achieve on this layer, and why is it underutilized despite a 26 TOPS peak?
details:
  realistic_solution: 'The accelerator is entirely I/O bound because it lacks local DRAM and must stream all inputs and outputs over the host PCIe link. Even if the internal dataflow is perfectly optimized, the 4 GB/s connection cannot feed data fast enough to sustain the 26 TOPS engine given this layer''s low arithmetic intensity.'
  common_mistake: |
    **The Pitfall:** Calculating internal SRAM bandwidth or specific systolic array dataflows instead of the external I/O bottleneck.
    **The Rationale:** Candidates assume the bottleneck is computational or internal memory, missing that the accelerator must stream all data over a slow host PCIe link.
    **The Consequence:** Failing to diagnose the massive I/O bottleneck, leading to incorrect optimizations that do not improve throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Hailo-8 (26 TOPS INT8, 2.5W)
    - PCIe Link: 4000 MB/s (4 GB/s)
    - Workload: 10 GOPS compute, 2MB in + 1MB weights + 2MB out

    **Calculations:**
    - Total I/O = 5 MB
    - I/O time = 5 MB / 4000 MB/s = 1.25 ms
    - Compute time at peak = 10 GOPS / 26,000 GOPS/s = 0.38 ms
    - Achieved compute = 10 GOPS / 1.25 ms = 8 TOPS

    **Conclusion & Interpretation:**
    - **Result: 8 TOPS (I/O Bound).** Utilization is ~31%.
