title: Cortex-M4 Duty Cycling Energy for 100ms Inference Intervals
scenario: An IoT node (Cortex-M4) draws 30mW active and 0.1mW sleeping. An inference takes 10ms. Analyze the energy tradeoff of continuously capturing and analyzing data versus duty-cycling the MCU to run only once every 100ms.
question: Should the IoT node continuously analyze data or duty-cycle to run inference once every 100ms, and what is the energy tradeoff?
details:
  realistic_solution: |
    Continuous analysis keeps the MCU active for the full second, drawing 30mW on average. Duty-cycling once every 100ms runs inference for 10ms and sleeps for 90ms each cycle, so average power is about 3.09mW. That is roughly a 90% energy reduction, but the node only observes the signal during the active windows and can miss short events between wakeups. Choose duty cycling when energy is the dominant constraint and missed-event risk is acceptable; choose continuous analysis when full temporal coverage is required.
  common_mistake: |
    **The Pitfall:** Ignoring the 0.1mW sleep baseline and wake-up transition energy.
    **The Rationale:** Engineers assume sleep power is identically zero and transitions are instantaneous.
    **The Consequence:** This leads to overly optimistic battery life calculations and unexpected power drain.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M4 Active power: 30mW.
    - Sleep power: 0.1mW.
    - Continuous inference rate: 1000ms active window.
    - Duty cycle rate: 10 inferences/sec (10ms active, 90ms sleep per cycle).

    **Calculations:**
    - Continuous Active energy per second: 1000ms * 30mW = 30mJ/sec.
    - Duty-cycled active time: 10 inferences * 10ms = 100ms. Sleep time: 900ms.
    - Duty-cycled energy per second: (100ms * 30mW + 900ms * 0.1mW) / 1000 = 3.09mJ/sec.

    **Conclusion & Interpretation:**
    - **Result: 3.09mJ/sec (Energy-Bound)**. Duty cycling delivers nearly a 90% reduction in energy usage at the cost of continuous visibility.
