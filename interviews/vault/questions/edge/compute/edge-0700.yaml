title: The Heterogeneous Scheduler's Dilemma
scenario: 'You''re developing an edge AI platform for industrial automation, where
  a single device needs to run multiple ML models (e.g., object detection, anomaly
  detection, predictive maintenance) alongside traditional control logic. The device
  has a heterogeneous compute architecture: a multi-core ARM CPU, a dedicated NPU,
  and a small GPU. Each ML model has different latency, throughput, and power constraints.'
question: How do you design a real-time task scheduler and resource allocator to ensure
  all critical tasks meet their deadlines while optimizing for power efficiency and
  overall system utilization?
details:
  realistic_solution: "A sophisticated, multi-level scheduling and resource management\
    \ approach is required:\n  1.  **Workload Profiling & Characterization:** Thoroughly\
    \ profile each ML model and control task on each available hardware accelerator\
    \ (CPU, NPU, GPU) to understand its latency, throughput, memory footprint, and\
    \ power consumption under various loads.\n  2.  **Static vs. Dynamic Scheduling:**\n\
    \      *   **Static Scheduling (Critical Tasks):** For highly critical, periodic\
    \ tasks with strict deadlines, pre-allocate resources and define execution order\
    \ at design time. This often involves a Real-Time Operating System (RTOS) with\
    \ priority-based or fixed-priority preemptive scheduling (e.g., Rate Monotonic\
    \ Scheduling, Earliest Deadline First).\n      *   **Dynamic Scheduling (Best-Effort/Non-Critical):**\
    \ For less critical or bursty ML workloads, use a dynamic scheduler that considers\
    \ current system load, power budget, and task priorities. This might involve a\
    \ global scheduler that makes decisions across compute units.\n  3.  **Hardware-Aware\
    \ Task Mapping:** The scheduler needs to understand which accelerator is best\
    \ suited for which task. An NPU might be ideal for quantized inference, while\
    \ a GPU handles larger float-point models or pre-processing, and the CPU manages\
    \ control logic, OS, and non-accelerated tasks. This mapping can be pre-defined\
    \ or dynamically adjusted.\n  4.  **Resource Partitioning & Isolation:** Use mechanisms\
    \ like cgroups, namespaces (Linux), or dedicated hardware partitions to isolate\
    \ critical tasks and prevent resource contention from non-critical ones. This\
    \ ensures determinism.\n  5.  **Energy-Aware Scheduling:** Integrate power management.\
    \ Dynamically adjust CPU/GPU frequencies (DVFS), NPU clock gating, or even switch\
    \ to lower-power model variants (e.g., smaller models, lower precision) when operating\
    \ on battery or under thermal constraints. This requires real-time power monitoring.\n\
    \  6.  **Graph Compilers & Runtime Orchestration:** Utilize ML compilers (e.g.,\
    \ TVM, ONNX Runtime, TensorFlow Lite) that can optimize model graphs for specific\
    \ hardware, splitting operations across accelerators and managing data transfers.\
    \ A runtime orchestrator then executes these optimized graphs.\n  7.  **Load Balancing\
    \ & Prioritization:** Implement a queuing system for tasks awaiting execution\
    \ on an accelerator. Prioritize tasks based on criticality and deadline. Consider\
    \ techniques like work stealing or dynamic load balancing if accelerators become\
    \ underutilized."
  common_mistake: '**The Pitfall:** Placing all compute-heavy tasks onto the NPU because
    it has the highest theoretical TOPS.

    **The Rationale:** Candidates overlook the NPU''s specialized, inflexible nature
    and limited memory, while ignoring the capabilities of the CPU/GPU for non-ML
    or unquantized workloads.

    **The Consequence:** Underutilizing the heterogeneous SoC, missing critical control-loop
    deadlines on the CPU, and failing to manage system power states dynamically.

    '
  napkin_math: '**Assumptions & Constraints:**

    - NPU: 50 TOPS/W for INT8. GPU: 10 TOPS/W for FP16. CPU: 0.1 TOPS/W for FP32.

    - A 2 TOPS object detection model consumes: 40mW (NPU), 200mW (GPU), or 20W (CPU).

    - Control loop requires 100Hz (10ms deadline) and takes 2ms on CPU.


    **Calculations:**

    - NPU inference takes 5ms.

    - If scheduled concurrently, CPU handles control loop preemptively while NPU runs
    inference. If NPU is busy, best-effort ML tasks fallback to GPU (15ms).


    **Conclusion & Interpretation:**

    - **Result: 15ms fallback (Compute-Bound)**. Proper scheduling ensures control
    deadlines are met.

    '
  options:
  - The model should be retrained with fewer parameters to reduce inference time,
    as model size is the primary driver of latency.
  - '"Just put everything on the NPU, it''s fastest."'
  - Profiling overhead is masking the true performance; disabling all instrumentation
    will reveal that the system is already meeting targets.
  - A sophisticated, multi-level scheduling and resource management approach is required.
    It involves workload profiling, static vs. dynamic scheduling, hardware-aware
    task mapping, and resource isolation.
