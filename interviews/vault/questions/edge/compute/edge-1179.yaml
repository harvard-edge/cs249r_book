title: 'Edge Transformer Cost Evaluation: Quantized vs Full Transformer on Jetson'
scenario: You must choose between deploying BERT-base (110M params) at FP16 vs INT8 on a Jetson Orin (32GB LPDDR5, 275 TOPS INT8) for a document triage system.
question: Which is better for a real-time document triage system requiring P99 < 50ms, considering throughput, memory footprint, and latency at batch=1?
details:
  realistic_solution: INT8 is usually the better batch=1 edge choice if calibration preserves document-triage accuracy, because it halves the BERT-base weight footprint from about 220 MB to 110 MB and reduces the minimum DRAM traffic and energy per inference. FP16 may still be the correct choice if INT8 causes unacceptable accuracy loss or if the deployed runtime is dominated by activations, attention kernels, tokenization, or launch overhead rather than weight bandwidth. The decision should be made from measured end-to-end P99 latency and throughput under the target TensorRT/DLA/GPU runtime; the napkin math only shows that INT8 has a better memory-bandwidth lower bound and both formats have enough headroom for a 50ms SLO in this simplified model.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is compute and picking based on TOPS.
    **The Rationale:** Failing to check the arithmetic intensity of batch=1 execution, relying on compute-bound profiling tools instead of memory bandwidth.
    **The Consequence:** Deploying an FP16 model that draws 2x more energy per inference without utilizing the GPU's compute capability.
  napkin_math: |
    **Assumptions & Constraints:**
    - BERT-base: 110M parameters. Target: P99 < 50ms.
    - Orin: 102.4 GB/s effective memory bandwidth, 60W.

    **Calculations:**
    - FP16 weight size: 110M params * 2 bytes = 220 MB.
    - INT8 weight size: 110M params * 1 byte = 110 MB.
    - Decimal-unit lower-bound transfer time, FP16: 220 MB / 102.4 GB/s = 0.220 GB / 102.4 GB/s = 2.15 ms.
    - Decimal-unit lower-bound transfer time, INT8: 110 MB / 102.4 GB/s = 0.110 GB / 102.4 GB/s = 1.07 ms.
    - Lower-bound energy at 60W, FP16: 60W * 0.00215s = 129 mJ.
    - Lower-bound energy at 60W, INT8: 60W * 0.00107s = 64.2 mJ.
    - Full inference latency must add activation traffic, attention/FFN compute, kernel/runtime overhead, and any CPU preprocessing.

    **Conclusion & Interpretation:**
    - **Result: INT8 is preferred if measured accuracy is acceptable (Memory-Bandwidth Sensitive)**. The simplified weight-streaming lower bound is 1.07 ms for INT8 versus 2.15 ms for FP16, but final P99 and throughput must be validated end-to-end rather than inferred from parameter size alone.
