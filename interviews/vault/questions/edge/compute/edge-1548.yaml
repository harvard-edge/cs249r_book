title: Dataflow Tradeoffs on Qualcomm AI 100
scenario: You are deploying a large language model inference pipeline on an on-premise server utilizing the Qualcomm Cloud AI 100 accelerator. The model's bottleneck is the attention mechanism's projection matrices.
question: Should the LLM projection matrices use weight-stationary or output-stationary dataflow, and how should you tile them?
details:
  realistic_solution: For LLM projection layers where batch sizes are small but sequence lengths are long, Output-Stationary (OS) is often preferred to keep the high-precision partial sums in local SRAM, preventing expensive round-trips to external device memory. The tiling strategy must be heavily optimized to maximize arithmetic intensity; the tiles must be sized such that all operands (activations and weights) fit in the on-chip SRAM to continuously feed the compute engines, bridging the gap between the 400 TOPS compute and external-memory bandwidth.
  common_mistake: |
    **The Pitfall:** Reflexively choosing Weight-Stationary dataflow.
    **The Rationale:** Candidates assume WS is always best because it is typical for CNNs on edge NPUs, failing to recognize that LLM attention layers involve massive intermediate activation matrices.
    **The Consequence:** Causes severe memory bandwidth bottlenecks as high-precision partial sums are repeatedly written to and read from the much slower LPDDR4x memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - AI 100 delivers 400 TOPS (400e12 INT8 ops/sec).
    - LPDDR4x bandwidth is around 136 GB/s.
    - Matrix multiplication (M*K x K*N) ops = 2*M*N*K, data = M*K + K*N + M*N bytes.

    **Calculations:**
    - Required arithmetic intensity = (400e12 ops/sec) / (136e9 bytes/sec) ≈ 2941 ops/byte.
    - Untiled or poorly reused GEMM intensity under this byte model is 2*M*N*K / (M*K + K*N + M*N) ops/byte.
    - For an on-chip tile of Mt x Nt x Kt, the same reuse model gives 2*Mt*Nt*Kt / (Mt*Kt + Kt*Nt + Mt*Nt) ops/byte, constrained by the tile operands fitting in SRAM.

    **Conclusion & Interpretation:**
    - **Result: Data-reuse limited unless tiles are large enough.** Output-stationary dataflow keeps partial sums on-chip and uses tiling to raise arithmetic intensity toward the 2941 ops/byte balance point.
