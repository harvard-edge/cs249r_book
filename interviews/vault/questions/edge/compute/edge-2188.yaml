title: INT8 Quantization and Tensor Core Throughput on Orin
scenario: Your edge device runs a YOLOv8-M model in FP16 at 22ms per frame (45 fps). Converting to INT8 should theoretically give 2x Tensor Core throughput.
question: What is the expected INT8 latency for the 22ms FP16 path after accounting for memory, quantization, mixed-precision, and overhead terms?
details:
  realistic_solution: |
    The end-to-end latency will not scale linearly by 2x. Amdahl's Law dictates that only the compute-bound matrix multiplications (Conv/Linear layers) benefit from INT8 Tensor Cores. Memory-bound operations (activations, element-wise ops), mixed-precision cast overheads (FP16 to INT8 and back), and quantization/dequantization scaling nodes remain unchanged or add new latency. Thorough profiling with `nsys` will reveal that memory and kernel launch overheads dominate the remaining time.
  common_mistake: |
    **The Pitfall:** Assuming a 2x theoretical TOPS increase yields a straight 2x end-to-end model speedup (11ms).
    **The Rationale:** Failing to apply Amdahl's Law, forgetting that many layers are memory-bound, and ignoring the overhead of data format conversions.
    **The Consequence:** Overpromising performance gains to stakeholders and failing to identify actual memory-bandwidth bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original Latency: 22ms FP16.
    - Breakdown: 70% compute (15.4ms), 15% memory (3.3ms), 10% mixed-precision (2.2ms), 5% overhead (1.1ms).
    - Speedup: 2x on compute ONLY.
    - Quantization Penalty: 0.5ms overhead.

    **Calculations:**
    - New Compute: 15.4 ms / 2 = 7.7 ms.
    - Static Time: 3.3 + 2.2 + 1.1 = 6.6 ms.
    - Total INT8 Latency: 7.7 (compute) + 6.6 (static) + 0.5 (QAT overhead) = 14.8 ms.

    **Conclusion & Interpretation:**
    - **Result: 14.8 ms end-to-end latency (Memory and Overhead-Bound)**. Amdahl's Law.
