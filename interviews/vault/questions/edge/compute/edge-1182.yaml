title: Jetson Orin Phi-3-Mini-4K Concurrency and Latency Analysis
scenario: |
  You are designing a complete edge LLM deployment for a factory floor assistant using Jetson Orin. Model: Phi-3-Mini-4K (3.8B params, INT4). Requirements: <2s for 200 token response, 10 simultaneous users, 24/7 operation.
  For this sizing exercise, assume 32 layers with grouped-query attention using a 768-wide FP16 K/V state per token.
question: Can one Jetson Orin handle Phi-3-Mini-4K INT4 for 10 simultaneous users with <2s 200-token responses, and what is its annual cost?
details:
  realistic_solution: |
    One Jetson Orin can fit the Phi-3-Mini-4K INT4 weights and a 10-user KV cache in 32GB RAM, but it cannot meet the latency target. With the stated grouped-query attention assumption, a 4K FP16 KV cache is about 0.81GB per user, or about 8.05GB for 10 users. The SLA requires each user to receive 200 tokens in 2s, so batched decode must sustain 100 decode steps/s for the 10-user batch. Even an optimistic weight-streaming lower bound is 1.9GB / 102.4GB/s = 18.6ms per batched step, or only about 54 steps/s, before KV reads, prefill, sampling, and runtime overhead. Therefore the deployment fits memory but fails latency. Annual power cost at 60W and $0.10/kWh is 60W * 8,760h / 1000 * $0.10 = $52.56/year.
  common_mistake: |
    **The Pitfall:** Calculating decode latency based only on model weights, ignoring the KV cache memory bandwidth.
    **The Rationale:** Candidates treat KV cache as static storage rather than dynamic memory that must be read per step.
    **The Consequence:** Deploying a system that fits in memory but catastrophically fails latency SLAs under concurrent load.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Jetson Orin 32GB (102.4 GB/s bandwidth, 60W)
    - Model: 3.8B INT4 ~ 1.9GB weights
    - KV sizing assumption: 32 layers, 768-wide FP16 K/V state, 4K context.
    - SLA: 200 tokens in <2s (10ms/token max)

    **Calculations:**
    - INT4 weight footprint: 3.8B params * 0.5 byte = 1.9GB.
    - KV cache estimate with GQA and FP16 KV: 2 (K,V) * 32 layers * 4096 tokens * 768 KV hidden width * 2 bytes = 805,306,368 bytes = 0.81GB/user.
    - KV cache for 10 users: 0.81GB * 10 = 8.05GB.
    - Memory footprint: 1.9GB weights + 8.05GB KV = 9.95GB, plus runtime buffers (fits in 32GB).
    - SLA requires 200 decode steps in 2s, or 100 batched decode steps/s for the 10-user batch.
    - Optimistic weight-streaming lower bound per batched step: 1.9GB / 102.4 GB/s = 18.6 ms/step.
    - Max steps from weight bandwidth alone: 1 / 0.0186 = 54 steps/s, before KV reads, prefill, sampling, and runtime overhead.
    - Annual power cost: 60W * 8760h / 1000 * $0.10/kWh = $52.56/year.

    **Conclusion & Interpretation:**
    - **Result: Fits memory, fails latency, costs about $52.56/year in power (Memory-Bandwidth Bound)**. The deployment needs 100 batched decode steps/s but the optimistic weight-streaming bound supports only about 54 steps/s before other traffic and overhead.
