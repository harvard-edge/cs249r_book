title: Jetson Orin Phi-3-Mini-4K Concurrency and Latency Analysis
scenario: |
  You are designing a complete edge LLM deployment for a factory floor assistant using Jetson Orin. Model: Phi-3-Mini-4K (3.8B params, INT4). Requirements: <2s for 200 token response, 10 simultaneous users, 24/7 operation.
question: Can one Jetson Orin handle Phi-3-Mini-4K INT4 for 10 simultaneous users with <2s 200-token responses, and what is its annual cost?
details:
  realistic_solution: |
    One Jetson Orin can fit the Phi-3-Mini-4K INT4 weights and a 10-user KV cache in 32GB RAM, but it cannot meet the latency target. With grouped-query attention, a 4K FP16 KV cache is about 0.4GB per user, or about 4.0GB for 10 users. Batched decode must read roughly the 1.9GB INT4 weights plus the active KV cache each token step, so a bandwidth lower bound is about (1.9GB + 4.0GB) / 102.4GB/s = 58ms/token step. A 200-token response needs about 11.6s, before prefill and runtime overhead, which fails the <2s SLA. Annual power cost at 60W and $0.10/kWh is 60W * 8,760h / 1000 * $0.10 = $52.56/year.
  common_mistake: |
    **The Pitfall:** Calculating decode latency based only on model weights, ignoring the KV cache memory bandwidth.
    **The Rationale:** Candidates treat KV cache as static storage rather than dynamic memory that must be read per step.
    **The Consequence:** Deploying a system that fits in memory but catastrophically fails latency SLAs under concurrent load.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Jetson Orin 32GB (102.4 GB/s bandwidth, 60W)
    - Model: 3.8B INT4 ~ 1.9GB weights
    - SLA: 200 tokens in <2s (10ms/token max)

    **Calculations:**
    - INT4 weight footprint: 3.8B params * 0.5 byte = 1.9GB.
    - KV cache estimate with GQA and FP16 KV: 2 (K,V) * 32 layers * 4096 tokens * 768 KV hidden width * 2 bytes = 0.40GB/user.
    - KV cache for 10 users: 0.40GB * 10 = 4.0GB.
    - Memory footprint: 1.9GB weights + 4.0GB KV = 5.9GB, plus runtime buffers (fits in 32GB).
    - Decode memory lower bound per batched token step: 1.9GB weights + 4.0GB KV = 5.9GB.
    - Time per decode step: 5.9GB / 102.4 GB/s = 57.6 ms/token step.
    - 200 generated tokens: 200 * 57.6 ms = 11.5 seconds before prefill/runtime overhead.
    - Annual power cost: 60W * 8760h / 1000 * $0.10/kWh = $52.56/year.

    **Conclusion & Interpretation:**
    - **Result: Fits memory, fails latency, costs about $52.56/year in power (Memory-Bandwidth Bound)**. The decode lower bound is about 11.5 seconds for 200 tokens, far above the 2s requirement.
