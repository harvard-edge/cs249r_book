title: Calculate peak power difference between data center and edge accelerators
scenario: A retail store wants to process 4 video streams using local hardware. They are considering deploying one centralized cloud GPU or two edge compute nodes.
question: Calculate the difference in peak power consumption between the two hardware deployment choices (400W vs 2x 60W).
details:
  realistic_solution: 'The power delta is 280W. The edge cluster consumes 120W (2x 60W nodes) versus the centralized 400W cloud GPU. When calculating Total Cost of Ownership (TCO) and thermal provisioning, substituting single monolithic cloud GPUs with multiple low-TDP edge nodes drastically reshapes the thermal extraction requirements and data center power delivery caps.'
  common_mistake: |
    **The Pitfall:** Comparing the power of a single edge device instead of the full cluster required to replace the cloud accelerator.
    **The Rationale:** Candidates misread the deployment sizing and compare units 1:1.
    **The Consequence:** Cost and thermal estimates for edge deployments are severely underestimated.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cloud GPU Peak Power: 400W.
    - Edge Node Peak Power: 60W per unit.
    - Edge nodes required: 2.

    **Calculations:**
    - Edge total power = 2 * 60W = 120W.
    - Power difference = 400W - 120W = 280W.

    **Conclusion & Interpretation:**
    - **Result: 280W peak power savings (Power-Bound)**. Comparing 1:1 units rather than full cluster replacement masks edge power efficiency.
