title: Evaluate Accelerator Mismatch for Autoregressive LLMs
scenario: An edge server features 4 dataflow accelerators connected via PCIe Gen3. A team proposes running a 7B LLM quantized to INT8 on this hardware.
question: Create an end-to-end evaluation of this deployment architecture and identify the fundamental hardware mismatch preventing real-time text generation?
details:
  realistic_solution: The mismatch is that the 7B INT8 weights cannot be moved across PCIe Gen3 x4 for every decoded token at real-time rates. A 7 GB model streamed at 15 tokens/sec would require about 105 GB/s of host-device bandwidth, while PCIe Gen3 x4 provides only about 4 GB/s before overhead. The accelerators are only viable if the weights stay resident near the compute in local high-bandwidth memory; if each token depends on fetching weights over PCIe, host-device bandwidth, not TOPS, throttles generation.
  common_mistake: |
    **The Pitfall:** Focusing solely on whether 7B parameters physically fit in system RAM or the total TOPS capacity.
    **The Rationale:** Candidates assume that because the accelerators provide >100 TOPS, they can handle the compute, completely ignoring the massive weight-fetching requirement of autoregressive LLMs.
    **The Consequence:** Deploying an architecture that is fundamentally bottlenecked by PCIe bandwidth, resulting in <1 token/sec generation speeds.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * 7B parameters in INT8 = 7 GB of weights.
       * Target generation speed = 15 tokens/sec.
       * PCIe Gen3 x4 bandwidth ≈ 4 GB/s.
       * The accelerators only sustain high token rates if weights are resident near the compute or served by high-bandwidth local memory.
    2. **Calculations:**
       * Upper-bound weight-streaming demand if the 7 GB model must be fetched for every token: 7 GB * 15 tokens/sec = 105 GB/s.
       * Host-to-device PCIe capacity: ~4 GB/s, far below that streaming bound.
       * If weights fit and stay resident on accelerators, PCIe is not the per-token path; the bottleneck shifts to on-device memory bandwidth and reuse of KV cache/weights.
    3. **Conclusion & Interpretation:**
       * **Result: Memory-Transfer-Bound.** The 105 GB/s figure is an upper bound for repeatedly streaming weights, not an exact PCIe requirement. The core mismatch is that autoregressive LLM inference needs high local memory bandwidth and residency; if weights must cross PCIe per token, PCIe Gen3 x4 throttles generation.
