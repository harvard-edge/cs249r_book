title: NUMA-Aware Memory Allocation on Jetson Orin
scenario: A vision model on Jetson Orin shows unexpected memory bandwidth bottlenecks despite the model fitting in LPDDR5.
question: How does Jetson Orin's unified LPDDR5 architecture differ from MI300X, and how do NUMA-like bandwidth effects appear?
details:
  realistic_solution: Orin's unified memory means CPU cache coherency traffic, GPU texture sampling, and DLA compute all share a single LPDDR5 bus. Unlike MI300X which has dedicated HBM3 per XCD, Orin has no memory-side exclusivity. Pin DL workloads to specific memory channels using NUMA-aware control (numactl) and ensure CPU OS activities are scheduled away from inference-critical windows via cgroups to prevent bandwidth contention.
  common_mistake: |
    **The Pitfall:** Treating the Jetson Orin as a pure discrete GPU with dedicated VRAM.
    **The Rationale:** Candidates forget that Orin shares a single LPDDR5 pool between the ARM CPU, Ampere GPU, and DLA, all competing for the same bandwidth.
    **The Consequence:** Unpredictable latency spikes occur as CPU background tasks or OS interrupts saturate the memory bus, stalling inference.
  napkin_math: |
    **Assumptions & Constraints:**
    - Orin LPDDR5 Total Bandwidth: 204 GB/s.
    - GPU peak demand: ~120 GB/s.
    - DLA demand: ~30 GB/s.
    - CPU OS baseline: ~20 GB/s.

    **Calculations:**
    - Total baseline utilization = 120 + 30 + 20 = 170 GB/s.
    - Bandwidth saturation = 170 / 204 = 83%.

    **Conclusion & Interpretation:**
    - **Result: 83% (Memory Bandwidth-Bound)**. Any additional CPU work during inference pushes utilization past 100%, causing severe queuing delays and NUMA-like bandwidth contention.
