title: Shared LPDDR5 bandwidth contention on Jetson Orin
scenario: A vision model on Jetson Orin shows unexpected memory bandwidth bottlenecks despite the model fitting in LPDDR5.
question: How does Jetson Orin's unified LPDDR5 architecture differ from MI300X, and how do NUMA-like bandwidth effects appear?
details:
  realistic_solution: |
    Orin is a unified-memory SoC: the ARM CPU, Ampere GPU, DLA, and other engines share one LPDDR5 memory subsystem, so interference appears as shared-bandwidth contention rather than user-controlled NUMA placement. MI300X is an HBM-based accelerator platform with much higher aggregate bandwidth and a different GPU memory hierarchy; it should not be treated as a model for numactl-style channel pinning on Orin. On Orin, reduce contention by profiling bandwidth, isolating CPU background work with scheduling or cgroups, avoiding unnecessary CPU copies, and scheduling DLA/GPU/CPU work so memory-heavy phases do not overlap.
  common_mistake: |
    **The Pitfall:** Treating the Jetson Orin as a pure discrete GPU with dedicated VRAM.
    **The Rationale:** Candidates forget that Orin shares a single LPDDR5 pool between the ARM CPU, Ampere GPU, and DLA, all competing for the same bandwidth.
    **The Consequence:** Unpredictable latency spikes occur as CPU background tasks or OS interrupts saturate the memory bus, stalling inference.
  napkin_math: |
    **Assumptions & Constraints:**
    - Orin LPDDR5 Total Bandwidth: 204 GB/s.
    - GPU peak demand: ~120 GB/s.
    - DLA demand: ~30 GB/s.
    - CPU OS baseline: ~20 GB/s.

    **Calculations:**
    - Total baseline utilization = 120 + 30 + 20 = 170 GB/s.
    - Shared bandwidth utilization = 170 / 204 = 83%.

    **Conclusion & Interpretation:**
    - **Result: 83% shared-memory utilization (Memory Bandwidth-Bound).** Additional CPU or DLA traffic can push the shared LPDDR5 fabric into queuing delays, but this is bandwidth contention on a unified SoC, not NUMA channel placement.
