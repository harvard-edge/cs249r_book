title: The Perception Model's Bottleneck
scenario: Your autonomous driving team is deploying a new perception model on a Jetson AGX Orin. Profiling shows that one frame of inference requires loading 50 MB of data (weights, activations, inputs) and performs 50 Giga-Operations (GOPS).
question: Is the 50 GOPS per 50 MB inference workload memory-bound or compute-bound on the AGX Orin, and why?
details:
  realistic_solution: To profile the execution constraint, perform a Roofline Analysis mapping the model's Arithmetic Intensity against the Jetson AGX Orin's memory bandwidth bounds.
  common_mistake: |
    **The Pitfall:** Misinterpreting the roofline model regimes.
    **The Rationale:** Engineers either calculate the arithmetic intensity correctly but draw the wrong conclusion, or they mistakenly calculate the hardware's ridge point and report it as the model's property.
    **The Consequence:** Focusing optimization efforts on the wrong limiter (e.g., trying to add more compute parallelism when the real problem is data starvation).
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Compute Requirement: 50 GOPS (50 * 10^9 Ops).
    - Model Data Transfer: 50 MB (50 * 10^6 Bytes).
    - Hardware Peak Compute: 275 TOPS (275 * 10^12 Ops/s).
    - Hardware Memory Bandwidth: 204.8 GB/s (204.8 * 10^9 Bytes/s).

    **Calculations:**
    - Hardware Ridge Point (Ops/Byte) = Peak Compute / Peak Bandwidth = 275e12 / 204.8e9 = ~1342.7 Ops/Byte.
    - Model Arithmetic Intensity (AI) = Model Compute / Model Data = 50e9 / 50e6 = 1000 Ops/Byte.
    - Evaluation: Model AI (1000) < Hardware Ridge Point (1342.7).

    **Conclusion & Interpretation:**
    - **Result: 1000 Ops/Byte (Memory-Bound)**. The model's AI is less than the hardware ridge point.
  options:
  - The AI is 1000 Ops/Byte, making the model memory-bound.
  - The AI is 1000 Ops/Byte, making the model compute-bound.
  - The AI is 1342 Ops/Byte, making the model compute-bound.
  - The AI is 1 Op/Byte, making the model memory-bound.
