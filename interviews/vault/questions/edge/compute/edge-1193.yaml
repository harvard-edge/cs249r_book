title: Recall Transformer Inference Latency on Hailo-8
scenario: A 12-layer ViT-B/16 with 86M parameters runs on a Hailo-8 accelerator (26 TOPS peak). Transformer workloads typically achieve ~50% utilization on this architecture. The INT8 quantized model requires approximately 17.6 GOPS per inference.
question: What is the expected single-image inference latency for the ViT-B/16 model?
details:
  realistic_solution: Calculate the effective performance by applying the 50% utilization penalty to the 26 TOPS peak, yielding 13 TOPS of sustained compute. Dividing the workload (17.6 GOPS) by the effective throughput gives a theoretical hardware latency of 1.35 ms. In practice, end-to-end latency is higher due to PCIe transfer overheads, pre-processing, and pipeline stalls.
  common_mistake: |
    **The Pitfall:** Using peak TOPS without discounting for utilization.
    **The Rationale:** Candidates assume the hardware can sustain its theoretical maximum performance.
    **The Consequence:** Transformer attention's dynamic access patterns reduce Hailo-8 utilization to ~50% vs the peak rated for CNN workloads, leading to latency underestimations by half.
  napkin_math: |
    **Assumptions & Constraints:**
    - INT8 Peak Compute: 26 TOPS.
    - Hardware Utilization: 50% for transformer workloads.
    - Inference cost: 17.6 GOPS.

    **Calculations:**
    - Effective compute: 26 TOPS * 0.50 = 13 TOPS (13,000 GOPS).
    - Latency: 17.6 GOPS / 13,000 GOPS = 0.00135 seconds (1.35 ms).
    - Maximum theoretical FPS: 1 / 0.00135 = ~740 FPS.

    **Conclusion & Interpretation:**
    - **Result: 1.35 ms theoretical single-image latency (Compute Bound)**. Factoring in pipeline and PCIe overheads reduces the realistic system throughput to ~200-300 FPS.
