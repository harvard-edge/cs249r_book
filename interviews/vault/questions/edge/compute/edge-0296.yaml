title: The Orin's Perception Dilemma
scenario: You're an engineer on an autonomous driving team, deploying a new perception model to an edge module which has a strict thermal design power (TDP) of 30W. Your model's primary convolutional layer performs 20 Giga-Ops (GOPS) for every 13.1 MB of input data it processes. The hardware provides 275 TOPS (INT8) at its peak 60W power draw and has 204.8 GB/s of memory bandwidth.
question: Is the 20 GOPS per 13.1 MB layer compute-bound or memory-bound, and what sustainable TOPS should you expect at 30W?
details:
  realistic_solution: This requires calculating the model's Arithmetic Intensity (AI) and comparing it to the hardware's Roofline Ridge Point. Since the AI (1527 Ops/Byte) > Ridge Point (1343 Ops/Byte), the workload is compute-bound. The sustainable TOPS at 30W is determined by scaling the 60W peak output linearly.
  common_mistake: |
    **The Pitfall:** Misinterpreting the Arithmetic Intensity vs. Ridge Point inequality.
    **The Rationale:** Engineers often think a higher AI means the system is waiting on memory. The reverse is true: a high AI means many operations per byte, so the compute units are the bottleneck.
    **The Consequence:** Wasting time trying to optimize memory transfer when the true bottleneck is pure mathematical capacity.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 275 TOPS at 60W, 204.8 GB/s bandwidth. Limit: 30W.
    - Model: 20 GOPS per 13.1 MB.

    **Calculations:**
    - Hardware Ridge Point: 275 TOPS / 204.8 GB/s = 1,343 Ops/Byte.
    - Model AI: 20 GOPS / 13.1 MB = ~1,527 Ops/Byte.
    - Power Efficiency: 275 TOPS / 60W = 4.58 TOPS/W.
    - Sustainable TOPS at 30W: 4.58 * 30 = ~137.5 TOPS.

    **Conclusion & Interpretation:**
    - **Result: ~138 TOPS (Compute-Bound)**. Since 1,527 > 1,343, the workload is safely above the ridge point. The sustainable throughput is ~138 TOPS at the 30W constraint.
  options:
  - Memory-bound, ~138 TOPS
  - Compute-bound, 275 TOPS
  - Compute-bound, ~138 TOPS
  - Memory-bound, ~102 TOPS
