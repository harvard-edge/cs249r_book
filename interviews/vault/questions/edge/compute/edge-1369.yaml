title: Throughput and Efficiency on a 4 TOPS, 2W Edge Accelerator
scenario: You are deploying a fully INT8 quantized object detection model on an edge accelerator. Your specific model architecture requires exactly 2 GOPs per forward pass.
question: What are the theoretical maximum FPS and inferences per Joule for a 2 GOPs/forward-pass INT8 model on a 4 TOPS, 2W accelerator?
details:
  realistic_solution: Convert the hardware's TOPS rating to GOPs to match the unit of the model's complexity. Divide total operations available per second by the operations required per inference to get the theoretical maximum FPS. Then divide FPS by Watts; since 1 Watt is 1 Joule/second, the result is inferences per Joule. The arithmetic gives upper bounds before memory, runtime, and I/O overheads.
  common_mistake: |
    **The Pitfall:** Mixing TOPS and GOPs or failing to calculate power efficiency correctly.
    **The Rationale:** Candidates divide by the wrong unit scale or forget that 1 Watt = 1 Joule/second.
    **The Consequence:** Theoretical throughput and efficiency metrics are miscalculated, leading to flawed system architectures.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute capacity: 4 TOPS.
    - Power consumption: 2 Watts.
    - Model requirement: 2 GOPs/inference.

    **Calculations:**
    - Compute in GOPs: 4 TOPS = 4,000 GOPs/second.
    - Theoretical Max FPS: 4,000 GOPs/sec / 2 GOPs/inference = 2,000 FPS.
    - Power efficiency: 2,000 inferences/sec / 2 Watts (Joules/sec) = 1,000 inferences/Joule.

    **Conclusion & Interpretation:**
    - **Result: 2,000 FPS, 1,000 inferences/Joule (Compute-Bound)**. The theoretical bounds limit throughput and efficiency.
