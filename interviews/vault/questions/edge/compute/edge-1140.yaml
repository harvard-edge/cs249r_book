title: 'Edge Systolic Array Optimization: Fix Memory-Bound Conv on Hailo-8'
scenario: A Hailo-8 achieves only 3 TOPS effective throughput on a custom CNN. Profiling shows 72% of time in 1x1 pointwise convolutions with very low arithmetic intensity.
question: What bottleneck explains the CNN's 11.5% MFU, and how do channel grouping and larger spatial resolution change its intensity and speed?
details:
  realistic_solution: The 1x1 convolution is memory bandwidth-bound due to low Arithmetic Intensity (AI). Standard channel grouping proportionally reduces both FLOPs and parameter bytes, yielding identical or worse AI. Increasing spatial resolution amortizes the static weight loading cost over a larger activation map, significantly boosting AI. The ultimate architectural fix is implementing operator fusion (fusing sequential 1x1s) or increasing batch size to aggressively amortize weight movement over the PCIe interface.
  common_mistake: |
    **The Pitfall:** Applying channel grouping to fix a memory bandwidth bottleneck.
    **The Rationale:** Candidates blindly apply FLOP-reduction techniques (like MobileNet's depthwise design) without calculating the Arithmetic Intensity ratio.
    **The Consequence:** The layer remains memory-bound, latency fails to improve, and model accuracy degrades unnecessarily.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 6 GB/s bandwidth, 26 TOPS. Ridge Point = 4333 Ops/Byte.
    - Baseline: 1x1 Conv, 7x7 spatial, Cin=512, Cout=1024.

    **Calculations:**
    - Baseline AI: 51.4M FLOPs / 0.575 MB = 89.4 Ops/Byte (Memory-bound).
    - Group=4 AI: 12.9M FLOPs / 0.206 MB = 62.6 Ops/Byte (Worse AI).
    - 28x28 AI: 824M FLOPs / 1.7 MB = 485 Ops/Byte (5.4x higher AI).

    **Conclusion & Interpretation:**
    - **Result: 89.4 Ops/Byte (Memory-Bound)**. The AI is vastly lower than the hardware ridge point (4333). Spatial scaling improves utilization.
