title: 'Calculating Maximum Framerate from Accelerator TOPS Capacity'
scenario: 'A smart retail system uses a Hailo-8 accelerator (26 TOPS) to process frames using a ResNet-50 variant requiring 8 GOPS per frame.'
question: 'How do you calculate the theoretical maximum framerate the Hailo-8 can achieve, and what is the relationship between TOPS and GOPS?'
details:
  realistic_solution: 'The Hailo-8 provides 26 TOPS (Tera-Operations Per Second), which equates to 26,000 GOPS. Dividing the total compute capacity of 26,000 GOPS by the 8 GOPS required per frame yields a theoretical maximum throughput of 3,250 frames per second.'
  common_mistake: 'Confusing TOPS (operations) with MACs (multiply-accumulate) or messing up the unit prefixes (forgetting that 1 Tera = 1,000 Giga).'
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8 peak compute: 26 TOPS.
    - Compute required per frame: 8 GOPS.

    **Calculations:**
    - Unit conversion: 26 TOPS = 26,000 GOPS.
    - Theoretical maximum framerate: 26,000 GOPS / 8 GOPS/frame = 3,250 FPS.

    **Conclusion & Interpretation:**
    - **Result: 3,250 FPS (Compute-Bound)**. Theoretical maximum throughput is 3,250 FPS before memory bandwidth bottlenecks.
