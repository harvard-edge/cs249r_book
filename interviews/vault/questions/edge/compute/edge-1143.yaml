title: EfficientDet-Lite2 Batch Throughput on Jetson Orin DLA
scenario: You need to compute throughput and energy for EfficientDet-Lite2 (2.9 GOPS INT8, 5.1M params) at batch sizes 1, 4, and 16 on Jetson Orin DLA. The goal is to show that, under the given weight and activation assumptions, the model is already compute-bound at batch 1 and remains on a throughput plateau as batch increases.
question: For EfficientDet-Lite2 on Orin DLA at batch sizes 1, 4, and 16, what FPS, latency, energy, and bound regime do you get?
details:
  realistic_solution: 'DLA ridge point is 11 TOPS / 200 GB/s = 55 ops/byte. Treat 1 MB as 1,000,000 bytes, use 5.1MB shared weights and 8MB activations per image, and assume 5W DLA power while active. Batch 1: arithmetic intensity is 2.9G / 13.1MB = 221 ops/byte, compute time is 2.9G / 11T = 0.264ms, FPS is about 3,793, and energy is 5W * 0.000264s = 0.00132J per batch. Batch 4: AI = 11.6G / 37.1MB = 313 ops/byte, latency = 1.055ms, FPS about 3,793, energy = 0.00527J per batch. Batch 16: AI = 46.4G / 133.1MB = 349 ops/byte, latency = 4.218ms, FPS about 3,793, energy = 0.0211J per batch. All three are compute-bound because AI exceeds the 55 ops/byte ridge point.'
  common_mistake: |
    **The Pitfall:** Assuming throughput scales linearly with batch size without bound.
    **The Rationale:** Ignoring the hardware's specific ridge point where the system transitions from memory-bound to compute-bound.
    **The Consequence:** Overestimating large-batch throughput and failing to understand edge hardware limits.
  napkin_math: |
    **Assumptions & Constraints:**
    - DLA: 11 TOPS INT8, 200 GB/s bandwidth.
    - Model: 2.9 GOPS INT8, 5.1MB weights, ~8MB activation/image.
    - DLA power while active: 5W.
    - DLA Ridge Point = 11 TOPS / 200 GB/s = 55 ops/byte.
    - Treat 1 MB as 1,000,000 bytes for arithmetic intensity.

    **Calculations:**
    - Batch 1 AI = 2.9G ops / (5.1MB + 8MB) = 221 ops/byte (> 55). Latency = 2.9G / 11T = 0.264ms. FPS = 1 / 0.000264 = 3,793. Energy = 5W * 0.000264s = 0.00132J.
    - Batch 4 AI = 11.6G ops / (5.1MB + 32MB) = 313 ops/byte. Latency = 11.6G / 11T = 1.055ms. FPS = 4 / 0.001055 = 3,793. Energy = 5W * 0.001055s = 0.00527J.
    - Batch 16 AI = 46.4G ops / (5.1MB + 128MB) = 349 ops/byte. Latency = 46.4G / 11T = 4.218ms. FPS = 16 / 0.004218 = 3,793. Energy = 5W * 0.004218s = 0.0211J.

    **Conclusion & Interpretation:**
    - **Result: All batch sizes are compute-bound because AI > 55 ops/byte.** Batch latency and energy rise with batch size, while throughput stays near 3,793 FPS on the compute-bound plateau.
