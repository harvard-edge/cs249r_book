title: 'The Orin''s Ridge Point: Roofline Analysis'
scenario: 'You''re evaluating an NVIDIA Jetson AGX Orin for a real-time object detection model in an autonomous vehicle. The spec sheet lists a peak INT8 performance of 275 TOPS and a memory bandwidth of 204.8 GB/s.'
question: 'What is the Jetson AGX Orin''s ridge point from 275 TOPS and 204.8 GB/s, and what does that value represent?'
details:
  realistic_solution: 'The ridge point is the minimum arithmetic intensity (Ops/Byte) a model needs to be compute-bound rather than memory-bound. It''s the point on the roofline graph where the performance ceiling transitions from being limited by memory bandwidth to being limited by peak computational throughput. For the Jetson AGX Orin, an arithmetic intensity above ~1,342 Ops/Byte means the workload is compute-bound.'
  common_mistake: |
    **The Pitfall:** Ignoring units and inverting the formula.
    **The Rationale:** Candidates often confuse Tera- and Giga-, or Gigabytes and Gigabits, leading to answers off by orders of magnitude. They also mistakenly calculate Bytes/Op instead of Ops/Byte.
    **The Consequence:** This fundamentally misunderstands arithmetic intensity and leads to incorrect system bottlenecks being identified.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak Performance: 275 TOPS = 275 * 10^12 Ops/sec.
    - Memory Bandwidth: 204.8 GB/s = 204.8 * 10^9 Bytes/sec.

    **Calculations:**
    - Formula: Ridge Point = Peak Performance / Memory Bandwidth.
    - Calculation: 275,000 / 204.8 = ~1,342.7 Ops/Byte.

    **Conclusion & Interpretation:**
    - **Result: ~1,342 Ops/Byte (Ridge Point)**. Workloads with Arithmetic Intensity below this are memory-bound.
  options:
  - '~168 Ops/Byte'
  - '~1.3 Ops/Byte'
  - '~1,342 Ops/Byte'
  - '~0.74 Bytes/Op'
