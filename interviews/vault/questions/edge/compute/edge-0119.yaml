title: The Thermal Throttling Trap
scenario: 'You are designing the compute module for a delivery drone, which has a sealed, passively-cooled enclosure with a strict thermal design power (TDP) of 15 W. You''re evaluating two edge accelerators: Chip A (Peak 200 TOPS, 4 TOPS/W) and Chip B (Peak 50 TOPS, 10 TOPS/W).'
question: 'How should you determine which accelerator will perform better under the 15 W TDP limit?'
details:
  realistic_solution: 'The performance of a chip in a thermally constrained environment is limited not by its theoretical peak, but by the power it can dissipate. The maximum sustained performance is the product of the thermal budget and the chip''s power efficiency.'
  common_mistake: |
    **The Pitfall:** Fixating on the advertised 'peak TOPS' figure.
    **The Rationale:** Engineers select the chip with the highest number on the datasheet, ignoring the fact that in a thermally-constrained system, the chip will never be able to reach that peak.
    **The Consequence:** Selecting a chip that aggressively thermal throttles in production, resulting in lower actual performance than a highly efficient, lower-peak chip.
  napkin_math: |
    **Assumptions & Constraints:**
    - Thermal budget limit: 15W.

    **Calculations:**
    - Chip A sustained performance: 15W * 4 TOPS/W = 60 TOPS (capped by 15W budget, below its 200 TOPS peak).
    - Chip B sustained performance: 15W * 10 TOPS/W = 150 TOPS theoretically, but capped by its absolute peak of 50 TOPS.
    - Chip A (60 TOPS) > Chip B (50 TOPS).

    **Conclusion & Interpretation:**
    - **Result: Chip A performs better despite Chip B's higher efficiency (Power-Bound)**.
  options:
  - 'Chip A is better, delivering a sustained 60 TOPS, while Chip B only reaches 50 TOPS.'
  - 'Chip B is better because its power efficiency (10 TOPS/W) is 2.5x higher than Chip A''s (4 TOPS/W).'
  - 'Chip A is better because its peak performance (200 TOPS) is 4x higher than Chip B''s (50 TOPS).'
  - 'They perform equally, as both will be limited to 15 TOPS by the 15W thermal budget.'
