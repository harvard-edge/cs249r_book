title: The Perception Pipeline Fusion Fallacy
scenario: 'Your autonomous vehicle perception team is working to hit a strict 33ms per-frame deadline
  on a power-budgeted Jetson AGX Orin platform (60W). Currently, the pipeline runs two separate INT8-quantized
  models sequentially: a 5 TFLOP object detector and an 8 TFLOP segmentation model, taking a combined
  47ms. A teammate proposes fusing these into a single, multi-headed model. The fused model has a shared
  backbone, reducing the total compute to 11 TFLOPs. They argue this will save ~15% of FLOPs and should
  easily get you under the 33ms deadline.'
question: Under what conditions could this optimization paradoxically increase end-to-end latency and
  cause you to miss the deadline even more severely?
details:
  realistic_solution: The proposal is extremely risky because fusion forces the 300MB intermediate tensor
    to be spilled to main memory if it exceeds the L2 cache. While the theoretical transfer time for 600MB
    is only 2.93ms at peak bandwidth, the concurrent read/write traffic during fused execution can thrash
    the cache and stall the compute units. Thus, the condition under which latency paradoxically increases
    is if the L2 cache thrashing degrades compute kernel efficiency so severely that it overshadows the
    15% FLOP reduction, even though the overall pipeline remains theoretically compute-bound (AI = 18,333
    Ops/Byte).
  common_mistake: '**The Pitfall:** Focusing exclusively on FLOP reduction.

    **The Rationale:** Engineers assume that a reduction in total operations automatically translates
    to lower latency, arguing ''11 TFLOPs is faster than 13 TFLOPs''.

    **The Consequence:** This completely ignores the memory subsystem, which is often the real bottleneck.
    Memory stalling leads to massive latency regressions despite lower raw compute operations.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Sequential models: 13 TFLOPs.

    - Fused model FLOPs reduced to 11 TFLOPs.

    - Jetson AGX Orin memory bandwidth = 204.8 GB/s.

    - Fusion creates a 300MB intermediate tensor requiring simultaneous read/write.


    **Calculations:**

    - Intermediate tensor traffic = 300MB read + 300MB write = 600MB.

    - Transfer time = 600MB / 204.8 GB/s = 2.93ms.

    - Arithmetic Intensity = 11 TFLOPs / 600MB = 18,333 Ops/Byte.


    **Conclusion & Interpretation:**

    - **Result: Compute-Bound with Cache Thrashing Risk**. The AI is 18,333 Ops/Byte. The optimization
    would paradoxically increase latency only if the 600MB traffic causes severe L2 cache thrashing that
    degrades the compute kernel''s efficiency, as it is mathematically not memory-bound on VRAM bandwidth
    alone.

    '
