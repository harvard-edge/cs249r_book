title: ViT-Tiny on Jetson Orin GPU vs DLA Placement, Latency, and Energy
scenario: 'You are deploying a custom vision transformer (ViT-Tiny: 5M params, 1.3 GOPS, patch_size=16, seq=196+1, hidden=192, heads=3) for plant disease detection on Jetson Orin (275 TOPS INT8, 60W, DLA 11 TOPS). Assume GPU transformer blocks are memory/scheduling dominated with about 5MB traffic per block at 204.8GB/s, and DLA active power for patch embedding is 2W.'
question: For ViT-Tiny on Jetson Orin, should attention, FFN, and patch embedding run on GPU or DLA, and what latency and energy meet 30 FPS?
details:
  realistic_solution: |
    Attention should run on the GPU because DLA does not support the softmax, gather/scatter, and dynamic attention pattern. Although FFN/linear layers look like FC operations, keep the FFN on the GPU with attention so each transformer block stays on one device; moving activations to the DLA and back inside all 12 blocks would cost more synchronization and transfer overhead than it saves. Patch embedding is a strided convolution, so it can run on the DLA, followed by one DLA-to-GPU activation transfer of about 38KB for the 196x192 patch tokens.

    A coherent deployment is therefore: patch embedding on DLA, one activation handoff, and all 12 attention+FFN blocks plus the classifier on GPU. Patch embedding costs about 57.8M FLOPs, so the DLA compute lower bound is 57.8M / 11 TOPS = 5.3us. The GPU blocks are memory/scheduling dominated: using about 5MB of traffic per block at 204.8GB/s gives 24.4us per block, or 293us for 12 blocks. Add a small single handoff/synchronization allowance, about 50us, for the DLA-to-GPU boundary. End-to-end latency is therefore about 5us + 293us + 50us = 0.35ms, far below the 33.3ms budget for 30 FPS. Energy is roughly 2W*5.3us + 60W*(293us+50us) = 0.011mJ + 20.6mJ, so budget about 21mJ/frame.
  common_mistake: |
    **The Pitfall:** Running ViT on DLA without checking if self-attention is supported.
    **The Rationale:** The DLA's fixed dataflow engine typically only supports CNNs and simple FC layers, not irregular data access patterns like self-attention.
    **The Consequence:** Execution failure or severe performance degradation.
  napkin_math: |
    **Assumptions & Constraints:**
    - ViT-Tiny on Jetson Orin.
    - 275 TOPS INT8 GPU, 11 TOPS DLA.
    - Attention is GPU-only; DLA supports patch embedding conv.
    - Use one DLA-to-GPU activation handoff after patch embedding, not per block.

    **Calculations:**
    - Patch embed as a conv: 14 * 14 output positions, 192 output channels, and a 16 * 16 * 3 dot product per output. FLOPs = 2 * 14 * 14 * 192 * 16 * 16 * 3 = 57.8M. Time = 57.8M / 11 TOPS = 5.25us.
    - Patch token output transfer: 196 * 192 INT8 values ≈ 37.6KB. Bandwidth time is tiny, but include ~50us for device handoff and synchronization.
    - GPU Attention+FFN traffic estimate: ~5MB per block. Bandwidth bound = 5MB / 204.8 GB/s = 24.4us per block.
    - 12 GPU blocks: 12 * 24.4us = 293us = 0.293ms.
    - Total latency ≈ 5.25us DLA + 50us handoff + 293us GPU = 348us = 0.35ms.
    - Energy: DLA ≈ 2W * 5.25us = 10.5uJ. GPU/handoff window ≈ 60W * (293us + 50us) = 20.6mJ.

    **Conclusion & Interpretation:**
    - **Result: GPU for attention and FFN, DLA only for patch embedding if the single handoff is acceptable.** Estimated latency is about 0.35ms and energy is about 21mJ/frame, comfortably meeting the 30 FPS target.
