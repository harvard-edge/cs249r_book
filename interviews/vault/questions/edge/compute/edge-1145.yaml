title: 'Edge Systolic Array Specification: Design Tile Size for Edge DLA'
scenario: 'Specify the tile size for processing a 3x3 convolution (128 channels in, 256 channels out, 28x28 feature map, INT8) on Jetson Orin DLA (2 cores, 5.5 TOPS INT8 each, 3MB SRAM per core). Ensure tiles fit in SRAM, minimize memory re-reads, and achieve maximum DLA utilization.'
question: 'What tile size should you use for the 128-to-256 3x3 conv on Orin DLA, and do the exact SRAM byte counts fit in 3MB per core?'
details:
  realistic_solution: 'Process full feature map in one pass per core. Core split: one core does Cout=0..127, other does 128..255. Each fits easily into SRAM.'
  common_mistake: 'Choosing tile sizes that do not account for the filter support region overlap (halos) required for valid convolution output, leading to incorrect results at tile boundaries.'
  napkin_math: |
    **Assumptions & Constraints:**
    - 3x3 Conv: 128 Cin, 256 Cout, 28x28 INT8 map.
    - Orin DLA: 2 cores, 3MB SRAM per core.

    **Calculations:**
    - Weights: 128 * 256 * 9 = 294,912 bytes (~288 KB).
    - Input map (with 2-pad): 128 * 30 * 30 = 115,200 bytes (~115 KB).
    - Output map: 256 * 28 * 28 = 200,704 bytes (~200 KB).
    - Total SRAM usage if not tiled: 288 KB + 115 KB + 200 KB = 603 KB.

    **Conclusion & Interpretation:**
    - **Result: 603 KB Total SRAM (Memory-Capacity-Bound)**. The entire operation fits comfortably within the 3MB core SRAM, eliminating the need for complex tiling.
