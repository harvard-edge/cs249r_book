title: Design Continuous Batching for Edge LLM Serving on Hailo-8
scenario: A Hailo-8 edge server handles LLM requests at 2 req/s (Poisson). Each request requires 532ms of service time.
question: For the Hailo-8 continuous batching queue, should P99 be estimated from waiting time Wq or total sojourn time W?
details:
  realistic_solution: P99 latency must be estimated using the total sojourn time (W), which encompasses both the queue waiting time (Wq) and the actual service/execution time (1/μ). Utilizing continuous batching ensures new requests are injected into the batch stream at token boundaries, improving hardware utilization, but the P99 SLA is governed by the entire lifecycle of the request inside the system.
  common_mistake: |
    **The Pitfall:** Estimating P99 latency strictly from the queue waiting time (Wq).
    **The Rationale:** Assuming that once a request begins execution, the latency is negligible, ignoring the heavy half-second service time of the LLM.
    **The Consequence:** Promising an impossibly tight latency SLA that fails instantly in production because it omitted 532ms of baseline compute.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival rate: 2 req/s (Poisson). Service time: 532ms per request.

    **Calculations:**
    - Mean Sojourn Time (W): Wq + Service Time.
    - P99 approximation: P99 ≈ 4.6 * W (assuming exponential decay tail).

    **Conclusion & Interpretation:**
    - **Result: W must be used (Compute-Bound)**. W must be used because omitting the massive 532ms service time invalidates the latency model.
