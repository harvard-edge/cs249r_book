title: Realize Systolic Array Output-Stationary Tiling on Hailo-8
scenario: You must implement a matrix multiply on a dataflow accelerator using output-stationary dataflow where partial sums accumulate in-place. The operation is W [512x256] x X [256x128] = Y [512x128]. The accelerator has 13 TOPS and 2MB on-chip SRAM. With 1MB reserved for weights and activations, you have 1MB for partial sums.
question: What output-stationary tiling strategy fits W[512x256] x X[256x128] on the accelerator, and what is the total SRAM traffic?
details:
  realistic_solution: Output tile Y_tile must fit in 1MB SRAM. The entire output Y is 512x128 = 65,536 elements. In FP32 accumulation, this is 256KB. Because 256KB < 1MB, the full output fits in SRAM simultaneously. Stream X in chunks that fit with weights. The entire operation requires only 1 tile. Single-tile output-stationary avoids any re-reads of Y.
  common_mistake: |
    **The Pitfall:** Arbitrarily picking smaller tile sizes to maximize compute unit utilization.
    **The Rationale:** Candidates mathematically slice the matrix without checking if the full output simply fits in SRAM.
    **The Consequence:** Unnecessary loop overhead and data movement logic, reducing execution efficiency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Output Y dimensions: 512 x 128 elements. FP32 accumulation.
    - On-chip SRAM budget: 2MB (1MB available for partial sums).
    - Weight W dimensions: 512 x 256. Input X dimensions: 256 x 128. INT8 format.

    **Calculations:**
    - Output Memory (Y): 512 * 128 * 4 bytes (FP32) = 262,144 bytes = 256 KB.
    - Input Memory (X): 256 * 128 * 1 byte (INT8) = 32 KB.
    - Weight Memory (W): 512 * 256 * 1 byte (INT8) = 131,072 bytes = 128 KB.
    - Total On-Chip Check: 256 KB + 32 KB + 128 KB = 416 KB.

    **Conclusion & Interpretation:**
    - **Result: 416 KB (Memory-Bound)**. The 416 KB footprint fits comfortably inside the 2MB SRAM. Single-tile output-stationary avoids any complex tiling overhead.
