title: Analyze Prefill vs Decode Cost Split on Jetson Orin
scenario: A Jetson Orin NX runs a 7B parameter language model in INT4 (3.5GB model size). A typical request has 512 prompt tokens (prefill) and generates 128 output tokens (decode). Assume 100 TOPS peak compute, 64 GB/s memory bandwidth, 32 layers, hidden size 4096, and INT8 KV cache.
question: How do prefill and decode times split for a 7B INT4 model on Orin NX with a 512-token prompt and 128-token response, and why?
details:
  realistic_solution: Prefill has high arithmetic intensity because the 512 prompt tokens are processed as a batch-like matrix operation, so the peak-compute lower bound is about 72 ms. Decode is sequential, but it should not be modeled as rereading the entire 3.5GB model once per generated token. With weights resident in unified accelerator memory, the incremental bottleneck is the per-token matmul work plus KV-cache reads and writes. For a 128-token response starting from a 512-token prompt, the INT8 KV traffic is about 19.3 GB, or about 302 ms at 64 GB/s, plus about 18 ms of peak decode compute. Decode is still the larger phase, but the defensible split is roughly 72 ms prefill versus 320 ms decode, not an unsupported 7-second decode estimate.
  common_mistake: |
    **The Pitfall:** Treating prefill and decode as having the same per-token cost.
    **The Rationale:** Candidates fail to realize prefill processes all tokens in parallel while decode is sequential.
    **The Consequence:** Incorrectly assessing the pipeline bottleneck and failing to apply KV caching or speculative decoding optimizations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 7B params (INT4 = 3.5GB).
    - Orin NX: 100 TOPS, 64 GB/s bandwidth.
    - Request: 512 prefill, 128 decode.
    - KV shape: 32 layers, hidden=4096, INT8 KV.
    - Decode assumption: weights are resident; per-token traffic is KV read/write plus arithmetic.

    **Calculations:**
    - Prefill compute lower bound: (2 * 7B * 512) / 100 TOPS = 71.7 ms.
    - Decode compute lower bound: 128 * (2 * 7B) / 100 TOPS = 17.9 ms.
    - INT8 KV bytes per token in cache: 2 * 32 * 4096 * 1 byte = 262,144 bytes.
    - Average decode context read: (512 + 639) / 2 = 575.5 tokens.
    - KV traffic per decode token: 262,144 * (575.5 reads + 1 write) = 151 MB.
    - Total KV traffic: 151 MB * 128 = 19.3 GB.
    - KV bandwidth time: 19.3 GB / 64 GB/s = 302 ms.
    - Total decode lower-bound estimate: 302 ms + 17.9 ms = about 320 ms.

    **Conclusion & Interpretation:**
    - **Result: prefill is about 72 ms and decode is about 320 ms under this KV-aware model.** Decode dominates because it is sequential and KV-bandwidth-heavy, not because the full 3.5GB model is fetched once per generated token.
