title: Edge Autoregressive Bandwidth
scenario: A local assistant uses a 10B parameter model in INT8 on a Jetson AGX Orin.
question: Explain how to estimate the minimum memory bandwidth required to generate 15 tokens per second for a single user.
details:
  realistic_solution: 'In autoregressive generation at batch size 1, memory bandwidth is the absolute bottleneck. A 10B parameter model in INT8 requires 10GB of memory. Generating 15 tokens per second means streaming those weights 15 times per second, requiring roughly 150 GB/s of bandwidth.'
  common_mistake: |
    **The Pitfall:** Calculating raw compute FLOPS for autoregressive decoding.
    **The Rationale:** Candidates apply prefill-phase compute-bound logic to the decoding phase, which is strictly limited by memory bandwidth at batch size 1.
    **The Consequence:** Over-provisioning compute TOPS while ignoring the memory bus width, resulting in unacceptable token generation latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10B parameter model in INT8 (10 GB)
    - Autoregressive generation at batch size 1
    - Target: 15 tokens/sec

    **Calculations:**
    - Bandwidth required = 10 GB * 15 tokens/sec = 150 GB/s
    - Orin max bandwidth = 204.8 GB/s

    **Conclusion & Interpretation:**
    - **Result: 150 GB/s (Memory-Bound)**. Autoregressive decoding is strictly memory bandwidth limited.
