title: Roofline Optimization on Qualcomm Cloud AI 100
scenario: Your team is deploying a vision transformer for real-time defect detection on an on-premise edge appliance equipped with a Qualcomm Cloud AI 100 accelerator. The hardware features 400 TOPS of INT8 compute, a 75W power envelope, and 32 GB of LPDDR4x memory providing roughly 136 GB/s of bandwidth. The quantized model requires 150 GOPS per inference and has an arithmetic intensity of 200 OPS/byte.
question: Using roofline analysis on Cloud AI 100, is the 150 GOPS ViT memory-bound or compute-bound, and should you prioritize pruning or batching?
details:
  realistic_solution: The candidate should calculate the hardware ridge point and compare it to the model's arithmetic intensity to identify the bottleneck. Because the model is heavily memory-bound on this specific hardware, pruning compute will yield no throughput gains. The optimal strategy is dynamic batching, which increases weight reuse, raises the effective arithmetic intensity, and moves the workload closer to the compute-bound region of the roofline.
  common_mistake: |
    **The Pitfall:** Immediately proposing INT4 quantization or structural pruning.
    **The Rationale:** Candidates see the massive 400 TOPS figure and assume the workload will be compute-bound, missing the severe compute-to-bandwidth imbalance.
    **The Consequence:** Pruning compute yields zero throughput gains because the system is starved for memory bandwidth.
  napkin_math: |
    1. Assumptions & Constraints:
       - Peak Compute: 400 TOPS (INT8)
       - Peak Bandwidth: 136 GB/s
       - Model Arithmetic Intensity: 200 OPS/byte
       - Compute requirement: 150 GOPS
    2. Calculations:
       - Hardware Ridge Point = 400,000 GOPS / 136 GB/s = 2941 OPS/byte
       - Max Achievable Performance = 200 OPS/byte * 136 GB/s = 27,200 GOPS (27.2 TOPS)
       - Expected Utilization = 27.2 TOPS / 400 TOPS = 6.8%
    3. Conclusion & Interpretation:
       - **Result: Memory-Bound. Since 200 << 2941, the workload is strictly memory-bound, meaning pruning compute yields no gains and batching is required.**
