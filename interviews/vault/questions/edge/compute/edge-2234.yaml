title: Interposer vs Package-on-Package for Edge Chiplets
scenario: >-
  Compare silicon interposer and package-on-package (PoP) stacking for integrating a mobile ML accelerator chiplet with DRAM.
question: Which packaging technology is preferable for a wearable device targeting sub-300mW?
details:
  realistic_solution: PoP stacking places DRAM directly above the logic die and is widely used in smartphone SoCs. At wearable power budgets, PoP bandwidth (~50 GB/s) is sufficient for sub-100 TOPS inference. Silicon interposer (500+ GB/s) is massively over-provisioned and adds significant package power overhead.
  common_mistake: |
    **The Pitfall:** Defaulting to a silicon interposer because it offers higher bandwidth.
    **The Rationale:** Candidates assume "more bandwidth is always better" without considering the severe power and cost constraints of a wearable form factor.
    **The Consequence:** Specifying an over-provisioned, prohibitively expensive (CoWoS), and power-hungry package that destroys the 300mW device thermal budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Power limit: Sub-300mW wearable budget.
    - ML workload: 10-20 TOPS INT8 requiring ~20 GB/s bandwidth.

    **Calculations:**
    - PoP package: ~50 GB/s bandwidth, ~5mW interface power.
    - Interposer: 500+ GB/s bandwidth, ~50mW interface power.
    - Power savings: 50mW - 5mW = 45mW.

    **Conclusion & Interpretation:**
    - **Result: 45mW Savings (Power-Bound).** PoP stacking securely provides 2.5x the required bandwidth while saving 45mW, which is critical for a tight 300mW wearable envelope.
