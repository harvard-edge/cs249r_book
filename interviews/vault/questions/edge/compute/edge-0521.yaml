title: 'The Self-Driving Stall: Diagnosing a Memory-Bound Vision Transformer'
scenario: You are an ML Systems Engineer at an automotive company designing a driver-monitoring system on an edge NPU. Your prototype uses a large Vision Transformer (ViT) model, but profiling shows its inference latency is 45ms, badly missing your 30ms real-time deadline. The built-in profiler reports that GPU core utilization is only 25%, but the memory controller load is consistently near 100% during inference.
question: Why is the ViT missing the 30ms deadline with 25% GPU utilization but near-100% memory-controller load on the edge device?
details:
  realistic_solution: Use the Roofline model to diagnose the bottleneck. Calculate the ViT's Arithmetic Intensity (AI) and compare it with the hardware ridge point. Because the AI is far below the ridge point, memory bandwidth sets the throughput limit; the low GPU utilization is a symptom of the accelerator waiting on memory traffic rather than lacking peak TOPS.
  common_mistake: |
    **The Pitfall:** Fixating on peak GFLOPs and incorrectly diagnosing the problem as compute-bound.
    **The Rationale:** Engineers see the ViT has 32x more operations than a MobileNet and assume more compute power is the solution, ignoring the clear evidence of high memory controller load.
    **The Consequence:** The team wastes time deploying a more powerful GPU, only to find the ViT is still starved for memory bandwidth, yielding zero latency improvement.
  napkin_math: |
    **Assumptions & Constraints:**
    - ViT Data: 8 GB. ViT Compute: 0.8 TOPS (800 GOPS).
    - Hardware capability: 275 TOPS compute, 204.8 GB/s memory bandwidth.

    **Calculations:**
    - Arithmetic Intensity (AI) = 0.8e12 / 8e9 = 100 Ops/Byte.
    - Hardware Ridge Point = 275 TOPS / 204.8 GB/s = ~1342 Ops/Byte.
    - Transfer time = 8 GB / 204.8 GB/s = ~39.06 ms.
    - Compute time = 0.8e12 / 275e12 = ~2.91 ms.

    **Conclusion & Interpretation:**
    - **Result: 100 Ops/Byte (Memory-Bound)**. Since 100 Ops/Byte << 1342 Ops/Byte, the Roofline limit is memory bandwidth. The idealized transfer lower bound is ~39ms, already above the 30ms deadline and close to the 45ms observed latency after overheads, so adding more compute would not fix the miss.
  options:
    - The ViT has too many operations for the hardware, making it compute-bound; switching to a smaller CNN would solve the issue because peak TOPS is the limiting resource.
    - The low GPU utilization indicates a CPU bottleneck in the data preprocessing pipeline; the model choice is irrelevant until the data loading is fixed.
    - The ViT is memory-bound, confirmed by its low Arithmetic Intensity (100 Ops/Byte) versus the ~1342 Ops/Byte ridge point; a replacement model must reduce memory traffic or increase locality, not just reduce FLOPs.
    - Both models are memory-bound, but the MobileNet has a lower Arithmetic Intensity (~17 Ops/Byte), which means it will be even more memory-bound and thus slower than the ViT.
  correct_index: 2
