title: 'Estimating Maximum Throughput on Qualcomm Cloud AI 100'
scenario: 'Your team is evaluating the Qualcomm Cloud AI 100 as an on-premise inference accelerator for a high-throughput computer vision pipeline. The accelerator provides 400 TOPS of INT8 compute at a 75W TDP, with 32 GB of LPDDR4x memory.'
question: 'For an 8 GOPS INT8 ResNet-50 on the 400 TOPS, 75W Cloud AI 100, what are the compute-bound max FPS and inferences per watt?'
details:
  realistic_solution: 'The candidate should correctly identify the provided compute capability (400 TOPS) and the model requirement (8 GOPS). By dividing the total available operations by the operations required per frame, they can find the theoretical max throughput. Finally, dividing the maximum throughput by the 75W TDP yields the power efficiency metric.'
  common_mistake: 'Candidates often confuse TOPS (Tera Operations Per Second) with TFLOPS or fail to correctly align the operation types. Additionally, they may forget to convert between Tera (10^12) and Giga (10^9), leading to calculations being off by three orders of magnitude.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Compute: 400 TOPS = 400,000 GOPS.
    - Model Cost: 8 GOPS/frame.
    - TDP: 75W.

    **Calculations:**
    - Theoretical Max Throughput: 400,000 GOPS / 8 GOPS/frame = 50,000 frames per second (FPS).
    - Energy Efficiency: 50,000 FPS / 75W = 666.67 inferences per watt.

    **Conclusion & Interpretation:**
    - **Result: 50,000 FPS (Compute-Bound)**. 666.67 inferences per watt demonstrates the high efficiency of the accelerator.
