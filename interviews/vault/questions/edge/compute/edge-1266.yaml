title: Architecting a Real-Time Vision Pipeline on Jetson Orin
scenario: You are tasked with designing a real-time multi-camera perception system for an autonomous guided vehicle using an NVIDIA Jetson Orin. The system must process four 4K camera streams at 30 FPS, running object detection and semantic segmentation.
question: How would you partition object detection and segmentation across Jetson Orin's Ampere GPU and DLA while managing 32 GB LPDDR5 bandwidth and the 60W TDP?
details:
  realistic_solution: The optimal design first profiles both networks and partitions by operator support, not by a fixed TOPS split. Compile the object detector, or the detector subgraphs made of DLA-supported convolutions, activations, pooling, and elementwise layers, onto the DLA. Keep unsupported detector layers, segmentation layers with custom ops, resize/argmax/post-processing, and dynamic tensor operations on the Ampere GPU. Use zero-copy DMA buffers and TensorRT engines with explicit GPU/DLA placement so the DLA saves power on supported dense subgraphs without forcing expensive tensor shuttling or unsupported fallback paths.
  common_mistake: |
    **The Pitfall:** Defaulting to running all neural network inference on the Ampere GPU.
    **The Rationale:** Candidates are familiar with standard GPUs but ignore the Deep Learning Accelerator (DLA), leading to underutilization of the total 275 TOPS compute pool.
    **The Consequence:** The system bottlenecks on the GPU or exceeds the 60W TDP by running the GPU at maximum clock states, while the DLA sits completely idle.
  napkin_math: |
    **Assumptions & Constraints:**
    - Raw video: 4 cameras * 3840 * 2160 pixels * 3 bytes (RGB) * 30 FPS.
    - Example compute demand: object detection = 0.20 TOPS per stream, segmentation = 0.30 TOPS per stream at 30 FPS.
    - Hardware limits: 275 TOPS INT8 total, 60W TDP limit.

    **Calculations:**
    - Raw video bandwidth: 4 * 3840 * 2160 * 3 * 30 = ~2.98 GB/s.
    - Detection demand: 4 * 0.20 TOPS = 0.80 TOPS sustained, but only DLA-supported layers should be assigned to DLA.
    - Segmentation demand: 4 * 0.30 TOPS = 1.20 TOPS sustained, typically kept on GPU because segmentation models often include unsupported ops, layout changes, and post-processing.
    - If 80% of detector compute compiles cleanly to DLA, DLA load is 0.64 TOPS and GPU load is 1.20 TOPS + 0.16 TOPS fallback = 1.36 TOPS plus preprocessing/post-processing.

    **Conclusion & Interpretation:**
    - **Result: Constraint-based GPU/DLA partition, not a guaranteed 50/50 split.** The raw camera bandwidth is modest, but power and latency depend on zero-copy buffers, DLA operator coverage, fallback costs, and measured TensorRT engine placement.
