title: Scaling Video Analytics on Qualcomm Cloud AI 100
scenario: >-
  Your team is deploying an industrial defect detection pipeline across a manufacturing facility with 500 high-resolution camera streams. You have selected the Qualcomm Cloud AI 100 as your on-premise inference accelerator. The computer vision model requires 150 GOPS per frame, and each stream runs at 30 FPS.
question: How many accelerators are needed for 500 streams at 150 GOPS and 30 FPS, and what is the peak power draw?
details:
  realistic_solution: A strong L5 candidate will derate the theoretical 400 TOPS to a realistic effective throughput (e.g., 25% utilization) due to LPDDR4x memory bandwidth constraints. They will calculate the total TOPS required per stream, divide the effective accelerator capacity by this requirement to find streams per card, and then compute the total number of cards and power budget. They will also verify that the 32 GB memory is sufficient for the required batch sizes.
  common_mistake: |
    **The Pitfall:** Assuming 100% utilization of the advertised 400 TOPS.
    **The Rationale:** Candidates take peak theoretical numbers at face value without considering the memory bandwidth limitations of LPDDR4x.
    **The Consequence:** Results in a massive underestimation of required hardware (estimating ~6 cards instead of 23) and fails to account for the true facility power load.
  napkin_math: |
    **Assumptions & Constraints:**
    - Camera streams: 500 streams at 30 FPS.
    - Model compute: 150 GOPS per frame.
    - Hardware: Qualcomm Cloud AI 100 (400 TOPS INT8, 75W).
    - Effective utilization: 25% due to memory constraints.

    **Calculations:**
    - Compute per stream: 150 GOPS * 30 = 4,500 GOPS (4.5 TOPS).
    - Total compute required: 500 * 4.5 = 2,250 TOPS.
    - Effective hardware capacity per card: 400 TOPS * 0.25 = 100 TOPS.
    - Cards needed: 2,250 TOPS / 100 TOPS = 22.5 (round up to 23 cards).
    - Peak power draw: 23 cards * 75W = 1,725 Watts.

    **Conclusion & Interpretation:**
    - **Result: 23 cards (Memory-Bound).** Applying a realistic 25% utilization derating factor correctly estimates the need for 23 cards, requiring 1.7kW of facility power.
