title: 'Edge Systolic Array Fluency: Roofline Model Mental Math for Jetson'
scenario: 'You are estimating from memory whether specific matrix operations on an edge device (275 TOPS INT8, 102.4GB/s LPDDR5) are memory or compute bound. The operations are: (1) MatMul (512, 512) x (512, 512) INT8 at batch=1, (2) EfficientNet-B7 (37G FLOPs, 66M params INT8) at batch=8, and (3) Dot product of two 1M-element INT8 vectors.'
question: For the three Jetson Orin operations, are they memory or compute bound and what limiting throughput or latency do you estimate?
details:
  realistic_solution: 'Jetson Orin ridge: 275 TOPS / 102.4 GB/s = 2686 FLOPs/byte. (1) GEMM 512x512 INT8 has FLOPs = 2*512^3 = 268M and compulsory bytes for A, B, and C of about 3*512^2 = 786KB if each matrix is moved once. AI = 341 FLOPs/byte, below the ridge, so the roofline lower bound is memory time: 786KB / 102.4GB/s = 7.7us. Compute time would be 1.0us, so memory limits it under this pessimistic traffic model. (2) EfficientNet-B7 at batch=8 has 296G FLOPs and roughly 116MB of weights plus activations, so AI = 2551 FLOPs/byte, close to but below the ridge; the memory lower bound is about 1.13ms per batch, or 141us/image, with compute time about 1.08ms. (3) A 1M INT8 dot product has 2M FLOPs and reads two 1MB vectors, AI = 1 FLOP/byte, so it is strongly memory-bound with a lower-bound latency of 19.5us.'
  common_mistake: |
    **The Pitfall:** Not memorizing that for GEMM, the arithmetic intensity scales as N/3 for square NxN matrices.
    **The Rationale:** Candidates try to calculate the exact FLOPs and bytes for every operation instead of using fast mental heuristics.
    **The Consequence:** They spend too much time calculating and cannot quickly classify operations as memory or compute bound during profiling.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin ridge point: 275 TOPS / 102.4 GB/s = 2686 FLOPs/byte.

    **Calculations:**
    - (1) GEMM 512x512: FLOPs = 2 * 512^3 = 268M. Bytes moved ≈ A + B + C = 3 * 512^2 INT8 bytes = 786KB. AI = 268M / 786K = 341 FLOPs/byte. Memory lower bound = 786KB / 102.4GB/s = 7.7us; compute lower bound = 268M / 275 TOPS = 1.0us.
    - (2) EfficientNet-B7 (batch=8): FLOPs = 37G * 8 = 296G. Bytes ≈ 66MB weights + 50MB activations = 116MB. AI = 296G / 116M = 2551 FLOPs/byte. Memory lower bound = 116MB / 102.4 GB/s = 1.13ms; compute lower bound = 296G / 275 TOPS = 1.08ms.
    - (3) Dot product (1M INT8): FLOPs = 2M. Bytes ≈ two input vectors = 2MB, ignoring the scalar output write. AI = 2M / 2M = 1.0 FLOP/byte. Memory lower bound = 2MB / 102.4 GB/s = 19.5us; compute lower bound = 2M / 275 TOPS = 0.007us.

    **Conclusion & Interpretation:**
    - **Result: all three are below the ridge under these traffic assumptions.** GEMM and EfficientNet-B7 are memory-bound by the roofline model, with EfficientNet-B7 close to balanced; the dot product is overwhelmingly memory-bound.
