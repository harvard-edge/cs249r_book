title: 'Edge Systolic Array Fluency: Roofline Model Mental Math for Jetson'
scenario: 'You are estimating from memory whether specific matrix operations on an edge device (275 TOPS INT8, 102.4GB/s LPDDR5) are memory or compute bound. The operations are: (1) MatMul (512, 512) x (512, 512) INT8 at batch=1, (2) EfficientNet-B7 (37G FLOPs, 66M params INT8) at batch=8, and (3) Dot product of two 1M-element INT8 vectors.'
question: 'For the three Jetson Orin operations, are they memory or compute bound and what limiting throughput or latency do you estimate?'
details:
  realistic_solution: 'Jetson Orin ridge: 275T/102.4G = 2686 FLOPs/byte. (1) GEMM 512^3: AI = 512^3*2 / (3*512^2*1) = 2*512/3 = 341 FLOPs/byte. AI=341 < 2686 → memory bound. Time = 3*512^2*1 / 102.4G = 786K/102.4G = 7.7μs. Throughput = 1/7.7μs = 130K mat/s. (2) EfficientNet-B7 batch=8: FLOPs=37G*8=296G. Bytes=weights(66MB)+activations(~50MB)=116MB. AI=296G/116M=2551. Close to ridge but slightly memory bound. Time = 116MB/102.4GB/s = 1.13ms for 8 images = 141μs/img. (3) Dot product 1M INT8: FLOPs=2M. Bytes=2*1M=2MB. AI=2M/2M=1 FLOPs/byte. Heavily memory bound. Time=2MB/102.4GB/s=19.5μs.'
  common_mistake: |
    **The Pitfall:** Not memorizing that for GEMM, the arithmetic intensity scales as N/3 for square NxN matrices.
    **The Rationale:** Candidates try to calculate the exact FLOPs and bytes for every operation instead of using fast mental heuristics.
    **The Consequence:** They spend too much time calculating and cannot quickly classify operations as memory or compute bound during profiling.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin ridge point: 275 TOPS / 102.4 GB/s = 2686 FLOPs/byte.

    **Calculations:**
    - (1) GEMM 512x512: Arithmetic Intensity (AI) = $2N/3 = 2(512)/3 = 341$ FLOPs/byte. Time = $3 \times 512^2 \times 1 / 102.4\text{GB/s} = 7.7\mu\text{s}$.
    - (2) EfficientNet-B7 (batch=8): FLOPs = 37G × 8 = 296G. Bytes = 66MB + 50MB = 116MB. AI = 296G / 116M = 2551. Time = 116MB / 102.4 GB/s = 1.13ms.
    - (3) Dot product (1M INT8): FLOPs = 2M. Bytes = 2MB. AI = 1.0. Time = 2MB / 102.4 GB/s = 19.5$\mu$s.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound**. All three operations fall below the 2686 FLOPs/byte ridge point, with the dot product being heavily memory-bound.
