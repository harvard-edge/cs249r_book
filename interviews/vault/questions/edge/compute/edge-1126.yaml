title: 'Edge Systolic Array Analyze: Why Hailo-8 Dataflow Wins for Computer Vision'
scenario: 'Inference architectures for MobileNetV2 (0.3 GOPS INT8, 3.4M params) at batch=1 are evaluated. The comparison is between a conventional edge GPU (60W, 102.4 GB/s) that writes intermediate activations to LPDDR5 and a Hailo-8 dataflow accelerator (2.5W) that keeps activations on its 6MB SRAM.'
question: 'Why does the Hailo-8 architecture achieve significantly better energy efficiency than the GPU for this workload, and how much DRAM traffic is avoided?'
details:
  realistic_solution: |
    Hailo-8 architecture: 26 TOPS INT8, on-chip SRAM ~6MB, dataflow processes entire CNN without going to external DRAM for intermediate activations. MobileNetV2: 3.4M params = 3.4MB INT8. Computation: 0.3 GOPS. On conventional GPU (e.g., Jetson at 60W): each layer's activations written to LPDDR5 and read back: for MobileNetV2 ~28 layer transitions * 0.5MB avg activation = 14MB * 2 (read+write) = 28MB DRAM per inference. At 102.4GB/s: 273µs. Compute: 0.3G / 275 TOPS = 1.1µs. Memory-bound. Hailo-8: all activations stay on 6MB SRAM. DRAM only for weights (once) and input/output. Energy: Hailo 2.5W vs Jetson 60W = 24x less power.
  common_mistake: |
    **The Pitfall:** Attributing Hailo-8 efficiency entirely to its low power draw.
    **The Rationale:** Candidates often see the 2.5W spec and stop there, without understanding the architectural reason.
    **The Consequence:** Failing to recognize that the dataflow architecture eliminates external memory accesses by keeping activations on-chip through the entire convolution chain.
  napkin_math: |
    **Assumptions & Constraints:**
    - Activation memory per layer: ~0.5 MB average.
    - GPU Power: 60 W. Hailo-8 Power: 2.5 W.
    - MobileNetV2 Layers: 28. INT8 Compute: 0.3 GOPS.

    **Calculations:**
    - GPU DRAM Traffic: 28 layers * 0.5 MB * 2 = 28 MB.
    - GPU DRAM Time: 28 MB / 102.4 GB/s = 273 µs. Total Time ≈ 274 µs.
    - GPU Energy: 60 W * 274 µs = 16.4 mJ.
    - Hailo-8 DRAM Traffic: Weights + I/O = 4.06 MB. Total Time ≈ 68 µs.
    - Hailo-8 Energy: 2.5 W * 68 µs = 0.17 mJ.
    - Energy Ratio: 16.4 / 0.17 = ~96x.

    **Conclusion & Interpretation:**
    - **Result: ~96x better energy efficiency (Power-Bound).** The dataflow architecture drastically cuts power consumption by eliminating external memory accesses for intermediate activations.
