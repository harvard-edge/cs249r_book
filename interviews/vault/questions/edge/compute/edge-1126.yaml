title: 'Edge Systolic Array Analyze: Why Hailo-8 Dataflow Wins for Computer Vision'
scenario: Inference architectures for MobileNetV2 (0.3 GOPS INT8, 3.4M params) at batch=1 are evaluated. The comparison is between a conventional edge GPU (60W, 102.4 GB/s) that writes intermediate activations to LPDDR5 and a Hailo-8 dataflow accelerator (2.5W) that keeps activations on its 6MB SRAM.
question: Why does the Hailo-8 architecture achieve significantly better energy efficiency than the GPU for this workload, and how much DRAM traffic is avoided?
details:
  realistic_solution: |
    Hailo-8 is more energy efficient for this workload because the dataflow schedule keeps intermediate activations in on-chip SRAM instead of writing each layer boundary to LPDDR5 and reading it back. Using the stated model, a conventional GPU moves about 28 MB of intermediate activation traffic per inference: 28 layer transitions * 0.5 MB * 2 for write plus read. Hailo-8 avoids that 28 MB/inference; after weights are loaded, per-inference DRAM traffic is mostly input/output, about 0.16 MB for a 224x224 RGB INT8 input plus small outputs. Separately, the power envelope is 60W versus 2.5W, a 24x power difference, but the architectural reason is the avoided external activation traffic.
  common_mistake: |
    **The Pitfall:** Attributing Hailo-8 efficiency entirely to its low power draw.
    **The Rationale:** Candidates often see the 2.5W spec and stop there, without understanding the architectural reason.
    **The Consequence:** Failing to recognize that the dataflow architecture eliminates external memory accesses by keeping activations on-chip through the entire convolution chain.
  napkin_math: |
    **Assumptions & Constraints:**
    - Activation memory per layer transition: ~0.5 MB average.
    - Input/output DRAM traffic on Hailo-8 after weights are resident: ~0.16 MB per inference.
    - GPU Power: 60 W. Hailo-8 Power: 2.5 W.
    - MobileNetV2 Layers: 28. INT8 Compute: 0.3 GOPS.

    **Calculations:**
    - GPU intermediate activation DRAM traffic: 28 layer transitions * 0.5 MB * 2 = 28 MB per inference.
    - GPU DRAM time for intermediate activations: 28 MB / 102.4 GB/s = 273 µs.
    - GPU illustrative energy during that transfer-bound interval: 60 W * 273 µs = 16.4 mJ.
    - Hailo-8 avoided DRAM traffic: about 28 MB per inference.
    - Hailo-8 remaining per-inference DRAM traffic after resident weights: ~0.16 MB input/output.
    - Hailo-8 compute time lower bound: 0.3 GOPS / 26,000 GOPS/s = 11.5 µs.
    - Hailo-8 illustrative compute energy: 2.5 W * 11.5 µs = 0.029 mJ.
    - Power ratio: 60 W / 2.5 W = 24x.

    **Conclusion & Interpretation:**
    - **Result: ~28 MB DRAM Traffic Avoided per Inference.** The dataflow architecture improves energy efficiency by eliminating intermediate activation trips to external DRAM, in addition to operating at a 24x lower power envelope.
