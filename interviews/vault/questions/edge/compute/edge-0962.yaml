title: Graceful Degradation Under Thermal Throttling
scenario: An outdoor Orin reaches 85°C. To prevent hardware damage, thermal throttling drops compute from
  275 TOPS to 100 TOPS. The multi-modal pipeline needs 120 TOPS at 30 FPS.
question: When Orin throttles to 100 TOPS but the pipeline needs 120 TOPS at 30 FPS, how should it gracefully
  degrade?
details:
  realistic_solution: Under strict thermal throttling to 100 TOPS, the hardware cannot support the full
    120 TOPS. Even after dropping auxiliary models (which saves 18 TOPS), the vision pipeline still requires
    102 TOPS, exceeding the limit. The system must degrade the frame rate slightly (e.g., to 29 FPS) while
    disabling non-critical models to safely stay within the 100 TOPS budget and maintain deterministic
    collision avoidance.
  common_mistake: '**The Pitfall:** Allowing the OS to natively stall the CUDA kernels unpredictably.

    **The Rationale:** This leads to non-deterministic frame drops rather than controlled system behavior.

    **The Consequence:** Unpredictable latency spikes and potential safety failures in autonomous navigation.'
  napkin_math: '**Assumptions & Constraints:**

    - Required compute: 120 TOPS at 30 FPS.

    - Throttled limit: 100 TOPS.

    - Aux models: 0.6 TOPS/frame (18 TOPS at 30 FPS).


    **Calculations:**

    - Compute per full frame: 120 TOPS / 30 FPS = 4 TOPS/frame.

    - Compute for vision only: 4 TOPS/frame - 0.6 TOPS/frame = 3.4 TOPS/frame.

    - Max FPS for vision only: 100 TOPS / 3.4 TOPS/frame = 29.4 FPS.


    **Conclusion & Interpretation:**

    - **Result: Drop aux models and reduce to 29 FPS (Compute-Bound)**. Dropping auxiliary tasks allows
    maintaining a near-real-time 29 FPS vision loop within the 100 TOPS limit.'
