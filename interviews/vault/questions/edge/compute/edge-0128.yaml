title: 'The Edge Roofline Trap'
scenario: 'You are deploying a classic convolutional neural network, which is known to be memory-bound.'
question: 'Based on their hardware specs, which device, a Jetson AGX Orin or a Hailo-8, is more likely to be bottlenecked by memory bandwidth rather than its compute units?'
details:
  realistic_solution: 'The Jetson AGX Orin is more likely to be memory-bottlenecked for a typical memory-bound model. This is quantified by its ''Ridge Point'' in the Roofline model. The Jetson''s high Ridge Point means a model needs high arithmetic intensity to use compute effectively. The Hailo-8 has high-bandwidth on-chip SRAM, lowering its Ridge Point. Use nsys profiling to identify memory bottlenecks.'
  common_mistake: |
    **The Pitfall:** Only looking at peak TOPS and ignoring the memory system bandwidth.
    **The Rationale:** Candidates fail to apply the Roofline Model, assuming massive compute power automatically translates to fast execution.
    **The Consequence:** Memory-bound models deployed on high-TOPS accelerators achieve only a fraction of peak performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Orin Ridge Point: 275 TOPS / 204.8 GB/s = 1342 OPS/Byte.
    - Classic CNN Arithmetic Intensity: ~500 OPS/Byte.

    **Calculations:**
    - Performance: 500 OPS/Byte * 204.8 GB/s = 102.4 TOPS.
    - Utilization: 102.4 / 275 = 37% of Orin's peak compute.

    **Conclusion & Interpretation:**
    - **Result: 102.4 TOPS (Memory-Bound)**. The CNN is strictly memory-bound on Orin, wasting 63% of compute.
  options:
  - 'The Hailo-8, because its compute (26 TOPS) is lower, making it the bottleneck. (Calculated Trap: ignores Ridge Point)'
  - 'The Jetson AGX Orin, because its Ridge Point is much higher than classic CNN Arithmetic Intensity.'
  - 'Neither, as both use modern memory systems that eliminate bottlenecks. (Calculated Trap: ignores Roofline Model entirely)'
  - 'The device with more RAM, as it will try to process more data at once. (Calculated Trap: confuses capacity with bandwidth)'
