title: 'Google Coral INT8 Throughput and Energy Calculation'
scenario: 'You are deploying a vision CNN on a Google Coral Edge TPU (4 TOPS INT8, 2W, USB form factor). The model requires 200 million INT8 MAC operations per inference and all operators are fully quantized to INT8 to avoid host CPU fallback. You assume 100% systolic array utilization.'
question: 'What are the theoretical maximum IPS and energy per inference for the 200M-MAC INT8 model on the 4 TOPS Coral Edge TPU?'
details:
  realistic_solution: 'First, convert the advertised TOPS to MACs per second, recognizing that 4 TOPS INT8 translates to 2 Tera-MACs/sec. Divide this compute capacity by the model''s per-inference MAC requirement to find the maximum IPS. Finally, divide the steady-state power consumption (2 Joules/sec) by the IPS to determine the energy cost per inference.'
  common_mistake: |
    **The Pitfall:** Forgetting that 1 MAC equals 2 operations, or confusing power (Watts) with energy (Joules).
    **The Rationale:** Candidates directly divide 4 TOPS by the MAC count, or struggle to link throughput with steady-state power to find the per-inference cost.
    **The Consequence:** They overestimate the maximum IPS by 2x and fail to correctly calculate the energy budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute capacity: 4 TOPS = $4 \times 10^{12}$ Ops/sec = $2 \times 10^{12}$ MACs/sec.
    - Model cost: 200 million MACs = $2 \times 10^8$ MACs/inference.
    - Power consumption: 2 Watts (2 Joules/sec).

    **Calculations:**
    - Theoretical IPS = ($2 \times 10^{12}$ MACs/sec) / ($2 \times 10^8$ MACs/inference) = 10,000 inferences/sec.
    - Energy per inference = 2 Watts / 10,000 inferences/sec = 0.0002 Joules.

    **Conclusion & Interpretation:**
    - **Result: 0.2 mJ/inference (Compute-Bound)**. The theoretical maximum is 10,000 IPS, costing exactly 0.2 millijoules per inference.
