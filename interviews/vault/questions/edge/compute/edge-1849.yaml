title: 'Edge LLM Inference Cost on Qualcomm Cloud AI 100'
scenario: 'You are tasked with deploying a small, quantized Large Language Model (LLM) for real-time inference. The model requires approximately 200 billion (200 x 10^9) INT8 operations per inference request. The device operates at 80% of its peak INT8 performance for this workload, and the operational cost is estimated at $0.05 per device-hour.'
question: 'What maximum requests per second and cost per million inferences can one accelerator with 400 TOPS INT8 deliver at 80% of peak on this LLM?'
details:
  realistic_solution: 'The candidate should calculate the effective operations per second (400 TOPS * 0.8 = 320 Tera INT8 Ops/sec). Then, divide this by the operations per inference (200 x 10^9 INT8 ops) to find inferences per second. For cost, calculate inferences per hour (inferences per second * 3600). Then, divide the hourly operational cost by inferences per hour to get cost per inference, and multiply by one million for the cost per million inferences.'
  common_mistake: |
    **The Pitfall:** Trying to calculate FLOPs instead of INT8 operations, or ignoring practical utilization limits.
    **The Rationale:** Candidates fail to adapt their calculations to quantized integer operations, forget to convert TOPS to ops/sec, or assume 100% hardware utilization is achievable.
    **The Consequence:** Throughput is massively overestimated, leading to under-provisioned serving infrastructure and blown cost projections.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model overhead: 200 * 10^9 INT8 operations per request.
    - Accelerator: 400 TOPS limit.
    - Realistic utilization: 80% of peak compute.
    - OpEx: $0.05 per device-hour.

    **Calculations:**
    - Effective Ops/sec: 400 TOPS * 0.8 (utilization) = 320 x 10^12 INT8 ops/sec.
    - Max Inferences/sec: (320 x 10^12 ops/sec) / (200 x 10^9 ops/inference) = 1600 inferences/sec.
    - Inferences/hour: 1600 inferences/sec * 3600 sec/hour = 5,760,000 inferences/hour.
    - Cost per inference: $0.05 / 5,760,000 = ~$0.00000000868.

    **Conclusion & Interpretation:**
    - **Result: $0.00868 per million (Compute-Bound Economics)**. The operational cost is ~$0.00868 per million inferences.
