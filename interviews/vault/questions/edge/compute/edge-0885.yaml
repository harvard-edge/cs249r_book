title: Unpadded Batching Inefficiency
scenario: A smart factory edge node runs continuous batching for 4 concurrent video-analysis streams. When one stream submits a 3000-token prompt, the short 50-token prompts from the other 3 streams take 600ms to process instead of their normal 20ms.
question: Why do 50-token prompts take 600ms when batched with one 3000-token prompt, and what batching or attention change fixes it?
details:
  realistic_solution: The root cause is the usage of naive padded batching instead of FlashAttention or unpadded (sequence-agnostic) continuous batching. When requests of vastly different lengths (3000 tokens vs 50 tokens) are grouped into a single batch without unpadded processing, the shorter sequences must be padded with zeros to match the maximum sequence length in the batch (3000). Because standard self-attention complexity is quadratic with respect to sequence length, the GPU wastes immense compute cycles calculating attention scores for padding tokens. The solution is to implement an unpadded attention mechanism (like FlashAttention with variable sequence lengths or xFormers' BlockDiagonalMask) that flattens the batch into a 1D array of valid tokens and only computes attention within sequence boundaries, completely eliminating padding waste.
  common_mistake: |
    **The Pitfall:** Assuming the PCIe bus is locked by the large video stream prompt.
    **The Rationale:** Candidates incorrectly guess system-level I/O blocking instead of algorithmic inefficiencies.
    **The Consequence:** Failing to address the quadratic computational waste of attention padding, leaving the system stalled.
  napkin_math: |
    **Assumptions & Constraints:**
    - Batch size = 4.
    - Sequence lengths = [3000, 50, 50, 50].
    - Naive padded batching is used.

    **Calculations:**
    - Max length = 3000.
    - Naive padded batch attention cost is proportional to B * Lmax^2 = 4 * 3000^2 = 36,000,000 length-squared units.
    - Valid unpadded attention cost is proportional to 3000^2 + 3 * 50^2 = 9,007,500 length-squared units.
    - Padding waste = 36,000,000 - 9,007,500 = 26,992,500 length-squared units, about 75% of the padded attention work.
    - For token storage and MLP work, 8,850 of 12,000 padded tokens are padding, about 74% waste.

    **Conclusion & Interpretation:**
    - **Result: ~75% wasted attention work (Compute-Bound)**. Unpadded or variable-length attention removes the O(B * Lmax^2) overhead imposed on the three short prompts.
