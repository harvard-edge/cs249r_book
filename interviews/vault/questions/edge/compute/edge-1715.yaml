title: Hailo-8 Spatial Tiling and Host Bandwidth
scenario: You are deploying a high-resolution feature extractor on a dataflow accelerator lacking local DRAM. Initial profiling shows the accelerator is achieving a fraction of its peak TOPS, and intermediate 1080p feature maps are being written back to host memory between convolutional stages.
question: How do you analyze the host memory bottleneck and quantify the impact of a depth-first dataflow tiling strategy?
details:
  realistic_solution: The performance drop is due to PCIe bandwidth saturation from spilling intermediate activations to host memory. The correct approach is to utilize the Hailo-8's compiler to map consecutive layers onto adjacent compute clusters, applying depth-first spatial tiling. A tile of the input image is processed through multiple layers continuously on-chip, keeping intermediate activations in local SRAM routing and only streaming the final output back to the host.
  common_mistake: |
    **The Pitfall:** Suggesting temporal optimizations (like weight-stationary dataflows) or caching in non-existent local DRAM.
    **The Rationale:** Candidates apply standard GPU optimization techniques, ignoring the unique spatial architecture of dataflow accelerators.
    **The Consequence:** Failed optimizations that do not resolve the PCIe bandwidth saturation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Intermediate feature map: 1080p INT8 (1920x1080x64) = ~132MB. 30 FPS.
    2. **Calculations:**
       - Streaming intermediate map: 132MB * 2 (read+write) * 30 FPS = ~7.9 GB/s.
       - Streaming only initial input (depth-first tiling): 1920x1080x3 * 30 FPS = ~186 MB/s.
    3. **Conclusion & Interpretation:**
       - **Result: PCIe Bandwidth Bottleneck.** Streaming intermediate activations requires 7.9 GB/s, exceeding edge PCIe limits. Spatial depth-first tiling reduces this to 186 MB/s, unblocking compute.
