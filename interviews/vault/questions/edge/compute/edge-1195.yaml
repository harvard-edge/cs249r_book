title: Design Speculative Decoding for Edge LLM on Jetson Orin
scenario: You are designing a speculative decoding system for a 7B target model. The target model takes 54.7ms/token (memory-bandwidth-bound decode). You have a 1B draft model that takes 8ms/token. The target acceptance rate is α=0.80.
question: What speculation window k should you choose for the 7B target and 1B draft at α=0.80, and what speedup results?
details:
  realistic_solution: Speculative Decoding isolates the memory-bound auto-regressive penalty by utilizing a highly lightweight draft model to hypothesize sequential tokens, verified collectively in a single parallel target pass. By explicitly calculating the expected token yield per speculative cycle versus the linear cost of extending the draft path, an optimal chunk limit is mathematically derived to maximize effective throughput.
  common_mistake: |
    **The Pitfall:** Setting the speculation window `k` too large.
    **The Rationale:** Candidates often assume that generating more draft tokens is always better if the draft model is fast.
    **The Consequence:** For memory-bandwidth-bound systems, the target model verification cost grows linearly with `k`, leading to diminishing returns and eventually slowing down the system.
  napkin_math: |
    **Assumptions & Constraints:**
       - Target decode: 54.7 ms/token
       - Draft decode: 8 ms/token
       - Acceptance rate (α): 0.80
    **Calculations:**
       - Expected accepted tokens E[k=5, α=0.8] = (1 - 0.8^6) / (1 - 0.8) ≈ 3.69 tokens
       - Cycle latency (k=5): (5 * 8 ms) + 54.7 ms = 94.7 ms
       - Speedup: (3.69 tokens / 94.7 ms) / (1 token / 54.7 ms) = 2.13x
    **Conclusion & Interpretation:**
       - **Result: Memory-Bound Optimization.** Speculative decoding with k=5 drastically reduces memory traffic per output token, providing a 2.13x speedup.
