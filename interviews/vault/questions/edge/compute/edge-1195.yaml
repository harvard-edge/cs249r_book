title: Design Speculative Decoding for Edge LLM on Jetson Orin
scenario: You are designing a speculative decoding system for a 7B target model. The target model takes 54.7ms/token (memory-bandwidth-bound decode). You have a 1B draft model that takes 8ms/token. The target acceptance rate is α=0.80.
question: What speculation window k should you choose for the 7B target and 1B draft at α=0.80, and what speedup results?
details:
  realistic_solution: |
    With acceptance rate alpha=0.80, use the conservative speculative-decoding expectation for emitted tokens from the draft window, excluding any bonus target token: E(k) = (1 - alpha^k) / (1 - alpha). The cycle cost is k draft steps plus one target verification pass: 8k + 54.7 ms. Searching k shows the best throughput at k=6, where E=3.69 tokens, cycle latency is 102.7 ms, and speedup versus the 54.7ms/token baseline is about 1.96x. Larger windows add draft latency faster than they add expected accepted tokens.
  common_mistake: |
    **The Pitfall:** Setting the speculation window `k` too large.
    **The Rationale:** Candidates often assume that generating more draft tokens is always better if the draft model is fast.
    **The Consequence:** The draft latency grows linearly with `k` while expected accepted tokens saturate, leading to diminishing returns and eventually slowing down the system.
  napkin_math: |
    **Assumptions & Constraints:**
       - Target decode: 54.7 ms/token
       - Draft decode: 8 ms/token
       - Acceptance rate (α): 0.80
    **Calculations:**
       - Expected emitted draft-window tokens, excluding the all-accepted bonus token: E(k) = (1 - α^k) / (1 - α)
       - Cycle latency: T(k) = 8k + 54.7 ms
       - k=4: E=2.95 tokens, T=86.7 ms, speedup=(2.95/86.7)/(1/54.7)=1.86x
       - k=5: E=3.36 tokens, T=94.7 ms, speedup=(3.36/94.7)/(1/54.7)=1.94x
       - k=6: E=3.69 tokens, T=102.7 ms, speedup=(3.69/102.7)/(1/54.7)=1.96x
       - k=7: E=3.95 tokens, T=110.7 ms, speedup=(3.95/110.7)/(1/54.7)=1.95x
    **Conclusion & Interpretation:**
       - **Result: choose k=6 for about 1.96x speedup.** This is the throughput maximum under the stated acceptance model and latencies.
