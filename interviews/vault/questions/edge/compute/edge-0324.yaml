title: The Jetson Roofline Riddle
scenario: You're an engineer on an autonomous driving team, tasked with optimizing a new perception model on an edge accelerator. You profile a specific convolutional layer and find that to process a batch of images, it performs 5 trillion INT8 operations and reads 10 GB of data (activations + weights) from DRAM.
question: For a layer with 5 trillion INT8 ops and 10 GB of DRAM reads, is it compute-bound or memory-bound, and why?
details:
  realistic_solution: The layer is memory-bound. To determine this, we must calculate the Arithmetic Intensity (AI) of the layer and compare it to the hardware's ridge point. The ridge point is the AI value where a system transitions from being memory-bound to compute-bound. FlashAttention-2 or KV cache quantization would be required to increase AI.
  common_mistake: |
    **The Pitfall:** Assuming the workload is compute-bound simply because 5 TOPS is a large number of operations.
    **The Rationale:** Candidates fail to calculate the Arithmetic Intensity (AI) and compare it to the hardware's ridge point.
    **The Consequence:** Time is wasted optimizing compute kernels instead of applying memory optimizations like quantization or fusion.
  napkin_math: |
    **Assumptions & Constraints:**
    - Layer Ops: 5 Trillion INT8 operations.
    - DRAM Reads: 10 GB.
    - Accelerator Peak Compute: 275 TOPS.
    - Accelerator Memory Bandwidth: 204.8 GB/s.
    
    **Calculations:**
    - Arithmetic Intensity (AI) = 5e12 Ops / 10e9 Bytes = 500 Ops/Byte.
    - Hardware Ridge Point = 275 TOPS / 204.8 GB/s = ~1343 Ops/Byte.
    
    **Conclusion & Interpretation:**
    - **Result: 500 Ops/Byte (Memory-Bound)**. Since AI (500) < Ridge Point (1343), the GPU is starved for data and the layer is heavily memory-bound.
  options:
  - Compute-bound, because 5 trillion operations is a massive workload that will always saturate the GPU.
  - Memory-bound, because its arithmetic intensity of 500 Ops/Byte is below the ridge point of ~1342 Ops/Byte.
  - Compute-bound, because 5 TOPS / 275 TOPS = 1.8% utilization, meaning compute is the bottleneck.
  - Memory-bound, because the memory access (10 GB) is larger than the compute (5 TOPS).
  correct_index: 1
