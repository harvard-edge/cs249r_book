title: The Units of Arithmetic Intensity
scenario: Profiling an autonomous vehicle model to place it on a roofline chart.
question: What are the units of Arithmetic Intensity, the x-axis of this chart?
details:
  realistic_solution: The correct units for Arithmetic Intensity are Operations per Byte (Ops/Byte). This metric quantifies how many computational operations are performed for each byte of data transferred from memory.
  common_mistake: |
    **The Pitfall:** Confusing Arithmetic Intensity with a raw performance metric like FLOPS or inverting the ratio to Bytes/Op.
    **The Rationale:** Engineers often forget that Arithmetic Intensity specifically measures the ratio of compute to memory traffic.
    **The Consequence:** Misidentifying the units leads to an incorrect roofline analysis, potentially causing the team to optimize for compute when the model is actually memory-bound.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arithmetic Intensity is the roofline x-axis.
    - It is defined as work performed divided by memory traffic.

    **Calculations:**
    - Arithmetic Intensity = Operations / Bytes moved.
    - Units = Ops/Byte.

    **Conclusion & Interpretation:**
    - **Result: Ops/Byte (Tooling-Knowledge)**. Ridge-point calculations are separate roofline questions; this question asks only for the unit definition.
  options:
    - FLOPS (Floating Point Operations Per Second)
    - Bytes/Op (Bytes per Operation)
    - Ops/Byte (Operations per Byte)
    - TOPS/W (Trillion Operations per Second per Watt)
