title: 'Edge Systolic Array Fluency: Arithmetic Intensity Estimation for Edge Models'
scenario: 'You are profiling operations running on a Hailo-8 dataflow accelerator (26 TOPS INT8, internal SRAM BW ≈ 6GB/s, ridge point = 4333 FLOPs/byte). The operations include: (1) MobileNetV2 full inference (0.3 GOPS, 3.4M params) at batch=1, (2) a 3x3 convolution with 64 channels, 56x56 feature map, 64 filters, and (3) a 1x1 pointwise convolution with the same dimensions.'
question: 'Without looking up formulas, estimate the arithmetic intensities for MobileNetV2, the 3x3 conv, and the 1x1 conv on Hailo-8, and state whether they are memory or compute bound.'
details:
  realistic_solution: '(1) MobileNetV2 batch=1: FLOPs=0.3G. BW: weights=3.4MB, activations ≈ 5MB (sum of all layer I/O). AI = 0.3G/8.4MB = 35.7 FLOPs/byte. Memory bound on Hailo-8 (ridge=4333). (2) 3x3 conv 64→64, 56x56: FLOPs=2*64*56^2*9*64=231M. BW: in=64*56^2=200KB, weights=64*9*64=36KB, out=64*56^2=200KB. AI=231M/436KB=530 FLOPs/byte. Memory bound (< 4333). (3) 1x1 PW same: FLOPs=2*64*56^2*64=25.7M. BW: in=200KB, weights=64*64=4KB, out=200KB. AI=25.7M/404KB=63.6 FLOPs/byte. More memory bound.'
  common_mistake: |
    **The Pitfall:** Calculating Arithmetic Intensity (AI) by dividing total FLOPs by total weight bytes only.
    **The Rationale:** Candidates ignore the fact that intermediate activations also consume memory bandwidth, which heavily dominates the memory traffic for shallow networks or single layers.
    **The Consequence:** Drastically overestimating the arithmetic intensity, leading to the false conclusion that memory-bound operations are compute-bound.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8 ridge point: 26 TOPS / 6 GB/s = 4333 FLOPs/byte.

    **Calculations:**
    - **(1) MobileNetV2 (batch=1):** FLOPs = 0.3G. BW = 3.4MB (weights) + ~5MB (activations) = 8.4MB. AI = 0.3G / 8.4MB = 35.7 FLOPs/byte (Memory bound).
    - **(2) 3x3 Conv (64->64, 56x56):** FLOPs = 2 * 64 * 56^2 * 9 * 64 = 231M. BW = 200KB (in) + 36KB (weights) + 200KB (out) = 436KB. AI = 231M / 436KB = 530 FLOPs/byte (Memory bound).
    - **(3) 1x1 PW Conv:** FLOPs = 2 * 64 * 56^2 * 1 * 64 = 25.7M. BW = 200KB (in) + 4KB (weights) + 200KB (out) = 404KB. AI = 25.7M / 404KB = 63.6 FLOPs/byte (Heavily memory bound).

    **Conclusion & Interpretation:**
    - **Result: All three operations are deeply memory bound (AI < 4333) (Memory-Bandwidth-Bound)**.
