title: 'Edge Systolic Array Mastery: Full EfficientNet Roofline on Jetson Orin DLA'
scenario: Perform a complete Roofline analysis for EfficientNet-B0 on Jetson Orin DLA.
question: For EfficientNet-B0 on Orin DLA, which layers are memory or compute bound, what MFU do you expect, and what should run on GPU vs DLA?
details:
  realistic_solution: 'DLA architecture intrinsically bottlenecks on non-contiguous head classifier layouts. Compute AI indicates severe starvation for terminal fully-connected bounds. Send late head projections strictly to GPU.'
  common_mistake: |
    **The Pitfall:** Running the entire network blindly on the DLA.
    **The Rationale:** Candidates fail to identify that late layers (like the 1x1 classifier head) have very low arithmetic intensity and are heavily memory-bound on the DLA.
    **The Consequence:** Sub-optimal throughput because memory-bound operations are not offloaded to the GPU which has better bandwidth handling for specific layers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Ridge HW: 11 TOPS / 200 GB/s
    - Model FLOPs: 390M
    - Model Data: 17.3MB

    **Calculations:**
    - Hardware Ridge = 11T / 200G = 55 FLOPs/byte
    - Model AI = 390M / 17.3M = 22.5 FLOPs/byte

    **Conclusion & Interpretation:**
    - **Result: Memory Bound.** AI < Ridge Point.
