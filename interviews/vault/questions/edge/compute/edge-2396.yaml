title: Jetson Orin VIO Power Bottleneck Diagnosis
scenario: A robotics startup uses Jetson AGX Orins configured in 60W mode. Their newly deployed visual-inertial odometry model causes thermal throttling and massive battery drain.
question: Formulate a diagnostic framework to pinpoint the compute bottlenecks and propose an architectural modification to keep the power strictly under 30W?
details:
  realistic_solution: |
    Start by fixing the Jetson AGX Orin power mode and collecting tegrastats, Nsight Systems traces, GPU/DLA utilization, memory bandwidth, CPU load, clocks, temperatures, and per-stage latency for camera ingest, VIO front end, feature tracking, fusion, and inference. Classify each stage as compute-bound, memory-bound, synchronization-bound, or thermally limited, then validate candidates under a 30W nvpmodel profile instead of extrapolating from 60W behavior.

    A plausible architecture change is to reduce off-chip memory traffic and sustained GPU load: keep sparse VIO front-end work on CPU/PVA where appropriate, fuse preprocessing kernels, quantize supported neural blocks to INT8, and replace dense attention or full-resolution feature maps with windowed/sparse or depthwise operators only if profiling shows those layers dominate power.
  common_mistake: |
    **The Pitfall:** Assuming TOPS usage is the primary power draw.
    **The Rationale:** Candidates often focus solely on compute operations and fail to recognize that memory bandwidth is a major power consumer.
    **The Consequence:** Completely ignoring the massive energy cost of off-chip LPDDR5 memory accesses.
  napkin_math: |
    **Assumptions & Constraints:**
    - The device is currently configured for 60W operation and is throttling.
    - Release constraint: sustained platform power must stay below 30W.
    - Profiling must measure per-stage power proxies: utilization, clocks, memory bandwidth, temperature, and latency.

    **Calculations:**
    - If tegrastats shows high EMC bandwidth with low GPU occupancy, prioritize memory-traffic reductions such as tiling, fusion, lower-resolution features, or sparse/windowed layers.
    - If GPU occupancy and clocks are high with modest memory pressure, prioritize quantization, operator replacement, DLA/PVA offload where supported, or frame-rate/adaptive-quality control.
    - Re-run the same mission trace in a 30W nvpmodel profile and accept only designs whose measured peak and sustained power stay below 30W while meeting VIO latency.

    **Conclusion & Interpretation:**
    - **Result: profile-driven 30W architecture**. The fix is not a guessed layer swap; it is a measured bottleneck diagnosis followed by memory, compute, and accelerator-placement changes that are validated under the actual 30W power envelope.
