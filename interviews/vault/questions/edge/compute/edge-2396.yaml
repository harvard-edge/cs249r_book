title: Thermal Throttling Orin
scenario: A robotics startup uses Jetson AGX Orins configured in 60W mode. Their newly deployed visual-inertial
  odometry model causes thermal throttling and massive battery drain.
question: Formulate a diagnostic framework to pinpoint the compute bottlenecks and propose an architectural
  modification to keep the power strictly under 30W.
details:
  realistic_solution: First, profile INT8 utilization versus memory-bound operations using nsys profiling.
    Redesign the architecture by replacing dense attention layers with depthwise convolutions and lowering
    precision to INT8. This reduces memory power from 30W to 15W and compute power from 20W to 10W, bringing
    total power to 25W, which enables the 30W power modes.
  common_mistake: '**The Pitfall:** Assuming TOPS usage is the primary power draw.

    **The Rationale:** Candidates often focus solely on compute operations and fail to recognize that
    memory bandwidth is a major power consumer.

    **The Consequence:** Completely ignoring the massive energy cost of off-chip LPDDR5 memory accesses.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Total power equation: P_total = P_compute + P_mem.

    - Constraint: P_total < 30W.

    - Original FP16 power: P_compute=20W, P_mem=30W.

    - INT8 depthwise power: P_compute=10W, P_mem=15W.


    **Calculations:**

    - Original P_total = 20W + 30W = 50W (exceeds budget).

    - Optimized P_total = 10W + 15W = 25W.

    - 25W < 30W budget.


    **Conclusion & Interpretation:**

    - **Result: 25W (Power-Bound)**. Shifting to lower precision and depthwise convolutions reduces memory
    bandwidth and compute, meeting the <30W requirement.'
