title: The Autonomous Driving Perception Stall
scenario: You are a Staff ML Systems Engineer on an autonomous vehicle team, tasked with deploying a new LiDAR object detection model onto a fleet of cars using the Jetson AGX Orin platform. During a test run, the perception lead reports that the model is only achieving ~37% of the Orin's advertised 275 TOPS (INT8) and the device is running hot, consuming 40W. You profile the model and find it requires 500 Giga-operations (500e9 Ops) and reads/writes 1 Gigabyte of data from DRAM per inference.
question: Using the roofline model, is the LiDAR workload on the Orin compute-bound or memory-bound, and what is the bottleneck?
details:
  realistic_solution: 'The workload is memory-bound. The key is to calculate the system''s Roofline ridge point and compare it to the model''s arithmetic intensity. The AGX Orin''s memory bandwidth is the limiting factor here. The compute units are being starved for data, spending most of their cycles idle while waiting for weights and activations to be fetched from DRAM. This memory access itself consumes significant power, contributing to the heat, even though the compute cores are not fully utilized.'
  common_mistake: |
    **The Pitfall:** Assuming that high power consumption or heat automatically means a workload is compute-bound.
    **The Rationale:** Engineers often focus purely on the advertised peak TOPS without considering the memory system's ability to feed those units.
    **The Consequence:** Optimization efforts focus on math operations when the real limiter on edge devices is often memory bandwidth.
  napkin_math: |
    **Assumptions & Constraints:**
    - Orin Peak Compute is 275 TOPS.
    - Orin Peak Bandwidth is 204.8 GB/s.
    - Model arithmetic requirement is 500 GOPS and 1 GB DRAM transfer.

    **Calculations:**
    - Orin Ridge Point is 275 TOPS / 204.8 GB/s = 1342 OPS/Byte.
    - Model Arithmetic Intensity is 500 GOPS / 1 GB = 500 OPS/Byte.
    - Max achievable compute is 500 OPS/Byte * 204.8 GB/s = 102.4 TOPS.

    **Conclusion & Interpretation:**
    - **Result: 102.4 TOPS (Memory-Bound)**. Since 500 < 1342 OPS/Byte, the model stalls waiting for LPDDR5 memory, failing to reach peak compute.
  options:
  - The model is compute-bound. The mathematical operations are too complex, causing the GPU to hit its thermal design power (TDP) limit and throttle.
  - The model is memory-bound. Its arithmetic intensity is below the AGX Orin's roofline ridge point, meaning the memory system cannot supply data fast enough to keep the compute units busy.
  - The model has an inefficient TOPS/W ratio. The model architecture itself is not power-efficient and needs to be replaced with a different one.
  - The model is interconnect-bound. The bottleneck is the PCIe bus transferring data from the host CPU to the GPU, not the GPU's internal memory.
  correct_index: 1
