title: 'Edge Systolic Array Evaluation: Weight-Stationary vs Row-Stationary on Jetson'
scenario: Compare weight-stationary (WS) and row-stationary (RS) dataflow for a depthwise convolution on an edge accelerator. The block is an EfficientNet-B0 block (32 channels, 112x112, 3x3 dw-conv).
question: For the 32-channel 112x112 3x3 depthwise conv, how do WS and RS dataflows compare in SRAM access and energy?
details:
  realistic_solution: 'DW conv: 32 channels, weights = 32*9 = 288 values. Activations: 32*112^2 = 401K values. WS dataflow: weights stationary in register file. Activations (input) read: 32*112^2 (with padding: 32*114^2 = 415K). Output written: 32*112^2=401K. Total SRAM accesses: 288 (weight load, amortized) + 415K + 401K = 816K accesses (415K reads + 401K writes). RS dataflow: processes one output row at a time, keeping partial sums stationary. Input row read: 3 rows of 32*114 = 10.95K, output row written: 32*112. Total for 112 rows: same 816K accesses. Both similar for DW. RS wins for standard conv where partial sums are large.'
  common_mistake: |
    **The Pitfall:** Applying weight-stationary dataflow logic strictly to depthwise convolutions.
    **The Rationale:** Candidates assume weights dominate memory accesses, forgetting that depthwise weights are tiny (9 values per channel).
    **The Consequence:** Memory bandwidth bottlenecks are completely misidentified, as activations heavily dominate the dataflow.
  napkin_math: |
    **Assumptions & Constraints:**
    - Depthwise 32ch, 3x3, 112x112.
    - Weight size: 32 * 9 = 288 bytes INT8.
    
    **Calculations:**
    - Activation in (with padding): 32 * (112+2)^2 = 415,872 bytes.
    - Output: 32 * 112^2 = 401,408 bytes.
    - Total memory access: ~0.818 MB per inference.
    - FLOPs: 2 * 32 * 112^2 * 9 = 7.2M FLOPs.
    - Arithmetic Intensity = 7.2M / 0.818MB = 8.8 FLOPs/byte.
    
    **Conclusion & Interpretation:**
    - **Result: 8.8 FLOPs/byte (Memory-Bound)**. The layer is completely memory-bound by activations, making both WS and RS dataflows yield similar massive SRAM access counts.
