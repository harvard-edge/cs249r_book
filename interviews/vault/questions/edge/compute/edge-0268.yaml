title: Identifying Arithmetic Intensity
scenario: You are designing a perception system for an autonomous vehicle using a Jetson AGX Orin. When analyzing your CNN's performance with a roofline plot, you need to characterize the workload itself.
question: What is the standard term for the ratio of compute operations to bytes of data moved from memory, which is the primary determinant of whether a workload is compute-bound or memory-bound?
details:
  realistic_solution: The correct term is **Arithmetic Intensity**. It is the ratio of total operations (e.g., INT8 OPs or FP16 FLOPs) to total bytes moved from memory. A high Arithmetic Intensity means the model performs many calculations for each byte it fetches, making it likely to be limited by the processor's peak compute (compute-bound). A low Arithmetic Intensity means the model is constantly fetching data and will be limited by memory bandwidth (memory-bound).
  common_mistake: |
    **The Pitfall:** Confusing Arithmetic Intensity with TOPS/W or Operational Throughput.
    **The Rationale:** Engineers often mix up metrics related to power efficiency or system output rate with the intrinsic computational density of the workload.
    **The Consequence:** Misidentifying the bottleneck mechanism in roofline analysis, leading to ineffective optimization strategies.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Example layer: 50 Giga-Ops compute, 100 MB data.
       - Jetson AGX Orin ridge point: 275 TOPS / 204.8 GB/s = 1342 Ops/Byte.
    2. **Calculations:**
       - Arithmetic Intensity (AI) = Total Operations / Total Bytes Transferred.
       - AI = 50e9 Ops / 100e6 Bytes = 500 Ops/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: 500 Ops/Byte.** Since 500 < 1342, the workload is **Memory-Bound**.
  options:
  - TOPS per Watt
  - Operational Throughput
  - Arithmetic Intensity
  - Compute-to-Memory Ratio
  correct_index: 2
