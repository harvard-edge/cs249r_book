title: Heterogeneous Pipeline Design for Jetson Orin
scenario: You are architecting the compute pipeline for an autonomous robotics platform utilizing the NVIDIA Jetson Orin. The system requires processing multiple sensor modalities under a strict 60W TDP.
question: How would you partition a massive transformer perception model across the Ampere GPU and DLA, and design kernels to avoid LPDDR5 bottlenecks?
details:
  realistic_solution: Partition by actual TensorRT/DLA support, not by generic matrix type. Put DLA-compatible INT8 CNN-style perception subgraphs such as standard convolutions, pooling, supported activations, and simple heads on the DLA when they compile without fallback. Keep transformer attention, MLP/GEMM-heavy blocks, reshape-heavy paths, dynamic shapes, and unsupported normalization or indexing on the Ampere GPU Tensor Cores. Use the unified LPDDR5 memory as device/global memory, then tile GPU kernels so cp.async stages coalesced global-memory loads into shared memory before Tensor Core execution. Avoid unnecessary CPU-GPU copies with zero-copy-style ownership at pipeline boundaries, but do not rely on pinned host memory as a substitute for shared-memory tiling.
  common_mistake: |
    **The Pitfall:** Scheduling all matrix operations onto the Ampere SMs and neglecting the DLA.
    **The Rationale:** Candidates treat the system as a standard discrete GPU and ignore the shared unified memory architecture.
    **The Consequence:** Severe memory contention between CPU, GPU, and DLA, wasting power and failing to meet the 60W budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson AGX Orin 64GB-class LPDDR5 bandwidth: 204.8 GB/s.
    - Peak INT8 compute: 275 TOPS.
    - Attention-heavy transformer stages have assumed arithmetic intensity <400 OPS/Byte after normal tiling.

    **Calculations:**
    - Arithmetic intensity needed to sustain peak compute from LPDDR5 = 275e12 OPS/s / 204.8e9 Bytes/s = ~1343 OPS/Byte.
    - If the attention stage is <400 OPS/Byte, achievable compute from memory bandwidth is <400 * 204.8e9 = <81.9 TOPS before cache and scheduling effects.

    **Conclusion & Interpretation:**
    - **Result: Attention Is Memory-Bound Against Peak INT8 Compute**. DLA should only receive supported subgraphs; GPU kernels need shared-memory tiling and fusion to raise reuse, not a claim that zero-copy bypasses LPDDR5 bandwidth.
