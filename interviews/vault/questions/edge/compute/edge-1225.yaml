title: Analyze INT8 Underutilization on Cloud AI 100
scenario: You are deploying a custom vision model on a Qualcomm Cloud AI 100, an on-premise inference accelerator featuring 32 GB LPDDR4x memory, 400 TOPS of INT8 compute, and a 75W power envelope. During profiling of a specific kernel layer, you observe the accelerator only achieves 50 TOPS of actual INT8 throughput despite the 400 TOPS peak. The profiler shows the LPDDR4x memory interface is saturated, delivering 100 GB/s.
question: Why does the Cloud AI 100 achieve only 50 TOPS on this INT8 kernel while its LPDDR4x interface is saturated at 100 GB/s?
details:
  realistic_solution: 'The system is heavily memory-bound due to the low arithmetic intensity of the kernel compared to the hardware''s high machine balance. The 400 TOPS INT8 compute units can process data much faster than the LPDDR4x memory can supply it. Because the memory bandwidth is saturated at 100 GB/s, the compute units idle while waiting for data, strictly limiting the maximum achievable operations per second to the rate at which data can be fetched.'
  common_mistake: |
    **The Pitfall:** Assuming INT8 compute cores are stalling due to poor instruction scheduling.
    **The Rationale:** Candidates incorrectly suggest rewriting the matrix multiplication kernels, failing to realize the compute units are starved for data.
    **The Consequence:** Wasted optimization cycles on compute kernels when the fundamental limit is the memory bandwidth.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cloud AI 100: 400 TOPS INT8, 100 GB/s saturated memory
    - Observed throughput: 50 TOPS

    **Calculations:**
    - Hardware Machine Balance = 400 TOPS / 100 GB/s = 4000 OPs/byte
    - Workload Arithmetic Intensity = 50 TOPS / 100 GB/s = 500 OPs/byte
    - Compute Utilization = 500 / 4000 = 12.5% (or 50/400)

    **Conclusion & Interpretation:**
    - **Result: 12.5% Utilization (Memory-Bound)**. The kernel is memory-bound due to low arithmetic intensity.
