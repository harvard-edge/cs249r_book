title: 'Edge Systolic Array Optimization: DLA vs GPU Load Balancing on Jetson'
scenario: A Jetson Orin runs MobileNetV2 (0.3 GOPS, 3.4M params) entirely on GPU at 2000 FPS using 5% GPU utilization.
question: Can MobileNetV2 move from GPU to DLA while maintaining 2000 FPS, and what power savings and maximum DLA FPS result?
details:
  realistic_solution: DLA can maintain 2000 FPS. The compute-only limit is 11,000 GOPS / 0.3 GOPS = 36,667 FPS, but the stated 0.06ms per-inference memory/activation limit caps practical DLA throughput at 1 / 0.00006s = 16,667 FPS. That is still over 8x the required 2000 FPS. If GPU power is modeled as 15W idle plus 5% of a 45W dynamic range, GPU power is 17.25W. DLA power is 10W idle plus 1.5W active, or 11.5W. Moving MobileNetV2 to DLA therefore saves 5.75W while preserving the target frame rate.
  common_mistake: |
    **The Pitfall:** Ignoring DLA memory bandwidth limitations.
    **The Rationale:** Candidates blindly divide theoretical TOPS by model GOPS, assuming the DLA can achieve 36,667 FPS.
    **The Consequence:** They overestimate the DLA headroom, which is actually bottlenecked by memory bandwidth to 16,667 FPS (though still sufficient here).
  napkin_math: |
    **Assumptions & Constraints:**
    - DLA is 11 TOPS (11,000 GOPS).
    - MobileNetV2 is 0.3 GOPS.
    - DLA memory bandwidth allows 0.06ms per inference.
    - GPU max is 60W, 15W idle, so the dynamic range above idle is 45W.
    - DLA power is ~1.5W + 10W idle.

    **Calculations:**
    - Theoretical DLA FPS = 11,000 GOPS / 0.3 GOPS = 36,667 FPS.
    - BW/latency-limited FPS = 1 / 0.00006s = 16,667 FPS.
    - GPU Power (5% utilization) = 15W idle + 0.05 * (60W - 15W) = 17.25W.
    - DLA Power = 1.5W + 10W idle = 11.5W.
    - Power savings = 17.25W - 11.5W = 5.75W.

    **Conclusion & Interpretation:**
    - **Result: 5.75W savings with 16,667 FPS maximum DLA throughput.** The DLA is limited by the stated 0.06ms memory/activation latency rather than peak TOPS, but it easily maintains 2000 FPS.
