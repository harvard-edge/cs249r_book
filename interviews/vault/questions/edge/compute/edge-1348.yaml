title: Jetson Orin INT8 Compute Utilization for Vision Transformers
scenario: You are deploying a quantized vision transformer on an NVIDIA Jetson Orin edge device. The model requires 5.5 Tera-Operations (TOPS) of INT8 compute per inference. The system processes a continuous 30 FPS video stream from a single high-resolution camera.
question: 'What INT8 compute throughput is required for 30 FPS, and what is the theoretical minimum Jetson Orin utilization?'
details:
  realistic_solution: 'The candidate should correctly calculate the theoretical utilization but immediately caveat it by noting that sustaining 165 TOPS on a 60W edge device is extremely challenging due to memory bandwidth bottlenecks and imperfect warp scheduling. A realistic solution involves extensive operator fusion via TensorRT, optimizing thread block sizes for the Ampere SMs, and maximizing LPDDR5 bandwidth efficiency to approach this theoretical bound.'
  common_mistake: |
    **The Pitfall:** Assuming theoretical compute utilization maps directly to real-world performance without memory bottlenecks.
    **The Rationale:** Candidates see 60% utilization and assume the hardware will easily meet the 30 FPS target, ignoring that peak TOPS requires perfect memory coalescing and Tensor Core occupancy.
    **The Consequence:** The deployed model misses the 30 FPS target despite theoretical calculations suggesting 40% headroom.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute per inference: 5.5 TOPS.
    - Target framerate: 30 FPS.
    - Jetson Orin peak INT8 throughput: 275 TOPS.

    **Calculations:**
    - Required Compute Throughput = 5.5 TOPS/frame * 30 frames/second = 165 TOPS.
    - Theoretical Compute Utilization = 165 TOPS / 275 TOPS = 0.60 (60%).

    **Conclusion & Interpretation:**
    - **Result: 165 TOPS at 60% Utilization (Memory-Bound)**. Sustaining this throughput requires heavy optimization due to memory bottlenecks.
