title: The Sparse Model Fallacy
scenario: Your team is developing a perception model for an autonomous vehicle using the Jetson AGX Orin platform. You're trying to choose between two CNN architectures to minimize latency and power draw. Model A is a dense, monolithic architecture. Model B is a new, 'sparse' architecture using depthwise-separable convolutions that has 20% fewer MACs but many more small, sequential layers. Your team lead argues for Model B, stating, 'Fewer MACs means fewer operations, which must lead to lower latency and better TOPS/W.'
question: Why might the team lead's prediction be catastrophically wrong, causing Model B to have higher latency and worse power efficiency in production?
details:
  realistic_solution: The team lead's assertion is likely wrong because it ignores arithmetic intensity and data movement. Model B can have 20% fewer MACs and still be slower if its many small depthwise layers repeatedly move activations through DRAM and launch poorly fused kernels. On Jetson AGX Orin, the compute units need high operations per byte to stay busy; a sparse, low-AI model becomes memory-bandwidth-bound, so latency is set by bytes moved rather than MAC count. That also hurts power efficiency because the chip spends energy on DRAM traffic and idle compute resources instead of doing dense arithmetic at high TOPS/W.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the peak theoretical TOPS or total MAC count of the model.
    **The Rationale:** Engineers treat hardware as a simple multiplier and ignore the physics of data movement. They forget that if the compute units are starved for data, peak performance is irrelevant.
    **The Consequence:** The "optimized" sparse model performs drastically worse in production due to severe memory bandwidth bottlenecking.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin bandwidth: 204.8 GB/s.
    - Jetson Orin peak INT8 compute: 275 TOPS = 275,000 GOP/s.
    - Model A dense layer: 125 GOP and AI = 2000 Ops/Byte.
    - Model B sparse layer: 100 GOP and AI = 100 Ops/Byte, representing 20% fewer ops but much more traffic per op.

    **Calculations:**
    - Ridge point = 275,000 GOP/s / 204.8GB/s = 1343 Ops/Byte.
    - Model A traffic = 125G Ops / 2000 Ops/Byte = 62.5MB, and AI > ridge, so compute-bound.
    - Model A time = 125G Ops / 275,000G Ops/s = 0.45ms.
    - Model B traffic = 100G Ops / 100 Ops/Byte = 1.0GB, and AI < ridge, so memory-bound.
    - Model B time = 1.0GB / 204.8GB/s = 4.88ms.

    **Conclusion & Interpretation:**
    - **Result: 0.45ms vs 4.88ms (Memory Bandwidth-Bound)**. Model B does fewer operations but loses on latency and energy efficiency because it moves far more data per operation.
