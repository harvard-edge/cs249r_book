title: 'The Sparse Model Fallacy'
scenario: 'Your team is developing a perception model for an autonomous vehicle using the Jetson AGX Orin platform. You''re trying to choose between two CNN architectures to minimize latency and power draw. Model A is a dense, monolithic architecture. Model B is a new, ''sparse'' architecture using depthwise-separable convolutions that has 20% fewer MACs but many more small, sequential layers. Your team lead argues for Model B, stating, ''Fewer MACs means fewer operations, which must lead to lower latency and better TOPS/W.'''
question: 'Why might the team lead''s prediction be catastrophically wrong, causing Model B to have higher latency and worse power efficiency in production?'
details:
  realistic_solution: 'The team lead''s assertion is likely wrong because it ignores a critical factor: Arithmetic Intensity (AI). The Jetson AGX Orin, like most modern accelerators, has a very high ratio of peak compute to memory bandwidth. This means it needs a high number of operations per byte of data moved from memory to stay efficient (i.e., it has a high ''ridge point'' on the roofline model).'
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the peak theoretical TOPS or total MAC count of the model.
    **The Rationale:** Engineers treat hardware as a simple multiplier and ignore the physics of data movement. They forget that if the compute units are starved for data, peak performance is irrelevant.
    **The Consequence:** The "optimized" sparse model performs drastically worse in production due to severe memory bandwidth bottlenecking.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin bandwidth: 204.8 GB/s. Compute: 275 TOPS.
    - Model A (Dense): AI = 2000, 100 GOP layer.
    - Model B (Sparse): AI = 100, 100 GOP layer moves 1 GB of data.

    **Calculations:**
    - Jetson Orin AI Ridge Point: 275 TOPS / 204.8 GB/s = 1342 Ops/Byte.
    - Model A (Dense) Time: 100G / 275T = 0.36ms (Compute-bound).
    - Model B (Sparse) Time: 1 GB / 204.8 GB/s = 4.88ms (Memory-bound).

    **Conclusion & Interpretation:**
    - **Result: 0.36ms vs 4.88ms (Memory Bandwidth-Bound)**. Model A easily wins on latency despite having more total FLOPs due to much higher Arithmetic Intensity.
