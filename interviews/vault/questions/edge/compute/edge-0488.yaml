title: The Utilization Paradox
scenario: 'You are a Staff ML Engineer on an automotive perception team, tasked with selecting a model for a 30 FPS (33.3ms deadline) pedestrian detection system. The system runs on an accelerator providing 275 INT8 TOPS. The rest of the perception pipeline already consumes 20ms of the latency budget, leaving you 13.3ms. You have two candidate models: Model A (CNN) with 300 G-MACs (0.6 TOps) achieving 15% utilization, and Model B (ViT) with 750 G-MACs (1.5 TOps) achieving 50% utilization.'
question: Which candidate model meets the 13.3ms latency budget once Orin utilization is accounted for, the CNN or the ViT?
details:
  realistic_solution: 'Calculate the effective TOPS for each model based on its profiled hardware utilization. The ViT, despite having 2.5x the theoretical G-MACs, is the only viable option because its dense matrix multiply architecture maps efficiently to Tensor Cores, leading to dramatically higher utilization and lower wall-clock latency.'
  common_mistake: |
    **The Pitfall:** Blindly choosing the model with the lowest theoretical G-MACs.
    **The Rationale:** Engineers assume that fewer operations automatically means lower latency, forgetting that models with low arithmetic intensity become memory-bound.
    **The Consequence:** Deploying a "small" CNN that leaves powerful compute units starved, failing to meet the real-time deadline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total budget: 33.3ms, pipeline overhead: 20ms, model budget: 13.3ms.
       - Accelerator: 275 INT8 TOPS.
       - Model A: 0.6 TOps, 15% utilization.
       - Model B: 1.5 TOps, 50% utilization.
    2. **Calculations:**
       - Model A effective throughput = 275 TOPS * 0.15 = 41.25 TOPS.
       - Model A latency = 0.6 TOps / 41.25 TOPS = ~14.5ms.
       - Model B effective throughput = 275 TOPS * 0.50 = 137.5 TOPS.
       - Model B latency = 1.5 TOps / 137.5 TOPS = ~10.9ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound ViT Wins**. Model B (~11ms) meets the 13.3ms budget, while Model A (~14.5ms) fails despite having fewer FLOPs, proving utilization dominates edge latency.
  options:
  - Model B (ViT) is the only choice. Its higher hardware utilization results in a latency of ~11ms, which is within the 13.3ms budget, while the CNN is too slow at ~14.5ms.
  - Model A (CNN) is the clear choice. With only 300 G-MACs, it is 2.5x smaller and takes ~2.2ms, easily meeting the deadline.
  - Neither model is viable. The CNN will take ~14.5ms and the ViT will take over 30ms. Both fail the 13.3ms budget.
  - Both models are viable. The CNN takes ~2.2ms and the ViT takes ~5.4ms, both well within the total 33.3ms budget.
