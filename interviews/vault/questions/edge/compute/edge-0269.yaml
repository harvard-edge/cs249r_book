title: The Orin's Ridge Point
scenario: Your team is profiling a new perception model on a Jetson AGX Orin. A specific layer performs 200 billion INT8 operations (200 GOPS) and reads 250 MB of data from DRAM for a single inference.
question: Is this specific layer compute-bound or memory-bound on the AGX Orin?
details:
  realistic_solution: 'To determine the bottleneck, construct a Roofline model. Calculate the hardware''s Ridge Point (the minimum arithmetic intensity to be compute-bound). Then, calculate the layer''s actual arithmetic intensity. Compare the two to classify the bottleneck.'
  common_mistake: |
    **The Pitfall:** Assuming high GOPS automatically means compute-bound.
    **The Rationale:** Engineers guess based on absolute operation counts without calculating the arithmetic intensity ratio.
    **The Consequence:** Wasting time optimizing compute kernels (e.g., loop unrolling) when data transfer is the actual limit.
  napkin_math: |
    **Assumptions & Constraints:**
    - Orin compute: 275 TOPS (275,000 GOPs/sec)
    - Orin bandwidth: 204.8 GB/s
    - Workload compute: 200 GOPS (200,000 MOPS)
    - Workload data: 250 MB

    **Calculations:**
    - Hardware Ridge Point: 275,000 GOPs / 204.8 GB/s ~ 1,342 OPS/Byte.
    - Workload AI: 200,000 MOPS / 250 MB = 800 OPS/Byte.
    - 800 OPS/Byte < 1,342 OPS/Byte.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound (Memory-Bound)**. The layer's AI is lower than the hardware ridge point, meaning it will hit the memory bandwidth ceiling first.
  options:
  - Compute-bound, because its Arithmetic Intensity (800 Ops/Byte) is greater than the Ridge Point.
  - Memory-bound, because the model's Arithmetic Intensity (800 Ops/Byte) is less than the Orin's Ridge Point (~1342 Ops/Byte).
  - Compute-bound, because 200 GOPS is a very large number of operations.
  - Memory-bound, because 250 MB is larger than the Orin's cache.
  correct_index: 1
