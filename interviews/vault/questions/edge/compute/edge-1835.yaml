title: Optimizing INT8 Matrix Multiplication on NVIDIA Jetson Orin
scenario: You are optimizing a critical INT8 matrix multiplication (GEMM) layer within a deep learning inference pipeline running on an edge accelerator. Your profiling indicates this GEMM operation is significantly underperforming, not fully utilizing the available hardware capabilities.
question: How would you optimize the underperforming INT8 GEMM on an edge accelerator for Tensor Core utilization, coalescing, and occupancy?
details:
  realistic_solution: 'To maximize Tensor Core utilization, ensure input/output tensors are aligned to hardware-friendly dimensions and data types (INT8). Employ specialized kernels leveraging MMA/WGMMA instructions. For memory coalescing, design access patterns so threads within a warp access contiguous global memory locations via tiling into shared memory. To improve occupancy, carefully tune thread block sizes and register usage to allow sufficient warps per SM to hide memory access latencies.'
  common_mistake: |
    **The Pitfall:** Neglecting data alignment requirements or failing to optimize for memory coalescing.
    **The Rationale:** Assuming the compiler will automatically optimize memory access patterns for custom kernels without explicit shared memory tiling.
    **The Consequence:** Suboptimal kernel configurations that cause high memory access latency, low occupancy, and severe underutilization of peak TOPS.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak compute: 275 TOPS (INT8).
    - Memory Bandwidth: 204.8 GB/s.
    - Naive GEMM Traffic: 3 bytes transferred per INT8 MAC (no reuse).

    **Calculations:**
    - Max bandwidth-limited throughput: 204.8 GB/s / 3 bytes/MAC = 68.26 Giga-INT8-Ops/s (GOPS).
    - Utilization limit: 68.26 GOPS / 275,000 GOPS = 0.024% utilization.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth Bound**. Without aggressive data reuse strategies (tiling via shared memory) to increase arithmetic intensity, the GEMM stalls hopelessly far below the 275 TOPS peak.
