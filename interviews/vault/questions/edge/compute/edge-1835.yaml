title: Optimizing INT8 Matrix Multiplication on an Edge Accelerator
scenario: You are optimizing a critical INT8 matrix multiplication (GEMM) layer within a deep learning inference pipeline running on an edge accelerator. Your profiling indicates this GEMM operation is significantly underperforming, not fully utilizing the available hardware capabilities.
question: How would you optimize the underperforming INT8 GEMM on an edge accelerator for Tensor Core utilization, coalescing, and occupancy?
details:
  realistic_solution: Maximize Tensor Core utilization by using INT8 matrix shapes aligned to the accelerator's MMA tile requirements, vectorized loads, and accumulator layouts that avoid extra conversion kernels. Stage A and B tiles in shared memory so each global-memory load feeds many MMA operations, and arrange thread mappings so warp lanes issue coalesced contiguous loads. Tune block dimensions, register use, shared-memory double buffering, and pipeline depth so enough warps remain resident to hide memory latency without starving the MMA issue slots.
  common_mistake: |
    **The Pitfall:** Neglecting data alignment requirements or failing to optimize for memory coalescing.
    **The Rationale:** Assuming the compiler will automatically optimize memory access patterns for custom kernels without explicit shared memory tiling.
    **The Consequence:** Suboptimal kernel configurations that cause high memory access latency, low occupancy, and severe underutilization of peak TOPS.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak compute: 275 TOPS (INT8 quoted operations).
    - Memory Bandwidth: 204.8 GB/s.
    - Deliberately naive GEMM traffic: 3 bytes transferred per INT8 MAC with no reuse, used only to show why tiling is mandatory.

    **Calculations:**
    - Max bandwidth-limited MAC rate without reuse: 204.8 GB/s / 3 bytes/MAC = 68.26 GMAC/s.
    - Depending on whether quoted TOPS count one MAC as one operation or two, this corresponds to only about 68 to 137 GOPS of useful work.
    - Compared with 275,000 GOPS peak, the no-reuse bandwidth ceiling is far below 0.1% of peak, before occupancy or scheduling effects are considered.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth Bound without reuse**. The quantitative takeaway is not the exact percentage; it is that shared-memory tiling, coalesced vector loads, double buffering, and enough resident MMA work are required before Tensor Core occupancy can approach the 275 TOPS peak.
