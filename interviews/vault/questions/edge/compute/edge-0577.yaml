title: The Perception Pipeline Performance Cliff
scenario: Your autonomous vehicle team has a perception model running on a Jetson AGX Orin, comfortably meeting its 30 FPS (33ms) deadline. To improve detection range, the team retrains the model on 1080p video instead of 720p. The model architecture is identical. The input data increases by 2.25x. The team's white-paper estimate predicts a 2.25x slowdown, targeting a new latency of ~75ms (~13 FPS). Instead, latency explodes to 200ms (~5 FPS). Nsight Systems confirms the GPU is now memory-bandwidth-limited.
question: Why did moving the identical model from 720p to 1080p cause latency to non-linearly explode to 200ms instead of the predicted ~75ms?
details:
  realistic_solution: |
    The team's estimate was flawed because it assumed the model would remain compute-bound after the 2.25x pixel increase. At 1080p, the larger intermediate activations pushed working sets beyond cache and fusion-friendly tile sizes, so kernels that previously reused data locally now spill intermediate feature maps through DRAM. The result is memory-bandwidth saturation: each layer does more activation reads/writes, loses some kernel fusion benefits, and stalls waiting on memory. That extra activation traffic explains why latency jumps toward 200ms instead of scaling linearly to the expected ~75ms.
  common_mistake: |
    **The Pitfall:** Assuming linear compute scaling with input size.
    **The Rationale:** Engineers assume a 2.25x increase in pixels leads to exactly a 2.25x increase in compute work.
    **The Consequence:** They fail to anticipate kernel fusion failures when intermediate tensors suddenly exceed the L2 cache size, causing catastrophic spilling.
  napkin_math: |
    **Assumptions & Constraints:**
    - 720p input is 0.92M pixels, 1080p is 2.07M pixels (2.25x increase).
    - The 720p pipeline took about 33ms and was mostly compute-bound.
    - Linear pixel scaling predicts 33ms * 2.25 = ~74ms at 1080p.
    - At 1080p, loss of fusion and spilling adds roughly 25GB of extra activation traffic across the frame.
    - DRAM bandwidth is 204.8 GB/s.

    **Calculations:**
    - Bandwidth-limited spill time = 25GB / 204.8GB/s = 0.122s = 122ms at peak bandwidth.
    - Real kernels do not sustain peak bandwidth while also scheduling compute and synchronization, so 120-130ms of added memory pressure is plausible.
    - Total observed latency = ~75ms scaled compute path + ~125ms memory/fusion overhead = ~200ms.

    **Conclusion & Interpretation:**
    - **Result: ~200ms total latency (Memory-Bound)**. The 1080p model is not just doing 2.25x more math; it is moving much more intermediate activation data through DRAM after losing cache locality and fusion, which creates the non-linear cliff.
