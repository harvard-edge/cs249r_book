title: Optimizing Transformer Inference on Qualcomm Cloud AI 100
scenario: You are tasked with optimizing the inference latency of a transformer's key attention layer on the Qualcomm Cloud AI 100, which features 32 GB LPDDR4x memory, 400 TOPS INT8 performance, and a 75W power envelope. The layer involves large INT8 matrix multiplications, so the deployment must use AI 100-supported compiler mappings, data layouts, tiling, and on-chip buffering rather than GPU-specific CUDA concepts.
question: How would you optimize transformer attention GEMMs on Cloud AI 100 using data layout, tiling, on-chip buffers, and INT8 units?
details:
  realistic_solution: |
    Use the Cloud AI 100 compiler/runtime path for fully INT8 attention GEMMs, choosing supported matrix layouts and tile sizes that feed the accelerator's INT8 matrix units efficiently. Keep Q, K, V, and intermediate attention tiles in on-chip buffers where possible, minimize LPDDR traffic through batching and layout transforms, and profile compiler reports plus runtime counters for matrix-unit utilization, memory bandwidth, and thermal or power throttling. Stay within 75W by preferring supported INT8 kernels and avoiding host fallback or unsupported custom GPU-style kernels.
  common_mistake: |
    **The Pitfall:** Ignoring data layout and assuming peak TOPS translates directly to attention latency.
    **The Rationale:** Candidates apply GPU launch concepts to an inference accelerator instead of using supported compiler mappings, tiling, and buffer reuse.
    **The Consequence:** The INT8 matrix units starve for data or the graph falls back to slower host execution, causing poor utilization and missed latency targets.
  napkin_math: |
    **Assumptions & Constraints:**
       - Qualcomm Cloud AI 100: 400 TOPS INT8, 85 GB/s memory bandwidth assumption.
       - Attention GEMM requires about 100 GOPS.
       - Example dimensions: M = N = K = 3684, so 2*M*N*K ≈ 100 GOPS.
    **Calculations:**
       - Theoretical minimum compute time = 100e9 operations / 400e12 operations/s = 0.25 ms.
       - INT8 input reads = M*K + K*N = 27.1 MB.
       - INT32 output write before requantization = 4*M*N = 54.3 MB.
       - Total minimum data movement = 81.4 MB.
       - Memory service time = 81.4 MB / 85,000 MB/s = 0.96 ms.
    **Conclusion & Interpretation:**
       - **Result: 0.25 ms compute floor vs about 0.96 ms minimum memory service.** The estimate points to a memory-sensitive GEMM, so tiling, on-chip reuse, and supported INT8 layouts are required before peak TOPS can matter.
