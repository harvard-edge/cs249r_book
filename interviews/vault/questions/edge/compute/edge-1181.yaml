title: TinyBERT Inference Bottleneck on Jetson Orin DLA
scenario: You must calculate the inference latency breakdown for TinyBERT (14.5M params, INT8, 4 layers, hidden=312) on Jetson Orin DLA at batch=4, seq=64. Break down by attention computation, FFN computation, and memory bandwidth.
question: Which is the bottleneck?
details:
  realistic_solution: Compare estimated compute time against estimated memory-transfer time. For TinyBERT at batch=4 and seq=64, the dense projection and FFN matmuls dominate the layer FLOPs. Standard transformer estimates give about 2.41G FLOPs across 4 layers, or roughly 0.219ms at 11 TOPS INT8. The model weights are 14.5MB INT8 and activation/intermediate traffic adds only a few MB for this batch and sequence length, so the bandwidth time is about 0.08-0.10ms at 200GB/s. Compute time is larger, so the bottleneck is compute, with FFN and projection matmuls dominating.
  common_mistake: |
    **The Pitfall:** Treating the entire transformer as a single operation.
    **The Rationale:** Candidates fail to decompose the architecture into blocks, missing that different components have distinct arithmetic intensities.
    **The Consequence:** Inaccurate latency estimations and failure to identify the true execution bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - TinyBERT layer: batch=4, seq=64.
    - Jetson Orin DLA: 11 TOPS INT8, 200GB/s bandwidth.

    **Calculations:**
    - QKV+O projection FLOPs per layer: 4 matrices * 2 * B * S * H * H = 4 * 2 * 4 * 64 * 312 * 312 = 199.4M.
    - Attention score and value FLOPs per layer: 2 passes * 2 * B * S * S * H = 2 * 2 * 4 * 64 * 64 * 312 = 20.4M.
    - FFN FLOPs per layer: 2 matmuls * 2 * B * S * H * 1200 = 2 * 2 * 4 * 64 * 312 * 1200 = 383.4M.
    - Total per layer: 199.4M + 20.4M + 383.4M = 603.2M FLOPs.
    - Total for 4 layers: 603.2M * 4 = 2.41G FLOPs.
    - Compute time: 2.41G / 11T = 0.219ms.
    - Weight bandwidth lower bound: 14.5MB / 200GB/s = 0.073ms.
    - With activation/intermediate traffic of a few MB, bandwidth time is still roughly 0.08-0.10ms.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound**. Estimated compute latency (~0.219ms) exceeds bandwidth latency (~0.08-0.10ms), with FFN and projection matmuls dominating the layer.
