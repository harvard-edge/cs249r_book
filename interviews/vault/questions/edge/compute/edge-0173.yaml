title: The Edge Compute Ceiling
scenario: A team is considering an OTA update to deploy a new object detection model to a fleet of autonomous retail cameras.
question: Before analyzing the model architecture, what is the advertised peak INT8 compute performance of a single Jetson AGX Orin device?
details:
  realistic_solution: The Jetson AGX Orin provides a peak performance of 275 TOPS for INT8 operations. This number represents the theoretical maximum throughput and is the first and most important check for model deployment feasibility on the edge. If a model's required operations per second exceed this, it cannot be deployed without significant modification.
  common_mistake: |
    **The Pitfall:** Confusing edge accelerator TOPS with datacenter GPU compute limits.
    **The Rationale:** Engineers anchor on specs from high-end GPUs (like H100's ~2,000 TOPS) or misremember capabilities across the edge portfolio.
    **The Consequence:** Bypassing architectural feasibility checks, leading to downstream realization that the model physically cannot run in real-time.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Real-time latency budget: 33ms (~30 FPS). Peak device capacity: 275 TOPS.
    2. **Calculations:**
       - Per-frame compute budget = 275 TOPS / 30 FPS = ~9.17 TOPs/frame.
    3. **Conclusion & Interpretation:**
       - **Result: 9.17 Trillion Operations Limit.** Any model requiring more than ~9 TOPs per forward pass will fundamentally miss the 30 FPS deadline on this hardware.
  options:
  - 26 TOPS
  - 989 TOPS
  - 275 TOPS
  - 100 TOPS
  correct_index: 2
