title: Diagnose Systolic Array Pipeline Stall on Coral Edge TPU
scenario: A MobileNetV3 model on an edge TPU achieves 380 FPS on standard benchmarks but drops to 45 FPS when a depthwise separable convolution layer uses dilation rate 4. The dilated convolution creates a non-contiguous memory access pattern.
question: Why does rate-4 dilation drop the model's FPS so drastically, and how would you fix it?
details:
  realistic_solution: Rate-4 depthwise dilation keeps the MAC count nearly unchanged, but it changes the access pattern from dense contiguous windows to sparse gathers over a 9x9 receptive field. Edge TPU convolution paths are optimized for supported dense depthwise separable kernels; dilated depthwise convolution may be unsupported, lowered into a slower form, or executed with poor DMA coalescing. The 380 FPS to 45 FPS drop is therefore a layout/operator-support problem rather than an 8.4x FLOP increase. The practical fix is to remove or replace the dilated layer, restructure the model with supported dense kernels or pooling, or explicitly place that layer on CPU/GPU if accuracy requires it.
  common_mistake: |
    **The Pitfall:** Blaming dilation for increasing the number of FLOPs.
    **The Rationale:** Candidates misunderstand that a dilated convolution has the exact same number of MAC operations as a standard convolution.
    **The Consequence:** Attempting to prune or reduce FLOPs instead of fixing the memory access pattern.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Dilated depthwise convolution has the same 3x3 MAC count as standard depthwise convolution.
       - Input payload example: 224 * 224 * 64 * 1 byte = 3.2 MB.
       - Rate-4 dilation samples positions {0, 4, 8}, creating sparse gathers across a 9x9 receptive field.
    2. **Calculations:**
       - The FLOP count does not explain 380 / 45 = 8.4x lower FPS.
       - A simple 4x bandwidth penalty would not by itself justify the full application-level drop.
       - The larger regression is consistent with an unsupported or poorly optimized dilated depthwise path causing non-contiguous DMA and fallback/lowering overhead.
    3. **Conclusion & Interpretation:**
       - **Result: Operator-support and memory-layout bottleneck.** Fix by replacing the dilated depthwise convolution with Edge-TPU-friendly dense operations, restructuring the model, or isolating that layer on another processor.
