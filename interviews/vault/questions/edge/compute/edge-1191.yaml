title: Diagnose Systolic Array Pipeline Stall on Coral Edge TPU
scenario: A MobileNetV3 model on an edge TPU achieves 380 FPS on standard benchmarks but drops to 45 FPS when a depthwise separable convolution layer uses dilation rate 4. The dilated convolution creates a non-contiguous memory access pattern.
question: Why does rate-4 dilation drop the model's FPS so drastically, and how would you fix it?
details:
  realistic_solution: 'Dilated conv with rate 4: kernel samples at positions {0, 4, 8} in each dimension. For a 224x224 input with rate 4: the 3x3 dilated kernel accesses a 9x9 receptive field with stride 4 between samples. In systolic array: weights are contiguous (loaded once), but input data requires strided gather from SRAM. Stride-4 gather: effective memory bandwidth = peak / 4 = 25 GB/s / 4 = 6.25 GB/s. Input per layer: 224x224x64x1B = 3.2MB. Time: 3.2MB / 6.25 GB/s = 512µs per layer vs 128µs contiguous. 4x slowdown matches 380/45 = 8.4x (multiple dilated layers compound). Fix: re-layout input tensor with gather pre-processing on host CPU, or use im2col to make access contiguous before TPU submission.'
  common_mistake: |
    **The Pitfall:** Blaming dilation for increasing the number of FLOPs.
    **The Rationale:** Candidates misunderstand that a dilated convolution has the exact same number of MAC operations as a standard convolution.
    **The Consequence:** Attempting to prune or reduce FLOPs instead of fixing the memory access pattern.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Stride-4 memory gather reduces effective bandwidth by 4x. Contiguous BW: 25 GB/s. Dilated BW: ~6.25 GB/s. Input payload: 3.2MB.
    2. **Calculations:**
       - Contiguous time: 3.2MB / 25 GB/s = 128µs.
       - Dilated time: 3.2MB / 6.25 GB/s = 512µs.
       - Overhead per layer: 512µs - 128µs = 384µs.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound Bottleneck.** The non-contiguous gather operations starve the systolic array. A host-side im2col pre-processing step is required to restore contiguous memory access.
