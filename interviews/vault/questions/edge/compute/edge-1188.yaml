title: Jetson Orin KV Cache and INT4 Model Size Budget at 2.5 ms/token
scenario: A transformer model is being sized for deployment on Jetson Orin (32GB LPDDR5, 102.4GB/s, 275 TOPS INT8) to meet a decode latency < 2.5ms/token at a context length of 128 tokens, with 5 concurrent users, using INT4 quantization for both weights and KV cache. The model architecture has 24 layers, 16 KV heads, and head_dim=64.
question: What is the correct KV cache size and max INT4 model size after reserving KV for 5 users at context 128?
details:
  realistic_solution: |
    The INT4 KV cache uses 24,576 bytes per token per user, so each 128-token user needs about 3.15 MB and 5 users reserve about 15.7 MB of KV cache capacity. For the 2.5ms/token bandwidth budget, treat decode traffic separately from this static footprint: reading the 128-token KV history and writing one new KV entry for all 5 users costs about 15.85 MB per decode step. That leaves about 240 MB of the 256 MB/token bandwidth budget for streamed INT4 weights, or roughly 480 million INT4 parameters.
  common_mistake: |
    **The Pitfall:** Ignoring the KV cache memory bandwidth requirement entirely.
    **The Rationale:** Candidates often size models based purely on static weight footprint and static weight streaming limits.
    **The Consequence:** When deployed with 5 concurrent users, the dynamically expanding KV cache consumes significant bandwidth, causing the system to miss the strict 2.5ms latency target.
  napkin_math: |
    **Assumptions & Constraints:**
    - Context length: 128. Number of users: 5.
    - Latency limit: 2.5ms/token at 102.4 GB/s.

    **Calculations:**
    - KV per token per user: 2 (K&V) * 24 layers * 16 heads * 64 dim * 0.5 bytes (INT4) = 24,576 bytes.
    - KV per user at context=128: 24,576 * 128 = 3.15 MB. For 5 users: 15.7 MB total KV cache footprint.
    - Decode bandwidth budget per step (2.5ms at 102.4 GB/s): 102.4 * 10⁹ * 0.0025 = 256 MB.
    - KV decode traffic per step for 5 users: 5 * 24,576 * (128 reads + 1 write) = 15.85 MB.
    - Weight bandwidth budget per step: 256 MB - 15.85 MB = 240.15 MB.
    - Max INT4 parameters: 240.15 MB / 0.5 bytes/param = about 480 million parameters.

    **Conclusion & Interpretation:**
    - **Result: 15.7 MB total KV footprint and about 480M INT4 parameters (Memory-Bound).** Static KV capacity and per-step KV traffic must be accounted for separately.
