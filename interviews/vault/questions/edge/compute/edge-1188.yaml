title: 'Edge Transformer Cost Specification: Design Edge Transformer SLO'
scenario: A transformer model is being sized for deployment on Jetson Orin (32GB LPDDR5, 102.4GB/s, 275 TOPS INT8) to meet a decode latency < 2.5ms/token at a context length of 128 tokens, with 5 concurrent users, using INT4 quantization for both weights and KV cache. The model architecture has 24 layers, 16 KV heads, and head_dim=64.
question: What is the correct KV cache size and max INT4 model size after reserving KV for 5 users at context 128?
details:
  realistic_solution: 'First, calculate the KV cache size for 5 users. Then, determine the maximum memory bandwidth allowed by the 2.5ms latency constraint. Subtract the KV cache bandwidth requirement to find the remaining weight bandwidth headroom. Finally, use the remaining headroom to calculate the maximum number of INT4 parameters that can be streamed per token generation step.'
  common_mistake: |
    **The Pitfall:** Ignoring the KV cache memory bandwidth requirement entirely.
    **The Rationale:** Candidates often size models based purely on static weight footprint and static weight streaming limits.
    **The Consequence:** When deployed with 5 concurrent users, the dynamically expanding KV cache consumes significant bandwidth, causing the system to miss the strict 2.5ms latency target.
  napkin_math: |
    **Assumptions & Constraints:**
    - Context length: 128. Number of users: 5.
    - Latency limit: 2.5ms/token at 102.4 GB/s.

    **Calculations:**
    - KV per token: 2 (K&V) * 24 layers * 16 heads * 64 dim * 0.5 bytes (INT4) = 24,576 bytes.
    - KV per user at context=128: 24,576 * 128 = ~3.14 MB. For 5 users: ~15 MB total KV cache.
    - Decode bandwidth budget per step (2.5ms at 102.4 GB/s): 102.4 * 10⁹ * 0.0025 = 256 MB.
    - Weight budget: 256 MB - 15 MB = 241 MB.
    - Max INT4 parameters: 241 MB / 0.5 bytes/param = 482 million parameters.

    **Conclusion & Interpretation:**
    - **Result: 482 million parameters (Memory-Bound)**. The KV cache uses critical bandwidth, constraining the maximum model size to 482M parameters.
