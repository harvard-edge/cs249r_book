title: Multi-Model Dataflow Compute and PCIe Bandwidth Estimation
scenario: 'You are designing the perception compute architecture for an autonomous drone using a single Hailo-8 dataflow accelerator. The drone must run three concurrent 8-bit quantized vision pipelines on a single 1080p camera stream: an object detector, a depth estimator, and a semantic segmenter, all operating at 30 FPS. Because the Hailo-8 lacks local DRAM and streams directly from host memory over a PCIe connection, you must design a unified dataflow pipeline that prevents host memory bottlenecks.'
question: How would you fuse the detector, depth estimator, and segmenter on Hailo-8, and what host bandwidth and compute utilization would result?
details:
  realistic_solution: An L6+ engineer will recognize that in a pure dataflow architecture streaming from host memory, PCIe I/O is the limiting factor. The required solution is to co-compile the three models into a single unified spatial graph. By doing this, the Hailo-8 maps the combined weights to its distributed on-chip SRAM, meaning only the initial raw image enters the chip and only the final small output tensors leave it, entirely eliminating intermediate host memory streaming.
  common_mistake: |
    **The Pitfall:** Treating the system like a traditional GPU and sequentially executing models.
    **The Rationale:** Candidates verify GOPS fits within the 26 TOPS limit, entirely ignoring the architectural constraint of "no local DRAM".
    **The Consequence:** Executing models sequentially forces massive intermediate feature map streaming over PCIe, instantly bottlenecking the system on host I/O.
  napkin_math: |
    **Assumptions & Constraints:**
    - Single Hailo-8 (26 TOPS).
    - Three models: Detector (40 GOPS), Depth (15 GOPS), Segmenter (10 GOPS).
    - Target: 30 FPS on 1080p camera stream (6.22 MB/frame).

    **Calculations:**
    - Compute per frame: 40 + 15 + 10 = 65 GOPS.
    - Total compute at 30 FPS: 65 GOPS x 30 = 1,950 GOPS = 1.95 TOPS.
    - Compute Utilization: 1.95 TOPS / 26 TOPS = 7.5%.
    - Fused Memory I/O per frame: 6.22 MB (input) + ~1.78 MB (outputs) = 8.0 MB.
    - Required Host PCIe Bandwidth: 8.0 MB/frame x 30 FPS = 240 MB/s.

    **Conclusion & Interpretation:**
    - **Result: Fused Graph Optimization (I/O-Bound).** Fusing models reduces PCIe bandwidth to 240 MB/s and compute utilization to 7.5%, avoiding host memory bottlenecks.
