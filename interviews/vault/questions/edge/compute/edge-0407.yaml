title: Roofline Inference Latency on Jetson Orin
scenario: 'You need to deploy YOLOv8n (6.3 GOPs, 3.2M parameters, INT8 quantized, ~21.2 MB memory traffic per inference) on a Jetson Orin NX. The Orin NX GPU has 32 Tensor Cores delivering 100 TOPS INT8 and 102.4 GB/s LPDDR5 bandwidth.'
question: Using the roofline model, what inference latency do you estimate, and is YOLOv8n compute-bound or memory-bound on the Orin NX?
details:
  realistic_solution: The roofline model requires computing both the compute time and the memory time, then taking the maximum. Compute time uses peak TOPS, while memory time uses memory bandwidth.
  common_mistake: |
    **The Pitfall:** Ignoring the memory bandwidth side of the roofline model.
    **The Rationale:** Candidates simply divide GOPs by TOPS, assuming all models operate perfectly at peak compute capacity.
    **The Consequence:** Drastically underestimating latency and failing to realize that the model is entirely starved for memory bandwidth.
  napkin_math: |
    **Assumptions & Constraints:**
    - YOLOv8n requires 6.3 GOPs and 21.2 MB memory traffic.
    - Hardware yields 100 TOPS peak compute and 102.4 GB/s bandwidth.

    **Calculations:**
    - Compute Time = 6.3 GOPs / 100 TOPS = 0.063ms.
    - Memory Time = 21.2 MB / 102.4 GB/s = 0.207ms.
    - Arithmetic Intensity = 6.3 GOPs / 21.2 MB = 297 OPs/byte.
    - Ridge Point = 100e12 / 102.4e9 = 976 OPs/byte.

    **Conclusion & Interpretation:**
    - **Result: Latency is 0.207ms and model is strictly Memory-Bound (Memory-Bound)**. Intensity (297) < ridge point (976).
  options:
  - '0.063ms, compute-bound'
  - '0.207ms, compute-bound'
  - '0.207ms, memory-bound'
  - '0.063ms, memory-bound'
  correct_index: 2
