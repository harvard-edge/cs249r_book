title: The EfficientNet Power Trap
scenario: You are a Staff ML Systems Engineer on an autonomous vehicle team. Your perception module runs on an edge accelerator with a strict 30W thermal and power budget. Your current perception model is running within this budget. A modeling scientist proposes replacing a key component with a new 'efficient' architecture based on depthwise separable convolutions, reducing FLOPs by 3x. After integration, end-to-end frame latency increases by 25% and the system still draws the maximum 30W.
question: Why is a model with 3x fewer operations running slower and consuming the same amount of power?
details:
  realistic_solution: 'The root cause is a misunderstanding of the roofline model. The original model had more FLOPs but was compute-bound. The new model has a much lower Arithmetic Intensity and is memory-bound. The 30W budget is spent on inefficient memory access, yielding fewer operations per second.'
  common_mistake: Assuming fewer FLOPs automatically translates to lower latency and power, failing to analyze memory bandwidth bottlenecks via Roofline Analysis.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original model: High arithmetic intensity, compute-bound
    - Efficient model: 3x fewer FLOPs, low arithmetic intensity
    - 30W thermal limit

    **Calculations:**
    - Arithmetic Intensity drops significantly due to depthwise layers
    - Memory accesses per FLOP increase massively
    - Power is dominated by LPDDR off-chip transfers rather than core ALU execution

    **Conclusion & Interpretation:**
    - **Result: Memory Stalls (Memory-Bandwidth-Bound)**. The reduction in compute shifted the bottleneck to memory, consuming the entire power budget on data movement and causing higher overall latency.
