title: The EfficientNet Power Trap
scenario: You are a Staff ML Systems Engineer on an autonomous vehicle team. Your perception module runs
  on an edge accelerator with a strict 30W thermal and power budget. Your current perception model is
  running within this budget. A modeling scientist proposes replacing a key component with a new 'efficient'
  architecture based on depthwise separable convolutions, reducing FLOPs by 3x. After integration, end-to-end
  frame latency increases by 25% and the system still draws the maximum 30W.
question: Why is a model with 3x fewer operations running slower and consuming the same amount of power?
details:
  realistic_solution: The EfficientNet model reduces FLOPs by 3x but dramatically lowers the arithmetic
    intensity. The original model was compute-bound, but the new model is memory-bound. On a 30W system,
    reading the necessary 10MB of weights and activations at a low arithmetic intensity stalls the ALUs.
    The entire 30W budget is wasted on off-chip LPDDR memory transfers rather than useful computation,
    increasing overall latency.
  common_mistake: '**The Pitfall:** Assuming fewer FLOPs automatically translates to lower latency and
    power.

    **The Rationale:** Candidates often equate operation count with efficiency, failing to consider memory
    bandwidth bottlenecks via Roofline Analysis.

    **The Consequence:** They deploy ''efficient'' models that end up running slower and consuming the
    maximum power budget due to excessive memory stalls.'
  napkin_math: '**Assumptions & Constraints:**

    - Thermal limit: 30W

    - Memory Bandwidth: 50 GB/s

    - Data Movement per pass: 10 MB

    - Depthwise FLOPs: 1 GFLOP


    **Calculations:**

    - Arithmetic Intensity: 1 GFLOP / 10 MB = 100 FLOPs/Byte.

    - Memory Time: 10 MB / 50 GB/s = 0.2 ms per pass.

    - Compute Time: At 5 TOPS, 1 GFLOP takes 0.2 ms, meaning execution is perfectly memory-bound or stalling.


    **Conclusion & Interpretation:**

    - **Result: Memory Stalls (Memory-Bandwidth-Bound)**. The reduction in compute shifted the bottleneck
    to memory, consuming the entire power budget on data movement and causing higher overall latency.'
