title: The DLA vs GPU Partition
scenario: 'The Jetson Orin has both a GPU and two DLA (Deep Learning Accelerator) engines. Your colleague runs an entire object detection and tracking pipeline on the GPU and gets 27 FPS. You suggest splitting the models: detection backbone on the DLA, tracking on the GPU. Your colleague says ''that''s more complex for no benefit — the GPU is faster.'''
question: Is your colleague right?
details:
  realistic_solution: 'Your colleague is right that the GPU alone is faster for a *single model*. But the DLA and GPU can execute concurrently — they are independent compute engines, though they share the same LPDDR5 memory bus and MMU. If you run the backbone on the DLA (15ms) while the GPU runs a tracking model (8ms), both execute in parallel. The detection head then runs on the GPU (5ms) after the DLA finishes. The caveat: because DLA and GPU share memory bandwidth, running both simultaneously increases individual latencies by 10-20% due to DRAM contention. Adjusted: DLA backbone ~17ms (parallel with GPU tracker ~9ms) + GPU head 5ms = 22ms. Still much better than sequential GPU: 28 + 8 = 36ms. The DLA/GPU split gives ~1.6× higher pipeline throughput by exploiting hardware parallelism, even accounting for bandwidth contention. The benefit is largest when at least one workload is compute-bound rather than memory-bound.'
  common_mistake: |
    **The Pitfall:** Believing the GPU is always faster and should run the entire pipeline alone.
    **The Rationale:** Candidates correctly note the GPU has more raw TOPS but ignore the independent execution capabilities of the DLA.
    **The Consequence:** Wasting the DLA's compute potential, reducing overall pipeline throughput and increasing energy consumption.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPU-only pipeline: detection (28ms) + tracking (8ms) = 36ms.
       - DLA backbone: 15ms. GPU tracker: 8ms. GPU head: 5ms.
       - Memory bandwidth contention penalty: ~10-20% when running in parallel.
    2. **Calculations:**
       - GPU-only latency = 28ms + 8ms = 36ms (~27 FPS).
       - DLA+GPU concurrent execution latency (with 15% contention) = DLA 17ms (hides GPU 9ms) + GPU head 5ms = 22ms.
       - Energy (DLA+GPU) = 20W * 22ms = 0.44 Joules.
       - Energy (GPU-only) = 15W * 36ms = 0.54 Joules.
    3. **Conclusion & Interpretation:**
       - **Result: 1.6x faster and 19% less energy.** Splitting the model across heterogeneous engines optimizes what is heavily a **Compute-Bound** pipeline.
