title: 'Edge TPU Systolic Dataflow for Depthwise Convolutions'
scenario: 'You are designing a real-time tracking system for a drone using an Edge TPU accelerator. The model uses novel lightweight convolution blocks that map poorly to standard dense systolic arrays, causing low MAC utilization.'
question: 'How would you redesign dataflow, tiling, and operators so the drone tracker fully uses the TPU without CPU fallbacks?'
details:
  realistic_solution: 'Reformulate the network to prioritize pointwise (1x1) convolutions that perfectly utilize the systolic array, and restructure the dataflow to minimize SRAM reads. Enforce strict INT8 quantization to guarantee 100% on-chip execution, designing a tiling schema that hides the transfer latency.'
  common_mistake: |
    **The Pitfall:** Assuming standard weight-stationary dataflows will be efficient for depthwise convolutions.
    **The Rationale:** Candidates treat all convolutions equally and ignore how depthwise ops severely underutilize dense systolic arrays.
    **The Consequence:** MAC utilization plummets and the system bottleneck shifts to the slow host interface due to poor tiling.
  napkin_math: |
    **Assumptions & Constraints:**
    - Edge TPU: 4 TOPS INT8 at 2W.
    - Model requirement: 100 GOPS/frame.

    **Calculations:**
    - Theoretical max throughput: 4,000 GOPS / 100 GOPS = 40 FPS.
    - Poor utilization scenario: 20% systolic array utilization drops effective TOPS to 0.8 (yielding only 8 FPS).
    - Optimized scenario: Restructuring to 1x1 convolutions pushes utilization to 80% (effective 3.2 TOPS = 32 FPS).

    **Conclusion & Interpretation:**
    - **Result: 32 FPS (Utilization-Bound)**. Optimized tiling achieves 32 FPS while remaining strictly within the 2W power envelope.
