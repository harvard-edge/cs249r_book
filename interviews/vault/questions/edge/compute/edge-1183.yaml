title: 'Edge Transformer Cost Mastery: Quantization Tradeoff for Edge Deployment'
scenario: 'Evaluate the full quantization tradeoff for deploying LLaMA-3-8B on Jetson Orin (32GB LPDDR5, 102.4GB/s) at FP16, INT8, INT4, and INT2. For each: calculate memory footprint, decode throughput, P99 latency at 10 req/s, and accuracy loss.'
question: Which quantization level is Pareto-optimal for LLaMA-3-8B on Jetson Orin under P99 <1s and <3% accuracy loss?
details:
  realistic_solution: |
    FP16: 16GB. Decode lower bound: 16GB/102.4GB/s = 156ms/token. At 10 req/s, rho = 10 * 0.156 = 1.56, so the queue is unstable and FP16 fails. INT8: 8GB, 78ms/token, rho = 0.78. Approximate M/D/1 mean response is 216ms and a rough exponential-tail P99 estimate is about 995ms, with about 1% accuracy loss. INT4: 4GB, 39ms/token, rho = 0.39. Mean response is about 51.5ms and rough P99 is about 237ms, with about 2-3% accuracy loss. INT2: 2GB, 19.5ms/token, rho = 0.195. Mean response is about 21.9ms and rough P99 is about 101ms, but expected accuracy loss is greater than 3% and practical kernel support may be poor, so it fails the stated quality constraint. Under P99 <1s and <3% accuracy loss, INT8 and INT4 are Pareto-optimal tradeoffs; recommend INT4 only if validation confirms accuracy loss stays within the 3% budget.
  common_mistake: |
    **The Pitfall:** Assuming throughput scales linearly with quantization bit reduction.
    **The Rationale:** Candidates ignore that INT2 may require specialized kernels not available in standard frameworks, and INT4 dequantization overhead reduces expected gains.
    **The Consequence:** Recommending an unsupported quantization level (INT2) that fails the accuracy SLO, or miscalculating P99 latencies for INT4/INT8.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - LLaMA-3-8B on Jetson Orin (32GB LPDDR5, 102.4 GB/s).
       - Target: P99 <1s, <3% accuracy loss, 10 req/s.
    2. **Calculations:**
       - FP16: 16GB / 102.4 GB/s = 156ms/tok. ρ = 10 * 0.156 = 1.56 (UNSTABLE).
       - INT8: 8GB / 102.4 GB/s = 78ms/tok. ρ = 10 * 0.078 = 0.78. Approx M/D/1 Wq = (0.78 * 78) / (2 * 0.22) = 138ms. Total W = 216ms. Rough P99 ≈ 4.6 * W = 995ms < 1s. Accuracy loss ≈ 1%.
       - INT4: 4GB / 102.4 GB/s = 39ms/tok. ρ = 0.39. Approx Wq = (0.39 * 39) / (2 * 0.61) = 12.5ms. Total W = 51.5ms. Rough P99 ≈ 4.6 * W = 237ms < 1s. Accuracy loss ≈ 2-3%.
       - INT2: 2GB / 102.4 GB/s = 19.5ms/tok. ρ = 0.195. Approx Wq = (0.195 * 19.5) / (2 * 0.805) = 2.4ms. Total W = 21.9ms. Rough P99 ≈ 101ms, but accuracy loss is expected to exceed 3% and kernel support is less reliable.
    3. **Conclusion & Interpretation:**
       - **Result: INT8 and INT4 are Pareto-optimal within the stated constraints; INT2 is rejected on accuracy/support.** INT4 provides much lower latency than INT8 if measured accuracy loss remains under 3%. The workload is **Memory-Bandwidth-Bound**, and the queueing P99 is an approximation for comparison, not a substitute for runtime measurement.
