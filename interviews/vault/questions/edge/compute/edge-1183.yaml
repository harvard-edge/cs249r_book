title: 'Edge Transformer Cost Mastery: Quantization Tradeoff for Edge Deployment'
scenario: 'Evaluate the full quantization tradeoff for deploying LLaMA-3-8B on Jetson Orin (32GB LPDDR5, 102.4GB/s) at FP16, INT8, INT4, and INT2. For each: calculate memory footprint, decode throughput, P99 latency at 10 req/s, and accuracy loss.'
question: Which quantization level is Pareto-optimal for LLaMA-3-8B on Jetson Orin under P99 <1s and <3% accuracy loss?
details:
  realistic_solution: 'FP16: 16GB. Decode: 16GB/102.4=156ms/step, 1 tok/step. M/D/1 at ρ=10*0.156=1.56 > 1 — unstable! Cannot handle 10 req/s at FP16. INT8: 8GB. Decode: 78ms/tok. ρ=10*0.078=0.78. Wq=(0.78*78)/(2*0.22)=60.84/0.44=138ms. W=216ms. P99=995ms < 1s ✓. Accuracy loss: ~1%. INT4: 4GB. Decode: 39ms/tok. ρ=0.39. Wq=(0.39*39)/(2*0.61)=15.21/1.22=12.5ms. W=51.5ms. P99=237ms ✓. Accuracy: 2-3%. Pareto-optimal: INT8 (1% loss, P99=995ms) or INT4 (2-3% loss, P99=237ms) both meet SLOs. Recommend INT4 for 4x lower latency at 1-2% more accuracy loss.'
  common_mistake: |
    **The Pitfall:** Assuming throughput scales linearly with quantization bit reduction.
    **The Rationale:** Candidates ignore that INT2 may require specialized kernels not available in standard frameworks, and INT4 dequantization overhead reduces expected gains.
    **The Consequence:** Recommending an unsupported quantization level (INT2) that fails the accuracy SLO, or miscalculating P99 latencies for INT4/INT8.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - LLaMA-3-8B on Jetson Orin (32GB LPDDR5, 102.4 GB/s).
       - Target: P99 <1s, <3% accuracy loss, 10 req/s.
    2. **Calculations:**
       - FP16: 16GB / 102.4 GB/s = 156ms/tok. ρ = 10 * 0.156 = 1.56 (UNSTABLE).
       - INT8: 8GB / 102.4 GB/s = 78ms/tok. ρ = 10 * 0.078 = 0.78. M/D/1 Wq = (0.78 * 78) / (2 * 0.22) = 138ms. Total W = 216ms. P99 ≈ 995ms < 1s.
       - INT4: 4GB / 102.4 GB/s = 39ms/tok. ρ = 0.39. Wq = (0.39 * 39) / (2 * 0.61) = 12.5ms. Total W = 51.5ms. P99 = 237ms < 1s.
    3. **Conclusion & Interpretation:**
       - **Result: INT4 is Pareto-optimal.** It meets the <3% loss SLO while providing a 4x better P99 latency than INT8. The workload is **Memory-Bandwidth-Bound**.
