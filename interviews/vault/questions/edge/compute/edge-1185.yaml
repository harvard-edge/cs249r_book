title: 'Edge Transformer Cost Optimization: Knowledge Distillation for Edge Deployment'
scenario: A company uses BERT-large (340M params, INT8, 340MB) for NER on a Jetson Orin GPU. The model barely fits and achieves 3 inferences/second. You are considering knowledge distillation to TinyBERT (14.5M params, INT8, 14.5MB). TinyBERT retains 98% of BERT-large F1 on NER. A 14-day distillation run on 16 H100s costs roughly $13,440.
question: What throughput, memory, accuracy, and annual savings would distilling BERT-large to TinyBERT deliver across 50 Jetson Orins?
details:
  realistic_solution: 'The optimal architecture leverages knowledge distillation to achieve a 23.4x memory footprint reduction. Post-distillation, the pipeline remains preprocessing-limited, but the massive memory headroom allows running multiple instances concurrently. If throughput increases from 3 to 9 inf/s, the fleet can be reduced from 50 to 17 Jetsons, yielding an ROI payback period of under 9 months against the $13,440 cloud GPU training cost.'
  common_mistake: |
    **The Pitfall:** Ignoring the upfront cloud compute cost of distillation.
    **The Rationale:** Candidates compare only the edge inference savings and accuracy metrics.
    **The Consequence:** The ROI calculation is incomplete, failing to account for the $10,000+ cloud GPU cost required to train the distilled model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory reduction: 340MB to 14.5MB.
    - Throughput speedup: ~3x (3 to 9 inf/s) due to preprocessing bounds.
    - Fleet reduction: 50 down to 17 units.
    - Saved unit cost: $499 hardware, $52.6/yr power.
    - Distillation cost: 14 days * 16 H100s * $2.50/hr * 24h.

    **Calculations:**
    - Hardware saved: 33 * $499 = $16,467.
    - Power saved: 33 * $52.6 = $1,736/yr.
    - Distillation cost: 14 * 16 * 2.50 * 24 = $13,440.
    - Payback period = $13,440 / ($16,467 + $1,736) = 0.738 years.

    **Conclusion & Interpretation:**
    - **Result: 0.738 years (Highly Favorable ROI).** Payback period is 8.8 months. Strong ROI.
