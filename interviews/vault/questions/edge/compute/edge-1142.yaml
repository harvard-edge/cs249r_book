title: Hailo-8 INT8 ResNet-18 Memory Footprint and Latency
scenario: You are deploying ResNet-18 (11.7M parameters, 1.8 GOPS per image) on a Hailo-8 accelerator. Hailo-8 supports INT8 inference, not FP32/FP16; any FP16 number is only a theoretical comparison against an equivalent accelerator with the same 6 GB/s memory bandwidth and 13 TFLOPS FP16 compute.
question: For batch-1 inference, using weights plus peak activation memory only, what are the FPS, latency, and memory footprint reduction for Hailo-8 INT8 versus the theoretical FP16 comparison?
details:
  realistic_solution: Use a batch-1 roofline-style estimate where latency is the larger of compute time and memory-transfer time for weights plus peak activations. INT8 memory is 11.7MB weights + 15MB activations = 26.7MB. INT8 compute time is 1.8 GOPS / 26 TOPS = 0.069ms, while memory time is 26.7MB / 6 GB/s = 4.45ms, so latency is 4.45ms and throughput is about 225 FPS. The theoretical FP16 comparison uses 23.4MB weights + 30MB activations = 53.4MB and 1.8 GFLOPS / 13 TFLOPS = 0.138ms compute; memory time is 53.4MB / 6 GB/s = 8.90ms, so latency is 8.90ms and throughput is about 112 FPS. INT8 halves the modeled footprint from 53.4MB to 26.7MB and doubles bandwidth-limited throughput under these assumptions.
  common_mistake: |
    **The Pitfall:** Confusing GFLOPS with GOPS and ignoring memory footprint reductions.
    **The Rationale:** Candidates often focus purely on compute TOPS constraints.
    **The Consequence:** Failing to realize that INT8 doubles performance primarily by halving the memory bandwidth pressure, not just by computing faster.
  napkin_math: |
    **Assumptions & Constraints:**
    - ResNet-18 params = 11.7M and workload = 1.8 GOPS per image at batch 1.
    - Footprint includes weights plus peak activations only.
    - Hailo-8 INT8: 26 TOPS, 6 GB/s memory bandwidth.
    - FP16 is a theoretical equivalent accelerator case: 13 TFLOPS, 6 GB/s memory bandwidth.

    **Calculations:**
    - INT8 footprint = 11.7MB weights + 15MB activations = 26.7MB.
    - INT8 compute time = 1.8 GOPS / 26 TOPS = 0.069ms.
    - INT8 memory time = 26.7MB / 6GB/s = 4.45ms, so latency = max(0.069, 4.45) = 4.45ms and FPS = 1000 / 4.45 = 225.
    - Theoretical FP16 footprint = 23.4MB weights + 30MB activations = 53.4MB.
    - Theoretical FP16 compute time = 1.8 GFLOPS / 13 TFLOPS = 0.138ms.
    - Theoretical FP16 memory time = 53.4MB / 6GB/s = 8.90ms, so latency = max(0.138, 8.90) = 8.90ms and FPS = 1000 / 8.90 = 112.
    - Footprint reduction = (53.4MB - 26.7MB) / 53.4MB = 50%.

    **Conclusion & Interpretation:**
    - **Result: 225 FPS and 4.45ms latency for INT8 versus 112 FPS and 8.90ms for theoretical FP16.** The comparison is memory-bandwidth bound in both cases, and INT8 gives a 50% footprint reduction for the defined weights-plus-activations footprint.
