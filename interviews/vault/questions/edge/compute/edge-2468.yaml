title: Batching Vision Transformers for TOPS Utilization
scenario: A Jetson AGX Orin is running a batch size 1 vision transformer. The profile shows 10 TOPS actual utilization.
question: Apply a system-level change to increase utilization without changing the model weights or input resolution.
details:
  realistic_solution: 'Increase the batch size to process multiple concurrent camera streams or pipeline frames if latency limits allow. This increases arithmetic intensity, hiding memory latency and driving actual MAC utilization toward the peak TOPS rating using optimizations like FlashAttention-2.'
  common_mistake: |
    **The Pitfall:** Blaming the compiler for low TOPS utilization.
    **The Rationale:** Candidates assume hardware specs dictate performance without recognizing the model is memory-bandwidth bound.
    **The Consequence:** Wasted engineering effort on low-level kernel tuning instead of fixing the fundamental arithmetic intensity.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Jetson AGX Orin
    - Model: Vision Transformer, batch size 1
    - Current utilization: 10 TOPS

    **Calculations:**
    - Arithmetic intensity (AI) = (batch_size * MACs) / (Weights + batch_size * Activations)
    - As batch_size increases, Weights memory fetch is amortized.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound at BS=1 (Memory-Bound)**. Increasing batch size raises AI, shifting the workload towards being compute-bound and increasing TOPS utilization.
