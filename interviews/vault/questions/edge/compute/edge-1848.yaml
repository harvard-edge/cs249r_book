title: Edge TPU Inference Cost and Scalability
scenario: Your team is designing a new smart camera system that needs to perform real-time object detection at 30 frames per second (FPS) per camera feed. Each camera will be equipped with a Google Coral Edge TPU, which offers 4 TOPS for INT8 operations and consumes 2W of power under load. The object detection model, once quantized to INT8, is estimated to require 100 Giga-operations (INT8 GOps) per inference.
question: How many Coral Edge TPUs are required per 30 FPS camera, and what power and operational cost implications follow?
details:
  realistic_solution: 'The candidate should calculate the total GOps required per second per camera (100 GOps/inference * 30 inferences/sec = 3000 GOps/sec = 3 TOPS/sec). Since a single Coral Edge TPU provides 4 TOPS, one TPU per camera is theoretically sufficient. They should then consider the power consumption (2W per camera) and scale this up for a fleet, calculate the aggregate power budget for a large fleet of cameras, and discussing cooling, power supply sizing, and aggregate energy costs.'
  common_mistake: |
    **The Pitfall:** Ignoring practical limitations of sustained throughput versus theoretical TOPS.
    **The Rationale:** Candidates often assume peak 4 TOPS is fully realizable without accounting for memory bandwidth or I/O overhead.
    **The Consequence:** The system is under-provisioned, leading to missed 30 FPS targets, or they neglect to calculate the aggregate power budget for a large fleet of cameras.
  napkin_math: |
    **Assumptions & Constraints:**
    - Required compute is 100 GOps/inference at 30 FPS.
    - Coral Edge TPU provides 4 TOPS at 2W power.
    - Fleet size is 1000 cameras.

    **Calculations:**
    - Required GOps/sec is 100 * 30 = 3000 GOps/sec = 3 TOPS/sec.
    - 1 TPU (4 TOPS) per camera provides ~1.33x capacity margin.
    - Total fleet power is 1000 * 2W = 2kW.

    **Conclusion & Interpretation:**
    - **Result: 2kW (Power-Bound)**. 1 TPU per camera satisfies the compute requirement, but the aggregate 2kW power draw must be factored into facility cooling.
