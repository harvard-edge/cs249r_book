title: 1x1 Convolution SRAM Dataflow for Low Latency
scenario: You are optimizing a real-time object detection pipeline for deployment on an edge dataflow accelerator. A specific, latency-critical 1x1 convolutional layer processing an intermediate feature map is observed to be a bottleneck.
question: How should on-chip SRAM and weight-stationary versus output-stationary dataflows minimize latency for the 1x1 convolution?
details:
  realistic_solution: For a 1x1 convolution, latency is usually dominated by moving feature-map tensors rather than by reusing spatial windows. Keep the small 1x1 weights resident in SRAM when they fit, stream input-channel tiles once, and accumulate output-channel tiles on chip until the partial sums are complete. If the output tile is too large for SRAM, split channels or spatial tiles so partial sums do not spill to external memory; otherwise output-stationary scheduling can reduce writeback traffic.
  common_mistake: |
    **The Pitfall:** Optimizing for external DDR memory access as if the hardware were a standard GPU.
    **The Rationale:** Candidates fall back on conventional GPU optimization paradigms, ignoring that dataflow accelerators rely on compiler-orchestrated on-chip SRAM.
    **The Consequence:** Designing inefficient data pipelines that fail to utilize internal SRAM fabric, missing performance potential.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1x1 convolution maps Cin=64 input channels to Cout=128 output channels.
    - Tile size is 32x32 pixels.
    - INT8 inputs/weights use 1 byte; INT32 partial sums use 4 bytes.

    **Calculations:**
    - Weight bytes = 64 * 128 * 1 = 8 KB, small enough to keep in SRAM.
    - Input tile bytes = 32 * 32 * 64 * 1 = 65,536 bytes = 64 KB.
    - Output partial-sum bytes = 32 * 32 * 128 * 4 = 524,288 bytes = 512 KB.
    - If partial sums spill once, extra traffic is about 512 KB read + 512 KB write = 1 MB per tile, much larger than the 8 KB weight tensor.

    **Conclusion & Interpretation:**
    - **Result: SRAM-dataflow bound.** Use weight-stationary scheduling when weights fit and output-stationary tiling when it prevents partial-sum spills; the lowest-latency choice is the one that keeps both weights and active outputs on chip.
