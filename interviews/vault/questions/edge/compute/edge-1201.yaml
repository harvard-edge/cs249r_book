title: Optimize KV Cache Quantization for Jetson Orin Memory Budget
scenario: A 7B model on Jetson Orin NX uses 3.5GB for INT4 weights, leaving 4.5GB for KV cache. The team wants to support 5 concurrent requests at 16K context each.
question: Which KV quantization lets 5 concurrent 16K-context requests fit in the 4.5GB KV budget, and what memory does it use?
details:
  realistic_solution: 'Implement an asymmetric K-INT8/V-INT4 quantization scheme. Research shows Attention Key (K) resolution is highly sensitive, while Values (V) can be aggressively compressed. This hybrid strategy maintains top-tier accuracy while satisfying the strict 4.5GB memory constraint.'
  common_mistake: |
    **The Pitfall:** Quantizing both K and V to INT4 uniformly.
    **The Rationale:** Candidates assume uniform compression is the only approach, ignoring the disparate impact of Key vs Value precision on self-attention collapse.
    **The Consequence:** The model fits in memory but exhibits catastrophic perplexity degradation and hallucination at long contexts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - KV Budget: 4.5 GB.
       - FP16 KV size/token = 131,072 bytes.
       - Workload: 5 requests * 16K tokens = 80K tokens total.
    2. **Calculations:**
       - FP16 Total = 80K * 131,072 = 10.48 GB (OOM).
       - INT8 KV (2x compress) = 10.48 / 2 = 5.24 GB (OOM).
       - K-INT8/V-INT4 (1.5 bytes total per element, 2.66x compress) = 80K * 49,152 = 3.93 GB (Fits).
       - INT4 KV (4x compress) = 10.48 / 4 = 2.62 GB (Fits, poor accuracy).
    3. **Conclusion & Interpretation:**
       - **Result: K-INT8/V-INT4 Optimal**. The asymmetric 3.93 GB footprint clears the 4.5GB budget while preserving Key distribution integrity, acting as the perfect Pareto optimization.
