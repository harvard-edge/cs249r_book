title: Optimize KV Cache Quantization for Jetson Orin Memory Budget
scenario: A 7B model on Jetson Orin NX uses 3.5GB for INT4 weights, leaving 4.5GB for KV cache. The team wants to support 5 concurrent requests at 16K context each.
question: Do any listed KV quantization choices fit 5 concurrent 16K-context requests in the 4.5GB KV budget?
details:
  realistic_solution: No listed KV quantization choice fits the stated workload. For this 32-layer, 4096-hidden model, FP16 KV uses 2 * 32 * 4096 * 2 bytes = 524,288 bytes per token, so 5 * 16K tokens would require 41.94 GB and cannot fit. Uniform INT8 uses 262,144 bytes/token, or 20.97 GB, and uniform INT4 uses 131,072 bytes/token, or 10.49 GB. Asymmetric K-INT8/V-INT4 uses 32 * 4096 * (1 + 0.5) = 196,608 bytes/token, or 15.73 GB, so it still does not fit in a 4.5 GB KV budget. The stated workload requires fewer concurrent tokens, a smaller model, more memory, paging, or a much smaller KV representation.
  common_mistake: |
    **The Pitfall:** Quantizing both K and V to INT4 uniformly.
    **The Rationale:** Candidates assume uniform compression solves the capacity problem, while also ignoring the disparate impact of Key vs Value precision on self-attention collapse.
    **The Consequence:** They recommend a KV format that still misses the stated 4.5GB budget for 5 concurrent 16K contexts and would likely degrade long-context quality.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - KV Budget: 4.5 GB.
       - Model KV shape: 32 layers, hidden=4096.
       - Workload: 5 requests * 16K tokens = 80K tokens total.
    2. **Calculations:**
       - FP16 KV bytes/token = 2 tensors (K,V) * 32 layers * 4096 hidden * 2 bytes = 524,288 bytes.
       - FP16 total = 80K * 524,288 = 41.94 GB (OOM).
       - INT8 KV bytes/token = 2 * 32 * 4096 * 1 byte = 262,144 bytes; total = 20.97 GB (OOM).
       - K-INT8/V-INT4 bytes/token = 32 * 4096 * (1 byte for K + 0.5 byte for V) = 196,608 bytes; total = 15.73 GB (OOM).
       - INT4 KV bytes/token = 2 * 32 * 4096 * 0.5 byte = 131,072 bytes; total = 10.49 GB (OOM).
    3. **Conclusion & Interpretation:**
       - **Result: none of these KV quantization schemes fits 5 concurrent 16K contexts in 4.5 GB.** K-INT8/V-INT4 is more accurate than uniform INT4 but still needs about 15.73 GB, so the workload must be resized or the memory budget increased.
