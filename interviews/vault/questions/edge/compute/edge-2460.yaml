title: Memory Bandwidth Limits on Orin Vision
scenario: An autonomous drone uses a Jetson AGX Orin. The perception stack requires 50 TOPS to maintain 30 FPS.
question: Evaluate why the Orin might still fail to hit 30 FPS despite having 5.5x the required peak compute TOPS.
details:
  realistic_solution: Peak TOPS calculations assume 100% MAC utilization and dense INT8 operations. Real workloads are often bottlenecked by the LPDDR5 memory bandwidth wall. If the model's arithmetic intensity is lower than the hardware ridge point (~1.34 TOPS/(GB/s)), the tensor cores will stall waiting for memory reads, leading to missed frame deadlines. Memory-bound operations require optimizations like layer fusion or INT8 weight quantization.
  common_mistake: |
    **The Pitfall:** Assuming compute capacity scales linearly with throughput.
    **The Rationale:** Candidates fail to analyze the memory bandwidth wall and arithmetic intensity requirements.
    **The Consequence:** Deployed models severely miss real-time deadlines due to memory starvation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Orin INT8 Compute: 275 TOPS.
    - Orin Memory Bandwidth: 204.8 GB/s.
    
    **Calculations:**
    - Hardware Ridge Point = 275 TOPS / 204.8 GB/s = 1.34 TOPS/(GB/s) (1342 Ops/Byte).
    
    **Conclusion & Interpretation:**
    - **Result: 1342 Ops/Byte (Memory-Bound)**. If the model's arithmetic intensity is below 1342 Ops/Byte, the GPU will stall waiting for memory and fail to hit 30 FPS.
