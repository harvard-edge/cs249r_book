title: Edge TPU Inference Throughput and Energy Calculation
scenario: Your team is deploying a pedestrian detection model on an edge hardware accelerator. The accelerator provides 4 TOPS at INT8 precision and operates at a power envelope of 2W. The fully INT8-quantized model requires 2 GOPS per inference pass. Assume 100% compute utilization and no memory bottlenecks.
question: What theoretical max FPS and energy per inference in mJ does the 4 TOPS, 2W accelerator achieve for a 2 GOPS INT8 model?
details:
  realistic_solution: To find the maximum throughput, divide the total available operations per second by the operations required per frame. To find the energy cost per inference, divide the total power consumption by the maximum throughput (FPS) to get Joules per frame, then convert to millijoules.
  common_mistake: |
    **The Pitfall:** Confusing TOPS with GOPS or botching the energy conversion.
    **The Rationale:** Candidates often miss the factor of 1000 between Tera and Giga, or forget to convert the power (Joules per second) into energy per frame.
    **The Consequence:** Providing FPS estimates that are off by 1000x or energy estimates that make no physical sense.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 4 TOPS limit, 2W power envelope.
    - Model: 2 GOPS per inference.

    **Calculations:**
    - 4 TOPS = 4,000 GOPS.
    - Max FPS = 4,000 GOPS / 2 GOPS/frame = 2,000 FPS.
    - Power = 2W = 2 Joules/second.
    - Energy per frame = 2 J/s / 2,000 FPS = 0.001 Joules = 1 mJ.

    **Conclusion & Interpretation:**
    - **Result: 2,000 FPS, 1 mJ (Compute-Bound)**. The theoretical maximum throughput is 2,000 FPS yielding exactly 1 mJ per inference pass.
