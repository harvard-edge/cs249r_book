title: The Multi-Core Bottleneck
scenario: You're optimizing an ML inference pipeline on an edge SoC featuring a CPU, a Neural Processing Unit (NPU), and a Digital Signal Processor (DSP). Your pipeline has a critical pre-processing stage (image resizing) followed by the main inference. The NPU is heavily saturated by the main inference model.
question: How do you decide where to run the pre-processing stage to minimize overall pipeline latency?
details:
  realistic_solution: Profile the system comprehensively to weigh raw compute gains against memory transfer overheads and queueing delays. Offloading to the NPU might seem optimal for raw FLOPS, but if the NPU is saturated, queue latency combined with domain-crossing memory copies will result in a net latency regression compared to parallel DSP execution.
  common_mistake: |
    **The Pitfall:** Always offloading to the most powerful accelerator (NPU).
    **The Rationale:** Candidates ignore the data transfer overhead across memory domains and the queuing delays of an already saturated NPU.
    **The Consequence:** Creating a sequential bottleneck on the NPU that actually increases overall pipeline latency compared to concurrent CPU or DSP execution.
  napkin_math: |
    **Assumptions & Constraints:**
       - Payload: 2 MB raw image data
       - CPU compute: 5 ms, transfer: 0 ms
       - DSP compute: 2 ms, transfer: 0.5 ms
       - NPU compute: 1 ms, transfer: 0.5 ms, queuing delay: 10 ms
    **Calculations:**
       - CPU latency: 5 ms + 0 ms = 5 ms
       - DSP latency: 2 ms + 0.5 ms = 2.5 ms
       - NPU latency: 1 ms + 0.5 ms + 10 ms = 11.5 ms
    **Conclusion & Interpretation:**
       - **Result: Concurrency Bottleneck.** Executing concurrently on the DSP (2.5 ms) avoids the 10 ms NPU queue and minimizes total pipeline latency.
