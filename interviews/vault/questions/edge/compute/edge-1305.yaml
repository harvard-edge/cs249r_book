title: Diagnosing CPU Fallback on Edge TPU
scenario: You are deploying a custom vision model to a 4 TOPS Edge TPU via USB. The Edge TPU operates within a 2W budget and expects an 8ms latency. During testing, inference latency spikes to 120ms per frame, and the host device's CPU utilization is pegged at 100%.
question: What architectural issue causes 120ms latency and 100% host CPU utilization on the Edge TPU?
details:
  realistic_solution: 'The latency catastrophe is driven by unquantized FP32 operators forcing compiler graph fragmentation. The Edge TPU architecture explicitly requires fully mapped INT8 operations. Any unsupported node forces the runtime to serialize the tensor, flush it over USB to the host CPU for unaccelerated processing, and read it back. This PCIe/USB round-trip destroys the execution pipeline and pegs host utilization.'
  common_mistake: |
    **The Pitfall:** Treating the Edge TPU as a general-purpose accelerator capable of executing arbitrary FP32 layers.
    **The Rationale:** Candidates assume unquantized layers will simply run slower on the NPU, rather than forcing an expensive fallback to the host CPU.
    **The Consequence:** The compiler fragments the graph, leading to massive PCIe/USB transfer overheads and 100% host CPU utilization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target latency: 8ms.
    - Edge TPU compute: 4 TOPS (32 GOPS/frame budget).
    - Host CPU compute: 10 GOPS.

    **Calculations:**
    - CPU execution time (1 GOPS unsupported op) = 1 GOPS / 10 GOPS/sec = 100ms.
    - Host-to-TPU transfer overhead = ~20ms.
    - Total Latency = 100ms + 20ms = 120ms.

    **Conclusion & Interpretation:**
    - **Result: 120ms latency and 100% CPU load (IO-Bound)**. Graph fragmentation to the host CPU destroys hardware acceleration gains.
