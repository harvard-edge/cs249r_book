title: The Edge Efficiency Paradox
scenario: >-
  Your autonomous vehicle team is upgrading the primary perception model running on a power-constrained NVIDIA Jetson AGX Orin. You have two candidate models to replace the old one: a Sparseformer (fewer MACs) and a dense CNN.
question: Which candidate should you choose under the 15W Orin budget, and why can the lower-MAC Sparseformer be slower and use more power than the dense CNN?
details:
  realistic_solution: 'The Sparseformer is severely memory-bound. Its sparse, irregular memory access patterns result in a low Arithmetic Intensity. The Jetson''s powerful INT8 Tensor Cores starve, spending cycles idle waiting for data from LPDDR5 memory. The constant off-chip DRAM data traffic dominates the power budget. The dense CNN, while performing more math, is compute-bound. High AI keeps Tensor Cores saturated, moves data in large chunks, and is fundamentally faster and more energy-efficient in silicon.'
  common_mistake: |
    **The Pitfall:** Equating theoretical MAC reduction with real-world efficiency.
    **The Rationale:** Candidates assume fewer operations natively means lower latency and less power draw.
    **The Consequence:** They blame "software overhead" for the slowdown, missing the root cause that irregular DRAM access patterns are phenomenally expensive in both time and energy, causing massive power spikes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Jetson AGX Orin at 15W limits to ~75 TOPS; Memory bandwidth is 204.8 GB/s.
    - Sparseformer: 20 GigaOps compute, requires 400 MB data movement.

    **Calculations:**
    - Hardware ridge point: 75 TOPS / 204.8 GB/s ≈ 366 Ops/Byte.
    - Sparseformer Arithmetic Intensity (AI): 20e9 Ops / 400e6 Bytes = 50 Ops/Byte.

    **Conclusion & Interpretation:**
    - **Result: 50 Ops/Byte (Memory-Bound).** Since 50 Ops/Byte < 366 Ops/Byte, the Sparseformer is severely memory-bound. Irregular DRAM access overrides MAC savings, driving up latency and DRAM power.
