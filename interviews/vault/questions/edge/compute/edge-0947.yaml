title: 'Edge New 0008'
scenario: 'An Orin module runs a ResNet-style network. Applying 2:4 sparsity with INT8 quantization on supported Tensor Cores doubles peak throughput compared to dense INT8.'
question: 'What execution tradeoffs should you expect from applying 2:4 sparsity with INT8 on Orin given 200GB/s memory bandwidth?'
details:
  realistic_solution: '2:4 sparsity logically drops half the weights, doubling the effective compute throughput on Ampere architecture Tensor Cores and halving the required memory fetches for weights. The tradeoff is a potential drop in accuracy requiring retraining. However, if the workload is heavily memory-bound, cutting weight size by 50% provides a linear speedup. If compute-bound, doubling the TOPS ensures the same linear speedup. It is a win-win structurally.'
  common_mistake: |
    **The Pitfall:** Assuming 2:4 sparsity only benefits memory size footprint.
    **The Rationale:** Candidates do not understand that modern Tensor Cores natively skip zero-computations during sparse matrix operations.
    **The Consequence:** Failing to realize that 2:4 sparsity actively doubles TOPS throughput alongside memory bandwidth savings.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dense INT8 weights: 10 MB, 100 GOPs
    - Peak compute: 275 TOPS
    - Memory bandwidth: 200 GB/s

    **Calculations:**
    - Dense compute time = 100 GOPs / 275 TOPS = 0.36 ms
    - Dense memory time = 10 MB / 200 GB/s = 0.05 ms
    - Sparse INT8 weights = 5 MB, 50 GOPs (effective)
    - Sparse compute time = 50 GOPs / 275 TOPS = 0.18 ms
    - Sparse memory time = 5 MB / 200 GB/s = 0.025 ms

    **Conclusion & Interpretation:**
    - **Result: 0.18 ms total time (Compute-Bound)**. Total execution time exactly halves from 0.36ms to 0.18ms, providing a pure linear speedup.
