title: 2:4 Sparse INT8 Roofline Tradeoffs on Orin
scenario: An Orin module runs a ResNet-style network. Applying 2:4 sparsity with INT8 quantization on supported Tensor Cores doubles peak throughput compared to dense INT8.
question: What execution tradeoffs should you expect from applying 2:4 sparsity with INT8 on Orin given 200GB/s memory bandwidth?
details:
  realistic_solution: |
    2:4 sparsity can improve Orin performance when the model uses supported sparse INT8 Tensor Core kernels and the sparse kernels are saturated. It reduces stored weights and can raise effective math throughput, but it does not guarantee a linear end-to-end speedup. Gains are limited by activation traffic, non-sparse layers, kernel overhead, memory bandwidth, and accuracy recovery after retraining. Expect the largest benefit when the hot layers are compute-bound dense GEMMs or convolutions that map cleanly to supported sparse kernels; expect smaller gains when the workload is dominated by activations, preprocessing, or unsupported operators.
  common_mistake: |
    **The Pitfall:** Assuming 2:4 sparsity only benefits memory size footprint.
    **The Rationale:** Candidates do not understand that modern Tensor Cores natively skip zero-computations during sparse matrix operations.
    **The Consequence:** Failing to realize that 2:4 sparsity actively doubles TOPS throughput alongside memory bandwidth savings.
  napkin_math: |
    **Assumptions & Constraints:**
    - 2:4 sparse INT8 is supported by the deployed kernels.
    - Dense weight traffic for eligible layers is W.
    - Dense compute work for eligible layers is C.
    - Memory bandwidth: 200 GB/s

    **Calculations:**
    - Eligible weight traffic can fall from W to about 0.5W.
    - Effective sparse Tensor Core throughput can approach 2x dense throughput for eligible operations.
    - End-to-end time is still max(compute time, memory time) plus time in non-eligible layers and overheads.
    - If activation or non-eligible work dominates, halving eligible weight traffic will not halve total latency.

    **Conclusion & Interpretation:**
    - **Result: conditional speedup, not an exact 2x.** 2:4 sparse INT8 is attractive on Orin when supported hot layers dominate, but the 200GB/s bandwidth and non-weight traffic can cap realized gains well below the structural 2x compute benefit.
