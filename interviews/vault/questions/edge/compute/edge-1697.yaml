title: Optimizing INT8 Compute Utilization on Qualcomm AI 100
scenario: Your team is porting a heavy INT8 vision workload from a datacenter GPU to an on-premise Qualcomm Cloud AI 100 accelerator (400 TOPS INT8, 32 GB LPDDR4x, 75W). Initial profiling shows that while the model fits entirely within the 32 GB LPDDR4x memory, compute utilization is stuck at barely 5% of the theoretical 400 TOPS peak.
question: How would a roofline analysis quantify the 5% utilization bottleneck and guide fusion, coalescing, and batching?
details:
  realistic_solution: The correct approach is to use a roofline calculation to compare required arithmetic intensity against available LPDDR4x bandwidth. At 5% utilization, the workload is not compute-limited; it is starved by bytes fetched from memory. The fix is to restructure the workload for higher on-chip SRAM reuse through deep operator fusion, coalesced memory access, and larger batches so each fetched byte feeds many more INT8 operations.
  common_mistake: |
    **The Pitfall:** Assuming INT8 quantization automatically guarantees peak TOPS utilization without analyzing arithmetic intensity.
    **The Rationale:** Candidates over-index on raw compute numbers and ignore memory bandwidth starvation.
    **The Consequence:** Failing to realize that the LPDDR4x bandwidth severely restricts throughput if memory isn't aggressively reused.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak compute: 400,000 GOPS (400 TOPS).
    - Memory bandwidth: 136 GB/s.

    **Calculations:**
    - Required arithmetic intensity: 400,000 / 136 = ~2,941 OPS/byte.
    - Current intensity (at 5% util / 20 TOPS): 20,000 / 136 = ~147 OPS/byte.
    - Optimized intensity (10x reuse): 1,470 OPS/byte.
    - New throughput: 1,470 OPS/byte $\times$ 136 GB/s = ~200 TOPS.

    **Conclusion & Interpretation:**
    - **Result: ~200 TOPS (Memory Bandwidth-Bound)**. LPDDR4x bandwidth severely restricts throughput without aggressive operator fusion and batching.
