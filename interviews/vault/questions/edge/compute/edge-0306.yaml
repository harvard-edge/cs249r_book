title: The Edge Roofline Test
scenario: You're evaluating a new computer vision model for an autonomous delivery robot equipped with an edge SoC. You've analyzed the model and found it has an arithmetic intensity of 2,000 Ops/Byte when running with INT8 precision.
question: Given an arithmetic intensity of 2,000 Ops/Byte, is the model compute-bound or memory-bound, and why?
details:
  realistic_solution: The model is **compute-bound**. The first step is to calculate the 'ridge point' of the SoC, which is the ratio of its peak compute to its peak memory bandwidth. A model is compute-bound if its own arithmetic intensity is greater than this ridge point. For this hardware, the ridge point is approximately 1,342 Ops/Byte. Since the model's intensity (2,000 Ops/Byte) is greater than the hardware's ridge point, the system's performance is limited by its raw compute power (TOPS), not by the speed at which it can feed the processors with data.
  common_mistake: |
    **The Pitfall:** Concluding the model is memory-bound because the Arithmetic Intensity is "high".
    **The Rationale:** Candidates correctly calculate that AI > Ridge Point, but erroneously assume this means it "needs a lot of memory bandwidth," reversing the logic of the roofline model.
    **The Consequence:** Misdiagnosing the bottleneck and applying the wrong optimizations (e.g., trying to optimize memory access instead of pruning compute).
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Edge SoC has 275 TOPS compute and 204.8 GB/s bandwidth.
       * Model Arithmetic Intensity = 2,000 Ops/Byte.
    2. **Calculations:**
       * Hardware Ridge Point = 275e12 Ops/s / 204.8e9 Bytes/s = 1,342 Ops/Byte.
    3. **Conclusion & Interpretation:**
       * **Since the model AI (2000) > Hardware Ridge Point (1342), the model leverages the compute units efficiently without being starved for memory. Result: Compute-Bound.**
  options:
  - Memory-bound, because the model's arithmetic intensity (2000) is greater than the Orin's ridge point (~1342 Ops/Byte).
  - Memory-bound, because the peak memory bandwidth (204.8 GB/s) is numerically much smaller than the peak compute (275 TOPS).
  - Compute-bound, because the model's arithmetic intensity (2000) is greater than the Orin's ridge point (~1342 Ops/Byte).
  - It's impossible to tell without knowing the model's latency in milliseconds.
  correct_index: 2
