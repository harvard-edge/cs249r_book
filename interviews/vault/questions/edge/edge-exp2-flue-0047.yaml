title: Edge TPU USB Bandwidth Bottleneck
scenario: You are deploying an INT8 quantized image classification model on a Google Coral Edge TPU USB
  Accelerator. The 4 TOPS INT8 accelerator processes a single inference in 2.5 ms. The model takes a standard
  224x224x3 RGB image input, quantized to INT8. Your deployment environment forces you to connect the
  Coral device to a legacy host via a USB 2.0 port, which provides a maximum effective transfer rate of
  35 MB/s. Calculate the host-to-device data movement time per image and determine if the application
  is compute-bound or I/O-bound.
question: "What is the host-to-device transfer time for one 224x224x3 INT8 image over USB 2.0, and is the system compute-bound or I/O-bound?"
details:
  realistic_solution: The correct approach is to calculate the exact payload size in bytes, divide by
    the effective interface bandwidth to find the transfer time, and compare this to the inference latency.
    If the transfer time exceeds the compute time, the system is I/O-bound, meaning the Edge TPU will
    sit idle waiting for data.
  common_mistake: Candidates often forget to account for the 1-byte INT8 data type and use 32-bit floats
    for the input size, or they fail to compare the transfer time against the 2.5 ms compute time to properly
    identify the bottleneck.
  napkin_math: '1. Input size: 224 * 224 * 3 channels * 1 byte (INT8) = 150,528 bytes (~150.5 KB).

    2. Transfer time: 150.5 KB / 35,000 KB/s = ~4.3 ms.

    3. Comparison: Transfer time (4.3 ms) > Compute time (2.5 ms).

    4. Conclusion: The system is heavily I/O-bound (bandwidth-bound) by the USB 2.0 connection.'
