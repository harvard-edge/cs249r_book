title: The Predictive Overtake Dilemma
scenario: 'You are the architect for the ''Predictive Overtake'' system on a self-driving vehicle. An
  LLM predicts other drivers'' actions, but its 500ms latency on the vehicle''s Jetson AGX Orin (275 INT8
  TOPS, 204.8 GB/s LPDDR5 BW) is too high; the hard real-time budget is 50ms. The model has 2B parameters,
  and the input is a context of 1024 tokens representing the last 10 seconds of sensor data. Two proposals
  emerge: (A) Implement Speculative Decoding using a 50M parameter draft model. (B) Implement FlashAttention
  to speed up the context phase. Which is more appropriate for meeting the latency budget?'
details:
  realistic_solution: The correct approach is to first analyze the bottleneck based on the hardware's
    Roofline model, and then perform a break-even analysis for speculative decoding.
  common_mistake: Assuming that because FlashAttention is effective for training in the cloud, it's automatically
    the best choice for edge inference. At short sequence lengths typical of real-time edge tasks, the
    N^2 attention matrix may actually fit in on-chip SRAM, diminishing FlashAttention's advantage. Another
    mistake is analyzing speculative decoding without considering the acceptance rate; if the draft model
    is not well-aligned with the main model, the frequent rejections and re-sampling can make the overall
    latency worse than just using the large model directly.
  napkin_math: '1. Analyze FlashAttention: Context length is only 1024. Attention matrix size = 1024 ×
    1024 × 2B = 2MB. This easily fits in Orin''s SRAM. Standard attention is not memory-bound here, so
    FlashAttention yields minimal speedup. 2. Analyze Speculative Decoding: The bottleneck is autoregressive
    generation (reading 2B params = 2GB per token). At 204.8 GB/s, reading weights takes ~10ms per token.
    For 50 tokens, this is 500ms. A 50M draft model takes 50MB / 204.8 GB/s = 0.24ms per token. Speculative
    decoding can batch-verify tokens, drastically reducing memory bandwidth limits and bringing latency
    closer to the 50ms budget.'
  options:
  - Assuming that because FlashAttention is effective for training in the cloud, it's automatically the
    best choice for edge inference. At short sequence lengths typical of real-time edge tasks, the N^2
    attention matrix may actually fit in on-chip SRAM, diminishing FlashAttention's advantage.
  - The bottleneck is PCIe transfer between CPU and GPU; using zero-copy memory will eliminate this overhead
    entirely.
  - The low utilization is due to kernel launch overhead on the NPU; fusing all layers into a single kernel
    will achieve near-peak throughput.
  - The correct approach is to first analyze the bottleneck based on the hardware's Roofline model, and
    then perform a break-even analysis for speculative decoding.
  correct_index: 3
