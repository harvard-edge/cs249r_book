title: Orin Memory Bound Token Generation
scenario: A Jetson AGX Orin with 204.8 GB/s LPDDR5 bandwidth runs a deeply memory-bound
  LLM. Generating a single token requires reading exactly 2 GB of model weights from
  main memory.
question: Evaluate the theoretical maximum token generation rate per second based
  solely on the LPDDR5 memory bandwidth limit.
visual:
  kind: svg
  path: edge-2277.svg
  alt: Horizontal bar chart comparing L1, L2, and LPDDR5 memory tier bandwidths.
  caption: Orin Memory Bandwidth Tiers
details:
  realistic_solution: In a strictly memory-bound autoregressive decoding scenario,
    the maximum throughput is the memory bandwidth divided by the memory read per
    token. With 204.8 GB/s bandwidth and 2 GB loaded per token, the maximum rate is
    204.8 / 2 = 102.4 tokens per second.
  common_mistake: Adding compute TFLOPs into the equation when the prompt explicitly
    establishes a memory-bound, weight-loading bottleneck.
  napkin_math: 204.8 GB/s / 2 GB/token = 102.4 tokens/s
