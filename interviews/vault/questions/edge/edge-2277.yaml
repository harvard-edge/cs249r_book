title: Orin Memory Bound Token Generation
scenario: 'An edge SoC with 204.8 GB/s LPDDR5 bandwidth runs a deeply memory-bound LLM. Per token, the kernel streams 2 GB of weights, reads a 256 MB KV cache, and writes 64 MB of activations. Concurrent vision preprocessing consumes ~25 GB/s of the bus.'
question: 'Evaluate the achievable token generation rate accounting for weight streaming, KV cache reads, activation writes, and concurrent vision preprocessing.'
details:
  realistic_solution: 'Deduct the concurrent DLA workload bandwidth from the total system bus. Then, sum all LLM data movement (weights + KV cache + activations) per token to calculate the true achievable autoregressive token generation rate.'
  common_mistake: |
    **The Pitfall:** Counting only weights against the full 204.8 GB/s memory bandwidth budget.
    **The Rationale:** Candidates use simplified LLM arithmetic (Token Rate = Bandwidth / Model Size) and ignore real-world SoC resource contention.
    **The Consequence:** This ignores KV cache reads, activation writebacks, and DLA pipeline contention, overestimating token throughput by ~24%.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total LPDDR5 Bandwidth: 204.8 GB/s.
       - Vision contention: 25 GB/s.
       - LLM bytes per token: 2 GB (weights) + 0.256 GB (KV read) + 0.064 GB (activation write).
    2. **Calculations:**
       - Effective LLM Bandwidth = 204.8 - 25 = 179.8 GB/s.
       - Total Bytes per token = 2.32 GB.
       - Token rate = 179.8 GB/s / 2.32 GB/token ≈ 77.5 tokens/s.
    3. **Conclusion & Interpretation:**
       - **The achievable token generation rate is ~77.5 tokens/s due to SoC contention and KV IO.** (Result: Memory-Bandwidth Bound)
