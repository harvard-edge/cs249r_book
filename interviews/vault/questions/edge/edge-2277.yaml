title: Orin Memory Bound Token Generation
scenario: A Jetson AGX Orin with 204.8 GB/s LPDDR5 bandwidth runs a deeply memory-bound
  LLM. Per token, the kernel must stream 2 GB of weights plus a 256 MB KV cache
  slice and write 64 MB of activations back to LPDDR5. The DLA also runs concurrent
  vision preprocessing that consumes ~25 GB/s of the same memory bus.
question: Evaluate the achievable token generation rate accounting for weight streaming,
  KV cache reads, activation writes, and the concurrent vision preprocessing workload
  on the shared LPDDR5 bus.
visual:
  kind: svg
  path: edge-2277.svg
  alt: Horizontal bar chart comparing L1, L2, and LPDDR5 memory tier bandwidths.
  caption: Orin Memory Bandwidth Tiers
details:
  realistic_solution: 'Per-token bytes moved: 2 GB weights (read) + 256 MB KV (read)
    + 64 MB activations (write) ~= 2.32 GB. After deducting 25 GB/s for the DLA,
    LLM has 179.8 GB/s. Token rate = 179.8 / 2.32 ~= 77.5 tokens/s (vs 102.4 if
    only weights and full bandwidth are counted, a 24% overestimate). The contention
    matters: in a heterogeneous edge SoC the LLM never owns the full bus.'
  common_mistake: Counting only weights and the full 204.8 GB/s budget, ignoring
    KV cache reads, activation writebacks, and contention from the DLA's preprocessing
    pipeline that shares the same LPDDR5 bus.
  napkin_math: 'Effective BW = 204.8 - 25 = 179.8 GB/s; bytes/token = 2 + 0.256 +
    0.064 = 2.32 GB; rate = 179.8 / 2.32 = 77.5 tokens/s.'
