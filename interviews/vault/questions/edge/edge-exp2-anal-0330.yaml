title: Explain Thermal Throttling on Google Coral Edge TPU
scenario: You are deploying a continuous object detection model on a Google Coral Edge TPU USB Accelerator.
  The spec sheet states it consumes 2W and provides 4 TOPS at INT8 precision. However, during a continuous
  24-hour inference test in a small, passively cooled enclosure at room temperature (25°C), you observe
  that the inference latency doubles after the first 15 minutes of operation. Explain why this performance
  degradation occurs, given the device's power characteristics and thermal design.
question: "Why does Coral Edge TPU inference latency double after 15 minutes of continuous 4 TOPS operation in a passively cooled enclosure?"
details:
  realistic_solution: The performance degradation is caused by thermal throttling (Dynamic Voltage and
    Frequency Scaling - DVFS). The Google Coral Edge TPU operates within a strict thermal envelope. When
    continuously running at 4 TOPS (consuming 2W), it generates heat. In a passively cooled, small enclosure,
    the heat cannot dissipate fast enough, causing the die temperature to rise. To prevent permanent damage,
    the ASIC automatically reduces its operating frequency (P-state), which proportionally decreases its
    processing speed and TOPS, leading to the observed doubled latency. To resolve this, active cooling
    or reducing the duty cycle (inference rate) is required.
  common_mistake: Candidates often blame the host CPU overhead, USB bus saturation, or software memory
    leaks without considering the hardware's thermal behavior. They might fail to realize that the 2W
    power consumption must be dissipated as heat, and passive cooling in a confined space is insufficient
    for continuous maximum throughput.
  napkin_math: 'Initial State: 4 TOPS @ 2W. Inference Time = T_init.

    After 15 mins (Throttled State): Inference Time = 2 * T_init.

    Assuming latency is inversely proportional to frequency (f) and TOPS scales linearly with f:

    TOPS_throttled = 4 TOPS / 2 = 2 TOPS.

    Power (P) is proportional to f * V^2. Assuming voltage drops slightly with frequency (e.g., V_throttled
    = 0.9 * V_init):

    P_throttled roughly equals (0.5 * f_init) * (0.9 * V_init)^2 = 0.5 * 0.81 * P_init = 0.405 * 2W =
    0.81W.

    The system reduces power from 2W to ~0.8W to maintain thermal equilibrium in the confined space.'
