title: Evaluating Degradation Strategies on Coral Edge TPU
scenario: 'You are designing an object detection pipeline for a remote, battery-powered camera using a
  Google Coral Edge TPU via USB. Normally, the Coral accelerator runs a quantized INT8 model to track
  objects. During extreme temperature spikes, the USB interface throttles and the Edge TPU becomes unavailable.
  You must evaluate two degradation strategies: Strategy A falls back to a smaller FP32 model running
  on the low-power host CPU, while Strategy B falls back to the host CPU using the same INT8 model but
  aggressively sheds non-critical tracking tasks to reduce load. Which approach provides better fail-operational
  reliability?'
question: "Which approach provides better fail-operational reliability?"
details:
  realistic_solution: Strategy B is the superior choice for graceful degradation. The model is already
    quantized to INT8 for the Coral Edge TPU's limited operator support. Running this same INT8 model
    on the host CPU is significantly more compute and memory-efficient than switching to an FP32 model.
    By intentionally shedding quality-of-service (e.g., dropping frame rates or ignoring background objects),
    the system maintains critical fail-operational security monitoring without triggering a host CPU thermal
    shutdown.
  common_mistake: Candidates often choose Strategy A, assuming a smaller FP32 model on the host CPU is
    a standard and simple fallback. They fail to consider that the host CPU is likely resource-constrained,
    and introducing FP32 math will cause massive latency spikes and rapidly drain the battery, worsening
    the thermal event.
  napkin_math: The Google Coral Edge TPU provides 4 TOPS at 2W (2 TOPS/W efficiency). If the full INT8
    model requires 1 TOPS at 30 FPS, it draws 0.5W on the Coral. A typical low-power host CPU might only
    achieve 0.1 TOPS/W for INT8 operations. Running the full 1 TOPS load on the CPU would draw 10W, likely
    exceeding the thermal budget. By shedding QoS to 10 FPS and dropping non-critical tracks (Strategy
    B), the requirement drops to 0.33 TOPS. This consumes ~3.3W on the host CPU, keeping the system alive,
    whereas an FP32 fallback (Strategy A) would require even more power and guarantee a thermal trip.
