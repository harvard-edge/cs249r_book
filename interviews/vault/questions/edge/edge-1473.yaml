title: Optimizing Sensor Fusion Kernels on Jetson Orin
scenario: You are architecting a custom sensor fusion pipeline for an autonomous vehicle
  using an NVIDIA Jetson Orin (32 GB LPDDR5, 60W TDP). The workload relies heavily
  on custom CUDA kernels rather than standard deep learning layers. You need to design
  the GPU execution model, specifying how you will structure thread blocks, warps,
  and shared memory tiling to maximize occupancy on the Ampere GPU while avoiding
  LPDDR5 bandwidth saturation.
question: How would you structure CUDA thread blocks, warps, and shared memory tiling
  on Jetson Orin to avoid LPDDR5 bandwidth saturation?
details:
  realistic_solution: The optimal design structures thread blocks in multiples of
    32 to ensure full warps and balances occupancy against register allocation limits
    per SM. To mitigate memory bottlenecks, the architecture must load data from the
    32 GB LPDDR5 into shared memory using perfectly coalesced 128-byte transactions,
    and format the data into 16x16 tiles to exploit the Ampere Tensor Cores for dense
    matrix operations.
  common_mistake: Candidates often design thread blocks solely to maximize theoretical
    SM occupancy without considering register pressure, which leads to register spilling
    to local memory. They also frequently neglect data alignment, resulting in uncoalesced
    memory accesses that cripple the unified LPDDR5 bandwidth.
  napkin_math: The Orin provides 275 TOPS INT8 compute but is limited by LPDDR5 bandwidth
    (typically ~200 GB/s). For a 1024x1024 INT8 matrix multiplication, the compute
    requires ~2 giga-operations (2 * 1024^3 ≈ 2.15 billion operations). Reading the
    two matrices requires 2 MiB of data transfer. With perfectly coalesced 128-byte
    memory transactions, this requires exactly 16,384 transactions. At 200 GB/s, the
    transfer takes roughly 10 microseconds, demonstrating that the system is memory-bandwidth
    bound and validating the design choice to heavily utilize shared memory tiling.
