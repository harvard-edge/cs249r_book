title: Optimizing Sensor Fusion Kernels on Jetson Orin
scenario: You are architecting a custom sensor fusion pipeline for an autonomous vehicle using an NVIDIA Jetson Orin (32 GB LPDDR5, 60W TDP). The workload relies heavily on custom CUDA kernels rather than standard deep learning layers. You need to design the GPU execution model, specifying how you will structure thread blocks, warps, and shared memory tiling to maximize occupancy on the Ampere GPU while avoiding LPDDR5 bandwidth saturation.
question: How would you structure CUDA thread blocks, warps, and shared memory tiling on Jetson Orin to avoid LPDDR5 bandwidth saturation?
details:
  realistic_solution: The optimal design structures thread blocks in multiples of 32 to ensure full warps and balances occupancy against register allocation limits per SM. To mitigate memory bottlenecks, the architecture must load data from the 32 GB LPDDR5 into shared memory using perfectly coalesced 128-byte transactions, and format the data into 16x16 tiles to exploit the Ampere Tensor Cores for dense matrix operations.
  common_mistake: |
    **The Pitfall:** Designing thread blocks solely to maximize theoretical SM occupancy without optimizing memory access patterns.
    **The Rationale:** Developers often focus on raw compute utilization (keeping CUDA cores busy) without considering that edge devices have unified memory architectures with much lower bandwidth than server GPUs.
    **The Consequence:** This leads to uncoalesced memory accesses and register spilling, crippling the unified LPDDR5 bandwidth and drastically reducing actual throughput.
  napkin_math: |
    1. **Compute Requirement:** For a 1024x1024 INT8 matrix multiplication, compute requires ~2.15 giga-operations.
    2. **Data Transfer:** Reading the two matrices requires 2 MiB of data.
    3. **Coalesced Memory Access:** Perfectly coalesced 128-byte memory transactions require exactly 16,384 transactions (2 MiB / 128 bytes).
    4. **Bandwidth Limit:** At 200 GB/s LPDDR5 bandwidth, transferring 2 MiB takes ~10 microseconds.
    5. **Result:** The kernel is heavily **memory-bandwidth bound**, validating the need to load 16x16 tiles into shared memory to exploit Ampere Tensor Cores and minimize global memory reads.
