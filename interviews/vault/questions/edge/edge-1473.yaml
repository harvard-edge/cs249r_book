title: Optimizing Sensor Fusion Kernels on Jetson Orin
scenario: You are architecting a custom sensor fusion pipeline for an autonomous vehicle using an NVIDIA Jetson Orin. The workload relies heavily on custom CUDA kernels rather than standard deep learning layers. You need to design the GPU execution model, specifying how you will structure thread blocks, warps, and shared memory tiling to maximize occupancy on the Ampere GPU while avoiding LPDDR5 bandwidth saturation.
question: How would you structure CUDA thread blocks, warps, and shared memory tiling on Jetson Orin to avoid LPDDR5 bandwidth saturation?
details:
  realistic_solution: Structure thread blocks in multiples of 32 to ensure full warps and balance occupancy against register allocation limits per SM. To mitigate memory bottlenecks, load data from LPDDR5 into shared memory using perfectly coalesced 128-byte transactions, and format data into 16x16 tiles to exploit Ampere Tensor Cores for dense matrix operations.
  common_mistake: |
    **The Pitfall:** Designing thread blocks solely to maximize theoretical SM occupancy without optimizing memory access patterns.
    **The Rationale:** Developers focus on raw compute utilization, forgetting edge devices have unified memory architectures with lower bandwidth.
    **The Consequence:** Uncoalesced memory accesses and register spilling cripple unified LPDDR5 bandwidth and drastically reduce throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1024x1024 INT8 matrix multiplication requires ~2.15 giga-operations.
       - Reading two matrices requires 2 MiB of data.
       - 200 GB/s LPDDR5 bandwidth.
    2. **Calculations:**
       - Coalesced Memory Access: 2 MiB / 128 bytes = 16,384 transactions.
       - Bandwidth Limit: Transferring 2 MiB at 200 GB/s takes ~10 microseconds.
    3. **Conclusion & Interpretation:**
       - **Result: 16x16 tiling into shared memory is required to minimize global memory reads. (Memory-Bandwidth-Bound)**
