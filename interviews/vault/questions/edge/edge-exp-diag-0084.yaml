title: Diagnosing Cost Overruns in Edge LLM Deployment
scenario: Your team is deploying a 10-billion parameter transformer model (INT8 quantized) for on-premise
  text analysis using the Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W). Your initial compute-cost
  estimate predicted a single card would easily handle the 50 tokens/second SLA because the model only
  requires about 20 GigaOps per token, theoretically using a fraction of the 400 TOPS. However, during
  staging, the system tops out at 13.6 tokens/second per card, forcing you to provision 4 cards and ballooning
  the total power budget to 300W. Diagnose why the compute estimation failed and identify the hardware
  bottleneck.
question: "Why did the compute-only estimate predict 50 tokens/sec but staging tops out at 13.6 tokens/sec per Cloud AI 100 card?"
details:
  realistic_solution: The candidate must identify that the LPDDR4x memory subsystem is the root cause
    of the severe under-utilization. For batch-size-1 autoregressive inference, the entire model must
    be loaded from memory to generate a single token. Cost and capacity estimations for edge accelerators
    running large models must be calculated using a roofline model bounded by memory bandwidth, not just
    peak TOPS.
  common_mistake: Candidates typically assume that compute capability (TOPS) is the sole constraining
    factor in hardware cost estimation. They fail to diagnose that autoregressive decoding at low batch
    sizes is severely memory-bandwidth-bound, ignoring the LPDDR4x limitations.
  napkin_math: INT8 Model Size = 10B params * 1 byte = 10 GB. Expected LPDDR4x bandwidth = ~136 GB/s.
    Max tokens/sec bounded by memory = 136 GB/s / 10 GB = 13.6 tokens/sec. Compute required per token
    = 2 * 10B = 20 GOPS. Actual compute throughput = 13.6 tok/sec * 20 GOPS = 272 GOPS (0.272 TOPS). Compute
    utilization = 0.272 TOPS / 400 TOPS = 0.068%. To meet the 50 tokens/sec SLA, 50 / 13.6 = 3.67, so
    4 cards are needed, costing 4 * 75W = 300W in power.
