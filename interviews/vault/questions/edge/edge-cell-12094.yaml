title: 'Model Size Estimation: Fluency — Size Edge Vision Model Memory in 60 Seconds'
scenario: 'Without reference material, estimate in under 60 seconds: ''How much LPDDR5 memory does a YOLOv8-n
  model (3.2M params, INT8 TensorRT) need on Jetson Orin for a real-time object detection pipeline at
  30fps with batch size 1?'''
details:
  realistic_solution: 'Weights: 3.2M × 1 byte = 3.2MB. TensorRT overhead: ×1.3 = 4.2MB. Input tensor:
    640×640×3 = 1.2MB (FP32). Peak activations (typically 5-10× weights for YOLO): ~20MB. Output: 84×8400×4B
    = 2.8MB. Total: ~28MB. At 30fps: need triple buffering for camera pipeline? Add 3×1.2MB = 3.6MB camera
    buffers. Total: ~32MB of 32GB LPDDR5. Trivially small.'
  common_mistake: 'Guessing model memory without a systematic approach: weights + activation + I/O buffer.
    Candidates often only mention weights.'
  napkin_math: '3.2MB weights × 1.3 TRT = 4.2MB. Input 640²×3 = 1.2MB. Activations ≈ 20MB. Output ≈ 3MB.
    Camera buffers 3.6MB. Total: 32MB. 32GB LPDDR5 / 32MB = 1000 model instances worth of memory. Compute
    limited at 30fps: 4.2G ops / 275T = 15μs per frame, easily sustains 30fps.'
