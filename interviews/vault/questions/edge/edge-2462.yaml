title: Layer Fusion for Hailo-8 SRAM Savings
scenario: A smart factory camera uses a Hailo-8 accelerator. An industrial defect detection model runs out of on-chip memory and thrashes to external DRAM, spiking power consumption.
question: How would you apply layer fusion to reduce the peak memory footprint of the activation maps during inference?
details:
  realistic_solution: Apply vertical layer fusion (e.g., fusing depthwise convolutions with point-wise layers) to keep intermediate activation maps entirely within the Hailo-8's on-chip SRAM. This bypasses writing high-resolution tensors to external DRAM, slashing memory bandwidth requirements and significantly reducing the thermal envelope.
  common_mistake: |
    **The Pitfall:** Trying to fix DRAM thrashing by pruning weights instead of targeting the massive activation footprint.
    **The Rationale:** Pruning is the most common model compression technique taught, so engineers reach for it first without profiling memory bottlenecks.
    **The Consequence:** Pruning weights does little to reduce intermediate activation map sizes, leaving the DRAM thrashing and power spikes unresolved.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hailo-8 operates with constrained on-chip SRAM.
       - External DRAM access costs >100x more energy than SRAM.
    2. **Calculations:**
       - Unfused Energy: 2 * Size * DRAM_cost.
       - Fused Energy: 2 * Size * SRAM_cost.
       - Savings Ratio: DRAM_cost / SRAM_cost > 100x.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Optimization.** Fusing layers eliminates external memory traffic, securing massive energy savings and resolving the thrashing.
