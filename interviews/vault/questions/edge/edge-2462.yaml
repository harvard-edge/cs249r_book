title: Layer Fusion for Hailo-8 SRAM Savings
scenario: A smart factory camera uses a Hailo-8 accelerator (26 TOPS, 2.5W). An industrial defect detection model runs out of on-chip memory and thrashes to external DRAM, spiking power consumption.
question: Apply layer fusion to reduce the peak memory footprint of the activation maps during inference.
details:
  realistic_solution: Fuse depthwise convolutions and point-wise layers so intermediate activations are kept entirely in the Hailo-8 SRAM. This prevents writing high-resolution activation maps out to DRAM and reading them back, saving massive bandwidth and drastically reducing power.
  common_mistake: |
    **The Pitfall:** Trying to fix DRAM thrashing by pruning weights instead of targeting the massive activation footprint.
    **The Rationale:** Pruning is the most common model compression technique taught, so engineers reach for it first.
    **The Consequence:** Pruning weights does little to reduce the size of intermediate activation maps, which are the actual cause of the DRAM thrashing.
  napkin_math: |
    *   **DRAM energy cost:** Accessing DRAM is orders of magnitude more expensive than accessing SRAM.
    *   **Energy ratio:** DRAM_energy / SRAM_energy > **100x**.
    *   **Result:** Fusing layers keeps activations in SRAM, eliminating the massive energy penalty of DRAM trips.
