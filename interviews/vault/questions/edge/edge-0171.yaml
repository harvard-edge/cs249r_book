title: The Continuous Batching Sweet Spot
scenario: 'You are designing a video analytics server for a factory floor, processing streams from 10
  cameras. Each camera sends a frame every 100ms (10 FPS). Your accelerator''s inference time scales with
  batch size N according to the formula: `T_inference(N) = 40ms + 5ms * (N-1)`.'
question: "What batch size maximizes throughput while keeping worst-case frame latency within 150ms?"
details:
  realistic_solution: The optimal batch size is 8. This maximizes throughput while keeping worst-case
    latency within the 150ms budget.
  common_mistake: Engineers make two common mistakes here. The first is to be greedy and assume the largest
    possible batch size is always best for throughput, ignoring the latency constraint. The second is
    to calculate latency but forget the waiting time component. They solve for `T_inference(N) <= 150ms`
    but forget that in continuous/dynamic batching, a frame has to wait for the rest of its batch to arrive,
    as well as for the previous batch to finish.
  napkin_math: '1. Arrival rate: 10 cameras x 10 FPS = 100 frames/s, one frame every 10ms.

    2. Inference time: T_inference(N) = 40ms + 5ms*(N-1) = 35ms + 5N.

    3. Worst-case latency: A frame arriving just after a batch starts (t=0) must wait for N-1 more frames
    to arrive to form its batch (at t=10*(N-1)). However, it also must wait for the previous batch to finish
    (at t=T_inference(N)). Thus, its batch starts at max(T_inference(N), 10*(N-1)). Once started, it takes
    T_inference(N) to process. Worst-case latency = max(35 + 5N, 10N - 10) + (35 + 5N).

    4. Let''s test N=8: T_inference(8) = 35 + 40 = 75ms. Time to fill batch = 7 * 10 = 70ms. Batch starts
    at max(75, 70) = 75ms. Total latency = 75 + 75 = 150ms.

    5. Let''s test N=9: T_inference(9) = 35 + 45 = 80ms. Time to fill batch = 8 * 10 = 80ms. Batch starts
    at max(80, 80) = 80ms. Total latency = 80 + 80 = 160ms.

    6. Constraint: Latency ≤ 150ms. Therefore, N=8 is the maximum batch size.

    7. Verify N=8: Latency = 150ms ✓. Throughput = 8 / 75ms = 106.7 FPS > 100 FPS demand ✓.'
  options:
  - '8'
  - '23'
  - '11'
  - As large as memory allows
  correct_index: 0
