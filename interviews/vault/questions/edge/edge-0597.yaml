title: 'The Night-Blind Edge Model'
scenario: 'You are the lead ML systems engineer on a self-driving truck''s perception team. To meet the strict 33ms per-frame deadline, you''ve quantized your primary object detection transformer model from FP16 to INT8. During daytime validation runs, the INT8 model''s mAP is within 1% of the FP16 baseline. However, in night-time road tests, the model completely fails to detect pedestrians who are directly illuminated by the truck''s own high-beam headlights.'
question: 'Is adding headlight-illuminated images to calibration enough, and what non-linear INT8 failure makes the detector night-blind?'
details:
  realistic_solution: 'The root cause is catastrophic activation overflow in intermediate layers using activation functions like GELU or Swish. The intense, localized brightness of headlights creates massive, outlier activation values that clip to the maximum INT8 representable value (127). All information about texture and shape is lost. The correct solution requires mixed-precision quantization: perform nsys profiling on layer activation ranges, and keep sensitive layers in FP16 while using INT8 for the rest.'
  common_mistake: |
    **The Pitfall:** Blaming the calibration dataset alone for the night-time failure.
    **The Rationale:** Junior engineers correctly identify a data distribution shift but fail to identify the non-linear activation clipping mechanism.
    **The Consequence:** Adding more data slightly expands the calibration range but does not protect against extreme lighting outliers causing overflow.
  napkin_math: |
    **Assumptions & Constraints:**
    - Daytime GELU activation range: min = -8.0, max = +22.0.
    - INT8 range: [-128, 127].
    - Night-time glare activation: e.g., +200.0.

    **Calculations:**
    - Scaling factor: 22.0 / 127 = 0.173.
    - Quantized glare: 200.0 / 0.173 = 1156 -> clips to 127.
    - Dequantized output: 127 * 0.173 = 22.0.
    - Information loss: 200.0 - 22.0 = 178.0.

    **Conclusion & Interpretation:**
    - **Result: 178.0 error (Precision-Bound)**. Massive information loss destroys the bounding box.
