title: Asynchronous Checkpointing on Edge Devices
scenario: You are running a continuous learning object tracking model on a Jetson
  AGX Orin in a remote factory.
question: State the purpose of asynchronous checkpointing to non-volatile storage
  in an edge continuous learning system.
details:
  realistic_solution: Asynchronous checkpointing periodically saves updated model
    weights to non-volatile storage (like an NVMe SSD) without pausing the primary
    real-time inference loop. This ensures fault tolerance against power failures
    while preventing slow I/O operations from blocking latency-critical video frame
    processing.
  common_mistake: Confusing model checkpointing with OS-level virtual memory paging
    or swapping to disk.
  napkin_math: 1 I/O thread + N compute threads = N+1 total.
