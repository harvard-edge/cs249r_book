title: The CPU-Free Camera Ingest
scenario: You're building a real-time perception system for a drone with a 33ms end-to-end latency budget per frame. A camera streams high-resolution images that must be processed by the GPU. To meet the tight deadline, the CPU must remain available for flight control calculations while the camera frame is being transferred into memory.
question: What hardware feature lets the camera write frames into system DRAM for the GPU without CPU data copies?
details:
  realistic_solution: The mechanism is Direct Memory Access (DMA). A DMA controller allows the camera's hardware interface (e.g., its Image Signal Processor) to gain control of the memory bus and write frame data directly into a pre-allocated buffer in system DRAM. Once the data is there, the GPU can also use its own DMA engine to read it. The CPU is only needed to set up the DMA transfer initially and then receives an interrupt upon completion, leaving it free to perform other critical tasks during the multi-megabyte data transfer.
  common_mistake: |
    **The Pitfall:** Assuming the CPU must act as a data mover.
    **The Rationale:** Candidates think the CPU must execute a `memcpy` to shuttle data from peripheral buffers to main memory before the GPU can access it.
    **The Consequence:** The CPU is blocked on a multi-megabyte copy, consuming thousands of cycles and missing the 33ms real-time deadline.
  napkin_math: |
    - A 12 MP camera frame (4000x3000) with 12-bit RAW data (1.5 bytes/pixel) = 4000 * 3000 * 1.5 = 18 MB.
    - A CPU `memcpy` on an edge device might achieve 5 GB/s.
    - Copy time = 18 MB / 5000 MB/s = ~3.6 ms.
    **Conclusion: The memcpy consumes over 10% of the 33ms budget. DMA performs this transfer with zero CPU usage.**
  options:
  - A high-priority CPU thread performs a `memcpy` from the camera to DRAM.
  - The GPU reads pixels directly from the camera sensor's private SRAM.
  - Direct Memory Access (DMA) controllers manage the transfer independent of the CPU.
  - The camera data is sent to the GPU through a series of L1 cache line fills.
  correct_index: 2
