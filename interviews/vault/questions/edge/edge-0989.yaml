title: Edge Compute Transfer Overlap
scenario: >-
  An edge accelerator computes on tile A for 6 ms while DMA loads tile B in 2 ms. There are 20 tiles in total.
question: What total time do 20 tiles take with perfect double-buffer overlap after the first tile?
details:
  realistic_solution: The steady-state stage is compute-bound at 6 ms/tile. Pay one initial 2 ms load, then 20 compute intervals.
  common_mistake: |
    **The Pitfall:** Adding compute and DMA for every tile.
    **The Rationale:** Candidates fail to apply the concept of double-buffering where the shorter DMA stage is completely hidden by the longer compute stage.
    **The Consequence:** Incorrectly estimating 160 ms, misunderstanding the performance benefit of pipeline parallelism and resulting in suboptimal scheduler designs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total tiles: 20.
    - Compute latency: 6 ms/tile.
    - DMA load latency: 2 ms/tile.
    - Hardware: Supports perfect double-buffering overlap.

    **Calculations:**
    - Initial DMA load (Tile 1): 2 ms.
    - Overlapped pipeline intervals (20 tiles): max(6 ms, 2 ms) = 6 ms per tile.
    - Total Time: 2 ms (initial load) + (20 * 6 ms) = 122 ms.

    **Conclusion & Interpretation:**
    - **Result: 122 ms (Compute-Bound).** The pipeline reaches steady state where the 2ms DMA latency is entirely hidden behind the 6ms compute, finishing the workload in 122 ms instead of 160 ms.
