title: Edge Compute Transfer Overlap
scenario: An edge accelerator computes on tile A for 6 ms while DMA loads tile B in 2 ms. There are 20 tiles in total.
question: What total time do 20 tiles take with perfect double-buffer overlap after the first tile?
details:
  realistic_solution: The steady-state stage is compute-bound at 6 ms/tile. Pay one initial 2 ms load, then 20 compute intervals.
  common_mistake: |
    **The Pitfall:** Adding compute and DMA for every tile.
    **The Rationale:** Candidates fail to apply the concept of double-buffering where the shorter DMA stage is completely hidden by the longer compute stage.
    **The Consequence:** Incorrectly estimating 160 ms, misunderstanding the performance benefit of pipeline parallelism.
  napkin_math: |
    - **Initial load:** 2 ms for the first tile.
    - **Compute intervals:** 20 tiles computing at 6 ms each.
    - **Overlapped total:** 2 ms (initial load) + 20 * max(6, 2) ms = 2 + 120 = **122 ms.**
    - **Sequential comparison:** 20 * (6 + 2) = 160 ms.
