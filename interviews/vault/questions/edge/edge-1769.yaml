title: Shadow Deployment Quantization Requirement on Coral TPU
scenario: Your team is executing a shadow deployment to evaluate a new object detection model against the production baseline on a fleet of IoT devices equipped with Google Coral Edge TPUs. The Edge TPU provides 4 TOPS at just 2W of power, but it has extremely strict operator support.
question: To successfully compile the new candidate model and deploy it to receive duplicated live traffic, what specific numerical precision format must the model be fully converted to?
details:
  realistic_solution: The correct answer is full INT8 (8-bit integer) quantization. The Google Coral Edge TPU exclusively supports fully quantized INT8 models; any operations or layers left in floating-point format will be delegated to the low-power host CPU, ruining latency and invalidating the performance metrics of the shadow deployment.
  common_mistake: |
    **The Pitfall:** Assuming support for FP16 or dynamic range quantization.
    **The Rationale:** These formats are common on edge GPUs, leading candidates to believe they are universally supported across edge accelerators.
    **The Consequence:** The model will fail to compile for the TPU, falling back to the low-power host CPU, ruining latency and invalidating the shadow deployment.
  napkin_math: |
    - Coral Edge TPU compute rate: 4 TOPS.
    - Candidate model compute quantity: 8 GOPs (0.008 TOPs) per inference.
    - Theoretical maximum throughput: 4 TOPS / 0.008 TOPs = 500 inferences per second.
    - Shadow deployment throughput (sequential execution of 2 models): 500 / 2 = 250 FPS.
    **Theoretical max per model drops to 250 frames per second.**
