title: 'The OTA Update Bottleneck'
scenario: 'You are an engineer for a fleet of autonomous delivery robots. A critical safety update for the perception model needs to be rolled out. The full model package is 120 MB. The robots'' cellular modem provides a sustained download speed equivalent to a standard 4-wire SPI bus (10 Mbps).'
question: 'What is the minimum OTA download time for one robot to download the 120 MB model over the 10 Mbps cellular link?'
details:
  realistic_solution: 'The correct approach is to align the units. First, convert the model package size from MegaBytes (MB) to Megabits (Mb). Then, divide the total number of bits by the network bandwidth in bits per second.'
  common_mistake: |
    **The Pitfall:** Failing to convert between MegaBytes (MB) and Megabits (Mb).
    **The Rationale:** File sizes are usually quoted in Bytes, but network speeds are always quoted in bits.
    **The Consequence:** Forgetting this step leads to an answer that is exactly 8x too fast, severely underestimating the maintenance window.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 120 MB.
    - Network bandwidth: 10 Mbps (Megabits per second).

    **Calculations:**
    - Size in Megabits: 120 MB * 8 bits/byte = 960 Mb.
    - Download time: 960 Mb / 10 Mbps = 96 seconds.

    **Conclusion & Interpretation:**
    - **Result: 96 seconds (Network-Bound)**. The minimum OTA download time is 96 seconds.
  options:
  - '12 seconds (Calculated Trap)'
  - '96 seconds'
  - '2400 seconds (Calculated Trap)'
  - '9.6 seconds (Calculated Trap)'
  correct_index: 1
