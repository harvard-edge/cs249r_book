title: Energy Optimization Strategy Selection
scenario: Two teams optimize inference energy for an edge vision model. Team A reduces FLOPs by 40% via pruning (but adds sparse memory accesses). Team B fuses 5 consecutive layers to increase arithmetic intensity from 15 to 45 FLOPs/byte without reducing total FLOPs.
question: Which saves more energy on a chip with 20 pJ/byte DRAM and 0.5 pJ/FLOP?
details:
  realistic_solution: Team B wins decisively. The ridge point is 20/0.5 = 40 FLOPs/byte. At AI=15, the model is severely memory-bound. Team A reduces compute energy by 40%, but memory energy (which dominates) remains constant or increases. Team B's layer fusion triples data reuse, reducing memory accesses by ~3x. Since memory accesses consume ~73% of the total energy, reducing them by 67% yields a massive ~49% overall energy saving.
  common_mistake: |
    **The Pitfall:** Assuming reducing FLOPs always reduces energy proportionally.
    **The Rationale:** Engineers often equate algorithmic compute complexity directly with physical power consumption.
    **The Consequence:** In memory-bound regimes, this ignores the dominant energy cost of data movement, leading to optimizations with marginal physical impact.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Energy costs: 20 pJ/byte (DRAM), 0.5 pJ/FLOP (Compute).
       - Baseline AI = 15 FLOPs/byte.
       - Team A: -40% FLOPs. Team B: AI increases to 45 FLOPs/byte (~67% memory reduction).
    2. **Calculations:**
       - Baseline Energy per byte: 20 pJ (DRAM) + (15 * 0.5 pJ) = 27.5 pJ.
       - Compute share = 7.5 / 27.5 = ~27%. Memory share = 20 / 27.5 = ~73%.
       - Team A savings = 40% of 27% = ~11% total energy saved.
       - Team B savings = 67% reduction in memory access = 67% of 73% = ~49% total energy saved.
    3. **Conclusion & Interpretation:**
       - **Result: Memory Energy-Bound**. Team B saves significantly more energy (49% vs 11%) because the model is memory-bound, making memory optimization far more impactful than FLOP reduction.
