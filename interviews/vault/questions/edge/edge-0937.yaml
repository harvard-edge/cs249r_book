title: Energy Optimization Strategy Selection
scenario: Two teams optimize inference energy for an edge vision model. Team A reduces FLOPs by 40% via pruning (but adds sparse memory accesses). Team B fuses 5 consecutive layers to increase arithmetic intensity from 15 to 45 FLOPs/byte without reducing total FLOPs.
question: "Which saves more energy on a chip with 20 pJ/byte DRAM and 0.5 pJ/FLOP?"
details:
  realistic_solution: 'Ridge point = 20/0.5 = 40 FLOPs/byte. Team A: Reduces compute energy by 40%, but sparse access patterns may increase memory traffic (irregular access defeats caching). If memory traffic stays constant, they save 40% of compute energy but the workload at AI=15 is memory-bound — compute is only ~27% of total energy. Net saving: ~11%. Team B: Fusion triples data reuse, reducing memory accesses by ~3x. At AI=15, memory dominates (~73% of energy). Reducing memory energy by 67% saves ~49% of total energy. Team B wins decisively because the workload is memory-energy-bound, making memory optimization far more impactful than FLOP reduction.'
  common_mistake: |
    **The Pitfall:** Assuming reducing FLOPs always reduces energy proportionally.
    **The Rationale:** Engineers often equate algorithmic compute complexity directly with physical power consumption.
    **The Consequence:** In memory-bound regimes, this ignores the dominant energy cost of data movement, leading to optimizations with marginal physical impact.
  napkin_math: |
    1. **Energy distribution at AI=15:** Energy per byte processed = `20 pJ (DRAM) + 15 FLOPs * 0.5 pJ/FLOP = 27.5 pJ`.
    2. **Compute vs Memory Energy:** Compute = `7.5 / 27.5 ≈ 27%`. Memory = `20 / 27.5 ≈ 73%`.
    3. **Team A (40% FLOP reduction):** Saves `40% * 27% ≈ 11%` of total energy.
    4. **Team B (67% memory access reduction):** Saves `67% * 73% ≈ 49%` of total energy.
    **Team B saves significantly more energy (49% vs 11%) because the model is memory-bound.**
