title: Edge Label Quality Sample Size
scenario: An edge vision system receives 15,000 human labels/day from a vendor. You
  can manually audit 2% of labels, and historically any labeler below 95% agreement
  is removed. Size the audit sample and explain whether it can catch a labeler with
  90% accuracy.
question: How many labels are audited at 2% of 15,000/day, and what error-count signal
  would a 90% labeler produce in that sample?
details:
  realistic_solution: The audit sample is 300 labels/day. If this were an IID sample
    from one labeler, a 90% accurate labeler would produce about 30 errors, while
    a 95% labeler would produce about 15. That is an illustrative signal, not a complete
    per-labeler hypothesis test; the audit must allocate enough samples per labeler
    and site.
  common_mistake: Auditing a global 2% sample and assuming it is powered for every
    individual labeler or site.
  napkin_math: '2% x 15,000 = 300 labels. Expected errors: 10% x 300 = 30 vs 5% x
    300 = 15.'
