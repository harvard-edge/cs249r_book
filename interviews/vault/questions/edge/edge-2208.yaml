title: Edge Label Quality Sample Size
scenario: 'An edge vision system receives 15,000 human labels/day from a vendor. You can manually audit 2% of labels, and historically any labeler below 95% agreement is removed.'
question: 'How many labels are audited at 2% of 15,000/day, and what error-count signal would a 90% labeler produce in that sample?'
details:
  realistic_solution: 'The audit sample is 300 labels/day. If this were an IID sample from one labeler, a 90% accurate labeler produces about 30 errors, while a 95% labeler produces about 15. The audit must allocate enough stratified samples per labeler to achieve statistical significance.'
  common_mistake: |
    **The Pitfall:** Assuming a flat 2% global audit provides enough statistical power to evaluate every individual labeler fairly.
    **The Rationale:** Flat percentage sampling is easy to implement globally, but fails to account for variance in individual labeler volume.
    **The Consequence:** High-volume labelers are heavily scrutinized while low-volume labelers slip through with terrible quality.
  napkin_math: |
    **Assumptions & Constraints:**
    - 15,000 labels/day, 2% audit rate.
    - Baseline target: 95% accuracy.

    **Calculations:**
    - Audit Volume: 0.02 * 15,000 = 300 total labels/day.
    - 90% Labeler Errors (if 300 sampled): 300 * 0.10 = 30 errors.
    - 95% Labeler Errors (if 300 sampled): 300 * 0.05 = 15 errors.

    **Conclusion & Interpretation:**
    - **Result: Mathematically insufficient audit volume (Data-Volume-Bound)**. A global 300-label sample is insufficient when distributed across dozens of labelers.
