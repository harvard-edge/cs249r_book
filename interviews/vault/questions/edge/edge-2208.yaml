title: Edge Label Quality Sample Size
scenario: An edge vision system receives 15,000 human labels/day from a vendor. You can manually audit 2% of labels, and historically any labeler below 95% agreement is removed.
question: How many labels are audited at 2% of 15,000/day, and what error-count signal would a 90% labeler produce in that sample?
details:
  realistic_solution: The audit sample is 300 labels/day. If this were an IID sample from one labeler, a 90% accurate labeler would produce about 30 errors, while a 95% labeler would produce about 15. That is an illustrative signal, not a complete per-labeler hypothesis test; the audit must allocate enough samples per labeler and site.
  common_mistake: |
    **The Pitfall:** Assuming a flat 2% global audit provides enough statistical power to evaluate every individual labeler fairly.
    **The Rationale:** Flat percentage sampling is easy to implement globally, but fails to account for the fact that some labelers do more volume than others.
    **The Consequence:** High-volume labelers are heavily scrutinized while low-volume labelers slip through with terrible quality because they rarely appear in the tiny 2% sample.
  napkin_math: |
    1. **Audit Volume:** 2% of 15,000 labels = 300 total labels audited per day across all labelers.
    2. **Hypothetical Signal:** If a single 90% accurate labeler generated *all* 300 labels, they would produce roughly 30 errors (10% of 300).
    3. **Baseline Comparison:** A compliant 95% accurate labeler would produce roughly 15 errors (5% of 300).
    4. **Result:** While the signal (**30 vs 15 errors**) is mathematically clear for 300 samples, a 2% global sample is far too small when distributed across dozens of unique labelers.
