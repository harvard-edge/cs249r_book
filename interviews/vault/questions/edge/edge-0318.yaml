title: The Depthwise Separable Efficiency Gain
scenario: You're optimizing a computer vision pipeline for an autonomous vehicle's
  ADAS, which runs on an edge accelerator like a NVIDIA Jetson. Your profiler identifies
  a standard 3x3 convolutional layer as a major performance bottleneck. The input
  tensor to this layer is 112x112x256 (HWC), and it produces an output with 512 channels,
  using a stride of 1 and 'same' padding.
question: For the 112x112x256 to 512-channel 3x3 layer, how does a depthwise separable
  convolution work and what MAC reduction factor results?
details:
  realistic_solution: 'A depthwise separable convolution breaks a standard convolution
    into two much cheaper steps:

    1.  A **depthwise convolution** that applies a single 3x3 filter to each of the
    256 input channels independently.

    2.  A **pointwise convolution** that uses a 1x1 filter to combine the 256 outputs
    from the depthwise step into the final 512 output channels.'
  common_mistake: A common mistake is to only consider the first (depthwise) stage
    of the separable convolution and forget the second (pointwise) stage. This leads
    to a wild overestimation of the efficiency gain, suggesting a ~512x improvement
    (equal to the number of output channels) instead of the more realistic ~8.8x.
  napkin_math: |-
    1. Standard MACs: 112 * 112 * 256 * 512 * 3 * 3 = 14.8 GMACs.
    2. Depthwise MACs: 112 * 112 * 256 * 3 * 3 = 0.029 GMACs.
    3. Pointwise MACs: 112 * 112 * 256 * 512 * 1 * 1 = 1.64 GMACs.
    4. Total Separable MACs = 1.67 GMACs.
    5. Reduction factor = 14.8 / 1.67 = 8.86x.
  options:
  - The standard convolution is ~2x more expensive.
  - The standard convolution is ~9x more expensive.
  - The standard convolution is ~8.8x more expensive.
  - The standard convolution is ~512x more expensive.
  correct_index: 2
