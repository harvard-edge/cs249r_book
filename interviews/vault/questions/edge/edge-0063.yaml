title: The Battery Saver
scenario: You are deploying a human presence detection model on a battery-powered camera module designed for several months of operation. The model needs to run periodically.
question: How do you maximize battery life while ensuring reliable detection and responsiveness?
details:
  realistic_solution: "Implement power-aware inference strategies:\n  1.  Duty Cycling: Keep the main processor and ML accelerator in a deep low-power sleep state for the majority of the time. Wake up periodically (e.g., every 5-10 seconds for presence detection) to capture a frame, run inference, and then immediately return to sleep. The duration of the active state should be minimized.\n  2.  Dynamic Frequency Scaling (DFS) / Dynamic Voltage and Frequency Scaling (DVFS): Adjust the CPU/GPU clock frequency and voltage dynamically. Run inference at the lowest clock frequency and voltage that meets the required latency, reducing power consumption during active periods.\n  3.  Model Quantization: Utilize lower precision formats like FP16 or INT8 quantization for the ML model. This significantly reduces the computational load, memory bandwidth, and thus power consumption during inference.\n  4.  Hardware Offload: Prioritize using dedicated low-power hardware accelerators (e.g., DSPs, NPUs, VPUs) for inference. These are often much more power-efficient for specific ML tasks than general-purpose CPUs/GPUs.\n  5.  Pre-triggering with Low-Power Sensors: Employ a very low-power, inexpensive sensor (e.g., a Passive Infrared (PIR) sensor for motion, or a simple microphone for sound) to wake the main system and ML accelerator only when potential activity is detected, rather than periodically waking for vision inference."
  common_mistake: |
    **The Pitfall:** Proposing to run the model continuously at full power or neglecting low-power pre-triggers.
    **The Rationale:** Candidates focus solely on model efficiency (like quantization) and forget that even highly optimized models consume too much continuous power for long-term battery operation.
    **The Consequence:** The device drains its battery in hours instead of months, failing the core product requirement.
  napkin_math: |
    - Assuming a camera module draws 50mW in sleep mode and 2W during active inference.
    - If inference takes 100ms and runs every 5s, the duty cycle is 2% active, 98% sleep.
    - Average power = (2W * 0.02) + (0.05W * 0.98) = 0.04W + 0.049W = 0.089W.
    - With a 10Wh battery: Continuous = 10Wh / 2W = 5 hours. Duty-cycled = 10Wh / 0.089W = 112 hours (~4.7 days).
    - Adding a PIR pre-trigger (0.1mW) that wakes the camera only on motion (assume motion 10% of the time):
    - Average power = 0.1 * 0.089W (active state) + 0.9 * (0.05W + 0.0001W) (sleep + PIR state) = 0.0089W + 0.04509W = 0.05399W.
    - With a 10Wh battery: 10Wh / 0.05399W = 185 hours (~7.7 days).
    **Conclusion: A combination of duty-cycling and hardware pre-triggering drastically multiplies battery life.**
