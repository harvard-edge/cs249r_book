title: The Battery Saver
scenario: You are deploying a human presence detection model on a battery-powered camera module designed
  for several months of operation. The model needs to run periodically. How do you maximize battery life
  while ensuring reliable detection and responsiveness?
details:
  realistic_solution: "Implement power-aware inference strategies:\n  1.  Duty Cycling: Keep the main\
    \ processor and ML accelerator in a deep low-power sleep state for the majority of the time. Wake\
    \ up periodically (e.g., every 5-10 seconds for presence detection) to capture a frame, run inference,\
    \ and then immediately return to sleep. The duration of the active state should be minimized.\n  2.\
    \  Dynamic Frequency Scaling (DFS) / Dynamic Voltage and Frequency Scaling (DVFS): Adjust the CPU/GPU\
    \ clock frequency and voltage dynamically. Run inference at the lowest clock frequency and voltage\
    \ that meets the required latency, reducing power consumption during active periods.\n  3.  Model\
    \ Quantization: Utilize lower precision formats like FP16 or INT8 quantization for the ML model. This\
    \ significantly reduces the computational load, memory bandwidth, and thus power consumption during\
    \ inference.\n  4.  Hardware Offload: Prioritize using dedicated low-power hardware accelerators (e.g.,\
    \ DSPs, NPUs, VPUs) for inference. These are often much more power-efficient for specific ML tasks\
    \ than general-purpose CPUs/GPUs.\n  5.  Pre-triggering with Low-Power Sensors: Employ a very low-power,\
    \ inexpensive sensor (e.g., a Passive Infrared (PIR) sensor for motion, or a simple microphone for\
    \ sound) to wake the main system and ML accelerator only when potential activity is detected, rather\
    \ than periodically waking for vision inference."
  common_mistake: '"Run the model continuously at full power." This will quickly drain the battery, failing
    to meet the "several months" requirement.'
  napkin_math: 'A camera module might draw 50mW in sleep mode and 2W during active inference. If inference
    takes 100ms and runs every 5 seconds, the duty cycle is 2% active, 98% sleep. Average power = (2W
    \times 0.1s + 0.05W \times 4.9s) / 5s = (0.200 + 0.245) / 5 = 0.445 / 5 =  0.089W. Compare to continuous
    2W operation: a 22.5× reduction in average power. With a 10Wh battery: continuous = 10 / 2 = 5 hours.
    Duty-cycled = 10 / 0.089 = 112 hours (~4.7 days). Adding a PIR pre-trigger (0.1mW) that wakes the
    camera only on motion: if motion occurs 10% of the time, effective duty cycle drops to 0.2%. Average
    power ≈ 0.05W (sleep dominates) → 200 hours (~8.3 days) on 10Wh.'
