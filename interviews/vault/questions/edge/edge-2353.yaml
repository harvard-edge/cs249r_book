title: Robotic RL Checkpoint RPO
scenario: A robotic arm training a reinforcement learning policy on a Jetson Orin saves its neural network weights to disk exactly once per hour.
question: Describe the maximum data loss window (Recovery Point Objective) under this periodic checkpointing strategy.
visual:
  kind: svg
  path: edge-2353.svg
  alt: Timeline showing checkpoints at 0 and 60 minutes, with a crash at 59 minutes wiped out the progress.
  caption: Maximum data loss window for hourly checkpoints.
details:
  realistic_solution: Because the policy network weights are only persisted to non-volatile storage every 60 minutes, a crash right before the next checkpoint will wipe out all experience gathered since the last save. Thus, the maximum data loss window (RPO) is 1 hour.
  common_mistake: Calculating how long it takes to write to disk instead of identifying the 1-hour interval as the data loss window.
  napkin_math: |
    **Assumptions & Constraints:**
    - Checkpoint interval: 1 hour.
    - Crash timing: Right before next checkpoint.

    **Calculations:**
    - RPO equals the exact interval between persistent saves.

    **Conclusion & Interpretation:**
    - **Result: 60 minutes (Reliability-Bound)**. The maximum data loss window is exactly the 1 hour checkpoint interval.
