title: The Boot Loop of Doom
scenario: Your Rockchip RK3588 edge device runs a safety monitoring model in a chemical plant. After a power outage, the device enters a boot loop — it starts up, attempts to load the model, crashes, and reboots. The eMMC filesystem shows no corruption (fsck passes), and the model file exists with the correct size, but fails to load with an 'invalid header' error.
question: What happened to the model file, and how do you prevent this boot loop in the future?
details:
  realistic_solution: The model file was being written during the power outage. The filesystem uses data=ordered mode where metadata is journaled but data is not. The fix is to write the update to a temp file, call fsync(), and then rename() for an atomic update.
  common_mistake: |
    **The Pitfall:** Blaming the eMMC for complete corruption and suggesting a full reflash.
    **The Rationale:** Candidates see a boot loop and assume hardware failure, ignoring that `fsck` passes and the file size is correct, indicating a subtle software write-flow issue.
    **The Consequence:** Field technicians are dispatched to replace hardware unnecessarily, when a simple atomic software update pattern would have prevented the issue entirely.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model file: 45 MB.
    - eMMC write speed: ~100 MB/s.

    **Calculations:**
    - Write time: 45 MB / 100 MB/s = 0.45s.
    - Fleet risk (500 devices): 500 * (10 outages * (0.45 / 86400)) = 2.6% chance per year.

    **Conclusion & Interpretation:**
    - **Result: 0 seconds (I/O-Bound Reliability)**. With an atomic replacement via temp file and rename, the vulnerability window drops to 0 seconds.
