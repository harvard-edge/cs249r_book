title: The Boot Loop of Doom
scenario: Your Rockchip RK3588 edge device runs a safety monitoring model in a chemical plant. After a
  power outage, the device enters a boot loop — it starts up, attempts to load the model, crashes, and
  reboots. The cycle repeats every 45 seconds. The eMMC filesystem shows no corruption (fsck passes).
  The model file exists and has the correct size. But the model fails to load with 'invalid header' error.
  What happened, and how do you prevent this in the future?
details:
  realistic_solution: 'The model file was being written during the power outage. The filesystem (ext4)
    uses journaling for metadata but not for data by default (`data=ordered` mode). During the OTA update,
    the system: (1) opened the new model file, (2) wrote 45 MB of data, (3) was about to call `fsync()`
    and rename the temp file to the final name. The power cut happened between steps 2 and 3.'
  common_mistake: '"The eMMC is corrupted — reflash the device." But fsck passes and the file size is
    correct. The corruption is more subtle.'
  napkin_math: 'Model file: 45 MB. eMMC write speed: ~100 MB/s. Write time: 0.45s. fsync time: ~50ms.
    Rename time: <1ms. Window of vulnerability (write without fsync): 0.45s. Power outage probability
    during 0.45s window: low per event, but over 500 devices × 365 days × ~10 outages/year = 5000 outage
    events. P(outage during 0.45s write) ≈ 0.45 / 86400 × 5000 ≈ 0.026 = 2.6% chance per year across fleet.
    With atomic replacement: vulnerability window = 0 (rename is atomic). Boot loop cycle: 15s boot +
    5s startup + 3s load + 22s restart delay = 45s ✓.'
