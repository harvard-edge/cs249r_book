title: The Boot Loop of Doom
scenario: Your Rockchip RK3588 edge device runs a safety monitoring model in a chemical plant. After a
  power outage, the device enters a boot loop — it starts up, attempts to load the model, crashes, and
  reboots. The cycle repeats every 45 seconds. The eMMC filesystem shows no corruption (fsck passes).
  The model file exists and has the correct size. But the model fails to load with 'invalid header' error.
  What happened, and how do you prevent this in the future?
question: "What happened, and how do you prevent this in the future?"
details:
  realistic_solution: 'The model file was being written during the power outage. The filesystem (ext4)
    uses journaling for metadata but not for data by default (`data=ordered` mode). During the OTA update,
    the system: (1) opened the model file directly (truncating it), (2) wrote 45 MB of data, (3) was about to call `fsync()`. The power cut happened between steps 2 and 3. The file size metadata was journaled, but the data blocks were not fully flushed, leaving garbage or zeros. The fix is to write to a temp file first, `fsync()`, and then `rename()` which is atomic.'
  common_mistake: '"The eMMC is corrupted — reflash the device." But fsck passes and the file size is
    correct. The corruption is more subtle.'
  napkin_math: 'Model file: 45 MB. eMMC write speed: ~100 MB/s. Write time: 0.45s. fsync time: ~50ms. Rename time: <1ms. Window of vulnerability (write without fsync): 0.45s. With 1 daily update, a device is vulnerable for 0.45s out of 86400s per day. If a facility experiences 10 power outages a year at random times, the probability of an outage hitting this exact window is 10 * (0.45 / 86400) = 0.000052 per device/year. For a fleet of 500 devices, the expected number of occurrences is 500 * 0.000052 = 0.026 (or a 2.6% chance per year across the fleet). With atomic replacement: vulnerability window = 0 (rename is atomic). Boot loop cycle: 15s boot + 5s startup + 3s load + 22s restart delay = 45s.'
