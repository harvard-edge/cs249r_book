title: Drop-Oldest Queue Policy
scenario: A security camera feeds frames into a constrained inference queue. High motion causes the queue to saturate and delay alerts.
question: Explain why implementing a LIFO or drop-oldest queueing policy improves real-time security alerts.
details:
  realistic_solution: A standard FIFO queue processes stale frames during saturation, causing highly delayed, irrelevant detections. A drop-oldest policy discards outdated buffered frames so the inference engine always processes the most recent, freshest data. This trades continuous frame tracking for tightly bounded, real-time latency on critical alerts.
  common_mistake: |
    **The Pitfall:** Focusing purely on preventing memory leaks or queue overflow, rather than prioritizing the temporal relevance of the buffered data.
    **The Rationale:** In traditional computer science, dropping data is generally viewed as an error or failure state, so engineers default to FIFO queues to ensure "complete" processing.
    **The Consequence:** The inference engine spends its limited TOPS processing stale, outdated frames from 5 seconds ago while the current, critical security event is delayed, rendering the alerts useless.
  napkin_math: |
    1. **FIFO Saturation:** If inference takes 50ms and frames arrive at 10ms, a FIFO queue of 100 frames takes 5 seconds to process, ensuring a minimum 5-second delay on the newest event.
    2. **Drop-Oldest:** The queue actively discards the 99 stale frames.
    3. **Result:** The system strictly bounds latency, ensuring the inference engine is always working on the **most recent 1 frame** for immediate real-time alerts.
