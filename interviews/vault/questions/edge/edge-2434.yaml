title: Drop-Oldest Queue Policy
scenario: A security camera feeds frames into a constrained inference queue. High
  motion causes the queue to saturate and delay alerts.
question: Explain why implementing a LIFO or drop-oldest queueing policy improves
  real-time security alerts.
details:
  realistic_solution: A standard FIFO queue processes stale frames during saturation,
    causing highly delayed, irrelevant detections. A drop-oldest policy discards outdated
    buffered frames so the inference engine always processes the most recent, freshest
    data. This trades continuous frame tracking for tightly bounded, real-time latency
    on critical alerts.
  common_mistake: Focusing on memory usage rather than the temporal relevance of the
    data for bounded latency.
  napkin_math: Reduces N buffered frames to 1 current frame.
