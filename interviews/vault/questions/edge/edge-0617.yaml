title: The Autonomous Perception Deadline Miss
scenario: You are the tech lead for the perception system of a new autonomous vehicle. The system must process high-resolution camera images and run a large object detection model with a hard real-time deadline of 33ms per frame (30 FPS). The current model, developed on cloud GPUs, is a heavy custom CNN that requires 20 T-FLOPs per frame and takes 120ms on the target hardware, a Jetson AGX Orin. This causes the vehicle to drop 3 out of every 4 frames. The Orin has a 60W thermal budget, allowing it to sustain roughly 150 INT8 TOPS.
question: What multi-stage optimization strategy would bring the 20 TFLOP model below 33ms on Orin, and why in that order?
details:
  realistic_solution: A multi-stage strategy is required because we need to attack compute, memory, and overhead bottlenecks systematically. The order is critical to success.
  common_mistake: |
    **The Pitfall:** Suggesting a single solution like 'just use 50% unstructured pruning'.
    **The Rationale:** Engineers often underestimate the magnitude of a 4x latency gap and fail to realize that sequenced, multi-stage optimizations are necessary.
    **The Consequence:** Proposing inadequate optimization plans that fall far short of the strict 33ms real-time deadline.
  napkin_math: |
    - Baseline FP16 model = 20 TFLOPS.
    - Target TOPS = 20T / 0.033s = 606 TOPS (exceeds Orin's max).
    - Stage 1: Convert to INT8. Uses 275 TOPS. Time = 20T / 275T = 72ms (still misses 33ms).
    - Stage 2: Structural pruning/NAS down to 8 TOPS. Compute = 8T / 275T = 29ms.
    - Stage 3: Memory bandwidth factor: 100MB / 204.8 GB/s = 0.48ms.
    - **Result: Total time is 29.48ms, finally meeting the 33ms target.**
