title: The Autonomous Perception Deadline Miss
scenario: You are the tech lead for the perception system of a new autonomous vehicle. The system must
  process high-resolution camera images and run a large object detection model with a hard real-time deadline
  of 33ms per frame (30 FPS). The current model, developed on cloud GPUs, is a heavy custom CNN that requires
  20 T-FLOPs per frame and takes 120ms on the target hardware, a Jetson AGX Orin. This causes the vehicle
  to drop 3 out of every 4 frames. The Orin has a 60W thermal budget, allowing it to sustain roughly 150
  INT8 TOPS. Design a multi-stage optimization strategy to bring the model latency below 33ms. Justify
  the order of your proposed techniques and the expected performance gain at each stage.
question: "What multi-stage optimization strategy would bring the 20 TFLOP model below 33ms on Orin, and why in that order?"
details:
  realistic_solution: A multi-stage strategy is required because we need to attack compute, memory, and
    overhead bottlenecks systematically. The order is critical to success.
  common_mistake: Suggesting a single solution, like 'just use 50% pruning.' Unstructured pruning gives
    minimal speedup on modern accelerators. Simply quantizing is not enough. The key is understanding
    that no single technique will bridge a 4x latency gap; a carefully sequenced, multi-stage strategy
    is required, where each step enables the next.
  napkin_math: 'Baseline FP16 model requires 20 TFLOPS. To hit 33ms, we need 20T / 0.033s = 606 TOPS,
    exceeding Orin''s 275 TOPS max. Converting to INT8 uses 275 TOPS: 20T / 275T = 72ms (still misses
    33ms). We must reduce the model. By pruning down to 8 TOPS, compute drops to 8T / 275T = 29ms. Factoring
    in memory bandwidth: 100MB / 204.8GB/s = 0.5ms. Total time is 29.5ms, finally meeting the 33ms target.'
