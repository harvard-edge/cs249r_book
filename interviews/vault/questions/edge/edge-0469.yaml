title: The Sensor Fusion Stutter
scenario: A perception prototype uses two GPUs to run sensor fusion models with a hard real-time deadline of 33ms. The models take 20ms to compute. The two GPUs must exchange 2 GB of feature map data over a PCIe Gen4 x16 bus with a practical bandwidth of 60 GB/s.
question: Based on a napkin math calculation, what is the most likely cause of the ~33ms 'dark time' latency overhead?
details:
  realistic_solution: The PCIe bus is the bottleneck. The calculation shows that transferring 2 GB of
    data over a 60 GB/s bus takes approximately 33.3ms, which perfectly accounts for the 'dark time'.
    PCIe is a general-purpose bus and is not optimized for the high-frequency, high-volume data exchanges
    required by multi-GPU model parallelism. The correct architectural solution is to specify a system
    with a dedicated, high-bandwidth interconnect like NVLink. Using the spec sheet, an NVLink 4.0 bridge
    provides 900 GB/s of bandwidth, which would reduce the transfer time to ~2.2ms and bring the total
    latency down to ~22.2ms, comfortably meeting the 33ms deadline.
  common_mistake: |
    **The Pitfall:** Blaming the OS scheduler or assuming the hardware bus has infinite bandwidth.
    **The Rationale:** Engineers underestimate the sheer volume of data exchanged during multi-GPU fusion and fail to perform a basic bandwidth calculation.
    **The Consequence:** Spending weeks optimizing compute kernels or OS settings when the fundamental bottleneck is the physical bus interconnect.
  napkin_math: |
    1. **Unexplained latency**: Total Latency (53ms) - Compute Time (20ms) = 33ms.
    2. **Data transfer requirement**: 2 GB of intermediate feature data.
    3. **PCIe bandwidth**: Gen4 x16 is ~60 GB/s practical.
    4. **Transfer time**: 2 GB / 60 GB/s = **33.3 ms**.
    5. **Conclusion**: The 33ms overhead is entirely caused by **PCIe bus saturation**. Upgrading to an NVLink bridge (900 GB/s) would reduce this to ~2.2ms.
  options:
  - The OS scheduler overhead for managing two GPUs is causing context switching delays.
  - The PCIe bus is saturated; transferring 2 GB at the given 60 GB/s bandwidth takes ~33ms.
  - The sensor ingress pipeline is using slow Ethernet, creating a data input bottleneck before the GPUs
    are even used.
  - The model is memory-bound, and the 33ms is due to slow HBM access on the GPUs.
  correct_index: 1
