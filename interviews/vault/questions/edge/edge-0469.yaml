title: The Sensor Fusion Stutter
scenario: You are a Staff ML Systems Engineer at an autonomous vehicle company, diagnosing a latency issue
  in a new perception prototype. The system uses two powerful GPUs to run sensor fusion models and has
  a hard real-time deadline of 33ms. Profiling shows the models take 20ms to run, but end-to-end latency
  is ~53ms, leaving 33ms of 'dark time'. For the fusion stage, the two GPUs must exchange a total of 2
  GB of feature map data. They are connected via a standard motherboard's PCIe Gen5 x16 bus, which you've
  measured to have a peak effective bandwidth of 60 GB/s. Based on a napkin math calculation, what is
  the most likely cause of the 33ms overhead?
details:
  realistic_solution: The PCIe bus is the bottleneck. The calculation shows that transferring 2 GB of
    data over a 60 GB/s bus takes approximately 33.3ms, which perfectly accounts for the 'dark time'.
    PCIe is a general-purpose bus and is not optimized for the high-frequency, high-volume data exchanges
    required by multi-GPU model parallelism. The correct architectural solution is to specify a system
    with a dedicated, high-bandwidth interconnect like NVLink. Using the spec sheet, an NVLink 4.0 bridge
    provides 900 GB/s of bandwidth, which would reduce the transfer time to ~2.2ms and bring the total
    latency down to ~22.2ms, comfortably meeting the 33ms deadline.
  common_mistake: Engineers often underestimate the sheer volume of data exchanged between models during
    fusion tasks. They may blame the model's implementation ('it's an inefficient algorithm') or the OS
    scheduler ('context switching is slow'), assuming the hardware bus has 'infinite' bandwidth. They
    fail to perform the simple bandwidth calculation that would immediately reveal the bus itself is the
    component under maximum strain.
  napkin_math: 1. **Isolate the unknown latency:** Total Latency (53ms) - Compute Time (20ms) = 33ms of
    unexplained 'dark time'. 2. **Identify the data transfer:** Between the two GPUs, 2 GB of intermediate
    feature data must be transferred. 3. **Calculate PCIe transfer time:** PCIe Gen4 x16 bandwidth ≈ 60
    GB/s (practical). Transfer time = 2 GB / 60 GB/s ≈ 33.3ms. This perfectly accounts for the 33ms dark
    time.
  options:
  - The OS scheduler overhead for managing two GPUs is causing context switching delays.
  - The PCIe bus is saturated; transferring 2 GB at the given 60 GB/s bandwidth takes ~33ms.
  - The sensor ingress pipeline is using slow Ethernet, creating a data input bottleneck before the GPUs
    are even used.
  - The model is memory-bound, and the 33ms is due to slow HBM access on the GPUs.
  correct_index: 1
