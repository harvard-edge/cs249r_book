title: Shadow vs Canary Deployment on Host-Dependent Accelerators
scenario: 'We are upgrading a critical object detection model running on an edge appliance equipped with
  a Hailo-8 accelerator (26 TOPS INT8, 2.5W). The Hailo-8 is a dataflow accelerator that completely lacks
  local DRAM, meaning it must stream all model weights and intermediate activations directly from the
  host CPU''s memory over PCIe. You need to evaluate two rollout strategies for the new v2 model: a shadow
  deployment where the device processes every incoming camera frame with both v1 and v2 sequentially by
  timeslicing the accelerator, or a canary rollout where 10% of the fleet operates exclusively on v2.
  Which strategy do you recommend for this specific hardware, and why?'
details:
  realistic_solution: The canary deployment is significantly better for this hardware. Because the Hailo-8
    streams directly from host memory, timeslicing two different models (v1 and v2) per frame would require
    constantly reconfiguring the dataflow and streaming model weights over PCIe for every context switch.
    This would thrash the host's memory bandwidth and destroy throughput. A canary rollout isolates risk
    to a subset of devices while allowing the Hailo-8 to operate efficiently on a single, uninterrupted
    compiled dataflow.
  common_mistake: Candidates often reflexively choose shadow deployments because it provides perfect 1:1
    input comparison without risking the production output. They fail to account for the physical hardware
    architecture, specifically how the Hailo-8's lack of local DRAM interacts with context switching between
    two different models.
  napkin_math: 'Assume a 20MB INT8 model running at 30 FPS. In a single-model canary deployment, weights
    are loaded once, and only image/activation data (e.g., 1MB/frame) streams over PCIe: 30 FPS * 1MB
    = 30 MB/s. In a shadow deployment alternating v1 and v2 per frame, the host must re-stream the 20MB
    weights for every context switch. At 30 FPS, that is 60 context switches per second: 60 * 20MB = 1.2
    GB/s of continuous PCIe overhead just for weights. This massive bandwidth spike would easily bottleneck
    low-power edge host systems.'
