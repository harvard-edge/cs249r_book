title: 'Hailo-8 Min-Max Calibration'
scenario: 'A team compiled YOLOv5s for the Hailo-8 using the Hailo Dataflow Compiler (DFC). The Hailo-8 is a uniform per-tensor symmetric INT8 device with no per-channel quantization for activations. Running DFC''s default Min-Max calibrator on a 1024-image set produced a 10% mAP drop vs. the FP32 baseline; switching DFC to its entropy (percentile/KL) calibrator recovered most of the loss without retraining. The team observed that the SiLU-output activations had a long upper tail (max ~84, 99.9th percentile ~12).'
question: 'Recall why Min-Max calibration collapses INT8 dynamic range on Hailo-8 SiLU outputs, and compute the effective bit loss.'
details:
  realistic_solution: 'Hailo-8 uses per-tensor symmetric INT8. Min-Max picks scale based on the extreme outlier, forcing the bulk of the tensor to collapse into a tiny integer range. Entropy calibration clips the tail, keeping the bulk mapped to the full INT8 budget. Because Hailo-8 lacks per-channel activation quantization, the SiLU outlier in any channel poisons the entire tensor''s scale.'
  common_mistake: 'Treating Min-Max as safer because it never clips. On a per-tensor symmetric INT8 device, a single outlier throws away precision for the entire tensor.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Symmetric INT8 scale = max(|x|)/127.
    - Max outlier = 84, 99.9th percentile = 12.

    **Calculations:**
    - Min-Max Scale = 84 / 127 ≈ 0.661.
    - Levels for bulk (|x| <= 12) under Min-Max = 12 / 0.661 ≈ 18 levels.
    - Effective bits (Min-Max) = log2(18) ≈ 4.17 bits.
    - Entropy Scale (~99.99%) = 12 / 127 ≈ 0.094.
    - Levels for bulk under Entropy = 12 / 0.094 ≈ 127 levels (log2(127) ≈ 6.99 bits).

    **Conclusion & Interpretation:**
    - **Result: ~4.17 Effective Bits (Precision-Bound)**. Min-Max calibration wastes nearly half the INT8 budget on outliers.
