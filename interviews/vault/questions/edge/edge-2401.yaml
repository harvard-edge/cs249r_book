title: Hailo-8 Min-Max Calibration
scenario: A team deployed an object detection model to a Hailo-8 with Min-Max calibration
  and observed a 10% mAP drop versus FP32 baseline. Switching to entropy (KL-divergence-minimizing)
  calibration recovered most of the loss.
question: Identify why Min-Max calibration drops 10% mAP versus entropy-based calibration
  on the Hailo-8, in terms of how each method handles activation outliers and the
  resulting INT8 scale factor.
details:
  realistic_solution: This process is called calibration, which is a necessary step
    in Post-Training Quantization to determine the scaling factors and zero points
    for converting FP32 activations to INT8.
  common_mistake: Confusing calibration with model fine-tuning or Quantization-Aware
    Training (QAT).
  napkin_math: Scale = (max - min) / 255
