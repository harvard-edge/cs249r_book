title: Hailo-8 Min-Max Calibration
scenario: A team compiled YOLOv5s for the Hailo-8 using the Hailo Dataflow
  Compiler (DFC). The Hailo-8 is a uniform per-tensor symmetric INT8 device
  with no per-channel quantization for activations. Running DFC's default
  Min-Max calibrator on a 1024-image set produced a 10% mAP drop vs. the FP32
  baseline; switching DFC to its entropy (percentile/KL) calibrator recovered
  most of the loss without retraining. The team observed that the SiLU-output
  activations had a long upper tail (max ~84, 99.9th percentile ~12).
question: Recall why Min-Max calibration collapses INT8 dynamic range on
  Hailo-8 SiLU outputs while entropy calibration recovers most of the lost
  mAP. Compute the symmetric-INT8 scale factor each calibrator selects for
  this activation, and identify which downstream tensors lose the most
  effective resolution under the Min-Max choice.
details:
  realistic_solution: 'Hailo-8 uses per-tensor symmetric INT8 (range [-127, 127]),
    so the scale is set by max(|x|). Min-Max picks scale = 84/127 ~= 0.661, so
    one INT8 step represents 0.661 in activation space, and the 99.9th-percentile
    bulk of the tensor (|x| <= 12) collapses into only 12/0.661 ~= 18 INT8
    levels - log2(18) ~= 4.17 effective bits, almost half of the nominal 8.
    Entropy calibration in the Hailo DFC clips at a percentile (~99.99th, scale
    set near 12/127 ~= 0.094), keeping the bulk of the distribution mapped to
    ~127 levels (log2(127) ~= 6.99 bits, essentially the full INT8 budget) at
    the cost of clipping a handful of tail values. Because Hailo-8 lacks
    per-channel activation quantization, the SiLU outlier in any channel
    poisons the entire tensor''s scale, which is why the recovery is dramatic.
    The downstream conv layer consuming this tensor loses the most resolution
    under Min-Max.'
  common_mistake: Treating Min-Max as "safer because it never clips" without
    recognising that on a per-tensor symmetric INT8 device a single outlier
    discards roughly 3 effective bits across the whole tensor (4.17 bits used
    out of 8 nominal), hurting accuracy far more than a percentile clip would.
  napkin_math: 'Symmetric INT8 scale = max(|x|)/127. Min-Max: 84/127 = 0.661;
    bulk gets 12/0.661 ~= 18 levels = log2(18) ~= 4.17 bits. Entropy (~99.99%):
    12/127 = 0.094; bulk gets ~127 levels = log2(127) ~= 6.99 bits.'
