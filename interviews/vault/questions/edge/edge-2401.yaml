title: Hailo-8 Min-Max Calibration
scenario: You are compiling a model for a Hailo-8 edge accelerator, which explicitly
  targets INT8 precision for energy efficiency.
question: Identify the process of collecting minimum and maximum tensor values from
  a representative dataset prior to inference.
details:
  realistic_solution: This process is called calibration, which is a necessary step
    in Post-Training Quantization to determine the scaling factors and zero points
    for converting FP32 activations to INT8.
  common_mistake: Confusing calibration with model fine-tuning or Quantization-Aware
    Training (QAT).
  napkin_math: Scale = (max - min) / 255
