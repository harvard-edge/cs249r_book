title: 'Edge AI Accelerator Comparison: Operator Scheduling for BERT Inference'
scenario: You are tasked with deploying a real-time BERT-tiny model for natural language understanding on an edge device. You are considering two primary hardware platforms: the Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W) and a hypothetical 'EdgeCompute X' accelerator (16 GB LPDDR5, 200 TOPS INT8, 30W).
question: How would you evaluate the impact of memory reuse, parallel execution, and layer fusion on BERT-tiny latency and throughput across the two accelerators?
details:
  realistic_solution: 'A realistic solution would involve: 1. Profiling the BERT-tiny model to identify critical paths and memory-intensive operations. 2. Utilizing hardware-specific scheduling primitives (e.g., Qualcomm''s NPU SDK, or a generic compiler like TVM/Glow customized for each backend) to explore different operator fusion and parallelization schemes. 3. Developing custom benchmarks that isolate the impact of memory reuse for specific layers and measure the overhead of dynamic scheduling. 4. Comparing actual latency and throughput metrics under varying batch sizes and input sequences, alongside detailed power consumption analysis, to determine the optimal platform and scheduling strategy for the specific latency and power budget constraints.'
  common_mistake: |
    **The Pitfall:** Focusing only on peak TOPS or raw memory capacity.
    **The Rationale:** Candidates often neglect the interplay between operator types, memory access patterns, and the specific scheduling limitations of each accelerator's software stack.
    **The Consequence:** They overlook the true memory bandwidth impacts, leading to highly inaccurate performance predictions and suboptimal hardware selection.
  napkin_math: |
    1. **Latency Formula**: Latency = (Workload / Compute_Throughput) + (Memory_Access_Size / Memory_Bandwidth).
    2. **Layer Fusion Benefit**: If layer A produces a 1GB tensor consumed by layer B, fusing them on-chip saves **1GB of off-chip memory bandwidth**.
    3. **Parallel Execution**: Scheduling two independent 100 GFLOPS tasks on a 400 TOPS device could reduce execution time by **50%** if there are no data dependencies.
    4. **Memory Reuse**: Reusing data already in fast cache/registers reduces the effective memory access latency to near zero, significantly improving throughput over theoretical maximums.
