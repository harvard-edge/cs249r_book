title: Power Budget Allocation for Multi-Model Pipeline on Jetson Orin 60W
scenario: 'A Jetson AGX Orin operates in 60W MODE with the following pipeline: detection
  (GPU, 20W), tracking (CPU, 8W), segmentation (GPU, 25W), postprocessing (CPU, 4W).
  System overhead (DRAM, storage, networking) uses 10W. Calculate total power and
  determine if DLA-offloading detection can fit within a 45W TDP envelope.'
question: What is the peak power of this Orin NX pipeline, and can DLA-offloading
  detection fit it within a 45W TDP?
details:
  realistic_solution: 'Sequential pipeline: GPU handles detection and segmentation
    in sequence, not simultaneously. Peak GPU power: max(20W, 25W) = 25W. Concurrent
    GPU+CPU scenario: GPU 25W + CPU tracking 8W + CPU postprocessing 4W + system 10W
    = 47W > 45W. Adding DLA for detection: DLA ~5W vs GPU 20W for detection. New pipeline:
    DLA detection (5W) || GPU segmentation (25W). CPU tracking (8W) and postprocessing
    (4W) run concurrently. Peak: DLA 5W + GPU 25W + CPU 8W + CPU 4W + system 10W =
    52W > 45W. Solution: reduce GPU segmentation to power-cap mode (18W): 5+18+8+4+10
    = 45W exactly.'
  common_mistake: Summing peak power for all components simultaneously; in a sequential
    pipeline, GPU and CPU may not both be at peak simultaneously, but DRAM and system
    overhead are always present.
  napkin_math: 'Baseline peak power (sequential GPU, concurrent CPU): max(20W, 25W) GPU
    + 8W CPU tracking + 4W CPU postprocessing + 10W system = 25+8+4+10 = 47W > 45W TDP.
    With DLA: DLA and GPU can run concurrently. DLA detection 5W + GPU segmentation 25W
    + CPU tracking 8W + CPU post 4W + system 10W = 52W > 45W. Power cap GPU segmentation
    to 18W: 5+18+8+4+10 = 45W exactly.'
