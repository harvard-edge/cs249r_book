title: 'Multi-Model Serving on Edge SoC'
scenario: 'A retail self-checkout kiosk powered by an edge device must concurrently serve a 15ms YOLOv8 object detector and a 50ms ViT age-verification model. Both models share a single memory bus.'
question: 'Propose a serving infrastructure design that guarantees the YOLOv8 model a strict 30ms p99 latency SLA while maximizing the throughput of the background ViT model.'
details:
  realistic_solution: 'To guarantee the SLA, the engineer should propose resource partitioning at the framework or hardware level. YOLOv8 should be pinned to high-priority CUDA streams, isolated on the Orin''s Deep Learning Accelerator (DLA) cores, or managed via NVIDIA Triton with strict priority queues. Because the shared memory bus is the true bottleneck, they must also ensure the background ViT model''s batch size is constrained to prevent memory-bandwidth saturation that would induce tail-latency spikes in YOLOv8. Use nsys profiling to monitor Deep Learning Accelerator (DLA) core isolation.'
  common_mistake: |
    **The Pitfall:** Assuming standard asynchronous CPU threads are sufficient.
    **The Rationale:** Candidates ignore hardware realities like shared memory bus contention.
    **The Consequence:** The ViT model's batch processing saturates memory bandwidth, inducing tail-latency spikes that violate the YOLOv8 SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - YOLO service time: 15ms.
    - 30ms SLA limit.

    **Calculations:**
    - Max throughput: 1000 / 15ms = 66 FPS.
    - Maximum queue depth: 30ms / 15ms = 2.

    **Conclusion & Interpretation:**
    - **Result: Queue depth 1 (Latency-Bound)**. Maximum queue depth cannot exceed 1 to strictly meet the SLA.
