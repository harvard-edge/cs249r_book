title: Multi-Model Serving on Edge SoC
scenario: A retail self-checkout kiosk powered by a Jetson AGX Orin (LPDDR5, 60W limit)
  must concurrently serve a 15ms YOLOv8 object detector and a 50ms ViT age-verification
  model. Both models share the single ~204.8 GB/s memory bus.
question: Propose a serving infrastructure design that guarantees the YOLOv8 model
  a strict 30ms p99 latency SLA while maximizing the throughput of the background
  ViT model.
details:
  realistic_solution: To guarantee the SLA, the engineer should propose resource partitioning
    at the framework or hardware level. YOLOv8 should be pinned to high-priority CUDA
    streams, isolated on the Orin's Deep Learning Accelerator (DLA) cores, or managed
    via NVIDIA Triton with strict priority queues. Because the shared memory bus is
    the true bottleneck, they must also ensure the background ViT model's batch size
    is constrained to prevent memory-bandwidth saturation that would induce tail-latency
    spikes in YOLOv8.
  common_mistake: Assuming standard asynchronous CPU threads or unmanaged concurrent
    execution is sufficient, ignoring the hardware reality that LPDDR5 memory bus
    contention will destroy the latency SLA of the fast model.
  napkin_math: 15ms YOLO service time allows 66 FPS max. 30ms SLA means queue depth
    cannot exceed 1. Dedicated cores + priority streams are mandatory.
