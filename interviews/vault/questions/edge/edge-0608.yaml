title: The OTA Thermal Brick
scenario: You are the ML Systems architect for a company building smart security cameras powered by the
  Jetson AGX Orin. To improve person detection, you roll out a new model via an over-the-air (OTA) update.
  The model is aggressively optimized using 2:4 structured pruning and compiled into a TensorRT engine.
  All your lab benchmarks show a 30% latency improvement.
question: "Why could the 2:4-pruned TensorRT model's 30% lab latency win disappear on passively cooled Orins in the field?"
details:
  realistic_solution: The core problem is a 'Profile Drift' between the lab environment and the field.
    TensorRT's optimizer selects highly specialized kernels (CUDA, and especially those for sparse tensors)
    based on the GPU's clock frequencies during engine creation. When the Jetson Orin throttles due to
    heat, its clock speeds decrease, which can invalidate the chosen kernels' performance assumptions
    or even cause TensorRT to fall back to slower, generic implementations. The 2:4 structured pruning
    is particularly sensitive to this, as its speedup relies entirely on the availability of specialized
    Tensor Core instructions which are often the first to be impacted by thermal down-clocking. The architecture
    must be robust to this dynamic state.
  common_mistake: 'Blaming the hardware or suggesting a simple fix like adding a fan. This ignores the
    systemic issue: the model''s performance characteristics are not robust to environmental changes.
    Another common mistake is assuming that TensorRT optimization is a one-shot, static process that is
    independent of the device''s runtime state.'
  napkin_math: 'Orin at 30W: max GPU clock ~1.3GHz. At thermal throttle (passive cooling, hot day): clock
    drops to ~800MHz = 62% of max. 2:4 sparsity kernels need specific Tensor Core paths. Throughput at
    full clock: 275 TOPS. At throttle: ~170 TOPS (62%). Lab latency: 10ms. Field latency: 10/0.62 = 16.1ms.
    A 30% improvement evaporates into a potential 61% slowdown.'
