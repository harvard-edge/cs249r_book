title: The OTA Thermal Brick
scenario: You are the ML Systems architect for a company building smart security cameras powered by the Jetson AGX Orin. To improve person detection, you roll out a new model via an over-the-air (OTA) update. The model is aggressively optimized using 2:4 structured pruning and compiled into a TensorRT engine. All your lab benchmarks show a 30% latency improvement.
question: Why could the 2:4-pruned TensorRT model's 30% lab latency win disappear on passively cooled Orins in the field?
details:
  realistic_solution: The core problem is 'Profile Drift' between the lab environment and the field. TensorRT's optimizer selects highly specialized kernels (e.g., Sparse Tensor Cores) based on the GPU's clock frequencies during engine creation. When the passively cooled Orin throttles due to heat, its clock speeds decrease, invalidating the kernels' performance assumptions. The 2:4 structured pruning is extremely sensitive to this, as its speedup relies entirely on specialized Tensor Core instructions which fall back to slower, generic implementations when thermally downclocked.
  common_mistake: |
    **The Pitfall:** Blaming the hardware or assuming TensorRT optimization is static.
    **The Rationale:** Engineers treat compiler optimization as a one-shot process that guarantees performance irrespective of the device's runtime thermal state.
    **The Consequence:** They miss the systemic issue of profile drift, failing to foresee that performance assumptions collapse under field thermal constraints.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Orin GPU max clock: ~1.3GHz at 30W (275 TOPS).
       - Passive cooling thermal throttle: drops clock to ~800MHz (62% of max).
       - Lab latency: 10ms.
    2. **Calculations:**
       - Throttled Performance: 275 TOPS * 0.62 = ~170 TOPS.
       - Field latency scaling: 10ms / 0.62 = ~16.1ms.
    3. **Conclusion & Interpretation:**
       - **Result: Thermal-Bound (Profile Drift)**. The 30% latency improvement evaporates into a 61% slowdown under thermal throttling because the sparse Tensor Core kernels lose their optimal operational envelope.
