title: The Jittery Robot Arm
scenario: A robotic arm uses an edge ML model for real-time object tracking to pick and place objects on a conveyor belt. The system requires a consistent latency of no more than 50ms. Occasionally, inference latency spikes to 100-150ms, causing missed picks.
question: What are the common system-level culprits for this jitter, and how would you diagnose and mitigate them?
details:
  realistic_solution: 'Jitter stems from OS scheduling, resource contention, and GC. Mitigate by using a Real-Time OS (RTOS) or PREEMPT_RT patch, dedicating cores (cgroups), using zero-copy DMA, and writing the critical path in C++ to avoid Garbage Collection pauses.'
  common_mistake: |
    **The Pitfall:** Assuming "the model isn't optimized enough."
    **The Rationale:** Engineers focus purely on model FLOPs and ignore non-deterministic system-level factors like kernel preemptions.
    **The Consequence:** Wasting effort on further model compression when the root cause is OS scheduling or GC pauses.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target deadline: 50ms
       - Typical inference: 30ms
    2. **Calculations:**
       - Slack for overheads: 50ms - 30ms = 20ms
       - Typical OS preemption or GC pause: 10ms - 100ms
    3. **Conclusion & Interpretation:**
       - **Result: Jitter Destroys Slack.** A single 20ms OS preemption fully consumes the slack, causing missed real-time deadlines.
