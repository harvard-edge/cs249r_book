title: The 30 FPS Rule
scenario: 'An autonomous vehicle''s perception system needs to process camera and LiDAR data to identify obstacles.'
question: "To maintain a smooth 30 frames-per-second (FPS) processing rate, what is the hard real-time latency budget for a single frame of computation?"
details:
  realistic_solution: 'The hard real-time budget is approximately 33 milliseconds. This is derived directly from the system''s requirement to process 30 distinct frames every second to perceive the world in a timely manner. Unlike a web service, where exceeding a latency budget might mean a slow page load, a missed deadline here means the vehicle is operating on stale data, a critical safety failure.'
  common_mistake: |
    **The Pitfall:** Quoting a 100ms P99 target or a 16ms mobile UI target.
    **The Rationale:** Engineers from a cloud background bring web-service SLA mindsets, while mobile devs bring UI refresh mindsets.
    **The Consequence:** A missed deadline in this hard real-time system means the vehicle operates on stale data, creating a critical safety failure.
  napkin_math: |
    * Target processing rate: 30 Frames Per Second (FPS).
    * Time in one second: 1000 milliseconds.
    * Latency budget per frame: 1000 ms / 30 frames = 33.33 ms.
    * **The hard real-time budget is approximately 33 ms.**
  options:
  - 100 ms
  - 16 ms
  - 33 ms
  - 1 ms
  correct_index: 2
