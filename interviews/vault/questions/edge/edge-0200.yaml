title: The 30 FPS Rule
scenario: An autonomous vehicle's perception system needs to process camera and LiDAR data to identify
  obstacles. To maintain a smooth 30 frames-per-second (FPS) processing rate, what is the hard real-time
  latency budget for a single frame of computation?
question: "To maintain a smooth 30 frames-per-second (FPS) processing rate, what is the hard real-time latency budget for a single frame of computation?"
details:
  realistic_solution: The hard real-time budget is approximately 33 milliseconds. This is derived directly
    from the system's requirement to process 30 distinct frames every second to perceive the world in
    a timely manner. Unlike a web service, where exceeding a latency budget might mean a slow page load,
    a missed deadline here means the vehicle is operating on stale data, a critical safety failure.
  common_mistake: Confusing a hard real-time edge deadline with other latency targets. Engineers from
    a cloud background might quote a 100ms P99 target, which is far too slow for a safety-critical system.
    Others might misremember the target for 60 FPS mobile UI (16ms) or a 1ms microcontroller interrupt.
  napkin_math: To maintain 30 FPS, each frame must be fully processed before the next one arrives. The
    total time in one second is 1000 milliseconds.
  options:
  - 100 ms
  - 16 ms
  - 33 ms
  - 1 ms
  correct_index: 2
