title: NUMA-Aware Runtime Scheduling on Embedded Chiplet
scenario: An embedded chiplet with 2 CPU clusters (A76 x4 on die-0, A55 x4 on die-1) connected via proprietary die-to-die link shows 25% higher ML inference latency than expected when the OS scheduler migrates threads between dies mid-inference.
question: How would you fix the 25% ML inference latency penalty caused by OS thread migrations between the two CPU dies?
details:
  realistic_solution: 'Multi-layered fix: (1) CPU affinity: set pthread_setaffinity_np to A76 cluster CPUs (cores 0-3) for inference threads; (2) Memory affinity: use mbind() with MPOL_BIND to bind inference tensor allocations to die-0 NUMA node; (3) Disable NUMA balancing: echo 0 > /proc/sys/kernel/numa_balancing during inference to prevent automatic page migration; (4) Use isolcpus kernel parameter for the A76 cores to prevent any scheduling on those CPUs from non-inference tasks; (5) Pin inference worker threads with SCHED_FIFO priority to prevent preemption by lower-priority tasks that could cause cache thrashing.'
  common_mistake: |
    **The Pitfall:** Setting CPU affinity at the process level and assuming it prevents all migrations.
    **The Rationale:** Candidates assume process-level affinity binds everything, ignoring that Linux CFS can still migrate tasks within an affinity mask, and memory pages don't auto-migrate.
    **The Consequence:** Cross-die memory accesses persist even with affinity set, leaving the latency penalty largely unresolved.
  napkin_math: |
    1. Die-to-die latency: 400ns per cache line vs 10ns local.
    2. Model tensor: 2MB / 64B cache lines = 32,768 cache lines.
    3. If 30% are cross-die: 0.3 * 32,768 * (400ns - 10ns) = 3.8ms extra latency.
    4. Expected inference: 15ms. Observed: 15ms * 1.25 = 18.75ms (3.75ms overhead, matches).
    5. With affinity: cross-die accesses drop to <1%, adding <0.3ms overhead, resulting in **15.3ms**.
