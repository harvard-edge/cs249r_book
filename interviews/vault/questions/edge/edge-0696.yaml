validation_issues:
- The Napkin Math section has a misleading calculation for NPU and DSP compute times; it should reflect
  actual computational capacity and not just state a lower time without justification that it's faster
  than CPU for pre-processing.
- The Napkin Math's `4GB/s` shared bus speed for both DSP and NPU is a generic value; it would be more
  precise to specify if this is actual shared memory bandwidth or a specific interface speed relevant
  to the scenario.
