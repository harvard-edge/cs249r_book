title: The Multi-Core Bottleneck
scenario: You're optimizing an ML inference pipeline on an edge SoC that features a CPU, a Neural Processing Unit (NPU), and a Digital Signal Processor (DSP). Your pipeline has a critical pre-processing stage (image resizing) followed by the main inference. The NPU is already heavily utilized by the main inference model.
question: How do you decide where to run the pre-processing stage to minimize overall pipeline latency?
details:
  realistic_solution: The decision requires profiling and balancing compute and data transfer costs. Profile each stage in isolation, estimate data transfer costs across memory domains, and consider concurrency and queuing delays on already saturated accelerators.
  common_mistake: |
    **The Pitfall:** Always offloading to the most powerful accelerator (NPU).
    **The Rationale:** Candidates ignore the data transfer overhead across memory domains and the queuing delays of an already saturated NPU.
    **The Consequence:** Creating a sequential bottleneck on the NPU that actually increases overall pipeline latency compared to concurrent CPU or DSP execution.
  napkin_math: |
    - **Assumed workload:** Pre-processing a 1080p image (2MB raw data).
    - **CPU execution:** 5ms compute, 0ms transfer (data already in main memory) = 5ms total.
    - **DSP execution:** 2ms compute + (2MB / 4GB/s shared bus = 0.5ms transfer) = 2.5ms total.
    - **NPU execution:** 1ms compute + 0.5ms transfer = 1.5ms.
    - **Queuing penalty:** If NPU queue wait is 10ms, NPU total latency = 1.5ms + 10ms = 11.5ms.
    - **Final result:** **Running concurrently on the DSP (2.5ms) is the fastest option due to NPU queuing delays.**
