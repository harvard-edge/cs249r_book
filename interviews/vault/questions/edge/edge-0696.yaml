title: The Multi-Core Bottleneck
scenario: You're optimizing an ML inference pipeline on an edge SoC that features a CPU, a dedicated Neural
  Processing Unit (NPU), and a Digital Signal Processor (DSP). Your pipeline has a critical pre-processing
  stage (e.g., image resizing and normalization) followed by the main inference. The pre-processing can
  theoretically run on any of these units. How do you decide *where* to run this pre-processing stage
  to minimize the overall end-to-end pipeline latency, given that the NPU is already heavily utilized
  by the main inference model?
question: "How do you decide *where* to run this pre-processing stage to minimize the overall end-to-end pipeline latency, given that the NPU is already heavily utilized by the main inference model?"
details:
  realistic_solution: "The decision requires profiling and balancing compute and data transfer costs.\n\
    \  1.  **Profile Each Stage:** Measure the execution time of the pre-processing on the CPU, NPU, and\
    \ DSP *in isolation*.\n  2.  **Estimate Data Transfer Costs:** Calculate the time to move input data\
    \ from the camera buffer to the memory accessible by each accelerator, and then to move the pre-processed\
    \ output to the NPU's input buffer. This is crucial for heterogeneous architectures.\n  3.  **Consider\
    \ Concurrency & Queuing:** If the NPU is already busy, scheduling the pre-processing there might lead\
    \ to significant queuing delays, even if its raw compute time is fast. The CPU or DSP might offer\
    \ better *effective* latency by running concurrently without contention.\n  4.  **Dynamic Scheduling\
    \ (Advanced):** For highly dynamic workloads, implement a runtime scheduler that monitors accelerator\
    \ utilization and dynamically dispatches tasks. For instance, if the CPU has idle cycles, it might\
    \ be faster to run pre-processing there than waiting for a busy NPU/DSP.\n  5.  **Memory Architecture:**\
    \ Understand the memory hierarchy (shared vs. dedicated, cache sizes) and bandwidth limitations between\
    \ components."
  common_mistake: '"Always offload to the most powerful accelerator (NPU/DSP) without considering data
    transfer overhead or existing workload." This ignores the cost of moving data between memory domains
    and potential queuing delays.'
  napkin_math: 'Assume pre-processing a 1080p image (2MB raw data). | - CPU compute: 5ms, no data transfer
    penalty if already in main memory. | - DSP compute: 2ms, data transfer from main memory to DSP local
    memory: 2MB / 4GB/s (typical shared bus) = 0.5ms. Total ~2.5ms. | - NPU compute: 1ms, data transfer
    from main memory to NPU local memory: 2MB / 4GB/s = 0.5ms. Total ~1.5ms. | If NPU is busy with main
    inference taking 10ms, and pre-processing adds to NPU queue, total latency for pre-processing could
    be 1.5ms (compute+transfer) + 10ms (wait) = 11.5ms. Running on DSP at 2.5ms concurrently would be
    faster.'
