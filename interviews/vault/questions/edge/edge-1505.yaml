title: Canary Rollout CPU Fallback Degradation
scenario: You are conducting a canary rollout of an updated INT8 object detection model to 5% of a fleet of remote cameras using Google Coral Edge TPUs via PCIe. Telemetry shows inference latency has dramatically increased and host CPUs are reporting thermal warnings. The previous model version runs perfectly within the 2W power envelope.
question: What is the root cause of this deployment failure?
details:
  realistic_solution: 'The updated model topology contains an operator (e.g., an exotic activation function or unfused reshape layer) not supported by the Coral compiler. While quantization to INT8 was successful, the TPU cannot execute the unsupported node. This triggers a disastrous graph partition: the TPU delegates the unsupported layer and all subsequent layers back across the PCIe bus to the host ARM CPU. The CPU is completely unequipped to handle dense matrix math, resulting in skyrocketing latency, 100% core utilization, and thermal throttling.'
  common_mistake: |
    **The Pitfall:** Blaming external infrastructure factors (network bandwidth, OTA agent memory leaks) rather than investigating graph partitioning.
    **The Rationale:** Candidates assume that if a model compiles to INT8 without hard-failing, it will execute entirely on the NPU, ignoring compiler warnings about CPU delegation.
    **The Consequence:** Engineering teams waste days debugging the OTA pipeline while remote host CPUs literally melt down trying to process dense neural network layers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Optimal TPU Latency: ~2 ms (at 4 TOPS).
    - Host CPU INT8 Throughput: ~20 GOPS (0.02 TOPS).
    - Model Compute Fallback: Assume 2 GOPS delegated to host.

    **Calculations:**
    - CPU Fallback Compute Time = 2 GOPS / 20 GOPS/sec = 0.100 s (100 ms).
    - PCI-e transfer overhead = ~5-10 ms.
    - Total latency spike = 2 ms (TPU partial) + 100 ms (CPU) + PCIe overhead = >100 ms.

    **Conclusion & Interpretation:**
    - **Result: >100 ms Latency Spike (Compute-Bound)**. The system is critically bound by the host CPU due to catastrophic graph partitioning and unsupported operators delegated from the TPU.
