title: Canary Rollout CPU Fallback Degradation
scenario: You are conducting a canary rollout of an updated INT8 object detection model to 5% of a fleet of remote cameras, each equipped with a Google Coral Edge TPU via PCIe. Shortly after the progressive rollout begins, telemetry from the canary group shows that inference latency has increased dramatically and host CPUs are reporting thermal warnings. The model was successfully quantized to INT8, and the previous model version continues to run perfectly on the remaining 95% of the fleet within the 2W power envelope.
question: What is the root cause of this deployment failure?
details:
  realistic_solution: The root cause is that the updated model architecture includes an operation (e.g., an unsupported activation function or unfused layer) that is not supported by the Google Coral Edge TPU compiler. Although the model is properly quantized to INT8, unsupported operations cause the Edge TPU to delegate that specific layer and all subsequent operations back to the host CPU via PCIe. This fallback completely eliminates the latency advantage of the TPU's 4 TOPS and significantly increases host power draw, leading to the observed thermal warnings and latency spikes.
  common_mistake: |
    **The Pitfall:** Blaming network bandwidth during the OTA update or memory leaks in the deployment agent.
    **The Rationale:** Candidates miss the hardware-specific constraint of the Coral Edge TPU compiler, which delegates unsupported operations to the host CPU even if the model is INT8.
    **The Consequence:** Deployment teams spend hours debugging infrastructure or network issues instead of fixing the model architecture to remove the unsupported operation.
  napkin_math: |
    1. Calculate optimal Edge TPU latency: 4 GOPS / 2000 GOPS/s (2 TOPS effective) = 2 ms at 2W.
    2. Estimate CPU fallback throughput: Host ARM CPU INT8 throughput is ~20 GOPS/s (0.02 TOPS).
    3. Calculate CPU fallback latency: If 2 GOPS fallback to CPU, 2 GOPS / 20 GOPS/s = 100 ms.
    4. Calculate total spike: 2 ms TPU + 100 ms CPU = 102 ms.
    **Total latency spikes from 2 ms to 102 ms (a 51x increase) because unsupported operators force compute onto the slow host CPU, triggering thermal warnings.**
