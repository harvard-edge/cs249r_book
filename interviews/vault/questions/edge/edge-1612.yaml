title: Runtime Memory for 4-bit Weights on Edge TPU
scenario: You are deploying a 10 million parameter vision model to a Google Coral Edge TPU. To save storage space on the host device, the model weights were compressed using 4-bit quantization, occupying roughly 5 MB on disk. However, the Coral Edge TPU has limited operator support and strictly requires INT8 data formats for execution.
question: What is the exact runtime weight memory footprint required when the 10M-parameter 4-bit model is unpacked to INT8 for Coral Edge TPU inference?
details:
  realistic_solution: The candidate must recognize that while 4-bit quantization is excellent for storage, the Edge TPU's systolic array strictly requires INT8 weights to achieve its 4 TOPS of performance. Therefore, the 4-bit weights must be unpacked to INT8 format before or during loading onto the device. Each parameter will consume exactly 1 byte (8 bits) of memory during inference. The solution requires calculating the memory based on the target INT8 execution precision rather than the 4-bit storage precision.
  common_mistake: |
    **The Pitfall:** Assuming runtime memory footprint equals disk storage footprint.
    **The Rationale:** Candidates mistakenly assume the runtime memory footprint remains 5 MB, forgetting that the Edge TPU hardware requires unpacking to INT8.
    **The Consequence:** Severely underestimating VRAM requirements, leading to out-of-memory (OOM) errors during deployment.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model parameters: 10,000,000.
       - Storage format: 4-bit (occupies ~5 MB).
       - Execution precision: INT8 (1 byte per parameter).
    2. **Calculations:**
       - Total runtime memory footprint: 10,000,000 parameters * 1 byte/parameter = 10,000,000 bytes.
       - Convert to MB: 10,000,000 / 1,000,000 = 10 MB.
    3. **Conclusion & Interpretation:**
       - **Result: 10 MB Runtime Footprint.** The Edge TPU must unpack 4-bit weights to INT8, doubling the memory footprint during inference compared to disk storage.
