title: The Mixed-Precision Backfire
scenario: 'Your team is optimizing a 3D LiDAR object detection model for an autonomous vehicle''s perception system, deploying to a Jetson AGX Orin. The baseline FP32 model works well. To meet the 30 FPS deadline, you convert the model to INT8 using Post-Training Quantization (PTQ). This meets the latency budget but causes an unacceptable drop in detection accuracy for distant objects.'
question: Why did INT8 PTQ make the LiDAR detector miss distant objects, and what activation failure occurs at the first INT8 layer?
details:
  realistic_solution: 'The mixed-precision approach created a dynamic range landmine. The core issue is **intermediate activation overflow**. In bright sunlight, LiDAR sensors can receive saturated, high-intensity returns from reflective surfaces. The initial FP16 layers preserved this massive dynamic range without issue. However, when passed to the first INT8-quantized layer, these large activation values drastically exceeded the scale factor derived from the ''average'' calibration set. This caused the values to clip to the edge of the INT8 range (`127`), effectively destroying the activation signatures for the entire surrounding point cloud, causing nearby distant objects to be missed.'
  common_mistake: |
    **The Pitfall:** Assuming the calibration dataset was simply too small.
    **The Rationale:** Candidates believe that adding more 'average' data will fix quantization artifacts.
    **The Consequence:** Without explicitly adding high-intensity outliers (reflective surfaces) or switching to an asymmetric clipping strategy, the activations will continually overflow and clip.
  napkin_math: |
    *   **Scale Calculation:** Max value of `50.0` over 127 gives an INT8 scale factor `S = 50.0 / 127 = 0.39`.
    *   **Overflow Example:** A highly reflective object produces an activation of `500.0`.
    *   **Quantized Result:** `500.0 / 0.39 = 1282`, which clips to the maximum `127` in INT8.
    *   **Result:** **Information is permanently destroyed via clipping, removing the magnitude differences between surrounding objects.**
