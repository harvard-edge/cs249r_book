title: 'Calculating Streaming Bandwidth for Pruned Hailo-8 Models'
scenario: 'You are deploying an INT8 CNN on a Hailo-8 dataflow accelerator (26 TOPS INT8, 2.5W). Because Hailo-8 has no local DRAM, all model parameters must stream continuously from host memory via PCIe. Your unpruned model processes 50 frames per second, requiring 60 MB of weights to be streamed per frame. To reduce the PCIe bandwidth load, you apply uniform 50% structured channel pruning across all convolutional layers.'
question: 'What host memory bandwidth is required to stream weights after uniform 50% structured channel pruning at 50 FPS?'
details:
  realistic_solution: 'With structured channel pruning, removing 50% of the channels reduces both the number of filters (output channels) and the depth of each filter (input channels). The compiler will physically remove these dimensions, resulting in a much smaller weight payload that must be streamed to the Hailo-8 accelerator.'
  common_mistake: 'Candidates often assume that 50% channel pruning reduces the model weight size by 50%. They fail to realize that pruning channels affects both the input and output dimensions of the weight tensors in sequential layers, leading to a quadratic reduction.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Original model weights per frame: 60 MB.
    - Target frame rate: 50 FPS.
    - Pruning strategy: Uniform 50% structured channel pruning.

    **Calculations:**
    - Pruning effect on weight tensor: Scales by 0.5 (C_in) * 0.5 (C_out) = 0.25 (quadratic reduction).
    - New weights per frame: 60 MB * 0.25 = 15 MB.
    - Required PCIe bandwidth: 15 MB/frame * 50 FPS = 750 MB/s.

    **Conclusion & Interpretation:**
    - **Result: 750 MB/s bandwidth required (Bandwidth-Bound)**. Uniform 50% structured channel pruning yields a 75% reduction in model weight size due to the quadratic reduction of input and output channels.
