title: Orin Memory Bandwidth Wall
scenario: A Jetson AGX Orin attempts to generate 20 tokens/sec using a 7B parameter text decoder in FP16.
question: Analyze the memory bandwidth requirement for this generation speed and determine if the Orin can support it.
visual:
  kind: svg
  path: edge-2352.svg
  alt: Bar chart showing demanded 280 GB/s bandwidth overshooting the 204.8 GB/s limit of the Orin.
  caption: Bandwidth limit violation during fast token generation.
details:
  realistic_solution: LLM auto-regressive decoding at batch size 1 is purely memory-bandwidth bound. A 7B parameter model in FP16 requires ~14 GB of memory. To generate 20 tokens per second, the full 14 GB of model weights must be streamed from DRAM through the GPU multiprocessors 20 times per second. This demands 280 GB/s of bandwidth. Since the Jetson AGX Orin's LPDDR5 bandwidth maxes out at 204.8 GB/s, this generation speed is physically impossible without quantization.
  common_mistake: |
    **The Pitfall:** Only checking if the 14 GB model fits into the 32 GB RAM.
    **The Rationale:** Failing to multiply the model size by the token generation rate to calculate the dynamic memory bandwidth requirement during auto-regressive decoding.
    **The Consequence:** Deploying an architecture that suffers severe token generation latency (throughput throttling) in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 7B parameters in FP16 (2 bytes per parameter) = 14 GB weights.
       - Target throughput: 20 tokens/sec at Batch Size = 1.
       - Hardware: Jetson AGX Orin with 204.8 GB/s memory bandwidth.
    2. **Calculations:**
       - Required Bandwidth: 14 GB * 20 Hz = 280 GB/s.
       - Shortfall: 280 GB/s - 204.8 GB/s = 75.2 GB/s deficit.
    3. **Conclusion & Interpretation:**
       - **Result: Memory Bandwidth-Bound. The Orin cannot sustain 20 tokens/sec for a 7B FP16 model.**
