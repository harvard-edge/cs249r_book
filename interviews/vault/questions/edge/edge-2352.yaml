title: Orin Memory Bandwidth Wall
scenario: A Jetson AGX Orin attempts to generate 20 tokens/sec using a 7B parameter
  text decoder in FP16.
question: Analyze the memory bandwidth requirement for this generation speed and determine
  if the Orin can support it.
visual:
  kind: svg
  path: edge-2352.svg
  alt: Bar chart showing demanded 280 GB/s bandwidth overshooting the 204.8 GB/s limit
    of the Orin.
  caption: Bandwidth limit violation during fast token generation.
details:
  realistic_solution: A 7B model in FP16 requires 14GB of memory. Generating 20 tokens/sec
    (batch size 1) requires streaming the full weights 20 times per second. Required
    bandwidth = 14 GB * 20 Hz = 280 GB/s. The Orin provides roughly 204.8 GB/s. Thus,
    20 tokens/sec is unachievable for a 7B FP16 model on this hardware.
  common_mistake: Forgetting to multiply the model size by the token generation rate
    to calculate required bandwidth.
  napkin_math: 14 GB * 20 = 280 GB/s > 204.8 GB/s
