title: The Autonomous Vehicle DMA Bounce
scenario: 'You are an ML Systems Engineer at an autonomous vehicle company diagnosing a latency issue in the sensor fusion system. The architecture uses two GPUs on a single board connected via a PCIe Gen4 x16 bus. GPU A runs perception and sends a 256 MB feature tensor to GPU B, which runs path planning. Your end-to-end latency budget from camera to planned path is a hard real-time 33ms. Using a profiler, you''ve recorded the following timings:'
question: Why is the 256 MB GPU-A to GPU-B transfer taking about 20ms instead of the expected 8ms, and how would you fix it?
details:
  realistic_solution: 'The most likely cause is a ''DMA bounce'' through host (CPU) memory. Without a direct peer-to-peer transfer path correctly configured (e.g., using NVIDIA''s GPUDirect), the driver defaults to a safe but slow path: the data is first copied from GPU A''s VRAM to the CPU''s main RAM, and then from RAM to GPU B''s VRAM. This involves two separate DMA operations, effectively traversing the PCIe bus twice and adding significant overhead from OS scheduling and memory management. The observed 20ms latency strongly suggests this two-hop journey is occurring instead of a direct, single-hop peer-to-peer transfer.'
  common_mistake: |
    **The Pitfall:** Focusing only on the peak theoretical bandwidth of PCIe and forgetting protocol-level overhead and the actual data path.
    **The Rationale:** Candidates calculate theoretical transfer time and assume the interconnect is fine if it fits the budget.
    **The Consequence:** They fail to identify that the data is bouncing through CPU host memory instead of using direct peer-to-peer DMA, leading to double the communication latency.
  napkin_math: |
    * PCIe Gen4 x16 bandwidth = 32 GB/s.
    * Direct P2P transfer time = 256 MB / 32 GB/s = 8 ms.
    * Without GPUDirect (DMA bounce):
      * GPU A to CPU RAM = 8 ms.
      * CPU RAM to GPU B = 8 ms.
    * Total transfer time = 8 ms + 8 ms = 16 ms (plus overhead ≈ 20 ms).
    * **The transfer takes ~20 ms because it bounces through the CPU RAM instead of transferring directly via P2P.**
  options:
  - The PCIe Gen4 x16 bus (32 GB/s) lacks the necessary bandwidth for a 256 MB transfer, which requires an upgrade to PCIe Gen5.
  - The system is using RDMA over InfiniBand between the GPUs, but high network congestion in the vehicle is causing packet loss and re-transmissions.
  - The transfer is bouncing through CPU host memory because peer-to-peer DMA is not enabled, effectively doubling the bus traffic and overhead.
  - The NVLink bridge connecting the GPUs is faulty, forcing a fallback to the much slower PCIe bus for the transfer.
  correct_index: 2
