title: Specifying Activation Memory Constraints for a Multi-Model Inference Pipeline
  on Jetson Orin
scenario: 'You are writing the memory allocation specification for a multi-model autonomous
  driving perception pipeline on Jetson Orin (32 GB LPDDR5 shared). The pipeline runs
  concurrently: (A) YOLOv8-L for object detection, (B) SegFormer-B2 for lane segmentation,
  (C) BEVFusion for 3D object detection from camera+LiDAR fusion. You must specify
  peak activation memory bounds for each model such that their sum plus OS overhead
  fits within 32 GB.'
question: What peak activation memory bounds should you specify so YOLOv8-L, SegFormer-B2,
  and BEVFusion fit concurrently in 32GB?
details:
  realistic_solution: 'Specification methodology: (1) profile each model independently
    with `torch.cuda.max_memory_allocated()` at target batch/resolution, (2) add 15%
    fragmentation buffer, (3) sum all peaks. YOLOv8-L at 640×640, B=1: peak activation
    ~1.5 GB (profiled). SegFormer-B2 at 512×512, B=1: ~0.8 GB. BEVFusion at 6-camera
    900×1600, B=1: ~4.2 GB. OS + CUDA runtime: 3 GB. Total spec: (1.5 + 0.8 + 4.2)
    × 1.15 + 3 = 7.475 + 3 = 10.5 GB. Remaining 21.5 GB available for KV cache, data
    buffers, and headroom. Specify maximum allowed activation memory: YOLO ≤ 2 GB,
    SegFormer ≤ 1 GB, BEVFusion ≤ 5 GB, enforced via `torch.cuda.set_per_process_memory_fraction()`.'
  common_mistake: Specifying average activation memory per model rather than peak
    activation memory. In a pipelined system, peak memory of each model may not overlap
    perfectly, but a conservative specification must assume worst-case simultaneous
    peaks for each concurrent model to guarantee no OOM under any scheduling.
  napkin_math: 'YOLOv8-L: 640×640×3 input → peak at C3 layer 80×80×512: 80×80×512×4
    B = 13 MB/layer, ~30 layers concurrent → 400 MB core activations + TRT workspace
    1 GB = 1.4 GB. SegFormer-B2 mix transformer: patch embeds 128×128×64 through 4
    stages → peak ~0.7 GB. BEVFusion: 6 cameras × 900×1600→feature: 6 × 56×100×256×4
    B = 344 MB camera features + 3D voxel grid 200×200×16×128×4 B = 3.3 GB → total
    ~3.6 GB. Sum: 1.4 + 0.7 + 3.6 = 5.7 GB × 1.15 + 3 = 9.6 GB.'
