validation_issues:
- The Napkin Math states 'If the custom CNN requires 50 GOPS/frame, total compute is 240 * 50 = 12 TOPS',
  which implies 50 GOPS, not 50 GOPS * (1 TOPS/1000 GOPS) = 0.05 TOPS. The calculation should be 240 *
  50 GOPS = 12,000 GOPS = 12 TOPS. This is technically correct but the unit mixture is confusing.
- The memory bandwidth calculation for input ingestion (6 GB/s) is correct, but the subsequent statement
  'To stay within the 32 GB LPDDR5 bandwidth limits, the architecture must fuse depthwise and pointwise
  layers in local DLA SRAM, reducing DRAM roundtrips by at least 3x' is a qualitative statement and not
  a direct numerical justification of how fusing reduces bandwidth to fit within the limit.
