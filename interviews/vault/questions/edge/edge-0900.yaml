title: Adversarial Traffic on Edge Dragonfly
scenario: A specialized edge cluster for autonomous vehicle fleet management uses a miniature Dragonfly topology connecting 72 nodes across 9 chassis (8 nodes per chassis). Intra-chassis links are 200Gbps; inter-chassis optical links are 100Gbps. A distributed graph neural network (GNN) inference task causes massive congestion on a single inter-chassis link, while other optical links sit at 0% utilization.
question: Why does the Dragonfly GNN workload congest one 100Gbps inter-chassis link while other optical links sit idle?
details:
  realistic_solution: Identify the failure of static minimal routing in a Dragonfly topology. Dragonfly relies on high-radix routers and sparse global links. If static minimal (shortest-path) routing is used, an adversarial traffic pattern (like a GNN where one chassis communicates heavily with exactly one other chassis) will bottleneck on the single dedicated global link between those two chassis. The solution is to enable Adaptive Routing (AR) or Valiant Load Balancing (VLB), which routes traffic non-minimally through intermediate chassis to utilize idle global links and increase effective bisection bandwidth.
  common_mistake: |
    **The Pitfall:** Blaming the GNN's graph partitioning and attempting to manually re-partition.
    **The Rationale:** Candidates fail to identify the failure of static minimal routing in a Dragonfly topology when faced with adversarial traffic patterns.
    **The Consequence:** Spending immense engineering effort rewriting the GNN partitioning scheme instead of enabling Adaptive Routing or Valiant Load Balancing at the network level.
  napkin_math: |
    * **Dragonfly Topology:** 9 groups, each with 1 direct link to every other group.
    * **Static Routing Bandwidth (A to B):** 1 direct link = 100Gbps
    * **VLB/Adaptive Routing Bandwidth (A to B):** 1 direct link + 7 indirect paths = 8 * 100Gbps = 800Gbps
    * **Unused Bandwidth under Static Routing:** **700Gbps**
  options:
  - Operator fusion primarily reduces compute time by eliminating redundant arithmetic operations between layers.
  - Rollback capability is unnecessary if the model was validated in the cloud, since cloud accuracy guarantees transfer to edge devices.
  - Blaming the GNN's graph partitioning and attempting to manually re-partition the graph.
  - Identify the failure of static minimal routing in a Dragonfly topology. Dragonfly relies on high-radix routers and sparse global links.
  correct_index: 3
