title: The Roofline Ridge Point
scenario: A key characteristic of a processor's roofline model is its 'ridge point'. The Jetson AGX Orin has an INT8 ridge point of ~1,342 Ops/Byte.
question: For a CNN at 500 Ops/Byte on hardware with a 1,342 Ops/Byte ridge point, is the bottleneck memory or compute?
details:
  realistic_solution: 'The model''s performance is memory-bound. The ridge point represents the arithmetic intensity needed to saturate the compute units. Since the model''s intensity (500 Ops/Byte) is well below the hardware''s ridge point (1,342 Ops/Byte), the system will spend most of its time waiting for data from memory.'
  common_mistake: |
    **The Pitfall:** Misinterpreting low arithmetic intensity as compute-bound behavior.
    **The Rationale:** Candidates reverse the roofline logic, assuming a low arithmetic intensity means the model has "simple math" and should naturally be compute-bound.
    **The Consequence:** They fail to realize that low intensity means the processor performs too few operations for every byte fetched, starving the compute cores of data and resulting in a memory bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target Hardware Ridge Point: 1,342 Ops/Byte
       - Target Workload AI: 500 Ops/Byte
    2. **Calculations:**
       - Model AI vs Hardware Ridge: 500 < 1,342
    3. **Conclusion & Interpretation:**
       - **Result: Memory Bandwidth-Bound.** Since the workload arithmetic intensity falls far below the silicon's ridge point, the math units are fundamentally starved, stalling on memory fetching.
  options:
  - Compute (TOPS)
  - Memory Bandwidth (GB/s)
  - Power Consumption (Watts)
  - On-chip Interconnect
