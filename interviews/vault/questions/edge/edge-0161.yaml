title: The Roofline Ridge Point
scenario: A key characteristic of a processor's roofline model is its 'ridge point'. The Jetson AGX Orin
  has an INT8 ridge point of ~1,342 Ops/Byte. If you are deploying a CNN that has an arithmetic intensity
  of only 500 Ops/Byte, identify the primary performance bottleneck.
details:
  realistic_solution: The model's performance is memory-bound. The ridge point represents the arithmetic
    intensity needed to saturate the compute units. Since the model's intensity (500 Ops/Byte) is well
    below the hardware's ridge point (1,342 Ops/Byte), the system will spend most of its time waiting
    for data from memory. Performance is limited by the memory bandwidth, not the peak TOPS of the processor.
  common_mistake: A common mistake is to reverse the roofline logic, thinking a low arithmetic intensity
    means the model is simple and therefore compute-bound. In reality, low arithmetic intensity means
    you perform few operations for every byte you fetch, indicating the processor is starving for data
    and is memory-bound.
  napkin_math: 'The comparison is the calculation: `Model AI (500 Ops/Byte) < Hardware Ridge Point (1,342
    Ops/Byte)`. This places the model in the memory-bound section of the roofline graph, where performance
    is limited by the ''slanted'' part of the roofline.'
  options:
  - Compute (TOPS)
  - Memory Bandwidth (GB/s)
  - Power Consumption (Watts)
  - On-chip Interconnect
