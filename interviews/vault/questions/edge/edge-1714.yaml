title: Optimizing High-Res Camera Ingestion on Jetson Orin
scenario: Your autonomous robotics team is deploying a real-time perception pipeline on an NVIDIA Jetson Orin. The system ingests streams from six 4K cameras to feed an object detection model. However, the system is dropping frames during ingestion and running dangerously close to the 60W TDP limit, preventing the pipeline from utilizing the platform's full 275 TOPS INT8 compute capacity.
question: What ingestion bottleneck is dropping six 4K camera streams on Jetson Orin, and how would zero-copy NVMM buffers reduce it?
details:
  realistic_solution: 'The bottleneck is redundant memory copying between kernel, CPU space, and GPU space. Resolve this by utilizing NVIDIA hardware-accelerated multimedia APIs with zero-copy NVMM buffers, allowing camera streams to be written directly into unified LPDDR5 memory where both CPU and GPU/DLA can access it without copying.'
  common_mistake: |
    **The Pitfall:** Architecting the pipeline as if the CPU and GPU have separate physical RAM.
    **The Rationale:** Developers rely on standard Linux V4L2 and `cudaMemcpy` workflows, ignoring Jetson's unified memory SOC architecture.
    **The Consequence:** Smashing into memory bandwidth limits and thermal ceilings purely from moving data around, starving the NPU.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 6 cameras, 4K resolution (8.3 MP), 3 bytes (RGB), 30 FPS.
       - Naive pipeline: 3 copies (driver -> user -> GPU).
    2. **Calculations:**
       - Raw stream = 6 * 8.3 * 10^6 * 3 * 30 = ~4.5 GB/s.
       - Naive copy bandwidth = 4.5 GB/s * 3 = 13.5 GB/s.
       - Zero-copy bandwidth = 4.5 GB/s * 1 = 4.5 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: 9 GB/s Bandwidth Savings**. Utilizing NVMM buffers eliminates 9 GB/s of redundant thrashing, radically dropping CPU utilization and power draw while preventing frame drops.
