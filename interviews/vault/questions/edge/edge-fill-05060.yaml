title: Model Compression Ratio Evaluation for Bandwidth-Limited Edge Deployment
scenario: Hailo-8 (26 TOPS INT8, 2.5W) must receive model updates over a 4G LTE connection (10 Mbps average
  in industrial IoT deployment). A retrained 50MB INT8 model needs to be OTA-deployed monthly. Compare
  full model update vs delta compression (only changed weights, typically 5-10% after fine-tuning) vs
  quantization-aware incremental update.
details:
  realistic_solution: 'Full update: 50MB at 10 Mbps = 40 seconds download. Monthly bandwidth: 50MB/month
    = acceptable but uses update window. Delta compression: if 7% of weights change after fine-tuning,
    delta = 50MB × 0.07 × 1.5 (encoding overhead) = 5.25MB. Download: 5.25MB at 10 Mbps = 4.2 seconds.
    Bandwidth saving: 90%. Risk: requires maintaining previous model version on device for patching. LoRA
    delta update: fine-tune with LoRA (rank-16 adapters), serialize only LoRA weights: 50MB model with
    LoRA-16 adds ~0.5MB adapters. OTA: 0.5MB in 0.4 seconds. On-device merge: LoRA→base takes 200ms. Most
    efficient: LoRA-based updates.'
  common_mistake: Sending full model weights every update cycle without considering that fine-tuned models
    share most weights with the previous deployment; delta compression can reduce update size by 10-20×.
  napkin_math: 'Full model: 50MB / 10Mbps = 40s. Delta (7% changed): 3.5MB / 10Mbps = 2.8s. LoRA-16 update:
    0.5MB / 10Mbps = 0.4s. LoRA is 100× smaller update, 0.4s download vs 40s. Best strategy: maintain
    base model, OTA only LoRA adapters.'
