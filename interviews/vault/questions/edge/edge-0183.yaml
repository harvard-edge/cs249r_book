title: The Quantization Energy Dividend
scenario: 'An automotive engineer is optimizing a neural network for a forward-facing camera on a new EV. The model must run continuously without impacting the vehicle''s range. To reduce power consumption, they are considering quantizing the model from 32-bit floating point (FP32) to 8-bit integer (INT8).'
question: What is the approximate energy saving for a single compute operation when switching from FP32 to INT8?
details:
  realistic_solution: 'The energy required for a computation is a function of the number of transistors switching, and multiplication complexity scales more than linearly with bit width. An FP32 operation involves significantly more complex circuitry than a simple INT8 multiplication. The established ratio for the energy cost of an FP32 operation versus an INT8 operation is approximately 18-to-1.'
  common_mistake: |
    **The Pitfall:** Assuming energy savings scale linearly with bit width.
    **The Rationale:** Engineers divide 32 bits by 8 bits and mistakenly conclude a 4x efficiency gain.
    **The Consequence:** They drastically underestimate the battery savings of deploying INT8 models on edge devices.
  napkin_math: |
    *   **Linear scaling (incorrect):** 32 / 8 = 4x.
    *   **Physical scaling:** Due to the quadratic complexity of digital multiplication logic.
    *   **Result:** **The energy ratio between FP32 and INT8 compute is ~18x.**
  options:
  - ~2× more efficient
  - ~4× more efficient
  - ~18× more efficient
  - ~100× more efficient
  correct_index: 2
