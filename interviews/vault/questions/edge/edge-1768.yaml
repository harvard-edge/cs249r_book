title: Sizing Llama-3 8B KV Cache for AI 100
scenario: You are designing an on-premise inference system using the Qualcomm Cloud AI 100 to serve an 8-billion parameter LLM for summarizing long corporate documents. The model weights are quantized to INT8 to leverage the 400 TOPS INT8 compute capacity. The hardware is limited to 32 GB LPDDR4x memory operating within a 75W envelope.
question: How would you calculate the maximum batch size and context length for an 8B INT8 LLM on 32 GB Cloud AI 100 and improve utilization?
details:
  realistic_solution: A strong L5 candidate will first subtract the static INT8 weight footprint from the 32 GB capacity. They will then calculate the exact KV-cache size per token based on the model's architecture. To maximize the 400 TOPS compute utilization on the AI 100, they will evaluate the optimal batch size against the required sequence length for document summarization, likely suggesting INT8 quantization for the KV-cache as well to double the effective context window or batch capacity.
  common_mistake: |
    **The Pitfall:** Ignoring the dynamic memory growth of the KV-cache.
    **The Rationale:** Candidates often calculate the memory footprint of the model weights alone and fail to evaluate the tradeoff between batch size and sequence length within the strict 32 GB memory constraint.
    **The Consequence:** Deploying an architecture that encounters Out-Of-Memory (OOM) failures as soon as context length or request concurrency increases.
  napkin_math: |
    1. **INT8 Model weights:** 8B parameters * 1 byte = 8 GB
    2. **Remaining Memory:** 32 GB - 8 GB = 24 GB
    3. **FP16 KV cache per token** (assuming 32 layers, 8 KV heads, 128 head dim) = 2 (K, V) * 2 bytes * 32 layers * 8 heads * 128 dim = 131,072 bytes (128 KB) per token
    4. **Max total tokens in memory:** 24 GB (24 * 1024 MB) / 0.125 MB = 196,608 tokens
    5. **Calculate Max Batch for 8K Context:** 196,608 / 8192 context window = 24 requests
    **Result: The maximum theoretical batch size is 24 concurrent requests.**
