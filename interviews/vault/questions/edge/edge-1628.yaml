title: Hardware-Aware NAS Compute Constraint Calculation
scenario: A hardware-aware Neural Architecture Search (NAS) is optimizing a computer vision model for the Qualcomm Cloud AI 100 (400 TOPS INT8, 75W). The system requires a minimum throughput of 10,000 FPS. Assume the evaluated models are perfectly compute-bound and achieve 100% utilization of the INT8 units.
question: What is the absolute maximum number of operations (in GOps) a candidate architecture can have per frame to meet the 10,000 FPS constraint?
details:
  realistic_solution: The correct approach involves a straightforward division of
    the accelerator's peak theoretical compute capacity by the required throughput.
    Since the system is defined as compute-bound and at 100% utilization, the maximum
    operations per frame is exactly the total operations per second divided by the
    frames per second.
  common_mistake: |
    **The Pitfall:** Failing to correctly convert units between TOPS and GOps.
    **The Rationale:** Engineers often divide raw numbers without standardizing the magnitude (Tera vs Giga), resulting in off-by-1000 errors.
    **The Consequence:** The NAS constraint predictor either rejects all viable models or accepts architectures that are 1000x too slow.
  napkin_math: |
    1. **Peak compute capacity**: 400 TOPS = 400,000 GOps (Giga-Operations per second).
    2. **Target throughput**: 10,000 FPS.
    3. **Max Ops calculation**: Peak Compute / Target FPS.
    4. **Max Operations per frame**: 400,000 GOps / 10,000 frames = **40 GOps per frame**.
