title: The Edge TCO Break-Even
scenario: 'Your automotive team is launching a new driver drowsiness detection feature. You have two options: a cloud API costing $2/month per vehicle, or an edge NPU module costing a one-time $48 per vehicle.'
question: At $2 per vehicle per month for cloud versus a $48 one-time edge NPU, what is the per-vehicle break-even time?
details:
  realistic_solution: The correct approach is to compare the recurring operational expenditure (OpEx) of the cloud solution to the one-time capital expenditure (CapEx) of the edge solution. The break-even point is the time it takes for the accumulated savings from the avoided OpEx to equal the initial CapEx.
  common_mistake: |
    **The Pitfall:** Focusing only on the marginal cost of a single inference and ignoring the amortized capital expenditure (CapEx) of the hardware.
    **The Rationale:** Engineers might incorrectly assume the edge deployment is 'free' because a compute module is already in the car.
    **The Consequence:** They fail to account for the specific BOM cost increase required to enable the new feature, leading to flawed TCO comparisons.
  napkin_math: |
    * Monthly cloud cost per vehicle (OpEx) = $2 / month.
    * Edge hardware cost (CapEx) = $48 one-time.
    * Break-even time = $48 / $2 per month = 24 months.
    * **The edge deployment breaks even exactly at 24 months (2 years).**
  options:
  - 0 months. The edge model is immediately cheaper because the hardware is already in the car.
  - 12 months. The $48 cost is significant, so it should be paid back within one fiscal year.
  - 24 months. The one-time $48 hardware cost is paid back by the avoided $2/month cloud fee after two years.
  - 48 months. The number of months is always equal to the dollar cost of the hardware.
  correct_index: 2
