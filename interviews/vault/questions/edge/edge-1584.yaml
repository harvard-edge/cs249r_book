title: Edge TPU Systolic Array Throughput Calculation
scenario: You are deploying an object detection model to a Google Coral Edge TPU for a battery-powered drone. The Edge TPU is rated at 4 TOPS for INT8 operations and consumes 2W of power. Assuming your model has a single large convolutional layer that requires 10 billion operations (10 GOPS) per inference, calculate the theoretical maximum frame rate and the energy consumed per inference, assuming perfect utilization of the systolic array.
question: On a 4 TOPS, 2W Coral Edge TPU, what max FPS and energy per inference result from a 10 GOPS convolution layer?
details:
  realistic_solution: First, establish the throughput by dividing the peak performance by the operations per inference. Since the Edge TPU provides 4 TOPS ($4 \times 10^{12}$ ops/sec) and the layer requires 10 GOPS ($10 \times 10^9$ ops/inference), we can find the maximum inferences per second. Then, use the 2W power consumption to find the energy per inference by multiplying power by the time taken for one inference.
  common_mistake: |
    **The Pitfall:** Confusing TOPS (Tera Operations Per Second) with MACs (Multiply-Accumulates).
    **The Rationale:** Candidates forget that one MAC equals two operations, or they fail to properly convert between Tera (10^12) and Giga (10^9).
    **The Consequence:** Miscalculating theoretical frame rates by a factor of 2 or more, leading to flawed architectural decisions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Edge TPU compute: 4 TOPS (4,000 GOPS).
       - Power consumption: 2 Watts.
       - Layer requirement: 10 GOPS per inference.
    2. **Calculations:**
       - Max Frame Rate = 4,000 GOPS / 10 GOPS/inference = 400 FPS.
       - Time per inference = 1 / 400 seconds = 0.0025 seconds (2.5 ms).
       - Energy per inference = 2 Watts * 0.0025 seconds = 0.005 Joules (5 mJ).
    3. **Conclusion & Interpretation:**
       - **Result: 400 FPS and 5 mJ per inference.** Assuming perfect utilization, the systolic array handles this highly **Compute-Bound** workload efficiently.
