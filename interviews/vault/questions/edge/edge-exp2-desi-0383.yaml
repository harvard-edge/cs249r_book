title: Architecting Unified Memory for Concurrent Edge Models
scenario: You are leading the design of an autonomous robotics payload deployed on an NVIDIA Jetson Orin
  (32 GB LPDDR5 shared memory, Ampere GPU + DLA accelerator, 60W TDP). The system must concurrently run
  a 14B parameter LLM for reasoning and a high-resolution vision transformer (ViT) for real-time perception.
  Architect a comprehensive memory budgeting strategy that accounts for model weights, KV-cache, peak
  activations, and system overhead. Evaluate the tradeoffs of different quantization schemes and memory
  allocation strategies to guarantee the system never OOMs during peak concurrent inference.
question: "How would you budget the Jetson Orin’s 32 GB shared memory so the 14B LLM and ViT never OOM during concurrent inference?"
details:
  realistic_solution: The optimal design explicitly partitions the unified memory, reserving 4-6 GB for
    the OS and peripheral buffers. The 14B LLM should be quantized to INT4 or INT8 to fit within 8-14
    GB, freeing up memory for the ViT and its peak activations. The architecture must enforce a hard limit
    on the KV-cache size based on the remaining memory budget and implement memory pooling for activations
    where concurrency is not strictly required.
  common_mistake: Candidates often treat the 32 GB LPDDR5 as dedicated GPU VRAM, forgetting it is unified
    memory that must also accommodate the OS, CPU processes, and camera buffers. They also frequently
    overlook the unbounded growth of the KV-cache during long contexts and fail to design a strict capping
    mechanism.
  napkin_math: 'Total Unified Memory: 32 GB. OS/System Buffer Reserve: 6 GB. Available for AI: 26 GB.
    14B LLM quantized to INT4: ~8 GB for weights. ViT-Large FP16: ~0.6 GB weights + ~1.4 GB peak activations.
    Total fixed + activations: 10 GB. Remaining for LLM KV-cache: 26 - 10 = 16 GB. Assuming the KV-cache
    consumes ~1 MB per token, the system can be safely hard-capped at a 12,000 token context window, leaving
    a 4 GB safety buffer for unexpected spikes.'
