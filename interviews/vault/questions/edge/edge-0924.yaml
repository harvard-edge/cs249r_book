title: 'Fleet-wide Rollback under Bandwidth Constraints'
scenario: 'You are deploying a 25MB object detection update to 50,000 cellular-connected dashcams (1 Mbps uplink max). A memory leak in the new inference engine causes latencies to creep from 40ms to 150ms over 2 hours, dropping frames. You need an observability system to detect this and safely rollback without saturating the cellular network.'
question: 'How would you detect the 2-hour latency creep and safely roll back 50,000 dashcams without saturating cellular uplinks?'
details:
  realistic_solution: 'Implement an edge-evaluated canary deployment with aggregated local telemetry. Instead of streaming raw inference logs, the edge device calculates a rolling 5-minute P99 latency and OOM/frame-drop counter locally. If the local P99 exceeds an 80ms threshold or frame drops exceed 1%, the device automatically switches its symlink to the cached previous model (stored in an A/B partition) and sends a lightweight 1KB rollback event to the cloud. The cloud control plane monitors these events; if more than 5% of the canary group reports a rollback, the global rollout is automatically halted.'
  common_mistake: |
    **The Pitfall:** Streaming raw inference latencies or logs to a centralized cloud observability platform.
    **The Rationale:** Candidates apply cloud-native observability patterns to edge fleets, completely ignoring the strict cellular bandwidth limits and costs.
    **The Consequence:** The telemetry data itself saturates the 1 Mbps uplink, blocking critical system functions and incurring massive cellular overage charges.
  napkin_math: |
    **Assumptions & Constraints:**
    - 50,000 devices.
    - 1 Mbps uplink limit.
    - Streaming raw logs: 25 inferences/sec, 50 bytes.
    - Edge aggregation: 1 payload (100 bytes) every 5 minutes (300s).

    **Calculations:**
    - Streaming raw logs global ingest: 50,000 devices * 25 inferences/sec * 50 bytes = 62.5 MB/sec (Fails 1 Mbps uplink limit).
    - Edge aggregation local bandwidth: 100 bytes / 300s = 0.33 bytes/sec per device.
    - Edge aggregation global ingest: 50,000 * 0.33 bytes/sec = ~16.5 KB/sec.

    **Conclusion & Interpretation:**
    - **Result: ~16.5 KB/sec (Bandwidth-Bound)**. Local aggregation uses negligible bandwidth while still providing the signal needed to trigger a global rollback.
