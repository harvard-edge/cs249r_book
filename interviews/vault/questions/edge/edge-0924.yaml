title: Fleet-wide Rollback under Bandwidth Constraints
scenario: You are deploying a 25MB object detection update to 50,000 cellular-connected dashcams (1 Mbps
  uplink max). A memory leak in the new inference engine causes latencies to creep from 40ms to 150ms
  over 2 hours, dropping frames. You need an observability system to detect this and safely rollback without
  saturating the cellular network.
details:
  realistic_solution: Implement an edge-evaluated canary deployment with aggregated local telemetry. Instead
    of streaming raw inference logs, the edge device calculates a rolling 5-minute P99 latency and OOM/frame-drop
    counter locally. If the local P99 exceeds an 80ms threshold or frame drops exceed 1%, the device automatically
    switches its symlink to the cached previous model (stored in an A/B partition) and sends a lightweight
    1KB 'rollback event' to the cloud. The cloud control plane monitors these events; if more than 5%
    of the canary group reports a rollback, the global rollout is automatically halted.
  common_mistake: Streaming raw inference latencies or logs to a centralized cloud observability platform
    for evaluation.
  napkin_math: 'Streaming raw logs: 50,000 devices * 25 inferences/sec * 50 bytes = 62.5 MB/sec global
    ingest (expensive, clogs uplink). Local aggregation: 1 payload per device every 5 mins = 100 bytes
    / 300s = 0.33 bytes/sec per device. Global ingest drops to ~16.5 KB/sec.'
