title: 'Deploying Large Language Models on Qualcomm Cloud AI 100: Encoder-Decoder Tradeoffs'
scenario: Your team is tasked with deploying a large language model (LLM) for real-time natural language understanding on an edge device, specifically the Qualcomm Cloud AI 100. This device features 32 GB LPDDR4x memory, 400 TOPS INT8 performance, and a 75W power budget. The application requires processing an average of 100 tokens per query with a maximum latency of 100ms.
question: Which LLM architecture would you choose on Cloud AI 100 for 100-token NLU under 100ms, and how do memory, INT8 compute, and 75W constraints affect it?
details:
  realistic_solution: A realistic solution would involve selecting a highly optimized, pruned, and quantized (INT8) model architecture. For instance, a distilled encoder-only model (e.g., a highly compact BERT variant) or a very small, efficient decoder-only model (e.g., MobileLLM or TinyLlama with aggressive pruning) would be strong candidates. The choice should prioritize minimal memory footprint for weights and activations, and maximal INT8 utilization. Key techniques include knowledge distillation from larger models, structured pruning, and quantization-aware training to maintain accuracy post-quantization. The solution should also describe how the model layers might map to the NPU's specific capabilities, strategies for minimizing costly data movement between LPDDR4x and compute units, and potential micro-batching or parallel processing approaches to maximize throughput while adhering to the 100ms latency per query.
  common_mistake: |
    **The Pitfall:** Choosing large, complex models or ignoring the memory bandwidth limitations of LPDDR4x.
    **The Rationale:** Candidates focus solely on the impressive 400 TOPS figure without realizing that memory bandwidth and sequential generation inherently bottleneck LLMs.
    **The Consequence:** Deploying a model that severely violates the 100ms latency constraint due to memory stalls.
  napkin_math: |
    - **Peak Compute:** 400 TOPS = 400 $\times$ 10^12 INT8 ops/s.
    - **Latency Constraint:** 100ms per query implies 40 $\times$ 10^12 ops available per query.
    - **Memory Constraint:** 32 GB LPDDR4x. A 7B parameter LLM at INT8 consumes ~7 GB for weights, leaving room for activations but limiting batch size.
    - **Power Envelope:** 75W budget means a 100ms inference consumes **7.5 Joules**, heavily favoring a distilled encoder-only or heavily pruned decoder model.
