title: 'Deploying Large Language Models on Qualcomm Cloud AI 100: Encoder-Decoder Tradeoffs'
scenario: Your team is tasked with deploying a large language model (LLM) for real-time natural language understanding on an edge device. The application requires processing an average of 100 tokens per query with a maximum latency of 100ms.
question: Which LLM architecture would you choose on this platform for 100-token NLU under 100ms, and how do memory, INT8 compute, and power constraints affect it?
details:
  realistic_solution: Deploy a highly distilled encoder-only architecture (e.g., optimized MobileBERT) or aggressively sparsified decoder. Utilize Quantization-Aware Training (QAT) to squash weights to INT8 to conform to the device's specialized MACs. To meet the stringent 100ms latency, operator fusion and zero-copy memory routing must be enforced to prevent the auto-regressive generation loop from stalling on the LPDDR4x bandwidth.
  common_mistake: |
    **The Pitfall:** Selecting large foundation models and ignoring LPDDR4x bandwidth ceilings.
    **The Rationale:** Candidates stare at the massive 400 TOPS specification and erroneously assume compute capacity directly translates to LLM generation speed.
    **The Consequence:** The auto-regressive decoder thrashes the memory bus, violating the 100ms latency SLA and forcing constant thermal throttling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target: 100ms latency per query
       - Hardware: 32 GB LPDDR4x, 75W TDP
       - Peak Compute: 400 TOPS (400e12 INT8 ops/s)
    2. **Calculations:**
       - Max execution ops allowed per query = 400e12 * 0.1s = 40 Tera-operations
       - 7B LLM INT8 footprint = ~7 GB (Fits in memory, but bottlenecks on bandwidth)
       - Energy per inference = 75W * 0.1s = 7.5 Joules absolute budget
    3. **Conclusion & Interpretation:**
       - **Result: Power/Memory-Bandwidth Bound. The 7.5 Joule ceiling and sequential fetch costs heavily favor a distilled encoder.**
