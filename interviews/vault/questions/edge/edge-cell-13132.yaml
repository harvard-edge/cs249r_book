title: 'Edge TCO Recall: CapEx vs OpEx Tradeoff for Edge AI'
scenario: Define CapEx and OpEx in the context of edge AI deployments. State when each is preferred, and apply this to choosing between purchasing 100 Jetson Orin units ($499 each = $49.9K CapEx) vs renting equivalent cloud GPU instances ($0.50/hr/unit-equivalent = $0.50*8760*100=$438K OpEx/year). Which is preferred for a cash-constrained startup?
question: For 100 Jetson Orin units, what are first-year CapEx, annual power OpEx, and why might a cash-constrained startup still prefer cloud OpEx?
details:
  realistic_solution: Buying 100 Jetson Orin units is $49.9K upfront CapEx. Annual power cost is 100 × 60W × 8,760h × $0.10/kWh / 1000 = $5,256/year. Cloud at $0.50/hr per unit-equivalent would be $438K/year, much higher over time. However, a cash-constrained startup may still prefer cloud OpEx because it avoids upfront capital, hardware maintenance, and demand risk.
  common_mistake: Equating CapEx preference with financial strength — actually, startups often prefer OpEx (cloud) because it preserves cash, despite higher long-term cost, while established companies with predictable workloads prefer CapEx.
  napkin_math: CapEx = 100 × $499 = $49,900. Annual edge power = 100 × 60 × 8,760 × 0.10 / 1000 = $5,256/year. Cloud OpEx = 100 × $0.50 × 8,760 = $438,000/year.
