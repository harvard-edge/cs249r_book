title: The Headlight Blindness Catastrophe
scenario: "You are the tech lead for the perception team at a leading autonomous vehicle company. Your team has successfully deployed an FP16 vision model on the car's Jetson AGX Orin, meeting the 30 FPS deadline. To reduce power, you quantize the model to INT8. The model passes all simulation tests. However, during on-track testing, a catastrophic failure emerges: the car completely fails to detect traffic cones at night, but only when its own headlights are on. The FP16 model handled this scenario perfectly."
question: What is the most likely physical root cause, and how would you redesign your team's quantization and deployment architecture to prevent this entire class of failures in the future?
details:
  realistic_solution: The physical root cause is activation overflow due to out-of-distribution dynamic range. The intense glare of headlights creates extreme activation spikes. In FP16, these are preserved. In INT8, because the calibration dataset lacked HDR nighttime glare, the scaling factors are too tight, causing extreme numerical clipping at 127. The structural fix is implementing Mixed-Precision Quantization (keeping sensitive early layers in FP16) or using entropy-based calibration algorithms on a strictly representative dataset.
  common_mistake: |
    **The Pitfall:** Blaming the training data or algorithm and initiating a full retraining cycle.
    **The Rationale:** It's a common reflex to assume model failure is a data coverage issue.
    **The Consequence:** This leads to a slow, expensive, and incorrect fix, while the underlying INT8 calibration vulnerability remains unresolved.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - INT8 Peak Compute: 275 TOPS.
       - FP16 Peak Compute: 137 TFLOPS.
       - Total Model Compute: 4 TFLOPs.
    2. **Calculations:**
       - Pure FP16 Latency: 4 TFLOPs / 137 TFLOPS = ~29.2 ms.
       - Mixed-Precision Target: 90% INT8 (3.6T), 10% FP16 (0.4T).
       - Mixed Compute Time: (3.6T / 275T) + (0.4T / 137T) = 13.1 ms + 2.9 ms = 16.0 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Optimization.** Mixed precision resolves activation clipping while maintaining a strict 16.0 ms latency, safely under the 33ms budget.
