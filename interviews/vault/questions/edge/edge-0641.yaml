title: The Headlight Blindness Catastrophe
scenario: 'You are the tech lead for the perception team at a leading autonomous vehicle company. Your team has successfully deployed an FP16 vision model on the car''s Jetson AGX Orin, meeting the 30 FPS (33ms) deadline. To reduce power and free up compute for sensor fusion, you lead the effort to quantize the model to INT8. The model passes all simulation tests and regression benchmarks. However, during on-track testing, a catastrophic failure emerges: the car completely fails to detect traffic cones at night, but only when its own headlights are on. The FP16 model handled this scenario perfectly. The team is blocked, and pressure is mounting from the safety organization.'
question: "What is the most likely physical root cause, and how would you redesign your team's quantization and deployment architecture to prevent this entire class of failures in the future?"
details:
  realistic_solution: The physical root cause is almost certainly **activation overflow due to calibration data mismatch**. The headlights create a high dynamic range (HDR) scene that is not present in the original calibration dataset. The pixel values from the headlights and their reflections are orders of magnitude brighter than typical 'daytime' or 'ambient night' scenes. This causes the activation values in the early layers of the neural network to spike, exceeding the [min, max] range observed during calibration. When these large activation values are quantized to INT8's limited [-128, 127] range, they are 'clipped' to the maximum value, destroying the fine-grained information needed to identify the cones. The network effectively becomes 'blinded by the light'.
  common_mistake: |
    **The Pitfall:** Blaming the training data or algorithm and initiating a full retraining cycle.
    **The Rationale:** It's a common reflex to assume model failure is a data coverage issue.
    **The Consequence:** This leads to a slow, expensive, and incorrect fix, while the underlying INT8 calibration vulnerability remains unresolved.
  napkin_math: |
    *   **FP16 Baseline:** 4 TFLOPs / 137 TFLOPS = 29.2ms compute. Weights (100MB) read = 0.5ms. Total ≈ 29.7ms.
    *   **Mixed-Precision Target:** 90% INT8 (275 TOPS), 10% FP16.
    *   **New Compute:** (3.6T / 275T) + (0.4T / 137T) = 13.1ms + 2.9ms = 16.0ms.
    *   **New Memory:** Weights shrink to 55MB (0.27ms).
    *   **Result:** New total is **~16.3ms**, halving the latency and ensuring robust dynamic range for critical layers.
