title: 'Edge Transformer Cost Mastery: Quantization Tradeoff for Edge Deployment'
scenario: 'Evaluate the full quantization tradeoff for deploying LLaMA-3-8B on Jetson
  Orin (32GB LPDDR5, 102.4GB/s) at FP16, INT8, INT4, and INT2. For each: calculate
  memory footprint, decode throughput, P99 latency at 10 req/s, and accuracy loss.
  Determine the Pareto-optimal quantization level for a customer service chatbot (SLO:
  P99 < 1s, accuracy loss < 3%).'
question: Which quantization level is Pareto-optimal for LLaMA-3-8B on Jetson Orin
  under P99 <1s and <3% accuracy loss?
details:
  realistic_solution: 'FP16: 16GB. Decode: 16GB/102.4=156ms/step, 1 tok/step. M/D/1
    at ρ=10*0.156=1.56 > 1 — unstable! Cannot handle 10 req/s at FP16. INT8: 8GB.
    Decode: 78ms/tok. ρ=10*0.078=0.78. Wq=(0.78*78)/(2*0.22)=60.84/0.44=138ms.
    W=216ms. P99=995ms < 1s ✓. Accuracy loss: ~1%. INT4: 4GB. Decode: 39ms/tok. ρ=0.39.
    Wq=(0.39*39)/(2*0.61)=15.21/1.22=12.5ms. W=51.5ms. P99=237ms ✓. Accuracy: 2-3%.
    Pareto-optimal: INT8 (1% loss, P99=995ms) or INT4 (2-3% loss, P99=237ms) both
    meet SLOs. Recommend INT4 for 4x lower latency at 1-2% more accuracy loss.'
  common_mistake: Assuming throughput scales linearly with quantization bit reduction,
    ignoring that INT2 may require specialized kernels not available in standard inference
    frameworks and INT4 dequantization overhead reduces gains.
  napkin_math: 'FP16: 16GB/102.4=156ms/tok. ρ=10*0.156=1.56 UNSTABLE. INT8: 8GB/102.4=78ms/tok=12.8
    tok/s. ρ=10/12.8=0.78. M/D/1 Wq=(ρ*S)/(2*(1-ρ))=(0.78*78)/(2*0.22)=138ms.
    W=78+138=216ms. P99=4.6*216=995ms<1s✓. Accuracy: 1%. INT4: 4GB/102.4=39ms/tok=25.6tok/s.
    ρ=0.39. Wq=(0.39*39)/(2*0.61)=12.5ms. W=51.5ms. P99=237ms✓. Accuracy: 2-3%. INT2:
    2GB/102.4=19.5ms/tok=51.3tok/s. ρ=0.195. Wq≈2.4ms. P99≈100ms✓. Accuracy: 5-10% —
    exceeds 3% SLO. Pareto: INT4 is Pareto-optimal (meets accuracy SLO, 4x better
    latency than INT8).'
