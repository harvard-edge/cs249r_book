title: Thermal Throttling of Adversarial Defenses
scenario: You are deploying a perception model for an autonomous vehicle on an NVIDIA Jetson Orin. To defend against physical adversarial patches, you add a randomized input smoothing operation as a preprocessing step. The Jetson Orin features an Ampere GPU + DLA accelerator, 32 GB LPDDR5, 275 TOPS INT8, and a 60W TDP. The main model normally takes 30ms per frame, and profiling shows the smoothing operation takes 5ms. However, under continuous load, the device hits its 60W TDP limit and the frame rate drops to 20 FPS instead of the expected ~28 FPS.
question: Why does adding 5 ms randomized input smoothing drop the Jetson Orin workload to 20 FPS instead of the expected ~28 FPS?
details:
  realistic_solution: 'Generating high-resolution random noise for input smoothing is highly memory-bandwidth intensive and typically utilizes the Ampere GPU rather than the specialized DLA. This sustained high-bandwidth workload causes a massive spike in power consumption, pushing the Jetson Orin to its 60W TDP limit. To prevent overheating, the system triggers dynamic voltage and frequency scaling (DVFS), which throttles the GPU clock speeds and proportionally increases the latency of both the preprocessing and the main model.'
  common_mistake: |
    **The Pitfall:** Assuming a software synchronization bug or CPU bottleneck.
    **The Rationale:** Candidates fail to apply the constraints of power limits and thermal throttling (DVFS) to the hardware's compute capabilities.
    **The Consequence:** They waste time debugging multithreading code instead of optimizing power-hungry memory bandwidth operations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline model takes 30ms, defense takes 5ms.
    - Observed frame rate drops to 20 FPS (50ms latency).

    **Calculations:**
    - Expected Baseline Latency is 30ms + 5ms = 35ms/frame (~28.5 FPS).
    - Observed Latency is 1000ms / 20 FPS = 50ms/frame.
    - Discrepancy is 50ms - 35ms = 15ms.

    **Conclusion & Interpretation:**
    - **Result: 50ms/frame (Thermal-Bound)**. High-bandwidth smoothing triggers DVFS thermal throttling, reducing clock speeds by ~30% and stretching latency to 50ms.
