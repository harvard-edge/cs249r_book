title: Diagnosing Host Bottlenecks with Synthetic Data on Hailo-8
scenario: You are deploying an object detection model on a Hailo-8 accelerator. To improve data efficiency for rare edge cases, your team heavily relied on synthetic data generation, which required complex input transformations (simulated noise injection and lighting normalization) during training. During on-device profiling, you observe that the end-to-end latency is severely degraded, the host CPU utilization is at 100%, and the Hailo-8 is frequently idle despite streaming data directly from host memory.
question: What system-level bottleneck is leaving the Hailo-8 idle while the host CPU is at 100% after synthetic-data-style preprocessing?
details:
  realistic_solution: The root cause is a data starvation bottleneck at the host-accelerator interface caused by the preprocessing overhead of the synthetic data pipeline. Because the Hailo-8 is a dataflow accelerator without local DRAM, it streams inputs directly from host memory. The complex input transformations (noise injection/normalization) required to match the synthetic training distribution overwhelm the host CPU, preventing it from streaming frames to the Hailo-8 fast enough, thereby leaving the 26 TOPS accelerator starved for data.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the latency as a compute-bound issue on the accelerator.
    **The Rationale:** Candidates overlook the Hailo-8's architecture (no local DRAM) and its heavy reliance on the host CPU for data streaming.
    **The Consequence:** Wasting time quantizing or pruning the model further when the actual bottleneck is completely isolated to the host CPU's preprocessing pipeline.
  napkin_math: |
    1. 1080p input resolution (1920x1080x3 bytes) ≈ 6.22 MB/frame.
    2. To achieve 60 FPS, the host must stream ≈ 373 MB/s to the Hailo-8.
    3. Complex preprocessing on the host CPU takes 25ms per frame.
    4. Host throughput is limited to 1000ms / 25ms = 40 FPS.
    5. Max achievable bandwidth drops to 248 MB/s.
    6. The 26 TOPS Hailo-8 executes the model in 3ms/frame (333 FPS capacity) but is **starved by the 25ms host preprocessing bottleneck**.
