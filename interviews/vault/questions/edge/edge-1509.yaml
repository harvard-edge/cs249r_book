title: Diagnosing Host Bottlenecks with Synthetic Data on Hailo-8
scenario: You are deploying an object detection model on an edge accelerator. To improve data efficiency for rare edge cases, your team heavily relied on synthetic data generation, which required complex input transformations (simulated noise injection and lighting normalization) during training. During on-device profiling, you observe that the end-to-end latency is severely degraded, the host CPU utilization is at 100%, and the accelerator is frequently idle despite streaming data directly from host memory.
question: What system-level bottleneck is leaving the accelerator idle while the host CPU is at 100% after synthetic-data-style preprocessing?
details:
  realistic_solution: The root cause is a data starvation bottleneck at the host-accelerator interface caused by the preprocessing overhead of the synthetic data pipeline. Because the dataflow accelerator lacks local DRAM, it streams inputs directly from host memory. Complex input transformations overwhelm the host CPU, preventing it from streaming frames fast enough, thereby leaving the accelerator starved for data.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the latency as a compute-bound issue on the accelerator.
    **The Rationale:** Candidates overlook the architecture's reliance on the host CPU for data streaming.
    **The Consequence:** Wasting time quantizing or pruning the model further when the actual bottleneck is completely isolated to the host CPU's preprocessing pipeline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target framerate: 60 FPS. 1080p resolution (6.22 MB/frame).
       - Accelerator compute latency: 3ms/frame (333 FPS).
       - Host CPU preprocessing latency: 25ms/frame.
    2. **Calculations:**
       - Required streaming bandwidth = 6.22 MB/frame * 60 FPS = 373 MB/s.
       - Max Host throughput = 1000ms / 25ms = 40 FPS.
       - Actual bandwidth achieved = 6.22 MB/frame * 40 FPS = 248 MB/s.
    3. **Conclusion & Interpretation:**
       - **The accelerator is starved because the host CPU caps the pipeline at 40 FPS. Result: Host CPU-Bound.**
