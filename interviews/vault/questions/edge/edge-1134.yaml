title: 'Edge Systolic Array Fluency: Arithmetic Intensity Estimation for Edge Models'
scenario: 'Without looking up formulas, estimate the arithmetic intensity for these
  operations running on Hailo-8 (26 TOPS INT8, internal BW≈6GB/s, ridge=4333 FLOPs/byte):
  (1) MobileNetV2 full inference (0.3 GOPS, 3.4M params) at batch=1, (2) 3x3 conv
  with 64 channels, 56x56 feature map, 64 filters, (3) 1x1 pointwise conv same dimensions.'
question: What are the arithmetic intensities for MobileNetV2, the 3x3 conv, and the
  1x1 conv on Hailo-8, and are they memory or compute bound?
details:
  realistic_solution: '(1) MobileNetV2 batch=1: FLOPs=0.3G. BW: weights=3.4MB, activations
    ≈ 5MB (sum of all layer I/O). AI = 0.3G/8.4MB = 35.7 FLOPs/byte. Memory bound
    on Hailo-8 (ridge=4333). (2) 3x3 conv 64→64, 56x56: FLOPs=2*64*56^2*9*64=231M.
    BW: in=64*56^2=200KB, weights=64*9*64=36KB, out=64*56^2=200KB. AI=231M/436KB=530
    FLOPs/byte. Memory bound (< 4333). (3) 1x1 PW same: FLOPs=2*64*56^2*64=25.7M.
    BW: in=200KB, weights=64*64=4KB, out=200KB. AI=25.7M/404KB=63.6 FLOPs/byte. More
    memory bound.'
  common_mistake: Calculating AI for the full network by dividing total FLOPs by total
    weight bytes, ignoring that intermediate activations also consume bandwidth and
    dominate for shallow networks.
  napkin_math: 'Hailo-8 ridge: 26T/6G=4333 FLOPs/byte. (1) 35.7 — memory bound. (2)
    530 — memory bound but 14x better than (1). (3) 63.6 — heavily memory bound. All
    three operations are memory bound on Hailo-8. This is expected: Hailo-8''s high
    TOPS (26) makes it compute-rich, and its internal BW (6GB/s) is the constraint.
    To be compute bound: need AI > 4333, requires batch >> 100. At batch=100: (2)
    AI ≈ 530 * (1 + weight_sharing) not linear... AI for GEMM saturates at K/(K+M/batch),
    for very large batch → 4096 for 3x3 conv. Still below 4333 Hailo ridge.'
