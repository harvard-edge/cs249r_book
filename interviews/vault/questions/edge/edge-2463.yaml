title: Symmetric Zero-Point Quantization on Edge
scenario: Compiling an object detection model for the Hailo-8 NPU requires PTQ (Post-Training
  Quantization) to 8-bit integers.
question: Explain why activating symmetric vs. asymmetric quantization impacts the
  zero-point handling during integer matrix multiplication on edge NPUs.
details:
  realistic_solution: Symmetric quantization forces the zero-point to exactly 0, allowing
    integer MAC units to skip subtracting the zero-point offset entirely during accumulation.
    Asymmetric quantization requires computing the cross-terms of the zero-points,
    adding significant ALU overhead and power cost.
  common_mistake: Assuming asymmetric quantization gives better accuracy for free,
    ignoring hardware cross-term ALU overhead.
  napkin_math: (W - Z_w) * (A - Z_a) -> 4 terms
