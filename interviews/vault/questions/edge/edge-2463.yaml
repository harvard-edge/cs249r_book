title: Symmetric Zero-Point Quantization on Edge
scenario: Compiling an object detection model for the Hailo-8 NPU requires PTQ (Post-Training Quantization) to 8-bit integers.
question: Explain why activating symmetric vs. asymmetric quantization impacts the zero-point handling during integer matrix multiplication on edge NPUs.
details:
  realistic_solution: Symmetric quantization forces the zero-point to exactly 0, allowing integer MAC units to skip subtracting the zero-point offset entirely during accumulation. Asymmetric quantization requires computing the cross-terms of the zero-points, adding significant ALU overhead and power cost.
  common_mistake: |
    **The Pitfall:** Assuming asymmetric quantization provides better accuracy for "free" and defaulting to it without profiling.
    **The Rationale:** In standard floating-point frameworks, asymmetric quantization can better capture skewed activation distributions, so practitioners assume it is strictly superior.
    **The Consequence:** Deploying asymmetric quantization on hardware that lacks dedicated zero-point accumulation paths results in a massive ALU overhead, severely degrading inference speed and increasing power draw.
  napkin_math: |
    1. **Asymmetric Math:** (W - Z_w) * (A - Z_a) expands to: `W*A - W*Z_a - A*Z_w + Z_w*Z_a`.
    2. **Cross-term Overhead:** This requires computing 4 separate terms per MAC operation instead of 1.
    3. **Symmetric Math:** Forces `Z_w = 0` and `Z_a = 0`.
    4. **Result:** Symmetric quantization reduces the math to just **`W*A`**, eliminating all cross-term ALU overhead.
