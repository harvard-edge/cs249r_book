title: Evaluating Real-Time Safety Guardrails on Jetson Orin
scenario: 'You are deploying a vision-based autonomous delivery robot using an NVIDIA Jetson Orin (32
  GB LPDDR5, 60W TDP, 275 TOPS INT8) to navigate crowded sidewalks. As part of your Responsible AI framework,
  you need to implement real-time guardrails to prevent unsafe behaviors, such as failing to yield to
  mobility aids. You must evaluate two alternatives: 1) running a lightweight, independent secondary ML
  model on the DLA accelerator to cross-check predictions, or 2) using rule-based deterministic spatial
  checks fused with the primary perception model''s uncertainty scores on the Ampere GPU. Which approach
  provides better organizational accountability and system performance?'
question: "Which approach provides better organizational accountability and system performance?"
details:
  realistic_solution: The better alternative is using rule-based deterministic checks fused with uncertainty
    scores. While the Jetson Orin has a DLA for efficient inference, rule-based systems are perfectly
    interpretable and auditable, which is critical for Responsible AI impact assessments. Furthermore,
    deterministic checks avoid memory bus contention with the Ampere GPU, guaranteeing bounded execution
    times for critical safety interventions without exceeding the 60W power envelope.
  common_mistake: Candidates often blindly prefer the secondary neural network on the DLA to maximize
    TOPS utilization, failing to consider the memory bandwidth contention on the unified LPDDR5 memory.
    They also frequently overlook that a secondary ML model can suffer from the same systematic biases
    as the primary model, failing to provide the interpretability required for safety audits.
  napkin_math: The Jetson Orin provides 275 TOPS (INT8) and a 60W TDP. If the primary perception model
    uses 150 TOPS and draws 35W, we have 125 TOPS and 25W remaining. A secondary ML guardrail on the DLA
    might consume 40 TOPS and 10W. However, if a frame must be processed in 33ms (30 FPS), transferring
    intermediate representations across the shared 32 GB LPDDR5 memory to the DLA could add 10-15ms of
    latency, pushing total time from 20ms to 35ms and violating the deadline. Deterministic checks add
    <2ms of CPU/GPU time and negligible power, safely meeting the 33ms and 60W limits.
