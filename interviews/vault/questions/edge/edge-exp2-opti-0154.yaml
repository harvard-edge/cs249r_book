title: Optimizing Adversarial Purification on Jetson Orin
scenario: An autonomous security pipeline runs on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8,
  60W TDP, Ampere GPU + DLA accelerator). To defend against physical adversarial patches, an FP16 denoising
  autoencoder purifies frames before passing them to the main object detector. Currently, both models
  execute sequentially on the Ampere GPU, causing memory bandwidth contention and reducing throughput
  to 15 FPS instead of the required 30 FPS, while pushing power consumption to the 60W thermal limit.
  How would you diagnose the hardware bottleneck and quantify the performance gain of a deployment optimization?
question: "How would you diagnose the hardware bottleneck and quantify the performance gain of a deployment optimization?"
details:
  realistic_solution: The bottleneck is GPU contention and memory bandwidth saturation from sequential
    FP16 execution. The solution is to quantize the main object detector to INT8 and offload it to the
    DLA, which is heavily optimized for dense INT8 operations. This allows the Ampere GPU to exclusively
    run the FP16 adversarial purification model, enabling a pipelined architecture where both compute
    blocks run concurrently, drastically reducing latency and power draw.
  common_mistake: Candidates often suggest pruning or knowledge distillation to shrink the models without
    analyzing the heterogeneous hardware architecture. They fail to recognize that running two sequential
    models on the GPU creates contention and completely ignores the available Deep Learning Accelerator
    (DLA).
  napkin_math: 'Target latency for 30 FPS is 33.3ms per frame. Current sequential GPU execution: Purification
    (25ms) + Detector (41ms) = 66ms total latency (15 FPS). By quantizing the detector to INT8 to utilize
    the Orin''s 275 TOPS INT8 capacity on the DLA, we assume a conservative 3x speedup, dropping detector
    latency to ~14ms. By pipelining the frame processing across the GPU and DLA, throughput is dictated
    by the slowest stage: max(25ms GPU, 14ms DLA) = 25ms per frame. The new throughput is 1000ms / 25ms
    = 40 FPS, which exceeds the 30 FPS target and relieves the 60W TDP pressure by distributing the workload.'
