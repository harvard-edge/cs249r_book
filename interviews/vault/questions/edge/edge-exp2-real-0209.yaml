title: Distilling a Hybrid Object Detector for Jetson Orin
scenario: You are deploying a real-time object detection model for an autonomous delivery robot on an
  NVIDIA Jetson Orin. The baseline teacher model is a heavy vision transformer that is highly accurate
  but runs at only 5 FPS and saturates the 60W TDP. You plan to use knowledge distillation to train a
  smaller, hybrid CNN-Transformer student model. How do you design the feature distillation strategy and
  size the student network to achieve a strict 30 FPS target while fully utilizing the platform's 275
  TOPS INT8 compute across both the Ampere GPU and the DLA accelerator?
details:
  realistic_solution: The optimal strategy uses intermediate feature distillation, aligning the teacher's
    attention maps with the student's CNN and transformer stages. To utilize the Jetson Orin efficiently,
    the student model should be designed with heavy convolutional blocks early in the network to run on
    the DLA, followed by lightweight transformer blocks mapped to the Ampere GPU. The distillation loss
    must explicitly force the DLA-bound CNN features to mimic the rich semantic representations of the
    teacher's early layers, ensuring no accuracy drop when the workload transitions between the two accelerators.
  common_mistake: Candidates often propose standard logit-only distillation, which fails to transfer the
    complex spatial reasoning of the heavy teacher to the student. Furthermore, they frequently size the
    student model uniformly without considering the heterogeneous hardware, failing to design the architecture
    to partition cleanly between the Ampere GPU (better for attention/custom ops) and the DLA (optimized
    for dense convolutions).
  napkin_math: Target frame time is 1000ms / 30 FPS = 33.3ms. Theoretical max compute per frame = 275
    TOPS / 30 FPS = 9.16 Tera-Operations (TOPs). Assuming a realistic INT8 utilization of 35% due to memory
    bandwidth limits of the 32 GB LPDDR5, the practical compute budget is ~3.2 TOPs (or ~1.6 TMACs) per
    frame. To meet latency, the student model should be sized at around 1.0-1.2 TMACs, with roughly 800
    GMACs of standard convolutions targeted for the DLA and 300 GMACs of attention and routing ops targeted
    for the Ampere GPU, keeping power draw safely below the 60W limit.
