title: Jetson Orin Unified Memory Bottleneck
scenario: You have deployed a high-resolution vision model on an NVIDIA Jetson Orin (32 GB LPDDR5, Ampere
  GPU + DLA accelerator). The model is quantized to INT8 to take advantage of the 275 TOPS capability.
  Despite the massive compute available, your Nsight Systems trace shows an end-to-end inference latency
  of 60ms. The trace reveals that the Ampere GPU is only active for a small fraction of the pipeline,
  the DLA is idle, and a massive amount of time is spent on memory transfer APIs before and after kernel
  execution. Given the Orin's architecture and its 60W TDP budget, what is the most likely root cause
  of this latency bottleneck?
question: "Given the Orin's architecture and its 60W TDP budget, what is the most likely root cause of this latency bottleneck?"
details:
  realistic_solution: The root cause is the use of explicit `cudaMemcpy` operations (Host-to-Device and
    Device-to-Host). The NVIDIA Jetson Orin features a unified 32 GB LPDDR5 memory shared physically between
    the CPU, Ampere GPU, and DLA. The correct approach is to use zero-copy memory or `cudaMallocManaged`
    so the GPU can directly read the buffers populated by the CPU, eliminating the memory duplication
    and associated latency.
  common_mistake: Candidates often assume the solution is to further optimize the CUDA kernels, aggressively
    prune the model, or lower the precision further. They fail to look at the idle time in the trace and
    miss the architectural reality of SoC memory subsystems, treating the Jetson like a discrete PCIe-attached
    GPU.
  napkin_math: Assume the model requires 550 GOPS per inference. The theoretical compute time on the Orin
    is 550 GOPS / 275 TOPS = 2 ms. With an observed latency of 60 ms, the Ampere GPU is utilized for only
    2 ms / 60 ms = 3.3% of the time. The remaining 58 ms is spent explicitly copying large image tensors
    (e.g., 30 MB) in software. By leveraging the shared 32 GB LPDDR5 memory architecture, we eliminate
    the 58 ms transfer penalty, dropping end-to-end latency closer to 2 ms while remaining extremely power-efficient
    under the 60W TDP.
