title: 'The OTA Bandwidth Budget: OTA & Firmware Updates'
scenario: You're an engineer on an autonomous vehicle team. A critical patch is required for the perception
  model running on the vehicle's edge compute unit. The full model is packaged in a 550 MB container image.
  However, by leveraging container layering, the differential OTA (Over-the-Air) update is only 40 MB.
  Calculate the minimum time required to download this critical patch to a single vehicle assuming a stable
  20 Mbps cellular connection.
details:
  realistic_solution: The key is to harmonize the units before performing the division. Network speeds
    are universally measured in bits per second, while file sizes are measured in bytes. First, convert
    the network bandwidth from Mbps to MB/s by dividing by 8. Then, divide the size of the differential
    update by the bandwidth in MB/s to find the time in seconds.
  common_mistake: Engineers often confuse Megabits per second (Mbps) for network bandwidth with MegaBytes
    (MB) for file sizes. This leads to an 8x error, drastically underestimating the required download
    time. Another common pitfall is calculating the time for the full container, not the differential
    update.
  napkin_math: 1. **Harmonize Units:** A 20 Mbps connection is `20 Megabits/sec / 8 bits/Byte = 2.5 MegaBytes/sec`
    (MB/s).
  options:
  - 2 seconds
  - 16 seconds
  - 220 seconds
  - 27.5 seconds
  correct_index: 1
