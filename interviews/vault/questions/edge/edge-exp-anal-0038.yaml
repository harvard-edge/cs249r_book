title: Unstructured Sparsity Latency Stagnation
scenario: We are deploying a vision model to a Qualcomm Cloud AI 100 on-premise inference accelerator
  (32 GB LPDDR4x, 400 TOPS INT8, 75W). We applied 75% unstructured pruning to the model's weights, which
  successfully reduced the storage size by 75%. However, when we benchmark the inference latency on the
  accelerator, we observe exactly zero speedup compared to the dense model. Explain why this happens.
question: "Why does 75% unstructured pruning reduce model storage but produce zero latency speedup on the Cloud AI 100?"
details:
  realistic_solution: The Qualcomm Cloud AI 100 relies on highly structured compute units designed for
    dense matrix multiplication. Unstructured pruning scatters zeros randomly throughout the weight tensors.
    Because the hardware executes instructions in fixed-size blocks, it cannot easily skip individual
    random zeros without control-flow overhead that negates the benefits. The accelerator still has to
    load the structured blocks and perform MAC operations on the zeros, resulting in the same latency.
    To realize actual speedups, one must use structured pruning (e.g., pruning entire filters or tiles)
    that aligns with the accelerator's execution block size.
  common_mistake: Candidates often assume that fewer non-zero weights automatically translates to faster
    execution due to reduced theoretical FLOPs. They frequently overlook how AI accelerator hardware actually
    executes matrix multiplications, instead focusing purely on the theoretical reduction in mathematical
    operations.
  napkin_math: Consider a layer requiring 20 billion INT8 operations (20 GOPS). On the Qualcomm Cloud
    AI 100 (400 TOPS INT8 peak), the theoretical dense compute time is 20e9 / 400e12 = 0.05 ms. With 75%
    unstructured sparsity, the required theoretical operations drop to 5 GOPS. However, because the hardware
    cannot skip unstructured zeros, it still processes the full 20 GOPS workload as dense blocks. Thus,
    the compute time remains 0.05 ms. Only by applying structured pruning could we reduce the scheduled
    workload from 20 GOPS to 5 GOPS, which would decrease the theoretical compute latency to 5e9 / 400e12
    = 0.0125 ms.
