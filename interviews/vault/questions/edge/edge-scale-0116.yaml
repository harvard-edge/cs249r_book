title: Edge Label Quality Gate Spec
scenario: You need a label-quality gate for edge-collected safety incidents before retraining. Labels come from different sites, shifts, and annotators. Specify the validation rules that prevent noisy labels from corrupting the next model.
question: What validation rules should gate edge-collected safety labels before retraining?
details:
  realistic_solution: Require annotator agreement, per-site sampling, disagreement escalation, schema validation, timestamp/device consistency, class-balance checks, and holdout review for rare safety classes. The gate should fail closed for high-impact labels rather than letting noisy incident labels dominate retraining.
  common_mistake: Checking only that a label field exists and ignoring disagreement, site skew, and rare-class risk.
  napkin_math: If 2% of labels are safety-critical but make up 50% of retraining loss weight, even a small label-noise rate can dominate the update.
