title: Diagnosing OOM Errors in Edge Encoder-Decoder
scenario: Your team is migrating a 10B parameter multilingual speech-to-text encoder-decoder model to a Qualcomm Cloud AI 100 accelerator for on-premise transcription. The model runs perfectly during the initial encoding phase, but consistently throws out-of-memory (OOM) errors during the long-form decoding phase. You observe that the power draw remains well within the 75W limit, but memory utilization spikes right before the crash.
question: What is the root cause of this failure?
details:
  realistic_solution: The root cause is the uncontrolled growth of the Key-Value (KV) cache during the autoregressive decoding phase. In an encoder-decoder architecture, the cross-attention mechanism requires the decoder to attend to the entire encoder output sequence, and self-attention requires caching previous decoder tokens. For long-form audio transcription, these sequences grow very large, exceeding the remaining memory after the model weights and basic activations are loaded.
  common_mistake: |
    **The Pitfall:** Blaming the static parameter size of the 10B model or assuming INT8 quantization wasn't applied correctly.
    **The Rationale:** Candidates ignore the dynamic memory requirements of the decoding phase, specifically the KV cache.
    **The Consequence:** Failing to diagnose the OOM and proposing ineffective solutions like further weight quantization instead of proper KV cache management.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Accelerator memory: 32 GB.
       - 10B INT8 weights = ~10 GB. Remaining memory = 22 GB.
       - KV Cache: 32 layers, 4096 dim, 2 bytes. Long-form: 15,000 total tokens.
    2. **Calculations:**
       - KV cache per token = 2 (K+V) * 32 * 4096 * 2 bytes = 0.5 MB.
       - Cache per stream = 15,000 * 0.5 MB = 7.5 GB.
       - Required for Batch Size 3 = 3 * 7.5 GB = 22.5 GB.
    3. **Conclusion & Interpretation:**
       - **Result: 22.5 GB > 22 GB remaining budget, causing OOM; Memory-Bound.**
