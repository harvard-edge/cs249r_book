title: Active Learning Curation for Edge TPU
scenario: Curating field data from Coral Edge TPU cameras to improve INT8 calibration without exceeding network limits.
question: How would you curate field data from Coral Edge TPU cameras to improve INT8 accuracy without exceeding edge bandwidth limits?
details:
  realistic_solution: Run a lightweight uncertainty sampling filter directly on the edge device to select highly informative frames. In the cloud, actively balance this dataset to capture extreme activation ranges, building robust activation histograms for INT8 calibration.
  common_mistake: |
    **The Pitfall:** Streaming all low-confidence edge predictions to the cloud unconditionally.
    **The Rationale:** Engineers assume network bandwidth is infinite and more data guarantees better model calibration.
    **The Consequence:** Saturated edge connections, exorbitant data transfer costs, and redundant datasets that fail to improve INT8 histograms.
  napkin_math: |
    **Assumptions & Constraints:**
    - 30 FPS = 2.6M frames/day.
    - Size = 200 KB/frame.

    **Calculations:**
    - Total raw data = 2.6M * 200 KB = 520 GB/day/device.
    - 0.1% active filtering = 2,600 frames = 520 MB/day.

    **Conclusion & Interpretation:**
    - **Result: 520 MB/day data transfer (Network-Bandwidth-Bound (Alleviated))**. Active edge curation solves INT8 calibration issues without breaking network budgets.
