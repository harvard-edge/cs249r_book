title: Active Learning Curation for Edge TPU
scenario: You are designing the dataset curation and active learning pipeline for a fleet of smart cameras deployed on Google Coral Edge TPUs (4 TOPS INT8, 2W power budget, USB form factor). Because the Edge TPU strictly requires INT8 quantization and has limited operator support, the deployed models experience unexpected accuracy drops in specific field environments.
question: How would you curate field data from Coral Edge TPU cameras to improve INT8 accuracy without exceeding edge bandwidth limits?
details:
  realistic_solution: Run a lightweight uncertainty sampling filter directly on the edge device to select highly informative frames. In the cloud, actively balance this curated dataset to capture extreme activation ranges, building robust activation histograms necessary for the INT8 calibration step required by the Edge TPU.
  common_mistake: |
    **The Pitfall:** Streaming all low-confidence edge predictions to the cloud unconditionally.
    **The Rationale:** Engineers assume network bandwidth is essentially infinite and more data guarantees better model calibration.
    **The Consequence:** Saturated edge connections, exorbitant data transfer costs, and redundant datasets that fail to improve INT8 calibration histograms.
  napkin_math: |
    - **Baseline Bandwidth:** 30 FPS generates ~2.6M frames/day. At 200KB each, transmitting everything demands 520 GB/day per device (unscalable).
    - **Active Edge Filtering:** Edge filtering selects only the top 0.1% most uncertain frames.
    - **Final Result:** **Data transfer reduces to 2,600 frames (520 MB/day). Curating a highly diverse subset of 1,000 frames is sufficient to fix the INT8 calibration histograms without breaking bandwidth constraints.**
