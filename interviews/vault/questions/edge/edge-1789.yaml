title: Hailo-8 Power and Performance Specification Recall
scenario: You are designing a passively cooled edge enclosure for a smart city traffic
  monitoring system. The system relies on a Hailo-8 dataflow accelerator for streaming
  INT8 inference directly from host memory without local DRAM. To correctly size the
  thermal interface material and heat sink, you need to recall the typical power consumption
  and peak performance of the Hailo-8 chip under load.
question: What are the Hailo-8's typical power consumption and peak INT8 performance
  under load?
details:
  realistic_solution: The candidate should explicitly state that the Hailo-8 delivers
    26 TOPS while drawing only 2.5W of power. They should recognize that its dataflow
    architecture and lack of power-hungry local DRAM contribute to this minimal thermal
    footprint. This low power dissipation allows it to be safely deployed in fanless,
    sealed edge environments.
  common_mistake: Candidates often confuse the power consumption of the Hailo-8 with
    that of a larger edge GPU or SoC, quoting figures in the 10-15W range. They may
    also incorrectly assume it requires active cooling due to its high TOPS rating.
  napkin_math: 'Given 26 TOPS INT8 performance at 2.5W power draw: Power Efficiency
    = 26 TOPS / 2.5W = 10.4 TOPS/Watt. Total heat dissipated per hour = 2.5 Joules/sec
    * 3600 sec = 9000 Joules (9 kJ).'
