title: Hailo-8 Power and Performance Specification Recall
scenario: You are designing a passively cooled edge enclosure for a smart city traffic monitoring system. The system relies on a Hailo-8 dataflow accelerator for streaming INT8 inference directly from host memory without local DRAM.
question: What are the typical power consumption and peak INT8 performance of the Hailo-8 under load?
details:
  realistic_solution: The candidate should explicitly state that the Hailo-8 delivers 26 TOPS while drawing only 2.5W of power. They should recognize that its dataflow architecture and lack of power-hungry local DRAM contribute to this minimal thermal footprint. This low power dissipation allows it to be safely deployed in fanless, sealed edge environments.
  common_mistake: |
    **The Pitfall:** Confusing the Hailo-8's power profile with a larger edge GPU like a Jetson.
    **The Rationale:** Candidates assume high TOPS ratings automatically require 10-15W and active cooling.
    **The Consequence:** Over-engineering the thermal interface and enclosure, adding unnecessary cost and moving parts (fans) to a system that can be passively cooled.
  napkin_math: |
    - **Power Efficiency:** 26 TOPS / 2.5W = 10.4 TOPS/Watt.
    - **Heat dissipation:** 2.5 Joules/sec * 3600 sec = 9000 Joules (9 kJ) per hour.
    - **Final result:** **26 TOPS at 2.5W.**
