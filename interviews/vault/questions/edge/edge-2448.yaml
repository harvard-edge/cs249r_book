title: Orin Parameter Bandwidth
scenario: A language model with 500 million parameters is loaded onto a Jetson AGX
  Orin for text generation.
question: Calculate the minimum memory bytes read from LPDDR5 strictly to load the
  weights for one full forward pass if stored in FP16 versus INT8.
details:
  realistic_solution: In FP16, each parameter takes 2 bytes. The model requires 500
    million * 2 = 1.0 GB of memory read per pass. In INT8, each parameter takes 1
    byte, requiring strictly 500 MB per pass. This directly halves the memory bandwidth
    requirement, which is critical for auto-regressive generation where batch size
    is small and execution is heavily memory-bound.
  common_mistake: Calculating FP16 as 4 bytes or assuming 500 million parameters implies
    500 megabits instead of calculating precision directly.
  napkin_math: 500M * 2 = 1000 MB vs 500M * 1 = 500 MB.
