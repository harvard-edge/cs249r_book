title: 'Edge TCO Optimization: Power Management for Always-On Edge Systems'
scenario: A 500-unit Jetson Orin fleet ($499, 60W peak) operates at 3% GPU utilization on average (burst to 100% for 5 seconds every 3 minutes). Current state: always on at 60W.
question: What are the 5-year power cost savings from DVFS reducing to 15W at idle, and their NPV at a 5% discount rate?
details:
  realistic_solution: 'Always-on 60W power cost: 500 * 60W * 43,800h * $0.10 / 1000 = $131,400 over 5 years. Burst profile: 5 seconds per 180 seconds (3 mins) is 5/180 = 2.78% active time. 97.22% idle time. DVFS average power = (0.0278 * 60W) + (0.9722 * 15W) = 1.67W + 14.58W = 16.25W. New 5-year power cost = 500 * 16.25W * 43,800h * $0.10 / 1000 = $35,587.50. Savings = $131,400 - $35,587.50 = $95,812.50 over 5 years. Annual savings = $19,162.50. NPV of annual savings at 5% for 5 years = $19,162.50 * [(1 - (1.05)^-5) / 0.05] = $19,162.50 * 4.32948 = $82,964.'
  common_mistake: |
    **The Pitfall:** Assuming power management reduces power proportionally with utilization (e.g., 3% utilization = 1.8W).
    **The Rationale:** A naive assumption that power scales perfectly linearly with workload.
    **The Consequence:** Grossly overestimating power savings and ROI, because static base power (e.g., 15W) dominates at low utilization.
  napkin_math: |
    *   **Current Cost:** 500 units * 60W * 8760h * $0.10/kWh = $26,280/yr.
    *   **Active ratio:** 5s / 180s = 0.02778.
    *   **Avg Power:** (60W * 0.02778) + (15W * 0.97222) = 1.667W + 14.583W = 16.25W.
    *   **New Cost:** 500 units * 16.25W * 8760h * $0.10/kWh = $7,117.50/yr.
    *   **Annual Savings:** $26,280 - $7,117.50 = $19,162.50.
    *   **NPV over 5 years at 5%:** $19,162.50 * [(1 - (1.05)^-5) / 0.05] = 19162.50 * 4.32948 = **$82,964**.
