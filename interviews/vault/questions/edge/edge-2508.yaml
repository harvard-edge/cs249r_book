title: BLE Connection Sync Buffering
scenario: 'A wearable pipelines ECG detection: DSP filters (10ms/frame), Cortex-M4
  infers (10ms/frame), and BLE transmits to a phone. The BLE connection interval dictates
  a strict 30ms synchronization window.'
question: Create a pipelined microbatching strategy to handle the BLE latency without
  stalling the 10ms compute stages.
details:
  realistic_solution: The M4 must decouple its compute rate from the transmission
    rate. By microbatching 3 frames (3 x 10ms = 30ms), the M4 aggregates the inference
    hidden states into a single payload perfectly timed for the BLE sync window. Double-buffering
    the M4's output SRAM prevents pipeline bubbles during the BLE transmission phase.
  common_mistake: Attempting to transmit 1-to-1 frames over BLE, resulting in a 20ms
    pipeline stall per frame while waiting for the next radio window.
  napkin_math: Buffer size = 30ms BLE interval / 10ms compute rate = 3 frames aggregated
    per transmission.
