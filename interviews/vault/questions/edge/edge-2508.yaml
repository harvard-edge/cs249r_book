title: BLE Connection Sync Buffering
scenario: 'A wearable pipelines ECG detection: DSP filters (10ms/frame), Cortex-M4 infers (10ms/frame), and BLE transmits to a phone. The BLE connection interval dictates a strict 30ms synchronization window.'
question: Create a pipelined microbatching strategy to handle the BLE latency without stalling the 10ms compute stages.
details:
  realistic_solution: The M4 must decouple its compute rate from the transmission rate. By microbatching 3 frames (3 x 10ms = 30ms), the M4 aggregates the inference hidden states into a single payload perfectly timed for the BLE sync window. Double-buffering the M4's output SRAM prevents pipeline bubbles during the BLE transmission phase.
  common_mistake: |
    **The Pitfall:** Attempting to transmit 1-to-1 frames over BLE.
    **The Rationale:** Engineers assume streaming should occur as soon as a single inference completes to minimize theoretical latency.
    **The Consequence:** Inducing a 20ms pipeline stall per frame while waiting for the next BLE radio window, halving the overall system throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Compute rate: 10ms per frame.
       * BLE sync window: 30ms interval.
    2. **Calculations:**
       * Frames per BLE interval = 30ms / 10ms/frame = 3 frames.
    3. **Conclusion & Interpretation:**
       **Result: 3 frames per microbatch**. Aggregating 3 frames into a single payload synchronizes compute with the radio duty cycle, eliminating pipeline bubbles.
