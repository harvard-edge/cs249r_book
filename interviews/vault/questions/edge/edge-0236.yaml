title: The ISP Night-Driving Skew
scenario: Your autonomous vehicle team has a problem. A perception model trained on millions of miles of data from your collection fleet works perfectly in simulation. But when deployed to production cars, the model's accuracy for night-time pedestrian detection drops significantly. You've confirmed the model code and the main compute SoC are identical.
question: "Which hardware component in the sensor-to-SoC pipeline is the most likely cause of this training-serving skew?"
details:
  realistic_solution: The Image Signal Processor (ISP). The ISP is a dedicated hardware block that converts the raw Bayer data from the camera sensor into a usable image format (like YUV or RGB). It handles auto-exposure, gain control, noise reduction, and color correction. If the ISP hardware or its tuning parameters in the production car differ from the data-collection fleet, it can create a significant domain shift. This is especially pronounced in challenging lighting conditions like night-driving, where different exposure and gain settings drastically change the image characteristics the model sees.
  common_mistake: Engineers often blame the ML accelerator or the model itself, forgetting that the image data is heavily processed *before* it ever reaches the main SoC. They think of the input as a clean, raw image, not as the output of a complex, tunable hardware pipeline that can differ between data collection and production vehicles.
  napkin_math: |
    **Assumptions & Constraints:**
    - MIPI CSI-2 interface bandwidth up to 2.5 GB/s.
    - Main CPU/Accelerator cannot process raw Bayer data in real-time.
    
    **Calculations:**
    - The ISP applies auto-exposure, gain control, noise reduction, and color correction to process the firehose of raw data.
    - Any difference in this mandatory processing step alters image characteristics before ML ingestion.
    
    **Conclusion & Interpretation:**
    - **Result: ISP-Induced Skew (Data-Pipeline Bound)**. The fixed-function ISP hardware or tuning introduces a domain shift, heavily affecting low-light accuracy.
  options:
  - The main ML accelerator (e.g., the Jetson's Tensor Cores)
  - The DRAM memory controller
  - The Image Signal Processor (ISP)
  - The MIPI CSI-2 physical interface
  correct_index: 2
