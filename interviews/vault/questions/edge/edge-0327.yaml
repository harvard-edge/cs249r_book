title: 'The Depthwise Separable Efficiency Gain: Transformer Systems Cost'
scenario: Your team is optimizing a perception CNN for a new autonomous vehicle prototype. A key bottleneck
  is a standard 3x3 convolutional layer with 128 input channels and 256 output channels. To improve performance
  on the vehicle's edge accelerator, you are replacing it with a 3x3 depthwise separable convolution.
  Compare the computational cost (FLOPs) of the two approaches and calculate the approximate reduction
  factor.
details:
  realistic_solution: 'A depthwise separable convolution replaces a single, expensive operation with two
    cheaper ones: a depthwise convolution (one filter per input channel) and a pointwise convolution (1x1
    convolution to combine the outputs). The reduction in FLOPs is the ratio of the original cost to the
    new, combined cost. This factor is dominated by the number of output channels and the kernel size,
    but is always slightly less than the asymptotic limit of Kernel², which is 9 for a 3x3 kernel.'
  common_mistake: A common mistake is to only consider the asymptotic case, assuming the reduction is
    simply the square of the kernel size (3x3 -> 9x). While a good rule of thumb, it ignores the cost
    of the initial depthwise pass relative to the pointwise pass, making it an overestimation. A more
    severe error is to ignore the 1x1 pointwise convolution's cost, leading to a wildly optimistic reduction
    factor equal to the number of output channels.
  napkin_math: 1. **Cost of Standard Conv** is proportional to `Dk² × Cin × Cout`. We can analyze the
    ratio by factoring out common terms.
  options:
  - Exactly 9x reduction
  - ~256x reduction
  - ~8.7x reduction
  - ~2x reduction
  correct_index: 2
