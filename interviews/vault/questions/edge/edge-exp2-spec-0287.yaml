title: Fail-Safe Industrial Anomaly Detection on Edge TPU
scenario: You are tasked with specifying the software architecture for an industrial robotic arm's anomaly
  detection system, mandated to meet strict functional safety requirements. The inference target is a
  Google Coral Edge TPU connected via PCIe, constrained to a 2W power budget and providing 4 TOPS at INT8
  precision. You must design a specification that guarantees deterministic execution times, incorporates
  a hardware watchdog timer, and ensures safety despite the accelerator's limited operator support.
details:
  realistic_solution: The specification must strictly mandate 100% INT8 quantization for the entire model
    graph, restricted to the supported operator set, ensuring execution exclusively on the Edge TPU without
    CPU fallback. Additionally, the design must include a dedicated real-time process on the host that
    manages a strict watchdog timer over the PCIe link and periodically executes a known-good self-test
    inference to verify the TPU's operational health.
  common_mistake: Candidates often assume the Edge TPU is inherently deterministic and allow partial graph
    compilation where unsupported operators implicitly fall back to the host CPU. They fail to analyze
    how this CPU fallback introduces non-deterministic latency spikes and context-switching overhead that
    violate real-time safety constraints.
  napkin_math: Assuming an anomaly detection model requires 20 GOPS per frame. Theoretical compute time
    on the Google Coral Edge TPU is 20 GOPS / 4 TOPS (INT8) = 5.0 milliseconds. Adding an estimated 2.0ms
    for PCIe I/O transfer yields a deterministic nominal latency of 7.0ms per frame. Operating within
    the 2W envelope, the watchdog timer specification should be set at exactly 15ms (allowing for a ~2x
    safety margin), triggering a hardware fail-safe relay if the response is delayed.
