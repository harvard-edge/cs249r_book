title: Implementing efficient knowledge distillation with autograd on Jetson Orin
scenario: You are performing on-device knowledge distillation on Jetson Orin to adapt a compressed 2M
  parameter student model using soft labels from a 20M parameter teacher. The teacher is frozen. Current
  implementation runs both models in the same forward pass, consuming 22GB of activation memory — nearly
  70% of Orin's 32GB.
question: "How would you reduce activation memory for on-device distillation when the 20M-parameter teacher is frozen?"
details:
  realistic_solution: 'Run teacher inference with torch.no_grad(): to get soft labels. Detach soft labels
    with .detach() before passing to the distillation loss function. Only the student''s computational
    graph needs to be built. This reduces activation memory from 22GB to ~2GB (student only). In code:
    teacher_logits = teacher(x).detach() followed by loss = kd_loss(student_logits, teacher_logits, hard_labels).'
  common_mistake: Running teacher and student in the same forward-backward pass, allowing the computational
    graph to track both models. The teacher's activations are stored for a backward pass that never happens
    (teacher is frozen), wasting ~20GB of the 22GB activation budget.
  napkin_math: 'Teacher (20M params) activation memory at batch=16, input=224×224: ~10GB. Student (2M
    params): ~1GB. With no_grad on teacher: only student graph kept = 1GB. Without no_grad: 10GB + 1GB
    = 11GB. Ratio: 11×. At 32GB Orin: 11GB fits but 22GB (observed, with both graphs) shows teacher is
    being traced. After fix: 1GB student + 10GB teacher weights = 11GB total, leaving 21GB for OS and
    other processes.'
