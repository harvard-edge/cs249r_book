title: 'Edge Queueing Theory Evaluation: Jetson Orin vs Hailo-8+Pi Latency at Low Load'
scenario: 'Compare two edge deployments for a factory defect detection system at λ=20 detections/s: (A)
  Jetson Orin (275 TOPS INT8, 60W) standalone at μ=500 inf/s, (B) Hailo-8 (26 TOPS INT8, 2.5W) + Raspberry
  Pi 5 (μ=40 inf/s after host overhead). Evaluate P99 latency, power, and cost-per-detection for each.
  Defect model: 5 GOPS INT8.'
question: "For option B at λ=20/s and μ=40/s, what is the correct M/D/1 queue wait term before comparing latency and cost?"
details:
  realistic_solution: 'M/D/1 Wq = ρ/(2μ(1-ρ)). With ρ=0.5, μ=40: Wq = 0.5/(2×40×0.5) = 12.5ms (not 6.25ms
    from ρ² formula).'
  common_mistake: Choosing the more powerful platform without checking if its extra capacity provides
    any measurable latency or throughput benefit at the given load.
  napkin_math: 'M/D/1 queue: λ=20/s, μ=40/s, ρ=0.5. Wq = ρ/(2μ(1-ρ)) = 0.5/(2×40×0.5) = 0.5/40 = 0.0125s
    = 12.5ms (not 6.25ms which uses ρ²: 0.25/40 = 6.25ms — that is the ρ² error).'
