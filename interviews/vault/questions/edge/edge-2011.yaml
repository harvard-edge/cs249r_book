title: Edge LLM OTA Update System Design for Qualcomm AI 100
scenario: 'Your team is deploying a new large language model (LLM) inference service to a fleet of 100,000 edge devices. The LLM requires a 10 GB firmware image, which includes the model weights and associated runtime. The design must ensure a maximum update downtime (device offline) of 5 minutes per device and guarantee immediate rollback capability in case of update failure.'
question: How would you design OTA updates for 100,000 edge devices with 10GB firmware, <5min downtime, and immediate rollback?
details:
  realistic_solution: Implement a hierarchical update strategy with a delta update mechanism (e.g., binary diffing) to minimize transmitted data, only sending changes to the 10GB firmware image. Utilize an A/B partition scheme on non-volatile storage to allow updates to be applied to the inactive partition while the device remains operational, ensuring near-instantaneous switchover and rollback capabilities. Design for staged rollouts to monitor stability across a subset of the fleet before a full deployment. Implement robust integrity checks (e.g., cryptographic signatures) for all firmware components. Optimize flash programming operations to be non-blocking and power-aware.
  common_mistake: |
    **The Pitfall:** Assuming a full 10GB image transfer for every update.
    **The Rationale:** Candidates overlook the cumulative network bandwidth requirements for large fleets.
    **The Consequence:** Exceeding the downtime budget and burning out flash storage endurance from massive writes.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10GB total image.
    - 1GB delta update.
    - 10 Mbps average network.
    - 50 MB/s flash write speed.
    - Fleet size = 100,000.

    **Calculations:**
    - Full download at 10 Mbps = 10,000 MB / 1.25 MB/s = 8,000 seconds (2.2 hours).
    - Delta update write = 1,000 MB / 50 MB/s = 20 seconds.
    - Total fleet bandwidth = 100,000 * 1GB = 100 TB.

    **Conclusion & Interpretation:**
    - **Result: Full 10GB transfer violates the 5-min downtime budget (I/O-Bound)**. I/O-Bound network constraint requires delta updates and A/B partitions.
