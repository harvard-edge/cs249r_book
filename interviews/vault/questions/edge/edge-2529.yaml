title: Jetson Cluster Ring vs Star Broadcast
scenario: An 8-node Jetson Orin cluster broadcasts a 50 MB activation map. They can
  be wired in a 10GbE Ring or a 10GbE Star (via central switch).
question: Evaluate the synchronization latency penalty of using a Ring instead of
  a Star topology for a one-to-all broadcast.
details:
  realistic_solution: In a Star, the source sends 50 MB to the switch (40ms at 1.25
    GB/s), which multicasts to 7 nodes simultaneously. Total = 40ms. In a Ring, broadcast
    requires N-1 sequential store-and-forward hops. 7 * 40ms = 280ms. The Ring introduces
    a 240ms synchronization penalty for broadcasts.
  common_mistake: Assuming Ring topology is universally optimal for all operations,
    missing that a sequential Ring mathematically penalizes simple one-to-all broadcasts.
  napkin_math: Hop time = 50MB / 1.25GB/s = 40ms. Star = 1 hop = 40ms. Ring = 7 hops
    = 280ms. Diff = 240ms.
