title: Jetson Cluster Ring vs Star Broadcast
scenario: An 8-node edge cluster broadcasts a 50 MB activation map. They can be wired in a 10GbE Ring or a 10GbE Star (via central switch).
question: Evaluate the synchronization latency penalty of using a Ring instead of a Star topology for a one-to-all broadcast.
details:
  realistic_solution: 'The Ring topology introduces a catastrophic 240ms synchronization delay for basic broadcast operations. While Ring AllReduce is heavily cited in literature, it forces a simple one-to-all broadcast to execute sequentially across N-1 nodes. A switch-backed Star topology natively leverages simultaneous multicasting, distributing the 50 MB payload in a single 40ms parallel hop, drastically outperforming the ring.'
  common_mistake: |
    **The Pitfall:** Assuming Ring topology is universally optimal for all communication patterns.
    **The Rationale:** Candidates default to Ring AllReduce literature without realizing that sequential hop-and-store mathematically penalizes a simple one-to-all broadcast.
    **The Consequence:** Unnecessary synchronization latency is added to simple model update or broadcast tasks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cluster: 8 nodes.
    - Broadcast size: 50 MB.
    - Link bandwidth: 10GbE (1.25 GB/s).

    **Calculations:**
    - Star hop time = 50 MB / 1.25 GB/s = 40ms.
    - Star total time = 1 simultaneous multicast hop = 40ms.
    - Ring total hops = 7 sequential hops (N-1).
    - Ring total time = 7 * 40ms = 280ms.

    **Conclusion & Interpretation:**
    - **Result: 240ms synchronization penalty for the Ring (Network-Bound)**. A Star topology completes a broadcast in one parallel hop.
