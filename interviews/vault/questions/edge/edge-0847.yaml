title: Diagnosing OOM in Microcontroller On-Device Fine-Tuning
scenario: A team is deploying on-device learning for a smart earbud powered by a Cortex-M4 microcontroller
  with 256KB of SRAM. They are fine-tuning the final dense layers (15,000 parameters) of a 100KB INT8
  keyword spotting model to adapt to specific user accents. Extracted audio features for a local batch
  of 10 samples consume 20KB. They configure the training loop to use the Adam optimizer, converting the
  trainable layers to FP32 for gradient updates. Despite the base model and data taking only 120KB, the
  device hard-faults with an Out-of-Memory (OOM) error during the first backward pass. What is the root
  cause of the memory exhaustion, and how should the training pipeline be re-architected to fit safely
  within the SRAM constraints?
details:
  realistic_solution: The root cause is the hidden memory footprint of training state (weights, gradients,
    and moments). To resolve the OOM, switch the optimizer from Adam to standard SGD to completely eliminate
    the moment-tracking state, and reduce the batch size to 1 to minimize intermediate activation memory.
  common_mistake: Assuming the training memory footprint is roughly equivalent to inference memory plus
    the dataset size, failing to account for the FP32 parameter casting, gradient storage, and the massive
    optimizer state overhead associated with Adam.
  napkin_math: 'SRAM Capacity = 256KB.

    Static footprint: 100KB (base model) + 20KB (feature buffer) = 120KB.

    Training allocations for 15,000 parameters in FP32 (4 bytes each):

    1. FP32 Weights: 15,000 * 4B = 60KB.

    2. Gradients: 15,000 * 4B = 60KB.

    3. Adam Optimizer State (1st & 2nd moments): 2 * 15,000 * 4B = 120KB.

    Total Memory Footprint = 120KB (static) + 60KB (weights) + 60KB (grads) + 120KB (Adam) = 360KB.

    360KB heavily exceeds the 256KB SRAM limit, causing the OOM fault.

    Fix: Drop Adam for SGD (saves 120KB) and update iteratively, bringing the footprint down to ~240KB
    (fitting in SRAM).'
