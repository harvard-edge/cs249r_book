title: Diagnosing OOM in Microcontroller On-Device Fine-Tuning
scenario: A team is deploying on-device learning for a smart earbud powered by a Cortex-M4 microcontroller with 256KB of SRAM. They are fine-tuning the final dense layers (15,000 parameters) of an INT8 keyword spotting model using the Adam optimizer in FP32. The base model and data take only 120KB. Despite this, the device hard-faults with an Out-of-Memory (OOM) error during the first backward pass.
question: What is the root cause of the memory exhaustion, and how should the training pipeline be re-architected to fit safely within the SRAM constraints?
details:
  realistic_solution: "Replace the Adam optimizer with standard Stochastic Gradient Descent (SGD) and enforce a batch size of 1. The Adam optimizer's requirement to track running averages and variance multiplies the memory footprint of the gradients, completely blowing past the 256KB Cortex-M4 SRAM limit. Stripping out the momentum caching strictly limits memory allocation to FP32 weights and single-step gradients, bringing the payload down to a viable 240KB."
  common_mistake: |
    **The Pitfall:** Assuming the training memory footprint is roughly equivalent to inference memory.
    **The Rationale:** Candidates fail to account for FP32 parameter casting and the massive momentum state overhead of the Adam optimizer.
    **The Consequence:** The microcontroller suffers an immediate hard fault (OOM) upon starting the first backward pass.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SRAM Capacity: 256KB.
       - Static footprint: 120KB.
       - Dense layers: 15,000 parameters (FP32).
    2. **Calculations:**
       - FP32 Weights: 15,000 * 4B = 60KB.
       - FP32 Gradients: 60KB.
       - Adam Optimizer State (2 moments): 120KB.
       - Total Adam Footprint = 120 + 60 + 60 + 120 = 360KB.
       - SGD Footprint (no moments) = 120 + 60 + 60 = 240KB.
    3. **Conclusion & Interpretation:**
       - **SGD fits (240KB); Adam OOMs (360KB).** Standard optimizer moment tracking is disastrous for MCU memory budgets.
