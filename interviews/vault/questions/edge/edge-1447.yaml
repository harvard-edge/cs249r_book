title: 'Coral Edge TPU Frame Budget Analysis'
scenario: 'We are deploying an object detection pipeline on a Google Coral Edge TPU (4 TOPS INT8, 2W, USB form factor) to process a 60 FPS video stream. The model has been properly quantized to INT8 as required by the limited operator support. While the TPU executes the model internally in just 8ms, the system frequently misses the strict 16.6ms frame budget, causing jank and dropped frames.'
question: 'Why does the Coral Edge TPU pipeline miss the 16.6ms frame budget even though the TPU runs the model in 8ms?'
details:
  realistic_solution: 'The system fails because real-time deadlines depend on the total pipeline latency, not just the accelerator''s compute time. Before the Coral Edge TPU can utilize its 4 TOPS of compute, the host CPU must preprocess the frame and transfer the INT8 quantized tensor over the USB connection. If the combined time of host preprocessing, USB data transfer to and from the device, and the 8ms TPU execution exceeds 16.6ms, the deadline is missed and jank occurs.'
  common_mistake: |
    **The Pitfall:** Assuming that if the accelerator''s pure compute time fits within the frame budget, the deadline is met.
    **The Rationale:** Candidates fail to account for the end-to-end pipeline latency, including host preprocessing and USB transfer overhead.
    **The Consequence:** The overall system misses real-time deadlines and drops frames despite having a fast accelerator.
  napkin_math: |
    - Frame budget at 60 FPS: 1000 ms / 60 = **16.6 ms**.
    - Payload size (300x300 RGB INT8): 300 * 300 * 3 bytes = 270 KB.
    - USB 2.0 transfer time: (270 KB / 35,000 KB/s) * 1000 = **~7.7 ms**.
    - TPU inference time: **8.0 ms**.
    - Host preprocessing time: e.g., **5.0 ms**.
    - Total latency: 5.0 + 7.7 + 8.0 = **20.7 ms** (> 16.6 ms).
