title: Applying Multithreading to Overlap PCIe Transfers
scenario: A Hailo-8 edge accelerator (PCIe Gen3) processes uncompressed video. Pre-processing takes 2ms, PCIe H2D takes 1.5ms, and inference takes 4ms.
question: Apply a pipeline mapping and analyze the bottleneck when attempting to interleave 4 independent streams simultaneously.
details:
  realistic_solution: By pipelining CPU, PCIe, and NPU stages, the streams can overlap. However, the 4 independent streams must share the single Hailo-8 core. Inference per stream takes 4ms, so the aggregated inference time for 4 frames is 16ms, which becomes the absolute throughput bottleneck.
  common_mistake: |
    **The Pitfall:** Assuming perfect overlap for all pipeline stages across all streams.
    **The Rationale:** Candidates correctly identify that CPU, PCIe, and NPU can overlap, but forget the NPU itself can only process one frame at a time.
    **The Consequence:** Overestimating throughput by failing to identify the serial bottleneck on the accelerator core.
  napkin_math: |
    - Inference per stream: 4ms.
    - Number of streams: 4.
    - Aggregated sequential inference time: 4 * 4ms = 16ms.
    **The 16ms serial inference time strictly bounds total throughput.**
