title: Applying Multithreading to Overlap PCIe Transfers
scenario: A Hailo-8 edge accelerator (PCIe Gen3) processes uncompressed video. Pre-processing
  takes 2ms, PCIe H2D takes 1.5ms, and inference takes 4ms.
question: Apply a pipeline mapping and analyze the bottleneck when attempting to interleave
  4 independent streams simultaneously.
details:
  realistic_solution: By pipelining CPU, PCIe, and NPU stages, the streams can overlap.
    However, the 4 independent streams must share the single Hailo-8 core. Inference
    per stream takes 4ms, so the aggregated inference time for 4 frames is 16ms, which
    becomes the absolute throughput bottleneck.
  common_mistake: Assuming the 4ms inference perfectly overlaps per stream, forgetting
    that the single accelerator core sequentializes the requests.
  napkin_math: 4 * 4ms = 16ms bottleneck
