title: Hailo-8 PCIe Pipelining
scenario: 8x Hailo-8 chips on an edge server are connected via a hierarchical PCIe Gen3 fabric, running a partitioned YOLOv10 pipeline.
question: Propose a pipelined activation routing strategy across the PCIe hierarchy that maximizes throughput while masking the host-CPU synchronization barrier.
details:
  realistic_solution: |
    Since Hailo-8 relies on the host CPU for PCIe routing between peer devices on different switch domains, direct P2P is disabled. The pipeline must insert a CPU-side memory bounce buffer. By micro-batching the activations, the host CPU synchronization barrier can be hidden behind the compute phase of the downstream Hailo-8 chip.
  common_mistake: |
    **The Pitfall:** Assuming direct zero-copy P2P between isolated Hailo chips across the PCIe hierarchy.
    **The Rationale:** Treating edge accelerators like data center GPUs with NVLink.
    **The Consequence:** Designing a topology that instantly deadlocks because the host CPU is required for routing.
  napkin_math: |
    - **Compute Phase:** 5 ms.
    - **Host CPU Bounce Sync:** 1 ms.
    - **Total Serial Time:** 6 ms.
    - **Unpipelined Bubble:** 1 ms / 6 ms = **16.7%** idle time. Pipelining completely masks this 1ms penalty.
