title: Edge TPU Sequence Scaling Bottleneck Analysis
scenario: We deployed a quantized INT8 Vision Transformer on a Google Coral Edge TPU. At a base sequence length of 196 tokens, the model runs efficiently at 15ms per inference. However, when we increase the input resolution to yield 784 tokens, the inference time spikes disproportionately to over 240ms, and we observe heavy PCIe bus traffic and host CPU thrashing.
question: Why does increasing ViT sequence length from 196 to 784 tokens make Coral Edge TPU latency exceed 240ms and trigger host thrashing?
details:
  realistic_solution: The severe latency spike is driven by the O(n²) time and space complexity of the self-attention mechanism. When the sequence length increases by a factor of 4, the number of attention operations and the size of the attention matrix increase by a factor of 16. Because the Coral Edge TPU has a small on-chip SRAM cache (typically ~8MB), the 16x larger intermediate attention matrices can no longer fit entirely on-chip. The Edge TPU runtime is forced to spill these intermediate INT8 activations back to the host CPU over the USB/PCIe bus, causing the massive latency penalty and host thrashing.
  common_mistake: |
    **The Pitfall:** Assuming compute time scales linearly with input size.
    **The Rationale:** Candidates forget the O(n²) complexity of self-attention and the strict SRAM limits of edge devices.
    **The Consequence:** They fail to identify that the intermediate tensors exceed SRAM, forcing fallback to the host CPU over PCIe.
  napkin_math: |
    * Sequence length increase: N=196 to N=784 (4x)
    * Attention scaling: O(N²), so compute and memory increase by 16x
    * Score matrix per head: N=196 -> ~38KB; N=784 -> ~614KB (INT8)
    * Total score matrix memory (12 heads): ~460KB -> ~7.3MB
    * **Total memory exceeds ~8MB SRAM when combined with weights, triggering host fallback.**
