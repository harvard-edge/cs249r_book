title: The Fleet Update Bandwidth Bill
scenario: You are the lead ML Systems Engineer for a fleet of 10,000 autonomous vehicles. Each vehicle
  generates about 10 GB of valuable sensor data daily for potential retraining. The current model is a
  50M parameter vision model using FP32 weights. Your CFO is alarmed by the cellular data bill, which
  is priced at $2/GB, and has asked you to solve for the most cost-effective daily update strategy. You
  must demonstrate the cost difference between (A) a centralized approach where all 10 GB of raw data
  is uploaded from each car, versus (B) a federated learning approach where only the model weight updates
  are sent back to the server. Which strategy is superior and by how much?
details:
  realistic_solution: The root cause of the high cost is the data transmission OpEx. Federated Learning
    is the correct solution because it drastically reduces the required upload bandwidth. Instead of sending
    terabytes of raw data daily, the fleet only sends megabytes of model updates. This directly addresses
    the CFO's concern and is a canonical use case for FL, balancing model freshness with operational reality.
  common_mistake: Engineers often focus only on model accuracy, ignoring the operational costs (OpEx)
    of running a system at scale. They might also miscalculate the actual data sizes involved, assuming
    'models are huge' without quantifying it, leading them to underestimate the cost-benefit of techniques
    like Federated Learning. Another common mistake is to confuse capital expenses (CapEx), like the cost
    of the hardware in the car, with the operational expenses (OpEx) that are the focus of this problem.
  napkin_math: '### Centralized Strategy Cost:'
  options:
  - Centralized training is cheaper. The cost of adding powerful compute to 10,000 vehicles for on-device
    training far outweighs any data savings.
  - Federated Learning is more expensive because a 50M parameter FP32 model is 200 GB, which is much larger
    than the 10 GB of sensor data.
  - Federated Learning is the superior choice, reducing daily data costs from $200,000 to $4,000 by avoiding
    raw data uploads.
  - Both strategies have similar data costs, as the intermediate tensors computed during on-device training
    are roughly the same size as the raw data.
  correct_index: 2
