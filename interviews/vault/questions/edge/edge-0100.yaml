title: The Update Blind Spot
scenario: A security camera system performs firmware updates by deleting the old model, downloading the new one, and then loading it. This process takes 45 seconds.
question: What is the primary security flaw in an update design that deletes the old model before downloading and loading the new one, taking 45 seconds?
details:
  realistic_solution: 'You have an **Inference Gap** and **No Rollback Path**. Step 3 creates a 45-second blind spot where no detections occur. Deleting the old model before validating the new one risks bricking the device if the download is corrupted. The fix is **A/B Partitioning with Hot-Swap**: download to an inactive slot while the active model continues serving, then atomically swap pointers after validation.'
  common_mistake: |
    **The Pitfall:** Assuming short downtime during updates is acceptable for security devices.
    **The Rationale:** Engineers used to web services might think a 45-second maintenance window is normal and harmless.
    **The Consequence:** For a security camera, 45 seconds of blindness is a massive, exploitable window that defeats the purpose of the system.
  napkin_math: |
    1. Update blind spot duration: 45 seconds.
    2. Walking speed of an intruder: ~1.5 m/s.
    3. Distance covered during blind spot: 45 s * 1.5 m/s = **67.5 meters**.
