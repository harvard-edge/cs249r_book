title: The Update Blind Spot
scenario: A security camera system performs firmware updates by deleting the old model, downloading the
  new one, and then loading it. This process takes 45 seconds. Based on the timeline diagram, what is
  the primary security flaw in this design?
question: "Based on the timeline diagram, what is the primary security flaw in this design?"
details:
  realistic_solution: 'You have an **Inference Gap** and **No Rollback Path**. Step 3 creates a 45-second
    blind spot where no detections occur. Deleting the old model before validating the new one risks bricking
    the device if the download is corrupted. The fix is **A/B Partitioning with Hot-Swap**: download to
    an inactive slot while the active model continues serving, then atomically swap pointers after validation.'
  common_mistake: '"45 seconds of downtime is acceptable for a software update." For a security camera,
    45 seconds of blindness is an exploitable window. For a safety system, it''s unacceptable.'
  napkin_math: In a 45-second blind spot, a person walking at 1.5 m/s can travel nearly 70 meters—plenty
    of time to cross a secure area undetected.
