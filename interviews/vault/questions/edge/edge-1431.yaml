title: Hailo-8 Host Memory Bandwidth Imbalance
scenario: You are load balancing inference requests across an edge gateway equipped
  with two Hailo-8 accelerators. Under a standard round-robin routing policy handling
  a mix of high-resolution and low-resolution video streams, you observe that one
  Hailo-8 chip frequently experiences severe processing latency while the other sits
  idle, despite both having identical 26 TOPS INT8 compute capacity. Given that the
  Hailo-8 is a dataflow accelerator operating at 2.5W with no local DRAM, meaning
  all activations stream continuously from host memory, analyze why this request routing
  policy causes severe latency spikes on specific devices.
question: Why does round-robin routing create latency spikes across two identical
  Hailo-8 chips for mixed-resolution video streams?
details:
  realistic_solution: The imbalance occurs because round-robin routing does not account
    for the host memory bandwidth required to stream data to each DRAM-less Hailo-8.
    High-resolution frames consume significantly more host PCIe bandwidth to stream
    activations. When round-robin coincidentally routes multiple high-bandwidth streams
    to the same chip, the streaming bandwidth saturates and starves the accelerator's
    dataflow pipeline. A bandwidth-aware routing strategy or weighted round-robin
    based on payload size is necessary to balance the host-to-device streaming load.
  common_mistake: Candidates often assume the bottleneck is the 26 TOPS compute limit
    and suggest that standard round-robin fails solely because of varying compute
    complexity per frame. They fail to identify that the true bottleneck for a DRAM-less
    dataflow architecture is the host-to-device streaming bandwidth.
  napkin_math: Assume the host provides 1 GB/s effective PCIe bandwidth per Hailo-8.
    A 4K frame (8MB) at 30 FPS requires 240 MB/s of streaming bandwidth, while a 1080p
    frame (2MB) at 30 FPS requires 60 MB/s. If round-robin assigns five 4K streams
    to Chip A, it demands 1.2 GB/s, exceeding the 1 GB/s limit and stalling the 26
    TOPS dataflow engine. Meanwhile, Chip B receives five 1080p streams demanding
    only 300 MB/s, leaving its compute heavily underutilized.
