title: Hailo-8 Host Memory Bandwidth Imbalance
scenario: You are load balancing inference requests across an edge gateway equipped with two Hailo-8 accelerators. Under a standard round-robin routing policy handling a mix of high-resolution and low-resolution video streams, you observe that one Hailo-8 chip frequently experiences severe processing latency while the other sits idle.
question: "Why does round-robin routing create latency spikes across two identical Hailo-8 chips for mixed-resolution video streams?"
details:
  realistic_solution: The imbalance occurs because round-robin routing does not account for the host memory bandwidth required to stream data to each DRAM-less Hailo-8. High-resolution frames consume significantly more host PCIe bandwidth to stream activations. A bandwidth-aware routing strategy or weighted round-robin based on payload size is necessary to balance the host-to-device streaming load.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is the 26 TOPS compute limit rather than memory streaming bandwidth.
    **The Rationale:** Candidates assume standard round-robin fails solely because of varying compute complexity per frame, failing to identify that DRAM-less dataflow chips are constrained by host-to-device I/O.
    **The Consequence:** One accelerator saturates the PCIe bus, causing severe pipeline latency spikes, while the other starves.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Host PCIe bandwidth: 1 GB/s per Hailo-8.
       - 4K frame stream: 240 MB/s.
       - 1080p frame stream: 60 MB/s.
    2. **Calculations:**
       - Round-robin assigns five 4K streams to Chip A = 5 * 240 MB/s = 1.2 GB/s.
       - Round-robin assigns five 1080p streams to Chip B = 5 * 60 MB/s = 300 MB/s.
       - Chip A demand (1.2 GB/s) > PCIe limit (1.0 GB/s), causing stalls.
    3. **Conclusion & Interpretation:**
       - **Result: 1.2 GB/s exceeds PCIe limit** (Memory-Bandwidth Bound).
