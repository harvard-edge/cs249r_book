title: Edge Data Selection Policy Spec
scenario: A factory wants to reduce annotation cost by uploading only hard examples from edge cameras.
question: What should an edge hard-example selection policy specify so the uploaded set improves the model without hiding rare failures?
details:
  realistic_solution: The policy should define uncertainty scoring, diversity sampling, minimum quotas, privacy filtering, and deduplication. Implement Top-K Sparsification to isolate high-loss examples and maintain a random baseline to track distribution shifts.
  common_mistake: |
    **The Pitfall:** Keeping only high-confidence failures.
    **The Rationale:** Candidates assume highest-loss examples provide the most learning signal, ignoring distribution diversity.
    **The Consequence:** Accidentally biasing the dataset away from normal or rare-but-important cases.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Upload budget: 1,000 frames/day across 20 sites.
       - Baseline floor: 20 frames/site.
    2. **Calculations:**
       - 20 sites * 20 frames/site = 400 baseline frames.
       - 1,000 budget - 400 baseline frames = 600 uncertainty-ranked examples.
    3. **Conclusion & Interpretation:**
       - **Result: 600 uncertainty frames + 400 baseline frames = 1,000 total frames.**
