title: Edge Data Selection Policy Spec
scenario: A factory wants to reduce annotation cost by uploading only hard examples
  from edge cameras. Specify the data-selection policy so the uploaded set improves
  the model without hiding rare failures.
question: What should an edge hard-example selection policy specify to reduce annotation
  cost without losing rare failures?
details:
  realistic_solution: The policy should define uncertainty score, diversity sampling,
    minimum per-class/per-site quotas, privacy filtering, upload budget, deduplication
    window, and rare-event override rules. It should also include a random baseline
    sample so distribution shift can be measured.
  common_mistake: Keeping only high-confidence failures and accidentally biasing the
    dataset away from normal or rare-but-important cases.
  napkin_math: If the upload budget is 1,000 frames/day across 20 sites, a floor of
    20 frames/site consumes 400 frames, leaving 600 for uncertainty-ranked examples.
