title: Adapter Rollback and Version Management at Edge
scenario: After an OTA adapter update to 10,000 Jetson Orin devices, 3% of devices
  report increased error rates. Describe the rollback strategy and root cause diagnosis
  methodology.
question: How would you roll back and diagnose a LoRA adapter OTA update when 3% of
  10,000 Orin devices show higher error rates?
details:
  realistic_solution: 'Staged rollback: (1) isolate 3% failing devices — check if
    failures correlate with hardware revision, sensor configuration, or input distribution;
    (2) A/B test: restore previous adapter on 50% of failing devices and monitor error
    rate drop; (3) if adapter-caused: push rollback to all 10K devices via priority
    OTA (use delta from failed to previous adapter: typically 90% same as full update
    but in reverse direction); (4) post-mortem: compare adapter weight distributions
    between versions for outlier singular values indicating rank collapse.'
  common_mistake: Rolling back all devices immediately without first diagnosing if
    the issue is adapter quality, data distribution shift, or hardware-specific numerical
    precision differences.
  napkin_math: 'Rollback delta size (adapter_v1 - adapter_v2): same as forward delta
    ~0.84 MB. Push to 3% (300 devices) immediately. If using a 10 Mbps total shared upload link: 300 * 0.84 MB * 8 / 10 Mbps = 201.6 seconds total network time. Canary test: 50 devices * 0.84 MB = 42 MB total transfer. A/B result in <10 minutes.'
