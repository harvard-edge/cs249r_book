title: Adapter Rollback and Version Management at Edge
scenario: After an OTA adapter update to 10,000 Jetson Orin devices, 3% of devices report increased error rates.
question: How would you roll back and diagnose a LoRA adapter OTA update when 3% of 10,000 Orin devices show higher error rates?
details:
  realistic_solution: Execute a staged rollback. First, isolate the failing 3% based on hardware revision or sensor drift telemetry. Push a reverse-delta OTA update (restoring the previous adapter weights) to a 50-device canary cohort. If errors drop, distribute the tiny 0.84MB delta rollback to the remaining affected devices. Conduct a post-mortem examining the failed adapter's singular values for rank collapse.
  common_mistake: |
    **The Pitfall:** Rolling back all 10,000 devices immediately.
    **The Rationale:** Treating edge fleets like stateless web servers where global rollbacks are cheap and zero-risk.
    **The Consequence:** Unnecessary disruption and bandwidth costs for the 97% of functioning devices, coupled with total loss of diagnostic signal.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet: 10,000 devices. Failure rate: 3% (300 devices).
       - Rollback Delta Size: 0.84 MB per device. Network: 10 Mbps.
    2. **Calculations:**
       - Target Devices: 300 devices.
       - Total Rollback Payload: 300 * 0.84 MB = 252 MB.
       - Total Transfer Time: 252 MB / 1.25 MB/s = ~201.6 seconds.
       - Canary Test (50 devices): 50 * 0.84 MB = 42 MB (33.6s transfer).
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound. Targeted rollback consumes only 252MB and executes in minutes.**
