title: Multi-Model Data Streaming Bottleneck on Hailo-8
scenario: You are deploying a compound AI system consisting of an object detection model followed immediately
  by a pose estimation model onto a Hailo-8 accelerator. The accelerator delivers 26 TOPS of INT8 compute
  at 2.5W, and individual benchmarking shows each model takes exactly 2ms to execute. However, when running
  the end-to-end pipeline, latency spikes to over 18ms per frame. The Hailo-8 is a dataflow accelerator
  that lacks local DRAM, meaning all inputs and outputs must stream from host memory over PCIe. Identify
  the root cause of this massive latency inflation.
question: "What is the root cause of the Hailo-8 pipeline jumping from two 2 ms models to over 18 ms end-to-end latency?"
details:
  realistic_solution: The root cause is PCIe bandwidth saturation caused by intermediate tensor round-tripping.
    Because the Hailo-8 lacks local DRAM, running two independent models requires streaming the first
    model's output back to host memory, and then streaming it back to the accelerator for the second model.
    The solution is to compile both models into a single context (model fusion) using the Hailo compiler,
    allowing activations to flow directly through the on-chip SRAM dataflow fabric without ever hitting
    the host.
  common_mistake: Candidates typically focus on compute utilization, suspecting that the 26 TOPS capacity
    is underutilized due to batch size or that the host CPU is bottlenecking on pre-processing. They often
    overlook the architectural constraint of the missing local DRAM and the resulting I/O penalty of chaining
    models naively.
  napkin_math: Assume the intermediate tensor between the two models is a 1280x720 feature map with 32
    channels in INT8, which equals roughly 29.5 MB. Using a PCIe Gen3 x4 connection with an effective
    bandwidth of ~4 GB/s, reading 29.5 MB to the host takes ~7.4 ms. Writing it back to the accelerator
    for the next model takes another ~7.4 ms. This 14.8 ms of PCIe transfer overhead, added to the 4 ms
    of pure compute time (2ms + 2ms at 26 TOPS), totals 18.8 ms, matching the observed pipeline latency.
