title: 'Edge Transformer Cost Optimization: Knowledge Distillation for Edge Deployment'
scenario: 'A company uses BERT-large (340M params, INT8, 340MB) for NER on Jetson Orin GPU (60W). The
  model barely fits and achieves 3 inferences/second. Propose knowledge distillation to TinyBERT (14.5M
  params, INT8, 14.5MB). Calculate: throughput improvement, memory reduction, accuracy (TinyBERT retains
  98% of BERT-large F1 on NER), and annual savings across 50 Jetson Orins.'
question: "What throughput, memory, accuracy, and annual savings would distilling BERT-large to TinyBERT deliver across 50 Jetson Orins?"
details:
  realistic_solution: 'Current BERT-large: 340MB, 3 inf/s per Jetson. Memory-bound: 340MB/102.4GB/s=3.32ms/inf.
    Wait: 1/0.00332=301 inf/s theoretical. Observed 3/s suggests heavy preprocessing or seq=512. At seq=512:
    340MB loaded + activation 512*768*2*340M/340M≈heavy. Likely bottleneck is different. Assume 3 inf/s
    measured. TinyBERT: 14.5MB. Time: 14.5MB/102.4GB/s=0.142ms. At seq=512 proportionally: 0.142ms. 1/0.00014=7143
    inf/s — 2381x faster than measured 3/s! Measured 3/s on BERT-large suggests preprocessing bottleneck.
    Post-distillation: still preprocessing-limited. But memory headroom: 340MB→14.5MB = 23x reduction.
    Can run multiple instances. Annual savings: if 3→30 inf/s: can reduce fleet from 50 to 5 Jetsons:
    savings=45*$52.6=$2,367/yr power+45*$499=$22,455 hardware. Total: $24.8K. Distillation cost: 2 weeks
    * 64 H100 * $2.50 = $5,600. ROI: 4.4x in year 1.'
  common_mistake: Not accounting for distillation training cost (2-4 weeks of cloud GPU training) and
    comparing only inference savings without including the upfront distillation compute cost in the ROI.
  napkin_math: 'BERT-large: 340MB, 3 inf/s (preprocessing limited, not weight loading). TinyBERT: 14.5MB.
    Weight loading ratio: 340/14.5=23.4x reduction. If inference was BW-bound: speedup=23.4x → 70 inf/s.
    Preprocessing bottleneck assumed: speedup 2-3x → 6-9 inf/s. Fleet from 50 to 17 Jetsons: saves 33
    units. Hardware saved: 33*$499=$16.5K. Annual power: 33*$52.6=$1,736/yr. Distillation: 14 days * 16
    H100 * $2.50/hr * 24=$13,440. Payback: $13,440/($16,500+$1,736)=$13,440/$18,236=0.74yr=8.8 months.
    Strong ROI. Plus: 98% accuracy retention for NER is excellent. Recommend distillation.'
