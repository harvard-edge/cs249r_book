title: The Duty Cycle Power Gap
scenario: You're designing a battery-powered acoustic sensor for a fleet of autonomous warehouse robots. The sensor's goal is to detect the sound of a failing bearing, but it must operate for months on a single coin-cell battery. To achieve this, you'll rely heavily on duty cycling.
question: What is the approximate active-to-deep-sleep power consumption ratio for a TinyML microcontroller in this acoustic sensor?
details:
  realistic_solution: 'The ratio is typically on the order of 1,000x. A TinyML-class microcontroller like a Cortex-M4 might consume tens of milliwatts (e.g., 10 mW) when active, but its consumption can drop to mere micro-watts (e.g., 10 µW) in a deep sleep state where only a real-time clock and a pin interrupt are active.'
  common_mistake: |
    **The Pitfall:** Underestimating the efficiency of deep sleep modes.
    **The Rationale:** Engineers accustomed to servers or mobile phones often assume "idle" or sleep drops power by 10-100x at best.
    **The Consequence:** They fail to appreciate that microcontrollers are designed to power-gate nearly the entire chip, completely altering battery life calculations for edge ML workloads.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - TinyML microcontroller (e.g., Cortex-M4).
       - Active state power draw ≈ 10 mW.
       - Deep sleep state power draw (RTC/interrupts only) ≈ 10 µW.
    2. **Calculations:**
       - Active Power = 10 mW = 10,000 µW.
       - Ratio = 10,000 µW / 10 µW = 1,000.
    3. **Conclusion & Interpretation:**
       - **Result: 1,000x**. Deep sleep reduces power consumption by three orders of magnitude, making aggressive duty-cycling the foundational mechanism for multi-month battery life.
  options:
  - 10x
  - 100x
  - 1,000x
  - 100,000x
  correct_index: 2
