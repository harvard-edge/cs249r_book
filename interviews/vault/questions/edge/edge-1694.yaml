title: Hailo-8 Zero-Copy Stream Optimization
scenario: We are deploying a 4-camera traffic monitoring system on an edge gateway equipped with a Hailo-8 accelerator (26 TOPS INT8, 2.5W). Because the Hailo-8 is a dataflow accelerator with no local DRAM, it streams input data directly from host memory over PCIe. Our pipeline processes 1080p frames but is currently bottlenecked at 40 FPS total, and profiling reveals the Hailo-8 is idle over 85% of the time while the host ARM CPU is maxed out performing user-space to kernel-space buffer copies.
question: What host-device data movement bottleneck stalls the 4-camera Hailo-8 pipeline at 40 FPS, and how would zero-copy DMA fix it?
details:
  realistic_solution: The correct approach is to implement a zero-copy pipeline using pinned (page-locked) memory and direct DMA transfers. By allocating contiguous memory for the camera capture buffers using `dma_buf` and mapping these exact physical addresses to the HailoRT driver, the Hailo-8's PCIe DMA controller can stream the INT8 frames directly. This completely eliminates the intermediate CPU read/write operations from the data movement path.
  common_mistake: |
    **The Pitfall:** Suggesting batching or image compression to improve accelerator utilization.
    **The Rationale:** Candidates misdiagnose the bottleneck as an NPU utilization issue, failing to recognize that the host CPU is choking on memory copies.
    **The Consequence:** Batching or compression adds even more latency and CPU overhead, completely failing to resolve the fundamental data movement bottleneck.
  napkin_math: |
    1. Calculate frame size: A 1080p INT8 frame is 1920x1080x3 = 6.22 MB.
    2. Calculate CPU copy time: On an edge CPU with 2 GB/s memory bandwidth, a read+write copy takes ~6.2 ms per frame.
    3. Calculate Hailo-8 compute time: For a 10 GOPS model, 10 / 26,000 TOPS = 0.38 ms.
    4. Compare overhead to compute: 6.2 ms CPU copy >> 0.38 ms actual compute.
    **By switching to zero-copy DMA, the 6.2 ms CPU bottleneck is eliminated, reducing overhead to purely PCIe transfer latency and unlocking the 26 TOPS capacity.**
