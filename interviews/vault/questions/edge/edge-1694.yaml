title: Hailo-8 Zero-Copy Stream Optimization
scenario: We are deploying a 4-camera traffic monitoring system on an edge gateway
  equipped with a Hailo-8 accelerator (26 TOPS INT8, 2.5W). Because the Hailo-8 is
  a dataflow accelerator with no local DRAM, it streams input data directly from host
  memory over PCIe. Our pipeline processes 1080p frames but is currently bottlenecked
  at 40 FPS total, and profiling reveals the Hailo-8 is idle over 85% of the time
  while the host ARM CPU is maxed out performing user-space to kernel-space buffer
  copies. Diagnose the bottleneck in this host-device data movement and quantify the
  impact of your proposed fix.
question: What host-device data movement bottleneck stalls the 4-camera Hailo-8 pipeline
  at 40 FPS, and how would zero-copy DMA fix it?
details:
  realistic_solution: The correct approach is to implement a zero-copy pipeline using
    pinned (page-locked) memory and direct DMA transfers. By allocating contiguous
    memory for the camera capture buffers using `dma_buf` and mapping these exact
    physical addresses to the HailoRT driver, the Hailo-8's PCIe DMA controller can
    stream the INT8 frames directly. This completely eliminates the intermediate CPU
    read/write operations from the data movement path.
  common_mistake: Candidates often suggest batching to improve accelerator utilization
    or compressing the images to save PCIe bandwidth. They fail to recognize that
    batching does not solve the CPU memory-copy bottleneck and that a dataflow architecture
    without local DRAM requires a continuous, zero-copy streaming pipeline to function
    efficiently without stalling.
  napkin_math: A 1080p INT8 frame is 6.2 MB (1920x1080x3). On an edge CPU with 2 GB/s
    memory bandwidth, a naive copy (read + write) takes 6.2 ms per frame. The Hailo-8
    provides 26 TOPS INT8; computing an object detection model requiring 10 GOPS takes
    only 0.38 ms (10 / 26,000 sec). The 6.2 ms CPU memory copy is >16x longer than
    the actual compute time. By switching to zero-copy DMA, we eliminate the 6.2 ms
    CPU bottleneck, reducing host-device overhead to purely PCIe transfer latency
    and unlocking the full 26 TOPS capacity.
