title: Dataflow Streaming on Host-Dependent Accelerators
scenario: You are architecting an edge NVR (Network Video Recorder) system using a Hailo-8 accelerator
  (26 TOPS INT8, 2.5W) connected via PCIe Gen3 x4. The Hailo-8 has no local DRAM and relies entirely on
  streaming from the host CPU's memory. You need to deploy a 45MB object detection model to process 4
  concurrent 1080p video streams at 30 fps. Design the memory hierarchy and streaming strategy to prevent
  host-device bandwidth bottlenecks and ensure the 26 TOPS engine is fully utilized without stalling.
details:
  realistic_solution: The correct architecture exploits the Hailo-8's spatial dataflow paradigm by pinning
    the entire 45MB model's weights into the distributed on-chip SRAM. The host DRAM is used strictly
    as a ring buffer for incoming frames and final bounding box outputs. By streaming the 4 video feeds
    sequentially into the dataflow pipeline, intermediate activations remain entirely on-chip, decoupling
    the compute throughput from host memory latency.
  common_mistake: Candidates often treat the Hailo-8 like a traditional GPU, proposing layer-by-layer
    execution where intermediate activations are constantly spilled and reloaded from host DRAM. They
    fail to recognize that without local DRAM, this constant thrashing over PCIe will completely starve
    the compute units.
  napkin_math: 'Input payload: 4 streams * (1920 * 1080 * 3 bytes) * 30 fps = ~746 MB/s. PCIe Gen3 x4
    provides ~3.2 GB/s practical bandwidth, easily handling the 746 MB/s input stream (23% utilization).
    If intermediate activations or weights were swapped per frame, swapping a 45MB model at 120 fps would
    require 5.4 GB/s, immediately bottlenecking the PCIe bus. Compute check: An average 45MB model requires
    ~60 GOPS per frame. At 120 total fps, compute required is 120 * 60 GOPS = 7.2 TOPS, well within the
    26 TOPS INT8 capacity.'
