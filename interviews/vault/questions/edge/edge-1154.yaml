title: 'Edge TCO Diagnosis: Connectivity Cost Surprise in IoT Fleet'
scenario: A company budgeted $500K for a 2,000-unit Jetson Orin ($499 each) smart city deployment. At month 3, they've spent $200K more than projected. The extra cost is from 4G data overages (budget: $5/unit/month, actual: $25/unit/month).
question: What caused the 4G overage, how much does it cost annually, and how should the 2,000-unit Jetson fleet fix it?
details:
  realistic_solution: 'Data overage: $25-$5=$20/unit/month extra. 2000 units: $40K/month extra = $480K/year overage. Root cause: camera feeds being streamed to cloud dashboard in addition to inference results. 1080p H.264 stream: 2-5 Mbps. Fix: transmit only inference results (JSON, ~1KB/frame) or occasional thumbnails. This drastically reduces data consumption.'
  common_mistake: |
    **The Pitfall:** Streaming raw data from an edge inference device.
    **The Rationale:** Engineers design an "edge" system but still transmit raw camera streams to the cloud for visualization/logging.
    **The Consequence:** Completely negating the bandwidth savings that justified the high CapEx of using edge inference hardware, resulting in massive OpEx overages.
  napkin_math: |
    1. **Overage Cost:** $20/unit/month * 2000 units * 12 months = $480,000/year.
    2. **Current Usage:** At $25 for a standard 25GB plan, usage is around ~25GB/month. This implies periodic clip streaming (e.g., 20 events/day of 30s 2Mbps clips = ~27GB/month).
    3. **Fix:** Transmit only a 50KB thumbnail + 1KB JSON result.
    4. **New Usage:** 20 events * 51KB = ~1MB/day = ~30MB/month.
    **Result: Fixing the telemetry prevents the $480K/year overage by dropping usage to <100MB/month.**
