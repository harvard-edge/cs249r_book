title: Disconnected Drift Detection
scenario: You have 10,000 portable ultrasound devices operating in rural clinics. They run an edge CNN for anomaly detection. Due to HIPAA and severe bandwidth limits (20 Kbps uplink), you cannot send the 5MB DICOM images to the cloud.
question: How would you detect ultrasound data drift within 7 days without uploading 5MB DICOM images over 20 Kbps links?
details:
  realistic_solution: Push drift detection compute to the edge by calculating distribution metrics locally. Extract the mean and variance of intermediate CNN embeddings, and the entropy of the final softmax layer. The device aggregates these metrics over a sliding window and calculates the Wasserstein distance against a locally stored baseline distribution. It then transmits only a 1KB telemetry payload containing these summary statistics and drift scores to the cloud.
  common_mistake: |
    **The Pitfall:** Attempting to sample and send a small percentage of full images to the cloud.
    **The Rationale:** Candidates fall back on standard cloud-centric sampling methods, failing to account for the extreme 20 Kbps constraint and strict HIPAA compliance.
    **The Consequence:** Saturating the ultra-low bandwidth link and violating medical privacy laws.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Fleet size: 10,000 devices.
       * Image size: 5 MB/image.
       * Bandwidth: 20 Kbps uplink.
       * Upload frequency constraint: 10 images/day per device.
    2. **Calculations:**
       * Raw Image Upload: 10 images/day * 5 MB = 50 MB/device/day.
       * Fleet-wide Raw Upload: 50 MB * 10,000 = 500 GB/day.
       * Bandwidth Saturation: Uploading 50 MB over 20 Kbps takes ~5.5 hours per device.
       * Edge Telemetry Upload: 1 KB/day/device * 10,000 = 10 MB/day fleet-wide.
       * Telemetry Latency: Transmitting 1 KB over 20 Kbps takes 0.4 seconds.
    3. **Conclusion & Interpretation:**
       **Result: 10 MB/day fleet-wide vs 500 GB/day**. Pushing compute to the edge avoids bandwidth saturation and maintains strict HIPAA compliance.
