title: Architecting a Streaming Pipeline for Hailo-8
scenario: 'You are architecting an edge perception system that relies on a Hailo-8 dataflow accelerator connected to a low-power host SoC over PCIe Gen3 x2. Since the Hailo-8 has no local DRAM, all input streams and intermediate activations must stream directly from host memory.'
question: 'How do you use the roofline model to evaluate the tradeoffs of which operations execute on the Hailo-8 versus the host, and how does the lack of local DRAM constrain your design?'
details:
  realistic_solution: 'The design must account for the strict host-interface memory roofline by keeping the operational intensity high. The candidate should propose compiling the model such that the entire core feature extraction and dense compute blocks reside entirely within the Hailo-8''s internal SRAM dataflow architecture. They should evaluate the tradeoff of keeping high-arithmetic-intensity operations (like deep convolutions) on the accelerator while moving high-bandwidth, low-intensity tasks (like NMS or certain element-wise operations) to the host only if they don''t break the on-chip dataflow pipeline.'
  common_mistake: |
    **The Pitfall:** Assuming the 26 TOPS peak compute is achievable without deep analysis of the host connection.
    **The Rationale:** Candidates often design a system that frequently swaps large intermediate feature maps back and forth to the host, ignoring the devastating impact this has on the system's operational intensity.
    **The Consequence:** The design falls onto the memory-bound slope of the roofline, drastically reducing utilization and overall system throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - PCIe Gen3 x2 Bandwidth: ~1.97 GB/s.
    - Hailo-8 Peak Compute: 26 TOPS.

    **Calculations:**
    - Roofline ridge point: 26,000 GOPS / 1.97 GB/s = 13,198 Ops/Byte.
    - Ops needed to hide 2 MB tensor transfer: 2 MB * 13,198 Ops/Byte = 26.4 Giga-operations.

    **Conclusion & Interpretation:**
    - **Result: The model requires >13,198 Ops/Byte to avoid the PCIe bottleneck (I/O-Bandwidth-Bound)**.
