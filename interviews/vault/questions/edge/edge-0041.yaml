title: The Post-Replacement Camera Miscalibration
scenario: A field technician replaces a broken camera module on one of your Jetson Orin NX traffic monitoring
  devices. The replacement camera is the same make and model. After the swap, the system reports that
  all vehicles are 15% smaller than before, and the speed estimates (derived from tracking bounding boxes
  across frames) are 12% too fast. The model hasn't changed. What did the technician miss?
details:
  realistic_solution: 'Every camera lens has unique **intrinsic parameters** — focal length, principal
    point, and distortion coefficients — that vary slightly between individual units due to manufacturing
    tolerances. The original camera was calibrated during installation: its intrinsic parameters were
    measured using a checkerboard pattern and stored in a calibration file on the device. The system uses
    these parameters to convert pixel measurements to real-world dimensions (meters) and to undistort
    the image before inference.'
  common_mistake: '"The new camera has a different resolution or frame rate." The technician verified:
    same resolution (1920×1080), same frame rate (30 FPS), same sensor model (IMX477).'
  napkin_math: 'Focal length tolerance: ±5% (manufacturer spec). Worst-case size error without recalibration:
    10% (if replacement lens is at -5% and original was at +5%). Calibration time: 5 minutes (20 images
    × 15 seconds each). Calibration accuracy: <0.5% size error after calibration. Cost of uncalibrated
    system: if used for speed enforcement, a 12% speed overestimate means ticketing drivers going 55 mph
    in a 60 mph zone — legal liability. Cost of calibration kit: $20 (printed checkerboard) + 5 minutes
    technician time ($12.50). Total: $32.50 to prevent potential lawsuits.'
