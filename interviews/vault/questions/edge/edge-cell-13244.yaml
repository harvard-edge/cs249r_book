title: Diagnose Systolic Array Pipeline Stall on Coral Edge TPU
scenario: A MobileNetV3 model on Coral Edge TPU (4 TOPS, 128×128 systolic array) achieves 380 FPS on standard
  benchmarks but drops to 45 FPS when a depthwise separable convolution layer uses dilation rate 4. The
  dilated convolution creates a non-contiguous memory access pattern. The TPU has 8MB on-chip SRAM. Diagnose
  why dilation causes the FPS drop and propose a fix.
details:
  realistic_solution: 'Dilated conv with rate 4: kernel samples at positions {0, 4, 8} in each dimension.
    For a 224×224 input with rate 4: the 3×3 dilated kernel accesses a 9×9 receptive field with stride
    4 between samples. In systolic array: weights are contiguous (loaded once), but input data requires
    strided gather from SRAM. Stride-4 gather: effective memory bandwidth = peak / 4 = 25 GB/s / 4 = 6.25
    GB/s. Input per layer: 224×224×64×1B = 3.2MB. Time: 3.2MB / 6.25 GB/s = 512μs per layer vs 128μs contiguous.
    4× slowdown matches 380/45 = 8.4× (multiple dilated layers compound). Fix: re-layout input tensor
    with gather pre-processing on host CPU, or use im2col to make access contiguous before TPU submission.'
  common_mistake: Blaming dilation for increasing FLOPs; dilation does not change the number of multiplications
    — a 3×3 dilated conv has the same FLOPs as a standard 3×3 conv but different memory access patterns.
  napkin_math: 'Dilation 4: stride-4 memory gather reduces effective BW by 4×. Contiguous: 25 GB/s. Dilated:
    ~6 GB/s. BW-limited layer: 3.2MB / 6 GB/s = 533μs vs 128μs. If 2 dilated layers: total overhead =
    2×400μs = 800μs extra per inference. At 380 FPS: 2.63ms/inference. With dilation: 2.63+0.8=3.43ms
    → 291 FPS... other factors (scheduling): 45 FPS actual suggests 4 dilated layers or worse cache behavior.'
