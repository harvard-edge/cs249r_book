title: Distilling a Hybrid Object Detector for Jetson Orin
scenario: You are deploying a real-time object detection model for an autonomous delivery robot on an NVIDIA Jetson Orin. The baseline teacher model is a heavy vision transformer that is highly accurate but runs at only 5 FPS and saturates the 60W TDP. You plan to use knowledge distillation to train a smaller, hybrid CNN-Transformer student model.
question: How would you design feature distillation and size the student CNN-Transformer to hit 30 FPS while using the Orin's Ampere GPU and DLA efficiently?
details:
  realistic_solution: The optimal strategy uses intermediate feature distillation, aligning the teacher's attention maps with the student's CNN and transformer stages. To utilize the Jetson Orin efficiently, the student model should be designed with heavy convolutional blocks early in the network to run on the DLA, followed by lightweight transformer blocks mapped to the Ampere GPU. The distillation loss must explicitly force the DLA-bound CNN features to mimic the rich semantic representations of the teacher's early layers, ensuring no accuracy drop when the workload transitions between the two accelerators.
  common_mistake: |
    **The Pitfall:** Proposing standard logit-only distillation and uniform student sizing.
    **The Rationale:** Candidates fail to transfer the complex spatial reasoning of the heavy teacher and ignore the heterogeneous hardware capabilities of the Orin.
    **The Consequence:** The resulting model fails to partition cleanly between the Ampere GPU (better for custom ops) and the DLA (dense convolutions), leading to poor hardware utilization.
  napkin_math: |
    - **Target frame time:** 1000ms / 30 FPS = 33.3ms.
    - **Theoretical compute per frame:** 275 TOPS / 30 FPS = 9.16 Tera-Operations (TOPs).
    - **Practical compute budget:** Assuming realistic 35% utilization (due to 32 GB LPDDR5 bandwidth limits) = **~3.2 TOPs (~1.6 TMACs) per frame**.
    - **Sizing target:** Size student at 1.0-1.2 TMACs.
    - **Mapping:** ~800 GMACs of convolutions to DLA, ~300 GMACs of attention/routing to Ampere GPU.
