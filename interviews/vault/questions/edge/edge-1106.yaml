title: 'Edge Queueing Theory Diagnosis: Queue Overflow in Edge Gateway'
scenario: An edge gateway Jetson Orin (32GB LPDDR5, 275 TOPS INT8) aggregates data from 16 IoT sensors. The arrival rate is λ=160 requests/sec, but the inference engine processes μ=120 requests/sec. The operator observes that exactly 25% of incoming requests are dropped.
question: Using M/M/1/K queueing theory, what explains the exact 25% drop rate, and how should this system overload be resolved?
details:
  realistic_solution: |
    ρ = λ/μ = 160/120 = 1.333 > 1. Queue IS unstable (ρ>1). With finite buffer K: effective λ = λ * (1 - Pk) where Pk = drop probability. For drops=25%: effective λ_eff = 160 * 0.75 = 120 = μ. System stabilizes with exactly ρ_eff=1.0 through dropping. M/M/1/K: Pk = (1-ρ)*ρ^K/(1-ρ^(K+1)) approaches (λ-μ)/λ = 40/160=25% as K→∞ at ρ>1. This confirms ρ>1. Fix: reduce load (drop 2 sensors, λ=140 > μ=120 still over), upgrade μ to 200 inf/s with model optimization (INT8 + TensorRT), or add second Jetson Orin.
  common_mistake: |
    **The Pitfall:** Assuming packet drops only occur when utilization hits 100%, without recognizing the system is fundamentally unstable.
    **The Rationale:** Engineers assume a sufficiently large queue (K) will absorb the spikes.
    **The Consequence:** Attempting to fix the drops by increasing the queue size, which only adds latency without preventing the inevitable mathematical overflow.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival rate (λ): 160 requests/sec.
    - Inference engine processing rate (μ): 120 requests/sec.

    **Calculations:**
    - Load factor (ρ): λ / μ = 160 / 120 = 1.333.
    - Drop Rate: (λ - μ) / λ = (160 - 120) / 160 = 40 / 160 = 25%.
    - Resolution target: Inference rate must exceed 160 (e.g., μ = 240 with TensorRT INT8).

    **Conclusion & Interpretation:**
    - **Result: 25% drop rate (Compute-Bound)**. System is mathematically unstable (ρ > 1); inference rate must increase using INT8 quantization to avoid dropped frames.
