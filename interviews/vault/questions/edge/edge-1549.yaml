title: Sustained Throughput vs Thermal Throttling on Jetson Orin
scenario: 'You are deploying a continuous object detection model on an NVIDIA Jetson Orin (32 GB LPDDR5, Ampere GPU + DLA, 60W TDP). The system is installed in a sealed outdoor enclosure in 40°C ambient heat. Option A runs the model solely on the Ampere GPU at the full 60W TDP. Option B partitions the model between the Ampere GPU and DLA to cap system power at 30W.'
question: 'Which strategy yields higher sustained 24-hour throughput in the 40°C sealed enclosure, and why?'
details:
  realistic_solution: 'Option B is the correct choice for sustained edge deployments in high ambient temperatures. By intelligently offloading tasks to the DLA and capping average power at 30W, the system maintains thermal equilibrium. Option A provides high burst performance but quickly triggers thermal throttling, resulting in lower overall throughput and unpredictable latency.'
  common_mistake: |
    **The Pitfall:** Choosing Option A based solely on peak TOPS.
    **The Rationale:** Candidates assume the maximum 275 TOPS always yields the highest long-term throughput.
    **The Consequence:** They fail to account for the sealed enclosure's thermal resistance, causing aggressive thermal throttling that ruins long-term throughput.
  napkin_math: |
    * Option A (60W TDP): Assuming enclosure thermal resistance of 1.0°C/W, Delta T = 60W × 1.0°C/W = 60°C.
    * Option A T_junction = 40°C (ambient) + 60°C = 100°C (exceeds 95°C throttle limit).
    * Option B (30W cap): Delta T = 30W × 1.0°C/W = 30°C.
    * Option B T_junction = 40°C (ambient) + 30°C = 70°C.
    * **Conclusion: Option B (70°C) is perfectly safe and yields higher sustained throughput by avoiding throttling completely.**
