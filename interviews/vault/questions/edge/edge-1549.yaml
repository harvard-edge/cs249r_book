title: Sustained Throughput vs Thermal Throttling on Jetson Orin
scenario: 'You are deploying a continuous object detection model on an NVIDIA Jetson
  Orin (32 GB LPDDR5, Ampere GPU + DLA accelerator, up to 275 TOPS INT8 at 60W TDP).
  The system is installed in a sealed outdoor enclosure in 40°C ambient heat. You
  must choose between Option A: running the model solely on the Ampere GPU at the
  full 60W TDP to maximize FPS, or Option B: partitioning the model between the Ampere
  GPU and DLA to cap system power at 30W. Evaluate which strategy yields higher sustained
  throughput over a 24-hour period.'
question: Which strategy yields higher sustained 24-hour throughput in the 40°C sealed
  enclosure, and why?
details:
  realistic_solution: Option B is the correct choice for sustained edge deployments
    in high ambient temperatures. By intelligently offloading tasks to the DLA and
    capping average power at 30W, the system maintains thermal equilibrium. Option
    A provides high burst performance but quickly triggers thermal throttling, resulting
    in lower overall throughput and unpredictable latency.
  common_mistake: Candidates often choose Option A, assuming the maximum 275 TOPS
    always yields the highest long-term throughput. They fail to evaluate the impact
    of a sealed enclosure, where sustained 60W power draw will quickly saturate the
    thermal budget and cause aggressive downclocking.
  napkin_math: 'For Option A (60W TDP): Assuming enclosure thermal resistance of 1.0°C/W,
    Delta T = 60W * 1.0°C/W = 60°C. T_junction = 40°C (ambient) + 60°C = 100°C, exceeding
    the 95°C throttle limit. The 275 TOPS INT8 capacity cannot be sustained. For Option
    B (30W): Delta T = 30W * 1.0°C/W = 30°C. T_junction = 40°C + 30°C = 70°C. This
    allows safe, sustained use of the 32 GB LPDDR5 memory and both compute engines
    (Ampere GPU + DLA) without hitting thermal limits.'
