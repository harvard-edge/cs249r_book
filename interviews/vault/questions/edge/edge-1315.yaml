title: Coral Edge TPU Model Selection and Throughput
scenario: You are designing an intrusion detection system for 1,000 remote substations. Each site has 4 cameras streaming at 15 FPS, and you plan to process the streams using a single Google Coral Edge TPU (USB form factor, 4 TOPS INT8, 2W max). You must choose between two models: Model Alpha (8 GFLOPs FP32, standard ReLU activations) and Model Beta (3 GFLOPs FP32, uses Swish activations). Quantizing Model Alpha to INT8 loses 2% accuracy, while Model Beta loses 0.5% but requires CPU fallback for the Swish layers.
question: Which model, Alpha or Beta, is the most cost-effective choice for 4 cameras at 15 FPS on a Coral Edge TPU, and why?
details:
  realistic_solution: Model Alpha is the correct choice. Even with a 2% accuracy drop, its standard operations (like ReLU) can be fully quantized and mapped to the Edge TPU, keeping the workload entirely on the accelerator. Model Beta's CPU fallback causes severe context-switching latency (often 10s of milliseconds per layer), making it impossible to hit real-time targets and defeating the 2W low-power advantage of the Coral device.
  common_mistake: |
    **The Pitfall:** Choosing Model Beta based on the lower theoretical FLOPs and higher accuracy retention.
    **The Rationale:** Candidates fail to realize that the Coral Edge TPU has limited operator support and cannot accelerate Swish natively.
    **The Consequence:** Falling back to the host CPU for unsupported operations destroys throughput and vastly increases system power consumption, missing the real-time frame targets.
  napkin_math: |
    - **Requirements:** 4 cameras * 15 FPS = 60 FPS per site.
    - **Model Alpha Compute:** 60 FPS * 8 GOPs = 480 GOPs (0.48 TOPS).
    - **Capacity check:** 0.48 TOPS / 4 TOPS = **12% utilization**, easily meeting the requirement entirely on the TPU.
    - **Model Beta Compute:** 60 FPS * 3 GOPs = 180 GOPs, but host CPU fallback for Swish adds an estimated 20ms latency per frame.
    - **Model Beta Latency:** 1000ms / 20ms = max **50 FPS bottlenecked by CPU**, failing the 60 FPS requirement.
