title: Coral Edge TPU Model Selection and Throughput
scenario: A Google Coral Edge TPU (4 TOPS INT8, 2W) must process 4 cameras streaming at 15 FPS. Model Alpha uses ReLU (8 GFLOPs), while Model Beta uses Swish (3 GFLOPs).
question: Which model, Alpha or Beta, is the most cost-effective choice for 4 cameras at 15 FPS on a Coral Edge TPU, and why?
details:
  realistic_solution: Model Alpha is the strictly correct architectural choice. The Coral Edge TPU compiler natively maps standard ReLU operations entirely to the INT8 silicon. Model Beta's Swish layers are unsupported, forcing a pipeline partition and CPU fallback. This context switch incurs a massive latency penalty per frame, destroying throughput and breaking the 2W power envelope, nullifying its lower theoretical FLOP count.
  common_mistake: |
    **The Pitfall:** Choosing Model Beta based on the lower theoretical FLOPs.
    **The Rationale:** Failing to audit hardware-specific operator support lists and assuming all GFLOPs execute with equal efficiency.
    **The Consequence:** Host CPU fallback causes 20ms delays per frame, hard-capping throughput and missing the 60 FPS real-time deadline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 4 cameras * 15 FPS = 60 FPS. Edge TPU = 4 TOPS.
    - Model Alpha: 8 GOPs (100% TPU). Model Beta: 3 GOPs (CPU fallback ~20ms latency).

    **Calculations:**
    - Model Alpha Compute: 60 FPS * 8 GOPs = 480 GOPs (0.48 TOPS).
    - TPU Utilization (Alpha): 0.48 TOPS / 4 TOPS = 12%.
    - Model Beta Bottleneck: 1,000 ms / 20 ms = Max 50 FPS.

    **Conclusion & Interpretation:**
    - **Result: 12% utilization vs 50 FPS cap (Hardware-Compatibility Bound)**. Alpha utilizes 12% of the TPU; Beta caps at 50 FPS due to CPU I/O latency.
