title: 'Hailo-8 Edge Deployment: Encoder-Decoder Architecture Tradeoffs for NLP Classification'
scenario: 'Your team is tasked with deploying a real-time Natural Language Processing (NLP) inference pipeline on an edge device, specifically targeting the Hailo-8 accelerator (26 TOPS INT8, 2.5W). The application requires high throughput and low latency for text classification, operating within a strict power budget. You are evaluating two potential model architectures, both quantized to INT8: a compact encoder-only model (e.g., MobileBERT) and a similarly sized decoder-only model (e.g., a distilled GPT-2 variant adapted for classification by using the last token''s hidden state).'
question: "For Hailo-8 text classification, how would you compare an INT8 MobileBERT-style encoder with a distilled GPT-2-style decoder, and which is preferable?"
details:
  realistic_solution: 'A realistic solution for text classification on Hailo-8 would likely prioritize an encoder-only architecture. This is because encoder-only models process all input tokens in parallel through their layers, which aligns perfectly with Hailo-8''s dataflow architecture for maximum efficiency and throughput. The solution would involve: 1) Thoroughly profiling both architectures on the Hailo-8 to measure actual latency, throughput, and power consumption under realistic workloads. 2) Leveraging Hailo-8''s SDK to optimize model compilation, including layer fusion and memory access patterns, to maximize INT8 utilization. 3) Given the task is classification, the non-autoregressive nature of encoders avoids the potential sequential bottlenecks or unnecessary complexities that a decoder-only model might introduce, even when adapted for classification.'
  common_mistake: |
    **The Pitfall:** Overlooking the internal architectural mapping to specialized dataflow accelerators.
    **The Rationale:** Candidates often assume any model of the same size and precision will perform equally well.
    **The Consequence:** Selecting a decoder-only model that underutilizes the accelerator, resulting in sub-optimal latency and throughput for fixed-length tasks.
  napkin_math: |
    *   **Theoretical Peak:** 100 GOPS / 26 TOPS = 3.8ms per inference.
    *   **Encoder Actual:** With 80% utilization (effective 20.8 TOPS), latency is 100 GOPS / 20.8 TOPS = **4.8ms**.
    *   **Decoder Actual:** With 60% utilization (effective 15.6 TOPS), latency is 100 GOPS / 15.6 TOPS = **6.4ms**.
    *   **Result:** The encoder-only model exhibits superior throughput and latency due to better utilization of the parallel dataflow architecture.
