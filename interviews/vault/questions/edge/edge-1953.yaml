title: 'Hailo-8 Edge Deployment: Encoder-Decoder Architecture Tradeoffs for NLP Classification'
scenario: 'Your team is tasked with deploying a real-time NLP inference pipeline on an edge device, targeting a Hailo-8 accelerator. The application requires high throughput and low latency for text classification. You are evaluating two potential model architectures, both quantized to INT8: a compact encoder-only model (e.g., MobileBERT) and a similarly sized decoder-only model (e.g., a distilled GPT-2 variant adapted for classification).'
question: For Hailo-8 text classification, how would you compare an INT8 MobileBERT-style encoder with a distilled GPT-2-style decoder, and which is preferable?
details:
  realistic_solution: 'For sequence classification on a dataflow architecture like Hailo-8, an encoder-only model is vastly superior. Encoders process bidirectional context in parallel, mapping beautifully to the Hailo-8 spatial compiler. Decoders, even if used for single-token classification, often retain autoregressive architectural traits that cause inefficient sequential mapping and structural underutilization on non-GPU accelerators.'
  common_mistake: |
    **The Pitfall:** Overlooking the internal architectural mapping to specialized dataflow accelerators.
    **The Rationale:** Candidates often assume any model of the same size and precision will perform equally well.
    **The Consequence:** Selecting a decoder-only model that underutilizes the accelerator, resulting in sub-optimal latency and throughput for fixed-length tasks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model complexity: 100 GOPS per inference.
    - Hailo-8 capacity: 26 TOPS (26,000 GOPS).
    - Dataflow mapping efficiency: 80% for Encoders, 60% for Decoders.

    **Calculations:**
    - Encoder Latency: 100 GOPS / (26,000 * 0.8) = 4.8 ms.
    - Decoder Latency: 100 GOPS / (26,000 * 0.6) = 6.4 ms.

    **Conclusion & Interpretation:**
    - **Result: 4.8 ms Latency (Compute-Bound)**. The encoder architecture extracts 33% more performance due to better spatial compilation mapping.
