title: Unified Memory Bandwidth Starvation
scenario: A real-time streaming pipeline on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP) ingests 4 uncompressed 8K video streams at 60 FPS. The pipeline explicitly copies frames from the ingestion buffer to a 'device' buffer for Ampere GPU feature computation, and then copies again to a separate buffer for the DLA accelerator.
question: Why do four 8K60 streams drop frames on Jetson Orin despite low compute use, and how much LPDDR5 bandwidth do the explicit copies consume?
details:
  realistic_solution: The correct approach is to use zero-copy UMA memory sharing (e.g., using NvSciBuf, V4L2 DMA-BUF, or pinned memory). Since the CPU, Ampere GPU, and DLA share the same physical 32 GB LPDDR5 memory, passing pointers between pipeline stages eliminates the need for explicit copies, drastically reducing memory bandwidth consumption and preventing frame drops.
  common_mistake: |
    **The Pitfall:** Assuming total memory footprint determines memory bottlenecks.
    **The Rationale:** Candidates note the 15 GB footprint fits well within the 32 GB capacity, incorrectly concluding memory is not the issue.
    **The Consequence:** They fail to realize that explicit host-to-device memory copies on a Unified Memory Architecture (UMA) multiply bandwidth requirements and starve the hardware.
  napkin_math: |
    1. **Frame Size**: 1 frame (8K RGB) = 7680 * 4320 * 3 bytes = ~100 MB.
    2. **Base Ingestion Rate**: 4 streams * 60 FPS * 100 MB = 24 GB/s.
    3. **Pipeline Bandwidth Cost**:
       - Capture write: 24 GB/s
       - Copy to GPU buffer: 24 GB/s read + 24 GB/s write
       - GPU processing: 24 GB/s read + 24 GB/s write
       - Copy to DLA buffer: 24 GB/s read + 24 GB/s write
    4. **Total Data Movement**: 24 * 7 = **168 GB/s** of continuous data movement.
    5. **Conclusion**: This 168 GB/s approaches the 204.8 GB/s physical memory bandwidth limit of the Orin module, causing system-wide stalls.
