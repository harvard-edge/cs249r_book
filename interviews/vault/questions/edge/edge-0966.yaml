title: Edge New 0030
scenario: >-
  A T4 GPU runs continuous batching. A new request requiring a 500ms prefill phase arrives while the GPU is decoding tokens at 20ms/token for an active user.
question: Should the T4 run a 500ms LLM prefill monolithically or use chunked prefill while decoding at 20ms/token?
details:
  realistic_solution: If the GPU executes the 500ms prefill as a single monolithic block, the active user's generation will stutter for half a second, destroying the interactive SLA. Chunked prefill breaks the context encoding into smaller 50ms blocks, interleaving them with the decode steps. The tradeoff maintains the 20ms decoding cadence at the expense of slightly extending the total time-to-first-token for the new incoming request.
  common_mistake: |
    **The Pitfall:** Optimizing purely for lowest Time-To-First-Token (TTFT) for the new request.
    **The Rationale:** Candidates view the prefill as an atomic operation that must complete instantly, ignoring the impact on concurrent streams.
    **The Consequence:** Causes catastrophic stuttering (500ms pause) for all currently decoding users, violating the interactive SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active user decoding speed: 20ms/token.
    - New request prefill time: 500ms.
    - Hardware: NVIDIA T4 GPU.

    **Calculations:**
    - Monolithic prefill: Active user waits 500ms. New user TTFT = 500ms.
    - Chunked prefill (10 blocks of 50ms): Cycle = 50ms prefill + 20ms decode = 70ms.
    - Impact on active user: Token latency degrades from 20ms to 70ms.
    - Impact on new user: TTFT = 10 blocks * 70ms = 700ms.

    **Conclusion & Interpretation:**
    - **Result: 700ms TTFT (Latency-Bound).** Chunked prefill avoids a massive 500ms stutter for the active user, sacrificing new user TTFT (700ms) to maintain the streaming SLA.
