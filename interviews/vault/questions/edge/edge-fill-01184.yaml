title: Diagnosing Suboptimal ONNX Runtime Performance on Jetson Orin
scenario: You've deployed a large-scale semantic segmentation model, originally developed in TensorFlow,
  to an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W) after converting it to ONNX. The model runs,
  but the inference throughput is only 8 FPS, significantly below the expected 25 FPS for the target application.
  Observation shows the Jetson Orin's GPU utilization is sporadic, averaging around 30-40%, while CPU
  utilization frequently spikes during inference batches.
details:
  realistic_solution: The most effective approach involves detailed profiling using NVIDIA Nsight Systems
    or nvprof to pinpoint the exact operations executing on the CPU vs. GPU. Analyze the verbose logs
    during the ONNX-to-TensorRT conversion process for warnings about unsupported layers or inefficient
    graph optimizations. If CPU fallback is identified, investigate custom ONNX Runtime execution providers
    or develop custom TensorRT plugins for the problematic operators. Alternatively, re-evaluate the model
    architecture to replace unsupported operations with TensorRT-compatible equivalents or explore model
    quantization strategies (e.g., INT8) that align better with the Jetson Orin's capabilities.
  common_mistake: A common mistake is assuming that converting a model to ONNX and deploying it with the
    TensorRT execution provider on a Jetson Orin guarantees optimal performance. Developers often overlook
    granular details like specific operator support within TensorRT for the converted ONNX graph, leading
    to silent fallback of unsupported operations to CPU execution, which creates unexpected bottlenecks
    and underutilization of the specialized hardware accelerators.
  napkin_math: If your target is 25 FPS, each inference must complete in approximately 40 ms. Currently,
    you're achieving 8 FPS, meaning each inference takes around 125 ms. This indicates a performance gap
    of roughly 85 ms per inference. Given the Jetson Orin's 275 TOPS INT8, a significant portion of this
    gap is likely due to operations not leveraging the INT8 hardware, or considerable data transfer overhead
    between CPU and GPU. For instance, if the model has 100 GFLOPs in FP32, it could theoretically perform
    ~275 TOPS / (2 FLOPS/INT8 op) = ~137 INT8 GFLOPs, but without proper conversion and op coverage, much
    of that potential is lost.
