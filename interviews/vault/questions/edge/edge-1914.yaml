title: 'Extreme Quantization of Vision Transformer on Hailo-8'
scenario: 'You are a lead ML engineer tasked with deploying a large vision transformer model, initially trained in FP32, onto an edge device constrained by a strict power budget and low latency requirements. Your target hardware is the Hailo-8, which boasts 26 TOPS (Tera Operations Per Second) for INT8 computations with a typical power consumption of 2.5W.'
question: 'How would you quantize a vision transformer to 2-bit weights and map it efficiently onto Hailo-8''s INT8 engine without excessive accuracy loss?'
details:
  realistic_solution: '1. Establish an INT8 quantized baseline using standard Post-Training Quantization (PTQ) for comparison. 2. Employ advanced PTQ techniques like GPTQ or AWQ for weight-only sub-4-bit (e.g., 2-bit or 3-bit) quantization, as these methods are designed to minimize per-layer quantization error. 3. Carefully evaluate activation quantization; a mixed-precision approach (e.g., INT8 activations with 2-bit weights) may be necessary to preserve accuracy. 4. For Hailo-8''s INT8 engine, sub-4-bit weights will be packed into 8-bit words (e.g., four 2-bit weights per INT8). The optimization lies in efficient packing/unpacking and leveraging the reduced memory bandwidth due to smaller model size. 5. If accuracy is still insufficient, consider minimal Quantization-Aware Training (QAT) with a small, representative dataset, or explore architectural modifications specific to binary/ternary networks if extreme accuracy recovery is critical. 6. Thoroughly profile the quantized model on Hailo-8 to ensure latency, throughput, and power targets are met.'
  common_mistake: |
    **The Pitfall:** Naively applying uniform sub-4-bit quantization or assuming native hardware support for arbitrary bitwidths.
    **The Rationale:** Candidates fail to consider activation distributions or how 2-bit weights must be packed into an INT8-native accelerator.
    **The Consequence:** Severe, unrecoverable accuracy degradation and suboptimal memory access optimizations.
  napkin_math: |
    - FP32 model size: 100M * 4 bytes = 400 MB.
    - INT8 model size: 100M * 1 byte = 100 MB.
    - 2-bit weight-only model size: 100M * 0.25 bytes = **25 MB** (16x reduction from FP32).
    - Packing: 4 2-bit weights are packed into one INT8 word.
    - The 2-bit throughput gains come entirely from a 4x memory bandwidth reduction, not higher compute TOPS.
