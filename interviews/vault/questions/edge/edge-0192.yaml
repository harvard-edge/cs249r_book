title: The Power Efficiency Metric
scenario: You're on the autonomous vehicle perception team, selecting a new accelerator for the car's
  sensor fusion module. The power budget is extremely tight. When comparing two chips, like a Jetson AGX
  Orin and a Hailo-8, what is the single most important metric for evaluating power efficiency?
question: "When comparing two chips, like a Jetson AGX Orin and a Hailo-8, what is the single most important metric for evaluating power efficiency?"
details:
  realistic_solution: The correct metric is TOPS/W (Tera-Operations Per Second Per Watt). It directly
    measures how much computational performance you get for each watt of power consumed. This is the critical
    efficiency metric for any power-constrained environment like an automobile, where every watt impacts
    battery life and thermal headroom.
  common_mistake: Engineers often focus on peak TOPS (Tera-Operations Per Second), assuming bigger is
    always better. This ignores the power cost to deliver that performance. A 275 TOPS chip that consumes
    60W is far less efficient for a given task than a 26 TOPS chip that only consumes 2.5W.
  napkin_math: 'Hailo-8 delivers 26 TOPS at 2.5W, which is 10.4 TOPS/W. Jetson AGX Orin delivers 275 TOPS at 60W, which is 4.58 TOPS/W. Comparing these metrics directly shows Hailo-8 is over 2x more power efficient for supported workloads, even though Orin has higher peak performance.'
  options:
  - Peak TOPS
  - TOPS/W
  - Memory Bandwidth (GB/s)
  - TDP (Thermal Design Power)
