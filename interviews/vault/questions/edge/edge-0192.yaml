title: The Power Efficiency Metric
scenario: You're on the autonomous vehicle perception team, selecting a new accelerator for the car's sensor fusion module. The power budget is extremely tight.
question: When comparing two chips, like a Jetson AGX Orin and a Hailo-8, what is the single most important metric for evaluating power efficiency?
details:
  realistic_solution: The correct metric is TOPS/W (Tera-Operations Per Second Per Watt). It directly measures how much computational performance you get for each watt of power consumed.
  common_mistake: |
    **The Pitfall:** Focusing entirely on peak TOPS (Tera-Operations Per Second).
    **The Rationale:** Engineers assume "bigger is always better" without accounting for the battery drain or thermal requirements.
    **The Consequence:** Selecting a massive accelerator that violates the edge device's strict thermal and power limits.
  napkin_math: |
    - **Hailo-8 Efficiency:** 26 TOPS at 2.5W = 10.4 TOPS/W.
    - **Jetson AGX Orin Efficiency:** 275 TOPS at 60W = 4.58 TOPS/W.
    - **Final Result:** **Comparing these metrics directly shows Hailo-8 is over 2× more power efficient for supported workloads.**
  options:
  - Peak TOPS
  - TOPS/W
  - Memory Bandwidth (GB/s)
  - TDP (Thermal Design Power)
  correct_index: 1
