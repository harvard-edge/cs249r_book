title: 'Edge TCO Optimization: Model Compression for Edge Cost Reduction'
scenario: A 200-unit Jetson Orin fleet (60W, $499) currently runs ResNet-101 (INT8, 8.6 GOPS). Team proposes
  compressing to MobileNetV3-Large (INT8, 0.43 GOPS) with 0.5% accuracy loss. This enables moving to Hailo-8+Pi5
  ($280, 7.5W). Calculate 5-year TCO savings, accuracy-cost tradeoff, and whether the 2-month engineering
  investment ($60K) is justified.
question: "What is the correct 5-year power cost for 200 Jetson Orin units at 60W and $0.10/kWh before compression?"
details:
  realistic_solution: 'Power: 200 × 60W × 43,800hr × $0.10/1000 = $52,560 (not $526,800).'
  common_mistake: Evaluating model compression purely on accuracy loss without quantifying the TCO savings
    that justify the engineering investment and potential accuracy sacrifice.
  napkin_math: 'Fleet power: 200 devices × 60W × 43,800hr × $0.10/kWh / 1000 = $52,560 (not $526,800 —
    same error as edge-cell-13122).'
