title: Edge Concurrent Model Serving
scenario: A robotics startup uses a Jetson AGX Orin to serve multiple perception models
  simultaneously, including object detection and depth estimation.
question: Explain how the choice of execution backend and memory allocation impacts
  the ability to serve these models concurrently without OOM or severe latency spikes.
details:
  realistic_solution: Using an optimized backend like TensorRT with unified memory
    or explicit CUDA streams allows concurrent execution without duplicating memory
    for weights or blocking the GPU. Properly sizing the workspace limits and restricting
    concurrency prevents saturating the LPDDR5 bandwidth, avoiding latency spikes.
  common_mistake: Assuming that sequential execution is the only way to avoid OOM
    or that throwing models into separate threads automatically resolves memory bandwidth
    contention.
  napkin_math: 204.8 GB/s bandwidth limits maximum parallel memory fetching.
