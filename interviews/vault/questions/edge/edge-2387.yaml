title: Edge Concurrent Model Serving
scenario: A robotics startup uses a Jetson AGX Orin to serve multiple perception models simultaneously, including object detection and depth estimation.
question: Explain how the choice of execution backend and memory allocation impacts the ability to serve these models concurrently without OOM or severe latency spikes.
details:
  realistic_solution: Using an optimized backend like TensorRT with unified memory or explicit CUDA streams allows concurrent execution without duplicating memory for weights or blocking the GPU. Properly sizing the workspace limits and restricting concurrency prevents saturating the LPDDR5 bandwidth, avoiding latency spikes.
  common_mistake: |
    **The Pitfall:** Assuming sequential execution is the only way to avoid OOM or that throwing models into separate threads automatically resolves contention.
    **The Rationale:** Failing to understand that multi-threading without explicit stream management or unified memory still saturates shared memory bandwidth.
    **The Consequence:** Experiencing severe latency spikes or out-of-memory errors due to uncontrolled parallel memory fetching.
  napkin_math: |
    - LPDDR5 Bandwidth = 204.8 GB/s.
    - **Result: Exceeding this via unstructured concurrent fetching causes violent queueing delays and latency spikes.**
