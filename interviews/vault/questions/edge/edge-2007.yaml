title: 'Edge AI Model Deployment: Latency vs. Throughput on Jetson Orin'
scenario: Your team is deploying a continuously trained deep learning model for real-time
  object detection onto a fleet of NVIDIA Jetson Orin devices. Each Jetson Orin has
  32 GB LPDDR5 memory and provides up to 275 TOPS (INT8) for AI inference. The current
  INT8 optimized model requires an average of 15 TOPS of computational effort per
  inference and consumes 2 GB of memory. A critical requirement is to maximize inference
  throughput while ensuring an end-to-end latency not exceeding 50ms per inference
  batch, maintaining training-serving consistency.
question: Can the 15 TOPS INT8 model meet a 50ms latency target on Jetson Orin, and
  what CI/CD profiling and MLOps steps would you add?
details:
  realistic_solution: Implement a rigorous performance profiling pipeline as part
    of your CI/CD for ML. This pipeline should measure actual end-to-end latency and
    throughput on target hardware (Jetson Orin) for various batch sizes. Utilize tools
    like NVIDIA's Nsight Systems or `perf` to identify bottlenecks. If the 50ms latency
    cannot be met, strategies include further model quantization (e.g., to INT4 if
    supported), model pruning/distillation, or exploring more efficient architectures.
    Consider dynamic batching, but with caution, as it can introduce latency variability.
    Ensure model versioning and artifact tracking in a model registry for reproducibility
    and training-serving consistency, allowing rollbacks to previous, more performant
    versions if new models fail to meet edge constraints.
  common_mistake: Overlooking the discrepancy between theoretical maximum throughput
    and real-world latency constraints, especially on edge devices. Often, engineers
    might assume that if the device has enough 'total' compute, latency targets will
    be met without considering the per-inference compute cost relative to the latency
    budget, or neglecting overheads like data movement, pre/post-processing, and scheduler
    delays that consume part of the 50ms budget.
  napkin_math: '1. Calculate theoretical maximum inferences per second (IPS) based
    on compute: `Max_IPS_compute = Total_TOPS / TOPS_per_inference = 275 TOPS / 15
    TOPS/inference ≈ 18.33 IPS`. 2. Determine the average time per inference at this
    maximum rate: `T_avg_inf_at_max_IPS = 1 / Max_IPS_compute = 1 / 18.33 sec ≈ 0.0545
    sec = 54.5 ms`. 3. Compare with the latency requirement: The required end-to-end
    latency `T_latency` is `<= 50ms` per inference batch. Since `T_avg_inf_at_max_IPS
    (54.5 ms) > T_latency (50 ms)`, it is mathematically impossible to achieve the
    theoretical maximum throughput (18.33 IPS) AND meet the 50ms latency constraint,
    even for a single inference (batch size of 1), if ''15 TOPS per inference'' represents
    the minimum computational effort required. This indicates a fundamental bottleneck
    where the model is too computationally intensive for the given latency target
    on the Jetson Orin.'
