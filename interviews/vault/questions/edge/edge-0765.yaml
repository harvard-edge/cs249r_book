title: The Edge AI Cost Model That Fooled the CFO
scenario: Your team presents an edge AI cost model to the CFO: 5,000 Coral Dev Boards at $150 each = $750K, amortized over 3 years = $250K/year. The CFO approves. Eighteen months in, the actual annual spend is $1.8M — 7x over budget. The hardware cost was accurate.
question: Where did the money go?
details:
  realistic_solution: Hardware is only ~14% of edge AI TCO. The missing 86% ($1.55M/year) comes from connectivity ($750K), software updates and OTA management ($400K), power and installation ($275K), monitoring and MLOps tooling ($100K), and field service ($25K). The correct model multiplies hardware cost by 6-8x for true TCO.
  common_mistake: |
    **The Pitfall:** Assuming the hardware must have had a high failure rate.
    **The Rationale:** Failing to recognize that hardware is a small fraction of total cost of ownership (TCO) in edge AI.
    **The Consequence:** Budgets are drastically overrun because operational costs are ignored.
  napkin_math: |
    - Hardware-only model: $250K/year (CFO-approved).
    - Actual TCO: $1.8M/year.
    - Hardware as % of TCO: 14%.
    **The rule of thumb: multiply edge hardware cost by 6–8x for true TCO.**
