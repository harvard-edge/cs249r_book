title: Data Bottleneck on Qualcomm AI 100
scenario: You are deploying a high-throughput defect detection pipeline on an on-premise server utilizing a cloud edge accelerator. The quantized INT8 vision model requires exactly 100 GOPS per forward pass. Uncompressed 1080p RGB image frames (6 MB each) are sequentially loaded from the host memory to the accelerator over a PCIe link with an effective sustained bandwidth of 12 GB/s.
question: For 6 MB frames over 12 GB/s PCIe and a 100 GOPS model on a 400 TOPS accelerator, what is the max FPS and the bottleneck?
details:
  realistic_solution: "Throughput is governed by the slower of compute or IO. Compute limit: 400 TOPS / 100 GOPS = 4000 FPS. IO limit: 12 GB/s / 6 MB = 2000 FPS. The system is fatally IO-bound by uncompressed PCIe transfers, stranding 50% of the NPU's INT8 capacity. The architectural fix requires shifting to fused H.264 decoding on the accelerator or applying heavy host-side spatial downsampling prior to DMA."
  common_mistake: |
    **The Pitfall:** Forgetting the autoregressive nature of decoders or miscalculating TOPS to GOPS.
    **The Rationale:** Candidates often divide the 400 TOPS by the 100 GOPS requirement, arriving at 4000 FPS, without checking the data loading constraints.
    **The Consequence:** They fail to apply the data pipeline equation and ignore the IO bottleneck created by moving large uncompressed frames.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model compute: 100 GOPS/frame.
       - Hardware compute: 400 TOPS = 400,000 GOPS.
       - Frame size: 6 MB.
       - PCIe Bandwidth: 12 GB/s = 12,000 MB/s.
    2. **Calculations:**
       - Compute-bound limit = 400,000 GOPS / 100 GOPS/frame = 4,000 FPS.
       - IO-bound limit = 12,000 MB/s / 6 MB/frame = 2,000 FPS.
    3. **Conclusion & Interpretation:**
       - **Result: IO-Bound at 2,000 FPS.** The pipeline is starved for data, leaving 50% of compute unutilized.
