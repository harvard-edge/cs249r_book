title: Wi-Fi 6 UAV AllReduce
scenario: 4 UAVs perform federated learning over a shared Wi-Fi 6 network (1.2 Gbps),
  averaging a 10 MB model using Ring AllReduce.
question: Calculate the minimum transmission time required for the AllReduce, given
  the half-duplex shared medium constraint.
details:
  realistic_solution: For N=4, Ring AllReduce requires 2(N-1)/N * P = 1.5 * 10 MB
    = 15 MB per node. Because Wi-Fi is a shared medium, nodes cannot transmit simultaneously.
    Total network volume serialized on the channel is 4 * 15 MB = 60 MB. At 1.2 Gbps
    (150 MB/s), this takes 400ms.
  common_mistake: Using the full-duplex Ring AllReduce formula without accounting
    for the fact that Wi-Fi nodes must serialize their transmissions to avoid CSMA
    collisions.
  napkin_math: Payload per node = 1.5 * 10MB = 15MB. Total serialized data = 4 * 15
    = 60MB. Time = 60MB / 150MB/s = 0.4s.
