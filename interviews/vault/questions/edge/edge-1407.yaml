title: 'Analyzing Edge TPU Throughput Bottlenecks'
scenario: 'We are deploying a vision model on a smart camera using a Google Coral Edge TPU connected via USB. The Edge TPU provides 4 TOPS of INT8 compute at a 2W power budget, but has strictly limited operator support and requires full INT8 quantization. Our quantized model requires 20 GOPS per frame. During benchmarking, the system only achieves 40 FPS, and we observe unexpectedly high CPU utilization on the host device.'
question: 'Why does a 20 GOPS Edge TPU model achieve only 40 FPS with high host CPU utilization despite a 200 FPS compute ceiling?'
details:
  realistic_solution: 'The Edge TPU requires all operations to have supported INT8 kernels. If the model contains even a single unsupported operation, the Edge TPU compiler partitions the graph. The supported subgraphs run on the TPU, but execution must fall back to the host CPU for the unsupported operations. This forces intermediate tensors to be copied back and forth over the USB bus, and relies on the slower CPU to compute the unsupported layers.'
  common_mistake: 'Candidates often look purely at theoretical compute capacity and incorrectly assume USB bandwidth limits or thermal throttling are the primary issues. They frequently miss the architectural implication of the limited operator support constraint.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Edge TPU compute: 4 TOPS (4,000 GOPS) INT8, 2W budget.
    - Model requirement: 20 GOPS/frame.
    - USB 3.0 effective bandwidth: ~300 MB/s.

    **Calculations:**
    - Theoretical maximum throughput: 4,000 GOPS / 20 GOPS/frame = 200 FPS (5 ms/frame).
    - Actual observed throughput: 40 FPS (25 ms/frame).
    - Latency gap: 25 ms - 5 ms = 20 ms.
    - Transfer cost for 2MB intermediate tensor: 2MB / 300 MB/s ≈ 6.6 ms each way (13.2 ms round trip).
    - CPU fallback computation accounts for the remaining ~6.8 ms.

    **Conclusion & Interpretation:**
    - **Result: 40 FPS (I/O-Bound)**. Host-device context switching across USB bottlenecks the system due to unsupported operations.
