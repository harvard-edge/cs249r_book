title: PEFT Memory Budgets on Jetson Orin for On-Device Fine-tuning
scenario: An edge robotics system needs to continuously fine-tune a 1B parameter model on-device using
  LoRA as new task demonstrations are collected. Calculate the memory budget and training throughput on
  Jetson Orin.
question: "What memory budget and training throughput should you expect for on-device LoRA fine-tuning of a 1B model on Jetson Orin?"
details:
  realistic_solution: '1B model BF16: 2 GB. LoRA rank-8 adapters: 2×8×2048×24×2B = 3.1 MB. Adam states:
    6.2 MB. Activations (batch=1, seq=512): ~0.5 GB. Total: 2.5 GB out of 64 GB — comfortable. Training
    throughput: Orin GPU at ~30 TFLOPS FP16. Forward pass 1B model (seq=512, batch=1): 2 × 1B × 512 =
    ~1 TFLOP. With backward (3× forward): ~3 TFLOP total. Time: 3T / 30T = ~100ms/step. Fine-tuning in
    background while inference runs: ~3 FPS inference capacity (350ms/inf), leaving 650ms/sec for training
    = ~5-6 training steps/sec.'
  common_mistake: Treating edge LoRA training like cloud training. Orin has unified LPDDR5 shared between
    CPU and GPU — there is no dedicated GPU memory. Activations for even small batch sizes can exhaust
    the shared pool.
  napkin_math: '1B model BF16: 2 GB. Rank-8 adapters: 2×8×2048×24 = 786K params × 2B = 1.6 MB. Adam FP32:
    3.2 MB. Activations (batch=1, seq=512): 24 layers × 2 × 2048 × 512 × 2B = 100 MB. Total: 2.1 GB. Forward+backward:
    3 × 2 × 1B × 512 FLOPs = ~3 TFLOPS / 30 TFLOPS GPU = ~100ms/step. 64 GB LPDDR5 BW: 204 GB/s / (2 GB
    weights / 100ms) = sufficient weight BW.'
