title: Edge Data Quality Gate Compute Utilization
scenario: You are deploying a vision data quality gate on an NVIDIA Jetson Orin. The
  system ingests 4 camera streams at 30 frames per second. Before passing the frames
  to the main Ampere GPU perception pipeline, you must validate the data integrity
  (checking for occlusion, sensor noise, and anomaly detection) using a lightweight
  INT8 model running on the DLA accelerator. This validation model requires 10 GOPs
  (Giga Operations) per frame. Given the Jetson Orin's peak compute capacity of 275
  TOPS INT8, calculate the exact percentage of the total INT8 compute budget consumed
  by this quality gate.
question: What percentage of Jetson Orin's 275 TOPS INT8 budget is consumed by a 10
  GOPs/frame quality gate on 4 cameras at 30 FPS?
details:
  realistic_solution: First, calculate the total operations per second required by
    the validation model across all streams by multiplying the cameras, frame rate,
    and compute per frame. Convert the total GOPs to TOPS by dividing by 1,000. Finally,
    divide this required compute by the Jetson Orin's total capacity (275 TOPS) to
    find the utilization percentage. This confirms the data quality gate is lightweight
    enough to leave ample compute headroom for the primary perception tasks.
  common_mistake: Candidates often forget to multiply by the number of cameras (4)
    or the frame rate (30 FPS), calculating the compute for only a single frame. They
    may also confuse GOPs (Giga Operations) with TOPS (Tera Operations), leading to
    an order-of-magnitude error in the final percentage.
  napkin_math: 'Total frames per second = 4 cameras * 30 FPS = 120 FPS. Total compute
    required = 120 FPS * 10 GOPs/frame = 1200 GOPs per second. Convert to TOPS: 1200
    GOPs / 1000 = 1.2 TOPS. Percentage of Orin capacity = (1.2 TOPS / 275 TOPS) *
    100 = 0.436%. The data validation step consumes approximately 0.44% of the INT8
    compute budget.'
