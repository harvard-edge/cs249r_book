title: The Duty Cycle Power Calculation
scenario: A TinyML device is active for 1 second, consuming 10 mW, and then enters a deep sleep state for 9 seconds, consuming 10 µW.
question: What is the average power consumption over this 10-second active/sleep cycle?
details:
  realistic_solution: 'Calculate total energy consumed over the period and divide by the duration. Total energy is the sum of energy used in the active state and energy used in the sleep state.'
  common_mistake: |
    **The Pitfall:** Ignoring the sleep state energy or computing an unweighted average.
    **The Rationale:** Engineers either assume sleep power is mathematically zero or average the power states ((10mW + 0.01mW)/2) without temporal weighting.
    **The Consequence:** Battery life estimations are severely skewed, causing premature field failures.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Active state: 10 mW for 1 s.
       - Sleep state: 10 µW (0.01 mW) for 9 s.
       - Total cycle time: 10 s.
    2. **Calculations:**
       - Active energy = 10 mW * 1 s = 10 mJ.
       - Sleep energy = 0.01 mW * 9 s = 0.09 mJ.
       - Total energy = 10 mJ + 0.09 mJ = 10.09 mJ.
       - Average power = 10.09 mJ / 10 s = 1.009 mW.
    3. **Conclusion & Interpretation:**
       - **Result: 1.009 mW Average Power**. The sleep state energy, while orders of magnitude smaller, contributes a non-zero constant to the overall budget.
  options:
  - '~1.0 mW (Calculated Trap: Ignoring sleep power)'
  - '~5.0 mW (Calculated Trap: Unweighted average of power states)'
  - '~1.01 mW'
  - '~10.0 mW (Calculated Trap: Ignoring the duty cycle entirely)'
