title: The Duty Cycle Power Calculation
scenario: A TinyML device is active for 1 second, consuming 10 mW, and then enters a deep sleep state
  for 9 seconds, consuming 10 µW. Recognize and state the average power consumption over this 10-second
  period.
details:
  realistic_solution: The correct way to calculate average power is to find the total energy consumed
    over the period and divide by the period's duration. The total energy is the sum of the energy used
    in the active state and the energy used in the sleep state.
  common_mistake: The most common mistake is to ignore the energy consumed during the sleep phase. While
    it's orders of magnitude smaller than the active power, it's non-zero and contributes to the total
    energy budget, especially over long periods. Another frequent error is taking a simple, unweighted
    average of the power states, like `(10mW + 10µW)/2`, failing to account for the duration of each state.
  napkin_math: '1. Convert powers to mW: Active = 10 mW, Sleep = 10 µW = 0.01 mW. 2. Calculate total energy
    over 10s cycle: (10 mW * 1 s) + (0.01 mW * 9 s) = 10 mJ + 0.09 mJ = 10.09 mJ. 3. Average Power = Total
    Energy / Total Time = 10.09 mJ / 10 s = 1.009 mW. The average power consumption is roughly 1 mW.'
  options:
  - '~1.0 mW (Mistake: Ignoring sleep power)'
  - '~5.0 mW (Mistake: Unweighted average of power states)'
  - ~1.01 mW
  - '~10.0 mW (Mistake: Ignoring the duty cycle)'
  correct_index: 2
