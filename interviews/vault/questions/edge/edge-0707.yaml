title: Safety-Certified Perception Pipeline
scenario: You're designing the perception system for an autonomous mining truck operating in an open-pit mine. The truck must detect people, vehicles, and cliff edges at 200m range in dust, rain, and darkness. The system must achieve Performance Level d (PLd) per ISO 13849.
question: What sensors, compute, redundancy, and safety architecture would you use for a PLd mining-truck perception pipeline at 200m in dust, rain, and darkness?
details:
  realistic_solution: 'Design a three-channel perception architecture with diverse sensor physics (e.g. radar, thermal, stereo camera) to achieve PLd through Category 3 architecture (redundancy with monitoring).'
  common_mistake: |
    **The Pitfall:** Deploying a standard automotive camera + LiDAR stack.
    **The Rationale:** Candidates map general AV solutions to industrial problems without considering specific environmental hazards.
    **The Consequence:** Dust clouds blind cameras AND LiDAR simultaneously, creating a common-cause failure that violates PLd independence requirements.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Vehicle Speed: 30 km/h (8.33 m/s).
       - Coefficient of friction (μ): ~0.5.
       - Slope (cos θ): ~0.995.
       - System reaction time: 11ms.
       - Required Detection Range: 200m.
    2. **Calculations:**
       - Stopping Distance: v² / (2 * μ * g * cos θ) = (8.33)² / (2 * 0.5 * 9.81 * 0.995) = 7.1m.
       - Reaction Distance: 0.011s * 8.33 m/s = 0.09m.
       - Total Stopping Distance: 7.1m + 0.09m = 7.19m.
       - Safety Margin: 200m - 7.19m = 192.8m.
       - Redundant BOM Cost: Orin AGX ($1200) + TDA4VM ($150) + 4D Radar ($800) + Thermal ($3000) + Stereo ($500) = $5,650.
    3. **Conclusion & Interpretation:**
       - **Result: Safety-Bound.** A highly redundant, multi-modal safety suite provides a 27x stopping margin and costs only 0.28% of a $2M mining truck, satisfying PLd requirements without common-cause failure modes.
  options:
  - "Design a three-channel perception architecture with diverse sensor physics to achieve PLd through Category 3 architecture (redundancy with monitoring)."
  - "The pipeline bottleneck is always the largest model; optimizing smaller models in the pipeline has negligible impact on end-to-end latency."
  - "Use a camera + LiDAR + radar stack like autonomous cars. Mining environments are fundamentally different: dust clouds can blind cameras AND LiDAR simultaneously (a common-cause failure that violates independence requirements)."
  - "Network I/O is the dominant bottleneck; optimizing the model or inference pipeline will have minimal impact on end-to-end latency."
