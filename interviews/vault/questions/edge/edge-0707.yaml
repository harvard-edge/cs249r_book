title: Safety-Certified Perception Pipeline
scenario: You're designing the perception system for an autonomous mining truck operating in an open-pit
  mine (no public roads, but ISO 17757 applies for autonomous mining equipment). The truck must detect
  people, vehicles, and cliff edges at 200m range in dust, rain, and darkness. The system must achieve
  Performance Level d (PLd) per ISO 13849. Design the full perception pipeline — sensors, compute, redundancy,
  and safety architecture — specifying which models run on which hardware and how you achieve the required
  safety integrity.
question: "What sensors, compute, redundancy, and safety architecture would you use for a PLd mining-truck perception pipeline at 200m in dust, rain, and darkness?"
details:
  realistic_solution: Design a three-channel perception architecture with diverse sensor physics to achieve
    PLd through Category 3 architecture (redundancy with monitoring).
  common_mistake: '"Use a camera + LiDAR + radar stack like autonomous cars." Mining environments are
    fundamentally different: dust clouds can blind cameras AND LiDAR simultaneously (a common-cause failure
    that violates independence requirements). The sensor selection must account for mining-specific environmental
    hazards.'
  napkin_math: 'Detection range vs stopping distance: at 30 km/h on 10% grade gravel, stopping distance
    = v²/(2×μ×g×cos θ) = (8.33)²/(2×0.5×9.81×0.995) = 7.1m. Add reaction time (11ms × 8.33 m/s = 0.09m):
    total = 7.2m. Safety margin: 200m detection − 7.2m stopping = 192.8m (27× margin). At 60 km/h: stopping
    = 28.4m + 0.18m = 28.6m. Margin: 171.4m (7× margin). System cost: Orin AGX ($1,200) + TDA4VM safety
    MCU ($150) + 4D radar ($800) + thermal camera ($3,000) + stereo camera ($500) = $5,650. For a $2M
    mining truck, this is 0.28% of vehicle cost.'
  options:
  - Design a three-channel perception architecture with diverse sensor physics to achieve PLd through
    Category 3 architecture (redundancy with monitoring).
  - The pipeline bottleneck is always the largest model; optimizing smaller models in the pipeline has
    negligible impact on end-to-end latency.
  - 'Use a camera + LiDAR + radar stack like autonomous cars.. Mining environments are fundamentally different:
    dust clouds can blind cameras AND LiDAR simultaneously (a common-cause failure that violates independence
    requirements).'
  - Network I/O is the dominant bottleneck; optimizing the model or inference pipeline will have minimal
    impact on end-to-end latency.
