title: Shared Bus Bottleneck in SoC Pipelines
scenario: 'An edge vision system targets 30 FPS. The pipeline runs concurrently: 1) CPU decodes frame (demands 2 GB/s BW), 2) NPU runs Object Detection (demands 5 GB/s BW), 3) GPU runs depth estimation (demands 15 GB/s BW). The CPU, NPU, and GPU share a unified LPDDR4 memory bus with a peak bandwidth of 17 GB/s. The system is currently dropping frames. A junior engineer notes the NPU is at 99% compute utilization and suggests upgrading to an NPU with 2x the TOPS.'
question: "Will upgrading the NPU to 2x TOPS stop the 30 FPS frame drops, and what should be optimized instead?"
details:
  realistic_solution: Upgrading the NPU will not increase the system FPS because the SoC is facing a global memory bandwidth bottleneck, not an isolated compute bottleneck. While the NPU might be fully utilized locally, the CPU, NPU, and GPU are concurrently demanding a total of 22 GB/s from a shared bus that can only provide 17 GB/s. The bus is over-subscribed by 129%, causing severe memory throttling across all components. Upgrading the NPU's compute capacity (TOPS) does nothing to alleviate the bandwidth starvation. You must optimize the memory traffic—specifically the GPU's massive 15 GB/s demand—via quantization, layer fusion, or smaller input resolutions.
  common_mistake: Agreeing to upgrade the NPU because 99% utilization typically implies a compute-bound bottleneck in isolated microbenchmarks.
  napkin_math: |
    **Assumptions & Constraints:**
    - CPU demands 2 GB/s, NPU 5 GB/s, GPU 15 GB/s.
    - Available SoC Bandwidth = 17 GB/s.
    
    **Calculations:**
    - Total Bandwidth Demand = 2 GB/s + 5 GB/s + 15 GB/s = 22 GB/s.
    - Deficit = 22 GB/s - 17 GB/s = 5 GB/s.
    
    **Conclusion & Interpretation:**
    - **Result: 5 GB/s Deficit (Memory-Bound)**. The memory controller stalls requests, making the NPU appear 99% utilized due to memory wait cycles rather than compute saturation.
