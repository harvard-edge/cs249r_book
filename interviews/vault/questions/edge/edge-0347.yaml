title: The INT8 Energy Dividend (edge-0347)
scenario: A perception model for an autonomous vehicle is being quantized from 32-bit floating point (FP32) to 8-bit integer (INT8) to reduce the thermal footprint.
question: What approximate reduction in energy consumption should you expect strictly for the arithmetic operations after quantizing from FP32 to INT8?
details:
  realistic_solution: An FP32 operation consumes approximately 18 times more energy
    than an INT8 operation. Therefore, you should expect an ~18× reduction in energy
    consumption *for the compute portion* of the workload. This is a fundamental ratio
    rooted in the physics of silicon design and is a key driver for quantization on
    power-constrained edge devices.
  common_mistake: |
    **The Pitfall:** Assuming energy savings scale linearly with bit width.
    **The Rationale:** Engineers simply divide 32 bits by 8 bits to guess a 4x improvement.
    **The Consequence:** Drastically underestimating the thermal advantages of removing complex floating-point units (FPUs) in silicon design.
  napkin_math: |
    1. **Linear misconception**: 32 bits / 8 bits = 4x.
    2. **Silicon reality**: An FP32 multiply-accumulate (MAC) uses ~18x the energy of an INT8 MAC.
    3. **Memory bonus**: Fetching FP32 from LPDDR takes 4x the energy of INT8.
    4. **Conclusion**: Quantizing cuts compute energy by ~94% (**18x reduction**), drastically lowering the thermal envelope.
  options:
  - Approximately 4×
  - Approximately 18×
  - Approximately 3.4×
  - It's roughly the same, only memory savings matter
  correct_index: 1
