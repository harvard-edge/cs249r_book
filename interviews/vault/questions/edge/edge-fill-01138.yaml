title: MLOps for INT8 Deployment on Coral Edge TPU
scenario: A machine learning engineering team is preparing to deploy an image recognition model to a fleet
  of Google Coral Edge TPUs, each rated at 4 TOPS INT8 with 2W power consumption, strictly supporting
  INT8-only inference. During the MLOps pipeline's CI/CD stage for edge devices, they are evaluating model
  compatibility. What specific data type characteristic of the Coral Edge TPU's inference capabilities
  *must* be accounted for when preparing the model artifact, and what MLOps best practice ensures this
  constraint is met before deployment?
details:
  realistic_solution: The model artifact must be explicitly prepared in INT8 format, typically as a TensorFlow
    Lite model that has undergone INT8 post-training quantization. A robust MLOps best practice is to
    integrate an automated quantization and validation step directly into the CI/CD pipeline. This step
    should convert the trained FP32 model to INT8 TensorFlow Lite, run comprehensive inference tests on
    a representative dataset using the quantized model, and verify critical performance metrics (e.g.,
    accuracy, latency) against predefined thresholds for INT8 inference. Both the original and quantized
    model versions should be meticulously tracked in a model registry for complete reproducibility, traceability,
    and seamless rollback capabilities.
  common_mistake: A common mistake is attempting to deploy models quantized to data types other than INT8
    (e.g., FP16, FP32) without proper pre-conversion, leading to deployment failures, runtime errors,
    or models running on the CPU instead of the Edge TPU with suboptimal performance. Another pitfall
    is performing quantization as a manual, out-of-band step, introducing inconsistencies and making reproducibility
    difficult.
  napkin_math: Given a Coral Edge TPU with 4 TOPS (Trillions Operations Per Second) at INT8 and a 2W power
    budget, if a single INT8 inference operation takes 1 Giga-Operation (GOPS), the theoretical maximum
    inferences per second would be (4 * 10^12 ops/s) / (1 * 10^9 ops/inference) = 4000 inferences/second.
    This highlights the device's high throughput capability for INT8 operations, and the low power budget
    emphasizes the need for extremely efficient, quantized models to maximize battery life and minimize
    heat generation in edge applications.
