title: Diagnosing Latency Spikes on Qualcomm Cloud AI 100
scenario: You are tasked with optimizing a real-time anomaly detection model deployed on a Qualcomm Cloud
  AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W TDP). During load testing, you observe intermittent
  latency spikes, even though average compute utilization appears to be within limits. Describe the specific
  profiling techniques and tools you would use to identify whether these spikes are primarily due to compute,
  memory, or I/O bottlenecks given the accelerator's specifications.
details:
  realistic_solution: A realistic approach involves using a multi-faceted profiling strategy. Utilize
    Qualcomm's SNPE SDK profiling tools to get on-device kernel-level timings and memory usage. Supplement
    this with system-level tools like 'perf' or 'ftrace' on the host CPU to monitor system calls, context
    switches, and CPU utilization impacting data feeding the AI 100. Analyze the generated flame graphs
    and trace timelines to correlate latency spikes with specific compute kernels, memory operations on
    the 32 GB LPDDR4x, or data transfer phases. Specifically, investigate memory bandwidth utilization
    to confirm if the 75W TDP is being effectively utilized for computation or if it's being limited by
    memory access patterns.
  common_mistake: A common mistake is to focus exclusively on compute utilization (e.g., FLOPS/TOPS) and
    overlook data transfer (I/O) or memory access patterns. On accelerators like the Qualcomm Cloud AI
    100 with high compute density and potentially complex data pipelines, I/O bound operations (e.g.,
    host-to-device transfers over PCIe, or data movement within the LPDDR4x memory) can frequently be
    the root cause of latency variability.
  napkin_math: Given 400 TOPS (INT8), if an inference requires 10 TOPs, the theoretical maximum throughput
    is 40 inferences/second (400/10). If the observed throughput is significantly lower, or if there are
    spikes, it indicates a bottleneck. For example, if a 10 TOPs model also requires 1GB of data movement
    per inference and the LPDDR4x memory bandwidth is 64 GB/s (a hypothetical value for LPDDR4x), then
    data transfer for one inference could take ~15ms (1GB / 64GB/s). If the actual kernel execution is
    only 5ms, the operation is memory-bound, not compute-bound, and profiling needs to focus on optimizing
    data access patterns or reducing data footprint.
