title: 'Model Size Estimation: Fluency — Size Edge Vision Model Memory in 60 Seconds'
scenario: You need to size a YOLOv8-n model (3.2M params, INT8 TensorRT) on a Jetson Orin for a real-time object detection pipeline at 30fps with batch size 1.
question: How much LPDDR5 memory does a YOLOv8-n model (3.2M params, INT8 TensorRT) need for this pipeline?
details:
  realistic_solution: 'Weights: 3.2M × 1 byte = 3.2MB. TensorRT overhead: ×1.3 = 4.2MB. Input tensor: 640×640×3 = 1.2MB (FP32). Peak activations (typically 5-10× weights for YOLO): ~20MB. Output: 84×8400×4B = 2.8MB. Total: ~28MB. At 30fps: need triple buffering for camera pipeline? Add 3×1.2MB = 3.6MB camera buffers. Total: ~32MB of 32GB LPDDR5. Trivially small.'
  common_mistake: |
    **The Pitfall:** Only calculating weight memory and ignoring activations and buffers.
    **The Rationale:** Candidates default to parameter count alone, forgetting that peak activations often dwarf weights in vision models.
    **The Consequence:** Severe underestimation of memory requirements, leading to OOM errors in production.
  napkin_math: |
    - INT8 Weights: 3.2MB.
    - TensorRT overhead (x1.3): ~4.2MB.
    - Input tensor (640x640x3, FP32): ~1.2MB.
    - Activations: ~20MB.
    - Output: ~2.8MB.
    - Camera buffers (triple buffered): 3 * 1.2MB = 3.6MB.
    - Total: 4.2 + 1.2 + 20 + 2.8 + 3.6 = 31.8MB.
    **The entire model and pipeline easily fits within ~32MB of memory.**
