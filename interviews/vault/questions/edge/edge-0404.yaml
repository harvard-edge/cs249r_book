title: The YOLO vs ViT Question
scenario: A researcher on your team wants to replace your YOLOv8-S detector with a ViT-B/16 vision transformer because it scores 2% higher mAP on COCO. You're deploying on a Jetson Orin NX at 30 FPS.
question: Why do you push back against replacing YOLOv8-S with ViT-B/16 on the Jetson Orin NX?
details:
  realistic_solution: 'ViT-B/16 has ~17.6 GFLOPs vs YOLOv8-S''s ~28.4 GFLOPs — fewer FLOPs, yet it runs *slower* on edge GPUs. The reason: attention''s memory access pattern. Self-attention computes Q×K^T (an N×N matrix for N=196 patches at 224×224), which has low arithmetic intensity — it''s a series of small matrix multiplies with large intermediate tensors that must be written to and read from DRAM. Convolutional layers in YOLO have regular, predictable memory access patterns that map efficiently to GPU SRAM tiling and TensorRT optimization. Additionally, ViT''s dynamic shapes (variable sequence length) prevent many TensorRT optimizations (layer fusion, kernel auto-tuning) that assume fixed tensor dimensions. On the Orin NX: YOLOv8-S runs at ~45 FPS with TensorRT INT8. ViT-B runs at ~15 FPS because TensorRT can''t fuse the attention layers effectively.'
  common_mistake: |
    **The Pitfall:** "ViT has more parameters, so it's slower."
    **The Rationale:** Candidates assume parameter count correlates linearly with latency, not realizing that ViT-B actually has fewer FLOPs than some YOLO variants.
    **The Consequence:** Misdiagnosing why transformers are slow on edge devices, missing the critical difference in memory access patterns and Arithmetic Intensity.
  napkin_math: |
    *   YOLOv8-S: 28.4 GFLOPs, ~55 MB memory traffic. AI ≈ 516 Ops/Byte.
    *   ViT-B: 17.6 GFLOPs, ~120 MB memory traffic. AI ≈ 147 Ops/Byte.
    *   Orin NX Ridge Point ≈ 976 Ops/Byte.
    *   Both are memory-bound, but ViT is 3.5x more memory-hungry per FLOP due to attention matrices.
    *   **The 2% mAP gain comes with a 3x FPS penalty because TensorRT cannot fuse dynamic attention layers effectively, crippling the system.**
