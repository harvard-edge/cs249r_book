title: The YOLO vs ViT Question
scenario: A researcher on your team wants to replace your YOLOv8-S detector with a ViT-B/16 vision transformer because it scores 2% higher mAP on COCO. You're deploying on a Jetson Orin NX.
question: Why do you push back against replacing YOLOv8-S with ViT-B/16 on the Jetson Orin NX at 30 FPS?
details:
  realistic_solution: 'ViT-B/16 has ~17.6 GFLOPs vs YOLOv8-S''s ~28.4 GFLOPs — fewer FLOPs, yet it runs *slower* on edge GPUs. The reason: attention''s memory access pattern. Self-attention computes Q×K^T (an N×N matrix for N=196 patches at 224×224), which has low arithmetic intensity — it''s a series of small matrix multiplies with large intermediate tensors that must be written to and read from DRAM. Convolutional layers in YOLO have regular, predictable memory access patterns that map efficiently to GPU SRAM tiling and TensorRT optimization. Additionally, ViT''s dynamic shapes (variable sequence length) prevent many TensorRT optimizations (layer fusion, kernel auto-tuning) that assume fixed tensor dimensions. On the Orin NX: YOLOv8-S runs at ~45 FPS with TensorRT INT8. ViT-B runs at ~15 FPS because TensorRT can''t fuse the attention layers effectively.'
  common_mistake: |
    **The Pitfall:** Assuming parameter count correlates linearly with latency.
    **The Rationale:** Candidates rely on cloud heuristics, failing to account for the low arithmetic intensity and memory access patterns of self-attention on edge devices.
    **The Consequence:** Misdiagnosing why transformers are slow, missing the critical difference in memory I/O, and wasting time on parameter reduction.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - YOLOv8-S: 28.4 GFLOPs, ~55 MB memory traffic.
       - ViT-B: 17.6 GFLOPs, ~120 MB memory traffic.
       - Orin NX Ridge Point ≈ 976 Ops/Byte.
    2. **Calculations:**
       - YOLOv8-S AI ≈ 28.4 * 10^9 / (55 * 10^6) ≈ 516 Ops/Byte.
       - ViT-B AI ≈ 17.6 * 10^9 / (120 * 10^6) ≈ 147 Ops/Byte.
       - ViT is 3.5x more memory-hungry per FLOP due to attention matrices.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** The 2% mAP gain comes with a 3x FPS penalty because TensorRT cannot fuse dynamic attention layers effectively, crippling the system.
