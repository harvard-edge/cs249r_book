title: The YOLO vs ViT Question
scenario: A researcher on your team wants to replace your YOLOv8-S detector with a ViT-B/16 vision transformer
  because it scores 2% higher mAP on COCO. You're deploying on a Jetson Orin NX at 30 FPS. Why do you
  push back?
question: "Why do you push back?"
details:
  realistic_solution: 'ViT-B/16 has ~17.6 GFLOPs vs YOLOv8-S''s ~28.4 GFLOPs — fewer FLOPs, yet it runs
    *slower* on edge GPUs. The reason: attention''s memory access pattern. Self-attention computes Q×K^T
    (an N×N matrix for N=196 patches at 224×224), which has low arithmetic intensity — it''s a series
    of small matrix multiplies with large intermediate tensors that must be written to and read from DRAM.
    Convolutional layers in YOLO have regular, predictable memory access patterns that map efficiently
    to GPU SRAM tiling and TensorRT optimization. Additionally, ViT''s dynamic shapes (variable sequence
    length) prevent many TensorRT optimizations (layer fusion, kernel auto-tuning) that assume fixed tensor
    dimensions. On the Orin NX: YOLOv8-S runs at ~45 FPS with TensorRT INT8. ViT-B runs at ~15 FPS because
    TensorRT can''t fuse the attention layers effectively.'
  common_mistake: '"ViT has more parameters, so it''s slower." ViT-B actually has fewer FLOPs than some
    YOLO variants — the issue is deeper than parameter count.'
  napkin_math: 'YOLOv8-S: 28.4 GFLOPs, ~55 MB memory traffic → arithmetic intensity ≈ 516 Ops/Byte. ViT-B:
    17.6 GFLOPs, ~120 MB memory traffic (attention matrices) → arithmetic intensity ≈ 147 Ops/Byte. On
    Orin NX (ridge ~976 Ops/Byte): both are memory-bound, but ViT is 3.5× more memory-hungry per FLOP.
    The 2% mAP gain costs a 3× FPS penalty.'
