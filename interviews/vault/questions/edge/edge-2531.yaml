title: PCIe Fabric Ring Sched
scenario: A 4x Jetson AGX Orin cluster for multi-camera 3D tracking is connected via
  a PCIe Gen4 x4 switch (8 GB/s). An attention mechanism requires an 8MB AllGather
  per frame.
question: Design an interconnect topology and collective routing scheme to minimize
  tail latency, accounting for the PCIe switch overheads and Orin's LPDDR5 bandwidth
  limits.
details:
  realistic_solution: A logical ring topology must be mapped over the physical PCIe
    switch. Each node transfers (4-1)/4 * 8MB = 6MB. At 8 GB/s, raw transfer takes
    0.75ms. However, setting up peer-to-peer DMA over the switch introduces a synchronization
    barrier. The optimal routing pipelines chunks to overlap the DMA setup delays,
    bounding the latency to 0.75ms plus 3 hops of DMA sync.
  common_mistake: Treating a PCIe switch as a uniform contention-free medium for simultaneous
    all-to-all transfers without considering DMA endpoint setup limits.
  napkin_math: 'Transfer: 6MB / 8GB/s = 0.75ms. DMA sync: 3 hops * 100us = 0.3ms.
    Total = 1.05ms.'
