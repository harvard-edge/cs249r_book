title: The Solar Panel Degradation Budget Squeeze
scenario: Your solar-powered wildlife monitoring station uses a Jetson Orin Nano (7-15W) with a 50W solar
  panel and 200Wh LiFePO4 battery in the Mojave Desert. The system was designed for 24/7 operation with
  6 hours of peak sun. After 3 years, the station starts shutting down at 4 AM and doesn't restart until
  9 AM — a 5-hour daily blackout. The battery tests healthy (92% capacity). Solar panel output has dropped
  from 50W to 38W peak. How does a 24% panel degradation cause a 5-hour blackout, and how do you adapt
  the ML workload?
question: "How does a 24% panel degradation cause a 5-hour blackout, and how do you adapt the ML workload?"
details:
  realistic_solution: 'The power budget is nonlinear. Original design: 50W × 6h × 0.85 (charge efficiency)
    = 255Wh daily solar harvest. System consumption: Orin Nano at 7W mode (15W burst, 2W sleep, 50% duty
    cycle) = 8.5W average + 2W peripherals = 10.5W × 24h = 252Wh/day. Solar: 255Wh. Margin: 3Wh/day (1.2%)
    — razor-thin by design. With 24% panel degradation, harvest is 194Wh. The 58Wh daily deficit depletes
    the battery until it hits a steady-state cycle: it charges 131Wh net during the day, which only sustains
    the 10.5W load for ~12.5 hours after sunset, leading to a shutdown at ~3:30 AM until the sun returns
    at 9 AM.'
  common_mistake: '"Replace the solar panel." This is the eventual fix, but you need to understand why
    24% degradation causes a disproportionate impact and how to keep the system running until replacement.'
  napkin_math: 'Year 0: 50W × 6h × 0.85 = 255Wh solar. Load: 252Wh. Margin: 3Wh. Year 3: 38W × 6h × 0.85
    = 194Wh solar. Deficit: 58Wh/day. Eventually, battery drains to 0 each night. Steady-state daily cycle:
    At sunrise (9 AM), battery is dead. During 6 hours of sun, system uses 63Wh (10.5W × 6h) and harvests
    194Wh. Net charge at sunset (3 PM) = 131Wh. Time to cutoff: 131Wh / 10.5W = 12.5 hours. 3 PM + 12.5h
    = 3:30 AM. System is dead from 3:30 AM to 9 AM (5.5 hours). At 5W mode: 7W × 24h = 168Wh < 194Wh →
    no blackout, 26Wh daily surplus.'
