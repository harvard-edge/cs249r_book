title: The Solar Panel Degradation Budget Squeeze
scenario: Your solar-powered wildlife monitoring station uses a Jetson Orin Nano with a 50W solar panel and 200Wh LiFePO4 battery in the Mojave Desert. The system was designed for 24/7 operation with 6 hours of peak sun. After 3 years, the station starts shutting down at 4 AM and doesn't restart until 9 AM — a 5-hour daily blackout. The battery tests healthy (92% capacity). Solar panel output has dropped from 50W to 38W peak.
question: How does a 24% panel degradation cause a 5-hour blackout, and how do you adapt the ML workload?
details:
  realistic_solution: 'The power budget is nonlinear. Original design: 50W × 6h × 0.85 (charge efficiency) = 255Wh daily solar harvest. System consumption: Orin Nano at 7W mode (15W burst, 2W sleep, 50% duty cycle) = 8.5W average + 2W peripherals = 10.5W × 24h = 252Wh/day. Solar: 255Wh. Margin: 3Wh/day (1.2%) — razor-thin by design. With 24% panel degradation, harvest is 194Wh. The 58Wh daily deficit depletes the battery until it hits a steady-state cycle: it charges 131Wh net during the day, which only sustains the 10.5W load for ~12.5 hours after sunset, leading to a shutdown at ~3:30 AM until the sun returns at 9 AM.'
  common_mistake: |
    **The Pitfall:** Replacing the solar panel without adapting the software payload.
    **The Rationale:** Candidates fail to recognize the non-linear relationship between power degradation and system availability, treating it purely as a hardware maintenance issue.
    **The Consequence:** The system remains offline for 5 hours every night until a physical replacement can be scheduled, missing critical wildlife monitoring data.
  napkin_math: |
    1. Year 0 Solar Harvest = 50W * 6h * 0.85 efficiency = 255Wh/day. Load = 10.5W * 24h = 252Wh/day. Margin = 3Wh.
    2. Year 3 Solar Harvest = 38W * 6h * 0.85 = 194Wh/day. Daily Deficit = 252 - 194 = 58Wh/day.
    3. At sunrise (9 AM), battery is dead. During 6 hours of sun, system uses 63Wh (10.5W * 6h) and harvests 194Wh.
    4. Net charge at sunset (3 PM) = 131Wh.
    5. Time to cutoff = 131Wh / 10.5W = 12.5 hours.
    6. 3 PM + 12.5h = 3:30 AM shutdown.
    7. Dropping ML load to 5W mode reduces 24h draw to 168Wh/day (< 194Wh harvest), yielding a **26Wh daily surplus**.
