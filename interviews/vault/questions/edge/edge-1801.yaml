title: Edge TPU Visual Inspection Data Quality Pipeline
scenario: You are deploying a defect detection model on a factory floor using Google Coral Edge TPU accelerators (4 TOPS INT8, 2W) attached via USB. The camera feeds occasionally suffer from sensor degradation (noise, blur, dropped frames) which causes the INT8-quantized model to produce false positives.
question: How would you design an edge-only data validation gate for noisy Coral Edge TPU camera frames within the 2W INT8 constraints?
details:
  realistic_solution: The optimal design uses lightweight, deterministic checks on the host CPU (e.g., checking frame resolution and basic pixel variance for complete sensor failure) combined with a tiny, INT8-quantized 'blur/noise detector' model compiled specifically for the Coral TPU. The data contract must specify that only frames passing these low-latency checks are passed to the heavier defect detection model, ensuring the TPU's 4 TOPS are reserved for valid data.
  common_mistake: |
    **The Pitfall:** Proposing complex, floating-point anomaly detection models or heavy statistical checks on the host CPU.
    **The Rationale:** Candidates forget that the Coral Edge TPU strictly requires INT8 operations and that burdening the host CPU will exceed the overall power budget.
    **The Consequence:** The host CPU throttles due to thermal limits, or the system exceeds its 2W power budget, leading to hardware instability or failure.
  napkin_math: |
    1. Determine per-frame time budget: 30 FPS camera feed = 33.3ms per frame.
    2. Identify Coral TPU capacity: 4 TOPS (4,000,000 MOPs/sec).
    3. Estimate tiny INT8 quality-gate model compute: 300 MOPs (0.0003 TOPS) per frame.
    4. Calculate gate inference time: 0.0003 TOPS / 4 TOPS = 0.000075 seconds, or 0.075ms.
    **The 0.075ms inference time for the quality gate easily fits within the 33.3ms budget, leaving ~33ms for the main defect detection model while operating within the 2W power constraint.**
