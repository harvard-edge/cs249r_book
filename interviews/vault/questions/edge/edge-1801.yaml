title: Edge TPU Visual Inspection Data Quality Pipeline
scenario: You are deploying a defect detection model on a factory floor using Google Coral Edge TPU accelerators (4 TOPS INT8, 2W) attached via USB. The camera feeds occasionally suffer from severe sensor degradation (noise, blur, dropped frames) which causes the INT8-quantized model to produce false positives.
question: How would you design an edge-only data validation gate for noisy Coral Edge TPU camera frames within the 2W INT8 constraints?
details:
  realistic_solution: 'Implement a dual-stage quality gate. Stage 1: Execute ultra-lightweight, deterministic heuristics on the host CPU (e.g., calculating pixel variance or Laplacian variance for blur detection) optimized with SIMD instructions. Stage 2: For complex noise patterns, compile an extremely small, INT8-quantized ''Quality Assessment'' CNN (e.g., a truncated MobileNet) specifically for the Coral TPU. The primary defect model is only invoked if the frame passes this gate, conserving the 4 TOPS compute capacity and ensuring the 2W power envelope is maintained by keeping the heavy model idle during noisy events.'
  common_mistake: |
    **The Pitfall:** Implementing heavy, floating-point statistical anomaly detection (e.g., PCA, autoencoders) directly on the host ARM CPU.
    **The Rationale:** Candidates fall back to standard data science tools without considering the rigid INT8 requirements of the TPU or the thermal limitations of the edge host.
    **The Consequence:** The host CPU pegs at 100% utilization, exceeding the system's power budget, triggering thermal throttling, and dropping the framerate of the entire pipeline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Framerate: 30 FPS (33.3ms budget per frame).
       - TPU Capacity: 4 TOPS (4,000,000 MegaOps/sec).
       - Quality Gate Model: Tiny INT8 CNN requiring ~300 MegaOps (0.0003 TOPS).
    2. **Calculations:**
       - Gate execution time = 0.0003 TOPS / 4 TOPS = 0.000075 seconds (0.075 ms).
       - Remaining time for main model = 33.3 ms - 0.075 ms = 33.225 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 0.075 ms execution time. The quality gate is completely viable and Compute-Bound on the TPU, easily protecting the main inference pipeline without violating the latency SLA.**
