title: Edge Power Efficiency 101
scenario: You're an engineer on an autonomous vehicle team, tasked with selecting a profile for a new
  perception model running on a Jetson AGX Orin. The device can run in a 15W mode or a 60W mode, both
  delivering a peak of 275 TOPS. To make the most of your limited power budget, what is the primary metric
  you should use to evaluate the *power efficiency* of the compute?
details:
  realistic_solution: The most critical metric is TOPS/W (Throughput per Watt). This ratio tells you how
    much computational performance you get for every watt of power consumed. On a power-constrained device,
    maximizing this efficiency is paramount. A high TOPS/W ratio means you can achieve the required performance
    with less power draw, leading to lower heat generation and longer operational life.
  common_mistake: Engineers often fixate on the advertised peak TOPS (Tera-Operations per Second) of a
    chip, treating it as the ultimate measure of performance. This ignores the reality of thermally constrained
    edge systems where power is the limiting factor. You can't use all the TOPS if you hit your power
    or thermal budget first.
  napkin_math: 'The Jetson AGX Orin shows a classic efficiency trade-off:'
  options:
  - Peak TOPS
  - Memory Bandwidth (GB/s)
  - TOPS/W (Throughput per Watt)
  - PUE (Power Usage Effectiveness)
  correct_index: 2
