title: Jetson Orin Roofline Memory Bound Analysis
scenario: You are profiling a quantized INT8 object detection model deployed on an
  NVIDIA Jetson Orin at the edge. The platform features 32 GB of LPDDR5 memory (providing
  approximately 204 GB/s of bandwidth) and is capable of 275 TOPS for INT8 operations
  using its Ampere GPU and DLA within a 60W TDP. The model has an arithmetic intensity
  of 100 INT8 operations per byte of memory accessed. You observe that the actual
  compute utilization of the hardware is extremely low, barely reaching 7%. Using
  the roofline model, analyze why this deployment fails to fully utilize the Orin's
  compute capacity.
question: Using the roofline model, why does a 100 OP/byte INT8 model reach only about
  7% compute utilization on Jetson Orin?
details:
  realistic_solution: The candidate should apply the roofline model to demonstrate
    that the workload is severely memory-bound. They need to calculate the hardware
    ridge point by dividing the peak compute by the memory bandwidth. Because the
    model's arithmetic intensity is far below this ridge point, the Jetson Orin's
    Ampere GPU and DLA spend most of their time starved for data, meaning performance
    is strictly capped by the 204 GB/s memory bandwidth.
  common_mistake: Candidates often assume that quantizing to INT8 automatically guarantees
    high compute utilization because it unlocks the peak 275 TOPS of the platform.
    They frequently fail to calculate the hardware's ridge point, missing that an
    INT8 model still requires a very high arithmetic intensity to transition from
    being memory-bound to compute-bound.
  napkin_math: Peak Compute = 275 TOPS (275,000 GOPs). Peak Memory Bandwidth = 204
    GB/s. Hardware Ridge Point = 275,000 GOPs / 204 GB/s ≈ 1,348 OPs/byte. The model's
    Arithmetic Intensity is 100 OPs/byte. Since 100 < 1,348, the workload is memory-bound.
    Achievable Performance = Arithmetic Intensity × Memory Bandwidth = 100 OPs/byte
    × 204 GB/s = 20,400 GOPs (20.4 TOPS). Hardware Utilization = 20.4 TOPS / 275 TOPS
    ≈ 7.4%.
