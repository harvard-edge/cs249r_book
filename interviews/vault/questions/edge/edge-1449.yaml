title: Jetson Orin Roofline Memory Bound Analysis
scenario: You are profiling a quantized INT8 object detection model deployed on an NVIDIA Jetson Orin at the edge. The platform features 32 GB of LPDDR5 memory (providing approximately 204 GB/s of bandwidth) and is capable of 275 TOPS for INT8 operations using its Ampere GPU and DLA within a 60W TDP. The model has an arithmetic intensity of 100 INT8 operations per byte of memory accessed. You observe that the actual compute utilization of the hardware is extremely low, barely reaching 7%.
question: Using the roofline model, why does a 100 OP/byte INT8 model reach only about 7% compute utilization on Jetson Orin?
details:
  realistic_solution: The candidate should apply the roofline model to demonstrate that the workload is severely memory-bound. They need to calculate the hardware ridge point by dividing the peak compute by the memory bandwidth. Because the model's arithmetic intensity is far below this ridge point, the Jetson Orin's Ampere GPU and DLA spend most of their time starved for data, meaning performance is strictly capped by the 204 GB/s memory bandwidth.
  common_mistake: |
    **The Pitfall:** Assuming INT8 quantization automatically guarantees high compute utilization.
    **The Rationale:** Candidates see peak 275 TOPS and fail to check if the model's arithmetic intensity crosses the hardware's ridge point.
    **The Consequence:** Misdiagnosing performance limits and wasting time optimizing compute-bound layers when the system is starved for memory bandwidth.
  napkin_math: |
    1. **Peak Compute:** 275 TOPS = 275,000 GOPs.
    2. **Peak Memory Bandwidth:** 204 GB/s.
    3. **Hardware Ridge Point:** `275,000 GOPs / 204 GB/s ≈ 1,348 OPs/byte`.
    4. **Model Arithmetic Intensity:** 100 OPs/byte.
    5. **Analysis:** Since 100 < 1,348, the workload is heavily memory-bound.
    6. **Achievable Performance:** `100 OPs/byte * 204 GB/s = 20,400 GOPs` (20.4 TOPS).
    7. **Hardware Utilization:** `20.4 TOPS / 275 TOPS ≈ 7.4%`.
    **The deployment reaches only ~7.4% compute utilization because it is completely bottlenecked by memory bandwidth.**
