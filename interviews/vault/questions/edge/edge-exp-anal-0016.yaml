title: INT8 Quantization Bias on Cloud AI 100
scenario: You are deploying a fraud detection model on an on-premise Qualcomm Cloud AI 100 accelerator
  (32 GB LPDDR4x, 400 TOPS INT8, 75W). To utilize the peak 400 TOPS INT8 compute, you apply uniform post-training
  quantization using global min/max activation values. Post-deployment, the False Positive Rate for a
  minority subgroup (Group B) increases by 12%, violating equalized odds, while the majority group (Group
  A) sees no degradation. Explain why this specific hardware optimization causes this disparity and analyze
  the tradeoffs of your quantization strategy.
details:
  realistic_solution: 'Uniform INT8 quantization maps the FP32 range into 256 discrete bins based on the
    global distribution, which is dominated by Group A. Group B''s critical features likely occupy a narrow,
    long-tail region of the activation range, resulting in those features being compressed into very few
    INT8 bins. This precision loss destroys Group B''s predictive signal. The tradeoff is throughput vs.
    fairness: using KL-divergence calibration or keeping sensitive layers in FP16 would improve subgroup
    fairness but reduce the effective TOPS and increase power consumption.'
  common_mistake: Candidates often blame the original training data imbalance or general model capacity
    without connecting the failure to the INT8 quantization process. They miss how global uniform quantization
    mathematically destroys signal for distributions that do not span the majority variance.
  napkin_math: Assume an activation layer has a global FP32 range of [0.0, 10.0]. Uniform INT8 quantization
    yields a step size of 10.0 / 255 = 0.039 per bin. If Group A's features span [1.0, 9.0], they utilize
    8.0 / 0.039 = 205 bins. If Group B's features are in a narrow tail [0.0, 0.5], they are compressed
    into just 0.5 / 0.039 = 12 bins (4.7% of the representational capacity of the Qualcomm Cloud AI 100's
    INT8 ALU). This 17x disparity in bin allocation directly causes the equalized odds violation.
