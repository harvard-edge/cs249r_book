title: Edge Ethernet Transfer Latency
scenario: Two edge accelerator boards communicate via a direct 1 Gbps Ethernet link. They must exchange exactly 10MB of intermediate model embeddings every second.
question: Calculate the transfer latency per frame and determine if the 1 Gbps link is sufficient.
visual:
  kind: svg
  path: edge-2301.svg
  alt: Simple point to point diagram showing two Orins connected by an Ethernet link.
  caption: Orin Ethernet Link
details:
  realistic_solution: A 1 Gbps link provides a theoretical maximum bandwidth of 125 MB/s. Transferring 10MB takes 80 milliseconds. Since 10MB is exchanged once per second, an 80ms transfer easily fits within the 1000ms window. The link is highly sufficient.
  common_mistake: |
    **The Pitfall:** Confusing bits and bytes in network speeds.
    **The Rationale:** Candidates mix up Gigabits (Gbps) and Gigabytes (GBps), dividing by 1000 MB/s instead of 125 MB/s.
    **The Consequence:** Incorrectly calculating the transfer time as 10ms instead of 80ms, leading to drastically under-provisioned network infrastructure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Link: 1 Gbps Ethernet.
       - Payload: 10MB per second.
    2. **Calculations:**
       - Bandwidth Conversion: 1 Gbps = 1000 Mbps.
       - Byte Conversion: 1000 Mbps / 8 = 125 MB/s available bandwidth.
       - Transfer Time: 10 MB / 125 MB/s = 0.08 seconds (80 ms).
    3. **Conclusion & Interpretation:**
       - **Result: Sufficient Bandwidth**. An 80ms transfer easily fits within the 1000ms (1 second) window, confirming the link is highly sufficient.
