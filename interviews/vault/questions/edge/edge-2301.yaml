title: Edge Ethernet Transfer Latency
scenario: Two Jetson AGX Orin boards communicate via a direct 1 Gbps Ethernet link.
  They must exchange exactly 10MB of intermediate model embeddings every second.
question: Calculate the transfer latency per frame and determine if the 1 Gbps link
  is sufficient.
visual:
  kind: svg
  path: edge-2301.svg
  alt: Simple point to point diagram showing two Orins connected by an Ethernet link.
  caption: Orin Ethernet Link
details:
  realistic_solution: A 1 Gbps (Gigabit per second) link provides a theoretical maximum
    of 1000 Megabits / 8 = 125 MB/s. Transferring 10MB takes 10 / 125 = 0.08 seconds
    (80 milliseconds). Since 10MB is exchanged once per second, an 80ms transfer easily
    fits within the 1000ms window. The link is highly sufficient.
  common_mistake: Mixing up Gigabits (Gbps) and Gigabytes (GBps), leading to an incorrect
    divisor of 1000 MB/s instead of 125 MB/s.
  napkin_math: 10 MB / (1000/8 MB/s) = 0.08s
