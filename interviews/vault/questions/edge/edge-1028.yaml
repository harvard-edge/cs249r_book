title: Recalling Key Constraints of Coral Edge TPU for Compound Pipelines
scenario: A developer wants to deploy the retrieval stage of a RAG pipeline (a cross-encoder reranker) on the Coral Edge TPU. The reranker is a 22M parameter BERT-tiny model.
question: What are the fundamental hardware constraints of the Coral Edge TPU that determine whether this deployment is feasible?
details:
  realistic_solution: 'Coral Edge TPU constraints: (1) On-chip SRAM is strictly 8MB. Models > 8MB must stream parameters from host over USB/PCIe, destroying throughput. (2) Quantization must be full-integer INT8. For a 22MB BERT-tiny, execution will be severely bottlenecked by host I/O. Use a smaller distilled model (e.g., 6MB) that fits entirely in SRAM.'
  common_mistake: |
    **The Pitfall:** Assuming any INT8-quantized model can run efficiently on the Coral TPU.
    **The Rationale:** Developers ignore the hard 8MB SRAM constraint and assume parameter paging is as fast as cloud GPUs.
    **The Consequence:** The model compiles but runs 60-80% slower than expected due to constant PCIe/USB weight streaming overhead.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Coral SRAM: 8MB
       - BERT-tiny INT8 size: 22M params * 1 byte = 22MB
       - USB 3.0 effective bandwidth: ~400 MB/s
    2. **Calculations:**
       - Overflow to stream: 22 MB - 8 MB = 14 MB
       - Streaming time per inference: 14 MB / 400 MB/s = 35 ms
       - In-SRAM inference time: ~5 ms
       - Effective latency: 5 ms + 35 ms = 40 ms
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound (Streaming Penalty).** Weight streaming adds a 35ms penalty, reducing throughput to 12.5% of its peak.
