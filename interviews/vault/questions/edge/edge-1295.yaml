title: 'Diagnosing Latency Spikes in Dynamic Batching on Edge Accelerators'
scenario: 'You have deployed an INT8 computer vision model on an on-premise Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS, 75W) to process variable edge camera streams. Initially, a static batching policy (BS=4) yields a steady 15ms latency. To handle traffic spikes, you enable dynamic batching with a max batch size of 16 and a timeout of 10ms. However, during periods of moderate traffic (e.g., 600 requests/sec), you observe latency spiking to over 30ms and effective throughput dropping to 300 req/sec, despite the hardware''s 400 TOPS capacity.'
question: 'Why does dynamic batching with max batch 16 and 10ms timeout cause 30ms latency and only 300 req/sec at 600 req/sec traffic?'
details:
  realistic_solution: 'The root cause is execution graph padding due to uncompiled batch sizes. The Qualcomm Cloud AI 100 relies on ahead-of-time compiled graphs for specific tensor shapes to fully utilize its 400 TOPS INT8 engines. When dynamic batching accumulates an irregular number of requests before the timeout, the runtime pads the batch to the next compiled shape (e.g., max BS=16). This wastes LPDDR4x memory bandwidth and compute cycles on dummy data, dropping effective throughput.'
  common_mistake: |
    **The Pitfall:** Assuming the 10ms timeout is too long or that the hardware is thermal throttling.
    **The Rationale:** Candidates lack knowledge of ahead-of-time (AOT) compiled graph behaviors for specific tensor shapes.
    **The Consequence:** They suggest incorrect configuration changes instead of addressing the fundamental issue of shape padding.
  napkin_math: |
    - Traffic rate: 600 req/sec (1.66ms inter-arrival time).
    - Requests accumulated in 10ms timeout: 6 requests.
    - Padding: Runtime pads batch size 6 to compiled batch size **16**.
    - Compute time for BS=16: 20ms.
    - Total latency: 10ms (wait) + 20ms (compute) = **30ms**.
    - Effective throughput: 6 valid requests / 20ms = **300 req/sec**.
