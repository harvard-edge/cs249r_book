title: 'The Autonomous Driving Frame Drop: Real-Time Deadlines'
scenario: You are an ML systems engineer on an autonomous vehicle team, tasked with deploying a new object detection model on an NVIDIA Jetson AGX Orin. This platform has a hard real-time deadline of 33ms per frame (30 FPS). Your new model requires 5 Trillion INT8 Operations (5 TOPS) and moves 20 GB of data (weights and activations) per inference. The profiler shows the GPU is at 100% utilization, but you are only achieving 10 FPS.
question: Using the Roofline Model, what bottleneck explains 10 FPS and 100% GPU utilization for the 5 trillion-op, 20 GB model on Orin?
details:
  realistic_solution: The system is memory-bound. The correct approach is to calculate the model's arithmetic intensity and compare it to the hardware's ridge point. The Jetson Orin's memory bandwidth is the bottleneck, not its peak compute capacity. The GPU is 'starving' because data cannot be fed to it fast enough from DRAM to keep the compute units busy. To fix this, the team needs to reduce the memory footprint through techniques like model pruning, operator fusion, or architectural changes that increase data reuse, thereby increasing arithmetic intensity.
  common_mistake: |
    **The Pitfall:** Assuming 100% GPU utilization means the system is compute-bound.
    **The Rationale:** Seeing high TOPS and a maxed-out GPU leads engineers to believe arithmetic units are the limit, ignoring that the GPU might be "active" but stalled waiting for memory.
    **The Consequence:** Wasting time trying to reduce FLOPs when the true solution requires reducing memory bandwidth pressure.
  napkin_math: |
    - Arithmetic Intensity = 5 TOPS / 20 GB = 5,000,000 / 20,000 = 250 Ops/Byte.
    - Orin Hardware Ridge = 275 TOPS / 204.8 GB/s = 1342 Ops/Byte.
    - **Result: Since AI (250) < Ridge (1342), the model is severely memory-bound.**
  options:
  - The model is compute-bound; 100% GPU utilization proves the 5 TOPS workload is too high for the Orin's 275 TOPS capacity.
  - The Jetson Orin is thermally throttling due to excessive power draw, which is lowering its effective TOPS.
  - The model is memory-bound; its arithmetic intensity of 250 Ops/Byte is too low to saturate the GPU's compute units.
  - The MIPI CSI-2 camera interface doesn't have enough bandwidth to supply frames to the model quickly enough.
  correct_index: 2
