title: 'The Autonomous Driving Frame Drop: Real-Time Deadlines'
scenario: You are an ML systems engineer on an autonomous vehicle team, tasked with deploying a new object
  detection model on an NVIDIA Jetson AGX Orin. This platform has a hard real-time deadline of 33ms per
  frame (30 FPS). Your new model requires 5 Trillion INT8 Operations (5 TOPS) and moves 20 GB of data
  (weights and activations) per inference. The profiler shows the GPU is at 100% utilization, but you
  are only achieving 10 FPS. Using the Roofline Model, diagnose the most likely performance bottleneck.
question: "Using the Roofline Model, what bottleneck explains 10 FPS and 100% GPU utilization for the 5 trillion-op, 20 GB model on Orin?"
details:
  realistic_solution: The system is memory-bound. The correct approach is to calculate the model's arithmetic
    intensity and compare it to the hardware's ridge point. The Jetson Orin's memory bandwidth is the
    bottleneck, not its peak compute capacity. The GPU is 'starving' because data cannot be fed to it
    fast enough from DRAM to keep the compute units busy. To fix this, the team needs to reduce the memory
    footprint through techniques like model pruning, operator fusion, or architectural changes that increase
    data reuse, thereby increasing arithmetic intensity.
  common_mistake: Engineers often assume 100% GPU utilization means the system is compute-bound. They
    see a high TOPS number and believe the GPU's arithmetic units are the limiting factor. This ignores
    that the GPU can be 100% 'active' while the compute cores are stalled, waiting for data from the much
    slower system memory. They fail to analyze the ratio of compute to memory access (arithmetic intensity).
  napkin_math: 1. **Calculate the model's Arithmetic Intensity (AI):**
  options:
  - The model is compute-bound; 100% GPU utilization proves the 5 TOPS workload is too high for the Orin's
    275 TOPS capacity.
  - The Jetson Orin is thermally throttling due to excessive power draw, which is lowering its effective
    TOPS.
  - The model is memory-bound; its arithmetic intensity of 250 Ops/Byte is too low to saturate the GPU's
    compute units.
  - The MIPI CSI-2 camera interface doesn't have enough bandwidth to supply frames to the model quickly
    enough.
  correct_index: 2
