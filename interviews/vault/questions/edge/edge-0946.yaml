title: Edge New 0007
scenario: A keyword spotting model (100K params) runs on Cortex-M4. FP32 requires 400KB Flash, while INT8 requires 100KB. However, lacking native 8-bit dot product instructions, unpacking INT8 to INT32 adds 4 CPU cycles per weight.
question: Is INT8 still faster than FP32 on the Cortex-M4 despite 4 extra unpack cycles per weight?
details:
  realistic_solution: Flash memory on standard microcontrollers is accessed over relatively slow buses. While unpacking costs 4 extra CPU cycles per parameter, fetching 4x less data from Flash massively outweighs the CPU overhead. The spatial tradeoff also enables the model to fit directly into the 256KB SRAM, completely eliminating Flash read stalls. INT8 is superior despite the lack of native SIMD instructions.
  common_mistake: |
    **The Pitfall:** Refusing to quantize on simple MCUs because they lack specialized AI accelerators or SIMD.
    **The Rationale:** Engineers often focus solely on compute cycle counts and ignore the massive latency difference between memory tiers (Flash vs SRAM).
    **The Consequence:** Missing the opportunity to completely eliminate slow Flash reads, resulting in a much slower FP32 implementation.
  napkin_math: |
    1. Flash read latency: ~10 cycles/byte.
    2. FP32 execution (Flash read bound): 400KB * 10 cycles = 4,000,000 cycles.
    3. INT8 unpacking overhead: 100K params * 4 cycles = 400,000 cycles.
    4. SRAM read latency: 1 cycle/byte.
    5. INT8 total execution: 400K (unpack) + 100K (SRAM read) = 500,000 cycles.
    6. Speedup: 4M / 500K = **8x faster**.
