title: Edge New 0007
scenario: A keyword spotting model (100K params) runs on Cortex-M4. FP32 requires 400KB Flash, while INT8
  requires 100KB. However, lacking native 8-bit dot product instructions, unpacking INT8 to INT32 adds
  4 CPU cycles per weight. Analyze the latency tradeoff.
question: "Is INT8 still faster than FP32 on the Cortex-M4 despite 4 extra unpack cycles per weight?"
details:
  realistic_solution: Flash memory on standard microcontrollers is accessed over relatively slow buses.
    While unpacking costs 4 extra CPU cycles per parameter, fetching 4x less data from Flash massively
    outweighs the CPU overhead. The spatial tradeoff also enables the model to fit directly into the 256KB
    SRAM, completely eliminating Flash read stalls. INT8 is superior despite the lack of native SIMD instructions.
  common_mistake: Refusing to quantize on simple MCUs because they lack specialized AI accelerators or
    SIMD, missing the massive memory bus latency savings.
  napkin_math: 'Flash read is ~10 cycles/byte. FP32: 400KB * 10 cycles = 4M cycles. INT8 unpacking: 100K
    params * 4 cycles = 400K cycles + SRAM read (1 cycle) = 500K cycles. 500K is 8x faster than 4M cycles.'
