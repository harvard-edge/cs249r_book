title: 'MLOps Lifecycle: Diagnose Edge Fleet Model Drift and Quantify Retraining Trigger'
scenario: 500 Jetson Orin devices in a retail chain run a customer count model. After 3 months, the model's mAP (measured via weekly manual spot-checks on 10 devices) degrades from 0.87 to 0.79.
question: What likely caused the customer-count mAP drop from 0.87 to 0.79, and what quantitative monitoring and retraining trigger would catch it earlier?
details:
  realistic_solution: 'Root causes: physical data drift (seasonal clothing changes, camera lens dirt, or firmware updates altering JPEG compression). Monitoring: log per-device average detection confidence daily. Set a drift alert if the 7-day rolling average confidence drops > 5% from baseline, catching the degradation weeks before manual spot-checks.'
  common_mistake: |
    **The Pitfall:** Immediately blaming "model drift" and triggering expensive cloud retraining pipelines without investigating physical data drift.
    **The Rationale:** In purely digital domains, drift is algorithmic. In edge computer vision, drift is almost always physical.
    **The Consequence:** The team wastes time retraining the model when the actual issue is a dirty camera lens or seasonal clothing changes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 500 devices, logging 1000 detections/day.
       - Confidence proxy: 4 bytes per detection.
    2. **Calculations:**
       - Monitoring Overhead: 500 * 1000 * 4 bytes = 2,000,000 bytes = 2 MB/day of network traffic.
       - Leading Indicator: A 9% drop in mAP usually correlates with a 5-8% confidence drop 2-3 weeks prior.
    3. **Conclusion & Interpretation:**
       - **Result: A 5% confidence alert threshold flags degradation early with negligible 2 MB/day network overhead. (Network-Bandwidth-Bound)**
