title: 'MLOps Lifecycle: Diagnose Edge Fleet Model Drift and Quantify Retraining Trigger'
scenario: 500 Jetson Orin devices in a retail chain run a customer count model. After 3 months, the model's mAP (measured via weekly manual spot-checks on 10 devices) degrades from 0.87 to 0.79.
question: What likely caused the customer-count mAP drop from 0.87 to 0.79, and what quantitative monitoring and retraining trigger would catch it earlier?
details:
  realistic_solution: 'Root causes: (1) seasonal clothing changes (summer→fall) cause appearance distribution shift — most likely. (2) Camera lens dirt accumulation: 3-month indoor cameras degrade ~10% brightness. (3) Firmware update changed JPEG compression → different pixel distributions. Monitoring: embed a confidence score proxy monitor — log per-device average detection confidence daily. Drift alert: if 7-day rolling avg confidence drops > 8% from baseline → trigger review. Retraining: if mAP proxy < 0.83 (5% threshold) on validation set of 1000 synthetic examples.'
  common_mistake: |
    **The Pitfall:** Immediately blaming "model drift" and triggering expensive cloud retraining pipelines without investigating physical data drift.
    **The Rationale:** In purely digital domains, drift is often algorithmic. In edge computer vision, drift is almost always physical.
    **The Consequence:** The team wastes time retraining the model when the actual issue might be a dirty camera lens, seasonal clothing changes, or a firmware update that altered JPEG compression.
  napkin_math: |
    1. **Monitoring Overhead:** Logging average detection confidence (4 bytes) for 1000 detections/day across 500 devices generates only 2 MB/day of network traffic.
    2. **Leading Indicator:** At an mAP of 0.79 (a 9% drop), the confidence proxy typically shows a 6-8% drop 2-3 weeks prior.
    3. **Result:** Setting an alert threshold at a **5% confidence drop** flags the issue at week 10, allowing the team to investigate and intervene well before mAP hits 0.79.
