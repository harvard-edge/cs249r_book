title: The Drone Fleet Vision Upgrade
scenario: 'You are the lead ML Systems Engineer for a company that operates a fleet of thousands of autonomous
  drones for agricultural monitoring. The current drones use a highly optimized CNN-based model on a Jetson
  AGX Orin to detect crop diseases, operating under a strict 30W power budget to maximize flight time.
  A new Vision Transformer (ViT) model promises a 15% accuracy improvement, which could save millions
  in crop losses. However, early prototyping shows the ViT model, despite having a similar parameter count
  to the CNN, runs 5x slower and pushes the Orin to its 60W maximum power profile, making it a non-starter.
  Your VP of Engineering wants a definitive proposal: can we leverage the power of Transformers without
  buying a new fleet of drones? Formulate your architectural plan. What are your first three design decisions,
  and how do you justify them quantitatively?'
details:
  realistic_solution: The core issue is the mismatch between the ViT's computational pattern and the edge
    hardware's strengths. The self-attention mechanism's memory access is scattered and has low arithmetic
    intensity, leading to memory bandwidth bottlenecks. This contrasts with CNNs, whose dense, localized
    computations keep the Tensor Cores fed efficiently. A full ViT is infeasible.
  common_mistake: Focusing only on parameter count or FLOPs. Engineers might assume that since the models
    have similar GFLOPs, the performance should be similar. They might also suggest naive quantization
    or pruning, which helps, but doesn't address the fundamental architectural mismatch between Transformers
    and current-gen edge GPUs.
  napkin_math: Orin's INT8 Ridge Point is 275 TOPS / 204.8 GB/s = 1342 Ops/Byte. A standard ResNet has
    AI ~2000 (compute-bound). A naive ViT's self-attention has poor AI. For sequence length 1024 and head
    dim 64, attention scores read/write N^2 matrices. Reading a 1MB attention matrix for just 2M FLOPs
    gives AI = 2. It becomes memory-bound. Compute takes 2M/275T, but memory takes 1MB/204.8GB/s = 4.8us.
