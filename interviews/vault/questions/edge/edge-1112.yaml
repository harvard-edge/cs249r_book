title: 'Edge Queueing Theory Fluency: M/M/1 Metrics at Critical Utilization'
scenario: 'A Hailo-8 (26 TOPS INT8, 2.5W) is running vehicle detection (10 GOPS/frame) at an initial arrival rate of λ=182 inf/s (ρ=0.07).'
question: 'What are Wq, W, and P99 for Hailo-8 vehicle detection at 70%, 90%, and 99% utilization, and where is the latency knee?'
details:
  realistic_solution: 'Hailo-8: μ = 26000/10 = 2600 inf/s. At λ=182: ρ=0.07. For the exercise, fix μ and vary λ. At ρ=0.7: λ=1820, Wq=0.7/(2600*0.3)=0.9ms, W=1.28ms, P99=5.9ms. At ρ=0.9: λ=2340, Wq=0.9/(2600*0.1)=3.46ms, W=3.85ms, P99=17.7ms. At ρ=0.99: λ=2574, Wq=0.99/(2600*0.01)=38.1ms, W=38.5ms, P99=177ms. Knee of curve: between ρ=0.8 and ρ=0.9 where Wq grows 4-5x. Design target: ρ ≤ 0.7.'
  common_mistake: |
    **The Pitfall:** Not recognizing the non-linear relationship between utilization and latency in queueing systems.
    **The Rationale:** Engineers often assume a linear degradation in performance as utilization increases.
    **The Consequence:** Systems are provisioned into the "danger zone" (above 80% utilization) where M/M/1 latency grows hyperbolically, causing missed real-time deadlines.
  napkin_math: |
    * Service rate (μ) = 26000 GOPS / 10 GOPS/frame = 2600 inf/s.
    * At ρ=0.7 (λ=1820): Wq = 0.70 / (2600 - 1820) = 0.898 ms, W = 1.28 ms, P99 = 5.9 ms.
    * At ρ=0.9 (λ=2340): Wq = 0.90 / (2600 - 2340) = 3.46 ms, W = 3.85 ms, P99 = 17.7 ms.
    * At ρ=0.99 (λ=2574): Wq = 0.99 / (2600 - 2574) = 38.1 ms, W = 38.5 ms, P99 = 177 ms.
    * Ratios (Wq): ρ0.9/ρ0.7 = 3.85x, ρ0.99/ρ0.9 = 11x.
    * **The 3.85x jump from 0.7 to 0.9 (adding 20pp utilization) vs the 11x jump from 0.9 to 0.99 shows hyperbolic growth.**
