math_issues:
- 'Unit error: ''5M params x 2 = 10 GFLOPS''. 5 million x 2 is 10 MFLOPS (Mega), not Giga. The subsequent
  division (10G/137.5T = 0.073ms) incorrectly uses the Giga assumption, making the result off by a factor
  of 1000.'
