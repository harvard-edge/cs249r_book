title: Analyzing when torch.compile helps vs hurts on Jetson Orin
scenario: You apply torch.compile to a 5M parameter model for inference on Jetson Orin. TorchInductor
  compilation takes 45 seconds on first call. After compilation, inference is actually 2ms slower per
  step than eager mode (12ms vs 10ms). This is unexpected since torch.compile typically speeds up larger
  models.
question: "For a 5M-parameter inference model, what is the correct FLOP estimate and why is 10 GFLOPs a unit error?"
details:
  realistic_solution: '5M params × 2 = 10 MFLOPs (not 10 GFLOPs — GFLOPs would require 5B params). Inference
    time = 10M / 275T = 36 nanoseconds. Unit error: M (million) ≠ G (billion).'
  common_mistake: Assuming torch.compile always improves performance regardless of model size or hardware.
    On small models with short compute kernels, the overhead of launching compiled Triton kernels can
    exceed the benefit of fusion, especially on hardware like Orin where the GPU is not as deeply pipelined
    as H100.
  napkin_math: 'Model: 5M parameters. FLOPs for inference: 5M × 2 = 10M FLOPs = 10 MFLOPs (not 10 GFLOPs
    — 10 GFLOPs would require 5B parameters, 1000× more). Inference time at 275 TOPS: 10M / 275T = 10×10^6
    / 275×10^12 = 3.6×10^-8 s = 36ns = 0.036μs (extremely fast — this is a tiny model).'
