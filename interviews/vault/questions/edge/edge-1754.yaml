title: Sizing Telemetry for Coral Edge TPU Fleet
scenario: 5,000 traffic monitoring nodes equipped with Google Coral Edge TPUs are deployed. Each node is limited to a 50 Kbps cellular uplink. You must design a telemetry system to detect stragglers and hardware degradation (thermal throttling, USB drops) to achieve a 15-minute MTTR.
question: What telemetry architecture, metrics, cadence, and central ingestion sizing would you use for 5,000 nodes over 50 Kbps links?
details:
  realistic_solution: Implement a local agent that aggregates metrics over a 1-minute window, calculating P99 latency, average TPU temperature, power draw, and USB error counts. Send a compressed heartbeat containing these aggregated metrics.
  common_mistake: |
    **The Pitfall:** Streaming raw metrics or full application logs to the cloud.
    **The Rationale:** Candidates default to standard cloud-native observability patterns (like continuous tracing) without respecting the severe 50 Kbps uplink constraint.
    **The Consequence:** Telemetry data completely saturates the cellular link, interfering with critical operations and incurring massive data overage fees.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet size: 5,000 nodes.
       - Uplink limit per node: 50 Kbps.
       - Payload: 10 aggregated metrics per minute (4 bytes each).
    2. **Calculations:**
       - Payload Size: 10 * 4 bytes = 40 bytes/minute.
       - Node Bandwidth Usage: (40 bytes * 8 bits/byte) / 60 seconds = 5.3 bps.
       - Central Ingestion Load: 5,000 nodes * 5.3 bps = 26.5 Kbps.
    3. **Conclusion & Interpretation:**
       - **Result: 26.5 Kbps central ingestion load, ~0.01% node uplink utilization (Network-Feasible).**
