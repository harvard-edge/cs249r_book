title: LoRa Mesh Gossip Protocol
scenario: 10 micro-satellites orchestrate a 50 KB federated update using LoRa. The
  mesh network suffers a 500ms propagation delay per hop and 10% packet drop rate.
question: Create a collective topology that minimizes synchronous barrier stalls under
  this high-latency, lossy environment.
details:
  realistic_solution: Implement an Epidemic (Gossip) broadcast topology instead of
    a Ring. A Ring AllReduce requires O(N) sequential successful hops; a 10% drop
    rate guarantees a broken ring and massive 5-second retransmission stalls. Gossip
    randomly pairs nodes to exchange differences asymptomatically, using more bandwidth
    but entirely eliminating global sync barriers.
  common_mistake: Specifying a standard Ring or Tree topology, which mathematically
    forces a catastrophic global synchronization failure every time a single LoRa
    packet drops.
  napkin_math: Ring success probability per cycle = (0.9)^10 = ~34.8%. Gossip avoids
    the 10 * 500ms = 5s synchronous deadlock.
