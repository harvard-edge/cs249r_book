title: Designing a Graceful Degradation Strategy for Real-time ML on NVIDIA Jetson Orin
scenario: 'You are tasked with deploying a critical real-time object detection system on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W) for autonomous vehicle perception. The system must maintain responsiveness even under unexpected load spikes, sensor failures, or environmental interference, which can reduce available compute or introduce noisy data.'
question: How would you design fail-operational graceful degradation on Jetson Orin using model fallbacks, degradation ladders, and QoS shedding under load or sensor faults?
details:
  realistic_solution: 'A realistic solution involves defining multiple operational modes or ''degradation rungs.'' For example, a primary high-accuracy model runs when resources are abundant. If compute drops due to thermal throttling or increased sensor input, the system dynamically switches to a smaller, faster model (e.g., MobileNet SSD), reduces frame rate, or only processes regions of interest. Furthermore, implement explicit fail-safe states for critical components (e.g., revert to a simpler rule-based collision avoidance). QoS shedding involves prioritizing detection of critical objects over background details if the system is under duress.'
  common_mistake: |
    **The Pitfall:** Over-reliance on a single, monolithic high-fidelity model.
    **The Rationale:** Candidates plan for ideal conditions and assume the hardware will never throttle.
    **The Consequence:** The system becomes brittle and catastrophically fails during thermal events or load spikes, severely violating safety SLAs.
  napkin_math: |
    *   **High-fidelity model:** T_inf = 50ms. Peak FPS = 20 FPS.
    *   **Low-fidelity fallback:** T_inf = 10ms. Peak FPS = 100 FPS.
    *   **Degradation Threshold:** If system latency exceeds the 100ms critical budget, explicitly drop to the low-fidelity model.
    *   **Result:** **Dynamic switching guarantees the latency SLA is met even when available TOPS drop significantly.**
