title: NPU Fallback via Dynamic Shapes
scenario: A vision model is deployed on an edge NPU. Inference latency is consistently 12ms for 224x224 inputs. When the camera switches to a 256x256 resolution stream, latency suddenly spikes to 180ms per frame. Profiling shows 100% CPU usage during these spikes.
question: Why does latency jump from 12ms at 224x224 to 180ms with 100% CPU at 256x256 inputs?
details:
  realistic_solution: 'The root cause is a graph capture and framework dispatch failure. The model was compiled using an Ahead-of-Time (AOT) graph capture mode that assumed static shapes (224x224). When the dynamic shape (256x256) arrives, the framework dispatcher fails to match the compiled NPU engine''s signature, triggering a fallback to unoptimized, eager execution on the edge CPU.'
  common_mistake: |
    **The Pitfall:** Assuming the latency spike is due to NPU compute scaling linearly with pixels.
    **The Rationale:** Candidates calculate the pixel increase and wrongly attribute the massive overhead to memory bandwidth or NPU scaling limits.
    **The Consequence:** Extensive and useless tuning of NPU memory bandwidth while ignoring the compiler static-shape mismatch.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU Latency at 224x224: 12ms.
       - CPU Fallback overhead: Eager execution + recompilation dispatch.
    2. **Calculations:**
       - Expected NPU Latency at 256x256 = (256*256) / (224*224) * 12ms = 15.6ms.
       - Observed Latency: 180ms.
       - CPU Fallback Breakdown: ~150ms eager compute + 18ms dispatch overhead + 12ms NPU failure timeout = 180ms.
    3. **Conclusion & Interpretation:**
       - **Result: CPU Fallback Overhead**. The jump to 180ms is physically impossible on the NPU (which should take ~15.6ms). The 100% CPU utilization confirms an AOT compilation signature mismatch forced eager CPU execution.
