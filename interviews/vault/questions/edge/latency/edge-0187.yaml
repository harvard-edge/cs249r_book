title: 'The Real-Time Deadline Violation'
scenario: 'You are working on the perception system for an autonomous vehicle, which has a hard real-time deadline of 33ms (30 FPS) to process each camera frame. Your model currently runs on a Jetson AGX Orin and takes 20ms for inference with a batch size of 1. To improve overall throughput, a teammate suggests doubling the batch size to 2. Assuming the inference time scales linearly with batch size, explain what happens.'
question: 'If batch size doubles to 2 and inference scales linearly from 20ms, can the system still meet the 33ms frame deadline?'
details:
  realistic_solution: 'Increasing the batch size to 2 will cause the system to miss its 33ms deadline. The inference time for the batch will become 40ms. Even though average throughput increases, the system must wait 40ms before outputting the first frame.'
  common_mistake: 'Confusing throughput with latency. Engineers often focus on the average number of frames processed per second (throughput) and forget that for a real-time system, the latency is the critical metric that cannot be violated.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Deadline: 33ms.
    - Batch size 1 latency: 20ms.

    **Calculations:**
    - Batch size 2 latency: 20ms/frame * 2 frames = 40ms.
    - Difference: 40ms > 33ms deadline.

    **Conclusion & Interpretation:**
    - **Result: 40ms latency (Latency-Bound)**. Higher throughput is irrelevant if the increased latency violates hard real-time deadlines.
  options:
    - 'The system becomes more efficient because average throughput increases.'
    - 'The system violates its deadline because the batch processing time exceeds the per-frame budget.'
    - 'The system is fine because the average processing time per frame is still 20ms.'
    - 'The deadline is missed, but it is okay because the GPU is more utilized.'
  correct_index: 1
