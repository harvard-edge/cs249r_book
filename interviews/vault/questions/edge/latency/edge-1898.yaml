validation_issues:
  - The 'Napkin Math' section implies 1 INT8 operation = 2 ops, leading to 200 Tera MACs. It should clarify that 1 MAC is often considered 2 operations (multiply and add) when converting from TOPS to MACs, but TOPS is already a measure of operations, so 400 TOPS INT8 is 400x10^12 INT8 operations/second.
  - The 'Napkin Math' section is incomplete, with the last sentence cut off.
  - Reasoning Competency, Knowledge Area, and Mode are missing for an L4 question.
