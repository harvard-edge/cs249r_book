title: 'Latency Decomposition: Size E2E Latency for Smart Camera on Jetson Orin'
scenario: 'You need to size the end-to-end latency for a smart camera system on Jetson Orin (275 TOPS INT8, 204 GB/s LPDDR5, 60W). The pipeline consists of 1080p frame capture, ISP processing, object detection (YOLOv8-n, 4.2 GOPs INT8), face recognition CNN (1.2 GOPs INT8), and JSON event output over MQTT. The target is to process every frame at 30fps (33ms budget).'
question: 'What is the end-to-end latency budget for the 1080p Jetson Orin smart camera pipeline, and can it process every frame at 30fps?'
details:
  realistic_solution: 'Frame capture: 1080p at 30fps = 33ms inter-frame, capture itself 0.5ms. ISP (hardware): 2ms. YOLOv8-n: 4.2G/275T ≈ 0.015ms compute, realistic with memory ops ~3ms. Face recognition: 1.2G/275T ≈ 1ms. JSON serialize: 0.5ms. MQTT publish (local broker): 1ms. Total: ~8ms. 25ms slack for multiple detections and post-processing.'
  common_mistake: |
    **The Pitfall:** Forgetting ISP processing time and MQTT serialization/network latency in the budget.
    **The Rationale:** Candidates often focus exclusively on neural network inference latency and ignore the surrounding system pipeline.
    **The Consequence:** The system consistently misses the 33ms real-time deadline because hidden pipeline latencies consume the entire slack.
  napkin_math: |
    **Assumptions & Constraints:**
    - Budget for 30fps: 33 ms.
    - Capture & ISP: 0.5 ms + 2.0 ms = 2.5 ms.
    - Face CNN Inference: ~1.0 ms.
    - Post-processing (JSON + MQTT): 0.5 ms + 1.0 ms = 1.5 ms.

    **Calculations:**
    - YOLOv8-n Inference:
      - Ideal compute: 4.2 GOPs / 275 TOPS = 0.015 ms.
      - Memory load: 6.2 MB / 204 GB/s = 0.03 ms.
      - Realistic execution (with overhead): ~3.0 ms.
    - Total End-to-End Latency: 2.5 + 3.0 + 1.0 + 1.5 = 8.0 ms.

    **Conclusion & Interpretation:**
    - **Result: 8.0 ms (Compute-Bound)**. The 8 ms latency easily fits within the 33 ms budget, leaving 25 ms of slack.
