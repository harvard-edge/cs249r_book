title: Decomposing End-to-End Latency on Qualcomm Cloud AI 100 for Real-time Object Detection
scenario: You are deploying a real-time object detection model on a Qualcomm Cloud AI 100. The end-to-end latency target is 50ms from camera capture to bounding box output. Initial profiling reveals an average end-to-end latency of 75ms.
question: How would you decompose the 75ms end-to-end latency to identify the bottlenecks preventing you from meeting the 50ms target?
details:
  realistic_solution: |
    An L4 engineer would implement a meticulous profiling strategy using both system-level and accelerator-specific tools:
    1. Instrumentation: Use nsys profiling for high-resolution timestamps at precise points (capture, pre-processing, H2D transfer, inference, D2H transfer, post-processing).
    2. Component Isolation: Calculate durations.
    3. Hardware-Aware Analysis: Check if the 32GB LPDDR4x is bottlenecking due to bad memory patterns, or if 400 TOPS INT8 is underutilized due to lack of INT8 quantization.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on accelerator inference time while ignoring host-side data movement and preprocessing.
    **The Rationale:** Engineers often assume that high peak TOPS solves all latency problems, forgetting that getting data to and from the accelerator can dominate edge workloads.
    **The Consequence:** Wasting time optimizing the model architecture when the actual bottleneck is memory copying or CPU-bound image resizing.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Latency: 50ms. Current Latency: 75ms.
    - PCIe Transfer Bandwidth: 16 GB/s.
    - H2D Transfer: 6 MB. D2H Transfer: 1 MB.
    - Inference Time: 35ms.

    **Calculations:**
    - H2D Time: 6 MB / 16000 MB/s = 0.375ms.
    - D2H Time: 1 MB / 16000 MB/s = 0.0625ms.
    - Target Gap: 75ms - 50ms = 25ms excess.
    - Host Processing Budget: 50ms (target) - 35ms (infer) - 0.4375ms (transfers) = 14.56ms.
    - Current Host Processing: 75ms - 35ms - 0.4375ms = 39.56ms.

    **Conclusion & Interpretation:**
    - **Result: Pre/post-processing consume 39.5ms (Host CPU-Bound).** Optimize host side to meet 50ms target.
