title: Jetson AGX Orin Queueing Latency Spike
scenario: A Jetson AGX Orin runs a YOLOv5n object detector. The Orin's iGPU has a hard 2 GB activation memory budget, and the workload's per-frame service time has CV~0.3 due to scene-content-dependent NMS post-processing. As the frame arrival rate nears the Orin's maximum throughput, tail latency spikes.
question: Explain why latency on the Orin diverges from textbook M/M/1 predictions as utilization approaches 100%?
visual:
  kind: svg
  path: edge-2354.svg
  alt: A curve showing latency staying low until utilization hits about 80%, after which it spikes upward.
  caption: M/M/1 Queueing delay demonstrating the hockey stick effect.
details:
  realistic_solution: In a textbook M/M/1 queue with infinite buffering, the exact average queueing delay grows like ρ / (1 - ρ), where ρ is utilization. As utilization approaches 1, the denominator approaches zero, so average latency grows hyperbolically. The Orin can diverge from that idealized prediction because the service-time distribution is not exponential, GPU scheduling and NMS introduce bounded but content-dependent variance, and the 2GB activation budget limits how many frames can be buffered before drops or backpressure occur.
  common_mistake: |
    **The Pitfall:** Assuming latency scales linearly with load.
    **The Rationale:** Engineers mistakenly project average-case performance into high-load domains without applying the queueing delay curve or physical memory constraints.
    **The Consequence:** Massive, unexpected frame drops and tail-latency explosions as the pipeline hits the hockey-stick curve.
  napkin_math: |
    **Assumptions & Constraints:**
    - Delay multiplier ∝ ρ / (1 - ρ).
    - Utilization (ρ) nearing 1.0.
    - Hard 2 GB memory bound limits practical buffer depth.
    **Calculations:**
    - At ρ=0.8, delay multiplier = 0.8 / 0.2 = 4x.
    - At ρ=0.9, delay multiplier = 0.9 / 0.1 = 9x.
    - At ρ=0.95, delay multiplier = 0.95 / 0.05 = 19x.
    **Conclusion & Interpretation:**
    - **Result: Hyperbolic Queueing Growth**. The average queueing delay grows asymptotically as utilization approaches 100%. The 2GB activation limit is an additional finite-buffer constraint that can cause drops or backpressure before an ideal infinite-buffer M/M/1 queue would stabilize.
