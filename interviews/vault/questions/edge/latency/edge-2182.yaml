title: Latency Jitter from DVFS on Edge Devices
scenario: Your Jetson Orin NLP pipeline shows 3x latency jitter between consecutive identical inferences. Profiling reveals the GPU clock oscillates between 612 MHz and 1.3 GHz due to Dynamic Voltage and Frequency Scaling (DVFS).
question: How do you stabilize latency without exceeding the 60W power budget?
details:
  realistic_solution: Lock the GPU to a profiled sustainable frequency inside a validated nvpmodel power mode, then verify total module power with tegrastats or board telemetry. Example profiling shows GPU-only power of about 18W at 612 MHz, 32W at 900 MHz, and 52W at 1.3 GHz. If CPU, memory, and DLA need roughly 20W during the NLP pipeline, 1.3 GHz would put total power near 72W and trigger throttling, while 900 MHz leaves headroom under the 60W budget. Use the board-specific nvpmodel mode or custom mode that supports this cap, lock clocks/fan consistently, and validate that P50 and P99 converge to within 10%.
  common_mistake: |
    **The Pitfall:** Locking clocks to the maximum frequency.
    **The Rationale:** Candidates see frequency oscillation and immediately try to lock the GPU to 1.3 GHz for maximum performance.
    **The Consequence:** Total module power can exceed the 60W envelope once CPU, memory, and accelerators are included, triggering throttling that causes worse, unpredictable latency spikes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin 60W module power limit.
    - Oscillating DVFS frequencies: 612 MHz to 1.3 GHz.
    - Example non-GPU pipeline power during inference: 20W for CPU, memory, and other accelerators.

    **Calculations:**
    - Treat the power points as measured telemetry from profiling the same workload, not a derived frequency law.
    - At profiled 1.3 GHz: inference = 8ms, GPU-only power = 52W, total estimate = 52W + 20W = 72W, above the 60W module budget.
    - At profiled 612 MHz: inference = 16-18ms, GPU-only power = 18W, total estimate = 38W.
    - At profiled 900 MHz: inference = 11-13ms, GPU-only power = 32W, total estimate = 52W.
    - DVFS oscillating jitter: P50 = 10ms, P99 = 25ms (150% jitter).
    - Validated stable 900 MHz mode: P50 ~= 12ms, P99 ~= 13ms, which is about (13 - 12) / 12 = 8.3% jitter.

    **Conclusion & Interpretation:**
    - **Result: thermally stable latency under the 60W module budget.** Select the validated nvpmodel/frequency policy whose telemetry keeps total module power below 60W; in this profile, 900 MHz has about 8W headroom while max clock would throttle.
