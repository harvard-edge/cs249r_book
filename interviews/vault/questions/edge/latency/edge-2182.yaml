title: Latency Jitter from DVFS on Edge Devices
scenario: Your Jetson Orin NLP pipeline shows 3x latency jitter between consecutive identical inferences. Profiling reveals the GPU clock oscillates between 612 MHz and 1.3 GHz due to Dynamic Voltage and Frequency Scaling (DVFS).
question: How do you stabilize latency without exceeding the 60W power budget?
details:
  realistic_solution: 'Lock GPU frequency to a sustainable mid-point using nvpmodel and jetson_clocks. Profile power at each frequency step: 612 MHz = 18W GPU, 900 MHz = 32W GPU, 1.3 GHz = 52W GPU. At 900 MHz, latency is 1.44x the minimum but perfectly stable, and leaves 28W for CPU + memory + DLA. Set: `sudo nvpmodel -m 2` (custom power mode), `sudo jetson_clocks --fan` (active cooling at fixed fan speed). Result: P50 and P99 converge to within 10% because DVFS is eliminated. Alternatively, use the MAXN mode with a 50W software power cap — the Orin will reduce clocks gracefully rather than oscillating.'
  common_mistake: |
    **The Pitfall:** Locking clocks to the maximum frequency.
    **The Rationale:** Candidates see frequency oscillation and immediately try to lock the GPU to 1.3 GHz for maximum performance.
    **The Consequence:** Power draw quickly exceeds the 60W limit, triggering hard thermal throttling that causes worse, unpredictable latency spikes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin 60W limit.
    - Oscillating DVFS frequencies: 612 MHz to 1.3 GHz.

    **Calculations:**
    - At 1.3 GHz (Max): inference = 8ms, power = 52W GPU (exceeds 60W limit when combined with CPU/memory).
    - At 612 MHz (Min): inference = 8ms x (1300/612) = 17ms, power = 18W GPU.
    - At 900 MHz (Mid): inference = 8ms x (1300/900) = 11.5ms, power = 32W GPU.
    - DVFS Oscillating Jitter: P50 = 10ms, P99 = 25ms (150% jitter).
    - Locked 900 MHz Jitter: P50 = 11.5ms, P99 = 12.5ms.

    **Conclusion & Interpretation:**
    - **Result: Thermally-Stable Latency (Power-Bound).** Locking the GPU at 900 MHz eliminates DVFS oscillation, bringing jitter below 10% while safely staying under the 60W budget.
