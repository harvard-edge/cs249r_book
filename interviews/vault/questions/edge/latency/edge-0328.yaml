title: The Autonomous Driving FPS Budget
scenario: Your team is designing the perception system for an autonomous vehicle. The main camera runs at 30 FPS. Your image signal processing (ISP) and sensor fusion post-processing consume a combined 10ms of this budget.
question: To maintain the 30 FPS rate, what is the absolute maximum inference latency your ML model can have?
details:
  realistic_solution: 'To sustain a strict 30 FPS cadence, the end-to-end frame processing budget is strictly bounded at 33.3ms. Accounting for the 10ms of mandatory ISP and sensor fusion overhead, the neural network inference latency must be hard-capped at 23.3ms. Failing to account for end-to-end pipeline latency guarantees cyclic frame drops and severe synchronization drift in autonomous control systems.'
  common_mistake: |
    **The Pitfall:** Assuming the ML model can consume the entire 33.3ms frame budget.
    **The Rationale:** Candidates isolate the model from the end-to-end processing pipeline.
    **The Consequence:** The combined latency exceeds the deadline, resulting in dropped frames and unsafe real-time operation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target framerate: 30 FPS.
    - Non-model pipeline latency: 10ms.

    **Calculations:**
    - Frame budget = 1000 ms / 30 = 33.3 ms.
    - Max inference latency = 33.3 ms - 10 ms = 23.3 ms.

    **Conclusion & Interpretation:**
    - **Result: 23.3 ms inference budget (Latency-Bound)**. The model must fit within the residual pipeline budget, not the full frame time.
  options:
    - '33.3 ms'
    - '10 ms'
    - '23.3 ms'
    - '43.3 ms'
