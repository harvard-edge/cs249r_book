title: The WCET Analysis Wall
scenario: Your team must certify a neural network for an ASIL-B automotive braking assistant running on a real-time edge processor. The safety assessor demands a WCET (Worst-Case Execution Time) bound for every inference. Your ML engineer runs the model 10,000 times and reports 'max observed latency is 4.2ms.' The assessor rejects this.
question: Why is measurement-based WCET insufficient for safety certification, and what does a valid WCET analysis require for a neural network?
details:
  realistic_solution: Measurement-based WCET fails because it cannot prove coverage of all inputs, execution paths, hardware states, and interleavings. A neural network may have timing variation from sparse kernels, cache state, DMA and bus arbitration, interrupt preemption, pipeline effects, and accelerator scheduling. Valid WCET analysis requires static timing analysis of bounded code paths plus architecture-specific timing models for caches, pipelines, interrupts, memories, buses, DMA, and accelerators, then validation measurements to check the model. Controlled branches can be acceptable if their bounds are analyzable; empirical testing is useful evidence, but it is not sufficient by itself for certification.
  common_mistake: |
    **The Pitfall:** Relying purely on empirical measurement for hard real-time safety guarantees.
    **The Rationale:** ML engineers assume that if they run an inference 10,000 times, the maximum observed value securely captures the "worst case."
    **The Consequence:** Measurement-based timing only captures typical worst cases, failing to guarantee the absolute, provably safe upper bound required for automotive (ASIL-B) certification.
  napkin_math: |
    **Assumptions & Constraints:**
    - Empirical maximum from 10,000 runs: 4.2ms.
    - Required artifact: a safe upper bound for every certified operating condition.

    **Calculations:**
    - 10,000 measured runs cover only sampled inputs, sampled cache states, sampled bus contention, and sampled interrupt timing.
    - A valid WCET bound must include the maximum time for each bounded kernel/path plus modeled worst-case cache, memory, DMA, bus arbitration, interrupt, and accelerator effects.
    - The measured 4.2ms value can validate or falsify the model, but multiplying it by an arbitrary margin does not create a proof.

    **Conclusion & Interpretation:**
    - **Result: Certification-Bound.** Measurement alone is insufficient for ASIL-B timing claims. Certification needs an analyzable WCET bound with explicit hardware and software assumptions, supported by validation measurements.
