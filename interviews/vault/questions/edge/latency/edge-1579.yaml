title: USB I/O Bottleneck Analysis on Google Coral Edge TPU
scenario: You are deploying an INT8 quantized image classification model on an edge accelerator connected via a USB 3.0 interface. The model requires exactly 2 GOPs per inference. You need to profile the system to determine why the observed latency is significantly higher than theoretical limits.
question: Using 400 MB/s effective USB 3.0 bandwidth, how do compute latency and 3MB input transfer time compare for the 2 GOPS model?
details:
  realistic_solution: A thorough bottleneck analysis requires profiling both the compute time on the device and the host-to-device I/O transfer time. Using profiling tools or trace viewers, you would isolate the time spent sending the input tensor over the USB bus from the actual Edge TPU execution time. In edge deployments, transferring uncompressed high-resolution inputs to a discrete accelerator often becomes the primary bottleneck. The solution is typically to downsample inputs on the host CPU or use a PCIe form factor instead of USB if higher throughput is required.
  common_mistake: |
    **The Pitfall:** Ignoring USB interconnect overhead when evaluating edge accelerators.
    **The Rationale:** Engineers focus strictly on accelerator TOPS and model GOPS, assuming I/O latency is negligible.
    **The Consequence:** Deploying edge pipelines that are severely bottlenecked by data transfer rather than compute.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute capability: 4 TOPS (4,000 GOPS). Model load: 2 GOPS. USB 3.0 Bandwidth: ~400 MB/s. Tensor size: 3 MB.
    2. **Calculations:**
       - Compute Time: 2 GOPS / 4,000 GOPS/sec = 0.5 ms.
       - USB Transfer Time: 3 MB / 400 MB/s = 7.5 ms.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound Bottleneck.** The 7.5 ms data transfer time completely dominates the 0.5 ms compute time, making the USB interface the primary bottleneck.
