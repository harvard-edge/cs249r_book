title: Hailo-8 Host Streaming Bottleneck
scenario: You are deploying a vision pipeline on an edge gateway equipped with a dataflow accelerator. Your system must process 1080p video at 60fps using a 30 GOPs object detection model. The accelerator provides 26 TOPS INT8, but has no local DRAM and relies on continuous data streaming from host memory. Profiling traces show end-to-end latency is 50ms per frame, with the host CPU at 100% utilization while the accelerator is idle 70% of the time.
question: How would you diagnose and fix the host-side bottleneck keeping the 1080p60 pipeline at 20 FPS?
details:
  realistic_solution: Utilize nsys profiling or `perf` to trace host CPU bottlenecks. The CPU is trapped in heavy memory-bandwidth operations converting UINT8 raw frames into FP32 normalized arrays. The architectural fix is to utilize zero-copy DMA buffers and to fuse the image normalization strictly into the accelerator's graph, allowing the host to stream raw UINT8 directly and eliminating the CPU bottleneck entirely.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is PCIe bandwidth or accelerator compute.
    **The Rationale:** Candidates often default to suggesting model quantization or pruning, ignoring the host CPU utilization metrics.
    **The Consequence:** They fail to realize that without local DRAM, host CPU latency from preprocessing (like image resizing or FP32 float conversions) will starve the dataflow accelerator, leaving the pipeline bottlenecked.
  napkin_math: |
    **Assumptions & Constraints:**
       - Target latency: 16.6 ms per frame for 60 FPS.
       - Observed latency: 50 ms per frame, which is 20 FPS.
       - 1080p UINT8 RGB frame: 1920 * 1080 * 3 = 6.22 MB.
       - FP32 normalized frame footprint: 6.22 MB * 4 = 24.88 MB.
    **Calculations:**
       - The 50 ms trace is not compute-bound: accelerator idle time is 70%, so accelerator-active time is about 15 ms and host-side stalls account for about 35 ms.
       - The CPU is spending that stall time expanding 6.22 MB UINT8 frames into 24.88 MB FP32 buffers and normalizing them before the accelerator can stream.
       - Moving normalization into the graph and using zero-copy DMA removes the extra FP32 host buffer path, so the pipeline can approach the accelerator-active time instead of the 50 ms CPU-bound path.
    **Conclusion & Interpretation:**
       - **Result: ~35 ms host-side stall to remove (CPU-Bound Preprocessing).** Fusing normalization into the compiler graph and streaming UINT8 through zero-copy DMA targets the measured bottleneck and can bring latency near the 16.6 ms 60 FPS budget.
