title: 'Optimizing Latency on Hailo-8: Profiling for Edge ML Bottlenecks'
scenario: You are designing an edge ML inference system for real-time object detection on an NPU accelerator. The current prototype exhibits inconsistent end-to-end latency, occasionally exceeding your strict 50ms requirement. Your team suspects bottlenecks in the data pipeline, pre-processing, model inference, or post-processing.
question: How would you profile the accelerator and host pipeline to pinpoint the compute, memory, or I/O bottlenecks causing 50 ms latency violations?
details:
  realistic_solution: Utilize nsys profiling and Linux `perf` to generate a comprehensive Flame Graph of the pipeline execution. Often, inference is fast but upstream CPU preprocessing (e.g., resizing, normalizing) blocks the accelerator. Profiling isolates whether the P99 spikes originate from blocking I/O calls, inefficient memory transfer layers, or slow non-quantized host-bound graph execution.
  common_mistake: |
    **The Pitfall:** Focusing solely on the model's inference time on the accelerator.
    **The Rationale:** Candidates often assume the ML model itself is the bottleneck and ignore the surrounding system pipeline.
    **The Consequence:** Optimizing inference might shift the bottleneck elsewhere (e.g., to CPU pre-processing or I/O), failing to meet end-to-end latency targets.
  napkin_math: |
    **Assumptions & Constraints:**
       - Target Latency: 50 ms
       - NPU Inference (YOLOv5s): ~8 ms
       - PCIe Gen2 x1 Bandwidth: ~300 MB/s
       - Input payload: 1080p, ~2 MB
    **Calculations:**
       - Transfer latency: 2 MB / 300 MB/s ≈ 6.7 ms
       - Compute headroom: 50 ms - 8 ms - 6.7 ms = 35.3 ms
       - If CPU Pre-process = 20 ms, CPU Post-process = 15 ms
       - Total latency = 6.7 ms + 20 ms + 8 ms + 15 ms = 49.7 ms
    **Conclusion & Interpretation:**
       - **Result: System-Bound Bottleneck.** The NPU represents only 16% of the latency; system-level profiling is required to optimize CPU preprocessing paths.
