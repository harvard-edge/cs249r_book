title: The Edge Batch Size Paradox
scenario: Your colleague trained a model on an A100 using batch size 256 and got great GPU utilization (85%). Now you're deploying on a Rockchip RK3588 (6 TOPS NPU) for a robotic arm that needs per-frame decisions in under 20ms. Your colleague suggests batching 8 frames to improve NPU utilization.
question: Why is this a terrible idea for your use case, and what does the roofline model tell you about batch=1 on edge?
details:
  realistic_solution: The robotic arm needs per-frame decisions on fresh sensor data. At 30 FPS, collecting 8 frames takes 8 * 33.3ms = about 267ms before inference can even begin, which already violates the <20ms control requirement. The roofline lesson is that batch=1 may have lower utilization, but it is the latency-oriented operating point; batching optimizes throughput while destroying freshness.
  common_mistake: |
    **The Pitfall:** Conflating throughput optimization with latency optimization.
    **The Rationale:** Candidates often assume that because larger batches yield better hardware utilization, batching is always the correct approach, ignoring real-time temporal staleness.
    **The Consequence:** Introducing unacceptable control loop delays, causing autonomous systems to act on stale data and fail their physical objectives.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame rate: 30 FPS.
    - Control deadline: <20ms per frame.
    - Proposed batch size: 8 frames.
    - Roofline analysis can estimate whether a single-frame inference kernel has enough compute and memory bandwidth, but it does not remove the time spent waiting for a batch to fill.

    **Calculations:**
    - Frame interval = 1000ms / 30 ≈ 33.3ms.
    - Batch-fill staleness for 8 frames = 8 * 33.3ms ≈ 267ms.
    - 267ms is more than 13x the 20ms deadline before model execution starts.

    **Conclusion & Interpretation:**
    - **Result: 267ms staleness (Latency-Bound).** For real-time control, batch=1 is preferred when its profiled inference latency fits the <20ms deadline; batch=8 trades freshness for throughput and is the wrong objective.
  options:
    - '"Batching is essential because it increases NPU utilization. The roofline model shows batch=8 is compute-bound with higher throughput, so we should always use it."'
    - '"Batching introduces about 267ms of temporal staleness before inference even begins, which violates the real-time control requirement. The roofline model should be used to verify batch=1 latency against the <20ms deadline rather than chasing higher utilization."'
    - '"Batch=1 is compute-bound, so it''s already optimal. Batching will make it memory-bound and increase latency."'
    - '"Batch=8 reduces inference latency to 0.345ms, so it should be used. The 267ms staleness is acceptable for a 1 m/s robot."'
  correct_index: 1
