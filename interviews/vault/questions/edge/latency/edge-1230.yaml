title: 'Latency Bottleneck on Qualcomm AI 100'
scenario: 'We are deploying a batched object detection model on an on-premise edge server equipped with a dedicated INT8 accelerator. The end-to-end latency for processing a batch of 8 high-resolution images is 265ms. Hardware profiling reveals that INT8 inference execution takes only 15ms.'
question: 'Why does the batch-8 pipeline take 265ms end to end when accelerator inference is only 15ms?'
details:
  realistic_solution: 'Decompose the 265ms end-to-end latency to identify system I/O bottlenecks. Network transfer of images alone dominates the latency budget. Optimizations include upgrading to 10GbE, hardware JPEG decoding, and overlapping PCIe transfers with compute.'
  common_mistake: |
    **The Pitfall:** Assuming the accelerator's memory bandwidth or power limit is the bottleneck.
    **The Rationale:** Candidates focus solely on the high-performance ML silicon and ignore host-side system operations.
    **The Consequence:** They fail to decompose the pipeline and miss the massive network I/O penalty dominating the latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 compressed images (2MB each) = 16MB total.
    - 1Gbps network link (125 MB/s).
    - Accelerator execution = 15ms.

    **Calculations:**
    - Network transfer latency = 16MB / 125MB/s = 0.128s = 128ms.
    - CPU image decoding and resizing (preprocessing) = ~80ms.
    - Host-to-Device transfer over PCIe Gen4 x8 = ~12ms.
    - Post-processing (NMS) = ~30ms.
    - Total System Time = 128 + 80 + 12 + 30 + 15 = 265ms.

    **Conclusion & Interpretation:**
    - **Result: 128ms (Network-Bound)**. Network transfer (128ms) consumes nearly half the total latency, proving it is the true bottleneck.
