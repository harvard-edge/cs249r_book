title: 'Latency Decomposition: Compare Jetson Orin vs. Hailo-8 for Object Detection Latency'
scenario: You are evaluating two edge platforms for a real-time object detection pipeline running YOLOv8-small. Platform A has 275 TOPS INT8. Platform B has 26 TOPS INT8.
question: What is the realistic Platform A inference time for a 6.5 GFLOP INT8 YOLOv8-small model, and why is an estimate of 59ms mathematically wrong?
details:
  realistic_solution: |
    Treat FLOPs/TOPS as a coarse throughput-bound lower bound, not an end-to-end latency estimate. 275 TOPS equals 275,000 GOPS, so a 6.5 GOPS INT8 model at an assumed 40% sustained utilization has a compute lower bound of about 0.059ms. An estimate of 59ms is mathematically wrong under those assumptions because it treats TOPS as GOPS or mishandles seconds-to-milliseconds conversion, but real inference latency must still include memory traffic, kernel launches, preprocessing, postprocessing, and runtime overhead.
  common_mistake: |
    **The Pitfall:** Suffering from unit confusion by dividing GOPS by TOPS and treating the result as milliseconds instead of seconds.
    **The Rationale:** Moving too quickly through the math and failing to sanity-check the order of magnitude.
    **The Consequence:** Recommending against highly capable hardware due to an artificial 1000x miscalculation in expected latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 275 TOPS INT8.
    - Model operation count for this estimate: 6.5 GOPS after choosing a consistent INT8 operation-count convention.
    - Assumed sustained utilization for a compute lower bound: 40%.

    **Calculations:**
    - Effective Compute: 275,000 GOPS * 0.40 = 110,000 GOPS.
    - Throughput-bound compute time: 6.5 GOPS / 110,000 GOPS/s = 0.000059 seconds.
    - Millisecond Conversion: 0.000059 * 1000 = 0.059 ms.

    **Conclusion & Interpretation:**
    - **Result: 0.059 ms compute lower bound, not full inference latency**. The 59ms estimate is a unit error for this calculation, while release-quality latency sizing still needs measured end-to-end runtime overhead.
