title: 'Latency Decomposition: Diagnose and Fix Jetson Orin Inference Latency Spike'
scenario: A deployed Jetson Orin running a safety classifier at 60fps shows occasional latency spikes from 8ms to 45ms under sustained load. The model is INT8 TensorRT, 2 GOPs. Profiling shows GPU utilization stays at 60% during spikes.
question: What likely causes 8ms-to-45ms latency spikes on the 2 GOP INT8 safety classifier, and what quantified fix would you apply?
details:
  realistic_solution: |
    A 2 GOP INT8 classifier is not compute-limited on a 275 TOPS Orin, so an 8ms-to-45ms p99 spike is a system bottleneck. The given 1.3GHz-to-0.8GHz thermal throttle explains only about a 1.6x slowdown, raising 8ms to roughly 13ms, not 45ms. The 45ms tail points to thermal or power throttling triggering secondary effects such as queued frames, CPU-side preprocessing/postprocessing stalls, or memory contention while the GPU remains only 60% utilized. Quantified fix: lock the deployment to a sustainable power/thermal mode with active cooling and fixed clocks, then cap or drop input frames so the queue cannot grow; expected p99 should fall from 45ms to about 13ms or less, below the 16.7ms 60fps frame budget.
  common_mistake: |
    **The Pitfall:** Assuming latency spikes are compute-bound and adding more GPU resources.
    **The Rationale:** Engineers overlook LPDDR5 bandwidth contention or hardware thermal limits that throttle clock speeds.
    **The Consequence:** Wasting effort on model optimization when the fix requires active cooling or process pinning.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute required: 2 GOPs.
    - Peak compute: 275 TOPS.
    - Base latency: 8ms.
    - Spike latency: 45ms.
    - Observed throttle example: 1.3GHz to 0.8GHz.
    - Frame budget at 60fps: 16.7ms.

    **Calculations:**
    - Peak compute lower bound = 2e9 / 275e12 = 0.00000727s = 0.0073ms.
    - Compute lower bound at 60% utilization = 0.0073 / 0.60 = 0.012ms, still negligible versus 8ms.
    - Clock-throttle slowdown = 1.3 / 0.8 = 1.625x.
    - Expected latency from only this throttle = 8ms * 1.625 = 13ms.
    - Observed spike factor = 45 / 8 = 5.625x, so the extra tail is not explained by GPU clock reduction alone.
    - A post-fix p99 target of <= 13ms leaves 16.7 - 13 = 3.7ms of 60fps frame-budget margin.

    **Conclusion & Interpretation:**
    - **Result: Thermal/Power-Induced System Tail, Not Pure Compute-Bound**. Sustained cooling or a lower stable power mode should remove the throttle/queue tail; validate by logging clocks, temperatures, queue depth, CPU stages, and memory bandwidth during spikes.
