title: Micro-Batch Pipeline Scheduling on Jetson Orin for Video Analytics
scenario: 'An edge device processes 4K video streams for anomaly detection. Each frame requires a detection model (15ms) and a classification model (5ms). The team runs them sequentially: 20ms/frame. They propose pipelining detection on frame N while classifying frame N-1.'
question: If detection takes 15ms and classification 5ms per frame, what throughput and latency result from pipelining them?
details:
  realistic_solution: 'Sequential: latency = 20ms, throughput = 50fps. Pipelined: detection and classification overlap. If both run on GPU, they can''t overlap directly without CUDA streams. With CUDA streams and engine separation: detection in stream 1, classification in stream 2. If no resource contention: throughput limited by max(15ms, 5ms) = 15ms = 67fps. Latency: 15ms (det) + 5ms (class) = 20ms per frame still, but a new frame starts every 15ms. With compute overlap on Jetson Orin''s DLA + GPU: detect on GPU (15ms), classify on DLA (5ms). True overlap: throughput limited by GPU at 67fps, DLA runs in parallel. End-to-end latency: 20ms. Net gain: 33% throughput increase.'
  common_mistake: |
    **The Pitfall:** Assuming pipelining inherently reduces the end-to-end latency of a single frame.
    **The Rationale:** Engineers confuse throughput (frames per second) with latency (time per frame), expecting parallel stages to accelerate a single task.
    **The Consequence:** Missing hard real-time latency deadlines because pipelining actually maintains (or slightly increases) per-frame latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Detection: 15ms. Classification: 5ms. Models overlap perfectly via hardware separation (e.g., GPU + DLA).
    2. **Calculations:**
       - Sequential: Latency = 15 + 5 = 20ms. Throughput = 1 / 20ms = 50 FPS.
       - Pipelined: Latency = 15 + 5 = 20ms. Throughput bottleneck = max(15, 5) = 15ms. FPS = 1 / 15ms = 67 FPS.
    3. **Conclusion & Interpretation:**
       - **Result: 67 FPS Throughput, 20ms Latency.** Pipelining yields a 33% throughput increase but does not reduce the 20ms end-to-end latency per frame.
