title: 'Optimizing Orin Pipeline Latency Breakdown'
scenario: 'Your team is deploying a real-time object tracking system on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP). The camera captures 4K video at 60 FPS, but the end-to-end latency from frame capture to actuation command is currently 85ms, missing the 33ms target. Architecture A runs preprocessing on the CPU, inference on the Ampere GPU (FP16), and postprocessing on the CPU. Architecture B offloads preprocessing to the hardware encoder, runs inference on the Deep Learning Accelerator (DLA) using INT8, and keeps postprocessing on the CPU.'
question: 'Which architecture is more likely to meet the 33 ms latency target, and what is the critical bottleneck in each?'
details:
  realistic_solution: 'Architecture B is superior for meeting the strict latency target. By offloading 4K preprocessing to dedicated hardware, CPU overhead is drastically reduced. Utilizing INT8 on the DLA frees up the GPU for other tasks and provides highly deterministic execution.'
  common_mistake: 'Focusing solely on the theoretical TOPS difference between the GPU and DLA, ignoring the severe latency penalty of CPU-bound preprocessing for 4K video.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Latency: 33ms.
    - Model: 100 GOPs. DLA INT8 peak: ~100 TOPS.
    - Memory bandwidth: 200 GB/s.

    **Calculations:**
    - Arch A: CPU Preprocessing (~30ms) + GPU Inference (~40ms) + Postprocessing (~15ms) = 85ms.
    - Arch B HW Preprocessing: ~5ms.
    - Arch B DLA Compute: 100 GOPs / 100 TOPS = 1ms compute.
    - Arch B Memory transfer: 10MB activations * 2 / 200 GB/s ≈ 0.1ms. Total DLA time ≈ 5ms.
    - Arch B CPU Postprocessing: ~10ms.

    **Conclusion & Interpretation:**
    - **Result: 20ms Total Latency (Compute-Bound)**. Offloading to the DLA and hardware encoder avoids the CPU bottlenecks, easily meeting the 33ms target.
