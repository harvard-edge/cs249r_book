title: Jetson Orin Priority Queueing for Mixed Heavy and Light Robot Inference
scenario: 'You are designing the inference queueing architecture for a warehouse robot fleet: 20 robots each sending 10 perception requests/s (λ=200 req/s). Requests are 30% heavy (3D scene reconstruction, 200ms service on Jetson Orin 60W) and 70% light (obstacle check, 5ms). Total P99 SLO is 500ms.'
question: How many Jetson Orins are needed for the mixed heavy/light workload, can priority queues meet the 500 ms P99 SLO, and does power fit the 200W budget?
details:
  realistic_solution: Heavy traffic is λ_h=60/s with 200ms service, which consumes 12.0 Jetson-seconds of work per second. Light traffic is λ_l=140/s with 5ms service, which consumes 0.7 Jetson-seconds/s. The workload therefore needs at least ceil(12.7)=13 Jetson Orins just for stability; targeting about 80% utilization requires ceil(12.7/0.8)=16 Orins. A strict priority queue can protect light requests, but it cannot make the Jetson-only design meet the 500ms P99 SLO under the 200W power budget because 200W allows only 3 Orins and the workload would be unstable. Sixteen Orins would draw 960W, so the design is power-bound and needs workload reduction, asynchronous heavy processing, or heterogeneous offload.
  common_mistake: |
    **The Pitfall:** Using basic M/M/1 for mixed workloads.
    **The Rationale:** Candidates fail to separate the two classes into a priority queue M/G/1 analysis.
    **The Consequence:** They wrongly assume that simply adding more Jetsons solves the tail latency for the heavy 3D reconstructions without asynchronous decoupling.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet Traffic (λ): 200 req/s total.
    - Heavy tasks (30%): λ_h = 60/s, service time S_h = 200ms.
    - Light tasks (70%): λ_l = 140/s, service time S_l = 5ms.
    - Target P99 SLO: 500ms.
    - Power Budget: 200W. (Jetson Orin = 60W each).

    **Calculations:**
    - Offered load: λ_h*S_h + λ_l*S_l = 60*0.200 + 140*0.005 = 12.0 + 0.7 = 12.7 Erlangs.
    - Minimum Jetsons for stability: ceil(12.7) = 13.
    - Jetsons for a practical 80% utilization target: ceil(12.7 / 0.8) = 16.
    - Power for 16 Jetsons: 16 * 60W = 960W.
    - Jetsons allowed by 200W: floor(200 / 60) = 3, which provides only 3 Erlangs of service capacity.
    - Priority scheduling can reduce light-task queueing, but with only 3 Jetsons the system is unstable; no finite P99 exists. With the 16-Jetson throughput design, power is still 4.8x over budget.

    **Conclusion & Interpretation:**
    - **Result: Power-Bound and Latency-Bound.** A Jetson-only design needs about 16 Orins for reasonable utilization but exceeds the 200W budget. Priority queues alone cannot make the 500ms P99 SLO hold under the power constraint.
