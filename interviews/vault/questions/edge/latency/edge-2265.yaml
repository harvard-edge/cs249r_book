title: Orin Multi-Modal Fusion Queue Instability
scenario: An autonomous driving pipeline on a Jetson AGX Orin aggregates sensor events into a single fusion queue. LiDAR frames arrive deterministically at 10 Hz, and Camera frames arrive at 30 Hz. The neural sensor fusion inference takes exactly 25.5ms per combined event.
question: Analyze the stability of the fusion queue over a 10-second operational window.
visual:
  kind: svg
  path: edge-2265.svg
  alt: A linear chart demonstrating the queue size steadily increasing over the 10 second window because service is slower than arrival.
  caption: Unstable Queue Growth (ρ > 1)
details:
  realistic_solution: The combined arrival rate is 40 events per second, meaning an event arrives on average every 25ms. The required service time is 25.5ms. Because the service time strictly exceeds the inter-arrival time (Utilization ρ = 1.02), the queue is fundamentally unstable and will grow deterministically. Over 10 seconds, it processes 392 events while 400 arrive, creating a backlog of 8 events.
  common_mistake: |
    **The Pitfall:** Treating the system as a stable M/M/1 probabilistic queue.
    **The Rationale:** Candidates try to find a steady-state using rho formulas instead of recognizing that ρ > 1 guarantees deterministic, unbounded growth.
    **The Consequence:** The system will inevitably experience catastrophic queue saturation and OOM, crashing the vehicle's driving pipeline.
  napkin_math: |
    **Assumptions & Constraints:**
    - LiDAR rate: 10 Hz. Camera rate: 30 Hz. Total arrival rate: 40 Hz.
    - Service time: 25.5ms.
    - Window: 10 seconds.

    **Calculations:**
    - Inter-arrival time: 1 / 40 Hz = 0.025s = 25.0ms.
    - Utilization (ρ): 25.5ms / 25.0ms = 1.02.
    - Backlog accumulation: 25.5ms - 25.0ms = 0.5ms per event.
    - Total events in 10s: 10s * 40 events/s = 400 events.
    - Total Backlog: 400 events * 0.5ms = 200ms.
    - Queued Items: 200ms / 25.5ms = ~7.84 events.

    **Conclusion & Interpretation:**
    - **Result: ρ = 1.02 (Throughput-Bound)**. The ρ > 1 condition ensures the queue is unstable, creating a deterministic backlog of roughly 8 unserviced events over the 10-second window.
