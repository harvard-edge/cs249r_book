title: Drop-Oldest Queue Policy
scenario: 'A security camera feeds frames into a constrained inference queue. High motion causes the queue to saturate and delay alerts.'
question: 'Explain why implementing a LIFO or drop-oldest queueing policy improves real-time security alerts.'
details:
  realistic_solution: 'A standard FIFO queue processes stale frames during saturation, causing highly delayed detections. A drop-oldest policy discards outdated buffered frames so the inference engine always processes the most recent data. This trades continuous frame tracking for tightly bounded, real-time latency on critical alerts.'
  common_mistake: |
    **The Pitfall:** Focusing purely on preventing memory leaks or queue overflow, rather than prioritizing the temporal relevance of the buffered data.
    **The Rationale:** In traditional computer science, dropping data is generally viewed as an error, so engineers default to FIFO queues.
    **The Consequence:** The inference engine spends its limited TOPS processing stale frames from 5 seconds ago while the current critical security event is delayed.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inference takes 50ms.
    - Frames arrive every 10ms.
    - Queue size is 100 frames.

    **Calculations:**
    - FIFO Saturation Time: 100 frames * 50ms = 5000ms (5 seconds).
    - Drop-Oldest Delay: Only the newest frame is processed (50ms latency).

    **Conclusion & Interpretation:**
    - **Result: Strictly bounds latency to 50ms (Latency-Bound)**. Safely discards the 99 stale frames to preserve real-time alerting.
