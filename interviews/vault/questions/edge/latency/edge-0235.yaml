title: 'The Perception Deadline: Real-Time Deadlines'
scenario: 'Your team is developing the perception system for an autonomous vehicle using a Jetson AGX Orin. The system processes frames from a 30 FPS camera, which imposes a hard real-time deadline of 33ms per frame. Your vision model takes exactly 15ms to process a single frame.'
question: 'What maximum static batch size can you use for a 30 FPS camera if single-frame inference takes 15ms and every frame has a 33ms deadline?'
details:
  realistic_solution: 'To calculate maximum batch size, account for queuing delay. At 30 FPS, a new frame arrives every 33.3ms. If we wait for a second frame to form a batch of 2, the first frame waits 33.3ms before processing begins. With 30ms processing time, the first frame''s latency is 63.3ms, violating the deadline. Maximum batch size is 1.'
  common_mistake: |
    **The Pitfall:** Calculating processing time (N * 15ms <= 33ms giving N=2) while completely forgetting queuing delay.
    **The Rationale:** Engineers analyze batching purely as a compute throughput problem, ignoring the temporal realities of sequential sensor data.
    **The Consequence:** The system is configured for batch size 2, guaranteeing every single frame misses the 33ms autonomous driving deadline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Camera: 30 FPS (33.3ms inter-arrival time).
    - Deadline: 33ms.
    - Inference: 15ms per frame.

    **Calculations:**
    - Batch of 2 Queuing Delay: 1st frame waits 33.3ms for 2nd frame.
    - Batch of 2 Compute Time: 2 * 15ms = 30ms.
    - Total Latency (1st frame): 33.3ms + 30ms = 63.3ms.

    **Conclusion & Interpretation:**
    - **Result: Maximum batch size of 1 (Latency-Bound)**. Static batching > 1 is impossible under a strict 33ms real-time deadline.
  options:
    - 'Batch size of 1. Waiting for the second frame from a 30 FPS camera takes 33.3ms, immediately violating the 33ms deadline for the first frame before processing even begins.'
    - 'Batch size of 2. A batch of 2 takes 30ms to process, which is under the 33ms deadline.'
    - 'Batch size of 3. Confusing average throughput with per-frame latency.'
    - 'Static batching is preferred as long as average throughput is maintained.'
