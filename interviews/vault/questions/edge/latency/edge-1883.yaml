title: Optimizing Object Detection Latency on Google Coral Edge TPU
scenario: A development team is deploying an object detection model to a Google Coral Edge TPU USB Accelerator. The end-to-end latency observed for processing a single camera frame is 150ms.
question: How would you break down the 150 ms Coral Edge TPU frame latency to find whether capture, preprocessing, USB transfer, inference, or postprocessing dominates?
details:
  realistic_solution: 'Systematically timestamp the pipeline stages. Instrument sensor acquisition, CPU-bound image preprocessing, host-to-TPU USB data transfer time, TPU inference execution, and finally CPU postprocessing. This establishes the true system bottlenecks.'
  common_mistake: |
    **The Pitfall:** Solely focusing on the model inference time on the Edge TPU.
    **The Rationale:** Candidates neglect significant latency contributors like slow CPU-bound preprocessing, USB data transfer bottlenecks, or complex postprocessing logic.
    **The Consequence:** Optimizing the wrong part of the pipeline (the already-fast TPU) while ignoring the actual host-side bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Latency = 150ms
    - TPU Inference Rate = ~400 FPS (4 TOPS INT8)

    **Calculations:**
    - Inference Time = 1/400 s = 2.5 ms
    - Overhead = 150ms - 2.5ms = 147.5ms

    **Conclusion & Interpretation:**
    - **Result: 147.5ms overhead.** Host bottlenecked.
