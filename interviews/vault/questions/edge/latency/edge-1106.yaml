title: 'Edge Queueing Theory Diagnosis: Queue Overflow in Edge Gateway'
scenario: An edge gateway Jetson Orin (32GB LPDDR5, 275 TOPS INT8) aggregates data from 16 IoT sensors. The arrival rate is λ=160 requests/sec, but the inference engine processes μ=120 requests/sec. The operator observes that exactly 25% of incoming requests are dropped.
question: Using M/M/1/K queueing theory, what explains the exact 25% drop rate, and how should this system overload be resolved?
details:
  realistic_solution: |
    The offered load exceeds service capacity: ρ = λ/μ = 160/120 = 1.333 > 1. A finite buffer prevents infinite queue growth by dropping arrivals once the system is saturated, but the exact observed 25% is best explained by the throughput shortfall, not by pretending a larger queue fixes overload. In steady saturated operation, the engine can accept at most μ=120 requests/s out of λ=160 arrivals/s, so 40 requests/s must be rejected: 40/160 = 25%. In M/M/1/K terms the blocking probability depends on K, but no finite K changes the capacity mismatch. Resolve the overload by increasing μ above 160 requests/s with optimization or another worker, reducing λ below 120 requests/s with admission control or fewer sensors, or scaling out; increasing K only trades drops for latency until the buffer fills.
  common_mistake: |
    **The Pitfall:** Assuming packet drops only occur when utilization hits 100%, without recognizing the system is fundamentally unstable.
    **The Rationale:** Engineers assume a sufficiently large queue (K) will absorb the spikes.
    **The Consequence:** Attempting to fix the drops by increasing the queue size, which only adds latency without preventing the inevitable mathematical overflow.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival rate (λ): 160 requests/sec.
    - Inference engine processing rate (μ): 120 requests/sec.

    **Calculations:**
    - Load factor (ρ): λ / μ = 160 / 120 = 1.333.
    - Saturated accepted throughput is capped at μ = 120 requests/sec.
    - Excess arrivals = λ - μ = 160 - 120 = 40 requests/sec.
    - Observed drop fraction = 40 / 160 = 25%.
    - Resolution target: either μ > 160 requests/sec, or λ < 120 requests/sec with headroom.

    **Conclusion & Interpretation:**
    - **Result: 25% drop rate from saturated overload.** The system is capacity-bound; increase service capacity, reduce arrivals, or add parallel inference capacity. Do not rely on a larger queue as the fix.
