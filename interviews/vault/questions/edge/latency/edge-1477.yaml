title: Architecting an Object Detection Pipeline on Jetson Orin
scenario: You are tasked with designing an end-to-end real-time autonomous drone vision system deployed on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W TDP, Ampere GPU + DLA). The system captures 4K video at 60 FPS, runs an object detection model, and sends control signals based on the detections. The strict end-to-end latency budget from frame capture to control signal emission is 30ms.
question: How would you allocate the 30 ms latency budget for 4K60 drone vision on Jetson Orin across preprocessing, inference, postprocessing, and control?
details:
  realistic_solution: A robust design pipelines the workload while assigning an explicit 30 ms freshness budget to each stage. Use the ISP/VIC for capture, resize, and color conversion at about 5 ms, run the INT8 detector on DLA or GPU depending on supported operators with an 8 ms allocation, keep NMS and other postprocessing on the GPU at about 5 ms, reserve 5 ms for control logic and transmission, and hold 7 ms as scheduling, buffering, and measurement margin. The budget must be validated at p95/p99 while maintaining 60 FPS throughput, since frames arrive every 16.67 ms and stages must overlap.
  common_mistake: |
    **The Pitfall:** Focusing solely on neural network inference time and ignoring the surrounding system pipeline.
    **The Rationale:** Candidates assume inference is the only significant latency and fail to distribute tasks across heterogeneous SoC components.
    **The Consequence:** They overload the Ampere GPU, causing thermal throttling or exceeding the 60W TDP, while completely ignoring the ISP and DLA capabilities.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total control freshness budget = 30 ms; frames still arrive every 16.67 ms at 60 FPS, so the pipeline must overlap stages to maintain throughput.
    - Camera capture, ISP, resize, and color conversion allocation = 5.0 ms.
    - INT8 detector work = 50 GOP per frame; assume 8 effective TOPS sustained after operator support and scheduling overhead.
    - GPU post-processing (NMS) allocation = 5.0 ms.
    - Control logic and network transmit allocation = 5.0 ms.
    - Explicit slack for queues, synchronization, and measurement variance = 7.0 ms.

    **Calculations:**
    - Detector compute allocation: 50 GOP / 8 TOPS = 6.25 ms, rounded up to 8.0 ms to cover runtime overhead.
    - Total allocated latency = 5.0 + 8.0 + 5.0 + 5.0 + 7.0 = 30.0 ms.
    - Throughput requirement remains one frame every 16.67 ms, so these stages must be overlapped rather than executed as a single serial worker.

    **Conclusion & Interpretation:**
    - **Result: 30.0 ms allocated latency budget.** The design is a defensible budget, not a proof; it meets the target only if profiling confirms each p95/p99 stage stays within its allocation while the pipeline sustains 60 FPS.
