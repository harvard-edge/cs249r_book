title: 'Edge Queueing Theory Design: Hailo-8 vs Jetson Orin Queueing Analysis'
scenario: Design an edge inference system for a smart city pedestrian counter with λ=50 detections/s. Compare Hailo-8 (26 TOPS INT8, 2.5W) vs Jetson Orin (275 TOPS INT8, 60W) using M/D/1 queuing. The detection model requires 5 GOPS per inference.
question: For λ=50 detections/s and a 5 GOPS model, what are throughput, utilization, queue wait, and power efficiency on Hailo-8 versus Jetson Orin?
details:
  realistic_solution: 'Throughput from compute capacity is μ = TOPS/GOPS per inference. Hailo-8: μ=26,000/5=5,200 detections/s, utilization ρ=50/5,200=0.0096, M/D/1 queue wait Wq=ρ/(2μ(1-ρ))≈0.00093ms, and total response time is service plus queue wait ≈0.192ms+0.00093ms=0.193ms. Jetson Orin: μ=275,000/5=55,000 detections/s, ρ=50/55,000=0.00091, Wq≈0.000008ms, and total response time ≈0.0182ms. Both easily satisfy the workload, but Hailo uses 2.5W/50FPS=0.05W per delivered FPS while Orin uses 60W/50FPS=1.2W per delivered FPS, so Orin consumes 24x more power per delivered FPS and Hailo is 24x more power-efficient for this load.'
  common_mistake: |
    **The Pitfall:** Comparing TOPS without normalizing for model complexity and workload arrival rate.
    **The Rationale:** Candidates often select the highest TOPS chip (Orin) without analyzing if the queueing delay on the smaller chip (Hailo) already easily satisfies the latency SLA.
    **The Consequence:** Massively over-provisioning hardware, resulting in a 10x higher deployment cost and 24x higher energy waste.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival Rate (λ): 50 frames/s.
    - Model Complexity: 5 GOPS per frame.
    - Hailo-8: 26 TOPS (26,000 GOPS), 2.5W.
    - Jetson Orin: 275 TOPS (275,000 GOPS), 60W.
    - Queuing Model: M/D/1 (Deterministic service time).

    **Calculations:**
    - Hailo-8 Service Rate (μ) = 26,000 / 5 = 5,200 inferences/s.
    - Hailo-8 Utilization (ρ) = 50 / 5,200 ≈ 0.0096 (< 1%).
    - Hailo-8 Service Time = 1/5,200 = 0.192 ms.
    - Hailo-8 M/D/1 Queue Wait Wq = ρ / (2 * μ * (1-ρ)) = 0.0096 / (2 * 5,200 * 0.9904) = 0.00000093s = 0.00093ms.
    - Hailo-8 Total Response Time W = 0.192ms + 0.00093ms = 0.193ms.
    - Hailo-8 Power Cost = 2.5W / 50 FPS = 0.05 Watts per FPS.
    - Orin Service Rate (μ) = 275,000 / 5 = 55,000 inferences/s.
    - Orin Utilization (ρ) = 50 / 55,000 ≈ 0.00091.
    - Orin Service Time = 1/55,000 = 0.0182ms.
    - Orin M/D/1 Queue Wait Wq = 0.00091 / (2 * 55,000 * 0.99909) = 0.0000000083s = 0.0000083ms.
    - Orin Total Response Time W ≈ 0.0182ms.
    - Orin Power Cost = 60W / 50 FPS = 1.2 Watts per FPS.
    - Power-efficiency ratio = 1.2 / 0.05 = 24x higher W/FPS for Orin.

    **Conclusion & Interpretation:**
    - **Result: both are compute-sufficient; Hailo response time is about 0.193ms at 0.05 W/FPS, while Orin response time is about 0.018ms at 1.2 W/FPS.** Hailo is 24x more power-efficient by delivered watts per FPS for this workload.
