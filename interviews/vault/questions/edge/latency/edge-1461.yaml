title: Hailo-8 Multi-Stream Dataflow Batching Architecture
scenario: You are designing an autonomous retail checkout system that processes 4 concurrent camera streams at 30 FPS using a single Hailo-8 dataflow accelerator. The Hailo-8 delivers 26 TOPS INT8 at 2.5W, but critically lacks local DRAM, meaning all activations and weights must stream directly from host memory over PCIe.
question: What scheduling and batching policy would you use on one Hailo-8 to keep four 30 FPS streams under a 15 ms latency budget while maintaining the required 120 FPS combined throughput?
details:
  realistic_solution: The optimal design leverages the Hailo-8's dataflow architecture by using a continuous streaming policy with a static batch size of 1. Instead of batching frames, the system should implement a highly optimized host-side DMA pipeline that interleaves individual frames from the 4 cameras sequentially. By keeping the PCIe bus utilization steady and avoiding large burst transfers, the continuous execution engine remains fed, minimizing tail latency and completely avoiding the overhead of dynamic batch construction.
  common_mistake: Candidates often suggest traditional dynamic batching with a timeout, aggregating frames across cameras into a single large batch to maximize throughput like they would on a GPU. They fail to account for the Hailo-8's lack of local DRAM; large batch sizes force massive concurrent DMA transfers from host memory, saturating the PCIe bus and causing severe latency spikes that violate the strict 15ms latency budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4 cameras at 30 FPS = 120 FPS total.
    - PCIe Gen3x4 bus (3.9 GB/s) transfer time for 6.2MB frame: ~1.6ms.
    - Compute time for 50 GOPS model on 26 TOPS Hailo-8: ~2.0ms.

    **Calculations:**
    - Single-frame latency (Batch 1) = 1.6ms (transfer) + 2.0ms (compute) = 3.6ms.
    - Batch 4 transfer time = 4 * 1.6ms = 6.4ms.
    - Batch 4 compute time = 4 * 2.0ms = 8.0ms.
    - Batch 4 maximum latency = 6.4ms + 8.0ms = 14.4ms.

    **Conclusion & Interpretation:**
    - **Result: 3.6ms (Latency-Bound)**. Continuous streaming with batch size 1 avoids PCIe burst saturation and maintains a safe 3.6ms latency well below the 15ms budget.
