title: 'Edge Queueing Theory Diagnosis: Hailo-8 Throughput Under Real Traffic'
scenario: A Hailo-8 deployed in a retail store shows measured throughput of 8 FPS on a camera with 30 FPS input, despite the chip rating suggesting 50+ FPS for MobileNetV2.
question: Why does the Hailo-8 retail pipeline deliver only 8 FPS on a 30 FPS camera, and how large is the gap to expected MobileNetV2 throughput?
details:
  realistic_solution: 'Use the benchmarked pipeline expectation, not raw TOPS, as the comparison point. MobileNetV2 on the Hailo-8 path is expected to deliver at least 50 FPS, while the measured retail pipeline delivers 8 FPS, so the gap is about 42 FPS or 6.25x. The camera itself supplies 30 FPS, so the observed 8 FPS indicates a host-side bottleneck before the accelerator. Raw 1080p RGB input is 30 * 1920 * 1080 * 3 = 186.6MB/s, which fits USB3 bandwidth, but CPU decode/resize/normalize and buffer copies can easily dominate. An observed 8 FPS corresponds to about 125ms/frame end-to-end host service time, while a 50 FPS accelerator path needs about 20ms/frame. Diagnosis: host preprocessing and data movement are limiting throughput, not Hailo compute. Fix by using hardware decode, zero-copy buffers, vectorized resize/normalize, and profiling timestamps around capture, preprocess, transfer, inference, and postprocess.'
  common_mistake: |
    **The Pitfall:** Assuming the Hailo-8 TOPS rating directly translates to FPS.
    **The Rationale:** Candidates focus solely on the accelerator's compute capacity.
    **The Consequence:** They fail to account for the host CPU preprocessing overhead and PCIe/USB transfer latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Expected MobileNetV2 throughput on the deployed Hailo-8 path: 50 FPS or better.
    - Observed throughput: 8 FPS.
    - Input stream: 1080p RGB at 30 FPS.

    **Calculations:**
    - Throughput gap = 50 FPS - 8 FPS = 42 FPS.
    - Slowdown factor = 50 / 8 = 6.25x.
    - Observed pipeline service time = 1 / 8 FPS = 125ms/frame.
    - Expected accelerator-path service time at 50 FPS = 1 / 50 = 20ms/frame.
    - Raw input bandwidth = 30 * 1920 * 1080 * 3 bytes/s = 186.6MB/s, so USB3 transfer alone is not the limiting factor.

    **Conclusion & Interpretation:**
    - **Result: 8 FPS observed versus 50+ FPS expected, a 42 FPS / 6.25x gap.** The likely bottleneck is host preprocessing/data movement before Hailo inference; optimize that path before changing the model or accelerator.
