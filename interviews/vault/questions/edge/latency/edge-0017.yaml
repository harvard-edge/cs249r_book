title: The Pipeline Overlap
scenario: 'Your edge perception system runs three stages sequentially: camera preprocessing
  (8ms), neural network inference (20ms), and post-processing/NMS (5ms) — totaling
  33ms for a single frame. You need to hit 30 FPS.'
question: Without changing any model or buying new hardware, how do you cut the per-frame
  latency?
details:
  realistic_solution: 'Deploy a multi-stage execution pipeline overlapping the CPU,
    ISP, and NPU. By decoupling the sequential blocking, frame N undergoes NPU inference
    while frame N+1 is acquired by the ISP, and frame N-1 undergoes CPU post-processing
    (NMS). This reduces the pipeline bottleneck to the single slowest stage (20ms
    NPU execution), driving throughput to 50 FPS and easily clearing the 30 FPS deadline
    without modifying the neural network weights.

    '
  common_mistake: '**The Pitfall:** Attempting to optimize the neural network to run
    faster.

    **The Rationale:** Candidates instinctively try to optimize the model itself rather
    than rethinking the system architecture.

    **The Consequence:** Wasted effort on model compression when a simple software
    pipelining architecture solves the throughput requirement.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Stages: Prep (8ms), NN (20ms), Post (5ms).

    - Target: 30 FPS (33.3ms budget).


    **Calculations:**

    - Sequential throughput = 1000 / 33 = 30.3 FPS.

    - Pipelined bottleneck = max(8, 20, 5) = 20ms.

    - Pipelined throughput = 1000 / 20 = 50 FPS.


    **Conclusion & Interpretation:**

    - **Result: 50 FPS via Pipeline Overlap (Compute-Bound)**. End-to-end latency
    remains 33ms, but throughput drastically increases.

    '
