title: Deterministic Latency with TensorRT on Orin
scenario: Your PyTorch model on Jetson Orin has P50 = 15ms but P99 = 45ms due to dynamic shapes and Python overhead. You convert to TensorRT with fixed input shapes.
question: What P99 latency should you expect after converting the PyTorch model to fixed-shape TensorRT, and why?
details:
  realistic_solution: 'TensorRT eliminates variance sources: no Python GIL contention, pre-allocated workspaces avoid cudaMalloc, and aggressive operator fusion reduces kernel launch overheads. Expected TensorRT: P50 = 8ms, P99 = 18ms. The variance collapses significantly.'
  common_mistake: |
    **The Pitfall:** Expecting TensorRT to only improve average (P50) latency.
    **The Rationale:** Candidates focus purely on layer fusion (compute speedup) but overlook the elimination of dynamic runtime overheads (GIL, JIT, malloc).
    **The Consequence:** Underestimating the significant compression of the tail latency (P99) distribution, which is critical for real-time safety.
  napkin_math: |
    **Assumptions & Constraints:**
    - PyTorch baseline: P50 = 15ms, P99 = 45ms.
    - TensorRT fixed-shape engine has measured/estimated P50 = 8ms after fusion and static planning.
    - Tail overhead is modeled as runtime variability above the P50, not as compute that should be subtracted twice.

    **Calculations:**
    - Baseline tail overhead: 45ms - 15ms = 30ms above P50.
    - Fixed-shape TensorRT removes most dynamic overhead; assume residual tail overhead of 10ms from scheduler, memory traffic, and occasional contention.
    - New P99: TensorRT P50 8ms + residual tail overhead 10ms = 18ms.
    - New P99/P50 ratio: 18 / 8 = 2.25, versus baseline 45 / 15 = 3.0.

    **Conclusion & Interpretation:**
    - **Result: P99 drops to about 18ms.** The estimate applies TensorRT's compute reduction once, then adds a smaller residual tail overhead.
