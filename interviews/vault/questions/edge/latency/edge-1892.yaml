title: 'Jetson Orin: Latency vs. Throughput in Edge Inference Batching'
scenario: A smart city surveillance system utilizes a YOLOv7-based object detection model for real-time
  traffic analysis, processing video streams from multiple cameras. Initially, the model uses a fixed
  batch size of 1 for minimum latency per frame. During peak hours, the aggregate frame rate exceeds single-inference
  throughput, leading to queue build-up and increased end-to-end latency.
question: How would you batch and schedule multi-camera YOLOv7 to maximize effective FPS while keeping
  every frame under 100ms latency?
details:
  realistic_solution: Implement a dynamic batching strategy. Start with a minimum batch size (e.g., 1
    or 2) to maintain low latency for individual frames. Monitor the incoming request queue depth and
    GPU utilization. If the queue grows beyond a threshold or GPU utilization drops below a target (e.g.,
    80%), dynamically increase the batch size up to a predetermined maximum (e.g., 16, empirically determined
    to handle the 150 FPS peak). A scheduling policy could involve a small, fixed-size 'express lane'
    queue for single-inference high-priority frames, while a larger queue accumulates frames for dynamic
    batching.
  common_mistake: '**The Pitfall:** Implementing continuous batching without considering overheads or
    using static batching that starves latency.

    **The Rationale:** Engineers assume more complex batching is always superior, missing memory bandwidth
    constraints or framework overheads.

    **The Consequence:** Sub-optimal throughput or violating the strict 100ms per-frame latency deadline.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - Max latency budget: 100ms. Peak input: 150 FPS\
    \ (5 cameras @ 30 FPS).\n2. **Calculations:**\n   - Batch=1 latency: 20ms. Throughput = 50 FPS (fails\
    \ to meet 150 FPS input).\n   - Batch=8 latency: 60ms. Throughput = 133 FPS.\n   - Batch=16 latency:\
    \ 90ms. Throughput = 177 FPS.\n3. **Conclusion & Interpretation:**\n   - **Result: Dynamic Batching\
    \ Required.** A fixed batch size cannot handle peak arrival rates without queuing delays violating\
    \ the 100ms budget. Larger batches maximize hardware utilization and successfully clear the 150 FPS\
    \ peak arrival.\n"
