title: Robotic Arm Real-Time Inference Hardware and Scheduling Policy
scenario: 'Specify a real-time inference system for a robotic arm: control loop at 100Hz (10ms budget per cycle), vision model (object localization, 2 GOPS INT8) must complete within a 5ms hard inference deadline. Design the queueing architecture using Jetson Orin (275 TOPS INT8) or Hailo-8 (26 TOPS INT8). Ensure the system meets hard real-time constraints and specify the scheduling policy.'
question: Should the robotic arm use Jetson Orin or Hailo-8 for the 100Hz vision task, and what queueing and scheduling policy guarantees the 5ms inference deadline under the stated WCET assumptions?
details:
  realistic_solution: 'For hard real-time control, use WCET and bounded queues rather than a probabilistic P99 queue. Both devices have enough raw compute: Hailo-8 has a 76.9us compute lower bound for 2 GOPS, while Jetson Orin has a 7.3us lower bound. Choose Hailo-8 for the dedicated low-power inference path because it still leaves large margin inside the 5ms hard inference deadline without occupying a general-purpose Orin. Use a single-slot latest-frame buffer, drop/overwrite stale frames, pre-allocate all buffers, and run the inference task as a fixed-priority periodic task under rate-monotonic or deadline-monotonic scheduling. With a conservative 0.5ms WCET for accelerator execution plus DMA/runtime overhead, utilization is 0.5ms/10ms=5%, so the 100Hz periodic task is schedulable and cannot build queue backlog.'
  common_mistake: |
    **The Pitfall:** Using probabilistic SLOs (P99) for hard real-time control systems.
    **The Rationale:** Queueing theory gives probabilistic bounds, which is insufficient for real-time safety control loops.
    **The Consequence:** Missing even one deadline can cause physical damage, requiring candidates to use worst-case execution time (WCET) analysis instead.
  napkin_math: |
    **Assumptions & Constraints:**
    - Control loop budget: 100Hz (10ms period).
    - Vision model: 2 GOPS INT8, 4MB weights.
    - Hardware choices: Hailo-8 dedicated accelerator (26 TOPS, 2.5W) or Jetson Orin (275 TOPS, 60W).
    - Queue policy: single-slot latest-frame buffer; overwrite stale frames rather than FIFO backlog.

    **Calculations:**
    - Hailo-8 compute time lower bound = 2 GOPS / 26,000 GOPS/s = 76.9 μs.
    - Jetson Orin compute time lower bound = 2 GOPS / 275,000 GOPS/s = 7.3 μs.
    - Both compute lower bounds are well under the 5ms hard inference deadline; the hardware decision should therefore use WCET validation, isolation, and power rather than peak TOPS alone.
    - Conservative validated WCET budget including DMA/runtime overhead = 0.5ms.
    - Inference-deadline margin = 5ms - 0.5ms = 4.5ms.
    - Periodic utilization = 0.5ms / 10ms = 5%.
    - With one periodic inference task and a single-slot input queue, fixed-priority RMS/deadline-monotonic scheduling has no accumulated inference backlog.

    **Conclusion & Interpretation:**
    - **Result: 0.5ms Conservative WCET (Hard-Deadline Feasible)**. A dedicated Hailo-8 with latest-frame buffering and fixed-priority periodic scheduling meets the 5ms inference deadline with large margin.
