title: The Watchdog Timeout Freeze
scenario: Your autonomous drone uses a Jetson Nano. The flight controller expects a heartbeat signal from your ML perception script over UART every 200ms. If it doesn't get one, it assumes the Jetson crashed and triggers an emergency landing. Your ML inference takes 50ms. However, once a minute, the drone emergency lands. Your inference didn't crash.
question: What OS-level event stalled your script for over 200ms?
details:
  realistic_solution: The likely OS-level event is Linux memory pressure forcing direct reclaim and dirty-page writeback on the ML process path. On a Jetson Nano running standard Linux, allocating or touching memory can block while the kernel reclaims pages or writes dirty buffers to the slow SD card; in that interval the user-space heartbeat thread may not run even though inference did not crash. The fix is to pin and pre-fault inference memory with `mlockall()`, avoid allocation and logging on the control path, move logs to tmpfs or a separate worker, disable swap, and use real-time scheduling/PREEMPT_RT only after removing blocking I/O from the heartbeat path.
  common_mistake: |
    **The Pitfall:** Blaming Jetson thermal throttling.
    **The Rationale:** Candidates know edge devices run hot, but they fail to quantify that thermal throttling only slows execution by 20-30%, not enough to cause a 400% latency spike.
    **The Consequence:** Teams add cooling fans or underclock the GPU, totally failing to solve the actual Linux kernel memory/IO preemption issue crashing the drone.
  napkin_math: |
    **Assumptions & Constraints:**
       - Heartbeat deadline: 200ms.
       - Inference time: 50ms.
       - Storage: SD card (~25 MB/s sequential write speed; random writeback can be worse).
    **Calculations:**
       - Safety margin: 200ms deadline - 50ms inference = 150ms buffer.
       - A direct reclaim/writeback stall only needs to exceed 150ms to miss the heartbeat.
       - At 25 MB/s, flushing 4 MB takes 4 MB / 25 MB/s = 0.16s = 160ms before filesystem and random-I/O overheads.
    **Conclusion & Interpretation:**
       - **Result: Direct Reclaim / Dirty-Page Writeback Stall**. A small dirty-page flush or reclaim event can consume the entire 150ms margin, pushing the heartbeat past the 200ms deadline without an inference crash.
