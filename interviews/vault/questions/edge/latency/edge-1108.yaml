title: 'Edge Queueing Theory Evaluation: Coral Edge TPU vs Hailo-8 for TinyML Inference'
scenario: Compare Coral Edge TPU vs Hailo-8 for a keyword detection system with λ=1000 inf/s (short audio windows). Model requires 0.003 TOPS (3 GOPS). Analyze M/D/1 queueing for each, compute utilization, P99 latency, and total power for 10 deployed nodes.
question: For the Coral Edge TPU at λ=1000/s and μ=1333/s, what is the correct M/D/1 queue wait Wq before comparing to Hailo-8?
details:
  realistic_solution: 'With ρ=0.75 and μ=1333, the correct Wq is ~1.125ms.'
  common_mistake: Focusing purely on queueing performance rather than power and cost, failing to recognize that both platforms are massively overprovisioned for a 3 GOPS workload.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival rate (λ) = 1000/s
    - Service rate (μ) = 1333/s
    - M/D/1 queueing model

    **Calculations:**
    - Utilization (ρ) = 1000 / 1333 = 0.75
    - Wq = ρ / (2 * μ * (1 - ρ))
    - Wq = 0.75 / (2 * 1333 * 0.25) = 0.75 / 666.5 = 0.001125 s

    **Conclusion & Interpretation:**
    - **Result: 1.125 ms (Latency-Bound)**. The microscopic latency difference shows both platforms are heavily overprovisioned, making power constraints the true decision factor.
