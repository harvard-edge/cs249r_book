title: The Multi-Resolution Input Strategy
scenario: Your autonomous security patrol robot runs YOLOv8-S on a Jetson Orin NX at 640x640 input resolution, achieving 28 FPS at 22W. During summer patrols, the sealed enclosure heats up and the Orin throttles to 15W, dropping to 19 FPS — below your 25 FPS safety minimum. Your colleague proposes switching to 320x320 input when thermal throttling is detected.
question: Is switching to 320x320 under thermal throttling the right fix, and how would you design adaptive resolution to preserve safety?
details:
  realistic_solution: 'Resolution reduction affects compute quadratically for convolutional layers, but fixed system costs mean latency does not scale down linearly. While 320x320 is extremely fast, the massive drop in mAP degrades detection range below safety thresholds. The correct design dynamically scales to 480x480, recovering enough FPS to meet the real-time deadline while preserving sufficient range for the robot''s stopping distance.'
  common_mistake: Assuming 320x320 is exactly 4x faster because it has 4x fewer pixels, ignoring constant overheads, and failing to calculate the downstream impact on robotic safety margins.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original: 640x640, 28.4G FLOPs, 36ms, 22W
    - Throttled at 15W: 640x640 is 50ms (20 FPS)
    - Robot speed 2 m/s, 5m stopping distance

    **Calculations:**
    - 640 to 320 scaling: FLOPs drop by 4x (28.4G to 7.1G)
    - Total time at 15W: 320x320 = 17ms (59 FPS), 480x480 = 28ms (35 FPS)
    - Reaction time (320x320, 50m range) = 50m / 2 m/s = 25s

    **Conclusion & Interpretation:**
    - **Result: 35 FPS at 480x480 (Compute-Bound)**. Fixed overheads prevent linear latency scaling, but adapting to an intermediate 480x480 preserves sufficient detection range and meets the 25 FPS deadline.
