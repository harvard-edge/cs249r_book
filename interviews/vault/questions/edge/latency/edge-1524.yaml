title: Batching on Google Coral Edge TPU
scenario: We are deploying an INT8 object detection model on a Google Coral Edge TPU for a factory inspection line with 4 cameras running at 30 FPS. Alternative A uses Static Batching (fixed size 4). Alternative B uses Dynamic Batching (max 4, 5ms timeout). The model takes 8ms for a batch of 4 on the TPU, and 7ms for a batch of 1 because compute is nearly fixed at this small model size.
question: Should you use static batching or dynamic batching for 4 Coral TPU cameras at 30 FPS to minimize p99 latency, and why?
details:
  realistic_solution: Alternative B is better for p99 latency. The Edge TPU compiler requires fixed tensor shapes, so the implementation may need either precompiled batch-size variants or padding to a supported shape, but that does not make a host-side batching policy invalid. With a 5 ms timeout, dynamic batching bounds queueing delay and still has enough throughput even in the batch-1 worst case. Static batch 4 improves utilization, but it can make early frames wait for the fourth camera frame and therefore raises p99 latency.
  common_mistake: |
    **The Pitfall:** Recommending dynamic batching to minimize wait times for early-arriving frames.
    **The Rationale:** Treating the Edge TPU like a standard GPU and failing to realize the compiler requires fixed input tensor shapes, forcing padding anyway.
    **The Consequence:** Over-optimizing for batch utilization increases tail latency because early frames wait unnecessarily for a full batch.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4 cameras at 30 FPS = 120 FPS total (1 frame per 8.3ms).
    - Static batch 4 time: 8 ms.
    - Dynamic batching uses max batch 4 with a 5 ms timeout; worst case is batch 1 at 7 ms.

    **Calculations:**
    - Static batch 4 capacity = (1000 ms / 8 ms) * 4 = 500 FPS, so throughput is sufficient.
    - Static p99 queueing can approach one camera period if a frame waits for the batch to fill: ~33.3 ms + 8 ms = ~41.3 ms.
    - Dynamic batch 1 worst-case capacity = (1000 ms / 7 ms) * 1 = ~142 FPS, still above the 120 FPS requirement.
    - Dynamic p99 latency bound is about 5 ms timeout + 7 ms compute = ~12 ms in the batch-1 case.

    **Conclusion & Interpretation:**
    - **Result: dynamic batching minimizes p99 latency.** Static batching is throughput-safe but can add tens of milliseconds of queueing; the 5 ms timeout keeps tail latency low without missing the 120 FPS target.
