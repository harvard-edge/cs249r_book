title: 'Edge Queueing Theory Fluency: M/M/1 Metrics at Critical Utilization'
scenario: 'A Hailo-8 (26 TOPS INT8, 2.5W) is running vehicle detection (10 GOPS/frame) at an initial arrival rate of λ=182 inf/s (ρ=0.07).'
question: 'What are Wq, W, and P99 for Hailo-8 vehicle detection at 70%, 90%, and 99% utilization, and where is the latency knee?'
details:
  realistic_solution: 'Fix μ and vary λ. Knee of curve is between ρ=0.8 and ρ=0.9 where Wq grows 4-5x. Design target should maintain ρ ≤ 0.7 to ensure system responsiveness and prevent queue explosions.'
  common_mistake: 'Not recognizing the non-linear relationship between utilization and latency in queueing systems. Systems provisioned into the danger zone above 80% utilization suffer hyperbolic latency growth.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8 compute: 26 TOPS, 10 GOPS/frame = 2600 inf/s (μ).

    **Calculations:**
    - ρ=0.7 (λ=1820): Wq = 0.70 / (2600 - 1820) = 0.898 ms, W = 1.28 ms, P99 = 5.9 ms.
    - ρ=0.9 (λ=2340): Wq = 0.90 / (2600 - 2340) = 3.46 ms, W = 3.85 ms, P99 = 17.7 ms.
    - ρ=0.99 (λ=2574): Wq = 0.99 / (2600 - 2574) = 38.1 ms, W = 38.5 ms, P99 = 177 ms.
    - Wq jumps: ρ0.9/ρ0.7 = 3.85x, ρ0.99/ρ0.9 = 11x.

    **Conclusion & Interpretation:**
    - **Result: Hyperbolic Latency Growth (Compute-Bound)**. Running above 80% utilization causes exponential latency degradation in M/M/1 systems.
