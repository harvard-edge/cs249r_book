title: Hailo-8 M/M/1 Latency at 70, 90, and 99 Percent Utilization
scenario: A Hailo-8 (26 TOPS INT8, 2.5W) is running vehicle detection at 10 GOPS/frame, giving a service rate of μ=2600 inferences/s. Evaluate arrival rates corresponding to 70%, 90%, and 99% utilization.
question: What are Wq, W, and P99 for Hailo-8 vehicle detection at 70%, 90%, and 99% utilization, and where is the latency knee?
details:
  realistic_solution: For μ=2600 inf/s, use λ=ρμ and M/M/1 results Wq=ρ/(μ-λ), W=1/(μ-λ), and P99≈ln(100)/(μ-λ). At 70% utilization, λ=1820 inf/s, Wq=0.90 ms, W=1.28 ms, and P99=5.9 ms. At 90%, λ=2340 inf/s, Wq=3.46 ms, W=3.85 ms, and P99=17.7 ms. At 99%, λ=2574 inf/s, Wq=38.1 ms, W=38.5 ms, and P99=177 ms. The knee is around 80-90% utilization; above that, latency grows hyperbolically as ρ approaches 1.
  common_mistake: |
    **The Pitfall:** Not recognizing the non-linear relationship between utilization and latency in queueing systems.
    **The Rationale:** Candidates incorrectly assume linear scaling.
    **The Consequence:** Systems provisioned into the danger zone above 80% utilization suffer hyperbolic latency growth.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8 compute: 26 TOPS, 10 GOPS/frame = 2600 inf/s (μ).

    **Calculations:**
    - M/M/1 formulas: ρ=λ/μ, Wq=ρ/(μ-λ), W=1/(μ-λ), P99≈ln(100)/(μ-λ).
    - ρ=0.7 (λ=1820): Wq = 0.70 / (2600 - 1820) = 0.000898 s = 0.90 ms, W = 1 / 780 = 1.28 ms, P99 = 4.605 / 780 = 5.9 ms.
    - ρ=0.9 (λ=2340): Wq = 0.90 / (2600 - 2340) = 0.00346 s = 3.46 ms, W = 1 / 260 = 3.85 ms, P99 = 4.605 / 260 = 17.7 ms.
    - ρ=0.99 (λ=2574): Wq = 0.99 / (2600 - 2574) = 0.0381 s = 38.1 ms, W = 1 / 26 = 38.5 ms, P99 = 4.605 / 26 = 177 ms.
    - Wq jumps: ρ0.9/ρ0.7 = 3.9x, ρ0.99/ρ0.9 = 11x.

    **Conclusion & Interpretation:**
    - **Result: Hyperbolic Latency Growth (Compute-Bound)**. Running above roughly 80-90% utilization causes latency to rise rapidly as ρ approaches 1, so a design target near or below 70% utilization leaves much more tail-latency margin.
