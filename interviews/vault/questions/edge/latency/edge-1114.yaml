title: 'Edge Queueing Theory Implement: Little''s Law for Edge Buffer Sizing'
scenario: Implement a buffer size calculation using Little's Law for a Jetson Orin edge gateway. The system serves 8 IP cameras at 30 FPS each (λ=240 frames/s). Inference (μ=300 frames/s). Maximum acceptable latency W=100ms. Assume 640x480 RGB images at FP16.
question: Is the gateway stable, and what buffer size in frames and MB satisfies Little's Law for the 100ms latency maximum?
details:
  realistic_solution: 'First verify stability: λ=240 fps and μ=300 fps, so ρ=0.8<1 and the gateway has enough average service capacity. Little''s Law: L = λ * W = 240 * 0.1 = 24 frames maximum resident in the system at the 100ms latency limit. Size the buffer for 24 frames under this prompt''s conservative buffer-sizing assumption. Image size: 640*480*3*2 bytes (RGB FP16) = 1.843 MB per frame. Buffer: 24 * 1.843 MB = 44.2 MB. This trivially fits in 32 GB LPDDR5, but the buffer should still be capped by the latency SLO rather than by available memory.'
  common_mistake: |
    **The Pitfall:** Using system capacity (32GB LPDDR5) as the buffer size without considering latency SLOs.
    **The Rationale:** A massive buffer prevents dropped frames but allows queueing delays that violate the strict 100ms maximum latency constraint.
    **The Consequence:** The system successfully processes every frame, but the output is delayed past the real-time deadline, rendering the system useless.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival rate λ = 240 fps, service rate μ = 300 fps, Latency max W = 100ms.
    - Frame size: 640x480x3 channels at FP16 (2 bytes) = 1.843 MB.

    **Calculations:**
    - Stability check: ρ = λ / μ = 240 / 300 = 0.8 < 1, so the queue is stable on average.
    - Little's Law (Max allowed buffer): L_max = λ * W = 240 * 0.1 = 24 frames.
    - Buffer size = 24 frames * 1.843 MB = 44.2 MB.

    **Conclusion & Interpretation:**
    - **Result: stable at ρ=0.8, with a 24-frame or 44.2MB max buffer.** Queueing size directly binds the real-time latency deadline.
