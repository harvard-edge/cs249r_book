title: The Real-Time Batching Tax
scenario: 'An edge device is processing a video stream from a factory assembly line, with a hard real-time deadline of 33ms per frame to detect defects. To improve overall processing capacity, your team suggests batching incoming frames.'
question: What is the fundamental trade-off you must immediately identify for a real-time system like this?
details:
  realistic_solution: The primary trade-off is between throughput and latency. While batching increases the system's overall throughput (more frames processed per second), it unavoidably increases the latency for each individual frame. The first frame in a batch is delayed by the time it takes to collect the rest of the frames for that batch. This 'queuing delay' can easily cause the system to miss its real-time deadline.
  common_mistake: |
    **The Pitfall:** Viewing batching as a "free" throughput boost.
    **The Rationale:** Engineers from cloud backgrounds forget that in a real-time continuous stream, queuing delays compound latency.
    **The Consequence:** Creating a batch forces the first frame to wait for the last frame, directly violating the deadline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame interval at 30 FPS = 33.3ms.
    - Target deadline = 33ms.
    - Single frame compute = ~20ms.

    **Calculations:**
    - Wait time for 2nd frame = 33ms.
    - Compute for batch of 2 = ~35ms.
    - Total latency for 1st frame = 33ms + 35ms = 68ms.

    **Conclusion & Interpretation:**
    - **Result: Latency of 68ms exceeds the 33ms deadline (Latency-Bound)**. Real-Time Constraint violated by queuing delay.
  options:
  - 'It strictly improves throughput by amortizing computation, with no significant impact on individual frame latency.'
  - 'It primarily reduces the power consumption of the edge device by increasing utilization.'
  - 'It increases system throughput but also increases the processing latency for every single frame.'
  - 'It mainly increases the required on-chip memory, which is the key constraint.'
