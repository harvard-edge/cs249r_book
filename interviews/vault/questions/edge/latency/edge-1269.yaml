title: Architecting a Vision-Language Pipeline on Jetson Orin
scenario: Your team is building an autonomous robot navigation system utilizing a 4-billion parameter Vision-Language Model (VLM) for real-time hazard detection. The system is deployed on an NVIDIA Jetson Orin. Product requirements mandate an end-to-end latency of under 150ms per frame from camera sensor to control output.
question: How would you decompose the VLM pipeline so a 4B model meets the 150 ms sensor-to-control latency budget, and how do you map it to hardware?
details:
  realistic_solution: Architect a rigorously decomposed heterogeneous pipeline. Delegate spatial processing (image resizing, normalization) to dedicated ISP hardware. Pin the vision encoder backbone to the onboard DLA (Deep Learning Accelerator). This strategic isolation frees 100% of the primary Ampere GPU and unified memory bandwidth to exclusively handle the memory-bound auto-regressive generation of the LLM decoder, ensuring the TPOT (Time Per Output Token) meets the deadline.
  common_mistake: |
    **The Pitfall:** Blindly mapping the entire VLM monolith to the primary GPU.
    **The Rationale:** Candidates view the GPU as the universal compute sledgehammer, ignoring the dedicated ASICs present on modern edge SoCs.
    **The Consequence:** The vision encoder and preprocessing stages steal critical memory bandwidth from the LLM decoder, destroying the generation throughput and missing the 150ms hard deadline.
  napkin_math: |
    **Assumptions & Constraints:**
    - End-to-end budget: 150ms
    - Required control tokens: 3
    - Target TPOT = 25ms/token (40 tokens/sec)
    - Memory bandwidth available: ~204 GB/s

    **Calculations:**
    - I/O & Preprocessing (Hardware ISP): 15ms
    - TTFT (Vision Encoding on DLA): 60ms
    - Remaining time for Generation: 150ms - 15ms - 60ms = 75ms
    - Required Memory BW for 4B INT8 Model at 40 Hz = 4 GB * 40 = 160 GB/s

    **Conclusion & Interpretation:**
    - **Result: 160 GB/s (Memory-Bandwidth Bound)**. Isolating the LLM decoder to the GPU ensures the 160 GB/s requirement fits within the 204 GB/s hardware ceiling.
