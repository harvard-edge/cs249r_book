title: 'Interrupt Latency Spikes in Real-Time Edge Inference'
scenario: 'A Hailo-8 edge device runs ResNet-50 inference triggered by sensor interrupts. Average inference latency is 3ms but P99 is 40ms. The device also handles network I/O and a logging daemon. The 40ms tail correlates with network packet bursts.'
question: 'Why does Hailo-8 ResNet-50 P99 latency hit 40ms during network bursts, and how would you reduce the host-side tail latency?'
details:
  realistic_solution: 'Isolate CPU cores: dedicate one core to inference request dispatching using CPU affinity, disable interrupt coalescing for the inference trigger, and move network I/O to a separate core. Use a real-time scheduling policy (SCHED_FIFO) for the inference dispatch thread.'
  common_mistake: |
    **The Pitfall:** Attributing the tail latency to the Hailo-8 inference engine itself.
    **The Rationale:** Assuming that slow inference must mean the NPU is struggling.
    **The Consequence:** Wasting time tuning the model when the latency comes entirely from host CPU queueing and OS interrupt handling.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Hailo-8 (26 TOPS).
    - Model: ResNet-50 (4 GOPs).
    - Network burst: 1 Gbps.

    **Calculations:**
    - Network Burst: A burst at 1Gbps lasts ~100us per 12.5KB packet.
    - Accelerator Speed: 4 GOPs / 26 TOPS = 0.15ms.
    - Queueing Delay: If logging daemon holds CPU for 5ms, inference waits 5ms.

    **Conclusion & Interpretation:**
    - **Result: 40ms P99 (CPU-Scheduling Bound)**. The accelerator is clearly not the bottleneck; host CPU scheduling and interrupt delays cause the 40ms P99 spikes.
