title: 'Latency Decomposition: Compare TFLite vs. TensorRT Inference Latency on Jetson Orin'
scenario: 'A MobileNetV3-Large model (5.4M params, 224x224 input) is deployed on Jetson Orin (275 TOPS INT8, 60W). Two runtimes are evaluated for deployment: TFLite with GPU delegate versus TensorRT with FP16.'
question: For MobileNetV3-Large on Jetson Orin, how do TFLite GPU delegate and TensorRT FP16 compare in end-to-end inference latency and overhead?
details:
  realistic_solution: |
    TensorRT FP16 typically wins because it compiles larger fused kernels and reduces runtime dispatch overhead. Treat the ~2ms TensorRT and ~5ms TFLite numbers as empirical end-to-end estimates for this deployment: raw FP16 compute is only about 0.011ms at peak, so the observed gap is dominated by memory movement, fusion quality, and per-op dispatch rather than arithmetic throughput.
  common_mistake: |
    **The Pitfall:** Assuming TFLite GPU delegate achieves full GPU utilization.
    **The Rationale:** Forgetting that TFLite's kernel fragmentation and op-by-op dispatch add significant overhead compared to TensorRT's fused kernels.
    **The Consequence:** Grossly underestimating the end-to-end inference latency in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: MobileNetV3-Large, 219M MACs.
    - Counting convention: 1 MAC = 2 FLOPs, so 219M MACs = 438M FLOPs = 0.438 GFLOPs.
    - Hardware: Orin GPU FP16 peak, about 40 TFLOP/s = 40,000 GFLOP/s.
    - TensorRT and TFLite latencies below are empirical deployment estimates, not derived solely from peak FLOPs.

    **Calculations:**
    - Raw compute lower bound = 0.438 GFLOPs / 40,000 GFLOP/s = 0.00001095s = 0.011ms.
    - TensorRT empirical time, including memory ops and fused kernels: about 2ms.
    - TFLite GPU delegate dispatch estimate: 150 kernel launches * 0.02ms/launch = 3ms.
    - TFLite empirical total estimate: 2ms fused-kernel-equivalent work + 3ms dispatch/fragmentation overhead = 5ms.

    **Conclusion & Interpretation:**
    - **Result: TensorRT about 2ms vs TFLite about 5ms (Runtime-Overhead-Bound)**. The compute lower bound is negligible; the comparison is grounded in empirical overhead and fusion differences.
