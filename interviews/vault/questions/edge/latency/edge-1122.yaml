title: 'Edge Queueing Theory Realization: Jetson Orin Memory vs Compute Bottleneck'
scenario: You are serving EfficientNet-B4 (INT8, 1.2 GOPS, 18 MB weights) on a Jetson Orin at batch=1 and 100 req/s. Assume the weights are loaded once and stay resident in device memory; profiler estimates 25 MB of per-request activation and feature-map DRAM traffic.
question: Concretely determine whether a Jetson Orin serving EfficientNet-B4 at batch=1 is compute-bound or memory-bandwidth-bound at 100 req/s, and what are the resulting M/D/1 metrics?
details:
  realistic_solution: Do not charge the 18 MB weights as a fresh transfer on every request; at batch=1 they are normally resident and reused. Under the stated profiler estimate, compute time is 1.2 GOPS / 275 TOPS = 0.0044 ms, while per-request activation/feature-map traffic takes 25 MB / 102.4 GB/s = 0.244 ms, so this simplified model is memory-traffic-bound. For deterministic service S=0.244 ms and λ=100/s, ρ=0.0244. The M/D/1 mean queueing delay is Wq=λS^2/(2(1-ρ))≈0.0031 ms, and mean response time is W≈0.247 ms.
  common_mistake: |
    **The Pitfall:** Using peak TOPS to determine service time at batch size 1.
    **The Rationale:** Candidates fail to realize that inference for small batch sizes is almost universally bound by memory bandwidth, not compute.
    **The Consequence:** Overestimating system throughput by orders of magnitude and misdiagnosing latency bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
       - Model: EfficientNet-B4 (18 MB INT8 weights resident on device, 1.2 GOPS/request).
       - Per-request DRAM traffic: 25 MB activation and feature-map traffic.
       - Hardware: Jetson Orin (275 TOPS, 102.4 GB/s bandwidth).
       - Load: 100 requests/second at batch size 1.
    **Calculations:**
       - Compute time: 1.2 GOPS / 275,000 GOPS = 0.00436 ms.
       - Per-request memory traffic time: 25 MB / 102,400 MB/s = 0.244 ms.
       - Service time (S): Max(Compute, Memory) ≈ 0.244 ms.
       - Utilization (\rho): 100 req/s * 0.000244 s/req = 0.0244 (2.44%).
       - M/D/1 mean queue wait: Wq = λS^2 / (2*(1-ρ)) = 100*(0.000244^2)/(2*0.9756) = 0.0031 ms.
       - Mean response time: W = S + Wq = 0.247 ms.
    **Conclusion & Interpretation:**
       - **Result: Memory-Traffic-Bound Under the Stated Profiler Model**. The bottleneck is per-request activation traffic, not reloading resident weights; utilization is still low at about 2.44%.
