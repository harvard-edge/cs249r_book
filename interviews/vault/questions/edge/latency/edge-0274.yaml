title: The Perception Pipeline's Deadline
scenario: A camera feeds a 30 FPS stream (33.3ms interval). The model averages 25ms. Hard deadline is 33ms.
question: Is the 30 FPS system safe for a hard 33 ms deadline if the model averages 25 ms per frame?
details:
  realistic_solution: No, the system is not safe. While the average service time (25ms) is below the deadline (33ms), the system's utilization is far too high for a hard real-time workload, creating immense queueing delays.
  common_mistake: |
    **The Pitfall:** Comparing average inference time directly to the deadline without considering queueing delays.
    **The Rationale:** Engineers assume deterministic, average-case execution without accounting for the non-linear growth of wait times as utilization increases.
    **The Consequence:** Ignoring queueing theory causes tail latency (P99, P99.9) to skyrocket, leading directly to missed safety deadlines and physical collisions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival rate = 30 FPS (33.3ms).
    - Service time = 25ms.
    - Hard deadline = 33ms.

    **Calculations:**
    - Utilization (ρ) = 25 / 33.3 = 0.75.
    - Queue delay (M/D/1) = (ρ / (2*(1-ρ))) * 25ms = (0.75 / 0.5) * 25 = 37.5ms.
    - Total average = 62.5ms.
    - P99 > 180ms.

    **Conclusion & Interpretation:**
    - **Result: P99 > 180ms (Queue-Bound)**. Average processing time masks fatal queuing delays in high-utilization hard real-time systems.
  options:
  - Yes, it's safe. The average processing time of 25ms is less than the 33ms deadline.
  - No, it's unsafe. The 75% utilization is too high, causing queue delays that will violate the hard real-time deadline.
  - Yes, it's safe. It can process 40 frames per second (1000ms / 25ms), which is more than the required 30 FPS.
  - No, it's unsafe because the system utilization is over 100% (33.3ms / 25ms).
