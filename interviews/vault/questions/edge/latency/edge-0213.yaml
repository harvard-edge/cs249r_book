title: The Voice Assistant's First Word
scenario: You are designing the voice assistant for a new self-driving car's infotainment system. The model runs on an edge processor inside the vehicle.
question: To ensure the driver perceives the system as highly responsive and 'instant', which of the following metrics is the most critical to minimize?
details:
  realistic_solution: Radically optimize for Time To First Token (TTFT). For streaming interactive voice models, TTFT is the singular metric defining user-perceived "lag." Emphasize architectural optimizations like caching prompt structures and lowering the initial KV-cache population latency over pure generational throughput.
  common_mistake: |
    **The Pitfall:** Over-indexing on bulk throughput metrics like tokens/second or overall Time Per Output Token (TPOT).
    **The Rationale:** Candidates mistakenly apply offline batch-processing instincts to highly interactive, streaming UI requirements.
    **The Consequence:** Building an assistant with blistering text generation that still feels broken and delayed to the human user due to an agonizingly long initial compute phase.
  napkin_math: |
    **Assumptions & Constraints:**
    - User Expectation: Instant verbal feedback
    - System A: TTFT 1500ms, TPOT 20ms
    - System B: TTFT 300ms, TPOT 50ms

    **Calculations:**
    - System A Initial Silence = 1.5 seconds
    - System B Initial Silence = 0.3 seconds

    **Conclusion & Interpretation:**
    - **Result: TTFT (Latency-Bound)**. System B provides a superior UX despite having 2.5x slower generation throughput.
  options:
    - 'Time Per Output Token (TPOT)'
    - 'Time To First Token (TTFT)'
    - 'End-to-End Generation Time'
    - 'Achieved Batch Throughput (requests/sec)'
