title: 'Optimizing Object Detection on Jetson Orin: Dynamic Batching for Throughput and Latency'
scenario: You are deploying a real-time object detection model on an NVIDIA Jetson Orin to process a 4K video stream at 30 FPS. The primary objective is to maximize detection throughput while maintaining an end-to-end inference latency under 50ms per frame. The initial deployment uses a fixed static batch size of 1. However, profiling reveals that the GPU is underutilized, and increasing the batch size improves throughput but significantly exceeds the latency target for some frames.
question: Which batching strategy and scheduling policy would you use for 4K30 object detection to maximize throughput while keeping latency under 50 ms?
details:
  realistic_solution: |
    For a single 4K30 stream with a <50 ms per-frame target, use batch size 1 as the default policy and maximize utilization through pipelining rather than waiting to form larger batches. Keep decode, preprocessing, inference, and postprocessing in separate asynchronous stages with CUDA streams or DeepStream pipeline queues so the GPU can work on frame N while the CPU or media blocks handle adjacent frames. Allow only small bounded batching if measured headroom exists: for example, batch 2 only when queue depth is already nonzero and the oldest frame can still finish under 50 ms. Drop or skip low-priority frames rather than letting the queue grow beyond the latency budget. Track latency percentiles, queue age, GPU utilization, and power throttling, and immediately return to batch 1 when tail latency approaches the limit.
  common_mistake: |
    **The Pitfall:** Assuming static large batching always maximizes throughput safely, or that a batch size of 1 is the only way to achieve low latency.
    **The Rationale:** Candidates fail to balance finite CUDA cores and queueing theory, ignoring that large batches introduce tail latency via increased processing time.
    **The Consequence:** Either severe underutilization of the edge GPU (with batch size 1) or missed 50ms latency SLAs for frames trapped at the end of a large batch.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target throughput: 30 FPS (frame arrival every ~33.3ms).
    - Target latency: < 50ms.
    - Inference time batch=1: 40ms.
    - Inference time batch=2: 60ms.
    - Transfer/preprocessing stages are overlapped with inference and measured separately.

    **Calculations:**
    - Static Batch=1 Throughput: 1 frame / 40ms = 25 FPS (misses 30 FPS target, meets latency).
    - Pipelined Batch=1 can still accept 30 FPS if adjacent stages overlap and inference latency remains 40ms; end-to-end latency is bounded by the slowest frame path, not by serial stage sums.
    - Static Batch=2 Throughput: 2 frames / 60ms = 33.3 FPS, but the oldest frame waits for batching plus 60ms inference, so it misses the <50ms target.

    **Conclusion & Interpretation:**
    - **Result: prefer batch 1 with asynchronous pipeline overlap.** Use bounded batch 2 only when queue-age checks prove every frame still finishes under 50 ms; otherwise batching trades throughput for unacceptable tail latency.
