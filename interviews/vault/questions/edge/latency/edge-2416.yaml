title: Coral TPU Batching Effect on Queue Stability
scenario: A 4-lane traffic-monitoring pipeline on an Edge TPU runs YOLOv5n at a fixed resolution. Per-frame service time is 25 ms for batch-of-1, 32 ms for batch-of-2, and 48 ms for batch-of-4. Frames arrive Poisson at 60 fps aggregated across the four lanes. The system must hold a 95th-percentile response time under 80 ms to satisfy a downstream signal-control SLA.
question: Evaluate whether batch-of-1, batch-of-2, or batch-of-4 best satisfies the 60 fps arrival rate at the 80 ms p95 SLA using M/D/1 queueing theory?
details:
  realistic_solution: |
    Model the server at the batch level, then add batch-formation delay back to each frame. For batch-of-1, service time is 25 ms, so capacity is 40 fps and rho = 60/40 = 1.5; the queue is unstable and cannot satisfy any p95 SLA.

    For batch-of-2, batches arrive at about 30 batches/s and service time is 32 ms, so rho = 30 * 0.032 = 0.96. The M/D/1 mean queue wait is lambda_b * s^2 / (2 * (1 - rho)) = 30 * 0.032^2 / (2 * 0.04) = 384 ms before service. Even before adding fill delay, this fails the 80 ms p95 target.

    For batch-of-4, batches arrive at about 15 batches/s and service time is 48 ms, so rho = 15 * 0.048 = 0.72. The M/D/1 mean queue wait is 15 * 0.048^2 / (2 * 0.28) ~= 62 ms. A frame also waits for batch formation: average fill wait is roughly (B - 1) / (2 * lambda) = 3 / 120 = 25 ms, and the first frame in a batch often waits about 3 / 60 = 50 ms before service. Mean response is already about 62 + 25 + 48 = 135 ms, and a substantial fraction of frames exceed 80 ms from fill plus service alone. Static batching therefore does not meet the p95 SLA at 60 fps; reduce offered load, lower model cost, or use faster hardware.
  common_mistake: |
    **The Pitfall:** Picking the largest batch for the highest throughput ceiling.
    **The Rationale:** Candidates ignore the fill-time penalty required to assemble the batch.
    **The Consequence:** A batch-of-4 forces the first arriving frame to wait for three more arrivals, adding ~50 ms of pure waiting, blowing the 80 ms SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Poisson arrival rate: lambda = 60 fps.
    - Service times: B=1 (25ms), B=2 (32ms), B=4 (48ms).

    **Calculations:**
    - B=1: rho = 1.5 (unstable).
    - B=2: lambda_b = 30 batches/s, rho = 30 * 0.032 = 0.96, mean W_q = 30 * 0.032^2 / (2 * 0.04) = 384 ms.
    - B=4: lambda_b = 15 batches/s, rho = 15 * 0.048 = 0.72, mean W_q = 15 * 0.048^2 / (2 * 0.28) ~= 62 ms.
    - B=4 average fill wait ~= 3 / (2 * 60) = 25 ms; mean response ~= 62 + 25 + 48 = 135 ms.
    - B=4 first-frame fill wait is often about 3 / 60 = 50 ms, so fill + service alone is about 98 ms for many frames.

    **Conclusion & Interpretation:**
    - **Result: no static batch size meets p95 < 80 ms**. B=1 is unstable, B=2 is near saturation with very large queueing delay, and B=4 has enough throughput but too much fill plus queueing latency.
