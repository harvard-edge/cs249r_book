title: Real-Time Inference Pipeline Specification for Autonomous Drone on Jetson Orin
scenario: 'Design a real-time inference pipeline for an autonomous delivery drone using Jetson Orin NX (60W MODE). The pipeline must: (1) detect obstacles at 60fps (depth camera, 640x480), (2) run semantic segmentation at 10fps (for path planning), (3) run localization network at 100Hz.'
question: How would you allocate GPU, DLA, and other compute for the drone's 60fps detection, 10fps segmentation, and 100Hz localization within 60W?
details:
  realistic_solution: Offload the high-frequency 60fps obstacle detector to the DLA, which frees the Ampere GPU for semantic segmentation and localization. The detection workload consumes about 12% of one DLA timeline at 2ms per frame. The GPU workloads consume about 30% of one GPU timeline if segmentation takes 20ms at 10fps and localization takes 1ms at 100Hz. This allocation leaves scheduling and thermal headroom under the 60W envelope, so the pipeline is feasible rather than power-bound.
  common_mistake: |
    **The Pitfall:** Allocating GPU to all tasks simultaneously without utilizing the DLA.
    **The Rationale:** Engineers default to scheduling purely on the general-purpose GPU, forgetting about domain-specific edge accelerators.
    **The Consequence:** The GPU saturates quickly, limiting burst capacity and increasing overall power draw compared to using the highly efficient DLA for the highest-frequency detection tasks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Orin NX budget: 60W.
    - Detection: 60fps on DLA (2ms/frame, 5W).
    - Segmentation: 10fps on GPU (20ms/frame).
    - Localization: 100Hz on GPU (1ms/frame).
    - GPU/DLA/software overheads are not modeled as linearly duty-cycle-scaled power.

    **Calculations:**
    - Detection DLA utilization: 60 * 2ms = 120ms/s = 12% of one DLA timeline.
    - Segmentation GPU utilization: 10 * 20ms = 200ms/s = 20% of one GPU timeline.
    - Localization GPU utilization: 100 * 1ms = 100ms/s = 10% of one GPU timeline.
    - Combined GPU scheduled time: 200ms/s + 100ms/s = 300ms/s = 30%, leaving about 70% GPU time for pre/post-processing and bursts.
    - A DLA/GPU split keeps both accelerators below saturation; actual board power should be verified by profiling in the 60W mode.

    **Conclusion & Interpretation:**
    - **Result: Feasible with Headroom**. The pipeline fits the stated frame-rate requirements with DLA at about 12% and GPU at about 30% scheduled utilization, so the design should fit within 60W after profiling rather than being power-bound.
