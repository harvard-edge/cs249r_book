title: Real-Time Inference Pipeline Specification for Autonomous Drone on Jetson Orin
scenario: 'Design a real-time inference pipeline for an autonomous delivery drone using Jetson Orin NX (60W MODE). The pipeline must: (1) detect obstacles at 60fps (depth camera, 640x480), (2) run semantic segmentation at 10fps (for path planning), (3) run localization network at 100Hz.'
question: How would you allocate GPU, DLA, and other compute for the drone's 60fps detection, 10fps segmentation, and 100Hz localization within 60W?
details:
  realistic_solution: Offload the high-frequency 60fps obstacle detection to the DLA, which frees up the general-purpose Ampere GPU. The DLA executes YOLOv8-n efficiently (~2ms/frame, 5W). Run the heavier semantic segmentation (DeepLabV3+) and localization CNN on the GPU. This prevents GPU saturation and leaves significant thermal headroom for burst workloads, keeping total power draw well under the 60W envelope.
  common_mistake: |
    **The Pitfall:** Allocating GPU to all tasks simultaneously without utilizing the DLA.
    **The Rationale:** Engineers default to scheduling purely on the general-purpose GPU, forgetting about domain-specific edge accelerators.
    **The Consequence:** The GPU saturates quickly, limiting burst capacity and increasing overall power draw compared to using the highly efficient DLA for the highest-frequency detection tasks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Orin NX budget: 60W.
    - Detection: 60fps on DLA (2ms/frame, 5W).
    - Segmentation: 10fps on GPU (20ms/frame, 25W full load).
    - Localization: 100Hz on GPU (1ms/frame).
    - System baseline power: ~10W.

    **Calculations:**
    - Detection (DLA): 60 * 2ms = 120ms/s (12% active). Power = ~5W.
    - Segmentation (GPU): 10 * 20ms = 200ms/s (20% active). Power = 20% * 25W = 5W.
    - Localization (GPU): 100 * 1ms = 100ms/s (10% active). Power = 10% * 25W = 2.5W.
    - Total Power = 5W + 5W + 2.5W + 10W = 22.5W.

    **Conclusion & Interpretation:**
    - **Result: 22.5W (Power-Bound)**. The pipeline fits well within the 60W limit, drawing only 22.5W and leaving 37.5W headroom for dynamic burst scaling.
