title: Tail Latency on Edge with Thermal Throttling
scenario: Your Jetson Orin runs a real-time object detection model with P50 = 12ms and P99 = 85ms. The P99 spikes correlate with ambient temperature exceeding 35°C. The Orin throttles down clock speeds under thermal constraints.
question: How do you maintain P99 below 25ms within the 60W power budget?
details:
  realistic_solution: 'Three-pronged approach: (1) Thermal-aware scheduling — monitor junction temperature and switch to a lighter model variant (e.g., YOLOv8-S instead of YOLOv8-M) when temp exceeds 80°C, before hardware throttling kicks in. The lighter model runs at 8ms even at reduced clocks. (2) DLA offload — move backbone inference to the Orin''s dual DLAs, which have separate thermal domains and don''t throttle as aggressively. (3) Frame skipping with interpolation — at thermal limit, process every 2nd frame and interpolate bounding boxes, effectively halving compute load while maintaining apparent real-time output. Combined, P99 drops to ~20ms even under sustained thermal pressure.'
  common_mistake: |
    **The Pitfall:** Trying to solve thermal throttling with better cooling alone.
    **The Rationale:** Candidates approach hardware limits with physical solutions, forgetting the strict constraints of edge devices.
    **The Consequence:** Unmitigated P99 latency spikes (85ms) during sustained load as the hardware aggressively downclocks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Observed baseline: P50 = 12ms and thermal P99 = 85ms.
    - Target: P99 below 25ms within the 60W budget.
    - Mitigation combines proactive model switch, DLA offload for supported subgraphs, and frame skipping/interpolation at the thermal limit.

    **Calculations:**
    - The observed tail amplification is 85ms / 12ms = 7.1x, so the problem is throttling plus queueing, not just slower compute.
    - To meet the target, tail latency must drop by at least 85ms - 25ms = 60ms, or 25 / 85 = 29% of the current P99.
    - A lighter 8ms model leaves about 25ms - 8ms = 17ms for queueing, DLA/GPU handoff, and scheduling overhead.
    - Processing every second frame under thermal pressure halves arrival pressure on the inference queue, which directly attacks the queueing component that makes P99 much larger than P50.

    **Conclusion & Interpretation:**
    - **Result: target P99 below 25ms is plausible only if the mitigation removes queue buildup, not from a simple TOPS scaling estimate.** The expected operating point is roughly 20-25ms after the lighter model and queue-control policy are active.
