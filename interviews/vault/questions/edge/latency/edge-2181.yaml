title: Tail Latency on Edge with Thermal Throttling
scenario: Your Jetson Orin runs a real-time object detection model with P50 = 12ms and P99 = 85ms. The P99 spikes correlate with ambient temperature exceeding 35°C. The Orin throttles down clock speeds under thermal constraints.
question: How do you maintain P99 below 25ms within the 60W power budget?
details:
  realistic_solution: 'Three-pronged approach: (1) Thermal-aware scheduling — monitor
    junction temperature and switch to a lighter model variant (e.g., YOLOv8-S instead
    of YOLOv8-M) when temp exceeds 80°C, before hardware throttling kicks in. The
    lighter model runs at 8ms even at reduced clocks. (2) DLA offload — move backbone
    inference to the Orin''s dual DLAs, which have separate thermal domains and don''t
    throttle as aggressively. (3) Frame skipping with interpolation — at thermal limit,
    process every 2nd frame and interpolate bounding boxes, effectively halving compute
    load while maintaining apparent real-time output. Combined, P99 drops to ~20ms
    even under sustained thermal pressure.'
  common_mistake: |
    **The Pitfall:** Trying to solve thermal throttling with better cooling alone.
    **The Rationale:** Candidates approach hardware limits with physical solutions, forgetting the strict constraints of edge devices.
    **The Consequence:** Unmitigated P99 latency spikes (85ms) during sustained load as the hardware aggressively downclocks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Normal state: 275 TOPS, 12ms latency.
    - Throttled state: 180 TOPS (65% capacity).
    - Light model variant: 3x fewer FLOPs.
    - DLA offload: Backbone takes 10ms on DLA, 3ms on GPU.

    **Calculations:**
    - Throttled Latency (Queuing impact): 12ms / 0.65 ≈ 18.5ms base (observed 85ms due to queuing).
    - Light Model Latency (Throttled): 4ms base / 0.65 ≈ 6.2ms.
    - DLA Offload Latency: 10ms (DLA) + 3ms (throttled GPU) = 13ms.

    **Conclusion & Interpretation:**
    - **Result: P99 reduced to ~20ms under thermal pressure (Thermal-Bound).**
