title: Jetson Orin Five-Stage Pipeline Mean Latency
scenario: You are sizing the end-to-end latency for a Jetson Orin running a 5-stage autonomous vehicle pipeline at 30 FPS. The stages are camera capture (1ms), ISP (3ms), preprocessing (5ms), inference (15ms), postprocessing (2ms).
question: What is the mean G/D/1 latency for the pipeline, and which stage should be optimized first?
details:
  realistic_solution: Use a G/D/1 mean-delay approximation with Poisson-like arrivals (c_a^2=1), deterministic service, and Wq≈ρS/(2(1-ρ)) per stage. At 30 FPS, the stage utilizations are 0.03, 0.09, 0.15, 0.45, and 0.06. The mean stage response times are about 1.02ms, 3.15ms, 5.44ms, 21.14ms, and 2.06ms, giving mean end-to-end latency of about 32.8ms. The inference stage should be optimized first because it has the highest service time, highest utilization, and largest queueing contribution. Reducing inference from 15ms to 10ms lowers the mean pipeline latency to about 23.8ms.
  common_mistake: |
    **The Pitfall:** Adding all stage P99s directly to calculate the end-to-end P99.
    **The Rationale:** Candidates often fail to recognize that individual stage queueing delays are independent variables.
    **The Consequence:** They produce an overly pessimistic total P99 estimate, leading to unnecessary over-optimization or hardware upgrades.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival Rate (\lambda): 30 FPS.
    - Pipeline stages: 1ms, 3ms, 5ms, 15ms, 2ms.

    **Calculations:**
    - Inference Stage Bottleneck: Service rate \mu = 1000/15 = 66.7/s. Utilization \rho = 30 / 66.7 = 0.45.
    - G/D/1 Queueing Delay (Inference): Wq = ρS / (2 * (1 - ρ)) = 0.45*15 / (2 * 0.55) = 6.14ms. Total mean W = 15 + 6.14 = 21.14ms.
    - Total Mean Latency = 1.02 + 3.15 + 5.44 + 21.13 + 2.06 = 32.80ms.
    - Other stage means: capture 1 + 0.015 = 1.02ms; ISP 3 + 0.148 = 3.15ms; preprocessing 5 + 0.441 = 5.44ms; postprocessing 2 + 0.064 = 2.06ms.
    - Total Mean Latency = 1.02 + 3.15 + 5.44 + 21.14 + 2.06 = 32.81ms.
    - If inference is optimized to 10ms: ρ=0.3, Wq=0.3*10/(2*0.7)=2.14ms, inference mean=12.14ms, and total mean ≈ 23.8ms.

    **Conclusion & Interpretation:**
    - **Result: mean latency ≈32.8ms before optimization and ≈23.8ms after inference optimization.** The G/D/1 mean-delay model supports optimizing inference first; it should not be presented as a precise end-to-end P99 model without a separate tail-latency assumption.
