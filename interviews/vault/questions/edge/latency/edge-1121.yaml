title: 'Edge Queueing Theory Realization: End-to-End Latency Budget for Edge Pipeline'
scenario: You are sizing the end-to-end latency for a Jetson Orin running a 5-stage autonomous vehicle pipeline at 30 FPS. The stages are camera capture (1ms), ISP (3ms), preprocessing (5ms), inference (15ms), postprocessing (2ms).
question: What is the end-to-end P99 latency modeled as G/D/1, and which stage should be optimized first?
details:
  realistic_solution: 'Per-stage analysis (G/D/1, assuming c_a^2=1 at 30 FPS input): Camera: W=1.02ms. ISP: W=3.15ms. Preproc: W=5.44ms. Inference: \mu=66.7/s, \rho=0.45, Wq=0.45/(2*66.7*0.55)=6.14ms, W=21.14ms. Postproc: W=2.06ms. Total mean = 32.81ms. Variance dominated by inference Wq. P99 is significantly higher than mean. Inference is clear bottleneck (\rho=0.45 is highest). Optimize inference first.'
  common_mistake: |
    **The Pitfall:** Adding all stage P99s directly to calculate the end-to-end P99.
    **The Rationale:** Candidates often fail to recognize that individual stage queueing delays are independent variables.
    **The Consequence:** They produce an overly pessimistic total P99 estimate, leading to unnecessary over-optimization or hardware upgrades.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival Rate (\lambda): 30 FPS.
    - Pipeline stages: 1ms, 3ms, 5ms, 15ms, 2ms.

    **Calculations:**
    - Inference Stage Bottleneck: Service rate \mu = 1000/15 = 66.7/s. Utilization \rho = 30 / 66.7 = 0.45.
    - G/D/1 Queueing Delay (Inference): Wq = 0.45 / (2 * 66.7 * (1 - 0.45)) = 6.13ms. Total W = 15 + 6.13 = 21.13ms.
    - Total Mean Latency = 1.02 + 3.15 + 5.44 + 21.13 + 2.06 = 32.80ms.
    - P99 Estimation = 32.8 + 4.6*\sigma > 40ms.
    - If optimized inference to 10ms (\rho=0.3, Wq=2.14ms, W=12.14ms), new total mean W is ~23.8ms.

    **Conclusion & Interpretation:**
    - **Result: P99 > 40ms (Latency-Bound)**. The inference stage is the bottleneck; optimizing it to 10ms brings the pipeline safely under the 33ms SLO.
