title: Jetson Orin Five-Stage Pipeline P99 Latency Budget
scenario: You are sizing the end-to-end latency for a Jetson Orin running a 5-stage autonomous vehicle pipeline at 30 FPS. The stages are camera capture (1ms), ISP (3ms), preprocessing (5ms), inference (15ms), postprocessing (2ms).
question: What is the end-to-end P99 latency modeled as G/D/1, and which stage should be optimized first?
details:
  realistic_solution: 'Use a G/D/1 approximation with Poisson-like arrivals (c_a^2=1), deterministic service, and Wq≈ρS/(2(1-ρ)) per stage. The mean end-to-end latency is about 32.8ms. For a defensible P99 estimate, keep the non-bottleneck stages near their mean and apply an exponential-tail approximation to the inference queue, which dominates variance: inference P99≈15ms + ln(100)*6.14ms = 43.3ms, so end-to-end P99≈43.3ms + 1.02ms + 3.15ms + 5.44ms + 2.06ms = 55.0ms. The inference stage should be optimized first because it has the highest utilization and contributes most of the queueing tail.'
  common_mistake: |
    **The Pitfall:** Adding all stage P99s directly to calculate the end-to-end P99.
    **The Rationale:** Candidates often fail to recognize that individual stage queueing delays are independent variables.
    **The Consequence:** They produce an overly pessimistic total P99 estimate, leading to unnecessary over-optimization or hardware upgrades.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival Rate (\lambda): 30 FPS.
    - Pipeline stages: 1ms, 3ms, 5ms, 15ms, 2ms.

    **Calculations:**
    - Inference Stage Bottleneck: Service rate \mu = 1000/15 = 66.7/s. Utilization \rho = 30 / 66.7 = 0.45.
    - G/D/1 Queueing Delay (Inference): Wq = ρS / (2 * (1 - ρ)) = 0.45*15 / (2 * 0.55) = 6.14ms. Total mean W = 15 + 6.14 = 21.14ms.
    - Total Mean Latency = 1.02 + 3.15 + 5.44 + 21.13 + 2.06 = 32.80ms.
    - Inference tail approximation: P99_inference ≈ 15 + ln(100)*6.14 = 43.3ms.
    - End-to-end P99 approximation: 43.3 + 1.02 + 3.15 + 5.44 + 2.06 = 55.0ms.
    - If inference is optimized to 10ms: ρ=0.3, Wq=0.3*10/(2*0.7)=2.14ms, P99_inference≈10+4.605*2.14=19.9ms, and end-to-end P99≈31.6ms.

    **Conclusion & Interpretation:**
    - **Result: P99 ≈ 55ms before optimization and ≈32ms after inference optimization.** The inference stage is the bottleneck; reducing it to 10ms brings the approximate P99 under a 33ms frame budget.
