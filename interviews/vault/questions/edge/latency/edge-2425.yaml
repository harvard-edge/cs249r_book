title: Heuristic Priority Queuing for Edge Vision
scenario: An edge accelerator processes frames from 6 IP cameras. A round-robin scheduler drops frames equally during isolated motion bursts on a single camera.
question: How can you apply a dynamic queueing mechanism to minimize overall dropped frames of high-value events without upgrading hardware?
details:
  realistic_solution: |
    Implement a priority queue coupled with a lightweight CPU-based motion detection heuristic (e.g., pixel-difference threshold). Frames exhibiting significant motion bypass the normal queue and are placed in a high-priority queue. Static frames are pushed to a low-priority queue or dropped outright. This redirects the fixed NPU compute strictly to information-dense frames.
  common_mistake: |
    **The Pitfall:** Simply increasing the overall queue buffer size to handle bursts.
    **The Rationale:** Applying generic web-server load balancing logic (buffering) to a hard real-time computer vision problem.
    **The Consequence:** Added latency causing real-time security footage to become stale, without solving the underlying compute bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cameras: 6.
    - Hardware: Single 26 TOPS accelerator.
    - During a burst, only one camera has motion-rich frames; the other five mostly produce low-value static frames.

    **Calculations:**
    - Round-robin gives each camera equal service even when five queues contain low-value static frames.
    - Priority scheduling admits motion frames first and drops or down-samples static frames when the accelerator queue is full.
    - This reallocates the fixed accelerator service time toward the active event without increasing total compute capacity.

    **Conclusion & Interpretation:**
    - **Result: priority queuing reduces high-value drops, but does not guarantee latency**. It improves event utility under compute contention by spending scarce accelerator slots on motion frames and shedding low-value static work.
