title: Dynamic Control Flow Graph Breakages
scenario: An object detection model on an edge GPU is exported via JIT tracing. It averages 15ms/frame. When viewing complex scenes with >50 detected objects, latency spikes to 85ms, causing frame drops in the autonomous tracking system.
question: Why do complex scenes with more than 50 detected objects make the JIT-traced detector spike from 15ms to 85ms?
details:
  realistic_solution: Non-Maximum Suppression (NMS) outputs a dynamic number of bounding boxes. The graph capture mode (tracing) unrolled the loop and forced a static shape. When the dynamic control flow exceeds this static shape, a graph break occurs. The framework dispatcher invalidates the optimized GPU engine and falls back to executing eager framework code on the CPU, incurring massive overhead.
  common_mistake: |
    **The Pitfall:** Assuming the GPU is mathematically overwhelmed by processing 50 bounding boxes.
    **The Rationale:** Candidates equate an increase in objects directly to a linear increase in compute latency.
    **The Consequence:** They fail to diagnose the control flow issue, attempting to prune the model instead of fixing the graph compilation logic.
  napkin_math: |
    **Assumptions & Constraints:**
    - Normal GPU inference: 15ms.
    - Traced graph unrolled to max 50 boxes.

    **Calculations:**
    - >50 boxes causes a graph break.
    - Graph break CPU-GPU memory copy overhead = 10ms.
    - CPU eager execution fallback = 60ms.
    - Total latency = 15ms + 10ms + 60ms = 85ms.

    **Conclusion & Interpretation:**
    - **Result: 85ms total latency (CPU-Fallback Bound)**. Dynamic control flow graph breakages cause a 70ms CPU-fallback penalty.
