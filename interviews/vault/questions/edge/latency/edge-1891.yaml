title: Optimizing Real-time Inference on NVIDIA Jetson Orin with Adaptive Batching
scenario: You are tasked with deploying a critical real-time object detection model on an edge platform. The model needs to process a variable stream of input frames from multiple cameras. Your system must maintain an average end-to-end latency of less than 50ms for 90% of inferences while maximizing overall throughput. The input frame rate fluctuates from 10 FPS to 100 FPS across all cameras.
question: What batching and scheduling policy would you use to keep 90% of inferences under 50 ms while maximizing throughput?
details:
  realistic_solution: An effective solution utilizes continuous batching. Keep the GPU busy with partially filled batches, inferring as soon as frames are available, and coalescing subsequent arrivals if the current batch is still processing. The scheduling policy must dynamically adapt batch sizes based on queue depth and latency budgets, implementing selective frame drops under extreme load to meet critical latency SLAs.
  common_mistake: |
    **The Pitfall:** Implementing a static batch size.
    **The Rationale:** Candidates fail to account for variable input rates, setting a fixed batch that waits too long during low load or creates massive queues during high load.
    **The Consequence:** Missed real-time SLAs due to either unnecessary waiting or unbounded queuing, as well as memory bandwidth saturation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak compute: 275 TOPS (INT8).
    - Model requirement: 50 Giga-ops per inference.
    - Target Latency: < 50ms.

    **Calculations:**
    - Peak Inference Rate: 275 TOPS / 50 GOPS = 5,500 Inferences Per Second (IPS).
    - Minimum processing rate for SLA: 1 / 0.050s = 20 inferences/second per critical stream.
    - Memory Bandwidth Impact: If a frame is 1MB, a batch of 32 requires 32MB transfer per inference.

    **Conclusion & Interpretation:**
    - **Result: Bandwidth Saturation (Memory-Bound)**. Uncontrolled batch scaling during high frame rates will saturate the memory bandwidth, missing the 50ms latency target despite having massive raw compute headroom.
