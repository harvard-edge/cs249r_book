title: 'Edge Queueing Theory Analyze: Why Jetson Orin Pipeline Stalls'
scenario: 'A Jetson Orin running a 4-camera inference pipeline shows average GPU utilization of 40% but frame processing latency of 800ms (SLO: 100ms).'
question: Using queueing theory, why can the 4-camera pipeline have 800ms latency at only 40% GPU utilization, and what stage is the bottleneck?
details:
  realistic_solution: |
    Low GPU utilization and high end-to-end latency means the queue is forming before the GPU, not inside the GPU inference stage. If the GPU were the bottleneck, its utilization would approach 100% and the GPU-side M/M/1 queue would dominate. Instead, ρ_gpu≈0.4 means the GPU is frequently idle, so an upstream stage is delaying frames and starving the accelerator. The likely bottleneck is CPU/DMA preprocessing: decode, color conversion, resize, and memory copies for 4x1080p30 streams. Raw RGB ingress alone is 4 * 1920 * 1080 * 3 * 30 = 746.5 MB/s decimal, and preprocessing usually touches the frames multiple times. The diagnosis is therefore preprocessing/input-pipeline bound, not GPU-compute bound.
  common_mistake: |
    **The Pitfall:** Assuming that 40% GPU utilization implies the GPU is the bottleneck with 60% slack.
    **The Rationale:** Candidates see low GPU utilization and assume the GPU is slow, missing that high latency with low utilization is the classic signature of an upstream bottleneck starving the processor.
    **The Consequence:** Wasting time optimizing GPU inference kernels when the actual issue is memory bandwidth or CPU preprocessing.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4 cameras at 1920x1080 RGB, 30fps.
    - GPU utilization: 40%.
    - 4 cameras at 1920x1080 RGB, 30fps = 120 input frames/s.
    - The measured 800ms latency is end-to-end pipeline latency.

    **Calculations:**
    - Raw data ingestion: 4 * 1920 * 1080 * 3 bytes * 30 fps = 746.5 MB/s.
    - A GPU utilization of ρ_gpu = 0.4 means the GPU is not saturated; it has idle time.
    - Therefore the 800ms delay must be queueing in an upstream stage before inference.
    - Candidate upstream stages: camera decode, CPU color conversion, resize/normalize, DMA copies, and buffer handoff.

    **Conclusion & Interpretation:**
    - **Result: upstream preprocessing/input-pipeline bottleneck.** The CPU/DMA path builds the queue while the GPU is starved at 40% utilization; optimize decode/resize/copy with hardware video decode, zero-copy buffers, batching, or GPU preprocessing before tuning inference kernels.
