title: Bursty Edge Queue Diagnosis
scenario: An edge SoC processes INT8 video frames with a strict deterministic processing time of 20 ms per frame. The network camera sends frames yielding 80% average utilization. During certain shifts, the 99th percentile frame latency suddenly spikes to 220 ms.
question: If the 220 ms latency includes the frame's own 20 ms service time, how many frames are queued ahead, how many are in the system, and what arrival-process characteristic likely changed?
details:
  realistic_solution: Total latency equals wait time plus the frame's own service time. A 220 ms observed latency with 20 ms deterministic service implies 200 ms of waiting, so about 10 service slots are occupied ahead of the frame. That means 10 frames are waiting in the queue ahead of it, or 11 total frames in the system if you also count the frame being served. Since average utilization remains 80%, the spike points to arrivals becoming more bursty or batched and less Poisson-like, not to a proven change to one specific distribution.
  common_mistake: |
    **The Pitfall:** Assuming the SoC is thermally throttling and slowing down the service rate.
    **The Rationale:** Candidates default to hardware throttling explanations for sudden latency spikes.
    **The Consequence:** They miss the queueing evidence that points to arrival burstiness or batching rather than a slower deterministic service time.
  napkin_math: |
    **Assumptions & Constraints:**
    - Deterministic Service Time (\u03bc) = 20ms per frame.
    - Total measured Latency = 220ms.
    - Average Utilization (\u03c1) = 80%.

    **Calculations:**
    - Total Latency = Wait Time + Service Time.
    - 220ms = Wait Time + 20ms -> Wait Time = 200ms.
    - Waiting frames ahead = 200ms Wait / 20ms Service Time = 10 frames.
    - Total frames in system at that instant = 10 waiting + 1 in service = 11 frames.
    - Standard M/D/1 mean wait at 80% utilization is only 40ms.

    **Conclusion & Interpretation:**
    - **Result: 10 waiting frames, 11 total frames in system (Queueing-Bound)**. This does not prove a unique distribution change, but it is strong evidence that arrivals have become more bursty or batched than the nominal average-utilization model suggests.
