title: Smart Meter Anomaly Detector Queue Sizing
scenario: Specify the queueing architecture for a smart electricity meter using Hailo-8 that runs anomaly detection on a 10,000 samples/second signal stream. The model consumes 0.5 GOPS INT8 per 100-sample window, with no assumed compute reuse across overlapping windows. The arrival rate is 100 windows/s (sliding window every 10ms). Specify buffer size, scheduling policy, and a <10ms end-to-end latency SLO. Power budget is 3W total.
question: What buffer size, scheduling policy, latency SLO, and power budget should the Hailo-8 smart-meter anomaly detector use?
details:
  realistic_solution: Hailo-8 is vastly overprovisioned. The service rate μ is 52,000 windows/s, and the arrival rate λ is 100 windows/s, yielding a utilization ρ of 0.00192. The compute service time is ~19.2µs per window, far below the 10ms arrival period and the <10ms end-to-end SLO. Use FIFO or earliest-deadline-first with a small 4-window ring buffer (800 bytes) to absorb interrupt and DMA jitter; a strict 1-window buffer is the mathematical minimum but leaves little operational headroom. The 2.5W accelerator plus 0.5W host budget meets the 3W total constraint.
  common_mistake: |
    **The Pitfall:** Treating continuous streaming data as independent requests without accounting for sliding window overlap.
    **The Rationale:** Candidates apply standard web-server queuing theory without recognizing the temporal dependencies and extreme over-provisioning of a 26 TOPS accelerator for a 0.5 GOPS task.
    **The Consequence:** Over-engineering a complex priority queue or massively over-sizing the memory buffer for a trivial workload.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model compute: 0.5 GOPS.
    - Hailo-8: 26 TOPS (26,000 GOPS), 2.5W. Host MCU: 0.5W.
    - Arrival rate (λ): 100 windows/s. Window size: 100 samples (200 bytes).

    **Calculations:**
    - Service rate (μ) = 26,000 GOPS / 0.5 GOPS/window = 52,000 windows/s.
    - Utilization (ρ) = 100 / 52,000 = ~0.0019 (0.19%).
    - Processing time (S) = 1 / 52,000 = 19.2 µs.
    - A 4-window ring buffer stores 4 * 200 bytes = 800 bytes and covers 40ms of arrivals, while FIFO/EDF can still enforce a <10ms per-window deadline under normal operation.
    - Total power = 2.5W + 0.5W = 3.0W.

    **Conclusion & Interpretation:**
    - **Result: 19.2 µs compute service time, 4-window jitter buffer, and 3.0W power.** The workload is compute-overprovisioned; the buffer is sized for practical scheduling jitter rather than average queue buildup.
