title: The Frame Budget
scenario: Your autonomous vehicle's perception stack must run at 30 FPS. You have a detection model (18ms), a tracking module (5ms), and a planning module (8ms). Your colleague says "that's 31ms total — we're fine, it's under 33ms."
question: Why is your colleague dangerously wrong regarding the 30 FPS frame budget?
details:
  realistic_solution: 'Your colleague is reasoning about average execution time, but safety-critical systems must guarantee Worst-Case Execution Time (WCET). You must account for memory contention, OS scheduling jitter, and thermal throttling (which can increase latencies by 40%). The industry standard is to design for \u226470% of the frame budget in the average case to leave 30% headroom for WCET spikes. The pipeline must average \u226423ms, not 31ms.'
  common_mistake: |
    **The Pitfall:** Treating the frame budget as a simple average-case target.
    **The Rationale:** Believing that mathematically 31ms < 33ms guarantees the deadline is met without accounting for physics, jitter, or thermal limitations.
    **The Consequence:** Frequent missed deadlines under load, leading to dropped frames and severe functional safety risks in the autonomous vehicle.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame Budget: 1000 ms / 30 FPS = 33.3 ms.
    - Target Margin: 30% headroom for WCET.
    - Current Average Pipeline: 18 + 5 + 8 = 31 ms.

    **Calculations:**
    - Usable Average Budget: 33.3 ms * 0.70 = 23.3 ms.
    - Overage: 31 ms vs 23.3 ms limit (33% over budget).
    - Thermal Throttling Spike (+40%): 31 ms * 1.4 = 43.4 ms.

    **Conclusion & Interpretation:**
    - **Result: Latency-Bound Guarantee**. The 31ms average guarantees hard deadline violations under thermal throttling or context switching, proving the current pipeline is entirely unsafe.
