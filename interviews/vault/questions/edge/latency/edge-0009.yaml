title: The Frame Budget
scenario: Your autonomous vehicle's perception stack must run at 30 FPS. You have a detection model (18ms), a tracking module (5ms), and a planning module (8ms). Your colleague says "that's 31ms total — we're fine, it's under 33ms."
question: Why is your colleague dangerously wrong regarding the 30 FPS frame budget?
details:
  realistic_solution: Your colleague is treating nominal stage times as a deadline guarantee. A 31ms average or typical-path sum is not enough for a hard 33.3ms frame deadline because WCET, tail latency, scheduling jitter, memory contention, and thermal/DVFS behavior can push some frames over budget. The right answer is not a universal average target such as 70% of the frame budget; it is to prove or measure end-to-end worst-case/tail latency under representative load and keep that bound below 33.3ms.
  common_mistake: |
    **The Pitfall:** Treating the frame budget as a simple average-case target.
    **The Rationale:** Believing that mathematically 31ms < 33ms guarantees the deadline is met without accounting for physics, jitter, or thermal limitations.
    **The Consequence:** Missed deadlines can appear under load, leading to dropped frames and invalidating any hard real-time timing claim.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame Budget: 1000 ms / 30 FPS = 33.3 ms.
    - Nominal Pipeline Sum: 18 + 5 + 8 = 31 ms.
    - Nominal Margin: 33.3 - 31 = 2.3 ms.

    **Calculations:**
    - The nominal sum leaves only 2.3 ms of slack.
    - Any combined jitter, contention, cache effects, or DVFS slowdown above 2.3 ms causes a deadline miss.
    - Deadline compliance requires a bound such as WCET or measured p99.9/p99.99 end-to-end latency under worst expected load, not just an average-stage sum.

    **Conclusion & Interpretation:**
    - **Result: Deadline Risk, Not Proven Compliance**. The 31ms nominal path does not prove the 33.3ms hard deadline is met; the system must demonstrate that worst-case or specified tail latency stays within budget.
