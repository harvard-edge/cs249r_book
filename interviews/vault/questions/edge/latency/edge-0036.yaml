title: The WCET Analysis
scenario: You're certifying a perception pipeline under ISO 26262 ASIL-B. Your safety case must *guarantee* the pipeline completes within 100ms under all operating conditions. Your average-case inference latency is 45ms.
question: How do you construct the worst-case execution time (WCET) argument?
details:
  realistic_solution: |
    WCET analysis requires a provable upper bound, not a percentile or an empirical maximum with an arbitrary multiplier. Constrain the execution environment first: fixed clocks, bounded thermal conditions, isolated scheduling, bounded inputs, preallocated memory, disabled unbounded dynamic behavior, and documented interrupt/DMA/bus interference assumptions. Then use static timing analysis or an analyzable runtime model to bound each stage and hardware effect under those assumptions. Measurements under stress are validation evidence, not the proof itself. Finally, enforce the safety case with scheduling isolation, a watchdog before the 100ms deadline, and a deterministic fallback if the bounded pipeline cannot complete in time.
  common_mistake: |
    **The Pitfall:** Conflating statistical latency (e.g., P99) with worst-case guarantees.
    **The Rationale:** Engineers rely on cloud-centric SLA metrics (like P99) and assume a 99% success rate implies a safe maximum bound.
    **The Consequence:** A P99 of 80ms means 1 in 100 frames violates the deadline. At 30 FPS, a deadly deadline miss occurs every 3.3 seconds, failing safety certification.
  napkin_math: |
    **Assumptions & Constraints:**
    - Safety budget: 100ms under all certified operating conditions.
    - Average latency: 45ms, which is not a bound.
    - Measurements may show an empirical maximum, but they do not prove unobserved inputs or interleavings.

    **Calculations:**
    - Required proof form: WCET_stage_1 + WCET_stage_2 + ... + bounded scheduling/interference overhead <= 100ms.
    - Example acceptance condition: if static timing analysis plus modeled interference produces a 92ms bound, margin = 100ms - 92ms = 8ms.
    - A measured 65ms maximum can support validation of that model, but 65ms * 1.5 = 97.5ms is only an empirical estimate, not a mathematical guarantee.

    **Conclusion & Interpretation:**
    - **Result: Formal WCET Argument Required.** The safety case must derive a bounded worst case from constrained execution paths and architecture timing assumptions, then use measurement and watchdog/fallback behavior as supporting evidence.
