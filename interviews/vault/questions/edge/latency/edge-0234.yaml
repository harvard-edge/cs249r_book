title: The 30 FPS Perception Deadline
scenario: An autonomous vehicle's perception system needs to react to a changing environment, like a pedestrian stepping into the road. To ensure safety, there's a hard real-time deadline for the entire pipeline, from camera sensor to the planning module.
question: "What is a widely recognized industry-standard deadline for processing a single frame in such a system?"
details:
  realistic_solution: The correct answer is ~33 milliseconds. This corresponds to a processing rate of 30 frames per second (FPS), a standard target that balances providing timely updates with the computational load of perception models. Exceeding this budget means the system's view of the world is too stale to react safely.
  common_mistake: |
    **The Pitfall:** Confusing hard real-time deadlines with softer web service latencies or microcontroller-level latencies.
    **The Rationale:** Candidates with cloud backgrounds think 100ms is perfectly "fast," while embedded engineers think 1ms is required.
    **The Consequence:** A 100ms response for a car at highway speeds is dangerously slow, while demanding 1ms is completely infeasible for a complex neural network on an automotive SoC.
  napkin_math: |
    **Assumptions & Constraints:**
    - Maintain 30 Frames Per Second (FPS).
    - 1 second = 1000 milliseconds.

    **Calculations:**
    - The pipeline must process one frame per 1/30th of a second.
    - 1000 ms / 30 frames = 33.33 ms/frame.

    **Conclusion & Interpretation:**
    - **Result: 33.33 ms (Latency-Bound)**. Missing this deadline violates safety requirements for real-time perception.
  options:
  - 1 ms
  - 33 ms
  - 100 ms
  - 250 ms
  correct_index: 1
