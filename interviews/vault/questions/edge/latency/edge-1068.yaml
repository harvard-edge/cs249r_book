title: 'Latency Decomposition: Full Pipeline Latency Audit for Autonomous Drone on Jetson Orin'
scenario: 'An autonomous drone runs a sequential perception-planning-control pipeline. Components: stereo camera capture (2ms), depth estimation CNN (INT8, 8 GOPs), object detection YOLOv8-m (26 GOPs INT8), trajectory planning (CPU, 5ms), motor command output (1ms).'
question: Assuming the accelerator provides 110 effective TOPS, can the sequential pipeline meet the 30ms budget, what is the bottleneck, and what fix is needed?
details:
  realistic_solution: The pipeline easily meets the 30ms budget. A common analytical trap is miscalculating latency by dividing GOPS directly by TOPS without accounting for the 1000x magnitude difference. The actual bottleneck is the CPU-bound trajectory planning (5ms), which consumes the majority of the ~8.3ms total pipeline time. Since the pipeline is comfortably under budget, running the models sequentially is sufficient; pipelining would add unnecessary synchronization complexity.
  common_mistake: |
    **The Pitfall:** Failing to convert TOPS (Tera-ops) to GOPS (Giga-ops).
    **The Rationale:** Candidates divide 26 / 110 and get 0.236, but incorrectly assume the unit is seconds (236ms) instead of milliseconds.
    **The Consequence:** A 1000x overestimation of inference latency, leading to the incorrect conclusion that pipelining or a smaller model is required.
  napkin_math: |
    **Assumptions & Constraints:**
       - Effective INT8 Compute: 110 TOPS
       - Depth estimation: 8 GOPs
       - YOLOv8-m: 26 GOPs
       - Target budget: 30ms
    **Calculations:**
       - YOLOv8-m latency: 26 * 10^9 / (110 * 10^12) = 0.000236 s = 0.236 ms
       - Depth estimation latency: 8 * 10^9 / (110 * 10^12) = 0.000072 s = 0.072 ms
       - Total pipeline latency: 2 ms + 0.072 ms + 0.236 ms + 5 ms + 1 ms = 8.308 ms
    **Conclusion & Interpretation:**
       - **Result: CPU-Bound Bottleneck.** The 8.3 ms pipeline meets the 30 ms budget, but the 5 ms CPU planner is the slowest component.
