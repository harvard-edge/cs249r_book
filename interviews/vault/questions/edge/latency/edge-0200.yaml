title: 'The 30 FPS Rule'
scenario: 'An autonomous vehicle''s perception system needs to process camera and LiDAR data to identify obstacles.'
question: 'To maintain a smooth 30 frames-per-second (FPS) processing rate, what is the hard real-time latency budget for a single frame of computation?'
details:
  realistic_solution: 'The hard real-time budget is approximately 33 milliseconds. Unlike a web service, where exceeding a latency budget might mean a slow page load, a missed deadline here means the vehicle is operating on stale data, a critical safety failure.'
  common_mistake: 'Quoting a 100ms P99 target or a 16ms mobile UI target. Engineers from a cloud background bring web-service SLA mindsets.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Target processing rate: 30 Frames Per Second (FPS).
    - Time in one second: 1000 milliseconds.

    **Calculations:**
    - Latency budget per frame: 1000 ms / 30 frames = 33.33 ms.

    **Conclusion & Interpretation:**
    - **Result: 33.33 ms (Compute-Bound)**. The hard real-time budget is approximately 33 ms.
  options:
  - '100 ms'
  - '16 ms'
  - '33 ms'
  - '1 ms'
  correct_index: 2
