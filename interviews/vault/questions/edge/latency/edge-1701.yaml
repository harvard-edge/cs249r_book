title: Google Coral USB Latency Pipeline Optimization
scenario: 'You are deploying a quantized object detection model on a Google Coral Edge TPU (USB form factor) connected to a low-power host. The system requires 30 FPS (33.3ms budget), but the current end-to-end latency is 85ms per frame. Given the Coral''s 4 TOPS INT8 capability operating at 2W, the actual model inference takes only 5ms.'
question: Where is the hidden latency in the 85ms Coral Edge TPU pipeline, and how would you optimize it to meet the 33.3ms frame budget?
details:
  realistic_solution: 'Profile the end-to-end pipeline to reveal that CPU-bound preprocessing and postprocessing are the primary bottlenecks. The fix involves offloading the image resizing and color space conversion to the host''s hardware Image Signal Processor (ISP) or V4L2 drivers, and optimizing the post-processing NMS with vectorized CPU instructions to unblock the 4 TOPS accelerator.'
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck lies in the TPU inference or USB bandwidth limits.
    **The Rationale:** Candidates fail to decompose the full pipeline and overlook the heavy host CPU cost of image preprocessing (resizing, RGB conversion) and postprocessing (NMS).
    **The Consequence:** Attempting to optimize the TPU model (which already runs in 5ms) while ignoring the CPU processes taking 73ms, failing to meet the real-time deadline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame budget (30 FPS): 33.3ms.
    - Current Latency: 85ms (45ms CPU Pre + 5ms USB Tx + 5ms TPU + 2ms USB Rx + 28ms CPU NMS).
    - Target: Optimize host CPU bottlenecks.

    **Calculations:**
    - Hardware-accelerated ISP resizing reduces preprocessing to 5ms.
    - Optimized NMS reduces postprocessing to 10ms.
    - New Latency = 5ms + 5ms + 5ms + 2ms + 10ms = 27ms.
    - Throughput = 1000ms / 27ms = 37 FPS.

    **Conclusion & Interpretation:**
    - **Result: 27ms (Host CPU Preprocessing Bound).** Offloading to the ISP and optimizing NMS unblocks the TPU and meets the 33.3ms deadline.
