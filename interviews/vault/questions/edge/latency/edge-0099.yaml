title: The Deterministic Inference Mirage
scenario: 'Your medical device runs a diagnostic neural network on an NXP i.MX 8M Plus (Cortex-A53 + Ethos-U65 NPU, 2 TOPS INT8). FDA 510(k) submission requires you to prove that inference time is deterministic — the same input must always produce the same execution time. You run 100,000 inferences with the identical input tensor. The histogram shows a bimodal distribution: 95% of runs at 4.1ms, 5% at 6.8ms.'
question: What is causing the 2.7ms timing variation on identical inputs?
details:
  realistic_solution: |
    The bimodal distribution reveals system-level interference, not NPU non-determinism. The 5% slow cases are consistent with occasional memory-service stalls and Linux kernel timer/driver interrupt activity delaying the NPU driver's DMA completion path. The 2.7 ms number comes directly from the observed modes: 6.8 ms - 4.1 ms. The fix is to reduce external DRAM and OS scheduling exposure, for example by keeping critical weights/activations in dedicated SRAM where possible, pinning the NPU path, and using a tickless or real-time kernel configuration.
  common_mistake: |
    **The Pitfall:** Assuming the NPU hardware is inherently non-deterministic or blaming the model architecture.
    **The Rationale:** Engineers focus on the hardware or model instead of the whole system.
    **The Consequence:** Failing to diagnose OS scheduling jitter and memory subsystem refresh collisions.
  napkin_math: |
    **Assumptions & Constraints:**
    - LPDDR4 requires periodic refresh; the visible stall depends on controller policy, bank state, and concurrent traffic.
    - Kernel tick and driver interrupts can add scheduling jitter on the order of hundreds of microseconds to a few milliseconds.
    - ~5,000 DRAM accesses per inference

    **Calculations:**
    - Fast mode latency: 4.1 ms.
    - Slow mode latency: 6.8 ms.
    - Observed gap between modes: 6.8 ms - 4.1 ms = 2.7 ms.
    - The refresh/interrupt mechanisms explain why a second mode can appear; they do not uniquely derive the exact 2.7 ms without tracing.

    **Conclusion & Interpretation:**
    - **Result: 2.7 ms observed variation (system-interference-bound)**. Moving the critical path away from shared DRAM and general-purpose kernel scheduling reduces or removes the slow mode.
