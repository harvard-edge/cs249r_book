title: Hailo-8 Per-Chip Arrival Rate and Utilization for Corridor Safety Cameras
scenario: 'Design a complete edge inference system for a hospital corridor safety monitor: 8 cameras, 30 FPS, detect falls and unusual events with P99 < 200ms, 24/7 uptime, 100W power budget. Hardware options: Jetson Orin (275 TOPS INT8, 60W), Hailo-8 (26 TOPS INT8, 2.5W). Model: YOLO-pose 3B GOPS INT8.'
question: For the Hailo-8 option, using 2 cameras per chip, 30 FPS per camera, 26 TOPS INT8 capacity, and a 3 GOPS/frame YOLO-pose model, what are the per-chip arrival rate and utilization?
details:
  realistic_solution: 2 cameras at 30 FPS each create a per-chip arrival rate of λ=60 frames/s. Hailo-8 capacity is 26 TOPS = 26,000 GOPS/s, so with a 3 GOPS/frame model μ=26,000/3=8667 frames/s. Utilization is ρ=λ/μ=60/8667=0.00692, or about 0.69%, so the Hailo-8 option is extremely lightly loaded for this narrow compute check.
  common_mistake: |
    **The Pitfall:** Not verifying the design against all three constraints simultaneously (latency, uptime, power).
    **The Rationale:** Candidates often solve for throughput alone and ignore power budgets or redundancy for uptime.
    **The Consequence:** Selecting a single Jetson Orin that meets throughput but fails the power budget or lacks redundancy for 24/7 uptime.
  napkin_math: |
    **Assumptions & Constraints:**
    - Narrow compute check for one Hailo-8 chip, not the full redundancy/power design.
    - Arrival Rate: 2 cameras \times 30 FPS = 60 frames/s per chip.
    - Use a consistent INT8 op convention: 26 TOPS = 26,000 GOPS/s and the model costs 3 GOPS/frame.
    - Service Rate (\mu): 26,000 GOPS/s / 3 GOPS/frame = 8667 frames/s.

    **Calculations:**
    - Per-chip arrival rate (\lambda): 2 * 30 = 60 frames/s.
    - Utilization (\rho): 60 / 8667 = 0.00692.

    **Conclusion & Interpretation:**
    - **Result: \lambda=60 frames/s and \rho=0.00692, or 0.69% (Compute-Feasible).** The queue is extremely lightly loaded for this per-chip compute calculation.
