title: Edge Factory Queue Stability
scenario: A Jetson Orin processes factory images arriving at exactly 15 FPS. The Orin evaluates one image in 50ms.
question: What is the NPU utilization, and does the inference queue remain stable?
details:
  realistic_solution: 'The processing capability is 1 frame / 0.050 seconds = 20 FPS. The arrival rate is 15 FPS. Utilization is 15 / 20 = 75%. Because utilization is strictly less than 100%, the M/D/1 inference queue remains stable without unbounded growth.'
  common_mistake: Inverting the rates or confusing FPS with latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival rate = 15 FPS
    - Processing time = 50 ms per image

    **Calculations:**
    - Processing rate = 1 / 0.050 s = 20 FPS
    - Utilization = Arrival rate / Processing rate = 15 / 20 = 75%

    **Conclusion & Interpretation:**
    - **Result: 75% Utilization (Compute-Bound)**. Since utilization is strictly less than 100%, the inference queue remains theoretically stable.
