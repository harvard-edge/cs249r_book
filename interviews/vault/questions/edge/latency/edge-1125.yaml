title: 'Edge Queueing Theory Specification: Multi-Tenant Edge Inference SLO'
scenario: 'A shared Jetson Orin (275 TOPS INT8, 60W) serves 3 tenants: Tenant A (safety-critical, 20 req/s, P99<10ms), Tenant B (analytics, 50 req/s, P99<100ms), and Tenant C (background training jobs, 5 req/s, P99<5000ms). The total arrival rate is 75 req/s.'
question: What priority levels and queueing policy should the shared Jetson Orin use for tenants A, B, and C, and do their P99 SLOs hold?
details:
  realistic_solution: |
    Use three-level preemptive priority scheduling with A=high, B=medium, and C=low/background. Tenant A should run in a reserved preemptive lane so it is not blocked behind B or C. Under the stated service times, A's P99 is about 6.3ms, so A holds its 10ms SLO. B also holds its 100ms SLO under the A+B priority load, with an approximate P99 around 24ms. C does not hold as an admitted 5 req/s tenant because total utilization is exactly 1.0; background work must be throttled below 5 req/s, made best-effort, or moved off the shared Orin.
  common_mistake: |
    **The Pitfall:** Using a single FIFO queue for all tenants.
    **The Rationale:** Defaulting to simple server queue logic without accounting for strict safety-critical latency limits.
    **The Consequence:** Tenant A is blocked behind Tenant B's and C's larger workloads, violently violating its P99 < 10ms SLO.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival Rates: A = 20/s, B = 50/s, C = 5/s.
    - Service Times: A = 5ms, B = 8ms, C = 100ms.
    - SLOs: A P99 < 10ms, B P99 < 100ms, C P99 < 5000ms.

    **Calculations:**
    - Utilization: ρ_A = 20*0.005 = 0.10, ρ_B = 50*0.008 = 0.40, ρ_C = 5*0.100 = 0.50. Total ρ = 1.00.
    - Highest-priority A, M/D/1 approximation: Wq_A = λ_A*S_A^2 / (2*(1-ρ_A)) = 20*0.005^2 / (2*0.9) = 0.278 ms.
    - P99_A approximation: S_A + ln(100)*Wq_A = 5 + 4.605*0.278 = 6.3 ms, so A holds.
    - For B, approximate the A+B priority class as ρ_AB=0.50 with dominant B service: Wq_B ≈ 50*0.008^2 / (2*(1-0.50)) = 3.2 ms.
    - P99_B approximation: 8 + 4.605*(3.2 + 0.278) = 24.0 ms, so B holds with margin.
    - Tenant C sees the remaining background capacity. Because total ρ = 1.00, C has no stable spare capacity and its P99 is unbounded unless throttled or offloaded.

    **Conclusion & Interpretation:**
    - **Result: A and B Hold, C Fails Without Throttling.** Preemptive priority protects A and B, but the admitted C load pushes total utilization to 100%, so C must be treated as best-effort or rate-limited.
