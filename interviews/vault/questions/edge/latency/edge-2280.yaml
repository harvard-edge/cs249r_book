title: 'Edge Gateway Latency Bounds'
scenario: 'An edge gateway receives unpredictable bursty requests from IoT sensors. Service time per request is strictly deterministic at 20ms. The system must maintain an average wait time strictly below 40ms.'
question: 'What is the maximum allowable processor utilization (\u03c1) that ensures the average wait time remains at or below the 40ms constraint?'
details:
  realistic_solution: 'Using the M/D/1 expected wait time formula Wq = (rho * D) / (2 * (1 - rho)), we plug in Wq = 40ms and D = 20ms. This yields 40 = (rho * 20) / (2 - 2*rho). Solving for rho gives 80 - 80*rho = 20*rho, meaning 100*rho = 80, so rho = 0.8. The system can handle up to 80% utilization.'
  common_mistake: |
    **The Pitfall:** Solving the equation for an M/M/1 queue instead of M/D/1.
    **The Rationale:** M/M/1 is the most commonly memorized queueing theory formula, even when service times are strictly deterministic.
    **The Consequence:** Generating a highly pessimistic maximum utilization of 66%, leading to unnecessary hardware over-provisioning.
  napkin_math: |
    **Assumptions & Constraints:**
    - M/D/1 queueing model.
    - Wait time constraint ($W_q$): 40ms.
    - Deterministic service time ($D$): 20ms.

    **Calculations:**
    - Formula: $W_q = (\rho \times D) / (2 \times (1 - \rho))$
    - Substitution: 40 = ($\rho \times 20$) / ($2 - 2\rho$)
    - Solving for $\rho$: 80 - 80$\rho$ = 20$\rho$ $\rightarrow$ 100$\rho$ = 80.

    **Conclusion & Interpretation:**
    - **Result: $\rho$ = 0.8 (80% utilization) (Queueing-Bound)**. M/D/1 formulas strictly dictate maximum allowable utilization for the latency SLA.
