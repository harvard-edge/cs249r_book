title: Tail Latency from Thermal Throttling on Jetson Orin
scenario: A computer vision pipeline on Jetson AGX Orin processes 30 FPS camera feeds. In a 25°C lab, P99 frame latency is 28ms. In a 40°C deployment environment, P99 spikes to 95ms intermittently. The pipeline includes YOLOv8n inference at INT8.
question: What is causing the Jetson Orin P99 latency to jump from 28ms to 95ms at 40°C, and how would you mitigate it?
details:
  realistic_solution: Monitor tegrastats to correlate throttle events with latency spikes. At 40°C ambient, a 60W sustained load can push junction temperature near the throttling threshold. Thermal throttling can reduce both compute clocks and EMC memory frequency; for a lightweight detector, the EMC drop often drives the tail-latency spike by starving preprocessing and tensor movement. Mitigate by reducing sustained power from 60W to 30W, improving active cooling, or shedding frames to stay below the thermal limit.
  common_mistake: |
    **The Pitfall:** Assuming the latency spike is a software bug and spending time profiling CUDA kernels, or assuming the compute (TOPS) throttling is the bottleneck.
    **The Rationale:** Developers often focus purely on compute limitations rather than memory bandwidth, especially when dealing with lightweight models like YOLOv8n.
    **The Consequence:** Wasted profiling effort and failure to address the memory bandwidth throttling that actually causes the latency spike.
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin thermal limits trigger at ~95°C junction temp.
    - Environment: 40°C ambient, 60W TDP, 0.9°C/W passive thermal resistance.
    - Throttling reduces TOPS by ~50% (275 to ~137 TOPS) and memory bandwidth is halved.
    - YOLOv8n INT8 needs ~8.7 GOPS.

    **Calculations:**
    - Estimated junction temp = 40°C + (60W * 0.9°C/W) = 40°C + 54°C = 94°C, which is near the ~95°C throttle threshold.
    - Even after a 50% compute-clock reduction, 137 TOPS is far above an 8.7 GOPS lightweight detector estimate.
    - If EMC memory bandwidth is also reduced, preprocessing, image copies, and tensor movement can dominate the P99 path.

    **Conclusion & Interpretation:**
    - **Result: thermal throttling with likely EMC impact (Thermal/Memory-Bound).** The simplified thermal model puts 60W at 40°C near the throttle point; reducing sustained power or improving cooling prevents the compute and memory clock drops that inflate P99 latency.
