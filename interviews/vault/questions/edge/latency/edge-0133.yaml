title: 'The 30 FPS Deadline: Real-Time Deadlines'
scenario: You are designing an obstacle detection system for an autonomous warehouse robot that must process video at a minimum of 30 frames per second (FPS) to ensure safe navigation.
question: What is the maximum latency budget for the entire ML inference pipeline for a single frame to meet the 30 FPS hard real-time requirement?
details:
  realistic_solution: 'A rate of 30 frames per second means that 30 frames must be processed within one second (1000 milliseconds). Therefore, the budget for each frame is 1000 milliseconds divided by 30 frames, which is 33.3 milliseconds.'
  common_mistake: Engineers often confuse the frame rate directly with the millisecond budget, assuming 30 FPS means a 30ms budget, or calculating the budget for 60 FPS (16.6ms) out of habit from UI development.
  napkin_math: |
    **Assumptions & Constraints:**
    - Minimum throughput requirement: 30 FPS

    **Calculations:**
    - Total time per second = 1000 ms
    - Frame budget = 1000 ms / 30 frames = 33.33 ms

    **Conclusion & Interpretation:**
    - **Result: 33.3 ms (Latency-Bound)**. The end-to-end pipeline must execute within this strict temporal window to avoid frame drops.
  options:
  - '16.6 ms'
  - '30 ms'
  - '33.3 ms'
  - '100 ms'
