title: The V2X Latency Requirement
scenario: Vehicles share perception data via C-V2X over 5G to 'see around corners'. Safety dictates receiving and fusing data within 10ms end-to-end. 5G promises 1ms air interface latency.
question: Can you meet the 10ms budget using standard 5G routing?
details:
  realistic_solution: The correct answer is no. Meeting 10ms end-to-end is impossible with standard 5G cellular routing. The 1ms marketing claim is the air interface only. The real design must use C-V2X Sidelink (direct vehicle-to-vehicle, bypassing the cellular core) to reliably meet the strict budget.
  common_mistake: |
    **The Pitfall:** Believing the 5G "1ms latency" marketing claim applies to end-to-end network transmission.
    **The Rationale:** Engineers often confuse theoretical air-interface URLLC latency with full routing round-trip time through a cellular core.
    **The Consequence:** Designing safety-critical systems that fundamentally cannot meet their real-time deadlines, risking fatal collisions.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10ms E2E budget.
    - Speed = 60 km/h.
    - On-vehicle compute = 4ms.
    - 5G Air = 1-5ms.
    - Core network = 2-5ms.

    **Calculations:**
    - E2E Latency = 4ms (compute) + 1-5ms (up) + 2-5ms (core) + 1-5ms (down) = 8-19ms total.
    - At 60 km/h (16.7 m/s), 10ms = 0.167m travel.

    **Conclusion & Interpretation:**
    - **Result: 8-19ms total latency (Network-Latency-Bound)**. End-to-end 5G latency is too variable to guarantee the 10ms deadline.
