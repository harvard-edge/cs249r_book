title: The Clock Drift Time-Series Corruption
scenario: Your predictive maintenance system uses distributed edge modules to monitor industrial motors. Each device samples vibration data at 4 kHz and runs a 1D-CNN anomaly detection model on 1-second windows (4,000 samples). After 6 months, devices that were never rebooted show a gradual increase in false alarms — 2% per month. Devices that reboot weekly show no drift. The model and firmware are identical.
question: What is different about the long-running devices that causes a gradual increase in false alarms?
details:
  realistic_solution: The system clock is drifting due to the crystal oscillator's inherent ±20 ppm error. Over months of continuous operation without NTP synchronization or a hardware RTC, the phase within the 1-second sampling window shifts dramatically. This exposes the 1D-CNN to phase angles it wasn't trained on, degrading the latent embeddings and causing false positive anomalies.
  common_mistake: |
    **The Pitfall:** Blaming the issue on a memory leak.
    **The Rationale:** Engineers default to standard software aging issues (memory leaks) when seeing long-running performance degradation.
    **The Consequence:** Chasing phantom memory bugs instead of addressing the fundamental clock drift issue via NTP synchronization or a software phase-alignment fix.
  napkin_math: |
    **Assumptions & Constraints:**
       - Motor frequency: 30 Hz
       - Crystal oscillator drift: ±20 ppm
       - Uptime: 6 months (180 days)
    **Calculations:**
       - Daily drift: 20 ppm * 86,400 s/day = 1.728 s/day
       - Total drift (6 months): 1.728 s/day * 180 days ≈ 311 seconds
       - Phase shift per day: 30 Hz * 1.728 s = 51.84 full rotations
       - Fractional phase shift: 0.84 * 360° = 302° per day
    **Conclusion & Interpretation:**
       - **Result: Phase-Shift Data Drift.** The unsynchronized clock drift shifts the phase alignment within the window, exposing the model to unfamiliar data distributions.
