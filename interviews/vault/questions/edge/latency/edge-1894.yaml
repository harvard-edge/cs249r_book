title: Diagnosing Latency Spikes on Qualcomm Cloud AI 100
scenario: You are tasked with optimizing a real-time anomaly detection model deployed on a Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W TDP). During load testing, you observe intermittent latency spikes, even though average compute utilization appears to be within limits.
question: Which profiling tools and traces would you use on the Qualcomm Cloud AI 100 to determine whether the latency spikes are compute, memory, or I/O bound?
details:
  realistic_solution: Use `qaic-runner` profiling with stats and trace output to capture per-inference execution time, queue wait, host/runtime gaps, DMA transfers, and device timing. Post-process raw device stats with `qaic-opstats` to identify slow ops, low accelerator occupancy, and memory-stall patterns; use `qaic-util` to monitor device health, utilization, thermals, and reset/error signals during the run. Correlate those traces with host `perf`, `ftrace`, or application timestamps so compute-bound spikes show long device execution, memory-bound spikes show bandwidth or op-stall counters, and I/O-bound spikes show PCIe/DMA or host queue gaps.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on compute utilization (e.g., FLOPS/TOPS) and overlooking data transfer (I/O) or memory access patterns.
    **The Rationale:** On accelerators like the Qualcomm Cloud AI 100 with high compute density, developers often assume the bottleneck is computational.
    **The Consequence:** I/O bound operations, such as host-to-device transfers over PCIe or data movement within LPDDR4x memory, frequently become the root cause of unmitigated latency variability.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cloud AI 100 peak INT8 throughput: 400 TOPS = 400 x 10^12 operations/s.
    - Example model work per inference: 10 trillion INT8 operations.
    - Data movement per inference: 1 GB through a 64 GB/s memory path.

    **Calculations:**
    - Compute lower bound: 10 x 10^12 ops / 400 x 10^12 ops/s = 0.025 s = 25 ms.
    - Transfer lower bound: 1 GB / 64 GB/s = 0.0156 s = 15.6 ms.
    - Ideal serial baseline: 25 ms + 15.6 ms = 40.6 ms before queueing, host overhead, or imperfect utilization.

    **Conclusion & Interpretation:**
    - **Result: ~25 ms compute plus ~16 ms transfer lower bound**. If spike traces are much higher than ~41 ms, the math alone does not identify the bottleneck; it tells you to inspect whether the excess time appears as low accelerator occupancy, saturated memory/DMA transfer, host-side gaps, or queueing.
