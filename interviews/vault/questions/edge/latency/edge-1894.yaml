title: Diagnosing Latency Spikes on Qualcomm Cloud AI 100
scenario: You are tasked with optimizing a real-time anomaly detection model deployed on a Qualcomm Cloud
  AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W TDP). During load testing, you observe intermittent
  latency spikes, even though average compute utilization appears to be within limits.
question: Which profiling tools and traces would you use on the Qualcomm Cloud AI 100 to determine whether
  the latency spikes are compute, memory, or I/O bound?
details:
  realistic_solution: A realistic approach involves using a multi-faceted profiling strategy. Utilize
    Qualcomm's SNPE SDK profiling tools to get on-device kernel-level timings and memory usage. Supplement
    this with system-level tools like 'perf' or 'ftrace' on the host CPU to monitor system calls and CPU
    utilization. Analyze the trace timelines to correlate latency spikes with compute kernels (which should
    take ~25ms) or data transfer phases (~15ms). Specifically, investigate memory bandwidth utilization
    to confirm if the pipeline is limited by memory access patterns during that 15ms transfer.
  common_mistake: '**The Pitfall:** Focusing exclusively on compute utilization (e.g., FLOPS/TOPS) and
    overlooking data transfer (I/O) or memory access patterns.

    **The Rationale:** On accelerators like the Qualcomm Cloud AI 100 with high compute density, developers
    often assume the bottleneck is computational.

    **The Consequence:** I/O bound operations, such as host-to-device transfers over PCIe or data movement
    within LPDDR4x memory, frequently become the root cause of unmitigated latency variability.'
  napkin_math: '**Assumptions & Constraints:**

    - Cloud AI 100: 400 TOPS (INT8), LPDDR4x bandwidth ~64 GB/s.

    - Example model: 10 TOPS, 1GB data movement per inference.


    **Calculations:**

    - Max theoretical compute throughput: 400 / 10 = 40 inf/sec.

    - Data transfer time: 1GB / 64 GB/s = ~15ms.

    - Kernel execution: 25ms (10 TOPS / 400 TOPS = 0.025s).


    **Conclusion & Interpretation:**

    - **Result: ~15ms transfer vs 25ms compute**. While compute dominates theoretically, if observed latency
    drastically exceeds 40ms (25+15), it points to I/O or memory access pattern bottlenecks requiring
    data access optimization.'
