title: The Continuous Batching Sweet Spot
scenario: 'You are designing a video analytics server for a factory floor, processing streams from 10 cameras. Each camera sends a frame every 100ms (10 FPS). Your accelerator''s inference time scales with batch size N according to the formula: T_inference(N) = 40ms + 5ms * (N-1).'
question: What batch size maximizes throughput while keeping worst-case frame latency within 150ms?
details:
  realistic_solution: The optimal batch size is 8. Frames arrive across the fleet every 10 ms, so the oldest frame in a batch of N waits 10 ms * (N-1) before inference starts. With T_inference(N) = 40 ms + 5 ms * (N-1), N=8 maximizes throughput while keeping worst-case latency within the 150 ms SLA.
  common_mistake: |
    **The Pitfall:** Being greedy and assuming the largest possible batch size is always best for throughput, ignoring the latency constraint.
    **The Rationale:** Engineers calculate the inference latency but forget the waiting time component. They solve for T_inference(N) <= 150ms but forget that in continuous batching, a frame must wait for the rest of its batch to arrive.
    **The Consequence:** The system fails to meet the worst-case 150ms frame latency SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival rate: 10 cameras * 10 FPS = 100 frames/s (1 frame every 10ms).
    - Inference time: T_inference(N) = 40ms + 5ms * (N-1).
    - Worst-case latency for the oldest frame: wait for (N-1) more frames + T_inference(N) <= 150ms.

    **Calculations:**
    - Fill wait = 10ms * (N-1).
    - Worst-case latency = 10ms * (N-1) + 40ms + 5ms * (N-1) = 40ms + 15ms * (N-1).
    - Test N=8: 40ms + 15ms * 7 = 145ms, which satisfies the 150ms SLA.
    - Test N=9: 40ms + 15ms * 8 = 160ms, which violates the 150ms SLA.

    **Conclusion & Interpretation:**
    - **Result: N=8 (Throughput-Optimized Latency-Bound)**. N=8 is the largest batch that satisfies the <= 150ms worst-case latency constraint while maximizing throughput (8 / 75ms = 106.7 FPS).
  options:
    - '8'
    - '23'
    - '11'
    - As large as memory allows
