title: 'Edge Queueing Theory Fluency: Little''s Law Mental Math for Edge Systems'
scenario: You need to perform quick queueing theory estimations for three edge systems. (1) An SoC serving 60 FPS object detection with 5 frames in queue and a 10ms service time. (2) A dataflow accelerator at 90% utilization serving 100 inferences/s. (3) A pipeline that must complete in 33ms (30 FPS) with a utilization of ρ=0.7.
question: What are the mean queue-plus-service latency, accelerator queue length and mean wait, and maximum service time for the three quick edge queueing estimates?
details:
  realistic_solution: '(1) L=5 frames in queue (not system). Mean queue wait Wq = L/λ = 5/60 = 83.3ms. Add the 10ms service time for mean queue-plus-service latency: about 93.3ms, which is well over a 33ms frame budget. (2) Accelerator, ρ=0.9, λ=100/s: μ=λ/ρ=111.1/s. For M/D/1, Lq = ρ²/(2(1-ρ)) = 0.81/0.2 = 4.05 requests in queue. Wq = Lq/λ = 4.05/100 = 40.5ms. (3) Total W = Wq + service = 33ms. With ρ=0.7 and M/D/1, Wq = ρ²/(2μ(1-ρ)) = 0.49/(2μ*0.3) = 0.817/μ, service = 1/μ, so 1.817/μ = 0.033s. Thus μ≈55/s and max service time is 1/55≈18.1ms.'
  common_mistake: |
    **The Pitfall:** Using standard M/M/1 P99 formulas for deterministic edge inference workloads.
    **The Rationale:** Candidates often recall the M/M/1 formulas from web distributed systems interviews, forgetting that edge inference service times are highly deterministic (M/D/1).
    **The Consequence:** Overestimating the queue wait time by 2x, leading to unnecessary hardware over-provisioning or incorrectly rejecting valid deployment architectures.
  napkin_math: |
    **Assumptions & Constraints:**
    - (1) SoC: L=5 frames, λ=60 FPS, service=10ms.
    - (2) Accelerator: M/D/1 queue, ρ=0.9, λ=100.
    - (3) Pipeline: M/D/1 queue, W=33ms, ρ=0.7.

    **Calculations:**
    - (1) W_queue = L/λ = 5/60 = 0.0833s = 83.3ms.
    - (1) Mean queue-plus-service latency = 83.3ms + 10ms = 93.3ms.
    - (2) μ = λ/ρ = 100/0.9 = 111.1/s.
    - (2) L_q = ρ² / (2*(1-ρ)) = 0.81 / 0.2 = 4.05 requests. W_q = L_q / λ = 4.05 / 100 = 0.0405s = 40.5ms.
    - (3) W_q = ρ² / (2*μ*(1-ρ)) = 0.49 / (0.6*μ) = 0.817/μ seconds.
    - (3) Total W = W_q + service = 0.817/μ + 1/μ = 1.817/μ = 0.033s.
    - Solving (3): μ = 1.817 / 0.033 = 55/s, meaning max service time = 1 / 55 = 18.1ms.

    **Conclusion & Interpretation:**
    - **Result: (1) 93.3ms mean queue-plus-service latency, (2) Lq=4.05 and Wq=40.5ms, (3) max service time about 18.1ms.** These estimates are derivable from Little's Law and M/D/1 formulas without inventing an unsupported P99 tail.
