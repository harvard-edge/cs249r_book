title: 'Edge Queueing Theory Fluency: Little''s Law Mental Math for Edge Systems'
scenario: You need to perform quick queueing theory estimations for three edge systems. (1) An SoC serving 60 FPS object detection with 5 frames in queue and a 10ms service time. (2) A dataflow accelerator at 90% utilization serving 100 inferences/s. (3) A pipeline that must complete in 33ms (30 FPS) with a utilization of ρ=0.7.
question: What are the P99 latency, accelerator queue length and mean wait, and maximum service time for the three quick edge queueing estimates?
details:
  realistic_solution: '(1) L=5 frames in queue (not system). W_queue = L/λ = 5/60 = 83ms. P99 ≈ 83+10+tail ≈ 150ms (much over 33ms SLO — drop to batch=1 or add GPU pipeline stage). (2) Accelerator, ρ=0.9, λ=100: μ=111 inf/s. M/D/1: Lq = ρ²/(2(1-ρ)) = 0.81/0.2 = 4.05 requests in queue. Wq = 4.05/100 = 40.5ms. (3) W = Wq + service = 33ms. M/D/1: Wq = ρ²/(2μ(1-ρ)). At ρ=0.7: Wq = 0.49/(2μ*0.3) = 0.817/μ. Service = 1/μ. Total: 0.817/μ + 1/μ = 1.817/μ = 33ms → μ = 55/s → max service = 18ms.'
  common_mistake: |
    **The Pitfall:** Using standard M/M/1 P99 formulas for deterministic edge inference workloads.
    **The Rationale:** Candidates often recall the M/M/1 formulas from web distributed systems interviews, forgetting that edge inference service times are highly deterministic (M/D/1).
    **The Consequence:** Overestimating the queue wait time by 2x, leading to unnecessary hardware over-provisioning or incorrectly rejecting valid deployment architectures.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * (1) SoC: L=5 frames, λ=60 FPS, service=10ms.
       * (2) Accelerator: M/D/1 queue, ρ=0.9, λ=100.
       * (3) Pipeline: M/D/1 queue, W=33ms, ρ=0.7.
    2. **Calculations:**
       * (1) W_queue = L/λ = 5/60 = 83ms. P99 ≈ 83 + 10 + tail ≈ 100-150ms.
       * (2) L_q = ρ² / (2*(1-ρ)) = 0.81 / 0.2 = 4.05 requests. W_q = L_q / λ = 4.05 / 100 = 40.5ms.
       * (3) W_q = ρ² / (2*μ*(1-ρ)) = 0.49 / (0.6*μ) = 0.817/μ. Total W = W_q + 1/μ = 1.817/μ = 33ms.
       * Solving (3): μ = 55/s, meaning max service time = 1 / 55 = 18.1ms.
    3. **Conclusion & Interpretation:**
       * **Using M/D/1 models correctly predicts μ = 55/s yields a max service time of 18ms. Result: Compute-Bound.**
