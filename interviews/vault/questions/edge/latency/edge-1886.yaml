title: Edge TPU Latency Decomposition for Real-time Object Detection
scenario: You are designing a real-time object detection system for an autonomous drone. The end-to-end latency budget, from capturing a video frame to issuing a control command, is 50ms. This pipeline involves raw video preprocessing on a CPU, data transfer to the TPU, inference, transfer back, and final post-processing.
question: How would you allocate and measure the Coral Edge TPU drone pipeline's 50 ms latency budget across preprocessing, transfers, inference, and control?
details:
  realistic_solution: 'The optimal architecture involves an iterative process: 1. Initial rough budget allocation based on empirical data or conservative estimates. 2. nsys profiling of CPU-bound preprocessing, DMA data transfers, and Edge TPU inference. 3. Optimizing data paths using zero-copy buffers. 4. Streamlining preprocessing and post-processing code with SIMD instructions. 5. Ensuring the model is aggressively optimized for INT8 quantization. The key is recognizing that non-inference I/O stages dominate the latency on such devices.'
  common_mistake: |
    **The Pitfall:** Over-allocating budget to the TPU's inference time.
    **The Rationale:** Candidates see "4 TOPS" and focus all their latency concerns on the model execution.
    **The Consequence:** They neglect the significant overheads of data movement (e.g., USB 3.0 bottleneck) and CPU preprocessing, resulting in a system that misses its 50ms deadline in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: MobileNetV2-SSD (lightweight).
    - Compute requirement: ~2.5 billion INT8 operations.
    - Edge TPU peak compute: 4 TOPS.
    - USB 3.0 transfer limit: ~400 MB/s.

    **Calculations:**
    - Theoretical inference time = 2.5e9 ops / 4e12 ops/sec = 0.625 ms.
    - Total latency budget = 50 ms.

    **Conclusion & Interpretation:**
    - **Result: 15ms (I/O and CPU-Bound).** A realistic 50ms budget allocation: Preprocessing (15ms), Transfer to TPU (10ms), Inference (5ms), Transfer from TPU (5ms), Post-processing (15ms).
