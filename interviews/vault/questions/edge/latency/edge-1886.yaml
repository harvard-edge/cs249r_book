title: Edge TPU Latency Decomposition for Real-time Object Detection
scenario: You are designing a real-time object detection system for an autonomous drone. The end-to-end latency budget, from capturing a video frame to issuing a control command, is 50ms. This pipeline involves raw video preprocessing on a CPU, data transfer to the TPU, inference, transfer back, and final post-processing.
question: How would you allocate and measure the Coral Edge TPU drone pipeline's 50 ms latency budget across preprocessing, transfers, inference, and control?
details:
  realistic_solution: 'The optimal architecture starts with a conservative latency budget, then validates it with timestamps around each stage: camera capture, CPU preprocessing, host-to-TPU transfer, Edge TPU delegate invocation, result transfer, post-processing, and control output. Use platform timing tools and application-level traces rather than relying on peak TOPS. Optimize the largest measured stages first: reduce resize/color-conversion cost, keep buffers contiguous or zero-copy where supported, use an INT8 model fully compiled for the Edge TPU, and minimize USB or host runtime overhead. The key is recognizing that non-inference I/O and CPU stages can dominate the 50 ms drone control budget.'
  common_mistake: |
    **The Pitfall:** Over-allocating budget to the TPU's inference time.
    **The Rationale:** Candidates see "4 TOPS" and focus all their latency concerns on the model execution.
    **The Consequence:** They neglect the significant overheads of data movement (e.g., USB 3.0 bottleneck) and CPU preprocessing, resulting in a system that misses its 50ms deadline in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: MobileNetV2-SSD compiled to INT8 for Edge TPU.
    - End-to-end budget: 50 ms from camera frame to control command.
    - USB or host transfer bandwidth is shared with runtime overhead, so peak link rate is only a lower-bound guide.

    **Calculations:**
    - Reserve a measured starting budget: preprocessing 12 ms, transfer to TPU 5 ms, TPU inference 8 ms, result transfer 3 ms, postprocessing/control 17 ms, margin 5 ms.
    - Total starting allocation = 12 + 5 + 8 + 3 + 17 + 5 = 50 ms.
    - If profiling shows preprocessing takes 18 ms instead of 12 ms, the pipeline is already 6 ms over that stage budget and must recover time from resize/color conversion, buffering, or model I/O size.
    - Peak TOPS should only be used as a sanity check; the release decision comes from measured per-stage latency percentiles.

    **Conclusion & Interpretation:**
    - **Result: profile against a measured 50 ms decomposition.** A plausible starting allocation leaves explicit margin and must be adjusted after timestamping each stage because peak TOPS does not predict end-to-end drone latency.
