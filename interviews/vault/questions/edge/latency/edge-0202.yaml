title: The Continuous Batching Throughput Gain
scenario: An object detection server on a Jetson AGX Orin processes inferences for multiple cameras. A batch size of 1 takes 22 ms. Using continuous batching, a batch of 4 requests takes 40 ms.
question: What is the percentage increase in overall request throughput achieved by using continuous batching?
details:
  realistic_solution: |
    First, calculate the throughput (requests per second) for both the sequential and batched scenarios. Then, calculate the percentage increase from the sequential baseline to the batched performance.
  common_mistake: |
    **The Pitfall:** Calculating latency reduction per request instead of system throughput gain.
    **The Rationale:** Engineers assume inference latency scales linearly, concluding batching offers no benefit.
    **The Consequence:** Deploying sequential processing architectures that waste massive amounts of compute capacity on kernel launch overheads.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sequential latency: Batch size of 1 takes 22 ms.
    - Batched latency: Batch of 4 requests takes 40 ms.

    **Calculations:**
    - Sequential Throughput: 1000 ms / 22 ms/req = 45.45 requests/sec.
    - Batched Throughput: 4 requests / 40 ms = 100 requests/sec.
    - Improvement Calculation: (100 - 45.45) / 45.45 = 1.20 (120%).

    **Conclusion & Interpretation:**
    - **Result: 120% increase (Compute-Bound)**. Continuous batching yields a massive increase in overall system throughput.
  options:
  - '0%'
  - '55%'
  - '45%'
  - '120%'
  correct_index: 3
