title: 'Edge Queueing Theory Evaluation: Static vs Dynamic Batching on Jetson Orin'
scenario: 'An edge Jetson Orin receives Poisson arrivals at 40 inference requests/s. Model processing takes 10ms at batch=1 and 14ms at batch=8.'
question: 'At 40 req/s, should the Jetson Orin use static batch=8 with a 200 ms wait or dynamic batching with a 20 ms timeout?'
details:
  realistic_solution: 'Dynamic batching is vastly superior. Static batching forces a high mean wait time to fill the batch, degrading latency unnecessarily at lower arrival rates. Dynamic batching with a strict timeout flushes the queue early, achieving near-optimal service times while preserving low latency during sparse arrival windows.'
  common_mistake: |
    **The Pitfall:** Blindly applying static max-batching to edge inference.
    **The Rationale:** Candidates import cloud-datacenter batching intuition (where arrival rates are massive) to the edge (where arrivals are sparse and Poisson).
    **The Consequence:** P99 latency spikes that violate real-time SLA deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival rate: 40 req/s.
    - Static: batch=8, up to 200ms wait. Service = 14ms.
    - Dynamic: batch 1-8, 20ms timeout. Service = ~10ms (at batch~1).

    **Calculations:**
    - Static: Fill time = 8/40 = 200ms. Mean wait = 100ms. Mean W = 100ms + 14ms = 114ms.
    - Dynamic: Expected batch in 20ms = 40 * 0.02 = 0.8 items. Service = 10ms. Mean W = 20ms + 10ms = 30ms.

    **Conclusion & Interpretation:**
    - **Result: Dynamic latency (30ms) is ~4x better than Static (114ms) (Latency-Bound)**. Dynamic batching resolves the queueing bottleneck.
