title: The RTOS vs RT-Linux Tradeoff
scenario: Your team is building an industrial quality inspection system. A camera captures parts on a conveyor belt at 60 FPS. You must run a defect detection model and trigger a reject actuator within 16.7ms (one frame period) — a hard real-time deadline. The ML engineer wants Linux (for PyTorch, TensorRT, easy development). The firmware engineer wants FreeRTOS (for deterministic timing).
question: Who is right, and how do you design a system to resolve this conflict?
details:
  realistic_solution: 'Neither is fully right — the answer is a heterogeneous architecture. Cores running Linux handle the GPU and TensorRT inference, writing the result to cache-coherent shared memory. Cores running the RTOS handle the hard real-time control loop, reading the detection results and triggering the actuator. The timing contract: Linux must deliver a result within 12ms. If Linux misses the deadline, the RTOS defaults to a "reject" fail-safe. PREEMPT_RT Linux alone has worst-case latency of 150 us, acceptable for soft real-time, but a 16.7ms hard deadline requires the RTOS guarantee.'
  common_mistake: |
    **The Pitfall:** Believing PREEMPT_RT makes Linux a hard real-time OS, or assuming FreeRTOS can run complex GPU ML workloads.
    **The Rationale:** Misunderstanding the difference between reducing worst-case latency scheduling (PREEMPT_RT) and guaranteeing hard deterministic hardware deadlines (RTOS).
    **The Consequence:** Missed real-time deadlines leading to un-rejected defective parts, or failure to deploy the ML model entirely due to RTOS library constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame budget: 16.7 ms (60 FPS).
    - TensorRT inference: 8 ms average, 11 ms worst case.
    - Linux PREEMPT_RT jitter: 0.15 ms worst case.
    - RTOS jitter: < 0.001 ms.
    - Shared memory + RTOS trigger: 0.06 ms.

    **Calculations:**
    - Total hybrid worst-case: 11 ms + 0.15 ms + 0.06 ms = 11.21 ms.
    - Headroom: 16.7 ms - 11.21 ms = 5.49 ms.
    - Unmitigated Linux stall (e.g., page fault): ~5 ms. Total = 16.21 ms.

    **Conclusion & Interpretation:**
    - **Result: Latency-Bound Guarantee**. Without the RTOS safety net, a single standard OS stall pushes the pipeline to 16.2ms, dangerously close to the deadline with no fail-safe, proving the heterogeneous architecture is mandatory.
