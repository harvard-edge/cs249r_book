title: 'Accelerator Intersection Utilization'
scenario: 'A smart intersection traffic camera uses an edge AI accelerator. Frames arrive randomly at an average of 30 per second, and inference takes 20ms per frame.'
question: 'Calculate the utilization of the chip using basic queueing theory.'
details:
  realistic_solution: 'The service rate is 1/0.02s = 50 frames per second. Utilization (rho) is the arrival rate (30) divided by the service rate (50). The utilization is 60%.'
  common_mistake: |
    **The Pitfall:** Dividing arrival rate by inference time directly without matching units.
    **The Rationale:** Candidates hastily compute 30 / 20 = 1.5, failing to realize the arrival rate is per second while the inference time is in milliseconds.
    **The Consequence:** Producing non-sensical utilization metrics (>100%) and failing basic queueing theory.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival rate (\u03bb) = 30 frames per second.
    - Inference time = 20ms = 0.02s.

    **Calculations:**
    - Service rate (\u03bc) = 1 / 0.02s = 50 frames per second.
    - Utilization (\u03c1) = \u03bb / \u03bc = 30 / 50 = 0.60 (60%).

    **Conclusion & Interpretation:**
    - **Result: 60% Utilization (Compute-Bound)**. The system is well within capacity.
