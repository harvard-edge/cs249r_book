title: Latency Decomposition for Real-time Inference on NVIDIA Jetson Orin
scenario: You are deploying a real-time object detection model on an edge NPU. The end-to-end latency requirement is 100ms from camera input to actionable output.
question: How would you decompose the 100 ms object-detection latency budget into acquisition, preprocessing, inference, postprocessing, and output?
details:
  realistic_solution: 'A robust 100ms real-time latency budget demands rigorous pipeline decomposition via nsys profiling. Raw NPU execution frequently comprises less than 20% of end-to-end latency. System bottlenecks are heavily skewed toward input DMA acquisition, CPU-bound image tensor prep, and Non-Maximum Suppression (NMS) post-processing. Optimization must aggressively target asynchronous execution and memory-mapped buffers, as raw NPU TOPS won''t salvage CPU-bound I/O thrashing.'
  common_mistake: |
    **The Pitfall:** Focusing solely on model inference time and ignoring end-to-end system overhead.
    **The Rationale:** Candidates assume that raw NPU TOPS guarantees real-time performance.
    **The Consequence:** The system wildly misses the 100ms SLA because data transfer, CPU-bound image resizing, and NMS consume the majority of the time.
  napkin_math: |
    **Assumptions & Constraints:**
    - Budget: 100ms.
    - Hardware compute: 275 TOPS.
    - Model compute cost: 5 TOPS.

    **Calculations:**
    - Theoretical inference = (5 TOPS / 275 TOPS) * 1000ms ≈ 18ms.
    - Profiled breakdown = 20ms (prep) + 50ms (inference + mem) + 15ms (post) + 15ms (IO) = 100ms.

    **Conclusion & Interpretation:**
    - **Result: End-to-end latency is 100ms, not 18ms (Pipeline-Bound)**. Non-compute overhead completely dominates the latency pipeline.
