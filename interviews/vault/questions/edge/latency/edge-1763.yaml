title: Hailo-8 End-to-End Latency Decomposition
scenario: You are designing an edge traffic analysis system deploying a 30 GOPS INT8 object detection model on a Hailo-8 accelerator. The host preprocesses each 1080p frame into a 640x640x3 INT8 accelerator tensor, the raw detector output before NMS is about 100 KB, and PCIe Gen3 x4 effective bandwidth is 3.9 GB/s. Early prototyping shows 15ms sequential end-to-end latency per frame, with host preprocessing measured at 6.5ms.
question: How would you break down the 15 ms latency across preprocessing, PCIe transfers, accelerator compute, and postprocessing?
details:
  realistic_solution: |
    Use a stage breakdown that sums to the measured 15ms sequential path: 6.5ms host preprocessing, about 0.32ms PCIe input transfer for the 640x640x3 INT8 tensor, about 1.15ms accelerator compute from 30 GOPS / 26 TOPS, about 0.03ms PCIe output transfer for the 100 KB raw detector output, and about 7.0ms host postprocessing for decode and NMS. The result shows host work dominates while PCIe transfer is small because only the preprocessed tensor and compact detector output cross the bus.
  common_mistake: |
    **The Pitfall:** Assuming edge accelerator latency is purely compute-bound (GOPS / TOPS).
    **The Rationale:** Candidates ignore bus transfer times and host-CPU dependencies on streaming architectures that lack local DRAM.
    **The Consequence:** Wildly inaccurate architectural sizing and failure to meet real-time streaming constraints.
  napkin_math: |
    **Assumptions & Constraints:**
       - Hailo-8 performance: 26 TOPS. Workload: 30 GOPS INT8.
       - Accelerator input tensor: 640x640x3 INT8 = 1.23 MB.
       - Raw detector output before NMS: 100 KB.
       - PCIe Gen3 x4 effective bandwidth: ~3.9 GB/s.
       - Measured host preprocessing: 6.5 ms.
    **Calculations:**
       - Compute Latency: 30 GOPS / 26 TOPS = 1.15 ms.
       - PCIe Transfer In: 1.23 MB / 3.9 GB/s = 0.32 ms.
       - PCIe Transfer Out: 0.10 MB / 3.9 GB/s = 0.03 ms.
       - Accounted latency before postprocessing = 6.5 + 0.32 + 1.15 + 0.03 = 8.0 ms.
       - Host postprocessing = 15.0 - 8.0 = 7.0 ms.
    **Conclusion & Interpretation:**
       - **Result: 6.5 ms preprocess, 0.32 ms input transfer, 1.15 ms compute, 0.03 ms output transfer, 7.0 ms postprocess.** The measured sequential path is host-dominated, with PCIe transfer small because the accelerator sees preprocessed tensors rather than full RGB frames.
