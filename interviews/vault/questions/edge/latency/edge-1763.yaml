title: Hailo-8 End-to-End Latency Decomposition
scenario: You are designing an edge traffic analysis system deploying a 30 GOPS INT8 object detection model on a Hailo-8 accelerator. The dataflow architecture features no local DRAM, relying entirely on streaming inputs and outputs directly from host memory over PCIe. Early prototyping shows a sequential end-to-end latency of 15ms per frame.
question: How would you break down the 15 ms latency across preprocessing, PCIe transfers, accelerator compute, and postprocessing?
details:
  realistic_solution: 'Systematically break down the 15ms into host preprocessing (image decoding/resizing), PCIe input streaming, accelerator compute, PCIe output streaming, and host postprocessing (NMS). Identify that CPU-bound pre/postprocessing dominates the critical path, and propose pipelining to overlap host tasks with Hailo-8 compute, while switching to YUV420 to slash PCIe transfer latency.'
  common_mistake: |
    **The Pitfall:** Assuming edge accelerator latency is purely compute-bound (GOPS / TOPS).
    **The Rationale:** Candidates ignore bus transfer times and host-CPU dependencies on streaming architectures that lack local DRAM.
    **The Consequence:** Wildly inaccurate architectural sizing and failure to meet real-time streaming constraints.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hailo-8 performance: 26 TOPS. Workload: 30 GOPS INT8.
       - Input: 1080p RGB (1920x1080x3 bytes = 6.22 MB).
       - PCIe Gen3 x4 effective bandwidth: ~3.9 GB/s.
    2. **Calculations:**
       - Compute Latency: 30 GOPS / 26 TOPS = 1.15 ms.
       - PCIe Transfer In: 6.22 MB / 3.9 GB/s = 1.59 ms.
       - PCIe Transfer Out (Raw tensors): ~2 MB / 3.9 GB/s = 0.51 ms.
       - Total Accelerator Footprint = 1.59 + 1.15 + 0.51 = 3.25 ms.
       - Remaining Host Overhead = 15 ms - 3.25 ms = 11.75 ms.
    3. **Conclusion & Interpretation:**
       - **Result: CPU-Bound Pre/Post-processing**. The vast majority (11.75 ms) of the 15 ms latency is consumed by host-side preprocessing and postprocessing (e.g., NMS), not the NPU.
