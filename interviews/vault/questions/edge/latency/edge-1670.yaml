title: 'Edge TPU Pipeline Profiling and Bottleneck Resolution'
scenario: 'You are deploying a cascaded object detection pipeline on a Google Coral Edge TPU connected via USB 3.0. Profiling traces reveal that although the Edge TPU handles INT8 operations efficiently, the end-to-end latency is 150ms per frame, failing your 33ms target. Flame graphs indicate severe I/O bottlenecking caused by a single unsupported activation function in the middle of the network, which forces execution to fall back to the host CPU.'
question: 'How would you eliminate the Coral Edge TPU CPU fallback and redesign the pipeline to meet the 33ms frame target?'
details:
  realistic_solution: 'The optimal solution requires replacing the unsupported activation function with an Edge TPU-compatible equivalent (e.g., replacing Swish with ReLU6) and retraining the model to ensure 100% of the graph compiles into a single Edge TPU execution block. Additionally, the pipeline should be redesigned to crop or downsample the input on the host before transferring it over USB, drastically reducing the initial payload size and overlapping I/O with TPU execution.'
  common_mistake: 'Candidates often focus solely on model pruning or further quantization, ignoring the massive PCIe/USB bandwidth penalty of host CPU fallbacks. They fail to analyze the trace tools correctly to see that data transfer dominates the execution time rather than the actual INT8 compute.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Google Coral Edge TPU: 4 TOPS (INT8), 2W power envelope.
    - Target Latency: 33ms.
    - INT8 model operations: 10 GOPS.
    - USB 3.0 bandwidth: ~300 MB/s practical.
    - Raw 1080p frame size: 1920x1080x3 bytes = 6.2 MB.
    - Unsupported op forces a 2 MB intermediate tensor fallback.

    **Calculations:**
    - TPU compute time: 10e9 / 4e12 = 2.5ms.
    - USB transfer latency (1080p raw): 6.2 MB / 300 MB/s = 20.7ms.
    - CPU fallback I/O latency: 4 MB (round trip) / 300 MB/s = 13.3ms.
    - Unoptimized total time: 20.7ms + 2.5ms + 13.3ms = 36.5ms (misses 33ms target).
    - Optimized host downsampling (640x640): 1.2 MB / 300 MB/s = 4ms transfer.
    - Optimized total time (no fallback): 4ms + 2.5ms = 6.5ms.

    **Conclusion & Interpretation:**
    - **Result: 6.5ms total latency (I/O-Bound)**. Eliminating CPU fallback and host-side downsampling comfortably achieves the real-time target.
