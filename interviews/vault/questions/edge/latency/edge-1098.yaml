title: 'Edge Queueing Theory Recall: Little''s Law at the Network Edge'
scenario: 'A Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) running a YOLOv8 detection pipeline maintains L=3 frames in the processing queue and processes 15 FPS.'
question: 'Using Little''s Law, what is the mean latency per frame, and what does it imply for real-time video at 30 FPS?'
details:
  realistic_solution: 'Little''s Law: L = λ × W. L=3 frames in system, λ=15 FPS. W = L/λ = 3/15 = 200ms per frame. For 30 FPS real-time: each frame must be processed in 33ms. Current W=200ms means the system is running 6x slower than needed. At 15 FPS output with 30 FPS input, queue grows unboundedly — ρ=30/15=2.0 > 1. System is overloaded. Need to reduce model complexity, use Hailo-8 co-processor (26 TOPS INT8, 2.5W), or drop frames.'
  common_mistake: Forgetting that Little's Law applies to the steady-state average and confusing frames in queue (Lq) with frames in system (L = Lq + frame being processed).
  napkin_math: |
    **Assumptions & Constraints:**
    - Wait time in system (W) = L / λ = 3 / 15 = 0.2s = 200ms.
    - 30 FPS real-time requires W ≤ 33ms.
    
    **Calculations:**
    - Gap: 200ms / 33ms = 6x slower.
    - YOLOv8n on Jetson Orin: ~5ms inference. Where does 200ms go?
    - Preprocessing bottleneck: 150ms. Optimize down to 15ms -> W = 20ms < 33ms.
    
    **Conclusion & Interpretation:**
    - **Result: 200ms (Preprocessing-Bound)**. Jetson Orin 275 TOPS INT8 can run YOLOv8s at ~150 FPS, meaning the pipeline is bounded by data movement/preprocessing, not compute.
