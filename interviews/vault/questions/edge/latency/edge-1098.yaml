title: 'Edge Queueing Theory Recall: Little''s Law at the Network Edge'
scenario: A Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) running a YOLOv8 detection pipeline maintains L=3 frames in the processing queue and processes 15 FPS.
question: Using Little's Law, what is the mean latency per frame, and what does it imply for real-time video at 30 FPS?
details:
  realistic_solution: 'Little''s Law: L = λ × W. With L=3 frames in the system and throughput λ=15 FPS, the mean time in system is W = L/λ = 3/15 = 0.2s = 200ms per frame. A 30 FPS real-time target allows about 33ms per frame, so the measured mean latency is about 6x higher than the real-time budget. The result shows the current pipeline does not meet 30 FPS latency requirements; it does not by itself prove an unstable input queue unless the arrival rate is also specified as 30 FPS.'
  common_mistake: |
    **The Pitfall:** Forgetting that Little's Law applies to the steady-state average and confusing frames in queue (Lq) with frames in system (L = Lq + frame being processed).
    **The Rationale:** Candidates incorrectly recall the queueing definitions.
    **The Consequence:** Latency is calculated inaccurately, hiding true bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Wait time in system (W) = L / λ = 3 / 15 = 0.2s = 200ms.
    - 30 FPS real-time requires W ≤ 33ms.

    **Calculations:**
    - Gap: 200ms / 33ms = 6x slower.

    **Conclusion & Interpretation:**
    - **Result: 200ms mean system latency.** This is about 6x above the 33ms budget for 30 FPS real-time video, so the pipeline must reduce end-to-end latency before it can satisfy the target.
