title: 'Edge Queueing Theory Optimization: Reduce Jetson Orin P99 by Model Cascading'
scenario: 'An edge device serving smart home voice commands shows P99=800ms at ρ=0.85 (M/M/1, μ=100 req/s, λ=85 req/s). A two-stage cascade is proposed: Stage 1 (small model, 10ms, handles 80% of requests), Stage 2 (large model, 80ms, handles remaining 20%).'
question: How much can the two-stage small/large model cascade reduce P99 latency, and is Stage 2 stable without adding hardware?
details:
  realistic_solution: Utilize fundamental M/M/1 queueing analysis. While Stage 1 clears the majority of traffic with radically lower wait times, Stage 2 instantly breaches stability (ρ > 1) if processed on the same unpartitioned thread. Remediate this by explicitly provisioning dedicated CUDA streams or partitioning SMs (via MPS) to grant Stage 2 its own queue, lowering total P99 without hardware upgrades.
  common_mistake: |
    **The Pitfall:** Overlooking the cascading queue buildup and assuming isolated service times.
    **The Rationale:** Candidates assess the models individually, failing to apply the mathematical reality that 20% of requests suffer the accumulated wait times of both stages simultaneously.
    **The Consequence:** Deploying an architecture that instantly spirals into queue instability (ρ > 1), resulting in infinite latency spikes for edge users.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline System: P99=800ms at ρ=0.85
    - Cascade Stage 1: 10ms, handles 80% of volume
    - Cascade Stage 2: 80ms, handles 20% of volume (17 req/s)

    **Calculations:**
    - Stage 1 execution: ρ=0.85, Yields P99 = ~307ms
    - Stage 2 baseline μ = 12.5/s. Load (λ) = 17/s.
    - Stage 2 load ratio (ρ) = 17 / 12.5 = 1.36 (ρ > 1 -> Unstable)
    - Optimization via streams pushes μ to 25/s, dropping ρ to 0.68, yielding max P99 ~770ms.

    **Conclusion & Interpretation:**
    - **Result: 2.6x reduction (Queue-Bound)**. Proper stream isolation stabilizes the system and drops primary P99 by 2.6x (from 800ms to 307ms).
