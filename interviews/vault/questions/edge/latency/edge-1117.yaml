title: 'Edge Queueing Theory Optimization: Reduce Jetson Orin P99 by Model Cascading'
scenario: 'An edge device serving smart home voice commands shows P99=800ms at ρ=0.85 (M/M/1, μ=100 req/s, λ=85 req/s). A two-stage cascade is proposed: Stage 1 (small model, 10ms, handles 80% of requests), Stage 2 (large model, 80ms, handles remaining 20%).'
question: Is the two-stage small/large model cascade feasible for P99 latency, and how much Stage 2 capacity is needed?
details:
  realistic_solution: The cascade is not feasible for finite P99 latency as specified. Stage 1 processes the full 85 req/s stream with 10ms service, so μ1=100 req/s and ρ1=0.85. The slow path is what matters for P99 because 20% of requests go to Stage 2. Stage 2 receives 0.20*85=17 req/s with 80ms service, so μ2=12.5 req/s and ρ2=1.36. Stage 2 is unstable without adding capacity or reducing its service time, so the end-to-end P99 is unbounded rather than reduced from 800ms. Stage 2 needs μ2>17 req/s, meaning service time below 58.8ms, with additional headroom needed for a practical P99 target.
  common_mistake: |
    **The Pitfall:** Overlooking the cascading queue buildup and assuming isolated service times.
    **The Rationale:** Candidates assess the models individually, failing to apply the mathematical reality that 20% of requests suffer the accumulated wait times of both stages simultaneously.
    **The Consequence:** Deploying an architecture that instantly spirals into queue instability (ρ > 1), resulting in infinite latency spikes for edge users.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline System: P99=800ms at ρ=0.85
    - Cascade Stage 1: 10ms service for the incoming stream.
    - Cascade Stage 2: 80ms service for the 20% of requests escalated by Stage 1 (17 req/s).

    **Calculations:**
    - Stage 1: μ1 = 1/0.010 = 100/s, ρ1 = 85/100 = 0.85.
    - Stage 2: λ2 = 0.20*85 = 17/s, μ2 = 1/0.080 = 12.5/s.
    - Stage 2 load ratio: ρ2 = 17/12.5 = 1.36, so Stage 2 is unstable.
    - Minimum stable Stage 2 capacity: μ2 > 17/s, equivalent to service time < 1/17s = 58.8ms.
    - Because 20% of requests require Stage 2, the end-to-end P99 belongs to the unstable slow path.

    **Conclusion & Interpretation:**
    - **Result: no finite P99 reduction as specified (Queue-Bound).** The cascade lowers latency for the fast-path majority, but Stage 2 needs more than 17 req/s of capacity before any end-to-end P99 reduction can be claimed.
