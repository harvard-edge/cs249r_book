title: Jetson Orin Thermal Throttling and Inference Latency Tail
scenario: A passively cooled Jetson Orin NX (15W mode) shows 28ms latency at 22°C ambient, degrading to 95ms at 38°C.
question: What causes the afternoon p99 latency spike, how does thermal throttling explain it, and how would you harden the deployment?
details:
  realistic_solution: 'The afternoon spike is caused by thermal headroom collapse: 38°C ambient plus solar load pushes the passively cooled module near its throttle point, so GPU clocks drop and service time rises. A modest 25% clock reduction changes 28ms service time to about 37ms; if requests arrive roughly every 40ms, utilization rises from 0.70 to 0.93, leaving very little service headroom and making the observed 95ms p99 plausible. This is an illustrative queueing explanation, not a fitted latency model. Harden the deployment with active cooling or shading, lower-TDP/workload shaping during hot periods, and thermal headroom alerts that shed load before throttling.'
  common_mistake: |
    **The Pitfall:** Blaming software or model issues rather than thermal queueing effects.
    **The Rationale:** Cloud engineers are unaccustomed to systems without active cooling exhibiting strong temperature-dependent performance drops.
    **The Consequence:** Endless software refactoring that ignores the core physical throttling limit, leaving the system fundamentally unstable.
  napkin_math: |
    **Assumptions & Constraints:**
    - TDP = 15W.
    - Morning ambient = 22°C, Afternoon = 38°C + 12°C solar.
    - Passive θja = 1.8°C/W.

    **Calculations:**
    - Effective afternoon ambient: 38°C + 12°C solar = 50°C.
    - Afternoon junction: 50°C + (15W * 1.8°C/W) = 77°C, near the throttle threshold.
    - Throttled clocks by 25% means service time = 28ms / 0.75 = 37.3ms.
    - If arrival interval is 40ms, morning ρ = 28/40 = 0.70 and throttled ρ = 37.3/40 = 0.93.
    - Illustrative headroom shrinkage: slack falls from 1 - 0.70 = 0.30 to 1 - 0.93 = 0.07, about 4.3x less spare capacity.
    - This proxy explains why p99 can grow sharply near saturation, but it is not a formal derivation of the measured 95ms tail.

    **Conclusion & Interpretation:**
    - **Result: ρ rises from 0.70 to 0.93 (Thermally-Bound).** Thermal throttling leaves too little service headroom, so small service-time increases can plausibly produce a large p99 latency spike.
