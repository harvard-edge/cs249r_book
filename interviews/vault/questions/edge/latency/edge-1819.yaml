title: Hailo-8 Stream Profiling and Latency Bottleneck Analysis
scenario: You are designing a high-throughput video analytics pipeline using a host CPU connected to a Hailo-8 accelerator via PCIe. The Hailo-8 is a dataflow accelerator capable of 26 TOPS at INT8 precision, but profiling shows the end-to-end latency is significantly higher than expected and accelerator utilization is poor. Given that the Hailo-8 has no local DRAM and relies on streaming data directly from host memory.
question: What comprehensive profiling architecture would you specify to determine whether Hailo-8 latency comes from preprocessing, PCIe bandwidth, or dataflow stalls?
details:
  realistic_solution: |
    Specify a staged profiling plan: time preprocessing separately on the host with perf, eBPF, or application timers; measure PCIe and DMA transfer throughput with host counters and runtime timestamps; and inspect Hailo runtime/profiler outputs for device-side graph timing, queue depth, and dataflow idle time. Attribute latency only after correlating host preprocessing, transfer service time, and accelerator execution/stall counters, so PCIe bandwidth limits are not confused with compute saturation.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is the accelerator's compute capacity and pruning the model.
    **The Rationale:** Candidates overlook Hailo-8's lack of local DRAM and fail to profile the host-to-device PCIe streaming rate.
    **The Consequence:** Degrading model accuracy via quantization/pruning while the actual latency issue (host memory bandwidth) remains unfixed.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1080p RGB frame (6.22 MB)
    - Target: 60 FPS
    - Measured degraded host streaming rate: 150 MB/s
    - Hailo-8 Peak: 26 TOPS

    **Calculations:**
    - Required input streaming rate = 6.22 MB/frame * 60 frame/s = 373.2 MB/s
    - Measured bandwidth ratio = 150 MB/s / 373.2 MB/s = 0.402
    - At 150 MB/s, maximum raw-frame service rate = 150 MB/s / 6.22 MB/frame = 24.1 FPS

    **Conclusion & Interpretation:**
    - **Result: Underprovisioned input stream.** The measured host path can only feed about 40% of the 60 FPS target for raw 1080p RGB frames. This proves a transfer/preprocessing bottleneck is plausible, but actual device stall fraction must come from Hailo runtime counters or traces.
