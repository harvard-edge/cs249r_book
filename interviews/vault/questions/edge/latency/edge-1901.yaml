title: Real-time Object Detection Latency Optimization on NVIDIA Jetson Orin
scenario: Your team has deployed a critical real-time object detection model on an edge SoC for an autonomous driving application. The model is expected to achieve a consistent end-to-end inference latency of under 50ms. However, production monitoring shows sporadic latency spikes, occasionally exceeding 100ms, leading to missed detections. The system processes a 1080p video stream at 30 FPS.
question: How would you diagnose and quantify the bottlenecks causing 1080p/30 FPS latency spikes above 100 ms?
details:
  realistic_solution: 'The solution involves a multi-pronged profiling strategy. First, use an advanced profiler (like Nsight Systems) to get a system-wide trace, covering GPU kernel execution, CPU activity, memory transfers, and I/O operations. This provides a timeline view to identify major stalls or sequential bottlenecks. If the trace points to GPU kernels, use a kernel profiler (Nsight Compute) to identify uncoalesced memory access or low occupancy. If CPU preprocessing or I/O is suspected, leverage Linux tools like `perf` and `strace`. Flame graphs generated from `perf` data visually represent call stack hot spots. The iterative process is: profile -> identify bottleneck -> hypothesize fix -> implement fix -> re-profile.'
  common_mistake: |
    **The Pitfall:** Immediately assuming the GPU inference is the bottleneck.
    **The Rationale:** Candidates skip system-wide profiling and focus solely on model inference time, ignoring data transfer, pre-processing, or post-processing overheads on the CPU or I/O.
    **The Consequence:** Aggressively quantizing an already efficient model, degrading accuracy without actually solving the sporadic >100ms latency spikes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * 1080p frame = 6 MB. 30 FPS.
       * SoC LPDDR5 bandwidth ≈ 68 GB/s. 50ms latency deadline.
    2. **Calculations:**
       * Input bandwidth = 180 MB/s (well within 68 GB/s).
       * A 10ms memory blocking synchronization stall per frame equals 300ms/s of pure idle wait time.
    3. **Conclusion & Interpretation:**
       * **Using system-wide profiling identifies non-compute pre/post-processing stalls that cause the >100ms tail latency spikes. Result: I/O Synchronization-Bound.**
