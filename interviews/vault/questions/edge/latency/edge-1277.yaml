title: Coral Edge TPU Pipeline Bottleneck Analysis Design
scenario: Your team is deploying a multi-stage vision pipeline on an edge accelerator via USB 3.0. Initial profiling shows end-to-end latency misses the 30 FPS target, yet accelerator utilization is surprisingly low.
question: How would you profile the pipeline to locate whether latency comes from I/O, CPU pre/post-processing, or operator fallbacks?
details:
  realistic_solution: A strong candidate will propose a systematic profiling approach starting with the Edge TPU compiler's log to check for subgraph partitioning (operator fallback). They will architect a tracing setup using system-level tools (like `perf` or `ftrace`) alongside Edge TPU runtime metrics to independently measure host-to-device I/O latency, CPU pre/post-processing time, and pure TPU execution time to isolate the exact bottleneck.
  common_mistake: |
    **The Pitfall:** Focusing immediately on model pruning or further quantization.
    **The Rationale:** Engineers assume low utilization means the model is too complex, ignoring the massive latency cost of subgraph partitioning and host fallbacks.
    **The Consequence:** Wasted effort shrinking a model that is actually blocked by CPU context switches and USB data transfers.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target: 33.3ms (30 FPS). Compute time: 0.5ms. USB 3.0: ~400 MB/s. Input tensor: 2MB. Fallback tensor: 1MB.
    2. **Calculations:**
       - Initial Input Transfer: 2MB / 400 MB/s = 5ms.
       - Fallback Roundtrip: (1MB read + 1MB write) / 400 MB/s = 5ms per partition.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound by Fallbacks.** A single unsupported operator fallback adds 5ms of I/O overhead, rapidly consuming the 33ms budget despite negligible compute time.
