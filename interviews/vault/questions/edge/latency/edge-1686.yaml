title: Dynamic Batching Latency Optimization on Jetson Orin
scenario: Your team is deploying a multi-camera perception system for an autonomous vehicle. The system ingests 6 concurrent video streams at 30 FPS, and you are currently using dynamic batching on the Ampere GPU with a 15ms timeout window to maximize throughput. However, tail latency periodically spikes to 80ms, violating the strict 33.3ms real-time latency deadline for the control loop.
question: What causes the 80ms tail latency from dynamic batching, and what batching strategy would meet the 33.3ms deadline?
details:
  realistic_solution: The optimal approach is to replace dynamic batching on the GPU with a hybrid static batching strategy that leverages both the primary GPU and the Deep Learning Accelerators (DLAs). By splitting the 6 streams into fixed static batches of 2, you can pipeline the execution across the GPU and the two DLA cores. This eliminates the dynamic batching wait window entirely and provides deterministic execution times, resolving the memory bandwidth contention that causes tail latency spikes.
  common_mistake: |
    **The Pitfall:** Simply reducing the dynamic batching timeout window.
    **The Rationale:** Candidates assume that lowering the timeout will reduce average latency, but this fails to address the tail latency caused by GPU memory contention and overlooks the heterogeneous accelerator architecture.
    **The Consequence:** The system will still experience tail latency spikes and miss the strict 33.3ms real-time deadline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Target deadline: 1000ms / 30 FPS = 33.3ms.
       * Model requires 0.5 TOPS per frame.
       * 6 streams at 30 FPS = 180 frames/sec = 90 TOPS total compute demand.
    2. **Calculations:**
       * Current dynamic batch latency: 15ms (timeout) + 18ms (GPU infer for batch 6) = 33ms, with spikes to 80ms due to memory contention.
       * Splitting into static batch size 2 (1 GPU pipeline, 2 DLA cores) drops execution time to 8ms per batch without wait timeouts.
    3. **Conclusion & Interpretation:**
       * **This guarantees an 8ms end-to-end latency and meets the strict 33.3ms deadline. Result: Scheduling & Contention-Bound.**
