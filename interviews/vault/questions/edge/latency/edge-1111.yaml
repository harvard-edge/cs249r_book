title: 'Edge Queueing Theory Fluency: Back-of-Envelope Edge Queue Sizing'
scenario: 'A Jetson Orin (275 TOPS INT8, 60W) must handle 4 concurrent camera streams each at 30 FPS. Your ResNet-50 model (INT8, 4 GOPS) needs to process 120 frames/s. ResNet-50 INT8 throughput on Jetson Orin: 1200 FPS (from TensorRT benchmark).'
question: Can the Jetson Orin handle 4x30 FPS ResNet-50 streams, and what are its capacity, utilization, queue wait, and latency?
details:
  realistic_solution: 'Capacity: 1200 FPS from the given TensorRT benchmark. Load: 4 streams * 30 FPS = 120 FPS. Utilization: \u03c1 = 120/1200 = 0.1. M/D/1 queue wait Wq = 0.1/(2*1200*0.9) = 0.1/2160s \u2248 46.3\u03bcs. Service time is 1/1200s = 0.833ms, so mean response time W = Wq + service \u2248 0.046ms + 0.833ms = 0.879ms. The 4-stream workload is feasible with about 90% unused benchmark capacity. Do not plan for 40 streams as a safe operating point: 40 * 30 = 1200 FPS gives \u03c1=1.0, where the queue is unstable. A 36-stream load gives \u03c1=0.9, Wq = 0.9/(2*1200*0.1) = 3.75ms and total W \u2248 4.58ms, but that is a high-utilization design point rather than spare capacity.'
  common_mistake: |
    **The Pitfall:** Confusing raw TOPS capacity with actual model throughput.
    **The Rationale:** Candidates attempt to calculate utilization based purely on Giga-Operations per second rather than relying on benchmarked FPS, ignoring memory bandwidth and dataflow efficiency.
    **The Consequence:** Grossly misestimating queueing utilization and predicting latency numbers that fail in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival Rate (\u03bb) = 4 streams * 30 FPS = 120 FPS.
    - Service Rate (\u03bc) = 1200 FPS.

    **Calculations:**
    - Utilization (\u03c1) = 120 / 1200 = 0.1 (10%).
    - M/D/1 queue wait Wq = \u03c1 / (2 * \u03bc * (1-\u03c1)) = 0.1 / (2400 * 0.9) = 0.1 / 2160s \u2248 46.3 \u03bcs.
    - Service time = 1 / 1200s = 0.833ms.
    - Mean response time W = Wq + service = 0.046ms + 0.833ms = 0.879ms.
    - Saturation point = 1200 FPS / 30 FPS per stream = 40 streams, but safe operation requires staying below that point.

    **Conclusion & Interpretation:**
    - **Result: 0.879ms mean response time with 10% utilization.** Four streams are clearly feasible; 40 streams is the saturation boundary, not a safe capacity target.
