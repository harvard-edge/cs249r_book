title: 'Edge Queueing Theory Evaluation: Jetson Orin vs Hailo-8+Pi Latency at Low Load'
scenario: 'Compare two edge deployments for a factory defect detection system at λ=20 detections/s: (A) Jetson Orin (275 TOPS INT8, 60W) standalone at μ=500 inf/s, (B) Hailo-8 (26 TOPS INT8, 2.5W) + Raspberry Pi 5 (μ=40 inf/s after host overhead). The defect model requires 5 GOPS INT8.'
question: For option B at λ=20/s and μ=40/s, what is the correct M/D/1 queue wait term before comparing latency and cost?
details:
  realistic_solution: 'M/D/1 Wq = ρ/(2μ(1-ρ)). With ρ=0.5, μ=40: Wq = 0.5/(2×40×0.5) = 12.5ms. The heavier system provides extremely fast processing, but if the 12.5ms queue wait meets the factory SLAs, the cheaper and lower-power Hailo-8 is the logical choice.'
  common_mistake: |
    **The Pitfall:** Over-provisioning hardware for negligible latency gains.
    **The Rationale:** Candidates immediately pick the Jetson Orin to eliminate queue times entirely.
    **The Consequence:** They choose a 60W, high-cost system when the 2.5W system's 12.5ms wait time is completely imperceptible and strictly sufficient for a 20 FPS load.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - M/D/1 Queue model (Poisson arrivals, deterministic service).
       - Arrival rate (λ) = 20/s.
       - Hailo-8 + Pi service rate (μ) = 40/s.
    2. **Calculations:**
       - Utilization (ρ) = λ / μ = 20 / 40 = 0.5.
       - Queue wait time (Wq) = ρ / (2 * μ * (1 - ρ)).
       - Wq = 0.5 / (2 * 40 * 0.5) = 0.5 / 40 = 0.0125 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: 12.5ms Wait**. The low-power Hailo-8 incurs only a 12.5ms queuing delay, proving that over-provisioning with the 60W Orin is completely unnecessary for this workload.
