title: The Bandwidth Bankruptcy
scenario: You have a fleet of 10,000 edge cameras streaming all detection results back to a central cloud dashboard over 4G/5G. Your first monthly bill arrives and it is $43,000. Based on the data flow diagram, you need to identify the 'economic bottleneck' in your architecture.
question: Based on the data flow diagram, what is the 'economic bottleneck' in your architecture?
details:
  realistic_solution: |
    You are suffering from **Raw Data Incontinence**. Streaming every frame result over cellular is economically non-viable. The fix is **Edge-Side Aggregation**: compute hourly statistics locally and upload only the aggregates (~15 MB/month per camera). This reduces the bill by >250x while maintaining operational insights.
  common_mistake: |
    **The Pitfall:** Believing all raw data is needed for proper monitoring.
    **The Rationale:** Conflating the need for operational visibility with the transmission of raw data, ignoring that 99% of frames contain nothing interesting.
    **The Consequence:** Suffering from 'Raw Data Incontinence', leading to economically non-viable cellular data bills.
  napkin_math: |
    - Raw data: 10,000 cameras x 4.3 GB/month = 43,000 GB = 43 TB.
    - Raw cost: 43,000 GB x $1/GB = **$43,000/month**.
    - Aggregated data: 500 KB/day x 30 days = 15 MB/month per camera.
    - Fleet aggregated: 10,000 x 15 MB = 150,000 MB = 150 GB/month.
    - Aggregated cost: 150 GB x $1/GB = **$150/month**.
    - **Result: ~287x cost reduction.**
