title: The Bandwidth Bankruptcy
scenario: A fleet of 10,000 edge cameras streams all detection results back to a central cloud dashboard over 4G/5G, resulting in a $43,000 monthly cellular bill.
question: Based on the data flow diagram, what is the economic bottleneck in your architecture, and how do you resolve it?
details:
  realistic_solution: 'The architecture suffers from "Raw Data Incontinence." Streaming every frame result over cellular is economically non-viable. Implement Edge-Side Aggregation: compute hourly statistics locally on the edge device and upload only the highly compressed aggregates (e.g., Parquet summaries). This reduces the data transmission by >250x, slashing the bill while maintaining operational observability.'
  common_mistake: |
    **The Pitfall:** Believing all raw inference data must be streamed for proper monitoring.
    **The Rationale:** Conflating the need for operational visibility with the transmission of raw event data, ignoring that 99% of frames contain redundant or empty states.
    **The Consequence:** Suffering from economically non-viable cellular data bills that destroy project ROI.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet: 10,000 cameras. Cellular cost: $1/GB.
    - Raw telemetry: 4.3 GB/month per camera.
    - Aggregated telemetry: 500 KB/day per camera.

    **Calculations:**
    - Raw Volume: 10,000 * 4.3 GB = 43,000 GB.
    - Raw Cost: 43,000 GB * $1/GB = $43,000/month.
    - Aggregated Volume: 500 KB * 30 days = 15 MB/month per camera.
    - Fleet Aggregated: 10,000 * 15 MB = 150 GB/month.
    - Aggregated Cost: 150 GB * $1/GB = $150/month.

    **Conclusion & Interpretation:**
    - **Result: $150/month (Network-Bound)**. Edge aggregation yields a ~286x cost reduction ($43,000 down to $150).
