title: The Bandwidth Bankruptcy
scenario: You have a fleet of 10,000 edge cameras streaming all detection results back to a central cloud
  dashboard over 4G/5G. Your first monthly bill arrives and it is $43,000. Based on the data flow diagram,
  what is the 'economic bottleneck' in your architecture?
details:
  realistic_solution: 'You are suffering from **Raw Data Incontinence**. Streaming every frame result
    over cellular is economically non-viable. The fix is **Edge-Side Aggregation**: compute hourly statistics
    (counts, confidence, latency) locally and upload only the aggregates (~500 KB/day per camera) plus
    small anomalous samples. This reduces the bill by >250x while maintaining the same operational insights.'
  common_mistake: '"We need all the data for proper monitoring." You need operational *visibility*, not
    raw data. 99% of the frames contain nothing interesting.'
  napkin_math: 'Raw data: 10,000 cameras x 4.3 GB/month = 43 TB. At $1/GB cellular, that''s $43,000/month.
    Aggregated data: 10,000 cameras x 500 KB/day x 30 days = 10,000 x 15 MB/month = 150 GB/month. Cost:
    150 GB x $1/GB = $150/month. Savings: ~287x reduction.'
