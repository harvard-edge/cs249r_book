title: 'Throughput and Efficiency on Google Coral Edge TPU'
scenario: 'You are deploying a fully INT8 quantized object detection model on a Google Coral Edge TPU. The hardware specifications state it provides 4 TOPS of compute and consumes 2W of power. Your specific model architecture requires exactly 2 GOPs (Giga-Operations) per forward pass.'
question: 'What are the theoretical maximum FPS and inferences per Joule for a 2 GOPs/forward-pass INT8 model on the 4 TOPS Coral Edge TPU?'
details:
  realistic_solution: 'First, convert the hardware''s TOPS rating to GOPs to match the unit of the model''s complexity. Divide the total operations available per second by the operations required per inference to get the theoretical maximum FPS. Finally, divide that FPS by the power consumption (in Watts) to calculate inferences per Joule. While real-world utilization is typically much lower due to memory bandwidth or USB/PCIe overhead, this pure quantification provides a strict upper bound for system design.'
  common_mistake: |
    **The Pitfall:** Confusing MACs with Operations and failing to calculate power efficiency correctly.
    **The Rationale:** Candidates forget that 1 MAC = 2 Operations, leading to a 2x error, and forget that 1 Watt = 1 Joule/second.
    **The Consequence:** The theoretical throughput and efficiency metrics are miscalculated, leading to flawed system architectures.
  napkin_math: |
    - Compute capacity: 4 TOPS = **4,000 GOPs/second**.
    - Theoretical Max FPS: 4,000 GOPs/sec / 2 GOPs/inference = **2,000 FPS**.
    - Power efficiency: 2,000 inferences/sec / 2 Watts (Joules/sec) = **1,000 inferences/Joule**.
