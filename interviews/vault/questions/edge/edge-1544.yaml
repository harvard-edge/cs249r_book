title: Bottleneck Analysis on Qualcomm Cloud AI 100
scenario: We are deploying a multi-camera video analytics pipeline on a Qualcomm Cloud AI 100. Profiling the application shows an overall latency of 45ms per frame, missing our 30ms target. Engineer A proposes utilizing a custom operator to fuse memory-bound layers to improve LPDDR4x cache hits. Engineer B proposes keeping the standard operators but batching inputs to 8 to maximize the 400 TOPS INT8 utilization, even though it increases peak memory usage. You must evaluate both approaches, analyze the bottlenecks using the hardware specs, and determine which strategy is better for hitting the latency SLA.
question: Which proposal is better for reducing the 45 ms frame latency to the 30 ms SLA on the Cloud AI 100, and why?
details:
  realistic_solution: Engineer A's approach is better for a strict latency SLA. On the Qualcomm Cloud AI 100, the 400 TOPS INT8 compute capacity is massive and rarely the bottleneck for single-batch inference; memory bandwidth to the 32 GB LPDDR4x is the actual constraint. Fusing operators reduces round-trips to main memory, directly lowering latency. Batching (Engineer B) improves throughput but worsens individual frame latency.
  common_mistake: |
    **The Pitfall:** Choosing to maximize the 400 TOPS compute by batching.
    **The Rationale:** Engineers prioritize compute utilization (TOPS) over single-frame latency and memory bandwidth constraints.
    **The Consequence:** Failing the 30ms latency SLA while potentially causing LPDDR4x thrashing.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model compute: 100 GOPS. AI 100 Compute: 400 TOPS.
    - Memory transfer: 200MB activations at ~100 GB/s.

    **Calculations:**
    - Compute time = 100 GOPS / 400,000 GOPS = 0.25ms.
    - Memory transfer time = 200MB / 100GB/s = 2.0ms.

    **Conclusion & Interpretation:**
    - **Result: Memory I/O dominates by 8x; Engineer A's fusion is correct (Memory-Bound).** Fusing operations successfully lowers memory bandwidth strain.
