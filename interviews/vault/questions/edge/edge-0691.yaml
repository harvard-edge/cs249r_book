title: INT8 Calibration Set Size vs Accuracy
scenario: You're quantizing YOLOv8s (11.2M params, FP32) to INT8 for deployment on a Jetson Orin using TensorRT's post-training quantization. The calibration step requires a representative dataset to determine the dynamic range of each layer's activations. Your training set has 50,000 images.
question: How many calibration images do you actually need, and what happens if you use too few or too many?
details:
  realistic_solution: 'Calibration determines the min/max (or percentile) range of activations per layer to set the INT8 scale factors. The key insight: you need enough samples to capture the activation distribution''s tails, not to train the model.'
  common_mistake: |
    **The Pitfall:** Using all 50,000 training images for calibration.
    **The Rationale:** "More data is always better."
    **The Consequence:** Calibration takes hours, provides negligible accuracy improvement over a tiny subset, and can actually overfit the activation ranges if the full dataset contains massive outliers.
  napkin_math: |
    1. **Accuracy Returns:** 100 images → 42.1 mAP (-2.5 from FP32); 500 → 44.0 (-0.6); 1,000 → 44.2 (-0.4); 5,000 → 44.3 (-0.3).
    2. **Calibration Time:** 500 images x 15ms + 30s overhead = 37.5s. 5,000 images takes 105s (67.5s extra).
    3. **Diminishing Returns:** Going from 500 to 5,000 images buys 0.3% mAP for 67.5s of extra work (**22.5s per 0.1% mAP**).
    4. **Initial Value:** Going from 100 to 500 images buys 1.9% mAP in 6 seconds (**0.3s per 0.1% mAP**).
    5. **Conclusion:** The first 500 images are **70x more valuable** per second of calibration time. Sweet spot is 500-1,000 images.
  options:
  - The issue stems from OS-level scheduling interference; pinning the inference thread to a dedicated core will eliminate the performance variance.
  - Network I/O is the dominant bottleneck; optimizing the model or inference pipeline will have minimal impact on end-to-end latency.
  - Use all 50,000 images for calibration — more data is always better.. Calibration is not training.
  - 'Calibration determines the min/max (or percentile) range of activations per layer to set the INT8 scale factors. The key insight: you need enough samples to capture the activation distribution''s tails, not to train the model.'
