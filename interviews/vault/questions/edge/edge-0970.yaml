title: Edge New 0034
scenario: >-
  You are designing a split-compute CNN architecture over a 5G network. The edge Jetson Orin can process early layers to compress the semantic data into a 1MB intermediate tensor to send to the Cloud H100. Alternatively, the Orin can skip computation and send the raw 5MB image directly. The 5G network fluctuates wildly between 10MB/s and 50MB/s throughput.
question: For split CNN inference over a fluctuating 10–50MB/s 5G link, should the Orin send the 5MB raw image or a 1MB intermediate tensor?
details:
  realistic_solution: 'Sending raw data takes 5x more bandwidth, making it highly susceptible to network fluctuations. By computing the early layers on the edge, the system compresses the data down to a 1MB tensor. This trades a small, deterministic edge compute latency for a massive reduction in network transmission variance, resulting in a much tighter, more predictable end-to-end latency bound.'
  common_mistake: |
    **The Pitfall:** Designing purely for peak theoretical throughput.
    **The Rationale:** Candidates assume network conditions are static and ideal (always 50MB/s).
    **The Consequence:** They ignore network jitter. When bandwidth drops, the uncompressed 5MB payload causes catastrophic latency spikes that break real-time deadlines.
  napkin_math: |
    1. **Raw (5MB):** At 50MB/s = 100ms. At 10MB/s = 500ms. **Variance = 400ms**.
    2. **Split (1MB):** Edge compute (~10ms). Transfer: `1MB / 50MB/s = 20ms` to `1MB / 10MB/s = 100ms`.
    3. Total Split Time = 30ms to 110ms.
    4. **Result: Split inference variance is only 80ms**, making it vastly more stable than sending raw data (400ms variance) under fluctuating 5G conditions.
