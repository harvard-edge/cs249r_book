title: Evaluating Drift Detection on On-Premise Accelerators
scenario: 'You are deploying a high-throughput defect detection model on a Qualcomm Cloud AI 100 (32 GB
  LPDDR4x, 400 TOPS INT8, 75W) for an on-premise factory. Due to seasonal lighting changes, you need to
  detect data drift. You must evaluate two alternatives: (A) Compute Population Stability Index (PSI)
  continuously on the accelerator using its INT8 engines, or (B) Sample 1% of feature embeddings and offload
  them to a local host CPU for KL divergence calculation. Which alternative is better and why?'
question: "Which alternative is better and why?"
details:
  realistic_solution: Option B is the superior choice. The Qualcomm Cloud AI 100 is designed for maximum
    throughput inference at 75W, and forcing it to compute floating-point drift statistics will cause
    significant context switching and pipeline stalls. By offloading just 1% of the lightweight embeddings
    to the host CPU, you preserve the accelerator's 400 TOPS entirely for the primary inference path while
    still gathering statistically significant drift signals.
  common_mistake: Candidates often choose option A because of the massive 400 TOPS compute capacity, assuming
    it can easily handle the extra workload. They fail to realize that the accelerator is optimized for
    INT8 matrix multiplication, whereas statistical drift metrics like PSI and KL divergence require floating-point
    precision and non-linear aggregations that execute poorly on these specialized cores.
  napkin_math: Assuming an inference rate of 500 FPS and a final embedding size of 1 KB. Offloading 1%
    of embeddings means 5 embeddings/sec, consuming only 5 KB/s of PCIe bandwidth, which is negligible
    for the system. Conversely, emulating FP32 for PSI on INT8 ALUs could inflate inference latency beyond
    the required 2ms (500 FPS) budget, wasting the 400 TOPS capacity and 32 GB LPDDR4x bandwidth.
