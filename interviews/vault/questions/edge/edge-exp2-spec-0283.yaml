title: Edge TPU Layer Fusion and Operator Scheduling for INT8 Vision Model
scenario: You are designing an operator scheduling strategy for a real-time object detection model deployed
  on a Google Coral Edge TPU (USB form factor). The Edge TPU delivers 4 TOPS of INT8 compute at just 2W,
  but requires all operations to be fully quantized to INT8 and has a restricted set of supported operators.
  Your goal is to specify the execution order and layer fusion strategy to maximize local SRAM memory
  reuse, preventing costly data transfers back to the host CPU across the USB interface during intermediate
  layer execution.
question: "How would you schedule and fuse operators on the Coral Edge TPU to keep intermediate tensors in SRAM and avoid USB CPU fallbacks?"
details:
  realistic_solution: The correct approach involves a specification that guarantees full graph compilation
    for the Edge TPU by replacing unsupported operators with supported INT8 approximations before scheduling.
    The scheduler must prioritize depth-first execution and layer fusion (e.g., fusing Conv2D + BatchNorm
    + ReLU into a single operator block) to ensure intermediate feature maps stay entirely within the
    Edge TPU's limited on-chip SRAM, completely avoiding host-device memory transfers until the final
    output tensor is produced.
  common_mistake: Candidates often focus solely on the theoretical 4 TOPS compute capacity and ignore
    the data transfer bottlenecks of the USB interface. They might suggest scheduling unsupported operators
    (like certain non-linear activations) to fallback on the host CPU, breaking layer fusion and causing
    massive memory bandwidth stalls.
  napkin_math: 'Theoretical compute: 4 TOPS. For a 2 GOPS INT8 model, theoretical max is 2,000 FPS. However,
    consider the USB 3.0 bottleneck (~625 MB/s practical bandwidth). If scheduling fails to fuse 5 intermediate
    layers, and each layer outputs a 2MB activation tensor that must fallback to the host CPU, we transfer
    4MB (read+write) per layer. Total transfer: 5 * 4MB = 20MB per inference. Transfer time = 20MB / 625
    MB/s = 32ms. This data movement alone caps the system at ~31 FPS, completely wasting the 4 TOPS compute.
    Proper fusion keeps this 20MB on-chip.'
