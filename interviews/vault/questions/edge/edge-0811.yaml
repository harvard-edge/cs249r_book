title: The Multicast Model Update Storm
scenario: You manage 200 Jetson Orin edge nodes on a factory floor, connected via a 1 Gbps Ethernet switch. A 150 MB model update must be pushed to every node.
question: What bandwidth and delivery time do unicast and multicast require for the 150 MB update to 200 Orin nodes, and why does unicast saturate the uplink?
details:
  realistic_solution: Unicast requires the server to transmit 30 GB total. On a 1 Gbps uplink, this takes ~252 seconds. Multicast transmits the 150 MB payload once; the network switch replicates it to all ports. This is a 200x reduction in server bandwidth and time.
  common_mistake: |
    **The Pitfall:** Assuming the network can handle 200 parallel transfers because each node has a 1 Gbps port.
    **The Rationale:** Candidates often forget that the bottleneck is the server's single uplink, not the receiving nodes' ports.
    **The Consequence:** Attempting to unicast a large payload to many nodes simultaneously will severely bottleneck the server, causing extremely slow transfer speeds across the entire fleet.
  napkin_math: |
    * **Unicast Total Data:** 200 nodes * 150 MB = 30,000 MB.
    * **Effective Link Speed:** 1 Gbps = 125 MB/s raw -> ~119 MB/s effective (TCP overhead).
    * **Unicast Delivery Time:** 30,000 MB / 119 MB/s = ~252 seconds.
    * **Multicast Delivery Time:** The server sends 150 MB once. 150 MB / 119 MB/s = **~1.26 seconds**.
    * **Speedup:** 252s / 1.26s = **200x faster** delivery time via multicast.
