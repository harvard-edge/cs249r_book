title: The Multicast Model Update Storm
scenario: You manage 200 Jetson Orin edge nodes on a factory floor, all connected via a 1 Gbps Ethernet
  switch. A 150 MB model update must be pushed to every node. A naive unicast approach sends 200 individual
  copies. Calculate the total bandwidth consumed and time required for unicast vs. multicast delivery,
  and explain why unicast saturates the uplink.
details:
  realistic_solution: 'Unicast: the server must transmit 200 × 150 MB = 30 GB total. On a 1 Gbps uplink
    (~119 MB/s effective throughput accounting for protocol overhead), this takes 30,000 MB / 119 MB/s
    ≈ 252 seconds. During this time, each node receives data at ~0.6 MB/s — painfully slow. Multicast:
    the server transmits the 150 MB payload once; the network switch replicates it to all ports. Total
    server-side data: 150 MB, taking 150/119 ≈ 1.3 seconds. The switch handles fan-out at wire speed.
    This is a 200× reduction in server bandwidth and time.'
  common_mistake: Assuming the network can handle 200 parallel transfers because each node has a 1 Gbps
    port. The bottleneck is the server's single uplink, not the individual node ports.
  napkin_math: Unicast total data = 200 × 150 MB = 30,000 MB. 1 Gbps = 125 MB/s raw, ~119 MB/s effective
    (TCP overhead ~5%). Unicast time = 30,000 / 119 = 252 s ≈ 4.2 min. Per-node bandwidth = 119/200 =
    0.6 MB/s. Multicast time = 150 / 119 = 1.26 s. Speedup = 252 / 1.26 = 200×.
