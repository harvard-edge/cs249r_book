title: Edge Gateway Load Spillover
scenario: A store has three edge gateways, each handling 120 inferences/s. One gateway
  fails during peak traffic of 300 inferences/s. Estimate whether the remaining gateways
  can absorb traffic while staying below 80% utilization.
question: Can two remaining edge gateways serve 300 inferences/s while staying below
  80% utilization if each can handle 120 inferences/s?
details:
  realistic_solution: Two gateways provide 240 inferences/s capacity. The 80% safe
    capacity is 192 inferences/s, well below 300. Even raw capacity is insufficient,
    so the site needs cloud fallback, request shedding, or a lower-cost model.
  common_mistake: Checking only that there are multiple gateways and assuming failover
    is safe.
  napkin_math: Raw remaining capacity = 2 x 120 = 240/s. Safe capacity at 80% = 192/s.
    Demand = 300/s.
