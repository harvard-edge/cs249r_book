title: Knowledge Distillation to INT8 for Google Coral
scenario: You are distilling a large FP32 teacher model into a smaller INT8 student model to run on a
  Google Coral Edge TPU, which operates at 4 TOPS INT8 with a strict 2W power budget. The compact student
  model requires exactly 2 GOPS per inference. Calculate the theoretical maximum inference rate (FPS)
  and the energy consumed per inference, assuming 100% utilization of the Coral's compute capacity.
details:
  realistic_solution: For the Google Coral Edge TPU, the student model must be fully quantized to INT8.
    The knowledge distillation process should incorporate Quantization-Aware Training (QAT) so the INT8
    student can accurately mimic the FP32 teacher's logits without severe accuracy drop. The theoretical
    max throughput is found by dividing the hardware's total compute capacity by the model's compute requirement.
  common_mistake: Candidates often forget that the Google Coral Edge TPU has limited operator support
    and mandates INT8 quantization, failing to mention Quantization-Aware Training (QAT) during distillation.
    They also frequently misalign TOPS (Tera) and GOPS (Giga) in their arithmetic.
  napkin_math: '1. Hardware compute: 4 TOPS = 4,000 GOPS. 2. Max inference rate: 4,000 GOPS / 2 GOPS/inference
    = 2,000 inferences per second (FPS). 3. Energy per inference: 2W = 2 Joules/second. 2 Joules / 2,000
    inferences = 0.001 Joules/inference (or 1 millijoule per inference).'
