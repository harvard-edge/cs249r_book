title: Designing a Graceful Degradation Strategy for Real-time ML on NVIDIA Jetson Orin
scenario: You are tasked with deploying a critical real-time object detection system on an NVIDIA Jetson
  Orin (32 GB LPDDR5, 275 TOPS INT8, 60W) for autonomous vehicle perception. The system must maintain
  responsiveness even under unexpected load spikes, sensor failures, or environmental interference, which
  can reduce available compute or introduce noisy data. Design a graceful degradation strategy that leverages
  degradation ladders, model fallbacks, and quality-of-service shedding to ensure fail-operational reliability
  while maximizing operational uptime and minimizing critical performance impact.
details:
  realistic_solution: A realistic solution involves defining multiple operational modes or 'degradation
    rungs,' each with varying levels of model complexity, input resolution, inference frequency, and output
    fidelity. For example, a primary high-accuracy model (e.g., YOLOv7) could run when resources are abundant.
    If compute drops due to thermal throttling or increased sensor input, the system could dynamically
    switch to a smaller, faster model (e.g., MobileNet SSD), reduce frame rate, or only process regions
    of interest. Furthermore, implement explicit fail-safe states for critical components (e.g., if object
    detection entirely fails, revert to a simpler, rule-based collision avoidance) and fail-operational
    for non-critical (e.g., reduced classification granularity). QoS shedding could involve prioritizing
    detection of critical objects (e.g., other vehicles, pedestrians) over background details (e.g., distant
    trees, signage) if the system is under duress, leveraging the Jetson Orin's INT8 capabilities for
    optimized inference speed on lighter models.
  common_mistake: A common mistake is to only plan for ideal operating conditions or to implement simple
    hard-coded thresholds for degradation, leading to brittle systems that catastrophically fail rather
    than gracefully adapt. Over-reliance on a single, high-fidelity model without considering lighter
    alternatives for fallbacks is another pitfall, as is failing to account for the Jetson Orin's specific
    power and thermal constraints.
  napkin_math: "Consider the inference time (T_inf) and memory footprint (M_footprint) of different models\
    \ on the NVIDIA Jetson Orin's 275 TOPS INT8. \n- High-fidelity model: T_inf_high = 50ms, M_footprint_high\
    \ = 10GB. Peak FPS on Jetson Orin might be ~(1 / 0.050s) = 20 FPS assuming it fully utilizes a fraction\
    \ of the 275 TOPS. \n- Low-fidelity model: T_inf_low = 10ms, M_footprint_low = 2GB. Peak FPS ~(1 /\
    \ 0.010s) = 100 FPS. \n- Latency budget for critical perception: 100ms. \n- Power budget: 60W. \n\
    Degradation decision: If the current inference time of the high-fidelity model exceeds (e.g., 80%\
    \ of the latency budget due to system load or power draw approaching 60W), switch to the low-fidelity\
    \ model. Or, if available memory drops below a certain threshold (e.g., 15GB remaining of 32GB LPDDR5)\
    \ due to other processes, fall back. QoS shedding could involve calculating the 'value' of processing\
    \ certain parts of the image (e.g., ROI containing a pedestrian vs. empty road) and dropping lower-value\
    \ tasks if the total compute budget for the frame (e.g., T_available_compute_per_frame) is exceeded\
    \ by Sum(T_task_i). If T_available_compute_per_frame < Sum(T_task_i), shed the lowest priority tasks\
    \ until Sum(T_task_j) fits within T_available_compute_per_frame."
