title: Optimizing Drift Detection on Hailo-8 Dataflow Accelerator
scenario: We are running a traffic monitoring model on a dataflow accelerator with no local DRAM. It streams activations directly from host memory. To detect data drift, the current pipeline extracts dense intermediate feature maps back to the host CPU to compute Population Stability Index (PSI) every frame, causing a severe throughput bottleneck.
question: How would you diagnose this bottleneck and optimize the drift detection strategy?
details:
  realistic_solution: The bottleneck is the PCIe bandwidth saturated by streaming large intermediate feature maps from the accelerator back to the host CPU, verified by nsys profiling. The optimization is to shift drift detection to the model's compact output representations and compute drift on a sampled subset of frames. This utilizes zero-copy DMA to drastically reduce host memory contention.
  common_mistake: |
    **The Pitfall:** Running complex statistical operations directly on the INT8 dataflow accelerator.
    **The Rationale:** Candidates assume the accelerator should handle all ML-related math, forgetting its fixed-function nature.
    **The Consequence:** The drift detection logic completely stalls the accelerator's stream-processing pipeline, killing inference throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - INT8 intermediate feature map size (64x64x256): ~1 MB.
       - Frame rate: 30 FPS.
       - Optimized bounding box data: 100 boxes * 6 values = 600 bytes/frame.
       - Sampling rate: 1 FPS.
    2. **Calculations:**
       - Bandwidth to host at 30 FPS: 1 MB * 30 = 30 MB/s.
       - Bandwidth at 1 FPS sample rate: 600 bytes/s.
       - Reduction: 30,000,000 / 600 = 50,000x.
    3. **Conclusion & Interpretation:**
       - **Result: 50,000x reduction in PCIe traffic eliminates the bottleneck.**
