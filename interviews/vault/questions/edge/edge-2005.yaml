title: Edge AI Model Serving on Hailo-8 with Dynamic Workloads
scenario: You are designing the model serving infrastructure for a new industrial inspection system. Each inspection unit is equipped with a Hailo-8 AI processor (26 TOPS INT8, 2.5W typical power consumption, M.2 form factor, PCIe Gen 3.0 interface). The system needs to simultaneously run multiple AI models (e.g., defect detection, object classification, posture estimation) and handle highly variable inference loads throughout the day.
question: How would you design a Hailo-8 model serving strategy for multiple variable-load inspection models with sub-50ms critical latency and low cold starts?
details:
  realistic_solution: 'Implement an embedded inference server utilizing Hailo-8''s Dataflow Compiler. Keep critical base models loaded in memory, while less frequent models use proactive lazy-loading. Use priority queuing for critical inferences. Dynamically map model dataflows to Hailo-8''s architecture for concurrent execution, avoiding constant context switching.'
  common_mistake: |
    **The Pitfall:** Treating the edge device's model serving like a cloud environment (e.g., using heavyweight containers or assuming infinite RAM).
    **The Rationale:** Engineers default to familiar cloud-native tools without realizing they introduce massive latency penalties and memory overhead on embedded hardware.
    **The Consequence:** Severe cold start delays when swapping models, leading to missed defects and underutilization of the Hailo-8 accelerator.
  napkin_math: |
    - **Throughput:** A 50 GOPS INT8 model on the 26 TOPS Hailo-8 theoretically allows 26,000 GOPS / 50 GOPS = 520 inferences/second.
    - **Target Latency:** Sub-50ms means processing at least 20 inferences/second for critical tasks.
    - **Power Constraint:** At 2.5W typical, a 37 Wh (10,000 mAh) battery provides 14.8 hours of continuous operation.
    - **Final Result:** **Careful time-slicing and prioritization are required because loading a new model context can take 100ms+, instantly blowing the 50ms budget if not managed proactively.**
