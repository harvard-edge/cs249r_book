title: Validation Compute Budget on Cloud AI 100
scenario: You are deploying an on-premise inference pipeline on a Qualcomm Cloud AI
  100 accelerator to process factory sensor data. Before executing the main inference
  model, a lightweight autoencoder runs on the device to validate data quality and
  detect anomalies. The accelerator has a total compute capacity of 400 TOPS INT8.
  If the main model requires 50 Giga-Operations (GOPs) per inference and must process
  4,000 records per second, calculate the remaining compute capacity in TOPS available
  for the anomaly detection model.
question: How much Cloud AI 100 compute remains for anomaly detection after running
  the 50 GOPs model at 4,000 records/sec?
details:
  realistic_solution: First, calculate the total operations per second consumed by
    the main model by multiplying its per-inference GOPs by the target throughput.
    Then, convert this value to TOPS and subtract it from the Cloud AI 100's total
    capacity to find the budget for data validation.
  common_mistake: Candidates often fail to convert between Giga-Operations (GOPs)
    and Tera-Operations Per Second (TOPS), or they forget to multiply the per-inference
    operations by the throughput.
  napkin_math: 'Main model compute per second = 50 GOPs/inference * 4,000 inferences/sec
    = 200,000 GOPs/sec. Convert GOPs to TOPS: 200,000 GOPs / 1,000 = 200 TOPS. Total
    platform capacity = 400 TOPS. Remaining capacity for data validation = 400 TOPS
    - 200 TOPS = 200 TOPS.'
