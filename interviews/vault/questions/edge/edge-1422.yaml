title: Analyzing 3-bit GPTQ Latency Degradation on Jetson Orin
scenario: >-
  You are deploying a 14-billion parameter LLM to an NVIDIA Jetson Orin module, leveraging its 32 GB LPDDR5 memory, 60W TDP limit, and Ampere GPU. To maximize memory efficiency, you apply 3-bit GPTQ extreme quantization. While the model fits comfortably in memory, you observe that the inference latency is actually higher and power consumption spikes compared to using standard INT8 quantization, despite the system boasting 275 TOPS for INT8.
question: Why can 3-bit GPTQ make the 14B model slower and more power-hungry on Jetson Orin than standard INT8 despite fitting in memory?
details:
  realistic_solution: 'The Jetson Orin natively accelerates INT8 and FP16 via Tensor Cores, but lacks hardware support for 3-bit arithmetic. Consequently, the 3-bit GPTQ weights must be fetched from memory and dequantized to FP16 or INT8 using general CUDA cores before the Tensor Cores can execute matrix multiplications. This unstructured unpacking creates a severe ALU bottleneck that negates memory bandwidth savings.'
  common_mistake: |
    **The Pitfall:** Assuming smaller bit-widths automatically guarantee faster inference.
    **The Rationale:** Candidates incorrectly correlate reduced memory footprint directly with reduced latency.
    **The Consequence:** They overlook the hardware's native precision support and the computational overhead required to unpack non-standard, unaligned bit-widths on the fly.
  napkin_math: |
    1. **Memory Savings:** A 14B parameter model in INT8 requires 14 GB. In 3-bit, it requires `(14 * 3) / 8 = 5.25 GB`, saving 8.75 GB of capacity.
    2. **Compute Overhead:** Unpacking a 3-bit value might require 5 ALU/bitwise operations per parameter.
    3. **Total Overhead:** This adds `14B * 5 = 70 Giga-operations` of non-accelerated CPU/CUDA overhead per forward pass.
    4. **Result:** Because the 275 TOPS peak relies strictly on native INT8 Tensor Cores, this 70 GOPS unstructured unpacking bottleneck severely limits throughput and burns excess power within the 60W TDP.
