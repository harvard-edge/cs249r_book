title: 'Edge Queueing Theory Diagnosis: Queue Overflow in Edge Gateway'
scenario: An edge gateway Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) aggregates from 16 IoT sensors
  each sending 10 inf/s (total λ=160 inf/s). Inference engine handles μ=120 inf/s. Operator observes intermittent
  drops of 25% of requests. Using M/M/1/K analysis, determine the queue capacity K that explains 25% drop
  rate, and propose a fix.
question: "What does a 25% drop rate imply for the M/M/1/K queue at λ=160 and μ=120, and how should the overload be fixed?"
details:
  realistic_solution: 'ρ = λ/μ = 160/120 = 1.333 > 1. Queue IS unstable (ρ>1). With finite buffer K: effective
    λ = λ * (1 - Pk) where Pk = drop probability. For drops=25%: effective λ_eff = 160 * 0.75 = 120 =
    μ. System stabilizes with exactly ρ_eff=1.0 through dropping. M/M/1/K: Pk = (1-ρ)*ρ^K/(1-ρ^(K+1))
    approaches (λ-μ)/λ = 40/160=25% as K→∞ at ρ>1. This confirms ρ>1. Fix: reduce load (drop 2 sensors,
    λ=140 > μ=120 still over), upgrade μ to 200 inf/s with model optimization (INT8 + TensorRT), or add
    second Jetson Orin.'
  common_mistake: Assuming packet drops mean utilization exceeds 100% (λ > μ), when K-limited queues can
    drop requests even at ρ < 1.
  napkin_math: 'ρ = 160/120 = 1.333. Stable system impossible without dropping. Drop rate = (λ-μ)/λ =
    40/160 = 25% — matches observation. At ρ>1, queue always fills and drops rate = excess load fraction.
    Fix options: (1) TensorRT optimization: 120 → 200 inf/s (67% improvement), ρ=0.8, P99 acceptable.
    (2) Model quantization from FP16 to INT8: 2x speedup → μ=240, ρ=0.67. (3) Reduce input to 140 inf/s
    by sampling sensors at 8.75/s instead of 10/s, still ρ=1.17 > 1. Must achieve μ ≥ 161 inf/s. TensorRT
    INT8 is the right fix.'
