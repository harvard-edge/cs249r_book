title: Orin YOLOv8 Queue Limit
scenario: A Jetson AGX Orin processes YOLOv8 frames for a tollbooth. Frame arrival
  is Poisson at 40 fps. The Orin processes frames exponentially with a mean service
  time of 20 ms (50 fps capacity).
question: Calculate the mean response time per frame using M/M/1 queueing theory.
visual:
  kind: svg
  path: edge-2363.svg
  alt: A hockey-stick curve showing latency skyrocketing as utilization approaches
    1.0.
  caption: M/M/1 Latency vs Utilization.
details:
  realistic_solution: Arrival rate (lambda) = 40. Service rate (mu) = 50. Utilization
    (rho) = 40/50 = 0.8 (80%). Mean response time (W) = 1 / (mu - lambda) = 1 / (50
    - 40) = 1 / 10 seconds = 0.1 s = 100 ms.
  common_mistake: Only reporting the 20 ms service time, ignoring the queueing delay
    induced by 80% utilization.
  napkin_math: 1 / (50 - 40) = 0.1s = 100ms
