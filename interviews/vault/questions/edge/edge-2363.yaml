title: Orin YOLOv8 Queue Limit
scenario: A Jetson AGX Orin processes YOLOv8 frames for a tollbooth. Frame arrival
  is Poisson at 40 fps. The Orin's GPU pipeline has a deterministic 20 ms service
  time (50 fps capacity) - GPU inference time is highly stable on a fixed-resolution
  YOLOv8n at INT8, justifying the M/D/1 model rather than M/M/1.
question: Apply the M/D/1 (deterministic-service) formula to compute mean response
  time per frame, and compare against the M/M/1 prediction. Quantify the latency savings
  from deterministic service in this realistic GPU-inference setting.
visual:
  kind: svg
  path: edge-2363.svg
  alt: A hockey-stick curve showing latency skyrocketing as utilization approaches
    1.0.
  caption: M/M/1 Latency vs Utilization.
details:
  realistic_solution: lambda=40, mu=50, rho=0.8. M/D/1 mean wait Wq = rho / (2*mu*(1-rho))
    = 0.8 / (2*50*0.2) = 0.04 s = 40 ms. M/D/1 mean response W = Wq + 1/mu = 40 +
    20 = 60 ms. M/M/1 predicts W = 1/(mu-lambda) = 100 ms. Deterministic service halves
    queueing delay (Wq drops from 80 ms to 40 ms) because the variance term in Pollaczek-Khinchine
    is 0 for D-service. Real GPU inference is closer to D than M, so M/M/1 overestimates
    wait by 67% here.
  common_mistake: Defaulting to M/M/1 for GPU inference workloads despite their highly
    deterministic service time, leading to over-provisioning of GPU capacity.
  napkin_math: 'M/D/1: Wq = 0.8 / (100*0.2) = 40 ms; W = 60 ms. M/M/1: W = 100 ms.
    M/D/1 saves 40 ms (40%).'
