title: The Energy Cost of Precision (edge-0222)
scenario: An autonomous vehicle's perception system runs on an edge device with a strict 30W thermal budget. To meet performance targets, you're deciding which numerical format to use for the primary convolutional layers.
question: Approximately how much more energy does an FP32 MAC consume than an INT8 MAC in this 30W automotive perception system?
details:
  realistic_solution: A single FP32 MAC operation consumes roughly 18 times more energy than an INT8 MAC. This is a fundamental physical invariant listed in the 'Numbers Every ML Systems Engineer Should Know'. The energy consumed by a digital operation is proportional to the number of transistors switching. FP32 requires larger, more complex circuits for both the multiplier and the adder compared to the much simpler INT8 integer logic, leading to this dramatic difference in energy draw.
  common_mistake: |
    **The Pitfall:** Assuming energy savings scale linearly with the reduction in bit-width (e.g., 32 bits / 8 bits = 4x).
    **The Rationale:** Engineers conflate data size reduction directly with compute energy reduction.
    **The Consequence:** Underestimating the exponential power penalty of floating-point math, leading to blown thermal budgets.
  napkin_math: |
    *   **Hardware physical invariant:** A 32-bit floating-point (FP32) MAC requires significantly more complex circuitry than an integer ALU.
    *   **Energy cost:** One FP32 MAC operation consumes **~18 times more energy** than an INT8 MAC.
    *   **Impact:** Running a 20 TOPS model in FP32 instead of INT8 would increase compute power draw by 18x, instantly exceeding a 30W edge budget.
  options:
  - FP32 consumes ~4x more energy than INT8.
  - FP32 consumes ~2x more energy than INT8.
  - FP32 consumes ~18x more energy than INT8.
  - INT8 consumes ~4x more energy than FP32.
  correct_index: 2
