title: 'The Energy Cost of Data Movement'
scenario: 'A colleague argues that using Federated Learning on a fleet of autonomous vehicles will be too energy-intensive due to the on-device computation.'
question: 'Approximately how much more energy is consumed by a single off-chip DRAM access compared to a single FP16 computation?'
details:
  realistic_solution: 'A DRAM access consumes approximately **580 times** more energy than an FP16 compute operation. This massive difference is a core invariant in system design. It highlights why minimizing data movement is critical for energy efficiency. In the case of Federated Learning, the energy saved by *not* uploading terabytes of raw sensor data over a cellular network far outweighs the energy spent on local computation of gradients.'
  common_mistake: |
    **The Pitfall:** Underestimating the energy cost of moving data compared to computing FLOPs.
    **The Rationale:** Engineers focus heavily on on-chip compute efficiency and forget the high capacitance of driving wires to off-chip DRAM.
    **The Consequence:** System designs fail to optimize for data locality, resulting in massively inefficient power usage.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP16 MAC energy: ~1 pJ.
    - Off-chip DRAM fetch energy: ~500-580 pJ.

    **Calculations:**
    - Ratio: 500 pJ / 1 pJ = ~500x to 580x.

    **Conclusion & Interpretation:**
    - **Result: ~580x (Energy-Bound)**. Off-chip memory access dominates power consumption, making decentralized approaches like FL highly energy efficient by moving compute to the data.
  options:
  - '~10x'
  - 'Compute is ~10x more expensive'
  - '~580x'
  - '~50,000x'
  correct_index: 2
