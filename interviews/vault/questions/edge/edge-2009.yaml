title: MLOps for LLM Deployment on Qualcomm Cloud AI 100 Edge Devices
scenario: Your team has developed a new, highly accurate but computationally intensive
  Large Language Model (LLM) for real-time natural language understanding. The requirement
  is to deploy this model to a fleet of edge devices powered by the Qualcomm Cloud
  AI 100, which features 32 GB LPDDR4x, 400 TOPS INT8, and a 75W power budget. You
  are responsible for ensuring a robust MLOps pipeline for this deployment, including
  model versioning, continuous integration/delivery (CI/CD), experiment tracking,
  and maintaining training-serving consistency. Describe how you would design and
  implement the MLOps lifecycle to achieve this, paying particular attention to the
  hardware constraints and the need for frequent model updates and validation.
question: How would you design the MLOps lifecycle for frequent LLM updates on Qualcomm
  Cloud AI 100 while meeting 32GB memory, INT8, and 75W constraints?
details:
  realistic_solution: 'Implement an MLOps pipeline that incorporates an automated
    model optimization phase. This phase should include techniques like INT8 quantization
    (leveraging the 400 TOPS INT8 capability of the Qualcomm Cloud AI 100) and pruning
    to reduce the model''s memory footprint and improve inference speed. A model registry
    would store various optimized versions, each tagged with its quantization level,
    pruning ratio, and verified performance benchmarks for the target hardware. The
    CI/CD pipeline would feature dedicated stages for: 1) training and initial validation,
    2) automated model optimization and re-validation, 3) deployment to a hardware-in-the-loop
    (HIL) environment replicating the Qualcomm Cloud AI 100. This HIL stage would
    execute a suite of performance and accuracy tests, ensuring the model fits within
    32GB LPDDR4x, operates within acceptable latency limits (utilizing 400 TOPS INT8),
    and adheres to the 75W power budget. Experiment tracking would capture all optimization
    metrics, model versions, and deployment results to ensure full reproducibility
    and training-serving consistency.'
  common_mistake: Neglecting aggressive model optimization (quantization, pruning)
    for edge deployment, leading to models exceeding the 32GB LPDDR4x memory limit
    or failing to meet strict latency requirements. A common oversight is also the
    lack of automated CI/CD stages that validate edge-specific performance metrics
    (latency, memory footprint, power consumption) on representative hardware or accurate
    emulators.
  napkin_math: Consider an LLM with 30 billion parameters, initially stored in FP16
    (2 bytes/parameter). This requires 30B * 2 bytes = 60GB of memory. The Qualcomm
    Cloud AI 100 has 32GB LPDDR4x, so the FP16 model won't fit. Quantizing to INT8
    (1 byte/parameter) reduces the size to 30B * 1 byte = 30GB, which fits within
    the 32GB memory. The primary bottleneck for LLM inference on edge is memory bandwidth.
    Assuming the Cloud AI 100's LPDDR4x provides ~136 GB/s of bandwidth, reading the 30GB
    model takes at least 30GB / 136 GB/s = ~220 milliseconds per generated token. This
    translates to ~4.5 tokens/second. The raw 400 TOPS compute is massively underutilized
    but the deployment is constrained by memory bounds rather than compute, which must be
    factored into real-time SLAs.
