title: MLOps for LLM Deployment on Qualcomm Cloud AI 100 Edge Devices
scenario: Your team has developed a new, highly accurate but computationally intensive Large Language Model (LLM) for real-time natural language understanding. The requirement is to deploy this model to a fleet of edge devices powered by the Qualcomm Cloud AI 100, which features 32 GB LPDDR4x, 400 TOPS INT8, and a 75W power budget.
question: How would you design the MLOps lifecycle for frequent LLM updates on Qualcomm Cloud AI 100 while meeting 32GB memory, INT8, and 75W constraints?
details:
  realistic_solution: 'Implement an MLOps pipeline that incorporates an automated model optimization phase. This phase should include techniques like INT8 quantization (leveraging the 400 TOPS INT8 capability of the Qualcomm Cloud AI 100) and pruning to reduce the model''s memory footprint and improve inference speed. A model registry would store various optimized versions, each tagged with its quantization level, pruning ratio, and verified performance benchmarks for the target hardware. The CI/CD pipeline would feature dedicated stages for: 1) training and initial validation, 2) automated model optimization and re-validation, 3) deployment to a hardware-in-the-loop (HIL) environment replicating the Qualcomm Cloud AI 100. This HIL stage would execute a suite of performance and accuracy tests, ensuring the model fits within 32GB LPDDR4x, operates within acceptable latency limits (utilizing 400 TOPS INT8), and adheres to the 75W power budget. Experiment tracking would capture all optimization metrics, model versions, and deployment results to ensure full reproducibility and training-serving consistency.'
  common_mistake: |
    **The Pitfall:** Neglecting aggressive model optimization stages within the CI/CD pipeline.
    **The Rationale:** Candidates often rely on cloud-based deployment paradigms and forget the strict edge constraints of memory, compute, and power.
    **The Consequence:** Deployment of models that exceed the 32GB memory limit or fail to meet strict latency and power requirements, leading to broken edge inference.
  napkin_math: |
    1. **FP16 Memory:** 30 billion parameters * 2 bytes/param = 60 GB (Exceeds 32 GB LPDDR4x limit).
    2. **INT8 Memory:** 30 billion parameters * 1 byte/param = 30 GB (Fits within 32 GB).
    3. **Bandwidth Bottleneck:** LPDDR4x provides ~136 GB/s bandwidth.
    4. **Inference Time:** Reading the 30 GB model takes `30 GB / 136 GB/s ≈ 220 ms` per token.
    5. **Throughput:** This translates to ~4.5 tokens/second.
    **The deployment is constrained by memory bandwidth bounds (~4.5 tok/s) rather than compute, forcing aggressive quantization into the automated MLOps pipeline.**
