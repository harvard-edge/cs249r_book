title: The OTA Brick Risk
scenario: You manage a fleet of 10,000 edge AI cameras running object detection. Each camera has a Jetson Orin Nano. You need to deploy an updated YOLOv8 model compiled with TensorRT. Your colleague suggests: 'Just push the new .engine file over the air and restart inference.'
question: "Why is pushing a TensorRT .engine OTA riskier than a generic firmware update, and how must deployment handle model-runtime coupling?"
details:
  realistic_solution: A generic firmware update is usually a self-contained binary. An ML model update on an edge accelerator is highly coupled to the underlying runtime. A TensorRT `.engine` file is compiled for a *specific* GPU architecture, a *specific* CUDA version, and a *specific* TensorRT version. If the new model was compiled with TensorRT 8.6 but the device is running TensorRT 8.5, the deserialization will fail, and inference will crash. This means an ML model update often requires a coupled runtime update (updating the JetPack OS), creating a massive two-phase atomic update problem. If the OS updates but the model download fails, the old model won't run on the new OS. If the model updates but the OS update fails, the new model won't run on the old OS.
  common_mistake: |
    **The Pitfall:** Assuming OTA model updates are just simple file transfers.
    **The Rationale:** Ignoring the brittle, hardware-specific nature of compiled ML models on edge accelerators.
    **The Consequence:** Bricking edge devices remotely due to version mismatches between the OS/runtime and the `.engine` file.
  napkin_math: |
    *   **Payload Difference:** Standard firmware binary = 15 MB. A JetPack OS + TensorRT + `.engine` payload = ~2.5 GB.
    *   **Download Time:** Over a 5 Mbps LTE connection, 2.5 GB takes ~70 minutes.
    *   **Risk Profile:** The probability of a connection drop or power loss is significantly higher over a 70-minute window than a 20-second firmware push.
    *   **Result:** Background downloading to an inactive partition is mandatory to prevent bricking during this massive transfer.
