title: 'Sliding Window Attention for Long Context on Jetson AGX Orin'
scenario: 'Mistral-7B is deployed on a Jetson AGX Orin (32GB LPDDR5, 204 GB/s) using sliding window attention (SWA) with window_size=4096. The sequence length is 16K tokens. The model has 32 layers, 8 KV heads, and a head_dim of 128.'
question: 'For a 16K-token sequence, how do full attention and 4096-token SWA compare in KV cache memory usage and per-token decode bandwidth?'
details:
  realistic_solution: |
    Full attention KV cache: 2×8×16384×128×2B×32 = 2.14GB. SWA KV cache: only 4096 tokens active per layer = 2×8×4096×128×2B×32 = 535MB — 4× reduction in KV memory. Per-token decode bandwidth (full): load 2.14GB KV cache; per-token decode (SWA): load 535MB. At 204 GB/s: full attention decode = 10.5ms/token; SWA decode = 2.6ms/token — 4× faster decode. Trade-off: tokens beyond window size have no attention to earlier context.
  common_mistake: |
    **The Pitfall:** Assuming SWA saves compute proportionally to the context reduction.
    **The Rationale:** It's common to conflate the O(N^2) compute savings of attention during prefill with the memory-bound nature of autoregressive decode.
    **The Consequence:** Overestimating the compute speedup while failing to accurately quantify the primary benefits: KV cache memory reduction and decode bandwidth savings.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sequence length: 16K tokens.
    - SWA window size: 4096 tokens.
    - 32 layers, 8 KV heads, head_dim 128.
    - Memory Bandwidth: 204 GB/s.

    **Calculations:**
    - Full KV Memory: 2 * 8 * 16384 * 128 * 2 bytes * 32 = 2.14 GB.
    - SWA KV Memory: 2 * 8 * 4096 * 128 * 2 bytes * 32 = 536 MB.
    - Full Decode Latency: 2.14 GB / 204 GB/s = 10.5 ms/token.
    - SWA Decode Latency: 536 MB / 204 GB/s = 2.6 ms/token.

    **Conclusion & Interpretation:**
    - **Result: 4x faster decode and 4x KV memory reduction (Memory-Bound).** SWA drastically cuts memory overhead and decode latency for long-context generation.
