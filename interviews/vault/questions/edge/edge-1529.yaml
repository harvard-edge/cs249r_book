title: Active Learning Strategies for On-Premise Defect Detection
scenario: A defect detection model runs on a Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W). Strategy A uses entropy over softmax outputs from the INT8 model, while Strategy B runs a parallel fp16 teacher model to calculate prediction variance.
question: Which active learning strategy do you select, and how do you justify the hardware resource tradeoffs?
details:
  realistic_solution: Strategy A is the only viable choice. The Cloud AI 100 achieves 400 TOPS specifically in INT8; its fp16 throughput is an order of magnitude lower. Strategy B's fp16 teacher model would consume massive memory bandwidth and compute cycles, stealing resources from the primary high-throughput INT8 pipeline and violating the strict 75W envelope. Extracting entropy directly from the existing INT8 softmax outputs incurs negligible latency overhead.
  common_mistake: |
    **The Pitfall:** Selecting Strategy B for superior uncertainty calibration.
    **The Rationale:** Prioritizing academic dataset purity metrics over hardware architectural constraints.
    **The Consequence:** Causing massive pipeline stalls and out-of-memory errors on the NPU by forcing parallel execution of unoptimized fp16 graphs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Cloud AI 100 (400 TOPS INT8, max ~68 GB/s memory bandwidth).
       - Teacher Model: 500 MB fp16, 1.5 TFLOPS per frame. Rate: 60 FPS.
    2. **Calculations:**
       - Teacher Compute: 1.5 TFLOPS * 60 = 90 TFLOPS/sec.
       - Teacher Bandwidth: 500 MB * 60 = 30 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth Bound. Strategy B consumes 30 GB/s (nearly 50% of total bus capacity) just for data curation.**
