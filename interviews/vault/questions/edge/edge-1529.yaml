title: Active Learning Strategies for On-Premise Defect Detection
scenario: 'Your team is deploying a visual defect detection model to a factory floor
  using a Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). To
  improve the model over time without saturating the limited outbound network, you
  must implement an on-device active learning filter to select the most informative
  frames for human annotation. You are evaluating two approaches: Strategy A uses
  entropy over softmax outputs from the primary quantized INT8 model, while Strategy
  B runs a parallel, larger fp16 teacher model to calculate prediction variance. Which
  strategy do you select, and how do you justify the hardware resource tradeoffs?'
question: Which strategy do you select, and how do you justify the hardware resource
  tradeoffs?
details:
  realistic_solution: Strategy A is the correct choice for this platform. The Qualcomm
    Cloud AI 100 is highly optimized for INT8 workloads (achieving up to 400 TOPS),
    but running a parallel fp16 model for Strategy B would drastically reduce compute
    efficiency and consume a disproportionate share of the 32 GB LPDDR4x memory bandwidth.
    Extracting entropy directly from the existing INT8 softmax outputs incurs negligible
    overhead, preserving the 75W power budget and memory bandwidth for the primary
    high-throughput task.
  common_mistake: Candidates frequently advocate for Strategy B, arguing that a higher-precision
    teacher model provides superior uncertainty calibration for dataset curation.
    They fail to account for the memory bandwidth and power constraints of the Qualcomm
    Cloud AI 100, ignoring that running an unoptimized parallel fp16 model will severely
    impact the primary INT8 inference pipeline.
  napkin_math: Assume a 60 FPS camera feed. Strategy A reuses the INT8 forward pass,
    adding <0.01 TOPS overhead for entropy calculation. Strategy B requires a parallel
    fp16 model. If the teacher model requires 1.5 TFLOPS per frame, at 60 FPS it consumes
    90 TFLOPS. The AI 100's 400 TOPS is for INT8; its fp16 throughput is significantly
    lower, meaning 90 TFLOPS could consume over 50% of the usable fp16 compute. Furthermore,
    fetching the fp16 model weights (e.g., 500MB) and activations per frame severely
    taxes the LPDDR4x memory (max ~68 GB/s bandwidth), consuming ~30 GB/s (60 FPS
    * 500MB) just for the curation model, risking pipeline starvation.
