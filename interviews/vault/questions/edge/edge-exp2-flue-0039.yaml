title: Hailo-8 Static Batch Latency Calculation
scenario: You are designing an edge video analytics system using a Hailo-8 accelerator (26 TOPS INT8,
  2.5W) which streams data directly from host memory since it has no local DRAM. You need to implement
  a static batching strategy for an INT8 model that requires 2.6 GOPS per inference. Assuming the host-to-device
  streaming latency is perfectly pipelined and you achieve 50% of the theoretical peak compute utilization
  on this dataflow architecture, calculate the maximum batch size you can process while strictly adhering
  to a 10 millisecond latency budget for the entire batch.
details:
  realistic_solution: To find the maximum batch size, first determine the effective processing throughput
    using the utilization factor. Then, calculate how many operations the accelerator can perform within
    the given latency budget, and divide that capacity by the cost of a single inference.
  common_mistake: Candidates often use the theoretical peak of 26 TOPS without applying a realistic utilization
    factor, leading to an overestimation of the maximum batch size. They also frequently confuse unit
    conversions between TOPS, GOPS, and milliseconds.
  napkin_math: Effective Compute = 26 TOPS * 0.50 = 13 TOPS = 13,000 GOPS. Compute Capacity in 10ms =
    13,000 GOPS * 0.010s = 130 GOPS. Maximum Batch Size = 130 GOPS / 2.6 GOPS per inference = 50 frames.
