title: The Drifting Sensor Problem
scenario: An autonomous mobile robot uses LiDAR, cameras, and an IMU for localization. Over months of operation, its localization estimates degrade due to sensor calibration drift, even after initial factory calibration.
question: How would you design an edge system to detect, quantify, and compensate for sensor calibration drift on-device without human intervention?
details:
  realistic_solution: "A robust system needs self-monitoring, self-calibration, and redundancy:\n  1.  Sensor Health Monitoring: Continuously monitor intrinsic and extrinsic sensor parameters.\n  2.  Redundancy and Cross-Validation: Leverage multi-sensor data to cross-validate measurements.\n  3.  Online Self-Calibration: SLAM Loop Closures and VIO/VLO can estimate sensor biases and extrinsic parameters online."
  common_mistake: |
    **The Pitfall:** Relying solely on periodic factory recalibration or external ground truth.
    **The Rationale:** Candidates fail to account for the logistical impossibility of manually recalibrating thousands of deployed, remote robots.
    **The Consequence:** The robots inevitably fail in the field as small sensor biases continuously compound into safety-critical errors over time.
  napkin_math: |
    * **IMU Drift:** A gyroscope bias of 0.1 deg/hr * 1,000 hr = 100 degrees of uncorrected orientation error.
    * **LiDAR Drift:** Range degrades at ~1 mm/m/month. At 10m distance, reading is off by 60mm (6cm) after 6 months. Total error = base 10cm + 6cm = 16cm.
    * **Cross-sensor Validation:** Detect drift when camera-vs-LiDAR pose disagrees by >2 cm at 10m.
    * **Conclusion:** Small per-hour biases rapidly compound into fatal errors within months without online recalibration.
