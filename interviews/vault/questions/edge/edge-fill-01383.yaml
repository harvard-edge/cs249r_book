title: Mitigating Model Extraction on Edge AI with Qualcomm Cloud AI 100
scenario: You are deploying a critical real-time image classification model for anomaly detection on a
  Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W) at the edge. An adversary is attempting to
  perform model extraction by sending carefully crafted queries and analyzing the responses. This is a
  latency-sensitive application where each inference must complete within 5ms. How would you design a
  defense strategy that minimizes performance impact while effectively mitigating the extraction risk,
  considering the hardware constraints?
question: "How would you design a defense strategy that minimizes performance impact while effectively mitigating the extraction risk, considering the hardware constraints?"
details:
  realistic_solution: Implement a multi-layered defense combining query throttling, output obfuscation
    (e.g., adding calibrated noise or quantizing outputs to lower precision for suspicious queries), and
    on-device adversarial pattern detection. Leverage the AI 100's INT8 capabilities for the detection
    module to keep overhead minimal. Additionally, consider subtle model watermarking during training
    to identify extracted models, and implement rate limiting based on IP addresses and request patterns
    to prevent rapid-fire querying typical of extraction attempts.
  common_mistake: Ignoring the computational overhead of defensive mechanisms, leading to missed latency
    budgets or requiring excessive memory, which is critical on edge devices. Another common mistake is
    implementing overly complex defenses that cannot run efficiently within the given power and thermal
    envelopes of edge hardware.
  napkin_math: "The Qualcomm Cloud AI 100 delivers 400 TOPS (INT8). If a proposed adversarial defense\
    \ mechanism, like a lightweight input sanitization module, adds an average of 10% computational overhead\
    \ per inference for an existing model that utilizes 50% of the chip's capacity at peak. What is the\
    \ new effective maximum inference rate for the defense-enabled model compared to the original? \n\n\
    *   Original model capacity usage: 0.50 * 400 TOPS = 200 TOPS.\n*   Additional overhead for defense:\
    \ 0.10 * 200 TOPS = 20 TOPS.\n*   Total capacity used with defense: 200 TOPS (model) + 20 TOPS (defense)\
    \ = 220 TOPS.\n*   If the original model could run at 'X' inferences per second, with the defense,\
    \ it would effectively run at (200 TOPS / 220 TOPS) * X = ~0.91X inferences per second. This represents\
    \ a reduction of approximately 9% in the maximum inference rate due to the defense overhead."
