title: Autonomous Vehicle Dynamic Power Capping
scenario: An autonomous vehicle edge cluster has 4 identical SoC nodes with a shared physical power budget of 200W. Normally, 3 perception nodes use 50W each (40W dynamic, 10W static) running at 30 FPS (20ms latency), and 1 planning node uses 30W. A routing failure causes the planning node to spike to 65W.
question: Can a 10% frequency and voltage reduction on the 3 perception nodes absorb the 65W planning spike while maintaining 30 FPS?
details:
  realistic_solution: Applying a uniform 10% DVFS step to the perception nodes leverages the non-linear relationship between frequency/voltage and dynamic power. Since inference latency increases linearly but dynamic power decreases cubically (P ∝ V^2 * f), you can harvest massive power savings with minimal latency impact. By downclocking the perception nodes, the system safely absorbs the planning node's power spike while still comfortably meeting the 33.3ms deadline required for 30 FPS.
  common_mistake: |
    **The Pitfall:** Assuming a 10% frequency reduction only yields a 10% power reduction.
    **The Rationale:** Candidates fail to apply the CMOS power equation (P ∝ V^2 * f) and miss the cubic reduction in dynamic power when voltage and frequency are stepped down together.
    **The Consequence:** Incorrectly concluding the system will crash, missing an elegant DVFS optimization that easily absorbs the spike.
  napkin_math: |
    1. Current total = 3*50W + 65W = 215W (15W over budget).
    2. Reduce perception frequency by 10% (0.9x). New latency = 20ms / 0.9 = 22.2ms (meets 33.3ms deadline).
    3. New dynamic power = 40W * (0.9)^3 = 29.16W.
    4. New node power = 29.16W + 10W (static) = 39.16W.
    5. Total savings = 3 * (50W - 39.16W) = 32.52W.
    6. New system total = 3*39.16W + 65W = **182.48W** (Safely under the 200W budget).
