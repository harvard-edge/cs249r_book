title: Mastering Context Window Management for Long-Running Edge Agents
scenario: An edge device runs a long-horizon maintenance agent with a 2B LLM (4096-token context window). Each maintenance session accumulates conversation history — after 45 minutes of interaction, the context fills completely and the agent loses early session context. Prefill time for a full 4096-token context is 2.1 seconds.
question: Design a context compression strategy that preserves critical information while keeping prefill under 500ms.
details:
  realistic_solution: 'Implement three-tier context management: (1) A permanent slot for session metadata and initial diagnostics that is never evicted. (2) A summarized history using a fast extractive summarizer. (3) A recent working context for the last 15-20 turns verbatim. To meet the 500ms latency, compute the maximum token allowance and strictly bound the tiered window. Using INT4 quantization doubles prefill throughput.'
  common_mistake: |
    **The Pitfall:** Simply truncating the oldest messages (sliding window) when the context fills.
    **The Rationale:** Taking the easiest implementation path for standard chatbots.
    **The Consequence:** Discarding critical early diagnostic information (e.g., initial error codes, baseline readings), causing the agent to hallucinate or restart diagnoses constantly.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Context size: 4096 tokens.
       - Prefill time: 2.1 seconds (full context).
       - Latency budget: < 500ms.
    2. **Calculations:**
       - Linear scaling: 2.1s * (target / 4096) = 0.5s -> Target tokens = 975.
       - With INT4 (2x throughput): Target tokens = 1950.
       - Tiered Budget: 512 (Permanent) + 512 (Summary) + 926 (Recent) = 1950 tokens.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Prefill**. Hitting the 500ms interactive threshold requires aggressively bounding the context window below 1950 tokens using tiered summarization.
