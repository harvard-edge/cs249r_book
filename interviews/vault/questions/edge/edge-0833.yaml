title: Federated Analytics SecAgg Overhead
scenario: You are deploying a Federated Analytics system to monitor inference error distributions on an edge vision model across a cohort of 250,000 smart cameras. To preserve privacy, each camera generates a 1,000-bin error histogram (4 bytes per bin) instead of sending raw data. You enforce Secure Aggregation (SecAgg) so the server only sees the cohort sum. The protocol requires each device to negotiate pairwise masks with k=100 random neighbors, uploading a 32-byte Diffie-Hellman public key for each neighbor to the server, followed by the masked histogram.
question: What are the per-camera upload and total server ingress for one SecAgg round with 1,000-bin histograms and k=100 neighbors?
details:
  realistic_solution: Calculate the histogram size, add the key exchange payload, and multiply by the total cohort size to find the true per-device bandwidth and total server network ingress.
  common_mistake: |
    **The Pitfall:** Calculating only the 4 KB histogram payload and ignoring the cryptographic key exchange overhead.
    **The Rationale:** Candidates forget that Secure Aggregation protocols require pairwise mask negotiations, which scales with the number of neighbors (k).
    **The Consequence:** The per-device upload bandwidth and total server ingress are underestimated by nearly a factor of two, potentially overloading the network.
  napkin_math: |
    - Histogram payload: 1,000 bins * 4 bytes/bin = 4,000 bytes (4.0 KB).
    - Key exchange overhead: 100 neighbors * 32 bytes/key = 3,200 bytes (3.2 KB).
    - Total per-device upload = 4.0 KB + 3.2 KB = 7.2 KB.
    - Total server ingress = 250,000 devices * 7.2 KB/device = 1,800,000 KB.
    **Conclusion: The per-camera upload is 7.2 KB, and the total server ingress is 1.8 GB.**
