title: 'Latency Decomposition: Compute Prefill Latency for Edge LLM on Jetson Orin'
scenario: You are deploying a 1B-parameter language model (INT8 quantized) on Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) for on-device text completion. Compute the prefill latency for a 128-token prompt and the decode latency per token. Assume 32 transformer layers, hidden dim 2048, and the model fits entirely in LPDDR5.
question: What theoretical and 60%-utilization prefill latency should you estimate for a 1B LLM processing a 128-token prompt in INT8 on a 275 TOPS Jetson Orin?
details:
  realistic_solution: 'For a 1B-parameter model, the compute required for prefill is approximately 2 * P * N operations. For 128 tokens, this is 2 * 1B * 128 = 256 GOPS. Given the Jetson Orin''s 275 TOPS, the theoretical minimum latency is ~0.93ms. At a realistic 60% compute utilization, the latency is ~1.55ms.'
  common_mistake: Using peak 275 TOPS without applying a realistic utilization factor, and miscalculating the total operations for the prefill phase by conflating GOPS and TOPS.
  napkin_math: 'Operations = 2 * 1B params * 128 tokens = 256 GOPS. Theoretical time = 256 GOPS / 275,000 GOPS = 0.93ms. At 60% utilization = 0.93ms / 0.6 = 1.55ms.'
