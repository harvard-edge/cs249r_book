title: 'Latency Decomposition: Compute Prefill Latency for Edge LLM on Jetson Orin'
scenario: You are deploying a 1B-parameter language model (INT8 quantized) on Jetson Orin for on-device text completion. You need to compute the prefill latency for a 128-token prompt.
question: What theoretical and 60%-utilization prefill latency should you estimate for a 1B LLM processing a 128-token prompt in INT8?
details:
  realistic_solution: 'For a 1B-parameter model, the compute required for prefill is approximately 2 * P * N operations. For 128 tokens, this is 2 * 1B * 128 = 256 GOPS. Given the Jetson Orin''s 275 TOPS, the theoretical minimum latency is ~0.93ms. At a realistic 60% compute utilization, the latency is ~1.55ms.'
  common_mistake: |
    **The Pitfall:** Using peak 275 TOPS without applying a realistic utilization factor, or conflating GOPS and TOPS.
    **The Rationale:** Candidates treat theoretical peak compute as achievable sustained performance.
    **The Consequence:** Overly optimistic latency projections that fail in real-world deployment.
  napkin_math: |
    - Operations: 2 * 1B params * 128 tokens = 256 GOPS.
    - Theoretical time: 256 GOPS / 275,000 GOPS = 0.93ms.
    - 60% utilization time: 0.93ms / 0.6 = 1.55ms.
    **The prefill latency at 60% utilization is 1.55ms.**
