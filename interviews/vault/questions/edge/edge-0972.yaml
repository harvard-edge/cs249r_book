title: Bursty Edge Queue Diagnosis
scenario: 'An edge SoC processes INT8 video frames with a strict deterministic processing time of 20 ms per frame. The network camera sends frames yielding 80% average utilization. During certain shifts, the 99th percentile frame latency suddenly spikes to 220 ms.'
question: 'How many frames are queued to cause the 220 ms latency, and what characteristic of the arrival process must be changing?'
details:
  realistic_solution: 'Total latency equals Wait Time plus Service Time. The massive wait time implies a deep queue buildup. Since average utilization remains at 80%, the presence of a deep queue indicates the arrival process has shifted from Poisson to highly bursty (e.g., batched network transmissions).'
  common_mistake: |
    **The Pitfall:** Assuming the SoC is thermally throttling and slowing down the service rate.
    **The Rationale:** Candidates default to hardware throttling explanations for sudden latency spikes.
    **The Consequence:** They completely fail to analyze the queueing mathematics that prove spikes are driven strictly by arrival variance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Deterministic Service Time (μ) = 20ms per frame.
       - Total measured Latency = 220ms.
       - Average Utilization (ρ) = 80%.
    2. **Calculations:**
       - Total Latency = Wait Time + Service Time.
       - 220ms = Wait Time + 20ms -> Wait Time = 200ms.
       - Queue Length = 200ms Wait / 20ms Service Time = 10 frames.
       - Standard M/D/1 mean wait at 80% utilization is only 40ms.
    3. **Conclusion & Interpretation:**
       - **A queue depth of 10 proves the arrival process has lost its Poisson property and become highly bursty.** (Result: Queueing-Bound)
