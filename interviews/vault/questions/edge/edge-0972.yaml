title: Bursty Edge Queue Diagnosis
scenario: 'A Jetson AGX Orin processes INT8 video frames with a strict deterministic processing time of 20 ms per frame (μ = 50 FPS). The network camera sends frames at an average rate of 40 FPS (λ = 40), yielding 80% average utilization. During certain shifts, the 99th percentile frame latency suddenly spikes to 220 ms.'
question: 'How many frames are queued to cause the 220 ms latency, and what characteristic of the arrival process must be changing?'
visual:
  kind: svg
  path: edge-0972.svg
  alt: A line chart comparing Poisson arrivals versus highly bursty arrivals. Both show latency exponentially increasing as utilization approaches 1.0 (the 'hockey stick' curve), but the bursty curve spikes much earlier.
  caption: Latency vs. Utilization (M/D/1 vs. Bursty Arrivals)
details:
  realistic_solution: 'Total latency is Wait Time + Service Time. With a 220 ms latency and a 20 ms strict service time, the wait time is 200 ms. Since every frame takes exactly 20 ms, a 200 ms wait implies there are exactly 10 frames queued ahead of the victim frame (200 / 20 = 10). Because average utilization is 80% (ρ = 0.8), a standard M/D/1 queue expects a mean wait of just 40 ms. The presence of 10-frame deep queues indicates the arrival process is no longer Poisson but highly bursty (e.g., batched transmissions from the camera), pushing the system up the queueing ''hockey stick'' locally.'
  common_mistake: |
    **The Pitfall:** Assuming the Jetson is thermally throttling and slowing down the service rate.
    **The Rationale:** Candidates default to hardware throttling explanations for sudden latency spikes.
    **The Consequence:** They completely fail to analyze the queueing mathematics that prove spikes are driven by arrival variance.
  napkin_math: |
    * Total Latency = Wait Time + Service Time.
    * 220ms = Wait Time + 20ms -> Wait Time = 200ms.
    * Queue Length = 200ms Wait / 20ms Service Time per frame = 10 frames.
    * Standard M/D/1 mean wait at 80% utilization is only 40ms.
    * **Conclusion: A queue depth of 10 proves the arrival process has lost its Poisson property and become highly bursty.**
