title: CPU Fallback Bottleneck on Edge TPU
scenario: You are converting a CNN to a fully quantized INT8 TFLite model for deployment on a Google Coral Edge TPU. The model requires exactly 10 GOPS (Giga Operations) per inference. Due to limited operator support, a conversion gap causes 20% of the compute operations to fall back to the host CPU via delegation.
question: What theoretical maximum FPS results when 20% of the 10 GOPS model falls back to a 100 GOPS CPU and execution is sequential?
details:
  realistic_solution: Calculate the individual execution times for both the TPU and CPU partitions, then sum them to find the true bottleneck. In practice, replace the unsupported operations in the source model with TPU-compatible equivalents to avoid the host CPU delegation entirely.
  common_mistake: |
    **The Pitfall:** Calculating the FPS using only the Edge TPU's throughput.
    **The Rationale:** Candidates often focus purely on the target accelerator's spec sheet and completely ignore the severe penalty of host fallbacks.
    **The Consequence:** Overestimating the performance drastically (e.g., claiming 400 FPS) by ignoring the CPU bottleneck, resulting in missed latency SLAs in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Edge TPU throughput: 4 TOPS (4000 GOPS).
       - CPU throughput: 100 GOPS.
       - Model size: 10 GOPS total.
       - Fallback: 80% TPU, 20% CPU.
    2. **Calculations:**
       - TPU portion (8 GOPS): 8 / 4000 = 0.002s (2ms).
       - CPU portion (2 GOPS): 2 / 100 = 0.020s (20ms).
       - Total sequential inference time: 2ms + 20ms = 22ms.
       - Maximum FPS: 1 / 0.022s = ~45.45 FPS.
    3. **Conclusion & Interpretation:**
       - **Result: CPU-Bound**. The theoretical maximum frame rate drops dramatically to ~45.45 FPS due to the sequential CPU fallback dominating the latency.
