title: The Autonomous Vision Unification Dilemma
scenario: You are the new Principal Engineer for the 'Perception v5' team at a leading autonomous vehicle
  company. The current v4 system uses a dozen specialized CNNs for tasks like pedestrian detection, lane
  finding, and sign recognition.
question: "How would you make a 2B-parameter ViT replacement for the v4 CNN stack fit the 33ms edge latency budget?"
details:
  realistic_solution: The correct approach is a multi-stage architectural redesign that attacks the computational
    complexity at its source, demonstrating a grasp of architectural trade-offs beyond simple optimization.
  common_mistake: Proposing only incremental optimizations like vanilla quantization or unstructured pruning.
    These are necessary but insufficient for the 15x performance gap. Another common mistake is to suggest
    abandoning the ViT, which ignores the strategic requirement, or to focus on only one technique (like
    quantization) without a holistic architectural vision. An L3 might suggest a bigger GPU, which isn't
    an option in a car.
  napkin_math: 'ViT 2B params = 2GB (INT8). Eight 640x480 images = 2.45MP. For patch size 16x16, sequence
    length N = 2.45M / 256 = 9600. Memory load per inference: 2GB weights. Orin BW is 204.8 GB/s. Weight
    load time: 2GB / 204.8GB/s = 9.7ms. Attention matrix (N^2) = 9600^2 = 92M elements. For FP16, this is
    184MB per layer/head. Loading this dominates. 12 layers * 12 heads * 184MB = 26.5GB data movement.
    26.5GB / 204.8 = 129ms. Misses 33ms budget totally.'
