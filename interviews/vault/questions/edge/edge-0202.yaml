title: The Continuous Batching Throughput Gain
scenario: You're optimizing an object detection server running on a Jetson AGX Orin for a smart factory.
  It receives requests from multiple cameras. A single inference (batch size 1) takes 22 ms. Using continuous
  batching, you can process a batch of 4 requests in just 40 ms due to amortization of kernel launch overheads.
  What is the percentage increase in request throughput your system gains by using this batching strategy
  compared to processing requests one by one?
question: "What is the percentage increase in request throughput your system gains by using this batching strategy compared to processing requests one by one?"
details:
  realistic_solution: First, calculate the throughput (requests per second) for both the sequential and
    batched scenarios. Then, calculate the percentage increase from the sequential baseline to the batched
    performance.
  common_mistake: Assuming inference latency scales linearly with batch size. This leads to the incorrect
    conclusion that batching offers no throughput benefit (e.g., 4 requests would take 4 * 22ms = 88ms),
    which negates the entire purpose of batching. Another common mistake is calculating the latency reduction
    per request instead of the overall system throughput gain.
  napkin_math: '1. Sequential Throughput (Batch Size = 1): 1000 ms / 22 ms/req = 45.45 requests/sec. 2.
    Batched Throughput (Batch Size = 4): 4 requests / 40 ms = 1 request / 10 ms = 100 requests/sec. 3.
    Improvement: (100 - 45.45) / 45.45 = 1.20. Continuous batching yields a 120% increase in overall throughput.'
  options:
  - 0%
  - 55%
  - 45%
  - 120%
  correct_index: 3
