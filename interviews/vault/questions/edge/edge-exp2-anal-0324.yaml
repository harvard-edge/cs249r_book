title: Thermal Throttling on Jetson Orin GPU vs DLA
scenario: We are serving an INT8 vision pipeline on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8,
  60W TDP, Ampere GPU + DLA accelerator). The model requires 200 TOPS to process multiple video streams
  at the required latency. When we configure the inference server to execute the model entirely on the
  Ampere GPU, the system hits thermal throttling after 5 minutes and drops frames, even though the GPU
  is rated for the required TOPS. However, when we reconfigure the inference server to map specific layers
  to the DLA accelerator, the system runs indefinitely without throttling. Analyze why this serving configuration
  change resolves the system failure.
details:
  realistic_solution: The system failure is caused by exceeding the 60W Thermal Design Power (TDP) limit
    when running the Ampere GPU at high utilization. The GPU is flexible but less power-efficient for
    pure tensor math than the Deep Learning Accelerator (DLA). By offloading a portion of the model's
    graph to the DLA, the inference server shifts compute to a highly efficient fixed-function block.
    This reduces the total power draw below the 60W threshold, preventing thermal throttling while still
    meeting the overall TOPS requirement.
  common_mistake: Candidates often assume that because the total compute requirement (200 TOPS) is less
    than the theoretical maximum (275 TOPS), the GPU should handle it without issue. They frequently fail
    to analyze the power consumption limits (60W TDP) and the difference in performance-per-watt between
    general-purpose GPUs and fixed-function DLAs.
  napkin_math: Required compute = 200 TOPS. Assume the Ampere GPU has an efficiency of 2.5 TOPS/W. Running
    200 TOPS on GPU requires 200 / 2.5 = 80W, which exceeds the 60W TDP and causes throttling. The DLA
    is highly optimized, offering around 10 TOPS/W. If we partition the model to run 100 TOPS on the DLA
    (100 / 10 = 10W) and 100 TOPS on the GPU (100 / 2.5 = 40W), the total power consumption is 10W + 40W
    = 50W. This leaves a 10W margin under the 60W TDP, ensuring stable continuous serving.
