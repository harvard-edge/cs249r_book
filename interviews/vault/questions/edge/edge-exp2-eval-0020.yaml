title: Evaluating Energy Efficiency of Architectures on Edge TPU
scenario: 'We are deploying a real-time object detection system on a Google Coral Edge TPU, operating
  under a strict 2W power budget and capable of 4 TOPS INT8 compute. You are presented with two INT8-quantized
  model candidates: Model A uses standard convolutions but requires intermediate tensor spills to host
  memory via USB/PCIe, while Model B uses depthwise-separable convolutions that fit entirely within the
  Edge TPU''s on-chip SRAM but requires 20% more total operations. Evaluate which model architecture will
  consume less energy per inference and justify your design choice.'
question: "Which INT8 model will consume less energy per inference on the 2W Coral Edge TPU, and why?"
details:
  realistic_solution: Model B is the significantly better choice for energy efficiency. Although it requires
    20% more compute operations, maintaining the entire working set within the Edge TPU's on-chip SRAM
    avoids the massive energy penalty of off-chip memory transfers. For the Coral Edge TPU, the energy
    consumed by transferring intermediate tensors over USB/PCIe will rapidly exhaust the 2W budget, making
    compute-bound architectures far superior to memory-bound ones.
  common_mistake: Candidates often solely compare the total operation count, concluding that Model A is
    more efficient because it has fewer MAC operations. They fail to apply the Horowitz energy table principles,
    which show that off-chip memory accesses (especially over USB or PCIe) cost orders of magnitude more
    energy than on-chip compute.
  napkin_math: At 4 TOPS and a 2W power limit, the Coral Edge TPU achieves approximately 0.5 pJ per INT8
    operation (2W / 4e12 ops/sec). Off-chip memory access over PCIe/USB typically costs around 100 pJ
    per bit, or 800 pJ per INT8 value. Therefore, a single off-chip memory access costs roughly 1600x
    more energy than an on-chip INT8 MAC operation. If Model A requires off-chip memory access for even
    0.1% of its operations, the energy cost of those transfers (0.001 * 1600x = 1.6x) will far exceed
    the energy saved by having 20% fewer compute operations than Model B.
