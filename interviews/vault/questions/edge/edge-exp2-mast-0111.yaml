title: Dataflow-Aware Dynamic Batching for Multi-Camera Hailo-8 Edge Appliances
scenario: You are designing an edge inference appliance to process 4 concurrent 1080p camera streams at
  30 FPS using a single Hailo-8 accelerator (26 TOPS INT8, 2.5W). The Hailo-8 operates as a dataflow accelerator
  without local DRAM, meaning it must stream input tensors directly from host memory over PCIe. To minimize
  host-to-device memory transfer overhead and hit strict 33ms latency targets per frame, you need to synthesize
  a custom batching strategy. Design an architecture that dynamically batches asynchronous frames from
  these cameras while accounting for the PCIe bandwidth constraints and the accelerator's strict dataflow
  nature.
details:
  realistic_solution: The optimal design employs a host-side memory pooling strategy to spatially concatenate
    incoming frames into a unified 'mega-tensor' (e.g., a 2x2 grid) in pinned host memory before streaming
    it to the Hailo-8 as a single batch-1 execution. This perfectly leverages the accelerator's spatial
    dataflow pipeline without incurring the overhead of multiple small PCIe transfers or requiring on-device
    buffering. The architecture should use a strict time-bound trigger (e.g., 20ms) to pad missing frames
    with zeros if a camera lags, ensuring the dataflow pipeline never stalls and the 33ms end-to-end latency
    budget is preserved.
  common_mistake: Candidates often propose standard dynamic batching strategies borrowed from GPU serving,
    assuming they can accumulate batches on the device memory. They fail to account for the Hailo-8's
    lack of local DRAM, which causes host memory bottlenecks and PCIe thrashing when trying to dispatch
    multiple small asynchronous inferences.
  napkin_math: 4 streams at 30 FPS requires processing a combined batch every 33.3ms. A 1080p RGB INT8
    frame is 1920x1080x3 bytes ≈ 6.22 MB. Spatially batching 4 frames yields a 24.88 MB input tensor.
    Streaming this from host memory at 30 FPS demands roughly 746 MB/s of PCIe bandwidth, easily fitting
    within a standard PCIe Gen3 x2/x4 link. Assuming a typical vision model requires 8 GOPS per frame,
    the batched execution requires 32 GOPS. The Hailo-8 provides 26 TOPS (26,000 GOPS), meaning raw compute
    time is 32 / 26000 = 0.0012 seconds (1.2ms). Therefore, inference latency is heavily dominated by
    the 746 MB/s host-to-device stream, validating that host-side spatial batching is the only way to
    avoid PCIe overhead and meet the 33.3ms deadline.
