title: Thermal Throttling of Adversarial Defenses
scenario: You are deploying a perception model for an autonomous vehicle on an NVIDIA Jetson Orin. To
  defend against physical adversarial patches, you add a randomized input smoothing operation as a preprocessing
  step. The Jetson Orin features an Ampere GPU + DLA accelerator, 32 GB LPDDR5, 275 TOPS INT8, and a 60W
  TDP. The main model normally takes 30ms per frame, and profiling shows the smoothing operation takes
  5ms. However, under continuous load, the device hits its 60W TDP limit and the frame rate drops to 20
  FPS instead of the expected ~28 FPS. Analyze why adding this specific adversarial defense mechanism
  causes this system behavior.
details:
  realistic_solution: Generating high-resolution random noise for input smoothing is highly memory-bandwidth
    intensive and typically utilizes the Ampere GPU rather than the specialized DLA. This sustained high-bandwidth
    workload causes a massive spike in power consumption, pushing the Jetson Orin to its 60W TDP limit.
    To prevent overheating, the system triggers dynamic voltage and frequency scaling (DVFS), which throttles
    the GPU clock speeds and proportionally increases the latency of both the preprocessing and the main
    model.
  common_mistake: Candidates typically assume the frame rate drop is due to a software synchronization
    bug or CPU bottleneck, failing to apply the constraints of power limits and thermal throttling (DVFS)
    to the hardware's compute capabilities.
  napkin_math: 'Baseline expected latency without throttling: 30ms (model) + 5ms (defense) = 35ms per
    frame. Expected FPS: 1000ms / 35ms = ~28.5 FPS. Observed FPS: 20 FPS, which means actual latency is
    1000ms / 20 = 50ms per frame. The discrepancy is 50ms - 35ms = 15ms. If the 60W TDP limit forces a
    30% clock speed reduction to manage thermals, the effective compute time becomes 35ms / (1 - 0.30)
    = 50ms. Despite having 275 TOPS INT8 available, the power constraint dictates the actual throughput.'
