title: Evaluating Degradation Strategies on Coral Edge TPU
scenario: 'You are designing an object detection pipeline for a remote, battery-powered camera using a Google Coral Edge TPU via USB. Normally, the Coral accelerator runs a quantized INT8 model to track objects. During extreme temperature spikes, the USB interface throttles and the Edge TPU becomes unavailable. You must evaluate two degradation strategies: Strategy A falls back to a smaller FP32 model running on the low-power host CPU, while Strategy B falls back to the host CPU using the same INT8 model but aggressively sheds non-critical tracking tasks to reduce load.'
question: Which approach (Strategy A vs B) provides better fail-operational reliability?
details:
  realistic_solution: Strategy B is the superior choice for graceful degradation. The model is already quantized to INT8 for the Coral Edge TPU's limited operator support. Running this same INT8 model on the host CPU is significantly more compute and memory-efficient than switching to an FP32 model. By intentionally shedding quality-of-service (e.g., dropping frame rates or ignoring background objects), the system maintains critical fail-operational security monitoring without triggering a host CPU thermal shutdown.
  common_mistake: |
    **The Pitfall:** Choosing Strategy A and falling back to a smaller FP32 model on the CPU.
    **The Rationale:** Candidates assume FP32 is the standard fallback for a CPU. They fail to realize that performing FP32 math on a low-power CPU causes massive latency spikes and rapidly drains the battery, worsening the thermal event.
    **The Consequence:** The system rapidly trips a hard thermal shutdown or depletes its battery, resulting in complete system failure instead of graceful degradation.
  napkin_math: |
    * Coral Edge TPU efficiency: 4 TOPS at 2W (**2 TOPS/W**).
    * Full INT8 model (30 FPS) requirement: ~1 TOPS.
    * Normal Coral power draw: 1 TOPS / 2 TOPS/W = 0.5W.
    * Host CPU INT8 efficiency: ~0.1 TOPS/W.
    * Full load on Host CPU (1 TOPS): 10W (Likely exceeds thermal budget).
    * Strategy B (Shed QoS to 10 FPS, INT8 on CPU): Requirement drops to 0.33 TOPS.
    * Strategy B power draw: 0.33 TOPS / 0.1 TOPS/W = **~3.3W**.
    * Strategy B keeps the system alive, whereas an FP32 fallback demands even more power than 10W, guaranteeing failure.
