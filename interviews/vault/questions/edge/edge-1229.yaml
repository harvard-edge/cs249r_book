title: Distillation versus Unstructured Pruning on Dataflow Accelerators
scenario: You are optimizing a vision model for deployment on a Hailo-8 edge accelerator
  (26 TOPS INT8, 2.5W, no local DRAM, streams weights and activations from host memory).
  The baseline model requires 100 GOPS per frame. The team attempts to double the
  throughput using 50% unstructured pruning (reducing theoretical compute to 50 GOPS).
  However, profiling shows the pruned model runs at the exact same latency as the
  baseline. The team then uses knowledge distillation to train a dense student model
  also requiring 50 GOPS, which successfully doubles the frame rate. Analyze why the
  dataflow architecture of the Hailo-8 causes this performance discrepancy.
question: Why does 50% unstructured pruning not speed up the Hailo-8 model while a
  50-GOPS dense distilled model doubles FPS?
details:
  realistic_solution: The Hailo-8 is a dataflow accelerator that maps networks spatially
    and relies on continuous, dense streams of weights from host memory due to its
    lack of local DRAM. Unstructured pruning leaves the overall matrix dimensions
    unchanged, forcing the hardware to stream zeroed weights and execute zero-multiplications.
    Knowledge distillation produces a genuinely smaller, dense student model. This
    smaller dense architecture reduces the actual tensor dimensions, allowing the
    compiler to optimize spatial mapping and physically halve both the required compute
    operations and the host-to-accelerator memory bandwidth per frame.
  common_mistake: Candidates often assume that fewer non-zero weights automatically
    translate to lower latency. They fail to recognize that edge accelerators without
    native sparse-compute support must still process the zeros, and that unstructured
    pruning does not reduce the dense memory bandwidth required to stream the weights
    from the host.
  napkin_math: 'Baseline Model: 100 GOPS, 20 MB weights. Hailo-8 theoretical peak:
    26 TOPS. Assuming 25% compute utilization: 6.5 effective TOPS (6500 GOPS/s). Baseline
    Latency: 100 GOPS / 6500 GOPS/s = ~15.4 ms (65 FPS). Host memory bandwidth required:
    20 MB * 65 FPS = 1.3 GB/s. Pruned Model (50% sparse): Maintains 100 GOPS dense
    matrix footprint and 20 MB weight structure. Latency remains 15.4 ms. Distilled
    Student Model: 50 GOPS dense, 10 MB weights. Distilled Latency: 50 GOPS / 6500
    GOPS/s = ~7.7 ms (130 FPS). Host memory bandwidth: 10 MB * 130 FPS = 1.3 GB/s.
    The distilled model doubles the frame rate while staying within the same streaming
    bandwidth limits.'
