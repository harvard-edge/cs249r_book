title: Dataflow NAS Constraints for Hailo-8 Accelerator
scenario: We are deploying a multi-camera object detection system for an industrial inspection pipeline
  using a host processor connected via PCIe to a Hailo-8 accelerator. The Hailo-8 provides 26 TOPS INT8
  at just 2.5W but operates as a dataflow accelerator with no local DRAM, meaning it streams all weights
  and activations directly from host memory. You need to specify the constraints and cost model for a
  Neural Architecture Search (NAS) algorithm to discover an optimal backbone. Analyze the interactions
  between the host memory bandwidth and the dataflow execution model to define the boundaries of the architecture
  search space.
question: "How should the NAS cost model and search space account for Hailo-8's no-DRAM dataflow architecture and host-memory bandwidth limits?"
details:
  realistic_solution: The NAS specification must define a hardware-aware cost model that heavily penalizes
    memory bandwidth utilization over pure computational FLOPs. Because the Hailo-8 relies on streaming
    from host memory, the search space should restrict complex branching, favor early spatial downsampling
    to reduce activation sizes, and prioritize sequence-heavy blocks that can be compiled into a continuous
    on-chip dataflow without host round-trips.
  common_mistake: Candidates often constrain the NAS solely by FLOPs or parameter count, which are common
    metrics for CPU/GPU deployments. They fail to account for the lack of local DRAM on the Hailo-8, where
    intermediate activation sizes and complex skip connections that require spilling state back to host
    memory will completely bottleneck the dataflow pipeline.
  napkin_math: 'The Hailo-8 provides 26 TOPS (13 Tera-MACs/s) INT8 compute. Assuming a standard PCIe Gen3
    x4 host connection with a realistic throughput of ~3.9 GB/s. Required arithmetic intensity to avoid
    stalling = 13,000,000 M-MACs/s / 3,900 MB/s = 3,333 MACs per byte transferred. Therefore, the NAS
    constraints must evaluate each candidate block: if (MACs / (Input_Bytes + Output_Bytes + Weight_Bytes))
    < 3333, the block is bandwidth-bound and will fail to utilize the 26 TOPS engine, making it an invalid
    candidate for the edge deployment.'
