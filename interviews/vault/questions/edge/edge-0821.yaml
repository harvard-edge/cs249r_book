title: Mitigating Byzantine Poisoning in Federated Learning
scenario: 'You are managing a federated learning system aggregating updates from 1,000 edge devices per round. Normal updates have an L2 norm of roughly 2.0. You detect a Byzantine attack where 50 compromised devices send malicious updates with an L2 norm of 200.0.'
question: 'What is the FedAvg global gradient norm under attack, and what clipping threshold C limits attackers to 10% of the honest magnitude?'
details:
  realistic_solution: 'Implement L2 norm clipping on all incoming device updates before they are averaged. By setting a clipping threshold C = 3.8, the 50 malicious updates are scaled down, restricting their total influence without affecting the honest updates.'
  common_mistake: |
    **The Pitfall:** Assuming Byzantine Fault Tolerance requires complex multi-round consensus protocols like PBFT.
    **The Rationale:** Candidates default to heavy distributed systems theory instead of ML-specific defenses.
    **The Consequence:** They overlook computationally cheap robust aggregation techniques like L2 norm clipping or coordinate-wise medians.
  napkin_math: |
    * Unmitigated FedAvg average norm: (950 × 2.0 + 50 × 200.0) / 1000 = 11900 / 1000 = 11.9.
    * Total norm of honest updates: 950 × 2.0 = 1900.
    * Maximum allowable attacker total norm (10% limit): 1900 × 0.10 = 190.
    * Required clipping threshold C formula: 50 × C = 190.
    * **Conclusion: Clipping threshold C = 3.8 successfully restricts attackers without clipping honest updates (2.0 < 3.8).**
