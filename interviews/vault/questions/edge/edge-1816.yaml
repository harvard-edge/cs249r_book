title: Vision Model Memory Profiling for Google Coral Edge TPU
scenario: You are tasked with designing a real-time object detection system for a smart security camera utilizing a Google Coral Edge TPU via a USB interface. The system requires a minimum inference speed of 30 FPS and must operate within the Coral's strict 2W power budget. Given a baseline MobileNetV2-SSD model initially trained in FP32 with 4.3 million parameters, specify the end-to-end transformation and compilation pipeline required to deploy this model.
question: "What end-to-end quantization, compilation, and memory analysis pipeline would you specify for deploying MobileNetV2-SSD on Coral Edge TPU?"
details:
  realistic_solution: The correct approach requires specifying Post-Training Quantization (PTQ) or Quantization-Aware Training (QAT) with a representative dataset to convert all FP32 weights and activations to INT8. The candidate must then detail passing the TFLite model through the Edge TPU Compiler to partition the graph, mapping supported INT8 operations to the TPU (for 4 TOPS execution) and leaving any unsupported ops for the host CPU. By analyzing the compressed 1-byte parameter footprint, the design ensures the weights fit predominantly within the device's limited on-chip memory, maximizing performance per watt.
  common_mistake: |
    **The Pitfall:** Assuming FP16 is sufficient or calculating only the parameter size.
    **The Rationale:** Candidates forget the Coral Edge TPU strictly requires full INT8 and overlook activation memory footprint.
    **The Consequence:** The model fails to run on the TPU (falling back to CPU) or suffers severe USB/PCIe bottlenecks due to activation traffic.
  napkin_math: |
    *   **Quantization:** Baseline FP32 weights (4.3M * 4 bytes = 17.2 MB) convert to INT8 (4.3M * 1 byte = 4.3 MB).
    *   **Latency Budget:** Target 30 FPS = 33.3 ms/frame.
    *   **Compute Time:** A 1.2 GOPS model on a 4 TOPS (4000 GOPS) Edge TPU takes 1.2 / 4000 = 0.3 ms.
    *   **Result:** The **4.3 MB footprint** fits efficiently, preventing USB bottlenecks and operating safely within the 2W envelope.
