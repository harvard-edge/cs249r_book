title: Vision Model Memory Profiling for Google Coral Edge TPU
scenario: You are tasked with designing a real-time object detection system for a
  smart security camera utilizing a Google Coral Edge TPU via a USB interface. The
  system requires a minimum inference speed of 30 FPS and must operate within the
  Coral's strict 2W power budget. Given a baseline MobileNetV2-SSD model initially
  trained in FP32 with 4.3 million parameters, specify the end-to-end transformation
  and compilation pipeline required to deploy this model. Analyze the memory footprint
  and hardware utilization to verify the resulting model meets the Coral's 4 TOPS
  INT8 constraints.
question: What end-to-end quantization, compilation, and memory analysis pipeline
  would you specify for deploying MobileNetV2-SSD on Coral Edge TPU?
details:
  realistic_solution: The correct approach requires specifying Post-Training Quantization
    (PTQ) or Quantization-Aware Training (QAT) with a representative dataset to convert
    all FP32 weights and activations to INT8. The candidate must then detail passing
    the TFLite model through the Edge TPU Compiler to partition the graph, mapping
    supported INT8 operations to the TPU (for 4 TOPS execution) and leaving any unsupported
    ops for the host CPU. By analyzing the compressed 1-byte parameter footprint,
    the design ensures the weights fit predominantly within the device's limited on-chip
    memory, maximizing performance per watt.
  common_mistake: Candidates often assume that simply using FP16 is sufficient, forgetting
    that the Coral Edge TPU strictly requires full INT8 quantization for acceleration.
    They also frequently overlook activation memory footprint, calculating only the
    parameter size, which leads to inefficient USB/PCIe bandwidth utilization or runtime
    memory bottlenecks.
  napkin_math: 'Baseline FP32 weights: 4.3M parameters * 4 bytes/param = 17.2 MB.
    After INT8 quantization: 4.3M * 1 byte/param = 4.3 MB. Target latency for 30 FPS
    = 33.3 ms/frame. If the model requires 1.2 GOPS per frame, the theoretical execution
    time on the 4 TOPS (4000 GOPS) Edge TPU is 1.2 / 4000 = 0.0003 seconds (0.3 ms).
    The 4.3 MB quantized weights fit efficiently into memory, preventing severe USB
    bottlenecking and allowing the system to operate safely within the 2W power envelope.'
