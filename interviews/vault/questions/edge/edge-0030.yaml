title: The Adaptive Quality Ladder
scenario: Your 30 FPS edge perception pipeline runs fine on open roads but drops to
  22 FPS in dense urban intersections (many pedestrians, vehicles, signs). You can't
  miss frames — the safety system requires continuous perception. Design a system
  that maintains 30 FPS under all conditions without changing hardware.
question: How would you maintain 30 FPS in dense urban intersections without changing
  hardware?
details:
  realistic_solution: 'Design an adaptive quality ladder — a pre-defined set of operating points with known latency, each trading quality for speed. When the system detects the pipeline latency exceeding the 33.3ms budget (e.g., via an exponential moving average), it dynamically steps down the ladder. Rung 0 might be full resolution. Rung 1 could reduce input resolution. Rung 2 could switch to a smaller model variant or aggressively lower the NMS confidence threshold. When the scene complexity drops, the system steps back up.'
  common_mistake: '"Just use a faster model." You can''t swap models at runtime without
    a pre-planned strategy, and a single model can''t be optimal for all scene complexities.'
  napkin_math: '30 FPS target = 33.3ms per-frame deadline. Current pipeline: model
    inference + post-processing (NMS). On open roads (~10 objects): inference = 25ms,
    NMS = 2ms → total 27ms → 30 FPS. Dense intersection (~50 objects): NMS scales
    super-linearly with detections. NMS time jumps from 2ms to 10ms. Additional model
    overhead from denser feature maps: inference rises to 35ms. Total: 35 + 10 = 45ms
    → 22.2 FPS. Adaptive quality ladder: | Rung 0 (Full quality): 35ms inference + 10ms NMS = 45ms
    — misses 33.3ms deadline. | Rung 1 (Reduced resolution, 640→480): ~18ms inference
    + 5ms NMS (fewer detections at lower res) = 23ms — 10ms headroom. | Rung 2 (Smallest
    model + aggressive NMS threshold): ~12ms inference + 2ms NMS = 14ms — 19ms headroom
    for worst-case scenes. | Trigger: monitor per-frame latency with an exponential
    moving average. When EMA > 30ms, step down one rung. When EMA < 25ms for 10 consecutive
    frames, step up. | Result over 10 seconds in dense intersection: Rung 0 (drop
    frames): delivers ~222 frames. Rung 1 (steady): delivers 300 frames at slightly
    reduced detection range — no dropped frames, no safety gaps.'
