title: The Adaptive Quality Ladder
scenario: 'Your 30 FPS edge perception pipeline runs fine on open roads but drops to 22 FPS in dense urban intersections (many pedestrians, vehicles, signs). The safety system requires continuous 30 FPS perception without missing frames.'
question: 'What system design maintains 30 FPS across varying scene complexities without changing hardware?'
details:
  realistic_solution: 'Design an adaptive quality ladder — a pre-defined set of operating points with known latency, each trading quality for speed. When the system detects the pipeline latency exceeding the 33.3ms budget (e.g., via an exponential moving average), it dynamically steps down the ladder. Rung 0 might be full resolution. Rung 1 could reduce input resolution. Rung 2 could switch to a smaller model variant or aggressively lower the NMS confidence threshold. When the scene complexity drops, the system steps back up.'
  common_mistake: |
    **The Pitfall:** Suggesting to "just use a faster model" permanently.
    **The Rationale:** Candidates default to static optimization, assuming a single model can be globally optimal for all conditions.
    **The Consequence:** The system either misses deadlines in complex scenes or sacrifices critical accuracy during simple open-road driving.
  napkin_math: |
    * 30 FPS target = 33.3ms per-frame deadline.
    * Open roads (~10 objects): inference 25ms + NMS 2ms = 27ms (meets 33.3ms).
    * Dense intersection (~50 objects): inference 35ms + NMS 10ms = 45ms (misses deadline, yields 22.2 FPS).
    * Rung 0 (Full quality): 45ms (misses deadline).
    * Rung 1 (Reduced resolution): 18ms inference + 5ms NMS = 23ms (10ms headroom).
    * Rung 2 (Smallest model + aggressive NMS): 12ms inference + 2ms NMS = 14ms.
    * **Conclusion: Using an adaptive latency monitor (EMA > 30ms) to step down the ladder guarantees 30 FPS under all conditions.**
