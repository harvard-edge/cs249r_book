title: The Adaptive Quality Ladder
scenario: Your 30 FPS edge perception pipeline runs fine on open roads but drops to 22 FPS in dense urban intersections (many pedestrians, vehicles, signs). The safety system requires continuous 30 FPS perception without missing frames.
question: What system design maintains 30 FPS across varying scene complexities without changing hardware?
details:
  realistic_solution: Design an adaptive quality ladder — a pre-defined set of operating points with known latency, each trading quality for speed. When the system detects the pipeline latency exceeding the 33.3ms budget, it dynamically steps down the ladder (e.g. lowering NMS confidence or input resolution).
  common_mistake: |
    **The Pitfall:** Suggesting to "just use a faster model" permanently.
    **The Rationale:** Candidates default to static optimization, assuming a single model can be globally optimal for all conditions.
    **The Consequence:** The system either misses deadlines in complex scenes or sacrifices critical accuracy during simple open-road driving.
  napkin_math: |
    **Assumptions & Constraints:**
    - 30 FPS target = 33.3ms latency budget.
    - Open roads: 27ms total (meets budget).
    - Dense intersection: 45ms total (misses budget).

    **Calculations:**
    - Rung 0 (Full quality): 45ms.
    - Rung 1 (Reduced res): 18ms + 5ms NMS = 23ms (meets budget).
    - Rung 2 (Smallest model): 12ms + 2ms NMS = 14ms (meets budget).

    **Conclusion & Interpretation:**
    - **Result: 30 FPS guaranteed (Latency-Bound Mitigation)**. An adaptive latency monitor stepping down the quality ladder guarantees 30 FPS.
