title: Edge TPU Model Rollout Strategy with A/B Testing
scenario: You are responsible for deploying and updating a critical ML model (INT8 quantized) across a
  fleet of 10,000 smart cameras, each equipped with a Google Coral Edge TPU (4 TOPS INT8, 2W power consumption,
  INT8 only). A new version of the model, `v2`, has been developed, and your team wants to conduct a canary
  rollout to 1% of the fleet for 48 hours, comparing its performance against the existing `v1` model.
  The cameras are often offline or have intermittent connectivity. Design an implementable strategy for
  this canary rollout, ensuring safe deployment, effective A/B comparison, and a robust rollback mechanism.
details:
  realistic_solution: 'A realistic solution would involve a hierarchical approach:

    1.  **Device-Side Agent**: Each Coral Edge TPU device runs a lightweight agent capable of downloading
    new model versions, switching between active models (v1 and v2), collecting predefined telemetry (e.g.,
    inference latency, confidence scores, energy consumption using on-device sensors if available, and
    specific business metrics) locally, and caching data.

    2.  **Phased Rollout Orchestration**: A central fleet management system pushes new model configurations
    (e.g., ''deploy v2 to 1% of devices in region X for canary'') in batches. Devices check in periodically
    or on event triggers.

    3.  **A/B Telemetry**: The agent collects comparison metrics from both v1 (control) and v2 (canary)
    during the test period, perhaps running both models on the same input data or routing a percentage
    of traffic to v2 while v1 handles the rest. This telemetry is aggregated locally and sent in compressed
    batches when connectivity allows.

    4.  **Rollback Mechanism**: The agent maintains a safe fallback to `v1`. If critical health metrics
    or A/B comparison metrics from `v2` fall below thresholds, the central system triggers an automatic
    rollback command to the affected devices, or the device agent itself can initiate a local rollback
    if predefined local criteria are met (e.g., `v2` crashing repeatedly).

    5.  **Traffic Splitting**: On-device logic to route a percentage of inference requests to `v1` and
    `v2` (if both are loaded) or based on device IDs for sequential A/B testing.

    6.  **Energy Efficiency**: Ensure the agent and A/B testing framework are designed to be extremely
    power-efficient, potentially suspending telemetry collection or model execution during low-power states
    or when battery is critical.'
  common_mistake: Underestimating the challenges of disconnected operations, limited device resources
    for concurrent model execution (v1 and v2 for comparison), and the complexity of orchestrating rollbacks
    without a persistent, high-bandwidth connection to every edge device. Another common mistake is not
    defining clear, measurable success metrics for the A/B test that can be reliably collected and transmitted
    from edge devices, leading to inconclusive results.
  napkin_math: '*   **Data Transfer for Model Update**: If `v2` is 5MB, updating 1% (100 devices) requires
    100 * 5MB = 500MB of data transfer. Over intermittent network, this needs robust resume capabilities.

    *   **Telemetry Bandwidth**: If each device sends 1KB of telemetry every hour during the 48-hour canary,
    100 devices * 1KB/hour * 48 hours = 4.8MB total telemetry. This is manageable but adds up for larger
    fleets/longer tests.

    *   **Latency Impact**: Running two INT8 models concurrently on a single Coral Edge TPU (if doing
    true A/B on same input) would essentially halve the effective TOPS available for each model, potentially
    doubling inference latency. If Coral can do 4 TOPS, then running two models might bring it down to
    2 TOPS per model, potentially violating real-time constraints. This suggests sequential A/B (splitting
    traffic by device or time) might be more practical than concurrent execution on a single TPU.

    *   **Statistical Significance**: For an A/B test over 100 devices, calculate the minimum detectable
    effect (MDE) and required sample size based on expected baseline conversion rate and desired statistical
    power. For example, if baseline error rate is 5% and we want to detect a 0.5% improvement with 80%
    power, the number of inferences or events needed will be significant. A rough formula for sample size
    per group (for proportions): `n = (Z_alpha/2 + Z_beta)^2 * (p1*(1-p1) + p2*(1-p2)) / (p1-p2)^2`. This
    implies collecting sufficient events over the 48 hours.'
