title: Latency Decomposition for Real-time Inference on NVIDIA Jetson Orin
scenario: You are deploying a real-time object detection model on an NVIDIA Jetson Orin (275 TOPS INT8). The end-to-end latency requirement is 100ms from camera input to actionable output.
question: How would you decompose Jetson Orin's 100 ms object-detection latency budget into acquisition, preprocessing, inference, postprocessing, and output?
details:
  realistic_solution: "Implement detailed profiling at each stage: 1. Input Acquisition (DMA transfer). 2. Preprocessing (image decoding/resizing). 3. Model Inference (TensorRT INT8). 4. Postprocessing (NMS). 5. Output Transmission. Build a dashboard to visualize these latencies and iteratively optimize the slowest components."
  common_mistake: |
    **The Pitfall:** Focusing solely on model inference time and ignoring end-to-end system overhead.
    **The Rationale:** Candidates assume that raw NPU TOPS guarantees real-time performance.
    **The Consequence:** The system wildly misses the 100ms SLA because data transfer, CPU-bound image resizing, and NMS consume the majority of the time.
  napkin_math: |
    - Total budget: 100ms.
    - Model compute cost: 5 TOPS.
    - Hardware capacity: 275 TOPS.
    - Theoretical inference: (5 / 275) * 1000ms = 18ms.
    - Measured latency breakdown: 20ms (prep) + 50ms (inference + mem overhead) + 15ms (post) + 15ms (IO) = **100ms**.
