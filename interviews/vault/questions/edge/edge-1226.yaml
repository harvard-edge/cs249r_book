title: Thermal Throttling and Task Shedding on Orin
scenario: 'An autonomous drone uses an NVIDIA Jetson Orin running a primary navigation model and an auxiliary anomaly detection model. Under normal conditions, the system draws 55W (10W static, 32W dynamic navigation, 13W dynamic anomaly). When ambient temperatures spike, the system caps power to 45W. Baseline navigation inference takes 20ms, with a strict 25ms control loop deadline.'
question: 'Why should the drone completely shed the DLA anomaly model instead of proportionally downscaling frequencies for both workloads under the 45W cap?'
details:
  realistic_solution: 'The correct analysis demonstrates that proportional downscaling pushes the critical navigation model past its real-time deadline, resulting in a crash. To maintain fail-operational status for flight control, quality-of-service shedding is required. By shedding the non-critical DLA workload entirely, the system frees enough power to run the GPU at full speed, satisfying both the thermal power cap and the strict real-time latency requirement.'
  common_mistake: |
    **The Pitfall:** Assuming that power scales linearly with frequency and that reducing frequency is perfectly safe.
    **The Rationale:** Candidates believe proportional downscaling allows "fair sharing" of a reduced power budget.
    **The Consequence:** They fail to calculate the impact of reduced frequency on critical-path latency, causing the navigation model to miss its deadline and crash the drone.
  napkin_math: |
    * Original power = 55W (10W static + 45W dynamic). New budget = 45W.
    * Available dynamic power = 35W.
    * Proportional scaling: Navigation gets 35W × (32W/45W) = 24.89W.
    * Frequency ratio = 24.89W / 32W = 0.778.
    * New navigation latency = 20ms / 0.778 = 25.7ms (Exceeds 25ms deadline - CRASH).
    * Load shedding: Navigation gets full 32W + 10W static = 42W.
    * **Conclusion: Shedding the anomaly model consumes 42W (safely under 45W) and preserves the critical 20ms latency.**
