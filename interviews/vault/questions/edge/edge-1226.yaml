title: 'Thermal Throttling and Task Shedding on Orin'
scenario: 'An autonomous drone uses an edge SoC running a primary navigation model and an auxiliary anomaly model. Under normal conditions, the system draws 55W. When ambient temperatures spike, the system caps power to 45W. Baseline navigation takes 20ms with a strict 25ms control loop deadline.'
question: 'Why should the drone completely shed the auxiliary model instead of proportionally downscaling frequencies for both workloads under the 45W cap?'
details:
  realistic_solution: 'Proportional downscaling pushes the critical navigation model past its real-time deadline, causing catastrophic failure. To maintain fail-operational status, quality-of-service shedding is required. Shedding the non-critical workload frees enough power to run the GPU at full speed, satisfying the thermal cap and the strict real-time SLA.'
  common_mistake: |
    **The Pitfall:** Assuming power scales linearly with frequency and that reducing frequency is perfectly safe.
    **The Rationale:** Candidates believe proportional downscaling allows "fair sharing" of a reduced power budget.
    **The Consequence:** They fail to calculate the impact of reduced frequency on critical-path latency, causing the navigation model to miss its deadline and crash the drone.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original power: 55W (10W static, 32W nav, 13W anomaly). Thermal cap: 45W.
    - Navigation deadline: 25ms. Baseline latency: 20ms.

    **Calculations:**
    - Available dynamic power = 45W - 10W = 35W.
    - Proportional scaling: Nav gets 35W * (32W/45W) = 24.89W.
    - Frequency ratio = 24.89W / 32W = 0.778.
    - New nav latency = 20ms / 0.778 = 25.7ms (Exceeds 25ms deadline - CRASH).
    - Load shedding: Nav gets full 32W + 10W static = 42W.

    **Conclusion & Interpretation:**
    - **Result: 42W (Thermal-Bound)**. Shedding the anomaly model consumes 42W (safely under 45W) and preserves the critical 20ms latency.
