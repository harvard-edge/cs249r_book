title: Analyzing RAG Feasibility on Jetson Orin for On-Device Retrieval
scenario: A robotics team wants to deploy a RAG pipeline on Jetson Orin (32GB LPDDR5, 275 TOPS, 60W) for
  on-device document retrieval. The corpus is 50,000 technical manuals, each averaging 2000 tokens. A
  384-dim embedding model produces vectors at 200 vectors/second on Orin. FAISS HNSW search on 50K vectors
  takes 8ms. The LLM is a quantized 3B model running at 12 tok/s. Analyze whether on-device RAG is feasible
  under a 3-second response budget.
question: "Is on-device RAG over 50,000 manuals feasible on Jetson Orin under a 3-second response budget, and what bottleneck dominates?"
details:
  realistic_solution: 'Memory analysis: FAISS index 76.8MB + 3B model weights (INT8: 3GB) + KV cache (1024
    tokens * 2*28layers*64dim*2bytes = 7.3MB) = ~3.1GB total. Well within 32GB. Latency: query embed (1/200s=5ms)
    + FAISS search (8ms) + context prep (5ms) + LLM generate 200 tokens (200/12=16.7s). LLM generation
    dominates at 16.7s — far exceeds 3s budget. Solution: limit generation to 36 tokens max (3s), use
    retrieval results directly for structured responses, or upgrade to INT4 (24 tok/s → 8.3s for 200 tokens).'
  common_mistake: Focusing only on LLM inference speed and ignoring embedding index memory footprint.
    50K documents * 384 floats * 4 bytes = 76.8MB for the index — manageable, but teams forget the LPDDR5
    bandwidth bottleneck when LLM and FAISS compete for memory.
  napkin_math: 'FAISS index: 50,000 * 384 * 4 bytes = 76.8MB. 3B INT8 model: 3GB. LPDDR5 bandwidth: 68.3GB/s.
    Retrieval pipeline: 5ms + 8ms + 5ms = 18ms. LLM at 12 tok/s: 200 tokens / 12 = 16.7s. INT4 quantization
    doubles throughput: 24 tok/s → 8.3s. To fit 3s: 3s * 24 tok/s = 72 tokens max output. Feasible for
    short answers, not for detailed explanations.'
