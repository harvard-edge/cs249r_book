title: 'MLOps Lifecycle: Compare A/B Testing at Edge vs. Cloud for Model Updates'
scenario: >-
  A computer vision team needs to A/B test two object detection models (v1: YOLOv8-n, v2: YOLOv8-s) on a fleet of 1000 Jetson Orin devices.
question: Which A/B testing strategy (edge-side deployment or cloud-side streaming) is more viable for 1000 Jetson Orin devices, considering bandwidth and operational costs?
details:
  realistic_solution: 'Edge-side A/B testing is significantly more viable. Cloud-side A/B testing requires streaming live video from 1000 devices to the cloud, consuming massive bandwidth. Edge-side A/B testing only requires deploying the two model versions to the devices, performing inference locally, and sending lightweight telemetry (e.g., bounding boxes, confidence scores) back to the cloud for statistical comparison.'
  common_mistake: |
    **The Pitfall:** Choosing cloud-side A/B testing for easier orchestration.
    **The Rationale:** Cloud engineers often prefer routing traffic in the cloud rather than managing localized deployments on edge nodes.
    **The Consequence:** They fail to quantify the catastrophic bandwidth cost of streaming raw camera frames (at 30fps, 1080p) continuously to the cloud.
  napkin_math: |
    1. **Cloud-side bandwidth:** 1000 devices * 30 fps * 1080p (compressed ~100 KB/frame).
    2. `1000 * 30 * 100 KB = 3,000,000 KB/s = 3 GB/s` continuous uplink.
    3. Over a month: `3 GB/s * 86400 seconds * 30 days = 7,776,000 GB ≈ 7.7 PB`.
    4. **Edge-side bandwidth:** 1000 devices sending ~1 KB telemetry per detection.
    5. **Result:** Cloud-side streaming generates **~7.7 PB per month**, which is prohibitively expensive compared to negligible edge telemetry.
