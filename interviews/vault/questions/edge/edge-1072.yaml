title: 'MLOps Lifecycle: Compare A/B Testing at Edge vs. Cloud for Model Updates'
scenario: 'A computer vision team needs to A/B test two object detection models (v1:
  YOLOv8-n, v2: YOLOv8-s) on a fleet of 1000 Jetson Orin devices. Compare: (A) edge-side
  A/B (500 devices run v1, 500 run v2) vs. (B) cloud-side A/B (all devices send frames
  to cloud, cloud routes 50/50). Evaluate latency, bandwidth, statistical power timeline,
  and operational complexity.'
question: 'Which A/B testing strategy (edge-side or cloud-side) is more viable for 1000 Jetson Orin devices, considering bandwidth and operational costs?'
details:
  realistic_solution: 'Edge-side A/B testing is significantly more viable. Cloud-side A/B testing requires streaming live video from 1000 devices to the cloud, consuming massive bandwidth and increasing inference latency. Edge-side A/B testing only requires deploying the two model versions to the devices, performing inference locally, and sending lightweight telemetry (e.g., bounding boxes, confidence scores) back to the cloud for statistical comparison.'
  common_mistake: 'Choosing cloud-side A/B for easier orchestration without quantifying
    the bandwidth cost of streaming camera frames to cloud (at 30fps, 1080p) vs. edge
    inference.'
  napkin_math: 'Cloud-side bandwidth: 1000 devices * 30 fps * 1080p (compressed ~100KB/frame) = 1000 * 30 * 100KB = 3 GB/s continuous uplink. Over a month: 3 GB/s * 86400 * 30 = ~7.7 PB. At $0.05/GB egress, this is prohibitively expensive. Edge-side bandwidth: 1000 devices * 100 detections/hr * 1KB/detection = negligible telemetry data.'
