title: Thermal Throttling Frame Drops
scenario: An autonomous drone runs an obstacle avoidance pipeline on a Jetson Orin targeting a strict 30 FPS frame budget (33.3ms). During normal operation, the INT8 model requires 5 Tera-Operations per frame and completes in 25ms. However, when operating in a hot environment, the system hits its 60W TDP limit and the OS dynamically halves the system clock speeds to prevent overheating. The pipeline latency suddenly spikes to 50ms, missing the real-time deadline.
question: "Why does the drone pipeline miss its 33.3ms deadline after clocks are halved, even though throttled TOPS still exceed the workload?"
details:
  realistic_solution: Latency is bounded by the sequential execution speed of the model's critical path and memory bandwidth, not total parallel throughput capacity. Halving the clock frequency linearly doubles the time required for both sequential compute instructions and memory fetches. Even though the hardware has excess TOPS, the layers execute serially at reduced speeds, pushing latency past the deadline.
  common_mistake: |
    **The Pitfall:** Assuming that throttled compute capacity exceeding the required workload means latency remains unaffected.
    **The Rationale:** Candidates confuse maximum theoretical throughput with sequential execution speed, failing to realize that batch-1 edge inference cannot utilize the entire GPU simultaneously.
    **The Consequence:** The autonomous drone drops frames and fails to avoid obstacles because the real-time sequential deadline is missed.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Normal latency: 20 ms compute + 5 ms memory = 25 ms.
       - Budget: 33.33 ms (30 FPS).
       - Throttling: Clock speed reduced by 50%.
    2. **Calculations:**
       - Throttled compute time = 20 ms / 0.5 = 40 ms.
       - Throttled memory time = 5 ms / 0.5 = 10 ms.
       - Total latency = 40 ms + 10 ms = 50 ms.
       - 50 ms > 33.33 ms budget.
    3. **Conclusion & Interpretation:**
       - **Result: 50 ms latency** (Sequential Compute-Bound, deadline missed).
