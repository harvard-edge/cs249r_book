title: 'Edge Systolic Array Design: Hailo-8 Dataflow for Video Analytics'
scenario: 'You must run 3 computer vision models on a single dataflow accelerator (26 TOPS INT8): face detection (0.5 GOPS, 60 FPS), license plate OCR (2 GOPS, 10 FPS), and crowd counting (1.5 GOPS, 5 FPS).'
question: What TDM schedule should the accelerator use for the three vision models, and what latency does each model see?
details:
  realistic_solution: 'Hailo-8 TDM: run each model in round-robin time slices. Total GOPS budget: 26,000 GOPS. Load: 57.5 GOPS = 0.22% utilization. Huge headroom. Face detection: 0.5 GOPS * 60 FPS = 30 GOPS/s. Time per inference: 0.5G/26000G = 19.2µs. At 60 FPS: budget 16.7ms. Schedule: run face every 16.7ms (takes 19.2µs). OCR: 2G/26000G = 76.9µs per inference. Budget 100ms (10 FPS). Crowd: 1.5G/26000G = 57.7µs per inference. Budget 200ms (5 FPS). TDM schedule per 200ms: face ×12 (12*19.2µs=230µs), OCR ×2 (2*76.9µs=154µs), crowd ×1 (57.7µs). Total: 442µs / 200ms = 0.22% duty cycle. All constraints met with 99.8% idle time!'
  common_mistake: |
    **The Pitfall:** Attempting to run all three models concurrently in spatial parallel.
    **The Rationale:** Candidates apply GPU stream logic (parallel execution) to a spatial dataflow architecture that only supports one compiled graph at a time.
    **The Consequence:** Architecture failure, as dataflow accelerators require sequential Time-Division Multiplexing (TDM) to swap compiled contexts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Budget: 26,000 GOPS (26 TOPS). Load: 57.5 GOPS.
    2. **Calculations:**
       - Face detection latency: 0.5G / 26,000G = 19.2 µs.
       - OCR latency: 2.0G / 26,000G = 76.9 µs.
       - Crowd counting latency: 1.5G / 26,000G = 57.7 µs.
       - Total compute time per second: (60 * 19.2) + (10 * 76.9) + (5 * 57.7) = 2,210 µs = ~2.2 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 0.22% Duty Cycle.** The models execute sequentially in microseconds, leaving the accelerator idle 99.8% of the time while effortlessly meeting all real-time deadlines.
