title: The INT8 Energy Dividend (edge-0298)
scenario: Your team is optimizing an object detection model for a new ADAS (Advanced Driver-Assistance
  System) platform. To meet the strict 30W thermal budget, you're converting the model's FP16 weights
  and activations to INT8. From a pure hardware physics perspective, approximately how much more energy-efficient
  is a single INT8 arithmetic operation compared to a single FP16 operation?
details:
  realistic_solution: An INT8 operation is approximately 5x more energy-efficient than an FP16 operation.
    This is derived from the fundamental energy costs of computation. An FP32 operation costs ~18x the
    energy of an INT8 op, while an FP16 op costs ~3.4x the energy of an FP32 op. The ratio gives us the
    direct comparison between FP16 and INT8.
  common_mistake: Engineers often conflate memory savings with energy savings. They see that INT8 uses
    half the bits of FP16 and incorrectly assume the energy savings are also only 2x. This ignores the
    non-linear relationship between bit width and the energy required for computation (i.e., CMOS switching
    energy in the ALU).
  napkin_math: 'Energy costs based on physical invariants: An FP16 MAC operation consumes roughly 5.3
    picojoules (pJ). An INT8 MAC operation consumes roughly 1.0 pJ. Ratio = 5.3 pJ / 1.0 pJ = 5.3x. By
    converting weights and activations to INT8, the multiply-accumulate operations become ~5.3x more energy-efficient,
    directly helping the system stay within its strict 30W thermal budget.'
  options:
  - ~2x more efficient
  - ~18x more efficient
  - ~5x more efficient
  - The efficiency is roughly the same
  correct_index: 2
