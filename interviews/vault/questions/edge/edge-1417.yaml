title: Data Selection Bias in High-Throughput Edge Inference
scenario: A team deploys an object detection model on a Hailo-8 accelerator for a 60 FPS industrial inspection camera. To reduce annotation costs, the dataset curation strategy sampled 1 frame every 0.5 seconds (2 FPS), capturing mostly clear, sharp images. The deployed model requires 0.25 TOPS per inference. In production, the model's accuracy degrades significantly during high-speed operations.
question: Why did sampling only 2 FPS for curation cause the 60 FPS Hailo-8 deployment to fail despite strong validation metrics?
details:
  realistic_solution: The accelerator's vast compute capacity allows it to process the live 60 FPS stream synchronously. However, the curation strategy created a severe data distribution shift. By aggressively downsampling the training data to 2 FPS, the curation pipeline inherently filtered out transient high-speed motion blur, occlusions, and rolling shutter artifacts present in the raw 60 FPS feed. The NPU processes 100% of these artifacts in production, forcing the model to constantly evaluate out-of-distribution data that it was never trained to recognize.
  common_mistake: |
    **The Pitfall:** Assuming time-based random downsampling creates an unbiased representative dataset for high-throughput video.
    **The Rationale:** Candidates blame INT8 quantization, thermal throttling, or host-streaming latency, ignoring the physical relationship between sensor frame rate, motion dynamics, and the training distribution.
    **The Consequence:** Teams waste months debugging hardware or quantization algorithms when the root cause is a fundamental dataset bias toward static, non-blurry frames.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hailo-8 Compute: 26 TOPS.
       - Model requirement: 0.25 TOPS/frame.
       - Camera feed: 60 FPS.
       - Curation sampling: 2 FPS.
    2. **Calculations:**
       - Theoretical max NPU throughput = 26 TOPS / 0.25 TOPS/frame = 104 FPS.
       - NPU processes 100% of the live feed because 104 FPS > 60 FPS.
       - Dataset representation ratio = 2 FPS / 60 FPS = 3.33%.
       - Unseen production data ratio = 100% - 3.33% = 96.67%.
    3. **Conclusion & Interpretation:**
       - **Result: 96.67% of production frames are potentially out-of-distribution (containing high-speed motion artifacts). The system is Data-Distribution-Bound, failing due to curation bias.**
