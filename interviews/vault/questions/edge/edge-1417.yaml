title: Data Selection Bias in High-Throughput Edge Inference
scenario: A team deploys an object detection model on a Hailo-8 accelerator (26 TOPS INT8, 2.5W, streams from host memory) for a 60 FPS industrial inspection camera. To reduce annotation costs, the dataset curation strategy sampled 1 frame every 0.5 seconds (2 FPS), capturing mostly clear, sharp images. The deployed model requires 0.25 TOPS per inference. In production, the model's accuracy degrades significantly during high-speed operations, despite excellent validation metrics.
question: Why did sampling only 2 FPS for curation cause the 60 FPS Hailo-8 deployment to fail despite strong validation metrics?
details:
  realistic_solution: The candidate should calculate that the Hailo-8 has enough compute to process the full 60 FPS stream in real-time. Because the curated dataset only contained sparse, sharp frames, it lacked representation of the motion-blurred frames present in the high-speed live stream. The hardware's ability to evaluate every single frame means it constantly encounters out-of-distribution blurry images, explaining the behavioral discrepancy.
  common_mistake: |
    **The Pitfall:** Blaming the INT8 quantization or host memory streaming latency for the accuracy drop.
    **The Rationale:** Candidates default to blaming hardware constraints rather than analyzing the relationship between hardware throughput and dataset sampling frequency.
    **The Consequence:** The team wastes time optimizing hardware or quantization instead of fixing the critical dataset bias regarding motion blur.
  napkin_math: |
    1. Calculate maximum theoretical throughput: 26 TOPS / 0.25 TOPS/frame = 104 FPS.
    2. Compare throughput to camera feed: Since 104 FPS > 60 FPS, the accelerator processes 100% of the live camera frames.
    3. Calculate dataset representation: 2 FPS annotated / 60 FPS live = 3.33%.
    4. Calculate out-of-distribution exposure: 100% - 3.33% = 96.67%.
    **96.67% of the production data evaluated by the hardware contains motion characteristics (like blur) not present in the curated dataset, causing the failure.**
