title: Memory-Efficient LLM Fine-tuning on NVIDIA Jetson Orin
scenario: You are tasked with deploying a large language model (LLM) for a fine-tuning workload on an NVIDIA Jetson Orin (32 GB LPDDR5, 200 TOPS INT8, 40W). During initial testing, you encounter Out-of-Memory (OOM) errors. The model uses FP16 weights, and its static memory footprint is estimated at 20 GB. Each input sample requires approximately 0.5 GB of activation memory during the forward pass. You also estimate 2 GB of memory overhead for the operating system.
question: How would you avoid OOM during Jetson Orin fine-tuning, what is the max micro-batch size, and how does gradient accumulation set effective batch?
details:
  realistic_solution: The primary strategy for memory management in this scenario is gradient accumulation. This technique involves processing data in smaller 'micro-batches' that fit into memory, computing their gradients, and accumulating these gradients over several steps before performing a single weight update. This effectively allows for a much larger 'logical' or 'effective' batch size without increasing the peak memory usage for activations. Other complementary solutions include activation checkpointing, dynamic batch sizing, and judicious CPU offloading for less performance-critical tensors.
  common_mistake: |
    **The Pitfall:** Underestimating the combined memory footprint of activations and optimizer states.
    **The Rationale:** Candidates focus solely on the model parameter size and overlook the massive dynamic memory required during backpropagation.
    **The Consequence:** OOM errors crash the fine-tuning workload on resource-constrained edge devices.
  napkin_math: |
    * Total RAM: 32 GB
    * Fixed overhead: 20 GB (static model) + 2 GB (OS) = 22 GB
    * Available for dynamic tensors: 32 GB - 22 GB = 10 GB
    * Dynamic memory per sample: 0.5 GB (activations) + 0.5 GB (gradients) = 1.0 GB
    * Maximum Micro-Batch Size: 10 GB / 1.0 GB/sample = 10 samples
    * **Effective Batch Size = 10 * N_accumulation_steps.**
