title: UAV Thermal Pipeline Scheduling
scenario: A UAV capped at 20W system power runs a pipeline on an SoC (10W max) and two PCIe dataflow accelerators (2.5W max each). Base system power is 3W.
question: Create a pipeline execution schedule that maximizes throughput while enforcing a thermal sync barrier to stay under 20W.
details:
  realistic_solution: 'Time-multiplex the pipeline to prevent concurrent max power. Phase A: Accelerators compute (5W) while SoC idles on a PCIe barrier (3W). Phase B: SoC computes (10W) while Accelerators idle (1W). Peak power alternates between 11W and 14W, staying safely under 20W. This enforces a 50% duty cycle on the pipeline execution.'
  common_mistake: |
    **The Pitfall:** Designing a standard continuous pipeline that assumes all chips compute simultaneously.
    **The Rationale:** Candidates focus only on maximizing throughput via parallel execution and forget to sum the peak power draw of all active components.
    **The Consequence:** The system risks drawing 18W+, easily exceeding the 20W cap during transient power spikes, leading to brownouts or catastrophic crashes mid-flight.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Max power limits: SoC=10W, Accelerators=2.5W (x2). Base=3W.
       * Strict 20W total system cap.
    2. **Calculations:**
       * Concurrent execution power = 10W (SoC) + 2 * 2.5W (Accel) + 3W (Base) = 18W.
       * Multiplexed execution max power = max(10W + 1W idle + 3W, 5W + 3W idle + 3W) = 14W.
    3. **Conclusion & Interpretation:**
       * **Time-multiplexing the pipeline safely caps peak power at 14W, avoiding the 18W concurrent draw which risks transient spike brownouts. Result: Peak Power-Bound.**
