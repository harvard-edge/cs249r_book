title: UAV Thermal Pipeline Scheduling
scenario: A UAV capped at 20W system power runs a pipeline on a Jetson Orin Nano (10W max) and 2 Hailo-8s (2.5W max each) connected via PCIe. Base system power is 3W.
question: Create a pipeline execution schedule that maximizes throughput while enforcing a thermal sync barrier to stay under 20W.
details:
  realistic_solution: 'Time-multiplex the pipeline to prevent concurrent max power. Phase A: Hailo-8s compute (5W) while Orin idles on a PCIe barrier (3W). Phase B: Orin computes (10W) while Hailo-8s idle (1W). Peak power alternates between 11W and 14W, staying safely under 20W. This enforces a 50% duty cycle on the pipeline execution.'
  common_mistake: |
    **The Pitfall:** Designing a standard continuous pipeline that assumes all chips compute simultaneously.
    **The Rationale:** Candidates focus only on maximizing throughput via parallel execution and forget to sum the peak power draw of all components.
    **The Consequence:** The system risks drawing 18W+, easily exceeding the 20W cap during transient power spikes, leading to brownouts or crashes.
  napkin_math: |
    *   Concurrent execution power: 10W (Orin) + 2 * 2.5W (Hailo-8s) + 3W (Base) = 18W.
    *   18W is too close to the 20W cap and risks transient spikes exceeding the limit.
    *   Multiplexed execution max power = max(10W + 1W idle + 3W, 5W + 3W idle + 3W) = 14W.
    *   **Time-multiplexing the pipeline safely limits peak power to 14W.**
