title: UAV Thermal Pipeline Scheduling
scenario: A UAV capped at 20W system power runs a pipeline on a Jetson Orin Nano (10W
  max) and 2 Hailo-8s (2.5W max each) connected via PCIe. Base system power is 3W.
question: Create a pipeline execution schedule that maximizes throughput while enforcing
  a thermal sync barrier to stay under 20W.
details:
  realistic_solution: 'Time-multiplex the pipeline to prevent concurrent max power.
    Phase A: Hailo-8s compute (5W) while Orin idles on a PCIe barrier (3W). Phase
    B: Orin computes (10W) while Hailo-8s idle (1W). Peak power alternates between
    11W and 14W, staying safely under 20W. This enforces a 50% duty cycle on the pipeline
    execution.'
  common_mistake: Designing a standard continuous pipeline that assumes all chips
    compute simultaneously, which would draw 3W + 10W + 5W = 18W, risking power spikes
    over 20W.
  napkin_math: Concurrent max = 10W + 2*2.5W + 3W = 18W (too close to 20W). Multiplexed
    max = max(10+1+3, 5+3) = 14W limit.
