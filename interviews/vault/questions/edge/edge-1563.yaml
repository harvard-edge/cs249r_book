title: On-Device Coreset Capacity Calculation
scenario: We are deploying a few-shot anomaly detection system on a Qualcomm Cloud AI 100 on-premise inference accelerator. The INT8 quantized base model and system overhead consume a combined 20 GB of memory. To recognize new defect types without full retraining, we maintain a pruned coreset of synthetic reference embeddings directly in memory.
question: If each embedding is a 4096-dimensional FP16 vector, how many coreset embeddings fit in the remaining Cloud AI 100 memory?
details:
  realistic_solution: The correct approach involves calculating the available memory on the device and dividing it by the memory footprint of a single synthetic reference embedding. This determines the upper bound for the coreset size that can be maintained for real-time inference without causing Out-Of-Memory (OOM) errors.
  common_mistake: |
    **The Pitfall:** Miscalculating the byte size of FP16 vectors or incorrectly converting between Gigabytes and Kilobytes.
    **The Rationale:** Candidates forget that FP16 requires 2 bytes per dimension, or they use 1000 instead of 1024 for binary memory capacity.
    **The Consequence:** Allocating too large a coreset, triggering immediate Out-Of-Memory (OOM) errors during real-time inference.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Total LPDDR4x capacity: 32 GiB.
       * OS + Model footprint: 20 GiB.
       * Embedding dimensions: 4096.
       * Precision: FP16 (2 bytes per dimension).
    2. **Calculations:**
       * Remaining Memory: 32 GiB - 20 GiB = 12 GiB.
       * Convert to bytes: 12 * 1024^3 = 12,884,901,888 bytes.
       * Single Embedding Size: 4096 * 2 bytes = 8,192 bytes.
       * Max Coreset Samples: 12,884,901,888 / 8,192 = 1,572,864 samples.
    3. **Conclusion & Interpretation:**
       **Result: 1,572,864 samples**. The available memory securely holds over 1.5 million reference embeddings before inducing an OOM fault.
