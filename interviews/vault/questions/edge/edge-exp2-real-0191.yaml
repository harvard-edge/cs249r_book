title: Sizing Dynamic Batching for LLM Prefill on Edge
scenario: You are deploying an 8B parameter LLM (INT8) for a real-time smart factory monitoring application
  on an on-premise Qualcomm Cloud AI 100 accelerator. The SLA strictly mandates a P99 Time-To-First-Token
  (TTFT) of under 200ms. Incoming alerts have an average prompt length of 500 tokens. The chip provides
  400 TOPS INT8 and has 32 GB of LPDDR4x memory within a 75W envelope. Evaluate whether the system is
  compute-bound or memory-bound for the prefill phase, and determine the maximum batch size to guarantee
  the latency SLA using dynamic batching.
question: "Is the Cloud AI 100 compute-bound or memory-bound during prefill, and what dynamic-batching limit meets the 200ms TTFT SLA?"
details:
  realistic_solution: The candidate must calculate the compute latency for the prefill phase and use it
    to constrain the maximum batch size. Given the 200ms TTFT requirement, the batch size must be strictly
    limited by the accelerator's effective compute throughput rather than its memory capacity. To maintain
    latency, the system should employ dynamic batching capped at a maximum token threshold per forward
    pass.
  common_mistake: Candidates often assume the bottleneck on edge devices is solely memory capacity and
    attempt to maximize the batch size up to the 32 GB limit for KV cache. They fail to calculate the
    prefill compute latency, which will violate the strict 200ms TTFT constraint long before memory runs
    out.
  napkin_math: 'Compute capability: 400 TOPS INT8. Assume ~50% utilization = 200 effective TOPS. SLA:
    Max 200ms TTFT. Max operations allowed in 200ms = 200 TOPS * 0.2s = 40 TeraOPs. Prefill compute per
    token: ~2 * 8B parameters = 16 GigaOPs. Max tokens processed within SLA = 40 TeraOPs / 16 GigaOPs
    = 2500 tokens. For 500-token prompts, max prefill batch size = 2500 / 500 = 5. Memory check: 8 GB
    model + KV cache is well under the 32 GB limit. The system is strictly compute-bound for latency,
    dictating a max batch size of 5.'
