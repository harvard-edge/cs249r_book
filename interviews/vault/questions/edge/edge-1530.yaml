title: Evaluating Drift Detection on On-Premise Accelerators
scenario: You are deploying a high-throughput defect detection model on a Qualcomm Cloud AI 100 (32 GB LPDDR4x, 400 TOPS INT8, 75W) for an on-premise factory. Due to seasonal lighting changes, you need to detect data drift. You must evaluate two alternatives: (A) Compute Population Stability Index (PSI) continuously on the accelerator using its INT8 engines, or (B) Sample 1% of feature embeddings and offload them to a local host CPU for KL divergence calculation.
question: Which alternative is better and why?
details:
  realistic_solution: Option B is the superior choice. The Qualcomm Cloud AI 100 is designed for maximum throughput inference at 75W, and forcing it to compute floating-point drift statistics will cause significant context switching and pipeline stalls. By offloading just 1% of the lightweight embeddings to the host CPU, you preserve the accelerator's 400 TOPS entirely for the primary inference path while still gathering statistically significant drift signals.
  common_mistake: |
    **The Pitfall:** Computing statistical drift metrics on an INT8 accelerator.
    **The Rationale:** Candidates see "400 TOPS" and assume the accelerator is a general-purpose compute monster that can handle any math operation.
    **The Consequence:** They fail to realize drift metrics require floating-point precision and non-linear aggregations, which execute terribly on specialized INT8 matrix multiplication cores.
  napkin_math: |
    1. **Inference Rate**: 500 FPS. Embedding size = 1 KB.
    2. **Offload Bandwidth (Option B)**: Sampling 1% means 5 embeddings/sec = **5 KB/s** of PCIe bandwidth (negligible).
    3. **Accelerator Overhead (Option A)**: Emulating FP32 for PSI on INT8 ALUs causes massive pipeline stalls.
    4. **Conclusion**: Offloading to the CPU preserves the accelerator's 400 TOPS for the 2ms inference budget, whereas on-chip PSI computation would cripple the 500 FPS target.
