title: Debugging Fallback OOM on Cloud AI 100
scenario: You have deployed an on-premise defect detection system using a Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). To ensure fail-operational reliability, the system uses a degradation ladder: it normally runs a high-accuracy primary model, but under high load, it gracefully degrades to a lightweight fallback model. However, you observe a critical symptom: exactly when the system attempts to degrade and load the fallback model, the accelerator's power spikes to its 75W limit, latencies skyrocket, and the system completely drops video frames for several seconds before recovering.
question: What is the root cause of this failure during the fallback transition?
details:
  realistic_solution: The root cause is severe PCIe paging caused by exceeding the 32 GB LPDDR4x memory capacity during the context switch. When the degradation ladder triggers, the system attempts to allocate memory for the fallback model before the primary model's memory is fully freed. To achieve true fail-operational graceful degradation, the lightweight fallback model must be permanently pinned in the accelerator's memory, or the transition must be orchestrated to release primary model layers sequentially before loading the fallback.
  common_mistake: |
    **The Pitfall:** Failing to account for the transitional memory high-water mark.
    **The Rationale:** Candidates assume the lightweight fallback model is computationally inefficient and overlook that both models momentarily exist in memory simultaneously.
    **The Consequence:** They miss the severe PCIe paging bottleneck that occurs when memory limits are exceeded during the context switch.
  napkin_math: |
    1. Steady state memory: Primary model = 28 GB. Fallback model = 6 GB.
    2. Transition memory requirement = 28 GB + 6 GB = 34 GB.
    3. System capacity = 32 GB LPDDR4x.
    4. **Deficit = 34 GB - 32 GB = 2 GB.**
    5. **This 2 GB deficit forces the accelerator to swap over PCIe, pegging it at its 75W TDP and causing massive throttling.**
