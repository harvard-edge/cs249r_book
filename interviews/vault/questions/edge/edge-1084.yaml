title: 'Model Size Estimation: Analyze Why INT8 Doesn''t Always Halve Edge Inference
  Time'
scenario: A team quantizes a ResNet-50 from FP32 to INT8 for Jetson Orin and expects
  2× speedup. They observe only 1.3× speedup. Analyze the root cause using bandwidth
  and compute bottleneck analysis. The model is 25.6M params, 4.1 GFLOPs.
question: Why does INT8 quantization of ResNet-50 on Jetson Orin yield only 1.3× speedup
  instead of 2×, using compute and bandwidth bottleneck analysis?
details:
  realistic_solution: 'ResNet-50 is compute-bound (not memory-bound) for most layers
    at typical batch sizes. Analysis: FP32 compute at peak GPU: 4.1G FLOPs / (40 TFLOPS
    FP32 Orin GPU) = 0.1ms. INT8: 4.1G INT8 ops / (275 TOPS INT8 Orin NPU/GPU) = 0.015ms.
    6.7× theoretical. But: framework overhead (kernel launch, memory allocation) adds
    3-8ms per inference regardless of dtype. At small batch: overhead dominates. At
    batch=64: FP32 6.4ms, INT8 1ms → 6.4× speedup. At batch=1: FP32 4ms, INT8 3ms
    → 1.3× (overhead-dominated). Conclusion: INT8 benefit visible only at sufficient
    batch sizes.'
  common_mistake: Assuming speedup is purely proportional to dtype size reduction;
    in practice, the bottleneck shifts between compute and memory-bandwidth depending
    on the operation and batch size.
  napkin_math: 'Compute time: FP32 4.1G/(40T)=0.10ms. INT8 4.1G/(275T)=0.015ms. Theoretical:
    6.7×. Measured at batch=1: FP32 4ms, INT8 3ms → 1.33×. Overhead: 4ms-0.1ms=3.9ms
    (kernel launch + memory ops). INT8: 3ms-0.015ms=2.985ms overhead. Overhead dominated.
    At batch=16: FP32 1.6ms overhead+1.6ms compute=3.2ms. INT8: 1.6ms+0.24ms=1.84ms.
    Ratio: 3.2/1.84=1.74×. At batch=64: 6.4ms vs 1ms → 6.4×.'
