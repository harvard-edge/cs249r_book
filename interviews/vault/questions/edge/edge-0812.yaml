title: The DLA-GPU Pipeline Overlap
scenario: 'On a Jetson Orin, you split a detection pipeline: the DLA runs a lightweight backbone (6ms) while the GPU runs post-processing on the previous frame (4ms). The remaining detection head runs on the GPU (10ms). Compare the throughput of this heterogeneous pipeline to running everything sequentially on the GPU (total 18ms). What is the maximum pipeline throughput and what is the new bottleneck?'
question: "What is the maximum pipeline throughput and what is the new bottleneck?"
details:
  realistic_solution: 'Sequential entirely on GPU: 18ms per frame -> 55.5 FPS. Heterogeneous Pipelined: DLA runs the backbone (6ms) concurrently with the GPU. The GPU must execute both post-processing (4ms) and the detection head (10ms) sequentially for each frame, meaning total GPU time per frame is 14ms. In a pipelined setup, throughput is limited by the slowest stage. Pipeline period = max(T_DLA, T_GPU) = max(6, 14) = 14ms. Maximum throughput = 1000 / 14ms ≈ 71.4 FPS. The GPU is the new bottleneck at 14ms.'
  common_mistake: 'Assuming the 4ms and 10ms GPU tasks can run in parallel. Since there is only one GPU, they run sequentially (14ms). Some also incorrectly calculate throughput by summing the pipelined stages (20ms).'
  napkin_math: 'Sequential on GPU: 18ms -> 55.5 FPS. Pipelined: Stage 1 = DLA (6ms). Stage 2 = GPU_post (4ms) + GPU_head (10ms) = 14ms. Pipeline bottleneck = max(6ms, 14ms) = 14ms. Max throughput = 1000 / 14 = 71.4 FPS. Throughput increases from 55.5 FPS to 71.4 FPS (1.28x speedup).'
