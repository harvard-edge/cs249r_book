title: The DLA-GPU Pipeline Overlap
scenario: 'On a Jetson Orin, you split a detection pipeline: the DLA runs a lightweight backbone (6ms)
  while the GPU runs post-processing on the previous frame (4ms). The remaining detection head runs on
  the GPU (10ms). Compare the throughput of this heterogeneous pipeline to running everything sequentially
  on the GPU (total 18ms). What is the maximum pipeline throughput and what is the new bottleneck?'
question: "What is the maximum pipeline throughput and what is the new bottleneck?"
details:
  realistic_solution: 'Sequential: 6 + 4 + 10 = 20ms per frame (adjusted for GPU-only overhead) → 50 FPS.
    Pipelined: Stage A (DLA backbone, 6ms) overlaps with Stage B (GPU post-process of previous frame,
    4ms). Stage B finishes first, so Stage A is the binding parallel stage at 6ms. Then Stage C (GPU detection
    head, 10ms) runs. The pipeline period = max(Stage_A, Stage_B) + Stage_C = max(6,4) + 10 = 16ms → 62.5
    FPS. But more critically, if we restructure so DLA runs during GPU Stage C: pipeline period = max(DLA_next=6,
    GPU_head=10) = 10ms, giving 100 FPS. The GPU detection head (10ms) is the bottleneck.'
  common_mistake: Assuming the pipeline throughput equals the sum of all stages. In a pipelined design,
    throughput is determined by the slowest stage, not the total. Also, candidates forget that DLA and
    GPU can run concurrently on Orin.
  napkin_math: 'Sequential: DLA(6ms) + GPU_post(4ms) + GPU_head(10ms) = 20ms → 50 FPS. Pipelining: Split
    GPU tasks so Stage 1: DLA(6ms) + GPU_post(4ms) → max(6,4)=6ms. Stage 2: GPU_head(10ms). The pipeline
    bottleneck is now 10ms → 100 FPS. Heterogeneous pipelining yields a 2x throughput speedup without
    changing the model.'
