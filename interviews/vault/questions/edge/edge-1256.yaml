title: Adversarial Defense Architecture on Hailo-8 Dataflow Accelerator
scenario: You are designing the perception system for an autonomous delivery robot
  utilizing a Hailo-8 accelerator (26 TOPS INT8, 2.5W, no local DRAM, streaming directly
  from host memory). Security audits reveal the pedestrian detection model is highly
  vulnerable to physical adversarial patches worn on clothing. You must architect
  a real-time defense mechanism (such as input purification, feature squeezing, or
  an ensemble) to mitigate this vulnerability. Evaluate the architectural tradeoffs
  of your defense strategy, specifically accounting for the Hailo-8's dataflow execution
  model and its reliance on host memory streaming.
question: Which real-time adversarial-patch defense would you deploy on the Hailo-8,
  and how would you fit it into its host-streamed dataflow?
details:
  realistic_solution: The best architectural choice is to compile a lightweight input
    purification network (like a shallow autoencoder) and the primary object detector
    into a single, fused dataflow graph using the Hailo compiler. This allows the
    host to stream the image exactly once. The tradeoff is that the combined model
    must fit within the limited on-chip SRAM, potentially forcing a reduction in the
    detector's backbone size, but it guarantees deterministic latency and minimizes
    host-memory bandwidth consumption.
  common_mistake: Candidates often propose multi-step, iterative defenses like test-time
    optimization or complex generative purifiers. They fail to realize that without
    local DRAM on the Hailo-8, iterative or multi-model pipelines require continuous
    round-tripping of large intermediate activation tensors back to the host CPU,
    creating severe PCIe bandwidth bottlenecks and breaking the dataflow paradigm.
  napkin_math: Assume a 1080p RGB input (1920x1080x3 = 6.2MB). A naive two-model pipeline
    (purifier -> host -> detector) requires streaming 6.2MB in, 6.2MB out, and 6.2MB
    in again, totaling 18.6MB per frame. At 30 FPS, this is 558 MB/s of PCIe bandwidth.
    Fusing them into a single dataflow graph requires only the initial 6.2MB input
    (186 MB/s at 30 FPS). Given the Hailo-8's 26 TOPS capacity, a 20 GOPS purifier
    and 50 GOPS detector (70 GOPS total per frame) at 30 FPS require 2.1 TOPS, utilizing
    just ~8% of the total INT8 compute capacity. This proves that memory bandwidth
    and on-chip SRAM, not raw compute, dictate the defense architecture.
