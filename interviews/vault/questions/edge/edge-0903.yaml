title: FPGA DSP Slice Mapping for INT4
scenario: An FPGA-based accelerator for a 2W smart camera needs to run a 15M parameter CNN at 30 FPS. To meet the 1.5 GB/s LPDDR4 bandwidth budget, the model weights are quantized to INT4. After synthesis, the FPGA routing is congested, the clock drops from 300MHz to 120MHz, and power exceeds 3W.
question: Why did INT4 quantization congest routing and spike power, and how would you avoid it?
details:
  realistic_solution: The routing congestion occurs because the FPGA's hardened DSP slices are naturally designed for 8x8 or 18x18 bit arithmetic. Forcing INT4 causes synthesis to build multipliers out of general-purpose LUTs, consuming massive area and power. Store weights in DRAM as INT4, but unpack to INT8 on-the-fly inside the FPGA's BRAM right before computation.
  common_mistake: |
    **The Pitfall:** Assuming FPGA logic naturally maps perfectly to any arbitrary sub-byte bitwidth.
    **The Rationale:** Candidates treat FPGAs as infinitely flexible, forgetting that hardened DSP slices are physically manufactured for specific sizes.
    **The Consequence:** Forcing INT4 causes the synthesizer to build custom multipliers out of general-purpose LUTs, devouring logic area and spiking dynamic power.
  napkin_math: |
    * **Bandwidth at INT8:** 15M weights * 1 byte * 30 FPS = 450 MB/s.
    * **Bandwidth at INT4:** 450 MB/s / 2 = 225 MB/s.
    * **The Fix:** Store weights in DRAM as INT4 to preserve bandwidth, but **unpack to INT8 on-the-fly** inside the FPGA.
    * **Result:** This allows the compute engine to use the highly-efficient hardened INT8 DSP slices, easily dropping power back below the 2W limit.
