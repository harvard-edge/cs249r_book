title: Die-to-Die Power Gating at Edge
scenario: An always-on edge device uses a heterogeneous chiplet with separate ISP and ML inference dies.
  Describe a power gating strategy that minimizes idle power while meeting <10ms wake latency for burst
  inference.
details:
  realistic_solution: 'Use tiered power states: (1) retention mode (1-2mW) — keep SRAM state, gate compute
    logic, wake in <1ms; (2) shallow sleep (0.1mW) — flush SRAM to embedded DRAM, gate die fully, 5-8ms
    wake including DRAM reload; (3) deep sleep (<0.01mW) — gate everything, 50ms+ wake. Keep ML die in
    retention mode during inter-burst gaps <1s, drop to shallow sleep for >1s gaps.'
  common_mistake: Power gating the entire ML die during idle periods to save power, then paying full cold-start
    latency (~50-100ms) on each activation. This violates the <10ms latency requirement for interactive
    use cases.
  napkin_math: 'ML chiplet active: 8W. Retention mode: 2mW. For duty cycle of 10% active: Average power
    = 0.1×8W + 0.9×0.002W = 0.8 + 0.0018 ≈ 0.8W total — 10x reduction from always-on. Wake from retention:
    <1ms satisfies 10ms SLA with 9ms margin.'
