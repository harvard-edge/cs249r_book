title: Diagnosing Data Starvation on Jetson Orin
scenario: We are deploying a multi-camera computer vision system on an NVIDIA Jetson Orin with 32 GB LPDDR5 memory and an Ampere GPU + DLA accelerator. The system processes 8 concurrent 1080p video streams, but despite the 275 TOPS INT8 compute capability, the overall pipeline throughput is maxing out at 60 FPS total across all streams with the GPU utilization sitting around 30%.
question: What is causing this throughput bottleneck, and how would you diagnose the root cause within the data ingestion pipeline?
details:
  realistic_solution: The root cause is data starvation; the CPU is bottlenecked on software video decoding and frame preprocessing (resizing/normalization), failing to feed the hardware accelerators fast enough. The diagnosis involves profiling CPU vs GPU utilization and memory bandwidth to identify the bottleneck. The solution is to offload decoding to the dedicated hardware NVDEC and use hardware-accelerated preprocessing (like VPI or DeepStream) to keep the data pipeline entirely in shared memory without CPU intervention.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is model inference compute and suggesting further quantization or model pruning.
    **The Rationale:** Candidates often focus purely on the deep learning model's TOPS requirement, forgetting that real-world edge pipelines include heavy I/O and preprocessing steps before the model.
    **The Consequence:** Time is wasted optimizing a model that is already waiting on data, failing to resolve the actual 60 FPS bottleneck and ignoring available hardware accelerators (NVDEC).
  napkin_math: |
    1. **Data Ingestion Rate:** 8 streams * 1920 * 1080 pixels * 3 bytes/pixel * 30 FPS = ~1.49 GB/s of raw image data.
    2. **CPU Bottleneck:** Performing software decoding and CPU-based resizing on 1.5 GB/s of data completely saturates the ARM CPU cores.
    3. **Hardware Capability:** Moving this to NVDEC frees the CPU, allowing the 275 TOPS INT8 hardware to easily process the target 240 total FPS well within the 60W TDP.
    4. **Result:** Throughput increases to the target **240 FPS**.
