title: The Sensor Pipeline Skew
scenario: Your autonomous vehicle team is upgrading its primary camera sensor to a new 4K (3840x2160) HDR model that outputs 12-bit RAW frames at 30 FPS. The raw data stream is too high for your current logging SSD. A hardware engineer suggests enabling the camera's built-in, lossy MJPEG compression before the data is passed to your perception model and written to disk.
question: What is the primary ML systems risk of enabling lossy MJPEG compression before the perception model and disk logging?
details:
  realistic_solution: 'The primary risk is **training-serving skew**. The perception model was trained on clean, uncompressed RAW images. Enabling lossy MJPEG compression introduces artifacts (e.g., blocking, color space changes) that are a form of data distribution shift. The model''s real-world performance will be significantly lower than validation metrics suggest because the input data it receives in the car is fundamentally different from the data it was trained on.'
  common_mistake: |
    **The Pitfall:** Viewing this purely as a data bandwidth hardware problem.
    **The Rationale:** Engineers focus on fixing the SSD storage bottleneck and assume any compression is acceptable.
    **The Consequence:** Introducing a lossy step into the inference pipeline that wasn't in the training pipeline creates classic training-serving skew, degrading model performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Resolution: 3840 x 2160 pixels.
    - Format: 12-bit RAW (1.5 bytes/pixel).
    - Frame Rate: 30 FPS.

    **Calculations:**
    - Pixels per frame: 3840 * 2160 = 8,294,400 pixels.
    - Size per frame: 8,294,400 * 1.5 bytes = 12.44 MB.
    - Total Bandwidth: 12.44 MB * 30 = 373.2 MB/s.

    **Conclusion & Interpretation:**
    - **Result: I/O-Bound.** While 373 MB/s strains standard logging SSDs, applying lossy MJPEG compression introduces artifacts that ruin the data distribution, causing severe training-serving skew.
  options:
  - The raw data rate is ~237 MB/s. The risk is that this is still too high for some storage systems.
  - The raw data rate is ~373 MB/s. This exceeds the bandwidth of a 4-lane MIPI CSI-2 bus, so compression is mandatory.
  - The raw data rate is ~373 MB/s. The key risk is training-serving skew, as the model was not trained on the compression artifacts introduced by MJPEG.
  - The raw data rate is ~3,800 MB/s. The main risk is overwhelming the Jetson AGX Orin's memory bandwidth.
  correct_index: 2
