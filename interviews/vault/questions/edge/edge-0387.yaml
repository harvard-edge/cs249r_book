title: The Quantization Energy Tax
scenario: You're profiling a perception model on a power-constrained automotive ECU. To reduce energy consumption, you're considering quantizing a key convolution layer from 32-bit floating-point (FP32) to 8-bit integer (INT8) arithmetic.
question: From a hardware physics perspective, how much more energy does a single FP32 MAC consume than a single INT8 MAC?
details:
  realistic_solution: An FP32 operation consumes approximately 18 times more energy than an INT8 operation. The energy consumed by a digital circuit is proportional to the switching activity of its transistors. Floating-point arithmetic is far more complex than integer arithmetic, requiring significantly more logic and therefore more energy per operation. This ~18x factor is a fundamental physical invariant based on circuit design.
  common_mistake: |
    **The Pitfall:** Assuming energy savings scale linearly with data type size (e.g., 4x reduction for 4-byte FP32 to 1-byte INT8).
    **The Rationale:** Engineers anchor on memory footprint reductions and ignore the vastly different silicon logic complexity of floating-point versus integer ALUs.
    **The Consequence:** Drastically underestimating the power efficiency gains of quantization on edge devices.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Comparison of silicon switching activity between FP32 and INT8 ALUs.
    2. **Calculations:**
       - Energy consumed is proportional to transistor switching activity.
       - Standard hardware invariant: FP32 operation energy ≈ 18 * INT8 operation energy.
    3. **Conclusion & Interpretation:**
       - **Result: ~18x Energy Cost.** An FP32 operation is approximately 18 times more expensive energetically than an INT8 operation due to exponent/mantissa logic complexity.
  options:
  - FP32 is ~2-4× more expensive.
  - They consume roughly the same amount of energy.
  - FP32 is ~18× more expensive.
  - INT8 is ~4x more expensive.
  correct_index: 2
