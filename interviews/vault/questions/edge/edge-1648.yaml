title: On-Device Distribution Drift Detection for Edge TPU
scenario: You are leading the deployment of a visual inspection system across thousands of remote manufacturing sites using the Google Coral Edge TPU (4 TOPS INT8, 2W power limit, USB/PCIe). Due to seasonal lighting changes and sensor aging, the input data distribution drifts over time, silently degrading model performance. Network bandwidth is severely constrained, making it impossible to stream raw images back to the cloud for traditional drift analysis.
question: How would you detect statistical data drift on-device using the Coral Edge TPU without streaming raw images or disrupting INT8 inference?
details:
  realistic_solution: The optimal architecture leverages the intermediate INT8 activation maps (embeddings) from the primary inspection model, which are already computed by the Edge TPU. By maintaining running, binned histograms of these low-precision embeddings in the host's memory, we can track the activation distribution over time. A lightweight process on the host CPU periodically computes the Population Stability Index (PSI) using these histograms against a baseline reference. If the PSI exceeds a threshold, the system flags the drift and transmits only the anomalous embeddings or a heavily compressed sample of the triggering frames back to the cloud.
  common_mistake: |
    **The Pitfall:** Suggesting the calculation of continuous statistical metrics (like exact KL divergence) directly on the raw input stream using a secondary model.
    **The Rationale:** Data scientists default to exact, continuous metrics because they are standard in cloud environments where floating-point math is abundant.
    **The Consequence:** Unsupported floating-point math causes the Coral to fall back to the host CPU, immediately violating the 2W power budget, causing thermal throttling, and stalling the primary inference pipeline.
  napkin_math: |
    1. **Data Rate:** A 256-dimensional INT8 embedding at 30 FPS generates 7.68 KB/s of data.
    2. **Local Storage:** Maintaining 16-bin histograms for 256 dimensions using 32-bit integer counters requires 256 * 16 * 4 bytes = 16.38 KB of RAM per time window.
    3. **Compute Load:** Calculating PSI from 16.38 KB of integer histograms on the host CPU takes less than 1 million operations.
    4. **Result:** Drift detection operates entirely within the **2W power envelope**, whereas streaming raw 1080p video would demand impossible 5+ Mbps bandwidth.
