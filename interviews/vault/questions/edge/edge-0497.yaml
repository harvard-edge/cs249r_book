title: The Delivery Robot's Perception Stall
scenario: You are an ML systems engineer at a company building autonomous delivery robots. A new LiDAR
  segmentation model is running much slower than expected on the robot's NVIDIA Jetson AGX Orin, achieving
  only 10 FPS instead of the target 30 FPS. `tegrastats` shows the GPU is at 100% utilization within its
  30W power budget, yet performance is poor. Profiling reveals that a critical sequence of layers performs
  40 Giga-IOPs (INT8) per inference, but requires moving 105 MB of data (weights and activations) between
  the GPU cores and the device's LPDDR5 memory.
question: "Is the Jetson Orin LiDAR workload compute-bound or memory-bound, and what should you optimize to reach 30 FPS?"
details:
  realistic_solution: The workload is severely memory-bound. The key is to calculate the workload's Arithmetic
    Intensity (AI) and compare it to the hardware's ridge point. The Jetson AGX Orin has a memory bandwidth
    of ~204.8 GB/s and a peak INT8 compute of 275 TOPS. Its ridge point is `275 TOPS / 204.8 GB/s ≈ 1,342
    Ops/Byte`. The workload's AI is only `40 G-Ops / 105 MB ≈ 381 Ops/Byte`. Since the workload's AI (381)
    is far below the hardware's ridge point (1342), performance is limited by how fast data can be fed
    to the compute units, not by the compute units themselves. To improve FPS, the focus must be on reducing
    data movement via techniques like operator fusion, layer reordering, or architectural changes, not
    on raw compute optimization.
  common_mistake: The most common mistake is equating '100% GPU utilization' with being compute-bound.
    In reality, a GPU can be fully 'busy' while being stalled, spending most of its cycles waiting for
    data from slower memory. This is a classic symptom of a memory bandwidth bottleneck.
  napkin_math: 1. **Find Hardware Specs:** From the playbook, the Jetson AGX Orin has a peak compute of
    275 TOPS (275 * 10^12 Ops/sec) and a memory bandwidth of 204.8 GB/s (204.8 * 10^9 Bytes/sec).
  options:
  - Compute-bound. The GPU is at 100% utilization, which means the compute units are fully saturated and
    are the bottleneck.
  - Compute-bound. The model requires 40 G-IOPs, which is a heavy computational load that is challenging
    for an edge device.
  - Memory-bound. The workload's arithmetic intensity (~381 Ops/Byte) is significantly below the Jetson's
    ridge point (~1,342 Ops/Byte), so performance is limited by memory bandwidth.
  - Power-bound. The device is hitting its 30W thermal limit, which is preventing the GPU from reaching
    its peak compute performance.
  correct_index: 2
