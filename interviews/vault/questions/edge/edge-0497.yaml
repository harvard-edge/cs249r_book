title: The Delivery Robot's Perception Stall
scenario: You are an ML systems engineer at a company building autonomous delivery robots. A new LiDAR segmentation model is achieving only 10 FPS instead of the target 30 FPS. `tegrastats` shows the GPU is at 100% utilization, yet performance is poor. Profiling reveals that a critical sequence of layers performs 40 Giga-IOPs (INT8) per inference, but requires moving 105 MB of data between the GPU cores and memory.
question: Is the LiDAR workload compute-bound or memory-bound, and what should you optimize to reach 30 FPS?
details:
  realistic_solution: Utilize the Roofline Model to analyze the workload's Arithmetic Intensity (AI). Because the AI is severely lower than the hardware's ridge point, the system is chronically starved for data. Fix this by implementing operator fusion (e.g., fusing Conv-BN-Activation) to maintain activations in SRAM, drastically reducing the requisite trips to the slower unified memory.
  common_mistake: |
    **The Pitfall:** Equating 100% GPU utilization metrics directly to being "Compute-Bound".
    **The Rationale:** Candidates see maxed-out utilization graphs and intuitively assume the compute units are saturated, when they are actually stalled waiting on memory fetches.
    **The Consequence:** Chasing useless compute optimizations (like further quantization) instead of addressing the fundamental data movement bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 30 FPS
    - Inference demands: 40 G-IOPs compute, 105 MB data movement
    - Hardware Ridge Point: ~1342 Ops/Byte (275 TOPS / 204.8 GB/s)

    **Calculations:**
    - Workload Arithmetic Intensity (AI) = 40 * 10^9 Ops / 105 * 10^6 Bytes = 381 Ops/Byte
    - Comparison: 381 Ops/Byte (AI) <<< 1342 Ops/Byte (Ridge Point)

    **Conclusion & Interpretation:**
    - **Result: 381 Ops/Byte (Memory-Bound)**. The workload's arithmetic intensity is too low to saturate the compute units.
  options:
    - 'Compute-bound. The GPU is at 100% utilization, which means the compute units are fully saturated and are the bottleneck.'
    - 'Compute-bound. The model requires 40 G-IOPs, which is a heavy computational load that is challenging for an edge device.'
    - 'Memory-bound. The workload''s arithmetic intensity (~381 Ops/Byte) is significantly below the hardware ridge point (~1,342 Ops/Byte), so performance is limited by memory bandwidth.'
    - 'Memory-bound. The 105 MB parameter footprint exceeds the L2 cache, forcing all operations to spill to SSD storage.'
  correct_index: 2
