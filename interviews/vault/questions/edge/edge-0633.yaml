title: The Autonomous Valet Retrofit
scenario: You are the new Principal ML Systems Engineer for a luxury EV company. Your flagship sedan,
  which shipped to customers in 2023, needs to receive a new 'Autonomous Valet' feature via an over-the-air
  (OTA) update. This feature requires a state-of-the-art Transformer-based BEV (Bird's-Eye-View) perception
  model for safe navigation in tight parking structures.
question: "What phased optimization strategy would get the OTA Transformer BEV model from 200ms to 33ms with the least deployment risk?"
details:
  realistic_solution: A principal-level response involves a phased strategy that tackles different sources
    of latency in order of increasing risk and engineering cost.
  common_mistake: A junior engineer would propose a single solution, like 'Let's just prune the model
    by 85%,' without considering the massive risk to model accuracy or the engineering cost of extensive
    retraining. A senior engineer might suggest a few techniques, but a principal-level answer must present
    a risk-managed portfolio of optimizations, ordered logically from safest to riskiest, and justify
    the sequencing based on quantitative estimates of return on investment.
  napkin_math: We need to get from 200ms to 33ms, a speedup of ~6x.
