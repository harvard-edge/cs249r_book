title: Edge TPU Audio Event Ingestion Architecture
scenario: You are designing a real-time anomaly detection system for industrial machines using acoustic sensors. The edge device is equipped with a Google Coral Edge TPU (4 TOPS INT8, 2W) connected via USB. You have two proposed streaming ingestion pipelines. Architecture A uses a local sliding window buffer that computes mel-spectrograms on the host CPU before feeding INT8-quantized frames to the Coral TPU every 500ms. Architecture B streams raw audio directly into a recurrent model on the Coral TPU that processes sample-by-sample.
question: Which streaming ingestion architecture is better for the 2W USB Coral Edge TPU anomaly detector, and why?
details:
  realistic_solution: Architecture A is the superior design. The host CPU is much better suited for deterministic DSP operations like computing mel-spectrograms. By batching 500ms of audio into a 2D feature map and quantizing it to INT8, we leverage the Coral TPU's massive 4 TOPS strength in 2D spatial convolutions (CNNs). This minimizes host-to-TPU USB transfer overhead and aligns perfectly with the Edge TPU's limited INT8 operator support.
  common_mistake: |
    **The Pitfall:** Choosing Architecture B (end-to-end deep learning on TPU) over Architecture A (host CPU preprocessing).
    **The Rationale:** Candidates assume end-to-end deep learning always avoids host CPU overhead and is superior for edge inference.
    **The Consequence:** Deploying a model that fails because the Coral TPU lacks robust support for complex recurrent states or arbitrary DSP, and INT8 destroys raw audio signal fidelity.
  napkin_math: |
    - **Audio Window:** 16 kHz sample rate * 0.5s = 8,000 samples.
    - **Data Transfer (Arch A):** CPU converts to a 64x64 INT8 mel-spectrogram. USB transfer size = 64 * 64 * 1 byte = 4 KB per 500ms (8 KB/sec bandwidth).
    - **Compute Time:** At 4 TOPS, a typical CNN (~300 MACs) takes < 2ms to execute.
    - **Power Envelope:** The 2W power budget is maintained by keeping the USB bus mostly idle and performing burst inferences, keeping average power **well under 2W**.
