title: 'The Impossible OTA Update: Architecting a Generative VLM for an Automotive SoC'
scenario: 'You are the tech lead for the ''In-Cabin AI'' team at a major automaker. Management wants to
  ship a new ''AI Copilot'' feature—a vision-language model (VLM) that understands the driver-facing camera
  and voice commands—to the entire fleet via an Over-the-Air (OTA) update. The problem: the fleet''s hardware
  is a fixed target, an automotive-grade SoC equivalent to a Jetson AGX Orin (275 INT8 TOPS, 32 GB LPDDR5
  RAM). This hardware is already running the existing perception stack, leaving a strict budget of 15W
  of power and a 500ms end-to-end latency budget for the VLM to respond to a query like ''Is my blind
  spot clear?''. The baseline model from R&D is a 7B parameter Transformer-based VLM. A naive, unoptimized
  deployment is over 100x too slow and exceeds the power budget by 20x. Your VP says this feature is non-negotiable
  for competitive reasons. Formulate a multi-stage optimization strategy to make this deployment feasible.
  What are the first three architectural pillars of your plan, and why? For each, provide a napkin-math
  estimate of the expected improvement.'
question: "What are the first three architectural pillars of your OTA VLM plan, and what napkin-math improvement should each provide?"
details:
  realistic_solution: The correct approach is a multi-pillar strategy that attacks the problem from model
    design down to algorithmic optimization, acknowledging different bottlenecks at each stage.
  common_mistake: Engineers often propose a single solution like 'just quantize to INT8' or 'prune the
    model'. These are necessary but completely insufficient. A senior engineer might suggest combining
    pruning and quantization. However, an L6+ candidate must recognize this is a multi-faceted systems
    problem where different parts of the model's execution (vision encoding vs. text decoding) have different
    bottlenecks. They must propose a *holistic architecture* that combines model size reduction, I/O-aware
    algorithms for encoding, and specialized techniques for accelerating autoregressive decoding, understanding
    that just shrinking the model won't solve the memory bandwidth issues inherent in attention and generation.
  napkin_math: 'Let''s evaluate a 7B VLM. Weights in 4-bit INT take 3.5GB. Memory bandwidth is 204.8 GB/s.
    For generation (batch size 1), every token requires loading the full 3.5GB model. Time per token =
    3.5GB / 204.8GB/s = 17ms. Compute is minimal: 7B * 2 ops = 14 GOPs, taking 14G / 275T = 0.05ms. Max
    generation speed is 1000ms / 17ms ≈ 58 tokens/s. A 50-token response takes 0.85s, ensuring instantaneous
    feel.'
