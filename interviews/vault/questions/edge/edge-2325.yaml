title: CUDA Streams for Asynchronous Execution
scenario: You are accelerating a video stream processing pipeline on a Jetson AGX
  Orin using pure CUDA C++.
question: State the purpose of CUDA Streams in relation to overlapping memory transfer
  and kernel execution on the GPU.
details:
  realistic_solution: A CUDA Stream is an issue-order queue of GPU operations. Placing
    cudaMemcpyAsync and kernel launches into separate, non-blocking streams allows
    the GPU driver to execute PCIe/bus transfers concurrently with compute kernels
    running on the Streaming Multiprocessors.
  common_mistake: Thinking CUDA Streams map to multiple physical CPU cores rather
    than asynchronous GPU command queues.
  napkin_math: Stream A (copy) || Stream B (compute).
