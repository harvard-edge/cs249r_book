title: CUDA Streams for Asynchronous Execution
scenario: You are accelerating a video stream processing pipeline on a Jetson AGX Orin using pure CUDA C++.
question: What is the purpose of CUDA Streams in relation to overlapping memory transfer and kernel execution?
details:
  realistic_solution: A CUDA Stream is an issue-order queue of GPU operations. Placing cudaMemcpyAsync and kernel launches into separate, non-blocking streams allows the GPU driver to execute PCIe/bus transfers concurrently with compute kernels running on the Streaming Multiprocessors.
  common_mistake: |
    **The Pitfall:** Thinking CUDA Streams map to multiple physical CPU cores.
    **The Rationale:** Developers conflate CPU multithreading with GPU asynchronous command queues.
    **The Consequence:** Designing heavily threaded CPU host code while leaving the GPU pipeline completely serialized and underutilized.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Video stream processing pipeline.
       - PCIe/bus transfers and kernel execution are independent hardware paths.
    2. **Calculations:**
       - Create Stream A for memory transfer (`cudaMemcpyAsync`).
       - Create Stream B for kernel execution.
       - Overlap execution: Stream A || Stream B.
    3. **Conclusion & Interpretation:**
       - **Separating streams allows memory transfers to hide behind kernel execution. Result: Concurrency/Pipeline Optimization.**
