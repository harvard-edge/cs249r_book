title: Hailo-8 Accelerator Duty Cycling
scenario: A Hailo-8 edge accelerator draws 2.5W active power and 0.1W sleep power.
  It detects anomalies on a fast conveyor belt by waking up for 100ms exactly once
  every 1 second.
question: Calculate the average power consumption over a continuous 1-second operational
  cycle.
visual:
  kind: svg
  path: edge-2276.svg
  alt: A square-wave timeline chart showing power spikes to 2.5W for 100ms, followed
    by 0.1W baseline.
  caption: Accelerator Power Duty Cycle
details:
  realistic_solution: 'The device is active for 0.1 seconds and asleep for 0.9 seconds
    during each 1-second cycle. The average power is the time-weighted sum: (0.1s
    * 2.5W) + (0.9s * 0.1W) = 0.25W + 0.09W = 0.34 Watts.'
  common_mistake: Averaging the two power states equally without applying the 10%
    / 90% time weighting.
  napkin_math: 0.1 * 2.5 + 0.9 * 0.1 = 0.34W
