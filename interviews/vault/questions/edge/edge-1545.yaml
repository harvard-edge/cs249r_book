title: Evaluating Real-Time Safety Guardrails on Jetson Orin
scenario: 'You are deploying a vision-based autonomous delivery robot using an NVIDIA Jetson Orin (32 GB LPDDR5, 60W TDP, 275 TOPS INT8) to navigate crowded sidewalks. As part of your Responsible AI framework, you need to implement real-time guardrails to prevent unsafe behaviors, such as failing to yield to mobility aids. You must evaluate two alternatives: 1) running a lightweight, independent secondary ML model on the DLA accelerator to cross-check predictions, or 2) using rule-based deterministic spatial checks fused with the primary perception model''s uncertainty scores on the Ampere GPU.'
question: "Which approach provides better organizational accountability and system performance?"
details:
  realistic_solution: The better alternative is using rule-based deterministic checks fused with uncertainty scores. While the Jetson Orin has a DLA for efficient inference, rule-based systems are perfectly interpretable and auditable, which is critical for Responsible AI impact assessments. Furthermore, deterministic checks avoid memory bus contention with the Ampere GPU, guaranteeing bounded execution times for critical safety interventions without exceeding the 60W power envelope.
  common_mistake: |
    **The Pitfall:** Blindly preferring a secondary neural network to maximize TOPS utilization.
    **The Rationale:** Engineers often default to "more ML" without considering memory bandwidth contention or interpretability.
    **The Consequence:** Violating real-time deadlines due to memory transfers and implementing an un-auditable safety system.
  napkin_math: |
    *   **Power Budget:** 60W TDP. Primary model uses 150 TOPS and 35W. 25W remaining.
    *   **ML Guardrail (DLA):** Might consume 40 TOPS and 10W. Transferring memory to DLA adds 10-15ms.
    *   **Deadline Impact:** Pushes total time from 20ms to 35ms, violating the 33ms (30 FPS) deadline.
    *   **Deterministic Checks:** Add <2ms of CPU/GPU time and negligible power.
    *   **Result:** Deterministic checks **safely meet the 33ms and 60W limits** while providing full auditability.
