title: The Predictive Maintenance Model Lifecycle
scenario: Your factory has 800 CNC machines, each with a Hailo-8L module (13 TOPS, 1.5W) running a vibration anomaly detection model. The model predicts bearing failure 48 hours in advance. After 18 months, the model's precision has dropped from 92% to 71% — it's generating too many false alarms. Maintenance crews are ignoring alerts. The recall is still 95%.
question: What's happening, and how do you fix the lifecycle?
details:
  realistic_solution: 'The model isn''t degrading — the **machines are aging**. After 18 months of operation, bearings that haven''t failed are still wearing. Their vibration signatures have drifted closer to the "pre-failure" pattern the model learned. The model correctly identifies these signatures as anomalous (high recall), but many are "normal aging" rather than "imminent failure" (low precision). The decision boundary hasn''t moved — the data distribution has. Fix this by using an age-conditional model (passing machine age as an input feature), allowing the network to distinguish normal aging from imminent failure.'
  common_mistake: |
    **The Pitfall:** Assuming the model itself is degrading and reflexively triggering a retraining pipeline on recent data.
    **The Rationale:** "Model drift" is a standard industry buzzword, so engineers immediately assume the model needs updating when metrics drop.
    **The Consequence:** Retraining blindly treats the symptom but misses the root cause (physical hardware aging). The problem will recur, and maintenance teams will completely lose trust in the alerting system.
  napkin_math: |
    1. **Current Wasted Effort:** 800 machines * 10 false alarms/week (at 71% precision) = 8,000 false alarms/week.
    2. **Time Cost:** Investigating each takes 30 min. 8,000 * 0.5 hours = 4,000 hours/week = 100 FTEs wasted.
    3. **Fixed System (90% Precision):** False alarms drop to 2.7/week per machine. Total 2,160/week = 1,080 hours/week = 27 FTEs.
    4. **Result:** Using an age-conditional model saves 73 FTEs, yielding an ROI of **$3.65M/year** while using negligible extra edge compute.
