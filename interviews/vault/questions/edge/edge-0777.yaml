title: The Predictive Maintenance Model Lifecycle
scenario: Your factory has 800 CNC machines running a vibration anomaly detection model. The model predicts bearing failure 48 hours in advance. After 18 months, the model's precision has dropped from 92% to 71% — it's generating too many false alarms. Maintenance crews are ignoring alerts. The recall is still 95%.
question: What's happening, and how do you fix the lifecycle?
details:
  realistic_solution: 'The model isn''t degrading — the **machines are aging**. After 18 months, non-failing bearings have drifted closer to the "pre-failure" pattern. The model correctly flags these (high recall), but many are "normal aging" (low precision). Fix this by using an age-conditional model (passing machine age as an input feature).'
  common_mistake: |
    **The Pitfall:** Assuming the model itself is degrading and reflexively triggering a retraining pipeline on recent data.
    **The Rationale:** "Model drift" is a standard industry buzzword, so engineers assume algorithmic drift rather than physical aging.
    **The Consequence:** Retraining blindly treats the symptom but misses the root cause. The problem will recur, and teams will completely lose trust in the alerting system.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 800 machines.
       - 71% precision yields 10 false alarms/week per machine.
       - 30 min to investigate each false alarm.
    2. **Calculations:**
       - Current Waste: 800 * 10 = 8,000 false alarms/week. 8,000 * 0.5 hours = 4,000 hours/week (100 FTEs).
       - Fixed System (90% Precision): False alarms drop to 2.7/week. 800 * 2.7 = 2,160/week = 1,080 hours/week (27 FTEs).
       - Savings: 100 FTEs - 27 FTEs = 73 FTEs.
    3. **Conclusion & Interpretation:**
       - **Result: Age-conditional model saves 73 FTEs, yielding massive ROI with negligible extra compute. (Logic-Bound)**
