title: The Predictive Maintenance Model Lifecycle
scenario: Your factory has 800 CNC machines, each with a Hailo-8L module (13 TOPS, 1.5W) running a vibration
  anomaly detection model. The model predicts bearing failure 48 hours in advance. After 18 months, the
  model's precision has dropped from 92% to 71% — it's generating too many false alarms. Maintenance crews
  are ignoring alerts. But the recall is still 95% — it catches real failures. What's happening, and how
  do you fix the lifecycle?
question: "What's happening, and how do you fix the lifecycle?"
details:
  realistic_solution: 'The model isn''t degrading — the **machines are aging**. After 18 months of operation,
    bearings that haven''t failed are still wearing. Their vibration signatures have drifted closer to
    the "pre-failure" pattern the model learned. The model correctly identifies these signatures as anomalous
    (high recall), but many are "normal aging" rather than "imminent failure" (low precision). The decision
    boundary hasn''t moved — the data distribution has. Fix this by using an age-conditional model (passing
    machine age as an input feature), allowing the network to distinguish normal aging from imminent failure.'
  common_mistake: '"The model is degrading — retrain on recent data." Retraining helps, but misses the
    root cause and will recur.'
  napkin_math: '800 machines × 10 false alarms/week (at 71% precision) = 8,000 false alarms/week. Maintenance
    crew investigates each: 30 min × 8,000 = 4,000 hours/week = 100 FTEs wasted. After fix (precision
    back to 90%): 800 × 2.7 false alarms/week = 2,160 → 1,080 hours/week = 27 FTEs. Savings: 73 FTEs × $50K/year
    = **$3.65M/year**. Hailo-8L compute for age-conditional model: adds 0.3ms to the 5ms inference cycle
    — negligible. Retraining cost (cloud): $200/quarter = $800/year. ROI: $3.65M / $800 ≈ 4,562×.'
  options:
  - Edge-side health checks should focus on hardware metrics (CPU, memory); model-level metrics like confidence
    scores are too noisy to be useful.
  - The model is degrading — retrain on recent data.
  - The model isn't degrading — the machines are aging, shifting the data distribution closer to the learned
    "pre-failure" pattern. Fix this by using an age-conditional model (passing machine age as an input feature),
    allowing the network to distinguish normal aging from imminent failure.
  - The accuracy degradation is caused by numerical instability in the framework's matrix multiplication
    kernels, not by the model or data.
  correct_index: 2
