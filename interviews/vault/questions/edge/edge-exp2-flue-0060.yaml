title: Ampere 2:4 Structured Sparsity on Jetson Orin
scenario: You are optimizing a real-time vision model for deployment on an NVIDIA Jetson Orin. The platform
  features an Ampere GPU, 32 GB of LPDDR5 memory, a 60W TDP, and advertises 275 TOPS of INT8 compute when
  utilizing structured sparsity. Your current dense INT8 model requires 180 TOPS of compute to meet the
  latency SLA and its weights occupy 20 GB of memory. You plan to apply the Ampere architecture's native
  2:4 structured sparsity to meet the requirements.
question: "Will 2:4 structured sparsity let the 180 TOPS, 20 GB INT8 model meet Orin's limits, and what is the sparse weight size?"
details:
  realistic_solution: Applying a 2:4 structured sparsity pattern ensures compatibility with the Ampere
    GPU's sparse Tensor Cores on the Jetson Orin. This halves the memory footprint of the weight matrices
    and effectively doubles the math throughput compared to dense execution, allowing the 180 TOPS workload
    to run comfortably within the hardware's limits while freeing up memory for high-resolution activations.
  common_mistake: Candidates often assume the 275 TOPS specification represents dense compute capacity
    and fail to recognize that Ampere requires a strict 2:4 sparsity pattern to achieve this peak throughput.
    They may also incorrectly calculate memory savings by assuming unstructured sparsity yields proportional
    memory bandwidth reductions without specialized sparse formats.
  napkin_math: '1. Jetson Orin Dense INT8 Capacity = Advertised Sparse TOPS / 2 = 275 / 2 = 137.5 TOPS.

    2. Compute Check: The dense model needs 180 TOPS. 180 > 137.5, so it misses the SLA without sparsity.
    With 2:4 sparsity, the workload is effectively halved, requiring only 90 TOPS from the 137.5 dense
    TOPS equivalent, or fitting easily within the 275 sparse TOPS limit.

    3. Weight Pruning: 2:4 structured sparsity sets exactly 2 out of every 4 weights to zero (50% reduction).

    4. Sparse Weight Memory = 20 GB * 0.5 = 10 GB.

    5. Total Memory Available for OS/Activations = 32 GB LPDDR5 - 10 GB = 22 GB.'
