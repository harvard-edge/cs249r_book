title: 'Edge TCO Specification: Design $50K Budget Deployment for Smart Building'
scenario: Design a complete edge AI deployment for a 10-floor office building with a $50K 3-year budget. Requirements: 30 FPS occupancy detection on 50 cameras, energy management integration, P99 < 100ms. Hardware options: Jetson Orin ($499), Hailo-8+Pi5 ($280), Coral+Pi4 ($60).
question: What complete edge AI deployment would meet 50 cameras at 30 FPS with P99 <100ms under the $50K 3-year budget?
details:
  realistic_solution: 'Model needs: 30 FPS * 50 cameras = 1500 FPS. Single Hailo-8: 200 FPS (BW-limited). Need 8 Hailo-8 units. Use 3 Jetson Orin edge servers (each handles 25 cameras at 30 FPS = 750 FPS). Spec: 3 Jetson Orin at $499 each = $1497. PoE switches for cameras: $2500. Software integration (REST API, HVAC hooks): $15K. Installation labor: 50 cameras * $100 = $5K. Power 3yr: 3*60W*26280hr*$0.10/1000=$473. Maintenance contract 3yr: $2K. Training data labeling: $5K. Total: $31,470. Under $50K budget.'
  common_mistake: |
    **The Pitfall:** Specifying hardware only and ignoring integration and operational costs.
    **The Rationale:** Candidates often treat deployment as a purely hardware-purchasing exercise.
    **The Consequence:** They forget to budget for software integration ($10-20K), power, and physical installation labor ($50-200/camera), which often dominate the real-world TCO.
  napkin_math: |
    1. **Compute Demand**: 50 cameras * 30 FPS = 1500 FPS.
    2. **Hardware Capacity**: Jetson Orin is bandwidth-limited to ~500 FPS for this workload. We need **3 Jetson Orins**.
    3. **Hardware Cost**: 3 * $499 = $1,497.
    4. **Networking Cost**: PoE switches = $2,500.
    5. **Software & Labor**: Integration ($15,000) + Installation ($5,000) + Data labeling ($5,000) = $25,000.
    6. **Power Cost (3 yrs)**: 3 * 60W * 26280 hr * $0.10/kWh / 1000 = $473.
    7. **Maintenance (3 yrs)**: $2,000.
    8. **Total TCO**: $1,497 + $2,500 + $25,000 + $473 + $2,000 = **$31,470**.
    9. **Conclusion**: Meets requirements and stays well under the **$50K budget**.
