title: Optimizing Edge ML Inference on Google Coral Edge TPU
scenario: 'Your team is deploying a real-time object detection model to a fleet of smart cameras, each powered by a Google Coral Edge TPU. Initial testing reveals that current model inference latency often exceeds the required 50ms per frame. The current power consumption is close to the 2W limit. You suspect a bottleneck related to data movement and compute efficiency.'
question: 'What bottlenecks likely cause Coral Edge TPU latency over 50ms, and what quantifiable fixes would meet the power and performance limits?'
details:
  realistic_solution: '1. **Quantization-aware Training (QAT):** Retrain the model with QAT to maximize INT8 performance. 2. **Model Architecture:** Use architectures like EfficientDet-Lite designed for edge INT8. 3. **Input Pipeline:** Optimize pre-processing on the host CPU. 4. **Batching:** Experiment with batch sizes to saturate compute. 5. **Operator Compatibility:** Ensure all operations are TPU-supported to avoid host CPU fallback.'
  common_mistake: |
    **The Pitfall:** Relying on FP16/FP32 precision or large architectures.
    **The Rationale:** Candidates suggest larger models without understanding the Edge TPU's custom ASIC architecture and INT8 requirement.
    **The Consequence:** Proposed solutions are incompatible with the hardware, failing the 2W and 50ms constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target is 50ms latency (20 FPS).
    - Current model consumes 1.8W and takes 100ms.
    - QAT improves throughput 30%, reduces power 10%.
    - Efficient model architecture halves inference time.

    **Calculations:**
    - Optimization 1 (QAT) = 100ms / 1.3 = ~77ms latency, 1.8W * 0.9 = 1.62W power.
    - Optimization 2 (Efficient model) = 77ms / 2 = 38.5ms latency.

    **Conclusion & Interpretation:**
    - **Result: 38.5ms latency (Compute-Bound)**. Architectural changes combined with QAT safely meet the 50ms constraint within the 2W envelope.
