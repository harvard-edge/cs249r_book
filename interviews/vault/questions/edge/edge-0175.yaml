title: The Data Gravity of Federated Learning
scenario: 'You''re designing a system for a fleet of 100,000 smart security cameras deployed in homes to continuously improve an on-device person detection model. The two options are centralized training (uploading user images) and Federated Learning (uploading model gradients).'
question: 'From a Total Cost of Ownership (TCO) perspective, what is the single largest operational cost avoided by choosing Federated Learning?'
details:
  realistic_solution: 'The dominant cost avoided is the network data transfer cost. Uploading raw images for centralized training requires orders of magnitude more bandwidth than uploading compressed model gradients. This egress/ingress traffic from thousands of devices becomes the primary driver of operational cost.'
  common_mistake: |
    **The Pitfall:** Focusing on device compute cost or central server aggregation cost.
    **The Rationale:** Engineers are naturally drawn to compute metrics and often fail to calculate the true scale of network transmission.
    **The Consequence:** They underestimate the OpEx of data transfer, completely missing the primary economic justification for Federated Learning.
  napkin_math: |
    * Centralized: 100 images × 500 KB = 50 MB uploaded per device.
    * Centralized Total: 50 MB × 100,000 devices = 5,000 GB (5 TB) per update.
    * Federated: 4 MB gradients uploaded per device.
    * Federated Total: 4 MB × 100,000 devices = 400 GB.
    * **Conclusion: Federated learning saves 4.6 TB of data egress per update (a 92% bandwidth reduction).**
  options:
  - The cost of on-device compute for local training.
  - The cost of the central server to aggregate model updates.
  - The cost of network data transfer to and from the devices.
  - The initial hardware cost (CapEx) of the devices.
  correct_index: 2
