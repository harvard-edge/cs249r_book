title: The Data Gravity of Federated Learning
scenario: 'You''re designing a system for a fleet of 100,000 smart security cameras to continuously improve an on-device person detection model. The two options are centralized training (uploading user images) and Federated Learning (uploading model gradients).'
question: 'From a Total Cost of Ownership (TCO) perspective, what is the single largest operational cost avoided by choosing Federated Learning?'
details:
  realistic_solution: 'The dominant cost avoided is the network data transfer cost. Uploading raw images for centralized training requires orders of magnitude more bandwidth than uploading compressed model gradients via Top-K sparsification. This egress/ingress traffic from thousands of devices becomes the primary driver of operational cost.'
  common_mistake: |
    **The Pitfall:** Focusing on device compute cost or central server aggregation cost.
    **The Rationale:** Engineers are naturally drawn to compute metrics and often fail to calculate the true scale of network transmission.
    **The Consequence:** They underestimate the OpEx of data transfer, completely missing the primary economic justification for Federated Learning.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet size: 100,000 cameras.
       - Centralized approach: Upload 100 images at 500 KB each.
       - Federated approach: Upload 4 MB gradients per device.
    2. **Calculations:**
       - Centralized upload per device: 100 * 500 KB = 50 MB.
       - Centralized total: 50 MB * 100,000 = 5,000,000 MB = 5,000 GB (5 TB).
       - Federated total: 4 MB * 100,000 = 400,000 MB = 400 GB.
       - Savings: 5,000 GB - 400 GB = 4,600 GB (4.6 TB).
    3. **Conclusion & Interpretation:**
       - **Federated learning saves 4.6 TB of data egress per update (a 92% bandwidth reduction).** (Result: Egress-Bound)
  options:
  - 'The cost of on-device compute for local training.'
  - 'The cost of the central server to aggregate model updates.'
  - 'The cost of network data transfer to and from the devices.'
  - 'The initial hardware cost (CapEx) of the devices.'
  correct_index: 2
