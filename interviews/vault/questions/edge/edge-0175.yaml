title: The Data Gravity of Federated Learning
scenario: 'You''re designing a system for a fleet of 100,000 smart security cameras deployed in homes.
  You need to continuously improve the on-device person detection model. The two options are: 1) Centralized
  training, where you upload user images to the cloud for retraining, and 2) Federated Learning, where
  you train on-device and only upload model gradients. From a Total Cost of Ownership (TCO) perspective,
  what is the single largest operational cost you avoid by choosing Federated Learning over a centralized
  approach?'
question: "From a Total Cost of Ownership (TCO) perspective, what is the single largest operational cost you avoid by choosing Federated Learning over a centralized approach?"
details:
  realistic_solution: The dominant cost avoided is the network data transfer cost. Uploading raw images
    for centralized training requires orders of magnitude more bandwidth than uploading compressed model
    gradients. This egress/ingress traffic from thousands of devices becomes the primary driver of operational
    cost.
  common_mistake: Focusing on device compute cost or central server aggregation cost. While Federated
    Learning does add compute load to the edge device and requires a central server to average gradients,
    these costs are typically dwarfed by the massive operational expense of transmitting raw image data
    over the network at scale. Engineers often underestimate the OpEx of data transfer.
  napkin_math: 'Centralized: 100 images * 500 KB = 50 MB uploaded per device. For 100,000 devices, total
    = 50 MB * 100k = 5,000 GB (5 TB) per update. Federated: Only 4 MB gradients uploaded per device. Total
    = 4 MB * 100k = 400 GB. Federated learning saves 4.6 TB of data egress per update (a 92% bandwidth
    reduction), significantly lowering cellular data costs for the 100,000-device fleet.'
  options:
  - The cost of on-device compute for local training.
  - The cost of the central server to aggregate model updates.
  - The cost of network data transfer to and from the devices.
  - The initial hardware cost (CapEx) of the devices.
  correct_index: 2
