title: The Multi-Tenant Edge Scheduler
scenario: 'You manage a fleet of 1,000 edge AI gateways at retail stores, each with a Jetson AGX Orin. Each gateway runs AI workloads for 4 different internal teams: loss prevention (real-time, safety-critical), inventory tracking (near-real-time), customer analytics (best-effort), and digital signage (background). During Black Friday, all four teams demand peak resources simultaneously. The loss prevention team reports missed detections.'
question: How would you design a multi-tenant scheduler so loss prevention meets its deadlines during Black Friday?
details:
  realistic_solution: 'Edge multi-tenancy requires a hierarchical resource scheduler using NVIDIA MPS or MIG. 1. Resource partitioning with guaranteed minimums (e.g. loss prevention=40%, inventory=25%, analytics=20%, signage=15%). 2. Burst scheduling with preemption: Idle allocation is shared. Loss prevention can preempt lower-priority tenants burst allocations, and is never preempted. 3. Deadline-aware admission control: Requests carry deadlines. If the queue depth exceeds capacity to meet all deadlines, shed the oldest analytics requests (tolerate staleness). Pin the loss prevention model in memory to prevent page faults.'
  common_mistake: |
    **The Pitfall:** Proposing equal shares ("Give each team 25% of the GPU") or pure priority queues ("Highest priority gets everything").
    **The Rationale:** Candidates rely on standard OS scheduling paradigms without considering edge multi-tenancy requirements.
    **The Consequence:** Equal shares waste resources during off-peak, while pure priority causes starvation for background tasks and fails to guarantee strict deadlines under burst contention.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Jetson AGX Orin: 275 TOPS, 64 GB RAM.
       - Compute sustained load: 2.19 TOPS (0.8% of capacity).
       - Burst compute load: 7.98 TOPS (2.9% of capacity).
       - Model memory footprint: 12 GB + 8 GB + 6 GB + 4 GB = 30 GB (weights alone).
       - Total memory with activations: ~45 GB.
    2. **Calculations:**
       - Compute utilization is well under 5%.
       - Memory pressure reaches 45 GB / 64 GB under peak load. Additional system/OS overhead can cause paging.
    3. **Conclusion & Interpretation:**
       - **Result: Memory Capacity-Bound**. The real bottleneck is memory swapping, not compute. Model swapping adds 200-500ms latency spikes that lead to missed detections. The fix must pin the loss prevention model in memory.
