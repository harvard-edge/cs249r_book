title: 'Kernel Fusion: Optimize Inference Kernel for Depthwise Separable Convolution'
scenario: Your MobileNetV3 deployment on Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) spends 35% of inference
  time in DWConv operations. Profiling shows DWConv arithmetic intensity = 2 OPS/byte, well below the
  ridge point of 4 OPS/byte. Diagnose the bottleneck and optimize.
details:
  realistic_solution: 'DWConv is memory-bound by design (1 filter per channel, no weight reuse across
    channels). Fix: (1) Increase batch size to improve arithmetic intensity. (2) Fuse with adjacent ops.
    (3) Accept that DWConv efficiency is fundamentally limited and use different architecture if power-critical.'
  common_mistake: Trying to optimize DWConv compute when it's memory-bound; not recognizing that DWConv
    has inherently low arithmetic intensity due to weight reuse = 1.
  napkin_math: 'DWConv AI: for kernel 3×3, input H×W×C: FLOPs = 9 × H × W × C. Bytes = 9C weights + H×W×C
    input + H×W×C output = 9C + 2HWC. AI = 9HWC / (9C + 2HWC) ≈ 9/2 = 4.5 for large H×W... actually ≈
    9HWC / 2HWC = 4.5 for large spatial dims. But profiled AI = 2 → suggests spatial dim is small. For
    7×7 feature map, C=96: FLOPs = 9×7×7×96 = 42,336. Bytes = 9×96 + 7×7×96×2 = 864 + 9,408 = 10,272.
    AI = 42,336/10,272 = 4.12 ≈ at ridge point. For 3×3 feature map: AI = 9×3×3×96/(9×96+3×3×96×2) = 7776/2592
    = 3.0 < 4.04. Memory-bound at small spatial dims. Fix: batch = 4: input bytes scale 4× but weights
    stay same → AI ≈ 4 × FLOPs / (weights + 4×activations) → improves. Batch 4: 4.12 → 4×4.12/(1+4×10272/864
    × 1/4) ... better to just benchmark. Typically 2× improvement with batch=4 for DWConv on Jetson.'
