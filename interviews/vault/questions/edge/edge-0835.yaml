title: On-Device Fine-Tuning Memory Constraints
scenario: You are implementing on-device fine-tuning for a 24-layer transformer model on a Jetson Orin
  Nano with 8GB of unified memory. The weights and optimizer state already consume 4GB. During a standard
  forward pass, each layer produces 250MB of intermediate activations (totaling 6GB for 24 layers), leading
  to an Out-Of-Memory (OOM) error. You propose gradient checkpointing, saving only the 25MB input tensor
  for each layer instead of all intermediates. Calculate the new activation memory footprint and the theoretical
  percentage increase in total training FLOPs.
details:
  realistic_solution: Implement gradient checkpointing at every layer boundary. The new activation memory
    requires storing 24 layer inputs plus the intermediate activations for one layer being recomputed
    during the backward pass, reducing the footprint to 850MB and preventing OOM.
  common_mistake: Failing to account for the memory required to store the layer inputs (checkpoints) and
    the intermediate activations of the single layer currently being recomputed, or incorrectly calculating
    the compute overhead as 50% instead of 33%.
  napkin_math: 'Original Activations: 24 * 250MB = 6000MB (6GB).

    Checkpointed Activations: (24 * 25MB inputs) + 250MB (active intermediates) = 600MB + 250MB = 850MB.

    Compute overhead: Standard step = 1 FWD + 1 BWD (approx 2x FWD) = 3 units of compute. Checkpointed
    step = 1 FWD + 1 Recompute + 1 BWD = 4 units. 4/3 = 1.33x, resulting in a 33% increase in total FLOPs.'
