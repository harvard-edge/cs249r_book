title: 'Evaluating Mixed-Precision Inference on Qualcomm AI 100'
scenario: 'You are deploying an 8-billion parameter LLM for on-premise inference on a Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). You are evaluating two deployment strategies to minimize latency for single-batch generation: Alternative A uses a uniform FP16 precision for both weights and activations. Alternative B uses a mixed-precision approach with INT8 weights and FP16 activations.'
question: 'Which approach is better suited for this specific hardware, and what bottlenecks dictate this decision?'
details:
  realistic_solution: 'Alternative B (mixed-precision with INT8 weights and FP16 activations) is significantly better. On platforms like the AI 100 using LPDDR4x, memory bandwidth is the primary bottleneck for text generation, not the 400 TOPS compute engine. By quantizing weights to INT8, you cut the memory read footprint in half, directly halving the memory-bound latency. The activations can remain in FP16 to preserve model accuracy and avoid dynamic quantization overhead, while easily fitting the KV cache within the remaining 32 GB capacity.'
  common_mistake: |
    **The Pitfall:** Assuming all operations should map to INT8 simply because the NPU has massive INT8 TOPS.
    **The Rationale:** Candidates try to minimize compute time without realizing that autoregressive generation at batch size 1 is fundamentally bounded by memory bandwidth, not compute.
    **The Consequence:** Unnecessarily complicating the activation data types, risking accuracy drops without actually improving token generation latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8B parameters = 16 GOPs compute per token.
    - Compute time at 400 TOPS INT8 = 16 / 400,000 = 0.04 ms.

    **Calculations:**
    - Alternative A (FP16 weights): Reading 16 GB at 100 GB/s = 160 ms per token.
    - Alternative B (INT8 weights): Reading 8 GB at 100 GB/s = 80 ms per token.

    **Conclusion & Interpretation:**
    - **Result: 80 ms per token (Memory-Bandwidth Bound)**. INT8 weights directly halve the memory-bound latency.
