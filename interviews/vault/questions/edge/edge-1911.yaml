title: 'Deploying Sub-4-bit LLMs on Qualcomm Cloud AI 100: Balancing Precision and Performance'
scenario: Your team is tasked with deploying a cutting-edge large language model (LLM), requiring high throughput and low latency, onto an edge accelerator. The target model has a significant memory footprint and computational demand. To meet the aggressive deployment goals and maximize the utility of the memory and processing power within a 75W power envelope, you decide to explore extreme quantization techniques, specifically sub-4-bit quantization.
question: How would you implement and evaluate sub-4-bit quantization for the LLM while maintaining accuracy and exploiting its INT8 hardware?
details:
  realistic_solution: Employ AWQ (Activation-aware Weight Quantization) or GPTQ to achieve efficient sub-4-bit weight quantization, combined with per-channel or group-wise quantization for activations. Optimize custom kernels for the architecture to ensure sub-4-bit operations map efficiently to native INT8 ALUs. Recover accuracy through knowledge distillation or post-training fine-tuning. Validate strictly via perplexity benchmarks and end-to-end latency profiling.
  common_mistake: |
    **The Pitfall:** Overlooking integration overhead and assuming direct hardware acceleration.
    **The Rationale:** Developers assume that the hardware inherently accelerates non-standard bit-widths without verifying the specific kernel support.
    **The Consequence:** The model falls back to inefficient software-emulated paths, resulting in significant latency or accuracy degradation if recovery techniques are poorly chosen.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 70B parameters.
    - Memory Limit: 32 GB.
    - Target Precision: 3-bit.

    **Calculations:**
    - FP16 Footprint: 70B * 2 bytes = 140 GB (OOM).
    - 3-bit Footprint: 70B * 0.375 bytes = 26.25 GB.
    - Remaining Memory: 32 GB - 26.25 GB = 5.75 GB for OS and KV Cache.

    **Conclusion & Interpretation:**
    - **Result: 5.75 GB Free (Memory Capacity-Bound)**. Sub-4-bit quantization compresses the 140 GB footprint by >80%, squeezing the 70B model into a single 32 GB device.
