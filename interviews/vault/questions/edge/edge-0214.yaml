title: The Real-Time Batching Fallacy
scenario: Your team's autonomous driving stack has a perception model with a hard real-time deadline of
  33ms (to maintain 30 FPS). On the new Jetson AGX Orin, a single frame inference takes 20ms. A junior
  engineer suggests batching two frames together to 'improve throughput'. Explain, using the numbers,
  why this strategy will fail to meet the system's deadline.
details:
  realistic_solution: This strategy fails because of the induced waiting time. To create a batch of two,
    the system must wait for the second frame to arrive. If frames arrive every 33ms, processing for the
    first frame cannot even begin until the second frame arrives at t=33ms. Assuming a batch-of-2 takes
    ~35ms to run, the result for the first frame would be ready at t=33ms (wait) + 35ms (process) = 68ms.
    This is more than double its 33ms deadline, which could lead to catastrophic failure in an autonomous
    vehicle.
  common_mistake: Confusing throughput with latency. While batching does increase the number of frames
    processed over a long period (throughput), it fatally increases the time-to-result for the individual
    frames within the batch, causing deadline misses in a real-time system.
  napkin_math: '1. **Frame Arrival Rate**: 1 frame per 33ms.'
  options:
  - It might work if the accelerator is efficient, as total throughput increases.
  - It fails because the processing time for two frames (2 x 20ms = 40ms) is longer than the 33ms deadline.
  - It fails because the system must wait 33ms for the second frame to arrive before starting the ~35ms
    batch inference, making the first frame's result available at ~68ms.
  - It will work, because the average latency per frame in the batch is less than 33ms.
  correct_index: 2
