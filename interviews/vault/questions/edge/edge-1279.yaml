title: Edge Video Storage Pipeline for NVIDIA Jetson Orin
scenario: You are designing a real-time autonomous drone surveillance system running
  on an NVIDIA Jetson Orin. The system processes 4 simultaneous 4K video streams,
  running complex object detection models utilizing the 275 TOPS INT8 Ampere GPU and
  DLA accelerator. Due to intermittent network connectivity, you must design a local
  storage format and tier selection strategy to buffer the incoming video frames and
  associated ML inference metadata within the 60W TDP power constraints before eventual
  batch upload. How do you structure the on-device storage formats to ensure the 32
  GB LPDDR5 memory is not bottlenecked while accommodating both the heavy video writes
  and metadata querying?
question: How do you structure the on-device storage formats to ensure the 32 GB LPDDR5
  memory is not bottlenecked while accommodating both the heavy video writes and metadata
  querying?
details:
  realistic_solution: A robust design separates the heavy payload (video) from the
    analytical payload (metadata). Video frames should be compressed efficiently (e.g.,
    H.265) using hardware encoders and written sequentially to a high-endurance NVMe
    drive to minimize I/O overhead. Inference metadata, such as bounding boxes and
    confidence scores, should be buffered in the 32 GB LPDDR5 memory and periodically
    flushed as Parquet files, enabling fast, compressed columnar reads during the
    batch upload phase without interfering with the video ingestion pipeline.
  common_mistake: Candidates often propose writing raw frames and JSON metadata directly
    to a single SSD without considering the distinct access patterns. This unified
    approach can cause severe write amplification and I/O bottlenecks that stall the
    Jetson Orin's Ampere GPU, failing to recognize that video data requires high sequential
    throughput while metadata requires efficient columnar querying.
  napkin_math: 4 streams × 4K (3840×2160) @ 30fps = 4 × 30 = 120 frames/sec. Uncompressed
    8-bit RGB per frame = 3840 × 2160 × 3 bytes = 24.9 MB. Total uncompressed bandwidth
    = 120 × 24.9 MB = ~3 GB/s, which would drastically exceed local SSD write speeds.
    Using H.265 hardware encoding on the Jetson Orin at 50 Mbps per stream reduces
    this to 4 × 6.25 MB/s = 25 MB/s total storage bandwidth, easily within local NVMe
    write capabilities and well within the 60W TDP.
