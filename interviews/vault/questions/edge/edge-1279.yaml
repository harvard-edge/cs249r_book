title: Edge Video Storage Pipeline for NVIDIA Jetson Orin
scenario: You are designing a real-time autonomous drone surveillance system running on an NVIDIA Jetson Orin. The system processes 4 simultaneous 4K video streams, running complex object detection models utilizing the 275 TOPS INT8 Ampere GPU and DLA accelerator. Due to intermittent network connectivity, you must design a local storage format and tier selection strategy to buffer the incoming video frames and associated ML inference metadata within the 60W TDP power constraints before eventual batch upload.
question: How do you structure the on-device storage formats to ensure the 32 GB LPDDR5 memory is not bottlenecked while accommodating both the heavy video writes and metadata querying?
details:
  realistic_solution: A robust design separates the heavy payload (video) from the analytical payload (metadata). Video frames should be compressed efficiently (e.g., H.265) using hardware encoders and written sequentially to a high-endurance NVMe drive to minimize I/O overhead. Inference metadata should be buffered in the 32 GB LPDDR5 memory and periodically flushed as Parquet files, enabling fast, compressed columnar reads during batch upload.
  common_mistake: |
    **The Pitfall:** Writing raw frames and JSON metadata directly to a single SSD.
    **The Rationale:** Candidates apply standard web-backend logging practices without considering distinct access patterns or raw video I/O bandwidth.
    **The Consequence:** Causing severe write amplification and I/O bottlenecks that stall the Orin's Ampere GPU, leading to system failure.
  napkin_math: |
    - **Uncompressed Video Bandwidth:** 4 streams × 4K (3840×2160) @ 30fps = 120 frames/sec.
    - **Frame Size:** 3840 × 2160 × 3 bytes = 24.88 MB per frame.
    - **Total Raw Bandwidth:** 120 frames/sec × 24.88 MB/frame = 2,986 MB/s (≈ 3 GB/s).
    - **Compressed Bandwidth:** Hardware H.265 encoding at 50 Mbps per stream = 6.25 MB/s per stream.
    - **Final Result:** **Using hardware encoders reduces the storage write bandwidth from a bottlenecking 3 GB/s down to just 25 MB/s (4 × 6.25 MB/s), comfortably fitting within the 60W TDP and local NVMe capabilities.**
