title: On-Device Fairness Evaluation with Hailo-8
scenario: You are deploying an object detection model for public safety applications on a fleet of devices
  equipped with Hailo-8 accelerators. The Hailo-8 delivers 26 TOPS (INT8) at a power consumption of 2.5W.
  During pre-deployment testing, you observed that the model exhibits disparate false negative rates for
  objects belonging to certain underrepresented demographic groups (e.g., lower detection rates for individuals
  with specific skin tones in low-light conditions). Your mandate is to implement an on-device, real-time
  mechanism to monitor 'equalized odds' (specifically, false negative rate parity) for these groups directly
  on the Hailo-8, without exceeding an additional 10% of the primary model's compute budget or a 0.2W
  power increase. How would you design this monitoring mechanism, and what formula or calculation would
  you use to continuously track the FNR difference between groups A and B?
question: "How would you design this monitoring mechanism, and what formula or calculation would you use to continuously track the FNR difference between groups A and B?"
details:
  realistic_solution: 'A realistic solution would involve: 1. Identifying a privacy-preserving, lightweight
    proxy for demographic group inference (e.g., based on readily available image features that correlate
    with group, or pre-assigned group IDs if applicable and ethical). 2. Designing a highly optimized,
    quantized (INT8) secondary model or a simple set of arithmetic operations that run on the Hailo-8''s
    remaining compute resources to calculate false negative counts per group. 3. Aggregating these counts
    over a rolling window and computing a simplified ''FNR difference'' metric periodically. This might
    involve custom kernels or efficient tensor operations, leveraging the Hailo-8''s architecture for
    dataflow processing.'
  common_mistake: Candidates often propose complex, resource-intensive fairness metrics or post-processing
    techniques that are unsuitable for edge devices like the Hailo-8 due to its strict computational (26
    TOPS INT8) and power (2.5W) constraints. Another common mistake is not considering how to infer 'group'
    membership on-device without violating privacy or requiring additional sensitive inputs.
  napkin_math: 'To track False Negative Rate (FNR) difference, the formula is: `FNR_diff = (FalseNegatives_GroupA
    / ActualPositives_GroupA) - (FalseNegatives_GroupB / ActualPositives_GroupB)`. On Hailo-8, calculating
    this continuously requires efficient on-device counting of `FalseNegatives` and `ActualPositives`
    for each group. For instance, if the primary model uses 20 TOPS, leaving 2.6 TOPS (10% of 26 TOPS)
    for fairness. If the monitor process needs to update counts and re-evaluate the difference every second,
    and each update involves iterating over a small buffer of recent inferences (e.g., 100), this translates
    to a few hundred INT8 operations per second. The power budget allows for roughly 0.2W for this monitor.
    The candidate should elaborate on the data structures and arithmetic operations needed to implement
    this efficiently within the Hailo-8''s INT8 capabilities and power envelope.'
