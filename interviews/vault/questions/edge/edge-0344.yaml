title: 'The Roofline Litmus Test: Roofline Analysis'
scenario: An engineer on your autonomous driving team is profiling a new object detection model on a Jetson
  AGX Orin. They report the model has an Arithmetic Intensity (AI) of 250 Ops/Byte. The data sheet for
  the Orin specifies a 'ridge point' of roughly 1,342 Ops/Byte for INT8 workloads. Based on this data,
  is the model compute-bound or memory-bound?
details:
  realistic_solution: The model is **memory-bound**. The 'ridge point' is the critical value of Arithmetic
    Intensity where a system transitions from being memory-bound to compute-bound. If the model's AI is
    *less than* the ridge point, its performance is limited by memory bandwidth. If it's *greater than*
    the ridge point, its performance is limited by the processor's peak computational rate (TOPS). Here,
    the model's AI is significantly below the hardware's ridge point, so it cannot possibly saturate the
    compute units; it's starved for data.
  common_mistake: 'A common mistake is to confuse the relationship: thinking that a ''low'' arithmetic
    intensity means the model isn''t doing much compute, so it must be compute-bound. The opposite is
    true. Arithmetic Intensity is the ratio of operations to memory access (Ops/Byte). A low ratio means
    the model performs very few operations for each byte it fetches, so it spends most of its time waiting
    for data from memory.'
  napkin_math: Model AI (250 Ops/Byte) < Hardware Ridge Point (1,342 Ops/Byte)
  options:
  - Compute-bound, because the AI is low, meaning the processor is the bottleneck.
  - Memory-bound, because the AI is less than the hardware's ridge point.
  - It depends on the TOPS/W efficiency, not the arithmetic intensity.
  - Compute-bound, because the AI is less than the hardware's ridge point.
  correct_index: 1
