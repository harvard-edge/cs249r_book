title: 'The Fleet Update TCO: OTA vs. Federated Learning'
scenario: You are the ML Systems Engineer for an automotive company with a fleet of 10,000 vehicles. You need to decide on the most cost-effective strategy for updating the vehicle's perception models. Cellular data costs $5 per GB. The fleet receives weekly updates (52 updates per year).
question: "What is the annual data cost for sending a 1 GB full-model OTA versus a 100 MB delta update weekly to 10,000 vehicles at $5/GB?"
details:
  realistic_solution: The correct approach is to calculate the total annual data cost for each strategy, accounting for all data movement across the entire fleet over the year.
  common_mistake: Engineers often miscalculate Total Cost of Ownership (TCO) by focusing only on a single update rollout rather than the annual cost, or by failing to multiply by the total number of vehicles in the fleet.
  napkin_math: 'Strategy A (Full Model OTA): 10,000 vehicles * 1 GB = 10,000 GB per update. Annual cost = 10,000 GB * $5/GB * 52 weeks = $2,600,000 ($2.6M). Strategy B (Delta Updates): 10,000 vehicles * 0.1 GB = 1,000 GB per update. Annual cost = 1,000 GB * $5/GB * 52 weeks = $260,000 ($260k). Delta updates save $2.34M annually.'
  options:
  - The Delta Update strategy is cheaper at $26,000 annually, versus $260,000 for the OTA strategy.
  - The Delta Update strategy is cheaper at $2.6M annually, versus $26M for the OTA strategy.
  - The Delta Update strategy is cheaper at $260k annually, versus $2.6M for the OTA strategy.
  - The Delta Update strategy is cheaper at $5,000 annually, versus $50,000 for the OTA strategy.
  correct_index: 2
