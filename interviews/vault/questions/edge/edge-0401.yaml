title: 'The Fleet Update TCO: OTA vs. Federated Learning'
scenario: You are the ML Systems Engineer for an automotive company with a fleet of 10,000 vehicles. You
  need to decide on the most cost-effective strategy for updating the vehicle's perception models. Cellular
  data costs $5 per GB.
question: "What is the data cost per rollout for sending a 1 GB full-model OTA versus a 100 MB delta update to 10,000 vehicles at $5/GB?"
details:
  realistic_solution: The correct approach is to calculate the total annual data cost for each strategy,
    accounting for all data movement.
  common_mistake: Engineers often miscalculate Total Cost of Ownership (TCO) by focusing only on one part
    of the data flow. A common error is to calculate the data *upload* cost for the OTA strategy but forget
    to include the significant cost of *downloading* the new model to the entire fleet. Another frequent
    mistake is failing to normalize time units, for example, by comparing a daily cost for one strategy
    with a monthly cost for another without converting them both to an annual figure.
  napkin_math: 'Strategy A (Full Model OTA): 10,000 vehicles * 1 GB model = 10,000 GB. Cost per update
    = 10,000 GB * $5/GB = $50,000. Strategy B (Delta Updates): Assuming a 10% change, delta size is 100
    MB (0.1 GB). Cost = 10,000 * 0.1 GB * $5 = $5,000 per update. Delta updates save $45,000 per rollout
    cycle for the 10k fleet.'
  options:
  - The OTA strategy is cheaper at $4.2M annually, versus ~$1.8B for the Federated Learning strategy.
  - The Federated Learning strategy is cheaper at ~$1.8M annually, versus $3.0M for the OTA strategy.
  - The Federated Learning strategy is cheaper at ~$150k annually, versus $350k for the OTA strategy.
  - The Federated Learning strategy is cheaper at ~$1.8M annually, versus $4.2M for the OTA strategy.
