title: 'The Bricked OTA Update'
scenario: 'Your fleet of 200 NXP i.MX 8M Plus devices monitors crop health on farms across Iowa. You push a 45 MB model update over 4G/LTE. 30 devices (15%) lose connectivity mid-update and are now bricked with a partially written model file.'
question: 'Why are ML model updates significantly more dangerous than generic firmware updates in constrained environments, and how does size dictate partition architecture?'
details:
  realistic_solution: 'ML models are inherently dangerous to update because of their size. A typical embedded firmware binary is 1-5 MB. A quantized mobile vision model is 40-100 MB. Over a spotty rural 4G connection, downloading 45 MB takes 10-20x longer than a firmware update, exposing a massively larger time window where a power loss or connection drop will cause a partial write. If you use a naive "download and overwrite" approach, a partial write corrupts the .tflite file, causing the inference engine to crash on load, taking down the main application loop.'
  common_mistake: |
    **The Pitfall:** Using a naive "download and overwrite" approach and relying on simple retries.
    **The Rationale:** Cloud infrastructure can safely retry HTTP downloads, so candidates apply this directly to edge updates.
    **The Consequence:** A partial write corrupts the .tflite file, crashing the inference engine and permanently bricking the device requiring a physical truck roll.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 45 MB. Firmware size: 3 MB.
    - 4G rural bandwidth: 0.625 MB/s.
    - Dropout probability: 0.1% chance per second.

    **Calculations:**
    - Download times: Model = 72 seconds. Firmware = 4.8 seconds.
    - Failure probability: Model P(dropout in 72s) = 6.9%. Firmware P(dropout) = 0.5%.
    - Cost: 200 devices $\times$ 6.9% failure = 14 bricked devices $\times$ $150.

    **Conclusion & Interpretation:**
    - **Result: 6.9% failure probability (Network/Reliability-Bound)**. Large ML models necessitate A/B partitioning to prevent costly catastrophic failures during OTA updates.
