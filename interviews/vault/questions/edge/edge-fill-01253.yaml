title: Diagnosing End-to-End Latency in a Multi-Model Edge Pipeline on Hailo-8
scenario: 'Your team has deployed a compound AI system on an edge device utilizing a Hailo-8 accelerator
  (26 TOPS INT8, 2.5W typical power consumption) for real-time video analytics. The system consists of
  two sequential neural networks: an object detection model (Model A) followed by a fine-grained classification
  model (Model B) that processes crops from Model A''s output. Initial tests show an end-to-end latency
  of 250ms, which is significantly higher than the target 100ms. The device''s CPU utilization is low,
  suggesting the bottleneck is not host-side processing. You need to diagnose the root cause of the unexpected
  latency.'
question: "How would you diagnose the 250 ms latency in the Hailo-8 two-model video pipeline when CPU utilization is low?"
details:
  realistic_solution: 'A systematic approach involves: 1) Profiling each stage individually (Model A inference,
    data transfer A to B, Model B inference) to pinpoint the bottleneck. 2) Examining the data transfer
    mechanism between models – is it optimized (e.g., shared memory, direct DMA access if Hailo-8 APIs
    allow) or are large intermediate tensors being copied across device boundaries? 3) Verifying that
    models are correctly quantized and compiled for Hailo-8''s INT8 capabilities. 4) Exploring potential
    for concurrent execution if feasible (e.g., processing different frames in parallel for Model A while
    Model B processes previous frames). 5) Analyzing the Hailo-8 runtime configuration for any settings
    that might introduce overhead or underutilize the accelerator''s potential.'
  common_mistake: Candidates often jump to optimizing individual models without considering the inter-model
    data transfer overhead, inefficient resource allocation on the Hailo-8, or suboptimal batching strategies
    for sequential inference. They might also overlook the impact of data formats (e.g., converting between
    float and INT8) between models.
  napkin_math: If Model A and Model B each require ~100 GOPS, and considering Hailo-8's 26 TOPS (26,000
    GOPS) capability, theoretical inference time per model could be in the order of milliseconds (e.g.,
    100 GOPS / 26,000 GOPS/sec = ~3.8ms). A 250ms end-to-end latency with low CPU points towards significant
    overheads beyond raw computation. For instance, if intermediate data (e.g., a batch of 10 object crops,
    each 256x256x3 bytes = 192KB, total ~2MB) needs to be transferred from Hailo-8's output buffer back
    to host memory and then re-uploaded for Model B, this could easily incur tens of milliseconds depending
    on bus speed and API overhead. If this transfer happens for every frame, the cumulative delay adds
    up rapidly.
