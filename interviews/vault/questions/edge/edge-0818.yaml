title: The RTSP Stream Bandwidth Saturation
scenario: An edge node receives 8 RTSP camera streams over a 1 Gbps Ethernet link. Each camera sends 1080p H.264 at 30 FPS. A typical 1080p H.264 stream at medium quality is ~4 Mbps. The node must decode all streams and run a detection model on each.
question: Calculate total ingest bandwidth, decode throughput required, and determine the bottleneck — is it network, decode, or inference?
details:
  realistic_solution: 'Network traffic is trivial (32 Mbps). Decode capacity is well within modern NVDEC limits. Inference, however, is severely constrained. A large model like YOLOv8-L taking 8ms per frame cannot process 240 FPS (8 * 30) concurrently on a single GPU. The bottleneck shifts decisively to inference computation, necessitating skip-frame strategies in a real deployment.'
  common_mistake: |
    **The Pitfall:** Only checking network bandwidth and concluding the system scales effortlessly.
    **The Rationale:** Believing that if network bits fit on the wire, the downstream system can naturally ingest and process them.
    **The Consequence:** Deploying an architecture that drops frames entirely during the ML inference stage due to compute starvation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Network link: 1 Gbps Ethernet.
       - Cameras: 8 streams at 4 Mbps each, 30 FPS.
       - Large Model Inference: 8ms per frame.
    2. **Calculations:**
       - Ingest Bandwidth: 8 streams * 4 Mbps = 32 Mbps (3.2% of 1 Gbps link).
       - Decode Rate: 8 * 30 = 240 FPS.
       - Inference Time Requirement: 240 FPS * 8 ms/frame = 1,920 ms of compute needed per second.
       - Max Supported Cameras at 30 FPS: 1000 ms / 8 ms / 30 FPS = 4.16 cameras.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Inference**. Processing 240 frames requires 1.92 seconds of GPU time per real-world second, proving that ML inference is the hard bottleneck.
