title: Diagnosing Model Poisoning in FedAvg
scenario: A federated learning pipeline for edge anomaly detection across 10,000 industrial sensors is
  experiencing global model divergence. In aggregation round 850, the global validation loss suddenly
  jumps from 0.12 to 8.4. Telemetry reveals that 9,950 devices submitted gradients with an L2 norm of
  ~0.3, while a cluster of 50 compromised devices submitted targeted updates with an L2 norm of 25.0.
  The system currently aggregates using standard FedAvg with a global learning rate of 0.1. Analyze why
  standard FedAvg fails in this scenario and determine how the aggregation mechanism must be modified.
details:
  realistic_solution: Implement robust aggregation techniques such as norm clipping (capping L2 norms
    before averaging), coordinate-wise median, or Krum to filter out statistical outliers before they
    corrupt the global model state.
  common_mistake: Assuming that the small ratio of malicious devices (0.5%) means their impact will be
    averaged out by the majority in standard FedAvg without strict bounds.
  napkin_math: 'In standard FedAvg, the malicious weight shift is: (50 * 25.0) / 10,000 = 0.125. The benign
    shift is (9,950 * 0.3) / 10,000 = 0.2985. The malicious nodes skew the global update vector by over
    40% of the legitimate magnitude. If we apply norm clipping at L2=0.5, the malicious impact is capped
    at (50 * 0.5) / 10,000 = 0.0025, which is less than 1% of the total update and preserves convergence.'
