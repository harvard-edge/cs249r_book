title: Diagnosing Model Poisoning in FedAvg
scenario: A federated learning pipeline for edge anomaly detection across 10,000 industrial sensors is experiencing global model divergence. In aggregation round 850, the global validation loss suddenly jumps from 0.12 to 8.4. Telemetry reveals that 9,950 devices submitted gradients with an L2 norm of ~0.3, while a cluster of 50 compromised devices submitted targeted updates with an L2 norm of 25.0. The system currently aggregates using standard FedAvg with a global learning rate of 0.1.
question: Why does FedAvg fail when 50 of 10,000 devices send L2-25 updates, and how should aggregation be modified?
details:
  realistic_solution: Implement Byzantine-robust aggregation techniques such as norm clipping (capping L2 norms before averaging), coordinate-wise median, or Krum to filter out statistical outliers before they corrupt the global model state.
  common_mistake: |
    **The Pitfall:** Assuming that a small ratio of malicious devices (0.5%) will be naturally averaged out.
    **The Rationale:** Candidates underestimate the mathematical leverage that extreme outlier gradients have in an unconstrained FedAvg equation.
    **The Consequence:** Global model poisoning, destroying the predictive accuracy for all 10,000 devices due to a tiny fraction of compromised nodes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10,000 devices (9,950 benign, 50 malicious).
       - Benign L2 norm = 0.3; Malicious L2 norm = 25.0.
       - Standard FedAvg aggregation.
    2. **Calculations:**
       - Malicious weight shift: (50 * 25.0) / 10,000 = 0.125.
       - Benign shift: (9,950 * 0.3) / 10,000 = 0.2985.
       - Malicious leverage: 0.125 / 0.2985 ≈ 42% of legitimate magnitude.
       - With norm clipping at L2=0.5: malicious impact capped at (50 * 0.5) / 10,000 = 0.0025.
    3. **Conclusion & Interpretation:**
       - **Norm clipping reduces malicious impact to <1%. Result: Byzantine-Robust.**
