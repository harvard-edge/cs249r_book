title: On-Device Fine-Tuning Memory Strategy
scenario: We are implementing continuous on-device fine-tuning for a visual anomaly detection model deployed
  on an NVIDIA Jetson Orin to adapt to specific factory lighting conditions. The platform features 32
  GB of shared LPDDR5 memory, an Ampere GPU, and a 60W TDP constraint. However, a standard training forward-pass
  for a high-resolution batch consumes too much memory, threatening to OOM when the factory control software
  is running. Architect a memory-efficient training pipeline that balances forward-pass activation storage,
  gradient checkpointing, and compute overhead to fit within the device constraints.
details:
  realistic_solution: 'A strong L5 candidate will architect a hybrid approach: freezing early, high-resolution
    feature extractor layers to permanently drop their forward-pass activations, and applying selective
    gradient checkpointing to the remaining trainable layers. They will evaluate the tradeoff by identifying
    layers where the activation-size-to-compute ratio is highest, ensuring the re-compute overhead does
    not bottleneck the pipeline or thermal throttle the Jetson Orin.'
  common_mistake: Candidates often suggest aggressively checkpointing every layer to minimize memory without
    considering the re-compute penalty on the 60W TDP. They also frequently overlook the fact that the
    275 TOPS INT8 capability is primarily for inference, whereas fine-tuning requires FP16/FP32, drastically
    altering the compute-memory tradeoff on the Ampere GPU.
  napkin_math: Assume the full model forward pass requires 25 GB of FP16 activation memory, which exceeds
    the available budget when combined with 10 GB of OS/control software (35 GB > 32 GB LPDDR5). Freezing
    the first 70% of the network eliminates the need to store those activations for backprop, dropping
    the memory footprint to ~7.5 GB. For the remaining trainable layers, applying selective gradient checkpointing
    (e.g., checkpointing every 4th layer) further reduces the activation memory to ~2 GB. This comfortably
    fits the 32 GB limit while keeping the re-compute overhead minimal (~10-15% latency increase), operating
    safely within the 60W TDP.
