title: The Autonomous Perception Deadlock
scenario: You are the Principal Engineer for perception systems at a leading autonomous vehicle company. Your team is designing the next-generation compute module, which has a strict, non-negotiable thermal design power (TDP) of 30W to ensure passive cooling.
question: 'How would you choose a perception model for the 30W passively cooled module using effective TOPS/W rather than FLOPs alone?'
details:
  realistic_solution: 'The correct L6+ approach is to formulate a hardware-aware evaluation framework. The goal is not just to pick the model with fewer FLOPs, but the one that yields the highest *effective* performance-per-watt on the target hardware.'
  common_mistake: |
    **The Pitfall:** Focusing solely on peak TOPS or total FLOPs.
    **The Rationale:** Candidates ignore the memory wall and hardware utilization, failing to calculate *effective* TOPS/W.
    **The Consequence:** Picking a model that wastes power on idle silicon leakage, missing the TDP budget or latency deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - TDP limit: 30W; Orin limit at 30W: ~137 INT8 TOPS, ~100 GB/s
    - Detector: 5 TOPS compute, 50MB INT8 model
    - Target: 30 FPS (33.3ms)

    **Calculations:**
    - Compute time = 5 TOPS / 137 TOPS = 36ms
    - Memory time = 50MB / 100GB/s = 0.5ms
    - Total = 36.5ms (> 33.3ms target)
    - Pruning 15% -> 4.25 TOPS -> 31ms compute + 0.5ms = 31.5ms

    **Conclusion & Interpretation:**
    - **Result: Prune by 15% to hit 31.5ms (Thermal-Bound)**. Effective TOPS/W requires considering hardware utilization limits.
