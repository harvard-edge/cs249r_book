title: The Privacy-First Powertrain
scenario: An automotive company wants to improve its in-car voice assistant by training on user commands. Data transfer from the vehicle is possible, but the legal team has major concerns about uploading raw audio clips to the cloud.
question: From an ML systems perspective, what is the primary reason to choose Federated Learning in this scenario?
details:
  realistic_solution: The primary reason is privacy. Federated Learning allows the model to be updated by learning from user data directly on the car's infotainment system. Only the aggregated, anonymized model updates are sent to the cloud, not the raw, sensitive voice recordings.
  common_mistake: |
    **The Pitfall:** Citing network bandwidth savings as the primary justification for Federated Learning.
    **The Rationale:** Engineers prioritize technical resource constraints over legal and ethical mandates.
    **The Consequence:** Failing to recognize that avoiding the centralization of sensitive raw data (privacy) is the non-negotiable requirement that makes the product legally viable.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet size: 1,000,000 vehicles.
       - Raw telemetry volume per vehicle is high.
       - PII risk is catastrophic.
    2. **Calculations:**
       - Fleet Data Volume: 1 million vehicles * ~1 GB/month = 1 Petabyte/month.
    3. **Conclusion & Interpretation:**
       - **Result: Centralizing 1 PB of raw audio violates legal bounds (Privacy-Bound).** Federated Learning is required to prevent PII transfer.
  options:
  - To reduce network bandwidth costs from uploading audio files
  - To enable faster, real-time model updates for the entire fleet
  - To avoid centralizing sensitive user voice data
  - To achieve better model accuracy than centralized training
  correct_index: 2
