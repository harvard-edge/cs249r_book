title: The Privacy-First Powertrain
scenario: An automotive company wants to improve its in-car voice assistant by training on user commands.
  Data transfer from the vehicle is possible, but the legal team has major concerns about uploading raw
  audio clips to the cloud. From an ML systems perspective, what is the **primary** reason to choose Federated
  Learning in this scenario?
question: "From an ML systems perspective, what is the **primary** reason to choose Federated Learning in this scenario?"
details:
  realistic_solution: The primary reason is **privacy**. Federated Learning allows the model to be updated
    by learning from user data directly on the car's infotainment system (the 'edge'). Only the aggregated,
    anonymized model updates are sent to the cloud, not the raw, sensitive voice recordings. This fundamentally
    protects user privacy.
  common_mistake: Confusing secondary benefits like bandwidth savings with the primary driver, which is
    privacy. While FL can reduce network traffic, its core purpose is to enable model training without
    centralizing sensitive raw data, thus mitigating significant privacy risks and regulatory hurdles
    (like GDPR).
  napkin_math: Consider the risk, not just the bits. A fleet of 1 million vehicles might generate nearly
    a Petabyte of voice data per month. While the network transfer cost is high, the financial and reputational
    cost of a single data breach involving millions of private conversations is orders of magnitude higher.
    The privacy guarantee is the enabling factor; bandwidth savings are a bonus.
  options:
  - To reduce network bandwidth costs from uploading audio files
  - To enable faster, real-time model updates for the entire fleet
  - To avoid centralizing sensitive user voice data
  - To achieve better model accuracy than centralized training
  correct_index: 2
