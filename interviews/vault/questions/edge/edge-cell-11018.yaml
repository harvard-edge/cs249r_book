title: 'Dataset Curation: Evaluate Centralized vs Federated Data Curation for Edge Fleet'
scenario: 'You manage 5,000 Jetson Orin (32GB LPDDR5, 275 TOPS INT8) devices deployed in warehouses across
  50 sites. Compare (A) centralized data collection: upload all images for cloud curation, vs (B) federated:
  on-device filtering with only gradient updates uploaded. Evaluate on data quality, bandwidth, privacy,
  and model improvement rate.'
details:
  realistic_solution: 'Key tradeoff: centralized gets full data quality control but costs bandwidth and
    raises privacy concerns. Federated reduces bandwidth 100× but gradients from small local datasets
    (100 images/device) are noisy. Hybrid: on-device pre-filtering + upload curated subset is often optimal.'
  common_mistake: Choosing federated purely for privacy without accounting for the reduced data diversity
    and gradient noise at small per-device dataset sizes.
  napkin_math: 'Each device: 100 images/day × 310KB = 31MB/day. Centralized: 5000 × 31MB = 155GB/day upload.
    At $0.09/GB = $13.95/day = $5,093/year. Federated gradients: 7B model, bf16 = 14GB/update. 5000 devices
    × 14GB = 70TB/day — worse! Practical federated uses gradient compression 100×: 14GB/100 = 140MB/device/day.
    5000 × 140MB = 700GB/day = $22,995/year. Hybrid (upload 20% filtered images): 5000 × 6.2MB = 31GB/day
    = $1,019/year. Winner: hybrid approach on cost.'
