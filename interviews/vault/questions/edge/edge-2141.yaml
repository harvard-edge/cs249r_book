title: Gossip Protocol for Federated Inference on Distributed Jetson Cluster
scenario: Five Jetson Orin modules in a factory edge cluster need to synchronize gradient updates for a 25M parameter (100MB FP32) federated learning model every 10 minutes. They communicate over a 1 Gbps Ethernet switch.
question: For 5 nodes syncing a 100MB model over 1GbE, how do ring all-reduce and gossip protocol compare in latency, and what is the relative overhead?
details:
  realistic_solution: 'Ring all-reduce (N=5): time = 2×(4/5)×100MB / (125 MB/s = 1Gbps)
    = 1.28s. Gossip (2 rounds of pairwise exchange): round 1: each node exchanges
    with neighbor — 5 exchanges of 100MB at 125 MB/s = 0.8s. Round 2: another round
    = 0.8s. Total gossip: ~2 rounds = 1.6s for full convergence. Ring all-reduce is
    faster (1.28s vs 1.6s). However, gossip is more fault-tolerant. For 10-minute
    sync interval, 1.28s communication = 0.21% overhead — negligible either way. Choose
    ring for efficiency; gossip if fault tolerance needed.'
  common_mistake: |
    **The Pitfall:** Relying purely on theoretical bandwidth formulas without considering network latency.
    **The Rationale:** Standard ring all-reduce assumes high-bandwidth, low-latency interconnects (like NVLink), whereas 1 Gbps Ethernet has significant per-hop TCP/IP overhead.
    **The Consequence:** Underestimating the real-world synchronization time on small, standard-networked edge clusters.
  napkin_math: |
    1. **Link bandwidth**: 1 Gbps = 125 MB/s.
    2. **Ring all-reduce time**: 2 * ((N-1)/N) * (Model Size) / Bandwidth = 2 * (4/5) * 100MB / 125MB/s = 1.28s.
    3. **Gossip protocol (2 rounds)**: 2 rounds * (100MB / 125MB/s) = 1.6s.
    4. **Overhead percentage**: 1.28s sync time / 600s interval = **0.21% overhead**.
    5. **Conclusion**: Ring all-reduce is faster (1.28s vs 1.6s), but both represent negligible overhead.
