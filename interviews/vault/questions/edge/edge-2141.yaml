title: Gossip Protocol for Federated Inference on Distributed Jetson Cluster
scenario: 5 Jetson Orin modules in a factory edge cluster communicate over 1 Gbps
  Ethernet. They need to synchronize gradient updates for federated learning of a
  defect detection model every 10 minutes. The model has 25M parameters (FP32 = 100MB).
  Compare ring all-reduce vs gossip protocol communication costs.
question: For 5 Orin nodes syncing a 100MB model every 10 minutes over 1GbE, how do
  ring all-reduce and gossip compare?
details:
  realistic_solution: 'Ring all-reduce (N=5): time = 2×(4/5)×100MB / (125 MB/s = 1Gbps)
    = 1.28s. Gossip (2 rounds of pairwise exchange): round 1: each node exchanges
    with neighbor — 5 exchanges of 100MB at 125 MB/s = 0.8s. Round 2: another round
    = 0.8s. Total gossip: ~2 rounds = 1.6s for full convergence. Ring all-reduce is
    faster (1.28s vs 1.6s). However, gossip is more fault-tolerant. For 10-minute
    sync interval, 1.28s communication = 0.21% overhead — negligible either way. Choose
    ring for efficiency; gossip if fault tolerance needed.'
  common_mistake: Using ring all-reduce formula for a small cluster without considering
    that 1 Gbps Ethernet has significant per-hop latency that dominates for small
    N.
  napkin_math: 'Ring all-reduce: 2×(4/5)×100MB/125MB/s = 1.28s. Gossip (2 rounds):
    2 × (5 pairs × 100MB/125MB/s / 5 parallel) = 2 × 0.8s = 1.6s. Overhead: 1.28s
    per 600s sync = 0.21%. Both trivial; choose ring for lower latency.'
