title: 'Model Size Estimation: Master Memory Tradeoff for Precision vs. Context Length on Orin'
scenario: 'You must choose between two precision configurations for a 1B LLM on Jetson Orin used in a real-time assistant: (A) INT8 weights + FP16 KV-cache, (B) INT4 weights + FP16 KV-cache. Evaluate: model memory, maximum context length per user, TPOT, and accuracy implications. Also determine which configuration supports 10 concurrent users with 2048-token context.'
question: What is the FP16 KV-cache memory per token for a 1B LLM with 32 layers, 32 KV heads, and head_dim 32?
details:
  realistic_solution: 'KV cache per token with head_dim=32: 2 * 32 layers * 32 heads * 32 head_dim * 2B = 131,072 bytes = 128KB per token.'
  common_mistake: |
    **The Pitfall:** Assuming INT4 compute provides direct speedups over INT8.
    **The Rationale:** Candidates assume lower precision always accelerates execution.
    **The Consequence:** Ignoring that INT4 weights on Jetson Orin's CPU/GPU don't directly speed up inference if the hardware dequantizes INT4 to INT8 anyway — the benefit is purely reduced memory, not compute.
  napkin_math: |
    1. **Assumptions & Constraints:** 1B LLM, 32 layers, 32 KV heads, head_dim 32. FP16 KV-cache (2 bytes per param).
    2. **Calculations:** KV per token = 2 (K & V) * 32 (layers) * 32 (heads) * 32 (head_dim) * 2 (bytes) = 131,072 bytes. 131,072 / 1024 = 128 KB.
    3. **Conclusion & Interpretation:** **The FP16 KV-cache requires exactly 128 KB per token. Result: Memory-Capacity-Bound.**
