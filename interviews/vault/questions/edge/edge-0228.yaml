title: 'The Edge Efficiency Metric: GPU Compute Architecture'
scenario: You are mentoring a new engineer on your autonomous vehicle perception team comparing edge accelerators like the NVIDIA Jetson AGX Orin. The spec sheet lists peak compute in TOPS and power consumption in Watts.
question: What fundamental metric should be used to identify the compute efficiency of the chip for a power-constrained vehicle platform?
details:
  realistic_solution: The most important metric for compute efficiency is TOPS/W (Trillion Operations Per Second, Per Watt). This value tells you how much computational work the chip can do for every watt of power it consumes. A higher TOPS/W ratio indicates a more efficient architecture, which is critical for edge devices where power and thermal budgets are strictly limited.
  common_mistake: |
    **The Pitfall:** Fixating on the headline peak TOPS number.
    **The Rationale:** Engineers from cloud backgrounds assume more compute is always better without considering thermal budgets.
    **The Consequence:** Choosing an inefficient chip that overheats and severely performance throttles in the field.
  napkin_math: |
    * Jetson AGX Orin peak compute: 275 TOPS (INT8)
    * Maximum power: 60W
    * **Compute efficiency: 275 TOPS / 60W = 4.58 TOPS/Watt.**
  options:
  - Peak TOPS
  - Total Power Consumption (W)
  - TOPS/W
  - Memory Bandwidth (GB/s)
