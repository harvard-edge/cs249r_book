title: Diagnosing Federated Quantization Divergence
scenario: You are deploying federated learning for a 25M parameter predictive text model across 10,000
  edge devices over constrained LTE networks. The FP32 gradient updates require 100MB per client round.
  To mitigate this, your team applies deterministic uniform 8-bit quantization to the gradients. However,
  after deployment, you observe that training stalls and the global model fails to converge, despite the
  exact same hyperparameters working perfectly in a centralized FP32 simulation. How do you analyze this
  failure, and what specific characteristics of the quantized gradients are causing the stall?
question: "How do you analyze this failure, and what specific characteristics of the quantized gradients are causing the stall?"
details:
  realistic_solution: Diagnose the systematic bias (mean error != 0) caused by deterministic rounding
    zeroing out small updates. Implement stochastic rounding (e.g., QSGD) or local error feedback so that
    the expected value of the quantized gradient equals the true gradient (E[Q(g)] = g).
  common_mistake: Suspecting learning rate issues or client data heterogeneity (non-IID data), failing
    to analyze the statistical bias introduced by deterministic rounding on heavy-tailed, near-zero gradient
    distributions.
  napkin_math: 'FP32 gradient = 1e-4. 8-bit uniform bin size = 1e-3. Deterministic rounding: Q(1e-4) =
    0. Aggregated over 10K clients: 10,000 * 0 = 0 (stalled). Stochastic rounding: P(Q=1e-3) = 1e-4 /
    1e-3 = 0.1. Expected Aggregation: 10,000 * (0.1 * 1e-3) = 1.0 (recovers true unbiased sum of 10K *
    1e-4).'
