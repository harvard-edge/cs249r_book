title: Diagnosing Federated Quantization Divergence
scenario: You are deploying federated learning for a 25M parameter predictive text model across 10,000 edge devices over constrained LTE networks. The FP32 gradient updates require 100MB per client round. To mitigate this, your team applies deterministic uniform 8-bit quantization to the gradients. However, after deployment, you observe that training stalls and the global model fails to converge, despite the exact same hyperparameters working perfectly in a centralized FP32 simulation.
question: How do you analyze this failure, and what specific characteristics of the quantized gradients are causing the stall?
details:
  realistic_solution: Diagnose the systematic bias (mean error != 0) caused by deterministic rounding zeroing out small updates. Implement stochastic rounding (e.g., QSGD) or local error feedback so that the expected value of the quantized gradient equals the true gradient (E[Q(g)] = g).
  common_mistake: |
    **The Pitfall:** Suspecting learning rate issues or client data heterogeneity (non-IID data) instead of quantization artifacts.
    **The Rationale:** In standard distributed training, non-IID data and learning rates are the usual culprits for divergence.
    **The Consequence:** Wasting time tuning hyperparameters while the fundamental statistical bias from deterministic rounding remains unfixed.
  napkin_math: |
    - **Quantization Scale:** FP32 gradient = 1e-4, 8-bit uniform bin size = 1e-3.
    - **Deterministic Rounding:** Q(1e-4) = 0. Over 10K clients: 10,000 * 0 = 0 (stalled).
    - **Stochastic Rounding:** P(Q=1e-3) = 1e-4 / 1e-3 = 0.1.
    - **Expected Aggregation:** 10,000 * (0.1 * 1e-3) = **1.0** (recovers the true unbiased sum).
