title: 'Dataset Curation: Mastery — Federated Learning Data Strategy for Industrial Edge Fleet'
scenario: You are designing a federated learning data strategy for 50,000 Jetson Orin (32GB LPDDR5, 275 TOPS, 60W) devices deployed in manufacturing. Each device sees site-specific defect patterns (non-IID data). The global model must achieve 95% defect detection precision.
question: What federated learning data strategy would you use for 50,000 non-IID Jetson Orin devices to reach 95% defect precision?
details:
  realistic_solution: '1) Measure heterogeneity. 2) Local curation: blur/dup filter, keep uncertain samples. 3) Aggregation: FedProx or per-cluster FedAvg to handle non-IID data. 4) Personalization: fine-tune global model locally on 100 site-specific examples. 5) Privacy: DP-SGD.'
  common_mistake: |
    **The Pitfall:** Applying FedAvg naively on non-IID data.
    **The Rationale:** Engineers assume standard federated aggregation works out-of-the-box regardless of severe local data distribution skew.
    **The Consequence:** The global model performs poorly across all individual sites because it averages inherently disjoint defect distributions.
  napkin_math: |
    - **Data Scale:** 50K devices × 50 labeled samples/device = 2.5M total samples.
    - **Aggregation:** 10% participation = 5,000 devices/round. Gradient upload for 7M param model (compressed 10×) = 2.8MB/device.
    - **Network Time:** 5,000 × 2.8MB = 14GB/round. At 1.25 GB/s server bandwidth = 11.2 seconds/round. 100 rounds ≈ 19 minutes.
    - **Local Personalization Compute:** 100 examples × 5 epochs × 7M params × 6 FLOPs = 21B FLOPs. At 275 TOPS = 76 µs.
    - **Final Result:** **Careful FedProx aggregation and rapid local fine-tuning allows convergence across highly heterogeneous edge devices in ~19 minutes.**
