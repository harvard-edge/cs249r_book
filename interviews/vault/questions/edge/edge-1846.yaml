title: Edge TPU Object Detection Cost Analysis
scenario: Your company plans to deploy a real-time object detection system in 100
  factory locations. Each location will use a single Google Coral Edge TPU (4 TOPS
  INT8, 2W power consumption for the accelerator itself, INT8 only) for inferencing
  a MobileNetV2-SSD model. The system needs to run 24/7. Assuming the host device
  (e.g., Raspberry Pi) consumes an additional 5W and the Edge TPU is effectively utilized
  75% of the time, estimate the total annual electrical cost for operating these 100
  units. Assume an average electricity cost of $0.15 per kWh.
question: What is the annual electricity cost for 100 Coral Edge TPU factory deployments
  running 24/7 with a 5W host and 75% utilization?
details:
  realistic_solution: 'A realistic solution would involve breaking down the problem
    into individual components: first, calculating the total power draw per unit (Edge
    TPU + host). Second, factoring in the utilization rate to get effective power
    consumption. Third, scaling this up for all 100 units over a year. Finally, converting
    total energy consumption (Wh to kWh) to monetary cost using the provided rate.
    Emphasize that actual measurement and profiling are crucial in real deployments.'
  common_mistake: Candidates often only consider the power consumption of the accelerator,
    neglecting the host device (Raspberry Pi, etc.) or failing to account for real-world
    utilization rates which can significantly impact energy costs and overall efficiency.
    They might also mistakenly try to estimate FLOPs for the entire model rather than
    focusing on the operations that will actually run on the Edge TPU, or assume 100%
    utilization.
  napkin_math: "1. Power per unit (Edge TPU + Host): 2W + 5W = 7W. \n2. Effective\
    \ power per unit (with 75% utilization): 7W * 0.75 = 5.25W. \n3. Total effective\
    \ power for 100 units: 5.25W/unit * 100 units = 525W = 0.525 kW. \n4. Total operational\
    \ hours per year: 24 hours/day * 365 days/year = 8760 hours/year. \n5. Total annual\
    \ energy consumption: 0.525 kW * 8760 hours/year = 4599 kWh. \n6. Total annual\
    \ electrical cost: 4599 kWh * $0.15/kWh = $689.85."
