title: 'Edge TPU Object Detection Cost Analysis'
scenario: 'Your company plans to deploy a real-time object detection system in 100 factory locations. Each location will use a single Google Coral Edge TPU (4 TOPS INT8, 2W power consumption) for inferencing a MobileNetV2-SSD model. The system needs to run 24/7. Assuming the host device consumes an additional 5W and the Edge TPU is effectively utilized 75% of the time, estimate the total annual electrical cost.'
question: 'What is the annual electricity cost for 100 Coral Edge TPU factory deployments running 24/7 with a 5W host and 75% utilization?'
details:
  realistic_solution: 'Break down the problem into individual components: calculate total power draw per unit (Edge TPU + host), factor in utilization rate, scale for all 100 units over a year, and convert total energy consumption (Wh to kWh) to monetary cost.'
  common_mistake: 'Candidates often only consider the power consumption of the accelerator, neglecting the host device or failing to account for real-world utilization rates.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Units: 100.
    - Power: 2W TPU + 5W Host = 7W per unit.
    - Utilization: 75%.
    - Hours: 8,760/year. Cost: $0.15/kWh.

    **Calculations:**
    - Effective power per unit: 7W * 0.75 = 5.25W.
    - Fleet effective power: 5.25W * 100 = 525W = 0.525 kW.
    - Fleet energy: 0.525 kW * 8760 hours = 4,599 kWh.
    - Annual cost: 4,599 kWh * $0.15 = $689.85.

    **Conclusion & Interpretation:**
    - **Result: $689.85/year (Power-Bound)**. Accounting for real-world utilization ensures accurate OpEx forecasting.
