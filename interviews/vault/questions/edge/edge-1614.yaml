title: Hailo-8 Dataflow Streaming Bandwidth and Throughput Calculation
scenario: You are migrating an object detection model from a conventional edge GPU to a Hailo-8 dataflow accelerator to drastically reduce power consumption. Your quantized INT8 model requires 13 GOPS per frame and processes a 1 MB input tensor.
question: What theoretical maximum FPS and minimum host-memory read bandwidth are needed for the 13 GOPS/frame, 1 MB input model on Hailo-8?
details:
  realistic_solution: 'Divide the accelerator''s peak compute capacity by the per-frame compute requirement. Because the Hailo-8 relies on a dataflow architecture without its own local DRAM, the host system must continuously stream the input tensors to keep the compute units fed. The minimum required host memory bandwidth is found by multiplying the maximum FPS by the input tensor size.'
  common_mistake: |
    **The Pitfall:** Overlooking the host streaming bandwidth requirement.
    **The Rationale:** Candidates are accustomed to discrete GPUs with local VRAM and ignore the dataflow architecture's reliance on host I/O.
    **The Consequence:** The system becomes completely I/O bottlenecked, failing to achieve the theoretical TOPS.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute capability: 26 TOPS (26,000 GOPS)
       - Model compute: 13 GOPS/frame
       - Input tensor: 1 MB/frame
    2. **Calculations:**
       - Max FPS = 26,000 GOPS / 13 GOPS/frame = 2,000 FPS
       - Required Bandwidth = 2,000 FPS * 1 MB/frame = 2,000 MB/s (2.0 GB/s)
    3. **Conclusion & Interpretation:**
       - **Result: 2,000 FPS and 2.0 GB/s.** To sustain peak compute, the host must provide at least 2.0 GB/s of continuous read bandwidth.
