title: Incomplete Federated Edge Fleet Plan
scenario: A factory wants federated learning across 2,000 edge devices attached to cameras. Each device has a 20 Mbps uplink during off-hours, but the project plan omits update size, client availability, straggler policy, privacy requirements, and whether labels are available locally.
question: What missing information determines if the federated edge fleet plan is feasible, and what is the uplink capacity bound?
details:
  realistic_solution: Each camera can upload at most 20 Mbps, or 2.5 MB/s, during its available window. Without update size and availability, round time cannot be computed. You also need label availability, non-IID skew, privacy mechanism, and aggregation bandwidth.
  common_mistake: |
    **The Pitfall:** Assuming federated learning is feasible merely because devices possess network uplinks.
    **The Rationale:** Candidates fail to realize that federated learning requires strictly bounded update sizes and, critically, local ground-truth labels for training.
    **The Consequence:** The project inevitably fails when engineers discover the edge devices have no mechanism to acquire the labels needed for on-device backpropagation.
  napkin_math: |
    * **Uplink Capacity:** 20 Mbps = 2.5 MB/s.
    * **Bound Calculation:** A hypothetical 100 MB model update would require 100 MB / 2.5 MB/s = **40 seconds per client** under perfect conditions.
    * **Conclusion:** While the uplink time is feasible, the lack of information regarding local labels and update sizes makes the overall architecture unviable.
