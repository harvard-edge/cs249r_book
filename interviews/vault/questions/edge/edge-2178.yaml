title: Incomplete Federated Edge Fleet Plan
scenario: A factory wants federated learning across 2,000 edge devices attached to
  cameras. Each device has local images and a 20 Mbps uplink during off-hours, but
  the team omits update size, client availability, straggler policy, privacy requirements,
  and whether labels are available locally.
question: What missing information determines whether 2,000 edge cameras can participate
  in federated learning, and what uplink bound can you compute?
details:
  realistic_solution: Each camera can upload at most 20 Mbps, or 2.5 MB/s, during
    its available window. Without update size and availability, round time cannot
    be computed. You also need label availability, non-IID skew, privacy mechanism,
    dropout tolerance, and aggregation bandwidth. The known bound is per-client upload
    capacity, not training feasibility.
  common_mistake: Assuming federated learning is feasible because devices have uplinks,
    without knowing update size or local supervision.
  napkin_math: 20 Mbps = 2.5 MB/s. A 100 MB update would take 40 seconds per available
    client before protocol overhead.
