title: 'The Foggy Lens Confidence Collapse: Data Pipeline Engineering'
scenario: Your outdoor wildlife monitoring system uses 500 Coral Dev Board Minis (MediaTek 8167s, Edge
  TPU, 2 GB RAM) with IP67-rated cameras. After 3 months, 60 devices in humid coastal regions report a
  gradual decline in detection confidence — mean confidence drops from 0.82 to 0.35 over 2 weeks, then
  detections stop entirely. The model file is unchanged. What's happening, and how do you prevent it?
details:
  realistic_solution: Condensation is forming on the camera lens. The IP67 enclosure is sealed against
    water ingress, but humidity enters through the cable gland during warm days and condenses on the cooler
    lens surface overnight. Over weeks, mineral deposits from repeated condensation cycles create a permanent
    haze.
  common_mistake: '"The model is drifting — retrain on recent data." The model hasn''t changed. Retraining
    on blurry images would teach the model to accept degraded input, masking the real problem.'
  napkin_math: 'Laplacian variance computation on the ARM CPU: 640×480 image, 3×3 kernel convolution =
    640 × 480 × 9 = 2.76M multiply-adds. At 1.2 GHz ARM Cortex-A35: ~2.3ms — negligible vs the 15ms Edge
    TPU inference. Lens heater cost: $0.80/unit × 500 = $400. Desiccant packs: $0.20/unit × 500 = $100.
    Truck roll to clean 60 foggy cameras: 60 × $150 = $9,000. Prevention cost: $500 total. Savings: $8,500
    on the first incident alone.'
