title: Calculate peak power difference between data center and edge accelerators
scenario: A retail store wants to process 4 video streams using local hardware. They are considering deploying one A100 80GB SXM (400W) or two Jetson AGX Orins (60W each max power mode).
question: Calculate the difference in peak power consumption between the two hardware deployment choices.
details:
  realistic_solution: The A100 operates at a peak of 400W. Two Jetson AGX Orins operate at 60W each, totaling 120W for the edge deployment. The difference in peak power consumption is 400W - 120W = 280W.
  common_mistake: |
    **The Pitfall:** Comparing the power of a single edge device instead of the full cluster required to replace the cloud accelerator.
    **The Rationale:** Candidates misread the deployment sizing and compare units 1:1.
    **The Consequence:** Cost and thermal estimates for edge deployments are severely underestimated.
  napkin_math: |
    - Cloud A100 power: 400W.
    - Edge Jetson power: 2 units * 60W = 120W.
    - Difference: 400 - 120 = **280W savings**.
