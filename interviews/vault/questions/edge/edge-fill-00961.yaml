title: Optimizing CNN Inference on Hailo-8 for Edge Deployment
scenario: You are deploying a new computer vision model (a large CNN) to an edge device powered by the
  Hailo-8 AI accelerator. The Hailo-8 provides up to 26 TOPS (Tera-Operations Per Second) for INT8 operations
  with a typical power consumption of 2.5W. Your model needs to process 30 frames per second with minimal
  latency, and the device has strict power constraints. Describe how you would analyze the execution order
  of operators within your CNN to optimize for memory reuse, parallel execution, and layer fusion scheduling
  specifically for the Hailo-8 architecture. Explain the WHY behind your choices, considering its dataflow
  architecture and lack of external DDR.
details:
  realistic_solution: 'The solution involves leveraging Hailo-8''s proprietary dataflow compiler. This
    would entail: 1. **Graph Analysis for Fusion:** Identify sequences of operators (e.g., Conv-BN-ReLU)
    that can be fused into a single ''super-layer'' to reduce intermediate memory writes and reads. The
    Hailo-8''s internal memory architecture benefits greatly from this, as it avoids external DDR accesses.
    2. **Memory Reuse Scheduling:** Analyze the data dependencies between layers to schedule operations
    such that the outputs of one layer can be immediately consumed by the next, maximizing on-chip memory
    reuse and minimizing overall memory footprint. This is crucial given the absence of external DDR.
    3. **Parallel Execution Orchestration:** The dataflow architecture allows for fine-grained parallelism.
    Schedule independent computational graphs or subgraphs to execute concurrently on different processing
    elements to maximize throughput. This requires careful mapping of the neural network graph onto the
    Hailo-8''s compute fabric. 4. **Profiling and Iteration:** Use Hailo''s provided profiling tools to
    identify bottlenecks in the initial schedule (e.g., stalls, excessive memory transfers) and iteratively
    refine the operator scheduling and fusion strategies to meet the latency and power targets.'
  common_mistake: A common mistake is to only focus on quantizing the model to INT8 without considering
    the hardware-specific optimizations. Naively scheduling operations without understanding the Hailo-8's
    dataflow and memory management can lead to inefficient data movement, underutilization of processing
    units, and higher power consumption due to frequent memory accesses or unnecessary recomputations,
    failing to meet the FPS and power targets.
  napkin_math: "Given 26 TOPS (INT8) and a target of 30 FPS, if a CNN requires, say, 100 Giga-Operations\
    \ (GOPS) per inference: \n- GOPS per second = 100 GOPS/frame * 30 frames/sec = 3000 GOPS/sec = 3 TOPS.\n\
    - Hailo-8 capacity = 26 TOPS. \n- Utilization = 3 TOPS / 26 TOPS ≈ 11.5%. \nWhile this indicates the\
    \ raw compute capacity is sufficient, achieving this efficiently requires minimal data movement. If\
    \ each GOPS involved, for example, 0.5 bytes of memory access, then 3 TOPS implies 1.5 TB/s of memory\
    \ bandwidth, which is far beyond typical external DDR. This simple math highlights the necessity of\
    \ **on-chip memory reuse** and **dataflow-optimized scheduling** to keep data local and avoid memory\
    \ bottlenecks, thereby maintaining low power (2.5W) and high FPS."
