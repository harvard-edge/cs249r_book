title: The Sensor Bandwidth Bottleneck
scenario: An autonomous vehicle perception team is debugging training-serving skew. Their training data consists of pristine, uncompressed 4K images. In the vehicle, the model gets its input directly from a high-resolution camera connected via a standard 4-lane MIPI CSI-2 interface.
question: What is the approximate maximum data rate a standard 4-lane MIPI CSI-2 camera interface can sustain?
details:
  realistic_solution: A standard 4-lane MIPI CSI-2 interface, common in automotive and edge applications, can sustain a data rate of approximately 2.5 GB/s. Knowing this physical limit is the first step in diagnosing data quality issues. If a high-resolution, high-framerate camera produces data exceeding this rate, the interface itself becomes a bottleneck, forcing either lossy compression or frame drops before the data even reaches system memory. This creates a fundamental difference between the 'perfect' training data and the 'real' serving data.
  common_mistake: |
    **The Pitfall:** Underestimating the bandwidth of modern sensor interfaces.
    **The Rationale:** Engineers often confuse specialized camera interfaces with slower peripheral speeds (like USB/SPI) or faster system memory speeds.
    **The Consequence:** This knowledge gap prevents them from correctly identifying the physical layer as a potential source of compression-induced training-serving skew.
  napkin_math: |
    1. **Interface Bandwidth**: A MIPI CSI-2 (4-lane) interconnect is rated for **~2.5 GB/s**.
    2. **Payload Size**: A single uncompressed 4K RAW12 frame (3840x2160) is ~12.4 MB.
    3. **Required Bandwidth**: At 60 FPS, this requires 12.4 MB * 60 = ~746 MB/s.
    4. **Conclusion**: 746 MB/s is well within the 2.5 GB/s capacity, but 8K or multi-camera setups could easily saturate the link, necessitating lossy compression that causes training-serving skew.
  options:
  - ~25 MB/s
  - ~250 MB/s
  - ~2.5 GB/s
  - ~25 GB/s
