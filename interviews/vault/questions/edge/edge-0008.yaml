title: The Sensor Bandwidth Bottleneck
scenario: An autonomous vehicle perception team is debugging training-serving skew. Their training data
  consists of pristine, uncompressed 4K images. In the vehicle, the model gets its input directly from
  a high-resolution camera connected via a standard 4-lane MIPI CSI-2 interface. To diagnose a potential
  data quality bottleneck, what is the approximate maximum data rate this camera interface can sustain?
question: "To diagnose a potential data quality bottleneck, what is the approximate maximum data rate this camera interface can sustain?"
details:
  realistic_solution: A standard 4-lane MIPI CSI-2 interface, common in automotive and edge applications,
    can sustain a data rate of approximately 2.5 GB/s. Knowing this physical limit is the first step in
    diagnosing data quality issues. If a high-resolution, high-framerate camera produces data exceeding
    this rate, the interface itself becomes a bottleneck, forcing either lossy compression or frame drops
    before the data even reaches system memory. This creates a fundamental difference between the 'perfect'
    training data and the 'real' serving data.
  common_mistake: Engineers often underestimate the bandwidth of modern sensor interfaces or confuse them
    with other system buses. They might recall slower peripheral speeds (like USB or SPI, ~100s of MB/s)
    or faster system memory speeds (~100s of GB/s), failing to recognize that MIPI CSI-2 has its own distinct
    multi-GB/s sweet spot. This knowledge gap prevents them from correctly identifying the physical layer
    as a potential source of training-serving skew.
  napkin_math: From the 'Edge Hardware Snapshot', the MIPI CSI-2 (4-lane) interconnect is rated for ~2.5
    GB/s. A single uncompressed 4K RAW12 frame (3840x2160) is ~12.4 MB. At 60 FPS, this requires ~746
    MB/s, which is well within the bus's capacity. However, a higher resolution 8K camera or a multi-camera
    setup could easily saturate this link, making it a critical number to know when diagnosing data quality
    degradation between training and serving.
  options:
  - ~25 MB/s
  - ~250 MB/s
  - ~2.5 GB/s
  - ~25 GB/s
  correct_index: 2
