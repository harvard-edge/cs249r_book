title: The WCET Analysis Wall
scenario: Your team must certify a neural network for an ASIL-B automotive braking
  assistant running on an NXP S32Z2 real-time processor (Cortex-R52, 800 MHz, no cache,
  tightly-coupled memory). The safety assessor demands a WCET bound for every inference.
  Your ML engineer runs the model 10,000 times and reports 'max observed latency is
  4.2ms.' The assessor rejects this. Why is measurement-based WCET insufficient for
  safety certification, and what does a valid WCET analysis require for a neural network?
question: Why is measurement-based WCET insufficient for safety certification, and
  what does a valid WCET analysis require for a neural network?
details:
  realistic_solution: 'Measurement-based WCET fails because it cannot prove coverage
    of all execution paths. A neural network has data-dependent execution time even
    on fixed architectures: (1) Activation-dependent branches — ReLU creates zero
    values that some hardware skips (sparse acceleration), making execution time input-dependent.
    (2) Memory access patterns — even with tightly-coupled memory (no cache), DMA
    contention from other bus masters (CAN controller, sensor interfaces) creates
    variable access latency. (3) Interrupt preemption — higher-priority interrupts
    (wheel speed sensor, watchdog) preempt inference mid-computation. Valid WCET analysis
    requires static analysis (abstract interpretation of the binary, modeling all
    pipeline states) combined with hardware timing models specific to the Cortex-R52''s
    deterministic pipeline. For neural networks, this means: (a) eliminate all data-dependent
    control flow (no dynamic sparsity, no early exit), (b) use only operations with
    bounded execution time (fixed-point MAC, no division), (c) model DMA bus contention
    using the processor''s memory protection unit (MPU) to reserve bandwidth. The
    resulting WCET bound will be pessimistic — perhaps 6.5ms vs the 4.2ms observed
    — but it''s *provably safe*.'
  common_mistake: '"Run it enough times and the max observed value is the WCET." Measurement-based
    timing captures *typical* worst cases but cannot guarantee the *absolute* worst
    case — which is what safety certification requires.'
  napkin_math: 'Cortex-R52 at 800 MHz, dual-issue: ~1.6 GOPS peak (INT8 MAC). MobileNet-V2
    INT8: ~300M MACs. Theoretical minimum: 300M / 1.6G = 187ms — wait, that''s too
    slow. With the R52''s SIMD (Helium-like NEON): 4 INT8 MACs/cycle × 800M cycles/sec
    = 3.2 GOPS → 300M / 3.2G = 93ms. Observed average: 4.2ms suggests a much smaller
    model (~15M MACs). Static WCET bound adds ~55% pessimism for bus contention and
    interrupt preemption: 4.2ms × 1.55 = 6.5ms. Safety margin for ASIL-B: WCET × 1.2
    = 7.8ms. If your braking deadline is 10ms, you have 2.2ms of headroom — tight
    but certifiable.'
