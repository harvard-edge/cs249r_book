title: The WCET Analysis Wall
scenario: >-
  Your team must certify a neural network for an ASIL-B automotive braking assistant running on an NXP S32Z2 real-time processor (Cortex-R52, 800 MHz, no cache, tightly-coupled memory). The safety assessor demands a WCET (Worst-Case Execution Time) bound for every inference. Your ML engineer runs the model 10,000 times and reports 'max observed latency is 4.2ms.' The assessor rejects this.
question: Why is measurement-based WCET insufficient for safety certification, and what does a valid WCET analysis require for a neural network?
details:
  realistic_solution: 'Measurement-based WCET fails because it cannot prove coverage of all execution paths. A neural network has data-dependent execution time even on fixed architectures (sparse acceleration, DMA contention from other bus masters, interrupt preemption). Valid WCET analysis requires static analysis (abstract interpretation of the binary) combined with hardware timing models. For NNs, this means eliminating all data-dependent control flow, using only bounded operations, and explicitly modeling DMA bus contention.'
  common_mistake: |
    **The Pitfall:** Relying purely on empirical measurement for hard real-time safety guarantees.
    **The Rationale:** ML engineers assume that if they run an inference 10,000 times, the maximum observed value securely captures the "worst case."
    **The Consequence:** Measurement-based timing only captures typical worst cases, failing to guarantee the absolute, provably safe upper bound required for automotive (ASIL-B) certification.
  napkin_math: |
    1. **Processor Specs:** Cortex-R52 at 800 MHz, dual-issue with SIMD: `4 INT8 MACs/cycle * 800M cycles/sec = 3.2 GOPS` peak.
    2. **Observed Latency:** 4.2ms observed average implies a model size of roughly `~13.4M MACs` (at 100% utilization).
    3. **Static WCET Margin:** Static WCET bound adds ~55% pessimism for theoretical bus contention and interrupt preemption: `4.2ms * 1.55 = 6.5ms`.
    4. **Safety Margin:** ASIL-B requires a further safety margin: `WCET * 1.2 = 7.8ms`.
    5. **Result:** If the braking deadline is 10ms, the provable **7.8ms WCET** provides 2.2ms of certifiable headroom.
