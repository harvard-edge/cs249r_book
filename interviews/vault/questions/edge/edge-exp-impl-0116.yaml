title: Hailo-8 Compute Bound FPS Calculation
scenario: We are deploying a real-time object detection model to an edge gateway equipped with a Hailo-8
  dataflow accelerator. The Hailo-8 is rated for 26 TOPS (INT8) at a highly efficient 2.5W power envelope,
  but it lacks local DRAM, meaning all operations must be streamed directly from host memory. Assuming
  a model that requires 52 GOPS per inference pass, and a sustained compute utilization of 80% over the
  streaming pipeline, calculate the theoretical maximum frame rate (FPS) limited purely by the accelerator's
  compute capacity.
question: "What is the maximum compute-bound FPS for a 52 GOPS model on Hailo-8 at 80% utilization?"
details:
  realistic_solution: The candidate should identify that TOPS and GOPS must be converted to the same base
    unit. By taking the Hailo-8's 26 TOPS and applying the 80% utilization factor, we get the effective
    operations per second. Dividing this effective compute capacity by the operations required per frame
    yields the maximum frames per second. A strong candidate will also mention that because the Hailo-8
    has no local DRAM, reaching this 400 FPS compute limit in practice heavily depends on the host streaming
    interface preventing data starvation.
  common_mistake: Candidates often divide the TOPS directly by the GOPS without aligning the units (Tera
    vs Giga), resulting in off-by-1000 errors. Another common mistake is ignoring the 80% utilization
    constraint or attempting to overcomplicate the math by calculating PCIe bandwidth limits when the
    prompt explicitly asks for the compute-bound ceiling.
  napkin_math: '1. Theoretical Compute = 26 TOPS = 26,000 GOPS.

    2. Effective Compute = 26,000 GOPS * 0.80 (utilization) = 20,800 GOPS.

    3. Compute required per frame = 52 GOPS.

    4. Maximum FPS = 20,800 GOPS / 52 GOPS/frame = 400 FPS.

    (Bonus insight: 400 FPS @ 2.5W = 160 FPS per Watt).'
