title: Interrupt Latency Spikes in Real-Time Edge Inference
scenario: A Hailo-8 (26 TOPS INT8, 2.5W) edge device runs ResNet-50 inference triggered by sensor interrupts.
  Average inference latency is 3ms but P99 is 40ms. The device also handles network I/O and a logging
  daemon. The 40ms tail correlates with network packet bursts.
question: "Why does Hailo-8 ResNet-50 P99 latency hit 40ms during network bursts, and how would you reduce the host-side tail latency?"
details:
  realistic_solution: 'Isolate CPU cores: dedicate one core to inference request dispatching using CPU
    affinity, disable interrupt coalescing for the inference trigger, and move network I/O to a separate
    core. Use a real-time scheduling policy (SCHED_FIFO) for the inference dispatch thread.'
  common_mistake: Attributing the tail latency to the Hailo-8 inference engine itself. The Hailo-8 is
    a fixed-function accelerator that processes requests deterministically; the latency is in the host
    CPU queuing.
  napkin_math: 'Network burst at 1Gbps lasts ~100μs per 12.5KB packet. If the logging daemon holds the
    CPU for 5ms during a write, and inference interrupt arrives during that window, queuing delay = 5ms.
    At 1% burst frequency, this explains P99. Hailo-8 at 26 TOPS: ResNet-50 (4 GOPs) takes 4G/26T = 0.15ms
    — the accelerator is not the bottleneck.'
