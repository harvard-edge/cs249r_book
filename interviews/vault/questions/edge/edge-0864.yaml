title: Maritime LLM LoRA Reconciliation over VSAT
scenario: A fleet of cargo ships runs a 7B predictive maintenance LLM (14GB INT8) on local edge servers
  (RTX 4000 Ada). Ships operate entirely offline for up to 45 days, continuously training local LoRA adapters
  (Rank 16, 32MB) on ship-specific telemetry. Upon reconnecting via a highly constrained 2 Mbps VSAT link,
  a ship discovers the central server has advanced the global base model from v1.0 to v2.0. Evaluate the
  trade-offs of different reconciliation protocols to safely integrate the ship's 45-day local adaptations
  with the new global v2.0 state, given that transmitting the 500GB of raw accumulated telemetry is strictly
  impossible.
details:
  realistic_solution: Use on-device teacher-student distillation. The central server transmits the new
    v2.0 base model delta. The ship uses its frozen v1.0 base + v1.0 LoRA as a teacher to label a small
    replay buffer of local telemetry, then trains a new v2.0-compatible LoRA adapter locally using the
    v2.0 base. This cleanly reconciles state without raw data transfer.
  common_mistake: Assuming local LoRA weights trained on base v1.0 can be naively averaged with or directly
    attached to the new v2.0 base model, which ignores hidden state representation drift and catastrophically
    breaks the learned local engine anomalies.
  napkin_math: 'Raw Telemetry Transfer: 500 GB * 8000 Mb/GB / 2 Mbps = 2,000,000 seconds (~23 days, impossible).
    Base Model Transfer (14GB v2.0): 14 GB * 8000 Mb/GB / 2 Mbps = 56,000 seconds (~15 hours, feasible
    via background port Wi-Fi or extended VSAT). Distillation on RTX 4000 Ada (20 TFLOPs) for a 32MB adapter
    takes < 2 hours locally.'
  options:
  - Assuming local LoRA weights trained on base v1.0 can be naively averaged with or directly attached
    to the new v2.0 base model, which ignores hidden state representation drift and catastrophically breaks
    the learned local engine anomalies.
  - Use on-device teacher-student distillation. The central server transmits the new v2.0 base model delta.
    The ship uses its frozen v1.0 base + v1.0 LoRA as a teacher to label a small replay buffer of local
    telemetry, then trains a new v2.0-compatible LoRA adapter locally using the v2.0 base.
  - The primary issue is insufficient hardware capability; upgrading to next-generation hardware will
    resolve the performance gap without software changes.
  - INT8 quantization reduces model size by 8x compared to FP32, so inference speed should also improve
    by exactly 8x.
  correct_index: 1
