title: Maritime LLM LoRA Reconciliation over VSAT
scenario: A fleet of cargo ships runs a 7B predictive maintenance LLM (14GB INT8) on local edge servers (RTX 4000 Ada). Ships operate entirely offline for up to 45 days, continuously training local LoRA adapters (Rank 16, 32MB) on ship-specific telemetry. Upon reconnecting via a highly constrained 2 Mbps VSAT link, a ship discovers the central server has advanced the global base model from v1.0 to v2.0.
question: How should the ship reconcile its 45-day v1.0 LoRA adaptation with the global v2.0 base over a 2 Mbps link without uploading 500GB of telemetry?
details:
  realistic_solution: Use on-device teacher-student distillation. The central server transmits the new v2.0 base model delta. The ship uses its frozen v1.0 base + v1.0 LoRA as a teacher to label a small replay buffer of local telemetry, then trains a new v2.0-compatible LoRA adapter locally using the v2.0 base. This cleanly reconciles state without raw data transfer.
  common_mistake: |
    **The Pitfall:** Assuming local LoRA weights trained on base v1.0 can be naively averaged with or directly attached to the new v2.0 base model.
    **The Rationale:** Engineers treat LoRA adapters as independent, plug-and-play feature modules rather than highly sensitive residual matrices tied to a specific base model's exact hidden state distribution.
    **The Consequence:** The mismatch between the v2.0 base activations and the v1.0-trained adapter catastrophically breaks the model's representations, destroying the ship's ability to predict local engine anomalies.
  napkin_math: |
    1. **Raw Telemetry Transfer:** 500 GB * 8000 Mb/GB / 2 Mbps = 2,000,000 seconds (~23 days, impossible on VSAT).
    2. **Base Model Transfer:** 14 GB (v2.0 Base) * 8000 Mb/GB / 2 Mbps = 56,000 seconds (~15 hours, feasible).
    3. **Distillation:** Generating replay buffer labels with the v1.0 system and training a 32MB v2.0 LoRA adapter on the RTX 4000 Ada takes < 2 hours locally.
    4. **Result:** On-device distillation reconciles the states safely in **under 18 hours** without any raw data transfer.
