title: Maritime LLM LoRA Reconciliation over VSAT
scenario: A fleet of cargo ships runs a 7B predictive maintenance LLM on local edge servers. Ships operate entirely offline for up to 45 days, continuously training local LoRA adapters on ship-specific telemetry. Upon reconnecting via a highly constrained 2 Mbps VSAT link, a ship discovers the central server has advanced the global base model from v1.0 to v2.0.
question: How should the ship reconcile its 45-day v1.0 LoRA adaptation with the global v2.0 base over a 2 Mbps link without uploading 500GB of telemetry?
details:
  realistic_solution: Use on-device teacher-student distillation. The central server transmits the new v2.0 base model delta. The ship uses its frozen v1.0 base + v1.0 LoRA as a teacher to label a small replay buffer of local telemetry, then trains a new v2.0-compatible LoRA adapter locally using the v2.0 base. This cleanly reconciles state without raw data transfer.
  common_mistake: |
    **The Pitfall:** Assuming local LoRA weights trained on base v1.0 can be naively averaged with or directly attached to the new v2.0 base model.
    **The Rationale:** Engineers treat LoRA adapters as independent, plug-and-play feature modules rather than highly sensitive residual matrices tied to a specific base model.
    **The Consequence:** The mismatch between v2.0 base activations and the v1.0-trained adapter catastrophically breaks the model's representations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Network link: 2 Mbps VSAT.
       - Raw Telemetry: 500 GB.
       - v2.0 Base Delta: 14 GB.
    2. **Calculations:**
       - Raw Transfer: 500 GB * 8000 Mb/GB / 2 Mbps = 2,000,000 seconds (~23 days).
       - Base Transfer: 14 GB * 8000 Mb/GB / 2 Mbps = 56,000 seconds (~15 hours).
    3. **Conclusion & Interpretation:**
       - **Result: On-device distillation reconciles states safely in under 18 hours without raw data upload. (Network-Bandwidth-Bound)**
