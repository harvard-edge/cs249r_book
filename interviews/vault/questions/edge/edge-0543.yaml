title: The Qualcomm RB5 Hexagon DSP
scenario: Your robotics team is building a warehouse inventory drone on the Qualcomm Robotics RB5 platform.
  The RB5 has an Adreno 650 GPU (1.4 TFLOPS FP16), a Hexagon 698 DSP (15 TOPS INT8), and a Kryo 585 CPU.
  Your primary workload is MobileNetV2 classification (0.3 GFLOPs) running at 60 FPS on barcode/label
  images. A junior engineer put the model on the GPU because 'GPUs are for ML.' The drone's battery life
  is 18 minutes. Can you do better?
question: "Can you do better?"
details:
  realistic_solution: 'Move the model from the Adreno GPU to the Hexagon DSP. For this workload (MobileNetV2,
    0.3 GFLOPs, 60 FPS), the DSP is 5x more power-efficient: 0.3W vs 1.5W. On a drone with limited battery,
    this translates directly to flight time. At 0.3W ML power instead of 1.5W, the 1.2W savings extends
    battery life by approximately 20% (from 18 to ~22 minutes). The GPU excels at high-throughput parallel
    workloads (graphics, large models), but for small, sequential inference tasks, the DSP''s fixed-function
    pipeline and lower voltage domain make it the right compute unit. Match the workload to the accelerator.'
  common_mistake: '"The GPU is the right choice for ML inference because it has the most FLOPS." On mobile/edge
    SoCs, the GPU is a power hog designed for graphics workloads with high parallelism. For small models
    with low arithmetic intensity, the DSP is dramatically more efficient.'
  napkin_math: 'Power efficiency — GPU: 0.3 GFLOP × 60 FPS = 18 GFLOPS sustained / 1.5W = 12 GFLOPS/W.
    DSP: 18 GFLOPS / 0.3W = 60 GFLOPS/W. The DSP is 5× more power-efficient for this workload. Annual
    energy (24/7 operation, non-drone use case): GPU = 1.5W × 8,760h = 13.1 kWh. DSP = 0.3W × 8,760h =
    2.6 kWh. At $0.12/kWh: $1.57 vs $0.31/year per device. For a fleet of 10,000 warehouse robots: $15,700
    vs $3,100/year.'
