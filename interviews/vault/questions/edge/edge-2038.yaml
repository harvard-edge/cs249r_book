title: Graceful Degradation for Real-time Object Detection on Edge AI (Hailo-8)
scenario: 'An autonomous delivery drone is equipped with a Hailo-8 AI processor for real-time object detection and tracking to navigate urban environments and identify delivery points. The primary model is a high-accuracy, resource-intensive object detector. Due to unexpected environmental conditions (e.g., strong headwind increasing motor power consumption) or sensor degradation, the system might face reduced available power or computational resources for the AI accelerator. Describe a graceful degradation strategy that leverages degradation ladders, model fallbacks, and quality-of-service shedding to ensure the drone remains operational and safe. Explain why specific choices are made given the capabilities and constraints, differentiating between fail-safe and fail-operational states.'
question: How would you design a Hailo-8 drone degradation ladder with fallbacks and QoS shedding, and distinguish fail-operational from fail-safe states?
details:
  realistic_solution: 'Implement a multi-stage degradation ladder triggered by real-time monitoring of power consumption, Hailo-8 utilization, and sensor health. For instance, if overall system power exceeds 80% capacity due to high motor load, transition from a 26 TOPS high-accuracy model (e.g., YOLOv7) to a smaller, more efficient 15 TOPS model (e.g., MobileNet-SSD) on the Hailo-8, thereby reducing AI power draw from 2.5W to ~1.5W. If conditions worsen, reduce frame rate from 30 FPS to 10 FPS, or shed non-critical telemetry to further conserve resources. Fail-operational modes maintain core object detection with reduced fidelity, while a fail-safe state involves a controlled landing or return-to-base upon critical subsystem failure, completely disengaging non-essential AI tasks.'
  common_mistake: |
    **The Pitfall:** Failing to define hierarchical degradation triggers.
    **The Rationale:** Candidates often don't quantify the power/performance implications of each degradation step.
    **The Consequence:** The degraded state still overdraws power, leading to brownouts and a total crash of the drone.
  napkin_math: |
    1. **Assumptions & Constraints:** 5W power contingency. High motor load consumes 3W, leaving 2W for AI. Primary model uses 20 TOPS (~2W). Efficient model uses 10 TOPS (~1W).
    2. **Calculations:** If 3W is lost, remaining budget = 5W - 3W = 2W. The 20 TOPS model risks overdrawing if power spikes above 2W. 10 TOPS model draws 1W, leaving a 1W safety margin.
    3. **Conclusion & Interpretation:** **Degrading to the 10 TOPS model halves AI power draw, restoring a 1W safety margin to prevent brownouts. Result: Power-Bound.**
