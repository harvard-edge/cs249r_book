title: The Federated Fleet Economy
scenario: You're a systems engineer at an automotive company with a fleet of 10,000 connected vehicles updating a driver drowsiness detection model. Your team is debating a centralized 1 GB/day upload strategy per vehicle versus transferring a 10 MB model via Federated Learning.
question: For 10,000 vehicles at $0.10/GB, what is the daily data cost of a centralized 1 GB/day upload strategy compared to federated learning?
details:
  realistic_solution: Utilize Federated Learning to aggregate weight updates locally, drastically cutting bandwidth overhead. Centralized data lakes fail economically at this scale due to massive upload costs.
  common_mistake: |
    **The Pitfall:** Calculating cost for a single vehicle instead of the entire fleet.
    **The Rationale:** Engineers focus only on privacy benefits and neglect fleet-scale economic drivers.
    **The Consequence:** Underestimating total bandwidth cost by orders of magnitude, making centralized approaches appear falsely viable.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10,000 vehicles.
       - Centralized: 1 GB/day per vehicle.
       - Federated: 10 MB (0.01 GB)/day per vehicle.
       - Cost: $0.10/GB.
    2. **Calculations:**
       - Centralized data: 10,000 * 1 GB = 10,000 GB. Cost: 10,000 * $0.10 = $1,000/day.
       - Federated data: 10,000 * 0.01 GB = 100 GB. Cost: 100 * $0.10 = $10/day.
    3. **Conclusion & Interpretation:**
       - **Result: Federated Learning saves $990/day. Bandwidth-Bound.**
  options:
  - $10/day. This incorrectly uses the federated update size (10,000 * 10MB = 100GB) for the calculation.
  - $0.10/day. This calculates the cost for only a single vehicle, not the entire fleet.
  - $1000/day. This correctly calculates the total data from the fleet and applies the per-GB cost.
  - $100,000/day. This represents a 100x calculation error, perhaps by confusing dollars and cents.
  correct_index: 2
