title: The Federated Fleet Economy
scenario: You're a systems engineer at an automotive company with a fleet of 10,000 connected vehicles. You need to update a driver drowsiness detection model. Your team is debating two approaches: a centralized 1 GB/day upload strategy per vehicle, versus transferring a 10 MB model via Federated Learning. Data costs $0.10/GB.
question: For 10,000 vehicles at $0.10/GB, what is the daily data cost of a centralized 1 GB/day upload strategy compared to federated learning?
details:
  realistic_solution: The primary trade-off is between the massive data upload costs of the centralized approach versus the implementation complexity and on-device compute requirements of federated learning. While the centralized approach is conceptually simpler from a training perspective, its data transmission costs become prohibitive at scale.
  common_mistake: |
    **The Pitfall:** Calculating cost for a single vehicle instead of the entire fleet.
    **The Rationale:** Engineers often focus only on privacy benefits and neglect fleet-scale economic drivers.
    **The Consequence:** Underestimating total bandwidth cost by orders of magnitude, making centralized approaches appear falsely viable.
  napkin_math: |
    - Centralized data: 10,000 cars * 1 GB/day = 10,000 GB.
    - Centralized cost: 10,000 GB * $0.10/GB = $1,000/day.
    - Federated data: 10,000 cars * 0.01 GB/day = 100 GB.
    - Federated cost: 100 GB * $0.10/GB = $10/day.
    - **Federated Learning saves $990/day in bandwidth.**
  options:
  - $10/day. This incorrectly uses the federated update size (10,000 * 10MB = 100GB) for the calculation.
  - $0.10/day. This calculates the cost for only a single vehicle, not the entire fleet.
  - $1000/day. This correctly calculates the total data from the fleet and applies the per-GB cost.
  - $100,000/day. This represents a 100x calculation error, perhaps by confusing dollars and cents.
  correct_index: 2
