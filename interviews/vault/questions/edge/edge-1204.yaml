title: FlashAttention for On-Device Long Document Summarization
scenario: You need to run a 3B model with 16K context for document summarization on
  Jetson Orin (32GB LPDDR5, 102 GB/s, 275 TOPS INT8). Without FlashAttention, the
  16K attention matrix exhausts memory. Design the attention strategy including quantization
  and determine if 16K context is feasible.
question: How would you make a 3B model with 16K context feasible on Jetson Orin,
  including FlashAttention, KV quantization, and attention pattern?
details:
  realistic_solution: 'Model weights INT8: 3B x 1B = 3GB. KV cache FP16 at 16K: 32
    layers x 2 x 16 heads x 128 x 16384 x 2B = 4GB. With
    INT8 KV cache: 2GB. Model + KV = 5GB. Standard attention matrix materialization
    during prefill: 16384^2 x 2B x 16 = 8GB. Total prefill memory: 3GB + 4GB + 8GB = 15GB.
    While this technically fits in 32GB, fragmentation and OS overhead can cause OOMs, and
    8GB just for one layer''s attention matrix is highly inefficient. FlashAttention avoids
    materializing the 8GB matrix. To further save memory, we can use a sliding window KV
    cache. Hybrid sliding (24 layers x 2K window + 8 full at 16K) INT8: Sliding KV: 24 x 2
    x 16 x 128 x 2048 x 1B = 192MB. Full KV: 8 x 2 x 16 x 128 x 16384 x 1B = 512MB. Total
    KV: 704MB. Model + KV = 3.7GB. Feasible and highly efficient.'
  common_mistake: Only considering the attention matrix memory and forgetting that
    the KV cache itself for 16K tokens across all layers is the dominant memory consumer
    on edge devices.
  napkin_math: 'Full KV FP16: 4GB. Full KV INT8: 2GB. Hybrid sliding INT8: 704MB. Model INT8: 3GB. Total: 3.7GB of 32GB. Standard attn matrix: 8GB. FlashAttention: 0 extra.'
