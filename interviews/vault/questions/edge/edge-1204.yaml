title: FlashAttention for On-Device Long Document Summarization
scenario: You need to run a 3B model with 16K context for document summarization on Jetson Orin. Without FlashAttention, the 16K attention matrix exhausts memory.
question: How would you make a 3B model with 16K context feasible on Jetson Orin, including FlashAttention, KV quantization, and attention pattern?
details:
  realistic_solution: Model weights INT8: 3GB. KV cache FP16 at 16K context: 4GB. With INT8 KV cache: 2GB. Model + KV = 5GB. Standard attention matrix materialization during prefill: 8GB. Total prefill memory: 3GB + 4GB + 8GB = 15GB. While this technically fits in 32GB, fragmentation and OS overhead can cause OOMs, and 8GB just for one layer's attention matrix is highly inefficient. FlashAttention avoids materializing the 8GB matrix. To further save memory, we can use a sliding window KV cache. Hybrid sliding (24 layers x 2K window + 8 full at 16K) INT8 KV footprint drops to 704MB. Model + KV = 3.7GB. Feasible and highly efficient.
  common_mistake: |
    **The Pitfall:** Only considering the attention matrix memory.
    **The Rationale:** Candidates often focus on the O(N^2) attention matrix scaling but forget that the KV cache itself for 16K tokens across all layers is a massive, linear memory consumer.
    **The Consequence:** Proposing a solution that still results in an Out-Of-Memory (OOM) error during long-context generation because the KV cache wasn't quantized or windowed.
  napkin_math: |
    1. Model weights (INT8): 3B * 1 byte = 3GB.
    2. Full KV cache (FP16, 16K context, 32 layers, 16 heads, 128 dim): 32 * 2 * 16 * 128 * 16384 * 2 bytes = 4GB.
    3. Full KV cache (INT8): 2GB.
    4. Hybrid sliding KV (INT8) - 24 layers at 2K window: 24 * 2 * 16 * 128 * 2048 * 1 byte = 192MB.
    5. Hybrid sliding KV (INT8) - 8 full layers at 16K: 8 * 2 * 16 * 128 * 16384 * 1 byte = 512MB.
    6. Total Hybrid KV (INT8): 192MB + 512MB = 704MB.
    7. Total footprint: 3GB (model) + 704MB (KV) = **3.7GB** (Fits easily in 32GB).
