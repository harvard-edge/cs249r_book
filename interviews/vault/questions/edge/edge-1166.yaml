title: 'Edge TCO Mastery: Hardware Replacement vs Cloud Migration Decision'
scenario: A company's 3-year-old fleet of 300 Jetson TX2 units ($299, 15 TOPS INT8, 15W) needs to run a newer model that requires 50 TOPS. Options: (A) Replace with Jetson Orin ($499, 275 TOPS, 60W), (B) Augment with Hailo-8 per unit (+$200, +26 TOPS, 2.5W = 41 TOPS — still insufficient), (C) Move to cloud H100 ($2.50/hr, 1979 TOPS). Current inference rate is 2 inferences/second, 24/7.
question: What is the correct 4-year power cost for 300 replacement Orin units at 60W and $0.10/kWh?
details:
  realistic_solution: 'Power: 300 × 60W × 35,040hr × $0.10/1000 = $63,072 (not $631,200).'
  common_mistake: |
    **The Pitfall:** Miscalculating raw power costs by confusing Watts with Kilowatts, or ignoring the residual hardware value of existing TX2 units.
    **The Rationale:** System designers frequently rush basic arithmetic or ignore the massive operational hidden costs (API redesign, network reliability) of migrating edge workloads to the cloud.
    **The Consequence:** The company significantly misprices the TCO of the Orin upgrade, either overestimating power costs by 10x or underestimating the true cost of cloud migration.
  napkin_math: |
    1. **Fleet Power Draw:** 300 devices * 60 Watts = 18,000 Watts = 18 kW.
    2. **Operating Hours:** The fleet operates 24/7 in this specific calculation model (4 years = 35,040 hours).
    3. **Energy Consumption:** 18 kW * 35,040 hours = 630,720 kWh.
    4. **Result:** At $0.10/kWh, the total 4-year power cost is **$63,072**.
