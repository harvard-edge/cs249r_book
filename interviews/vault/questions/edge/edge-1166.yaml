title: 'Edge TCO Mastery: Hardware Replacement vs Cloud Migration Decision'
scenario: 'A company''s 3-year-old fleet of 300 Jetson TX2 units needs to run a newer model that requires 50 TOPS. Options: (A) Replace with Jetson Orin (275 TOPS, 60W), (B) Augment with Hailo-8 (still insufficient), (C) Move to cloud H100. Current inference rate is 2 inferences/second, 24/7.'
question: What is the correct 4-year power cost for 300 replacement Orin units at 60W and $0.10/kWh?
details:
  realistic_solution: 'Power: 300 \times 60W \times 35,040hr \times $0.10/1000 = $63,072. Replacing with Orin is operationally cleaner than cloud migration, which carries massive hidden network reliability and API redesign costs.'
  common_mistake: |
    **The Pitfall:** Miscalculating raw power costs by confusing Watts with Kilowatts.
    **The Rationale:** System designers frequently rush basic arithmetic or ignore the massive operational hidden costs of migrating edge workloads to the cloud.
    **The Consequence:** The company significantly misprices the TCO of the Orin upgrade, overestimating power costs by 1000x or underestimating the true cost of cloud migration.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 300 devices at 60 Watts each.
       - Operating 24/7 for 4 years (35,040 hours).
       - Cost: $0.10/kWh.
    2. **Calculations:**
       - Fleet Power Draw: 300 * 60W = 18,000 Watts = 18 kW.
       - Energy Consumption: 18 kW * 35,040 hours = 630,720 kWh.
       - Total Power Cost: 630,720 kWh * $0.10/kWh = $63,072.
    3. **Conclusion & Interpretation:**
       - **Result: The 4-year power cost is $63,072. (TCO-Calculation)**
