title: Dataflow Accelerator Viability for Multi-Camera Edge Pipeline
scenario: You are designing an edge vision appliance that processes four independent
  1080p camera streams at 30 FPS. You must evaluate the Hailo-8 dataflow accelerator
  (26 TOPS INT8, 2.5W) against an embedded GPU. The Hailo-8 relies entirely on the
  host memory via PCIe, lacking dedicated local DRAM. Given the memory bandwidth constraints
  and power budget, evaluate whether the Hailo-8's dataflow architecture can sustain
  the required throughput for an object detection model requiring 50 GOPS per frame,
  and justify your system-level architectural decision.
question: Can the Hailo-8 sustain four 1080p30 streams at 50 GOPS per frame, and what
  system-level constraints drive the decision?
details:
  realistic_solution: A strong L5 candidate will evaluate both the compute and the
    memory bandwidth requirements. They will identify that while 26 TOPS is more than
    enough compute for the models, the lack of local DRAM means every frame and intermediate
    activation (if not mapped entirely onto the dataflow fabric) must traverse the
    PCIe bus. The solution involves sizing the PCIe link (e.g., PCIe Gen3 x4) and
    ensuring the host processor can feed the Hailo-8 fast enough, concluding that
    Hailo-8 is highly efficient at 2.5W but requires a host system capable of sustaining
    the continuous memory streaming.
  common_mistake: Candidates often look only at the peak TOPS and assume the Hailo-8
    can easily handle the workload. They frequently ignore the PCIe bandwidth bottleneck
    caused by the lack of local DRAM, forgetting that streaming high-resolution video
    directly to the accelerator requires careful host-side memory management.
  napkin_math: 'Compute requirement: 4 cameras * 30 FPS * 50 GOPS/frame = 6000 GOPS
    = 6 TOPS. Hailo-8 provides 26 TOPS, giving a 4.3x compute headroom. Frame data
    per second (uncompressed RGB): 4 * 1920 * 1080 * 3 bytes * 30 FPS = ~746 MB/s.
    A PCIe Gen3 x4 link provides ~3.9 GB/s, easily covering the input stream. Power
    efficiency: 6 TOPS / 2.5W = 2.4 TOPS/W utilized, demonstrating excellent power
    characteristics for edge deployment if the model fits the dataflow compiler''s
    constraints.'
