title: Dataflow Accelerator Viability for Multi-Camera Edge Pipeline
scenario: 'You are designing an edge vision appliance that processes four independent 1080p camera streams at 30 FPS. You must evaluate a 26 TOPS INT8 dataflow accelerator that relies entirely on host memory via PCIe, lacking dedicated local DRAM.'
question: 'Can the dataflow accelerator sustain four 1080p30 streams at 50 GOPS per frame, and what system-level constraints drive the decision?'
details:
  realistic_solution: 'Evaluate both compute and memory bandwidth. While 26 TOPS easily handles the compute, the lack of local DRAM forces all frames and activations to traverse the PCIe bus. Sizing the PCIe link (e.g., PCIe Gen3 x4) guarantees the host processor can feed the accelerator continuously without memory starvation.'
  common_mistake: |
    **The Pitfall:** Looking only at peak TOPS and assuming the accelerator easily handles the workload.
    **The Rationale:** Candidates focus purely on compute specifications without understanding the dataflow architecture's reliance on host memory.
    **The Consequence:** They ignore the PCIe bandwidth bottleneck caused by the lack of local DRAM, failing to provision a host system capable of streaming the video data.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute requirement: 50 GOPS/frame.
       - 4 cameras, 1080p (1920x1080, 3 bytes/pixel) at 30 FPS.
       - Accelerator: 26 TOPS INT8. PCIe Gen3 x4 limit: ~3.9 GB/s.
    2. **Calculations:**
       - Compute needed: 4 * 30 FPS * 50 GOPS = 6000 GOPS = 6 TOPS (Well under 26 TOPS).
       - Raw uncompressed RGB data: 4 * 1920 * 1080 * 3 * 30 = 746,496,000 bytes/s ≈ 746 MB/s.
       - Bandwidth check: 746 MB/s is << 3.9 GB/s PCIe Gen3 x4 limit.
    3. **Conclusion & Interpretation:**
       - **The accelerator sustains the workload seamlessly because the 746 MB/s bandwidth fits within the PCIe Gen3 x4 limit.** (Result: Bandwidth-Bound)
