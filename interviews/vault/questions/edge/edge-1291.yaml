title: Diagnosing Low Utilization on Jetson Orin DLA
scenario: You are deploying an INT8 quantized CNN on an NVIDIA Jetson Orin edge device to maximize its 275 TOPS INT8 capability within a 60W TDP. While profiling the model, you notice that the Ampere GPU performs well, but the dedicated Deep Learning Accelerator (DLA) shows drastically low utilization (< 20%) on several pointwise (1x1) convolution layers despite having plenty of bandwidth from the 32 GB LPDDR5. The layers are clearly compute-bound rather than memory-bound.
question: Based on the architecture of a systolic array accelerator like the DLA, what is the root cause of this poor utilization?
details:
  realistic_solution: The root cause is a dimension mismatch with the DLA's fixed-size systolic array, which forces severe zero-padding. The DLA uses a rigid hardware tile size (often optimized for weight-stationary dataflow) to achieve its high TOPS efficiency. If the 1x1 convolution's input or output channel dimensions do not align with this hardware tile size, the array must map the computation to a fraction of the MAC units while the rest sit idle. The solution is to either pad the channel dimensions to multiples of the DLA's native tile size or restructure the model to avoid narrow channel widths that starve the array.
  common_mistake: |
    **The Pitfall:** Immediately diagnosing a memory bandwidth bottleneck.
    **The Rationale:** Candidates assume that the 32 GB LPDDR5 cannot feed the MACs fast enough for 1x1 convolutions.
    **The Consequence:** They miss the interaction between the mathematical dimensions of the convolution and the fixed physical dimensions of a systolic array, ignoring severe spatial under-mapping.
  napkin_math: |
    1. **DLA Hardware:** Assume a 32x32 systolic array capable of 1,024 MACs per cycle.
    2. **Model Workload:** A 1x1 convolution layer with 16 input channels and 16 output channels.
    3. **Spatial Mapping:** This maps to a 16x16 spatial block of MACs (256 active MACs).
    4. **Hardware Utilization:** `256 active MACs / 1,024 total MACs = 25%`.
    **Even with abundant memory bandwidth, localized DLA compute efficiency drops severely due to spatial under-mapping of small channel dimensions.**
