title: Diagnosing CPU Fallback in EfficientNet on Edge TPU
scenario: 'You are deploying a standard EfficientNet-B0 model to a Google Coral Edge TPU (4 TOPS INT8, 2W budget) for a smart camera application. After running the Edge TPU compiler, you notice the inference latency is 45ms instead of the expected 3ms. The compiler logs reveal that the model graph has been partitioned, with several depthwise convolutions and activation layers falling back to the host CPU.'
question: 'What architectural feature of standard EfficientNet causes this fallback, and how is it resolved?'
details:
  realistic_solution: 'The root cause is the use of the Swish (SiLU) activation function and Squeeze-and-Excitation (SE) blocks in standard EfficientNet, which are not natively supported by the Edge TPU''s INT8 ALUs. This forces the compiler to partition the graph and run unsupported ops on the host CPU. The solution is to switch to the EfficientNet-Lite architecture, which replaces Swish with ReLU6 and removes SE blocks, allowing the entire model to compile into a single INT8 graph for the TPU.'
  common_mistake: |
    **The Pitfall:** Assuming the Edge TPU lacks hardware support for depthwise separable convolutions.
    **The Rationale:** Candidates see depthwise convolutions falling back and misdiagnose the root cause as a fundamental compute limitation rather than an activation function mismatch.
    **The Consequence:** They suggest replacing depthwise convolutions with standard ones, which drastically increases FLOPs and parameter count without solving the compatibility issue.
  napkin_math: |
    * Coral Edge TPU provides 4 TOPS (INT8).
    * EfficientNet-B0 requires ~0.78 GOPS.
    * Ideal TPU execution time = 0.78 / 4000 = 0.195 ms.
    * If Swish forces 20% of operations (0.15 GOPS) to a host CPU capable of 10 GOPS, CPU time = 0.15 / 10 = 15 ms.
    * Graph partitioning adds USB/PCIe transfer overhead (e.g., 4 partitions × 2 ms transfer = 8 ms).
    * **Total latency spikes from ~0.2 ms to >23 ms, violating realtime constraints and the 2W limit.**
