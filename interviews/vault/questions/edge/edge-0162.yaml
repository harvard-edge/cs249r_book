title: The Edge Ridge Point
scenario: You are leading a team evaluating the NVIDIA Jetson AGX Orin for a real-time object detection pipeline that must run at 30 FPS. A junior engineer is confused about why some models are 'memory-bound' while others are 'compute-bound'.
question: How do you calculate the Orin's INT8 ridge point from 275 TOPS and 204.8 GB/s, and how does it separate memory-bound from compute-bound models?
details:
  realistic_solution: The 'ridge point' is a key concept in the Roofline Model. It represents the minimum Arithmetic Intensity (AI), measured in Operations per Byte, that an application must have to be limited by the accelerator's peak compute rather than its memory bandwidth.
  common_mistake: |
    **The Pitfall:** A unit mismatch dividing TOPS directly by GB/s.
    **The Rationale:** Engineers often fail to account for the factor of 1000 difference between Tera- and Giga- prefixes, or they incorrectly invert the formula (Bandwidth / Compute).
    **The Consequence:** Fundamentally misunderstanding the hardware's operational characteristics, leading to the selection of inefficient model architectures.
  napkin_math: |
    * Peak Compute: 275 TOPS (Tera-Operations/sec) = 275,000 GOPS (Giga-Operations/sec) = 275e12 Ops/s.
    * Memory Bandwidth: 204.8 GB/s = 204.8e9 Bytes/s.
    * Ridge Point Formula: Peak Compute / Memory Bandwidth.
    * Ridge Point = 275e12 Ops/s / 204.8e9 Bytes/s = **1,343 Ops/Byte**.
    * AI < 1,343 Ops/Byte indicates the model is memory-bound.
    * AI > 1,343 Ops/Byte indicates the model is compute-bound.
  options:
  - ~1.34 Ops/Byte. This happens from dividing 275 by 204.8 without converting units.
  - ~0.0007 Bytes/Op. This results from incorrectly inverting the formula (Bandwidth / Compute).
  - ~1343 Ops/Byte. A model's Arithmetic Intensity must be higher than this to be compute-bound.
  - ~1343 Ops/Byte. A model's Arithmetic Intensity must be lower than this to be compute-bound.
  correct_index: 2
