title: Adversarial Defense Architecture for Streaming Edge Accelerators
scenario: You are designing an object detection system for an autonomous ground vehicle that must be resilient against physical adversarial patches. The system uses a Hailo-8 accelerator (26 TOPS INT8, 2.5W) streaming data directly from host memory.
question: Which adversarial-patch defense would you choose for Hailo-8, and how would it meet real-time bandwidth and compute limits?
details:
  realistic_solution: The optimal design uses a single-pass, adversarially-trained INT8 model on the Hailo-8, combined with lightweight host-side spatial transformations (like randomized resizing/cropping) before streaming. This leverages the CPU/ISP for cheap preprocessing, utilizes the Hailo-8's dataflow architecture for efficient inference, and strictly bounds the host-to-accelerator streaming bandwidth.
  common_mistake: |
    **The Pitfall:** Proposing complex generative purification models (like diffusion or GANs).
    **The Rationale:** Candidates apply state-of-the-art cloud adversarial defenses without evaluating hardware feasibility.
    **The Consequence:** Multi-pass streaming saturates the PCIe bandwidth and drastically exceeds the INT8 capabilities of the Hailo-8.
  napkin_math: |
    - 1080p Frame Size: 1920 * 1080 * 3 bytes = ~6.2MB.
    - One-way streaming bandwidth (30 FPS): 6.2MB * 30 = 186 MB/s.
    - Multi-pass purification overhead: 186 MB/s * 2 = 372 MB/s (risks saturating PCIe Gen2 x1).
    - Single robust model compute: ~10 TOPS (fits within 26 TOPS limit).
    **A multi-pass defense consumes 372 MB/s, whereas a single robust model stays safely under the bandwidth limit.**
