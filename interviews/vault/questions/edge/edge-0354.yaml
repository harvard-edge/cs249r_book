title: The Edge Roofline Ridge Point (edge-0354)
scenario: 'You are an ML systems engineer on an autonomous vehicle team using a Jetson AGX Orin, which is running in a mode that provides 275 TOPS of INT8 performance. To optimize your perception models, you first need to understand the performance characteristics of the hardware itself.'
question: What does the roofline ridge point represent, and how do you calculate it for the Jetson AGX Orin?
details:
  realistic_solution: 'The ridge point of a roofline model represents the hardware''s own Arithmetic Intensity (AI). It''s the point where the diagonal memory-bound performance line meets the flat compute-bound performance ceiling. It is calculated by dividing the peak compute throughput by the peak memory bandwidth. For the Jetson AGX Orin, this value tells us the minimum operational intensity a model needs to have to be limited by compute rather than memory bandwidth.'
  common_mistake: |
    **The Pitfall:** Confusing arithmetic intensity (Ops/Byte) with power efficiency (TOPS/W).
    **The Rationale:** Engineers often conflate different "efficiency" metrics, or make simple magnitude errors (mixing up Tera and Giga).
    **The Consequence:** Incorrectly calculating the ridge point, leading to completely flawed memory-bound vs. compute-bound architectural decisions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak Compute: Jetson AGX Orin (INT8) = 275 TOPS.
    - Peak Memory Bandwidth: 204.8 GB/s.

    **Calculations:**
    - Ridge Point Calculation: 275 TOPS / 204.8 GB/s = ~1342 Ops/Byte.

    **Conclusion & Interpretation:**
    - **Result: ~1342 Ops/Byte (Architecture-Bound)**. The hardware transitions from memory-bound to compute-bound at this arithmetic intensity.
  options:
  - '~4.6 Ops/Byte'
  - '~1.34 Ops/Byte'
  - '~1,343 Ops/Byte'
  - '~275 Ops/Byte'
