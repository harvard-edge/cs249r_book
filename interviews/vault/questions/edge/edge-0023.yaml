title: The Camera-to-Inference Latency Budget
scenario: 'Your autonomous vehicle''s perception pipeline runs at 30 FPS on a Jetson Orin. The budget
  per frame is 33.3ms. Your measured breakdown: ISP (5ms) → resize/normalize (3ms) → YOLO inference (20ms)
  → NMS post-processing (2ms) = 30ms total. That leaves 3.3ms of margin. During road testing, the system
  occasionally drops frames — about 1 in 200. The safety team says zero dropped frames are acceptable.
  What''s going wrong, and how do you fix it without buying faster hardware?'
details:
  realistic_solution: The 1-in-200 frame drops are caused by tail latency — the p99.5 inference time exceeds
    33.3ms even though the average is 30ms.
  common_mistake: '"Add more margin by optimizing the model to run faster." While helpful, this misdiagnoses
    the problem. The 20ms inference time is the *average*. The issue is latency *variance*, not average
    latency.'
  napkin_math: 'Sequential pipeline at p99.9: 5 + 3 + 32 + 2 = 42ms → frame drop. Pipelined at p99.9:
    max(5, 3, 32, 2) = 32ms → fits in 33.3ms with 1.3ms margin. With clock locking: max(5, 3, 25, 2) =
    25ms → 8.3ms margin (25% headroom). Frame drop rate: sequential = 1/200 (p99.5 exceeds budget). Pipelined
    + clock locked = <1/100,000 (p99.999 is ~28ms). Throughput cost of pipelining: adds 1 frame of end-to-end
    latency (33ms). Total camera-to-output: 66ms instead of 33ms. At 60 km/h: extra 0.55m of travel distance.
    Acceptable for most ADAS applications.'
