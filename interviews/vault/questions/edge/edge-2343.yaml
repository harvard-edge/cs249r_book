title: Dual Hailo Pipeline FPS
scenario: Two Hailo-8 chips run an INT8 object detection model using pipeline parallelism.
  Stage 1 takes 10ms and Stage 2 takes 10ms.
question: Calculate the peak throughput in FPS and the latency for a single frame,
  assuming zero communication overhead.
visual:
  kind: svg
  path: edge-2343.svg
  alt: Gantt chart showing frames overlapping across Stage 1 and Stage 2.
  caption: Pipeline parallelism execution schedule.
details:
  realistic_solution: Latency for a single frame traversing both stages is 10ms +
    10ms = 20ms. Throughput is dictated by the bottleneck stage; since both are 10ms,
    a frame completes every 10ms. Peak throughput is 1000ms / 10ms = 100 FPS.
  common_mistake: Confusing latency (20ms) with throughput bottleneck (10ms) and stating
    50 FPS.
  napkin_math: 1000 / max(10, 10) = 100
