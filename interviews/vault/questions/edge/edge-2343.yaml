title: Dual Hailo Pipeline FPS
scenario: 'Two Hailo-8 chips run an INT8 object detection model split across stages.
  Stage 1 (CPU + Hailo-8 #1) takes 10 ms compute. Stage 2 (Hailo-8 #2) takes 10 ms.
  Inter-chip transfer over the host PCIe Gen3 x4 (~3.5 GB/s) carries 8 MB of activations
  per frame and incurs a 0.4 ms DMA setup that cannot overlap with stage compute.'
question: Calculate end-to-end latency and peak throughput accounting for PCIe transfer
  and DMA setup overhead. Identify whether the bottleneck is compute or the inter-chip
  transfer.
visual:
  kind: svg
  path: edge-2343.svg
  alt: Gantt chart showing frames overlapping across Stage 1 and Stage 2.
  caption: Pipeline parallelism execution schedule.
details:
  realistic_solution: Inter-chip transfer time = 8 MB / 3500 MB/s = 2.3 ms wire +
    0.4 ms DMA setup = 2.7 ms (non-overlap). End-to-end latency = 10 + 2.7 + 10 =
    22.7 ms. Pipeline throughput is gated by max(stage1, transfer, stage2) = 10 ms
    (compute remains the bottleneck since 2.7 ms < 10 ms). Peak FPS = 100. If activation
    size grew to 40 MB/frame (e.g., higher resolution), transfer would become 11.8
    ms and dominate, dropping peak FPS to ~85.
  common_mistake: Adding latency to throughput (50 FPS) or assuming inter-chip overhead
    is always negligible without checking the actual transfer time relative to compute.
  napkin_math: Transfer = 8/3500 + 0.0004 = 0.0027 s. End-to-end = 10+2.7+10 = 22.7
    ms. Peak FPS = 1000/max(10, 2.7, 10) = 100.
