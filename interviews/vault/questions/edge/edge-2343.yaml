title: Dual Hailo Pipeline FPS
scenario: Two Hailo-8 chips run an INT8 object detection model split across stages. Stage 1 (CPU + Hailo-8 #1) takes 10ms compute. Stage 2 (Hailo-8 #2) takes 10ms. Inter-chip transfer over host PCIe Gen3 x4 carries 8 MB of activations per frame and incurs a 0.4ms DMA setup that cannot overlap with stage compute.
question: Calculate end-to-end latency and peak throughput accounting for PCIe transfer and DMA setup overhead.
visual:
  kind: svg
  path: edge-2343.svg
  alt: Gantt chart showing frames overlapping across Stage 1 and Stage 2.
  caption: Pipeline parallelism execution schedule.
details:
  realistic_solution: Inter-chip transfer time = 8 MB / 3500 MB/s = 2.3 ms wire + 0.4 ms DMA setup = 2.7 ms. End-to-end latency = 10 + 2.7 + 10 = 22.7 ms. Pipeline throughput is gated by max(stage1, transfer, stage2) = 10 ms. Peak FPS = 100.
  common_mistake: |
    **The Pitfall:** Assuming inter-chip overhead is negligible or erroneously adding latency components directly to calculate throughput.
    **The Rationale:** Candidates frequently calculate throughput as 1 / (Total Latency) rather than taking the maximum pipeline stage duration.
    **The Consequence:** Drastically underestimating the maximum frames per second achieved by a pipelined architecture.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inter-chip transfer size: 8 MB.
    - PCIe Gen3 x4 bandwidth: 3500 MB/s.
    - DMA setup overhead: 0.4ms (non-overlapping).
    - Stage 1 compute: 10ms.
    - Stage 2 compute: 10ms.

    **Calculations:**
    - Transfer Time: 8 MB / 3500 MB/s = 2.3ms.
    - Total Transfer Overhead: 2.3ms + 0.4ms = 2.7ms.
    - End-to-End Latency: 10ms + 2.7ms + 10ms = 22.7ms.
    - Pipeline Bottleneck: Max(10ms, 2.7ms, 10ms) = 10ms.
    - Peak Throughput: 1000ms / 10ms = 100 FPS.

    **Conclusion & Interpretation:**
    - **Result: 22.7ms latency, 100 FPS peak throughput (Compute-Bound).**
