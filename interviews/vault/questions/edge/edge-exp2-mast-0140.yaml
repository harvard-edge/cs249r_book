title: Dynamic Thermal Throttling on Jetson Orin
scenario: You are designing the multi-modal perception stack for an autonomous delivery robot running
  on an NVIDIA Jetson Orin (32 GB LPDDR5, Ampere GPU + DLA). While the Orin has a 60W TDP and provides
  275 TOPS INT8, operating in direct sunlight imposes a strict 40W sustained thermal and power limit.
  Design a dynamic power management architecture that partitions workloads between the GPU and DLA, utilizing
  DVFS P-states to maximize throughput without exceeding the 40W cap.
question: "How would you partition workloads and use DVFS P-states to keep Jetson Orin perception under a 40W sustained power cap?"
details:
  realistic_solution: A robust architecture relies on a closed-loop controller that shifts static, high-efficiency
    workloads (like CNN backbones) to the DLA while reserving the Ampere GPU for complex, dynamic tasks.
    By leveraging the CMOS equation (P = C V^2 f + P_static), the system dynamically scales voltage and
    frequency (DVFS). Since dynamic power scales cubically with frequency (assuming V scales with f),
    slightly lowering clocks yields massive power savings with minimal TOPS loss.
  common_mistake: Candidates often assume a linear relationship between power and compute capability (e.g.,
    40W is 2/3 of 60W, so they assume exactly 183 TOPS are available). They also frequently fail to separate
    static baseline power (like the 32GB LPDDR5) from dynamic compute power when applying the CMOS power
    equation.
  napkin_math: '1. Isolate active power: Assume baseline static + 32GB LPDDR5 power is ~10W. Active power
    at 60W TDP is 50W. Active budget at 40W cap is 30W. 2. Apply CMOS scaling: Power ratio is 30W/50W
    = 0.6. 3. Calculate frequency ratio: f_new / f_max = (0.6)^(1/3) ~ 0.84. 4. Available Compute: 0.84
    * 275 TOPS ~ 231 TOPS INT8. 5. Energy Efficiency: Operating at 40W to process a 30 FPS perception
    stack results in an energy cost of 40W / 30 FPS = 1.33 Joules per inference frame.'
