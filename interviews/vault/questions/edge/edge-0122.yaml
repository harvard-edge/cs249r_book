title: The Transformer's Quadratic Curse
scenario: 'You''re designing a real-time vision system for an autonomous drone with a 33ms latency budget. The current system uses a lightweight CNN on 320x320 images taking 15ms per frame. To improve accuracy on small objects, the team is considering increasing the resolution to 640x640.'
question: 'How does computational cost scale when increasing from 320x320 to 640x640 for a CNN versus a Vision Transformer (ViT)?'
details:
  realistic_solution: 'A CNN''s cost scales roughly linearly with the number of pixels. Its convolutional kernels perform a fixed number of operations per pixel region. Quadrupling the pixel count (2x width, 2x height) results in a ~4x increase in FLOPs.'
  common_mistake: |
    **The Pitfall:** Assuming both architectures scale linearly with the number of input pixels.
    **The Rationale:** Engineers mentally model the ViT as just another feature extractor, not a sequence processor.
    **The Consequence:** They vastly underestimate the latency explosion of a ViT, where self-attention complexity is quadratic relative to sequence length.
  napkin_math: |
    * CNN spatial area: 320x320 (102,400 pixels) to 640x640 (409,600 pixels) is a 4x increase.
    * CNN compute scales linearly: 15ms × 4 = 60ms.
    * ViT sequence length (patches) increases 4x.
    * ViT compute scales quadratically with sequence length: 4^2 = 16x increase.
    * **Conclusion: The CNN scales ~4x (60ms), while the ViT scales ~16x, instantly violating the 33ms budget.**
  options:
  - Both architectures scale linearly, leading to a ~4x increase in FLOPs.
  - The CNN's cost scales ~4x, while the ViT's scales ~16x.
  - The CNN's cost scales quadratically (~16x), while the ViT's is linear (~4x).
  - The cost increase is negligible (~2x) for both due to hardware acceleration.
