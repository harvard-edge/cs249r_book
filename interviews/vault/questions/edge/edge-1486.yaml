title: Architecting Low-Latency Profiling for Edge TPU
scenario: You are designing an edge video analytics system using the Google Coral Edge TPU to process multiple camera streams at 30 FPS. The models are fully quantized to INT8, but the system is sporadically dropping frames and failing to meet the 33ms latency target per frame.
question: How would you profile Coral Edge TPU latency spikes to separate USB bandwidth, CPU-transfer, and operator-fallback bottlenecks without significantly impacting the device's 2W power budget?
details:
  realistic_solution: Enforce build-time validation of compiler logs to ensure zero operators fall back to the host CPU. Implement an event-driven telemetry agent that minimally instruments the inference API calls. Crucially, the telemetry should only trigger a deep stack trace or USB bus capture when the 33ms latency threshold is breached, thereby avoiding the 'observer effect' where heavy profiling tools like eBPF consume the tight 2W CPU power envelope and skew latency measurements.
  common_mistake: |
    **The Pitfall:** Deploying heavy, general-purpose profiling tools like `perf` or continuous eBPF tracing.
    **The Rationale:** Candidates use standard server-class profiling methods on low-power edge host CPUs.
    **The Consequence:** These tools overwhelm the CPU, skewing latency measurements, breaching the 2W power envelope, and missing Edge TPU-specific operator fallbacks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Budget: 33.3 ms/frame.
       - INT8 model operations: 4 GOPS.
       - Edge TPU throughput: 4 TOPS (4000 GOPS).
       - USB 3.0 practical throughput: 400 MB/s.
    2. **Calculations:**
       - Compute latency: 4 GOPS / 4000 GOPS = 1 ms.
       - USB transfer latency (1 MB tensor): 1 MB / 400 MB/s = 2.5 ms.
       - Theoretical inference + transfer: ~3.5 ms.
    3. **Conclusion & Interpretation:**
       - **Result: CPU/IO bottleneck (~30 ms overhead).** The 33.3ms budget violation proves the delay is rooted in host-side queuing, CPU operator fallbacks, or USB bus contention, not TPU compute.
