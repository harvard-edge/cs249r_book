title: 'MLOps Lifecycle: Specify Monitoring and Alerting System for Edge CV Fleet'
scenario: 'Specify a monitoring and alerting system for 1000 Jetson Orin edge devices running computer
  vision models at remote industrial sites. The system must detect: model performance degradation, hardware
  failures, out-of-distribution inputs, and network connectivity issues — with concrete metric definitions,
  sampling rates, alert thresholds, and data volumes.'
question: "What metrics, sampling rates, alert thresholds, and data volumes would you use to monitor 1000 Jetson Orin vision devices at remote sites?"
details:
  realistic_solution: 'Metrics (device-side aggregation, emit every 5min): detection_count, avg_confidence,
    OOD_rate (frames with max confidence < 0.4), inference_latency_p99, GPU_temp, memory_used. Alert thresholds:
    avg_confidence < 0.6 for 15min → performance alert; OOD_rate > 20% for 10min → distribution shift;
    inference_p99 > 2× baseline for 10min → hardware alert. Data: 6 metrics × 1000 devices × 12/hr × 8
    bytes = 0.58MB/hr = 14MB/day. Affordable on any connectivity.'
  common_mistake: Designing a monitoring system that streams all inference results to cloud (1000 devices
    × 30fps × 1KB/frame = 30MB/s = 2.6TB/day — unaffordable on LTE).
  napkin_math: '6 metrics × 8 bytes = 48 bytes/emission. Emit every 5min: 12/hr. 1000 devices × 48 bytes
    × 12/hr × 24hr = 13.8MB/day. At $0.09/GB = $0.001/day. Essentially free. Compare to streaming: 30fps
    × 1KB × 1000 × 86400 = 2.59TB/day → $233/day. Aggregation saves $233/day = $85K/year.'
