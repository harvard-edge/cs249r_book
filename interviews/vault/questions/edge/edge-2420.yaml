title: Transient Queue Buildup from Stochastic Arrivals
scenario: A Jetson AGX Orin handles video from multiple cameras. Frames arrive following
  a Poisson distribution at 30 FPS. The Orin processes a frame in exactly 25ms.
question: Explain why the system requires a queue buffer even though the maximum processing
  rate (40 FPS) safely exceeds the average arrival rate (30 FPS).
details:
  realistic_solution: Because the arrivals follow a Poisson distribution, multiple
    frames can arrive in a clustered burst during a single 25ms processing window.
    In M/D/1 queueing theory, this stochastic variance inevitably causes transient
    queue build-ups. Without a buffer, these bursts result in immediate frame drops
    despite the higher average processing capacity.
  common_mistake: Assuming that a processing rate faster than the average arrival
    rate guarantees an empty queue.
  napkin_math: 30 * 0.025 = 0.75 rho
