title: Hailo-8 Memory Architecture and Power Efficiency
scenario: You are deploying a multi-camera object detection system. The team is deciding whether to preload the model weights onto the accelerator's local DRAM or stream them from the host's memory map.
question: What is the fundamental memory architecture of the Hailo-8 dataflow accelerator, and what is its rated INT8 performance and power consumption?
details:
  realistic_solution: The Hailo-8 utilizes a pure dataflow architecture devoid of localized DRAM, relying instead on continuous zero-copy DMA streaming via PCIe from the host's memory map. Performance is rated at 26 TOPS for INT8 at 2.5W. The bottleneck fundamentally shifts from on-device VRAM capacity to host PCIe bandwidth and aggressive host-side memory pinning.
  common_mistake: |
    **The Pitfall:** Assuming all edge AI accelerators have dedicated on-board DRAM.
    **The Rationale:** Candidates are accustomed to edge GPUs (like Jetson) or TPUs which cache models locally.
    **The Consequence:** They incorrectly suggest optimizing the Hailo-8's local memory footprint rather than optimizing the PCIe bandwidth and host memory allocation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Accelerator: Hailo-8 (0 GB local DRAM).
       - Compute: 26 TOPS INT8.
       - Power Envelope: 2.5W.
    2. **Calculations:**
       - Power efficiency = 26 TOPS / 2.5W = 10.4 TOPS/Watt.
       - Streaming Bandwidth required $\propto$ Dataflow consumption rate.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound via PCIe.** The host PCIe must sustain continuous dataflow bandwidth to utilize the 26 TOPS.
