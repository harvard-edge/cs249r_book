title: 'Edge Queueing Theory Realization: Concrete Queue Depth for Coral Edge TPU'
scenario: You are sizing the input queue (in bytes) for a Coral Edge TPU running plant disease detection at an arrival rate of 10 req/s with a P99 SLO of 500ms. Images are 224x224 RGB at INT8. The host MCU has 512KB of SRAM.
question: How many input requests and bytes must be buffered to meet the 500ms P99 SLO, and can the 512KB Cortex-M7 SRAM hold them?
details:
  realistic_solution: |
    Applying Little's Law determines the necessary queue depth based on arrival rate and target wait time. However, in embedded edge systems, queue depth must be mapped to physical memory footprint. While the required queue depth of 5 requests seems trivial, storing 5 uncompressed 224x224 RGB images requires 735KB of RAM, which completely overflows the Cortex-M7's 512KB SRAM. The system is grossly over-provisioned for compute (4 TOPS) but critically starved for memory.
  common_mistake: |
    **The Pitfall:** Sizing the queue strictly in the number of requests without calculating the byte footprint.
    **The Rationale:** Using pure queueing theory math but ignoring the physical memory constraints of the embedded hardware.
    **The Consequence:** The design looks correct on paper but immediately causes Out-Of-Memory crashes on the host MCU during traffic bursts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Arrival Rate: 10 req/s. Max Wait: 0.5 s.
       - Frame Size: 224x224x3 bytes.
       - Host SRAM: 512 KB.
    2. **Calculations:**
       - Queue Depth (Little's Law): L = 10 req/s * 0.5 s = 5 requests.
       - Image Payload: 224 * 224 * 3 = 150,528 bytes (~147 KB).
       - Required Memory: 5 requests * 147 KB = 735 KB.
    3. **Conclusion & Interpretation:**
       - **Result: 735 KB > 512 KB. Bottleneck: Memory Capacity-Bound (SRAM Overflow).**
