title: 'Edge Queueing Theory Realization: Concrete Queue Depth for Coral Edge TPU'
scenario: You are sizing the input queue (in bytes) for a Coral Edge TPU (4 TOPS, 2W) running plant disease detection at an arrival rate of 10 req/s with a P99 SLO of 500ms. Images are 224x224 RGB at INT8. The host MCU has 512KB of SRAM.
question: How many input requests and bytes must be buffered to meet the 500ms P99 SLO, and can the 512KB Cortex-M7 SRAM hold them?
details:
  realistic_solution: 'Coral TPU: 4 TOPS, MobileNetV2 = 0.3 GOPS, \u03bc = 4000/0.3 = 13,333/s. \u03c1 = 10/13333 = 0.00075. Queue depth L = \u03bb * W_max = 10 * 0.5 = 5 requests. Image size: 224*224*3 bytes (RGB INT8) = 150,528 bytes \u2248 147KB. Queue memory: 5 * 147KB = 735KB > 512KB SRAM. Does not fit! Wq at \u03c1=0.00075: M/D/1 Wq \u2248 0. W = 0.075ms service time. P99 \u2248 1ms << 500ms. System is wildly overprovisioned for compute; SRAM is the real constraint and is exceeded.'
  common_mistake: |
    **The Pitfall:** Sizing the queue strictly in the number of requests without calculating the byte footprint.
    **The Rationale:** Using pure queueing theory math but ignoring the physical memory constraints of the embedded hardware.
    **The Consequence:** The design looks correct on paper but immediately causes Out-Of-Memory crashes on the host MCU during traffic bursts.
  napkin_math: |
    * **Service Rate**: 4 TOPS / 0.3 GOPS (MobileNetV2) = 13,333 req/s.
    * **Queue Depth (Little's Law)**: L = Arrival Rate × Max Wait = 10 req/s × 0.5 s = 5 requests.
    * **Image Size**: 224 × 224 × 3 bytes = 150,528 bytes (~147 KB).
    * **Queue Memory**: 5 requests × 147 KB = 735 KB.
    * **Conclusion**: 735 KB > 512 KB. **The SRAM cannot hold the queue.**
