title: Architecting an INT8 Dataflow Pipeline for Hailo-8
scenario: You are designing an edge gateway for real-time video analytics that relies on a Hailo-8 accelerator.
  The application requires deploying a state-of-the-art vision model. The Hailo-8 provides 26 TOPS of
  INT8 compute at a highly efficient 2.5W, but it operates as a pure dataflow accelerator with no local
  DRAM, streaming all weights and activations directly from host memory. Evaluate the tradeoffs in conversion
  formats (e.g., PyTorch to ONNX to Hailo Executable Format) and design a delegation strategy for operators
  that the Hailo compiler cannot map to its dataflow architecture.
details:
  realistic_solution: A strong L5 candidate will evaluate the conversion graph to ensure a single, contiguous
    block of operations is mapped to the Hailo-8. They will propose using ONNX as an intermediate format
    with strict static shapes, applying QAT (Quantization-Aware Training) for optimal INT8 accuracy, and
    explicitly partitioning the model so that pre-processing and complex post-processing are delegated
    to the host CPU, minimizing host-accelerator memory traffic and keeping the 26 TOPS engine fully utilized.
  common_mistake: Candidates frequently design a standard sequential pipeline and ignore the host-memory
    streaming constraint. They often place unsupported operators in the middle of the graph, causing severe
    performance penalties due to repeated context switching and memory transfers back and forth between
    the host CPU and the Hailo-8 dataflow engine.
  napkin_math: Assuming an input resolution of 640x640x3 (1.2 MB/frame) and a target of 60 FPS, the host
    must stream ~72 MB/s of input data continuously. If the vision model requires 100 GOPS per frame,
    the total compute requirement is 6 TOPS. With 26 TOPS available, the compute is easily satisfied.
    However, a single mid-graph fallback to the host CPU for a 32MB intermediate activation tensor at
    60 FPS would demand an additional 3.8 GB/s of bidirectional transfer, heavily taxing host memory bandwidth
    and degrading the efficiency of the 2.5W system.
