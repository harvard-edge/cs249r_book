title: Edge TPU Audio Event Ingestion Architecture
scenario: 'You are designing a real-time anomaly detection system for industrial machines using acoustic
  sensors. The edge device is equipped with a Google Coral Edge TPU (4 TOPS INT8, 2W) connected via USB.
  You have two proposed streaming ingestion pipelines: Architecture A uses a local sliding window buffer
  that computes mel-spectrograms on the host CPU before feeding INT8-quantized frames to the Coral TPU
  every 500ms. Architecture B streams raw audio directly into a recurrent model on the Coral TPU that
  processes sample-by-sample. Evaluate both architectures and determine which is better for this edge
  environment.'
question: "Which streaming ingestion architecture is better for the 2W USB Coral Edge TPU anomaly detector, and why?"
details:
  realistic_solution: Architecture A is the superior design. The host CPU is much better suited for deterministic
    DSP operations like computing mel-spectrograms. By batching 500ms of audio into a 2D feature map and
    quantizing it to INT8, we leverage the Coral TPU's massive 4 TOPS strength in 2D spatial convolutions
    (CNNs). This minimizes host-to-TPU USB transfer overhead and aligns perfectly with the Edge TPU's
    limited INT8 operator support.
  common_mistake: Candidates often choose Architecture B, assuming end-to-end deep learning is always
    better and that processing raw audio directly on the TPU avoids host CPU overhead. They fail to realize
    that the Coral Edge TPU lacks robust support for complex recurrent states or arbitrary DSP operations,
    and that INT8 quantization of raw audio waveforms often destroys signal fidelity.
  napkin_math: 'Audio sample rate: 16 kHz. A 500ms window = 8,000 samples. In Architecture A, the CPU
    converts 8,000 samples to a 64x64 mel-spectrogram (INT8). USB transfer size = 64 * 64 * 1 byte = 4
    KB per 500ms, or 8 KB/sec bandwidth. At 4 TOPS, a typical CNN (approx 300 MACs) takes < 2ms to execute.
    The 2W power budget is easily maintained by keeping the USB bus mostly idle and performing burst inferences
    every 500ms.'
