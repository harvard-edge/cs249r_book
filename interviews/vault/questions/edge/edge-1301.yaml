title: Latency Spikes During Edge Drift Detection
scenario: An autonomous monitoring system runs a vision model on an NVIDIA Jetson Orin. To monitor for environmental data drift, a background process runs every 10 minutes to compute KL divergence and PSI on FP32 feature embeddings. During this background process, the primary INT8 object detection model experiences a sudden 40% latency spike and drops frames.
question: Why does the FP32 KL/PSI drift monitor cause a 40% latency spike in the primary INT8 model on Jetson Orin?
details:
  realistic_solution: 'The root cause is memory bandwidth contention and thermal throttling. The Jetson Orin shares its LPDDR5 bandwidth between the Ampere GPU, DLA, and CPU. Computing KL divergence on unquantized FP32 embeddings is highly memory-bound, demanding massive burst bandwidth and spiking CPU power. This pushes the SoC near its TDP limit, triggering dynamic frequency scaling (DVFS) that downclocks the GPU/DLA and starves the primary inference.'
  common_mistake: |
    **The Pitfall:** Assuming the Ampere GPU is running out of compute capacity (TOPS).
    **The Rationale:** Candidates fail to recognize the shared memory architecture and unified TDP envelope of edge SoCs.
    **The Consequence:** Attempting to optimize the INT8 model further when the actual fix is throttling the background CPU task's memory access.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - TDP: 60W limit
       - FP32 Data: 250,000 embeddings * 1024 dims * 4 bytes ~ 1.02 GB
       - Process time: 0.5 seconds
    2. **Calculations:**
       - Memory bandwidth required: 1.02 GB / 0.5s = 2.04 GB/s continuous read.
       - Multiple sweeps for histogram binning (e.g., 3 passes): 2.04 * 3 = 6.12 GB/s burst.
       - Sustained high CPU load pushes power to >50W, leaving insufficient headroom for the GPU at max clocks.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth Contention & DVFS Throttling.** The burst memory traffic and power draw force a 30-40% GPU downclock, directly causing the latency spike.
