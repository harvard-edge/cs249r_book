title: Evaluating Memory-Mapped Weight Loading on Jetson Orin
scenario: 'You are deploying a multi-modal perception pipeline on an NVIDIA Jetson
  Orin (32 GB LPDDR5). The pipeline consists of three separate vision models totaling
  24 GB in FP16, and you need to run three distinct inference processes for different
  camera streams. You must evaluate two approaches for loading weights: standard eager
  loading per process versus a unified memory-mapped (mmap) approach across processes.
  Which approach do you choose to optimize for cold start time and memory footprint,
  and what are the system-level tradeoffs?'
question: Which approach do you choose to optimize for cold start time and memory
  footprint, and what are the system-level tradeoffs?
details:
  realistic_solution: The memory-mapped approach is mandatory here to avoid OOM, as
    mmap allows multiple processes to share the exact same read-only physical memory
    pages for the 24 GB weights. By mapping the weights directly into the unified
    LPDDR5 pool, memory usage remains at 24 GB across all processes. To mitigate demand-paging
    latency, a warm-up pass or explicit memory locking (mlock) should be evaluated
    to pin critical layers before serving real-time requests.
  common_mistake: Candidates often choose standard eager loading without realizing
    that three separate processes loading 24 GB of weights will immediately OOM the
    32 GB shared memory pool. Alternatively, they may suggest mmap but fail to account
    for page cache thrashing or the fact that demand paging introduces latency spikes
    on the first forward pass.
  napkin_math: 'Standard loading memory: 3 processes * 24 GB = 72 GB (Fails on 32
    GB Orin). Mmap memory: 1 * 24 GB = 24 GB total physical weight footprint. Remaining
    memory: 32 GB - 24 GB = 8 GB for OS, activations, and Ampere GPU workspace. Quantizing
    the models to INT8 to utilize the 275 TOPS DLA/GPU compute would reduce the mmap
    footprint to 12 GB, leaving a much safer 20 GB for high-resolution video buffers
    and staying well within the 60W TDP.'
