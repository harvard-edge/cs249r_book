title: Evaluating Memory-Mapped Weight Loading on Jetson Orin
scenario: 'You are deploying a multi-modal perception pipeline. The pipeline consists of three separate vision models totaling 24 GB in FP16, and you need to run three distinct inference processes for different camera streams. You must evaluate two approaches for loading weights: standard eager loading per process versus a unified memory-mapped (mmap) approach across processes.'
question: Which approach optimizes cold start time and memory footprint on an NVIDIA Jetson Orin (32 GB LPDDR5), and what are the system tradeoffs?
details:
  realistic_solution: The memory-mapped approach is mandatory here to avoid OOM, as mmap allows multiple processes to share the exact same read-only physical memory pages for the 24 GB weights. By mapping the weights directly into the unified LPDDR5 pool, memory usage remains at 24 GB across all processes. To mitigate demand-paging latency, a warm-up pass or explicit memory locking (mlock) should be evaluated to pin critical layers before serving real-time requests.
  common_mistake: |
    **The Pitfall:** Choosing standard eager loading, or suggesting mmap while ignoring demand-paging latency.
    **The Rationale:** Candidates fail to realize that three separate processes eagerly loading 24 GB of weights will immediately OOM the 32 GB shared memory pool, or they forget that mmap introduces page cache thrashing on the first forward pass.
    **The Consequence:** The system immediately crashes due to Out of Memory (OOM) errors, or experiences severe latency spikes during the first inference request.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 3 vision models totaling 24 GB in FP16.
       - 3 distinct inference processes.
       - Target Hardware: NVIDIA Jetson Orin (32 GB unified memory).
    2. **Calculations:**
       - Standard eager loading memory: 3 processes * 24 GB = 72 GB (Fails on 32 GB Orin).
       - Mmap memory: 1 * 24 GB = 24 GB total physical weight footprint.
       - Remaining memory: 32 GB - 24 GB = 8 GB for OS, activations, and Ampere GPU workspace.
       - Quantizing the models to INT8 reduces mmap footprint to 12 GB, leaving 20 GB free.
    3. **Conclusion & Interpretation:**
       **Conclusion: Mmap is strictly required to fit within the 32 GB footprint.** **Result: Memory-Bound.**
