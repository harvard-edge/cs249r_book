title: The ToF Sensor Crosstalk
scenario: Your warehouse deploys 8 Rockchip RK3588 edge nodes, each with a time-of-flight (ToF) depth sensor, for pallet detection along a 50-meter aisle. Each node works perfectly in isolation. When all 8 are powered on simultaneously, depth readings become noisy — range error jumps from ±2cm to ±30cm — and pallet detection accuracy drops from 95% to 60%. The nodes are spaced 6 meters apart.
question: "Why do the ToF depth readings become noisy when all 8 sensors are powered on simultaneously?"
details:
  realistic_solution: Time-of-flight sensors work by emitting modulated IR light (typically 850nm or 940nm) and measuring the phase shift of the reflected signal to compute distance. When multiple ToF sensors operate simultaneously, each sensor receives not only its own reflected light but also the modulated IR from neighboring sensors — this is multipath interference or crosstalk.
  common_mistake: |
    **The Pitfall:** Blaming WiFi interference or physical spacing constraints.
    **The Rationale:** Candidates often jump to radio frequency issues or assume the sensors are physically too close for the processing hardware.
    **The Consequence:** Time is wasted debugging wireless networks or relocating sensors, missing the fundamental optical phase interference problem.
  napkin_math: |
    1. ToF sensor emits ~1W optical at 850nm with a 60° FoV. At 6m, the inverse-square law yields ~1mW/m² from a neighbor.
    2. A sensor pixel receives its own signal (e.g., ~1mW after 5% surface reflectivity at 3m) and scattered neighbor light (~0.5mW).
    3. This ~50% interference ratio causes a phase error of roughly ±15°.
    4. **Range error = ±15/360 * 5m = ±0.21m (≈ ±20cm), matching the observed anomaly.**
  options:
  - Time-of-flight sensors emit modulated IR light, and neighboring sensors cause multipath phase interference (crosstalk).
  - Network packets over WiFi are colliding due to the 6-meter spacing.
  - The Rockchip RK3588's NPU is overheating when processing 8 streams simultaneously.
  - The physical spacing of 6 meters creates an acoustic resonance that disrupts the ToF measurement.
