title: The Sensor Data Deluge
scenario: You are designing the data ingestion pipeline for an autonomous vehicle's main perception system.
  A single, forward-facing 8MP camera is streaming raw, uncompressed video. To make any decisions, the
  system must first get this data from the sensor into memory for processing. What is the approximate
  bandwidth you must be prepared to handle from a standard automotive camera interface like a 4-lane MIPI
  CSI-2?
details:
  realistic_solution: A standard 4-lane MIPI CSI-2 camera interface provides approximately 2.5 GB/s of
    bandwidth. This is a fundamental constraint that dictates the design of the entire downstream perception
    pipeline, from bus architecture to memory subsystem bandwidth.
  common_mistake: Engineers often underestimate the sheer volume of raw sensor data, confusing it with
    consumer-grade interconnects like USB or Ethernet, or thinking in terms of compressed video streams
    (e.g., H.264). A raw 8MP (4K) camera at 30-60fps generates gigabytes per second, not megabytes.
  napkin_math: The hardware source-of-truth specifies the MIPI CSI-2 (4-lane) interconnect at ~2.5 GB/s.
    At this rate, a single camera would fill a 32 GB LPDDR5 memory module in approximately 12.8 seconds
    (32 GB / 2.5 GB/s). This highlights why immediate, on-the-fly processing is essential in edge systems,
    as buffering large amounts of raw sensor data is often infeasible.
  options:
  - ~125 MB/s
  - ~500 MB/s
  - ~2.5 GB/s
  - ~25 GB/s
  correct_index: 2
