title: INT8 Quantization Impact on Edge Data Quality Gates
scenario: A data quality gate on a Google Coral Edge TPU (4 TOPS INT8, 2W) validates 10,000 sensor readings per second perfectly, requiring 50 MOPs per reading. A firmware update expands the raw data's dynamic range by 4x without changing the feature schema or frequency. The gate suddenly misses 30% of critical anomalies despite zero dropped frames.
question: Given the Coral's INT8 requirement, why did the data validation accuracy degrade after the 4x sensor range increase, and what is the compute utilization?
details:
  realistic_solution: The accuracy drop is caused by quantization resolution loss, not a system resource bottleneck. The Edge TPU requires all inputs to be quantized to INT8 (256 discrete bins). When the dynamic range expanded by 4x, the quantization step size had to increase proportionally. This larger step size erased the subtle numerical deviations that the data quality model relied on to flag anomalies.
  common_mistake: |
    **The Pitfall:** Assuming a compute bottleneck or thermal throttling caused the accuracy drop.
    **The Rationale:** Candidates look at the increased dynamic range and assume it requires more processing power, failing to realize the data schema size remained identical.
    **The Consequence:** Time is wasted optimizing non-existent performance bottlenecks instead of addressing the mathematical reality of fixed-point quantization resolution loss.
  napkin_math: |
    * **Compute Required:** 10,000 readings/sec * 50 MOPs/reading = 500 GOPs (0.5 TOPS).
    * **Utilization:** 0.5 TOPS / 4.0 TOPS = **12.5% compute utilization**.
    * **Quantization Impact (Example):** If the original 0-10V range used INT8 (256 bins), resolution was ~0.039V/bin. The new 0-40V range changes resolution to ~0.157V/bin.
    * **Conclusion:** The larger step size masks anomalies smaller than 0.157V, causing the 30% miss rate due to lost precision.
