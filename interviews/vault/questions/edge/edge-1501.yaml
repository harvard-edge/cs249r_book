title: Latency Spikes in Conditional Privacy Guardrails on Hailo-8
scenario: A smart security camera on a Hailo-8 accelerator (26 TOPS INT8, 2.5W, no local DRAM) conditionally triggers a secondary 5MB 'face-blurring' model when a person is detected by the primary 25MB model. In crowded environments, latency spikes from 30ms to over 300ms, but compute utilization remains under 30%.
question: What hardware architecture constraint causes these extreme latency spikes despite low compute utilization?
details:
  realistic_solution: The root cause is PCIe bandwidth saturation and massive context-switching
    overhead. Because the Hailo-8 has no local DRAM, conditionally swapping between
    the primary model and the guardrail model requires re-streaming the network weights
    and graph over the host interface each time. The solution is either to co-compile
    both models into a single unified dataflow context using the Hailo toolchain to
    avoid swapping, or to offload the lightweight privacy guardrail to the host CPU.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the issue as thermal throttling or compute saturation.
    **The Rationale:** Engineers ignore the specific "no local DRAM" architecture of the Hailo-8.
    **The Consequence:** Attempting to optimize model FLOPs instead of fixing the catastrophic I/O memory streaming bottleneck.
  napkin_math: |
    1. **Model sizes**: Primary = 25MB, Guardrail = 5MB.
    2. **Host interface**: PCIe Gen3 x4 link yields ~4 GB/s effective bandwidth.
    3. **Swap penalty**: (5MB + 25MB) / 4 GB/s = 7.5 ms I/O latency per trigger.
    4. **Crowd scenario**: 30 triggers per frame.
    5. **Total I/O penalty**: 30 * 7.5 ms = **225 ms pure memory streaming latency**.
    6. **Conclusion**: The lack of local DRAM requires re-streaming weights over PCIe, making the system totally I/O bound.
