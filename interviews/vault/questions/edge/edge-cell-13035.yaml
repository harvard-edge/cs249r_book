title: 'Edge Queueing Theory Diagnosis: Jetson Orin Pipeline Latency Spike'
scenario: 'A Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) autonomous drone shows intermittent 500ms latency
  spikes on its obstacle detection pipeline (normal P50: 15ms, SLO: 50ms). Average GPU utilization is
  35%. The spikes correlate with IMU data logging every 500ms. Diagnose the root cause using queueing
  theory and quantify the fix.'
details:
  realistic_solution: 'Normal operation: ρ=0.35 (GPU), W=15ms. During IMU log: DMA burst writes 500ms
    * IMU_rate * data_size to LPDDR5. IMU at 1kHz: 1000 samples * 6 axes * 4 bytes * 0.5s = 12KB. But
    if flash write with 32MB buffer: DMA burst = 32MB to eMMC at 100MB/s = 320ms DMA burst. Memory bus
    contention: LPDDR5 102.4GB/s, but DMA + GPU inference conflict → GPU stalls 320ms. Fix: use asynchronous
    DMA with pinned memory, separate DMA controller, or log in background. Expected improvement: eliminate
    300ms stall.'
  common_mistake: Blaming the GPU since it's running the inference model, when the real issue is a periodic
    DMA burst from IMU logging that saturates the memory bus, causing inference to stall waiting for memory
    access.
  napkin_math: 'IMU logging: 500ms * 1kHz * 24 bytes = 12KB data. But SD card write: 32MB block transfer.
    DMA bandwidth: LPDDR5 102.4GB/s, eMMC 100MB/s. Bottleneck: eMMC at 100MB/s, 32MB takes 320ms. During
    this: GPU memory requests queued behind DMA. GPU inference: 14ms per frame, 320ms stall = 22 missed
    frames queued. Drain time post-stall: 22 frames / (1/14ms - arrival_rate). Fix: async logging with
    separate DMA channel. Jetson Orin has dedicated DMA engines — configure IMU logging to use SDMMC DMA,
    not system DMA.'
