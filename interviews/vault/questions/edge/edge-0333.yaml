title: 'The INT8 Energy Dividend'
scenario: You're optimizing a LiDAR segmentation model for an autonomous vehicle's edge ECU. To meet the thermal budget, you're considering quantizing parts of the network from 16-bit floating-point (FP16) to 8-bit integer (INT8).
question: For a single arithmetic operation, what is the approximate reduction in energy consumption when switching from FP16 to INT8?
details:
  realistic_solution: |
    An INT8 operation consumes roughly 5-6 times less energy than an FP16 operation. The energy cost of a computation is related to the number of transistors switching, which does not scale linearly with bit width. According to the standard invariant numbers, an FP32 operation is ~3.4x more costly than FP16, and ~18x more costly than INT8. This implies an FP16 operation is about 18 / 3.4 ≈ 5.3 times more energy-intensive than an INT8 operation.
  common_mistake: |
    **The Pitfall:** Assuming energy savings scale linearly with bit-width (i.e., 2x savings).
    **The Rationale:** Halving the bits intuitively seems like it would halve the energy.
    **The Consequence:** Drastically underestimating the thermal benefits of INT8 quantization for edge deployments.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP32 vs FP16 Energy: FP32 is ~3.4x more costly than FP16.
    - FP32 vs INT8 Energy: FP32 is ~18x more costly than INT8.

    **Calculations:**
    - FP16 to INT8 Ratio: 18 / 3.4 = 5.29.

    **Conclusion & Interpretation:**
    - **Result: Power-Bound (Energy Efficiency)**. Switching from FP16 to INT8 saves approximately ~5x energy per operation.
  options:
  - ~2x less energy
  - ~18x less energy
  - ~5x less energy
  - No significant energy change
  correct_index: 2
