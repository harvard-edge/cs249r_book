title: Memory Footprint Estimation for Qualcomm Cloud AI 100
scenario: You must deploy a 13-billion parameter language model onto a Qualcomm Cloud AI 100 inference accelerator with 32 GB of LPDDR4x memory.
question: Does the INT8 13B model fit in 32 GB on Cloud AI 100 after reserving 4 GB for KV cache and 2 GB for workspace, and how much remains?
details:
  realistic_solution: Calculate the static weight footprint using INT8 quantization (1 byte per parameter). Then, sum the static memory with the dynamic memory reservations (KV cache and execution workspace). Subtract this total from the 32 GB hardware capacity to determine the remaining headroom.
  common_mistake: |
    **The Pitfall:** Calculating only the static weight footprint.
    **The Rationale:** Forgetting to deduct the dynamic memory requirements (KV cache and execution workspace) necessary for auto-regressive generation.
    **The Consequence:** Deploying a model that OOMs during inference as soon as the sequence length grows.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 13 billion parameters quantized to INT8 (1 byte/param).
       - Hardware: Cloud AI 100 with 32 GB capacity.
       - Reservations: 4 GB KV cache, 2 GB workspace.
    2. **Calculations:**
       - Weights footprint: 13 billion * 1 byte = 13 GB.
       - Total required: 13 GB (weights) + 4 GB (KV cache) + 2 GB (workspace) = 19 GB.
       - Remaining memory: 32 GB - 19 GB = 13 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory Capacity-Bound. The model fits with exactly 13 GB of headroom remaining.**
