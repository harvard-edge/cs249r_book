title: 'CI/CD Validation Latency and Energy on Cloud AI 100'
scenario: 'In your automated CI/CD pipeline, every new quantized model version must be profiled on target hardware before promotion to the production registry to ensure training-serving consistency. You are targeting an on-premise inference server equipped with a Qualcomm Cloud AI 100 accelerator (400 TOPS INT8, 75W TDP). The pipeline runs a golden validation set of 1,000,000 samples to verify performance regressions.'
question: 'What are the theoretical minimum validation time and accelerator energy for 1,000,000 samples at 500 GOPS each on a 400 TOPS, 75W AI 100?'
details:
  realistic_solution: 'The candidate should first convert the platform''s compute capacity to the same unit as the model requirements to find the theoretical maximum throughput. By dividing the total samples by the accelerator''s throughput, they find the time required. Finally, multiplying the time by the accelerator''s TDP gives the total energy consumption for the CI/CD profiling job.'
  common_mistake: |
    **The Pitfall:** Confusing GOPS with TOPS or forgetting to convert validation time to energy.
    **The Rationale:** Candidates mix up unit magnitudes (missing the 1000x factor) or fail to realize Watts are Joules per second.
    **The Consequence:** The calculated validation time is off by orders of magnitude, or the energy estimate is completely omitted.
  napkin_math: |
    - Compute capacity: 400 TOPS = 400,000 GOPS.
    - Max Throughput: 400,000 GOPS / 500 GOPS/sample = **800 samples/second**.
    - Validation Time: 1,000,000 samples / 800 samples/second = 1,250 seconds (**~20.8 minutes**).
    - Energy Consumption: 1,250 seconds * 75W (Joules/sec) = **93,750 Joules**.
