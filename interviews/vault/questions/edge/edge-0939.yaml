title: 'Designing Fallback for an Autonomous System'
scenario: 'An autonomous drone uses an onboard ML model for obstacle avoidance. The model occasionally fails (1 in 10K inferences) when encountering novel objects not in training data. Option A: heuristic fallback (stop and hover). Option B: simpler model trained on synthetic data covering more scenarios. Option C: always run both models and take the more conservative action.'
question: 'Which strategy is best for a safety-critical system?'
details:
  realistic_solution: 'Option C (parallel execution, conservative fusion) is the only acceptable answer for safety-critical systems. Option A (stop and hover) is safe but operationally degrading — if the drone stops every time the primary model is uncertain, it becomes unusable in novel environments (construction zones, unusual weather). 1 in 10K failures with continuous inference (~30 Hz) means a failure every ~5.5 minutes. Option B (simpler model on synthetic data) introduces its own failure modes — synthetic data may not cover real-world edge cases, and the simpler model may be confidently wrong on scenarios the primary model correctly flags as uncertain. Option C runs both models on every frame. The system takes the more conservative prediction (e.g., if either model detects an obstacle, avoid it). This provides: (1) redundancy — both must fail simultaneously for system failure, (2) safety — conservative fusion errs on the side of caution, (3) continuous operation — the drone never needs to stop, it just uses the safer prediction. Cost: 2x compute, which is acceptable for safety-critical applications.'
  common_mistake: |
    **The Pitfall:** Suggesting "stop and hover" as the primary fallback mechanism for an autonomous drone.
    **The Rationale:** Candidates prioritize absolute safety without considering the operational frequency of the failure.
    **The Consequence:** At a 1/10K failure rate at 30Hz, the drone would stop every 5 minutes, making it operationally useless.
  napkin_math: |
    - Primary failure rate: 1/10,000.
    - Inference rate: 30 Hz.
    - Failures per second: 30 / 10,000 = 0.003 failures/sec.
    - Time between failures: 1 / 0.003 = 333 seconds = **~5.5 minutes**.
    - Simultaneous failure rate (conservative fusion): (1/10K) * (1/5K) = **1/50,000,000**.
