title: Battery Life for Solar-Powered Edge Device
scenario: You're deploying a wildlife monitoring camera in a national park. It runs on a 50 Wh LiFePO4 battery charged by a 10W solar panel. The system has a Coral Edge TPU (2W during inference) and a Raspberry Pi Compute Module 4 (3.5W active, 0.4W suspend). The camera captures an image every 10 seconds during daylight (12 hours) and every 60 seconds at night (12 hours). Each inference takes 50ms. Estimate the daily energy budget and determine if the system can run indefinitely.
question: "What is the daily energy budget, and can the system run indefinitely on the 10W solar panel?"
details:
  realistic_solution: "The key insight is that the 0.4W suspend mode dominates energy use over the full 24 hours, not the brief inference bursts. The duty cycle keeps average power at ~0.41W, which is well below the solar harvest rate. The system runs indefinitely."
  common_mistake: '"The system draws 5.5W (RPi + Coral) continuously. At 50 Wh battery: 9 hours. Solar provides 10W for 12 hours = 120 Wh. 120 Wh > 50 Wh, so it runs forever." This assumes the RPi and Coral are always active, which would drain the battery overnight. It also assumes 10W solar for 12 hours, which ignores that solar output follows a bell curve (peak at noon, near-zero at dawn/dusk).'
  napkin_math: "Daytime (12h, 10s interval): 4320 captures. Energy/capture = (0.05s * 5.5W) + (9.95s * 0.4W) = 4.255 J. Total Day = 4320 * 4.255 J = 18,381.6 J = 5.11 Wh. Night (12h, 60s interval): 720 captures. Energy/capture = (0.05s * 5.5W) + (59.95s * 0.4W) = 24.255 J. Total Night = 720 * 24.255 J = 17,463.6 J = 4.85 Wh. Total Daily Consumption = 5.11 + 4.85 = 9.96 Wh. Average power draw = 9.96 Wh / 24h = 0.415W. Solar input: 10W panel * ~3.85 effective peak hours = 38.5 Wh. Solar surplus ratio: 38.5 / 9.96 = 3.86x. The system operates with a healthy surplus."
