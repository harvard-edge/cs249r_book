title: Battery Life for Solar-Powered Edge Device
scenario: You're deploying a wildlife monitoring camera in a national park. It runs on a 50 Wh LiFePO4
  battery charged by a 10W solar panel. The system has a Coral Edge TPU (2W during inference) and a Raspberry
  Pi Compute Module 4 (3.5W active, 0.4W suspend). The camera captures an image every 10 seconds during
  daylight (12 hours) and every 60 seconds at night (12 hours). Each inference takes 50ms. Estimate the
  daily energy budget and determine if the system can run indefinitely.
details:
  realistic_solution: 'Calculate the duty-cycled energy budget. Daytime (12h): 4320 captures x (50ms active
    at 5.5W + 9.95s suspend at 0.4W) = 18,381 Joules = 5.11 Wh. Night (12h): 720 captures x (50ms active
    at 5.5W + 59.95s suspend at 0.4W) = 17,463 Joules = 4.85 Wh. Total daily consumption: 9.96 Wh. Solar
    input: 10W panel x ~3.85 effective peak hours = 38.5 Wh. Daily surplus: 38.5 - 9.96 = 28.54 Wh. The
    system runs indefinitely with a 3.86x solar surplus. The key insight: the 0.4W suspend mode dominates
    energy use (not the brief inference bursts), and the duty cycle keeps average power at 0.41W — well
    below the solar harvest rate.'
  common_mistake: '"The system draws 5.5W (RPi + Coral) continuously. At 50 Wh battery: 9 hours. Solar
    provides 10W for 12 hours = 120 Wh. 120 Wh > 50 Wh, so it runs forever." This assumes the RPi and
    Coral are always active, which would drain the battery overnight. It also assumes 10W solar for 12
    hours, which ignores that solar output follows a bell curve (peak at noon, near-zero at dawn/dusk).'
  napkin_math: 'Average power draw: 9.96 Wh / 24h = 0.415W. Duty cycle: active 400ms per capture, ~0.4–4%
    of time. Effective power during active: 5.5W avg. Effective power during suspend: 0.4W. Solar surplus
    ratio: 38.5 / 9.96 = 3.86× — very healthy. Could add more compute (e.g., run a larger model) and still
    be solar-positive. Maximum sustainable compute power: (38.5 − 4.85 night) / 12h daytime = 2.8W average
    during daytime — enough for continuous RPi + Coral operation without duty cycling.'
