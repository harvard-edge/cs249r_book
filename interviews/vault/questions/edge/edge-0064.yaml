title: Battery Life for Solar-Powered Edge Device
scenario: You're deploying a wildlife monitoring camera in a national park. It runs on a 50 Wh LiFePO4 battery charged by a 10W solar panel. The system has a Coral Edge TPU (2W during inference) and a Raspberry Pi Compute Module 4 (3.5W active, 0.4W suspend). The camera captures an image every 10 seconds during daylight (12 hours) and every 60 seconds at night (12 hours). Each inference takes 50ms.
question: "Estimate the daily energy budget and determine if the system can run indefinitely on the 10W solar panel?"
details:
  realistic_solution: "The key insight is that the 0.4W suspend mode dominates energy use over the full 24 hours, not the brief inference bursts. The duty cycle keeps average power at ~0.41W, which is well below the solar harvest rate. The system runs indefinitely."
  common_mistake: |
    **The Pitfall:** Calculating continuous active power instead of the duty-cycled average.
    **The Rationale:** Candidates multiply peak active power (5.5W) by 24 hours and assume solar runs at 10W for 12 hours, completely ignoring sleep states and solar curves.
    **The Consequence:** Massively over-provisioning battery and solar panels, ruining unit economics for the fleet.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Coral + RPi Active: 5.5W (0.05s per inference)
       - RPi Suspend: 0.4W
       - Solar: 10W for ~3.85 effective peak hours = 38.5 Wh/day
    2. **Calculations:**
       - Day (10s intervals): 4320 captures. Energy = 4320 * (0.05s * 5.5W + 9.95s * 0.4W) / 3600 = 5.11 Wh
       - Night (60s intervals): 720 captures. Energy = 720 * (0.05s * 5.5W + 59.95s * 0.4W) / 3600 = 4.85 Wh
       - Total Daily Consumption = 5.11 Wh + 4.85 Wh = 9.96 Wh
       - Solar surplus ratio = 38.5 Wh / 9.96 Wh = 3.86x
    3. **Conclusion & Interpretation:**
       **Result: 9.96 Wh consumed vs 38.5 Wh generated (Energy-Positive)**
