title: Edge NLP Architecture Tradeoffs for Summarization on NVIDIA Jetson Orin
scenario: 'You are tasked with deploying a natural language processing (NLP) model
  for real-time text summarization on an NVIDIA Jetson Orin device. This device features
  32 GB LPDDR5 memory, 275 TOPS INT8 compute capacity, and a 60W power budget. Your
  team is evaluating three primary architectural approaches for the summarization
  task: a compact encoder-only model (e.g., a fine-tuned BERT variant used for extractive
  summarization or feature extraction for a simpler summarizer), a decoder-only model
  (e.g., a small generative GPT-like model directly producing summaries), or a full
  encoder-decoder model (e.g., a compact T5 or BART variant for sequence-to-sequence
  summarization). Considering the stringent constraints of the Jetson Orin, how would
  you analyze and compare the system costs – specifically memory footprint, computational
  latency, and power consumption – for each of these architectural choices to recommend
  the most suitable option for deployment?'
question: How would you compare encoder-only, decoder-only, and encoder-decoder summarizers
  on Jetson Orin for memory, latency, and power, and choose one?
details:
  realistic_solution: A realistic solution requires a systematic, constraint-driven
    analysis. First, estimate the memory footprint for each model (parameters + activations),
    considering various quantization levels (e.g., FP32, FP16, INT8). Compare these
    against the 32 GB LPDDR5. Second, calculate the estimated INT8 operations per
    inference for each architecture, mapping these to the 275 TOPS INT8 capacity to
    predict latency. Third, assess the power draw, understanding that higher compute
    often correlates with higher power, to ensure the 60W budget is met. This analysis
    should lead to a recommendation that balances task performance with the hardware's
    specific capabilities, potentially favoring highly optimized encoder-only models
    for feature extraction coupled with lightweight custom decoders, or severely pruned/quantized
    encoder-decoder models.
  common_mistake: A common mistake is to prioritize model accuracy or expressiveness
    without adequately accounting for the severe memory, compute, and power limitations
    of edge devices like the Jetson Orin. Candidates might propose a large generative
    model (decoder-only or encoder-decoder) without considering the necessity of aggressive
    quantization, pruning, or knowledge distillation. This often leads to solutions
    that exceed the available 32 GB LPDDR5 memory, cannot meet real-time latency requirements
    within the 275 INT8 TOPS, or violate the 60W power budget, making deployment infeasible.
  napkin_math: "1. **Memory:** A 1-billion parameter model in FP32 (4 bytes/param)\
    \ requires 4GB. In INT8 (1 byte/param), it's 1GB. For a 32GB RAM device, a ~20B\
    \ INT8 model is the theoretical max for parameters alone, but activations for\
    \ long sequences or large batch sizes add significant overhead. \n2. **Compute\
    \ (TOPS):** Jetson Orin offers 275 INT8 TOPS (Tera Operations Per Second). If\
    \ an inference requires 10 TOPs, it can theoretically perform 27.5 inferences/second.\
    \ Compare this against typical model inference costs. For transformer layers,\
    \ the complexity scales with sequence length (L) and embedding dimension (D),\
    \ often D*L^2 or D^2*L for attention, plus MLP costs. Quantizing from FP32 to\
    \ INT8 typically yields a 2-4x speedup, but this must be available and effective\
    \ on the hardware. \n3. **Power (60W):** Inference power can be estimated by workload\
    \ intensity. If the average power draw for your model at full utilization is,\
    \ say, 1 GOP/sec/Watt, and your model needs 200 TOPs, that's 200W, far exceeding\
    \ the 60W budget. You need to consider power efficiency (TOPS/W) of the specific\
    \ chip and target a utilization level that keeps the device within budget. For\
    \ example, sustaining 50 TOPS might be more realistic within 60W for some workloads."
