title: Edge NLP Architecture Tradeoffs for Summarization on NVIDIA Jetson Orin
scenario: You are tasked with deploying a natural language processing (NLP) model for real-time text summarization on an NVIDIA Jetson Orin device. This device features 32 GB LPDDR5 memory, 275 TOPS INT8 compute capacity, and a 60W power budget. Your team is evaluating three primary architectural approaches for the summarization task: a compact encoder-only model (e.g., a fine-tuned BERT variant used for extractive summarization or feature extraction for a simpler summarizer), a decoder-only model (e.g., a small generative GPT-like model directly producing summaries), or a full encoder-decoder model (e.g., a compact T5 or BART variant for sequence-to-sequence summarization).
question: How would you compare encoder-only, decoder-only, and encoder-decoder summarizers on Jetson Orin for memory, latency, and power, and choose one?
details:
  realistic_solution: A realistic solution requires a systematic, constraint-driven analysis. First, estimate the memory footprint for each model (parameters + activations), considering various quantization levels (e.g., FP32, FP16, INT8). Compare these against the 32 GB LPDDR5. Second, calculate the estimated INT8 operations per inference for each architecture, mapping these to the 275 TOPS INT8 capacity to predict latency. Third, assess the power draw, understanding that higher compute often correlates with higher power, to ensure the 60W budget is met. This analysis should lead to a recommendation that balances task performance with the hardware's specific capabilities, potentially favoring highly optimized encoder-only models for feature extraction coupled with lightweight custom decoders, or severely pruned/quantized encoder-decoder models.
  common_mistake: |
    **The Pitfall:** Prioritizing model accuracy or expressiveness without accounting for severe memory, compute, and power limitations.
    **The Rationale:** Proposing large generative models without aggressive quantization or pruning due to a lack of edge hardware intuition.
    **The Consequence:** Delivering a solution that immediately OOMs, violates the 60W power budget, or severely misses real-time latency targets.
  napkin_math: |
    - Memory: A 1-billion parameter model in FP32 requires 4GB. In INT8, it's 1GB. For a 32GB RAM device, a ~20B INT8 model is the theoretical max for parameters alone.
    - Compute: Jetson Orin offers 275 INT8 TOPS. Transformer layer complexity often scales as D*L^2 or D^2*L.
    - Power: If average power draw at full utilization is ~1 GOP/sec/Watt, a model needing 200 TOPS demands 200W, failing the 60W budget.
    - **Result: Hardware concurrency and scaling limits dictate that a heavily quantized encoder-only model is the safest choice.**
