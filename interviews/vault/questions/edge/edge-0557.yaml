title: The Shared Bus Arbitration Lock
scenario: Your edge gateway runs a 4K camera feed into an NPU. You also have an external Gigabit Ethernet
  controller on the same physical PCIe bus. The NPU requires 3 GB/s of memory bandwidth to run the model
  at 30 FPS. The Ethernet controller uses 100 MB/s. The PCIe bus supports 4 GB/s. Theoretically, there
  is plenty of bandwidth. But when Ethernet traffic spikes, the NPU frame rate drops to 15 FPS. Why?
details:
  realistic_solution: 'You''re experiencing PCIe bus arbitration starvation. The NPU and Ethernet controller
    share a single PCIe bus. Although total bandwidth (3 + 0.1 = 3.1 GB/s) is under the 4 GB/s limit,
    the Ethernet controller sends large burst packets that lock the bus arbiter for ~25 microseconds each.
    The NPU needs fresh data every ~10 microseconds for its MAC array pipeline. During each Ethernet burst,
    the NPU misses 2 data deadlines, causing its compute arrays to stall. Over one second, these stalls
    accumulate to hundreds of milliseconds of idle time, halving the frame rate. The fix: implement QoS-based
    bus arbitration, use traffic shaping on the Ethernet controller, or place the NIC on a separate PCIe
    root port.'
  common_mistake: '"The CPU is getting overwhelmed by network interrupts." CPU interrupts affect software,
    but NPU frame drops point to a hardware data starvation issue.'
  napkin_math: NPU needs data every 10µs. Ethernet bursts 100KB packets, holding the bus for 25µs. The
    NPU misses 2 data deadlines per burst, causing the MAC arrays to sit idle for 15µs. Over 1 second,
    the NPU sits physically idle for hundreds of milliseconds purely due to hardware traffic jams.
