title: Hailo-8 Dataflow and On-chip Memory Utilization
scenario: 'You are optimizing a real-time object detection pipeline for deployment on a Hailo-8 (26 TOPS INT8, 2.5W dataflow accelerator). A specific, latency-critical 1x1 convolutional layer, processing an intermediate feature map of 64x64 with 128 input channels and 128 output channels, is observed to be a bottleneck.'
question: How should Hailo-8's on-chip SRAM and weight-stationary versus output-stationary dataflows minimize latency for the 1x1 convolution?
details:
  realistic_solution: 'A realistic solution involves deeply understanding the Hailo Dataflow Compiler''s capabilities and the physical architecture. For the 1x1 convolutional layer, one must consider whether a weight-stationary dataflow (where weights are held in local memory and input activations stream through) or an output-stationary dataflow (where output activations are held, and inputs/weights stream through) is more optimal for Hailo-8''s distributed compute and memory fabric. The goal is to maximize the utilization of on-chip SRAM and maintain continuous data streaming between processing elements, effectively creating an internal pipeline that avoids costly external memory fetches and minimizes internal data movement. Tiling strategies would then be designed to fit the layer''s data and computations within these localized on-chip resources.'
  common_mistake: |
    **The Pitfall:** Optimizing for external DDR memory access as if the hardware were a standard GPU.
    **The Rationale:** Candidates fall back on conventional GPU optimization paradigms, ignoring that Hailo-8 relies on a compiler-orchestrated network of on-chip SRAM to keep data local.
    **The Consequence:** Designing inefficient data pipelines that fail to utilize the internal SRAM fabric, missing the accelerator's true performance potential.
  napkin_math: |
    * Hailo-8 peak performance: 26 TOPS (INT8).
    * Typical power consumption: 2.5W.
    * Peak TOPS/Watt efficiency = 26 TOPS / 2.5W = **10.4 TOPS/Watt**.
