title: 'Edge TCO Realization: Jetson Orin Fleet Power Budget for Solar Deployment'
scenario: Concretely size a solar power system for a remote weather monitoring station running 24/7 with a 60W peak, 15W idle power profile. Solar irradiance is 5 peak sun hours/day. The system uses a LiFePO4 battery and requires 3-day autonomy.
question: What panel wattage, LiFePO4 battery capacity, and 5-year TCO would you size for the 24/7 remote station versus grid power?
details:
  realistic_solution: 'Calculate daily energy usage assuming a 50% active/idle duty cycle. Determine the necessary solar panel size factoring in peak sun hours and efficiency losses. Size the battery for 3 days of autonomy accounting for depth of discharge. Finally, compare the upfront solar capex with the cost of grid power over 5 years.'
  common_mistake: |
    **The Pitfall:** Calculating panel size based strictly on average power without accounting for system efficiencies.
    **The Rationale:** Candidates often forget charge controller efficiency (85-95%), inverter losses, and battery charge/discharge efficiency (90% round-trip for LiFePO4).
    **The Consequence:** The solar panel is drastically undersized, leading to system failure and offline devices during consecutive cloudy days.
  napkin_math: |
    * Daily energy: Assume 50% active (30W avg) * 12hr + 15W idle * 12hr = 360Wh + 180Wh = 540Wh/day.
    * Panel sizing: 540Wh / (5 peak sun hours * 0.85 efficiency) = 127W. **Round up to 150W panel.**
    * Battery sizing (3-day autonomy): 3 * 540Wh / 0.9 (DoD) = 1800Wh = **1.8 kWh LiFePO4.**
    * Solar Capex: LiFePO4 (~$600) + 150W Panel ($150) + Controller ($80) = **$830 Total Solar.**
    * 5yr Grid Power Cost: 540Wh/day * 365 * 5 * $0.10/kWh = **$98.55.**
    * **Solar TCO is $830 vs $99 for grid (8.4x higher), but is the only option for remote offline sites.**
