title: 'Edge TCO Realization: Jetson Orin Fleet Power Budget for Solar Deployment'
scenario: 'Concretely size a solar power system for a remote Jetson Orin (60W peak,
  15W idle) weather monitoring station running 24/7. Solar irradiance: 5 peak sun
  hours/day. Battery: LiFePO4. Target: 3-day autonomy. Calculate panel wattage, battery
  capacity (kWh), and 5-year TCO including solar hardware vs grid power.'
question: What panel wattage, LiFePO4 battery capacity, and 5-year TCO would you size
  for the 24/7 remote Jetson Orin station?
details:
  realistic_solution: 'Daily energy: assume 50% active (30W avg) * 12hr + 15W * 12hr
    = 360Wh + 180Wh = 540Wh/day. Solar collection: 5hr peak * panel_W * 0.85 (efficiency)
    = 540Wh. Panel: 540/(5*0.85) = 127W → 150W panel. Battery for 3 days: 3 * 540Wh
    / 0.9 (DoD) = 1800Wh = 1.8kWh. LiFePO4 1.8kWh ≈ $600. 150W solar panel: $150.
    Controller: $80. Total solar: $830. vs 5yr grid: 540Wh/day * 365 * 5 * $0.10/1000
    = $98.55. Solar is $830 vs grid $99 = solar costs 8.4x MORE. But: no grid at remote
    site → solar is the only option. Cost premium: $831 for energy independence.'
  common_mistake: Calculating panel size based on average power without accounting
    for charge controller efficiency (85-95%), inverter losses, and battery charge/discharge
    efficiency (90% round-trip for LiFePO4).
  napkin_math: 'Daily energy: 30W*12hr+15W*12hr=360+180=540Wh. Panel: 540Wh/(5hr*0.85)=127W→150W
    panel. Battery 3-day: 3*540/0.9=1800Wh=1.8kWh. LiFePO4: ~$0.33/Wh=$594→$600. Panel:
    $150. Controller: $80. Total solar capex: $830. 5yr grid power: 540Wh*365*5*$0.10/1000=$98.55.
    Solar payback vs grid: $830/$19.71yr=42 years! Much longer than Jetson lifecycle.
    But: remote sites have no grid. Connectivity: satellite internet adds $100/month
    = $1200/yr >> $17/yr grid power. Connectivity dominates for remote edge.'
