title: Shadow vs Canary Deployment on Host-Dependent Accelerators
scenario: We are upgrading a critical object detection model running on an edge appliance equipped with a dataflow accelerator (26 TOPS INT8, 2.5W). The accelerator completely lacks local DRAM, meaning it must stream all model weights and intermediate activations directly from the host CPU's memory over PCIe.
question: "Which rollout strategy (timesliced shadow or fleet-subset canary) do you recommend for this specific hardware, and why?"
details:
  realistic_solution: The canary deployment is significantly better for this hardware. Because the accelerator streams directly from host memory, timeslicing two different models (v1 and v2) per frame would require constantly reconfiguring the dataflow and streaming model weights over PCIe for every context switch. This would thrash the host's memory bandwidth and destroy throughput.
  common_mistake: |
    **The Pitfall:** Reflexively choosing shadow deployments for perfect 1:1 input comparison.
    **The Rationale:** Candidates fail to account for the physical hardware architecture, specifically the lack of local DRAM and the massive cost of context switching.
    **The Consequence:** Thrashing the host's memory bandwidth over PCIe, destroying throughput, and crashing the real-time pipeline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Accelerator: DRAM-less, streams via PCIe.
       - Model size: 20 MB (INT8). Target FPS: 30.
       - Image stream size: 1 MB per frame.
    2. **Calculations:**
       - Canary deployment: Weights loaded once. Data stream = 30 FPS * 1 MB = 30 MB/s.
       - Shadow deployment (timeslicing v1 and v2): Host re-streams 20 MB weights per context switch.
       - 60 context switches/sec * 20 MB = 1,200 MB/s (1.2 GB/s).
    3. **Conclusion & Interpretation:**
       - **Result: Canary Deployment** (Shadow is PCIe Bandwidth-Bound).
