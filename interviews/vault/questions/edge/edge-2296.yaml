title: Accelerator Model State Reload Time
scenario: A Hailo-8 (26 TOPS) processes traffic cameras. A watchdog triggers a hardware
  reset upon soft-error, requiring a full state reload of a 20MB INT8 model from an
  SPI flash at 10 MB/s.
question: Calculate the hard downtime in seconds if the reset sequence takes 500ms
  before memory copying begins.
visual:
  kind: svg
  path: edge-2296.svg
  alt: Timeline showing failure, reset latency, memory copy duration, and resume.
  caption: Reset and Reload Timeline
details:
  realistic_solution: The model size is 20MB. The SPI flash throughput is 10 MB/s.
    The time to load the model into memory is 20 / 10 = 2 seconds. Including the hardware
    reset overhead of 0.5 seconds, the total hard downtime is 2 + 0.5 = 2.5 seconds.
  common_mistake: Forgetting to add the hardware reset initialization time to the
    raw data transfer time.
  napkin_math: 20 / 10 + 0.5 = 2.5s
