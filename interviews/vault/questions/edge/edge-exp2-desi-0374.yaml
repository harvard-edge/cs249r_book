title: Architecting a Resilient OTA Update System for Jetson Orin
scenario: Your team is deploying a fleet of autonomous mobile robots powered by the NVIDIA Jetson Orin
  (32 GB LPDDR5, 60W TDP). These robots operate in remote warehouses with unreliable, low-bandwidth network
  connections. You need to design a robust Over-The-Air (OTA) update system that handles full OS, driver,
  and AI model updates (which leverage the Ampere GPU and DLA accelerator) without bricking the device
  if an update fails midway. The system must guarantee zero downtime during the download phase and automatic
  rollback upon boot failure.
details:
  realistic_solution: Design an A/B rootfs partition scheme. The active partition runs the current system
    while the OTA daemon downloads the update in the background to the inactive partition. Upon successful
    download and cryptographic verification, the bootloader is updated to swap the active partition on
    the next reboot. A hardware watchdog timer and a boot-status flag ensure that if the new partition
    fails to boot or pass health checks (including DLA/GPU health), the system reboots back into the known-good
    'A' partition.
  common_mistake: Candidates often suggest simply downloading the payload and flashing the active rootfs,
    which risks bricking the device on power failure. Another mistake is ignoring the size of the ML models
    and TensorRT engines, failing to account for the storage and bandwidth overhead required for A/B partitioning
    of large assets.
  napkin_math: Assuming a 16GB total rootfs size (OS + CUDA/TensorRT libs + 4GB models for the Ampere
    GPU/DLA), an A/B partition requires at least 32GB of eMMC/NVMe storage just for the OS/models. If
    the network bandwidth is 1 Mbps (remote warehouse), downloading a compressed 8GB update delta takes
    8GB * 8000 Mb/GB / 1 Mbps = 64,000 seconds (~17.7 hours). During this background download, the Orin
    continues operating within its 60W TDP budget without interrupting inference.
