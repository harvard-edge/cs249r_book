title: 'Calculate On-Device PSI for Edge Accelerator'
scenario: 'A defect detection model is deployed on an on-premise edge server powered by a Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). To minimize outbound bandwidth, training-serving skew must be detected locally by computing the Population Stability Index (PSI) on a critical INT8 feature before sending alerts. The feature is quantized into 3 bins. The reference distribution from training is Reference = [0.5, 0.3, 0.2]. The serving distribution observed on the accelerator over the last hour is Serving = [0.4, 0.4, 0.2].'
question: 'What is the exact PSI for Reference=[0.5,0.3,0.2] and Serving=[0.4,0.4,0.2] using the standard binned formula?'
details:
  realistic_solution: |
    The correct approach is to calculate the PSI bin by bin using the standard formula. Since the Qualcomm Cloud AI 100 natively outputs 400 TOPS of INT8, we can compute the histogram bin counts directly in INT8 on the accelerator, and only perform the floating-point logarithmic scaling during the low-frequency aggregation step on the host CPU. A PSI < 0.1 indicates no significant data drift.
  common_mistake: |
    **The Pitfall:** Proposing computationally heavy continuous KL-divergence instead of binning, or mixing up the reference/serving order in the formula.
    **The Rationale:** Overcomplicating the math or misremembering standard monitoring formulas.
    **The Consequence:** Wasting the 400 TOPS INT8 capacity by forcing unnecessary floating-point operations on the edge device, or calculating an inverted drift metric.
  napkin_math: |
    **Assumptions & Constraints:**
    - Formula: PSI = Σ ((Serving - Reference) * ln(Serving / Reference)).
    - Reference = [0.5, 0.3, 0.2].
    - Serving = [0.4, 0.4, 0.2].

    **Calculations:**
    - Bin 1: (0.4 - 0.5) * ln(0.4 / 0.5) = (-0.1) * ln(0.8) = (-0.1) * (-0.2231) = 0.0223.
    - Bin 2: (0.4 - 0.3) * ln(0.4 / 0.3) = (0.1) * ln(1.3333) = (0.1) * (0.2877) = 0.0288.
    - Bin 3: (0.2 - 0.2) * ln(0.2 / 0.2) = 0 * 0 = 0.
    - Total PSI: 0.0223 + 0.0288 + 0 = 0.0511.

    **Conclusion & Interpretation:**
    - **Result: 0.0511 Total PSI (Compute-Bound).** The calculated drift is minimal and can be done effectively using INT8 for binning on the edge device.
