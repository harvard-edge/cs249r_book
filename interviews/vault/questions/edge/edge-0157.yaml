title: The Dusty Lens Problem
scenario: You've deployed a vision model on a Jetson AGX Orin for quality control on a factory floor, with a hard real-time deadline of 33ms per frame. The model was trained on pristine, high-contrast images. In production, dust on the lens degrades image contrast, causing training-serving skew. You propose a contrast normalization pre-processing step.
question: How much of the 33ms budget is spent just reading one 1920x1080 8-bit grayscale frame from DRAM for contrast normalization?
details:
  realistic_solution: The correct answer is that the data transfer time is negligible, around 10 microseconds. The Jetson AGX Orin has an LPDDR5 memory bandwidth of 204.8 GB/s. A single 1080p grayscale frame is just over 2 MB. The time to read this data is the total data size divided by the memory bandwidth. This calculation shows that the memory read consumes a tiny fraction (<0.1%) of the 33ms (33,000 µs) frame budget. The real performance cost to investigate is the compute cost of the normalization algorithm itself, not the data movement to get it there.
  common_mistake: |
    **The Pitfall:** Overestimating memory read latency and confusing it with I/O access.
    **The Rationale:** Engineers often use the wrong bandwidth number (e.g., camera MIPI instead of LPDDR5) or guess it takes milliseconds.
    **The Consequence:** Rejecting a valid algorithmic fix due to a flawed back-of-the-envelope estimation of data movement costs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Image Size: 8-bit grayscale 1920x1080
       - Orin Memory Bandwidth: 204.8 GB/s (204,800 MB/s)
    2. **Calculations:**
       - Frame Size = 1920 * 1080 * 1 byte = 2,073,600 bytes (~2.07 MB)
       - Transfer Time = 2.07 MB / 204,800 MB/s = 0.0000101 seconds
    3. **Conclusion & Interpretation:**
       - **Result: 10.1 microseconds.** The transfer time is completely negligible (<0.1%) compared to the 33ms budget. This is heavily **Compute-Bound**.
  options:
  - ~830 µs
  - ~1.2 ms
  - ~10 µs
  - ~81 µs
  correct_index: 2
