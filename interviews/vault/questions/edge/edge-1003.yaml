title: 'Mastery: Activation Memory Analysis for Recurrent Models on Ultra-Low-Power
  Edge Devices'
scenario: You are deploying a temporal state-space model (Mamba-130M) on a Hailo-8
  accelerator (26 TOPS, 2.5W, ~6 MB SRAM) for audio keyword spotting. Unlike Transformers,
  Mamba's recurrent inference requires only O(1) activation memory per step (the recurrent
  state). However, the team wants to also support training on-chip with BPTT (backpropagation
  through time) across T=100 time steps. Analyze whether BPTT activation storage for
  T=100 fits within Hailo-8's SRAM constraints, and propose an alternative if it does
  not.
question: Does BPTT for Mamba-130M over T=100 fit in Hailo-8 SRAM, and what should
  you use if it does not?
details:
  realistic_solution: 'Mamba-130M per-step activation: hidden state d_model=768, SSM
    state d_state=16. Per step: 768×16 float32 = 49 KB for SSM state, plus intermediate
    conv activations ~768×4=3 KB. Total per step ≈ 52 KB. BPTT for T=100: 100 × 52
    KB = 5.2 MB. Hailo-8 SRAM ≈ 6 MB total. 5.2 MB for BPTT activations leaves only
    0.8 MB for weights (Mamba-130M ≈ 520 MB — does not fit). Hailo-8 is not suited
    for on-device BPTT training. Alternative: Truncated BPTT with T=10 (0.52 MB BPTT
    + weight streaming from host) or use Orin for training and Hailo-8 for inference-only
    deployment.'
  common_mistake: 'Assuming that because Mamba''s recurrent state is O(1), BPTT also
    has O(1) memory. BPTT requires storing activations at every time step for the
    backward pass: O(T) activation memory, where T is the unroll length. For T=100,
    this is 100× the per-step activation, which can easily exceed on-chip SRAM.'
  napkin_math: 'Mamba-130M weights: 130M × 4 B = 520 MB. Hailo SRAM: 6 MB. Weight
    streaming required. Per-step state: d_model × d_state × 4 B = 768 × 16 × 4 = 49152
    B ≈ 48 KB. T=100 BPTT: 100 × 48 KB = 4.8 MB. Remaining SRAM after BPTT: 6 - 4.8
    = 1.2 MB. One layer''s weight tile: typical SSM weight chunk ≈ 256 KB — fits 4
    tiles. Layer streaming adds ~5 ms latency per forward step. Inference-only on
    Hailo-8: per-step state 48 KB, fits trivially.'
