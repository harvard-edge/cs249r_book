title: 'Mastery: Activation Memory Analysis for Recurrent Models on Ultra-Low-Power Edge Devices'
scenario: 'You are deploying a temporal state-space model (Mamba-130M) on a Hailo-8 accelerator (26 TOPS, 2.5W, ~6 MB SRAM) for audio keyword spotting. Unlike Transformers, Mamba''s recurrent inference requires only O(1) activation memory per step (the recurrent state). However, the team wants to also support training on-chip with BPTT (backpropagation through time) across T=100 time steps.'
question: Does BPTT for Mamba-130M over T=100 fit in Hailo-8 SRAM, and what should you use if it does not?
details:
  realistic_solution: 'Mamba-130M per-step activation: hidden state d_model=768, SSM state d_state=16. Per step: 768*16 float32 = 49 KB for SSM state, plus intermediate conv activations ~768*4=3 KB. Total per step ≈ 52 KB. BPTT for T=100: 100 * 52 KB = 5.2 MB. Hailo-8 SRAM ≈ 6 MB total. 5.2 MB for BPTT activations leaves only 0.8 MB for weights (Mamba-130M ≈ 520 MB — does not fit). Hailo-8 is not suited for on-device BPTT training. Alternative: Truncated BPTT with T=10 (0.52 MB BPTT + weight streaming from host) or use Orin for training and Hailo-8 for inference-only deployment.'
  common_mistake: |
    **The Pitfall:** Assuming O(1) recurrent state implies O(1) activation memory during training.
    **The Rationale:** Candidates conflate inference memory requirements with training memory, forgetting that backpropagation requires storing activations for every time step unrolled.
    **The Consequence:** Designing a training architecture that instantly OOMs on the highly constrained SRAM of the edge accelerator.
  napkin_math: |
    * Mamba-130M weights: 130M * 4 B = 520 MB (requires streaming from host).
    * Per-step state: d_model * d_state * 4 B = 768 * 16 * 4 = 49,152 B ≈ 48 KB.
    * T=100 BPTT activation memory: 100 * 48 KB = **4.8 MB**.
    * Remaining Hailo SRAM: 6 MB - 4.8 MB = 1.2 MB.
    * Inference-only state is just 48 KB, which fits trivially.
