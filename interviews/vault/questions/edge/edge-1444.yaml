title: Analyzing I/O Latency Bottlenecks on Hailo-8
scenario: A smart camera pipeline processes 1920x1080 RGB frames on a Hailo-8 accelerator (26 TOPS INT8). The model requires 26 GOPS per frame, yielding a theoretical compute time of exactly 1ms. The Hailo-8 streams inputs from host memory over a 1 GB/s PCIe link because it lacks local DRAM. The system profiler shows a consistent end-to-end latency of roughly 7ms per frame.
question: Why is the end-to-end latency about 7ms when the Hailo-8 compute time is only 1ms?
details:
  realistic_solution: |
    The discrepancy is caused by the physical I/O bottleneck of streaming the raw high-resolution image from the host memory to the accelerator. Because the Hailo-8 has no local DRAM to pre-load the frame, the data transfer over the 1 GB/s link occurs synchronously with the pipeline, dominating the extremely fast 1ms compute time and making the system entirely I/O bound.
  common_mistake: |
    **The Pitfall:** Blaming compute utilization, kernel launch overheads, or SRAM cache misses.
    **The Rationale:** Engineers assume the bottleneck is on the compute die itself, ignoring the physical I/O constraints of a dataflow architecture.
    **The Consequence:** Wasting time tuning operators instead of addressing the host-to-device streaming I/O bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Payload size: 1920 * 1080 pixels * 3 channels (RGB) = 6,220,800 bytes (~6.2 MB).
    - PCIe link bandwidth: 1000 MB/s.
    - Compute time: 1.0 ms.

    **Calculations:**
    - Transfer time: 6.2 MB / 1000 MB/s = 6.2 ms.
    - Total Latency: 6.2 ms (I/O transfer) + 1.0 ms (INT8 compute) = 7.2 ms.

    **Conclusion & Interpretation:**
    - **Result: 7.2 ms (I/O-Bound)**. The system is entirely I/O bound by the host-to-device transfer.
