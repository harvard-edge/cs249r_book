title: The Perception Platform Redesign
scenario: You are the new Lead ML Systems Architect for a flagship autonomous vehicle program. The current
  perception system, built on a fleet of ResNet-based CNNs, is hitting a hard compute and power wall on
  its NVIDIA Jetson AGX Orin ECU. It consumes the entire 30W power budget and can barely maintain the
  33ms per-frame deadline.
question: "What roadmap would you propose to move beyond the ResNet CNN stack while staying within the 30W and 33ms Orin limits?"
details:
  realistic_solution: A Staff-level architect would propose a pragmatic, multi-phase roadmap that de-risks
    the transition and delivers value at each stage.
  common_mistake: 'Engineers often fall into one of two traps. The first is architectural purity: ''We
    must switch to a pure Vision Transformer (ViT) because it''s state-of-the-art,'' ignoring the catastrophic
    mismatch between a ViT''s quadratic scaling in attention and the fixed power/memory budget of an edge
    device. The second trap is excessive conservatism: ''Transformers are too slow for the edge, we can
    only use CNNs,'' which misses the opportunity to use hybrid models, NAS, or techniques like Mixture-of-Experts
    to gain Transformer-like capabilities within an edge-friendly envelope.'
  napkin_math: '**1. Justifying Depthwise Convolution:** A standard 3x3 convolution with 256 input channels
    and 256 output channels has a computational cost proportional to `3*3*256 * 256 = 589,824`. A depthwise
    separable version has a cost of `(3*3*256) + (1*1*256*256) = 2,304 + 65,536 = 67,840`. This is an
    **8.7x reduction in FLOPs** for that single layer, creating significant power and latency headroom
    across the entire network.'
