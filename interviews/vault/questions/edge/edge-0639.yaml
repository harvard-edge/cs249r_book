title: The Perception Platform Redesign
scenario: You are the Lead ML Systems Architect for an autonomous vehicle program. The perception system, built on a fleet of ResNet-based CNNs, is hitting a hard compute and power wall on its NVIDIA Jetson AGX Orin ECU. It consumes the entire 30W power budget and can barely maintain the 33ms per-frame deadline.
question: What roadmap would you propose to move beyond the ResNet CNN stack while staying within the 30W and 33ms Orin limits?
details:
  realistic_solution: 'Propose a transition to modern, edge-optimized CNN architectures utilizing depthwise separable convolutions (e.g., EfficientNet, MobileNet variants) or use Neural Architecture Search (NAS) targeted at the Orin''s specific tensor cores. This drastically reduces FLOPs and power consumption while preserving accuracy, creating headroom for future sensor fusion.'
  common_mistake: |
    **The Pitfall:** Blindly migrating to pure Vision Transformers (ViTs).
    **The Rationale:** Architects chase state-of-the-art cloud models without accounting for the quadratic memory access penalty of attention mechanisms on edge memory buses.
    **The Consequence:** The new ViT model blows past the 33ms deadline due to memory-bandwidth starvation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target: <33ms latency, <30W power.
       - ResNet bottleneck: Standard 3x3 convolutions.
    2. **Calculations:**
       - Standard 3x3 conv (256 in/out): 3 * 3 * 256 * 256 = 589,824 MACs.
       - Depthwise separable 3x3: (3 * 3 * 256) + (1 * 1 * 256 * 256) = 2,304 + 65,536 = 67,840 MACs.
       - Reduction factor: 589,824 / 67,840 ~ 8.7x.
    3. **Conclusion & Interpretation:**
       - **Result: 8.7x FLOP Reduction.** Depthwise convolutions dramatically lower compute and memory fetches, freeing up the power budget.
