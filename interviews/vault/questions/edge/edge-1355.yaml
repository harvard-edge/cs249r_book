title: USB I/O Bottleneck on Coral Edge TPU
scenario: You are deploying a custom object detection model to a Google Coral Edge TPU via a USB 3.0 connection. The model requires 2 Billion INT8 MACs per inference, and the input frames are uncompressed 1080p RGB images (1920x1080x3 bytes). The Coral Edge TPU provides 4 TOPS of INT8 compute at 2W.
question: "What is the minimum per-frame latency including TPU compute and USB transfer, and what is the primary bottleneck?"
details:
  realistic_solution: The correct approach is to evaluate the end-to-end pipeline using tracing tools to identify that the USB 3.0 connection is the primary bottleneck. Because the TPU computes the INT8 operations so quickly, the system is entirely I/O bound. To optimize latency, the host CPU should resize or crop the 1080p images to a smaller resolution (e.g., 300x300) before transferring them over USB, drastically reducing the payload size to balance I/O and compute.
  common_mistake: |
    **The Pitfall:** Calculating only the compute latency and ignoring USB I/O.
    **The Rationale:** Candidates focus solely on the TPU's compute specs.
    **The Consequence:** Dramatically underestimating end-to-end latency and failing to realize that inputs must be resized on the host *before* transfer.
  napkin_math: |
    *   **Compute Time:** 2 Billion MACs = 4 Giga-Operations (GOPs). At 4 TOPS (4000 GOPs/sec), Compute Latency = 4 / 4000 = 1 ms.
    *   **I/O Transfer:** 1080p RGB frame = 1920 * 1080 * 3 bytes = 6.22 MB.
    *   **I/O Latency:** At 500 MB/s USB 3.0 bandwidth, Transfer Latency = 6.22 / 500 = 12.4 ms.
    *   **Result:** Total latency = 1 ms + 12.4 ms = **13.4 ms**. The USB I/O transfer is the primary bottleneck, taking over 12x longer than inference.
