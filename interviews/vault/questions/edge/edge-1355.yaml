title: 'USB I/O Bottleneck on Coral Edge TPU'
scenario: 'You are deploying a custom object detection model to a Google Coral Edge TPU via a USB 3.0 connection. The model requires 2 Billion INT8 MACs per inference, and the input frames are uncompressed 1080p RGB images.'
question: 'What is the minimum per-frame latency including TPU compute and USB transfer, and what is the primary bottleneck?'
details:
  realistic_solution: 'The correct approach is to evaluate the end-to-end pipeline using tracing tools like nsys profiling to identify that the USB 3.0 connection is the primary bottleneck. Because the TPU computes the INT8 operations so quickly, the system is entirely I/O bound. To optimize latency, the host CPU should resize or crop the 1080p images to a smaller resolution before transferring them over USB, drastically reducing the payload size to balance I/O and compute.'
  common_mistake: |
    **The Pitfall:** Calculating only the compute latency and ignoring USB I/O.
    **The Rationale:** Candidates focus solely on the TPU's compute specs.
    **The Consequence:** Dramatically underestimating end-to-end latency and failing to realize that inputs must be resized on the host before transfer.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 2 Billion MACs (4 GOPs).
    - TPU Compute: 4 TOPS.
    - Image: 1920x1080x3 bytes.
    - USB 3.0 Bandwidth: 500 MB/s.

    **Calculations:**
    - Compute Time: 4 GOPs / 4000 GOPs/sec = 1.0 ms.
    - I/O Transfer: 1920 * 1080 * 3 bytes = 6.22 MB.
    - I/O Latency: 6.22 MB / 500 MB/s = 12.44 ms.
    - Total Latency = 1.0 ms + 12.44 ms = 13.44 ms.

    **Conclusion & Interpretation:**
    - **Result: 13.44 ms (I/O Bound)**. The USB I/O transfer is the primary bottleneck, taking over 12x longer than inference.
