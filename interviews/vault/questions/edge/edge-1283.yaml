title: 'Architecting a Multi-Model Pipeline on Jetson Orin under VRAM Constraints'
scenario: 'You are designing an autonomous robotics vision pipeline targeting an NVIDIA Jetson Orin with 32 GB of unified LPDDR5 memory, an Ampere GPU + DLA accelerator, and a 60W TDP. The system must concurrently run a 7B parameter LLM for complex reasoning and three high-resolution vision models for real-time object tracking.'
question: 'How would you allocate memory and execution on Jetson Orin so a 7B LLM and three vision models avoid OOMs under the 32 GB unified memory limit?'
details:
  realistic_solution: 'A strong architectural design explicitly reserves memory for the Linux OS and system daemons. Quantize the 7B LLM to INT8 or INT4 and run it on the Ampere GPU. Compile the vision models via TensorRT to execute entirely on the DLA accelerator to isolate the workloads. Propose fixed-size memory pools for vision activations and a strict upper bound on the LLM KV-cache to guarantee predictable memory behavior.'
  common_mistake: 'Candidates often forget that the Jetson Orin uses a unified memory architecture and mistakenly assume the full 32GB is dedicated VRAM. They also frequently overlook offloading models to the DLA, placing all workloads on the Ampere GPU.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson Orin unified memory: 32 GB LPDDR5. OS Reserve: 6 GB.
    - 7B LLM (INT8): 7 GB weights. 3x Vision Models (INT8): 3 GB weights.
    - Vision activations: 4 GB.

    **Calculations:**
    - Total available memory: 32 GB - 6 GB = 26 GB.
    - Fixed allocations: 7 GB + 3 GB + 4 GB = 14 GB.
    - Remaining memory: 26 GB - 14 GB = 12 GB.

    **Conclusion & Interpretation:**
    - **Result: 12 GB limit (Memory-Capacity-Bound)**. The LLM KV-cache must be strictly bounded under 12 GB to prevent system OOM crashes.
