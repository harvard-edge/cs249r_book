title: Architecting a Multi-Model Pipeline on Jetson Orin under VRAM Constraints
scenario: You are designing an autonomous robotics vision pipeline targeting an NVIDIA
  Jetson Orin with 32 GB of unified LPDDR5 memory, an Ampere GPU + DLA accelerator,
  and a 60W TDP. The system must concurrently run a 7B parameter LLM for complex reasoning
  and three high-resolution vision models for real-time object tracking. Architect
  a memory allocation and execution strategy that safely distributes weights, KV-cache,
  and activations across the hardware blocks while preventing OOM crashes under peak
  load.
question: How would you allocate memory and execution on Jetson Orin so a 7B LLM and
  three vision models avoid OOMs under the 32 GB unified memory limit?
details:
  realistic_solution: A strong architectural design explicitly reserves memory for
    the Linux OS and system daemons. It involves quantizing the 7B LLM to INT8 or
    INT4 and running it on the Ampere GPU, while compiling the vision models via TensorRT
    to execute entirely on the DLA accelerator. This isolates the workloads. The candidate
    should propose using fixed-size memory pools for vision activations and a strict
    upper bound on the LLM's KV-cache to guarantee predictable memory behavior.
  common_mistake: Candidates often forget that the Jetson Orin uses a unified memory
    architecture and mistakenly assume the full 32GB is dedicated VRAM. They also
    frequently overlook offloading models to the DLA, placing all workloads on the
    Ampere GPU and causing memory bandwidth bottlenecks or thermal throttling under
    the 60W limit.
  napkin_math: 'Total Unified Memory: 32 GB LPDDR5. System/OS Reserve: ~6 GB. Available:
    ~26 GB. 7B LLM at INT8: ~7 GB weights. 3x Vision Models at INT8 (leveraging 275
    TOPS INT8 DLA): ~3 GB weights total. Vision activations buffer: ~4 GB. Remaining
    memory for LLM KV-cache and context: 26 GB - (7 GB + 3 GB + 4 GB) = 12 GB. Max
    KV-cache must be capped below 12 GB to ensure system stability.'
