title: OTA Model Update Portability for Heterogeneous Edge Fleets
scenario: 'Your edge fleet has 5000 devices: 60% Jetson Orin, 25% Qualcomm RB5, 15% Raspberry Pi 5 (CPU-only). You need to push a model update OTA (over-the-air) that works across all three platforms. The update includes a new object detection model and updated post-processing logic.'
question: 'How would you package and validate an OTA model and post-processing update for the 5000-device heterogeneous fleet?'
details:
  realistic_solution: |
    Ship the ONNX model as the canonical format in the OTA package. Each device runs on-device model compilation at update time: Orin devices compile ONNX to TensorRT engine, Qualcomm devices compile to QNN context binary, and Pi 5 devices use ONNX Runtime CPU EP. Post-processing logic ships as a portable WASM module. Include a model validation step using a golden-input test case to verify compilation correctness before switching the active model.
  common_mistake: |
    **The Pitfall:** Shipping platform-specific model binaries (engines) as a single massive OTA package.
    **The Rationale:** Candidates assume binaries are portable, not realizing execution engines like TensorRT are specific even down to the micro-architecture level.
    **The Consequence:** Massive OTA payloads, unmanageable build matrices, and deployed models failing to run on heterogeneous target devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 5000 devices.
    - OTA Package: 15 MB ONNX + 200 KB WASM + 50 KB golden test = ~15.3 MB.
    - CDN Cost: $0.05/GB.

    **Calculations:**
    - Total Fleet Bandwidth = 5000 * 15.3 MB = ~76.5 GB.
    - Total CDN Cost = 76.5 GB * $0.05/GB = $3.83.
    - Orin Compilation Energy = 3 min at 60W = 0.003 kWh.
    - Orin Energy Cost = 0.003 kWh * $0.12/kWh = $0.0004 per device.

    **Conclusion & Interpretation:**
    - **Result: $3.83 Fleet OTA Cost (Storage/Bandwidth-Bound)**. Highly cost-effective deployment across a heterogeneous fleet.
