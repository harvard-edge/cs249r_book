title: The Federated Learning Privacy Advantage
scenario: 'An automotive company is developing an in-car driver monitoring system. They have two options
  for training the model: upload all driver footage to the cloud for central training, or use Federated
  Learning to train models on the cars directly. From a privacy and data transmission perspective, what
  is the fundamental advantage of the Federated Learning approach?'
details:
  realistic_solution: The primary advantage is that raw driver footage—which is highly sensitive Personally
    Identifiable Information (PII)—never leaves the vehicle. Federated Learning trains a local model on
    the device and only sends anonymized, aggregated model updates (like gradients or weights) back to
    a central server. This massively reduces privacy risks, data transfer costs, and regulatory burdens
    (like GDPR or CCPA) associated with handling raw user data in the cloud.
  common_mistake: Confusing Federated Learning with just being 'decentralized' or thinking it involves
    sending anonymized or compressed raw data. The core principle isn't just where the training happens,
    but that the *raw user data never leaves the device*. The server only ever receives model *updates*
    (gradients or weights), not user data in any form.
  napkin_math: 'Centralized: Continuous video stream might be 2 GB/hour. 10,000 cars * 2 GB/hr * 4 hrs/day
    = 80,000 GB/day. Highly sensitive unanonymized PII is sent over the air. Federated Learning: Cars
    train locally and send a ~100 MB model weight update once a day. 10,000 cars * 0.1 GB = 1,000 GB/day.
    FL cuts data transmission by 80x and ensures raw video (PII) never leaves the vehicle.'
  options:
  - It reduces the model's memory footprint on the device.
  - It allows for faster overall training convergence.
  - It keeps raw user data on the device, sending only model updates.
  - It automatically anonymizes the video data before uploading.
