title: Recall Transformer Inference Latency on Hailo-8
scenario: 'An interviewer asks: for a 12-layer ViT-B/16 with 86M parameters running
  on Hailo-8 (26 TOPS peak, ~50% utilization for transformer workloads), what is the
  expected inference latency for a single 224x224 image? The INT8 quantized model requires approximately
  17.6 GOPS per inference. Show the calculation.'
question: For a 17.6 GOPS ViT-B/16 on Hailo-8 at 50% of 26 TOPS, what is the expected
  single-image latency?
details:
  realistic_solution: 'Effective TOPS: 26 \u00d7 0.50 = 13 TOPS = 13 \u00d7 10\u00b9\u00b2 OPS. Inference
    operations: 17.6 GOPS = 17.6 \u00d7 10\u2079 OPs. Latency: 17.6 \u00d7 10\u2079 / (13 \u00d7 10\u00b9\u00b2) = 1.35 ms
    \u2248 1.4 ms. This enables approximately 700 FPS theoretical. Real-world: pipeline
    overhead, PCIe communication, preprocessing \u2192 ~200-300 FPS for a full pipeline.
    For batch=4: 4 \u00d7 17.6G = 70.4G / 13T = 5.4ms \u2192 741 FPS throughput.'
  common_mistake: Using peak TOPS without applying the utilization discount; transformer
    attention's dynamic access patterns reduce Hailo-8 utilization to ~50% vs the
    peak rated for CNN workloads.
  napkin_math: 'Effective TOPS: 26\u00d70.5=13T OPS. Operations: 17.6G. Latency: 17.6G/13T=1.35ms.
    FPS: 1/0.00135=741. With pipeline overhead (\u00d73): ~250 FPS real-world for ViT-B/16
    on Hailo-8.'
