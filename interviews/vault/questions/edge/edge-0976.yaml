title: Asymmetric Split-Computing Pipeline
scenario: A biosignal model is split between a Cortex-M4 wearable and a Snapdragon
  8 Gen 3 smartphone. The M4 takes 20ms to process its feature-extraction stage and
  10ms to transmit the intermediate INT8 tensor via Bluetooth. The Snapdragon Hexagon
  NPU then takes 2ms to run the final classification.
question: Compute the end-to-end latency of a single inference and the maximum sustained
  pipeline throughput in inferences per second.
visual:
  kind: svg
  path: edge-0976.svg
  alt: A Gantt chart illustrating the staggered execution of M4 compute, Bluetooth
    transfer, and NPU compute across multiple pipeline cycles.
  caption: Split-Computing Pipelined Execution
details:
  realistic_solution: 'The latency for a single request is the sum of the sequential
    stages: 20ms (M4) + 10ms (BT) + 2ms (NPU) = 32ms. In a pipelined execution model
    assuming asynchronous DMA transfers, the system throughput is dictated by the
    slowest stage. Since the M4 compute takes 20ms, it can only accept a new input
    every 20ms. Therefore, the bottleneck is 20ms, yielding a maximum throughput of
    50 inferences per second.'
  common_mistake: Using the total latency (32ms) to calculate throughput (yielding
    ~31 fps) instead of isolating the bottleneck pipeline stage (20ms).
  napkin_math: Latency = 20 + 10 + 2 = 32ms. Throughput = 1 / max(0.020, 0.010, 0.002)
    = 50 inf/sec.
