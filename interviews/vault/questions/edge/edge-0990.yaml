title: Edge Quantization Calibration Plan
scenario: An edge detector works in a lab but fails in rain and night scenes after INT8 quantization.
question: How would you design a calibration and validation plan for an INT8 edge detector that fails in rain and night scenes?
details:
  realistic_solution: The calibration set must include rain, night, glare, sensor noise, and representative camera hardware. Validation should report per-condition accuracy and activation clipping statistics. If night activations exceed calibration ranges, use better calibration data or quantization-aware training.
  common_mistake: |
    **The Pitfall:** Calibrating only on clean daytime lab data.
    **The Rationale:** Assuming that the distribution of activations during INT8 calibration will naturally transfer to field conditions like rain or night glare.
    **The Consequence:** Extreme activation spikes in edge cases are clipped during INT8 inference, causing catastrophic failure and "blindness" in critical real-world conditions.
  napkin_math: |
    1. Identify maximum lab activation: Let's say max activation in lab data is X.
    2. Identify field activation: Night scenes/glare can cause max activation to be 2X.
    3. Calculate quantization scale: Scale factor calculated on lab data clips any value > X.
    **If night activation maxima are 2x lab maxima, lab-derived scales will clip real field activations, destroying the signal.**
