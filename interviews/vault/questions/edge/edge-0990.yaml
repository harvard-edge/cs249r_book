title: Edge Quantization Calibration Plan
scenario: An edge detector works in a lab but fails in rain and night scenes after INT8 quantization.
question: How would you design a calibration and validation plan for an INT8 edge detector that fails in rain and night scenes?
details:
  realistic_solution: The failure stems from catastrophic activation clipping. You must implement a dynamic calibration dataset that enforces a strict distribution matching real-world edge cases (rain, night glare, sensor noise). Utilize KL-Divergence or MinMax calibration specifically tuned for high-variance activations rather than simple entropy calibration. If out-of-distribution spikes still exceed the INT8 dynamic range, transition the training pipeline to Quantization-Aware Training (QAT) to force the network to learn robust INT8 scale factors during backpropagation.
  common_mistake: |
    **The Pitfall:** Using a random, uniform subset of daytime lab data for Post-Training Quantization (PTQ) calibration.
    **The Rationale:** Candidates assume that a generic subset of training data represents the full dynamic range of activations needed to calculate the INT8 scaling factors.
    **The Consequence:** Real-world phenomena like night glare produce activation spikes that exceed the static scaling factor, clipping critical features to 127 (INT8 max) and blinding the model.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Lab maximum FP32 activation: 15.0.
       - Field (Night Glare) maximum FP32 activation: 60.0.
       - INT8 range limit: 127.
    2. **Calculations:**
       - PTQ Scale Factor calculated from lab data: 127 / 15.0 = 8.47.
       - Night glare activation mapped to INT8: 60.0 * 8.47 = 508.
       - Hardware clipping application: 508 is hard-clipped to 127.
       - De-quantized value observed by next layer: 127 / 8.47 = 15.0.
    3. **Conclusion & Interpretation:**
       - **Result: A critical 60.0 signal is irreversibly truncated to 15.0. The model is conceptually Precision-Bound, requiring QAT or better calibration sets to accommodate the full dynamic range.**
