title: Edge TPU Latency Decomposition for Real-time Object Detection
scenario: You are designing a real-time object detection system for an autonomous drone. The system utilizes a Google Coral Edge TPU, which offers 4 TOPS (INT8) computational power, consumes 2W, and exclusively supports INT8 operations. The end-to-end latency budget, from capturing a video frame to issuing a control command, is 50ms. This pipeline involves raw video preprocessing on a CPU, data transfer to the TPU, inference, transfer back, and final post-processing.
question: How would you allocate and measure the Coral Edge TPU drone pipeline's 50 ms latency budget across preprocessing, transfers, inference, and control?
details:
  realistic_solution: 'A realistic approach involves an iterative process: 1. Initial rough budget allocation based on empirical data or conservative estimates. 2. Thorough profiling of each stage (CPU-bound preprocessing, data transfers, and Edge TPU inference). 3. Optimizing data paths (e.g., minimizing transfers, using zero-copy buffers where possible). 4. Streamlining preprocessing and post-processing code, potentially offloading to specialized hardware if available, or highly optimizing CPU usage (e.g., SIMD instructions). 5. Ensuring the model is aggressively optimized for INT8 quantization and the specific Edge TPU architecture. The key is to recognize that non-inference stages often dominate the latency on such devices.'
  common_mistake: |
    **The Pitfall:** Over-allocating budget to the TPU's inference time.
    **The Rationale:** Candidates see "4 TOPS" and focus all their latency concerns on the model execution.
    **The Consequence:** They neglect the significant overheads of data movement (e.g., USB 3.0 bottleneck) and CPU preprocessing, resulting in a system that misses its 50ms deadline in production.
  napkin_math: |
    1. For a lightweight model (e.g., MobileNetV2-SSD), assume ~2.5 billion INT8 operations.
    2. Theoretical inference time at 4 TOPS: 2.5e9 ops / 4e12 ops/sec = 0.625 ms.
    3. The raw inference time is virtually negligible (< 1ms).
    4. USB 3.0 transfer limits (~400 MB/s) and host CPU resizing/NMS dominate the timeline.
    5. **A realistic 50ms budget allocation: Preprocessing (15ms), Transfer to TPU (10ms), Inference (5ms), Transfer from TPU (5ms), Post-processing (15ms).**
