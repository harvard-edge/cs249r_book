title: Edge New 0017
scenario: 'An Orin AGX module can operate in a 15W mode (100 TOPS) or a 60W mode (275 TOPS). A robotics application requires 30 FPS. The model takes 1 TOPS per frame.'
question: "Should the Orin AGX robotics app use 15W or 60W mode to meet 30 FPS, and how do their FPS-per-watt efficiencies compare?"
details:
  realistic_solution: 'The 60W mode provides maximum absolute performance but at heavily diminished returns for power efficiency due to voltage scaling nonlinearity. The model only requires 30 TOPS (1 TOPS * 30 FPS) to maintain real-time operation. Running in 60W mode wastes massive thermal headroom. The 15W mode provides 100 TOPS, easily clearing the 30 TOPS requirement while tripling the processing efficiency (TOPS/Watt), massively extending battery life.'
  common_mistake: |
    **The Pitfall:** Leaving the hardware in maximum performance mode (60W) unnecessarily.
    **The Rationale:** Candidates often assume that completing inference faster and letting the device sleep ("race to sleep") is always more efficient, which is invalid for continuous fixed-rate streaming (like 30 FPS).
    **The Consequence:** Wasting massive thermal headroom and significantly reducing battery life on the edge device due to voltage scaling nonlinearity.
  napkin_math: |
    * Required compute: 30 FPS * 1 TOPS/frame = **30 TOPS**.
    * 15W mode efficiency: 100 TOPS / 15W = **6.66 TOPS/W**.
    * 60W mode efficiency: 275 TOPS / 60W = **4.58 TOPS/W**.
    * The 15W mode easily clears the 30 TOPS requirement.
    * The 15W mode is **45% more efficient** than the 60W mode.
