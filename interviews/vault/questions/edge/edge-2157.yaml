title: Edge Dual-Accelerator Split Budget
scenario: An edge gateway has two accelerators connected by a 25 GB/s link. A model layer produces a 12 MB activation that must cross the link once per frame if the model is split. The frame deadline is 40 ms, and local compute after splitting is 16 ms per accelerator.
question: Does the activation transfer plus the split compute meet the 40 ms edge deadline?
details:
  realistic_solution: The transfer takes 12 MB / 25 GB/s = 0.48 ms. If the split is pipelined so the bottleneck compute stage is 16 ms, the simple estimate is about 16.5 ms plus scheduling overhead, well within 40 ms. If the two stages had to run sequentially, compute would be 32 ms plus transfer, still within the deadline but with less headroom.
  common_mistake: |
    **The Pitfall:** Assuming any model split is too expensive over the network link.
    **The Rationale:** Candidates fail to compare the actual activation payload size to the massive link bandwidth (25 GB/s).
    **The Consequence:** Missing a highly efficient pipelining opportunity that easily meets the latency deadline.
  napkin_math: |
    *   Transfer time: 12 MB / 25,000 MB/s = 0.00048 s = 0.48 ms.
    *   Pipelined compute execution: Bottleneck stage is 16 ms.
    *   Total time per frame (pipelined) ≈ 16 ms + 0.48 ms = 16.48 ms.
    *   **16.48 ms is well within the 40 ms deadline.**
