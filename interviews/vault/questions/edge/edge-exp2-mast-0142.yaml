title: Mixed-Precision LLM Architecture for Cloud AI 100
scenario: You are tasked with deploying a 35B parameter Mixture-of-Experts (MoE) LLM onto a single on-premise
  Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). Standard INT8 per-tensor quantization
  fails to fit the model in memory, while uniform INT4 causes unacceptable perplexity degradation. Synthesize
  a novel mixed-precision quantization architecture (e.g., W4A8 with selective precision for outliers)
  that fits within the strict memory limits while maximizing throughput on the hardware's 400 TOPS INT8
  compute engines.
question: "What mixed-precision quantization architecture would fit a 35B MoE LLM into 32 GB while using the Cloud AI 100's INT8 engines?"
details:
  realistic_solution: A robust L6 architecture uses W4A8 quantization for the majority of the model, dynamically
    unpacking 4-bit weights into INT8 registers at runtime to feed the 400 TOPS INT8 compute units. To
    preserve accuracy, highly sensitive layers (such as the first/last layers, MoE routers, and outlier
    channels) are retained in INT8. This hybrid, per-channel approach drastically reduces the weight footprint
    while maintaining arithmetic intensity and model quality.
  common_mistake: Candidates often propose standard INT8 quantization without calculating that the weights
    alone will exceed the 32GB memory limit. They also frequently overlook the architectural overhead
    of dequantizing 4-bit weights to INT8 to leverage the hardware's INT8 ALUs, leading to memory bandwidth
    bottlenecks on the LPDDR4x interface.
  napkin_math: A 35B parameter model in standard INT8 requires 35GB of memory, immediately exceeding the
    32GB LPDDR4x capacity. By quantizing 95% of weights to 4-bit (16.6GB) and leaving 5% in INT8 (1.75GB),
    the total weight footprint drops to 18.35GB. This leaves 13.65GB for the KV cache and activations.
    Assuming 256KB KV cache per token in 8-bit (32 layers, 32 heads, 128 dim), a 2048-token context window
    consumes 0.5GB per sequence, allowing a concurrent batch size of ~20 while maximizing the 400 TOPS
    compute within the 75W power envelope.
