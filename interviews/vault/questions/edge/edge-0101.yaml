title: The Memory Copy Ceiling
scenario: Your multi-model vision pipeline is missing its 33ms frame deadline (30 FPS). You check the compute time for each model and it only adds up to 41ms total.
question: Based on the memory flow diagram, where are the 'missing' milliseconds being spent, and how do you hit the deadline?
details:
  realistic_solution: You are suffering from **Sync Overruns via Memory Bouncing**. The pipeline copies data from GPU to CPU and back between every model. Each round-trip takes 2-4ms, and worse, `cudaMemcpy` is synchronous, meaning the GPU sits idle during the transfer. The fix is to keep all tensors on the GPU using **Unified Memory** or explicit device-to-device transfers, and moving preprocessing to the GPU (e.g., NVIDIA DALI).
  common_mistake: |
    **The Pitfall:** Assuming the models are too slow and rushing to use smaller models.
    **The Rationale:** Engineers focus on model FLOPs instead of analyzing the synchronous `cudaMemcpy` data movement between models.
    **The Consequence:** The GPU sits idle during transfers, wasting time and missing real-time deadlines despite fast compute.
  napkin_math: |
    * Memory transfers: 3 transfers × 4ms/transfer = 12ms of pure overhead
    * Total latency: 41ms (compute) + 12ms (overhead) = 53ms
    * **Eliminating the CPU-GPU memory bounce saves 12ms, reducing latency to 41ms (which then allows pipelining to hit 33ms).**
