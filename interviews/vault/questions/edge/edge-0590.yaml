title: The Catastrophic Night-Drive Quantization Failure
scenario: Your team is deploying a new perception model to your company's autonomous vehicle fleet. To meet the strict 33ms latency budget and 30W power envelope on the Jetson AGX Orin in the vehicle, you've quantized the model from FP16 to INT8. The model passed millions of miles of daytime simulation and road tests. However, within days of deployment, the fleet is disabled after several near-collisions at night. The logs show the model completely fails to detect the brake lights of vehicles directly ahead, even though they are the brightest and most obvious objects in the camera feed. The FP16 version of the model, when run on the same saved data, correctly identifies the brake lights.
question: Why would an optimization designed to make the model faster cause it to become blind to the most salient objects in a scene, and only under specific conditions?
details:
  realistic_solution: The root cause is catastrophic activation overflow during INT8 inference, caused by a calibration range that is not representative of all operating conditions. The model was likely calibrated on daytime images, where pixel and activation values have a relatively compressed dynamic range. At night, brake lights and headlights create extreme activation 'spikes'—outliers that are orders of magnitude larger than anything seen in the daytime calibration set. The INT8 scaling factor, fixed during calibration, cannot handle this expanded range. As a result, these critical activations are 'clipped' or 'saturated' at the maximum INT8 value (127). All information about their true intensity and shape is lost, and the feature passed to downstream layers is a distorted, unrecognizable blob. The model isn't just less accurate; it's functionally blind to the very features that are clipped because their representation has been fundamentally destroyed.
  common_mistake: |
    **The Pitfall:** Blaming the dataset without identifying the specific mathematical mechanism of failure.
    **The Rationale:** Candidates state "we didn't have enough night data" but fail to connect the data distribution shift to the catastrophic activation overflow caused by static INT8 scaling.
    **The Consequence:** Teams might waste months gathering more data without correcting the underlying quantization calibration methodology, leading to repeated failures.
  napkin_math: |
    1. Assume daytime calibration max FP16 activation = 15.0.
    2. Calculate INT8 scale factor (S): S = 127 / 15.0 = 8.47.
    3. Evaluate night scenario: Bright brake light true FP16 activation = 60.0.
    4. Quantize the night activation: 60.0 * 8.47 = 508.
    5. Apply INT8 bounds: 508 is hard-clipped to the maximum representable value of 127.
    6. De-quantize: 127 / 8.47 = 15.0.
    **A critical 60.0 signal is saturated and truncated to 15.0, fundamentally destroying the network's ability to distinguish intense, critical signals at night.**
