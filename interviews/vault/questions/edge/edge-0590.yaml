title: The Catastrophic Night-Drive Quantization Failure
scenario: Your team quantized a perception model from FP16 to INT8 to meet a 33ms latency budget on a Jetson AGX Orin. It passed daytime road tests, but in production, the model completely fails to detect the bright brake lights of vehicles directly ahead at night. The FP16 version works perfectly on the same night data.
question: Why would an optimization designed to make the model faster cause it to become blind to the most salient objects in a scene, and only under specific conditions?
details:
  realistic_solution: The failure is caused by catastrophic activation saturation stemming from a flawed Post-Training Quantization (PTQ) calibration dataset. The INT8 scale factors were calibrated purely on daytime imagery, establishing a narrow dynamic range. At night, glaring brake lights generate massive, high-magnitude FP16 activation spikes that vastly exceed this calibrated range. The hardware forcefully clips these spikes to the maximum INT8 integer value (127), destroying the spatial gradient and intensity information. The salient feature becomes a uniform, unrecognizable blob, rendering the model functionally blind.
  common_mistake: |
    **The Pitfall:** Calibrating INT8 quantization scaling factors using an unrepresentative, low-dynamic-range dataset.
    **The Rationale:** Candidates incorrectly treat PTQ calibration as a simple "run a few batches" checklist item, failing to realize that clipping bounds are permanently fixed based on the maximum observed activations.
    **The Consequence:** High-magnitude signals in critical edge cases (like night glare) are saturated and destroyed, leading to fatal false-negatives in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Max FP16 activation during daytime calibration: 15.0.
       - Max INT8 representation: 127.
       - True FP16 activation of a night brake light: 60.0.
    2. **Calculations:**
       - Static INT8 Scale Factor = 127 / 15.0 = 8.47.
       - Night activation mapped to INT8 = 60.0 * 8.47 = 508.
       - Hardware clipping enforces INT8 bound: 508 -> 127.
       - Dequantized output = 127 / 8.47 = 15.0.
    3. **Conclusion & Interpretation:**
       - **Result: The 60.0 signal is clipped to 15.0. The system is bounded by its Precision Range, requiring Quantization-Aware Training (QAT) or a vastly expanded calibration dataset.**
