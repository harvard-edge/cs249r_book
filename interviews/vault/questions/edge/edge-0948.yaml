title: Edge New 0009
scenario: Deploying an anomaly detection CNN on an edge server (T4 GPU). You can use dynamic FP16 (no
  calibration) or static INT8 (requires KL-divergence calibration). Analyze the deployment overhead versus
  inference latency tradeoff for 1 million requests/day.
details:
  realistic_solution: Static INT8 requires assembling a representative calibration dataset to compute
    activation scales, delaying deployment and adding ML engineering overhead. However, FP16 uses double
    the memory bandwidth and halves Tensor Core throughput. Over 1 million requests per day, the latency
    and power savings of INT8 drastically outweigh the one-time calibration cost, making static INT8 the
    mathematically and economically superior choice.
  common_mistake: Avoiding static quantization due to the fear of accuracy drops without calculating the
    massive aggregate hardware savings at scale.
  napkin_math: '1M requests. FP16 latency: 10ms -> 10,000s of GPU compute/day. INT8 latency: 5ms -> 5,000s
    of GPU compute/day. Saving 5,000 seconds (1.38 hours) of 70W GPU time daily yields major power and
    capacity benefits.'
