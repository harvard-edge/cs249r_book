title: Hailo-8 Host Streaming Bandwidth Bottleneck
scenario: You are deploying a vision model on a host system equipped with a Hailo-8 accelerator (26 TOPS
  INT8, 2.5W, dataflow architecture with no local DRAM). Because it lacks local memory, the accelerator
  streams all data directly from the host memory over a PCIe Gen3 x4 interface, which provides a practical
  bandwidth of 3.2 GB/s. The model requires 200 GOPS of compute per frame and necessitates transferring
  200 MB of data (weights and I/O activations) per frame across the PCIe bus. Despite the Hailo-8's massive
  compute capacity, the pipeline only achieves exactly 16 FPS. Explain why this bottleneck occurs by analyzing
  the memory hierarchy and streaming tradeoffs.
question: "Why does the Hailo-8 pipeline achieve only 16 FPS despite 26 TOPS of compute for a 200-GOPS-per-frame model?"
details:
  realistic_solution: The bottleneck occurs because the dataflow architecture without local DRAM must
    stream all 200 MB of data for every single frame over the PCIe bus. While the compute engine could
    theoretically process frames much faster, the PCIe Gen3 x4 interface acts as a hard physical limit
    on throughput. The system is entirely memory-bandwidth bound, illustrating the critical tradeoff where
    removing local DRAM saves significant power (enabling the 2.5W envelope) and cost, but makes the host
    interface the primary performance constraint.
  common_mistake: Candidates often focus solely on the 26 TOPS compute capacity and assume the accelerator
    is underutilized due to software overhead, host CPU bottlenecks, or thermal throttling at 2.5W. They
    fail to recognize that lacking local DRAM forces a strict dependency on the host memory interface
    bandwidth, completely shifting the bottleneck from compute to I/O.
  napkin_math: 'Compute-bound performance: 26 TOPS (26,000 GOPS) / 200 GOPS per frame = 130 FPS. Memory
    I/O-bound performance: 3.2 GB/s (3200 MB/s) / 200 MB per frame = 16 FPS. Since 16 FPS (Memory I/O
    limit) << 130 FPS (Compute limit), the system is completely bottlenecked by the PCIe host streaming
    bandwidth, exactly matching the observed 16 FPS.'
