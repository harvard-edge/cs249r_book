title: 'Model Size Estimation: Design Memory Layout for Multi-Model Edge Vision System'
scenario: |
  Design the memory layout for an edge vision system on Jetson Orin (32GB LPDDR5, 204 GB/s) running 4 concurrent models: face detection (10M params INT8), license plate OCR (8M params INT8), crowd density estimation (15M params FP16), and anomaly detection (20M params FP16). All models must be resident in memory simultaneously for <5ms switching latency.
question: How would you lay out memory so all four Jetson Orin vision models stay resident and switch in under 5ms?
details:
  realistic_solution: |
    Weights: face 10MB + OCR 8MB + crowd 30MB + anomaly 40MB = 88MB. TensorRT engines (1.3x overhead): 10*1.3+8*1.3+30*1.3+40*1.3=114.4MB. Working activation memory (largest activation, e.g., anomaly at 640x640): ~104MB peak. Total resident: 114.4+104 = 218.4MB of 32GB LPDDR5 = 0.68%. Trivially fits. Switching: engines already in memory, switch = change inference stream. Latency: ~0.5ms (CUDA context switch). Well under 5ms.
  common_mistake: Loading models on-demand from NVMe (reducing memory pressure but adding 10-50ms load time), when the problem specifies <5ms switching — models must be pre-loaded.
  napkin_math: |
    **Assumptions & Constraints:**
    - Weights: Face (10MB), OCR (8MB), Crowd (30MB), Anomaly (40MB).
    - TensorRT Engine overhead: 1.3x. Max activation: Anomaly at 640x640 (104MB).

    **Calculations:**
    - Total weights: 10 + 8 + 30 + 40 = 88MB.
    - TensorRT memory: 88MB * 1.3 = 114.4MB.
    - Total resident memory: 114.4MB + 104MB = 218.4MB (0.68% of 32GB).

    **Conclusion & Interpretation:**
    - **Result: 218.4MB (Memory-Bound)**. All engines easily fit in memory, allowing sub-millisecond CUDA context switching without NVMe loads.
