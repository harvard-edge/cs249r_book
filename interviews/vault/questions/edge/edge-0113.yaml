title: The INT8 Energy Dividend
scenario: You're optimizing a computer vision model for a battery-powered drone. To maximize flight time, you're quantizing the model's weights and activations from 32-bit floating point (FP32) to 8-bit integer (INT8).
question: From a pure hardware physics perspective, what is the approximate energy savings per operation you should expect by performing a computation in INT8 versus FP32?
details:
  realistic_solution: The energy saving is approximately 18.5x. Bit width directly impacts the physical energy cost of a computation at the circuit level; an 8-bit integer multiplication involves significantly fewer transistor switching events than FP32.
  common_mistake: |
    **The Pitfall:** Underestimating the physical energy savings of INT8, guessing a small factor like 2-4x.
    **The Rationale:** Engineers confuse the energy savings of INT8 with the much smaller savings of FP16.
    **The Consequence:** Failing to prioritize extreme quantization when optimizing for strict energy budgets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - FP32 MAC energy cost: ~3.7 pJ.
       - INT8 MAC energy cost: ~0.2 pJ.
    2. **Calculations:**
       - Energy ratio: 3.7 pJ / 0.2 pJ = 18.5x.
    3. **Conclusion & Interpretation:**
       - **Result: ~18.5x Energy Savings. Energy-Bound.**
  options:
  - ~3-4x. This is the typical savings for FP16.
  - ~18.5x. This correctly accounts for the circuit-level switching reduction.
  - ~100x. This is an extreme overestimation of INT8 efficiency.
  - ~580x. This is physically impossible for this precision scale.
  correct_index: 1
