title: 'Jetson Orin INT8 Quantization: Performance vs. Accuracy Trade-offs'
scenario: You are deploying a real-time object detection model (e.g., YOLOv7) to an
  NVIDIA Jetson Orin with 32 GB LPDDR5 memory and 275 TOPS INT8 performance at 60W.
  To meet latency and power constraints, you decide to quantize the model to INT8
  using post-training quantization (PTQ). After deployment, you observe that while
  the model meets the latency targets, there is a significant drop in mean Average
  Precision (mAP) compared to the FP32 baseline. The customer is particularly sensitive
  to false negatives on certain small objects.
question: How would you recover mAP and reduce false negatives on small objects after
  INT8 PTQ of YOLOv7 on the Jetson Orin?
details:
  realistic_solution: To mitigate this, first, enhance the PTQ calibration process
    by using a much larger, more diverse, and representative dataset that covers various
    operational scenarios and object sizes. Second, analyze the quantization sensitivity
    of individual layers. For layers highly sensitive to quantization, consider employing
    per-channel quantization instead of per-tensor. If accuracy is still not acceptable,
    explore Quantization-Aware Training (QAT) with a fine-tuning phase on a smaller,
    representative dataset, which allows the model to learn to compensate for quantization
    errors. Another advanced approach could be mixed-precision quantization, where
    critical layers remain in FP16 or FP32 while less sensitive layers are INT8, striking
    a better balance between performance and accuracy on the Orin.
  common_mistake: A common mistake is using a small or unrepresentative calibration
    dataset for PTQ, leading to poor range estimation for activations and weights.
    Additionally, relying solely on per-tensor quantization across all layers without
    analyzing the sensitivity of individual layers, especially those with wide dynamic
    ranges or critical feature maps, can exacerbate accuracy loss. This often manifests
    as large quantization errors in crucial layers, leading to underflow/overflow
    issues and a significant impact on downstream detection accuracy, particularly
    for objects with subtle features.
  napkin_math: An INT8 model typically offers a ~2x to 4x memory footprint reduction
    and a theoretical 2x to 4x throughput increase compared to an FP16 model (depending
    on hardware and operator support). Given the Jetson Orin's 275 TOPS INT8 capability,
    an FP32 model might only leverage a fraction of this potential (e.g., ~1/4th of
    the INT8 TOPS for FP16, and even less for FP32 on some architectures), indicating
    why quantization is critical for performance. However, if a critical layer's weight
    range is [-100, 100], quantizing to INT8 (range [-128, 127] with zero-point) means
    each step represents ~0.78 units (200/256), leading to a significant loss of precision
    compared to FP32 or FP16 for subtle feature representations. This precision loss
    per step directly translates to accumulated errors across layers, impacting mAP.
