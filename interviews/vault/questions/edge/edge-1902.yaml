title: 'Jetson Orin INT8 Quantization: Performance vs. Accuracy Trade-offs'
scenario: 'You are deploying a real-time object detection model to an edge device. To meet latency and power constraints, you quantize the model to INT8 using post-training quantization (PTQ). After deployment, you observe that while the model meets latency targets, there is a significant drop in mAP compared to the FP32 baseline, specifically with false negatives on small objects.'
question: How would you recover mAP and reduce false negatives on small objects after INT8 PTQ of YOLOv7?
details:
  realistic_solution: To mitigate this, first, enhance the PTQ calibration process by using a much larger, more diverse, and representative dataset that covers various operational scenarios and object sizes. Second, analyze the quantization sensitivity of individual layers. For layers highly sensitive to quantization, consider employing per-channel quantization instead of per-tensor. If accuracy is still not acceptable, explore Quantization-Aware Training (QAT) with a fine-tuning phase on a smaller, representative dataset, which allows the model to learn to compensate for quantization errors. Another advanced approach could be mixed-precision quantization, where critical layers remain in FP16 or FP32 while less sensitive layers are INT8, striking a better balance between performance and accuracy on the Orin.
  common_mistake: |
    **The Pitfall:** Using a small or unrepresentative calibration dataset for PTQ.
    **The Rationale:** Candidates apply per-tensor quantization without analyzing individual layer sensitivity.
    **The Consequence:** Large quantization errors in crucial layers, causing underflow/overflow that destroys detection accuracy for subtle features.
  napkin_math: |
    **Assumptions & Constraints:**
    - INT8 uses 256 discrete bins.
    - Weight range for a generic layer is [-100, 100].

    **Calculations:**
    - Range extent = 200.
    - Step size = 200 / 256 $\approx$ 0.78 units per bin.

    **Conclusion & Interpretation:**
    - **Result: Subtle feature activations are lost to the 0.78 step size (Precision-Bound)**. Precision-Bound accuracy drop necessitates QAT or Mixed-Precision.
