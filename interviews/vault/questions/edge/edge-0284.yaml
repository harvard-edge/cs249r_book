title: The A/B Test Battery Drain
scenario: You're an engineer on an automotive team A/B testing two driver-assist perception models on an edge device with specs similar to a Jetson AGX Orin. The 'Challenger' model is more accurate but suspected to be less power-efficient. Your test fleet drives for 10 hours a day, with the perception model actively running for a duty cycle of 10% of that time.
question: If the incumbent model consumes 20W during inference and the challenger consumes 30W, what is the additional energy in Watt-hours consumed by the challenger model per vehicle per day?
details:
  realistic_solution: The correct approach is to calculate the energy (Power × Time) for the active period only. The active period is the total time multiplied by the duty cycle. The difference in energy consumption is then the challenger's energy minus the incumbent's energy. This value is critical for understanding the Total Cost of Ownership (TCO), as increased battery drain can affect vehicle range and component lifetime.
  common_mistake: |
    **The Pitfall:** Forgetting to apply the duty cycle to the active inference time.
    **The Rationale:** Engineers calculate energy based on the total 10 hours of driving time instead of the 1 hour the component is actually active.
    **The Consequence:** Overestimating the energy impact by an order of magnitude, potentially rejecting a viable model.
  napkin_math: |
    - **Active Time:** 10 hours/day * 10% duty cycle = 1 hour of active inference per day.
    - **Incumbent Energy:** 20W * 1 hour = 20 Wh per day.
    - **Challenger Energy:** 30W * 1 hour = 30 Wh per day.
    - **Additional Energy:** 30 Wh - 20 Wh = **10 Wh per day per vehicle**.
  options:
  - 100 Wh
  - 10 W
  - 10 Wh
  - 1 Wh
  correct_index: 2
