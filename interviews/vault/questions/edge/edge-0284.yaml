title: The A/B Test Battery Drain
scenario: You're an engineer on an automotive team A/B testing two driver-assist perception models on an edge device. The test fleet drives for 10 hours a day, with the perception model actively running for a duty cycle of 10% of that time.
question: If the incumbent model consumes 20W during inference and the challenger consumes 30W, what is the additional energy in Watt-hours consumed by the challenger model per vehicle per day?
details:
  realistic_solution: Calculate the energy (Power * Time) for the active period only. The active period is total time multiplied by the duty cycle. The difference is critical for Total Cost of Ownership (TCO) as increased battery drain affects range.
  common_mistake: |
    **The Pitfall:** Forgetting to apply the duty cycle to the active inference time.
    **The Rationale:** Engineers calculate energy based on the total 10 hours of driving time instead of the 1 hour the component is actually active.
    **The Consequence:** Overestimating the energy impact by an order of magnitude, potentially rejecting a viable model.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Time: 10 hours/day at 10% duty cycle
       - Incumbent: 20W
       - Challenger: 30W
    2. **Calculations:**
       - Active Time = 10 hours * 0.10 = 1 hour/day
       - Incumbent Energy = 20W * 1 hour = 20 Wh/day
       - Challenger Energy = 30W * 1 hour = 30 Wh/day
       - Additional Energy = 30 Wh - 20 Wh = 10 Wh/day
    3. **Conclusion & Interpretation:**
       - **Result: 10 Wh per day additional drain.**
  options:
  - 100 Wh
  - 10 W
  - 10 Wh
  - 1 Wh
  correct_index: 2
