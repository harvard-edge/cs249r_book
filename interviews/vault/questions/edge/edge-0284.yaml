title: The A/B Test Battery Drain
scenario: You're an engineer on an automotive team A/B testing two driver-assist perception models on
  an edge device with specs similar to a Jetson AGX Orin. The 'Challenger' model is more accurate but
  suspected to be less power-efficient. Your test fleet drives for 10 hours a day, with the perception
  model actively running for a duty cycle of 10% of that time. If the incumbent model consumes 20W during
  inference and the challenger consumes 30W, what is the additional energy in Watt-hours consumed by the
  challenger model per vehicle per day?
question: "If the incumbent model consumes 20W during inference and the challenger consumes 30W, what is the additional energy in Watt-hours consumed by the challenger model per vehicle per day?"
details:
  realistic_solution: The correct approach is to calculate the energy (Power × Time) for the active period
    only. The active period is the total time multiplied by the duty cycle. The difference in energy consumption
    is then the challenger's energy minus the incumbent's energy. This value is critical for understanding
    the Total Cost of Ownership (TCO), as increased battery drain can affect vehicle range and component
    lifetime.
  common_mistake: Forgetting to apply the duty cycle. Engineers often calculate power cost based on the
    total operational time (e.g., 10 hours of driving) instead of the actual time the component is active
    (1 hour), overestimating the energy impact by an order of magnitude.
  napkin_math: '1. Calculate Active Time: `10 hours/day × 10% duty cycle = 1 hour of active inference
    per day.`

    2. Energy consumed by Incumbent: `20W × 1 hour = 20 Wh per day.`

    3. Energy consumed by Challenger: `30W × 1 hour = 30 Wh per day.`

    4. Additional Energy: `30 Wh − 20 Wh = 10 Wh per day per vehicle.`


    The challenger model consumes an additional 10 Wh per vehicle per day. Over a 30-day A/B test across
    a fleet of 1,000 vehicles, this amounts to 10 Wh × 30 days × 1,000 vehicles = 300 kWh of additional
    energy. At 0.15/kWh, that is 45 in electricity, but more critically, the 10 Wh/day drain reduces the
    vehicle''s effective range, which may be unacceptable for the product.'
  options:
  - 100 Wh
  - 10 W
  - 10 Wh
  - 1 Wh
  correct_index: 2
