title: 'Edge TCO Recall: CapEx vs OpEx Tradeoff for Edge AI'
scenario: Define CapEx and OpEx in the context of edge AI deployments. State when each is preferred, and apply this to choosing between purchasing 100 Jetson Orin units vs renting equivalent cloud GPU instances.
question: For 100 Jetson Orin units, what are first-year CapEx, annual power OpEx, and why might a cash-constrained startup still prefer cloud OpEx?
details:
  realistic_solution: Buying 100 Jetson Orin units is $49.9K upfront CapEx. Annual power cost is 100 × 60W × 8,760h × $0.10/kWh / 1000 = $5,256/year. Cloud at $0.50/hr per unit-equivalent would be $438K/year, much higher over time. However, a cash-constrained startup may still prefer cloud OpEx because it avoids upfront capital, hardware maintenance, and demand risk.
  common_mistake: |
    **The Pitfall:** Assuming cash-constrained startups should always choose the cheaper long-term edge CapEx option.
    **The Rationale:** Candidates calculate raw long-term cost without considering cash flow, hardware depreciation, and demand uncertainty.
    **The Consequence:** Incorrect financial modeling leading to paralyzed deployment due to upfront capital exhaustion.
  napkin_math: |
    - Jetson CapEx: 100 units * $499 = $49,900.
    - Edge Annual Power OpEx: 100 * 60W * 8760h * $0.10/kWh / 1000 = $5,256.
    - Cloud OpEx: 100 * $0.50/hr * 8760h = $438,000.
    **Cloud costs $438,000/year, but startups prefer it to avoid the $49,900 upfront CapEx risk.**
