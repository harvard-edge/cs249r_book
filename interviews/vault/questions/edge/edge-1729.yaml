title: Sizing MobileNetV2 for Google Coral Edge TPU
scenario: You are deploying an object detection model on a Google Coral Edge TPU via a USB interface. You have selected an SSD with a MobileNetV2 backbone.
question: How would you choose the MobileNetV2 input resolution and depth multiplier to achieve 30 FPS within Coral Edge TPU constraints?
details:
  realistic_solution: Utilize MobileNetV2 with ReLU6, which ensures complete INT8 compilation by the Edge TPU compiler without fallback to the host CPU. When sizing the model for 30 FPS, calculate practical hardware utilization (often ~25% for depthwise operations) rather than peak TOPS. Benchmark the USB bandwidth to guarantee that passing the input tensor doesn't exceed effective throughput.
  common_mistake: |
    **The Pitfall:** Overlooking the strict INT8 requirement and hardware utilization limits.
    **The Rationale:** Candidates often size models based on peak TOPS and assume all architectures and activation functions are perfectly supported.
    **The Consequence:** Choosing an incompatible model or sizing it too large leads to CPU fallbacks or missed real-time deadlines due to poor systolic array utilization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target Latency: 30 FPS (33.3ms budget, allocate 15ms for TPU).
       - Coral Peak Compute: 4 TOPS (4,000 GOPS).
       - Expected Utilization: 25% for depthwise CNNs.
    2. **Calculations:**
       - Practical Compute Limit: 4,000 GOPS * 0.015s * 0.25 = 15 GOPS.
       - Model Sizing: MobileNetV2 at 224x224 requires ~0.6 GOPS. Scaling to 512x512 = 0.6 * (512/224)^2 = 3.1 GOPS.
       - USB Bandwidth: 512 * 512 * 3 bytes * 30 FPS = 23.5 MB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Thermally and Compute Feasible.** The scaled model (3.1 GOPS) is well within the 15 GOPS practical limit, and USB 3.0 easily handles the 23.5 MB/s throughput.
