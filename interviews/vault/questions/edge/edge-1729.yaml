title: Sizing MobileNetV2 for Google Coral Edge TPU
scenario: You are deploying an object detection model on a Google Coral Edge TPU via a USB interface. The Coral provides 4 TOPS for INT8 operations within a 2W power budget, but requires full INT8 quantization and has limited operator support. You have selected an SSD with a MobileNetV2 backbone.
question: "How would you choose the MobileNetV2 input resolution and depth multiplier to achieve 30 FPS within Coral Edge TPU constraints?"
details:
  realistic_solution: The optimal approach is to select MobileNetV2 with ReLU6, which is fully supported by the Edge TPU compiler for complete INT8 execution without CPU fallbacks. To achieve a reliable 30 FPS, the model is sized to account for realistic TPU utilization (often 20-30% for depthwise layers) rather than peak 4 TOPS, and ensures the USB transfer bandwidth does not become the primary bottleneck for the chosen input resolution.
  common_mistake: |
    **The Pitfall:** Overlooking the strict INT8 requirement and hardware utilization limits.
    **The Rationale:** Candidates often size models based on peak TOPS and assume all architectures and activation functions are perfectly supported.
    **The Consequence:** Choosing an incompatible model or sizing it too large leads to CPU fallbacks or missed real-time deadlines due to poor systolic array utilization.
  napkin_math: |
    *   **Latency Budget:** Target 30 FPS = 33.3ms latency budget. Allocate 15ms for TPU compute.
    *   **Theoretical Limit:** 4,000 GOPS * 0.015s = 60 GOPS.
    *   **Practical Limit:** Assuming 25% utilization for depthwise convolutions, practical limit = 15 GOPS per frame.
    *   **Scaling:** MobileNetV2 at 224x224 requires ~0.6 GOPS. Scaling to 512x512 increases compute by (512/224)^2 ≈ 5.2x.
    *   **Compute Target:** 0.6 GOPS * 5.2 = 3.1 GOPS per frame, **well within the 15 GOPS limit**.
    *   **Bandwidth Check:** USB 3.0 handles the 512x512x3 input at 30 FPS (0.78 MB * 30 = **23.4 MB/s**, well below ~300 MB/s effective bandwidth).
