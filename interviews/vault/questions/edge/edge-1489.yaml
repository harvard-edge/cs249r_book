title: On-Premise Guardrail Architecture for Legal Summarization
scenario: You are tasked with designing a secure, on-premise document summarization pipeline for legal contracts. The system must include strict responsible AI guardrails, specifically PII redaction and hallucination detection, before surfacing summaries to users. The entire pipeline must be deployed on a single accelerator constrained to 32 GB LPDDR4x, 400 TOPS INT8, and 75W.
question: How would you allocate hardware resources between the main summarization model and guardrails to meet a 2-second end-to-end latency SLA?
details:
  realistic_solution: The optimal design quantizes the main summarization model (e.g., an 8B parameter model) to INT8, occupying ~8.5 GB. Instead of using LLMs for guardrails, architect a system using small, specialized INT8 models (e.g., DeBERTa for hallucination, lightweight NER for PII) running concurrently where possible. PII redaction runs pre-summarization, and hallucination detection runs post-summarization. By relying heavily on INT8 compilation, the 400 TOPS capability is maximized, keeping the total memory footprint well under the 32 GB constraint.
  common_mistake: |
    **The Pitfall:** Designing pipelines that chain multiple large LLMs for each guardrail task.
    **The Rationale:** Candidates default to using full-size LLMs for simple tasks and fail to utilize INT8 capabilities, proposing FP16 models.
    **The Consequence:** The system runs out of memory, dramatically bottlenecks the pipeline, and misses the strict 2-second latency SLA.
  napkin_math: |
    * 8B model in INT8 requires ~8.5 GB.
    * Two specialized BERT-sized guardrail models in INT8 require ~220 MB total.
    * Total static memory = ~8.72 GB, leaving ~23.28 GB for KV cache and activations.
    * At ~100 GB/s bandwidth, loading 8.5 GB takes ~0.085s per token.
    * 50 tokens at batch size 1 takes ~4.25s, failing the 2-second SLA.
    * **Continuous batching and aggressive KV-cache management within the remaining 23 GB are strictly required to meet the SLA.**
