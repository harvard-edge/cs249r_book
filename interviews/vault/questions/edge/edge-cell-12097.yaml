title: 'Model Size Estimation: Diagnose Memory Pressure Causing Swapping on Jetson Orin'
scenario: A Jetson Orin deployment running 3 models (total 28GB weights FP16) on 32GB LPDDR5 shows 50%
  performance degradation after 2 hours. htop shows swap usage at 4GB (to NVMe SSD at 3.5 GB/s). Diagnose
  and quantify the fix.
details:
  realistic_solution: '28GB weights + 3GB OS + 2GB CUDA = 33GB > 32GB → swapping expected. Swap read:
    4GB / 3.5GB/s = 1.14s added latency every time swapped pages accessed. At 50% degradation: swap IO
    is constant. Fix: (1) Quantize largest model from FP16 to INT8: saves ~14GB. New total: 14+3+2=19GB
    << 32GB. No swap. (2) Alternatively, use model offloading: keep only active model in GPU memory, others
    on NVMe — but this adds 100ms switch time. Fix (1) with INT8 is best.'
  common_mistake: Trying to reduce model precision immediately without first checking if the OOM is caused
    by memory fragmentation from repeated tensor allocation/deallocation, which can waste 20-40% of memory.
  napkin_math: '3 models FP16: 28GB. System: 5GB. Total: 33GB. Overflow: 1GB to swap. Swap latency: 1GB/3.5GB/s=286ms
    per swap event. At 1 swap/2s: avg latency increase = 286ms/2s = 143ms added → 50% degradation on 300ms
    inference. Fix: quantize 1 model from FP16→INT8: saves ~9GB (18M params / 2 = 9MB? No: largest model
    is ~14GB). INT8 largest: saves 14GB. Total: 14+3+5=22GB << 32GB ✓.'
