title: Roofline Analysis for MobileNetV2 on Qualcomm Cloud AI 100
scenario: A development team is deploying a MobileNetV2 model on the Qualcomm Cloud AI 100 accelerator.
  Initial performance metrics show that the accelerator utilization is lower than expected, and inference
  latency is higher than desired, despite the chip's high theoretical INT8 TOPS. The Qualcomm Cloud AI
  100 has 400 TOPS (INT8), 32 GB LPDDR4x memory with an advertised peak memory bandwidth of 85 GB/s, and
  a 75W TDP. Using the roofline model, explain how you would diagnose whether the MobileNetV2 workload
  is compute-bound or memory-bound on this platform. What steps would you take to predict the achievable
  performance and identify potential optimization strategies?
question: "What steps would you take to predict the achievable performance and identify potential optimization strategies?"
details:
  realistic_solution: 'The solution involves calculating the arithmetic intensity (AI) of the MobileNetV2
    model, which is the ratio of total operations (FLOPs/TOPs) to total data movement (bytes) during inference.
    First, determine the total INT8 operations and memory access requirements (weights + activations)
    for MobileNetV2. Then, plot this arithmetic intensity on a roofline chart for the Qualcomm Cloud AI
    100. The chart will have two ''roofs'': a horizontal line representing the peak compute performance
    (400 TOPS INT8) and a sloping line representing the peak memory bandwidth (85 GB/s). The intersection
    of these lines defines the ''ridge point''. If the model''s AI falls to the left of the ridge, it''s
    memory-bound, and its performance will be limited by memory bandwidth. If it falls to the right, it''s
    compute-bound, limited by the processor''s peak TOPS. Based on this, optimizations can be targeted:
    for memory-bound workloads, techniques like further quantization, data reuse, or pruning are effective.
    For compute-bound, optimizing kernel implementations or exploring sparser models could be beneficial.'
  common_mistake: A common mistake is to solely focus on the peak compute (TOPS) without considering the
    actual arithmetic intensity of the workload or the memory bandwidth limitations. For models like MobileNetV2
    with many depthwise separable convolutions, the ratio of operations to data movement can be lower
    than dense convolutions, making them more susceptible to memory bandwidth bottlenecks. Overlooking
    the LPDDR4x bandwidth constraint relative to the INT8 compute capability can lead to misdiagnosis
    and ineffective optimization efforts.
  napkin_math: "Let's consider a hypothetical layer of MobileNetV2, say a 1x1 convolution with 256 input\
    \ channels and 512 output channels, applied to a 14x14 feature map, all in INT8.\n\n1. **Operations\
    \ (Ops):** Roughly `2 * (1*1*256) * 512 * (14*14) = 2 * 256 * 512 * 196 = 51,380,224` INT8 operations.\n\
    \n2. **Memory Access (Bytes):**\n   - Weights: `1*1*256*512 bytes = 131,072` bytes\n   - Input Activation:\
    \ `256*14*14 bytes = 50,176` bytes\n   - Output Activation: `512*14*14 bytes = 100,352` bytes\n  \
    \ - Total Memory Access (approx): `131072 + 50176 + 100352 = 281,600` bytes\n\n3. **Arithmetic Intensity\
    \ (AI):** `Ops / Bytes = 51,380,224 ops / 281,600 bytes ≈ 182.5 ops/byte`.\n\n4. **Roofline Model\
    \ Check:**\n   - **Peak Compute:** 400 TOPS = 400 * 10^12 ops/s\n   - **Peak Memory Bandwidth:** 85\
    \ GB/s = 85 * 10^9 bytes/s\n   - **Ridge Point (AI_ridge):** `Peak Compute / Peak Memory Bandwidth\
    \ = (400 * 10^12) / (85 * 10^9) ≈ 4705 ops/byte`.\n\nSince our calculated `AI = 182.5 ops/byte` is\
    \ significantly less than `AI_ridge = 4705 ops/byte`, this hypothetical layer (and likely many parts\
    \ of MobileNetV2) is **memory-bound** on the Qualcomm Cloud AI 100."
