title: Analyzing RAG Feasibility on Jetson Orin for On-Device Retrieval
scenario: A robotics team wants to deploy a RAG pipeline on Jetson Orin for on-device document retrieval. The corpus is 50,000 technical manuals, each averaging 2000 tokens. A 384-dim embedding model produces vectors at 200 vectors/second on Orin. FAISS HNSW search on 50K vectors takes 8ms. The LLM is a quantized 3B model running at 12 tok/s.
question: Is on-device RAG over 50,000 manuals feasible on Jetson Orin under a 3-second response budget, and what bottleneck dominates?
details:
  realistic_solution: On-device RAG is feasible for retrieval, but generation is severely bottlenecked. The memory footprint for the FAISS index, 3B INT8 model weights, and KV cache fits well within the 32GB LPDDR5 limit. However, the LLM generation phase dominates latency at 16.7 seconds for a 200-token response, obliterating the 3-second budget. The solution is to strictly limit generation to ~36 tokens, use retrieval results directly for structured responses, or upgrade to INT4 quantization to achieve 24 tok/s and expand the token output budget.
  common_mistake: |
    **The Pitfall:** Focusing only on the retrieval speed and ignoring the LLM generation latency.
    **The Rationale:** Candidates calculate the FAISS search time (8ms) and assume RAG is fast, forgetting the auto-regressive decoding bottleneck of the LLM.
    **The Consequence:** Designing a RAG system that times out because the LLM generation phase alone obliterates the strict response budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Corpus: 50,000 vectors, 384-dim, 4 bytes each.
    - LLM Generation Latency (INT8): 12 tok/s.
    - Budget: 3 seconds.

    **Calculations:**
    - FAISS index size: 50,000 * 384 * 4 bytes = 76.8 MB (Fits memory easily).
    - Retrieval Pipeline Latency: Query embed (5ms) + FAISS search (8ms) + Context prep (5ms) = 18ms.
    - LLM Generation Latency (200 tokens): 200 / 12 tok/s = 16.7s.
    - Total Latency: 16.7s + 0.018s = ~16.7s (Fails 3s budget).
    - Max output tokens inside 3s budget: 3s * 12 tok/s = 36 tokens.

    **Conclusion & Interpretation:**
    - **Result: 36 tokens (Compute-Bound)**. RAG is unfeasible for 200-token responses; the generation phase dominates the latency budget, capping feasible outputs to ~36 tokens.
