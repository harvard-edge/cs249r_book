title: Dynamic Power Budgeting for Solar Edge Node
scenario: A Jetson AGX Orin wildlife camera is powered by a 500Wh battery, replenished by a solar panel. During a 3-day overcast period (0W solar), the Orin uses 15W in low-power and 40W in high-power modes.
question: What dynamic duty-cycling policy guarantees the system survives 72 hours of 0W solar input while maximizing active camera monitoring time?
details:
  realistic_solution: With a 500Wh battery and a 72-hour survival target, the maximum continuous power budget is 500 / 72 = 6.94W. Since the Orin's lowest mode is 15W, continuous monitoring is impossible. The policy must alternate between a sleep state (~1W) and the 15W active state, achieving roughly a 42% active duty cycle to maintain the 6.94W average.
  common_mistake: |
    **The Pitfall:** Leaving the device purely in the 15W "low-power" mode.
    **The Rationale:** Candidates hear "low-power mode" and assume it is sufficient for off-grid survival without running the actual capacity math.
    **The Consequence:** 15W continuous drains the 500Wh battery in just 33 hours, causing the system to die entirely halfway through the 72-hour overcast period.
  napkin_math: |
    1. Target continuous power budget: 500Wh / 72h = 6.94W.
    2. Let x be the active duty cycle proportion. x(15W) + (1-x)(1W) = 6.94W.
    3. 14x + 1 = 6.94 -> 14x = 5.94.
    4. **x ≈ 0.42. The camera can only be active ~42% of the time, requiring a hardware interrupt (like passive IR) to wake from the 1W sleep state.**
