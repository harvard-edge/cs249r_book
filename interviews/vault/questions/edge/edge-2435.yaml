title: Dynamic Power Budgeting for Solar Edge Node
scenario: A Jetson AGX Orin wildlife camera is powered by a 500Wh battery, replenished
  by a solar panel. During a 3-day overcast period (0W solar), the Orin uses 15W in
  low-power and 40W in high-power modes.
question: Create a dynamic duty-cycling policy that guarantees the system survives
  72 hours of 0W solar input while maximizing active camera monitoring time.
details:
  realistic_solution: With a 500Wh battery and a 72-hour survival target, the maximum
    continuous power budget is 500 / 72 = 6.94W. Since the Orin's lowest mode is 15W,
    continuous monitoring is impossible. The policy must alternate between a sleep
    state (~1W) and the 15W active state, achieving roughly a 40% active duty cycle
    (e.g., wake for 2 seconds on passive IR trigger, sleep for 3 seconds) to maintain
    the 6.94W average.
  common_mistake: Setting the device purely to the 15W low-power mode, failing to
    recognize that 15W continuous drains 500Wh in just 33 hours.
  napkin_math: 500Wh / 72h = 6.94W. Duty cycle = (6.94 - 1) / 15 =~ 40%.
