title: Hailo-8 Host Streaming Bandwidth Bottleneck
scenario: >-
  You are deploying a vision model on a host system equipped with a Hailo-8 accelerator. The accelerator must stream all data directly from the host memory over a PCIe Gen3 x4 interface. The model necessitates transferring 200 MB of data (weights and I/O activations) per frame across the PCIe bus. Despite the compute capacity, the pipeline only achieves exactly 16 FPS.
question: Why does the Hailo-8 pipeline achieve only 16 FPS despite 26 TOPS of compute for a 200-GOPS-per-frame model?
details:
  realistic_solution: 'The bottleneck occurs because the dataflow architecture lacks local DRAM and must stream 200 MB of data per frame over the PCIe bus. While the compute engine is incredibly fast, the 3.2 GB/s PCIe interface acts as a hard physical limit. The system is entirely memory-bandwidth bound.'
  common_mistake: |
    **The Pitfall:** Fixating purely on raw TOPS.
    **The Rationale:** Candidates see high TOPS and assume performance is limited by software overhead or CPU bottlenecks.
    **The Consequence:** They completely miss that lacking local DRAM forces a strict dependency on host interface bandwidth, fundamentally shifting the bottleneck from compute to I/O.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute capacity: 26 TOPS INT8 (26,000 GOPS).
       - PCIe Gen3 x4 bandwidth: 3.2 GB/s (3200 MB/s).
       - Model limits: 200 GOPS/frame and 200 MB/frame transfer.
    2. **Calculations:**
       - Compute Limit: 26,000 GOPS / 200 GOPS/frame = 130 FPS.
       - I/O Limit: 3200 MB/s / 200 MB/frame = 16 FPS.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound.** Since 16 FPS (I/O limit) << 130 FPS (Compute limit), the system is completely bottlenecked by PCIe streaming bandwidth, precisely matching the observed 16 FPS.
