title: Coral Edge TPU Queue Depth and Tail Latency
scenario: A Coral Edge TPU (4 TOPS INT8, 2W) runs MobileNetV2 classification at 30 FPS (33ms/frame budget).
  Average inference is 5ms, but when the host Raspberry Pi is under load (running 3 other processes),
  P99 frame latency rises to 55ms. The Coral is connected via USB3.
question: "Why does Coral MobileNetV2 P99 latency rise to 55ms under Raspberry Pi load, and how would you reduce it without blaming USB3?"
details:
  realistic_solution: 'Pre-allocate input/output tensors and avoid Python object creation in the inference
    loop. Use multiprocessing with a dedicated process for Coral inference (bypasses GIL). Implement double-buffering:
    prepare next frame while waiting for Coral result. Profile with cProfile to identify Python overhead.'
  common_mistake: Upgrading to a PCIe Coral module assuming USB3 is the bottleneck. USB3 at 5Gbps has
    sub-millisecond transfer for 224x224x3 = 150KB images. The bottleneck is host-side scheduling and
    Python GIL in the tflite-runtime interpreter.
  napkin_math: 'Coral TPU: 4 TOPS INT8. MobileNetV2 (300 MOPs): 0.3G/4T = 75μs. USB3 transfer: 150KB image
    at 400MB/s effective = 375μs. Total hardware latency: ~450μs. Observed 5ms → 4.55ms is Python/tflite
    overhead. Under host load, Python scheduling adds up to 50ms (scheduler quantum = 10ms * 5 processes).
    Double-buffering hides 450μs hardware latency but not scheduling jitter.'
