title: Register Pressure on Jetson Orin Ampere SMs
scenario: Your custom CUDA kernel on Jetson Orin (Ampere architecture, 2048 SMs, 65536 registers per SM)
  uses 96 registers per thread with 256 threads per block. Calculate the occupancy and explain why reducing
  to 64 registers per thread (with register spilling) might actually decrease performance despite higher
  occupancy.
question: "Before calculating occupancy, what hardware-count error is in saying Jetson Orin has 2,048 SMs?"
details:
  realistic_solution: Jetson Orin has 16 SMs (not 2,048 SMs). 2,048 is the CUDA core count (16 SMs × 128
    cores/SM). An H100 has 132 SMs for comparison.
  common_mistake: Always reducing register usage to increase occupancy. Register spilling moves data to
    local memory (which is actually global memory with L1 caching), adding 20-100× latency per spilled
    access. The occupancy gain rarely compensates for spill overhead.
  napkin_math: 'Jetson Orin GPU: 16 SM (Streaming Multiprocessors), each with 128 CUDA cores = 2,048 CUDA
    cores total (not 2,048 SMs — 2048 SMs would be larger than an A100 which has 108 SMs). Jetson Orin
    has 16 SMs × 128 cores = 2,048 CUDA cores.'
