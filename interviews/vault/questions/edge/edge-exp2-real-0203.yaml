title: Sizing a 70B LLM for Qualcomm Cloud AI 100
scenario: Your team is tasked with deploying a 70-billion parameter language model for an on-premise enterprise
  application using a single Qualcomm Cloud AI 100 accelerator. The card features 32 GB of LPDDR4x memory,
  400 TOPS of INT8 compute, and operates within a strict 75W power envelope. You must design an extreme
  quantization strategy (evaluating techniques like GPTQ, AWQ, or mixed 2/3-bit precision) to fit the
  model and KV cache into memory, while assessing the architectural tradeoffs of running sub-4-bit weights
  on an INT8-optimized compute pipeline.
question: "What extreme quantization scheme would fit a 70B LLM and KV cache into 32 GB on Cloud AI 100, and what runtime tradeoffs follow?"
details:
  realistic_solution: 'The candidate should calculate that the average bit-width must be ~3.2 bits or
    lower to fit the model and reserve room for the KV cache. A strong approach proposes a mixed-precision
    scheme or uniform 3-bit quantization (e.g., 3-bit AWQ or GPTQ) to reduce the weight footprint to ~26
    GB. They must evaluate the system-level tradeoff: extreme quantization solves the LPDDR4x memory capacity
    bottleneck but introduces an unpacking overhead that consumes INT8 compute cycles, potentially shifting
    the bottleneck depending on batch size.'
  common_mistake: Candidates often assume standard 4-bit quantization is sufficient without doing the
    math to realize that 70B parameters at 4-bit requires ~35GB, instantly exceeding the 32GB limit. They
    also frequently overlook the runtime compute overhead of unpacking sub-4-bit weights into INT8 formats
    to actually utilize the 400 TOPS engine.
  napkin_math: '70B params at standard 4-bit = 70e9 * 0.5 bytes = 35.0 GB (Fails: > 32 GB LPDDR4x limit).
    Target memory for weights: ~28 GB (reserving 4 GB for KV cache and execution). Required bit-width
    = (28 GB * 8 bits/byte) / 70B params = 3.2 bits/param maximum. Applying 3-bit extreme quantization:
    70B * 3 bits = 210 Gigabits = 26.25 GB for weights. Remaining memory for KV cache = 32.0 GB - 26.25
    GB = 5.75 GB. Assuming a typical LPDDR4x system bandwidth of ~100 GB/s, the memory-bound token generation
    step would take at minimum 26.25 GB / 100 GB/s = 262.5 ms per token (approx 3.8 tokens/second).'
