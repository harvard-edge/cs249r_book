title: CI/CD Latency Skew on Hailo-8 Dataflow Accelerator
scenario: In your MLOps CI/CD pipeline, a model update is automatically approved because its theoretical compute requirement is 5 GOPs. Upon canary deployment, the inference latency spikes to over 7 milliseconds per frame instead of the expected 1 millisecond, and the host system's memory bandwidth is entirely saturated.
question: Why did the TOPS-based CI/CD estimate miss the Hailo-8 canary latency spike and host memory saturation?
details:
  realistic_solution: The CI/CD pipeline's profiling step evaluated compute bounds (TOPS) but failed to account for the memory-bound nature of the Hailo-8's architecture. Because there is no local DRAM, when the model's intermediate activations exceed the accelerator's internal SRAM, the dataflow compiler must spill these activations back to host memory and stream them in for the next layer. The solution is to integrate the Hailo compiler's hardware-aware profiler into the CI/CD pipeline to reject models that trigger excessive host memory streaming.
  common_mistake: |
    **The Pitfall:** Incorrectly attributing the latency spike to INT8 quantization overhead, CPU pre-processing bottlenecks, or thermal throttling.
    **The Rationale:** Engineers often rely purely on theoretical TOPS and ignore the architectural realities, specifically the lack of local DRAM on dataflow accelerators.
    **The Consequence:** Deploying a model that thrashes the host memory bus, starving the compute engine and crippling the edge device's overall performance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model compute: 5 GOPS.
       - Hailo-8: 26 TOPS INT8, no local DRAM.
       - Host memory spilling: 10 MB activation layer forces 20 MB total I/O.
       - PCIe Gen3 x2 link: ~3000 MB/s effective bandwidth.
    2. **Calculations:**
       - Compute Latency Estimate: 5 GOPS / 26 TOPS = ~0.192 ms (effectively ~1 ms with real-world utilization).
       - PCIe Transfer Time: 20 MB / 3000 MB/s = 6.6 ms.
       - Total Production Latency: 1 ms compute + 6.6 ms I/O = 7.6 ms.
    3. **Conclusion & Interpretation:**
       - **7.6 ms total latency**.
       - **Result: Memory-Bound (PCIe Transfer Bottleneck)**.
