title: The Edge GPU Driver Crash Loop
scenario: Your traffic monitoring system uses 500 Jetson Orin NX devices. After a JetPack update, 30 devices
  (6%) enter a pattern where the GPU driver crashes every 45–90 minutes, producing a kernel oops in `nvgpu`.
  The device recovers after a 15-second GPU reset, but during recovery, 450 frames go uninspected (30
  FPS × 15s). The other 470 devices are fine on the same firmware. What's different about these 30 devices,
  and how do you design the system to tolerate GPU driver crashes?
question: "What's different about these 30 devices, and how do you design the system to tolerate GPU driver crashes?"
details:
  realistic_solution: 'The 30 affected devices share a common trait: they''re deployed at intersections
    with the highest traffic volume, running at sustained >90% GPU utilization. The driver bug is a **race
    condition in the GPU memory allocator** that only triggers under sustained high memory pressure —
    a classic Heisenbug that passed NVIDIA''s testing because their test workloads don''t sustain 90%+
    utilization for hours.'
  common_mistake: '"Roll back the JetPack update on the affected devices." Rollback fixes the symptom
    but doesn''t explain why only 6% are affected — and the old JetPack has a known security vulnerability
    you need to patch.'
  napkin_math: 'GPU crash frequency: 1 per 67.5 minutes average (45–90 min range). Downtime per crash:
    15 seconds. Daily crashes per device (24h): 21.3. Daily downtime: 21.3 × 15s = 319.5 seconds = ~5.3
    minutes. Availability: (1440 - 5.3) / 1440 = 99.63%. With CPU fallback during recovery: effective
    availability for safety-critical detections = 99.99% (CPU catches critical events at 5 FPS). After
    memory pressure fix: crash frequency drops to <1 per week. Availability: >99.99%. Cost of fix: ~40
    hours engineering × $150 = $6,000. Cost of unmonitored intersection for 5.3 min/day: liability risk.'
