title: 'Edge TCO Evaluation: 3 Edge Hardware Options for Retail Analytics'
scenario: Evaluate 3 edge hardware options for a 500-store retail analytics deployment (1 unit/store, 24/7, 30 FPS object detection). Options are (A) Jetson Orin ($499, 60W), (B) Hailo-8+Pi5 ($280, 7.5W), (C) Intel NCS2+Pi4 ($175, 4W). 3-year TCO at $0.10/kWh.
question: What are the correct 3-year power costs for the 7.5W Hailo-8+Pi5 and 4W NCS2+Pi4 options at $0.10/kWh?
details:
  realistic_solution: |
    B power: 7.5W × 26,280hr × $0.10/1000 = $19.71.
    C power: 4W × 26,280hr × $0.10/1000 = $10.51.
    Always divide W×hr×$/kWh by 1000.
  common_mistake: |
    **The Pitfall:** Not checking if lower-cost options can actually achieve the required throughput.
    **The Rationale:** Focus is purely on minimizing TCO without ensuring the hardware can process the 30 FPS YOLOv8s workload.
    **The Consequence:** Selecting hardware that is cost-effective but fails to meet real-time performance requirements.
  napkin_math: |
    - Option B power: 7.5W × 26,280hr (3yr) × $0.10/kWh / 1000 = **$19.71**.
    - Option C power: 4W × 26,280hr (3yr) × $0.10/kWh / 1000 = **$10.51**.
status: published
