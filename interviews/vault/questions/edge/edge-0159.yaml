title: The Federated vs. Centralized Upload Tax
scenario: 'Your team is deploying a fleet of 1,000 smart cameras to retail stores for person detection.
  You''re comparing two strategies for model updates: a centralized approach where each camera uploads
  1,000 training images (100 KB each, compressed) daily to the cloud, versus a federated learning approach
  where each camera trains locally and only uploads the updated model weights once per day. The model
  is a 4 million parameter MobileNetV3 variant.'
question: "For 1,000 cameras, how do daily upload volumes compare between centralized image uploads and federated MobileNetV3 weight updates?"
details:
  realistic_solution: The core trade-off is between raw data volume (centralized) and model weight volume
    (federated). The federated approach sends significantly less data, saving on network costs and preserving
    user privacy, at the cost of higher on-device compute requirements.
  common_mistake: Engineers often miscalculate the model size, typically by using 4 bytes for FP32 instead
    of 2 bytes for FP16, doubling the federated cost. Another common error is calculating the per-device
    data cost but forgetting to multiply by the 1,000 devices in the fleet, drastically underestimating
    the total operational expenditure (OpEx).
  napkin_math: 'Centralized Data = 1,000 devices × 1,000 images/device × 100 KB/image = 100,000,000 KB
    = 100 GB/day.


    Federated Model Upload:

    - Model size: 4M parameters × 2 bytes (FP16) = 8 MB per device per day.

    - Total: 1,000 devices × 8 MB = 8 GB/day.


    Data transfer ratio: 100 GB / 8 GB = 12.5x less data with federated learning.


    Monthly network costs (at 0.09/GB for cloud egress/ingress):

    - Centralized: 100 GB/day × 30 days × 0.09 = 270/month.

    - Federated: 8 GB/day × 30 days × 0.09 = 21.60/month.

    - Savings: 248.40/month (92%).


    Annual costs:

    - Centralized: 100 GB × 365 days = 36.5 TB/year. At 0.09/GB = 3,285/year in bandwidth alone.

    - Federated: 8 GB × 365 days = 2.92 TB/year. At 0.09/GB = 263/year.


    Additional hidden costs of centralized approach:

    - Cloud storage for 36.5 TB of images: ~840/year (at 0.023/GB/month for S3).

    - Compute for cloud training on 365M images/year: significant GPU cost.

    - Privacy/compliance risk: raw customer images leaving devices.


    Federated trade-off: Higher on-device compute (each camera must train locally), which costs ~0.5W
    extra power per device during the 30-minute nightly training window. At 0.12/kWh: 1,000 × 0.5W × 0.5h
    × 365 × 0.12/1000 = $11/year — negligible compared to the bandwidth savings.'
  options:
  - 'Centralized: ~100 MB, Federated: ~8 MB. Centralized is more expensive but only by about 12.5x.'
  - 'Centralized: ~100 GB, Federated: ~16 GB. Centralized is ~6.25x more expensive.'
  - 'Centralized: ~100 GB, Federated: ~8 GB. Centralized is ~12.5x more expensive.'
  - 'Centralized: ~100 GB, Federated: ~4 GB. Centralized is ~25x more expensive.'
