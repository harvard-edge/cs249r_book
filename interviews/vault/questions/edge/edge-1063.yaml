title: 'Kernel Fusion: Realize Fusion Gain Analysis for Transformer on Jetson Orin'
scenario: Realize the fusion impact for a 6-layer BERT-tiny (4.4M params) inference on Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W). Sequence length 128, batch size 4.
question: For 6-layer BERT-tiny at batch 4 and sequence 128 on Jetson Orin, how do unfused and fused kernels differ in bandwidth needs and speedup?
details:
  realistic_solution: 'BERT-tiny with batch=4, seq=128: check arithmetic intensity of each op type to determine if fusion actually helps. Small model means activation tensors are tiny → kernel launch overhead dominates over bandwidth savings.'
  common_mistake: |
    **The Pitfall:** Not accounting for the relatively small model size and batch dimension.
    **The Rationale:** Applying large-model intuition (where memory bandwidth always dominates) to a tiny model that easily fits in cache.
    **The Consequence:** Overestimating the bandwidth savings of fusion while ignoring the massive relative impact of kernel launch overhead on tiny layers.
  napkin_math: |
    *   **Elementwise tensors:** 4(batch) × 128(seq) × 128(dim) = 65KB.
    *   **Unfused memory traffic:** 6 passes × 65KB × 2 (read+write) = 780KB per layer × 6 layers = 4.68MB. Transfer at 68 GB/s takes 0.07ms.
    *   **Fused memory traffic:** 2 passes × 65KB × 6 layers = 780KB. Transfer takes 0.011ms. (Bandwidth savings: ~0.06ms).
    *   **Unfused Kernel Launch:** 6 layers × 20 kernels = 120 launches × 5µs = 0.60ms.
    *   **Fused Kernel Launch:** 6 layers × 4 kernels = 24 launches × 5µs = 0.12ms. (Launch savings: 0.48ms).
    *   **Total latency:** Compute (0.96ms) + Launch + BW.
    *   **Result:** Fusing saves 0.48ms of launch overhead vs 0.06ms of BW. Priority is reducing kernel count. Expected speedup is **~29%**.
