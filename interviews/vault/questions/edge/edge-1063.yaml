title: 'Kernel Fusion: Realize Fusion Gain Analysis for Transformer on Jetson Orin'
scenario: Realize the fusion impact for a 6-layer BERT-tiny (4.4M params) inference
  on Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W). Sequence length 128, batch size
  4. Compute unfused vs fused memory bandwidth requirements and expected speedup.
question: For 6-layer BERT-tiny at batch 4 and sequence 128 on Jetson Orin, how do
  unfused and fused kernels differ in bandwidth needs and speedup?
details:
  realistic_solution: 'BERT-tiny with batch=4, seq=128: check arithmetic intensity
    of each op type to determine if fusion actually helps. Small model means activation
    tensors are tiny → kernel launch overhead dominates over bandwidth savings.'
  common_mistake: Not accounting for the relatively small model size — at 4.4M params,
    the model easily fits in LPDDR5, and arithmetic intensity at batch=4 may push
    some ops into compute-bound territory.
  napkin_math: 'BERT-tiny: 4.4M params × 1B INT8 = 4.4MB model. Batch=4, seq=128,
    hidden=128, 2 attention heads. Attention GEMM: Q,K,V = 4×128×128 → 4×128×128.
    FLOPs: 2×4×128×128×128 = 16.8M. Bytes: weights 128×128×1B = 16KB, input 4×128×128×1B
    = 65KB. AI = 16.8M / 81KB = 207 OPS/B >> 4.04. Compute-bound! Fusion doesn''t
    help for attention GEMMs. Elementwise ops (LayerNorm, GELU, residual): 4×128×128
    = 65K elements × 1B = 65KB tensors. Unfused: 6 elementwise passes = 6 × 65KB ×
    2 (read+write) = 780KB per layer × 6 layers = 4.68MB. At 68 GB/s: 0.07ms. Fused:
    2 × 65KB × 6 = 780KB → 0.011ms. Savings: 0.06ms. Kernel launch: 6 layers × 20
    kernels = 120 × 5µs = 0.6ms. Fused to 6 × 4 = 24 kernels: 0.12ms. Savings: 0.48ms.
    Total latency: compute 4.4M × 6 FLOPs / 275 TOPS = 96µs + overhead. Dominant overhead:
    kernel launch (0.6ms) >> bandwidth (0.07ms). Priority: reduce kernel count via
    fusion. Expected improvement: 0.48ms / (0.96ms compute + 0.6ms launch + 0.07ms
    BW) = 29% speedup.'
