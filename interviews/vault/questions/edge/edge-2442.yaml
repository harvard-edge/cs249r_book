title: Evaluate Accelerator Mismatch for Autoregressive LLMs
scenario: An edge server features 4 Hailo-8 chips (26 TOPS INT8 each) connected via
  PCIe Gen3. A team proposes running a 7B LLM quantized to INT8 on this hardware.
question: Create an end-to-end evaluation of this deployment architecture and identify
  the fundamental hardware mismatch preventing real-time text generation.
details:
  realistic_solution: While 4 Hailo-8 chips offer >100 TOPS, autoregressive LLM generation
    is fundamentally memory-bandwidth bound, not compute-bound. The 7GB of INT8 weights
    must stream through the ALUs for every single generated token. Routing this massive
    matrix across a slow host PCIe Gen3 bus destroys throughput. Hailo-8 is optimized
    for streaming visual data pipelining, entirely the wrong architecture for massive
    weight-fetching autoregression.
  common_mistake: Focusing solely on whether 7B parameters physically fit in system
    RAM, ignoring the catastrophic memory bandwidth bottleneck of the PCIe interconnect.
  napkin_math: 7GB weights * 15 tokens/s = 105 GB/s required > ~4 GB/s PCIe Gen3.
