title: Evaluate Accelerator Mismatch for Autoregressive LLMs
scenario: An edge server features 4 Hailo-8 chips (26 TOPS INT8 each) connected via PCIe Gen3. A team proposes running a 7B LLM quantized to INT8 on this hardware.
question: Create an end-to-end evaluation of this deployment architecture and identify the fundamental hardware mismatch preventing real-time text generation.
details:
  realistic_solution: While 4 Hailo-8 chips offer >100 TOPS, autoregressive LLM generation is fundamentally memory-bandwidth bound, not compute-bound. The 7GB of INT8 weights must stream through the ALUs for every single generated token. Routing this massive matrix across a slow host PCIe Gen3 bus destroys throughput. Hailo-8 is optimized for streaming visual data pipelining, entirely the wrong architecture for massive weight-fetching autoregression.
  common_mistake: |
    **The Pitfall:** Focusing solely on whether 7B parameters physically fit in system RAM or the total TOPS capacity.
    **The Rationale:** Candidates assume that because 4 Hailo-8s provide >100 TOPS, they can handle the compute, completely ignoring the massive weight-fetching requirement of autoregressive LLMs.
    **The Consequence:** Deploying an architecture that is fundamentally bottlenecked by PCIe bandwidth, resulting in <1 token/sec generation speeds.
  napkin_math: |
    *   7B parameters in INT8 = 7 GB of weights.
    *   For a target generation speed of 15 tokens/sec, the entire weight matrix must stream across the PCIe bus 15 times per second.
    *   Required bandwidth: 7 GB * 15 tokens/sec = 105 GB/s.
    *   PCIe Gen3 x4 (typical for edge accelerators) bandwidth is ~4 GB/s.
    *   **The 105 GB/s requirement catastrophically exceeds the ~4 GB/s PCIe Gen3 bus capacity.**
