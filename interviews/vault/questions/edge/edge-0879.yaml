title: Drone Calibration Domain Shift
scenario: Delivery drones use a 300M parameter CNN for depth estimation, running at 18ms latency on a strict 20ms NPU budget. The INT8 PTQ model was calibrated using 5,000 high-res urban images. When deployed in rural, low-contrast, and foggy areas, collision rates spike by 5x. Telemetry shows severe activation clipping.
question: Why does the urban-calibrated INT8 depth model fail in foggy rural areas, and how would you fix it within the 20ms NPU budget?
details:
  realistic_solution: 'The root cause is severe PTQ calibration domain shift. Urban environments have wide min/max activation ranges. In foggy environments, activation ranges are much narrower. The urban static scale/zero-point parameters cause the narrow rural activations to collapse into just 2-3 INT8 bins, destroying gradient perception. The fix is a Multi-Profile Static Quantization system: offline, calibrate distinct INT8 profiles (Urban, Fog, Night). At runtime, use a lightweight pre-processing router that computes image variance and dynamically swaps the NPU''s scale and zero-point registers to the matching calibration profile, maintaining the speed of static INT8.'
  common_mistake: |
    **The Pitfall:** Switching entirely to dynamic quantization to handle the varied environments.
    **The Rationale:** Dynamic quantization computes scale and zero-points on the fly, which seems ideal for unpredictable domain shifts.
    **The Consequence:** This adds severe runtime overhead and pushes the overall execution time well past the 20ms safety budget, causing frame drops and potential drone crashes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Latency Budget: 20ms.
       - Current INT8 static latency: 18ms.
       - Dynamic INT8 overhead: ~6ms.
       - CPU image variance overhead: ~0.5ms. Register swap: <0.1ms.
    2. **Calculations:**
       - Dynamic Quantization Latency: 18ms + 6ms = 24ms (Fails 20ms budget).
       - Multi-Profile Latency: 18ms + 0.5ms + 0.1ms = 18.6ms (Passes 20ms budget).
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound (Static vs Dynamic)**. The multi-profile routing approach successfully stays under the 20ms hard deadline while restoring accuracy via environment-aware scaling parameters.
