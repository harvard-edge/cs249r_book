title: The Headlight Saturation Failure
scenario: 'You are the tech lead for the perception team at an autonomous vehicle company. Your team has
  developed a new traffic light detection model that achieves 99.8% precision in FP16 on a Jetson AGX
  Orin. To meet the strict 33ms per-frame deadline, you use Post-Training Static Quantization (PTQ) to
  convert the model to INT8. The calibration dataset consists of 10,000 images representative of daytime
  driving conditions. The INT8 model easily meets the performance target, running in just 22ms. However,
  during night-time fleet testing, you encounter a critical failure: the model completely fails to detect
  traffic lights whenever another car''s headlights are in the field of view. The system doesn''t just
  show lower accuracy; it reports zero detections in these scenarios. Critique the team''s quantization
  approach. Why did this performance optimization lead to a catastrophic, non-linear failure instead of
  a graceful degradation in accuracy? Justify your diagnosis.'
details:
  realistic_solution: The root cause is a **calibration range mismatch leading to activation saturation**.
    Static quantization determines the mapping from FP16 to INT8 by observing the min/max range of activations
    on a calibration dataset. By using only daytime images, the process established a relatively narrow
    dynamic range. At night, headlight bloom and bright traffic signals produce activation values far
    outside this calibrated range. These values are 'clipped' or 'saturated' to the maximum INT8 value
    (e.g., 127). Consequently, the model can no longer distinguish between a traffic light, a street lamp,
    and a headlight, as they all map to the same saturated value in the affected feature maps. This isn't
    a graceful degradation; it's a complete erasure of critical information for all subsequent layers.
    The correct approach is to re-calibrate using a dataset that represents the full operational design
    domain (ODD), including night, rain, and glare. A more advanced solution would involve analyzing activation
    histograms layer-by-layer and potentially using mixed-precision, keeping outlier-sensitive layers
    in FP16 while quantizing the rest.
  common_mistake: The most common incorrect answer is to blame the training data (e.g., 'The model wasn't
    trained on enough night images'). While related, the model itself might generalize perfectly well
    in FP16. The true fault lies with the *calibration dataset* for the quantization process, which failed
    to capture the full dynamic range of the activations seen in production. Another common mistake is
    to immediately suggest Quantization-Aware Training (QAT) without diagnosing the root cause; QAT would
    likely suffer the same failure if its training data also lacked these high-dynamic-range night scenes.
  napkin_math: 'FP16 takes 2 bytes, INT8 takes 1. Time halves: 100MB / 204.8 GB/s = 0.48ms vs 0.24ms.
    However, daytime calibration sets range to [-2.0, 2.0]. Traffic lights at night generate an activation
    of 10.0. 10.0 gets clipped to the INT8 max, which represents 2.0. Error = (10 - 2) / 10 = 80%, destroying
    precision.'
