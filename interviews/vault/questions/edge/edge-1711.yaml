title: Hailo-8 Host Streaming Bottleneck
scenario: You are deploying a vision pipeline on an edge gateway equipped with a Hailo-8 accelerator. Your system must process 1080p video at 60fps using a 30 GOPs object detection model. The Hailo-8 is a dataflow accelerator providing 26 TOPS INT8, but crucially, it has no local DRAM and relies on continuous data streaming from host memory. Profiling traces show your end-to-end latency is 50ms per frame (20fps), with the host CPU at 100% utilization while the Hailo-8 is idle 70% of the time.
question: How would you diagnose and fix the host-side bottleneck keeping the 1080p60 Hailo-8 pipeline at 20 FPS?
details:
  realistic_solution: Use a profiler (e.g., perf or HailoRT trace tools) to analyze the host CPU bottlenecks. The trace will show the CPU is spending excessive time converting raw video frames into normalized float arrays. The fix is to allocate contiguous zero-copy DMA buffers for the raw video frames and move the image normalization/resize operations directly into the Hailo-8 compiler's dataflow graph, allowing the host to stream raw UINT8 pixels straight to the accelerator without CPU intervention.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is PCIe bandwidth or accelerator compute.
    **The Rationale:** Candidates often default to suggesting model quantization or pruning, ignoring the host CPU utilization metrics.
    **The Consequence:** They fail to realize that without local DRAM, host CPU latency from preprocessing (like image resizing or FP32 float conversions) will starve the dataflow accelerator, leaving the pipeline bottlenecked.
  napkin_math: |
    1. Compute demand per frame: 30 GOPs = 0.03 TOPS.
    2. Compute at 60 fps: 0.03 * 60 = 1.8 TOPS (~7% of Hailo-8's 26 TOPS).
    3. Raw UINT8 1080p input payload: 1920 * 1080 * 3 bytes = 6.22 MB.
    4. Streaming requirement: 6.22 MB * 60 fps = 373 MB/s (easily handled by PCIe Gen3 x4).
    5. FP32 normalized payload: 6.22 MB * 4 bytes/float = 24.88 MB.
    6. CPU FP32 normalization time: ~40ms (dominates the 50ms latency).
    7. Fusing normalization drops CPU time, bringing latency below the **16.6ms threshold**.
