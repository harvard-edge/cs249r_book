title: Hardware Video Decoder Offloading in Edge ML Pipelines
scenario: A smart traffic camera on a Jetson AGX Orin ingests multiple RTSP video
  streams and processes them with an INT8 YOLOv8 model.
question: Summarize the role of the NVDEC hardware decoder in the data ingestion pipeline
  before the tensor cores execute the model.
details:
  realistic_solution: NVDEC is a dedicated hardware block that offloads the decompression
    of the incoming H.264/H.265 video stream from the CPU. It writes raw YUV frames
    directly into device memory so the GPU can perform resizing and inference without
    host intervention.
  common_mistake: Confusing the NVDEC video hardware decoder with the GPU's CUDA cores
    or Tensor cores used for the actual neural network inference.
  napkin_math: Decoding 4x 1080p30 H.264 streams requires ~0% CPU utilization when
    fully offloaded to NVDEC.
