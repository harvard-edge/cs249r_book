title: Micro-Batch Pipeline Scheduling on Jetson Orin for Video Analytics
scenario: 'A Jetson Orin processes 4K video streams for anomaly detection. Each frame
  requires a detection model (15ms GPU) and a classification model (5ms GPU). The
  team runs them sequentially: 20ms/frame = 50fps max. They propose pipelining detection
  on frame N while classifying frame N-1. Analyze the throughput and latency impact.'
question: If detection takes 15ms and classification 5ms per frame, what throughput
  and latency result from pipelining them on Jetson Orin?
details:
  realistic_solution: 'Sequential: latency = 20ms, throughput = 50fps. Pipelined:
    detection and classification overlap. If both run on GPU, they can''t overlap
    directly without CUDA streams. With CUDA streams and engine separation: detection
    in stream 1, classification in stream 2. If no resource contention: throughput
    limited by max(15ms, 5ms) = 15ms = 67fps. Latency: 15ms (det) + 5ms (class) =
    20ms per frame still, but a new frame starts every 15ms. With compute overlap
    on Jetson Orin''s DLA + GPU: detect on GPU (15ms), classify on DLA (5ms). True
    overlap: throughput limited by GPU at 67fps, DLA runs in parallel. End-to-end
    latency: 20ms. Net gain: 33% throughput increase.'
  common_mistake: Assuming pipelining doubles throughput; it does increase throughput
    but increases end-to-end latency for a single frame by one stage.
  napkin_math: 'Sequential: 20ms/frame = 50fps. GPU pipeline (streams): bottleneck
    = 15ms detection → 67fps. DLA+GPU parallel: GPU does detection (15ms), DLA does
    classification (5ms) concurrently → one frame every 15ms = 67fps. Latency stays
    20ms, throughput improves 33%.'
