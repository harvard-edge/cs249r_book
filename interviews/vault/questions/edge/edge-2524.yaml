title: Edge PagedAttention Block Tuning
scenario: You are tuning PagedAttention on a Jetson Orin with a strict LPDDR5 bandwidth
  cap. The edge inference batch size is strictly fixed to 2. Total KV size is 1 MB
  per token.
question: Design a block size strategy to balance fragmentation waste against memory
  pointer fetch latency.
details:
  realistic_solution: With a tiny batch size of 2, a server-sized block (e.g., 256)
    wastes up to 255 MB per request due to fragmentation. Conversely, a block size
    of 1 requires thousands of non-contiguous pointer fetches per step, creating memory
    latency bubbles. Create a block size of 16 or 32 that aligns perfectly with the
    64-byte LPDDR5 cache line size to ensure single-burst pointer fetches while limiting
    waste.
  common_mistake: Blindly importing server-optimized block sizes (e.g., 256), leading
    to immediate OOM from internal fragmentation on edge workloads with low batch
    sizes.
  napkin_math: Waste for block 32 = (32-1) * 2 seqs * 1MB = 62MB overhead (acceptable).
    Fetch latency bounded by cache line alignment.
