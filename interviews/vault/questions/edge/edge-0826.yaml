title: Debugging EWC Memory Overheads on MCU
scenario: You are deploying a wake-word model on a Cortex-M4 microcontroller with 256KB SRAM. The model
  has 25K FP32 parameters (100KB footprint). To add a new wake word via on-device learning without forgetting
  the original, the team enables Elastic Weight Consolidation (EWC). However, the on-device fine-tuning
  process immediately crashes with an Out-Of-Memory (OOM) error, even though standard fine-tuning (without
  EWC) fits tightly within the 256KB SRAM. Diagnose the root cause of this OOM failure during the EWC
  update.
question: "Why does enabling EWC make fine-tuning the 25K-parameter wake-word model OOM on 256 KB SRAM, and how would you fix it?"
details:
  realistic_solution: EWC requires storing the previous task's optimal weights and the diagonal of the
    Fisher Information Matrix to compute the regularization penalty. For a 25K parameter model, this adds
    a rigid memory overhead. To fix the OOM, the team should either offload the EWC penalty computation
    to a cloud backend (flashing only the finalized weights), or use an Online EWC variant that maintains
    a single decaying running average of the Fisher matrix and optimal parameters.
  common_mistake: Assuming EWC only modifies the loss function computation mathematically, without realizing
    it requires persisting auxiliary matrices (Fisher Information and previous weights) in the device's
    working memory.
  napkin_math: 'Standard fine-tuning footprint: Weights (100KB) + Gradients (100KB) + Activations/Overhead
    (~40KB) = 240KB (fits in 256KB SRAM). EWC overhead adds: Old Task Weights (100KB) + Fisher Diagonal
    (100KB). Total EWC footprint = 440KB, which exceeds the 256KB SRAM limit by 184KB, causing the OOM
    crash.'
