title: The Hardware SKU Qualification Matrix
scenario: 'Your company is selecting edge hardware for a new smart city deployment of 10,000 traffic monitoring
  nodes. You''re evaluating three candidates: NVIDIA Jetson Orin NX (100 TOPS INT8, $399, 15W), Hailo-8
  on RPi CM4 ($189, 26 TOPS, 2.5W), and Ambarella CV25 ($85, 5 TOPS INT8, 1.2W). Your model needs 4 TOPS
  sustained throughput at 30 FPS. The procurement team says ''just buy the cheapest one that meets the
  TOPS requirement.'' Why is this wrong?'
question: "Why is this wrong?"
details:
  realistic_solution: 'Procurement''s ''cheapest that meets TOPS'' approach fails because peak TOPS is
    unreliable. The CV25 claims 5 TOPS but achieves ~3 TOPS sustained on real models (60% utilization
    is typical) — disqualified. Hardware qualification requires seven dimensions: (1) sustained TOPS under
    thermal constraints, (2) operator coverage for your model, (3) power efficiency (TOPS/W), (4) operating
    temperature range (outdoor traffic cameras face -20C to 60C), (5) software ecosystem maturity, (6)
    supply chain reliability for 10K units, (7) 5-year TCO. The Hailo-8 + RPi at $202.14 5-year TCO per
    device wins over the Orin NX at $477.84 per device, saving $2.76M across the fleet.'
  common_mistake: '"The CV25 has 5 TOPS and we need 4 TOPS, so it meets the requirement." Peak TOPS is
    a marketing number, not a deployment guarantee.'
  napkin_math: '5-year TCO per device: Orin NX: $399 + (15W / 1000 × 8760h × $0.12/kWh × 5) = $399 + $78.84
    = $477.84. Hailo-8 + RPi: $189 + (2.5W / 1000 × 8760h × $0.12/kWh × 5) = $189 + $13.14 = $202.14.
    CV25: $85 + $6.31 = $91.31 — but fails the sustained throughput test, so it''s disqualified. Fleet
    5-year TCO: Orin = $4.78M, Hailo = $2.02M. Hailo saves **$2.76M** over 5 years if it passes all other
    qualification gates.'
