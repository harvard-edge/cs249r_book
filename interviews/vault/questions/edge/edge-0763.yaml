title: The Hardware SKU Qualification Matrix
scenario: Your company is selecting edge hardware for a new smart city deployment of 10,000 traffic monitoring nodes. You're evaluating three candidates: NVIDIA Jetson Orin NX (100 TOPS INT8, $399, 15W), Hailo-8 on RPi CM4 ($189, 26 TOPS, 2.5W), and Ambarella CV25 ($85, 5 TOPS INT8, 1.2W). Your model needs 4 TOPS sustained throughput at 30 FPS. The procurement team says 'just buy the cheapest one that meets the TOPS requirement.'
question: Why is this wrong?
details:
  realistic_solution: |
    Procurement's 'cheapest that meets TOPS' approach fails because peak TOPS is unreliable. The CV25 claims 5 TOPS but achieves ~3 TOPS sustained on real models (60% utilization is typical) — disqualified. Hardware qualification requires multiple dimensions: sustained TOPS, operator coverage, power efficiency, operating temperature, and 5-year TCO. The Hailo-8 + RPi wins over the Orin NX on 5-year TCO per device, saving $2.76M across the fleet.
  common_mistake: |
    **The Pitfall:** Selecting the Ambarella CV25 because 5 TOPS > 4 TOPS.
    **The Rationale:** Procurement relies strictly on spec sheet peak numbers rather than real-world sustained performance.
    **The Consequence:** The deployed hardware fails to maintain 30 FPS under continuous load, causing system failure despite looking correct on paper.
  napkin_math: |
    - **Energy cost:** 8760 hours/yr * 5 years * $0.12/kWh = $5.256 per Watt.
    - **Orin NX TCO:** $399 + (15W * $5.256) = $477.84.
    - **Hailo-8 TCO:** $189 + (2.5W * $5.256) = $202.14.
    - **Ambarella CV25 TCO:** Disqualified due to peak vs sustained TOPS.
    - **Fleet TCO (10k units):** Orin = $4.78M, Hailo = $2.02M.
    - **Total Savings:** $4.78M - $2.02M = **$2.76M** saved with Hailo-8.
