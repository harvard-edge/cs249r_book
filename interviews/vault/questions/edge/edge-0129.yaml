title: The Unified Memory Contention
scenario: 'You deploy a computer vision model that requires 8 GB of memory for weights and activations on a Jetson AGX Orin, which has 32 GB of total LPDDR5 DRAM. During operation, the device must also run a separate, high-priority process that streams and records 4K video. You notice that your model''s inference latency becomes unstable and sometimes the entire system lags.'
question: "What fundamental hardware constraint is causing the unstable latency and system lag?"
details:
  realistic_solution: 'The Jetson AGX Orin, like most edge SoCs, uses a unified memory architecture. The 32 GB of LPDDR5 DRAM is a single pool of memory shared by the CPU (running the OS, video stream process) and the integrated GPU (running the model). There is no separate, dedicated GPU memory. The instability arises because the model''s memory accesses are competing for the same DRAM bandwidth with the CPU and the high-throughput video stream, causing contention on the memory bus.'
  common_mistake: |
    **The Pitfall:** Diagnosing the problem as a lack of "VRAM" or GPU memory capacity.
    **The Rationale:** Engineers accustomed to cloud GPUs (like the H100) assume the edge GPU has its own dedicated, high-bandwidth memory (like HBM).
    **The Consequence:** They spend time trying to quantize or prune the 8GB model to fit into some non-existent smaller memory tier, ignoring the real bandwidth bottleneck.
  napkin_math: |
    * A 4K video stream (3840x2160) using a common YUV420 format (1.5 bytes/pixel) at 30 fps requires: 3840 * 2160 * 1.5 * 30 ≈ 373 MB/s.
    * While the Jetson AGX Orin has a peak bandwidth of 204.8 GB/s, this sustained 373 MB/s video stream creates constant, high-priority pressure on the unified memory bus.
    * **The shared LPDDR5 DRAM architecture causes the CPU (video) and GPU (inference) to contend for memory bandwidth, resulting in latency spikes.**
  options:
  - The GPU's dedicated HBM memory is too small for the model.
  - The CPU and GPU are competing for access to the same shared LPDDR5 DRAM.
  - The PCIe bus connecting the CPU and GPU is saturated.
  - The Linux OS is swapping model memory to the NVMe drive.
  correct_index: 1
