title: 'The Unified Memory Contention'
scenario: 'You deploy a computer vision model that requires 8 GB of memory for weights and activations on a Jetson AGX Orin, which has 32 GB of total LPDDR5 DRAM. During operation, the device must also run a separate, high-priority process that streams and records 4K video. You notice that your model''s inference latency becomes unstable and sometimes the entire system lags.'
question: 'What fundamental hardware constraint is causing the unstable latency and system lag?'
details:
  realistic_solution: 'The Jetson AGX Orin uses a unified memory architecture. The 32 GB of LPDDR5 DRAM is a single pool of memory shared by the CPU and the integrated GPU. The instability arises because the model''s memory accesses are competing for the same DRAM bandwidth with the high-throughput video stream, causing contention on the memory bus.'
  common_mistake: 'Diagnosing the problem as a lack of VRAM or GPU memory capacity, incorrectly assuming the edge GPU has dedicated high-bandwidth memory.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Jetson AGX Orin: Unified LPDDR5 memory, 204.8 GB/s peak bandwidth.
    - 4K video stream: 3840x2160, YUV420 (1.5 bytes/pixel), 30 fps.

    **Calculations:**
    - Video bandwidth required: 3840 * 2160 * 1.5 * 30 ≈ 373 MB/s.
    - The continuous 373 MB/s stream creates constant pressure on the shared bus, interrupting memory availability for the GPU.

    **Conclusion & Interpretation:**
    - **Result: 373 MB/s Contention (Memory-Bound)**. The shared LPDDR5 DRAM architecture causes the CPU and GPU to contend for memory bandwidth, resulting in latency spikes.
  options:
  - 'The GPU''s dedicated HBM memory is too small for the model.'
  - 'The CPU and GPU are competing for access to the same shared LPDDR5 DRAM.'
  - 'The PCIe bus connecting the CPU and GPU is saturated.'
  - 'The Linux OS is swapping model memory to the NVMe drive.'
