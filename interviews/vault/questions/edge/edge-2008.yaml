title: MLOps for Edge Deployment with Google Coral Edge TPU
scenario: You are tasked with designing an MLOps pipeline for deploying a real-time object detection model to a fleet of Google Coral Edge TPUs. Each Coral TPU offers 4 TOPS for INT8 operations and consumes 2W of power, exclusively supporting INT8 inference. The base model is trained in FP32 on a cloud GPU.
question: How would you design the MLOps pipeline for FP32-to-INT8 Coral Edge TPU deployments to ensure CI/CD, reproducibility, and training-serving consistency?
details:
  realistic_solution: Implement a robust model registry that versions both FP32 trained models and their corresponding INT8 quantized versions, along with quantization configuration metadata and validation metrics (e.g., INT8 vs. FP32 accuracy delta). The CI/CD pipeline should include automated quantization (e.g., using TensorFlow Lite Converter with post-training quantization or quantization-aware training), followed by comprehensive validation on actual Coral Edge TPUs or highly accurate emulators. Establish performance baselines (latency, throughput, power consumption) for different model versions on Coral devices. For training-serving consistency, monitor inference outputs and key performance indicators (KPIs) from edge devices and compare them against cloud-based FP32 predictions or golden datasets to detect concept drift or accuracy regressions post-quantization. Utilize experiment tracking to log all quantization parameters, model metrics, and hardware-specific performance benchmarks.
  common_mistake: |
    **The Pitfall:** Deploying an FP32 trained model directly after a naive INT8 quantization without edge validation.
    **The Rationale:** Candidates assume standard cloud quantization techniques work perfectly on specialized edge accelerators.
    **The Consequence:** This leads to significant accuracy degradation or unexpected latency spikes due to unsupported operations on the Coral TPU.
  napkin_math: |
    - **TPU Compute:** 4 TOPS (INT8) = 4,000 GOPs.
    - **Model Requirement:** 400 GOPs per inference.
    - **Theoretical Max FPS:** 4,000 GOPs / 400 GOPs = **10 FPS**.
    - **Power Constraint:** 2W power envelope limits thermal dissipation and peak continuous utilization.
