title: MLOps for Edge Deployment with Google Coral Edge TPU
scenario: You are tasked with designing an MLOps pipeline for deploying a real-time object detection model to a fleet of Google Coral Edge TPUs. Each Coral TPU offers 4 TOPS for INT8 operations and consumes 2W of power, exclusively supporting INT8 inference. The base model is trained in FP32 on a cloud GPU.
question: How would you design the MLOps pipeline for FP32-to-INT8 Coral Edge TPU deployments to ensure CI/CD, reproducibility, and training-serving consistency?
details:
  realistic_solution: Design a robust CI/CD graph mandating an automated Quantization-Aware Training (QAT) conversion step targeting the Edge TPU Compiler. Establish twin-registry structures bridging native FP32 instances alongside final INT8 artifacts. Vitally, execute post-compilation test suites strictly against hardware-in-the-loop (HIL) Corals or precision emulators, ensuring exact KPI verification prior to OTA release.
  common_mistake: |
    **The Pitfall:** Triggering blind OTA deployments of naively quantized INT8 artifacts absent hardware verification logic.
    **The Rationale:** Candidates presume basic cloud conversion tools natively secure compatibility with rigid edge-centric silicon compilers.
    **The Consequence:** Unchecked operations shatter on device, prompting immediate latency cascades or massive operational failures from unsupported instructions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Coral Edge TPU (4 TOPS INT8 = 4,000 GOPS).
       - Requirement: 400 GOPS per INT8 model inference.
       - Thermal Limit: 2W continuous power boundary.
    2. **Calculations:**
       - Maximum Frames Per Second = 4,000 GOPS / 400 GOPS = 10 FPS.
    3. **Conclusion & Interpretation:**
       - **Result: Hard Thermal Boundaries**. System profiling must assert throughput does not aggressively exceed 10 FPS to safeguard the rigid 2W operational envelope.
