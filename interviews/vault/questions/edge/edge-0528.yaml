title: The Watchdog Timeout Freeze
scenario: Your autonomous drone uses a Jetson Nano. The flight controller expects a heartbeat signal from your ML perception script over UART every 200ms. If it doesn't get one, it assumes the Jetson crashed and triggers an emergency landing. Your ML inference takes 50ms. However, once a minute, the drone emergency lands. Your inference didn't crash.
question: What OS-level event stalled your script for over 200ms?
details:
  realistic_solution: 'The script was preempted by a Linux kernel page reclaim or I/O write-back event. The Jetson Nano runs standard Linux, which periodically flushes dirty pages to the SD card. When memory pressure triggers the OOM killer''s neighbor — the `kswapd` page reclaim daemon — or when `pdflush`/`writeback` runs, the kernel can stall user-space threads for 300-1500ms while it synchronizes pages to the slow SD card (~25 MB/s). This obliterates the 200ms heartbeat deadline. The fix: use `mlockall()` to pin inference memory, move logging to tmpfs, disable swap, and use a PREEMPT_RT kernel to bound kernel latency.'
  common_mistake: |
    **The Pitfall:** Blaming Jetson thermal throttling.
    **The Rationale:** Candidates know edge devices run hot, but they fail to quantify that thermal throttling only slows execution by 20-30%, not enough to cause a 400% latency spike.
    **The Consequence:** Teams add cooling fans or underclock the GPU, totally failing to solve the actual Linux kernel memory/IO preemption issue crashing the drone.
  napkin_math: |
    1. Calculate safety margin: 200ms deadline - 50ms inference = 150ms buffer.
    2. Identify Linux I/O sync stall: Linux `kswapd` or `writeback` daemon flushes dirty pages to SD card.
    3. Estimate SD card stall: SD card writes run at ~25 MB/s, causing kernel stalls of 300ms to 1,500ms.
    **A 300ms to 1,500ms kernel writeback stall completely obliterates the 150ms safety margin, violating the 200ms heartbeat deadline.**
