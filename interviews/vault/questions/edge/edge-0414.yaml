title: The Real-Time Radar Deadline
scenario: You are deploying a radar signal classifier on an edge device with a Hailo-8 accelerator, which has 26 TOPS (INT8) of performance but only a few dozen MB of on-chip SRAM. Your highly accurate teacher model has 90MB of INT8 weights and takes 180ms per inference, missing the 33ms hard real-time deadline required for the application. Your profiler shows the Hailo-8 is compute-bound for very short bursts, but there are long stalls in between.
question: Given this data, what is the most direct way to meet the 33ms hard real-time deadline?
details:
  realistic_solution: The root cause of the slow performance is memory thrashing. The 90MB model is far too large to fit into the Hailo-8's SRAM. The device must constantly swap layers or tiles of the model back and forth from the host CPU's main memory over a relatively slow bus (e.g., PCIe), and these data movement stalls dominate the latency. The accelerator's massive compute power is wasted while it waits for data. The most direct solution is to use knowledge distillation to train a much smaller 'student' model (e.g., <16MB) that fits entirely in the Hailo-8's SRAM. This eliminates host-device swapping, allowing the inference to run in a single, compute-bound pass.
  common_mistake: |
    **The Pitfall:** Focusing only on the accelerator's peak TOPS and the model's operation count (G-MACs).
    **The Rationale:** Engineers incorrectly conclude the model has too many operations instead of realizing it doesn't fit in SRAM.
    **The Consequence:** Wasting effort on unstructured pruning or overclocking when the bottleneck is pure memory thrashing.
  napkin_math: |
    * Teacher model size: 90MB
    * Effective host-to-device bandwidth: 1 GB/s
    * Data transfer stall: 90MB / 1 GB/s = 90ms
    * **The 90ms memory stall alone violates the 33ms deadline. Distilling to a <16MB student model eliminates this penalty.**
  options:
  - The model has too many G-MACs. Use aggressive unstructured pruning to reduce the operation count by at least 80%.
  - The accelerator's clock speed is insufficient. Overclock the Hailo-8 to increase its TOPS and meet the compute demand.
  - The model's weight matrix is too large for the on-chip SRAM, causing stalls from memory swapping. Use knowledge distillation to create a smaller student model that fits in SRAM.
  - The host CPU is bottlenecking the pipeline. Rewrite the data pre-processing code in C++ instead of Python to feed the accelerator faster.
  correct_index: 2
