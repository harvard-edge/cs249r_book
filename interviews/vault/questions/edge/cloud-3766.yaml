title: Demand Paging for Edge Model Deployment
scenario: 'You deploy a 3B parameter model (6 GB in FP16) on a Jetson Orin with 32
  GB unified memory (shared between CPU and GPU). The device runs 3 concurrent inference
  services. Using traditional loading, each service loads its own copy: 3 × 6 GB =
  18 GB, leaving only 14 GB for activations, KV cache, and OS. How does mmap with
  unified memory solve this, and what are the latency implications?'
question: How does mmap with unified memory solve this, and what are the latency implications?
details:
  realistic_solution: 'By using mmap, the OS maps the model file directly into the shared virtual memory space. Instead of each of the 3 services loading its own 6 GB copy into RAM (which would consume 18 GB), mmap allows all 3 services to share a single physical 6 GB copy in memory. This saves 12 GB of RAM. The latency implication is the cold-start page fault overhead: memory is demand-paged, so the first inference will stall as the OS fetches pages from storage, causing a ~5.9 second latency spike.'
  common_mistake: Assuming mmap eliminates all memory pressure. The OS still needs
    to manage page tables and can evict pages under memory pressure, causing latency
    spikes from re-faulting.
  napkin_math: 'Page fault overhead: 6GB model / 128KB page size = 49,152 page faults.
    Each fault takes 120μs. Total = 49,152 × 120μs = 5,898,240μs = 5.9 seconds (not
    ~2 seconds — 2 seconds would require 16,667 faults or 40μs per fault).'
