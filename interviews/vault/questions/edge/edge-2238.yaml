title: 'PEFT Memory Budgets on Jetson Orin for On-Device Fine-tuning'
scenario: 'An edge robotics system needs to continuously fine-tune a 1B parameter model on-device using LoRA as new task demonstrations are collected.'
question: 'What memory budget and training throughput should you expect for on-device LoRA fine-tuning of a 1B model on Jetson Orin?'
details:
  realistic_solution: '1B model BF16: 2 GB. LoRA rank-8 adapters: 2x8x2048x24x2B = 3.1 MB. Adam states: 6.2 MB. Activations (batch=1, seq=512): ~0.5 GB. Total: ~2.5 GB out of 64 GB — comfortable. Training throughput: Orin GPU at ~30 TFLOPS FP16. Forward pass 1B model (seq=512, batch=1): 2 x 1B x 512 = ~1 TFLOP. With backward (3x forward): ~3 TFLOP total. Time: 3T / 30T = ~100ms/step. Fine-tuning in background while inference runs: ~3 FPS inference capacity (350ms/inf), leaving 650ms/sec for training = ~5-6 training steps/sec.'
  common_mistake: |
    **The Pitfall:** Treating edge LoRA training like cloud training and assuming unlimited memory.
    **The Rationale:** Candidates forget that the Orin has unified LPDDR5 shared between CPU and GPU, lacking dedicated GPU memory.
    **The Consequence:** Choosing batch sizes or sequence lengths that exhaust the shared memory pool and crash the device.
  napkin_math: |
    **Assumptions & Constraints:**
    - Weights: 1B model in BF16 = 2 GB.
    - LoRA Adapters: Rank-8 (2 $\times$ 8 $\times$ 2048 $\times$ 24) = 786K params $\times$ 2B = 1.6 MB.
    - Optimizer (Adam): FP32 states = 3.2 MB.
    - Activations: (batch=1, seq=512) = 100 MB.

    **Calculations:**
    - Total Memory = 2.1 GB.
    - Compute: Forward+backward is $3 \times 2 \times 1\text{B} \times 512$ FLOPs = ~3 TFLOPS.
    - Throughput: 3 TFLOPS / 30 TFLOPS GPU.

    **Conclusion & Interpretation:**
    - **Result: ~100ms/step (Compute-Bound)**. Background training requires low memory and leaves enough capacity for concurrent inference.
