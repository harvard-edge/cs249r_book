title: KV Cache OOM Analysis on Cloud AI 100
scenario: You are deploying a 7B parameter LLM on a Qualcomm Cloud AI 100 inference accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). The model weights are quantized to INT8 and consume exactly 7 GB of memory. However, when processing an autoregressive generation workload with a batch size of 64 and a sequence length of 2048 tokens, the system crashes with an Out of Memory (OOM) error. The model architecture uses 32 layers, 32 attention heads, and a head dimension of 128. Intermediate activations (the KV cache) are stored in FP16 format to preserve generation quality.
question: Why does the 7B INT8 LLM OOM on the 32 GB Cloud AI 100 at batch 64 and sequence length 2048 despite weights using only 7 GB?
details:
  realistic_solution: The candidate should identify that the OOM is caused by the FP16 KV cache, which scales multiplicatively with batch size, sequence length, and model dimensions. They should calculate the exact KV cache size and demonstrate that the total footprint (weights + activations) exceeds the 32 GB LPDDR4x limit. To resolve this, they would need to lower the batch size (e.g., to 16) or implement KV cache quantization.
  common_mistake: |
    **The Pitfall:** Assuming inference requires minimal activation storage and focusing solely on the 7 GB weight footprint.
    **The Rationale:** Candidates forget that autoregressive generation requires retaining the KV cache across the entire sequence, and that this cache scales linearly with batch size and sequence length.
    **The Consequence:** The deployment crashes with an unexpected OOM error in production under load.
  napkin_math: |
    - KV cache size per token: 2 (K and V) * 32 layers * 32 heads * 128 dimension * 2 bytes (FP16) = 524,288 bytes (0.5 MB).
    - Total KV cache for batch 64 at 2048 tokens: 0.5 MB/token * 2048 tokens * 64 batch = 65,536 MB (64 GB).
    - Total memory required = 7 GB (weights) + 64 GB (KV cache) = 71 GB.
    **Conclusion: The 71 GB requirement drastically exceeds the 32 GB LPDDR4x limit, causing the OOM.**
