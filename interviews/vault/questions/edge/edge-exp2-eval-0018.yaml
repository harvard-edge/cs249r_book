title: Evaluating Host-Device DMA Strategies for High-Resolution Video Inference
scenario: 'You are deploying a multi-stream 4K video analytics pipeline on an on-premise server equipped
  with a Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). You must choose between
  two data movement architectures: Strategy A utilizes asynchronous DMA transfers to move batches of preprocessed
  frames into the 32 GB LPDDR4x device memory before inference begins. Strategy B utilizes zero-copy pinned
  memory, where the accelerator accesses the frames directly from host RAM over the PCIe bus as needed
  during execution. Evaluate these alternatives and determine which architecture maximizes overall system
  throughput.'
details:
  realistic_solution: Strategy A is significantly better for maximizing throughput on this architecture.
    The Qualcomm Cloud AI 100 has an immense compute capacity of 400 TOPS INT8 and 32 GB of local LPDDR4x.
    If Strategy B is used, the massive compute engine will stall waiting for data fetches over the PCIe
    link. By using Strategy A, the host can use asynchronous DMA to pipeline transfers into the large
    32 GB device memory. The accelerator then reads from local LPDDR4x (which offers significantly higher
    bandwidth than PCIe) during inference, achieving much higher utilization of the 400 TOPS compute at
    the 75W power envelope.
  common_mistake: Candidates often reflexively choose Strategy B (zero-copy) believing that eliminating
    a data copy automatically improves performance. They fail to evaluate if the PCIe bus bandwidth can
    keep up with the data starvation rate of a 400 TOPS accelerator processing large 4K tensors.
  napkin_math: A single uncompressed 4K RGB frame is roughly 3840 x 2160 x 3 bytes = 24.8 MB. Over a standard
    PCIe Gen4 x8 link (~16 GB/s effective), transferring one frame takes 24.8 MB / 16,000 MB/s = 1.55
    ms. The Cloud AI 100's 400 TOPS engine can execute many INT8 CV models in under 1 ms per frame. Under
    zero-copy (Strategy B), compute is bound by the 1.55 ms PCIe transfer (max ~645 FPS). With asynchronous
    DMA (Strategy A), prefetching hides the PCIe transfer time, and the accelerator reads from LPDDR4x
    (e.g., ~136 GB/s), reducing memory load time to ~0.18 ms and unlocking the full compute-bound throughput.
