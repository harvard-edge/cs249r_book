title: Die-to-Die Bandwidth Adequacy for Edge Vision Pipeline
scenario: 'An edge vision chiplet has an ISP die and an AI inference die connected via a 50 GB/s die-to-die link. The pipeline processes 4K60 video: 3840x2160x60fps x 3 bytes/pixel (RGB).'
question: Is the 50 GB/s die-to-die link the bottleneck for this 4K60 vision pipeline?
details:
  realistic_solution: 'Raw 4K60 RGB: 3840x2160x60x3 = 1.49 GB/s. ISP output after processing: YUV420 = 3840x2160x60x1.5 = 746 MB/s. AI inference die receives feature maps, not full images. If ISP outputs a 4x downsampled feature map (960x540) for AI: 960x540x60x3 = 93 MB/s. At 50 GB/s die-to-die bandwidth, even raw 4K RGB at 1.49 GB/s uses only 3% of link capacity. Die-to-die is not the bottleneck — the bottleneck is the AI inference die''s throughput for the number of objects/frame and the ISP''s pipeline latency.'
  common_mistake: |
    **The Pitfall:** Calculating bandwidth purely on raw RGB pixels.
    **The Rationale:** Candidates assume the full, uncompressed, raw RGB image is transferred across the die-to-die link to the AI inference die.
    **The Consequence:** Incorrectly concluding the link is a bottleneck, failing to realize that ISPs output compressed feature maps or YUV formats.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4K60 video: 3840x2160x60fps.
       - Die-to-die link: 50 GB/s.
    2. **Calculations:**
       - 4K60 raw RGB: 3840 * 2160 * 60 * 3 bytes ≈ 1.49 GB/s.
       - Raw RGB Link Utilization: 1.49 GB/s / 50 GB/s = 2.98%.
       - YUV420 Output (more realistic): 1.49 GB/s * 0.5 = 0.75 GB/s.
       - YUV420 Link Utilization: 0.75 GB/s / 50 GB/s = 1.5%.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound AI.** The 50 GB/s link is over-provisioned by ~33x even for raw RGB; the bottleneck lies in the AI die's throughput or the ISP's latency.
