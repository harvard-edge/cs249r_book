title: Die-to-Die Bandwidth Adequacy for Edge Vision Pipeline
scenario: 'An edge vision chiplet has an ISP die and an AI inference die connected
  via a 50 GB/s die-to-die link. The pipeline processes 4K60 video: 3840x2160x60fps
  x 3 bytes/pixel (RGB). Is the die-to-die link the bottleneck?'
question: Is the die-to-die link the bottleneck?
details:
  realistic_solution: 'Raw 4K60 RGB: 3840x2160x60x3 = 1.49 GB/s. ISP output after
    processing: YUV420 = 3840x2160x60x1.5 = 746 MB/s. AI inference die receives feature
    maps, not full images. If ISP outputs a 4x downsampled feature map (960x540) for
    AI: 960x540x60x3 = 93 MB/s. At 50 GB/s die-to-die bandwidth, even raw 4K RGB at
    1.49 GB/s uses only 3% of link capacity. Die-to-die is not the bottleneck — the
    bottleneck is the AI inference die''s throughput for the number of objects/frame
    and the ISP''s pipeline latency.'
  common_mistake: Calculating only raw pixel bandwidth without accounting for compression
    or format conversion. Edge vision pipelines rarely pass raw pixels between dies
    — the ISP die typically outputs YUV420 at 8-bit or compressed feature maps, not
    full-resolution RGB.
  napkin_math: '4K60 raw RGB: 3.84K * 2.16K * 60 * 3B = 1,492,992,000 B/s ≈ 1.49 GB/s.
    Die-to-die link utilization: 1.49 / 50 = 2.98%. YUV420: 1.49 * 0.5 = 0.75 GB/s
    → 1.5% utilization. Link is massively underutilized; 50 GB/s link is over-provisioned
    for this workload by ~33x.'
