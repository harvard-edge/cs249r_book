title: Multi-Camera Batch Serving
scenario: Deploying a multi-camera traffic monitoring system where a single Hailo-8
  processes frames from 4 different streams at 30 FPS each. Per-frame model latency
  is 8 ms at batch=1 and 22 ms at batch=4 (the chip is more compute-efficient per
  frame at batch=4 but per-frame latency rises).
question: Identify the serving technique that combines independent frames into a single
  batch, and quantify the latency-vs-throughput trade-off - which batch size meets
  the 33 ms (30 FPS) per-stream SLA AND maximizes Hailo-8 throughput?
details:
  realistic_solution: 'Spatial/dynamic batching. Trade-off: batch=1 gives 4 sequential
    inferences * 8 ms = 32 ms per round (just inside 33 ms SLA, throughput = 125 FPS).
    Batch=4 gives 22 ms per round (well under SLA, throughput = 4/22 ms = 182 FPS).
    Batch=4 wins on both latency AND throughput here. The throughput gain (1.45x)
    shows that the chip''s vector units saturate at batch=1 inefficiency - it scales
    sub-linearly with batch size but still outperforms loop-of-1 below SLA.'
  common_mistake: Defaulting to batch=1 because 8 ms latency looks "faster," missing
    that the per-stream SLA is satisfied by both batch=1 and batch=4, and batch=4
    delivers more total FPS within the same 33 ms window.
  napkin_math: 'Batch=1: 4*8 = 32 ms / round, 125 FPS. Batch=4: 22 ms / round, 182
    FPS. Both meet 33 ms SLA; batch=4 wins.'
