title: Multi-Camera Batch Serving
scenario: Deploying a multi-camera traffic monitoring system where a single Hailo-8
  processes frames from 4 different streams.
question: Identify the serving technique used to combine independent frames from different
  cameras into a single, efficient inference pass.
details:
  realistic_solution: The technique is spatial or dynamic batching, which concatenates
    independent frames into a single larger batch tensor to fully saturate the accelerator's
    parallel compute units.
  common_mistake: Confusing spatial batching with temporal multiplexing or multithreading.
  napkin_math: Batch size 4 increases throughput over 4 loops of size 1.
