title: Real-time Object Detection Latency Optimization on NVIDIA Jetson Orin
scenario: Your team has deployed a critical real-time object detection model on an
  NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W) for an autonomous driving
  application. The model is expected to achieve a consistent end-to-end inference
  latency of under 50ms. However, production monitoring shows sporadic latency spikes,
  occasionally exceeding 100ms, leading to missed detections. The system processes
  a 1080p video stream at 30 FPS. Describe your systematic approach to diagnose and
  quantify the bottleneck(s) responsible for these latency spikes.
question: How would you diagnose and quantify the bottlenecks causing Jetson Orin
  1080p/30 FPS latency spikes above 100 ms?
details:
  realistic_solution: 'The solution involves a multi-pronged profiling strategy. First,
    use NVIDIA Nsight Systems to get a system-wide trace, covering GPU kernel execution,
    CPU activity, memory transfers (especially between LPDDR5 and the GPU), and I/O
    operations. This will provide a timeline view, helping to identify major stalls
    or sequential bottlenecks. Analyze the trace for periods of GPU idleness, unexpected
    CPU spikes, or prolonged memory copy operations. If Nsight Systems points to GPU-specific
    kernel issues, use Nsight Compute for detailed GPU kernel profiling to identify
    uncoalesced memory access, low occupancy, or inefficient instruction mix. If CPU
    pre/post-processing or I/O is suspected, leverage Linux tools like `perf` for
    CPU hot-spot analysis and `strace` for system call tracing. Flame graphs generated
    from `perf` data can visually represent call stack hot spots. The iterative process
    would be: profile -> identify bottleneck -> hypothesize fix -> implement fix ->
    re-profile -> quantify improvement.'
  common_mistake: A common mistake is to immediately assume the GPU inference is the
    bottleneck without systematically profiling the entire pipeline. This often leads
    to optimizing components that are not the true bottleneck, such as aggressively
    quantizing an already efficient model, or focusing solely on model inference time
    while ignoring data transfer, pre-processing, or post-processing overheads on
    the CPU or I/O. Another mistake is using generic profiling tools not optimized
    for NVIDIA hardware, leading to incomplete or misleading data.
  napkin_math: 'Given the Jetson Orin''s 275 TOPS (INT8), a 10 TOPs model can theoretically
    run at 27.5 FPS (275/10) if purely compute-bound. If the observed FPS is significantly
    lower (e.g., 15 FPS), there''s a major non-compute bottleneck. The 32GB LPDDR5
    has a peak bandwidth (e.g., ~68 GB/s for some Orin models). If the model requires
    200MB of weights/activations per inference and is loaded multiple times, memory
    bandwidth can be estimated: (200 MB * N loads) / (68 GB/s) = memory transfer time.
    For a 1080p frame (approx 6MB raw data), 30 FPS implies 180MB/s input, which is
    well within LPDDR5 capability. If a detected bottleneck is a 10ms memory copy
    occurring for each of the 30 frames/second, that accounts for 300ms/s of total
    processing, severely impacting throughput. Quantify the fix by measuring the percentage
    reduction in the bottleneck''s duration and the resulting end-to-end latency improvement.'
