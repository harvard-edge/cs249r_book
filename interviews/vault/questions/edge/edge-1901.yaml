title: Real-time Object Detection Latency Optimization on NVIDIA Jetson Orin
scenario: Your team has deployed a critical real-time object detection model on an NVIDIA Jetson Orin (32 GB LPDDR5, 275 TOPS INT8, 60W) for an autonomous driving application. The model is expected to achieve a consistent end-to-end inference latency of under 50ms. However, production monitoring shows sporadic latency spikes, occasionally exceeding 100ms, leading to missed detections. The system processes a 1080p video stream at 30 FPS.
question: How would you diagnose and quantify the bottlenecks causing Jetson Orin 1080p/30 FPS latency spikes above 100 ms?
details:
  realistic_solution: 'The solution involves a multi-pronged profiling strategy. First, use NVIDIA Nsight Systems to get a system-wide trace, covering GPU kernel execution, CPU activity, memory transfers (especially between LPDDR5 and the GPU), and I/O operations. This will provide a timeline view, helping to identify major stalls or sequential bottlenecks. Analyze the trace for periods of GPU idleness, unexpected CPU spikes, or prolonged memory copy operations. If Nsight Systems points to GPU-specific kernel issues, use Nsight Compute for detailed GPU kernel profiling to identify uncoalesced memory access, low occupancy, or inefficient instruction mix. If CPU pre/post-processing or I/O is suspected, leverage Linux tools like `perf` for CPU hot-spot analysis and `strace` for system call tracing. Flame graphs generated from `perf` data can visually represent call stack hot spots. The iterative process would be: profile -> identify bottleneck -> hypothesize fix -> implement fix -> re-profile -> quantify improvement.'
  common_mistake: |
    **The Pitfall:** Immediately assuming the GPU inference is the bottleneck.
    **The Rationale:** Candidates skip system-wide profiling and focus solely on model inference time, ignoring data transfer, pre-processing, or post-processing overheads on the CPU or I/O.
    **The Consequence:** Aggressively quantizing an already efficient model, degrading accuracy without actually solving the sporadic 100ms latency spikes.
  napkin_math: |
    *   1080p frame (approx 6MB raw data). 30 FPS implies 180MB/s input, well within LPDDR5 capability (~68 GB/s).
    *   If a detected bottleneck is a 10ms memory copy occurring sequentially for each of the 30 frames/second.
    *   This accounts for 300ms/s of total processing, severely impacting throughput.
    *   **Using Nsight Systems to trace these non-compute I/O or pre-processing stalls is necessary to isolate the 100ms latency spikes.**
