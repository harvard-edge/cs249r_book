title: Evaluating Guardrail Deployment on NVIDIA Jetson Orin Edge Devices
scenario: We are deploying a vision-language model (VLM) for autonomous industrial inspection on an NVIDIA Jetson Orin edge device. To ensure safety and compliance, we must deploy a moderation guardrail model alongside the primary VLM to filter out hallucinations and unsafe commands. We have two alternatives: (A) A small dense transformer running on the Ampere GPU alongside the VLM, or (B) an INT8 quantized CNN-based guardrail targeting the Deep Learning Accelerator (DLA).
question: Which guardrail architecture is better suited for this deployment, considering strict latency constraints and the Orin's 60W TDP limit?
details:
  realistic_solution: Alternative B is superior for this edge deployment. By leveraging the DLA for the INT8 quantized guardrail, we physically isolate the safety-critical moderation workload from the primary VLM running on the Ampere GPU. This prevents resource starvation, ensures predictable latency for the safety check, and efficiently utilizes the Orin's architecture while staying safely below the 60W TDP limit.
  common_mistake: |
    **The Pitfall:** Defaulting to the highest accuracy transformer guardrail (Alternative A).
    **The Rationale:** Candidates prioritize model accuracy without considering resource contention on the shared Ampere GPU.
    **The Consequence:** The system exceeds its thermal budget, throttles, and fails to meet latency constraints.
  napkin_math: |
    - **Primary VLM:** 20 GB RAM, 40W GPU.
    - **Alternative A (GPU Guardrail):** 8 GB RAM, 25W GPU.
    - **Total System Draw (A):** 40W + 25W = **65W** (Exceeds 60W TDP limit, causes thermal throttling).
    - **Alternative B (DLA Guardrail):** 2 GB RAM, 10W DLA.
    - **Total System Draw (B):** 40W + 10W = **50W** (Safely under 60W limit).
