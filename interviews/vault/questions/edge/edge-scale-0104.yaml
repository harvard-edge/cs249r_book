title: Edge Canary Rollout Spec
scenario: An edge fleet serves factories with different safety risk. Some sites can tolerate a 5-minute fallback to manual inspection; others must remain fully automated. Specify the rollout policy for a new defect-detection model.
question: What rollout policy fields are required for a safety-sensitive edge defect-detection canary?
details:
  realistic_solution: The policy must include site risk tier, canary fraction by tier, fallback mode, manual override path, latency/error thresholds, rollback trigger, local cache of the old model, and offline behavior if connectivity drops. High-risk sites should canary later or require dual-run comparison before traffic cutover.
  common_mistake: Using a uniform percentage rollout across all sites without accounting for safety criticality and local fallback capability.
  napkin_math: If 20% of sites are high risk, a 5% global canary could accidentally include high-risk sites unless sampling is stratified by risk tier.
