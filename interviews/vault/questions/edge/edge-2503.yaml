title: Heterogeneous LPDDR5x Pipeline
scenario: A Snapdragon 8 Gen 3 pipelines audio processing on the CPU (100µs/frame)
  and transformer decoding on the Hexagon NPU (250µs/frame), syncing via shared LPDDR5x
  with 10µs interrupt barriers.
question: Compute the total processing time for 5 pipelined audio frames.
details:
  realistic_solution: The CPU processes frame 1, triggers an interrupt, and the NPU
    starts while the CPU handles frame 2. Total time equals the first CPU stage, plus
    N-1 max pipeline intervals, plus the final NPU stage, plus interrupt barriers.
    Time = 100µs + (4 * 250µs) + 250µs + (5 * 10µs) = 1400µs.
  common_mistake: Assuming zero-copy shared memory implies zero synchronization overhead,
    neglecting the sequential interrupt delays that accumulate per frame.
  napkin_math: 100 + (4 * 250) + 250 + (5 * 10) = 1400 us total pipeline completion
    time.
