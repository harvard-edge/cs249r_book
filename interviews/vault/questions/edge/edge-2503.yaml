title: Heterogeneous LPDDR5x Pipeline
scenario: A Snapdragon 8 Gen 3 pipelines audio processing on the CPU (100µs/frame) and transformer decoding on the Hexagon NPU (250µs/frame), syncing via shared LPDDR5x with 10µs interrupt barriers.
question: Compute the total processing time for 5 pipelined audio frames.
details:
  realistic_solution: The CPU processes frame 1, triggers an interrupt, and the NPU starts while the CPU handles frame 2. Total time equals the first CPU stage, plus N-1 max pipeline intervals, plus the final NPU stage, plus interrupt barriers. Time = 100µs + (4 * 250µs) + 250µs + (5 * 10µs) = 1400µs.
  common_mistake: |
    **The Pitfall:** Assuming zero-copy shared memory implies zero synchronization overhead.
    **The Rationale:** Overlooking the sequential interrupt delays that accumulate per frame when crossing execution domains.
    **The Consequence:** Underestimating end-to-end pipeline latency and failing real-time processing deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Processing 5 pipelined audio frames.
       - CPU time: 100 µs/frame. NPU time: 250 µs/frame.
       - Sync interrupt barrier: 10 µs.
    2. **Calculations:**
       - Initial CPU setup (frame 1) = 100 µs.
       - Middle pipelined NPU steps (frames 1-4) = 4 * 250 µs = 1000 µs.
       - Final NPU stage (frame 5) = 250 µs.
       - Total interrupt delays = 5 * 10 µs = 50 µs.
       - Total Time = 100 + 1000 + 250 + 50 = 1400 µs.
    3. **Conclusion & Interpretation:**
       - **Result: End-to-end latency for 5 frames is 1400 µs.**
