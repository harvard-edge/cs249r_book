title: 'Functional Safety Diagnosis on Jetson Orin: Watchdog Timer Malfunction'
scenario: 'A safety-critical autonomous driving system deployed on an edge device is designed to meet ASIL-D functional safety requirements. During operation, the ML inference pipeline experiences a transient software fault causing it to occasionally hang for several seconds. The system relies on a hardware watchdog timer (WDT) and periodic self-test routines to ensure deterministic execution, but the WDT unexpectedly fails to reset the system despite the hang.'
question: 'How would you diagnose why the ML pipeline hangs for seconds yet the watchdog fails to reset the ASIL-D system?'
details:
  realistic_solution: 'Diagnosis would involve a multi-layered approach: 1. Analyze WDT logs/status registers: Check if the WDT was actually triggered, if its configuration was correct, and if its own health monitoring indicated issues. 2. Inspect OS/Kernel logs: Look for evidence of the ML pipeline''s unresponsiveness and any messages related to WDT interactions. 3. Augment self-test routines: Introduce finer-grained, periodic self-tests within the ML pipeline itself and establish clear safety monitors that report to a higher-level safety supervisor. 4. Hardware-level diagnostics: Utilize internal diagnostic features to pinpoint hardware or driver issues. 5. Deterministic execution analysis: Ensure the ML pipeline''s execution path is truly deterministic. 6. Fault Injection: Systematically inject faults in a testing environment to reproduce the WDT failure and understand its exact trigger conditions.'
  common_mistake: |
    **The Pitfall:** Assuming the watchdog timer is infallible.
    **The Rationale:** Candidates rely entirely on the WDT as a panacea for all software hangs.
    **The Consequence:** Overlooking silent data corruption, misconfiguration of the WDT itself, or the need for layered diagnostic mechanisms.
  napkin_math: |
    **Assumptions & Constraints:**
    - T_WDT_timeout = 200 ms.
    - T_safety_critical = 150 ms.
    - Supervisor polling every 500ms.

    **Calculations:**
    - Identify safety gap: T_WDT_timeout - T_safety_critical = 50 ms.
    - Calculate maximum detection time: 200 ms + 500 ms = 700 ms.

    **Conclusion & Interpretation:**
    - **Result: 700 ms (Latency-Bound)**. Maximum detection time violates safety requirements.
