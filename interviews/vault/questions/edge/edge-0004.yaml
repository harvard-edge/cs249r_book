title: The Production Data Glitch
scenario: Your team has deployed a visual inspection model on an assembly line using a Hailo-8 accelerator.
  The system uses a 1920x1080 monochrome (8-bit) camera running at 200 FPS, connected to the host system
  via USB 3.0. The model's accuracy in production is 20% lower than in the lab, and technicians report
  the live video feed looks 'glitchy' or 'tears' under load. In the lab, images were captured and saved
  to disk for training. In production, the camera streams directly to the host for pre-processing. Your
  colleague suspects the camera interface is the bottleneck. Calculate the data rate produced by the camera
  and explain if it's a plausible cause for the data quality issues.
details:
  realistic_solution: The camera's data rate is approximately 415 MB/s. While the theoretical maximum
    bandwidth of USB 3.0 is 625 MB/s (5 Gbps), its realistic, sustained throughput is often closer to
    350-400 MB/s, especially on a busy system. The calculated data rate is pushing or exceeding this real-world
    limit. This creates a bottleneck where the host system cannot service the USB endpoint quickly enough,
    leading to dropped frames or incomplete data transfers. These data pipeline failures manifest as visual
    glitches and provide corrupted input to the model, causing the training-serving skew and the significant
    drop in accuracy.
  common_mistake: Engineers often compare the calculated data rate to the *theoretical maximum* bandwidth
    of an interface (e.g., 5 Gbps for USB 3.0) and incorrectly conclude there's no issue. They fail to
    account for protocol overhead, host CPU load, and bus contention, which make the *realistic sustained
    throughput* significantly lower. They might also misinterpret the visual artifacts as a graphics driver
    or display issue, rather than a data ingestion failure at the source.
  napkin_math: '1. Frame size: 1920 x 1080 pixels * 1 byte (monochrome) = 2,073,600 bytes (~2.07 MB).
    2. Data rate: 2.07 MB * 200 FPS = 414.7 MB/s. 3. USB 3.0 theoretical max is 5 Gbps (625 MB/s), but
    protocol overhead restricts real-world sustained throughput to ~350-400 MB/s. The 414.7 MB/s stream
    saturates the bus, causing frame drops and accuracy loss.'
  options:
  - ~41.5 MB/s. The data rate is low, so the bottleneck must be elsewhere.
  - ~3.3 Gbps. This is comfortably within the 5 Gbps theoretical limit of USB 3.0, so the interface is
    not the issue.
  - ~415 MB/s. This rate saturates the real-world throughput of a USB 3.0 interface, likely causing dropped
    frames and data corruption.
  - ~2.1 MB/s. The data rate is trivial; the issue is likely the model's processing speed on the Hailo-8.
  correct_index: 2
