title: Memory Controller Contention on Edge SoCs
scenario: Your Jetson Orin runs inference with P50 = 10ms but P99 = 40ms. The Orin has unified LPDDR5
  memory shared between CPU, GPU, and DLA. Profiling shows that CPU data preprocessing (image decode +
  resize) runs concurrently with GPU inference, causing memory controller contention. Quantify the bandwidth
  contention and propose a solution.
question: "How much LPDDR5 bandwidth contention is causing the 40 ms P99 spikes, and how would you restructure preprocessing to reduce them?"
details:
  realistic_solution: 'Orin''s LPDDR5 provides 204.8 GB/s total bandwidth across 256-bit channels. GPU
    inference needs ~80 GB/s for model weight streaming. CPU image decode needs ~15 GB/s. DLA (if active)
    needs ~20 GB/s. Total demand: 115 GB/s = 56% utilization — seems fine. But memory controller arbitration
    adds 20-50% overhead when multiple clients compete, and bank conflicts reduce effective bandwidth.
    Actual available per-client drops to ~120 GB/s shared. Fix: pipeline CPU and GPU temporally — decode
    frame N on CPU while GPU runs inference on frame N-1. This serializes memory access patterns: CPU
    burst (5ms) then GPU burst (10ms), eliminating contention. P99 drops to 13ms. Alternative: use VIC
    (Video Image Compositor) hardware for decode, freeing CPU entirely.'
  common_mistake: Treating CPU and GPU memory accesses as independent. On unified memory SoCs like Orin,
    all compute units share the same memory controllers. Concurrent access from CPU and GPU can halve
    the effective bandwidth available to each.
  napkin_math: 'Orin LPDDR5: 204.8 GB/s total. GPU needs: 80 GB/s. CPU decode: 15 GB/s. Concurrent: arbitration
    overhead = 30%, effective = 143 GB/s shared. GPU gets: 80/95 × 143 = 120 GB/s → 67% of needed → inference
    stretches from 10ms to 10/0.67 = 15ms + variance = 40ms P99. Temporal pipelining: GPU gets full 204.8
    GB/s during its phase → 10ms inference, P99 = 13ms.'
