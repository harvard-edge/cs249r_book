math_issues:
- Total bandwidth needed (95 GB/s) is less than the effective shared bandwidth (143 GB/s), so there is
  no contention throttling.
- 120 GB/s is 150% of the needed 80 GB/s, not 67%. The author inverted the ratio (80/120 instead of 120/80).
