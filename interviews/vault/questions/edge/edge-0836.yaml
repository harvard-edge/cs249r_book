title: On-Device LLM Fine-Tuning Memory Trade-offs
scenario: You are implementing on-device LoRA fine-tuning for a 1.5B parameter language model on an NVIDIA
  Jetson Orin Nano with 8GB of unified memory. The FP16 model weights consume 3GB, and the optimizer states
  take 0.5GB. However, during the forward pass with a sequence length of 2048 and a batch size of 1, intermediate
  activations consume 6GB, leading to an immediate Out-Of-Memory (OOM) error (9.5GB total > 8GB capacity).
  A junior engineer suggests enabling gradient checkpointing to solve the OOM, but warns it might drain
  the device's battery too quickly due to recomputation. Evaluate this proposal against alternatives like
  using eMMC swap space or drastically reducing the sequence length.
details:
  realistic_solution: Enable gradient checkpointing. It drastically reduces activation memory to roughly
    O(sqrt(L)), bringing the 6GB footprint down to ~1.5GB, allowing the training to comfortably fit within
    the 8GB RAM (3GB + 0.5GB + 1.5GB = 5GB). The ~33% increase in compute (and thus energy) is a necessary
    and highly preferred trade-off compared to the extreme latency and hardware degradation of eMMC swapping.
  common_mistake: Rejecting gradient checkpointing strictly due to the compute and energy penalty without
    realizing that edge alternatives like eMMC swapping are orders of magnitude slower and will quickly
    degrade the flash storage, while reducing sequence length degrades model quality.
  napkin_math: 'Standard compute: 1 Forward (F) + 1 Backward (B ≈ 2F) = 3F FLOPs. Memory = 3 (w) + 0.5
    (opt) + 6 (act) = 9.5GB (OOM).

    Checkpointing compute: 2F + B = 4F FLOPs (+33% overhead). Activations ≈ 6GB / 4 ≈ 1.5GB. Total memory
    = 3 + 0.5 + 1.5 = 5.0GB < 8GB capacity.'
