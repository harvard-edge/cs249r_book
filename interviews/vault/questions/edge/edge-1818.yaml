title: Edge TPU Layer Fusion and Operator Scheduling for INT8 Vision Model
scenario: >-
  You are designing an operator scheduling strategy for a real-time object detection model on a Google Coral Edge TPU via a USB interface. The Edge TPU requires all operations to be fully INT8 quantized and has a restricted set of supported operators.
question: How would you schedule and fuse operators on the Coral Edge TPU to keep intermediate tensors in SRAM and avoid USB CPU fallbacks?
details:
  realistic_solution: 'Replace unsupported operators with supported INT8 approximations before scheduling to ensure full graph compilation. The scheduler must prioritize depth-first execution and layer fusion (e.g., Conv2D + BatchNorm + ReLU) to ensure intermediate feature maps stay entirely within the Edge TPU''s SRAM, completely avoiding host-device memory transfers over USB.'
  common_mistake: |
    **The Pitfall:** Relying on host CPU fallback for unsupported operations.
    **The Rationale:** Candidates focus purely on the compute capacity and assume the graph compiler will safely route unsupported math to the CPU without penalty.
    **The Consequence:** This breaks layer fusion, forcing multi-megabyte intermediate tensors to be shuttled back and forth over the sluggish USB interface, crashing throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - USB 3.0 bandwidth: ~625 MB/s.
    - Compute: 4 TOPS INT8 (can handle thousands of FPS for a 2 GOPS model).
    - Operator fallback: Fails to fuse 5 layers, each needing 2MB host-transfer (4MB round-trip).

    **Calculations:**
    - Data movement per inference: 5 layers * 4 MB = 20 MB.
    - USB transfer time: 20 MB / 625 MB/s = 32 ms.
    - Theoretical FPS based on USB limit: 1000 ms / 32 ms ≈ 31 FPS.

    **Conclusion & Interpretation:**
    - **Result: ~31 FPS (I/O-Bound).** Without full layer fusion, multi-megabyte intermediate tensors traverse the slow USB interface, capping throughput at ~31 FPS and completely wasting the 4 TOPS hardware capability.
