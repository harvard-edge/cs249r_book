title: Edge TPU Layer Fusion and Operator Scheduling for INT8 Vision Model
scenario: >-
  You are designing an operator scheduling strategy for a real-time object detection model on a Google Coral Edge TPU (USB form factor). The Edge TPU delivers 4 TOPS of INT8 compute at 2W, but requires all operations to be fully INT8 quantized and has a restricted set of supported operators.
question: How would you schedule and fuse operators on the Coral Edge TPU to keep intermediate tensors in SRAM and avoid USB CPU fallbacks?
details:
  realistic_solution: 'Replace unsupported operators with supported INT8 approximations before scheduling to ensure full graph compilation. The scheduler must prioritize depth-first execution and layer fusion (e.g., Conv2D + BatchNorm + ReLU) to ensure intermediate feature maps stay entirely within the Edge TPU''s SRAM, completely avoiding host-device memory transfers over USB.'
  common_mistake: |
    **The Pitfall:** Relying on host CPU fallback for unsupported operations.
    **The Rationale:** Candidates focus purely on the 4 TOPS compute capacity and assume the graph compiler will safely route unsupported math to the CPU.
    **The Consequence:** This breaks layer fusion, forcing multi-megabyte intermediate tensors to be shuttled back and forth over the sluggish USB interface, crashing throughput.
  napkin_math: |
    1. **Theoretical Compute:** 4 TOPS. For a 2 GOPS INT8 model, max is 2,000 FPS.
    2. **USB Bottleneck:** USB 3.0 provides ~625 MB/s.
    3. **Fallback Penalty:** If scheduling fails to fuse 5 layers, and each layer requires a 2MB transfer to CPU and back (4MB total), we move `5 * 4 MB = 20 MB` per inference.
    4. **Transfer Time:** `20 MB / 625 MB/s = 32 ms`.
    5. **Result:** This data movement caps the system at **~31 FPS**, completely wasting the 4 TOPS hardware. Proper fusion keeps this 20MB on-chip.
