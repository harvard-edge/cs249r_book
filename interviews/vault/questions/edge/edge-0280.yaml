title: The INT8 Energy Dividend (edge-0280)
scenario: You're working on the perception stack for a new autonomous vehicle, which uses a powerful edge
  accelerator like the NVIDIA Jetson AGX Orin. To stay within the strict 30W thermal design power (TDP),
  your team is quantizing the primary detection model from 32-bit floating point (FP32) to 8-bit integer
  (INT8). From first principles, what is the approximate energy reduction for a single arithmetic operation
  when you move from FP32 to INT8?
details:
  realistic_solution: The energy consumed by an FP32 operation is approximately **18×** higher than for
    an INT8 operation. This is a fundamental physical invariant. The energy of a digital multiplier scales
    roughly with the square of the bit-width, so reducing precision yields a much larger dividend in power
    savings than just the linear reduction in bits would suggest. This is why INT8 is critical for power-constrained
    edge AI systems.
  common_mistake: Engineers often incorrectly assume the energy savings are linear with the bit-width
    reduction (i.e., 32 bits / 8 bits = 4x). The actual physical relationship is super-linear because
    the switching energy in multiplier circuits scales more aggressively than the bit-width itself. Another
    common mistake is to confuse energy savings with memory savings, the latter of which *is* a direct
    4x reduction.
  napkin_math: If running a model in FP32 for one hour cost \$18 in electricity, running the same model
    in INT8 would cost only \$1. In an AV running multiple models 24/7, this difference is the key to
    feasibility.
  options:
  - ~4×
  - ~300×
  - ~18×
  - ~2×
  correct_index: 2
