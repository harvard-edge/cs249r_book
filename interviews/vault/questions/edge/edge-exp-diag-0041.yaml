title: Diagnosing Low Utilization on Jetson Orin DLA
scenario: You are deploying an INT8 quantized CNN on an NVIDIA Jetson Orin edge device to maximize its
  275 TOPS INT8 capability within a 60W TDP. While profiling the model, you notice that the Ampere GPU
  performs well, but the dedicated Deep Learning Accelerator (DLA) shows drastically low utilization (<
  20%) on several pointwise (1x1) convolution layers despite having plenty of bandwidth from the 32 GB
  LPDDR5. The layers are clearly compute-bound rather than memory-bound. Based on the architecture of
  a systolic array accelerator like the DLA, what is the root cause of this poor utilization?
details:
  realistic_solution: The root cause is a dimension mismatch with the DLA's fixed-size systolic array,
    which forces severe zero-padding. The DLA uses a rigid hardware tile size (often optimized for weight-stationary
    dataflow) to achieve its high TOPS efficiency. If the 1x1 convolution's input or output channel dimensions
    do not align with this hardware tile size, the array must map the computation to a fraction of the
    MAC units while the rest sit idle. The solution is to either pad the channel dimensions to multiples
    of the DLA's native tile size or restructure the model to avoid narrow channel widths that starve
    the array.
  common_mistake: Candidates often immediately diagnose a memory bandwidth bottleneck, assuming the 32
    GB LPDDR5 cannot feed the MACs fast enough for 1x1 convolutions. They fail to analyze how the specific
    mathematical dimensions of the convolution interact with the fixed physical dimensions of a systolic
    array and its dataflow.
  napkin_math: Assuming the Jetson Orin's DLA targets a significant portion of the 275 TOPS INT8 peak
    by using a 32x32 systolic array (capable of 1024 MACs per cycle). If a layer has 16 input channels
    and 16 output channels, it only maps to a 16x16 spatial block of MACs (256 active MACs). Utilization
    = 256 / 1024 = 25%. Even with 32 GB LPDDR5 providing abundant bandwidth, the localized DLA compute
    efficiency drops by 75% due to spatial under-mapping.
