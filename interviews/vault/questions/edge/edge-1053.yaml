title: 'Fault Tolerance: Recall — What is MTBF and Why Does It Matter for Edge ML?'
scenario: 'You are deploying a Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) that runs an online learning system.'
question: What is MTBF, how should it determine checkpoint frequency for online learning, and what is the optimal checkpoint interval formula?
details:
  realistic_solution: 'MTBF = Mean Time Between Failures = expected time between hardware or software failures. For optimal checkpoint frequency, you minimize expected wasted work: checkpoint_interval/2 + checkpoint_write_time. Optimal interval = sqrt(2 × t_write × MTBF).'
  common_mistake: |
    **The Pitfall:** Confusing MTBF with expected component lifetime.
    **The Rationale:** Candidates assume failures only happen at the end of a device's life rather than modeling stochastic software crashes.
    **The Consequence:** They fail to implement adequate checkpointing, resulting in catastrophic loss of online learning progress during transient power or software crashes.
  napkin_math: |
    *   **Software MTBF:** Dominant failure mode is software/OOM, estimated at 500 hours (1.8e6 s).
    *   **Write Time:** LoRA checkpoint write time is ~0.5ms.
    *   **Optimal Interval:** sqrt(2 × 0.5e-3 × 1.8e6) = sqrt(1800) = 42 seconds.
    *   **Result:** **Even though 42 seconds sounds frequent, it requires only 47.6 KB/s of NVMe throughput, proving high-frequency checkpointing is optimal for unreliable edge environments.**
