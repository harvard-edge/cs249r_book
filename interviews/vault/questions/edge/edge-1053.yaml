title: 'Fault Tolerance: Recall — What is MTBF and Why Does It Matter for Edge ML?'
scenario: In the context of Jetson Orin (32GB LPDDR5, 275 TOPS INT8, 60W) deployments,
  define MTBF, explain how it determines checkpoint frequency for an online learning
  system, and state the formula for optimal checkpoint interval.
question: What is MTBF, how should it determine checkpoint frequency for online learning,
  and what is the optimal checkpoint interval formula?
details:
  realistic_solution: 'MTBF = Mean Time Between Failures = expected time between hardware
    or software failures. For optimal checkpoint: minimize expected wasted work =
    checkpoint_interval/2 + checkpoint_write_time. Optimal interval = sqrt(2 × t_write
    × MTBF).'
  common_mistake: Confusing MTBF with expected lifetime; not knowing the formula for
    optimal checkpoint interval.
  napkin_math: 'Jetson Orin MTBF (hardware): ~50,000 hours. Software MTBF (crashes,
    OOM): estimate 500 hours in production. Dominant MTBF = 500 hours. LoRA checkpoint
    write time: 2MB / 4 GB/s = 0.5ms. Optimal interval = sqrt(2 × 0.5ms × 500 hours)
    = sqrt(2 × 0.5e-3 × 1.8e6 s) = sqrt(1800) = 42 seconds. Seems very frequent —
    42 second checkpoint every 42 seconds writes 2MB, bandwidth 2MB/42s = 47.6 KB/s
    of NVMe throughput = 0.0012% NVMe capacity. Practical: round to 1 minute or match
    with training epoch boundaries. Key insight: when MTBF is large relative to write
    time, optimal interval is large; when MTBF is small (unreliable environment),
    checkpoint more frequently.'
