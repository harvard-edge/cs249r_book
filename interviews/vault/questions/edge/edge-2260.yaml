title: LoRA Fine-Tuning for Domain Shift on Jetson Orin Without GPU
scenario: An edge device (Jetson Orin NX 16GB) needs to fine-tune a 3B model with LoRA on domain-specific data collected locally, but the Orin NX does not have a discrete GPU (uses unified LPDDR5 memory). The default PyTorch CUDA training fails.
question: How do you configure and run LoRA training on a Jetson Orin NX without a discrete GPU?
details:
  realistic_solution: 'Jetson Orin LoRA training approach: (1) Use Jetson''s CUDA-on-ARM support: Jetson Orin NX uses JetPack 6 which includes CUDA 12.x for ARM. Standard PyTorch CUDA should work — the error may be a driver version mismatch or missing environment variables (set CUDA_HOME, LD_LIBRARY_PATH). (2) Memory constraints: 16GB unified memory split between CPU and GPU. Default PyTorch CUDA reserves ~2GB for CUDA context. For a 3B INT4 model (1.5GB) + LoRA (2MB) + activations: ~3GB total. Fits. (3) Batch size: use batch=1, gradient accumulation=8 to simulate larger batches. (4) CPU fallback: if CUDA fails, use PyTorch CPU training. 3B INT4 LoRA on Cortex-X2 CPU: ~hours per epoch on small dataset (1K examples). Acceptable for offline fine-tuning. (5) DLI/TensorRT-LLM: NVIDIA''s Jetson-optimized inference stack supports LoRA adapter loading but not training. Use PyTorch for training, export to TensorRT for inference.'
  common_mistake: |
    **The Pitfall:** Attempting to use CUDA-based PyTorch training as if it were a discrete data center GPU.
    **The Rationale:** Candidates forget that Jetson's GPU shares LPDDR5 with the CPU and lacks features like ECC or NCCL backends.
    **The Consequence:** PyTorch CUDA kernels fail to compile or throw out-of-memory/driver errors when relying on default server-class settings.
  napkin_math: |
    1. Jetson Orin NX GPU peak FP16 performance: ~40 TOPS.
    2. LoRA training FLOPs per step for a 3B model = 6 * 3B params * 512 seq_len = 9.2 TFLOPs.
    3. Compute time per step = 9.2T / 40T = 0.23s.
    4. Memory bandwidth time (1.5GB weights / 68 GB/s) = 22ms.
    5. Training is compute-bound at **0.23s per step**.
    6. 1K steps takes **~4 minutes per epoch**, highly practical for offline edge fine-tuning.
