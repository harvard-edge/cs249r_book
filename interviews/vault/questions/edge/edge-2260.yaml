title: LoRA Fine-Tuning for Domain Shift on Jetson Orin Without GPU
scenario: An edge device (Jetson Orin NX 16GB) needs to fine-tune a 3B model with
  LoRA on domain-specific data collected locally, but the Orin NX does not have a
  discrete GPU (uses unified LPDDR5 memory). The default PyTorch CUDA training fails.
  How do you run LoRA training on this device?
question: How do you run LoRA training on this device?
details:
  realistic_solution: 'Jetson Orin LoRA training approach: (1) Use Jetson''s CUDA-on-ARM
    support: Jetson Orin NX uses JetPack 6 which includes CUDA 12.x for ARM. Standard
    PyTorch CUDA should work — the error may be a driver version mismatch or missing
    environment variables (set CUDA_HOME, LD_LIBRARY_PATH). (2) Memory constraints:
    16GB unified memory split between CPU and GPU. Default PyTorch CUDA reserves ~2GB
    for CUDA context. For a 3B INT4 model (1.5GB) + LoRA (2MB) + activations: ~3GB
    total. Fits. (3) Batch size: use batch=1, gradient accumulation=8 to simulate
    larger batches. (4) CPU fallback: if CUDA fails, use PyTorch CPU training. 3B
    INT4 LoRA on Cortex-X2 CPU: ~2-5 minutes per epoch on small dataset (1K examples).
    Acceptable for offline fine-tuning. (5) DLI/TensorRT-LLM: NVIDIA''s Jetson-optimized
    inference stack supports LoRA adapter loading but not training. Use PyTorch for
    training, export to TensorRT for inference.'
  common_mistake: Attempting to use CUDA-based PyTorch training on Jetson's integrated
    GPU as if it were a discrete GPU. Jetson Orin's GPU shares LPDDR5 with the CPU
    — it lacks GDDR/HBM — and has no ECC, so CUDA kernel settings optimized for data
    center GPUs (e.g., NCCL backends, FP16 tensor cores) may fail or produce incorrect
    results.
  napkin_math: 'Jetson Orin NX GPU: 1024 CUDA cores, 16 Tensor Cores at FP16. Peak
    FP16 performance: ~40 TOPS. LoRA training on 3B model, r=4: per training step
    FLOP = 2 * 3B * 6 = 36B FLOP (forward + backward approx). At 40 TOPS: 36B/40T
    = 0.9ms per step. Per epoch at 1K examples, batch=1: 1K steps * 0.9ms = 0.9 seconds
    per epoch. Very fast! But memory bandwidth: 3B INT4 = 1.5GB loaded per forward
    pass. LPDDR5 at 68 GB/s: 1.5/68 = 22ms per pass. Memory-bound: 22ms per step,
    not 0.9ms. 1K steps: 22 seconds per epoch. Still practical for overnight fine-tuning.'
