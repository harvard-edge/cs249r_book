title: Hailo-8 Memory-Mapped Weight Loading Strategies for Shared Inference
scenario: Consider deploying an edge AI application on a Hailo-8 accelerator, which offers 26 TOPS for INT8 inference and operates within a 2.5W power envelope. Your application involves multiple independent inference processes that need to access the same large neural network model weights.
question: How should mmap be used so multiple Hailo-8 inference processes share model weights and avoid cold-start latency?
details:
  realistic_solution: A robust solution involves using `mmap` with the `MAP_SHARED` flag to map the model weights file into the virtual address space of all processes. To mitigate cold start, `mlock` or `madvise(MADV_WILLNEED)` should be called immediately after `mmap` during application initialization. This forces the operating system to pre-fetch the entire model (or critical parts) into physical memory, ensuring that when the Hailo-8 starts processing, the weights are already resident and accessible at memory speed, leveraging the shared memory for efficient multi-process access.
  common_mistake: |
    **The Pitfall:** Assuming that `mmap` alone inherently solves cold start latency without considering explicit page-in mechanisms.
    **The Rationale:** Engineers often think `mmap` maps the file into RAM instantly, forgetting it uses lazy loading (demand paging) by default.
    **The Consequence:** The initial memory accesses by the inference processes still incur page faults, delaying the first few inferences and causing unexpected cold-start latency.
  napkin_math: |
    *   **Model size:** 500 MB.
    *   **Flash read speed:** 100 MB/s.
    *   **Load time without pre-faulting:** 500 MB / 100 MB/s = 5 seconds.
    *   **Inference time:** 10ms.
    *   **With `mmap` + `mlock`:** The 5-second overhead is incurred once at startup.
    *   **Conclusion:** Avoids the initial **5-second wait** due to cold-start for multiple processes, significantly improving overall system throughput.
