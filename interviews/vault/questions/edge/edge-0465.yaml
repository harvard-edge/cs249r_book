title: The Fleet-Learning Cost Dilemma
scenario: Your goal is to improve a perception model's recall for rare 'near-miss' events across a 100,000 vehicle fleet. About 10,000 vehicles experience relevant events monthly. Centralized uploading requires 10,000 vehicles to upload 5 clips/month each (~300 MB per clip) with cloud ingress at $0.02/GB and labeling at $5/clip. Federated requires 1,000 vehicles/week to upload a 50 MB model update over cellular ($10/GB) with FL servers costing $50,000/yr.
question: Which proposal is cheaper for improving rare near-miss recall across 100,000 vehicles, centralized clip collection or federated learning?
details:
  realistic_solution: Evaluate total cost of ownership (TCO) across both architectural vectors. While centralized clip ingestion bears artificially low bandwidth pricing, the manual human annotation penalty triggers a monolithic $3M yearly tax. Federated methodologies harness massive data compression and completely obviate human labeling loops, unlocking immense structural economic efficiencies.
  common_mistake: |
    **The Pitfall:** Tunnel vision on network ingress costs, strictly isolating bandwidth rates vs cellular premiums.
    **The Rationale:** Engineers see $0.02/GB cloud vs $10/GB cell limits, instinctively dismissing cellular methodologies as fiscally irrational.
    **The Consequence:** Organizations execute flawed cost architectures, plunging operations into a $3M labeling quagmire.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Centralized: 60 clips/yr * 10k vehicles = 600,k clips. (180,000 GB). $0.02/GB data + $5/label.
       - Federated: 1,000 updates/week * 52 wks = 52,000 updates (2,600 GB). $10/GB cell + $50k servers.
    2. **Calculations:**
       - Centralized Cost = (180,000 GB * $0.02) + (600,000 * $5) = $3,600 + $3,000,000 = $3,003,600.
       - Federated Cost = (2,600 GB * $10) + $50,000 = $26,000 + $50,000 = $76,000.
    3. **Conclusion & Interpretation:**
       - **Result: Federated Leverage**. Federated Learning operates at a ~39x cost reduction ($76k vs $3M), strictly via bypassing human annotations.
  options:
  - Centralized, because the cloud ingress cost of $0.02/GB guarantees a cost fraction 500x cheaper than the cellular reimbursement.
  - Federated Learning, because it fully neutralizes the punishing $3M annual manual labeling penalty mandatory in centralized processing.
  - Centralized, because avoiding the $50,000 annual baseline OPEX for FL servers ensures centralized maintains higher margins.
  - Federated Learning, but the fiscal benefits remain trivial due to the offset between labeling costs and the steep $260k data transfer tax.
