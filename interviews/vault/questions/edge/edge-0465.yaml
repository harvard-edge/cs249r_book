title: The Fleet-Learning Cost Dilemma
scenario: You are an ML Systems Engineer on the autonomous driving team. Your goal is to improve a perception model's recall for rare 'near-miss' events (e.g., hard braking for debris). You have a fleet of 100,000 vehicles, of which about 10,000 experience a relevant near-miss event monthly. Two proposals are on the table. Centralized requires 10,000 vehicles to upload 5 clips/month each (~300 MB per clip) with cloud ingress at $0.02/GB and labeling at $5/clip. Federated requires 1,000 vehicles/week to upload a 50 MB model update over cellular ($10/GB) with FL servers costing $50,000/yr.
question: Which proposal is cheaper for improving rare near-miss recall across 100,000 vehicles, centralized clip collection or federated learning?
details:
  realistic_solution: 'The correct approach is to calculate the full TCO for each option, including all associated costs. The centralized approach has a hidden cost bomb: human data labeling at $5/clip for 600K clips/year is $3M — dwarfing the cheap cloud ingress. The FL approach eliminates labeling entirely by learning directly from on-device behavior, bringing the total to ~$76K/year. The per-GB cellular cost for FL ($10/GB) is 500x higher than cloud ingress ($0.02/GB), but the total data volume is so much smaller (2,600 GB vs 180,000 GB) that FL still wins by 39x.'
  common_mistake: |
    **The Pitfall:** Focusing narrowly on the per-GB data cost.
    **The Rationale:** Engineers see $0.02/GB vs $10/GB and conclude centralized is cheaper.
    **The Consequence:** They ignore the massive cost of human labeling and the immense data reduction offered by federated learning.
  napkin_math: |
    - **Centralized Data:** 10,000 vehicles * 5 clips/mo * 12 mos = 600K clips/yr. 600K * 0.3 GB = 180,000 GB.
    - **Centralized Cost:** (180,000 GB * $0.02) + (600K clips * $5) = $3,600 + $3,000,000 = **~$3.0M/yr**.
    - **Federated Data:** 1,000 vehicles/wk * 52 wks = 52,000 updates/yr. 52,000 * 0.05 GB = 2,600 GB.
    - **Federated Cost:** (2,600 GB * $10) + $50,000 servers = $26,000 + $50,000 = **$76,000/yr**.
    - **Conclusion:** FL is **~39x cheaper** ($76k vs $3M).
  options:
  - Centralized, because the cloud ingress cost of $0.02/GB is 500x cheaper than the cellular reimbursement of $10/GB.
  - Federated Learning, because it avoids the $3M annual cost of manual data labeling required by the centralized approach.
  - Centralized, because the $50,000 annual server cost for FL is a significant operational expense that centralized training avoids.
  - Federated Learning, but its costs are only slightly lower than Centralized training after balancing data and server expenses.
  correct_index: 1
