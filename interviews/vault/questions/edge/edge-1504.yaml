title: Diagnosing Sustained Throughput Drop on Hailo-8
scenario: We are deploying an edge vision system using a host CPU paired with a Hailo-8 accelerator (26 TOPS INT8, 2.5W, no local DRAM). The system is housed in a passively cooled, sealed outdoor enclosure operating at 45°C ambient. Initially, the system easily sustains 60 FPS processing 4 video streams. However, after 15 minutes, throughput unpredictably drops to 20 FPS. Telemetry shows the Hailo-8 die temperature is only 65°C, well below its 85°C thermal limit, yet accelerator utilization plummets.
question: Based on the hardware architecture, what is the root cause of this performance collapse?
details:
  realistic_solution: This architecture is heavily reliant on Host PCIe streaming due to the absence of device memory. At 45°C, the host CPU effectively thermal throttles, aggressively reducing memory controller frequencies. This collapses PCIe bandwidth, starvation-locking the otherwise fully capable Hailo-8 accelerator.
  common_mistake: |
    **The Pitfall:** Assuming the accelerator itself must be the throttled component.
    **The Rationale:** Candidates see an AI performance drop and assume the AI chip is overheating or there is a software memory leak, ignoring the host system.
    **The Consequence:** Missing the system-level thermal interactions unique to DRAM-less dataflow architectures, leading to ineffective cooling solutions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Streams: 4 video streams at 1080p, 15 FPS per stream (60 FPS total).
       - Frame Size: 1920 * 1080 * 3 bytes (RGB) = ~6.22 MB.
       - Host Throttle Condition: Memory/PCIe clocks reduced by ~66% under host thermal load.
       - Unthrottled Host Bandwidth: ~2 GB/s.
    2. **Calculations:**
       - Raw Bandwidth Required = 4 streams * 6.22 MB/frame * 15 FPS = ~373 MB/s.
       - Throttled Host Bandwidth = 2 GB/s * (1 - 0.66) ≈ 680 MB/s theoretical max, but memory latency spikes drop effective payload bandwidth to ~125 MB/s.
       - Achievable FPS with Throttled Bandwidth = 125 MB/s / 6.22 MB/frame ≈ 20 FPS.
    3. **Conclusion & Interpretation:**
       - **Result: 20 FPS (Host-Memory-Bandwidth-Bound)** - Thermal throttling of the host processor's memory controller starves the Hailo-8 of data.
