title: Diagnosing Sustained Throughput Drop on Hailo-8
scenario: We are deploying an edge vision system using a host CPU paired with a Hailo-8 accelerator (26 TOPS INT8, 2.5W, no local DRAM). The system is housed in a passively cooled, sealed outdoor enclosure operating at 45°C ambient. Initially, the system easily sustains 60 FPS processing 4 video streams. However, after 15 minutes, throughput unpredictably drops to 20 FPS. Telemetry shows the Hailo-8 die temperature is only 65°C, well below its 85°C thermal limit, yet accelerator utilization plummets.
question: Based on the hardware architecture, what is the root cause of this performance collapse?
details:
  realistic_solution: The root cause is thermal throttling of the host CPU or memory controller, not the accelerator. Because the Hailo-8 relies 100% on streaming from host memory over PCIe, any degradation in host memory bandwidth directly starves the accelerator. In the sealed enclosure, the host processor hits its thermal limit and underclocks its memory controller. This chokes the host bandwidth, starving the Hailo-8 of input data and causing utilization to plummet despite the accelerator being thermally safe.
  common_mistake: |
    **The Pitfall:** Assuming the accelerator itself must be the throttled component.
    **The Rationale:** Candidates see an AI performance drop and assume the AI chip is overheating or there is a software memory leak, ignoring the host system.
    **The Consequence:** Missing the system-level thermal interactions unique to DRAM-less dataflow architectures, leading to ineffective cooling solutions.
  napkin_math: |
    1. **Bandwidth Required:** 4 streams * 1920 * 1080 * 3 bytes * 15 FPS = ~373 MB/s raw input over PCIe.
    2. **Host Throttling:** When the host CPU hits 95°C, it throttles memory/PCIe clocks by ~66%.
    3. **Available Bandwidth:** Host streaming bandwidth drops from ~2 GB/s to ~125 MB/s.
    **Result: 125 MB/s is roughly one-third of the required 373 MB/s, forcing the 60 FPS throughput to drop down to 20 FPS as the Hailo-8 starves for data.**
