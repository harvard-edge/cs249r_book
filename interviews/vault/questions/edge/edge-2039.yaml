title: Graceful Degradation for Real-time Drone Navigation on Google Coral Edge TPU
scenario: You are tasked with designing a real-time object detection system for an autonomous drone operating in dynamic and unpredictable environments. The core of this system relies on a machine learning model deployed on a Google Coral Edge TPU, which offers 4 TOPS for INT8 quantized models. Environmental factors or sensor noise can lead to increased inference latency or reduced model confidence.
question: How would you design a Coral Edge TPU graceful degradation strategy for drone object detection using fallback models, QoS shedding, and fail-safe modes?
details:
  realistic_solution: "Implement a multi-tier degradation ladder: \n1. **Tier 1 (Full Fidelity)**: The primary, high-accuracy object detection model runs on the Coral Edge TPU, processing all objects.\n2. **Tier 2 (Performance Degradation - Model Fallback & QoS Shedding)**: If latency exceeds a predefined threshold or confidence drops, the system dynamically switches to a lighter, faster INT8-optimized model specifically for the Coral. Concurrently, apply QoS shedding: prioritize detection of critical object classes while potentially ignoring less critical ones.\n3. **Tier 3 (Severe Degradation - Fail-Operational/Fail-Safe)**: If both ML models fail to meet performance targets, the system enters a fail-operational mode. The ML pipeline is bypassed, and a simpler, classical computer vision algorithm running on the drone's CPU takes over for basic collision avoidance."
  common_mistake: |
    **The Pitfall:** Designing a monolithic AI pipeline without considering cascading failures.
    **The Rationale:** Candidates deploy a single, highly accurate model and fail to provide lower-fidelity alternatives or fail-operational CPU fallbacks.
    **The Consequence:** When thermal throttling or complexity spikes occur, the system freezes or crashes, leading to complete mission failure instead of controlled degradation.
  napkin_math: |
    1. Base requirement: 20 FPS (50ms per frame).
    2. Primary INT8 model requires 3.5 TOPS (out of 4 TOPS capacity).
    3. During thermal throttling, inference time pushes to 60ms (drops to ~16.6 FPS).
    4. Fallback model (1.5 TOPS) achieves 25-30ms inference, restoring **33-40 FPS**.
    5. QoS shedding (reducing bounding boxes from 50 to 10) cuts CPU post-processing from 10ms to **2ms**.
