title: 'Edge TCO Analyze: Power Budget Dominates Edge IoT Deployment'
scenario: 'Analyze the TCO breakdown for 10,000 Coral Edge TPU units (4 TOPS, 2W, $25) deployed in smart
  city infrastructure over 5 years. Identify whether hardware, power, or connectivity dominates. Power:
  $0.10/kWh. 4G connectivity: $2/unit/month. Calculate the percentage each cost category contributes to
  total 5-year TCO.'
question: "For 10,000 Coral Edge TPU units over 5 years, what percentage of TCO comes from hardware, power, connectivity, maintenance, and software?"
details:
  realistic_solution: 'Hardware: 10,000 * $25 = $250K. Power: 10,000 * 2W * 8760hr * 5yr * $0.10/kWh =
    $87.6K. Connectivity: 10,000 * $2/month * 12 * 5 = $1.2M. Maintenance (2%): 10,000 * 0.02 * $25 *
    5 = $25K. OTA/software: $50K/yr * 5 = $250K. Total: $250K + $87.6K + $1.2M + $25K + $250K = $1.8125M.
    Percentages: Hardware 13.8%, Power 4.8%, Connectivity 66.2%, Maintenance 1.4%, Software 13.8%. Connectivity
    dominates at 66%! Optimization: switch to LoRaWAN (sends inferences to cloud, not raw video): $0.10/unit/month
    = $60K vs $1.2M. Saves $1.14M.'
  common_mistake: Assuming hardware purchase dominates TCO for IoT devices, when in practice connectivity
    costs (SIM cards, data plans) often exceed hardware cost within 12-18 months.
  napkin_math: 'HW: 10K*$25=$250K (13.8%). Power: 10K*2W*43800hr*$0.10/1000=$87.6K (4.8%). Connectivity:
    10K*$2*60mo=$1200K (66.2%). Maint: $25K (1.4%). Software: $250K (13.8%). Total: $1812.6K. Connectivity=66%.
    Fix: edge inference eliminates sending raw images. Send only inference results (10 bytes vs 1MB/frame).
    LoRaWAN at $0.10/device/month: $60K vs $1200K = $1.14M saved. Total w/ LoRaWAN: $1812.6-$1200+$60=$672.6K.
    Coral TPU enables this: process locally, transmit only results. 63% TCO reduction from connectivity
    optimization.'
