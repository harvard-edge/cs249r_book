title: The Edge Memory Diet (edge-0376)
scenario: Your team is optimizing a perception model for an autonomous vehicle's main computer, which uses a Jetson AGX Orin. The model has 500 million parameters and is currently stored in FP16 precision. To reduce the memory footprint, you plan to quantize it to INT8.
question: How much memory do 500 million weights use in FP16 versus INT8, and how much memory does quantization save?
details:
  realistic_solution: 'Quantizing a model from FP16 (16 bits or 2 bytes per parameter) to INT8 (8 bits or 1 byte per parameter) directly halves the storage requirement. The FP16 version requires 1 GB of memory, while the INT8 version requires just 500 MB.'
  common_mistake: |
    **The Pitfall:** Confusing bits and bytes when calculating memory footprint.
    **The Rationale:** Candidates often calculate memory as (parameters × 16) instead of (parameters × 2) for FP16, or compare savings against an FP32 baseline instead of the specified FP16 baseline.
    **The Consequence:** This leads to an inflated sense of memory savings or completely inaccurate footprint estimations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Parameter Count: 500,000,000
       - Precision: FP16 (2 bytes/param) vs INT8 (1 byte/param)
    2. **Calculations:**
       - FP16 Footprint: 500,000,000 * 2 bytes = 1,000,000,000 bytes (1 GB)
       - INT8 Footprint: 500,000,000 * 1 byte = 500,000,000 bytes (500 MB)
       - Savings: 1 GB - 500 MB = 500 MB
    3. **Conclusion & Interpretation:**
       - **Result: 500 MB Savings.** Proper INT8 quantization perfectly halves the physical FP16 storage footprint, preventing memory capacity overflow on constrained edge chips.
  options:
  - The FP16 model is 2 GB and the INT8 model is 500 MB, a 75% reduction.
  - The FP16 model is 8 GB and the INT8 model is 4 GB, a 50% reduction.
  - The FP16 model requires 1 GB and the INT8 model requires 500 MB, a 50% reduction.
  - There is no change in weight memory; quantization only speeds up computation.
  correct_index: 2
