title: The Edge Memory Diet (edge-0376)
scenario: Your team is optimizing a perception model for an autonomous vehicle's main computer, which
  uses a Jetson AGX Orin. The model has 500 million parameters and is currently stored in FP16 precision.
  To reduce the memory footprint, you plan to quantize it to INT8. Compare the memory required to store
  the model's weights before and after quantization. Calculate the exact memory footprint in megabytes
  or gigabytes for both.
question: "How much memory do 500 million weights use in FP16 versus INT8, and how much memory does quantization save?"
details:
  realistic_solution: Quantizing a model from FP16 (16 bits or 2 bytes per parameter) to INT8 (8 bits
    or 1 byte per parameter) directly halves the storage requirement for the model's weights. For a 500
    million parameter model, the FP16 version requires 1 GB of memory, while the INT8 version requires
    just 500 MB. This is a 50% reduction, freeing up 500 MB of valuable DRAM on the edge device, which
    is critical for running other processes in the AV stack.
  common_mistake: A common mistake is to confuse bits and bytes, for instance calculating memory as (parameters
    × 16) instead of (parameters × 2), leading to an 8x error. Another frequent error is to calculate
    savings relative to a 32-bit float (FP32) baseline instead of the specified 16-bit (FP16) baseline,
    resulting in an inflated sense of memory savings.
  napkin_math: FP16 Memory = 500,000,000 parameters × 2 bytes/parameter = 1,000,000,000 bytes = 1 GB
  options:
  - The FP16 model is 2 GB and the INT8 model is 500 MB, a 75% reduction.
  - The FP16 model is 8 GB and the INT8 model is 4 GB, a 50% reduction.
  - The FP16 model requires 1 GB and the INT8 model requires 500 MB, a 50% reduction.
  - There is no change in weight memory; quantization only speeds up computation.
  correct_index: 2
