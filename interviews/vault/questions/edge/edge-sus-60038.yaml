title: Graph capture stability for streaming inference on Jetson Orin
scenario: You are running a streaming audio classification model on Jetson Orin for always-on keyword
  detection. The model processes 100ms audio chunks with LSTM state. After capturing a CUDA graph for
  the model step, you occasionally get incorrect results (wrong classifications) despite the graph replay
  succeeding without errors.
details:
  realistic_solution: 'Pre-allocate static input and output buffers for the CUDA graph: one fixed tensor
    for audio input, one for hidden state (h, c), one for output logits. Before each replay, copy new
    audio data into the static input buffer and ensure hidden state is explicitly initialized (or carried
    forward from previous step with an explicit copy). Use torch.cuda.graph.replay() with a warmup phase
    that establishes correct initial state. Validate with unit tests that manually set hidden state to
    zeros.'
  common_mistake: Capturing the CUDA graph with a specific LSTM hidden state tensor address, then reusing
    that tensor's memory for different purposes between replays. CUDA graphs capture memory addresses;
    if the hidden state buffer is reused or its content is not correctly initialized before each replay,
    the graph reads stale state from the previous (or random) content.
  napkin_math: 'LSTM hidden state size for keyword detection: hidden=256, layers=2, h+c = 2×2×256×4 bytes
    = 4KB. Input audio: 100ms × 16kHz × 1 channel × 4 bytes = 6.4KB. Total static buffers: ~50KB — negligible.
    The correctness bug is not memory but state initialization. Pre-replay copy cost: 50KB at 200GB/s
    Orin bandwidth = 0.25μs — truly negligible.'
