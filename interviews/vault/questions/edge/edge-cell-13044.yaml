math_issues:
- Incorrect W calculation for M/D/1. Formula used appears to be W=(1/μ)(1 + ρ²/2) which equals 0.01125,
  but the correct M/D/1 Wq term is ρ²/(2μ(1-ρ)). With ρ=0.5 and μ=100, Wq = 0.25/(2*100*0.5) = 0.0025s.
  So W = 0.0125s, not 0.01125s.
