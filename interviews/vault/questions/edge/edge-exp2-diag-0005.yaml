title: Real-Time Video Ingestion Bottleneck on Cloud AI 100
scenario: You are deploying a multi-camera real-time video analytics pipeline on an on-premise server
  equipped with a Qualcomm Cloud AI 100 accelerator. The system ingests 16 parallel 1080p 30FPS RTSP streams,
  decodes them, and runs an INT8 object detection model. While the Cloud AI 100 is rated for 400 TOPS
  INT8 at 75W and should easily handle this, you observe erratic inference latency and accelerator utilization
  is stuck at 15%. What is the root cause of this poor accelerator utilization?
details:
  realistic_solution: The root cause is a host-to-device data ingestion bottleneck. The decoded uncompressed
    frames are overwhelming the host memory bandwidth and PCIe bus during transfer to the accelerator's
    32 GB LPDDR4x memory, starving the 400 TOPS compute units. The solution requires optimizing the ingestion
    pipeline by using pinned (page-locked) memory, batched DMA transfers, or offloading the decoding step
    directly to hardware that shares memory with the AI accelerator.
  common_mistake: Candidates often assume the model is compute-bound or that the accelerator lacks capacity.
    They might incorrectly suggest pruning the model or changing the inference batch size without investigating
    the host-to-device data pipeline.
  napkin_math: 16 streams * 30 FPS = 480 frames/sec. Uncompressed 1080p RGB frame = 1920 * 1080 * 3 bytes
    = 6.22 MB. Total data rate to accelerator = 480 * 6.22 MB = 2.98 GB/s. If the ingestion pipeline uses
    inefficient host-side memory copies before transferring to the 32 GB LPDDR4x memory, it introduces
    severe latency jitter, leaving the 400 TOPS INT8 engine idle 85% of the time.
