title: Multi-Process Memory-Mapped Inference Footprint
scenario: You are deploying a multi-camera computer vision system on an NVIDIA Jetson
  Orin (32 GB LPDDR5, Ampere GPU + DLA). The architecture spawns 4 independent processes
  to handle 4 separate video streams. Each process must load the identical 7-billion
  parameter vision-language model, quantized to INT8, to perform zero-shot anomaly
  detection. The host OS and base application buffers consume a fixed 5 GB of RAM.
  Calculate the total system memory footprint if each process independently loads
  the model weights into its private heap, versus using read-only memory-mapped (mmap)
  weights shared across all processes. Produce the exact gigabyte requirements for
  both approaches to determine if the Jetson Orin will OOM.
question: What are the total memory footprints for four private 7B INT8 model loads
  versus shared read-only mmap weights, and will either OOM?
details:
  realistic_solution: The correct implementation requires explicitly memory-mapping
    the weight file (using `mmap` with `MAP_SHARED` and `PROT_READ`) so that all 4
    worker processes point to the same physical pages in the Jetson Orin's 32 GB LPDDR5
    memory. Because the weights are read-only for inference, this avoids duplication
    and drastically reduces the memory footprint, allowing the system to easily fit
    within the device's hardware constraints.
  common_mistake: Candidates often assume the operating system will automatically
    deduplicate identical file reads across processes, failing to realize that standard
    file loading (e.g., standard POSIX read or Python's default file load) allocates
    private heap memory for each process. They may also miscalculate the INT8 model
    size by confusing bits and bytes.
  napkin_math: '1. Model Size: 7 billion parameters at INT8 (1 byte per parameter)
    = 7 GB.

    2. Independent Loading Footprint: 4 processes * 7 GB/process = 28 GB for weights.
    Total System Memory = 28 GB (weights) + 5 GB (OS) = 33 GB. (33 GB > 32 GB capacity
    -> OOM).

    3. Mmap Loading Footprint: Shared pages = 7 GB total for all processes. Total
    System Memory = 7 GB (weights) + 5 GB (OS) = 12 GB. (12 GB < 32 GB capacity ->
    safe deployment).'
