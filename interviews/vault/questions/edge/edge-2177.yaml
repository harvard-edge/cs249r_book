title: Incomplete Edge Checkpoint Policy
scenario: A roadside perception gateway must recover after power loss in under 30
  seconds. The team says the model is 800 MB and local SSD is available, but they
  omit boot time, model load time, calibration state size, write endurance, update
  frequency, and whether stale state is safe.
question: What information is missing to design checkpoint recovery under 30 seconds,
  and what bound follows from an 800 MB model image?
details:
  realistic_solution: The model image alone sets a lower bound on reload traffic,
    but recovery time also depends on boot, SSD throughput, calibration state, integrity
    checks, and rollback policy. You need to know what state must be persisted and
    whether a stale checkpoint is safe. If SSD reads at 400 MB/s, loading 800 MB takes
    at least 2 seconds, leaving 28 seconds for boot and validation.
  common_mistake: Equating model size with full recovery time and ignoring boot, validation,
    calibration, and write-endurance constraints.
  napkin_math: At 400 MB/s, 800 MB loads in 2 seconds. At 100 MB/s, it loads in 8
    seconds. Both are only part of the 30 second recovery budget.
