title: Power Budgeting for Real-time Edge TPU Deployment
scenario: Your team is tasked with deploying a critical real-time object detection model on a fleet of
  devices powered by the Google Coral Edge TPU. The model requires 200 GOPS (INT8) per inference, and
  the system needs to sustain a minimum of 10 inferences per second (FPS). The Google Coral Edge TPU has
  a peak performance of 4 TOPS INT8 and a typical power budget (TDP) of 2W when active. The model is already
  fully quantized to INT8. Analyze the power implications of this deployment, considering factors beyond
  just peak FLOPS. How would you ensure the system meets its FPS target reliably within its power envelope,
  and what are the trade-offs involved?
question: "How would you ensure a 200 GOPS INT8 model sustains 10 FPS on the 2W Coral Edge TPU, and what power trade-offs would you analyze?"
details:
  realistic_solution: 'A robust solution involves: 1. **Energy-per-inference analysis**: Calculating the
    specific energy consumption per inference for the deployed model on the Edge TPU. 2. **Duty Cycle
    Management**: Optimizing the active/idle cycles of the Edge TPU if the inference load is bursty, leveraging
    low-power states to reduce average power. 3. **Model Efficiency**: Even post-quantization, exploring
    further model architecture optimizations (e.g., pruning, network slimming) to reduce GOPS/inference
    if the power budget is extremely tight. 4. **Thermal Monitoring**: Implementing thermal monitoring
    and appropriate cooling strategies to prevent performance degradation due to throttling. 5. **Understanding
    Edge TPU Power Characteristics**: Recognizing that Edge TPUs often have less granular DVFS control
    compared to general-purpose CPUs/GPUs, and their power consumption might be relatively fixed when
    active.'
  common_mistake: Overlooking the difference between peak theoretical TOPS and real-world sustained performance
    under power constraints. Candidates might assume the Edge TPU can always deliver 4 TOPS continuously
    without considering the 2W power budget, potential thermal throttling, or the actual energy cost per
    operation. Another common mistake is not fully considering the dynamic vs. static components of the
    CMOS power equation or the practical application of energy-per-inference metrics for real-time systems.
  napkin_math: '1. **Required GOPS**: To sustain 10 FPS with 200 GOPS/inference, the system requires 10
    * 200 = 2000 GOPS = 2 TOPS of sustained INT8 performance. 2. **Performance Margin**: The Edge TPU''s
    peak is 4 TOPS, so 2 TOPS is well within its capability. 3. **Energy per Inference**: If the Edge
    TPU draws approximately 2W when actively inferring, then for 10 inferences per second, the energy
    per inference is approximately 2 Watts / 10 inferences/second = 0.2 Joules/inference. This value is
    critical for understanding the power cost of each prediction.'
