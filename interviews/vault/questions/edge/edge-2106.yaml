title: Designing Cross-Device Federated Learning on Google Coral Edge TPUs
scenario: 'Imagine you are designing a cross-device federated learning system for a large network of IoT devices, each equipped with a Google Coral Edge TPU. These devices are performing on-device inference for a privacy-sensitive application (e.g., personalized anomaly detection on sensor data). Your goal is to train a global model using federated averaging without centralizing raw data. The Edge TPU provides 4 TOPS (INT8) and consumes 2W.'
question: How would you design federated averaging on INT8-only Coral Edge TPUs to handle communication limits and non-IID client data?
details:
  realistic_solution: 'A realistic solution would involve: 1. **Model Quantization-Aware Training (QAT):** Design the global model from the outset to be compatible with INT8 operations, using QAT techniques to ensure accuracy post-quantization. 2. **Communication Efficiency:** Implement aggressive sparsification (e.g., Top-K gradient selection) and compression techniques (e.g., Huffman coding, differential updates) for model updates. Employ asynchronous federated averaging to handle device dropout and varying network conditions. 3. **Non-IID Data Handling:** Incorporate personalization techniques such as adding small, locally fine-tuned head models, or use regularization methods like FedProx to mitigate client drift. Implement intelligent client selection strategies. 4. **Hardware Optimization:** Leverage TensorFlow Lite for Microcontrollers (TFLu) and the Coral Edge TPU compiler to maximize performance for INT8 operations. Optimize local training loops to minimize memory footprint and computational cycles to respect the 2W power budget, potentially scheduling training during device charging cycles.'
  common_mistake: |
    **The Pitfall:** Underestimating the severe constraints of the Edge TPU and typical IoT networks.
    **The Rationale:** Candidates propose float32 precision for model updates or assume continuous high-speed communication.
    **The Consequence:** The system fails due to unmanageable uplink traffic, or the Edge TPU fails to perform local backpropagation without heavy CPU fallback.
  napkin_math: |
    *   **Uncompressed Update:** A 2M INT8 parameter model = 2 MB. 100,000 devices = 200 GB uplink traffic per round.
    *   **Sparsification:** 99.5% sparsification reduces each update to 10 KB. Total traffic = 1 GB per round.
    *   **Compute Constraint:** Backprop on a 2M param model for 32 samples requires ~192M ops. While taking only ~0.05ms computationally at 4 TOPS, moving the 2MB model repeatedly across constrained memory buses causes severe power draw.
    *   **Result:** **Aggressive gradient sparsification and intelligent charge-aware scheduling are mandatory to keep the network viable.**
