title: Diagnosing MobileNetV3 CPU Fallback
scenario: Your team deployed a MobileNetV3-Large model to a Google Coral Edge TPU for real-time video
  analytics. The Edge TPU provides 4 TOPS at 2W in INT8 via a USB form factor. During profiling, you observe
  that the inference latency is ~35ms per frame, which is significantly slower than the expected sub-5ms
  latency, and the host CPU utilization spikes to 80% during inference. The model was fully quantized
  to INT8. What architectural features of this specific CNN design are causing this severe performance
  bottleneck on the Coral accelerator?
details:
  realistic_solution: The root cause is the Edge TPU's limited operator support. MobileNetV3 introduces
    Hardswish activations and Squeeze-and-Excitation (SE) blocks, which are often not fully supported
    by the Edge TPU compiler in INT8. This forces the compiler to partition the graph, offloading the
    unsupported operations to the host CPU. The frequent context switching and data transfer across the
    USB/PCIe bus dominate the latency. The architectural solution is to replace Hardswish with ReLU6 and
    adapt or remove the SE blocks (reverting closer to MobileNetV2's inverted residuals) to ensure 100%
    of the graph compiles to the Edge TPU.
  common_mistake: Candidates often blame INT8 quantization accuracy loss or general USB bandwidth limits
    for poor performance. They might incorrectly assume that any 'mobile-friendly' architecture utilizing
    depthwise separable convolutions will automatically run efficiently on all edge accelerators without
    considering specific operator support.
  napkin_math: Assume the model requires 0.5 GOPS. On the 4 TOPS INT8 Edge TPU, pure compute time is (0.5
    * 10^9) / (4 * 10^12) = 0.125 ms. If unsupported Hardswish/SE layers partition the graph into 10 CPU
    subgraphs, we incur 20 memory transfers over the USB bus. At ~1.5 ms per transfer, communication overhead
    is 20 * 1.5 ms = 30 ms. Total latency is 0.125 ms (TPU compute) + ~5 ms (CPU compute) + 30 ms (bus
    transfer) = 35.125 ms, severely missing the target latency and negating the 2W power efficiency of
    the accelerator due to CPU usage.
