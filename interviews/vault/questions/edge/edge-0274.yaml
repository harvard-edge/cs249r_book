validation_issues:
- The 'Napkin Math' calculation for average wait time using the M/D/1 model is incorrect; `0.75 / (2 ×
  0.25)` is `0.75 / 0.5 = 1.5`, so `1.5 × 25 = 37.5 ms`, which is correct, but the text states `0.75 /
  (2 × 0.25) × 25 = 0.75 / 0.5 × 25 = 37.5 ms` with an extra incorrect step of `0.75 / 0.5`.
- The 'Napkin Math' then states 'Average wait = 37.5 ms. Therefore, total latency (queue + service) =
  37.5 + 25 = 62.5 ms. Deadline (33ms) missed.' but this is for average case, and the question is about
  hard real-time, implying worst case or P99/P100 which would be much higher, so the conclusion is correct
  but the math explanation for hard real-time is insufficient.
