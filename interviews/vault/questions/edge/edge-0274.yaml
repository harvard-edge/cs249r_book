title: The Perception Pipeline's Deadline
scenario: You are designing the perception system for an autonomous vehicle. A camera feeds frames to
  an object detection model running on a Jetson AGX Orin. The camera produces frames at exactly 30 FPS.
  The model takes, on average, 25ms to process a single frame. The system has a hard real-time deadline
  of 33ms for every single frame to avoid collisions.
details:
  realistic_solution: No, the system is not safe. While the average service time (25ms) is below the deadline
    (33ms), the system's utilization is far too high for a hard real-time workload.
  common_mistake: Engineers often compare the *average* inference time directly to the deadline (25ms
    < 33ms) and conclude the system is safe. This ignores queueing theory. As system utilization increases,
    the time a request spends waiting in the queue (queue delay) grows non-linearly, causing tail latency
    (P99, P99.9) to skyrocket. For a hard real-time system, you cannot ignore the wait time in the queue.
  napkin_math: "1.  Calculate Frame Arrival Interval: The time between frames arriving.\n    - Interval\
    \ = 1 / 30 FPS = 33.3 ms.\n2. Calculate System Utilization (ρ):\n    - ρ = Service Time / Arrival\
    \ Interval = 25 ms / 33.3 ms = 0.75 (75% utilization).\n3. Estimate Queue Delay (M/D/1 model — deterministic\
    \ service):\n    For an M/D/1 queue (Poisson arrivals, deterministic service):\n    - Average wait\
    \ = ρ / (2 × (1 - ρ)) × Service Time\n    - Average wait = 0.75 / (2 × 0.25) × 25 = 0.75 / 0.5 × 25\
    \ = 37.5 ms.\n    - Average total latency = wait + service = 37.5 + 25 = 62.5 ms — far exceeds the\
    \ 33ms deadline.\n4. Tail Latency (P99):\n    At 75% utilization, P99 latency can be 3-5x the average:\n\
    \    - P99 ≈ 3 × 62.5 = ~188 ms — catastrophic for collision avoidance.\n5. What utilization is safe?\n\
    \    For the total latency (wait + service) to stay below 33.3ms:\n    - Need: ρ / (2(1-ρ)) × S +\
    \ S ≤ 33.3 ms\n    - S × (1 + ρ/(2(1-ρ))) ≤ 33.3\n    - With S = 25 ms: 25 × (1 + ρ/(2-2ρ)) ≤ 33.3\n\
    \    - 1 + ρ/(2-2ρ) ≤ 1.332\n    - ρ/(2-2ρ) ≤ 0.332 → ρ ≤ 0.399.\n    - Max utilization ≈ 40%, meaning\
    \ service time must be ≤ 33.3 × 0.4 = 13.3 ms.\n6. Fix: Reduce inference time to ~13ms (via quantization,\
    \ pruning, or a smaller model) to achieve safe utilization below 40%. Alternatively, drop frames deterministically\
    \ (process every 2nd frame) to halve the arrival rate, giving an effective interval of 66.6ms and\
    \ utilization of 25/66.6 = 37.5%."
  options:
  - Yes, it's safe. The average processing time of 25ms is less than the 33ms deadline.
  - No, it's unsafe. The 75% utilization is too high, causing queue delays that will violate the hard
    real-time deadline.
  - Yes, it's safe. It can process 40 frames per second (1000ms / 25ms), which is more than the required
    30 FPS.
  - No, it's unsafe because the system utilization is over 100% (33.3ms / 25ms).
  correct_index: 1
