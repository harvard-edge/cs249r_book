title: The Perception Pipeline's Deadline
scenario: You are designing the perception system for an autonomous vehicle. A camera feeds frames to an object detection model running on a Jetson AGX Orin. The camera produces frames at exactly 30 FPS. The model takes, on average, 25ms to process a single frame. The system has a hard real-time deadline of 33ms for every single frame to avoid collisions.
question: Is the 30 FPS system safe for a hard 33 ms deadline if the model averages 25 ms per frame?
details:
  realistic_solution: No, the system is not safe. While the average service time (25ms) is below the deadline (33ms), the system's utilization is far too high for a hard real-time workload.
  common_mistake: |
    **The Pitfall:** Comparing average inference time directly to the deadline without considering queueing delays.
    **The Rationale:** Engineers assume deterministic, average-case execution without accounting for the non-linear growth of wait times as utilization increases.
    **The Consequence:** Ignoring queueing theory causes tail latency (P99, P99.9) to skyrocket, leading directly to missed safety deadlines and physical collisions.
  napkin_math: |
    - **Arrival Rate & Service Time:** Interval = 1 / 30 FPS = 33.3 ms. Service Time = 25 ms.
    - **System Utilization (ρ):** ρ = 25 ms / 33.3 ms = 0.75 (75%).
    - **Queue Delay (M/D/1):** Average wait = (ρ / (2 * (1 - ρ))) * Service Time = (0.75 / (2 * 0.25)) * 25 ms = (0.75 / 0.5) * 25 ms = 1.5 * 25 ms = 37.5 ms.
    - **Average Total Latency:** 37.5 ms (wait) + 25 ms (service) = 62.5 ms.
    - **Tail Latency (P99):** At 75% utilization, P99 can be 3-5× the average. P99 ≈ 3 * 62.5 ms = 187.5 ms.
    - **Final Result:** **The average latency (62.5 ms) already misses the 33 ms deadline, and P99 tail latency (~187.5 ms) guarantees catastrophic failure. Safe hard real-time utilization requires ρ ≤ 40%.**
  options:
  - Yes, it's safe. The average processing time of 25ms is less than the 33ms deadline.
  - No, it's unsafe. The 75% utilization is too high, causing queue delays that will violate the hard real-time deadline.
  - Yes, it's safe. It can process 40 frames per second (1000ms / 25ms), which is more than the required 30 FPS.
  - No, it's unsafe because the system utilization is over 100% (33.3ms / 25ms).
  correct_index: 1
