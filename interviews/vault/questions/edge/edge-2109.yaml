title: On-Device Fairness Evaluation with Hailo-8
scenario: You are deploying an object detection model for public safety applications on a fleet of devices equipped with Hailo-8 accelerators. The Hailo-8 delivers 26 TOPS (INT8) at a power consumption of 2.5W. During pre-deployment testing, you observed that the model exhibits disparate false negative rates for objects belonging to certain underrepresented demographic groups (e.g., lower detection rates for individuals with specific skin tones in low-light conditions). Your mandate is to implement an on-device, real-time mechanism to monitor 'equalized odds' (specifically, false negative rate parity) for these groups directly on the Hailo-8, without exceeding an additional 10% of the primary model's compute budget or a 0.2W power increase.
question: How would you design this monitoring mechanism, and what formula or calculation would you use to continuously track the FNR difference between groups A and B?
details:
  realistic_solution: 'A realistic solution would involve: 1. Identifying a privacy-preserving, lightweight proxy for demographic group inference (e.g., based on readily available image features that correlate with group, or pre-assigned group IDs if applicable and ethical). 2. Designing a highly optimized, quantized (INT8) secondary model or a simple set of arithmetic operations that run on the Hailo-8''s remaining compute resources to calculate false negative counts per group. 3. Aggregating these counts over a rolling window and computing a simplified ''FNR difference'' metric periodically. This might involve custom kernels or efficient tensor operations, leveraging the Hailo-8''s architecture for dataflow processing.'
  common_mistake: |
    **The Pitfall:** Proposing complex, resource-intensive fairness metrics or post-processing techniques.
    **The Rationale:** Candidates often default to cloud-based fairness evaluation methods, ignoring the strict computational (26 TOPS INT8) and power (2.5W) constraints of the edge device.
    **The Consequence:** The proposed solution exceeds the 10% compute budget and 0.2W power increase limits, making it unviable for deployment. Another common consequence is proposing solutions that require sensitive inputs, violating privacy.
  napkin_math: |
    * FNR Difference Formula: `FNR_diff = (FalseNegatives_A / ActualPositives_A) - (FalseNegatives_B / ActualPositives_B)`
    * Primary model budget: Assumed 20 TOPS. Monitoring budget: 10% of 20 = 2.0 TOPS (well under 2.6 TOPS remaining).
    * Power budget: 0.2W allowable increase.
    * Compute cost: Updating counts and re-evaluating FNR_diff over a 100-inference window requires simple INT8 increments and divisions.
    * Operations per second: A few hundred INT8 operations/sec << 2.0 TOPS.
    * **The FNR difference calculation requires negligible compute, easily fitting within the 2.0 TOPS and 0.2W budgets using INT8 counters.**
