title: The Memory Pressure Leak
scenario: Your autonomous monitoring system crashes with an 'Out of Memory' error after 30 minutes of
  operation in a hot environment. You check your code and find no traditional memory leaks. Based on the
  producer-consumer diagram, why is your memory usage increasing over time?
details:
  realistic_solution: 'The system crashes because the **Producer (Camera)** and **Consumer (NPU)** are
    decoupled without backpressure. As the device heats up, thermal throttling slows the NPU (from 25ms
    to 100ms per frame). Since the camera stays at a rigid 30 FPS, frames pile up in the queue until the
    device hits an OOM. The fix is **Backpressure or Frame Dropping**: actively drop new frames or step
    down the camera framerate when thermal throttling engages.'
  common_mistake: '"The heatsink isn''t big enough." A bigger heatsink delays the throttling, but the
    software architecture is still fundamentally flawed.'
  napkin_math: At 30 FPS arrival and 10 FPS service, you leak 20 frames/sec. At 24 MB per 4K frame, you
    are 'leaking' 480 MB of RAM every second. An 8GB Jetson will OOM in under 20 seconds once throttling
    hits.
