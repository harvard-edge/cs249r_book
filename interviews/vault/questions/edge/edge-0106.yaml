title: The Memory Pressure Leak
scenario: Your autonomous monitoring system crashes with an 'Out of Memory' error after 30 minutes of operation in a hot environment. You check your code and find no traditional memory leaks.
question: Based on the producer-consumer diagram, why is your memory usage increasing over time?
details:
  realistic_solution: 'The system crashes because the Producer (Camera) and Consumer (NPU) are decoupled without backpressure. As the device heats up, thermal throttling slows the NPU (from 25ms to 100ms per frame). Since the camera stays at a rigid 30 FPS, frames pile up in the queue until the device hits an OOM. The fix is Backpressure or Frame Dropping: actively drop new frames or step down the camera framerate when thermal throttling engages.'
  common_mistake: |
    **The Pitfall:** Assuming the physical heatsink is simply too small.
    **The Rationale:** Engineers correctly identify thermal throttling as the trigger, but treat it purely as a hardware problem.
    **The Consequence:** A bigger heatsink merely delays the throttling. The software architecture is fundamentally flawed and will still crash eventually.
  napkin_math: |
    1. **Rates:** Arrival is 30 FPS; Throttled service drops to 10 FPS.
    2. **Accumulation:** System leaks 20 frames/sec into the queue.
    3. **Data Volume:** At 24 MB per 4K frame, you are "leaking" 20 * 24 = 480 MB/sec.
    4. **OOM Point:** An 8GB Jetson will Out-Of-Memory in just **~16.6 seconds** once throttling hits.
