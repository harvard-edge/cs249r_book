title: The Memory Pressure Leak
scenario: Your autonomous monitoring system crashes with an 'Out of Memory' error after 30 minutes of operation in a hot environment. You check your code and find no traditional memory leaks.
question: Based on the producer-consumer diagram, why is your memory usage increasing over time?
details:
  realistic_solution: The producer (Camera) and consumer (NPU) are coupled via an unbounded queue. Thermal throttling decreases NPU throughput, while the camera persistently generates 30 FPS. The missing architectural component is active backpressure. The queue must be bounded (e.g., ring buffer) and the system must dynamically drop incoming frames when the NPU is saturated, avoiding OOM events at the cost of transient frame drops.
  common_mistake: |
    **The Pitfall:** Assuming the physical heatsink is simply too small.
    **The Rationale:** Engineers correctly identify thermal throttling as the trigger, but treat it purely as a hardware problem.
    **The Consequence:** A bigger heatsink merely delays the throttling. The software architecture is fundamentally flawed and will still crash eventually.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Camera input rate: 30 FPS.
       - Throttled NPU processing rate: 10 FPS.
       - Frame size (4K): 24 MB.
       - Available system RAM: 8 GB.
    2. **Calculations:**
       - Frame accumulation rate: 30 FPS - 10 FPS = +20 frames/sec.
       - Memory leak rate: 20 frames * 24 MB = 480 MB/sec.
       - Time to OOM: 8000 MB / 480 MB/sec ≈ 16.6 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: 480 MB/s memory leak.** Without backpressure, thermal throttling causes an immediate divergence between producer and consumer rates, rapidly exhausting system memory.
