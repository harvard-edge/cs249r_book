title: 'Model Format Conversion Fidelity: PyTorch to CoreML to ONNX Round-Trip'
scenario: You convert a PyTorch segmentation model to CoreML (for Apple Neural Engine deployment), then
  need to also deploy it on Jetson Orin. You export the CoreML model to ONNX via coremltools. The round-trip
  PyTorch->CoreML->ONNX produces different outputs than direct PyTorch->ONNX. Max diff is 0.05 in FP32.
details:
  realistic_solution: 'The 0.05 max diff is too large for FP32 (should be < 1e-5 for a faithful conversion).
    Debug by comparing intermediate: PyTorch vs CoreML (direct), and PyTorch vs ONNX (direct). If PyTorch->CoreML
    is faithful but CoreML->ONNX introduces error, the issue is in coremltools'' ONNX export (known issues
    with transpose handling and gather ops). Solution: never do round-trip conversions. Export directly
    to each target format from PyTorch: torch.onnx.export for ONNX, coremltools.convert for CoreML. Maintain
    the PyTorch model as the single source of truth.'
  common_mistake: Treating model format conversion as lossless. Each conversion step can introduce graph
    transformations (op decomposition, constant folding, precision changes) that compound errors.
  napkin_math: 'FP32 machine epsilon: 1.19e-7. Max diff 0.05 = 420,000x epsilon — this is not rounding
    error, it is a conversion bug. Direct PyTorch->ONNX typically achieves <1e-5 max diff (84x epsilon),
    which is acceptable accumulation over 100+ layers.'
