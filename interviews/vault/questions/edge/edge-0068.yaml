title: The Overheating Robot Dog
scenario: Your company's new robot dog uses an embedded ML accelerator for continuous visual navigation. During extended outdoor missions in warm climates, you observe a significant drop in its navigation performance after about 15-20 minutes. Telemetry data shows the accelerator's temperature frequently hitting its thermal limit (e.g., 85°C), leading to CPU/GPU clock frequency reduction.
question: "How would you design the robot dog's system to maintain acceptable navigation performance despite long-duration thermal constraints?"
details:
  realistic_solution: "A multi-pronged approach involving both hardware and software.\n  1.  Hardware Thermal Design:\n      *   Passive Cooling: Optimize heatsink size, material (copper vs. aluminum), fin density, and thermal interface material (TIM). Ensure good airflow within the enclosure.\n      *   Active Cooling: If feasible, incorporate miniature fans, thermoelectric coolers (TECs), or liquid cooling (though less common for small edge devices due to complexity/weight).\n      *   Enclosure Design: Maximize surface area for heat dissipation, consider ventilation holes, and material choices.\n  2.  Software Thermal Management:\n      *   Dynamic Frequency Scaling (DFS/DVFS): The OS/firmware can dynamically adjust CPU/GPU clock frequencies and voltages based on temperature thresholds. This prevents catastrophic overheating but results in performance drops.\n      *   Workload Scheduling: Prioritize critical ML tasks. If temperature rises, scale back non-essential tasks (e.g., logging, lower-priority background inference).\n      *   Adaptive Model Switching: Implement multiple versions of your navigation model: a high-performance, high-power model and a lower-performance, lower-power model. Switch to the lower-power model when approaching thermal limits.\n      *   Duty Cycling: For less critical tasks, run them in bursts with idle periods to allow cooling.\n      *   Predictive Throttling: Instead of reactive throttling, use a thermal model to predict future temperature based on current workload and ambient conditions, allowing proactive scaling down before hitting limits."
  common_mistake: |
    **The Pitfall:** Over-relying exclusively on hardware thermal fixes ("Just add a bigger heatsink").
    **The Rationale:** Candidates view thermal management purely as a mechanical engineering problem instead of a software-hardware co-design requirement.
    **The Consequence:** The hardware additions are often insufficient for sustained workloads in constrained environments, resulting in the system failing abruptly due to lack of software-level grace.
  napkin_math: |
    1. **Thermal Resistance:** $R_{ja} = 5°C/W$.
    2. **High Power Scenario:** A 10W load causes a `10W * 5°C/W = 50°C` rise. At 30°C ambient, junction temp reaches `30°C + 50°C = 80°C` (dangerously close to 85°C limit).
    3. **Low Power Scenario (Throttled):** Reducing power to 5W drops the rise to `5W * 5°C/W = 25°C`.
    4. **Resulting Temp:** At 30°C ambient, junction temp stabilizes at `30°C + 25°C = 55°C`.
    **Proactively scaling down to 5W maintains a safe 55°C junction temperature, ensuring continuous long-duration operation.**
