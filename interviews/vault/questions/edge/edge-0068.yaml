title: The Overheating Robot Dog
scenario: Your company's new robot dog uses an embedded ML accelerator for continuous visual navigation. During extended outdoor missions in warm climates, you observe a significant drop in its navigation performance after about 15-20 minutes. Telemetry data shows the accelerator's temperature frequently hitting its thermal limit, leading to CPU/GPU clock frequency reduction.
question: "How would you design the robot dog's system to maintain acceptable navigation performance despite long-duration thermal constraints?"
details:
  realistic_solution: 'A robust L5 approach requires hardware-software co-design: 1. **Hardware Thermal Design:** Optimize heatsink thermal interface material (TIM) and ensure $R_{ja}$ is minimized. 2. **Software Thermal Management (DVFS):** Implement an OS-level DVFS governor to dynamically throttle clock frequencies before catastrophic junction temperatures are reached. 3. **Graceful Degradation:** Utilize predictive thermal modeling to trigger QoS load shedding, proactively swapping the heavy navigation model for a lightweight heuristic fallback to sustain execution within the throttled 5W budget.'
  common_mistake: |
    **The Pitfall:** Over-relying exclusively on hardware thermal fixes ("Just add a bigger heatsink").
    **The Rationale:** Candidates view thermal management purely as a mechanical engineering problem instead of a software-hardware co-design requirement.
    **The Consequence:** The hardware additions are often insufficient for sustained workloads in constrained environments, resulting in the system failing abruptly due to lack of software-level grace.
  napkin_math: |
    **Assumptions & Constraints:**
    - Thermal Resistance (R_ja): 5°C/W.
    - Ambient Temperature: 30°C.
    - Thermal Limit: 85°C.
    - High Power Load: 10W.
    - Throttled Low Power Load: 5W.

    **Calculations:**
    - High Power Temp Rise: 10W * 5°C/W = 50°C.
    - High Power Junction Temp: 30°C + 50°C = 80°C (dangerously close to 85°C limit).
    - Low Power Temp Rise: 5W * 5°C/W = 25°C.
    - Low Power Junction Temp: 30°C + 25°C = 55°C.

    **Conclusion & Interpretation:**
    - **Result: Thermal-Bound.** Proactively scaling down to 5W maintains a safe 55°C junction temperature, ensuring continuous long-duration operation.
