title: The Overheating Robot Dog
scenario: Your company's new robot dog uses an embedded ML accelerator for continuous visual navigation.
  During extended outdoor missions in warm climates, you observe a significant drop in its navigation
  performance after about 15-20 minutes. Telemetry data shows the accelerator's temperature frequently
  hitting its thermal limit (e.g., 85°C), leading to CPU/GPU clock frequency reduction. Describe how you
  would approach designing a system that maintains acceptable performance despite thermal constraints
  over long durations.
question: "How would you design the robot dog's system to maintain acceptable navigation performance despite long-duration thermal constraints?"
details:
  realistic_solution: "A multi-pronged approach involving both hardware and software.\n  1.  Hardware\
    \ Thermal Design:\n      *   Passive Cooling: Optimize heatsink size, material (copper vs. aluminum),\
    \ fin density, and thermal interface material (TIM). Ensure good airflow within the enclosure.\n \
    \     *   Active Cooling: If feasible, incorporate miniature fans, thermoelectric coolers (TECs),\
    \ or liquid cooling (though less common for small edge devices due to complexity/weight).\n      *\
    \   Enclosure Design: Maximize surface area for heat dissipation, consider ventilation holes, and\
    \ material choices.\n  2.  Software Thermal Management:\n      *   Dynamic Frequency Scaling (DFS/DVFS):\
    \ The OS/firmware can dynamically adjust CPU/GPU clock frequencies and voltages based on temperature\
    \ thresholds. This prevents catastrophic overheating but results in performance drops.\n      *  \
    \ Workload Scheduling: Prioritize critical ML tasks. If temperature rises, scale back non-essential\
    \ tasks (e.g., logging, lower-priority background inference).\n      *   Adaptive Model Switching:\
    \ Implement multiple versions of your navigation model: a high-performance, high-power model and a\
    \ lower-performance, lower-power model. Switch to the lower-power model when approaching thermal limits.\n\
    \      *   Duty Cycling: For less critical tasks, run them in bursts with idle periods to allow cooling.\n\
    \      *   Predictive Throttling: Instead of reactive throttling, use a thermal model to predict future\
    \ temperature based on current workload and ambient conditions, allowing proactive scaling down before\
    \ hitting limits."
  common_mistake: '"Just add a bigger heatsink." While thermal hardware is important, it''s often not
    enough for sustained high-performance workloads in constrained environments without software-level
    management.'
  napkin_math: A typical edge SoC might dissipate 10-15W. If the thermal resistance from junction to ambient
    (R_{ja}) is 5°C/W, then a 10W load causes a 50°C rise. If ambient is 30°C, junction temperature reaches
    80°C. Reducing power to 5W would drop it to a 25°C rise, maintaining a safer 55°C junction temp at
    30°C ambient.
