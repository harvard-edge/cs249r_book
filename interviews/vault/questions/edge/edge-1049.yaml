title: 'Fault Tolerance: Mastery — Recovery Time Analysis for Edge Learning System'
scenario: 'Your Jetson Orin (32GB LPDDR5, 275 TOPS, 60W) based quality inspection
  system experienced 3 failures last month: (1) storage corruption requiring cloud
  restore, (2) model performance degradation requiring rollback, (3) power supply
  failure requiring hardware swap. Analyze each recovery path, actual recovery times,
  and design improvements to meet a 5-minute RTO for all failure modes.'
question: How would you analyze the three Orin failure recovery paths and improve
  each to meet a 5-minute RTO?
details:
  realistic_solution: Each failure type needs its own recovery path optimized for
    RTO. 5-minute RTO requires automation for all paths.
  common_mistake: Accepting long recovery times as unavoidable; not analyzing root
    cause and designing preventive measures.
  napkin_math: 'Failure 1 (storage corruption): cloud restore 200MB model @ 100Mbps
    LTE = 16s + system reinit 120s = 136 seconds. Add online LoRA state (2MB) = 0.16s.
    Total: 136s = 2.27 minutes. Already < 5 min. Improvement: pre-cache model on second
    NVMe partition (A/B). Recovery: 0 download + 5s boot = 5s. Failure 2 (model degradation):
    detect via accuracy proxy drift (rolling window). Rollback to previous checkpoint:
    local NVMe 200MB / 4 GB/s = 50ms + 30s reinit = 30.05 seconds. Well within 5 min.
    Add: automatic drift detection trigger (5-minute evaluation window). Failure 3
    (hardware): hot spare pre-configured device swap → 4 hours with cold spare, 10
    minutes with hot spare on-site. Hot spare: pre-download latest model, configure
    network. 10 min > 5 min RTO. Improvement: pre-load model via LAN (not LTE): 200MB
    @ 1Gbps = 1.6 seconds. Hot spare swap: 1.6s + 3min physical = 3.1 min < 5 min.
    All failure modes now meet 5-min RTO.'
