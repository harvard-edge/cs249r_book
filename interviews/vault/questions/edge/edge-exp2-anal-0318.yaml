title: Hailo-8 Host Memory Streaming Bottleneck
scenario: We are deploying a high-resolution object detection model on a Hailo-8 dataflow accelerator
  (26 TOPS INT8, 2.5W). The Hailo-8 relies entirely on the host's memory for streaming data, as it has
  no local DRAM. The model requires 50 Giga-Operations (GOPs) per frame and we are targeting 60 FPS. Because
  of the high resolution, 130 MB of intermediate feature maps must be spilled to and read back from the
  host's LPDDR4 memory (which has a dedicated 4.0 GB/s bandwidth allocated to the accelerator) for each
  frame. During testing, the system only achieves 15 FPS and the accelerator's power consumption is significantly
  below its 2.5W TDP. Explain why the system is underperforming and mathematically demonstrate the bottleneck.
details:
  realistic_solution: The system is heavily memory-bandwidth bound rather than compute-bound. Dataflow
    accelerators achieve high efficiency by keeping activations on-chip, but spilling 130 MB to the host
    memory per frame creates massive data movement. Because the Hailo-8 lacks local DRAM, all this traffic
    is constrained by the 4.0 GB/s host connection, which starves the compute units, caps the frame rate
    at ~15 FPS, and results in low power draw.
  common_mistake: Candidates often assume that because the Hailo-8 has 26 TOPS of compute, it will easily
    hit 60 FPS for a 50 GOPs model (which only needs 3 TOPS). They frequently overlook the architectural
    constraint of having no local DRAM and fail to calculate the memory bandwidth penalty of spilling
    large intermediate activations to the host.
  napkin_math: '1. Compute required: 50 GOPs/frame * 60 FPS = 3,000 GOPs = 3 TOPS. This is well within
    the Hailo-8''s 26 TOPS capacity.

    2. Memory transfer per frame: 130 MB write + 130 MB read = 260 MB/frame.

    3. Required bandwidth for 60 FPS: 260 MB/frame * 60 FPS = 15.6 GB/s.

    4. Available host bandwidth: 4.0 GB/s.

    5. Maximum achievable FPS: 4.0 GB/s / 260 MB/frame = 15.38 FPS.'
