title: Sizing a 70B LLM for Qualcomm Cloud AI 100
scenario: Your team is tasked with deploying a 70-billion parameter language model for an on-premise enterprise application using a single Qualcomm Cloud AI 100 accelerator. The card features 32 GB of LPDDR4x memory and operates within a strict 75W power envelope.
question: What extreme quantization scheme would fit a 70B LLM and KV cache into 32 GB on the Cloud AI 100, and what are the runtime tradeoffs?
details:
  realistic_solution: A 70B model requires extreme sub-4-bit quantization (e.g., 3-bit AWQ or GPTQ) to condense weights to ~26 GB, safely fitting within the 32 GB LPDDR4x limit while reserving space for the KV cache. The critical tradeoff is that compressed 3-bit formats require bitwise unpacking back to INT8 formats at runtime, expending INT8 compute cycles and drawing power, thus potentially shifting the system from memory-bound to compute-bound depending on batch size.
  common_mistake: |
    **The Pitfall:** Assuming standard 4-bit quantization is sufficient for a 70B model.
    **The Rationale:** Candidates fail to do the math to realize that 70B parameters at 4-bit requires ~35GB, instantly exceeding the 32GB hardware limit.
    **The Consequence:** The model cannot be loaded into memory, and the candidate overlooks the runtime compute overhead of unpacking sub-4-bit weights into INT8 formats.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Parameters: 70 Billion.
       - Memory capacity: 32 GB.
       - Memory reserved for OS/KV cache: 4 GB.
    2. **Calculations:**
       - Target weight footprint: 32 GB - 4 GB = 28 GB.
       - Max bit-width: (28 GB * 8 bits/byte) / 70B = 3.2 bits/param.
       - 3-bit quantization footprint: 70B * 3 bits = 210 Gb = 26.25 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Extreme 3-bit Quantization required.** To fit within 32 GB alongside KV cache, sub-4-bit weights are mandatory, introducing INT8 unpacking compute overhead at runtime.
