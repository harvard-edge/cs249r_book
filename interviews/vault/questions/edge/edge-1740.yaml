title: Sizing a 70B LLM for Qualcomm Cloud AI 100
scenario: Your team is tasked with deploying a 70-billion parameter language model for an on-premise enterprise application using a single Qualcomm Cloud AI 100 accelerator. The card features 32 GB of LPDDR4x memory, 400 TOPS of INT8 compute, and operates within a strict 75W power envelope.
question: What extreme quantization scheme would fit a 70B LLM and KV cache into 32 GB on the Cloud AI 100, and what are the runtime tradeoffs?
details:
  realistic_solution: 'The candidate should calculate that the average bit-width must be ~3.2 bits or lower to fit the model and reserve room for the KV cache. A strong approach proposes a mixed-precision scheme or uniform 3-bit quantization (e.g., 3-bit AWQ or GPTQ) to reduce the weight footprint to ~26 GB. They must evaluate the system-level tradeoff: extreme quantization solves the LPDDR4x memory capacity bottleneck but introduces an unpacking overhead that consumes INT8 compute cycles, potentially shifting the bottleneck depending on batch size.'
  common_mistake: |
    **The Pitfall:** Assuming standard 4-bit quantization is sufficient for a 70B model.
    **The Rationale:** Candidates fail to do the math to realize that 70B parameters at 4-bit requires ~35GB, instantly exceeding the 32GB hardware limit.
    **The Consequence:** The model cannot be loaded into memory, and the candidate overlooks the runtime compute overhead of unpacking sub-4-bit weights into INT8 formats.
  napkin_math: |
    1. 70B params at standard 4-bit = 70e9 * 0.5 bytes = 35.0 GB (Fails > 32 GB limit).
    2. Target memory for weights: ~28 GB (reserving 4 GB for KV cache and OS).
    3. Required bit-width = (28 GB * 8 bits/byte) / 70B params = 3.2 bits/param max.
    4. Applying 3-bit extreme quantization: 70B * 3 bits = 210 Gigabits = 26.25 GB for weights.
    5. Remaining memory for KV cache = 32.0 GB - 26.25 GB = 5.75 GB.
    6. **With LPDDR4x bandwidth of ~100 GB/s, memory-bound token generation takes 26.25 GB / 100 GB/s = 262.5 ms per token (~3.8 tokens/sec).**
