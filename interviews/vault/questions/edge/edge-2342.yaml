title: Orin Ring AllReduce
scenario: 'Four Jetson AGX Orins aggregate gradients for a 100 MB model via a tree
  switch with three uplinks - two nodes share a top-of-rack switch (1 Gbps), the other
  two share a different rack (1 Gbps), and the inter-rack uplink is also 1 Gbps. Effective
  node-to-node bandwidth is asymmetric: same-rack pairs see ~125 MB/s, cross-rack
  pairs see only ~62 MB/s due to the contended uplink under symmetric ring traffic.'
question: Evaluate the realistic Ring AllReduce time given the asymmetric tree topology,
  and identify whether a 2-D hierarchical AllReduce (intra-rack ring + inter-rack
  reduce-broadcast) would beat a flat 4-node ring across the contended cross-rack
  link.
visual:
  kind: svg
  path: edge-2342.svg
  alt: Four Jetson Orin nodes arranged in a logical ring topology.
  caption: Ring AllReduce logical topology across four Orin nodes.
details:
  realistic_solution: 'Flat ring at 62 MB/s (cross-rack link is the slowest hop):
    1.5 * 100 / 62 = 2.42 s. 2-D hierarchical: intra-rack ring on 2 nodes is 100 *
    1/2 / 125 = 0.4 s; inter-rack reduce-broadcast over the slow link sends 100 MB
    up + 100 MB back = 200 / 62 = 3.23 s; total = 0.4 + 3.23 = 3.63 s. Hierarchical
    is WORSE here because the cross-rack link is the bottleneck and hierarchical serializes
    200 MB through it. The right move is gradient compression to 25% (25 MB) BEFORE
    the AllReduce, dropping flat ring to 0.6 s.'
  common_mistake: Applying the textbook 1.5 * payload / bandwidth formula with the
    fast-link bandwidth, ignoring that an asymmetric topology pins the ring to the
    slowest hop.
  napkin_math: 'Flat ring: 1.5 * 100 / 62 = 2.42 s. Hierarchical: 0.4 + 200/62 = 3.63
    s. With 4x compression: 1.5 * 25 / 62 = 0.6 s.'
