title: Orin Ring AllReduce
scenario: Four Jetson AGX Orins are connected via a 1 Gbps Ethernet switch (125 MB/s
  effective) to aggregate gradients for a 100MB model.
question: Evaluate the lower-bound communication time to perform a Ring AllReduce
  for this 100MB payload.
visual:
  kind: svg
  path: edge-2342.svg
  alt: Four Jetson Orin nodes arranged in a logical ring topology.
  caption: Ring AllReduce logical topology across four Orin nodes.
details:
  realistic_solution: The Ring AllReduce lower bound is calculated as 2*(N-1)/N *
    Payload / Bandwidth. Here, N=4, Payload=100MB, Bandwidth=125MB/s. 2*(3/4) = 1.5.
    Thus, 1.5 * 100MB / 125MB/s = 150 / 125 = 1.2 seconds.
  common_mistake: Using the standard broadcast multiplier (N) instead of the Ring
    AllReduce multiplier (2*(N-1)/N).
  napkin_math: 1.5 * 100 / 125 = 1.2
