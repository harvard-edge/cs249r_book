title: 'Edge Queueing Theory Mastery: End-to-End Edge Inference System Design'
scenario: 'Design a complete edge inference system for a hospital corridor safety monitor: 8 cameras, 30 FPS, detect falls and unusual events with P99 < 200ms, 24/7 uptime, 100W power budget. Hardware options: Jetson Orin (275 TOPS INT8, 60W), Hailo-8 (26 TOPS INT8, 2.5W). Model: YOLO-pose 3B GOPS INT8. Use queueing theory to size, justify, and verify the design.'
question: "For a Hailo-8 design with 2 cameras per chip, what is the per-chip arrival rate and utilization?"
details:
  realistic_solution: 2 cameras at 30 FPS each = 60 FPS total arrival rate per chip. ρ = 60/8667 = 0.00692 — very low utilization.
  common_mistake: |
    **The Pitfall:** Not verifying the design against all three constraints simultaneously (latency, uptime, power).
    **The Rationale:** Candidates often solve for throughput alone and ignore power budgets or redundancy for uptime.
    **The Consequence:** Selecting a single Jetson Orin that meets throughput but fails the power budget or lacks redundancy for 24/7 uptime.
  napkin_math: |
    *   **Arrival Rate:** 2 cameras × 30 FPS = 60 frames/s per chip.
    *   **Service Rate ($\mu$):** 26,000 GOPS / 3 GOPS = 8667 FPS.
    *   **Utilization ($\rho$):** 60 / 8667 = **0.00692**.
    *   **Result:** The queue is extremely lightly loaded, guaranteeing minimal queueing delay.
