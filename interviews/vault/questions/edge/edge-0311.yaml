title: The Economics of Fleet Learning
scenario: An automotive company is developing a new driver-assistance feature that adapts to individual driving styles. The model needs to be continuously updated based on data from thousands of vehicles on the road. The engineering team is considering using Federated Learning (FL) instead of uploading all the raw driving data to the cloud for centralized training.
question: What is the primary motivation for using FL in this automotive scenario?
details:
  realistic_solution: The primary motivation is a combination of economics and privacy. Uploading vast amounts of raw sensor data from thousands of cars is prohibitively expensive due to cellular data costs. Furthermore, this data is highly sensitive and falls under strict privacy regulations.
  common_mistake: |
    **The Pitfall:** Focusing purely on model improvement metrics like accuracy.
    **The Rationale:** Engineers often forget the foundational physics and economic constraints that drive architectural choices in the real world.
    **The Consequence:** Proposing architectures that are financially unviable or violate privacy regulations.
  napkin_math: |
    - **Centralized Data Cost:** 10,000 vehicles × 10 GB/day = 100,000 GB. At $0.50/GB, cost is $50,000/day ($18M/year).
    - **FL Data Cost:** 10,000 vehicles × 0.01 GB/day = 100 GB. At $0.50/GB, cost is $50/day.
    - **Final Result:** **FL represents a 1,000× reduction in direct data transmission costs, saving tens of millions annually.**
  options:
  - To achieve higher model accuracy than centralized training.
  - To reduce the on-device compute requirements for inference.
  - To reduce data transmission costs and protect user privacy.
  - To enable faster model training cycles (wall-clock time).
  correct_index: 2
