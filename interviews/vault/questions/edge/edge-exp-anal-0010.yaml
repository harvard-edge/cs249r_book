title: Bandwidth Bottlenecks in Edge Data Curation
scenario: 'An edge gateway uses a Hailo-8 (26 TOPS INT8, 2.5W) to actively curate a dataset by filtering
  a continuous 4K 60FPS RGB camera stream for rare events. Because the Hailo-8 has no local DRAM, frames
  stream continuously from host memory over a PCIe bus limited to 1.2 GB/s. To stay within this bandwidth,
  the pipeline downsamples the 4K frames to 720p before sending them to the Hailo-8 for INT8 inference.
  Frames flagged with high uncertainty are saved for human annotation. However, after a month, the annotation
  team reports a severe dataset bias: the curated dataset completely lacks examples of small, distant
  objects, even though they occur frequently in the real world.'
details:
  realistic_solution: The root cause is the system's host memory streaming bottleneck combined with INT8
    quantization. Because the 4K stream exceeds the memory bandwidth, the system is forced to downsample
    to 720p. This geometric reduction destroys the spatial resolution required to detect small objects.
    Furthermore, the Hailo-8's INT8 quantization aggressively clips low-magnitude activations; any faint
    signals from the heavily downsampled objects are quantized to zero. Because the model is confidently
    blind to these objects, the uncertainty-based active learning trigger never fires, resulting in a
    dataset biased against distant objects.
  common_mistake: Candidates often falsely attribute the issue to thermal throttling from the 2.5W power
    envelope or assume the 26 TOPS compute limit is forcing frame drops. They may also blindly blame INT8
    quantization without analyzing the physical memory streaming constraints that forced the resolution
    drop.
  napkin_math: 'Compute is abundant: a standard model at 10 GOPS/frame * 60 FPS = 0.6 TOPS, easily fitting
    the 26 TOPS Hailo-8 budget. The constraint is the lack of local DRAM. Streaming uncompressed 4K (3840*2160*3
    bytes = 24.88 MB) at 60 FPS requires 24.88 MB * 60 = 1.49 GB/s, exceeding the 1.2 GB/s host bandwidth.
    Downsampling to 720p (1280*720*3 = 2.76 MB * 60 = 166 MB/s) solves the bandwidth limit. However, a
    small object that is 16x16 pixels in 4K is reduced to roughly 5x5 pixels in 720p, destroying the receptive
    field features needed by the INT8 model and causing the systematic data omission.'
