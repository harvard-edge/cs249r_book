title: Edge New 0027
scenario: To survive edge node power losses, a T4 checkpoints a 1GB LLM KV cache to the host CPU via PCIe
  Gen4 (32GB/s) every 10 tokens. Analyze the inference latency overhead of this fault-tolerance mechanism.
details:
  realistic_solution: Checkpointing large KV caches directly stalls the GPU if not done asynchronously.
    A 1GB transfer over PCIe Gen4 takes significant time compared to token generation. The tradeoff guarantees
    that upon reboot, the model does not have to recalculate the prompt prefill, saving potentially seconds
    of compute. However, doing this every 10 tokens introduces a massive stutter in the auto-regressive
    decoding phase, destroying user experience.
  common_mistake: Ignoring the PCIe bus bandwidth limit when designing cloud-like state checkpointing
    for local edge servers.
  napkin_math: 'Transfer time: 1GB / 32GB/s = 31.25ms. Occurs every 10 tokens, adding 3.1ms average latency
    per token. If normal generation is 20ms/token, this is a 15% latency penalty, plus massive PCIe bus
    contention.'
