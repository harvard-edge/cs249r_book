title: The Federated Learning Power Tax
scenario: >-
  You are an ML Systems Engineer at a smart security camera company. To improve privacy, your team is A/B testing a new person detection model trained via Federated Learning (FL). Users in the FL test group are reporting noticeable battery degradation.
question: What is the incremental energy cost of the FL cameras versus the control group, scaled across a fleet of 10,000 cameras over one year?
details:
  realistic_solution: 'Calculate the incremental energy consumed per day by an FL device compared to a control device. This difference, scaled across the entire fleet for a full year, gives the total additional energy cost.'
  common_mistake: |
    **The Pitfall:** Unit conversion errors and ignoring baseline idle power.
    **The Rationale:** Engineers often mix up Joules, Watt-hours, and kilowatt-hours.
    **The Consequence:** They produce a cost estimate that is orders of magnitude wrong, or they fail to subtract the power the idle device would have consumed anyway, overestimating the true FL tax.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline energy: 1W continuous (24 Wh/day).
       - FL training power: 5W total system power for 2 hours/day.
       - Fleet: 10,000 cameras over 365 days.
    2. **Calculations:**
       - Active FL energy: 5W * 2h = 10 Wh.
       - Idle energy (remaining 22h): 1W * 22h = 22 Wh.
       - Total FL energy: 22 Wh + 10 Wh = 32 Wh/day.
       - Incremental Cost: 32 Wh - 24 Wh = 8 Wh/day.
       - Fleet Cost: 8 Wh * 365 days * 10,000 cameras = 29,200,000 Wh.
    3. **Conclusion & Interpretation:**
       - **Result: Energy-Bound.** The federated learning feature inherently adds 8 Wh/day (a 33.3% increase in battery drain), costing an extra 29.2 Megawatt-hours of energy per year fleet-wide.
