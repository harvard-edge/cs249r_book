title: The Federated Learning Power Tax
scenario: >-
  You are an ML Systems Engineer at a smart security camera company. To improve privacy, your team is A/B testing a new person detection model trained via Federated Learning (FL). Users in the FL test group are reporting noticeable battery degradation.
question: What is the incremental energy cost of the FL cameras versus the control group, scaled across a fleet of 10,000 cameras over one year?
details:
  realistic_solution: 'Calculate the incremental energy consumed per day by an FL device compared to a control device. This difference, scaled across the entire fleet for a full year, gives the total additional energy cost.'
  common_mistake: |
    **The Pitfall:** Unit conversion errors and ignoring baseline idle power.
    **The Rationale:** Engineers often mix up Joules, Watt-hours, and kilowatt-hours.
    **The Consequence:** They produce a cost estimate that is orders of magnitude wrong, or they fail to subtract the power the idle device would have consumed anyway, overestimating the FL tax.
  napkin_math: |
    1. **Standard Energy:** `1W * 24h = 24 Wh/day`.
    2. **FL Active Compute:** FL training takes `5W for 2 hours/day = 10 Wh`.
    3. **Total FL Energy:** `24 Wh (idle/inference) + 10 Wh (training) = 34 Wh/day`.
    4. **Incremental Cost:** The FL device uses `10 Wh/day` more (a ~41% increase).
    5. **Fleet Cost:** `10 Wh * 365 days * 10,000 cameras = 36,500,000 Wh`.
    6. **Result:** The FL feature costs an extra **36.5 Megawatt-hours** of energy per year.
