title: Edge Retry Storm Policy
scenario: 'A fleet of edge gateways retries failed inference requests to a regional service. During outages, synchronized retries have caused overload after recovery.'
question: What retry policy prevents edge gateways from amplifying regional inference outages?
details:
  realistic_solution: 'Use bounded retries, exponential backoff with jitter, retry budgets, circuit breakers, local fallback, and server retry-after signals. Gateways should drop or degrade low-priority requests rather than synchronize retry bursts.'
  common_mistake: |
    **The Pitfall:** Adding naive retries to improve reliability without jitter or backoff.
    **The Rationale:** Candidates focus on recovering individual gateway data rather than the systemic impact of thousands of devices recovering simultaneously.
    **The Consequence:** Synchronized retry bursts that create a thundering herd, crashing the regional service immediately after it recovers.
  napkin_math: |
    * If 5,000 gateways retry twice in the exact same second, they add **10,000 requests/s** to the load.
    * This load spikes on top of normal recovery traffic, causing immediate cascading failure.
