title: Dual-Model QoS Shedding on Cloud AI 100
scenario: You are deploying a local generative AI assistant on an on-premise server equipped with a single Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8). During sporadic high-traffic events, the request rate overwhelms the 400 TOPS compute capacity, causing unacceptable tail latencies.
question: How would you design a graceful degradation ladder on one 32 GB Cloud AI 100 to preserve premium quality while serving free-tier fallback traffic?
details:
  realistic_solution: Implement a static co-location strategy where both the primary and fallback models reside in memory permanently to avoid latency spikes from PCIe model loading. Traffic routing dynamically shifts standard users to the smaller, higher-throughput model when queue depth exceeds a predefined threshold. Load shedding is explicitly prioritized based on user tiers to ensure the primary model never starves premium requests.
  common_mistake: |
    **The Pitfall:** Ignoring the simultaneous memory footprint of loading two distinct models.
    **The Rationale:** Candidates propose dynamically swapping models or offloading to the cloud, overlooking PCIe transfer latency and strict privacy constraints.
    **The Consequence:** The device experiences massive latency spikes or Out-Of-Memory (OOM) crashes during traffic bursts.
  napkin_math: |
    - Primary model (13B INT8): ~13 GB.
    - Fallback model (8B INT8): ~8 GB.
    - Total static weight footprint: 13 + 8 = 21 GB.
    - Remaining memory for KV cache/activations: 32 GB - 21 GB = 11 GB.
    - Average KV cache per token: ~1 MB.
    - Active tokens supported: 11 GB / 1 MB ≈ 11,000 tokens.
    - Max concurrency: ~10-11 requests (at 1,000 tokens each) before **memory limits are hit**.
