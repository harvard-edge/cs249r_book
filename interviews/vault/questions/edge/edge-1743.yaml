title: Dual-Model QoS Shedding on Cloud AI 100
scenario: You are deploying a local generative AI assistant on an on-premise server equipped with a single cloud edge accelerator. During sporadic high-traffic events, the request rate overwhelms the compute capacity, causing unacceptable tail latencies.
question: How would you design a graceful degradation ladder on a 32 GB accelerator to preserve premium quality while serving free-tier fallback traffic?
details:
  realistic_solution: "Implement a static weight-pinning strategy where both the 13B and 8B model weights reside simultaneously in the 32 GB LPDDR4x allocation (21 GB total). Dynamic PCIe offloading introduces catastrophic tail latency during sudden bursts. With ~11 GB remaining for KV caching and activations, enforce deterministic shedding via a hard concurrency limit (e.g., max 11 requests). Premium traffic receives primary model access, while free-tier requests immediately fall back to the 8B model to prevent OOM."
  common_mistake: |
    **The Pitfall:** Ignoring the simultaneous memory footprint of loading two distinct models.
    **The Rationale:** Candidates propose dynamically swapping models or offloading to the cloud, overlooking PCIe transfer latency and strict privacy constraints.
    **The Consequence:** The device experiences massive latency spikes or Out-Of-Memory (OOM) crashes during traffic bursts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware memory: 32 GB.
       - Primary model (13B INT8): 13 GB.
       - Fallback model (8B INT8): 8 GB.
       - Average KV cache/token: 1 MB.
    2. **Calculations:**
       - Static weight footprint = 13 + 8 = 21 GB.
       - Remaining memory for KV/activations = 32 GB - 21 GB = 11 GB.
       - Active tokens supported = 11 GB / 1 MB/token = 11,000 tokens.
    3. **Conclusion & Interpretation:**
       - **Max concurrency is ~11 requests (at 1k tokens each).** Memory constraints dictate static co-location over dynamic swapping.
