title: 'Edge TCO Design: Size Fleet Budget for Autonomous Vehicle Fleet'
scenario: An autonomous vehicle company is deploying 10,000 robotaxis. Each AV requires 1 Jetson Orin (60W, $499) and 1 Hailo-8 backup (2.5W, $200). The fleet operates 24/7 with 50% uptime. Power comes from the vehicle battery at a $0.12/kWh equivalent. Maintenance is 3% of hardware cost annually, and OTA updates cost $500/vehicle/year.
question: What is the 5-year total cost of ownership (TCO) for the inference compute hardware across the 10,000-vehicle fleet?
details:
  realistic_solution: 'Per vehicle: Jetson 60W + Hailo 2.5W = 62.5W at 50% uptime
    = 31.25W avg. HW: $499+$200=$699. Power: 31.25W * 8760hr * 5yr / 1000 * $0.12
    = $164.25. Annual maintenance (3%): $699*0.03=$20.97/yr. OTA: $500/vehicle/yr. 5yr
    per vehicle: $699 + $164.25 + 5*($20.97+$500) = $699+$164.25+$2604.85=$3,468. Fleet (10K):
    $34.68M. Comparison: pure cloud for AV is infeasible (latency: round-trip to cloud
    = 100ms+ vs 10ms requirement). Edge mandatory for AV. Revenue model: $34.68M /
    10K vehicles / 5yr / 365 / 24hr = $0.079/hr hardware cost per vehicle. Vs $15-20/hr
    revenue target: 0.5% of revenue.'
  common_mistake: |
    **The Pitfall:** Forgetting to convert vehicle power consumption into a $/kWh equivalent.
    **The Rationale:** Engineers often treat embedded power as "free" or fail to link it to the actual electricity cost of EV charging.
    **The Consequence:** Significantly underestimating the operational energy costs of running compute hardware on battery-powered vehicles over a multi-year lifespan.
  napkin_math: |
    1. **Hardware Cost per AV**: $499 + $200 = $699.
    2. **Average Power**: (60W + 2.5W) * 0.50 utilization = 31.25W = 0.03125 kW.
    3. **Power Cost (5 years)**: 0.03125 kW * 24 h/day * 365 days/yr * 5 years * $0.12/kWh = $164.25.
    4. **Maintenance (5 years)**: $699 * 0.03 * 5 = $104.85.
    5. **OTA Updates (5 years)**: $500 * 5 = $2,500.
    6. **Total TCO per AV**: $699 + $164.25 + $104.85 + $2,500 = **$3,468.10**.
    7. **Fleet TCO**: $3,468.10 * 10,000 = **~$34.68 Million**.
