title: Dual-Model QoS Shedding on Cloud AI 100
scenario: You are deploying a local generative AI assistant on an on-premise server equipped with a single
  Qualcomm Cloud AI 100 accelerator (32 GB LPDDR4x, 400 TOPS INT8, 75W). During sporadic high-traffic
  events, the request rate overwhelms the 400 TOPS compute capacity, causing tail latencies to spike unacceptably.
  You must design a graceful degradation ladder that utilizes a smaller fallback model to maintain availability
  for free-tier users while preserving premium user quality, without exceeding the strict hardware constraints.
question: "How would you design a graceful degradation ladder on one 32 GB Cloud AI 100 to preserve premium quality while serving free-tier fallback traffic?"
details:
  realistic_solution: Implement a static co-location strategy where both the primary and fallback models
    reside in memory permanently to avoid latency spikes from PCIe model loading. Traffic routing dynamically
    shifts standard users to the smaller, higher-throughput model when queue depth exceeds a predefined
    threshold. Load shedding is explicitly prioritized based on user tiers to ensure the primary model
    never starves premium requests.
  common_mistake: Candidates often propose offloading overflow traffic to the cloud, ignoring the strict
    on-premise privacy requirement. They also frequently fail to account for the simultaneous memory footprint
    of loading two distinct models onto a single 32 GB device, leading to out-of-memory crashes during
    the fallback transition.
  napkin_math: A primary 13B parameter model in INT8 consumes ~13 GB of memory. A fallback 8B parameter
    model in INT8 consumes ~8 GB. Total static weight footprint is 21 GB. Out of the 32 GB LPDDR4x available
    on the Qualcomm Cloud AI 100, 11 GB remains for the KV cache and intermediate activations. Assuming
    an average KV cache size of 1 MB per request for typical sequence lengths, the system can support
    approximately 10,000 active tokens in flight or roughly 10-15 concurrent requests max before hitting
    hard memory limits.
