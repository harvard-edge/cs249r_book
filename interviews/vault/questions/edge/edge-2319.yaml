title: Specify asynchronous network calls to prevent edge inference pipeline blocking
scenario: A Jetson AGX Orin streams object detection results to a server. The AI inference
  takes 20ms, and network transmission takes 30ms over a cellular modem.
question: Specify how asynchronous network calls improve the throughput of the local
  inference loop.
details:
  realistic_solution: If synchronous, the loop takes 20ms + 30ms = 50ms per frame
    (20 FPS). By using asynchronous network calls, the GPU immediately starts processing
    the next frame while the OS network stack handles the 30ms transmission in the
    background. The bottleneck becomes just the 30ms network transfer, increasing
    local pipeline throughput to ~33 FPS.
  common_mistake: Believing async calls magically speed up the physical network transmission
    itself, rather than simply unblocking the GPU to overlap compute with I/O.
  napkin_math: 1000ms / 30ms = 33 FPS async vs 1000ms / 50ms = 20 FPS sync
