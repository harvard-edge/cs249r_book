title: Specify asynchronous network calls to prevent edge inference pipeline blocking
scenario: A Jetson AGX Orin streams object detection results to a server. The AI inference takes 20ms, and network transmission takes 30ms over a cellular modem.
question: Specify how asynchronous network calls improve the throughput of the local inference loop.
details:
  realistic_solution: If synchronous, the loop takes 20ms + 30ms = 50ms per frame (20 FPS). By using asynchronous network calls, the GPU immediately starts processing the next frame while the OS network stack handles the 30ms transmission in the background. The bottleneck becomes just the 30ms network transfer, increasing local pipeline throughput to ~33 FPS.
  common_mistake: |
    **The Pitfall:** Believing async calls speed up the physical network transmission itself.
    **The Rationale:** Candidates misunderstand that async merely unblocks the GPU to overlap compute with I/O.
    **The Consequence:** Expectations for network latency improvements are mismanaged, and system throughput calculations are incorrect.
  napkin_math: |
    * Synchronous pipeline: 20ms (compute) + 30ms (network) = 50ms per frame.
    * Synchronous throughput: 1000ms / 50ms = **20 FPS.**
    * Asynchronous pipeline: Compute and network overlap. The bottleneck is the max of the two (30ms).
    * Asynchronous throughput: 1000ms / 30ms = **33 FPS.**
