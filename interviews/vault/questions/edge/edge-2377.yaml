title: 'Edge Device Checkpointing Under Variable Power Modes'
scenario: 'A fleet of Jetson AGX Orin devices running autonomous delivery robots frequently experiences power brownouts during 15-60 W mode switching, threatening local mapping state.'
question: 'Evaluate the trade-offs of asynchronous versus synchronous local NVMe checkpointing for a 2GB active map state under 204.8 GB/s memory bandwidth constraints.'
details:
  realistic_solution: 'Synchronous checkpointing halts processing but guarantees state consistency, taking time bounded by NVMe write speeds. Asynchronous checkpointing overlaps with compute but requires double-buffering the 2GB state, which permanently consumes precious LPDDR5 capacity and bandwidth during the transfer.'
  common_mistake: |
    **The Pitfall:** Assuming NVMe sequential write speeds match the SoC's LPDDR5 internal memory bandwidth.
    **The Rationale:** Candidates forget that writing state to persistent storage operates on entirely different physical buses (PCIe vs memory controller) with massively different bandwidth ceilings.
    **The Consequence:** The system stalls for hundreds of milliseconds during synchronous checkpoints, or LPDDR5 is permanently choked by double-buffering.
  napkin_math: |
    **Assumptions & Constraints:**
    - LPDDR5 Bandwidth = 204.8 GB/s.
    - NVMe Write Speed = ~3.5 GB/s.
    - State size = 2 GB.

    **Calculations:**
    - Transfer time = 2 GB / 3.5 GB/s = ~571ms.

    **Conclusion & Interpretation:**
    - **Result: 571ms Stall (IO-Bound)**. Synchronous checkpointing guarantees consistency but incurs a massive 571ms stall per checkpoint due to PCIe constraints.
