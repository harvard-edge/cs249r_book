title: Edge Device Checkpointing Under Variable Power Modes
scenario: A fleet of Jetson AGX Orin devices running autonomous delivery robots frequently
  experiences power brownouts during 15-60 W mode switching, threatening local mapping
  state.
question: Evaluate the trade-offs of asynchronous versus synchronous local NVMe checkpointing
  for a 2GB active map state under 204.8 GB/s memory bandwidth constraints.
details:
  realistic_solution: Synchronous checkpointing halts processing but guarantees state
    consistency, taking time bounded by NVMe write speeds. Asynchronous checkpointing
    overlaps with compute but requires double-buffering the 2GB state, which permanently
    consumes precious LPDDR5 capacity and bandwidth during the transfer.
  common_mistake: Assuming NVMe sequential write speeds match the SoC's LPDDR5 internal
    memory bandwidth.
  napkin_math: 2GB / 3.5GB/s NVMe write = ~571ms synchronization stall.
