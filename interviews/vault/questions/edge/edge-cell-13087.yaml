title: 'Edge Systolic Array Realization: Batch Size Effect on Edge Throughput'
scenario: Concretely compute throughput and energy for EfficientDet-Lite2 (2.9 GOPS INT8, 5.1M params)
  at batch sizes 1, 4, 16 on Jetson Orin DLA (11 TOPS INT8, 200GB/s, 5W). Show the crossover from memory-bound
  to compute-bound as batch increases.
question: "For EfficientDet-Lite2 on Orin DLA at batch sizes 1, 4, and 16, what FPS, latency, energy, and bound regime do you get?"
details:
  realistic_solution: 'DLA ridge: 11T/200G = 55 FLOPs/byte. Weight: 5.1MB. Activation per image: ~8MB
    (estimate). Batch=1: FLOPs=2.9G. BW=5.1+8=13.1MB. AI=2.9G/13.1MB=221 FLOPs/byte > 55 ridge → compute
    bound. Time=2.9G/11T=0.264ms. FPS=3788. Batch=4: FLOPs=11.6G. BW=5.1+4*8=37.1MB. AI=11.6G/37.1MB=313.
    Compute bound. Time=11.6G/11T=1.055ms. FPS=4*1000/1.055=3790 similar (compute bound plateau). Batch=16:
    FLOPs=46.4G. BW=5.1+128=133.1MB. AI=46.4G/133.1MB=348. Still compute bound. Time=4.22ms. FPS=3792.
    Throughput nearly flat: already compute-bound at batch=1.'
  common_mistake: Assuming throughput scales linearly with batch size without accounting for the memory-bandwidth
    saturation point where the system transitions from memory-bound to compute-bound.
  napkin_math: 'DLA ridge=55. Batch=1: AI=221>55, compute bound. FPS=1000/0.264=3788. Batch=4: AI=313,
    compute bound. FPS=3790. Batch=16: AI=348, compute bound. FPS=3792. All batches compute-bound because
    model activation BW < weight BW and DLA ridge is low. Power: DLA at full load = 5W. Energy: batch=1:
    5W*0.264ms=1.32mJ/inf. Batch=4: 5W*1.055ms/4=1.32mJ/inf. Same energy per inference (compute bound,
    linear). DLA vs GPU: 5W vs 60W. GPU at 275 TOPS: compute time=2.9G/275T=0.0105ms. FPS=95,238. But
    GPU uses 60W: energy=60W*0.0105ms=0.63mJ. GPU more energy efficient per inference when at full load!'
