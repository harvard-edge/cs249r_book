title: Dataflow Batching Architecture for Multi-Camera Edge Streams
scenario: You are designing the inference pipeline for a smart intersection processing 4 concurrent 1080p camera streams at 30 FPS. The system uses a Hailo-8 dataflow accelerator which streams activations directly from host memory over PCIe Gen3x4.
question: Would you use static or dynamic batching for the four 1080p streams on Hailo-8, and what scheduling policy meets a 15ms p99 SLA?
details:
  realistic_solution: |
    The optimal approach is a synchronized static batching strategy (e.g., batch size 4) tied directly to the camera hardware interrupts, or purely sequential execution (batch size 1) if latency is paramount. Since the Hailo-8 streams continuously from host memory, the system should allocate pinned host memory for DMA transfers and stream frames as soon as they are preprocessed.
  common_mistake: |
    **The Pitfall:** Proposing continuous batching or large dynamic batch sizes commonly used for data center GPUs.
    **The Rationale:** Candidates apply cloud paradigms to edge dataflow accelerators, failing to realize the Hailo-8 lacks local DRAM.
    **The Consequence:** Buffering large batches on the host delays the start of the streaming dataflow execution, directly violating the 15ms latency SLA.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Frame Arrival: 4 streams at 30 FPS.
       - Frame Size (1080p INT8): ~6.2MB.
       - PCIe Gen3x4 Bandwidth: ~3.9 GB/s.
       - Compute: 10 GOPS per frame.
    2. **Calculations:**
       - Frame Arrival Interval: 1 frame per 33.3ms.
       - Transfer Time (Batch of 4): (4 * 6.2MB) / 3900 MB/s = ~6.3ms.
       - Compute Time: (4 * 10 GOPS) / 26,000 GOPS = ~1.5ms.
       - Total Latency (Batch=4): 6.3ms (transfer) + 1.5ms (compute) = 7.8ms.
    3. **Conclusion & Interpretation:**
       - **Result: 7.8ms total latency (PCIe Transfer-Bound).** Comfortably meets 15ms SLA.
