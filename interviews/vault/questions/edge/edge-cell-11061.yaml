title: 'Fault Tolerance: Evaluate Warm vs Cold Recovery for Edge Device Failures'
scenario: '500 Jetson Orin devices (32GB LPDDR5, 275 TOPS INT8, 60W) run online learning. After a failure,
  compare (A) cold recovery: restore from last cloud checkpoint (latency: download + initialization),
  vs (B) warm recovery: restore from local NVMe snapshot (latency: local read). Evaluate for a device
  with 4GB/s NVMe and 100Mbps LTE link.'
details:
  realistic_solution: Warm recovery from NVMe is always faster and contains more recent state (minutes
    old vs hours old for cloud checkpoint). Use local NVMe as primary recovery, cloud as disaster recovery
    only.
  common_mistake: Choosing cloud recovery as the default without quantifying the LTE bandwidth bottleneck;
    not accounting for that local state may be more recent than cloud checkpoint.
  napkin_math: 'Model size: 200MB (int8, 200M param model). Online learning state: LoRA weights 2MB +
    optimizer 4MB = 6MB. Total local snapshot: 206MB. Warm recovery (NVMe): 206MB / 4 GB/s = 51.5ms +
    system init 5 seconds = 5.05 seconds total. Cold recovery (LTE): 206MB / (100Mbps / 8) = 16.5 seconds
    download + 5 seconds init = 21.5 seconds. Warm is 4.3× faster. State freshness: local snapshot is
    at most 15 minutes old (snapshot every 15 min). Cloud checkpoint: uploaded every 24 hours (too expensive
    to upload frequently at 100Mbps: 206MB / 12.5 MB/s = 16.5 seconds per upload, 96 times/day = 26.4
    minutes of LTE per day). Local wins on speed and recency.'
