title: The Object Tracking Memory Budget
scenario: 'Your warehouse robot uses a Qualcomm RB5 (15 TOPS, 8 GB LPDDR5) to track inventory items on
  shelves. During a busy warehouse scan, the tracker maintains state for up to 500 objects simultaneously.
  Each track stores: bounding box (16 bytes), velocity vector (8 bytes), Kalman filter state (9×9 float
  matrix = 324 bytes), appearance embedding (128 floats = 512 bytes), and metadata (track ID, age, confidence
  = 32 bytes). Your colleague says ''tracking memory is negligible compared to the model.'' Is that true,
  and when does it become a problem?'
question: "Is that true, and when does it become a problem?"
details:
  realistic_solution: 'Per-track memory: 16 + 8 + 324 + 512 + 32 = **892 bytes**. At 500 tracks: 500 ×
    892 = **446 KB**. At 2500 total tracks, it''s **2.23 MB**. That''s indeed small compared to a 40 MB
    model. But the real cost is in the operations, not the storage: without spatial indexing, computing
    embedding distances requires streaming 512 bytes per track for every detection. At 30 FPS, this burns
    1.92 GB/s of memory bandwidth, bottlenecking the system.'
  common_mistake: '"Tracking state is just a few kilobytes — it''s never a concern." This is true for
    10-20 objects but breaks down at scale with rich per-object state.'
  napkin_math: '500 active tracks: 446 KB total. 2000 lost tracks: 1.78 MB total. Total: 2.23 MB. Matching
    bandwidth: 50 detections × 2500 tracks × 512 bytes = 64 MB/frame × 30 FPS = **1.92 GB/s** — that''s
    3.7% of the RB5''s 51.2 GB/s LPDDR5 bandwidth, just for tracking. With spatial indexing (average 50
    candidates per detection): 50 × 50 × 512 = 1.28 MB/frame → 38.4 MB/s (50× reduction).'
  options:
  - The memory leak is in the framework's autograd graph; disabling gradient computation with torch.no_grad()
    will fix it.
  - 'Per-track memory: 16 + 8 + 324 + 512 + 32 = 892 bytes. At 500 tracks: 500 × 892 = 446 KB. At 2500
    total tracks, it''s 2.23 MB.'
  - Network I/O is the dominant bottleneck; optimizing the model or inference pipeline will have minimal
    impact on end-to-end latency.
  - Tracking state is just a few kilobytes — it's never a concern.. This is true for 10-20 objects but
    breaks down at scale with rich per-object state.
  correct_index: 1
