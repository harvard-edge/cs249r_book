title: The Object Tracking Memory Budget
scenario: 'Your warehouse robot uses a Qualcomm RB5 to track inventory items. During a busy scan, the tracker maintains state for up to 2500 objects simultaneously. Each track stores a bounding box (16 bytes), velocity vector (8 bytes), Kalman filter state (324 bytes), appearance embedding (512 bytes), and metadata (32 bytes). Your colleague says "tracking memory is negligible compared to the model."'
question: 'Is tracking memory truly negligible, and when does it become a bottleneck?'
details:
  realistic_solution: 'Per-track static memory is 892 bytes. At 2500 total tracks, it''s 2.23 MB, which is negligible capacity. The real cost is dynamic bandwidth: without spatial indexing, computing embedding distances requires streaming 512 bytes per track for every detection. At 30 FPS, this burns nearly 2 GB/s of LPDDR5 bandwidth, bottlenecking the system.'
  common_mistake: |
    **The Pitfall:** Concluding that because the static memory footprint is small, it has no impact on system performance.
    **The Rationale:** It's easy to compare 2.23 MB against 8 GB RAM and dismiss it, confusing static capacity with dynamic memory bandwidth.
    **The Consequence:** Without spatial indexing, matching algorithms stream the entire history every frame, creating massive memory bandwidth spikes.
  napkin_math: |
    **Assumptions & Constraints:**
    - 2500 active tracks, 892 bytes each.
    - Embeddings: 512 bytes.
    - 50 new detections per frame at 30 FPS.

    **Calculations:**
    - Static Memory: 2500 * 892 bytes = 2.23 MB.
    - Dynamic Matching: 50 * 2500 * 512 bytes = 64 MB per frame.
    - Bandwidth Cost: 64 MB/frame * 30 FPS = 1.92 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 1.92 GB/s memory bandwidth consumed (Memory-Bandwidth-Bound)**. Dynamic tracking requires robust spatial indexing to mitigate.
