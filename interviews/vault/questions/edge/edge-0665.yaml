title: The Object Tracking Memory Budget
scenario: Your warehouse robot uses a Qualcomm RB5 (15 TOPS, 8 GB LPDDR5) to track inventory items on shelves. During a busy warehouse scan, the tracker maintains state for up to 500 objects simultaneously. Each track stores a bounding box (16 bytes), velocity vector (8 bytes), Kalman filter state (9x9 float matrix = 324 bytes), appearance embedding (128 floats = 512 bytes), and metadata (32 bytes). Your colleague says "tracking memory is negligible compared to the model."
question: Is tracking memory truly negligible, and when does it become a bottleneck?
details:
  realistic_solution: 'Per-track memory: 16 + 8 + 324 + 512 + 32 = **892 bytes**. At 500 tracks: 500 × 892 = **446 KB**. At 2500 total tracks, it''s **2.23 MB**. That''s indeed small compared to a 40 MB model. But the real cost is in the operations, not the storage: without spatial indexing, computing embedding distances requires streaming 512 bytes per track for every detection. At 30 FPS, this burns 1.92 GB/s of memory bandwidth, bottlenecking the system.'
  common_mistake: |
    **The Pitfall:** Concluding that because the static memory footprint of object tracks is small (a few MBs), it has no impact on system performance.
    **The Rationale:** It's easy to compare 2.23 MB of state memory against an 8 GB LPDDR5 chip and dismiss it as irrelevant, confusing static capacity with dynamic memory bandwidth.
    **The Consequence:** Without spatial indexing, matching algorithms stream the entire embedding history for every frame, creating massive memory bandwidth spikes that bottleneck the entire Qualcomm RB5 system.
  napkin_math: |
    1. **Static Memory:** 500 active tracks * 892 bytes = 446 KB. Small and negligible.
    2. **Dynamic Matching:** 50 new detections * 2500 historical tracks * 512 bytes (embedding distance) = 64 MB per frame.
    3. **Bandwidth Cost:** 64 MB/frame * 30 FPS = 1.92 GB/s of continuous memory bandwidth.
    4. **Result:** Tracking consumes nearly **4% of the total 51.2 GB/s LPDDR5 bandwidth**. Implementing spatial indexing to limit candidates to 50 reduces this 50x to a negligible **38.4 MB/s**.
