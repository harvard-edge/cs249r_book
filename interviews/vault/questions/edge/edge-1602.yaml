title: Hailo-8 MobileNetV2 Block Compute and Memory
scenario: You are deploying an inverted residual block from MobileNetV2 onto a Hailo-8 accelerator. The block takes an INT8 input tensor of 56x56x144, expands it by a factor of 6 using a 1x1 convolution, applies a 3x3 depthwise convolution, and projects it back to 144 channels.
question: For the MobileNetV2 block on Hailo-8, what are the total INT8 ops and minimum host transfer bytes when intermediates stay on-chip?
details:
  realistic_solution: 'Calculate ops for the three distinct layers (expansion, depthwise, projection) factoring in the expansion ratio. Due to the Hailo-8''s dataflow architecture, only the initial input and final output tensors traverse the host interconnect; intermediate 864-channel activations remain entirely on-chip.'
  common_mistake: |
    **The Pitfall:** Treating depthwise convolution as a standard convolution or assuming intermediate activations transfer to the host.
    **The Rationale:** Candidates overlook the definition of depthwise FLOPs and fail to leverage the dataflow compiler's layer fusion.
    **The Consequence:** Drastically overestimating both compute operations and memory transfer requirements.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Input/Output: 56x56x144 (INT8 = 1 byte/element)
       - Expansion factor: 6 (Internal channels = 864)
       - Dataflow architecture keeps intermediates on-chip.
    2. **Calculations:**
       - Expansion 1x1 ops: (56 * 56) * 144 * 864 * 2 = ~780.3M
       - Depthwise 3x3 ops: (56 * 56) * 864 * (3 * 3) * 2 = ~48.7M
       - Projection 1x1 ops: (56 * 56) * 864 * 144 * 2 = ~780.3M
       - Total ops = 1.61 GOPs.
       - Host Transfer: Input (451.5 KB) + Output (451.5 KB) = ~903 KB.
    3. **Conclusion & Interpretation:**
       - **Result: 1.61 GOPs Compute, 903 KB Transfer.** Layer fusion drops the massive intermediate transfer cost, requiring only the edges to hit the host bus.
