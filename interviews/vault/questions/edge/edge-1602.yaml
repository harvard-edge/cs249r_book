title: Hailo-8 MobileNetV2 Block Compute and Memory
scenario: You are deploying an inverted residual block from MobileNetV2 onto a Hailo-8 accelerator. The block takes an INT8 input tensor of 56x56x144, expands it by a factor of 6 using a 1x1 convolution, applies a 3x3 depthwise convolution (stride 1), and projects it back to 144 channels using a 1x1 convolution.
question: For the MobileNetV2 block on Hailo-8, what are the total INT8 ops and minimum host transfer bytes when intermediates stay on-chip?
details:
  realistic_solution: 'The correct approach involves calculating the operations for the three distinct layers: 1x1 expansion, 3x3 depthwise, and 1x1 projection, recognizing the expansion factor of 6 increases the internal channels to 864. For memory transfer, the candidate should identify that because of the dataflow architecture, only the initial input block and the final output block need to traverse the host-accelerator interconnect.'
  common_mistake: |
    **The Pitfall:** Treating depthwise convolution as a standard convolution or assuming intermediate activations are written to host.
    **The Rationale:** Candidates overlook the definition of depthwise convolutions and the dataflow nature of the Hailo-8.
    **The Consequence:** Drastically overestimating both compute operations and memory transfer requirements.
  napkin_math: |
    * Internal channels: 144 * 6 = 864
    * Expansion 1x1 ops: (56 * 56) * 144 * 864 * 2 = 780,337,152
    * Depthwise 3x3 ops: (56 * 56) * 864 * (3 * 3) * 2 = 48,771,072
    * Projection 1x1 ops: (56 * 56) * 864 * 144 * 2 = 780,337,152
    * Total compute ops: 780.3M + 48.7M + 780.3M = **1,609,445,376 ops (~1.61 GOPs)**
    * Input transfer: 56 * 56 * 144 = 451,584 bytes
    * Output transfer: 56 * 56 * 144 = 451,584 bytes
    * **Minimum memory transfer: 903,168 bytes (~903 KB) per pass.**
