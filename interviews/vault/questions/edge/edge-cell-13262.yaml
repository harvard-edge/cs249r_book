title: 'Edge Transformer Fluency: Memory-Bandwidth-Bound Decode Calculation'
scenario: 'In an interview, you are asked to quickly estimate maximum decode throughput for a 3B INT4
  model on Jetson Orin NX. Model weights: 3B params × 0.5B/param (INT4) = 1.5GB. Jetson Orin NX memory
  bandwidth: 64 GB/s. For batch=1 decode (memory-bandwidth-bound), what is the maximum tokens/second?
  For batch=8, assuming 8× throughput improvement, what is tokens/second total and per request?'
details:
  realistic_solution: 'KV at context=256 with 32 layers, 32 heads, head_dim=128, fp16: 32×2×32×128×256×2B
    = 134MB ≈ 128MB (not 1.07GB which uses context=2048 or larger).'
  common_mistake: Forgetting that INT4 halves the weight bytes loaded compared to INT8; 3B params × 4
    bits / 8 bits/byte = 1.5GB, not 3GB.
  napkin_math: 'KV cache at context=256, 8-layer model, 32 KV heads, head_dim=128, fp16: 8 layers × 2(K+V)
    × 32 heads × 128 dim × 256 context × 2B = 8×2×32×128×256×2 = 8×2×32×128×256×2. Calculating: 8×2=16;
    16×32=512; 512×128=65,536; 65,536×256=16,777,216; ×2=33,554,432 bytes ≈ 32MB. But Gemini says 128MB.
    With 32 layers: 32×2×32×128×256×2 = 32×32MB/8layers×32layers = 128MB. Fix: 32 layers (not 8): 32×2×32×128×256×2
    = 134,217,728 bytes = 128MB.'
