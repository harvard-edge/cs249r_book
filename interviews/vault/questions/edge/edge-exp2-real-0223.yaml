title: Privacy Guardrail Pipeline on Dataflow Edge
scenario: You are deploying a smart-city pedestrian tracking system on a Hailo-8 edge node (26 TOPS INT8,
  2.5W, dataflow accelerator, no local DRAM, streams from host memory). To satisfy strict privacy governance
  guardrails, a PII redaction model must blur faces in real-time before the tracking model processes the
  feed. Both models operate sequentially on 1080p RGB video at 30 FPS. How do you design this dual-model
  pipeline and size the required host-accelerator memory bandwidth given the hardware constraints?
question: "How do you design this dual-model pipeline and size the required host-accelerator memory bandwidth given the hardware constraints?"
details:
  realistic_solution: The optimal approach evaluates the dataflow architecture and fuses the PII redaction
    guardrail and tracking models into a single compiled dataflow graph. By chaining them on-chip, the
    high-bandwidth intermediate activations remain within the Hailo-8's internal SRAM fabric, enforcing
    the privacy guardrail seamlessly while strictly minimizing expensive host memory access.
  common_mistake: Candidates often treat the guardrail and tracking models as independent steps managed
    by the host CPU, streaming the high-resolution 1080p intermediate tensor back and forth. They fail
    to recognize that without local DRAM, host-streaming intermediate activations creates a massive PCIe/host
    memory bandwidth bottleneck that starves the accelerator.
  napkin_math: '1080p RGB frame = 1920 * 1080 * 3 bytes = 6.22 MB. At 30 FPS, one stream requires 186.6
    MB/s. Host-managed independent pipeline: Raw to Hailo (186.6 MB/s) + Redacted to Host (186.6 MB/s)
    + Redacted back to Hailo (186.6 MB/s) = 559.8 MB/s total host bandwidth. Fused dataflow pipeline:
    Raw to Hailo (186.6 MB/s) + Tracker output to Host (<1 MB/s) = ~187 MB/s. Given the 2.5W power budget
    and no local DRAM, saving ~373 MB/s of host streaming bandwidth ensures the 26 TOPS INT8 engine operates
    efficiently without IO stalling.'
