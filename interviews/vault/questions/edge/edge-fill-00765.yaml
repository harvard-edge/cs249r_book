title: 'Hardware-aware NAS for Hailo-8: Latency and Memory Constraints'
scenario: You are tasked with deploying a real-time object detection model on the Hailo-8 edge AI accelerator
  (26 TOPS INT8, 2.5W). Your current MobileNetV3-based architecture is exhibiting high latency for certain
  layers and exceeding the available SRAM budget on the device. Describe how you would approach identifying
  the bottlenecks and propose a quantitative method to assess if a modified layer (e.g., with reduced
  kernel size or channels) would meet a new target latency of 5ms or a memory footprint of 50KB for feature
  maps.
question: "How would you identify Hailo-8 layer bottlenecks and estimate whether a modified layer meets 5ms latency or 50KB feature-map memory?"
details:
  realistic_solution: 'A realistic solution involves creating a hardware-aware cost function that models
    both computational and memory aspects. For latency, estimate cycles per layer by considering the number
    of INT8 MAC operations, Hailo-8''s specific dataflow architecture (e.g., pipelining, parallelism capabilities),
    and critical memory access overheads. The formula would be an aggregate of: (Number of INT8 MACs)
    / (Effective INT8 TOPS * 10^12) * (Empirical or modeled pipeline/memory access penalty factor). For
    memory, calculate the total bytes for weights and activations (feature maps) for the layer, accounting
    for INT8 quantization (1 byte per value). This means summing (tensor_dims * num_channels * 1 byte)
    for all relevant tensors. These metrics would then be used within a NAS loop to guide architecture
    search or pruning decisions, ensuring the generated models fit the Hailo-8''s constraints.'
  common_mistake: Candidates might focus only on FLOPs/TOPS without considering memory access patterns,
    data movement, or the actual energy cost of SRAM vs. DRAM access on the Hailo-8. Another common mistake
    is not accounting for the quantized INT8 operations and their impact on effective throughput and memory,
    often assuming floating-point calculations.
  napkin_math: 'For a single convolutional layer with input feature map (H_in, W_in, C_in), output (H_out,
    W_out, C_out), kernel (K, K), and stride (S), the number of INT8 MAC operations is approximately:
    (H_out * W_out * K * K * C_in * C_out). If the Hailo-8 has 26 TOPS, its ideal processing rate is 26
    * 10^12 operations/second. So, a simplified ideal latency for this layer (ignoring data movement and
    parallelization): Latency ≈ (Total INT8 MACs) / (26 * 10^12). For memory, an intermediate feature
    map of (H, W, C) using INT8 values consumes H * W * C * 1 byte. For example, a 7x7x128 feature map
    requires 7*7*128*1 byte = 6272 bytes (~6.1KB). If a layer has 100 GMACs (100 * 10^9 MACs), its ideal
    processing time would be (100 * 10^9) / (26 * 10^12) ≈ 0.0038 seconds = 3.8ms. This gives a lower
    bound for latency; actual latency will be higher due to overheads.'
