title: Hailo-8 Fairness Evaluation Energy & Disparity
scenario: >-
  You are deploying a pedestrian detection model on a smart city camera powered by a Hailo-8 dataflow accelerator (26 TOPS INT8, 2.5W, no local DRAM). To evaluate Equal Opportunity across two demographic subgroups before deployment, you stream a validation dataset of 13,000 frames. The model requires 130 GOPS per inference. Subgroup A has 900 True Positives and 100 False Negatives, while Subgroup B has 700 True Positives and 300 False Negatives.
question: What are the Equal Opportunity TPR disparity, theoretical FPS, and total accelerator energy for the 13,000-frame validation run?
details:
  realistic_solution: 'Equal Opportunity focuses strictly on the True Positive Rate (TPR) difference between subgroups. For hardware performance, divide peak TOPS by per-frame GOPS to get FPS, use that to find total processing time, and multiply by the 2.5W TDP to find energy in Joules.'
  common_mistake: |
    **The Pitfall:** Confusing TPR with overall accuracy for fairness, or flubbing hardware conversions.
    **The Rationale:** Candidates rely on standard "accuracy" instead of recalling the strict definition of Equal Opportunity.
    **The Consequence:** They miscalculate the algorithmic bias metrics, and simultaneously fail to accurately estimate physical energy consumption in Joules.
  napkin_math: |
    1. **TPR A:** `900 / (900 + 100) = 0.90`.
    2. **TPR B:** `700 / (700 + 300) = 0.70`.
    3. **TPR Disparity:** `0.90 - 0.70 = 0.20`.
    4. **Throughput:** `26 TOPS (26,000 GOPS) / 130 GOPS/frame = 200 FPS`.
    5. **Time:** `13,000 frames / 200 FPS = 65 seconds`.
    6. **Result:** Evaluation Energy Cost = `65 seconds * 2.5 Watts = 162.5 Joules`.
