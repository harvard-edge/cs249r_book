title: Shadow Deployment Architecture on Jetson Orin
scenario: You are designing a shadow deployment pipeline for an autonomous robotics
  fleet operating on the NVIDIA Jetson Orin platform (32 GB LPDDR5, 275 TOPS INT8,
  60W TDP). The current production computer vision model runs on the Ampere GPU, utilizing
  14 GB of memory and drawing 35W of power during peak load. You need to architect
  a mechanism to seamlessly deploy and evaluate a new experimental model alongside
  the production model in a shadow mode, processing the same live camera feeds without
  introducing latency to the critical path or exceeding hardware constraints.
question: How would you run a shadow vision model on Jetson Orin without adding production
  latency or exceeding the 32 GB, 60W limits?
details:
  realistic_solution: Architect the system using containerized isolation to restrict
    the shadow model's resources. To stay within power and compute budgets, compile
    the shadow model specifically for the DLA (Deep Learning Accelerator) using INT8
    quantization, leaving the Ampere GPU dedicated to the production model. Implement
    a separate low-priority background process for the shadow model that drops frames
    if processing falls behind, ensuring the production model's latency requirements
    are strictly met.
  common_mistake: Candidates often suggest running both models in parallel on the
    GPU without considering the strict 60W TDP and memory bandwidth limits, which
    would lead to thermal throttling or OOM errors. Another mistake is failing to
    isolate the shadow model's failure domains, allowing an experimental model crash
    to bring down the main inference process.
  napkin_math: 'Total Memory: 32 GB. Allocated: OS (4 GB) + Prod Model (14 GB) = 18
    GB used, leaving 14 GB for the shadow model. Power Budget: 60W TDP. Current Prod
    Model + System: ~40W. Remaining Power: 20W. The Ampere GPU cannot support a second
    identical model without exceeding the 60W limit. By targeting the DLA for the
    shadow model (which operates at ~5-10W), the total system power remains safely
    around 45-50W, well under the 60W TDP limit.'
