title: Shadow Deployment Architecture on Jetson Orin
scenario: You are designing a shadow deployment pipeline for an autonomous robotics fleet operating on the NVIDIA Jetson Orin platform. The current production computer vision model runs on the Ampere GPU, utilizing 14 GB of memory and drawing 35W of power during peak load. You need to architect a mechanism to seamlessly deploy and evaluate a new experimental model alongside the production model in a shadow mode, processing the same live camera feeds.
question: "How would you run a shadow vision model on Jetson Orin without adding production latency or exceeding the 32 GB, 60W limits?"
details:
  realistic_solution: Architect the system using containerized isolation to restrict the shadow model's resources. To stay within power and compute budgets, compile the shadow model specifically for the DLA (Deep Learning Accelerator) using INT8 quantization, leaving the Ampere GPU dedicated to the production model. Implement a separate low-priority background process for the shadow model that drops frames if processing falls behind, ensuring the production model's latency requirements are strictly met.
  common_mistake: |
    **The Pitfall:** Proposing to run both models in parallel on the GPU.
    **The Rationale:** Assuming that if it fits in memory, it will run without issues.
    **The Consequence:** Exceeding the strict 60W TDP limit, leading to severe thermal throttling, OOM errors, or system crashes that impact the production critical path.
  napkin_math: |
    *   **Memory:** 32 GB total. OS (4 GB) + Prod Model (14 GB) = 18 GB used, leaving 14 GB for the shadow model.
    *   **Power:** 60W TDP. Prod Model + System ≈ 40W. Remaining Power = 20W.
    *   **Constraint:** The GPU cannot support a second identical model (requires another 35W) without exceeding the 60W limit.
    *   **Result:** Targeting the DLA for the shadow model (5-10W) keeps total system power safely around **45-50W**.
