title: Jetson Orin LLM Inference VRAM Budgeting Components
scenario: You are tasked with deploying a 7B parameter Large Language Model (LLM) for inference on an NVIDIA Jetson Orin, which features 32 GB LPDDR5, 275 TOPS INT8, and a 60W power envelope. The LLM's weights and activations are stored in bfloat16 format, and you plan to run inference with a batch size of 1.
question: What memory beyond the 7B BF16 weights must fit in Jetson Orin's 32 GB LPDDR5, and what formulas estimate each footprint?
details:
  realistic_solution: 'A realistic solution involves a systematic breakdown of all VRAM-consuming elements: (1) Model Weights, (2) Activations, and (3) KV-Cache (Key-Value cache). Each component''s size must be estimated based on its respective properties (e.g., number of parameters, batch size, sequence length, number of layers, hidden size, and data type). While empirical validation with profiling tools is crucial post-deployment, initial budgeting relies on these estimations.'
  common_mistake: |
    **The Pitfall:** Forgetting the dynamic memory footprint of transformers.
    **The Rationale:** Engineers often exclusively budget for the static weights of the model on disk.
    **The Consequence:** They drastically underestimate VRAM consumption by ignoring activations and the KV-cache, leading to sudden runtime OOMs as sequence lengths grow.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Jetson Orin: 32 GB LPDDR5.
       - Model: 7B parameters, Batch=1, Seq_Len=2048, 32 Layers, 32 Heads, Head_Dim=128, BF16 (2 bytes).
    2. **Calculations:**
       - Model Weights = 7B * 2 bytes = 14 GB.
       - KV-Cache = Batch * Max_Seq_Len * Layers * 2 (K&V) * Heads * Head_Dim * 2 bytes.
       - KV-Cache = 1 * 2048 * 32 * 2 * 32 * 128 * 2 = 1,073,741,824 bytes = 1 GB.
    3. **Conclusion & Interpretation:**
       - **Result: 1 GB KV-Cache**. While the static weights use 14 GB, the dynamic KV-cache actively consumes an additional 1 GB at sequence length 2048, threatening sudden OOMs if ignored.
