title: Evaluating 4-bit AWQ versus INT8 on Coral Edge TPU
scenario: Your team is deploying a real-time vision model to a fleet of drones equipped
  with Google Coral Edge TPUs (4 TOPS INT8, 2W). A researcher proposes using a 4-bit
  AWQ (Activation-aware Weight Quantization) approach to compress the model further,
  arguing the 2x memory bandwidth savings will improve latency. You need to evaluate
  this extreme quantization proposal against a standard INT8 Quantization-Aware Training
  (QAT) pipeline and make a system-level architectural decision.
question: Should you adopt 4-bit AWQ or standard INT8 QAT for the Coral Edge TPU drone
  model, and why?
details:
  realistic_solution: Reject the 4-bit AWQ proposal and enforce standard INT8 QAT.
    The Google Coral Edge TPU's ALUs are strictly designed for INT8. Using 4-bit weights
    means the Edge TPU compiler will fail to map the operators to the TPU, forcing
    a fallback to the host CPU for execution or requiring expensive software dequantization
    kernels. To achieve the advertised 4 TOPS at 2W, the entire model must be mapped
    to native INT8 operations.
  common_mistake: Candidates often assume that lower precision always yields higher
    throughput, failing to recognize that the Coral Edge TPU lacks hardware support
    for sub-8-bit datatypes or the complex on-the-fly decompression required by AWQ.
    They might mistakenly approve the 4-bit approach for edge deployment.
  napkin_math: 'INT8 on TPU: 4 TOPS (4000 GOPS) at 2W = 2000 GOPS/W. 4-bit fallback
    to a typical host ARM CPU (e.g., ~20 GOPS peak). Even if 4-bit halves the memory
    fetch (e.g., 5MB instead of 10MB), the compute bound takes over: 4000 / 20 = 200x
    latency penalty by falling back to CPU, completely negating any memory bandwidth
    gains and draining the system battery.'
