title: Evaluating 4-bit AWQ versus INT8 on Coral Edge TPU
scenario: Your team is deploying a real-time vision model to a fleet of drones equipped with Google Coral Edge TPUs (4 TOPS INT8, 2W). A researcher proposes using a 4-bit AWQ (Activation-aware Weight Quantization) approach to compress the model further, arguing the 2x memory bandwidth savings will improve latency. You need to evaluate this extreme quantization proposal against a standard INT8 QAT pipeline and make a system-level architectural decision.
question: Should you adopt 4-bit AWQ or standard INT8 QAT for the Coral Edge TPU drone model, and why?
details:
  realistic_solution: Reject the 4-bit AWQ proposal and enforce standard INT8 QAT. The Google Coral Edge TPU's ALUs are strictly designed for INT8. Using 4-bit weights means the Edge TPU compiler will fail to map the operators to the TPU, forcing a fallback to the host CPU for execution or requiring expensive software dequantization kernels. To achieve the advertised 4 TOPS at 2W, the entire model must be mapped to native INT8 operations.
  common_mistake: |
    **The Pitfall:** Approving the 4-bit AWQ approach to save memory bandwidth.
    **The Rationale:** In LLM inference, memory bandwidth is the bottleneck, so lower precision always seems better. Candidates incorrectly apply this heuristic here.
    **The Consequence:** The model fails to compile for the TPU, falling back to the CPU, which triggers a massive 200x latency penalty and drains the battery.
  napkin_math: |
    - **TPU Performance:** INT8 runs at 4 TOPS (4000 GOPS) at 2W.
    - **CPU Fallback:** 4-bit operations fall back to the host ARM CPU, yielding ~20 GOPS peak.
    - **Performance Penalty:** 4000 GOPS / 20 GOPS = **200x latency penalty**.
    - **Conclusion:** CPU compute bounds completely negate any memory bandwidth gains.
