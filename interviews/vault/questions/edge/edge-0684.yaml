title: The Shared Bandwidth Bottleneck
scenario: A next-gen edge AI SoC features a 100 TOPS NPU, a 500 GFLOPS GPU, and a multi-core CPU. All units are theoretically capable of high throughput. However, when running a complex vision pipeline where the CPU does pre-processing, the GPU handles a filter, and the NPU performs inference concurrently, overall system throughput crashes and all units show low utilization.
question: What is the most probable system-level bottleneck, and how would you redesign the system to mitigate it?
details:
  realistic_solution: "The most probable system-level bottleneck is **shared memory bandwidth contention**. All these powerful processing units (CPU, GPU, NPU) share access to the same external DRAM controller and memory bus. The aggregate bandwidth demand exceeds the LPDDR memory system's capacity."
  common_mistake: |
    **The Pitfall:** Blaming software scheduling or synchronization delays.
    **The Rationale:** Because the compute units are incredibly powerful, candidates assume the software stack is failing to keep them busy.
    **The Consequence:** Time is wasted tweaking thread priorities or kernel launch parameters instead of addressing the fundamental physical limitation of the memory bus.
  napkin_math: |
    * **System Memory Bandwidth:** Typical LPDDR5 provides ~68 GB/s.
    * **CPU Demand:** Pre-processing 1080p 60FPS requires ~1.5 GB/s.
    * **GPU Demand:** FP16 texture filtering demands ~40 GB/s.
    * **NPU Demand:** Dense transformer weights demand ~35 GB/s.
    * **Total Bandwidth Demand:** 1.5 + 40 + 35 = **76.5 GB/s**.
    * **Result:** 76.5 GB/s > 68 GB/s. The memory controller saturates, starving all high-performance compute units and dropping overall utilization.
