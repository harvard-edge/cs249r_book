title: The Shared Bandwidth Bottleneck
scenario: Your company develops a next-gen edge AI SoC featuring a 100 TOPS NPU, a 500 GFLOPS GPU, and
  a powerful multi-core CPU. All units are theoretically capable of high throughput. However, when running
  a complex vision pipeline where the CPU does pre-processing, the GPU handles a custom filter, and the
  NPU performs inference, the overall system throughput is significantly lower than individual unit benchmarks,
  and all units show low average utilization. What is the most probable system-level bottleneck, and how
  would you redesign the system to mitigate it?
question: "What is the most probable system-level bottleneck, and how would you redesign the system to mitigate it?"
details:
  realistic_solution: "The most probable system-level bottleneck is **shared memory bandwidth contention**.\
    \ All these powerful processing units (CPU, GPU, NPU) typically share access to the same external\
    \ DRAM controller and memory bus.\n  1.  **Concurrent Demands:** The CPU performing memory-intensive\
    \ pre-processing (e.g., image decoding, resizing), the GPU fetching/writing texture data for its filter,\
    \ and the NPU pulling model weights and activations from DRAM are all simultaneously demanding significant\
    \ bandwidth from the same limited pool.\n  2.  **Saturation:** The aggregate memory bandwidth demand\
    \ from these units can easily exceed the total available bandwidth of the LPDDR memory system. When\
    \ this happens, all units stall, waiting for data, leading to low utilization across the board.\n\
    \  3.  **Memory Controller QoS:** While memory controllers often have Quality of Service (QoS) mechanisms,\
    \ they might not effectively prevent saturation or adequately prioritize critical traffic, leading\
    \ to starvation for some units."
  common_mistake: '"Each unit is powerful, so it must be software scheduling issues or synchronization
    delays." While these can contribute, low utilization across all units points to a deeper shared resource
    contention.'
  napkin_math: An SoC has 68 GB/s LPDDR5 bandwidth. CPU pre-processing (1080p RGB images at 60 FPS) requires
    continuous read/write cycles ~1.5 GB/s. GPU filtering (reading/writing FP16 textures) demands ~40
    GB/s. NPU running a dense transformer requires ~35 GB/s for weight fetching alone. Total bandwidth
    demand = 1.5 + 40 + 35 = 76.5 GB/s. Since 76.5 GB/s > 68 GB/s max bandwidth, the memory controller
    saturates, causing all units to stall while waiting for data, leading to low utilization.
