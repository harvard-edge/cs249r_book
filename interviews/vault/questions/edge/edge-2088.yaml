title: Optimizing Real-time Edge Inference on Coral TPU for Defect Detection
scenario: You are tasked with deploying a real-time defect detection system on an industrial assembly line. High-resolution cameras (1080p, 30fps) feed video streams to an edge device equipped with a Google Coral Edge TPU. A lightweight INT8 object detection model runs on the TPU. However, the current system can only sustain 15 frames per second (fps), causing significant frame drops. The business requirement is to process the full 30 fps stream.
question: What bottlenecks are limiting the Edge TPU pipeline to 15 FPS, and how would you optimize and measure progress toward 30 FPS?
details:
  realistic_solution: "The primary bottleneck is rarely the raw inference capability of the Coral TPU for well-optimized INT8 models, but rather the data ingress pipeline. 1. Diagnosis: Use profiling tools to measure the latency of each stage. 2. Proposed Solution: Offload video decoding to hardware, optimize pre-processing, minimize data copies between memory regions (Zero-copy), and consider micro-batching. 3. Quantification: Measure time spent in the identified bottleneck stage before and after applying optimizations."
  common_mistake: |
    **The Pitfall:** Focusing solely on model optimization or assuming theoretical TOPS directly translate to application throughput.
    **The Rationale:** Candidates ignore the entire data pipeline, including video decoding, pre-processing, and CPU-to-TPU data transfer.
    **The Consequence:** Compute optimizations yield zero improvement because the CPU and memory bus are the actual bottlenecks.
  napkin_math: |
    * Target Time per Frame = 1000ms / 30 fps = 33.3 ms.
    * Current Time per Frame = 1000ms / 15 fps = 66.7 ms.
    * Overhead to Eliminate = 66.7 ms - 33.3 ms = **33.4 ms.**
    * Assumed TPU Inference Time = 12 ms.
    * Budget for Pre/Post-processing & Transfer = 33.3 ms - 12 ms = 21.3 ms.
    * Current overhead is ~54.7 ms (66.7 - 12), indicating a severe CPU/IO bottleneck.
    * 1080p frame transfer at 30 fps = 6.2 MB * 30 = 186 MB/s.
    * **Hardware decoding and zero-copy transfers are required to fit the 186 MB/s transfer within the 21.3 ms budget.**
