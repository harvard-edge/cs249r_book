title: Mmap RAM Tradeoffs for Edge TPU
scenario: You are analyzing a multi-process video pipeline on an embedded host connected to a Google Coral Edge TPU (4 TOPS INT8, 2W, USB form factor). Due to limited operator support, the object detection model is strictly quantized to INT8 and is 20MB in size. The system runs 5 independent processes that all load this exact same model file to perform inference. When using standard file read operations, the host RAM usage increases by 100MB. When switched to a memory-mapped (mmap) loading strategy, the host memory increase drops to just 20MB.
question: Why does mmap reduce host RAM from 100MB to 20MB for five Coral Edge TPU processes, and how do the INT8 weights still reach the TPU over the USB interface?
details:
  realistic_solution: "Standard file reads force the OS to allocate an isolated 20MB physical memory buffer for each of the 5 processes. Memory-mapping (mmap) allows the OS to load the 20MB file into a single physical memory region in the page cache, which is shared across the virtual memory spaces of all 5 processes. The Edge TPU delegate in each process simply passes a pointer to this shared host memory, allowing the driver to copy the INT8 weights over the USB connection to the TPU, drastically saving host RAM while preserving the 4 TOPS INT8 acceleration."
  common_mistake: |
    **The Pitfall:** Incorrectly assuming the Edge TPU accesses the memory-mapped file directly via zero-copy.
    **The Rationale:** Candidates forget the physical USB form factor requires the host driver to copy the memory-mapped weights to the device's local memory.
    **The Consequence:** Fundamental misunderstanding of edge device driver architecture and memory isolation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 5 processes loading a 20MB INT8 model
       - Standard read: 5 * 20MB = 100MB
    2. **Calculations:**
       - Mmap usage: 1 shared physical instance = 20MB
       - Host RAM savings = 100MB - 20MB = 80MB
    3. **Conclusion & Interpretation:**
       **Result: 80MB saved via page cache (Memory-Bound)**
