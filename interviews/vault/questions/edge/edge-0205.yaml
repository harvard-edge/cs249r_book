title: 'The Privacy-Preserving Driver Cam'
scenario: 'You''re on the driver monitoring team for a new electric vehicle. The system uses a camera to detect driver drowsiness. To improve the model, you need to train on data from thousands of drivers. One proposal is to upload all video clips to the cloud. An alternative is to use Federated Learning.'
question: 'From a system design perspective, what is the primary reason a company would choose Federated Learning over centralized data collection for driver monitoring?'
details:
  realistic_solution: 'The primary reason is to protect user privacy and reduce liability. Sending raw, sensitive video data from inside a person''s car to a central server is a massive privacy risk. Federated Learning avoids this by keeping the data on the device and only transmitting anonymized, aggregated model updates. This design is privacy-preserving by default.'
  common_mistake: |
    **The Pitfall:** Assuming Federated Learning's main purpose is to reduce overall compute cost or improve model accuracy.
    **The Rationale:** Candidates know edge computing often saves server costs, so they wrongly extend this to FL training, which is actually computationally heavier.
    **The Consequence:** Misunderstanding the trade-offs and choosing FL when privacy isn't a strict requirement, needlessly increasing system complexity.
  napkin_math: |
    **Assumptions & Constraints:**
    - Data volume: 1 hour of 1080p video per driver/day across 100,000 vehicles.
    - Privacy constraint: Raw video transmits identifiable faces and behaviors.

    **Calculations:**
    - Centralized storage demands massive bandwidth and storage costs.
    - FL transmits only model weight updates (MBs instead of GBs).

    **Conclusion & Interpretation:**
    - **Result: MBs instead of GBs (Network/Privacy-Bound)**. Transmitting weight updates completely bypasses the privacy risk of raw video storage.
  options:
  - 'To reduce total training compute cost by distributing it to the edge.'
  - 'To achieve higher model accuracy than is possible with centralized training.'
  - 'To preserve user privacy by keeping raw video data on the vehicle.'
  - 'To allow model training even when vehicles have zero network connectivity.'
