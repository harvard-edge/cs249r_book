title: 'Model Size Estimation: Diagnose GPU Memory OOM on Jetson Orin for Batch Inference'
scenario: A Jetson Orin deployment OOMs (CUDA error: out of memory) when increasing batch size from 4 to 8 for a YOLOv8-l model (43.7M params FP16, 165 GFLOPs). At batch=4 it uses 3.2GB.
question: What is causing the OOM when moving from batch 4 to 8, and what maximum batch size should fit on the Jetson Orin?
details:
  realistic_solution: 'Weights: 87.4MB (FP16). At batch=4: 3.2GB total includes all activations for batch=4 simultaneously. Per-item activation: ~780MB. At batch=8: 8×780MB = 6.24GB activations + 87.4MB weights = ~6.4GB. The Jetson Orin has 32GB LPDDR5 (shared), with ~25GB available for inference. An OOM at batch=8 means the memory spike is not from linear activation scaling but likely due to fragmentation or other system memory consumers (like the camera ISP or OS buffering).'
  common_mistake: |
    **The Pitfall:** Assuming memory scales perfectly linearly with batch size without considering fragmentation or other system consumers.
    **The Rationale:** Candidates assume that because batch 4 takes 3.2GB, batch 8 should only take 6.4GB and easily fit in the ~26GB available VRAM.
    **The Consequence:** Failing to diagnose memory fragmentation or OS/ISP memory consumers, leaving the OOM unresolved.
  napkin_math: |
    - **Memory Budget:** Jetson Orin shared LPDDR5 = 32GB. OS+CPU overhead = 6GB. GPU available = 26GB.
    - **Batch=4:** 3.2GB. Memory per batch item: 3.2GB / 4 = 0.8GB.
    - **Batch=8 expected:** 6.4GB.
    - **Conclusion:** 6.4GB fits easily in 26GB. OOM at batch=8 indicates fragmentation or other GPU memory users. Fix by using `nvidia-smi dmon` to check consumers or setting explicit memory limits (`--gpu-memory-fraction`).
