title: Power Budget Allocation for Multi-Model Pipeline on Jetson Orin 60W
scenario: A Jetson AGX Orin operates in 60W MODE with the following pipeline running sequentially or concurrently depending on hardware mapping. The models map to detection (GPU, 20W), tracking (CPU, 8W), segmentation (GPU, 25W), and postprocessing (CPU, 4W). System overhead (DRAM, storage, networking) utilizes a constant 10W.
question: What is the peak power of this Orin pipeline, and can DLA-offloading detection fit it within a 45W TDP?
details:
  realistic_solution: 'Use a steady-state streaming model: same-GPU stages serialize, while GPU, CPU work, DLA, and fixed system load can overlap across frames. Baseline GPU detection and segmentation cannot peak together, so GPU peak is max(20W,25W)=25W; CPU tracking and postprocessing are independent CPU loads that can overlap with the active accelerator stage, giving 25W + 8W + 4W + 10W = 47W, which misses a 45W TDP. DLA offloading detection reduces detection from 20W GPU to 5W DLA, but it also allows DLA detection to overlap with GPU segmentation in steady state, so peak becomes 5W + 25W + 8W + 4W + 10W = 52W. DLA offload alone does not fit 45W; fitting requires power-capping GPU segmentation to 18W, or serializing/throttling CPU work, so 5+18+8+4+10 = 45W.'
  common_mistake: |
    **The Pitfall:** Summing peak power for all components simultaneously.
    **The Rationale:** Engineers often overlook whether pipeline stages are fundamentally sequential or capable of concurrent execution on independent hardware blocks.
    **The Consequence:** Drastically overestimating peak power draw and unnecessarily restricting model capabilities.
  napkin_math: |
    **Assumptions & Constraints:**
       - Jetson Orin 60W mode. Target TDP = 45W.
       - Detection (GPU) = 20W, Segmentation (GPU) = 25W.
       - Tracking (CPU) = 8W, Postprocessing (CPU) = 4W. Base = 10W.
       - DLA Detection Offload = 5W.
       - Same-GPU stages serialize; independent CPU work, DLA, GPU, and fixed system load can overlap in steady-state streaming.
    **Calculations:**
       - Baseline Peak = max(20W GPU detection, 25W GPU segmentation) + 8W CPU + 4W CPU + 10W base = 47W (> 45W limit).
       - DLA Offload Peak = 5W DLA detection + 25W GPU segmentation + 8W CPU + 4W CPU + 10W base = 52W (> 45W limit).
       - Power-cap GPU to 18W: 5 + 18 + 8 + 4 + 10 = 45W.
    **Conclusion & Interpretation:**
       - **Result: DLA offload alone is insufficient; power-capping or serialization is required.** With this scheduling model, the 45W target is met only after reducing GPU segmentation to 18W or removing equivalent concurrent load.
