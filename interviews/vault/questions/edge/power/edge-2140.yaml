title: Power Budget Allocation for Multi-Model Pipeline on Jetson Orin 60W
scenario: A Jetson AGX Orin operates in 60W MODE with the following pipeline running sequentially or concurrently depending on hardware mapping. The models map to detection (GPU, 20W), tracking (CPU, 8W), segmentation (GPU, 25W), and postprocessing (CPU, 4W). System overhead (DRAM, storage, networking) utilizes a constant 10W.
question: What is the peak power of this Orin pipeline, and can DLA-offloading detection fit it within a 45W TDP?
details:
  realistic_solution: 'Sequential pipeline: GPU handles detection and segmentation in sequence. Peak GPU power: max(20W, 25W) = 25W. Concurrent GPU+CPU scenario: GPU 25W + CPU tracking 8W + CPU postprocessing 4W + system 10W = 47W > 45W. Adding DLA for detection: DLA ~5W vs GPU 20W for detection. New pipeline: DLA detection (5W) || GPU segmentation (25W). Peak: DLA 5W + GPU 25W + CPU 8W + CPU 4W + system 10W = 52W > 45W. Solution: reduce GPU segmentation to power-cap mode (18W): 5+18+8+4+10 = 45W exactly.'
  common_mistake: |
    **The Pitfall:** Summing peak power for all components simultaneously.
    **The Rationale:** Engineers often overlook whether pipeline stages are fundamentally sequential or capable of concurrent execution on independent hardware blocks.
    **The Consequence:** Drastically overestimating peak power draw and unnecessarily restricting model capabilities.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Jetson Orin 60W mode. Target TDP = 45W.
       - Detection (GPU) = 20W, Segmentation (GPU) = 25W.
       - Tracking (CPU) = 8W, Postprocessing (CPU) = 4W. Base = 10W.
       - DLA Detection Offload = 5W.
    2. **Calculations:**
       - Baseline Peak (Concurrent) = max(20,25) + 8 + 4 + 10 = 47W (> 45W limit).
       - DLA Offload Peak = 5(DLA) + 25(GPU) + 8(CPU) + 4(CPU) + 10(Base) = 52W (> 45W limit).
       - Power-cap GPU to 18W: 5 + 18 + 8 + 4 + 10 = 45W.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Capping Required**. Offloading detection to DLA allows concurrent execution but raises peak power to 52W. Power-capping the GPU segmentation to 18W enforces the strict 45W TDP constraint.
