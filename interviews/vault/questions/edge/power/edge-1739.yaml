title: Energy-Aware INT8 Throughput Under a 75W LPDDR4x Budget
scenario: Your team is deploying a multi-camera video analytics pipeline on an on-premise edge server. The system is strictly capped at the accelerator's 75W TDP limit, but requires maximizing INT8 inference throughput towards the theoretical 400 TOPS peak.
question: How would you design the execution strategy to maximize INT8 throughput under 75W while minimizing LPDDR4x access energy?
details:
  realistic_solution: Apply Horowitz energy principles, recognizing that an off-chip LPDDR4x access costs orders of magnitude more energy than an INT8 MAC operation. Use profiler energy and byte counters to favor fused kernels, SRAM-resident tiles, weight reuse, and high-arithmetic-intensity layers. Treat peak 400 TOPS as a compute ceiling, not a throughput guarantee; sustained throughput is bounded by the 75W power cap under the measured bytes-per-op traffic pattern.
  common_mistake: |
    **The Pitfall:** Focusing solely on compute utilization (TOPS) without accounting for DRAM access energy.
    **The Rationale:** Engineers optimize for maximum arithmetic throughput but ignore that moving data from LPDDR4x is orders of magnitude more expensive than computing it.
    **The Consequence:** The system hits the 75W power wall long before reaching the 400 TOPS peak due to massive DRAM energy consumption.
  napkin_math: |
    **Assumptions & Constraints:**
    - Power budget: 75 W (75 J/s).
    - Peak compute: 400 TOPS (400e12 ops/s).
    - INT8 compute energy term: ~0.1 pJ/op under the same TOPS counting convention used below.
    - Off-chip LPDDR4x access energy: ~100 pJ/byte.
    - Arithmetic Intensity: 100 ops/byte.

    **Calculations:**
    - If the accelerator tried to sustain peak 400 TOPS inside 75W, the total average energy budget would be 75 J/s / 400e12 ops/s = 0.1875 pJ/op.
    - That is a peak-throughput energy budget, not a required hardware energy rating; it shows the stated traffic pattern cannot run near peak inside 75W.
    - At 100 ops/byte, DRAM energy amortized per op = 100 pJ/byte / 100 ops/byte = 1.0 pJ/op.
    - Total energy per op estimate = 1.0 pJ/op (DRAM) + 0.1 pJ/op (MAC) = 1.1 pJ/op.
    - Approximate sustained upper bound under that traffic pattern = 75 J/s / 1.1e-12 J/op = about 68 TOPS.
    - To approach 400 TOPS, the memory term would need to fall below about 0.0875 pJ/op after the 0.1 pJ compute cost, requiring much higher reuse than 100 ops/byte.

    **Conclusion & Interpretation:**
    - **Result: ~68 TOPS Upper Bound at 100 ops/byte (Memory-Energy Bound)**. Under the stated counting convention and traffic profile, the system hits the power wall far below peak unless fusion, SRAM caching, and higher arithmetic intensity reduce LPDDR4x bytes per operation.
