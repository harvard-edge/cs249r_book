title: 'The Perpetual Sensor'
scenario: 'Design an edge ML system for a wildlife monitoring camera that needs to operate autonomously for 5 years on a small battery pack. It runs a lightweight object detection model only when motion is detected.'
question: 'What architecture and power management strategies would let a motion-triggered wildlife camera run for 5 years on a small battery pack?'
details:
  realistic_solution: 'Achieving 5-year battery life requires an ultra-low power architecture where the "sleep" state completely dominates the power budget. Utilize an Ultra-Low Power Microcontroller (ULP MCU) with deep sleep modes consuming nanoamps, coupled with a microwatt passive wake-up sensor (e.g., PIR). Power gate the dedicated ML accelerator entirely until a valid trigger occurs.'
  common_mistake: |
    **The Pitfall:** Recommending a very low-power ML chip and a huge battery without addressing idle current.
    **The Rationale:** Candidates focus solely on compute efficiency (TOPS/W) and ignore the idle state leakage.
    **The Consequence:** They miss that the "sleep" state dominates the power budget over a 5-year timespan, leading to battery depletion in months from static leakage.
  napkin_math: |
    **Assumptions & Constraints:**
    - Typical AA battery capacity ~ 2500 mAh.
    - Duration: 5 years = 43,800 hours.

    **Calculations:**
    - Required average current draw = 2500 mAh / 43,800 h.
    - Average current = 0.057 mA (57 \u00b5A).

    **Conclusion & Interpretation:**
    - **Result: 57 \u00b5A (Energy-Bound)**. The entire system must sleep at nanoamp (nA) levels to achieve the 57 \u00b5A average.
