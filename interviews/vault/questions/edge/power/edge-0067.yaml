title: The Silent Slowdown
scenario: Your edge AI camera achieves an impressive 50 FPS for YOLOv5s during initial tests. However, after 30 seconds of continuous operation, the framerate drops sharply to a consistent 15 FPS and stays there.
question: What is the most likely cause of this 'silent slowdown,' and how would you design the system to guarantee sustained performance?
details:
  realistic_solution: The most likely cause is thermal throttling. When the device's temperature exceeds a predefined threshold, the system automatically reduces the clock frequency (Dynamic Voltage and Frequency Scaling - DVFS) to prevent permanent thermal damage, cutting throughput significantly.
  common_mistake: |
    **The Pitfall:** Blaming the slowdown on a software bug or memory leak.
    **The Rationale:** Candidates see a performance degradation over time and default to software profiling rather than hardware physics.
    **The Consequence:** They waste weeks chasing memory leaks when the root cause is fundamentally thermal hardware limits.
  napkin_math: |
    **Assumptions & Constraints:**
    - Initial 50 FPS run uses an 8W operating point.
    - Passive cooling can sustain only 5W continuously.
    - After the thermal mass saturates, DVFS must reduce clocks enough to stay at or below 5W.

    **Calculations:**
    - Sustained power excess: 8W - 5W = 3W above the passive cooling limit.
    - The first 30 seconds use thermal capacitance, so the device can temporarily hold the 8W/50 FPS boost point.
    - Once the heat sink is saturated, the controller lowers voltage/frequency until package power is no more than 5W.
    - The observed 15 FPS is therefore the measured sustained throttled throughput, not a value derived by linear FPS/W scaling.

    **Conclusion & Interpretation:**
    - **Result: sustained power must be <=5W (Thermal-Bound)**. Guarantee sustained performance by designing cooling and power modes for the continuous 5W envelope, or by selecting a model/clock target whose validated steady-state throughput meets the FPS requirement without relying on short boost behavior.
