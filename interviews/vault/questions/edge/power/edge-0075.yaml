title: 'Thermal Headroom in a Sealed Enclosure'
scenario: 'Your edge AI device runs a 10W SoC (Jetson Orin Nano) inside an IP67-sealed polycarbonate enclosure on a factory floor. The enclosure thermal resistance is 4.5°C/W (junction-to-ambient). Ambient temperature ranges from 15°C (winter) to 45°C (summer, near furnaces). The SoC throttles at Tj = 97°C and shuts down at 105°C.'
question: 'What thermal headroom do you have in summer and winter, and what thermal-aware inference policy would you design?'
details:
  realistic_solution: 'In summer at 45C ambient, Tj = 45 + (10W x 4.5 C/W) = 90C. Throttle headroom = 97 - 90 = 7C, allowing only 11.6W burst before throttling. In winter at 15C: Tj = 60C, headroom = 37C, allowing 18.2W burst — 57% more compute capacity. Design a thermal-aware inference policy: read the SoC junction temperature sensor, and dynamically adjust model complexity (e.g., switch from YOLOv8-M to YOLOv8-N when Tj > 90C) or reduce frame rate. In summer, the system has virtually no burst headroom, so any model loading spike or multi-model burst risks immediate throttling.'
  common_mistake: |
    **The Pitfall:** Calculating steady-state temperature (90°C) and assuming there is no thermal risk since it is under 97°C.
    **The Rationale:** Candidates forget that 10W is an average power figure and that transient model loading spikes can easily exceed this, immediately triggering throttling in a system with long thermal time constants.
    **The Consequence:** The system is deployed without thermal-aware scheduling, leading to catastrophic frame drops or intermittent shutdowns during summer heat waves.
  napkin_math: |
    **Assumptions & Constraints:**
    - Enclosure thermal resistance: 4.5°C/W (junction-to-ambient).
    - SoC throttles at Tj = 97°C.
    - Average power: 10W.

    **Calculations:**
    - Summer steady-state (45°C ambient): Tj = 45°C + (10W * 4.5°C/W) = 90°C.
    - Summer headroom = 97°C - 90°C = 7°C. Max burst power = (7°C / 4.5°C/W) + 10W = 11.55W.
    - Winter steady-state (15°C ambient): Tj = 15°C + (10W * 4.5°C/W) = 60°C.
    - Winter headroom = 97°C - 60°C = 37°C. Max burst power = (37°C / 4.5°C/W) + 10W = 18.22W.

    **Conclusion & Interpretation:**
    - **Result: 6.6W Wasted Capacity (Thermal-Bound)**. Designing for summer worst-case wastes 6.6W of winter compute capacity; dynamic thermal-aware scheduling reclaims this.
