title: 'Thermal-Aware Inference Scheduler'
scenario: 'Your autonomous vehicle''s Jetson AGX Orin runs 5 perception models totaling 40W GPU power. The vehicle operates in Phoenix, Arizona (50°C ambient). After 20 minutes of continuous driving, the SoC hits its 97°C thermal throttle point and GPU clocks drop from 1.3 GHz to 0.9 GHz, increasing inference latency by 44%.'
question: 'How would you schedule 5 perception models to prevent thermal throttling while keeping safety-critical latency under 33ms?'
details:
  realistic_solution: 'Build a closed-loop thermal controller that dynamically adjusts the inference workload based on thermal trajectory prediction. Downsample non-critical tasks to shed compute load.'
  common_mistake: |
    **The Pitfall:** Proposing hardware cooling upgrades instead of software workload management.
    **The Rationale:** Candidates treat hardware as malleable, forgetting that automotive cooling systems are fixed for the TDP envelope.
    **The Consequence:** Failing to solve the software-level thermal control problem, allowing the system to throttle uncontrollably.
  napkin_math: |
    **Assumptions & Constraints:**
    - Starting temperature: 80°C.
    - Throttling point: 97°C.
    - Unmanaged rise rate: 0.5°C/min under 40W sustained.

    **Calculations:**
    - Time to throttle (unmanaged): (97 - 80) / 0.5 = 34 minutes.
    - Level 2 limit (33W): Rise rate drops to 0.2°C/min. Time to 97°C = 85 minutes.
    - Level 3 limit (30W): Allows thermal equilibrium at ~90°C.

    **Conclusion & Interpretation:**
    - **Result: 10W (25%) reduction needed (Thermal-Bound)**. Downsampling lower-tier models maintains the critical latency budget by removing thermal load.
