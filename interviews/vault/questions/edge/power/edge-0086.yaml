title: Thermal-Aware Inference Scheduler
scenario: Your autonomous vehicle's Jetson AGX Orin runs 5 perception models totaling 40W GPU power. The vehicle operates in Phoenix, Arizona (50°C ambient). After 20 minutes of continuous driving, the SoC hits its 97°C thermal throttle point and GPU clocks drop from 1.3 GHz to 0.9 GHz, increasing inference latency by 44%.
question: How would you schedule 5 perception models to prevent thermal throttling while keeping safety-critical latency under 33ms?
details:
  realistic_solution: Build a closed-loop thermal controller that dynamically adjusts the inference workload based on thermal trajectory prediction. Downsample non-critical tasks to shed compute load.
  common_mistake: |
    **The Pitfall:** Proposing hardware cooling upgrades instead of software workload management.
    **The Rationale:** Candidates treat hardware as malleable, forgetting that automotive cooling systems are fixed for the TDP envelope.
    **The Consequence:** Failing to solve the software-level thermal control problem, allowing the system to throttle uncontrollably.
  napkin_math: |
    **Assumptions & Constraints:**
    - Temperature at start of heavy sustained workload: 80°C.
    - Throttling point: 97°C.
    - Scenario observation: 40W sustained reaches 97°C after 20 minutes.
    - Approximate rise rate over that interval: (97°C - 80°C) / 20 min = 0.85°C/min.

    **Calculations:**
    - Unmanaged time to throttle: (97°C - 80°C) / 0.85°C/min = 20 minutes, matching the scenario.
    - Scheduler action before throttle: preserve safety-critical models under 33ms and shed non-critical compute when the predicted time-to-throttle falls below the control horizon.
    - Example derating target: reducing GPU load from 40W to 30W removes 10W, or 25% of the sustained GPU power.
    - With a simple proportional heat model, 30W would reduce the short-term rise rate to about 0.85 * (30/40) = 0.64°C/min; this is a control heuristic, not a guaranteed equilibrium temperature.

    **Conclusion & Interpretation:**
    - **Result: shed roughly 7-10W before throttle (Thermal-Bound)**. Downsample or skip lower-tier models early enough to keep the critical path under 33ms while reducing the thermal trajectory; the exact power target should be closed-loop from measured zone temperatures.
