title: Power Budgeting for Real-time Edge TPU Deployment
scenario: Your team is tasked with deploying a critical real-time object detection model on a fleet of devices powered by the Google Coral Edge TPU. The model requires 200 GOPS (INT8) per inference, and the system needs to sustain a minimum of 10 inferences per second (FPS). The Google Coral Edge TPU has a peak performance of 4 TOPS INT8 and a typical power budget (TDP) of 2W when active. The model is already fully quantized to INT8.
question: How would you ensure a 200 GOPS INT8 model sustains 10 FPS on the 2W Coral Edge TPU, and what power trade-offs would you analyze?
details:
  realistic_solution: 'A robust solution involves: 1. Energy-per-inference analysis. 2. Duty Cycle Management to optimize active/idle states. 3. Model Efficiency optimizations (pruning) if the power budget is too tight. 4. Thermal Monitoring to prevent throttling.'
  common_mistake: |
    **The Pitfall:** Overlooking the difference between peak theoretical TOPS and real-world sustained performance under power constraints.
    **The Rationale:** Candidates often assume the Edge TPU can always deliver 4 TOPS continuously without considering the 2W power budget or thermal throttling.
    **The Consequence:** Designing a system that overheats, throttles, and fails to meet real-time FPS requirements in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Coral Edge TPU: 4 TOPS peak INT8, 2W active power.
       - Model demand: 200 GOPS per inference. Target rate = 10 FPS.
    2. **Calculations:**
       - Total GOPS demand = 10 FPS * 200 GOPS = 2000 GOPS (2 TOPS).
       - Energy per second = 2W / 10 FPS = 0.2 Joules per inference.
    3. **Conclusion & Interpretation:**
       - **Result: 50% Duty Cycle Required**. Although 2 TOPS is mathematically within the 4 TOPS peak, sustaining it at 2W generates significant heat; strict duty cycle management is required to prevent thermal throttling.
