title: Power Budgeting for Real-time Edge TPU Deployment
scenario: Your team is tasked with deploying a critical real-time object detection model on a fleet of devices powered by the Google Coral Edge TPU. The model requires 200 GOPS (INT8) per inference, and the system needs to sustain a minimum of 10 inferences per second (FPS). The Google Coral Edge TPU has a peak performance of 4 TOPS INT8 and a typical power budget (TDP) of 2W when active. The model is already fully quantized to INT8.
question: How would you ensure a 200 GOPS INT8 model sustains 10 FPS on the 2W Coral Edge TPU, and what power trade-offs would you analyze?
details:
  realistic_solution: 'A robust solution first converts the workload to sustained demand: 10 FPS at 200 GOPS/inference requires 2 TOPS, or 50% of the 4 TOPS peak. Then validate whether the Coral can sustain that effective utilization inside the 2W thermal envelope using on-device latency, power, and temperature telemetry over long runs. If measured throughput drops below 10 FPS or temperature approaches the throttle point, reduce the model cost through pruning, smaller input resolution, operator fusion, or a lower target FPS, and use scheduling only for available idle gaps. Duty cycling is useful when average traffic is bursty, but it is not a substitute for sustaining the required 2 TOPS during continuous 10 FPS operation.'
  common_mistake: |
    **The Pitfall:** Overlooking the difference between peak theoretical TOPS and real-world sustained performance under power constraints.
    **The Rationale:** Candidates often assume the Edge TPU can always deliver 4 TOPS continuously without considering the 2W power budget or thermal throttling.
    **The Consequence:** Designing a system that overheats, throttles, and fails to meet real-time FPS requirements in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Coral Edge TPU: 4 TOPS peak INT8, 2W active power.
       - Model demand: 200 GOPS per inference. Target rate = 10 FPS.
    2. **Calculations:**
       - Sustained compute demand = 10 FPS * 200 GOPS/inference = 2000 GOPS/s = 2 TOPS.
       - Peak utilization lower bound = 2 TOPS / 4 TOPS = 50% of peak.
       - If the TPU is continuously at its 2W active budget, the average energy budget is 2 J/s / 10 inferences/s = 0.2 J/inference.
       - That 0.2 J/inference is a budget check, not proof that the chip can deliver 2 effective TOPS without throttling.
    3. **Conclusion & Interpretation:**
       - **Result: 2 TOPS Sustained Demand, 50% Peak Utilization**. The design is plausible only if hardware profiling confirms 10 FPS at or below 2W without thermal throttling; otherwise the workload must be reduced or shaped.
