title: Dataflow Optimization for Hailo-8 Stream Processing
scenario: You are designing an ultra-low-power, always-on smart camera system using a host SoC paired with a Hailo-8 accelerator. The Hailo-8 operates as a dataflow accelerator and relies entirely on streaming weights and activations from the host's memory.
question: How would you design an object detection and tracking pipeline on Hailo-8 to minimize energy per inference by reducing host memory access?
details:
  realistic_solution: 'Synthesize an architecture that maximizes on-chip SRAM data reuse through aggressive layer fusion. Select standard convolutions over memory-bound operations, and design a straight-line topology without complex routing branches to keep the pipeline mapped concurrently on the Hailo-8 fabric, ensuring data is read from host memory exactly once.'
  common_mistake: |
    **The Pitfall:** Focusing solely on minimizing MAC operations (compute FLOPs).
    **The Rationale:** Candidates carry over cloud-GPU intuition, failing to realize that on edge dataflow architectures, LPDDR access costs orders of magnitude more energy than arithmetic.
    **The Consequence:** Proposing memory-bound operators (like depthwise separable convs) that fragment dataflow and trigger massive energy spikes via continuous DRAM thrashing.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hailo-8 compute energy: ~0.096 pJ/OP.
       - LPDDR4 memory energy: ~100 pJ/bit.
       - Compute workload: 10 GOPs.
       - Intermediate spill size: 10 MB.
    2. **Calculations:**
       - Compute energy = 10 * 10^9 OP * 0.096 * 10^-12 J/OP ≈ 1 mJ.
       - Memory spill read+write = 10 * 10^6 bytes * 8 bits/byte * 100 * 10^-12 J/bit * 2 = 16 mJ.
    3. **Conclusion & Interpretation:**
       - **Result: Memory Energy Dominates (16:1)**. Eliminating a single 10MB memory round-trip saves 16x more energy than completely zeroing out the entire 10 GOP compute block.
