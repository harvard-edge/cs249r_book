title: The Sealed Enclosure Thermal Trap
scenario: Your edge AI device runs a 15W SoC inside an IP67-sealed aluminum enclosure (no fans, no vents) deployed outdoors in Phoenix, Arizona. Peak ambient temperature is 50°C. The SoC's maximum junction temperature (Tj_max) is 105°C. Your thermal engineer says the enclosure's thermal resistance from junction to ambient is 3.2°C/W.
question: Will the device survive summer, and if not, what do you do?
details:
  realistic_solution: 'Calculate the thermal margin and adjust the thermal path. At 3.2°C/W, the maximum sustained power is ~10.9W, which is exceeded by the 15W SoC. The solution involves reducing the solar adder (e.g., painting the enclosure white) and upgrading the internal thermal gap pad to lower the thermal resistance.'
  common_mistake: |
    **The Pitfall:** Suggesting adding a "bigger heatsink" or a fan.
    **The Rationale:** Candidates often forget the constraints of an IP67 sealed enclosure where the enclosure itself is the heatsink.
    **The Consequence:** Increasing surface area means redesigning the entire mechanical chassis, ruining the ingress protection and destroying unit economics.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tj_max is 105°C.
    - T_ambient_worst is 50°C.
    - Solar adder is 20°C (standard) or 5°C (white enclosure).
    - Thermal resistance is 3.2°C/W (standard) or 2.7°C/W (upgraded).
    - SoC power is 15W.

    **Calculations:**
    - Baseline Thermal budget is 105 - 50 - 20 = 35°C margin.
    - Baseline Max power is 35 / 3.2 = 10.9W (Exceeded by 15W SoC).
    - Fix 1 (White Enclosure) Margin is 105 - 50 - 5 = 50°C. Max power is 50 / 3.2 = 15.6W.
    - Fix 2 (Thermal Interface) Max power is 50 / 2.7 = 18.5W.

    **Conclusion & Interpretation:**
    - **Result: 18.5W Limit (Thermal-Bound)**. With both fixes, the 15W SoC has a comfortable 23% margin at a cost of only ~$3.50/unit.
