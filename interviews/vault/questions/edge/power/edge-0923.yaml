title: 'SRAM vs DRAM Energy Roofline'
scenario: 'A wearable health monitor runs an anomaly model continuously. The power budget is strictly 5mW. The SoC has an efficient NPU (10 TOPS/W) and 1MB of SRAM. A proposed Transformer-based model requires 5 M-Operations per inference at 100 Hz, and 2MB of weights. Because it exceeds SRAM, the weights must be streamed from off-chip DRAM for every inference.'
question: 'Does the 2MB Transformer model fit the 5mW power budget at 100 Hz, and what dominates the energy?'
details:
  realistic_solution: 'The compute power alone is minimal and easily fits the budget, but the true failure point is the memory access energy. Fetching data from off-chip DRAM consumes orders of magnitude more energy per byte than on-chip SRAM or compute operations. Streaming 2MB of weights from DRAM at 100 Hz draws 20 mW, which is 4x the entire device power budget.'
  common_mistake: |
    **The Pitfall:** Calculating only the compute power and concluding the model fits the budget.
    **The Rationale:** Engineers often focus purely on TOPS/W specifications of the NPU, completely ignoring the massive energy penalty of off-chip DRAM accesses.
    **The Consequence:** Deploying a model that immediately violates thermal and battery constraints, causing device failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - Device power budget: 5 mW.
    - NPU Efficiency: 10 TOPS/W (10,000 GOPS/W).
    - Model requirements: 5 M-Ops per inference, 100 Hz.
    - Weight size: 2 MB streamed from off-chip DRAM.
    - DRAM access cost: ~100 pJ/byte.

    **Calculations:**
    - Compute power: 5 M-Ops * 100 Hz = 500 MOPS = 0.5 GOPS.
    - Compute power draw: 0.5 GOPS / 10,000 GOPS/W = 0.00005 W = 0.05 mW.
    - Memory bandwidth: 2 MB * 100 Hz = 200 MB/s.
    - Memory power draw: 200 * 10^6 bytes/s * 100 * 10^-12 J/byte = 0.02 W = 20 mW.
    - Total power: 0.05 mW + 20 mW = 20.05 mW.

    **Conclusion & Interpretation:**
    - **Result: 20.05 mW power consumption (Memory-Bound)**. Streaming weights from off-chip DRAM violates the strict 5 mW budget by 4x, demonstrating that memory access, not compute, dominates energy consumption.
