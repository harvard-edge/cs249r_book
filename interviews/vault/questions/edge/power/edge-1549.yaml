title: Sustained Throughput vs Thermal Throttling on Jetson Orin
scenario: You are deploying a continuous object detection model on an edge SoC in a sealed outdoor enclosure in 40\u00b0C ambient heat. Option A runs the model solely on the GPU at the full 60W TDP. Option B partitions the model between the GPU and DLA to cap system power at 30W.
question: Which strategy yields higher sustained 24-hour throughput in a 40C sealed enclosure, and why?
details:
  realistic_solution: Option B is the correct choice for sustained edge deployments in high ambient temperatures under the simplified thermal model. By offloading suitable layers to the DLA and capping average power at 30W, the system is more likely to stay below the throttle point and preserve steady 24-hour throughput, even if Option A has higher peak performance before throttling.
  common_mistake: |
    **The Pitfall:** Choosing Option A based solely on peak TOPS.
    **The Rationale:** Candidates assume the maximum hardware TOPS specification always yields the highest long-term throughput.
    **The Consequence:** They fail to account for the sealed enclosure's thermal resistance, causing aggressive thermal throttling that ruins long-term sustained throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Simplified effective SoC-to-ambient thermal resistance: 1.0\u00b0C/W.
    - Ambient temperature: 40\u00b0C.
    - Throttle limit: 95\u00b0C.
    - Sustained operation above 95\u00b0C triggers DVFS, reducing average throughput.

    **Calculations:**
    - Option A (60W TDP): Delta T = 60W * 1.0\u00b0C/W = 60\u00b0C.
    - Option A estimated steady temperature = 40\u00b0C + 60\u00b0C = 100\u00b0C, which exceeds the 95\u00b0C throttle limit.
    - Option B (30W cap): Delta T = 30W * 1.0\u00b0C/W = 30\u00b0C.
    - Option B estimated steady temperature = 40\u00b0C + 30\u00b0C = 70\u00b0C, leaving about 25\u00b0C of margin below the throttle point.

    **Conclusion & Interpretation:**
    - **Result: Option B (Thermal-Bound).** In this model, Option A must throttle during 24-hour operation, while Option B sacrifices peak power to maintain steadier sustained throughput.
