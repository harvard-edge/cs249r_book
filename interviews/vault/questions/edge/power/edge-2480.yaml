title: Wildlife Camera Energy Waste
scenario: A wildlife camera uses a Hailo-8 accelerator (2.5W active, 50mW idle) to process video. The camera captures and processes 1 second of video every minute.
question: Analyze the total energy consumption per hour and determine the percentage of energy wasted during the idle periods.
details:
  realistic_solution: 'Calculate active and idle time per hour. Active time is 60 seconds; idle time is 3540 seconds. Multiply each by their respective power to find energy in Joules. The idle energy constitutes a surprisingly large portion of the total budget.'
  common_mistake: |
    **The Pitfall:** Assuming active power completely dominates the energy budget.
    **The Rationale:** Candidates see that 2.5W is 50x larger than 50mW and ignore the time-weighting of the duty cycle.
    **The Consequence:** They optimize for the wrong state, missing that idle energy constitutes a massive portion of the battery drain.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active time per hour: 60 seconds (1 sec/min).
    - Idle time per hour: 3540 seconds.
    - Active power: 2.5W.
    - Idle power: 0.05W.

    **Calculations:**
    - Active Energy = 2.5W * 60s = 150 Joules.
    - Idle Energy = 0.05W * 3540s = 177 Joules.
    - Idle waste percentage = 177 / (150 + 177) = 54.1%.

    **Conclusion & Interpretation:**
    - **Result: 54.1% (Energy Optimization).** Over half the energy is wasted in idle.
