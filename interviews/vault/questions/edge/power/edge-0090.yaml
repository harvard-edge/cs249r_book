title: The Solar-Powered Edge Budget
scenario: You're designing an edge AI wildlife monitoring station powered by a 20W solar panel and a 100Wh battery. The station runs a bird species classifier on a Google Coral (4 TOPS, 2W, 10 inferences/s when active) with a 0.5W camera. For this budget, include only the Coral and camera loads. The system must operate 24/7 in a remote forest with 5 hours of usable sunlight per day.
question: What power budget and maximum inference rate can the 20W solar, 100Wh bird-classifier station sustain with 5 hours of sunlight per day?
details:
  realistic_solution: Start from the provided loads only. Solar input after derating is 20W * 5h * 0.8 = 80Wh/day. Continuous camera plus Coral inference draws 0.5W + 2W = 2.5W, or 60Wh/day over 24 hours. That fits within the 80Wh/day harvest and also within a conservative 64Wh/day operating budget that reserves 20% of harvest for weather and aging. The 100Wh battery can cover the 19 non-sunlight hours because 2.5W * 19h = 47.5Wh, below even an 80Wh usable-battery reserve. Under these assumptions, the station can sustain continuous Coral inference at 10 inferences/s, or 864,000 inferences/day. There is only about 4Wh/day of margin under the 20% reserve policy, so any host CPU, radio, heater, or logging load must be added explicitly and would require reducing duty cycle.
  common_mistake: |
    **The Pitfall:** Assuming "20W panel x 5 hours = 100Wh" means the system can run continuously since it matches the battery capacity.
    **The Rationale:** Candidates often ignore system overhead, baseline idle drain, and solar conversion efficiency losses.
    **The Consequence:** Designing a system that depletes its battery within a few days and goes offline permanently.
  napkin_math: |
    **Assumptions & Constraints:**
    - Solar harvest = 20W * 5h * 0.8 derating = 80 Wh/day.
    - Conservative reserve policy: spend at most 80% of daily harvest = 64 Wh/day.
    - Provided continuous loads only: Coral 2W while active + camera 0.5W = 2.5W.
    - Classifier throughput while Coral is active: 10 inferences/second.
    - Battery capacity: 100Wh; conservative usable capacity with 20% reserve = 80Wh.

    **Calculations:**
    - Continuous active daily draw = 2.5W * 24h = 60 Wh/day.
    - Margin versus derated harvest = 80Wh - 60Wh = 20Wh/day.
    - Margin versus 20% reserve budget = 64Wh - 60Wh = 4Wh/day.
    - Nighttime battery draw = 2.5W * (24h - 5h sunlight) = 47.5Wh.
    - Battery check = 47.5Wh nighttime draw < 80Wh conservative usable capacity.
    - Maximum sustained inference volume = 10 inf/s * 86,400s/day = 864,000 inferences/day.

    **Conclusion & Interpretation:**
    - **Result: 2.5W continuous budget and 864,000 inferences/day (Energy-Bound)**. With only the stated Coral and camera loads, the 20W panel and 100Wh battery can sustain 24/7 operation with slim reserve margin.
