title: The Solar-Powered Edge Budget
scenario: You're designing an edge AI wildlife monitoring station powered by a 20W solar panel and a 100Wh battery. The station runs a bird species classifier on a Google Coral (4 TOPS, 2W) with a camera. The system must operate 24/7 in a remote forest with 5 hours of usable sunlight per day.
question: What power budget and maximum inference rate can the 20W solar, 100Wh bird-classifier station sustain with 5 hours of sunlight per day?
details:
  realistic_solution: 'Start from the energy budget. Solar input: 20W x 5h x 0.8 (panel efficiency loss from angle, clouds, dirt) = 80Wh/day. System consumers: (1) Coral TPU active: 2W, (2) camera module: 0.5W, (3) Raspberry Pi: 0.1W deep sleep / 5W active, (4) cellular modem burst uploads: 0.5Wh/day, (5) watchdog: 0.5W constant. Active power (camera + Pi + Coral + watchdog): 0.5 + 5 + 2 + 0.5 = 8.0W. Idle power (Pi sleep + watchdog): 0.1 + 0.5 = 0.6W. For full use of daily solar harvest, solve 8.0 * t_active + 0.6 * (24 - t_active) + 0.5 = 80, giving t_active = 8.8 hours/day and about 316,800 inferences/day at 10 inferences/second. With a 20% reserve policy, spend only 64Wh/day: 8.0 * t_active + 0.6 * (24 - t_active) + 0.5 = 64, giving t_active = 6.64 hours/day and about 238,900 inferences/day. The station can run 24/7 only because idle power is included for the full day; inference duty cycle is energy-limited.'
  common_mistake: |
    **The Pitfall:** Assuming "20W panel x 5 hours = 100Wh" means the system can run continuously since it matches the battery capacity.
    **The Rationale:** Candidates often ignore system overhead, baseline idle drain, and solar conversion efficiency losses.
    **The Consequence:** Designing a system that depletes its battery within a few days and goes offline permanently.
  napkin_math: |
    **Assumptions & Constraints:**
    - Solar input = 20W x 5h x 0.8 efficiency = 80 Wh/day.
    - Reserve policy: spend 80% of daily harvest = 64 Wh/day.
    - Power consumers: Coral (2W) + Camera (0.5W) + Pi (5W) + Watchdog (0.5W) = 8.0W active.
    - Idle power: Pi deep sleep (0.1W) + Watchdog (0.5W) = 0.6W.
    - Modem energy: 0.5 Wh/day from burst uploads.

    **Calculations:**
    - Full-harvest equation: 8.0 * t_active + 0.6 * (24 - t_active) + 0.5 = 80 Wh.
    - Full-harvest active time: 7.4 * t_active + 14.9 = 80, so t_active = 8.8 hours/day.
    - Full-harvest max inferences: 8.8h * 3600s * 10 FPS = 316,800 inferences/day.
    - Reserve equation: 8.0 * t_active + 0.6 * (24 - t_active) + 0.5 = 64 Wh.
    - Reserve active time: 7.4 * t_active + 14.9 = 64, so t_active = 6.64 hours/day.
    - Reserve max inferences: 6.64h * 3600s * 10 FPS = 239,040 inferences/day.

    **Conclusion & Interpretation:**
    - **Result: ~239,000 inferences/day with 20% reserve (Energy-Bound)**. The system can operate 24/7 only with idle power included in the daily budget; inference rate is constrained by the solar energy envelope rather than Coral peak compute.
