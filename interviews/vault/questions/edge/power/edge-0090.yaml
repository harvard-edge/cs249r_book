title: 'The Solar-Powered Edge Budget'
scenario: 'You''re designing an edge AI wildlife monitoring station powered by a 20W solar panel and a 100Wh battery. The station runs a bird species classifier on a Google Coral (4 TOPS, 2W) with a camera. The system must operate 24/7 in a remote forest with 5 hours of usable sunlight per day.'
question: 'What power budget and maximum inference rate can the 20W solar, 100Wh bird-classifier station sustain with 5 hours of sunlight per day?'
details:
  realistic_solution: 'Start from the energy budget. Solar input: 20W x 5h x 0.8 (panel efficiency loss from angle, clouds, dirt) = 80Wh/day. System consumers: (1) Coral TPU active: 2W, (2) camera module: 0.5W, (3) Raspberry Pi: 0.1W deep sleep / 5W active, (4) cellular modem (burst uploads): 0.5Wh/day, (5) watchdog: 0.5W constant. Active power (camera + Pi + Coral + watchdog): 0.5 + 5 + 2 + 0.5 = 8.0W. Idle power (Pi sleep + watchdog): 0.1 + 0.5 = 0.6W. Maximum active hours: solve 8.0 * t_{active} + 0.6 * (24 - t_{active}) + 0.5 = 80. 7.4 * t_{active} + 14.9 = 80. t_{active} = 8.8 hours/day. At 10 inferences/second during active hours: 8.8h x 3600s x 10 = 316,800 inferences/day. Reserve 20% battery for cloudy days: effective active time = 7.04h -> 253,440 inferences/day.'
  common_mistake: |
    **The Pitfall:** Assuming "20W panel x 5 hours = 100Wh" means the system can run continuously since it matches the battery capacity.
    **The Rationale:** Candidates often ignore system overhead, baseline idle drain, and solar conversion efficiency losses.
    **The Consequence:** Designing a system that depletes its battery within a few days and goes offline permanently.
  napkin_math: |
    **Assumptions & Constraints:**
    - Solar input = 20W $\times$ 5h $\times$ 0.8 efficiency = 80 Wh/day.
    - Power consumers: Coral (2W) + Camera (0.5W) + Pi (5W) + Watchdog (0.5W) = 8.0W active.
    - Idle power: Pi deep sleep (0.1W) + Watchdog (0.5W) = 0.6W.

    **Calculations:**
    - Energy equation: 8.0 $\times$ $t_{active}$ + 0.6 $\times$ (24 - $t_{active}$) + 0.5 (modem) = 80 Wh.
    - Solve for time: 7.4 $\times$ $t_{active}$ + 14.9 = 80 $\rightarrow$ $t_{active}$ = 8.8 hours/day.
    - Max inferences: 8.8h $\times$ 3600s $\times$ 10 FPS = 316,800 inferences/day.
    - With 20% reserve: 8.8 $\times$ 0.8 = 7.04 hours.

    **Conclusion & Interpretation:**
    - **Result: ~253,440 inferences/day (Energy-Bound)**. System throughput is constrained by solar energy budget rather than compute.
