title: Debugging Thermal Throttling Cascades
scenario: Smart glasses run a hand-tracking model at 30 FPS (33ms budget). Users report intermittent jitter. Profiling reveals the device hits 85°C, thermal throttles the DSP, pushing inference to 45ms. Polling the OS temperature API at 30Hz consumes 5% CPU, worsening the heat.
question: How would you observe thermal-throttle jitter on the glasses without adding polling heat or missing the 33ms deadline?
details:
  realistic_solution: 'Use an event-driven, piggybacked observability architecture. Instead of polling, register a callback for the OS `THERMAL_EVENT` broadcast to update a cached thermal state variable. To correlate temperature with jitter, maintain a lightweight lock-free circular buffer of the last 100 inference latencies in memory. When a frame drops (latency > 33ms), dump the buffer along with the last known thermal state to flash storage for asynchronous upload when the device is charging.'
  common_mistake: |
    **The Pitfall:** Running a background thread that polling OS temperature and CPU frequency at the frame rate (30Hz).
    **The Rationale:** Applying standard cloud monitoring techniques (active polling) without accounting for the severe thermal limits of wearable devices.
    **The Consequence:** The observability tool itself induces the thermal throttling it is trying to measure, creating a feedback loop of degraded performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target framerate: 30 FPS.
    - Polling overhead: 1 ms CPU time per call.
    - Circular buffer: 100 elements * 4 bytes (float32).

    **Calculations:**
    - Polling cost: 30 calls/sec * 1 ms = 30 ms/sec overhead (3% of CPU time per second).
    - Event-driven callback: 1 interrupt every few seconds = ~0 overhead.
    - Flash write on drop: 400 bytes (buffer) + 4 bytes (state) = 404 bytes per jitter event.

    **Conclusion & Interpretation:**
    - **Result: Thermal-Bound Mitigation**. Eliminating active polling removes the 30ms/sec continuous CPU tax, preventing the observability stack from pushing the system over its thermal envelope.
