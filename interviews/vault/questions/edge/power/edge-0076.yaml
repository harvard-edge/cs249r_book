title: The Thermal Throttling Dilemma
scenario: Your edge device, a smart camera running a high-accuracy object detection model, operates in diverse environments. During prolonged operation or in hot climates, the device frequently experiences thermal throttling, leading to significant frame drops and reduced detection accuracy.
question: How would you design the system to maintain a minimum acceptable performance level under varying thermal and power constraints without completely failing?
details:
  realistic_solution: Implement an adaptive performance management strategy utilizing Dynamic Model Switching. Pre-train multiple versions of the ML model with varying accuracy-performance-power trade-offs. When thermal limits are approached, dynamically switch to a less computationally intensive (smaller or highly quantized) model rather than relying purely on hardware DVFS (Dynamic Voltage and Frequency Scaling), which slashes throughput.
  common_mistake: |
    **The Pitfall:** Relying entirely on blunt hardware mechanisms like global clock speed reduction or adding bigger heatsinks.
    **The Rationale:** This ignores intelligent algorithmic adaptations like dynamic model routing that can smoothly adapt to power constraints.
    **The Consequence:** The device suffers severe frame drops and significantly reduced throughput during thermal events rather than maintaining a minimum acceptable performance level.
  napkin_math: |
    **Assumptions & Constraints:**
    - High model: accurate but validated only at a 5W operating point.
    - Medium model: lower accuracy but validated within a 2W operating point.
    - Thermal power cap during a hot enclosure event: 3W.
    - Minimum acceptable behavior requires a model whose validated operating point fits under the cap.

    **Calculations:**
    - High model at 5W exceeds the 3W cap, so the hardware would enter DVFS and its FPS/latency would be workload-dependent and not guaranteed.
    - Medium model at 2W leaves 1W of thermal headroom and has a validated FPS/latency profile under the cap.
    - Selection policy: run the high model while thermal headroom supports 5W; switch to the medium model before the cap falls below 5W.

    **Conclusion & Interpretation:**
    - **Result: guaranteed 2W model under a 3W cap (Power-Bound)**. Dynamic model switching preserves a known minimum performance level, while relying on throttling the high model would provide no deterministic throughput guarantee.
