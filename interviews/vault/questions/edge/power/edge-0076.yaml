title: The Thermal Throttling Dilemma
scenario: Your edge device, a smart camera running a high-accuracy object detection model, operates in diverse environments. During prolonged operation or hot climates, the enclosure thermal budget can fall to a 3W sustained AI power cap, causing frame drops and reduced detection accuracy.
question: How would you design the system to maintain a minimum acceptable performance level under varying thermal and power constraints without completely failing?
details:
  realistic_solution: Implement adaptive model switching with hysteresis and a guaranteed fallback. Pre-train high, medium, and safe low-power variants with validated FPS, latency, and accuracy at their operating points. Run the high model while temperature and power headroom are stable, switch down before the 3W cap is reached, and require a cooler/lower-power recovery threshold before switching back up. If even the medium model is unsafe, fall back to the guaranteed-safe model rather than relying on hardware DVFS, which can slash throughput unpredictably.
  common_mistake: |
    **The Pitfall:** Relying entirely on blunt hardware mechanisms like global clock speed reduction or adding bigger heatsinks.
    **The Rationale:** This ignores intelligent algorithmic adaptations like dynamic model routing that can smoothly adapt to power constraints.
    **The Consequence:** The device suffers severe frame drops and significantly reduced throughput during thermal events rather than maintaining a minimum acceptable performance level.
  napkin_math: |
    **Assumptions & Constraints:**
    - High model: accurate but validated only at a 5W operating point.
    - Medium model: lower accuracy but validated within a 2W operating point.
    - Safe fallback model: lowest accuracy but validated below the worst-case cap.
    - Thermal power cap during a hot enclosure event: 3W.
    - Minimum acceptable behavior requires a model whose validated operating point fits under the cap.

    **Calculations:**
    - High model at 5W exceeds the 3W cap, so the hardware would enter DVFS and its FPS/latency would be workload-dependent and not guaranteed.
    - Medium model at 2W leaves 1W of thermal headroom and has a validated FPS/latency profile under the cap.
    - Selection policy: switch high -> medium when projected sustained AI headroom drops below 5W, and switch back only after temperature and power recover above a higher threshold.
    - If the cap drops below the medium model's validated point, use the safe fallback model rather than accepting uncontrolled throttling.

    **Conclusion & Interpretation:**
    - **Result: hysteresis-based fallback under a 3W cap (Power-Bound)**. Dynamic model switching preserves a known minimum performance level, while relying on throttling the high model would provide no deterministic throughput guarantee.
