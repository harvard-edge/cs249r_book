title: 'Energy Cost of INT8 MACs on Google Coral'
scenario: 'You are deploying an object detection model to a Google Coral Edge TPU. The accelerator consumes 2W of power while delivering peak throughput of 4 TOPS for INT8 operations. The model requires 10 billion INT8 MACs per inference.'
question: 'What is the energy per INT8 MAC in pJ and total compute energy per inference for 10 billion MACs?'
details:
  realistic_solution: 'Determine energy per operation by dividing total power by operations per second. Multiply by 2 to find energy per MAC. Multiply the energy per MAC by the total MACs per inference to yield total compute energy.'
  common_mistake: |
    **The Pitfall:** Forgetting that a single MAC consists of two operations (Multiply and Accumulate).
    **The Rationale:** Candidates often equate MACs directly to OPs without verifying the hardware definition.
    **The Consequence:** They calculate energy estimates that are completely off by a factor of 2.
  napkin_math: |
    **Assumptions & Constraints:**
    - Power = 2W (2 Joules/second).
    - Throughput = 4 TOPS (4e12 Operations/second).
    - Model complexity = 10 billion (10e9) MACs.

    **Calculations:**
    - Energy per OP = 2 J/s / 4e12 OP/s = 0.5 * 10^-12 J = 0.5 pJ.
    - Energy per MAC = 0.5 pJ/OP * 2 OPs/MAC = 1.0 pJ/MAC.
    - Energy per inference = 10e9 MACs * 1.0 pJ/MAC = 10 * 10^-3 J = 10 mJ.

    **Conclusion & Interpretation:**
    - **Result: 10 mJ (Energy-Bound)**. Energy per MAC is 1.0 pJ, and total compute energy is 10 mJ.
