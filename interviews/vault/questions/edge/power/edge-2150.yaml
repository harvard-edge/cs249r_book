title: Thermal Runaway Prevention for Sustained AI Workload on Hailo-8
scenario: A Hailo-8 module is embedded in a smart camera running continuous vehicle detection at 30fps outdoors in an enclosure. Ambient temperature reaches 55°C in summer. The Hailo-8 has a max junction temp of 105°C and the PCB heat spreader has θ_ja = 20°C/W.
question: At 55°C ambient and θ_ja=20°C/W, what power can the accelerator sustain and does a 2.5W continuous workload need throttling?
details:
  realistic_solution: Compute the maximum thermal dissipation capability of the system. Since the sustained power strictly matches the dissipation limit leaving absolutely zero thermal margin, the system is exposed to transient thermal runaway. Remediate by de-rating the module via DVFS (Dynamic Voltage and Frequency Scaling) to cap the maximum power draw, or implement dynamic frame-rate throttling to ensure the average power stays safely below 2.5W.
  common_mistake: |
    **The Pitfall:** Assuming the TDP spec guarantees safe operation regardless of ambient environmental conditions.
    **The Rationale:** Candidates treat TDP as an absolute hardware guarantee, forgetting that cooling capacity is entirely dependent on the delta between junction and ambient temperatures.
    **The Consequence:** Systems catastrophically fail in the field during summer months due to unmitigated thermal throttling and junction melt-downs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Ambient Temp: 55°C
    - Max Junction Temp: 105°C
    - Thermal Resistance (θ_ja): 20°C/W
    - Target Load: 2.5W continuous

    **Calculations:**
    - Max allowable ΔT = 105°C - 55°C = 50°C
    - Max sustainable power = ΔT / θ_ja = 50°C / 20°C/W = 2.5W
    - Margin = Max Power (2.5W) - Target Load (2.5W) = 0W

    **Conclusion & Interpretation:**
    - **Result: 0W Margin (Thermal-Bound)**. Zero thermal margin requires aggressive throttling or an improved heatsink.
