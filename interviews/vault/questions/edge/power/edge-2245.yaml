title: PUE and WUE Optimization for ML Training Infrastructure
scenario: Your on-premises GPU cluster has PUE=1.6 and WUE=2.1 L/kWh. A cloud provider offers PUE=1.2 and WUE=0.5 L/kWh. The cluster runs 800 H100 GPUs at 80% average utilization.
question: What is the annual PUE overhead energy waste, water consumption, savings from cloud migration, and break-even PUE/WUE for on-prem?
details:
  realistic_solution: |
    Estimate full IT energy from the utilized GPU load plus server/network overhead: about 5.10M kWh/year. On-prem facility energy is 5.10M * 1.6 = 8.16M kWh/year, so PUE overhead above IT is 3.06M kWh/year. The cloud facility energy at PUE 1.2 is 6.12M kWh/year, saving 2.04M kWh/year. Water is 10.71M L/year on-prem versus 2.55M L/year in cloud, saving 8.16M L/year. Energy break-even is PUE=1.2; water break-even is WUE=0.5 L/kWh for the same IT workload, unless the organization defines a weighted combined objective.
  common_mistake: |
    **The Pitfall:** Calculating PUE overhead based only on GPU power.
    **The Rationale:** Candidates forget to account for the full IT load, which includes servers, networking, and storage overhead.
    **The Consequence:** PUE applies to total IT load, not just accelerator power, leading to underestimated energy waste.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU Power: 800 H100s * 700W = 560 kW.
    - Utilization: 80%.
    - System overhead: 30%.

    **Calculations:**
    - Effective IT Load: 560 kW * 0.80 * 1.3 = 582.4 kW.
    - Annual IT Energy: 582.4 kW * 8760 hr = ~5.1M kWh.
    - On-prem facility energy: 5.1M kWh * 1.6 = 8.16M kWh/year.
    - On-prem PUE overhead above IT: 8.16M - 5.1M = 3.06M kWh/year.
    - Cloud facility energy: 5.1M kWh * 1.2 = 6.12M kWh/year.
    - Cloud migration energy savings: 8.16M - 6.12M = 2.04M kWh/year.
    - On-prem water: 5.1M kWh * 2.1 L/kWh = 10.71M liters/year.
    - Cloud water: 5.1M kWh * 0.5 L/kWh = 2.55M liters/year.
    - Cloud migration water savings: 10.71M - 2.55M = 8.16M liters/year.

    **Conclusion & Interpretation:**
    - **Result: 3.06M kWh on-prem PUE overhead, 10.71M L on-prem water, 2.04M kWh and 8.16M L saved by cloud migration.** Energy parity requires on-prem PUE <= 1.2; water parity requires WUE <= 0.5 L/kWh for the same IT load.
