title: Thermal Throttling in Memory-Bound Attention Layers
scenario: Your team deployed a transformer model on an NVIDIA Jetson Orin at the edge (60W TDP, 32 GB LPDDR5, 275 TOPS INT8). During the highly compute-dense MLP layers, the system draws about 40W and runs smoothly on the Ampere GPU. However, during the memory-bandwidth-bound self-attention layers, the system power spikes to the 60W TDP limit and thermally throttles, despite executing far fewer total INT8 MAC operations.
question: Why do the self-attention layers hit the 60W TDP and throttle despite doing fewer INT8 MACs than the MLP layers?
details:
  realistic_solution: 'Off-chip DRAM accesses cost orders of magnitude more energy than ALU compute operations. Self-attention has low arithmetic intensity, saturating the memory bus. While MLP keeps the GPU busy with low-energy INT8 math out of SRAM, the attention layer shifts the energy profile to expensive LPDDR5 accesses, hitting the TDP limit.'
  common_mistake: Assuming power consumption strictly scales with compute volume (TOPS) and ignoring the disproportionate energy cost of off-chip memory data movement.
  napkin_math: |
    **Assumptions & Constraints:**
    - INT8 MAC energy = ~0.1 pJ
    - 32-bit LPDDR5 access energy = ~1 nJ (1,000 pJ)
    - Jetson Orin Bandwidth = ~200 GB/s (50 billion accesses/sec)

    **Calculations:**
    - Peak compute power = 275 TOPS * 0.1 pJ = 27.5 W
    - Peak memory power = 50e9 accesses/sec * 1 nJ = 50 W
    - Total power = SoC Base + 50 W > 60 W limit

    **Conclusion & Interpretation:**
    - **Result: 50 W Memory Power (Power-Bound)**. Data movement dominates power consumption, causing the low-arithmetic-intensity attention layers to thermal throttle.
