title: 'Hailo-8 Edge Deployment: Sustained Performance under Thermal Constraints'
scenario: 'You are deploying a fleet of edge AI devices, each powered by a Hailo-8 (26 TOPS INT8, 2.5W dataflow accelerator), for real-time video analytics in an industrial environment reaching 50°C. Initial lab benchmarks show the Hailo-8 achieving 26 TOPS for short bursts. However, in sustained operation at high ambient temperatures, inference throughput drops unpredictably below 10 TOPS.'
question: 'How would you diagnose and quantify a thermal solution for Hailo-8 throughput drops below 10 TOPS in 50°C industrial operation?'
details:
  realistic_solution: 'Diagnose thermal throttling as the primary bottleneck. Propose a cooling strategy, such as passive heat sinks with larger surface area. Quantify the expected performance improvement by estimating the new sustained operating temperature and corresponding thermal throttling threshold.'
  common_mistake: |
    **The Pitfall:** Proposing generic software optimizations without addressing hardware limits.
    **The Rationale:** Failing to account for thermal throttling under sustained load and high ambient temperatures.
    **The Consequence:** The device continues to overheat and throttle, rendering software optimizations ineffective.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8 power consumption: 2.5W.
    - Ambient environment: 50°C.
    - Max Junction Temperature: 85°C.

    **Calculations:**
    - Calculate required thermal resistance ($R_{th}$) to keep die below 85°C.
    - $R_{th} = (T_{junction} - T_{ambient}) / Power_{dissipation}$
    - $R_{th} = (85^\circ C - 50^\circ C) / 2.5W = 14^\circ C/W$.

    **Conclusion & Interpretation:**
    - **Result: < 14°C/W (Thermal-Bound)**. A cooling solution must provide an $R_{th} < 14^\circ C/W$ to sustain performance.
