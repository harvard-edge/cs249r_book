title: The Power Efficiency Metric
scenario: You are selecting a new accelerator for an autonomous vehicle's sensor fusion module under a strict thermal and power envelope.
question: When comparing two chips, like a Jetson AGX Orin and a Hailo-8, what is the single most important metric for evaluating power efficiency?
details:
  realistic_solution: The correct metric is TOPS/W (Tera-Operations Per Second Per Watt). It directly measures how much computational performance you get for each watt of power consumed.
  common_mistake: |
    **The Pitfall:** Focusing entirely on peak theoretical TOPS.
    **The Rationale:** Engineers assume "bigger is always better" without accounting for battery drain or thermal packaging.
    **The Consequence:** Selecting a massive accelerator that violates the edge device's strict thermal and power limits.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hailo-8 = 26 TOPS at 2.5W.
    - Jetson AGX Orin = 275 TOPS at 60W.

    **Calculations:**
    - Hailo-8 = 26 / 2.5 = 10.4 TOPS/W.
    - Jetson = 275 / 60 = 4.58 TOPS/W.

    **Conclusion & Interpretation:**
    - **Result: Hailo-8 is >2x more efficient (Power-Bound)**. Comparing metrics directly reveals the true cost of sustained compute.
  options:
  - Peak TOPS
  - TOPS/W
  - Memory Bandwidth (GB/s)
  - TDP (Thermal Design Power)
