title: Orin AGX Thermal-Limited FPS Estimate
scenario: You are deploying a real-time tracking model on an NVIDIA Jetson AGX Orin operating point rated at 275 TOPS at 60W, mounted in an unventilated, passively cooled outdoor enclosure. The enclosure can safely dissipate 30W continuously before the SoC thermally throttles. Your model requires exactly 2 TOPS per inference. For this estimate, assume power consumption scales linearly with INT8 throughput.
question: What maximum sustained FPS can the Jetson Orin run indefinitely when limited to 30W and each inference costs 2 TOPS?
details:
  realistic_solution: Under the stated toy linear power-scaling assumption, the 30W continuous enclosure limit permits half of the 60W peak throughput. The estimated compute budget is 275 TOPS * (30W / 60W) = 137.5 TOPS. Each inference costs 2 TOPS, so the linear upper-bound rate is 137.5 / 2 = 68.75 FPS. In practice, actual sustained FPS depends on power mode, clocks, workload mix, ambient temperature, and thermal derating, so this value must be validated under the target enclosure profile rather than treated as a guaranteed indefinite setting.
  common_mistake: |
    **The Pitfall:** Designing purely around peak burst performance.
    **The Rationale:** Candidates see the 275 TOPS spec and build their throughput expectations based on theoretical maximums.
    **The Consequence:** They ignore the physical 30W dissipation limit of the passive enclosure, leading to an architecture that quickly hits a thermal wall and suffers severe, unpredictable throttling in production.
  napkin_math: |
    **Assumptions & Constraints:**
       - Thermal Dissipation Limit: 30W maximum continuous
       - Hardware Curve: Jetson AGX Orin operating point rated at 275 TOPS at 60W.
       - Model: linear power scaling is a simplifying assumption for an upper-bound estimate.
       - Model Load: 2 TOPS per frame
    **Calculations:**
       - Sustainable Power Ratio: 30W / 60W = 0.5
       - Sustainable Compute Limit: 275 TOPS * 0.5 = 137.5 TOPS
       - Framerate Cap: 137.5 TOPS / 2 TOPS/frame = 68.75 FPS
    **Conclusion & Interpretation:**
       - **Result: 68.75 FPS linear upper-bound estimate, or about 68 FPS as an integer cap.** Real sustained throughput must be measured in the target power mode and passive enclosure because clocks and thermal derating are not perfectly linear.
