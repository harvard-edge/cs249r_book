title: Calculate Sustained FPS Under Enclosure Thermal Limits
scenario: You are deploying a real-time tracking model on an NVIDIA Jetson Orin mounted in an unventilated, passively cooled outdoor enclosure. The enclosure's thermal resistance only allows it to safely dissipate 30W of heat continuously before the SoC thermally throttles. Your model requires exactly 2 TOPS per inference. Assume power consumption scales linearly with INT8 throughput.
question: What maximum sustained FPS can the Jetson Orin run indefinitely when limited to 30W and each inference costs 2 TOPS?
details:
  realistic_solution: 'The system''s power profile must be clamped in software to match the 30W continuous thermal dissipation limit of the enclosure. This ensures deterministic, sustained performance over time rather than rapid cycling between burst speeds and heavily throttled states.'
  common_mistake: |
    **The Pitfall:** Designing purely around peak burst performance.
    **The Rationale:** Candidates see the 275 TOPS spec and build their throughput expectations based on theoretical maximums.
    **The Consequence:** They ignore the physical 30W dissipation limit of the passive enclosure, leading to an architecture that quickly hits a thermal wall and suffers severe, unpredictable throttling in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Thermal Dissipation Limit: 30W maximum continuous
       - Hardware Curve: 275 TOPS at 60W TDP (Linear scaling)
       - Model Load: 2 TOPS per frame
    2. **Calculations:**
       - Sustainable Power Ratio: 30W / 60W = 0.5
       - Sustainable Compute Limit: 275 TOPS * 0.5 = 137.5 TOPS
       - Framerate Cap: 137.5 TOPS / 2 TOPS/frame = 68.75 FPS
    3. **Conclusion & Interpretation:**
       - **Result: Thermal-Bound.** Clamping inference execution strictly to 68 FPS prevents total thermal buildup from exceeding the 30W passive dissipation envelope, avoiding unrecoverable clock throttling.
