title: Autonomous Vehicle Dynamic Power Capping
scenario: An autonomous vehicle edge cluster has 4 identical SoC nodes with a shared physical power budget of 200W. Normally, 3 perception nodes use 50W each (40W dynamic, 10W static) running at 30 FPS (20ms latency), and 1 planning node uses 30W. A routing failure causes the planning node to spike to 65W.
question: Can a 10% frequency and voltage reduction on the 3 perception nodes absorb the 65W planning spike while maintaining 30 FPS?
details:
  realistic_solution: Apply a uniform 10% DVFS step to the three perception nodes. Only the dynamic portion of each perception node scales with the voltage/frequency step; the 10W static portion remains. A 0.9x step reduces dynamic power from 40W to about 29.16W per node, so each perception node drops from 50W to 39.16W. The new cluster total is 3 * 39.16W + 65W = 182.48W, below the 200W budget. Latency rises from 20ms to about 22.2ms, still below the 33.3ms frame deadline, so the 10% DVFS step can absorb the spike while maintaining 30 FPS.
  common_mistake: |
    **The Pitfall:** Assuming a 10% frequency reduction only yields a 10% power reduction.
    **The Rationale:** Candidates fail to apply the CMOS power equation and miss the cubic reduction in dynamic power when voltage and frequency are stepped down together.
    **The Consequence:** Incorrectly concluding the system will crash, missing an elegant DVFS optimization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline cluster power before the routing failure = 3 * 50W + 30W = 180W.
    - During the failure, total power without mitigation = 3 * 50W + 65W = 215W, which is 15W over the 200W budget.
    - Perception node latency deadline: 33.3ms (30 FPS).
    - Each perception node has 40W dynamic power and 10W static power.
    - Use a simplified DVFS model where voltage scales with frequency, so dynamic power scales as roughly f^3; static power does not scale.

    **Calculations:**
    - Reduce perception frequency by 10% (0.9x). Assuming latency scales inversely with frequency, 20ms becomes 20ms / 0.9 = 22.2ms (meets 33.3ms deadline).
    - New dynamic power per perception node = 40W * (0.9)^3 = 29.16W.
    - New total power per perception node = 29.16W + 10W static = 39.16W.
    - New system total = 3 * 39.16W + 65W planning = 182.48W.

    **Conclusion & Interpretation:**
    - **Result: 182.48W (Power-Bound Mitigation)**. A 10% DVFS step-down absorbs the spike, landing safely at 182.48W.
