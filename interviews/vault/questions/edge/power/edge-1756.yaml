title: Camera Stream Sizing for Cloud AI 100
scenario: Your on-premise edge appliance processes multiple camera streams using a vision pipeline on a Qualcomm Cloud AI 100. The accelerator has a hard TDP of 75W, provides 400 TOPS of INT8 compute, and uses 32 GB of LPDDR4x memory. Your INT8 object detection model requires 2.5 TOPS per frame. The edge chassis dictates a strict 60W power cap.
question: How many 30 FPS streams can the Cloud AI 100 support for a 2.5 TOPS-per-frame model under the 60W chassis power cap?
details:
  realistic_solution: 'An L5 engineer will first calculate the compute requirement per stream, then model the power consumption by separating the accelerator''s TDP into static and dynamic power. They will use the dynamic power efficiency to determine the maximum TOPS achievable within the reduced 60W budget before calculating the supported stream count.'
  common_mistake: |
    **The Pitfall:** Calculating stream capacity based solely on peak TOPS, ignoring thermal limits and static power.
    **The Rationale:** Candidates divide 400 TOPS by the per-stream TOPS requirement without modeling the dynamic vs static power draw.
    **The Consequence:** The resulting architecture draws over 70W, violating the 60W chassis thermal limit and causing hardware shutdowns.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cloud AI 100 performance: 400 TOPS at 75W.
    - Model requirement: 2.5 TOPS per frame.
    - Stream frame rate: 30 FPS.
    - Chassis power cap: 60W.
    - Estimated static power: 15W.

    **Calculations:**
    - Required compute per stream = 2.5 TOPS * 30 = 75 TOPS.
    - Dynamic power budget = 60W (chassis limit) - 15W (static power) = 45W.
    - Dynamic power efficiency = (75W - 15W) / 400 TOPS = 0.15 W/TOPS.
    - Max sustainable compute = 45W / 0.15 W/TOPS = 300 TOPS.
    - Maximum streams = floor(300 TOPS / 75 TOPS/stream) = 4 streams.

    **Conclusion & Interpretation:**
    - **Result: 4 streams (Thermal/Power-Bound).** Maximum supported streams is 4 due to the chassis power limit.
