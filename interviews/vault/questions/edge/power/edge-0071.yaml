title: 'The Overheating Vision Pipeline'
scenario: 'Your edge AI camera achieves an impressive 50 FPS for YOLOv5s during initial tests. However, after 30 seconds of continuous operation, the framerate drops sharply to a consistent 25 FPS.'
question: 'What is the most likely culprit for this performance drop, and how does it impact real-time design?'
details:
  realistic_solution: 'The most likely culprit is thermal throttling. When the SoC''s power consumption exceeds its cooling solution''s dissipation capability for a sustained period, the OS applies Dynamic Voltage and Frequency Scaling (DVFS) to drop the clock frequency, drastically reducing compute power.'
  common_mistake: |
    **The Pitfall:** Blaming the drop on software bugs or memory leaks.
    **The Rationale:** Developers often assume static hardware performance and immediately look for code optimization flaws.
    **The Consequence:** They waste time profiling software when the root cause is physical thermal management.
  napkin_math: |
    **Assumptions & Constraints:**
    - Passive heatsink R_thermal \u2248 4.5 \u00b0C/W. Ambient = 35\u00b0C.
    - Throttle threshold = 95\u00b0C.
    - Peak burst mode: ~15W (yields 50 FPS).

    **Calculations:**
    - Max sustained power = (95\u00b0C - 35\u00b0C) / 4.5 \u00b0C/W = 13.3W.
    - At 15W, the system quickly overheats.
    - Sustained thermal mode aggressively triggers a safe ~7W limit.
    - 50 FPS * (7W / 15W) \u2248 23.3 FPS.

    **Conclusion & Interpretation:**
    - **Result: ~7W (Thermal-Bound)**. The system must be designed for the sustained 7W thermal envelope, not the brief 15W burst spec.
