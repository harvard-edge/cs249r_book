title: Hailo-8 INT8 Energy Per Operation Math
scenario: You are evaluating a dataflow accelerator for a smart camera deployment. The device provides 26 TOPS of INT8 compute at a typical power draw of 2.5W, utilizing a dataflow architecture that streams directly from host memory rather than relying on local DRAM.
question: What is the average energy per INT8 operation at 26 TOPS and 2.5W, and how does it compare with an INT8 MAC baseline?
details:
  realistic_solution: To find the energy per operation, divide total power by operations per second. Because the device uses a dataflow architecture lacking local DRAM, the 2.5W heavily reflects internal compute and SRAM routing. Calculating this yields a per-MAC energy that can be directly compared against standard baselines like the Horowitz table.
  common_mistake: |
    **The Pitfall:** Confusing individual operations with Multiply-Accumulates (MACs).
    **The Rationale:** Candidates often forget that one MAC actually executes two distinct operations (one multiplication, one addition).
    **The Consequence:** Being off by a factor of 2 in theoretical capacity and efficiency estimates.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 26 TOPS throughput at 2.5W.

    **Calculations:**
    - Peak Throughput = 26 x 10^12 ops/sec.
    - Power = 2.5 Joules/second.
    - Energy per Op = 2.5 / 26e12 = ~9.6e-14 Joules = ~96 femtojoules (fJ).
    - 1 MAC = 2 operations.
    - Energy per MAC = 96 fJ * 2 = 192 fJ (~0.2 pJ).

    **Conclusion & Interpretation:**
    - **Result: 192 fJ per MAC (Power-Bound)**. The ~0.2 pJ/MAC system-level efficiency closely matches the theoretical bare-metal Horowitz estimate for an INT8 MAC, demonstrating minimal architecture overhead.
