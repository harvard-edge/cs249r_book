title: Energy Cost Analysis of Memory vs Compute on Jetson Orin
scenario: You are optimizing a transformer model for an NVIDIA Jetson Orin. Profiling reveals that Layer A (a dense compute layer) achieves 80% utilization of the INT8 TOPS but consumes only 20W. Layer B (a memory-bound attention layer) achieves only 10% TOPS utilization but spikes system power consumption to 45W, due to constant off-chip data movement from the LPDDR5 memory.
question: Given the Horowitz energy table principles, why does memory-bound Layer B draw 45W at only 10% TOPS utilization while dense Layer A draws 20W at 80% utilization?
details:
  realistic_solution: 'The candidate must apply the Horowitz energy model: moving data to and from off-chip LPDDR5 costs orders of magnitude more energy than performing INT8 arithmetic. Layer A uses SRAM tiling and reuse, so most energy goes to useful compute and it can reach high TOPS utilization at modest power. Layer B has poor locality, so DRAM banks, PHYs, interconnects, and buffer movement stay active while the compute units wait for data. Low TOPS utilization can therefore coexist with high system power because memory traffic dominates energy and also prolongs the layer runtime. The right fix is to reduce off-chip traffic through tiling, fusion, attention kernels, layout changes, or other locality improvements, not simply to chase higher TOPS.'
  common_mistake: |
    **The Pitfall:** Assuming high compute utilization (TOPS) directly correlates with maximum power draw.
    **The Rationale:** Candidates focus on ALUs and neglect the fact that the physical data movement over the memory bus and PHY controllers typically costs orders of magnitude more energy than mathematical operations.
    **The Consequence:** Failing to optimize the memory access patterns of the model, leaving the system heavily power-constrained despite low apparent compute usage.
  napkin_math: |
    **Assumptions & Constraints:**
    - INT8 MAC compute energy: ~0.1 pJ/op.
    - LPDDR5 off-chip memory access energy: ~25 pJ/byte, equivalent to ~100 pJ per 32-bit word.
    - Operations: 10^9 ops; Data: 1 GB (10^9 bytes).

    **Calculations:**
    - Compute energy for 10^9 ops: 10^9 * 0.1 pJ = 0.1 mJ.
    - Memory energy for 1 GB transfer: (10^9 bytes) * 25 pJ/byte = 25 mJ.
    - Ratio: Memory energy (25 mJ) / Compute energy (0.1 mJ) = 250x.

    **Conclusion & Interpretation:**
    - **Result: memory traffic can dominate energy (Memory-Bound)**. The 250x example illustrates why Layer B can draw more system power than Layer A despite low TOPS utilization; it is not a direct derivation of the exact 45W versus 20W readings.
