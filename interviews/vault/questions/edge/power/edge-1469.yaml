title: Architecting Energy-Efficient Streams for Hailo-8
scenario: You are designing a video analytics pipeline using a Hailo-8 accelerator. The Hailo-8 is a dataflow accelerator with no local DRAM; it streams data directly from host memory via PCIe. Your system must process four 1080p camera streams simultaneously.
question: Architect the data ingestion and model execution flow for four 1080p streams to minimize host memory access energy per operation?
details:
  realistic_solution: Exploit the Hailo-8's dataflow architecture by keeping the video path single-pass and steady. Use persistent host buffers, coalesced PCIe submissions, graph fusion, and on-chip reuse so intermediate activations do not round-trip to host memory. Schedule the four streams in a predictable interleaved pipeline that avoids duplicate frame reads and model reloads. The goal is not massive batching, but minimizing host-device transfers per frame while keeping the accelerator fed.
  common_mistake: |
    **The Pitfall:** Ignoring the energy cost of moving data.
    **The Rationale:** Candidates focus solely on the 26 TOPS/2.5W compute efficiency of the accelerator, ignoring the host memory read energy.
    **The Consequence:** They might propose batching or frequent context switching between streams, which causes thrashing over the PCIe bus and massive energy spikes from host memory reads.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute efficiency: 26 TOPS / 2.5W ≈ 10.4 TOPS/W (~0.1 pJ/Op).
    - Host memory plus PCIe transfer energy: use 20 pJ/bit as a conservative estimate.
    - 1080p frame size: ~6 MB (~48 Mb).
    - Example model cost: 15 GOPS/frame.
    - Four streams at 30 FPS each = 120 frames/sec.

    **Calculations:**
    - One host-to-accelerator frame transfer: 48 Mb * 20 pJ/bit = 0.96 mJ.
    - Compute energy per 15 GOPS frame: 15 GOP / 10.4 TOPS/W = 1.44 mJ.
    - Single-pass transfer power at 120 FPS: 0.96 mJ * 120 = 115 mW.
    - Extra round-trip of full-frame intermediates would add another ~115 mW per pass before CPU/cache overhead.

    **Conclusion & Interpretation:**
    - **Result: data movement is comparable to compute and grows with every extra pass (Energy/PCIe-Bound).** A single-pass fused pipeline with on-chip intermediates minimizes host memory access energy per operation.
