title: The Passive Cooling Limit
scenario: An AI quality inspection camera uses an accelerator consuming 2.5W during active inference. The entire camera is in a fanless enclosure that can only passively dissipate 1W of heat continuously at the maximum factory ambient temperature.
question: To prevent the system from overheating, what is the maximum sustainable duty cycle (the percentage of time the accelerator can be active)?
details:
  realistic_solution: 'For passively cooled edge appliances, continuous thermal dissipation (1W) caps the sustainable average power. Treating idle power as negligible, the maximum sustained duty cycle is the ratio of thermal dissipation capacity to active inference TDP (1W / 2.5W). Exceeding a 40% duty cycle invariably triggers rapid heat accumulation, culminating in terminal thermal throttling or junction hardware failure.'
  common_mistake: |
    **The Pitfall:** Ignoring the passive thermal dissipation limit and assuming a 100% duty cycle.
    **The Rationale:** In cloud environments, power delivery is the bottleneck, but for passively cooled edge systems, heat removal is the strict limit.
    **The Consequence:** The device overheats, leading to rapid thermal throttling, degradation, or outright hardware failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - Thermal budget: 1W continuous.
    - Active power: 2.5W.
    - Idle power: Negligible.

    **Calculations:**
    - Maximum duty cycle = Thermal Budget / Active Power.
    - 1W / 2.5W = 0.40.

    **Conclusion & Interpretation:**
    - **Result: 40% maximum sustainable duty cycle (Thermal-Bound)**. Heat dissipation is the strict bottleneck.
  options:
    - '100%'
    - '60%'
    - '40%'
    - '2.5%'
  correct_index: 2
