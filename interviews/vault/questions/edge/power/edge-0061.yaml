title: 'The Field Thermal Surprise'
scenario: 'Your edge AI box runs perfectly in the lab (30 FPS, no issues). You deploy it in a sealed IP67 enclosure on a factory floor. Within 20 minutes, FPS drops to 18. The hardware is identical.'
question: 'What caused the gradual performance degradation, and how can it be fixed?'
details:
  realistic_solution: 'The lab is air-conditioned at 22°C. The factory floor is 35°C, and the sealed IP67 enclosure traps heat — internal temperature reaches 50°C+. Your device''s thermal solution (small heatsink + fan) was designed assuming 25°C ambient with free airflow. In the sealed enclosure, there''s no airflow, and the ambient temperature is 15-25°C higher than the design point. The SoC hits its thermal throttling threshold (typically 80°C on Jetson Orin, per NVIDIA''s thermal design guide) much faster, triggering DVFS to a lower P-state. Fix: (1) derate the power budget for worst-case ambient — design for 50°C, not 25°C, (2) use a fanless design with a large aluminum heatsink that conducts heat to the enclosure walls, (3) add thermal interface material (TIM) between the SoC and the enclosure, turning the entire enclosure into a heat sink, (4) reduce the power mode from the start (e.g., 15W instead of 25W) to stay below the thermal ceiling indefinitely.'
  common_mistake: '"The device is defective" or "The factory has electromagnetic interference." Neither explains a gradual performance degradation.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Lab ambient: 22°C.
    - Field ambient: 50°C (factory floor + sealed enclosure).
    - Thermal resistance (small heatsink): ~5°C/W.
    - Target TDP: 25W.

    **Calculations:**
    - Lab junction temp: 22°C + (25W * 5°C/W) = 147°C (Throttles immediately to ~15W -> 22°C + 75°C = 97°C, stable at ~20 FPS).
    - Field junction temp (50°C ambient): 50°C + 75°C = 125°C (Still throttles).
    - With larger heatsink (~2°C/W): 50°C + (25W * 2°C/W) = 100°C (Borderline).
    - At 15W mode with large heatsink: 50°C + (15W * 2°C/W) = 80°C.

    **Conclusion & Interpretation:**
    - **Result: 80°C junction temp at 15W (Thermal-Bound)**. Stable performance without throttling requires power derating and improved thermal interface.
