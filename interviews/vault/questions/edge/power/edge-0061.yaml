title: 'Diagnosis: Root Cause of Thermal Throttling in Sealed Edge Enclosures'
scenario: Your edge AI box runs perfectly in the lab (30 FPS, no issues). You deploy it in a sealed IP67 enclosure on a factory floor. Within 20 minutes, FPS drops to 18. The hardware is identical.
question: What caused the gradual performance degradation, and how can it be fixed?
details:
  realistic_solution: 'The gradual FPS drop is thermal throttling caused by the sealed IP67 enclosure. The lab setup had free airflow, so the heatsink and fan could reject heat continuously. In the sealed box, heat accumulates, the local ambient around the SoC rises, and the same power draw produces a higher junction temperature until the thermal governor lowers clocks through DVFS. Fix it by designing the thermal path for the sealed enclosure: conduct heat from the SoC into the enclosure wall with proper TIM, use a larger fanless heatsink or heat spreader, validate at worst-case factory ambient, and derate the power mode if the junction-temperature margin is still too small.'
  common_mistake: |
    **The Pitfall:** Assuming the hardware is defective or experiencing external interference.
    **The Rationale:** Candidates jump to hardware failure because the device ran perfectly in the lab, ignoring the trapped heat in the new environment.
    **The Consequence:** Field engineers waste time replacing perfectly good units instead of addressing the thermal enclosure design.
  napkin_math: |
    **Assumptions & Constraints:**
    - The SoC throttles when junction temperature reaches its thermal limit.
    - Lab airflow keeps the local ambient near the room temperature.
    - A sealed enclosure raises the local ambient around the heatsink because heat cannot be convected away.
    - Thermal margin = throttle limit - local ambient - self-heating rise.

    **Calculations:**
    - If the lab thermal path leaves 10°C of junction margin at full FPS, a sealed enclosure that raises local ambient by more than 10°C consumes that margin.
    - Once margin is gone, the governor reduces frequency and voltage until generated heat matches what the enclosure can reject.
    - A drop from 30 FPS to 18 FPS is consistent with DVFS reducing available compute throughput to about 18 / 30 = 60% of the lab rate.
    - Lowering power mode or improving the heat path reduces self-heating and restores positive thermal margin.

    **Conclusion & Interpretation:**
    - **Result: Thermal-Bound DVFS throttling.** Stable performance requires a lower steady-state junction temperature, achieved through enclosure-level heat sinking, better thermal interface, validation at worst-case ambient, or power derating.
