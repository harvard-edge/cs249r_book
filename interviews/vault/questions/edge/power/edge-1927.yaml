title: 'Qualcomm Cloud AI 100: INT8 Matrix Multiply Energy Analysis'
scenario: You are tasked with analyzing the energy efficiency of a critical 1024x1024 INT8 matrix multiplication (C = A * B) on an edge accelerator. Based on Horowitz energy table principles and typical energy characteristics for modern hardware, assume an INT8 multiply-accumulate (MAC) operation consumes approximately 0.05 pJ, and a 32-bit memory access (read or write) consumes about 150 pJ.
question: Estimate the total energy consumed by compute operations versus memory accesses. Which component dominates the energy budget, and by how much?
details:
  realistic_solution: 'Calculate the total number of INT8 MAC operations for the matrix multiplication and multiply by the per-MAC energy. Separately, calculate the total bytes transferred for loading matrices A, B, and storing C, convert this to 32-bit accesses, and multiply by the per-access energy. Compare the figures to determine dominance.'
  common_mistake: |
    **The Pitfall:** Underestimating the energy cost of data movement (memory access) relative to computation.
    **The Rationale:** Believing that because a layer has high FLOPs, its energy profile must be dominated by ALU power draw.
    **The Consequence:** Ignoring critical data tiling optimizations, leading to edge deployments that trigger severe thermal throttling and drain batteries rapidly.
  napkin_math: |
    **Assumptions & Constraints:**
    - MatMul Dimensions: 1024x1024 INT8 matrices.
    - MAC Energy: 0.05 pJ.
    - Memory Access Energy (32-bit): 150 pJ.

    **Calculations:**
    - Compute Operations: 1024 * 1024 * 1024 = 1,073,741,824 MACs.
    - Compute Energy: 1,073,741,824 * 0.05 pJ = 5.37e7 pJ ≈ 0.054 mJ.
    - Memory Bytes: (2 input + 1 output) * 1024 * 1024 = 3,145,728 bytes.
    - 32-bit Accesses: 3,145,728 / 4 = 786,432 accesses.
    - Memory Energy: 786,432 * 150 pJ = 1.18e8 pJ ≈ 0.118 mJ.

    **Conclusion & Interpretation:**
    - **Result: Energy-Bound Data Movement**. Memory access energy dominates compute energy by approximately 2.2x (0.118 / 0.054).
