title: Federated Learning Energy Optimization
scenario: 'You are deploying a 10MB Federated Learning model on 100,000 edge devices. Local training costs 5mJ per batch (1,000 batches/epoch). Network transmission costs 500mJ/MB. The baseline uses 1 local epoch per round, converging in 200 rounds. A new proposal uses 5 local epochs per round, converging in 80 rounds.'
question: Which federated learning schedule uses less total energy per device to converge, 1 epoch for 200 rounds or 5 epochs for 80 rounds?
details:
  realistic_solution: 'Calculate the energy per round for both strategies, then multiply by the number of rounds to find the total energy footprint. In Federated Learning, communication (transmitting weights) is often significantly more expensive than local computation. By doing more local work (epochs) per round, you reduce the total number of global syncs required. You must evaluate the sum of compute and communication energy over the entire convergence lifecycle. The proposal with 5 epochs actually saves total energy because the massive reduction in communication rounds more than offsets the increase in local compute.'
  common_mistake: |
    **The Pitfall:** Assuming that 5x more local compute per round inevitably burns more battery.
    **The Rationale:** Overlooking that communication (transmitting weights) is vastly more expensive than local computation.
    **The Consequence:** Rejecting a more energy-efficient strategy because of a flawed understanding of federated learning energy economics.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute per Epoch: 5mJ * 1000 batches = 5J.
    - Comms per Round: 10MB * 500mJ/MB * 2 (upload+download) = 10J.

    **Calculations:**
    - Baseline (1 epoch): 5J compute + 10J comms = 15J/round. 15J * 200 rounds = 3000J total.
    - Proposal (5 epochs): 25J compute + 10J comms = 35J/round. 35J * 80 rounds = 2800J total.

    **Conclusion & Interpretation:**
    - **Result: 2800J (Energy-Bound)**. The proposal saves 200J per device.
