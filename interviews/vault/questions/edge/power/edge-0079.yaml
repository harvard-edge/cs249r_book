title: The Thermal Paste Time Bomb
scenario: 'Your fleet of 500 Jetson Orin NX devices runs traffic monitoring at intersections. After 2 years in the field, 15% of units show a gradual FPS decline — from 30 FPS to 18 FPS over 3 months. Replacing the software image doesn''t help. The devices are in sealed IP67 enclosures in Phoenix, Arizona (summer ambient: 45°C). A technician opens one unit and finds the heatsink is still firmly attached.'
question: What's causing the gradual performance degradation in these edge devices?
details:
  realistic_solution: 'The thermal interface material (TIM) between the SoC die and the heatsink has degraded. Standard thermal paste (silicone-based grease) undergoes "pump-out" — repeated thermal cycling (day/night in Phoenix: 45°C → 15°C → 45°C) causes the paste to migrate away from the die center due to differential thermal expansion between the copper heatsink and the PCB. After ~700 thermal cycles (2 years of daily cycling), the paste coverage drops from 100% to ~40%, creating air gaps.'
  common_mistake: |
    **The Pitfall:** Blaming silicon wear or non-existent mechanical parts.
    **The Rationale:** Engineers unfamiliar with embedded hardware physics often default to "the GPU is wearing out" or assume a fan has failed.
    **The Consequence:** The Orin NX in this design is passively cooled, and silicon doesn't degrade at these temperatures over just 2 years. They miss the fundamental thermal-mechanical failure mode.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fresh TIM R = 0.5°C/W.
       - Degraded TIM R = 2.0°C/W.
       - Summer ambient = 45°C, internal rise = 15°C. Load = 25W. Threshold = 105°C.
    2. **Calculations:**
       - Fresh ΔT = 25W * 0.5°C/W = 12.5°C.
       - Degraded ΔT = 25W * 2.0°C/W = 50°C.
       - Junction = 45°C + 15°C + 50°C = 110°C (Exceeds 105°C).
       - Throttled power = 15W → ΔT = 30°C. Junction = 45 + 15 + 30 = 90°C.
    3. **Conclusion & Interpretation:**
       - **Result: Thermal Throttling**. The system throttles power to 15W, stabilizing at 90°C and causing the FPS drop to 18 FPS.
