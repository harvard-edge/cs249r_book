title: 'Energy Calculation for Drone Collision Avoidance on Hailo-8'
scenario: 'A drone uses a Hailo-8 to run collision avoidance. The camera captures at 20 FPS. Inference takes 10 ms per frame. The accelerator drops to a 0.5 W state between frames.'
question: 'Calculate the total energy consumed by the Hailo-8 accelerator over 1 minute of active flight.'
details:
  realistic_solution: 'At 20 FPS, the accelerator is active for 20 frames * 10 ms = 200 ms (0.2s) every second, consuming 2.5W. The remaining 800 ms (0.8s) is spent in the 0.5W state. Energy per second is (0.2 * 2.5) + (0.8 * 0.5) = 0.9 Joules. Over 60 seconds, the energy is 0.9 * 60 = 54 Joules.'
  common_mistake: |
    **The Pitfall:** Assuming the chip remains continuously at its active power state.
    **The Rationale:** Engineers forget to account for the low-power idle states between inferences in duty-cycled applications.
    **The Consequence:** The calculated energy consumption is drastically overestimated, leading to over-specced batteries.
  napkin_math: |
    **Assumptions & Constraints:**
    - Capture rate: 20 FPS.
    - Inference duration: 10 ms per frame.
    - Active power: 2.5 W.
    - Idle power: 0.5 W.

    **Calculations:**
    - Active time per second: 20 frames * 10 ms = 200 ms (0.2 s).
    - Idle time per second: 1000 ms - 200 ms = 800 ms (0.8 s).
    - Energy per second: (0.2 s * 2.5 W) + (0.8 s * 0.5 W) = 0.5 J + 0.4 J = 0.9 Joules.
    - Energy over 60 seconds: 0.9 J/s * 60 s = 54 Joules.

    **Conclusion & Interpretation:**
    - **Result: 54 Joules (Power-Bound)**. Accounting for idle states in duty-cycled hardware is crucial to avoid vastly overestimating power consumption and battery size.
