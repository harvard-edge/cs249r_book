title: 'Edge Power Efficiency 101'
scenario: 'You''re an engineer on an autonomous vehicle team, tasked with selecting a profile for a new perception model running on an edge device. The device can run in a 15W mode or a 60W mode, both delivering a peak of 275 TOPS.'
question: 'To make the most of your limited power budget, what is the primary metric you should use to evaluate the power efficiency of the compute?'
details:
  realistic_solution: 'The most critical metric is TOPS/W (Throughput per Watt). This ratio tells you how much computational performance you get for every watt of power consumed. On a power-constrained device, maximizing this efficiency is paramount. A high TOPS/W ratio means you can achieve the required performance with less power draw, leading to lower heat generation and longer operational life. Profile thermal limits using nsys profiling.'
  common_mistake: |
    **The Pitfall:** Fixating on the advertised peak TOPS.
    **The Rationale:** Treating peak performance as the ultimate measure ignores thermal constraints.
    **The Consequence:** Systems hit their power or thermal budget before utilizing all TOPS.
  napkin_math: |
    **Assumptions & Constraints:**
    - Performance metric required for edge devices.
    - Two modes: 15W mode or a 60W mode.

    **Calculations:**
    - Evaluate operations per watt.

    **Conclusion & Interpretation:**
    - **Result: TOPS/W (Power-Bound)**. Throughput per Watt is the critical metric for comparing models under thermal constraints.
  options:
  - 'Peak TOPS'
  - 'Memory Bandwidth (GB/s)'
  - 'TOPS/W (Throughput per Watt)'
  - 'PUE (Power Usage Effectiveness)'
