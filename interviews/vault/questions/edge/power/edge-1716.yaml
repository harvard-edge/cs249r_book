title: Mitigating Edge TPU Thermal Throttling in Sealed Enclosures
scenario: A smart traffic camera uses a USB edge accelerator (4 TOPS INT8, 2W max) in a sealed, passively cooled enclosure. The system initially runs inference continuously at 30 FPS, but after 10 minutes, the accelerator hits its thermal limit and throttles, dropping throughput to 15 FPS.
question: What thermal bottleneck is causing the device to drop from 30 to 15 FPS, and how would you sustain at least 20 FPS?
details:
  realistic_solution: The most effective solution is to implement duty cycling and frame rate capping to reduce the average power dissipation below the enclosure's passive thermal limit. By intentionally capping the ingestion rate to 22 FPS and letting the TPU idle between frames, the average thermal load is reduced, preventing the system from ever reaching the throttle temperature while still meeting the requirement.
  common_mistake: |
    **The Pitfall:** Suggesting the addition of active cooling (fans).
    **The Rationale:** Candidates overlook the "sealed enclosure" constraint inherent to outdoor/industrial edge devices.
    **The Consequence:** Proposing a physically impossible solution, or unnecessarily complicating the model via pruning before addressing the baseline duty cycle.
  napkin_math: |
    **Assumptions & Constraints:**
    - Continuous 30 FPS consumes 2W (throttles).
    - Assumed Enclosure limit: 1.5W safely dissipated continuously.

    **Calculations:**
    - Capped Rate: 22 FPS.
    - Duty Cycle: Active 73.3% of the time (22/30), Idle 26.7%.
    - Average Power = (0.733 * 2W) + (0.267 * 0.1W idle) = 1.466W + 0.0267W = 1.49W.

    **Conclusion & Interpretation:**
    - **Result: 1.49W (Thermal-Bound)**. Since 1.49W < 1.5W, capping to 22 FPS allows the system to sustain continuous operation without triggering catastrophic frequency throttling.
