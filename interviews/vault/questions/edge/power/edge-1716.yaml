title: Mitigating Edge TPU Thermal Throttling in Sealed Enclosures
scenario: A smart traffic camera uses a USB edge accelerator (4 TOPS INT8, 2W max) in a sealed, passively cooled enclosure. The system initially runs inference continuously at 30 FPS, but after 10 minutes, the accelerator hits its thermal limit and throttles, dropping throughput to 15 FPS.
question: What thermal bottleneck is causing the device to drop from 30 to 15 FPS, and how would you sustain at least 20 FPS?
details:
  realistic_solution: |
    The bottleneck is sustained heat dissipation in the sealed passive enclosure: continuous 30 FPS operation drives the accelerator above what the enclosure can shed, so it reaches the thermal limit and downclocks to 15 FPS. Cap the inference rate and duty cycle the accelerator so average power stays below the passive thermal limit. A 20 FPS cap directly meets the requirement if it remains under the thermal budget; a small margin such as 22 FPS is acceptable only if measured temperatures stay stable.
  common_mistake: |
    **The Pitfall:** Suggesting the addition of active cooling (fans).
    **The Rationale:** Candidates overlook the "sealed enclosure" constraint inherent to outdoor/industrial edge devices.
    **The Consequence:** Proposing a physically impossible solution, or unnecessarily complicating the model via pruning before addressing the baseline duty cycle.
  napkin_math: |
    **Assumptions & Constraints:**
    - Continuous 30 FPS consumes 2W (throttles).
    - Assumed Enclosure limit: 1.5W safely dissipated continuously.

    **Calculations:**
    - Required capped rate: 20 FPS.
    - Duty cycle at 20 FPS = 20/30 = 66.7% active, 33.3% idle.
    - Average power at 20 FPS = (0.667 * 2W) + (0.333 * 0.1W idle) = 1.33W + 0.03W = 1.36W.
    - A 22 FPS cap would average (0.733 * 2W) + (0.267 * 0.1W) = 1.49W, leaving almost no margin under a 1.5W limit.

    **Conclusion & Interpretation:**
    - **Result: 1.36W at 20 FPS (Thermal-Bound)**. Capping at 20 FPS satisfies the throughput requirement while staying below the assumed 1.5W passive dissipation limit; 22 FPS should be treated as a measured-margin choice, not a guaranteed target.
