title: 'The Edge Inference Power Profiling'
scenario: 'You''re designing a battery-powered inspection drone with a Qualcomm RB5 (15 TOPS, 7W typical). The drone carries a 99.9 Wh battery (the FAA limit for carry-on). You measure idle power at 3W and inference power at 9W.'
question: 'Why is the estimate 99.9Wh / 9W = 11.1 hours both too optimistic and too pessimistic for the drone''s continuous AI-powered inspection?'
details:
  realistic_solution: 'The estimate is too optimistic because it ignores non-AI power consumers: (1) Drone motors: 150-300W in flight (this dominates everything — the AI is <5% of total power). (2) Camera and gimbal: 3W. (3) GPS, IMU, barometer: 1W. (4) Radio telemetry: 2W. (5) Voltage regulator losses: ~15% of total. Total flight power is ~250W. Flight time: 99.9Wh / 259W = 23.1 minutes — the AI''s 9W draw is a tiny fraction of the total budget.'
  common_mistake: |
    **The Pitfall:** Calculating battery life using only the compute payload's power draw.
    **The Rationale:** Software engineers often forget they are operating on a mobile physical platform and ignore the power costs of motors, radios, and sensors.
    **The Consequence:** Promising 11 hours of flight time to management, only to have the drone fall out of the sky after 23 minutes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Power consumers: Drone motors (~240W) + Sensors/Radio (~10W) + AI Inference (9W).
    - Battery capacity: 99.9 Wh.

    **Calculations:**
    - Total flight power: ~259W.
    - True Flight Time: 99.9 Wh / 259W = 0.385 hours = 23.1 minutes.
    - AI fraction of total power: 9W / 259W = ~3.5%.
    - AI energy used per flight: 9W * 0.385 hours = 3.47 Wh.

    **Conclusion & Interpretation:**
    - **Result: 23.1 minutes flight time (Power-Bound)**. The AI inference draws only ~3.5% of the total power, making the 11-hour estimate completely unrealistic.
