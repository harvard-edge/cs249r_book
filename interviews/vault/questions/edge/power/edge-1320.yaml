title: Evaluating Operator Energy Tradeoffs on Edge TPU
scenario: You are deploying a quantized vision model to a Google Coral Edge TPU operating under a strict 2W power budget. You must choose between Model A, which uses standard convolutions but requires 50 million off-chip DRAM accesses per inference due to its large working set size, and Model B, which uses depthwise-separable convolutions and has twice as many total INT8 operations but fits entirely in the on-chip SRAM.
question: 'Which model is more energy-efficient on the 2W Coral Edge TPU: fewer ops with 50M DRAM accesses or twice the ops fitting in SRAM?'
details:
  realistic_solution: 'Model B is significantly more energy-efficient. The energy cost of moving data to and from off-chip DRAM is orders of magnitude higher than performing an INT8 MAC operation on-chip. By optimizing the architecture to fit within the local SRAM, Model B trades cheap compute for expensive memory bandwidth, easily staying within the 2W limit.'
  common_mistake: |
    **The Pitfall:** Equating fewer FLOPs directly with lower power consumption.
    **The Rationale:** Candidates look only at the total operations and assume Model A is more energy-efficient because it has half the MACs of Model B.
    **The Consequence:** They ignore the Horowitz energy table principles, failing to realize the massive energy penalty of off-chip DRAM accesses compared to on-chip ALU compute.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware Limit: 2W power budget, 4 TOPS INT8 compute
       - Energy Costs: Compute (~0.5 pJ/op), DRAM (~100 pJ/word), SRAM (~5 pJ/word)
    2. **Calculations:**
       - Model A Energy: (100M ops * 0.5 pJ) + (50M DRAM * 100 pJ) = 50 μJ + 5,000 μJ = 5,050 μJ (5.05 mJ)
       - Model B Energy: (200M ops * 0.5 pJ) + (100M SRAM * 5 pJ) = 100 μJ + 500 μJ = 600 μJ (0.6 mJ)
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound.** DRAM accesses are massively more expensive than raw compute. By operating entirely within SRAM, Model B dramatically lowers total energy consumption despite executing 2x the FLOPs.
