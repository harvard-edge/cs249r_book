title: Drone Edge Compute Energy Penalty
scenario: >-
  A drone running an edge compute module hovers with the module at a 15W idle mode. It spikes to 60W for exactly 2 seconds to run a 3D mapping update, then returns to 15W.
question: Calculate the total extra energy in Joules consumed by executing the mapping operation compared to just remaining in the 15W idle state.
details:
  realistic_solution: The active power penalty relative to the baseline is 60W - 15W = 45W. Because the mapping takes 2 seconds, the extra energy is 45 Watts * 2 seconds = 90 Joules.
  common_mistake: |
    **The Pitfall:** Multiplying the total peak power by the time.
    **The Rationale:** Candidates calculate the absolute energy consumed during the period (60W * 2s = 120J) rather than isolating the delta relative to the baseline.
    **The Consequence:** Overestimating the energy cost of the specific compute operation by improperly including the baseline hover power.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline power (hovering idle): 15W.
    - Active compute power: 60W.
    - Compute duration: 2 seconds.

    **Calculations:**
    - Active power penalty: 60W - 15W = 45W.
    - Extra energy: 45 Watts * 2 seconds = 90 Joules.

    **Conclusion & Interpretation:**
    - **Result: 90 Joules (Energy-Bound).** The true energy cost of the 3D mapping operation is exactly 90 Joules relative to the hovering baseline.
