title: Power Budget for Multi-Model Edge Pipeline
scenario: 'You''re building a smart retail camera that runs three models simultaneously: person detection (YOLOv8n, runs on GPU), pose estimation (MoveNet, runs on DLA), and face blur for privacy (a small U-Net, runs on GPU). The system is powered by PoE+ delivering 25.5W at the device. The camera sensor + ISP draws 3W, the network stack draws 1.5W, and the SoC housekeeping draws 2W.'
question: At 25.5W PoE+, what ML power budget remains, and can all three models run concurrently on the Jetson Orin Nano?
details:
  realistic_solution: Build the power tree from the PoE+ input and deduct conversion losses plus fixed loads. After a 17% conversion loss, 25.5W PoE+ leaves about 21.2W usable. Fixed camera, network, and housekeeping loads consume 6.5W, leaving about 14.7W for ML. The three estimated model loads total 11.5W, so they fit electrically with about 3.2W of headroom; thermal validation is still required separately because no thermal resistance or ambient limit is provided in the prompt.
  common_mistake: |
    **The Pitfall:** Comparing the sum of the model power draws directly against a nominal Orin Nano module power mode.
    **The Rationale:** Candidates mistake "TDP" (Thermal Design Power) for actual maximum power draw, and they entirely ignore DC-DC conversion losses from the 48V PoE rail.
    **The Consequence:** The device pulls more current than the PoE switch can provide and gracefully reboots, or it simply overheats and melts down in the field.
  napkin_math: |
    **Assumptions & Constraints:**
    - PoE+ budget: 25.5W.
    - 17% conversion loss.
    - Fixed loads: 3W (sensor) + 1.5W (network) + 2W (housekeeping) = 6.5W.
    - Estimated ML draw = YOLO (4W) + MoveNet (2.5W) + U-Net (5W) = 11.5W.

    **Calculations:**
    - Usable power: 25.5W * (1 - 0.17) = 21.165W, about 21.2W.
    - Remaining ML budget = 21.2W - 6.5W = 14.7W. (Fits electrically).
    - Estimated concurrent ML draw = 11.5W.
    - Electrical headroom = 14.7W - 11.5W = 3.2W.

    **Conclusion & Interpretation:**
    - **Result: 14.7W ML budget (Power-Bound)**. The three models fit electrically at 11.5W, with about 3.2W of margin. Do not claim a thermal failure without explicit ambient temperature, thermal resistance, and module limit assumptions.
