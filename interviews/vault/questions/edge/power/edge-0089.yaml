title: The Energy-Aware Reconnaissance Drone
scenario: 'You''re leading the ML systems team for a long-endurance reconnaissance drone. The drone must maintain critical visual perception capabilities for a 6-hour mission. However, its power budget is highly dynamic: motor bursts for high-speed maneuvers or strong winds can temporarily draw significant power, leaving only a fraction (e.g., 20-30% of peak) for the ML payload.'
question: How would you design adaptive inference for a 6-hour drone mission when ML power drops to 20-30% during maneuvers?
details:
  realistic_solution: |
    This requires a sophisticated, holistic power-aware adaptive system.
      1.  Multi-Model Pipeline / Model Zoo: Develop or train multiple versions of the perception model, each optimized for different power-performance-accuracy trade-offs (e.g., a lightweight, low-accuracy model; a medium model; a high-accuracy, high-power model). This can also include models at different resolutions or with different numbers of input frames.
      2.  Heterogeneous Compute Utilization: Leverage all available compute units (CPU, GPU, NPU, DSP) strategically. For low-power states, offload tasks to the most energy-efficient core (often a low-power CPU core or specialized DSP). For bursts, utilize the high-performance GPU/NPU.
      3.  Predictive Power Management & Workload Scheduler:
          *   System Power Monitoring: Continuously monitor total system power consumption and available power for ML.
          *   Mission Planner Integration: Integrate with the drone's flight controller and mission planner to anticipate future power demands (e.g., upcoming high-power maneuvers).
          *   Adaptive Workload Controller: Based on predicted available power, current perception needs (e.g., target distance, criticality), and thermal state, dynamically switch between models, adjust inference frequency, or change input resolution. The goal is to maximize the "utility" (accuracy * duration) given the power budget.
          *   Energy-Aware Scheduling: Instead of just latency, schedule tasks based on their energy cost and criticality.
      4.  Dynamic Resolution/Frame Rate Scaling: Reduce input image resolution or inference frame rate when power is scarce, and increase it when power is abundant. This is often less disruptive than model switching.
      5.  Hierarchical Perception: Implement a tiered perception system. A very lightweight "always-on" model for coarse detection (low power). If something interesting is detected or power allows, activate a higher-fidelity model for detailed analysis.
      6.  Edge-Cloud Hybrid (if connectivity allows): For non-critical, heavy computations, offload to cloud/ground station when network conditions and power permit.
  common_mistake: |
    **The Pitfall:** Pre-selecting a single low-power model or relying purely on GPU hardware throttling.
    **The Rationale:** Candidates opt for the simplest static solution, failing to leverage available power when conditions are calm.
    **The Consequence:** Sacrifices massive amounts of perception accuracy unnecessarily, or fails the mission completely when abrupt power constraints force a hard shutdown.
  napkin_math: |
    **Assumptions & Constraints:**
    - Battery capacity: 1000 Wh.
    - Mission duration: 6 hours, so total average power budget = 1000 Wh / 6h = 166.7W.
    - Baseline ML model power draw: 15W.
    - Example propulsion draw: 120W in calm flight and 200W during maneuvers for 20% of the mission.
    - ML power can fall to 20-30% of its 15W peak during maneuvers: 3-4.5W.

    **Calculations:**
    - Propulsion average power: (0.8 * 120W) + (0.2 * 200W) = 136W.
    - Average power left for ML, compute, radios, and avionics: 166.7W - 136W = 30.7W.
    - A static 15W ML stack uses 15W * 6h = 90 Wh, which fits the average mission budget only if non-ML systems stay within the remaining envelope.
    - During maneuvers, available ML power may drop to 3-4.5W, so the scheduler must reduce model size, resolution, or frame rate for those intervals instead of assuming a constant 15W.
    - Example adaptive ML energy: calm 80% at 15W plus maneuver 20% at 4W = (0.8 * 15W + 0.2 * 4W) * 6h = 76.8 Wh.

    **Conclusion & Interpretation:**
    - **Result: 3-4.5W maneuver mode with 15W calm mode (Power-Bound)**. The perception system should scale across the available power envelope and budget energy over the mission, rather than treating 166.7W total average power as ML-only energy.
