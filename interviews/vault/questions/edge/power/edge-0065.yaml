title: The Power State Machine
scenario: 'You''re designing the power management firmware for a smart doorbell with an Ambarella CV25S SoC. The doorbell must feature always-on motion detection, wake to full AI in <200ms when a person is detected, run face recognition for 5 seconds, then return to low power. Your colleague implements two states: ON and OFF. After deployment, users complain about 1.5-second wake delays and the battery dying in 3 days instead of the target 60 days.'
question: How would you design the power state machine to meet the <200ms wake target and 60-day battery life?
details:
  realistic_solution: 'The correct design uses a 4-state power machine. S0 (Deep Sleep, 5 mW): CPU and NPU off, PIR sensor active. S1 (Sensor Wake, 50 mW): One core runs a lightweight motion classifier to filter 95% of false triggers. S2 (Full AI, 2.5W): All cores + NPU active for face recognition. S3 (Network, 1.5W): Transmit alert. S1 prevents the expensive S2 wake for false triggers.'
  common_mistake: |
    **The Pitfall:** Using a binary ON/OFF power model and just trying to wake up faster.
    **The Rationale:** Candidates fail to realize that booting the entire SoC for every false trigger drains the battery, while deep sleep makes booting too slow.
    **The Consequence:** A choice between an always-on system that kills the battery in hours, or a deep sleep system that fails the 200ms wake latency requirement.
  napkin_math: |
    **Assumptions & Constraints:**
    - Battery: 20 Wh.
    - Target: >60 days battery life, <200ms wake.
    - Events: 100 PIR triggers/day, only 5 are real people.
    - SoC Power: 2.5W active, 50mW sensor-wake, 5mW sleep.

    **Calculations:**
    - Two-state (ON/OFF): keep the SoC in a 0.5W idle-ready state for fast wake plus 100 triggers/day * 5s * 2.5W.
      - Idle-ready energy: 0.5W * 24h = 12.0 Wh/day.
      - Trigger energy: 100 * 5s * 2.5W = 1,250 Ws = 0.347 Wh/day.
      - Total: 12.347 Wh/day, so 20 Wh / 12.347 Wh/day = 1.6 days.
    - Four-state (S0-S3):
      - S1 time: 100 * 2s = 200s = 0.0556h.
      - S2 time: 5 * 5s = 25s = 0.00694h.
      - S3 time: 5 * 3s = 15s = 0.00417h.
      - S0 time: 24h - 0.0667h = 23.933h.
      - S0 energy: 0.005W * 23.933h = 0.120 Wh.
      - S1 energy: 0.050W * 0.0556h = 0.0028 Wh.
      - S2 energy: 2.5W * 0.00694h = 0.0174 Wh.
      - S3 energy: 1.5W * 0.00417h = 0.0063 Wh.
    - Total 4-state energy: 0.1465 Wh/day.

    **Conclusion & Interpretation:**
    - **Result: 136 Days (Power-Bound).** The four-state tiered wake architecture yields 20 Wh / 0.1465 Wh/day = 136 days of battery life, safely exceeding the 60-day target.
