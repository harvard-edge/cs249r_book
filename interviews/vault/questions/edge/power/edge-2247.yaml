title: Idle Power Governance for Always-On Edge Inference
scenario: A fleet of 500 industrial edge inference boxes run a defect detection model in a factory with 8-hour production shifts. Power monitoring reveals the devices consume 22W even during the 16 hours/day when the production line is idle. A technician proposes turning off the devices during idle periods. The operations team objects that boot time (45 seconds) will delay defect detection at shift start.
question: Quantify the carbon and cost impact of the current idle waste and evaluate the technician's proposal?
details:
  realistic_solution: Current idle draw is 500 devices * 22W * 16h/day * 365 = 64,240 kWh/year, costing $6,424/year and emitting 1,927 kgCO2e/year at the given factors. Turning devices off during idle would avoid nearly all of that idle energy, but the 45-second cold-start delay must be handled operationally by scheduled pre-boot before the production shift. If a 15W sleep mode is available, it saves 20,440 kWh/year versus today, worth $2,044/year and 613 kgCO2e/year, while avoiding cold-boot risk. Choose shutdown only if pre-boot automation is reliable; otherwise use the low-power sleep state.
  common_mistake: |
    **The Pitfall:** Calculating idle waste as full TDP multiplied by idle time, rather than the difference between idle power and sleep baseline.
    **The Rationale:** Engineers often fail to account for the necessary background power consumption (OS, network keepalive) when analyzing waste.
    **The Consequence:** Overestimating the potential savings and proposing disruptive hardware shutdowns over low-latency sleep states.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500 devices, 22W idle, 16 idle hours/day, 365 days/year.
    - Carbon: 30 gCO2e/kWh. Cost: $0.10/kWh. Sleep mode baseline: 15W.

    **Calculations:**
    - Current idle energy: 500 * 22W * 16h * 365 = 64,240 kWh/yr.
    - Current idle carbon: 64,240 kWh * 30 gCO2e/kWh = 1,927 kgCO2e/yr.
    - Current idle cost: 64,240 kWh * $0.10/kWh = $6,424/yr.
    - Shutdown avoided energy: approximately 64,240 kWh/yr if devices consume ~0W while off.
    - Saved energy vs 15W sleep: 500 * (22W - 15W) * 16h * 365 = 20,440 kWh/yr.
    - Sleep carbon savings: 20,440 kWh * 30 gCO2e/kWh = 613 kgCO2e/yr.
    - Sleep cost savings: 20,440 kWh * $0.10 = $2,044/yr.

    **Conclusion & Interpretation:**
    - **Result: 64,240 kWh Current Idle Waste.** Shutdown maximizes savings but needs scheduled pre-boot to avoid the 45-second detection gap; sleep mode saves less energy but is operationally safer.
